  combat_unit_type_infantry_1_desc: "Закаленные пехотинцы, обученные ведению статической войны, преуспевающие в тактике защиты и истощения."
  combat_unit_type_infantry_2_desc: "Легко оснащенные подразделения, способные к быстрому развертыванию и гибкому маневрированию на разнообразной местности."
  combat_unit_type_infantry_3_desc: "Войска поддерживаются бронетехникой, сочетающей мобильность с повышенной устойчивостью на поле боя."
  combat_unit_type_infantry_4_desc: "Тяжелобронированные подразделения, объединяющие пехоту и танки для операций по прорыву и устойчивых атак."
  combat_unit_type_infantry_5_desc: "Сбалансированные силы, сочетающие пехоту, бронетехнику, артиллерию и элементы поддержки для обеспечения стратегической универсальности."
  combat_unit_type_infantry_6_desc: "Модульный боевой порядок, оптимизированный для автономных операций, сочетающий в себе огневую мощь и мобильность."
  combat_unit_type_infantry_7_desc: "Элитные механизированные подразделения, оснащенные новейшей броней и системами координации боевого искусственного интеллекта."
  combat_unit_type_infantry_8_desc: "Бронетанковые войска нового поколения с повышенной живучестью, огневой мощью и встроенной поддержкой дронов."
  combat_unit_type_infantry_9_desc: "Готовые к будущему силы, способные выполнять многоплановые операции и обеспечивать бесперебойную координацию между подразделениями."
  combat_unit_type_infantry_10_desc: "Экспериментальные боевые подразделения, пилотирующие механизированные экзокостюмы, меняющие определение мобильности, огневой мощи и тактического превосходства."

  combat_unit_type_tanks_1_desc: "Танки Первой мировой войны"
  combat_unit_type_tanks_2_desc: "Танки Второй мировой войны"
  combat_unit_type_tanks_3_desc: "Танки начала холодной войны"
  combat_unit_type_tanks_4_desc: "Танки середины холодной войны"
  combat_unit_type_tanks_5_desc: "Танки поздней холодной войны"
  combat_unit_type_tanks_6_desc: "Танки начала XXI века"
  combat_unit_type_tanks_7_desc: "Танки середины 21 века"
  combat_unit_type_tanks_8_desc: "Танки середины 21 века"
  combat_unit_type_tanks_9_desc: "Танки конца XXI века"
  combat_unit_type_tanks_10_desc: "Танки начала 22 века"

  combat_unit_type_artillery_1_desc: "Традиционные артиллерийские расчеты оказывают огневую поддержку с закрытых позиций, что идеально подходит для продолжительной бомбардировки."
  combat_unit_type_artillery_2_desc: "Огневые позиции тяжелого калибра, предназначенные для прорыва укреплений и разрушения защищенных целей в ходе длительной осады."
  combat_unit_type_artillery_3_desc: "Мобильные огневые платформы, сочетающие в себе бронетехнику и артиллерию, способные быстро перемещаться и оказывать оперативную поддержку."
  combat_unit_type_artillery_4_desc: "Тяжелобронированные артиллерийские части с повышенной защитой и огневой мощью для боевых действий на передовой."
  combat_unit_type_artillery_5_desc: "Реактивные системы залпового огня, ведущие огонь по обширным территориям, идеально подходят для подавления формирований противника."
  combat_unit_type_artillery_6_desc: "Высокомобильные высокоточные ракетные системы, оптимизированные для быстрого развертывания и тактических ударов на дальние расстояния."
  combat_unit_type_artillery_7_desc: "Усовершенствованные стартовые платформы, способные развертывать баллистические ракеты воздушного базирования для нанесения стратегических глубоких ударов."
  combat_unit_type_artillery_8_desc: "Автономные дроны, наносящие точные удары при минимальном человеческом контроле, идеально подходят для асимметричной войны."
  combat_unit_type_artillery_9_desc: "Скоординированные дроны разрушают оборону с помощью синхронизированных, многовекторных атак и адаптивного наведения."
  combat_unit_type_artillery_10_desc: "Электромагнитные рельсотронные платформы, доставляющие гиперзвуковые снаряды с огромной дальностью и кинетическим воздействием."

  combat_unit_type_airforce_1_desc: "Легкий самолет-разведчик, используемый для разведки позиций противника и передачи разведывательной информации с поля боя."
  combat_unit_type_airforce_2_desc: "Маневренные планеры, предназначенные для ближнего воздушного боя и базовой противовоздушной обороны в боях на малых скоростях."
  combat_unit_type_airforce_3_desc: "Реактивные истребители раннего поколения, обладающие улучшенными скоростными и высотными характеристиками по сравнению с винтовыми предшественниками."
  combat_unit_type_airforce_4_desc: "Высокоскоростные перехватчики, способные преодолевать звуковой барьер и доминировать в зонах воздушных боев."
  combat_unit_type_airforce_5_desc: "Универсальный самолет, оборудованный для выполнения задач «воздух-воздух» и «воздух-земля», адаптируемый к изменяющимся тактическим потребностям."
  combat_unit_type_airforce_6_desc: "Истребители, уклоняющиеся от радаров, созданы для точных ударов и обеспечения живучести в оспариваемом воздушном пространстве."
  combat_unit_type_airforce_7_desc: "Усовершенствованные стелс-платформы, сочетающие многоцелевую гибкость с низкой заметностью и сетевыми боевыми системами."
  combat_unit_type_airforce_8_desc: "Высотные истребители, действующие вблизи границы атмосферы, оптимизированные для стратегического перехвата и наблюдения."
  combat_unit_type_airforce_9_desc: "Дистанционно пилотируемые или автономные авиационные комплексы, выполняющие разведывательные, ударные и вспомогательные задачи с минимальным риском."
  combat_unit_type_airforce_10_desc: "Массивные воздушные командные платформы, сочетающие в себе полет, огневую мощь и координацию флота в одной воздушной крепости."

  combat_unit_type_light_ship_1_desc: "Быстрые и маневренные корабли сопровождения, предназначенные для противолодочной борьбы, защиты конвоев и быстрого реагирования."
  combat_unit_type_light_ship_2_desc: "Бесшумные подводные охотники, способные вести скрытную разведку и разрушительные торпедные удары."
  combat_unit_type_light_ship_3_desc: "Глубоководные хищники, работающие на ядерных реакторах, обладающие увеличенной дальностью полета и огромной выносливостью под водой."
  combat_unit_type_light_ship_4_desc: "Усовершенствованные подводные аппараты, оснащенные современными гидролокаторами, ракетными комплексами и улучшенными возможностями скрытности."
  combat_unit_type_light_ship_5_desc: "Подводные лодки нового поколения, оптимизированные для работы с низкими акустическими сигнатурами и нанесения высокоточных ударов во враждебных водах."

  combat_unit_type_capital_ship_1_desc: "Тяжелобронированные военные корабли ушедшей эпохи, ощетинившиеся пушками и созданные для доминирования на линии боя."
  combat_unit_type_capital_ship_2_desc: "Плавучие крепости с мощной огневой мощью, предназначенные для контроля морских коммуникаций и прямого поражения флотов противника."
  combat_unit_type_capital_ship_3_desc: "Современные надводные боевые корабли, вооруженные управляемыми ракетами для дальних высокоточных ударов и защиты флота."
  combat_unit_type_capital_ship_4_desc: "Высокоскоростные крупные корабли, сочетающие огневую мощь и маневренность, идеально подходящие для динамичных морских сражений."
  combat_unit_type_capital_ship_5_desc: "Компактные, универсальные военные корабли, предназначенные для прибрежных операций и сочетающие в себе скорость, скрытность и модульное вооружение."

  combat_unit_type_carrier_1_desc: "Морские авиабазы, распространяющие мощь через океаны, способные запускать и возвращать самолеты в зонах боевых действий."
  combat_unit_type_carrier_2_desc: "Атомные авианосцы с непревзойденной дальностью полета и выносливостью, обеспечивающие устойчивое глобальное развертывание."
  combat_unit_type_carrier_3_desc: "Огромные флагманские авианосцы, на которых размещены крупные авиационные крылья, командные центры и передовые системы обороны."
  combat_unit_type_carrier_4_desc: "Малозаметные авианосцы, предназначенные для уклонения от обнаружения при координации скрытных воздушных операций и радиоэлектронной борьбы."
  combat_unit_type_carrier_5_desc: "Военно-морские платформы «Титаник», объединяющие возможности авиации, моря и дронов в единую мобильную командную крепость."

