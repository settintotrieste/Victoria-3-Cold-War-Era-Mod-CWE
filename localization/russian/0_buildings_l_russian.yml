  mobilization_option_digital_cryptography_recon: "Системы цифровой войны"
  mobilization_option_digital_cryptography_recon_desc: "Военные будут использовать новейшие компьютеры и программное обеспечение для своих боевых действий."
  mobilization_option_drones: "Боевые дроны"
  mobilization_option_drones_desc: "Боевой дрон — это беспилотный летательный аппарат (БПЛА), который используется для разведки, наблюдения, обнаружения целей и рекогносцировки и несет авиационное вооружение, такое как ракеты, противотанковые управляемые ракеты (ПТУР) и/или бомбы, в точках подвески для ударов дронов."
  mobilization_option_military_indoctrination: "Военная идеологическая обработка"
  mobilization_option_military_indoctrination_desc: "Солдатам будут внушать необходимость устранения характеристик, вредных для военной жизни (то есть подчинять личный интерес выполнению приказов), обучать людей убивать, когда это необходимо, и давать новобранцам возможность рассматривать себя в коллективных терминах."
  mobilization_option_political_commissars: "Силы противодействия отступлению"
  mobilization_option_political_commissars_desc: "Противоотступающими силами являются воинские части, располагающиеся в тылу или на передовой линии (за основными силами) для поддержания воинской дисциплины, предотвращения бегства военнослужащих с поля боя, захвата шпионов, диверсантов и дезертиров, а также возвращения войск, бегущих с поля боя или отстающих от своих частей."

