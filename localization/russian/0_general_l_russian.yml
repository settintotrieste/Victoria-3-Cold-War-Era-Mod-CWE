  concept_semi_autonomous_colony_desc: "[Concept('concept_recognized_power','$concept_recognized_powers$')] может превратить более слабый [concept_country] в свой $concept_semi_autonomous_colony$. $concept_semi_autonomous_colony$ - это тип [concept_subject], который не может создать свой собственный [Concept('concept_diplomatic_play','$concept_diplomatic_plays$')], но вынужден присоединиться к своему [Concept('concept_overlord','$concept_overlord_possessive$')] [Concept('concept_war','$concept_wars$')], а также должен выплачивать #v 30%#! своего дохода [concept_country]0 своим [concept_country]1 каждую неделю. [concept_country]3 $concept_semi_autonomous_colony$ не может увеличиться до уровня [concept_country]1 или превысить его, а их [concept_country]1 могут быть нацелены на них с помощью [concept_country]6 Аннексации#! [concept_country]8."
