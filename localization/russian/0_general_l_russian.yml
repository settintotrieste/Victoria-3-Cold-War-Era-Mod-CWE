  ship_type_troop_ship_1_desc: "Модернизированный военный корабль, предназначенный для эффективной перевозки солдат и припасов на большие расстояния, оснащенный улучшенными двигательными установками и системами безопасности."
  ship_type_troop_ship_2_desc: "Передовой военный корабль с повышенной вместимостью, автоматизацией и логистической поддержкой, способный выдерживать крупномасштабные развертывания на мировых театрах военных действий."
  ship_type_battleship_3_desc: "Быстрый крупный корабль, жертвующий броней ради скорости, предназначенный для того, чтобы превосходить крейсеры по вооружению и опережать линкоры."
  ship_type_battleship_4_desc: "Модернизированный линейный крейсер, оснащенный комплексами управляемых ракет, расширяющий возможности применения традиционных артиллерийских орудий."
  ship_type_battleship_5_desc: "Усовершенствованный линейный крейсер, объединяющий радар, электронику и улучшенную силовую установку для сбалансированной огневой мощи и живучести."
  ship_type_battleship_6_desc: "Гибкая конструкция, состоящая из модульных компонентов, позволяет быстро адаптироваться к новому оружию и технологиям."
  ship_type_battleship_7_desc: "Увеличенный линейный крейсер с огромной огневой мощью и усиленной броней, конкурирующий по силе с линкорами, сохраняющий при этом скорость."
  ship_type_battleship_8_desc: "Линейный крейсер, использующий беспилотные системы и рои дронов, расширяющий свои боевые возможности без риска для экипажа."
  ship_type_battleship_9_desc: "Высокоавтоматизированный крупный корабль, способный работать независимо, сокращая требования к экипажу и одновременно повышая эффективность."
  ship_type_battleship_10_desc: "Вершина эволюции линейного крейсера, колоссальный военный корабль, сочетающий в себе подавляющую огневую мощь, развитую автоматизацию и непревзойденную выносливость."

  ship_type_aircraft_carrier_0_desc: "Небольшой авианосец, предназначенный для ограниченных воздушных операций, обеспечивающий разведку и легкие удары."
  ship_type_aircraft_carrier_1_desc: "Полноразмерный авианосец, способный поддерживать крупные авиационные подразделения для наступательных и оборонительных задач на море."
  ship_type_aircraft_carrier_2_desc: "Атомный авианосец с практически неограниченной дальностью полета, позволяющий осуществлять устойчивые глобальные операции без дозаправки."
  ship_type_aircraft_carrier_3_desc: "Современный авианосец, объединяющий передовую электронику, радар и двигательные установки для сбалансированного удара и поддержки."
  ship_type_aircraft_carrier_4_desc: "Суперавианосец огромных размеров и мощности, способный проецировать подавляющую мощь авиации на целые регионы."
  ship_type_aircraft_carrier_5_desc: "Усовершенствованный суперавианосец с передовыми системами, автоматизацией и повышенной живучестью для ведения боевых действий высокой интенсивности."
  ship_type_aircraft_carrier_6_desc: "Модульный суперавианосец, построенный из адаптируемых компонентов, позволяющий быстро модернизировать вооружение, датчики и авиационное оборудование."
  ship_type_aircraft_carrier_7_desc: "Суперавианосец дронов, развертывающий беспилотные летательные системы, расширяющий радиус действия удара и одновременно снижающий риск для пилотов-людей."
  ship_type_aircraft_carrier_8_desc: "Автономный суперавианосец, способный работать с минимальным экипажем, используя передовой искусственный интеллект и автоматизацию для устойчивого глобального доминирования."

  ship_type_cruiser_3_desc: "Тяжеловооруженный крейсер с усиленным бронированием, способный поражать надводные корабли противника и поддерживать операции флота."
  ship_type_cruiser_4_desc: "Крейсер, оснащенный системами управляемого ракетного оружия, расширяющий возможности наступления далеко за пределы традиционной артиллерийской стрельбы."
  ship_type_cruiser_5_desc: "Современный ракетный крейсер, сочетающий в себе усовершенствованный радар, электронику и двигательную установку для сбалансированного удара и защиты."
  ship_type_cruiser_6_desc: "Модульный ракетный крейсер, построенный из адаптируемых компонентов, позволяющих быстро модернизировать вооружение и датчики."
  ship_type_cruiser_7_desc: "Суперракетный крейсер огромных размеров и огневой мощи, предназначенный для доминирования в морских сражениях и обеспечения возможностей командования флотом."
  ship_type_cruiser_8_desc: "Беспилотный ракетный крейсер, развертывающий беспилотные системы для разведки и ударных задач, снижающий риск для экипажей."
  ship_type_cruiser_9_desc: "Автономный ракетный крейсер, способный действовать с минимальным экипажем и использующий передовую автоматизацию для обеспечения постоянной боевой эффективности."
  ship_type_cruiser_10_desc: "Вершина эволюции крейсера, мега-ракетный крейсер, сочетающий в себе подавляющую огневую мощь, развитую автоматизацию и непревзойденную выносливость."

  ship_type_destroyer_3_desc: "Более крупный эсминец с более тяжелым вооружением и повышенной живучестью, предназначенный для борьбы с надводными кораблями и подводными лодками противника."
  ship_type_destroyer_4_desc: "Эсминец, оснащенный комплексами управляемых ракет, расширяющий возможности наступления и обороны за пределы традиционной артиллерийской стрельбы."
  ship_type_destroyer_5_desc: "Современный ракетный эсминец, сочетающий в себе усовершенствованный радар, электронику и силовую установку для сбалансированного сопровождения и удара флота."
  ship_type_destroyer_6_desc: "Модульный ракетный эсминец, построенный из адаптируемых компонентов, позволяющих быстро модернизировать вооружение и датчики."
  ship_type_destroyer_7_desc: "Суперракетный эсминец огромных размеров и огневой мощи, способный доминировать в морских сражениях и обеспечивать защиту флота."
  ship_type_destroyer_8_desc: "Беспилотный ракетный эсминец, использующий беспилотные системы для разведки и ударных задач, снижая риск для экипажей."
  ship_type_destroyer_9_desc: "Автономный ракетный эсминец, способный действовать с минимальным экипажем и использующий передовую автоматизацию для обеспечения постоянной боевой эффективности."
  ship_type_destroyer_10_desc: "Вершина эволюции эсминцев, мегаракетный эсминец, сочетающий в себе подавляющую огневую мощь, развитую автоматизацию и непревзойденную выносливость."

  ship_type_submarine_1_desc: "Первая экспериментальная подводная лодка, ограниченная по дальности и выносливости, но способная поражать торговые суда противника."
  ship_type_submarine_2_desc: "Межвоенная подводная лодка повышенной надежности и выносливости, предназначенная для береговой обороны и ограниченной поддержки флота."
  ship_type_submarine_3_desc: "Подводная лодка флота, созданная для дальнего патрулирования и способная действовать вместе с крупными военно-морскими силами за океаном."
  ship_type_submarine_4_desc: "Дизель-электрическая подводная лодка, сочетающая долговечность и доступность, широко применявшаяся в эпоху холодной войны."
  ship_type_submarine_5_desc: "Атомная ударная подводная лодка с практически неограниченной дальностью полета, предназначенная для охоты на корабли и подводные лодки противника."
  ship_type_submarine_6_desc: "Подводная лодка с баллистическими ракетами, несущая ядерное оружие, обеспечивающая стратегическое сдерживание за счет скрытности и живучести."
  ship_type_submarine_7_desc: "Усовершенствованная подводная лодка-невидимка, оснащенная новейшими датчиками и бесшумными двигательными установками, оптимизированная для тайных операций."
  ship_type_submarine_8_desc: "Автономная беспилотная подводная лодка, развертывающая беспилотные системы для разведки и ударных задач, снижающая риск для экипажей."
  ship_type_submarine_9_desc: "Гиперзвуковая ударная подводная лодка, способная запускать сверхбыстрое оружие, меняющая представление о подводной войне с беспрецедентной скоростью."
  ship_type_submarine_10_desc: "Окончательная эволюция конструкции подводных лодок: мега-субмарина, сочетающая в себе огромную огневую мощь, передовую автоматизацию и непревзойденную выносливость."

