  concept_puppet_desc: "[Concept('concept_recognized_power','Признанные державы')] могут превращать более слабые [Concept('concept_country', 'страны')] в свои марионетки. Марионетка — это [Concept('concept_subject', 'субъект')], неспособный начинать собственные [Concept('concept_diplomatic_play','дипломатические игры')], но вынужденный участвовать в [Concept('concept_war','войнах')] [Concept('concept_overlord','сюзерена')] и еженедельно выплачивать ему #v 30%#! доходов своей [Concept('concept_treasury', 'казны')]. [Concept('concept_rank', 'Ранг')] марионетки не может превышать ранг сюзерена, а её сюзерен может начать дипломатическую игру с целью её #b аннексии#!."

