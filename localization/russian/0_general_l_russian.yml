  concept_corruption: "Государственная коррупция"
  concept_corruption_desc: "Под коррупцией понимаются нечестные или мошеннические действия лиц, находящихся на государственной службе, обычно заключающиеся в получении взяток или незаконном присвоении государственных средств в личных целях. Такая деятельность представлена ​​в этом моде, заставляя [concept_government] [Concept('concept_building', '$concept_buildings$')] потреблять $illegal_services$, что приводит к тому, что бюрократия становится более неэффективной и происходит утечка государственных денег в частный сектор."
