  concept_unrecognized_power_desc: "$concept_unrecognized_powers$ это [Concept('concept_country','$concept_country_polities$')] которые не являютеся членам Генеральной Ассамблеи ООН. Это приводит к штарфу к  [concept_prestige] и они могут быть целью более жестких [Concept('concept_diplomatic_play','$concept_diplomatic_plays$')]. Они так же ограничены в максимальном [Concept('concept_rank','$concept_ranks$')] который они могут достичь, не зависимо от того сколько $concept_prestige$ они имеют. [AddLocalizationIf(GetPlayer.IsValid,'concept_unrecognized_power_desc_added')]"
  concept_unrecognized_power_desc_added: "$concept_unrecognized_power$ которая желает избавиться от штрафов должна получить признание от ООН, выполнив решени #y $join_unga_decision$#!."

