  nuclear_de_escalation_treaty_proposal_accepted_desc: "[INITIATOR_COUNTRY.GetName] и [TARGET_COUNTRY.GetName] пообещали деэскалацию своей ядерной политики, согласившись не размещать какое-либо ядерное оружие в граничащих друг с другом странах, сократить их ядерный ударный потенциал на 50% и не развертывать какие-либо системы противоракетной обороны."
