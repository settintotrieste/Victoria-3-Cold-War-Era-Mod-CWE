  law_strong_financial_regulations_desc: "Правительство имеет строгое финансовое законодательство и нормативные акты"

  #Foreign Policy 
  law_nationalist_fp_desc: "Внешняя политика, которая сосредоточена исключительно на внутренних усилиях страны"
  law_regionalist_fp_desc: "Внешняя политика, направленная на построение отношений с соседями страны по региону."
  law_globalist_fp_desc: "Внешняя политика, направленная на построение отношений с большим взаимосвязанным миром."

  #Industry Regulation 
  law_pro_consumer_regulations_desc: "Правительство устанавливает правила, благоприятствующие потребителю, а не промышленности"
  law_balanced_regulations_desc: "Правительство приняло постановления, направленные на обеспечение баланса между правами потребителей и промышленности."
  law_pro_industry_regulations_desc: "Правительство ввело правила, которые благоприятствуют промышленному сектору, а не потребителю."

  #Monetary Policy 
  law_deflationary_monetary_policy_desc: "Правительство стремится сбалансировать национальный бюджет."

