  law_social_hierarchy_4_not_enforced_desc: "$law_social_hierarchy_not_enforced_desc$"
  law_social_hierarchy_4_affirmative_action_desc: "$law_affirmative_action_desc$"
  law_social_hierarchy_5_enforced_desc: "$law_social_hierarchy_enforced_desc$"
  law_social_hierarchy_5_codified_desc: "$law_social_hierarchy_codified_desc$"
  law_social_hierarchy_5_not_enforced_desc: "$law_social_hierarchy_not_enforced_desc$"
  law_social_hierarchy_5_affirmative_action_desc: "$law_affirmative_action_desc$"
  law_social_hierarchy_0_affirmative_action_desc: "$law_affirmative_action_desc$"
  law_no_foreign_investment_policy_desc: "В этой стране запрещены любые формы иностранных инвестиций. \n\nПримечание: Запрет данного закона не влияет на существеющие $foreign_investment_rights$ [concept_treaty] [Concept('concept_article','$concept_articles$')]."
  law_nationalist_foreign_investment_policy_desc: "Разрешены только входящие иностранные инвестиции (т.е. данная страна может только принимать иностранные инвестиции, но не предоставлять их). \n\nПримечание: Запрет данного закона не влияет на существеющие $foreign_investment_rights$ [concept_treaty] [Concept('concept_article','$concept_articles$')]."
  law_no_voting_additional_effects: "@information! Любые [Concept('concept_election','$concept_elections$')] будут не конкруентными и [concept_government] может приостановить проведение [Concept('concept_election','$concept_elections$')] на любой промежуток времени."
  law_dominant_party_state_additional_effects: "$can_ban_parties.tt$"
  law_parties_allowed_additional_effects: "$cannot_ban_parties.tt$"
  law_no_politicised_armed_forces_additional_effects: "@warning! [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetNameWithCountryVariant] не могут присоедениться к [Concept('concept_party', '$concept_parties$')] при данном [concept_law]."
  amendment_corporate_state: "$law_corporate_state$"
