  amendment_symbolic_monarchy: "Символическая Монархия"
  amendment_symbolic_monarchy_desc: "Согласно Конституции, правовой статус монарха — \"символ государства и единства народа\", не обладающий никакими полномочиями, связанными с управлением государством. Эта должность носит исключительно церемониальный характер и получает свою легитимность от воли народа, в руках которого находится суверенитет."

  amendment_rotating_presidency: "Коллегиальное управление"
  amendment_rotating_presidency_desc: "Коллегиальное управление - это система правления, при которой церемониальные и исполнительные обязанности главы государства разделяются группой людей, а не возложены на одного человека."
