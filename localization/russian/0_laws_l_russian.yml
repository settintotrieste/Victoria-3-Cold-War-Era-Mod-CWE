  amendment_symbolic_monarchy: "Символическая Монархия"
  amendment_symbolic_monarchy_desc: "Согласно Конституции, правовой статус монарха — \"символ государства и единства народа\", не обладающий никакими полномочиями, связанными с управлением государством. Эта должность носит исключительно церемониальный характер и получает свою легитимность от воли народа, в руках которого находится суверенитет."

  amendment_rotating_presidency: "Коллегиальное управление"
  amendment_rotating_presidency_desc: "Коллегиальное управление - это система правления, при которой церемониальные и исполнительные обязанности главы государства разделяются группой людей, а не возложены на одного человека."

  lawgroup_gender_issues: "Права ЛГБТ"
  law_no_gender_issues: "ЛГБТ вне закона"
  law_some_gender_issues: "ЛГБТ толерантно"
  law_full_gender_issues: "Защита прав ЛГБТ"

  law_no_workers_rights: "Слабое трудовое законодательство"
  law_regulatory_bodies: "Умеренное трудовое законодательство"
  law_worker_protections: "Строгое трудовое законодательство"

  law_first_past_the_post: "Система относительного большинства с одним победителем"
  concept_political_faction: "Политическая фракция"
  concept_political_factions: "Политические фракции"
  law_single_party_state: "Однопартийное государство"

  lawgroup_company_regulations: "Регулирование компаний"
  law_weak_company_regulations: "Слабые правила регулирования"
  law_moderate_company_regulations: "Сбалансированное регулирование"
  law_strong_company_regulations: "Строгие правила регулирования"

  law_mass_conscription: "Призывная армия"

  lawgroup_minimum_wage: "Минимальная заработная плата"
  law_no_minimum_wage: "Нет минимальной заработной платы"
  law_no_minimum_wage_desc: "Рабочие получают заработную плату, полностью определяемую работодателями, без установленного законом минимума или правовой защиты."
  law_low_minimum_wage: "Низкая минимальная заработная плата"
  law_low_minimum_wage_desc: "Установлена ​​базовая минимальная заработная плата, обеспечивающая ограниченную защиту, но зачастую недостаточная для покрытия расходов на жизнь."
  law_medium_minimum_wage: "Умеренная минимальная заработная плата"
  law_medium_minimum_wage_desc: "Умеренная минимальная заработная плата обеспечивает более справедливую компенсацию, сочетая защиту работников с гибкостью бизнеса."
  law_high_minimum_wage: "Высокая минимальная заработная плата"
  law_high_minimum_wage_desc: "Высокая минимальная заработная плата обеспечивает надежную защиту работников и гарантирует уровень жизни, хотя и накладывает значительные ограничения на работодателей."

  amendment_no_nobility: "Некоролевская аристократия запрещена"
  amendment_no_nobility_desc: "По Конституции отменяются наследственные аристократические привилегии. Ни один класс дворянства не имеет юридического статуса или власти, и все граждане равны перед законом."

  law_social_capitalism_desc: "Социальный капитализм — это социально-экономическая модель, сочетающая капиталистическую экономическую систему свободного рынка с социальной политикой и достаточным регулированием для установления честной конкуренции на рынке."
  law_unitary_state_desc: "Централизованное унитарное государство — это суверенное государство, управляемое как единое целое, в котором центральное правительство является высшей властью."
  law_devolved_state_desc: "Децентрализованное унитарное государство — это страна, в которой центральное правительство обладает высшей властью, но делегировало некоторые полномочия более низким уровням власти, таким как провинции или муниципалитеты. Это отличается от централизованного унитарного государства, где центральное правительство сохраняет за собой всю значительную власть."
  law_federal_state_desc: "Федеративное государство — это образование, характеризующееся союзом частично самоуправляющихся провинций, штатов или других регионов, находящихся под управлением федерального правительства."
  law_politicised_judiciary_desc: "Судьи назначаются непосредственно исполнительной властью."
  law_partially_politicised_judiciary_desc: "Судьи назначаются совместно исполнительной и законодательной ветвями власти."
  law_independent_judiciary_desc: "Назначения судей свободны от какого-либо вмешательства со стороны исполнительной и законодательной ветвей власти."
  law_rigged_voting_desc: "Результаты выборов управляются таким образом, чтобы обеспечить последовательную поддержку правительства."
  law_gerrymandered_voting_desc: "Избирательные округа сформированы таким образом, что структурно выгодны правящей партии."
  law_harassment_voting_desc: "Правила и практика предвыборной кампании ставят кандидатов от оппозиции в невыгодное положение."
  law_fair_voting_desc: "Голосование и агитация проводятся по прозрачным и справедливым правилам."
  law_propotional_representation_desc: "Пропорциональное представительство относится к любому типу избирательной системы, при которой подгруппы избирателей пропорционально отражаются в избираемом органе."
  law_parties_allowed_desc: "Любая политическая партия может быть зарегистрирована в избирательной комиссии и баллотироваться на выборах."
  law_appointed_legislature_desc: "Законодательная власть функционирует преимущественно как консультативный орган с ограниченной независимостью от исполнительной власти."
  law_technocratic_legislature_desc: "Законодательная власть выполняет ограниченную роль, балансируя надзор с уважением к исполнительной власти."
  law_democratic_legislature_desc: "Законодательный орган обладает значительными полномочиями, выступая в качестве центрального института управления и подотчетности перед обществом."
  law_politicised_bureaucrats_desc: "Все государственные служащие отбираются правительством за их лояльность."
  law_elitist_bureaucrats_desc: "Все государственные служащие отбираются элитой государственной службы."
  law_professional_bureaucrats_desc: "Все государственные служащие отбираются в рамках свободного и справедливого процесса найма, учитывающего заслуги человека."
  law_weak_company_regulations_desc: "Слабая система с минимальным контролем, предоставляющая компаниям широкую свободу, но предлагающая ограниченную защиту работникам и потребителям."
  law_moderate_company_regulations_desc: "Сбалансированная структура с разумным контролем, обеспечивающая добросовестную практику при сохранении гибкости для деловых операций."
  law_strong_company_regulations_desc: "Строгая система с обширным надзором, приоритетом которой являются права работников и защита потребителей, но налагающая значительные ограничения на компании."
  law_nepotistic_cabinet_desc: "Кабинет состоит только из друзей и семьи правителя."
  law_semi_nepotistic_cabinet_desc: "Кабинет частично заполнен друзьями и родственниками правителя."
  law_meritocratic_cabinet_desc: "Члены кабинета отбираются на основе их навыков, а не связей с правителем."
  law_executive_supremacy_desc: "Законодательная и судебная власть не могут отменять решение исполнительной власти."
  law_legislative_supremacy_desc: "Исполнительная и судебная власть не могут отменять решение законодательной власти."
  law_constitutional_supremacy_desc: "Конституция является высшим законом страны и не может быть нарушена, кроме как путем внесения поправки в конституцию законодательным органом."
  law_kangaroo_law_desc: "Судебная власть не имеет права подавлять исполнительную или законодательную власть."
  law_peasant_levies_desc: "Государству не разрешено иметь постоянную армию."
  law_mass_conscription_desc: "В состав вооруженных сил входят как профессиональные, так и призывники."
  law_no_womens_rights_desc: "Женщинам отказывают во всех законных правах, они лишены права собственности, трудоустройства и участия в политической жизни."
  law_women_own_property_desc: "Женщины могут владеть собственностью и пользоваться основными законными правами, но остаются исключенными из большей части занятости и участия в политической жизни."
  law_women_in_the_workplace: "Равные права женщин"
  law_women_in_the_workplace_desc: "Женщины пользуются равными правами в владении собственностью, трудоустройстве и правовом статусе, хотя участие в политической жизни все еще может быть ограничено практическими реалиями."
  law_womens_suffrage_desc: "Политика активно поощряет участие женщин в политике, занятости и образовании. Такие меры, как квоты и целевые программы, обеспечивают представительство и равные возможности помимо формального юридического равенства."
  law_no_secret_police_desc: "В стране нет тайной полиции."
  law_no_espionage_desc: "В государстве нет никаких иностранных разведывательных служб."
  law_defensive_espionage_desc: "В государстве есть служба внешней разведки, которая уполномочена противодействовать иностранному влиянию и деятельности в стране."
  law_offensive_espionage_desc: "В государстве есть служба внешней разведки, которая уполномочена противодействовать иностранному влиянию и деятельности в стране, а также вести враждебный шпионаж против других стран."
  law_lenient_policing_desc: "Правоохранительные и следственные полномочия полиции сильно перекошены в пользу обвиняемых."
  law_balanced_policing_desc: "Правоохранительные и следственные полномочия полиции сбалансированы с интересами обвиняемых."
  law_strict_policing_desc: "Правоохранительные и следственные полномочия полиции перекошены в пользу полиции."
  law_draconian_policing_desc: "Заключенные и обвиняемые находятся в полной зависимости от полиции."
  law_trade_unions_banned_desc: "В стране запрещены профсоюзы."
  law_state_trade_unions_desc: "В стране разрешены только профсоюзы, контролируемые государством."
  law_restricted_trade_unions_desc: "Независимые профсоюзы разрешены, но их полномочия ограничены."
  law_full_trade_unions_desc: "Независимые профсоюзы разрешены, и их полномочия по проведению забастовок не ограничены."
  law_no_war_desc: "Нам не разрешено объявлять войну или присоединяться к какому-либо международному военному или политическому альянсу."
  law_defensive_war_desc: "Нам разрешено объявлять только определенные виды войн."
  law_offensive_war_desc: "Нет никаких ограничений на типы войн, которые мы можем начинать."
  law_wmd_banned_desc: "Нам не разрешено разрабатывать или владеть каким-либо оружием массового поражения."
  law_wmd_allowed_desc: "Нам разрешено разрабатывать или владеть любым оружием массового поражения."
  law_very_low_anti_corruption_desc: "Коррупция практически легализована."
  law_low_anti_corruption_desc: "Запрещены только худшие формы коррупции."
  law_medium_anti_corruption_desc: "Коррупция в некоторой степени запрещена."
  law_high_anti_corruption_desc: "Большинство видов коррупции запрещены законом."
  law_very_high_anti_corruption_desc: "Коррупция любого рода запрещена законом."
  law_gold_standard_desc: "Золотой стандарт — это денежная система, в которой стандартная экономическая расчетная единица основана на фиксированном количестве золота."
  law_semi_gold_standard_desc: "Полузолотой стандарт — это денежная система, в которой стандартная экономическая единица расчета основана на фиксированном количестве золота и фиксированном количестве иностранной валюты."
  law_fiat_standard_desc: "Фиатные деньги — это тип валюты, которая не обеспечена драгоценными металлами, такими как золото или серебро, или какими-либо другими материальными активами или товарами."
  law_taxation_1_desc: "Налоговое законодательство в значительной степени благоприятствует богатым."
  law_taxation_2_desc: "Налоговое законодательство благоприятствует богатым."
  law_taxation_3_desc: "Налоговые законы не благоприятствуют ни богатым, ни бедным."
  law_taxation_4_desc: "Налоговые законы благоприятствуют бедным за счет богатых."
  law_taxation_5_desc: "Налоговые законы в значительной степени благоприятствуют бедным за счет богатых."
  law_very_deflationary_monetary_policy_desc: "Очень дефляционная монетарная политика направлена ​​на сокращение денежной массы и повышение процентных ставок для борьбы с инфляцией путем ограничения совокупного спроса и охлаждения экономики."
  law_neutral_monetary_policy_desc: "Нейтральная монетарная политика – это процентная ставка, которая не стимулирует и не сдерживает экономический рост, стремясь к сбалансированному подходу к инфляции и экономическому росту."
  law_expansionary_monetary_policy_desc: "Экспансионистская монетарная политика, проводимая центральными банками, направлена ​​на стимулирование экономического роста за счет увеличения денежной массы и снижения процентных ставок, стимулирования заимствований и расходов."
  law_very_expansionary_monetary_policy_desc: "Очень экспансионистская монетарная политика, проводимая центральными банками, направлена ​​на стимулирование экономического роста за счет увеличения денежной массы и снижения процентных ставок, поощрения заимствований и расходов."
  law_charitable_health_system_desc: "Медицинская помощь оказывается через благотворительные и некоммерческие организации. Доступ зависит от пожертвований и поддержки сообщества, в результате чего охват становится неравномерным и зачастую ограниченным."
  law_private_health_insurance_desc: "Медицинская помощь финансируется за счет схем частного страхования. Граждане должны платить страховые взносы, а доступ отражает богатство и занятость, усиливая социальные различия."
  law_public_health_insurance_desc: "Государство гарантирует здравоохранение для всех. Эта система, финансируемая за счет государственных ресурсов, обеспечивает всеобщий доступ, меняя общество вокруг коллективного благосостояния и безопасности."
  law_religious_schools_desc: "Образование поручается частным учреждениям, часто руководствующимся религиозными или общинными традициями. Доступ ограничен, а учебные программы отражают ценности тех, кто их финансирует."
  law_private_schools_desc: "Школы получают частичную государственную поддержку, сохраняя при этом частное управление. Этот баланс расширяет доступ, но сохраняет влияние элиты на образование."
  law_public_schools_desc: "Государство гарантирует бесплатное школьное образование для всех детей. Всеобщий доступ меняет общество, способствуя повышению грамотности, гражданской идентичности и социальной мобильности."
  law_pro_pop_growth_policy_desc: "Правительство поощряет семьи заводить детей."
  law_no_pop_growth_policy_desc: "Правительство не вмешивается в выбор человека иметь детей."
  law_anti_pop_growth_policy_desc: "Правительство наказывает семьи, у которых слишком много детей."
  lawgroup_distribution_of_power_desc: "Право голоса определяет, сколько голосов имеет каждый человек в стране."
  lawgroup_voting_method_desc: "Избирательная система – это набор правил, определяющих порядок проведения выборов и референдумов и определение их результатов."
  law_social_hierarchy_enforced_desc: "Родственникам или друзьям предоставляются преимущества, такие как работа или должности, перед более квалифицированными кандидатами."
  law_social_hierarchy_codified_desc: "Членам партии предоставляются преимущества, такие как рабочие места или должности, перед более квалифицированными кандидатами."
  law_social_hierarchy_not_enforced_desc: "У каждого есть справедливая возможность получить работу или должность."
  law_social_hierarchy_0_enforced_desc: "Программ, помогающих маргинализированным группам подняться по социальной лестнице, практически нет."
  law_social_hierarchy_0_codified_desc: "Существуют программы, помогающие маргинализированным группам подняться по социальной лестнице."
  law_social_hierarchy_0_not_enforced_desc: "Существует множество программ, помогающих маргинализированным группам подняться по социальной лестнице, и законом закреплено, что классовая дискриминация запрещена."
  law_full_foreign_investment_policy_desc: "Законодательство разрешает все формы иностранных инвестиций."
  law_no_secession_rights_desc: "Ни одному составному государству не разрешается получить большую автономию или выйти из состава этой страны."
  law_limited_secession_rights_desc: "Входящим в состав государствам может быть предоставлена ​​большая автономия, но они не могут выйти из этой страны."
  law_full_secession_rights_desc: "Входящим в состав государствам может быть предоставлена ​​большая автономия и они могут выйти из состава этой страны."
  law_politicised_armed_forces_desc: "Военные проявляют полную лояльность к одной политической партии и последовательно отстаивают и защищают партийные политические позиции и судьбу."
  law_semi_politicised_armed_forces_desc: "Военные проявляют определенную лояльность к одной политической партии и последовательно отстаивают и защищают партийные политические позиции и судьбу."
  law_no_politicised_armed_forces_desc: "Военные полностью остаются вне политики."
  lawgroup_political_parties_desc: "Разрешены ли политические партии и как они действуют."
  lawgroup_judiciary_desc: "Состав и независимость судебной власти."
  lawgroup_cabinet_composition_desc: "Как выбирается и организуется исполнительный кабинет."
  lawgroup_secession_rights_desc: "Имеют ли составляющие государства или регионы право на отделение."
  lawgroup_armed_forces_politicisation_desc: "Степень участия военных в политике."
  lawgroup_constitutional_system_desc: "Общая конституционная основа государства."
  lawgroup_legal_system_desc: "Структура и принципы правовой системы."
  lawgroup_head_of_government_desc: "Определяет роль и полномочия главы правительства."
  lawgroup_legislature_desc: "Организация и полномочия законодательной власти."
  lawgroup_legislative_chambers_desc: "Является ли законодательный орган однопалатным или двухпалатным."
  lawgroup_centralisation_desc: "Баланс между центральной и региональной властью."
  lawgroup_war_policy_desc: "Позиция страны в отношении войны и военного участия."
  lawgroup_corruption_policy_desc: "Политика борьбы с коррупцией и подотчетность."
  lawgroup_minority_issues_desc: "Политика, направленная на обеспечение прав и защиты групп меньшинств."
  lawgroup_wmd_policy_desc: "Положение об оружии массового поражения."
  lawgroup_espionage_policy_desc: "Правила, регулирующие шпионскую и разведывательную деятельность."
  lawgroup_monetary_policy_desc: "Политика, регулирующая предложение валюты и процентные ставки."
  lawgroup_industry_regulations_desc: "Правила, регулирующие производственную деятельность."
  lawgroup_financial_regulations_desc: "Положения, регулирующие финансовые учреждения и рынки."
  lawgroup_company_regulations_desc: "Правила, регулирующие компании и их способность влиять на рынок."
  lawgroup_land_ownership_desc: "Правила, определяющие собственность на землю и права собственности."
  lawgroup_environmental_policy_desc: "Политика, направленная на защиту окружающей среды и контроль загрязнения."
  lawgroup_foreign_policy_desc: "Подход страны к международным отношениям и дипломатии."
  lawgroup_foreign_investment_policy_desc: "Правила, регулирующие иностранные инвестиции и внешний капитал."
  lawgroup_pop_growth_policy_desc: "Политика регулирования роста населения и планирования семьи."
  lawgroup_economic_specialisation_desc: "Экономическая направленность и специализация нации."
  lawgroup_monetary_system_desc: "Структура и правила денежной системы."  
  law_no_gender_issues_desc: "Однополые отношения и гендерное разнообразие криминализированы, строго соблюдаются и не имеют правовой защиты."
  law_some_gender_issues_desc: "Однополые отношения и гендерное разнообразие разрешены законом, но сталкиваются с социальной стигмой и ограниченным признанием."
  law_full_gender_issues_desc: "Однополые отношения и гендерное разнообразие полностью признаны, им предоставляется всесторонняя правовая защита и общественное признание."

  law_no_term_limit_desc: "[concept_ruler] может оставаться в должности неограниченное количество сроков."
  law_yes_term_limit_desc: "[concept_ruler] не может оставаться в должности по прошествии определенного количества лет."
  law_no_voting_desc: "В стране нет [Concept('concept_election','$concept_elections$')], лидер определяется другими способами."
  law_first_past_the_post_desc: "Система голосования по принципу относительного большинства — это система голосования, при которой избиратели голосуют за одного кандидата, и кандидат, набравший наибольшее количество голосов, побеждает на выборах. \n\n@information! Этот [concept_law] поощряет более слабые [Concept('concept_interest_group', '$concept_interest_groups$')] вступать в более сильные [Concept('concept_party', '$concept_parties$')] не смотря на идеологические различия."
  law_jefferson_system_desc: "Метод Джефферсона — это метод распределения мест в парламенте. После подсчета всех голосов для каждой партии вычисляются последовательные частные. Партия с наибольшим частным получает одно место, и ее частное пересчитывается. Это повторяется до тех пор, пока не будет заполнено необходимое количество мест. \n\n@information! Этот [concept_law] поощряет более слабые [Concept('concept_interest_group', '$concept_interest_groups$')] вступать в более сильные [Concept('concept_party', '$concept_parties$')] не смотря на идеологические различия."
  law_first_past_the_post_additional_effects: "@information! Это приведет к смене состава #y Парламента#!."
  law_jefferson_system_additional_effects: "@information! Это приведет к смене состава #y Парламента#!."
  law_propotional_representation_additional_effects: "@information! Это приведет к смене состава #y Парламента#!."
  law_parties_not_allowed_desc: "В стране запрещено регистрировать политические партии. \n\n@information! Если в [concept_country] есть [Concept('concept_party', '$concept_parties$')], они будут преобразованы в [Concept('concept_political_faction', '$concept_political_factions$')]."
  law_single_party_state_desc: "Государством управляет одна политическая партия, обладающая монополией на всю политическую деятельность в стране. \n\n@information! Если в [concept_country] есть [Concept('concept_election','$concept_elections$')], они будут организованы как [Concept('concept_non_competitive_election','$concept_non_competitive_elections$')]. Такие выборы реализованы через специальную запись в [concept_journal_entry]."
  law_dominant_party_state_desc: "Хотя в стране может существовать множество политических партий, правящая партия оказывает огромное влияние на всю политическую деятельность внутри страны. \n\n@information! При данном [concept_law], только [Concept('concept_interest_group', '$concept_interest_groups$')] в [concept_government] или имеющие от #y 10%#! [concept_clout] могут вступить в [Concept('concept_party', '$concept_parties$')]."
  concept_political_faction_desc: "Неформальные политические союзы и фракции заменяют [Concept('concept_party', '$concept_parties$')] в [concept_country] где [Concept('concept_party', '$concept_parties$')] запрещены. \n\nВ связи с тем что игровая механика [Concept('concept_election','$concept_elections$')] требует чтобы [concept_interest_group] находилась в парти для подсчета [concept_votes], политические фракции представлены присодинением [Concept('concept_interest_group', '$concept_interest_groups$')] к #y \"Политической фракции\"#! [Concept('concept_party', '$concept_parties$')]. \n\nЭти #y \"Политические фракции\"#! [Concept('concept_party', '$concept_parties$')] не получают влияния от некоторых механик, имитирующих партии, таких как возможность запрещать партии."
  law_appointed_legislature_additional_effects: "@information! Этот [concept_law] может изменить [concept_government_type] в [concept_country]."
  law_technocratic_legislature_additional_effects: "@information! Этот [concept_law] может изменить [concept_government_type] в [concept_country]."
  law_democratic_legislature_additional_effects: "@information! Этот [concept_law] может изменить [concept_government_type] в [concept_country]."
  law_professional_bureaucrats_additional_effects: "@warning! [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetNameWithCountryVariant] не могут вступить ни в какую [Concept('concept_party', '$concept_parties$')] при данном [concept_law]."
  law_civil_law_desc: "Судебная власть имеет право отменять некоторые виды исполнительных решений и не соответствующий конституции [Concept('concept_law','$concept_laws$')]."
  law_common_law_desc: "Судебная власть обладает полной властью отменять решения и [Concept('concept_law','$concept_laws$')] исполнительной власти."
  law_limited_free_speech_desc: "$law_right_of_assembly_desc$"
  law_full_free_speech_desc: "$law_protected_speech_desc$"
  law_low_social_security_desc: "$law_poor_laws_desc$"
  law_medium_social_security_desc: "$law_wage_subsidies_desc$"
  law_high_social_security_desc: "$law_old_age_pension_desc$"
  lawgroup_term_limits_desc: "Определяет, как долго конкретный человек может быть [concept_ruler] страны."
  law_social_hierarchy_1_enforced_desc: "$law_social_hierarchy_enforced_desc$"
  law_social_hierarchy_1_codified_desc: "$law_social_hierarchy_codified_desc$"
  law_social_hierarchy_1_not_enforced_desc: "$law_social_hierarchy_not_enforced_desc$"
  law_social_hierarchy_1_affirmative_action_desc: "$law_affirmative_action_desc$"
  law_social_hierarchy_2_enforced_desc: "$law_social_hierarchy_enforced_desc$"
