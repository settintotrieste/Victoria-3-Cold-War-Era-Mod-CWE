  seikan_tunnel_decision: "Построить туннель Сейкан"
  seikan_tunnel_decision_desc: "Туннель Сейкан — это железнодорожный туннель с двойной колеей длиной 53,85 км (33,46 миль) в Японии, с участком длиной 23,3 км (14,5 миль) под морским дном пролива Цугару, который отделяет префектуру Аомори на главном японском острове Хонсю от северного острова Хоккайдо."
  channel_tunnel_decision: "Построить туннель под Ла-Маншем"
  channel_tunnel_decision_desc: "Туннель под Ла-Маншем — подводный железнодорожный туннель длиной 50,46 км (31,35 мили), открытый в 1994 году, который соединяет Фолкстон (Кент, Англия) с Кокелем (Па-де-Кале, Франция) под Ла-Маншем в Дуврском проливе. Это единственное постоянное сообщение между островом Великобритания и материковой Европой."
  zhuhai_bridge_decision: "Построить мост Гонконг – Чжухай – Макао."
  zhuhai_bridge_decision_desc: "Мост Гонконг-Чжухай-Макао (HZMB) представляет собой систему мостов и туннелей длиной 55 километров (34 миль), состоящую из серии из трех вантовых мостов, подводного туннеля и четырех искусственных островов. Это одновременно и самый длинный морской переход, и самая длинная фиксированная линия в открытом море в мире. HZMB охватывает каналы Линдин и Цзючжоу, соединяя Гонконг и Макао с Чжухай — крупным городом в дельте Жемчужной реки в Китае."
  palm_islands_decision: "Постройте Пальмовые острова"
  palm_islands_decision_desc: "Пальмовые острова состоят из трех искусственных архипелагов: Пальма Джумейра, острова Дейра и Пальма Джебель Али, расположенные на побережье Дубая, Объединенные Арабские Эмираты."

