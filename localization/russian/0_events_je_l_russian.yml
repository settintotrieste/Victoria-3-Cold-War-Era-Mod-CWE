  palace_coup.t: "Дворцовый переворот в [ROOT.GetCountry.GetNameNoFlag]?"
  palace_coup.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('paramilitary_group_custom_title')] начал дворцовый переворот против [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [SCOPE.sCharacter('palace_coup_ruler').GetFullName]. Их цель — заменить [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] более радикальным. [ROOT.GetCountry.GetAdjectiveNoFlag] $ig_armed_forces$ готов дать отпор повстанцам и восстановить порядок, хотя это будет стоить столице больших денег. Какие у вас приказы?"
