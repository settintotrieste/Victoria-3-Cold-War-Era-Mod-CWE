  dominion_clean_up_system.1.f: "[SCOPE.sCountry('dominion_to_satellite_country').GetName] был преобразован в $subject_type_satellite$ из $subject_type_dominion$, поскольку только монархии могут иметь $subject_type_dominion$, а [ROOT.GetCountry.GetName] не является монархией."
