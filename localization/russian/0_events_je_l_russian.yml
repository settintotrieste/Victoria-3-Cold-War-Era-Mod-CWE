  form_arab_league_decision: "Сформировать Лигу арабских государств"
  form_arab_league_decision_desc: "Лига арабских государств — региональная организация арабского мира, которая расположена в Северной Африке, Западной Африке, Восточной Африке и Западной Азии. Основная цель Лиги — «сблизить отношения между государствами-членами и координировать сотрудничество между ними, защитить их независимость и суверенитет, а также в общих чертах рассматривать дела и интересы арабских стран»."
