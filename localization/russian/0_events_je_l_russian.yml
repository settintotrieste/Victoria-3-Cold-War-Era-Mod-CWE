  je_non_aligned_movement: "Движение неприсоединения"
  je_non_aligned_movement_reason: "[ROOT.GetCountry.GetName] является членом Движения неприсоединения. \n\nДвижение неприсоединения (ДН) — это форум [GetPlayer.MakeScope.Var('NAM_member_count').GetValue] стран, которые формально не присоединились к какому-либо крупному державному блоку или против него во время холодной войны. \n\nДвижение зародилось после Корейской войны как попытка некоторых стран уравновесить быструю биполяризацию мира во время Холодной войны, когда две крупные державы сформировали блоки и начали проводить политику по привлечению остальных мира на свои орбиты."
