  british_rhodesia_nyasaland.sgc.t: "Федерация Родезии и Ньясаленда?"
  british_rhodesia_nyasaland.sgc.d: "Федерация Родезии и Ньясаленда, также известная как Центральноафриканская федерация (ЦАФ), была колониальной федерацией, состоявшей из трех южноафриканских территорий: самоуправляемой британской колонии Южная Родезия и британских протекторатов Северная Родезия и Ньясаленд"
  british_malaysia.sgc.t: "Образование Малайзии?"
  british_malaysia.sgc.d: "Федерация Малайзии была образована в результате слияния Федерации Малайи, Сингапура, Северного Борнео (Сабах) и Саравака 16 сентября 1963 года"
  british_decolonisation.20.option.1: "Уступить колонии Малайе"
  british_decolonisation.20.option.2: "Колонии останутся британскими!"
  british_west_indies.sgc.t: "Создать Вест-Индскую федерацию?"
  british_west_indies.sgc.d: "Вест-Индская федерация - недолговечный политический союз, существовавший с 3 января 1958 года по 31 мая 1962 года. Различные острова Карибского бассейна, входившие в состав Британской империи, включая Тринидад и Тобаго, Барбадос, Ямайку, а также Подветренные и Наветренные острова, объединились в Федерацию со столицей в Порт-оф-Спейне, Тринидад и Тобаго. Целью создания Федерации было создание политической единицы, которая стала бы независимым от Великобритании единым государством"
  british_singapore.sgc.t: "Самоуправление в Сингапуре?"
  british_singapore.sgc.d: "$generic_self_rule_decolonisation_loc_desc$"
  british_singapore_state.sgc.t: "Больше автономии Сингапуру?"
  british_singapore_state.sgc.d: "В рамках деколонизации и растущего ухода Великобритании из Малайи конституционные переговоры о самоуправлении Сингапура между Британским колониальным управлением в Лондоне и Законодательным собранием Сингапура уже привели к принятию в 1958 году Конституции штата Сингапур, а также полностью избранного и самоуправляющегося государства. Законодательное собрание на 51 место в 1959 году с упразднением должности губернатора."
