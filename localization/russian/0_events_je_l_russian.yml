  je_climate_change_reforestation_start_button: "Начать лесовосстановление"
  je_climate_change_reforestation_start_button_desc: "Лесовосстановление это практика восстановления ранее существовавших лесов и лесных массивов, которые были уничтожены или повреждены. \n\nВнедрение этой политики позволит замедлить темпы изменения климата."
  je_climate_change_reforestation_end_button: "Прекратить лесовосстановление"
  je_climate_change_reforestation_end_button_desc: "Лесовосстановление это практика восстановления ранее существовавших лесов и лесных массивов, которые были уничтожены или повреждены."
  je_climate_change_recycling_start_button: "Начать переработку мусора"
  je_climate_change_recycling_start_button_desc: "Переработка отходов это процесс преобразования отходов в новые материалы и предметы. Эта концепция часто включает в себя извлечение энергии из отходов. Возможность переработки материала зависит от его способности восстанавливать свои первоначальные свойства. \n\nВнедрение этой политики позволит замедлить темпы изменения климата."
  je_climate_change_recycling_end_button: "Прекратить переработку мусора"
  je_climate_change_recycling_end_button_desc: "Переработка отходов — это процесс преобразования отходов в новые материалы и предметы. Эта концепция часто включает в себя извлечение энергии из отходов. Возможность переработки материала зависит от его способности восстанавливать свои первоначальные свойства."
  je_climate_change_carbon_capture_start_button: "Начать улавливать углерод"
  je_climate_change_carbon_capture_start_button_desc: "Улавливание и хранение углерода это процесс, при котором относительно чистый поток углекислого газа из промышленных источников отделяется, обрабатывается и транспортируется в место долговременного хранения. \n\nВнедрение этой политики позволит замедлить темпы изменения климата."
  je_climate_change_carbon_capture_end_button: "Прекратить улавливать углерод"
  je_climate_change_carbon_capture_end_button_desc: "Улавливание и хранение углерода — это процесс, при котором относительно чистый поток углекислого газа из промышленных источников отделяется, обрабатывается и транспортируется в место долговременного хранения."
  
