  paramilitary_group_veto.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('paramilitary_group_custom_title')] Против [SCOPE.sLaw('current_law_scope').GetName]!"
  paramilitary_group_veto.d: "Политически влиятельная партия [SCOPE.GetRootScope.GetCountry.GetCustom('paramilitary_group_custom_title')], стоящая на стороне [SCOPE.gsInterestGroup('paramilitary_group_ig').GetName] [concept_interest_group], резко раскритиковала правительство за попытку принять [SCOPE.sLaw('current_law_scope').GetName]. Они считают, что этот закон не будет отвечать интересам [ROOT.GetCountry.GetName], и поэтому требуют, чтобы законопроект о принятии [SCOPE.sLaw('current_law_scope').GetName] был отменен, иначе они могут предпринять односторонние действия против правительства."
  paramilitary_group_veto.f: "Это событие было вызвано тем, что [SCOPE.gsInterestGroup('paramilitary_group_ig').GetName] либо не одобряет, либо категорически не одобряет [concept_law], принимаемый в данный момент. Он также может сработать, когда принимается закон, отключающий [SCOPE.GetRootScope.GetCountry.GetCustom('paramilitary_group_custom_title')]."

