  je_plot_against_the_dictator_system_2.tt: "[SCOPE.sCharacter('targeted_dictator_scope').GetFullName] из [concept_interest_group] ослаблен"
  je_plot_against_the_dictator_system_3.tt: "В этой стране диктатура или режим"
  je_plot_against_the_dictator_system_4.tt: "Каждый [concept_interest_group] [concept_leader], не являющийся [concept_ruler], будет либо казнён, либо [Concept( 'concept_exile', 'exiled' )]."
  je_plot_against_the_dictator_system_5.tt: "Все [concept_general] и [concept_admiral], не принадлежащие к [SCOPE.gsInterestGroup('rulers_IG_scope').GetName], будут либо казнены, либо [Concept( 'concept_exile', 'exiled' )]."

  je_cultural_suppression_system: "Культурное подавление в [ROOT.GetCountry.GetName]"
  je_cultural_suppression_system_reason: "Правительство [ROOT.GetCountry.GetAdjective] систематически подавляет дискриминируемых лиц в [ROOT.GetCountry.GetName], используя сочетание неэтичных практик.\n\n1% случайной дискриминируемой поп-группы [concept_culture] и/или [concept_religion] будут подвергаться предрассудкам каждый месяц до тех пор, пока все дискриминируемые группы населения не покинут [ROOT.GetCountry.GetName]. или закон $law_slavery_cultural$ отменяется."
  je_cultural_suppression_system.tt: "В стране не осталось дискриминируемых групп населения"

  cultural_suppression_discovered.t: "Культурное подавление в [SCOPE.sCountry('country_committing_cultural_suppression').GetName]"
  cultural_suppression_discovered.d: "Международные наблюдатели обнаружили, что [SCOPE.sCountry('country_committing_cultural_suppression').GetName] проводит программу по уничтожению всего дискриминируемого населения. Это разоблачение шокировало международное сообщество, поскольку видные деятели, такие как Генеральный секретарь ООН, решительно осудили [SCOPE.sCountry('country_committing_cultural_suppression').GetName]. Как должен [ROOT.GetCountry.GetName] реагировать на это преступление против человечества?"
  cultural_suppression_discovered.f: "Сила международного осуждения [SCOPE.sCountry('country_committing_cultural_suppression').GetName] будет зависеть от количества стран, решивших осудить культурное подавление."
  cultural_suppression_system_option.1: "Осудите [SCOPE.sCountry('country_committing_cultural_suppression').GetName] за их варварство!"
  cultural_suppression_system_option.2: "Не сказать ничего."

  cultural_suppression_discovered_notice.t: "Программа культурного подавления в [ROOT.GetCountry.GetName] разоблачена"
  cultural_suppression_discovered_notice.d: "Международные наблюдатели обнаружили, что [ROOT.GetCountry.GetName] проводит программу по уничтожению всего дискриминируемого населения. Это разоблачение шокировало международное сообщество, поскольку видные деятели, такие как Генеральный секретарь ООН, решительно осудили [SCOPE.sCountry('country_committing_cultural_suppression').GetName]."
  cultural_suppression_discovered_notice.f: "[ROOT.GetCountry.GetName] получит 1 балл позора от каждой страны, осудившей его за совершение культурного_подавления, а также может быть подвергнут санкциям ООН за совершение такого преступления против человечества."
  cultural_suppression_system_notice_option: "Ну что ж..."

  je_espionage_system: "Ведение враждебного шпионажа"
  je_espionage_system_reason: "[ROOT.GetCountry.GetAdjective] Разведывательные службы разместили агентов за границей для ведения тайной враждебной деятельности против наших иностранных врагов.\n\n[ROOT.GetCountry.GetName] будет предоставлена ​​возможность атаковать 1 случайную любую подходящую страну, как только индикатор выполнения заполнится.\n\nИндикатор прогресса заполнится потребуется больше времени, чтобы заполнить больше стран [ROOT.GetCountry.GetName], в которых ведется враждебный шпионаж."
  je_espionage_system_1_tt: "Эта страна больше не ведет враждебный шпионаж против какой-либо страны."
  je_espionage_system_2_tt: "Эта страна ведет враждебный шпионаж как минимум против 1 страны."

  je_subverted_civil_service_3.tt: "$ig_intelligentsia$ [concept_interest_group] не имеет того же [concept_ideology], что и самый мощный [concept_interest_group] в [concept_government]."
  je_subverted_civil_service_2.tt: "$ig_intelligentsia$ [concept_interest_group] имеет тот же [concept_ideology], что и самый мощный [concept_interest_group] в [concept_government]."
  je_subverted_civil_service_1.tt: "Гос службы преобразованы, ее лидер будет заменен человеком, с той же идеологией что и [concept_ruler]."
  je_subvert_civil_service: "Чистка в гос. службах"
  je_subvert_civil_service_reason: "Поскольку [ROOT.GetCountry.GetName] имеет [concept_law] $law_politicised_bureaucrats$, [concept_government] может назначить гос служащих, лояльных самой влиятельной [concept_interest_group] в [concept_government]. Это значит, что через достаточно длительное время Гос службы полностью перейдут к идеологии [concept_government]. \n\nКаждый месяц будет случайный шанс, что [concept_ideology] $ig_intelligentsia$ будет изменен, чтобы соответствовать самой мощной [concept_interest_group] в [concept_government]."

  je_evolved_civil_service_3.tt: "$ig_intelligentsia$ [concept_interest_group] не имеет того же [concept_ideology], что и самый могущественный [concept_interest_group] в стране."
  je_evolved_civil_service_2.tt: "$ig_intelligentsia$ [concept_interest_group] имеет тот же [concept_ideology], что и самый могущественный [concept_interest_group] в стране."
  je_evolved_civil_service_1.tt: "Государственная служба меняет свою идеологию, и ее лидер будет заменен на человека, идеологически связанного с лидером самого могущественного [concept_interest_group] в стране."
  je_evolve_civil_service: "Реформирование государственной службы"
  je_evolve_civil_service_reason: "Из-за того, что [ROOT.GetCountry.GetName] имеет $law_elitist_bureaucrats$ [concept_law], процесс выдвижения кандидатов на государственную службу стал элитарным и политизированным. Это означает, что через достаточно длительный период времени государственная служба будет полностью обращена к идеологическим убеждениям самого могущественного [concept_interest_group] в [ROOT.GetCountry.GetName]. \n\nКаждый месяц будет случайный шанс, что [concept_ideology] из $ig_intelligentsia$ будет изменен в соответствии с самым мощным [concept_interest_group] в [ROOT.GetCountry.GetName]."

