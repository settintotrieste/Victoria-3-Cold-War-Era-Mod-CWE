  je_wartime_measures_martial_law_button: "Ввести военное положение"
  je_wartime_measures_martial_law_button_desc: "Военное положение предполагает временную замену гражданской власти военной властью и обычно применяется во время войны, восстания или стихийного бедствия. Когда действует военное положение, военный командующий области или страны имеет неограниченные полномочия принимать законы и обеспечивать их соблюдение."
  je_wartime_measures_martial_law_remove_button: "Отменить военное положение"
  je_wartime_measures_martial_law_remove_button_desc: "[concept_government] может отменить Военное положение в любой момент во время войны."
