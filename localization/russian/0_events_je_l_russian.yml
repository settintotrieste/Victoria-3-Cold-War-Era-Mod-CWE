  controlled_election.t: "[ROOT.GetCountry.GetAdjectiveNoFormatting] парламентские выборы"
  controlled_election.d: "Выборы в #o [SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')]#! Состоялись сегодня. Кандидаты были выдвинуты от правящей партией [ROOT.GetCountry.GetName] и общественных организаций, контролируемых правящей партией. Избиратели могли голосовать против кандидата от правящей партии, но только через избирательные участки, тогда как за партию можно было проголосовать, просто подав пустой бюллетень. \n\nРезультаты: #g [GetPlayer.MakeScope.Var('controlled_elections_vote_result_display').GetValue]%#! одобренные [concept_government]"
  controlled_election.f: "Так как выборы в [ROOT.GetCountry.GetName] проводятся по принципу [Concept('concept_non_competitive_election','$concept_non_competitive_elections$')], [Concept('concept_election','$concept_elections$')] служит источником легитимности [concept_government]. Если число [Concept('concept_radical','$concept_radicals$')] превысит число [Concept('concept_loyalist','$concept_loyalists$')], легитимность [concept_government] будет подрвана. \n\nПримечание: Эффект от [Concept('concept_non_competitive_election','$concept_non_competitive_elections$')] снижается по формуле:  Общее [Concept('concept_radical','$concept_radicals$')] ÷ Общее [Concept('concept_loyalist','$concept_loyalists$')] + (Общее [Concept('concept_radical','$concept_radicals$')] × 100)"
  controlled_elections_system_option.1: "Уважать право голоса."
  controlled_elections_system_option.2: "Манипулировать результатами!"
  controlled_elections_system_option: "Народ высказался!"

  controlled_election_results: "Результат последних контролируемых выборов"

  controlled_election_results_positive: "$controlled_election_results$"
  controlled_election_results_negative: "$controlled_election_results$"

  controlled_election_disabled: "Выборы отсутствуют"

  je_non_competitive_elections: "[ROOT.GetCountry.GetAdjectiveNoFormatting] [Concept('concept_non_competitive_election','$concept_non_competitive_elections$')]"
  je_non_competitive_elections_reason: "Так как [ROOT.GetCountry.GetName] является [GetLawType('law_single_party_state').GetName], [Concept('concept_election','$concept_elections$')] в #y [SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')]#! проводятся по принципу [Concept('concept_non_competitive_election','$concept_non_competitive_elections$')]. \n\nВсе кандидаты должны быть выдвинуты от правящей партии [ROOT.GetCountry.GetName] или подконтрольных общественных организаций. \n\nХотя избирателям разрешено голосовать против кандидата от правящей партии, такие голоса могут быть зарегистрированы только в избирательных участках. В отличие от этого, поддержку правящей партии можно выразить, просто подав пустой бюллетень. \n\n@information! [Concept('concept_non_competitive_election','$concept_non_competitive_elections$')] проводятся каждые #y 5 лет#! и замораживаются во время [concept_war]. \n\n@information! #y $lawgroup_distribution_of_power$#! [Concept('concept_law','$concept_laws$')] могут изменить [concept_votes] в [concept_government]."

