  nuclear_dev_cost: "Стоимость разработки ядерного оружия"

  nuclear_capability: "Государство, обладающее ядерным оружием"
  start_nuclear_weapons_program_decision: "Начать программу ядерного оружия"
  start_nuclear_weapons_program_decision_desc: "Ядерное оружие — это взрывное устройство, разрушительная сила которого возникает в результате ядерных реакций: либо деления (бомба деления), либо комбинации реакций деления и синтеза (термоядерная бомба), приводящих к ядерному взрыву. Мы должны разработать такое оружие, чтобы вселить страх в сердца наших врагов. Заметим, что программа создания ядерного оружия прекратится, если мы станем недостаточно независимым субъектом или примем законы, запрещающие нам владеть оружием массового уничтожения."
  nuclear_program_started: "Программа ядерного оружия"

  gained_nuclear_capability.t: "Получена возможность нанесения ядерного удара"
  gained_nuclear_capability.d: "[SCOPE.sCountry('nuclear_country').GetName] благодаря своим неустанным усилиям приобрела ядерное оружие и средства доставки этого оружия своим врагам. Это означает, что теперь он может нанести удар по враждебным странам, находящимся с ним в состоянии войны, с помощью ядерного оружия."
  gained_nuclear_capability.f: "Внимание, ядерный потенциал будет потерян, если [SCOPE.sCountry('nuclear_country').GetName] имеет $building_nuclear_weapons_silo$ [concept_building], с дефицитом товаров, или принят $law_wmd_banned$ [concept_law], либо стал чьим то субъектом."
  gained_nuclear_capability.option: "Мир содрогнется от нашей мощи!"

  lost_nuclear_capability.t: "Утрата возможности нанесения ядерного удара"
  lost_nuclear_capability.d: "[SCOPE.sCountry('nuclear_country').GetName] утратила способность наносить ядерные удары по своим врагам."
  lost_nuclear_capability.f: "Это событие произошло потому, что [SCOPE.sCountry('nuclear_country').GetName] либо больше не имеет здания $building_nuclear_weapons_silo$ [concept_building], либо принял закон $law_wmd_banned$ [concept_law], либо стал чьим то субъектом."
  lost_nuclear_capability.option: "Трагедия!"

  nuclear_attack.t: "[SCOPE.sCountry('nuclear_country').GetName] Поражение ядерным оружием"
  nuclear_attack.d: "Мы получили сообщения о том, что противник нанес ядерный удар по нескольким нашим городам и поселкам. Инфраструктура пострадавших районов была уничтожена, и большая ее часть теперь опасно облучена. Хотя большинству правительственных чиновников в пострадавших районах удалось найти убежище в убежищах от радиоактивных осадков, большое количество граждан не смогли найти убежище и, таким образом, погибли либо в результате первоначального взрыва, либо в результате токсичных осадков. Мы можем только надеяться, что мир будет найден до того, как [SCOPE.sCountry('nuclear_country').GetName] будет полностью уничтожен."
  nuclear_attack.f: "Регионы штатов, пораженные ядерным оружием, будут иметь очень разрушительные модификаторы, которые будут лишь медленно разрушаться в ближайшие десятилетия."
  nuclear_attack.option: "Минута молчания для тех, кто не выжил."

  chemical_dev_cost: "Стоимость разработки химического оружия"

  chemical_capability: "Государство, обладающее химическим оружием"
  start_chemical_weapons_program_decision: "Начать программу создания химического оружия"
  start_chemical_weapons_program_decision_desc: "Химическое оружие - это химическое вещество, используемое для умышленного причинения смерти или вреда благодаря своим токсичным свойствам. Боеприпасы, устройства и другое оборудование, специально разработанные для использования токсичных химических веществ в качестве оружия, также подпадают под определение химического оружия."
  chemical_program_started: "Программа по химическому оружию"

  gained_chemical_capability.t: "Получен химический ударный потенциал"
  gained_chemical_capability.d: "[SCOPE.sCountry('chemical_country').GetName], благодаря своим неустанным усилиям, приобрела химическое оружие и средства доставки этого оружия своим врагам. Это означает, что теперь она может задействовать химическое оружие [concept_mobilization_option]."
  gained_chemical_capability.f: "Обратите внимание, что химический потенциал будет потерян, если [SCOPE.sCountry('chemical_country').GetName] либо больше не имеет $building_industrial_chemicals_factory$ [concept_building], не испытывающего дефицита товаров, либо прошел $law_wmd_banned$ [concept_law], либо становится субъектом, не обладающим достаточной автономией."
  gained_chemical_capability.option: "Отлично!"

  lost_chemical_capability.t: "Утрачена способность наносить химические удары"
  lost_chemical_capability.d: "[SCOPE.sCountry('chemical_country').GetName] потеряла способность наносить химические удары по своим врагам."
  lost_chemical_capability.f: "Это событие произошло потому, что [SCOPE.sCountry('chemical_country').GetName] либо больше не имеет $building_industrial_chemicals_factory$ [concept_building], либо прошел $law_wmd_banned$ [concept_law], либо перестал быть самостоятельным субъектом."
  lost_chemical_capability.option: "Трагедия!"

  biological_dev_cost: "Стоимость разработки Биологического оружия"
    
  biological_capability: "Государство, обладающее биологическим оружием"
  start_biological_weapons_program_decision: "Начать программу разработки Биологического оружия"
  start_biological_weapons_program_decision_desc: "Биологическая война — это использование биологических токсинов или инфекционных агентов, таких как бактерии, вирусы, насекомые и грибы, с целью убийства, причинения вреда или выведения из строя людей, животных или растений в качестве акта войны. Биологическое оружие — это живые организмы или размножающиеся сущности."
  biological_program_started: "Программа разработки Биологического оружия"
  
  gained_biological_capability.t: "Получен биологический ударный потенциал"
  gained_biological_capability.d: "[SCOPE.sCountry('biological_country').GetName], благодаря своим неустанным усилиям, получили биологическое оружие и средства доставки этого оружия своим врагам. Это значит что они теперь могут использовать $conduct_biological_strike$ [concept_diplomatic_action] против своих врагов."
  gained_biological_capability.f: "Примечание: биологическое оружие будет потеряно если [SCOPE.sCountry('biological_country').GetName] не будет иметь ни одного [concept_building] $building_university$ в котором нет дефицита товаров, примет [concept_law] $law_wmd_banned$, или станет незначительной державой."
  gained_biological_capability.option: "Великолепно!"
  
  lost_biological_capability.t: "Утрачена способность наносить биологические удары"
  lost_biological_capability.d: "[SCOPE.sCountry('biological_country').GetName] потеряли возможность наносить биологические удары по своим врагам."
  lost_biological_capability.f: "Это событие произошло потому, что [SCOPE.sCountry('biological_country').GetName] не имеет больше [concept_building] $building_university$, приняли $law_wmd_banned$ , или стали незначительной державой."
  lost_biological_capability.option: "Трагедия!"

  enable_historical_railroading_decision: "Включите историческую железную дорогу для ИИ"
  enable_historical_railroading_decision_desc: "Нажатие на это решение заставит ИИ всегда выбирать исторический вариант во всех исторических событиях. Решение может быть включено или отключено игроком в любой момент во время игры. Обратите внимание, что это решение не будет принуждать историческое событие срабатывать тогда, когда оно обычно не срабатывает, вместо этого оно только заставляет ИИ выбирать исторический вариант всякий раз, когда для него срабатывает историческое событие."
  disable_historical_railroading_decision: "Отключить историческую железную дорогу для ИИ"
  disable_historical_railroading_decision_desc: "Нажатие на это решение освободит ИИ от необходимости всегда выбирать исторический вариант во всех исторических событиях. Игрок по-прежнему может снова включить историческую железную дорогу в любое время."

  korean_war: "Корейская война"
  sino_tibet_war: "Китайско-тибетская война"

  is_not_independent: "недостаточно независим"
  join_unga_decision.tt: "Ни в одной стране $unsc_permanent_member$ нет $relations_cold$ или ниже $DIPLO_ACTION_RELATIONS$."
  join_unga_decision_2.tt: "Нет $unsc_permanent_member$ с более высоким [concept_rank], чем в этой стране."
  join_unga_decision_3.tt: "Историческая дата членства в ООН (только для исторически разделенных стран)"
  join_unga_decision_4.tt: "Страна, не участвующая в политике одного Китая"
  join_unga_decision: "Присоединяйтесь к Генеральной Ассамблее ООН"
  join_unga_decision_desc: "Генеральная Ассамблея ООН (ГА ООН) является главным директивным органом Организации. В него входят все государства-члены, и он представляет собой уникальный форум для многостороннего обсуждения всего спектра международных вопросов, охватываемых Уставом Организации Объединенных Наций. Каждое государство-член Организации Объединенных Наций имеет равный голос."
  join_unsc_perm_decision: "Станьте постоянным членом Совета Безопасности ООН."
  join_unsc_perm_decision_desc: "Совет Безопасности несет главную ответственность за поддержание международного мира и безопасности. В его состав входят 15 членов, каждый из которых имеет один голос. Согласно Уставу Организации Объединенных Наций, все государства-члены обязаны выполнять решения Совета. Совет Безопасности берет на себя ведущую роль в определении существования угрозы миру или акта агрессии. Он призывает стороны спора урегулировать его мирными средствами и рекомендует методы урегулирования или условия урегулирования. В некоторых случаях Совет Безопасности может прибегнуть к введению санкций или даже санкционировать применение силы для поддержания или восстановления международного мира и безопасности."
  join_unsc_perm_decision_tt: "Страна имеет дружественные отношения со всеми членами СБ ООН."
  unga_member: "Член ГА ООН"
  unsc_permanent_member: "Постоянный член СБ ООН"
  unsc_non_permanent_member: "Непостоянный член СБ ООН"
  united_nations.1.t: "Вступил в ГА ООН"
  united_nations.1.d: "Организация Объединенных Наций рада сообщить, что наша страна получила место в Генеральной Ассамблее."
  united_nations.2.t: "Исключено из ГА ООН"
  united_nations.2.d: "В связи с изменением статуса нашей страны с суверенного государства на марионеточное государство другой страны Организация Объединенных Наций приняла решение исключить нас из Генеральной Ассамблеи. Однако нам предоставлен утешительный статус государства-наблюдателя ООН."
  united_nations.1.a: "Неудачный"
  united_nations.1.f: "Это событие произошло потому, что эта страна либо больше не обладает достаточной независимостью, либо перестала быть [concept_recognized_power]."
  united_nations.2.f: "Это событие произошло потому, что эта страна либо больше не обладает достаточной независимостью, либо перестала быть [concept_recognized_power]."
  
  UNSC_non_perm_membership.t: "Непостоянный член СБ ООН"
  UNSC_non_perm_membership.d: "[SCOPE.sCountry('new_non_perm_UNSC_member').GetName] был избран Генеральной Ассамблеей Организации Объединенных Наций на должность члена Совета Безопасности Организации Объединенных Наций сроком на 2 года. Во время этого ООН может потребовать от нас возглавить войну по сдерживанию против членов-изгоев."
  UNSC_non_perm_membership.f: "Новая страна выбирается непостоянным членом СБ ООН, если в мире менее 15 членов СБ ООН и более 30 членов ГА ООН. Право на участие имеют страны с хорошей репутацией, не находящиеся в состоянии войны и являющиеся членами ГА ООН."
  UNSC_non_perm_membership.option: "Отличный!"

  new_unsc_perm_member.t: "Новый постоянный член СБ ООН"
  new_unsc_perm_member.d: "[SCOPE.sCountry('new_unsc_member_scope').GetName] приглашен в Совет Безопасности ООН в качестве постоянного члена. Теперь они могут наложить вето на любую миротворческую резолюцию, которую они не одобряют."
  new_unsc_perm_member.f: "[SCOPE.sCountry('new_unsc_member_scope').GetName] смог присоединиться к СБ ООН в качестве постоянного члена, поскольку имел хорошие отношения со всеми существующими постоянными членами и не был международным изгоем."
  new_unsc_perm_member.1: "Мы будем пристально следить за этим развитием"

  UNSC_members_list.tt: "Следующие страны являются постоянными членами СБ ООН:"

  UN_secretary_general_selection.t: "[SCOPE.sCountry('unsg_country').GetAdjective] Генеральный секретарь ООН"
  UN_secretary_general_selection.d: "Генеральная Ассамблея Организации Объединенных Наций избрала [SCOPE.sCountry('unsg_country').GetAdjective] гражданина Генеральным секретарем организации. Это дает нашей стране больше влияния в международных делах."
  UN_secretary_general_selection.f: "[SCOPE.sCountry('unsg_country').GetName] был выбран потому, что мы имеем авторитетную международную репутацию и не являемся великой державой. Срок полномочий Генерального секретаря ООН составляет 5 лет."

  UN_secretary_general_notification.t: "[SCOPE.sCountry('unsg_country').GetAdjective] Генеральный секретарь ООН"
  UN_secretary_general_notification.d: "Генеральная Ассамблея Организации Объединенных Наций избрала [SCOPE.sCountry('unsg_country').GetAdjective] гражданина Генеральным секретарем организации. Это дает [SCOPE.sCountry('unsg_country').GetName] больше влияния в международных делах."
  UN_secretary_general_notification.1.f: "Говорят, что новый генеральный секретарь ООН является довольно пассивным человеком, поэтому ООН вряд ли будет жестко относиться к странам, нарушающим международное право."
  UN_secretary_general_notification.2.f: "Новый генеральный секретарь ООН считается порядочным человеком, поэтому, хотя маловероятно, что ООН будет очень жесткой по отношению к странам, нарушающим международное право, следует ожидать некоторой степени твердости."
  UN_secretary_general_notification.3.f: "Говорят, что новый генеральный секретарь ООН является очень активным и агрессивным человеком, поэтому вполне вероятно, что ООН будет очень жесткой по отношению к странам, которые нарушают международное право."
  UN_secretary_general_notification_option: "Поздравляем [SCOPE.sCountry('unsg_country').GetName]!"

  unsg_country: "Родина Генерального секретаря ООН"

  un_sanctions_1: "Дипломатические санкции ООН"
  un_sanctions_2: "Политические санкции ООН"
  un_sanctions_3: "Экономические санкции ООН"
  un_embargo_participant: "Участник экономических санкций ООН"

  UN_sanctions_system.t: "Санкции, наложенные на [SCOPE.sCountry('UN_sanctions_target').GetName]"
  UN_sanctions_system.d: "Организация Объединенных Наций по настоянию своего Генерального секретаря приняла решение ввести санкции в отношении [SCOPE.sCountry('UN_sanctions_target').GetName] с целью наказать страну за нарушение международного права."
  UN_sanctions_system.f: "Санкции ООН будут действовать до тех пор, пока позорная репутация [SCOPE.sCountry('UN_sanctions_target').GetName] не станет «достойной уважения». Однако некоторые санкции могут быть сняты попутно, если уровень позора в нашей стране снизится."
  UN_sanctions_option: "Выразим наше сильное недовольство ГА ООН."

  UN_sanctions_system_embargo.t: "ООН призывает к санкциям против [SCOPE.sCountry('un_sanctions_embargoed_country').GetName]"
  UN_sanctions_system_embargo.d: "В связи с грубыми нарушениями международного права, совершенными [SCOPE.sCountry('un_sanctions_embargoed_country').GetName], Генеральный секретарь ООН призвал всех членов Генеральной Ассамблеи ООН ввести эмбарго на государство-изгой. Участие в плане ООН принесет большую международную поддержку [SCOPE.sCountry('un_sanctions_embargoing_country').GetName]."
  UN_sanctions_system_embargo.f: "Обратите внимание, что эмбарго против [SCOPE.sCountry('un_sanctions_embargoed_country').GetName] не может быть снято до тех пор, пока ООН не отменит санкции со страны."
  UN_sanctions_system_embargo_option.1: "Начать эмбарго!"
  UN_sanctions_system_embargo_option.2: "Нет, нам нужно с ними торговать."

  UN_sanctions_system_end.t: "Санкции ООН сняты"
  UN_sanctions_system_end.d: "Генеральный секретарь ООН снял некоторые или все санкции против [SCOPE.sCountry('UN_sanctions_target').GetName] из-за нашей более низкой репутации."
  UN_sanctions_system_end.f: "Различные санкции ООН будут отменены в зависимости от уровня позора, которым обладает [SCOPE.sCountry('UN_sanctions_target').GetName]."
  UN_sanctions_end_option: "Большой!"

  request_un_peacekeeping_decision: "Запрос на миротворческую деятельность ООН"
  request_un_peacekeeping_decision_desc: "Мы можем представить резолюцию в Генеральной Ассамблее ООН, призывающую наших врагов немедленно прекратить военные действия против нас или столкнуться с угрозой коллективных действий против них со стороны ООН. Однако возможно ли это, зависит от одобрения Совета Безопасности ООН и Генеральной Ассамблеи."
  UNSC_peacekeeping_resolution.t: "Резолюция ООН: Вмешаться в конфликт [SCOPE.sCountry('un_peacekeeping_applicant').GetName]?"
  UNSC_peacekeeping_resolution.d: "[SCOPE.sCountry('un_peacekeeping_applicant').GetName] представила в Генеральную Ассамблею ООН резолюцию, призывающую к поддерживаемому ООН перемирию в их продолжающемся конфликте. \n Согласно протоколу Организации Объединенных Наций, Совет Безопасности является органом, которому поручено обеспечивать международный мир, поэтому его члены будут голосовать первыми по вопросу о том, поддерживать ли резолюцию. \n Только если резолюция будет принята в СБ ООН, она поступит в ГА ООН для окончательного утверждения"
  UNSC_peacekeeping_resolution.f: "Обратите внимание, что успешное голосование за эту резолюцию вызовет войну сдерживания против агрессора, которую возглавит случайный член СБ ООН, проголосовавший за резолюцию."

  un_peacekeeping_vote.option.1: "Голосуйте ЗА резолюцию"
  un_peacekeeping_vote.option.2: "Голосуйте ПРОТИВ резолюции"
  un_peacekeeping_vote.option.3: "Воздержаться от голосования"

  UNGA_peacekeeping_resolution_advance.t: "Резолюция ООН по миротворческой деятельности поступила в ГА ООН"
  UNGA_peacekeeping_resolution_advance.d: "Резолюция, призывающая Организацию Объединенных Наций вмешаться в конфликт [SCOPE.sCountry('un_peacekeeping_applicant').GetName], была одобрена Советом Безопасности ООН. Сейчас он находится на рассмотрении Генеральной Ассамблеи ООН."
  UNGA_peacekeeping_resolution_advance.f: "Это событие было вызвано тем, что ни один постоянный член СБ ООН не наложил вето на резолюцию, а за резолюцию проголосовало большинство непостоянных членов."
  un_peacekeeping_update: "Отличный"

  UNGA_peacekeeping_resolution.t: "Резолюция ООН: Вмешаться в конфликт [SCOPE.sCountry('un_peacekeeping_applicant').GetName]?"
  UNGA_peacekeeping_resolution.d: "[SCOPE.sCountry('un_peacekeeping_applicant').GetName] представила резолюцию Генеральной Ассамблее Организации Объединенных Наций, призывающую к перемирию при поддержке ООН в продолжающемся конфликте. Совет Безопасности ООН одобрил резолюцию, поэтому принятие резолюции ООН теперь зависит от того, одобрит ли ее ГА ООН."
  UNGA_peacekeeping_resolution.f: "Обратите внимание, что успешное голосование за эту резолюцию вызовет войну сдерживания против агрессора, которую возглавит случайный член СБ ООН, проголосовавший за резолюцию."

  UN_peacekeeping_resolution_YES.t: "Принята резолюция ООН по миротворческой деятельности"
  UN_peacekeeping_resolution_YES.d: "Резолюция [SCOPE.sCountry('un_peacekeeping_applicant').GetName], призывающая к перемирию при поддержке ООН в продолжающемся конфликте, была принята в СБ ООН и ГА ООН. Генеральный секретарь ООН теперь выдвинет ультиматум от имени ООН, призывая всех агрессоров в конфликте согласиться на Белый мир или начать войну сдерживания."
  UN_peacekeeping_resolution_YES.f: "ООН начнет войну сдерживания против любой страны-агрессора, которая отвергла ультиматум ООН."

  UN_peacekeeping_ultimatum.t: "Ультиматум ООН"
  UN_peacekeeping_ultimatum.d: "Генеральный секретарь Организации Объединенных Наций обратился к [SCOPE.sCountry('un_peacekeeping_aggressor').GetName] с ультиматумом: подпишите Белый мир с [SCOPE.sCountry('un_peacekeeping_applicant').GetName], иначе им придется начать войну сдерживания против нас под руководством одного из членов СБ ООН."
  UN_peacekeeping_ultimatum.f: "Отказ от международного давления будет воспринят как национальное унижение и вызовет много волнений в нашей стране."
  un_peacekeeping_ultimatum.option.1: "Мы принимаем ультиматум"
  un_peacekeeping_ultimatum.option.2: "Через мой труп!"

  un_intervene_in_war.tt: "Присоединяйтесь к любому [concept_war] между [SCOPE.sCountry('un_peacekeeping_applicant').GetName] и [SCOPE.sCountry('un_peacekeeping_aggressor').GetName], где [SCOPE.sCountry('un_peacekeeping_applicant').GetName] — это [concept_war_leader], а не агрессор."
  UN_peacekeeping_join_war.t: "Миротворческая миссия ООН по оказанию помощи [SCOPE.sCountry('un_peacekeeping_applicant').GetName]"
  UN_peacekeeping_join_war.d: "По разрешению Совета Безопасности Организации Объединенных Наций Генеральный секретарь ООН создал миротворческие силы для помощи [SCOPE.sCountry('un_peacekeeping_applicant').GetName] в его оборонительной войне против [SCOPE.sCountry('un_peacekeeping_aggressor').GetName]."
  UN_peacekeeping_join_war.f: "Присоединение к миротворческой миссии приведет к тому, что [ROOT.GetCountry.GetName] присоединится к стороне [SCOPE.sCountry('un_peacekeeping_applicant').GetName] в любом [concept_diplomatic_play] между ним и [SCOPE.sCountry('un_peacekeeping_aggressor').GetName]."
  UN_peacekeeping_join_war.option.1: "Отправьте наши войска на помощь [SCOPE.sCountry('un_peacekeeping_applicant').GetName]!"
  UN_peacekeeping_join_war.option.2: "Они могут постоять за себя."

  UN_peacekeeping_resolution_NO.t: "Резолюция ООН по миротворческой деятельности провалилась"
  UN_peacekeeping_resolution_NO.d: "Резолюция [SCOPE.sCountry('un_peacekeeping_applicant').GetName], призывающая к перемирию при поддержке ООН в продолжающемся конфликте, была отклонена Организацией Объединенных Наций. Генеральный секретарь ООН обвиняет членов организации в бездействии."
  UN_peacekeeping_resolution_NO.f: "Резолюция ООН по поддержанию мира провалилась, потому что либо было наложено вето постоянного члена СБ ООН, либо резолюция не получила простого большинства голосов в СБ ООН или ГА ООН. \n\nВето ККОН: [SCOPE.sCountry('un_peacekeeping_vetoer').GetName]"
  un_peacekeeping_fails: "ООН действительно бесполезна!"

  un_mandate_creation.tt: "UN $mandate$ создается поверх [SCOPE.sState('state_to_release').GetName]."
  UN_peacekeeping_resolution_mandate.t: "ООН Демонтаж [ROOT.GetCountry.GetName]"
  UN_peacekeeping_resolution_mandate.d: "В составе миротворческой миссии ООН [ROOT.GetCountry.GetName] будет демонтирован. Это означает, что всем территориям [ROOT.GetCountry.GetAdjective], на которых нет [concept_homeland], будет предоставлено самоуправление в рамках соглашения о подопечной территории Организации Объединенных Наций."
  UN_peacekeeping_resolution_mandate.f: "Это событие будет срабатывать до тех пор, пока не будут освобождены все состояния [concept_homeland]."
  UN_peacekeeping_resolution_mandate.option: "У нас нет другого выбора, кроме как принять это."

  UN_peacekeeping_resolution_mandate_notice.t: "Опека ООН над [SCOPE.sCountry('UNT_mandate_country').GetName]?"
  UN_peacekeeping_resolution_mandate_notice.d: "Организация Объединенных Наций выделила нам территорию для управления в соответствии со схемой подопечной территории ООН. Мы можем либо принять опеку, либо отказаться от нее."
  UN_peacekeeping_resolution_mandate_notice.f: "Опека будет действовать в течение 5 лет, после чего [ROOT.GetCountry.GetName] должен предоставить независимость [SCOPE.sCountry('UNT_mandate_country').GetName], иначе ему грозит международное осуждение."
  un_peacekeeping_mandate_yes: "Мы любезно принимаем этот мандат."
  un_peacekeeping_mandate_no: "Мы с уважением отказываемся принять этот мандат."

  UN_peacekeeping_resolution_mandate_indy.t: "Независимость [SCOPE.sCountry('UNT_mandate_country').GetName]?"
  UN_peacekeeping_resolution_mandate_indy.d: "Мандат [SCOPE.sCountry('un_mandate_trustee').GetName] в отношении [SCOPE.sCountry('UNT_mandate_country').GetName] подошел к концу. Поэтому Организация Объединенных Наций попросила нас немедленно предоставить [SCOPE.sCountry('UNT_mandate_country').GetName] независимость."
  UN_peacekeeping_resolution_mandate_indy.f: "Срок полномочий мандатного попечителя ООН длится всего 5 лет с даты наступления опеки."
  un_peacekeeping_mandate_liberate: "[SCOPE.sCountry('UNT_mandate_country').GetName] может вновь присоединиться к братству свободных наций!"
  un_peacekeeping_mandate_keep: "[SCOPE.sCountry('UNT_mandate_country').GetName] не заслуживает свободы."

