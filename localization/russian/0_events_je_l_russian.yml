  join_biological_non_proliferation_treaty_decision_desc: "Конвенция о биологическом оружии, или Конвенция о биологическом и токсинном оружии, представляет собой договор о разоружении, который эффективно запрещает биологическое и токсинное оружие, запрещая его разработку, производство, приобретение, передачу, накопление запасов и использование."
  signed_BWC_1_tt: "Эта страна подписывает Конвенцию о биологическом оружии и будет соблюдать ее в течение как минимум 10 лет."
  leave_biological_non_proliferation_treaty_decision: "Отказаться от Конвенции по биологическому оружию"
  leave_biological_non_proliferation_treaty_decision_desc: "Конвенция о биологическом оружии, или Конвенция о биологическом и токсинном оружии, представляет собой договор о разоружении, который эффективно запрещает биологическое и токсинное оружие, запрещая его разработку, производство, приобретение, передачу, накопление запасов и использование. Отказ от этого договора позволит этой стране снова начать программу биологического оружия."
