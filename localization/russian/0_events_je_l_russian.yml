  cabinet_minister_resigns.d: "[SCOPE.gsInterestGroup('angry_cabinet_ig').GetLeader.GetFullName] из [SCOPE.gsInterestGroup('angry_cabinet_ig').GetName] вышел из состава [SCOPE.GetRootScope.GetCountry.GetCustom('cabinet_name_custom_title')], сославшись на принципиальные и непримиримые разногласия с [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [ROOT.GetCountry.GetRuler.GetFullName]. Это нанесло [concept_government] политический ущерб."
