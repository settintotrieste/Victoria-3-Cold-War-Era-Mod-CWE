  je_judiciary_foreign: "[SCOPE.GetRootScope.GetCountry.GetCustom('foreign_supreme_court_name')] из [SCOPE.sCountry('legal_union_foreign_supreme_court').GetNameNoFlag]"
  je_judiciary_foreign_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('foreign_supreme_court_name')] [SCOPE.sCountry('legal_union_foreign_supreme_court').GetName] является высшим судом судебной власти [ROOT.GetCountry.GetName]. Он обладает высшей апелляционной юрисдикцией в отношении всех судебных дел, затрагивающих положения конституционного или статутного права, и, в зависимости от уровня автономии судей, может в одностороннем порядке вносить поправки в законы.\n\nПоскольку [ROOT.GetCountry.GetName] находится в $legal_union$ с [SCOPE.sCountry('legal_union_foreign_supreme_court').GetName], судьи [SCOPE.GetRootScope.GetCountry.GetCustom('foreign_supreme_court_name')] будут выбраны Правительством [SCOPE.sCountry('legal_union_foreign_supreme_court').GetAdjectiveNoFlag].\n\n Общее количество судей: #BOLD [GetPlayer.MakeScope.Var('judiciary_size').GetValue][SCOPE.sCountry('legal_union_foreign_supreme_court').GetName]0 Число судей [SCOPE.sCountry('legal_union_foreign_supreme_court').GetName]1: #BOLD [SCOPE.sCountry('legal_union_foreign_supreme_court').GetName]3 [SCOPE.sCountry('legal_union_foreign_supreme_court').GetName]4 \n\nПримечание: [SCOPE.sCountry('legal_union_foreign_supreme_court').GetName]1 судей поддержит более демократичный [SCOPE.sCountry('legal_union_foreign_supreme_court').GetName]6 в категориях [SCOPE.sCountry('legal_union_foreign_supreme_court').GetName]7 и [SCOPE.sCountry('legal_union_foreign_supreme_court').GetName]8."
