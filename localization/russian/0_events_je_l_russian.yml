  je_cohabitation_system_reason: "По конституции [ROOT.GetCountry.GetName], исполнительная власть [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] разделена с [SCOPE.GetRootScope.GetCountry.GetCustom('government_prime_minister_custom_title')]. Это значит что [SCOPE.GetRootScope.GetCountry.GetCustom('government_prime_minister_custom_title')] имеет определенное влияние на разработку законов и политику страны. \n\nТак как [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] из отличной политичкской фракции от большенства членов [SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')], возник раскол в правительство потому что [SCOPE.GetRootScope.GetCountry.GetCustom('government_prime_minister_custom_title')] должен называться [SCOPE.GetRootScope.GetCountry.GetCustom('government_prime_minister_custom_title')], который будет приемлимым для большинства фракций в [SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')]. \n\nТак как [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [GetPlayer.GetRuler.GetFullName] не из [concept_interest_group] с наибольшим [concept_clout] в [concept_government], [concept_government] расколото в [ROOT.GetCountry.GetName]. [SCOPE.GetRootScope.GetCountry.GetCustom('government_prime_minister_custom_title')] имеет право вето на принятие любого [Concept('concept_law','$concept_laws$')] который не поддерживает [concept_interest_group] [SCOPE.GetRootScope.GetCountry.GetCustom('government_prime_minister_custom_title')]. \n\nТекущий [SCOPE.GetRootScope.GetCountry.GetCustom('government_prime_minister_custom_title')]: [SCOPE.sCharacter('cohabitation_pm_scope').GetFullName]"

