  je_colonial_empire: "Конференция [SCOPE.GetRootScope.GetCountry.GetCustom('imperial_conference_custom_adjective')]"
  je_colonial_empire_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('imperial_conference_custom_adjective')] конференции - это периодические собрания государственных лидеров из колониальных администраций и доминионов [ROOT.GetCountry.GetAdjectiveNoFlag] Империи. Все конференции проводятся в [ROOT.GetCountry.GetName], сердце империи. \n\nМы можем использовать конференции для определения уровня торговой интеграции [concept_dominion]а с [ROOT.GetCountry.GetName]. \n\nМы также можем использовать конференции, чтобы призвать все колонии оказать нам помощь в оборонительной войне."
