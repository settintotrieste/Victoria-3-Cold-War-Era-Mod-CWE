  notification_issued_letters_of_marque_notification_desc: "[concept_government] [SCOPE.sCountry('letters_of_marque_issuer').GetName] позволило пиратам захватывать [concept_convoys] принадлежащие другим странам. Это позволит [SCOPE.sCountry('letters_of_marque_issuer').GetName] использовать $seize_shipping$ [concept_diplomatic_action] против этой страны."
