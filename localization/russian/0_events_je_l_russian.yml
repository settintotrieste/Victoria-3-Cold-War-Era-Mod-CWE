  state_church_veto.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('state_church_name')] Против законопроекта"
  state_church_veto.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('state_church_name')] выразил решительную оппозицию законопроекту, который в настоящее время принимается в [SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')]. Различные религиозные лидеры теперь призывают своих сторонников молиться за то, чтобы законопроект был брошен в законодательное чистилище."
  state_church_veto.f: "Это событие было создано, поскольку [SCOPE.gsInterestGroup('state_church_ig').GetName] либо не одобряет, либо категорически не одобряет закон, который в настоящее время принимается."

  trade_union_veto.t: "Профсоюзы выступают против законопроекта"
  trade_union_veto.d: "Влиятельные профсоюзы выразили решительную оппозицию законопроекту, который в настоящее время принимается в [SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')]. Различные профсоюзные лидеры теперь призывают своих сторонников оказать давление на своих политических представителей, чтобы они отклонили законопроект."
  trade_union_veto.f: "Это событие было создано, поскольку [SCOPE.gsInterestGroup('trade_union_ig').GetName] либо не одобряет, либо категорически не одобряет закон, который в настоящее время принимается."

  big_business_veto.t: "Крупный бизнес выступает против законопроекта"
  big_business_veto.d: "Влиятельные титаны промышленности выразили решительную оппозицию законопроекту, который в настоящее время принимается в [SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')]. Различные руководители теперь призывают своих лоббистов саботировать прохождение законопроекта через законодательный орган."
  big_business_veto.f: "Это событие было создано, поскольку [SCOPE.gsInterestGroup('industrialist_ig').GetName] либо не одобряет, либо категорически не одобряет закон, который в настоящее время принимается."

