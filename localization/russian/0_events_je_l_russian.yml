  je_unconstitutionalise_national_values_button_desc: "Предыдущий [concept_government] включил в конституцию значение [SCOPE.GetRootScope.GetCountry.GetCustom('national_value_name')]. Это зафиксировало национальное значение [ROOT.GetCountry.GetName] как [SCOPE.GetRootScope.GetCountry.GetCustom('national_value_name')] и предотвратило принятие некоторых законов. \n\nОтмена этого конституционного постановления позволит национальным ценностям измениться в соответствии с [concept_ideology] [concept_interest_group] с более чем 50% [concept_clout] в стране и снять ограничения на принятие некоторых законов."

