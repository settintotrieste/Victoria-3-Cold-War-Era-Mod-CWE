  CIS_member: "Член Содружества Независимых Государств"
  CIS_leader: "Лидер Содружества Независимых Государств"
  form_CIS_decision: "Образовать Содружество Независимых Государств"
  form_CIS_decision_desc: "Содружество Независимых Государств (СНГ) — региональная межправительственная организация в Евразии. Оно было образовано после распада Советского Союза в 1991 году. СНГ поощряет сотрудничество в экономических, политических и военных делах и обладает определенными полномочиями, касающимися координации торговли, финансов, законотворчества и безопасности, включая предотвращение трансграничной преступности."
