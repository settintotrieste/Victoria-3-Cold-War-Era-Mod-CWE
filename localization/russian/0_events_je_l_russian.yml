  concept_OPEC_oil_embargoing: "Эмбарго"
  concept_OPEC_oil_embargo_desc: "[concept_OPEC_oil_embargo] — это ситуация, когда ОПЕК и ее члены коллективно согласились не экспортировать нефть в определенную страну. Однако некоторые члены ОПЕК могут решить не присоединяться к эмбарго, если у них хорошие отношения со страной, на которую наложено эмбарго. Примечание. Это дипломатическое действие инициирует полное эмбарго, поскольку движок V3 в настоящее время еще не допускает эмбарго на определенные товары."

  DIPLO_ACTION_CREATE_OPEC_EMBARGO: "Присоединяйтесь к [concept_OPEC_oil_embargo] против [SCOPE.sCountry('OPEC_embargo_target').GetName]"
  OPEC_embargo_invitation.t: "Нефтяное эмбарго ОПЕК против [SCOPE.sCountry('OPEC_embargo_target').GetName]?"
  OPEC_embargo_invitation.d: "Лидер ОПЕК [SCOPE.sCountry('OPEC_leader').GetName] принял резолюцию, призывающую всех членов ОПЕК прекратить экспорт нефти в [SCOPE.sCountry('OPEC_embargo_target').GetName]. Поскольку [ROOT.GetCountry.GetName] является членом ОПЕК, мы можем либо присоединиться к эмбарго, либо не участвовать в нем."
  OPEC_embargo_invitation.f: "[SCOPE.sCountry('OPEC_leader').GetName] начал нефтяное эмбарго против [SCOPE.sCountry('OPEC_embargo_target').GetName], потому что у них враждебные отношения друг с другом, а также потому, что [SCOPE.sCountry('OPEC_leader').GetName] имеет отношения $relations_amicable$ со всеми другими членами ОПЕК, что дало ему уверенность в том, что он может обратиться с таким запросом к ОПЕК. Примечание. Примечание. Это дипломатическое действие инициирует полное эмбарго, поскольку движок V3 в настоящее время еще не допускает эмбарго на определенные товары."
  OPEC_accept_embargo: "Присоединяйтесь к нефтяному эмбарго!"
  OPEC_reject_embargo: "Мы не будем никого лишать драгоценной нефти."

  special_administrative_region_system.1.t: "Особый административный район [SCOPE.sCountry('SAR_country').GetName]"
  special_administrative_region_system.1.d: "[ROOT.GetCountry.GetName] объявил о создании нового специального административного района в [SCOPE.sCountry('SAR_country').GetName]. Это дает людям [SCOPE.sCountry('SAR_country').GetName] большую автономию в своей внутренней политике в обмен на сохранение подчинения [ROOT.GetCountry.GetAdjective]. Международное сообщество приветствовало эту новость бурными аплодисментами."
  special_administrative_region_system.1.f: "Особый административный район [SCOPE.sCountry('SAR_country').GetName], поскольку столицей субъекта была родина [ROOT.GetCountry.GetName]. Эта договоренность не позволит территории добиться независимости через систему деколонизации, поскольку [SCOPE.sCountry('SAR_country').GetName] будет рассматриваться как по праву принадлежащая [ROOT.GetCountry.GetName] согласно международному праву."
  special_administrative_region_system_option: "Большой!"
  DIPLO_ACTION_CREATE_SAR_SUBJECT_TYPE: "Создайте специальный административный район [SCOPE.sCountry('SAR_country').GetName]."

