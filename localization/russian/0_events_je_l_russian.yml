  COMECON_expulsion.d: "Наше членство в СЭВ было немедленно прекращено. Таким образом, все льготы, предоставленные в рамках наших договоров со странами СЭВ, настоящим отменяются."
  COMECON_expulsion.f: "Это событие произошло потому, что эта страна либо стала недостаточно автономным субъектом, либо стала неприемлемым типом правительства, либо стала международным изгоем."

  OECD_member: "Член ОЭСР"
  OECD_leader: "Лидер ОЭСР"
  form_OECD_decision: "Сформировать ОЭСР"
  form_OECD_decision_desc: "Организация экономического сотрудничества и развития — межправительственная организация, объединяющая 38 стран-членов, основанная в 1961 году для стимулирования экономического прогресса и мировой торговли. Это форум, страны-члены которого заявляют о своей приверженности демократии и рыночной экономике, предоставляющий платформу для сравнения политического опыта, поиска ответов на общие проблемы, выявления передового опыта и координации внутренней и международной политики его участников."
  join_OECD_decision: "Вступить в ОЭСР"
  join_OECD_decision_desc: "Организация экономического сотрудничества и развития — межправительственная организация, объединяющая 38 стран-членов, основанная в 1961 году для стимулирования экономического прогресса и мировой торговли. Это форум, страны-члены которого заявляют о своей приверженности демократии и рыночной экономике, предоставляющий платформу для сравнения политического опыта, поиска ответов на общие проблемы, выявления передового опыта и координации внутренней и международной политики его участников."
  leave_OECD_decision: "Выход из ОЭСР"
  leave_OECD_decision_desc: "Организация экономического сотрудничества и развития — межправительственная организация, объединяющая 38 стран-членов, основанная в 1961 году для стимулирования экономического прогресса и мировой торговли. Это форум, страны-члены которого заявляют о своей приверженности демократии и рыночной экономике, предоставляющий платформу для сравнения политического опыта, поиска ответов на общие проблемы, выявления передового опыта и координации внутренней и международной политики его участников."
  OECD_application_var: "Недавно подали заявку на членство в ОЭСР"
  OECD_application_choice.t: "[SCOPE.sCountry('OECD_applicant').GetName] подает заявку на вступление в ОЭСР"
  OECD_application_choice.d: "[SCOPE.sCountry('OECD_applicant').GetName] просит о  вступлении в ОЭСР. Поскольку [SCOPE.sCountry('OECD_leader').GetName] в настоящее время председательствует в ОЭСР, нам решать, принимать ли [SCOPE.sCountry('OECD_applicant').GetName] в организацию."
  OECD_application_choice.option.1: "Принять"
  OECD_application_choice.option.2: "Отклонить"
  OECD_application_rejection.t: "Заявка ОЭСР отклонена"
  OECD_application_rejection.d: "Лидер ОЭСР [SCOPE.sCountry('OECD_leader').GetName] отклонил нашу скромную просьбу присоединиться к их великой организации. Они ссылаются на геополитические причины отказа от нашего членства."
  OECD_application_rejection.1: "Они все равно нас не заслуживают!"
  OECD_application_acceptance.t: "Заявка ОЭСР принята"
  OECD_application_acceptance.d: "Лидер ОЭСР [SCOPE.sCountry('OECD_leader').GetName] любезно принял нашу скромную просьбу присоединиться к их великой организации. Они ссылаются на геополитические причины принятия нашего членства."
  OECD_application_acceptance.1: "Мы благодарим их за щедрость!"
  left_OECD_var: "Недавно покинул ОЭСР"
  OECD_expulsion.t: "Членство в ОЭСР прекращено"
  OECD_expulsion.d: "Наше членство в ОЭСР было немедленно прекращено. Таким образом, все льготы, предоставленные в рамках наших договоров со странами ОЭСР, настоящим отменяются."
  OECD_expulsion.f: "Это событие произошло потому, что эта страна либо стала недостаточно автономным субъектом, либо стала неприемлемым типом правительства, либо стала международным изгоем."

  join_WTO_decision: "Вступите во Всемирную торговую организацию"
  join_WTO_decision_desc: "Всемирная торговая организация (ВТО) — межправительственная организация, которая регулирует и облегчает международную торговлю. ВТО облегчает торговлю товарами, услугами и интеллектуальной собственностью между странами-участницами, обеспечивая основу для переговоров по торговым соглашениям, которые обычно направлены на снижение или отмену тарифов, квот и других ограничений."
  leave_WTO_decision: "Выход из Всемирной торговой организации"
  leave_WTO_decision_desc: "Всемирная торговая организация (ВТО) — межправительственная организация, которая регулирует и облегчает международную торговлю. ВТО облегчает торговлю товарами, услугами и интеллектуальной собственностью между странами-участницами, обеспечивая основу для переговоров по торговым соглашениям, которые обычно направлены на снижение или отмену тарифов, квот и других ограничений."
  WTO_member: "Член Всемирной торговой организации"
  wto_expulsion.t: "Вышел из Всемирной торговой организации"
  wto_expulsion.d: "Членство [ROOT.GetCountry.GetCountry] во Всемирной торговой организации прекращено."
  wto_expulsion.f: "Это событие было вызвано тем, что [ROOT.GetCountry.GetCountry] либо больше не является достаточно независимым, неизоляционистским, либо имеет высокую репутацию."

