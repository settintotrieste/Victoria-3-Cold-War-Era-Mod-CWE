  je_occupation_of_austria: "Оккупация Австрии"
  je_occupation_of_austria_reason: "В конце Второй мировой войны в Европе Австрия была оккупирована союзниками и 27 апреля 1945 года провозгласила независимость от нацистской Германии. В то время как Германия была разделена на Восточную и Западную Германию в 1949 году, Австрия оставалась под совместной оккупацией западных союзников и Советского Союза."

  je_occupation_of_austria_end_occupation_button: "Прекратить [ROOT.GetCountry.GetAdjectiveNoFormatting] Оккупацию Австрии"
  je_occupation_of_austria_end_occupation_button_desc: "[ROOT.GetCountry.GetAdjective] [concept_government] прекратит военную оккупцию Австрии. Это разорвет наше [concept_condominium] над Австрией и будет предложено остальным членам [concept_condominium] так же прекратить оккупцию Австрии."

  je_occupation_of_berlin: "Оккупация Берлина"
  je_occupation_of_berlin_reason: "По окончании Второй мировой войны в Европе Берлин был освобожден союзными войсками и официально отделен от нацистской Германии 27 апреля 1945 года. Город был разделен на четыре оккупационные зоны, управляемые Соединенными Штатами, Великобританией, Францией и Советским Союзом. \n\nЗападный Берлин де-юре оставался под властью западных союзников, но по большей части фактически рассматривался как часть Западной Германии; однако жители не имели западногерманских паспортов."

  je_occupation_of_berlin_end_occupation_button: "Прекратить [ROOT.GetCountry.GetAdjectiveNoFormatting] Оккупацию Берлина"
  je_occupation_of_berlin_end_occupation_button_desc: "[ROOT.GetCountry.GetAdjective] [concept_government] прекратит военную оккупцию Берлина. Это разорвет наше [concept_condominium] над Берлином и будет предложено остальным членам [concept_condominium] так же прекратить оккупцию Берлина."

  je_occupation_of_trieste: "Оккупация Триеста"
  je_occupation_of_trieste_reason: "Свободная территория Триест была независимой территорией в Южной Европе, расположенной между Италией и Югославией, на северном побережье Адриатического моря, и находилась под непосредственной ответственностью Совета Безопасности ООН после Второй мировой войны. \n\nТерритория была создана 10 февраля 1947 года в соответствии с протоколом к ​​мирному договору с Италией для размещения этнически и культурно смешанного населения в нейтральном независимом государстве. Целью также было снижение территориальных претензий между Италией и Югославией, учитывая её стратегическое значение для торговли с Центральной Европой. \n\nОна была образована 15 сентября 1947 года. Ее администрация была разделена на две зоны: одна представляла собой портовый город Триест с узкой прибрежной полосой на северо-западе (зона А); другая (зона В) была образована небольшой частью северо-западной части Истрийского полуострова."

  je_occupation_of_trieste_end_occupation_button: "Прекратить [ROOT.GetCountry.GetAdjectiveNoFormatting] Оккупацию Триеста"
  je_occupation_of_trieste_end_occupation_button_desc: "[ROOT.GetCountry.GetAdjective] [concept_government] прекратит военную оккупцию Триеста. Это разорвет наше [concept_condominium] над Триестом и будет предложено остальным членам [concept_condominium] так же прекратить оккупцию Триеста."

  Expeditionary_Force: "Иностранные Экспедиционные силы"

  je_piracy_system: "Пиратство в [ROOT.GetCountry.GetAdjectiveNoFlag] водах"
  je_piracy_system_reason: "Пиратство и вооруженные ограбления на море — это не пережитки прошлого. Эти современные угрозы продолжают преследовать морскую отрасль, ставя под угрозу безопасность моряков и судов по всему миру. Их последствия выходят далеко за рамки непосредственной опасности — они имеют волновой эффект, влияя на судоходные компании, нарушая мировую торговлю и дестабилизируя целые регионы. \n\nОбходные пути из-за очагов пиратства значительно увеличивают протяженность морских маршрутов. Это приводит к увеличению расхода топлива, времени в пути и, в конечном итоге, к росту транспортных расходов для потребителей и предприятий. Кроме того, повышенный риск влечет за собой рост страховых премий для судов и грузов. Это дополнительное бремя расходов еще больше сказывается на судоходных компаниях и потенциально может быть переложено на потребителей. \n\nТак же, пиратство нарушает бесперебойное движение товаров по всему миру. Задержки или изменение маршрутов грузов могут привести к дефициту, колебаниям цен и ненадежным графикам доставки. Это может повлиять на целые цепочки поставок и затруднить экономическую деятельность."
  piracy_ongoing: "Прибрежное пиратство"
  is_piracy_area.tt: "Примыкает к пиратской зоне"
  has_piracy.tt: "У данной страны имеется пиратство в территориальных водах"
