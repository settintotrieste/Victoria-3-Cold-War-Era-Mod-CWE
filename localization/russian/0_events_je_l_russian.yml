  je_law_enactment_system: "Принятие [SCOPE.GetRootScope.GetCountry.GetLawBeingEnacted.GetName]"
  je_law_enactment_system_reason: "[ROOT.GetCountry.GetAdjective] [concept_government] пытается [Concept('concept_enactment_of_laws', '$concept_enactment_of_laws_enact$')] [SCOPE.sLaw('current_law_scope').GetName] [concept_law] через [SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')]. \n\nЧтобы сменить #y закон#! в [SCOPE.sLaw('current_law_scope').GetName] успешно, различные государственные органы не должны быть #r против#! [concept_law]. Если же они против, #y закон#! может столкнуться с [Concept('concept_enactment_setback', '$concept_enactment_setbacks$')] или даже с #r Вето#!. \n\n@information! Все [Concept('concept_interest_group', '$concept_interest_groups$')] в #y [SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')]#! пересмотрять свою поддержку [concept_government] после того как [concept_law] будет [Concept('concept_enactment_of_laws', '$concept_enactment_of_laws_enactment$')]. \n\n[Concept('concept_interest_group', '$concept_interest_groups$')] которые относятся #y Нейтрально#! или #g Поддерживают#! [SCOPE.GetRootScope.GetCountry.GetLawBeingEnacted.GetName] поддержат [concept_government] в [SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')]. \n\nпредупреждение! Ключевые лица, которые не поддерживают [SCOPE.sLaw('current_law_scope').GetName] представлены ниже."

