  institutional_veto.t: "Организованная оппозиция к [SCOPE.sLaw('current_law_scope').GetName]"
  institutional_veto.d: "Влиятельные члены [SCOPE.GetRootScope.GetCountry.GetCustom('lower_house_name')], [SCOPE.GetRootScope.GetCountry.GetCustom('supreme_court_name')] и [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetNameWithCountryVariant] перешли в оппозицию к попытке [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [ROOT.GetCountry.GetRuler.GetFullName] принять закон [SCOPE.sLaw('current_law_scope').GetName] в [ROOT.GetCountry.GetName]. Эти непримиримые защитники нынешнего режима требуют, чтобы все попытки изменить [concept_government_type] были пресечены и полность сохранет статус-кво."
  institutional_veto.f: "Это событие произошло так как [ROOT.GetCountry.GetName] это диктатура и принятие [SCOPE.sLaw('current_law_scope').GetName] фундаментально изменит [concept_government_type] [ROOT.GetCountry.GetName]."
