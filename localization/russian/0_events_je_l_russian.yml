  single_party_state_de_facto.d: "С запретом всей [concept_opposition] [Concept('concept_interest_group', '$concept_interest_groups$')] вступать [concept_party], [concept_government] успешно создало Однопартийную систему в [ROOT.GetCountry.GetName]."
  single_party_state_de_facto.f: "Это событие произошло так как всей [concept_opposition] [Concept('concept_interest_group', '$concept_interest_groups$')] запрещено вступать в [concept_party]."
  regime_change_failsafe.t: "Новый режим в [ROOT.GetCountry.GetNameNoFormatting]"
  regime_change_failsafe.d: "В связи с поражением [ROOT.GetCountry.GetName] в недавней [concept_war] в которой было навязана [concept_war_goal] [concept_regime_change], иностранные победители, [SCOPE.sCountry('foreign_power_regime_change').GetName], установили новый режим в [ROOT.GetCountry.GetName]. Этот новый режим имеет ту же [concept_government_type] и [Concept('concept_law', '$concept_laws$')] как и [SCOPE.sCountry('foreign_power_regime_change').GetName]. Далее, [concept_politician] из той же [concept_interest_group] что и [concept_ruler] [SCOPE.sCountry('foreign_power_regime_change').GetName] станет новым [concept_ruler] [ROOT.GetCountry.GetName]."
  regime_change_failsafe.f: "Это событие произошло так как [ROOT.GetCountry.GetName] была навязана [concept_war_goal] [concept_regime_change]."
  abolish_dynastic_republic.t: "[ROOT.GetCountry.GetAdjectiveNoFormatting] Кризис наследования"
  abolish_dynastic_republic.d: "Смерть предыдущего [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] привело к кризису наследования в [ROOT.GetCountry.GetName] так как [GetPlayer.GetRuler.GetFullName], старший [concept_heir] [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')], слишком молод чтобы занять должность. \n\nЕсли конституция не будет изменена, чтобы разрешить ребенку становиться [Concept('concept_ruler', '$concept_rulers$')] (например создание монархии) Политическая династия [GetPlayer.GetRuler.GetLastName] прервется."
  abolish_dynastic_republic.f: "Это событие произошло так как [concept_ruler] не совершеннолетний."

  reserve_powers_pm_veto.t: "Оппозиция [SCOPE.GetRootScope.GetCountry.GetCustom('government_prime_minister_custom_title')]"
  reserve_powers_pm_veto.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('government_prime_minister_custom_title')] [SCOPE.sCharacter('ceremonial_head_of_state').GetFullName] отказывается голосовать за закон [SCOPE.sLaw('current_law_scope').GetName] принимаемый в [SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')]. [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [GetPlayer.GetRuler.GetFullName] может заставить [SCOPE.GetRootScope.GetCountry.GetCustom('government_prime_minister_custom_title')] проголосовать за закон если [concept_government] обладает достаточной [concept_legitimacy]."
  reserve_powers_pm_veto.f: "Это событие произошло так как [SCOPE.GetRootScope.GetCountry.GetCustom('government_prime_minister_custom_title')] не согласен или сильно не согласен с принимемым [concept_law]. [concept_ruler] может продавить оппозицию [SCOPE.GetRootScope.GetCountry.GetCustom('government_prime_minister_custom_title')] если [concept_legitimacy] выше 50."
  reserve_powers_pm_veto_reject_option: "[SCOPE.GetRootScope.GetCountry.GetCustom('government_prime_minister_custom_title')] должен подчиниться воли [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]!"

