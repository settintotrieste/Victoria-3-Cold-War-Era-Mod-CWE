  anti_war_protest_crush.option: "Раздавить протестующих!"
  apply_pm_offense_defense_readjustment_minor_state.tt: "Все $building_barracks$, $building_naval_base$ и $building_conscription_center$ в [SCOPE.sState('war_protest_state').GetName] получают модификатор $pm_offense_defense_readjustment_minor$ на 6 месяцев."

  anti_war_protest_frenemies.t: "Крупные антивоенные демонстрации"
  anti_war_protest_frenemies.d: "Наши граждане потрясены, обнаружив, что они находятся в состоянии войны со страной, которая имеет ту же культурную структуру, что и они. В результате в [ROOT.GetCountry.GetName] вспыхнули массовые демонстрации, призывающие правительство прекратить то, что они считают бессмысленной войной против своих собратьев."
  anti_war_protest_frenemies.f: "Это событие возникло, поскольку [ROOT.GetCountry.GetName] находится на уровне [concept_war] со страной, у которой есть [Concept('concept_primary_cultures','$concept_primary_culture$')], имеющая то же наследие или черты, что и [Concept('concept_primary_cultures','$concept_primary_culture$')] из [ROOT.GetCountry.GetName]."

  anti_war_protest_blame_military.t: "Публичная петиция об увольнении командира"
  anti_war_protest_blame_military.d: "Из-за тяжелого положения, в котором находится [ROOT.GetCountry.GetName], общественность напала на непопулярного военачальника. Общественность обвиняет [SCOPE.sCharacter('unpopular_general').GetFullName] в череде недавних поражений и заклеймила его некомпетентностью. В адрес [ROOT.GetCountry.GetRuler.GetFullName] подана петиция с требованием увольнения [SCOPE.sCharacter('unpopular_general').GetFullName]."
  anti_war_protest_blame_military.f: "Это событие сработало, потому что это событие сработало, потому что у [ROOT.GetCountry.GetName] меньше -25 [concept_war_support] и есть генерал или адмирал, популярность которого меньше 25."
  anti_war_protest_sack_general.option: "Мешок [SCOPE.sCharacter('unpopular_general').GetFullName]"
  anti_war_protest_keep_general.option: "Пусть [SCOPE.sCharacter('unpopular_general').GetFullName] останется"
  sack_unpopular_general.tt: "[SCOPE.sCharacter('unpopular_general').GetFullName] уволен"

  anti_war_protest_sack_army_chief.t: "Хаос в Верховном командовании [ROOT.GetCountry.GetAdjectiveNoFlag]"
  anti_war_protest_sack_army_chief.d: "Очередная встреча генералов [ROOT.GetCountry.GetAdjectiveNoFlag] Вооруженных Сил сегодня переросла в суматоху, поскольку различные генералы во главе с [SCOPE.sCharacter('opposing_general').GetFullName] обвинили Верховного Главнокомандующего [SCOPE.sCharacter('unpopular_army_chief').GetFullName] в катастрофической череде недавних поражений, нанесенных [ROOT.GetCountry.GetName], и потребовали его отставки. Этот полномасштабный беспорядок в Верховном командовании [ROOT.GetCountry.GetAdjectiveNoFlag] расколол Вооруженные Силы и вызовет большие волнения среди офицеров и их солдат, если [SCOPE.sCharacter('unpopular_army_chief').GetFullName] не будет уволен [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [ROOT.GetCountry.GetRuler.GetFullName]."
  anti_war_protest_sack_army_chief.f: "Это событие возникло, поскольку [ROOT.GetCountry.GetName] имеет значение меньше -25 [concept_war_support]."
  anti_war_protest_sack_army_chief.option: "Мешок [SCOPE.sCharacter('unpopular_army_chief').GetFullName]"
  anti_war_protest_keep_army_chief.option: "Вместо этого удалите [SCOPE.sCharacter('opposing_general').GetFullName]"
