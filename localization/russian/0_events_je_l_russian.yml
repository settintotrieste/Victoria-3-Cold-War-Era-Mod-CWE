  je_impeachment_system: "Импичмент [SCOPE.sCharacter('impeached_president_scope').GetFullName]"
  je_impeachment_system_reason: "Согласно [ROOT.GetCountry.GetName] Конституции, Президент должен быть отстранен от должности в случае импичмента и осуждения за государственную измену, взяточничество или другие тяжкие преступления и проступки. Поскольку [SCOPE.sCharacter('impeached_president_scope').GetFullName] совершил преступление, влекущее за собой импичмент, в Конгрессе были приняты статьи об импичменте, предусматривающие отстранение президента от должности. Однако Конституция требует двух третей голосов Сената для вынесения обвинительного приговора, прежде чем президент может быть отстранен от должности.\n\n[SCOPE.sCharacter('impeached_president_scope').GetFullName] будет подвергнут импичменту и отстранен от должности, если значение [concept_legitimacy] упадет ниже 34 по истечении таймера."
  je_impeachment_system_1.tt: "[SCOPE.sCharacter('impeached_president_scope').GetFullName] подвергнут импичменту и отстранен от должности"
  je_impeachment_system_2.tt: "[SCOPE.sCharacter('impeached_president_scope').GetFullName] не подвергнут импичменту и не отстранен от должности"
  je_impeachment_system_3.tt: "[SCOPE.sCharacter('impeached_president_scope').GetFullName] либо коррумпирован, либо предатель, либо незаконно захватывает власть."
  je_impeachment_system_4.tt: "[SCOPE.sCharacter('impeached_president_scope').GetFullName] в последнее время не подвергался импичменту."
  je_impeachment_system_5.tt: "[SCOPE.sCharacter('impeached_president_scope').GetFullName] больше не президент"

  backbenchers_plot_politician: "Цель плана Backbencher"
  survived_backbenchers_plot: "Пережил заговор Backbencher"
  party_in_chaos_modifier: "Внутренний хаос"
  je_backbenchers_plot_system: "Заговор Backbencherer с целью изгнания [SCOPE.sCharacter('backbenchers_plot_prime_minister_scope').GetFullName]"
  je_backbenchers_plot_system_reason: "В соответствии с парламентской системой [ROOT.GetCountry.GetName] [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] может оставаться на своем посту только в том случае, если пользуется доверием парламента и правящей партии или коалиции. [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] обычно получает поддержку от членов парламента той же партии или правящей коалиции, однако могут быть случаи, когда эти члены стремятся вытеснить [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')], заявляя, что они больше не поддерживают [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')], или создавая внутреннее партийное руководство. вызов.\n\n[SCOPE.sCharacter('backbenchers_plot_prime_minister_scope').GetFullName] настолько ненавидят влиятельные члены правящей партии, что депутаты бросили вызов руководству, чтобы отстранить [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] от должности.\n\n[SCOPE.sCharacter('backbenchers_plot_prime_minister_scope').GetFullName] будет отстранен от должности, если какая-либо группа интересов в Правительство не имеет хотя бы нейтрального одобрения, когда таймер истекает."
  je_backbenchers_plot_system_1.tt: "[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [SCOPE.sCharacter('backbenchers_plot_prime_minister_scope').GetFullName] проигрывает вызов партийному лидерству и отстраняется от должности"
  je_backbenchers_plot_system_2.tt: "[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [SCOPE.sCharacter('backbenchers_plot_prime_minister_scope').GetFullName] побеждает в партийном руководстве, вызов не отстраняется от должности"
  je_backbenchers_plot_system_3.tt: "[SCOPE.sCharacter('backbenchers_plot_prime_minister_scope').GetFullName] в последнее время не был целью заговора сторонников"
  je_backbenchers_plot_system_4.tt: "[SCOPE.sCharacter('backbenchers_plot_prime_minister_scope').GetFullName] больше не является [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]"
  je_backbenchers_plot_system_5.tt: "[SCOPE.sCharacter('backbenchers_plot_prime_minister_scope').GetFullName] либо коррумпирован, либо предатель, незаконно захватывает власть, либо в [concept_government] есть хотя бы 1 Несчастный [concept_interest_group]."

  lost_confidence_vote_modifier: "Проиграл вотум недоверия"
