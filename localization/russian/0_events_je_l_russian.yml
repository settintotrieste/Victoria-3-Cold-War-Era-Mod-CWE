  oil_cartel_desc_1: "[ROOT.GetCountry.GetAdjective] нефтяная и газовая промышленность под контролем горстки корпораций, которые коллективно монополизируют всю добычу нефти и газа в [ROOT.GetCountry.GetName]. Такое влияние позволяет этим компаниям самостоятельно устанавливать цены на [GetGoods('oil').GetName] в стране регулирая добычу в [GetBuildingType('building_oil_rig').GetName]. \n\n[concept_government] может быть принять решение регулировать добычу нефти таким образом, чтобы цена на нефть определялась [concept_government] а не частными корпорациями. \n\nПримечание: Регулирование нефтяной и газовой промышленности позволит [concept_government] устанавливать квоту на добычу [GetGoods('oil').GetName] в то время как дерегулирование нефтяной и газовой промышленности возволит частному сектору устанавливать квтоты на основе [concept_market_price] [GetGoods('oil').GetName]."
  oil_cartel_desc_2: "При плановой экономке [ROOT.GetCountry.GetName], нефтяная и газовая промышленность контролируется и регулируется напрямую [concept_government] через Министерство Нефтедобычи. Это позволяет [concept_government] напрямую управляет уровнем добычи в [GetBuildingType('building_oil_rig').GetName]."

