  notification_party_update_notification_name: "[SCOPE.gsInterestGroup('IG_expelled_from_party').GetName] присоединяется к [SCOPE.sParty('new_IG_party').GetName]"
  notification_party_update_notification_desc: "С целью повысить свои шансы на выборах, [SCOPE.gsInterestGroup('IG_expelled_from_party').GetName] отложил свои разногласия и и образовал с [SCOPE.sParty('new_IG_party').GetName] политический альянс. \n\nЭто произошло так как [GetLawType('law_first_past_the_post').GetGroup.GetName] поощряет [Concept('concept_party', '$concept_parties$')] консолидироваться в рамках двухпартийной системы."

  notification_party_leave_update_notification_name: "[SCOPE.gsInterestGroup('IG_expelled_from_party').GetName] покидает [SCOPE.sParty('party_affected_by_expulsion_IG').GetName]"
  notification_party_leave_update_notification_desc: "Ссылаясь на непримиримые разногласия, [SCOPE.gsInterestGroup('IG_expelled_from_party').GetName] принял решение покинуть [SCOPE.sParty('party_affected_by_expulsion_IG').GetName]. \n\nЭто произошло так как [SCOPE.gsInterestGroup('IG_expelled_from_party').GetName] [concept_approval] #r Недовольство#!."

