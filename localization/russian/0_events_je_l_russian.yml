  notification_appointed_new_resident_general_notification_desc: "[SCOPE.sCountry('source_country').GetCapital.GetCityHubName] назначили [SCOPE.sCharacter('new_resident_general').GetFullName] в качестве нового [SCOPE.sCharacter('new_resident_general').GetPrimaryRoleTitle] в [SCOPE.sCountry('target_country').GetName]."

