  request_imf_loan_decision: "Взять кредит в Международном валютном фонде"
  request_imf_loan_decision_desc: "МВФ был создан в 1944 году после Великой депрессии 1930-х годов с целью создания основы международного экономического сотрудничества. МВФ предоставляет кредиты, в том числе экстренные, странам-членам, испытывающим реальные или потенциальные проблемы с платежным балансом. Цель состоит в том, чтобы помочь им восстановить свои международные резервы, стабилизировать свои валюты, продолжать платить за импорт и восстановить условия для сильного экономического роста, исправляя при этом основные проблемы."
  IMF_loan_request.t: "Участвовать в кредите МВФ для [SCOPE.sCountry('imf_loan_debtor').GetName]?"
  IMF_loan_request.d: "[SCOPE.sCountry('imf_loan_debtor').GetName] в настоящее время сталкивается с серьезными трудностями при выполнении платежного баланса. В результате ее дипломаты обратились в Международный валютный фонд ООН с просьбой о кредите, чтобы помочь ей погасить непогашенные в настоящее время долги. Поскольку ресурсы МВФ в основном поступают из денег, которые страны платят в качестве подписки на капитал (квоты), когда они становятся членами, [SCOPE.sCountry('imf_loan_creditor').GetName] был призван предоставить финансирование [SCOPE.sCountry('imf_loan_debtor').GetName]."
  IMF_loan_request.f: "Решение предоставить кредит [SCOPE.sCountry('imf_loan_debtor').GetName] создаст дипломатический договор о банкролле между [SCOPE.sCountry('imf_loan_debtor').GetName] и [SCOPE.sCountry('imf_loan_creditor').GetName], который не может быть расторгнут в течение 5 лет, если только мы сами не станем неплатежеспособными или не опустимся до более низкого ранга, чем должник."
  imf_loan_option.1: "Мы дадим им кредит."
  imf_loan_option.2: "У нас самих финансовые проблемы..."
  imf_loan_option.3: "Не беспокой меня более с этим событием!"

  IMF_loan_terms.t: "Экономические реформы МВФ"
  IMF_loan_terms.d: "Условия кредитного соглашения между МВФ и [SCOPE.sCountry('imf_loan_debtor').GetName] заключаются в том, что должник должен провести масштабную реформу своей экономической системы для содействия свободному рынку и ограничению государственных расходов. Правительство [SCOPE.sCountry('imf_loan_debtor').GetName], таким образом, обязано принять законы, чтобы открыть свои рынки для мира, приватизировать свои государственные компании и обуздать печатание денег."
  IMF_loan_terms.f: "Это событие произошло потому, что мы не выполнили требования МВФ о свободном, конкурентном рынке на момент подписания долгового соглашения или в любое время в течение срока действия соглашения."
  imf_loan_terms: "У нас нет другого выбора, кроме как принять диктат МВФ."

  imf_loan_debtor: "Должник по кредиту МВФ"
  imf_loan_creditor: "Кредитор МВФ"

  UN_imf_interest_rate.t: "Изменение процентных ставок МВФ"
  UN_imf_interest_rate.1.d: "Председатель Международного валютного фонда объявил об изменении процентной ставки по своим кредитам странам-должникам. Отныне процентная ставка будет ОЧЕНЬ НИЗКАЯ."
  UN_imf_interest_rate.2.d: "Председатель Международного валютного фонда объявил об изменении процентной ставки по своим кредитам странам-должникам. Отныне процентная ставка будет НИЗКОЙ."
  UN_imf_interest_rate.3.d: "Председатель Международного валютного фонда объявил об изменении процентной ставки по своим кредитам странам-должникам. Отныне процентная ставка будет СРЕДНЕЙ."
  UN_imf_interest_rate.4.d: "Председатель Международного валютного фонда объявил об изменении процентной ставки по своим кредитам странам-должникам. Отныне процентная ставка будет ВЫСОКОЙ."
  UN_imf_interest_rate.5.d: "Председатель Международного валютного фонда объявил об изменении процентной ставки по своим кредитам странам-должникам. Отныне процентная ставка будет ОЧЕНЬ ВЫСОКОЙ."
  UN_imf_interest_rate.f: "[SCOPE.sCountry('imf_interest_rate_target').GetName] подчиняется процентным ставкам МВФ, а не глобальной средней процентной ставке, поскольку в настоящее время он занимает деньги у МВФ. Процентная ставка МВФ определяется средним глобальным экономическим прогнозом, где более плохой прогноз означает более низкие процентные ставки, и наоборот."
  IMF_interest_rate_acknowledgement: "Проинформирован"

  very_low_imf_interest_rate: "Очень низкая среднемировая процентная ставка"
  low_imf_interest_rate: "Низкие среднемировые процентные ставки"
  medium_imf_interest_rate: "Обычные среднемировые процентные ставки"
  high_imf_interest_rate: "Высокие среднемировые процентные ставки"
  very_high_imf_interest_rate: "Очень высокие среднемировые процентные ставки"

  request_imf_loan.tt: "Запросить у кредиторов МВФ взять на себя #white 5%#! [ROOT.GetCountry.GetAdjective] [Concept('concept_credit','$concept_credit_debt$')] или [concept_bankroll] [ROOT.GetCountry.GetName]"

  notification_imf_loan_take_debt_notification_name: "[SCOPE.sCountry('imf_loan_creditor').GetName] спасает [SCOPE.sCountry('imf_loan_debtor').GetName]"
  notification_imf_loan_take_debt_notification_desc: "[SCOPE.sCountry('imf_loan_creditor').GetName] согласились принять участие в кредите Международного валютного фонда для [SCOPE.sCountry('imf_loan_debtor').GetName] предложив взять на себя 5% [SCOPE.sCountry('imf_loan_debtor').GetAdjective] [Concept('concept_credit','$concept_credit_debt$')]."

  notification_imf_loan_bankroll_notification_name: "[SCOPE.sCountry('imf_loan_creditor').GetName] спасает [SCOPE.sCountry('imf_loan_debtor').GetName]"
  notification_imf_loan_bankroll_notification_desc: "[SCOPE.sCountry('imf_loan_creditor').GetName] согласились принять участие в кредите Международного валютного фонда для [SCOPE.sCountry('imf_loan_debtor').GetName] предложив [Concept('concept_bankroll','$concept_bankrolling$')] в [SCOPE.sCountry('imf_loan_debtor').GetName]."

  je_imf_system: "Международный валютный фонд"
  je_imf_system_reason: "МВФ был создан в 1944 году после Великой депрессии 1930-х годов с целью формирования основы для международного экономического сотрудничества. МВФ предоставляет кредиты, в том числе экстренные, странам-членам, испытывающим фактические или потенциальные проблемы с платежным балансом. Цель состоит в том, чтобы помочь им восстановить свои международные резервы, стабилизировать свои валюты, продолжать оплачивать импорт и восстановить условия для устойчивого экономического роста, одновременно устраняя лежащие в основе проблемы. \n\n#white Сила валюты:#! [SCOPE.GetRootScope.GetCountry.GetCustom('currency_strength_custom_loc')]"
  je_imf_system_status: "Невостребованные глобальные [concept_sdr]: @money![GetGlobalVariable('SDR_global_marketplace_amount_display').GetValue]M \nНациональные [concept_sdr]: @money![GetPlayer.MakeScope.Var('SDR_local_actual_amount_display').GetValue]M \nГлобальные [concept_sdr]: @money![GetPlayer.MakeScope.Var('SDR_global_amount_display').GetValue]M"

  notification_imf_grateful_country_notification_name: "Улучшены [concept_relations] с [SCOPE.sCountry('grateful_imf_country').GetName]"
  notification_imf_grateful_country_notification_desc: "[SCOPE.sCountry('grateful_imf_country').GetName] благодарна за [SCOPE.sCountry('this_imf_country').GetAdjective] вклад в глоабльный невостребованный [concept_sdr] фонд. Это увеличило [SCOPE.sCountry('grateful_imf_country').GetAdjective] [concept_relations] к [SCOPE.sCountry('this_imf_country').GetName] на #Green 10#!"

