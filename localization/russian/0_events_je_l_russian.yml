  recently_appointed_judges.tt: "[concept_government] не назначал судью [SCOPE.GetRootScope.GetCountry.GetCustom('supreme_court_name')] за последние 12 месяцев."
  je_judiciary_expand_court_button: "Расширить суд"
  recently_expanded_court.tt: "[concept_government] не расширял [SCOPE.GetRootScope.GetCountry.GetCustom('supreme_court_name')] за последние 12 месяцев."
  je_judiciary_expand_court_button_desc: "[concept_government] может принять законодательное решение об увеличении общего числа судей в коллегии [SCOPE.GetRootScope.GetCountry.GetCustom('supreme_court_name')] максимум до 20 судей. Новая вакантная должность будет затем заполнена судьей, назначенным правительством, где это применимо."
