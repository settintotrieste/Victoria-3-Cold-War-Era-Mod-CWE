  je_private_media_system: "[ROOT.GetCountry.GetAdjectiveNoFormatting] СМИ"
  je_private_media_system_reason: "Средства массовой информации в [ROOT.GetCountry.GetName] контролируются консорциумом крупных частных новостных сетей, которые коллективно монополизируют распространение всех новостей в стране. Это дает владельцам этих сетей - [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetNameWithCountryVariant] и [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetNameWithCountryVariant], огромные возможности влиять на сердца и умы [ROOT.GetCountry.GetAdjective] людей. \n\nЗавоевание лояльности частных СМИ имеет важное значение, если мы не хотим, чтобы они использовали свое влияние против [concept_government]. \n\n@warning! СМИ будут либо поддерживать (если лояльность частных СМИ как минимум 50%) либо подрывать (если лояльность частных СМИ ниже 50%) [concept_government] когда полоса прогресса достигнет 100%. \n\nПримечание: #y Лояльность частных СМИ#! будет расти когда одобрение [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetNameWithCountryVariant] и [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetNameWithCountryVariant] как минимум нейтральное и будет падать если те же группы интересов имеют негативное одобрение или если [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetNameWithCountryVariant] или [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetNameWithCountryVariant] не входят в состав [concept_government]."

