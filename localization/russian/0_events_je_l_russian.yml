  je_cabinet: "[ROOT.GetCountry.GetRuler.GetLastName] и [SCOPE.GetRootScope.GetCountry.GetCustom('cabinet_name_custom_title')]"
  je_cabinet_reason: "$RULING_PARTY_IDEOLOGY_cabinet_JE$ \n\n[SCOPE.GetRootScope.GetCountry.GetCustom('cabinet_name_custom_title')] - это орган советников главы государства, которые также выполняют функции руководителей правительственных ведомств. [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]  назначает его членов.  \n\n[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [ROOT.GetCountry.GetRuler.GetFullName] может пригласить любую [Concept('concept_interest_group', 'заинтересованную группу')] из [Concept('concept_government', 'правительства')] присоединиться к [SCOPE.GetRootScope.GetCountry.GetCustom('cabinet_name_custom_title')], дав его лидеру должность в кабинете министров с помощью взаимодействия с персонажем. \n\nЕдинство кабинета рассчитывается путем деления 100 на количество [Concept('concept_interest_group', 'заинтересованных групп')] в [Concept('concept_government', 'правительстве')] (у вас сейчас [GetPlayer.MakeScope.Var('cabinet_unity_divisor_var').GetValue]), у которых нет как минимум #BOLD 0#! [concept_approval]. $HOG_cabinet$ \n\n#BOLD [Concept('concept_interest_group', '$concept_interest_groups$')] министров:#! $ig_armed_forces_minister$ $ig_intelligentsia_minister$ $ig_rural_folk_minister$ $ig_landowners_minister$ $ig_trade_unions_minister$ $ig_petty_bourgeoisie_minister$ $ig_industrialists_minister$ \n\n#BOLD Глава государственной службы:#! [SCOPE.gsInterestGroup('ig_intelligentsia_cabinet_scope').GetLeader.GetFullName] \n\n#BOLD Глава вооружённых сил:#! [SCOPE.gsInterestGroup('ig_armed_forces_cabinet_scope').GetLeader.GetFullName]"
  je_cabinet_status: "Единство кабинета министров: [GetPlayer.MakeScope.Var('cabinet_unity_var').GetValue]%"
  je_issue_executive_order_button: "Издать исполнительный приказ"
  je_issue_executive_order_button_desc: "Исполнительный указ позволит нам обойти необходимость иметь большинство в [SCOPE.GetRootScope.GetCountry.GetCustom('upper_house_name')] и увеличить [concept_legitimacy]."

  je_issue_royal_decree_button: "Издать королевский указ"
  je_issue_royal_decree_button_desc: "[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [ROOT.GetCountry.GetRuler.GetFullName] может издать королевский указ, призывающий [concept_government] и [concept_opposition] отказаться от своих разногласий и сформировать правительство единства. Этот акт королевского вмешательства облегчит формирование правительств с идеологически расходящимися [Concept('concept_interest_group', '$concept_interest_groups$')]."

  je_call_elections_button: "Внеочередные выборы"
  je_call_elections_button_desc: "В соответствии с парламентской системой [ROOT.GetCountry.GetName] [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] может распустить парламент в любое время для созыва [concept_election]."
  je_enact_state_of_emergency_button: "Объявить чрезвычайное положение"
  je_enact_state_of_emergency_button_desc: "Чрезвычайное положение дает [concept_government] больше [concept_legitimacy] и отменяет необходимость удерживать [concept_election]."
  je_lift_state_of_emergency_button: "Прекращение чрезвычайного положения"
  je_lift_state_of_emergency_button_desc: "[concept_government] отменит чрезвычайное положение в [ROOT.GetCountry.GetName]. Это снова включает [Concept('concept_election', '$concept_elections$')]."

  je_commence_democratic_reform_button: "Начать демократические реформы"
  je_commence_democratic_reform_button_desc: "Действующий [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] будет заменен [SCOPE.GetRootScope.GetCountry.GetCustom('cabinet_name_custom_title')] на демократический, чтобы позволить [concept_government] начать принимать более либеральные [Concept('concept_law','$concept_laws$')]."

  unconstitutional_state_of_emergency.t: "Неконституционное чрезвычайное положение"
  unconstitutional_state_of_emergency.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('supreme_court_name')] постановил, что введение [ROOT.GetCountry.GetRuler.GetFullName] чрезвычайного положения в [ROOT.GetCountry.GetName] является незаконным, поскольку оно применяется в период, когда в стране нет фактического чрезвычайного положения. Поэтому суд предписывает правительству отменить чрезвычайное положение."
