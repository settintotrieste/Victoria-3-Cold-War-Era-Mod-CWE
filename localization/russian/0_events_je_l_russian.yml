  concept_upper_house: "Верхняя палата"
  concept_upper_house_desc: "Верхняя палата — это одна из двух палат двухпалатного законодательного органа, вторая палата — нижняя палата. Палата, формально обозначенная как верхняя палата, обычно меньше и часто имеет более ограниченные полномочия, чем нижняя палата."
  concept_lower_house: "Нижняя палата"
  concept_lower_house_desc: "Нижняя палата — одна из двух палат двухпалатного законодательного органа, вторая палата — верхняя палата. Несмотря на свое официальное положение «ниже» верхней палаты, во многих законодательных органах мира нижняя палата стала обладать большей властью или иным образом оказывать значительное политическое влияние."

