  je_one_china_policy_PRC.tt: "$DIPLO_ACTION_RELATIONS$ Демократическая сверхдержава - это не менее $relations_cordial$"
  je_one_china_policy_PRC: "Вступить в Организацию Объединенных Наций"
  je_one_china_policy_PRC_reason: "Как наследие гражданской войны в Китае, [SCOPE.sCountry('republic_of_china_un_seat').GetName] в настоящее время представляет Китай в Организации Объединенных Наций. Это означает, что [SCOPE.sCountry('republic_of_china_un_seat').GetName] пользуется международным признанием, а [ROOT.GetCountry.GetName] — нет. Такая ситуация является серьезной несправедливостью по отношению к народу [ROOT.GetCountry.GetAdjective]. Поэтому мы должны стремиться занять место [SCOPE.sCountry('republic_of_china_un_seat').GetName] в Организации Объединенных Наций."
  je_one_china_policy_ROC.tt: "$DIPLO_ACTION_RELATIONS$ коммунистическая сверхдержава - это не менее $relations_amicable$"
  je_one_china_policy_ROC: "Вступить в Организацию Объединенных Наций"
  je_one_china_policy_ROC_reason: "Как наследие гражданской войны в Китае, [SCOPE.sCountry('republic_of_china_un_seat').GetName] в настоящее время представляет Китай в Организации Объединенных Наций. Это означает, что [SCOPE.sCountry('republic_of_china_un_seat').GetName] пользуется международным признанием, а [ROOT.GetCountry.GetName] — нет. Такая ситуация является серьезной несправедливостью по отношению к народу [ROOT.GetCountry.GetAdjective]. Поэтому мы должны стремиться занять место [SCOPE.sCountry('republic_of_china_un_seat').GetName] в Организации Объединенных Наций."

  je_kmt_becomes_taiwan_button: "Стать Тайванем"
  je_kmt_becomes_taiwan_button_desc: "[ROOT.GetCountry.GetName] может положить конец политике единого Китая, переименовав себя в Тайвань и отказавшись от всех претензий на материковый Китай."
  je_kmt_becomes_taiwan_button.tt: "Правительство $dyn_c_republic_of_china$ сослано в $STATE_FORMOSA$."

  lower_prestige_than_THIS.tt: "В [SCOPE.sCountry('prestige_comparator_country').GetName] меньше [concept_prestige], чем в этой стране"

  national_reconciliation: "Национальное примирение"
  je_apartheid: "Апартеид в [ROOT.GetCountry.GetNameNoFlag]"
  je_apartheid_reason: "Апартеид — это система институционализированной расовой сегрегации, созданная с целью обеспечения того, чтобы в стране по-прежнему доминировала политическая, социальная и экономическая определенная культура.\n\nВ настоящее время в [ROOT.GetCountry.GetName] мы действуем в режиме апартеида, поскольку мы приняли либо $law_ethnostate$, $law_national_supremacy$ или $law_racial_segregation$ [concept_law]. Эта система апартеида будет полностью демонтирована только в том случае, если мы примем $law_multicultural$ [concept_law]."

  je_develop_nuclear_weapons: "Программа ядерного оружия"
  je_develop_nuclear_weapons_reason: "[ROOT.GetCountry.GetName] в настоящее время пытается создать свое собственное ядерное оружие. Это грандиозная задача, требующая от ученых [ROOT.GetCountry.GetAdjective] исследования $tech_military_nuclear_3$ [concept_technology], а от военных - строительства в стране как минимум 1 $building_nuclear_weapons_silo$ [concept_building]."
  je_develop_nuclear_weapons_1.tt: "В стране есть по крайней мере 1 $building_nuclear_weapons_silo$ [concept_building]"
  je_develop_nuclear_weapons_2.tt: "Не имеет $pause_nuclear_weapons_development$ ни с одной страной."

  je_develop_chemical_weapons: "Программа создания химического оружия"
  je_develop_chemical_weapons_reason: "[ROOT.GetCountry.GetName] в настоящее время пытается создать свое собственное химическое оружие. Это требует от ученых [ROOT.GetCountry.GetAdjective] исследования $tech_military_support_1$ [concept_technology], а от военных - строительства в стране как минимум 1 $building_industrial_chemicals_factory$ [concept_building]"
  je_develop_chemical_weapons_1.tt: "В стране есть хотя бы 1 $building_industrial_chemicals_factory$ [concept_building]"

  je_develop_chemical_weapons_goal: "Прогресс программы химического оружия составляет 100%"

  je_develop_biological_weapons: "Программа создания биологического оружия"
  je_develop_biological_weapons_reason: "[ROOT.GetCountry.GetName] в настоящее время пытается создать свое собственное биологическое оружие. Это требует от ученых [ROOT.GetCountry.GetAdjective] исследования $tech_agriculture_4$ [concept_technology], а от военных - строительства в стране как минимум 1 $building_university$ [concept_building]."
  je_develop_biological_weapons_1.tt: "В стране есть хотя бы 1 $building_university$ [concept_building]"
  
  je_develop_biological_weapons_goal: "Прогресс программы биологического оружия составляет 100%"

  political_survivor: "Политический выживший"

  gold_standard_leader: "Лидер золотого стандарта"
  je_bretton_woods_system_leader.1.tt: "Страна с $law_gold_standard$ имеет более высокий [concept_gdp], чем [SCOPE.sCountry('bretton_woods_system_leader').GetName]."
  je_bretton_woods_system_leader.2.tt: "Ни в одной стране мира нет $law_semi_gold_standard$"
  je_bretton_woods_system_leader.3.tt: "В этой стране самый высокий [concept_gdp] среди всех стран с $law_gold_standard$."
  je_bretton_woods_system_leader: "Бреттон-Вудская система"
  je_bretton_woods_system_leader_reason: "Бреттон-Вудская система, возглавляемая [SCOPE.sCountry('bretton_woods_system_leader').GetName], представляет собой полностью согласованный денежный порядок, предназначенный для регулирования денежных отношений между независимыми государствами. Бреттон-Вудская система требовала от стран гарантировать конвертируемость своих валют в [SCOPE.sCountry('bretton_woods_system_leader').GetAdjectiveNoFlag] деньги с точностью до 1% от фиксированного паритетного курса, при этом доллар конвертировался в золотые слитки для иностранных правительств и центральных банков по установленной цене за тройскую унцию чистого золота.\n\nЭффект этой системы заключается в том, что $lawgroup_monetary_policy$ всех стран с $law_semi_gold_standard$ будет противоположным тому, что имеет [ROOT.GetCountry.GetName]."
  je_bretton_woods_system_leader_status: "Подписавшиеся: [GetPlayer.MakeScope.Var('bretton_woods_total_members').GetValue]"
  je_bretton_woods_system_member.1.tt: "Ни одна страна в мире не является $gold_standard_leader$"
  je_bretton_woods_system_member.2.tt: "Есть страна, которая является $gold_standard_leader$"
  je_bretton_woods_system_member.3.tt: "Эта страна является младшим партнером [concept_currency_union]"
  je_bretton_woods_system_member.4.tt: "Эта страна не является младшим партнером [concept_currency_union]"
  je_bretton_woods_system_member: "Бреттон-Вудская система"
  je_bretton_woods_system_member_reason: "Бреттон-Вудская система, возглавляемая [SCOPE.sCountry('bretton_woods_system_leader').GetName], представляет собой полностью согласованный денежный порядок, предназначенный для регулирования денежных отношений между независимыми государствами. Бреттон-Вудская система требовала от стран гарантировать конвертируемость своих валют в [SCOPE.sCountry('bretton_woods_system_leader').GetAdjectiveNoFlag] деньги с точностью до 1% от фиксированного паритетного курса, при этом доллар конвертировался в золотые слитки для иностранных правительств и центральных банков по установленной цене за тройскую унцию чистого золота.\n\nЭффект этой системы заключается в том, что $lawgroup_monetary_policy$ всех стран с $law_semi_gold_standard$ будет противоположным тому, что имеет [SCOPE.sCountry('bretton_woods_system_leader').GetName]."
  je_bretton_woods_system_member_status: "Подписавшиеся: [GetPlayer.MakeScope.Var('bretton_woods_total_members').GetValue]"

  je_perestroika: "Перестройка"
  je_perestroika_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [SCOPE.sCharacter('perestroika_ruler').GetFullName], демократический [concept_ruler], обнародовал смелый план на [ROOT.GetCountry.GetName]: страна должна быть преобразована в $gov_soviet_republic$, где будет отменено полностью централизованное экономическое планирование и ослаблены политические ограничения. С этой целью [SCOPE.sCharacter('perestroika_ruler').GetFullName] стремится принять [Concept('concept_law', '$concept_laws$')], который создаст этот новый рай для рабочих.\n\nОбратите внимание, что коммунистические сторонники жесткой линии в [ROOT.GetCountry.GetName] не будут довольны этим планом и будут агитировать за удаление [SCOPE.sCharacter('perestroika_ruler').GetFullName]."

  icj_judgement_winner.t: "Благоприятное решение Международного Суда"
  icj_judgement_winner.d: "Международный Суд вынес решение в пользу [SCOPE.sCountry('icj_judgement_winner').GetName] в территориальном арбитражном деле [SCOPE.sCountry('icj_judgement_winner').GetNameNoFlag] против [SCOPE.sCountry('icj_judgement_loser').GetNameNoFlag] и постановил, что оспариваемые [concept_homeland] в [SCOPE.sCountry('icj_judgement_loser').GetName] по праву и исключительно являются [SCOPE.sCountry('icj_judgement_winner').GetAdjective]. Таким образом, суд обязал [SCOPE.sCountry('icj_judgement_loser').GetName] вернуть их в [SCOPE.sCountry('icj_judgement_winner').GetName]."
  icj_judgement_winner.f: "[SCOPE.sCountry('icj_judgement_loser').GetName] не потеряет родные земли на всех принадлежащих ему родных землях [SCOPE.sCountry('icj_judgement_winner').GetAdjective] и [SCOPE.sCountry('icj_judgement_loser').GetAdjective]. [SCOPE.sCountry('icj_judgement_loser').GetName] теперь будет иметь возможность выбирать, возвращать ли эти состояния."
  icj_judgement_winner.option: "Правосудие свершилось!"

  icj_judgement_loser_target.t: "Неблагоприятное решение Международного Суда"
  icj_judgement_loser_target.d: "Международный Суд вынес решение в пользу [SCOPE.sCountry('icj_judgement_winner').GetName] в территориальном арбитражном деле [SCOPE.sCountry('icj_judgement_winner').GetNameNoFlag] против [SCOPE.sCountry('icj_judgement_loser').GetNameNoFlag] и постановил, что оспариваемые [concept_homeland] в [SCOPE.sCountry('icj_judgement_loser').GetName] по праву и исключительно являются [SCOPE.sCountry('icj_judgement_winner').GetAdjective]. Таким образом, суд обязал [SCOPE.sCountry('icj_judgement_loser').GetName] вернуть их в [SCOPE.sCountry('icj_judgement_winner').GetName]."
  icj_judgement_loser_target.f: "[SCOPE.sCountry('icj_judgement_loser').GetName] не потеряет родные земли во всех [SCOPE.sCountry('icj_judgement_winner').GetAdjective] и [SCOPE.sCountry('icj_judgement_loser').GetAdjective], если решит вернуть их в [SCOPE.sCountry('icj_judgement_winner').GetName]."
  icj_judgement_loser.option.1: "Мы принимаем решение суда"
  icj_judgement_loser.option.2: "Суд ошибся!"

  icj_judgement_rejection.t: "[SCOPE.sCountry('icj_judgement_loser').GetName] Отклоняет решение Международного Суда"
  icj_judgement_rejection.d: "[SCOPE.sCountry('icj_judgement_loser').GetName] отказался признать решение Международного Суда, вынесенное в пользу [SCOPE.sCountry('icj_judgement_winner').GetName]. Они утверждают, что судьи были предвзяты и неправы в применении международного права, и поэтому их решение не будет признано [SCOPE.sCountry('icj_judgement_loser').GetName]."
  icj_judgement_rejection.f: "[SCOPE.sCountry('icj_judgement_loser').GetName] сохранит свои хоумленды на всех хоумлендах [SCOPE.sCountry('icj_judgement_winner').GetAdjective] и [SCOPE.sCountry('icj_judgement_loser').GetAdjective], которыми он владеет."
  icj_judgement_rejection.option: "Международное право – это шутка"

  icj_judgement_loser.t: "Неблагоприятное решение Международного Суда"
  icj_judgement_loser.d: "Международный Суд вынес решение в пользу [SCOPE.sCountry('icj_judgement_winner').GetName] в территориальном арбитражном деле [SCOPE.sCountry('icj_judgement_winner').GetName] против [SCOPE.sCountry('icj_judgement_loser').GetName] и постановил, что оспариваемые [concept_homeland] в [SCOPE.sCountry('icj_judgement_winner').GetName] по праву и исключительно являются [SCOPE.sCountry('icj_judgement_winner').GetAdjective]. Таким образом, суд постановил не изменять границы между этими двумя странами."
  icj_judgement_loser.f: "[SCOPE.sCountry('icj_judgement_loser').GetName] не потеряет родные земли на всех [SCOPE.sCountry('icj_judgement_winner').GetAdjective] и [SCOPE.sCountry('icj_judgement_loser').GetAdjective] родных землях, которыми владеет [SCOPE.sCountry('icj_judgement_winner').GetName]."

  won_a_war.t: "Выиграл войну"
  won_a_war.d: "[ROOT.GetCountry.GetName] одержал победу в войне, в которой он участвовал. Люди [ROOT.GetCountry.GetAdjectiveNoFlag] радуются и восхваляют руководство [SCOPE.sCharacter('war_ruler_scope').GetFullName] и генерала [SCOPE.sCharacter('supreme_commander_scope').GetFullName]!"
  won_a_war.f: "Это событие возникло, поскольку [ROOT.GetCountry.GetName] навязал [concept_war_goal] в [concept_war]."
  won_a_war.option: "Отличный!"

  lost_a_war.t: "Проиграл войну"
  lost_a_war.d: "[ROOT.GetCountry.GetName] потерпел поражение в войне, в которой он участвовал. Люди [ROOT.GetCountry.GetAdjectiveNoFlag] в ярости и обвиняют руководство [SCOPE.sCharacter('war_ruler_scope').GetFullName] и генерала [SCOPE.sCharacter('supreme_commander_scope').GetFullName] в позорном поражении!"
  lost_a_war.f: "Это событие возникло, потому что [ROOT.GetCountry.GetName] капитулировал в [concept_war]."
  lost_a_war.option: "Что есть, то есть."

  inconclusive_war.t: "Война закончена"
  inconclusive_war.d: "[ROOT.GetCountry.GetName] пролил много крови и сокровищ в войне, в которой участвовал, но ничего не получил лично. Люди [ROOT.GetCountry.GetAdjectiveNoFlag] недовольны тем, что их страна вела войну на благо других, и критикуют руководство [SCOPE.sCharacter('war_ruler_scope').GetFullName] и генерала [SCOPE.sCharacter('supreme_commander_scope').GetFullName] за эту бессмысленную войну!"
  inconclusive_war.f: "Это событие возникло, поскольку [ROOT.GetCountry.GetName] не капитулировал и не принуждал к исполнению какие-либо [concept_war_goal], принадлежащие [ROOT.GetCountry.GetName] в [concept_war]."
  inconclusive_war.option: "Мы старались изо всех сил..."

