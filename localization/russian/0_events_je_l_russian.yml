  form_nordic_council_decision_desc: "Северный совет является официальным органом официального межпарламентского сотрудничества Северных стран. Основанная в 1952 году, она насчитывает 87 представителей из Дании, Финляндии, Исландии, Норвегии и Швеции, а также из автономных территорий Фарерских островов, Гренландии и Аландских островов. Представители являются членами парламентов в своих странах или регионах и избираются этими парламентами."
  join_nordic_council_decision: "Присоединться к Северному Совету"
  join_nordic_council_decision_desc: "Северный совет является официальным органом официального межпарламентского сотрудничества Северных стран. Основанная в 1952 году, она насчитывает 87 представителей из Дании, Финляндии, Исландии, Норвегии и Швеции, а также из автономных территорий Фарерских островов, Гренландии и Аландских островов. Представители являются членами парламентов в своих странах или регионах и избираются этими парламентами."
  leave_nordic_council_decision: "Покинуть Северный Совет"
  leave_nordic_council_decision_desc: "Северный совет является официальным органом официального межпарламентского сотрудничества Северных стран. Основанная в 1952 году, она насчитывает 87 представителей из Дании, Финляндии, Исландии, Норвегии и Швеции, а также из автономных территорий Фарерских островов, Гренландии и Аландских островов. Представители являются членами парламентов в своих странах или регионах и избираются этими парламентами."
