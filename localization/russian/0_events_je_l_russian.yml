  Korean_Armistice_Agreement_1953.t: "Соглашение о перемирии в Корее?"
  Korean_Armistice_Agreement_1953.d: "Соглашение о перемирии в Корее — это перемирие, которое привело к прекращению боевых действий в Корейской войне. Его подписали генерал-лейтенант армии США Уильям Харрисон-младший и генерал Марк Кларк, представляющие Командование Организации Объединенных Наций (UNC), лидер Северной Кореи Ким Ир Сен и генерал Нам Ир, представляющие Корейскую народную армию (КНА), и Пэн Дэхуай, представляющий Китайскую народную добровольческую армию (ПВА). Перемирие было подписано 27 июля 1953 года и было призвано «обеспечить полное прекращение боевых действий и всех действий вооруженной силы в Корее до тех пор, пока не будет достигнуто окончательное мирное урегулирование»."
  identity_diplomatic: "Дипломатическая организация"
  identity_diplomatic_desc: "Эта Идентичность направлена ​​на содействие глобальному развитию и миру между странами-членами путем создания единого дипломатического форума для разрешения споров и содействия сотрудничеству."
  concept_cleric_character: "Священник"
  treaty_name_New_York_Agreement_NET_IDO: "Нью-Йоркское соглашение"
  enact_corporate_state_decision: "Провозгласить $law_corporate_state$"
  enact_corporate_state_decision_desc: "Государственный корпоративизм — это политическая и экономическая система, в которой государство упреждающе организует граждан и группы интересов (например, профсоюзы и бизнес-ассоциации) в эксклюзивные, признанные государством монополии. Согласно этой модели, эти группы не являются независимыми; они действуют как контролируемые инструменты правительства для реализации политики и управления обществом."
