  je_economic_outlook_system: "Национальный экономический прогноз"
  je_economic_outlook_system_reason: "Национальный экономический прогноз [ROOT.GetCountry.GetName] является мерой ожидаемого будущего состояния экономики, охватывающей такие факторы, как темпы роста, уровень занятости и уровень инфляции. Он служит прогнозом общего состояния и производительности экономики за определенный период. \n\nТекущая экономическая оценка: [GetPlayer.MakeScope.Var('economic_strength_var').GetValue] / 40 \n\nТекущая экономическая перспектива: [SCOPE.GetRootScope.GetCountry.GetCustom('economic_outlook_custom_title')] \n\n#BOLD Разбивка оценок:#! $economic_strength_economic_laws$ $economic_strength_government_finances$ $economic_strength_corruption$ $economic_strength_stock_market$ $economic_strength_national_economy$ $economic_strength_global_economy$ $economic_strength_core_inflation$ $economic_strength_wars$"
