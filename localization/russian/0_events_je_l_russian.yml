  je_paramilitary_groups_reason: "[ROOT.GetCountry.GetAdjectiveNoFlag] [SCOPE.GetRootScope.GetCountry.GetCustom('paramilitary_group_custom_title')] — национальная военизированная организация. \n\n[SCOPE.GetRootScope.GetCountry.GetCustom('paramilitary_group_custom_title')] позволяет нам провести массовые чистки в таких группах как [Concept('concept_politician', '$concept_politicians$')], [Concept('concept_agitator', '$concept_agitators$')], [Concept('concept_general', '$concept_generals$')] и [Concept('concept_admiral', '$concept_admirals$')]. \n\n[SCOPE.GetRootScope.GetCountry.GetCustom('paramilitary_group_custom_title')] Командующий: [SCOPE.gsInterestGroup('paramilitary_IG').GetLeader.GetFullName] ([SCOPE.gsInterestGroup('paramilitary_IG').GetName]) \n\nВнимание: Лояльность [SCOPE.GetRootScope.GetCountry.GetCustom('paramilitary_group_custom_title')] будет расти когда [concept_approval] [concept_interest_group] [SCOPE.gsInterestGroup('paramilitary_IG').GetName] положительное и будет снижаться когда [concept_approval] отрицательное. \n\nПоддержание лояльности [SCOPE.GetRootScope.GetCountry.GetCustom('paramilitary_group_custom_title')] крайне важно, поскольку невыполнение этого требования может привести к перевороту против [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [GetPlayer.GetRuler.GetFullName], что приведет к новому реакционному [concept_ruler]. \n\nСовет: Снижение $lawgroup_corruption_policy$ замедлит потерю лояльности."
