  reserve_powers_veto.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('government_ceremonial_body_custom_title')] Наложение вето на законопроект"
  reserve_powers_veto.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('government_ceremonial_ruler_custom_title')] [SCOPE.sCharacter('ceremonial_head_of_state').GetFullName] наложил вето на законопроект, который в настоящее время принимается в [SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')]. Однако правительство может отменить вето, если оно имеет подавляющее большинство в [SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')]."
  reserve_powers_veto.f: "Это событие было создано, поскольку [SCOPE.gsInterestGroup('ceremonial_head_of_state_ig').GetName] либо не одобряет, либо категорически не одобряет закон, который в настоящее время принимается."
