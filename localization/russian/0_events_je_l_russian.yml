  colonial_empire_bankroll.t: "[SCOPE.sCountry('colonial_empire_debtor').GetName] требует финансовую поддержку"
  colonial_empire_bankroll.d: "[SCOPE.sCountry('colonial_empire_debtor').GetAdjectiveNoFlag] [concept_government] сталкнулось с финансовыми трудностями и нуждается в финансовой поддержки от своего [concept_overlord]. Будучи [concept_overlord], мы юридически обязаны [concept_bankroll_subject] [SCOPE.sCountry('colonial_empire_debtor').GetAdjective] финансы до тех пор пока их долг не будет выплачен и их национальные доходы не станут положительными."
