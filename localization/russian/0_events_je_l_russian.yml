  je_reserved_powers: "[SCOPE.GetRootScope.GetCountry.GetCustom('government_ceremonial_body_custom_title')]"
  je_reserved_powers_reason: "Согласно Конституции нашей страны, [SCOPE.GetRootScope.GetCountry.GetCustom('government_ceremonial_body_custom_title')] имеет ограниченное право вето на любые законопроекты, предложенные в [SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')]. И хотя [SCOPE.GetRootScope.GetCountry.GetCustom('government_ceremonial_body_custom_title')] может наложить вето на закон, его могут впоследствии отменить большинством голосов через [SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')].\n\n#BOLD [SCOPE.GetRootScope.GetCountry.GetCustom('government_ceremonial_ruler_custom_title')]: #! [SCOPE.sCharacter('ceremonial_head_of_state').GetFullName] ([SCOPE.sCharacter('ceremonial_head_of_state').GetInterestGroup.GetName]) \n\nПримечание: [SCOPE.GetRootScope.GetCountry.GetCustom('government_ceremonial_ruler_custom_title')] наложит вето на любой закон, принимаемый правительством, если [SCOPE.sCharacter('ceremonial_head_of_state').GetInterestGroup.GetName] выступают против этого закона."

