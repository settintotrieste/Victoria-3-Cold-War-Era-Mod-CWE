  je_warsaw_pact_system: "Варшавский договор"
  je_warsaw_pact_system_reason: "\"Варшавский договор\" - договор о коллективной обороне, подписанный в Варшаве (Польша) между Советским Союзом и семью другими социалистическими республиками Восточного блока Центральной и Восточной Европы в мае 1955 года во время холодной войны. Термин \"Варшавский договор\" обычно относится как к самому договору, так и к созданному на его основе оборонительному союзу - Организации Варшавского договора. Варшавский договор был военным и экономическим дополнением Совета экономической взаимопомощи (СЭВ), региональной экономической организации для стран Восточного блока в Центральной и Восточной Европе."
  je_warsaw_pact_system_status: "Всего членов: [GetPlayer.MakeScope.Var('warsaw_pact_member_count').GetValue]"

  je_request_warsaw_pact_intervention_button: "Применить статью 4"
  je_request_warsaw_pact_intervention_button_desc: "В случае вооруженного нападения в Европе на одно или несколько государств, подписавших договор, со стороны любого государства или группы государств, каждое государство, являющееся участником настоящего договора, в порядке осуществления права на индивидуальную или коллективную самооборону в соответствии со статьей 51 Устава Организации Объединенных Наций, оказывает государству или государствам, подвергшимся нападению, немедленную помощь, индивидуально и по согласованию с другими государствами, являющимися участниками настоящего договора, всеми средствами, которые оно может счесть необходимыми, включая применение вооруженной силы. "

