  je_term_limits.tt: "[GetPlayer.GetRuler.GetFullName] уйдет с поста президента"
  je_term_limits.1.tt: "[GetPlayer.GetRuler.GetFullName] приведен к присяге в качестве президента"
  je_term_limits.2.tt: "[GetPlayer.GetRuler.GetFullName] больше не является президентом, и новый президент больше не входит в группу интересов [SCOPE.gsInterestGroup('the_current_president_ig_scope').GetName]."
  je_term_limits: "Президентство [ROOT.GetCountry.GetRuler.GetFullName]"
  je_term_limits_reason: "Согласно Конституции нашей страны, ни одно лицо не может быть избрано на должность Президента более двух раз, а также ни одно лицо, занимавшее должность Президента или действовавшее в качестве Президента более двух лет срока, в течение которого какой-либо другой Лицо, избранное Президентом, может быть избрано на должность Президента более одного раза. Таким образом, [ROOT.GetCountry.GetRuler.GetFullName] должен будет покинуть свой пост после достижения предельного срока полномочий в 8 лет."
  je_term_limits_goal: "Президент [ROOT.GetCountry.GetRuler.GetFullName] достиг срока полномочий"
  je_term_limits_status: "Служил [GetPlayer.MakeScope.Var('term_limit_var').GetValue]/8 лет"

  je_term_limits_swiss: "Президентство [ROOT.GetCountry.GetRuler.GetFullName]"
  je_term_limits_swiss_reason: "Президент Швейцарской Конфедерации является главой Федерального совета Швейцарии, состоящего из семи членов, исполнительной власти страны. Должностное лицо, избираемое Федеральным собранием сроком на один год, председательствует на заседаниях Федерального совета и выполняет специальные представительские обязанности. Первый среди равных, президент Конфедерации не имеет власти над остальными шестью советниками и продолжает возглавлять порученное ему ведомство. Традиционно обязанности распределяются между членами в порядке старшинства: вице-президент Федерального совета вступает в должность президента через год после истечения срока полномочий должностного лица."
  je_term_limits_swiss_goal: "Президент [ROOT.GetCountry.GetRuler.GetFullName] достиг срока полномочий"
  je_term_limits_swiss_status: "Прослужил [GetPlayer.MakeScope.Var('term_limit_var').GetValue] / 12 месяцев"

  je_term_limits.3.tt: "$SWI$"

  je_term_limits_yugoslav: "Президиум [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [ROOT.GetCountry.GetRuler.GetLastName]"
  je_term_limits_yugoslav_reason: "В Югославии с момента внесения поправок в Конституцию 1963 года в 1971 году существовала система Президиума. Отдельная статья наделяла Иосипа Броз Тито неограниченным мандатом, что гарантировало, что новый президент не вступит в должность до своей смерти. После смерти Тито 4 мая 1980 года должность президента занял тогдашний вице-президент. Впоследствии должность президента президиума ежегодно переходила от одного президента к другому, при этом каждый последующий президент занимал должность вице-президента в предыдущем году."
  je_term_limits_yugoslav_goal: "Истек срок полномочий Президента [ROOT.GetCountry.GetRuler.GetFullName]"
  je_term_limits_yugoslav_status: "Занимал должность [GetPlayer.MakeScope.Var('term_limit_var').GetValue] / 12 месяцев"

  je_term_limits_collective_HOS: "Коллективное руководство [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [ROOT.GetCountry.GetRuler.GetLastName]"
  je_term_limits_collective_HOS_reason: "По конституции [COUNTRY.GetName], исполнительная власть сосредоточена не в руках одного человека, а в руках коллегиального совета. Даный орган функционирует как конституционный совет, представляя нацию посредством совместного обсуждения и в соответствии с установленными законом процедурами. Каждый член совета имеет равный статус, и для принятия решений требуется согласие большинства или единогласное согласие в зависимости от конституции. Должность [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] будет сменяться ежегодно."
  je_term_limits_collective_HOS_goal: "Истек срок полномочий Президента [ROOT.GetCountry.GetRuler.GetFullName]"
  je_term_limits_collective_HOS_status: "Занимал должность [GetPlayer.MakeScope.Var('term_limit_var').GetValue] / 12 месяцев"

