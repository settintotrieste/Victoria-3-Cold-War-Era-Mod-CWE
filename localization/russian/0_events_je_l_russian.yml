  historical_nuclearisation.t: "Просьба разработать [ROOT.GetCountry.GetAdjectiveNoFormatting] Ядерное оружие"
  historical_nuclearisation.d: "Известные политики в [ROOT.GetCountry.GetName] обратились к правительству с просьбой отменить конституционный запрет на владение ядерным оружием. Они считают, что наличие ядерного оружия необходимо для сдерживания иностранных противников от нападения на нашу страну."
  historical_nuclearisation.f: "Это событие произошло либо из-за очень высокой напряженности в мире, либо из-за наличия ядерного оружия у страны-соперника."
