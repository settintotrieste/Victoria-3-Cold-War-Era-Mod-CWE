  add_nuclear_fallout.t: "Радиоактивные осадки"
  add_nuclear_fallout.d: "Ядерные осадки в результате ядерной атаки на соседнюю страну распространились на [ROOT.GetCountry.GetName]. По оценкам наших ученых, осадки исчезнут только тогда, когда соседние с пострадавшими штаты перестанут быть радиоактивными."
