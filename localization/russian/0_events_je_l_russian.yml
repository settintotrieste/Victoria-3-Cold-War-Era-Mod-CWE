  je_generic_decolonisation_system_2.tt: "Империя выживает"
  je_generic_decolonisation_system_3.tt: "Все состояния, отличные от [concept_homeland], включены."
  je_generic_decolonisation_system_4.tt: "Не владеет ни одним штатом, который является [concept_homeland] этой страны."
  je_generic_decolonisation_system_5.tt: "Владеет как минимум 1 штатом, который не является [concept_homeland] этой страны."
  je_generic_decolonisation_system: "Колониальный сепаратизм"
  je_generic_decolonisation_system_reason: "[ROOT.GetCountry.GetName] владеет [Concept('concept_unincorporated_state','$concept_unincorporated_states$')], в котором нет [concept_homeland]. Хотя раньше такие акты империализма принимались на международном уровне, после Второй мировой войны они вышли из моды. Фактически, международное сообщество теперь требует, чтобы мы предоставили нашим подданным самоопределение путем демонтажа нашей колониальной империи. И что еще хуже, туземцы, живущие в колониях [ROOT.GetCountry.GetAdjective], также стали беспокойными: многие из них призывают к независимости, а некоторые даже яростно нападают на колониальные власти."

