  power_vacuum.t: "Силовой вакуум в [ROOT.GetCountry.GetNameNoFlag]"
  power_vacuum.d: "Предыдущий [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [ROOT.GetCountry.GetNameNoFlag] был сильным диктатором, который правил страной как беспрецедентный автократ. Однако смерть диктатора сняла железную крышку с инакомыслия, создала вакуум власти и дестабилизировала страну. Различные фракции сейчас пользуются ситуацией и сражаются за власть. Понадобится некоторое время, прежде чем [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [ROOT.GetCountry.GetRuler.GetFullName] сможет укротить враждующие стороны и положить конец политической тряске."
  power_vacuum.f: "Это событие произошло потому, что диктаторский правитель либо умер от старости, либо был заменен."
  power_vacuum.option: "Сохранится ли новый [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]?"

