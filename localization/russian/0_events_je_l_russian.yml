  subject_interactions.1.t: "Назначить нового администратора"
  subject_interactions.1.t.2: "Назначить нового Генерал-губернатора"
  subject_interactions.1.t.1: "Назначить нового [SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle]"
  subject_interactions.1.d: "Есть несколько потенциальных кандидатов, которых мы можем рассмотреть на должность Генерал-губернатора в [SCOPE.sCountry('target_country').GetName]. Какого толка лидера мы ищем?"
  subject_interactions.1.d.1: "Есть несколько потенциальных кандидатов, которых мы можем рассмотреть на должность [SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle] в [SCOPE.sCountry('target_country').GetName]. Какого толка лидера мы ищем?"
  subject_interactions.1.f: "Управление государством — очень деликатный вопрос. У каждого государства есть свои специфические проблемы, свои лобби и свои интересы. Наша задача — обеспечить эффективное устранение всех этих проблем, чтобы они никогда больше не мешали достижению наших целей."
  subject_interactions.1.a: "Господин [SCOPE.sCharacter('colonial_governor_plantation_scope').GetLastName], [GetCharacterTrait('special_character_colonial_plantation').GetName] приступит к службе."
  subject_interactions.1.b: "Давайте назначим [GetCharacterTrait('special_character_colonial_local').GetName]: Господина [SCOPE.sCharacter('colonial_governor_local_scope').GetLastName]."
  subject_interactions.1.c: "Присудить должность Господину [SCOPE.sCharacter('colonial_governor_extraction_scope').GetLastName], [GetCharacterTrait('special_character_colonial_extraction').GetName]."
  subject_interactions.1.e: "Господин [SCOPE.sCharacter('colonial_governor_business_scope').GetLastName], [GetCharacterTrait('special_character_colonial_business').GetName], лучший вариант."
  subject_interactions.1.g: "[GetCharacterTrait('special_character_colonial_military').GetName] [SCOPE.sCharacter('colonial_governor_military_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('colonial_governor_military_scope').GetLastName] обеспечит стабильность."

  subject_interactions.3.t: "Запросить нового администратора"
  subject_interactions.3.t.2: "Запросить нового Генерал-губернатора"
  subject_interactions.3.t.1: "Запросить нового [SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle]"
  subject_interactions.3.d: "Рассматривая действия нынешнего генерал-губернатора в отношении [ROOT.GetCountry.GetAdjective] управления делами неудовлетворительными, политическая элита [ROOT.GetCountry.GetCapital.GetCityHubName] запросила у [SCOPE.sCountry('relevant_country').GetName] нового, более компетентого генерал-губернатора."
  subject_interactions.3.d.1: "Рассматривая действия нынешнего [SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle] в отношении [ROOT.GetCountry.GetAdjective] управления делами неудовлетворительными, политическая элита  [ROOT.GetCountry.GetCapital.GetCityHubName] запросила у [SCOPE.sCountry('relevant_country').GetName] нового, более компетентого [SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle]."
  subject_interactions.3.f: "Управление государством — очень деликатный вопрос. У каждого государства есть свои специфические проблемы, свои лобби и свои интересы. Наша задача — обеспечить эффективное устранение всех этих проблем, чтобы они никогда больше не мешали достижению наших целей."
  subject_interactions.3.a: "Господин [SCOPE.sCharacter('colonial_governor_plantation_scope').GetLastName], [GetCharacterTrait('special_character_colonial_plantation').GetName] приступит к службе."
  subject_interactions.3.b: "Давайте назначим [GetCharacterTrait('special_character_colonial_local').GetName]: Господина. [SCOPE.sCharacter('colonial_governor_local_scope').GetLastName]."
  subject_interactions.3.c: "Присудить должность Господину [SCOPE.sCharacter('colonial_governor_extraction_scope').GetLastName], [GetCharacterTrait('special_character_colonial_extraction').GetName]."
  subject_interactions.3.e: "Господин [SCOPE.sCharacter('colonial_governor_business_scope').GetLastName], [GetCharacterTrait('special_character_colonial_business').GetName], лучший вариант."
  subject_interactions.3.g: "[GetCharacterTrait('special_character_colonial_military').GetName] [SCOPE.sCharacter('colonial_governor_military_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('colonial_governor_military_scope').GetLastName] обеспечит стабильность."

