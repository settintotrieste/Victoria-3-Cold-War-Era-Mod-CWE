  protectorate_independence.t: "Прекращение [SCOPE.sCountry('protectorate_subject_country').GetAdjectiveNoFlag] [concept_protectorate]?"
  protectorate_independence.d: "[concept_government] [SCOPE.sCountry('protectorate_subject_country').GetName] выступило с односторонним заявлением о том, что оно больше не является [concept_protectorate] [ROOT.GetCountry.GetName]. Будучи [concept_overlord], у нас есть только 2 решения. Принять отказ от [ROOT.GetCountry.GetAdjective] влияния или использовать силу, чтобы предотвратить их выход из [concept_protectorate]."
  protectorate_independence.f: "[SCOPE.sCountry('protectorate_subject_country').GetName] приняли данное решение потому что [concept_relations] с [ROOT.GetCountry.GetName] #r Враждебные #! или они имеют #r 100#! [concept_liberty_desire]."

  protectorate_independence.option.1: "Прощай [SCOPE.sCountry('protectorate_subject_country').GetName]."
  protectorate_independence.option.2: "Наши военные выскажут свое мнение по этому поводу."

  character_role_resident_general: "[concept_diplomat_character]"
  character_role_resident_general_title: "[concept_diplomat_character]"

  je_resident_general: "Иностранное влияние на [ROOT.GetCountry.GetNameNoFlag]"
  je_resident_general_reason: "В результате череды несчастных событий, [ROOT.GetCountry.GetName] оказались под влиянием другой страны. Интересы иностранной державы защищает иностранный дипломат, которого они назначили в [ROOT.GetCountry.GetName]; и чье мнение в [concept_government] нельзя игнорировать. \n\nМы можем избавиться от иностранного влияния, повысив нашу автономию [concept_autonomy] до #y Независимости#! (если мы [concept_subject]), или используя [concept_diplomatic_play] #y $dp_end_dominate_politics$#! если мы имеем [concept_diplomatic_pact] #y $dominate_politics$#! с другой страной."

  resident_general_character_label.tt: "[SCOPE.sCharacter('resident_general_character_label').GetPrimaryRoleTitle]: [SCOPE.sCharacter('resident_general_character_label').GetFullName]"

  resident_general_system: "Система резидентуры"

  je_end_protectorate_button: "Terminate $protectorate$ Status"
  je_end_protectorate_button_desc: "[ROOT.GetCountry.GetAdjective] [concept_government] сделает заявление о том, что теперь это полностью суверенное государство, которое больше не находится под влиянием своего [concept_overlord]. Это прекратит [ROOT.GetCountry.GetAdjective] [concept_protectorate] если заявление будет принято [concept_overlord]. \n\n@warning! [ROOT.GetCountry.GetName] начнут [concept_diplomatic_play] #y $dp_independence$#! если [concept_overlord] откажется принять декларацию о полной независимости."
