  renovate_capital_decision: "Преобразовать столицу"
  renovate_capital_decision_desc: "Наш [concept_capital_state] это старый город, и тесные улицы и здания в средневековом стиле, безусловно, не идут ему на пользу. Для создания современной транспортной сети и устранения потенциальных санитарных проблем мы можем инвестировать в реконструкцию [concept_capital_state], чтобы сделать его городом, достойным быть столицей нашей страны."

  je_renovate_capital_system: "Преобразование [ROOT.GetCountry.GetCapital.GetCityHubName]"
  je_renovate_capital_system_reason: "Личный архитектор [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] получил задачу преобразовать [ROOT.GetCountry.GetCapital.GetCityHubName] из разросшегося мегаполиса в сверкающую новую столицу Великой [ROOT.GetCountry.GetAdjectiveNoFlag] ‘Мировой державы’, центра мировой цивилизации. Это будет масштабное начинание. \n\nНациональные газеты утверждают, что проекты были \"поистине монументальными… намного превзошли все ожидания\", в то время как [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] собственной персоной торжественно провозгласил \"Из этой каменной пустыни возникнет столица тысячелетней империи\". Зарубежная пресса, хотя и менее восторженно отзывалась о проекте, тем не менее, согласилась с ним. Например, одна иностранная газета назвала его \"возможно, самым амбициозным планом застройки\" современной эпохи."
  je_renovate_capital_system_goal: "Преобразование [ROOT.GetCountry.GetCapital.GetCityHubName] завершено"

  renovate_capital_dev_cost: "Стоимость преобразования столицы"
