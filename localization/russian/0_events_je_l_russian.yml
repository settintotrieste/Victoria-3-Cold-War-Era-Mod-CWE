  je_sovereign_wealth_fund: "[ROOT.GetCountry.GetAdjectiveNoFlag] Суверенный фонд благосостояния"
  je_sovereign_wealth_fund_reason: "[ROOT.GetCountry.GetAdjectiveNoFlag] Инвестиционная корпорация - это государственная компания, которая позволяет государству инвестировать в [ROOT.GetCountry.GetAdjective] частный сектор. Дивиденды от такой инвестиционной деятельности затем объединяются в Фонд национального благосостояния, управляемый правительством. Эта система позволяет правительству вливать и изымать деньги из [concept_investment_pool] в размерах, соответствующих уровню государственной собственности в частном секторе. \n\n#BOLD Размер Фонда национального благосостояния:#! #Green @money![GetPlayer.MakeScope.Var('sovereign_wealth_fund_size_display').GetValue]M#! \n\n#BOLD Максимальный ввод или вывод средств в месяц:#! @money![GetPlayer.MakeScope.Var('sovereign_wealth_fund_withdrawal_amount').GetValue]\n\n#BOLD Количество частных компаний, принадлежащих государству:#![GetPlayer.MakeScope.Var('sovereign_wealth_fund_gov_buildings').GetValue] / [GetPlayer.MakeScope.Var('sovereign_wealth_fund_all_buildings').GetValue] \n\n#BOLD Председатель:#! [ROOT.GetCountry.GetRuler.GetFullName]"
  je_sovereign_wealth_fund_status: "Баланс: #Green @money![GetPlayer.MakeScope.Var('sovereign_wealth_fund_size_display').GetValue]M#!"
  
  je_start_withdraw_sovereign_fund_button: "Начать выводить средства"
  je_start_withdraw_sovereign_fund_button_desc: "[concept_government] будет переведить деньги из [concept_investment_pool] в [ROOT.GetCountry.GetAdjectiveNoFlag] [concept_treasury] каждый месяц если в[concept_investment_pool] есть как минимум @money!#yellow 10000#!."
  je_stop_withdraw_sovereign_fund_button: "Прекратить вывод средств"
  je_stop_withdraw_sovereign_fund_button_desc: "[concept_government] перестанет переводить деньги из [concept_investment_pool] в [ROOT.GetCountry.GetAdjectiveNoFlag] [concept_treasury] каждый месяц."
  je_start_inject_sovereign_fund_button: "Начать вводить средства"
  je_start_inject_sovereign_fund_button_desc: "[concept_government] будет переведить деньги из [ROOT.GetCountry.GetAdjectiveNoFlag] [concept_treasury] в [concept_investment_pool] каждый месяц если в [concept_treasury] есть хотя бы @money!#yellow 10000#!."
  je_stop_inject_sovereign_fund_button: "Прекратить ввод средств"
