  form_commonwealth_decision: "Образовать Содружество Наций"
  form_commonwealth_decision_desc: "Содружество Наций — политическое объединение стран, которые когда-то были частью британских колоний, но считались «свободными и равными». Государства-члены не имеют юридических обязательств друг перед другом, но связаны использованием английского языка и историческими связями. Гражданство страны Содружества дает преимущества в некоторых странах-членах, особенно в Соединенном Королевстве. Хартия Содружества определяет их общие ценности демократии, прав человека и верховенства закона, пропагандируемые проводимыми раз в четыре года Играми Содружества."
