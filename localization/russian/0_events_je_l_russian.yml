  conduct_self_coup_decision: "Совершить переворот"
  conduct_self_coup_decision_desc: "Самовольный государственный переворот — это форма государственного переворота, при которой глава государства, придя к власти законным путем, остается у власти незаконными средствами. \n\n[concept_ruler] при содействии [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetNameWithCountryVariant] или [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetNameWithCountryVariant] совершит государственный переворот с целью захвата диктаторской власти."

  self_coup_recently: "Противостоять перевороту"

  je_tekhpromfinplans: "Техпрофинплан"
  je_tekhpromfinplans_reason: "При [ROOT.GetCountry.GetAdjective] $law_semi_command_economy$, решения по инвестициям децентрализованы. Предприятия обязаны представлять годовые планы (Техпрофинпланы), в которых указываются производственные планы по кварталам и месяцам. Затем государственные чиновники по планированию утверждают эти планы (или отклоняют их) и распределяют ресурсы и средства. Затем предприятие продает свою продукцию в рамках ограничений, установленных планом. \n\nДанная система позволяет [concept_government] вкладывать средства [concept_gold_reserves] в [concept_investment_pool] чтобы позволить предприятиям строить [Concept('concept_building', '$concept_buildings$')] автономно."
  je_tekhpromfinplans_status: "[concept_investment_pool]: #Green [GetPlayer.MakeScope.Var('tekhpromfinplans_fund_size').GetValue]M#!"

  je_start_inject_tekhpromfinplans_button: "Начать утверждение проектов"
  je_start_inject_tekhpromfinplans_button_desc: "[concept_government] утвердит инвестиционные планы, представленные государственными предприятиями, и переведет средства из [concept_treasury] d [concept_investment_pool] чтобы позволить предприятиям реализовывать сови планы если недельный доход как минимум @money!#yellow 10000#!."
  je_stop_inject_tekhpromfinplans_button: "Остановить утверждение проектов"
  je_stop_inject_tekhpromfinplans_button_desc: "[concept_government] прекратит утверждение проектов, представленных государственными предприятиями."

  start_tekhpromfinplans.tt: "Не начинал или останавливал утверждение проектов последий месяц."

  je_state_run_companies: "[ROOT.GetCountry.GetAdjectiveNoFormatting] Государственные предприятия"
  je_state_run_companies_reason: "[ROOT.GetCountry.GetName] имеет [GetLawType('law_command_economy').GetName] и полуавтономные государственные [Concept('concept_company','$concept_companies$')]. \n\n[ROOT.GetCountry.GetAdjective] [concept_government] может начать инвестировать больше в эти предприятия, предоставляя им дополнительные ресурсы и деньги из [concept_treasury] в свободное пользование. \n\nЭта система позволяет [concept_government] передавать деньги из [concept_gold_reserves] в [concept_investment_pool] чтобы позволить государственным предприятиям строить [Concept('concept_building', '$concept_buildings$')] автономно."
  je_state_run_companies_status: "[concept_investment_pool]: #Green [GetPlayer.MakeScope.Var('tekhpromfinplans_fund_size').GetValue]M#!"

  je_national_religious_order: "Государственная религия"
  je_national_religious_order_reason: "По конституции [ROOT.GetCountry.GetName], [concept_government] утверждает конкретную [concept_religion] в качестве оффициальной государственной религии в стране. Церковь управляется [ROOT.GetCountry.GetNameNoFormatting] [SCOPE.GetRootScope.GetCountry.GetCustom('religious_leader_title_custom_title')], являщийся главным священником [ROOT.GetCountry.GetName]. \n\n[concept_government] поддерживает государственную религию финансовой помощью и другими привелегиями, предоставляя [concept_government] значительное влияние на дела руководящего органа государственной религии, включая вопросы доктрины, порядка и богослужения. Это также дает [concept_government] возможность снять с должности текущего [ROOT.GetCountry.GetNameNoFormatting] [SCOPE.GetRootScope.GetCountry.GetCustom('religious_leader_title_custom_title')]. \n\nПримечание: Более высокий религиозный радикализм ведет к повышеню шанса появления $ideology_agitator_anti_human_rights$, $ideology_agitator_nationalist$, $ideology_agitator_pro_war_rights$ $ideology_agitator_theocrat$ [SCOPE.GetRootScope.GetCountry.GetCustom('religious_leader_title_custom_title')] в [ROOT.GetCountry.GetName]. \n\nПримечание: религиозный радикализм растет когда [concept_approval] [GetInterestGroupVariant('ig_devout',GetPlayer).GetNameWithCountryVariant] [concept_interest_group] отрицательное и падает когда [concept_approval] положительное."
  je_national_religious_order_status: "Религиозный радикализм: [GetPlayer.MakeScope.Var('church_radicalism_level').GetValue]%"

