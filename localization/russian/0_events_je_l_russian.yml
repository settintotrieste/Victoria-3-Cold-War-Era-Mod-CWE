  je_hire_privateers_button_desc: "[ROOT.GetCountry.GetName] выдаст каперские лицензии, разрешающие определенным частным лицам или судам захватывать [concept_convoys] принадлежащие другой стране. \n\nЭто позволит [ROOT.GetCountry.GetName] использовать $seize_shipping$ [concept_diplomatic_action] против других стран с проблемой пиратства."
