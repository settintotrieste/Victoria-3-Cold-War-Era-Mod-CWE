  je_generic_decolonisation_overlord_system: "Антиколониальные настроения"
  je_generic_decolonisation_overlord_system_reason: "Антиколониализм определил середину XX века, когда страны свергли имперское господство. От Африки до Азии движения за независимость перестраивали альянсы и стратегии холодной войны. Суверенитет означал больше, чем просто границы — это было требование контроля над ресурсами, идентичностью и судьбой, заставляющее мировые державы адаптироваться к быстро деколонизирующемуся миру. \n\nПока [ROOT.GetCountry.GetName] владеет [Concept('concept_unincorporated_state','$concept_unincorporated_states$')], население этих государств будет требовать либо самоопределения, либо полных прав как [ROOT.GetCountry.GetAdjective] граждан."

  je_generic_decolonisation_colonial_purge_button: "Провести колониальную чистку"
  je_generic_decolonisation_colonial_purge_button_desc: "[ROOT.GetCountry.GetAdjective] [concept_government] жестоко искоренит всех антиколониальных агитаторов и сторонников в своих колониях и зависимых [Concept('concept_subject', '$concept_subjects$')]."

  je_generic_decolonisation_subject_system: "[ROOT.GetCountry.GetAdjectiveNoFormatting] Национализм"
  je_generic_decolonisation_subject_system_reason: "Антиколониализм определил середину XX века, когда страны свергли имперское господство. От Африки до Азии движения за независимость перестраивали альянсы и стратегии холодной войны. Суверенитет означал больше, чем просто границы — это было требование контроля над ресурсами, идентичностью и судьбой, заставляющее мировые державы адаптироваться к быстро деколонизирующемуся миру. \n\nПока [ROOT.GetCountry.GetName] является колониальным [concept_subject] другой державы, коренное население [ROOT.GetCountry.GetAdjective] будет требовать независимости."

  je_generic_decolonisation_civil_disobedience_button: "Призыв к антиколониальным протестам"
  je_generic_decolonisation_civil_disobedience_button_desc: "[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [GetPlayer.GetRuler.GetFullName] призовет всех [ROOT.GetCountry.GetAdjective] жителей к неповиновениею [concept_overlord]."

  je_mandate_decolonisation_system: "[ROOT.GetCountry.GetAdjectiveNoFormatting] Мандаты"
  je_mandate_decolonisation_system_reason: "Мандаты возникли после Первой мировой войны как территории, переданные под международный надзор, часто управляемые колониальными державами через Лигу Наций. Задуманные как переходные формы правления, они часто распространяли имперское влияние под видом управления. К эпохе холодной войны страны, владевшие мандатами, начали сталкиваться с международным давлением с требованием предоставить независимость своим мандатам. \n\nПоскольку Организация Объединенных Наций не признает постоянной власти [ROOT.GetCountry.GetName] над его [concept_mandate]ами, [ROOT.GetCountry.GetName] столкнется с дипломатическими санкциями, пока все мандаты не получат независимость."

