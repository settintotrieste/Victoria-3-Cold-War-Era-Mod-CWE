  je_UN_system: "ООН"
  je_UN_system_reason: "Организация Объединенных Наций (ООН) — межправительственная организация, заявленными целями которой являются поддержание международного мира и безопасности, развитие дружественных отношений между странами, достижение международного сотрудничества и служить центром гармонизации действий стран. \n\nВ ООН есть шесть основных оперативных организаций: Генеральная Ассамблея, Совет Безопасности, Экономический и Социальный Совет, Международный Суд, Секретариат ООН и Совет Опеки, хотя Совет Опеки бездействует с 1994 года. \n\nГлавным административным должностным лицом ООН является Генеральный секретарь. \n\nВсего членов Совета Безопасности: [GetPlayer.MakeScope.Var('UN_unsc_members_counter').GetValue]"
  je_UN_system_status: "Всего участников: [GetPlayer.MakeScope.Var('UN_members_counter').GetValue]"

  change_UN_HQ.t: "Штаб-квартира ООН эвакуирована"
  change_UN_HQ.d: "Организация Объединенных Наций решила покинуть свою штаб-квартиру в [SCOPE.sState('un_headquarters_state').GetCityHubName] из-за продолжающейся нестабильности в [ROOT.GetCountry.GetName]. Теперь они будут искать другую страну для размещения своей штаб-квартиры."
  change_UN_HQ.f: "Это событие вызвано тем, что [SCOPE.sState('un_headquarters_state').GetName] либо находится в состоянии Восстания, имеет более 50 [concept_devastation], либо не контролируется [ROOT.GetCountry.GetName]."
  change_UN_HQ.1: "Мы чувствуем себя брошенными..."

  new_UN_HQ.t: "Штаб-квартира ООН в [SCOPE.sState('un_headquarters_state').GetCityHubName]?"
  new_UN_HQ.d: "Организация Объединенных Наций, у которой в настоящее время нет штаб-квартиры, предложила разместиться в [SCOPE.sState('un_headquarters_state').GetName]. Тогда расходы на новую штаб-квартиру будут покрываться [ROOT.GetCountry.GetName]."
  new_UN_HQ.f: "[ROOT.GetCountry.GetName] был выбран из-за его [concept_prestige] и политической стабильности."
  new_UN_HQ.1: "Приветствуем ООН!"
  new_UN_HQ.2: "Нет, спасибо"

