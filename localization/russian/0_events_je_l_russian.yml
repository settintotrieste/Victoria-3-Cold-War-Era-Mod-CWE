  je_climate_change_summit_button_desc: "[ROOT.GetCountry.GetName] может организовать климатический саммит, чтобы призвать правительства мира принять более эффективные меры $lawgroup_environmental_policy$ [Concept('concept_law','$concept_laws$')]."

  generic_climate_accords_climate.t: "[SCOPE.sState('climate_change_summit_location').GetCityHubName] Климатический саммит"
