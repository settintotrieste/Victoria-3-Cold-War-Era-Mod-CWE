  je_world_tension_system: "Мировое напряжение"
  je_world_tension_system_reason: "Мировая напряженность представляет собой общий уровень страха и беспокойства, существующий среди народов мира. Отображаемое число может находиться в диапазоне от 0% до 100%. \n\nКак правило, чем выше мировая напряженность, тем более популярна поддержка стран в отношении воинственных действий. \n\nМировое напряжение оказывает различное влияние на игру: от влияния на агрессию ИИ и уровень милитаризации до воздействия на фондовый рынок. \n\nТекущая мировая напряженность: [GetPlayer.MakeScope.Var('world_tension_amount_display').GetValue]%"

