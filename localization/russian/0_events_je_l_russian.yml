  je_start_imperial_preference_button: "Ввести [SCOPE.GetRootScope.GetCountry.GetCustom('imperial_conference_custom_adjective')] Преференции"
  je_start_imperial_preference_button_desc: "[SCOPE.GetRootScope.GetCountry.GetCustom('imperial_conference_custom_adjective')] Преференции — это система взаимного снижения тарифов, действующая на всей территории [ROOT.GetCountry.GetAdjective] империи. Цель состоит в том, чтобы расширить торговлю внутри Империи. \n\nВ игровых реалиях, [SCOPE.GetRootScope.GetCountry.GetCustom('imperial_conference_custom_adjective')] преференции представлены тем что [ROOT.GetCountry.GetName] разделяет [concept_customs_union] со своими [concept_dominion]."

  je_end_imperial_preference_button: "Прекратить [SCOPE.GetRootScope.GetCountry.GetCustom('imperial_conference_custom_adjective')] Преференции"
  je_end_imperial_preference_button_desc: "The [SCOPE.GetRootScope.GetCountry.GetCustom('imperial_conference_custom_adjective')] Преференции — это система взаимного снижения тарифов, действующая на всей территории [ROOT.GetCountry.GetAdjective] империи. \n\nВ игровых реалиях, [SCOPE.GetRootScope.GetCountry.GetCustom('imperial_conference_custom_adjective')] преференции представлены тем что [ROOT.GetCountry.GetName] разделяет  [concept_customs_union] со своими [concept_dominion]. \n\nПрекратив [SCOPE.GetRootScope.GetCountry.GetCustom('imperial_conference_custom_adjective')] мы прекратим оразделять [concept_customs_union] [ROOT.GetCountry.GetName] с [concept_dominion]."

