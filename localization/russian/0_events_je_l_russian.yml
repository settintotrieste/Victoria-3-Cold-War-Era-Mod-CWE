  generic_decolonisation_indy.d: "Люди [ROOT.GetCountry.GetAdjective] возмущены тем, что [SCOPE.sCountry('overlord_in_question_scopes').GetName] не желает предоставить независимость [ROOT.GetCountry.GetName]. В свете растущих националистических настроений некоторые члены правительства обратились к [SCOPE.sCharacter('puppet_leader_in_question_scopes').GetFullName] с радикальным предложением: [ROOT.GetCountry.GetName] должен объявить декларацию независимости и в одностороннем порядке разорвать все связи с [SCOPE.sCountry('overlord_in_question_scopes').GetName]."
  generic_decolonisation_indy.f: "Отказ от борьбы за независимость [ROOT.GetCountry.GetAdjective] запятнает всех членов правительства пятном трусости."
  generic_decolonisation_indy.option.1: "Бороться за свободу!"
  generic_decolonisation_indy.option.2: "Эх, свободу переоценивают..."

  self_governing_colony.tt: "Создайте $semi_autonomous_colony$ в колонии [SCOPE.sCulture('culture_to_release').GetName]."
  generic_decolonisation_indy_2a.t: "[SCOPE.sCulture('culture_to_release').GetName] Самоуправление?"
  generic_decolonisation_indy_2b.t: "Самоуправление для [SCOPE.sState('state_to_release').GetName]?"
  generic_decolonisation_indy_2.d: "Люди [SCOPE.sCulture('culture_to_release').GetName] в [SCOPE.sState('state_to_release').GetName] призвали [ROOT.GetCountry.GetName] предоставить им [concept_homeland] самоуправление."
  generic_decolonisation_indy_2.f: "Принятие запроса [SCOPE.sCulture('culture_to_release').GetName] создаст $XFC$ в [SCOPE.sCulture('culture_to_release').GetName] [concept_homeland], который затем будет автоматически преобразован в соответствующую страну."
  generic_decolonisation_indy_2.option.1: "Мы принимаем их скромную просьбу о внутренней автономии."
  generic_decolonisation_indy_2.option.2: "Нет, в [SCOPE.sState('state_to_release').GetName] сохраняется прямое правление!"

  generic_decolonisation_indy.3.t: "Неудачная деколонизация в [SCOPE.sState('state_to_release').GetName]"
  generic_decolonisation_indy.3.d: "Люди [SCOPE.sCulture('primary_culture_scope').GetName] в [SCOPE.sState('state_to_release').GetName] не смогли решить, как деколонизировать свою страну, и поэтому колония вернется к прямому правлению иностранной державы."
  generic_decolonisation_indy.3.f: "Это событие было запущено, поскольку не было подходящей страны, в которую мог бы превратиться тег страны [SCOPE.sCountry('failed_country_scope').GetName]. Таким образом, [SCOPE.sCountry('failed_country_scope').GetName] будет повторно аннексирован своим сюзереном, а если сюзерена нет, то любой страной, с которой он разделяет [concept_primary_cultures]."
  generic_decolonisation_indy_3.option: "Грустно, но не прискорбно."

