  british_south_africa.indy.d: "31 мая 1961 года страна стала республикой в результате референдума (в котором могли принять участие только белые избиратели), который прошел с небольшим перевесом; провинция Наталь, в которой доминировали британцы, в основном проголосовала против. Елизавета II потеряла титул королевы Южной Африки, а последний генерал-губернатор Чарльз Роббертс Сварт стал президентом штата"
