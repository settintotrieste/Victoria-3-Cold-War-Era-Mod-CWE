  je_the_cold_war_democratic: "Холодная война (Демократический блок)"
  je_the_cold_war_democratic_reason: "Холодная война — это период геополитической напряженности между [ROOT.GetCountry.GetName] и [SCOPE.sCountry('communist_rival_superpower').GetName] и их соответствующими союзниками, Демократическим блоком и Коммунистическим блоком. [ROOT.GetCountry.GetName] должен стремиться выиграть эту идеологическую и геополитическую борьбу за глобальное влияние, гарантируя, что больше не будет никаких коммунистических сверхдержав!"

