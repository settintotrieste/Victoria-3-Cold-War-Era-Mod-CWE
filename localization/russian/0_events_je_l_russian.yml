  je_upper_house: "[SCOPE.GetRootScope.GetCountry.GetCustom('upper_house_name')]"
  je_upper_house_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')] включает в себя [SCOPE.GetRootScope.GetCountry.GetCustom('upper_house_name')]. Он обладает некоторыми полномочиями по предоставлению советов и различных согласований. К ним относятся право принятия договоров, а также подтверждения кандидатур секретарей кабмина, судей (в том числе судей Верховного суда), адмиралов и генералов, должностных лиц регулирующих органов, послов и других должностных лиц исполнительной власти. [SCOPE.GetRootScope.GetCountry.GetCustom('upper_house_name')] также может наложить вето на законопроекты, принимаемые в [SCOPE.GetRootScope.GetCountry.GetCustom('lower_house_name')].\n\nНаличие проправительственного большинства в [SCOPE.GetRootScope.GetCountry.GetCustom('upper_house_name')] позволит [concept_government] принять [concept_law].\n\nПоддержка правительсва: #BOLD [GetPlayer.MakeScope.Var('upper_house_majority_var').GetValue]%#! \n\nРаспределение мест по [concept_interest_group]: $UH_seat_distribution_loc$"

