  steal_nuclear_weapons.t: "Разоружение [SCOPE.sCountry('former_nuclear_weapons_country').GetAdjectiveNoFlag] ОМП"
  steal_nuclear_weapons.d: "Инспекторы из [ROOT.GetCountry.GetName] прибыли в [SCOPE.sCountry('former_nuclear_weapons_country').GetName], чтобы начать изъятие всего [SCOPE.sCountry('former_nuclear_weapons_country').GetAdjective] оружия массового поражения. Они приступят к выводу всего ядерного, биологического и химического оружия из страны."
  steal_nuclear_weapons.f: "[ROOT.GetCountry.GetName] может оставить оружие себе или вместо этого уничтожить его."
