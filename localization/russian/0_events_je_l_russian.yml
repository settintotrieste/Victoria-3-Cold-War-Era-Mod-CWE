  je_G8_system: "Большая [GetPlayer.MakeScope.Var('G8_members_counter').GetValue]"
  je_G8_system_reason: "Большая [GetPlayer.MakeScope.Var('G8_members_counter').GetValue] - это межгосударственный политический и экономический форум состоящий из демократических [Concept('concept_major_power','$concept_major_powers$')]. \n\nИдея, возникшая на неформальной встрече министров финансов, большая [GetPlayer.MakeScope.Var('G8_members_counter').GetValue] с тех пор стала официальной, престижной площадкой для обсуждения и координации решений основных глобальных проблем, особенно в областях торговли, безопасности, экономики и изменения климата. \n\nБольшая[GetPlayer.MakeScope.Var('G8_members_counter').GetValue] не основана на договоре не имеет постоянных структур. Организация саммита осуществляется под председательством государства-члена, и сменяется ежегодно. Государство-председатель определяет приоритеты группы и принимает у себя саммит."

