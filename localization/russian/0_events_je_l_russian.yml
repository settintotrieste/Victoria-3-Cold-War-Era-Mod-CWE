  je_corruption_system_reason: "[concept_corruption] — использование полномочий или связями государственными должностными лицами для незаконной частной выгоды. Формы коррупции различаются, но могут включать взяточничество, лоббирование, вымогательство, кумовство, ограниченность, покровительство, торговлю влиянием и растрату. \n\n[ROOT.GetCountry.GetAdjective] [concept_government] подвержено коррупции, поэтому необходимо принять более строгие $lawgroup_corruption_policy$, чтобы устранить эту проблему. \n\nОднако @armed_forces! $ig_armed_forces$ и @intelligentsia! $ig_intelligentsia$ будут противодействовать любым попыткам уменьшить коррупцию в стране, что увеличит радикализм среди людей, поддерживающих эти [Concept('concept_interest_group', '$concept_interest_groups$')], он будет расти на протяжении всей попытки принять более строгий закон"

