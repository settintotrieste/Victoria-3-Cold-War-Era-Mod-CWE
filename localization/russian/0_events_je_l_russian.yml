  reserve_powers_system_reject_option: "Вето на вето [SCOPE.sCharacter('ceremonial_head_of_state').GetPrimaryRoleTitle]!"
  reserve_powers_system_coup_option: "Проигнорировать вето [SCOPE.sCharacter('ceremonial_head_of_state').GetPrimaryRoleTitle]."

  judiciary_veto.t: "Юридическое оспаривание принятия закона"
  judiciary_veto.d: "Ведущие члены [SCOPE.gsInterestGroup('legal_challenge_plaintiff_scope').GetName] подали иск в [SCOPE.GetRootScope.GetCountry.GetCustom('supreme_court_name')] на проверку конституционности [SCOPE.sLaw('current_law_scope').GetName], который принимает [concept_government]. Они утверждают что закон противоречит конститцуии [ROOT.GetCountry.GetName] и должен быть превентивно заблокирован [SCOPE.GetRootScope.GetCountry.GetCustom('supreme_court_name')]. Этот аргумент возобладал у конституционных судей, которые в кратчайшие сроки вынесли решение в их пользу."
  judiciary_veto.f: "Данное событие произошло так как [concept_interest_group] которая несогласна или сильно несогласна с [SCOPE.sLaw('current_law_scope').GetName] и [SCOPE.GetRootScope.GetCountry.GetCustom('supreme_court_name')] достаточно прогрессивный или регресивный чтобы поддержать попытку этой [concept_interest_group] заблокировать закон через судебную систему."
  judicial_veto_accept_option: "Принять решение суда!"
  judicial_veto_reject_option: "Мы примем законы в обход решения суда."

  ig_angry_with_government: "Группа спровоцированных интересов"

  je_abolish_filibuster_button: "Отменить правило закрытия"
  je_abolish_filibuster_button_desc: "Сенатская традиция неограниченных дебатов позволила использовать «флибустьер» — расплывчато определенный термин для обозначения действий, направленных на продление дебатов и задержку или предотвращение голосования по законопроекту, резолюции, поправке или другому спорному вопросу. Это стало возможным благодаря правилу закрытия, которое предусматривает, что три пятых всех сенаторов, должным образом выбранных и приведенных к присяге, или 60 из 100 членов Сената должны проголосовать за прекращение дебатов, чтобы закон перешел на стадию принятия."
  je_fire_council_chairperson_button: "Новый [SCOPE.GetRootScope.GetCountry.GetCustom('government_ceremonial_ruler_custom_title')]"
  je_fire_council_chairperson_button_desc: "[concept_government] может заменить [SCOPE.GetRootScope.GetCountry.GetCustom('government_ceremonial_body_custom_title')], когда пожелает. Возможно, нам стоит сделать это сейчас?"
