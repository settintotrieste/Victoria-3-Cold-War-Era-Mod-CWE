  currency_system.option: "Хорошо."

  je_OPEC_system: "Организация стран — экспортёров нефти"
  je_OPEC_system_reason: "Организация стран — экспортёров нефти (ОПЕК), основаная в 1960, это коалиция ведущих нефтедобывающих стран, которая координирует энергетическую политику для стабилизации рынков и влияния на мировые цены. Регулируя объемы производства, ОПЕК стремится обеспечить справедливую прибыль для производителей и надежные поставки для потребителей. \n\nЕе решения оказывают влияние на международную торговлю, промышленный рост и геополитические отношения, что делает ее центральным игроком в современной ресурсной дипломатии. \n\nЧленство предоставляет странам право на коллективные переговоры, но также обязывает их к сложным переговорам, балансирующим национальные интересы с глобальными потребностями в энергии, и формирует траекторию развития экономик, зависящих от экспорта и импорта нефти по всему миру. \n\nВсего членов: [GetGlobalVariable('OPEC_member_count').GetValue]"

  je_OPEC_increase_oil_quota_button: "Поднять нефтяные квоты"
  je_OPEC_increase_oil_quota_button_desc: "Квоты на добычу нефти ОПЕК это согласованные пределы, установленные Организацией стран — экспортёров нефти, чтобы регулировать глобальные поставки и стабилизировать цены. Будучи лидером ОПЕК, мы можем определять квоты на добычу для все членов ОПЕК."

  je_OPEC_decrease_oil_quota_button: "Снизить нефтяные квоты"
  je_OPEC_decrease_oil_quota_button_desc: "Квоты на добычу нефти ОПЕК это согласованные пределы, установленные Организацией стран — экспортёров нефти, чтобы регулировать глобальные поставки и стабилизировать цены. Будучи лидером ОПЕК, мы можем определять квоты на добычу для все членов ОПЕК."

  je_OPEC_ignore_oil_quota_button: "Игнорировать нефтяные квоты"
  je_OPEC_ignore_oil_quota_button_desc: "Квоты на добычу нефти ОПЕК это согласованные пределы, установленные Организацией стран — экспортёров нефти, чтобы регулировать глобальные поставки и стабилизировать цены. Однако мы можем игнорировать их в интересах нашей страны."

  je_OPEC_restore_oil_quota_button: "Следовать нефтяным квтам"
  je_OPEC_restore_oil_quota_button_desc: "Квоты на добычу нефти ОПЕК это согласованные пределы, установленные Организацией стран — экспортёров нефти, чтобы регулировать глобальные поставки и стабилизировать цены. В настоящее время мы игнорируем эти квоты, но можем вернуться к их соблюдению, чтобы угодить нашим коллегам-членам ОПЕК."

  OPEC_quota_timer.tt: "Не менял квоту на добычу нефти ОПЕК последние 12 месяцев"
  OPEC_oil_quota_defiance_timer.tt: "Не нарушал квоты ОПЕК на добычу нефти в течение последних 12 месяцев"

  OPEC_oil_quota.t: "Изменение нефтяных квот ОПЕК"
  OPEC_oil_quota.1.d: "Председатель Организации стран-экспортеров нефти, членом которой является [ROOT.GetCountry.GetName], объявил об изменении нефтяной квоты ОПЕК. Отныне квота добычи нефти будет ОЧЕНЬ НИЗКАЯ."
  OPEC_oil_quota.2.d: "Председатель Организации стран-экспортеров нефти, членом которой является [ROOT.GetCountry.GetName], объявил об изменении нефтяной квоты ОПЕК. Отныне квота добычи нефти будет НИЗКОЙ."
  OPEC_oil_quota.3.d: "Председатель Организации стран-экспортеров нефти, членом которой является [ROOT.GetCountry.GetName], объявил об изменении нефтяной квоты ОПЕК. Отныне квота добычи нефти будет СРЕДНЕЙ."
  OPEC_oil_quota.4.d: "Председатель Организации стран-экспортеров нефти, членом которой является [ROOT.GetCountry.GetName], объявил об изменении нефтяной квоты ОПЕК. Отныне квота добычи нефти будет ВЫСОКОЙ."
  OPEC_oil_quota.5.d: "Председатель Организации стран-экспортеров нефти, членом которой является [ROOT.GetCountry.GetName], объявил об изменении нефтяной квоты ОПЕК. Отныне квота добычи нефти будет ОЧЕНЬ ВЫСОКОЙ."
  OPEC_oil_quota.f: "Нефтяные квоты ОПЕК рассчитываются на основе «Среднего глобального экономического прогноза», где чем хуже прогноз, тем ниже квота. Это связано с тем, что глобальный экономический спад обычно сопровождается падением цен на нефть, чего ОПЕК пытается избежать, сокращая мировые поставки нефти, чтобы поддерживать высокие цены на нефть для своих членов. Поскольку [ROOT.GetCountry.GetName] является членом ОПЕК, по договору он обязан соблюдать эти квоты. Однако мы можем игнорировать договор и качать столько нефти, сколько захотим, ценой некоторого позора и плохих отношений с другими членами ОПЕК."
  OPEC_accept_quota: "Мы будем следовать квотам в точности"
  OPEC_reject_quota: "Мы отказываемся соблюдать квоты. Дайте маслу течь свободно!"

