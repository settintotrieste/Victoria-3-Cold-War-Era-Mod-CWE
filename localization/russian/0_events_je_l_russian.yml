  regent_character: "Регент"

  develop_cybersin_decision: "Разработать социалистическую Кибер-сеть(ОГАС)"
  develop_cybersin_decision_desc: "Начиная с начала 1960-х годов, Коммунистическая партия рассматривала возможность отказа от существовавшей тогда сталинской системы командного планирования в пользу разработки взаимосвязанной компьютеризированной системы распределения ресурсов, основанной на принципах кибернетики. Эта разработка рассматривалась как основа для перехода к оптимальному планированию, которое могло бы стать фундаментом более развитой формы социалистической экономики, основанной на информационной децентрализации и инновациях."

  je_develop_cybersin: "Разработка ОГАС"
  je_develop_cybersin_reason: "План предусматривает создание трехуровневой сети с компьютерным центром в столице, до 200 центров среднего уровня в других крупных городах и до 20 000 локальных терминалов в экономически значимых регионах, осуществляющих связь в режиме реального времени с использованием существующей телефонной инфраструктуры. Эта структура также позволит любому терминалу взаимодействовать с любым другим. Затем управление этой сетью будет осуществлять Центральное статистическое управление. \n\nСовет: Повышая [Concept('concept_government_wage', '$concept_government_wages$')] повысит месячный прогресс разработки ОГАС."

  je_cybersin_system: "ОГАС"
  je_cybersin_system_reason: "Всегосударственная автоматизированная система (ОГАС) — это национальная компьютерная сеть с удаленным доступом, работающая в режиме реального времени, построенная на основе существующих и новых телефонных линий. Она, подобно нервной системе, проецирует себя на каждый завод и предприятие в плановой экономике. Ее сеть иерархически смоделирована по образцу трехуровневой пирамидальной структуры государства и экономики: один центральный компьютерный центр в столице будет соединен с 200 компьютерными центрами среднего уровня в крупных городах, которые, в свою очередь, будут связаны с 20 000 компьютерными терминалами, распределенными по ключевым производственным площадкам национальной экономики."

