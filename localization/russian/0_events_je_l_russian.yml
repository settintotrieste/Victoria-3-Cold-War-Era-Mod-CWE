  cfa_franc_zone: "Зона франка КФА"
  cfa_franc_zone_desc: "Франк КФА, возглавляемый [ROOT.GetCountry.GetName], представляет собой название двух валют: западноафриканского франка КФА, используемого в восьми странах Западной Африки, и центральноафриканского франка КФА, используемого в шести странах Центральной Африки. Несмотря на то, что две валюты франка КФА являются отдельными, они всегда находились в паритете и фактически взаимозаменяемы.\n\nМы должны стремиться сохранить этот обширный [concept_currency_union], поскольку его потеря станет ударом по нашему национальному престижу."
  franc_zone: "Зона франка"
  franc_zone_desc: "Зона франка, возглавляемая [ROOT.GetCountry.GetName], представляет собой экономическую, денежную и культурную зону, не имеющую аналогов ни в одном мире. Он состоит из очень разных государств и территорий и является результатом развития и изменений в бывшей французской колониальной империи.\n\nМы должны стремиться сохранить этот обширный [concept_currency_union], поскольку его потеря станет ударом по нашему национальному престижу."
  sterling_zone: "Стерлинговый район"
  sterling_zone_desc: "Зона стерлингов, возглавляемая [ROOT.GetCountry.GetName], представляла собой группу стран, которые либо привязывали свои валюты к фунту стерлингов, либо фактически использовали фунт стерлингов в качестве собственной валюты. Эта зона начала неофициально появляться в начале 1930-х годов, после того как фунт стерлингов вышел из золотого стандарта в 1931 году, в результате чего валюты ряда стран, которые исторически осуществляли большую часть своей торговли в фунтах стерлингов, были привязаны к фунту стерлингов, а не к фунту стерлингов. золото. Банк Англии в Лондоне руководил координацией денежно-кредитной политики в валютной зоне. Страны-члены, имеющие собственную валюту, держали большую часть своих валютных резервов в виде стерлинговых балансов в Лондоне.\n\nМы должны стремиться сохранить этот обширный [concept_currency_union], поскольку его потеря станет ударом по нашему национальному престижу."
  dollar_zone: "Долларовая зона"
  ruble_zone: "[ROOT.GetCountry.GetAdjectiveNoFlag] Рублевая зона"
  generic_currency_zone: "[ROOT.GetCountry.GetAdjectiveNoFlag] Валютная зона"
  generic_currency_zone_desc: "[ROOT.GetCountry.GetName] является лидером крупного [concept_currency_union], состоящего из 5 или более независимых членов. Это дает [ROOT.GetCountry.GetAdjective] Центральному банку большое влияние на международные процентные ставки и большой престиж.\n\nМы должны стремиться сохранить этот обширный [concept_currency_union], поскольку его потеря станет ударом по нашему национальному престижу."

  je_multilateral_development_banks_1.tt: "В этой стране есть $multilateral_development_bank$ [concept_diplomatic_pact] как минимум с 1 другой страной."
  je_multilateral_development_banks_2.tt: "В этой стране нет $multilateral_development_bank$ [concept_diplomatic_pact] ни с одной страной."
  je_multilateral_development_banks: "Многосторонние банки развития"
  je_multilateral_development_banks_reason: "Многосторонние банки развития - это наднациональные финансовые институты, созданные суверенными государствами, которые являются их акционерами. Их полномочия отражают политику помощи и сотрудничества в области развития, установленную этими государствами. \n\nПравительство [ROOT.GetCountry.GetName] может занимать деньги у многосторонних банков развития для финансирования национальных расходов. \n\nМеждународные займы деноминированы в #Yellow XDR#!, который, в свою очередь, рассчитывается по среднему мировому валютному курсу. Более сильная валюта [ROOT.GetCountry.GetAdjectiveNoFlag], следовательно, предоставит нам более дешевые кредиты, и наоборот. \n\nСовет: Курс обмена валюты [ROOT.GetCountry.GetAdjective] может быть скорректирован с помощью $lawgroup_monetary_policy$ [concept_law]. \n\nКурс обмена валюты: @money!1 = [GetPlayer.MakeScope.Var('currency_exchange_rate').GetValue] #Yellow XDR#! \n\nЛимит заимствования (в иностранной валюте): #Yellow XDR#! #Green [GetPlayer.MakeScope.Var('currency_borrowing_pool_display').GetValue]M#! \n\nЛимит заимствования (в валюте [ROOT.GetCountry.GetAdjectiveNoFlag]): #Green @money![GetPlayer.MakeScope.Var('currency_borrowing_pool_domestic_display').GetValue]M#! \n\nМесячный лимит заимствований: #o @money![GetPlayer.MakeScope.Var('currency_borrow_money_monthly_limit_display').GetValue]M#! \n\n[ROOT.GetCountry.GetName] является членом следующих региональных банков: #BOLD $ASIAN_DEVELOPMENT_BANK$ $ASIAN_INFRASTRUCTURE_INVESTMENT_BANK$ $EUROPEAN_INVESTMENT_BANK$ $INTERNATIONAL_INVESTMENT_BANK$ $INTER_AMERICAN_DEVELOPMENT_BANK$ $AFRICAN_DEVELOPMENT_BANK$ $NORDIC_INVESTMENT_BANK$ $CARIBBEAN_DEVELOPMENT_BANK$ $ISLAMIC_DEVELOPMENT_BANK$ $NEW_DEVELOPMENT_BANK$ $EURASIAN_DEVELOPMENT_BANK$ $NORTH_AMERICAN_DEVELOPMENT_BANK$ #!"
  je_multilateral_development_banks_status: "Основная сумма: #Yellow XDR#! #Green [GetPlayer.MakeScope.Var('currency_borrowed_money_display').GetValue]M#! \nГодовая процентная ставка: #o [GetPlayer.MakeScope.Var('currency_rate_international_local').GetValue]%#! \nЕжегодные выплаты: @money!#Red [GetPlayer.MakeScope.Var('currency_borrowed_money_yearly_repayment_display').GetValue]#! / #Yellow XDR#! #Red [GetPlayer.MakeScope.Var('currency_borrowed_money_exchange_adjusted_repayment').GetValue]#!"

  je_start_borrow_multilateral_banks_button: "Начать Занимать деньги"
  je_start_borrow_multilateral_banks_button_desc: "[concept_government] [ROOT.GetCountry.GetName] начнет занимать деньги у Многосторонних банков развития по годовой процентной ставке #o [GetPlayer.MakeScope.Var('currency_rate_international_local').GetValue]%#!. \n\nПримечание: У нас есть лимит заимствования в размере #Yellow XDR#! #Green [GetPlayer.MakeScope.Var('currency_borrowing_pool_display').GetValue]M#! что эквивалентно#Green @money![GetPlayer.MakeScope.Var('currency_borrowing_pool_domestic_display').GetValue]M#!."
  je_stop_borrow_multilateral_banks_button: "Прекратить Занимать деньги"
  je_stop_borrow_multilateral_banks_button_desc: "[concept_government] [ROOT.GetCountry.GetName] прекратит занимать деньги у Многосторонних банков развития по годовой процентной ставке #o [GetPlayer.MakeScope.Var('currency_rate_international_local').GetValue]%#!. \n\nПримечание: У нас есть лимит заимствования в размере #Yellow XDR#! #Green [GetPlayer.MakeScope.Var('currency_borrowing_pool_display').GetValue]M#! что эквивалентно#Green @money![GetPlayer.MakeScope.Var('currency_borrowing_pool_domestic_display').GetValue]M#!."
  je_start_repay_multilateral_banks_button: "Начать Выплачивать деньги"
  je_start_repay_multilateral_banks_button_desc: "[concept_government] [ROOT.GetCountry.GetName] начнет выплачивать часть своего кредита в многосторонних банках развития. \n\nПримечание: @money!#Red [GetPlayer.MakeScope.Var('currency_borrowed_money_yearly_repayment_display').GetValue]#! будет погашать #Yellow XDR#! #Red [GetPlayer.MakeScope.Var('currency_borrowed_money_exchange_adjusted_repayment').GetValue]#! стоимость долга."
  je_stop_repay_multilateral_banks_button: "Прекратить Выплачивать деньги"
  je_stop_repay_multilateral_banks_button_desc: "[concept_government] [ROOT.GetCountry.GetName] прекратит выплачивать часть своего кредита в многосторонних банках развития. \n\nПримечание: @money!#Red [GetPlayer.MakeScope.Var('currency_borrowed_money_yearly_repayment_display').GetValue]#! будет погашать #Yellow XDR#! #Red [GetPlayer.MakeScope.Var('currency_borrowed_money_exchange_adjusted_repayment').GetValue]#! стоимость долга."

  borrow_repay_multilateral_banks.tt: "Не брал и не погашал международные кредиты в течение последнего месяца. \n\nПримечание: @money!#Red [GetPlayer.MakeScope.Var('currency_borrowed_money_yearly_repayment_display').GetValue]#! будет погашать #Yellow XDR#! #Red [GetPlayer.MakeScope.Var('currency_borrowed_money_exchange_adjusted_repayment').GetValue]#! стоимость долга."

