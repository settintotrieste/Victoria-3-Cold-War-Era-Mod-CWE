  je_post_ww2_rationing_reason: "После Второй мировой войны распределение представляло собой систему контролируемого распределения дефицитных ресурсов, введенную во многих странах для преодоления нехватки, вызванной войной. Правительства ввели продуктовые карточки, купоны и балльные системы для регулирования доступа к продуктам питания, одежде, топливу и другим товарам первой необходимости. В Великобритании распределение началось во время войны и продолжалось до 1954 года, охватывая такие товары, как мясо, сахар и молочные продукты. Аналогичные меры были приняты в континентальной Европе, Японии и других регионах, пострадавших от военных потрясений. Целью распределения было обеспечение справедливого доступа к товарам, стабилизация экономики и поддержка усилий по восстановлению в послевоенный период."
  post_ww2_rationing_modifier: "Послевоенное распределение"

  je_civil_service_system: "[ROOT.GetCountry.GetAdjectiveNoFlag] гос. аппарат"
  je_civil_service_system_reason: "[ROOT.GetCountry.GetAdjective] гос. аппарат представляет профессиональную бюрократию которая поддерживает работу системы государства. Занятая исполнением законов, сбором налогов и ведением документов, бюрократия стремится сохранить преемственность и стабильность в условиях меняющейся политической обстановки. \n\nЛидер гос. аппарата: [SCOPE.sCharacter('head_of_civil_service').GetFullName] \n\nПримечание: Коррупцию в гос. аппарате можно снизить с помощью законов в категории #y $lawgroup_corruption_policy$#! [Concept('concept_law','$concept_laws$')]."

