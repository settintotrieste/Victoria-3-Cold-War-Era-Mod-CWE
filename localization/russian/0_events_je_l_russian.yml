  je_judiciary: "[SCOPE.GetRootScope.GetCountry.GetCustom('supreme_court_name')]"
  je_judiciary_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('supreme_court_name')] является высшим судом судебной власти [ROOT.GetCountry.GetName]. Он обладает высшей апелляционной юрисдикцией в отношении всех судебных дел, затрагивающих положения конституционного или статутного права, и, в зависимости от уровня автономии, которым обладают судьи, может в одностороннем порядке вносить поправки в законы.\n\nСудьи обычно назначаются правительством, если процесс назначения политизированный. В противном случае нейтральный судья будет назначен независимым комитетом.\n\n Общее количество судей: #BOLD [GetPlayer.MakeScope.Var('judiciary_size').GetValue]#!\n\n Число [concept_progressive_judiciary] судей: #BOLD [GetPlayer.MakeScope.Var('judiciary_progressiveness').GetValue] #! \n\nПримечание: [concept_progressive_judiciary] судей поддержат более демократичный [Concept('concept_law','$concept_laws$')] в категориях $HUMAN_RIGHTS$ и $POWER_STRUCTURE$."
  je_judiciary_status: "[GetPlayer.MakeScope.Var('judiciary_progressiveness').GetValue] / [GetPlayer.MakeScope.Var('judiciary_size').GetValue] Судьи — [concept_progressive_judiciary]"
