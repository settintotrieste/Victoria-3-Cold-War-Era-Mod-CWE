  devolution_system_1.d: "Люди [SCOPE.sCulture('culture_to_release').GetName] в [SCOPE.sState('state_to_release').GetName] призвали [ROOT.GetCountry.GetName] предоставить [concept_homeland] большую автономию в своих внутренних делах."
  devolution_system_1.f: "Принятие запроса [SCOPE.sCulture('culture_to_release').GetName] создаст $XFC$ в [SCOPE.sCulture('culture_to_release').GetName] [concept_homeland], который затем будет автоматически преобразован в соответствующую страну."
  devolution_system_1.option.1: "Мы принимаем их скромную просьбу о внутренней автономии."
