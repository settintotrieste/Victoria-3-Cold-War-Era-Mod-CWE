  changing_civil_defence_level: "Недавно был изменен уровень Гражданской Обороны"

  je_civil_defence: "[ROOT.GetCountry.GetAdjectiveNoFlag] Гражданская Оборона "
  je_civil_defence_reason: "Гражданская Оборона — это усилия по защите граждан государства (как правило, некомбатантов) от техногенных и природных катастроф. Она использует принципы операций в чрезвычайных ситуациях: предотвращение, смягчение последствий, подготовка, реагирование или экстренная эвакуация и восстановление. \n\nВ данном моде Гражданская Оборона снижает эфект от ядерных и стратегических бомбардировок. \n\nПримечание: Эффективность гражданской обороны можно повысить за счет исследований в области военных технологий."
  je_civil_defence_increase_civil_defence_button: "Повысить финасирование"
  je_civil_defence_increase_civil_defence_button_desc: "[concept_government] повысит уровень Гражданской Обороны за счет увеличения финансирования."
  je_civil_defence_decrease_civil_defence_button: "Понизить финансирование"
  je_civil_defence_decrease_civil_defence_button_desc: "[concept_government] понизит уровень Гражданской Обороны за счет уменьшения финансирования."

  je_one_party_system: "Центральный Коммитет партии [ROOT.GetCountry.GetName]"
  je_one_party_system_reason: "В [ROOT.GetCountry.GetName] допустима только одна легальная(правящая) [concept_party]. Несмотря на это, в Центральном комитете правящей партии существует множество фракций, которые оказывают влияние на идеологическое направление правящей партии. Это определяет кто будет следющим главой партии а так же [concept_ruler] страны. \n\nЦентральый Коммитет балансирует между тремя фракциями: Радикалы, Умеренные, и Реформисты. Все эти фракции борются за лидерство в партии и стране. \n\nКакая фракция доминирует зависит от $Party_Radicalism$ в Центральном Коммитете. Если $Party_Radicalism$ выше 60% доминируют Радикалы, если $Party_Radicalism$ между 40% и 60% доминируют умеренные, и если $Party_Radicalism$ ниже 40% доминируют реформисты. Доминирующая фракция имеет большие шансы определить [concept_ideology] следющего [concept_ruler]. \n\nПредседатель партии: [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [GetPlayer.GetRuler.GetFullName] \n\nПримечание: $Party_Radicalism$ растет при высокой [concept_legitimacy] [concept_government] и снижается при больших [concept_turmoil] в [ROOT.GetCountry.GetName]. \n\nПримечание: $Party_Radicalism$ повышает шанс более #red Автократичного#! следующего [concept_ruler]."

  je_party_system: "[SCOPE.sParty('ruling_party_scope').GetName]"
  je_party_system_reason: "[SCOPE.sParty('ruling_party_scope').GetName] - правящая [SCOPE.GetRootScope.GetCountry.GetCustom('party_or_party_faction_name')] в [ROOT.GetCountry.GetName]. Будучи частью [SCOPE.GetRootScope.GetCountry.GetCustom('party_or_party_faction_name')] системы, [SCOPE.GetRootScope.GetCountry.GetCustom('party_or_party_faction_name')] выбирает своего лидера, и в дополнении [concept_ruler] страны. \n\n[SCOPE.sParty('ruling_party_scope').GetName] балансирует между тремя фракциями: Радикалы, Умеренные, и Реформисты. Все эти фракции борются за лидерство в [SCOPE.GetRootScope.GetCountry.GetCustom('party_or_party_faction_name')] и стране. \n\nКакая фракция доминирует зависит от $Party_Radicalism$ в [SCOPE.sParty('ruling_party_scope').GetName]. Если $Party_Radicalism$ выше 60% доминируют Радикалы, если $Party_Radicalism$ между 40% и 60% доминируют умеренные, и если $Party_Radicalism$ ниже 40% доминируют реформисты. Доминирующая фракция имеет большие шансы определить [concept_ideology] следющего [concept_ruler]. \n\n[SCOPE.GetRootScope.GetCountry.GetCustom('party_or_party_faction_name')] Председатель: [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [GetPlayer.GetRuler.GetFullName] \n\nПримечание: $Party_Radicalism$ растет при низкой [concept_approval] доминирующей [concept_interest_group] в [concept_government] или [concept_government] имеет низкую [concept_legitimacy]. $Party_Radicalism$ снижается при высокой [concept_approval] доминирующей [concept_interest_group] в [concept_government] и [concept_government] имеет высокую [concept_legitimacy]. \n\nПримечание: $Party_Radicalism$ повышает шанс более #red Автократичного#! следующего [concept_ruler]."

