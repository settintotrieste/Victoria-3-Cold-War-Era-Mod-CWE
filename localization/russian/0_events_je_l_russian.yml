  politically_strengthened_modifier: "Политически усиленный"
  je_plot_against_the_dictator_system: "Заговор против [SCOPE.sCharacter('targeted_dictator_scope').GetFullName]"
  je_plot_against_the_dictator_system_reason: "Раскрыт заговор старших членов [concept_government] с целью отстранить [SCOPE.sCharacter('targeted_dictator_scope').GetFullName] от должности.\n\nЧтобы выжить в этом заговоре, [SCOPE.sCharacter('targeted_dictator_scope').GetFullName] необходимо будет обеспечить, чтобы [concept_legitimacy] оставался выше 20 и чтобы ни один [concept_interest_group] в [concept_government] не был несчастным. когда таймер закончится."
