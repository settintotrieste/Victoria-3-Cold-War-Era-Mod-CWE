  nato_member: "Член НАТО"
  nato_leader: "Лидер НАТО"
  form_nato_decision: "Сформировать Организацию Североатлантического договора (НАТО)."
  form_nato_decision_desc: "НАТО представляет собой систему коллективной безопасности: ее независимые государства-члены соглашаются защищать друг друга от нападений третьих сторон. Во время холодной войны НАТО действовало как сдерживающий фактор угрозы, исходящей от Советского Союза. Альянс остался в силе после распада Советского Союза и Варшавского договора и участвовал в военных операциях на Балканах, Ближнем Востоке, в Южной Азии и Африке."
  join_nato_decision: "Вступите в Организацию Североатлантического договора (НАТО)."
  join_nato_decision_desc: "НАТО представляет собой систему коллективной безопасности: ее независимые государства-члены соглашаются защищать друг друга от нападений третьих сторон. Во время холодной войны НАТО действовало как сдерживающий фактор угрозы, исходящей от Советского Союза. Альянс остался в силе после распада Советского Союза и Варшавского договора и участвовал в военных операциях на Балканах, Ближнем Востоке, в Южной Азии и Африке. Примечание. Обычно обработка вашего заявления занимает около 1 месяца."
  leave_nato_decision: "Выход из Организации Североатлантического договора (НАТО)"
  leave_nato_decision_desc: "НАТО представляет собой систему коллективной безопасности: ее независимые государства-члены соглашаются защищать друг друга от нападений третьих сторон. Во время холодной войны НАТО действовало как сдерживающий фактор угрозы, исходящей от Советского Союза. Альянс остался в силе после распада Советского Союза и Варшавского договора и участвовал в военных операциях на Балканах, Ближнем Востоке, в Южной Азии и Африке."
  nato_application_var: "Недавно подал заявку на членство в НАТО."
  nato_application_choice.t: "[SCOPE.sCountry('nato_applicant').GetName] подает заявку на вступление в НАТО"
  nato_application_choice.d: "[SCOPE.sCountry('nato_applicant').GetName] просит о вступлении в Организацию Североатлантического договора (НАТО). Поскольку [SCOPE.sCountry('nato_leader').GetName] в настоящее время председательствует в НАТО, нам решать, принимать ли [SCOPE.sCountry('nato_applicant').GetName] в организацию."
  nato_application_choice.option.1: "Принять"
  nato_application_choice.option.2: "Отклонить"
  nato_application_rejection.t: "Заявка НАТО отклонена"
  nato_application_rejection.d: "Лидер НАТО [SCOPE.sCountry('nato_leader').GetName] отклонил нашу скромную просьбу присоединиться к их великому альянсу. Они ссылаются на геополитические причины отказа от нашего членства."
  nato_application_rejection.1: "Они все равно нас не заслуживают!"
  nato_application_acceptance.t: "Заявка НАТО принята"
  nato_application_acceptance.d: "Лидер НАТО [SCOPE.sCountry('nato_leader').GetName] любезно принял нашу скромную просьбу присоединиться к их великому альянсу. Они ссылаются на геополитические причины принятия нашего членства."
  nato_application_acceptance.1: "Мы благодарим их за щедрость!"
  left_nato_var: "Недавно покинул НАТО."
  nato_expulsion.t: "Членство в НАТО прекращено"
  nato_expulsion.d: "Наше членство в НАТО было немедленно прекращено. Таким образом, все оборонительные пакты со странами НАТО аннулируются."
  nato_expulsion.f: "Это событие произошло потому, что эта страна либо стала недостаточно автономным субъектом, либо стала неприемлемым типом правительства, либо стала дипломатически нейтральной."

  rio_pact_member: "Член Пакта Рио"
  rio_pact_leader: "Лидер Пакта Рио"
  form_rio_pact_decision: "Заключить Межамериканский договор о взаимной помощи"
  form_rio_pact_decision_desc: "Межамериканский договор о взаимной помощи (широко известный как Пакт Рио) — это соглашение, подписанное в 1947 году в Рио-де-Жанейро между многими странами Америки. Центральный принцип, содержащийся в его статьях, заключается в том, что нападение на одного должно рассматриваться как нападение на всех. Это было известно как доктрина «защиты полушария». Несмотря на это, некоторые члены неоднократно нарушали договор. Первоначально договор был создан в 1947 году и вступил в силу в 1948 году в соответствии со статьей 22 договора."
  join_rio_pact_decision: "Присоединяйтесь к Межамериканскому договору о взаимной помощи (Пакт Рио)"
  join_rio_pact_decision_desc: "Межамериканский договор о взаимной помощи (широко известный как Пакт Рио) — это соглашение, подписанное в 1947 году в Рио-де-Жанейро между многими странами Америки. Центральный принцип, содержащийся в его статьях, заключается в том, что нападение на одного должно рассматриваться как нападение на всех. Это было известно как доктрина «защиты полушария». Несмотря на это, некоторые члены неоднократно нарушали договор. Первоначально договор был создан в 1947 году и вступил в силу в 1948 году в соответствии со статьей 22 договора. Примечание. Обычно обработка вашего заявления занимает около 1 месяца."
