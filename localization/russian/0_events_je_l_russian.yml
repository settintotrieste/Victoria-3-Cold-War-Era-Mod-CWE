  wartime_measures_martial_law: "Военное положение во время войны"

  je_wartime_measures_rationing_button: "Ввести нормирование"
  je_wartime_measures_rationing_button_desc: "Нормирование – это ограничение товаров или услуг, пользующихся высоким спросом и дефицитом. Это часто предпринимается правительствами как способ смягчить последствия дефицита и решить экономические проблемы."
  je_wartime_measures_rationing_remove_button: "Конец нормирования"
  je_wartime_measures_rationing_remove_button_desc: "[concept_government] может отменить режим нормирования в любой момент во время войны."
  recently_enacted_wartime_measures_rationing.tt: "Нормирование введено минимум на 3 месяца."
  wartime_measures_rationing: "Нормирование военного времени"

  je_wartime_measures_propaganda_button: "Распространение пропаганды"
  je_wartime_measures_propaganda_button_desc: "Пропаганда — мощное оружие на войне, поскольку ее можно использовать для дегуманизации и разжигания ненависти к предполагаемому врагу, как внутреннему, так и внешнему, путем создания ложного образа в сознании солдат и граждан.\n\n5 [concept_war_support] будет добавлен для каждый месяц, пока действует эта мера военного времени."
  je_wartime_measures_propaganda_remove_button: "Остановить пропаганду"
  je_wartime_measures_propaganda_remove_button_desc: "[concept_government] может прекратить распространение пропаганды в любой момент во время войны. 5 [concept_war_support] больше не будет добавляться каждый месяц."
  recently_enacted_wartime_measures_propaganda.tt: "Пропаганда распространяется уже как минимум 3 месяца."
  wartime_measures_propaganda: "Пропаганда военного времени"

  je_wartime_measures_war_bonds_button: "Выпуск военных облигаций"
  je_wartime_measures_war_bonds_button_desc: "Военные облигации — это долговые ценные бумаги, выпускаемые правительством для финансирования военных операций во время войны или конфликта. Поскольку доходность военных облигаций была ниже рыночной, инвестиции осуществлялись за счет эмоциональных призывов к патриотически настроенным гражданам одолжить государству деньги."
  recently_enacted_wartime_measures_war_bonds.tt: "Военные облигации не выпускались в течение последнего 1 месяца."

  je_wartime_measures_total_war_button: "Обьявить тотальную войну"
  je_wartime_measures_total_war_button_desc: "[concept_government] мобилизует все общество на дело войны и все способные мужчины будут поставлены под ружье. Наше дело правое, мы победим!"
  wartime_measures_total_war: "Тотальная Война!"

  notification_declared_total_war_notification_name: "[SCOPE.sCountry('total_war_country').GetAdjective] Тотальная Война"
  notification_declared_total_war_notification_desc: "[concept_government] [SCOPE.sCountry('total_war_country').GetName] обявило тотальную войну и начало массовую мобилизацию населения. Это позвоялет Вооруженным Силам [SCOPE.sCountry('total_war_country').GetAdjective] выставить гораздо большую армию."

