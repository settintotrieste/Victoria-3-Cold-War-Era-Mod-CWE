  change_dynamic_IG_ideology.t: "Изменения в [Concept('concept_ideology','$concept_ideologies$')] [concept_interest_group]"
  change_dynamic_IG_ideology.d: "[Concept('concept_ideology','$concept_ideologies$')] определенной [Concept('concept_interest_group', '$concept_interest_groups$')] в [ROOT.GetCountry.GetName] изменилась в связи с изменением [concept_ideology] [concept_leader] этой [Concept('concept_interest_group', '$concept_interest_groups$')]."
  change_dynamic_IG_ideology.f: "Каждая [concept_interest_group] имеет набор [Concept('concept_ideology','$concept_ideologies$')] для каждой [Concept('concept_ideology','$concept_ideologies$')] [concept_leader] которая может быть. Это изменение будет вступать в силу один раз в год."

  enforce_parliamentary_regime_system.t: "Кризис в правительстве [GetPlayer.GetRuler.GetLastName]"
  enforce_parliamentary_regime_system.d: "В связи с серией правительственных перестановок, [concept_interest_group] [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [GetPlayer.GetRuler.GetFullName] неожиданно оказалась не в составе [concept_government]. \n\nТак как парламентская система [ROOT.GetCountry.GetAdjective] правительства требует, чтобы [concept_party] или [concept_interest_group] [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] так же была в [concept_government], [GetPlayer.GetRuler.GetInterestGroup.GetName] должен вернуть их в [concept_government] или [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] должен покинуть пост."
  enforce_parliamentary_regime_system.f: "Это событие произошло так как [concept_government_type] в [ROOT.GetCountry.GetName] #y Парламентское#! но [concept_interest_group] [concept_ruler] не в [concept_government]."

  enact_cult_of_personality_decision: "Создать $amendment_cult_of_personality$"
  enact_cult_of_personality_decision_desc: "[concept_government] создаст культ личности вокруг [concept_ruler] в рамках которого [concept_ruler] будет использовать средства массовой информации, пропаганду или другие методы для создания идеализированного, героического, а порой и вызывающего восхищение образа, часто посредством безоговорочной лести и похвалы."

  grant_washington_dc_statehood_decision: "Предоставить $STATE_DISTRICT_OF_COLUMBIA$ статус штата"
  grant_washington_dc_statehood_decision_desc: "$STATE_DISTRICT_OF_COLUMBIA$ в настоящее время не имеет права голоса в национальном законодательном органе. [concept_government] примет закон для исправления этой ошибки. \n\nЭто решение позволит $STATE_DISTRICT_OF_COLUMBIA$ занимать места в национальном законодательном органе."

  je_law_enactment_system_foreign_assistance_button: "Обратиться за иностранной помощью."
  je_law_enactment_system_foreign_assistance_button_desc: "[concept_government] [ROOT.GetCountry.GetName] обратится за помощью к влиятельному иностранному [concept_diplomat_character], находящемуся в стране для манипуляции над [SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')] для поддержки принятия #y Закона#!."
  law_enactment_timer_2.tt: "В последнее время принятие закона не приостанавливалось, не возобновлялось и не прерывалось (если прерывание имело место, то в течение 6 месяцев)."
  law_enactment_foreign_assistance.tt: "Любой [concept_diplomat_character] другой страны, расположеный в [ROOT.GetCountry.GetName] #g Поддерживает#! либо #g Сильно поддерживает#! [concept_law] который [Concept('concept_enactment_of_laws', '$concept_enactment_of_laws_enacted$')] в данный момент"

