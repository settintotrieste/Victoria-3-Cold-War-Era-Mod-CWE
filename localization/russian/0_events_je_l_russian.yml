  je_join_superstate_free_trade_zone_button: "Присоединяйтесь к общему рынку"
  je_join_superstate_free_trade_zone_button_desc: "Общий рынок обычно называют первым этапом создания [concept_customs_union]. Обычно она строится на основе зоны свободной торговли без тарифов на товары и относительно свободного движения капитала, рабочей силы и услуг, но не настолько продвинута в снижении других торговых барьеров. \n\nВ игре это представлено созданием [concept_trade_agreement] между всеми странами, которые разделяют одни и те же амбиции Сверхобьединения и решили присоединиться к Общему рынку Сверхобьединения."

  je_leave_superstate_free_trade_zone_button: "Выход из общего рынка"
  je_leave_superstate_free_trade_zone_button_desc: "Общий рынок обычно называют первым этапом создания [concept_customs_union]. Обычно она строится на основе зоны свободной торговли без тарифов на товары и относительно свободного движения капитала, рабочей силы и услуг, но не настолько продвинута в снижении других торговых барьеров. \n\nВ игре это представлено созданием [concept_trade_agreement] между всеми странами, которые разделяют одни и те же амбиции Сверхобьединения и решили присоединиться к Общему рынку Сверхобьединения."

  je_join_superstate_customs_union_button: "Присоединяйтесь к единому рынку"
  je_join_superstate_customs_union_button_desc: "Единый рынок – это последний этап и конечная цель интегрированной региональной экономики. Это требует полного свободного перемещения товаров, услуг (включая финансовые услуги), капитала и людей независимо от национальных границ. \n\nВ игре это представлено созданием [concept_customs_union] между всеми странами, которые разделяют одни и те же амбиции Сверхобьединения и решили присоединиться к Таможенному союзу Сверхобьединения."

  je_leave_superstate_customs_union_button: "Покинуть единый рынок"
  je_leave_superstate_customs_union_button_desc: "[concept_customs_union] — это последняя стадия и конечная цель единого рынка. Это требует полного свободного перемещения товаров, услуг (включая финансовые услуги), капитала и людей независимо от национальных границ. \n\nВ игре это представлено созданием [concept_customs_union] между всеми странами, которые разделяют одни и те же амбиции Сверхобьединения и решили присоединиться к Таможенному союзу Сверхобьединения."

  je_join_superstate_currency_union_button: "Вступить в Валютный Союз"
  je_join_superstate_currency_union_button_desc: "Мы можем создать [concept_currency_union], состоящий из других членов $custom_loc_superstate_full_title$. \n\nВ игре это представлено созданием [concept_currency_union] между этой страной и лидером [concept_market] нашей страны."

  je_leave_superstate_currency_union_button: "Выход из валютного союза"
  je_leave_superstate_currency_union_button_desc: "Мы можем покинуть [concept_currency_union], состоящий из других членов $custom_loc_superstate_full_title$. \n\nВ игре это представлено созданием [concept_currency_union] между этой страной и лидером [concept_market] нашей страны."

  je_join_superstate_defence_union_button: "Вступить в Союз обороны"
  je_join_superstate_defence_union_button_desc: "Мы можем создать Союз региональной обороны, состоящий из членов $custom_loc_superstate_full_title$. \n\nВ игре это представлено созданием [concept_defensive_pact] между всеми странами, которые разделяют одни и те же амбиции Сверхобьединения и решили присоединиться к Союзу защиты Сверхобьединения."

  je_leave_superstate_defence_union_button: "Выйти из Союза обороны"
  je_leave_superstate_defence_union_button_desc: "Мы можем выйти из Союза региональной обороны, состоящего из других членов $custom_loc_superstate_full_title$. \n\nВ игре это представлено созданием [concept_defensive_pact] между всеми странами, которые разделяют одни и те же амбиции Сверхобьединения и решили присоединиться к Союзу защиты Сверхобьединения."

  je_join_superstate_political_union_button: "Вступить в политический союз"
  je_join_superstate_political_union_button_desc: "Мы можем создать Региональный политический союз, состоящий из других членов $custom_loc_superstate_full_title$. \n\nВ игре это представлено гармонизацией законов, когда их приняли большинство членов Сверхобьединения. \n\n@warning! Любой [concept_law], принятый более чем 50% ([GetPlayer.MakeScope.Var('superstate_members_majority').GetValue]) государств-членов, также будет принят нами автоматически."

  je_superstate_warning_custom_title: "\n\n@warning! В связи с Политическим союзом [SCOPE.GetRootScope.GetCountry.GetCustom('je_superstate_adjective_custom_title')] любой [concept_law], принятый более чем 50% ([GetPlayer.MakeScope.Var('superstate_members_majority').GetValue]) государств-членов $custom_loc_superstate_full_title$, также будет автоматически принят [ROOT.GetCountry.GetName]."

  je_leave_superstate_political_union_button: "Выйти из политического союза"
  je_leave_superstate_political_union_button_desc: "Мы можем создать Региональный политический союз, состоящий из других членов $custom_loc_superstate_full_title$. \n\nВ игре это представлено гармонизацией законов, когда их приняли большинство членов Сверхобьединения."

  je_create_superstate_final_union_button: "Создать Союзное государство"
  je_create_superstate_final_union_button_desc: "Мы можем создать единую страну, состоящую из членов $custom_loc_superstate_full_title$. \n\nВ игре это представлено тем, что эта страна превращается в тег страны-Сверхобьединения и образует [concept_confederal_state] [concept_diplomatic_pact] со всеми другими членами сверхдержавы. Затем эти члены смогут впоследствии выбрать, будут ли они присоединены к Сверхобьединению."

  je_join_superstate_final_union_button: "Присоединяйтесь к Союзному государству"
  je_join_superstate_final_union_button_desc: "Мы можем присоединиться к объединенному Сверхобьединению, состоящей из членов $custom_loc_superstate_full_title$. \n\nВ игре это представлено тем, что эта страна присоединена к тегу страны-Сверхобьединение."

