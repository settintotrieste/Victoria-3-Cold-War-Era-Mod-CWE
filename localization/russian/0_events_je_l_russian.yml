  nordic_council_expulsion.t: "Членство в Северном Совете прекращено"
  nordic_council_expulsion.d: "Наше членство в Северном Совете было немедленно прекращено. Таким образом, все льготы, предоставленные в рамках наших договоров со странами Северного Совета, настоящим отменяются."
  nordic_council_expulsion.f: "Это событие произошло потому, что эта страна либо стала недостаточно автономным субъектом, либо стала неприемлемым типом правительства, либо стала международным изгоем."

  je_wto_system: "Всемирная торговая организация"
  je_wto_system_reason: "Всемирная торговая организация (ВТО) — это межправительственная организация, которая регулирует и содействует международной торговле. ВТО облегчает торговлю товарами, услугами и интеллектуальной собственностью между странами-участницами, предоставляя основу для переговоров по торговым соглашениям, которые обычно направлены на снижение или отмену тарифов, квот и других ограничений. \n\nПоскольку ВТО постоянно обновляет свои торговые рамки, снижение [concept_tariffs] ВТО меняется от года к году. \n\nПримечание: Размер снижения [concept_tariffs] зависит от глобальной экономической обстановки."

