  je_nato_system: "Организация Североатлантического договора"
  je_nato_system_reason: "Организация Североатлантического договора - межправительственный военный союз государств Европы и Северной Америки. Созданная после Второй мировой войны, организация выполняет Североатлантический договор, подписанный в Вашингтоне 4 апреля 1949 года. НАТО - это система коллективной безопасности: ее независимые государства-члены обязуются защищать друг друга от нападения третьих сторон."
  je_nato_system_status: "Всего членов: [GetPlayer.MakeScope.Var('nato_member_count').GetValue]"

  je_request_nato_intervention_button: "Применить 5ую статью"
  je_request_nato_intervention_button_desc: "Статья 5 предусматривает, что если союзник по НАТО становится жертвой вооруженного нападения, каждый другой член Альянса будет рассматривать этот акт насилия как вооруженное нападение на всех членов Альянса и предпримет действия, которые сочтет необходимыми для оказания помощи союзнику, подвергшемуся нападению."

  je_fund_nato_button: "Финансировать НАТО"
