  create_space_agency_decision: "Запустить космическю программу"
  create_space_agency_decision_desc: "Исследование космоса — это использование астрономии и космических технологий для изучения космического пространства. Хотя в настоящее время исследование космоса осуществляется в основном астрономами с помощью телескопов, его физическое изучение проводится как с помощью беспилотных роботизированных космических зондов, так и с помощью пилотируемых космических полетов."
  
