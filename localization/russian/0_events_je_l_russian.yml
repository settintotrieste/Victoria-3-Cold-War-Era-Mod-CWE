  IDO_1959_revolution.t: "Управляемая демократия?"
  IDO_1959_revolution.d: "\"Управляемая демократия\" - это политическая система, существовавшая в Индонезии с 1959 года до начала Нового порядка в 1966 году. Она была детищем президента Сукарно и представляла собой попытку обеспечить политическую стабильность. Сукарно считал, что парламентская система, внедренная в Индонезии в период либеральной демократии, неэффективна из-за раскола в стране. Вместо этого он стремился создать систему, основанную на традиционной деревенской системе обсуждения и консенсуса, которые происходили под руководством деревенских старейшин. После объявления военного положения и введения этой системы Индонезия вернулась к президентской системе, и Сукарно снова стал главой правительства"
  IDO_1968_revolution.t: "Новый порядок"
  IDO_1968_revolution.d: "Попытка переворота 30 сентября и 1 октября 1965 года была отбита войсками под руководством Сухарта. Согласно официальной истории, составленной армией, эта попытка была поддержана Коммунистической партией Индонезии (ИПК). После этого армия провела общенациональную жестокую антикоммунистическую чистку, а Сухарто отвоевал власть у президента-основателя Индонезии Сукарно. В рамках своего правления \"Новый порядок\" Сухарто создал сильное, централизованное правительство, в котором доминировали военные. То, что начиналось как олигархическая военная диктатура, превратилось в персоналистский авторитарный режим с центром в лице Сухарто"
  IDO_1998_revolution.t: "Демократизация Индонезии?"
  IDO_1998_revolution.d: "Поскольку Сухарто все больше воспринимался как источник нарастающего экономического и политического кризиса в стране, видные политические деятели, в том числе мусульманский политик Амиен Раис, выступили против его президентства, а в январе 1998 года студенты университетов начали организовывать общенациональные демонстрации. Кризис достиг кульминации 12 мая 1998 года, когда Сухарто находился с государственным визитом в Египте, когда силы безопасности убили четырех демонстрантов из университета Трисакти в Джакарте. 21 мая 1998 года Сухарто объявил о своей отставке, после чего вице-президент Хабиби вступил в должность президента в соответствии с конституцией."

  SKO_1987_revolution.t: "Июньская демократическая борьба?"
  SKO_1987_revolution.d: "\"Июньская демократическая борьба\" - это общенациональное продемократическое движение в Южной Корее, которое вызвало массовые протесты с 10 по 29 июня 1987 года. Демонстрации заставили правящее правительство провести прямые президентские выборы и другие демократические реформы, которые привели к созданию Шестой республики, нынешнего правительства Южной Кореи."

  ROC_1996_revolution.t: "Демократизация Тайваня?"
  ROC_1996_revolution.d: "В 1987 году было отменено военное положение, и Тайвань начал процесс демократизации, начавшийся с отмены Временных положений и завершившийся первыми прямыми выборами президента в 1996 году."

  SVM_1955_revolution.t: "Референдум о государстве Вьетнам"
  SVM_1955_revolution.d: "Референдум о государстве Вьетнам 1955 года определил будущую форму правления государства Вьетнам, государства, которое должно было стать Республикой Вьетнам (широко известной как Южный Вьетнам). В референдуме участвовали премьер-министр Нго Чинь Дием, предложивший республику, и бывший император Бảо Джабай, который отрекся от престола в 1945 году и на момент референдума носил титул главы государства."
  SVM_1963_revolution.t: "Государственный переворот в Южном Вьетнаме?"
  SVM_1963_revolution.d: "В ноябре 1963 года президент Нго Чинь Дием и Персоналистская рабочая революционная партия Южного Вьетнама были свергнуты группой офицеров Армии Республики Вьетнам, поддерживаемых ЦРУ, которые были не согласны с тем, как Дием справлялся с буддийским кризисом и угрозой со стороны Северного Вьетнама и Вьетконга для Южного Вьетнама."

  SRL_1956_revolution.t: "Закон о сингальском языке"
  SRL_1956_revolution.d: "Закон об официальном языке (№ 33 от 1956 года), обычно называемый Законом о сингальском языке, был принят парламентом Цейлона в 1956 году. Закон заменил английский язык сингальским в качестве единственного официального языка Цейлона, исключив из него тамильский. Закон вызвал много споров, поскольку его сторонники рассматривали его как попытку общины, только что получившей независимость, дистанцироваться от своих колониальных хозяев, а противники - как попытку языкового большинства притеснять меньшинства и утверждать свое господство над ними."
  SRL_1978_revolution.t: "Создать сильную президентскую власть?"
  SRL_1978_revolution.d: "Новая Конституция, обнародованная 7 сентября 1978 года, предусматривала однопалатный парламент и исполнительного президента. Срок полномочий президента и парламента был установлен в шесть лет. Новая Конституция также ввела форму многомандатного пропорционального представительства для выборов в парламент, который должен был состоять из 196 членов (впоследствии увеличенных до 225 в соответствии с Четырнадцатой поправкой к Конституции)."

  BNG_1975_revolution.t: "Президентская эра?"
  BNG_1975_revolution.d: "В январе 1975 года шейх Муджибур Рахман ввел однопартийное социалистическое правление под названием БАКСАЛ. Рахман запретил все газеты, кроме четырех государственных изданий, и внес поправки в конституцию, чтобы усилить свою власть. Он был убит во время переворота 15 августа 1975 года, и президентские полномочия на четыре месяца перешли к узурпатору Хондакеру Мостаку Ахмаду. В течение трех лет Бангладеш управлялся военной хунтой во главе с Главным администратором военного положения. В 1977 году президентом стал глава армии Зиаур Рахман"
  BNG_1991_revolution.t: "Возвращение к парламентской демократии?"
  BNG_1991_revolution.d: "После всеобщих выборов 1991 года двенадцатая поправка к конституции восстановила парламентскую республику, и Бегум Халеда Зия стала первой женщиной-премьер-министром Бангладеш. Зия, бывшая первая леди, возглавляла правительство БНП с 1990 по 1996 год. В 1991 году ее министр финансов Сайфур Рахман начал реализацию масштабной программы по либерализации бангладешской экономики"

  AST_1999_revolution.t: "Республиканский референдум"
  AST_1999_revolution.d: "Австралийский республиканский референдум, состоявшийся 6 ноября 1999 года, представлял собой референдум по изменению Конституции Австралии, состоявший из двух вопросов. Первый вопрос касался того, должна ли Австралия стать республикой с президентом, назначаемым парламентом в соответствии с двухпартийной моделью назначения, которая была одобрена наполовину избранным, наполовину назначенным Конституционным собранием, состоявшимся в Канберре в феврале 1998 года. Второй вопрос, который, как правило, считался гораздо менее важным с политической точки зрения, касался того, следует ли Австралии внести изменения в Конституцию, добавив в нее преамбулу. Республиканский референдум потерпел поражение"

  AFG_1973_revolution.t: "Республика Афганистан?"
  AFG_1973_revolution.d: "Республика Афганистан DESC"
  AFG_1978_revolution.t: "Саурская революция?"
  AFG_1978_revolution.d: "Саурская революция DESC"
  AFG_1996_revolution.t: "Исламский Эмират Афганистан?"
  AFG_1996_revolution.d: "Исламский Эмират Афганистан DESC"

  LAO_1975_revolution.t: "Возвышение Патет Лао?"
  LAO_1975_revolution.d: "Возвышение Патет Лао DESC"

  MLY_1955_revolution.t: "Полное самоуправление в Малайе?"
  MLY_1955_revolution.d: "В среду, 27 июля 1955 года, в Малайской Федерации состоялись всеобщие выборы - единственные всеобщие выборы до обретения независимости в 1957 году. Они проводились для избрания членов Федерального законодательного совета, члены которого ранее полностью назначались британским верховным комиссаром. Голосование проходило во всех 52 федеральных округах, в каждом из которых избирался один депутат. С 10 октября 1954 года по 12 ноября 1955 года также прошли выборы во всех 136 округах штатов в девяти штатах Малайи и двух поселениях, в каждом из которых избирался один советник в совет штата или поселений"

  SGP_1963_revolution.t: "Операция \"Coldstore?\""
  SGP_1963_revolution.d: "Операция \"Coldstore\" - это кодовое название тайной операции по обеспечению безопасности, проведенной в Сингапуре 2 февраля 1963 года, которая привела к аресту 113 человек, задержанных без суда и следствия в соответствии с Постановлением о сохранении безопасности государственной службы (PSSO). По официальной версии, операция проводилась с целью уничтожения коммунистической организации \"Открытый фронт\", которая угрожала внутренней безопасности Сингапура. Операция была санкционирована Советом внутренней безопасности, в состав которого входили представители британского правительства, правительства Сингапура и федерального правительства Малайзии"
  SGP_1990_revolution.t: "Отставка Ли Куан Ю?"
  SGP_2004_revolution.t: "Премьерство Ли Сянь Луна?"
  SGP_2004_revolution.d: "12 августа 2004 года Ли сменил Го Чок Тонга на посту премьер-министра и передал Го свое председательство в Валютном управлении Сингапура.Главный судья Йонг Пунг Хау привел Ли к присяге в Истане.Став премьер-министром, Ли также стал председателем Народной ассоциации. В первые два года его правительство ввело пятидневную рабочую неделю и увеличило продолжительность декретного отпуска. Его предложение построить в Сингапуре два интегрированных курорта для увеличения доходов от туризма привело к развитию Marina Bay Sands и Resorts World Sentosa"
  SGP_1990_revolution.d: "Приведя ППА к победе на семи выборах, Ли ушел в отставку 28 ноября 1990 года, передав пост премьер-министра Го Чок Тонгу. К тому времени он стал самым долгоживущим премьер-министром в мире. Это была первая смена руководства со времен независимости. Го был избран новым премьер-министром молодыми министрами, занимавшими в то время свой пост"

  PHI_1965_revolution.t: "Президентство Фердинанда Маркоса?"
  PHI_1965_revolution.d: "Фердинанд Маркос был инаугурирован на свой первый срок в качестве 10-го президента Филиппин 30 декабря 1965 года. Инаугурация ознаменовала начало его двухдесятилетнего пребывания у власти, несмотря на то что Конституция Филиппин 1935 года устанавливала ограничение только на два четырехлетних срока пребывания у власти. Маркос выиграл президентские выборы на Филиппинах в 1965 году у действующего президента Диосдадо Макапагала"
  PHI_1986_revolution.t: "Революция народной власти?"
  PHI_1986_revolution.d: "Революция народовластия - серия народных демонстраций на Филиппинах, в основном в метрополитене Манилы, с 22 по 25 февраля 1986 года. Это была продолжительная кампания гражданского сопротивления против насилия со стороны режима и фальсификации выборов. Ненасильственная революция привела к уходу Фердинанда Маркоса, окончанию его 20-летней диктатуры и восстановлению демократии на Филиппинах."

  SOV_stalin_succession.t: "Преемник Сталина?"
  SOV_stalin_succession.d: "1 марта 1953 года у Иосифа Сталина, 73-летнего лидера Советского Союза, произошло кровоизлияние в мозг, от которого он умер четыре дня спустя. Смерть Сталина стала поводом для десятков тысяч убитых горем советских граждан скопиться в центре Москвы. Даже когда Сталин умирал, Президиум партии, заменивший Политбюро на XIX съезде в октябре 1952 года, уже собрался, чтобы решить, кто будет править теперь."
  SOV_khrushchev.option: "Выберите Никиту Хрущева"
  SOV_beria.option: "Выберите Лаврентия Берию"
  SOV_molotov.option: "Выбрать Вячеслава Молотова"
  SOV_zhukov.option: "Выберите Георгия Жукова"
  SOV_khrushchev_succession.t: "Падение Никиты Хрущева?"
  SOV_khrushchev_succession.d: "Хрущев пользовался мощной поддержкой в ​​1950-е годы благодаря таким крупным победам, как Суэцкий кризис, запуск спутника, сирийский кризис 1957 года и инцидент с U-2 в 1960 году. Однако к началу 1960-х годов популярность Хрущева была подорвана недостатками его политики, а также его подходом к кубинскому ракетному кризису. Это придало смелости его потенциальным противникам, которые незаметно набрали силу и свергли его в октябре 1964 года."
  SOV_khrushchev_succession_option.1: "Хрущева сменил Брежнев."
  SOV_khrushchev_succession_option.2: "Хрущев выдерживает испытание лидерством!"
  SOV_gorbachev_succession.t: "Генеральный секретарь - реформатор?"
  SOV_gorbachev_succession.d: "10 марта 1985 года Черненко скончался. Громыко предложил Горбачева следующим генеральным секретарем, как давнего члена партии. Рекомендация Громыко имела большой вес в ЦК. Горбачев ожидал большого сопротивления его выдвижению на пост генерального секретаря, но в конечном итоге остальная часть Политбюро поддержала его. Вскоре после смерти Черненко Политбюро единогласно избрало Горбачева своим преемником. Таким образом, он стал восьмым лидером Советского Союза. Мало кто в правительстве предполагал, что он окажется настолько радикальным реформатором."
  SOV_gorbachev.option: "Мы приветствуем более энергичного лидера!"
  SOV_other.option: "Мы предпочитаем более 'опытного' лидера"
  SOV_august_coup.t: "Августовский переворот"
  SOV_august_coup.d: "\"Августовский переворот\" - неудачная попытка сторонников жесткой линии в Коммунистической партии Советского Союза насильственно захватить контроль над страной у Михаила Горбачева, который в то время был президентом СССР и генеральным секретарем Коммунистической партии. Лидеры переворота состояли из высших военных и гражданских чиновников, включая вице-президента Геннадия Янаева, которые вместе сформировали Государственный комитет по чрезвычайному положению (ГКЧП). Они выступали против программы реформ Горбачева, были возмущены потерей контроля над восточноевропейскими странами и опасались нового союзного договора СССР, который был на грани подписания. Этот договор должен был децентрализовать большую часть власти центрального советского правительства и распределить ее между пятнадцатью республиками."
  SOV_august_coup.optio: "Переворот провалился!"
  SOV_august_coup_other.option: "Переворот удался"

  PRC_1966_revolution.t: "Культурная революция?"
  PRC_1966_revolution.d: "Культурная революция, официально известная как Великая пролетарская культурная революция, была общественно-политическим движением в Китайской Народной Республике (КНР). Она была начата Мао Цзэдуном в 1966 году и продолжалась до его смерти в 1976 году. Его заявленной целью было сохранение китайского коммунизма путем вытеснения из китайского общества остатков капиталистических и традиционных элементов. Хотя она не достигла своих главных целей, КР ознаменовала фактическое возвращение Мао в центр власти"
  PRC_1966_revolution.option.1: "Очистить диссидентов!"
  PRC_1966_revolution.option.2: "Я не против того, чтобы мне противостояли..."
  PRC_mao_succession.t: "Преемник Мао?"
  PRC_mao_succession.d: "В последние годы жизни Мао здоровье ухудшилось, вероятно, усугубленное его постоянным курением. Стало государственной тайной, что в последние годы жизни он страдал от многочисленных заболеваний легких и сердца. Его последнее публичное появление – и последняя известная фотография его живого – состоялось 27 мая 1976 года, когда он встретился с приехавшим в Пакистан премьер-министром Зульфикаром Али Бхутто. Он перенес два серьезных сердечных приступа: один в марте, другой в июле, а затем третий 5 сентября, что сделало его инвалидом. Он умер почти четыре дня спустя, в 00:10 9 сентября 1976 года, в возрасте 82 лет."
  PRC_deng.option: "Дэн Сяопин возьмет верх!"
  PRC_jing_qing.option: "Банда четырех будет править Китаем!"

  PRC_1989_1_revolution.t: "Инцидент четвертого июня"
  PRC_1989_1_revolution.d: "Протесты на площади Тяньаньмэнь, известные в Китае как Инцидент Четвертого июня, были демонстрациями под руководством студентов, проходившими на площади Тяньаньмэнь в Пекине, Китай, с 15 апреля по 4 июня 1989 года. После нескольких недель безуспешных попыток демонстрантов и китайского правительства найти мирное решение, китайское правительство объявило военное положение в ночь на 3 июня и ввело войска, чтобы занять площадь."
  PRC_1989_revolution.option.1: "В ту ночь ничего не произошло!"
  PRC_1989_revolution.option.2: "Этой ночью что-то произошло"

  PRC_1989_2_revolution.t: "Президентство Цзян Цзэминя?"
  PRC_1989_2_revolution.d: "Цзян был назначен мэром Шанхая в 1985 году, а в 1987 году стал секретарем компартии и членом Политбюро КПК. Цзян неожиданно пришел к власти в качестве компромиссного кандидата после протестов и бойни на площади Тяньаньмэнь в 1989 году, когда он сменил Чжао Цзыяна на посту генерального секретаря КПК после того, как Чжао был смещен за поддержку студенческого движения. По мере того как участие \"восьми старейшин\" в китайской политике неуклонно снижалось, Цзян укреплял свою власть и стал \"первостепенным лидером\" в стране в 1990-е годы."

  PRC_2002_revolution.t: "Президентство Ху Цзиньтао?"
  PRC_2002_revolution.d: "Ху пришел к власти в Китайской коммунистической партии (КПК), в частности, в качестве секретаря парткома провинции Гуйчжоу и Тибетского автономного района, где его жесткие репрессии против инакомыслия привлекли к нему внимание на самом высоком уровне. Он поднялся до первого секретаря Центрального секретариата КПК и вице-президента при генеральном секретаре КПК Цзян Цзэмине. Ху стал первым лидером Коммунистической партии из поколения, более молодого, чем те, кто участвовал в гражданской войне и создании республики. Влиятельные спонсоры из старшего поколения способствовали его стремительному взлету"

  PRC_2012_revolution.t: "Президентство Си Цзиньпина?"
  PRC_2012_revolution.d: "В 2008 году Си был назначен предполагаемым преемником Ху Цзиньтао на посту верховного лидера. Си был избран президентом 14 марта 2013 года в ходе голосования по утверждению кандидатуры на 12-м Всекитайском собрании народных представителей в Пекине. За него проголосовали 2 952 человека, один голос был подан против, и трое воздержались. Он сменил Ху Цзиньтао, который ушел в отставку после двух сроков правления"

  USA_1963_revolution.t: "Убийство Джона Ф. Кеннеди?"
  USA_1963_revolution.d: "22 ноября 1963 года Джон Ф. Кеннеди, 35-й президент США, был убит во время поездки в президентском кортеже по Дили-плаза в Далласе, штат Техас. Кеннеди находился в автомобиле вместе со своей женой Жаклин, губернатором Техаса Джоном Коннелли и женой Коннелли Нелли, когда в него из расположенного неподалеку Техасского школьного книгохранилища выстрелил бывший морской пехотинец Ли Харви Освальд"
  USA_1964_revolution.t: "Принять Закон о гражданских правах?"
  USA_1964_revolution.d: "Закон о гражданских правах 1964 года является знаковым законом о гражданских правах и труде в Соединенных Штатах, который запрещает дискриминацию по признаку расы, цвета кожи, религии, пола и национального происхождения. Он запрещает неравное применение требований по регистрации избирателей, расовую сегрегацию в школах и общественных местах, а также дискриминацию при приеме на работу."
  USA_1974_revolution.t: "Уотергейтский скандал"
  USA_1974_revolution.d: "\"Уотергейтский скандал\" - крупный политический скандал в США, связанный с администрацией президента Ричарда Никсона в 1972-1974 годах, который привел к отставке Никсона. Скандал был вызван попытками администрации Никсона скрыть свою причастность к взлому штаб-квартиры Демократического национального комитета в Вашингтоне 17 июня 1972 года в офисном здании Уотергейт."
  USA_1998_revolution.t: "Импичмент Билла Клинтона?"
  USA_1998_revolution.d: "Билл Клинтон, 42-й президент США, был подвергнут импичменту Палатой представителей Конгресса США 105-го созыва 19 декабря 1998 года за \"высокие преступления и проступки\" Палата представителей приняла две статьи импичмента против Клинтона, в которых Клинтон обвинялся во лжи под присягой и препятствовании правосудию. Ранее рассматривались две другие статьи, но они были отклонены голосованием Палаты представителей. Утвержденные статьи импичмента были переданы в Сенат США 7 января 1999 года. Затем началось судебное разбирательство в Сенате под председательством главного судьи Уильяма Ренквиста. 12 февраля Клинтон был оправдан по обоим пунктам обвинения, поскольку ни один из них не набрал необходимого большинства в две трети голосов присутствующих сенаторов для вынесения обвинительного приговора и отстранения от должности."
  USA_2019_revolution.t: "Импичмент Дональда Трампа?"
  USA_2019_revolution.d: "Первый импичмент Дональда Трампа (45-го президента США) начался 18 декабря 2019 года во время работы 116-го Конгресса США, когда Палата представителей приняла две статьи импичмента против Трампа: злоупотребление властью и препятствование работе Конгресса. 5 февраля 2020 года Сенат проголосовал за оправдание Дональда Трампа"
  USA_2021_revolution.t: "Восстание 6 января?"
  USA_2021_revolution.d: "6 января 2021 года здание Капитолия Соединенных Штатов в Вашингтоне подверглось нападению толпы сторонников тогдашнего президента США Дональда Трампа, через два месяца после его поражения на президентских выборах 2020 года. Они пытались удержать Трампа у власти, помешав совместному заседанию Конгресса подсчитать голоса коллегии выборщиков, чтобы официально закрепить победу избранного президента Джо Байдена. В итоге атака не увенчалась успехом и не позволила подтвердить результаты выборов"

