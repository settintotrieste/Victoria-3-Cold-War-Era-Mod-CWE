  diplomatic_neutrality_violated.t: "[SCOPE.sCountry('neutrality_violated_country').GetAdjective] Нарушен нейтралитет"
  diplomatic_neutrality_violated.d: "Дипломатический нейтралитет [SCOPE.sCountry('neutrality_violated_country').GetName] был нарушен государством-агрессором. В ответ на это вопиющее нарушение международного права Организация Объединенных Наций призвала к созданию коалиции желающих оказать военную помощь [SCOPE.sCountry('neutrality_violated_country').GetName] в войне."
  diplomatic_neutrality_violated.f: "Это событие произошло из-за нападения на нейтральную страну."
  diplomatic_neutrality_violated_option.1: "Вступить в войну на стороне [SCOPE.sCountry('neutrality_violated_country').GetAdjective]!"
  diplomatic_neutrality_violated_option.2: "Держитесь подальше от этой войны."
