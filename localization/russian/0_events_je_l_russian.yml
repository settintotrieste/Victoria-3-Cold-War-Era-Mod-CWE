  je_german_unification_button: "Объединить Германию"
  je_german_unification_button_desc: "Инициировать процесс воссоединения Германии. Это действие объединит разделенные немецкие земли в единое государство, изменив политические структуры, экономические механизмы и дипломатические отношения в соответствии с новой реальностью."
