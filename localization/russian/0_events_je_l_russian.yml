  je_vote_of_no_confidence_system_1.tt: "Правительство теряет вотум недоверия"
  je_vote_of_no_confidence_system_2.tt: "Правительство выиграло вотум недоверия"
  je_vote_of_no_confidence_system: "Вотум недоверия"
  je_vote_of_no_confidence_system_reason: "В соответствии с парламентской системой [ROOT.GetCountry.GetName] [concept_government] может оставаться на своем посту только при условии, что он пользуется доверием парламента. \n\nПоскольку действующему правительству не хватает менее 50% мест в парламенте [ROOT.GetCountry.GetAdjective], [concept_opposition] вынес вотум недоверия, чтобы свергнуть правительство и объявить новые выборы через 100 дней. Таким образом, для правительства жизненно важно обеспечить наличие 25 или более [concept_legitimacy], когда таймер истечет."

