  notification_no_gov_party_update_notification_desc: "[concept_government] разваливается, так как ни одна [concept_interest_group] в [concept_government] не состоит в [concept_party]. По совподению, [SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')] было распущено и будут проведены досрочные [concept_election]."

  ban_party_hopping_decision: "Запретить смену партии"
  ban_party_hopping_decision_desc: "Это решение запрещает избранным представителям менять политическую партию после вступления в должность. Оно направлено на укрепление партийной стабильности, поддержание доверия избирателей и снижение количества случайных изменений партийной принадлежности. \n\n@information! Данное решение не даст [Concept('concept_interest_group', '$concept_interest_groups$')] сменять [concept_party] посреди [concept_election] для повышения своих шансов."

