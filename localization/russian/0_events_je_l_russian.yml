  je_national_values_reason: "Национальная ценность страны - это представление главной ценности, поддерживаемой в общем культурном опыте нации. \n\nНациональная ценность [ROOT.GetCountry.GetName] будет меняться в соответствии с [concept_ideology] [concept_interest_group], имеющей более 50% [concept_clout] в стране. \n\nТекущая национальная ценность: #BOLD [SCOPE.GetRootScope.GetCountry.GetCustom('national_value_name')]#! \n\n Примечание: \n\n [concept_interest_group] c [concept_ideology] $ideology_totalitarian$ или $ideology_authoritarian$ - $order_national_value$. \n\n [concept_interest_group] c [concept_ideology] $ideology_communitarian$ - $equality_national_value$. \n\n [concept_interest_group] с  [concept_ideology] $ideology_individualist$ - $liberty_national_value$."

