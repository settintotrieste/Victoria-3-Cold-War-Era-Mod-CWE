  governor_general_veto.d: "Генерал-губернатор [SCOPE.sCharacter('ceremonial_governor_general_country').GetFullName] [ROOT.GetCountry.GetNameNoFormatting], от лица [SCOPE.GetRootScope.GetCountry.GetCustom('monarch_custom_title')] [SCOPE.sCharacter('ceremonial_head_of_state').GetFullName], выступил против [concept_government], принимающего  [concept_law] [SCOPE.sLaw('current_law_scope').GetName] в [SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')]. Хотя генерал-губернатор не может отказать в королевском одобрении какого-либо законопроекта, противодействие со стороны королевской семьи стало препятствием для принятия закона."
