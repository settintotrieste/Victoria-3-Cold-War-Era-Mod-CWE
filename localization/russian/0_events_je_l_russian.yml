  je_gatt_system: "Генеральное соглашение по тарифам и торговле"
  je_gatt_system_reason: "Генеральное соглашение по тарифам и торговле (ГАТТ) — это юридически оформленное соглашение между многими странами, общая цель которого заключалась в содействии международной торговле путем снижения или устранения торговых барьеров, таких как тарифы или квоты. Оно обновлялось в ходе серии глобальных торговых переговоров, состоявших из девяти раундов в период с 1947 по 1995 год. В 1995 году его роль в международной торговле в значительной степени перешла к Всемирной торговой организации. \n\nПоскольку ГАТТ — это постоянно обновляемое соглашение, размер снижения [concept_tariffs] в рамках ГАТТ меняется каждый год. \n\nПримечание: Размер снижения [concept_tariffs] зависит от глобальных экономических перспектив."

