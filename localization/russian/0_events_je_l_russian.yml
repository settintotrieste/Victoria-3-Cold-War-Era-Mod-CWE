  war_crimes.1.t: "[ROOT.GetCountry.GetAdjectiveNoFlag] Военные преступления"
  war_crimes.1.d: "Генерал [SCOPE.sCharacter('war_crimes_perpetrator').GetFullName] совершил военные преступления против гражданского населения [SCOPE.sState('war_crimes_state').GetName]. Этот акт варварства заклеймил [SCOPE.sCharacter('war_crimes_perpetrator').GetHerHim] как военного преступника. Широко раздаются призывы привлечь к ответственности генерала-изгоя за его преступления."
