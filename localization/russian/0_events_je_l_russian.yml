  je_constitutionalise_national_values_button: "Конституционализировать [SCOPE.GetRootScope.GetCountry.GetCustom('national_value_name')]"
  je_constitutionalise_national_values_button_desc: "[concept_government] может конституировать значение [SCOPE.GetRootScope.GetCountry.GetCustom('national_value_name')], чтобы предотвратить дальнейшее изменение национальной ценности [ROOT.GetCountry.GetName] и угодить [Concept('concept_interest_group', '$concept_interest_groups$')], поддерживающему [SCOPE.GetRootScope.GetCountry.GetCustom('national_value_name')]. \n\nОбратите внимание, что включение ценностей [SCOPE.GetRootScope.GetCountry.GetCustom('national_value_name')] в Конституцию может помешать принятию некоторых законов."

