  je_nuclear_weapons_info_panel: "Гонка ядерных вооружений"
  je_nuclear_weapons_info_panel_reason: "[ROOT.GetCountry.GetName] участвует в гонке ядерного вооружения со страной-соперником. Мы должны стремиться к тому, чтобы наша страна обладала большей ядерной ударной мощью, чем все страны, обладающие ядерным оружием, с которыми у нас плохие отношения. \n\nОбщая ядерная ударная мощь: [GetPlayer.MakeScope.Var('nuclear_strike_power_display').GetValue]\n\nСила обороны от ядерного удара: [GetPlayer.MakeScope.Var('nuclear_strike_defence_display').GetValue]\n\nОбщая ядерная мощь противника: [GetPlayer.MakeScope.Var('nuclear_strike_power_enemy_display').GetValue]\n\nЯдерная оборона противника: [GetPlayer.MakeScope.Var('nuclear_strike_defence_enemy_display').GetValue] \n\nОценка нашей чистой ядерной ударной мощи: [GetPlayer.MakeScope.Var('nuclear_strike_power_THIS_enemy_ratio').GetValue] \n\nОценка чистой ядерной ударной мощи противника: [GetPlayer. MakeScope.Var('nuclear_strike_power_enemy_THIS_ratio').GetValue] \n\nКоличество врагов: [GetPlayer.MakeScope.Var('nuclear_enemy_counter_display').GetValue] \n\nКоэффициент превосходства ядерного оружия: [GetPlayer.MakeScope.Var('nuclear_strike_power_ratio').GetValue]"
