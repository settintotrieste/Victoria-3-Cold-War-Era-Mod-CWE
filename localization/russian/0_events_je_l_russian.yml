  british_hong_kong.sgc.t: "Самоуправление в Гонконге?"
  british_hong_kong.sgc.d: "После Совместной китайско-британской декларации правительство Гонконга решило начать процесс демократизации в Гонконге на основе консультативного документа «Зеленая книга: дальнейшее развитие представительного правительства в Гонконге», опубликованного 18 июля 1984 года. 12 членов избирались коллегиями выборщиков и 12 функциональными округами, четыре официальных члена, а остальные места назначались губернатором."
  british_WIF_state.indy.t: "Ветер перемен в Карибском бассейне?"
  british_WIF_state.indy.d: "Ассоциированные Штаты Вест-Индии были собирательным названием ряда островов в восточной части Карибского бассейна, статус которых изменился с британских колоний на государства, находящиеся в свободной ассоциации с Соединенным Королевством в 1967 году. Со временем ассоциированные государства перешли к полной независимости, первым из которых стала Гренада в 1974 году. За этим последовали Доминика в 1978 году, Сент-Люсия и Сент-Винсент в 1979 году, Антигуа и Барбуда в 1981 году и Сент-Китс и Невис в 1978 году. 1983."
  british_cyrenaica.sgc.t: "Автономия Киренаики?"
  british_cyrenaica.sgc.d: "Эмират Киренаика возник, когда 1 марта 1949 года Сайид Идрис в одностороннем порядке провозгласил Киренаику независимым эмиратом Сенусси при поддержке Соединенного Королевства. Сайид Идрис провозгласил себя эмиром Киренаики на «национальной конференции» в Бенгази. Признание Великобританией не повлияло на позицию Организации Объединенных Наций, и Великобритании и Франции было поручено подготовить независимость Ливии в резолюции, принятой 21 ноября 1949 года."
  british_tuvalu.sgc.t: "Самоуправление в Тувалу?"
  british_ceylon.indy.t: "Независимость Цейлона?"
  british_burma.indy.t: "Независимость Бирмы?"
  british_india.indy.t: "Независимость Индии?"
  british_india.indy.d: "3 июня 1947 года виконт Луи Маунтбеттен, последний британский генерал-губернатор Индии, объявил о разделе Британской Индии на Индию и Пакистан. После быстрого принятия Закона о независимости Индии 1947 года, в 11:57 14 августа 1947 года, Пакистан был объявлен отдельной нацией. Затем, в 12:02, 15 августа 1947 года, Индия стала суверенной и демократической страной."
  british_palestine.indy.t: "Независимость Израиля и Палестины?"
  british_palestine.indy.d: "В ноябре 1947 года Организация Объединенных Наций рекомендовала разделить Палестину и создать отдельные арабское и еврейское государства. 15 мая 1948 года Великобритания отказалась от своего мандата. Британская армия покинула Палестину, оставив евреев и арабов сражаться в последовавшей за этим войне."
  british_jordan.indy.t: "Независимость Трансиордании?"
  british_iraq.indy.t: "Положить конец оккупации Ирака?"
  british_iraq.indy.d: "1 апреля 1941 года Рашид Али аль-Гайлани и члены «Золотого квадрата» устроили государственный переворот. Во время последующей англо-иракской войны Соединенное Королевство вторглось в Ирак, опасаясь, что правительство может прекратить поставки нефти западным странам из-за его связей с державами Оси. Военная оккупация последовала за восстановлением правительства Хашимитской монархии, существовавшего до переворота. Оккупация закончилась 26 октября 1947 года, хотя Великобритания должна была сохранить военные базы в Ираке до 1954 года, после чего ассирийские ополченцы были расформированы."
  british_malaysia.indy.t: "Уход Великобритании из Сингапура?"
  british_malaysia.indy.d: "18 июля 1967 года Великобритания объявила, что выведет свои войска из Сингапура к середине 1970-х годов. Шесть месяцев спустя крайний срок был перенесен на 1971 год. Внезапный вывод британских войск создал серьезные проблемы для обороны и экономической безопасности Сингапура. В ответ Сингапур приступил к быстрой программе индустриализации, ужесточил трудовое законодательство для привлечения иностранных инвестиций, укрепил свою оборону посредством военного сотрудничества с другими странами и утроил свои военные расходы."
  british_malta_2.indy.t: "Уход Великобритании с Мальты?"
  british_malta_2.indy.d: "Мальта обрела независимость как Государство Мальта 21 сентября 1964 года (День независимости). В соответствии с конституцией 1964 года Мальта первоначально сохраняла за Елизаветой II должность королевы Мальты и, таким образом, главы государства, а исполнительную власть от ее имени осуществлял генерал-губернатор. В 1971 году Лейбористская партия Мальты во главе с Домом Минтоффом победила на всеобщих выборах, в результате чего 13 декабря 1974 года (День Республики) Мальта объявила себя республикой в ​​составе Содружества. Соглашение об обороне было подписано вскоре после обретения независимости и после повторных переговоров в 1972 году истекло 31 марта 1979 года (День свободы). По истечении срока действия британская база закрылась, а земли, ранее контролировавшиеся британцами, были переданы мальтийскому правительству."
  british_tuvalu.indy.t: "Независимость Тувалу?"
  portuguese_macau.sgc.t: "Передача полномочий в Макао?"
  portuguese_macau.sgc.d: "После революции 1974 года в Португалии политика деколонизации проложила путь к возвращению Макао в состав Китайской Народной Республики (КНР). 17 февраля 1976 года парламент Португалии принял Органический статут Макао, в котором он был назван «территорией под управлением Португалии». Этот термин также был включен в конституцию Португалии 1976 года, заменив Макао статус заморской провинции. В отличие от предыдущих конституций, Макао не был включен в состав территории Португалии."
  french_vietnam_state.indy.t: "Государство Вьетнам?"
  french_vietnam_state.indy.d: "20 мая 1949 года Национальное собрание Франции одобрило воссоединение Кочинчины с остальной частью Вьетнама. Решение вступило в силу 4 июня, а 2 июля было официально провозглашено Государство Вьетнам. С 1949 по 1954 год, после воссоединения с Кочинчиной, Государство Вьетнам имело частичную автономию от Франции в качестве ассоциированного государства в рамках Французского Союза."
  french_syria.indy.t: "Независимость Сирии?"
  french_syria.indy.d: "После периода французского мандата (1923–1946) вновь созданное государство представляло собой крупнейшее арабское государство, возникшее на базе сирийских провинций, ранее находившихся под властью Османской империи. Она получила де-юре независимость как демократическая парламентская республика 24 октября 1945 года, когда Сирийская Республика стала одним из основателей Организации Объединенных Наций, что юридически положило конец прежнему французскому мандату (хотя французские войска не покидали страну до апреля 1946 года)."
  french_saarland.indy.t: "Создать протекторат Саар?"
  french_saarland.indy.d: "В июле 1945 года, через два месяца после окончания Второй мировой войны в Европе, силы союзников передислоцировались из завоеванных ими территорий в свои зоны оккупации. 10 июля 1945 года американские войска покинули Саар, и французские войска установили там оккупационную администрацию. 16 февраля 1946 года Франция отделила Саар от зон оккупации союзников и учредила отдельный протекторат Саар, который де-факто больше не находился под совместной юрисдикцией союзников Союзным контрольным советом для Германии."
  american_puerto_rico.sgc.t: "Содружество Пуэрто-Рико?"
  american_puerto_rico.sgc.d: "Правительство Соединенных Штатов уполномочило Пуэрто-Рико разработать собственную конституцию на основании Закона о федеральных отношениях Пуэрто-Рико 1950 года. Конституционная ассамблея собиралась в течение нескольких месяцев между 1951 и 1952 годами, на которых был написан документ. Закон требовал от разработчиков следовать только двум основным требованиям: республиканской форме правления и включению Билля о правах."
  american_NMI.sgc.t: "Содружество Северных Марианских островов?"
  american_NMI.sgc.d: "После поражения Японии во Второй мировой войне Северные Марианские острова находились под управлением Соединенных Штатов в соответствии с Резолюцией 21 Совета Безопасности как часть подопечной территории Организации Объединенных Наций Тихоокеанские острова, которая возлагала ответственность за оборону и иностранные дела на Соединенные Штаты в качестве попечителя. В 1970-е годы жители Северных Марианских островов решили не добиваться независимости, а вместо этого установить более тесные связи с Соединенными Штатами. Переговоры о статусе Содружества начались в 1972 году, а соглашение о создании Содружества в политическом союзе с Соединенными Штатами было одобрено на референдуме 1975 года. Новое правительство и конституция частично вступили в силу 9 января 1978 года."
  american_ESM.sgc.t: "Самоуправление в Американском Самоа?"
  american_ESM.sgc.d: "С тех пор как в 1900 и 1904 годах были подписаны Акты о цессии, самоанцы избегали дальнейшей интеграции в систему США. В 1949 году Министерство внутренних дел приняло решение о включении Американского Самоа посредством Органического закона. Опасаясь, что объединение может подорвать самоанскую культуру и традиционное землевладение, самоанский матаи вмешался, и Конгресс остановил регистрацию. Вместо этого Самоа создало собственное правительство, Самоанское фоно, основанное на местной системе управления. С тех пор самоанцы отказались создать федеральный окружной суд, отказались от гражданства по праву рождения и остаются единственной территорией США с собственной иммиграционной системой."
  american_germany.indy.d: "Договор об окончательном урегулировании в отношении Германии — это международное соглашение, которое позволило воссоединить Германию в начале 1990-х годов. Он был согласован в 1990 году между «двумя» Федеративной Республикой Германия и Германской Демократической Республикой, а также четырьмя державами, оккупировавшими Германию в конце Второй мировой войны в Европе: Францией, Советским Союзом, Великобританией и Соединенными Штатами. Договор заменил Потсдамское соглашение 1945 года: в нем четыре державы отказались от всех прав, которые они имели в отношении Германии, что позволило в следующем году воссоединить ее в качестве полностью суверенного государства."
  american_italy.indy.t: "Парижский договор?"
  american_italy.indy.d: "Парижский договор между Италией и союзными державами был подписан 10 февраля 1947 года, официально положив конец военным действиям между обеими сторонами. Он вступил в силу 15 сентября 1947 года."
  american_south_korea.indy.t: "Независимость Южной Кореи?"
  american_south_korea.indy.d: "Первая Республика Корея была правительством Южной Кореи с августа 1948 года по апрель 1960 года. Первая республика была основана 15 августа 1948 года после перехода от военного правительства армии США, которое управляло Южной Кореей с момента окончания японского правления в 1945 году, став первым независимым республиканским правительством в Корее."
  american_FRG.indy.t: "Федеративная Республика Германия?"
  american_FRG.indy.d: "Западные союзники передали все большую власть западногерманским чиновникам и приступили к созданию ядра будущего немецкого правительства, создав центральный экономический совет для своих зон. Позже программа предусматривала учредительное собрание Западной Германии, оккупационный статут, регулирующий отношения между союзниками и властями Германии, а также политическое и экономическое слияние французских с британской и американской зон. 23 мая 1949 года был обнародован Grundgesetz (Основной закон) – конституция Федеративной Республики Германия."
  american_philippines.indy.t: "Манильский договор?"
  american_philippines.indy.d: "Манильский договор 1946 года, формально «Договор об общих отношениях и Протокол», представляет собой договор об общих отношениях, подписанный 4 июля 1946 года в Маниле, столице Филиппин. Он отказался от суверенитета США над Филиппинами и признал независимость Республики Филиппины."
  american_iceland.indy.t: "Кеблавикское соглашение?"
  american_iceland.indy.d: "Кеблавикское соглашение — соглашение, заключенное в 1946 году между правительством Соединенных Штатов и вновь созданной Республикой Исландия после завершения Второй мировой войны. Это соглашение предусматривало, что американская армия покинет страну в течение шести месяцев и что исландцы овладеют аэропортом Кеблавик."
  american_iceland_2.indy.t: "Вывести Силы обороны Исландии?"
  american_iceland_2.indy.d: "15 марта 2006 года посол США в Исландии Кэрол ван Вурст объявила о решении Соединенных Штатов вывести Силы обороны Исландии до конца сентября 2006 года. 30 сентября американские военные вывели свои последние четыре истребителя ВВС и эскадрилью спасательных вертолетов из Кеблавика."
  american_south_vietnam.indy.t: "Уход США из Южного Вьетнама?"
  american_south_vietnam.indy.d: "Новоизбранный президент Ричард М. Никсон заявил в 1969 году, что он продолжит участие Америки во Вьетнамской войне, чтобы положить конец конфликту и обеспечить «мир с честью» для Соединенных Штатов и их союзника, Южного Вьетнама. Его ключевыми элементами были: все стороны инициировали прекращение огня через 24 часа после подписания соглашения; Американские войска и все иностранные войска будут выведены из Южного Вьетнама не позднее, чем через 60 дней после подписания соглашения; Американские пленные будут освобождены одновременно с выводом американских и иностранных войск; и будет создан Национальный совет национального примирения и согласия для организации и наблюдения за свободными и демократическими выборами, которые определят политическое будущее Юга."
  american_palau.indy.t: "Независимость Палау?"
  american_palau.indy.d: "Вместе с другими островами Тихого океана Палау в 1947 году вошла в состав подопечной территории Тихоокеанских островов, управляемой Соединенными Штатами. Проголосовав на референдуме против присоединения к Федеративным Штатам Микронезии в 1978 году, острова получили полный суверенитет в 1994 году в соответствии с Договором о свободной ассоциации с Соединенными Штатами."
  soviet_north_korea.indy.t: "Независимость Северной Кореи?"
  soviet_north_korea.indy.d: "В 1945 году, после капитуляции Японии в конце Второй мировой войны, Корея была разделена на две зоны вдоль 38-й параллели: север оккупирован Советским Союзом, а юг — Соединенными Штатами. В 1948 году в Корее были сформированы отдельные правительства: социалистическая Корейская Народно-Демократическая Республика, связанная с Советским Союзом, на севере и капиталистическая, ориентированная на Запад Республика Корея на юге."
  soviet_afghanistan.indy.t: "Уйти из Афганистана?"
  soviet_afghanistan.indy.d: "Михаил Горбачев, ставший Генеральным секретарем Коммунистической партии Советского Союза в марте 1985 года, начал планировать вывод войск из Афганистана вскоре после того, как был избран Политбюро. Под его руководством Советский Союз попытался помочь консолидации власти Народно-демократической партии Афганистана (НДПА); Мохаммад Наджибулла, бывший начальник афганской тайной полиции (ХАД), был избран генеральным секретарем, а затем президентом Революционного совета, и советские войска постепенно были выведены из Афганистана. После вывода советских войск из Афганистана правительство Горбачева продолжало военную и политическую поддержку Наджибуллы в борьбе с афганской оппозицией."
  soviet_decolonisation_indy.option.1: "Предоставьте им независимость"
  soviet_decolonisation_indy.option.2: "Они не заслуживают свободы"
  new_zealand_samoa.indy.t: "Независимость Западного Самоа?"
  new_zealand_cook_islands.indy.t: "Самоуправление на Островах Кука?"
  italian_SUT.indy.t: "Южный Тирольфрадж"
  italian_SUT.indy.d: "Южнотирольский вопрос (Südtirolfrage) стал международной проблемой. Вопрос был решен в 1971 году, когда был подписан и ратифицирован новый австро-итальянский договор. Он предусматривал, что споры в Южном Тироле будут передаваться на рассмотрение Международного суда в Гааге, что провинция получит большую автономию в составе Италии и что Австрия не будет вмешиваться во внутренние дела Южного Тироля. Новое соглашение оказалось в целом удовлетворительным для участвующих сторон, и сепаратистская напряженность вскоре ослабла. Автономный статус, предоставленный в 1972 году, привел к значительному уровню самоуправления, а также позволяет субъекту удерживать почти 90% всех взимаемых налогов."
  KAS_HND_union.t: "Присоединение Джамму и Кашмира к Индии?"
  KAS_HND_union.d: "Подписав Акт о присоединении в соответствии с положениями Закона о независимости Индии 1947 года, Махараджа Хари Сингх согласился присоединить свое государство к Доминиону Индии."
  NET_IDO_union.t: "Союз Нидерландов и Индонезии?"
  NET_IDO_union.d: "Союз Нидерландов и Индонезии представлял собой конфедеративные отношения между Нидерландами и Индонезией, существовавшие между 1949 и 1956 годами. Согласованный в 1949 году, это была попытка Нидерландов продолжать связывать свою бывшую колонию Голландская Ост-Индия (ныне Индонезия) с Нидерландами на конфедеративной основе, по крайней мере, в рамках личного союза, даже после предоставления независимости."
  MLT_GBR_union.t: "Референдум о мальтийско-британской интеграции"
  MLT_GBR_union.d: "Референдум по интеграции с Соединенным Королевством прошел на Мальте 11 и 12 февраля 1956 года. Предложения были одобрены 77% проголосовавших при явке 59%; низкая явка была отчасти из-за бойкота со стороны Националистической партии. Предложения так и не были полностью реализованы, и восемь лет спустя страна стала независимым королевством в составе Британского Содружества, получившим название Государство Мальта."
  FRA_GBR_union.t: "Франко-британский союз?"
  FRA_GBR_union.d: "В сентябре 1956 года из-за общего врага во время Суэцкого кризиса была создана англо-французская оперативная группа. Премьер-министр Франции Ги Молле предложил союз между Соединенным Королевством и Французским Союзом с Елизаветой II в качестве главы государства и общим гражданством. В качестве альтернативы Молле предложил Франции присоединиться к Содружеству. Премьер-министр Великобритании Энтони Иден отклонил оба предложения; Франция присоединилась к Римскому договору, который учредил Европейское экономическое сообщество."
  YUG_BUL_union.t: "Балканская Федерация?"
  YUG_BUL_union.d: "Бледское соглашение было подписано 1 августа 1947 года Георгием Димитровым и Иосипом Броз Тито в Бледе, ПР Словения, РНР Югославия, и проложило путь к будущему объединению Болгарии и Югославии в новую Балканскую федерацию. Политика, вытекающая из соглашения, изменилась после раскола Тито и Сталина в июне 1948 года, когда Болгария, не желая быть седьмой республикой Югославии, как представлял себе Тито, и будучи привязанной к интересам Советского Союза, заняла позицию против Югославии. Когда кампания Коминформа против Югославии лишила руководство Коммунистической партии Югославии, правительство Болгарии 1 октября 1949 года аннулировало Бледский договор о дружбе, сотрудничестве и взаимной помощи со всеми его соглашениями."
  LBY_EGY_union.t: "Федерация арабских республик?"
  LBY_EGY_union.d: "Федерация арабских республик была неудачной попыткой Муаммара Каддафи объединить Ливию, Египет и Сирию с целью создания единого арабского государства. Хотя слияние было одобрено референдумом в каждой стране 1 сентября 1971 года, три страны разошлись во мнениях относительно конкретных условий слияния. Федерация просуществовала с 1 января 1972 года по 19 ноября 1977 года."
  IRQ_SYR_union.t: "Союз арабских республик?"
  IRQ_SYR_union.d: "В марте 1972 года баасистский Ирак предложил Египту и Сирии восстановление Объединенной Арабской Республики, которое потерпело неудачу в 1963 году. Предложение Ирака было немедленной реакцией на предложение Иордании о создании Объединенного арабского королевства, но противоречило уже созданной Федерации арабских республик и потерпело неудачу из-за иракско-сирийских разногласий."
  UAR_NYE_union.t: "Соединенные Арабские Штаты?"
  UAR_NYE_union.d: "Объединенная Арабская Республика была суверенным государством, образованным в результате союза Египта и Сирии в 1958 году. В том же году Королевство Йемен (Северный Йемен), которое уже подписало оборонный пакт с Египтом, 8 марта 1958 года присоединилось к новому государству в рыхлой конфедерации под названием Объединенные Арабские Штаты. Одной из причин этого решения было то, что в течение длительного времени Йемен чувствовал угрозу со стороны своего значительно более крупного и могущественного северного соседа Саудовской Аравии и, таким образом, рассматривал конфедерацию как источник безопасности. Однако, в отличие от стран-членов Объединенной Арабской Республики, Северный Йемен оставался независимым суверенным государством."
  GHA_GUI_union.t: "Союз африканских государств?"
  GHA_GUI_union.d: "Союз африканских государств, иногда называемый Союзом Ганы, Гвинеи и Мали, был недолговечной и рыхлой региональной организацией, образованной в 1958 году, объединившей западноафриканские страны Гану и Гвинею в Союз независимых африканских государств. Мали присоединилась к ней в 1961 году. Распалась в 1963 году."
  HZB_RSK_BOS_union.t: "Дейтонское соглашение?"
  HZB_RSK_BOS_union.d: "Дейтонское соглашение — это мирное соглашение, достигнутое на базе ВВС Райт-Паттерсон недалеко от Дейтона, штат Огайо, США, завершенное 21 ноября 1995 года и официально подписанное в Париже 14 декабря 1995 года. Эти соглашения положили конец продолжавшейся три с половиной года боснийской войне, которая была частью гораздо более крупных югославских войн. Воюющие стороны согласились на мир и создание единого суверенного государства, известного как Босния и Герцеговина состоит из двух частей: Республики Сербской, населенной преимущественно сербами, и Федерации Боснии и Герцеговины, населенной преимущественно хорватами и боснийцами."
  transfer_territory_british_bizonia.t: "Образовать Бизонию в Германии?"
  transfer_territory_british_bizonia.d: "Бизона или Бизония — это объединение американской и британской оккупационных зон 1 января 1947 года во время оккупации Германии после Второй мировой войны."
  transfer_territory_french_trizonia.t: "Сформировать Тризонию в Германии?"
  transfer_territory_french_trizonia.d: "1 августа 1948 года управление Бизонией было расширено и включило французскую оккупационную зону, и образовавшаяся структура получила неофициальное название либо Тризония, либо Тризонезия. Отношения между четырьмя оккупационными державами продолжали ухудшаться, а четырехсторонние структуры стали неуправляемыми. В марте 1948 года Союзный контрольный совет прекратил свою деятельность и был заменен в Тризоне Высшей комиссией союзников."
  transfer_territory_KMT_PRC.t: "Бежать в Тайвань?"
  transfer_territory_KMT_PRC.d: "Отступление правительства Китайской Республики на Тайвань относится к исходу остатков тогдашнего международно признанного гоминьдановского правительства Китайской Республики (КР) на остров Тайвань (Формоза) 7 декабря 1949 года после поражения в гражданской войне в Китае на материковой части Китая."
  transfer_territory_dutch_east_indonesia.t: "Денпасарская конференция?"
  transfer_territory_dutch_east_indonesia.d: "Денпасарская конференция проходила с 7 по 24 декабря 1946 года в отеле «Бали» в Денпасаре и привела к созданию штата Восточная Индонезия, входящего в состав Соединенных Штатов Индонезии. Именно на этой конференции правительство Нидерландов заявило о своей позиции, согласно которой контроль над Западной Новой Гвинеей не будет передан одновременно с остальной частью Голландской Ост-Индии."
  transfer_territory_port_porkkala.t: "Вернуть военно-морскую базу Порккала?"
  transfer_territory_port_porkkala.d: "Военно-морская база Порккала — советская военно-морская база, действовавшая в 1944–1956 годах в муниципалитетах Киркконумми, Инго и Сьюнтио на полуострове Порккала, в 30 километрах (19 миль) к западу от Хельсинки, Финляндия. Территория была сдана в аренду Советскому Союзу в соответствии с Московским перемирием, подписанным в 1944 году Финляндией, Советским Союзом и Великобританией. В 1956 году территория была возвращена Финляндии."
  transfer_territory_port_bornholm.t: "Положить конец оккупации Борнхольма?"
  transfer_territory_port_bornholm.d: "9 мая на остров высадились советские войска, и после непродолжительного боя немецкий гарнизон (около 12 тысяч человек) сдался. Советские войска покинули остров 5 апреля 1946 года."
  transfer_territory_port_dodecanese.t: "Передача островов Додеканес Греции?"
  transfer_territory_port_dodecanese.d: "После войны острова стали британским военным протекторатом, и им почти сразу же было разрешено вести свои собственные гражданские дела, после чего они неофициально объединились с Грецией, хотя и находились под отдельным суверенитетом и военным контролем. Несмотря на возражения Турции, которая также желала получить острова, они были формально объединены с Грецией мирным договором с Италией 1947 года."
  transfer_territory_british_newfoundland.t: "Конфедерация Ньюфаундленда с Канадой?"
  transfer_territory_british_newfoundland.d: "Референдумы в Ньюфаундленде 1948 года представляли собой серию из двух референдумов, призванных решить политическое будущее Доминиона Ньюфаундленда. Перед референдумом Ньюфаундленд был в долгах и прошел через несколько делегаций, чтобы определить, присоединится ли страна к Канаде («конфедерации»), останется под британским правлением или восстановит независимость. Голосование по референдумам состоялось 3 июня и 22 июля 1948 года. В конечном итоге Ньюфаундленд вошел в состав Конфедерации, что он и сделал 31 марта 1949 года, став десятой провинцией Канады."
  transfer_territory_british_sarawak.t: "Приложение Саравак?"
  transfer_territory_british_sarawak.d: "Королевство Саравак было независимым государством, основанным в 1841 году в соответствии с договором о защите с Соединенным Королевством, начиная с 1888 года. В 1888 году Радж приобрел статус защищенного государства от британского правительства, избежав при этом аннексии. Вторая мировая война и прибытие японских войск в конечном итоге положили конец Раджу: после капитуляции Японии в 1945 году территория была передана под военную администрацию и аннексирована Великобританией в качестве ее последнего приобретения в качестве королевской колонии в 1946 году, вопреки Атлантической хартии."
  transfer_territory_lebanon_ISR.t: "Положить конец оккупации Ливана?"
  transfer_territory_lebanon_ISR.d: "Перед выборами в Израиле в мае 1999 года премьер-министр Израиля Эхуд Барак пообещал, что в течение года все израильские силы выведутся из Южного Ливана, фактически прекратив поддержку армии Южного Ливана. Когда переговорные усилия между Израилем и Сирией, целью которых было достижение мирного соглашения также между Израилем и Ливаном, потерпели неудачу из-за сирийского контроля над Ливаном (до 2005 года), Барак привел к решению о выводе ЦАХАЛа к израильской границе."
  transfer_territory_lebanon_SYR.t: "Положить конец оккупации Ливана?"
  transfer_territory_lebanon_SYR.d: "После ухода Израиля из южного Ливана и смерти Хафеза Асада в 2000 году сирийское военное присутствие столкнулось с критикой и сопротивлением со стороны ливанского населения. С последующим принятием резолюции 1559 Совета Безопасности ООН и после убийства бывшего премьер-министра Ливана Рафика Харири и обвинений в причастности Сирии к его смерти страну охватило общественное восстание, получившее название «Кедровая революция». 5 марта 2005 года президент Сирии Башар аль-Асад в своем обращении к сирийскому парламенту объявил, что сирийские войска начнут вывод войск из Ливана. Сирия завершила полный вывод войск из Ливана 30 апреля 2005 года."
  transfer_territory_SAF_NMB.t: "Вернуть Уолфиш-Бей Намибии?"
  transfer_territory_SAF_NMB.d: "В 1990 году Юго-Западная Африка получила независимость как Намибия, но Уолфиш-Бей остался под суверенитетом Южной Африки. В августе 1993 года, еще до конца апартеида, Многопартийный переговорный форум в Южной Африке принял резолюцию, призывающую к включению и реинтеграции Уолфиш-Бей и прибрежных островов в состав Намибии. Закон о передаче Уолфиш-Бей Намибии был принят парламентом Южной Африки в том же году. После подписания договора между двумя странами 1 марта 1994 года Южная Африка официально передала Намибии суверенитет над Уолфиш-Бей и Пингвинскими островами."
  transfer_territory_spanish_morocco.t: "Ретроцессия испанского Аль-Рифа Марокко?"
  transfer_territory_spanish_morocco.d: "В 1956 году, когда Франция прекратила свой протекторат над Марокко, Испания прекратила действие протектората и вернула территорию новому независимому королевству, сохранив при этом площади соберания, которые были частью Испании до колониального периода, мыс Джуби, Ифни и другие колонии (например, Испанская Сахара) за пределами Марокко."
  transfer_territory_bahrain.t: "Вопрос о Бахрейне?"
  transfer_territory_bahrain.d: "Обзор независимости Бахрейна 1970 года проходил с 28 марта по 11 мая 1970 года. 28 марта Генеральный секретарь ООН назначил Витторио Винспира-Гвиччарди консультировать бахрейнцев по поводу их будущего. К 11 мая Совет Безопасности ООН подтвердил его вывод о том, что подавляющее большинство поддерживает полную независимость. Исследование было вызвано решением Великобритании в 1968 году уйти из Персидского залива к концу 1971 года, оставив будущее Бахрейна неопределенным. Иран возобновил свои претензии на Бахрейн, но консультации под руководством ООН разрешили спор, подтвердив предпочтение народа независимости."
  transfer_territory_gaza.t: "Будущее сектора Газа"
  transfer_territory_gaza.d: "Временное прекращение огня началось в середине января 2025 года и продлилось два месяца. В августе Израиль начал наступление на город Газа. К 9 октября 2025 года Израиль и ХАМАС согласовали первую часть мирного плана под руководством США. Резолюция 2803 Совета Безопасности ООН, принятая 17 ноября 2025 года, содержит положения о переходном управлении сектором Газа."
  transfer_territory_DPR.t: "Российская аннексия [ROOT.GetCountry.GetNameNoFormatting]?"
  transfer_territory_DPR.d: "30 сентября 2022 года Россия на фоне продолжающегося вторжения в Украину в одностороннем порядке объявила об аннексии территорий на территории четырех украинских областей и вокруг них — Донецкой, Херсонской, Луганской и Запорожской. Большая часть Луганской области и часть Донецкой области контролировались пророссийскими сепаратистами с 2014 года, а Херсонская и Запорожская области были оккупированы Россией в 2022 году. Границы присоединяемых территорий и их границы не были определены; Российские официальные лица заявили, что они будут определены позже."
  end_berlin_occupation.t: "Положить конец оккупации Берлина?"
  end_berlin_occupation.d: "Западный Берлин оставался под военной оккупацией до 3 октября 1990 года, дня объединения Восточной Германии, Восточного и Западного Берлина с Федеративной Республикой Германия. Федеральное правительство Западной Германии, а также правительства большинства западных стран считали Восточный Берлин «отдельным образованием» от Восточной Германии, и хотя западные союзники позже открыли посольства в Восточном Берлине, они признали город только резиденцией правительства ГДР, а не ее столицей."
  transfer_territory_british_ogaden.t: "Положить конец британской оккупации Огадена?"
  transfer_territory_british_ogaden.d: "Между 1941 и 1955 годами Великобритания управляла Огаденом и Хаудом после Восточноафриканской кампании. Великобритания стремилась к созданию Великого Сомали, игнорируя требования Хайле Селассие о предоставлении эфиопских территорий и Эритреи. Под давлением США Великобритания отказалась от этого плана, уступив Огаден в 1948 году и Хауд в 1955 году, что спровоцировало сопротивление и восстания в Сомали."
  transfer_territory_british_iran.t: "Положить конец британской оккупации Ирана?"
  transfer_territory_british_iran.d: "Англо-советское вторжение в Иран представляло собой совместное вторжение Соединенного Королевства и Советского Союза в официально нейтральное Имперское государство Иран в августе 1941 года. Обе державы объявили, что останутся там до шести месяцев после окончания войны с их общим врагом, нацистской Германией, которая, как оказалось, произошла 2 марта 1946 года."
  transfer_territory_soviet_iran.t: "Положить конец советской оккупации Ирана?"
  transfer_territory_soviet_iran.d: "Соединенные Штаты поэтапно оказывали сильное давление на Советский Союз, чтобы добиться вывода Красной Армии из Ирана и уменьшить советское влияние. После официального протеста США Совет Безопасности ООН принял Резолюцию 2 30 января 1946 года. 24 марта Сталин приказал вывести советские войска из Ирана к 30 апреля 1946 года. Советские войска ушли 6 мая."
  GBR_SCO_dissolution.t: "Референдум о независимости Шотландии"
  GBR_SCO_dissolution.d: "Референдум о независимости Шотландии от Соединенного Королевства был проведен в Шотландии 18 сентября 2014 года. Вопрос референдума был: «Должна ли Шотландия быть независимой страной?», На который избиратели ответили «Да» или «Нет». Сторона «против» победила: 2 001 926 проголосовали против независимости и 1 617 989 проголосовали за."
  SPA_CAT_dissolution.t: "Референдум о независимости Каталонии"
  SPA_CAT_dissolution.d: "1 октября 2017 года в испанском автономном сообществе Каталония состоялся референдум о независимости, принятый парламентом Каталонии как Закон о референдуме о самоопределении Каталонии. Референдум был объявлен неконституционным 7 сентября 2017 года и приостановлен Конституционным судом Испании по запросу правительства Испании, которое объявило его нарушением Конституции Испании."
  SKN_GBR_dissolution.t: "Роспуск Сент-Кристофер-Невис-Ангилья?"
  SKN_GBR_dissolution.d: "После непродолжительного периода в составе Вест-Индской федерации остров Ангилья стал частью ассоциированного государства Сент-Китс-Невис-Ангилья с полной внутренней автономией в 1967 году. Однако многие ангильцы не хотели быть частью этого союза и возмущались доминированием Сент-Китса в нем. В 1980 году Ангилье наконец разрешили официально отделиться от Сент-Китс и Невис и стать отдельной британской заморской территорией."
  FRA_NCD_dissolution.t: "Референдум о независимости Новой Каледонии"
  FRA_NCD_dissolution.d: "Референдум о независимости был проведен в Новой Каледонии, французской территории в южной части Тихого океана, 12 декабря 2021 года. Голосование стало третьим и последним, проведенным в соответствии с условиями Нумейского соглашения, после голосований в 2018 и 2020 годах, в ходе которых независимость была отклонена 57% и 53% соответственно."
  UAS_GHA.t: "Роспуск Союза африканских государств"
  UAS_GHA.d: "Союз был распущен без особого внимания в мае 1963 года. Провалу БАС предлагались разные объяснения, такие как конкурирующий национализм и внутренние недостатки американской модели федерации, на которую повлиял Нкрума. Адом Гетачев утверждает, что неудача была вызвана глубокими разногласиями по поводу точного баланса между федеральным союзом и независимостью государств-членов."
  PHI_MGD_dissolution.t: "Органический закон Бангсаморо?"
  PHI_MGD_dissolution.d: "Органический закон Бангсаморо — это филиппинский закон, который предусматривал создание автономного района Бангсаморо на мусульманском Минданао (BARMM). В качестве органического закона основной закон упразднил Автономный регион мусульманского Минданао (ARMM) и определил базовую структуру правительства Бангсаморо в соответствии с соглашениями, изложенными во Всеобъемлющем соглашении о мирном соглашении Бангсаморо, подписанном между правительством Филиппин и Исламским фронтом освобождения моро в 2014 году."
  SOM_SML_dissolution.t: "Независимость Сомалиленда?"
  SOM_SML_dissolution.d: "Государство Сомалиленд добровольно объединилось с подопечной территорией Сомали (бывшее Итальянское Сомали) и образовало Сомалийскую Республику. Союз двух государств оказался проблематичным на раннем этапе, и в ответ на жесткую политику, проводимую сомалийским режимом Барре против основной клановой семьи Сомалиленда, Исаак, вскоре после завершения катастрофической Огаденской войны, 10-летняя война за независимость завершилась провозглашением независимости Сомалиленда в 1991 году."
  MOR_WSA_dissolution.t: "Прекращение огня в Западной Сахаре?"
  MOR_WSA_dissolution.d: "Соглашение о прекращении огня в Западной Сахаре, заключенное в 1991 году при посредничестве ООН, вступило в силу 6 сентября 1991 года. Оно стало ключевой частью более широкого мирного процесса, включая создание МООНРЗС, Миссии Организации Объединенных Наций по проведению референдума в Западной Сахаре, для наблюдения за прекращением огня и подготовки к референдуму о будущем территории. Хотя перемирие продолжалось почти 30 лет, оно в конечном итоге не привело к разрешению конфликта."
  IDO_MSY_war.t: "Конфронтаси?"
  IDO_MSY_war.d: "Конфронтация Индонезии и Малайзии или конфронтация Борнео (известная просто как Конфронтаси в Индонезии, Малайзии и Сингапуре) — вооруженный конфликт с 1963 по 1966 год, возникший в результате противодействия Индонезии созданию государства Малайзия из Малайской Федерации. После свержения президента Индонезии Сукарно в 1966 году спор завершился мирно."
  SAF_ANG_war.t: "Операция Саванна?"
  SAF_ANG_war.d: "Операция «Саванна» была кодовым названием южноафриканского военного вторжения в Анголу в 1975–1976 годах. Это было частью южноафриканской пограничной войны и возникло из-за войны за независимость Анголы. Целью было предотвратить создание враждебного ЮАР государства в Анголе."
  USA_korean_war.t: "Вмешаться в Корейскую войну?"
  USA_korean_war.d: "25 июня 1950 года Северокорейская народная армия (КНА) пересекла 38-ю параллель. Совет Безопасности ООН осудил вторжение и уполномочил Командование ООН дать отпор КНА. После первых двух месяцев войны южнокорейская армия (РОКА) и ее союзники были практически разгромлены, удерживая только периметр Пусана. Однако в сентябре 1950 года силы ООН высадились в Инчхоне, отрезав войска КНА и линии снабжения. Они вторглись в Северную Корею в октябре 1950 года и продвинулись к реке Ялу — границе с Китаем."
  india_hyderabad_war.t: "Аннексия Хайдарабада?"
  india_hyderabad_war.d: "В ноябре 1947 года Хайдарабад подписал соглашение о моратории с Доминионом Индии, продолжая все предыдущие договоренности, за исключением размещения индийских войск в штате. Индия считала, что создание коммунистического государства в Хайдарабаде станет угрозой для страны. Власть Низама ослабла из-за восстания Телангана и возникновения радикального ополчения, известного как Разакары, которого он не смог подавить. 7 сентября Джавахарлал Неру предъявил Низаму ультиматум, требуя запретить Разакаров и вернуть индийские войска в Секундерабад. Индия вторглась в штат 13 сентября 1948 года."
  arab_israeli_war.t: "Арабо-израильская война?"
  arab_israeli_war.d: "Арабо-израильская война 1948 года, также известная как Первая арабо-израильская война, последовала за гражданской войной в Подмандатной Палестине и стала вторым и последним этапом палестинской войны 1948 года. Гражданская война превратилась в войну отдельных государств после принятия Декларации независимости Израиля 14 мая 1948 года, окончания британского мандата на Палестину в полночь и вступления военной коалиции арабских государств на территорию Подмандатной Палестины на следующее утро."
  first_indo_pakistan_war.t: "Первая индо-пакистанская война?"
  first_indo_pakistan_war.d: "Индо-Пакистанская война 1947–1948 годов, также известная как Первая Кашмирская война, — война между Индией и Пакистаном из-за княжеского штата Джамму и Кашмир с 1947 по 1948 год."
  football_war.t: "Футбольная война?"
  football_war.d: "Футбольная война — краткий военный конфликт между Сальвадором и Гондурасом в 1969 году. Существующая напряженность в отношениях между двумя странами совпала с беспорядками во время отборочного матча чемпионата мира по футболу 1970 года. Война началась 14 июля 1969 года, когда сальвадорские военные начали нападение на Гондурас."
  agacher_strip_war.t: "Война в полосе Агачера?"
  agacher_strip_war.d: "Война в полосе Агачер — это война, которую Буркина-Фасо и Мали вели на полосе земли длиной 160 километров (100 миль) вдоль границы на севере Буркина-Фасо с 25 по 30 декабря 1985 года. Война закончилась прекращением огня."
  ISR_LEB_war.t: "Операция Литани?"
  ISR_LEB_war.d: "11 марта 1978 года одиннадцать боевиков ООП высадились на берегу в 30 км. к югу от Хайфы, Израиль, где они захватили автобус, полный людей, убив находившихся в нем людей в результате так называемой резни на Прибрежной дороге. В ответ 14 марта 1978 года Израиль начал операцию «Литани», оккупировав южный Ливан, за исключением города Тир, силами 25 000 солдат."
  SYR_LEB_war.t: "Сирийское вторжение в Ливан?"
  SYR_LEB_war.d: "31 мая 1976 года сирийская армия вторглась в Ливан с участием 2000 солдат и 60 танков в трехстороннем наступлении. Первая колонна двинулась на юг через Шуф в сторону Сидона, где была остановлена ​​силами ООП. Вторая колонна двинулась на запад вдоль оси Бейрут-Дамаск, прежде чем была остановлена ​​в Бейруте. Другая колонна двинулась на север через долину Бекаа, а затем направилась на запад в сторону Триполи, где была остановлена ​​христианскими войсками. Наступление было остановлено к 10 июня."
  vietnam_war_1975.t: "Весеннее наступление?"
  vietnam_war_1975.d: "К 1972 году большая часть американских войск была выведена из Вьетнама, а в соответствии с Парижскими мирными соглашениями 1973 года ушли и остальные. Соглашения были нарушены почти сразу, и боевые действия продолжались до весеннего наступления 1975 года и падения Сайгона под контроль ПАВН, что ознаменовало конец войны. Северный и Южный Вьетнам воссоединились в 1976 году."
  ETH_SOM_border_war.t: "Эфиопско-сомалийская пограничная война?"
  ETH_SOM_border_war.d: "Пограничная война между Эфиопией и Сомали продолжалась с июня 1982 года по август 1983 года, когда Эфиопия начала крупномасштабное вторжение в центральную часть Сомали. При поддержке боевых самолетов и бронетехники Эфиопия развернула силы численностью 10 000 человек вместе с тысячами повстанцев Сомалийского демократического фронта спасения (SSDF). Первоначально целью операции было продвинуться до побережья Сомали и в конечном итоге свергнуть режим Барре. Несмотря на свои усилия, эфиопским войскам и партизанам SSDF не удалось захватить ключевые города Галкайо и Беледуэйне, поскольку сомалийская армия успешно отразила основной штурм. Однако вскоре конфликт перерос в военную тупиковую ситуацию вокруг приграничных городов Галдогоб и Баланбале."
  USA_SOM_1993_war.t: "Операция «Готический змей»?"
  USA_SOM_1993_war.d: "Операция «Готический змей» — военная операция, проведенная в Могадишо, Сомали, американскими силами под кодовым названием Оперативная группа «Рейнджер» во время гражданской войны в Сомали в 1993 году. Основной целью операции был захват Мохамеда Фарры Айдида, лидера Сомалийского национального альянса, который разыскивался ЮНОСОМ II в ответ на его нападения на войска Организации Объединенных Наций. Операция проходила с августа по октябрь 1993 года и проводилась под руководством Объединенного командования специальных операций США (JSOC). 3 октября 1993 года оперативная группа выполнила задачу по захвату двух помощников Айдида. В конечном итоге миссия завершилась тем, что стало известно как битва за Могадишо. Бой был чрезвычайно кровопролитным, и оперативная группа нанесла значительные потери силам сомалийского ополчения, а сама понесла тяжелые потери."
  ankoko_island_war.t: "Вторжение на остров Анкоко?"
  ankoko_island_war.d: "В феврале 1966 года правительства Венесуэлы, Соединенного Королевства и Гайаны подписали Женевское соглашение, направленное на урегулирование спора о территории Эссекибо. Через пять месяцев после обретения Гайаной независимости от Соединенного Королевства, в октябре 1966 года, венесуэльские войска начали оккупацию острова Анкоко. Венесуэльские войска быстро построили военные объекты и взлетно-посадочную полосу."
  Mauritania_Senegal_Border_War.t: "Пограничная война между Мавританией и Сенегалом?"
  Mauritania_Senegal_Border_War.d: "Пограничная война между Мавританией и Сенегалом (1989–1991) представляла собой жестокий конфликт, вызванный спорами о земле, этнической принадлежности и национальной идентичности. Напряженность вспыхнула в апреле 1989 года после столкновений между мавританскими пастухами и сенегальскими фермерами вдоль реки Сенегал. То, что началось как локальный спор, переросло в более широкий этнический и дипломатический кризис, когда оба правительства изгнали десятки тысяч граждан друг друга. Распространялось межобщинное насилие, подогреваемое историческими обидами и расовыми разногласиями. Сотни были убиты и более 250 000 стали беженцами. Война закончилась в 1991 году хрупким миром и вновь открытыми границами, но ее наследие недоверия и перемещения населения продолжает формировать отношения между Мавританией и Сенегалом."
  Heglig_Crisis_War.t: "Хеглигский кризис?"
  Heglig_Crisis_War.d: "Хеглигский кризис (март – сентябрь 2012 г.) представлял собой краткий, но интенсивный пограничный конфликт между Суданом и Южным Суданом из-за богатого нефтью региона Хеглиг. После обретения Южным Суданом независимости в 2011 году нерешенные вопросы демаркации границ и споры о доходах от нефти переросли в вооруженные столкновения. Войска Южного Судана оккупировали Хеглиг, известный в Южном Судане как Панту, объявив его частью Государства Юнити, в то время как Судан заявил о своем суверенитете над этой территорией. Судан в конечном итоге восстановил контроль, и в сентябре 2012 года обе страны подписали соглашения о границах и ресурсах."
  PAK_AFG_2026_war.t: "Афгано-Пакистанская война?"
  PAK_AFG_2026_war.d: "21 февраля 2026 года ВВС Пакистана (ПАФ) нанесли авиаудары по провинциям Нангархар, Пактика и Хост в Афганистане. 26 февраля 2026 года Афганистан начал ответную операцию против Пакистана. В ответ Пакистан начал операцию «Газаб Лил Хак» против талибов. На следующий день Пакистан объявил состояние «открытой войны» с Афганистаном."
  USA_PER_2026_war.t: "Война США и Ирана?"
  USA_PER_2026_war.d: "28 февраля 2026 года США и Израиль начали крупную совместную военную кампанию против Ирана, которую президент Дональд Трамп назвал «крупными боевыми операциями». Эскалация произошла после провала последних опосредованных переговоров относительно иранской ядерной программы."
  ETH_SOM_2006_war.t: "Эфиопское вторжение в Сомали?"
  ETH_SOM_2006_war.d: "Вторжение Эфиопии в Сомали представляло собой вооруженный конфликт, продолжавшийся с середины 2006 по начало 2009 года. Оно началось, когда эфиопские вооруженные силы при поддержке США вторглись в Сомали с целью свергнуть Союз исламских судов (СИС) и прийти к власти Переходное федеральное правительство (ПФП). Конфликт перерос в военную оккупацию и быстро эскалацию антиэфиопского мятежа. К 2008 году повстанцы отбили большую часть территории, утраченной СИС во время вторжения. Конфликт стал вторым по величине перемещением населения с 1991 года."
  USA_Saudi_Arabia_petrodollar.t: "Нефтедолларовое соглашение?"
  USA_Saudi_Arabia_petrodollar.d: "Нефтедолларовое соглашение представляло собой пакт 1974 года между США и Саудовской Аравией, устанавливавший, что Саудовская Аравия будет устанавливать цену за продажу нефти исключительно в долларах США и инвестировать свои избыточные доходы в ценные бумаги Казначейства США. Взамен США предоставили гарантии безопасности и военную технику, сделав доллар доминирующей мировой нефтяной валютой."
  austria_formation_1946.t: "Второе соглашение о контроле?"
  austria_formation_1946.d: "28 июня 1946 года союзники подписали Второе соглашение о контроле, которое ослабило их господство над австрийским правительством. Парламент был де-факто освобожден от контроля союзников. Отныне его решения могли быть отменены только единогласно всеми четырьмя союзниками. Советские вето регулярно аннулировались западной оппозицией. В течение следующих девяти лет страна постепенно освободилась от иностранного контроля и превратилась из «нации под опекой» в полную независимость."
  austria_formation_1946.option.1: "Объединить оккупационные зоны."
  austria_formation_1946.option.2: "Держите Австрию разделенной!"
  HUN_2010_revolution.t: "Приход Виктора Орбана?"
  HUN_2010_revolution.d: "Виктор Михай Орбан — венгерский юрист и политик, занимающий пост премьер-министра Венгрии с 2010 года. С 2010 года Орбан подрывает демократию, ослабляет независимость судебной власти и ограничивает свободу прессы в Венгрии. Во время второго премьерства Орбана было проведено несколько спорных конституционных и законодательных реформ, включая поправки 2013 года к Конституции Венгрии."
  CZH_1968_revolution_1.t: "Восстание Александра Дубчека?"
  CZH_1968_revolution_1.d: "В январе 1968 г. вопросы руководства и реформ были переданы на рассмотрение ЦК Чехословацкой партии. Они выразили недоверие Новотному, разделив функции президента и лидера партии. Он остался президентом, но на посту первого секретаря его заменил Дубчек. Новотный сопротивлялся, пытаясь мобилизовать элементы армии, чтобы предотвратить потерю власти. По иронии судьбы, расследование этого дела привело к тому, что через несколько месяцев Новотного полностью отстранили от должности."
  CZH_1969_revolution.t: "Нормализация Чехословакии?"
  CZH_1969_revolution.d: "Когда Гусак сменил Дубчека на посту лидера КСЧ в апреле 1969 года, его режим быстро принял меры по «нормализации» политической ситуации в стране. Главными целями нормализации Гусака были восстановление твердого партийного правления и восстановление статуса Чехословакии как преданного члена социалистического блока. В течение двух лет после вторжения новое руководство отменило некоторые реформистские законы (такие как Закон о Национальном фронте и Закон о прессе) и просто не обеспечивало соблюдение других. Оно вернуло экономические предприятия, получившие значительную независимость во время Пражской весны, под централизованный контроль посредством контрактов, основанных на централизованном планировании и производственных квотах."
  CZH_1969_revolution_1.t: "Чехословацкая федерация?"
  CZH_1969_revolution_1.d: "Обнародование Конституционного закона Федерации внесло поправки в пятьдесят восемь статей Конституции Чехословакии 1960 года, касающихся структуры правительства. Чехословацкое государство было объявлено федерацией «двух равных братских наций», Чешской Социалистической Республики и Словацкой Социалистической Республики, каждая из которых имела национальную администрацию, параллельную и, по крайней мере теоретически, равную по статусу федеральному правительству. Установлено двойное гражданство. Вместо этого многие из прежних функций центрального правительства были переданы в юрисдикцию двух национальных правительств. Федеральное правительство сохранило исключительную юрисдикцию над иностранными делами, национальной обороной, федеральными резервами и национальными ресурсами."
  BUL_1954_revolution.t: "Апрельская линия?"
  BUL_1954_revolution.d: "После смерти Иосифа Сталина появился акцент на совместном руководстве. Когда в 1954 году бескомпромиссный сталинист Червенков оставил свой пост генерального секретаря БКП, его место занял Живков, но Червенков сохранил большую часть своих полномочий на посту премьер-министра. После того, как Никита Хрущев произнес свою знаменитую секретную речь против Сталина на XX съезде Коммунистической партии Советского Союза, в апреле 1956 года было созвано пленарное заседание ЦК БКП, на котором было принято решение о принятии новой хрущевской линии. На этом пленуме Живков раскритиковал Червенкова как ученика Сталина и понизил его с должности премьер-министра до должности в кабинете министров. Впоследствии Живков провел политику относительной социально-политической либерализации и десталинизации в Болгарии, аналогичную хрущевской оттепели в Советском Союзе."
  BUL_1965_revolution.t: "Апрельский заговор?"
  BUL_1965_revolution.d: "По мере усиления позиций Живкова как лидера страны и Коммунистической партии бывшие партизанские лидеры и действующие военные заняли критическую позицию в отношении того, что они считали ревизионистской политикой руководства Живкова. В событиях, получивших название «Апрельский заговор» 1965 года, генерал Иван Тодоров-Горуня, генерал Цветко Анев и Цоло Крастев организовали группу высокопоставленных офицеров, планировавших свергнуть режим. Их план состоял в том, чтобы установить в стране прокитайское руководство, основанное на сталинско-маоистских принципах. Переворот был раскрыт, и в период с 28 марта по 12 апреля 1965 года большинство заговорщиков были арестованы и исключены из партии."
  NEJ_1964_revolution.t: "Отречение короля Сауда?"
  NEJ_1964_revolution.d: "Во время правления Сауда Саудовская Аравия присоединилась к Движению неприсоединения в 1961 году. Однако неспособность Сауда справиться с государственным долгом Саудовской Аравии привела его к борьбе за власть со своим сводным братом и наследным принцем Фейсалом, кульминацией которой стало принудительное отречение Сауда и провозглашение Фейсала королем. Сауд ушел в изгнание и предпринял безуспешную попытку при поддержке некоторых из своих сыновей вернуть себе трон."
  NEJ_1975_revolution.t: "Убийство короля Фейсала?"
  NEJ_1975_revolution.d: "25 марта 1975 года король был застрелен в упор Фейсалом бин Мусаидом, сыном его сводного брата Мусаида бин Абдель Азиза. Он только что вернулся из США. Убийство произошло в меджлисе (буквально «место для сидения»), мероприятии, на котором король или лидер открывает свою резиденцию, чтобы граждане могли войти и подать ему петицию."
  NEJ_2005_revolution.t: "Смерть короля Фахда"
  NEJ_2005_revolution.d: "Король Фахд был госпитализирован в специализированную больницу короля Фейсала в Эр-Рияде 27 мая 2005 года в «стабильном, но тяжелом состоянии» для прохождения неуказанных медицинских обследований. Официальный представитель (настоявший на анонимности) неофициально сообщил Associated Press, что король умер в 07:30 1 августа 2005 года в возрасте 84 лет. Официальное заявление было объявлено по государственному телевидению в 10:0 министром информации Иядом Мадани."
  QAT_1960_revolution.t: "Отречение Али бин Абдаллы Аль Тани?"
  QAT_1960_revolution.d: "В мае 1960 года двоюродный брат шейха Али попытался убить его из огнестрельного оружия в загородной резиденции шейха в Бейруте. Покушение якобы было связано с финансами. Он отрекся от престола в пользу Ахмада бин Али Аль Тани 28 октября 1960 года."
  QAT_1972_revolution.t: "Катарский государственный переворот?"
  QAT_1972_revolution.d: "Шейх Халифа сверг Шейха Ахмада 22 февраля 1972 года в результате бескровного государственного переворота. В то время шейх Ахмад находился в Иране на охоте. После своего смещения шейх Ахмад жил в добровольном изгнании в Дубае со своей женой – дочерью покойного правителя Дубая – и детьми."
  QAT_1995_revolution.t: "Катарский государственный переворот?"
  QAT_1995_revolution.d: "Пока Халифа бен Хамад Аль Тани находился в Женеве, Швейцария, в июне 1995 года его сын Хамад бин Халифа захватил власть в результате очередного бескровного государственного переворота. Хамад бин Халифа обвинил отца в государственной измене и потребовал от Интерпола арестовать его. Он обвинил своего отца по четырем пунктам обвинения, включая его казнь."
  QAT_2013_revolution.t: "Отречение Хамада бин Халифы Аль Тани?"
  QAT_2013_revolution.d: "25 июня 2013 года шейх Хамад бен Халифа Аль Тани отрекся от поста эмира Катара, передав власть своему сыну, шейху Тамиму бин Хамаду Аль Тани. Редкий добровольный шаг в политике Персидского залива ознаменовал смену поколений, обеспечив Катару преемственность на фоне региональных потрясений и глобальной экспансии."
  MOR_1953_revolution.t: "Переворот Мухаммеда Бен Аарафы?"
  MOR_1953_revolution.d: "Бен Арафа был возведен на трон Алуитов 21 августа 1953 года после того, как его двоюродный брат Мохаммед V был свергнут французскими властями, которые сохраняли протекторат в Марокко в соответствии с Фесским договором 1912 года. Генерал Огюстен Гийом, который был генерал-резидентом Марокко с 1951 года, вступил в конфликт с Мохаммедом V из-за поддержки последним движения за независимость Марокко и возглавил кампанию по его свержению, которую поддержали французские колонисты и некоторые марокканские лидеры, такие как Тами Эль Глауи, паша Марракеша."
  MOR_1955_revolution.t: "Свержение Мухаммеда Бен Аарафы?"
  MOR_1955_revolution.d: "Из-за отсутствия легитимности или популярности Бен Арафы среди марокканского населения, а также растущей связи насилия в Марокко с насилием в Тунисе и с войной в Алжире, побудили французские власти рассмотреть возможность свержения его и восстановления Мухаммеда V в 1955 году. Жильбер Гранваль, который был назначен новым генерал-резидентом, решил встретиться с великим визирем Мухаммедом аль-Мукри. Аль-Мукри вылетел во Францию, встретился с Гранвалем в Виши и намекнул, что Бен Арафа должен уйти из-за народного волнения по всей стране, и предполагалось, что Мухаммед V будет восстановлен к власти. 1 октября Бен Арафа отрекся от престола."
  MOR_1961_revolution.t: "Смерть короля Мухаммеда V."
  MOR_1961_revolution.d: "26 февраля 1961 года Мохаммед скончался от осложнений банальной операции на носовой перегородке, проведенной хирургом из Во. О его смерти объявил по национальному радио его сын, наследный принц Мулай Хасан, который сменил его на посту короля Хасана II."
  MOR_1970_revolution.t: "Возвращение парламентских выборов?"
  MOR_1970_revolution.d: "Парламентские выборы прошли в Марокко 21 августа 1970 года. Они последовали за принятием новой конституции на референдуме в июле. В состав новой Ассамблеи представителей входило 240 членов; 90 избираются непосредственно в одномандатных округах открытым голосованием, 90 избираются местными советниками и 60 избираются четырьмя профессиональными коллегиями (24 - сельскохозяйственными палатами, 16 - торгово-промышленными палатами, 10 - ремесленными палатами и 10 - представителями наемных работников)."
  MOR_2011_revolution.t: "Референдум по конституции в Марокко?"
  MOR_2011_revolution.d: "1 июля 2011 года в Марокко прошел референдум по конституционным реформам, созванный королем в ответ на серию протестов по всему Марокко, которые начались 20 февраля 2011 года, когда более десяти тысяч марокканцев приняли участие в демонстрациях с требованием демократических реформ."
  JOR_1951_revolution.t: "Убийство Абдаллы I Иорданского?"
  JOR_1951_revolution.d: "20 июля 1951 года Абдалла I, первый король Иордании, был убит во время посещения мечети Аль-Акса в Иерусалиме. Абдулла находился в Иерусалиме, чтобы произнести панегирик на похоронах Риада Аль Солха, первого премьер-министра Ливана. Он присутствовал на пятничной молитве в мечети вместе со своим внуком принцем Хусейном. Абдулла получил три смертельных выстрела в голову и грудь. Убийца, 21-летний Мустафа Шукри Ашу, был застрелен телохранителями короля. Убийство привело к кризису престолонаследия из-за того, что его сын Талал страдал психическим заболеванием."
  JOR_1952_revolution.t: "Отречение Талала Иорданского?"
  JOR_1952_revolution.d: "Король Иордании Талал отрекся от престола в 1952 году из-за психического заболевания после недолгого правления после убийства его отца. Парламент, возглавляемый премьер-министром Тауфиком Абу Аль-Худой, объявил его непригодным к управлению страной после признаков паранойи и эксцентричного поведения. Его сын Хусейн сменил его, положив начало долгому и преобразующему правлению."
  JOR_1956_revolution.t: "Арабизация иорданской армии?"
  JOR_1956_revolution.d: "Арабизация командования иорданской армии привела к увольнению старших британских офицеров, командующих Арабским легионом, королем Хусейном и последующим переименованием Легиона в Вооруженные силы Иордании 1 марта 1956 года. Глабб-паша, британский командующий Арабским легионом, был заменен генерал-майором Ради Аннабом, который стал первым арабским командиром Арабского легиона. В намерения Хусейна арабизировать командование армии входило заменить британских офицеров иорданскими, утвердить политическую независимость от Великобритании и улучшить отношения с соседними арабскими государствами, которые относились к британцам с подозрением. Когда решение было обнародовано, на улицах Иордании прошли большие празднования."
  JOR_1957_revolution.t: "Чистка насеристов?"
  JOR_1957_revolution.d: "В апреле 1957 года король Иордании Хусейн подавил попытку государственного переворота, организованную насеристами, устранив арабских националистических офицеров и распустив парламент. Репрессии, сосредоточенные в Зарке, ознаменовали решающий поворот в борьбе с панарабским радикализмом. Последовало военное положение, укрепившее королевскую власть и более прочно сблизившее Иорданию с западными и антинасеристскими региональными державами."
  JOR_1989_revolution.t: "Иорданская весна?"
  JOR_1989_revolution.d: "18 апреля 1989 года по всей Иордании вспыхнули массовые протесты против мер жесткой экономии и роста цен, что побудило короля Хусейна отменить военное положение и возобновить парламентские выборы после 22-летнего перерыва. «Иорданская весна» ознаменовала решающий сдвиг в сторону политической либерализации, ускорив демократические реформы и открыв пространство для голосов оппозиции в Хашимитском Королевстве."
  JOR_1999_revolution.t: "Смерть Хусейна I Иорданского?"
  JOR_1999_revolution.d: "Король Иордании Хусейн умер 7 февраля 1999 года в возрасте 63 лет после борьбы с раком. Его кончина ознаменовала конец 46-летнего правления, сформировавшего современную Иорданию. Скорбящие заполнили улицы Аммана, а его сын Абдалла II был быстро приведен к присяге, обеспечив плавную смену руководства."
  EGY_1953_revolution.t: "Декларация Республики?"
  EGY_1953_revolution.d: "Декларация Республики была конституционной декларацией, изданной Советом революционного командования Египта 18 июня 1953 года. Декларация свергла короля Фуада II и передала Королевство Египет Республике Египет."
  EGY_1954_revolution.t: "Приход к власти Гамаля Абдель Насера?"
  EGY_1954_revolution.d: "В январе 1953 года Насер преодолел оппозицию Нагиба и запретил все политические партии, создав однопартийную систему в рамках «Освободительного собрания», свободно структурированного движения, главной задачей которого была организация митингов и лекций в поддержку ПКР, а Насер был его генеральным секретарем. Когда Нагиб начал проявлять признаки независимости от Насера, дистанцируясь от декретов ПКР о земельной реформе и приближаясь к авторитетным политическим силам Египта, а именно к Вафду и Братству, Насер решил свергнуть его. 25 февраля 1954 года Нагиб объявил о своей отставке после того, как за два дня до этого РСС провел официальное заседание без его присутствия. 26 февраля Насер принял отставку, поместил Нагиба под домашний арест, а РСС провозгласил Насера ​​одновременно председателем РСС и премьер-министром."
  SYR_1949_revolution.t: "Государственный переворот в Сирии?"
  SYR_1949_revolution.d: "Государственный переворот в Сирии в марте 1949 года — бескровный государственный переворот, произошедший 30 марта. Это был первый военный переворот в современной сирийской истории, приведший к свержению демократически избранного правительства страны. Его возглавил начальник штаба сирийской армии Хусни аз-Заим, который стал президентом Сирии 11 апреля 1949 года. Среди офицеров, которые помогали аз-Заиму прийти к власти, были Сами аль-Хиннави и Адиб аль-Шишакли, оба из которых впоследствии также стали военачальниками страны."
  SYR_1954_revolution.t: "Государственный переворот в Сирии?"
  SYR_1954_revolution.d: "Полковник Адиб Шишакли пришел к власти в результате переворота в декабре 1949 года, образовав военную автократию. Будучи лидером Сирии, Адиб Шишакли признал желания сирийского арабского большинства и, соответственно, принял политику панарабизма. В феврале того же года произошел сирийский государственный переворот 1954 года с целью свержения правительства Адиба Шишакли. Возглавляли движение против Шишакли бывший президент Атасси и опытный лидер друзов Султан аль-Атраш."
  SYR_1955_revolution.t: "Возвышение Шукри аль-Куватли?"
  SYR_1955_revolution.d: "Куватли вернулся в Сирию в 1955 году, после свержения президента Адиба аль-Шишакли и во время президентства Хашима аль-Атасси. Куватли выставил свою кандидатуру на президентских выборах в августе 1955 года в возрасте 63 лет. Для победы ему необходимо было получить большинство в две трети в сирийском парламенте, состоящем из 142 членов, и он победил своего главного оппонента Халида аль-Азма со счетом 89 против 42 в первом туре. Это повлекло за собой второй тур голосования, в котором Куватли стал президентом, набрав 91 голос против 41 у Азма."
  SYR_1966_revolution.t: "Государственный переворот в Сирии?"
  SYR_1966_revolution.d: "23 февраля 1966 года аль-Хафиз был свергнут радикальной фракцией Баас, возглавляемой главой штаба Салахом Джадидом. Ранним утром в день государственного переворота президент Египта Гамаль Абдель Нассер отправил Насиму аль-Сафарджалани (генеральному секретарю президентского совета) запоздалую телеграмму с предупреждением о государственном перевороте. Переворот возник в результате фракционного соперничества между «регионалистским» (кутри) лагерем Джадида партии Баас, который продвигал амбиции создания Великой Сирии, и более традиционно панарабской фракцией аль-Хафиза, называемой «националистической» (кавми) фракцией."
  SYR_1970_revolution.t: "Корректирующая революция?"
  SYR_1970_revolution.d: "«Корректирующая революция» — бескровный государственный переворот, произошедший 13 ноября 1970 года в Сирии под руководством генерала Хафеза Асада. Асад заявил о необходимости поддерживать и совершенствовать «националистическую социалистическую линию» государства и партии Баас. Партия Баас приняла идеологическую ревизию, отказавшись от доктрины Салаха Джадида об экспорте революций. В новой доктрине упор делался на победу над Израилем путем развития сирийской армии при поддержке Советского Союза."
  SYR_1994_revolution.t: "Приход Башара Асада?"
  SYR_1994_revolution.d: "Башар Хафез аль-Асад — бывший сирийский политик, врач и военный офицер. В 1980-е годы Асад стал врачом, а в начале 1990-х проходил стажировку в Лондоне на офтальмолога. В 1994 году, после того как его старший брат Бассель аль-Асад погиб в автокатастрофе, Асад был отозван в Сирию, чтобы взять на себя роль Баселя в качестве наследника."
  SYR_2000_revolution.t: "Смерть Хафеза Асада?"
  SYR_2000_revolution.d: "10 июня 2000 года в возрасте 69 лет Хафез аль-Асад умер от сердечного приступа во время разговора по телефону с премьер-министром Ливана аль-Хуссом. После смерти Хафеза Асада власть перешла к его сыну Башару при поддержке сторонников Баас, что сделало Сирию первой арабской республикой, установившей династическую систему."
  SYR_2024_revolution.t: "Падение баасистского режима?"
  SYR_2024_revolution.d: "8 декабря 2024 года баасистская Сирия, возглавляемая президентом Башаром Асадом, пала в результате крупного наступления сил оппозиции. Наступление возглавил Тахрир аш-Шам и поддерживался главным образом поддерживаемой Турцией Сирийской национальной армией в рамках продолжающейся гражданской войны в Сирии, начавшейся в 2011 году. Захват Дамаска ознаменовал конец правления семьи Асада, которая управляла Сирией как наследственный тоталитарный режим с тех пор, как Хафез аль-Асад пришел к власти в 1971 году после Коррективной революции."
  LEB_1952_revolution.t: "Восстание Камиллы Шамун?"
  LEB_1952_revolution.d: "Когда в 1952 году президент Бечара Эль-Хури был вынужден уйти в отставку из-за обвинений в коррупции, на его место был избран Чамун. Во время президентства Шамуна Ливан пережил экономический бум, особенно в строительном, банковском и туристическом секторах. Он реализовал закон 1954 года о создании акционерных обществ и закон 1956 года о банковской тайне."
  LEB_1989_revolution.t: "Таифское соглашение?"
  LEB_1989_revolution.d: "Таифское соглашение реструктуризировало политическую систему Национального пакта в Ливане, передав часть власти маронитской христианской общине, которой был предоставлен привилегированный статус в Ливане в период французского правления. После Таифского соглашения премьер-министр был ответственен перед законодательным органом, как и в традиционной парламентской системе. Таким образом, соглашение изменило формулу разделения власти, которая отдавала предпочтение христианам, до соотношения 50:50 и расширило полномочия премьер-министра-суннита по сравнению с полномочиями президента-христианина."
  SUD_1958_revolution.t: "Государственный переворот в Судане?"
  SUD_1958_revolution.d: "После формальной независимости парламентское правительство характеризовалось политической нестабильностью, коррупцией, сектантской фракционностью и игнорированием требований Юга о федерации. Поляризация между ПНЕ аль-Азхари и партией Умма, поддерживаемой религиозным орденом Ансар, остановила экономическое развитие. Парламентский тупик внезапно закончился 17 ноября 1958 года, когда начальник штаба армии генерал Ибрагим Аббуд совершил бескровный государственный переворот, установив первую в стране военную диктатуру. Верховный совет вооруженных сил во главе с Аббудом распустил парламент, приостановил действие конституции и запретил все политические партии."
  SUD_1964_revolution.t: "Падение генерала Аббуда?"
  SUD_1964_revolution.d: "К 1964 году эскалация гражданской войны на юге и рост экономического недовольства серьезно подорвали доверие к военному режиму. В октябре массовые протесты и всеобщая забастовка, известная как Октябрьская революция, вынудили генерала Аббуда уйти в отставку. Временное временное правительство было сформировано под руководством премьер-министра Сирра аль-Хатима аль-Халифа. Примечательно, что этот кабинет был первым в истории Судана, в который вошли представители Суданской коммунистической партии, Братьев-мусульман и профсоюзов."
  SUD_2021_revolution.t: "Государственный переворот в Судане?"
  SUD_2021_revolution.d: "25 октября 2021 года суданские военные во главе с генералом Абдель Фаттахом аль-Бурханом взяли под свой контроль правительство Судана в результате военного переворота. Первоначально были задержаны по меньшей мере пять высокопоставленных государственных деятелей. Гражданский премьер-министр Абдалла Хамдок отказался заявить о поддержке переворота и 25 октября призвал к народному сопротивлению; 26 октября он был помещен под домашний арест."
  EQG_1968_revolution.t: "Президентство Масиаса Нгемы?"
  EQG_1968_revolution.d: "Франсиско Масиас Нгема был экватогвинейским политиком, который занимал пост первого президента Экваториальной Гвинеи с момента обретения страной независимости в 1968 году до своего свержения в 1979 году. Его широко помнят как одного из самых жестоких диктаторов в истории. Будучи президентом, он демонстрировал странное и эксцентричное поведение до такой степени, что многие из его современников считали его сумасшедшим."
  EQG_1973_revolution.t: "Конституция Новой Экваториальной Гвинеи?"
  EQG_1973_revolution.d: "Масиас Нгема еще больше укрепил свою тоталитарную власть, объявив оппозиционные политические партии вне закона в июле 1970 года и объявив себя пожизненным президентом в 1972 году. Он действовал до государственного переворота в августе 1979 года, совершенного Теодоро Обиангом, так называемого переворота свободы, в результате которого был создан Высший военный совет Экваториальной Гвинеи, хотя новая конституция не была одобрена до августа 1982 года."
  EQG_1979_revolution.t: "Переворот Теодоро Обианга?"
  EQG_1979_revolution.d: "Государственный переворот 1979 года в Экваториальной Гвинее произошел 3 августа 1979 года, когда племянник президента Франсиско Масиаса Нгемы, Теодоро Обианг Нгема Мбасого, сверг его в результате кровавого переворота. Боевые действия между лоялистами и повстанцами продолжались до тех пор, пока 18 августа Масиас Нгема не был схвачен при бегстве в Камерун. Он был приговорен к смертной казни за преступление геноцида против народа буби и другие совершенные преступления. Масиас Нгема был расстрелян 29 сентября 1979 года. С тех пор Теодоро оставался лидером, сначала в качестве председателя Революционного военного совета и Высшего военного совета, а затем в качестве президента."
  CMR_1960_revolution.t: "Президентство Ахмаду Ахиджо?"
  CMR_1960_revolution.d: "Ахмаду Бабатура Ахиджо (24 августа 1924 - 30 ноября 1989) был камерунским политиком, который был первым президентом Камеруна с 1960 по 1982 год. Ранее он был первым премьер-министром страны с момента обретения независимости с января 1960 года по май того же года после создания поста президента. Ахиджо сыграл важную роль в становлении Камеруна как независимого государства в 1960 году, а также в интеграции франкоязычной и англоязычной частей страны. За время пребывания у власти Ахиджо он установил централизованную политическую систему."
  CMR_1966_revolution.t: "Однопартийное государство Камерун?"
  CMR_1966_revolution.d: "В 1961 году Ахиджо начал призывать к созданию однопартийного государства. 12 марта 1962 года Ахиджо издал указ, который предотвращал критику его режима, давая правительству право заключать в тюрьму любого, кто будет признан виновным в подрывной деятельности против государственных органов или законов. В июле 1962 года группа лидеров оппозиционной партии, которые служили в правительстве вместе с Ахиджо, оспорила призыв Ахиджо к созданию однопартийного государства, заявив, что оно является диктаторским. Эти лидеры были арестованы, преданы суду и заключены в тюрьму по обвинению в подрывной деятельности против правительства. Политическая партия Ахиджо, Камерунский национальный союз (CNU), стала единственной легальной политической партией 1 сентября 1966 года."
  CMR_1972_revolution.t: "Конституционный референдум в Камеруне?"
  CMR_1972_revolution.d: "Референдум по конституции был проведен в Камеруне 20 мая 1972 года. Новая конституция сделает страну унитарным государством, в отличие от предыдущей федеральной системы, а также предоставит больше полномочий президенту Ахмаду Ахиджо. Его якобы поддержали 99,99% избирателей при явке 98%."
  CMR_1982_revolution.t: "Отставка Ахмаду Ахиджо?"
  CMR_1982_revolution.d: "Ахиджо подал в отставку, якобы по состоянию здоровья, 4 ноября 1982 года, и два дня спустя его сменил премьер-министр Пол Бия. То, что он ушел в отставку в пользу Бии, христианина с юга, а не мусульманина с севера, как он сам, было сочтено удивительным. Конечные намерения Ахиджо были неясны; возможно, что он намеревался вернуться на пост президента позже, когда его здоровье улучшится, а другая возможность состоит в том, что он намеревался сделать Майгари Белло Бубу, своего соотечественника-мусульманина с севера, сменившего Бию на посту премьер-министра, своим возможным преемником на посту президента, а Бийя фактически будет выполнять роль смотрителя."
  NGE_1966_revolution.t: "Государственный переворот в Нигерии?"
  NGE_1966_revolution.d: "Военная диктатура в Нигерии представляла собой период, когда военнослужащие нигерийских вооруженных сил находились у власти в Нигерии с 1966 по 1999 год с перерывом между царствованиями с 1979 по 1983 год. Военным удавалось прийти к власти часто при молчаливой поддержке элиты посредством государственных переворотов."
  NGE_1999_revolution.t: "Возвращение к демократии?"
  NGE_1999_revolution.d: "Из-за массовых гражданских протестов, которые фактически закрыли страну на несколько недель. Президент наконец сдержал свое обещание передать власть гражданскому правительству. Запрет на политическую деятельность был снят, а политзаключенные освобождены из мест лишения свободы. Затем были назначены выборы для избрания нового президента."
  NIG_1960_revolution.t: "Президентство Хамани Диори?"
  NIG_1960_revolution.d: "Хамани Диори был первым президентом Республики Нигер. Он был назначен на этот пост в 1960 году, когда Нигер обрел независимость от Франции. Хотя коррупция была общей чертой его администрации, он завоевал международное уважение за свою роль представителя по делам Африки и популярного арбитра в конфликтах."
  NIG_1974_revolution.t: "Государственный переворот в Нигерии?"
  NIG_1974_revolution.d: "15 апреля 1974 года подполковник Сейни Кунче возглавил военный переворот, положивший конец четырнадцатилетнему правлению Диори. Военный переворот начался в час ночи 15 апреля, и все, за исключением нескольких подразделений, быстро высказались в поддержку лидеров переворота. Личная гвардия президента Хамани Диори, Республиканская гвардия туарегов, была единственным подразделением, оказавшим сопротивление под командованием жены Диори Аиссы Диори. Она и небольшое количество гвардейцев были убиты в президентском дворце после рассвета 15 апреля. Диори, президент Национальной ассамблеи, Бубу Хама и несколько других политиков ППН в Ниамее были арестованы в ходе операции."
  NIG_1987_revolution.t: "Смерть Сейни Кунче?"
  NIG_1987_revolution.d: "Здоровье Кунче ухудшилось в конце 1986 года и продолжало ухудшаться в течение 1987 года. Он умер в парижской больнице от опухоли головного мозга 10 ноября 1987 года. Али Саибу сменил его, и 14 ноября 1987 года он был назначен президентом Высшего военного совета (ВМС)."
  NIG_1993_revolution.t: "Возвращение демократии в Нигере?"
  NIG_1993_revolution.d: "В начале 1990 года волнения студентов и нападение туарегов на Чинтабараден привели к Национальной конференции 1991 года, которая в конечном итоге ликвидировала однопартийное правление, оставив Сайбу практически неэффективным. На съезде партии МНСР в марте 1991 года Сайбу смог сохранить свою позицию лидера партии, особенно благодаря поддержке армии. Однако позже в том же году Национальная конференция запретила Сайбу участвовать в запланированных президентских выборах, а на другом съезде МНСД в ноябре 1991 года его сменил на посту лидера партии Мамаду Танджа. После избрания Махамана Усмана президентом в марте 1993 года Сайбу передал пост президента Махамане 16 апреля — впервые действующий президент мирно передал власть оппозиции — и удалился в свою родную деревню."
  NIG_1996_revolution.t: "Государственный переворот в Нигерии?"
  NIG_1996_revolution.d: "Государственный переворот в Нигерии 1996 года — военный переворот, произошедший 27 января 1996 года в Ниамее, Нигер. Он сверг первого демократически избранного президента Нигера Махамана Усмана после почти трех лет пребывания у власти и назначил главой государства генерала Ибрагима Баре Майнассару. Премьер-министр Хама Амаду был арестован в ходе переворота, а несколько солдат и президентских охранников были убиты в ходе боевых действий."
  NIG_1999_revolution.t: "Государственный переворот в Нигерии?"
  NIG_1999_revolution.d: "Государственный переворот в Нигерии 1999 года произошел 9 апреля 1999 года и привел к смерти президента Ибрагима Баре Майнассары и назначению президентом Дауды Малама Ванке 11 апреля. Майнассара был застрелен при невыясненных обстоятельствах в засаде либо в международном аэропорту Диори Хамани, возможно, при попытке бежать из страны, либо на военной базе, вероятно, организованной членами президентской гвардии."
  NIG_2010_revolution.t: "Государственный переворот в Нигерии?"
  NIG_2010_revolution.d: "Государственный переворот произошел в Нигере 18 февраля 2010 года. В полдень солдаты атаковали президентский дворец в Ниамее под огнем оружия и захватили президента Мамаду Танджа, который в то время председательствовал на заседании правительства. Позже в тот же день повстанцы объявили по телевидению о формировании Высшего совета по восстановлению демократии (CSRD) во главе с шеф-поваром Салоу Джибо."
  NIG_2023_revolution.t: "Государственный переворот в Нигерии?"
  NIG_2023_revolution.d: "26 июля 2023 года в Нигере произошел государственный переворот, в ходе которого президентская охрана страны сместила и задержала президента Мохамеда Базума. Впоследствии генерал Абдурахаман Чиани, командующий президентской гвардией, провозгласил себя лидером страны и учредил Национальный совет по защите родины, подтвердив успех переворота."
  IVC_1960_revolution.t: "Новый ивуарийский силач?"
  IVC_1960_revolution.d: "Кот-д'Ивуар добился независимости в 1960 году под руководством Феликса Уфуэ-Буаньи, который правил страной до 1993 года. Относительно стабильный по региональным стандартам Кот-д'Ивуар установил тесные политико-экономические связи со своими западноафриканскими соседями, сохраняя при этом тесные отношения с Западом, особенно с Францией. Его стабильность была подорвана государственным переворотом в 1999 году и двумя гражданскими войнами — сначала в период с 2002 по 2007 год, а затем в 2010–2011 годах."
  IVC_2000_revolution.t: "Возвращение к демократии?"
  IVC_2000_revolution.d: "Из-за массовых гражданских протестов, которые фактически закрыли страну на несколько недель. Президент наконец сдержал свое обещание передать власть гражданскому правительству. Запрет на политическую деятельность был снят, а политзаключенные освобождены из мест лишения свободы. Затем были назначены выборы для избрания нового президента."
  MAL_1960_revolution.t: "Государственный переворот в Малии?"
  MAL_1960_revolution.d: "После ухода Сенегала была создана Республика Мали. После длительного периода однопартийного правления переворот 1991 года привел к принятию новой конституции и провозглашению Мали демократическим многопартийным государством. В январе 2012 года на севере Мали вспыхнул вооруженный конфликт, в ходе которого повстанцы-туареги взяли под контроль территорию на севере, а в апреле объявили об отделении нового государства Азавад. Конфликт осложнился военным переворотом в марте 2012 года, а затем боевыми действиями между туарегами и другими повстанческими группировками."
  MAL_1991_revolution.t: "Возвращение к демократии?"
  MAL_1991_revolution.d: "После длительного периода однопартийного правления переворот 1991 года привел к принятию новой конституции и провозглашению Мали демократическим многопартийным государством. В январе 2012 года на севере Мали вспыхнул вооруженный конфликт. Конфликт осложнился военным переворотом в марте 2012 года, а затем боевыми действиями между туарегами и другими повстанческими группировками. За переворотом последовало «единодушное» международное осуждение, жесткие санкции со стороны соседей Мали и быстрая потеря северной части Мали силам туарегов. 6 апреля хунта согласилась уйти от власти в обмен на отмену санкций, передав власть переходному правительству во главе со спикером парламента Дионкундой Траоре."
  CHA_1960_revolution.t: "Государственный переворот в Чаде?"
  CHA_1960_revolution.d: "В 1960 году Чад получил независимость под руководством Франсуа Томбалбайе. Недовольство его политикой на мусульманском севере вылилось в начало длительной гражданской войны в 1965 году. В 1979 году повстанцы захватили столицу и положили конец гегемонии Юга. Затем командиры повстанцев воевали между собой, пока Хиссен Хабре не победил своих соперников. Чадско-ливийский конфликт разразился в 1978 году в результате ливийского вторжения, которое остановилось в 1987 году военным вмешательством Франции (операция Эпервье). Хиссен Хабре, в свою очередь, был свергнут в 1990 году своим генералом Идрисом Деби."
  CHA_1991_revolution.t: "Государственный переворот в Чаде?"
  CHA_1991_revolution.d: "Деби пришел к власти, возглавив государственный переворот против Хабре в декабре 1990 года. Несмотря на введение многопартийной системы в 1992 году после нескольких десятилетий однопартийного правления при его предшественниках, на протяжении всего его президентства его Движение патриотического спасения было доминирующей партией. Деби побеждал на президентских выборах в 1996 и 2001 годах, а после отмены ограничений по срокам он снова побеждал в 2006, 2011, 2016 и 2021 годах."
  RWA_1973_revolution.t: "Государственный переворот в Руанде?"
  RWA_1973_revolution.d: "Этнический хуту, Хабиаримана занимал несколько должностей в органах безопасности, включая пост министра обороны при первом президенте Руанды Грегуаре Кайибанде. После свержения Кайибанды в результате переворота в 1973 году он стал новым президентом страны и в конечном итоге продолжил политику своего предшественника в поддержку хуту. Во время его правления Руанда стала тоталитарным однопартийным государством, в котором его сторонники из партии MRND требовали, чтобы люди скандировали и танцевали в знак восхищения президентом на массовых представлениях политической «анимации»."
  RWA_1994_revolution.t: "Падение режима хуту?"
  RWA_1994_revolution.d: "В 1990 году возглавляемый тутси Патриотический фронт Руанды (ПФР) начал гражданскую войну в Руанде против его правительства. После трех лет войны Хабиаримана подписал в 1993 году Арушские соглашения с РПФ в качестве мирного соглашения. В следующем году он погиб при загадочных обстоятельствах, когда его самолет, на борту которого также находился президент Бурунди Сиприен Нтарьямира, был сбит ракетой недалеко от Кигали. Его убийство разожгло этническую напряженность в регионе и помогло спровоцировать геноцид против тутси. РПФ тутси возобновил наступление и методично взял под свой контроль страну, получив контроль над всей страной к середине июля."
  RWA_2000_revolution.t: "Восстание Пола Кагаме?"
  RWA_2000_revolution.d: "Бизимунгу ушел в отставку в 2000 году, скорее всего, он был вынужден сделать это после ссоры с РПФ. Его заменил Кагаме. Позже Бизимунгу был заключен в тюрьму за коррупцию и подстрекательство к этническому насилию - обвинения, которые правозащитные группы назвали политически мотивированными. Правление Кагаме считается авторитарным, а правозащитные группы обвиняют его в политических репрессиях."
  GAM_1994_revolution.t: "Переворот Яхья Джамме?"
  GAM_1994_revolution.d: "22 июля 1994 года младшие офицеры во главе с Яхьей Джамме свергли правительство президента Давы Джавары в Гамбии, сославшись на коррупцию и бесхозяйственность. Бескровный переворот положил конец почти 30-летнему правлению Джавары, приостановил действие конституции и установил военную хунту."
  GAM_2017_revolution.t: "Падение Яхья Джамме?"
  GAM_2017_revolution.d: "В декабре 2016 года Яхья Джамме проиграл президентские выборы в Гамбии Адаме Бэрроу, но отказался уступить, что спровоцировало конституционный кризис. ЭКОВАС вмешалось в военные действия, что побудило Джамме бежать в 2017 году в изгнание в Экваториальную Гвинею. Барроу был приведен к присяге, что положило конец 22-летнему авторитарному правлению Джамме и положило начало новой демократической эре."
  SEN_1960_revolution.t: "Возвышение Леопольда Седара Сенгора?"
  SEN_1960_revolution.d: "Леопольд Седар Сенгор родился 9 октября 1906 года в Джоале, Сенегал. Получив образование в Париже, он стал ведущим поэтом и одним из основателей движения Негритюд, отстаивающего африканскую культурную самобытность. Вернувшись домой после Второй мировой войны, он занялся политикой, направляя Сенегал к автономии и создавая африканский социализм с прагматическими французскими связями. 6 сентября 1960 года он стал первым президентом независимого Сенегала, проведя молодую страну через два десятилетия стабильности и длительного культурного возрождения. Его сочетание поэтического видения и замечательной политической хватки укрепило его наследие как мыслителя-новатора, чей взлет изменил постколониальную Африку."
  SEN_1962_revolution.t: "Попытка государственного переворота Мамаду Диа?"
  SEN_1962_revolution.d: "В декабре 1962 года премьер-министра Сенегала Мамаду Диа обвинили в организации государственного переворота против президента Леопольда Седара Сенгора на фоне глубоких идеологических разногласий. Диа, убежденный социалист, вступил в конфликт с Сенгором по поводу экономической политики и парламентского контроля. Когда Диа попытался заблокировать вотум недоверия, Сенгор истолковал это как захват власти. Диа был арестован, предан суду за государственную измену и приговорен к пожизненному заключению, хотя многие историки рассматривают это событие как политический маневр, а не как настоящий переворот. Его падение ознаменовало сдвиг в сторону президентского доминирования в сенегальской политике и положило конец краткому эксперименту страны с двойным исполнительным руководством."
  SEN_1975_revolution.t: "Частичная либерализация Сенегала?"
  SEN_1975_revolution.d: "При президенте Леопольде Седаре Сенгоре Сенегал перешел от фактического однопартийного государства к контролируемой многопартийной системе. Эта «пассивная революция» позволила ограничить оппозицию, легализовав до трех партий, каждая из которых представляла разные идеологические позиции, сохраняя при этом жесткий государственный надзор. Этот шаг был направлен на модернизацию управления без дестабилизации власти Сенгора. Либерализация Сенегала в 1975 году отразила стратегический баланс между политической открытостью и преемственностью режима."
  SEN_1980_revolution.t: "Возвращение многопартийной демократии в Сенегале?"
  SEN_1980_revolution.d: "Уход Сенгора и мирная смена власти Абду Диуфом сигнализировали об углублении демократических норм. Опираясь на частичную либерализацию 1975 года, Диуф расширил политические свободы, позволив большему количеству партий действовать за пределами ранее навязанных жестких идеологических рамок. Этот переход укрепил репутацию Сенегала как страны с политической стабильностью и гражданским правлением в Западной Африке. Сдвиг 1980 года заложил основу для конкурентных выборов и динамичного политического ландшафта, сделав Сенегал образцом постепенной мирной демократизации в постколониальную эпоху."
  SIL_1964_revolution.t: "Премьерство Альберта Маргаи?"
  SIL_1964_revolution.d: "Альберт Маргай занимал пост премьер-министра Сьерра-Леоне с 1964 по 1967 год, сменив на этом посту своего брата Милтона Маргаи. Его администрация сосредоточила усилия на консолидации власти и содействии национальному единству, но его политика – особенно попытки политизировать армию и перейти к однопартийному государству – вызвала споры. Этнический фаворитизм и растущий авторитаризм подорвали общественное доверие, что привело к политической нестабильности."
  SIL_1968_revolution.t: "Премьерство Сиаки Стивенса?"
  SIL_1968_revolution.d: "Сиака Стивенс занимал пост премьер-министра Сьерра-Леоне с 1968 по 1971 год, заложив основу для своего длительного президентства. Его премьерство последовало за периодом политической нестабильности и военного правления, и он быстро приступил к консолидации власти под руководством Всенародного конгресса. Стивенс делал упор на экономический национализм и централизованное управление, но во время его пребывания в должности также наблюдался рост авторитаризма и подавление инакомыслия. В 1971 году он превратил Сьерра-Леоне в республику и стал ее первым исполнительным президентом. Его стиль руководства и политические маневры в этот период на протяжении десятилетий определяли траекторию развития страны, сочетая популистскую риторику с жестким контролем над государственными институтами."
  SIL_1985_revolution.t: "Премьерство Джозефа Саиду Момоха?"
  SIL_1985_revolution.d: "Джозеф Саиду Момох стал премьер-министром Сьерра-Леоне в 1985 году, сменив Сиаку Стивенса и позже вступив на пост президента. Бывший армейский генерал Момох пообещал провести реформы и национальное обновление, но с трудом смог выполнить их на фоне углубляющегося экономического кризиса и широко распространенной коррупции. Его администрация столкнулась с растущим общественным недовольством, ухудшением инфраструктуры и снижением уровня жизни. Попытки политической либерализации носили во многом символический характер, поскольку правящий Всенародный конгресс сохранял жесткий контроль."
  SIL_1992_revolution.t: "Переворот Валентина Штрассера?"
  SIL_1992_revolution.d: "Валентин Штрассер возглавлял Сьерра-Леоне в качестве главы государства с 1992 по 1996 год, став самым молодым президентом в мире в возрасте 25 лет после военного переворота. Его правление началось с обещаний реформ и борьбы с коррупцией, но быстро стало определяться авторитарным контролем и усиливающейся гражданской войной. Будучи председателем Национального временного правящего совета, Штрассер изо всех сил пытался стабилизировать экономику и справиться с повстанческими восстаниями. Несмотря на первоначальную общественную поддержку, его лидерство пошатнулось из-за внутренних разногласий и отсутствия прогресса."
  SIL_1996_revolution.t: "Возвращение демократии?"
  SIL_1996_revolution.d: "В 1996 году Сьерра-Леоне вернулась к демократии после многих лет военного правления и гражданских беспорядков. Знаковые выборы, состоявшиеся в феврале и марте, ознаменовали первое многопартийное голосование в стране с 1977 года. Несмотря на продолжающийся конфликт с Объединенным революционным фронтом (ОРФ), граждане поддержали демократический процесс, избрав президентом Ахмеда Теджана Каббу из Народной партии Сьерра-Леоне (НСЛП). Его победа сигнализировала об обнадеживающем сдвиге в сторону гражданского управления и конституционного порядка. Выборы также восстановили парламентское представительство, положив конец четырехлетнему военному контролю под руководством Национального временного правящего совета и возродив демократические институты на фоне хрупкого мирного процесса."
  GHA_1960_revolution.t: "Правило Кваме Нкрумы?"
  GHA_1960_revolution.d: "Фрэнсис Кваме Нкрума был ганским политиком, политическим теоретиком и революционером. Он занимал пост премьер-министра Золотого Берега с 1952 по 1957 год, когда он получил независимость от Великобритании. Затем он был первым премьер-министром, а затем президентом Ганы с 1957 по 1966 год. Его администрация была в первую очередь социалистической, а также националистической. Он финансировал национальные промышленные и энергетические проекты, развивал сильную национальную систему образования и продвигал панафриканскую культуру. При Нкруме Гана играла ведущую роль в международных отношениях Африки в период деколонизации."
  GHA_1966_revolution.t: "Ганский переворот?"
  GHA_1966_revolution.d: "В феврале 1966 года, когда Нкрума находился с государственным визитом в Северный Вьетнам и Китай, его правительство было свергнуто в результате насильственного государственного переворота, проведенного национальными военными и полицейскими силами при поддержке государственной службы. Заговорщики во главе с Джозефом Артуром Анкрой назвали себя Советом национального освобождения и правили как военное правительство в течение трех лет. Руководители переворота, свергнувшего Нкруму, немедленно открыли границы страны и ворота ее тюрем, чтобы дать возможность вернуться из ссылки или освободить из предварительного заключения всех противников Нкрумы. Он назначил кабинет государственных служащих и пообещал как можно быстрее восстановить демократическое правительство."
  GHA_1979_revolution.t: "Ганский переворот?"
  GHA_1979_revolution.d: "Революция 4 июня — восстание в Гане в 1979 году, возникшее из-за конфликта между низшими чинами и офицерами вооруженных сил Ганы. Затем восставшие младшие офицеры назначили Роулингса главой Революционного совета вооруженных сил (РСВС) для управления страной до завершения текущих выборов. Роулингс передал свою власть доктору Хилле Лиманн в сентябре 1979 года. Позже Роулингс сверг правительство Лимана 31 декабря 1981 года."
  GHA_1992_revolution.t: "Восстановление демократии?"
  GHA_1992_revolution.d: "Джерри Роулингс, возглавлявший страну с момента прихода к власти в результате переворота 1981 года, неохотно согласился провести многопартийные выборы в начале года. Роулингс баллотировался как кандидат от Прогрессивного альянса, в который входил его Национальный демократический конгресс, и набрал 58,4% голосов, что достаточно для победы без необходимости проведения второго тура. Явка избирателей составила 50,2%."
  GUI_1960_revolution.t: "Правление Ахмеда Секу Туре?"
  GUI_1960_revolution.d: "Ахмед Секу Туре был гвинейским политическим лидером и африканским государственным деятелем, который стал первым президентом Гвинеи, занимая этот пост с 1958 года до своей смерти в 1984 году. Туре был одним из основных гвинейских националистов, участвовавших в обретении страной независимости от Франции. В 1960 году Туре объявил ДПГ единственной законной партией, хотя с момента обретения независимости страна фактически была однопартийным государством. В течение следующих 24 лет Туре фактически владел всей руководящей властью в стране."
  GUI_1984_revolution.t: "Государственный переворот в Гвинее?"
  GUI_1984_revolution.d: "Государственный переворот 1984 года — бескровный военный переворот, произошедший в Гвинее 3 апреля 1984 года под руководством полковника Лансаны Конте. Это привело к свержению премьер-министра Луи Лансаны Беавоги, который занимал этот пост с 1972 года и занимал пост временного президента с марта, когда давний президент Ахмед Секу Туре умер во время экстренной операции на сердце в Кливлендской клинике в США."
  GUI_1993_revolution.t: "Восстановление демократии?"
  GUI_1993_revolution.d: "Первые многопартийные президентские выборы, состоявшиеся с момента обретения независимости, состоялись 19 декабря 1993 года. Конте, кандидат от недавно сформированной Партии единства и прогресса (ПНП), набрал 51,7% голосов — едва достаточно, чтобы избежать второго тура. Альфа Конде из Объединения гвинейского народа (RPG) заняла второе место с 19,6% голосов."
  GAB_1961_revolution.t: "Восстание Леона Мба?"
  GAB_1961_revolution.d: "Первым президентом Габона, избранным в 1961 году, был Леон Мба, а его вице-президентом - Омар Бонго Ондимба. После того, как Мба пришел к власти, пресса была подавлена, политические демонстрации подавлены, свобода выражения мнений ограничена, другие политические партии постепенно были исключены из власти, а Конституция была изменена по французскому образцу, чтобы передать власть президенту - пост, который Мба занял сам. Когда в январе 1964 года Мба распустил Национальное собрание, чтобы установить однопартийное правление, армейский переворот был направлен на то, чтобы отстранить его от власти и восстановить парламентскую демократию. Французские десантники прилетели в течение 24 часов, чтобы вернуть Мба к власти. После нескольких дней боев переворот закончился, оппозиция была заключена в тюрьму, после чего последовали протесты и беспорядки."
  GAB_1967_revolution.t: "Восстание Омара Бонго?"
  GAB_1967_revolution.d: "Омар Бонго Ондимба был габонским политиком, который был вторым президентом Габона с 1967 года до своей смерти в 2009 году. Член Демократической партии Габона (ДПГ), Бонго был продвинут на ключевые должности в качестве молодого чиновника при первом президенте Габона Леоне Мба в 1960-х годах, а затем был избран вторым самостоятельным вице-президентом в 1966 году. В 1967 году, после президента Мба, смерти, он стал президентом страны."
  GAB_1993_revolution.t: "Многопартийная демократия в Габоне?"
  GAB_1993_revolution.d: "22 мая 1990 года, после забастовок, беспорядков и беспорядков, центральный комитет ДПГ и Национальное собрание одобрили поправки к конституции, облегчающие переход к многопартийной системе. Существующий президентский мандат, действовавший до 1994 года, должен был соблюдаться. Последующие выборы президента будут оспариваться более чем одним кандидатом, а срок президентских полномочий был изменен до пяти лет с ограничением срока, состоящим из одного переизбрания на этот пост. В декабре 1993 года Бонго выиграл первые президентские выборы, проведенные в соответствии с новой многопартийной конституцией, со значительно меньшим перевесом - около 51,4%."
  GAB_2009_revolution.t: "Президентство Али Бонго?"
  GAB_2009_revolution.d: "Али Бонго Ондимба — бывший габонский политик и диктатор, который был третьим президентом Габона с 2009 года до своего свержения в результате переворота в 2023 году. Член Демократической партии Габона, Бонго — сын Омара Бонго, который был президентом с 1967 года до своей смерти в 2009 году."
  GAB_2023_revolution.t: "Государственный переворот в Габоне?"
  GAB_2023_revolution.d: "30 августа 2023 года в Габоне произошел государственный переворот, вскоре после объявления о том, что действующий президент Али Бонго победил на всеобщих выборах, состоявшихся 26 августа. Лидер переворота Брис Олигуи Нгема является членом семьи Бонго и сверг своего двоюродного брата Али Бонго. Переворот положил конец 56-летнему правлению Габоном дуэта отца и сына Омара и Али Бонго. Некоторые охарактеризовали это как дворцовый переворот."
  BEN_1960_revolution.t: "Однопартийное государство Дагомея?"
  BEN_1960_revolution.d: "В 1960 году Дагомея получила независимость от Франции и некоторое время экспериментировала с многопартийной демократией. К концу того же года Хуберт Мага консолидировал власть, объявил оппозицию вне закона и объявил Дагомею однопартийным государством."
  BEN_1970_revolution.t: "Триумвират Дагомеи?"
  BEN_1970_revolution.d: "В 1970 году политический кризис в Дагомее породил первое коллегиальное президентство в Африке. Хуберт Мага, Джастин Ахомадегбе и Суру-Миган Апити сформировали сменяющийся триумвират, каждый из которых правил в течение двух лет, чтобы сбалансировать региональное соперничество. Несмотря на новаторство, эта схема оказалась нестабильной."
  BEN_1972_revolution.t: "Народная Республика Бенин?"
  BEN_1972_revolution.d: "Народная Республика Бенин — коммунистическое государство, расположенное в Гвинейском заливе на Африканском континенте, ставшее современным Бенином в 1990 году. Народная Республика была основана 30 ноября 1975 года после государственного переворота 1972 года в Республике Дагомея."
  BEN_1990_revolution.t: "Возвращение многопартийной демократии в Бенине?"
  BEN_1990_revolution.d: "Социальные и политические потрясения, катастрофическая экономическая ситуация и падение коммунистических режимов в Восточной Европе вынудили президента Кереку согласиться свергнуть свой режим. В феврале 1989 года в пастырском письме, подписанном одиннадцатью епископами Бенина, выражалось осуждение Народной Республики. 7 декабря 1989 года Кереку взял на себя инициативу и удивил людей, распространив официальное заявление, в котором объявил об отказе от марксизма-ленинизма, ликвидации Политбюро и закрытии центрального комитета партии. В 1990 году было создано переходное правительство, что открыло путь к возвращению многопартийной системы. Новая конституция была принята референдумом в декабре 1990 года. Официальное название Бенин было сохранено за страной, которая стала Республикой Бенин."
  CUB_2006_revolution.t: "Приход Рауля Кастро?"
  CUB_2006_revolution.d: "Из-за болезни своего брата Кастро стал исполняющим обязанности президента Государственного совета при временной передаче власти с 31 июля 2006 года. Кастро был официально назначен президентом Национальным собранием 24 февраля 2008 года, после того как его брат, который все еще болел, объявил 19 февраля 2008 года, что он больше не будет баллотироваться. Он был переизбран президентом 24 февраля 2013 года. Вскоре после этого Кастро объявил, что его второй срок будет его последним сроком и что он не будет добиваться переизбрания в 2018 году."
  CUB_2019_revolution.t: "Кубинский конституционный референдум?"
  CUB_2019_revolution.d: "На кубинском конституционном референдуме 2019 года, состоявшемся 24 февраля, новая конституция была одобрена 90,6% действительных голосов. Реформы привели к признанию частной собственности, ограничению президентских сроков, расширению гражданских прав и структурным изменениям в правительстве. Конституция вступила в силу 10 апреля 2019 года."
  HAI_1946_revolution.t: "Государственный переворот?"
  HAI_1946_revolution.d: "Поскольку его правительство было на грани банкротства и боролось с ослабевающей экономикой, Лескот безуспешно умолял Соединенные Штаты о продлении срока погашения долга. Отношения между Лескотом и Трухильо в Доминиканской Республике испортились. К 1946 году его попытки заткнуть рот оппозиционной прессе вызвали ожесточенные студенческие демонстрации; в Порт-о-Пренсе вспыхнуло восстание. Леско пытался приказать военной гвардии разогнать демонстрации, но получил отказ. Убежденные, что их жизни в опасности, Леско и его кабинет бежали в изгнание. Дюмарсе Эстиме в конечном итоге сменил Леско на посту главы республики, став первым чернокожим президентом Гаити после американской оккупации."
  HAI_1950_revolution.t: "Государственный переворот?"
  HAI_1950_revolution.d: "В августе 1946 года Дюмарсе Эстиме был избран президентом Гаити против Дантеса Луи Бельгарда. Затем Маглуар оказался в оппозиции и создал MOP (Mouvement Ouvrier Paysan). В мае 1950 года в результате государственного переворота, организованного военной хунтой, было свергнуто правительство Эстиме и поставлено его лидер, Поль Маглуар, главой страны, где он должен был быть избран на пост президента в октябре 1950 года. Эстиме был вскоре свергнут и сослан гаитянской армией под предводительством Франка Лаво."
  HAI_1957_revolution.t: "Возвышение Франсуа Дювалье?"
  HAI_1957_revolution.d: "Франсуа Дювалье был гаитянским политиком и вудуистом, который занимал пост президента Гаити с 1957 года до своей смерти в 1971 году. После предотвращения военного переворота в 1958 году его режим быстро стал более авторитарным и деспотичным. Тайный правительственный отряд смерти Тонтон-Макут без разбора пытал или убивал противников Дювалье. Дювалье также стремился укрепить свое правление, включив элементы гаитянской мифологии в культ личности."
  HAI_1971_revolution.t: "Смерть Франсуа Дювалье"
  HAI_1971_revolution.d: "В апреле 1971 года Жан-Клод Дювалье вступил на пост президента Гаити в возрасте 19 лет после смерти своего отца Франсуа Дювалье, став самым молодым президентом в мире, а также единственным некоролевским государственным лидером в возрасте до 20 лет."
  HAI_1986_revolution.t: "Падение Жан-Клода Дювалье"
  HAI_1986_revolution.d: "Восстание началось в провинциях в 1985 году. Город Гонаив был первым, где прошли уличные демонстрации и рейды на склады с продовольствием. С октября 1985 года по январь 1986 года протесты распространились на шесть других городов, включая Кап-Аитьен. Дювалье бежал из страны 7 февраля 1986 года."
  HAI_1994_revolution.t: "Возвращение демократии"
  HAI_1994_revolution.d: "В сентябре 1994 года Соединенные Штаты договорились об уходе военных лидеров Гаити и мирном вводе 20 000 американских солдат в рамках операции «Поддержать демократию». Это позволило восстановить на посту президента демократически избранного Жана-Бертрана Аристида, который вернулся на Гаити в октябре, чтобы завершить свой срок. В рамках сделки Аристиду пришлось провести реформы свободного рынка в попытке улучшить экономику Гаити, но результаты оказались неоднозначными."
  HAI_2004_revolution.t: "Государственный переворот?"
  HAI_2004_revolution.d: "Государственный переворот на Гаити, произошедший 29 февраля 2004 года после нескольких недель конфликта, привел к отстранению президента Жана-Бертрана Аристида от должности. 5 февраля повстанческая группа под названием «Национально-революционный фронт освобождения и реконструкции Гаити» взяла под свой контроль четвертый по величине город Гаити, Гонаив. К 22 февраля повстанцы захватили второй по величине город Гаити Кап-Аитьен и к концу февраля осадили столицу Порт-о-Пренс. Утром 29 февраля Аристид подал в отставку при спорных обстоятельствах и был доставлен из Гаити американскими военными и сотрудниками службы безопасности."
  ZIM_1996_revolution.t: "Восхождение Грейс Мугабе?"
  ZIM_1996_revolution.d: "Грейс Нтомбизодва Мугабе — зимбабвийский предприниматель, политик и вдова покойного президента Роберта Мугабе. Она занимала пост первой леди Зимбабве с 1996 года до отставки ее мужа в ноябре 2017 года, через неделю после того, как он был отстранен от власти в результате государственного переворота в Зимбабве в 2017 году. Начав с должности секретаря Мугабе, она поднялась по карьерной лестнице в правящей партии ЗАНУ-ПФ и стала главой ее Женской лиги и ключевой фигурой во фракции «Поколение 40». В то же время она приобрела репутацию привилегированной и расточительной женщины в период экономических потрясений в стране."
  ZIM_2017_revolution.t: "Государственный переворот в Зимбабве?"
  ZIM_2017_revolution.d: "В ноябре 2017 года президент Зимбабве Роберт Мугабе был отстранен от должности президента и лидера партии ЗАНУ-ПФ и заменен Эммерсоном Мнангагвой. Восстание произошло на фоне напряженности в правящей партии ZANU-PF между бывшим первым вице-президентом Эммерсоном Мнангагвой (которого поддерживала ZDF) и первой леди Грейс Мугабе (которую поддерживала более молодая фракция G40) по поводу того, кто станет преемником 93-летнего президента Мугабе."
  SAF_1970_revolution.t: "Бантустаны в Южной Африке?"
  SAF_1970_revolution.d: "Правительство Претории учредило десять бантустанов в Южной Африке и десять в соседней Юго-Западной Африке (тогда находившейся под администрацией Южной Африки) с целью концентрации членов определенных этнических групп, тем самым сделав каждую из этих территорий этнически однородной в качестве основы для создания автономных национальных государств для различных чернокожих этнических групп Южной Африки. В соответствии с Законом о гражданстве родных земель банту 1970 года правительство лишило чернокожих южноафриканцев южноафриканского гражданства, лишив их немногих оставшихся политических и гражданских прав в Южной Африке, и объявило их гражданами этих родных земель."
  SAF_1970_revolution.f: "Из-за ограничений игрового движка бантустаны не могут быть представлены в этом моде как отдельные страны."
  SAF_1989_revolution.t: "Падение П. В. Боты?"
  SAF_1989_revolution.d: "18 января 1989 года Бота (тогда ему было 73 года) перенес легкий инсульт, из-за которого он не смог присутствовать на встрече с политическими лидерами Намибии 20 января 1989 года. Место Боты занял исполняющий обязанности президента Х. Кристиан Хойнис. 2 февраля 1989 года Бота ушел с поста лидера Национальной партии (НП), ожидая, что его преемником станет его кандидат - министр финансов Баренд дю Плесси. Вместо этого парламентская фракция НП выбрала лидером министра образования Ф. В. де Клерка, который быстро предпринял шаги, чтобы укрепить свои позиции внутри партии как реформист, в то время как сторонники жесткой линии поддержали Боту."
  SAF_1954_revolution.t: "Премьерство Дж. Г. Стрейдома?"
  SAF_1954_revolution.d: "Йоханнес Герхардус Стрейдом был южноафриканским политиком и пятым премьер-министром Южной Африки с 30 ноября 1954 года до своей смерти 24 августа 1958 года. Он был бескомпромиссным африканерским националистом и членом крупнейшей фракции басскапов (сторонников превосходства белой расы) Национальной партии (НП), которая еще больше подчеркивала политику апартеида НП и разрыв с Южно-Африканским Союзом в пользу республики во время своего правления."
  SAF_1958_revolution.t: "Премьерство Хендрика Фервурда?"
  SAF_1958_revolution.d: "Хендрик Френш Фервурд был южноафриканским политиком голландского происхождения, ученым в области прикладной психологии, философии и социологии, а также редактором газеты, который был премьер-министром Южной Африки с 1958 года. Его обычно считают архитектором апартеида и прозвали «отцом апартеида». Фервурд сыграл значительную роль в социальной инженерии апартеида, системы институционализированной расовой сегрегации и превосходства белой расы в стране, а также в реализации ее политики, будучи министром по делам коренных народов (1950–1958), а затем премьер-министром (1958–1966)."
  SAF_1966_revolution.t: "Убийство Хендрика Фервурда?"
  SAF_1966_revolution.d: "6 сентября 1966 года Фервурд получил несколько ножевых ранений от помощника парламента Дмитрия Цафендаса. Вскоре после этого он умер, и Цафендас находился в тюрьме до своей смерти в 1999 году. После убийства Фервурда в 1966 году Форстер был избран Национальной партией его преемником и продолжил реализацию Фервурдом законодательства об апартеиде, включая отмену в 1968 году последних четырех мест в парламенте, которые были зарезервированы для белых представителей цветных (смешанной расы) избирателей (реализовано в 1970 году)."
  SAF_1978_revolution.t: "Премьерство Питера Виллема Боты?"
  SAF_1978_revolution.d: "Питер Виллем Бота, DMS, был южноафриканским политиком, который занимал пост последнего премьер-министра Южной Африки с 1978 по 1984 год и первого исполнительного президента государства Южной Африки с 1984 года до своей отставки в 1989 году. По прозвищу «Die Groot Krokodil» (с африкаанс «Большой крокодил») из-за его жесткой политической позиции он считался последним бескомпромиссным лидером Южной Африки во время эпоха апартеида."
  TUR_1950_revolution.t: "Выборы Селяля Баяра?"
  TUR_1950_revolution.d: "На первых свободных выборах в истории Турции демократы одержали победу на всеобщих выборах 1950 года, получив 53% голосов избирателей. Хотя Баяр не стремился стать президентом, парламент избрал его президентом Турции 22 мая 1950 года. Во время президентства Баяра отношения с западным блоком улучшились, а после кризиса в Турецких проливах Турция вступила в Корейскую войну в 1951 году, а затем в НАТО в феврале 1952 года. За десять лет правления демократов турецкое общество претерпело глубокие преобразования. Проводилась инфляционная экономическая политика, поощряющая частное предпринимательство, хотя роль государства не уменьшилась. Политическое участие возросло, что привело к тому, что большое количество анатолийцев занялось политикой и бизнесом. Хотя секуляризм не был отменен, была отменена явно секуляристская политика однопартийного режима."
  TUR_1966_revolution.t: "Возвышение Джевдета Суная?"
  TUR_1966_revolution.d: "Когда президентство Гюрселя было прекращено из-за плохого состояния здоровья в соответствии с конституцией, Джевдет Сунай был избран пятым президентом Великим национальным собранием Турции 28 марта 1966 года. Он сохранил свой пост, несмотря на рост террористической активности, студенческие беспорядки и угрозы переворотов. Он отслужил конституционный семилетний срок до 28 марта 1973 года и стал затем постоянным сенатором."
  TUR_1971_revolution.t: "Турецкий военный меморандум?"
  TUR_1971_revolution.d: "Турецкий военный меморандум 1971 года, изданный 12 марта того же года, стал второй военной интервенцией в Турецкой Республике, произошедшей через 11 лет после ее предшественника 1960 года. Это известно как «меморандум о перевороте», который военные осуществили вместо отправки танков, как это делалось ранее. Это событие произошло на фоне обострения внутренних разногласий, но в конечном итоге мало что помогло остановить это явление."
  TUR_1980_revolution.t: "Государственный переворот в Турции?"
  TUR_1980_revolution.d: "Турецкий государственный переворот 1980 года, возглавляемый начальником Генерального штаба генералом Кенаном Эвреном, стал третьим государственным переворотом в истории Турецкой Республики, предыдущими были переворот 1960 года и переворот 1971 года по меморандуму. В течение следующих трех лет турецкие вооруженные силы управляли страной через Совет национальной безопасности, прежде чем демократия была восстановлена ​​на всеобщих выборах в Турции в 1983 году. В этот период усилился турецкий национализм государства, включая запрет курдского языка. Турция частично вернулась к демократии в 1983 году и полностью в 1989 году."
  TUR_2014_revolution.t: "Приход Реджепа Тайипа Эрдогана?"
  TUR_2014_revolution.d: "В 2014 году Эрдоган стал первым президентом страны, избранным прямым голосованием. Президентство Эрдогана ознаменовалось откатом к демократии и сдвигом в сторону более авторитарного стиля правления. Его экономическая политика привела к высоким темпам инфляции и обесцениванию турецкой лиры. Он вмешивался в продолжающиеся конфликты в Сирии и Ливии, начал операции против Исламского государства, Сирийских демократических сил и сил Асада, а также угрожал Греции."
  TUR_2017_revolution.t: "Конституционный референдум в Турции?"
  TUR_2017_revolution.d: "16 апреля 2017 года в Турции прошел конституционный референдум по вопросу о том, утвердить ли 18 предложенных поправок к конституции Турции, предложенных правящей Партией справедливости и развития (ПСР) и Партией националистического движения (ПНД). В результате его одобрения должность премьер-министра была упразднена, а существующая парламентская система правления была заменена исполнительным президентством и президентской системой. Число мест в парламенте было увеличено с 550 до 600, при этом, среди ряда других предложений, президенту был предоставлен больший контроль над назначениями в Высший совет судей и прокуроров (ВСИК)."
  PER_1949_revolution.t: "Выборы в Учредительное собрание?"
  PER_1949_revolution.d: "Шах рассматривал возможность внесения изменений в Конституцию как часть своих различных планов по усилению власти монархии. Шах призвал учредительное собрание внести поправки в Конституцию, чтобы дать ему больше власти. Членов учредительного собрания он выбрал из числа своих сторонников. Он также усилил давление на формирование Сената Ирана, верхней палаты парламента, которая была записана в конституцию в 1906 году, но так и не была сформирована. Ожидалось, что Сенат поддержит шаха. Учредительное собрание собиралось три недели, начиная с 21 апреля 1949 года. 8 мая 1949 года они подписали основные изменения в Конституции."
  PER_1952_revolution.t: "Возвышение Мохаммада Мосаддыка?"
  PER_1952_revolution.d: "В июле 1952 года Мохаммад Мосаддык вернул себе пост премьер-министра Ирана на фоне массовых протестов, вынудив шаха предоставить ему чрезвычайные полномочия. Эти широкие полномочия позволили Мосаддыку обойти парламент, консолидировать контроль и активизировать усилия по национализации нефти, что стало ярким утверждением гражданского правления вопреки королевскому влиянию."
  PER_1989_revolution.t: "Восстание Али Хаменеи?"
  PER_1989_revolution.d: "Хаменеи занимал пост третьего президента Ирана с 1981 по 1989 год, став при этом близким союзником первого верховного лидера Рухоллы Хомейни. Незадолго до своей смерти у Хомейни возникли разногласия с выбранным им наследником – Хусейном Али Монтазери – поэтому после смерти Хомейни не было согласованного преемника. Ассамблея экспертов избрала Хаменеи следующим верховным лидером 4 июня 1989 года в возрасте 50 лет. По словам Акбара Хашеми Рафсанджани, Хаменеи был человеком, которого Хомейни выбрал своим преемником перед смертью."
  PER_1998_revolution.t: "Создать силы Кудс?"
  PER_1998_revolution.d: "Силы «Кудс» — одно из пяти подразделений иранского Корпуса стражей исламской революции (КСИР), специализирующихся на нетрадиционных боевых действиях и операциях военной разведки. Отвечая за экстерриториальные операции, Силы Кудс поддерживают негосударственные субъекты во многих странах, включая Хезболлу, ХАМАС, Палестинский исламский джихад, движение хуситов и шиитские ополчения в Ираке, Сирии и Афганистане."
  PER_2008_revolution.t: "Возвышение Моджтабы Хаменеи?"
  PER_2008_revolution.d: "Моджтаба Хоссейни Хаменеи — иранский шиитский священнослужитель, который был назван третьим верховным лидером Ирана в марте 2026 года. Член семьи Хаменеи, он второй ребенок и сын предыдущего верховного лидера Али Хаменеи. Он присоединился к Корпусу стражей исламской революции (КСИР) в 1987 году и участвовал в ирано-иракской войне. В 1999 году он продолжил обучение в Куме, чтобы стать священнослужителем, а затем поступил в Кумскую семинарию в качестве преподавателя богословия. В 2009 году он взял под свой контроль военизированное добровольческое ополчение «Басидж»."
  PER_2026_revolution.t: "Убийство Али Хаменеи"
  PER_2026_revolution.d: "В 2025 и 2026 годах растущая напряженность в отношениях с Израилем и Соединенными Штатами переросла сначала в Двенадцатидневную войну, а затем переросла в полномасштабный конфликт. В ходе последнего был убит Верховный лидер Али Хаменеи. 8 марта Ассамблея экспертов быстро предприняла шаги, чтобы сохранить преемственность, избрав его сына Моджтабу своим преемником."
  ARG_2023_revolution.t: "Президентство Хавьера Милея?"
  ARG_2023_revolution.d: "Хавьер Херардо Милей — аргентинский политик и экономист, ставший президентом Аргентины в 2023 году. Милей известен своей яркой личностью, отличительным личным стилем и сильным присутствием в средствах массовой информации. В политическом отношении его описывают как правого популиста и правого либертарианца, который поддерживает экономику невмешательства, в частности, придерживаясь минархистских и анархо-капиталистических принципов."
  GUY_1964_revolution.t: "Восстание Форбса Бёрнема?"
  GUY_1964_revolution.d: "Получив образование юриста, Бёрнем сыграл важную роль в основании двух политических партий (Народный национальный конгресс и Народная прогрессивная партия), которые стали доминировать в политике Гайаны. За время его пребывания на посту главы правительства Гайана превратилась из британской колонии в республику, не имеющую конституционных связей с Соединенным Королевством. Его премьерство характеризовалось национализацией частных предприятий, принадлежащих иностранцам, членством в Движении неприсоединения и авторитарной внутренней политикой. Несмотря на то, что его многие считают играющим значительную роль в политическом, социальном и экономическом развитии Гайаны, его президентство было омрачено обвинениями в афроцентризме, санкционированном государством насилии, коррупции и фальсификациях на выборах."
  GUY_1980_revolution.t: "Кооперативная Республика Гайана?"
  GUY_1980_revolution.d: "В 1980 году в конституцию были внесены изменения, согласно которым пост президента стал исполнительной должностью; до этого времени этот пост занимал Артур Чанг в церемониальной роли главы государства. Бёрнем победил на президентских выборах в том же году, набрав 76% голосов против 20% за Джагана в официальных результатах. Международные наблюдатели выразили протест по поводу того, что индийско-гайанским избирателям не разрешили голосовать на нескольких избирательных участках, и что были широко распространены обвинения в фальсификации результатов выборов. Исполнительному президенту было предоставлено право распускать парламент по своему желанию, накладывать вето на законы, а также назначать или увольнять почти всех высокопоставленных членов правительства."
  GUY_1985_revolution.t: "Смерть Форбса Бёрнема"
  GUY_1985_revolution.d: "Бернхэм умер от сердечной недостаточности во время операции на горле в Джорджтауне 6 августа 1985 года в возрасте 62 лет. Некоторые источники предполагают, что у Форбса были проблемы с сердцем в годы, предшествовавшие его смерти, и, возможно, у него был диабет. После смерти Бёрнема президентом стал Десмонд Хойт. Всеобщие выборы в Гайане 1985 года также считались сфальсифицированными; Следующие «свободные и честные» выборы состоятся в 1992 году, это будут первые честные выборы с 1964 года, на которых президентом будет избран Чедди Джаган."
  GUY_1992_revolution.t: "Победа Чедди Джагана?"
  GUY_1992_revolution.d: "После смерти Бёрнема в 1985 году к власти пришёл Десмонд Хойт. Под влиянием Джимми Картера Хойт выдвинул избирательную реформу, которая привела бы к тому, что выборы 1992 года были признаны во всем мире свободными и справедливыми. После 28 лет пребывания в оппозиции ПНП выиграла выборы 5 октября 1992 года, набрав около 54% ​​голосов, и Джаган стал президентом. Вопреки прежним опасениям иностранцев, он правил как демократический социалист, а не марксист-ленинец. Джаган будет проводить политику по привлечению иностранных инвесторов и двигаться к политике свободного рынка."
  SUR_1975_revolution.t: "Премьерство Хенка Аррона?"
  SUR_1975_revolution.d: "Хенк Альфонс Эжен Аррон был суринамским политиком, который занимал пост первого премьер-министра Суринама после обретения им независимости в 1975 году. Член Национальной партии Суринама, он работал с 24 декабря 1973 года в переходном правительстве по 25 февраля 1980 года. Он был свергнут в результате государственного переворота, совершенного военными под руководством Дези Бутерса."
  SUR_1980_revolution.t: "Сержантский переворот?"
  SUR_1980_revolution.d: "Государственный переворот 1980 года в Суринаме, обычно называемый сержантским переворотом (голландский: De Sergeantencoup), — военный переворот в Суринаме, произошедший 25 февраля 1980 года, когда группа из 16 сержантов Суринамских вооруженных сил (СКМ) во главе с Дези Бутерсом свергла правительство премьер-министра Хенка Аррона в результате насильственного переворота. d'état. Это положило начало военной диктатуре, которая господствовала в стране с 1980 по 1991 год."
  SUR_1987_revolution.t: "Суринамская оттепель?"
  SUR_1987_revolution.d: "Позже в 1985 году правительство сняло запрет на деятельность оппозиционных партий, положив начало переходу к гражданскому правлению. Новая конституция была одобрена подавляющим большинством голосов на референдуме 30 сентября 1987 года. Два месяца спустя прошли выборы, и в январе 1988 года президентом был избран Рамсевак Шанкар, оппонент Бутерса. Однако Баутерс сохранил большую власть в качестве командующего армией. Он сорвал ряд попыток правительства вести переговоры с «Коммандос джунглей», а ряд противников Баутерса были убиты или исчезли."
  SUR_1991_revolution.t: "Переход Суринама к демократии?"
  SUR_1991_revolution.d: "Национальные выборы были проведены в 1987 году. Национальное собрание приняло новую конституцию, которая позволила Бутерсу остаться во главе армии. Недовольный правительством, Баутерс в 1990 году уволил министров по телефону. Это событие стало широко известно как «Телефонный переворот». Его власть начала ослабевать после выборов 1991 года."
  BRZ_1954_revolution.t: "Самоубийство Жетулиу Варгаса?"
  BRZ_1954_revolution.d: "Политические противники Варгаса инициировали кризис, кульминацией которого стало убийство офицера ВВС майора Рубенса Ваза, убитого во время покушения на улице возле Руа Тонелеро, 180, дома главного противника Варгаса, руководителя издательского дома и политика Карлоса Ласерды. В преступлении был замешан лейтенант Грегорио Фортунато, начальник личной охраны Варгаса по прозвищу «Черный ангел». Это вызвало гнев военных против Варгаса, и генералы потребовали его отставки. Не сумев справиться с ситуацией, Варгас выстрелил себе в грудь из револьвера 24 августа 1954 года в своей спальне на третьем этаже своей официальной резиденции Катете Палас."
  BRZ_2016_revolution.t: "Импичмент Дилме Руссефф?"
  BRZ_2016_revolution.d: "31 августа 2016 года Сенат отстранил президента Руссефф от должности 61 голосами против 20, признав ее виновной в нарушении бюджетного законодательства Бразилии, однако она не получила достаточно голосов в Сенате, чтобы ее лишили политических прав. Соответственно, Темер был приведен к присяге как 37-й президент Бразилии."
  BRZ_2023_revolution.t: "Атака на Конгресс Бразилии"
  BRZ_2023_revolution.d: "8 января 2023 года, после поражения тогдашнего президента Жаира Болсонару на всеобщих выборах в Бразилии в 2022 году и инаугурации его преемника Луиса Инасио Лулы да Силвы, толпа сторонников Болсонару напала на здания федерального правительства Бразилии в столице Бразилиа. Толпа вторглась и умышленно нанесла ущерб Верховному федеральному суду, зданию Национального конгресса и президентскому дворцу Планалто на площади Трес Подерес, стремясь насильственным свержением демократически избранного президента Лулы, инаугурация которого состоялась 1 января."
  VNZ_1948_revolution.t: "Государственный переворот в Венесуэле?"
  VNZ_1948_revolution.d: "Государственный переворот в Венесуэле 1948 года произошел 24 ноября 1948 года, когда Карлос Дельгадо Шальбо, Маркос Перес Хименес и Луис Фелипе Льовера Паес свергли избранного президента Ромуло Гальегоса, который был избран на всеобщих выборах в Венесуэле 1947 года (которые обычно считаются первыми честными выборами в стране) и вступил в должность в феврале 1948 года."
  VNZ_1950_revolution.t: "Убийство Карлоса Дельгадо Шальбо?"
  VNZ_1950_revolution.d: "Шальбо был похищен и убит 13 ноября 1950 года группой под руководством Рафаэля Симона Урбины и его племянника Доминго Урбины. Похищение произошло в Каракасе между районами Кантри Клаб и Чапеллин, а его убийство произошло в полузаброшенном районе Лас Мерседес. Его убийство, судя по всему, стало непреднамеренным результатом неудавшегося похищения, организованного Симоном Урбиной, который стремился свергнуть президента Шалбо."
  VNZ_1958_revolution.t: "Венесуэльское возвращение к демократии?"
  VNZ_1958_revolution.d: "23 января 1958 года в Венесуэле произошел государственный переворот, в результате которого был свергнут диктатор Маркос Перес Хименес. Переходное правительство под руководством сначала адмирала Вольфганга Ларрасабаля, а затем Эдгара Санабриа действовало до тех пор, пока на выборах в декабре 1958 года не был избран кандидат от Демократической партии Ромуло Бетанкур, который вступил в должность 13 февраля 1959 года."
  VNZ_2013_revolution.t: "Президентство Николаса Мадуро?"
  VNZ_2013_revolution.d: "Начав свою трудовую деятельность водителем автобуса, Мадуро поднялся до профсоюзного лидера, а затем был избран в Национальное собрание в 2000 году. Он был назначен на ряд должностей при президенте Уго Чавесе, занимал пост президента Национальной ассамблеи с 2005 по 2006 год, министра иностранных дел с 2006 по 2012 год и вице-президента с 2012 по 2013 год при Чавесе. После того, как 5 марта 2013 года было объявлено о смерти Чавеса, Мадуро занял пост президента."
  GUA_1954_revolution.t: "Переворот Карлоса Кастильо Армаса?"
  GUA_1954_revolution.d: "Государственный переворот 1954 года сверг демократически избранного президента Гватемалы Хакобо Арбенса и ознаменовал конец гватемальской революции. В результате переворота была установлена ​​военная диктатура Карлоса Кастильо Армаса, первого из серии поддерживаемых США авторитарных правителей в Гватемале. Переворот во многом стал результатом тайной операции ЦРУ под кодовым названием PBSuccess."
  GUA_1957_revolution.t: "Убийство Карлоса Кастильо Армаса?"
  GUA_1957_revolution.d: "Кастильо Армас правил до 26 июля 1957 года, когда он был убит Ромео Васкесом, членом его личной охраны. После последовавших за этим фальсифицированных выборов к власти пришел генерал Мигель Идигорас Фуэнтес. Он прославился тем, что вызвал президента Мексики на джентльменскую дуэль на мосту на южной границе, чтобы положить конец вражде по поводу незаконного рыболовства мексиканскими лодками на тихоокеанском побережье Гватемалы, два из которых были потоплены гватемальскими ВВС."
  GUA_1982_revolution.t: "Переворот Эфраина Риоса Монтта?"
  GUA_1982_revolution.d: "В 1982 году недовольство правлением генерала Ромео Лукаса Гарсиа, ухудшение ситуации с безопасностью в Гватемале и обвинения в фальсификациях на выборах привели к государственному перевороту, совершенному группой младших офицеров, которые назначили Риоса Монтта главой правительственной хунты. Риос Монтт правил как военный диктатор менее семнадцати месяцев, прежде чем его министр обороны генерал Оскар Мехия Викторес сверг его в результате очередного переворота."
  GUA_1986_revolution.t: "Возвращение демократии?"
  GUA_1986_revolution.d: "В первом туре президентских выборов 1985 года 3 ноября Сересо занял первое место с 38,6% голосов избирателей. Во втором туре 8 декабря он победил Хорхе Карпио, набрав 68,4% голосов. DCG получила 51 из 100 мест в Конгрессе и большинство во многих муниципалитетах по всей стране. Он был первым демократически избранным президентом и гражданским лицом, вступившим в должность с 1966 года."
  HON_1957_revolution.t: "Выборы Рамона Вильеды Моралеса?"
  HON_1957_revolution.d: "Рамон Вильеда Моралес был либералом, который поддерживал демократизацию Гондураса после длительного периода военного правления. Он был кандидатом от Либеральной партии на президентских выборах 1954 года, первых свободных выборах за более чем два десятилетия, выиграв большинство у разделенной Национальной партии, но не набрав большинства."
  HON_1963_revolution.t: "Переворот Освальдо Лопеса?"
  HON_1963_revolution.d: "Государственный переворот в Гондурасе 1963 года — военный захват правительства Гондураса 3 октября 1963 года, за десять дней до назначенных выборов. Освальдо Лопес Арельяно сменил Рамона Вильеду Моралеса на посту президента и положил начало двум десятилетиям военного правления."
  HON_1975_revolution.t: "Свержение Освальдо Лопеса?"
  HON_1975_revolution.d: "Государственный переворот в Гондурасе 1975 года произошёл 22 апреля 1975 года, в результате которого Освальдо Лопес Арельяно был свергнут в ходе военного переворота, возглавлённого его соратником, генералом Хуаном Альберто Мельгаром Кастро. Причиной переворота отчасти стал скандал «Бананагейт», разоблачённый Комиссией по ценным бумагам и биржам США в 1975 году, в рамках которого компания United Brands согласилась подкупить президента Лопеса на сумму 1,25 миллиона долларов США, а также пообещала ещё 1,25 миллиона долларов после снижения некоторых пошлин на экспорт бананов."
  HON_1982_revolution.t: "Возвращение демократии?"
  HON_1982_revolution.d: "В 1979 году страна вернулась к гражданскому правлению. В апреле 1980 года всенародно было избрано учредительное собрание для написания новой конституции, а в ноябре 1981 года были проведены всеобщие выборы. Конституция была одобрена в 1982 году, и правительство ЛЖП Роберто Суасо победило на выборах, пообещав реализовать амбициозную программу экономического и социального развития для преодоления рецессии, в которой оказался Гондурас."
  PNM_1981_revolution.t: "Смерть Омара Торрихоса?"
  PNM_1981_revolution.d: "Торрихос погиб в возрасте 52 лет, когда его самолет, De Havilland Canada DHC-6 Twin Otter ВВС Панамы, разбился в Серро-Марта, в Коклесито, недалеко от Пенономе, Панама, 31 июля 1981 года. Самолет исчез с радаров во время светлой погоды, но из-за ограниченного характера радара Панамы в то время о пропаже самолета не сообщалось почти сутки. Место крушения было обнаружено через несколько дней, а тело Торрихоса было обнаружено командой спецназа в первые дни августа."
  PNM_1983_revolution.t: "Восстание Мануэля Норьеги?"
  PNM_1983_revolution.d: "Мануэль Антонио Норьега Морено был панамским диктатором и военным офицером, который был де-факто правителем Панамы с 1983 по 1989 год. Он никогда официально не занимал пост президента Панамы, вместо этого правил как неизбираемый военный диктатор через марионеточных президентов. Накопив личное состояние за счет операций по торговле наркотиками, проводимых панамскими военными, Норьега имел давние связи с американскими спецслужбами до того, как вторжение США в Панаму отстранило его от власти."
  PNM_1989_revolution.t: "Возвращение демократии в Панаме?"
  PNM_1989_revolution.d: "Соединенные Штаты вторглись в Панаму 20 декабря 1989 года под кодовым названием «Операция «Правое дело». Норьега был схвачен и доставлен в Майами для суда. Конфликт закончился 31 января 1990 года. Избирательный трибунал Панамы быстро принял меры по восстановлению гражданского конституционного правительства, восстановил результаты майских выборов 1989 года 27 декабря 1989 года и подтвердил победу президента Гильермо Эндары и вице-президентов Гильермо Форда и Рикардо Ариаса Кальдерона."
  PEU_2022_revolution.t: "Попытка перуанского переворота?"
  PEU_2022_revolution.d: "7 декабря 2022 года Педро Кастильо, тогдашний президент Перу, предпринял попытку незаконно распустить Конгресс на фоне надвигающейся процедуры отстранения. Этот шаг включал немедленное введение комендантского часа, попытку создать чрезвычайное правительство и призыв к формированию учредительного собрания."
  SPA_1947_revolution.t: "Провозглашение монархии?"
  SPA_1947_revolution.d: "Закон о наследовании главы государства был пятым из восьми основных законов королевства, организующих полномочия франкистского режима в Испании. Он установил положения о восстановлении испанской монархии (после ее отмены Второй Испанской республикой в ​​1931 году) и назначил Франсиско Франко пожизненным главой государства Испания. Он предусматривал, что его преемник будет предложен самим Франко с титулом короля или регента Королевства, но это должно быть одобрено Испанскими кортесами."
  SPA_1973_revolution.t: "Восстание Луиса Карреро Бланко?"
  SPA_1973_revolution.d: "Генерал-адмирал Луис Карреро Бланко — офицер и политик испанского флота. Он также был основным автором Закона о наследовании главы государства 1947 года. Франко лично выбрал его своим преемником на посту главы правительства, и Карреро вступил в должность в июне 1973 года."
  SPA_1975_revolution.t: "Смерть Франсиско Франко"
  SPA_1975_revolution.d: "В 1973 году Франко ушел с поста премьер-министра — отделенного от поста главы государства с 1967 года — из-за преклонного возраста и болезни. Тем не менее он остался у власти как глава государства и как главнокомандующий. Франко умер в 1975 году в возрасте 82 лет и был похоронен в Валле-де-лос-Каидос. В последние годы своей жизни он восстановил монархию, ему наследовал Хуан Карлос, король Испании, который возглавил переход Испании к демократии."
  POR_1968_revolution.t: "Восстание Марсело Каэтано?"
  POR_1968_revolution.d: "В августе 1968 года Салазар перенес инсульт после падения в своем доме и впал в кому. После 36 лет пребывания у власти 79-летний мужчина был уволен президентом Америко Томасом. Томас назначил Каэтано вместо Салазара 27 сентября 1968 года. Каэтано стремился способствовать экономическому росту и некоторым социальным улучшениям, таким как назначение ежемесячной пенсии сельским рабочим, у которых никогда не было возможности платить социальное обеспечение."
  GRE_1973_revolution.t: "Отмена греческой монархии?"
  GRE_1973_revolution.d: "В июле 1973 года греческая военная хунта провела референдум, на котором монархия была отменена во второй раз в истории Греции. Затем в 1974 году демократически избранный премьер-министр Константинос Караманлис созвал референдум, который законно подтвердил отмену."
  GRE_1974_revolution_1.t: "Референдум в Греческой Республике"
  GRE_1974_revolution_1.d: "После краха военной хунты, правившей страной с 1967 года, давний спор между республиканцами и монархистами возобновился. В прошлом году хунта уже провела сомнительный референдум по тому же вопросу, в результате чего проголосовало в пользу республики, которую Георгиос Пападопулос использовал как предлог для того, чтобы провозгласить себя президентом. Однако после краха военного режима и свободных выборов в прошлом месяце новоизбранное правительство премьер-министра Константина Караманлиса решило провести повторное голосование, причем референдум эпохи хунты многие считали сомнительным как с электоральной, так и с юридической точки зрения. 69,2% избирателей одобрили республику при явке 75,6%."
  CYP_1974_revolution.t: "Государственный переворот на Кипре?"
  CYP_1974_revolution.d: "Государственный переворот на Кипре 1974 года — военный переворот, осуществленный Национальной гвардией Кипра и спонсируемый греческой военной хунтой. 15 июля 1974 года заговорщики отстранили действующего президента Кипра архиепископа Макариоса III от должности и назначили на должность националиста, сторонника Энозиса, Никоса Сэмпсона."
  CYP_1974_revolution_1.t: "Возвращение кипрской демократии?"
  CYP_1974_revolution_1.d: "Президентство Сэмпсона было недолгим, поскольку режим Иоаннидиса в Афинах рухнул всего через несколько дней после турецкого вторжения. Тогда было отмечено, что Турция угрожала вторгнуться в Грецию и что полковникам внезапно пришлось сосредоточиться на попытках защитить страну, а не оставаться у власти. Неспособность режима предсказать или предотвратить турецкую интервенцию серьезно ослабила его легитимность и авторитет. Не получив поддержки, Сэмпсон подал в отставку 23 июля, и пост президента перешел к Глафкосу Клиридису. Макариос оставался в Лондоне пять месяцев; затем, сумев добиться международного признания того, что его администрация является законным правительством всего острова, он вернулся на Кипр, сосредоточившись на восстановлении кипрской территории."
  BEL_1951_revolution.t: "Отречение короля Леопольда III?"
  BEL_1951_revolution.d: "Возвращение короля Леопольда III в Бельгию 22 июля 1950 года было встречено одной из самых жестоких всеобщих забастовок в истории Бельгии. Трое протестующих были убиты, когда жандармерия открыла огонь из автоматического оружия. Страна стояла на грани гражданской войны, и бельгийские знамена были заменены валлонскими флагами в Льеже и других муниципалитетах Валлонии. Чтобы избежать раскола страны и сохранить монархию, Леопольд решил 1 августа 1950 года передать свои полномочия и обязанности своему 20-летнему сыну Бодуэну, сделав последнего регентом. По настоянию правительства Леопольд 16 июля 1951 года отрекся от престола в пользу Бодуэна."
  BEL_1993_revolution.t: "Бельгийская федерация?"
  BEL_1993_revolution.d: "В 1970 году в ответ на растущий гражданский конфликт между голландскоязычной и франкоязычной общинами Брюсселя правительство заявило, что «унитарное государство, его структура и функционирование, установленные законом, устарели». Новая конституция признала существование сильных общинных и региональных различий внутри Бельгии, но стремилась примирить эти различия посредством распространения власти между сообществами и регионами. В 1993 году парламент одобрил конституционный пакет, превращающий Бельгию в полноценное федеративное государство."
  NET_1970_revolution.t: "Депилляризация?"
  NET_1970_revolution.d: "После Второй мировой войны (во время которой даже голландское сопротивление было основано на столбах) либералы и социалисты, а также протестанты и католики начали сомневаться в столбовой системе. В 1960-е годы эти опоры в значительной степени рухнули, особенно из-за политической критики со стороны D66 и группы Nieuw Links («Новые левые») в PvdA. Из-за этого, а также из-за повышенной мобильности, многие люди могли видеть, что люди из других столпов не сильно отличаются от них самих. Рост благосостояния и образования сделали людей независимыми от многих опорных институтов, и молодые люди больше не хотели быть связанными с этими организациями."
  LUX_1948_revolution.t: "Конец нейтралитета Люксембурга?"
  LUX_1948_revolution.d: "Люксембург официально отказался от своего нейтралитета в 1948 году, и в его конституцию были внесены поправки, отражающие это изменение. За этим последовало присоединение к Брюссельскому договору в 1948 году, а затем к НАТО в 1949 году, что ознаменовало окончательный конец ее нейтрального статуса."
  SWI_1971_revolution.t: "Референдум об избирательном праве женщин в Швейцарии?"
  SWI_1971_revolution.d: "Референдум о введении избирательного права для женщин прошел в Швейцарии 7 февраля 1971 года. Только мужчинам было разрешено голосовать, и в результате за введение проголосовали 65,7%. Результат был ожидаемым, поскольку в предыдущие годы несколько кантонов ввели избирательное право женщин, а правительство Швейцарии и несколько политических партий активно поддерживали избирательное право женщин."
  FRA_1958_revolution_0.t: "Майский кризис?"
  FRA_1958_revolution_0.d: "Кризис мая 1958 года во Франции стал поворотным политическим переворотом, вызванным напряженностью вокруг войны за независимость Алжира. 13 мая правые офицеры и поселенцы в Алжире устроили переворот, чтобы выступить против назначения Пьера Пфлимлена премьер-министром, опасаясь, что он может вести переговоры с алжирскими националистами. Восстание, возглавляемое генералом Жаком Массю и поддержанное бывшим генерал-губернатором Жаком Сустелем, потребовало создания правительства общественной безопасности под руководством Шарля де Голля. Кризис обнажил нестабильность Четвертой республики, что в конечном итоге привело к ее краху и возвращению де Голля к власти, где он основал более централизованную и устойчивую Пятую республику."
  FRA_1961_revolution.t: "Алжирский путч?"
  FRA_1961_revolution.d: "Алжирский путч был неудавшимся государственным переворотом, призванным заставить президента Франции Шарля де Голля не покидать Французский Алжир, постоянное европейское сообщество и профранцузских алжирцев. Организованный во французском Алжире генералами французской армии в отставке Морисом Шалле (бывшим главнокомандующим во Французском Алжире), Эдмоном Жуо (бывшим генеральным инспектором ВВС Франции), Андре Зеллером (бывшим начальником штаба французской армии) и Раулем Саланом (бывшим главнокомандующим во Французском Алжире), он проходил во второй половине дня с 21 по 26 апреля 1961 года в разгар Алжирская война (1954–1962) поставила страну на грань гражданской войны."
  GBR_1979_revolution.t: "Вотум недоверия?"
  GBR_1979_revolution.d: "Вотум недоверия британскому лейбористскому правительству Джеймса Каллагана произошел 28 марта 1979 года. Голосование было проведено лидером официальной оппозиции Маргарет Тэтчер и было проиграно лейбористским правительством одним голосом (311 голосов против 310), о чем было объявлено в 22:19. В результате были проведены всеобщие выборы, на которых победила Консервативная партия Тэтчер."
  RUS_1993_revolution.t: "Российский конституционный кризис?"
  RUS_1993_revolution.d: "В сентябре и октябре 1993 года в Российской Федерации возник конституционный кризис в результате конфликта между президентом Борисом Ельциным и российским парламентом. Президент Ельцин совершил самопереворот, распустив парламент и установив президентское правление посредством декретной системы. Кризис закончился тем, что Ельцин применил военную силу, чтобы атаковать Дом Советов в Москве и арестовать законодателей. После этих событий Ельцин укрепил свои позиции, еще больше расширил полномочия исполнительной власти и добился принятия конституции Российской Федерации 1993 года."
  RUS_2023_revolution.t: "Восстание группы Вагнера?"
  RUS_2023_revolution.d: "23 июня 2023 года российская частная военная компания «Группа Вагнера» подняла крупное восстание против правительства России. Это стало кульминацией конфликта между группой Вагнера и министерством обороны, который начался примерно шестью месяцами ранее. Российский олигарх Евгений Пригожин, который руководил деятельностью группы Вагнера в Украине, ушел в отставку после достижения соглашения днем ​​позже."
  RUS_2020_revolution.t: "Поправка к Конституции России?"
  RUS_2020_revolution.d: "Поправки 2020 года, предложенные в январе 2020 года, являются вторыми существенными поправками к Конституции России 1993 года. Для внесения этих поправок президент России Владимир Путин провел всенародное голосование. Они были одобрены 1 июля всенародным голосованием."
  UKR_2004_revolution.t: "Оранжевая революция?"
  UKR_2004_revolution.d: "Оранжевая революция представляла собой серию протестов, которые привели к политическим потрясениям в Украине с конца ноября 2004 года по январь 2005 года. Она набрала силу, прежде всего, благодаря инициативе населения в целом, вызванной последствиями второго тура президентских выборов на Украине в 2004 году, который, как утверждалось, был омрачен массовой коррупцией, запугиванием избирателей и фальсификациями на выборах. Общенациональные протесты увенчались успехом, когда результаты первоначального тура были аннулированы, а Верховный суд Украины постановил провести повторное голосование 26 декабря 2004 года. Под пристальным вниманием отечественных и международных наблюдателей второй тур был объявлен «свободным и справедливым». Окончательные результаты показали явную победу Ющенко, который получил около 52% голосов по сравнению с 44% голосов Януковича."
  UKR_2010_revolution.t: "Выборы Виктора Януковича?"
  UKR_2010_revolution.d: "Президентские выборы прошли в Украине 17 января 2010 года. Поскольку ни один кандидат не получил большинства голосов, 7 февраля был проведен второй тур выборов между премьер-министром Юлией Тимошенко и лидером оппозиции Виктором Януковичем. 14 февраля Янукович был объявлен избранным президентом и победителем, набрав 50% голосов избирателей."
  UKR_2019_revolution.t: "Выборы Владимира Зеленского?"
  UKR_2019_revolution.d: "Зеленский объявил о своей кандидатуре на президентских выборах 2019 года вечером 31 декабря 2018 года, одновременно с новогодним обращением тогдашнего президента Петра Порошенко. Он победил на выборах, набрав 73,23 процента голосов во втором туре, победив Порошенко. Он позиционировал себя как фигура, выступающая против истеблишмента и коррупции."
  YUG_1980_revolution.t: "Смерть Иосипа Броз Тито"
  YUG_1980_revolution.d: "В течение 1979 года Тито становился все хуже. 7 января и 11 января 1980 года Тито был госпитализирован в университетский медицинский центр в Любляне, столице СР Словении, с проблемами кровообращения в ногах. Вскоре после этого ему ампутировали левую ногу из-за закупорки артерий, и он умер от гангрены в Медицинском центре Любляны 4 мая 1980 года в 15:5, за три дня до своего 88-летия."
  tito_death.option: "Покойся с миром"
  SER_2000_revolution.t: "Возвращение к демократии?"
  SER_2000_revolution.d: "Правление Милошевича описывается наблюдателями как авторитарное или автократическое, а также клептократическое, с многочисленными обвинениями в фальсификациях на выборах, политических убийствах, подавлении свободы СМИ и жестокости полиции. Свержение Слободана Милошевича началось в Союзной Республике Югославии после всеобщих выборов 24 сентября 2000 года и завершилось падением правительства Слободана Милошевича 5 октября 2000 года."
  ROM_1967_revolution.t: "Выпустить Указ 770?"
  ROM_1967_revolution.d: "Указ 770 был указом коммунистического румынского правительства Николае Чаушеску, подписанным в 1967 году. Он ограничивал аборты и противозачаточные средства и был направлен на создание нового и большого румынского населения."
  ROM_1974_revolution.t: "Ввести систематизацию?"
  ROM_1974_revolution.d: "Систематизация относится к программе городского планирования, осуществляемой при режиме Чаушеску. Начиная с 1974 года, систематизация заключалась в основном в сносе и реконструкции существующих деревень, поселков и городов, полностью или частично, с заявленной целью превратить Румынию в «многосторонне развитое социалистическое общество». В 1980-е годы Чаушеску стал одержим идеей построить себе дворец беспрецедентных размеров и сопровождающий его столь же грандиозный район Centrul Civic."
  POL_1956_revolution.t: "Польский октябрь?"
  POL_1956_revolution.d: "Польский Октябрь был изменением в политике Польской Народной Республики, которое произошло в октябре 1956 года. Владислав Гомулка был назначен первым секретарем правящей Польской объединенной рабочей партии (ПОРП), что ознаменовало конец сталинизма в Польше. Советы были вынуждены пойти на компромисс с фракцией Гомулки, что привело к коротким, но напряженным переговорам. Советы дали Гомулке разрешение остаться у власти и большую автономию Польши в обмен на сохранение ее лояльности Москве."
  POL_1970_revolution.t: "Декабрьские протесты?"
  POL_1970_revolution.d: "Польские протесты 1970 года, также известные как «Декабрьские события 1970 года», произошли на севере Польши 14–19 декабря 1970 года. Протесты были вызваны внезапным ростом цен на продукты питания и другие предметы повседневного обихода. Руководство партии встретилось в Варшаве и решило, что полномасштабное восстание рабочего класса неизбежно, если не будут приняты решительные меры. С согласия Леонида Брежнева в Москве Гомулка, Клишко и другие лидеры были вынуждены уйти в отставку: если повышение цен было заговором против Гомулки, то это удалось. Поскольку Москва не приняла Мечислава Мочара, новым лидером был выбран Эдвард Герек."
  POL_1981_revolution.t: "Военное положение?"
  POL_1981_revolution.d: "11 февраля 1981 года Ярузельский был назначен председателем Совета министров (премьер-министром). 18 октября Станислав Кания был отстранен от должности первого секретаря ЦК Польской объединенной рабочей партии после того, как подслушивающее устройство зафиксировало его критику советского руководства. Его преемником был избран Ярузельский. 13 декабря 1981 года Ярузельский объявил о введении военного положения в телеобращении после голосования Государственного совета накануне, официально санкционировавшего его введение."
  IRQ_1963_revolution.t: "Революция Рамадана?"
  IRQ_1963_revolution.d: "Революция Рамадана была военным переворотом, совершенным иракским отделением партии Баас, который сверг премьер-министра Ирака Абдул-Карима Касима в 1963 году. Он произошел с 8 по 10 февраля 1963 года. Бывший заместитель Касима Абдул Салам Ариф, который не был баасистом, получил преимущественно церемониальный титул президента, а видный баасистский генерал Ахмед Хасан аль-Бакр был назначен премьер-министром. Правительство просуществовало около девяти месяцев, пока Ариф не разоружил Национальную гвардию в результате государственного переворота в Ираке в ноябре 1963 года, за которым последовала чистка членов партии Баас."
  IRQ_1966_revolution.t: "Смерть Абдул Салама Арифа?"
  IRQ_1966_revolution.d: "13 апреля 1966 года Ариф погиб в результате крушения самолета de Havilland DH.104 Dove 1 иракских ВВС, RF392, на юге Ирака, примерно в 10 км от аэропорта Басры, и его сменил на посту президента его брат Абдул Рахман. Абд ар-Рахман аль-Баззаз стал исполняющим обязанности президента на три дня, и за пост президента произошла борьба за власть. На первом заседании Совета обороны и кабинета министров по избранию президента Аль-Баззазу требовалось большинство в две трети, чтобы стать президентом. Аль-Баззаз потерпел неудачу, и президентом был избран Абдул Рахман Ариф."
  IRQ_1968_revolution.t: "Революция 17 июля?"
  IRQ_1968_revolution.d: "Революция 17 июля — бескровный переворот в Ираке в 1968 году под руководством Ахмеда Хасана аль-Бакра, Абд ар-Раззака ан-Наифа и Абд ар-Рахмана ад-Дауда, который свергнул президента Абдула Рахмана Арифа и премьер-министра Тахира Яхью и привел к власти иракское региональное отделение Арабской социалистической партии Баас. Баасисты, участвовавшие в перевороте, а также в последующей чистке умеренной фракции во главе с Наифом, включали Хардана аль-Тикрити, Салиха Махди Аммаша и Саддама Хусейна, будущего президента Ирака."
  IRQ_2003_revolution.t: "Суд над Саддамом Хусейном?"
  IRQ_2003_revolution.d: "В 2003 году коалиция под руководством США вторглась в Ирак, ложно обвинив Саддама в разработке оружия массового поражения и в связях с «Аль-Каидой». После быстрой победы коалиции в войне партия Баас была запрещена, а Саддам скрылся. После его ареста 13 декабря 2003 года суд над ним состоялся при Временном правительстве Ирака. 5 ноября 2006 года Саддам был признан виновным Высшим трибуналом Ирака в преступлениях против человечности, связанных с резней в Дуджайле в 1982 году более 140 мусульман-шиитов, и приговорен к смертной казни через повешение. Он был казнен 30 декабря 2006 года."
  LBY_1963_revolution.t: "Упразднение Федеративного королевства?"
  LBY_1963_revolution.d: "По мере развития нефтяных ресурсов в начале 1960-х годов Ливия приступила к осуществлению своего первого пятилетнего плана на 1963–68 годы. Однако одним негативным результатом нового богатства от нефти стал спад сельскохозяйственного производства, в основном из-за пренебрежения. Внутренняя политика Ливии продолжала оставаться стабильной, но федеральная форма правления оказалась неэффективной и громоздкой. В апреле 1963 года премьер-министр Мохамед Осман Эссед добился принятия парламентом одобренного королем законопроекта, отменяющего федеральную форму правления и устанавливающего на ее месте унитарное монархическое государство с доминирующим центральным правительством."
  SOM_1993_revolution.t: "Гражданская война в Сомали?"
  SOM_1993_revolution.d: "В 1990–1992 годах обычное право временно рухнуло, и фракционная борьба усилилась. В отсутствие центрального правительства Сомали стала «несостоявшимся государством». Это ускорило прибытие военных наблюдателей ООН ЮНОСОМ I в июле 1992 года, за которым последовали более крупные миссии ЮНИТАФ и ЮНОСОМ II. После вооруженного конфликта между сомалийскими повстанцами и войсками ЮНОСОМ II в 1993 году ООН покинула Сомали в 1995 году."
  SOM_1995_revolution.t: "Падение Мохамеда Фарры Айдида?"
  SOM_1995_revolution.d: "Вместе с другими вооруженными оппозиционными группировками в начале 1991 года Мохамеду Фарре Айдиду удалось свергнуть 22-летний режим президента Барре, что привело к полному развязыванию гражданской войны. Айдид стремился стать президентом нового правительства Сомали и стремился к союзам и союзам с другими военно-политическими организациями, чтобы сформировать национальное правительство. После столкновения 5 июня 1993 года, в результате которого погибли десятки военнослужащих ЮНОСОМ II, вину возложили на СНА и, как следствие, на Айдида, в результате чего он стал одним из первых разыскиваемых Организацией Объединенных Наций людей. После рейда «Кровавого понедельника» под руководством США 12 июля 1993 года, в результате которого погибли многие выдающиеся члены его клана Хабр Гидр, Айдид впервые начал намеренно нападать на американские войска. Президент Билл Клинтон в ответ осуществил операцию «Готический змей» и развернул отряд «Дельта» и оперативную группу «Рейнджер» для его поимки. Во время боя в Могадишо между его ополчением и силами своего бывшего союзника Османа Али Атто Айдид был смертельно ранен снайпером и позже скончался 2 августа 1996 года."
  SOM_2006_revolution.t: "Возникновение Союза исламских судов?"
  SOM_2006_revolution.d: "Союз исламских судов был юридической и политической организацией, основанной шариатскими судами Могадишо в начале 2000-х годов для борьбы с беззаконием, возникшим в результате гражданской войны в Сомали. К середине-концу 2006 года исламские суды расширили свое влияние и стали де-факто правительством на большей части юга и центральной части Сомали, сумев создать первое подобие государства с 1991 года."
  CNG_1997_revolution.t: "Падение Заира?"
  CNG_1997_revolution.d: "Заир распался в конце 1990-х годов на фоне дестабилизации восточных частей страны после геноцида в Руанде и роста этнического насилия. В 1996 году Лоран-Дезире Кабила, глава ополчения АФДЛ, возглавил народное восстание против Мобуту. Поскольку повстанческие силы продвигались на запад, Мобуту бежал из страны, оставив во главе страны силы Кабилы. В следующем году название страны было восстановлено Демократической Республике Конго."
  CNG_2006_revolution.t: "Возвращение демократии?"
  CNG_2006_revolution.d: "Всеобщие выборы прошли в Демократической Республике Конго 30 июля 2006 года. Это были первые многопартийные выборы в стране за 41 год и первые после свержения давнего лидера Мобуту Сесе Секо девятью годами ранее. Избиратели пришли на избирательные участки, чтобы избрать как нового президента республики, так и новое Национальное собрание, нижнюю палату парламента."
  KNG_1960_revolution.t: "Президентство Фульбера Юлу?"
  KNG_1960_revolution.d: "Фульбер Юлу был конголезским националистическим лидером и бывшим католическим священником, который стал первым президентом Республики Конго после обретения ею независимости в 1960 году. В августе 1960 года Юлу привел свою страну к независимости. В декабре 1960 года он организовал межконтинентальную конференцию в Браззавиле, на которой высоко оценил преимущества экономического либерализма и осудил коммунизм."
  KNG_1963_revolution.t: "«Три славы»?"
  KNG_1963_revolution.d: "Trois Glorieuses (букв. «Три славных дня») — восстание в Конго-Браззавиле, которое произошло с 13 по 15 августа 1963 года. Восстание положило конец правлению первого президента Конго Фульберта Юлу, поскольку оппозиционное профсоюзное движение и Союз конголезской молодежи заключили союз с армией."
  KNG_1968_revolution.t: "Государственный переворот в Конго?"
  KNG_1968_revolution.d: "4 сентября 1968 года, после нескольких дней ожесточенных столкновений, правительство Альфонса Массамба-Деба было свергнуто военными, которые вынудили Массамба-Деба уйти в отставку. Затем Альфред Рауль стал исполняющим обязанности главы государства до января 1969 года, когда контроль взял на себя Мариен Нгуаби, председатель той же партии, которая привела к власти Массамба-Деба."
  KNG_1977_revolution.t: "Убийство Мариен Нгуаби?"
  KNG_1977_revolution.d: "18 марта 1977 года в 14:30 был убит президент Нгуаби. Обвиняемые в участии в убийстве предстали перед судом, а некоторые были казнены, в том числе Массамба-Деба и Бартелеми Кикадиди. После убийства Военный комитет партии (ВКП) был назначен главой временного правительства, а консервативный полковник Йоахим Йомби-Опанго стал главой государства."
  KNG_1979_revolution.t: "Возвышение Дени Сассу-Нгессо?"
  KNG_1979_revolution.d: "После убийства Нгуаби в марте 1977 года Йомби-Опанго стал главой государства. Он занимал этот пост почти два года, пока в феврале 1979 года его не заставили уйти в отставку. Обвиненный в попытке сформировать «правую фракцию» в РСТ, он впоследствии несколько лет находился под стражей своим преемником, президентом Дени Сассу-Нгессо. В 1979 году его не только поместили под домашний арест, но и исключили из РСТ, а его имущество было конфисковано; кроме того, согласно объявлению от 20 октября 1979 года, он был понижен в звании из генерала до рядового."
  KNG_1992_revolution.t: "Конец Народной Республики Конго?"
  KNG_1992_revolution.d: "Народная Республика Конго перешла к многопартийной системе после распада Советского Союза в 1991 году, восстановив прежнее название и флаг страны, и прекратила свое существование к марту 1992 года. Андре Милонго был назначен временным премьер-министром. Президенту Дени Сассу-Нгессо было разрешено оставаться на своем посту в церемониальном качестве в течение переходного периода."
  KNG_1997_revolution.t: "Возвращение Дени Сассу-Нгессо?"
  KNG_1997_revolution.d: "В 1997 году Дени Сассу-Нгессо вернул себе власть в Конго-Браззавиле после жестокой гражданской войны. При поддержке ангольских сил его ополчение «Кобра» свергло президента Паскаля Лиссубу. Конфликт опустошил Браззавиль, в результате чего погибли тысячи людей, но закрепил возвращение Сассу-Нгессо в качестве сильного лидера, положив конец краткому демократическому эксперименту в Конго и восстановив его правление."
  TAN_1962_revolution.t: "Президентская республика?"
  TAN_1962_revolution.d: "Британское правление подошло к концу 9 декабря 1961 года. Елизавета II, вступившая на британский престол в 1952 году, продолжала править в течение первого года независимости Танганьики, но теперь уже явно как королева Танганьики, представленная генерал-губернатором. 9 декабря 1962 года Танганьика стала демократической республикой под руководством исполнительного президента."
  TAN_1964_revolution.t: "Однопартийное государство?"
  TAN_1964_revolution.d: "В 1962 году Танганьика стала республикой, первым президентом которой был избран Ньерере. Его администрация проводила деколонизацию и «африканизацию» государственной службы, одновременно способствуя единству коренных африканцев и азиатских и европейских меньшинств страны. Он поощрял формирование однопартийного государства и безуспешно преследовал панафриканское формирование Восточноафриканской федерации с Угандой и Кенией. После Занзибарской революции 1964 года остров Занзибар был объединен с Танганьикой и образовал Танзанию. После этого Ньерере стал уделять все большее внимание национальной самостоятельности и социализму."
  TAN_1992_revolution.t: "Частичная демократизация?"
  TAN_1992_revolution.d: "В 1992 году в Конституцию Танзании были внесены поправки, разрешающие существование нескольких политических партий. На первых многопартийных выборах в Танзании, состоявшихся в 1995 году, правящий Чама Ча Мапиндузи получил 186 из 232 выборных мест в Национальной ассамблее, а президентом был избран Бенджамин Мкапа."
  UGA_1979_revolution.t: "Падение Иди Амина?"
  UGA_1979_revolution.d: "По мере того как правление Амина продолжалось до конца 1970-х годов, усиливались беспорядки против его преследования определенных этнических групп и политических диссидентов, а также очень плохая международная репутация Уганды из-за поддержки Амином угонщиков НФОП-EO и RZ в 1976 году, что привело к израильской операции Энтеббе. Затем в 1978 году он попытался аннексировать регион Кагера в Танзании. Президент Танзании Джулиус Ньерере приказал своим войскам вторгнуться в Уганду в ответ. Танзанийская армия и силы повстанцев успешно захватили Кампалу в 1979 году и отстранили Амина от власти."
  UGA_1996_revolution.t: "Частичная демократизация?"
  UGA_1996_revolution.d: "Первые выборы при правительстве Мусевени состоялись 9 мая 1996 года. Мусевени победил Пола Ссемогерере из Демократической партии, который участвовал в выборах в качестве кандидата от «Коалиции межпартийных сил», и выскочки-кандидата Кибириге Майянджи. Мусевени победил, набрав 75,5 процента голосов при явке 72,6 процента имеющих право голоса избирателей. Хотя международные и внутренние наблюдатели назвали голосование состоявшимся, оба проигравших кандидата отклонили результаты. Мусевени был приведен к присяге президента во второй раз 12 мая 1996 года."
  BRD_1976_revolution.t: "Государственный переворот в Бурунди?"
  BRD_1976_revolution.d: "В 1976 году полковник Жан-Батист Багаза, тутси, возглавил бескровный переворот, чтобы свергнуть Микомберо, и приступил к проведению реформ. В 1981 году его администрация разработала новую конституцию, которая сохранила статус Бурунди как однопартийного государства. В августе 1984 года Багаза был избран главой государства. Во время своего пребывания в должности Багаза подавлял политических оппонентов и религиозные свободы."
  BRD_1987_revolution.t: "Государственный переворот в Бурунди?"
  BRD_1987_revolution.d: "Майор Пьер Буйоя, тутси, сверг Багазу в 1987 году, приостановил действие конституции и распустил политические партии. Он восстановил военное правление с помощью Военного комитета национального спасения (CSMN)."
  BRD_1993_revolution.t: "Конституционная реформа?"
  BRD_1993_revolution.d: "Буйоя учредил Комиссию национального примирения, которая в 1992 году приняла новую конституцию, допускающую многопартийную систему и неэтническое правительство. Выставляя свою кандидатуру на президентских выборах в Бурунди в 1993 году, он потерпел поражение от кандидата хуту Мельхиора Ндадайе от оппозиционной партии ФРОДЕБУ."
  ZAN_1964_revolution.t: "Занзибарская революция?"
  ZAN_1964_revolution.d: "Занзибарская революция началась 12 января 1964 года и привела к свержению султана Занзибара Джамшида бин Абдаллы и его преимущественно арабского правительства большинством чернокожего африканского населения острова. Каруме удалось договориться о слиянии Занзибара с Танганьикой и образовании новой страны Танзании. Современные СМИ оценили это слияние как попытку предотвратить коммунистическую подрывную деятельность на Занзибаре. Революция положила конец более чем 250-летнему арабскому господству на Занзибаре."
  ANG_1975_revolution.t: "Народная Республика Ангола?"
  ANG_1975_revolution.d: "Народная Республика Ангола была самопровозглашенным социалистическим государством, которое управляло Анголой с момента обретения независимости в 1975 году до 25 августа 1992 года, во время гражданской войны в Анголе. Его возглавило Народное движение за освобождение Анголы, которое выиграло гражданскую войну и с тех пор управляет страной как социал-демократической республикой."
  ANG_1979_revolution.t: "Президентство Жозе Эдуарду душ Сантуша?"
  ANG_1979_revolution.d: "Хосе Эдуарду Ван-Дунем душ Сантуш был ангольским политиком и военным, который занимал пост второго президента Анголы с 1979 по 2017 год. В качестве президента душ Сантуш также был главнокомандующим Вооруженными силами Анголы (ФАА) и президентом Народного движения за освобождение Анголы (МПЛА), партии, которая управляла Анголой с момента обретения ею независимости. 1975. К тому времени, когда он ушел в отставку в 2017 году, он был вторым по продолжительности пребывания на посту президентом в Африке, уступая только Теодоро Обианг Нгема Мбасого из Экваториальной Гвинеи."
  ANG_2017_revolution.t: "Президентство Жоау Лоуренсу?"
  ANG_2017_revolution.d: "Жуан Мануэл Гонсалвеш Лоренсу — ангольский политик, занимающий пост третьего президента Анголы с 26 сентября 2017 года.[4] Ранее он был министром обороны с 2014 по 2017 год. В сентябре 2018 года он стал председателем Народного движения за освобождение Анголы (МПЛА), правящей партии. Он был генеральным секретарем партии с 1998 по 2003 год."
  MOZ_1975_revolution.t: "Народная Республика Мозамбик?"
  MOZ_1975_revolution.d: "Народная Республика Мозамбик была социалистическим государством, существовавшим на территории современного Мозамбика с 1975 по 1990 год. Она была основана, когда страна обрела независимость от Португалии в июне 1975 года, а Фронт освобождения Мозамбика («ФРЕЛИМО») основал однопартийное социалистическое государство во главе с Саморой Машелом."
  MOZ_1986_revolution.t: "Президентство Хоакима Альберто Чиссано?"
  MOZ_1986_revolution.d: "Чиссано унаследовал пост президента и стал лидером партии ФРЕЛИМО в 1986 году, когда президентский самолет Саморы Машела разбился в гористой местности в Южной Африке. Чиссано положил конец гражданской войне в Мозамбике в 1992 году, заключив мирный договор с повстанческими силами, который «обещал никаких преследований или наказаний» и предоставил им 50% должностей в мозамбикской армии."
  MOZ_1990_revolution.t: "Новая Конституция?"
  MOZ_1990_revolution.d: "Преемник Машела Жоаким Чиссано осуществил радикальные изменения в стране, начав такие реформы, как переход от марксизма к капитализму, и начал мирные переговоры с РЕНАМО. Новая конституция, принятая в 1990 году, предусматривала многопартийную политическую систему, рыночную экономику и свободные выборы. В том же году Мозамбик отменил официальное название страны — народная республика."
  MOZ_1994_revolution.t: "Переход к демократии?"
  MOZ_1994_revolution.d: "Всеобщие выборы были проведены в Мозамбике с 27 по 29 октября 1994 года для избрания президента и Ассамблеи Республики. Это были первые многопартийные выборы в стране, поскольку ранее ФРЕЛИМО была единственной легальной партией. Тем не менее, ФРЕЛИМО сохранил контроль над политической системой страны, выиграв оба выбора."
  GNB_1973_revolution.t: "Народная Республика Гвинея-Бисау?"
  GNB_1973_revolution.d: "Африканская партия независимости Гвинеи и Кабо-Верде обратилась к вооруженному конфликту в 1960-х годах и была одной из воюющих сторон в войне за независимость Гвинеи-Бисау. К концу войны партия создала социалистическое однопартийное государство, которое оставалось неизменным до тех пор, пока в начале 1990-х годов не была введена многопартийная демократия."
  GNB_1994_revolution.t: "Переход к демократии?"
  GNB_1994_revolution.d: "Всеобщие выборы состоялись в Гвинее-Бисау 3 июля 1994 года, второй тур президентских выборов состоялся 7 августа. Это были первые многопартийные выборы с момента обретения независимости, а также первый раз, когда президент был избран прямым голосованием, поскольку ранее этот пост избирался Национальным народным собранием. Результатом президентских выборов стала победа действующего президента Жоау Бернарду Виейры от Африканской партии независимости Гвинеи и Кабо-Верде (ПАИГК), который победил Кумбу Иалу от Партии социального обновления во втором туре."
  LIB_1971_revolution.t: "Либерализация Либерии?"
  LIB_1971_revolution.d: "Уильям Толберт был избран президентом после смерти Уильяма Табмана. В раннее президентство Толберта были проведены либеральные реформы и принята позиция неприсоединения, но растущие экономические проблемы и напряженность между американо-либерийцами и коренными либерийцами привели к нестабильности. В 1973 году страна вернулась к двухпартийной системе, когда Прогрессивный альянс Либерии, возглавляемый Габриэлем Баккусом Мэтьюзом, был признан легитимной оппозиционной партией."
  LIB_1980_revolution.t: "Либерийский переворот?"
  LIB_1980_revolution.d: "12 апреля 1980 года в результате военного переворота, возглавляемого старшим сержантом Сэмюэлем Доу из этнической группы кран, был свергнут и убит президент Уильям Р. Толберт-младший. Доу и другие заговорщики позже казнили большую часть кабинета Толберта, а также других американо-либерийских правительственных чиновников и членов партии истинных вигов на пляже Монровии. Лидеры переворота сформировали Народный совет спасения (КНР) для управления страной."
  LIB_1990_revolution.t: "Первая гражданская война в Либерии?"
  LIB_1990_revolution.d: "Тоталитарный режим президента Сэмюэля Доу и широко распространенная коррупция привели к призывам прекратить поддержку Соединенных Штатов к концу 1980-х годов. Национальный патриотический фронт Либерии (НПФЛ) во главе с Чарльзом Тейлором вторгся в Либерию из Кот-д’Ивуара, чтобы свергнуть Доу в декабре 1989 года, и в течение года получил контроль над большей частью страны. Доу был схвачен и казнен Независимым национальным патриотическим фронтом Либерии (ИНПФЛ), отколовшейся фракцией НПФЛ, возглавляемой принцем Джонсоном, в сентябре 1990 года."
  LIB_1997_revolution.t: "Восстание Чарльза Тейлора?"
  LIB_1997_revolution.d: "После того, как президент Доу отстранил его от ответственности за растрату и заключил в тюрьму, Тейлор сбежал из тюрьмы в 1989 году. В конце концов он прибыл в Ливию, где прошел подготовку в качестве партизана. Он вернулся в Либерию в 1989 году в качестве главы поддерживаемой Либерией повстанческой группы, Национального патриотического фронта Либерии, чтобы свергнуть правительство Доу, положив начало Первой гражданской войне в Либерии (1989–1996). После казни Доу Тейлор получил контроль над значительной частью страны и стал одним из самых известных военачальников Африки. После мирного соглашения, положившего конец войне, Тейлор был избран президентом на всеобщих выборах 1997 года как член Национальной патриотической партии (НПП). Внутри страны Тейлор пытался консолидировать власть с помощью диктаторских средств, например, путем чистки армии и совершения насилия против своих политических соперников."
  LIB_2003_revolution.t: "Возвращение демократии в Либерии?"
  LIB_2003_revolution.d: "Президент Чарльз Тейлор пришел к власти в 1997 году после победы в Первой гражданской войне в Либерии, которая привела к двухлетнему миру. «Объединенные либерийцы за примирение и демократию» (ЛУРД), повстанческая группа, выступающая против Тейлора, поддерживаемая правительством Гвинеи, вторглась в северную Либерию в апреле 1999 года. ЛУРД добилась постепенного успеха против Тейлора на севере и к началу 2002 года начала приближаться к столице Монровии. Движение за демократию в Либерии (МОДЕЛ), вторая повстанческая группа, выступающая против Тейлора, в начале 2002 года вторглась в южную Либерию. 2003 г. и быстро завоевали большую часть юга. Тейлор, которому пришлось контролировать лишь треть Либерии и находился под давлением осады Монровии, подал в отставку в августе 2003 года и бежал в Нигерию. Аккрское всеобъемлющее мирное соглашение было подписано враждующими сторонами неделю спустя, ознаменовав политическое окончание конфликта и положив начало переходу Либерии к демократии."
  BUF_1987_revolution.t: "Государственный переворот в Буркина-Фасо?"
  BUF_1987_revolution.d: "Государственный переворот в Буркина-Фасо 1987 года — кровавый военный переворот в Буркина-Фасо, который произошел 15 октября 1987 года. Переворот был организован капитаном Блезом Компаоре против действующего крайне левого президента капитана Томаса Санкары, его бывшего друга и соратника во время переворота 1983 года."
  BUF_2014_revolution.t: "Возвращение демократии?"
  BUF_2014_revolution.d: "Блез Компаоре побеждал на выборах в 1991, 1998, 2005 и 2010 годах при обстоятельствах, которые считались несправедливыми. Его попытка внести поправки в конституцию, чтобы продлить свой 27-летний срок, вызвала восстание в Буркина-Фасо в 2014 году. 31 октября 2014 года Компаоре подал в отставку, после чего бежал в Кот-д’Ивуар."
  BUF_2022_revolution.t: "Государственный переворот в Буркина-Фасо?"
  BUF_2022_revolution.d: "Траоре входил в группу армейских офицеров, которые поддержали государственный переворот в Буркина-Фасо в январе 2022 года и привели к власти военную хунту Патриотического движения за защиту и восстановление. Когда 30 сентября заговорщики начали переворот, Траоре все еще имел звание капитана. Операция проводилась при поддержке подразделения «Кобра». Сразу после переворота Траоре объявил себя новым главой Патриотического движения за защиту и восстановление. 6 октября он также вступил в должность временного президента в качестве «главы государства, верховного главы вооруженных сил»."
  NIC_1990_revolution.t: "Возвращение демократии в Никарагуа?"
  NIC_1990_revolution.d: "25 февраля 1990 года в Никарагуа прошли всеобщие выборы для избрания президента и членов Национальной ассамблеи. Результатом стала победа Национального оппозиционного союза (ООН), чей кандидат в президенты Виолета Чаморро неожиданно победила действующего президента Даниэля Ортегу из Сандинистского фронта национального освобождения (СФНО). Это привело к исторической мирной и демократической передаче власти в Никарагуа."
  NIC_2007_revolution.t: "Режим Даниэля Ортеги?"
  NIC_2007_revolution.d: "Хосе Даниэль Ортега Сааведра — никарагуанский политик, революционер и бывший партизан, который под разными титулами был лидером Никарагуа с 2007 года, а ранее с 1979 по 1990 год. Сначала он пришел к власти в качестве координатора Хунты национального восстановления с 1979 по 1985 год, а затем занимал пост президента Никарагуа с 1985 по 1985 год. 1990. Он вновь вступил на пост президента в 2007 году и вместе со своей женой Росарио Мурильо занимал пост сопрезидента с февраля 2025 года. Ортегу называют авторитарным лидером."
  NIC_2025_revolution.t: "Сопрезиденты Никарагуа?"
  NIC_2025_revolution.d: "В 2025 году в Конституцию Никарагуа были внесены поправки, позволяющие осуществлять президентские полномочия двум сопрезидентам, а не одному человеку. Сопрезиденты мужского и женского пола избираются всеобщим голосованием на шестилетний срок. Когда поправка была принята, действующий президент Даниэль Ортега, его жена и вице-президент Росарио Мурильо были объявлены инаугурационными сопрезидентами, что сделало Никарагуа единственной страной в мире, в которой в настоящее время правит супружеское двоевластие."
  ELS_1956_revolution.t: "Президентство Хосе Марии Лемуса?"
  ELS_1956_revolution.d: "Подполковник Хосе Мария Лемус Лопес был президентом Сальвадора с 14 сентября 1956 года по 26 октября 1960 года. Прежде чем стать президентом, он занимал должности заместителя министра обороны и министра внутренних дел. Он продолжил социально-экономические реформы своего предшественника, но улучшения уровня жизни рабочего класса не произошло."
  ELS_1960_revolution.t: "Государственный переворот в Сальвадоре?"
  ELS_1960_revolution.d: "Государственный переворот в Сальвадоре 1961 года был успешным контрпереворотом в Сальвадоре под руководством полковника Анибала Портильо против недолговечной правительственной хунты, которая пришла к власти в 1960 году, заменив реформистскую военную хунту ярым антикоммунистическим правительством под названием Гражданско-военная директория. К концу того же года военное управление уступило место демократическому правлению."
  ELS_1979_revolution.t: "Государственный переворот в Сальвадоре?"
  ELS_1979_revolution.d: "Государственный переворот в Сальвадоре 1979 года — военный переворот, произошедший в Сальвадоре 15 октября 1979 года. В результате переворота, возглавляемого молодыми офицерами, был свергнут военный президент Карлос Умберто Ромеро и отправлен в изгнание. Твердая власть Партии национального примирения была прекращена, и на ее месте военные создали Хунту Революционного правительства Сальвадора (JRG)."
  ELS_1984_revolution.t: "Выборы Хосе Наполеона Дуарте?"
  ELS_1984_revolution.d: "Хосе Наполеон Дуарте Фуэнтес (23 ноября 1925 - 23 февраля 1990) был сальвадорским политиком, который занимал пост президента Сальвадора с 1 июня 1984 года по 1 июня 1989 года. Он был мэром Сан-Сальвадора, прежде чем баллотироваться на пост президента в 1972 году. Он проиграл, но выборы многие считают сфальсифицированными. После государственного переворота в 1979 году Дуарте возглавил последующую гражданско-военную хунту с 1980 по 1982 год. Затем он был избран президентом в 1984 году, победив лидера партии ARENA Роберто Д'Обюиссона."
  ELS_1992_revolution.t: "Чапультепекские мирные соглашения?"
  ELS_1992_revolution.d: "Чапультепекские мирные соглашения представляли собой набор мирных соглашений, подписанных 16 января 1992 года, в день окончания гражданской войны в Сальвадоре. Договор установил мир между правительством Сальвадора и Фронтом национального освобождения Фарабундо Марти (ФНОФМ)."
  HND_1947_revolution.t: "Отставка вице-короля Арчибальда Уэйвелла?"
  HND_1947_revolution.d: "Арчибальд Уэйвелл был уволен с поста вице-короля Индии в начале 1947 года, его заменил лорд Маунтбеттен. Его натянутые отношения с Уайтхоллом, неудачи на конференции в Симле (1945 г.) и миссии кабинета министров (1946 г.), а также неспособность разрешить межобщинную напряженность убедили премьер-министра Эттли в том, что новое руководство необходимо для перехода Индии."
  HND_1952_revolution.t: "Особый статус Джамму и Кашмира?"
  HND_1952_revolution.d: "В 1952 году Делийское соглашение между премьер-министром Неру и шейхом Абдуллой подтвердило особый статус Джамму и Кашмира в соответствии со статьей 370. Оно предоставило автономию в отношении гражданства, собственности и внутреннего управления, в то время как Индия сохранила контроль над обороной, иностранными делами и коммуникациями, что укрепило уникальное конституционное положение региона в Союзе. Это соглашение, подписанное 24 июля 1952 года, официально закрепило автономию Кашмира, интегрировав ее в конституционные рамки Индии. Соглашение отражало компромисс: Джамму и Кашмир могли сохранить свою собственную конституцию и флаг, в то время как парламент Индии имел ограниченное законодательное влияние."
  KAS_Special_Status.option.1: "Создать республиканскую местную администрацию."
  KAS_Special_Status.option.2: "Сохраняйте монархию в местной администрации."
  KAS_Special_Status.option.3: "Аннексируйте территорию!"
  HND_1975_revolution.t: "Чрезвычайная ситуация?"
  HND_1975_revolution.d: "Чрезвычайное положение в Индии — это 21-месячный период с 1975 по 1977 год, когда премьер-министр Индии Индира Ганди объявила чрезвычайное положение по всей стране. Официально изданный президентом Фахруддином Али Ахмедом в соответствии со статьей 352 Конституции из-за преобладающих «внутренних беспорядков», приказ наделил премьер-министра полномочиями управлять посредством указа, позволяя отменять выборы и приостанавливать гражданские свободы."
  HND_1977_revolution.t: "Прекратить чрезвычайную ситуацию?"
  HND_1977_revolution.d: "18 января 1977 года Ганди назначил новые выборы на март и освободил нескольких лидеров оппозиции; однако многие другие остались в тюрьме даже после того, как она покинула свой пост, несмотря на то, что чрезвычайное положение официально закончилось 21 марта 1977 года. Всеобщие выборы в Индии 1977 года прошли с 16 по 20 марта и привели к убедительной победе партии Джаната и CFD, получив 298 мест в Лок Сабха, тогда как правящему Индийскому национальному конгрессу удалось выиграть только 154, что на 198 мест меньше, чем на предыдущих выборах."
  HND_2019_revolution.t: "Прямое правление в Джамму и Кашмире?"
  HND_2019_revolution.d: "В августе 2019 года Индия отменила особый статус Джамму и Кашмира в соответствии со статьей 370, введя прямое правление. Закон о реорганизации Джамму и Кашмира разделил штат на две союзные территории — Джамму и Кашмир и Ладакх — вступил в силу 31 октября 2019 года. Центральное управление заменило местную автономию, что ознаменовало исторический конституционный и политический сдвиг. Этот шаг был оправдан правительством как шаг к интеграции и развитию, но критики утверждали, что он подрывает демократическое представительство и региональную автономию."
  BHU_1952_revolution.t: "Вознесение Джигме Дорджи Вангчука?"
  BHU_1952_revolution.d: "Джигме Вангчуку наследовал его сын Джигме Дорджи Вангчук. Во время его 20-летнего правления, завершившегося в июле 1972 года, началась фундаментальная переориентация бутанского общества. Вангчук не только добился реорганизации общества и правительства, но также укрепил суверенитет и безопасность Бутана."
  BHU_1972_revolution.t: "Вознесение Джигме Сингье Вангчука?"
  BHU_1972_revolution.d: "21 июля 1972 года скончался Третий король Бутана, и в возрасте 16 лет на трон взошел наследный принц Джигме Сингье Вангчук, став на тот момент самым молодым монархом в мире. Во время его правления Бутан перешел от абсолютной монархии к демократической конституционной монархии."
  BHU_2006_revolution.t: "Вознесение Джигме Кхесара Намгьяла Вангчука?"
  BHU_2006_revolution.d: "Правление Джигме Кхесара Намгьяла Вангчука началось в 2006 году после того, как его отец Джигме Сингье Вангчук отрекся от престола. Молодой король начал свое правление, наблюдая за демократизацией Бутана, председательствуя на последних сессиях парламента, на которых обсуждались законы о выборах, земельная реформа и другие важные вопросы."
  BHU_2008_revolution.t: "Парламентская демократия Бутана?"
  BHU_2008_revolution.d: "Первые всеобщие выборы в Национальное собрание состоялись 24 марта 2008 года. Главными соперниками были Партия мира и процветания Бутана (ДПТ) во главе с Джигме Тинли и Народно-демократическая партия (НДП) во главе с Сангаем Нгедупом. ДПТ выиграла выборы, получив 45 из 47 мест. 9 апреля 2008 года Джигме Тинли стал первым избранным премьер-министром; он вступил в должность после первых демократических выборов в стране."
  BUR_2026_revolution.t: "Номинально гражданское правительство?"
  BUR_2026_revolution.d: "30 марта 2026 года генерал Мин Аунг Хлаинг, пришедший к власти в результате государственного переворота в 2021 году, был номинирован на пост вице-президента Коллегией выборщиков Пьитху Хлуттау депутатом от Партии солидарности и развития Союза Чжо Чьяу Хтаем для выдвижения комитетом кандидатуры на президентских выборах 2026 года в Мьянме. Поскольку ему пришлось уйти из армии, в тот же день он ушел с поста главнокомандующего, чтобы баллотироваться на пост президента в соответствии с конституцией. NDSC назначил своим преемником Е Вин Оо, сторонника Мин Аунг Хлаинга. 3 апреля Мин Аунг Хлаинг был избран 11-м президентом страны."
  CAM_1979_revolution.t: "Падение Пол Пота?"
  CAM_1979_revolution.d: "После нескольких лет жестоких вторжений красных кхмеров на территорию Вьетнама, закончившихся массовыми убийствами, Вьетнам вторгся в Камбоджу в декабре 1978 года. К январю 1979 года Пот и красные кхмеры были свергнуты. Выжившие члены «красных кхмеров» отступили в разбросанные джунгли недалеко от тайской границы, откуда продолжали сражаться и совершать набеги. Сильно ослабленные, их преследовали вьетнамские солдаты вплоть до их вывода в 1989 году."
  CAM_1989_revolution.t: "Парижские мирные соглашения?"
  CAM_1989_revolution.d: "В ноябре 1978 года вьетнамские войска вторглись в Камбоджу в ответ на приграничные рейды красных кхмеров и завоевали ее. Народная Республика Кампучия (НРК) была создана как просоветское государство во главе с Народно-революционной партией Кампучии. В противовес вновь созданному государству в 1981 году из трех фракций было сформировано правительство в изгнании, известное как Коалиционное правительство Демократической Кампучии (CGDK). Мирные усилия начались в Париже в 1989 году в рамках Государства Камбоджа и завершились два года спустя, в октябре 1991 года, принятием Парижского всеобъемлющего мирного соглашения."
  CAM_1997_revolution.t: "Государственный переворот в Камбодже?"
  CAM_1997_revolution.d: "Камбоджийский государственный переворот 1997 года произошел в Камбодже с июля по сентябрь 1997 года. В результате сопремьер Хун Сен сверг другого сопремьера Нородома Ранарида. В ходе переворота погибли по меньшей мере 32 человека."
  CAM_2018_revolution.t: "Консолидация власти Хун Сена?"
  CAM_2018_revolution.d: "Следуя приказу Хун Сена, 31 января 2017 года Национальное собрание единогласно проголосовало за упразднение должностей лидера меньшинства и лидера большинства, чтобы уменьшить влияние оппозиционной партии. 2 февраля 2017 года Хун Сен запретил оппозиции допрашивать некоторых министров своего правительства. Более того, Хун Сен пообещал внести поправку в конституцию, которая позже привела к роспуску оппозиционной Партии национального спасения Камбоджи. Этот шаг привел к неожиданной отставке лидера оппозиции Сэма Рейнси. В воскресенье, 29 июля 2018 года, в Камбодже прошли всеобщие выборы для избрания членов шестого Национального собрания. Они привели к широко ожидаемой убедительной победе правящей Народной партии Камбоджи (НПК), которая получила все 125 мест в Национальной ассамблее."
  CAM_2023_revolution.t: "Возвышение гунна Мане?"
  CAM_2023_revolution.d: "Хун Мане (родился 20 октября 1977 года) - камбоджийский политик и военный офицер, который с 2023 года занимал пост премьер-министра Камбоджи и вице-президента правящей Народной партии Камбоджи (НПК). Он второй ребенок Хун Сена, президента Сената и бывшего премьер-министра, и Бун Рани."
  MSY_1969_revolution.t: "Инцидент 13 мая"
  MSY_1969_revolution.d: "Инцидент 13 мая был эпизодом китайско-малайского межконфессионального насилия, которое произошло в Куала-Лумпуре, столице Малайзии, 13 мая 1969 года. Беспорядки произошли после всеобщих выборов в Малайзии 1969 года, когда оппозиционные партии, такие как Партия демократического действия и Геракан, добились успехов за счет правящей коалиции, Партии Альянса. Расовые беспорядки привели к объявлению Янгом ди-Пертуаном Агонгом (королем) чрезвычайного положения в стране, что привело к приостановке работы парламента. Национальный оперативный совет (НОС) был создан в качестве временного правительства для временного управления страной в период с 1969 по 1971 год."
  MSY_1971_revolution.t: "Новая экономическая политика Малайзии?"
  MSY_1971_revolution.d: "Новая экономическая политика (НЭП) представляла собой программу социальной реорганизации и позитивных действий, сформулированную Национальным оперативным советом (НОС) после инцидента 13 мая в Малайзии. Активно проводились позитивные действия в поддержку Бумипутеры."
  MSY_1981_revolution.t: "Новое ОМНО?"
  MSY_1981_revolution.d: "Во время первого пребывания Махатхира в должности Малайзия пережила модернизацию и экономический рост, а его правительство инициировало широкую приватизацию промышленности и ряд смелых инфраструктурных проектов. Махатхир был доминирующей политической фигурой, выиграв пять всеобщих выборов подряд и отбиваясь от нескольких соперников за лидерство ОМНО. Он централизовал власть, подорвав независимость судебной власти и поддержав поправку к конституции, лишающую королевских особ юридического иммунитета. Он также продолжал политику поддержки бумипутеры."
  MSY_1998_revolution.t: "Суд над Анваром Ибрагимом по делу о содомии?"
  MSY_1998_revolution.d: "Во время азиатского финансового кризиса 1997 года Анвар поддержал план МВФ в качестве министра финансов. Махатхир обвинил в кризисе валютных спекулянтов, таких как Джордж Сорос, и поддержал валютный контроль и ужесточение регулирования иностранных инвестиций. Однако в том же году разногласия между Анваром и Махатхиром достигли апогея в связи с проводимой раз в четыре года Генеральной ассамблеей ОМНО. Анвар был уволен из кабинета министров 2 сентября 1998 года на фоне сообщений полиции о том, что он находится под следствием. На следующий день его исключили из ОМНО. Мунавар Анис, бывший спичрайтер Анвара, и Сукма Дармаван Сасмита Атмаджа, приемный брат Анвара, были арестованы по подозрению в участии в гомосексуальных действиях."
  MSY_2018_revolution.t: "Падение Наджиба Разака?"
  MSY_2018_revolution.d: "За время своего пребывания на посту премьер-министра Наджиб реализовал различные программы экономического и инфраструктурного развития, в том числе инициативу 1Malaysia Development Berhad (1MDB). Однако его руководство было омрачено обвинениями в коррупции и хищении средств, связанных со скандалом с 1MDB, который привел к его политическому падению. В 2018 году политическая карьера Наджиба потерпела серьезную неудачу, когда его партия «Барисан Насионал» проиграла всеобщие выборы коалиции «Пакатан Харапан». Впоследствии ему были предъявлены юридические обвинения, связанные со скандалом с 1MDB."
  MSY_2020_revolution.t: "Переезд Шератона?"
  MSY_2020_revolution.d: "Политический кризис в Малайзии 2020–2022 годов был спровоцирован после того, как несколько членов парламента (депутатов) 14-го парламента Малайзии изменили партийную поддержку, что привело к потере парламентского большинства, краху двух последовательных коалиционных правительств и отставке двух премьер-министров. Политический кризис завершился досрочными всеобщими выборами 2022 года и, в конечном итоге, формированием коалиционного правительства."
  MSY_2022_revolution.t: "Возвышение Пакатана Харапана?"
  MSY_2022_revolution.d: "После всеобщих выборов 2022 года, которые привели к зависанию парламента, Альянс надежды вернулся к власти с большинством в две трети во главе с премьер-министром и председателем PH Анваром Ибрагимом, сформировав коалиционное правительство с Национальным фронтом (BN), Альянсом партий Саравака (GPS), Народным альянсом Сабаха (GRS), Партией наследия (WARISAN), Малазийской народной партией (PBM), Социал-демократической партией согласия (KDM) и независимыми кандидатами. Тем временем партия «Перикатан Насионал» Мухиддина Ясина отказалась присоединиться к коалиции и взяла на себя роль оппозиции, получив 74 места."
  BRU_1967_revolution.t: "Отречение Омара Али Сайфуддина III?"
  BRU_1967_revolution.d: "4 октября 1967 года, после 17 лет правления и продолжительной болезни, Омар Али Сайфуддин объявил о своем добровольном отречении от престола в пользу своего 21-летнего старшего сына, наследного принца Хассанала Болкиаха, когда его сын достиг подросткового возраста и приобрел некоторое представление о делах управления страной."
  THI_1957_revolution.t: "Переворот Сарит Танарат?"
  THI_1957_revolution.d: "13 сентября 1957 года Сарит предъявил Фибуну ультиматум армии. Ультиматум, подписанный 58 армейскими офицерами, требовал отставки правительства. На следующее утро Сарит и его армия устроили государственный переворот. Менее чем за час армия без сопротивления успешно захватила стратегические точки."
  THI_1973_revolution.t: "Тайское народное восстание?"
  THI_1973_revolution.d: "Народное восстание 14 октября 1973 года стало переломным событием в истории Таиланда. Восстание привело к концу правящей военной диктатуры антикоммуниста Танома Киттикачорна и изменило политическую систему Таиланда. Примечательно, что это подчеркнуло растущее влияние тайских студентов университетов в политике."
  THI_1976_revolution.t: "Государственный переворот в Таиланде?"
  THI_1976_revolution.d: "Период волнений и нестабильности после восстания, а также страх перед коммунистическим переворотом после падения Сайгона в 1975 году завершился резней в университете Таммасат в октябре 1976 года. Государственный переворот, произошедший в тот день, привел к созданию в Таиланде нового ультраправого правительства, которое расправилось с средствами массовой информации, чиновниками и интеллектуалами и породило коммунистическое восстание."
  THI_1980_revolution.t: "Назначение Према Тинсуланонды?"
  THI_1980_revolution.d: "На волне правых настроений, подогреваемых кризисом беженцев в Индокитае, вьетнамскими пограничными рейдами и экономическими трудностями, военный лидер Прем Тинсуланонда был назначен премьер-министром в 1980 году. После переговоров с Премом коммунисты отказались от повстанческого движения к 1983 году. Премьерство Према было названо «полудемократией», поскольку парламент состоял из всех избранных членов Палаты представителей и всех назначенных Сената."
  THI_1997_revolution.t: "Народная конституция?"
  THI_1997_revolution.d: "Конституция Королевства Таиланд, буддийская эра 2540 (1997 г.) была конституцией Таиланда, принятой 11 октября 1997 г. взамен Конституции 1991 г., и была широко провозглашена вехой в демократической конституционной реформе Таиланда. Она представляла собой самую демократическую конституцию в истории страны. Конституция 1997 года создала двухпалатный законодательный орган. Впервые в истории Таиланда обе палаты были избраны прямым голосованием."
  THI_2006_revolution.t: "Государственный переворот в Таиланде?"
  THI_2006_revolution.d: "Государственный переворот в Таиланде в 2006 году произошел 19 сентября 2006 года, когда Королевская армия Таиланда устроила государственный переворот против избранного временного правительства премьер-министра Таксина Чинавата. Государственный переворот, который стал первой неконституционной сменой правительства в Таиланде за пятнадцать лет после тайского государственного переворота 1991 года, последовал за продолжавшимся год политическим кризисом с участием Таксина, его союзников и политических оппонентов и произошел менее чем за месяц до проведения общенациональных выборов в Палату представителей."
  THI_2011_revolution.t: "Возвращение Таиланда к демократии?"
  THI_2011_revolution.d: "Протестующие Объединенного фронта за демократию против диктатуры (UDD) или «краснорубашечники», оккупировавшие центр Бангкока в апреле и мае 2010 года, потребовали проведения новых выборов. Встречное предложение правительства о проведении выборов 14 ноября 2010 года было отклонено ими, после чего последовало жестокое подавление протестующих, когда протестующие отказались разойтись. Окончательно выборы были объявлены в мае 2011 года."
  THI_2014_revolution.t: "Переворот Праюта Чан-Очи?"
  THI_2014_revolution.d: "22 мая 2014 года Королевские вооруженные силы Таиланда во главе с командующим Королевской армией Таиланда (RTA) генералом Праютом Чан-Оча совершили государственный переворот, 12-й со времени первого государственного переворота в стране в 1932 году, против временного правительства Таиланда после шести месяцев политического кризиса. Военные создали хунту под названием Национальный совет мира и порядка (NCPO), чтобы управлять страной. Переворот положил конец политическому конфликту между режимом, возглавляемым военными, и демократической властью, который существовал после государственного переворота в Таиланде в 2006 году, известного как «незавершенный переворот»."
  THI_2023_revolution.t: "Возвращение Таиланда к демократии?"
  THI_2023_revolution.d: "В мае 2023 года реформистская оппозиция Таиланда, прогрессивная Партия «Движение вперед» (MFP) и популистская Партия «Пхыу Тай», одержали победу на всеобщих выборах, что означало потерю власти роялистско-военными партиями, поддерживавшими премьер-министра Праюта Чан-Оча. 22 августа 2023 года Сретха Тависин из популистской партии «Пхыу Тай» стал новым премьер-министром Таиланда, а миллиардер Таксин Шинаватра, лидер партии «Пхыу Тай», вернулся в Таиланд после нескольких лет добровольного изгнания."
  JAP_1947_revolution.t: "Послевоенная конституция Японии?"
  JAP_1947_revolution.d: "Конституция Японии является конституцией Японии и высшим законом государства. Он был написан в основном американскими гражданскими чиновниками, работавшими в условиях оккупации Японии союзниками после Второй мировой войны. Действующая японская конституция была обнародована как поправка к Конституции Мэйдзи 1890 года 3 ноября 1946 года и вступила в силу 3 мая 1947 года."
  notice_of_3P_action.option: "Что есть, то есть."
  JAP_1955_revolution.t: "Система 1955 года?"
  JAP_1955_revolution.d: "Система 1955 года представляла собой послевоенный политический порядок Японии, в котором доминировала Либерально-демократическая партия после слияния консервативных партий в 1955 году, что привело к длительному однопартийному правлению, поддерживаемому прочными бюрократическими и деловыми связями, клиентелистским распределением общественных работ и фракционной конкуренцией внутри ЛДП; он обеспечил политическую стабильность и быстрый экономический рост, но опирался на персонализированные местные механизмы и избирательные стимулы, которые порождали коррупцию и постепенно ослаблялись скандалами, экономическим кризисом начала 1990-х годов и избирательной реформой."
  JAP_1994_revolution.t: "Избирательная реформа 1994 года?"
  JAP_1994_revolution.d: "В 1994 году Япония заменила склонные к коррупции многомандатные округа смешанной системой, сочетающей одномандатные места и пропорциональное представительство. Реформа была направлена ​​на поощрение двухпартийной конкуренции и смещение фокуса выборов с местной политики «свиной бочки» на национальные партийные платформы. В конечном итоге эти изменения укрепили партийное руководство и централизовали власть, хотя Либерально-демократическая партия в основном оставалась доминирующей силой."
  NKO_1994_revolution.t: "Приход Ким Чен Ира?"
  NKO_1994_revolution.d: "Ким Чен Ир был северокорейским политиком, вторым высшим лидером Северной Кореи. Он руководил Северной Кореей с момента смерти своего отца Ким Ир Сена в 1994 году до своей собственной смерти в 2011 году, когда ему наследовал его сын Ким Чен Ын."
  NKO_2012_revolution.t: "Возвышение Ким Чен Ына?"
  NKO_2012_revolution.d: "Ким Чен Ын — северокорейский политик, который был высшим лидером Северной Кореи с 2011 года и лидером Трудовой партии Кореи (ТПК) с 2012 года. Он третий сын Ким Чен Ира, который был вторым высшим лидером Северной Кореи с 1994 года до своей смерти в 2011 году, и Ко Ён Хи."
  SKO_1960_revolution.t: "Апрельская революция?"
  SKO_1960_revolution.d: "Апрельская революция — массовые протесты в Южной Корее против президента Ли Сын Мана и Первой республики с 11 по 26 апреля 1960 года, которые привели к отставке Ли. Протесты были вызваны обнаружением тела местного старшеклассника, убитого полицией во время демонстраций против фальсифицированных выборов в марте. Народное недовольство возникло из-за автократического правления Ли, коррупции, применения насилия против политической оппозиции и неравномерного развития Южной Кореи."
  SKO_1961_revolution.t: "Переворот 16 мая?"
  SKO_1961_revolution.d: "Военный переворот 16 мая — военный переворот в Южной Корее в 1961 году, организованный и осуществленный Пак Чон Хи и его союзниками, сформировавшими Военно-революционный комитет, номинально возглавляемый начальником штаба армии Чан До Ёном после его молчаливого согласия в день переворота. Переворот сделал бессильным демократически избранное правительство премьер-министра Чан Мёна и президента Юн Посуна и положил конец Второй республике, создав реформистский военный Верховный совет национальной реконструкции, фактически возглавляемый Паком, который занял пост председателя после ареста генерала Чанга в июле."
  SKO_1972_revolution.t: "Юшинская Конституция?"
  SKO_1972_revolution.d: "В октябре 1972 года Пак распустил законодательный орган и приостановил действие конституции 1963 года в результате самопереворота. Затем началась работа над проектом новой конституции. Новая конституция, так называемая Конституция Юшина, была одобрена на тщательно сфальсифицированном плебисците в ноябре 1972 года. Паку были предоставлены широкие полномочия по управлению посредством указов и приостановлению конституционных свобод. Срок президентского срока был увеличен с четырех до шести лет без ограничений на переизбрание. По сути, он кодифицировал чрезвычайные полномочия, которые Пак осуществлял в прошлом году, превратив его президентство в легальную диктатуру."
  SKO_1979_revolution.t: "Убийство Пак Чон Хи?"
  SKO_1979_revolution.d: "Пак Чон Хи был убит 26 октября 1979 года во время ужина в конспиративной квартире Центрального разведывательного управления Кореи (KCIA) недалеко от президентского комплекса Голубого дома в районе Чонно в Сеуле, Южная Корея. Ответственность за убийство несет Ким Чжэ Гю, директор ЦРУ и руководитель службы безопасности президента. Пак получил ранение в грудь и голову и почти сразу скончался."
  SKO_2016_revolution.t: "Импичмент Пак Кын Хе?"
  SKO_2016_revolution.d: "Импичмент Пак Кын Хе, президенту Южной Кореи, стал кульминацией политического скандала, связанного с вмешательством в президентский пост ее помощника Чой Сун Силя. В конце октября 2016 года стало известно, что помощник президента Пак Кын Хе Чой Сун Сил, не имевшая официальной должности в правительстве, использовала свое положение для получения денежных пожертвований от нескольких бизнес-конгломератов (известных как чеболь), включая Samsung, Hyundai, SK Group и Lotte, двум фондам, которые она контролировала. Голосование по импичменту состоялось 9 декабря 2016 года, когда 234 члена Национального собрания, состоящего из 300 членов, проголосовали за импичмент и временное приостановление президентских полномочий и обязанностей Пак Кын Хе."
  SKO_2024_revolution.t: "Военное положение?"
  SKO_2024_revolution.d: "3 декабря 2024 года в 22:27 по корейскому стандартному времени (KST) президент Южной Кореи Юн Сок Ёль объявил военное положение во время телеобращения. В своем заявлении он обвинил Демократическую партию (ДПК), имеющую большинство в Национальной ассамблее, в ведении \"антигосударственной деятельности\" и сотрудничестве с \"северокорейскими коммунистами\" с целью разрушения страны, создав тем самым \"законодательную диктатуру\". Это событие было широко охарактеризовано корейскими политиками и информационными организациями, как международными, так и внутри страны, как попытка государственного переворота."
  SKO_2024_1_revolution.t: "Импичмент Юн Сок Ёлю?"
  SKO_2024_1_revolution.d: "14 декабря 2024 года Национальное собрание объявило импичмент президенту Южной Кореи Юн Сок Ёлю. Это действие было предпринято в ответ на объявление Юном военного положения 3 декабря 2024 года, которое было отменено Национальным собранием и официально отозвано шесть часов спустя, 4 декабря 2024 года."
  ROC_1975_revolution.t: "Смерть Чан Кайши?"
  ROC_1975_revolution.d: "В 1975 году, через 26 лет после приезда Чанга на Тайвань, он умер в Тайбэе в возрасте 87 лет. В предыдущие месяцы он перенес сердечный приступ и пневмонию, а 5 апреля умер от почечной недостаточности, усугубленной прогрессирующей сердечной недостаточностью. Похороны Чанга состоялись 16 апреля. Йен Цзякан стал вторым президентом после смерти Чан Кайши."
  ROC_1978_revolution.t: "Возвышение Цзян Цзинго?"
  ROC_1978_revolution.d: "По мере того, как Чан Кайши вступал в свои последние годы, он постепенно давал больше обязанностей своему сыну, и когда он умер в апреле 1975 года, вице-президент Йен Цзя-кан стал президентом на оставшуюся часть срока Чан Кайши, в то время как Чан Цзинго сменил руководство Гоминьданом (он выбрал титул «Председатель», а не титул Чан-старшего «Генеральный директор»). Цзян Цзин-го был избран президентом Китайской Республики на президентских выборах 1978 года Национальным собранием Тайваня 20 мая 1978 года."
  NVM_1969_revolution.t: "Восстание Ле Дуана?"
  NVM_1969_revolution.d: "Ле Дуун был вьетнамским политиком-коммунистом. Он поднялся в партийной иерархии в конце 1950-х годов и стал генеральным секретарем Центрального комитета Коммунистической партии Вьетнама (ВКП) на 3-м Национальном конгрессе в 1960 году. Он продолжил политику Хо Ши Мина по управлению посредством коллективного руководства. С середины 1960-х годов (когда здоровье Хо ухудшалось) и до его собственной смерти в 1986 году он был высшим лицом, принимающим решения во Вьетнаме."
  NVM_1986_revolution.t: "Возвышение Нгуен Ван Линя?"
  NVM_1986_revolution.d: "Нгуен Ван Линь — вьетнамский революционер и политик. Нгуен Ван Линь был генеральным секретарем Коммунистической партии Вьетнама с 1986 по 1991 год и политическим лидером Вьетконга во время войны во Вьетнаме. Во время своего пребывания в должности Линь был решительным сторонником «Đổi Mới» (обновление), экономического плана, цель которого состоит в том, чтобы превратить экономику Вьетнама в социалистически ориентированную рыночную экономику. Таким образом, Линя часто рекламировали как «вьетнамского Горбачева» в честь советского лидера, который начал перестройку."
  BNG_2009_revolution.t: "Возвышение шейхи Хасины?"
  BNG_2009_revolution.d: "Второе премьерство Шейхи Хасины было отмечено неэффективным экономическим управлением и безудержной коррупцией, что привело к росту внешнего долга, росту инфляции, безработице среди молодежи и банковским нарушениям. Широко распространено мнение, что во время ее премьерства Бангладеш пережила откат от демократии. Хьюман Райтс Вотч задокументировала широкомасштабные насильственные исчезновения и внесудебные казни при ее правительстве. Многие политики и журналисты систематически и в судебном порядке наказывались за оспаривание ее взглядов."
  BNG_2024_revolution.t: "Возвращение демократии?"
  BNG_2024_revolution.d: "Хасина подала в отставку 5 августа 2024 года, когда большие толпы демонстрантов окружили резиденцию премьер-министра. О ее отставке объявил начальник штаба армии генерал Вакер-уз-Заман. Позже в тот же день Хасина хаотично сбежала в Индию сначала на машине, затем на вертолете и, наконец, на самолете. Она ушла без заявления об отставке. После роспуска парламента 6 августа 2024 года президент Бангладеш Мохаммед Шахабуддин назначил Юнуса главой временного правительства Бангладеш, удовлетворив требования студентов после отставки бывшего премьер-министра Шейх Хасины."
  AST_1975_revolution.t: "Покончить с политикой Белой Австралии?"
  AST_1975_revolution.d: "Начиная с 1950-х годов австралийцы начали переосмысливать свое отношение к расовым проблемам. Было основано движение за права аборигенов, которое поддержали многие либеральные белые австралийцы, а также была начата кампания против политики Белой Австралии. Референдум 1967 года был проведен и подавляющим большинством голосов одобрен для внесения поправок в Конституцию, устранения дискриминационных ссылок и предоставления национальному парламенту полномочий принимать законы специально для коренных австралийцев. Коренные австралийцы начали представляться в австралийских парламентах в 1970-х годах."
  FIJ_1987_revolution.t: "Государственный переворот на Фиджи?"
  FIJ_1987_revolution.d: "Государственный переворот на Фиджи в 1987 году привел к свержению избранного правительства премьер-министра Фиджи Тимоци Бавадры, свержению Елизаветы II с поста королевы Фиджи и провозглашению республики. Первый государственный переворот, в результате которого была свергнута Бавадра, произошел 14 мая 1987 года; второй государственный переворот 25 сентября положил конец монархии, за которым вскоре последовало провозглашение республики 10 октября. Обеими военными действиями руководил подполковник Ситивени Рабука, который в то время был третьим командующим Королевскими вооруженными силами Фиджи."
  FIJ_2000_revolution.t: "Государственный переворот на Фиджи?"
  FIJ_2000_revolution.d: "Государственный переворот на Фиджи 2000 года представлял собой гражданский государственный переворот, совершенный жесткими националистами и-таукей (этническими фиджийцами) против избранного правительства индо-фиджийского премьер-министра Махендры Чаудри 19 мая 2000 года. За этим последовала попытка 27 мая президента Рату сэра Камисесе Мара утвердить исполнительную власть, а затем военный переворот 29 мая со стороны Республики. командующего вооруженными силами Фиджи коммодора Фрэнка Байнимарамы."
  FIJ_2006_revolution.t: "Государственный переворот на Фиджи?"
  FIJ_2006_revolution.d: "Государственный переворот на Фиджи в декабре 2006 года — государственный переворот на Фиджи, осуществленный коммодором Фрэнком Байнимарамой против премьер-министра Лаисении Карасе и президента Хосефы Илоило. Это стало кульминацией политического кризиса, который начался в прошлом году, когда правительство Карасе представило в парламент Фиджи три законопроекта. Законопроекты о Коликоли, Земельном трибунале и Законопроекты о примирении, толерантности и единстве касались продолжающихся этнических конфликтов на Фиджи и последствий переворота 2000 года и считались проэтническими фиджийскими. Баинимарама, командующий Вооруженными силами Республики Фиджи (RFMF), 16 октября представил правительству список требований, который включал отзыв законопроектов."
  FIJ_2014_revolution.t: "Возвращение к демократии?"
  FIJ_2014_revolution.d: "17 сентября 2014 года на Фиджи состоялись всеобщие выборы для избрания 50 членов парламента. Партия «Фиджи-Первый», возглавляемая премьер-министром Фрэнком Баинимарамой, одержала убедительную победу, получив 32 из 50 мест. Первоначально выборы были запланированы на март 2009 года, но были отложены, поскольку политики не согласились с Народной хартией перемен, мира и прогресса. В период с 2009 по 2014 год было сделано несколько публичных заявлений и призывов к проведению выборов, и 23 марта 2014 года временное правительство объявило, что выборы состоятся 17 сентября 2014 года."
  AFG_1979_revolution.t: "Переворот Хафизуллы Амина?"
  AFG_1979_revolution.d: "Растущая личная борьба с генеральным секретарем Тараки в конечном итоге привела к тому, что Амин отобрал власть, затем успешно сверг его, а затем приказал его казнить; 16 сентября 1979 года Амин назвал себя председателем Совета министров (главой правительства), председателем Революционного совета (главой государства) и генеральным секретарем ЦК НДПА (верховным лидером)."
  AFG_1986_revolution.t: "Национальное примирение?"
  AFG_1986_revolution.d: "Президент Наджибулла запустил программу «Национальное примирение» в начале 1987 года, целью которой было объединение нации и прекращение войны, которая охватывала нацию в течение семи лет. В ноябре 1987 года Наджибулла успешно принял новую конституцию Афганистана, создав президентскую систему с выборным двухпалатным парламентом. Конституция провозгласила «священную религию ислама» официальной религией, гарантировала демократические права личности, узаконила создание «политических партий» и способствовала равенству между различными племенами и национальностями. В рамках новой структуры в 1988 году были проведены национальные парламентские выборы для избрания членов новой Национальной ассамблеи, первые подобные выборы в Афганистане за 19 лет."
  MLY_1951_revolution.t: "Убийство сэра Генри Герни?"
  MLY_1951_revolution.d: "Убийство сэра Генри Герни произошло 6 октября 1951 года в разгар чрезвычайной ситуации в Малайзии. Герни, британский верховный комиссар в Малайе, был убит членами Коммунистической партии Малайзии на Куала-Кубу-роуд по пути во Фрейзерс-Хилл на встречу."
  SGP_2024_revolution.t: "Премьер-министр Лоуренса Вонга?"
  SGP_2024_revolution.d: "6 июня 2022 года было объявлено о перестановках в кабинете министров, в результате которых Вонг был назначен заместителем премьер-министра, что еще больше укрепило его положение в качестве преемника премьер-министра Ли Сянь Лунга. Помимо того, что он стал заместителем премьер-министра, он также был назначен «исполняющим обязанности премьер-министра» в отсутствие Ли. Впоследствии Вонг стал очевидным преемником Ли на посту премьер-министра; Первоначальный план последнего уйти в отставку в возрасте 70 лет был осложнен уходом Хэна. 15 апреля 2024 года канцелярия премьер-министра опубликовала заявление для прессы, подтверждающее, что Лоуренс Вонг сменит Ли Сянь Лунга на посту премьер-министра."
  KAZ_1991_revolution.t: "Восстание Нурсултана Назарбаева?"
  KAZ_1991_revolution.d: "Политическая карьера Назарбаева началась в советскую эпоху, когда он вступил в Коммунистическую партию Советского Союза в 1962 году, работая рабочим на сталелитейном заводе. Поднявшись по партийной лестнице, он стал премьер-министром Казахской ССР в 1984 году и первым секретарем Коммунистической партии Казахстана в 1989 году. В 1990 году Верховный Совет избрал его президентом Казахстана. Назарбаев сыграл ключевую роль в прохождении Казахстана через распад Советского Союза, который привел к независимости страны в 1991 году. На первых прямых президентских выборах в стране в 1991 году Назарбаев появился в избирательных бюллетенях без сопротивления и одержал подавляющую победу."
  KAZ_2019_revolution.t: "Возвышение Касым-Жомарта Токаева?"
  KAZ_2019_revolution.d: "В 2019 году Токаев вступил в должность исполняющего обязанности президента после отставки Нурсултана Назарбаева. Будучи членом правящей партии «Аманат», он победил на внеочередных выборах в июне того же года при поддержке Назарбаева как кандидата от партии. За время своего президентства он провел несколько реформ, включая повышение зарплат рабочих, сокращение коррупции, отмену смертной казни и децентрализацию местного самоуправления. Несмотря на то, что ему удается поддерживать стабильность в стране, обеспечивать политический переход и проводить новые реформы, правительство Токаева остается авторитарным и нарушает права человека."
  UZB_1991_revolution.t: "Возвышение Ислама Каримова?"
  UZB_1991_revolution.d: "Ислам Абдуганиевич Каримов был узбекским политиком, который занимал пост первого президента Узбекистана с момента обретения страной независимости в 1991 году до своей смерти в 2016 году. Он правил репрессивным авторитарным режимом в Узбекистане, где убивали политических оппонентов, подавлялись права человека и запрещалось инакомыслие; однако смертная казнь была отменена в 1998 году."
  UZB_2016_revolution.t: "Приход Шавката Мирзиёева?"
  UZB_2016_revolution.d: "Шавкат Миромонович Мирзиёев — узбекский политик, занимавший пост президента Узбекистана и Верховного главнокомандующего Вооружёнными Силами Узбекистана с 14 декабря 2016 года. Ранее Мирзиёев возглавлял правительство в качестве премьер-министра Узбекистана с 2003 по 2016 год. Под своим президентством Мирзиёев реализовал ряд либеральных реформ в политической и экономической системе Узбекистана, привлекая иностранные инвестиции, улучшая отношения с соседними центральноазиатскими странами. стран, а также освобождение политических заключенных, которое, в частности, сопровождалось закрытием печально известной тюрьмы Жаслык в 2019 году."
  TKM_1991_revolution.t: "Возвышение Сапармурата Ниязова?"
  TKM_1991_revolution.d: "Сапармурат Атаевич Ниязов был туркменским политиком, руководившим Туркменистаном с 1985 года до своей смерти в 2006 году. Он был первым секретарем Коммунистической партии Туркменистана с 1985 по 1991 год и поддержал попытку советского государственного переворота 1991 года. Он продолжал править Туркменистаном в качестве первого президента в течение 15 лет после обретения независимости от Советского Союза в 1991 году."
  TKM_2006_revolution.t: "Приход к власти Гурбангулы Бердымухамедова?"
  TKM_2006_revolution.d: "Гурбангулы Маликгулыевич Бердымухамедов — туркменский политик, бывший стоматолог, председатель Народного совета Туркменистана. Ранее он занимал пост второго президента Туркменистана с 2006 по 2022 год, когда заключил соглашение о разделе власти со своим сыном Сердаром."
  TKM_2022_revolution.t: "Приход Сердара Бердымухамедова?"
  TKM_2022_revolution.d: "Сердар Гурбангулыевич Бердымухамедов — туркменский политик, который занимал пост третьего и четвертого президента Туркменистана с 2022 года. Бердымухамедов ранее занимал ряд других должностей в правительстве своего отца Гурбангулы, давнего авторитарного правителя Туркменистана. В 2022 году отец и сын заключили соглашение о разделе власти, согласно которому они совместно управляют тоталитарной диктатурой в Туркменистане."
  TAJ_1991_revolution.t: "Восстание Рахмона Набиева?"
  TAJ_1991_revolution.d: "Рахмон Набиевич Набиев был таджикским политиком, который занимал пост первого секретаря Коммунистической партии Таджикистана с 1982 по 1985 год и дважды был вторым президентом Таджикистана с 23 сентября 1991 года по 6 октября 1991 года и со 2 декабря 1991 года по 7 сентября 1992 года."
  TAJ_1992_revolution.t: "Приход к власти Эмомали Рахмона?"
  TAJ_1992_revolution.d: "Эмомали Рахмон — таджикский политик, занимающий пост президента Таджикистана с 1994 года. Рахмон возглавляет авторитарный режим в Таджикистане с элементами культа личности. Политические оппоненты репрессируются, права и свободы человека серьезно нарушаются, выборы не являются свободными и справедливыми, процветают коррупция и кумовство."
  KYR_1990_revolution.t: "Возвышение Аскара Акаева?"
  KYR_1990_revolution.d: "Аскар Акаевич Акаев — бывший кыргызский политик, который занимал пост президента Кыргызстана с 1990 года до своего свержения в результате «тюльпановой революции» в марте 2005 года."
  KYR_2005_revolution.t: "Тюльпановая революция?"
  KYR_2005_revolution.d: "Революция тюльпанов, также известная как Первая кыргызская революция, привела к отстранению от власти тогдашнего президента Кыргызстана Аскара Акаева. Революция началась после парламентских выборов 27 февраля и 13 марта 2005 года. Революционеры заявляли о коррупции и авторитаризме Акаева, его семьи и сторонников. Акаев бежал в Казахстан, а затем в Россию."
  SOV_khrushchev_thaw.t: "Хрущевская оттепель?"
  SOV_khrushchev_thaw.d: "Хрущевская оттепель — это период с середины 1950-х до середины 1960-х годов, когда репрессии и цензура в Советском Союзе были ослаблены из-за политики Никиты Хрущева по десталинизации и мирному сосуществованию с другими странами."
  SOV_detente.t: "Сближение с Западом?"
  SOV_detente.d: "За восемнадцать лет своего пребывания на посту лидера СССР отличительной внешнеполитической инновацией Брежнева было содействие разрядке. Хотя политика Брежнева имела некоторые сходства с подходами, применявшимися во время хрущевской оттепели, она существенно отличалась от прецедента Хрущева по двум причинам. Во-первых, он был более всеобъемлющим и масштабным по своим целям и включал подписание соглашений о контроле над вооружениями, предотвращении кризисов, торговле между Востоком и Западом, европейской безопасности и правах человека. Вторая часть политики была основана на важности выравнивания военной мощи Соединенных Штатов и Советского Союза."
  SOV_brezhnev_succession.t: "Смерть Леонида Брежнева"
  SOV_brezhnev_succession.d: "После 1975 года здоровье Брежнева резко ухудшилось, и он все больше отходил от международных дел, сохраняя при этом власть. Он умер 10 ноября 1982 года, и на посту генерального секретаря его сменил Юрий Андропов."
  SOV_andropov_succession_option.1: "Юрий Андропов – наше будущее!"
  SOV_andropov_succession.t: "Смерть Юрия Андропова"
  SOV_andropov_succession.d: "После почечной недостаточности в феврале 1983 года здоровье Андропова начало быстро ухудшаться. Он умер 9 февраля 1984 года, руководив страной около 15 месяцев. После смерти Брежнева и его преемника Юрия Андропова Черненко был избран Генеральным секретарем в феврале 1984 года и председателем Президиума Верховного Совета в апреле 1984 года. Из-за резко ухудшающегося здоровья он часто был не в состоянии выполнять свои служебные обязанности."
  SOV_chernenko_succession_option.1: "Константин Черненко – наше будущее?"
  SOV_glasnost.t: "Ввести гласность?"
  SOV_glasnost.d: "Гласность воспринималась как повышение открытости и прозрачности государственных учреждений и деятельности в Советском Союзе (СССР). Гласность отражала стремление администрации Горбачева позволить советским гражданам публично обсуждать проблемы своей системы и возможные решения."
  SOV_democratisation.t: "Принять демократизацию?"
  SOV_democratisation.d: "Демократизация была лозунгом, выдвинутым Генеральным секретарем Коммунистической партии Советского Союза Михаилом Горбачевым в январе 1987 года, призывающим к вливанию «демократических» элементов в однопартийное правительство Советского Союза. Демократизация Горбачева означала введение выборов с участием нескольких кандидатов, хотя и не многопартийных, для местных чиновников Коммунистической партии (КПСС) и Советов. Таким образом он надеялся омолодить партию прогрессивными кадрами, которые проведут его институциональные и политические реформы."
  MGL_1952_revolution.t: "Возвышение Юмджаагийн Цеденбал?"
  MGL_1952_revolution.d: "26 января 1952 года после смерти Чойбалсана к власти в Монголии пришел Юмджаагийн Цеденбал. Цеденбал был ведущей политической фигурой Монголии более 30 лет."
  MGL_1984_revolution.t: "Возвышение Джамбына Батмонха?"
  MGL_1984_revolution.d: "В 1984 году Батмёнх вместе с Д. Моломьямцем сыграл ключевую роль в облегчении ухода Цеденбала от власти. В 1984 году он стал главой государства, когда давний лидер партии Юмджаагийн Цеденбал был свергнут на партийном съезде."
  USA_2020_revolution.t: "Политизировать государственную службу США?"
  USA_2020_revolution.d: "Приложение F было создано Указом № 13957 от 21 октября 2020 года. Целью этого положения было усиление контроля Президента над федеральной кадровой государственной службой. Его широко раскритиковали как средство отомстить федеральным чиновникам по политическим мотивам. Было подсчитано, что десятки или сотни тысяч профессиональных служащих могли лишиться защиты государственной службы, в результате чего количество политических назначений увеличилось в десять раз."
  yugoslav_soviet_split.t: "Советско-югославский раскол"
  yugoslav_soviet_split.d: "Раскол Тито-Сталин или советско-югославский раскол стал кульминацией конфликта между политическим руководством Югославии и Советского Союза под руководством Иосипа Броз Тито и Иосифа Сталина, соответственно, в годы после Второй мировой войны. Хотя обе стороны представляли этот конфликт как идеологический спор, он в равной степени был продуктом геополитической борьбы на Балканах, в которой также участвовали Албания, Болгария и коммунистическое восстание в Греции, которое Югославия Тито поддерживала, а Советский Союз тайно выступал против."
  soviet_east_germany_1.indy.t: "Основание Восточной Германии?"
  soviet_east_germany_1.indy.d: "Основание Восточной Германии произошло 7 октября 1949 года, и в последующие дни произошел ряд связанных с этим событий, в том числе были сформированы Временная народная палата, Палата государств и Временное правительство Восточной Германии, а первым президентом был избран Вильгельм Пик. Во время существования Германской Демократической Республики событие основания ежегодно отмечалось в День Республики, который был государственным праздником."
  yugoslav_soviet_split.option.1: "Хватит спорить, порвите с Югославией!"
  yugoslav_soviet_split.option.2: "Пусть разногласия продолжаются..."
  yugoslav_soviet_split.option.3: "Мы все равно никогда не любили Советы!"
  Malagasy_war.t: "Малагасийское восстание"
  Malagasy_war.d: "Малагасийское восстание — малагасийское националистическое восстание против французского колониального правления на Мадагаскаре, продолжавшееся с марта 1947 по февраль 1949 года. Вечером 29 марта 1947 года малагасийские националисты, вооруженные в основном копьями, предприняли скоординированные внезапные нападения на военные базы и принадлежащие французам плантации в восточной части острова, сосредоточенные вокруг Мораманги и Манакары. Националистические настроения были быстро приняты на юге и к следующему месяцу распространились на центральные высокогорья и столицу Антананариву, при этом число малагасийских боевиков-националистов оценивается более чем в один миллион."
  brunei_revolt_1962.t: "Брунейское восстание"
  brunei_revolt_1962.d: "Брунейское восстание было восстанием в британском протекторате Бруней противников предложенного включения его монархии в Федерацию Малайзии. Повстанцы были членами ТНКУ (Национальная армия Северного Калимантана), ополчения, поставляемого Индонезией и связанного с левой Народной партией Брунея (БНР), которая выступала за проиндонезийскую Федерацию Северного Борнео."
  CCW_war.ROC.t: "Битва за остров Хайнань"
  CCW_war.ROC.d: "Битва за остров Хайнань произошла в 1950 году, на заключительном этапе Гражданской войны в Китае. Китайская Народная Республика (КНР) провела десантный десант на остров Хайнань 16 апреля при поддержке коммунистического движения Хайнаня, которое контролировало большую часть внутренних районов острова, в то время как Китайская Республика (Китайская республика) контролировала побережье; их силы были сосредоточены на севере возле Хайкоу и были вынуждены отступить на юг после высадки десанта. К концу месяца коммунисты захватили южные города Хайнаня и 1 мая объявили о победе."
  chinese_civil_wars.option.1: "Остановить войну на Хайнане"
  chinese_civil_wars.option.2: "На Хайнань, затем на Тайвань!"
  maluku_war.IDO.t: "Восстание Южного Малуку"
  maluku_war.IDO.d: "Не доверяя яванской и мусульманской Республике Индонезия, в основном протестантские и проголландские южные молукканцы, которые долгое время предоставляли силы Королевской нидерландской Ост-Индской армии (KNIL), провозгласили независимость Республики Южный Малуку в Амбоне и Сераме 25 апреля 1950 года. Это не было признано Сукарно, и по его приказу индонезийские военные вторглись на молуккский остров Буру и часть острова Индонезия. Керам."
  khuzestan_war.PER.t: "Хузестанское восстание"
  khuzestan_war.PER.d: "Хузестанское восстание 1979 года было одним из общенациональных восстаний в Иране, вспыхнувших после иранской революции. Беспорядки были подпитаны требованиями арабов об автономии. Восстание было эффективно подавлено иранскими силами безопасности, в результате чего с обеих сторон было убито более ста человек."
  azawad_war.MAL.t: "Малийская война"
  azawad_war.MAL.d: "22 марта 2012 года президент Амаду Тумани Туре был свергнут в результате государственного переворота из-за того, как он справился с кризисом, за месяц до того, как должны были состояться президентские выборы. Мятежные солдаты, назвавшие себя Национальным комитетом восстановления демократии и государства (CNRDR), взяли под свой контроль и приостановили действие конституции Мали. В результате нестабильности, возникшей после переворота, три крупнейших северных города Мали — Кидаль, Гао и Тимбукту — были захвачены повстанцами три дня подряд. 5 апреля 2012 года, после захвата Дуэнцы, НДОА заявило, что достигло своих целей, и прекратило наступление. На следующий день оно провозгласило независимость севера Мали от остальной части страны, переименовав его в Азавад."
  kurdish_war.PER.t: "Курдское восстание"
  kurdish_war.PER.d: "Курдское восстание 1979 года в Иране было одним из крупнейших общенациональных восстаний в стране против нового государства после иранской революции. Курдское восстание началось в середине марта, всего через два месяца после окончания революции, и было одним из самых интенсивных курдских восстаний в современном Иране."
  balochistan_war.PAK.t: "Белуджистанское восстание"
  balochistan_war.PAK.d: "Четвертый Белуджистанский конфликт — четырехлетний военный конфликт в Белуджистане, крупнейшей провинции Пакистана, между пакистанской армией и белуджскими сепаратистами и соплеменниками, который длился с 1973 по 1977 год. Конфликт начался в 1973 году, вскоре после того, как тогдашний президент Пакистана Зульфикар Али Бхутто распустил избранное провинциальное правительство Белуджистана под предлогом того, что в посольстве Ирака было обнаружено оружие. якобы для повстанцев-белуджей. Последовавший за этим протест против отставки законно избранного правительства также привел к призывам к отделению Белуджистана, на которые Бхутто приказал ввести пакистанскую армию в провинцию."
  chechen_war_2.RUS.t: "Вторая чеченская война"
  chechen_war_2.RUS.d: "Вторая чеченская война происходила в Чечне и приграничных регионах Северного Кавказа между Российской Федерацией и самопровозглашенной Чеченской Республикой Ичкерия с августа 1999 года по апрель 2009 года. В августе 1999 года исламисты-изгои из Чечни проникли в Дагестан в Россию. Позже в сентябре в российских городах произошли взрывы жилых домов, в результате которых погибло более 300 человек. Российские власти поспешили обвинить во взрывах чеченцев, хотя ни один чеченец, ни полевой командир, ни кто-либо другой, не взял на себя ответственность за нападения. В ходе первой кампании российские военные и пророссийские чеченские военизированные формирования столкнулись в открытом бою с чеченскими сепаратистами и захватили столицу Чечни Грозный после зимней осады, продолжавшейся с декабря 1999 года по февраль 2000 года."
  bosnian_war.BOS.t: "Боснийская война"
  bosnian_war.BOS.d: "Боснийская война — международный вооруженный конфликт, который произошел в Боснии и Герцеговине в период с 1992 по 1995 год. Обычно считается, что война началась 6 апреля 1992 года после нескольких более ранних инцидентов с применением насилия. Оно завершилось 14 декабря 1995 года, когда были подписаны Дейтонские соглашения. Основными воюющими сторонами были силы Республики Боснии и Герцеговины, Республики Герцег-Босния и Республики Сербской, причем два последних образования были протогосударствами, возглавляемыми и снабжаемыми Хорватией и Сербией соответственно."
  tajikistani_war.TAJ.t: "Гражданская война в Таджикистане"
  tajikistani_war.TAJ.d: "Гражданская война в Таджикистане началась в мае 1992 года и завершилась в июне 1997 года. Против вновь сформированного правительства президента Рахмона Набиева, в котором доминировали выходцы из Худжандской и Кулябской областей, восстали региональные группы из Гармского и Горно-Бадахшанского районов Таджикистана. Повстанческие группы возглавляли либерально-демократические реформаторы и исламисты, которые позже организовались под знаменем Объединенной таджикской оппозиции."
  angolan_war.ANG.t: "Гражданская война в Анголе"
  angolan_war.ANG.d: "Гражданская война в Анголе — гражданская война в Анголе, начавшаяся в 1975 году и продолжавшаяся с перерывами до 2002 года. Война началась сразу после того, как Ангола стала независимой от Португалии в ноябре 1975 года. Это была борьба за власть между двумя бывшими антиколониальными партизанскими движениями, коммунистическим Народным движением за освобождение Анголы (МПЛА) и антикоммунистическим Национальным союзом за полную независимость Анголы (УНИТА)."
  mozambican_war.MOZ.t: "Гражданская война в Мозамбике"
  mozambican_war.MOZ.d: "Гражданская война в Мозамбике — гражданская война, которая велась в Мозамбике с 1977 по 1992 год из-за сочетания местных распрей и поляризующего воздействия политики холодной войны. Боевые действия велись между правящим в Мозамбике марксистским Фронтом освобождения Мозамбика (ФРЕЛИМО), антикоммунистическими повстанческими силами Мозамбикского национального сопротивления (РЕНАМО) и рядом более мелких фракций, таких как ПРМ, УНАМО, КОРЕМО, УНИПОМО и FUMO."
  Casamance_war.SEN.t: "Казаманский конфликт"
  Casamance_war.SEN.d: "Конфликт Казаманс — это длительная сепаратистская борьба на юге Сенегала, действующая с 1982 года. Конфликт, сосредоточенный вокруг Движения демократических сил Казаманса (MFDC), проистекает из региональных недовольств по поводу маргинализации, земельных прав и культурной самобытности. Казаманс, географически изолированный и этнически обособленный, стремится к автономии от центрального правительства. Хотя пик интенсивных боевых действий пришелся на 1990-е годы, насилие сохраняется на низком уровне, со спорадическими столкновениями и угрозами мин."
  kashmir_insurgency_war.t: "Кашмирское восстание"
  kashmir_insurgency_war.d: "В 1989 году в Джамму и Кашмире вспыхнуло восстание, поскольку разочарование в политических институтах спровоцировало вооруженное восстание. Похищение Рубии Саид Фронтом освобождения Джамму и Кашмира символизировало беспорядки. При поддержке Пакистана группировки боевиков нападали на чиновников и гражданских лиц, разжигая десятилетия конфликта, который изменил региональную геополитику и безопасность."
  sudan_civil_war_2023.t: "Гражданская война в Судане"
  sudan_civil_war_2023.d: "С 15 апреля 2023 года в Судане идет активная гражданская война между двумя конкурирующими группировками военного правительства страны. В конфликте участвует международно признанное правительство, контролируемое Суданскими вооруженными силами (СВС), возглавляемое генералом Абдель Фаттахом аль-Бурханом и состоящее из армии, военно-морского флота, военно-воздушных сил и республиканской гвардии; и военизированные силы быстрой поддержки (RSF), возглавляемые генералом Хемедти, который возглавляет более широкую коалицию «Джанджавид»."
  SSD_war.SUD.t: "Ананьинское восстание"
  SSD_war.SUD.d: "Первая гражданская война в Судане (также известная как восстание Аньянья) велась с 1955 по 1972 год между северной частью Судана и южным регионом Судана, что требовало представительства и большей региональной автономии. Война была разделена на четыре основных этапа: начальная партизанская война, создание повстанческого движения Аньянья, политическая борьба внутри правительства и создание Освободительного движения Южного Судана. За время почти 17-летней войны погибло около миллиона человек."
  SOV_economic_perestroika.t: "Закон о кооперативах?"
  SOV_economic_perestroika.d: "Закон о кооперативах, принятый в мае 1988 года, был, пожалуй, самой радикальной из экономических реформ начала эпохи Горбачева. Впервые с момента отмены новой экономической политики Владимира Ленина в 1928 году закон разрешил частную собственность на предприятия в сфере услуг, промышленности и внешней торговли."
  BUL_NEM_Reforms.t: "Новая система управления?"
  BUL_NEM_Reforms.d: "Конкретными стимулами к реформам были нехватка рабочей силы и энергии, а также растущее значение внешней торговли в годы «оттепели» середины 1960-х годов. Следовательно, в 1962 году Четвертый пятилетний план положил начало эпохе экономических реформ, которые принесли ряд новых подходов к старой цели интенсивного роста. В промышленности «Новая система управления» была введена в 1964 году и просуществовала до 1968 года. Этот подход был направлен на оптимизацию хозяйственных подразделений и повышение ответственности руководителей предприятий за результаты деятельности."
  CHI_USA_Investment.t: "Содействие иностранным инвестициям в Китае?"
  CHI_USA_Investment.d: "Во время холодной войны значительный сегмент торговли Китая с третьим миром финансировался за счет грантов, кредитов и других форм помощи. Однако после смерти Мао Цзэдуна в 1976 году эти усилия были свернуты. После этого торговля с развивающимися странами стала незначительной, хотя за это время Гонконг и Тайвань начали становиться крупными торговыми партнерами. С тех пор как в конце 1970-х годов начались экономические реформы, Китай стремился децентрализовать свою внешнеторговую систему, чтобы интегрироваться в международную торговую систему."
  DAI_USA_Investment.t: "Содействие иностранным инвестициям во Вьетнаме?"
  DAI_USA_Investment.d: "В 1990 году был принят Закон о частных предприятиях, который обеспечил правовую основу для частных фирм, а Закон о компаниях признал акционерные общества и частные компании с ограниченной ответственностью. В том же году партия начала обсуждать потенциал приватизации государственных предприятий (ГП), а также нормализации отношений с Китайской Народной Республикой. Впоследствии Конституция 1992 года официально признала роль частного сектора. В то время как внешняя торговля контролировалась централизованно государством, государство начало ослаблять контроль над внешней торговлей."
  SOV_USA_Investment.t: "Содействовать иностранным инвестициям в Советском Союзе?"
  SOV_USA_Investment.d: "Горбачев принес перестройку во внешнеэкономическую сферу Советского Союза мерами, которые советские экономисты в то время считали смелыми. Его программа фактически ликвидировала монополию, которую когда-то имело Министерство внешней торговли на большинство торговых операций. Это позволило министерствам различных отраслей промышленности и сельского хозяйства вести внешнюю торговлю в секторах, находящихся под их ответственностью, вместо того, чтобы действовать косвенно через бюрократию организаций министерства торговли. Кроме того, региональным и местным организациям и отдельным государственным предприятиям было разрешено вести внешнюю торговлю."
  PRC_LRR_Reforms.t: "Движение за земельную реформу?"
  PRC_LRR_Reforms.d: "Движение за земельную реформу — массовое движение, возглавляемое лидером Коммунистической партии Китая (КПК) Мао Цзэдуном на позднем этапе гражданской войны в Китае после окончания Второй китайско-японской войны в 1945 году, а также в ранней Китайской Народной Республике, которое добилось перераспределения земли в пользу крестьянства. У землевладельцев, статус которых теоретически определялся через процент доходов, полученных от эксплуатации, а не от труда, конфисковали землю, и они подверглись массовым убийствам со стороны КПК и бывших арендаторов, при этом число погибших, по оценкам, варьировалось от сотен тысяч до миллионов."
  NVM_LRR_Reforms.t: "Кампания по земельной реформе?"
  NVM_LRR_Reforms.d: "В 1953 году вышел ряд декретов и законов о земельной реформе. Центральный комитет VWP оценил возможность перехода к последней фазе земельной революции: перераспределению сельскохозяйственных земель, за которым последовал самый важный закон о земельной реформе, обнародованный 19 декабря 1953 года, который можно рассматривать как платформу и предпосылку земельной реформы. Вскоре после того, как закон был принят национальным конгрессом, с декабря 1953 по март 1954 года в провинции Тхай Нгуен прошла экспериментальная волна земельной реформы. Затем земельная реформа в пять волн распространилась на более крупные территории."
  SRL_NEM_Reforms.t: "Экономические реформы Шри-Ланки?"
  SRL_NEM_Reforms.d: "Джуниус Ричард Джаеварден был шри-ланкийским юристом, государственным чиновником и государственным деятелем, который занимал пост премьер-министра Шри-Ланки с 1977 по 1978 год и второго президента Шри-Ланки с 1978 по 1989 год. Противоречивая фигура в истории Шри-Ланки, в то время как открытая экономическая система, которую он ввел в 1978 году, вывела страну из экономического кризиса, с которым Шри-Ланка столкнулась в результате предшествующей закрытой экономической политики."
  PER_NEM_Reforms.t: "Белая революция?"
  PER_NEM_Reforms.d: "Белая революция представляла собой серию далеко идущих реформ, приведших к агрессивной модернизации Имперского государства Иран, начатой ​​26 января 1963 года шахом Мохаммадом Резой Пехлеви и продолжавшейся до 1979 года. Реформы привели к значительному перераспределению богатства в пользу рабочего класса Ирана, взрывному экономическому росту в последующие десятилетия, быстрой урбанизации и деконструкции феодальных обычаев Ирана."
  european_welfare_state.t: "[ROOT.GetCountry.GetAdjectiveNoFormatting] благосостояние?"
  european_welfare_state.d: "Политическая экономия Европы определялась с 1950-х годов развитием в каждой европейской стране более или менее всеобъемлющей модели благосостояния, в соответствии с которой государство взяло на себя центральную роль в предоставлении ряда социальных льгот, наиболее дорогостоящими из которых являются пенсии, поддержка бедных, социальное жилье и здравоохранение."
  PER_ELR_Reforms.t: "Иранская экономическая либерализация?"
  PER_ELR_Reforms.d: "Али Акбар Хашими Бахрамани Рафсанджани был иранским политиком и писателем, который занимал пост четвертого президента Ирана с 1989 по 1997 год. Он поддерживал позицию капиталистического свободного рынка внутри страны, выступал за приватизацию государственных предприятий и умеренную позицию на международном уровне, стремясь избежать конфликта с Соединенными Штатами и Западом."
  ISR_ELR_Reforms.t: "Израильская экономическая либерализация?"
  ISR_ELR_Reforms.d: "Рабин существенно реформировал экономику Израиля, а также его системы образования и здравоохранения. Его правительство значительно расширило приватизацию бизнеса, отойдя от традиционно социализированной экономики страны. В 1993 году его правительство учредило программу «Йозма», в рамках которой привлекательные налоговые льготы предлагались иностранным венчурным фондам, инвестировавшим в Израиль, и обещали удвоить любые инвестиции при государственном финансировании. В результате иностранные венчурные фонды вложили значительные средства в растущую израильскую индустрию высоких технологий, способствуя экономическому росту Израиля и статусу мирового лидера в области высоких технологий."
  oil_crisis_1973.t: "Первый нефтяной кризис?"
  oil_crisis_1973.d: "В октябре 1973 года Организация арабских стран-экспортеров нефти (ОАПЕК) объявила, что вводит полное нефтяное эмбарго против стран, которые поддерживали Израиль на любом этапе войны Судного дня 1973 года, которая началась после того, как Египет и Сирия предприняли крупномасштабное внезапное нападение в конечном итоге безуспешной попытке вернуть территории, которые они потеряли Израилю во время Шестидневной войны 1967 года. После того, как эмбарго было введено в действие, оно вызвало нефтяной кризис или «шок», который имел множество краткосрочных и долгосрочных последствий для мировой экономики, а также для глобальной политики."
  oil_crisis_1979.t: "Второй нефтяной кризис?"
  oil_crisis_1979.d: "Снижение добычи нефти после Иранской революции привело к энергетическому кризису 1979 года. Хотя мировые запасы нефти сократились всего примерно на четыре процента, реакция нефтяных рынков привела к резкому росту цен на сырую нефть в течение следующих 12 месяцев, более чем вдвое увеличив их до 39,50 долларов за баррель (248 долларов за кубометр). Внезапное повышение цен было связано с дефицитом топлива, аналогичным нефтяному кризису 1973 года."
  GUA_Land_Reforms.t: "Принять Указ 900?"
  GUA_Land_Reforms.d: "Указ № 900 — закон о земельной реформе в Гватемале, принятый 17 июня 1952 года во время Гватемальской революции. Закон был представлен президентом Хакобо Арбенсом Гусманом и принят Конгрессом Гватемалы. Он перераспределил неиспользуемую землю площадью более 90 гектаров (224 акра) среди местных крестьян, компенсируя землевладельцам государственные облигации. Земля не более чем из 1700 поместий была перераспределена между примерно 500 000 человек — одной шестой населения страны. Целью закона было перевести экономику Гватемалы из псевдофеодализма в капитализм."
  GBR_brexit.t: "Брексит?"
  GBR_brexit.d: "Брексит – это выход Соединенного Королевства (Великобритании) из Европейского Союза (ЕС). После референдума, проведенного в Великобритании 23 июня 2016 года, Брексит официально состоялся в 23:00 по Гринвичу 31 января 2020 года (00:00 1 февраля 2020 года по центральноевропейскому времени). Великобритания, которая 1 января 1973 года присоединилась к Европейскому сообществу (ЕС), предшественнику ЕС, является единственным государством-членом, вышедшим из ЕС. После Брексита законодательство ЕС и Суд Европейского Союза больше не имеют приоритета над британскими законами. Закон о Европейском Союзе (выходе) 2018 года сохраняет соответствующие законы ЕС в качестве внутреннего закона, который Великобритания может изменить или отменить."
  JAP_ELR_Reforms.t: "Ввести абэномику?"
  JAP_ELR_Reforms.d: "Абэномика относится к экономической политике, проводимой правительством Японии после всеобщих выборов в декабре 2012 года. Абэномика основана на трех стрелах: смягчении денежно-кредитной политики со стороны Банка Японии, налогово-бюджетном стимулировании посредством государственных расходов и структурных реформах. The Economist охарактеризовал программу как «сочетание рефляции, государственных расходов и стратегии роста, призванной вывести экономику из анабиоза, который охватывал ее более двух десятилетий». Термин «абэномика» представляет собой смесь Абэ и экономики."
  PHI_ELR_Reforms.t: "Принять экономическую либерализацию?"
  PHI_ELR_Reforms.d: "Фидель Вальдес Рамос CCLH GCS KGCR, широко известный как FVR, был филиппинским генералом и политиком, занимавшим пост 12-го президента Филиппин с 1992 по 1998 год. Во время своего правления Рамос начал проводить экономические реформы, направленные на открытие некогда закрытой национальной экономики, поощрение частного предпринимательства, привлечение большего количества иностранных и внутренних инвестиций и снижение коррупции. Рамос положил конец монополии правительства на небо и открыл авиацию для новых игроков."
  USA_Trade_War_2025.t: "Торговая война Трампа?"
  USA_Trade_War_2025.d: "Пошлины, введенные во время второго президентства Дональда Трампа, ознаменовали резкую эскалацию протекционистской торговой политики в Соединенных Штатах: президент Дональд Трамп объявил о серии высоких тарифов почти на все товары, импортируемые в США. Объявление о введении спорно названных «взаимных тарифов» вызвало ответные меры со стороны торговых партнеров и спровоцировало крах фондового рынка."
  SOV_Kosygin_Reforms_Rollback.t: "Провал реформ Косыгина?"
  SOV_Kosygin_Reforms_Rollback.d: "Советская экономическая реформа 1965 года, иногда называемая реформой Косыгина или реформой Либермана, по имени Е.Г. Либермана, представлял собой комплекс плановых изменений в экономике СССР. Центральным элементом этих изменений стало введение прибыльности и продаж как двух ключевых показателей успеха предприятия. Успех указанных реформ был недолгим, а пражские события 1968 года, вызванные проведением Москвой реформ в странах Восточного блока, привели к свертыванию реформ."
  SPA_ELR_Reforms.t: "Принять экономическую либерализацию?"
  SPA_ELR_Reforms.d: "После очень медленного восстановления после разрушительной гражданской войны 1936-1939 годов «экономическое чудо» было инициировано реформами, продвигаемыми группой экономических «технократов», которые при поддержке Франсиско Франко ввели новую политику экономического развития Испании. «Технократы», многие из которых были членами Opus Dei, представляли собой новое поколение политиков, пришедших на смену старой фалангистской гвардии. Они отказались от политики автаркии и реализовали «планы развития», которые предусматривали либерализацию торговли и быстрый рост промышленности."
  SIR_ELR_Reforms.t: "Принять экономическую либерализацию?"
  SIR_ELR_Reforms.d: "«Кельтский тигр» — это термин, обозначающий экономику Ирландии с середины 1990-х до конца 2000-х годов, периода быстрого реального экономического роста, подпитываемого прямыми иностранными инвестициями. Историк Р. Ф. Фостер утверждает, что причиной стало сочетание нового чувства инициативы и прихода на рынок американских корпораций, таких как Intel. Он заключает, что главными факторами были низкое налогообложение, политика регулирования, ориентированная на бизнес, и молодая, технически подкованная рабочая сила. Для многих транснациональных корпораций решение вести бизнес в Ирландии было еще проще благодаря щедрым стимулам со стороны Управления промышленного развития."
  XEU_EE_Expansion_2004.t: "Вступить в Евросоюз?"
  XEU_EE_Expansion_2004.d: "Самое крупное расширение Европейского Союза (ЕС) по количеству государств и численности населения произошло 1 мая 2004 года. Частью той же волны расширения было вступление в него Болгарии и Румынии в 2007 году, которые не смогли присоединиться в 2004 году, но, по мнению Европейской комиссии, являются частью пятого расширения."
  GBR_ELR_Reforms.t: "Большой взрыв?"
  GBR_ELR_Reforms.d: "Консервативное правительство 1980-х годов во главе с Маргарет Тэтчер инициировало радикальную политику монетаризма, дерегулирования, особенно финансового сектора (например, «Большой взрыв» в 1986 году) и рынков труда, продажи государственных компаний (приватизация) и отмены субсидий другим."
  BRU_SGP_Reforms.t: "Экономическое партнерство Брунея и Сингапура?"
  BRU_SGP_Reforms.d: "Сингапур и Бруней связывают уникально глубокое экономическое и стратегическое партнерство, основанное на доверии и взаимном уважении. Их Соглашение о взаимозаменяемости валют, оборонное сотрудничество и совместные предприятия в области финансов, энергетики и образования отражают прочные связи."
  PER_Oil_Nationalisation_1951.t: "Национализировать иранскую нефтяную промышленность?"
  PER_Oil_Nationalisation_1951.d: "В 1951 году парламент Ирана во главе с Мохаммадом Мосаддыком проголосовал за национализацию Англо-Иранской нефтяной компании. Этот смелый шаг положил конец британскому контролю над иранской нефтью, в результате чего была создана Национальная иранская нефтяная компания. Это вызвало международную реакцию, особенно со стороны Великобритании и США."
  GCC_Union.t: "Совет сотрудничества стран Персидского залива?"
  GCC_Union_1.t: "Расширить Совет сотрудничества стран Персидского залива?"
  GCC_Union_2.t: "Вступить в Совет сотрудничества стран Персидского залива?"
  GCC_Union.d: "Совет сотрудничества арабских государств Персидского залива, также известный как Совет сотрудничества арабских государств Персидского залива, представляет собой региональный, межправительственный, политический, экономический союз и военный альянс, включающий Бахрейн, Кувейт, Оман, Катар, Саудовскую Аравию и Объединенные Арабские Эмираты. Главный штаб совета находится в Эр-Рияде, столице Саудовской Аравии. Устав GCC был подписан 25 мая 1981 года, официально учредив это учреждение."
  Eurasian_Economic_Community.t: "Евразийское экономическое сообщество?"
  Eurasian_Economic_Community.d: "Евразийское экономическое сообщество (ЕАЭС или ЕврАзЭС) было региональной организацией в период с 2000 по 2014 год, целью которой была экономическая интеграция его государств-членов. Организация возникла на базе Содружества Независимых Государств (СНГ) 29 марта 1996 года, а договор о создании Евразийского экономического сообщества был подписан 10 октября 2000 года в столице Казахстана Астане."
  Eurasian_Single_Market.t: "Евразийский Таможенный Союз?"
  Eurasian_Single_Market.d: "Евразийский таможенный союз — таможенный союз государств-членов Евразийского экономического союза (ЕАЭС): Армении, Белоруссии, Казахстана, Кыргызстана и России. Он предусматривает свободное перемещение товаров внутри союза и единый внешний тариф для товаров, ввозимых из-за пределов союза."
  Mercosur_Economic_Community.t: "Асунсьонский договор?"
  Mercosur_Economic_Community.d: "Асунсьонский договор, подписанный 26 марта 1991 года Аргентиной, Бразилией, Парагваем и Уругваем, создал МЕРКОСУР для создания общего рынка. Дополненный Договором Ору-Прету, он получил юридическое признание. В нем предусматривалась постепенная отмена торговых тарифов с целью создания зоны свободной торговли к 1994 году."
  Mercosur_Single_Market.t: "Протокол Ору-Прету?"
  Mercosur_Single_Market.d: "Протокол Ору-Прету 1994 года стал продолжением экономической политики по созданию таможенного союза, изложенной четырьмя годами ранее в Асунсьонском договоре четырьмя первоначальными государствами МЕРКОСУР: Аргентиной, Бразилией, Парагваем и Уругваем. Он официально учредил МЕРКОСУР как международный таможенный союз."
  Andean_Economic_Community.t: "Андская зона свободной торговли?"
  Andean_Economic_Community.d: "Андская зона свободной торговли, созданная в соответствии с Картахенским соглашением, вступила в полную силу 1 января 1993 года, объединив Боливию, Колумбию, Эквадор и Венесуэлу в беспошлинной торговле. Это стало решающим шагом на пути к региональной интеграции, которая позже превратилась в Андское сообщество (CAN), к которому в 1997 году присоединилось Перу."
  SACU_Single_Market.t: "Южноафриканский таможенный союз?"
  SACU_Single_Market.d: "Южноафриканский таможенный союз (SACU), созданный в 1910 году, является старейшим таможенным союзом в мире, объединяющим Ботсвану, Эсватини, Лесото, Намибию и Южную Африку. Он устанавливает общий внешний тариф и свободное перемещение товаров между членами, а доходы от таможенных пошлин объединяются и распределяются. SACU представляет собой краеугольный камень регионального экономического сотрудничества в Южной Африке, балансируя доминирующую экономику Южной Африки с механизмами справедливого распределения."
  EAC_Single_Market.t: "Таможенный союз Восточноафриканского сообщества?"
  EAC_Single_Market.d: "Восточноафриканское сообщество (ВАС), возрожденное в 2000 году, объединяет Бурунди, Кению, Руанду, Южный Судан, Танзанию, Уганду и Демократическую Республику Конго в региональный блок. Его инициатива единого рынка направлена ​​на создание свободного перемещения товаров, услуг, капитала и людей между государствами-членами, гармонизацию торговой политики и содействие более глубокой интеграции. ВАС представляет собой один из самых амбициозных проектов Африки по экономическому единству и совместному развитию."
  CEMAC_Economic_Community.t: "Браззавильский договор?"
  CEMAC_Economic_Community.d: "Таможенный и экономический союз Центральной Африки (UDEAC) был создан Браззавильским договором, подписанным 8 декабря 1964 года и вступил в силу 1 января 1966 года. Он объединил Камерун, Центральноафриканскую Республику, Чад, Республику Конго и Габон, к которому позже в 1985 году присоединилась Экваториальная Гвинея. UDEAC установил свободную торговлю между членами и общий внешний тариф, заложив основу для более глубокой региональной интеграции."
  CEMAC_Single_Market.t: "Договор CEMAC?"
  CEMAC_Single_Market.d: "Экономическое и валютное сообщество Центральной Африки (CEMAC) было создано договором 16 января 1994 года в Нджамене, Чад, в качестве преемника Таможенного и экономического союза Центральной Африки (UDEAC). Он объединил Камерун, Центральноафриканскую Республику, Чад, Республику Конго, Экваториальную Гвинею и Габон как в таможенный, так и в валютный союз. CEMAC ввел общий внешний тариф, свободное обращение товаров среди членов и общую валюту — центральноафриканский франк КФА, которым управляет Банк центральноафриканских государств."
  WAEMU_Single_Market.t: "Дакарский договор?"
  WAEMU_Single_Market.d: "Западноафриканский экономический и валютный союз (ЗАЭВС или UEMOA на французском языке) был основан договором 10 января 1994 года в Дакаре, Сенегал. Он объединил Бенин, Буркина-Фасо, Кот-д’Ивуар, Мали, Нигер, Сенегал и Того, к которым в 1997 году присоединилась Гвинея-Бисау. ЗАЭВС создала как таможенный союз с общим внешним тарифом и свободным обращением товаров, так и валютный союз, основанный на общем западноафриканском франке КФА, которым управляет Центральный банк западноафриканских государств (BCEAO)."
  CACM_Economic_Community.t: "Тегусигальпский протокол?"
  CACM_Economic_Community.d: "Система центральноамериканской интеграции (SICA), основанная в 1991 году Тегусигальпским протоколом, объединяет страны Центральной Америки в рамках политического, экономического, социального и экологического сотрудничества. Он координирует региональные обычаи, политику безопасности и развития с целью укрепления демократии, содействия интеграции и содействия устойчивому росту во всем регионе."
  CHI_Hainan_SAR.t: "Порт свободной торговли Хайнань?"
  CHI_Hainan_SAR.d: "Порт свободной торговли Хайнань — порт свободной торговли на острове Хайнань, Китай. Будучи прибрежным островом, Хайнань также является крупнейшей особой экономической зоной Китайской Народной Республики (КНР). Китай считается особой областью для всестороннего углубления экономических реформ и экспериментов с политикой открытости самого высокого уровня. Порт свободной торговли Хайнань не является портом в обычном понимании, поскольку весь остров Хайнань считается зоной особого экономического развития."
  CHI_One_Child_Policy_1980.t: "Политика одного ребенка?"
  CHI_One_Child_Policy_1980.d: "Политика одного ребенка — это инициатива планирования народонаселения в Китае, реализованная в период с 1979 по 2015 год с целью сдерживания роста населения страны путем ограничения многих семей одним ребенком. Программа имела широкий спектр социальных, культурных, экономических и демографических последствий, хотя вклад ограничений на одного ребенка в более широкую программу был предметом споров. Его эффективность в снижении рождаемости и защищенность с точки зрения прав человека были предметом споров."
  MLD_HND_Reforms.t: "Двустороннее торговое соглашение между Индией и Мальдивами?"
  MLD_HND_Reforms.d: "В соответствии с двусторонним торговым соглашением, подписанным в 1981 году, обе страны согласились предоставить друг другу статус наибольшего благоприятствования. В рамках положений этого соглашения Индия продолжает поставлять на Мальдивы определенные товары, которые могут даже подпадать под категории запрещенного/ограниченного импорта в Индии. Следует принять во внимание, что основная масса таких товаров, как рис, пшеничная мука, сахар, картофель, лук, яйца, овощи и другие товары, такие как речной песок и строительные материалы, импортируются из Индии, что все больше делает Мальдивы привлекательным рынком для растущих индийских инвесторов в этом секторе."
  PHI_First_Policy.t: "Политика Филиппин прежде всего?"
  PHI_First_Policy.d: "«Филиппинский прежде всего» относится к протекционистской и экономической националистической политике, впервые введенной и реализованной администрацией тогдашнего президента Филиппин Карлоса П. Гарсиа. В соответствии с этой политикой бизнес, принадлежащий филиппинцам, имеет приоритет над иностранными аналогами, а также поощряется покровительство филиппинцев продукции филиппинского производства. Гарсия впервые ввел эту политику, приняв резолюцию № 202 Национального экономического совета 28 августа 1958 года."
  concept_OPEC_oil_embargo_desc:6 "An [concept_OPEC_oil_embargo] is one where OPEC and its members have collectively agreed to not export oil to a particular country. Some OPEC members may however decide not to join the embargo if they have good relations with the embargoed country. Note: "Это дипломатическое действие инициирует полное эмбарго, поскольку двигатель V3 в настоящее время еще не допускает эмбарго на определенные товары»."
  generic_decolonisation_indy.4.option.1: "Мы создадим нацию для всех народов!"
  remilitarise_war.option.1: "Начинайте мобилизацию!"
  remilitarise_war.option.2: "Может быть, нет."
  wartime_suspended_elections.t: "Запланированные выборы приостановлены"
  wartime_suspended_elections.d: "В свете продолжающегося конфликта правительство объявило, что все запланированные выборы будут приостановлены до дальнейшего уведомления. Эта мера, считающаяся необходимой для национальной безопасности и единства, будет действовать до тех пор, пока военные действия не утихнут. Власти подчеркивают, что демократические процессы не прекращаются, а временно откладываются, чтобы гарантировать стабильность и выживание нации."
  wartime_unsuspended_elections.t: "Резюме запланированных выборов"
  wartime_unsuspended_elections.d: "После прекращения боевых действий правительство отменило приостановку выборов. Демократические процессы возобновятся в соответствии с графиком, подтвердив приверженность страны представительному управлению."
  wartime_suspended_elections.option: "Понятно."
  USA_SPA_form.t: "Мадридский пакт?"
  USA_SPA_form.d: "Мадридский пакт, подписанный 23 сентября 1953 года франкистской Испанией и Соединенными Штатами, вместе с Конкордатом 1953 года стал значительной попыткой разорвать международную изоляцию Испании после Второй мировой войны. Соглашение 1953 года приняло форму трех отдельных исполнительных соглашений, которые обязывали Соединенные Штаты оказывать Испании экономическую и военную помощь. Соединенным Штатам, в свою очередь, должно было быть разрешено строить и использовать воздушные и военно-морские базы на территории Испании."
  USA_ROC_form.t: "Китайско-американский договор о взаимной обороне?"
  USA_ROC_form.d: "Договор о взаимной обороне между Соединенными Штатами и Китайской Республикой представлял собой договор об обороне, подписанный между Соединенными Штатами и Китайской Республикой (Тайвань) и действовавший с 1955 по 1980 год. Он был предназначен для защиты острова Тайвань от вторжения со стороны Китайской Народной Республики."
  SOV_PRC_form.t: "Советско-китайский договор о дружбе?"
  SOV_PRC_form.d: "Советско-китайский договор о дружбе, союзе и взаимной помощи — двусторонний договор о союзе, коллективной безопасности, помощи и сотрудничестве, заключенный между Китайской Народной Республикой и Союзом Советских Социалистических Республик 14 февраля 1950 года."
  SOV_NVM_form.t: "Советско-вьетнамский договор о дружбе?"
  SOV_NVM_form.d: "Советский Союз был первой страной, наряду со своими государствами-сателлитами в Восточной Европе и недавно созданной Китайской Народной Республикой, дипломатически признавшими Демократическую Республику Вьетнам во время Первой Индокитайской войны в январе 1950 года."
  USA_YUG_form.t: "Американо-югославская оттепель?"
  USA_YUG_form.d: "Раскол Тито и Сталина в 1948 году стал главным поворотным моментом в отношениях Соединенных Штатов и новой социалистической республики. Югославия впервые обратилась за помощью к Соединенным Штатам летом 1948 года. Администрация Трумэна решила предоставить Югославии существенную помощь, кредиты и военную помощь. Это ознаменовало начало военной помощи США коммунистической стране, чтобы противостоять советским амбициям в регионе, что привело к еще большему развитию отношений между США и Югославией. Тито получил поддержку США в успешной заявке Югославии в 1949 году на место в Совете Безопасности ООН, несмотря на советскую оппозицию. В 1949 году Соединенные Штаты предоставили Югославии кредиты, а в 1950 году кредиты были увеличены, а затем последовали крупные гранты и военная помощь."
  PRC_PB_form.t: "Образовать синосферу?"
  PRC_PB_form.d: "В 1956 году советский лидер Никита Хрущев осудил Сталина и сталинизм. Мао и китайское руководство были потрясены тем, что КНР и СССР постепенно расходились в своих интерпретациях и применениях ленинской теории. К 1961 году их труднопреодолимые идеологические разногласия спровоцировали официальное осуждение КНР советского коммунизма как дела «ревизионистских предателей» в СССР. Для стран Восточного блока советско-китайский раскол был вопросом о том, кто возглавит революцию за мировой коммунизм и к кому (Китаю или СССР) авангардные партии мира обратятся за политическим советом, финансовой и военной помощью. В этом ключе обе страны боролись за лидерство в мировом коммунизме через авангардные партии, присущие странам, находящимся в их сферах влияния."
  NAM_PB_form.t: "Движение неприсоединения?"
  NAM_PB_form.d: "Движение неприсоединения (ДН) было основано с целью продвижения интересов развивающихся стран в контексте конфронтации холодной войны. За первые три десятилетия своего существования Движение сыграло решающую роль в деколонизации, формировании новых независимых государств и демократизации международных отношений."
  USA_SOV_INF.t: "Договор о ядерных силах средней дальности?"
  USA_SOV_INF.d: "Договор о ядерных силах средней дальности (ДРСМД) был договором о контроле над вооружениями между Соединенными Штатами и Советским Союзом (и его государством-преемником, Российской Федерацией). Президент США Рональд Рейган и генеральный секретарь СССР Михаил Горбачев подписали договор 8 декабря 1987 года. Сенат США одобрил договор 27 мая 1988 года, а Рейган и Горбачев ратифицировали его 1 июня 1988 года. Договор о РСМД запретил все ядерные и обычные баллистические ракеты наземного базирования, крылатые ракеты и ракетные пусковые установки с дальностью 500–1000 километров. (310–620 миль) (короткая средняя дальность) и 1000–5500 км (620–3420 миль) (средняя дальность). Договор не распространялся на ракеты воздушного и морского базирования."
  USA_SOV_START.t: "Договор о сокращении стратегических вооружений?"
  USA_SOV_START.d: "СНВ-1 (Договор о сокращении стратегических вооружений) — двусторонний договор между Соединенными Штатами и Советским Союзом о сокращении и ограничении стратегических наступательных вооружений. Договор был подписан 31 июля 1991 года и вступил в силу 5 декабря 1994 года. Договор запрещал подписавшим его сторонам развертывать более 6000 ядерных боеголовок и в общей сложности 1600 межконтинентальных баллистических ракет (МБР) и бомбардировщиков. СНВ заключал самый крупный и сложный договор о контроле над вооружениями в истории, и его окончательная реализация в конце 2001 года привела к выводу около 80% всего существовавшего на тот момент стратегического ядерного оружия."
  USA_CNG_form.t: "Вмешательство ООН в кризис в Конго?"
  USA_CNG_form.d: "Операция Организации Объединенных Наций в Конго — миротворческие силы Организации Объединенных Наций, которые были развернуты в Республике Конго в 1960 году в ответ на кризис в Конго. ОНУК была первой миротворческой миссией ООН со значительным военным потенциалом и остается одной из крупнейших операций ООН по размеру и масштабу."
  GBR_FPDA_form.t: "Пять механизмов защиты сил?"
  GBR_FPDA_form.d: "Соглашения пяти держав по обороне (FPDA) представляют собой серию двусторонних отношений в области обороны, установленных серией многосторонних соглашений между странами Содружества Австралией, Малайзией, Новой Зеландией, Сингапуром и Соединенным Королевством. FPDA было создано после прекращения действия Соединенным Королевством гарантий обороны Малайи в соответствии с Англо-малайским соглашением об обороне в результате решения Великобритании в 1967 году вывести свои вооруженные силы к востоку от Суэца 1 ноября 1971 года. В соответствии с Соглашением пяти держав об обороне пять стран-членов (Австралия, Малайзия, Новая Зеландия, Сингапур и Соединенное Королевство) согласились консультироваться друг с другом в случае вооруженной агрессии против Малайзии и Сингапура."
  USA_ANZUS_form.t: "Альянс АНЗУС?"
  USA_ANZUS_form.d: "Договор о безопасности Австралии, Новой Зеландии и США (ANZUS или Договор ANZUS) представляет собой соглашение о коллективной безопасности между Австралией, Новой Зеландией и Соединенными Штатами, которое было подписано в 1951 году. Оно, во-первых, подтверждает приверженность сторон целям Организации Объединенных Наций, запрещая использование силы или угроз, кроме как в целях самообороны."
  vietnam_laos_form.t: "Лаосско-вьетнамский договор о дружбе?"
  vietnam_laos_form.d: "Лаосско-Вьетнамский договор о дружбе и сотрудничестве, подписанный 18 июля 1977 года во Вьентьяне, официально закрепил тесный союз между Лаосской Народно-Демократической Республикой и Социалистической Республикой Вьетнам. Они установили долгосрочное сотрудничество в политической, экономической, культурной сфере и сфере безопасности, что отражает глубокие связи, возникшие во время их совместной борьбы за независимость."
  turkey_northern_cyprus_form.t: "Турецкое вторжение на Кипр?"
  turkey_northern_cyprus_form.d: "Турция вторглась на Кипр 20 июля 1974 года в ходе операции, которая в течение следующего месяца проходила в два этапа. Происшедший на фоне межобщинного насилия между греками и киприотами-турками и в ответ на спонсируемый греческой хунтой кипрский государственный переворот пятью днями ранее, он привел к захвату и оккупации Турцией северной части острова."
  greece_cyprus_form.t: "Марионеточное государство на Кипре?"
  greece_cyprus_form.d: "Военный переворот, спонсируемый греческой военной хунтой, был совершен Кипрской национальной гвардией 15 июля 1974 года. Заговорщики отстранили действующего президента Кипра архиепископа Макариоса III от должности и назначили на должность националиста, сторонника Энозиса, Никоса Сэмпсона. Режим Сэмпсона описывался как марионеточное государство, конечной целью которого была аннексия острова Грецией; в краткосрочной перспективе переворотщики провозгласили создание «Греческой Республики Кипр»."
  does_not_shares_same_superstate.tt: "Не разделяет одних и тех же амбиций сверхгосударства."
  superstate_free_trade_zone.tt: "В супергосударственной зоне свободной торговли"
  superstate_customs_union.tt: "В сверхгосударственном Таможенном союзе"
  superstate_currency_union.tt: "В сверхгосударственном валютном союзе"
  superstate_defence_union.tt: "В Союзе обороны сверхдержавы"
  superstate_political_union.tt: "В сверхгосударственном политическом союзе"
  SKO_historical_election_system.t: "Президентские выборы в Южной Корее"
  SKO_historical_election_system.d: "Президент Республики Корея является главой государства и главой правительства Республики Корея. Президент возглавляет Государственный совет и является главой исполнительной власти национального правительства, а также главнокомандующим Вооруженными силами Республики Корея."
  MSY_historical_election_system.t: "Всеобщие выборы в Малайзии"
  MSY_historical_election_system.d: "Премьер-министр Малайзии является главой правительства Малайзии. Премьер-министр руководит исполнительной ветвью федерального правительства. Ян ди-Пертуан Агонг назначает премьер-министра членом парламента (МП), который, по его мнению, с наибольшей вероятностью будет пользоваться доверием большинства депутатов. Премьер-министром обычно является лидер партии, получившей наибольшее количество мест на всеобщих выборах."
  RUS_historical_election_system.t: "Выборы президента России"
  RUS_historical_election_system.d: "Президент Российской Федерации является исполнительным главой государства Россия. Президент является председателем Федерального государственного совета и верховным главнокомандующим Вооружёнными Силами России. Это самый высокий офис в России."
  SOV_historical_election_system.t: "Советские президентские выборы"
  SOV_historical_election_system.d: "14 марта 1990 года в Советском Союзе прошли президентские выборы 1990 года, на которых избирался президент сроком на пять лет. Это были первые и единственные президентские выборы, проведенные в Советском Союзе. Это произошло из-за того, что должность президента была учреждена в 1990 году, за год до распада Советского Союза в 1991 году. Выборы были безальтернативными, и единственным кандидатом был Михаил Горбачев, тогдашний Генеральный секретарь Коммунистической партии Советского Союза."
  ROC_historical_election_system.d: "Президент Китайской Республики, также называемый президентом Тайваня, является главой государства Китайской Республики (Тайвань), а также главнокомандующим Вооруженными силами Китайской Республики. Когда-то эта должность имела полномочия управлять материковым Китаем до 1949 года, но после завершения гражданской войны в Китае ее оставшаяся юрисдикция была ограничена Тайванем, Пэнху, Цзиньмэнь, Мацу и другими более мелкими островами."
  HND_Operation_Blue_Star.t: "Операция Голубая Звезда?"
  HND_Operation_Blue_Star.d: "Операция «Голубая звезда» — операция индийских вооруженных сил, проводившаяся с 1 по 10 июня 1984 года по изгнанию сикхского боевика Джарнаила Сингха Бхиндранвале и других сикхских сепаратистов из зданий Золотого храма, самого святого места сикхизма. Военные действия в храмовом комплексе подверглись критике со стороны сикхов во всем мире, которые интерпретировали их как нападение на сикхскую религию и всю сикхскую общину."
  HND_Anti_Sikh_Riots.t: "Антисикхские беспорядки"
  HND_Anti_Sikh_Riots.d: "Антисикхские беспорядки 1984 года, также известные как сикхская резня 1984 года, представляли собой серию организованных погромов против сикхов в Индии после убийства Индиры Ганди ее телохранителями-сикхами. По оценкам правительства, около 2800 сикхов были убиты в Дели и 3350 по всей стране."
  ITA_Piazza_Fontana_attack_1969.t: "Взрыв на площади Пьяцца Фонтана"
  ITA_Piazza_Fontana_attack_1969.d: "Взрыв на площади Пьяцца Фонтана — террористический акт, произошедший 12 декабря 1969 года, когда в штаб-квартире Banca Nazionale dell'Agricoltura (Национальный сельскохозяйственный банк) на площади Пьяцца Фонтана (недалеко от Дуомо) в Милане, Италия, взорвалась бомба, в результате чего 17 человек погибли и 88 были ранены. Теракт был осуществлен неофашистской военизированной террористической группировкой Ordine Nuovo и, возможно, некоторыми неопределенные сотрудники."
  HND_assassinate_MKG.t: "Убийство Махатмы Ганди?"
  HND_assassinate_MKG.d: "В 17:17. 30 января 1948 года Ганди был со своими внучатыми племянницами в саду дома Бирла (ныне Ганди Смрити), направляясь выступить на молитвенном собрании, когда Натурам Годзе, индуистский националист, выпустил три пули в грудь Ганди из пистолета с близкого расстояния. По некоторым данным, Ганди умер мгновенно."
  USA_taft_act.t: "Закон Тафта-Хартли?"
  USA_taft_act.d: "Закон о трудовых отношениях 1947 года, более известный как Закон Тафта-Хартли, представляет собой федеральный закон США, который ограничивает деятельность и власть профсоюзов. Он был принят 80-м Конгрессом США вопреки вето президента Гарри С. Трумэна и стал законом 23 июня 1947 года. Тафт-Хартли был введен после крупной волны забастовок в 1945 и 1946 годах."
  PRC_tibetan_uprising.t: "Тибетское восстание"
  PRC_tibetan_uprising.d: "Тибетское восстание 1959 года началось 10 марта 1959 года, когда в Лхасе, столице Тибета, которая находилась под эффективным контролем Китайской Народной Республики (КНР) с момента заключения Соглашения из семнадцати пунктов в 1951 году, вспыхнуло восстание. Первоначальное восстание произошло на фоне общей китайско-тибетской напряженности и неразберихи, поскольку тибетские протестующие опасались, что китайское правительство может арестовать 14-го Далай Лама. Протесты также подогревались антикитайскими настроениями и сепаратизмом."
  HND_tibetan_movement.t: "Далай-лама в изгнании?"
  HND_tibetan_movement.d: "В начале тибетского восстания 1959 года, опасаясь за свою жизнь, Далай-лама и его свита бежали из Тибета с помощью Отдела специальной деятельности ЦРУ, пересекли границу Индии 30 марта 1959 года и 18 апреля достигли Тезпура в Ассаме. Некоторое время спустя он основал правительство Тибета в изгнании в Дхарамсале, Индия, который часто называют «Маленькой Лхасой». После основания правительства в изгнании он восстановил примерно 80 000 тибетских беженцев, которые последовали за ним в ссылку в сельскохозяйственные поселения."
  HND_tibetan_movement.option.1: "Пусть он будет в Индии."
  HND_tibetan_movement.option.2: "Нет, спасибо!"
  POL_pope_movement.t: "Выборы Папы Иоанна Павла II?"
  POL_pope_movement.d: "Папа Иоанн Павел II обеспечил моральную направленность антикоммунизма; визит в его родную Польшу в 1979 году стимулировал религиозное и националистическое возрождение, сосредоточенное на профсоюзе движения «Солидарность», что активизировало оппозицию и, возможно, привело к покушению на него два года спустя."
  POL_pope_movement.option.1: "Он нарушитель спокойствия!"
  POL_pope_movement.option.2: "Согласитесь на некоторую религиозную свободу."
  POL_solidarity_movement.t: "Движение Солидарности"
  POL_solidarity_movement.d: "«Солидарность» — польский профсоюз, основанный в августе 1980 года на Судостроительном заводе имени Ленина в Гданьске, Польша. В сентябре 1981 года число членов профсоюза достигло 10 миллионов, что составляет одну треть населения трудоспособного возраста страны. В 1980-е годы «Солидарность» представляла собой широкое антиавторитарное общественное движение, использовавшее методы гражданского сопротивления для продвижения прав трудящихся и социальных перемен. В начале 1980-х годов правительство попыталось разрушить союз путем введения военного положения в Польше и применения политических репрессий."
  AFG_mujahideen_movement.t: "Афганские моджахеды"
  AFG_mujahideen_movement.d: "Афганские моджахеды представляли собой группы исламистского сопротивления, которые воевали с Демократической Республикой Афганистан и Советским Союзом во время советско-афганской войны и последующей Первой гражданской войны в Афганистане."
  JAP_recruit_scandal.t: "Скандал с рекрутом"
  JAP_recruit_scandal.d: "Скандал с «Рекрутом» представлял собой инсайдерскую торговлю и коррупционный скандал, который вынудил многих видных японских политиков уйти в отставку в 1988 году. Среди политиков, вовлеченных в скандал, были премьер-министр Нобору Такэсита, бывший премьер-министр Ясухиро Накасоне и главный секретарь кабинета министров Такао Фудзинами. Помимо членов правительства ЛДП, к делу были также причастны лидеры Комэйто, Демократической партии Японии и Социалистической партии Японии."
  ITA_maxi_trial.t: "Макси-испытание?"
  ITA_maxi_trial.d: "Макси-суд — уголовный процесс против сицилийской мафии, проходивший в Палермо, Сицилия. Судебный процесс длился с 10 февраля 1986 г. (первый день заседания Корте д'Ассиз) по 30 января 1992 г. (последний день заседания Верховного кассационного суда) и проходил в здании суда в стиле бункера, специально построенном для этой цели внутри стен тюрьмы Уччардоне."
  GBR_poll_tax_riots.t: "Подушный налог?"
  GBR_poll_tax_riots.d: "Бунты из-за подушного налога — серия беспорядков в британских городах во время протестов против общественного сбора (широко известного как «подушный налог»), введенного консервативным правительством премьер-министра Маргарет Тэтчер. Самый крупный протест произошел в центре Лондона в субботу 31 марта 1990 года, незадолго до того, как налог должен был вступить в силу в Англии и Уэльсе."
  FRA_yellow_vests.t: "Протесты «Жёлтых жилетов»"
  FRA_yellow_vests.d: "Протесты «Желтых жилетов» — серия популистских массовых еженедельных протестов во Франции, которые начались 17 ноября 2018 года. Первоначально движение было мотивировано ростом цен на сырую нефть и топливо, высокой стоимостью жизни и экономическим неравенством. Движение утверждало, что непропорциональное налоговое бремя во Франции ложится на рабочий и средний классы, особенно в сельских и пригородных районах. Протестующие призывали, среди прочего, снизить налоги на топливо, вновь ввести солидарный налог на богатство, повысить минимальную заработную плату и многое другое."
  RUS_Khodorkovsky_Case.t: "Суд над Михаилом Ходорковским?"
  RUS_Khodorkovsky_Case.d: "В 2001 году Ходорковский основал «Открытую Россию», реформаторскую организацию, намеревающуюся «построить и укрепить гражданское общество» в стране. В октябре 2003 года он был арестован российскими властями и обвинен в мошенничестве. Вскоре после этого правительство президента Владимира Путина заморозило акции ЮКОСа по обвинению в уплате налогов. Правительство Путина предприняло дальнейшие действия против ЮКОСа, что привело к падению курса акций компании и испарению большей части богатства Ходорковского. В мае 2005 года он был признан виновным и приговорен к девяти годам лишения свободы."
  RUS_Politkovskaya_murder.t: "Убийство Анны Политковской?"
  RUS_Politkovskaya_murder.d: "7 октября 2006 года российская журналистка, писательница и правозащитница Анна Политковская была застрелена в лифте своего многоквартирного дома в центре Москвы. Она была известна своей оппозицией чеченскому конфликту и критикой Владимира Путина. Она написала несколько книг о чеченских войнах, а также о путинской России и получила за свою работу несколько международных наград. Ее убийство, предположительно заказное, вызвало бурную международную реакцию."
  RUS_snow_revolution.t: "Снежная революция?"
  RUS_snow_revolution.d: "«Снежная революция» началась в 2011 году (как протесты против результатов выборов в законодательные органы России в 2011 году) и продолжалась в 2012 и 2013 годах. Протесты были мотивированы заявлениями российских и иностранных журналистов, политических активистов и представителей общественности о том, что избирательный процесс был сфальсифицирован."
  RUS_Navalny_murder.t: "Смерть Алексея Навального?"
  RUS_Navalny_murder.d: "Алексей Анатольевич Навальный — российский оппозиционер, юрист, активист по борьбе с коррупцией и политзаключенный. В январе 2021 года Навальный вернулся в Россию и сразу же был задержан по обвинению в нарушении условий условно-досрочного освобождения, пока находился в больнице в Германии. В августе 2023 года Навального приговорили к дополнительным 19 годам лишения свободы по обвинению в экстремизме. В декабре 2023 года Навальный пропал из тюрьмы почти на три недели. Он вновь появился в исправительной колонии за Полярным кругом в Ямало-Ненецком автономном округе. 16 февраля 2024 года Служба исполнения наказаний России сообщила, что Навальный скончался в возрасте 47 лет."
  BYE_Minsk_attack_2011.t: "Взрыв в минском метро."
  BYE_Minsk_attack_2011.d: "Взрыв в минском метрополитене в 2011 году произошел 11 апреля 2011 года, в результате чего 15 человек погибли и 204 получили ранения в результате взрыва бомбы в минском метрополитене, Беларусь. Взрыв произошел на центральной станции Октябрьская в 17:55 по местному времени. Прокуратура возбудила уголовное дело и квалифицировала произошедшее как теракт. Двое подозреваемых, арестованных 13 апреля, признались во взрыве, но мотивы остались неясными. В марте 2012 года оба преступника, Дмитрий Коновалов и Владислав Ковалев, были расстреляны."
  BYE_May_Protests.t: "Майские массовые протесты"
  BYE_May_Protests.d: "Белорусские протесты 2020–2021 годов представляли собой серию массовых политических демонстраций и протестов против правительства Беларуси и президента Александра Лукашенко. Крупнейшие антиправительственные протесты в истории Беларуси. Демонстрации начались накануне и во время президентских выборов 2020 года, на которых Лукашенко баллотировался на свой шестой срок. В ответ на демонстрации был проведен ряд относительно небольших проправительственных митингов."
  JAP_1970_uprising.t: "Попытка государственного переворота Юкио Мисима"
  JAP_1970_uprising.d: "25 ноября 1970 года Мисима и четыре члена его ополчения проникли на военную базу в центре Токио, взяли в заложники ее коменданта и безуспешно пытались вдохновить Силы самообороны Японии восстать и свергнуть Конституцию Японии 1947 года (которую он назвал «конституцией поражения»). После своей речи и крика «Да здравствует Император!» он совершил сеппуку."
  USA_assassinate_DJT.t: "Покушение на Дональда Трампа"
  USA_assassinate_DJT.d: "13 июля 2024 года Дональд Трамп, бывший президент США и предполагаемый кандидат от Республиканской партии на президентских выборах 2024 года, пережил покушение во время выступления на предвыборном митинге под открытым небом недалеко от Батлера, штат Пенсильвания."
  PER_big_party.t: "Празднование 2500-летия Персидской империи?"
  PER_big_party.d: "Празднование 2500-летия основания Персидской империи было национальным событием в Иране, которое состояло из тщательно продуманного комплекса грандиозных праздников, проводившихся в октябре 1971 года в честь основания древней империи Ахеменидов Киром Великим. Целью празднования было подчеркнуть древнюю цивилизацию и историю Ирана, а также продемонстрировать его современные достижения при шахе Мохаммеде Резе Пехлеви."
  ISR_assassinate_YR.t: "Убийство Ицхака Рабина?"
  ISR_assassinate_YR.d: "В 1992 году Рабин был переизбран премьер-министром на платформе, охватывающей израильско-палестинский мирный процесс. Он подписал несколько исторических соглашений с палестинским руководством в рамках соглашений Осло. В 1994 году Рабин получил Нобелевскую премию мира вместе с давним политическим соперником Шимоном Пересом и палестинским лидером Ясиром Арафатом. Рабин также подписал мирный договор с Иорданией в 1994 году. В ноябре 1995 года он был убит Игалем Амиром, экстремистом, выступавшим против условий соглашений Осло."
  USA_assassinate_DJT_2.t: "Второе покушение на Дональда Трампа"
  USA_assassinate_DJT_2.d: "Дональд Трамп стал объектом покушения в его гольф-клубе в Уэст-Палм-Бич, штат Флорида, 15 сентября 2024 года, всего через девять недель после того, как кандидат в президенты от республиканской партии пережил еще одно покушение на свою жизнь. Агенты Секретной службы США, находившиеся в нескольких ямах от того места, где играл Трамп, заметили дуло автомата типа АК, торчащее из кустарника, окаймляющего поле, примерно в 400 ярдах от него. Агент открыл огонь, и боевик уронил винтовку и скрылся на внедорожнике, оставив огнестрельное оружие вместе с двумя рюкзаками, прицелом для прицеливания и камерой GoPro, сообщил шериф округа Палм-Бич Рик Брэдшоу. Позже мужчину остановили сотрудники правоохранительных органов соседнего округа."
  GBR_diana_death.t: "Смерть Дианы, принцессы Уэльской"
  GBR_diana_death.d: "Рано утром 31 августа 1997 года Диана, принцесса Уэльская, скончалась от травм, полученных ранее той ночью в автокатастрофе со смертельным исходом в туннеле Пон-де-л'Альма в Париже, Франция. Доди Файед, партнер Дианы, и Анри Поль, водитель Mercedes-Benz W140, были найдены мертвыми внутри автомобиля. Телохранитель Доди, Тревор Рис-Джонс, был серьезно ранен и стал единственным выжившим в результате крушения. Диане было 36 лет, когда она умерла. Ее смерть вызвала волну общественного горя в Соединенном Королевстве и во всем мире, а ее похороны, показанные по телевидению, посмотрели около 2,5 миллиардов человек."
  GBR_diana_death.option.1: "Она была народной принцессой!"
  GBR_diana_death.option.2: "Мы оплакиваем смерть королевской семьи."
  IRQ_civil_war_2006.t: "Гражданская война в Ираке"
  IRQ_civil_war_2006.d: "Гражданская война в Ираке представляла собой вооруженный конфликт с 2006 по 2008 год между различными сектантскими шиитскими и суннитскими вооруженными группировками, такими как Исламское Государство Ирак и Армия Махди, а также иракским правительством и коалиционными силами, возглавляемыми Америкой. В феврале 2006 года восстание против коалиции и правительства переросло в межконфессиональную гражданскую войну после взрыва храма Аль-Аскари, считающегося священным местом в шиизме двунадесятников."
  JOR_civil_war_1970.t: "Черный сентябрь"
  JOR_civil_war_1970.d: "«Черный сентябрь» — вооруженный конфликт между Иорданией во главе с королем Хусейном и Организацией освобождения Палестины (ООП) во главе с председателем Ясиром Арафатом. 17 сентября 1970 года иорданская армия окружила города со значительным присутствием ООП, включая Амман и Ирбид, и начала атаковать посты федаинов, которые действовали из лагерей палестинских беженцев. Федаинов вытесняли из городов один за другим, пока 2000 человек не сдались после того, как они были окружены во время наступления на Аджлун 23 июля, что формально ознаменовало окончание конфликта. Иордания позволила федаинам перебраться в Ливан через Сирию, где они позже оказались вовлечены в гражданскую войну в Ливане."
  GUA_civil_war_1960.t: "Гражданская война в Гватемале"
  GUA_civil_war_1960.d: "Гражданская война в Гватемале — гражданская война в Гватемале, которая велась с 1960 по 1996 год между правительством Гватемалы и различными левыми повстанческими группировками. Сообщается, что правительственные силы Гватемалы совершили геноцид против населения майя в Гватемале во время гражданской войны, а также имели место широкомасштабные нарушения прав человека в отношении гражданского населения. Контекст борьбы основывался на давних проблемах несправедливого распределения земли. Богатые гватемальцы, в основном европейского происхождения, и иностранные компании, такие как American United Fruit Company, контролировали большую часть земли. Взамен они платили почти нулевые налоги, что приводило к конфликтам с коренной сельской беднотой, которая обрабатывала землю в ужасных условиях."
  COS_civil_war_1948.t: "Гражданская война в Коста-Рике"
  COS_civil_war_1948.d: "Гражданская война в Коста-Рике продолжалась с 12 марта по 24 апреля 1948 года. Конфликт последовал за президентскими выборами 8 февраля 1948 года, на которых кандидат от оппозиции Отилио Улате победил представителя правящей партии Рафаэля Анхеля Кальдерона Гуардиа. Проправительственные представители, доминировавшие в Законодательном собрании, утверждали, что победа Улате была сфальсифицирована, и 1 марта законодательный орган проголосовал за аннулирование результатов выборов. Это спровоцировало вооруженное восстание под руководством Хосе Фигереса Феррера, бизнесмена, не участвовавшего в выборах, против правительства президента Теодоро Пикадо. После войны Фигерес сверг армию и правил страной в течение 18 месяцев в качестве главы хунты временного правительства, которая наблюдала за выборами Конституционной ассамблеи в декабре. Эта Ассамблея приняла новую конституцию 1949 года, после чего хунта была распущена и власть была передана Улате как новому конституционному президенту."
  AFG_civil_war_1979.t: "Афганское движение сопротивления"
  AFG_civil_war_1979.d: "27 апреля 1978 года НДПА и верные ей военные подразделения убили Дауда Хана, его ближайших родственников и телохранителей в результате насильственного переворота и захватили контроль над столицей Кабулом, провозгласив новую Демократическую Республику Афганистан (ДРА). Новое коммунистическое правительство во главе с революционным советом не пользовалось поддержкой масс. Когда религиозные старейшины объявили джихад против правительства, в мае 1979 года Ахмад Шах Масуд готовился в Пешаваре выступить против нового коммунистического правительства в Панджшере."
  PAL_assassinate_YA.t: "Смерть Ясира Арафата?"
  PAL_assassinate_YA.d: "Ясир Арафат был палестинским политическим лидером. Он был председателем Организации освобождения Палестины (ООП) с 1969 по 2004 год и президентом Палестинской национальной администрации (ПНА) с 1994 по 2004 год. Идеологически арабский националист и социалист, Арафат был одним из основателей политической партии ФАТХ, которую он возглавлял с 1959 по 2004 год. Ясир Арафат неожиданно скончался 11 ноября. 2004 г., 75 лет, после непродолжительного периода болезни. С тех пор причина его смерти обсуждалась, и было предложено несколько различных теорий относительно нее. Однако официальные расследования французских и российских команд не нашли доказательств нечестной игры."
  CNG_assassinate_LDK.t: "Убийство Лорана Кабилы?"
  CNG_assassinate_LDK.d: "Лоран-Дезире Кабила, президент Демократической Республики Конго, был убит в своем кабинете в своей официальной резиденции во Дворце Мрамор в Киншасе 16 января 2001 года. Убийцей, убившей его, был его 18-летний телохранитель Рашиди Мизеле, которого ранее также опознали как Рашиди Касерека. Позже Мизеле была застрелена. Неделю спустя его тело было возвращено в Конго для государственных похорон, а десять дней спустя его сын Джозеф Кабила стал президентом."
  ARG_dirty_war_1974.t: "Грязная война?"
  ARG_dirty_war_1974.d: "Грязная война — это название, которое использовала военная хунта или гражданско-военная диктатура Аргентины в период государственного терроризма в Аргентине с 1974 по 1983 год в рамках операции «Кондор». В ходе этой кампании военные, силы безопасности и «эскадроны смерти» в форме Аргентинского антикоммунистического альянса (ААА, или «Три А») преследовали любых политических диссидентов и всех, кого считали связанными с социализмом, левым перонизмом или движением Монтонерос."
  JAP_assassinate_SA.t: "Убийство Синдзо Абэ?"
  JAP_assassinate_SA.d: "8 июля 2022 года Синдзо Абэ, бывший премьер-министр Японии и действующий член Палаты представителей Японии, был убит во время выступления на политическом мероприятии возле станции Ямато-Сайдайдзи в городе Нара, префектура Нара. Абэ произносил предвыборную речь в поддержку кандидата от Либерально-демократической партии (ЛДП), когда в него смертельно выстрелил 41-летний Тэцуя Ямагами из самодельного огнестрельного оружия. Абэ был доставлен на медицинском вертолете в больницу Медицинского университета Нара в Кашихаре, где он был констатирован мертвым."
  PHI_drug_war_2016.t: "Война с наркотиками?"
  PHI_drug_war_2016.d: "Война с наркотиками — это усиленная кампания по борьбе с наркотиками, которая началась во время правления президента Родриго Дутерте, который занимал свой пост с 30 июня 2016 года по 30 июня 2022 года. Кампания снизила распространение наркотиков в стране, но была омрачена внесудебными казнями, предположительно совершенными полицией и неизвестными нападавшими. К 2022 году правительство официально подсчитало, что число подозреваемых в наркотиках, убитых с 2016 года, составит 6252 человека, однако, по оценкам, от 12 000 до 30 000 мирных жителей были убиты в ходе «операций по борьбе с наркотиками», проводимых Филиппинской национальной полицией и линчевателями."
  MEX_drug_war_2006.t: "Операция Мичоакан?"
  MEX_drug_war_2006.d: "Операция «Мичоакан» — совместная операция федеральной полиции и мексиканских военных по уничтожению наркоплантаций и борьбе с незаконным оборотом наркотиков. Операция, начатая 11 декабря 2006 года, контролировалась министром общественной безопасности, генеральным прокурором Мексики, министром внутренних дел, военно-морским флотом и мексиканской армией. В некоторых случаях полиция штата и муниципальная полиция принимала участие, хотя и не участвовала в этом. Совместная операция зарекомендовала себя как одна из операций против организованной преступности, в данном случае наркоторговли, в которой задействовано наибольшее количество военных и полицейских подразделений, а также большая часть государственных сил."
  USA_great_wall_2017.t: "Стена Трампа?"
  USA_great_wall_2017.d: "Стена Трампа представляет собой расширение барьера между Мексикой и Соединенными Штатами, который начался во время первого президентства Дональда Трампа в США и был важной частью платформы президентской кампании Трампа 2016 года, предшествовавшей выборам этого года. На протяжении всей своей предвыборной кампании Трамп призывал к строительству пограничной стены для борьбы с нелегальной иммиграцией."
  LEB_civil_war_1975.t: "Гражданская война в Ливане?"
  LEB_civil_war_1975.d: "Гражданская война в Ливане была гражданским конфликтом, возникшим в результате напряженности между христианским и мусульманским населением Ливана. Конфликт усугублялся социально-экономическим неравенством и присутствием в Ливане в 1970-х годах боевиков Организации освобождения Палестины (ООП). В 1975 году ливанские мусульмане и левые поддержали ООП и стремились к большей политической власти; ее христиане, стремясь сохранить свое политическое господство, выступили против ООП. Фракции ожесточенно боролись до начала 1976 года, и Ливан фактически был разделен: христиане находились у власти на севере, а мусульмане - на юге."
  SYR_civil_war_2011.t: "Гражданская война в Сирии?"
  SYR_civil_war_2011.d: "Сирийская гражданская война представляла собой многосторонний конфликт в Сирии, в котором участвовали различные государственные и негосударственные субъекты. В марте 2011 года народное недовольство правлением Башара Асада спровоцировало крупномасштабные протесты и митинги в поддержку демократии по всей Сирии в рамках более широких протестов Арабской весны в регионе. После нескольких месяцев репрессий со стороны правительственного аппарата безопасности по всей стране начали формироваться различные вооруженные повстанческие группировки, такие как Свободная сирийская армия, что положило начало сирийскому повстанческому мятежу. К середине 2012 года повстанческое движение переросло в полномасштабную гражданскую войну."
  LBY_civil_war_2014.t: "Гражданская война в Ливии?"
  LBY_civil_war_2014.d: "Гражданская война в Ливии (2014–2020 гг.), также известная как Вторая гражданская война в Ливии, — многосторонняя гражданская война, которая велась в Ливии между рядом вооруженных группировок, главным образом Палатой представителей (ПН) и Правительством национального согласия (ПНС), в течение шести лет с 2014 по 2020 год."
  TUR_pogrom_1955.t: "Стамбульский погром?"
  TUR_pogrom_1955.d: "Стамбульский погром представлял собой серию спонсируемых государством антигреческих нападений мафии, направленных в первую очередь против греческого меньшинства Стамбула 6–7 сентября 1955 года. Погром был организован правящей Демократической партией Турции при сотрудничестве различных организаций безопасности (Группа тактической мобилизации, Противопартизанская служба и Служба национальной безопасности). События были спровоцированы взрывом турецкого консульства в Салониках (Македония, Греция) – дома, где в 1881 году родился Мустафа Кемаль Ататюрк. На самом деле бомбу заложил турецкий билетер в консульстве, который позже был арестован и сознался."
  BUR_genocide_2016.t: "Геноцид рохинджа?"
  BUR_genocide_2016.d: "Геноцид рохинджа представлял собой серию продолжающихся преследований и убийств мусульман рохинджа военными Мьянмы. На сегодняшний день геноцид состоял из двух фаз: первая представляла собой военное подавление, которое продолжалось с октября 2016 года по январь 2017 года, а вторая продолжалась с августа 2017 года. Кризис вынудил более миллиона рохинджа бежать в другие страны. Большинство из них бежали в Бангладеш, что привело к созданию крупнейшего в мире лагеря беженцев, тогда как другие бежали в Индию, Таиланд, Малайзию и другие части Южной и Юго-Восточной Азии, где продолжают подвергаться преследованиям."
  NGE_pogrom_1966.t: "Погром против игбо?"
  NGE_pogrom_1966.d: "Серия массовых убийств была совершена против народа игбо и других людей южного нигерийского происхождения, проживающих в северной Нигерии, начиная с мая 1966 года и достигнув пика после 29 сентября 1966 года. По оценкам, от 8 000 до 30 000 игбо и жителей Востока были убиты. Еще 1 миллион игбо бежали из Северного региона на Восток. В ответ на убийства некоторые северяне были убиты в Порт-Харкорте и других восточных городах."
  SER_genocide_1995.t: "Резня в Сребренице?"
  SER_genocide_1995.d: "Резня в Сребренице — геноцидное убийство более 8000 боснийских мусульманских мужчин и мальчиков в июле 1995 года в городе Сребреница и его окрестностях во время Боснийской войны. В основном это было совершено подразделениями Армии боснийских сербов Республики Сербской под командованием Ратко Младича, хотя в нем также участвовало сербское военизированное подразделение «Скорпионы». Эта резня стала первым юридически признанным геноцидом в Европе после окончания Второй мировой войны."
  POR_academic_crisis_1962.t: "Академический кризис?"
  POR_academic_crisis_1962.d: "Академический кризис — это название политики португальского правительства, инициированной в 1962 году Estado Novo и влекущей за собой бойкот и закрытие нескольких студенческих ассоциаций и организаций, включая Национальный секретариат португальских студентов. Большинство членов этой организации были боевиками оппозиции, среди них немало коммунистов. Студенты ответили демонстрациями, кульминацией которых стала 24 марта огромная студенческая демонстрация в Лиссабоне, которая была решительно подавлена ​​полицией по охране общественного порядка, что привело к ранениям сотен студентов. Сразу после этого студенты начали забастовку. Эти события стали известны как Академический кризис 1962 года."
  POR_coup_1975.t: "Попытка коммунистического переворота?"
  POR_coup_1975.d: "Португалия пережила неспокойный период, известный как Processo Revolucionário Em Curso (Продолжающийся революционный процесс). Этот этап PREC длился до переворота 25 ноября 1975 года, возглавляемого группой крайне левых офицеров, в частности Отело Сарайва де Карвальо. Говорили, что это был коммунистический заговор с целью захвата власти с целью дискредитации могущественной Коммунистической партии. За ним последовал успешный контрпереворот, предпринятый более центристскими офицерами, и он был отмечен постоянными трениями между либерально-демократическими силами и лево-коммунистическими политическими партиями."
  SPA_coup_1981.t: "Попытка испанского переворота?"
  SPA_coup_1981.d: "В феврале 1981 года в Испании была предпринята попытка государственного переворота силами гражданской гвардии и испанских военных. Провал переворота стал последней серьезной попыткой вернуть Испанию франкистскому правительству и послужил консолидации процесса демократизации Испании. Король Хуан Карлос I сыграл важную роль в предотвращении переворота, и в результате монархия обрела новую легитимность."
  SPA_BSQ_devolution.t: "Статут Герники?"
  SPA_BSQ_devolution.d: "Статут автономии Страны Басков 1979 года, широко известный как Статут Герники, является юридическим документом, организующим политическую систему Автономного сообщества Страны Басков, включающего исторические территории Алава, Бискайя и Гипускоа. Он превращает регион в одно из автономных сообществ, предусмотренных Конституцией Испании 1978 года. Он установил систему парламентского правления, при которой президент (глава правительства) или лехендакари избирается Баскским автономным парламентом среди его членов. Выборы в парламент осуществляются всеобщим голосованием, и парламент состоит из 75 депутатов, по 25 от каждой из трех исторических территорий сообщества."
  TUR_coup_2016.t: "Попытка турецкого переворота?"
  TUR_coup_2016.d: "Вечером 15 июля 2016 года фракция в турецких вооруженных силах, организованная как Совет мира в семье, предприняла попытку государственного переворота против государственных институтов, включая правительство и президента Реджепа Тайипа Эрдогана. Они попытались захватить контроль над несколькими местами в Анкаре, Стамбуле, Мармарисе и других местах, например, вход с азиатской стороны Босфорского моста, но не смогли этого сделать после того, как силы и гражданские лица, лояльные государству, разгромили их. Правительство заявило, что располагает доказательствами того, что лидеры государственного переворота были связаны с движением Гюлена, которое признано Турецкой Республикой террористической организацией и возглавляется Фетхуллахом Гюленом, турецким бизнесменом и известным исламским ученым, жившим в изгнании в Пенсильвании."
  BOL_coup_1966.t: "Боливийское восстание?"
  BOL_coup_1966.d: "Ñancahuazú Guerrilla или Ejército de Liberación Nacional de Bolivia (Национально-освободительная армия Боливии; ELN) — группа, состоящая в основном из боливийских и кубинских партизан во главе с лидером партизан Че Геварой, которая действовала в провинции Кордильеры в Боливии с 1966 по 1967 год. Группа разбила свой базовый лагерь на ферме напротив Река Ньянкауасу, сезонный приток Рио-Гранде, в 250 км к юго-западу от города Санта-Крус-де-ла-Сьерра. Партизаны намеревались действовать как фокус, точка вооруженного сопротивления, которую можно было бы использовать в качестве первого шага к свержению боливийского правительства и созданию социалистического государства. Партизаны разгромили несколько боливийских патрулей, прежде чем они были разбиты, а Гевара был схвачен и казнен."
  BOL_assassinate_CG.t: "Казнь Че Гевары?"
  BOL_assassinate_CG.d: "Эрнесто «Че» Гевара — аргентинский революционер-марксист, врач, писатель, лидер партизан, дипломат и военный теоретик. Гевара покинул Кубу в 1965 году, чтобы разжечь континентальные революции в Африке и Южной Америке, сначала безуспешно в Конго-Киншасе, а затем в Боливии, где он был схвачен боливийскими силами при содействии ЦРУ и казнен без суда и следствия."
  USA_1992_LA_riots.t: "Беспорядки в Лос-Анджелесе?"
  USA_1992_LA_riots.d: "Беспорядки в Лос-Анджелесе 1992 года — серия беспорядков и гражданских беспорядков, которые произошли в округе Лос-Анджелес, штат Калифорния, США, в апреле и мае 1992 года. Беспорядки начались в южной части центральной части Лос-Анджелеса 29 апреля после того, как присяжные оправдали четырех офицеров Департамента полиции Лос-Анджелеса (LAPD), обвиненных в применении чрезмерной силы при аресте и избиении Родни Кинга. Инцидент был снят на видео Джорджем Холлидеем, который был свидетелем инцидента, и широко транслировался в различных новостях и средствах массовой информации."
  IDO_1998_riots.t: "Перистива?"
  IDO_1998_riots.d: "Беспорядки в Индонезии в мае 1998 года, или просто события 98-го числа (Перистива 98), представляли собой случаи массового насилия и гражданских беспорядков в Индонезии, многие из которых были направлены против этнического китайского населения страны. События произошли в основном в городах Медан, Джакарта и Суракарта, с меньшими инцидентами в других частях Индонезии. При поддерживаемом Западом Сухарто в Индонезии существовала широко распространенная и систематическая дискриминация этнических китайцев. Беспорядки были спровоцированы коррупцией, экономическими проблемами, включая нехватку продовольствия и массовую безработицу."
  PAP_assassinate_PJP_1981.t: "Первая попытка убийства Папы Иоанна Павла II?"
  PAP_assassinate_PJP_1981.d: "13 мая 1981 года на площади Святого Петра в Ватикане Папа Иоанн Павел II был ранен Мехметом Али Агкой, когда тот выходил на площадь. Папа получил два удара и перенес тяжелую кровопотерю. Агджа был немедленно задержан и позже приговорен итальянским судом к пожизненному заключению. Папа простил Агдже покушение. Он был помилован президентом Италии Карло Азельо Чампи по просьбе Папы и депортирован в Турцию в июне 2000 года."
  PAP_assassinate_PJP_1982.t: "Второе покушение на Папу Иоанна Павла II?"
  PAP_assassinate_PJP_1982.d: "Второе покушение было совершено 12 мая 1982 года, всего за день до годовщины первого покушения на его жизнь, в Фатиме, Португалия, когда мужчина попытался заколоть Иоанна Павла II штыком. Его остановили охранники. Станислав Дзивиш позже сказал, что Иоанн Павел II был ранен во время покушения, но сумел скрыть неопасную для жизни рану."
  USA_Jonestown_Massacre.t: "Джонстаунская резня"
  USA_Jonestown_Massacre.d: "Сельскохозяйственный проект «Храм народов», более известный под неофициальным названием «Джонстаун», представлял собой отдаленное поселение в Гайане, основанное «Храмом народов», американским религиозным движением под руководством Джима Джонса. Джонстаун стал всемирно известным, когда 18 ноября 1978 года в поселении погибло в общей сложности 918 человек; на близлежащей взлетно-посадочной полосе в Порт-Каитума; и в здании Храма в Джорджтауне, столице Гайаны. Термины, используемые для описания смертей в Джонстауне и Джорджтауне, со временем изменились. Многие современные СМИ после событий назвали эту смерть массовым самоубийством."
  GUY_Rupununi_Uprising.t: "Восстание Рупунуни"
  GUY_Rupununi_Uprising.d: "Восстание Рупунуни — сепаратистское восстание в Гайане, начавшееся 2 января 1969 года под руководством владельцев ранчо, стремившихся контролировать 22 300 квадратных миль (58 000 км2) земли. Произошедшее менее чем через два года после обретения Гайаной независимости от Соединенного Королевства, оно стало самым ранним и самым суровым испытанием государственности и социальной солидарности страны. В конечном итоге повстанцы были рассеяны Силами обороны Гайаны, а лидеры группировки бежали в Венесуэлу."
  PRC_Lin_Biao_Incident.t: "Инцидент с Линь Бяо"
  PRC_Lin_Biao_Incident.d: "Инцидент с Линь Бяо представлял собой авиакатастрофу в 3 часа ночи 13 сентября 1971 года с участием Линь Бяо, заместителя председателя Коммунистической партии Китая. Все находившиеся на борту Hawker Siddeley Trident, включая Линя и нескольких членов его семьи, погибли, когда самолет врезался в территорию Монголии. Линь Бяо якобы пытался бежать в Советский Союз после неудавшегося заговора с целью убийства Мао Цзэдуна."
  PRC_Anti_Corruption_Drive_2012.t: "Антикоррупционная кампания"
  PRC_Anti_Corruption_Drive_2012.d: "Широкомасштабная антикоррупционная кампания началась в Китае после завершения 18-го Национального конгресса Коммунистической партии Китая (КПК) в 2012 году. Кампания, проведенная под эгидой Си Цзиньпина, генерального секретаря КПК, стала крупнейшей организованной антикоррупционной акцией в истории правления КПК в Китае."
  SAF_Sharpeville_Massacre_1960.t: "Резня в Шарпевиле?"
  SAF_Sharpeville_Massacre_1960.d: "В 1959 году группа разочарованных членов АНК сформировала Панафриканский конгресс Азании (ПАК), который 21 марта 1960 года организовал демонстрацию против расчетных книжек. Один из этих протестов прошел в городке Шарпевиль, где 69 человек были убиты полицией во время резни в Шарпевиле. После Шарпевиля правительство объявило чрезвычайное положение. Было арестовано более 18 000 человек, в том числе лидеры АНК и ПАК, обе организации были запрещены. Сопротивление ушло в подполье: некоторые лидеры находились в изгнании за границей, а другие участвовали в кампаниях внутреннего саботажа и терроризма."
  SAF_Mahlabatini_Declaration_1974.t: "Декларация веры Махлабатини"
  SAF_Mahlabatini_Declaration_1974.d: "Декларация веры Махлабатини представляла собой заявление об основных принципах, изложенных южноафриканскими политическими лидерами Мангосуту Бутелези и Гарри Шварцем 4 января 1974 года. Она была подписана в Махлабатини, Квазулу-Натал, отсюда и ее название. Его цель заключалась в том, чтобы предоставить план правительства Южной Африки на основе согласия и расового мира в многорасовом обществе, подчеркивая возможности для всех, консультации, федеральную концепцию и билль о правах. Он также впервые подтвердил, что политические изменения должны происходить ненасильственными методами."
  VNZ_Pact_of_Puntofijo_1958.t: "Пакт Пунтофихо?"
  VNZ_Pact_of_Puntofijo_1958.d: "Пакт Пунтофихо был официальным соглашением, достигнутым между представителями трех основных политических партий Венесуэлы в 1958 году: Демократическое действие (AD), COPEI (Социал-христианская партия) и Демократический республиканский союз (URD), о принятии президентских выборов 1958 года и сохранении новой демократической системы. Пакт был письменной гарантией того, что подписавшие его стороны будут уважать результаты выборов, предотвращать однопартийную гегемонию, делить власть и сотрудничать во избежание диктатуры."
  VNZ_Caracazo_1989.t: "Каракасо?"
  VNZ_Caracazo_1989.d: "Каракасо — это название волны протестов, беспорядков и грабежей, которая началась 27 февраля 1989 года в венесуэльском городе Гуаренас и распространилась на Каракас и близлежащие города после мер жесткой экономии со стороны президента Карлоса Андреса Переса. По разным сообщениям, в результате недельных столкновений погибло множество людей, по оценкам, от сотен до тысяч, что в основном связано с участием сил безопасности и военных. Беспорядки и протесты начались главным образом в ответ на экономические реформы правительства и последующее повышение цен на бензин и транспорт."
  SPA_assassinate_LCB.t: "Убийство Луиса Карреро Бланко?"
  SPA_assassinate_LCB.d: "20 декабря 1973 года Луис Карреро Бланко, премьер-министр Испании, был убит в результате взрыва тайника со взрывчаткой в ​​туннеле, устроенном баскской сепаратистской группировкой ЭТА. Убийство, также известное под кодовым названием Operación Ogro (Операция Огре), считается крупнейшим нападением на франкистское государство со времен окончания гражданской войны в Испании в 1939 году и имело далеко идущие последствия в политике Испании."
  SOV_doctors_plot_1951.t: "Дело врачей?"
  SOV_doctors_plot_1951.d: "«Дело врачей» представлял собой спонсируемую Советским государством антиинтеллектуальную и антисемитскую (под видом антикосмополитической) кампанию, основанную на теории заговора, в которой утверждалось, что антисоветская клика известных медицинских специалистов, многие из которых были этническими евреями, намеревалась убить ведущих правительственных чиновников и чиновников Коммунистической партии. В 1951–1953 годах группа врачей из Москвы, большинство из которых были евреями, была обвинена в заговоре с целью убийства советских лидеров. Их обвинили в служении интересам международного еврейства, а также западной (в первую очередь американской и британской) разведки. После этого многие врачи были уволены с работы, арестованы и подвергнуты пыткам с целью получения признания."
  THI_massacre_1976.t: "Резня в университете Таммасат?"
  THI_massacre_1976.d: "Резня 6 октября 1976 года представляла собой жестокие репрессии со стороны тайской полиции и линчевание со стороны правых военизированных формирований и прохожих против левых протестующих, которые 6 октября 1976 года заняли университет Таммасат в Бангкоке и прилегающий к нему Санам Луанг. 6 октября с 5:30 до 11:00 полиция использовала боевое оружие, включая штурмовые винтовки, гранатометы и противотанковые средства. патроны и гранаты, чтобы разгромить окруженных протестующих, которые ненадолго попытались защитить себя, но были быстро разбиты."
  THI_massacre_1992.t: "Черный май?"
  THI_massacre_1992.d: "«Черный май» относится к жестокому политическому кризису в Таиланде, который разразился в мае 1992 года, когда в Бангкоке вспыхнули массовые протесты против назначения генерала Сучинды Крапрайона, который ранее руководил переворотом, премьер-министром, несмотря на то, что он не был избран. Демонстранты, возглавляемые Чамлонгом Шримуангом, требовали демократических реформ, но были встречены жестокими военными репрессиями, приведшими к десяткам смертей, сотням ранений и повсеместной цензуре СМИ. Кульминацией кризиса стало переданное по телевидению королевское вмешательство короля Пумипона Адульядета, который призвал к миру между противоборствующими сторонами. Сучинда вскоре подал в отставку, открыв путь к новым выборам и переходу к более демократическому управлению."
  ETH_massacre_1976.t: "Кей Шибир?"
  ETH_massacre_1976.d: "Эфиопский красный террор, также известный как Кей Шибир, представлял собой кампанию жестоких политических репрессий Дерга против других конкурирующих марксистско-ленинских группировок в Эфиопии и современной Эритрее с 1976 по 1978 год. Кей Шибир была попыткой консолидировать правление Дерга во время политической нестабильности после свержения ими императора Хайле Селассие в 1974 году и последующей гражданской войны в Эфиопии. Кей Шибир был основан на красном терроре времен Гражданской войны в России и наиболее заметно произошел после того, как Менгисту Хайле Мариам стал председателем Дерга 3 февраля 1977 года. По оценкам, в ходе Кей Шибир было убито от 10 000 до 980 000 человек."
  ROC_massacre_1948.t: "Белый террор?"
  ROC_massacre_1948.d: "Белый террор — это политические репрессии против тайваньского гражданского населения и политических инакомыслящих при правительстве Гоминьдана (Гоминьдана). Обычно считается, что период белого террора начался с объявления военного положения на Тайване 19 мая 1949 года, что стало возможным благодаря Временным положениям 1948 года о борьбе с коммунистическим восстанием, и завершился 21 сентября 1992 года отменой статьи 100 Уголовного кодекса, позволяющей преследовать «антигосударственную» деятельность."
  IDO_massacre_1965.t: "Массовые антикоммунистические убийства в Индонезии?"
  IDO_massacre_1965.d: "Крупномасштабные убийства и гражданские беспорядки, направленные в первую очередь против членов и предполагаемых сторонников Коммунистической партии Индонезии (КПИ), проводились в Индонезии с 1965 по 1966 год. Среди других затронутых групп были предполагаемые сторонники коммунистов, женщины Гервани, профсоюзные деятели, этнические яванцы Абанган, этнические китайцы, атеисты, так называемые «неверующие» и предполагаемые левые в целом. По наиболее широко опубликованным оценкам, погибло от 500 000 до 1 миллиона человек, а по некоторым оценкам - от 2 до 3 миллионов. Зверства, которые иногда называют геноцидом или политическим убийством, были спровоцированы индонезийской армией под командованием Сухарто."
  GBR_princess_of_wales_1981.t: "Брак Дианы и принца Чарльза?"
  GBR_princess_of_wales_1981.d: "Диана, принцесса Уэльская (урожденная Диана Фрэнсис Спенсер), была членом британской королевской семьи. Она была первой женой Карла III (тогда принца Уэльского) и матерью принцев Уильяма и Гарри. Ее активизм и гламур, сделавшие ее международной иконой, снискали ей непреходящую популярность. Их свадьба состоялась в соборе Святого Павла в июле 1981 года и сделала ее принцессой Уэльской, роль, в которой она была с энтузиазмом принята публикой. У пары было двое сыновей, Уильям и Гарри, которые на тот момент были вторым и третьим в линии наследования британского престола соответственно."
  USA_Tea_Party_Movement_2009.t: "Движение «Чаепитие»?"
  USA_Tea_Party_Movement_2009.d: "Движение «Чаепитие» — американское консервативное в финансовом отношении политическое движение внутри Республиканской партии, возникшее в 2007 году и ставшее мейнстримом благодаря президентской кампании конгрессмена Рона Пола. Движение расширилось в ответ на политику президента-демократа Барака Обамы и стало важным фактором на волне выборов 2010 года, на которых республиканцы получили 63 места в Палате представителей и взяли под свой контроль Палату представителей США."
  USA_MAGA_Movement_2016.t: "Движение МАГА?"
  USA_MAGA_Movement_2016.d: "Политические движения «Сделаем Америку снова великой» (MAGA) и «Америка прежде всего» включают в себя такие идеологии, как правый популизм, правый антиглобализм, национальный консерватизм и неонационализм, а также характеризуются значительными нелиберальными, авторитарными и порой автократическими убеждениями. В конце 2010-х - начале 2020-х годов сторонники MAGA стали крупнейшей фракцией Республиканской партии США."
  USA_assassinate_CJK.t: "Убийство Чарли Кирка?"
  USA_assassinate_CJK.d: "Чарльз Джеймс Кирк был американским консервативным политическим активистом, писателем и медийной личностью. В 2012 году он стал соучредителем студенческой организации Turning Point USA (TPUSA) и был ее исполнительным директором. Он был главным исполнительным директором Turning Point Action и членом Совета по национальной политике. В последние годы своей жизни он был одним из самых ярких представителей популистского движения МАГА в Республиканской партии. 10 сентября 2025 года Кирк был застрелен во время выступления на публичных дебатах TPUSA в кампусе Университета Юты-Вэлли. Его смерть привлекла международное внимание и привела к осуждению политического насилия со стороны видных отечественных и международных деятелей."
  USA_Nation_of_Islam_1952.t: "Условно-досрочное освобождение Малкольма Икса?"
  USA_Nation_of_Islam_1952.d: "Малкольм Икс (урожденный Малкольм Литтл, позже эль-Хадж Малик эль-Шабаз) был афроамериканским революционером, мусульманским министром и правозащитником, который был заметной фигурой во время движения за гражданские права до своего убийства в 1965 году. Представитель Нации Ислама (NOI) до 1964 года, после чего он покинул движение, он был активным сторонником расширения прав и возможностей чернокожих и продвижения ислама в афроамериканском сообществе. Противоречивая фигура, обвиняемая в проповеди насилия, Малкольм Икс также является знаменитой фигурой в афроамериканских и мусульманских сообществах за свое стремление к расовой справедливости."
  USA_assassinate_MLX.t: "Убийство Малкольма Икса?"
  USA_assassinate_MLX.d: "Малкольм Икс, афроамериканский мусульманский священник и правозащитник, который был популярной фигурой в движении за гражданские права, получил несколько выстрелов и скончался от ран в Манхэттене, Нью-Йорк, 21 февраля 1965 года в возрасте 39 лет, готовясь выступить перед Организацией афро-американского единства в бальном зале Одюбон в районе Вашингтон-Хайтс. Трое членов «Нации ислама» — Мухаммад Абдул Азиз, Халил Ислам и Томас Хаган — были обвинены, преданы суду и признаны виновными в убийстве и приговорены к неопределенным пожизненным заключениям, но в ноябре 2021 года Азиз и Ислам были реабилитированы."
  JAP_protest_1960.t: "Протесты Анпо"
  JAP_protest_1960.d: "Протесты Анпо представляли собой серию массовых протестов по всей Японии с 1959 по 1960 год, а затем в 1970 году, против Договора о безопасности между США и Японией, который позволяет Соединенным Штатам содержать военные базы на японской земле. Протесты Анпо 1960 года в конечном итоге не смогли помешать вступлению в силу пересмотренного американо-японского Договора о безопасности, но они все же привели к отставке кабинета Киси и отмене запланированного визита Эйзенхауэра. На посту премьер-министра Киши сменил Хаято Икеда, который занял гораздо более примирительную позицию по отношению к политической оппозиции, на неопределенный срок отложил планы Киши по пересмотру конституции Японии и объявил о Плане удвоения доходов, чтобы перенаправить энергию нации от спорной политической борьбы к общенациональному стремлению к быстрому экономическому росту."
  NEJ_Jamal_Khashoggi_2003.t: "Дело Джамаля Хашогги?"
  NEJ_Jamal_Khashoggi_2003.d: "В 2003 году Джамаль Хашогги был известным саудовским журналистом и редактором, известным своими тесными связями с королевской семьей, но уважаемым за свой независимый голос. Некоторое время он занимал должность главного редактора газеты «Аль-Ватан», где его реформистская позиция привела к увольнению после публикации критики религиозного консерватизма."
  NEJ_Jamal_Khashoggi_2018.t: "Убийство Джамаля Хашогги?"
  NEJ_Jamal_Khashoggi_2018.d: "2 октября 2018 года саудовский журналист Джамаль Хашогги был убит в консульстве Саудовской Аравии в Стамбуле. Группа из 15 человек устроила ему засаду и убила его, предположительно по приказу заставить замолчать известного критика наследного принца. Его тело было расчленено и так и не найдено, что вызвало глобальное возмущение и дипломатические последствия."
  JAP_protest_1952.t: "Кровавый майский день"
  JAP_protest_1952.d: "Кровавый Первомай — это жестокий конфликт, который произошел между протестующими и полицейскими в Национальном саду Кокио Гайен перед Императорским дворцом в Токио, Япония, 1 мая 1952 года. Когда большая толпа, протестовавшая против Договора о безопасности США и Японии, отказалась разойтись, между протестующими и полицейскими произошла кровавая рукопашная схватка. В конце концов полицейские открыли огонь по толпе, убив двоих и ранив 22 пулевыми ранениями. Всего в боях пострадали около 2300 человек (1500 протестующих и 800 полицейских)."
  JAP_protest_1955.t: "Борьба Сунагавы"
  JAP_protest_1955.d: "Борьба Сунагавы — движение протеста в Японии, начавшееся в 1955 году и продолжавшееся до 1957 года, против расширения авиабазы ​​ВВС США Тачикава на соседнюю деревню Сунагава. «Кровавый Сунагава», происходящий на пике растущего движения против баз, запомнился как самый интенсивный и жестокий из многих протестов против военных баз США в Японии."
  PRC_ethnic_unity_law_2026.t: "Закон о содействии этническому единству и прогрессу?"
  PRC_ethnic_unity_law_2026.d: "Закон о содействии этническому единству и прогрессу — это закон Китая, касающийся этнических меньшинств. Закон был внесен Комитетом по этническим вопросам Всекитайского собрания народных представителей и передан на рассмотрение ВСНП 8 сентября 2025 года. Он был принят ВСНП 12 марта 2026 года и в тот же день подписан президентом Си Цзиньпином. Он вступил в силу 1 июля 2026 года. Закон закрепляет политику Си Цзиньпина в отношении этнических вопросов и способствует дальнейшей этнической интеграции под руководством Коммунистической партии Китая. Закон подвергся критике со стороны ученых и правозащитников за пределами Китая, а его продвижение экстерриториального правоприменения сравнивалось с транснациональными репрессиями."
  GER_post_war_deportations.t: "Послевоенное изгнание немцев?"
  GER_post_war_deportations.d: "Вторая мировая война закончилась в Европе поражением Германии в мае 1945 года. Союзники согласовали условия оккупации, территориального усечения Германии и изгнания этнических немцев из послевоенной Польши, Чехословакии и Венгрии в союзные оккупационные зоны в Потсдамском соглашении. После Потсдама серия изгнаний этнических немцев произошла во всех странах Восточной Европы, контролируемых Советским Союзом. Имущество и техника на пострадавшей территории, принадлежавшая Германии или немцам, была конфискована; оно было либо передано Советскому Союзу, национализировано, либо перераспределено среди граждан."
  GER_post_war_deportations.option.1: "Изгоните немцев!"
  GER_post_war_deportations.option.2: "Пусть они остаются в нашей стране."
  ISR_post_war_migration.t: "Кибуц Галуйот?"
  ISR_post_war_migration.d: "Основная волна еврейской иммиграции, в основном из Европы после Холокоста, а также арабского и мусульманского мира, произошла с 1948 по 1951 год. За три с половиной года еврейское население Израиля, которое на момент основания государства составляло 650 000 человек, увеличилось более чем вдвое за счет притока около 688 000 иммигрантов. В 1949 году в Израиль прибыло самое большое за всю историю количество еврейских иммигрантов за один год — 249 954 человека. Этот период иммиграции часто называют кибуцем галуйот (буквально «сбор изгнанников») из-за большого количества общин еврейской диаспоры, совершивших алию."
  historical_pop_transfer.option.1: "Пусть мигрируют."
  historical_pop_transfer.option.2: "Не позволяйте им уходить!"
  POL_post_war_deportations.t: "Первая репатриация поляков?"
  POL_post_war_deportations.d: "Переселение польского населения в 1944–1946 годах из восточной половины довоенной Польши представляло собой вынужденную миграцию поляков в конце и после Второй мировой войны. Это было результатом политики Советского Союза, ратифицированной основными союзниками во Второй мировой войне. По официальным данным, во время контролируемого государством изгнания в период с 1945 по 1946 год примерно 1 167 000 поляков покинули самые западные республики Советского Союза, что составляет менее 50% от числа тех, кто зарегистрировался для переселения населения. Еще один крупный переезд этнических поляков произошел после смерти Сталина, в 1955–1959 годах."
  POL_post_war_deportations.option.1: "Изгоните поляков!"
  POL_post_war_deportations.option.2: "Пусть они остаются в нашей стране."
  POL_post_war_deportations_2.t: "Вторая репатриация поляков?"
  POL_post_war_deportations_2.d: "Вторая волна принудительной репатриации (или депортации) поляков, проживавших на аннексированных Советским Союзом территориях (известных как Кресы Всходни), произошла в 1955–1959 годах. Широко используемый термин «репатриация», пропагандируемый десятилетиями польской коммунистической пропаганды, является эвфемизмом для актов экспатриации. Иногда ее называют «второй репатриацией», чтобы отличить ее от репатриации 1944–1946 годов."
  nato_join_war.t: "Коллективная оборона активирована"
  warsaw_pact_join_war.t: "Коллективная оборона активирована"
  H3N2_1968.t: "Гонконгский грипп"
  H3N2_1968.d: "Гонконгский грипп — пандемия гриппа, которая произошла в 1968 и 1969 годах и унесла жизни от одного до четырех миллионов человек во всем мире. Это одна из самых смертоносных пандемий в истории, вызванная штаммом H3N2 вируса гриппа А. Первый зарегистрированный случай вспышки произошел 13 июля 1968 года в Британском Гонконге. Было высказано предположение, что вспышка началась в материковом Китае, а затем распространилась на Гонконг."
  SARS_2003.t: "Вспышка атипичной пневмонии"
  SARS_2003.d: "Вспышка атипичной пневмонии в 2002–2004 годах, вызванная коронавирусом тяжелого острого респираторного синдрома (SARS-CoV или SARS-CoV-1), заразила более 8000 человек из 30 стран и территорий и привела как минимум к 774 смертельным случаям во всем мире. Вспышка была впервые выявлена ​​в Фошане, провинция Гуандун, Китай, в ноябре 2002 года. Всемирная организация здравоохранения (ВОЗ) была уведомлена о вспышке в феврале 2003 года и выпустила глобальное предупреждение в марте 2003 года. Большая часть вспышки длилась около 8 месяцев, и 5 июля 2003 года Всемирная организация здравоохранения объявила о локализации атипичной пневмонии."
  H1N1_2009.t: "Пандемия H1N1"
  H1N1_2009.d: "Пандемия свиного гриппа 2009 года, вызванная вирусом H1N1 и объявленная Всемирной организацией здравоохранения (ВОЗ) с июня 2009 года по август 2010 года, стала третьей за последнее время пандемией гриппа, связанной с вирусом H1N1. Первый выявленный случай заболевания человека произошел в Ла-Глории, Мексика, сельском городке в Веракрусе. Вирус оказался новым штаммом H1N1, возникшим в результате предыдущей тройной реассортации вирусов птичьего, свиного и человеческого гриппа, которые в дальнейшем объединились с вирусом евразийского свиного гриппа."
  COVID_2019.t: "Пандемия COVID-19"
  COVID_2019.d: "Пандемия COVID-19 — это глобальная пандемия коронавирусного заболевания 2019 года (COVID-19), вызванная тяжелым острым респираторным синдромом коронавируса 2 (SARS-CoV-2). Новый вирус был впервые выявлен во время вспышки в Ухане, столице провинции Хубэй, Китай, в декабре 2019 года, а затем распространился на другие районы Азии, а затем и по всему миру в начале 2020 года. Всемирная организация здравоохранения (ВОЗ) объявила вспышку чрезвычайной ситуацией в области общественного здравоохранения, имеющей международное значение (PHEIC) 30 января 2020 года, а 11 марта 2020 года оценила, что вспышка переросла в пандемию."
  historical_pandemics.option.1: "О, нет!"
  biological_weapons_fallout.t: "Искусственная пандемия"
  biological_weapons_fallout.option: "О, нет!"
  end_conscription.t: "Отменить призыв?"
  nuclear_accident_1979.t: "Ядерная авария на Три-Майл-Айленде"
  nuclear_accident_1979.d: "Авария на Три-Майл-Айленде представляла собой ядерную аварию реактора энергоблока 2 (TMI-2) атомной электростанции Три-Майл-Айленд на реке Саскуэханна в городке Лондондерри, недалеко от Гаррисберга, столицы Пенсильвании, США. Авария реактора началась в 4 часа утра 28 марта 1979 года и привела к выбросу радиоактивных газов и радиоактивного йода в окружающую среду."
  nuclear_accident_1986.t: "Чернобыльская ядерная катастрофа"
  nuclear_accident_1986.d: "Чернобыльская катастрофа началась 26 апреля 1986 года со взрыва реактора № 4 Чернобыльской АЭС недалеко от города Припять на севере Украинской ССР, недалеко от границы с Белорусской ССР, в Советском Союзе. После катастрофы Припять была заброшена и в конечном итоге заменена новым специально построенным городом Славутич."
  nuclear_accident_2011.t: "Ядерная авария на Фукусиме"
  nuclear_accident_2011.d: "Ядерная авария на Фукусиме — крупная ядерная авария на атомной электростанции «Фукусима-дайити» в Окуме, Фукусима, Япония, которая началась 11 марта 2011 года. Непосредственной причиной аварии стало землетрясение и цунами Тохоку 2011 года, которые привели к выходу из строя электросети и повредили почти все резервные источники энергии электростанции. Последующая неспособность достаточно охладить реакторы после остановки поставила под угрозу сдерживание и привела к выбросу радиоактивных загрязнителей в окружающую среду."
  historical_nuclear_accidents.option.1: "О, нет!"
  1995_JAP_earthquake.t: "Великое землетрясение Хансин"
  1995_JAP_earthquake.d: "Великое землетрясение Хансин произошло 17 января 1995 года в южной части префектуры Хёго, Япония, включая регион, известный как Хансин. Его магнитуда составила 6,9 баллов по моментной шкале, а максимальная интенсивность - 7 баллов по шкале сейсмической интенсивности JMA (XI–XII по модифицированной шкале интенсивности Меркалли). Толчки продолжались около 20 секунд. Очаг землетрясения находился в 17 км ниже его эпицентра, на северной оконечности острова Авадзи, в 20 км от центра города Кобе. В результате землетрясения погибло около 6434 человек; около 4600 из них были из Кобе."
  2004_IDO_earthquake.t: "Землетрясение в Индийском океане"
  2004_IDO_earthquake.d: "26 декабря 2004 г. сильное землетрясение магнитудой 9,2–9,3 МВт произошло с эпицентром у западного побережья северной Суматры, Индонезия. Подводное меганадвиговое землетрясение было вызвано разрывом вдоль разлома между Бирманской плитой и Индийской плитой и на некоторых участках достигло интенсивности Меркалли до IX. Массивное цунами с волнами высотой до 30 м (100 футов), известное как «Цунами Дня подарков» в честь праздника «День подарков» или «Азиатское цунами», опустошило населенные пункты вдоль окружающих побережий Индийского океана, убив примерно 227 898 человек в 14 странах в результате одного из самых смертоносных стихийных бедствий в зарегистрированной истории."
  2011_JAP_earthquake.t: "Великое землетрясение в Восточной Японии"
  2011_JAP_earthquake.d: "11 марта 2011 года подводное мегаземлетрясение магнитудой 9,0–9,1 произошло в Тихом океане, в 72 км (45 миль) к востоку от полуострова Осика в регионе Тохоку. Оно длилось около шести минут и вызвало цунами. Это было самое мощное землетрясение, когда-либо зарегистрированное в Японии, и четвертое по силе землетрясение, зарегистрированное в мире с момента начала современной сейсмографии в 1900 году."
  1975_PRC_flood.t: "Прорыв плотины Банкяо"
  1975_PRC_flood.d: "В августе 1975 года плотина Баньцяо и еще 61 плотина на всей территории провинции Хэнань, Китай, обрушились после обрушения тайфуна «Нина». Обрушение плотины привело к третьему по величине наводнению в истории, которое затронуло 12 000 км2 (3 миллиона акров) с общей численностью населения 10,15 миллиона человек, включая около 30 городов и округов, при этом число погибших оценивается от 26 000 до 240 000 человек. Наводнение также привело к обрушению от 5 до 6,8 миллионов домов. Прорыв плотины произошел в контексте Культурной революции."
  1970_BNG_cyclone.t: "Циклон Бхола"
  1970_BNG_cyclone.d: "Циклон Бхола 1970 года — разрушительный тропический циклон, обрушившийся на Восточный Пакистан (современная Бангладеш) и индийскую Западную Бенгалию 12 ноября 1970 года. Он остается самым смертоносным тропическим циклоном, когда-либо зарегистрированным, и одной из самых смертоносных гуманитарных катастроф в мире. Во время урагана погибло не менее 300 000 человек, а возможно, и 500 000, в первую очередь в результате штормового нагона, затопившего большую часть низменных островов дельты Ганга."
  1991_BNG_cyclone.t: "Бангладешский циклон"
  1991_BNG_cyclone.d: "Циклон 1991 года в Бангладеш был одним из самых смертоносных тропических циклонов за всю историю наблюдений. Этот циклон, один из самых мощных, когда-либо зарегистрированных в этом бассейне, вызвал штормовой прилив высотой 6,1 м (20 футов), затопивший побережье и причинивший ущерб как минимум 138 866 человек, а также около 1,7 миллиарда долларов США (в ценах 1991 года). В результате катастрофических разрушений Соединенные Штаты и другие страны провели операцию «Морской ангел», одну из крупнейших военных операций по оказанию помощи в истории."
  2008_BUR_cyclone.t: "Циклон Наргис"
  2008_BUR_cyclone.d: "Чрезвычайно сильный циклонический шторм «Наргис» был чрезвычайно разрушительным и смертоносным тропическим циклоном, вызвавшим самое страшное стихийное бедствие в зарегистрированной истории Мьянмы в начале мая 2008 года. Циклон обрушился на берег Мьянмы в пятницу, 2 мая 2008 года, вызвав штормовой нагон на 40 километров вверх по густонаселенной дельте Иравади, вызвав катастрофические разрушения и по меньшей мере 138 373 человека погибли."
  2010_HAI_earthquake.t: "Великое землетрясение на Гаити"
  2010_HAI_earthquake.d: "Землетрясение на Гаити 2010 года представляло собой катастрофическое землетрясение магнитудой 7,0 МВт, которое произошло на Гаити в 16:53 по местному времени (21:53 UTC) во вторник, 12 января 2010 года. Эпицентр находился недалеко от города Леоган, Западный департамент, примерно в 25 километрах (16 миль) к западу от Порт-о-Пренса, столицы Гаити. По оценкам, от землетрясения пострадало три миллиона человек. По оценкам правительства Гаити, число погибших варьируется от 100 000 до примерно 160 000, а по данным правительства Гаити - от 220 000 до 316 000."
  1992_GBR_monument_damaged.t: "Пожар в Виндзорском замке"
  1992_GBR_monument_damaged.d: "20 ноября 1992 года в Виндзорском замке, крупнейшем обитаемом замке мира и одной из официальных резиденций британского монарха, вспыхнул пожар. Замку был нанесен серьезный ущерб, и в течение следующих пяти лет он был полностью отремонтирован стоимостью 36,5 миллионов фунтов стерлингов в рамках проекта, возглавляемого архитекторами-реставраторами Donald Insall Associates. Это привело к тому, что королева Елизавета II заплатила налог на свой доход, а Букингемский дворец, еще одна ее официальная резиденция, был открыт для публики, чтобы помочь оплатить реставрационные работы."
  2019_FRA_monument_damaged.t: "Пожар в Нотр-Даме"
  2019_FRA_monument_damaged.d: "15 апреля 2019 года, незадолго до 18:20 по центральноевропейскому летнему времени, на крыше Нотр-Дам де Пари, средневекового католического собора в Париже, Франция, вспыхнул структурный пожар. К моменту тушения пожара деревянный шпиль (флеш) собора рухнул, большая часть деревянной крыши была разрушена, а верхние стены собора были серьезно повреждены. Значительный ущерб интерьеру удалось предотвратить благодаря сводчатому каменному потолку, который в значительной степени удерживал горящую крышу во время ее обрушения. Многие произведения искусства и религиозные реликвии были перевезены в безопасное место, но другие пострадали от дыма, а некоторые внешние предметы искусства были повреждены или уничтожены."
  1999_VNZ_mudslide.t: "Трагедия Варгаса"
  1999_VNZ_mudslide.d: "Трагедия Варгаса — стихийное бедствие, произошедшее в штате Варгас, Венесуэла, 15 декабря 1999 года (в течение 10 дней), когда проливные дожди вызвали ливневые паводки и селевые потоки, в результате которых погибли десятки тысяч людей, были разрушены тысячи домов и что привело к полному разрушению инфраструктуры штата. По словам спасателей, район Лос-Коралес был погребен под слоем грязи толщиной 3 метра (9,8 футов), а большая часть домов была просто смыта в океан. Целые города, включая Серро-Гранде и Кармен-де-Уриа, полностью исчезли. Во время этого события погибло до 10% населения Варгаса."
  2019_JAP_monument_damaged.t: "Пожар в замке Сюри"
  2019_JAP_monument_damaged.d: "Замок Сюри — замок Рюкюань-гусуку в Сюри, префектура Окинава, Япония. Между 1429 и 1879 годами это был дворец Королевства Рюкю, прежде чем он был заброшен. В 1945 году во время битвы за Окинаву он был почти полностью разрушен. Утром 31 октября 2019 года основные дворовые конструкции замка снова были уничтожены пожаром."
  1991_PHI_eruption.t: "Извержение горы Пинатубо"
  1991_PHI_eruption.d: "Извержение горы Пинатубо в 1991 году в вулканической дуге Лусон на Филиппинах было вторым по величине извержением вулкана 20-го века, уступив только извержению Новарупты на Аляске в 1912 году.  Почти каждый мост в пределах 30 км (19 миль) от горы Пинатубо был разрушен. Несколько равнинных городов были затоплены или частично засыпаны грязью. В результате обрушения крыш под мокрым тяжелым пеплом погибли более 840 человек, еще несколько получили ранения."
  2022_TON_eruption.t: "Извержение Хунга Тонга – Хунга Хаапай."
  2022_TON_eruption.d: "В декабре 2021 года началось извержение подводного вулкана Хунга Тонга-Хунга Хаапай на Тонганском архипелаге в южной части Тихого океана. Извержение достигло очень большого и мощного апогея почти четыре недели спустя, 15 января 2022 года. Хунга Тонга – Хунга Хаапай находится в 65 километрах (40 миль) к северу от Тонгатапу, главного острова страны, и является частью высокоактивной вулканической дуги островов Тонга – Кермадек, зоны субдукции, простирающейся от Новой Зеландии до Фиджи."
  2025_BUR_earthquake.t: "Мандалайское землетрясение"
  2025_BUR_earthquake.d: "28 марта 2025 года в 12:50:54 по мск землетрясение магнитудой 7,7 произошло в регионе Сагайн в Мьянме, эпицентр которого находится недалеко от Мандалая, второго по величине города страны. Сдвиговый толчок достиг максимальной интенсивности IX (сильный) по Модифицированной Меркалли. Это было самое мощное землетрясение, произошедшее в Мьянме с 1912 года, и второе по смертности в современной истории Мьянмы, уступающее только верхним оценкам землетрясения в Баго 1930 года. Землетрясение нанесло значительный ущерб Мьянме и значительный ущерб соседнему Таиланду. Сотни домов также были повреждены в провинции Юньнань, Китай."
  2018_USA_wildfire.t: "Пожар в калифорнийском лагере"
  2018_USA_wildfire.d: "Пожар «Кэмп Файр» 2018 года в округе Бьютт на севере Калифорнии стал самым смертоносным и разрушительным лесным пожаром в истории Калифорнии. Пожар начался утром 8 ноября 2018 года, когда часть плохо обслуживаемой линии электропередачи компании Pacific Gas and Electric Company (PG&E) в каньоне Фезер-Ривер вышла из строя из-за сильных катабатических ветров. Эти ветры быстро распространили пожар «Кэмп Файр» по населенным пунктам Конкоу, Магалия, каньон Бьютт-Крик и Парадайз, практически уничтожив их. Пожар бушевал еще две недели и был локализован в воскресенье, 25 ноября, после того, как выгорело 153 336 акров (62 050 га). В результате пожара «Кэмп Файр» погибло 85 человек, более 50 000 человек были вынуждены покинуть свои дома, и было уничтожено более 18 000 строений, причинив ущерб на сумму около 16,5 миллиардов долларов США."
  1976_CHI_earthquake.t: "Таншаньское землетрясение"
  1976_CHI_earthquake.d: "Таншаньское землетрясение 1976 года представляло собой землетрясение магнитудой 7,6, которое произошло в районе Таншаня, Хэбэй, Китай, в 19:42:55 по всемирному координированному времени 27 июля. Максимальная сила землетрясения составила XI по шкале Меркалли."
  1948_TKM_earthquake.t: "Ашхабадское землетрясение"
  1948_TKM_earthquake.d: "Ашхабадское землетрясение 1948 года произошло 6 октября с магнитудой поверхностной волны 7,3 и максимальной интенсивностью Меркалли X в Туркменистане недалеко от Ашхабада. Из-за цензуры со стороны советского правительства это событие не получило широкого освещения в советских СМИ."
  eastern_europe_sovietisation.d: "Поначалу Советы скрывали свою роль в других политиках Восточного блока, а трансформация выглядела как модификация западной «буржуазной демократии». Обученные в Москве кадры были поставлены на важные руководящие посты для выполнения приказов, касающихся социально-политических преобразований. Ликвидация социальной и финансовой власти буржуазии путем экспроприации земельной и промышленной собственности считалась абсолютным приоритетом. Важнейшие отделы, такие как ответственные за персонал, общую полицию, тайную полицию и молодежь, находились под строгим контролем коммунистов. Подобные процедуры повторялись до тех пор, пока коммунисты не получили неограниченную власть и остались только политики, безоговорочно поддерживавшие советскую политику."
  eastern_europe_sovietisation.option.2: "В этом нет необходимости."
  eastern_europe_sovietisation_target.option.2: "Мы будем свободны!"
  Turkish_Straits_Crisis.t: "Кризис Турецких проливов?"
  Turkish_Straits_Crisis.d: "Кризис в Турецких проливах был территориальным конфликтом времен холодной войны между Советским Союзом и Турцией. После окончания Второй мировой войны советское правительство оказало давление на Турцию с требованием установить совместный военный контроль над проходом через Турецкие проливы, которые соединяли Черное море со Средиземным. Когда турецкое правительство отказалось, напряженность в регионе возросла, что привело к советской демонстрации силы и требованиям территориальных уступок вдоль грузино-турецкой границы."
  Turkish_Straits_Crisis.1.option.1: "Требуйте от Турции уступок!"
  Turkish_Straits_Crisis.1.option.2: "Оставьте Турцию в покое."
  Turkish_Straits_Crisis.2.option.1: "Откажитесь от советских требований!"
  Turkish_Straits_Crisis.2.option.2: "Примите советское господство!"
  Turkish_Straits_Crisis.3.t: "Турция сопротивляется советскому давлению"
  Turkish_Straits_Crisis.3.d: "Поддавшись растущему давлению со стороны Советов, Турция через несколько дней обратилась за помощью к Соединенным Штатам. Посоветовавшись со своей администрацией, президент Трумэн направил в Турцию оперативную группу военно-морских сил. 9 октября 1946 года правительства США и Великобритании подтвердили свою поддержку Турции. 26 октября Советский Союз отозвал свою конкретную просьбу о проведении нового саммита по вопросу контроля над Турецкими проливами (но не свое мнение) и вскоре после этого вывел большую часть устрашающих вооруженных сил из региона."
  Turkish_Straits_Crisis.3.option.1: "Откажитесь от наших требований!"
  Turkish_Straits_Crisis.3.option.2: "Время войны!"
  Berlin_Crisis.t: "Берлинский кризис?"
  Berlin_Crisis.d: "Берлинский кризис 1961 года был последним крупным политическим и военным инцидентом в Европе времен холодной войны, касавшимся статуса столицы Германии Берлина и Германии после Второй мировой войны. Кульминацией кризиса стал фактический раздел города с возведением Берлинской стены в Восточной Германии. Берлинский кризис начался в июне 1961 года, когда советский премьер Никита Хрущев на встрече с президентом США Джоном Кеннеди на саммите в Вене повторно предъявил ультиматум, который требовал вывода всех вооруженных сил из Берлина, включая западные вооруженные силы в Западном Берлине."
  Berlin_Crisis.1.option.1: "Требуйте контроля над Берлином!"
  Berlin_Crisis.1.option.2: "Оставьте Западную Германию в покое."
  Berlin_Crisis.2.option.1: "Откажитесь от советских требований!"
  Berlin_Crisis.2.option.2: "Примите советское господство!"
  Berlin_Crisis.3.t: "Соединенные Штаты сопротивляются советскому давлению"
  Berlin_Crisis.3.d: "Никакого соглашения достигнуто не было, и в августе 1961 года при поддержке Хрущева лидер Восточной Германии Вальтер Ульбрихт приказал закрыть границу и построить стену вокруг Западного Берлина. Кратковременное противостояние между американскими и советскими танками произошло на контрольно-пропускном пункте Чарли в октябре после спора о свободном передвижении личного состава союзников; Противостояние закончилось мирно после того, как Хрущев и Кеннеди согласились отвести танки и снизить напряженность."
  Berlin_Crisis.3.option.1: "Откажитесь от наших требований!"
  Berlin_Crisis.3.option.2: "Время войны!"
  Berlin_Ultimatum.t: "Берлинский ультиматум?"
  Berlin_Ultimatum.d: "В ноябре 1958 года Хрущев предъявил западным державам ультиматум о выводе войск из Берлина в течение шести месяцев и превращении его в свободный демилитаризованный город. Хрущев заявил, что в конце этого периода Советский Союз передаст контроль над всеми коммуникациями с Западным Берлином Восточной Германии, а это означает, что западные державы будут иметь доступ к Западному Берлину только тогда, когда Восточная Германия разрешит это."
  Berlin_Ultimatum.1.option.1: "Требуйте контроля над Берлином!"
  Berlin_Ultimatum.1.option.2: "Оставьте Берлин в покое."
  Berlin_Ultimatum.2.option.1: "Откажитесь от советских требований!"
  Berlin_Ultimatum.2.option.2: "Примите советский ультиматум!"
  Berlin_Ultimatum.3.t: "Соединенные Штаты сопротивляются советскому давлению"
  Berlin_Ultimatum.3.d: "С точки зрения НАТО Западный Берлин — глубоко на коммунистической территории — не имел военной ценности. Однако это был выдающийся символ сопротивления советскому захвату Европы. Эйзенхауэр отметил, что Берлин был «примером, когда наша политическая позиция требует от нас принятия военной позиции, которая совершенно нелогична». Премьер-министр Великобритании Гарольд Макмиллан посетил Москву для расширенных переговоров с Хрущевым в феврале 1959 года. Встречи были в основном сердечными; ультиматум был снят."
  Berlin_Ultimatum.3.option.1: "Откажитесь от наших требований!"
  Berlin_Ultimatum.3.option.2: "Время войны!"
  Berlin_Blockade.t: "Блокада Берлина?"
  Berlin_Blockade.d: "Блокада Берлина была одним из первых крупных международных кризисов холодной войны. Во время многонациональной оккупации Германии после Второй мировой войны Советский Союз заблокировал доступ западных союзников по железным дорогам, дорогам и каналам к секторам Берлина, находившимся под контролем Запада. Советы предложили снять блокаду, если западные союзники отзовут недавно введенную немецкую марку из Западного Берлина."
  Berlin_Blockade.1.option.1: "Требуйте контроля над Берлином!"
  Berlin_Blockade.1.option.2: "Оставьте Берлин в покое."
  Berlin_Blockade.2.option.1: "Откажитесь от советских требований!"
  Berlin_Blockade.2.option.2: "Примите советский ультиматум!"
  Berlin_Blockade.3.t: "Соединенные Штаты сопротивляются советскому давлению"
  Berlin_Blockade.3.d: "Западные союзники организовали Берлинский воздушный транспорт с 26 июня 1948 года по 30 сентября 1949 года для доставки грузов жителям Западного Берлина, что было трудной задачей, учитывая размер города и население. Первоначально придя к выводу, что воздушный транспорт не может работать, Советы сочли его продолжающийся успех все более затруднительным. 12 мая 1949 года СССР снял блокаду Западного Берлина из-за экономических проблем в Восточном Берлине, хотя какое-то время американцы и британцы продолжали снабжать город по воздуху, поскольку были обеспокоены тем, что Советы возобновят блокаду и только пытались нарушить западные линии снабжения."
  Berlin_Blockade.3.option.1: "Откажитесь от наших требований!"
  Berlin_Blockade.3.option.2: "Время войны!"
  foreign_triggered_enactment.option.1: "Поддайтесь иностранному влиянию."
  foreign_triggered_enactment.option.2: "Мы должны противостоять давлению!"
  spending_policy_ideology.t: "Новое общественное мнение о государственных расходах"
  population_policy_ideology.t: "Новое общественное мнение о демографической политике"
  dynamic_ideology_system_1.option: "Примите изменение."
  USA_PER_Hostage_Crisis.t: "Иранский кризис с заложниками?"
  USA_PER_Hostage_Crisis.d: "Кризис с заложниками в Иране был дипломатическим противостоянием между Ираном и Соединенными Штатами. Пятьдесят три американских дипломата и гражданина оказались заложниками после того, как группа военизированных иранских студентов, принадлежащих к мусульманским студентам-последователям линии имама, которые поддерживали иранскую революцию, в том числе Хосейн Дехган, Мохаммед Али Джафари и Мохаммад Багери, захватили посольство США в Тегеране и взяли их в заложники."
  USA_SOV_U2_Incident.t: "Инцидент с У-2?"
  USA_SOV_U2_Incident.d: "1 мая 1960 года американский самолет-разведчик U-2 был сбит советскими войсками ПВО во время проведения фоторазведки с воздуха в глубине советской территории. Самолет, которым управлял американский пилот Фрэнсис Гэри Пауэрс, вылетел из Пешавара, Пакистан, и разбился недалеко от Свердловска (современный Екатеринбург) после попадания ракеты класса «земля-воздух». Пауэрс спрыгнул с парашютом на землю и был схвачен."
  USA_SOV_Able_Archer.t: "Способный лучник 83 Кризис?"
  USA_SOV_Able_Archer.d: "«Able Archer 83» — это военные учения, проводившиеся НАТО в ноябре 1983 года в рамках ежегодных учений, проводимых в ноябре 1983 года. В учениях 1983 года, начавшихся 7 ноября 1983 года, было представлено несколько новых элементов, не наблюдавшихся в предыдущие годы, включая новый уникальный формат кодированной связи, радиомолчание и участие глав правительств. Этот рост реализма в сочетании с напряженными отношениями между Соединенными Штатами и Советским Союзом и ожидаемым прибытием ядерных ракет «Першинг-2» в Европу заставил некоторых членов советского Политбюро и военных поверить, что Able Archer 83 был военной уловкой, скрывающей подготовку к настоящему первому ядерному удару. В ответ Советский Союз подготовил свои ядерные силы и привел в боевую готовность авиационные части в Восточной Германии и Польше."
  SOV_USA_KOR_Incident.t: "Инцидент с рейсом 007 Korean Air Lines"
  SOV_USA_KOR_Incident.d: "Рейс 007 Korean Air Lines — регулярный рейс Korean Air Lines из Нью-Йорка в Сеул через Анкоридж, Аляска. 1 сентября 1983 года самолет был сбит советским самолетом-перехватчиком Су-15. Авиалайнер Boeing 747 следовал из Анкориджа в Сеул, но из-за навигационной ошибки экипажа лайнер отклонился от запланированного маршрута и пролетел через запрещенное советское воздушное пространство. Советские ВВС сочли неопознанный самолет вторгшимся американским самолетом-шпионом и уничтожили его ракетами класса «воздух-воздух» после предупредительных выстрелов."
  USA_GUA_Overthrow.t: "Операция PBSУспех?"
  USA_GUA_Overthrow.d: "Эйзенхауэр санкционировал операцию ЦРУ по свержению Хакобо Арбенса под кодовым названием Operation PBSuccess в августе 1953 года. На операцию был выделен бюджет в 2,7 миллиона долларов США на «психологическую войну и политические действия». Кастильо Армасу было предоставлено достаточно денег, чтобы завербовать небольшой отряд наемников из числа гватемальских изгнанников и населения близлежащих стран. Эта группа называлась Армией Освобождения. ЦРУ создало тренировочные лагеря в Никарагуа и Гондурасе и снабдило их оружием, а также несколькими бомбардировщиками."
  SOV_AFG_Overthrow.t: "Операция Шторм-333"
  SOV_AFG_Overthrow.d: "Нападение на дворец Таджбег, известное под военным кодовым названием «Операция Шторм-333», представляло собой военный рейд, осуществленный Советским Союзом в Афганистане 27 декабря 1979 года. Спецназ и воздушно-десантные войска штурмовали хорошо укрепленный дворец Таджбег в Кабуле и убили афганского лидера Хафизуллу Амина, халькиста Народно-демократической партии Афганистана (НДПА), пришедшего к власти в результате Саурской революции в апреле 1978 года. Начало советско-афганской войны."
  EGR_WGR_Berlin_Wall.t: "Берлинская стена?"
  EGR_WGR_Berlin_Wall.d: "Берлинская стена представляла собой охраняемый бетонный барьер, который окружал Западный Берлин с 1961 по 1989 год, отделяя его от Восточного Берлина и Германской Демократической Республики. Строительство Берлинской стены было начато правительством ГДР 13 августа 1961 года. Оно включало в себя сторожевые башни, расположенные вдоль больших бетонных стен, а также широкую территорию (позже известную как «полоса смерти»), на которой были траншеи для защиты от транспортных средств, гвозди и другие защитные сооружения. Основная цель строительства стены заключалась в том, чтобы не допустить бегства граждан Восточной Германии на Запад."
  EGR_WGR_Berlin_Wall_Fall.t: "Падение Берлинской стены?"
  EGR_WGR_Berlin_Wall_Fall.d: "Падение Берлинской стены 9 ноября 1989 года, во время Мирной революции, ознаменовало начало разрушения Берлинской стены и образного железного занавеса, поскольку транзитные ограничения Восточного Берлина были преодолены и отменены. Секции стены были прорваны, и в июне следующего года началась плановая демонтажная работа."
  USA_CUB_Overthrow.t: "Вторжение в залив Свиней?"
  USA_CUB_Overthrow.d: "Вторжение в залив Свиней — неудачная военная десантная операция на юго-западном побережье Кубы в 1961 году, проведенная Соединенными Штатами Америки и Кубинским демократическим революционным фронтом (ДФР), состоящим из кубинских изгнанников, выступавших против кубинской революции Фиделя Кастро, тайно финансируемой и направляемой правительством США. Операция состоялась в разгар Холодной войны, и ее провал повлиял на отношения между Кубой, Соединенными Штатами и Советским Союзом."
  GBR_Chagos_Island_deport.t: "Изгнание чагосцев?"
  GBR_Chagos_Island_deport.d: "Соединенное Королевство по просьбе Соединенных Штатов начало высылать жителей архипелага Чагос в 1968 году, завершив принудительную депортацию 27 апреля 1973 года изгнанием оставшихся чагосцев с атолла Перос Баньюс."
  USA_SOV_Azorian_Incident.t: "Проект Азориан?"
  USA_SOV_Azorian_Incident_1.t: "Затонувшая советская подводная лодка обнаружена США"
  USA_SOV_Azorian_Incident.d: "Проект «Азорян» — это проект Центрального разведывательного управления США (ЦРУ) по подъему затонувшей советской подводной лодки К-129 со дна Тихого океана в 1974 году с использованием специально построенного судна «Хьюз Гломар Эксплорер». Крушение К-129 произошло в 1968 году примерно в 2510 км к северо-западу от Гавайских островов. Проект «Азорян» был одной из самых сложных, дорогостоящих и секретных разведывательных операций холодной войны, его стоимость составила около 800 миллионов долларов, или 4,9 миллиарда долларов в сегодняшних ценах."
  USA_Reagan_Doctrine.t: "Доктрина Рейгана?"
  USA_Reagan_Doctrine.d: "Доктрина Рейгана — это стратегия Соединенных Штатов, реализованная администрацией Рейгана с целью сокрушить глобальное влияние Советского Союза в конце холодной войны. В соответствии с доктриной Рейгана Соединенные Штаты оказывали открытую и скрытую помощь антикоммунистическим партизанам и движениям сопротивления в попытке «отбросить» поддерживаемые Советским Союзом прокоммунистические правительства в Африке, Азии и Латинской Америке. Доктрина была разработана для уменьшения советского влияния в этих регионах как часть общей стратегии администрации по победе в холодной войне."
  SOV_Brezhnev_Doctrine.t: "Доктрина Брежнева?"
  SOV_Brezhnev_Doctrine.d: "Доктрина Брежнева представляла собой советскую внешнюю политику, которая провозглашала, что любая угроза «социалистическому правлению» в любом государстве советского блока в Центральной и Восточной Европе была угрозой для всех из них, и, следовательно, оправдывала вмешательство других социалистических государств. Он был провозглашен с целью оправдать советскую оккупацию Чехословакии в начале 1968 года, повлекшую за собой свержение там реформистского правительства. Ссылки на «социализм» означали контроль со стороны коммунистических партий, лояльных Кремлю."
  GBR_Atlanticism.t: "Тэтчеровский атлантизм?"
  GBR_Atlanticism_1.t: "Особые отношения?"
  GBR_Atlanticism.d: "Будучи премьер-министром, Тэтчер активно поддерживала трансатлантические отношения с президентом США Рональдом Рейганом. Она часто публично поддерживала политику Рейгана, даже когда другие западные союзники не высказывались так громко. Например, она дала разрешение американским самолетам использовать британские базы для налетов, таких как бомбардировка Соединенными Штатами Ливийской Арабской Джамахирии в 1986 году, и разрешила размещение американских крылатых ракет и ракет «Першинг» на британской земле в ответ на развертывание Советским Союзом ядерных ракет SS-20, нацеленных на Великобританию и другие страны Западной Европы."
  NOR_Dag_Hammarskjold_death.t: "Смерть Дага Хаммаршельда?"
  NOR_Dag_Hammarskjold_death.d: "18 сентября 1961 года Хаммаршельд направлялся на переговоры о прекращении огня между силами Операции Организации Объединенных Наций в Конго и катангскими войсками под командованием Моисе Чомбе. Его авиалайнер Douglas DC-6 SE-BDY разбился недалеко от Ндолы, Северная Родезия (ныне Замбия). Хаммаршельд погиб в результате крушения, как и все 15 других пассажиров. Смерть Хаммаршельда вызвала кризис преемственности в Организации Объединенных Наций, поскольку не было линии преемственности, и в результате Совет Безопасности был вынужден голосовать за преемника. Обстоятельства крушения пока неясны. Родезийское расследование 1962 года пришло к выводу, что виновата ошибка пилота, тогда как более позднее расследование ООН не смогло определить причину крушения."
  LEB_Crisis_1958.t: "Ливанский кризис"
  LEB_Crisis_1958.d: "Ливанский кризис 1958 года — политический кризис в Ливане, вызванный политической и религиозной напряженностью в стране, включая американское военное вмешательство, которое длилось около трех месяцев, пока президент Камиль Шамун, обратившийся за помощью, не завершил свой срок на посту президента Ливана. Американские и ливанские правительственные силы оккупировали порт Бейрута и международный аэропорт Бейрута. Когда кризис закончился, Соединенные Штаты ушли."
  ITA_SAN_1957.t: "Фатти ди Роверета?"
  ITA_SAN_1957.d: "Фатти ди Роверета (дело Ровереты) представляло собой конституционный кризис в Сан-Марино в 1957 году, в ходе которого Большой и Генеральный совет был намеренно лишен кворума, чтобы предотвратить запланированные выборы капитанов-регентов. В деревне Роверета было создано временное правительство в противовес уходящему в отставку капитану-регенту, срок полномочий которого истек. Италия признала временное правительство, а итальянские карабинеры защищали три стороны фабрики, находившейся на их территории. 11 октября регентство уступило и признало временное правительство, положив конец кризису."
  HND_PAK_KAS_1999.t: "Каргильская война?"
  HND_PAK_KAS_1999.d: "Каргильская война велась между Индией и Пакистаном с мая по июль 1999 года в районе Каргил в Ладакхе, который в то время был частью управляемого Индией штата Джамму и Кашмир, и вдоль Линии контроля (ЛК)."
  HND_PAK_KAS_2025.t: "Индийско-пакистанский кризис?"
  HND_PAK_KAS_2025.d: "После теракта в Пахалгаме 22 апреля 2025 года между Индией и Пакистаном возник кризис, вызванный убийством боевиками в Кашмире 25 индийских туристов. Первоначально ответственность за нападение взял на себя Фронт сопротивления (TRF). Сообщалось о вооруженных стычках между Индией и Пакистаном вдоль линии контроля (ЛК), начавшихся 24 апреля. 7 мая 2025 года Индия нанесла ракетные удары по Пакистану, что привело к военному конфликту между двумя странами. 7 мая 2025 года пакистанская армия ответила налетом на Пунч и Джамму, в результате чего погибли 16 мирных жителей и были разрушены сотни домов. О прекращении огня было объявлено 10 мая 2025 года в соответствии с соглашением между Индией и Пакистаном."
  SOV_ALB_Vlora_Incident.t: "Инцидент во Влёре?"
  SOV_ALB_Vlora_Incident.d: "Инцидент во Влере представлял собой военное противостояние между Албанией и Советским Союзом в 1961 году. Албанская народная армия заблокировала военно-морскую базу во Влёре, что привело к захвату советских кораблей и техники. Этот инцидент подчеркнул эскалацию дипломатической напряженности между двумя странами, что в конечном итоге привело к изгнанию советских войск из Албании."
  SRL_TAE_civil_war_end.t: "Северное наступление?"
  SRL_TAE_civil_war_end.d: "Северное наступление ОАС в 2008–2009 годах представляло собой вооруженный конфликт в северной провинции Шри-Ланки между военными Шри-Ланки и сепаратистскими группировками «Тигры освобождения Тамил Илама» (ТОТИ). Битва началась с наступления армии Шри-Ланки (SLA) с попыткой прорвать линии обороны ТОТИ на севере острова с целью завершить 25-летнюю гражданскую войну в стране военной победой."
  USA_SOV_Great_Seal_Bug.t: "Инцидент с великим тюленем"
  USA_SOV_Great_Seal_Bug.d: "В 1945 году советские разведчики подарили послу США в Москве резную Большую печать. Внутри было спрятано «Нечто», пассивное подслушивающее устройство без источника питания. Оставаясь незамеченным в течение семи лет, он позволил Советскому Союзу подслушивать и стал важной вехой в технологиях шпионажа и наблюдения времен Холодной войны. Жук «Большая печать» был обнаружен в 1952 году, через семь лет после того, как его подарили послу США в Москве. Он был обнаружен во время плановой проверки Госдепартамента, в ходе которой было обнаружено пассивное подслушивающее устройство, спрятанное внутри деревянной печати. Жук «Большая печать» был публично продемонстрирован в Организации Объединенных Наций 26 мая 1960 года во время драматической презентации посла США Генри Кэбота Лоджа-младшего в Совете Безопасности ООН."
  iraq_kuwait_showdown_1961.t: "Ирако-кувейтский кризис"
  iraq_kuwait_showdown_1961.d: "В 1958 году Абдул Карим Касим захватил власть в Ираке. Западные державы считали его непредсказуемым, а Ирак нестабильным. 25 июня 1961 года, после отказа Великобритании от власти в Кувейте, Касим объявил, что Кувейт будет включен в состав Ирака, и Великобритания считала военную угрозу неизбежной."
  Operation_Vantage.t: "Операция «Вантедж»?"
  Operation_Vantage_1.t: "Британское вмешательство в ирако-кувейтский кризис"
  Operation_Vantage.d: "Операция «Вантедж» — британская военная операция, проведенная в 1961 году по поддержке нового независимого государства Кувейт против территориальных претензий его соседа, Ирака. Великобритания отреагировала на призыв о защите шейха Абдаллы III Аль-Салима Аль-Сабаха из Кувейта, и в течение нескольких дней были развернуты воздушные, морские и сухопутные силы. Ирак не напал, и британские войска были заменены Лигой арабских государств."
  Operation_Caban.t: "Операция Кабан?"
  Operation_Caban.d: "Операция «Кабан», также известная как центральноафриканский государственный переворот 1979 года, представляла собой бескровную военную операцию французской разведывательной службы SDECE в сентябре 1979 года с целью свергнуть императора Бокассу I, восстановить в должности бывшего президента Давида Дако в изгнании и переименовать Центральноафриканскую империю обратно в Центральноафриканскую Республику."
  FRA_NZL_Rainbow_Warrior_Incident.t: "Гибель Радужного Воина?"
  FRA_NZL_Rainbow_Warrior_Incident.d: "10 июля 1985 года французские секретные агенты взорвали корабль Гринпис «Радуга Уорриор» в Окленде, Новая Зеландия, чтобы предотвратить протесты против ядерных испытаний на атолле Моруроа. Судно затонуло, погиб фотограф Фернандо Перейра. Тайное нападение под кодовым названием «Операция Сатаника» вызвало глобальное возмущение и обострило отношения между Францией и Новой Зеландией."
  FRA_NZL_Rainbow_Warrior_Incident_1.t: "Гибель Радужного Воина"
  USA_Donroe_Doctrine_2026.t: "Доктрина Донро?"
  USA_Donroe_Doctrine_2026.d: "Доктрина Донро, также известная как следствие Трампа из доктрины Монро, относится к принципам внешней политики президента Дональда Трампа в Америке. Адаптация исторической доктрины Монро, она описывает предполагаемое желание второй администрации Трампа утвердить американское доминирование в Западном полушарии."
  USA_VNZ_Overthrow_2026.t: "Операция «Абсолютная решимость»?"
  USA_VNZ_Overthrow_2026.d: "3 января 2026 года США нанесли военный удар по Венесуэле и захватили действующего президента Венесуэлы Николаса Мадуро и его жену Силию Флорес. Операция США под кодовым названием Operation Absolute Resolve началась около 2 часов ночи по местному времени, когда были замечены взрывы. Вооруженные силы США подвергли бомбардировке инфраструктуру на севере Венесуэлы, чтобы подавить противовоздушную оборону, когда силы задержания атаковали резиденцию Мадуро в Каракасе. Мадуро и Флорес были доставлены американскими войсками в Нью-Йорк, где предстанут перед судом."
  USA_PER_START.t: "Ядерная сделка с Ираном?"
  USA_PER_START.d: "Совместный всеобъемлющий план действий, также известный как Иранская ядерная сделка или Иранская сделка, представлял собой соглашение об ограничении иранской ядерной программы в обмен на смягчение санкций и другие положения. В рамках СВПД Иран согласился ограничить свою ядерную программу, ограничив деятельность топливного цикла, которая может привести к производству оружейного урана или плутония. СВПД ограничил количество и тип действующих центрифуг, уровень обогащения урана и размер иранских запасов обогащенного урана. Ключевые объекты в Фордо, Натанзе и Араке были перепрофилированы для гражданских целей, таких как медицинские и промышленные исследования. Иран согласился принять более интрузивные меры МАГАТЭ по мониторингу своей деятельности, связанной с топливным циклом."
  RUS_UKR_Minsk.t: "Минские соглашения?"
  RUS_UKR_Minsk.d: "Минские соглашения представляли собой серию международных соглашений, направленных на прекращение войны на Донбассе между вооруженными российскими сепаратистскими группировками и Вооруженными силами Украины, в которых центральную роль играли российские регулярные войска. После поражения под Иловайском в конце августа 2014 года Россия вынудила Украину подписать первый Минский протокол, или «Минск I». Это соглашение состояло из комплекса мер, включая прекращение огня, отвод тяжелых вооружений с линии фронта, освобождение военнопленных, конституционную реформу в Украине, предоставляющую самоуправление определенным районам Донбасса и восстановление контроля над государственной границей украинскому правительству."
  YUG_ITA_Treaty_of_Osimo.t: "Осимоский договор?"
  YUG_ITA_Treaty_of_Osimo.d: "Осимоский договор был подписан 10 ноября 1975 года Италией и Югославией в Осимо, Италия, чтобы окончательно разделить Свободную территорию Триест между двумя государствами: портовый город Триест с узкой прибрежной полосой на северо-западе (зона А) был передан Италии; часть северо-западной части полуострова Истрия (зона Б) была передана Югославии."
  historical_diplomatic_incidents.option.1: "Выбирайте исторический вариант!"
  historical_diplomatic_incidents.option.2: "Мы сделаем что-то другое..."
  historical.option.1: "Да"
  historical.option.2: "Нет"
  international_organisation_application_cooldown.tt: "Не подавали заявку на вступление в эту организацию в течение последних 10 лет."
  international_organisation_application_left_cooldown.tt: "Не покидал данную организацию в течение последних 5 лет"
  KMT_CHI_Unification.t: "Объединение Китая"
  CCP_CHI_Unification.t: "Объединение Китая"
  EGY_SCZ_Unification.t: "Национализация Суэцкого канала"
  EGY_SCZ_Unification.d: "Так как [ROOT.GetCountry.GetName] сделали [SCOPE.sCountry('capital_scope').GetName] своим [concept_subject], полный суверенитет и административный контроль над [GetBuildingType('building_suez_canal').GetName] перешел к [ROOT.GetCountry.GetName]."
  single_party_state_de_facto.t: "Однопартийное государство"
  single_party_state_de_facto.option: "Прохладный!"
  regime_change_failsafe.option: "Чёрный день для нашей страны."
  abolish_dynastic_republic.option.1: "Это конец династической республики."
  abolish_dynastic_republic.option.2: "Провозглашение монархии решит проблему!"
  PAP_1958_revolution.t: "Папство Папы Иоанна XXIII?"
  PAP_1958_revolution.d: "Папа Иоанн XXIII был главой Католической церкви и сувереном города-государства Ватикан с 28 октября 1958 года до своей смерти в июне 1963 года. Его общей целью была модернизация Церкви, подчеркивая ее пастырскую роль и ее необходимое участие в государственных делах."
  PAP_1963_revolution.t: "Папство Папы Павла VI?"
  PAP_1963_revolution.d: "Папа Павел VI был главой Католической церкви и сувереном города-государства Ватикан с 21 июня 1963 года до своей смерти 6 августа 1978 года. Следуя за Иоанном XXIII, он продолжил Второй Ватиканский собор, который он закрыл в 1965 году, реализовав его многочисленные реформы. Он способствовал улучшению экуменических отношений с православными и протестантскими церквями, что привело к многочисленным историческим встречам и соглашениям."
  PAP_1978_revolution.t: "Папство Папы Иоанна Павла II?"
  PAP_1978_revolution.d: "Папа Иоанн Павел II был главой Католической церкви и сувереном Ватикана с 1978 года до своей смерти в 2005 году. Ему приписывают борьбу против диктатур за демократию и содействие прекращению коммунистического правления в его родной Польше и остальной Европе. При Иоанне Павле II Католическая церковь значительно расширила свое влияние в Африке и Латинской Америке и сохранила свое влияние в Европе и остальном мире."
  PAP_2005_revolution.t: "Папство Папы Бенедикта XVI?"
  PAP_2005_revolution.d: "Папа Бенедикт XVI был главой Католической церкви и сувереном города-государства Ватикан с 19 апреля 2005 года до своей отставки 28 февраля 2013 года. Избрание Бенедикта Папой произошло на папском конклаве 2005 года, последовавшем за смертью Папы Иоанна Павла II. После своей отставки Бенедикт решил называться «Почетным Папой» и сохранял этот титул до своей смерти в 2022 году."
  PAP_2013_revolution.t: "Папство Папы Франциска?"
  PAP_2013_revolution.d: "Папа Франциск был главой католической церкви и правителем государства-города Ватикан. Он первый папа из Общества Иисуса (Ордена иезуитов), первый из Америки и Южного полушария, а также первый папа, родившийся или выросший за пределами Европы со времен сирийского папы 8-го века Григория III."
  PAP_GENERIC_revolution.t: "Новый Папа"
  PAP_GENERIC_revolution.d: "Католическая церковь в Риме избрала нового Папу, поскольку предыдущий Папа скончался. Новый Папа был избран Коллегией кардиналов посредством процесса, называемого конклавом, где кардиналы в возрасте до 80 лет голосуют тайным голосованием до тех пор, пока кандидат не получит большинство в две трети."
  PAP_GENERIC_revolution.f: "Это событие произошло так как в мире больше нет [concept_character] Папа Римский."
  GBR_change_monarch_1952.t: "Смерть короля Георга VI"
  GBR_change_monarch_1952.d: "Стресс войны сказался на здоровье Джорджа, усугубленный его заядлым курением и последующим развитием рака легких среди других заболеваний, включая атеросклероз и болезнь Бюргера. 31 января 1952 года, несмотря на советы близких, Джордж отправился в лондонский аэропорт, чтобы проводить Элизабет и Филиппа в их турне в Австралию через Кению. Это было его последнее публичное выступление. Шесть дней спустя, в 07:30 по Гринвичу утром 6 февраля, он был найден мертвым в постели в Сандрингем-хаусе в Норфолке. Он умер ночью от коронарного тромбоза в возрасте 56 лет."
  GBR_change_monarch_2022.t: "Смерть королевы Елизаветы II"
  GBR_change_monarch_2022.d: "Елизавета II, королева Соединенного Королевства и других королевств Содружества, умерла 8 сентября 2022 года в замке Балморал в Шотландии в возрасте 96 лет. Правление Елизаветы продолжительностью 70 лет и 214 дней было самым продолжительным из всех британских монархов. Ей сразу же наследовал ее старший сын Карл III."
  JAP_change_monarch_1989.t: "Смерть императора Хирохито"
  JAP_change_monarch_1989.d: "22 сентября 1987 года Хирохито перенес операцию на поджелудочной железе после нескольких месяцев проблем с пищеварением. Врачи обнаружили у него рак двенадцатиперстной кишки. Хирохито, похоже, полностью выздоравливал в течение нескольких месяцев после операции. Однако примерно год спустя, 19 сентября 1988 года, он потерял сознание в своем дворце, и в течение следующих нескольких месяцев его здоровье ухудшилось, поскольку он страдал от постоянного внутреннего кровотечения. Император умер в 6:33 утра 7 января 1989 года в возрасте 87 лет."
  JAP_change_monarch_2019.t: "Отречение императора Акихито?"
  JAP_change_monarch_2019.d: "13 июля 2016 года национальная телекомпания NHK сообщила, что тогдашний 82-летний император намеревался через несколько лет отречься от престола в пользу своего старшего сына, наследного принца Нарухито, сославшись на свой возраст. 19 мая 2017 года кабинет министров Японии опубликовал законопроект, позволяющий Акихито отречься от престола. 8 июня 2017 года Национальный парламент принял его, после чего он стал известен как Закон об отречении императора. Это положило начало подготовке правительства к передаче этой должности Нарухито. Премьер-министр Синдзо Абэ объявил в декабре 2017 года, что отречение Акихито произойдет в конце 30 апреля 2019 года и что Нарухито станет 126-м императором с 1 мая 2019 года."
  BEL_change_monarch_2013.t: "Отречение короля Альберта II?"
  BEL_change_monarch_2013.d: "Король Бельгии Альберт II отрекся от престола 21 июля 2013 года, сославшись на возраст и проблемы со здоровьем. После 20 лет пребывания на престоле он передал корону своему сыну Филиппу во время церемонии в Национальный день Бельгии. Альберт призвал к национальному единству в своей прощальной речи, отмечая мирный переход королевской власти."
  SPA_change_monarch_2014.t: "Отречение короля Хуана Карлоса I?"
  SPA_change_monarch_2014.d: "Король Испании Хуан Карлос I отрекся от престола 19 июня 2014 года, объявив о своем намерении ранее в том же месяце. Ссылаясь на проблемы со здоровьем и стремление к обновлению поколений, он передал корону своему сыну Фелипе VI. Отречение последовало за падением популярности на фоне скандалов и было официально оформлено одобрением парламента."
  NET_change_monarch_1980.t: "Отречение королевы Юлианы?"
  NET_change_monarch_1980.d: "Королева Нидерландов Юлиана отреклась от престола 30 апреля 1980 года, в свой 71-й день рождения, после 32 лет пребывания на престоле. Она сослалась на возраст и желание передать обязанности следующему поколению. Ее преемницей стала ее дочь Беатрикс. Отречение от престола отражало голландскую королевскую традицию, отдающую предпочтение добровольному выходу на пенсию пожизненному правлению."
  NET_change_monarch_2013.t: "Отречение королевы Беатрикс?"
  NET_change_monarch_2013.d: "Королева Нидерландов Беатрикс отреклась от престола 30 апреля 2013 года после 33-летнего правления. Она сослалась на желание освободить место для нового поколения, передав трон своему сыну Виллему-Александру. Отречение ознаменовало конец эпохи и начало правления первого мужчины-монарха в Нидерландах за более чем столетие."
  LUX_change_monarch_1964.t: "Отречение великой герцогини Шарлотты?"
  LUX_change_monarch_1964.d: "Великая герцогиня Люксембурга Шарлотта отреклась от престола 12 ноября 1964 года, после 45 лет правления. Она сослалась на возраст и необходимость обновления, передав трон своему сыну Жану. Ее правление охватило Вторую мировую войну и послевоенное восстановление, что сделало ее символом национального единства и устойчивости."
  LUX_change_monarch_2000.t: "Отречение великого герцога Жана?"
  LUX_change_monarch_2000.d: "Великий герцог Люксембурга Жан отрекся от престола 7 октября 2000 года, после 36 лет пребывания на престоле. Он сослался на желание передать обязанности следующему поколению, передав власть своему сыну Анри. Правление Жана ознаменовалось послевоенной модернизацией и его ранней ролью во Второй мировой войне как солдата и символа национальной устойчивости."
  LUX_change_monarch_2025.t: "Отречение великого герцога Анри?"
  LUX_change_monarch_2025.d: "Великий герцог Люксембурга Анри отрекся от престола 3 октября 2025 года, после почти 25 лет пребывания на престоле. Он передал корону своему старшему сыну Гийому, сославшись на важность обновления и преемственности поколений. Переход был отмечен официальной церемонией во Дворце великих герцогов в Люксембурге."
  DEN_change_monarch_2024.t: "Отречение королевы Маргрете II?"
  DEN_change_monarch_2024.d: "Королева Дании Маргрете II отреклась от престола 14 января 2024 года, отметив 52 года пребывания на престоле. О своем решении она объявила в своем новогоднем обращении, сославшись на обновление поколений. Ее сын Фредерик сменил ее на посту короля Фредерика X. Это было первое добровольное отречение Дании от королевской власти почти за 900 лет."
  NOR_change_monarch_1957.t: "Смерть короля Хокона VII"
  NOR_change_monarch_1957.d: "Король Хокон VII скончался в 1957 году после долгого и почитаемого правления. Его смерть, символ норвежской независимости и устойчивости во время войны, ознаменовала конец эпохи и начало правления короля Олава V, открыв новую главу норвежской монархии."
  NOR_change_monarch_1991.t: "Смерть короля Олава V."
  NOR_change_monarch_1991.d: "Король Олав V умер в 1991 году, прозванный «Народным королем» за свое смирение и службу в военное время. Его кончина была встречена национальным трауром, и на трон взошел его сын Харальд V, продолжив наследие современной и доступной монархии."
  SWE_change_monarch_1950.t: "Смерть короля Густава V."
  SWE_change_monarch_1950.d: "Король Густав V умер в 1950 году в возрасте 92 лет, завершив 43-летнее правление, охватившее две мировые войны. Его смерть ознаменовала переход к Густаву VI Адольфу, поскольку Швеция продолжила свое развитие в современную конституционную монархию."
  SWE_change_monarch_1973.t: "Смерть короля Густава VI."
  SWE_change_monarch_1973.d: "Король Густав VI Адольф скончался в 1973 году, запомнившись своими научными интересами и устойчивым лидерством. Его смерть ознаменовала конец эпохи и возвышение Карла XVI Густава, сигнализируя о смене поколений в шведской королевской семье."
  GRE_change_monarch_1964.t: "Смерть короля Павла"
  GRE_change_monarch_1964.d: "Король Греции Павел умер в 1964 году после правления, отмеченного послевоенным восстановлением и напряженностью времен холодной войны. Его сын Константин II стал его преемником на фоне растущих политических волнений, которые вскоре поставят под угрозу будущее монархии."
  THI_change_monarch_2016.t: "Смерть короля Пумипона Адульядета Махидола"
  THI_change_monarch_2016.d: "Король Пумипон Адульядет умер в 2016 году после 70-летнего правления, самого продолжительного в истории Таиланда. Его кончина, почитаемая за его моральный авторитет и работу по развитию, оказала глубокое влияние на нацию. Наследный принц Ваджиралонгкорн сменил его на посту Рамы X."
  CAM_change_monarch_2004.t: "Смерть короля Нородома Сианука."
  CAM_change_monarch_2004.d: "Король Нородом Сианук умер в 2012 году, сыграв ключевую роль в современной истории Камбоджи. От монарха до государственного деятеля и обратно, его сложное наследие закончилось мирной преемственностью его сына Нородома Сиамони."
  CHI_change_monarch_1967.t: "Смерть Пуи"
  CHI_change_monarch_1967.d: "Пуи, последний император Китая, умер в 1967 году после многих лет перевоспитания под властью коммунистов. Когда он был ребенком-императором, а затем марионеточным правителем Маньчжоу-Го, его смерть символизировала окончательные закаты имперского Китая."
  AUS_change_monarch_2011.t: "Смерть Отто фон Габсбурга"
  AUS_change_monarch_2011.d: "Отто фон Габсбург, последний наследник Австро-Венгерской империи, умер 4 июля 2011 года в возрасте 98 лет. Его похороны в Вене ознаменовали символический конец 640-летней династии. Его тело было похоронено в Императорском склепе, а сердце было похоронено отдельно в Венгрии, соблюдая традицию Габсбургов."
  EGY_change_monarch_1952.t: "Рождение Фуада II"
  EGY_change_monarch_1952.d: "Фуад II из Египта родился 16 января 1952 года во дворце Абдин в Каире. Сын короля Фарука I и королевы Нарриман Садек, он стал последним монархом Египта всего несколько месяцев спустя, недолго правил после отречения своего отца, прежде чем монархия была отменена в 1953 году."
  PER_change_monarch_1960.t: "Рождение Резы Пехлеви."
  PER_change_monarch_1960.d: "Реза Пехлеви, наследный принц Ирана, родился 31 октября 1960 года в Тегеране. Сын шаха Мохаммада Резы Пехлеви и императрицы Фарах Дибы, он был назван наследником Павлиньего трона в 1967 году. Его рождение символизировало преемственность династии Пехлеви."
  JOR_change_monarch_1962.t: "Рождение Абдаллы II."
  JOR_change_monarch_1962.d: "Абдалла II родился в Аммане, Иордания, 30 января 1962 года и был старшим сыном короля Хусейна и принцессы Муны. Хашимитский потомок Пророка Мухаммеда, он был провозглашен наследным принцем при рождении. В его воспитании иорданские традиции сочетались с международным образованием, что сформировало его будущее лидерство."
  1948_Universal_Declaration_of_Human_Rights.t: "Всеобщая декларация прав человека"
  1948_Universal_Declaration_of_Human_Rights.d: "10 декабря 1948 года Генеральная Ассамблея ООН приняла Всеобщую декларацию прав человека — знаковый документ, провозглашающий неотъемлемое достоинство и равные права всех людей. Разработанный после Второй мировой войны, он закрепил фундаментальные свободы и защиту и стал основой современного международного права прав человека."
  1960_UNGA_Resolution_1514.t: "Декларация о предоставлении независимости"
  1960_UNGA_Resolution_1514.d: "14 декабря 1960 года Генеральная Ассамблея ООН приняла резолюцию 1514, провозгласившую, что все народы имеют право на самоопределение и независимость. Эта историческая резолюция ускорила процесс деколонизации, приведя к освобождению десятков стран от колониального правления."
  1961_UN_Committee_On_Decolonisation.t: "Специальный комитет по деколонизации"
  1961_UN_Committee_On_Decolonisation.d: "27 ноября 1961 года Организация Объединенных Наций учредила Специальный комитет по деколонизации, которому было поручено следить за выполнением резолюции 1514. Известный как Комитет 24, он стал центральным органом, выступающим за конец колониализма и признание самоопределения во всем мире."
  1970_UNGA_Resolution_2625.t: "Декларация о дружественных отношениях"
  1970_UNGA_Resolution_2625.d: "24 октября 1970 года Генеральная Ассамблея Организации Объединенных Наций приняла резолюцию 2625, подтвердившую принципы международного права, включая суверенное равенство, невмешательство и право народов на самоопределение. Он укрепил правовую основу деколонизации и мирного сотрудничества между государствами."
  2000_Millennium_Development_Goals.t: "Цели развития тысячелетия"
  2000_Millennium_Development_Goals.d: "8 сентября 2000 года Организация Объединенных Наций приняла «Цели развития тысячелетия» — набор из восьми амбициозных задач по сокращению бедности, улучшению здравоохранения и развитию образования к 2015 году. Эта инициатива ознаменовала глобальную приверженность развитию и сотрудничеству в новом столетии."
  historical_un_events.option.1: "Спасибо за внимание к этому вопросу."

  dutch_New_Guinea.sgc.t: "Самоуправление в Голландской Новой Гвинее?"
  dutch_New_Guinea.sgc.d: "В 1949 году, когда остальная часть Голландской Ост-Индии стала полностью независимой как Индонезия, голландцы сохранили суверенитет над западной частью Новой Гвинеи и предприняли шаги по подготовке ее к независимости как отдельной страны. Голландцы уделяют особое внимание политическим, деловым и гражданским навыкам. 8 февраля 1950 года Стефан Люсьен Йозеф ван Ваарденбург был назначен первым губернатором (де губернатором) голландской Новой Гвинеи."
  IDO_EID_union.t: "Распад Соединенных Штатов Индонезии?"
  IDO_EID_union.d: "В марте и апреле 1950 года все составляющие RIS, за исключением Восточной Суматры и Восточной Индонезии, растворились в республике. 3–5 мая трехсторонняя конференция между Государством Восточная Индонезия, Государством Восточная Суматра и Республикой Индонезия завершилась принятием решения об объединении трех образований в единое унитарное государство. Соединенные Штаты Индонезии были официально распущены президентом Сукарно 17 августа 1950 года – в пятую годовщину провозглашения им независимости – и заменены унитарной Республикой Индонезия."
  transfer_territory_west_papua_1969.t: "Акт свободного выбора?"
  transfer_territory_west_papua_1969.d: "Акт о свободном выборе представлял собой спорный плебисцит, проведенный с 14 июля по 2 августа 1969 года, в котором 1025 человек, выбранных индонезийскими военными в Западной Новой Гвинее, единогласно проголосовали за индонезийский контроль. Это событие иногда пренебрежительно называют «Актом без выбора» из-за его противоречивого процесса."
  IDO_2001_revolution.t: "Особая автономия Западного Папуа?"
  IDO_2001_revolution.d: "Западное Папуа официально получило статус специальной автономии в 2001 году, когда правительство Индонезии приняло Закон № 21/2001. Этот закон был разработан, чтобы предоставить региону значительную децентрализацию и большую власть над местным управлением, образованием, здравоохранением и природными ресурсами, а также большую долю региональных доходов."
  IDO_2005_revolution.t: "Хельсинкское соглашение?"
  IDO_2005_revolution.d: "Особая автономия Ачеха была установлена ​​в соответствии с Хельсинкским меморандумом о взаимопонимании (МоВ) от 15 августа 2005 года. При посредничестве бывшего президента Финляндии Мартти Ахтисаари этот исторический договор положил конец жестокому 30-летнему сепаратистскому конфликту между правительством Индонезии и Движением за свободный Ачех (GAM)."
  
