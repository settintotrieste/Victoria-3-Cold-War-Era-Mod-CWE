  USA_historical_election_system.t: "Президентские выборы в США"
  USA_historical_election_system.d: "Выборы президента и вице-президента Соединенных Штатов являются непрямыми выборами, на которых граждане Соединенных Штатов, зарегистрированные для голосования в одном из пятидесяти штатов США или в Вашингтоне, округ Колумбия, голосуют не напрямую за эти должности, но вместо этого для членов коллегии выборщиков. Затем эти выборщики отдают прямые голоса, известные как голоса выборщиков, за президента и вице-президента. Затем на этот пост избирается кандидат, получивший абсолютное большинство голосов выборщиков (не менее 270 из 538, поскольку Двадцать третья поправка предоставила право голоса гражданам округа Колумбия)."

  GBR_historical_election_system.t: "Всеобщие выборы в Великобритании"
  GBR_historical_election_system.d: "Премьер-министр [ROOT.GetCountry.GetName] является главным министром правительства и главой британского кабинета министров. Не существует конкретной даты, когда впервые появилась должность премьер-министра, поскольку эта роль не была создана, а, скорее, развивалась с течением времени посредством слияния обязанностей."

  FRA_historical_election_system.t: "Выборы президента Франции"
  FRA_historical_election_system.d: "Президент Франции является исполнительным главой государства Франции и главнокомандующим французскими вооруженными силами. Поскольку пост президента является высшей магистратурой страны, эта должность является высшей должностью во Франции."

  GER_historical_election_system.t: "Всеобщие выборы в Германии"
  GER_historical_election_system.d: "Канцлер Германии является политическим лидером Германии и главой правительства. Должностное лицо отвечает за выбор всех остальных членов правительства и председательствование на заседаниях кабинета министров."

  HND_historical_election_system.t: "Всеобщие выборы в Индии"
  HND_historical_election_system.d: "Премьер-министр Индии является главой правительства Индии. Хотя президент Индии является конституционным, номинальным и церемониальным главой государства, на практике и обычно исполнительная власть принадлежит премьер-министру и избранному им Совету министров. Премьер-министром является лидер, избираемый партией, имеющей большинство в нижней палате индийского парламента Лок Сабха, который является основным законодательным органом Республики Индия."

  BRZ_historical_election_system.t: "Выборы президента Бразилии"
  BRZ_historical_election_system.d: "Президентская система была установлена в 1889 году, после провозглашения республики в результате военного переворота против императора Педру II. С тех пор в Бразилии сменилось шесть конституций, три диктатуры и три демократических периода. В демократические периоды голосование всегда было обязательным"

  IDO_historical_election_system.t: "Президентские выборы в Индонезии"
  IDO_historical_election_system.d: "Президент Республики Индонезия является главой государства и главой правительства Республики Индонезия. Президент возглавляет исполнительную ветвь власти и является главнокомандующим Национальными вооруженными силами Индонезии. С 2004 года президент и вице-президент избираются прямыми выборами на пятилетний срок, который может быть продлен один раз, что позволяет находиться у власти не более 10 лет."

  historical_election_system.f: "Это историческое событие. Выбор неисторического варианта сохранит текущий [concept_ruler] как [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]."

  historical_election_system.option.1: "Следите за историей!"
  historical_election_system.option.2: "Мы предпочитаем нынешнего президента..."

  je_olympic_games: "The Olympics [GetPlayer.MakeScope.Var('olympic_games_year_display').GetValue] [SCOPE.sState('olympic_games_summit_location').GetCityHubName] "
  je_olympic_games_reason: "Летние Олимпийские игры, также известные как Игры Олимпиад, - это крупное международное мультиспортивное мероприятие, которое обычно проводится раз в четыре года. \n\nЧтобы избежать плохих Олимпийских игр, создайте олимпийскую инфраструктуру. \n\n [GetPlayer.MakeScope.Var('olympic_games_year_display').GetValue] Олимпийские игры будут проходить в [SCOPE.sState('olympic_games_summit_location').GetCityHubName], [SCOPE.sState('olympic_games_summit_location').GetName] ([ROOT.GetCountry.GetName])."
  je_olympic_games_status: "Намеченный срок: Лето [GetPlayer.MakeScope.Var('olympic_games_year_display').GetValue]"

  offered_olympics.t: "Провести [GetPlayer.MakeScope.Var('olympic_games_year_display').GetValue] Олимпийские игры?"
  offered_olympics.d: "Международный олимпийский комитет предложил [ROOT.GetCountry.GetName] возможность принять у себя Олимпийские игры [GetPlayer.MakeScope.Var('olympic_games_year_display').GetValue]. Если предложение будет принято, у [ROOT.GetCountry.GetName] будет 4 года, чтобы построить необходимую инфраструктуру для проведения игр."
  offered_olympics.f: "[ROOT.GetCountry.GetName] была выбрана, потому что она не находится в состоянии войны, не является международным изгоем и достаточно независима."
  olympic_games_system.option.1: "Принять"
  olympic_games_system.option.2: "Отклонить"
  participation_olympics.t: "Олимпийские игры [GetPlayer.MakeScope.Var('olympic_games_year_display_event').GetValue] [SCOPE.sState('olympic_games_summit_location').GetCityHubName]"
  participation_olympics.d: "Олимпийские игры [GetPlayer.MakeScope.Var('olympic_games_year_display_event').GetValue], проходившие в [SCOPE.sCountry('recently_hosted_olympics').GetName], собрали тысячи спортсменов со всего мира для участия в различных соревнованиях. Завершилось все грандиозной церемонией в [SCOPE.sState('olympic_games_summit_location').GetCityHubName], где проходили игры."
  participation_olympics.option.1: "Участвуем честно!"
  participation_olympics.option.2: "Заставьте наших спортсменов принимать допинг!"
  participation_olympics.option.3: "Бойкотируем Игры!"
  banned_olympics.t: "Олимпийская команда поймана на допинге"
  banned_olympics.d: "Олимпийская команда [ROOT.GetCountry.GetAdjective] была поймана на употреблении запрещенных препаратов, улучшающих спортивные результаты, на недавних Олимпийских играх, проходивших в [SCOPE.sCountry('recently_hosted_olympics').GetName]. В результате этого Международный олимпийский комитет запретил [ROOT.GetCountry.GetName] участвовать в следующих Олимпийских играх."
  banned_olympics.option: "Возмутительно!"
  bad_olympics.t: "[SCOPE.sCountry('recently_hosted_olympics').GetAdjectiveNoFlag] Олимпийские игры подверглись критике"
  bad_olympics.d: "Из-за сокращения бюджета и вопиющих ошибок в планировании не вся необходимая олимпийская инфраструктура была построена к началу игр. В результате спортсмены были вынуждены выступать в некачественных условиях. Это вызвало повсеместное осуждение Олимпийских игр [SCOPE.sState('olympic_games_summit_location').GetCityHubName] как плохо управляемых и представляющих собой без преувеличения катастрофу."
  bad_olympics.f: "Это событие произошло, потому что [ROOT.GetCountry.GetName] не удалось набрать 100% в Олимпийских играх [concept_journal_entry]."
