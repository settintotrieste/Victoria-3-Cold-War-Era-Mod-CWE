  je_armed_forces_system: "[ROOT.GetCountry.GetAdjectiveNoFlag] Вооруженные Силы"
  je_armed_forces_system_reason: "[ROOT.GetCountry.GetAdjective] Вооруженные Силы представлять собой военную элиту вашей страны — офицеров, солдат и институты, которые их поддерживают. Они значимая [concept_interest_group], часто поддерживающая порядок, иерархию и экспансию. Их влияние может обеспечить стабильность за счет дисциплинированного управления, но бесконтрольное влияние чревато милитаризмом и авторитаризмом. \n\nГлавнокомандующий вооруженных сил: [SCOPE.sCharacter('head_of_armed_forces').GetFullName] \n\nВнимание: Коррупцию в Вооруженных силах можно снизить с помощью #y $lawgroup_corruption_policy$#! [Concept('concept_law','$concept_laws$')]."

