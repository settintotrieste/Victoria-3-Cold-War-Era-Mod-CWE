l_japanese:

    law_no_term_limit:0 "任期制限なし"
    law_no_term_limit_desc:0 "[concept_ruler]は、回数に制限なく任期を務めることができます。"
    law_yes_term_limit:0 "任期制限あり"
    law_yes_term_limit_desc:0 "[concept_ruler]は、定められた年数を超えて任期を務めることはできません。"

    law_peasant_levies_additional_effects:0 ""

    law_command_economy:0 "完全計画経済"
    law_semi_command_economy:0 "部分計画経済"
    law_semi_command_economy_desc:0 "これは政府があらゆる企業を所有・管理しつつも、一部の運営上の意思決定は労働者に委ねられる経済システムの一形態です。"
    law_social_capitalism:0 "社会資本主義"
    law_social_capitalism_desc:0 "社会資本主義とは、自由市場の資本主義経済システムに、社会政策と市場内での公正な競争を確立するための十分な規制を組み合わせた社会経済モデルです。"

    law_total_separation:0 "完全分離"

    law_unitary_state:0 "中央集権的単一国家"
    law_unitary_state_desc:0 "中央集権的単一国家とは、中央政府が最高権力として機能する単一の主体として統治される主権国家のことです。"
    law_devolved_state:0 "分権的単一国家"
    law_devolved_state_desc:0 "分権的単一国家とは、中央政府が最高権力を保持しつつも、地方や自治体などの下層の政府に一部の権限を委譲している国を指します。これは中央政府がすべての重要な権力を保持する中央集権的単一国家とは異なります。"
    law_federal_state:0 "連邦国家"
    law_federal_state_desc:0 "連邦国家とは、連邦政府の下で、部分的に自治権を持つ地方、州、またはその他の地域が連合した実体によって特徴付けられる国家です。"
    law_politicised_judiciary:0 "政治化された司法"
    law_politicised_judiciary_desc:0 "裁判官は行政部門によって直接任命されます。"
    law_partially_politicised_judiciary:0 "準独立司法"
    law_partially_politicised_judiciary_desc:0 "裁判官は行政部門と立法部門によって共同で任命されます。"
    law_independent_judiciary:0 "独立司法"
    law_independent_judiciary_desc:0 "裁判官の任命は、行政部門および立法部門からのいかなる干渉も受けません。"

    law_no_voting:0 "選挙なし"
    law_no_voting_desc:0 "この国では[Concept('concept_election','$concept_elections$')]は実施されず、指導者は他の手段によって決定されます。"
    law_rigged_voting:0 "管理選挙"
    law_rigged_voting_desc:0 "選挙結果は、政府への継続的な支持を確保するために管理されます。"
    law_gerrymandered_voting:0 "選挙区割りの操作"
    law_gerrymandered_voting_desc:0 "選挙区が、与党に構造的な利益をもたらすような方法で画定されています。"
    law_harassment_voting:0 "制限的な選挙運動"
    law_harassment_voting_desc:0 "選挙運動の規制や慣行により、対立候補が劣勢に立たされています。"
    law_fair_voting:0 "開放的な選挙"
    law_fair_voting_desc:0 "投票と選挙運動は、透明かつ公平な規則の下で行われます。"
    
    law_first_past_the_post:0 "小選挙区制"
    law_first_past_the_post_desc:0 "小選挙区制とは、有権者が単一の候補者に投票し、最多得票を得た候補者が選挙で当選する多数決方式です。\n\n@information!これにより、[concept_law]は、イデオロギーの違いにかかわらず、より弱い[Concept('concept_interest_group', '$concept_interest_groups$')]がより強い[Concept('concept_party', '$concept_parties$')]と連携することを促進します。"
    law_jefferson_system:0 "ジェファーソン方式"
    law_jefferson_system_desc:0 "ジェファーソン方式とは、議会の議席を割り当てるための配分方法です。すべての投票が集計された後、各政党の累進商数が計算されます。商数が最大の政党が1議席を獲得し、その政党の商数が再計算されます。これが、必要な議席数が埋まるまで繰り返されます。\n\n@information!これにより、[concept_law]は、イデオロギーの違いにかかわらず、より弱い[Concept('concept_interest_group', '$concept_interest_groups$')]がより強い[Concept('concept_party', '$concept_parties$')]と連携することを促進します。"
    law_propotional_representation:0 "比例代表制"
    law_propotional_representation_desc:0 "比例代表制とは、有権者のサブグループが選出された議体に比例して反映される選挙制度の総称です。"
    
    law_first_past_the_post_additional_effects:0 "@information!これにより、#y 立法府#!の構成が変化します。"
    law_jefferson_system_additional_effects:0 "@information!これにより、#y 立法府#!の構成が変化します。"
    law_propotional_representation_additional_effects:0 "@information!これにより、#y 立法府#!の構成が変化します。"
    
    law_parties_not_allowed:0 "政党禁止"
    law_parties_not_allowed_desc:0 "国内ではいかなる政党も登録できません。\n\n@information!もしこの[concept_country]が[Concept('concept_party', '$concept_parties$')]している場合、それらは[Concept('concept_political_faction', '$concept_political_factions$')]へと改宗されます。"
    law_single_party_state:0 "一党独裁国家"
    law_single_party_state_desc:0 "国は単一の合法的な政党によって統治されており、その政党は国内におけるすべての政治活動に対して独占権を持っています。\n\n@information! もしこの[concept_country]が[Concept('concept_election','$concept_elections$')]を持っている場合、選挙は代わりに[Concept('concept_non_competitive_election','$concept_non_competitive_elections$')]として行われます。そのような選挙は、特別な[concept_journal_entry]によって扱われます。"
    law_dominant_party_state:0 "一党優位政党制"
    law_dominant_party_state_desc:0 "国内に複数の政党が存在する場合でも、与党は国内のすべての政治活動に対して強い影響力を行使しています。\n\n@information! この[concept_law]の下では、[concept_government]に属しているか、あるいは#y 10%#!以上の[concept_clout]を持つ[Concept('concept_interest_group', '$concept_interest_groups$')]のみが[Concept('concept_party', '$concept_parties$')]に参加できます。"
    law_parties_allowed:0 "多党制"
    law_parties_allowed_desc:0 "いかなる政党も選挙管理委員会に登録し、選挙に出馬することができます。"
    
    concept_non_competitive_election:0 "非競争的選挙"
    concept_non_competitive_elections:0 "非競争的選挙"
    concept_non_competitive_election_desc:0 "非競争的選挙とは、[concept_government]に所属し承認された候補者のみが出馬を許される[Concept('concept_election','$concept_elections$')]です。"
    concept_political_faction:0 "政治派閥"
    concept_political_factions:0 "政治派閥"
    concept_political_faction_desc:0 "[Concept('concept_party', '$concept_parties$')]が禁止されている[concept_country]では、非公式な政治同盟や派閥が正式な[Concept('concept_party', '$concept_parties$')]の代わりとなります。\n\nしかし、ゲームの[Concept('concept_election','$concept_elections$')]メカニクスにより、[concept_interest_group]が[concept_votes]を受け取るには政党が必要であるため、政治派閥は[Concept('concept_interest_group', '$concept_interest_groups$')]が #y \"政治派閥\" に加入することによって表現されます。\"#! [Concept('concept_party', '$concept_parties$')]. \n\nThese #y "Political Faction"#! [Concept('concept_party', '$concept_parties$')] do not benefit from certain mechanics simulating formal parties, such as the ability to ban parties."
    
    law_appointed_legislature:0 "従属的な立法府"
    law_appointed_legislature_desc:0 "立法府は主に諮問機関として機能し、経営責任者からの独立性は限定的です。"
    law_technocratic_legislature:0 "限定的な立法府"
    law_technocratic_legislature_desc:0 "立法府は、監視機能と経営責任者の権限への服従とのバランスを取りながら、制約された役割を果たします。"
    law_democratic_legislature:0 "強力な立法府"
    law_democratic_legislature_desc:0 "議会は大きな権力を保持しており、統治と公的な説明責任における中心的な機関として機能しています。"
    
    law_appointed_legislature_additional_effects:0 "@information!これは[concept_law]が[concept_government_type]の[concept_country]を変更する可能性があります。"
    law_technocratic_legislature_additional_effects:0 "@information!これは[concept_law]が[concept_government_type]の[concept_country]を変更する可能性があります。"
    law_democratic_legislature_additional_effects:0 "@information!これは[concept_law]が[concept_government_type]の[concept_country]を変更する可能性があります。"
    
    law_unicameralism:0 "一院制議会"
    law_hybrid_chamber:0 "混合議会"
    law_bicameralism:0 "二院制議会"
    law_unicameralism_desc:0 "一院制とは、単一の院または議会で構成され、一括して法律の制定や投票を行う議会のタイプです。"
    law_hybrid_chamber_desc:0 "この国は一院制議会を有しており、元首は主に儀礼的な役割を務めています。あるいは、[concept_government]が可決した法律に対して拒否権を持つ、[concept_ruler]から独立した執行機関が存在しています。"
    law_bicameralism_desc:0 "二院制とは、二つの別々の議会、議院、または院に分割された議会のタイプであり、二院制議会として知られています。"
    
    law_politicised_bureaucrats:0 "政治任用官僚"
    law_politicised_bureaucrats_desc:0 "すべての官僚は、忠実性を考慮して政府によって選出されています。"
    law_elitist_bureaucrats:0 "エリート官僚"
    law_elitist_bureaucrats_desc:0 "すべての官僚は、官僚組織のエリートによって選出されています。"
    law_professional_bureaucrats:0 "専門職官僚"
    law_professional_bureaucrats_desc:0 "すべての官僚は、個人の能力を重視した自由で公平な採用プロセスによって選出されています。"
    
    law_professional_bureaucrats_additional_effects:0 "@warning![GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetNameWithCountryVariant]はこの[concept_law]の下では、いかなる[Concept('concept_party', '$concept_parties$')]にも加入できません。"
    
    law_weak_financial_regulations:0 "緩い金融規制"
    law_moderate_financial_regulations:0 "収支金融規制"
    law_strong_financial_regulations:0 "厳しい金融規制"
    
    lawgroup_company_regulations:0 "企業規制"
    
    law_weak_company_regulations:0 "弱い企業規制"
    law_moderate_company_regulations:0 "収支企業規制"
    law_strong_company_regulations:0 "強い企業規制"
    
    law_weak_company_regulations_desc:0 "監視が最小限に抑えられた緩い枠組みであり、企業に広範な自由を認める一方で、労働者や消費者への保護は限定的です。"
    law_moderate_company_regulations_desc:0 "妥当な監視を伴うバランスの取れた枠組みであり、ビジネス運営の柔軟性を維持しつつ、公正な慣行を保証します。"
    law_strong_company_regulations_desc:0 "広範な監視を伴う厳格な枠組みであり、企業には大きな制約を課すものの、労働者の権利と消費者の保護を優先します。"
    
    law_HOS_monarch:0 "$law_monarchy$"
    law_HOS_monarch_desc:0 "$law_monarchy_desc$"
    law_HOS_president:0 "$law_presidential_republic$"
    law_HOS_president_desc:0 "$law_presidential_republic_desc$"
    law_HOS_religious_leader:0 "$law_theocracy$"
    law_HOS_religious_leader_desc:0 "$law_theocracy_desc$"
    law_HOS_nationalist_leader:0 "軍事政権"
    law_HOS_nationalist_leader_desc:0 "これは、政治権力が$ig_armed_forces$の手に集中する[concept_government_type]です。"
    law_HOS_communist_leader:0 "社会主義共和国"
    law_HOS_communist_leader_desc:0 "$law_council_republic_desc$"
    
    law_HOG_none:0 "統一行政"
    law_HOG_none_desc:0 "[concept_ruler]が元首と政府の首脳を兼ねます。"
    law_HOG_prime_minister:0 "分離行政"
    law_HOG_prime_minister_desc:0 "[concept_ruler]が政府の首脳を務める一方、別の人物が儀礼的な元首を務めます。"
    law_HOG_president_prime_minister:0 "分割行政"
    law_HOG_president_prime_minister_desc:0 "行政権は、元首である[concept_ruler]と政府の首脳の間で分割されます。"
    
    law_nepotistic_cabinet:0 "縁故主義内閣"
    law_nepotistic_cabinet_desc:0 "内閣は支配者の友人や家族のみで構成されています。"
    law_semi_nepotistic_cabinet:0 "準縁故主義内閣"
    law_semi_nepotistic_cabinet_desc:0 "内閣の一部は支配者の友人や家族で占められています。"
    law_meritocratic_cabinet:0 "実力主義内閣"
    law_meritocratic_cabinet_desc:0 "内閣メンバーは支配者とのコネではなく、その能力に基づいて選出されます。"
    
    law_executive_supremacy:0 "行政優位"
    law_executive_supremacy_desc:0 "立法府および司法府は、行政部門の決定を覆すことはできません。"
    law_legislative_supremacy:0 "議会主権"
    law_legislative_supremacy_desc:0 "行政部門および司法府は、立法部門の決定を覆すことはできません。"
    law_constitutional_supremacy:0 "憲法優位"
    law_constitutional_supremacy_desc:0 "憲法は国の最高法規であり、立法府による憲法修正を除いて、これを侵害することはできません。"
    
    law_kangaroo_law:0 "従順な司法"
    law_kangaroo_law_desc:0 "司法は、行政または立法部門の決定を覆すことは許可されていません。"
    law_civil_law:0 "脆弱な司法"
    law_civil_law_desc:0 "司法は、ある種の行政アクションや非憲法的な[Concept('concept_law','$concept_laws$')]を覆すことが許可されています。"
    law_common_law:0 "強力な司法"
    law_common_law_desc:0 "司法は、行政アクションや[Concept('concept_law','$concept_laws$')]を覆す全権限を有しています。"
    
    law_peasant_levies:0 "非武装化"
    law_peasant_levies_desc:0 "国家は常備軍を持つことを許可されていません。"
    law_mass_conscription:0 "徴兵軍"
    law_mass_conscription_desc:0 "軍は職業軍人と徴兵された軍人の両方で構成されています。"
    
    law_ethnostate:0 "民族国家"
    law_national_supremacy:0 "国粋主義"
    law_multicultural:0 "多文化主義"
    
    law_no_womens_rights:0 "女性の権利なし"
    law_no_womens_rights_desc:0 "女性はすべての法的権利を否定され、所有権、雇用、および政治参加から除外されています。"
    law_women_own_property:0 "限定的な女性の権利"
    law_women_own_property_desc:0 "女性は財産を所有し基本的な法的権利を行使できますが、ほとんどの雇用や政治参加からは依然として排除されています。"
    law_women_in_the_workplace:0 "平等な女性の権利"
    law_women_in_the_workplace_desc:0 "女性は財産所有、雇用、および法的地位において平等な権利を享受していますが、政治参加は現実的な制約により制限される場合があります。"
    law_womens_suffrage:0 "女性への肯定的措置"
    law_womens_suffrage_desc:0 "政策によって政治、雇用、および教育における女性の参加が積極的に推進されます。割当制や特定のプログラムなどの措置により、形式的な法的平等を超えて、代表権と機会の平等が保証されます。"
    
    law_outlawed_dissent:0 "言論の自由なし"
    law_censorship:0 "検閲された言論"
    law_limited_free_speech:0 "制限された言論の自由"
    law_limited_free_speech_desc:0 "$law_right_of_assembly_desc$"
    law_full_free_speech:0 "完全な言論の自由"
    law_full_free_speech_desc:0 "$law_protected_speech_desc$"
    
    law_no_secret_police:0 "秘密警察なし"
    law_no_secret_police_desc:0 "国内には秘密警察が存在しません。"
    law_secret_police:0 "秘密警察"
    
    law_no_espionage:0 "対外情報機関なし"
    law_no_espionage_desc:0 "国家は対外情報機関を保有していません。"
    law_defensive_espionage:0 "防諜のみ"
    law_defensive_espionage_desc:0 "国家は、国内における外国の影響力や活動に対抗する権限を持つ対外情報機関を保有しています。"
    law_offensive_espionage:0 "諜報活動許可"
    law_offensive_espionage_desc:0 "国家は、国内における外国の影響力や活動に対抗し、かつ他国に対して敵対的諜報活動を行う権限を持つ対外情報機関を保有しています。"
    
    law_lenient_policing:0 "寛大な警察活動"
    law_lenient_policing_desc:0 "警察の執行権および捜査権は、被告人に非常に有利な形で偏っています。"
    law_balanced_policing:0 "均衡の取れた警察活動"
    law_balanced_policing_desc:0 "警察の執行権および捜査権は、被告人の利益と均衡が保たれています。"
    law_strict_policing:0 "厳格な警察活動"
    law_strict_policing_desc:0 "警察の執行権および捜査権は、警察側に有利な形で偏っています。"
    law_draconian_policing:0 "過酷な警察活動"
    law_draconian_policing_desc:0 "囚人や被告人は、警察のなすがままにされています。"
    
    law_slavery_banned:0 "強制収容所なし"
    law_slavery_banned_desc:0 "国内には強制収容所が存在しません。"
    law_slavery_political:0 "強制収容所"
    law_slavery_political_desc:0 "政治的反体制派は広大な強制収容所に投獄され、強制労働に従事させられています。"
    law_slavery_cultural:0 "文化弾圧"
    law_slavery_cultural_desc:0 "政府は、国内において[concept_culture]または[concept_religion]によって差別される者を組織的に抑圧しています。"
    
    law_colonial_resettlement:0 "植民地国家建設"
    law_colonial_resettlement_desc:0 "植民地は産業と政治の両面で発展させるべきものです。"
    law_colonial_exploitation_desc:0 "植民地は資源抽出のみに使用され、現地住民に政治的権利は与えられません。"
    
    law_trade_unions_banned:0 "労働組合禁止"
    law_trade_unions_banned_desc:0 "国内ではいかなる労働組合も許可されていません。"
    law_state_trade_unions:0 "国営労働組合のみ"
    law_state_trade_unions_desc:0 "国内では、国家によって管理された労働組合のみが許可されています。"
    law_restricted_trade_unions:0 "制限された労働組合"
    law_restricted_trade_unions_desc:0 "独立した労働組合は許可されていますが、その権限は制限されています。"
    law_full_trade_unions:0 "無制限の労働組合"
    law_full_trade_unions_desc:0 "独立した労働組合は許可されており、労働争議を行う権限は無制限です。"
    
    law_no_war:0 "中立国"
    law_no_war_desc:0 "我々は宣戦布告を行うことも、いかなる国際的な軍事・政治同盟に加入することも許可されていません。"
    law_defensive_war:0 "防衛戦争のみ"
    law_defensive_war_desc:0 "我々は特定の種類の戦争のみを宣言することが許可されています。"
    law_offensive_war:0 "完全な戦争権"
    law_offensive_war_desc:0 "開始できる戦争の種類に制限はありません。"
    
    law_wmd_banned:0 "大量破壊兵器禁止"
    law_wmd_banned_desc:0 "大量破壊兵器の開発や所有は許可されていません。"
    law_wmd_allowed:0 "大量破壊兵器許可"
    law_wmd_allowed_desc:0 "大量破壊兵器の開発や所有が許可されています。"
    
    law_no_civil_defence_law:0 "民間防衛なし"
    law_very_weak_civil_defence_law:0 "非常に脆弱な民間防衛"
    law_weak_civil_defence_law:0 "脆弱な民間防衛"
