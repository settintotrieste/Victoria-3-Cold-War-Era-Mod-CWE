    reserve_powers_pm_veto.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('government_prime_minister_custom_title')]からの対立"
    reserve_powers_pm_veto.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('government_prime_minister_custom_title')]の[SCOPE.sCharacter('ceremonial_head_of_state').GetFullName]は[SCOPE.sLaw('current_law_scope').GetName]を制定するための[SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')]において法案への投票を拒否しています。しかし[concept_government]に十分な[concept_legitimacy]があれば[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]の[GetPlayer.GetRuler.GetFullName]は[SCOPE.GetRootScope.GetCountry.GetCustom('government_prime_minister_custom_title')]に法案への投票を強いることができます。"
    reserve_powers_pm_veto.f: "このイベントは、現在制定されている[concept_law]に対して[SCOPE.GetRootScope.GetCountry.GetCustom('government_prime_minister_custom_title')]が反対、あるいは強く反対しているために発生しました。[concept_legitimacy]が50を超えている場合、[concept_ruler]は[SCOPE.GetRootScope.GetCountry.GetCustom('government_prime_minister_custom_title')]の反対を克服できます。"
    
    reserve_powers_pm_veto_accept_option:0 "現在の法案の制定試行を断念する。"
    reserve_powers_pm_veto_reject_option:0 "「[SCOPE.GetRootScope.GetCountry.GetCustom('government_prime_minister_custom_title')]は[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]の意志に服従せよ！」"
    
    je_cohabitation_system: "[SCOPE.GetRootScope.GetCountry.GetCustom('government_prime_minister_custom_title')]の事務所"
    je_cohabitation_system_reason: "[ROOT.GetCountry.GetName]憲法の下で、[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]の行政権は[SCOPE.GetRootScope.GetCountry.GetCustom('government_prime_minister_custom_title')]と共有されています。これは、[SCOPE.GetRootScope.GetCountry.GetCustom('government_prime_minister_custom_title')]が国の法律や政策の策定において、一定の決定権を持つことを意味します。\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]が[SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')]の議員の大多数とは異なる政派に属している場合、[SCOPE.GetRootScope.GetCountry.GetCustom('government_prime_minister_custom_title')]は[SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')]内の多数派に受け入れられる[SCOPE.GetRootScope.GetCountry.GetCustom('government_prime_minister_custom_title')]を指名しなければならないため、分立政府が生じます。\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('government_prime_minister_custom_title')]は、[SCOPE.GetRootScope.GetCountry.GetCustom('government_prime_minister_custom_title')]の承認を得られない[Concept('concept_law','$concept_laws$')]の制定を#y 拒否#!することができます。\n\n現在の[SCOPE.GetRootScope.GetCountry.GetCustom('government_prime_minister_custom_title')]：[SCOPE.sCharacter('cohabitation_pm_scope').GetFullName]"
    
