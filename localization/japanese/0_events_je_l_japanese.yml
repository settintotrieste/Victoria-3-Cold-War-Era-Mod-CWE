    je_non_aligned_movement:0 "非同盟運動"
    je_non_aligned_movement_reason:0 "[ROOT.GetCountry.GetName]は非同盟運動のメンバーです。\n\n非同盟運動（NAM）は、冷戦期においていかなる大国勢力圏にも正式に同盟せず、また敵対もしていない[GetPlayer.MakeScope.Var('NAM_member_count').GetValue]の国々によるフォーラムです。\n\nこの運動は朝鮮戦争の直後に、冷戦中に二つの大国が勢力圏を形成し、世界の残りの部分を自らの軌道に引き込もうとする政策を進めたことで、世界が急速に二極化したことに対抗しようとする一部の国々の取り組みとして始まりました。"
    je_non_aligned_movement_status:0 "総メンバー数：[GetPlayer.MakeScope.Var('NAM_member_count').GetValue]"
    non_aligned_movement_member:0 "非同盟運動メンバー"
    
    cold_war_is_over.tt:0 "冷戦の終結"
    
    je_corruption_system:0 "[ROOT.GetCountry.GetNameNoFlag]の汚職"
    je_corruption_system_reason:0 "[concept_corruption]とは、政府高官やその補完ネットワークが、不当な個人的利益のために権力を行使することです。汚職の形態は様々ですが、贈収賄、ロビー活動、恐喝、縁故主義、親族登用、局地主義、パトロネージュ、影響力売買、横領、使い込みなどが含まれます。\n\n[ROOT.GetCountry.GetAdjective]の[concept_government]にも汚職が存在するため、この問題を解決するには、より強力な$lawgroup_corruption_policy$を制定する必要があります。\n\nしかしながら、@armed_forces! $ig_armed_forces$および@intelligentsia! $ig_intelligentsia$は国内の汚職を削減しようとするいかなる試みにも反対するでしょう。そのため、より強力な$lawgroup_corruption_policy$を制定しようとする試みが続く間、それらの[Concept('concept_interest_group', '$concept_interest_groups$')]を支持する人々の間で急進主義が高まります。"
    
    very_high_corruption:0 "[concept_corruption]：極めて大規模"
    high_corruption:0 "[concept_corruption]：大規模"
    medium_corruption:0 "[concept_corruption]：中規模"
    low_corruption:0 "[concept_corruption]：小規模"
    very_low_corruption:0 "[concept_corruption]：極めて小規模な"
    
    add_nuclear_fallout.t:0 "放射性降下物"
    add_nuclear_fallout.d:0 "近隣諸国への核攻撃による核の降下物が[ROOT.GetCountry.GetName]に広がりました。科学者の予測によれば、影響を受けた州の隣接する州が放射能を失うまで、降下物は消滅しません。"
    add_nuclear_fallout.f:0 "核兵器によるダメージを受けた[Concept('concept_state', '$concept_states$')]に隣接する[Concept('concept_state', '$concept_states$')]が存在するため、このイベントが発生しました。"
    add_nuclear_fallout.option:0 "「これはまずい……」"
    
    remove_nuclear_fallout.t:0 "核の降下物が解消されました"
    remove_nuclear_fallout.d:0 "[ROOT.GetCountry.GetName]の[Concept('concept_state', '$concept_states$')]の一部における核の降下物が解消されました。"
    remove_nuclear_fallout.f:0 "核の降下物が発生している[Concept('concept_state', '$concept_states$')]が、核兵器によってダメージを受けたどの[Concept('concept_state', '$concept_states$')]にも隣接しなくなったため、このイベントが発生しました。"
    remove_nuclear_fallout.option:0 "「やっとだ！」"
    
