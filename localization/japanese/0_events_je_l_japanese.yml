    everyone_is_angry_custom_tooltip:0 "国内のすべての人々を敵に回します。"
    un_peacekeeping_loc_key:0 "国連平和維持活動"
    
    request_imf_loan_decision:0 "国際通貨基金の融資を求める"
    request_imf_loan_decision_desc:0 "IMFは、1930年代の大恐慌後の1944年に、国際的な経済協力の枠組みを構築することを目的として設立されました。IMFは、国際収支に実際または潜在的な問題を抱えているメンバー国に対して、緊急融資を含む融資を提供しています。その目的は、諸国が国際準備高を再構築し、通貨を安定させ、輸入の支払いを継続し、力強い経済成長のための状況を回復できるよう支援するとともに、根本的な問題を修正することにあります。"
    IMF_loan_request.t:0 "[SCOPE.sCountry('imf_loan_debtor').GetName]へのIMFの融資に参加しますか？"
    IMF_loan_request.d:0 "[SCOPE.sCountry('imf_loan_debtor').GetName]は現在、国際収支の維持において深刻な困難に直面しています。その結果、同国の外交官は国連の国際通貨基金に接近し、現在未払いの負債を返済するための融資を要請しました。IMFの資源は主に、国がメンバーになった際に資本出資（クォータ）として支払う資金からなるため、[SCOPE.sCountry('imf_loan_creditor').GetName]は[SCOPE.sCountry('imf_loan_debtor').GetName]への資金提供を求められています。"
    IMF_loan_request.f:0 "[SCOPE.sCountry('imf_loan_debtor').GetName]への融資を選択した場合、[ROOT.GetCountry.GetName]は[concept_obligation]と引き換えに[SCOPE.sCountry('imf_loan_debtor').GetName]の[Concept('concept_credit','$concept_credit_debt$')]の5％を引き受けるか、あるいは[Concept('concept_bankroll','$concept_bankrolling$')][SCOPE.sCountry('imf_loan_debtor').GetName]を開始することになります。"
    imf_loan_option.1:0 "「彼らに融資を与えよう。」"
    imf_loan_option.2:0 "「我々自身も資金繰りに苦しんでおり……」"
    imf_loan_option.3:0 "「こんな件で、これ以上私を煩わせるな！」"
    
    IMF_loan_terms.t:0 "IMF経済改革"
    IMF_loan_terms.d:0 "IMFと[SCOPE.sCountry('imf_loan_debtor').GetName]との間の融資契約の条項では、債務者は自由な市場と抑制された政府支出を促進するために、経済システムの抜本的な改革を行わなければならないとされています。[SCOPE.sCountry('imf_loan_debtor').GetName]の政府は、市場を世界に開放し、国営企業を民営化し、資金の増刷を抑制するための法律を制定する義務があります。"
    IMF_loan_terms.f:0 "このイベントは、負債契約が締結された時点、または契約期間中のいずれにおいても、自由で競争力のある市場というIMFの要件を満たしていなかったために発生しました。"
    imf_loan_terms:0 "「IMFの押し付けを受け入れるほかない」"
    
    imf_loan_debtor:0 "IMF融資債務者"
    imf_loan_creditor:0 "IMF融資債権者"
    
    request_imf_loan.tt:0 "IMF債権者に、[ROOT.GetCountry.GetName]の[Concept('concept_credit','$concept_credit_debt$')]の#white 5%#!を引き受けるか、あるいは[concept_bankroll][ROOT.GetCountry.GetName]を要求する"
    
    notification_imf_loan_take_debt_notification_name:0 "[SCOPE.sCountry('imf_loan_debtor').GetName]の[SCOPE.sCountry('imf_loan_creditor').GetAdjective]救済"
    notification_imf_loan_take_debt_notification_desc:0 "[SCOPE.sCountry('imf_loan_creditor').GetName]は、[SCOPE.sCountry('imf_loan_debtor').GetName]への国際通貨基金融資において、[SCOPE.sCountry('imf_loan_debtor').GetAdjective]の[Concept('concept_credit','$concept_credit_debt$')]の5%を引き受けることで参加することに同意しました。"
    
    notification_imf_loan_bankroll_notification_name:0 "[SCOPE.sCountry('imf_loan_creditor').GetAdjective]による[SCOPE.sCountry('imf_loan_debtor').GetName]の救済"
    notification_imf_loan_bankroll_notification_desc:0 "[SCOPE.sCountry('imf_loan_creditor').GetName]は、[SCOPE.sCountry('imf_loan_debtor').GetName]への国際通貨基金融資において、[Concept('concept_bankroll','$concept_bankrolling$')][SCOPE.sCountry('imf_loan_debtor').GetName]を行うことで参加することに同意しました。"
    
    je_imf_system:0 "国際通貨基金"
    je_imf_system_reason:0 "IMFは、1930年代の世界大恐慌の余波を受けて、国際的な経済協力の枠組みを構築することを目的として、1944年に設立されました。IMFは、現在または潜在的な国際収支の問題を抱えるメンバー国に対して、緊急融資を含む債務を提供します。その目的は、根本的な問題を修正しつつ、諸国が国際準備高を再構築し、通貨を安定させ、輸入を継続し、強力な経済成長のための状況を回復できるよう支援することです。\n\n#white 通貨の力：#! [SCOPE.GetRootScope.GetCountry.GetCustom('currency_strength_custom_loc')]"
    je_imf_system_status:0 "未獲得のグローバル[concept_sdr]：@money![GetGlobalVariable('SDR_global_marketplace_amount_display').GetValue]M \n国内[concept_sdr]：@money![GetPlayer.MakeScope.Var('SDR_local_actual_amount_display').GetValue]M \nグローバル[concept_sdr]：@money![GetPlayer.MakeScope.Var('SDR_global_amount_display').GetValue]M"
    
    notification_imf_grateful_country_notification_name:0 "[SCOPE.sCountry('grateful_imf_country').GetName]により[concept_relations]を獲得"
    notification_imf_grateful_country_notification_desc:0 "[SCOPE.sCountry('grateful_imf_country').GetName]は、世界の未獲得[concept_sdr]プールに対する[SCOPE.sCountry('this_imf_country').GetName]の貢献に感謝の意を表しています。これにより、[SCOPE.sCountry('grateful_imf_country').GetAdjective]の[concept_relations]が[SCOPE.sCountry('this_imf_country').GetName]に対して#Green 10#!増加しました。"
    
