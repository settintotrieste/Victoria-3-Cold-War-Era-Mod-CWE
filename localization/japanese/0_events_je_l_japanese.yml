    abolish_dynastic_republic.t: "[ROOT.GetCountry.GetAdjectiveNoFormatting]継承危機"
    abolish_dynastic_republic.d: "前の[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]の死により、[ROOT.GetCountry.GetName]では継承危機が発生しました。というのも、[GetPlayer.GetRuler.GetFullName]、つまり亡き[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]の[concept_heir]が、公職に就くには若すぎるからです。\n\n子供の[Concept('concept_ruler', '$concept_rulers$')]を認めるように（つまり君主制を創設するように）憲法が改正されない限り、[GetPlayer.GetRuler.GetLastName]の政治王朝は終焉を迎えます。"
    abolish_dynastic_republic.f: "現在の[concept_ruler]が成人ではないため、このイベントが発生しました。"
    abolish_dynastic_republic.option.1: "王朝的な共和制の終焉です。"
    abolish_dynastic_republic.option.2: "君主制を宣言すれば、この問題は解決します！"
    
