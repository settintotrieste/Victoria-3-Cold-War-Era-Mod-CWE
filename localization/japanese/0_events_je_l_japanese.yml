    austria_formation.t:0 "オーストリアの独立？"
    austria_formation.d:0 "1955年5月15日、四カ国（アメリカ、イギリス、フランス、ソ連）はウィーンでオーストリア国家条約に署名しました。これにより四カ国による占領が終了し、オーストリアは自由かつ独立した中立国であることが宣言されました。"
    austria_formation.option.1:0 "我々は統一され、民主的で中立的なオーストリア国家を望む"
    austria_formation.option.2:0 "オーストリアを分割したままにせよ！"
    austria_formation_1946.t:0 "第二次管理協定？"
    austria_formation_1946.d:0 "1946年6月28日、同盟国はオーストリア政府に対する支配を緩和する第二次支配協定に署名しました。議会は事実上、同盟国の支配から解放されました。これ以降、その決定は4カ国の同盟国すべてによる全会一致の投票によってのみ覆されることとなりました。ソ連による拒否権は、西側諸国の反対によって日常的に無効化されました。その後9年間で、この国は外国の支配から徐々に解放され、「後見下にある国」から完全な独立を果たしました。"
    austria_formation_1946.option.1:0 "占領区域を統合する。"
    austria_formation_1946.option.2:0 "オーストリアを分割したままにする！"
    
    united_states_formation_hawaii.t:0 "ハワイがアメリカの州になる？"
    united_states_formation_hawaii.d:0 "アイゼンハワー大統領は政権発足の初期にハワイの州昇格案への支持を表明していましたが、適切な法律が議会を通過するのは1959年のハワイ州昇格法成立まで待たねばなりませんでした。アイゼンハワー大統領は1959年3月18日にその法案に署名し法律として制定しました。1959年6月、ハワイの市民は州昇格法を受け入れるかどうかの国民投票を行い、1959年8月21日、アイゼンハワー大統領はハワイを50番目の州として受け入れる公式布告に署名しました。"
    united_states_formation_alaska.t:0 "アラスカがアメリカの州になる？"
    united_states_formation_alaska.d:0 "アイゼンハワー大統領は政権発足の初期にアラスカの州昇格案への支持を表明していましたが、実現に向けて克服すべき懸念事項も表明していました。最大の懸念は、アラスカがソ連との国境に位置していたため、治安維持の問題が浮上したことでした。もう一つの懸念は領土内の公有地の量であり、留保されていない土地を新しい州政府に移管するために適切な妥協案を調整する必要がありました。1959年1月3日、彼はアラスカを49番目の州として受け入れる公式布告に署名しました。"
    united_states_formation.option.1:0 "はい"
    united_states_formation.option.2:0 "いいえ"
    
    tanzania_formation_zanzibar.t:0 "タンガニーカとザンジバルの連合？"
    tanzania_formation_zanzibar.d:0 "タンガニーカとザンジバルの連合の結果、1964年4月26日にタンザニア連合共和国が形成されました。ジュリアス・ニエレレが初代大統領となり、シェイク・アベイデ・カルメが初代副大統領および革命評議会議長に就任しました。"
    tanzania_formation.option.1:0 "はい"
    tanzania_formation.option.2:0 "いいえ"
    
    india_formation_sikkim.t:0 "インドとシッキムの連合？"
    india_formation_sikkim.d:0 "インドは1973年4月にシッキムを掌握し、君主制を打倒しました。1975年4月9日、シッキム議会は国王が退位したことを発表し、操作された住民投票を通じてシッキムがインドの一部になったことを宣言しました。5月16日、インド議会はシッキムが正式にインドの州になったことを発表しました。"
    india_formation.option.1:0 "はい"
    india_formation.option.2:0 "いいえ"
    
    HUN_1956_revolution.t:0 "ハンガリー革命？"
    HUN_1956_revolution.d:0 "1956年のハンガリー革命は、ハンガリー人民共和国（1949年～1989年）の政府と、ソ連への従属によって引き起こされた政策に対する、国全体での革命の試みでした。この蜂起は12日間続きましたが、1956年11月4日にソ連の戦車と軍隊によって鎮圧されました。"
    HUN_2010_revolution.t:0 "ヴィクトル・オルバンの台頭？"
    HUN_2010_revolution.d:0 "ヴィクトル・ミハイ・オルバンはハンガリーの弁護士であり政治家で、2010年からハンガリーの首相を務めています。2010年以降、オルバンはハンガリーにおける民主主義を損ない、司法の独立を弱め、報道の自由を制限してきました。オルバンの2度目の首相任期中には、2013年のハンガリー憲法修正を含む、いくつかの議論を呼ぶ憲法および法律の改革が行われました。"
    
    CZH_1968_revolution.t:0 "プラハの春？"
    CZH_1968_revolution.d:0 "プラハの春は、チェコスロバキア社会主義共和国における政治的自由化と大衆抗議の時代でした。これは1968年1月5日、改革派のアレクサンデル・ドゥプチェクがチェコスロバキア共産党（KSČ）の第一書記に選出されたことから始まり、ソ連とほとんどのワルシャワ条約機構加盟国が改革を抑圧するために同国に侵略した1968年8月21日まで続きました。"
    CZH_1968_revolution_1.t:0 "アレクサンデル・ドゥプチェクの台頭？"
    CZH_1968_revolution_1.d:0 "1968年1月、指導権と改革の問題はチェコスロバキア共産党中央委員会に委ねられました。彼らは大統領と党首の機能を分割することで、ノヴォトニーに対する不信任案を可決しました。彼は大統領に留まりましたが、第一書記はドゥプチェクに交代しました。ノヴォトニーは抵抗し、権力喪失を防ぐために軍の一部を動員しようと試みました。皮肉なことに、この調査が行われた結果、数ヶ月後にはノヴォトニーは完全に職を追われることとなりました。"
    CZH_1969_revolution.t:0 "チェコスロバキアの正常化？"
    CZH_1969_revolution.d:0 "1969年4月にドゥベクに代わってKSČのリーダーとなったフサークの政権は、国の政治状況を「正常化」するために迅速に行動しました。フサークの正常化の主な目標は、党による強固な統治の回復と、社会主義陣営の献身的なメンバーとしてのチェコスロバキアの地位の再確立でした。侵略後の2年間で、新しい指導部はいくつかの改革的な法律（国民戦線法や報道法など）を廃止し、他の法律については単に執行を怠りました。プラハの春の間に大幅な独立を与えられていた経済企業を、中央計画と生産割当に基づいた契約を通じて、中央集権的な支配へと戻しました。"
    CZH_1969_revolution_1.t:0 "チェコスロバキア連邦？"
    CZH_1969_revolution_1.d:0 "連邦憲法の公布により、政府構造に関する1960年チェコスロバキア憲法の58の条項が改正されました。チェコスロバキア国家は、「二つの平等な兄弟国家」であるチェコ社会主義共和国とスロバキア社会主義共和国の連邦であると宣言されました。それぞれの共和国は、連邦政府と並行し、少なくとも理論上はステータスにおいて平等な国の行政機構を有していました。二重国籍が確立されました。かつての中央政府の機能の多くは、代わりに二つの国の政府の管轄下に置かれました。連邦政府は、外交、国防、連邦準備金、および国家資源に関する独占的な管轄権を保持しました。"
    
    BUL_1954_revolution.t:0 "4月の路線？"
    BUL_1954_revolution.d:0 "ヨシフ・スターリンの死後、共同指導体制が重視されるようになりました。1954年に強硬派のスターリン主義者であるチェルヴェンコフがブルガリア共産党（BCP）の書記長職を退いた際、ジフコフがその後任となりましたが、チェルヴェンコフは首相としてその権限の大部分を保持していました。ニキータ・フルシチョフがソ連共産党第20回大会でスターリンを批判する有名な秘密演説を行った後、新たなフルシチョフ路線を採用することに合意するため、1956年4月にBCP中央委員会の全会一致の会議が招集されました。その会議において、ジフコフはチェルヴェンコフをスターリンの弟子であると批判し、彼を首相から閣僚ポストへと降格させました。その後、ジフコフはソ連におけるフルシチョフの雪解けと同様に、ブルガリアにおいて相対的な社会政治的自由化と脱スターリン化政策を遂行しました。"
    BUL_1965_revolution.t:0 "4月の陰謀？"
    BUL_1965_revolution.d:0 "国家および共産党のリーダーとしてのジフコフの地位がますます強化される中、かつてのパルチザンリーダーや現役の軍部の人々は、ジフコフの指導部による修正主義的な政策と見なすものに対し、批判的なスタンスを取りました。1965年の「4月の陰謀」と呼ばれる出来事において、将軍のイヴァン・トドロフ＝ゴルニャ、将軍のツヴャトコ・アネフ、そしてツォロ・クラステフは、政権を転覆しようと計画する高官の士官グループを組織しました。彼らの計画は、スターリン主義と毛沢東主義の原則に基づいた親中国派の指導部を国内に樹立することでした。しかしクーデターは露呈し、1965年3月28日から4月12日の間に、陰謀者の大半が逮捕され党から追放されました。"
    
    BYE_1994_revolution.t:0 "アレクサンドル・ルカシェンコの管区？"
    BYE_1994_revolution.d:0 "ルカシェンコは政治家としてのキャリアを歩む前、国営農場（ソフホーズ）の責任者として働き、ソ連国境警備隊とソ連軍の両方で勤務しました。1990年、ルカシェンコはベラルーシ・ソビエト社会主義共和国の最高会議の議員に選出されました。ソ連崩壊後、彼はベラルーシ最高評議会の暫定的な腐敗防止委員会の委員長に就任しました。1994年、彼は新憲法の採択後、この国で最初の大統領選挙において勝利しました。"
    
    NEJ_1964_revolution.t:0 "サウード国王の退位？"
    NEJ_1964_revolution.d:0 "サウードの統治下で、サウジアラビアは1961年に非同盟運動に加わりました。しかし、サウードがサウジの負債に対処できなかったことが、異母弟であり皇太子であるファイサルとの権力闘争を引き起こし、サウードの強制的な退位とファイサルの国王即位へとつながりました。サウードは国外追放となり、一部の息子たちの支援を受けて王座を奪還しようとしましたが、失敗に終わりました。"
    NEJ_1975_revolution.t:0 "ファイサル国王の暗殺？"
    NEJ_1975_revolution.d:0 "1975年3月25日、国王は異母弟ムサイド・ビン・アブドゥルアズィーズの息子であるファイサル・ビン・ムサイドによって至近距離から撃たれ、殺害されました。彼は米国から帰国したばかりでした。殺害はマジリス（文字通り「座る場所」を意味する）で行われました。これは、国王やリーダーが自身の邸宅を市民に開放し、彼らが入り込んで陳情を行う行事です。"
    NEJ_2005_revolution.t:0 "ファハド国王の死去"
    NEJ_2005_revolution.d:0 "ファハド国王は、詳細不明の医学的検査のため、2005年5月27日にリヤドのキング・ファイサル専門病院へ「安定しているが深刻な状況」として入院しました。匿名を条件とした関係者がAP通信に対し非公式に語ったところによると、国王は2005年8月1日の07:30に84歳で死去しました。公式声明は、同日10:00に情報大臣イヤード・マダニによって国営テレビで発表されました。"
    
    QAT_1960_revolution.t:0 "アリ・ビン・アブドゥッラー・アル・サーニの退位？"
    QAT_1960_revolution.d:0 "1960年5月、シェイク・アリの従兄弟が、ベイルートにあるシェイクの休暇用別荘で、銃器を用いて彼を暗殺しようと試みました。この暗殺未遂は、金銭的な問題に関連していたと言われています。彼は1960年10月28日、アハマド・ビン・アリ・アル・サーニに譲位しました。"
    QAT_1972_revolution.t:0 "カタールのクーデター？"
    QAT_1972_revolution.d:0 "シェイク・ハリファは、1972年2月22日に無血クーデターによってシェイク・アハマドを退位させました。当時、シェイク・アハマドは狩猟のためにイランに滞在していました。退位後、シェイク・アハマドは、亡きドバイの支配者の娘である妻と子供たちと共に、ドバイで自ら望んで国外追放の身となりました。"
    QAT_1995_revolution.t:0 "カタールのクーデター？"
    QAT_1995_revolution.d:0 "1995年6月、ハリファ・ビン・ハマド・アル・サーニがスイスのジュネーブに滞在していた際、息子のハマド・ビン・ハリファが別の無血クーデターによって実権を掌握しました。ハマド・ビン・ハリファは父の反逆罪を告発し、インターポールに逮捕を要求しました。彼は父に対し、死刑を含む4つの罪状で起訴を行いました。"
    QAT_2013_revolution.t:0 "ハマド・ビン・ハリファ・アル・サーニの譲位？"
    QAT_2013_revolution.d:0 "2013年6月25日、シェイク・ハマド・ビン・ハリファ・アル・サーニはカタールの首長（エミール）を退位し、実権を息子のシェイク・タミム・ビン・ハマド・アル・サーニに譲りました。湾岸政治におけるこの稀な自発的譲位は世代交代を象徴するものであり、地域の混乱と世界的な拡大のただ中にあるカタルの継続性を確かなものにしました。"
    
    MOR_1953_revolution.t:0 "モハメド・ベン・アラファのクーデター？"
    MOR_1953_revolution.d:0 "1912年のフェズ条約に基づきモロッコに保護国を維持していたフランス当局によって、従兄弟のモハメド5世が退位させられた後、ベン・アラファは1953年8月21日にアラウィット王位に就きました。1951年以来モロッコの総督を務めていた将軍オーギュスタン・ギヨームは、モロッコの独立運動を支持するモハメド5世と対立しており、フランス入植者やマラケシュのパシャであるタミ・エル・グラウィといった一部のモロッコ人リーダーの支持を得て、彼を打倒するためのキャンペーンを主導しました。"
    MOR_1955_revolution.t:0 "モハメド・ベン・アラファの打倒？"
    MOR_1955_revolution.d:0 "ベン・アラファのモロッコのPOPにおける正当性や人気の欠如、ならびにモロッコでの暴力行為がチュニジアやアルジェリア戦争との結びつきを強めていることが、フランス当局に、1955年に彼を退位させモハメド5世を復位させることを検討させる要因となりました。新しい総督に任命されたジルベール・グランヴァルは、大宰相ムハンマド・アル＝ムクリとの会談を決意しました。アル＝ムクリはフランスへ飛び、ヴィシーでグランヴァルと会談し、国中での民衆の動揺に鑑みてベン・アラファは退陣する必要があるとほのめかし、モハメド5世が権力を復帰させることが構想されました。10月1日、ベン・アラファは退位しました。"
    MOR_1961_revolution.t:0 "国王モハメド5世の死去"
    MOR_1961_revolution.d:0 "1961年2月26日、モハメドはヴォー州の外科医が行った鼻中隔のありふれた手術の合併症により死去しました。彼の死は、国王ハッサン2世として彼を継承した皇太子ムライ・ハッサンによって、国営ラジオで発表されました。"
    MOR_1970_revolution.t:0 "議会選挙の復活か？"
    MOR_1970_revolution.d:0 "1970年8月21日、モロッコで議会選挙が実施されました。これは、7月の国民投票による新憲法の採択に続くものでした。新しい代議院には240人のメンバーがおり、そのうち90人は小選挙区での直接投票により選出され、90人は現地評議員によって選出され、残りの60人は4つの職業団体（農業会議所から24人、商工会議所から16人、職人組合から10人、および賃金労働者の代表から10人）によって選出されました。"
    MOR_2011_revolution.t:0 "モロッコの憲法国民投票か？"
    MOR_2011_revolution.d:0 "憲法改革に関する国民投票が2011年7月1日にモロッコで実施されました。これは、2011年2月20日に1万人以上のモロッコ人が民主的な改革を求めてデモに参加したことから始まった、モロッコ全土での一連の抗議活動に応じる形で国王が呼びかけたものでした。"
    
    ALG_1965_revolution.t:0 "アルジェリアのクーデターか？"
    ALG_1965_revolution.d:0 "1965年のアルジェリアのクーデターにより、ウアリ・ブーメディエン大佐がアルジェリアの革命評議会議長として権力を掌握しました。この無血クーデターにより、アルジェリアの初代大統領アフメド・ベン・ベラが逮捕され、ブーメディエンとその同盟国（主にアルジェリア陸軍）によって、彼の最も近い支持者たちが投獄されました。"
    ALG_1992_revolution.t:0 "アルジェリア内戦？"
    ALG_1992_revolution.d:0 "アルジェリア内戦は、1992年1月11日（イスラム主義者の選挙勝利を無効にするクーデターの後）から2002年2月8日まで、アルジェリア政府と様々なイスラム主義反政府グループの間で戦われた内戦でした。当初、政府はイスラム主義運動の鎮圧に成功したかのように見えたため、戦争は緩やかに始まりましたが、ジハードを宣言する武装グループが出現し、1994年までに暴力は政府が耐えきれなくなるかと思われるほどのレベルに達しました。"
    
    JOR_1951_revolution.t:0 "ヨルダン国王アブドゥッラー1世暗殺事件？"
    JOR_1951_revolution.d:0 "1951年7月20日、ヨルダンの初代国王アブドゥッラー1世は、エルサレムのアルアクサ・モスクを訪問中に暗殺されました。アブドゥッラーは、レバノンの初代首相リアド・アル・ソルハの葬儀で追悼演説を行うためにエルサレムを訪れていました。彼は孫のフセイン王子と共にモスクで金曜礼拝に参列していました。アブドゥッラーは頭部と胸部に3発の致命的な銃弾を受けました。暗殺者の21歳のムスタファ・シュクリ・アシュは、国王の護衛官によって射殺されました。この暗殺は、息子のタラールが精神疾患を患っていたことから、王位継承危機を招きました。"
    JOR_1952_revolution.t:0 "ヨルダン国王タラールの退位？"
    JOR_1952_revolution.d:0 "ヨルダンの国王タラールは、父の暗殺後の短い治世を経て、精神疾患により1952年に退位しました。首相タウフィーク・アブ・アル・フダ率いる議会は、被害妄想や不安定な行動の兆候が見られたことから、彼を統治能力なしと宣言しました。息子のフセインがその後を継ぎ、長く変革をもたらす治世が始まりました。"
    JOR_1956_revolution.t:0 "ヨルダン軍のアラブ化？"
    JOR_1956_revolution.d:0 "ヨルダン軍司令部のアラブ化は、1956年3月1日にフセイン国王によってアラブ軍団を指揮していたイギリスの高級士官たちが解任され、続いて軍団がヨルダン軍へと改称されたことで見られました。アラブ軍団のイギリス人司令官であったグラブ・パシャは、アラブ軍団初ののアラブ人司令官となるラディ・アナブ少将に交代しました。フセインが軍司令部のアラブ化を図った意図は、イギリス人士官をヨルダン人士官に置き換え、イギリスからの政治的独立を主張し、イギリスを疑念の目で見つめていた隣国のアラブ諸国との関係を改善することにありました。その決定が公表されると、ヨルダンの街路では盛大な祝典が行われました。"
    JOR_1957_revolution.t:0 "ナセル主義者の粛清か？"
    JOR_1957_revolution.d:0 "1957年4月、ヨルダンのフセイン国王はナセル主義者主導のクーデター未遂を鎮圧し、アラブ民族主義の士官を粛清して議会を解散しました。ザルカを中心としたこの弾圧は、汎アラブ急進主義に対する決定的な転換点となりました。その後、戒厳令が敷かれて国王の権力が強化され、ヨルダンは西側諸国および反ナセル主義の地域大国との連携をより強固なものにしました。"
    JOR_1989_revolution.t:0 "ヨルダンの春か？"
    JOR_1989_revolution.d:0 "1989年4月18日、緊縮財政と価格高騰に対する広範な抗議活動がヨルダン全土で勃発し、フセイン国王は戒厳令を解除して22年間にわたる停止を経て選挙を再開しました。「ヨルダンの春」は政治的自由化への極めて重要な転換点となり、民主的な改革を促進し、ハシミテ王国における反対派の声のための空間を切り拓きました。"
    JOR_1999_revolution.t:0 "ヨルダン国王フセイン1世の死去か？"
    JOR_1999_revolution.d:0 "ヨルダンのフセイン国王は、癌との闘病の末、1999年2月7日に63歳で死去しました。彼の逝去は、現代のヨルダンを形作った46年間にわたる統治の終焉を意味しました。追悼の群衆がアンマンの街を埋め尽くす中、息子のAbdullah IIが速やかに宣誓を行い、リーダーシップの円滑な移行が確保されました。"
    
    EGY_1952_revolution.t:0 "7月革命か？"
    EGY_1952_revolution.d:0 "1952年7月23日、自由士官運動によるクーデターで国王ファルークが失脚し、革命が始まりました。この士官グループは、モハメド・ナギブとガマル・アブドゥル＝ナセルによって率いられました。"
    EGY_1953_revolution.t:0 "共和制宣言か？"
    EGY_1953_revolution.d:0 "共和国宣言は、1953年6月18日にエジプトの革命指揮評議会によって発せられた憲法宣言でした。この宣言によりフアード2世は退位し、エジプト王国はエジプト共和国へと移行しました。"
    EGY_1954_revolution.t:0 "ガマール・アブドゥル＝ナセルの台頭？"
    EGY_1954_revolution.d:0 "1953年1月、ナセルはナギブによる反対を退け、すべての政党を禁止し、解放ラリーの下で一党制を創設しました。解放ラリーはナセルを事務総長とし、RCC（革命指揮評議会）を支持する集会や講義を組織することを主な任務とする、緩やかに構成された活動でした。ナギブがRCCの土地改革の布告から距離を置き、エジプトの既存の政治勢力、すなわちワフド党や兄弟団に接近することで、ナセルからの独立の兆しを見せ始めると、ナセルは彼を廃位することを決意しました。1954年2月25日、2日前にRCCがナギブの不在のまま公式会議を開催した後、ナギブは辞任を発表しました。2月26日、ナセルは辞任を受諾してナギブを自宅軟禁し、RCCはナセルをRCC議長兼首相として宣言しました。"
    EGY_1970_revolution.t:0 "アンワル・サダットの台頭？"
    EGY_1970_revolution.d:0 "ムハンマド・アンワル・サダットは、1970年10月15日からエジプトの第3代大統領を務めたエジプトの政治家であり、軍人でした。大統領としての11年間で、彼はナセル主義の多くの政治的・経済的信条から脱却し、多党制を再導入し、インティファ（開放）経済政策を開始することで、エジプトの軌道を変えました。"
    EGY_1981_revolution.t:0 "アンワル・サダット暗殺？"
    EGY_1981_revolution.d:0 "エジプト第3代大統領のアンワル・サダットは、ヨム・キプル戦争の初期にエジプト軍がスエズ運河を渡り、イスラエルからシナイ半島を奪還した「バドル作戦」を祝うためカイロで毎年開催された勝利パレードの最中、1981年10月6日に暗殺されました。暗殺はエジプト・イスラム・ジハードのメンバーによって行われました。"
    EGY_2013_revolution.t:0 "エジプトのクーデター？"
    EGY_2013_revolution.d:0 "2013年のエジプトのクーデターは、2013年7月3日に発生しました。エジプト軍の総司令官アブドゥルファッター・アル＝シシ将軍は、民主的に選出されたエジプト大統領モハメド・モルシを失脚させるための連合を率い、2012年のエジプト憲法を停止させました。この動きは、広範囲にわたる国民的な抗議活動の中で、軍が政府に対し、抗議者との「相違を解決する」よう最後通牒を突きつけた後に行われました。"
    
    SYR_1949_revolution.t:0 "シリアのクーデター？"
    SYR_1949_revolution.d:0 "1949年3月のシリアのクーデターは、3月30日に発生した無血クーデターでした。これは近代シリア史上初の軍事クーデターであり、同国の民主的に選出された政府を転覆させました。このクーデターはシリア陸軍参謀総長フスニ・アル＝ザイムによって主導され、彼は1949年4月11日にシリア大統領に就任しました。アル＝ザイムの権力掌握を支援した士官の中には、サミ・アル＝ヒナウィとアディブ・アル＝シシャクリがおり、両者とも後に順に同国の軍事的なリーダーとなりました。"
    SYR_1954_revolution.t:0 "シリアのクーデター？"
    SYR_1954_revolution.d:0 "アディブ・シシャクリ大佐は1949年12月のクーデターによって権力を掌握し、軍事独裁体制を形成しました。シリアのリーダーとして、アディブ・シシャクリはアラブ系多数派の意向を汲み取り、それに応じて汎アラブ主義の政策を採用しました。1954年のシリアのクーデターは、アディブ・シシャクリの政府を転覆させるために同年2月に発生しました。シシャクリ反対運動を率いたのは、元大統領のアタシとベテランのドゥルーズ派リーダー、スルタン・アル＝アトラシュでした。"
    SYR_1955_revolution.t:0 "シュクリ・アル＝クワトリの台頭？"
    SYR_1955_revolution.d:0 "クワトリは、アディブ・アル＝シシャクリ大統領の追放後、ハシミ・アル＝アタシ大統領の任期中に1955年にシリアへ帰還しました。クワトリは63歳にして、1955年8月の大統領選挙に出馬しました。勝利するためには142議席からなるシリア議会で3分の2の多数を確保する必要がありましたが、クワトリは第1回投票で主要な対戦相手であるハリード・アル＝アズムを89対42で破りました。これにより第2回投票が行われ、クワトリは91票を獲得してアズムの41票を抑え、大統領に選出されました。"
    SYR_1963_revolution.t:0 "シリアのクーデター？"
    SYR_1963_revolution.d:0 "1963年のシリアにおけるクーデターは、アラブ社会主義バアス党シリア地域支部の軍事委員会による、シリアの権力掌握でした。シリアのバアス党工作員による計画と進行中の陰謀は、1963年2月のイラクにおけるバアス党の権力掌握に端を発していました。"
    SYR_1966_revolution.t:0 "シリアのクーデター？"
    SYR_1966_revolution.d:0 "1966年2月23日、アル＝ハフィズは参謀総長サラ・ジャディド率いる急進的なバアス派によって打倒されました。クーデターが発生した早朝、エジプトの大統領ガマール・アブドゥル＝ナセルから大統領評議会の事務総長ナシーム・アル＝サファルジャラーニへ、クーデターに関する遅すぎた警告電報が送られました。このクーデターは、大シリアの野心を掲げるジャディド率いるバアス党の「地域主義（クトゥリー）」陣営と、伝統的な汎アラブ主義を掲げるアル＝ハフィズ率いる「民族主義（カウミー）」陣営との間の派閥抗争から生じたものでした。"
    SYR_1970_revolution.t:0 "是正革命？"
    SYR_1970_revolution.d:0 "是正革命とは、1970年11月13日にシリアでハフェズ・アル＝アサド将軍によって主導された無血クーデターのことです。アサドは、国家とバアス党の「民族社会主義路線」を維持し、改善することを宣言しました。バアス党はイデオロギーの修正を行い、サラ・ジャディドの革命輸出教義から脱却しました。新たな教義では、ソ連の支援を受けてシリア軍を発展させることにより、イスラエルを撃破することに重点が置かれました。"
    SYR_1994_revolution.t:0 "バッシャール・アル＝アサドの台頭？"
    SYR_1994_revolution.d:0 "バッシャール・ハフェズ・アル＝アサドは、シリアの元政治家、医師、および軍将校です。1980年代にアサドは医師となり、1990年代初頭にはロンドンで眼科医としての訓練を受けていました。1994年に兄のバッセル・アル＝アサドが自動車事故で死亡した後、アサドはバッセルの後継者としての役割を引き継ぐためにシリアへ呼び戻されました。"
    SYR_2000_revolution.t:0 "ハフェズ・アル＝アサドの死？"
    SYR_2000_revolution.d:0 "2000年6月10日、69歳になったハフェズ・アル＝アサドは、レバノンの首相アル＝フスと電話で話している最中に心臓麻痺で死去しました。ハフェズ・アル＝アサドの死後、バアス体制派の支持により、権力は息子のバシャールへと継承され、シリアは王朝体制を確立した最初のarab共和国となりました。"
    SYR_2024_revolution.t:0 "バアス政権の崩壊？"
    SYR_2024_revolution.d:0 "2024年12月8日、大統領バシャール・アル＝アサド率いるバアス・シリアは、対立勢力による大規模な攻勢の最中に崩壊しました。この攻勢はタハリール・アッシャームが先導し、2011年に始まったシリア内戦の一環として、主にトルコが支援するシリア国民軍によって行われました。ダマスカスの陥落は、1971年の是正革命後にハフェズ・アル＝アサドが権力を掌握して以来、世襲の全体主義体制としてシリアを統治してきたアサド一族の支配の終焉を告げるものでした。"
    
    LEB_1952_revolution.t:0 "カミール・シャムーンの台頭？"
    LEB_1952_revolution.d:0 "1952年にベシャラ・エル・フルィ大統領が汚職疑惑により辞任を余儀なくされた際、後任としてシャムーンが選出されました。シャムーンの大統領在任中、レバノンは経済的な好況を経験し、特に建設、銀行、観光部門が発展しました。彼は1954年に株式会社の設立に関する法律を、1956年に銀行秘密保持に関する法律を施行しました。"
    LEB_1989_revolution.t:0 "タイフ協定？"
    LEB_1989_revolution.d:0 "タイフ協定は、フランス統治時代にレバノンで特権的な地位を与えられていたマロン派キリスト教コミュニティから一部の権限を移譲することで、レバノンのナショナル・パクト政治体制を再編しました。タイフ協定後、伝統的な議院内閣制と同様に、首相は立法府に対して責任を負うことになりました。これにより、協定はキリスト教徒に有利であった権力分担の方式を50対50の比率に変更し、キリスト教徒の大統領に対するスンニ派首相の権限を強化しました。"
    
    SUD_1958_revolution.t:0 "スーダンでのクーデター？"
    SUD_1958_revolution.d:0 "正式な独立後、議会政府は政治的不安定、汚職、宗派間の派閥争い、そして連邦制を求める南部からの要求の軽視に悩まされました。アル＝アズハリのNUPと、アンサルの宗教団体に支持されたウンマ党との間の極端な対立は、経済発展を停滞させました。議会の行き詰まりは1958年11月17日に突如として終わりを迎えました。陸軍参謀総長のイブラヒム・アブド将軍が無血クーデターを実行し、この国で最初の軍事独裁政権を樹立したのです。アブド率いる武装勢力最高評議会は、議会を解散し、憲法を停止して、すべての政党を禁止しました。"
    SUD_1964_revolution.t:0 "アブド将軍の失脚？"
    SUD_1964_revolution.d:0 "1964年までに、南部で深刻化する内戦と経済的不満の高まりにより、軍事政権の信頼性は著しく損なわれました。10月には、「10月革命」として知られる大規模な抗議活動とゼネストが発生し、アブド将軍は辞任に追い込まれました。シル・ハティム・アル＝ハリーファ首相の下で、暫定的な世話役政府が形成されました。特筆すべきは、この内閣がスーダン史上初めて、スーダン共産党、ムスリム同胞団、および労働組合の代表者を含む内閣であったことです。"
    SUD_1969_revolution.t:0 "スーダンのクーデター？"
    SUD_1969_revolution.d:0 "1969年のスーダンにおけるクーデターは、イスマイル・アル＝アズハリ大統領の政府に対する、ガーファール・ニメイリ大佐率いる成功したクーデターでした。このクーデターはスーダンの第2次民主主義時代の終焉を告げ、ニメイリによる16年間の統治の始まりとなりました。ニメイリ政府は急進的なアラブ民族主義と左翼的なプログラムを追求し、私有財産の広範な国有化を含む、社会および経済発展のための社会主義プログラムを導入しました。"
    SUD_1985_revolution.t:0 "スーダンのクーデター？"
    SUD_1985_revolution.d:0 "1985年のスーダンにおけるクーデターは、1985年4月6日にスーダンで発生した軍事クーデターです。このクーデターは、防衛大臣兼武装勢力総司令官であるアブデル・ラフマン・スワル・アル＝ダハブ元帥率いる士官グループによって、ガーファール・ニメイリ大統領の政府に対して行われました。"
    SUD_2019_revolution.t:0 "スーダンのクーデター？"
    SUD_2019_revolution.d:0 "2019年4月11日の午後遅く、スーダンでクーデターが発生しました。民衆の抗議活動によって退陣を求められたオマール・アル＝バシール大統領が、スーダン武装軍によって打倒されたのです。当時、アフマド・アワド・イブン・アウフ率いる軍は、政府とナショナル立法府を倒し、国内に3か月間の非常事態を宣言しました。その後、合意に達するまでの2年間にわたる移行期間が続きました。"
    SUD_2021_revolution.t:0 "スーダンのクーデター？"
    SUD_2021_revolution.d:0 "2021年10月25日、アブデルファタハ・アルブルハーン将軍率いるスーダン軍は、軍事クーデターによってスーダン政府を掌握しました。当初、少なくとも5人の政府高官が拘束されました。文民首相のアブダッラ・ハムドクはクーデターへの支持表明を拒否し、10月25日に民衆の抵抗を呼びかけましたが、10月26日には自宅軟禁の状態に置かれました。"
    
    EQG_1968_revolution.t:0 "マシアス・ングエマの管区？"
    EQG_1968_revolution.d:0 "フランシスコ・マシアス・ングエマは、1968年に赤道ギニアが独立を果たしてから1979年に打倒されるまで、同国の初代大統領を務めた赤道ギニアの政治家です。彼は歴史上最も残虐な独裁者の一人として広く記憶されています。大統領として、彼は奇妙で不安定な行動を繰り返し、当時の多くの人々が彼を狂人だと信じるほどでした。"
    EQG_1973_revolution.t:0 "赤道ギニアの新憲法？"
    EQG_1973_revolution.d:0 "マシアス・ングエマは、1970年7月に反対政党を禁止し、1972年に終身大統領に就任することで、その全体主義的な権力をさらに強化しました。これは、テオドロ・オビアンによる1979年8月のクーデター（赤道ギニア最高軍事評議会を樹立した、いわゆる「自由のクーデター」）によって覆されるまで施行されていました。ただし、新しい憲法が承認されたのは1982年8月のことでした。"
    EQG_1979_revolution.t:0 "テオドロ・オビアンのクーデター？"
    EQG_1979_revolution.d:0 "1979年の赤道ギニアのクーデターは1979年8月3日に発生しました。フランシスコ・マシアス・ングエマ大統領の甥であるテオドロ・オビアン・ングエマ・ムバソゴが、血なまぐさいクーデターによって彼を打倒したのです。体制派と反乱軍の間の戦闘は、マシアス・ングエマがカメルーンへ逃亡中に8月18日に捕らえられるまで続きました。彼はブビ人に対するジェノサイドの罪およびその他の犯した罪により、死刑を宣告されました。マシアス・ングエマは1979年9月29日に銃殺刑に処されました。テオドロはそれ以降、当初は革命軍事評議会および最高軍事評議会の議長として、その後は大統領としてリーダーであり続けています。"
    
    CMR_1960_revolution.t:0 "アフドゥ・アヒジョの管区？"
    CMR_1960_revolution.d:0 "アフドゥ・ババトゥーラ・アヒジョ（1924年8月24日 – 1989年11月30日）は、1960年から1982年までカメルーンの初代大統領を務めたカメルーンの政治家です。彼はそれ以前、1960年1月の独立から、管区の創設後である同年5月まで、同国の初代首相を務めていました。アヒジョは1960年のカメルーンの独立国家としての確立、およびフランス語圏と英語圏の統合において大国としての役割を果たしました。アヒジョの在任期間中、彼は中央集権的な政治体制を確立しました。"
    CMR_1966_revolution.t:0 "カメルーンの一党独裁国家？"
    CMR_1966_revolution.d:0 "1961年、アヒジョは一党独裁国家を求める呼びかけを開始しました。1962年3月12日、アヒジョは自身の政権に対する批判を禁じる布告を発令し、政府に対する転覆活動や法律に違反した者を投獄する権力を政府に与えました。1962年7月、アヒジョと共に政府に仕えていた反対政党の党首グループが、一党独裁国家を求めるアヒジョの呼びかけは独裁的であるとして異を唱えました。これらのリーダーたちは政府に対する転覆の罪で逮捕、裁判、および投獄されました。アヒジョの政党であるカメルーン国民連合（CNU）は、1966年9月1日に唯一の合法的な政党となりました。"
    CMR_1972_revolution.t:0 "カメルーンの憲法国民投票？"
    CMR_1972_revolution.d:0 "1972年5月20日、カメルーンで憲法改正を問う国民投票が実施されました。新しい憲法は、以前の連邦制とは対照的に国を単一国家と定め、大統領アマドゥ・アヒジョにさらなる権限を与えるものでした。この投票は、投票率98％、賛成率99.99％という結果で可決されたとされています。"
    CMR_1982_revolution.t:0 "アマドゥ・アヒジョの辞任？"
    CMR_1982_revolution.d:0 "アヒジョは、表向きは健康上の理由から1982年11月4日に辞任し、その2日後に首相ポール・ビヤが大統領を継承しました。彼自身のような北部のムスリムではなく、南部のキリスト教徒であるビヤに道を譲ったことは驚きをもって受け止められました。アヒジョの真意は不明ですが、健康状態が回復した後に再び大統領職に復帰するつもりだった可能性もあれば、ビヤを事実上の暫定的な役割に留め、ビヤの後継となった北部のムスリムであるマイガリ・ベロ・ブーバを最終的な大統領後継者にするつもりだった可能性もあります。"
    
    NGE_1966_revolution.t:0 "ナイジェリアのクーデター？"
    NGE_1966_revolution.d:0 "ナイジェリアにおける軍事独裁政権とは、ナイジェリア軍のメンバーが1966年から1999年まで（1979年から1983年の中断期間を除く）権力を握っていた時期を指します。軍は、クーデターを通じてエリート層の暗黙の支持を得て、しばしば権力を掌握することができました。"
    NGE_1999_revolution.t:0 "民主主義への回帰？"
    NGE_1999_revolution.d:0 "数週間にわたり国を事実上機能停止させた大規模な市民抗議活動により、大統領はついに、文民政府へ権力を譲るという約束を果たしました。政治活動の禁止は解除され、政治犯は拘置施設から釈放されました。その後、新しい大統領を選出するための選挙が招集されました。"
    
    NIG_1960_revolution.t:0 "ハマニ・ディオリの大統領任期？"
    NIG_1960_revolution.d:0 "ハマニ・ディオリはニジェール共和国の初代大統領でした。彼はニジェールがフランスから独立した1960年にその職に任命されました。彼の政権下では汚職が常態化していましたが、アフリカ情勢の代弁者として、また紛争における人気のある仲裁者としての役割を通じて、国際的な尊敬を集めました。"
    NIG_1974_revolution.t:0 "ニジェールのクーデター？"
    NIG_1974_revolution.d:0 "1974年4月15日、セイニ・クンテ中佐は、ディオリによる14年間の統治に終止符を打つ軍事クーデターを主導しました。軍事クーデターは4月15日の午前1時に始まり、一握りのユニットを除くすべてのユニットが、速やかにクーデター指導者への支持を表明しました。ハマニ・ディオリ大統領の親衛隊であり、全員がトゥアレグ族で構成される共和国警備隊は、ディオリの妻アイサ・ディオリの命令の下、唯一抵抗したユニットでした。彼女と少数の警備隊員は、4月15日の夜明け後、大統領官邸で殺害されました。この作戦により、ディオリ、国民議会議長であるブブ・ハマ、そしてニアメの他の数名のPPN政治家が逮捕されました。"
    NIG_1987_revolution.t:0 "セイニ・クンテの死？"
    NIG_1987_revolution.d:0 "クンテの健康状態は1986年後半に悪化し、1987年を通じて悪化し続けました。彼は1987年11月10日、パリの病院で脳腫瘍のため死去しました。アリ・サイブが彼の後を継ぎ、1987年11月14日に最高軍事評議会（CMS）の大統領に任命されました。"
    NIG_1993_revolution.t:0 "ニジェールにおける民主主義の回帰？"
    NIG_1993_revolution.d:0 "1990年初頭、学生による動乱とトゥアレグ族によるチンタバラデンへの攻撃を受け、1991年の国民会議へとつながりました。この会議は最終的に一党独裁体制を解体させ、サイブをほとんど無力な存在にしました。1991年3月に行われたMNSD党大会において、サイブは特に軍の支持を得て党首の地位を維持することができました。しかし、同年後半に国民会議はサイブが計画されていた大統領選挙に出馬することを禁じ、1991年11月の別のMNSD党大会において、彼は党首の座をママドゥ・タンジャに譲ることとなりました。1993年3月にマハマン・ウスマンが大統領に選出された後、サイブは4月16日に大統領職をマハマンに引き継ぎました。これは現職の大統領が野党に平和的に権力を譲った初めての事例であり、彼は故郷の村へと退きました。"
    NIG_1996_revolution.t:0 "ニジェールのクーデター？"
    NIG_1996_revolution.d:0 "1996年のニジェールのクーデターは、1996年1月27日にニジェールのニアメで発生した軍事クーデターでした。これは、約3年間にわたり権力を握っていたニジェール初の民主的に選出された大統領マハマネ・ウスマンを追放し、イブラヒム・バレ・マイナサラ将軍を元首として据えました。このクーデターにより、ハマ・アマドゥ首相が逮捕され、戦闘の中で数人の兵士や大統領警護隊が死亡しました。"
    NIG_1999_revolution.t:0 "ニジェールのクーデター？"
    NIG_1999_revolution.d:0 "1999年のニジェールのクーデターは1999年4月9日に発生し、イブラヒム・バレ・マイナサラ大統領の死亡と、4月11日のダウダ・マラム・ワンケの大統領就任をもたらしました。マイナサラは、国外逃亡を試みていた可能性があるディオリ・ハマニ国際空港での待ち伏せ、あるいは大統領警護隊のメンバーによるものと思われる軍事基地での待ち伏せにおいて、不明確な状況下で射殺されました。"
    NIG_2010_revolution.t:0 "ニジェールのクーデター？"
    NIG_2010_revolution.d:0 "2010年2月18日にニジェールでクーデターが発生しました。正午、兵士たちが武器を手にニアメの大統領府を攻撃し、当時政府会議を主宰していたママドゥ・タンジャ大統領を拘束しました。同日の後半、反乱軍はテレビを通じて、サルー・ジボ中隊長が率いる民主主義回復のための最高評議会（CSRD）の形成を発表しました。"
    NIG_2023_revolution.t:0 "ニジェールのクーデター？"
    NIG_2023_revolution.d:0 "2023年7月26日、ニジェールでクーデターが発生し、同国の大統領警護隊がモハメド・バズム大統領を解任・拘束しました。その後、大統領警護隊の司令官であったアブドゥラマネ・チアニ将軍が、クーデターの成功を確認した後、自らを国のリーダーと宣言し、祖国守護のための国民評議会を設立しました。"
    
    IVC_1960_revolution.t:0 "コートジボワールの新たな強権指導者？"
    IVC_1960_revolution.d:0 "コートジボワールは1960年に独立を果たしました。フェリックス・ウフェ＝ボワニが指導し、彼は1993年までこの国を統治しました。地域の基準から見て比較的安定していたコートジボワールは、西アフリカの隣国と密接な政治・経済的結びつきを築く一方で、西側諸国、特にフランスとも緊密な関係を維持しました。しかし、1999年のクーデターと2度の内戦（第一次は2002年から2007年、第二次は2010年から2011年）によって、その安定性は損なわれました。"
    IVC_2000_revolution.t:0 "民主主義への回帰？"
    IVC_2000_revolution.d:0 "数週間にわたって国を事実上停止させた大規模な市民抗議活動により、大統領はついに、文民政府へ権力を譲るという約束を果たしました。政治活動の禁止は解除され、政治犯は拘置施設から釈放されました。その後、新しい大統領を選出するための選挙が実施されました。"
    
    MAL_1960_revolution.t:0 "マリのクーデター？"
    MAL_1960_revolution.d:0 "セネガルの離脱後、マリ共和国が成立しました。長期間の一党独裁を経て、1991年のクーデターにより新憲法が制定され、マリは民主的な多党制国家として確立されました。2012年1月、マリ北部で武力紛争が発生し、トゥアレグの反乱軍が北部の領土を掌握しました。そして4月、彼らは新しい国家アザワドの分離を宣言しました。この紛争は、2012年3月の軍事クーデター、およびその後のトゥアレグと他の反乱派閥との戦闘によって複雑化しました。"
    MAL_1991_revolution.t:0 "民主主義への回帰？"
    MAL_1991_revolution.d:0 "長期間の一党独裁を経て、1991年のクーデターにより新憲法が制定され、マリは民主的な多党制国家として確立されました。2012年1月、マリ北部で武力紛争が発生しました。この紛争は、2012年3月の軍事クーデター、およびその後のトゥアレグと他の反乱派閥との戦闘によって複雑化しました。クーデターの後には「満場一致」の国際的な非難、マリの隣国による厳しい制裁、そしてトゥアレグ軍によるマリ北部の急速な喪失が続きました。4月6日、軍事政権は制裁の終了と引き換えに退陣することに同意し、議長ディオンクンダ・トラオレが率いる移行政府に権力を譲渡しました。"
    
    CHA_1960_revolution.t:0 "チャドのクーデター？"
    CHA_1960_revolution.d:0 "1960年、チャドはフランソワ・トムバルバイの指導の下で独立を果たしました。イスラム教徒が多数を占める北部における彼の政策への反感は、1965年に長期化する内戦の勃発へとつながりました。1979年に反乱軍が首都を征服し、南部による覇権は終焉を迎えました。その後、反乱軍の司令官たちはヒッセン・ハブレがライバルを破るまで、互いに争いました。チャド・リビア紛争は1978年にリビアの侵略によって勃発しましたが、フランスの軍事介入（エペルヴィエ作戦）により1987年に終結しました。その後、1990年にはヒッセン・ハブレが将軍のイドリス・デビーによって転覆させられました。"
    CHA_1991_revolution.t:0 "チャドのクーデター？"
    CHA_1991_revolution.d:0 "デビーは1990年12月にハブレに対するクーデターを主導して権力を掌握しました。前任者による数十年にわたる一党制の後、1992年に多党制を導入したものの、彼の大統領在任期間を通じて、彼の愛国救済活動は支配的な政党であり続けました。デビーは1996年と2001年の大統領選挙で勝利し、任期の制限が撤廃された後は、2006年、2011年、2016年、そして2021年にも再び勝利しました。"
    
    RWA_1973_revolution.t:0 "ルワンダのクーデター？"
    RWA_1973_revolution.d:0 "フツ族出身のハビャリマナは、ルワンダの初代大統領グレゴワール・カイヤバンダの下で、国防大臣を含むいくつかの治安維持の要職を務めました。1973年のクーデターでカイヤバンダを転覆させた後、彼は国の新しい大統領となり、最終的には前任者の親フツ政策を継続しました。彼の統治下、ルワンダは全体主義的な一党制国家となり、彼のMRND政党の強制執行官たちは、政治的な「アニメーション」と称される大規模な催しにおいて、大統領を称賛するために人々が唱和し踊ることを要求しました。"
    RWA_1994_revolution.t:0 "フツ政権の崩壊？"
    RWA_1994_revolution.d:0 "1990年、ツチ族主導のルワンダ愛国戦線（RPF）が、彼の政府に対してルワンダ内戦を開始しました。3年間にわたる戦争の後、ハビャリマナは1993年に平和合意としてRPFとアルーシャ合意に署名しました。翌年、ブルンジの大統領シプリアン・ンタヤミラも搭乗していた彼の飛行機が、キガリ近郊でミサイルによって撃墜され、彼は不可解な状況の中で死亡しました。彼の暗殺は、この地域の民族間の緊張度を引き起こし、ツチ族に対するジェノサイドを誘発する一因となりました。ツチ族のRPFは攻勢を再開し、計画的に国の支配を進め、7月中旬までには国全体を掌握しました。"
    RWA_2000_revolution.t:0 "ポール・カガメの台頭？"
    RWA_2000_revolution.d:0 "ビジムングはRPFとの不和を受け、おそらく強制的に辞任させられた形で2000年に退任しました。彼の後任にはカガメが就任しました。ビジムングは後に汚職と民族暴力の扇動で投獄されましたが、人権団体はこれらの容疑を政治的な動機によるものだと批判しています。カガメの統治は権威主義的であると考えられており、人権団体は彼が政治的弾圧を行っていると非難しています。"
    
    GAM_1994_revolution.t:0 "ヤヒヤ・ジャメによるクーデター？"
    GAM_1994_revolution.d:0 "1994年7月22日、ヤヒヤ・ジャメ率いる下級士官たちは、汚職と管理不足を理由にガンビアのドーダ・ジャワラ大統領の政府を転覆させました。この無血クーデターによりジャワラの約30年にわたる統治は終わり、憲法は停止され、軍事政権が樹立されました。"
    GAM_2017_revolution.t:0 "ヤヒヤ・ジャメの失脚？"
    GAM_2017_revolution.d:0 "2016年12月、ヤヒヤ・ジャメはガンビアの大統領選挙でアダマ・バラロウに敗れましたが、敗北を認めず、憲法危機を引き起こしました。西アフリカ諸国経済共同体（ECOWAS）が軍事介入したことで、ジャメは2017年に赤道ギニアへ国外追放される形で逃亡しました。バラロウが大統領に就任したことで、ジャメの22年にわたる権威主義的な統治は終わり、新たな民主的な時代が到来しました。"
    
    SEN_1960_revolution.t:0 "レオポール・セダール・センゴールの台頭？"
    SEN_1960_revolution.d:0 "レオポール・セダール・センゴールは、1906年10月9日にセネガルのジョアルで生まれました。パリで教育を受けた彼は、アフリカの文化的アイデンティティを提唱するネグリチュード運動の創設者の一人であり、主要な詩人として台頭しました。第二次世界大戦後に帰国した彼は、政治の世界に入り、実利的なフランスとの関係を保ちながらアフリカ社会主義を築き上げ、セネガルを自治へと導きました。1960年9月6日、彼は独立したセネガルの初代大統領となり、20年間にわたる安定と永続的な文化的ルネサンスを通じて、この若い国家を導きました。彼の詩的なビジョンと卓越した政治的手腕の融合は、ポストコロニアルのアフリカを再編した先駆的な思想家としての遺産を確固たるものにしました。"
    SEN_1962_revolution.t:0 "ママドゥ・ディアによるクーデター未遂か？"
    SEN_1962_revolution.d:0 "1962年12月、深いイデオロギーの対立の中で、セネガルの首相ママドゥ・ディアがレオポール・セダール・センゴール大統領に対するクーデターを画策した疑いで告発されました。熱烈な社会主義者であったディアは、経済政策と議会の掌握をめぐってセンゴールと衝突していました。ディアが不信任決議案を阻止しようとした際、センゴールはそれを権力掌握の試みであると解釈しました。ディアは逮捕されて反逆罪で裁判にかけられ、終身刑を言い渡されましたが、多くの歴史家はこの出来事を真のクーデターではなく政治的な行動力と見ています。彼の失脚はセネガルの政治における大統領権力の優位への転換を意味し、二元的な執行部による同国の短い試みに終止符を打ちました。"
    SEN_1975_revolution.t:0 "セネガルの部分的な自由化か？"
    SEN_1975_revolution.d:0 "レオポール・セダール・センゴール大統領の下で、セネガルは事実上の一党制国家から、制御された多党制へと移行しました。この「受動的革命」は、国家による厳格な監視を維持しつつ、それぞれが異なるイデオロギー的立場を代表する最大3つの政党を合法化することで、限定的な反対勢力の存在を認めました。この動きは、センゴールの権力を不安定化させることなく統治を近代化するために設計されたものでした。1975年のセネガルの自由化は、政治的な開放性と体制の継続性との間の戦略的なバランスを反映したものでした。"
    SEN_1980_revolution.t:0 "セネガルにおける多党制民主主義の復活か？"
    SEN_1980_revolution.d:0 "センゴルの退任とアブドゥ・ディウフによる平和的な政権継承は、民主的な規範が深まったことを示しました。1975年の部分的な自由化に基づき、ディウフは政治的自由を拡大させ、以前に課されていた厳格なイデオロギーの枠組みを超えて、より多くの政党が活動することを可能にしました。この移行は、西アフリカにおけるセネガルの政治的安定性と文民統治の評判を強化しました。1980年の転換は、競争力のある選挙と活気ある政治情勢の基礎を築き、ポストコロニアル時代における漸進的で平和的な民主化のモデルとしてセネガルを際立たせました。"
    
    SIL_1964_revolution.t:0 "アルバート・マルガイの首相就任？"
    SIL_1964_revolution.d:0 "アルバート・マルガイは、兄のミルトン・マルガイの後を継ぎ、1964年から1967年までシエラレオネの首相を務めました。彼の政権は権力の掌握と国家の団結の促進に重点を置いていましたが、その政策、特に軍の政治化の試みや一党制への移行は論争を巻き起こしました。民族的な優遇措置と高まる権威主義は国民の信頼を損ない、政治的不安定を招きました。"
    SIL_1968_revolution.t:0 "シアカ・スティーブンスの首相就任？"
    SIL_1968_revolution.d:0 "シアカ・スティーブンスは1968年から1971年までシエラレオネの首相を務め、自身の長期にわたる管区の基礎を築きました。彼の首相就任は政治的不安定と軍事統治の期間の後に続き、彼は全人民会議の下で権力を掌握するために迅速に動き出しました。スティーブンスは経済ナショナリズムと中央集権的な統治を強調しましたが、彼の任期には権威主義の増大と異論の抑圧も見られました。1971年、彼はシエラレオネを共和国へと移行させ、初の経営責任者たる大統領となりました。この時期における彼のリーダーシップ・スタイルと政治的な行動力は、ポピュリズム的なレトリックと国家機関に対する厳格な支配を融合させ、数十年にわたって国の軌跡を形作りました。"
    SIL_1985_revolution.t:0 "ジョセフ・サイドゥ・モモの首相就任？"
    SIL_1985_revolution.d:0 "ジョセフ・サイドゥ・モモは、シアカ・スティーブンスの後継として1985年にシエラレオネの首相に就任し、後に大統領に昇格しました。元将軍であったモモは、改革と国家の再生を誓いましたが、深刻化する経済危機と蔓延する汚職の中で、それを実現することに苦心しました。彼の政権は、高まる民衆の不満、インフラの悪化、そして生活水準の低下に直面しました。与党の全人民会議が強力な支配を維持していたため、政治的自由化の試みは主に象徴的なものに留まりました。"
    SIL_1992_revolution.t:0 "バレンタイン・ストラッサーのクーデター？"
    SIL_1992_revolution.d:0 "バレンタイン・ストラッサーは、軍事クーデターを経て25歳で世界最年少の大統領となり、1992年から1996年まで元首としてシエラレオネを率いました。彼の統治は改革と反汚職の約束とともに始まりましたが、すぐに権威主義的な支配と激化する内戦によって定義されるものとなりました。国家暫定統治評議会の議長として、ストラッサーは経済の安定化と反乱軍の管理に苦心しました。当初は民衆の支持を得ていたものの、内部の不一致と進展の欠如により、彼の指導力は衰退していきました。"
    SIL_1996_revolution.t:0 "民主主義の帰還？"
    SIL_1996_revolution.d:0 "1996年、シエラレオネは長年の軍事統治と市民の動乱を経て民主主義へと復帰しました。2月と3月に行われた歴史的な選挙は、1977年以来となる国初の多党制による投票となりました。革命統一戦線（RUF）との紛争が続いていたにもかかわらず、市民は民主的なプロセスを受け入れ、シエラレオネ人民党（SLPP）のアフマド・テジャン・カバを大統領に選出しました。彼の勝利は、文民統治と憲法秩序への希望ある転換を告げるものでした。また、この選挙によって議会制も再確立され、国家暫定統治評議会による4年間の軍事支配が終了し、脆弱な和平プロセスのなかで民主的な機関が復活しました。"
    
    GHA_1960_revolution.t:0 "クワメ・エンクルマの統治？"
    GHA_1960_revolution.d:0 "フランシス・クワメ・ンクルマは、ガーナの政治家、政治理論家、そして革命家でした。彼は、ゴールド・コーストがイギリスから独立した1957年までの1952年から、同地の首相を務めました。その後、1957年から1966年まで、ガーナの初代首相および大統領を務めました。彼の政権は主に社会主義的かつナショナリスト的でした。政権は国有の工業およびエネルギー・プロジェクトに資金を提供し、強い国家教育制度を構築してパン・アフリカ主義的な文化を促進しました。ンクルマの下で、ガーナは脱植民地化の時代におけるアフリカの国際関係において主導的な役割を果たしました。"
    GHA_1966_revolution.t:0 "ガーナのクーデター？"
    GHA_1966_revolution.d:0 "1966年2月、ンクルマが北ベトナムと中国へ公式訪問していた際、彼の政権は官僚組織の支持を得た国家軍および警察部隊による暴力的なクーデターで転覆させられました。ジョセフ・アーサー・アンクラ率いる陰謀家たちは自らを国家解放評議会と名乗り、3年間にわたり軍事政権として統治しました。ンクルマを転覆させたクーデターのリーダーたちは、直ちに国の国境と刑務所の門を開放し、ンクルマのすべての反対派が国外追放から帰還することや、予防拘禁から解放されることを可能にしました。その後、官僚による内閣が任命され、可能な限り速やかに民主的な政府を回復することが約束されました。"
    GHA_1979_revolution.t:0 "ガーナのクーデター？"
    GHA_1979_revolution.d:0 "6月4日の革命は、ガーナ軍の下層階級と士官との間の紛争によって1979年にガーナで発生した蜂起でした。その後、進行中の選挙が完了するまで国を運営するために、反乱を起こした下級将校によってローリングスが武装革命評議会（AFRC）の長に任命されました。ローリングスは1979年9月に権力をヒラ・リマン博士に譲りました。しかし、ローリングスは後に1981年12月31日にリマンの政府を転覆させました。"
    GHA_1992_revolution.t:0 "民主主義の回復？"
    GHA_1992_revolution.d:0 "1981年のクーデターで政権を握って以来、この国を率いてきたジェリー・ローリングスは、その年の初めに多党制選挙を実施することに渋々同意しました。ローリングスは自身のナショナル・デモクラティック・コングレスを含むプログレッシブ・アライアンスの候補者として立候補し、得票率58.4％を獲得して、決選投票なしでの勝利を決めました。投票率は50.2％でした。"
    
    GUI_1960_revolution.t:0 "アフメド・セク・トゥーレの統治？"
    GUI_1960_revolution.d:0 "アフメド・セク・トゥーレはギニアの政治リーダーであり、アフリカの政治家でした。彼は1958年から1984年に亡くなるまで、ギニアの初代大統領を務めました。トゥーレは、フランスから国の独立を勝ち取る際に尽力した、ギニアの主要なナショナリストの一人でした。1960年、トゥーレはPDGを唯一の合法政党と宣言しましたが、独立以来、この国は事実上の一党制国家でした。その後24年間にわたり、トゥーレは国におけるあらゆる統治権力を事実上掌握していました。"
    GUI_1984_revolution.t:0 "ギニアのクーデター？"
    GUI_1984_revolution.d:0 "1984年のギニアのクーデターは、1984年4月3日にギニアで発生した、ランサナ・コンテ大佐による無血の軍事クーデターでした。これにより、1972年からその職にあり、3月に長年の大統領であったアフメド・セク・トゥーレが米国のクリーブランド・クリニックでの緊急心臓手術中に死去して以来、暫定大統領を務めていたルイ・ランサナ・ベヴォギ首相が失脚しました。"
    GUI_1993_revolution.t:0 "民主主義の回復？"
    GUI_1993_revolution.d:0 "独立後に初めて実施された多党制の大統領選挙は、1993年12月19日に行われました。新しく形成された統一進歩党（PUP）の候補者であるコンテは、51.7％の得票率を獲得し、辛うじて決選投票を回避しました。ギニア人民集会（RPG）のアルファ・コンデは、19.6％の得票率で第2位となりました。"
    
    GAB_1961_revolution.t:0 "レオン・ムバの台頭？"
    GAB_1961_revolution.d:0 "1961年に選出されたガボンの初代大統領はレオン・ムンバであり、オマール・ボンゴ・オンディンバが副大統領を務めました。ムンバが権力を掌握すると、報道は抑圧され、政治デモは抑制され、表現の自由は制限されました。他の政党は徐々に権力から排除され、憲法はフランス流に変更されて、ムンバ自身が就任した大統領職に権限が集中するようになりました。1964年1月にムンバが一党独裁体制を確立するために国民議会を解散すると、軍のクーデターによって彼を失脚させ、議会制民主主義を回復しようとする動きがありました。しかし、24時間以内にフランスの空挺部隊が到着し、ムンバの権力復帰を支援しました。数日間にわたる戦闘の末にクーデターは終結しましたが、反対勢力は投獄され、抗議活動や暴動が相次ぎました。"
    GAB_1967_revolution.t:0 "オマール・ボンゴの台頭か？"
    GAB_1967_revolution.d:0 "オマール・ボンゴ・オンディンバは、1967年から2009年に死去するまでガボンの第2代大統領を務めたガボンの政治家です。ガボン民主党（PDG）のメンバーであったボンゴは、1960年代にガボンの初代大統領レオン・ムンバの下で若き官吏として要職に昇進し、1966年には自身の手で第2代副大統領に選出されました。1967年にムンバが死去した後、彼は国の指導者となりました。"
    GAB_1993_revolution.t:0 "ガボンの多党制民主主義か？"
    GAB_1993_revolution.d:0 "1990年5月22日、ストライキや暴動、混乱を経て、PDG中央委員会と国民議会は多党制への移行を促進するための憲法修正を承認しました。1994年まで有効な既存の大統領任期は尊重されることとなりました。その後の大統領選挙では複数の候補者が争うことになり、大統領の任期は5年に変更され、再選が一度認められるという任期制限が設けられました。1993年12月、ボンゴは新しい多党制憲法の下で行われた最初の presidential election に勝利しましたが、その得票率は約51.4%と、以前に比べてかなり僅差なものでした。"
    GAB_2009_revolution.t:0 "アリ・ボンゴの大統領政権か？"
    GAB_2009_revolution.d:0 "アリ・ボンゴ・オンディンバは、ガボンの元政治家であり独裁者です。彼は2009年から2023年のクーデターで失脚するまで、ガボンの第3代大統領を務めました。ガボン民主党のメンバーであるボンゴは、1967年から2009年の死去まで大統領を務めたオマール・ボンゴの息子です。"
    GAB_2023_revolution.t:0 "ガボンのクーデター？"
    GAB_2023_revolution.d:0 "2023年8月30日、8月26日に実施された総選挙で現職のアリ・ボンゴ大統領が勝利したとの発表直後、ガボンでクーデターが発生しました。クーデターのリーダーであるブリス・オリギ・ングエマはボンゴ一族の一員であり、従兄弟のアリ・ボンゴを打倒しました。このクーデターにより、オマールとアリのボンゴ親子による56年間にわたるガボンの統治は終焉を迎えました。一部では宮廷クーデターとも評されています。"
    
    BEN_1960_revolution.t:0 "ダホメの一党独裁国家？"
    BEN_1960_revolution.d:0 "1960年、ダホメはフランスから独立し、短期間、多党制民主主義を試みました。しかし、同年後半までにユベール・マガが権力を掌握して反対勢力を禁止し、ダホメを一党制国家と宣言しました。"
    BEN_1970_revolution.t:0 "ダホメの三頭政治？"
    BEN_1970_revolution.d:0 "1970年、ダホメの政治危機により、アフリカ初の合議制大統領制が誕生しました。ユベール・マガ、ジャスティン・アホマデグベ、スル・ミガン・アピティの3人が交代制の三頭政治を形成し、地域の対立を均衡させるためにそれぞれ2年ずつ統治しました。革新的な試みではありましたが、この体制は不安定なものでした。"
    BEN_1972_revolution.t:0 "ベナン人民共和国？"
    BEN_1972_revolution.d:0 "ベナン人民共和国は、アフリカ大陸のギニア湾に位置した共産主義国家であり、1990年に現在のベナンとなりました。この共和国は、ダホメ共和国における1972年のクーデターを経て、1975年11月30日に設立されました。"
    BEN_1990_revolution.t:0 "ベナンにおける多党制民主主義の再来？"
    BEN_1990_revolution.d:0 "社会的および政治的な社会不安、壊滅的な経済状況、そして東ヨーロッパにおける共産主義体制の崩壊により、ケレク大統領は自身の体制を退陣させることに同意しました。1989年2月、ベナンの11人の司教が署名した回勅は、人民共和国への非難を表明しました。1989年12月7日、ケレクは主導権を握り、マルクス・レーニン主義の放棄、政治局の解体、および政党の中央委員会の閉鎖を宣言する公式声明を発表することで人々を驚かせました。1990年には過渡期政府が設立され、多党制の復活への道が開かれました。1990年12月、新しい憲法が国民投票によって採択されました。ベナンの公式名称は維持され、国名はベナン共和国となりました。"
    
    CUB_1959_revolution.t:0 "キューバ革命？"
    CUB_1959_revolution.d:0 "キューバ革命は、フィデル・カストロが率いた武装蜂起であり、最終的にフルヘンシオ・バティスタの残虐な独裁政権を倒しました。革命は1953年7月26日のキューバ軍兵舎への攻撃の失敗から始まりましたが、1958年末までにカストロの「7月26日運動」のゲリラ革命家たちがキューバで優位に立ち、1959年1月1日にバティスタを島から逃亡させるに至りました。"
    CUB_2006_revolution.t:0 "ラウル・カストロの台頭？"
    CUB_2006_revolution.d:0 "兄の病気のため、カストロは2006年7月31日からの権力の委譲により、国家評議会の代行大統領となりました。カストロは、依然として療養中であった兄が2008年2月19日に再出馬しないことを表明した後、2008年2月24日に国民議会によって正式に大統領に任命されました。彼は2013年2月24日に大統領に再選されました。その後まもなく、カストロは自身の2期目が最後の任期となり、2018年には再選を目指さないことを発表しました。"
    CUB_2019_revolution.t:0 "キューバ憲法改正国民投票？"
    CUB_2019_revolution.d:0 "2月24日に実施された2019年のキューバ憲法改正国民投票では、有効投票の90.6%の賛成により新憲法が承認されました。この改革により、私有財産の承認、大統領の任期制限、市民権の拡大、そして政府の構造的な変更が導入されました。新憲法は2019年4月10日に施行されました。"
    
    HAI_1946_revolution.t:0 "クーデターか？"
    HAI_1946_revolution.d:0 "政府が破産寸前で低迷する経済に苦しむ中、レスコは負債の返済期限の延長を求めて米国に働きかけましたが、失敗に終わりました。レスコとドミニカ共和国のトルヒーヨとの関係は決裂しました。1946年までに、対立する報道機関を黙らせようとする彼の試みは激しい学生デモを引き起こし、ポルトープランスでは反乱が発生しました。レスコは軍事警備隊にデモを解散するよう命じようとしましたが、拒否されました。命の危険を感じたレスコと内閣は国外追放へと逃れました。最終的にデュマルセ・エスティメがレスコの跡を継いで共和国の首脳となり、米国の占領以来、ハイチ初の黒人大統領となりました。"
    HAI_1950_revolution.t:0 "クーデターか？"
    HAI_1950_revolution.d:0 "1946年8月、デュマルセ・エスティメはダンテス・ルイ・ベレガルドに対抗してハイチの大統領に選出されました。その後、マグロワールは反対勢力に回り、MOP（Mouvement Ouvrier Paysan）を結成しました。1950年5月、軍事評議会が組織したクーデターによってエスティメ政府は打倒され、そのリーダーであるポール・マグロワールが国の首脳に就任しました。彼は1950年10月に大統領に選出されました。エスティメはその後まもなく、フランク・ラヴォー率いるハイチ軍によって罷免され、国外追放されました。"
    HAI_1957_revolution.t:0 "フランソワ・デュヴァリエの台頭か？"
    HAI_1957_revolution.d:0 "フランソワ・デュヴァリエはハイチの政治家でありブードゥー教の信者でもあり、1957年から1971年に死去するまでハイチの大統領を務めました。1958年に軍事クーデターを阻止した後、彼の政権は急速に独裁的かつ専制的なものとなりました。政府の秘密殺害部隊であるトントン・マクートは、デュヴァリエの反対派を無差別に拷問し、あるいは殺害しました。デュヴァリエはさらに、ハイチの神話の要素を個人崇拝に組み込むことで、自らの支配を固めようとしました。"
    HAI_1971_revolution.t:0 "フランソワ・デュヴァリエの死"
    HAI_1971_revolution.d:0 "1971年4月、ジャン＝クロード・デュヴァリエは父フランソワ・デュヴァリエの死に伴い、19歳でハイチの大統領に就任しました。彼は世界最年少の大統領であるとともに、20歳未満の唯一の非王室の国家指導者となりました。"
    HAI_1986_revolution.t:0 "ジャン＝クロード・デュヴァリエの失脚"
    HAI_1986_revolution.d:0 "1985年に地方で反乱が始まりました。ゴナイブの街が最初に街頭デモや食料配給倉庫への襲撃に見舞われました。1985年10月から1986年1月にかけて、抗議活動はカパイティアンを含む他の6つの都市へと広がりました。デュヴァリエは1986年2月7日に国外へ逃亡しました。"
    HAI_1994_revolution.t:0 "民主主義の帰還"
    HAI_1994_revolution.d:0 "1994年9月、アメリカ合衆国は「民主主義維持作戦」の下、ハイチの軍事指導者の退去と2万人の米軍兵士の平和的な入国について交渉を行いました。これにより、民主的に選出されたジャン＝ベルトラン・アリスティドが大統領として復職することが可能となりました。彼は任期を全うするため、10月にハイチへ帰国しました。合意の一環として、アリスティドはハイチ経済を改善するために自由市場改革を実施しなければなりませんでしたが、その結果は賛否両論を呼びました。"
    HAI_2004_revolution.t:0 "クーデターか？"
    HAI_2004_revolution.d:0 "数週間にわたる紛争を経て、2004年2月29日にハイチで発生したクーデターにより、ジャン＝ベルトラン・アリスティド大統領は退陣に追い込まれました。2月5日、「ハイチ解放・再建のためのナショナル革命戦線」と呼ばれる反乱グループが、ハイチ第4の都市であるゴナイブを掌握しました。2月22日までに反乱軍はハイチ第2の都市であるカパイティアンを占領し、2月末までには首都ポートオプリンを包囲しました。2月29日の朝、アリスティドは物議を醸す状況の中で辞任し、米軍および治安維持要員によってハイチから空輸されました。"
    
    DOM_1961_revolution.t:0 "ラファエル・トルヒージョ暗殺か？"
    DOM_1961_revolution.d:0 "1961年5月30日、ラファエル・トルヒージョは将軍アントニオ・イムベルト・バラエラが率いる陰謀家グループによって暗殺されました。直後の混乱の中で、トルヒージョの息子ラムフィスが一時的に国を支配し、陰謀家のほとんどを処刑しました。1961年11月までに、体制を開放するための改革を導入した名目上の大統領ホアキン・バラゲールによって、トルヒージョ家は国外追放へと追い込まれました。この殺害事件は内乱の引き金となり、ドミニカ内戦とアメリカおよび米州機構（OAS）の介入を経て、最終的に1966年に多党制の下で安定しました。"
    DOM_1963_revolution.t:0 "フアン・ボッシュの選挙？"
    DOM_1963_revolution.d:0 "フアン・エミリオ・ボッシュ・イ・ガヴィニョはドミニカの政治家、歴史家、作家、エッセイスト、教育者であり、1963年にドミニカ共和国で短期間ながら初めて民主的に選出された大統領でした。それ以前の25年以上にわたり、彼はラファエル・トルヒージョの独裁体制に対するドミニカの国外追放中の反対勢力のリーダーを務めていました。"
    
    GND_1979_revolution.t:0 "グレナダ革命？"
    GND_1979_revolution.d:0 "1979年3月13日、マルクス・レーニン主義の新ジュエル運動が革命によってグレナダの政府を打倒した後、人民革命政府（PRG）が宣言されました。これにより、グレナダはコモンウェルス内で唯一の社会主義国家となりました。"
    GND_1984_revolution.t:0 "グレナダからの撤退？"
    GND_1984_revolution.d:0 "1983年12月にアメリカ軍がグレナダから撤退した際、総督のスクーンは新たな選挙を組織するため、ニコラス・ブラスウェイトが議長を務める暫定諮問評議会を任命しました。1976年以来の最初の民主的な選挙は1984年12月に実施され、ハーバート・ブレイズ率いる新国民党が勝利しました。彼は1989年12月の死去まで首相を務めました。"
    
    RHO_UDI_1965.t:0 "一方的な独立宣言？"
    RHO_UDI_1965.d:0 "人口の約5%に過ぎない白人少数派のメンバーで主に構成されていたローデシア政府は、英国植民地政府が脱植民地化のための「変革の風」政策を進める中で憤慨しました。1960年代初頭、自治の経験が同等のない北部の植民地が次々と独立へと前進する一方で、ローデシアは「多数派による統治前の独立は認めない」という新たな原則の下で主権を拒否されていたためです。ローデシアの単独独立宣言（UDI）は、1965年11月11日にローデシア内閣によって採択された声明であり、1923年から自治を行ってきたアフリカ南部の英国領である南ローデシア（あるいは単にローデシア）が、今や独立した主権国家であると宣言するものでした。"
    RHO_1979_revolution.t:0 "サルズベリー合意？"
    RHO_1979_revolution.d:0 "内部決着（サルズベリー合意とも呼ばれる）は、1978年3月3日に署名された合意でした。この合意により、アフリカ人が初めて指導的な地位に就く暫定政府が創設され、独立した官僚、法曹、警察組織、および軍が整備されました。また、この決着によってイアン・スミスと3人の黒人の個人（ムゾレワ、シソレ、チラウ）で構成される執行評議会と大臣評議会が創設されましたが、スミスは首相の地位を維持しました。"
    RHO_1980_revolution.t:0 "ローデシアにおける白人統治の終焉？"
    RHO_1980_revolution.d:0 "1979年12月11日、ローデシア代議院は英国植民地地位への復帰を90対0の投票で決議しました。1979年12月12日に新総督クリストファー・スームスが到着したことで、英国はジンバブエ・ローデシアを南ローデシア植民地として正式に支配しました。英国は12月12日に制裁を解除し、国連も12月16日に解除しました。1980年2月の選挙では、ムガベ率いるZANU党が圧勝しました。1980年4月、ハレでの式典において、英国の代表であるチャールズ皇太子は、新しい国であるジンバブエに正式に独立を授与しました。"
    ZIM_1987_revolution.t:0 "大統領制共和国？"
    ZIM_1987_revolution.d:0 "1987年末、ジンバブエの議会は憲法を改正しました。12月30日、同議会はムガベを、元首、政府首脳、および軍の総司令官の役割を兼ね備えた新しい役職である行政大統領に任命することを宣言しました。この役職により、彼は議会の解散、戒厳令の布告、および無制限の任期での出馬が可能となりました。"
    ZIM_1996_revolution.t:0 "グレイス・ムガベの台頭？"
    ZIM_1996_revolution.d:0 "グレイス・ントロンビゾドワ・ムガベは、ジンバブエの実業家であり政治家、そして故ロバート・ムガベ大統領の未亡人です。彼女は1996年から、2017年のジンバブエでのクーデターによって夫が失脚した1週間後の2017年11月に彼が辞任するまで、ジンバブエのファーストレディを務めました。ムガベの秘書としてキャリアをスタートさせた彼女は、与党ZANU–PFの党内での地位を上げ、同党の女性連盟のトップ、そして「ジェネレーション40」派閥の主要人物へと昇り詰めました。同時に、国内が経済的な社会不安に見舞われていた時期に、彼女は特権と贅沢を享受しているという評判を確立しました。"
    ZIM_2017_revolution.t:0 "ジンバブエのクーデター？"
    ZIM_2017_revolution.d:0 "2017年11月、ジンバブエの大統領ロバート・ムガベは、ZANU–PFの大統領および党首の地位を追われ、エマソン・ムナンガグワに取って代わられました。この蜂起は、93歳のムガベ大統領の跡継ぎを巡り、ジンバブエ国防軍（ZDF）の支持を受ける元第一副大統領のエマソン・ムナンガグワと、若手のG40派閥の支持を受けるファーストレディのグレイス・ムガベとの間で、与党ZANU–PF内に緊張が生じていた中で起こりました。"
    
    SAF_1970_revolution.t:0 "南アフリカのバントゥースタン？"
    SAF_1970_revolution.d:0 "プレトリア政府は、指定された民族グループのメンバーを集中させる目的で、南アフリカ国内に10のバントゥースタンを、隣接する南西アフリカ（当時は南アフリカの管理下）に10のバントゥースタンを設立しました。これにより、南アフリカの異なる黒人民族グループのための自律的な国民国家を創設する基盤として、各領域を民族的に均質化させました。1970年のバントゥー・ホームランド市民権法に基づき、政府は黒人南アフリカ人の南アフリカ市民権を剥奪して、彼らに残されていたわずかな政治的・市民的権利を奪い、彼らをこれらのホームランドの市民であると宣言しました。"
    SAF_1970_revolution.f:0 "ゲームエンジンの制限により、このModではバントゥースタンを個別の国として表現することはできません。"
    SAF_1984_revolution.t:0 "経営責任者大統領？"
    SAF_1984_revolution.d:0 "1983年憲法の最も物議を醸した規定の一つは、三院制議会の設立でした。これは、カラー人種とインド人グループが分離された状態で議会に代表されることを可能にする立法上の取り決めでした。また、当時の首相P・W・ボータの下で、首相職を廃止し、経営責任者州大統領職を設置することも含まれていました。"
    SAF_1989_revolution.t:0 "P・W・ボータの失脚？"
    SAF_1989_revolution.d:0 "1989年1月18日、ボータ（当時73歳）は軽度の脳卒中を患い、1989年1月20日に予定されていたナミビアの政治的リーダーたちとの会談に出席できなくなりました。ボータの代理には、J・クリスティアン・ヘニス代行大統領が務めました。1989年2月2日、ボータはナショナル党（NP）のリーダーを退任しました。自身の指名候補であった財務大臣のバレンド・ドゥ・プレリスが後継者になると予想していたためです。しかし、代わりにNPの議会会派は教育大臣のF・W・デクラークをリーダーに選出しました。デクラークは改革的な立場から党内での地位を急速に固めていきましたが、強硬派はボータを支持し続けました。"
    SAF_1994_revolution.t:0 "アパルトヘイトの終焉？"
    SAF_1994_revolution.d:0 "デクラークはマンデラと交渉し、アパルトヘイトを完全に解体して普通選挙への移行を確立しました。1993年、彼はアパルトヘイトがもたらした有害な影響について公に謝罪しました。彼は、マンデラがアフリカ民族会議(ANC)を勝利に導いた1994年の非人種的選挙を監督しました。"
    
    SAF_1954_revolution.t:0 "J. G. ストライダムの首相就任？"
    SAF_1954_revolution.d:0 "ヨハネス・ゲルハルドゥス・ストライダムは南アフリカの政治家であり、1954年11月30日から1958年8月24日の死去まで、南アフリカの第5代首相を務めました。彼は妥協を許さないアフリカーナー民族主義者であり、国民党(NP)最大の派閥であるbaasskap(白人至上主義)派のメンバーでした。彼の統治期間中、NPのアパルトヘイト政策はさらに強化され、南アフリカ連邦との決別と共和国への移行が推し進められました。"
    SAF_1958_revolution.t:0 "ヘンドリック・フェルヴォートの首相就任？"
    SAF_1958_revolution.d:0 "ヘンドリック・フレンシュ・フェルヴォートはオランダ生まれの南アフリカの政治家、応用心理学・哲学・社会学の学者、そして新聞編集者であり、1958年から南アフリカの首相を務めました。彼は一般的にアパルトヘイトの設計者とみなされ、「アパルトヘイトの父」という愛称で呼ばれています。フェルヴォートは、先住民事務大臣(1950–1958)およびその後の首相(1958–1966)として、国家の制度化された人種隔離と白人至上主義のシステムであるアパルトヘイトの社会的構築、およびその政策の実施において重要な役割を果たしました。"
    SAF_1966_revolution.t:0 "ヘンドリック・フェルヴォート暗殺？"
    SAF_1966_revolution.d:0 "1966年9月6日、フェルヴォートは議会助手ディミトリ・ツァフェンダスによって数回刺されました。彼はその直後に死亡し、ツァフェンダスは1999年に死去するまで投獄されました。1966年のフェルヴォート暗殺後、国民党は後継者としてヴォースターを選出し、フェルヴォートによるアパルトヘイト法の施行を継続しました。これには、カラード(混血)有権者の白人代議士のために予約されていた最後の4つの議席を1968年に廃止したこと(1970年に実現)が含まれます。"
    SAF_1978_revolution.t:0 "ピーテル・ウィレム・ボータの首相就任？"
    SAF_1978_revolution.d:0 "ピーター・ウィレム・ボータ（DMS）は、1978年から1984年まで南アフリカの最後の首相を務め、1984年から1989年の辞任まで南アフリカ初の執行権を持つ国家大統領を務めた南アフリカの政治家です。その強硬な政治的スタンスから「ディ・フロー・クロコディール」（アフリカーンス語で「大きなワニ」の意）というニックネームで呼ばれており、アパルトヘイト時代における南アフリカ最後の強硬派リーダーと見なされていました。"
    
    ARAB_2011_revolution.t:0 "アラブの春？"
    ARAB_2011_revolution.d:0 "アラブの春とは、2010年代初頭にアラブ世界の大部分に広がった、反政府デモや蜂起、武装反乱の一連の動きのことです。チュニジアにおける腐敗と経済停滞への対応として始まり、チュニジアからリビア、エジプト、イエメン、シリア、バーレーンの他の5か国へと広がりました。初期の革命と抗議活動の波は、多くのアラブの春のデモが当局や親政府民兵、反対デモ隊、軍隊による暴力的な対応を受けたことにより、2012年中盤までに収束しました。"
    
    TUR_1950_revolution.t:0 "ジェラール・バヤルの選出？"
    TUR_1950_revolution.d:0 "トルコ史上初の自由選挙において、民主党は1950年の総選挙で53％の民意を得て勝利しました。バヤル自身は大統領になることを望んでいませんでしたが、議会は1950年5月22日に彼をトルコ大統領に選出しました。バヤルの大統領任期中、西側陣営との関係は改善し、トルコ海峡危機後の1951年には朝鮮戦争に参戦、1952年2月にはNATOに加盟しました。10年間の民主党政権下で、トルコ社会は大きな変革を遂げました。国家の役割は縮小されなかったものの、民間企業を後押しするインフレ経済政策が取られました。政治参加が進み、アナトリアから多くの政治家や実業家が政界や財界に進出しました。世俗主義は放棄されなかったものの、一党独裁体制による露骨な世俗主義政策は廃止されました。"
    TUR_1960_revolution.t:0 "トルコのクーデター？"
    TUR_1960_revolution.d:0 "1960年のトルコのクーデターは、トルコ共和国で最初のクーデターでした。これは1960年5月27日に発生しました。このクーデターは、軍の指揮系統外で行動した38人の若きトルコ軍士官のグループによって実行されました。メンデレスおよび他のトルコ政府のメンバーが処刑されてから1か月後の1961年10月15日に総選挙が実施されました。行政権は民間人に返還されましたが、軍は1965年10月まで政治情勢を支配し続けました。"
    TUR_1966_revolution.t:0 "ジェヴデト・スナイの台頭？"
    TUR_1966_revolution.d:0 "ギュルセルの大統領職が憲法に基づき病気のため終了した際、1966年3月28日にトルコ大国民議会によってジェヴデト・スナイが第5代大統領に選出されました。彼はテロ活動の増加や学生暴動、クーデターの脅威にさらされながらも、その職務を維持しました。彼は1973年3月28日まで憲法で定められた7年の任期を務め、その後は終身元老院議員となりました。"
    TUR_1971_revolution.t:0 "トルコ軍のメモランダム？"
    TUR_1971_revolution.d:0 "その年の3月12日に出された1971年のトルコ軍メモランダムは、1960年の前例から11年後に発生した、トルコ共和国における2度目の軍事介入でした。これは「メモランダムによるクーデター」として知られており、軍は以前のように戦車を送る代わりにメモランダムを提出しました。この出来事は国内の紛争が悪化する中で起こりましたが、最終的にこの現象を止めることはほとんどできませんでした。"
    TUR_1980_revolution.t:0 "トルコのクーデター？"
    TUR_1980_revolution.d:0 "参謀本部長のケナン・エヴレン将軍率いる1980年のトルコのクーデターは、1960年のクーデターと1971年のメモランダムによるクーデターに続く、トルコ共和国の歴史における3度目のクーデターでした。その後3年間、トルコ軍は国家安全保障会議を通じて国を統治しましたが、1983年のトルコ総選挙によって民主主義が回復しました。この時期には、クルド語の禁止を含む、国家によるトルコ・ナショナリズムの強化が見られました。トルコは1983年に部分的に民主主義へ復帰し、1989年に完全に復帰しました。"
    TUR_1983_revolution.t:0 "民主主義への復帰？"
    TUR_1983_revolution.d:0 "1980年の軍事クーデターによって民主的な権利が放棄された後、1977年以来初となる総選挙が1983年11月6日にトルコで実施されました。ナショナル治安維持評議会は以前の政党の参加を禁止したため、新しい政党が設立されることとなりました。トルグト・オザルの母国党（ANAP）は、45.14％の投票を得て、この選挙で大きな勝利を収めました。"
    TUR_2014_revolution.t:0 "レジェップ・タイップ・エルドアンの台頭？"
    TUR_2014_revolution.d:0 "2014年、エルドアンは国初の直接選挙による大統領に選出されました。エルドアンの大統領任期は、民主主義の後退と、より権威主義的な政府スタイルへの移行によって特徴付けられています。彼の経済政策は高いインフレ率とトルコリラの価値下落を招きました。彼はシリアやリビアで続く紛争に介入し、イスラム国、シリア民主軍、およびアサド軍に対して作戦を開始したほか、ギリシャに対して脅迫を行っています。"
    TUR_2017_revolution.t:0 "トルコ憲法改正国民投票？"
    TUR_2017_revolution.d:0 "2017年4月16日、トルコにおいて、与党の公正発展党（AKP）と民族主義運動党（MHP）が提出したトルコ憲法の18の修正案を承認するかどうかの憲法国民投票が実施されました。承認の結果、首相の職は廃止され、既存の議院内閣制は執行大統領制と大統領制に置き換えられました。議会の議席数は550から600に増やされ、また一連の他の提案の中でも、大統領は最高裁判所および検察官評議会（HSYK）の人事に対してより大きな支配権を与えられました。"
    
    PER_1949_revolution.t:0 "憲法制定議会選挙？"
    PER_1949_revolution.d:0 "シャーは君主制の権力を強化するための様々な計画の一環として、憲法の改正を検討していました。シャーは、自身の権力を拡大するために憲法の修正を行う憲法制定会議の招集を求めました。彼は自身の支持者の中から憲法制定会議のメンバーを選出しました。また、彼はイラン元老院の編制に向けても圧力を強めました。元老院は、1906年に憲法に明記されていながら一度も編制されていなかった議会の上院です。元老院はシャーに有利に働くことが期待されていました。憲法制定会議は1949年4月21日から3週間にわたって開催されました。1949年5月8日、彼らは憲法の主要な修正案に署名しました。"
    PER_1952_revolution.t:0 "モハンマド・モサデクの台頭か？"
    PER_1952_revolution.d:0 "1952年7月、大規模な抗議活動の中でモハンマド・モサデクがイランの首相の座を奪還し、シャーは彼に緊急権限を付与することを余儀なくされました。これらの広範な権限により、モサデクは議会を回避して支配力を固め、石油の国有化への取り組みを強化することができました。これは、王権の影響力に対する文民統治の劇的な主張となりました。"
    PER_1953_revolution.t:0 "イランのクーデターか？"
    PER_1953_revolution.d:0 "イランでは「28モルダードのクーデター」として知られる1953年のイランのクーデターは、1953年8月19日、シャーであるモハンマド・レザ・パフラヴィーの君主制支配を強化するため、アメリカとイギリスが画策し、イラン軍が主導して、民主的に選出された首相モハンマド・モサデクを打倒した出来事でした。"
    PER_1979_revolution.t:0 "イラン革命か？"
    PER_1979_revolution.d:0 "イラン革命は、1979年にパフラヴィー王朝の打倒へと至った一連の出来事でした。また、この革命はイラン帝国を現在のイラン・イスラム共和国へと変貌させました。モハンマド・レザ・パフラヴィーの君主制政府は、反乱派の一角を率いていた宗教指導者、アヤトラ・ルホッラー・ホメイニーによる神政政府へと取って代わられたのです。"
    PER_1989_revolution.t:0 "アリ・ハメネイの台頭か？"
    PER_1989_revolution.d:0 "ハメネイは1981年から1989年までイランの第3代大統領を務め、初代最高指導者であるルホッラー・ホメイニの緊密な同盟者となりました。ホメイニは死の直前、自身が選んだ後継者であるフセイン・アリー・モンダゼリと意見の相違があったため、ホメイニの死後には合意された後継者が存在しませんでした。1989年6月4日、専門家会議は50歳のハメネイを次期最高指導者に選出しました。アクバル・ハシェミ・ラフサンジャニによれば、ハメネイはホメイニが死の前に後継者として選んでいた人物でした。"
    PER_1998_revolution.t:0 "クドス部隊を創設しますか？"
    PER_1998_revolution.d:0 "クドス部隊は、非正規戦と軍事情報作戦を専門とするイラン・イスラム革命防衛隊（IRGC）の5つの部門の一つです。国外での作戦を担当するクドス部隊は、ヒズボラ、ハマス、パレスチナ・イスラム聖戦、フーシ派の活動、そしてイラク、シリア、アフガニスタンにおけるシーア派民兵組織など、多くの国の非国家主体を支援しています。"
    PER_2008_revolution.t:0 "モジュタバ・ハメネイの台頭？"
    PER_2008_revolution.d:0 "モジュタバ・ホセイニ・ハメネイは、2026年3月にイランの第3代最高指導者に指名されたイランのシーア派聖職者です。ハメネイ家の一員であり、前最高指導者アリ・ハメネイの第二子で息子にあたります。1987年にイスラム革命防衛隊（IRGC）に入隊し、イラン・イラク戦争に従軍しました。1999年にコムで聖職者になるための学業を継続し、その後コム神学校の神学教師となりました。2009年には親衛隊であるバシジ民兵組織を掌握しました。"
    PER_2026_revolution.t:0 "アリ・ハメネイ暗殺"
    PER_2026_revolution.d:0 "2025年から2026年にかけて、イスラエルおよび米国との緊張度の上昇は、まず「12日間戦争」へと発展し、その後、全面的な紛争へと深刻化しました。その紛争の最中、最高指導者アリ・ハメネイが暗殺されました。3月8日、専門家会議は迅速に継続性を維持するため、彼の息子であるモジュタバを後継者として選出しました。"
    
    ARG_1955_revolution.t:0 "解放革命？"
    ARG_1955_revolution.d:0 "レボリューション・リベルタドーラは、1955年9月16日にアルゼンチンでフアン・ペロンの第2期大統領任期を終わらせたクーデターでした。レボリューション・リベルタドーラの後、ペロンとその支持者たちは反逆罪で告発され、エバ・ペロンの遺体は密かにイタリアへと移送され、偽のアイデンティティのもとでミラノの墓地に埋葬されました。歌や著作、写真など、ペロンまたはその亡き妻に関する公的な言及は禁止されました。"
    ARG_1966_revolution.t:0 "アルゼンチン革命？"
    ARG_1966_revolution.d:0 "アルゼンチン革命とは、1966年6月にアルゼンチン政府を転覆させた軍事クーデターに対して、そのリーダーたちが付けた名称です。これにより、その後1973年まで軍事評議会による軍事独裁政権が始まりました。1966年6月のクーデターによって、将軍フアン・カルロス・オンガニアが事実上の大統領として確立され、アウグスト・バンドール書記長を含む労働総同盟（CGT）の複数のリーダーたちに支持されました。オンガニアはコーポラティズム政策を実施し、特にカルロス・カバジェロの統治下にあるコルドバで実験を行いました。"
    ARG_1973_revolution.t:0 "民主主義への復帰？"
    ARG_1973_revolution.d:0 "数年間にわたる軍事統治の後、1971年に軍事評議会によってアレハンドロ・アグスティン・ラヌセが大統領に任命されました。民主主義への復帰を求める政治的圧力の高まりを受けて、ラヌセは1973年に選挙を招集しました。ペロンの立候補は禁止されましたが、ペロン主義政党の参加は認められました。政治、社会、経済の混乱の中で、カンポラとビセンテ・ソラーノ・リマ副大統領は1973年7月に辞任し、今度は正義党の候補者としてペロンを擁立した新たな選挙を求めました。ペロンは妻のイサベル・ペロンを副大統領に据えて選挙に勝利しました。"
    ARG_1976_revolution.t:0 "アルゼンチンのクーデター？"
    ARG_1976_revolution.d:0 "1976年3月24日にイサベル・ペロンをアルゼンチン大統領から解任した1976年のアルゼンチンのクーデターは、秩序や治安維持を重視するなど右翼的な要素を含んでいたものの、伝統的な右翼クーデターではなく、特定のイデオロギーにも固執していませんでした。このクーデターは、冷戦中にそれらの国々に対する支配を維持するためにラテンアメリカに独裁体制を一般化させた国家安全保障ドクトリンの一環として、アメリカ合衆国が推進したラテンアメリカ諸国間の抑圧的な調整を行う秘密システムであるコンドル計画の枠組みの中で計画・実行されました。"
    ARG_1983_revolution.t:0 "民主主義への復帰？"
    ARG_1983_revolution.d:0 "1983年のアルゼンチンの総選挙は10月30日に実施され、1976年に樹立された自称「国家再編プロセス」独裁政権に続く憲政への復帰を象徴するものとなりました。"
    ARG_2023_revolution.t:0 "ハビエル・ミレイの大統領就任？"
    ARG_2023_revolution.d:0 "ハビエル・ヘラルド・ミレイはアルゼンチンの政治家であり経済学者で、2023年にアルゼンチン大統領となりました。ミレイは、その派手な個性、独特のスタイル、そして強いメディア展開で知られています。政治的には、自由放任主義を支持する右派ポピュリストおよび右派リバタリアンと評されており、特に最小国家主義や無政府資本主義の原則に沿った立場を取っています。"
    
    GUY_1964_revolution.t:0 "フォーブス・バーナムの台頭？"
    GUY_1964_revolution.d:0 "弁護士として教育を受けたバーナムは、ガイアナの政治を支配することとなる2つの政党（人民ナショナル会議と人民進歩党）の創設において重要な役割を果たしました。政府の指導者であった期間、ガイアナはイギリスの植民地から、イギリスと憲法上の結びつきを持たない共和国へと移行しました。彼の首相時代は、外資系民間産業の国有化、非同盟運動への加盟、そして権威主義的な国内政策によって特徴づけられました。ガイアナの政治、社会、経済の発展において重要な役割を果たしたと広く見なされている一方で、彼の政権はアフリカ中心主義、国家による暴力、汚職、そして選挙不正の告発によって汚されていました。"
    GUY_1980_revolution.t:0 "ガイアナ協力共和国？"
    GUY_1980_revolution.d:0 "1980年に憲法が改正され、大統領職は執行権を持つ役職となりました。それまでの大統領職は、アーサー・チュンによって儀礼的な国家元首として務められていました。バーナムはその年、大統領選挙で勝利し、公式結果ではジャガンの得票率20％に対し76％を獲得しました。国際オブザーバーは、複数の投票所でインド系ガイアナ人の有権者が投票を妨げられたと抗議し、広範な選挙不正の告発がなされました。執行権を持つ大統領には、随時議会を解散する権限、立法への拒否権、そして政府のほぼすべての高級メンバーを任命または解任する権限が与えられました。"
    GUY_1985_revolution.t:0 "フォーブス・バーナムの死"
    GUY_1985_revolution.d:0 "バーナムは1985年8月6日、ジョージタウンでの喉の手術中に心不全で62歳の若さで死去しました。いくつかの情報源は、フォーブスが死に至る数年間に心臓の問題を抱えており、糖尿病であった可能性を示唆しています。バーナムの死後、デズモンド・ホイトが大統領に就任しました。1985年のガイアナ総選挙も不正が行われたと考えられています。次に「自由で公正な」選挙が行われたのは1992年であり、これは1964年以来初めての公正な選挙となり、チェディ・ジャガンが大統領に選出されました。"
    GUY_1992_revolution.t:0 "チェディ・ジャガンの勝利？"
    GUY_1992_revolution.d:0 "1985年のバーナムの死後、デズモンド・ホイトが権力を握りました。ジミー・カーターの影響を受けたホイトは、1992年の選挙が自由かつ公正であると国際的に認められることにつながる選挙改革を提示しました。28年間の対立を経て、PPPは1992年10月5日の選挙で約54%の得票率で勝利し、ジャガンが大統領となりました。以前から外国が懸念していたこととは異なり、彼はマルクス・レーニン主義者ではなく民主的社会主義者として統治しました。ジャガンは海外投資家を惹きつけ、自由市場政策へと向かう政策を追求しました。"
    
    SUR_1975_revolution.t:0 "ヘンク・アロンの首相政権？"
    SUR_1975_revolution.d:0 "ヘンク・アルフォンス・ユージェン・アロンは、1975年に独立を果たした後のスリナムにおける初代首相を務めたスリナムの政治家でした。スリナム国民党のメンバーとして、彼は暫定政府を務めた1973年12月24日から1980年2月25日まで在任しました。彼はデシ・ボウテセ率いる軍によるクーデターで打倒されました。"
    SUR_1980_revolution.t:0 "下士官クーデター？"
    SUR_1980_revolution.d:0 "通常「下士官クーデター」（オランダ語：De Sergeantencoup）と呼ばれる1980年のスリナムのクーデターは、1980年2月25日に発生したスリナムの軍事クーデターでした。デシ・ボテセ率いるスリナム軍（SKM）の16人の下士官グループが、暴力的なクーデターによってヘンク・アロン首相の政府を打倒しました。これは、1980年から1991年まで国を支配することになる軍事独裁体制の始まりとなりました。"
    SUR_1987_revolution.t:0 "スリナムの雪解け？"
    SUR_1987_revolution.d:0 "1985年後半、政府は反対政党への禁止令を解除し、文民統治への移行を開始しました。1987年9月30日の国民投票において、新しい憲法が圧倒的多数で承認されました。その2ヶ月後に選挙が実施され、ボウテセの反対派であるラムセワク・シャンカーが1988年1月に大統領として選出されました。しかし、ボウテセは軍の司令官として多くの権力を維持していました。彼はジャングル・コマンドとの交渉に向けた政府の数々の努力を妨害し、ボウテセの反対派の多くは殺害されるか失踪しました。"
    SUR_1991_revolution.t:0 "スリナムの民主化への移行？"
    SUR_1991_revolution.d:0 "1987年に国民選挙が実施されました。国民議会は、ブテゼが軍の指揮権を維持することを認める新憲法を採択しました。政府に不満を抱いたブテゼは、1990年に電話を通じて閣僚を即座に解任しました。この出来事は「電話クーデター」として広く知られるようになりました。彼の権力は1991年の選挙の後、衰え始めました。"
    
    BRZ_1954_revolution.t:0 "ジェトゥリオ・ヴァルガスの自殺？"
    BRZ_1954_revolution.d:0 "ヴァルガスの政治的敵対者たちが引き起こした危機は、空軍将校のルベンス・ヴァズ少佐の殺害という形で頂点に達しました。彼は、ヴァルガスの主要な敵対者であり、出版界の経営責任者かつ政治家でもあるカルロス・ラセルダの自宅であるトネレロ通り180番地の路上での暗殺未遂事件中に殺害されました。「ブラック・エンジェル」の異名を持つヴァルガスの親衛隊長、グレゴリオ・フォルトゥナート中尉がこの犯罪に関与していました。これにより軍部ではヴァルガスに対する怒りが沸き起こり、将軍たちは彼の辞任を要求しました。事態を収拾できなくなったヴァルガスは、1954年8月24日、公邸であるカテテ宮殿の3階の寝室にて、リボルバーで自身の胸を撃ちました。"
    BRZ_1964_revolution.t:0 "第五ブラジル共和国？"
    BRZ_1964_revolution.d:0 "ブラジルの軍事独裁政権は、時に第五ブラジル共和国とも呼ばれ、1964年4月1日、ジョアン・ゴウラート大統領に対するアメリカ政府の支持を得たブラジル軍によるクーデターによって樹立されました。このクーデターはブラジル陸軍の最高位の司令官たちによって計画・実行され、軍部のほぼすべての高位のメンバーに加え、カトリック教会や、ブラジルの中流・上流階級における反共主義的な市民活動といった社会の保守層の支持を受けました。"
    BRZ_1985_revolution.t:0 "民主主義の回復？"
    BRZ_1985_revolution.d:0 "左派ゲリラの敗北後も抑圧が続く中、長年にわたる独裁政権の疲弊が進行しました。当時の経済危機と民衆の圧力に対処できなかったため、開放政策は避けられないものとなり、政権側ではエルネスト・ゲイゼル将軍とゴルベルリ・ド・コウト・エ・シルヴァ将軍がそれを主導しました。1979年の恩赦法の制定により、ブラジルは民主化への緩やかな歩みを始め、それは1980年代に完了しました。"
    BRZ_1993_revolution.t:0 "ブラジルの憲法国民投票"
    BRZ_1993_revolution.d:0 "1993年4月21日、国の統治形態を決定するためにブラジルで憲法国民投票が実施されました。ブラジルの民主化後、新憲法の条項によって、国が共和国を維持すべきか再び君主制に移行すべきか、そして統治制度を大統領制にするか議院内閣制にするかを投票によって決定する国民投票の実施が定められました。"
    BRZ_2016_revolution.t:0 "ジルマ・ルセフの弾劾？"
    BRZ_2016_revolution.d:0 "2016年8月31日、元老院は61対20の投票により、ブラジルの予算法に違反したとしてルセフ大統領を罷免しました。しかし、彼女は政治的権利を剥奪されるほどの票を元老院から得られませんでした。これに伴い、テメルがブラジル第37代大統領として就任しました。"
    BRZ_2023_revolution.t:0 "ブラジル議会襲撃事件"
    BRZ_2023_revolution.d:0 "2023年1月8日、2022年のブラジル総選挙における当時のジャイル・ボルソナロ大統領の敗北と、後継者であるルイス・イナシオ・ルラ・ダ・シルヴァの就任を受け、ボルソナロ支持者の暴徒が首都ブラジリアのブラジル政府施設を襲撃しました。暴徒は三権広場にある連邦最高裁判所、国民議会、およびプラナルト大統領府に侵入して意図的なダメージを与え、1月1日に就任した民主的に選出されたルラ大統領を武力によって転覆させようとしました。"
    
    BRZ_1993_revolution.option.1:0 "大統領制共和国を創設する"
    BRZ_1993_revolution.option.2:0 "議院内閣制共和国を創設する"
    BRZ_1993_revolution.option.3:0 "立憲君主制を創設する"
    
    BOL_1952_revolution.t:0 "ボリビア国民革命？"
    BOL_1952_revolution.d:0 "ボリビア国民革命は、革命民族主義運動党（MNR）の主導によって1952年4月に始まりました。この蜂起は軍事政権を打倒し、ビクトル・パス・エステンソロを政権へと導きました。この革命は、普通選挙、錫鉱山の国有化、そして農地改革を含む、広範な改革を導入しました。"
    BOL_1964_revolution.t:0 "ボリビアのクーデター？"
    BOL_1964_revolution.d:0 "1964年11月4日、軍の支持を受けた副大統領のレネ・バリエントスが、ビクトル・パス・エステンソロ大統領を転覆させました。このクーデターはMNRによる革命政府の終焉を告げ、ボリビア政治における軍部の支配期を切り拓きました。"
    BOL_1969_revolution.t:0 "レネ・バリエントスの死？"
    BOL_1969_revolution.d:0 "1969年4月27日、バリエントスはボリビアのアルケ近郊におけるヘリコプター墜落事故で死亡しました。その後すぐに憲法に従い、あまり知られていないキリスト教民主党の政治家であるルイス・アドルフ・シレスが大統領に就任しました。オバンソは、人気の高いエスコバルが候補として立候補しており、誰も勝利を確信できない状況であったため、選挙を待たないことを決意し、1969年9月26日にクーデターを実行してシレスを転覆させました。"
    BOL_1970_revolution.t:0 "ボリビアのクーデターか？"
    BOL_1970_revolution.d:0 "1970年10月、保守派の将校らによるクーデター未遂の失敗後、将軍のフアン・ホセ・トーレスが政権を掌握しました。トーレスは労働者や農民の参加を推進する左派的な軍事政権を樹立しましたが、その統治は右派からの強い反対に直面しました。"
    BOL_1971_revolution.t:0 "ボリビアのクーデターか？"
    BOL_1971_revolution.d:0 "1971年8月21日、大佐のウゴ・バンセルがフアン・ホセ・トーレス将軍に対するクーデターを成功させました。バンセルは軍事独裁体制を確立し、それは左派運動の弾圧と保守勢力との連携を特徴とし、1978年まで続きました。"
    BOL_1978_revolution.t:0 "1978年、ウゴ・バンセルの失脚？"
    BOL_1978_revolution.d:0 "1978年までに、高まる政治的不安と経済的困難がウゴ・バンセルの政権を弱体化させました。抗議活動や選挙の混乱の中で、バンセルは退陣を余儀なくされ、7年間にわたる独裁政権は終わりを迎え、短命な政権が続く激動の時代が幕を開けました。"
    BOL_1985_revolution.t:0 "ビクトル・パス・エステンスォロの政権？"
    BOL_1985_revolution.d:0 "1985年7月14日にボリビアで総選挙が実施されました。大統領候補の誰も50％以上の得票を得られなかったため、8月4日に国民議会が大統領を選出する必要が生じました。国民民主行動党（ADN）のウゴ・バンセールが最多得票を獲得しましたが、議会は革命民族運動（MNR）のビクトル・パス・エステンスロロを選出しました。"
    
    CLM_1953_revolution.t:0 "コロンビアのクーデター？"
    CLM_1953_revolution.d:0 "ロハス・ピニージャは、1940年代後半から1950年代前半にかけてコロンビアで起きた内戦の時代である「ラ・ビオレンシア」において、執政中の保守党と自由党のゲリラによる内紛が続くなか、大佐として頭角を現し、保守党のマリアーノ・オスピナ・ペレス大統領の閣僚に任命されました。1953年、彼はオスピナの後継者である極右派のラウレアーノ・ゴメス・カストロに対してクーデターを成功させ、戒厳令を敷きました。政治的暴力の抑制を目指し、彼は労働組合員と同盟を結び、インフラ計画を実施し、女性参政権を拡大させることで、軍事独裁体制による国家統治を行いました。"
    CLM_1958_revolution.t:0 "民主主義の回復？"
    CLM_1958_revolution.d:0 "ロハスの失脚後、コロンビア保守党とコロンビア自由党は、国家を共同統治する連合体である「国民戦線」の結成に合意しました。この協定に基づき、大統領職は16年間にわたり4年ごとに保守党と自由党の間で交代することとなり、その他のすべての選出職においても両党は同等の権限を持つことになりました。国民戦線は「ラ・ビオレンシア」を終結させ、国民戦線の政権は「繁栄のための同盟」と協力して、広範な社会・経済改革を導入しようと試みました。"
    
    CHL_1973_revolution.t:0 "チリのクーデター？"
    CHL_1973_revolution.d:0 "1973年のチリのクーデターは、民主社会主義者のサルバドール・アジェンデが大統領を務めていたチリの統一人民政府に対する軍事的な転覆でした。ラテンアメリカの自由主義的民主主義国家において、民主的に選出された初のマルクス主義的大統領と称されるアジェンデは、激しい社会的不安や、対立勢力が掌握するチリの議会との政治的緊張度、そしてアメリカ合衆国の大統領リチャード・ニクソンによる経済戦争に直面していました。1973年9月11日、アウグスト・ピノチェト将軍率いる士官グループがクーデターによって権力を掌握し、文民統治は終焉を迎えました。"
    CHL_1990_revolution.t:0 "民主主義への回帰？"
    CHL_1990_revolution.d:0 "1980年代後半、主に1982年の経済崩壊や1983年から88年にかけての大規模な市民の抵抗といった出来事の結果として、政府は労働組合活動や政治活動を含む、集会、言論、結社の自由を段階的に拡大させました。1988年10月5日の国民投票により、ピノチェトは二期目の8年間の大統領任期を否定されました（反対56％、賛成44％）。チリの人々は1989年12月14日に新たな大統領と二院制議会のメンバーの過半数を選出しました。アイルウィン大統領は、移行期間とみなされた1990年から1994年まで務めました。"
    
    ECU_1972_revolution.t:0 "エクアドルのクーデター？"
    ECU_1972_revolution.d:0 "1972年、「革命的かつナショナリズム的」な軍事政権がベラスコ・イバラの政府を転覆させました。このクーデターはギジェルモ・ロドリゲス将軍によって率いられ、海軍司令官のホルヘ・ケイロロGによって実行されました。新大統領はホセ・マリア・ベラスコをアルゼンチンへ国外追放しました。彼は1976年に別の軍事政府によって解任されるまで権力を保持しました。"
    ECU_1979_revolution.t:0 "民主主義の回帰？"
    ECU_1979_revolution.d:0 "エクアドルでは1978年と1979年に総選挙が実施されました。大統領選挙の第1回投票は1978年7月16日に行われ、第2回投票は1979年4月29日に議会選挙と同時に行われました。大統領選挙では、決選投票で68.5％の得票を得た人民勢力集中（CPF）のハイメ・ロドス・アギレラが勝利し、同国初の自由選挙による大統領となりました。"
    
    PRG_1954_revolution.t:0 "パラグアイのクーデター？"
    PRG_1954_revolution.d:0 "1954年のパラグアイのクーデターは、1954年5月に発生しました。これはエピファニオ・メンデス・フレイタスの支持を得たアルフレド・ストロエスネルによって主導され、フェデリコ・チャベス政府の打倒をもたらしました。このクーデターは、与党コロラド党内における複雑な政治的ライバル関係の集大成でした。この政変中に約25人が死亡しましたが、これが同年後半のストロエスネルのパラグアイ大統領選出への舞台を整えることとなりました。"
    PRG_1989_revolution.t:0 "民主主義の回帰？"
    PRG_1989_revolution.d:0 "1989年のパラグアイのクーデターは、1989年2月2日から3日にかけてパラグアイのアスンシオンで発生し、長年のリーダーであったアルフレド・ストロエスネルの体制に対し、将軍アンドレス・ロドリゲスが主導しました。市街戦で多くの兵士が死亡したこの血生臭い政変は、政府の最高幹部における権力闘争によって引き起こされました。ロドリゲスの権力掌握は、当時ラテンアメリカで最長であったストロエスネルの34年間にわたる統治「エル・ストロナート」に終止符を打ち、多くの過酷な法律を廃止する一連の改革と、パラグアイの自由化をもたらしました。"
    
    VNZ_1948_revolution.t:0 "ベネズエラのクーデター？"
    VNZ_1948_revolution.d:0 "1948年のベネズエラのクーデターは1948年11月24日に発生しました。カルロス・デルガド・チャルボー、マルコス・ペレス・ヒメネス、ルイス・フェリペ・ロベラ・パエスが、1947年のベネズエラ総選挙（一般に同国初の公正な選挙であったと考えられています）で選出され、1948年2月に就任した大統領ロムロ・ガジェゴスを打倒しました。"
    VNZ_1950_revolution.t:0 "カルロス・デルガド・チャルボー暗殺？"
    VNZ_1950_revolution.d:0 "チャルボーは1950年11月13日、ラファエル・シモン・ウルビナとその甥のドミンゴ・ウルビナが率いるグループによって誘拐され、殺害されました。誘拐はカラカスのカントリークラブ地区とチャペリン地区の間で行われ、殺害は半ば放棄されたラス・メルセデス地区で行われました。彼の殺害は、チャルボー政権の打倒を目論んでいたシモン・ウルビナによる誘拐計画の失敗が、意図せず招いた結果であると思われます。"
    VNZ_1958_revolution.t:0 "ベネズエラの民主主義への回帰？"
    VNZ_1958_revolution.d:0 "1958年のベネズエラのクーデターは、独裁者マルコス・ペレス・ヒメネスが打倒された1958年1月23日に発生しました。ヴォルフガング・ララサバル提督、次いでエドガー・サナブリアによる移行政府が設置され、1958年12月の選挙でデモクラティック・アクションの候補者ロムロ・ベタンクールが選出され、1959年2月13日に就任しました。"
    VNZ_1999_revolution.t:0 "ボリバル革命？"
    VNZ_1999_revolution.d:0 "既存の政党への信頼が失墜したことで、1998年にウゴ・チャベスが大統領に選出されました。これに伴い、ベネズエラの新しい憲法を制定するための1999年の制憲議会を皮切りに「ボリバル革命」が始動しました。「ボリバル革命」は、ベネズエラにおいてボリバル主義（民衆民主主義、経済的自立、収入の公平な分配、政治腐敗の終焉）を実現するための大衆運動の構築を目指しました。"
    VNZ_2013_revolution.t:0 "ニコラス・マドゥロの大統領就任？"
    VNZ_2013_revolution.d:0 "バス運転手として社会人生活をスタートさせたマドゥロは、労働組合のリーダーへと昇り詰め、2000年には国民議会に選出されました。彼はウゴ・チャベス大統領の下で多くの要職を歴任し、2005年から2006年まで国民議会議長を、2006年から2012年まで外務大臣を、そして2012年から2013年までチャベスの下で副大統領を務めました。2013年3月5日にチャベスの死が発表された後、マドゥロが大統領に就任しました。"
    
    GUA_1954_revolution.t:0 "カルロス・カスティージョ・アルマスのクーデター？"
    GUA_1954_revolution.d:0 "1954年のグアテマラのクーデターは、民主的に選出されたグアテマラのハコボ・アーベンツ大統領を退陣させ、グアテマラ革命の終焉を告げるものとなりました。このクーデターによってカルロス・カスティージョ・アルマスの軍事独裁政権が樹立されましたが、これはグアテマラにおける一連の米国支援による権威主義的支配者の第一人目となりました。このクーデターは、主にPBSuccessというコードネームで呼ばれたCIAの秘密工作の結果によるものでした。"
    GUA_1957_revolution.t:0 "カルロス・カスティージョ・アルマスの暗殺？"
    GUA_1957_revolution.d:0 "カスティージョ・アルマスは1957年7月26日まで統治していましたが、その際、自身の護衛の一員であったロメオ・バスケスによって暗殺されました。その後に続いた不正選挙を経て、将軍ミゲル・イディゴラス・フエンテスが権力を掌握しました。彼は、メキシコの船によるグアテマラの太平洋岸での違法漁業をめぐる紛争を終わらせるため、南の国境にある橋の上でメキシコの大統領に紳士的な決闘を挑んだことで知られています。その際、メキシコの船のうち2隻がグアテマラ空軍によって撃沈されました。"
    GUA_1982_revolution.t:0 "エフライーン・リオス・モントのクーデター？"
    GUA_1982_revolution.d:0 "1982年、将軍ロメオ・ルーカス・ガルシアの統治に対する不満、グアテマラにおける治安の悪化、そして選挙不正の告発により、若手将校グループによるクーデターが発生し、リオス・モントが政府軍事評議会の指導者として就任しました。リオス・モントは軍事独裁者として17ヶ月足らず統治しましたが、その後、国防大臣であった将軍オスカル・メヒア・ビクトレスによって別のクーデターで打倒されました。"
    GUA_1986_revolution.t:0 "民主主義の帰還？"
    GUA_1986_revolution.d:0 "11月3日に行われた1985年の大統領選挙の第1回投票では、セレソが38.6％の得票率で1位となりました。12月8日の第2回投票では、彼はホルヘ・カルピオを68.4％の得票で破りました。DCGは議会の100議席のうち51議席を獲得し、全国の多くの自治体で過半数を占めました。彼は1966年以来、初めて民主的に選出された大統領であり、かつ文民でした。"
    
    HON_1957_revolution.t:0 "ラモン・ビジェダ・モラレスの選出？"
    HON_1957_revolution.d:0 "ラモン・ビジェダ・モラレスは、長期にわたる軍事統治の後にホンジュラスの民主化を支持した自由主義者でした。彼は20年以上で初めての自由選挙となった1954年の大統領選挙における自由党の候補者であり、分裂したナショナル党に対して最多得票を得たものの、過半数には届きませんでした。"
    HON_1963_revolution.t:0 "オズワルド・ロペスのクーデター？"
    HON_1963_revolution.d:0 "1963年のホンジュラスのクーデターは、予定されていた選挙の10日前にあたる1963年10月3日に行われた、ホンジュラス政府に対する軍事的な乗っ取りでした。オズワルド・ロペス・アレジャノがラモン・ビジェダ・モラレスに代わって大統領に就任し、20年にわたる軍事統治が始まりました。"
    HON_1975_revolution.t:0 "オズワルド・ロペスの打倒？"
    HON_1975_revolution.d:0 "1975年のホンドゥラスのクーデターは1975年4月22日に発生しました。同僚のフアン・アルベルト・メルガル・カストロ将軍が率いる軍事クーデターにより、オスワルド・ロペス・アレジャノが追放されました。このクーデターの一因は、1975年に米国証券取引委員会によって暴露された「バナナゲート」スキャンダルでした。このスキャンダルでは、ユナイテッド・ブランズ社が特定のバナナ輸出税の引き下げと引き換えに、ロペス大統領へUS$1.25 million, and the promise of another $125万ドルを賄賂として渡すことに合意していました。"
    HON_1982_revolution.t:0 "民主主義の回帰か？"
    HON_1982_revolution.d:0 "1979年、この国は文民統治へと戻りました。1980年4月には新しい憲法を制定するために制憲議会が民選され、1981年11月には総選挙が実施されました。1982年に憲法が承認されると、ロベルト・スアソ率いるPLH政府が選挙で勝利しました。同政府は、ホンドゥラスが直面していた不況に対処するため、野心的な経済・社会開発計画の遂行を公約に掲げていました。"
    
    PNM_1968_revolution.t:0 "オマール・トリホスのクーデターか？"
    PNM_1968_revolution.d:0 "オマール・エフライーン・トリホス・ヘレラは、パナマの独裁者であり、1968年から1981年に死去するまでパナマ国家警備隊の司令官およびパナマの軍事リーダーを務めました。トリホスがパナマの大統領に就任したことは公式にはありませんでしたが、「パナマ革命の最高指導者」などの肩書きを持っていました。トリホスはクーデターによって権力を掌握し、多くの社会改革を断行しました。"
    PNM_1981_revolution.t:0 "オマール・トリホスの死か？"
    PNM_1981_revolution.d:0 "トリホスは1981年7月31日、パナマ空軍のデ・ハビランド・カナダ DHC-6 ツイン・オッターがパナマのペノノメ近郊、コクレシトのセロ・マルタで墜落し、52歳で亡くなりました。航空機は軽微な天候の中でレーダーから消失しましたが、当時のパナマのレーダー網が限定的であったため、墜落報告がなされるまで丸一日近くを要しました。墜落現場は数日後に発見され、8月の初めに特殊部隊によってトリホスの遺体が回収されました。"
    PNM_1983_revolution.t:0 "マヌエル・ノリエガの台頭か？"
    PNM_1983_revolution.d:0 "マヌエル・アントニオ・ノリエガ・モレノは、1983年から1989年までパナマの実質的な支配者であったパナマの独裁者であり軍人でした。彼は公式にパナマの大統領を務めたことは一度もなく、代わりに傀儡の大統領を通じて非選出の軍事独裁者として統治しました。パナマ軍による麻薬密売を通じて私財を蓄えていたノリエガは、アメリカによるパナマ侵略によって権力から排除されるまで、アメリカの諜報機関と長年のつながりを持っていました。"
    PNM_1989_revolution.t:0 "パナマに民主主義は戻るのか？"
    PNM_1989_revolution.d:0 "アメリカ合衆国は1989年12月20日、「正義の理由作戦」というコードネームのもとパナマに侵攻しました。ノリエガは捕らえられ、裁判を受けるためにマイアミへと移送されました。この紛争は1990年1月31日に終結しました。パナマの選挙管理委員会は文民による憲法に基づく政府を回復するために迅速に動き、1989年12月27日に1989年5月の選挙結果を復元し、ギジェルモ・エンダラ大統領とギジェルモ・フォードおよびリカルド・アリアス・カルデロンの両副大統領の勝利を認めました。"
    
    MEX_2000_revolution.t:0 "PRIの支配は終わるのか？"
    MEX_2000_revolution.d:0 "大統領選挙は、43.4%の得票率を得た「変化のための同盟」のビセンテ・フォックスが勝利しました。これはメキシコ革命以来、野党が選挙で勝利した初めてのケースとなりました。議会選挙では、「変化のための同盟」が代議院において500議席中224議席を獲得して最大派閥となりましたが、制度革命党は元老院において128議席中60議席を維持し、依然として最大派閥のままでした。"
    
    PEU_1963_revolution.t:0 "フェルナンド・ベラウンデの選出か？"
    PEU_1963_revolution.d:0 "ベラウンデは1962年の総選挙に、自身の政党であるアシオン・ポプラールを率いて大統領候補として立候補しました。結果は非常に僅差で、彼はビクトル・ラウル・ハヤ・デ・ラ・トーレ（APRA）に1万4000票足らずの差をつけられ、2位に終わりました。どの候補者も、当選に必要な憲法上の規定である3分の1の得票率に届かなかったため、大統領の選出は議会に委ねられることとなりました。軍とAPRAとの間に長く続いていた敵対関係により、ハヤ・デ・ラ・トーレは3位だった元独裁者のオドリアと妥協しました。その結果、連立政権においてオドリアが大統領に就任することとなりました。しかし、広範な不正疑惑により、ペルー軍はプラドを廃位し、リカルド・ペレス・ゴドイ率いる軍事政権を樹立しました。ペレス・ゴドイは短期間の移行政府を運営し、1963年に新たな選挙を実施しました。その選挙では、ベラウンデが5パーセントという僅差ながらも、より安定した差で勝利しました。"
    PEU_1968_revolution.t:0 "ペルーのクーデター？"
    PEU_1968_revolution.d:0 "1968年のペルーのクーデターは、フェルナンド・ベラウンデの第1期大統領任期（1963年–1968年）中に発生しました。これは、政治的紛争が常態化し、ベラウンデ大統領と議会の間の深刻な対立が激化、さらにAPRAとUNO（国民オドリア主義連合）の連立政権が主導権を握り、大統領と自身の政党であるアシオン・ポプラールの間ですら衝突が頻発した結果でした。クーデター発生後の午前7時、ベラウンデは兵舎へ連行され、ペルーのカヤオにあるホルヘ・チャベス国際空港へと強制的に移送されました。権力を掌握したベラスコは、直ちにベラウンデの国外追放を命じました。"
    PEU_1975_revolution.t:0 "ペルーのクーデター？"
    PEU_1975_revolution.d:0 "インフレ、失業率の上昇、食糧不足、そして1974年の報道弾圧後の政治的な対立の激化といった経済的困難は、最終的にベラスコ政権への圧力を強め、その崩壊を招きました。1975年8月29日、多くの有力な軍司令官がクーデターを開始しました。その後、新しい軍事評議会の満場一致の決定により、フランシスコ・モラレス・ベルムデス首相が大統領に任命されました。"
    PEU_1980_revolution.t:0 "民主主義への回帰？"
    PEU_1980_revolution.d:0 "モラレス・ベルムデスの任期末、住宅危機が発生し「失われた10年」が始まりました。政治的にあらゆる方面から圧力を受けていたモラレス・ベルムデスは、政治および経済の改革を成功させることはできませんでした。1978年、モラレス・ベルムデス政権によって招集された制憲議会が設立され、オスカル・R・ベナビデス大統領時代に制定された1933年憲法に取って代わりました。1980年に選挙が行われた後、フェルナンド・ベラウンデ大統領率いる、12年間の軍事統治を経て初めて民主的に選出された政府へと権力が返還されました。"
    PEU_1990_revolution.t:0 "アルベルト・フジモリの大統領時代？"
    PEU_1990_revolution.d:0 "フジモリは1990年の大統領選挙において、「Cambio 90」の旗印を掲げたダークホースの候補者として、驚くべき逆転劇でバルガス・リョサを破り勝利しました。彼は、退任するアラン・ガルシア大統領とアメリカ人民革命同盟（APRA）に対する深い幻滅を利用しました。彼は憲法を改正し、モンテシノスとペルー軍の傀儡として大統領を務めました。また、彼は「プラン・ベルデ」を採用したと伝えられています。これは、貧困層や先住民のジェノサイド、国内メディアの支配または検閲、そして軍事評議会が管理する新自由主義経済の確立を含む計画でした。"
    PEU_2000_revolution.t:0 "アルベルト・フジモリの失脚？"
    PEU_2000_revolution.d:0 "ウアドミロ・モンテシノスが関与する汚職スキャンダルが発生しました。そして2000年9月14日の夜、ケーブルテレビ局Canal Nが、モンテシノスがフヒモリのペルー2000党への寝返りの見返りに野党議員のアルベルト・コリへ賄賂を渡していると思われる映像を放送したことで、事態は爆発的に拡大しました。フヒモリへの支持は事実上崩壊し、数日後、彼は全国放送を通じてSINを閉鎖し、自身は候補者とならない新しい選挙を実施すると発表しました。11月10日、フヒモリは2001年4月8日に選挙を実施することへの議会の承認を得ました。11月13日、フヒモリはアジア太平洋経済協力フォーラムに出席するため、ブルネイを訪問すべくペルーを離れました。11月17日、フヒモリはブルネイから東京へ移動し、そこからファックスで大統領の辞任を提出しました。議会は彼の辞任を受理することを拒否し、代わりに62対9の投票でフヒモリを解任することを決定しました。"
    PEU_2022_revolution.t:0 "ペルーによる自己クーデターの試みか？"
    PEU_2022_revolution.d:0 "2022年12月7日、当時ペルーの大統領であったペドロ・カスティリョは、解任手続きが迫る中で議会を不法に解散しようと試みました。この動きには、即時の外出禁止令の発令、緊急政府の樹立の試み、そして制憲議会の編制の呼びかけが含まれていました。"
    
    URU_1973_revolution.t:0 "ウルグアイの文民・軍事独裁政権か？"
    URU_1973_revolution.d:0 "ウルグアイ独裁政権としても知られるウルグアイの文民・軍事独裁政権（1973年–85年）は、1973年のクーデター後、1973年6月27日から1985年3月1日まで12年間にわたってウルグアイを支配した権威主義的な軍事独裁政権でした。この独裁政権は、人権侵害、拷問の使用、そして多くのウルグアイ人が説明のないまま失踪したこと due to due to そのために多くの論争の的となっています。"
    URU_1985_revolution.t:0 "民主主義への回帰か？"
    URU_1985_revolution.d:0 "1984年、体制への抗議および政治犯を支持するストライキが発生しました。1984年1月13日には、1973年以来初となる24時間の総ストライキが組織されました。ウィルソン・フェレイラ・アルダナテなど、依然として多くの政治的リーダーが注目される中、軍指導部と文民政治家の間の交渉が激化しました。1984年8月3日には海軍クラブ協定が署名され、1967年憲法が復興されました。これにより、軍が治安維持事項への助言を行い、上級士官の人事掌握を行うことが認められました。1984年11月25日に選挙が実施され、ラファエル・アディエゴ・ブルーノの短期間の大統領任期を経て、1985年3月1日、コロラド党の候補者であるフリオ・マリア・サングィネッティが新大統領に就任しました。"
    
    SPA_1947_revolution.t:0 "君主制の公布？"
    SPA_1947_revolution.d:0 "国家元首継承法は、スペインのフランコ体制の権力を組織する8つの基本法のうち、5番目の法律でした。この法律は、スペイン君主制の復興（1931年に第二共和政によって廃止された後）のための規定を確立し、フランシスコ・フランコをスペインの元首として終身任命しました。また、彼の後継者はフランコ自身によって国王または王国の摂政の称号を持って提案されるものとし、それにはスペインコルテスによる承認を要すると定められていました。"
    SPA_1973_revolution.t:0 "ルイス・カレロ・ブランコの台頭？"
    SPA_1973_revolution.d:0 "ルイス・カレロ・ブランコ提督将軍は、スペイン海軍の士官であり政治家でもありました。彼はまた、1947年の国家元首継承法の主な起草者でもありました。フランコは彼を政府首脳の役割における後継者として指名し、カレロはそれにより1973年6月に就任しました。"
    SPA_1975_revolution.t:0 "フランシスコ・フランコの死"
    SPA_1975_revolution.d:0 "1973年、フランコは高齢と病気により首相を辞任しました。彼は1967年以来、元首の職からは離れていました。それにもかかわらず、彼は元首および総司令官として権力を維持しました。フランコは1975年に82歳で死去し、ヴァジェ・デ・ロス・カイードスに埋葬されました。彼は晩年に君主制を復興させ、その後にスペインの民主化への移行を導いたスペイン国王フアン・カルロスが後を継ぎました。"
    SPA_1976_revolution.t:0 "スペインの民主化への移行？"
    SPA_1976_revolution.d:0 "スペインの民主化への移行とは、フランコ独裁政権から、フアン・カルロス1世の下での立憲君主制という形での議会制の確立へと至る体制変更を含む、スペイン近代史の一時期を指します。"
    
    POR_1968_revolution.t:0 "マルセロ・カエターノの台頭？"
    POR_1968_revolution.d:0 "1968年8月、サラザールは自宅での転倒後に脳卒中を患い、昏睡状態に陥りました。36年間にわたる在任期間を経て、79歳の彼はアメリコ・トマース大統領によって解任されました。トマースは1968年9月27日、サラザールの後任としてカエターノを任命しました。カエターノは経済成長の促進や、社会保障を支払う機会がなかった農村労働者への月額年金の支給といった社会改善に取り組んだのです。"
    POR_1974_revolution.t:0 "カーネーション革命？"
    POR_1974_revolution.d:0 "カーネーション革命とは、1974年4月25日にリスボンで左派の士官らによって行われた軍事クーデターであり、権威主義的なエスタード・ノヴォ政府を打倒しました。これは「進行中の革命プロセス」を通じて、ポルトガルとその海外植民地に重大な社会的、経済的、領土的、人口統計的、政治的な変化をもたらしました。その結果、ポルトガルの民主化への移行とポルトガル植民地戦争の終結が実現しました。"
    
    GRE_1967_revolution.t:0 "大佐たちの政権？"
    GRE_1967_revolution.d:0 "ギリシャの軍事政権、または大佐たちの政権とは、1967年から1974年までギリシャを支配した右派の軍事独裁政権です。1967年4月21日、大佐のグループが、ゲオルギオス・パパンドレウ率いる中央連合の勝利が確実視されていた予定されていた選挙の1カ月前に、暫定政府を打倒しました。"
    GRE_1973_revolution.t:0 "ギリシャ君主制の廃止？"
    GRE_1973_revolution.d:0 "1973年7月、ギリシャの軍事政権は国民投票を実施し、ギリシャ史上2度目となる君主制の廃止を決定しました。その後1974年、民主的に選出された首相コンスタンティノス・カラマンリスが国民投票を実施し、廃止が正当に確認されました。"
    GRE_1974_revolution.t:0 "軍事政権の崩壊か？"
    GRE_1974_revolution.d:0 "軍事政権の思想的および政治的な崩壊は、パパドプロスの自由化への試みの直後に起こった一連の出来事によって引き起こされました。思想的な崩壊が、最終的な政治的崩壊に先んじて発生しました。この不幸なプロセスの最中およびその後、軍事政権内部の政治的緊張が表面化して派閥同士を対立させ、それによって独裁体制の見かけ上の強固な結束力が破壊されました。"
    GRE_1974_revolution_1.t:0 "ギリシャ共和国国民投票"
    GRE_1974_revolution_1.d:0 "1967年から国を支配していた軍事政権の崩壊後、共和主義者と君主主義者の間の長年の論争が再燃しました。軍事政権は前年にも、同じ問題について正当性に疑義のある国民投票を実施しており、共和国支持の結果を得ていました。ゲオルギオス・パパドプロスはこれを、自身が大統領に選出されるための口実として利用しました。しかし、先月の軍事政権の崩壊と自由選挙を経て、新たに選出されたコンスタンティノス・カラマンリス首相の政府は、軍事政権時代の国民投票は選挙制度としても法的にも疑わしいと広く見なされていたため、投票のやり直しを決定しました。結果、投票率75.6％の中で、投票者の69.2％が共和国を承認しました。"
    
    CYP_1974_revolution.t:0 "キプロスのクーデターか？"
    CYP_1974_revolution.d:0 "1974年のキプロスにおけるクーデターは、キプロス国防軍によって実行され、ギリシャの軍事政権が後援した軍事クーデターでした。1974年7月15日、クーデターの企て者たちはキプロスの現職大統領である大司教マカリオス3世を退陣させ、親エノシス主義のナショナリストであるニコス・サンプソンを就任させました。"
    CYP_1974_revolution_1.t:0 "キプロスの民主主義の復活か？"
    CYP_1974_revolution_1.d:0 "サンプソンの管区は短命に終わりました。アテネにおけるヨアニディスの政権が、トルコの侵略からわずか数日後に崩壊したためです。当時、トルコがギリシャへの侵略を脅かしており、大佐たちは権力に留まることよりも、国を守ることに急遽集中せざるを得なかったことが指摘されました。トルコの介入を予測、あるいは阻止できなかった政権の失敗は、その正当性と権力を著しく弱めました。支持を失ったサンプソンは7月23日に辞任し、管区はグラフコス・クレリデスへと引き継がれました。マカリオスは5か月間ロンドンに留まりましたが、自身の政権が島全体を統治する正当な政府であるという国際的な承認を得ることに成功した後、キプロスに帰還し、キプロスの領土回復に注力しました。"
    
    BEL_1951_revolution.t:0 "レオポルド3世の退位？"
    BEL_1951_revolution.d:0 "1950年7月22日のレオポルド3世のベルギー帰還は、ベルギー史上最も激しいゼネストの一つに見舞われました。憲兵隊が自動兵器で発砲した際、3人の抗議者が死亡しました。国は内戦の危機に瀕し、リエージュやワロンの他の自治体では、ベルギーの旗に代わってワロンの旗が掲げられました。国が分裂するのを避け、君主制を守るため、レオポルドは1950年8月1日に権限と義務を20歳の息子ボードゥアンに委譲し、彼を摂政とすることを決定しました。政府の促しにより、レオポルドは1951年7月16日にボードゥアンのために退位しました。"
    BEL_1993_revolution.t:0 "ベルギー連邦？"
    BEL_1993_revolution.d:0 "1970年、ブリュッセルにおけるオランダ語圏とフランス語圏のコミュニティ間の対立が深まったことを受け、政府は「法律で定められた単一国家、その構造および機能は、時代遅れとなった」と宣言しました。新しい憲法は、ベルギー国内における強力な共同体および地域間の差異を認めましたが、権力を各共同体や地域に分散させることで、これらの差異を調停しようと努めました。1993年、議会はベルギーを完全な連邦国家へと変貌させる憲法パッケージを承認しました。"
    
    NET_1970_revolution.t:0 "柱状化の解消？"
    NET_1970_revolution.d:0 "第二次世界大戦後（オランダの抵抗運動でさえ柱状化されていました）、自由主義者や社会主義者、さらにはプロテスタントやカトリックも、柱状化された制度に疑問を抱き始めました。1960年代、柱状化は大部分が崩壊しました。これは特に、D66による政治的批判や、PvdA内のNieuw Links（ニュー・レフト）グループによる影響によるものでした。これに加え、移動性の向上により、多くの人々が他の柱状グループの人々も自分たちとそれほど変わらないことに気づくようになりました。財力の向上と教育の普及により、人々は多くの柱状化された機関から自立し、若者たちはもはやこれらの組織に属することを望まなくなりました。"
    
    LUX_1948_revolution.t:0 "ルクセンブルクの中立性の終焉？"
    LUX_1948_revolution.d:0 "ルクセンブルクは1948年に正式に中立性を放棄し、この変更を反映するために憲法が改正されました。これに続いて1948年にブリュッセル条約に、1949年にはNATOに加盟し、中立的なステータスは決定的に終焉を迎えました。"
    
    SWI_1971_revolution.t:0 "スイスの女性参政権住民投票？"
    SWI_1971_revolution.d:0 "1971年2月7日、スイスで女性参政権の導入に関する住民投票が実施されました。投票が許されたのは男性のみでしたが、結果は65.7％が導入に賛成というものでした。数年前にいくつかの州ですでに女性参政権が導入されていたこと、そしてスイス政府と複数の政党が女性参政権を積極的に支持していたことから、この結果は予想されていました。"
    
    FRA_1958_revolution_0.t:0 "5月の危機？"
    FRA_1958_revolution_0.d:0 "1958年5月にフランスで発生した危機は、アルジェリア独立戦争を巡る緊張によって引き起こされた重大な政治的激変でした。5月13日、アルジェの右派軍人や入植者たちは、ピエール・プリムランが首相に任命されることに対し、彼がアルジェリアの民族主義者と交渉するのではないかと恐れ、クーデターを起こしました。ジャック・マス将軍に率いられ、元総督のジャック・スステールに支持されたこの反乱は、シャルル・ド・ゴールの下での公共安全政府を要求しました。この危機は第四共和制の不安定さを露呈させ、最終的にはその崩壊とド・ゴールの政権復帰を招きました。そして彼は、より中央集権的で強固な第五共和制を確立したのです。"
    FRA_1958_revolution.t:0 "第五共和制？"
    FRA_1958_revolution.d:0 "第五共和制は第四共和制の崩壊に伴って誕生しました。以前の議会制共和国に代わり、元首である大統領と政府の長である首相の間で権力を分担する半大統領制（または二元的な執行部制）を導入しました。また1958年憲法はフランス連合をフランス共同体に置き換え、これにより（アルジェリアを除く）14の加盟領土が独立を主張することを可能にしました。"
    FRA_1961_revolution.t:0 "アルジェのプッシュ？"
    FRA_1961_revolution.d:0 "アルジェのプッシュは、フランス大統領シャルル・ド・ゴールがフランス領アルジェリア、在留ヨーロッパ人コミュニティ、および親仏アルジェリア人を放棄させないことを目的とした失敗に終わったクーデターでした。フランス軍の退役将軍モーリス・シャルル（元フランス領アルジェリア総司令官）、エドモン・ジュオー（元フランス空軍総監）、アンドレ・ゼラー（元フランス陸軍参謀総長）、ラウル・サラン（元フランス領アルジェリア総司令官）によってフランス領アルジェリアで組織されました。これはアルジェリア戦争（1954–1962）の最中である1961年4月21日から26日の午後に発生し、国を内戦の危機へと追い込みました。"
    
    GBR_1979_revolution.t:0 "不信任案？"
    GBR_1979_revolution.d:0 "1979年3月28日に、ジェームズ・カラハン率いる英国労働党政府に対する不信任案が提出されました。この案は対立勢力のリーダーであるマーガレット・サッチャーによって提出され、労働党政府はわずか1票差（311対310）で否決され、午後10時19分にその結果が発表されました。この結果は総選挙を義務付けることとなり、サッチャー率いる保守党が勝利しました。"
    
    RUS_1993_revolution.t:0 "ロシア憲法危機？"
    RUS_1993_revolution.d:0 "1993年の9月から10月にかけて、ボリス・エリツィン大統領とロシアの議会との対立により、ロシア連邦において憲法危機が発生しました。エリツィン大統領は自己クーデターを実行し、議会を解散して布告による大統領統治制度を導入しました。この危機は、エリツィンが軍事力を用いてモスクワのソビエト議事堂を攻撃し、国会議員を逮捕したことで終結しました。一連の出来事の結果、エリツィンは自らの地位を固め、行政権をさらに拡大し、1993年ロシア連邦憲法の採択を強行しました。"
    RUS_2000_revolution.t:0 "ウラジーミル・プーチンの台頭か？"
    RUS_2000_revolution.d:0 "1999年12月31日、エリツィン大統領は予期せず辞任し、そのポストを、新たに任命された首相であり、自身が選んだ後継者であるウラジーミル・プーチンに譲りました。その後、プーチンは2000年の大統領選挙で勝利し、第二次チェチェン戦争においてチェチェンの反乱を鎮圧しました。プーチンの統治は、ロシアを権威主義的な国家へと変貌させながらも、安定性を向上させました。"
    RUS_2023_revolution.t:0 "ワグネル・グループの反乱か？"
    RUS_2023_revolution.d:0 "2023年6月23日、ロシアの民間軍事会社であるワグネル・グループが、ロシア政府に対して大規模な蜂起を行いました。これは、約6ヶ月前から続いていたワグネル・グループと国防省との紛争が最高潮に達したことを示していました。ウクライナでワグネル・グループの活動を率いていたロシアのオリガルヒ、エフゲニー・プリゴジンは、その翌日に合意に達した後、活動を停止しました。"
    RUS_2020_revolution.t:0 "ロシアの憲法修正か？"
    RUS_2020_revolution.d:0 "2020年1月に提案された2020年の修正は、1993年のロシア憲法に対する2度目の実質的な修正です。これらの修正を導入するため、ロシア大統領のウラジーミル・プーチンは国民投票を実施しました。これらは7月1日に国民投票によって承認されました。"
    
    UKR_2004_revolution.t:0 "オレンジ革命か？"
    UKR_2004_revolution.d:0 "オレンジ革命は、2004年11月下旬から2005年1月にかけてウクライナで政治的激変をもたらした一連の抗議活動です。この革命は、大量の汚職や有権者への脅迫、選挙不正があったと主張された2004年ウクライナ大統領選挙の決選投票の結果を受けて、一般市民の主導により大きな勢いを得ました。全国的な抗議活動は、最初の決選投票の結果が無効となり、ウクライナの最高裁判所によって2004年12月26日に再投票が命じられたことで成功を収めました。国内外のオブザーバーによる厳しい監視の下、2度目の決選投票は「自由かつ公正」であると宣言されました。最終結果では、ヤヌコーヴィチの44％に対し、ユシチェンコが約52％の得票率を獲得し、明確な勝利を収めました。"
    UKR_2010_revolution.t:0 "ヴィクトル・ヤヌコーヴィチの選出？"
    UKR_2010_revolution.d:0 "2010年1月17日にウクライナで大統領選挙が実施されました。どの候補者も過半数の票を得られなかったため、2月7日にユリア・ティモシェンコ首相と反対勢力のリーダーであるヴィクトル・ヤヌコーヴィチの間で決選投票が行われました。2月14日、ヤヌコーヴィチは得票率50％で勝利し、次期大統領に選出されました。"
    UKR_2014_revolution.t:0 "マイダン革命？"
    UKR_2014_revolution.d:0 "マイダン革命としても知られる「尊厳の革命」は、ユーロマイダン抗議活動の終盤にあたる2014年2月にウクライナで発生しました。首都キーウにおける抗議者と国家勢力との間の凄惨な衝突は、選出されたヴィクトル・ヤヌコーヴィチ大統領の追放、2004年ウクライナ憲法への回帰、そして2014年のロシア・ウクライナ戦争の勃発という結果を招きました。"
    UKR_2019_revolution.t:0 "ヴォロディミル・ゼレンスキーの選出？"
    UKR_2019_revolution.d:0 "ゼレンスキーは、当時のペトロ・ポロシェンコ大統領による新年の挨拶と同時に、2018年12月31日の夜に2019年大統領選挙への出馬を表明しました。彼は第2回投票で73.23％の得票率を記録してポロシェンコを破り、当選を果たしました。彼は自らを反体制的かつ反汚職の象徴として位置づけています。"
    
    YUG_1974_revolution.t:0 "1974年憲法？"
    YUG_1974_revolution.d:0 "406の当初の条項を持つ1974年憲法は、世界で最も長い憲法の一つでした。この憲法には、自己管理システムを州の干渉から保護し、あらゆる選挙および政策の場における共和国や地方の代表権を拡大するための詳細な言語が追加されました。憲法は、再編された連邦議会を自己管理システムの最高の表現と呼びました。"
    YUG_1980_revolution.t:0 "ヨシップ・ブロズ・ティトーの死去"
    YUG_1980_revolution.d:0 "ティトーは1979年を通じて病状が悪化していきました。1980年1月7日と1月11日、ティトーは足の循環障害のため、スロベニア社会主義共和国の首都リュブリャナにある大学医療センターに入院しました。その後まもなく動脈閉塞のため左足を切断しましたが、88歳の誕生日の3日前となる1980年5月4日午後3時5分、リュブリャナ医療センターにて壊疽のため死去しました。"
    
    tito_death.option:0 "安らかに眠れ"
    
    SER_2000_revolution.t:0 "民主主義への回帰か？"
    SER_2000_revolution.d:0 "ミロシェヴィッチの統治は、オブザーバーによって権威主義的あるいは独裁的であり、また略奪的であると評されており、選挙不正、政治暗殺、メディアの自由の抑圧、警察の暴力に関する数多くの告発がなされています。スロボダン・ミロシェヴィッチの打倒は、2000年9月24日の総選挙後のユーゴスラビア連邦共和国で始まり、2000年10月5日のスロボダン・ミロシェヴィッチ政府の崩壊によって最高潮に達しました。"
    
    ALB_1997_revolution.t:0 "アルバニア君主制住民投票"
    ALB_1997_revolution.d:0 "1997年6月29日、アルバニアでは議会選挙と並行して君主制復興に関する住民投票が実施されました。この提案は投票者の66.7％によって否決されました。しかし、元皇太子レカは、65.7％が賛成に投票したと主張しました。"
    
    ROM_1965_revolution.t:0 "ニコラエ・チャウシェスクの台頭か？"
    ROM_1965_revolution.d:0 "チャウシェスクは、ゲオルゲ・ゲオルギウ＝デジの社会主義政府内でランクを上げて昇進し、1965年のゲオルギウ＝デジの死後、書記長としてルーマニア共産党の指導権を継承しました。権力を掌握すると、彼は報道検閲を緩和し、1968年8月21日の演説ではワルシャワ条約機構によるチェコスロバキア侵攻を公然と非難したため、人気度が急上昇しました。しかし、その後の安定期は短く、彼の政府はまもなく全体主義化し、当時の東側陣営において最も抑圧的なものとみなされるようになりました。"
    ROM_1967_revolution.t:0 "布告770を発令しますか？"
    ROM_1967_revolution.d:0 "布告770は、1967年に署名されたニコラエ・チャウシェスクによるルーマニア共産主義政府の布告でした。これは中絶と避妊を制限するもので、ルーマニアの人口を新しく大規模に創出することを目的としていました。"
    ROM_1974_revolution.t:0 "体系化を制定しますか？"
    ROM_1974_revolution.d:0 "体系化とは、チャウシェスク政権下で行われた都市計画プログラムのことを指します。1974年に始まった体系化は、主に既存の村、町、都市を、その全部または一部解体して再建することによって構成されており、「多角的に発展した社会主義社会」へとルーマニアを変貌させるという公的な目標を掲げていました。1980年代に入ると、チャウシェスクは前例のない規模の宮殿を建設すること、そしてそれに付随するセントル・チヴィクという同様に壮大な近隣地区を建設することに執着するようになりました。"
    
    EGR_1950_revolution.t:0 "ヴァルター・ウルブリヒトの台頭？"
    EGR_1950_revolution.d:0 "第二次世界大戦の終結後、ウルブリヒトはソ連占領地域におけるドイツ共産党をスターリン主義の路線に従って再編しました。彼は1946年にKPD（ドイツ共産党）とSPD（ドイツ社会民主党）がドイツ社会主義統一党（SED）へと強制的に合併される際、重要な役割を果たしました。彼は1950年にSEDの第一書記となり、新設されたばかりの東ドイツの実質的なリーダーとなりました。"
    EGR_1971_revolution.t:0 "エーリヒ・ホーネッカーの台頭？"
    EGR_1971_revolution.d:0 "1970年、ホーネッカーは権力闘争を開始しました。これはソ連のリーダーであるレオニード・ブレジネフの支持を得て、彼がヴァルター・ウルブリヒトに代わってSEDの書記長および国家防衛会議の議長に就任することへと繋がりました。"
    
    POL_1956_revolution.t:0 "ポーランドの十月？"
    POL_1956_revolution.d:0 "ポーランドの十月は、1956年10月に起こったポーランド人民共和国の政治的変化でした。ヴワディスワフ・ゴムウカが支配政党であるポーランド統一労働党（PZPR）の第一書記に任命されたことで、ポーランドにおけるスターリニズムは終焉を迎えました。ソ連はゴムウカ派との妥協を迫られ、短期間ではありましたが緊張感のある交渉が行われました。ソ連は、モスクワへの忠実性を維持することを条件に、ゴムウカの政権維持とポーランドへのより大きな自治権を認めました。"
    POL_1970_revolution.t:0 "12月の抗議行動？"
    POL_1970_revolution.d:0 "1970年のポーランドの抗議行動（1970年12月の出来事としても知られる）は、1970年12月14日から19日にかけてポーランド北部で発生しました。この抗議行動は、食料品やその他の日用品の価格の急騰によって引き起こされました。政党指導部はワルシャワで会合を開き、抜本的な措置を講じない限り、大規模な労働者階級の反乱は避けられないと判断しました。モスクワのレオニード・ブレジネフの同意を得て、ゴムウカやクリシュコなどのリーダーたちは辞任を余儀なくされました。もし物価高騰がゴムウカに対する陰謀であったなら、それは成功したことになります。モスクワがミェチスワフ・モチャルを受け入れなかったため、エドヴァルト・ギェレクが新しいリーダーとして指名されました。"
    POL_1981_revolution.t:0 "戒厳令？"
    POL_1981_revolution.d:0 "1981年2月11日、ヤルゼルスキが閣僚評議会議長（首相）に任命されました。10月18日、盗聴器によってソ連の指導部を批判している様子が記録されたことを受け、スタニスワフ・カニアはポーランド統一労働党中央委員会の第一書記の地位を追われました。ヤルゼルスキがその後継者に選出されました。1981年12月13日、前日の国家評議会による戒厳令導入の正式な承認を受け、ヤルゼルスキはテレビ放送の演説で戒厳令の導入を発表しました。"
    
    IRQ_1958_revolution.t:0 "7月14日の革命？"
    IRQ_1958_revolution.d:0 "1958年のイラク軍事クーデターとしても知られる7月14日革命は、1958年7月14日にイラクで発生したクーデターであり、国王ファイサル2世の退位と、ハシミテ家が統治するイラク王国の打倒をもたらしました。その後に成立したイラク共和国は、わずか6ヶ月前に設立されたばかりのイラクとヨルダンによるハシミテ・アラブ連邦を解消しました。"
    IRQ_1963_revolution.t:0 "ラマダン革命？"
    IRQ_1963_revolution.d:0 "ラマダン革命は、1963年にイラクの首相アブドゥルカリム・カーシムを打倒した、バアス党イラク支部の軍事クーデターでした。これは1963年2月8日から10日の間に行われました。バアス党員ではなかったカーシムの元副官アブドゥルサラーム・アリフは、主に儀礼的な大統領の地位に就き、一方で有力なバアス党の将軍アーメド・ハッサン・アル＝バクルが首相に指名されました。政府は約9ヶ月間続きましたが、1963年11月のイラクにおけるクーデターでアリフが国有防衛隊を武装解除し、その後にバアス党メンバーの粛清が行われたことで終焉を迎えました。"
    IRQ_1966_revolution.t:0 "アブドゥルサラーム・アリフの死？"
    IRQ_1966_revolution.d:0 "1966年4月13日、アリフはイラク南部、バスラ空港から約10キロメートルの地点でイラク空軍のデ・ハビランド DH.104 ドーブ1（RF392）が墜落した事故により死亡し、弟のアブドゥルラフマンが大統領の後任となりました。アブドゥルラフマン・アル＝バザーズが3日間代行大統領を務めましたが、大統領の地位を巡る権力闘争が発生しました。大統領を選出するための国防評議会と内閣の最初の会合において、アル＝バザーズが勝利するには3分の2の多数派が必要でした。しかしアル＝バザーズは失敗し、アブドゥルラフマン・アリフが大統領に選出されました。"
    IRQ_1968_revolution.t:0 "7月17日革命？"
    IRQ_1968_revolution.d:0 "1968年の7月17日革命は、アフメド・ハッサン・アル＝バクル、アブド・アッ＝ラザク・アン＝ナイフ、およびアブド・アッ＝ラフマン・アル＝ダウドが主導したイラクにおける無血クーデターでした。この革命によってアブドル・ラフマン・アリフ大統領とタヒル・ヤヒヤ首相が追放され、アラブ社会主義バアス党のイラク地域支部が政権を握りました。このクーデターに関与したバアス党員や、その後のナイフによる穏健派の粛清には、ハルダン・アル＝ティクリティ、サレハ・マフディ・アマシュ、そして後のイラク大統領となるサダム・フセインが含まれていました。"
    IRQ_1979_revolution.t:0 "バアス党政権下のイラク？"
    IRQ_1979_revolution.d:0 "1970年代半ばまでに、サダム・フセインは党の諜報機関のトップという地位を通じて、アル＝バクルの法的な大統領職とは別に、事実上の国のリーダーとなりました。サダムの新政策の下、イラクの経済と市民の生活水準はともに向上し、アラブ世界におけるイラクの地位は著しく高まりました。"
    IRQ_2003_revolution.t:0 "サダム・フセインの裁判？"
    IRQ_2003_revolution.d:0 "2003年、アメリカを中心とする連合軍がイラクに侵略しました。彼らはサダムが大量破壊兵器を開発しており、アルカイダとつながりがあると虚偽の告発を行いました。戦争における連合軍の迅速な勝利後、バアス党は禁止され、サダムは潜伏しました。2003年12月13日の捕縛後、イラク暫定政府の下で彼の裁判が行われました。2006年11月5日、サダムは1982年の140人以上のシーア派ムスリムに対するドジャイル虐殺に関連する人道に対する罪でイラク高等裁判所によって有罪判決を受け、絞首刑を言い渡されました。彼は2006年12月30日に処刑されました。"
    
    LBY_1963_revolution.t:0 "連邦王国は廃止されるのか？"
    LBY_1963_revolution.d:0 "1960年代初頭に石油資源の開発が進むにつれ、リビアは最初の五カ年計画（1963年～1968年）を開始しました。しかし、石油による新たな富がもたらした負の結果の一つは、主に放置によって農業生産が減少したことでした。リビア国内の政治は安定していましたが、連邦制の政府形態は非効率で煩雑であることが証明されていました。1963年4月、モハメド・オスマン・エセド首相は、国王の承認を得た法案を議会で採択させることに成功しました。この法案は連邦制を廃止し、強力な中央政府を持つ単一の君主制国家を新たに確立するものでした。"
    LBY_1969_revolution.t:0 "「アル・ファテハ革命？」"
    LBY_1969_revolution.d:0 "1969年のリビア革命は、アル・ファテハ革命または9月1日革命としても知られており、ムアンマル・カダフィ大佐率いる自由士官運動によって行われたクーデターおよび革命でした。これによりイドリス1世のセンヌーシ王朝が打倒され、リビア・アラブ共和国が形成されました。"
    
    NYE_1962_revolution.t:0 "「北イエメンのクーデター？」"
    NYE_1962_revolution.d:0 "この戦争は、アブドゥッラー・アッ＝サラル指揮下の軍が率いる革命共和派による、1962年のクーデターによって始まりました。彼は新たに即位した国王兼イマームのムハンマド・アル＝バドルを退位させ、イエメンを自身の管区の下で共和国であることを宣言しました。彼の政府はイエメンにおける奴隷制を廃止しました。"
    
    SYE_1969_revolution.t:0 "「修正行動？」"
    SYE_1969_revolution.d:0 "修正行動とは、1969年6月22日にアブデル・ファタ・イスマイルとサリム・ルバイが率いるマルクス主義派によって行われた、イエメン国民解放戦線の支配を指す、穏健派のカハタン・アル＝シャアビ大統領を打倒した血を流さない内部クーデターでした。この左翼派による支配は、後にイエメン社会党（YSP）の創設と、南イエメンの社会主義国家への変貌をもたらしました。"
    SYE_1990_revolution.t:0 "「共産主義体制の崩壊？」"
    SYE_1990_revolution.d:0 "PDRYの主要な支持国であったソ連におけるペレストロイカを背景に、1980年代後半に政治改革が始まりました。政治犯は釈放され、政党が形成され、司法制度は北イエメンよりも公平であると考えられていました。"
    
    SEY_1977_revolution.t:0 "「セーシェル社会主義国家？」"
    SEY_1977_revolution.d:0 "1977年から1991年にかけて、セーシェルはフランス＝アルベール・ルネとセーシェル人民進歩戦線によって一党独裁国家として統治されていました。"
    SEY_1991_revolution.t:0 "民主主義の回帰？"
    SEY_1991_revolution.d:0 "1992年に新憲法の最初の草案が提出されましたが、必要な60％の賛成を得ることはできませんでした。しかし、1993年には修正版が承認されました。"
    
    SOM_1969_revolution.t:0 "ソマリア民主共和国？"
    SOM_1969_revolution.d:0 "ソマリア民主共和国とは、1969年10月21日のクーデターで政権を掌握した後、大統領モハメド・シアード・バレ少将による社会主義軍事政府がソマリアに与えた名称です。このクーデターは、ボディーガードが国の第2代大統領アブディラシド・シェルマルケを暗殺した数日後に起こりました。バレ政権はその後21年間にわたりソマリアを統治しましたが、1991年にソマリアは内戦へと突入し崩壊しました。"
    SOM_1991_revolution.t:0 "ソマリア民主共和国の崩壊？"
    SOM_1991_revolution.d:0 "ソマリアの反乱は、1980年代から1990年代初頭にかけて発生したソマリアの内戦の始まりでした。この反乱は、1978年にシアード・バレ大統領が特殊部隊を用いて、自身の政権に対立する氏族ベースの反体制グループを攻撃し始めたことから始まりました。反体制派は、大統領が忠誠心をソ連からアメリカへと突如切り替えたことや、悲惨な1977年から78年のオガデン戦争を経て、10年近くにわたり勢力を強めていました。1986年5月23日にバレが自動車事故で負傷すると、政府内のライバルや対立グループはより大胆になり、公然とした衝突へと発展しました。1991年1月26日のシアード・バレによる首都からの逃亡は、紛争における明確な転換点となりました。"
    SOM_1993_revolution.t:0 "ソマリア内戦？"
    SOM_1993_revolution.d:0 "1990年から92年にかけて慣習法は一時的に崩壊し、派閥間の戦闘が蔓延しました。中央政府が存在しない中、ソマリアは「失敗国家」となりました。これにより1992年7月に国連ソマリア派遣団（UNOSOM I）の国連軍オブザーバーが到着し、続いてより大規模なUNITAFやUNOSOM IIの任務が展開されました。1993年中にソマリアの反乱軍とUNOSOM II部隊との間で武装衝突が起こった後、国連は1995年にソマリアから撤退しました。"
    SOM_1995_revolution.t:0 "モハメド・ファラ・アイディードの失墜？"
    SOM_1995_revolution.d:0 "1991年初頭、他の武装反対グループと共に、モハメド・ファラ・アイディドはバレ大統領の22年間にわたる政権を打倒することに成功し、内戦の全面的な勃発を招きました。アイディドは新しいソマリア政府の大統領職を志しており、国家政府を形成するために他の政治・軍事組織との同盟や統合を模索しました。数十人のUNOSOM II部隊が死亡した1993年6月5日の衝突後、SNA、ひいてはアイディドがその責任を問われ、彼は国連の最初の指名手配犯の一人となりました。ハブル・ギドル氏族の著名なメンバーの多くが死亡した、アメリカ主導の1993年7月12日の「ブラッディ・マンデー」の急襲後、アイディドは初めてアメリカ軍を意図的な標的とし始めました。ビル・クリントン大統領はこれに対し、ゴシック・サーペント作戦を実施し、彼を拘束するためにデルタフォースとタスクフォース・レンジャーを派遣しました。モガディシュにおいて、彼の民兵と元同盟者オスマ・アリ・アットの軍との間で戦闘が行われた際、アイディドは狙撃兵によって致命傷を負い、1996年8月2日に死去しました。"
    SOM_2006_revolution.t:0 "イスラム法廷連合の台頭か？"
    SOM_2006_revolution.d:0 "イスラム法廷連合は、ソマリア内戦に起因する無秩序状態に対抗するため、2000年代初頭にモガディシュを拠点とするシャリア法廷によって設立された法的・政治的組織でした。2006年中盤から後半にかけて、イスラム法廷はその影響力を拡大してソマリア南部および中部の大部分における事実上の政府となり、1991年以来、初めて国家のような形態を作り出すことに成功しました。"
    
    CAR_1965_revolution.t:0 "サン・シルヴェストル・クーデターか？"
    CAR_1965_revolution.d:0 "サン・シルヴェストル・クーデターは、中央アフリカ共和国（CAR）軍の総司令官ジャン＝ベデル・ボカサとその士官たちによって、1965年12月31日および1966年1月1日にデビッド・ダコ大統領の政府に対して行われたクーデターです。"
    CAR_1976_revolution.t:0 "中央アフリカ帝国か？"
    CAR_1976_revolution.d:0 "中央アフリカ帝国は、1976年12月4日、当時の中央アフリカ共和国大統領ジャン＝ベデル・ボカサが自らを中央アフリカ皇帝であると宣言したことで成立しました。ボカサの正式な称号は「国民政治運動（MESAN）によって団結した中央アフリカ人民の意志による中央アフリカ皇帝」であり、「陛下」という尊称が用いられました。彼のレガリア、豪華な戴冠式、そして政権は、フランス第一共和政をフランス第一帝政へと変貌させたナポレオン1世に強く触発されたものでした。"
    CAR_1979_revolution.t:0 "カバン作戦？"
    CAR_1979_revolution.d:0 "カバン作戦は、ボカサ1世を退位させ、国外追放されていた前大統領ダヴィド・ダコを復帰させ、中央アフリカ帝国を中央アフリカ共和国へと改称するために、1979年9月にフランスが行った無血の軍事作戦でした。"
    
    CNG_1965_revolution.t:0 "コンゴのクーデター？"
    CNG_1965_revolution.d:0 "モブツは1965年11月25日に別のクーデターを画策して大統領と首相の両名を解任し、政府を掌握しました。周期的な蜂起や動乱があったものの、モブツは1990年代半ばまでコンゴ（1971年にザイールと改称）を統治しました。"
    CNG_1971_revolution.t:0 "ザイール共和国？"
    CNG_1971_revolution.d:0 "1965年以降、モブツは国の政治生活を支配し、何度も国家の再編を行い、「国父」の称号を称えました。彼は1971年10月27日に、国名をザイール共和国に変更することを発表しました。"
    CNG_1997_revolution.t:0 "ザイールの崩壊？"
    CNG_1997_revolution.d:0 "ザイールは、ルワンダ虐殺の余波による東部地域の不安定化と民族暴力の激化の中で、1990年代後半に崩壊しました。1996年、AFDL民兵組織の指導者ローラン＝デジレ・カビラが、モブツに対する民衆の反乱を率いました。反乱軍が西へと進撃するなか、モブツは国外へ逃亡し、カビラの軍が国の統治を担うこととなりました。翌年、国の名はコンゴ民主共和国へと復元されました。"
    CNG_2006_revolution.t:0 "民主主義の帰還？"
    CNG_2006_revolution.d:0 "2006年7月30日、コンゴ民主共和国で総選挙が実施されました。これは同国で41年ぶりの多党制選挙であり、9年前に長期指導者だったモブツ・セセ・セコの政権が崩壊して以来、初めての選挙となりました。有権者は、共和国の新しい大統領と、議会の下院である新しい国民議会を選出するために投票所へ向かいました。"
    
    KNG_1960_revolution.t:0 "フルベール・ユルーの管区？"
    KNG_1960_revolution.d:0 "フルベール・ユルーはコンゴの民族主義的リーダーであり、元カトリック司祭でもありました。彼は1960年の独立とともにコンゴ共和国の初代大統領に就任しました。1960年8月、ユルーは自国を独立へと導きました。1960年12月、彼はブラザヴィルで大陸間会議を開催し、そこでは経済的自由主義の優位性を称賛し、共産主義を非難しました。"
    KNG_1963_revolution.t:0 "トロワ・グロリューズ？"
    KNG_1963_revolution.d:0 "トロワ・グロリューズ（直訳：「三日間の栄光」）は、1963年8月13日から15日にかけてコンゴ共和国で発生した蜂起です。反対派の労働組合活動とコンゴ青年連合が軍と同盟を結んだことにより、この蜂起はコンゴ初の共和国大統領であったフルベール・ユルーの統治を終わらせました。"
    KNG_1968_revolution.t:0 "コンゴのクーデター？"
    KNG_1968_revolution.d:0 "1968年9月4日、数日間にわたる激しい衝突の後、軍によってアルフォンス・マサンバ＝デバの政府が転覆され、マサンバ＝デバは辞任を強制されました。その後、アルフレッド・ラウルが代行元首となりましたが、1969年1月には、マサンバ＝デバを政権に就かせたのと同じ政党の議長であったマリエン・ングアビが掌握しました。"
    KNG_1977_revolution.t:0 "マリエン・ングアビ暗殺？"
    KNG_1977_revolution.d:0 "1977年3月18日14時30分、ングアビ大統領が暗殺されました。暗殺への関与で告発された者たちは裁判にかけられ、マサンバ＝デバやバルテロメ・キカディディを含む一部の者が処刑されました。暗殺の余波の中で、暫定政府を率いるために政党軍事委員会（CMP）が指名され、保守派のジョアキム・イョンビ＝オパンゴ大佐が元首を務めました。"
    KNG_1979_revolution.t:0 "デニス・サッス＝ングエソの台頭？"
    KNG_1979_revolution.d:0 "1977年3月のングアビ暗殺後、イホンビ＝オパンゴが元首に就任しました。彼は1979年2月に辞任を余儀なくされるまで、約2年間その職を務めました。PCT内で「右派派閥」を形成しようとした疑いをかけられた彼は、その後の後継者であるデニス＝サス＝ングエソ大統領によって、数年間にわたり拘留されました。1979年には自宅軟禁に加え、PCTからの除名と資産没収が行われ、さらに1979年10月20日の発表によれば、将軍から兵卒へと降格させられました。"
    KNG_1992_revolution.t:0 "コンゴ人民共和国の終焉？"
    KNG_1992_revolution.d:0 "コンゴ人民共和国は1991年のソ連崩壊を受けて多党制へと移行し、国の旧称と国旗を復元しましたが、1992年3月までに消滅しました。アンドレ＝ミロンゴが暫定首相に任命されました。デニス＝サス＝ングエソ大統領は、移行期間中、儀礼的な役割として留任が認められました。"
    KNG_1997_revolution.t:0 "デニス＝サス＝ングエソの帰還？"
    KNG_1997_revolution.d:0 "1997年、デニス＝サス＝ングエソは凄惨な内戦を経てコンゴ共和国（ブラザビル）で権力を奪還しました。アンゴラ軍の支援を受けた彼のコブラ民兵組織は、パスカル＝リッスーバ大統領を追放しました。この紛争はブラザビルを荒廃させ、数千人の死者を出すこととなりましたが、サス＝ングエソが強力な指導者として復帰することを決定づけ、コンゴの短い民主主義の試みを終わらせて彼の統治を復活させました。"
    
    TAN_1962_revolution.t:0 "大統領制共和国？"
    TAN_1962_revolution.d:0 "イギリスの統治は1961年12月9日に終了しました。1952年にイギリス王位を継承したエリザベス2世は、タンガニーカの独立後も最初の1年間は君臨を続けましたが、その後は総督によって代表されるタンガニーカの女王として明確に君臨することとなりました。1962年12月9日、タンガニーカは執行権を持つ大統領の下、民主的な共和国となりました。"
    TAN_1964_revolution.t:0 "一党独裁国家？"
    TAN_1964_revolution.d:0 "1962年、タンガニーカは共和国となり、ニエレレが初代大統領に選出されました。彼の政権は、脱植民地化と官僚の「アフリカ化」を追求しつつ、先住民のアフリカ人と、アジア系およびヨーロッパ系の少数民族との団結を促進しました。彼は一党制国家の形成を奨励し、ウガンダおよびケニアと共にパン・アフリカ主義的な東アフリカ連邦を形成しようと試みましたが、失敗に終わりました。1964年のザンジバル革命を経て、ザンジバル島はタンガニーカと統一され、タンザニアが成立しました。その後、ニエレレは国家的な自立と社会主義をますます重視するようになりました。"
    TAN_1992_revolution.t:0 "部分的な民主化？"
    TAN_1992_revolution.d:0 "1992年、タンザニアの憲法が改正され、複数政党制が認められました。1995年に開催されたタンザニア初の複数政党選挙では、与党のチャマ・チャ・マプンドゥジが国民議会の選出議席232議席のうち186議席を獲得し、ベンジャミン・ムカパが大統領に選出されました。"
    
    UGA_1971_revolution.t:0 "ウガンダのクーデター？"
    UGA_1971_revolution.d:0 "1971年のウガンダのクーデターは、1971年1月25日にイディ・アミン将軍率いるウガンダ軍が、ミルトン・オボテ大統領の政府に対して実行した軍事クーデターでした。権力の掌握は、オボテがシンガポールで開催されたコモンウェルス首脳会議に出席するために海外に滞在している間に行われました。アミンはオボテに解任されることを恐れ、自らを独裁者として据えました。"
    UGA_1979_revolution.t:0 "イディ・アミンの失脚？"
    UGA_1979_revolution.d:0 "アミンの統治が1970年代後半に進むにつれ、特定のエスニック・グループや政治的反対派に対する迫害への不満が高まりました。また、1976年にアミンがPFLP-EOとRZのハイジャック犯を支持したことにより、イスラエルによるエンテベ作戦を招くなど、ウガンダの国際的な地位も著しく低下しました。その後、彼は1978年にタンザニアのカゲラ地域を併合しようと試みました。これに対し、タンザニアのジュリアス・ニエレレ大統領は軍にウガンダへの侵略を命じました。1979年、タンザニア軍と反乱軍はカンパラの奪取に成功し、アミンを権力の座から追放しました。"
    UGA_1996_revolution.t:0 "部分的な民主化？"
    UGA_1996_revolution.d:0 "ムセベニ政府下での最初の選挙は、1996年5月9日に実施されました。ムセベニは、「政党間勢力連合」の候補として選挙に立候補した民主党のポール・セモゲレレと、新進候補のキビリゲ・マニャジャを破りました。ムセベニは、条件を満たす有権者の72.6％の投票率に対し、75.5％の得票率で勝利しました。国際的なオブザーバーおよび国内のオブザーバーは、この投票を有効なものと評しましたが、敗れた両候補は結果を拒否しました。ムセベニは1996年5月12日に二度目の大統領としての宣誓を行いました。"
    
    BRD_1966_revolution.t:0 "ブルンジのクーデター？"
    BRD_1966_revolution.d:0 "1966年11月28日、ブルンジの26歳の首相ミシェル・ミコンベロは、クーデターによって19歳のブルンジ国王（ムワミ）ンタレ5世を追放しました。当時ンタレは国外にいたため、クーデターのリーダーたちは速やかに支配に成功しました。"
    BRD_1976_revolution.t:0 "ブルンジのクーデター？"
    BRD_1976_revolution.d:0 "1976年、ツチ族のジャン＝バティスト・バガザ大佐は、ミコンベロを打倒するための無血クーデターを主導し、改革に着手しました。彼の政権は1981年に新しい憲法を起草しましたが、これは一党制国家としてのブルンジのステータスを維持するものでした。1984年8月、バガザは元首に選出されました。在任中、バガザは政治的な反対勢力や宗教的自由を抑圧しました。"
    BRD_1987_revolution.t:0 "ブルンジのクーデター？"
    BRD_1987_revolution.d:0 "1987年、ツチ族のピエール・ブボヤ少佐はバガザを転覆させ、憲法を停止して政党を解散させました。彼は国家救済軍事委員会（CSMN）による軍事統治を復活させました。"
    BRD_1993_revolution.t:0 "憲法改革？"
    BRD_1993_revolution.d:0 "ブボヤは国民和解委員会を設立し、1992年に多党制と非民族的な政府を認める新しい憲法を作成しました。1993年のブルンジ大統領選挙に候補として立候補した彼は、対立するFRODEBUのフツ族候補メルキオール・ンダダエに敗北しました。"
    
    ZAN_1964_revolution.t:0 "ザンジバル革命？"
    ZAN_1964_revolution.d:0 "ザンジバル革命は1964年1月12日に始まり、島の多数派である黒人アフリカ系人口によって、ザンジバルのスルタンであるジャムシド・ビン・アブドゥラとその主にアラブ人が統治する政府が転覆されました。カルメはザンジバルとタンガニーカの合併交渉に成功し、新たな国であるタンザニアを形成しました。当時のメディアはこの合併を、ザンジバルにおける共産主義者による転覆を防ぐ試みであると評価しました。この革命により、ザンジバルにおける250年以上にわたるアラブ人の支配が終焉を迎えました。"
    
    ETH_1974_revolution.t:0 "エチオピアのクーデター？"
    ETH_1974_revolution.d:0 "1974年9月12日、エチオピア皇帝ハイレ・セラシエは、軍・警察・地域軍による調整委員会によって退位させられました。これはソ連が支援する軍事政権であり、その結果、1991年5月28日までデルグとしてエチオピアを統治しました。"
    ETH_1991_revolution.t:0 "デルグの崩壊？"
    ETH_1991_revolution.d:0 "デルグの崩壊は軍事作戦であり、反乱連合であるエチオピア人民革命民主戦線（EPRDF）がデルグと呼んでいた統治軍事政権を1991年5月28日にアディスアベバで敗北させ、エチオピア内戦を終結させました。"
    
    ANG_1975_revolution.t:0 "アンゴラ人民共和国？"
    ANG_1975_revolution.d:0 "アンゴラ人民共和国は、アンゴラ内戦中の1975年の独立から1992年8月25日までアンゴラを統治した、自称社会主義国家です。この国はアンゴラ解放人民運動によって率いられ、同運動は内戦に勝利した後、以来社会民主共和国として国を統治しています。"
    ANG_1979_revolution.t:0 "ジョゼ・エドゥアルド・ドス・サントスの管区？"
    ANG_1979_revolution.d:0 "ジョゼ・エドゥアルド・ヴァン・ドゥネム・ドス・サントスは、1979年から2017年までアンゴラの第2代大統領を務めたアンゴラの政治家であり軍人です。大統領として、ドス・サントスはアンゴラ軍（FAA）の最高司令官であり、1975年の独立以来アンゴラを統治している政党であるアンゴラ解放人民運動（MPLA）の党首でもありました。2017年に退任するまで、彼は赤道ギニアのテオドロ・オビアン・ングエマ・ムバソゴに次いでアフリカで2番目に長く在任した大統領でした。"
    ANG_1991_revolution.t:0 "ビセッセ協定？"
    ANG_1991_revolution.d:0 "エストリル協定としても知られるビセッセ協定は、国際連合のUNAVEM II任務の監督の下、アンゴラにおける多党制民主主義への移行を規定しました。1991年5月31日、ポルトガルのリスボンで、MPLAのジョゼ・エドゥアルド・ドス・サントス大統領とUNITAのジョナス・サヴィンビがこの協定に署名しました。"
    ANG_2017_revolution.t:0 "ジョアン・ロウレンソの大統領任期？"
    ANG_2017_revolution.d:0 "ジョアン・マヌエル・ゴンサルヴェス・ロウレンソは、2017年9月26日からアンゴラの第3代大統領を務めているアンゴラの政治家です。[4] その以前、彼は2014年から2017年まで国防大臣を務めました。2018年9月、彼は与党であるアンゴラ解放人民運動（MPLA）の党首となりました。彼は1998年から2003年まで同党の事務総長を務めました。"
    
    MOZ_1975_revolution.t:0 "モザンビーク人民共和国？"
    MOZ_1975_revolution.d:0 "モザンビーク人民共和国は、1975年から1990年まで現在のモザンビークに存在した社会主義国家でした。同国が1975年6月にポルトガルから独立し、モザンビーク解放戦線（「FRELIMO」）がサモラ・マシェル率いる一党制の社会主義国家を樹立したことにより成立しました。"
    MOZ_1986_revolution.t:0 "ジョアキン・アルベルト・チサノの大統領任期？"
    MOZ_1986_revolution.d:0 "1986年にサモラ・マシェルの大統領専用機が南アフリカの山岳地帯で墜落した際、チサノは大統領の座を継承し、FRELIMOの党首となりました。チサノは1992年、反政府勢力に対し「いかなる訴追も処罰も行わない」ことを約束し、モザンビーク軍のポストの50％を彼らに与えることで和平条約を交渉し、モザンビーク内戦を終結させました。"
    MOZ_1990_revolution.t:0 "新憲法？"
    MOZ_1990_revolution.d:0 "マシェルの後継者であるジョアキン・チサノは、マルクス主義から資本主義への移行といった改革を開始し、RENAMOとの和平交渉を始めるなど、国に抜本的な変化をもたらしました。1990年に制定された新憲法は、多党制政治システム、市場経済、および自由選挙を規定しました。同年、モザンビークは国名から「人民共和国」を廃止しました。"
    MOZ_1994_revolution.t:0 "民主主義への移行？"
    MOZ_1994_revolution.d:0 "1994年10月27日から29日にかけて、大統領および共和国議会を選出するための総選挙がモザンビークで実施されました。以前はFRELIMOが唯一の合法政党であったため、同国で多党制選挙が行われたのはこれが初めてのことでした。それにもかかわらず、FRELIMOは両方の選挙で勝利し、国の政治システムを掌握し続けました。"
    
    GNB_1973_revolution.t:0 "ギニアビサウ人民共和国？"
    GNB_1973_revolution.d:0 "ギニア・カーボベルデ独立アフリカ党は1960年代に武装闘争へと転じ、ギニアビサウ独立戦争の交戦国の一つとなりました。戦争の終盤、同党は社会主義の一党制国家を樹立しましたが、これは1990年代初頭に多党制民主主義が導入されるまで維持されました。"
    GNB_1994_revolution.t:0 "民主主義への移行？"
    GNB_1994_revolution.d:0 "1994年7月3日にギニアビサウで総選挙が行われ、8月7日には大統領選挙の決選投票が行われました。これらは独立後初の多党制選挙であり、以前は大統領が全国人民代表大会によって選出されていたため、大統領が直接選出されるのも今回が初めてでした。大統領選挙の結果、現職のジョアン・ベルナルド・ヴィエイラ（ギニア・カーボベルデ独立アフリカ党）が、決選投票で社会刷新党のクンバ・イアラを破り勝利しました。"
    
    LIB_1971_revolution.t:0 "リベリアの自由化？"
    LIB_1971_revolution.d:0 "ウィリアム・トバートはウィリアム・タブマンの死後、大統領に選出されました。トバートの政権初期には自由主義的な改革や非同盟のスタンスの採用が見られましたが、経済問題の悪化やアメリコ・リベリア人と先住民リベリア人の間の緊張が不安定化を招きました。1973年、ガブリエル・バッカス・マシューズ率いるリベリア進歩同盟が正当な反対政党として認められたことで、同国は二大政党制へと戻りました。"
    LIB_1980_revolution.t:0 "リベリアのクーデター？"
    LIB_1980_revolution.d:0 "1980年4月12日、クラ族のサミュエル・ドゥ軍曹が率いる軍事クーデターにより、ウィリアム・R・トルバート・ジュニア大統領が失脚し殺害されました。ドゥと他の共謀者たちは後に、モンロビアの海岸でトルバートの閣僚の大部分や、その他のアメリコ・リベリア人政府高官、トゥルー・ウィッグ党のメンバーを処刑しました。クーデターの指導者たちは、国を統治するために人民救済評議会（PRC）を形成しました。"
    LIB_1990_revolution.t:0 "第1次リベリア内戦？"
    LIB_1990_revolution.d:0 "サミュエル・ドゥ大統領による全体主義体制と蔓延する腐敗により、1980年代後半には米国による支持を撤回するよう求める声が上がりました。チャールズ・テイラーが率いるリベリア国民愛国戦線（NPFL）は、1989年12月にドゥを打倒するためにコートジボワールからリベリアへ侵略し、1年以内に国の大部分を掌握しました。1990年9月、ドゥはプリンス・ジョンソンが率いるNPFLの分派、独立リベリア国民愛国戦線（INPFL）によって捕らえられ、処刑されました。"
    LIB_1997_revolution.t:0 "チャールズ・テイラーの台頭？"
    LIB_1997_revolution.d:0 "横領罪で解任されドゥ大統領によって投獄された後、テイラーは1989年に脱獄しました。彼は最終的にリビアに到着し、そこでゲリラ戦士としての訓練を受けました。彼は1989年、ドゥ政府を打倒するためにリビアの支援を受ける反乱グループであるリベリア国民愛国戦線の指導者としてリベリアに帰還し、第1次リベリア内戦（1989年–1996年）を引き起こしました。ドゥの処刑後、テイラーは国の大部分を掌握し、アフリカで最も有力な軍閥の一人となりました。戦争を終結させた和平協定を経て、テイラーは1997年の総選挙において国民愛国党（NPP）のメンバーとして大統領に選出されました。国内においてテイラーは、軍の粛清や政治的ライバルへの暴力行使といった独裁的な手段を通じて権力を固めようとしました。"
    LIB_2003_revolution.t:0 "リベリアにおける民主主義の帰還？"
    LIB_2003_revolution.d:0 "チャールズ・テイラー大統領は、2年間の平和をもたらした第1次リベリア内戦での勝利を経て、1997年に政権を握りました。ギニア政府の支援を受けたテイラー反体制派の反乱グループである「和解と民主主義のためのリベリア人連合（LURD）」は、1999年4月にリベリア北部へ侵攻しました。LURDは北部でテイラーに対して徐々に戦果を上げ、2002年初頭までには首都モンロビアへと接近し始めました。2つ目のテイラー反体制派反乱グループである「リベリア民主化運動（MODEL）」は、2003年初頭にリベリア南部へ侵攻し、瞬く間に南部の大部分を征服しました。リベリアの支配領域が3分の1にまで縮小し、モンロビア包囲戦による圧力にさらされたテイラーは、2003年8月に辞任してナイジェリアへ逃亡しました。その1週間後、紛争当事者間でアクラ包括和平合意が署名されました。これは紛争の政治的な終結を意味し、リベリアの民主化への移行の始まりとなりました。"
    
    BUF_1983_revolution.t:0 "ブルキナファソ革命？"
    BUF_1983_revolution.d:0 "1983年8月4日、上ボルタ共和国において、「8月革命」または「ブルキナファソ革命」と呼ばれる出来事として時折言及されるクーデターが実行されました。これはトーマ・サンカラとブレイズ・コンパオレに率いられた軍内の急進派勢力によって、ジャン＝バティスト・ウエドラオ少佐の政権に対して行われました。"
    BUF_1987_revolution.t:0 "ブルキナファソのクーデター？"
    BUF_1987_revolution.d:0 "1987年のブルキナファソのクーデターは、1987年10月15日にブルキナファソで発生した流血の軍事クーデターでした。このクーデターは、1983年の政変におけるかつての友人であり仲間でもあった現職の極左派、トーマ・サンカラ大統領に対し、ブレイズ・コンパオレ大尉によって組織されました。"
    BUF_2014_revolution.t:0 "民主主義の帰還？"
    BUF_2014_revolution.d:0 "ブレイズ・コンパオレは、不公正とされる状況下において、1991年、1998年、2005年、2010年の選挙で勝利しました。彼の27年の任期を延長するための憲法改正の試みは、2014年のブルキナファソ蜂起を引き起こしました。2014年10月31日、コンパオレは辞任し、コートジボワールへ逃亡しました。"
    BUF_2022_revolution.t:0 "ブルキナファソのクーデター？"
    BUF_2022_revolution.d:0 "トラオレは、2022年1月のブルキナファソのクーデターを支持し、愛国防衛復興運動の軍事政権を権力の座に就かせた軍士官グループの一員でした。計画者たちが9月30日にクーデターを起こした際、トラオレはまだ大尉の階級にありました。この作戦は「コブラ」ユニットの支援を受けて実行されました。クーデターの直後、トラオレは自身が愛国防衛復興運動の新たな指導者であることを宣言しました。10月6日、彼はまた「元首兼武装勢力最高司令官」として暫定大統領の職に就きました。"
    
    MAD_1975_revolution.t:0 "マダガスカルの社会主義革命？"
    MAD_1975_revolution.d:0 "ディディエ・ラシラカは1975年12月21日の国民投票によって7年任期の presiden を選出され、合意形成のための権限を確認してマダガスカルの第二共和制を開始しました。ラシラカ政権の指導原則は、社会主義的な「上からの革命」の必要性でした。"
    MAD_1992_revolution.t:0 "社会主義体制の崩壊？"
    MAD_1992_revolution.d:0 "ラシラカ政府への不満は1991年8月10日に高まりました。この日、40万人以上の市民がラシラカ政府を打倒し、新たな多党制政治体制を確立することを目的に大統領宮殿へと行進しました。これらの一連の出来事の結果、ラシラカは1991年10月31日に、新憲法の策定と自由で公正な多党選挙の実施を伴う民主的な移行プロセスを支持することに合意しました。"
    
    NIC_1979_revolution.t:0 "ニカラグア革命？"
    NIC_1979_revolution.d:0 "ニカラグア革命は、1960年代から1970年代にかけて高まったソモサ独裁政権への反対運動と、1978年から79年にかけて独裁政権を追放するためにサンディニスタ民族解放戦線（FSLN）が主導したキャンペーンを包含するものです。"
    NIC_1990_revolution.t:0 "ニカラグアにおける民主主義の帰還？"
    NIC_1990_revolution.d:0 "1990年2月25日、大統領および国民議会のメンバーを選出するためニカラグアで総選挙が実施されました。結果は国民反対連合（UNO）の勝利となり、同連合の大統領候補ビオレッタ・シャモロがサンディニスタ民族解放戦線（FSLN）の現職大統領ダニエル・オルテガを驚くべき形で破りました。これによりニカラグアにおいて歴史的かつ平和的で民主的な権力の委譲が行われました。"
    NIC_2007_revolution.t:0 "ダニエル・オルテガ政権？"
    NIC_2007_revolution.d:0 "ホセ・ダニエル・オルテガ・サアベドラはニカラグアの政治家、革命家、そして元ゲリラ戦闘員です。彼は様々な肩書のもと、2007年から、およびそれ以前の1979年から1990年までニカラグアのリーダーを務めました。彼はまず1979年から1985年まで国家再建評議会のコーディネーターとして権力を握り、その後1985年から1990年までニカラグアの大統領を務めました。2007年に大統領に復帰し、2025年2月からは妻のロザリオ・ムリージョと共に共同大統領として務めています。オルテガは権威主義的なリーダーと評されています。"
    NIC_2025_revolution.t:0 "ニカラグアの共同大統領？"
    NIC_2025_revolution.d:0 "2025年、大統領の権限を単独の人物ではなく2人の共同大統領が行使できるようニカラグア憲法が修正されました。男女1名ずつの共同大統領が普通選挙によって選出され、任期は6年です。修正案が可決された際、現職の大統領ダニエル・オルテガとその妻であり副大統領でもあるロザリオ・ムリージョが初の共同大統領として宣言され、ニカラグアは現在、配偶者による二頭政治によって統治されている世界で唯一の国となっています。"
    
    ELS_1956_revolution.t:0 "ホセ・マリア・レムスの管区？"
    ELS_1956_revolution.d:0 "中佐ホセ・マリア・レムス・ロペスは、1956年9月14日から1960年10月26日までエルサルバドルの大統領を務めました。大統領になる前、彼は国防次官および内務大臣を務めました。彼は前任者の社会経済改革を継続しましたが、労働者階級の生活水準に改善は見られませんでした。"
    ELS_1960_revolution.t:0 "サルバドルのクーデター？"
    ELS_1960_revolution.d:0 "1961年のサルバドルによるクーデターはアニバル・ポルティリョ大佐が率いるエルサルバドルにおける成功したカウンタークーデターでした。これは1960年に権力を掌握した短命な政府評議会に対するもので、改革的な軍事評議会を文民軍事評議会と呼ばれる熱烈な反共産主義政府へと入れ替えました。その年の終わりまでに軍事統治は民主的な統治へと移行しました。"
    ELS_1979_revolution.t:0 "サルバドルによるクーデターですか？"
    ELS_1979_revolution.d:0 "1979年のサルバドルによるクーデターは1979年10月15日にエルサルバドルで発生した軍事クーデターでした。若い士官たちが率いたこのクーデターは、軍事大統領カルロス・ウンベルト・ロメロを無血で overthrow し、彼を国外追放しました。ナショナル和解党による強固な権力掌握は終わり、代わりに軍がエルサルバドル革命政府評議会（JRG）を設立しました。"
    ELS_1984_revolution.t:0 "ホセ・ナポレオン・ドゥアルテの選出ですか？"
    ELS_1984_revolution.d:0 "ホセ・ナポレオン・ドゥアルテ・フエンテス（1925年11月23日 – 1990年2月23日）は、1984年6月1日から1989年6月1日までエルサルバドルの大統領を務めたサルバドルの政治家です。彼は1972年に大統領選挙に出馬する前、サンサルバドルの市長を務めていました。彼は敗北しましたが、その選挙は広く不正が行われたと見なされています。1979年のクーデター後、ドゥアルテは1980年から1982年にかけてその後の文民軍事評議会を率いました。その後彼は1984年に大統領に選出され、ARENA党の党首ロベルト・ドゥアビソンを破りました。"
    ELS_1992_revolution.t:0 "チャプルテペク和平協定ですか？"
    ELS_1992_revolution.d:0 "チャプルテペク和平協定は、サルバドル内戦が終結した1992年1月16日に署名された一連の和平合意です。この条約はサルバドル政府とファラブンド・マルティナショナル解放戦線（FMLN）との間に平和を確立しました。"
    
    NEP_1990_revolution.t:0 "ネパールの人民活動ですか？"
    NEP_1990_revolution.d:0 "1990年の人民活動はネパールにおける多党制の活動であり、絶対君主制に終止符を打ち立憲君主制の始まりをもたらしました。また、パンチャヤット体制を排除しました。"
    NEP_2008_revolution.t:0 "君主制の廃止ですか？"
    NEP_2008_revolution.d:0 "1990年代には、政府軍とネパール共産党（毛沢東主義者）の反乱軍との間の紛争であるネパール内戦（1996年–2006年）が始まりました。2001年のネパール王族殺害事件によって、ネパールの君主制の状況はさらに不安定化しました。この殺害事件の結果、ニャネンドラ国王が即位しました。2005年に彼が直接統治を強行したことは、毛沢東主義者の反乱と民主化活動家を統合する抗議活動を引き起こしました。翌年に行われた選挙を経て、ネパール制憲議会は2008年5月28日の第1回会期において、王国を正式に廃止し、その代わりにネパール連邦民主共和国を宣言しました。"
    
    PAK_1958_revolution.t:0 "パキスタンのクーデターか？"
    PAK_1958_revolution.d:0 "10月7日、ミルザはパキスタン憲法を廃止して戒厳令を布告しました。1956年から1958年の間には多くの首相が誕生しており、アイユーブ・ハーン将軍が安定性を回復するために軍が掌握すべきだと考える段階に達していました。"
    PAK_1970_revolution.t:0 "民主主義への回帰か？"
    PAK_1970_revolution.d:0 "1970年12月7日、国民議会のメンバーを選出するためにパキスタンで総選挙が実施されました。これはパキスタンの独立以来、初めての直接総選挙であり、最終的にはバングラデシュの独立前に実施された唯一の総選挙となりました。投票は300の一般選挙区で行われ、そのうち162は東パキスタン、138は西パキスタンにありました。"
    PAK_1973_revolution.t:0 "1973年憲法か？"
    PAK_1973_revolution.d:0 "1973年憲法は、選出された代議士によって策定されたパキスタン初の憲法でした。1962年憲法とは異なり、これはパキスタンに議会制民主主義をもたらし、経営責任者の権限は首相の職に集中し、形式的な元首である大統領は首相の助言に基づいて行動することに限定されました。憲法には、すべての法律はコーランとスンナに定められたイスラム教の教えに従わなければならないと記されています。"
    PAK_1977_revolution.t:0 "パキスタンのクーデターか？"
    PAK_1977_revolution.d:0 "1977年のパキスタン軍事クーデター（コードネーム：オペレーション・フェア・プレイ）は、1977年7月5日に発生したパキスタンで2度目となる軍事クーデターでした。これは陸軍参謀総長のムハンマド・ジア＝ウル＝ハクによって実行され、ズルフィカル・アリ・ブット首相の政府を打倒しました。クーデター自体は無血革命であり、その前には、ブット率いる左派政権のパキスタン人民党と、1977年の総選挙におけるブットの不正を告発した右派イスラム教徒の対立勢力であるパキスタン国民同盟との間の、社会不安と政治的紛争がありました。"
    PAK_1988_revolution.t:0 "民主主義への復帰？"
    PAK_1988_revolution.d:0 "ジア大統領は1988年に plane crash で亡くなり、ズルフィカル・アリ・ブットの娘であるベナジル・ブットが、この国で最初の女性首相として選出されました。PPPに続いて保守派のパキスタン・ムスリム連盟（N）が政権を担い、続く10年間、両政党のリーダーは権力を争って政権を交互に交代しましたが、その間、国の状況は悪化し、1980年代とは対照的に経済指標は急落しました。"
    
    HND_1947_revolution.t:0 "総督アーチボルド・ウェイヴェルの解任？"
    HND_1947_revolution.d:0 "アーチボルド・ウェイヴェルは1947年初頭にインド総督を解任され、貴族議員マウントバッテンに後を継がれました。ホワイトホールとの緊張関係、シムラ会議（1945年）および内閣代表団（1946年）における失敗、そして宗派間の緊張を解決できなかったことから、アトリー首相はインドの移行には新しいリーダーシップが不可欠であると確信しました。"
    HND_1952_revolution.t:0 "ジャム・カシミールへの特別ステータス？"
    HND_1952_revolution.d:0 "1952年、首相ネールとシェイク・アブドゥラの間のデリー協定は、第370条に基づくジャム・カシミールの特別地位を承認しました。これにより、市民権、財産、および内部統治に関する自治権が認められる一方で、インドは防御、外交、および通信の支配を維持し、連邦内におけるこの地域の独自の憲法上の地位を確固たるものにしました。1952年7月24日に署名されたこの協定は、カシミールをインドの憲法枠組みへと統合しつつ、その自治権を形式化したものです。この合意は妥協を反映したものでした。すなわち、インドの議会が立法権を制限される一方で、ジャム・カシミールは独自の憲法と旗を維持できるというものでした。"
    KAS_Special_Status.option.1:0 "共和制の現地行政を創設します。"
    KAS_Special_Status.option.2:0 "現地行政に君主制を維持します。"
    KAS_Special_Status.option.3:0 "領土を併合します！"
    HND_1975_revolution.t:0 "非常事態宣言ですか？"
    HND_1975_revolution.d:0 "インドにおける非常事態は、1975年から1977年までの21ヶ月間にわたる期間で、首相インディラ・ガンディーが国全体に非常事態を宣言した時期を指します。憲法第352条に基づき、蔓延する「内部騒乱」を理由に大統領ファフルディン・アリー・アーメドによって公式に発令されたこの命令は、首相に布告による統治権を付与し、選挙の中止や市民の自由の停止を可能にしました。"
    HND_1977_revolution.t:0 "非常事態を終了させますか？"
    HND_1977_revolution.d:0 "1977年1月18日、ガンディーは3月の総選挙を招集し、複数の対立勢力のリーダーを釈放しました。しかし、1977年3月21日に非常事態が公式に終了した後も、彼女が退任した後も、多くのリーダーが依然として投獄されたままでした。1977年のインド総選挙は3月16日から20日まで行われ、ジャナタ党とCFDがローク・サバーの298議席を獲得して圧勝しました。対して、与党のインド国民会議は154議席しか獲得できず、前回の選挙と比較して198議席も減少しました。"
    HND_1984_revolution.t:0 "インディラ・ガンディー暗殺事件ですか？"
    HND_1984_revolution.d:0 "インドのインディラ・ガンディー首相は、1984年10月31日午前9時30分、ニューデリーのサフダルジュング・ロードにある自宅にて暗殺されました。彼女は護衛のサトワント・シンとビアント・シンによって殺害されました。これは、シーク教の最も神聖な場所であるパンジャーブ州アムリトサルのハルマンディル・サヒブの黄金寺院を攻撃するためにインディラ・ガンディーが命じた、1984年6月1日から8日にかけて行われたインド軍の行動「ブルー・スター作戦」の余波によるものでした。"
    HND_1991_revolution.t:0 "ラジヴ・ガンディー暗殺事件？"
    HND_1991_revolution.d:0 "インドの元首相ラジヴ・ガンディーの暗殺は、1991年5月21日にインドのタミル・ナードゥ州スリペルンブドゥルで発生した自爆テロの結果として起こりました。ラジヴ・ガンディーに加え、少なくとも他に14人が死亡しました。これは、スリランカのタミル・イーラム解放タイガー（LTTE）という、禁止されている分離主義反乱組織のメンバーであった22歳のカライヴァニ・ラジャラトナム（通称、テンモジ・ラジャラトナムまたはダヌ）によって実行されました。"
    HND_2019_revolution.t:0 "ジャム・カシミールへの直接統治？"
    HND_2019_revolution.d:0 "2019年8月、インドは第370条に基づくジャム・カシミールの特別statusを撤廃し、直接統治を開始しました。ジャム・カシミール再編法により、2019年10月31日付で州はジャム・カシミールとラーダの2つの連邦直轄領に分割されました。中央政府による統治が地方の自治権に取って代わり、これは憲法および政治における歴史的な転換となりました。この動きに対し政府は統合と発展に向けた一歩であると正当化しましたが、批判的な人々はこれが民主的な代表権と地域の自治権を損なうものであると主張しました。"
    
    BHU_1952_revolution.t:0 "ジグメ・ドルジ・ワンチュクの即位？"
    BHU_1952_revolution.d:0 "ジグメ・ワンチュクの後を継いで、息子のジグメ・ドルジ・ワンチュクが即位しました。1972年7月に幕を閉じた20年間の統治期間中に、ブータン社会の根本的な再編が始まりました。ワンチュクは社会と政府の再編を成し遂げただけでなく、ブータンの主権と治安維持を強化しました。"
    BHU_1972_revolution.t:0 "ジグメ・シンゲ・ワンチュクの即位？"
    BHU_1972_revolution.d:0 "1972年7月21日、ブータンの第3代国王が崩御し、16歳のジグメ・シンゲ・ワンチュク皇太子が即位しました。彼は当時、世界最年少の君主となりました。彼の治世において、ブータンは絶対君主制から民主主義立憲君主制へと移行しました。"
    BHU_2006_revolution.t:0 "ジグメ・ケサル・ナムゲル・ワンチュクの即位？"
    BHU_2006_revolution.d:0 "ジグメ・ケサル・ナムゲル・ワンチュクの治世は、父ジグメ・シンゲ・ワンチュクが退位した後の2006年に始まりました。若き国王は、選挙法や土地改革、その他の重要事項が論争された議会の最後の会期を主宰することで、ブータンの民主化を監督しながら治世を開始しました。"
    BHU_2008_revolution.t:0 "ブータンの議会民主主義？"
    BHU_2008_revolution.d:0 "国民議会の第1回総選挙は2008年3月24日に実施されました。主な候補者は、ジグメ・ティンレー率いるブータン平和繁栄党（DPT）と、サンガイ・ンゲドゥップ率いる人民民主党（PDP）でした。DPTが選挙に勝利し、47議席のうち45議席を獲得しました。2008年4月9日、ジグメ・ティンレーは初の選出された首相となり、国の最初の民主的な選挙を経て就任しました。"
    
    BUR_1962_revolution.t:0 "ビルマのクーデター？"
    BUR_1962_revolution.d:0 "1962年のビルマのクーデターは、ビルマにおける一党独裁制の始まりと、ビルマの政治における軍部の政治的支配を決定づけました。1962年3月2日のクーデターにおいて、軍部は首相ウ・ヌ率いる文民AFPFL政府を打倒し、将軍ネ・ウィンが議長を務める連合革命評議会を樹立しました。"
    BUR_1974_revolution.t:0 "ビルマの社会主義への道？"
    BUR_1974_revolution.d:0 "ビルマの社会主義への道は、1962年から1988年までビルマ社会主義計画党（BSPP）によって統治された社会主義国家、ビルマ連合社会主義共和国の国家イデオロギーでした。"
    BUR_1988_revolution.t:0 "8888抗争？"
    BUR_1988_revolution.d:0 "8888抗争は、1988年8月8日にヤンゴン（ランーン）の学生によって開始されました。学生による抗議活動は国中に広がりました。何十万人もの僧侶、子供、大学生、主婦、医師、そして一般市民が政府に対して抗議を行いました。"
    BUR_1990_revolution.t:0 "タマド派のクーデター？"
    BUR_1990_revolution.d:0 "1990年5月27日、ミャンマーで総選挙が実施されました。これは1960年以来、初めての複数政党による選挙であり、その後、同国は軍事独裁政権の統治下に置かれました。結果はアウンサンスーチー率いる国民民主連盟（NLD）による圧勝となり、492議席のうち392議席を獲得しました。しかし、軍事政権は選挙結果の承認を拒否し、引き続き同国の統治を継続しました。"
    BUR_2007_revolution.t:0 "サフラン革命？"
    BUR_2007_revolution.d:0 "サフラン革命は、2007年の8月、9月、および10月にミャンマーで発生した、一連の経済的・政治的な抗議活動およびデモのことです。これらの抗議活動は、燃料の販売価格に対する助成を撤廃するという、国家軍事政府の決定によって引き起こされました。"
    BUR_2015_revolution.t:0 "民主主義への道？"
    BUR_2015_revolution.d:0 "2015年11月8日に総選挙が実施されました。これは、1990年の総選挙（後に無効化）以来、ミャンマーで初めて自由な競争が行われた選挙でした。選挙結果により、NLDは議会の両院において絶対多数の議席を獲得しました。これにより、同党の候補者が大統領となることが確実となりましたが、NLDのリーダーであるアウンサンスーチーは、憲法により大統領職への就任が禁じられています。"
    BUR_2021_revolution.t:0 "タマドゥによるクーデター？"
    BUR_2021_revolution.d:0 "2021年2月1日の朝、ミャンマーでクーデターが始まりました。民主的に選出された与党、国民民主連盟（NLD）のメンバーがミャンマーの軍であるタマドゥによって解任され、その後、軍事政権に権力が委譲されました。"
    BUR_2026_revolution.t:0 "名目上の文民政府？"
    BUR_2026_revolution.d:0 "2026年3月30日、2021年のクーデターで権力を掌握したミン・アウン・フライン将軍が、2026年ミャンマー大統領選挙に向けた委員会の指名において、統一団結発展党の議員チョー・チョー・テェによって、ピトゥ・フルッタ（民議会）の選挙人団から副大統領候補に指名されました。彼は軍を退役する必要があったため、憲法に基づき大統領選に出馬すべく、同日に総司令官を退任しました。国家平和秩序委員会（NDSC）は、ミン・アウン・フラインの体制派であるイェ・ウィン・ウを後継者に任命しました。4月3日、ミン・アウン・フラインは同国第11代大統領に選出されました。"
    
    CAM_1970_revolution.t:0 "クメール共和国？"
    CAM_1970_revolution.d:0 "クメール共和国は、1970年から1975年にかけて、米国の支援を受けたロン・ノル元帥の軍事独裁政権下にあったカンボジアの国家でした。1970年3月18日のクーデターによってノロドム・シハヌークの政府が打倒され、カンボジアの君主制が廃止されたことを受け、1970年10月9日にその設立が正式に宣言されました。"
    CAM_1975_revolution.t:0 "クメール・ルージュの台頭？"
    CAM_1975_revolution.d:0 "カンボジアは、1975年から1979年にかけて、ポル・ポトと、一般にクメール・ルージュ（KR）として知られるカンボジア・クメール・ルージュ共産党（CPK）による全体主義的な独裁政権下の国家でした。これはクメール・ルージュが首都のプノンペンを占領したことで成立し、米国の支援を受けたロン・ノルのクメール共和国は事実上終焉を迎えました。"
    CAM_1979_revolution.t:0 "ポル・ポトの失脚？"
    CAM_1979_revolution.d:0 "クメール・ルージュによるベトナム領土への度重なる暴力的な侵攻が虐殺を引き起こしたため、ベトナムは1978年12月にカンボジアに侵攻しました。1979年1月までに、ポル・ポトとクメール・ルージュは失脚しました。生き残ったクメール・ルージュのメンバーはタイ国境付近の散在するジャングルへと撤退し、そこから戦闘と襲撃を続けました。激しく弱体化した彼らは、1989年の撤退までベトナム兵によって追跡されました。"
    CAM_1989_revolution.t:0 "パリ和平協定？"
    CAM_1989_revolution.d:0 "1978年11月、ベトナム軍はクメール・ルージュによる国境への襲撃に対抗してカンボジアに侵攻し、これを征服しました。カンボジア人民革命党が率いる親ソ連国家として、カンボジア人民共和国（PRK）が設立されました。新しく誕生した国家に対立する形で、1981年には3つの派閥からなる民主カンボジア連合政府（CGDK）と呼ばれる亡命政府が形成されました。1989年にカンボジア国のもとでパリにて和平への取り組みが始まり、その2年後の1991年10月、パリ包括和平合意へと結実しました。"
    CAM_1993_revolution.t:0 "君主制の復興？"
    CAM_1993_revolution.d:0 "1978年11月、ベトナム軍はクメール・ルージュによる国境襲撃に対抗してカンボジアに侵略し、征服しました。1989年にカンボジア国のもとでパリにて和平への取り組みが始まり、2年後の1991年10月にはパリ包括和平合意に至りました。国連は、停戦を強制し難民問題や武装解除に対処するための権限を与えられ、カンボジア国連暫定統治機構（UNTAC）として知られるようになりました。1993年には、ノロドム・シハヌークが国王として復位し君主制が復活し、戦後初の選挙はUNTACによって調整されました。"
    CAM_1997_revolution.t:0 "カンボジアのクーデター？"
    CAM_1997_revolution.d:0 "1997年のカンボジアのクーデターは、1997年7月から9月にかけてカンボジアで発生しました。その結果、共同首相であったフン・センがもう一方の共同首相であるノロドム・ラナディを追放しました。クーデター中には少なくとも32人が死亡しました。"
    CAM_2018_revolution.t:0 "フン・センによる権力の集約？"
    CAM_2018_revolution.d:0 "フン・センの命令に従い、2017年1月31日、国民議会は反対勢力の政治的影響力を弱めるために、少数派リーダーおよび多数派リーダーの役職を廃止することを全会一致で採択しました。2017年2月2日、フン・センは野党が政府閣僚の一部を追及することを禁止しました。さらに、フン・センは憲法修正を公約しましたが、その結果として野党のカンボジア救国党は解散に追い込まれました。この動きにより、野党リーダーのサム・ラインシーは驚きの辞任を余儀なくされました。2018年7月29日日曜日に、第6期国民議会のメンバーを選出するための総選挙がカンボジアで行われました。その結果、与党のカンボジア人民党（CPP）が国民議会の全125議席を獲得するという、予想通りの圧勝を収めました。"
    CAM_2023_revolution.t:0 "フン・マネトの台頭？"
    CAM_2023_revolution.d:0 "フン・マネト（1977年10月20日生まれ）は、カンボジアの政治家であり軍人です。2023年からはカンボジアの首相および与党カンボジア人民党（CPP）の副党首を務めています。彼は、元老院の議長であり元首相のフン・センとブン・ラニーの第二子です。"
    
    IDO_1959_revolution.t:0 "誘導された民主主義？"
    IDO_1959_revolution.d:0 "指導民主主義は、1959年から1966年に新秩序が始まるまでの間、インドネシアで採用されていた政治体制でした。これはスカルノ大統領の考案によるもので、政治的安定をもたらすための試みでした。スカルノは、インドネシアの自由主義的民主主義時代に実施された国会議員制度は、当時の分断された政治状況のために効果的ではないと考えていました。その代わりに、彼は村の長老たちの指導の下で行われていた、伝統的な村の議論と合意形成に基づく制度を求めました。戒厳令の発令とこの制度の導入により、インドネシアは大統領制に戻り、スカルノは再び政府の長となりました。"
    IDO_1968_revolution.t:0 "新秩序？"
    IDO_1968_revolution.d:0 "1965年9月30日と10月1日に試みられたクーデターは、スハルト率いる軍によって阻止されました。軍による公式な歴史によれば、この試みはインドネシア共産党（PKI）が背後にいたとされています。その後、軍は全国的な激しい反共主義の粛清を主導し、スハルトはインドネシアの建国大統領であるスカルノから権力を奪い取りました。彼の「新秩序」政権の下で、スハルトは強く中央集権化された軍主導の政府を建設しました。寡頭制的な軍事独裁として始まったものは、スハルトを中心とした個人主義的な権威主義体制へと進化していきました。"
    IDO_1998_revolution.t:0 "インドネシアの民主化？"
    IDO_1998_revolution.d:0 "スハルトが国の経済的および政治的危機の原因であると見なされるようになるにつれ、イスラム教徒の政治家アミエン・ライスを含む有力な政治家たちが彼の管区に反対の声を上げ、1998年1月には大学生たちが全国的なデモを組織し始めました。危機は、スハルトが1998年5月12日にエジプトを公式訪問していた最中に最高潮に達し、治安維持部隊がジャカルタのトリサクティ大学のデモ隊4人を殺害しました。1998年5月21日、スハルトは辞任を発表し、憲法に従ってハビビ副大統領が大統領に就任しました。"
    IDO_2001_revolution.t:0 "西パプアへの特別自治権？"
    IDO_2001_revolution.d:0 "西パプアはインドネシア政府が法律第21/2001号を制定した2001年に、正式に特殊自治権の地位を獲得しました。この法律は、当該地域に大幅な地方分権と地方統治、教育、保健、天然資源に対するより大きな権限、および地域収入のより大きな分配枠を付与することを目的としていました。"
    IDO_2005_revolution.t:0 "ヘルシンキ合意？"
    IDO_2005_revolution.d:0 "アチェの特殊自治権は、2005年8月15日のヘルシンキ覚書（MoU）に基づき確立されました。元フィンランド大統領のマルッティ・アハティサリの仲介によるこの歴史的な条約は、インドネシア政府と自由アチェ運動（GAM）との間の30年に及ぶ凄惨な分離主義紛争に終止符を打ちました。"
    
    MSY_1969_revolution.t:0 "5月13日の事件"
    MSY_1969_revolution.d:0 "5月13日の事件は、1969年5月13日にマレーシアの首都クアラルンプールで発生した、中華系とマレー系による宗派的暴力の出来事でした。この暴動は、1969年のマレーシア総選挙の直後に発生しました。この選挙では、民主行動党やブラカンといった対立政党が、与党連合であるアライアンス党の勢力を削る形で議席を伸ばしました。この人種暴動を受けて、ヤン・ディ＝ペルトゥアン・アゴン（国王）によって国家非常事態が宣言され、その結果として議会が停止されました。1969年から1971年にかけて国を暫定的に統治するための世話役の政府として、国家運営評議会（NOC）が設立されました。"
    MSY_1971_revolution.t:0 "マレーシアの新経済政策？"
    MSY_1971_revolution.d:0 "新経済政策（NEP）は、マレーシアにおける5月13日の事件の直後に、国家運営評議会（NOC）によって策定された社会再編およびアファーマティブ・アクション（積極的差別是正措置）のプログラムでした。ブミプトラを支持するアファーマティブ・アクションが精力的に推進されました。"
    MSY_1981_revolution.t:0 "新しいUMNO？"
    MSY_1981_revolution.d:0 "マハティールの最初の任期中、マレーシアは近代化と経済成長を遂げ、彼の政府は広範な産業民営化と一連の大胆なインフラプロジェクトを開始しました。マハティールは圧倒的な政治的人物であり、5回連続で総選挙に勝利し、UMNOのリーダーシップを巡る数々のライバルを退けました。彼は司法の独立性を損なうことや、王族の法的免責を撤廃するための憲法修正を支持することを通じて、権力を中央集権化しました。また、彼はブミプトラを支持する政策を継続しました。"
    MSY_1998_revolution.t:0 "アンワル・イブラヒムのソドミー裁判？"
    MSY_1998_revolution.d:0 "1997年のアジア通貨危機の間、財務大臣であったアンワルはIMFの計画を支持しました。マハティールはジョージ・ソロスのような通貨投機家が危機の原因であると非難し、通貨の制御と国外投資のより厳格な規制を支持しました。しかし、その年の四年に一度のUMNO総会をめぐって、アンワルとマハティールの間では問題が深刻化しました。アンワルは捜査を受けているとの警察の報告の中で、1998年9月2日に内閣を解任されました。翌日、彼はUMNOを追放されました。アンワルの元スピーチライターであったムナワール・アニースと、アンワルの養子であるスクマ・ダルマワン・サスミタ・アトマジャは、同性愛行為に関与した疑いで逮捕されました。"
    MSY_2018_revolution.t:0 "ナジブ・ラザクの失脚？"
    MSY_2018_revolution.d:0 "首相としての在任期間中、ナジブは1Malaysia Development Berhad（1MDB）イニシアチブを含む、さまざまな経済およびインフラ開発プログラムを実施しました。しかし、彼のリーダーシップは1MDBスキャンダルに関連する汚職や資金流用の疑惑によって傷つき、それが彼の政治的失脚を招きました。2018年、彼の政党であるバルサン・ナシオナルが総選挙でパカタン・ハラパン連合に敗れたことで、ナジブの政治キャリアは大きな後退を余儀なくされました。その後、彼は1MDBスキャンダルに関連する法的責任を問われることとなりました。"
    MSY_2020_revolution.t:0 "シェラトン・ムーブ？"
    MSY_2020_revolution.d:0 "2020年から2022年にかけてのマレーシアの政治危機は、第14期マレーシア議会の数名の国会議員が政党の支持を変更したことで引き起こされました。これにより、議会の過半数の喪失、2つの連立政府の相次ぐ崩壊、そして2人の首相の辞任を招きました。この政治危機は、2022年の解散総選挙と、最終的な連立政府の形成によって終結しました。"
    MSY_2022_revolution.t:0 "パカタン・ハラパンの台頭？"
    MSY_2022_revolution.d:0 "2022年の総選挙の結果、ハング・パーラメント（過半数を持たない議会）となった後、アンワル・イブラヒム首相兼PH議長率いるアライアンス・オブ・ホープが、ナショナル・フロント（BN）、サラワク政党同盟（GPS）、サバ人民同盟（GRS）、ヘリテージ党（WARISAN）、マレーシア人民党（PBM）、社会民主調和党（KDM）、および無所属議員との連立政権を形成することで、3分の2の多数を確保して政権に復帰しました。一方、ムヒディン・ヤシンのペリカタン・ナシオナルは連立への参加を拒否し、74議席を保持する野党の役割を担いました。"
    
    BRU_1967_revolution.t:0 "オマール・アリ・サイフディン3世の退位？"
    BRU_1967_revolution.d:0 "1967年10月4日、17年間にわたる統治と長期に及ぶ闘病を経て、オマール・アリ・サイフディンは、長男である21歳の皇太子ハサナル・ボルキアに王位を譲るための自発的な退位を宣言しました。これは息子が青年期に達し、国家行政の諸事情をある程度理解するようになったためです。"
    
    THI_1957_revolution.t:0 "サリット・タナラットのクーデター？"
    THI_1957_revolution.d:0 "1957年9月13日、サリットはフィブンの軍による最後通牒を突きつけました。58人の士官が署名したその最後通牒は、政府の辞職を要求するものでした。翌朝、サリットと軍はクーデターを起こしました。1時間足らずのうちに、軍は抵抗を受けることなく戦略的要所を制圧することに成功しました。"
    THI_1973_revolution.t:0 "タイの民衆蜂起？"
    THI_1973_revolution.d:0 "1973年10月14日の民衆蜂起は、タイの歴史における転換点となりました。この蜂起によって、反共主義者タノム・キッティカチョーンによる軍事独裁政権が終焉を迎え、タイの政治システムが変化しました。特筆すべきは、政治におけるタイの大学生の影響力が増大したことです。"
    THI_1976_revolution.t:0 "タイのクーデター？"
    THI_1976_revolution.d:0 "蜂起後の混乱と不安定な時期、および1975年のサイゴン陥落後の共産主義者による政権奪取への恐怖は、1976年10月のタマサート大学虐殺事件へと結実しました。あの日行われたクーデターは、タイに新たな極右政権をもたらし、メディアや官僚、知識人への弾圧を引き起こし、共産主義者の反乱を招くこととなりました。"
    THI_1980_revolution.t:0 "プレム・ティンスラーノンダの任命？"
    THI_1980_revolution.d:0 "インドシナ難民危機、ベトナムによる国境襲撃、経済的苦境によって煽られた右翼感情の波に乗り、軍事独裁者のプレーム・ティンスラーノンダが1980年に首相に任命されました。プレームとの交渉を経て、共産主義者は1983年までに反乱を放棄しました。議会がすべて選出された下院とすべて任命された元老院で構成されていたため、プレームの首相任期は「準民主主義」と呼ばれました。"
    THI_1997_revolution.t:0 "人民の憲法？"
    THI_1997_revolution.d:0 "仏暦2540年（1997年）タイ王国憲法は、1991年憲法に代わるものとして1997年10月11日に制定されたタイの憲法であり、タイの民主的な憲法改革における画期的な出来事として広く称賛されました。これは国の歴史の中で最も民主的な憲法となりました。1997年憲法は二院制議会を創設しました。タイの歴史において初めて、両院とも直接選挙によって選出されました。"
    THI_2006_revolution.t:0 "タイのクーデター？"
    THI_2006_revolution.d:0 "2006年のタイのクーデターは2006年9月19日に発生しました。これは、タイ王立陸軍が選出されたタクシン・シナワットラ首相の暫定政府に対して行ったクーデターです。このクーデターは、1991年のタイのクーデター以来15年ぶりとなる、憲法に基づかないタイの政権交代となりました。これはタクシン、その同盟国、および政治的対立候補が関与した1年間にわたる政治危機に続き、全国的な下院選挙が予定されていたわずか1ヶ月前に発生しました。"
    THI_2011_revolution.t:0 "タイの民主主義への復帰？"
    THI_2011_revolution.d:0 "2010年4月と5月にバンコク中心部を占拠した民主主義反対独裁連合（UDD）すなわち「レッドシャツ」の抗議者たちは、新しい選挙を要求しました。2010年11月14日に選挙を行うという政府の対案は彼らに拒否され、抗議者たちが解散を拒否したことで暴力的な鎮圧が行われました。選挙は最終的に2011年5月に発表されました。"
    THI_2014_revolution.t:0 "プラユット・チャンオチャのクーデター？"
    THI_2014_revolution.d:0 "2014年5月22日、タイ王国陸軍（RTA）司令官プラユット・チャンオチャ将軍率いるタイ王国軍は、6ヶ月間にわたる政治危機を経て、タイの暫定政府に対してクーデターを実行しました。これは、1932年の同国初のクーデター以来、12回目のクーデターとなります。軍は国家を統治するために、国民平和秩序評議会（NCPO）と呼ばれる軍事政権を樹立しました。このクーデターにより、「未完のクーデター」として知られる2006年のタイのクーデター以来続いていた、軍主導の政権と民主的な勢力との間の政治的対立は終結しました。"
    THI_2023_revolution.t:0 "タイの民主主義への回帰か？"
    THI_2023_revolution.d:0 "2023年5月、タイの改革的な野党である進歩的な前進党（MFP）とポピュリストのプアタイ党が総選挙で勝利しました。これは、プラユット・チャンオチャ首相を支持してきた王室支持・軍事政党が権力を失ったことを意味します。[121] 2023年8月22日、ポピュリストのプアタイ党所属のセター・タウィシンがタイの新首相に就任しました。一方、プアタイ党の億万長者であり象徴的存在であるタクシン・シナワトラは、長年の国外追放を経てタイに帰国しました。"
    
    JAP_1947_revolution.t:0 "戦後日本の憲法か？"
    JAP_1947_revolution.d:0 "日本国憲法は日本の憲法であり、国家における最高法規です。これは主に、第二次世界大戦後の連合国による日本占領下で活動したアメリカの文民官僚によって起草されました。現在の日本国憲法は、1890年の明治憲法の修正として1946年11月3日に公布され、1947年5月3日に施行されました。"
    notice_of_3P_action.option:0 "それが現実なのです。"
    JAP_1955_revolution.t:0 "1955年体制か？"
    JAP_1955_revolution.d:0 "1955年体制とは、1955年に保守政党が合併した後に自由民主党が主導した日本の戦後の政治秩序のことです。それは、官僚と企業の強い結びつき、利益誘導的な公共事業の配分、そして自由民主党内の派閥抗争に支えられた長期的な一党支配を生み出しました。この体制は政策の安定と高度経済成長をもたらしましたが、汚職を招く個人的な地方組織や選挙上のインセンティブに依存しており、不祥事や1990年代初頭の経済危機、そして選挙改革によって次第に弱体化していきました。"
    JAP_1994_revolution.t:0 "1994年の選挙改革？"
    JAP_1994_revolution.d:0 "1994年、日本は汚職が起こりやすい小選挙区制を、小選挙区制と比例代表制を組み合わせた混合選挙制度へと変更しました。この改革は、二大政党による競争を促し、選挙の焦点を地方の「利益誘導政治」から国家的な政党の公約へと移すことを目的としていました。最終的にこれらの変化は党のリーダーシップを強化し権力を中央集権化させましたが、自由民主党は依然として主要な勢力であり続けました。"
    
    NKO_1994_revolution.t:0 "金正日の台頭？"
    NKO_1994_revolution.d:0 "金正日は北朝鮮の政治家であり、北朝鮮の第2代最高指導者でした。彼は1994年に父である金日成が死去した後から、自身の死を迎えた2011年まで北朝鮮を指導し、その後は息子の金正恩がその跡を継ぎました。"
    NKO_2012_revolution.t:0 "金正恩の台頭？"
    NKO_2012_revolution.d:0 "金正恩は北朝鮮の政治家であり、2011年からは北朝鮮の最高指導者、2012年からは朝鮮労働党のリーダーを務めています。彼は、1994年から2011年に死去するまで北朝鮮の第2代最高指導者であった金正日と、高陽姫の三男です。"
    
    SKO_1960_revolution.t:0 "四月革命？"
    SKO_1960_revolution.d:0 "4月革命は、1960年4月11日から26日にかけて韓国で行われた、シンマン・リー大統領と第一共和国に対する大規模な抗議活動であり、これがリーの辞任へとつながりました。抗議活動の引き金となったのは、3月の不正選挙に対するデモ中に警察によって殺害された地元の高校生の遺体が発見されたことでした。リーの専制的な統治、汚職、政治的な対立に対する暴力の行使、そして韓国の不均衡な発展により、民衆の不満が高まっていました。"
    SKO_1961_revolution.t:0 "5月16日クーデター？"
    SKO_1961_revolution.d:0 "5月16日軍事クーデターは、1961年に韓国で行われた軍事クーデターです。これはパク・チョンヒとその同盟国によって組織・実行され、彼らは軍事革命委員会を結成しました。同委員会は、クーデター当日に陸軍参謀総長のチャン・ドヨンが黙認したため、名目上は彼が率いることとなりました。このクーデターによって、民主的に選出されたチャン・ミョン首相とユン・ポスン大統領による政府は権力を失い、第二共和国は終焉を迎えました。その後、パクが実質的に率いる改革的な軍事国家再建最高評議会が設置され、7月にチャン将軍が逮捕された後は、パクが議長を引き継ぎました。"
    SKO_1972_revolution.t:0 "維新憲法？"
    SKO_1972_revolution.d:0 "1972年10月、パクは立法府を解散させ、自己クーデターによって1963年憲法を停止させました。その後、新しい憲法の起草が始まりました。いわゆる維新憲法と呼ばれる新憲法は、1972年11月の極めて不正な国民投票によって承認されました。パクには、布告によって統治し、憲法上の自由を停止させるという広範な権限が与えられました。大統領の任期は4年から6年に延長され、再選の制限もなくなりました。これは事実上、パクが過去1年間にわたって行使してきた緊急権限を法典化したものであり、彼の政権を合法的な独裁へと変貌させました。"
    SKO_1979_revolution.t:0 "パク・チョンヒ暗殺？"
    SKO_1979_revolution.d:0 "パク・チョンヒは、1979年10月26日、韓国ソウル市鍾路区の大統領府（青瓦台）に隣接する韓国中央情報部（KCIA）のセーフハウスでの夕食中に暗殺されました。KCIAの局長であり大統領の警護責任者であった金載getがこの暗殺を実行しました。パクは胸部と頭部を撃たれ、直後に死亡しました。"
    SKO_1987_revolution.t:0 "六月民主抗争？"
    SKO_1987_revolution.d:0 "六月民主抗争は、1987年6月10日から29日にかけて大規模な抗議活動を引き起こした、韓国における全国的な民主化運動です。このデモによって、当時の政府は直接大統領選挙の実施やその他の民主的改革を余儀なくされ、その結果、現在の韓国政府である第六共和国が樹立されました。"
    SKO_2016_revolution.t:0 "パク・getの弾劾？"
    SKO_2016_revolution.d:0 "韓国大統領パク・getの弾劾は、彼女の側近であったチェ・スンシルによる大統領権限への介入をめぐる政治スキャンダルの頂点でした。2016年10月下旬、政府内で公的な地位を持たないパク・getの側近チェ・スンシルが、その立場を利用してサムスン、現代、SKグループ、ロッテといった複数の財閥（チェボル）から、自身が管理する2つの財団へ資金提供を受けるよう働きかけていたことが明らかになりました。2016年12月9日に弾劾投票が行われ、300名からなる国民議会のうち234名が、パク・getの大統領としての権限および職務の弾劾と一時停止に賛成票を投じました。"
    SKO_2024_revolution.t:0 "戒厳令？"
    SKO_2024_revolution.d:0 "2024年12月3日、韓国標準時（KST）22時27分、韓国の大統領である尹錫悦は、テレビ中継による演説の中で戒厳令を布告しました。彼の布告において、彼は国民議会で多数派を占める民主党（DPK）が「反国家的活動」を行い、「北朝鮮の共産主義者」と協力して国を破壊し、「立法独裁」を作り出していると非難しました。この出来事は、国内外の韓国の政治家や報道機関によって、クーデターの試みであると広く特徴づけられました。"
    SKO_2024_1_revolution.t:0 "尹錫悦の弾劾？"
    SKO_2024_1_revolution.d:0 "2024年12月14日、韓国の大統領である尹錫悦は、国民議会によって弾劾されました。この措置は、尹による2024年12月3日の戒厳令布告への対応であり、その戒厳令は国民議会によって覆され、6時間後の2024年12月4日に公式に撤回されました。"
    
    ROC_1975_revolution.t:0 "蒋介石の死？"
    ROC_1975_revolution.d:0 "1975年、蒋介石が台湾に渡ってから26年後、彼は台北にて87歳で亡くなりました。彼はそれまでの数ヶ月間に心臓発作と肺炎を患っており、4月5日に進行した心不全によって悪化した腎不全のため死去しました。蒋の葬儀は4月16日に行われました。蒋介石の死後、厳家乾が第2代大統領となりました。"
    ROC_1978_revolution.t:0 "蒋経国の台頭？"
    ROC_1978_revolution.d:0 "蒋介石が晩年を迎えるにつれ、彼は徐々に息子へより多くの責任を譲りました。1975年4月に彼が亡くなると、副大統領の厳家乾が蒋介石の任期の残りの期間、大統領を務めました。一方で、蒋経国は国民党（KMT）の指導権を継承しました（彼は、父の「総統」という肩書きではなく、「主席」という肩書きを選択しました）。蒋経国は、1978年5月20日に国民議会によって行われた1978年の台湾大統領選挙において、中華民国（ROC）の大統領に選出されました。"
    ROC_1996_revolution.t:0 "台湾の民主化？"
    ROC_1996_revolution.d:0 "1987年、戒厳令が解除され、台湾は民主化プロセスを開始しました。それは「臨時条項」の廃止から始まり、1996年の最初の直接大統領選挙で頂点に達しました。"
    
    NVM_1969_revolution.t:0 "レ・ズアンの台頭？"
    NVM_1969_revolution.d:0 "レ・ドゥアンはベトナムの共産主義政治家でした。彼は1950年代後半に党のヒエラルキーを駆け上がり、1960年の第3回全国大会においてベトナム共産党（VCP）中央委員会の書記長に就任しました。彼はホー・チ・ミンの集団指導体制による統治方針を継承しました。1960年代半ば（ホーの健康状態が悪化した時期）から1986年に彼自身が死去するまで、彼はベトナムにおける最高意思決定者でした。"
    NVM_1986_revolution.t:0 "グエン・ヴァン・リンの台頭？"
    NVM_1986_revolution.d:0 "グエン・ヴァン・リンはベトナムの革命家であり、政治家でした。グエン・ヴァン・リンは1986年から1991年までベトナム共産党の書記長を務め、ベトナム戦争中のベトコンの政治的リーダーでもありました。在任中、リンは「ドイモイ（刷新）」の強力な推進者でした。これはベトナム経済を社会主義志向の市場経済へと転換することを目指す経済計画です。そのため、リンはペレストロイカを導入したソ連のリーダーになぞらえ、「ベトナムのゴルバチョフ」としばしば称されました。"
    
    SVM_1955_revolution.t:0 "ベトナム国国民投票"
    SVM_1955_revolution.d:0 "1955年のベトナム国国民投票は、後にベトナム共和国（広く南ベトナムとして知られる）となるベトナム国の将来の政府形態を決定するものでした。この投票は、共和制を提案した首相のゴ・ディン・ディエムと、1945年に退位し、国民投票当時は元首の地位にあった前天皇のバオ・ダイの間で争われました。"
    SVM_1963_revolution.t:0 "南ベトナムのクーデター？"
    SVM_1963_revolution.d:0 "1963年11月、ゴ・ディン・ディエム大統領と南ベトナム個人主義労働革命党は、仏教徒危機へのディエムの対応や、北ベトナムおよびベトコンによる南ベトナムへの脅威に反対する、CIAの支援を受けた南ベトナム共和国軍の士官グループによって追放されました。"
    
    SRL_1956_revolution.t:0 "シンハラ語単独使用法"
    SRL_1956_revolution.d:0 "一般にシンハラ語単独法として知られる公用語法（1956年第33号）は、1956年にセイロンの議会で可決された法律です。この法律は、タミル語を除外し、英語に代わってシンハラ語をセイロンの唯一の公用語と定めました。この法律は論争を巻き起こしました。支持者たちは、独立したばかりのコミュニティが植民地時代の支配者たちと距離を置こうとする試みであると考えた一方で、反対派は言語的多数派が少数派を抑圧し支配を主張するための試みであると見なしたためです。"
    SRL_1978_revolution.t:0 "強い管区を創設するか？"
    SRL_1978_revolution.d:0 "1978年9月7日に発布された新憲法は、一院制の議会と執行大統領制を規定しました。大統領の任期と議会の期間はともに6年と定められました。また、新憲法は議会選挙において多人数による比例代表制を導入し、議員数は196名（憲法修正第14号により後に225名に増員）とされました。"
    
    BNG_1975_revolution.t:0 "大統領制の時代か？"
    BNG_1975_revolution.d:0 "1975年1月、シェイク・ムジブル・ラフマンはBAKSALの下で一党独裁の社会主義体制を導入しました。ラフマンは4つの国営出版物を除くすべての新聞を禁止し、自身の権力を強化するために憲法を修正しました。彼は1975年8月15日のクーデター中に暗殺され、大統領の地位は簒奪者コンダケル・モスタク・アフマドへと4ヶ月間引き継がれました。その後、バングラデシュは戒厳法最高司令官率いる軍事政権によって3年間統治されました。1977年、軍のトップであったジアウル・ラフマンが大統領に就任しました。"
    BNG_1991_revolution.t:0 "議会制民主主義への回帰か？"
    BNG_1991_revolution.d:0 "1991年の総選挙後、憲法修正第12号によって議会制共和国が復活し、ベグム・ハレダ・ジアがバングラデシュ初の女性首相となりました。元ファーストレディであるジアは、1990年から1996年にかけてBNP政府を率いました。1991年、彼女の財務大臣サイフル・ラフマンはバングラデシュ経済を自由主義化するための大規模なプログラムを開始しました。"
    BNG_2009_revolution.t:0 "シェイク・ハシナの台頭か？"
    BNG_2009_revolution.d:0 "シェイク・ハシナの第2次政権は経済管理の失敗と蔓延する汚職によって特徴づけられ、外債の増大やインフレの進行、若者の失業、銀行業務の不正を招きました。彼女の政権下でバングラデシュは民主主義の後退を経験したと広く考えられています。ヒューマン・ライツ・ウォッチは彼女の政府の下で広範囲にわたる強制失踪や裁判外の殺害を記録しました。多くの政治家やジャーナリストが彼女の見解に異議を唱えたことで、組織的かつ司法的に罰せられました。"
    BNG_2024_revolution.t:0 "民主主義の帰還か？"
    BNG_2024_revolution.d:0 "大規模なデモ隊が首相の邸宅を包囲する中、ハシナは2024年8月5日に辞任しました。彼女の辞任は陸軍参謀総長であるワケル＝ウズ＝ザマン将軍によって発表されました。その日の後半、ハシナは混乱の中でインドへ逃亡しました。最初は車、次にヘリコプター、最後は飛行機を利用しました。彼女は辞任演説も残さず去りました。2024年8月6日に議会を解散した後、バングラデシュの大統領モハメド・シャハブディンは、前首相シェイク・ハシナの辞任を受けた学生たちの要求に応じ、ユヌスをバングラデシュ暫定政府の首班に指名しました。"
    
    AST_1975_revolution.t:0 "白豪主義を終わらせるか？"
    AST_1975_revolution.d:0 "1950年代以降、オーストラリア人は人種問題に対する態度を再考し始めました。アボリジニの権利活動が結成され、多くの自由主義的な白人オーストラリア人に支持されたほか、白豪主義に反対するキャンペーンも展開されました。1967年には国民投票が実施され、憲法改正が圧倒的な支持で承認されました。これにより差別的な記述が削除され、国家議会に先住民族のための立法権が与えられました。1970年代に入ると、先住民族のオーストラリア人がオーストラリアの議会において代表権を持ち始めました。"
    AST_1999_revolution.t:0 "共和制への国民投票"
    AST_1999_revolution.d:0 "1999年11月6日に実施されたオーストラリアの共和国化住民投票は、オーストラリア憲法を改正するための2つの質問からなる住民投票でした。最初の質問はオーストラリアが共和国になるべきかどうかを問うものでした。そこでは1998年2月にキャンベラで開催された、半分が選出され半分が任命された憲法制定会議によって承認された超党派の任命モデルに基づき、議会によって大統領が任命されることとされていました。2番目の質問は一般に政治的重要性がはるかに低いとみなされていましたが、前文を挿入するために憲法を改定すべきかどうかを問うものでした。共和国化住民投票は否決されました。"
    
    FIJ_1987_revolution.t:0 "フィジーのクーデター？"
    FIJ_1987_revolution.d:0 "1987年のフィジーのクーデターは、選出されたティモシ・ババドラ首相率いるフィジー政府の転覆、エリザベス2世のフィジー女王としての退位、そして共和国宣言をもたらしました。ババドラが退位させられた最初のクーデターは1987年5月14日に発生しました。9月25日の2度目のクーデターによって君主制は終焉を迎え、その後間もなく10月10日に共和国が宣言されました。これら両方の軍事行動は、当時ロイヤル・フィジー軍の第3位指揮官であったシティヴェニ・ラブカ中佐によって主導されました。"
    FIJ_2000_revolution.t:0 "フィジーのクーデター？"
    FIJ_2000_revolution.d:0 "2000年のフィジーのクーデターは、2000年5月19日に選出されたインド系フィジー人のマヘンドラ・チャウドリー首相の政府に対し、強硬派のi-Taukei（民族的フィジー人）ナショナリストが行った民間人によるクーデターでした。これに続いて5月27日にはラトゥ・サー・カミセセ・マラ大統領が執行権力を主張しようと試み、その後5月29日にフィジー共和国軍の司令官であるフランク・バイニマラマ准将による軍事クーデターが発生しました。"
    FIJ_2006_revolution.t:0 "フィジーのクーデター？"
    FIJ_2006_revolution.d:0 "2006年12月のフィジーのクーデターは、フランク・バイニマラマ准将がライセニア・カラセ首相とジョセファ・イロイロ大統領に対して行ったクーデターでした。これは、前年にカラセ政権がフィジー議会に3つの法案を提出したことから始まった政治危機の集大成でした。コリコリ法案、土地裁判所法案、および和解・寛容・団結法案は、フィジーで続く民族紛争と2000年のクーデターの余波に対処するもので、先住民フィジー人に有利なものとみなされていました。フィジー共和国軍（RFMF）の司令官であるバイニマラマは、10月16日に法案の撤回を含む要求リストを政府に提示しました。"
    FIJ_2014_revolution.t:0 "民主主義への復帰か？"
    FIJ_2014_revolution.d:0 "2014年9月17日、50人の国会議員を選出するためフィジーで総選挙が実施されました。[1][2][3] フランク・バイニマラマ首相率いるフィジーファースト党が、50議席のうち32議席を獲得して圧勝しました。選挙は当初2009年3月に予定されていましたが、政治家たちが「変化、平和、進歩のための人民憲章」に合意しなかったため、延期されていました。2009年から2014年の間に、選挙実施を求める公的な発表や要求が何度か行われ、2014年3月23日、暫定政権は選挙を2014年9月17日に実施すると発表しました。"
    
    AFG_1973_revolution.t:0 "アフガニスタン共和国か？"
    AFG_1973_revolution.d:0 "1973年のアフガニスタンにおけるクーデターは、1973年7月17日に陸軍将軍であり王子でもあるモハマド・ダウド・ハーンが、従兄弟の国王モハマド・ザヒール・シャーに対して行ったもので、その結果、ダウド・ハーンが率いる一党制のもとでアフガニスタン共和国が樹立されました。"
    AFG_1978_revolution.t:0 "サウル革命か？"
    AFG_1978_revolution.d:0 "サウル革命は1978年4月27日から28日にかけてアフガニスタン民主人民共和国（PDPA）によって引き起こされ、アフガニスタンのモハマド・ダウド・ハーン大統領を打倒しました。"
    AFG_1979_revolution.t:0 "ハフィズッラ・アミンのクーデターか？"
    AFG_1979_revolution.d:0 "タラキ書記長との個人的な対立が深まったことで、アミンは最終的に権力を奪い取って彼を退陣させることに成功し、後にその処刑を命じました。1979年9月16日、アミンは閣僚評議会議長（政府首脳）、革命評議会議長（国家元首）、およびPDPA中央委員会書記長（最高指導者）に就任しました。"
    AFG_1986_revolution.t:0 "国民和解？"
    AFG_1986_revolution.d:0 "ナジブラ大統領は1987年の初めに「国民和解」プログラムを開始しました。その目的は、国を一つにまとめ、7年間にわたって国を覆っていた戦争を終結させることでした。1987年11月、ナジブラはアフガニスタンの新憲法を可決させることに成功し、選出制の二院制議会を持つ大統領制を確立しました。憲法では「神聖なるイスラム教」が国教と宣言され、個人の民主的な権利が保障され、「政党」の結成が合法化され、さまざまな部族や民族間の平等が推進されました。新しい体制の一環として、1988年には新しい国民議会のメンバーを選出するための国民議会選挙が実施されました。これはアフガニスタンにおいて19年ぶりの選挙でした。"
    AFG_1996_revolution.t:0 "アフガニスタン・イスラム教首長国？"
    AFG_1996_revolution.d:0 "1996年9月までに、タリバンはカブールを占領し、国の presiden を殺害して、アフガニスタン・イスラム教首長国を樹立しました。タリバンの最初の動きは、クルアーンの教えと法学の厳格な解釈を導入することでした。"
    
    LAO_1975_revolution.t:0 "パテト・ラオの台頭？"
    LAO_1975_revolution.d:0 "パテト・ラオは、正式名称をラオス人民解放軍といい、20世紀半ばにラオスで形成された共産主義の政治運動および組織でした。このグループはラオス内戦を経て、最終的に1975年に国全体を制圧しました。"
    
    MLY_1951_revolution.t:0 "ヘンリー・ガーニー卿暗殺？"
    MLY_1951_revolution.d:0 "ヘンリー・ガーニー卿の暗殺は、マラヤ非常事態の真っ只中であった1951年10月6日に発生しました。マラヤの英国高等弁務官であったガーニーは、会議のためにフレイザーズ・ヒルへ向かう途中のクアラ・クブ・ロードにて、マラヤ共産党のメンバーによって殺害されました。"
    MLY_1955_revolution.t:0 "マラヤの完全自治？"
    MLY_1955_revolution.d:0 "1957年の独立前に行われた唯一の総選挙として、1955年7月27日（水）にマラヤ連邦で総選挙が実施されました。この選挙は、それまで英国高等弁務官によって完全に任命されていた連邦立法評議会のメンバーを選出するために行われました。投票は全52の連邦選挙区で行われ、各選挙区から1名が選出されました。また、1954年10月10日から1955年11月12日にかけて、マラヤの9州と2つの居住地における全136の州選挙区でも州選挙が行われ、州評議会または居住地評議会の評議員が各選挙区から1名ずつ選出されました。"
    
    SGP_1963_revolution.t:0 "コールドストア作戦？"
    SGP_1963_revolution.d:0 "コールドストア作戦は、1963年2月2日にシンガポールで実行された秘密治安作戦のコードネームです。この作戦により、公共サービス治安維持条例（PSSO）に基づき、裁判なしで拘束された113名が逮捕されました。公式な記録によれば、この作戦はシンガポールの内部治安を脅かしていた共産主義者の開放的な戦線組織を壊滅させることを目的とした治安作戦でした。この作戦は、英国政府、シンガポール政府、およびマラヤ連邦政府の代表者で構成される内安評議会によって承認されました。"
    SGP_1990_revolution.t:0 "リー・クアンユーの引退？"
    SGP_1990_revolution.d:0 "7度の選挙で人民行動党（PAP）を勝利に導いた後、リーは1990年11月28日に退任し、首相の座をゴー・チョックトンに譲りました。その時、彼は世界で最も長く首相を務めた人物となっていました。これは独立以来、最初のリーダー交代でした。ゴーは、当時在職していた若手の閣僚たちによって新しい首相に選出されました。"
    SGP_2004_revolution.t:0 "リー・シエンロンの首相就任？"
    SGP_2004_revolution.d:0 "2004年8月12日、李はゴー・チョク・トンの後継として首相に就任し、シンガポール金融庁の議長職をゴーに譲りました。首席判事のヨン・プン・ハウがイスタナで李の就任宣誓を行いました。首相として、李はピープルズ・アソシエーションの会長にも就任しました。就任後の最初の2年間で、彼の政府は週5日勤務制を制定し、産休の期間を延長しました。観光収入を増やすためにシンガポールに2つの統合型リゾートを建設するという彼の提案により、マリーナベイ・サンズとリゾーツ・ワールド・セントーサが開発されました。"
    SGP_2024_revolution.t:0 "ローレンス・ウォンの首相就任？"
    SGP_2024_revolution.d:0 "2022年6月6日に内閣改造が発表され、ウォンは副首相に昇進しました。これにより、リー・シエンロン首相の後継者としての地位をさらに固めました。副首相に就任したことに加え、彼はリーの不在時には「首相代行」にも任命されました。その後、ウォンはリーの明らかな首相後継者として浮上しました。リーが70歳で退陣するという当初の計画は、ヘンの辞退によって複雑なものとなっていました。2024年4月15日、首相府はローレンス・ウォンがリー・シエンロンの後継として首相に就任することを認める声明を発表しました。"
    
    PHI_1965_revolution.t:0 "フェルディナンド・マルコスの大統領任期？"
    PHI_1965_revolution.d:0 "フェルディナンド・マルコスは1965年12月30日、フィリピンの第10代大統領として最初の任期を開始しました。彼の就任は20年に及ぶ権力掌握の始まりとなりましたが、1935年フィリピン憲法では任期は4年間の2期までと制限されていました。マルコスは1965年のフィリピン大統領選挙において、現職の大統領であるディオスダド・マカパガルを破って勝利しました。"
    PHI_1986_revolution.t:0 "ピープルパワー革命？"
    PHI_1986_revolution.d:0 "ピープル・パワー革命は、1986年2月22日から25日にかけて主にメトロ・マニラで行われた一連の民衆デモでした。政権の暴力と選挙不正に対し、持続的な市民の抵抗運動が行われました。この非暴力革命はフェルディナンド・マルコスの退陣と20年にわたる独裁の終焉、そしてフィリピンにおける民主主義の回復をもたらしました。"
    
    KAZ_1991_revolution.t:0 "ヌルスルタン・ナザルバエフの台頭？"
    KAZ_1991_revolution.d:0 "ナザルバエフの政治キャリアはソ連時代に始まり、彼は1962年に鋼鉄工場の労働者として働きながらソ連共産党に入党しました。党内で昇進を重ねた彼は、1984年にカザフSSRの首相に、1989年にはカザフスタン共産党の第一書記に就任しました。1990年、最高会議は彼をカザフスタンの大統領として選出しました。ナザルバエフはソ連崩壊という困難な時期のカザフスタンを導く重要な役割を果たし、1991年の国の独立へと繋げました。1991年のカザフスタン初の直接大統領選挙において、ナザルバエフは対立候補不在のまま選挙に臨み、圧倒的な勝利を収めました。"
    KAZ_2019_revolution.t:0 "カシムジョマルト・トカエフの台頭？"
    KAZ_2019_revolution.d:0 "2019年、ヌルスルタン・ナザルバエフの辞任後、トカエフは代行大統領として就任しました。与党アマナトのメンバーである彼は、ナザルバエフの支持を得た党の候補者として、同年6月の解散選挙で勝利しました。大統領任期中、彼は労働者の賃金引き上げ、汚職の削減、死刑制度の廃止、現地政府の分権化など、いくつかの改革を制定しました。国の安定性を維持し政治的な移行を確実にしながら新たな改革を制定している一方で、トカエフの統治は人権侵害を伴う権威主義的な体制のままとなっています。"
    
    UZB_1991_revolution.t:0 "イスラム・カリモフの台頭？"
    UZB_1991_revolution.d:0 "イスラム・アブドガニエヴィチ・カリモフは、1991年のウズベキスタン独立から2016年に死去するまで、同国の初代大統領を務めたウズベキスタンの政治家です。彼は、政治的反対派が暗殺され、人権が抑圧され、異論が禁止されるウズベキスタンの抑圧的な権威主義体制を支配しましたが、1998年には死刑が廃止されました。"
    UZB_2016_revolution.t:0 "シャフカト・ミルジヨエフの台頭？"
    UZB_2016_revolution.d:0 "シャフカト・ミロモノヴィチ・ミルジヨエフは、2016年12月14日からウズベキスタン大統領およびウズベキスタン軍最高司令官を務めているウズベキスタンの政治家です。それ以前、ミルジヨエフは2003年から2016年までウズベキスタンの首相として政府を率いていました。彼の政権下で、ミルジヨエフは国外投資の誘致、隣国の中央アジア諸国との関係改善、さらには2019年の悪名高いジャスリク刑務所の閉鎖を伴う政治犯の釈放などを通じて、ウズベキスタンの政治・経済システムに一連の自由主義的な改革を実施しました。"
    
    TKM_1991_revolution.t:0 "サパルムラト・ニヤゾフの台頭？"
    TKM_1991_revolution.d:0 "サパルムラト・アタエヴィチ・ニヤゾフは、1985年から2006年に死去するまでトルクメニスタンを率いたトルクメニスタンの政治家です。彼は1985年から1991年までトルクメニスタン共産党の第一書記を務め、1991年のソ連のクーデター未遂を支持しました。1991年にソ連から独立した後も、15年間にわたり初代大統領としてトルクメニスタンを統治し続けました。"
    TKM_2006_revolution.t:0 "グルバンムルディ・ベルディムハメドフの台頭？"
    TKM_2006_revolution.d:0 "グルバンムルディ・マリクグリエヴィチ・ベルディムハメドフは、トルクメニスタンの政治家であり、元歯科医で、トルクメニスタン人民評議会の議長を務めました。彼は以前、2006年から2022年までトルクメニスタンの第2代大統領を務め、その後、息子のセルダルとの権力分担体制に入りました。"
    TKM_2022_revolution.t:0 "セルダル・ベルディムハメドフの台頭？"
    TKM_2022_revolution.d:0 "セルダル・グルバンギュリ・イェヴィチ・ベルディムハメドフは、2022年からトルクメニスタンの第3代および第4代大統領を務めているトルクメニスタンの政治家です。ベルディムハメドフはそれ以前、トルクメニスタンの長年の権威主義的な支配者である父グルバンギュリの政府内で、他のいくつかの要職を歴任していました。父と息子は2022年に権力分担の取り決めを行い、それを通じてトルクメニスタンの全体主義的な独裁体制を共同で統治しています。"
    
    TAJ_1991_revolution.t:0 "ラフモン・ナビエフの台頭？"
    TAJ_1991_revolution.d:0 "ラフモン・ナビエヴィチ・ナビエフは、1982年から1985年までタジキスタン共産党第一書記を務め、また1991年9月23日から10月6日まで、および1991年12月2日から1992年9月7日まで、2度にわたりタジキスタン第2代大統領を務めたタジクの政治家でした。"
    TAJ_1992_revolution.t:0 "エモマリ・ラフモンの台頭？"
    TAJ_1992_revolution.d:0 "エモマリ・ラフモンは、1994年からタジキスタン大統領を務めているタジクの政治家です。ラフモンは、個人崇拝の要素を伴う権威主義的な体制をタジキスタンで率いています。政治的反対派は弾圧され、人権と自由の侵害は深刻で、選挙は自由かつ公正ではなく、汚職とネポティズムが蔓延しています。"
    
    KYR_1990_revolution.t:0 "アスカール・アカエフの台頭？"
    KYR_1990_revolution.d:0 "アスカール・アカエヴィチ・アカエフは、2005年3月のチューリップ革命で失脚するまで、1990年からキルギス共和国大統領を務めた元政治家です。"
    KYR_2005_revolution.t:0 "チューリップ革命？"
    KYR_2005_revolution.d:0 "第一キルギス革命としても知られるチューリップ革命は、当時のキルギス大統領アスカール・アカエフの失脚を招きました。革命は2005年2月27日と3月13日の議会選挙の後に始まりました。革命家たちは、アカエフとその家族、支持者による汚職と権威主義を主張しました。アカエフはカザフスタンへ、その後ロシアへと逃亡しました。"
    
    SOV_stalin_succession.t:0 "スターリンの後継者？"
    SOV_stalin_succession.d:0 "1953年3月1日、ソ連の73歳のリーダーであったヨシフ・スターリンが脳出血を起こし、その4日後に死去しました。クレムリンで行われたスターリンの遺体安置は、悲しみに暮れる数万人のソ連市民がモスクワの中心部に押し寄せる機会となりました。スターリンが死に瀕している間も、1952年10月の第19回大会で政治局に代わって設置された拡大組織である党のプレジディウムは、誰が最終的な権力を握るかを決定するために会合を開いていました。"
    SOV_khrushchev.option:0 "ニキータ・フルシチョフを選出"
    SOV_beria.option:0 "ラヴレンチー・ベリヤを選出"
    SOV_molotov.option:0 "ヴャチェスラフ・モロトフを選出"
    SOV_zhukov.option:0 "ゲオルギー・ジューコフを選出"
    SOV_khrushchev_succession.t:0 "ニキータ・フルシチョフの失脚か？"
    SOV_khrushchev_succession.d:0 "フルシチョフは、スエズ危機、スプートニクの打ち上げ、1957年のシリア危機、そして1960年のU-2事件といった主要な勝利のおかげで、1950年代に強い支持を得ていました。しかし、1960年代初頭になると、政策の欠陥やキューバ危機への対応により、フルシチョフの人気は低下しました。これにより潜在的な反対勢力が勢いづき、彼らは静かに力を蓄えて1964年10月にフルシチョフを退陣させました。"
    SOV_khrushchev_succession_option.1:0 "フルシチョフはブレジネフに取って代わられました。"
    SOV_khrushchev_succession_option.2:0 "フルシチョフは指導権争いでの生き残りに成功しました！"
    SOV_gorbachev_succession.t:0 "改革的な書記長か？"
    SOV_gorbachev_succession.d:0 "1985年3月10日、チェルネンコが死去しました。グロムイコは次期書記長としてゴルバチョフを提案し、長年の党員であったグロムイコの推薦は中央委員会において大きな重みを持ちました。ゴルバチョフは書記長への指名に対して多くの反対を予想していましたが、最終的に政治局の他のメンバーは彼を支持しました。チェルネンコの死後まもなく、政治局は他の高齢のリーダーではなく彼を求めたため、満場一致でゴルバチョフを後継者に選出しました。こうして彼はソ連の第8代リーダーとなりました。政府の誰も、彼がこれほどまでに急進的な改革者になるとは想像していませんでした。"
    SOV_gorbachev.option:0 "「もっと活気のあるリーダーを歓迎します！」"
    SOV_other.option:0 "「また別の高齢のリーダーの方がいい……」"
    SOV_august_coup.t:0 "8月のクーデター"
    SOV_august_coup.d:0 "8月クーデターは、当時のソ連大統領であり共産党書記長であったミハイル・ゴルバチョフから国を強制的に掌握しようとした、ソ連共産党強硬派による失敗に終わった試みでした。クーデターの指導者は、ゲナジー・ヤナーエフ副大統領を含む軍および文民の最高幹部で構成され、彼らは非常事態態委員会（GKChP）を結成しました。彼らはゴルバチョフの改革プログラムに反対し、東欧諸国への支配力を失っていることに憤り、署名寸前であったソ連の新連邦条約を恐れていました。この条約は、ソ連中央政府の権力の多くを分権化し、15の共和国に分配することを目的としていました。"
    SOV_august_coup.optio:0 "クーデターは失敗しました！"
    SOV_august_coup_other.option:0 "クーデターは成功しました。"
    SOV_khrushchev_thaw.t:0 "フルシチョフの雪解け？"
    SOV_khrushchev_thaw.d:0 "フルシチョフの雪解けとは、ニキータ・フルシチョフによる脱スターリン化と他国との平和共存政策により、ソ連における抑圧と検閲が緩和された1950年代半ばから1960年代半ばまでの期間を指します。"
    SOV_detente.t:0 "西側との接近？"
    SOV_detente.d:0 "ブレジネフはソ連のリーダーとして18年間君臨する中で、デタントの推進を主要な外交政策の革新としました。フルシチョフの雪解け期に追求されたアプローチといくつかの共通点があるものの、ブレジネフの政策は二つの点でフルシチョフの先例とは大きく異なっていました。第一に、その目的はより包括的かつ広範囲にわたるものであり、兵器管理、危機回避、東西貿易、欧州の治安維持、および人権に関する協定の締結が含まれていました。第二に、この政策はアメリカとソ連の軍事力を均等化することの重要性に基づいたものでした。"
    SOV_brezhnev_succession.t:0 "レオニード・ブレジネフの死"
    SOV_brezhnev_succession.d:0 "1975年以降、ブレジネフの健康状態は急速に悪化し、権力を維持しながらも国際情勢からはますます退いていきました。彼は1982年11月10日に死去し、書記長の座はユーリ・アンドロポフが継承しました。"
    SOV_andropov_succession_option.1:0 "「ユーリ・アンドロポフこそが我々の未来だ！」"
    SOV_andropov_succession.t:0 "ユーリ・アンドロポフの死"
    SOV_andropov_succession.d:0 "1983年2月に腎不全を患ったことで、アンドロポフの健康状態は急速に悪化し始めました。彼は約15か月間にわたり国を率いた後、1984年2月9日に死去しました。ブレジネフとその後継者であるユーリ・アンドロポフの死を経て、チェルネンコは1984年2月に総書記に選出され、1984年4月には最高会議幹部会議議長に就任しました。しかし、健康状態の急激な悪化により、彼は公務を遂行できないことが多々ありました。"
    SOV_chernenko_succession_option.1:0 "コンスタンチン・チェルネンコが我々の未来か？"
    SOV_glasnost.t:0 "グラスノスチを制定するか？"
    SOV_glasnost.d:0 "グラスノスチとは、ソ連（USSR）における政府機関や活動における開放性と透明性の向上を意味する言葉でした。グラスノスチは、ソ連市民が自国のシステムの諸問題や潜在的な解決策について公に議論することを認めるという、ゴルバチョフ政権の決意を反映したものでした。"
    SOV_democratisation.t:0 "デモクラティザツィヤを制定するか？"
    SOV_democratisation.d:0 "デモクラティザツィヤとは、1987年1月にソ連共産党総書記ミハイル・ゴルバチョフによって導入されたスローガンであり、ソ連の一党独裁体制に「民主的」な要素を注入することを求めるものでした。ゴルバチョフのデモクラティザツィヤは、多党制ではないものの、現地の共産党（CPSU）役員やソビエトの選挙において複数の候補者による選挙を導入することを意味していました。彼はこの方法によって、自身の機関や政策の改革を実行する進歩的な人材を投入し、党を活性化させようと望んでいたのです。"
    
    PRC_1966_revolution.t:0 "文化大革命か？"
    PRC_1966_revolution.d:0 "文化大革命（CR）は、正式には「大プロレタリア文化大革命」として知られる、中華人民共和国（PRC）における社会政治的な活動でした。これは1966年に毛沢東によって開始され、彼の死に至る1976年まで続きました。その掲げられた目標は、中国社会から資本主義的および伝統的な要素の残滓を排除することで、中国の共産主義を維持することでした。主な目標の達成には失敗したものの、文化大革命は毛沢東が権力の中心へと実質的に復帰したことを象徴する出来事となりました。"
    PRC_1966_revolution.option.1:0 "反体制派を粛清せよ！"
    PRC_1966_revolution.option.2:0 "反対されても構わない……"
    PRC_mao_succession.t:0 "毛の跡継ぎか？"
    PRC_mao_succession.d:0 "毛の健康状態は晩年に悪化しましたが、それはおそらく彼の絶え間ない喫煙によって悪化したものと思われます。晩年に彼が複数の肺疾患や心疾患に苦しんでいたことは、国家機密となりました。彼の最後の公の場への登場、そして生存中の最後の写真として知られるものは、1976年5月27日にパキスタンの訪問中の首相、ズルフィカル・アリ・ブットと会談した際のものでした。彼は3月に一度、7月に一度、そして9月5日に三度目となる、計二回の重篤な心臓発作に見舞われ、身体が不自由となりました。彼はその約4日後の1976年9月9日00時10分、82歳で亡くなりました。"
    PRC_deng.option:0 "鄧小平が後継者となるのだ！"
    PRC_jing_qing.option:0 "四人組が中国を支配する！"
    PRC_1989_1_revolution.t:0 "六四天安門事件"
    PRC_1989_1_revolution.d:0 "中国で六四天安門事件として知られる天安門広場での抗議活動は、1989年4月15日から6月4日まで中国の北京にある天安門広場で行われた学生主導のデモでした。デモ参加者と中国政府の間で平和的な解決策を見出すための数週間にわたる試みが失敗に終わった後、中国政府は6月3日の夜に戒厳令を布告し、広場を占領するために軍を投入しました。"
    PRC_1989_revolution.option.1:0 "あの夜、何も起きなかった！"
    PRC_1989_revolution.option.2:0 "あの夜、何かが起きた。"
    PRC_1989_2_revolution.t:0 "江沢民の管区？"
    PRC_1989_2_revolution.d:0 "江は1985年に上海市の市長に任命され、その後1987年には上海市の共産党書記、および中国共産党中央政治局のメンバーへと昇進しました。江は、1989年の天安門広場での抗議活動と虐殺の後、学生運動を支持したことで失脚した趙紫陽に代わって中国共産党総書記となり、妥協的な候補者として予期せず権力を握りました。「八老」の中国政治への関与が着実に減少する中で、江は権力の掌握を固め、1990年代には国内の「最高指導者」となりました。"
    PRC_2002_revolution.t:0 "胡錦濤の管区？"
    PRC_2002_revolution.d:0 "胡氏は中国共産党（CCP）を通じて権力の座に昇り詰めました。特に貴州省とチベット自治区の党委員会書記を務めた際、反対派への厳しい弾圧によって最高レベルの層から注目を集めました。その後、中国共産党総書記の江沢民のもとで、中国共産党中央書記局第一書記および副大統領へと昇進しました。胡氏は、内戦や建国に参加した世代よりも若い世代の、共産党における最初のリーダーとなりました。旧世代の影響力のある後援者たちが、彼の急速な台頭を後押ししました。"
    PRC_2012_revolution.t:0 "習近平の大統領就任？"
    PRC_2012_revolution.d:0 "2008年、習氏は胡錦濤の最高指導者としての後継者に指名されました。習氏は2013年3月14日、北京で開催された第12回全国人民代表大会の信任投票によって大統領に選出されました。得票数は賛成2,952票、反対1票、棄権3票でした。彼は、2期を務めた後に退任した胡錦濤の後継者となりました。"
    
    MGL_1952_revolution.t:0 "ユムジャーギン・ツェデンバルの台頭？"
    MGL_1952_revolution.d:0 "1952年1月26日、チョイバルボの死後、ユムジャーギン・ツェデンバルはモンゴルで権力を握りました。ツェデンバルは30年以上にわたりモンゴルの主要な政治的人物でした。"
    MGL_1984_revolution.t:0 "ジャムリン・バトムーンクの台頭？"
    MGL_1984_revolution.d:0 "1984年、バトムーンクはD.モロムジャムツと共に、ツェデンバルが権力から退く際の重要な役割を果たしました。1984年、党の長年のリーダーであったユムジャーギン・ツェデンバルが党大会で失脚した際、彼は元首となりました。"
    
    USA_1963_revolution.t:0 "ジョン・F・ケネディ暗殺？"
    USA_1963_revolution.d:0 "1963年11月22日、アメリカ合衆国の第35代大統領ジョン・F・ケネディは、テキサス州ダラスのディーリー・プラザを通過する大統領車列に乗っていた際に暗殺されました。ケネディは妻のジャクリーン、テキサス州知事のジョン・コネリー、そしてコネリーの妻ネリーと共に車に乗っていましたが、近くのテキサス学校用品保管庫から元アメリカ海兵隊員のリー・ハーヴェイ・オズワルドによって致命的な銃撃を受けました。"
    USA_1964_revolution.t:0 "公民権法の成立？"
    USA_1964_revolution.d:0 "1964年の公民権法は、人種、肌の色、宗教、性別、および出身国に基づく差別を禁じる、アメリカ合衆国における画期的な公民権および労働法です。この法律は、有権者登録要件の不平等な適用、学校や公共施設における人種隔離、および雇用差別を禁止しています。"
    USA_1974_revolution.t:0 "ウォーターゲート事件"
    USA_1974_revolution.d:0 "ウォーターゲート事件は、1972年から1974年にかけてのリチャード・ニクソン大統領の政権に関わる、アメリカ合衆国における重大な政治スキャンダルであり、ニクソンの辞任へとつながりました。このスキャンダルは、1972年6月17日にワシントンD.C.のウォーターゲート・オフィスビルで行われた民主党全国委員会本部の不法侵入への関与を、ニクソン政権が隠蔽しようとしたことに端を発しています。"
    USA_1998_revolution.t:0 "ビル・クリントンの弾劾？"
    USA_1998_revolution.d:0 "アメリカ合衆国の第42代大統領であるビル・クリントンは、1998年12月19日、第105回アメリカ合衆国議会の代議院によって「重大な罪および不法行為」を理由に弾劾されました。代議院はクリントンに対する2つの弾劾条項を採択し、具体的な罪状は宣誓下での虚偽証言と司法妨害でした。他にも2つの条項が検討されましたが、代議院の投票によって否決されました。承認された弾劾条項は1999年1月7日にアメリカ合衆国元老院へ提出されました。その後、ウィリアム・レニキスト最高裁判所長官の主宰のもと、元老院での裁判が始まりました。2月12日、有罪および罷免に必要な、出席した元老院議員の3分の2以上の賛成が得られなかったため、クリントンは両方の罪状について無罪となりました。"
    USA_2019_revolution.t:0 "ドナルド・トランプの弾劾？"
    USA_2019_revolution.d:0 "ドナルド・トランプ（アメリカ合衆国第45代大統領）に対する最初の弾劾は、第116回アメリカ合衆国議会の期間中である2019年12月18日に始まりました。このとき代議院は、権力乱用と議会妨害というトランプに対する2つの弾劾条項を採択しました。2020年2月5日、元老院はドナルド・トランプを無罪とする決議を行いました。"
    USA_2020_revolution.t:0 "アメリカの官僚を政治化しますか？"
    USA_2020_revolution.d:0 "スケジュールFは、2020年10月21日の大統領令13957によって作成されました。この規定の目的は、連邦の現職官僚に対する大統領の支配力を強めることでした。これは、政治的理由で連邦職員に報復するための手段を与えるものとして広く批判されました。数万から数十万人の現職従業員が官僚としての保護を失い、政治的任命の数が10倍に増加する可能性があると推定されました。"
    USA_2021_revolution.t:0 "1月6日の反乱？"
    USA_2021_revolution.d:0 "2021年1月6日、ワシントンD.C.にあるアメリカ合衆国議会議事堂が、2020年大統領選挙での敗北から2ヶ月後、当時のドナルド・トランプ大統領の支持者たちの暴徒によって攻撃されました。彼らは、ジョー・バイデン次期大統領の勝利を正式なものにするための議会合同会議における選挙人投票の集計を阻止することで、トランプを権力に留めようとしました。この攻撃は、最終的に選挙結果の承認を阻止することには失敗しました。"
    
    historical_gov_changes.option.1:0 "歴史的な道を辿れ！"
    historical_gov_changes.option.2:0 "我々は異なる未来を模索するだろう"
    
    stirrings_of_revolution:0 "大規模な国内不安"
    
    soviet_east_germany.indy.t:0 "東ドイツへのさらなる自治権？"
    soviet_east_germany.indy.d:0 "1949年10月7日、SEDはドイツ民主共和国を樹立しました。これは、東ドイツのあらゆる政党と大衆組織による包括的な同盟であるドイツ民主共和国反ファシズム民族戦線の支配を確立する、社会主義的な政治憲法に基づいたものでした。民族戦線は、東ドイツの議会であるフォルクス・カマーラ（人民議会）の選挙に立つために設立されました。ドイツ民主共和国の最初で唯一の大統領はヴィルヘルム・ピークでした。しかし、1950年以降、東ドイツの政治権力はSEDの第一書記であるヴァルター・ウルブリヒトによって握られました。"
    soviet_baltic_states.indy.t:0 "バルト諸国の独立？"
    soviet_baltic_states.indy.d:0 "1980年代後半、「歌う革命」として知られるソ連統治に対する大規模な市民抵抗運動が始まりました。1989年8月23日、タリンからヴィリニュスまで600kmにわたって、200万人が作る「バルトの道」という人間鎖が広がりました。ソ連は1991年9月6日、3つのバルト諸国の独立を認めました。"
    soviet_weaken_eastern_bloc.indy.t:0 "シナトラ・ドクトリン？"
    soviet_weaken_eastern_bloc.indy.d:0 "歴史的に、シナトラ・ドクトリンとはミハイル・ゴルバチョフ政権下のソ連による外交政策であり、ワルシャワ条約機構の加盟国が自国の内政を決定することを認めるものでした。その名は、フランク・シナトラによって広められた楽曲「マイ・ウェイ」に冗談めかしてちなんだものです。つまり、ソ連がこれらの国家に「自分たちの道」を行かせることを認めたのです。その実施は、ゴルバチョフの「新思考」外交政策の一環でした。"
    soviet_weaken_eastern_bloc.indy.f:0 "[ROOT.GetCountry.GetName]が債務不履行の状態にあるか、健全な財政を維持していないか、あるいは革命が起きて民主的な支配者が誕生したため、このイベントが発生しました。"
    eastern_bloc_revolution.t:0 "[ROOT.GetCountry.GetNameNoFlag]における共産主義の終焉？"
    eastern_bloc_revolution.d:0 "歴史的に、共産主義の崩壊としても知られる1989年の革命は、自由民主主義運動による革命の波であり、東側陣営および世界各地におけるマルクス・レーニン主義政権の大部分の崩壊をもたらしました。"
    eastern_bloc_revolution.f:0 "[ROOT.GetCountry.GetName]が歴史的な要件を満たしたか、債務不履行の状態にあるか、健全な財政を維持していないか、あるいは民主主義を支持する革命的な政治運動が発生したため、このイベントが発生しました。"
    sino_soviet_split.t:0 "中ソ分裂？"
    sino_soviet_split_prc.t:0 "中ソ分裂"
    sino_soviet_split.d:0 "中ソ分裂とは、1947年から1991年の冷戦期におけるそれぞれの地政学的影響を受けたマルクス・レーニン主義の解釈と実践的な応用の違いから生じた、教義の相違によって中国とソ連の関係が徐々に悪化した現象を指します。1950年代後半から1960年代初頭にかけて、正統派マルクス主義の解釈をめぐる中ソの論争は、ソ連が進めた非スターリン化政策や西側陣営との国際的な平和共存政策をめぐる具体的な紛争へと発展しました。中国の指導者である毛沢東は、これを修正主義であると非難しました。"
    sino_soviet_split_ussr.f:0 "[SCOPE.sCountry('communist_china_scope').GetName]の[concept_ruler]が[ROOT.GetCountry.GetName]の[concept_ruler]と相容れないため、このイベントが発生しました。"
    sino_soviet_split.f:0 "このイベントは、[SCOPE.sCountry('sino_soviet_split_ussr').GetName]の[concept_ruler]が[ROOT.GetCountry.GetName]の[concept_ruler]と相容れないため発生しました。"
    yugoslav_soviet_split.t:0 "ソ連とユーゴスラビアの分裂"
    yugoslav_soviet_split.d:0 "ティトーとスターリンによる、ユーゴスラビアとソ連の政治指導部間の対立は、第二次世界大戦後の数年間にわたり、「ティトー＝スターリン分裂」あるいは「ソ連＝ユーゴスラビア分裂」として頂点に達しました。双方はイデオロギー論争としてこれを提示しましたが、この紛争は、アルバニア、ブルガリア、そしてティトー率いるユーゴスラビアが支持し、ソ連が密かに反対したギリシャの共産主義者の反乱も巻き込んだ、バルカンにおける地政学的な争いの産物でもありました。"
    yugoslav_soviet_split_ussr.f:0 "このイベントは、[SCOPE.sCountry('communist_yugoslavia_scope').GetName]の[concept_ruler]が[ROOT.GetCountry.GetName]の[concept_ruler]と相容れないため発生しました。"
    soviet_east_germany_1.indy.t:0 "東ドイツの建国？"
    soviet_east_germany_1.indy.d:0 "東ドイツの建国は1949年10月7日に行われ、その後の数日間で、臨時人民議会、州議会、東ドイツ臨時政府などの関連する出来事が相次いで形成されました。また、ヴィルヘルム・ピークが初代大統領に選出されました。ドイツ民主共和国の存続期間中、建国の出来事は祝日である共和国記念日に毎年祝われました。"
    
    eastern_europe_indy.option.1:0 "「彼らをもっと自由にさせてやれ」"
    eastern_europe_indy.option.2:0 "「奴らに自由など与える価値はない！」"
    sino_soviet_split.option.1:0 "「議論はもう十分だ、ソ連と決別せよ！」"
    sino_soviet_split.option.2:0 "「相違は続けたままに……」"
    sino_soviet_split.option.3:0 "「どのみち、中国人のことは好きになれなかった！」"
    yugoslav_soviet_split.option.1:0 "「議論はもう十分だ、ユーゴスラビアと決別せよ！」"
    yugoslav_soviet_split.option.2:0 "「相違は続けたままに……」"
    yugoslav_soviet_split.option.3:0 "「どのみち、ソ連人のことは好きになれなかった！」"
    
    weaken_the_warsaw_pact.tt:0 "ワルシャワ条約機構を弱体化させる"
    
    algerian_war.t:0 "アルジェリア独立戦争"
    algerian_war.d:0 "アルジェリア戦争は、1954年から1962年にかけてフランスとアルジェリア民族解放戦線の間で繰り広げられた主要な武力紛争であり、アルジェリアがフランスから独立を勝ち取る結果となりました。重要な脱植民地化戦争であったこの紛争は、ゲリラ戦と戦争犯罪を特徴とする複雑なものでした。"
    angolan_war.t:0 "アンゴラ独立戦争"
    angolan_war.d:0 "アンゴラではルタ・アルマダ・デ・リベルタサォン・ナシオナルとして知られるアンゴラ独立戦争は、綿花の強制栽培に対する蜂起として始まり、3つのナショナリストの活動と1つの分離主義運動の間でポルトガルの海外地方であるアンゴラの支配を巡る多派閥による争いへと発展しました。"
    mozambican_war.t:0 "モザンビーク独立戦争"
    mozambican_war.d:0 "モザンビーク独立戦争は、モザンビーク解放戦線（FRELIMO）のゲリラ部隊とポルトガルの間の武力紛争でした。この戦争は1964年9月25日に正式に始まり、1974年9月8日の停戦によって終結し、1975年の交渉による独立へとつながりました。"
    bissau_guinean_war.t:0 "ギニアビサウ独立戦争"
    bissau_guinean_war.d:0 "ギニアビサウ独立戦争、またはビサウ・ギニア独立戦争は、1963年から1974年にかけてポルトガル領ギニアで行われた武力による独立紛争でした。"
    cameroonian_war.t:0 "カメルーン独立戦争"
    cameroonian_war.d:0 "カメルーン戦争は、カメルーンのナショナリストの活動とフランスとの間の独立闘争の名称です。この活動はカメルーン人民連合によって主導されました。独立後も反乱は続き、現代の政治を形作ることとなりました。"
    namibian_war.t:0 "ナミビア独立戦争"
    namibian_war.d:0 "ナミビア独立戦争としても知られ、南アフリカではアンゴラ・ブッシュ戦争と表記されることもある南アフリカ国境戦争は、1966年8月26日から1990年3月21日までナミビア（当時は南西アフリカ）、ザンビア、およびアンゴラで発生した主に非対称な紛争でした。"
    kenyan_war.t:0 "ケニア非常事態"
    kenyan_war.d:0 "マウマウの蜂起、マウマウの反乱、またはケニア非常事態としても知られるマウマウ反乱は、イギリス領ケニア植民地におけるマウマウとして知られるケニア土地自由軍とイギリス当局との間の戦争でした。"
    cypriot_war.t:0 "キプロス非常事態"
    cypriot_war.d:0 "キプロス非常事態は、1955年11月から1959年3月の間にイギリス領キプロスで繰り広げられた紛争です。ギリシア系キプロスの右派ナショナリストによるゲリラ組織であるキプロス戦闘員国民組織（EOKA）は、1955年にイギリスの植民地支配の終結とキプロスとギリシャの統合（エノシス）を支持して武装闘争を開始しました。エノシスに対するトルコ系キプロス人の反対により、キプロスの分割を支持するトルコ系抵抗組織（TMT）が結成されました。キプロス非常事態は、1959年のロンドン・チューリッヒ協定の署名によって終結しました。"
    malayan_emergency.t:0 "マレー非常事態"
    malayan_emergency.d:0 "マレー非常事態は、マレーナショナル解放軍の共産主義的な独立派ゲリラと、マラヤ連邦、イギリス帝国、およびコモンウェルス（英連邦）の軍隊との間で、イギリス領マラヤにおいて戦われたゲリラ戦です。"
    Malagasy_war.t:0 "マダガスカル蜂起"
    Malagasy_war.d:0 "マダガスカル蜂起は、1947年3月から1949年2月までマダガスカルで続いたフランスの植民地支配に対するマダガスカル・ナショナリストの反乱です。1947年3月29日の夜、主に槍で武装したマダガスカル・ナショナリストによって、モランガとマナカラ周辺に集中する島東部の軍事基地やフランス所有のプランテーションに対して、組織的な奇襲攻撃が仕掛けられました。ナショナリズムの動きは南部で急速に支持を集め、翌月には中央高地や首都アンタナナリボへと拡大し、マダガスカル・ナショナリストの戦闘員は100万人を超えると推定されています。"
    brunei_revolt_1962.t:0 "ブルネイの反乱"
    brunei_revolt_1962.d:0 "ブルネイの反乱は、君主制のマレーシア連邦への編入案に反対する者たちによって、イギリスの保護国であるブルネイで行われた反乱です。反乱軍は、インドネシアから支援を受け、インドネシア寄り北ボルネオ連邦を支持する左派のブルネイ人民党（BPR）と結びついていた民兵組織、TNKU（北カリマンタン国民軍）のメンバーでした。"
    
    historical_colonial_wars.option.1:0 "奴らの取るに足らない反乱を鎮圧せよ！"
    historical_colonial_wars.option.2:0 "反乱軍に屈する"
    
    eritrean_war.t:0 "エリトリア独立戦争"
    eritrean_war.d:0 "エリトリア独立戦争は、1961年9月1日から1991年5月24日にかけて、エリトリアの独立闘士が歴代のエチオピア政府に対して戦った独立のための戦争です。"
    congolese_war.t:0 "コンゴ危機"
    congolese_war.d:0 "コンゴ危機は、1960年から1965年にかけてコンゴ共和国で発生した政治的動乱と紛争の期間です。この危機はコンゴがベルギーから独立した直後に始まり、ジョゼフ＝デジレ・モブツの統治下で国全体が置かれたことで、非公式ながら終結しました。"
    yugoslav_war.SLO.t:0 "スロベニアの独立？"
    yugoslav_war.SLO.d:0 "スロベニアは1991年6月25日に独立を宣言し、ユーゴスラビア社会主義連邦共和国を離脱しました。1990年12月23日に実施された国民投票では、スロベニアの有権者の88.2％が独立に投票しました。"
    yugoslav_war.CRO.t:0 "クロアチアの独立？"
    yugoslav_war.CRO.d:0 "1991年6月25日、同国はユーゴスラビア社会主義連邦共和国からの独立を宣言し、構成共和国としての地位を終わらせるための取り組みを完了させました。"
    yugoslav_war.BOS.t:0 "ボスニアの独立？"
    yugoslav_war.BOS.d:0 "1991年10月15日の主権宣言に続き、1992年2月29日と3月1日にユーゴスラビアからの独立を問う国民投票が行われました。この国民投票はボスニア・セルビア人の大多数によってボイコットされましたが、投票率64％のうち98％が提案に賛成しました。"
    yugoslav_war.KOS.t:0 "コソボの独立？"
    yugoslav_war.KOS.d:0 "1989年にセルビア当局によって解散させられましたが、アルバニア人の議員たちが地下活動を続けていた州議会は、1991年9月22日にコソボ共和国を主権を有する独立国家として宣言しました。投票率は87％で、有権者の99％以上が独立に賛成しました。"
    yugoslav_war.MCD.t:0 "マケドニアの独立？"
    yugoslav_war.MCD.d:0 "1991年9月8日に実施された国民投票では、投票者の95％がマケドニアの独立を支持しました。民族アルバニア人は、自らの憲法上の地位が劣等であると見なしたことに抗議して国民投票をボイコットしました。10月初旬、憲法委員会は新憲法の最終草案を採択しました。"
    chechen_war.RUS.t:0 "チェチェンの独立？"
    chechen_war.RUS.d:0 "第一次ロシア・チェチェン戦争とも呼ばれる第一次チェチェン戦争は、1994年12月11日から1996年8月31日にかけて、チェチェン共和国イチュケリアがロシア連邦に対して行った独立闘争でした。"
    kurdish_war.IRQ.t:0 "クルド人の独立？"
    kurdish_war.IRQ.d:0 "1991年のイラクの蜂起は、シーア派とクルド人が主導した、サダム・フセイン政権に対する民族的および宗教的な蜂起でした。この蜂起は、湾岸戦争終結後の停戦を経て、1991年3月から4月にかけて行われました。"
    gazan_war.PAL.t:0 "ガザの戦闘？"
    gazan_war.PAL.d:0 "2023年10月7日に開始されたイスラエルとハマス指導下のパレスチナ武装勢力との武力紛争は、主にガザ地区とその周辺で行われました。これは、ハマスがガザ地区からイスラエル南部に対して奇襲攻撃を仕掛けたことで始まりました。"
    cypriot_war.CYP.t:0 "北キプロスの蜂起"
    cypriot_war.CYP.d:0 "キプロス問題は、キプロス共和国を運営するギリシャ系キプロス人のコミュニティと、トルコ軍が展開している島北部のトルコ系キプロス人のコミュニティとの間で続いている紛争です。"
    isis_war.t:0 "ISISの蜂起"
    isis_war.d:0 "イスラム国は、シリア内戦に乗じて武装勢力がイラク北西部とシリア東部で広大な領土を征服した2014年に、世界的な有力度を獲得しました。2015年末までに、推定人口1200万人の地域を支配し、そこでは彼らの解釈によるイスラム法の強制が行われ、10億米ドルを超える年間予算を管理し、3万人以上の戦闘員を指揮していました。アメリカ、イラク、クルド軍との数年にわたる激しく消耗する戦闘を経て、2019年までに中東の領土をすべて失い、かつて支配していた地域において反乱戦術へと回帰しました。"
    biafran_war.NGE.t:0 "ビアフラ戦争？"
    biafran_war.NGE.d:0 "ビアフラ戦争は、ナイジェリアと、1967年にナイジェリアからの独立を宣言した分離国家であるビアフラ共和国との間で戦われた内戦でした。ビアフラはイボ民族のナショナリズム的な熱望を代表するものでした。彼らの指導部は、ナイジェリア北部のイスラム教徒ハウサ・フルアニの関心に支配された連邦政府とはもはや共存できないと考えていました。"
    bougainville_war.PNG.t:0 "ブーゲンビル紛争"
    bougainville_war.PNG.d:0 "ブーゲンビル内戦としても知られるブーゲンビル紛争は、1988年から1998年にかけてパプアニューギニア（PNG）の北ソロモン州で繰り広げられた多層的な武力紛争でした。この紛争は、PNGとブーゲンビル革命軍（BRA）の分離主義勢力、およびBRAとブーゲンビル島の他の武装勢力との間で戦われました。"
    Cabinda_war.ANG.t:0 "カビンダ戦争"
    Cabinda_war.ANG.d:0 "カビンダ戦争は、カビンダ解放戦線（FLEC）がアンゴラ政府に対して行った分離主義的な反乱です。FLECは、アンゴラのカビンダ州の境界内に位置する、自称カビンダ共和国の復興を目指しています。"
    Tigray_war.ETH.t:0 "ティグレ紛争"
    Tigray_war.ETH.d:0 "ティグレ紛争は、2020年11月3日から2022年11月3日まで続いた武力紛争でした。この戦争は主にエチオピアのティグレ地域において、エチオピア連邦政府と同盟を結んだエリトリア側と、ティグレ人民解放戦線（TPLF）との間で戦われました。"
    yemeni_war.YEM.t:0 "イエメン内戦"
    yemeni_war.YEM.d:0 "イエメン内戦は、2014年後半に主にラシャド・アル＝アリミ率いる大統領指導評議会と、マフディ・アル＝マシャト率いる最高政治評議会、およびそれらの支持者や同盟国との間で始まった多国間内戦です。双方がイエメンの公式政府であると主張しています。内戦は2014年9月にフーシ派が首都サナを占領したことで始まり、その後フーシ派による急速な政府掌握へと続きました。"
    Aceh_war.IDO.t:0 "アチェの反乱"
    Aceh_war.IDO.d:0 "アチェの反乱は、アチェ州をインドネシアから独立させることを目的として、1976年から2005年にかけて自由アチェ運動（GAM）によって戦われた紛争でした。2003年の強力な軍事攻勢と2004年のインド洋大地震を経て、和平合意が結ばれ、反乱は終結しました。"
    Kurdish_war.IRQ.t:0 "クルド人の蜂起"
    Kurdish_war.IRQ.d:0 "1991年のイラクにおける蜂起は、シーア派とクルド人が主導した、イラクのサダム・フセインの政権に対する民族的および宗教的な蜂起でした。この蜂起は、湾岸戦争終結後の停戦を経て、1991年3月から4月まで続きました。ほとんど調整されていなかったこの反乱は、イラク大統領サダム・フセインが体制変更に対して脆弱になったという認識によって煽られました。"
    LTTE_war.SRL.t:0 "スリランカ内戦"
    LTTE_war.SRL.d:0 "スリランカ内戦は、1983年から2009年までスリランカで行われた内戦です。1983年7月23日に始まり、ヴェランプライ・プラバカラン率いるタミルイーラム解放タミルタイガー（LTTE、タミル・タイガーとしても知られる）による政府に対する断続的な反乱でした。LTTEは、シンハラ人が支配するスリランカ政府によるスリランカ・タミル人への継続的な差別と暴力的な迫害を受け、島の北東部にタミルイーラムと呼ばれる独立したタミル国家を建設するために戦いました。"
    Darfur_war.SUD.t:0 "ダルフール紛争"
    Darfur_war.SUD.d:0 "ダルフール紛争は、スーダン・リベレーション・ムーブメント（SLM）と正義および平等運動（JEM）の反乱グループが、ダルフールの非アラブ系住民を弾圧しているとしてスーダン政府に対して戦いを始めた2003年2月に始まった、スーダンのダルフール地域における主要な武力紛争です。"
    Zapatista_Uprising.t:0 "サパティスタ蜂起"
    Zapatista_Uprising.d:0 "1994年1月1日、サパティスタ民族解放軍（EZLN）は、北米自由貿易協定の制定に抗議して、メキシコのチアパス州で12日間の蜂起を組織しました。反乱軍はチアパスの都市や町を占領し、囚人を釈放し、土地記録を破壊しました。メキシコ軍および警察との戦闘の後、1月12日に停戦が仲介されました。約300人が死亡しました。"
    moro_war.PHI.t:0 "モロ紛争"
    moro_war.PHI.d:0 "モロ紛争はフィリピンのミンダナオ地域における反乱であり、複数の武装グループが関与していました。モロ紛争の根本的な原因は、1898年のアメリカによるフィリピン併合を含む、外圧に対するバンサモロの人々の長い抵抗の歴史に関連しています。"
    CCW_war.ROC.t:0 "海南島 전투"
    CCW_war.ROC.d:0 "海南島の戦闘は、中国内戦の最終フェーズであった1950年に発生しました。中華人民共和国（PRC）は4月16日に海南島への水陸両用攻撃を行いました。島の内陸部の多くを支配していた海南共産主義活動の支援を受けた一方で、中華民国（ROC）は沿岸部を掌握していました。彼らの軍勢は北部の海口付近に集中していましたが、上陸後に南へ撤退を余儀なくされました。共産主義者は月末までに海南島の南部諸都市を確保し、5月1日に勝利を宣言しました。"
    chinese_civil_wars.option.1:0 "海南での戦争を停止する"
    chinese_civil_wars.option.2:0 "「まずは海南へ、そして台湾へ！」"
    maluku_war.IDO.t:0 "南モルッカの蜂起"
    maluku_war.IDO.d:0 "ジャワ人やイスラム教徒が主導するインドネシア共和国を不信に思った、主にプロテスタントで親オランダ派の南モルッカ人は、長らくオランダ領東インド王国軍（KNIL）に兵力を提供してきました。彼らは1950年4月25日にアンボンとセラムで南モルッカ共和国の独立を宣言しました。これはスカルノに認められず、彼の命令によりインドネシア軍はモルッカ諸島のブル島とセラム島の一部を侵略しました。"
    khuzestan_war.PER.t:0 "フーゼスターンの蜂起"
    khuzestan_war.PER.d:0 "1979年のフーゼスタン蜂起は、イラン革命の余波で発生したイラン全土における蜂起の一つでした。この騒乱はアラブ人の自治権を求める要求によって煽られました。蜂起はイランの治安維持部隊によって事実上鎮圧され、双方合わせて100人以上の死者を出しました。"
    azawad_war.MAL.t:0 "マリの戦争"
    azawad_war.MAL.d:0 "2012年3月22日、大統領選挙が実施される予定だった1カ月前、危機への対応をめぐってアマドゥ・トゥマニ・トゥレ大統領がクーデターによって追放されました。自らを民主主義および国家回復のための国家委員会（CNRDR）と呼ぶ反乱兵たちが支配を掌握し、マリの憲法を停止しました。クーデター後の不安定な情勢により、マリの北部における3つの主要都市、キダル、ガオ、トンブクトゥは3日連続で反乱軍に占領されました。2012年4月5日、ドゥエンツァの占領後、MNLAは目標を達成したと述べ攻勢を中止しました。翌日、MNLAはマリ北部の国からの独立を宣言し、その地をアザワドと改称しました。"
    kurdish_war.PER.t:0 "クルド人の反乱"
    kurdish_war.PER.d:0 "1979年にイランで起きたクルド人の反乱は、イラン革命後の新しい国家に対する、国内最大級の全国的な蜂起の一つでした。この反乱は革命が終結してからわずか2カ月後の3月中旬に始まり、近代イランにおける最も激しいクルド人の反乱の一つとなりました。"
    balochistan_war.PAK.t:0 "バロチスタン反乱"
    balochistan_war.PAK.d:0 "第4次バロチスタン紛争は、1973年から1977年まで続いた、パキスタンの最大の州であるバロチスタンにおけるパキスタン軍とバロチ分離主義者および部族間の4年間にわたる軍事紛争です。この紛争は、当時のパキスタン大統領ザルダリ・アリ・ブットが、イラク大使館でバロチ反乱軍向けと思われる兵器が発見されたという口実で、選出されたバロチスタン州政府を解任した直後の1973年に始まりました。正当に選出された政府の解任に対するその後の抗議活動は、バロチスタンの分離を求める声にもつながりましたが、ブットはパキスタン軍を州に投入する命令を下しました。"
    chechen_war_2.RUS.t:0 "第2次チェチェン戦争"
    chechen_war_2.RUS.d:0 "第二チェチェン戦争は、1999年8月から2009年4月にかけて、ロシア連邦と分離独立したチェチェン共和国（イチケリア）の間で、チェチェンおよび北コーカサスの境界地域で行われました。1999年8月、チェチェンからの過激派イスラム主義者がロシアのダゲスタンに侵入しました。その後の9月にはロシアの都市でアパート爆破事件が発生し、300人以上の死者が出ました。現場の指揮官であるか否かにかかわらず、チェチェン側からこの攻撃に対する責任を認める者は一人もいませんでしたが、ロシア当局は速やかにチェチェン人に爆破事件の責任を転嫁しました。初期段階の作戦において、ロシア軍と親ロシア派のチェチェン準軍事組織はチェチェン分離主義者と直接戦闘を行い、1999年12月から2000年2月まで続いた冬の包囲戦を経て、チェチェンの首都グロズヌイを占領しました。"
    bosnian_war.BOS.t:0 "ボスニア戦争"
    bosnian_war.BOS.d:0 "ボスニア戦争は、1992年から1995年にかけてボスニア・ヘルツェゴビナで行われた国際的な武力紛争でした。この戦争は、それ以前に発生したいくつかの暴力的な事件を受けて、1992年4月6日に始まったと一般的に見なされています。1995年12月14日のデイトン合意への署名によって終結しました。主な交戦勢力はボスニア・ヘルツェゴビナ共和国、ヘルツェグ・ボスニア共和国、およびスルプスカ共和国であり、後者の二つの勢力はそれぞれクロアチアとセルビアによって指導および支援を受けていたプロト国家でした。"
    tajikistani_war.TAJ.t:0 "タジキスタン内戦"
    tajikistani_war.TAJ.d:0 "タジキスタン内戦は1992年5月に始まり、1997年6月に終結しました。タジキスタンのガルムおよびゴルノ・バダフシャン地域の地域グループが、フジャンドおよびクローブ地域の出身者が主導するラフモン・ナビエフ大統領の新政府に対して蜂起しました。反乱グループは自由主義的な民主主義改革派とイスラム主義者の連合によって率いられ、彼らは後に統一タジク野党の名の下に組織されました。"
    angolan_war.ANG.t:0 "アンゴラ内戦"
    angolan_war.ANG.d:0 "アンゴラ内戦は、1975年に始まり、断続的な中断を挟みながら2002年まで続いたアンゴラでの内戦です。この戦争は、1975年11月にアンゴラがポルトガルから独立した直後に始まりました。これは、かつての反植民地ゲリラ活動であった共産主義者のアンゴラ解放人民運動（MPLA）と反共産主義のアンゴラ全面独立民族同盟（UNITA）による権力闘争でした。"
    mozambican_war.MOZ.t:0 "モザンビーク内戦"
    mozambican_war.MOZ.d:0 "モザンビーク内戦は、現地の紛争と冷戦の政治による二極化の影響が組み合わさり、1977年から1992年までモザンビークで戦われた内戦です。戦闘は、モザンビークの執政を担うマルクス主義のモザンビーク解放戦線（FRELIMO）、反共産主義の反乱勢力であるモザンビーク民族抵抗運動（RENAMO）、そしてPRM、UNAMO、COREMO、UNIPOMO、FUMOといった多数の小規模な派閥の間で行われました。"
    Casamance_war.SEN.t:0 "カサマンス紛争"
    Casamance_war.SEN.d:0 "カサマンス紛争は、1982年から続くセネガル南部での長期的な分離主義の闘争です。カサマンス民主勢力運動（MFDC）を中心とするこの紛争は、疎外、土地の権利、文化的アイデンティティをめぐる地域的な不満に端を発しています。地理的に孤立し民族的にも異なるカサマンスは、中央政府からの自治権を求めてきました。1990年代に激しい戦闘のピークを迎えましたが、その後も散発的な衝突や地雷の脅威を伴う低レベルの暴力が続いています。"
    kashmir_insurgency_war.t:0 "カシミール反乱"
    kashmir_insurgency_war.d:0 "1989年、政治機関への幻滅が武装蜂起を煽り、ジャム・カシミールは反乱の勃発へと至りました。ジャム・カシミール解放戦力によるルビア・サイードの誘拐は、その不安の象徴となりました。パキスタンの支援を受けた武装集団は官僚や市民を標的にし、地域の地政学と治安を塗り替える数十年にわたる紛争に火をつけました。"
    sudan_civil_war_2023.t:0 "スーダン内戦"
    sudan_civil_war_2023.d:0 "2023年4月15日以来、スーダンの軍事政府内の2つのライバル派閥の間で、激しい内戦が続いています。この紛争には、アブデルファター・アルブルハン将軍率いる、軍、海軍、空軍、および共和警備隊で構成されるスーダン武装部隊（SAF）が掌握する国際的に認められた政府と、より広範なジャンジャウィード連合を率いるヘメティ将軍率いる準軍事組織のラピッド支援部隊（RSF）が関わっています。"
    SSD_war.SUD.t:0 "アニャニャの反乱"
    SSD_war.SUD.d:0 "第一次スーダン内戦（アニャニャの反乱としても知られる）は、1955年から1972年にかけて、スーダンの北部と、代表権とさらなる地域の自治権を求めた南部スーダン地域との間で戦われました。この戦争は、初期のゲリラ戦、アニャニャの反乱の形成、政府内の政治的闘争、および南部スーダン解放運動の設立という4つの大きな段階に分かれていました。17年近くに及ぶ戦争の中で、約100万人が命を落としました。"
    
    historical_civil_wars.option.1:0 "戦争を開始する！"
    historical_civil_wars.option.2:0 "平和的なオプションを選択する。"
    
    historical_abolish_monarchy.t:0 "[SCOPE.sCountry('monarch_home_country').GetAdjective]君主制を廃止しますか？"
    historical_abolish_monarchy.d:0 "[SCOPE.sCountry('abolishing_monarchy_country').GetName]は現在、[SCOPE.sCountry('monarch_home_country').GetAdjective]君主による君主制です。しかし、歴史上この時期に、君主制は[SCOPE.sCountry('abolishing_monarchy_country').GetAdjective]大統領へと交代しました。我々も歴史に従い、同様の措置を講じるべきでしょうか？"
    historical_abolish_monarchy.option.1:0 "はい、君主制は過去の無用な遺物です。"
    historical_abolish_monarchy.option.2:0 "いいえ、我々は君主制を愛しています！"
    
    1950_recession.t:0 "戦後の不況"
    1950_recession.d:0 "1949年の不況は、トルーマン大統領の「フェア・ディール」経済改革の直後に始まった一時的な景気後退でした。第二次世界大戦の終結による余波が、この不況の主な原因であったと言われています。"
    1950_recession.f:0 "これは、経済が安定するまでに約1年を要する理由を示す、ゲーム内での口実です。"
    1971_bretton_woods_system.t:0 "ブレトン・ウッズ体制を終了させますか？"
    1971_bretton_woods_system.d:0 "国際収支の赤字、ベトナム戦争や「偉大な社会」プログラムによって生じた公的負債の増大、そして連邦準備制度による通貨インフレが、ドルの過大評価を招きました。1971年には、軍事および社会プログラムへの政府支出を賄うために、ワシントンで増刷された大量のドルが海外へと流出していました。1971年の最初の6ヶ月間で、220億米ドル相当の資産が米国から流出しました。これを受けて、1971年8月15日、ニクソンは大統領令11615を発令し、一方的に金窓口を閉鎖しました。これにより、公開市場を除き、ドルと金の直接的な兌換が不可能となりました。"
    1971_bretton_woods_system.f:0 "これは歴史的な出来事です。"
    1971_bretton_woods_system.1:0 "ブレトン・ウッズ体制を終結させる"
    1971_bretton_woods_system.2:0 "いかなる犠牲を払っても体制を維持せよ！"
    2000_new_year.t:0 "新千年紀の幕開け"
    2000_new_year.d:0 "2000年（MM）は、グレゴリオ暦で土曜日に始まった世紀のうるう年でした。2000年は時に「Y2K」と略されます（「Y」は「year」、「K」は「千」を意味する「kilo」の頭文字です）。2000年はY2K問題の対象となりました。これは、コンピューターが1999年から2000年へ正しく移行できないのではないかという懸念です。しかし、1999年末までに、多くの企業がすでに新しいソフトウェアへの移行、あるいは既存のソフトウェアのアップグレードを完了していました。中にはY2K認証を取得した企業さえありました。大規模な努力の結果、発生した問題は比較的少数にとどまりました。"
    2000_new_year.f:0 "2000年が未来への歩みを助けてくれるのであればそれで良いのですが、人々がそれを終止符のように捉え、その後は一息つけると考えてしまっているのではないかと危惧しています。……実際には、そんなことはできないのです。"
    communist_economic_liberalisation.t:0 "[ROOT.GetCountry.GetAdjectiveNoFlag]的な社会主義？"
    communist_economic_liberalisation.d:0 "[ROOT.GetCountry.GetAdjectiveNoFlag]経済の困窮により、完全計画経済を終わらせて民間企業を容認するために、政府が国家経済を自由主義化することが提案されています。このような行動は、現在この国を苦しめている経済問題の解決を約束するものです。"
    communist_economic_liberalisation.f:0 "[ROOT.GetCountry.GetAdjectiveNoFlag]経済が不健全であるため、このイベントが発生しました。"
    SOV_Kosygin_Reforms.t:0 "コシギンの経済改革？"
    SOV_Kosygin_Reforms.d:0 "コシギンの経済改革は、ソ連の経済における一連の計画的な変更でした。これらの変更の目玉は、企業の成功を示す2つの主要な指標として、収益性と売上を導入することでした。企業の利益の一部は、労働者への報酬や事業拡大に用いられる3つの基金に充てられ、その大部分は中央予算に組み入れられました。これは、ソ連の数学志向の経済計画立案者たちの長年の願いを反映したものであり、経済計画のプロセスにおける分権化の進展へと舵を切るものとなりました。"
    Indian_Economic_Liberalisation.t:0 "インドにおける経済自由化？"
    Indian_Economic_Liberalisation.d:0 "インドにおける経済自由化とは、国の経済をより市場志向かつ消費主導のものにすることを目的に、その経済を世界に向けて開放することを目指した一連の政策変更を指します。その目標は、経済成長と発展を達成するための手段と見なされていた民間および国外投資の役割を拡大することでした。1966年と1980年代初頭にも自由化への試みはありましたが、より徹底した自由化は1991年に開始されました。"
    HUN_NEM_Reforms.t:0 "新経済メカニズム？"
    HUN_NEM_Reforms.d:0 "新経済メカニズム (NEM) は、1968年にハンガリー人民共和国で開始された主要な経済改革でした。1972年から1978年にかけては、東側陣営の政治的情勢によって制限されました。その後の10年間、1989年の革命がこの時代を終わらせるまで、NEMという名称が強調されない場合であっても、NEMの原則はハンガリー経済に影響を与え続けました。NEMのおかげで、1980年代のハンガリーは、他のどの東側陣営の経済よりも中央計画に対する市場メカニズムの比率が高い状態にありました。"
    PRC_GLF_Reforms.t:0 "大躍進？"
    PRC_GLF_Reforms.d:0 "大躍進は、中国共産党（CCP）が主導した1958年から1962年にかけての中華人民共和国（PRC）における経済的および社会的なキャンペーンでした。党主席の毛沢東は、人民公社の形成を通じて、国を農業経済から工業化社会へと再建するためにこのキャンペーンを開始しました。毛沢東は、穀物収量を倍増させ、農村に産業をもたらすための取り組みを強化すべきだと布告しました。"
    SOV_VLC_Reforms.t:0 "処女地開拓運動？"
    SOV_VLC_Reforms.d:0 "処女地開拓運動は、ソ連の国民を苦しめていた食料不足を緩和するために、ソ連の農業生産を劇的に増強しようとしたニキータ・フルシチョフの1953年の計画でした。何十万人もの若い志願兵が西シベリアや北カザフスタンの地域に入植し、農耕を行いました。この計画は最終的にソ連の農業にとって甚大な災厄となりましたが、当初は成功を収めていました。"
    EGR_NES_Reforms.t:0 "新経済体制"
    EGR_NES_Reforms.d:0 "新経済体制は、1963年にドイツ民主共和国（GDR）の執政党である社会主義統一党（SED）によって実施された経済政策でした。その目的は、1951年以降にGDRの経済運営に使用されてきた五カ年計画の体制を置き換えることでした。この体制は、既存の中央計画のパフォーマンスを向上させ、経済を可能な限り効率的な方法で運営できるようにするために、ヴァルター・ウルブリヒトによって導入されました。"
    SOV_economic_perestroika.t:0 "協同組合法？"
    SOV_economic_perestroika.d:0 "1988年5月に制定された協同組合法は、ゴルバチョフ時代の初期における経済改革の中で、おそらく最も急進的なものでした。1928年にウラジーミル・レーニンの新経済政策が廃止されて以来初めて、この法律はサービス、製造、および対外貿易部門における事業の民間所有を認めました。"
    BUL_NEM_Reforms.t:0 "新経営管理体制？"
    BUL_NEM_Reforms.d:0 "改革の具体的な動機は、労働力とエネルギーの不足、そして1960年代半ばの「雪解け」時代における対外貿易の重要性の高まりでした。その結果、1962年の第四次五カ年計画によって経済改革の時代が始まり、集中的な成長という従来の目標に対して一連の新しいアプローチがもたらされました。産業においては、1964年に「新管理システム」が導入され、1968年まで続きました。このアプローチは、経済ユニットを合理化し、企業管理者に業績への責任をより持たせることを目的としていました。"
    CHI_USA_Investment.t:0 "中国で国外投資を促進しますか？"
    CHI_USA_Investment.d:0 "冷戦時代、中国の第三世界との貿易の重要な部分は、補助金や信用枠、その他の形態の支援を通じて賄われていました。しかし、1976年の毛沢東の死後、これらの取り組みは縮小されました。その後、発展途上国との貿易はわずかなものとなりましたが、その一方で香港と台湾の両方が主要な貿易パートナーとして台頭し始めました。1970年代後半に経済改革が始まって以来、中国は国際的な貿易システムに統合されるため、対外貿易システムの分権化を図ってきました。"
    DAI_USA_Investment.t:0 "ベトナムで国外投資を促進しますか？"
    DAI_USA_Investment.d:0 "1990年、民間企業に法的根拠を与える民間企業法が制定され、一方で会社法によって株式会社と非公開有限責任会社が認められました。同年、政党は国有企業の民営化の可能性について議論を開始すると同時に、中華人民共和国との関係の正常化も進めました。その後、1992年憲法によって民間部門の役割が公式に承認されました。対外貿易は国家によって中央管理されていましたが、国家は対外貿易の支配を緩め始めました。"
    SOV_USA_Investment.t:0 "ソ連で国外投資を促進しますか？"
    SOV_USA_Investment.d:0 "ゴルバチョフは、当時のソ連の経済学者が大胆とみなした措置によって、ソ連の対外経済部門にペレストロイカをもたらしました。彼の計画は、対外貿易省がかつて大半の貿易業務において保持していた独占権を事実上排除しました。これにより、様々な工業・農業部門の各省は、貿易省組織の官僚制度を通じて間接的に運営するのではなく、自らの責任下にある部門において対外貿易を行うことが可能になりました。加えて、地域の組織や現地の組織、そして個々の国営企業も対外貿易を行うことが許可されました。"
    PRC_LRR_Reforms.t:0 "土地改革活動？"
    PRC_LRR_Reforms.d:0 "土地改革活動は、1945年に日中戦争が終結した後の中国内戦の後半フェーズ、およびその後の初期の中華人民共和国において、中国共産党（CCP）のリーダーである毛沢東によって主導された大衆活動であり、農民への土地再分配を実現しました。地主――その地位は理論上、労働ではなく搾取から得られる収入の割合によって定義されていました――は土地を没収され、共産党と元小作人による大量殺害の対象となりました。推定死者数は数十万人から数百万人にも及びます。"
    NVM_LRR_Reforms.t:0 "土地改革キャンペーン？"
    NVM_LRR_Reforms.d:0 "1953年、土地改革に関する一連の布告と法律が発表されました。ベトナム労働党の中央委員会は、土地革命の最終フェーズである農業用地の再分配への移行の可能性を検討しました。これに続き、1953年12月19日に公表された最も重要な土地改革法が、土地改革の基盤および前提とみなされるものとなりました。全国大会でその法律が可決されると、間もなく1953年12月から1954年3月にかけてタイグエン省で土地改革の試験的な波が起こりました。その後、土地改革は5つの波を経てより広い地域へと拡大しました。"
    SRL_NEM_Reforms.t:0 "スリランカの経済改革？"
    SRL_NEM_Reforms.d:0 "ジュニアス・リチャード・ジャヤワルデネは、スリランカの弁護士、公務員、そして政治家でした。1977年から1978年までスリランカの首相を務め、1978年から1989年までスリランカの第2代大統領を務めました。スリランカの歴史における論争を呼ぶ人物でしたが、彼が1978年に導入した開放的な経済システムは、それ以前の閉鎖的な経済政策の結果としてスリランカが直面していた経済的混乱から国を救い出しました。"
    PER_NEM_Reforms.t:0 "白い革命？"
    PER_NEM_Reforms.d:0 "白い革命とは、1963年1月26日にシャーであるモハンマド・レザ・パフラヴィーによって開始され、1979年まで続いた、イラン帝国における積極的な近代化をもたらした広範囲にわたる一連の改革のことです。この改革は、イランの労働者階級への多大な財力の再分配、その後の数十年にわたる爆発的な経済成長、急速な都市化、そしてイランの封建的な慣習の解体をもたらしました。"
    european_welfare_state.t:0 "[ROOT.GetCountry.GetAdjectiveNoFormatting]の福祉国家？"
    european_welfare_state.d:0 "欧州の政治経済は、1950年代以降、各欧州諸国で多かれ少なかれ包括的な福祉モデルが発展したことによって定義されてきました。このモデルにおいて、国家はさまざまな社会保障を提供し、その中でも最もコストがかかるのは、年金、貧困層への支援、社会住宅、そして医療です。"
    PER_ELR_Reforms.t:0 "イランの経済自由化？"
    PER_ELR_Reforms.d:0 "アリ・アクバル・ハシミ・バフラマニ・ラフサンジャニは、イランの政治家であり作家でした。1989年から1997年までイランの第4代大統領を務めました。彼は国内においては国有産業の民営化を支持する資本主義的な自由市場の立場をとり、国際的には米国や西側諸国との衝突を避けようとする穏健な立場をとりました。"
    ISR_ELR_Reforms.t:0 "イスラエルの経済自由化？"
    ISR_ELR_Reforms.d:0 "ラビンはイスラエルの経済、ならびに教育と医療システムを大幅に改革しました。彼の政府はビジネスの民営化を大幅に進め、この国の伝統的な社会主義経済から脱却しました。1993年、彼の政府は「ヨズマ」プログラムを設立しました。このプログラムでは、イスラエルに投資し、政府の資金提供によって投資額を倍増させることを約束した外国のベンチャーキャピタル・ファンドに対して、魅力的な税制優遇措置が提供されました。その結果、外国のベンチャーキャピタル・ファンドが成長するイスラエルのハイテク産業に多額の投資を行い、イスラエルの経済成長と、ハイテク分野における世界のリーダーとしての地位に貢献しました。"
    oil_crisis_1973.t:0 "第一次石油危機？"
    oil_crisis_1973.d:0 "1973年10月、アラブ石油輸出国機構（OAPEC）は、1973年のヨム・キプル戦争において、いかなる時点においてもイスラエルを支援した国々に対し、全面的な石油禁輸を実施すると発表しました。この戦争は、エジプトとシリアが、1967年の六日戦争でイスラエルに失った領土を奪還しようとする、最終的に失敗に終わった大規模な奇襲攻撃を行ったことで始まりました。禁輸の発動後、石油危機、あるいは「ショック」が発生し、世界経済と世界政治の両方に、短期的および長期的な多くの影響を及ぼしました。"
    oil_crisis_1979.t:0 "第二次石油危機？"
    oil_crisis_1979.d:0 "イラン革命に伴う石油生産の減少により、1979年にエネルギー危機が発生しました。世界の石油供給は約4パーセントしか減少しませんでしたが、石油市場の反応により、その後の12か月間で原油価格は劇的に上昇し、$39.50 per barrel ($248/m3にまで2倍以上に跳ね上がりました。この突然の価格上昇は、1973年の石油危機と同様の燃料不足に関連していました。"
    GUA_Land_Reforms.t:0 "布告900を制定しますか？"
    GUA_Land_Reforms.d:0 "布告900は、グアテマラ革命の最中である1952年6月17日に可決された、グアテマラの土地改革法です。この法律は大統領ハコボ・アルベンツ・グスマンによって導入され、グアテマラ議会によって可決されました。未使用の90ヘクタール（224エーカー）を超える面積の土地を現地の農民に再分配し、地主には国債で補償を行いました。最大1,700の農園から土地が再分配され、国の人口の6分の1にあたる約50万人の個人に渡りました。この法律の目的は、グアテマラの経済を疑似封建制から資本主義へと移行させることでした。"
    historical_oil_production.t:0 "[ROOT.GetCountry.GetAdjectiveNoFormatting]の石油産業を発展させますか？"
    historical_oil_production.d:0 "[ROOT.GetCountry.GetName]の測量士たちが、国内の特定地域で[GetGoods('oil').GetName]を発見しました。これにより、[ROOT.GetCountry.GetName]の産業リーダーたちは、この新発見の資源を利用するために[concept_government]へ[GetBuildingType('building_oil_rig').GetName]の建設を要請しています。"
    GBR_brexit.t:0 "ブレグジットを行いますか？"
    GBR_brexit.d:0 "ブレグジットとは、イギリスの欧州連合（EU）からの脱退を指します。2016年6月23日にイギリスで行われた国民投票を経て、ブレグジットは2020年1月31日23:00 GMT（中央欧州時間2020年2月1日00:00）に正式に実施されました。1973年1月1日にEUの前身である欧州共同体（EC）に加盟したイギリスは、EUから脱退した唯一の加盟国です。ブレグジット後、EU法および欧州連合司法裁判所は、もはやイギリスの法律に対して優越性を持ちません。「欧州連合（離脱）法2018」は、関連するEU法を国内法として保持しており、イギリスはこれを修正または廃止することができます。"
    JAP_ELR_Reforms.t:0 "アベノミクスを制定しますか？"
    JAP_ELR_Reforms.d:0 "アベノミクスとは、2012年12月の総選挙以来、日本政府によって実施されてきた経済政策を指します。アベノミクスは、日本銀行による金融緩和、政府支出による財政刺激策、そして構造改革という「三本の矢」に基づいています。エコノミスト誌は、このプログラムを「リフレ、政府支出、そして20年以上にわたって経済を停滞させてきた休眠状態から脱却させるために設計された成長戦略の混合物」と評しました。「アベノミクス」という用語は、安倍とエコノミクスの混成語です。"
    PHI_ELR_Reforms.t:0 "経済の自由化を制定しますか？"
    PHI_ELR_Reforms.d:0 "FVRとして広く知られるフィデル・バルデス・ラモス（CCLH GCS KGCR）は、1992年から1998年までフィリピン共和国の第12代大統領を務めたフィリピンの将軍であり、政治家でした。ラモス政権下では、かつて閉鎖的だった国家経済を開放し、民間企業を奨励し、より多くの国内外からの投資を呼び込み、汚職を削減することを目的とした経済改革が開始されました。またラモスは、空の独占権を政府から剥奪し、航空業界を新たなプレイヤーへと開放しました。"
    USA_Trade_War_2025.t:0 "トランプ貿易戦争？"
    USA_Trade_War_2025.d:0 "ドナルド・トランプの第2期政権下で実施された関税は、米国における保護主義的な貿易政策の急激な深刻化を象徴するものでした。ドナルド・トランプ大統領は、米国に輸入されるほぼすべての商品に対して一連の厳しい関税を発表しました。物議を醸している「相互関税」と呼ばれるこの発表は、貿易相手国による報復を招き、株式市場の暴落を引き起こしました。"
    SOV_Kosygin_Reforms_Rollback.t:0 "コシギンの改革の失敗？"
    SOV_Kosygin_Reforms_Rollback.d:0 "1965年のソ連の経済改革は、E.G.リベルマンにちなんでコシギンの改革またはリベルマンの改革と呼ばれることもあり、ソ連における計画的な経済変更の一連の施策でした。これらの変更の核心は、企業の成功を示す2つの主要な指標として、収益性と売上高を導入することでした。しかし、当該改革の成功は短命に終わり、モスクワが東側陣営の諸国へ改革を強行したことで引き起こされた1968年のプラハ事件により、改革は縮小へと追い込まれました。"
    SPA_ELR_Reforms.t:0 "経済の自由化を受け入れますか？"
    SPA_ELR_Reforms.d:0 "1936年から1939年の内戦による荒廃からの回復が非常に遅れた後、フランシスコ・フランコの支持を得た経済「テクノクラート」のグループが推進した改革によって、「経済の奇跡」が始まりました。彼らはスペインの経済発展のための新しい政策を導入しました。多くがオプス・デイのメンバーであった「テクノクラート」は、旧来のファランヘ党の守旧派に取って代わった新しいタイプの政治家でした。彼らは自給自足政策を放棄し、貿易の自由化と産業の急速な成長をもたらす「開発計画」を実施しました。"
    SIR_ELR_Reforms.t:0 "経済の自由化を受け入れますか？"
    SIR_ELR_Reforms.d:0 "「ケルトの虎」とは、海外直接投資によって急速な実質経済成長を遂げた1990年代半ばから2000年代後半にかけてのアイルランド経済を指す言葉です。歴史家のR・F・フォスターは、その原因は新たな主導権の意識とインテルなどの米国企業の参入が組み合わさったものだと主張しています。彼は、主な要因は低税率、親企業的な規制政策、そして技術に精通した若い労働者層であったと結論付けています。多くの多国籍企業にとって、アイルランドでのビジネスを行う決定は、産業開発局による手厚い優遇措置によってさらに容易なものとなりました。"
    XEU_EE_Expansion_2004.t:0 "欧州連合に加盟しますか？"
    XEU_EE_Expansion_2004.d:0 "州の数と人口の観点から見た欧州連合（EU）の最大規模の拡大は、2004年5月1日に行われました。同じ拡大の波の一部として、2004年には加盟できなかったブルガリアとルーマニアが2007年に加盟しましたが、欧州委員会によれば、これらは第5次拡大の一部を構成しています。"
    GBR_ELR_Reforms.t:0 "ビッグバン？"
    GBR_ELR_Reforms.d:0 "マーガレット・サッチャー率いる1980年代の保守党政府は、マネタリズム、金融セクターを中心とした規制緩和（例えば1986年のビッグバン）、労働市場の規制緩和、国有企業の売却（民営化）、およびその他の分野への助成の撤廃という急進的な政策を開始しました。"
    BRU_SGP_Reforms.t:0 "ブルネイ・シンガポール経済パートナーシップ？"
    BRU_SGP_Reforms.d:0 "シンガポールとブルネイは、信頼と相互尊重に根ざした、極めて深い経済的・戦略的パートナーシップを共有しています。両国の通貨互換協定、防御協力、そして金融、エネルギー、教育における合弁事業は、永続的な結びつきを反映しています。"
    PER_Oil_Nationalisation_1951.t:0 "イランの石油産業を国有化しますか？"
    PER_Oil_Nationalisation_1951.d:0 "1951年、モハマド・モサデク率いるイラン議会は、アングロ・イラン石油会社の国有化を決定しました。この大胆な動きはイランの石油に対する英国の支配を終わらせ、イラン国立石油会社の形成へとつながりました。これは英国や米国をはじめとする国際的な反発を招きました。"
    GCC_Union.t:0 "湾岸協力会議？"
    GCC_Union_1.t:0 "湾岸協力会議を拡大しますか？"
    GCC_Union_2.t:0 "湾岸協力会議に加入しますか？"
    GCC_Union.d:0 "湾岸協力会議（GCC）として知られるアラブ湾岸諸国協力会議は、バーレーン、クウェート、オマーン、カタール、サウジアラビア、アラブ首長国連邦で構成される、地域的、政府間、政治的、経済的な統合および同盟です。同会議の主要な司令部は、サウジアラビアの首都リヤドに位置しています。GCCの認可は1981年5月25日に署名され、この機関が正式に設立されました。"
    Eurasian_Economic_Community.t:0 "ユーラシア経済共同体？"
    Eurasian_Economic_Community.d:0 "ユーラシア経済共同体（EAECまたはEurAsEC）は、加盟州の経済的統合を目指した2000年から2014年までの地域組織でした。この組織は1996年3月29日に独立国家共同体（CIS）から派生し、2000年10月10日にカザフスタンの首都アスタナでユーラシア経済共同体の設立に関する条約が署名されました。"
    Eurasian_Single_Market.t:0 "ユーラシア関税同盟？"
    Eurasian_Single_Market.d:0 "ユーラシア関税同盟は、ユーラシア経済同盟（EAEU）の加盟州であるアルメニア、ベラルーシ、カザフスタン、キルギス、ロシアによる関税同盟です。同盟内での商品の自由な移動と、同盟外から流入する商品に対する共通の対外関税を規定しています。"
    Mercosur_Economic_Community.t:0 "アスンシオン条約？"
    Mercosur_Economic_Community.d:0 "1991年3月26日にアルゼンチン、ブラジル、パラグアイ、ウルグアイによって署名されたアスンシオン条約は、共通市場を確立するためにメルコスールを創設しました。オウロ・プレト条約によって補完され、法的承認を得ました。これは1994年までの自由貿易圏の実現を目指し、貿易関税の段階的な撤廃を概説したものです。"
    Mercosur_Single_Market.t:0 "オウロ・プレト議定書？"
    Mercosur_Single_Market.d:0 "1994年のオウロ・プレト議定書は、4年前のアスンシオン条約においてメルスールの当初の4州であるアルゼンチン、ブラジル、パラグアイ、ウルグアイによって定められた、関税同盟を設立するための経済政策の継続でした。これにより、メルコスールは国際的な関税同盟として正式に確立されました。"
    Andean_Economic_Community.t:0 "アンデス自由貿易圏？"
    Andean_Economic_Community.d:0 "カルタヘナ協定に基づいて設立されたアンデス自由貿易圏は、1993年1月1日に本格的な運用を開始し、ボリビア、コロンビア、エクアドル、ベネズエラを関税のない貿易で結びました。これは地域統合に向けた決定的な一歩となり、後にアンデス共同体（CAN）へと発展し、1997年にはペルーが再加入しました。"
    SACU_Single_Market.t:0 "南部アフリカ関税同盟？"
    SACU_Single_Market.d:0 "1910年に形成された南部アフリカ関税同盟（SACU）は、ボツワナ、エスワティニ、レソト、ナミビア、南アフリカを結ぶ世界最古の関税同盟です。共通の対外関税とメンバー間の商品の自由な移動を確立しており、関税収入は集約され分配されます。SACUは南部アフリカにおける地域経済協力の礎であり、南アフリカの支配的な経済と公平な分配のためのメカニズムのバランスを保っています。"
    EAC_Single_Market.t:0 "東アフリカ共同体関税同盟？"
    EAC_Single_Market.d:0 "2000年に復活した東アフリカ共同体（EAC）は、ブルンジ、ケニア、ルワンダ、南スーダン、タンザニア、ウガンダ、コンゴ民主共和国を一つの地域陣営として結集させています。その単一市場イニシアチブは、メンバーの州を越えた商品、サービス、資本、人々の自由な移動の確立を目指しており、貿易政策を調和させ、より深い統合を促進しています。EACは、アフリカにおける経済的統一と共同発展のための最も野心的なプロジェクトの一つです。"
    CEMAC_Economic_Community.t:0 "ブラザヴィル条約？"
    CEMAC_Economic_Community.d:0 "中央アフリカ関税経済同盟（UDEAC）は、1964年12月8日に署名されたブラザヴィル条約によって創設され、1966年1月1日に発効しました。これはカメルーン、中央アフリカ共和国、チャド、コンゴ共和国、ガボンを結集させ、その後1985年には赤道ギニアが加入しました。UDEACはメンバー間の自由貿易と共通の対外関税を確立し、より深い地域統合の基礎を築きました。"
    CEMAC_Single_Market.t:0 "CEMAC条約？"
    CEMAC_Single_Market.d:0 "中央アフリカ経済通貨共同体（CEMAC）は、中央アフリカ関税経済同盟（UDEAC）の後継として、1994年1月16日にチャドのンジャメナで条約により設立されました。これはカメルーン、中央アフリカ共和国、チャド、コンゴ共和国、赤道ギニア、ガボンを関税同盟および通貨同盟によって統合しました。CEMACは共通の対外関税、メンバー間の商品の自由な流通、そして中央アフリカ諸国銀行が管理する共通通貨である中央アフリカCFAフランを導入しました。"
    WAEMU_Single_Market.t:0 "ダカール条約？"
    WAEMU_Single_Market.d:0 "西アフリカ経済通貨同盟（WAEMU、フランス語ではUEMOA）は、1994年1月10日にセネガルのダカールで条約により設立されました。これはベナン、ブルキナファソ、コートジボワール、マリ、ニジェール、セネガル、トーゴを統合し、1997年にはギニアビサウが加入しました。WAEMUは共通の対外関税と商品の自由な流通を伴う関税同盟と、西アフリカ中央銀行（BCEAO）が管理する共通の西アフリカCFAフランに基づく通貨同盟の両方を創設しました。"
    CACM_Economic_Community.t:0 "テグシガルパ議定書？"
    CACM_Economic_Community.d:0 "中央アメリカ統合システム（SICA）は、1991年にテグシガルパ議定書によって設立され、政治、経済、社会、環境協力の枠組みの下で中央アメリカの国々を統合しています。これは地域の関税、治安維持、開発政策を調整し、民主主義の強化、統合の促進、そして地域全体の持続可能な成長を目指しています。"
    CHI_Hainan_SAR.t:0 "ハイナン自由貿易港？"
    CHI_Hainan_SAR.d:0 "ハイナン自由貿易港は中国ハイナンにある自由貿易港です。離島であるハイナンは、中華人民共和国における最大の経済特区でもあります。ここは中国が経済改革を全面的に深化させ、最高レベルの開放政策を試験的に導入するための特別区域とみなされています。ハイナン島全体が経済開発特区とみなされているため、ハイナン自由貿易港は一般的な意味での港ではありません。"
    CHI_One_Child_Policy_1980.t:0 "一人っ子政策？"
    CHI_One_Child_Policy_1980.d:0 "一人っ子政策は、多くの家庭を単一の子供に制限することで中国の人口増加を抑制するために、1979年から2015年の間に実施された中国の人口計画策です。このプログラムは社会的、文化的、経済的、そして人口統計学的に広範な影響を及ぼしましたが、より広範な計画に対する一人っ子制限の貢献については議論の対象となっています。出生率の低下における有効性と、人権の観点からの正当性は、議論の的となってきました。"
    MLD_HND_Reforms.t:0 "インド・モルディブ二国間貿易協定？"
    MLD_HND_Reforms.d:0 "1981年に署名された二国間貿易協定に基づき、両国は互いに最恵国待遇を与えることに合意しました。この協定の規定の中で、インドはモルディブに対し、インド国内では輸入禁止または制限対象となる可能性のある特定の品目についても提供を続けています。米、小麦粉、砂糖、ジャガイモ、玉ねぎ、卵、野菜、さらには川砂や建設資材といった品目の大部分がインドから輸入されており、これによってモルディブは、この分野で成長するインド人投資家にとって魅力的な市場となっています。"
    PHI_First_Policy.t:0 "フィリピン第一主義政策？"
    PHI_First_Policy.d:0 "フィリピン・ファーストとは、当時のフィリピン大統領カルロス・P・ガルシア政権によって初めて導入・実施された、保護主義的かつ経済ナショナリズム的な政策を指します。この政策の下では、フィリピン資本の企業が外国企業よりも優先され、フィリピン人によるフィリピン製製品の愛用も促進されました。ガルシアは1958年8月28日の国家経済評議会決議第202号の発行により、この政策を初めて制定しました。"
    
    GBR_IRE_customs_union_special.tt:0 "ウィンザー枠組みの実施 - #y $NIR$#!と[ROOT.GetCountry.GetName]の間に内部関税境界を、[SCOPE.sCountry('SIR_scope').GetName]と#y $NIR$#!の間に[concept_customs_union]を設置する"
    
    western_economic_liberalisation.t:0 "経済の自由化？"
    western_economic_liberalisation.d:0 "新自由主義は、第二次世界大戦後の衰退を経て、自由市場資本主義と結びつくようになりました。保守派や右派リバタリアンの組織、政党、シンクタンクの台頭における主要な要因であり、主にそれらによって提唱されてきました。一般的に、経済や社会における民間部門の役割を拡大するために、民営化、規制緩和、グローバル化、自由貿易、マネタリズム、緊縮財政、および政府支出の削減を含む経済自由化政策と関連付けられています。"
    western_economic_liberalisation.f:0 "このイベントにより、[ROOT.GetCountry.GetAdjectiveNoFlag]経済の自由市場のレベルが1段階上昇します。"
    historical_economy_western.option.1:0 "自由市場の影響力をさらに拡大せよ！"
    historical_economy_western.option.2:0 "今あるもので十分だ。"
    
    historical_economy.1:0 "興味深いな"
    historical_economy_2000.1:0 "あけましておめでとう！"
    
    historical_economy_communist.option.1:0 "資本主義を受け入れろ！"
    historical_economy_communist.option.2:0 "資本主義になるくらいなら、貧乏なままでいい。"
    
    PRC_GLF_Reforms.option.1:0 "炉に火を入れろ！"
    PRC_GLF_Reforms.option.2:0 "「大後退」の間違いじゃないのか？"
    
    SOV_VLC_Reforms.option.1:0 "やってやろう！"
    SOV_VLC_Reforms.option.2:0 "なんて陳腐なアイデアだ……"
    
    great_leap_forward:0 "大躍進"
    virgin_lands_campaign:0 "処女地開拓運動"
    
    irish_open_border.t:0 "アイルランドの開放された国境"
    irish_open_border.d:0 "歴史的な理由により、アイルランド南部とアイルランド北部の間の国境は開放されたままとなっています。その結果、アイルランド島の両方の地域の市民が、自由に移動することができます。これはゲーム内では、[SCOPE.sCountry('irish_country').GetName]を[SCOPE.sCountry('british_country').GetName]の関税同盟に組み込むことで表現されます。"
    irish_open_border.f:0 "このイベントは、孤立主義の法律を制定するか、非民主的な政体になるか、あるいは[SCOPE.sCountry('british_country').GetName]との陸上国境を共有しなくなることで回避できます。"
    
