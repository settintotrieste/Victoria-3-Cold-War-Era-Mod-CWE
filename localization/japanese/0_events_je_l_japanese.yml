    je_G8_system:0 "G[GetPlayer.MakeScope.Var('G8_members_counter').GetValue]"
    je_G8_system_reason:0 "G[GetPlayer.MakeScope.Var('G8_members_counter').GetValue]は、民主的な[Concept('concept_major_power','$concept_major_powers$')]からなる政府間政治・経済フォーラムです。\n\n財務大臣によるアドホックな集まりを起源とするG[GetPlayer.MakeScope.Var('G8_members_counter').GetValue]は、以来、貿易、安全保障、経済、気候変動といった主要な世界的課題に対する解決策を議論し、調整するための、正式かつ注目度の高い場となっています。\n\nG[GetPlayer.MakeScope.Var('G8_members_counter').GetValue]は条約に基づくものではなく、常設の事務局や事務所も持ちません。加盟国間で毎年交代する議長国によって組織されており、議長国がグループの優先事項を設定し、サミットを主催します。"
    
    G8_president_label.tt:0 "管区：[SCOPE.sCountry('G8_president_label').GetName]"
    
