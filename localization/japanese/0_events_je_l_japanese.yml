    british_rhodesia_nyasaland.sgc.t:0 "ローデシア・ニャサランド連邦？"
    british_rhodesia_nyasaland.sgc.d:0 "ローデシア・ニャサランド連邦は、中央アフリカ連邦（CAF）としても知られる植民地連邦でした。この連邦は、自治権を持つ英国植民地である南部ローデシアと、英国の保護国である北部ローデシアおよびニャサランドの3つの南部アフリカ領土で構成されていました。"
    british_malaysia.sgc.t:0 "マレーシアの形成？"
    british_malaysia.sgc.d:0 "マレーシア連邦は、1963年9月16日にマラヤ連邦、シンガポール、北ボルネオ（サバ）、サラワクが合併して形成されました。"
    british_decolonisation.20.option.1:0 "植民地をマラヤに割譲する"
    british_decolonisation.20.option.2:0 "「植民地は英国のままであるべきだ！」"
    british_west_indies.sgc.t:0 "西インド諸島連邦を形成する？"
    british_west_indies.sgc.d:0 "西インド諸島連邦は、1958年1月3日から1962年5月31日まで存在した短命な政治連合でした。トリニダード・トバゴ、バルバドス、ジャマイカ、リーワード諸島およびウィンドワード諸島の島々を含む、大英帝国の構成員であったカリブ海の様々な島々が集まって連邦を形成し、その首都はトリニダード・トバゴのポート・オブ・スペインに置かれました。連邦の明示された目的は、単一の国家として英国から独立する政治的ユニットを創設することでした。"
    british_singapore.sgc.t:0 "シンガポールに自治権を？"
    british_singapore.sgc.d:0 "$generic_self_rule_decolonisation_loc_desc$"
    british_singapore_state.sgc.t:0 "シンガポールにさらなる自治権を？"
    british_singapore_state.sgc.d:0 "脱植民地化の一環として、また英国のマレー半島への関与を強める流れの中で、ロンドンの英国植民地庁とシンガポール立法議会との間で行われたシンガポールの自治に関する憲法協議は、すでに1958年のシンガポール州憲法の策定へと結実していました。さらに1959年には、総督府が廃止され、完全に選出された自治権を持つ51議席の立法議会が設置されました。"
