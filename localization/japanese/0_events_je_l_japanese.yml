    je_national_values_reason:0 "国の国是とは、その国民の共通の文化的経験を通じて守られてきた最高価値を象徴するものです。\n\n[ROOT.GetCountry.GetName]の国是は、国内で50％以上の[concept_clout]を持つ[concept_interest_group]の[concept_ideology]に応じて変化します。\n\n現在の国是：#BOLD [SCOPE.GetRootScope.GetCountry.GetCustom('national_value_name')]#!\n\n注記：\n\n・$ideology_totalitarian$または$ideology_authoritarian$の[concept_ideology]を持つ[concept_interest_group]は、$order_national_value$を支持します。\n\n・$ideology_communitarian$の[concept_ideology]を持つ[concept_interest_group]は、$equality_national_value$を支持します。\n\n・$ideology_individualist$の[concept_ideology]を持つ[concept_interest_group]は、$liberty_national_value$を支持します。"
    
