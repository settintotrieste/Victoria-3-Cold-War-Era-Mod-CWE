    space_rocket_completed.d:0 "[ROOT.GetCountry.GetName]はロケットの打ち上げに成功しました。これは、国の技術発展における大きな一歩です。"
    satellite_completed.d:0 "[ROOT.GetCountry.GetName]は衛星の打ち上げに成功しました。これは、国の技術発展における大きな一歩です。"
    astronaut_completed.d:0 "[ROOT.GetCountry.GetName]は宇宙飛行士の打ち上げに成功しました。これは、国の技術発展における大きな一歩です。"
    space_probe_completed.d:0 "[ROOT.GetCountry.GetName]は探査機の宇宙への打ち上げに成功しました。これは国の技術開発における大きな一歩となります。"
    moon_mission_completed.d:0 "[ROOT.GetCountry.GetName]は月面着陸に成功しました。これは国の技術開発における大きな一歩となります。"
    space_station_completed.d:0 "[ROOT.GetCountry.GetName]は宇宙ステーションの軌道投入に成功しました。これは国の技術開発における大きな一歩となります。"
    space_telescope_completed.d:0 "[ROOT.GetCountry.GetName]は宇宙望遠鏡の軌道投入に成功しました。これは国の技術開発における大きな一歩となります。"
    mars_mission_completed.d:0 "[ROOT.GetCountry.GetName]は有人火星探査に成功しました。これは国の技術開発における大きな一歩となります。"
    moon_base_completed.d:0 "[ROOT.GetCountry.GetName]は月面に研究基地を建設することに成功しました。これは国の技術開発における大きな一歩となります。"
    mars_base_completed.d:0 "[ROOT.GetCountry.GetName]は火星に研究基地を建設することに成功しました。これは国の技術開発における大きな一歩となります。"
    
