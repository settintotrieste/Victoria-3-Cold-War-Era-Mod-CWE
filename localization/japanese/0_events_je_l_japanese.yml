    je_fire_head_of_state_button:0 "[SCOPE.sCharacter('head_of_state_pm_scope').GetPrimaryRoleTitle]を置き換える"
    je_fire_head_of_state_button_desc:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')]は、議会での過半数を用いて[SCOPE.sCharacter('head_of_state_pm_scope').GetPrimaryRoleTitle][SCOPE.sCharacter('head_of_state_pm_scope').GetFullName]を解任する動議を可決します。"
    
    je_elected_head_of_state_button:0 "選出された[SCOPE.sCharacter('head_of_state_pm_scope').GetPrimaryRoleTitle]を制定"
    je_elected_head_of_state_button_desc:0 "[ROOT.GetCountry.GetName]憲法は、現在は任命職である[SCOPE.sCharacter('head_of_state_pm_scope').GetPrimaryRoleTitle]職を、直接選挙によって選出される役職へと転換するために改正されます。"
    
    je_appointed_head_of_state_button:0 "任命された[SCOPE.sCharacter('head_of_state_pm_scope').GetPrimaryRoleTitle]を制定"
    je_appointed_head_of_state_button_desc:0 "[ROOT.GetCountry.GetName]の憲法が改正され、現在は選挙によって選ばれる[SCOPE.sCharacter('head_of_state_pm_scope').GetPrimaryRoleTitle]の官職が、直接任命制へと変更されます。"
