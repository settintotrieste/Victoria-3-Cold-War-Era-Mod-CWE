    rio_pact_member:0 "リオ協定加盟国"
    rio_pact_leader:0 "リオ協定主導国"
    form_rio_pact_decision:0 "米州相互援助条約を締結"
    form_rio_pact_decision_desc:0 "米州相互援助条約（一般にリオ協定として知られています）は、1947年にリオデジャネイロで米州の多くの国々の間で署名された協定です。その条項に含まれる中心的な原則は、一国への攻撃は全加盟国への攻撃とみなされるというものです。これは「半球防衛」ドクトリンとして知られていました。それにもかかわらず、複数のメンバーが何度も協定に違反してきました。この条約は最初に1947年に作成され、条約の第22条項に従って1948年に発効しました。"
    join_rio_pact_decision:0 "米州相互援助条約（リオ協定）に参加"
    join_rio_pact_decision_desc:0 "米州相互援助条約（一般にリオ協定として知られています）は、1947年にリオデジャネイロで米州の多くの国々の間で署名された協定です。その条項に含まれる中心的な原則は、一国への攻撃は全加盟国への攻撃とみなされるというものです。これは「半球防衛」ドクトリンとして知られていました。それにもかかわらず、複数のメンバーが何度も協定に違反してきました。この条約は最初に1947年に作成され、条約の第22条項に従って1948年に発効しました。注：申請の処理には通常、約1ヶ月かかります。"
    leave_rio_pact_decision:0 "米州相互援助条約（リオ協定）から脱退"
    leave_rio_pact_decision_desc:0 "米州相互援助条約（一般にリオ協定として知られています）は、1947年にリオデジャネイロで米州の多くの国々の間で署名された協定です。その条項に含まれる中心的な原則は、一国への攻撃は全加盟国への攻撃とみなされるというものです。これは「半球防衛」ドクトリンとして知られていました。それにもかかわらず、複数のメンバーが何度も協定に違反してきました。この条約は最初に1947年に作成され、条約の第22条項に従って1948年に発効しました。"
