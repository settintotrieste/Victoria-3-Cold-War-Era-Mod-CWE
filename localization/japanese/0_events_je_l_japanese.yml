    je_cultural_suppression_system:0 "[ROOT.GetCountry.GetName]における文化弾圧"
    je_cultural_suppression_system_reason:0 "[ROOT.GetCountry.GetAdjective]政府は、非倫理的な手法を組み合わせて[ROOT.GetCountry.GetName]における差別されている人々を組織的に抑圧しています。\n\n差別されているランダムな[concept_culture]および/または[concept_religion]のPOPグループの1%が、すべての差別されているPOPが[ROOT.GetCountry.GetName]を去るか、$law_slavery_cultural$の法律が廃止されるまで、毎月偏見の対象となります。"
    je_cultural_suppression_system.tt:0 "国に差別されているPOPは残っていません。"
    
    cultural_suppression_discovered.t:0 "[SCOPE.sCountry('country_committing_cultural_suppression').GetName]における文化弾圧"
    cultural_suppression_discovered.d:0 "国際的なオブザーバーが、[SCOPE.sCountry('country_committing_cultural_suppression').GetName]が差別されている全人口を抹殺する計画を実行していることを発見しました。この事実の発覚は国際社会に衝撃を与えており、国連事務総長のような有力者たちも[SCOPE.sCountry('country_committing_cultural_suppression').GetName]を強く非難しています。[ROOT.GetCountry.GetName]はこの人道に対する罪にどう対処すべきでしょうか？"
    cultural_suppression_discovered.f:0 "[SCOPE.sCountry('country_committing_cultural_suppression').GetName]に対する国際的な非難の強さは、文化弾圧を非難することを選択した国の数によって決まります。"
    cultural_suppression_system_option.1:0 "野蛮な行為を行った[SCOPE.sCountry('country_committing_cultural_suppression').GetName]を非難せよ！"
    cultural_suppression_system_option.2:0 "何も言わない。"
    
    cultural_suppression_discovered_notice.t:0 "[ROOT.GetCountry.GetName]における文化弾圧計画が露呈"
    cultural_suppression_discovered_notice.d:0 "国際的なオブザーバーが、[ROOT.GetCountry.GetName]が差別されている全人口を抹殺する計画を実行していることを発見しました。この事実の発覚は国際社会に衝撃を与えており、国連事務総長のような有力者たちも[SCOPE.sCountry('country_committing_cultural_suppression').GetName]を強く非難しています。"
    cultural_suppression_discovered_notice.f:0 "[ROOT.GetCountry.GetName]は、文化弾圧を行ったとして非難したすべての国から1の悪名を得るほか、このような人道に対する罪を犯したことで国連から制裁を受ける可能性があります。"
    cultural_suppression_system_notice_option:0 "まあ、いいか……"
    
    je_espionage_system:0 "敵対的諜報活動を実行中"
    je_espionage_system_reason:0 "[ROOT.GetCountry.GetAdjective]の諜報機関は、国外の敵に対して敵対的諜報活動を行うため、工作員を海外に派遣しました。\n\n進行状況バーが満たされると、[ROOT.GetCountry.GetName]は条件を満たす任意の国1カ国を無作為に攻撃する機会を与えられます。\n\n[ROOT.GetCountry.GetName]が敵対的諜報活動を行う国が増えるほど、進行状況バーが満たされるまでの時間は長くなります。"
    je_espionage_system_1_tt:0 "この国は、もはやどの国に対しても敵対的諜報活動を行っていません。"
    je_espionage_system_2_tt:0 "この国は、少なくとも1カ国に対して敵対的諜報活動を行っています。"
    
    je_subverted_civil_service_3.tt:0 "[concept_government]における最も強力な[concept_interest_group]が持つ[concept_ideology]を、$ig_intelligentsia$の[concept_interest_group]は共有していません。"
    je_subverted_civil_service_2.tt:0 "[concept_government]における最も強力な[concept_interest_group]が持つ[concept_ideology]を、$ig_intelligentsia$の[concept_interest_group]は共有しています。"
    je_subverted_civil_service_1.tt:0 "官僚が浸透されており、そのリーダーは[concept_ruler]とイデオロギーが一致するものに交代する予定です。"
    je_subvert_civil_service:0 "官僚の粛清"
    je_subvert_civil_service_reason:0 "[ROOT.GetCountry.GetName]が$law_politicised_bureaucrats$の[concept_law]を有しているため、[concept_government]は[concept_government]における最も強力な[concept_interest_group]とイデオロギー的信念を共有する官僚を指名することができます。これは、十分な期間が経過すれば、官僚が[concept_government]のイデオロギー的信念に完全に改宗することを意味します。\n\n毎月、$ig_intelligentsia$の[concept_ideology]が、[concept_government]における最も強力な[concept_interest_group]のものと一致するように変更されるランダムな確率が発生します。"
    
    je_evolved_civil_service_3.tt:0 "$ig_intelligentsia$の[concept_interest_group]は、国内で最も強力な[concept_interest_group]が持つ[concept_ideology]を共有していません。"
    je_evolved_civil_service_2.tt:0 "$ig_intelligentsia$の[concept_interest_group]は、国内で最も強力な[concept_interest_group]が持つ[concept_ideology]を共有しています。"
    je_evolved_civil_service_1.tt:0 "官僚がイデオロギーを変更し、そのリーダーは国内で最も強力な[concept_interest_group]のリーダーとイデオロギーが一致する人物へと交代します。"
    je_evolve_civil_service:0 "官僚の改革"
    je_evolve_civil_service_reason:0 "[ROOT.GetCountry.GetName]が$law_elitist_bureaucrats$の[concept_law]を保持しているため、官僚の指名プロセスがエリート主義的かつ政治的なものになりました。これは、十分な時間が経過すれば、官僚が[ROOT.GetCountry.GetName]における最も強力な[concept_interest_group]のイデオロギー的信条へと完全に転換されることを意味します。\n\n毎月、$ig_intelligentsia$の[concept_ideology]が[ROOT.GetCountry.GetName]における最も強力な[concept_interest_group]のものと一致するように変更されるランダムな可能性があります。"
    
    neutralise_civil_service.tt:0 "官僚を政治的に中立にする"
    
    close_suez_canal_decision:0 "スエズ運河を閉鎖"
    close_suez_canal_decision_desc:0 "スエズ運河の所有者として、私たちはいつでもすべての船舶の航行に対して運河を閉鎖することを選択できます。しかし、そうすることは国際コミュニティの不満を招くでしょう。なお、運河の閉鎖期間中はスエズ運河の施設は削除されます。"
