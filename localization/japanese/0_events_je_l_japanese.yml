    je_nuclear_weapons_info_panel:0 "核兵器軍拡競争"
    je_nuclear_weapons_info_panel_reason:0 "[ROOT.GetCountry.GetName]は現在、ライバル国と核兵器軍拡競争を行っています。\n\nしたがって、[ROOT.GetCountry.GetName]が、この国との関係が「悪い」またはそれ以下の核保有国すべてよりも大きな核攻撃力を確保できるよう努めなければなりません。\n\n総核攻撃力：[GetPlayer.MakeScope.Var('nuclear_strike_power_display').GetValue]\n\n核攻撃防御：[GetPlayer.MakeScope.Var('nuclear_strike_defence_display').GetValue]\n\n敵の総核攻撃力：[GetPlayer.MakeScope.Var('nuclear_strike_power_enemy_display').GetValue]\n\n敵の核攻撃防御：[GetPlayer.MakeScope.Var('nuclear_strike_defence_enemy_display').GetValue]\n\n推定純核攻撃力：[GetPlayer.MakeScope.Var('nuclear_strike_power_THIS_enemy_ratio').GetValue]\n\n推定純敵核攻撃力：[GetPlayer.MakeScope.Var('nuclear_strike_power_enemy_THIS_ratio').GetValue]\n\n敵の数：[GetPlayer.MakeScope.Var('nuclear_enemy_counter_display').GetValue]\n\n核兵器優位スコア：[GetPlayer.MakeScope.Var('nuclear_strike_power_ratio').GetValue]"
