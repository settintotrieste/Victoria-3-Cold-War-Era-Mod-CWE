    je_sovereign_wealth_fund:0 "[ROOT.GetCountry.GetAdjectiveNoFlag]政府系ファンド"
    je_sovereign_wealth_fund_reason:0 "[ROOT.GetCountry.GetAdjectiveNoFlag]投資公社は、政府が所有する企業であり、州が[ROOT.GetCountry.GetAdjective]民間セクターに投資することを可能にします。こうした投資活動から得られる利益配当は、政府が運営する政府系ファンドに集約されます。この制度により、政府は民間セクターの政府所有レベルに応じて、[concept_investment_pool]から資金を注入または引き出すことができます。\n\n#BOLD 政府系ファンドの規模：#! #Green @money![GetPlayer.MakeScope.Var('sovereign_wealth_fund_size_display').GetValue]M#! \n\n#BOLD 月間の最大注入・引き出し額：#! @money![GetPlayer.MakeScope.Var('sovereign_wealth_fund_withdrawal_amount').GetValue] \n\n#BOLD 政府所有の民間企業の数：#! [GetPlayer.MakeScope.Var('sovereign_wealth_fund_gov_buildings').GetValue] / [GetPlayer.MakeScope.Var('sovereign_wealth_fund_all_buildings').GetValue] \n\n#BOLD 議長：#! [ROOT.GetCountry.GetRuler.GetFullName]"
