    H3N2_1968.t:0 "香港インフルエンザ"
    H3N2_1968.d:0 "香港インフルエンザは、1968年から1969年にかけて発生したインフルエンザのパンデミックであり、世界中で100万から400万人の死者を出しました。これは歴史上最も致命的なパンデミックの一つであり、A型インフルエンザウイルスのH3N2型によって引き起こされました。最初の記録的な発生は、1968年7月13日にイギリス領香港で確認されました。この発生は、香港に広がる前に中国本土で始まったのではないかと推測されています。"
    SARS_2003.t:0 "SARSの発生"
    SARS_2003.d:0 "重症急性呼吸器症候群コロナウイルス（SARS-CoVまたはSARS-CoV-1）によって引き起こされた2002年から2004年にかけてのSARSの発生は、30の国と地域から8,000人以上が感染し、世界中で少なくとも774人の死者を出しました。この発生は、2002年11月に中国の広東省仏山市で初めて確認されました。世界保健機関（WHO）は2003年2月にこの発生の通知を受け、2003年3月に世界的な警告を発しました。発生の大部分は約8か月間続き、世界保健機関は2003年7月5日にSARSの封じ込めを宣言しました。"
    H1N1_2009.t:0 "H1N1パンデミック"
    H1N1_2009.d:0 "H1N1ウイルスによって引き起こされ、世界保健機関（WHO）が2009年6月から2010年8月にかけて宣言した2009年の豚インフルエンザのパンデミックは、H1N1ウイルスに関連する最近の3番目のインフルエンザパンデミックでした。最初に確認されたヒトの症例は、メキシコのベラクルス州にある農村の町、ラ・グロリアでした。このウイルスは、鳥、豚、ヒトのインフルエンザウイルスが以前にトリプル再集合を起こし、それがユーラシアの豚インフルエンザウイルスとさらに結合した結果生じた、H1N1の新しい型であると考えられています。"
    COVID_2019.t:0 "COVID-19パンデミック"
    COVID_2019.d:0 "COVID-19パンデミックは、重症急性呼吸器症候群コロナウイルス2 (SARS-CoV-2) によって引き起こされた、新型コロナウイルス感染症 (COVID-19) の世界的なパンデミックです。この新型ウイルスは、2019年12月に中国、湖北省の首都である武漢でのアウトブレイクにおいて最初に確認され、その後アジアの他地域、そして2020年初頭に世界中へと広がりました。世界保健機関 (WHO) は2020年1月30日にこのアウトブレイクを「国際的に懸念される公衆衛生上の緊急事態 (PHEIC)」と宣言し、2020年3月11日にアウトブレイクがパンデミックになったと判断しました。"
    
    historical_pandemics.option.1:0 "「なんてことだ！」"
    
    biological_weapons_fallout.t:0 "人工パンデミック"
    biological_weapons_fallout.d:0 "[ROOT.GetCountry.GetName]に対して使用された生物兵器が、この国で流行を引き起こしました。この問題を解決するには、ワクチンを開発する必要があります。"
    biological_weapons_fallout.f:0 "このイベントは、[ROOT.GetCountry.GetName]が生物兵器の攻撃を受けたことにより発生しました。"
    
    biological_weapons_fallout.option:0 "「なんてことだ！」"
    
    end_conscription.t:0 "徴兵を廃止しますか？"
    end_conscription.d:0 "多くの準主流派の政治家たちが、[ROOT.GetCountry.GetName]における徴兵の終了を求めています。彼らは、徴兵は民主主義の原則と一致しないため、もはや必要ないと主張しています。"
    
    nuclear_accident_1979.t:0 "スリーマイル島原子力事故"
    nuclear_accident_1979.d:0 "スリーマイル島事故は、アメリカ合衆国ペンシルベニア州の首都であるハリスバーグ近郊、ロンドンデリー・タウンシップのサスケハナ川沿いにあるスリーマイル島原子力発電所のユニット2原子炉 (TMI-2) で発生したメルトダウンです。原子炉事故は1979年3月28日の午前4時に始まり、放射性ガスと放射性ヨウ素を環境中に放出しました。"
    nuclear_accident_1986.t:0 "チェルノブイリ原子力災害"
    nuclear_accident_1986.d:0 "チェルノブイリの災害は、1986年4月26日、ソ連のベラルーシSSRとの国境に近い、ウクライナSSR北部のプリピャチ市付近にあるチェルノブイリ原子力発電所の第4原子炉の爆発によって始まりました。災害の結果、プリピャチは放棄され、最終的には新しく建設された都市スラウティチに取って代わられました。"
    nuclear_accident_2011.t:0 "福島第一原子力発電所事故"
    nuclear_accident_2011.d:0 "福島第一原子力発電所（福島県大熊町）で2011年3月11日に発生した福島第一原子力発電所事故は、重大な原子力事故でした。事故の直接的な原因は2011年の東北地方太平洋沖地震と津波であり、これにより電力網が遮断され、発電所のバックアップ用エネルギー源のほぼすべてが損傷しました。その後の停止後の原子炉を十分に冷却できなかったことが封じ込め機能を損ない、周囲の環境へ放射性汚染物質が放出される結果となりました。"
    
    historical_nuclear_accidents.option.1:0 "なんてことだ！"
    
