    anti_war_protest_war_exhaustion.t:0 "[SCOPE.sState('war_protest_state').GetName]における反戦デモ"
    anti_war_protest_war_exhaustion.d:0 "[SCOPE.sState('war_protest_state').GetName]では激しい反戦感情が根付いており、それが[ROOT.GetCountry.GetAdjectiveNoFlag]の市民による、我々の戦争遂行に対する市民不服従運動へとつながっています。軍部は、デモを鎮圧するために武力を行使し、見せしめとして関係者を処刑することを提案しています。"
    anti_war_protest_war_exhaustion.f:0 "このイベントは、[ROOT.GetCountry.GetName]の[concept_war_support]が0未満であるため発生しました。"
    anti_war_protest.option:0 "好きに抗議させてやろう"
    anti_war_protest_crush.option:0 "抗議者たちを弾圧せよ！"
    apply_pm_offense_defense_readjustment_minor_state.tt:0 "[SCOPE.sState('war_protest_state').GetName]内のすべての$building_barracks$、$building_naval_base$、および$building_conscription_center$は、6ヶ月間$pm_offense_defense_readjustment_minor$の補正を受けます"
    
    anti_war_protest_frenemies.t:0 "大規模な反戦デモ"
    anti_war_protest_frenemies.d:0 "自国民は、自分たちと同じ文化的背景を持つ国と戦争状態にあることに衝撃を受けています。その結果、[ROOT.GetCountry.GetName]全域で大規模なデモが発生しており、政府に対して、同胞に対する無意味な戦争を停止するよう求めています。"
    anti_war_protest_frenemies.f:0 "このイベントは、[ROOT.GetCountry.GetName]が[ROOT.GetCountry.GetName]の[Concept('concept_primary_cultures','$concept_primary_culture$')]と同じ系統または特性を持つ[Concept('concept_primary_cultures','$concept_primary_culture$')]を有する国と[concept_war]中のため、発生しました。"
    
    anti_war_protest_blame_military.t:0 "司令官解任を求める民衆の嘆願"
    anti_war_protest_blame_military.d:0 "[ROOT.GetCountry.GetName]が置かれている悲惨な状況により、民衆は不人気な軍事リーダーに矛先を向けています。民衆は最近の一連の敗北を[SCOPE.sCharacter('unpopular_general').GetFullName]の責任とし、彼を無能だと決めつけています。現在、[SCOPE.sCharacter('unpopular_general').GetFullName]の解任を求める嘆願が[ROOT.GetCountry.GetRuler.GetFullName]に対してなされています。"
    anti_war_protest_blame_military.f:0 "このイベントは、[ROOT.GetCountry.GetName]の[concept_war_support]が-25未満であり、かつ人気度が25未満の将軍または提督が存在するため、発生しました。"
    anti_war_protest_sack_general.option:0 "[SCOPE.sCharacter('unpopular_general').GetFullName]を解任する"
    anti_war_protest_keep_general.option:0 "[SCOPE.sCharacter('unpopular_general').GetFullName]を留任させる"
    sack_unpopular_general.tt:0 "[SCOPE.sCharacter('unpopular_general').GetFullName]が解任されました"
    
    anti_war_protest_sack_army_chief.t:0 "[ROOT.GetCountry.GetAdjectiveNoFlag]最高司令部の混乱"
    anti_war_protest_sack_army_chief.d:0 "[ROOT.GetCountry.GetAdjectiveNoFlag]軍の将軍たちによる定期会議は、本日、社会不安へと発展しました。[SCOPE.sCharacter('opposing_general').GetFullName]率いる複数の将軍たちが、[ROOT.GetCountry.GetName]が被った最近の一連の壊滅的な敗北を最高司令官[SCOPE.sCharacter('unpopular_army_chief').GetFullName]の責任とし、彼の辞任を要求したためです。[ROOT.GetCountry.GetAdjectiveNoFlag]最高司令部におけるこの大規模な混乱は、軍を分割させ、[SCOPE.sCharacter('unpopular_army_chief').GetFullName]が[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]の[ROOT.GetCountry.GetRuler.GetFullName]によって解任されない限り、士官や兵士たちの間に大きな動揺を引き起こすでしょう。"
    anti_war_protest_sack_army_chief.f:0 "このイベントは、[ROOT.GetCountry.GetName]の[concept_war_support]が-25未満であるため、発生しました。"
    anti_war_protest_sack_army_chief.option:0 "[SCOPE.sCharacter('unpopular_army_chief').GetFullName]を解任する"
    anti_war_protest_keep_army_chief.option:0 "代わりに[SCOPE.sCharacter('opposing_general').GetFullName]を解任する"
    military_infighting:0 "軍の内部抗争"
