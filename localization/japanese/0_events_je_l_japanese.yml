    je_request_warsaw_pact_intervention_button:0 "第4条の発動"
    je_request_warsaw_pact_intervention_button_desc:0 "欧州において、条約の署名国である一つまたは複数の国に対し、いかなる国または国家集団によって武力攻撃が行われた場合においても、本条約の締結国は、国際連合憲章第51条に従い、個別的または集団的な自衛権を行使することにより、攻撃を受けた国に対し、武力の行使を含む、自らが必要とみなすあらゆる手段を用いて、単独で、または本条約の他の締結国と協力して、直ちに援助を提供するものとする。"
    
