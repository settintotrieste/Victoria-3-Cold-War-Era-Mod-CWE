    je_gatt_system: "関税および貿易に関する一般協定"
    je_gatt_system_reason: "関税および貿易に関する一般協定（GATT）は、多くの国々の間で結ばれた法的協定であり、関税や割当などの貿易障壁を削減または撤廃することで国際貿易を促進することを主な目的としていました。これは、1947年から1995年の間に計9回行われた一連のグローバルな貿易交渉によって更新されてきました。国際貿易におけるその役割は、1995年に世界貿易機関（WTO）によって大部分が継承されました。\n\nGATTは常に更新される協定であるため、GATTによる[concept_tariffs]の削減幅は毎年異なります。\n\n注：[concept_tariffs]の削減量は、世界経済の見通しによって決まります。"
    
    very_low_tariffs_gatt_loc: "GATT関税削減（超低）"
