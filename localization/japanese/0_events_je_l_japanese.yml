l_japanese:
    
    economic_cycle_1:0 "非常に悪い経済見通し"
    economic_cycle_2:0 "悪い経済見通し"
    economic_cycle_3:0 "中立的な経済見通し"
    economic_cycle_4:0 "力強い経済見通し"
    economic_cycle_5:0 "非常に力強い経済見通し"
    
    nuclear_dev_cost:0 "核兵器開発コスト"
    
    nuclear_capability:0 "核保有国"
    start_nuclear_weapons_program_decision:0 "核兵器開発計画を開始"
    start_nuclear_weapons_program_decision_desc:0 "核兵器とは、核分裂（核分裂爆弾）または核分裂と核融合の組み合わせ（熱核爆弾）による核反応から破壊力を得る爆発装置であり、核爆発を引き起こします。敵の心に恐怖を植え付けるために、我々はこのような兵器を開発すべきです。なお、我々が不十分な独立状態の従属国になった場合、あるいは大量破壊兵器の保有を禁止する法律を制定した場合には、核兵器開発計画は終了しますのでご注意ください。"
    nuclear_program_started:0 "核兵器開発計画"
    
    gained_nuclear_capability.t:0 "核攻撃能力を獲得しました。"
    gained_nuclear_capability.d:0 "[SCOPE.sCountry('nuclear_country').GetName]は、たゆまぬ努力の結果、核兵器と、それを敵へ投射する手段を獲得しました。これは、現在交戦中の敵国に対して核兵器で攻撃を仕掛けることが可能になったことを意味します。"
    gained_nuclear_capability.f:0 "核能力は、[SCOPE.sCountry('nuclear_country').GetName]が、商品の不足がない$building_nuclear_weapons_silo$ [concept_building]を失う、$law_wmd_banned$ [concept_law]を通過する、あるいは不十分な独立状態の従属国となる場合に失われますのでご注意ください。"
    gained_nuclear_capability.option:0 "世界は我々の力に震えるであろう！"
   
    lost_nuclear_capability.t:0 "核攻撃能力を喪失しました。"
    lost_nuclear_capability.d:0 "[SCOPE.sCountry('nuclear_country').GetName]は、敵に対して核攻撃を行う能力を失いました。"
    lost_nuclear_capability.f:0 "このイベントが発生したのは、[SCOPE.sCountry('nuclear_country').GetName]が$building_nuclear_weapons_silo$ [concept_building]を失った場合、$law_wmd_banned$ [concept_law]が可決された場合、あるいは不十分な独立状態の従属国になったためです。"
    lost_nuclear_capability.option:0 "悲劇だ！"
    
    nuclear_attack.t:0 "[SCOPE.sCountry('nuclear_country').GetName]への核兵器による攻撃"
    nuclear_attack.d:0 "敵が核兵器を用いて我々のいくつかの都市や町を攻撃したとの報告が入りました。被災した地域ではインフラが壊滅しており、その大部分が現在、危険なレベルまで放射能汚染されています。被災地域のほとんどの政府高官は核シェルターに避難することができましたが、非常に多くの市民が避難できず、最初の爆発か、その後に降り注いだ有毒な死の灰によって命を落としました。[SCOPE.sCountry('nuclear_country').GetName]が完全に破壊される前に、平和が訪れることを願うばかりです。"
    nuclear_attack.f:0 "核兵器の攻撃を受けた州地域には甚大な影響を及ぼす補正が付与され、それは今後数十年にわたって緩やかにしか減衰しません。"
    nuclear_attack.option:0 "生き残ることができなかった人々に、黙祷を捧げる。"
    
    chemical_dev_cost:0 "化学兵器開発コスト"
    
    chemical_capability:0 "化学兵器保有国"
    start_chemical_weapons_program_decision:0 "化学兵器開発計画を開始"
    start_chemical_weapons_program_decision_desc:0 "化学兵器とは、その毒性によって殺傷を目的として使用される化学物質のことです。毒性のある化学物質を兵器化するために特別に設計された弾薬、装置、およびその他の機器も、化学兵器の定義に該当します。"
    chemical_program_started:0 "化学兵器開発計画"
    
    gained_chemical_capability.t:0 "化学攻撃能力を獲得しました。"
    gained_chemical_capability.d:0 "[SCOPE.sCountry('chemical_country').GetName]はたゆまぬ努力の結果、化学兵器とそれを敵に届ける手段を手に入れました。[concept_mobilization_option]によって、化学兵器の使用が可能になりました。"
    gained_chemical_capability.f:0 "なお、[SCOPE.sCountry('chemical_country').GetName]が、商品不足のない$building_industrial_chemicals_factory$[concept_building]を保持していない場合、あるいは$law_wmd_banned$[concept_law]を通過した場合、もしくは従属国としての独立性が不十分になった場合、化学的能力は失われます。"
    gained_chemical_capability.option:0 "素晴らしい！"
   
    lost_chemical_capability.t:0 "化学攻撃能力の喪失"
    lost_chemical_capability.d:0 "[SCOPE.sCountry('chemical_country').GetName]は敵に対して化学攻撃を行う能力を失いました。"
    lost_chemical_capability.f:0 "[SCOPE.sCountry('chemical_country').GetName]が$building_industrial_chemicals_factory$[concept_building]を失うか、$law_wmd_banned$[concept_law]を可決するか、あるいは従属国としての独立性が不十分になったことによるものです。"
    lost_chemical_capability.option:0 "悲劇だ！"
    
    biological_dev_cost:0 "生物兵器開発コスト"
    
    biological_capability:0 "生物兵器保有国"
    start_biological_weapons_program_decision:0 "生物兵器開発計画を開始"
    start_biological_weapons_program_decision_desc:0 "生物戦とは、戦争行為として、細菌、ウイルス、昆虫、真菌などの生物学的毒素や感染性病原体を用い、人間、動物、または植物を殺傷、危害、あるいは無力化することを目的としたものです。生物兵器とは、生物学的有機体、または自己複製を行う実体です。"
    biological_program_started:0 "生物兵器開発計画"
    
    gained_biological_capability.t:0 "生物兵器による攻撃能力を獲得しました"
    gained_biological_capability.d:0 "[SCOPE.sCountry('biological_country').GetName]はたゆまぬ努力の結果、生物兵器とそれを敵に届ける手段を手に入れました。これは、今や$conduct_biological_strike$[concept_diplomatic_action]を敵に対して使用できるようになったことを意味します。"
    gained_biological_capability.f:0 "なお、[SCOPE.sCountry('biological_country').GetName]において、物資不足のない$building_university$[concept_building]が消失するか、$law_wmd_banned$[concept_law]が通過するか、あるいは従属国としての独立性が不十分になった場合、生物学的能力は失われます。"
    gained_biological_capability.option:0 "実に見事だ"
   
    lost_biological_capability.t:0 "生物攻撃能力の喪失"
    lost_biological_capability.d:0 "[SCOPE.sCountry('biological_country').GetName]は敵に対して生物攻撃を行う能力を失いました。"
    lost_biological_capability.f:0 "このイベントは、[SCOPE.sCountry('biological_country').GetName]が$building_university$[concept_building]を失ったか、$law_wmd_banned$[concept_law]を可決したか、あるいは従属国としての独立性が不十分になったために発生しました。"
    lost_biological_capability.option:0 "悲劇だ！"
    
    enable_historical_railroading_decision:0 "AIの史実準拠を有効化"
    enable_historical_railroading_decision_desc:0 "この決断を選択すると、AIはすべての史実イベントにおいて常に史実の選択肢を選択するようになります。この決断は、ゲーム中にプレイヤーがいつでも有効または無効に設定できます。なお、この決断は、通常発生しない史実イベントを強制的に発生させるものではありません。あくまで、史実イベントが発生した際に、AIが史実の選択肢を選ぶようにするものです。"
    disable_historical_railroading_decision:0 "AIの史実準拠を無効化"
    disable_historical_railroading_decision_desc:0 "このディシジョンをクリックすると、AIがすべての史実イベントにおいて常に史実の選択肢を選択する制約を解除します。プレイヤーはいつでも史実準拠を再度有効にすることができます。"
    
    korean_war:0 "朝鮮戦争"
    sino_tibet_war:0 "中国・チベット戦争"
    
    is_not_independent:0 "独立性が不十分です"
    join_unga_decision.tt:0 "どの$unsc_permanent_member$も、この国に対して$relations_cold$以下の$DIPLO_ACTION_RELATIONS$を持っていません"
    join_unga_decision_2.tt:0 "どの$unsc_permanent_member$もこの国より高い[concept_rank]を持っていません"
    join_unga_decision_3.tt:0 "国連加盟の歴史的な日付（歴史的に分割されている国のみ）"
    join_unga_decision_4.tt:0 "一つの中国政策を採っていない国"
    join_unga_decision:0 "国連総会に参加"
    join_unga_decision_desc:0 "国連総会（UNGA）は、組織の主要な政策決定機関です。すべての加盟国で構成され、国連憲章が扱う国際問題の全範囲について、多国間討議を行うための独自のフォーラムを提供します。国連の各加盟国は、平等な投票権を持っています。"
    join_unsc_perm_decision:0 "国連安保理常任理事国になる"
    join_unsc_perm_decision_desc:0 "安全保障理事会は、国際的な平和と安全の維持に対して主要な責任を負っています。15の加盟国で構成され、各加盟国は1票の投票権を持っています。国連認可に基づき、すべての加盟国は理事会の決定に従う義務があります。安全保障理事会は、平和への脅威または侵略行為の存在を判断する主導権を握ります。紛争の当事者に対し、平和的手段による解決を求め、調整方法や解決条件を勧告します。場合によっては、安全保障理事会は制裁を課したり、国際的な平和と安全を維持または回復するために武力行使を認可したりすることもあります。"
    join_unsc_perm_decision_tt:0 "すべての国連安保理理事国と友好関係にある国"
    unga_member:0 "国連総会メンバー"
    unsc_permanent_member:0 "国連安保理常任理事国"
    unsc_non_permanent_member:0 "国連安保理非常任理事国"
    united_nations.1.t:0 "国連総会に加盟しました"
    united_nations.1.d:0 "国際連合は、我が国が総会の議席を獲得したことを発表いたします。"
    united_nations.1.f:0 "この国が十分な独立性を失ったか、あるいはもはや[concept_recognized_power]ではなくなっています。"
    united_nations.2.t:0 "国連総会から除外されました"
    united_nations.2.d:0 "我が国の地位が主権国家から他国の傀儡国へと変更されたため、国際連合は我が国を総会から除外することを決定しました。しかしながら、慰内の措置として国連オブザーバー国の地位が与えられました。"
    united_nations.2.f:0 "このイベントは、この国が十分に独立していないか、あるいはもはや[concept_recognized_power]ではなくなったことにより発生しました。"
    united_nations.1.a:0 "遺憾なことです"
    UNSC_non_perm_membership.t:0 "国連安保理非常任理事国"
    UNSC_non_perm_membership.d:0 "[SCOPE.sCountry('new_non_perm_UNSC_member').GetName]は国際連合総会によって2年間の任期で安全保障理事会のメンバーに選出されました。その期間中、我が国は国連から問題のある加盟国に対する封じ込め戦争を主導するよう求められるかもしれません。"
    UNSC_non_perm_membership.f:0 "世界の国連総会メンバーが30より多く、かつ国連安保理メンバーが15未満である場合、新しい国が国連安保理の非常任理事国として選出されます。条件を満たすのは、名声があり、戦争状態になく、かつ国連総会のメンバーである国です。"
    UNSC_non_perm_membership.option:0 "素晴らしい！"
    
    new_unsc_perm_member.t:0 "新しい国連安保理常任理事国"
    new_unsc_perm_member.d:0 "[SCOPE.sCountry('new_unsc_member_scope').GetName]は、安全保障理事会の常任理事国として招待されました。これにより、自身が承認できない平和維持決議に対して拒否権を行使できるようになります。"
    new_unsc_perm_member.f:0 "[SCOPE.sCountry('new_unsc_member_scope').GetName]は、既存のすべての常任理事国と良好な関係にあり、国際社会から孤立した存在でもなかったため、常任理事国として国連安保理に加入することができました。"
    new_unsc_perm_member.1:0 "我々はこの進展を強く注視します"
    
    UNSC_members_list.tt:0 "以下の国々は国連安保理常任理事国です："
    
    UN_secretary_general_selection.t:0 "[SCOPE.sCountry('unsg_country').GetAdjective]の国連事務総長"
    UN_secretary_general_selection.d:0 "国連総会は、組織の事務総長として[SCOPE.sCountry('unsg_country').GetAdjective]人を選出しました。これにより、我が国は国際情勢においてより大きな影響力を得ることになります。"
    UN_secretary_general_selection.f:0 "[SCOPE.sCountry('unsg_country').GetName]が選ばれたのは、国際的な信頼を得ており、かつ列強ではないことにあります。国連事務総長の任期は5年です。"
    
    UN_secretary_general_notification.t:0 "[SCOPE.sCountry('unsg_country').GetAdjective]の国連事務総長"
    UN_secretary_general_notification.d:0 "国連総会は、国連事務総長として[SCOPE.sCountry('unsg_country').GetAdjective]人の国民を選出しました。これにより[SCOPE.sCountry('unsg_country').GetName]は国際情勢においてより大きな勢力を得ることになります。"
    UN_secretary_general_notification.1.f:0 "新しい国連事務総長はかなり消極的な人物であると言われており、国連が国際法に違反した国に対して厳しく対処する可能性は低いです。"
    UN_secretary_general_notification.2.f:0 "新しい国連事務総長は良識的な人物であると言われており、国連が国際法に違反した国に対して非常に厳しく対処する可能性は低いものの、ある程度の毅然とした対応が期待されます。"
    UN_secretary_general_notification.3.f:0 "新しい国連事務総長は非常に積極的かつ強硬な人物であると言われており、国連が国際法を違反した国に対して非常に厳しく対処する可能性があります。"
    UN_secretary_general_notification_option:0 "[SCOPE.sCountry('unsg_country').GetName]に祝意を表す"
    
    unsg_country:0 "国連事務総長の母国"
    unsg_character:0 "国連事務総長"
    
    character_role_unsg_character:0 "[Concept('concept_diplomat_character','$unsg_character$')]"
    character_role_unsg_character_title:0 "[Concept('concept_diplomat_character','$unsg_character$')]"
    
    concept_diplomat_character:0 "外交官"
    concept_diplomat_character_desc:0 "この[concept_character]は外国の外交官であり、国際的な免責特権を有しています。"
    
    un_sanctions_1:0 "国連外交制裁"
    un_sanctions_2:0 "国連政治制裁"
    un_sanctions_3:0 "国連経済制裁"
    un_embargo_participant:0 "国連経済制裁参加国"
    
    UN_sanctions_system.t:0 "[SCOPE.sCountry('UN_sanctions_target').GetName]に課された制裁"
    UN_sanctions_system.d:0 "国際法違反の罪で当該国を罰するため、国連は事務総長の促しにより[SCOPE.sCountry('UN_sanctions_target').GetName]に対して制裁を課すことを決議しました。"
    UN_sanctions_system.f:0 "国連の制裁は、[SCOPE.sCountry('UN_sanctions_target').GetName]の悪名が「評判が良い」状態に低下するまで維持されます。途中で一部の制裁が解除される場合があります。ただし、それは我が国の悪名がより低くなった場合です。"
    UN_sanctions_option:0 "国連総会において、強い遺憾の意を表明する。"
    
    UN_sanctions_system_embargo.t:0 "国連が[SCOPE.sCountry('un_sanctions_embargoed_country').GetName]への制裁を呼びかけています"
    UN_sanctions_system_embargo.d:0 "[SCOPE.sCountry('un_sanctions_embargoed_country').GetName]による国際法の明白な違反を受け、国連事務総長は、すべての国連総会メンバーに対し、このならず者国家への禁輸を課すよう呼びかけました。国連の計画に参加することは、[SCOPE.sCountry('un_sanctions_embargoing_country').GetName]にとって大きな国際的な好意につながります。"
    UN_sanctions_system_embargo.f:0 "[SCOPE.sCountry('un_sanctions_embargoed_country').GetName]に対する禁輸は、その国が国連から制裁を解除されるまで撤廃できないことに注意してください。"
    UN_sanctions_system_embargo_option.1:0 "禁輸を開始する！"
    UN_sanctions_system_embargo_option.2:0 "いや、彼らと貿易を続ける必要がある。"
    
    UN_sanctions_system_end.t:0 "国連制裁の解除"
    UN_sanctions_system_end.d:0 "我が国の悪名が低くなったため、国連事務総長は[SCOPE.sCountry('UN_sanctions_target').GetName]に対する制裁の一部またはすべてを解除しました。"
    UN_sanctions_system_end.f:0 "さまざまな国連制裁は、[SCOPE.sCountry('UN_sanctions_target').GetName]の悪名のレベルに応じて解除されます。"
    UN_sanctions_end_option:0 "よろしい"
    
    request_un_peacekeeping_decision:0 "国連平和維持活動を要請"
    request_un_peacekeeping_decision_desc:0 "国連総会において、敵対勢力に対し、即座に敵対行為を停止するか、さもなくば国連による集団的行動の脅威に直面することを求める決議を提出できます。ただし、これが可能かどうかは、国連安全保障理事会および総会の承認を条件とします。"
    UNSC_peacekeeping_resolution.t:0 "国連決議：[SCOPE.sCountry('un_peacekeeping_applicant').GetName]の紛争に介入しますか？"
    UNSC_peacekeeping_resolution.d:0 "[SCOPE.sCountry('un_peacekeeping_applicant').GetName]は、現在進行中の紛争において国連の支援による休戦を求める決議案を国連総会に提出しました。国連のプロトコルに従い、国際的な平和を維持する任務を負うのは安全保障理事会であるため、まずはそのメンバーが決議を支持するかどうかについて投票を行います。決議が国連安保理で可決された場合にのみ、最終的な承認を得るために国連総会へと送られます。"
    UNSC_peacekeeping_resolution.f:0 "この決議案への投票が成功した場合、決議に賛成した無作為に選ばれた安保理理事国が主導する、侵略者に対する封じ込め戦争が勃発することとなる。"
    
    un_peacekeeping_vote.option.1:0 "決議に賛成する"
    un_peacekeeping_vote.option.2:0 "決議に反対する"
    un_peacekeeping_vote.option.3:0 "棄権する"
    
    UNGA_peacekeeping_resolution_advance.t:0 "国連平和維持決議の審議が国連総会へと移りました"
    UNGA_peacekeeping_resolution_advance.d:0 "[SCOPE.sCountry('un_peacekeeping_applicant').GetName]の紛争に国連が介入することを求める決議案が、国連安全保障理事会によって承認されました。決議案は現在、国連総会での採決に向けて進んでいます。"
    UNGA_peacekeeping_resolution_advance.f:0 "国連安保理の常任理事国による拒否権が行使されず、かつ非常任理事国の過半数が決議に賛成したため、このイベントが発生しました。"
    un_peacekeeping_update:0 "実に見事である"
    
    UNGA_peacekeeping_resolution.t:0 "国連決議：[SCOPE.sCountry('un_peacekeeping_applicant').GetName]の紛争に介入するか？"
    UNGA_peacekeeping_resolution.d:0 "[SCOPE.sCountry('un_peacekeeping_applicant').GetName]は、現在進行中の紛争において国連の支援による休戦を求める決議案を国連総会に提出しました。国連安全保障理事会がこの決議案を承認したため、現在この決議が採択されるかどうかは、国連総会がこれを承認するかどうかにかかっています。"
    UNGA_peacekeeping_resolution.f:0 "この決議案への投票が成功した場合、決議に賛成した任意の国連安保理理事国が主導する、侵略者に対する封じ込め戦争が勃発することに留意してください。"
    
    UN_peacekeeping_resolution_YES.t:0 "国連平和維持決議の可決"
    UN_peacekeeping_resolution_YES.d:0 "[SCOPE.sCountry('un_peacekeeping_applicant').GetName]の現在進行中の紛争における国連支援による休戦を求める決議が、国連安全保障理事会および国連総会で可決されました。国連事務総長は、紛争におけるすべての侵略者に対し、白い平和に合意するか、さもなくば封じ込め戦争に直面することを求める最後通牒を、国連を代表して通告します。"
    UN_peacekeeping_resolution_YES.f:0 "国連は国連の最後通牒を拒絶した侵略国に対して、封じ込め戦争を開戦します。"
    
    UN_peacekeeping_ultimatum.t:0 "国連の最後通牒"
    UN_peacekeeping_ultimatum.d:0 "国連事務総長が[SCOPE.sCountry('un_peacekeeping_aggressor').GetName]に最後通牒を提示しました。「[SCOPE.sCountry('un_peacekeeping_applicant').GetName]と白和平を結ぶか、さもなくば国連安全保障理事会のメンバーの一国が率いる、我々に対する封じ込め戦争が開始されることになる」とのことです。"
    UN_peacekeeping_ultimatum.f:0 "国際的な圧力に屈することは国家的屈辱とみなされ、我が国で大きな動乱を引き起こすことになります。"
    un_peacekeeping_ultimatum.option.1:0 "最後通牒を受け入れよう"
    un_peacekeeping_ultimatum.option.2:0 "断じて認めぬ！"
    
    un_intervene_in_war.tt:0 "[SCOPE.sCountry('un_peacekeeping_applicant').GetName]と[SCOPE.sCountry('un_peacekeeping_aggressor').GetName]の間の、[SCOPE.sCountry('un_peacekeeping_applicant').GetName]が[concept_war_leader]でありかつ侵略者ではない[concept_war]に参加します。"
    UN_peacekeeping_join_war.t:0 "[SCOPE.sCountry('un_peacekeeping_applicant').GetName]を支援する国連平和維持任務"
    UN_peacekeeping_join_war.d:0 "国連安全保障理事会の認可に基づき、国連事務総長は、[SCOPE.sCountry('un_peacekeeping_applicant').GetName]が[SCOPE.sCountry('un_peacekeeping_aggressor').GetName]に対して行っている防御戦を支援するために平和維持軍を設置しました。"
    UN_peacekeeping_join_war.f:0 "平和維持任務に参加すると、[ROOT.GetCountry.GetName]は、[SCOPE.sCountry('un_peacekeeping_aggressor').GetName]との間で行われるいかなる[concept_diplomatic_play]においても[SCOPE.sCountry('un_peacekeeping_applicant').GetName]の側に加わることになります。"
    UN_peacekeeping_join_war.option.1:0 "[SCOPE.sCountry('un_peacekeeping_applicant').GetName]を支援するために我が軍を派遣する！"
    UN_peacekeeping_join_war.option.2:0 "彼らには自力で何とかさせる。"
    
    UN_peacekeeping_resolution_NO.t:0 "国連平和維持決議の否決"
    UN_peacekeeping_resolution_NO.d:0 "[SCOPE.sCountry('un_peacekeeping_applicant').GetName]の、現在進行中の紛争において国連が支援する停戦を求める決議は、国際連合によって拒否されました。行動の失敗は加盟国の責任であるとして、国連事務総長は非難を表明しています。"
    UN_peacekeeping_resolution_NO.f:0 "国連平和維持決議は、国連安保理常任理事国による拒否権の発動、あるいは国連安保理または国連総会における単純多数の賛成が得られなかったために否決されました。\n\n国連安保理の拒否権行使国：[SCOPE.sCountry('un_peacekeeping_vetoer').GetName]"
    un_peacekeeping_fails:0 "国連は全く役に立たない存在です！"
    
    un_mandate_creation.tt:0 "[SCOPE.sState('state_to_release').GetName]において、国連の$mandate$が創設されました"
    UN_peacekeeping_resolution_mandate.t:0 "国連による[ROOT.GetCountry.GetName]の解体"
    UN_peacekeeping_resolution_mandate.d:0 "国連平和維持任務の一環として、[ROOT.GetCountry.GetName]は解体されます。これは、[concept_homeland]を持たないすべての[ROOT.GetCountry.GetAdjective]領土が、国連信託統治領制度を通じて自治権を与えられることを意味します。"
    UN_peacekeeping_resolution_mandate.f:0 "このイベントにより、[ROOT.GetCountry.GetName]の[concept_primary_cultures]の[concept_homeland]ではない[concept_state]において、動的な国タグが生成されます。"
    UN_peacekeeping_resolution_mandate.option:0 "これを受け入れるほかない。"
    
    UN_peacekeeping_resolution_mandate_notice.t:0 "[SCOPE.sCountry('UNT_mandate_country').GetName]に対する国連の委任統治？"
    UN_peacekeeping_resolution_mandate_notice.d:0 "国際連合は国連委任統治領制度に基づき、我々に管理すべき領土を割り当てました。我々は委任統治を受け入れるか、拒否するかを選択できます。"
    UN_peacekeeping_resolution_mandate_notice.f:0 "委任統治期間は5年間であり、その後[ROOT.GetCountry.GetName]は[SCOPE.sCountry('UNT_mandate_country').GetName]に独立を認めなければならず、さもなくば国際的な非難に直面することになります。"
    un_peacekeeping_mandate_yes:0 "謹んで委任を承諾する。"
    un_peacekeeping_mandate_no:0 "謹んで委任を辞退いたします。"
    
    UN_peacekeeping_resolution_mandate_indy.t:0 "[SCOPE.sCountry('UNT_mandate_country').GetName]の独立か？"
    UN_peacekeeping_resolution_mandate_indy.d:0 "[SCOPE.sCountry('un_mandate_trustee').GetName]の[SCOPE.sCountry('UNT_mandate_country').GetName]に対する信託統治権が終了しました。そのため、国際連合は[SCOPE.sCountry('UNT_mandate_country').GetName]に即時独立を認めるよう我々に要請しています。"
    UN_peacekeeping_resolution_mandate_indy.f:0 "国連の信託統治者の任期は、信託統治開始日から5年間のみです。"
    un_peacekeeping_mandate_liberate:0 "[SCOPE.sCountry('UNT_mandate_country').GetName]は自由諸国の共同体に再び加わることができます！"
    un_peacekeeping_mandate_keep:0 "[SCOPE.sCountry('UNT_mandate_country').GetName]に自由を与えるに値しない。"
    
