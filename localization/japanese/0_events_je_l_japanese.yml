    warsaw_pact_member:0 "ワルシャワ条約機構加盟国"
    warsaw_pact_leader:0 "ワルシャワ条約機構主導国"
    form_warsaw_pact_decision:0 "ワルシャワ条約機構を結成"
    form_warsaw_pact_decision_desc:0 "ワルシャワ条約（正式名称は友好協力相互援助条約）は、冷戦下の1955年5月、ポーランドのワルシャワにおいて、ソ連と中央・東ヨーロッパの東側陣営の社会主義共和国7カ国との間で署名された集団防衛条約です。「ワルシャワ条約」という用語は、通常、条約そのものと、それによって形成された防衛同盟であるワルシャワ条約機構（WTO）の両方を指します。ワルシャワ条約は、中央・東ヨーロッパの東側陣営の諸国家を対象とした地域経済組織である経済相互援助会議（Comecon）に対し、軍事および経済的な補完関係にありました。ソ連が主導するワルシャワ条約は、北大西洋条約機構（NATO）および西側陣営に対抗する勢力均衡、あるいは対抗軸として設立されました。"
    join_warsaw_pact_decision:0 "ワルシャワ条約機構に参加"
    join_warsaw_pact_decision_desc:0 "ワルシャワ条約（正式名称は友好協力相互援助条約）は、冷戦下の1955年5月、ポーランドのワルシャワにおいて、ソ連と中央・東ヨーロッパの東側陣営の社会主義共和国7カ国との間で署名された集団防衛条約です。「ワルシャワ条約」という用語は、通常、条約そのものと、それによって形成された防衛同盟であるワルシャワ条約機構（WTO）の両方を指します。ワルシャワ条約は、中央・東ヨーロッパの東側陣営の諸国家を対象とした地域経済組織である経済相互援助会議（Comecon）に対し、軍事および経済的な補完関係にありました。ソ連が主導するワルシャワ条約は、北大西洋条約機構（NATO）および西側陣営に対抗する勢力均衡、あるいは対抗軸として設立されました。注：申請の処理には通常1ヶ月程度かかります。"
    leave_warsaw_pact_decision:0 "ワルシャワ条約機構から脱退"
    leave_warsaw_pact_decision_desc:0 "ワルシャワ条約（正式名称は友好協力相互援助条約）は、冷戦下の1955年5月、ポーランドのワルシャワにおいて、ソ連と中東欧の東側陣営の社会主義共和国7カ国との間で署名された集団防衛条約です。「ワルシャワ条約」という用語は、条約そのものと、それによって成立した防衛同盟であるワルシャワ条約機構（WTO）の両方を指すのが一般的です。ワルシャワ条約は、中東欧の東側陣営諸国のための地域経済組織である経済相互援助会議（コメコン）に対し、軍事的および経済的な補完関係にありました。ソ連が主導するワルシャワ条約は、北大西洋条約機構（NATO）および西側陣営に対抗する勢力均衡、あるいはカウンターウェイトとして設立されました。"
    warsaw_pact_application_var:0 "最近、ワルシャワ条約機構への加盟が申請されました。"
    warsaw_pact_application_choice.t:0 "[SCOPE.sCountry('warsaw_pact_applicant').GetName]がワルシャワ条約機構への加盟を申請しています。"
    warsaw_pact_application_choice.d:0 "[SCOPE.sCountry('warsaw_pact_applicant').GetName]がワルシャワ条約機構（ワルシャワ条約）への加盟を申請しました。[SCOPE.sCountry('warsaw_pact_leader').GetName]が現在ワルシャワ条約機構の議長を務めているため、[SCOPE.sCountry('warsaw_pact_applicant').GetName]を組織に受け入れるかどうかは我々の判断に委ねられています。"
