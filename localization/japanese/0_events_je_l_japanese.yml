    je_constitutionalise_national_values_button_desc:0 "[concept_government]は、[ROOT.GetCountry.GetName]の国是がこれ以上変化するのを防ぎ、[SCOPE.GetRootScope.GetCountry.GetCustom('national_value_name')]を支持する[Concept('concept_interest_group', '$concept_interest_groups$')]を満足させるために、[SCOPE.GetRootScope.GetCountry.GetCustom('national_value_name')]の価値を憲法化することができます。\n\nなお、[SCOPE.GetRootScope.GetCountry.GetCustom('national_value_name')]の価値を憲法に制定することで、特定の法律が制定できなくなる可能性があることに注意してください。"
    
