    je_one_china_policy_PRC.tt:0 "$DIPLO_ACTION_RELATIONS$は民主的な超大国であり、少なくとも$relations_cordial$です。"
    je_one_china_policy_PRC:0 "国際連合に加入する"
    je_one_china_policy_PRC_reason:0 "中国内戦の遺産として、現在は[SCOPE.sCountry('republic_of_china_un_seat').GetName]が国際連合で「中国」を代表しています。これは、[SCOPE.sCountry('republic_of_china_un_seat').GetName]が国際的な承認を享受している一方で、[ROOT.GetCountry.GetName]は享受していないことを意味します。このような状況は、[ROOT.GetCountry.GetAdjective]の人々にとって重大な不当行為です。したがって、我々は[SCOPE.sCountry('republic_of_china_un_seat').GetName]の国際連合での議席を確保するよう努めなければなりません。"
    je_one_china_policy_ROC.tt:0 "$relations_amicable$は共産主義的な超大国であり、少なくとも$DIPLO_ACTION_RELATIONS$です。"
    je_one_china_policy_ROC:0 "国際連合に加入する"
    je_one_china_policy_ROC_reason:0 "中国内戦の遺産として、現在は[SCOPE.sCountry('republic_of_china_un_seat').GetName]が国際連合で「中国」を代表しています。これは、[SCOPE.sCountry('republic_of_china_un_seat').GetName]が国際的な承認を享受している一方で、[ROOT.GetCountry.GetName]は享受していないことを意味します。このような状況は、[ROOT.GetCountry.GetAdjective]の人々にとって重大な不当行為です。したがって、我々は[SCOPE.sCountry('republic_of_china_un_seat').GetName]の国際連合での議席を確保するよう努めなければなりません。"
    
    je_kmt_becomes_taiwan_button:0 "台湾になる"
    je_kmt_becomes_taiwan_button_desc:0 "[ROOT.GetCountry.GetName]は、自らを台湾と改称し、中国本土に対するすべての請求権を放棄することで、「一つの中国」政策を終わらせることができます。"
    je_kmt_becomes_taiwan_button.tt:0 "$dyn_c_republic_of_china$の政府は$STATE_FORMOSA$に国外追放されています。"
    
    lower_prestige_than_THIS.tt:0 "[SCOPE.sCountry('prestige_comparator_country').GetName]は、この国よりも[concept_prestige]が少ないです。"
    
    national_reconciliation:0 "国民和解"
    je_apartheid:0 "[ROOT.GetCountry.GetNameNoFlag]のアパルトヘイト"
    je_apartheid_reason:0 "アパルトヘイトとは、特定の文化が政治的、社会的、経済的に国を支配し続けることを目的として作られた、制度化された人種隔離制度のことです。\n\n[ROOT.GetCountry.GetName]では、$law_ethnostate$、$law_national_supremacy$、または$law_racial_segregation$の[concept_law]を制定しているため、現在アパルトヘイト体制が運営されています。このアパルトヘイト制度は、$law_multicultural$の[concept_law]を制定して初めて完全に解体されます。"
    
    je_develop_nuclear_weapons:0 "核兵器開発計画"
    je_develop_nuclear_weapons_reason:0 "[ROOT.GetCountry.GetName]は現在、独自の核兵器の開発を試みています。これは[ROOT.GetCountry.GetAdjective]人の科学者が$tech_military_nuclear_3$の[concept_technology]を研究し、軍が国内に少なくとも1つの$building_nuclear_weapons_silo$の[concept_building]を建設する必要がある、極めて重大な任務です。"
    je_develop_nuclear_weapons_1.tt:0 "国内に少なくとも1つの$building_nuclear_weapons_silo$の[concept_building]が存在します"
    je_develop_nuclear_weapons_2.tt:0 "いかなる国とも$pause_nuclear_weapons_development$を結んでいない"
    
    je_develop_chemical_weapons:0 "化学兵器開発計画"
    je_develop_chemical_weapons_reason:0 "[ROOT.GetCountry.GetName]は現在、独自の化学兵器の開発を試みています。これには[ROOT.GetCountry.GetAdjective]人の科学者が$tech_military_support_1$の[concept_technology]を研究し、軍が国内に少なくとも1つの$building_industrial_chemicals_factory$の[concept_building]を建設する必要があります。"
    je_develop_chemical_weapons_1.tt:0 "国内に少なくとも1つの$building_industrial_chemicals_factory$の[concept_building]が存在します"
    
    je_develop_chemical_weapons_goal:0 "化学兵器開発計画の進捗は100％です"
    
    je_develop_biological_weapons:0 "生物兵器開発計画"
    je_develop_biological_weapons_reason:0 "[ROOT.GetCountry.GetName]は現在、独自の生物兵器の開発を試みています。これには[ROOT.GetCountry.GetAdjective]人の科学者が$tech_agriculture_4$の[concept_technology]を研究し、軍が国内に少なくとも1つの$building_university$の[concept_building]を建設する必要があります。"
    je_develop_biological_weapons_1.tt:0 "国内に少なくとも1つの$building_university$の[concept_building]が存在します"
    
    je_develop_biological_weapons_goal:0 "生物兵器開発計画の進捗は100％です"
    
    political_survivor:0 "政治的生存者"
    
    gold_standard_leader:0 "金本位制のリーダー"
    je_bretton_woods_system_leader.1.tt:0 "$law_gold_standard$を持つ国は、[SCOPE.sCountry('bretton_woods_system_leader').GetName]よりも[concept_gdp]が高いです。"
    je_bretton_woods_system_leader.2.tt:0 "世界中のどの国も$law_semi_gold_standard$を持っていません。"
    je_bretton_woods_system_leader.3.tt:0 "この国は、$law_gold_standard$を持つすべての国の中で最も高い[concept_gdp]を有しています。"
    je_bretton_woods_system_leader:0 "ブレトン・ウッズ体制"
    je_bretton_woods_system_leader_reason:0 "[SCOPE.sCountry('bretton_woods_system_leader').GetName]が主導するブレトン・ウッズ体制は、独立した州の間の通貨関係を統治することを目的とした、完全に交渉済みの通貨秩序です。ブレトン・ウッズ体制では、各国は自国通貨を[SCOPE.sCountry('bretton_woods_system_leader').GetAdjectiveNoFlag]ドルへ、固定パリティレートの1％以内で兌換性を保証することが求められました。また、外国政府や中央銀行に対しては、ドルを純金1トロイオンスあたりの設定額で金地金へ兌換することが可能でした。\n\nこの体制の効果により、$law_semi_gold_standard$を持つすべての国の$lawgroup_monetary_policy$は、[ROOT.GetCountry.GetName]が持つものとは逆になります。"
    je_bretton_woods_system_leader_status:0 "署名国：[GetPlayer.MakeScope.Var('bretton_woods_total_members').GetValue]"
    je_bretton_woods_system_member.1.tt:0 "世界中のどの国も$gold_standard_leader$ではありません。"
    je_bretton_woods_system_member.2.tt:0 "$gold_standard_leader$である国が存在します。"
    je_bretton_woods_system_member.3.tt:0 "この国は[concept_currency_union]の加盟国です。"
    je_bretton_woods_system_member.4.tt:0 "この国は[concept_currency_union]の加盟国ではありません。"
    je_bretton_woods_system_member:0 "ブレトン・ウッズ体制"
    je_bretton_woods_system_member_reason:0 "[SCOPE.sCountry('bretton_woods_system_leader').GetName]が主導するブレトン・ウッズ体制は、独立国家間の通貨関係を管理することを目的とした、完全に交渉済みの通貨秩序です。ブレトン・ウッズ体制により、各国は自国通貨を、固定パリティレートの1％以内の範囲内で[SCOPE.sCountry('bretton_woods_system_leader').GetAdjectiveNoFlag]ドルへ兌換することを保証する必要がありました。また、外国政府や中央銀行に対しては、ドルは純金1トロイオンスあたりの一定量に基づき、金地金へと兌換可能でした。\n\nこの体制の効果により、$law_semi_gold_standard$を持つすべての国の$lawgroup_monetary_policy$は、[SCOPE.sCountry('bretton_woods_system_leader').GetName]が持つものとは逆になります。"
    je_bretton_woods_system_member_status:0 "署名国：[GetPlayer.MakeScope.Var('bretton_woods_total_members').GetValue]"
    
    je_perestroika:0 "ペレストロイカ"
    je_perestroika_reason:0 "民主的な[concept_ruler]である[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [SCOPE.sCharacter('perestroika_ruler').GetFullName]は、[ROOT.GetCountry.GetName]に向けた大胆な計画を明らかにしました。この計画では、完全に中央集権化された経済計画を廃止し、政治的制限を緩和することで、この国を$gov_soviet_republic$へと改革することを目指しています。そのために、[SCOPE.sCharacter('perestroika_ruler').GetFullName]はこの新しい労働者の楽園を創り出すべく、[Concept('concept_law', '$concept_laws$')]の制定を目指しています。\n\nなお、[ROOT.GetCountry.GetName]の共産主義強硬派はこの計画に不満を抱き、[SCOPE.sCharacter('perestroika_ruler').GetFullName]の撤廃を求めて扇動を行うでしょう。"
    
    icj_judgement_winner.t:0 "ICJの有利な判決"
    icj_judgement_winner.d:0 "国際司法裁判所は、[SCOPE.sCountry('icj_judgement_winner').GetNameNoFlag]対[SCOPE.sCountry('icj_judgement_loser').GetNameNoFlag]の領土仲裁事件において[SCOPE.sCountry('icj_judgement_winner').GetName]に有利な判決を下しました。そして、[SCOPE.sCountry('icj_judgement_loser').GetName]における係争中の[concept_homeland]は、正当かつ唯一の[SCOPE.sCountry('icj_judgement_winner').GetAdjective]であると認めました。そのため、裁判所は[SCOPE.sCountry('icj_judgement_loser').GetName]に対し、それらを[SCOPE.sCountry('icj_judgement_winner').GetName]に返還するよう命令しました。"
    icj_judgement_winner.f:0 "[SCOPE.sCountry('icj_judgement_loser').GetName]は、所有しているすべての[SCOPE.sCountry('icj_judgement_winner').GetAdjective]および[SCOPE.sCountry('icj_judgement_loser').GetAdjective]の母国において母国を失うことはありません。[SCOPE.sCountry('icj_judgement_loser').GetName]は、それらの州を返還するかどうかを選択するオプションを持つことになります。"
    icj_judgement_winner.option:0 "正義が下されました！"
    
    icj_judgement_loser_target.t:0 "不利なICJ判決"
    icj_judgement_loser_target.d:0 "国際司法裁判所は、[SCOPE.sCountry('icj_judgement_winner').GetNameNoFlag]対[SCOPE.sCountry('icj_judgement_loser').GetNameNoFlag]の領土仲裁事件において[SCOPE.sCountry('icj_judgement_winner').GetName]に有利な判決を下しました。そして、[SCOPE.sCountry('icj_judgement_loser').GetName]における係争中の[concept_homeland]は、正当かつ唯一の[SCOPE.sCountry('icj_judgement_winner').GetAdjective]であると認めました。そのため、裁判所は[SCOPE.sCountry('icj_judgement_loser').GetName]に対し、それらを[SCOPE.sCountry('icj_judgement_winner').GetName]に返還するよう命令しました。"
    icj_judgement_loser_target.f:0 "[SCOPE.sCountry('icj_judgement_loser').GetName]がそれらを[SCOPE.sCountry('icj_judgement_winner').GetName]に返還することを選択した場合、すべての[SCOPE.sCountry('icj_judgement_winner').GetAdjective]および[SCOPE.sCountry('icj_judgement_loser').GetAdjective]の母国において母国を失うことはありません。"
    icj_judgement_loser.option.1:0 "「裁判所の判決を受け入れる」"
    icj_judgement_loser.option.2:0 "「裁判所は間違っている！」"
    
    icj_judgement_rejection.t:0 "[SCOPE.sCountry('icj_judgement_loser').GetName]がICJ判決を拒絶"
    icj_judgement_rejection.d:0 "[SCOPE.sCountry('icj_judgement_loser').GetName]は、[SCOPE.sCountry('icj_judgement_winner').GetName]に有利な国際司法裁判所の判決を認めることを拒否しました。裁判官に偏りがあり、国際法の適用も誤っていると主張しており、そのため[SCOPE.sCountry('icj_judgement_loser').GetName]はその判決を認めません。"
    icj_judgement_rejection.f:0 "[SCOPE.sCountry('icj_judgement_loser').GetName]は、所有するすべての[SCOPE.sCountry('icj_judgement_winner').GetAdjective]および[SCOPE.sCountry('icj_judgement_loser').GetAdjective]の母国において、自国の母国を保持します。"
    icj_judgement_rejection.option:0 "国際法は冗談だ"
    
    icj_judgement_loser.t:0 "不利なICJ判決"
    icj_judgement_loser.d:0 "国際司法裁判所は、[SCOPE.sCountry('icj_judgement_winner').GetName]対[SCOPE.sCountry('icj_judgement_loser').GetName]の領土仲裁事件において[SCOPE.sCountry('icj_judgement_winner').GetName]に有利な裁定を下し、[SCOPE.sCountry('icj_judgement_winner').GetName]における紛争中の[concept_homeland]は、正当かつ唯一に[SCOPE.sCountry('icj_judgement_winner').GetAdjective]のものであると判断しました。これにより、裁判所は両国間の国境に一切の変更を加えないよう命じました。"
    icj_judgement_loser.f:0 "[SCOPE.sCountry('icj_judgement_loser').GetName]は、[SCOPE.sCountry('icj_judgement_winner').GetName]が所有するすべての[SCOPE.sCountry('icj_judgement_winner').GetAdjective]および[SCOPE.sCountry('icj_judgement_loser').GetAdjective]の母国において、母国を失うことはありません。"
    
    won_a_war.t:0 "戦争に勝利"
    won_a_war.d:0 "[ROOT.GetCountry.GetName]は関与していた戦争に勝利しました。[ROOT.GetCountry.GetAdjectiveNoFlag]の人々は歓喜し、[SCOPE.sCharacter('war_ruler_scope').GetFullName]の指導部と将軍[SCOPE.sCharacter('supreme_commander_scope').GetFullName]を称えています！"
    won_a_war.f:0 "このイベントは、[ROOT.GetCountry.GetName]が[concept_war]における[concept_war_goal]を強制したために発生しました。"
    won_a_war.option:0 "素晴らしい！"
    
    lost_a_war.t:0 "戦争に敗北"
    lost_a_war.d:0 "[ROOT.GetCountry.GetName]は関与していた戦争で敗北しました。[ROOT.GetCountry.GetAdjectiveNoFlag]の人々は激怒しており、この恥ずべき敗北について、[SCOPE.sCharacter('war_ruler_scope').GetFullName]の指導部と[SCOPE.sCharacter('supreme_commander_scope').GetFullName]将軍を非難しています！"
    lost_a_war.f:0 "このイベントは、[ROOT.GetCountry.GetName]が[concept_war]において降伏したために発生しました。"
    lost_a_war.option:0 "それが現実なのです。"
    
    inconclusive_war.t:0 "戦争は終わった"
    inconclusive_war.d:0 "[ROOT.GetCountry.GetName]は関与していた戦争において多くの血と財宝を流しましたが、個人的な利益は何も得られませんでした。[ROOT.GetCountry.GetAdjectiveNoFlag]の人々は、自国が他者の利益のために戦争を行ったことに不満を抱いており、この無意味な戦争について、[SCOPE.sCharacter('war_ruler_scope').GetFullName]の指導部と[SCOPE.sCharacter('supreme_commander_scope').GetFullName]将軍を批判しています！"
    inconclusive_war.f:0 "このイベントは、[ROOT.GetCountry.GetName]が[concept_war]において降伏もせず、また[ROOT.GetCountry.GetName]に属する[concept_war_goal]を強制もしなかったために発生しました。"
    inconclusive_war.option:0 "我々は最善を尽くしました……"
    
    won_a_war_event.tt:0 "政府および軍事キャラクターの人気度が上昇"
    lost_a_war_event.tt:0 "政府および軍事キャラクターの人気度が低下"
    
    gain_20_war_support_event.tt:0 "[concept_war_support]を20獲得"
    
    lose_20_war_support_event.tt:0 "[concept_war_support]を20喪失"
    lose_10_war_support_event.tt:0 "[concept_war_support]を10喪失"
    lose_2_war_support_event.tt:0 "[concept_war_support]を2喪失"
    lose_1_war_support_event.tt:0 "[concept_war_support]を1喪失"
    
    je_war_system_1.tt:0 "[concept_war_goal]を強制"
    je_war_system_2.tt:0 "[concept_war_goal]を強制せず"
    je_war_system:0 "[ROOT.GetCountry.GetAdjectiveNoFlag]戦争評議会"
    je_war_system_reason:0 "[ROOT.GetCountry.GetName]は現在[concept_war]に関与しているため、[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]の[ROOT.GetCountry.GetRuler.GetFullName]によって戦争内閣が組織されました。将軍である[SCOPE.sCharacter('supreme_commander_scope').GetFullName]が戦争遂行の全責任を負っています。[ROOT.GetCountry.GetAdjectiveNoFlag]の人々は最終的な勝利を待ち望んでおり、もしそれが実現しなければ、彼らはひどく失望することでしょう。"
    
    won_a_war_modifier:0 "戦争に勝利"
    stalemate_in_war_modifier:0 "戦争の膠着状態"
    lost_a_war_modifier:0 "戦争に敗北"
    patriotic_mood_modifier:0 "愛国的な熱狂"
    
    praised_for_winning_war:0 "戦争勝利を称賛される"
    blamed_for_losing_war:0 "戦争敗北の責めを負う"
    blamed_for_pointless_war:0 "無意味な戦争の責めを負う"
    
    je_wartime_measures_martial_law_button:0 "戒厳令を布告"
    je_wartime_measures_martial_law_button_desc:0 "戒厳令とは、文民統治に代わって軍の権力を一時的に導入するものであり、通常、戦争、反乱、または自然災害の際に発動されます。戒厳令が施行されている間、その地域または国の司令官は、法律を制定し、それを強制する無制限の権力を持ちます。"
    je_wartime_measures_martial_law_remove_button:0 "戒厳令を解除する"
    je_wartime_measures_martial_law_remove_button_desc:0 "[concept_government]は、戦争中であればいつでも戒厳令を解除できます。"
    recently_enacted_martial_law.tt:0 "戒厳令が少なくとも3ヶ月間施行されています。"
    wartime_measures_martial_law:0 "戦時戒厳令"
    
    je_wartime_measures_rationing_button:0 "配給制を導入する"
    je_wartime_measures_rationing_button_desc:0 "配給制とは、需要が高く供給が不足している商品やサービスを制限することです。これは、不足の影響を緩和し、経済的課題に対処する方法として、しばしば政府によって行われます。"
    je_wartime_measures_rationing_remove_button:0 "配給制を終了する"
    je_wartime_measures_rationing_remove_button_desc:0 "[concept_government]は、戦争中であればいつでも配給制を解除できます。"
    recently_enacted_wartime_measures_rationing.tt:0 "配給制が少なくとも3ヶ月間導入されています。"
    wartime_measures_rationing:0 "戦時配給制"
    
    je_wartime_measures_propaganda_button:0 "プロパガンダの拡散"
    je_wartime_measures_propaganda_button_desc:0 "プロパガンダは、兵士や市民の心の中に虚像を作り出すことで、国内外の想定される敵に対して非人間的な扱いをさせ、憎悪を生み出すことができるため、戦争における強力な武器となります。\n\nこの戦時措置が継続している間、毎月5 [concept_war_support]が追加されます。"
    je_wartime_measures_propaganda_remove_button:0 "プロパガンダを停止する"
    je_wartime_measures_propaganda_remove_button_desc:0 "[concept_government]は、戦争中であればいつでもプロパガンダの拡散を停止できます。停止後は、毎月の5 [concept_war_support]は追加されなくなります。"
    recently_enacted_wartime_measures_propaganda.tt:0 "プロパガンダが少なくとも3ヶ月間拡散されています。"
    wartime_measures_propaganda:0 "戦時プロパガンダ"
    
    je_wartime_measures_war_bonds_button:0 "戦時公債を発行する"
    je_wartime_measures_war_bonds_button_desc:0 "戦時公債とは、戦争や紛争時における軍事作戦の資金を調達するために、政府が発行する負債証券です。戦時公債は市場レートを下回る収益率であったため、愛国的な市民に対して政府への貸付を求める感情的な訴えを行うことで、投資を実現していました。"
    recently_enacted_wartime_measures_war_bonds.tt:0 "過去1ヶ月間に戦時公債が発行されていません。"
    
