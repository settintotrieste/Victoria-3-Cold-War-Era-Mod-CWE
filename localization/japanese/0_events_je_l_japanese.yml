    espionage_election_interference.t:0 "[SCOPE.sCountry('espionage_target').GetName]における選挙干渉の機会"
    espionage_election_interference.d:0 "[SCOPE.sCountry('espionage_attacker').GetAdjective]の工作員が[SCOPE.sCountry('espionage_target').GetName]で活動する中で、[SCOPE.sCountry('espionage_target').GetAdjective]政府の与党による選挙キャンペーンを妨害する機会を見つけました。彼らは、[SCOPE.sCountry('espionage_target').GetAdjective]の有権者の間に与党に関する一連の根拠のない請求権を広めることで、その評判を汚すことを提案しています。この秘密工作は、[SCOPE.sCountry('espionage_target').GetAdjective]政府内の任意の政党の選挙の勢いを低下させるはずです。"
    espionage_election_interference.f:0 "我々のアクションが[SCOPE.sCountry('espionage_target').GetAdjective]の諜報に発覚し、[SCOPE.sCountry('espionage_target').GetName]との関係に重度の打撃を与える可能性があることに注意してください。"
    
    espionage_election_interference_target.t:0 "[SCOPE.sCountry('suspected_espionage_attacker').GetAdjective]のスパイによる選挙干渉"
    espionage_election_interference_target.d:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('secret_police_custom_title')]は、[SCOPE.sCountry('suspected_espionage_attacker').GetAdjective]のスパイが[concept_government]に関する一連の根拠のない請求権を広め、与党である[concept_party]の[concept_election][concept_momentum]を低下させたことを報告しています。"
    espionage_election_interference_target.f:0 "[SCOPE.sCountry('suspected_espionage_attacker').GetName]が秘密工作を行ったというのはあくまで推測に過ぎないため、彼らを反逆罪で告発することは不適切かもしれません。"
    
    notification_espionage_election_interference_name: "$espionage_election_interference_target.t$"
    notification_espionage_election_interference_desc: "$espionage_election_interference_target.d$"
    
    espionage_terror_attack_target.t:0 "[SCOPE.sState('terror_attack_state').GetName]でのテロ攻撃"
    espionage_terror_attack_target.d:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('secret_police_custom_title')]は、[SCOPE.sCountry('suspected_espionage_attacker').GetAdjective]のスパイが[SCOPE.sState('terror_attack_state').GetName]でのテロ攻撃を支援し、それが[concept_state]に多大な[concept_devastation]をもたらしたことを報告しています。"
    espionage_terror_attack_target.f:0 "[SCOPE.sCountry('suspected_espionage_attacker').GetName]が秘密工作を行ったというのはあくまで推測に過ぎないため、彼らを反逆罪で告発することは不適切かもしれません。"
    
