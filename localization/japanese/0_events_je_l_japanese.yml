    je_nato_system:0 "北大西洋条約機構"
    je_nato_system_reason:0 "北大西洋条約機構は、欧州および北米の州による政府間軍事同盟です。第二次世界大戦の終結後に設立されたこの組織は、1949年4月4日にワシントンD.C.で署名された北大西洋条約を施行しました。NATOは集団安全保障体制であり、その独立した加盟国は、第三者による攻撃に対して互いに防衛することに同意しています。\n\nリーダー：[SCOPE.sCountry('nato_leader').GetName]\n\n本部：#y [SCOPE.sCountry('nato_leader').GetCapital.GetCityHubName]#!"
