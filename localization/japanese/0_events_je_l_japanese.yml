    global_reserve_currency:0 "基軸通貨"
    global_reserve_currency.t:0 "基軸通貨の地位を獲得しました"
    global_reserve_currency.d:0 "[SCOPE.sCountry('global_reserve_currency_country').GetName]の通貨は、自由市場経済の威信・安定性・強さにより、基軸通貨となりました。"
    global_reserve_currency.f:0 "我々のランクが列強を下回り、計画経済へと移行するか、あるいはローンに対して債務不履行に陥った場合には、基軸通貨の地位を失います。"
    
    global_reserve_currency_lose.t:0 "基軸通貨の地位喪失"
    global_reserve_currency_lose.d:0 "[SCOPE.sCountry('global_reserve_currency_country').GetName]の通貨は、その経済が国際的な投資家や国々にとって十分に魅力的ではなくなったため、もはや基軸通貨ではありません。"
    global_reserve_currency_lose.f:0 "ランクが列強を下回った場合、計画経済になった場合、あるいは債務不履行に陥った場合、我々は基軸通貨の地位を失うことになります。"
    
    major_reserve_currency:0 "主要準備通貨"
    major_reserve_currency.t:0 "主要準備通貨の地位を獲得しました"
    major_reserve_currency.d:0 "[SCOPE.sCountry('major_reserve_currency_country').GetName]の通貨は、自由市場経済の威信、安定性、および強さにより、主要準備通貨となりました。"
    major_reserve_currency.f:0 "ランクが列強を下回った場合、計画経済への移行、あるいは債務不履行に陥った場合、我々は主要準備通貨の地位を失うことになります。"
    
    major_reserve_currency_lose.t:0 "主要準備通貨の地位を喪失"
    major_reserve_currency_lose.d:0 "[SCOPE.sCountry('major_reserve_currency_country').GetName]の通貨は、経済の魅力が国際的な投資家や諸国にとって不十分となったため、もはや主要準備通貨ではなくなりました。"
    major_reserve_currency_lose.f:0 "ランクが列強を下回った場合、計画経済になった場合、あるいは債務不履行に陥った場合、我々は主要準備通貨の地位を失うことになります。"
    
    currency_system.option:0 "承知した。"
    
    je_OPEC_system:0 "石油輸出国機構"
    je_OPEC_system_reason:0 "1960年に設立された石油輸出国機構（OPEC）は、市場を安定させ世界的な価格に影響を与えるためにエネルギー政策を調整する、主要な石油生産国の連合体です。生産レベルを管理することで、OPECは生産者への公正な利益と消費者への安定した供給を確保することを目指しています。\n\nその決定は国際貿易、産業の成長、および地政学的な関係に波及し、現代のリソース外交における中心的な役割を担っています。\n\n加盟国には集団的な交渉力が与えられますが、同時に、国家の利益と世界のエネルギー需要のバランスをとる複雑な交渉に縛られることにもなり、世界中の石油の輸出入に依存する経済の軌道を形作っています。\n\n総メンバー数：[GetGlobalVariable('OPEC_member_count').GetValue]"
    
    je_OPEC_increase_oil_quota_button:0 "石油生産枠を引き上げる"
    je_OPEC_increase_oil_quota_button_desc:0 "OPECの石油生産枠は、世界的な供給を管理し価格を安定させるために、石油輸出機構（OPEC）によって設定された合意済みの制限事項です。OPECのリーダーとして、我々はすべてのOPEC加盟国の石油生産枠を決定することができます。"
    
    je_OPEC_decrease_oil_quota_button:0 "石油生産枠を削減します"
    je_OPEC_decrease_oil_quota_button_desc:0 "OPECの石油生産枠は、世界的な供給を管理し価格を安定させるために、石油輸出機構（OPEC）によって設定された合意済みの制限事項です。OPECのリーダーとして、我々はすべてのOPEC加盟国の石油生産枠を決定することができます。"
    
    je_OPEC_ignore_oil_quota_button:0 "石油生産枠を無視する"
    je_OPEC_ignore_oil_quota_button_desc:0 "OPECの石油生産枠は、世界的な供給を管理し価格を安定させるために、石油輸出機構（OPEC）によって設定された合意済みの制限事項です。しかしながら、我々は国益のためにそれらを無視することを選択することもできます。"
    
    je_OPEC_restore_oil_quota_button:0 "石油生産枠に従う"
    je_OPEC_restore_oil_quota_button_desc:0 "OPECの石油生産枠は、世界的な供給を管理し価格を安定させるために、石油輸出機構（OPEC）によって設定された合意済みの制限事項です。現在はそれらの枠を無視していますが、他のOPECメンバーを満足させるために、遵守を再開することを選択することもできます。"
    
    OPEC_quota_timer.tt:0 "過去12ヶ月間にOPEC石油生産枠を変更しませんでした。"
    OPEC_oil_quota_defiance_timer.tt:0 "過去12ヶ月間、OPEC石油生産枠を遵守しています。"
    
    OPEC_oil_quota.t:0 "OPEC石油生産枠の変更"
    OPEC_oil_quota.1.d:0 "[ROOT.GetCountry.GetName]がメンバーである石油輸出機構の議長が、OPEC石油生産枠の変更を発表しました。\n\n今後、石油生産枠は非常に低くなります。"
    OPEC_oil_quota.2.d:0 "[ROOT.GetCountry.GetName]がメンバーである石油輸出機構の議長が、OPEC石油生産枠の変更を発表しました。\n\n今後、石油生産枠は極めて低くなります。"
    OPEC_oil_quota.3.d:0 "[ROOT.GetCountry.GetName]がメンバーである石油輸出機構の議長が、OPEC石油生産枠の変更を発表しました。\n\n今後、石油生産枠は中程度になります。"
    OPEC_oil_quota.4.d:0 "[ROOT.GetCountry.GetName]が加盟している石油輸出機構（OPEC）の議長が、OPEC石油生産枠の変更を発表しました。\n\n今後、石油生産枠は「高」になります。"
    OPEC_oil_quota.5.d:0 "[ROOT.GetCountry.GetName]が加盟している石油輸出機構（OPEC）の議長が、OPEC石油生産割当の変更を発表した。\n\n今後、石油生産割当は非常に高くなる。"
    OPEC_oil_quota.f:0 "OPEC石油生産割当はOPEC主導国によって決定されます。\n\n[ROOT.GetCountry.GetName]はOPECのメンバーであるため、条約によりこれらの割当に従う義務があります。\n\nしかし、条約を無視して、悪名や他のOPEC加盟国との関係悪化を代償に、望むだけの石油を汲み上げることも可能です。"
    OPEC_accept_quota:0 "割当を厳格に遵守する"
    OPEC_reject_quota:0 "割当の遵守を拒否する。石油を自由に流せ！"
    
