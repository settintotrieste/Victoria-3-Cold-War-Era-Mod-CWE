    changed_armed_forces_timer.tt:0 "過去12か月間に[ROOT.GetCountry.GetAdjective]武装部隊の構成を変更しませんでした"
    
    je_armed_forces_system:0 "[ROOT.GetCountry.GetAdjectiveNoFlag]武装部隊"
    je_armed_forces_system_reason:0 "[ROOT.GetCountry.GetAdjective]武装部隊は、あなたの国の軍事組織――士官、軍人、そして彼らを支える機関を象徴しています。彼らは強力な[concept_interest_group]であり、しばしば秩序、ヒエラルキー、そして拡張を好みます。その勢力は規律ある統治を通じて安定性を確保できますが、抑制されない影響力は軍国主義と権威主義のリスクを招きます。\n\n官僚の長：[SCOPE.sCharacter('head_of_armed_forces').GetFullName]\n\n注：武装部隊における腐敗は、より厳格な#y $lawgroup_corruption_policy$#![Concept('concept_law','$concept_laws$')]を制定することで軽減できます。"
    
    je_armed_forces_system_dismiss_military_chief_button:0 "武装部隊の長を解任する"
    je_armed_forces_system_dismiss_military_chief_button_desc:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]は、武装部隊の長を解任し、[concept_commander_rank]における次の順位の人物と交代させます。"
    
    je_armed_forces_system_subvert_armed_forces_button:0 "武装部隊を転覆させる"
    je_armed_forces_system_subvert_armed_forces_button_desc:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]は、[ROOT.GetCountry.GetAdjectiveNoFormatting]武装部隊の非体制派のメンバーに辞職を迫り、彼らを思想的に忠実な軍人と交代させます。"
    
    je_armed_forces_system_reform_armed_forces_button:0 "武装部隊を改革する"
    je_armed_forces_system_reform_armed_forces_button_desc:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]は、武装部隊の思想的傾向が民意を反映したものとなるよう、国を代表するような軍人を主要なポストに任命します。"
    
    je_armed_forces_system_restore_armed_forces_button:0 "武装部隊の非政治化"
    je_armed_forces_system_restore_armed_forces_button_desc:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]によって[ROOT.GetCountry.GetAdjectiveNoFormatting]軍は独自のメンバーを任命できるようになります。これにより、エリート主義的かつ技術官僚的な組織が形成されます。"
    
    je_evolved_armed_forces_3.tt:0 "$ig_armed_forces$の[concept_interest_group]は、[concept_government]における最も強力な[concept_interest_group]が持つ[concept_ideology]とは異なります。"
    je_evolved_armed_forces_2.tt:0 "$ig_armed_forces$の[concept_interest_group]は、[concept_government]における最も強力な[concept_interest_group]と同じ[concept_ideology]を共有しています。"
    
    1948_Universal_Declaration_of_Human_Rights.t:0 "世界人権宣言"
    1948_Universal_Declaration_of_Human_Rights.d:0 "1948年12月10日、国際連合総会は、すべての人の固有の尊厳と平等の権利を宣言する画期的な文書である世界人権宣言を採択しました。第二次世界大戦の終結後に起草されたこの宣言は、基本的な自由と保護を定め、現代の国際人権法の基礎となりました。"
    1960_UNGA_Resolution_1514.t:0 "独立付与宣言"
    1960_UNGA_Resolution_1514.d:0 "1960年12月14日、国際連合総会は、すべての人民が民族自決権と独立の権利を有することを宣言する決議1514号を採択しました。この歴史的な決議は脱植民地化のプロセスを加速させ、数十の国々を植民地支配からの解放へと導きました。"
    1961_UN_Committee_On_Decolonisation.t:0 "脱植民地化特別委員会"
    1961_UN_Committee_On_Decolonisation.d:0 "1961年11月27日、国際連合は決議1514号の履行を監視することを任務とする脱植民地化特別委員会を設置しました。「24委員会」として知られるこの組織は、世界中での植民地主義の終焉と民族自決の承認を提唱する中心的な機関となりました。"
    1970_UNGA_Resolution_2625.t:0 "友好関係宣言"
    1970_UNGA_Resolution_2625.d:0 "1970年10月24日、国際連合総会は、主権平等、不干渉、および人民の民族自決権を含む国際法の原則を確認する決議2625号を採択しました。これにより、脱植民地化と国家間の平和的な協力のための法的枠組みが強化されました。"
    2000_Millennium_Development_Goals.t:0 "ミレニアム開発目標"
    2000_Millennium_Development_Goals.d:0 "2000年9月8日、国際連合は2015年までに貧困を削減し、健康を改善し、教育を促進するための8つの野心的な目標であるミレニアム開発目標を採択しました。このイニシアチブは、新しい世紀における開発と協力への世界的なコミットメントとなりました。"
    historical_un_events.option.1:0 "本件にご注意いただきありがとうございます。"
    
    je_generic_decolonisation_overlord_system:0 "反植民地主義感情"
    je_generic_decolonisation_overlord_system_reason:0 "諸国家が帝国主義的な支配を解体していく中で、反植民地主義は20世紀半ばを象徴するものとなりました。アフリカからアジアに至るまで、独立運動は同盟や冷戦戦略を塗り替えました。主権は単なる国境以上の意味を持ちました。それは資源、アイデンティティ、そして運命を掌握するための要求であり、世界の大国は急速に脱植民地化が進む世界に適応することを余儀なくされました。\n\n[ROOT.GetCountry.GetName]が[Concept('concept_unincorporated_state','$concept_unincorporated_states$')]を所有しているため、それらの州の人口は、自決権か、あるいは[ROOT.GetCountry.GetAdjective]人の市民としての完全な権利のいずれかを要求しています。"
    
    je_generic_decolonisation_colonial_purge_button:0 "植民地浄化を実施"
    je_generic_decolonisation_colonial_purge_button_desc:0 "[ROOT.GetCountry.GetAdjective]の[concept_government]は、その植民地および主権のない[Concept('concept_subject', '$concept_subjects$')]におけるすべての反植民地主義的な扇動者と支持者を、暴力的に浄化します。"
    
    je_generic_decolonisation_subject_system:0 "[ROOT.GetCountry.GetAdjectiveNoFormatting]のナショナリズム"
    je_generic_decolonisation_subject_system_reason:0 "諸国家が帝国主義的な支配を解体していく中で、反植民地主義は20世紀半ばを象徴するものとなりました。アフリカからアジアに至るまで、独立運動は同盟や冷戦戦略を塗り替えました。主権は単なる国境以上の意味を持ちました。それは資源、アイデンティティ、そして運命を掌握するための要求であり、世界の大国は急速に脱植民地化が進む世界に適応することを余儀なくされました。\n\n[ROOT.GetCountry.GetName]は外国勢力の植民地[concept_subject]であるため、[ROOT.GetCountry.GetAdjective]の現地住民は独立を要求しています。"
    
    je_generic_decolonisation_civil_disobedience_button:0 "反植民地主義抗議活動の呼びかけ"
    je_generic_decolonisation_civil_disobedience_button_desc:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]の[GetPlayer.GetRuler.GetFullName]は、すべての[ROOT.GetCountry.GetAdjective]の人々に、[concept_overlord]に従わないよう呼びかけます。"
    
    je_mandate_decolonisation_system:0 "[ROOT.GetCountry.GetAdjectiveNoFormatting]の委任統治領"
    je_mandate_decolonisation_system_reason:0 "委任統治領は、国際的な監督下に置かれた領土として第一次世界大戦後に登場しました。これらはしばしば、国際連盟を通じて植民地列強によって管理されました。\n\n移行期の統治を目的としていましたが、実際には管理の名の下に帝国の影響力を拡大させるために利用されることが頻繁にありました。\n\nCold War Eraまでには、委任統治領を所有する国々は、その委任統治領に独立を認めるよう国際的な圧力に直面し始めました。\n\n国際連合は、[ROOT.GetCountry.GetName]によるその[concept_mandate]の永続的な所有権を認めていないため、すべての委任統治領に独立が与えられるまで、[ROOT.GetCountry.GetName]は外交的制裁に直面することになります。"
    
