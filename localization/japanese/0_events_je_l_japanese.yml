    je_upper_house:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('upper_house_name')]"
    je_upper_house_reason:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('upper_house_name')]は[SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')]の上院です。これには、助言および同意に関するいくつかの権限があります。これらには、条約の承認権、および閣僚、裁判官（最高裁判所の判事を含む）、将官、規制当局の職員、大使、その他の行政官、および制服組の将校の承認権が含まれます。[SCOPE.GetRootScope.GetCountry.GetCustom('upper_house_name')]は、[SCOPE.GetRootScope.GetCountry.GetCustom('lower_house_name')]で可決された法案に対して拒否権を行使することもできます。\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('upper_house_name')]において#y 政府支持#!の多数派を確保すれば、[concept_government]は[concept_law]を可決できるようになります。\n\n政府支持率：#BOLD [GetPlayer.MakeScope.Var('upper_house_majority_var').GetValue]%#!\n\n[concept_interest_group]別の議席配分：$UH_seat_distribution_loc$"
    je_upper_house_status:0 "[concept_government]支持議員：[GetPlayer.MakeScope.Var('upper_house_majority_var').GetValue]%"
    
    UH_seat_distribution_loc:0 "\n\n[GetInterestGroupVariant('ig_industrialists',GetPlayer).GetNameWithCountryVariant]：#BOLD [GetPlayer.MakeScope.Var('senators_ig_industrialists_var_display').GetValue]％#!\n\n[GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetNameWithCountryVariant]：#BOLD [GetPlayer.MakeScope.Var('senators_ig_petty_bourgeoisie_var_display').GetValue]％#!\n\n[GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetNameWithCountryVariant]：#BOLD [GetPlayer.MakeScope.Var('senators_ig_trade_unions_var_display').GetValue]％#!\n\n[GetInterestGroupVariant('ig_landowners',GetPlayer).GetNameWithCountryVariant]：#BOLD [GetPlayer.MakeScope.Var('senators_ig_landowners_var_display').GetValue]％#!\n\n[GetInterestGroupVariant('ig_devout',GetPlayer).GetNameWithCountryVariant]：#BOLD [GetPlayer.MakeScope.Var('senators_ig_devout_var_display').GetValue]％#!\n\n[GetInterestGroupVariant('ig_rural_folk',GetPlayer).GetNameWithCountryVariant]：#BOLD [GetPlayer.MakeScope.Var('senators_ig_rural_folk_var_display').GetValue]％#!\n\n[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetNameWithCountryVariant]：#BOLD [GetPlayer.MakeScope.Var('senators_ig_armed_forces_var_display').GetValue]％#!\n\n[GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetNameWithCountryVariant]：#BOLD [GetPlayer.MakeScope.Var('senators_ig_intelligentsia_var_display').GetValue]％#!"
    
    first_past_the_post_upper_house:0 "\n\n・[concept_government]の[concept_interest_group]が[GetPlayer.MakeScope.Var('upper_house_upper_limit_var_display').GetValue]％以上の[concept_clout]を持つ[concept_incorporated_state]ごとに、[SCOPE.GetRootScope.GetCountry.GetCustom('upper_house_name')]における[concept_government]の掌握を#BOLD [GetPlayer.MakeScope.Var('upper_house_increment_FTP_upper_var').GetValue]％#!増加します。\n\n- [concept_government]の[concept_interest_group]が[GetPlayer.MakeScope.Var('upper_house_lower_limit_var_display').GetValue]％より多く[GetPlayer.MakeScope.Var('upper_house_upper_limit_var_display').GetValue]％未満の[concept_clout]を持つ[concept_incorporated_state]ごとに、[SCOPE.GetRootScope.GetCountry.GetCustom('upper_house_name')]における[concept_government]の掌握を#BOLD [GetPlayer.MakeScope.Var('upper_house_increment_FTP_lower_var').GetValue]％#!増加します。"
    jefferson_system_upper_house:0 "\n\n・[concept_incorporated_state]ごとに、[GetPlayer.MakeScope.Var('upper_house_upper_limit_var_display').GetValue]%以上の[concept_clout]を持つ[concept_government][concept_interest_group]がいる場合、[SCOPE.GetRootScope.GetCountry.GetCustom('upper_house_name')]における[concept_government]の支配力が#BOLD [GetPlayer.MakeScope.Var('upper_house_increment_FTP_upper_var').GetValue]%#!増加します。\n\nー[concept_incorporated_state]ごとに、[GetPlayer.MakeScope.Var('upper_house_lower_limit_var_display').GetValue]%を超え[GetPlayer.MakeScope.Var('upper_house_upper_limit_var_display').GetValue]%未満の[concept_clout]を持つ[concept_government][concept_interest_group]がいる場合、[SCOPE.GetRootScope.GetCountry.GetCustom('upper_house_name')]における[concept_government]の支配力が#BOLD [GetPlayer.MakeScope.Var('upper_house_increment_FTP_lower_var').GetValue]%#!増加します。\n\nーすべての[concept_state]において、[concept_government][concept_interest_group]が持つ[concept_clout]が[GetPlayer.MakeScope.Var('upper_house_005_var').GetValue]%ごとに、[SCOPE.GetRootScope.GetCountry.GetCustom('upper_house_name')]における[concept_government]の支配力が#BOLD [GetPlayer.MakeScope.Var('upper_house_increment_PR_var').GetValue]%#!増加します。"
    propotional_representation_upper_house:0 "\n\n・[concept_government][concept_interest_group]が持つ[concept_clout]が[GetPlayer.MakeScope.Var('lower_house_010_var').GetValue]%ごとに、[SCOPE.GetRootScope.GetCountry.GetCustom('upper_house_name')]における[concept_government]の支配力が#BOLD 10%#!増加します。"
    
