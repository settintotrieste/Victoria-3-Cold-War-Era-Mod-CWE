    je_secret_police_system:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('secret_police_custom_title')]"
    je_secret_police_system_status:0 "忠実性：[GetPlayer.MakeScope.Var('secret_police_loyalty').GetValue]％（月次変化：[GetPlayer.MakeScope.Var('secret_police_loyalty_monthly').GetValue]％）\n利用可能な秘密工作ポイント：[GetPlayer.MakeScope.Var('secret_police_action_points').GetValue]"
    je_secret_police_system_reason:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('secret_police_custom_title')]は[ROOT.GetCountry.GetName]の秘密警察です。\n\n秘密警察（または政治警察）とは、政府の政治的、宗教的、あるいは社会的な反対勢力や反体制派に対して秘密工作を行う警察、諜報、または治安維持機関を指します。彼らは独裁者や政権の政治的権力を保護するために活動し、反体制派を弾圧して政治的反対勢力を弱体化させるため、しばしば法の枠外で、頻繁に暴力を用いて活動します。\n\n利用可能な秘密工作ポイント：[GetPlayer.MakeScope.Var('secret_police_action_points').GetValue] \n\n諜報局長：[SCOPE.sCharacter('head_of_intelligence').GetFullName]（[SCOPE.gsInterestGroup('secret_police_IG').GetName]）\n\n機関の忠実性：[GetPlayer.MakeScope.Var('secret_police_loyalty').GetValue]％\n\n注：[SCOPE.GetRootScope.GetCountry.GetCustom('secret_police_custom_title')]の忠実性が50％を下回った場合、[concept_government]に対して行動を起こします。\n\nヒント：[concept_approval]の[SCOPE.gsInterestGroup('secret_police_IG').GetName]における[concept_interest_group]がプラスであれば[SCOPE.GetRootScope.GetCountry.GetCustom('secret_police_custom_title')]の忠実性は上昇し、[concept_approval]がマイナスであれば低下します。"
    
