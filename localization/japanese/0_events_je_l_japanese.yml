    form_OECD_decision:0 "OECDを結成"
    form_OECD_decision_desc:0 "経済協力開発機構（OECD）は、経済発展と世界貿易を促進するために1961年に設立された、38の加盟国を持つ政府間組織です。加盟国は民主主義と市場経済へのコミットメントを表明しているフォーラムであり、政策経験の比較、共通課題への解決策の模索、優れた慣行の特定、そして加盟国の国内および国際的な政策の調整を行うためのプラットフォームを提供しています。"
