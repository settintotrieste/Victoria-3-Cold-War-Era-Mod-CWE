    subject_interactions.3.d.1: "現職の[SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle]による[ROOT.GetCountry.GetAdjective]事項の処理が不十分であると判断し、[ROOT.GetCountry.GetCapital.GetCityHubName]の政治勢力は、その目標により合致する新たな[SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle]を[SCOPE.sCountry('relevant_country').GetName]が任命するよう要請しました。"
