    italian_SUT.indy.t:0 "ズィドティロール問題"
    italian_SUT.indy.d:0 "南チロル問題（Südtirolfrage）は国際的な問題となりました。この問題は1971年、新たなオーストリア・イタリア条約が署名・批准されたことで解決しました。その条約では、南チロルにおける紛争を解決するためにハーグの国際司法裁判所に提出すること、同地方がイタリア国内でより大きな自治権を得ること、そしてオーストリアが南チロルの内政に干渉しないことが規定されました。新しい合意は関係当事者にとって概ね満足のいくものであり、分離主義による緊張度はすぐに緩和されました。1972年に付与された自治権の地位により、かなりのレベルの自治が行われるようになり、また、徴収されるすべての税金のほぼ90％を保持することが可能となっています。"
    
    italian_decolonisation_indy.option.1:0 "自治を認める"
    italian_decolonisation_indy.option.2:0 "彼らに自由を与える価値はない"
    
    united_libya.t:0 "リビアによる併合？"
    united_libya.d:0 "トリポリタニアとキレナイカはイギリスの行政下にとどまり、一方でフランスはフェザーンを掌握しました。1944年にイドリスはカイロからの国外追放から帰還しましたが、1947年に外国による支配の一部が取り除かれるまで、キレナイカへの恒久的な居住再開を拒否しました。同盟国との1947年の平和条約の条件に基づき、トリポリタニアの植民地維持を望んだイタリアと、フェザーンを望んだフランスは、リビアに対するすべての請求権を放棄しました。こうしてリビアは統一されたままとなりました。"
    united_arab_republic.t:0 "アラブ連合共和国を形成しますか？"
    united_arab_republic.d:0 "アラブ連合共和国は1958年から1971年まで中東に存在した主権国家でした。これは当初、エジプト（被占領下のガザ地区を含む）とシリアの間の政治連合でしたが、1961年のシリアのクーデターを受けてシリアが連合から脱退しました。エジプトは、1971年9月にアンワル・サダトによって正式に解体されるまで、公式にアラブ連合共和国として知られ続けました。"
    hashemite_arab_federation.t:0 "ハシミテ・アラブ連邦を形成しますか？"
    hashemite_arab_federation.d:0 "ハシミテ・アラブ連邦は、1958年にイラクのハシミテ王国とヨルダン王国の連合によって形成された短命な国でした。その名称は連邦制を示唆していますが、実態は連合体でした。"
    RUS_BYE_union.t:0 "ロシア・ベラルーシ連合国家？"
    RUS_BYE_union.d:0 "ロシア・ベラルーシ連合国家はベラルーシとロシアからなる超国家的な連合であり、経済および防衛政策における統合を通じて両州の関係を深めることを目的としています。もともと連合国家は連邦の形成を目指していましたが、現在両国は独立を維持しています。"
    SEN_GAM_union.t:0 "セネガンビア連邦？"
    SEN_GAM_union.d:0 "セネガンビア（正式名称はセネガンビア連邦またはセネガンビア連合）は、20世紀後半における西アフリカの国々であるセネガルと、その隣国でありセネガルにほぼ完全に囲まれているガンビアとの間の緩やかな連合体でした。"
    KAS_HND_union.t:0 "ジャム・カシミールのインドへの併合？"
    KAS_HND_union.d:0 "1947年インド独立法の規定に基づき、加入文書を締結することにより、マハラジャ・ハリ・シンは自身の州をインド自治領に組み入れることに同意しました。"
    NET_IDO_union.t:0 "オランダ・インドネシア連合？"
    NET_IDO_union.d:0 "オランダ・インドネシア連合は、1949年から1956年の間に存在したオランダとインドネシアの間の連邦制的な関係でした。1949年に合意されたこの連合は、独立が認められた後であっても、少なくとも同君連合の枠組みの中で、かつての植民地であるオランダ領東インド（現在のインドネシア）を連邦制的な方法でオランダに結びつけ続けようとするオランダの試みでした。"
    MLT_GBR_union.t:0 "マルタ・イギリス統合国民投票"
    MLT_GBR_union.d:0 "1956年2月11日と12日に、マルタにおいてイギリスとの統合に関する国民投票が実施されました。投票率は59%で、投票者の77%が提案を承認しました。投票率が低かったのは、部分的には国民党によるボイコットが原因でした。提案が完全に実施されることはなく、8年後、同国はイギリス連邦内の独立した王国となり、マルタ国と呼ばれました。"
    FRA_GBR_union.t:0 "フランス・イギリス連合？"
    FRA_GBR_union.d:0 "1956年9月、スエズ危機における共通の敵の出現により、英仏合同タスクフォースが結成されました。フランスのギ・モレ首相は、エリザベス2世を元首とし、共通の市民権を持つイギリスとフランス連合の設立を提案しました。代替案として、モレはフランスがイギリス連邦に加入することを提案しました。イギリスのアンソニー・イーデン首相は両方の提案を拒否しました。その後、フランスは欧州経済共同体を設立したローマ条約に加盟することになります。"
    YUG_BUL_union.t:0 "バルカン連邦？"
    YUG_BUL_union.d:0 "ブレッド協定は、1947年8月1日にユーゴスラビア連邦社会主義共和国人民連邦のスロベニア人民共和国ブレッドにおいて、ゲオルギ・ディミトロフとヨシップ・ブロズ・ティトーによって署名され、将来的なブルガリアとユーゴスラビアの統合、および新たなバルカン連邦の形成への道を開きました。1948年6月のティトーとスターリンの分裂後、この協定に基づく政策は覆されました。ティトーが想定したようなユーゴスラビアの第7の共和国になることを望まず、ソ連の利害に結びついていたブルガリアは、ユーゴスラビアに対して対抗的なスタンスを取りました。コミンフォルムによるユーゴスラビアへのキャンペーンがユーゴスラビア共産党の指導部を分断した際、ブルガリア政府は1949年10月1日、すべての合意を含むブレッド友好協力相互援助条約を破棄しました。"
    LBY_EGY_union.t:0 "アラブ共和国連邦？"
    LBY_EGY_union.d:0 "アラブ共和国連邦は、統一されたアラブ国家を創設するためにムアンマル・カダフィがリビア、エジプト、シリアを合併させようとした失敗に終わった試みでした。1971年9月1日に各国の国民投票で承認されたものの、3カ国間で合併の具体的な条件について意見が分かれました。この連邦は1972年1月1日から1977年11月19日まで存続しました。"
    IRQ_SYR_union.t:0 "アラブ共和国連合？"
    IRQ_SYR_union.d:0 "1972年3月、バアス党政権下のイラクはエジプトとシリアに対し、1963年に失敗したアラブ連合共和国の再建を提案しました。このイラクの提案は、ヨルダンが提案したアラブ連合王国への即座の反応でしたが、既に成立していたアラブ共和国連邦と衝突し、イラクとシリアの相違により失敗に終わりました。"
    UAR_NYE_union.t:0 "アラブ諸国連合？"
    UAR_NYE_union.d:0 "アラブ連合共和国は、1958年にエジプトとシリアの統合によって形成された主権国家でした。同年、すでにエジプトと防御協定を締結していたイエメン王国（北イエメン）は、1958年3月8日に新たな国家と合流し、「アラブ連合諸国」と呼ばれる緩やかな連邦を形成しました。この決定の理由の一つとして、イエメンは長期間にわたり、自国よりもかなり大きく強力な北の隣国であるサウジアラビアによる脅威を感じており、この連邦を治安維持の源として捉えていたことが挙げられます。しかし、アラブ連合共和国のメンバー諸国とは異なり、北イエメンは独立した主権国家のままでした。"
    GHA_GUI_union.t:0 "アフリカ連合？"
    GHA_GUI_union.d:0 "アフリカ連合（ガーナ・ギニア・マリ連合とも呼ばれる）は、1958年に西アフリカのガーナとギニアを「独立アフリカ諸国連合」として結びつけた、短命で緩やかな地域組織でした。マリは1961年に加入しましたが、1963年に解散しました。"
    HZB_RSK_BOS_union.t:0 "デイトン合意？"
    HZB_RSK_BOS_union.d:0 "デイトン合意は、アメリカ合衆国オハイオ州デイトン近郊のライト・パターソン空軍基地で合意に達した和平合意です。1995年11月21日に最終決定され、1995年12月14日にパリで正式に署名されました。これらの協定は、より大規模なユーゴスラビア戦争の一部であった、3年半にわたるボスニア戦争に終止符を打ちました。紛争当事者たちは平和と、二つの部分からなる単一の主権国家であるボスニア・ヘルツェゴビナの形成に同意しました。その二つの部分は、主にセルビア人が居住するスルプスカ共和国と、主にクロアチア人およびボシュニャク人が居住するボスニア・ヘルツェゴビナ連邦です。"
    IDO_EID_union.t:0 "インドネシア連邦共和国の解体？"
    IDO_EID_union.d:0 "1950年の3月から4月にかけて、東スマトラ州と東インドネシア州を除くRISの全構成要素が共和国へと解体されました。5月3日から5日にかけて行われた東インドネシア州、東スマトラ州、およびインドネシア共和国による三者会議は、これら3つの実体を単一の統一国家へと統合するという決定で幕を閉じました。インドネシア連邦共和国は、独立宣言から5周年にあたる1950年8月17日にスカルノ大統領によって公式に解体され、代わって統一国家であるインドネシア共和国が誕生しました。"
    
    historical_union_formation.option.1:0 "はい"
    historical_union_formation.option.2:0 "「いや、我々は独立を維持する！」"
    
    transfer_territory_libya.t:0 "フェザンをリビアへ移譲しますか？"
    transfer_territory_libya.d:0 "トリポリタニアとキレナイカはイギリスの管理下に留まり、一方フランスはフェザーンを掌握していました。1944年、イドリスはカイロでの国外追放から帰還しましたが、1947年に外国による支配の一部が撤廃されるまで、キレナイカへの恒久的な居住を再開することを拒否しました。同盟国との1947年の平和条約の条件に基づき、トリポリタニアの植民地維持を望んだイタリアと、フェザーンを望んだフランスは、リビアに対するすべての請求権を放棄しました。こうしてリビアは統一されたままとなりました。"
    transfer_territory_somalia.t:0 "ソマリアをイタリアに移管しますか？"
    transfer_territory_somalia.d:0 "ソマリランド信託統治領は、現在のソマリアに位置する国際連合の信託統治領でした。その首都はモガディシュであり、かつてのイギリス軍政の解消後、1950年から1960年までイタリアによって管理されていました。1960年に独立を果たしました。"
    transfer_territory_eritrea.t:0 "エリトリアをエチオピアに移管しますか？"
    transfer_territory_eritrea.d:0 "第二次世界大戦後、エリトリアは1952年までイギリス軍政によって管理されていました。1952年の国連総会での決定に従い、エリトリアは現地のエリトリア議会によって自治が行われることとなりましたが、外交および防御に関しては、10年間にわたりエチオピアとの連邦ステータスに入ることとなりました。"
    transfer_territory_tangier.t:0 "タンジェ国際管理地域を廃止しますか？"
    transfer_territory_tangier.d:0 "1956年3月2日のフランスの保護国の終了、および1956年4月7日のスペインの保護国の終了を受け、1956年6月にタンジェ地区管理委員会が招集され、暫定体制のための議定書が提案されました。これは1956年7月5日、ラバトにてスルタン・ムハンマド5世を代表してモロッコのアーメド・バラフレジ外相によって署名されました。その結果、管理官の職は廃止され、1956年7月10日にモロッコの知事、すなわちアメルへと置き換えられ、直ちにメンドゥブ・アフマド・アッ＝ターズィがこれを継承しました。同時に、タンジェの警察はモロッコの権力の下に移管されました。"
    transfer_territory_saarland.t:0 "ザールラントを西ドイツに移管しますか？"
    transfer_territory_saarland.d:0 "1954年、フランスとドイツ連邦共和国（西ドイツ）は、独立したザールラントを設立するためのザール憲章（Saarstatut）と呼ばれる詳細な計画を策定しました。これは1954年10月23日にパリ協定の一つとして両国間の協定として署名されましたが、1955年10月23日に実施された住民投票では67.7%の割合で否決されました。1956年10月27日のザール条約によってザールラントの西ドイツへの統合が認められ、1957年1月1日に統合が実現しました。"
    transfer_territory_ruhr.t:0 "ルール地方を西ドイツに移譲しますか？"
    transfer_territory_ruhr.d:0 "ルール権力機構は、アメリカ合衆国、イギリス、フランス、およびベネルクス諸国によるロンドン六カ国会議を経て、1948年6月7日に発表された共同声明において規定されました。1951年のパリ条約を受けて廃止され、その活動は欧州石炭鉄鋼共同体（ECSC）へと引き継がれました。1951年10月19日にパリでIARを終了させるための協定が署名され、1952年6月25日にIARの機能終了に関する協定が発効しました。"
    transfer_territory_trieste.t:0 "ロンドン覚書について？"
    transfer_territory_trieste.d:0 "トリエステ自由領は、第二次世界大戦後の国連安全保障理事会の直接の責任の下、北イタリアとユーゴスラビアの間に位置し、アドリア海北部に面した南ヨーロッパの独立領土でした。この領土は1954年に事実上解体され、イタリア（Aゾーン）とユーゴスラビア（Bゾーン）に分割されました。これにより国境紛争が生じましたが、1975年に署名され1977年に批准された二国間オシモ条約によって、20年の時を経てようやく解決されました。"
    transfer_territory_port_arthur.t:0 "旅順を中国に移譲しますか？"
    transfer_territory_port_arthur.d:0 "旅順艦隊基地の管理権は、中国から、1895年から1904年にかけてのロシア帝国へ、1905年から1945年にかけての大日本帝国へ、1945年から1956年にかけてのソ連へ、そして1956年以降に再び中国へと移り変わりました。"
    transfer_territory_panama_canal.t:0 "パナマ運河をパナマに移譲しますか？"
    transfer_territory_panama_canal.d:0 "1977年9月7日、アメリカ合衆国大統領ジミー・カーターとパナマの実質的なリーダーであるオマール・トリホスによって条約が署名されました。これにより、パナマが運河の永久的な中立性を保証する条約に署名することを条件に、パナマ人に運河の自由な支配権を付与するプロセスが動き出しました。この条約により、1999年12月31日の正午をもってパナマによる完全な支配が実現し、パナマ運河庁（ACP）が水路の指揮を執ることとなりました。"
    transfer_territory_hong_kong.t:0 "香港を中国に割譲しますか？"
    transfer_territory_hong_kong.d:0 "イギリスから中華人民共和国への香港の返還は、1997年7月1日の深夜に行われました。この出来事により、1841年に始まった旧植民地における156年間のイギリス統治が終了しました。香港はその後50年間、中国の特別行政区（SAR）として設立され、この期間中、本土の経済および統治システムとは異なる独自のシステムを維持しました。"
    transfer_territory_macau.t:0 "マカオを中国に割譲しますか？"
    transfer_territory_macau.d:0 "ポルトガル共和国から中華人民共和国へのマカオの返還は、1999年12月20日の深夜に行われました。この出来事により、1557年に始まった旧入植地における442年間のポルトガル統治が終了しました。"
    transfer_territory_west_papua.t:0 "西パプアをインドネシアに割譲しますか？"
    transfer_territory_west_papua.d:0 "1940年代後半、西ニューギニアを除くオランダ領東インドの領土は、独立国インドネシアとなりました。オランダは1962年8月15日のニューヨーク協定によって同地域がインドネシアに譲渡されるまで、西ニューギニア（オランダ領ニューギニア）に対する主権を保持していました。"
    transfer_territory_somaliland.t:0 "ソマリランドをソマリアに割譲しますか？"
    transfer_territory_somaliland.d:0 "1960年6月26日、イギリス領ソマリランドはイギリスによってソマリランド州として正式に独立を認められました。その5日後の1960年7月1日、ソマリランド州はソマリア信託統治領（旧イタリア領ソマリア）と自発的に統合し、ソマリア共和国を形成しました。"
    transfer_territory_japanese_okinawa.t:0 "沖縄を日本に割譲しますか？"
    transfer_territory_japanese_okinawa.d:0 "沖縄返還協定は、アメリカ合衆国と日本の間で結ばれた協定です。アメリカ合衆国は、太平洋戦争の結果として得られたサンフランシスコ平和条約第3条に基づくすべての権利と関心を日本に譲渡し、それによって沖縄県を日本の主権に返還することに同意しました。"
    transfer_territory_south_cameroon.t:0 "南カメルーンをカメルーンに譲渡しますか？"
    transfer_territory_south_cameroon.d:0 "ナイジェリアまたはカメルーンとの併合を決定するため、1959年と1961年にカメルーンで住民投票が行われました。1961年、北カメルーンはナイジェリアとの併合に、南カメルーンは（かつてのフランス領である）カメルーンとの併合に投票しました。"
    transfer_territory_french_india.t:0 "インド植民地をインドに譲渡しますか？"
    transfer_territory_french_india.d:0 "1954年10月18日、ポンディシェリ市およびパンチャヤト・コミューンの178人を対象とした総選挙が行われ、170人が併合に賛成し、8人が反対しました。フランス領インド領がフランスの統治からインド連邦へと事実上移管されたのは1954年11月1日のことで、ポンディシェリ連合準州として確立されました。法的な移管を有効にする条約は1956年に署名されました。"
    transfer_territory_christmas_island.t:0 "クリスマス島をオーストラリアに譲渡しますか？"
    transfer_territory_christmas_island.d:0 "オーストラリアの要請により、イギリスは主権をオーストラリアに移管しました。その際、リン鉱石の収入減に対する補償として、オーストラリア政府からシンガポールへ2000万ドルの支払いがなされました。イギリスのクリスマス島法が1958年5月14日に国王の裁可を得たことで、イギリスは枢密院令によってクリスマス島に対する権力をシンガポールからオーストラリアへと移管することが可能となりました。オーストラリアのクリスマス島法は1958年9月に可決され、同島は1958年10月1日に正式にオーストラリア連邦の権限下に置かれました。"
    transfer_territory_israel_egypt.t:0 "キャンプ・デービッド合意？"
    transfer_territory_israel_egypt.d:0 "キャンプ・デービッド合意は、メリーランド州にあるアメリカ合衆国大統領の別荘、キャンプ・デービッドでの12日間にわたる秘密交渉を経て、1978年9月17日にエジプトのアブドゥル・ナセル大統領（※原文はAnwar Sadat、アンワル・サダト）とイスラエルのメナヘム・ベギン首相によって署名された一連の政治合意です。"
    transfer_territory_israel_palestine.t:0 "オスロ合意第一段階？"
    transfer_territory_israel_palestine.d:0 "オスロ合意第一段階（またはオスロ合意I）は、正式には「過渡的な自治体制に関する原則宣言」、略して「原則宣言（DOP）」と呼ばれ、進行中のイスラエル・パレスチナ紛争の解決につながる枠組みを構築しようとした1993年の試みでした。"
    transfer_territory_crimea.t:0 "クリミアの併合？"
    transfer_territory_crimea.d:0 "2014年の2月から3月にかけて、ロシアはウクライナの一部であるクリミア半島に侵略を行い、その後、そこを併合しました。これは「尊厳の革命」の直後に生じた、相対的な権力の空白の中で行われました。"
    transfer_territory_aouzou_strip.t:0 "アウズゥー・ストリップを譲渡しますか？"
    transfer_territory_aouzou_strip.d:0 "フランスによるリビアへの圧力とニジェール大統領ハマニ・ディオリの調停により、リビアとチャドは1972年4月17日に外交関係を再開しました。その直後、トンバルバイはイスラエルとの外交関係を断絶し、11月28日にアウズゥー・ストリップをリビアに割譲することに密かに合意したと言われています。その引き換えとして、カダフィはチャド大統領に4000万ポンドを約束し、両国は1972年12月に友好条約を締結しました。"
    transfer_territory_china_SAR.t:0 "「一国二制度」を終わらせますか？"
    transfer_territory_china_SAR.d:0 "「一国二制度」とは、[ROOT.GetCountry.GetName]における香港およびマカオの特別行政区の統治を記述する憲法上の原則です。これは、中国は一つであるが、これらの地域は本土とは異なるシステムを使用する一方で、独自の経済および行政システムを維持できることを定めたものです。この原則の下、二つの地域はそれぞれ独自の政府体制、法律、経済、および金融業務（外国との貿易関係を含む）を継続することができ、これらはすべて本土のものから独立しています。今こそ、[SCOPE.sCountry('1_country_2_systems_SAR').GetName]においてこれを継続するかどうかを選択すべき時です。"
    transfer_territory_china_SAR.f:0 "このイベントが発生したのは、[SCOPE.sCountry('1_country_2_systems_SAR').GetName]が50年以上にわたり[ROOT.GetCountry.GetName]の$special_administrative_region$であったためです。"
    transfer_territory_omani_gwadar.t:0 "グワダルをパキスタンに売却しますか？"
    transfer_territory_omani_gwadar.d:0 "1947年のパキスタンの独立当時、グワダルはオマーンの権力下にありました。それでもパキスタンはグワダルに関心を示し始めました。パキスタンの首相フェローズ・カーン・ヌーンとオマーンのスルタン、サイード・ビン・タイムールの尽力により合意がなされ、パキスタンは1958年9月8日にその土地を購入することができ、1958年12月8日に正式にパキスタンの一部となりました。"
    transfer_territory_portuguese_cabinda.t:0 "カビンダをアンゴラへ譲渡しますか？"
    transfer_territory_portuguese_cabinda.d:0 "1975年1月15日にポルトガルのアルヴォルで署名されたアルヴォル協定は、11月11日にアンゴラのポルトガルからの独立を認め、13年間にわたるアンゴラ独立戦争を正式に終結させました。FLECが同意することのなかったこの条約では、カビンダは「アンゴラの不可分かつ譲渡不可能な一部」と記述されていました。"
    transfer_territory_british_bizonia.t:0 "ドイツにビゾニアを形成しますか？"
    transfer_territory_british_bizonia.d:0 "バイゾーンまたはバイゾニアとは、第二次世界大戦後のドイツ占領において、アメリカとイギリスの占領区域を1947年1月1日に統合したものです。"
    transfer_territory_french_trizonia.t:0 "ドイツにトリゾニアを形成しますか？"
    transfer_territory_french_trizonia.d:0 "バイゾニアの統治は1948年8月1日にフランスの占領区域まで拡大され、その結果として形成された構造は非公式にトライゾニアまたはトライゾネシアと呼ばれました。4つの占領国間の関係は悪化し続け、四カ国による体制は管理不能となりました。1948年3月、連合国管理理事会は活動を停止し、トライゾーンに代わって連合国高等弁務官理事会が設置されました。"
    transfer_territory_KMT_PRC.t:0 "台湾へ逃亡しますか？"
    transfer_territory_KMT_PRC.d:0 "中華民国政府の台湾への退避とは、中国本土での国共内戦に敗れた後、1949年12月7日に、当時国際的に承認されていた国民党統治の中華民国（ROC）政府の残存勢力が台湾（フォルモサ）へと脱出したことを指します。"
    transfer_territory_dutch_east_indonesia.t:0 "デンパサール会議？"
    transfer_territory_dutch_east_indonesia.d:0 "デンパサール会議は1946年12月7日から24日までデンパサールのホテル・バリで開催され、インドネシア連邦の一部である東インドネシア州の設立をもたらしました。この会議においてオランダ政府は、西ニューギニアの支配は他のオランダ領東インド地域と同時に引き渡されることはないという立場を表明しました。"
    transfer_territory_port_porkkala.t:0 "ポルカラ海軍基地を返還しますか？"
    transfer_territory_port_porkkala.d:0 "ポルカラ海軍基地は、フィンランドのヘルシンキから西に30キロメートル（19マイル）の位置にあるポルカラ半島のキルッコヌンミ、インガ、シウンティの各自治体において1944年から1956年まで運用されていたソ連の海軍基地でした。この地域は、1944年にフィンランド、ソ連、イギリスの間で署名されたモスクワ休戦協定に基づき、ソ連に貸与されました。その後、1956年にフィンランドへ返還されました。"
    transfer_territory_port_bornholm.t:0 "ボルンホルムの占領を終了させますか？"
    transfer_territory_port_bornholm.d:0 "5月9日にソ連軍が島に上陸し、短い戦闘ののち、ドイツの守備隊（約1万2000人）が降伏しました。ソ連軍は1946年4月5日に島を去りました。"
    transfer_territory_port_dodecanese.t:0 "ドデカネス諸島をギリシャに譲渡しますか？"
    transfer_territory_port_dodecanese.d:0 "戦後、諸島はイギリスの軍事保護国となりましたが、ほぼ直ちに独自の民政運営が許可され、主権と軍事支配は別個であるものの、非公式にギリシャと統合されました。諸島を求めていたトルコの反対にもかかわらず、1947年のイタリアとの平和条約によって、諸島は正式にギリシャと統合されました。"
    transfer_territory_british_newfoundland.t:0 "ニューファンドランドをカナダと連邦化しますか？"
    transfer_territory_british_newfoundland.d:0 "1948年のニューファンドランド住民投票は、ニューファンドランド自治領の政治的未来を決定するための2度の住民投票でした。住民投票の前、ニューファンドランドは負債を抱えており、カナダへの加入（連邦化）、イギリス統治の継続、あるいは独立の回復のいずれを選択すべきかを決定するため、いくつかの代表団が派遣されました。住民投票は1948年6月3日と7月22日に行われました。最終的な結果は連邦化となり、1949年3月31日にカナダの第10の州となりました。"
    transfer_territory_british_sarawak.t:0 "サラワクを併合しますか？"
    transfer_territory_british_sarawak.d:0 "サラワク王国は1841年に創設された独立国家であり、1888年からはイギリスとの保護条約の下にありました。1888年、ラージは併合を回避しつつ、イギリス政府から保護国としての地位を獲得しました。第二次世界大戦と日本軍の到来は、最終的にラージの終焉をもたらしました。1945年の日本の降伏により、その領土は軍政下に置かれ、その後1946年には、大西洋憲章に反して、イギリスによる最後の獲得地として王領植民地に併合されました。"
    transfer_territory_lebanon_ISR.t:0 "レバノンの占領を終了させますか？"
    transfer_territory_lebanon_ISR.d:0 "1999年5月のイスラエルの選挙を前に、イスラエルの首相であったエフド・バラクは、1年以内にすべてのイスラエル軍がレバノン南部から撤退し、事実上、南レバノン軍への支持を打ち切ると約束しました。イスラエルとシリアの間で行われた、イスラエルとレバノンの間にも平和合意をもたらすことを目的とした交渉は、シリアによるレバノンの支配（2005年まで）によって失敗しましたが、バラクはIDFをイスラエルの国境まで撤退させる決定を下しました。"
    transfer_territory_lebanon_SYR.t:0 "レバノンの占領を終了させますか？"
    transfer_territory_lebanon_SYR.d:0 "2000年のイスラエルのレバノン南部からの撤退とハフェズ・アル＝アサドの死去後、シリアの軍事的展開はレバノンの国民から批判と抵抗に直面しました。その結果、国連安保理決議1559が採択され、レバノンの元首相ラフィーク・ハリーリの暗殺と、その死へのシリアの関与の疑惑を受けて、「シダー革命」と呼ばれる民衆蜂起が国中を席巻しました。2005年3月5日、シリア大統領バッシャール・アル＝アサドはシリア議会での演説において、シリア軍がレバノンからの撤退を開始すると発表しました。シリアは2005年4月30日にレバノンからの完全な撤退を完了しました。"
    transfer_territory_SAF_NMB.t:0 "ウォルビスベイをナミビアに返還しますか？"
    transfer_territory_SAF_NMB.d:0 "1990年、南西アフリカはナミビアとして独立を果たしましたが、ウォルビスベイは南アフリカの主権下に残りました。アパルトヘイトが終了する前の1993年8月、南アフリカの多党間交渉フォーラムは、ウォルビスベイと沖合諸島をナミビアへ編入・再統合することを求める決議を採択しました。その年、南アフリカの議会によって「ウォルビスベイのナミビアへの移管法」が可決されました。両国間での条約締結を経て、南アフリカは1994年3月1日、ウォルビスベイとペンギン諸島の主権を正式にナミビアへ移管しました。"
    transfer_territory_spanish_morocco.t:0 "スペイン領リフのモロッコへの返還？"
    transfer_territory_spanish_morocco.d:0 "1956年にフランスがモロッコへの保護権を終了させた際、スペインは保護権を打ち切り、植民地時代よりスペインの一部であったプラサ・デ・ソベラニアを保持した一方で、当該領土を新たに独立した王国へと返還しました。また、ケープ・ジュビー、イフニ、およびモロッコ国外のその他の植民地（スペイン領サハラなど）も保持しました。"
    transfer_territory_bahrain.t:0 "バーレーン問題？"
    transfer_territory_bahrain.d:0 "1970年のバーレーン独立調査は、1970年3月28日から5月11日にかけて実施されました。3月28日、国連事務総長はヴィットリオ・ウィンスペア＝ギッチャルディを任命し、バーレーン人の将来について諮問を行いました。5月11日までに、国連安全保障理事会は、圧倒的多数が完全な独立を支持しているという彼の結論に賛成しました。この調査は、1971年末までにペルシャ湾から撤退するというイギリスの1968年の決定により、バーレーンの将来が不透明になったことをきっかけに行われました。イランはバーレーンに対する請求権を復活させていましたが、国連主導の諮問によって、独立を望む人々の意向が確認され、紛争は解決しました。"
    transfer_territory_gaza.t:0 "ガザ地区の未来"
    transfer_territory_gaza.d:0 "2025年1月中旬に暫定的な停戦が始まり、2ヶ月間続きました。8月、イスラエルはガザ市への攻勢を開始しました。2025年10月9日までに、イスラエルとハマスは米国主導の和平案の第一段階に合意しました。2025年11月17日に採択された国連安全保障理事会決議第2803号には、ガザ地区の移行期統治に関する規定が含まれています。"
    transfer_territory_DPR.t:0 "ロシアによる[ROOT.GetCountry.GetNameNoFormatting]の併合？"
    transfer_territory_DPR.d:0 "2022年9月30日、ロシアはウクライナへの侵略が続く中、ウクライナの4つのオブラスト（ドネツク、ヘルソン、ルハンスク、ザポリージャ）とその周辺地域の併合を一方的に宣言しました。ルハンスク州の大部分とドネツク州の一部は2014年以来、親ロシア派の分離主義者によって支配されていましたが、ヘルソン州とザポリージャ州は2022年にロシアによって侵略されました。併合される地域の範囲とその境界は定義されておらず、ロシアの当局者は、それらは後ほど定義されるだろうと述べました。"
    end_berlin_occupation.t:0 "ベルリンの占領を終わらせるか？"
    end_berlin_occupation.d:0 "西ベルリンは、東ドイツ、東・西ベルリンがドイツ連邦共和国と統合された日である1990年10月3日まで、軍事占領下に置かれていました。西ドイツ連邦政府およびほとんどの西側諸国の政府は、東ベルリンを東ドイツとは「別個の存在」であると考えていました。後に西側の同盟国は東ベルリンに大使館を開設しましたが、同市を東ドイツの首都としてではなく、政府の所在地としてのみ認めていました。"
    transfer_territory_british_ogaden.t:0 "イギリスによるオガデン占領を終わらせるか？"
    transfer_territory_british_ogaden.d:0 "1941年から1955年の間、イギリスは東アフリカ戦役の後、オガデンとハウドを統治していました。イギリスは、エチオピアの領土とエリトリアを求めるハイレ・セラシエの要求を無視し、大ソマリアを目指しました。米国の圧力によりイギリスはこの計画を断念し、1948年にオガデンを、1955年にハウドを割譲したため、ソマリアの抵抗と反乱を引き起こしました。"
    transfer_territory_british_iran.t:0 "イギリスによるイラン占領を終わらせるか？"
    transfer_territory_british_iran.d:0 "英ソイラン侵攻は、1941年8月にイギリスとソ連が、公式に中立であったイラン帝国に共同で行った侵略でした。両強国は、共通の敵であるナチス・ドイツとの戦争が終わってから6か月間は駐留すると発表しましたが、その終結日は1946年3月2日となりました。"
    transfer_territory_soviet_iran.t:0 "ソ連によるイラン占領を終わらせるか？"
    transfer_territory_soviet_iran.d:0 "アメリカ合衆国は、赤軍のイランからの撤退を強制し、ソ連の影響力を低減させるため、段階的にソ連に対して激しい圧力をかけました。アメリカによる公式な抗議を受け、国際連合安全保障理事会は1946年1月30日に決議第2号を採択しました。3月24日、スターリンは1946年4月30日までにソ連軍をイランから撤退させるよう命じました。ソ連軍は5月6日をもって撤退しました。"
    transfer_territory_west_papua_1969.t:0 "自由選択行動？"
    transfer_territory_west_papua_1969.d:0 "自由選択行動は、1969年7月14日から8月2日にかけて実施された物議を醸した国民投票でした。西ニューギニアにおいてインドネシア軍によって選出された1,025人が、インドネシアによる統治に対して満場一致で賛成しました。その物議を醸したプロセスから、この出来事は時に「選択肢のない行動」と蔑称で呼ばれることもあります。"
    transfer_territory_soviet_manchuria.t:0 "ソ連の満洲からの撤退？"
    transfer_territory_soviet_manchuria.d:0 "ソ連による満洲占領は、1945年8月に赤軍が大日本帝国の傀儡国家である満洲国に侵攻した後に開始されました。この占領は、ソ連軍が1946年5月に撤退するまで続きました。"
    transfer_territory_KMT_PRC_1.t:0 "南京陥落？"
    transfer_territory_KMT_PRC_1.d:0 "1949年4月に南京を失った後、国民党（KMT）は広州、重慶、成都といったいくつかの臨時首都を経由して南下しました。"
    
    historical_territorial_transfers.option.1:0 "領土を譲渡する"
    historical_territorial_transfers.option.2:0 "それらの領土は我々のものとして残されるべきだ！"
    
    historical_territorial_annexation.option.1:0 "領土を併合せよ！"
    historical_territorial_annexation.option.2:0 "これ以上の土地は必要ない"
    
    malaysia_singapore.t:0 "シンガポールの独立？"
    malaysia_singapore.d:0 "1965年8月9日、シンガポールのすべての国会議員が投票をボイコットする中、マレーシア議会は126対0の賛成多数で追放を決定しました。その日、リー・クアンユーは涙ながらにテレビの記者会見を行い、シンガポールが主権を持つ独立国家であることを宣言しました。"
    CAF_rhodesia.t:0 "ローデシア・ニアサランド連邦を解体するか？"
    CAF_rhodesia.d:0 "連邦は1963年12月31日に正式に終了しました。解体直後の1964年、北ローデシアとニアサランドはそれぞれザンビアとマラウイの名で独立しました。1965年11月、南ローデシアはイギリスから一方的に独立を宣言し、ローデシア国となりました。"
    uar_syria.t:0 "シリアの独立？"
    uar_syria.d:0 "多くのシリア人が想像していたような二つのアラブ民族による連邦ではなく、アラブ連合共和国はエジプト人に完全に支配された国家へと変貌しました。ナセルがシリア内のすべての政党の解体を要求したため、シリアの政治生活も衰退しました。その過程で、中央集権化されたエジプトの国家が、より弱いシリアに対してナセルの社会主義的な政治・経済体制を押し付けたことは、シリアのビジネス界や軍部からの反発を招きました。これが1961年9月28日のシリアのクーデターと、アラブ連合共和国の終焉へとつながりました。"
    west_indies_dissolution.t:0 "西インド諸島連邦を解体するか？"
    west_indies_dissolution.d:0 "西インド諸島連邦は、イギリス議会の1962年西インド諸島法によって法的に解体されました。残された「リトル・エイト」の地方は、再びロンドンから直接監督される個別の植民地となりましたが、そのほとんどは後に独立を果たしました。"
    NET_IDO.t:0 "オランダ・インドネシア連合を解体するか？"
    NET_IDO.d:0 "オランダ・インドネシア連合は、1949年から1956年の間に存在したオランダとインドネシアの連邦制の関係でした。1954年8月17日のインドネシア独立9周年を祝う演説において、スカルノ大統領は、同連合がインドネシアの発展の妨げになると述べて、一方的に解体を宣言しました。"
    ussr_dissolution.t:0 "ソ連を解体しますか？"
    ussr_dissolution.d:0 "ソ連の解体とは、ソ連（USSR）内部における崩壊の過程であり、その結果、主権国家としてのソ連とその連邦政府が終焉を迎え、1991年12月26日に15の構成共和国が完全な独立を果たしました。"
    ussr_dissolution.f:0 "このイベントは、解体のための歴史的な条件が満たされたか、あるいは反共産主義的な利益集団を持つ革命的な活動が存在し、かつ国家経済が困窮している場合に発生します。"
    CZH_dissolution.t:0 "チェコスロバキアを解体しますか？"
    CZH_dissolution.d:0 "1992年12月31日に発効したチェコスロバキアの解体は、チェコスロバキア連邦共和国がチェコ共和国とスロバキアという独立した国々に自決によって分割されたものです。両国は、1969年から1989年末までチェコスロバキア社会主義共和国の構成州であったチェコ社会主義共和国とスロバキア社会主義共和国を反映しています。"
    CZH_dissolution.f:0 "このイベントは、解体のための歴史的な条件が満たされたか、あるいは反共産主義的な利益集団を持つ革命的な活動が存在し、かつ国家経済が困窮している場合に発生します。"
    SER_MON_dissolution.t:0 "モンテネグロの独立？"
    SER_MON_dissolution.d:0 "2006年5月21日にモンテネグロで独立を問う国民投票が実施されました。投票者の55.5％が賛成し、55％のしきい値を僅差で通過しました。"
    CAN_QUE_1_dissolution.t:0 "第1回ケベック住民投票？"
    CAN_QUE_1_dissolution.d:0 "1980年のケベック独立住民投票は、カナダ内におけるケベックの地位と、ケベックが主権への道を歩むべきかについてケベックで行われた最初の住民投票でした。この住民投票は、カナダからの分離を主張したケベックのPQ（ケベック党）政府によって招集されました。州全域にわたる住民投票は5月20日に行われ、分離を追求する提案は59.56パーセント対40.44パーセントの差で敗北しました。"
    CAN_QUE_2_dissolution.t:0 "第2回ケベック住民投票？"
    CAN_QUE_2_dissolution.d:0 "1995年のケベック住民投票は、フランス語を主体とするカナダの地方ケベックの有権者に対し、カナダに対して政治的・経済的な合意を提供することを条件とした上で、ケベックが主権を宣言し独立国となるべきかを問うた、2度目の住民投票でした。投票は1995年10月30日に行われ、ケベックの歴史上で最大の投票率（93.52％）を記録しました。「反対」のオプションが54,288票の差で勝利し、投開票数の50.58％を獲得しました。"
    IRQ_KUR_dissolution.t:0 "クルドの自治権を認めるか？"
    IRQ_KUR_dissolution.d:0 "2003年のイラク戦争に先立ち、二つの政党はサダム・フセインに対するアラブ人の反対勢力との交渉において団結し、政治、経済、および治安維持の利益を得ることに成功しました。また、サダム・フセインが失脚した場合にはアラブ人の反対勢力がクルドの自治権を認めることに合意しました。アメリカとクルディスタンも、クルディスタンが数千人の兵士を受け入れたことで、ハラブジャ地域のイスラム主義組織アンサール・アル＝イスラムを共同で掃討しました。1992年から存在していたクルドの自治権は、2005年に新しいイラク憲法によって、新しいイラク政府により正式に認められました。"
    GBR_SCO_dissolution.t:0 "スコットランド独立住民投票"
    GBR_SCO_dissolution.d:0 "イギリスからのスコットランド独立に関する住民投票が、2014年9月18日にスコットランドで開催されました。住民投票の質問は「スコットランドは独立国となるべきか？」であり、有権者は「賛成」または「反対」で回答しました。「反対」側が勝利し、独立に反対する票は2,001,926票、賛成する票は1,617,989票でした。"
    SPA_CAT_dissolution.t:0 "カタルーニャ独立住民投票"
    SPA_CAT_dissolution.d:0 "2017年10月1日、スペインの自治州であるカタルーニャで独立住民投票が実施されました。これはカタルーニャ議会によって「カタルーニャの自己決定に関する住民投票法」として可決されたものです。この住民投票は、スペイン政府がスペイン憲法への違反であると宣言したことを受け、2017年9月7日に違憲と宣告され、スペインの憲法裁判所によって停止されました。"
    SKN_GBR_dissolution.t:0 "セントクリストファー＝ネイビス＝アンギラの解体？"
    SKN_GBR_dissolution.d:0 "西インド連邦の一部として短期間存在した後、アンギラ島は1967年に完全な内部自治権を持つ連合州セントクリス・ネービス・アンギラの一部となりました。しかし、多くのアンギラ人はこの連合に加わることを望まず、その中でのセントクリスの支配に不満を抱いていました。1980年、アンギラは最終的にセントクリス・ネービスから正式に分離し、独立したイギリス海外領土となることが認められました。"
    FRA_NCD_dissolution.t:0 "ニューカレドニア独立住民投票"
    FRA_NCD_dissolution.d:0 "南太平洋にあるフランス領ニューカレドニアで、2021年12月12日に独立住民投票が実施されました。この投票は、2018年と2020年に行われた投票（それぞれ独立案が57％と53％の割合で否決されました）に続く、ヌメア協定の条項に基づいて実施された3回目かつ最後の投票でした。"
    UAS_GHA.t:0 "アフリカ諸国連合の解体"
    UAS_GHA.d:0 "この連合は1963年5月、それほど注目されることもなく解体されました。UASが失敗した理由については、対立するナショナリズムや、ンクルマが影響を受けた米国型の連邦制モデルに内在する欠陥など、さまざまな説明がなされてきました。アダム・ゲタチューは、連邦連合と加盟国の独立との正確な収支に関する深い意見の相違が、失敗の原因であると論じています。"
    PHI_MGD_dissolution.t:0 "バンサモロ有機法？"
    PHI_MGD_dissolution.d:0 "バングサモ有機法は、バンサモ・ムスリム・ミンダナオ自治州（BARMM）の設立を規定するフィリピンの法律です。この基本法は、2014年にフィリピン政府とモロ・イスラム解放戦線の間で署名された「バンサモに関する包括的合意」に定められた合意に従い、ムスリム・ミンダナオ自治州（ARMM）を廃止し、バンサモの政府の基本構造を規定しました。"
    SOM_SML_dissolution.t:0 "ソマリランドの独立？"
    SOM_SML_dissolution.d:0 "ソマリランド国家は、ソマリア信託統治領（旧イタリア領ソマリア）と自発的に統合してソマリア共和国を形成しました。この二つの州の統合は早い段階から問題が生じていました。悲劇的なオガデン戦争の終結直後、ソマリアのバレ政権がソマリランドの主要な氏族であるイサークに対して行った過酷な政策に対抗する形で、10年にわたる独立戦争が繰り広げられ、1991年のソマリランド独立宣言をもって終結しました。"
    MOR_WSA_dissolution.t:0 "西サハラ停戦？"
    MOR_WSA_dissolution.d:0 "国連の仲介による1991年の西サハラ停戦は、1991年9月6日に発効しました。これは、停戦を監視し、地域の将来に関する住民投票の準備を行うための「西サハラ住民投票に関する国連活動（MINURSO）」の設立を含む、より広範な和平プロセスの重要な一部でした。停戦は30年近く維持されましたが、最終的に紛争の解決には至りませんでした。"
    
    historical_union_dissolution.option.1:0 "彼らに独立を与える"
    historical_union_dissolution.option.2:0 "我が国を分裂させることはできない！"
    
    dissolve_the_ussr.tt:0 "ソビエト社会主義共和国連邦を解体する"
    dissolve_the_warsaw_pact.tt:0 "ワルシャワ条約機構を解体する"
    create_russian_federation.tt:0 "ロシア連邦になる"
    
    korean_war.t:0 "朝鮮戦争"
    korean_war.d:0 "朝鮮戦争は、1950年から1953年にかけて北朝鮮と韓国の間で戦われました。両国間の長年の敵対関係を経て、北朝鮮が韓国に侵略した1950年6月25日に開戦しました。北朝鮮は中国とソ連の支持を受け、韓国はアメリカと同盟国の支持を受けました。戦闘は1953年7月27日の休戦をもって終了しました。"
    sino_tibetan_war:0 "中ソ・チベット戦争"
    sino_tibetan_war.t:0 "中ソ・チベット戦争"
    sino_tibetan_war.d:0 "チベット政府が十七条協定に署名し、第14代ダライ・ラマが1951年10月24日にこれを批准しましたが、後に強制下での支持であったとして協定を破棄したため、チベットは中華人民共和国（PRC）の支配下に置かれました。数ヶ月にわたる交渉の失敗、外国の支持と援助を求めるチベットの試み、PRCとチベットによる軍備増強を経て、1950年10月6日または7日に人民解放軍（PLA）が金沙江を渡り、チベットを併合しました。"
    portugal_india_war.t:0 "ゴアの併合"
    portugal_india_war.d:0 "ゴアの併合は、インド共和国が当時のポルトガル領インドであったゴア、ダマン、ディウを併合したプロセスであり、1961年12月にインド軍が武力行動を開始したことから始まりました。"
    suez_crisis_war.t:0 "スエズ危機"
    suez_crisis_war.d:0 "スエズ危機は、1956年後半にイスラエルがエジプトとガザ地区へ侵略を行い、続いてイギリスとフランスが参加した出来事です。その目的は、西側諸国のためにスエズ運河の支配を取り戻すこと、そして、運河を管理していた外国資本のスエズ運河会社を国営化したエジプト大統領ガマール・アブドゥル＝ナセルを排除することでした。"
    vietnam_war.t:0 "ベトナム戦争"
    vietnam_war.d:0 "ベトナム戦争は、1955年11月1日から1975年4月30日のサイゴン陥落まで、ベトナム、ラオス、カンボジアで行われた紛争です。これはインドシナ戦争の第2次であり、冷戦における主要な紛争でした。公式には北ベトナムと南ベトナムの間で戦われましたが、北側はソ連、中国、その他の共産主義国家によって支持され、南側はアメリカやその他の反共産主義の同盟国によって支持されたため、この戦争はアメリカとソ連による代理戦争となりました。戦争は約20年間続き、1973年にアメリカの直接的な軍事関与が終了しました。"
    second_indo_pakistan_war.t:0 "第二次カシミール戦争"
    second_indo_pakistan_war.d:0 "第二次インド・パキスタン戦争としても知られる1965年のインド・パキスタン戦争は、1965年8月から9月にかけて発生したパキスタンとインドの間の武力紛争です。"
    falklands_war.t:0 "フォークランド紛争"
    falklands_war.d:0 "フォークランド戦争は、1982年にアルゼンチンとイギリスの間で、南大西洋にある2つのイギリスの被扶養領土、フォークランド諸島とその属領であるサウスジョージア・南サンドウィッチ諸島を巡って行われた、10週間にわたる未宣言の戦争です。紛争は1982年4月2日にアルゼンチンがフォークランド諸島を侵略・占領したことで始まり、翌日にはサウスジョージアへの侵略が続きました。4月5日、イギリス政府は島々への水陸両用攻撃を行う前に、アルゼンチンの海軍および空軍と交戦するため海軍タスクフォースを派遣しました。紛争は74日間続き、6月14日のアルゼンチンの降伏によって終結し、諸島はイギリスの支配下に戻りました。"
    third_indo_pakistan_war.t:0 "第三次印パ戦争"
    third_indo_pakistan_war.d:0 "1971年の印パ戦争は、1971年12月3日から1971年12月16日にダッカでパキスタンが降伏するまで、東パキスタンにおけるバングラデシュ解放戦争の最中に発生した、インドとパキスタンの間の軍事衝突です。"
    6_day_war.t:0 "アラブ・イスラエル戦争"
    6_day_war.d:0 "六日戦争または6月戦争は、1967年のアラブ・イスラエル戦争または第三次アラブ・イスラエル戦争としても知られ、1967年6月5日から10日にかけてイスラエルとアラブ諸国の連合体との間で戦われました。"
    ifni_war.t:0 "イフニ戦争"
    ifni_war.d:0 "イフニ戦争は、スペインでは「忘れられた戦争」と呼ばれることもあり、1957年10月に始まったモロッコ反乱軍によるスペイン領西アフリカへの一連の武装侵入であり、シディ・イフニへの失敗に終わった包囲戦によって最高潮に達しました。"
    IDO_ETM_war.t:0 "東ティモール侵攻"
    IDO_ETM_war.d:0 "インドネシアによる東ティモールの侵攻は、1974年に台頭したフレテリン政権を打倒するため、反植民地主義および反共産主義を口実としてインドネシア軍（ABRI/TNI）が東ティモンを侵略した1975年12月7日に始まりました。"
    iran_iraq_war.t:0 "イラン・イラク戦争"
    iran_iraq_war.d:0 "イラン・イラク戦争は、1980年9月から1988年8月まで続いたイランとイラクの間の武力紛争です。積極的な敵対行為はイラクによるイラン侵略から始まり、両国が国連安全保障理事会決議598を受け入れるまで8年間続きました。"
    france_tunisia_war.t:0 "ビゼルト危機"
    france_tunisia_war.d:0 "ビゼルト危機は、チュニジアがフランスのビゼルト海軍基地の撤退を強いるために海上封鎖を行った1961年7月に発生しました。この危機はフランス軍とチュニジア軍の3日間にわたる戦闘で頂点に達し、チュニジア側で630人、フランス側で24人の死者を出しました。最終的にフランスは1963年、この都市と海軍基地をチュニジアに譲渡することとなりました。"
    yom_kippur_war.t:0 "ヨム・キプル戦争"
    yom_kippur_war.d:0 "ヨム・キプル戦争は、ラマダン戦争、10月戦争、1973年アラブ・イスラエル戦争、または第4次アラブ・イスラエル戦争としても知られています。これは1973年10月6日から25日にかけて、イスラエルと、エジプトおよびシリアが率いるアラブ諸国の連合体との間で戦われた武力紛争です。"
    morocco_sahara_war.t:0 "西サハラの併合？"
    morocco_sahara_war.d:0 "西サハラの併合は、1976年と1979年の二段階で行われました。1975年にスペインがスペイン領サハラの支配権を放棄した直後、モーリタニアとモロッコの双方がこの領土を占領しました。1976年4月14日、両国は西サハラ分割協定を通じて、この領土を分割・併合しました。"
    iraq_kuwait_war.t:0 "湾岸戦争？"
    iraq_kuwait_war.d:0 "1990年8月2日、独裁者サダム・フセインが統治するイラクは、隣国クウェートへの侵攻を開始し、2日以内に同国を完全に占領しました。クウェートへの侵攻は直ちに国際的な非難を浴び、国連安全保障理事会（UNSC）も決議660を発令しました。さらに、決議661においてイラクに対し制裁を全会一致で課しました。1990年11月29日に採択されたUNSC決議678は、イラクに対し、決議660を履行してクウェートから撤退するための最終的な猶予を1991年1月15日まで与えました。また、この期限を過ぎた後は、イラクをクウェートから強制的に排除するために「あらゆる必要な手段」を用いる権利を各国に付与しました。"
    soviet_afghan_war.t:0 "ソ連・アフガニスタン戦争？"
    soviet_afghan_war.d:0 "ソ連・アフガニスタン戦争は、1979年から1989年にかけて、ソ連が支配するアフガニスタン民主共和国（DRA）で行われた長期的な武力紛争です。この戦争は、レオニード・ブレジネフの指揮下にあるソ連が、「ストーム333作戦」中に設置された現地の親ソ政府を支援するためにアフガニスタンへの侵攻を開始したことで始まりました。"
    vietnam_cambodian_war.t:0 "カンボジア侵攻？"
    vietnam_cambodian_war.d:0 "1978年12月25日、15万人のベトナム軍が民主カンボジアに侵略し、わずか2週間でカンボジア革命軍を制圧しました。これにより、カンボジア大量虐殺の期間である1975年から1978年12月の間にカンボジア人のほぼ4分の1を死に至らしめたポル・ポトの政府は終焉を迎えました。"
    russia_ukraine_war.t:0 "ロシア・ウクライナ戦争？"
    russia_ukraine_war.d:0 "ロシア・ウクライナ戦争は、2014年2月に始まったロシアとウクライナの間の国際紛争です。ウクライナの尊厳の革命後、ロシアはウクライナからクリミアを併合し、ドンバス戦争においてウクライナ軍と戦う親ロシア派の分離主義者を支援しました。紛争の最初の8年間には、海事事件やサイバー戦、緊張度の高まりも含まれていました。2022年2月、ロシアはさらなる領土の併合と体制変更を目標として、ウクライナへの全面的な侵略を開始しました。"
    second_iraq_war.t:0 "イラク戦争？"
    second_iraq_war.d:0 "イラク戦争は、2003年から2011年にかけてイラクで行われた長期にわたる武力紛争です。アメリカ主導の連合軍によるイラク侵略から始まり、サダム・フセインのバアス党政府を打倒しました。その後、連合軍と侵略後のイラク政府に反対する反乱が発生したことで、紛争は続く数十年の大半を占めることとなりました。米軍は2011年に正式に撤退しました。"
    chad_libya_war.t:0 "トヨタ戦争？"
    chad_libya_war.d:0 "トヨタ戦争は1987年にチャド北部およびチャド・リビア国境で発生した、チャド・リビア紛争の最終フェーズです。この名称は、リビア軍と戦うチャド軍の機動力確保やテクニカルとして使用されたトヨタのピックアップトラック、主にトヨタ・ハイラックスやトヨタ・ランドクルーザーに由来します。チャドはチャド北部のほぼ全域を奪還することに成功し、その後の数ヶ月間でリビア軍に新たな大打撃を与えましたが、9月に紛争を終結させる停戦協定が署名されました。"
    us_afghan_war.t:0 "アフガニスタンでの戦争？"
    us_afghan_war.d:0 "アフガニスタン紛争は、2001年から2021年まで続いた武力紛争です。米国が率いる国際的な軍事連合がアフガニスタンへの侵略を開始し、タリバン統治下のイスラム首長国を打倒し、3年後には国際的に承認されたイスラム共和国を樹立したことで始まりました。"
    us_panama_war.t:0 "パナマ侵略は？"
    us_panama_war.d:0 "米国は、ジョージ・H・W・ブッシュの大統領在任中であった1989年12月中旬にパナマへ侵略を行いました。侵略の主な目的は、恐喝と麻薬密売の疑いで米当局に指名手配されていたパナマの実質的な支配者、マニュエル・ノリエガ将軍を解任することでした。「正義の使命作戦」とコードネームが付けられたこの作戦は、1990年1月下旬にノリエガが降伏したことで終了しました。パナマ防御軍（PDF）は解体され、次期大統領に選出されたギジェルモ・エンダラが就任しました。"
    first_congo_war.t:0 "第一次コンゴ戦争は？"
    first_congo_war.d:0 "第一次コンゴ戦争は、主にザイール（その過程でコンゴ民主共和国に改称）で行われ、スーダンやウガンダにも大きな波及効果を及ぼした内戦および国際的な軍事紛争です。この紛争は、外国の侵略によってザイールのモブツ・セセ・セコ大統領が反乱軍のリーダーであるロラン＝デジレ・カビラに取って代わられることで最高潮に達しました。その後、カビラの不安定政府は同盟国との間で対立することとなり、1998年から2003年にかけての第二次コンゴ戦争への舞台を整えることとなりました。"
    second_congo_war.t:0 "第二次コンゴ戦争は？"
    second_congo_war.d:0 "第二次コンゴ戦争は、第一次コンゴ戦争から1年余り後の1998年8月にコンゴ民主共和国で始まり、同様の問題をいくつか含んでいました。最終的にはアフリカ大陸全土から参戦者が関与する規模となりましたが、コンゴ民主共和国の移行政府が権力を掌握した2003年7月に正式に終結しました。"
    russia_georgia_war.t:0 "ロシア・ジョージア戦争は？"
    russia_georgia_war.d:0 "ジョージア共和国は、ソ連の解体が進む1991年3月に独立を宣言しました。しかし、ジョージアと分離主義者の間の戦闘により、旧南オセチア自治州の一部が、ロシアの支援を受けながらも国際的には承認されていない分離主義者による事実上の支配下に置かれました。アブハジア地域でも同様の膠着状態が発生し、そこでは1992年から1993年にかけてアブハズの分離主義者が戦争を繰り広げました。2000年にロシアでウラジーミル・プーチンが選出され、2003年にジョージアで親欧米的な政権交代が起こったことを受け、ロシアとジョージアの関係は悪化し始めました。NATOがジョージアの加盟申請を検討することを約束した2008年4月までに、関係は全面的な外交危機に達しました。"
    israel_gaza_war.t:0 "イスラエル・ガザ戦争？"
    israel_gaza_war.d:0 "イスラエルとハマス指導下のパレスチナ武装勢力との間の武力紛争は、2023年10月7日から主にガザ地区とその周辺で行われ、ヨルダン川西岸やイスラエルとレバノンの国境付近でも衝突が発生しました。同日、武装勢力はガザ地区からイスラエル南部へ奇襲攻撃を仕掛け、これは1973年のヨム・キプル戦争以来、この地域における最も重大な軍事的深刻化の始まりとなりました。イスラエル軍はハマスの武装勢力を掃討した後、ハマスの標的に対して広範な空爆作戦を行い、続いてガザへの大規模な地上侵攻を実施することで報復しました。"
    moldova_gagauzia_war.t:0 "ガガウズ紛争？"
    moldova_gagauzia_war.d:0 "ガガウズ紛争は、モルドビアSSR、後に独立したモルドバ共和国と、モルドバ内でのさらなる自治権を求めたガガウズ人の人口との間の紛争でした。これは、ソ連への残留を目的としてモルドビアとは別のガガウズ共和国を宣言することで頂点に達しましたが、ソ連の解体後、ガガウズ共和国は事実上の独立国家となりました。1995年、ガガウジアが国内の自治的な領土単位として正式に承認されると、モルドバへと正式に再統合されました。"
    uganda_tanzania_war.t:0 "ウガンダ・タンザニア戦争？"
    uganda_tanzania_war.d:0 "ウガンダ・タンザニア戦争は、1978年10月から1979年6月にかけてウガンダとタンザニアの間で戦われ、ウガンダの大統領イディ・アミンが失脚する結果となりました。この戦争に先立ち、タンザニアの大統領ジュリアス・ニエレレと親密な関係にあったミルトン・オボテ大統領をアミンが1971年に転覆させたことで、ウガンダとタンザニアの関係が悪化していました。戦争勃発に至る経緯は明確ではなく、出来事に関する記述も様々です。1978年10月、ウガンダ軍はタンザニアへの侵入を開始しました。同月後半にはウガンダ軍が侵略を開始し、財産の略奪や民間人の殺害が行われました。ウガンダの公式メディアはカゲラ飛び出し部の併合を宣言しました。"
    azerbaijan_artsakh_war.t:0 "ナゴルノ・カラバフの併合？"
    azerbaijan_artsakh_war.d:0 "2023年9月19日から20日にかけて、アゼルバイジャンは自称分離独立州であるアルツァフに対して大規模な軍事攻勢を開始しました。これは2020年の第二次ナゴルノ・カラバフ戦争の後に署名された停戦合意に違反するものと見なされました。9月28日、アルツァフの大統領サムヴェル・シャフラマニャンは、2024年1月1日までにすべての国家機関を解散させる布告に署名し、分離独立州の存在に終止符を打ちました。"
    us_libya_war.t:0 "リビアへの介入？"
    us_libya_war.d:0 "2011年3月19日、国連安全保障理事会決議1973号（UNSCR 1973）を履行するため、NATOが主導する多国籍連合がリビアへの軍事介入を開始しました。その目標はムアンマル・カダフィ政権の打倒でした。アメリカとイギリスの海軍部隊は110発以上のトマホーク巡航ミサイルを発射して海上封鎖を強行し、一方でフランス空軍、イギリス空軍、およびカナダ空軍がリビア全土で出撃を行いました。"
    us_grenada_war.t:0 "グレナダ侵略？"
    us_grenada_war.d:0 "1983年10月25日の夜明け、アメリカ合衆国によるグレナダ侵略が始まりました。アメリカ合衆国とカリブ海の6カ国による連合軍は、ベネズエラの北100マイル（160km）に位置する島国グレナダに侵略を行いました。米軍によって「オペレーション・アージェント・フューリー」とコードネームを付けられたこの作戦は、数日以内に軍事占領をもたらしました。これは人民革命政府内の争いが引き金となり、グレナダの第2代首相であり前リーダーであったモーリス・ビショップの軟禁および処刑、そしてハドソン・オースティンを議長とする革命軍事評議会の設立を招きました。この侵略の結果、暫定政府が任命され、1984年には選挙が行われました。"
    us_dominican_republic_war.t:0 "ドミニカ共和国への侵略？"
    us_dominican_republic_war.d:0 "ドミニカ共和国の反乱軍に対する共産主義者の支持疑惑により、アメリカ合衆国が紛争に介入しました（コードネームは「オペレーション・パワー・パック」）。これは後に、米州機構の米州平和維持軍による同国の占領へと発展しました。1966年に選挙が実施され、その結果としてホアキン・バラゲールが大統領に選出されました。同年の後半、外国軍は同国から撤退しました。"
    ogaden_war.t:0 "オガデン戦争？"
    ogaden_war.d:0 "オガデン戦争は、エチオピアのオガデン地域を巡って1977年7月から1978年3月までソマリアとエチオピアの間で行われた軍事紛争です。"
    badme_war.t:0 "バドメ戦争？"
    badme_war.d:0 "バドメ戦争としても知られるエリトリア・エチオピア戦争は、1998年5月から2000年6月にかけて発生したエチオピアとエリトリアの間の主要な武力紛争です。1993年にエリトリアがエチオピアから独立した後、両国関係は当初友好的でした。しかし、新たに設定された国際境界線の位置を巡る意見の相違により関係が著しく悪化し、最終的に全面戦争へと発展しました。"
    sino_vietnamese_war.t:0 "中越戦争？"
    sino_vietnamese_war.d:0 "中越戦争は、1979年初めに中国とベトナムの間で発生した短期間の紛争でした。中国は、1978年にベトナムがカンボジアを侵略・占領し、中国が支援するクメール・ルージュの統治を終わらせたことに対抗して攻勢を開始しました。この紛争は約1か月間続き、1979年3月に中国が軍を撤退させました。"
    saudi_north_yemen_war.t:0 "北イエメンへの介入を行いますか？"
    saudi_north_yemen_war.d:0 "北イエメン内戦は、1962年から1970年にかけて北イエメンで戦われた、ムタワキライト王国派とイエメンアラビア共和国支持派による内戦でした。この戦争は、アブドゥッラー・アッ＝サラルが指揮する軍を率いた革命的な共和派によって1962年に行われたクーデターによって始まりました。彼らは新たに即位した国王イマーム・ムハンマド・アル＝バドルを退位させ、イエメンを彼の管区下の共和国であると宣言しました。イマームはサウジアラビア国境へと逃亡し、北部のシーア派部族から支持を集めて権力を奪還しようとしたため、事態は急速に全面的な内戦へと発展しました。"
    PRC_korean_war.t:0 "朝鮮戦争に介入しますか？"
    PRC_korean_war.d:0 "1950年10月3日、中国はインドにある大使館を通じて、国連軍が鴨緑江を越えるならば介入するとアメリカに警告を試みました。しかし、トルーマンを含むワシントンの政策決定者たちは、その警告を脅しであると考え、アメリカはこれに応じませんでした。一方、10月13日には政治局が、ソ連の空軍支援がない状態でも中国は介入すると決定しました。これは、優れた士気が、優れた装備を持つ敵を打ち負かせると信じていたことに基づいています。その目的のため、20万人の人民志願軍（PVA）が鴨緑江を越えて北朝鮮へと侵入しました。10月19日に秘密裏に鴨緑江を渡った後、PVA第13軍集団は10月25日に第1フェーズ攻勢を開始し、中朝国境付近で進軍する国連軍を攻撃しました。"
    NEJ_yemen_civil_war.t:0 "イエメン内戦に介入しますか？"
    NEJ_yemen_civil_war.d:0 "2015年3月26日、サウジアラビアは西アジアと北アフリカの9カ国からなる連合を率いてイエメンへの介入を開始しました。これは、イエメン内戦中にフーシ派の反乱軍によってサナアから軍を追われたイエメン大統領アブドラブ・マンスール・ハディによる、軍事支援への新たな共同要請を受けたものでした。"
    cenepa_war.t:0 "セネパ戦争か？"
    cenepa_war.d:0 "セネパ戦争は、エクアドルとペルーの間で、両国の国境付近にあるペルー領内の地域（すなわち、コンドル・デル・コンドル山脈東側、コンドルカンキ地方、アマゾナス州、ペルー共和国）の支配を巡って戦われた、短期間の局地的な軍事紛争でした。"
    yemenite_war.t:0 "イエメン戦争か？"
    yemenite_war.d:0 "第二次イエメン戦争は、イエメンアラブ共和国と南イエメン民主人民共和国との間で起きた短期間の軍事紛争でした。この戦争は、北イエメンの大統領アフマド・アル＝ガシュミが1978年6月24日に殺害され、さらに2日後には、両イエメンの合併案に取り組んでいた穏健なマルクス主義者サリム・ルバイ・アリが殺害されたことで、両国間の関係が破綻したことにより発生しました。"
    sino_indian_war.t:0 "中印戦争か？"
    sino_indian_war.d:0 "中印戦争は、1962年10月から11月にかけて行われた中国とインドの間の武力紛争でした。これは中印国境紛争の軍事的深刻化でした。戦闘は中国との国境沿い、ブータンの東側に位置するインドの北東フロンティア地域、およびネパール西側のアクサイチンで行われました。紛争は、中国が1962年11月20日に一方的に停戦を宣言し、同時に戦前の位置である実効支配線（中国・インド国境）への撤退を発表したことで終結しました。"
    IDO_MSY_war.t:0 "コンフロンタシか？"
    IDO_MSY_war.d:0 "インドネシア・マレーシア対峙（またはボルネオ対峙、インドネシア、マレーシア、シンガポールでは単にコンフロンタシとして知られる）は、マラヤ連邦からマレーシアという国家が創設されることに対するインドネシアの反対に端を発した、1963年から1966年にかけての武力紛争でした。1966年にインドネシアのスカルノ大統領が退陣した後、この紛争は平和的に終結しました。"
    SAF_ANG_war.t:0 "オペレーション・サバンナか？"
    SAF_ANG_war.d:0 "サバンナ作戦は、1975年から1976年にかけて行われた南アフリカによるアンゴラへの軍事侵攻のコードネームでした。これは南アフリカ国境戦争の一部であり、アンゴラ独立戦争に端を発したものです。その目標は、アンゴラにおける南アフリカに敵対的な国の誕生を防ぐことでした。"
    USA_korean_war.t:0 "朝鮮戦争に介入しますか？"
    USA_korean_war.d:0 "1950年6月25日、北朝鮮の人民軍（KPA）が38度線を越えました。国際連合安全保障理事会はこの侵略を非難し、KPAを撃退するために国際連合軍司令部に権限を与えました。開戦後の2ヶ月間で、韓国軍（ROKA）とその同盟国は敗北寸前まで追い込まれ、釜山環状線のみを維持する状態となりました。しかし、1950年9月、国連軍が仁川に上陸し、KPAの部隊と供給線を遮断しました。彼らは1950年10月に北朝鮮へ侵略し、中国との国境である鴨緑江に向けて前進しました。"
    india_hyderabad_war.t:0 "ハイデラバードを併合しますか？"
    india_hyderabad_war.d:0 "1947年11月、ハイデラバードはインド自治領と停戦協定を締結し、州内へのインド軍の駐留を除いて、それまでのすべての取り決めを継続することに合意しました。インドは、ハイデラバードにおける共産主義国家の樹立が自国への脅威になると感じていました。ニザームの権力は、テランガナ反乱や、彼が鎮圧できなかったラザカールとして知られる急進派民兵の台頭によって弱まっていました。9月7日、ジャワハルラール・ネルーはニザームに最後通牒を突きつけ、ラザカールの禁止とセクンダラバードへのインド軍の帰還を要求しました。インドは1948年9月13日までにこの州へ侵略しました。"
    arab_israeli_war.t:0 "アラブ・イスラエル戦争？"
    arab_israeli_war.d:0 "第一次アラブ・イスラエル戦争としても知られる1948年のアラブ・イスラエル戦争は、委任統治領パレスチナにおける内戦に続く、1948年パレスチナ戦争の第二段階かつ最終段階でした。この内戦は、1948年5月14日のイスラエル独立宣言、深夜のイギリスによるパレスチナ委任統治の終了、そして翌朝のアラブ諸国の軍事連合による委任統治領パレスチナへの侵攻を経て、別々の国々による戦争へと発展しました。"
    first_indo_pakistan_war.t:0 "第一次印パ戦争？"
    first_indo_pakistan_war.d:0 "1947年から1948年にかけて行われたインド・パキスタン戦争は、第一カシミール戦争としても知られており、インドとパキスタンの間で藩王国であるジャム・カシミールを巡って戦われた戦争です。"
    football_war.t:0 "サッカー戦争？"
    football_war.d:0 "サッカー戦争は、1969年にエルサルバドルとホンジュラスの間で戦われた短い軍事紛争です。両国間の既存の緊張度は、1970年のFIFAワールドカップ予選中の暴動と重なりました。1969年7月14日にサルバドル軍がホンジュラスへ攻撃を開始したことで、この戦争が始まりました。"
    agacher_strip_war.t:0 "アガシェの帯戦争？"
    agacher_strip_war.d:0 "アガシェの帯戦争は、1985年12月25日から30日にかけて、ブルキナファソ北部の国境沿いにある全長160キロメートル（100マイル）の土地を巡ってブルキナファソとマリの間で戦われた戦争です。この戦争は停戦によって終結しました。"
    ISR_LEB_war.t:0 "リタニ作戦？"
    ISR_LEB_war.d:0 "1978年3月11日、11人のPLO武装勢力がイスラエルのハイファの南30kmの海岸に上陸し、人々が乗ったバスを占拠して乗客を殺害しました。これは沿岸道路虐殺として知られています。これに対抗して、1978年3月14日、イスラエルはリタニ作戦を開始し、2万5000人の部隊を用いてティルスの市を除いたレバノン南部を占領しました。"
    SYR_LEB_war.t:0 "シリアによるレバノン侵略？"
    SYR_LEB_war.d:0 "1976年5月31日、シリア軍は2000人の部隊と60両の戦車を用い、三方向からの攻勢によってレバノンに侵略しました。第一列はシュフを越えて南へ進みシドンに向かいましたが、PLO軍によって阻止されました。第二列はベイルート－ダマスカス軸に沿って西へ移動しましたが、ベイルートで停止しました。別の列はベッカ渓谷を通って北上し、その後トリポリに向けて西進しましたが、キリスト教勢力によって阻止されました。この攻勢は6月10日までに停止しました。"
    vietnam_war_1975.t:0 "春季攻勢？"
    vietnam_war_1975.d:0 "米軍は1972年までに大半がベトナムから撤退しており、1973年のパリ和平協定によって残りの部隊も撤退しました。しかし、協定は直後に破られ、戦闘は1975年の春季攻勢とPAVNによるサイゴンの陥落まで続きました。これが戦争の終結を意味しました。北ベトナムと南ベトナムは1976年に統一されました。"
    ETH_SOM_border_war.t:0 "エチオピア－ソマリア国境戦争？"
    ETH_SOM_border_war.d:0 "エチオピア・ソマリア国境戦争は1982年6月から1983年8月にかけて行われました。エチオピアはソマリア中部への大規模な侵略を開始しました。軍用機と装甲ユニットの支援を受け、エチオピアは数千人のソマリア救済民主戦線（SSDF）の反乱軍とともに1万人の部隊を展開しました。この作戦は当初、ソマリアの海岸線まで前進し、最終的にバレ政権を打倒することを目指していました。彼らの努力にもかかわらず、ソマリア軍が主力の攻撃を成功裏に撃退したため、エチオピア軍とSSDFのゲリラは主要都市であるガルカヨとベレドウェイネの占領に失敗しました。しかし、紛争はまもなく国境付近の町であるガルドゴブとバランバレ周辺で軍事的な膠着状態に陥りました。"
    USA_SOM_1993_war.t:0 "ゴシック・サーペント作戦？"
    USA_SOM_1993_war.d:0 "ゴシック・サーペント作戦は、1993年のソマリア内戦中に、アメリカ軍の部隊（コードネーム：タスクフォース・レンジャー）がソマリアのモガディシュで実施した軍事作戦です。この作戦の主な目標は、国連軍（UNOSOM II）による追跡を受けていたソマリア国民同盟のリーダー、モハメド・ファラ・アイディドを捕らえることでした。作戦は1993年8月から10月にかけて行われ、アメリカ統合特殊作戦司令部（JSOC）が指揮しました。1993年10月3日、タスクフォースはアイディドの副官2人を捕らえる任務を遂行しました。この任務は、最終的に「モガディシュの戦い」として知られる事態へと発展しました。この戦闘は極めて凄惨なものとなり、タスクフォースはソマリア民兵組織に甚大な死傷者を出させた一方で、自身も多大な損失を被りました。"
    ankoko_island_war.t:0 "アンココ島侵略？"
    ankoko_island_war.d:0 "1966年2月、ベネズエラ、イギリス、ガイアナの政府は、エセキボ領土紛争を巡る論争の解決を目指すジュネーブ協定に署名しました。ガイアナがイギリスから独立してから5か月後の1966年10月、ベネズエラ軍はアンココ島の占領を開始しました。[4]ベネズエラ軍は軍事施設と滑走路を迅速に建設しました。"
    Mauritania_Senegal_Border_War.t:0 "モーリタニア・セネガル国境戦争？"
    Mauritania_Senegal_Border_War.d:0 "モーリタニア・セネガル国境紛争（1989年～1991年）は、土地、民族、そしてナショナル・アイデンティティをめぐる争いによって引き起こされた激しい紛争でした。1989年4月、セネガル川沿いでモーリタニアの牧畜民とセネガルの農民が衝突したことで緊張度が高まりました。現地の紛争として始まった事態は、両政府が互いの市民を数万人に及ぶ規模で追放したことにより、より広範な民族的・外交的危機へと深刻化しました。歴史的な不満や人種的分断に煽られ、共同体の暴力が広がりました。数百人が死亡し、25万人以上が避難を余儀なくされました。戦争は1991年に脆弱な平和と国境の再開とともに終結しましたが、不信感と避難の遺産は、今なおモーリタニア・セネガルの関係を左右しています。"
    Heglig_Crisis_War.t:0 "ヘグリグ危機？"
    Heglig_Crisis_War.d:0 "ヘグリグ危機（2012年3月～9月）は、石油が豊富なヘグリグ地域をめぐるスーダンと南スーダンの間の、短期間ながら激しい国境紛争でした。2011年の南スーダンの独立後、未解決の国境画定と石油収入をめぐる争いが武力衝突へと深刻化しました。南スーダン軍は、南スーダンではパントゥとして知られるヘグリグをユニティ州の一部であると主張して占領しましたが、スーダン側もその地域への主権を主張しました。最終的にスーダンが支配を取り戻し、両国は2012年9月に国境と資源に関する合意に署名しました。"
    PAK_AFG_2026_war.t:0 "アフガニスタン・パキスタン戦争？"
    PAK_AFG_2026_war.d:0 "2026年2月21日、パキスタン空軍（PAF）はアフガニスタンのナンガハル州、パクトゥカ州、ホスト州に対して空爆を実施しました。2026年2月26日、アフガニスタンはパキスタンに対して報復作戦を開始しました。これを受けてパキスタンは、タリバンに対して「ガザブ・リル・ハック作戦」を開始しました。翌日、パキスタンはアフガニスタンとの「開放された戦争」状態を宣言しました。"
    USA_PER_2026_war.t:0 "アメリカ・イラン戦争？"
    USA_PER_2026_war.d:0 "2026年2月28日、アメリカ合衆国とイスラエルはイランに対して大規模な共同軍事キャンペーンを開始しました。これはドナルド・トランプ大統領が「主要な戦闘作戦」と表現したものです。この深刻化は、イランの核計画に関する最後の仲介交渉が決裂したことを受けて起こりました。"
    ETH_SOM_2006_war.t:0 "エチオピアによるソマリア侵攻？"
    ETH_SOM_2006_war.d:0 "エチオピアによるソマリア侵攻は、2006年中盤から2009年初頭まで続いた武力紛争でした。アメリカの支援を受けたエチオピア軍が、イスラム法廷連合（ICU）を打倒し、移行連邦政府（TFG）を樹立するためにソマリアへ侵攻したことで始まりました。この紛争は軍事占領へと発展し、反エチオピアの反乱が急速に激化しました。2008年までに、反乱軍は侵攻中にICUが失った領土の大部分を奪還しました。この紛争により、1991年以来で2番目に大規模な人口流出が発生しました。"
    USA_Saudi_Arabia_petrodollar.t:0 "ペトロダラー協定？"
    USA_Saudi_Arabia_petrodollar.d:0 "ペトロダラー協定は、1974年にアメリカとサウジアラビアの間で結ばれた協定であり、サウジアラビアが石油販売の価格を米ドルのみで設定し、余剰収入を米国債に投資することを定めたものです。その見返りとして、アメリカは治安維持の保証と軍事装備を提供し、ドルが世界の主要な石油通貨としての地位を確立しました。"
    
