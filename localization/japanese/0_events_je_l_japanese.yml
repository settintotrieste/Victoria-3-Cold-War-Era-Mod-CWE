    change_capital_BRZ_decision:0 "首都をブラジリアに移転"
    change_capital_BRZ_decision_desc:0 "ブラジリアは、リオデジャネイロからより中心的な場所へ首都を移転させる計画の一環として、1956年にルシオ・コスタ、オスカー・ニーマイヤー、ジョアキン・カルドゾによって開発された計画都市でした。"
    change_capital_BUR_decision:0 "首都をネピドーに移転"
    change_capital_BUR_decision_desc:0 "首都が移転された理由については、いくつかの仮説があります。ネピドーは旧首都のヤンゴンよりも中心的な場所に位置しています。また、シャン州、カヤー州、カイン州に隣接する交通のハブでもあります。政府および軍のリーダーたちは、近隣に強力な軍事的・政府的な展開度を示すことが、慢性的に不安定なこれらの地域に安定性をもたらす可能性があると考えていました。"
    
    SEATO_form.t:0 "東南アジア条約機構でしょうか？"
    SEATO_form.d:0 "東南アジアにおける共産主義のさらなる拡大を阻止することを主な目的として設立された東南アジア条約機構（SEATO）は、1954年9月にフィリピンのマニラで署名された東南アジア集団防衛条約に基づき設立された、東南アジアにおける集団防衛のための国際組織です。SEATOの正式な機関は、1955年2月19日にタイのバンコクで開催された条約締約国会議において設立されました。組織の司令部もバンコクに置かれました。8つの国がこの組織に加盟しました。"
    SEATO_form.f:0 "このイベントにより、各国は$USA$の影響力圏に加わることになります。これにより、該当する場合は従属国の自治権が低下するか、あるいは$USA$と加盟国との間に$defensive_pact$が形成されます。"
    CENTO_form.t:0 "中央条約機構でしょうか？"
    CENTO_form.d:0 "中央条約機構（CENTO）は、冷戦期における軍事同盟でした。1955年2月24日にイラン、イラク、パキスタン、トルコ、およびイギリスによって形成されました。この同盟は1979年3月16日に解消されました。合意に至る交渉においては、アメリカの圧力と軍事的・経済的援助の約束が鍵となりましたが、アメリカは当初参加することができませんでした。"
    CENTO_form.f:0 "このイベントは、諸国を$USA$の影響力圏に招き入れます。これにより、該当する場合はあらゆる従属国の自治権が減少するか、あるいは$USA$と参加国の間に$defensive_pact$が形成されます。"
    indo_soviet_form.t:0 "インド・ソ連平和友好協力条約？"
    indo_soviet_form.d:0 "インド・ソ連平和友好協力条約は、1971年8月にインドとソ連の間で署名された、相互の戦略的協力を規定する条約でした。これは、冷戦期におけるインドの従来の非同盟という立場からの重大な転換であり、1971年の印パ戦争の一因となりました。この条約は、パキスタンの中国および米国との結びつきが強まったことによってもたらされました。"
    cuban_soviet_form.t:0 "キューバにおけるソ連の核兵器？"
    cuban_soviet_form.d:0 "1962年5月、ソ連の第一書記ニキータ・フルシチョフは、キューバにソ連の中距離核ミサイルを配備することで、戦略ミサイルの開発と配備において拡大する米国の優位に対抗するという考えに説得されました。キューバの指導部は、米国が再びキューバに侵略してくるという強い予想を抱いており、キューバへの核ミサイル設置案を熱狂的に承認しました。ソ連のR-12ミサイルの最初の輸送分は9月8日の夜に到着し、続いて9月16日に2回目が到着しました。R-12は熱核弾頭を搭載可能な中距離弾道ミサイルでした。"
    USA_SPA_form.t:0 "マドリード協定？"
    USA_SPA_form.d:0 "1953年9月23日にフランコ体制下のスペインと米国によって署名されたマドリード協定は、1953年のコンコルダート（教皇との協定）と共に、第二次世界大戦後のスペインの国際的孤立を打破するための重要な取り組みでした。1953年の協定は、米国がスペインに対して経済的および軍事的援助を提供することを約束する3つの個別の経営責任者間協定の形式をとりました。対して米国は、スペイン領土内に航空基地および海軍基地を建設し、利用することが許可されることとなりました。"
    USA_ROC_form.t:0 "中米相互防衛条約？"
    USA_ROC_form.d:0 "アメリカ合衆国と中華民国の間の相互防衛条約は、1955年から1980年まで有効であったアメリカ合衆国と中華民国（台湾）の間で署名された防御協定でした。これは、中華人民共和国による台湾島の侵略から守ることを目的としていました。"
    SOV_PRC_form.t:0 "ソ連中国友好条約？"
    SOV_PRC_form.d:0 "中ソ友好同盟相互援助条約は、1950年2月14日に中華人民共和国とソビエト社会主義共和国連邦の間で締結された、同盟、集団安全保障、援助、および協力に関する二国間同盟条約でした。"
    SOV_NVM_form.t:0 "ソ連ベトナム友好条約？"
    SOV_NVM_form.d:0 "ソ連は、東欧の衛星国や新しく設立された中華人民共和国と共に、1950年1月の第一次インドシナ戦争中にベトナム民主共和国を外交的に承認した最初の国でした。"
    USA_YUG_form.t:0 "アメリカ・ユーゴスラビアの緊張緩和？"
    USA_YUG_form.d:0 "1948年のティト＝スターリンの分裂は、アメリカ合衆国と新しい社会主義共和国との関係における重大な転換点となりました。ユーゴスラビアは1948年夏に初めてアメリカ合衆国に援助を要請しました。トルーマン政権は、ユーゴスラビアに対して多額の援助、債務、および軍事支援を提供することを決定しました。これは、この地域におけるソ連の野心を阻止するために、共産主義国家に対してアメリカが軍事援助を開始したことを意味し、アメリカ合衆国とユーゴスラビアの関係におけるさらなる努力へとつながりました。ティトは、ソ連の反対を押し切り、ユーゴスラビアが1949年に国際連合安全保障理事会の議席を獲得した際、アメリカの支持を得ました。1949年にアメリカ合衆国はユーゴスラビアに債務を提供し、1950年にはその債務が増額され、多額の補助金と軍事支援が続きました。"
    PRC_PB_form.t:0 "漢字圏の形成？"
    PRC_PB_form.d:0 "1956年、ソ連のリーダーであるニキータ・フルシチョフはスターリンとスターリン主義を非難しました。中華人民共和国とソ連がレーニン主義の解釈と適用において進歩的に乖離していく中で、毛沢東と中国の指導部は愕然としました。1961年までに、彼らの解決しがたいイデオロギー上の相違により、中国はソ連の共産主義をソ連における「修正主義の裏切り者」によるものとして正式に非難するに至りました。東側陣営の諸国にとって、中ソ分裂は、世界共産主義のための革命を誰が指導するのか、そして世界の先遣党が政治的な助言、金融支援、および軍事支援を誰（中国かソ連か）に求めるのかという問題でした。その意味で、両国は自らの勢力圏内の諸国に根付く先遣党を通じて、世界共産主義の指導権を巡って競い合ったのです。"
    NAM_PB_form.t:0 "非同盟運動？"
    NAM_PB_form.d:0 "非同盟運動（NAM）は、冷戦の対立という文脈において発展途上国の関心を促進することを目的に設立されました。最初の30年間において、この運動は脱植民地化、新しい独立国家の形成、そして国際関係の民主化において極めて重要な役割を果たしました。"
    USA_SOV_INF.t:0 "中距離核戦力条約？"
    USA_SOV_INF.d:0 "中距離核戦力条約（INF条約）は、アメリカ合衆国とソビエト連邦（およびその後継国家であるロシア連邦）との間の兵器管理条約です。アメリカ大統領ロナルド・レーガンとソ連書記長ミハイル・ゴルバチョフは、1987年12月8日にこの条約に署名しました。アメリカ元老院は1988年5月27日に条約を承認し、レーガンとゴルバチョフは1988年6月1日にこれを批准しました。INF条約は、両国の射程500～1,000キロメートル（短・中距離）および1,000～5,500キロメートル（中距離）のすべての核および通常地上発射弾道ミサイル、巡航ミサイル、およびミサイル発射機を禁止しました。この条約は、空発射または海発射のミサイルには適用されませんでした。"
    USA_SOV_START.t:0 "戦略兵器削減条約？"
    USA_SOV_START.d:0 "START I（戦略兵器削減条約）は、アメリカ合衆国とソ連の間で結ばれた、戦略的攻撃兵器の削減と制限に関する二国間条約でした。この条約は1991年7月31日に署名され、1994年12月5日に発効しました。条約により、署名国は6,000発を超える核弾頭、および合計1,600発の大陸間弾道ミサイル（ICBM）と爆撃機の配備が禁止されました。STARTは歴史上、最大かつ最も複雑な兵器管理条約の交渉を行い、2001年後半における最終的な履行により、当時存在していたすべての戦略核兵器の約80%が除去されました。"
    USA_CNG_form.t:0 "コンゴ危機における国連の介入？"
    USA_CNG_form.d:0 "コンゴにおける国連活動（ONUC）は、コンゴ危機に対応して1960年にコンゴ共和国に展開された国連平和維持軍でした。ONUCは、重要な軍事能力を備えた国連初の平和維持任務であり、規模と範囲において、現在も最大級の国連活動の一つとして残っています。"
    GBR_FPDA_form.t:0 "五カ国防衛協力体制？"
    GBR_FPDA_form.d:0 "五カ国防衛協力体制（FPDA）は、英連邦諸国であるオーストラリア、マレーシア、ニュージーランド、シンガポール、およびイギリスの間で締結された一連の多国間協定に基づく、一連の二国間防衛関係です。FPDAは、1967年のイギリスによる1971年11月1日のスエズ運河以東からの軍撤退の決定の結果として、英マラヤ防衛協定に基づくイギリスのマラヤへの防衛保証が終了したことを受けて設立されました。五カ国防衛協力体制の下、5つのメンバー国（オーストラリア、マレーシア、ニュージーランド、シンガポール、およびイギリス）は、マレーシアおよびシンガポールに対する武力攻撃が発生した場合に、互いに協議することに同意しました。"
    USA_ANZUS_form.t:0 "ANZUS同盟？"
    USA_ANZUS_form.d:0 "オーストラリア、ニュージーランド、アメリカ合衆国治安維持条約（ANZUSまたはANZUS条約）は、1951年に署名されたオーストラリア、ニュージーランド、アメリカ合衆国間の集団安全保障協定です。まず、各締約国が国際連合の目的に従うことを再確認しており、自衛のための場合を除き武力の行使や脅迫を禁止しています。"
    vietnam_laos_form.t:0 "ラオス・ベトナム友好条約？"
    vietnam_laos_form.d:0 "1977年7月18日にビエンチャンで署名されたラオス・ベトナム友好協力条約は、ラオス人民民主共和国とベトナム社会主義共和国の緊密な同盟を正式なものにしました。これは、両国が独立のために共に闘った中で築かれた深い絆を反映し、政治、経済、文化、そして治安維持の分野における長期的な協力を確立しました。"
    turkey_northern_cyprus_form.t:0 "トルコによるキプロス侵略？"
    turkey_northern_cyprus_form.d:0 "トルコは1974年7月20日、翌月にかけて2つのフェーズで進行した作戦の中でキプロスに侵略しました。ギリシャ系およびトルコ系キプロス人の間の共同体間暴力という背景、そしてその5日前に起きたギリシャ軍事政権が主導したキプロスのクーデターへの対応として行われたこの作戦は、トルコによる島北部の占領と支配へとつながりました。"
    greece_cyprus_form.t:0 "キプロスの傀儡国？"
    greece_cyprus_form.d:0 "1974年7月15日、ギリシャ軍事政権が主導する軍事クーデターがキプロス国家警備隊によって実行されました。クーデターの首謀者たちは、当時のキプロス大統領である大司教マカリオス3世を解任し、親エノシス主義の民族主義者ニコス・サンプソンを擁立しました。サンプソン政権は、ギリシャによる島の併合を最終目的とする傀儡国であると評されました。短期的には、クーデター勢力は「キプロスヘレニズム共和国」の樹立を宣言しました。"
    
