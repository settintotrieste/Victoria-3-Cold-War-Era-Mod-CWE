    diplomatic_neutrality_violated.t:0 "[SCOPE.sCountry('neutrality_violated_country').GetAdjective]の中立性が侵害されました"
    diplomatic_neutrality_violated.d:0 "[SCOPE.sCountry('neutrality_violated_country').GetName]の外交的中立性が、侵略国によって侵害されました。この国際法に対する明白な違反を受け、国際連合は、戦争中の[SCOPE.sCountry('neutrality_violated_country').GetName]を軍事的に支援するために、志願国連合を形成するよう呼びかけました。"
    diplomatic_neutrality_violated.f:0 "このイベントは、中立国が攻撃されたために発生しました。"
    diplomatic_neutrality_violated_option.1:0 "[SCOPE.sCountry('neutrality_violated_country').GetAdjective]側の戦争に加わる！"
    diplomatic_neutrality_violated_option.2:0 "この戦争には関与しない。"
