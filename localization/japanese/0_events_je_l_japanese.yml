    PAP_1958_revolution.t: "教皇ヨハネ23世の教皇時代？"
    PAP_1958_revolution.d: "教皇ヨハネ23世は、1958年10月28日から1963年6月の死去まで、カトリック教会の首長およびバチカン市国の主権者でした。彼の全体的な目標は、教会の牧歌的な役割と、国家の事務への必要な関与を強調することによって、教会を近代化することでした。"
    PAP_1963_revolution.t: "教皇パウロ6世の教皇時代？"
    PAP_1963_revolution.d: "教皇パウロ6世は、1963年6月21日から1978年8月6日の死去まで、カトリック教会の首長およびバチカン市国の主権者でした。ヨハネ23世の後を継いだ彼は、第二次バチカン公会議を継続し、1965年に閉幕させると、その数多くの改革を実施しました。彼は東方正教会やプロテスタント諸教会とのエキュメニカルな関係の改善を促進し、その結果、多くの歴史的な会合や合意がもたらされました。"
    PAP_1978_revolution.t: "教皇ヨハネ・パウロ2世の教皇時代？"
    PAP_1978_revolution.d: "教皇ヨハネ・パウロ2世は、1978年から2005年の死去まで、カトリック教会の首長およびバチカン市国の主権者でした。彼は民主主義のために独裁政権と戦い、母国ポーランドやその他のヨーロッパにおける共産主義支配の終焉を助けたと評価されています。[14]ヨハネ・パウロ2世の下で、カトリック教会はアフリカとラテンアメリカにおける影響力を大きく拡大し、ヨーロッパおよび世界各地での影響力を維持しました。"
    PAP_2005_revolution.t: "教皇ベネディクト16世の教皇時代？"
    PAP_2005_revolution.d: "教皇ベネディクト16世は、2005年4月19日から2013年2月28日の退位まで、カトリック教会の首長およびバチカン市国の主権者でした。ベネディクトの教皇選出は、教皇ヨハネ・パウロ2世の死去に伴う2005年の教皇コンクラーベで行われました。退位後、ベネディクトは「教皇エメリトゥス」として知られることを選び、2022年に死去するまでこの称号を保持しました。"
    PAP_2013_revolution.t: "教皇フランシスコの教皇時代？"
    PAP_2013_revolution.d: "教皇フランシスコは、カトリック教会の首長およびバチカン市国の主権者でした。彼はイエズス会（イエズス修道会）出身の最初の教皇であり、南北アメリカ大陸および南半球出身の最初の教皇、そして8世紀のシリア人教皇グレゴリウス3世以来、ヨーロッパ以外で生まれ育った最初の教皇です。"
    PAP_GENERIC_revolution.t: "新教皇"
    PAP_GENERIC_revolution.d: "前教皇の死去に伴い、ローマのカトリック教会は新しい教皇を選出しました。新教皇は枢機卿団によって、コンクラーベと呼ばれるプロセスを通じて選出されました。コンクラーベでは、80歳未満の枢機卿が、候補者が3分の2の多数派を得るまで秘密投票を行います。"
    PAP_GENERIC_revolution.f: "このイベントは、世界に教皇である[concept_character]が存在しないため発生しました。"
    
    controlled_election.t: "[ROOT.GetCountry.GetAdjectiveNoFormatting]立法選挙"
    controlled_election.d: "本日、#o [SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')]#!の選挙が実施されました。候補者は[ROOT.GetCountry.GetName]の唯一の与党、または与党が管理する公的組織によって指名されなければなりませんでした。有権者は与党の候補者に反対票を投じることも可能でしたが、それには投票所を利用する必要がありました。一方で、政党への投票は白票を提出するだけで簡単に行うことができました。\n\n結果：#g [GetPlayer.MakeScope.Var('controlled_elections_vote_result_display').GetValue]%#!が[concept_government]を支持しています。"
    controlled_election.f: "[ROOT.GetCountry.GetName]が[Concept('concept_non_competitive_election','$concept_non_competitive_elections$')]しているため、[Concept('concept_election','$concept_elections$')]は主に[concept_government]の支持調査として機能します。もし[Concept('concept_radical','$concept_radicals$')]の数が[Concept('concept_loyalist','$concept_loyalists$')]の数を上回った場合、[concept_government]の正当性が損なわれます。\n\n注：[Concept('concept_non_competitive_election','$concept_non_competitive_elections$')]の効果は、次の数式に従って減少します：合計[Concept('concept_radical','$concept_radicals$')]÷合計[Concept('concept_loyalist','$concept_loyalists$')]＋（合計[Concept('concept_radical','$concept_radicals$')]×100）"
    controlled_elections_system_option.1: "投票を尊重せよ。"
    controlled_elections_system_option.2: "結果を操作せよ！"
    controlled_elections_system_option: "民意は示された！"
    
    controlled_election_results: "最近の管理選挙の効果"
    
    controlled_election_results_positive: "$controlled_election_results$"
