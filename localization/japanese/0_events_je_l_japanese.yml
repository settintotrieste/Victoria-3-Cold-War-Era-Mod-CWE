    je_generic_decolonisation_system_2.tt:0 "帝国の存続"
    je_generic_decolonisation_system_3.tt:0 "すべての非[concept_homeland]州が編入されました"
    je_generic_decolonisation_system_4.tt:0 "この国の[concept_homeland]である州を一つも所有していない"
    je_generic_decolonisation_system_5.tt:0 "この国の[concept_homeland]ではない州を少なくとも1つ所有している"
    je_generic_decolonisation_system:0 "植民地分離主義"
    je_generic_decolonisation_system_reason:0 "[ROOT.GetCountry.GetName]は、[concept_homeland]を持たない[Concept('concept_unincorporated_state','$concept_unincorporated_states$')]を所有しています。このような帝国主義的な行為は、かつては国際的に受容されていましたが、第二次世界大戦後は好まれないものとなりました。実際、国際社会は今や、植民地帝国を解体することで従属国に民族自決権を与えることを要求しています。さらに悪いことに、[ROOT.GetCountry.GetAdjective]の植民地に住む先住民も落ち着きを失っており、その多くが独立を叫び、中には植民地当局に対して暴力的な攻撃を仕掛ける者さえいます。"
    
    je_elections_system:0 "[GetPlayer.MakeScope.Var('election_year_display').GetValue]の総選挙"
    je_elections_system_reason:0 "[ROOT.GetCountry.GetName]にて現在、総[concept_election]が開催されています。\n\n$concept_election_desc$ #BOLD \n\n[concept_election]の[concept_momentum]に影響を与える問題：#! $election_fluctuation_economy_display$ $election_fluctuation_politics_display$ $election_fluctuation_government_display$ $election_fluctuation_corruption_display$ $election_fluctuation_incumbency_display$"
    je_elections_system_status:0 "[concept_momentum]：[GetPlayer.MakeScope.Var('election_fluctuation_net_display').GetValue]％／月"
    je_elections_system_electoral_fraud_button:0 "選挙不正を行う"
    je_elections_system_electoral_fraud_button_desc:0 "[concept_government]は、たとえ[concept_election]で実際に誰が勝利したとしても、現職の[concept_ruler]が権力を維持できるよう、現在の選挙で投票を操作できます。"
    electoral_fraud_committed.tt:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]の[SCOPE.sCharacter('the_current_ruler_scope').GetFullName]と[SCOPE.gsInterestGroup('the_current_ruler_scope_ig_scope').GetName]の[concept_interest_group]が、選挙不正によって[concept_election]で勝利します。"
    electoral_fraud_ongoing.tt:0 "選挙不正はまだ行われていません"
    enforce_ruler_restriction.tt:0 "[ROOT.GetCountry.GetName]の[concept_government_type]と互換性のある[concept_interest_group]からの[concept_politician]が、次の[concept_ruler]になります"
    
    election_fluctuation_economy_display:0 "\n\n・経済見通し：[GetPlayer.MakeScope.Var('election_fluctuation_economy_display').GetValue]%/月"
    election_fluctuation_politics_display:0 "\n\n・政治的不安定性：[GetPlayer.MakeScope.Var('election_fluctuation_politics_display').GetValue]%/月"
