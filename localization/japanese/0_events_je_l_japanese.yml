    the_troubles_custom_name:0 "北アイルランド問題"
    the_troubles_custom_desc:0 "北アイルランド問題は、1960年代後半から1998年まで約30年間続いた、北アイルランドにおける民族・国家間の紛争です。主要な争点は北アイルランドの地位でした。歴史的な理由からその多くがアルスター・プロテスタントであった統一主義者や体制派は、北アイルランドがイギリスに留まることを望んでいました。一方で、その多くがアイルランド・カトリックであったアイルランドの民族主義者や共和主義者は、北アイルランドがイギリスを離脱し、統一アイルランドに合流することを望んでいました。北アイルランドが主な舞台でしたが、時には暴力がアイルランド共和国の一部、イングランド、およびヨーロッパ本土にも波及することがありました。"
    blm_custom_name:0 "奴隷制の遺産"
    blm_custom_desc:0 "植民地時代の初期に最初のアフリカ人が到着してからアメリカ内戦の後にかけて、多くのアフリカ系アメリカ人は奴隷状態にありました。自由な身分のアフリカ系アメリカ人であっても、内戦の前後を問わず、リンチ、隔離、ブラック・コード、ジム・クロウ法、その他の形態の差別にさらされ、政治的、社会的、経済的な自由に対する制限に直面してきました。公民権運動のおかげで、形式的な人種差別は連邦政府によって徐々に違法化され、アメリカ社会の大部分において、社会的・道徳的に容認できないものとして徐々に認識されるようになりました。それにもかかわらず、アメリカにおける黒人への人種差別は依然として蔓延しており、社会経済的な不平等に反映され続けています。"
    years_of_lead_custom_name:0 "鉛の時代"
    years_of_lead_custom_desc:0 "鉛の時代という言葉は、[ROOT.GetCountry.GetName]における政治的暴力と社会の混乱の時代を指しており、極左および極右による政治テロリズムや暴力的な衝突の波によって特徴づけられています。"
    naxalite_insurgency_custom_name:0 "ナクサライト・毛沢東主義者の反乱"
    naxalite_insurgency_custom_desc:0 "ナクサライト・毛沢東主義者の反乱は、ナクサライトまたはナクサルとして知られる毛沢東主義者のグループ（毛沢東主義的な政治的情緒とイデオロギーを支持する共産主義者のグループ）とインド政府との間で続いている紛争です。ナクサライトは、放置された農業労働者や貧困層のために土地の権利の改善とより多くの仕事を得るための戦いであると主張し、警察官や政府職員を頻繁に標的にしてきました。"
    tamil_tigers_insurgency_custom_name:0 "タミル・イーラム解放のトラの反乱"
    tamil_tigers_insurgency_custom_desc:0 "タミル・イーラム解放のトラ（LTTE）は、スリランカ北東部に拠点を置いていたタミルの武装組織でした。シンハラ人が支配するスリランカ政府によるスリランカ・タミル人への継続的な差別と暴力的な迫害を受け、LTTEは島の北東部にタミル・イーラムと呼ばれる独立したタミルの国家を建設するために戦いました。"
    communist_insurgency_custom_name:0 "「[ROOT.GetCountry.GetAdjectiveNoFlag]共産主義者の反乱」"
    communist_insurgency_custom_desc:0 "[ROOT.GetCountry.GetAdjectiveNoFlag]共産党は、[concept_government]を転覆させ社会主義共和国を樹立することを目標として、宣戦布告しました。"
    generic_insurgency_custom_name:0 "[ROOT.GetCountry.GetAdjectiveNoFlag]の反乱"
    generic_insurgency_custom_desc:0 "[ROOT.GetCountry.GetAdjective]社会の急進派は、武力によって[concept_government]を転覆させることを任務としています。"
    theocratic_insurgency_custom_name:0 "テロとの戦い"
    theocratic_insurgency_custom_desc:0 "テロとの戦いは、[ROOT.GetCountry.GetName]における宗教的過激派を抑圧するための軍事キャンペーンです。これらの過激派は[concept_government]を転覆させ、神権政治国家を樹立することを目指しています。"
    
    historical_domestic_unrest.option.1:0 "「我々は歴史に従うのだ！」"
    historical_domestic_unrest.option.2:0 "「我々は異なる道を進む……」"
    historical_domestic_unrest.option:0 "「悲劇だ！」"
    
    USA_civil_rights_movement.t:0 "公民権運動"
    USA_civil_rights_movement.d:0 "公民権運動は、アメリカ合衆国における合法的な人種隔離、差別、および参政権の剥奪を廃止するために、1954年から1968年にかけて行われた社会運動およびキャンペーンでした。この運動は19世紀後半の再建時代に端を発し、1940年代に現代的なルーツを持ちましたが、長年にわたる直接行動や草の根の抗議活動を経て、1960年代に最大の立法上の成果を上げました。この社会運動による主要な非暴力的な抵抗と市民的不服従のキャンペーンは、最終的にすべてのアメリカ人の公民権に対する新たな連邦法上の保護を確立しました。"
    USA_assassinate_MLK.t:0 "マーティン・ルーサー・キング・ジュニアの暗殺？"
    USA_assassinate_MLK.d:0 "アフリカ系アメリカ人の聖職者であり公民権運動のリーダーであったマーティン・ルーサー・キング・ジュニアは、1968年4月4日午後6時1分（中部標準時）、テネシー州メンフィスのロレイン・モーテルで銃撃され、命を落としました。彼はセント・ジョセフ病院へ急送されましたが、午後7時5分に死亡しました。彼は公民権運動の有力なリーダーであり、非暴力と市民的不服従を用いたことで知られるノーベル平和賞受賞者でした。"
    USA_blm_protests.t:0 "ジョージ・フロイド抗議活動"
    USA_blm_protests.d:0 "ジョージ・フロイド抗議活動は、2020年5月26日にアメリカ合衆国のミネアポリスで始まった一連の警察の暴力に対する抗議活動でした。この市民の混乱と抗議活動は、逮捕の際に行われたアフリカ系アメリカ人の男性、ジョージ・フロイド（46歳）の殺害に対する国際的な反応の一部として始まりました。抗議活動はブラック・ライヴズ・マター（BLM）運動を支持する形で、全米および60カ国以上の2,000を超える都市や町へと急速に広がりました。世論調査の推定では、アメリカ合衆国において1,500万人から2,600万人の人々がデモに何らかの形で参加しており、この抗議活動はアメリカ史上最大規模のものとなりました。"
    GBR_1967_HKG_riots.t:0 "香港反植民地暴動"
    GBR_1967_HKG_riots.d:0 "1967年の香港暴動は、イギリスの植民地支配下にあった香港で発生した大規模な反政府暴動でした。小規模な労働争議として始まりましたが、デモは最終的に植民地政府に対する抗議活動へと深刻化しました。この抗議活動は、数ヶ月前にポルトガル統治下のマカオで成功を収めた反植民地主義デモに部分的な影響を受けていました。"
    POR_1966_MCA_riots.t:0 "12-3事件"
    POR_1966_MCA_riots.d:0 "12-3事件は、1966年12月3日に発生したマカオにおけるポルトガルの植民地支配に対する一連の政治的デモと暴動です。中華人民共和国（中国本土）の文化大革命に触発されたこの事件は、マカオにおける汚職と植民地主義に抗議する現地中国人のデモ隊に対し、植民地当局が警察による暴力的な鎮圧を行ったことへの直接的な反応として発生しました。"
    PRC_2014_HKG_protests.t:0 "アムブレラ・ムーブメント"
    PRC_2014_HKG_protests.d:0 "アムブレラ革命、またはアムブレラ・ムーブメント、占拠運動とも呼ばれる一連の座り込みによる街頭抗議活動が、2014年9月26日から12月15日にかけて香港で発生しました。この抗議活動は、全国人民代表大会常務委員会（NPCSC）が香港の選挙制度改革案に関するディシジョンを下した後に始まりました。その決定は極めて制限的なものと広く見なされ、中国共産党（CCP）による香港の行政長官候補者の事前審査に等しいものでした。"
    PRC_2019_HKG_protests.t:0 "香港抗議デモ"
    PRC_2019_HKG_protests.d:0 "2019年から2020年にかけての香港抗議デモは、犯罪人引渡しに関する逃亡犯条例の改正法案を香港政府が導入することに対する一連のデモでした。これは香港の歴史において最大規模の一連のデモとなりました。抗議者たちは行政長官キャリー・ラムの辞任と、立法評議会および行政長官選挙における普通選挙権を要求しました。"
    protests_of_1968.t:0 "1968年の抗議活動"
    protests_of_1968.d:0 "1968年の抗議活動は、世界規模での社会的な紛争の拡大を伴うものでした。これは主に左翼政治の台頭、反戦感情、公民権運動の切迫、サイレント世代およびベビーブーマー世代における若者のカウンターカルチャー、そして国家の軍隊や官僚機構に対する民衆の反乱によって特徴づけられていました。"
    JAP_Sanrizuka_Struggle.t:0 "三里塚闘争"
    JAP_Sanrizuka_Struggle.d:0 "三里塚闘争とは、日本政府と三里塚の農民コミュニティが関わった市民紛争および暴動を指します。これは、成田国際空港（当時は新東京国際空港）の建設に対し、農民、地域住民、および左派が組織的な反対運動を展開したものです。この闘争は、多くの地域住民の関与や同意を得ることなく、政府が三里塚に空港を建設するという決定を下したことに端を発しています。"
    JAP_sarin_attack.t:0 "地下鉄サリン事件"
    JAP_sarin_attack.d:0 "地下鉄サリン事件は、1995年3月20日に日本の東京において、オウム真理教というカルト活動グループのメンバーによって引き起こされた国内テロ行為です。犯人たちはラッシュアワーの時間帯に東京メトロ（当時は帝都高速度交通営団）の3路線5編成で連携してサリンを散布しました。これにより13人が死亡、50人が重傷（その後死亡した者も含む）、さらに約1,000人が一時的な視覚障害を負いました。"
    USA_WTC_attack_1993.t:0 "世界貿易センタービル爆破事件"
    USA_WTC_attack_1993.d:0 "1993年の世界貿易センタービル爆破事件は、1993年2月26日にニューヨーク市の世界貿易センター複合施設北棟の地下でバン爆弾が爆発したテロ攻撃です。606kgの尿素硝酸・水素ガス増幅装置は、北棟を双子の南棟へと衝突させ、両方の超高層ビルを崩壊させて数万人の命を奪うことを目的としていました。結果としてその目的は達成されませんでしたが、妊婦を含む6人が死亡し、1,000人以上の負傷者が出ました。"
    USA_WTC_attack_2001.t:0 "9.11同時多発テロ事件"
    USA_WTC_attack_2001.d:0 "2001年にアルカイダがアメリカ合衆国に対して行った4件の組織的なイスラム教過激派による自爆テロ事件が、9.11テロ事件です。その日の朝、19人のテロリストが東海岸のニューイングランドおよびミッドアトランティック地域からカリフォルニアへ向かう予定だった4機の旅客機をハイジャックしました。ハイジャック犯は最初の2機の飛行機をニューヨーク市のワールドトレードセンターのツインタワーに衝突させ、次の2便は首都であるワシントンD.C.とその周辺にある標的へと向けられました。3組目のチームはアメリカ国防総省の司令部であるペンタゴンへの攻撃に成功しましたが、4機目の飛行機は乗客による反乱の最中にペンシルベニア州の田舎で墜落しました。"
    GBR_London_attack_2005.t:0 "ロンドン爆破事件"
    GBR_London_attack_2005.d:0 "7月7日のロンドン爆破事件（7/7とも呼ばれる）は、朝のラッシュアワーにロンドンの公共交通機関を利用していた通勤客を標的とした、イスラム教過激派による4件の組織的な自爆テロ事件です。3人のテロリストがロンドン中心部のロンドン地下鉄の車両内で、3つの手製爆弾を立て続けに爆発させました。その後、4人目のテロリストがタビストック・スクエアを走行中の2階建てバスで別の爆弾を爆発させました。"
    GBR_Brighton_attack_1984.t:0 "ブライトン・ホテル爆破事件"
    GBR_Brighton_attack_1984.d:0 "1984年10月12日、プロビジョナル・アイリッシュ・リパブリカン・アーミー（IRA）が、イングランドのブライトンにあるグランド・ホテルでイギリス政府のメンバーを暗殺しようと試みました。保守党大会のためにマーガレット・サッチャー首相と内閣が到着する前に、パトリック・マギーによってホテル内に遅延時限爆弾が仕掛けられていました。保守党の下院議員であり総務の代理であったサー・アンソニー・ベリーを含む5人が死亡し、さらに31人が負傷しました。サッチャーは爆発を辛うじて免れました。"
    GER_Munich_Massacre_1972.t:0 "ミュンヘン大学殺害事件"
    GER_Munich_Massacre_1972.d:0 "ミュンヘン虐殺事件は、西ドイツのミュンヘンで開催された1972年夏季オリンピック中に、パレスチナの武装組織「黒い九月」のメンバー8人によって行われたテロ攻撃です。彼らはオリンピック村に侵入してイスラエル代表チームのメンバー2人を殺害し、さらに9人を人質に取りました。"
    RUS_Moscow_attack_1999.t:0 "ロシア集合住宅爆破事件"
    RUS_Moscow_attack_1999.d:0 "ロシア集合住宅爆破事件は、1999年9月にロシアのブイナクスク、モスクワ、ヴォロゴドンスクにある4つの集合住宅を襲った一連の爆発事件です。この事件では300人以上が死亡、1,000人以上が負傷し、国中に恐怖の波を広げました。この爆破事件はダゲスタンの侵略とともに第二次チェチェン戦争の引き金となりました。当時首相であったウラジーミル・プーチンによるこの危機の対処は、彼の人気を大幅に高め、数ヶ月以内に大統領の座に就く助けとなりました。"
    HND_Bombay_attack_1993.t:0 "ボンベイ爆破事件"
    HND_Bombay_attack_1993.d:0 "1993年のボンベイ爆破事件は、1993年3月12日にマハーラーシュトラ州のボンベイ（現在のムンバイ）で発生した12件の一連のテロ爆破事件です。この一日の攻撃により、257人が死亡、1,400人が負傷しました。これらの攻撃は、ムンバイを拠点とする国際的な組織犯罪シンジケート「Dカンパニー」のリーダーであるダウッド・イブラヒムによって指揮されました。"
    IDO_Bali_attack_2002.t:0 "バリ島爆破事件"
    IDO_Bali_attack_2002.d:0 "2002年10月12日、インドネシアのバリ島にある観光地区クータで一連の爆破事件が発生しました。この攻撃により202人が死亡（うちオーストラリア人88人、インドネシア人38人、イギリス人23人、およびその他20カ国以上の国民を含む）し、さらに209人が負傷しました。過激なイスラム主義グループであるジェマ・イスラミーヤの様々なメンバーがこの爆破事件に関連して有罪判決を受けており、その中には死刑判決を受けた3名も含まれています。"
    FRA_Paris_attack_1995.t:0 "フランス・イスラム主義者による爆破事件"
    FRA_Paris_attack_1995.d:0 "1995年にパリとリヨンの公共交通機関、およびヴィルブラーヌの学校を標的とした一連の攻撃が行われました。これらは、アルジェリア内戦をフランスにまで拡大しようとしたアルジェリア武装イスラム集団（GIA）によって実行されました。攻撃では8人が死亡しましたが、その全員が7月25日の最初の攻撃によるものでした。また、この攻撃により190人が負傷しました。"
    USA_Oklahoma_attack_1995.t:0 "オクラホマシティ爆破事件"
    USA_Oklahoma_attack_1995.d:0 "オクラホマシティ爆破事件は、1995年4月19日、アメリカ合衆国オクラホマ州オクラホマシティのアルフレッド・P・ムラー連邦ビルを標的とした国内テロリストによるトラック爆破事件でした。これはウェーコ包囲戦終結から2周年の日に行われました。この爆破事件は、2001年の9.11テロ以前のアメリカ史上、最も多くの犠牲者を出したテロ行為でした。反政府的な極端主義者であり白人至上主義者でもあるティモシー・マクベイとテリー・ニコルズによって実行され、午前9時2分に発生しました。この事件により168人が死亡、680人が負傷し、建物の3分の1以上が破壊されたため、解体を余儀なくされました。"
    HND_Operation_Blue_Star.t:0 "ブルー・スター作戦？"
    HND_Operation_Blue_Star.d:0 "ブルー・スター作戦は、シーク教徒の聖地である黄金寺院から、シーク教徒の武装勢力ジャルナイル・シン・ビンドラワンレおよびその他のシーク教分離主義者を排除するために、1984年6月1日から10日にかけてインド軍が行った作戦です。寺院複合施設における軍事行動は、シーク教の宗教およびシーク教コミュニティ全体に対する攻撃であると解釈した世界中のシーク教徒から批判されました。"
    HND_Anti_Sikh_Riots.t:0 "反シーク教暴動"
    HND_Anti_Sikh_Riots.d:0 "1984年の反シーク教暴動は、1984年のシーク教虐殺としても知られており、インディラ・ガンディーが自身のシーク教護衛兵によって暗殺された後にインドで発生した、シーク教徒に対する組織的なポグロムの一連の出来事でした。政府の推計では、デリーで約2,800人、全国で3,350人のシーク教徒が殺害されたとされています。"
    ITA_Piazza_Fontana_attack_1969.t:0 "ピアッツァ・フォントァナ爆破事件"
    ITA_Piazza_Fontana_attack_1969.d:0 "ピアッツァ・フォントァナ爆破事件は、1969年12月12日にイタリアのミラノにあるピアッツァ・フォントァナ（ドゥオーモの近く）の国立農業銀行（Banca Nazionale dell'Agricoltura）の司令部で爆弾が爆発したテロ攻撃であり、17人が死亡、88人が負傷しました。この攻撃は、第三の地位、ネオ・ファシストの準軍事テロ組織であるオルディネ・ヌオーヴォ、およびおそらく特定されていない一部の協力者によって実行されました。"
    HND_assassinate_MKG.t:0 "マハトマ・ガンディー暗殺？"
    HND_assassinate_MKG.d:0 "1948年1月30日の午後5時17分、ガンディーは祈祷会で演説に向かう途中で、ビルラ・ハウス（現在のガンディー・スリティ）の庭で大姪たちと一緒にいました。その時、ヒンドゥー教民族主義者のナトゥラム・ゴドセが拳銃で至近距離からガンディーの胸に3発の弾丸を撃ち込みました。いくつかの記録によれば、ガンディーはその場で即死しました。"
    USA_taft_act.t:0 "タフト・ハートレー法？"
    USA_taft_act.d:0 "タフト・ハートレー法としてよく知られる1947年労働関係法は、労働組合の活動と権力を制限するアメリカの連邦法です。これはハリー・S・トルーマン大統領の拒否権発動を押し切って第80回アメリカ議会によって制定され、1947年6月23日に法律となりました。タフト・ハートレー法は、1945年と1946年の大規模なストライキの波の後に導入されました。"
    PRC_tibetan_uprising.t:0 "チベットの蜂起"
    PRC_tibetan_uprising.d:0 "1959年のチベットの蜂起は1959年3月10日に始まりました。これは、1951年の十七条協定の締結以来、中華人民共和国（PRC）の実効支配下にあったチベットの首都ラサで反乱が勃発したことによります。最初の蜂起は、チベットの抗議者たちが中国政府によって第14代ダライ・ラマが逮捕されるのではないかと恐れていたため、中国とチベットの間の緊張が高まり混乱する中で発生しました。抗議活動は反中国感情や分離主義によっても激化しました。"
    HND_tibetan_movement.t:0 "追放中のダライ・ラマ？"
    HND_tibetan_movement.d:0 "1959年のチベットの蜂起の際、自らの命を案じたダライ・ラマとその一行はCIAの特殊活動部門の助けを借りてチベットを脱出し、1959年3月30日にインドへ入国し、4月18日にアッサム州のテズプールに到達しました。その後しばらくして、彼はインドのダラムサラに亡命政府を設立しました。そこはしばしば「リトル・ラサ」と呼ばれます。亡命政府の設立後、彼は自らと共に亡命した約8万人のチベット難民を農業入植地へ再定住させました。"
    HND_tibetan_movement.option.1:0 "彼をインドにいさせてやれ。"
    HND_tibetan_movement.option.2:0 "結構です！"
    POL_pope_movement.t:0 "教皇ヨハネ・パウロ2世の選出？"
    POL_pope_movement.d:0 "教皇ヨハネ・パウロ2世は反共主義に道徳的な焦点を与えました。1979年に彼の母国ポーランドを訪問したことは、反対勢力を活性化させた労働組合の「連帯」運動を中心とする、宗教的および国家主義的な復活を促しました。そして、この出来事は2年後の彼への暗殺未遂事件につながった可能性があります。"
    POL_pope_movement.option.1:0 "「あいつは厄介者だ！」"
    POL_pope_movement.option.2:0 "「ある程度の信教の自由を認めろ。」"
    POL_solidarity_movement.t:0 "連帯運動"
    POL_solidarity_movement.d:0 "連帯は、1980年8月にポーランドのグダニスクにあるレーニン造船所で設立されたポーランドの労働組合です。組合員数は1981年9月にピークに達し、1,000万人に及び、これは国の生産年齢人口の3分の1に相当しました。1980年代、連帯は広範な反権威主義的な社会運動であり、市民的抵抗の手法を用いて労働者の権利と社会変革の目的を推進しました。政府は1980年代初頭、ポーランドへの戒厳令の発令と政治的弾圧を通じて、この組合を壊滅させようと試みました。"
    AFG_mujahideen_movement.t:0 "アフガン・ムジャヒディン"
    AFG_mujahideen_movement.d:0 "アフガン・ムジャヒディンは、ソ連＝アフガニスタン戦争およびその後の第1次アフガン内戦において、アフガニスタン民主共和国およびソ連と戦ったイスラム主義の抵抗勢力でした。"
    JAP_recruit_scandal.t:0 "リクルート事件"
    JAP_recruit_scandal.d:0 "リクルート事件は、1988年に多くの有力な日本の政治家を辞任に追い込んだインサイダー取引および汚職の事件です。この事件に関与した政治家の中には、竹下登首相、中曽根康弘前首相、藤涙孝夫官房長官などが含まれていました。自民党政府のメンバーに加えて、公明党、民主党、および日本社会党のリーダーたちも関与していたことが判明しました。"
    ITA_maxi_trial.t:0 "マキシ裁判？"
    ITA_maxi_trial.d:0 "マキシ裁判は、シチリアのパレルモで行われたシチリア・マフィアに対する刑事裁判です。裁判は1986年2月10日（陪審裁判所の初日）から1992年1月30日（破毀院の最終日）まで続き、ウッチアルドーネ刑務所の壁内にこの目的のために特別に建設されたバンカー形式の法廷で開催されました。"
    GBR_poll_tax_riots.t:0 "人頭税？"
    GBR_poll_tax_riots.d:0 "人頭税暴動は、マーガレット・サッチャー首相率いる保守党政府が導入したコミュニティ・チャージ（一般に「人頭税」として知られる）に対する抗議活動の中で、イギリスの町や都市で発生した一連の暴動です。最大の抗議活動は、イングランドとウェールズでその税が施行される直前の1990年3月31日土曜日に、ロンドン中心部で発生しました。"
    FRA_yellow_vests.t:0 "黄色いベスト運動"
    FRA_yellow_vests.d:0 "黄色いベスト運動は、2018年11月17日にフランスで始まった、一連のポピュリストによる草の根的な毎週の抗議活動です。この活動は当初、原油および燃料価格の上昇、生活費の高騰、そして経済的不平等を動機としていました。運動側は、フランスにおける不当な課税負担が、特に農村部や都市周辺部において労働者階級と中産階級にのしかかっていると主張しました。抗議者たちは、燃料税の引き下げ、富への連帯税の再導入、最低賃金の引き上げなどを要求しました。"
    RUS_Khodorkovsky_Case.t:0 "ミハイル・ホドルコフスキーの裁判？"
    RUS_Khodorkovsky_Case.d:0 "2001年、ホドルコフスキーは国内における「市民社会を構築し、強化すること」を目的とした、改革志向の組織であるオープン・ロシアを設立しました。2003年10月、彼はロシア当局によって逮捕され、詐欺罪で起訴されました。その後、ウラジーミル・プーチン大統領の政府は、税金の問題で間もなくユコス社の株式を凍結しました。プーチン政府はユコス社に対してさらなるアクションを実行し、その結果、同社の株価は暴落し、ホドルコフスキーの財力の多くが消失しました。2005年5月、彼は有罪判決を受け、禁錮9年の刑に処されました。"
    RUS_Politkovskaya_murder.t:0 "アンナ・ポリティコフスカヤ暗殺事件？"
    RUS_Politkovskaya_murder.d:0 "2006年10月7日、ロシアのジャーナリストであり、作家、人権活動家でもあるアンナ・ポルコフスカヤが、モスクワ中心部にある彼女のマンションのエレベーター内で射殺されました。彼女はチェチェン紛争への反対や、ウラジーミル・プーチンへの批判で知られていました。彼女はチェチェン戦争やプーチンのロシアに関する数冊の本を執筆しており、その活動に対していくつかの国際的な賞を受賞しています。契約殺人とみられる彼女の殺害は、強い国際的な反応を巻き起こしました。"
    RUS_snow_revolution.t:0 "雪の革命？"
    RUS_snow_revolution.d:0 "雪の革命は2011年（2011年のロシア立法選挙の結果に対する抗議として）に始まり、2012年から2013年にかけて続きました。この抗議活動は、ロシアおよび外国のジャーナリスト、政治活動家、そして一般市民が、選挙プロセスは不正であったと主張したことによって引き起こされました。"
    RUS_Navalny_murder.t:0 "アレクセイ・ナワルヌィの死？"
    RUS_Navalny_murder.d:0 "アレクセイ・アナトリーエヴィチ・ナワルヌィは、ロシアの反対派リーダー、弁護士、反汚職活動家、そして政治犯でした。2021年1月、ナワルヌィはロシアに帰国しましたが、ドイツでの入院中に仮釈放の条件に違反したという容疑で直ちに拘束されました。2023年8月、ナワルヌィは過激主義の罪でさらに19年の禁錮刑を言い渡されました。2023年12月、ナワルヌィは刑務所から約3週間にわたって行方不明となりました。その後、彼はヤマロ・ネネツ自治管区にある北極圏の矯正植民地で姿を現しました。2024年2月16日、ロシアの刑務所当局は、ナワルヌィが47歳で死亡したと報告しました。"
    BYE_Minsk_attack_2011.t:0 "ミンスク地下鉄爆破事件"
    BYE_Minsk_attack_2011.d:0 "2011年のミンスク地下鉄爆破事件は、2011年4月11日にベラルーシのミンスク地下鉄内で爆弾が爆発し、15人が死亡、204人が負傷するというものでした。爆発は現地時間の17時55分、中心部のカストリチニスカヤ駅で発生しました。検察庁は刑事捜査を開始し、この事件をテロ攻撃として分類しました。4月13日に逮捕された2人の容疑者は爆破を自供しましたが、動機は不明なままでした。2012年3月、実行犯であるドミトリー・カナヴァラウとウラズィスラウ・カヴァリョウの両名は、銃殺刑に処されました。"
    BYE_May_Protests.t:0 "5月の大量抗議活動"
    BYE_May_Protests.d:0 "2020年から2021年にかけてのベラルーシの抗議活動は、ベラルーシ政府とアレクサンドル・ルカシェンコ大統領に対する一連の集団的な政治デモおよび抗議活動でした。ベラルーシ史上最大の反政府抗議活動となったこのデモは、ルカシェンコが6期目の就任を目指した2020年の大統領選挙の直前から選挙期間中に発生しました。これらのデモに対抗して、比較的規模の小さい親政府的な集会もいくつか開催されました。"
    JAP_1970_uprising.t:0 "三島由紀夫によるクーデター未遂"
    JAP_1970_uprising.d:0 "1970年11月25日、三島と彼の民兵のメンバー4名は東京中心部の軍事基地に侵入して司令官を人質に取り、自衛隊を扇動して日本の1947年憲法（彼はこれを「敗戦の憲法」と呼んでいました）を打倒させようと試みましたが、失敗に終わりました。演説を行い、「天皇陛下万歳！」と叫んだ後、彼は割腹自殺を図りました。"
    USA_assassinate_DJT.t:0 "ドナルド・トランプ暗殺未遂事件"
    USA_assassinate_DJT.d:0 "2024年7月13日、アメリカ合衆国の元大統領であり、2024年大統領選挙における共和党の有力な候補者であるドナルド・トランプは、ペンシルベニア州バトラー近郊で行われていた野外選挙キャンペーンの集会中に暗殺未遂事件に遭いましたが、一命を取り留めました。"
    PER_big_party.t:0 "ペルシア帝国の2500年祝典？"
    PER_big_party.d:0 "ペルシア帝国建国2500周年記念式典は、古代のアケメネス朝ペルシアを築いたキュロス大王の建国を祝うため、1971年10月に盛大な祝祭が行われたイランの国家的行事でした。この祝典の目的は、イランの古代文明と歴史を強調すると同時に、シャー・モハンマド・レザ・パフラヴィ統治下における現代的な進歩を披露することにありました。"
    ISR_assassinate_YR.t:0 "イツハク・ラビン暗殺事件？"
    ISR_assassinate_YR.d:0 "1992年、ラビンはイスラエル・パレスチナ和平プロセスを支持する公約を掲げて首相に再選されました。彼はオスロ合意の一環として、パレスチナの指導部といくつかの歴史的な合意に署名しました。1994年、ラビンは長年の政治的ライバルであるシモン・ペレス、そしてパレスチナのリーダーであるヤセル・アラファトと共にノーベル平和賞を受賞しました。また、ラビンは1994年にヨルダンとも和平条約を締結しました。1995年11月、彼はオスロ合意の条件に反対した過激派のイガル・アミールによって暗殺されました。"
    USA_assassinate_DJT_2.t:0 "ドナルド・トランプに対する2度目の暗殺未遂"
    USA_assassinate_DJT_2.d:0 "共和党の大統領候補が別の暗殺未遂を生き延びてからわずか9週間後の2024年9月15日、ドナルド・トランプがフロリダ州ウェストパームビーチのゴルフ場にて暗殺の標的となりました。トランプがプレーしていた場所から数ホール離れた場所に配置されていたアメリカ秘密警護局のエージェントが、約400ヤード先のコース沿いの茂みからAKスタイルのライフルの銃口が突き出しているのに気づきました。パームビーチ郡保安官のリック・ブラッドショーによれば、エージェントが発砲したところ、犯人はライフルを落としてSUVで逃走し、銃器のほか、2つのバックパック、照準用のスコープ、GoProカメラを現場に残していったといいます。男はその後、隣接する郡で法執行機関によって拘束されました。"
    GBR_diana_death.t:0 "ダイアナ、ウェールズ公妃の死"
    GBR_diana_death.d:0 "1997年8月31日の未明、ダイアナ、ウェールズ公妃は、フランスのパリにあるポン・ド・アルマトンネルでの悲劇的な自動車事故により負った傷のため亡くなりました。ダイアナのパートナーであったドディ・ファイドと、メルセデス・ベンツW140の運転手であったアンリ・ポールは車内で死亡しているのが発見されました。ドディのボディガードであったトレバー・リース＝ジョーンズは重傷を負い、この事故の唯一の生存者となりました。ダイアナは36歳で亡くなりました。彼女の死はイギリスおよび世界中で深い悲しみをもたらし、テレビ中継された葬儀は推定25億人が視聴しました。"
    GBR_diana_death.option.1:0 "「彼女は民衆のプリンセスだった！」"
    GBR_diana_death.option.2:0 "「王族の死を悼みます。」"
    IRQ_civil_war_2006.t:0 "イラク内戦"
    IRQ_civil_war_2006.d:0 "イラク内戦は、2006年から2008年にかけて、イラク政府およびアメリカ主導の連合軍に対し、イラクのイスラム国やマフディー軍といった様々な宗派的なシーア派およびスンニ派の武装グループとの間で行われた武力紛争でした。2006年2月、十二イマーム派シーア派の聖地とされるアル＝アスカリ聖廟が爆破されたことをきっかけに、連合軍と政府に対する反乱は宗派間の内戦へと深刻化しました。"
    JOR_civil_war_1970.t:0 "黒い九月"
    JOR_civil_war_1970.d:0 "黒い九月は、フセイン国王が率いるヨルダンと、ヤセル・アラファト議長が率いるパレスチナ解放機構（PLO）との間の武力紛争でした。1970年9月17日、ヨルダン軍はアンマンやイルビドなど、PLOが重要な展開度を持つ都市を包囲し、パレスチナ難民キャンプから活動していたフェダインの拠点を標的とし始めました。フェダインは次々と都市から追い出され、7月23日のアジュル攻勢中に包囲された2,000人が降伏したことで、紛争は正式に終結しました。ヨルダンはフェダインがシリア経由でレバノンへ移住することを許可しましたが、彼らは後にレバノン内戦に関与することになります。"
    GUA_civil_war_1960.t:0 "グアテマラ内戦"
    GUA_civil_war_1960.d:0 "グアテマラ内戦は、1960年から1996年にかけてグアテマラ政府と様々な左翼反乱グループとの間で行われた内戦でした。内戦中、グアテマラ政府軍はグアテマラのマヤ人の人口に対してジェノサイドを犯したと言われており、民間人に対する広範な人権侵害が行われました。争いの背景には、長年の課題であった不公平な土地分配がありました。主にヨーロッパ系の人々である財力のあるグアテマラ人や、アメリカのユナイテッド・フルーツのような外国企業が、土地の多くを支配していました。その見返りとして彼らは税金をほとんど支払っておらず、それが悲惨な条件の下で土地を耕していた農村部の先住民の貧困層との紛争につながりました。"
    COS_civil_war_1948.t:0 "コスタリカ内戦"
    COS_civil_war_1948.d:0 "コスタリカ内戦は1948年3月12日から4月24日まで行われました。この紛争は1948年2月8日の大統領選挙に続くもので、その選挙では反対候補のオティリオ・ウラテが与党のラファエル・アンヘル・カルデロン・グアルディアを破りました。立法府を支配していた体制派の代議士たちは、ウラテの勝利は不正であると主張し、3月1日に議会は選挙結果を無効にすることを決定しました。これにより、選挙に参加していなかった実業家のホセ・フィゲレス・フェレールが率いる、テオドロ・ピカード大統領の政府に対する武装蜂起が引き起こされました。戦後、フィゲレスは軍を打倒し、臨時政府評議会の長として18ヶ月間にわたり国を統治し、同年12月の憲法制定議会の選挙を監督しました。その議会が新しい1949年憲法を採択した後、評議会は解散され、権力は新しい憲法に基づく大統領としてウラテに引き継がれました。"
    AFG_civil_war_1979.t:0 "アフガニスタン抵抗活動"
    AFG_civil_war_1979.d:0 "1978年4月27日、PDPAとそれに忠実な軍事ユニットは、激しいクーデターによってダウド・カーンとその近親者および護衛を殺害し、首都カブールを掌握して新しいアフガニスタン民主共和国（DRA）の樹立を宣言しました。革命評議会が率いる新しい共産主義政府は、民衆の支持を得ることはできませんでした。宗教的指導者たちが政府に対してジハードを宣言する中、1979年5月、アフマド・シャー・マスードはパンジシールにおいて新しい共産主義政府に反対するため、ペシャワールでの準備を進めました。"
    PAL_assassinate_YA.t:0 "ヤセル・アラファトの死？"
    PAL_assassinate_YA.d:0 "ヤセル・アラファトはパレスチナの政治的リーダーでした。彼は1969年から2004年までパレスチナ解放組織（PLO）の議長を務め、1994年から2004年までパレスチナ・ナショナル・権力（PNA）の大統領を務めました。思想的にはアラブ民族主義者であり社会主義者であったアラファトは、1959年から2004年まで彼が率いたファタハ政党の創設メンバーでもありました。ヤセル・アラファトは、短期間の闘病の末、2004年11月11日に75歳で急逝しました。彼の死因についてはその後論争が続いており、さまざまな説が提唱されています。しかし、フランスとロシアのチームによる公式調査では、事件性の証拠は見つかりませんでした。"
    CNG_assassinate_LDK.t:0 "ローラン・カビラの暗殺？"
    CNG_assassinate_LDK.d:0 "コンゴ民主共和国の大統領であるローラン＝デジレ・カビラは、2001年1月16日、キンシャサのパレ・ド・マルブル内にある公邸のオフィスで暗殺されました。彼を殺害した犯人は、以前はラシディ・カセレカとしても特定されていた18歳のボディーガード、ラシディ・ミゼレでした。ミゼレは後に射殺されました。その1週間後、彼の遺体は国葬のためにコンゴへ送り返され、その10日後に息子のジョセフ・カビラが大統領に就任しました。"
    ARG_dirty_war_1974.t:0 "汚い戦争？"
    ARG_dirty_war_1974.d:0 "汚い戦争とは、アルゼンチンの軍事政権または文民軍事独裁政権が、コンドル作戦の一環として1974年から1983年にかけてアルゼンチンで行った国家テロリズムの期間を指す名称です。このキャンペーンの間、アルゼンチン反共同盟（AAA、またはトリプルA）という形態の軍および治安維持部隊、ならびに死の部隊が、あらゆる政治的異端者や、社会主義、左翼ペロニズム、またはモンテネグロスの活動に関連していると見なされた人々を追跡しました。"
    JAP_assassinate_SA.t:0 "安倍晋三の暗殺？"
    JAP_assassinate_SA.d:0 "2022年7月8日、日本の元首相であり日本の代議院議員でもあった安倍晋三氏が、奈良県奈良市の大和西大寺駅付近で行われた政治イベントでの演説中に暗殺されました。安倍氏は自由民主党（LDP）の候補者の応援演説を行っていた際、41歳の山上徹也によって、自作の銃器で致命的な銃撃を受けました。安倍氏は医療用ヘリコプターで橿原市の奈良県立医科大学附属病院へと搬送されましたが、そこで死亡が確認されました。"
    PHI_drug_war_2016.t:0 "麻薬との戦争？"
    PHI_drug_war_2016.d:0 "麻薬との戦争とは、2016年6月30日から2022年6月30日まで在任したロドリゴ・ドゥテルテ大統領の政権下で始まった、強化された対麻薬キャンペーンのことです。このキャンペーンによって国内の麻薬の蔓延は減少しましたが、警察や正体不明の襲撃者によって行われたとされる超法規的殺害によって汚されてきました。2022年までに、2016年以降に殺害された麻薬容疑者の数は政府によって公式に6,252人と集計されていますが、フィリピン国家警察や自警団が行った「対麻薬作戦」によって12,000人から30,000人の市民が殺害されたと推定されています。"
    MEX_drug_war_2006.t:0 "ミチョアカン作戦？"
    MEX_drug_war_2006.d:0 "ミチョアカン作戦は、麻薬の栽培を排除し、麻薬密売と戦うための連邦警察とメキシコ軍による共同作戦です。2006年12月11日に開始されたこの作戦は、メキシコの公安長官、検察総長、内務長官、メキシコ海軍、およびメキシコ軍によって監督されました。時には、作戦に参加していない州警察や市警察が参加することもありました。この共同作戦は、組織犯罪、この場合は麻薬密売に対する作戦として際立っており、最大規模の軍および警察部隊、ならびに多くの州軍を投入してきました。"
    USA_great_wall_2017.t:0 "トランプの壁？"
    USA_great_wall_2017.d:0 "トランプの壁は、ドナルド・トランプの第1期米大統領任期中に開始されたメキシコと米国の境界障壁を拡張したものです。これは、同年の選挙に向けたトランプの2016年大統領選挙公約の重要な柱でもありました。選挙戦を通じて、トランプは不法移民に対処するための国境の壁の建設を訴えました。"
    LEB_civil_war_1975.t:0 "レバノン内戦について？"
    LEB_civil_war_1975.d:0 "レバノン内戦は、レバノンのキリスト教徒とイスラム教徒の人口間の緊張から生じた内戦です。この紛争は、社会経済的な格差や、1970年代にパレスチナ解放機構（PLO）の戦闘員がレバノンに存在していたことによって悪化しました。1975年、レバノンのイスラム教徒と左派勢力はPLOを支持してより多くの政治的権力を求めましたが、政治的支配を維持しようとしたキリスト教徒はPLOに反対しました。各派閥は1976年初頭にかけて激しく戦い、レバノンは事実上分割され、北部に権力を持つキリスト教徒、南部にイスラム教徒が位置することとなりました。"
    SYR_civil_war_2011.t:0 "シリア内戦について？"
    SYR_civil_war_2011.d:0 "シリア内戦は、国家が支援するアクターと非国家アクターが入り乱れる、シリアにおける多角的な紛争です。2011年3月、バシャール・アル＝アサドの統治に対する民衆の不満が、この地域で広く展開されていたアラブの春の一環として、シリア全土での大規模な抗議活動と民主化デモを引き起こしました。政府の治安維持機構による数ヶ月に及ぶ弾圧の後、フリー・シリアン・アーミーなどの様々な武装反乱グループが国中で形成され始め、これがシリアの反乱の始まりとなりました。2012年中盤までに、この反乱は本格的な内戦へと深刻化しました。"
    LBY_civil_war_2014.t:0 "リビア内戦について？"
    LBY_civil_war_2014.d:0 "リビア内戦（2014年～2020年）は、第2次リビア内戦としても知られています。これはリビア国内の多くの武装グループ、主に代議院（HoR）と国民合意政府（GNA）の間で、2014年から2020年までの6年間にわたって戦われた多国間内戦です。"
    TUR_pogrom_1955.t:0 "イスタンブール・ポグロムについて？"
    TUR_pogrom_1955.d:0 "イスタンブール・ポグロムは、1955年9月6日から7日にかけて、イスタンブールのギリシャ系少数派を主な標的として行われた、国家主導の反ギリシャ派暴徒による一連の攻撃です。このポグロムは、トルコの執政政党であるデモクラット党が、さまざまな治安維持組織（戦術動員グループ、カウンター・ゲリラ、および国家治安維持局）の協力のもとで画策したものでした。これらの事件は、ギリシャのマケドニア州テッサロニキにあるトルコ領事館、すなわち1881年にムスタファ・ケマル・アタテュルクが誕生した家を爆破したことにより引き起こされました。しかし、実際にはその爆弾は領事館のトルコ人用務員によって仕掛けられたものであり、彼は後に逮捕されて自白しています。"
    BUR_genocide_2016.t:0 "ロヒンギャのジェノサイド？"
    BUR_genocide_2016.d:0 "ロヒンギャのジェノサイドは、ミャンマー軍によるイスラム教徒のロヒンギャの人々に対する、現在も続く一連の迫害と殺害です。このジェノサイドは現在までに2つのフェーズを経てきました。第一は2016年10月から2017年1月にかけて行われた軍による弾圧であり、第二は2017年8月から現在まで続いているものです。この危機により、100万人を超えるロヒンギャが他の国々への避難を余儀なくされました。多くはバングラデシュへ逃れ、世界最大の難民キャンプが形成される結果となりましたが、他にもインド、タイ、マレーシア、および南アジアや東南アジアの他の地域へ逃れた人々もおり、彼らは現在も迫害に直面し続けています。"
    NGE_pogrom_1966.t:0 "反イボ派ポグロム？"
    NGE_pogrom_1966.d:0 "1966年5月から始まり、1966年9月29日以降にピークを迎えた、ナイジェリア北部に居住するイボの人々やその他のナイジェリア南部出身者に対する一連の虐殺です。8,000人から3万人のイボ人および東部出身者が殺害されたと推定されています。さらに100万人のイボ人が北部地域から東部へと逃れました。これらの殺害に対抗する形で、ポートハーコートやその他の東部の都市において、一部の北部出身者が虐殺されました。"
    SER_genocide_1995.t:0 "スレブレニツァの虐殺？"
    SER_genocide_1995.d:0 "スレブレニツァの虐殺は、ボスニア戦争中の1995年7月、スレブレニツァの町とその周辺で8,000人以上のボシュニャク系ムスリムの男性や少年が殺害されたジェノサイド事件です。これは主にラトコ・ムラディッチ率いるスルプスカ共和国のボスニア・セルビア人軍の部隊によって行われましたが、セルビアの準軍事組織スコーピオンズも参加していました。この虐殺は、第二次世界大戦の終結以降、ヨーロッパで法的に認められた最初のジェノサイドでした。"
    POR_academic_crisis_1962.t:0 "学術危機？"
    POR_academic_crisis_1962.d:0 "学術危機とは、1962年にエスタド・ノヴォによって引き起こされたポルトガルの政府政策を指します。この政策は、ポルトガル学生全国事務局を含む、いくつかの学生協会や組織のボイコットと閉鎖を伴うものでした。この組織のメンバーのほとんどは反対派の活動家であり、その中には多くの共産主義者が含まれていました。学生たちはデモで応戦し、3月24日にはリスボンで大規模な学生デモが行われましたが、暴徒鎮圧警察によって激しく抑圧され、数百人の学生が負傷しました。直後に学生たちはストライキを開始しました。これらの一連の出来事が、1962年の学術危機として知られるようになったのです。"
    POR_coup_1975.t:0 "共産主義クーデター未遂？"
    POR_coup_1975.d:0 "ポルトガルは、プロセス・レボリューショナリオ・エム・クルソ（進行中の革命プロセス）として知られる激動の時代を経験しました。このPRECの段階は、オテロ・サライヴァ・デ・カルヴァーリョ率いる極左の士官グループによる1975年11月25日のクーデターまで続きました。これは主流派の共産党の信用を失墜させるための共産主義的な陰謀であったと言われています。その後、より中道派の士官によるカウンタークーデターが成功し、自由民主主義勢力と左派共産主義政党との間の絶え間ない摩擦が特徴となりました。"
    SPA_coup_1981.t:0 "スペインのクーデター未遂？"
    SPA_coup_1981.d:0 "1981年2月、スペインにおいてシビル・ガードおよびスペイン軍の一部によりクーデターが試みられました。このクーデターの失敗は、スペインをフランコ政権へと戻そうとする最後の本格的な試みとなり、スペインの民主化プロセスを定着させる役割を果たしました。フアン・カルロス1世国王はクーデターを阻止する上で大きな役割を果たし、その結果、君主制は新たな正当性を持って立ち上がりました。"
    SPA_BSQ_devolution.t:0 "ゲルニカ憲章？"
    SPA_BSQ_devolution.d:0 "ゲルニカ憲章として広く知られる1979年のバスク自治州憲章は、アラバ、ビスカヤ、ギプスコアの歴史的領土を含むバスク自治共同体の政治システムを組織する法的文書です。これにより、同地域は1978年スペイン憲法が想定した自治共同体の一つとなりました。また、バスク自治議会によってメンバーの中から大統領（政府首脳）またはレヘンダカリが選出される議院内閣制が確立されました。議会の選出は普通選挙によって行われ、議会は3つの歴史的領土からそれぞれ25名ずつ、計75名の議員で構成されます。"
    TUR_coup_2016.t:0 "トルコのクーデター未遂？"
    TUR_coup_2016.d:0 "2016年7月15日の夜、「平和な家評議会」として組織されたトルコ軍内部の派閥が、政府やレジェップ・タイップ・エルドアン大統領を含む国家機関に対してクーデターを試みました。彼らはボスポラス海峡大橋のアジア側入口など、アンカラ、イスタンブール、マルマリスなどの複数の拠点を掌握しようとしましたが、国家に忠誠を誓う軍隊と市民によって撃退され、失敗に終わりました。政府は、クーデターのリーダーたちがギュレン運動と関連している証拠を掴んだと発表しました。ギュレン運動はトルコ共和国によってテロ組織に指定されており、ペンシルベニアで国外追放生活を送るトルコの実業家であり著名なイスラム学者であるフェトゥッラー・ギュレンによって指導されています。"
    BOL_coup_1966.t:0 "ボリビアの反乱？"
    BOL_coup_1966.d:0 "ニャンカワス・ゲリラ、あるいはボリビア国民解放軍（Ejército de Liberación Nacional de Bolivia; ELN）は、ゲリラリーダーのチェ・ゲバラに率いられた主にボリビア人とキューバ人のゲリラによる集団で、1966年から1967年にかけてボリビアのコルディエラ地方で活動しました。このグループは、サンタ・クルス・デ・ラ・シエラの街から南西に250キロ離れたリオ・グランデの季節的な支流であるニャンカワス川を挟んだ農場に拠点を築きました。ゲリラたちは、ボリビア政府を打倒して社会主義国家を建設するための第一歩として、武装抵抗の拠点となる「フォコ」として機能することを目指していました。ゲリラたちは数回のボリビアのパトロール隊を撃退しましたが、最終的には敗北し、ゲバラは捕らえられ処刑されました。"
    BOL_assassinate_CG.t:0 "チェ・ゲバラの処刑？"
    BOL_assassinate_CG.d:0 "エルネスト・\"チェ\"・ゲバラは、アルゼンチン出身のマルクス主義革命家、医師、作家、ゲリラリーダー、外交官、そして軍事理論家でした。ゲバラはアフリカと南米の両大陸に革命を扇動するために1965年にキューバを去りました。彼はまずコンゴ民主共和国で失敗し、その後ボリビアで活動しましたが、そこでCIAの支援を受けたボリビア軍によって捕らえられ、即決処刑されました。"
    USA_1992_LA_riots.t:0 "ロサンゼルス暴動？"
    USA_1992_LA_riots.d:0 "1992年のロサンゼルス暴動は、1992年の4月から5月にかけてアメリカ合衆国カリフォルニア州ロサンゼルス郡で発生した一連の暴動および市民騒乱です。騒乱は4月29日、ロドニー・キングの逮捕と暴行における過剰な武力の行使で起訴されたロサンゼルス市警（LAPD）の警官4名に無罪判決が下された後、サウス・セントラル・ロサンゼルスで始まりました。この事件は、現場に居合わせたジョージ・ホリデイによってビデオに記録されており、様々なニュースやメディアを通じて広く放送されました。"
    IDO_1998_riots.t:0 "ペルティワ？"
    IDO_1998_riots.d:0 "1998年5月のインドネシア暴動、あるいは単に98年事件（Peristiwa 98）は、インドネシアにおける集団暴力と社会不安の事件であり、その多くは国の華僑を標的としていました。これらの出来事は主にメダン、ジャカルタ、スラカルタの各都市で発生し、インドネシアの他の地域でも小規模な事件が発生しました。西側諸国の支持を受けたスハルト政権下では、インドネシアにおいて華僑に対する広範かつ組織的な差別が行われていました。暴動は、汚職や、食料不足および大量の失業率といった経済問題によって引き起こされました。"
    PAP_assassinate_PJP_1981.t:0 "教皇ヨハネ・パウロ2世に対する最初の暗殺未遂事件？"
    PAP_assassinate_PJP_1981.d:0 "1981年5月13日、バチカン市国のサン・ピエトロ広場において、教皇ヨハネ・パウロ2世は広場に入ろうとした際にメフメト・アリ・アグジャによって銃撃され、負傷しました。教皇は2発の弾丸を受け、重度の出血に見舞われました。アグジャは直ちに拘束され、後にイタリアの裁判所によって終身刑を言い渡されました。教皇は暗殺未遂についてアグジャを赦しました。彼は教皇の要請によりイタリアの大統領カルロ・アゼリオ・チャンピによって恩赦を受け、2000年6月にトルコへ強制送還されました。"
    PAP_assassinate_PJP_1982.t:0 "教皇ヨハネ・パウロ2世に対する二度目の暗殺未遂事件？"
    PAP_assassinate_PJP_1982.d:0 "二度目の暗殺未遂は、最初の暗殺計画の記念日のわずか前日である1982年5月12日、ポルトガルのファティマで発生しました。ある男が銃剣でヨハネ・パウロ2世を刺そうとしたのです。彼は治安維持要員によって阻止されました。スタニスワフ・ジヴィシュは後に、ヨハネ・パウロ2世はこの未遂事件の際に負傷したものの、生命に別状のない傷であることを隠し通したと述べています。"
    USA_Jonestown_Massacre.t:0 "ジョーンズタウンの虐殺"
    USA_Jonestown_Massacre.d:0 "ピープルズ・テンプル農業計画は、「ジョーンズタウン」という通称でよりよく知られており、ジム・ジョーンズの指導下にあるアメリカの宗教活動であるピープルズ・テンプルによってガイアナに設立された人里離れた入植地でした。1978年11月18日、この入植地、近くのポート・カイツマの滑走路、そしてガイアナの首都ジョージタウンにあるテンプルが運営する施設において、合計918人が死亡したことで、ジョーンズタウンは国際的に悪名を馳せることとなりました。ジョーンズタウンとジョージタウンでの死を表現する言葉は、時を経て変化してきました。事件後の当時のメディアによる記述の多くは、この死を集団自殺と呼びました。"
    GUY_Rupununi_Uprising.t:0 "ルプンニ・アップライジング"
    GUY_Rupununi_Uprising.d:0 "ルプンニ・アップライジングは、1969年1月2日に始まったガイアナでの分離主義的な反乱であり、2万2300平方マイル（5万8000km²）の土地を支配しようとした牧場主たちによって主導されました。イギリスからのガイアナ独立から2年足らずで発生したこの事件は、同国の国家としての地位と社会的連帯に対する、最初期かつ最も厳しい試練となりました。反乱軍は最終的にガイアナ防衛軍によって掃討され、グループのリーダーたちはベネズエラへと逃亡しました。"
    PRC_Lin_Biao_Incident.t:0 "林彪事件"
    PRC_Lin_Biao_Incident.d:0 "林彪事件は、1971年9月13日午前3時に発生した、中国共産党副主席の林彪が関与した航空機事故です。林彪と数人の家族を含むホーカー・シドレー・トライデントの搭乗者は全員、航空機がモンゴルの地形に衝突した際に死亡しました。林彪は、毛沢東暗殺計画の失敗後、ソ連へ亡命を試みていたと言われています。"
    PRC_Anti_Corruption_Drive_2012.t:0 "反腐敗運動"
    PRC_Anti_Corruption_Drive_2012.d:0 "2012年の中国共産党（CCP）第18回全国代表大会の終了後、中国で広範囲にわたる反腐敗運動が始まりました。中国共産党総書記である習近平の主導で行われたこの運動は、中国における共産党統治の歴史の中で、組織化された最大の反腐敗活動でした。"
    SAF_Sharpeville_Massacre_1960.t:0 "シャープビル虐殺事件？"
    SAF_Sharpeville_Massacre_1960.d:0 "1959年、失望したANCのメンバーによるグループがアザニア汎アフリカ主義会議（PAC）を結成し、1960年3月21日に通行証に反対するデモを組織しました。それらの抗議活動の一つがシャープビルの町で行われ、シャープビル虐殺事件において、警察によって69人が殺害されました。シャープビル事件を受けて、政府は非常事態を宣言しました。ANCとPACのリーダーを含む1万8000人以上が逮捕され、両組織は禁止されました。抵抗運動は地下に潜り、一部のリーダーは国外に追放され、他の者たちは国内での破壊工作やテロ活動に従事しました。"
    SAF_Mahlabatini_Declaration_1974.t:0 "マフラバティニ信仰宣言"
    SAF_Mahlabatini_Declaration_1974.d:0 "マフラバティニ信仰宣言は、1974年1月4日に南アフリカの政治指導者マンゴスツ・ブテレジとハリー・シュワルツによって定められた、核心的な原則を示す声明でした。これはクワズール・ナタール州のマフラバティニで署名されたため、その名がつきました。その目的は、多民族社会における合意に基づく南アフリカの統治と人種間の平和のための青写真を提供することであり、すべての人への機会、協議、連邦制のコンセプト、および権利章典を強調するものでした。また、政治的変化は非暴力的な手段を通じて行われなければならないことも、この時に初めて確認されました。"
    VNZ_Pact_of_Puntofijo_1958.t:0 "プントフィホ協定？"
    VNZ_Pact_of_Puntofijo_1958.d:0 "プントフィホ協定は、1958年のベネズエラの主要な3つの政党、アクション・デモクラティカ（AD）、COPEI（社会キリスト教党）、およびウニオン・レプブリカーナ・デモクラティカ（URD）の代表者の間で、1958年の大統領選挙の受容と新しい民主主義制度の維持のために結ばれた正式な取り決めでした。この協定は、署名した当事者が選挙結果を尊重し、一党独裁を防ぎ、権力を分担し、独裁を防ぐために協力することを保証する書面による約束でした。"
    VNZ_Caracazo_1989.t:0 "カラカソ？"
    VNZ_Caracazo_1989.d:0 "カラカソとは、1989年2月27日にベネズエラのグアレナスで始まり、カルロス・アンドレス・ペレス大統領による緊縮財政措置を受けてカラカスや周辺の町へと広がった抗議活動や暴動、略奪の波を指す名称です。様々な報告によれば、1週間にわたる衝突で数百から数千人とも言われる多数の死者が出ており、その多くは治安維持部隊や軍の関与によるものとされています。これらの暴動と抗議活動は、主に政府の経済改革とそれに伴うガソリンおよび輸送価格の上昇に端を発したものです。"
    SPA_assassinate_LCB.t:0 "ルイス・カレーロ・ブランコの暗殺？"
    SPA_assassinate_LCB.d:0 "1973年12月20日、スペインの首相であったルイス・カレーロ・ブランコは、バスク分離主義団体ETAがトンネル内に設置した爆薬が爆発したことにより暗殺されました。「オペラシオン・オグロ（オーガー作戦）」というコードネームでも知られるこの暗殺は、1939年のスペイン内戦終結以来、フランコ主義国家に対する最大級の攻撃とみなされており、スペインの政治に多大な影響を及ぼしました。"
    SOV_doctors_plot_1951.t:0 "医師たちの陰謀？"
    SOV_doctors_plot_1951.d:0 "「医師たちの陰謀」とは、ソ連が主導した反知識人かつ反ユダヤ主義的な（「反コスモポリタン」という口実の下での）キャンペーンでした。これは、ユダヤ系を含む有力な医療専門家による反ソ連の結社が、政府や共産党の指導者を殺害しようとしているという陰謀論に基づいたものでした。1951年から1953年にかけて、モスクワのユダヤ系が多数を占める医師グループが、ソ連のリーダーを暗殺しようと共謀したとして告発されました。彼らは国際的なユダヤ勢力や、西側（主にアメリカやイギリス）の諜報機関の利益に奉仕していると非難されました。これを受けて多くの医師が仕事を解雇され、逮捕され、自白を強要するために拷問を受けました。"
    THI_massacre_1976.t:0 "タマサート大学虐殺事件？"
    THI_massacre_1976.d:0 "1976年10月6日の虐殺は、1976年10月6日にバンコクのタマサート大学と隣接するサナムルアンを占拠した左翼の抗議者に対し、タイ警察による暴力的な弾圧と、右翼準軍事組織や傍観者によるリンチが行われた事件です。10月6日の午前5時30分から11時00分の間、警察は包囲された抗議者に対し、アサルトライフル、グレネードランチャー、対装甲弾、グレネードなどの軍用兵器を使用して弾圧を行いました。抗議者たちは短時間ながら自衛を試みましたが、すぐに敗北しました。"
    THI_massacre_1992.t:0 "ブラック・メイ？"
    THI_massacre_1992.d:0 "ブラック・メイとは、1992年5月にタイで発生した激しい政治危機を指します。バンコクでは、以前のクーデターを主導したスチンダー・クラプラユーン将軍が、選挙で選出されていないにもかかわらず首相に任命されたことに抗議して、大規模なデモが発生しました。チャムロン・スリームアンが率いるデモ隊は民主的な改革を要求しましたが、軍による残虐な弾圧を受け、数十人の死者と数百人の負傷者、そして広範囲にわたるメディア検閲を招きました。この危機は、国王プミポン・アドゥンヤデートによるテレビ中継を通じた王室の介入によって収束へと向かい、国王は反対派同士の平和を呼びかけました。スチンダーはその後まもなく辞任し、新たな選挙と、より民主的な統治への転換への道が開かれました。"
    ETH_massacre_1976.t:0 "ケィ・シビル？"
    ETH_massacre_1976.d:0 "ケィ・シビルとしても知られるエチオピアの赤テロは、1976年から1978年にかけて、エチオピアおよび現在のエリトリアにおける他の競合するマルクス・レニン主義グループに対し、デルグが行った暴力的な政治弾圧キャンペーンです。ケィ・シビルは、1974年にハイレ・セラシエ皇帝が打倒された後の政治的不安定期と、その後のエチオピア内戦において、デルグの支配を固めるための試みでした。ケィ・シビルはロシア内戦の赤テロに基づいており、特に1977年2月3日にメンギスツ・ハイレ・マリアムがデルグの議長に就任した後に激化しました。ケィ・シビルの期間中に1万人から98万人が殺害されたと推定されています。"
    ROC_massacre_1948.t:0 "ホワイト・テラー？"
    ROC_massacre_1948.d:0 "白色テロとは、国民党（KMT）が統治する政府の下で行われた、台湾の民間人や政治的反対派に対する政治的弾圧のことです。白色テロの期間は、一般的に1948年の「対共産主義反乱臨時条項」によって可能となった1949年5月19日の台湾における戒厳令の発令から始まり、1992年9月21日に「反国家」活動の訴追を可能にしていた刑法第100条が廃止されたことで終了したと考えられています。"
    IDO_massacre_1965.t:0 "インドネシアにおける反共主義大量殺戮？"
    IDO_massacre_1965.d:0 "1965年から1966年にかけて、インドネシアではインドネシア共産党（PKI）のメンバーやその支持者とされる人々を主な標的とした大規模な殺戮と市民の混乱が起こりました。その他の被害を受けたグループには、共産主義者の支持者とされる人々、ゲルワニの女性たち、労働組合員、ジャワ人のアバンガン、華僑、無神論者、いわゆる「不信仰者」、そして一般に左翼とされる人々が含まれていました。広く発表されている推計によれば、少なくとも50万人から100万人が殺害されましたが、200万人から300万人に達するという推計もあります。ジェノサイドやポリティサイドとも称されるこれらの残虐行為は、スハルト率いるインドネシア軍によって引き起こされました。"
    GBR_princess_of_wales_1981.t:0 "ダイアナとチャールズ皇太子の結婚？"
    GBR_princess_of_wales_1981.d:0 "ウェールズ公ダイアナ（ダイアナ・フランシス・スペンサー生まれ）は、イギリス王室のメンバーでした。彼女はチャールズ3世（当時はウェールズ皇太子）の最初の妻であり、ウィリアム王子とハリー王子の母です。彼女を国際的なアイコンとした活動と華やかさは、永続的な人気をもたらしました。二人の結婚式は1981年7月にセント・ポール大聖堂で行われ、彼女はウェールズ公妃となりました。その役割において、彼女は民衆から熱狂的に迎えられました。夫妻にはウィリアムとハリーという二人の息子がおり、当時はそれぞれイギリス王位継承順位の第2位と第3位にありました。"
    USA_Tea_Party_Movement_2009.t:0 "ティーパーティー運動？"
    USA_Tea_Party_Movement_2009.d:0 "ティーパーティー運動は、2007年に始まった共和党内のアメリカの財政保守主義的な政治運動であり、ロン・ポール代議士の大統領選挙キャンペーンによって主流へと押し上げられました。この活動は、民主党のバラク・オバマ大統領の政策に対抗して拡大し、共和党が63の代議院議席を獲得して米代議院の掌握に至った2010年の圧勝選挙における主要な要因となりました。"
    USA_MAGA_Movement_2016.t:0 "MAGA運動？"
    USA_MAGA_Movement_2016.d:0 "「アメリカを再び偉大に（MAGA）」および「アメリカ・ファースト」の政治運動は、右派ポピュリズム、右派反グローバリズム、国家保守主義、ネオ・ナショナリズムといったイデオロギーで構成されており、非自由主義的、権威主義的、時には独裁的な信念を強く特徴としています。2010年代後半から2020年代初頭にかけて、MAGAの支持者はアメリカ共和党における最大の派閥となりました。"
    USA_assassinate_CJK.t:0 "チャーリー・カーク暗殺？"
    USA_assassinate_CJK.d:0 "チャールズ・ジェームズ・カークは、アメリカの保守派政治活動家であり、著者、メディアパーソナリティでもありました。彼は2012年に学生組織であるTurning Point USA（TPUSA）を共同設立し、その経営責任者を務めました。また、Turning Point Actionの最高経営責任者であり、Council for National Policyのメンバーでもありました。晩年の彼は、共和党におけるポピュリスト的なMAGA運動の最も有力な発言者の一人でした。2025年9月10日、カークはユタ・バレー大学のキャンパスで開催されたTPUSAの公開討論会イベントでの講演中に射殺されました。彼の死は国際的な注目を集め、国内外の有力者たちによる政治的暴力への非難を招きました。"
    USA_Nation_of_Islam_1952.t:0 "マルコムXの仮釈放？"
    USA_Nation_of_Islam_1952.d:0 "マルコムX（誕生名はマルコム・リトル、後にエル・ハッジ・マリク・エル・シャバズ）は、1965年の暗殺に至るまで公民権活動における有力な人物であったアフリカ系アメリカ人の革命家、ムスリムの指導者、そして人権活動家です。1964年までネイション・オブ・イスラム（NOI）の代弁者として活動し、その後同活動を離れた後は、黒人のエンパワーメントとアフリカ系アメリカ人のコミュニティにおけるイスラム教の普及を声高に主張しました。暴力を扇動しているとの非難を受ける議論を呼ぶ人物である一方、人種的正義の追求によってアフリカ系アメリカ人やムスリムのコミュニティからは称賛される人物でもあります。"
    USA_assassinate_MLX.t:0 "マルコムX暗殺事件？"
    USA_assassinate_MLX.d:0 "公民権活動において人気のある人物であったアフリカ系アメリカ人のムスリムの指導者であり人権活動家でもあるマルコムXは、1965年2月21日、ワシントン・ハイツ地区のオーデュボン・ボールルームで行われるアフリカ系アメリカ人統一組織（Organisation of Afro-American Unity）での演説準備中に、ニューヨーク市マンハッタンで複数回撃たれ、その傷により39歳で亡くなりました。ネイション・オブ・イスラムのメンバーであるムハンマド・アブドゥル・アジズ、カリル・イスラム、トーマス・ヘイガンの3名が殺人の罪で起訴・裁判・有罪判決を受け、無期懲役を言い渡されましたが、2021年11月にアジズとイスラムは無罪となりました。"
    JAP_protest_1960.t:0 "安保闘争"
    JAP_protest_1960.d:0 "安保闘争は、1959年から1960年にかけて、そして再び1970年に、米国が日本国内に軍事基地を維持することを許可する日米安全保障条約に対して、日本各地で行われた一連の大量抗議行動でした。1960年の安保闘争は、最終的に改定された日米安全保障条約の発効を阻止することには失敗しましたが、岸内閣の総辞職とアイゼンハワーの大統領訪問の中止を強いる結果となりました。岸の後を継いで首相となった池田勇人は、政治的な対立勢力に対してより融和的なスタンスを取り、岸が進めていた憲法改正計画を無期限に棚上げしました。また、国のエネルギーを論争的な政治闘争から、全国的な急速な経済成長への取り組みへと転換させるため、所得倍増計画を発表しました。"
    NEJ_Jamal_Khashoggi_2003.t:0 "ジャマール・カショギ事件？"
    NEJ_Jamal_Khashoggi_2003.d:0 "2003年、ジャマール・カショギはサウジアラビアの有力なジャーナリストであり編集者でした。彼は王室との密接な関係で知られていましたが、同時にその独立した意見でも尊敬されていました。彼は一時的にアル・ワタンの編集長を務めましたが、宗教的な保守主義への批判を掲載したことで、その改革的なスタンスが原因で解任されました。"
    NEJ_Jamal_Khashoggi_2018.t:0 "ジャマール・カショギ暗殺事件？"
    NEJ_Jamal_Khashoggi_2018.d:0 "2018年10月2日、サウジアラビアのジャーナリストであるジャマール・カショギが、イスタンブールのサウジアラビア領事館内で殺害されました。皇太子の有力な批判者を沈黙させるための命令を受けたとされる15人のチームによって、彼は待ち伏せされ殺害されました。彼の遺体はバラバラにされ、回収されることはなく、世界的な怒りと外交的な混乱を引き起こしました。"
    JAP_protest_1952.t:0 "血のメーデー事件"
    JAP_protest_1952.d:0 "血のメーデー事件は、1952年5月1日に日本の東京にある皇居前の皇居外苑において、デモ隊と警察部隊との間で発生した激しい衝突を指します。日米安全保障条約に抗議する大群衆が解散を拒否したため、デモ隊と警察部隊との間で血みどろの乱闘が起こりました。最終的に警察部隊が群衆に向けて発砲し、2人が死亡、22人が銃創を負いました。戦闘全体では、約2,300人（抗議者1,500人と警察官800人）が負傷しました。"
    JAP_protest_1955.t:0 "砂川闘争"
    JAP_protest_1955.d:0 "砂川闘争は、米空軍の立川基地が近隣の砂川町へ拡張されることに反対して、1955年に始まり1957年まで続いた日本における抗議活動です。基地反対運動が高まる絶頂期に起きた「流血の砂川」は、日本における米軍基地に対する多くの抗議活動の中でも、最も激しく暴力的なものとして記憶されています。"
    PRC_ethnic_unity_law_2026.t:0 "民族団結・進歩促進法？"
    PRC_ethnic_unity_law_2026.d:0 "民族団結・進歩促進法は、中国における少数民族に関する法律です。この法律は全国人民代表大会の民族事務委員会によって導入され、2025年9月8日に全国人民代表大会に提出されました。2026年3月12日に全国人民代表大会で採択され、同日に習近平大統領によって署名されました。2026年7月1日に施行されました。この法律は民族問題に関する習近平の政策を明文化し、中国共産党の指導の下でさらなる民族統合を促進するものです。この法律は中国国外の学者や人権活動家から批判を受けており、その域外での執行の促進は、国境を越えた抑圧に例えられています。"
    
    GER_post_war_deportations.t:0 "戦後のドイツ人追放？"
    GER_post_war_deportations.d:0 "第二次世界大戦は、1945年5月のドイツの敗北により、ヨーロッパにおいて終結しました。同盟国はポツダム協定において、占領条件、ドイツの領土縮小、そして戦後のポーランド、チェコスロバキア、ハンガリーからのドイツ系住民の同盟国占領区域への追放を決定しました。ポツダム協定の後、ソ連が支配する東欧諸国全体で、ドイツ系住民の追放が相次いで発生しました。対象となった地域のドイツまたはドイツ人が所有していた財産や物資は没収されました。それらはソ連へ移譲されるか、国営化されるか、あるいは市民の間で再分配されました。"
    GER_post_war_deportations.option.1:0 "「ドイツ人を追放せよ！」"
    GER_post_war_deportations.option.2:0 "「彼らを我が国に留まらせておこう。」"
    
    ISR_post_war_migration.t:0 "「キブツ・ガルーヨットか？」"
    ISR_post_war_migration.d:0 "1948年から1951年にかけて、主にホロコースト後のヨーロッパやアラブ・イスラム世界からの大規模なユダヤ人入国移民の波が起こりました。建国時のイスラエルのユダヤ人人口は65万人の状態でしたが、わずか3年半の間に約68万8千人の移民が流入したことで、その数は2倍以上に増加しました。1949年には、単年としては史上最多となる24万9954人のユダヤ人移民がイスラエルに到着しました。この移民の時期は、多くのユダヤ人ディアスポラ共同体がアリヤー（帰還）を行ったことから、しばしばキブツ・ガルーヨット（文字通り「国外追放者の集結」）と呼ばれます。"
    historical_pop_transfer.option.1:0 "「彼らを移民させよう。」"
    historical_pop_transfer.option.2:0 "「彼らの出国を阻止せよ！」"
    
    POL_post_war_deportations.t:0 "「ポーランド人の第一次復国か？」"
    POL_post_war_deportations.d:0 "1944年から1946年にかけて行われた、戦前のポーランド東半分からのポーランド人人口移動は、第二次世界大戦の終盤および終戦直後に行われたポーランド人の強制移住でした。これらは、第二次世界大戦の主要な同盟国によって批准されたソ連の政策によるものでした。公式データによると、1945年から1946年にかけての国家管理下での追放期間中、約116万7千人のポーランド人がソ連の最西端の共和国を離れましたが、これは人口移動を登録した者の50％に満たない数字でした。もう一つの大規模なポーランド人民族移動は、スターリンの死後、1955年から1959年にかけて発生しました。"
    POL_post_war_deportations.option.1:0 "「ポーランド人を追放せよ！」"
    POL_post_war_deportations.option.2:0 "「彼らを我が国に留まらせておこう。」"
    
    POL_post_war_deportations_2.t:0 "「ポーランド人の第二次復国か？」"
    POL_post_war_deportations_2.d:0 "ソ連によって併合された領土（クレシ・ヴォドニエとして知られる）に居住していたポーランド人の、二度目の強制的な本国帰還（または強制送還）は、1955年から1959年にかけて行われました。数十年にわたるポーランド共産主義のプロパガンダによって推進された、広く使われている「本国帰還」という用語は、国外追放行為の婉曲表現です。これは、1944年から1946年の本国帰還と区別するために、時として「第二次本国帰還」として知られています。"
    
