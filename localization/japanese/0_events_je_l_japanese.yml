    join_WTO_decision:0 "世界貿易機関に参加"
    join_WTO_decision_desc:0 "世界貿易機関（WTO）は、国際貿易を規制・促進する政府間組織です。WTOは、貿易協定の交渉のための枠組みを提供することで、参加国間における商品、サービス、および知的財産の貿易を促進します。これらの協定は通常、関税、割当、その他の制限の削減または撤廃を目的としています。"
