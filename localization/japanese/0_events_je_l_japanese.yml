    controlled_election_disabled: "選挙禁止"
    
    je_non_competitive_elections: "[SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')]"
    je_non_competitive_elections_reason: "[ROOT.GetCountry.GetName]は[GetLawType('law_single_party_state').GetName]であるため、[Concept('concept_non_competitive_election','$concept_non_competitive_elections$')]の枠組みの下で#y [SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')]#!のための[Concept('concept_election','$concept_elections$')]が行われます。\n\nすべての候補者は、[ROOT.GetCountry.GetName]の唯一の与党、またはその管理下にある公的組織によって指名される必要があります。\n\n有権者は与党の候補者に反対する投票を行うことができますが、そのような投票は指定された投票所を通じてのみ登録可能です。対照的に、与党への支持は白票を提出するだけで表明できます。\n\n@information![Concept('concept_non_competitive_election','$concept_non_competitive_elections$')]は#y 5年#!ごとに開催されますが、[concept_war]の間は停止されます。\n\n@information!#y $lawgroup_distribution_of_power$#![Concept('concept_law','$concept_laws$')]によって[concept_government]の[concept_votes]を変更できます。"
    
    je_controlled_elections_disabled_button: "選挙を停止"
    je_controlled_elections_disabled_button_desc: "[concept_government]は追って通知があるまで、[SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')]のための選挙を一切実施しません。\n\n注：これにより、通常5年ごとに行われる[SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')]の選挙が停止されます。"
    je_controlled_elections_enabled_button: "選挙を再開"
    je_controlled_elections_enabled_button_desc: "[concept_government]は追って通知があるまで、[SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')]のための選挙の実施を再開します。\n\n注：[SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')]の選挙は5年ごとに行われます。"
    
