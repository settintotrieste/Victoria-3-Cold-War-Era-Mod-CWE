    colonial_empire_join_war.d:0 "[SCOPE.sCountry('colonial_empire_victim').GetName]は、第三者からの攻撃から自国を守るため、すべての植民地に防衛を要請しました。"
    colonial_empire_join_war.f:0 "このイベントは、[SCOPE.sCountry('colonial_empire_victim').GetName]が外国から攻撃を受け、その戦争を支援するために植民地に協力を求めたため発生しました。"
    colonial_empire_join_war.1:0 "「[SCOPE.sCountry('colonial_empire_victim').GetAdjectiveNoFlag]の人々を守るのだ！」"
    
    join_colonial_empire_war.tt:0 "[SCOPE.sCountry('colonial_empire_victim').GetName]の防衛戦争に参加する"
    
    colonial_empire_bankroll.t:0 "[SCOPE.sCountry('colonial_empire_debtor').GetName]が金融支援を必要としています"
    colonial_empire_bankroll.d:0 "[SCOPE.sCountry('colonial_empire_debtor').GetName]の[concept_government]は深刻な金融難に直面しており、[concept_overlord]からの多大な金融支援を必要としています。[concept_overlord]として、我々は彼らの負債が完済され、収入がプラスになるまで、[concept_bankroll_subject] [SCOPE.sCountry('colonial_empire_debtor').GetAdjective]の国家財政を管理する法的義務があります。"
    colonial_empire_bankroll.f:0 "このイベントは、[SCOPE.sCountry('colonial_empire_debtor').GetName]が[Concept('concept_economy_health','$concept_economy_health_healthy$')]を持っていないため発生しました。"
    
    colonial_empire_bankroll.1:0 "そうすることは、我々の不本意な義務なのです。"
    
    notification_requested_overlord_takes_subject_debt_notification_name:0 "[SCOPE.sCountry('colonial_empire_creditor').GetAdjective]による[SCOPE.sCountry('colonial_empire_debtor').GetName]の救済"
    notification_requested_overlord_takes_subject_debt_notification_desc:0 "[SCOPE.sCountry('colonial_empire_creditor').GetAdjective]帝国の全体的な支払い能力を維持するため、[SCOPE.sCountry('colonial_empire_creditor').GetName]は[SCOPE.sCountry('colonial_empire_debtor').GetName]の[Concept('concept_credit','$concept_credit_debt$')]を引き受けました。"
    
    je_start_imperial_preference_button:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('imperial_conference_custom_adjective')]優遇措置を制定"
    je_start_imperial_preference_button_desc:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('imperial_conference_custom_adjective')]優遇措置は、[ROOT.GetCountry.GetAdjective]帝国全土で制定された相互関税削減制度です。その目標は、帝国内の貿易を強化することです。\n\nゲーム的な表現では、[SCOPE.GetRootScope.GetCountry.GetCustom('imperial_conference_custom_adjective')]優遇措置は、[ROOT.GetCountry.GetName]がその[concept_dominion]と[concept_customs_union]を共有していることで表されます。"
    
    je_end_imperial_preference_button:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('imperial_conference_custom_adjective')]優遇措置を廃止"
    je_end_imperial_preference_button_desc:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('imperial_conference_custom_adjective')]優遇措置は、[ROOT.GetCountry.GetAdjective]帝国全土で制定された相互関税削減制度です。\n\nゲーム的な表現では、[SCOPE.GetRootScope.GetCountry.GetCustom('imperial_conference_custom_adjective')]優遇措置は、[ROOT.GetCountry.GetName]がその[concept_dominion]と[concept_customs_union]を共有していることで表されます。\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('imperial_conference_custom_adjective')]優遇措置を廃止すると、[concept_customs_union]の[ROOT.GetCountry.GetName]と[concept_dominion]との共有が解除されます。"
    
    imperial_preference_timer.tt:0 "過去5年間に[SCOPE.GetRootScope.GetCountry.GetCustom('imperial_conference_custom_adjective')]優遇措置を制定または廃止していない"
    imperial_preference_active.tt:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('imperial_conference_custom_adjective')]優遇措置を制定していない"
