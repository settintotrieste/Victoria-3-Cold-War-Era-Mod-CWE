    espionage_system.option.1:0 "承認"
    espionage_system.option.2:0 "拒否"
    espionage_system_response.option.1:0 "[SCOPE.sCountry('suspected_espionage_attacker').GetName]を非難せよ！"
    espionage_system_response.option.2:0 "何も言わない"
    
    espionage_instigate_domestic_unrest.t:0 "[SCOPE.sCountry('espionage_target').GetName]で不安を煽る機会"
    espionage_instigate_domestic_unrest.d:0 "[SCOPE.sCountry('espionage_attacker').GetAdjective]のエージェントが[SCOPE.sCountry('espionage_target').GetName]で活動しており、不安と社会不安を煽る機会を見つけました。彼らは、暴動や抗議活動を誘発するために、主要なメディアに扇動的な政治的メッセージを掲載することを提案しています。この秘密工作により、12ヶ月間にわたって[SCOPE.sCountry('espionage_target').GetName]の急進派の数が増加するはずです。"
    espionage_instigate_domestic_unrest.f:0 "我々のアクションが[SCOPE.sCountry('espionage_target').GetAdjective]の諜報に察知される可能性があり、そうなれば[SCOPE.sCountry('espionage_target').GetName]との関係に深刻なダメージを与えることになる点に注意してください。"
    
    espionage_instigate_domestic_unrest_target.t:0 "[SCOPE.sCountry('suspected_espionage_attacker').GetAdjective]のスパイによって引き起こされた国内不安"
    espionage_instigate_domestic_unrest_target.d:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('secret_police_custom_title')]の報告によると、[SCOPE.sCountry('suspected_espionage_attacker').GetAdjective]のスパイが国有メディア界における影響力を利用して、人種的・宗教的な敵意を煽る一連の扇動的な記事を掲載し、[SCOPE.sCountry('espionage_victim').GetName]で不安を引き起こしたとのことです。"
    espionage_instigate_domestic_unrest_target.f:0 "[SCOPE.sCountry('suspected_espionage_attacker').GetName]が秘密工作を行ったのはあくまで推測に過ぎないため、彼らを裏切り者として非難することは不適切かもしれません。"
    
    notification_espionage_instigate_domestic_unrest_name: "$espionage_instigate_domestic_unrest_target.t$"
    notification_espionage_instigate_domestic_unrest_desc: "$espionage_instigate_domestic_unrest_target.d$"
    
    espionage_conduct_economic_sabotage.t:0 "[SCOPE.sCountry('espionage_target').GetName]における経済破壊工作の実施の機会"
    espionage_conduct_economic_sabotage.d:0 "[SCOPE.sCountry('espionage_target').GetName]で活動中の[SCOPE.sCountry('espionage_attacker').GetAdjective]の工作員が、[SCOPE.sCountry('espionage_target').GetAdjective]の工場、鉱山、および鉄道の経済活動を妨害する機会を見つけました。彼らは産業不安を煽り、[SCOPE.sCountry('espionage_target').GetAdjective]のサプライチェーンにおける特定の主要な施設を爆破することを提案しています。この秘密工作により、12ヶ月間にわたり、[SCOPE.sCountry('espionage_target').GetName]における製造、鉱業、またはインフラ施設の処理量が減少するはずです。"
    espionage_conduct_economic_sabotage.f:0 "我々のアクションが[SCOPE.sCountry('espionage_target').GetAdjective]の諜報に露見する可能性があり、そうなれば[SCOPE.sCountry('espionage_target').GetName]との関係に深刻なダメージを与えることになる点に注意してください。"
    
    espionage_conduct_economic_sabotage_target.t:0 "[SCOPE.sCountry('suspected_espionage_attacker').GetAdjective]のスパイによる経済破壊工作"
    espionage_conduct_economic_sabotage_target.d:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('secret_police_custom_title')]の報告によると、[SCOPE.sCountry('suspected_espionage_attacker').GetAdjective]のスパイが産業不安を煽り、[SCOPE.sCountry('espionage_victim').GetAdjective]のサプライチェーンにおける特定の主要な施設を爆破したため、12ヶ月間にわたりすべての$bg_manufacturing$、$bg_mining$、および$bg_infrastructure$施設の処理量が減少しました。"
    espionage_conduct_economic_sabotage_target.f:0 "[SCOPE.sCountry('suspected_espionage_attacker').GetName]が秘密工作を行ったのはあくまで推測に過ぎないため、彼らを裏切り者として非難することは不適切かもしれません。"
    
    notification_espionage_conduct_economic_sabotage_name: "$espionage_conduct_economic_sabotage_target.t$"
    notification_espionage_conduct_economic_sabotage_desc: "$espionage_conduct_economic_sabotage_target.d$"
    
    espionage_instigate_secessionist_movement.t:0 "[SCOPE.sCountry('espionage_target').GetName]における分離主義運動の扇動の機会"
    espionage_instigate_secessionist_movement.d:0 "[SCOPE.sCountry('espionage_target').GetName]で活動する[SCOPE.sCountry('espionage_attacker').GetAdjective]の工作員が、[SCOPE.sCountry('espionage_target').GetAdjective]政府に対するナショナリズムの感情を煽る機会を得ました。彼らは[SCOPE.sCountry('espionage_target').GetAdjective]の未編入州に住む人口に対して、反帝国主義のプロパガンダを広めることを提案しています。この秘密工作により、12か月間で[SCOPE.sCountry('espionage_target').GetName]に属する未編入州における急進派の数が増加するはずです。"
    espionage_instigate_secessionist_movement.f:0 "我々の行動が[SCOPE.sCountry('espionage_target').GetAdjective]の諜報によって露見する可能性があり、その場合は[SCOPE.sCountry('espionage_target').GetName]との関係が著しく悪化することにご注意ください。"
    
    espionage_instigate_secessionist_movement_target.t:0 "[SCOPE.sCountry('suspected_espionage_attacker').GetAdjective]のスパイによる分離主義プロパガンダ"
    espionage_instigate_secessionist_movement_target.d:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('secret_police_custom_title')]の報告によれば、[SCOPE.sCountry('suspected_espionage_attacker').GetAdjective]のスパイが[SCOPE.sCountry('espionage_victim').GetAdjective]の[Concept('concept_unincorporated_state','$concept_unincorporated_states$')]においてナショナリズムの感情を煽ったとのことです。"
    espionage_instigate_secessionist_movement_target.f:0 "[SCOPE.sCountry('suspected_espionage_attacker').GetName]が秘密工作を行ったというのはあくまで推測に過ぎないため、彼らを反逆罪で告発することは不適切である可能性がある点にご注意ください。"
    
    notification_espionage_instigate_secessionist_movement_name: "$espionage_instigate_secessionist_movement_target.t$"
