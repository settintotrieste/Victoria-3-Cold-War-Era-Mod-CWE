    warsaw_pact_application_rejection.d:0 "ワルシャワ条約機構のリーダーである[SCOPE.sCountry('warsaw_pact_leader').GetName]は、我々の同盟への加盟という控えめな願いを拒絶しました。彼らは加盟を拒む理由として、地政学的な問題を挙げています。"
