    steal_nuclear_weapons.t:0 "[SCOPE.sCountry('former_nuclear_weapons_country').GetAdjectiveNoFlag]の大量破壊兵器の軍縮"
    steal_nuclear_weapons.d:0 "[ROOT.GetCountry.GetName]からの査察官が[SCOPE.sCountry('former_nuclear_weapons_country').GetName]に到着しました。彼らは、すべての[SCOPE.sCountry('former_nuclear_weapons_country').GetAdjective]大量破壊兵器の押収を開始します。国内のすべての核、生物、および化学兵器を撤去していく予定です。"
    steal_nuclear_weapons.f:0 "[ROOT.GetCountry.GetName]は、兵器を自分たちのものにするか、あるいは代わりに破壊するかを選択できます。"
    steal_nuclear_weapons.option.1:0 "大量破壊兵器を破壊する！"
    steal_nuclear_weapons.option.2:0 "「見つけたものは我々のものだ！」"
    
