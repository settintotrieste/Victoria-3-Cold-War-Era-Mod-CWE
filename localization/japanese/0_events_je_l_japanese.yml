    power_vacuum.t:0 "[ROOT.GetCountry.GetNameNoFlag]における権力の空白"
    power_vacuum.d:0 "[ROOT.GetCountry.GetNameNoFlag]の前の[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]は、誰にも文句を言わせぬ専制君主として国を支配した、強力な独裁者でした。しかし、その独裁者の死によって異議申し立てに対する鉄の蓋が取り払われ、権力の空白が生じたことで、国は大きく不安定化しています。現在、さまざまな派閥がこの状況を利用して、さらなる権力を争ったり、あるいは政府を完全に転覆させようとしたりしています。[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]の[ROOT.GetCountry.GetRuler.GetFullName]が争う部族たちを鎮め、政治的な泥沼を終わらせるまでには、しばらく時間がかかるでしょう。"
    power_vacuum.f:0 "このイベントは、独裁的な支配者が老衰で死亡したか、あるいは交代したことによって発生しました。"
    power_vacuum.option:0 "新しい[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]は持ちこたえられるでしょうか？"
    
