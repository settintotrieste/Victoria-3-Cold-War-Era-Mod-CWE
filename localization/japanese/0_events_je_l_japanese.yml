    palace_coup_reject_option:0 "軍が反乱軍を粉砕する！"
    
    paramilitary_group_veto.t:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('paramilitary_group_custom_title')]が[SCOPE.sLaw('current_law_scope').GetName]に反対しています！"
    paramilitary_group_veto.d:0 "[SCOPE.gsInterestGroup('paramilitary_group_ig').GetName] [concept_interest_group]側に立つ政治的に強力な[SCOPE.GetRootScope.GetCountry.GetCustom('paramilitary_group_custom_title')]は、[SCOPE.sLaw('current_law_scope').GetName]を制定しようとしている[concept_government]を強く批判しました。彼らは、この[concept_law]が[ROOT.GetCountry.GetName]にとって最善の利益にならないと考えており、[SCOPE.sLaw('current_law_scope').GetName]を制定するための法案を撤回するか、さもなくば政府に対して一方的な行動をとるよう要求しています。"
    paramilitary_group_veto.f:0 "このイベントは、[SCOPE.GetRootScope.GetCountry.GetCustom('paramilitary_group_custom_title')]の司令官である[SCOPE.sCharacter('head_of_paramilitary').GetFullName] ([SCOPE.gsInterestGroup('paramilitary_group_ig').GetName])が、現在制定中の[concept_law]に対して#r 反対#!、または#r 強く反対#!したために発生しました。また、[SCOPE.GetRootScope.GetCountry.GetCustom('paramilitary_group_custom_title')]を無効にする法律が制定されている場合にも発生することがあります。"
    
