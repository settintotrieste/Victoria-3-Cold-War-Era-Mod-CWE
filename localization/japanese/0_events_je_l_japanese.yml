    portuguese_macau.sgc.d:0 "1974年にポルトガルで革命が起きた後、脱植民地化政策によってマカオの中華人民共和国（PRC）への返還への道が開かれました。1976年2月17日、ポルトガル議会はマカオを「ポルトガル管理下の領土」と規定するマカオ組織法を可決しました。この用語はポルトガルの1976年憲法にも盛り込まれ、マカオの指定は海外地方から変更されました。これまでの憲法とは異なり、マカオはポルトガル領土の不可分の一部とは見なされませんでした。"
    
