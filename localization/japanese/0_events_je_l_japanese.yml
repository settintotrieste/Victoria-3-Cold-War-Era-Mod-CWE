    remilitarise_war.t:0 "[ROOT.GetCountry.GetAdjectiveNoFlag]の再軍備化？"
    remilitarise_war.d:0 "現在は[concept_war]の状態にあります。国を救うために師団の動員を開始できるよう、$law_peasant_levies$の[concept_law]を廃止すべきではないでしょうか？"
    remilitarise_war.f:0 "このイベントは、[ROOT.GetCountry.GetName]が[concept_war]にあり、$law_peasant_levies$の[concept_law]を持っているために発生しました。"
    remilitarise_war.option.1:0 "動員を開始する！"
    remilitarise_war.option.2:0 "やめておく。"
    
    wartime_suspended_elections.t:0 "予定されていた選挙の停止"
    wartime_suspended_elections.d:0 "現在進行中の紛争を考慮し、政府はすべての予定されていた選挙を追って通知があるまで停止することを発表しました。国家の治安維持と団結のために不可欠と判断されたこの措置は、敵対行為が沈静化するまで継続されます。当局は、民主的なプロセスが放棄されたわけではなく、国家の安定性と存続を守るために一時的に延期されたものであることを強調しています。"
    wartime_suspended_elections.f:0 "このイベントは、[ROOT.GetCountry.GetName]が[concept_war]にあり、[concept_revolution]の状態にあるか、あるいはその領土のいずれかが被占領されているために発生しました。"
    wartime_unsuspended_elections.t:0 "予定されていた選挙の再開"
    wartime_unsuspended_elections.d:0 "敵対行為の終結に伴い、政府は選挙の停止措置を解除しました。民主的なプロセスは予定通り再開され、代議制統治に対する国家のコミットメントが改めて示されます。"
    wartime_unsuspended_elections.f:0 "このイベントは、[ROOT.GetCountry.GetName]がもはや[concept_war]にいないために発生しました。"
    wartime_suspended_elections.option:0 "了解した。"
    
