    cfa_franc_zone:0 "CFAフラン圏"
    cfa_franc_zone_desc:0 "[ROOT.GetCountry.GetName]に率いられるCFAフランは、2つの通貨の名称です。一つは西アフリカ8カ国で使用されている西アフリカCFAフラン、もう一つは中央アフリカ6カ国で使用されている中央アフリカCFAフランです。これらは別個のものですが、2つのCFAフラン通貨は常に等価であり、実質的に相互交換が可能です。\n\nこの広大な[concept_currency_union]を維持することを目指すべきです。これを失うことは、我が国の威信にとって打撃となるでしょう。"
    franc_zone:0 "フラン圏"
    franc_zone_desc:0 "[ROOT.GetCountry.GetName]に率いられるフラン圏は、世界中の他のどこにも類を見ない経済、通貨、および文化圏です。これは非常に多様な州や領土で構成されており、旧フランス植民地帝国の発展と変遷の結果として誕生しました。\n\nこの広大な[concept_currency_union]を維持することを目指すべきです。これを失うことは、我が国の威信にとって打撃となるでしょう。"
    sterling_zone:0 "スターリング圏"
    sterling_zone_desc:0 "[ROOT.GetCountry.GetName]に率いられたスターリング圏は、自国通貨をスターリングにペッグするか、あるいは実際にスターリングを自国通貨として使用する国々のグループでした。1931年にスターリングが金本位制を離脱した後、1930年代初頭に非公式な形でこの圏が形成され始めました。その結果、歴史的にスターリングで多額の貿易を行っていた国々の多くが、金ではなくスターリングに通貨をペッグすることになりました。ロンドンのイングランド銀行が、この通貨圏における金融政策の調整を指導しました。独自の通貨を持つメンバー国は、外貨準備の大部分をロンドンにおけるスターリング残高として保有していました。\n\n「この広大な[concept_currency_union]を維持することを目指すべきだ。これを失うことは、我が国の威信にとって大きな打撃となるだろう」"
    dollar_zone:0 "ドル圏"
    ruble_zone:0 "[ROOT.GetCountry.GetAdjectiveNoFlag]ルーブル圏"
    generic_currency_zone:0 "[ROOT.GetCountry.GetAdjectiveNoFlag]通貨圏"
    generic_currency_zone_desc:0 "[ROOT.GetCountry.GetName]は、5つ以上の主権を持つメンバーで構成される主要な[concept_currency_union]のリーダーです。これにより、[ROOT.GetCountry.GetAdjective]中央銀行は国際的な利子率に対して多大な影響力を持ち、多くの威信を得ています。\n\n「この広大な[concept_currency_union]を維持することを目指すべきだ。これを失うことは、我が国の威信にとって大きな打撃となるだろう」"
    
    je_multilateral_development_banks_1.tt:0 "この国は、少なくとも他に1つの国と$multilateral_development_bank$[concept_diplomatic_pact]を有しています"
    je_multilateral_development_banks_2.tt:0 "この国は、いかなる国とも$multilateral_development_bank$[concept_diplomatic_pact]を有していません"
    je_multilateral_development_banks:0 "多国間開発銀行"
    je_multilateral_development_banks_reason:0 "多国間開発銀行は、主権国家によって設立された超国家的な金融機関であり、それらの国家が株主となります。その任務は、これらの国家によって確立された開発援助および協力政策を反映しています。\n\n[ROOT.GetCountry.GetName]の政府は、国家支出の資金を賄うために、多国間開発銀行から資金を借り入れることができます。\n\n国際債務は#Yellow XDR#!建てであり、これは世界平均為替レートを用いて算出されます。したがって、[ROOT.GetCountry.GetAdjectiveNoFlag]の通貨が強くなれば、より低コストで借入が可能になり、その逆も同様です。\n\nヒント：[ROOT.GetCountry.GetAdjective]の為替レートは、$lawgroup_monetary_policy$[concept_law]によって調整できます。\n\n為替レート：@money!1 = [GetPlayer.MakeScope.Var('currency_exchange_rate').GetValue]#Yellow XDR#!\n\n借入制限（外貨建て）：#Yellow XDR#!#Green [GetPlayer.MakeScope.Var('currency_borrowing_pool_display').GetValue]M#!\n\n借入制限（[ROOT.GetCountry.GetAdjectiveNoFlag]通貨建て）：#Green @money![GetPlayer.MakeScope.Var('currency_borrowing_pool_domestic_display').GetValue]M#!\n\n月間借入制限：#o @money![GetPlayer.MakeScope.Var('currency_borrow_money_monthly_limit_display').GetValue]M#!\n\n[ROOT.GetCountry.GetName]は、以下の地域銀行のメンバーです：#BOLD $ASIAN_DEVELOPMENT_BANK$$ASIAN_INFRASTRUCTURE_INVESTMENT_BANK$$EUROPEAN_INVESTMENT_BANK$$INTERNATIONAL_INVESTMENT_BANK$$INTER_AMERICAN_DEVELOPMENT_BANK$$AFRICAN_DEVELOPMENT_BANK$$NORDIC_INVESTMENT_BANK$$CARIBBEAN_DEVELOPMENT_BANK$$ISLAMIC_DEVELOPMENT_BANK$$NEW_DEVELOPMENT_BANK$$EURASIAN_DEVELOPMENT_BANK$$NORTH_AMERICAN_DEVELOPMENT_BANK$#!"
    je_multilateral_development_banks_status:0 "元金：#Yellow XDR#! #Green [GetPlayer.MakeScope.Var('currency_borrowed_money_display').GetValue]M#! \n年利子率：#o [GetPlayer.MakeScope.Var('currency_rate_international_local').GetValue]%#! \n年間返済額：@money!#Red [GetPlayer.MakeScope.Var('currency_borrowed_money_yearly_repayment_display').GetValue]#! / #Yellow XDR#! #Red [GetPlayer.MakeScope.Var('currency_borrowed_money_exchange_adjusted_repayment').GetValue]#!"
    
    je_start_borrow_multilateral_banks_button:0 "資金の借入を開始する"
    je_start_borrow_multilateral_banks_button_desc:0 "[ROOT.GetCountry.GetName]政府は、#o [GetPlayer.MakeScope.Var('currency_rate_international_local').GetValue]%#!の年利子率で多国間開発銀行から資金の借入を開始します。\n\n注：借入の制限は#Yellow XDR#! #Green [GetPlayer.MakeScope.Var('currency_borrowing_pool_display').GetValue]M#!であり、これは#Green @money![GetPlayer.MakeScope.Var('currency_borrowing_pool_domestic_display').GetValue]M#!に相当します。"
    je_stop_borrow_multilateral_banks_button:0 "資金の借入を停止する"
    je_stop_borrow_multilateral_banks_button_desc:0 "[ROOT.GetCountry.GetName]政府は、#o [GetPlayer.MakeScope.Var('currency_rate_international_local').GetValue]%#!の年利子率で多国間開発銀行からの資金の借入を停止します。\n\n注：借入の制限は#Yellow XDR#! #Green [GetPlayer.MakeScope.Var('currency_borrowing_pool_display').GetValue]M#!であり、これは#Green @money![GetPlayer.MakeScope.Var('currency_borrowing_pool_domestic_display').GetValue]M#!に相当します。"
    je_start_repay_multilateral_banks_button:0 "資金の返済を開始する"
    je_start_repay_multilateral_banks_button_desc:0 "[ROOT.GetCountry.GetName]政府は、多国間開発銀行への融資の一部を返済し始めます。\n\n注：@money!#Red [GetPlayer.MakeScope.Var('currency_borrowed_money_yearly_repayment_display').GetValue]#!は、#Yellow XDR#! #Red [GetPlayer.MakeScope.Var('currency_borrowed_money_exchange_adjusted_repayment').GetValue]#!相当の負債を返済します。"
    je_stop_repay_multilateral_banks_button:0 "資金の返済を停止する"
    je_stop_repay_multilateral_banks_button_desc:0 "[ROOT.GetCountry.GetName]の政府は、多国間開発銀行への債務の一部返済を停止します。\n\n注：@money!#Red [GetPlayer.MakeScope.Var('currency_borrowed_money_yearly_repayment_display').GetValue]#!は#Yellow XDR#! #Red [GetPlayer.MakeScope.Var('currency_borrowed_money_exchange_adjusted_repayment').GetValue]#!相当の負債を返済します。"
    
    borrow_repay_multilateral_banks.tt:0 "過去1か月間に国際的な債務の借入または返済を行いませんでした"
    
