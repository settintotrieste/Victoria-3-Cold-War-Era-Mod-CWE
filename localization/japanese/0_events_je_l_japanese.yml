    UN_imf_interest_rate.t:0 "IMF利子率の変更"
    UN_imf_interest_rate.1.d:0 "国際通貨基金の議長が、債務国への融資の利子率の変更を発表しました。これより、利子率は極めて低くなります。"
    UN_imf_interest_rate.2.d:0 "国際通貨基金の議長が、債務国への融資に関する利子率の変更を発表しました。これより、利子率は低くなります。"
    UN_imf_interest_rate.3.d:0 "国際通貨基金の議長が、債務国への貸付に対する利子率の変更を発表しました。今後、利子率は中程度となります。"
    UN_imf_interest_rate.4.d:0 "国際通貨基金の議長が、債務国への貸付に対する利子率の変更を発表しました。今後、利子率は高となります。"
    UN_imf_interest_rate.5.d:0 "国際通貨基金の議長が、債務国への融資に対する利子率の変更を発表しました。これより、利子率は非常に高い水準となります。"
    UN_imf_interest_rate.f:0 "[SCOPE.sCountry('imf_interest_rate_target').GetName]は現在IMFから資金を借りているため、世界平均利子率ではなくIMF利子率の適用を受けます。IMF利子率は世界平均の経済見通しによって決定されます。見通しが悪いほど利子率は低くなり、その逆の場合も同様です。"
    IMF_interest_rate_acknowledgement:0 "承知した"
    
