    form_ibero_american_organisation_decision_desc:0 "イベロアメリカ諸国機構は、ヨーロッパとアメリカ大陸の23のイベロフォン諸国の加盟国、およびアフリカの1つの加盟国で構成される国際組織です。OEIのメンバーシップは、イベロアメリカとイベリア半島のすべての主権国家、および赤道ギニアで構成されています。すべてのメンバーはポルトガル語およびスペイン語を話す国々ですが、主にカタルーニャ語を話すアンドラも含まれています。ただし、この組織には世界のすべてのイベロフォン諸国が含まれているわけではありません。"
