    je_world_tension_system:0 "国際緊張"
    je_world_tension_system_reason:0 "国際緊張は、世界の国々の間に存在する恐怖と不安の全体的なレベルを表しています。表示される数値は0%から100%の間です。\n\n一般的に、国際緊張が高まるほど、交戦行動をとることに対する国民の支持が高まります。\n\n国際緊張は、AIの攻撃性や軍事化のレベルに影響を与えることから、株式市場に影響を与えることに至るまで、ゲーム内に様々な影響を及ぼします。\n\n現在の国際緊張度：[GetPlayer.MakeScope.Var('world_tension_amount_display').GetValue]%"
    
