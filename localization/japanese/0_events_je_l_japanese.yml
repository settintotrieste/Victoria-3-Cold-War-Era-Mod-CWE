    je_cabinet:0 "[ROOT.GetCountry.GetRuler.GetLastName][SCOPE.GetRootScope.GetCountry.GetCustom('cabinet_name_custom_title')]"
    je_cabinet_reason:0 "$RULING_PARTY_IDEOLOGY_cabinet_JE$ \n\n[SCOPE.GetRootScope.GetCountry.GetCustom('cabinet_name_custom_title')]は、政府の各部門の長も務める元首の顧問団です。そのメンバーは[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]によって任命されます。\n\n[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle][ROOT.GetCountry.GetRuler.GetFullName]は、キャラクター・インタラクションを使用して、そのリーダーに閣僚の地位を与えることで、任意の[concept_government][concept_interest_group]を[SCOPE.GetRootScope.GetCountry.GetCustom('cabinet_name_custom_title')]に招待できます。全ての[concept_government][concept_interest_group]が$cabinet_minister_ig$を持つ場合、それは[SCOPE.GetRootScope.GetCountry.GetCustom('cabinet_name_custom_title')]の一部となります。\n\n#BOLD 閣内の結束：#!#BOLD [SCOPE.GetRootScope.GetCountry.GetCustom('cabinet_unity_level_custom_title')]（[GetPlayer.MakeScope.Var('cabinet_unity_var').GetValue]％）#!\n\n閣内の結束は、少なくとも#BOLD 0#!の[concept_approval]を持たない[concept_government][Concept('concept_interest_group', '$concept_interest_groups$')]（[GetPlayer.MakeScope.Var('cabinet_unity_divisor_var').GetValue]）の数で100を割ることで算出されます。$HOG_cabinet$ \n\n#BOLD [Concept('concept_interest_group', '$concept_interest_groups$')]閣内：#!$ig_armed_forces_minister$$ig_intelligentsia_minister$$ig_rural_folk_minister$$ig_landowners_minister$$ig_trade_unions_minister$$ig_petty_bourgeoisie_minister$$ig_industrialists_minister$\n\n#BOLD 官僚の長：#![SCOPE.gsInterestGroup('ig_intelligentsia_cabinet_scope').GetLeader.GetFullName]\n\n#BOLD 軍の最高司令官：#![SCOPE.gsInterestGroup('ig_armed_forces_cabinet_scope').GetLeader.GetFullName]"
    je_cabinet_status:0 "閣内の結束：[GetPlayer.MakeScope.Var('cabinet_unity_var').GetValue]％"
    je_issue_executive_order_button:0 "経営責任者命令を発令する"
    je_issue_executive_order_button_desc:0 "経営責任者命令を発令することで、[SCOPE.GetRootScope.GetCountry.GetCustom('upper_house_name')]での多数派の必要性を回避し、[concept_legitimacy]を増加させることができます。"
    
    je_issue_royal_decree_button:0 "国王布告を発布する"
    je_issue_royal_decree_button_desc:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]の[ROOT.GetCountry.GetRuler.GetFullName]は、[concept_government]と[concept_opposition]に対し、相違を乗り越えて連立政権を形成するよう求める国王布告を発布できます。この王室の介入により、思想的に異なる[Concept('concept_interest_group', '$concept_interest_groups$')]を持つ政府の形成が容易になります。"
    
    je_call_elections_button:0 "選挙を実施する"
    je_call_elections_button_desc:0 "[ROOT.GetCountry.GetName]の議院内閣制の下では、[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]はいつでも議会を解散し、[concept_election]を実施することができます。"
    je_enact_state_of_emergency_button:0 "非常事態宣言を発令する"
    je_enact_state_of_emergency_button_desc:0 "[concept_government]は[SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')]の同意なしに[Concept('concept_enactment_of_laws','$concept_enactment_of_laws_enact$')] [Concept('concept_law','$concept_laws$')]できるよう、非常事態を宣言します。"
    je_lift_state_of_emergency_button:0 "非常事態宣言を終了する"
