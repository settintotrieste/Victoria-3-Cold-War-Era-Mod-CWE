    state_church_veto.t:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('state_church_name')]が法案に反対"
    state_church_veto.d:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('state_church_name')]は、[SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')]で現在制定されている法案に対し、強い反対の意を表明しました。様々な宗教指導者が、支持者に対し、法案が議会の煉獄へと送られるよう祈るよう呼びかけています。"
