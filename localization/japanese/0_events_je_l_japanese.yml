    GBR_change_monarch_1952.t: "国王ジョージ6世の崩御"
    GBR_change_monarch_1952.d: "戦争によるストレスはジョージの健康に悪影響を及ぼしていました。激しい喫煙に加え、動脈硬化やバーガー病などの疾患、さらには肺がんの発症によって、その状態は悪化の一途をたどりました。1952年1月31日、周囲の助言にもかかわらず、ジョージはエリザベスとフィリップのケニア経由オーストラリア訪問を見送るため、ロンドン空港へと向かいました。それが彼の最後の公の場となりました。6日後の2月6日午前7時30分（GMT）、彼はノーフォーク州のサンドリンガム・ハウスのベッドで遺体となって発見されました。彼は前夜、56歳で冠動脈血栓症のため死去していました。"
    GBR_change_monarch_2022.t: "女王エリザベス2世の崩御"
    GBR_change_monarch_2022.d: "イギリスおよび他のコモンウェルス諸国の女王であるエリザベス2世は、2022年9月8日、スコットランドのバルモラル城にて96歳で死去しました。エリザベスの70年と214日におよぶ治世は、歴代のイギリス君主の中で最長でした。彼女の跡には、長男のチャールズ3世が即座に継承しました。"
    JAP_change_monarch_1989.t: "天皇裕仁の死去"
    JAP_change_monarch_1989.d: "1987年9月22日、数ヶ月にわたる消化器系の問題を抱えていた裕仁は、膵臓の手術を受けました。医師たちは彼が十二指腸癌であることを発見しました。手術後数ヶ月間、裕仁は順調に回復しているように見えました。しかし、その約1年後の1988年9月19日、彼は宮殿内で倒れ、その後の数ヶ月間にわたる持続的な内出血により健康状態が悪化しました。天皇は1989年1月7日午前6時33分、87歳で死去しました。"
    JAP_change_monarch_2019.t: "天皇明仁の退位？"
    JAP_change_monarch_2019.d: "2016年7月13日、公共放送のNHKは、当時82歳であった天皇が年齢を理由に、数年以内に長男の徳仁皇太子へ譲位する意向であることを報じました。2017年5月19日、明仁の退位を可能にする法案が日本政府によって提出されました。2017年6月8日に国会がこれを通過させ、退位は「天皇の退位等に関する皇室典範特例法」として知られるようになりました。これにより、徳仁へ地位を引き継ぐための政府の準備が開始されました。安倍晋三首相は2017年12月、明仁の退位は2019年4月30日の末日に行われ、2019年5月1日をもって徳仁が第126代天皇に即位することを発表しました。"
    BEL_change_monarch_2013.t: "国王アルベール2世の退位？"
    BEL_change_monarch_2013.d: "ベルギーの国王アルベール2世は、年齢と健康上の懸念を理由に2013年7月21日に退位しました。20年間の在位を経て、彼はベルギーのナショナルデーの式典において、息子のフィリップに王位を譲りました。アルベールは辞任の演説の中で国家の団結を促し、平和的な王位継承を実現しました。"
    SPA_change_monarch_2014.t: "国王フアン・カルロス1世の退位？"
    SPA_change_monarch_2014.d: "スペインの国王フアン・カルロス1世は、同月の初めに退位の意向を表明した後、2014年6月19日に退位しました。健康上の問題と世代交代への願いを理由に、彼は息子フェリペ6世に王位を譲りました。この退位は不祥事による支持率の低下を受けて行われ、議会の承認によって正式なものとなりました。"
    NET_change_monarch_1980.t: "女王ユリアナの退位？"
    NET_change_monarch_1980.d: "オランダの女王ユリアナは、32年間の在位を経て、71歳の誕生日である1980年4月30日に退位しました。彼女は高齢であることと、次世代へ責任を引き継ぎたいという願いを理由に挙げました。娘のベアトリクスが彼女の後を継ぎました。この退位は、終身統治よりも自発的な引退を好むオランダ王室の伝統を反映したものでした。"
    NET_change_monarch_2013.t: "女王ベアトリクスの退位？"
    NET_change_monarch_2013.d: "オランダの女王ベアトリクスは、33年間の在位を経て、2013年4月30日に退位しました。彼女は新しい世代に道を譲りたいという願いから、息子ウィレム＝アレクサンダーに王位を譲りました。この退位は一つの時代の終わりと、1世紀以上ぶりとなるオランダ初の男性君主の時代の始まりを告げるものでした。"
    LUX_change_monarch_1964.t: "大公女シャルロッテの退位？"
    LUX_change_monarch_1964.d: "ルクセンブルクの大公女シャルロッテは、45年間の統治を経て、1964年11月12日に退位しました。彼女は高齢であることと刷新の必要性を理由に、息子ジャンに王位を譲りました。彼女の統治は第二次世界大戦と戦後の復興期に及び、彼女は国家の団結と回復力の象徴となりました。"
    LUX_change_monarch_2000.t: "大公ジャンの退位？"
    LUX_change_monarch_2000.d: "ルクセンブルクの大公ジャンは、36年間の在位を経て、2000年10月7日に退位しました。彼は次世代へ責任を引き継ぎたいという願いから、息子アンリに権力を譲りました。ジャンの統治は戦後の近代化によって特徴付けられ、また第二次世界大戦においては兵士として、そして国家の回復力の象徴としての役割を果たしました。"
    LUX_change_monarch_2025.t: "大公アンリの退位？"
    LUX_change_monarch_2025.d: "ルクセンブルクの大公アンリは、25年近い在位を経て、2025年10月3日に退位しました。彼は世代交代と継続性の重要性を理由に、長男ギョームに王位を譲りました。この交代は、ルクセンブルク市の大公宮殿で行われた正式な儀式によって執り行われました。"
    DEN_change_monarch_2024.t: "マルグレーテ2世女王の退位？"
    DEN_change_monarch_2024.d: "デンマークのマルグレーテ2世女王は2024年1月14日に退位し、52年間にわたる在位期間に幕を閉じました。彼女は世代交代を理由に、大晦日の演説の中でその決断を発表しました。息子のフレデリックがフレデリック10世国王として彼女の後を継ぎました。これはデンマークにとって、約900年ぶりの自発的な王室の退位でした。"
    NOR_change_monarch_1957.t: "ハーコン7世国王の死去"
    NOR_change_monarch_1957.d: "国王ホーコン7世は、尊敬を集めた長きに渡る治世を経て1957年に亡くなりました。ノルウェーの独立と戦時下の強靭さの象徴であった彼の死は、一つの時代の終焉と国王オーラヴ5世の統治の始まりを告げ、ノルウェー君主制の新たな章を切り開きました。"
    NOR_change_monarch_1991.t: "オラヴ5世国王の死去"
    NOR_change_monarch_1991.d: "オラヴ5世国王は1991年に死去しました。その謙虚さと戦時中の貢献から「国民の王」として愛されていました。彼の死は国家的な喪に服することとなり、息子のハラルド5世が即位して、現代的で親しみやすい君主制の遺産を引き継ぎました。"
    SWE_change_monarch_1950.t: "グスタフ5世国王の死去"
    SWE_change_monarch_1950.d: "グスタフ5世国王は1950年に92歳で死去し、二度の世界大戦にわたる43年間の治世を終えました。彼の死は、スウェーデンが近代的な立憲君主制へと進化を続ける中で、グスタフ6世アドルフへの移行点となりました。"
    SWE_change_monarch_1973.t: "グスタフ6世国王の死去"
    SWE_change_monarch_1973.d: "グスタフ6世アドルフ国王は1973年に亡くなりました。学術的な関心と安定したリーダーシップで記憶されています。彼の死は一つの時代の終わりとカール16世グスタフの台頭を意味し、スウェーデン王室における世代交代を示しました。"
    GRE_change_monarch_1964.t: "パウロ国王の死去"
    GRE_change_monarch_1964.d: "ギリシャのパウロ国王は、戦後の復興と冷戦下の緊張が続く治世を経て1964年に死去しました。息子のコンスタンティノス2世は、まもなく君主制の将来を揺るがすことになる政治的不安の高まりの中で、彼の跡を継ぎました。"
    THI_change_monarch_2016.t: "プミポン・アドゥンヤデート・マヒドル国王の死去"
    THI_change_monarch_2016.d: "プミポン・アドゥンヤデート国王は、タイ史上最長となる70年間の在位を経て2016年に死去しました。その道徳的権威と開発事業への貢献で崇敬を集めていた彼の死は、国に深い影響を与えました。皇太子ワチラロンコンがラーマ10世として彼の跡を継ぎました。"
    CAM_change_monarch_2004.t: "ノロドム・シハヌーク国王の死去"
    CAM_change_monarch_2004.d: "ノロドム・シハヌーク国王は、カンボジアの近代史において極めて重要な役割を果たし、2012年に逝去されました。君主から政治家へ、そして再び君主へと、その複雑な足跡は、息子のノロドム・シハモニーによる平和的な継承とともに幕を閉じました。"
    CHI_change_monarch_1967.t: "溥儀の死"
    CHI_change_monarch_1967.d: "中国最後の皇帝であった溥儀は、共産主義者の支配下で長年にわたる再教育を受けた後、1967年に亡くなりました。かつては幼帝であり、後に満州国の傀儡の支配者でもあった彼の死は、帝政中国の最後の黄昏を象徴するものでした。"
    AUS_change_monarch_2011.t: "オットー・フォン・ハプスブルクの死"
    AUS_change_monarch_2011.d: "オーストリア＝ハンガリー帝国の最後の後継者であるオットー・フォン・ハプスブルクは、2011年7月4日、98歳で亡くなりました。ウィーンで行われた彼の葬儀は、640年にわたる王朝の象徴的な終焉を告げるものでした。彼の遺体は帝国地下墓地に埋葬されましたが、心臓はハプスブルク家の伝統に従い、ハンガリーに別途埋葬されました。"
    EGY_change_monarch_1952.t: "フアード2世の誕生"
    EGY_change_monarch_1952.d: "エジプトのフアード2世は、1952年1月16日にカイロのアブディーン宮殿で誕生しました。国王ファルーク1世とナリマン・サデク王妃の息子である彼は、わずか数ヶ月後にエジプト最後の君主となりました。1953年に君主制が廃止されるまで、父の退位後に短期間君臨しました。"
    PER_change_monarch_1960.t: "レザー・パフラヴィーの誕生"
    PER_change_monarch_1960.d: "イランの皇太子レザー・パフラヴィーは、1960年10月31日にテヘランで誕生しました。国王モハンマド・レザー・パフラヴィーとファーラ・ディバ皇后の息子である彼は、1967年に孔雀の玉座の後継者に指名されました。彼の誕生は、パフラヴィー朝の継続を象徴するものでした。"
    JOR_change_monarch_1962.t: "アブドゥッラー2世の誕生"
    JOR_change_monarch_1962.d: "アブドゥッラー2世は1962年1月30日、ヨルダンのアンマンで、フセイン国王とムナ王女の長男として誕生しました。預言者ムハンマドのハシミテ家の子孫である彼は、出生時に皇太子として宣言されました。ヨルダンの伝統と国際的な教育を組み合わせた彼の養育は、将来のリーダーシップを形成することとなりました。"
    
