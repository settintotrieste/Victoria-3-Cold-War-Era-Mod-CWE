    je_one_party_system: "[ROOT.GetCountry.GetAdjectiveNoFlag]中央委員会"
    je_one_party_system_reason: "[ROOT.GetCountry.GetName]における合法的な[concept_party]は、与党のみです。それにもかかわらず、与党の中央委員会内には複数の派閥が存在し、与党の思想的方向性に影響を及ぼしています。これは、次の党首、ひいては国の[concept_ruler]を誰にするかを決定することによって行われます。\n\n中央委員会は、急進派、穏健派、改革派の3つの派閥で構成されています。これらの派閥は、すべて党と国の指導権を争っています。\n\nどの派閥が優勢になるかは、中央委員会の$Party_Radicalism$によって決まります。$Party_Radicalism$が60％を超えると急進派が主導権を握り、$Party_Radicalism$が40％から60％の間であれば穏健派が、$Party_Radicalism$が40％を下回れば改革派が主導権を握ります。優勢な派閥は、次の[concept_ruler]の[concept_ideology]を決定する確率が大幅に高まります。\n\n党議院長：[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [GetPlayer.GetRuler.GetFullName] \n\n注：[concept_government]の[concept_legitimacy]が高いと$Party_Radicalism$が増加し、[ROOT.GetCountry.GetName]の[concept_turmoil]が高いと減少します。\n\n注：$Party_Radicalism$は、より#red 独裁的<#!な[concept_ruler]が選出される確率を高めます。"
    
    je_party_system: "[SCOPE.sParty('ruling_party_scope').GetName]"
    je_party_system_reason: "[SCOPE.sParty('ruling_party_scope').GetName]は、[ROOT.GetCountry.GetName]の統治[SCOPE.GetRootScope.GetCountry.GetCustom('party_or_party_faction_name')]です。[SCOPE.GetRootScope.GetCountry.GetCustom('party_or_party_faction_name')]システムの一環として、[SCOPE.GetRootScope.GetCountry.GetCustom('party_or_party_faction_name')]はリーダーを選出します。それによって、結果として国の[concept_ruler]も決定されます。\n\n[SCOPE.sParty('ruling_party_scope').GetName]は、急進派、穏健派、改革派の3つの派閥で構成されています。これらの派閥はすべて、[SCOPE.GetRootScope.GetCountry.GetCustom('party_or_party_faction_name')]と国の指導権をめぐって争います。\n\nどの派閥が優勢になるかは、[SCOPE.sParty('ruling_party_scope').GetName]の$Party_Radicalism$によって決まります。$Party_Radicalism$が60%を超えている場合は急進派が、$Party_Radicalism$が40%から60%の間であれば穏健派が、$Party_Radicalism$が40%未満であれば改革派が主導権を握ります。優勢な派閥は、次回の[concept_ruler]の[concept_ideology]を決定できる可能性が非常に高くなります。\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('party_or_party_faction_name')]議長：[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [GetPlayer.GetRuler.GetFullName]\n\n注：優勢な[concept_government][concept_interest_group]の[concept_approval]が低い、または[concept_government]の[concept_legitimacy]が低い場合、$Party_Radicalism$が増加します。優勢な[concept_government][concept_interest_group]の[concept_approval]が高く、[concept_government]の[concept_legitimacy]が高い場合、$Party_Radicalism$は減少します。\n\n注：$Party_Radicalism$は、より#red 独裁的な#![concept_ruler]が選出される可能性を高めます。"
    
