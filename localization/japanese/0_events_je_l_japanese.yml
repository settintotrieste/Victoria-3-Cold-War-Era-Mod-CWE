    je_space_race_space_rocket_button_desc:0 "打上げロケットは、通常、ペイロード（有人宇宙船または人工衛星）を地球の表面または下層大気から宇宙空間へと運ぶために設計されたロケット推進の乗り物です。最も一般的な形態は、弾道ミサイルの形状をした多段式ロケットです。"
    je_space_race_satellite_button_desc:0 "人工衛星は、天体の軌道上に意図的に配置された物体です。人工衛星には、通信中継、気象予報、航法（GPS）、放送、科学研究、地球観測など、さまざまな用途があります。軍事的な用途としては、偵察、早期警戒、信号情報、そして潜在的には兵器の運搬などが挙げられます。"
    je_space_race_astronaut_button_desc:0 "宇宙飛行士は、有人宇宙飛行計画によって訓練、装備、配備され、宇宙船の司令官または乗組員として任務に就く人のことです。"
    je_space_race_space_probe_button_desc:0 "宇宙探査機は、宇宙を探索し科学的な情報を収集するために送られる、無人かつ非操縦式の装置です。"
    je_space_race_moon_mission_button_desc:0 "月着陸とは、宇宙船が月の表面に到着することです。"
    je_space_race_space_station_button_desc:0 "宇宙ステーションは、軌道上で長期間にわたって有人乗組員を維持できる宇宙船であり、宇宙居住区の一種です。"
    je_space_race_space_telescope_button_desc:0 "宇宙望遠鏡または宇宙天文台は、天体を観察するために宇宙空間に設置された望遠鏡です。"
    je_space_race_mars_mission_button_desc:0 "火星着陸とは、宇宙船が火星の表面に到着することです。"
    je_space_race_moon_base_button_desc:0 "月面基地は、月面または月面下に位置する施設であり、月での人間活動を可能にするものです。"
    je_space_race_mars_base_button_desc:0 "火星基地は、火星の表面または火星の表面下に位置する施設であり、火星での人間活動を可能にするものです。"
    
    je_space_race_fake_moon_mission_button:0 "月着陸を偽造する"
    je_space_race_fake_moon_mission_button_desc:0 "[ROOT.GetCountry.GetNameNoFlag]が実際に月面着陸をしたと世界を欺くために、最高の映画スタジオに依頼して、[ROOT.GetCountry.GetAdjectiveNoFlag]が月面に着陸する極めてリアルな映像を制作させます。"
    moon_mission_faked.t:0 "月着陸の偽造が露呈"
    moon_mission_faked.d:0 "[ROOT.GetCountry.GetAdjectiveNoFlag]人の人間が月面に着陸する粗末な映像を使って世界を欺こうとした[ROOT.GetCountry.GetNameNoFlag]の試みは、誰にも信じられず、かえってその国に対する広範な嘲笑を招きました。"
    moon_mission_faked_success.t:0 "月着陸の偽造に成功"
    moon_mission_faked_success.d:0 "[ROOT.GetCountry.GetAdjectiveNoFlag]の宇宙飛行士が月に着陸する様子を捏造した映像が、[ROOT.GetCountry.GetNameNoFlag]が実際に月に着陸したと世界を欺くことに成功しました。"
    
    je_space_race_fake_mars_mission_button:0 "火星着陸を偽装する"
    je_space_race_fake_mars_mission_button_desc:0 "[ROOT.GetCountry.GetNameNoFlag]が実際に火星に着陸したと世界を欺くために、最高の映画スタジオに報酬を支払い、[ROOT.GetCountry.GetAdjectiveNoFlag]が火星に着陸する極めてリアルな映像の制作を依頼します。"
    mars_mission_faked.t:0 "火星着陸の偽装が露呈"
    mars_mission_faked.d:0 "[ROOT.GetCountry.GetAdjectiveNoFlag]人が火星に着陸する粗悪な映像で世界を欺こうとした[ROOT.GetCountry.GetNameNoFlag]の試みは、誰にも信じられず、むしろ国に対する広範な嘲笑を招きました。"
    mars_mission_faked_success.t:0 "火星着陸の偽装に成功"
    mars_mission_faked_success.d:0 "[ROOT.GetCountry.GetAdjectiveNoFlag]の宇宙飛行士が火星に着陸する様子を捏造した映像が、[ROOT.GetCountry.GetNameNoFlag]が実際に火星に着陸したと世界を欺くことに成功しました。"
    
