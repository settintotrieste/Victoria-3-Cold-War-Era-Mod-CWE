    space_program_peril_scientists.t:0 "宇宙計画の人員"
    space_program_peril_scientists.d:0 "[ROOT.GetCountry.GetAdjective]の宇宙計画には、現在の宇宙プロジェクトのために優れた科学者を雇う機会があります。しかし、その科学者が我々のために働くには、非常に高い給与を要求するでしょう。"
    space_program_peril_scientists.f:0 "やあ！"
    
    space_program_peril_materials.t:0 "宇宙計画の資材"
    space_program_peril_materials.d:0 "[ROOT.GetCountry.GetAdjective]の宇宙計画には、現在の宇宙プロジェクトの構成部品に最高級の資材を使用する機会があります。しかし、この優れた資材は安価なものではありません。"
    space_program_peril_materials.f:0 "その資材はアンオブタニウムか？"
    
    space_program_peril_project_pace.t:0 "宇宙計画のペース"
    space_program_peril_project_pace.d:0 "[ROOT.GetCountry.GetAdjective]の宇宙計画には、現在の宇宙プロジェクトの開発における特定の段階を加速させる機会があります。しかし、全員に残業をさせると事故のリスクが高まり、プロジェクトのコストも増加してしまいます。"
    space_program_peril_project_pace.f:0 "「速ければ速いほど良い」"
    
    space_program_peril_100.t:0 "宇宙計画の後退"
    space_program_peril_100.d:0 "[ROOT.GetCountry.GetAdjective]の宇宙計画は、試作機の試験打ち上げが離陸直後に爆発するという大きな後退に見舞われました。問題を修正し、新しい試作機を建造するために、私たちは計画を白紙に戻してやり直さなければなりません。"
    space_program_peril_100.f:0 "「なんて恐ろしい！」"
    
