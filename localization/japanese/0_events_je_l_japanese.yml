    open_suez_canal_decision:0 "スエズ運河を再開"
    open_suez_canal_decision_desc:0 "スエズ運河の所有者として、私たちはすべての船舶の航行に対して運河を再開することを選択できます。そうすることで国際コミュニティを喜ばせることができます。なお、これによりスエズ運河の施設は以前の状態に復元されます。"
