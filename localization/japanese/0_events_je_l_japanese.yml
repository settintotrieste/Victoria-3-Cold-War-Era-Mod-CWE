    cuban_missile_crisis.t:0 "キューバ危機"
    cuban_missile_crisis.d:0 "キューバ危機は、アメリカがイタリアとトルコに核ミサイルを配備したことに対し、ソ連がキューバに核ミサイルを配備したことで発生した、アメリカとソ連による13日間の対峙でした。危機は1962年10月16日から28日まで続きました。この対峙は、冷戦が全面的な核戦争へと深刻化する寸前まで達した事例として広く認識されています。"
    cuban_missile_crisis_1.option.1:0 "キューバに禁輸を！"
    cuban_missile_crisis_1.option.2:0 "これでも構わない……"
    cuban_missile_crisis_2.option.1:0 "キューバから撤退し、同時にアメリカに核兵器の撤去を要求する"
    cuban_missile_crisis_2.option.2:0 "妥協を拒否する！"
    cuban_missile_crisis_USA_END.t:0 "ソ連の対案"
    cuban_missile_crisis_USA_END.d:0 "ソ連は、ソ連がキューバから核兵器を撤去することと引き換えに、アメリカ合衆国がソ連に隣接する国々から核兵器を撤去することを提案しました。"
    cuban_missile_crisis_3.option.1:0 "取引を受け入れる"
    cuban_missile_crisis_3.option.2:0 "取引を拒否する"
    cuban_missile_crisis_SOV_END.t:0 "ソ連・アメリカ核緊張緩和条約"
    cuban_missile_crisis_SOV_END.d:0 "すべての攻撃用ミサイルとイリューシンIl-28軽爆撃機がキューバから撤去されたことで、11月20日にアメリカの海上封鎖は正式に終了しました。この妥協はフルシチョフとソ連に恥をかかせることとなりました。なぜなら、イタリアとトルコからのアメリカのミサイル撤去はケネディとフルシチョフの間の密約であり、ソ連は自らが引き起こした状況から退却したと見なされたからです。"
    cuban_missile_crisis_4.option:0 "少なくとも、核戦争は回避されました！"
    
    peaceful_revolution_generic.t:0 "[ROOT.GetCountry.GetAdjectiveNoFlag]革命"
    peaceful_revolution_generic.d:0 "今日、怒れる抗議者の群衆が防御の薄い大統領官邸を突破し、[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]を冷酷に処刑したことで、[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]の[ROOT.GetCountry.GetRuler.GetFullName]が無血革命によって失脚しました。これを受けて内閣全員が辞任し、反乱軍が新しい政府を形成することとなりました。"
    peaceful_revolution_generic.f:0 "このイベントが発生したのは、革命的な[concept_political_movement]が、あらゆる[ROOT.GetCountry.GetAdjective]の[concept_state]を反乱に駆り立てる可能性があったためです。"
    peaceful_revolution_generic.option:0 "恐ろしいことです！"
    
    brezhnev_doctrine.t:0 "[SCOPE.sCountry('brezhnev_doctrine_target').GetName]での革命"
    brezhnev_doctrine.d:0 "民衆革命によって、[SCOPE.sCountry('brezhnev_doctrine_target').GetName]における我々の傀儡共産主義体制が打倒されました。我々のリーダーたちは、反乱を起こした国に秩序を取り戻すため、[ROOT.GetCountry.GetAdjective]軍に呼びかけています。"
    brezhnev_doctrine.f:0 "このイベントが発生したのは、[ROOT.GetCountry.GetName]の[concept_subject]が共産主義政府を打倒し、[ROOT.GetCountry.GetAdjective]の支配から解放されたと宣言したためです。"
    
    revolution_crushed_recently:0 "内戦の遺産"
    je_civil_war_system:0 "[ROOT.GetCountry.GetAdjectiveNoFlag]の[concept_civil_war]"
    je_civil_war_system_reason:0 "[ROOT.GetCountry.GetName]で[concept_civil_war]が発生しました。[concept_government]は、反乱軍と$stop_endless_revolutions$の[concept_diplomatic_action]を成立させるか、あるいは[concept_civil_war]の手段で戦争に勝利しなければなりません。"
    
    European_Economic_Community.t:0 "ローマ条約？"
    European_Economic_Community.d:0 "ローマ条約は、欧州経済共同体（EEC）の創設をもたらしました。この条約は1957年3月25日にベルギー、フランス、イタリア、ルクセンブルク、オランダ、および西ドイツによって署名され、1958年1月1日に発効しました。条約は、関税の段階的な削減と関税同盟の確立を提案しました。また、メンバー国全体における商品、労働、サービス、および資本のための単一市場の創設を提案しました。さらに、共通農業政策、共通運輸政策、および欧州社会基金の創設を提案し、欧州委員会を設立しました。"
    European_Single_Market.t:0 "マーストリヒト条約？"
    European_Single_Market.d:0 "欧州連合条約は、一般にマーストリヒト条約として知られており、欧州連合（EU）の基礎となる条約です。当時の欧州共同体の12のメンバー国間で1992年に締結されたこの条約は、主に共通の欧州市民権、最終的な単一通貨の導入、そして（精度は低いものの）共通の外交・安全保障政策に関する規定を通じて、欧州統合のプロセスにおける新たな段階を宣言しました。"
    European_Single_Currency.t:0 "ユーロを導入しますか？"
    European_Single_Currency.d:0 "ユーロは1960年代から欧州連合（EU）とその前身の目標となっていましたが、1999年1月1日に誕生しました。厳しい交渉の末、マーストリヒト条約は1993年に発効し、英国とデンマークを除くすべてのEU諸国において1999年までに経済通貨統合（EMU）を実現することを目指しました（デンマークはユーロに対して固定相場制を採用していますが）。"
    European_Political_Union.t:0 "リスボン条約？"
    European_Political_Union.d:0 "リスボン条約には、閣僚理事会における少なくとも45の政策分野での全会一致制から有資格多数決への移行、当該多数決の算出方法を新たな「二重多数決」へと変更すること、通常立法手続きの下で閣僚理事会と共に二院制議会を形成するより強力な欧州議会、EUの法人格の確立、そして欧州理事会議長の任期延長と対外・安全保障政策上級代表の創設が含まれていました。また、同条約はEUの権利章典、すなわち基本的権利憲章に法的拘束力を与えました。さらに、この条約は初めて加盟国に対し、EUを離脱する明示的な法的権利を与え、そのための手続きを確立しました。"
    
    NAFTA.t:0 "北米自由貿易協定か？"
    NAFTA.d:0 "北米自由貿易協定は、カナダ、メキシコ、およびアメリカ合衆国によって署名された、北米における三者間の貿易陣営を創設する協定でした。この協定は1994年1月1日に発効し、1988年のアメリカ合衆国とカナダとの間のカナダ・アメリカ自由貿易協定に代わるものとなりました。NAFTA貿易陣営は、国内総生産において世界最大級の貿易陣営の一つとなりました。"
    
    ASEAN_Economic_Community.t:0 "北米自由貿易協定か？"
    ASEAN_Economic_Community.d:0 "ASEANは、商品、サービス、熟練労働力、および資本の自由な移動を確保することを目標として、2015年末までに「4つの自由」に基づく単一市場を設立することを計画していました。ASEAN経済共同体は2015年に形成されましたが、共通市場の創設に必要な調和規定の約20％が先送りされ、新たな期限として2025年が設定されました。"
    
    Trans_Pacific_Partnership.t:0 "環太平洋パートナーシップか？"
    Trans_Pacific_Partnership.d:0 "環太平洋パートナーシップ協定（TPP）は、オーストラリア、ブルネイ、カナダ、チリ、日本、マレーシア、メキシコ、ニュージーランド、ペルー、シンガポール、ベトナム、およびアメリカ合衆国の環太平洋沿岸にある12の経済圏の間で提案された貿易協定でした。アメリカ合衆国では、2016年2月4日に提案が署名されましたが、両主要政党の大統領候補であるドナルド・トランプとヒラリー・クリントンの両名を含む、多くの民主党員および共和党員によって反対されたため、批准されませんでした。就任後、新たに選出されたドナルド・トランプ大統領は、2017年1月にアメリカ合衆国を正式にTPPから離脱させたため、TPPは必要条件として批准されることができず、発効には至りませんでした。"
    
    RCEP.t:0 "地域的な包括的経済連携（RCEP）ですか？"
    RCEP.d:0 "地域的な包括的経済連携は、オーストラリア、ブルネイ、カンボジア、中国、インドネシア、日本、韓国、ラオス、マレーシア、ミャンマー、ニュージーランド、フィリピン、シンガポール、タイ、およびベトナムのアジア太平洋諸国間の自由貿易協定です。これは、発効後20年以内に、署名国間の輸入に対する関税の約90％を撤廃し、Eコマース、貿易、および知的財産に関する共通のルールを確立することが期待されています。"
    
    five_year_plan_system.t:0 "五カ年計画"
    five_year_plan_system.d:0 "五カ年計画とは、[concept_government]によって発行される一連の社会・経済開発イニシアチブです。計画策定は社会主義経済の主要な特徴であり、国全体のために策定される一つの計画には、通常、すべての地域に対する詳細な経済開発ガイドラインが含まれています。"
