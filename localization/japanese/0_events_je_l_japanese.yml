    je_civil_service_system_subvert_civil_service_button:0 "官僚を転覆させる"
    je_civil_service_system_subvert_civil_service_button_desc:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]は、[ROOT.GetCountry.GetAdjectiveNoFormatting]の官僚のうち体制派ではないメンバーに辞任を圧力し、彼らを思想的に忠誠を誓う官僚に置き換えます。"
    
    je_civil_service_system_reform_civil_service_button:0 "官僚を改革する"
    je_civil_service_system_reform_civil_service_button_desc:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]は、官僚の思想的傾向が国民を反映したものとなるよう、国の代表となる官僚を要職に任命します。"
    
    je_civil_service_system_restore_civil_service_button:0 "官僚の脱政治化"
    je_civil_service_system_restore_civil_service_button_desc:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]は、[ROOT.GetCountry.GetAdjectiveNoFormatting]の官僚が独自のメンバーを任命することを許可します。これにより、エリート主義的かつ技術官僚的な組織へとつながります。"
    
