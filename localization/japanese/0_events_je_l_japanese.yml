    montreal_protocol_climate.t:0 "モントリオール議定書"
    montreal_protocol_climate.d:0 "モントリオール議定書は、気候変動対策を目的としたものではありませんでしたが、その後のこの問題に関する外交のモデルとなった歴史的な環境協定でした。世界中のあらゆる国が最終的にこの条約を批准し、クロロフルオロカーボン（CFC）などのオゾン層を破壊する物質の生産を停止することが義務付けられました。この議定書は、これらのオゾン層破壊物質のほぼ99パーセントを削減することに成功しています。2016年には、キガリ修正を通じて、気候変動の一因となる強力な温室効果ガスであるハイドロフルオロカーボン（HFC）の生産も削減することに締約国が合意しました。"
    earth_summit_climate.t:0 "地球サミット"
    earth_summit_climate.d:0 "アメリカ合衆国を含む197カ国によって批准されたこの画期的な協定は、気候変動に明示的に対処した初めての地球規模の条約でした。大気中の温室効果ガス濃度の安定化を目指す国際的な議論のための、締約国会議（COP）として知られる年次フォーラムが設立されました。これらの会合から京都議定書とパリ協定が誕生しました。"
    kyoto_protocol_climate.t:0 "京都議定書"
    kyoto_protocol_climate.d:0 "1997年に採択され2005年に発効した京都議定書は、初めて法的拘束力を持つ気候条約でした。これは先進国に対し、排出量を1990年レベルから平均5パーセント削減することを義務付け、各国の進捗を監視するシステムを確立しました。しかし、この条約は、主要な炭素排出国である中国やインドを含む途上国に対して行動を強制するものではありませんでした。アメリカ合衆国は1998年にこの協定に署名しましたが、批准はせず、後に署名を撤回しました。"
    paris_climate_accords_climate.t:0 "パリ気候変動協定"
    paris_climate_accords_climate.d:0 "これまでで最も重要な世界的な気候協定であるパリ協定は、すべての国に排出削減の公約を立てることを求めています。政府は、世界の平均気温の上昇を工業化以前の水準より2℃（3.6°F）以内に抑え、さらに1.5℃（2.7°F）未満に留める努力を追求することを目的として、国が決定する貢献（NDC）として知られる目標を設定します。また、今世紀後半には、排出される温室効果ガスの量と大気中から除去される量が等しくなる、世界的なネットゼロ・エミッションの達成も目指しています。"
    
    generic_climate_summit_timer.tt:0 "過去5年間に気候サミットは開催されていません。"
    hold_generic_climate_summit.tt:0 "[SCOPE.sState('climate_change_summit_location').GetCityHubName]で気候サミットを開催する ([SCOPE.sState('climate_change_summit_location').GetCountry.GetName])"
    je_climate_change_summit_button:0 "気候サミットを開催する"
    je_climate_change_summit_button_desc:0 "[ROOT.GetCountry.GetName]は、世界の政府に対してより優れた$lawgroup_environmental_policy$[Concept('concept_law','$concept_laws$')]を制定するよう求めるために、気候サミットを組織することができます。"
    
    je_climate_change_reforestation_start_button:0 "再植林政策を開始する"
    je_climate_change_reforestation_start_button_desc:0 "再植林とは、破壊または損傷した以前の森林や樹林地を回復させる取り組みです。\n\nこの政策を制定することで、気候変動の速度を遅らせることができます。"
    je_climate_change_reforestation_end_button:0 "再植林政策を終了する"
    je_climate_change_reforestation_end_button_desc:0 "再植林とは、破壊または損傷した以前の森林や樹林地を回復させる取り組みです。"
    je_climate_change_recycling_start_button:0 "リサイクル政策を開始する"
    je_climate_change_recycling_start_button_desc:0 "リサイクルとは、廃棄物を新しい材料や製品に変換するプロセスです。このコンセプトには、廃棄物からのエネルギー回収が含まれることもよくあります。材料のリサイクル性は、元の状態の特性を再取得できる能力に依存します。\n\nこの政策を制定することで、気候変動の速度を遅らせることができます。"
    je_climate_change_recycling_end_button:0 "リサイクル政策を終了する"
    je_climate_change_recycling_end_button_desc:0 "リサイクルとは、廃棄物を新しい材料や製品に変換するプロセスです。このコンセプトには、廃棄物からのエネルギー回収が含まれることもよくあります。材料のリサイクル性は、元の状態の特性を再取得できる能力に依存します。"
    je_climate_change_carbon_capture_start_button:0 "炭素回収政策を開始する"
    je_climate_change_carbon_capture_start_button_desc:0 "二酸化炭素回収・貯留とは、産業源から得られる比較的純度の高い二酸化炭素の流れを分離、処理し、長期的な貯留場所へと輸送するプロセスです。\n\nこの政策を制定することで、気候変動の速度を遅らせることができます。"
    je_climate_change_carbon_capture_end_button:0 "二酸化炭素回収政策を終了する"
    je_climate_change_carbon_capture_end_button_desc:0 "二酸化炭素回収・貯留とは、産業源から得られる比較的純度の高い二酸化炭素の流れを分離、処理し、長期的な貯留場所へと輸送するプロセスです。"
    
