    judiciary_veto.tt:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('supreme_court_name')]#r 反対#![concept_law][Concept('concept_enactment_of_laws', '$concept_enactment_of_laws_enactment$')]"
