    french_vietnam_state.indy.t:0 "ベトナム州？"
    french_vietnam_state.indy.d:0 "1949年5月20日、フランス国民議会はコーチシナの他のベトナム地域との再統合を承認しました。この決定は6月4日に発効し、7月2日にベトナム州が公式に宣言されました。1949年から1954年にかけて、コーチシナとの再統合後、ベトナム州はフランス連合内の連合州として、フランスから部分的な自治権を持っていました。"
    french_syria.indy.t:0 "シリアの独立？"
    french_syria.indy.d:0 "フランスの委任統治領（1923年–1946年）としての期間を経て、新たに創設されたこの州は、かつてオスマン帝国に統治されていたシリアの地方から誕生した最大の国家となりました。1945年10月24日、シリア共和国が国際連合の創設メンバーとなったことで、民主的な議会制共和国として法的な独立を勝ち取りました。この行為によって、かつてのフランスの委任統治は法的に終了しました（ただし、フランス軍が同国を去ったのは1946年4月まででした）。"
    french_saarland.indy.t:0 "ザール保護国の創設？"
    french_saarland.indy.d:0 "第二次世界大戦が欧州で終結してから2ヶ月後の1945年7月、同盟国は征服した地域からそれぞれの占領区域へと部隊を再配置していました。1945年7月10日、米軍がザールを離れ、フランス軍が占領行政を確立しました。1946年2月16日、フランスはザールを同盟国の占領区域から切り離し、独立したザール保護国を設立しました。これは、ドイツにおける同盟国管理評議会による同盟国の共同管轄下には、事実上もう置かれないこととなりました。"
    
