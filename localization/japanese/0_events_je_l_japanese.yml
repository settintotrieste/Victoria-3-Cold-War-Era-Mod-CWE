    espionage_cyber_attack_target.t:0 "[SCOPE.sCountry('suspected_espionage_attacker').GetAdjective]のスパイによるサイバー攻撃"
    espionage_cyber_attack_target.d:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('secret_police_custom_title')]は、[SCOPE.sCountry('suspected_espionage_attacker').GetAdjective]のハッカーが[SCOPE.sCountry('espionage_victim').GetAdjective]の$building_communications_network$に対してサイバー攻撃を実施したと報じています。"
    espionage_cyber_attack_target.f:0 "[SCOPE.sCountry('suspected_espionage_attacker').GetName]が秘密工作を行ったのはあくまで推測に過ぎないため、彼らを裏切り者として非難することは不適切かもしれません。"
    
