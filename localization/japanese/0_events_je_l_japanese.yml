    unconstitutional_state_of_emergency.t:0 "違憲な非常事態宣言"
    unconstitutional_state_of_emergency.d:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('supreme_court_name')]は、[ROOT.GetCountry.GetName]における[ROOT.GetCountry.GetRuler.GetFullName]の非常事態宣言の発令は、国内に実際の緊急事態が存在しない時期に行われたものであり、違法であるとの判断を下しました。そのため、裁判所は政府に対し、非常事態宣言を終了するよう命じています。"
    unconstitutional_state_of_emergency.f:0 "このイベントは、[ROOT.GetCountry.GetName]が[concept_war]にいない、あるいは[concept_revolution]の状態にないために発生しました。"
