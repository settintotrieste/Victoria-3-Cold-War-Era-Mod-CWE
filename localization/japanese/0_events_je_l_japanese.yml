    french_community.sgc.t:0 "フランス共同体"
    french_community.sgc.d:0 "フランス共同体は、1958年10月にフランスと、当時脱植民地化の過程にあったアフリカの残りの植民地との間で設立された憲法上の組織でした。これは、1946年に植民地帝国を再編したフランス連合に代わるものでした。フランス議会が1995年に公式に廃止するまで、共同体は形式的には存続していましたが、実際には1960年末までにその機能を停止していました。その頃には、すべてのアフリカのメンバーが独立を宣言し、共同体を離脱していました。"
