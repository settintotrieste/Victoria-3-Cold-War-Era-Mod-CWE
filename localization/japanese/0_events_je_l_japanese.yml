    je_economic_outlook_system:0 "国家経済見通し"
    je_economic_outlook_system_reason:0 "[ROOT.GetCountry.GetName]の国家経済見通しは、成長率、雇用レベル、インフレ率などの要因を含む、経済の将来の予測状態を測定する指標です。これは、特定の期間における経済の全体的な健全性とパフォーマンスを予測する役割を果たします。\n\n現在の経済スコア：[GetPlayer.MakeScope.Var('economic_strength_var').GetValue] / 40 \n\n現在の経済見通し：[SCOPE.GetRootScope.GetCountry.GetCustom('economic_outlook_custom_title')] \n\n#BOLD スコアの内訳：#! $economic_strength_economic_laws$ $economic_strength_government_finances$ $economic_strength_corruption$ $economic_strength_stock_market$ $economic_strength_national_economy$ $economic_strength_global_economy$ $economic_strength_core_inflation$ $economic_strength_wars$"
    je_economic_outlook_system_status:0 "経済スコア：[GetPlayer.MakeScope.Var('economic_strength_var').GetValue] / 40 \n前期半年間のGDP：@money![GetPlayer.MakeScope.Var('prev_half_year_GDP_display').GetValue]M \n当期半年間のGDP：@money![GetPlayer.MakeScope.Var('current_half_year_GDP_display').GetValue]M \n半年間のGDP成長率：#yellow [GetPlayer.MakeScope.Var('half_year_GDP_rate').GetValue]%#!"
    
