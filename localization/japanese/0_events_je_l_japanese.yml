    je_lower_house:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('lower_house_name')]"
    je_lower_house_reason:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('lower_house_name')]は[ROOT.GetCountry.GetName]の民主的に選出された議会であり、法律の制定と政府の業務を監視する責任を負っています。\n\n[concept_law]を通過させるには、[concept_government]において[SCOPE.GetRootScope.GetCountry.GetCustom('lower_house_name')]内の[SCOPE.GetRootScope.GetCountry.GetCustom('MPs_name')]の少なくとも#y 単純多数#!が必要です。\n\n政府の掌握：#BOLD [GetPlayer.MakeScope.Var('lower_house_majority_var').GetValue]%#!。\n\n[concept_interest_group]による議席配分：$LH_seat_distribution_loc$"
    je_lower_house_status:0 "[concept_government]支持議員：[GetPlayer.MakeScope.Var('lower_house_majority_var').GetValue]%"
    
    LH_seat_distribution_loc:0 "\n\n[GetInterestGroupVariant('ig_industrialists',GetPlayer).GetNameWithCountryVariant]：#BOLD [GetPlayer.MakeScope.Var('MPs_ig_industrialists_var_display').GetValue]%#!\n\n[GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetNameWithCountryVariant]：#BOLD [GetPlayer.MakeScope.Var('MPs_ig_petty_bourgeoisie_var_display').GetValue]%#!\n\n[GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetNameWithCountryVariant]：#BOLD [GetPlayer.MakeScope.Var('MPs_ig_trade_unions_var_display').GetValue]%#!\n\n[GetInterestGroupVariant('ig_landowners',GetPlayer).GetNameWithCountryVariant]：#BOLD [GetPlayer.MakeScope.Var('MPs_ig_landowners_var_display').GetValue]%#!\n\n[GetInterestGroupVariant('ig_devout',GetPlayer).GetNameWithCountryVariant]：#BOLD [GetPlayer.MakeScope.Var('MPs_ig_devout_var_display').GetValue]%#!\n\n[GetInterestGroupVariant('ig_rural_folk',GetPlayer).GetNameWithCountryVariant]：#BOLD [GetPlayer.MakeScope.Var('MPs_ig_rural_folk_var_display').GetValue]%#!\n\n[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetNameWithCountryVariant]：#BOLD [GetPlayer.MakeScope.Var('MPs_ig_armed_forces_var_display').GetValue]%#!\n\n[GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetNameWithCountryVariant]：#BOLD [GetPlayer.MakeScope.Var('MPs_ig_intelligentsia_var_display').GetValue]%#!"
    
    first_past_the_post_lower_house:0 "\n\nー[concept_government]の[concept_interest_group]が[concept_clout]を[GetPlayer.MakeScope.Var('lower_house_lower_limit_var_display').GetValue]%以上保有している[concept_incorporated_state]ごとに、[SCOPE.GetRootScope.GetCountry.GetCustom('lower_house_name')]における[concept_government]の掌握を#BOLD [GetPlayer.MakeScope.Var('lower_house_increment_FTP_upper_var').GetValue]%#!増加させる。"
    jefferson_system_lower_house:0 "\n\n- [concept_government] [concept_interest_group]が[GetPlayer.MakeScope.Var('lower_house_lower_limit_var_display').GetValue]%以上の[concept_clout]を持つ[concept_incorporated_state]ごとに、[SCOPE.GetRootScope.GetCountry.GetCustom('lower_house_name')]における[concept_government]の掌握力を#BOLD [GetPlayer.MakeScope.Var('lower_house_increment_FTP_upper_var').GetValue]%#!増加させる。\n\n- すべての[concept_state]において、[concept_government] [concept_interest_group]が持つ[concept_clout]の[GetPlayer.MakeScope.Var('lower_house_005_var').GetValue]%ごとに、[SCOPE.GetRootScope.GetCountry.GetCustom('lower_house_name')]における[concept_government]の掌握力を#BOLD [GetPlayer.MakeScope.Var('lower_house_increment_PR_var').GetValue]%#!増加させる。"
    propotional_representation_lower_house:0 "\n\n- [concept_government] [concept_interest_group]が持つ[concept_clout]の[GetPlayer.MakeScope.Var('lower_house_010_var').GetValue]%ごとに、[SCOPE.GetRootScope.GetCountry.GetCustom('lower_house_name')]における#BOLD 10%#!の[concept_government]の掌握力を得る。"
    
    notification_lower_house_composition_updated_name:0 "#o [SCOPE.GetRootScope.GetCountry.GetCustom('lower_house_name')]#! 再編されました！"
    notification_lower_house_composition_updated_desc:0 "#o [SCOPE.GetRootScope.GetCountry.GetCustom('lower_house_name')]#!における[SCOPE.GetRootScope.GetCountry.GetCustom('MPs_name')]の構成が変化しました。[concept_government]は現在、#o [SCOPE.GetRootScope.GetCountry.GetCustom('lower_house_name')]#!の#g [GetPlayer.MakeScope.Var('lower_house_majority_var').GetValue]%#!を掌握しています。"
    
