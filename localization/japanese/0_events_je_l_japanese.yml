    concept_official_character:0 "役職者"
    concept_official_character_desc:0 "この[concept_character]は、州の主要な役職者です。"
    
    reserve_powers_veto.t:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('government_ceremonial_body_custom_title')]が法案を拒否"
    reserve_powers_veto.d:0 "[SCOPE.sCharacter('ceremonial_head_of_state').GetPrimaryRoleTitle] [SCOPE.sCharacter('ceremonial_head_of_state').GetFullName]は、[SCOPE.sLaw('current_law_scope').GetName]を制定するために[SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')]で行われた法案を拒否しました。しかし、政府が[SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')]において絶対多数を得ている場合、その拒否を覆すことができます。"
    reserve_powers_veto.f:0 "このイベントは、[SCOPE.gsInterestGroup('ceremonial_head_of_state_ig').GetName]が現在制定中の法律に対して反対、または強く反対しているために発生しました。"
    reserve_powers_system_accept_option:0 "拒否権を受け入れ、法案を取り下げます。"
    reserve_powers_system_reject_option:0 "「[SCOPE.sCharacter('ceremonial_head_of_state').GetPrimaryRoleTitle]の拒否権を拒否する！」"
    reserve_powers_system_coup_option:0 "「[SCOPE.sCharacter('ceremonial_head_of_state').GetPrimaryRoleTitle]の拒否権を単に無視する」"
    
    judiciary_veto.t:0 "法律の制定に対する法的異議申し立て"
    judiciary_veto.d:0 "[SCOPE.gsInterestGroup('legal_challenge_plaintiff_scope').GetName]の主要メンバーが[SCOPE.GetRootScope.GetCountry.GetCustom('supreme_court_name')]に訴訟を起こし、[concept_government]による[SCOPE.sLaw('current_law_scope').GetName]を制定するための法案の合法性に異議を唱えました。彼らは、この法案が[ROOT.GetCountry.GetName]の憲法に違反しており、[SCOPE.GetRootScope.GetCountry.GetCustom('supreme_court_name')]によって事前に阻止されるべきであると主張しました。この主張は判事たちの懐柔に成功し、彼らは彼らに有利な命令を即座に下しました。"
    judiciary_veto.f:0 "このイベントは、[SCOPE.sLaw('current_law_scope').GetName]に対して反対または強く反対している[concept_interest_group]が存在し、かつ[SCOPE.GetRootScope.GetCountry.GetCustom('supreme_court_name')]が、司法手段を通じて法律を後退させようとする[concept_interest_group]の試みを支持するほど進歩的、あるいは退歩的であるために発生しました。"
    judicial_veto_accept_option:0 "裁判所の判決を受け入れます！"
    judicial_veto_reject_option:0 "「裁判所の判決を回避して立法を行う」"
    
    ig_angry_with_government:0 "憤慨した利益集団"
    
    je_abolish_filibuster_button:0 "討論終結規定の廃止"
    je_abolish_filibuster_button_desc:0 "元老院における無制限の討論という伝統により、フィリバスターが利用可能となっています。フィリバスターとは、法案、決議、修正、その他の討論すべき事項についての投票を遅延または阻止するために行われる、緩やかに定義された行動を指します。これは討論終結規定によって可能となっており、法律を制定段階へと進めるためには、正当に選出され宣誓を行った全元老院議員の5分の3、または100名の元老院議員のうち60名が、討論を終了させるために投票しなければなりません。"
    je_fire_council_chairperson_button:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('government_ceremonial_ruler_custom_title')]を削除"
    je_fire_council_chairperson_button_desc:0 "「[concept_government]は、望むときはいつでも[SCOPE.GetRootScope.GetCountry.GetCustom('government_ceremonial_ruler_custom_title')]を入れ替えることができる。今、そうすべきではないだろうか？」"
    fire_ceremonial_head_of_state_timer.tt:0 "過去12か月間に[SCOPE.GetRootScope.GetCountry.GetCustom('government_ceremonial_ruler_custom_title')]を一度も発射していません"
    fire_ceremonial_head_of_state.tt:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('government_ceremonial_ruler_custom_title')][SCOPE.sCharacter('ceremonial_head_of_state').GetFullName]を発射せよ！"
    
    OPEC_oil_embargo:0 "OPEC石油禁輸"
    OPEC_oil_embargo_action_name:0 "[concept_OPEC_oil_embargo]"
    OPEC_oil_embargo_action_propose_name:0 "[concept_OPEC_oil_embargo]"
    OPEC_oil_embargo_action_break_name:0 "[concept_OPEC_oil_embargo]を終了"
    OPEC_oil_embargo_pact_desc:0 "[SCOPE.GetRootScope.GetDiplomaticPact.GetFirstCountry.GetName]は[Concept('concept_OPEC_oil_embargo', '$concept_OPEC_oil_embargoing$')][SCOPE.GetRootScope.GetDiplomaticPact.GetSecondCountry.GetName]です。"
    OPEC_oil_embargo_desc:0 "#header $OPEC_oil_embargo$#!\n$TOOLTIP_DELIMITER$\n他の[concept_country]に[concept_OPEC_oil_embargo]を課す[concept_ongoing_diplomatic_action]です。"
    OPEC_oil_embargo_action_notification_name:0 "[concept_OPEC_oil_embargo]"
    OPEC_oil_embargo_action_notification_desc:0 "[INITIATOR_COUNTRY.GetName]が我々に対して[Concept('concept_OPEC_oil_embargo', '$concept_OPEC_oil_embargoing$')]を開始しました。彼らの[concept_market]において確立された我々の[Concept('concept_trade_route','$concept_trade_routes$')]は、もはや機能しません。"
    OPEC_oil_embargo_action_notification_third_party_name:0 "[concept_OPEC_oil_embargo]"
    OPEC_oil_embargo_action_notification_third_party_desc:0 "[INITIATOR_COUNTRY.GetName]が[Concept('concept_OPEC_oil_embargo', '$concept_OPEC_oil_embargoing$')][TARGET_COUNTRY.GetName]を開始しました。"
    OPEC_oil_embargo_action_notification_break_name:0 "[concept_OPEC_oil_embargo]が終了"
    OPEC_oil_embargo_action_notification_break_desc:0 "[INITIATOR_COUNTRY.GetName]は我々への[Concept('concept_OPEC_oil_embargo', '$concept_OPEC_oil_embargoing$')]を停止しました。"
    OPEC_oil_embargo_action_notification_third_party_break_name:0 "[concept_OPEC_oil_embargo]が終了"
    OPEC_oil_embargo_action_notification_third_party_break_desc:0 "[INITIATOR_COUNTRY.GetName]は[TARGET_COUNTRY.GetName]との[concept_OPEC_oil_embargo]を終了しました。"
    DIPLO_ACTION_RELATIONS_CORDIAL_OR_HIGHER_OPEC:0 "[concept_relations]は少なくとも任意のOPEC加盟国と$relations_cordial$の状態にあります"
 
    concept_OPEC_oil_embargo:0 "OPEC石油禁輸"
    concept_OPEC_oil_embargoed:1 "OPECによる禁輸措置"
    concept_OPEC_oil_embargoes:0 "OPECによる禁輸措置"
    concept_OPEC_oil_embargoing:1 "禁輸"
    concept_OPEC_oil_embargo_desc:6 "[concept_OPEC_oil_embargo]とは、OPECとその加盟国が特定の国への石油輸出を行わないことに集団で合意した状態を指します。しかし、禁輸対象国と良好な関係にある場合、一部のOPEC加盟国は禁輸に参加しないことを決定する場合があります。注：V3エンジンは現在、特定の商品に対する禁輸をまだサポートしていないため、この外交アクションでは完全な禁輸が開始されます。"
    
    DIPLO_ACTION_CREATE_OPEC_EMBARGO:0 "[SCOPE.sCountry('OPEC_embargo_target').GetName]に対する[concept_OPEC_oil_embargo]に参加する"
    OPEC_embargo_invitation.t:0 "[SCOPE.sCountry('OPEC_embargo_target').GetName]に対するOPEC石油禁輸？"
    OPEC_embargo_invitation.d:0 "OPECのリーダーである[SCOPE.sCountry('OPEC_leader').GetName]が、すべてのOPEC加盟国に対して[SCOPE.sCountry('OPEC_embargo_target').GetName]への石油輸出を停止するよう求める決議を採択しました。[ROOT.GetCountry.GetName]はOPECのメンバーであるため、禁輸に参加するか、あるいは参加しないかを選択できます。"
    OPEC_embargo_invitation.f:0 "[SCOPE.sCountry('OPEC_leader').GetName]は、互いに敵対関係にあること、および[SCOPE.sCountry('OPEC_leader').GetName]が他のすべてのOPEC加盟国と$relations_amicable$関係にあり、それによってOPECに対してそのような要請を行う自信を得たため、[SCOPE.sCountry('OPEC_embargo_target').GetName]に対して石油禁輸を開始しました。注：V3エンジンは現在、特定の商品に対する禁輸をまだサポートしていないため、この外交アクションでは完全な禁輸が開始されます。"
    OPEC_accept_embargo:0 "石油禁輸に参加する！"
    OPEC_reject_embargo:0 "「我々は、誰からも貴重な石油を奪うことはしない。」"
    
    special_administrative_region_system.1.t:0 "[SCOPE.sCountry('SAR_country').GetName]特別行政区"
    special_administrative_region_system.1.d:0 "[ROOT.GetCountry.GetName]は、[SCOPE.sCountry('SAR_country').GetName]における新しい特別行政区の形成を発表しました。これにより、[SCOPE.sCountry('SAR_country').GetName]の人々は[ROOT.GetCountry.GetAdjective]に従属し続ける代わりに、自国の政治に対してより大きな自治権を得ることになります。国際社会はこのニュースを大きな喝采をもって歓迎しました。"
    special_administrative_region_system.1.f:0 "[ROOT.GetCountry.GetName]の母国であった従属国の首都であったため、[SCOPE.sCountry('SAR_country').GetName]特別行政区となります。この取り決めにより、[SCOPE.sCountry('SAR_country').GetName]は国際法の下で[ROOT.GetCountry.GetName]に正当に属するものとみなされるため、この領土が脱植民地化システムを通じて独立を求めることは回避されます。"
    special_administrative_region_system_option:0 "素晴らしい！"
    DIPLO_ACTION_CREATE_SAR_SUBJECT_TYPE:0 "[SCOPE.sCountry('SAR_country').GetName]特別行政区を創設する"
    
    dominion_clean_up_system.1.t:0 "[SCOPE.sCountry('dominion_to_satellite_country').GetAdjective]衛星国"
    dominion_clean_up_system.1.d:0 "[ROOT.GetCountry.GetName]が[SCOPE.sCountry('dominion_to_satellite_country').GetName]に対して持つ掌握レベルから、後者が前者の$subject_type_satellite$へと変貌していることはますます明らかになっています。"
    dominion_clean_up_system.1.f:0 "[ROOT.GetCountry.GetName]は君主制ではないため、$subject_type_dominion$を持つことができるのは君主制国家のみであり、[SCOPE.sCountry('dominion_to_satellite_country').GetName]は$subject_type_dominion$から$subject_type_satellite$へと変換されました。"
    dominion_clean_up_system_option:0 "了解"
    DIPLO_ACTION_CREATE_SATELLITE_SUBJECT_TYPE:0 "[SCOPE.sCountry('dominion_to_satellite_country').GetName]が$subject_type_satellite$になる"
    
    restore_correct_capital_system.t:0 "[ROOT.GetCountry.GetName]の新しい首都？"
    restore_correct_capital_system.d:0 "[ROOT.GetCountry.GetName]の現在の首都である[SCOPE.sState('wrong_capital').GetName]は、歴史家や国民から正しい首都とはみなされていません。そのため、正しい州を首都として指定するための動議が議会に提出されました。"
    restore_correct_capital_system.f:0 "[ROOT.GetCountry.GetName]の首都が歴史にそぐわないため、このイベントが発生しました。"
    restore_correct_capital_system_option.1:0 "首都を移転せよ！"
    restore_correct_capital_system_option.2:0 "[SCOPE.sState('wrong_capital').GetName]の方がより適した首都です。"
    
    impeached_politician:0 "議会による弾劾"
    survived_impeachment:0 "弾劾を生き延びる"
    je_impeachment_system:0 "[SCOPE.sCharacter('impeached_president_scope').GetFullName]の弾劾"
    je_impeachment_system_reason:0 "[ROOT.GetCountry.GetName]の憲法に基づき、大統領は反逆罪、収賄罪、その他の重大な犯罪および職務怠慢による弾劾および有罪判決を受けた場合、その職を解かれるものとします。[SCOPE.sCharacter('impeached_president_scope').GetFullName]が弾劾に相当する違反行為を犯したため、大統領を解任するための弾劾条項が議会で可決されました。しかしながら、憲法によれば、大統領を解任するには有罪判決を下すための元老院の3分の2以上の投票が必要です。\n\nタイマー終了時に[concept_legitimacy]が34を下回った場合、[SCOPE.sCharacter('impeached_president_scope').GetFullName]は弾劾され、その職を解かれます。"
    je_impeachment_system_1.tt:0 "[SCOPE.sCharacter('impeached_president_scope').GetFullName]が弾劾され、その職を解かれる"
    je_impeachment_system_2.tt:0 "[SCOPE.sCharacter('impeached_president_scope').GetFullName]は弾劾されず、その職に留まる"
    je_impeachment_system_3.tt:0 "[SCOPE.sCharacter('impeached_president_scope').GetFullName]は汚職、反逆、あるいは不当な権力掌握を行っている。"
    je_impeachment_system_4.tt:0 "[SCOPE.sCharacter('impeached_president_scope').GetFullName]は最近弾劾されていない。"
    je_impeachment_system_5.tt:0 "[SCOPE.sCharacter('impeached_president_scope').GetFullName]はもはや大統領ではない"
    
    backbenchers_plot_politician:0 "平議員による陰謀の標的"
    survived_backbenchers_plot:0 "平議員による陰謀を生き延びた"
    party_in_chaos_modifier:0 "内部の混乱"
    je_backbenchers_plot_system:0 "[SCOPE.sCharacter('backbenchers_plot_prime_minister_scope').GetFullName]を追放するための平議員による陰謀"
    je_backbenchers_plot_system_reason:0 "[ROOT.GetCountry.GetName]の議院内閣制の下では、[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]は議会および与党または連立政権の信任を得ることで初めてその職に留まることができます。[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]は通常、所属政党または連立政権の国会議員から支持を得ますが、議員たちが[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]への支持を打ち切ると宣言したり、党内の指導部交代を求める挑戦を開始したりすることで、[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]を追放しようとする場合もあります。\n\n[SCOPE.sCharacter('backbenchers_plot_prime_minister_scope').GetFullName]は与党の有力なメンバーから非常に嫌われており、平議員たちが[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]を失脚させるために指導部への挑戦を開始しました。\n\n@warning! タイマーが終了した際、[concept_government]内の[concept_interest_group]が少なくとも#yellow 中立#!の支持を得ていない場合、[SCOPE.sCharacter('backbenchers_plot_prime_minister_scope').GetFullName]は解任されます。"
    je_backbenchers_plot_system_1.tt:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]の[SCOPE.sCharacter('backbenchers_plot_prime_minister_scope').GetFullName]が解任されました"
    je_backbenchers_plot_system_2.tt:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]の[SCOPE.sCharacter('backbenchers_plot_prime_minister_scope').GetFullName]は解任されませんでした"
    je_backbenchers_plot_system_3.tt:0 "[SCOPE.sCharacter('backbenchers_plot_prime_minister_scope').GetFullName]は最近、平議員による陰謀の標的にはなっていません"
    je_backbenchers_plot_system_4.tt:0 "[SCOPE.sCharacter('backbenchers_plot_prime_minister_scope').GetFullName]はもはや[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]ではありません"
    je_backbenchers_plot_system_5.tt:0 "[SCOPE.sCharacter('backbenchers_plot_prime_minister_scope').GetFullName]が腐敗しているか、反逆者であるか、不法に権力を掌握しているか、あるいは[concept_government]に不満を持っている[concept_interest_group]が少なくとも1人存在しています。"
    
    lost_confidence_vote_modifier:0 "不信任決議での敗北"
    survived_vote_of_no_confidence:0 "不信任決議の突破"
    je_vote_of_no_confidence_system_1.tt:0 "政府が不信任決議に敗れました"
    je_vote_of_no_confidence_system_2.tt:0 "政府が不信任決議を勝ち取りました"
    je_vote_of_no_confidence_system:0 "不信任決議"
    je_vote_of_no_confidence_system_reason:0 "[ROOT.GetCountry.GetName]の議院内閣制の下では、[concept_government]は議会の信任を得ることによってのみ留任できます。\n\n現在の政府が[ROOT.GetCountry.GetAdjective]議会の議席を50%未満しか確保できていないため、[concept_opposition]は政府を打倒し、100日後に総選挙を実施するために不信任決議を提出しました。したがって、タイマーが終了する際に政府が25人以上の[concept_legitimacy]を確保できるようにすることが極めて重要です。"
    
    contested_dictator:0 "指導力への脅威"
    politically_strengthened_modifier:0 "政治的強化"
    popular_government_modifier:0 "人気のある政府"
    je_plot_against_the_dictator_system:0 "[SCOPE.sCharacter('targeted_dictator_scope').GetFullName]への陰謀"
    je_plot_against_the_dictator_system_reason:0 "[SCOPE.sCharacter('targeted_dictator_scope').GetFullName]を失脚させるべく、[concept_government]の上級メンバーによる陰謀が発見されました。\n\nこの陰謀を乗り切るために、[SCOPE.sCharacter('targeted_dictator_scope').GetFullName]はタイマーが終了する際に、[concept_legitimacy]を20以上に保ち、かつ[concept_government]内のどの[concept_interest_group]も不満を持っていない状態を確保する必要があります。"
    je_plot_against_the_dictator_system_1.tt:0 "[SCOPE.sCharacter('targeted_dictator_scope').GetFullName]の政治的地位が強化されました"
    je_plot_against_the_dictator_system_2.tt:0 "[SCOPE.sCharacter('targeted_dictator_scope').GetFullName]の[concept_interest_group]が弱体化しました"
