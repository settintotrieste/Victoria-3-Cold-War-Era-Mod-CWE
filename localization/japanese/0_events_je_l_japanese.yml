    concept_progressive_judiciary:0 "進歩的"
    concept_progressive_judiciary_desc:0 "進歩的な裁判官とは、憲法は成文化された文書であり、したがって、その時々の社会政治的な状況に従って解釈されるべきであると考える人々のことです。これにより、時間の経過とともに、市民の基本的自由を拡大するディシジョンへとつながっていきます。"
    concept_conservative_judiciary:0 "原文主義者"
    concept_conservative_judiciary_desc:0 "原文主義者の裁判官とは、憲法は成文化された文書であり、したがって、その時々の社会政治的な状況に従って解釈されるべきではないと考える人々のことです。憲法が完璧に書かれていることは稀であるため、これは時間の経過とともに、市民の基本的自由を弱めるディシジョンへとつながっていきます。"
    
    judiciary_progress_generic_desc:0 "画期的な判決において、[SCOPE.GetRootScope.GetCountry.GetCustom('supreme_court_name')]は、[ROOT.GetCountry.GetAdjectiveNoFlag]の市民の基本的自由を制限する法律は違憲であると裁定しました。そのディシジョンを正当化するにあたり、裁判所は[ROOT.GetCountry.GetName]における法の支配を維持し、強化する必要性を挙げました。しかし、これはあくまで司法判断に過ぎないため、[concept_government]はこれを覆すための法案を可決することができます。"
    judiciary_regress_generic_desc:0 "画期的な判決により、[SCOPE.GetRootScope.GetCountry.GetCustom('supreme_court_name')]は[ROOT.GetCountry.GetAdjectiveNoFlag]の市民の基本的自由を維持する法律を無効化できるとの裁定を下しました。裁判所は判決の正当性を主張するにあたり、憲法の曖昧で不正確な可能性のある文言が、以前は許されないと考えられていた活動を可能にする法の抜け穴を生み出したと論じました。しかし、これは司法判断に過ぎないため、[concept_government]はこれを覆すための法案を可決させることができます。"
    
