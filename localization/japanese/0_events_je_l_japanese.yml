    join_nuclear_non_proliferation_treaty_decision:0 "核兵器不拡散条約に署名"
    join_nuclear_non_proliferation_treaty_decision_desc:0 "核兵器不拡散条約は、核兵器および核技術の拡散を防止し、核エネルギーの平和利用における協力を促進し、核軍縮および一般的かつ完全な軍縮の達成という目標を推進することを目的とした国際条約です。なお、この条約に署名すると、この国からすべての核兵器が除去され、進行中の核兵器開発計画はすべて終了します。"
    signed_NPT_1_tt:0 "この国は核兵器不拡散条約に署名し、少なくとも10年間はこれに拘束されます。"
    
    leave_nuclear_non_proliferation_treaty_decision:0 "核兵器不拡散条約を破棄"
    leave_nuclear_non_proliferation_treaty_decision_desc:0 "核兵器不拡散条約は、核兵器および兵器技術の拡散防止、核エネルギーの平和利用における協力の促進、ならびに核軍縮および一般的かつ完全な軍縮の達成という目標を推進するための国際条約です。この条約を破棄することで、この国は再び核兵器開発計画を開始できるようになります。"
    signed_NPT_2_tt:0 "この国は少なくとも10年間、核兵器不拡散条約の締約国となっています。"
    
    did_not_sign_NPT_tt:0 "この国は核兵器不拡散条約の締約国ではありません。"
    
    join_chemical_non_proliferation_treaty_decision:0 "化学兵器禁止条約に署名"
    join_chemical_non_proliferation_treaty_decision_desc:0 "化学兵器禁止条約（CWC）は、オランダのハーグに拠点を置く政府間組織である化学兵器禁止機関（OPCW）によって管理される軍備管理条約です。この条約は1997年4月29日に発効しました。化学兵器の使用を禁止するとともに、非常に限られた目的（研究、医療、医薬品、または防護目的）を除き、化学兵器またはその前駆体の規模の大きな開発、生産、備蓄、または移転を禁止しています。"
    signed_CWC_1_tt:0 "この国は化学兵器禁止条約に署名し、少なくとも10年間はこれに拘束されます。"
    
    leave_chemical_non_proliferation_treaty_decision:0 "化学兵器禁止条約を破棄"
    leave_chemical_non_proliferation_treaty_decision_desc:0 "化学兵器禁止条約（CWC）は、オランダのハーグに拠点を置く政府間組織である化学兵器禁止機関（OPCW）によって管理される兵器管理条約です。この条約は1997年4月29日に発効しました。非常に限られた目的（研究、医療、製薬、または防護）を除き、化学兵器の使用、ならびに化学兵器やその前駆体の、大規模な開発、生産、備蓄、または移転を禁止しています。この条約を破棄することで、この国は再び化学兵器開発計画を開始できるようになります。"
    signed_CWC_2_tt:0 "この国は、少なくとも10年間にわたり化学兵器禁止条約の締約国となっています。"
    
    did_not_sign_CWC_tt:0 "この国は化学兵器禁止条約の締約国ではありません。"
    
    join_biological_non_proliferation_treaty_decision:0 "生物兵器禁止条約に署名"
    join_biological_non_proliferation_treaty_decision_desc:0 "生物兵器禁止条約（または生物学的・毒素兵器禁止条約）は、生物兵器および毒素兵器の開発、生産、取得、移転、備蓄、および使用を禁止することによって、これらを事実上禁止する軍縮条約です。"
    signed_BWC_1_tt:0 "この国は生物兵器禁止条約に署名し、少なくとも10年間はその拘束を受けます。"
    
    leave_biological_non_proliferation_treaty_decision:0 "生物兵器禁止条約を破棄"
    leave_biological_non_proliferation_treaty_decision_desc:0 "生物兵器禁止条約（または生物学的・毒素兵器禁止条約）は、生物兵器および毒素兵器の開発、生産、取得、移転、備蓄、および使用を禁止することによって、これらを事実上禁止する軍縮条約です。この条約を破棄することで、この国は再び生物兵器開発計画を開始できるようになります。"
    signed_BWC_2_tt:0 "この国は、少なくとも10年間にわたり生物兵器禁止条約の締約国となっています。"
    
    did_not_sign_BWC_tt:0 "この国は生物兵器禁止条約の締約国ではありません。"
    
    generic_decolonisation_indy.1.tt:0 "[SCOPE.sCountry('overlord_in_question_scopes').GetName]に対して独立戦争を宣言する！"
    generic_decolonisation_indy.t:0 "[ROOT.GetCountry.GetAdjective]の独立戦争を行うか？"
    generic_decolonisation_indy.d:0 "[ROOT.GetCountry.GetAdjective]の人々は、[SCOPE.sCountry('overlord_in_question_scopes').GetName]が[ROOT.GetCountry.GetName]への独立を躊躇していることに憤慨しています。このようなナショナリズムの高まりを受けて、政府の特定のメンバーが[SCOPE.sCharacter('puppet_leader_in_question_scopes').GetFullName]に対し、一つの急進的な提案を行いました。[ROOT.GetCountry.GetName]は独立を宣言し、[SCOPE.sCountry('overlord_in_question_scopes').GetName]とのあらゆる関係を一方的に断ち切るべきであるというものです。"
    generic_decolonisation_indy.f:0 "[ROOT.GetCountry.GetAdjective]の独立のために戦うことを拒めば、政府の全員が臆病者という汚名を被ることになります。"
    generic_decolonisation_indy.option.1:0 "「自由のために戦え！」"
    generic_decolonisation_indy.option.2:0 "「ふん、自由なんて大したことはない……」"
    
    self_governing_colony.tt:0 "[SCOPE.sCulture('culture_to_release').GetName]植民地で$semi_autonomous_colony$を作成する"
    generic_decolonisation_indy_2a.t:0 "[SCOPE.sCulture('culture_to_release').GetName]の自治？"
    generic_decolonisation_indy_2b.t:0 "[SCOPE.sState('state_to_release').GetName]に自治権を？"
    generic_decolonisation_indy_2.d:0 "[SCOPE.sState('state_to_release').GetName]における[SCOPE.sCulture('culture_to_release').GetName]の人々は、[ROOT.GetCountry.GetName]に対し、[concept_homeland]の自治を認めるよう求めています。"
    generic_decolonisation_indy_2.f:0 "[SCOPE.sCulture('culture_to_release').GetName]の要求を受け入れると、[SCOPE.sCulture('culture_to_release').GetName]の[concept_homeland]に$XFC$が作成され、その後、適切な国へと自動的に改宗されます。"
    generic_decolonisation_indy_2.option.1:0 "「我々は、彼らの内政自治への謙虚な要求を受け入れる。」"
    generic_decolonisation_indy_2.option.2:0 "「否、[SCOPE.sState('state_to_release').GetName]には直接統治を維持すべきである！」"
    
    generic_decolonisation_indy.3.t:0 "[SCOPE.sState('state_to_release').GetName]における脱植民地化の失敗"
    generic_decolonisation_indy.3.d:0 "[SCOPE.sState('state_to_release').GetName]における[SCOPE.sCulture('primary_culture_scope').GetName]の人々は、自国の脱植民地化の方法を決定できず、そのため、この植民地は外国勢力による直接統治へと戻ることになります。"
    generic_decolonisation_indy.3.f:0 "このイベントは、[SCOPE.sCountry('failed_country_scope').GetName]の国タグが変化できる条件を満たす国が存在しなかったために発生しました。そのため、[SCOPE.sCountry('failed_country_scope').GetName]は宗主国によって再併合されます。宗主国が存在しない場合は、[concept_primary_cultures]を共有している国によって再併合されます。"
    generic_decolonisation_indy_3.option:0 "悲しいことではあるが、不運とまでは言えない。"
    
    generic_decolonisation_indy.4.t:0 "[ROOT.GetCountry.GetNameNoFlag]の独立"
    generic_decolonisation_indy.4.d:0 "[SCOPE.sState('indy_capital').GetCityHubName]で開催された盛大な式典において、[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]の[ROOT.GetCountry.GetRuler.GetFullName]が、外国の統治者から[ROOT.GetCountry.GetName]国民への権力の委譲を行いました。続いて新しい[ROOT.GetCountry.GetAdjective]国旗が掲げられ、参列した群衆は歓喜に沸きました。"
    generic_decolonisation_indy.4.f:0 "我ら[ROOT.GetCountry.GetNameNoFlag]国民は、ここに[ROOT.GetCountry.GetNameNoFlag]の独立を宣言する。権力の委譲およびその他の事項は、秩序ある方法で、かつ可能な限り最短の時間で遂行されるものとする。\n\n[ROOT.GetCountry.GetNameNoFlag]国民の名において。\n\n[ROOT.GetCountry.GetRuler.GetFullName]"
    generic_decolonisation_indy.4.option.1:0 "我々はあらゆる民のために、一つの国を築き上げるのだ！"
    generic_decolonisation_indy.4.option.2:0 "[SCOPE.sCulture('preferred_culture').GetName]の大義万歳！"
    
    special_administrative_region.tt:0 "[SCOPE.sState('state_to_release').GetName]に[concept_special_administrative_region]を作成する"
    devolution_system_1a.t:0 "[SCOPE.sCulture('culture_to_release').GetName]、$special_administrative_region$？"
    devolution_system_1b.t:0 "[SCOPE.sState('state_to_release').GetName]での権限委譲？"
    devolution_system_1.d:0 "[SCOPE.sState('state_to_release').GetName]における[SCOPE.sCulture('culture_to_release').GetName]の人々は、[ROOT.GetCountry.GetName]に対し、内政に関する[concept_homeland]の自治権を拡大するよう要求しました。"
    devolution_system_1.f:0 "[SCOPE.sCulture('culture_to_release').GetName]の要求を受け入れると、[SCOPE.sCulture('culture_to_release').GetName]の[concept_homeland]に$XFC$が作成され、その後、適切な国へと自動的に変換されます。"
    devolution_system_1.option.1:0 "「我々は、彼らの内政自治に関する謙虚な要請を受け入れる」"
    devolution_system_1.option.2:0 "「否、[SCOPE.sState('state_to_release').GetName]における直接統治は維持されるべきだ！」"
    
    personal_union.tt:0 "[SCOPE.sCountry('personal_union_junior_scope').GetName]は[SCOPE.sCountry('personal_union_leader_scope').GetName]の下で$personal_union$に入ります。"
    
