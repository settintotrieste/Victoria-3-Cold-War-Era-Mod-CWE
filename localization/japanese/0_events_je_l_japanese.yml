    je_UN_system:0 "国際連合"
    je_UN_system_reason:0 "国際連合（UN）は、国際的な平和と治安維持を維持し、諸国間の友好関係を発展させ、国際協力を達成し、諸国のアクションを調和させる中心地としての役割を果たすことを目的とする政府間組織です。\n\nUNには6つの主要な活動組織があります。すなわち、総会、安全保障理事会、経済社会理事会、国際司法裁判所、国連事務局、および信託統治理事会ですが、信託統治理事会は1994年以降活動していません。\n\n国連の最高行政責任者は事務総長です。\n\n国連安保理理事国総数：[GetGlobalVariable('UN_unsc_members_counter').GetValue]\n\n$un_headquarters_country_label.tt$\n\n$unsg_character_label.tt$"
    je_UN_system_status:0 "総加盟国数：[GetGlobalVariable('UN_members_counter').GetValue]"
    
