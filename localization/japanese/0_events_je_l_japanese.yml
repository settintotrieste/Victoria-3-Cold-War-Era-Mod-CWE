    oil_cartel_desc_1: "[ROOT.GetCountry.GetAdjective]の石油・ガス産業は少数の企業によって支配されており、それらの企業は[ROOT.GetCountry.GetName]におけるすべての石油およびガスの生産を共同で独占しています。このような力を持つことで、これらの企業は[GetBuildingType('building_oil_rig').GetName]の出力を調整することにより、国内における[GetGoods('oil').GetName]の価格を事実上決定することができます。\n\nしかしながら、[concept_government]は石油生産を規制することで、石油価格が民間企業ではなく[concept_government]によって決定されるように選択することも可能です。\n\n注：石油・ガス産業を規制すれば[concept_government]は[GetGoods('oil').GetName]に対する生産割当を設定できるようになりますが、石油・ガス産業を規制緩和すれば、民間部門が[GetGoods('oil').GetName]の[concept_market_price]に基づいて割当を設定できるようになります。"
    oil_cartel_desc_2: "[ROOT.GetCountry.GetName]の社会主義経済の下では、石油・ガス産業は石油省を通じて[concept_government]によって直接支配および規制されています。これにより[concept_government]は、すべての[GetBuildingType('building_oil_rig').GetName]の生産出力を直接制御することが可能になります。"
    
