    commonwealth_leader:0 "イギリス連邦主導国"
    form_commonwealth_decision:0 "イギリス連邦を結成"
    form_commonwealth_decision_desc:0 "イギリス連邦は、かつてイギリスの植民地であったが「自由かつ平等」とみなされる国々の間の政治的な連合体です。加盟国は互いに法的義務を負いませんが、英語の使用や歴史的な結びつきによってつながっています。イギリス連邦加盟国の市民権を持つと、一部の加盟国、特にイギリスにおいて特典を受けることができます。イギリス連邦認可は、4年ごとに開催されるコモンウェルスゲームズによって促進される、民主主義、人権、および法の支配という共通の価値観を定義しています。"
