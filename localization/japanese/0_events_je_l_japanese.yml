    spending_policy_ideology.t:0 "政府支出に関する新たな世論"
    spending_policy_ideology.d:0 "[ROOT.GetCountry.GetName]における新たな経済状況を受けて、[SCOPE.gsInterestGroup('affected_IG_scope').GetName]の[concept_interest_group]は、適切な政府支出のレベルに関するスタンスを変更する意向を表明しました。"
    spending_policy_ideology.f:0 "経済状況が、政府支出に対する適切な動態[concept_ideology]と一致しなくなったため、このイベントが発生しました。"
    
    population_policy_ideology.t:0 "人口政策に関する新たな世論"
    population_policy_ideology.d:0 "[ROOT.GetCountry.GetName]における新たな社会経済状況を受けて、[SCOPE.gsInterestGroup('affected_IG_scope').GetName]の[concept_interest_group]は人口増加領域における政府介入の適正レベルに関するスタンスを変更する意向を表明しました。"
    population_policy_ideology.f:0 "平均的な[concept_sol]が、人口政策に対する適切な動態[concept_ideology]と一致しなくなったため、このイベントが発生しました。\n\n#BOLD [concept_ideology]の変化は以下の通りです：#!\n\n#BOLD [concept_sol] #green 25以上#! - $ideology_pro_population$[concept_ideology]\n\n#BOLD [concept_sol] #yellow 10～25#! - $ideology_neutral_population$[concept_ideology]\n\n#BOLD [concept_sol] #red 10以下#! - $ideology_anti_population$[concept_ideology]"
    
    dynamic_ideology_system_1.option:0 "変化を受け入れる。"
    dynamic_ideology_system_2.option:0 "[concept_interest_group]に潜入しているスパイを利用して、これを阻止する。"
    
    changing_civil_defence_level:0 "最近変更された民間防衛レベル"
    
    je_civil_defence:0 "[ROOT.GetCountry.GetAdjectiveNoFlag]の民間防衛"
    je_civil_defence_reason:0 "民間防衛とは、人為的および自然災害から州の市民（通常は非戦闘員）を保護するための取り組みです。これは、予防、軽減、準備、対応、あるいは緊急避難と復旧といった、緊急事態における原則に基づいています。\n\nこのModでは、民間防衛によって核戦争や戦略爆撃の影響を軽減できます。\n\n注：より高度な軍事技術を研究することで、民間防衛の力を強化できます。"
    je_civil_defence_increase_civil_defence_button:0 "資金を増やす"
    je_civil_defence_increase_civil_defence_button_desc:0 "割り当てられた資金を増やすことで、州は民間防衛のレベルを引き上げます。"
    je_civil_defence_decrease_civil_defence_button:0 "資金を減らす"
    je_civil_defence_decrease_civil_defence_button_desc:0 "割り当てられた資金を減らすことで、州は民間防衛のレベルを引き下げます。"
    
    USA_PER_Hostage_Crisis.t:0 "イラン人質危機？"
    USA_PER_Hostage_Crisis.d:0 "イラン人質危機は、イランとアメリカ合衆国の間の外交的対立でした。イラン革命を支持する「イマームの路に従うムスリム学生グループ」に属する、ホセイン・デフガン、モハンマド・アリ・ジャファリ、モハンマド・バゲリを含む武装したイランの大学生グループがテヘランの米国大使館を占拠して53人のアメリカ人外交官と市民を人質に取ったことで発生しました。"
    USA_SOV_U2_Incident.t:0 "U-2事件？"
    USA_SOV_U2_Incident.d:0 "1960年5月1日、ソ連領内深くで写真偵察を行っていたアメリカ合衆国のU-2偵察機が、ソ連防空軍によって撃墜されました。アメリカ人パイロットのフランシス・ゲーリー・パワーズが操縦していたこの航空機は、パキスタンのペシャワールから離陸した後、地対空ミサイルの直撃を受けてスヴェルドロフスク（現在のエカテリンブルク）付近に墜落しました。パワーズはパラシュートで地上に降下しましたが、捕らえられました。"
    USA_SOV_Able_Archer.t:0 "エイブル・アーチャー83危機？"
    USA_SOV_Able_Archer.d:0 "エイブル・アーチャー83は、1983年11月の定期演習の一環としてNATOが実施した軍事演習でした。1983年11月7日に開始されたこの演習では、暗号通信の新しい独自の形式、無線封鎖、政府首脳の参加など、それまでの年には見られなかったいくつかの新しい要素が導入されました。こうしたリアリズムの向上は、アメリカとソ連の緊迫した関係や、欧州へのパーシングII核ミサイルの配備予定と相まって、ソ連政治局や軍の一部に、エイブル・アーチャー83が真の核先制攻撃に向けた準備を隠蔽するための戦争の欺瞞であるとの疑念を抱かせました。これを受けてソ連は核戦力を準備し、東ドイツとポーランドに配置された航空ユニットに警告を発令しました。"
    SOV_USA_KOR_Incident.t:0 "大韓航空機007便事件"
    SOV_USA_KOR_Incident.d:0 "大韓航空機007便は、ニューヨークからアラスカの停泊地を経由してソウルへ向かう大韓航空の定期便でした。1983年9月1日、この便はソ連のスホーイSu-15迎撃機によって撃墜されました。ボーイング747旅客機は停泊地からソウルへ向かう途中でしたが、乗組員の航法ミスにより、予定されていたルートを外れてソ連の領空に侵入してしまいました。ソ連空軍は、この未確認機を侵入したアメリカの偵察機と判断し、警告射撃を行った後に空対空ミサイルで撃墜しました。"
    USA_GUA_Overthrow.t:0 "作戦名PBSuccessか？"
    USA_GUA_Overthrow.d:0 "アイゼンハワーは1953年8月、ハコボ・アルベンスを転覆させるためのCIAの作戦を承認しました。これは「作戦名PBSuccess」と呼ばれました。この作戦には「心理戦および政治工作」のための予算として270万米ドルが割り当てられました。カスティージョ・アルマスには、グアテマラの国外追放者や近隣諸国の人口から小規模な傭兵部隊を募るための十分な資金が与えられました。この集団は解放軍と呼ばれました。CIAはニカラグアとホンジュラスに訓練キャンプを設置し、そこへ武器や数機の爆撃機を供給しました。"
    SOV_AFG_Overthrow.t:0 "作戦名ストーム333"
    SOV_AFG_Overthrow.d:0 "軍事作戦名「ストーム333」として知られるタジベク宮殿襲撃は、1979年12月27日にソビエト連邦がアフガニスタンで実行した軍事侵攻でした。特殊部隊と空挺部隊は、カブールにある厳重に要塞化されたタジベク宮殿を強襲し、アフガニスタンのリーダーであるハフィズッラー・アミンを暗殺しました。彼は1978年4月のサウル革命で権力を握った、アフガニスタン人民民主党（PDPA）のハルク派でした。これはソビエト＝アフガン戦争の始まりとなりました。"
    EGR_WGR_Berlin_Wall.t:0 "ベルリンの壁？"
    EGR_WGR_Berlin_Wall.d:0 "ベルリンの壁は、1961年から1989年にかけて西ベルリンを囲み、東ベルリンおよびドイツ民主共和国から分離していた監視下のコンクリート障壁でした。ベルリンの壁の建設は、1961年8月13日に東ドイツ政府によって開始されました。壁にはコンクリート壁に沿って配置された監視塔があり、車両侵入防止用の溝や釘の敷設など、その他の防御策を備えた広い区域（後に「死の地帯」として知られる）が伴っていました。壁建設の主な目的は、東ドイツ市民が西側へ逃亡するのを防ぐことでした。"
    EGR_WGR_Berlin_Wall_Fall.t:0 "ベルリンの壁崩壊？"
    EGR_WGR_Berlin_Wall_Fall.d:0 "平和革命の最中であった1989年11月9日のベルリンの壁崩壊は、東ベルリンの通過制限が打ち破られ破棄されたことで、ベルリンの壁および比喩的な鉄のカーテンの破壊の始まりを告げました。壁の一部は突破され、翌年6月には計画的な解体作業が始まりました。"
    USA_CUB_Overthrow.t:0 "ピッグス湾侵攻？"
    USA_CUB_Overthrow.d:0 "ピッグス湾侵攻は、1961年にアメリカ合衆国と、フィデル・カストロのキューバ革命に反対するキューバ人国外追放者で構成されるキューバ民主革命戦線（DRF）によって、キューバの南西海岸で行われた失敗に終わった軍事上陸作戦でした。この作戦は冷戦の絶頂期に行われ、その失敗はキューバ、アメリカ、そしてソ連の関係に影響を与えました。"
    GBR_Chagos_Island_deport.t:0 "チャゴス人の追放？"
    GBR_Chagos_Island_deport.d:0 "イギリスはアメリカ合衆国の要請を受け、1968年からチャゴス諸島の住民の追放を開始しました。そして1973年4月27日、ペロス・バニョス環礁に残っていたチャゴス諸島の人々を追放したことで、強制的な強制送還を完了しました。"
    USA_SOV_Azorian_Incident.t:0 "プロジェクト・アゾリアンとは？"
    USA_SOV_Azorian_Incident_1.t:0 "アメリカが撃沈されたソ連の潜水艦を回収"
    USA_SOV_Azorian_Incident.d:0 "プロジェクト・アゾリアンは、1974年に専用船ヒューズ・グローマー・エクスプローラーを使用して、太平洋の海底から沈没したソ連の潜水艦K-129を回収することを目的としたアメリカ中央情報局（CIA）のプロジェクトでした。K-129の沈没は1968年にハワイの北西約1,560マイル（2,510km）の地点で発生しました。プロジェクト・アゾリアンは、現在の価値で約$800 million, or $49億ドルにものぼる、冷戦期において最も複雑で高価、かつ秘密裏に行われた諜報作戦の一つでした。"
    USA_Reagan_Doctrine.t:0 "レーガン・ドクトリンとは？"
    USA_Reagan_Doctrine.d:0 "レーガン・ドクトリンは、冷戦終盤にソ連の世界的影響力を圧倒するために、レーガン政権が実施したアメリカの戦略でした。レーガン・ドクトリンの下、アメリカはアフリカ、アジア、ラテンアメリカにおけるソ連支援の共産主義政権を「巻き戻す」ため、反共主義のゲリラや抵抗活動に対して公然、あるいは秘密裏に援助を行いました。このドクトリンは、冷戦に勝利するという政権の全体的な戦略の一環として、これらの地域におけるソ連の影響力を弱めるように設計されていました。"
    SOV_Brezhnev_Doctrine.t:0 "ブレジネフ・ドクトリンとは？"
    SOV_Brezhnev_Doctrine.d:0 "ブレジネフ・ドクトリンは、中欧および東欧のソ連の勢力圏におけるいかなる国家でも「社会主義の統治」に対する脅威があれば、それはすべての国家に対する脅威であると宣言するソ連の外交政策であり、それによって社会主義諸国による介入を正当化するものでした。これは、1968年初頭にソ連が主導してチェコスロバキアを占領し、同国の改革的な政府を打倒したことを正当化するために宣言されました。「社会主義」への言及は、クレムリンに忠実な共産主義政党による支配を意味していました。"
    GBR_Atlanticism.t:0 "サッチャリズム的大西洋主義とは？"
    GBR_Atlanticism_1.t:0 "特別な関係とは？"
    GBR_Atlanticism.d:0 "サッチャーが首相を務めていた間、彼女はアメリカのロナルド・レーガン大統領との大西洋横断的な関係を大いに重視しました。他の西側の同盟国がそれほど声を上げなかった時でさえ、彼女はしばしばレーガンの政策を公に支持しました。例えば、彼女は1986年のアメリカによるリビア・アラブ・ジャマーヒリーヤへの爆撃のような襲撃のために、アメリカの航空機がイギリスの基地を使用することを許可しました。また、イギリスや他の西欧諸国を標的としたソ連によるSS-20核ミサイルの配備に対抗して、アメリカの巡航ミサイルやパーシング・ミサイルがイギリスの領土内に配置されることも認めました。"
    NOR_Dag_Hammarskjold_death.t:0 "ダグ・ハマーショルドの死？"
    NOR_Dag_Hammarskjold_death.d:0 "1961年9月18日、ハマーショルドは国連コンゴ作戦軍とモイス・ツンベ率いるカタンガ軍との間の停戦交渉に向かっていました。彼のダグラスDC-6旅客機SE-BDYは、北ローデシア（現在のザンビア）のンドラ付近で墜落しました。ハマーショルドは墜落の結果、他の15名の乗客とともに死亡しました。ハマーショルドの死は国連における継承問題を引き起こしました。後継者の順位が決まっていなかったため、安全保障理事会が後継者について投票を行わなければならなかったからです。墜落の状況は現在も不明なままです。1962年のローデシアによる調査ではパイロットのミスが原因であると結論付けられましたが、その後の国連の調査では墜落の原因を特定できませんでした。"
    LEB_Crisis_1958.t:0 "レバノン危機"
    LEB_Crisis_1958.d:0 "1958年のレバノン危機は、国内の政治的および宗教的な緊張によって引き起こされたレバノンの政治危機でした。これにはアメリカの軍事介入が含まれており、支援を要請したカミール・シャムーン大統領がレバノン大統領としての任期を終えるまでの約3ヶ月間続きました。アメリカとレバノンの政府軍はベイルート港とベイルート国際空港を占領しました。危機の終結とともに、アメリカは撤退しました。"
    ITA_SAN_1957.t:0 "ロヴェレッタ事件？"
    ITA_SAN_1957.d:0 "ロヴェレッタ事件（fatti di Rovereta）は、1957年にサンマリノで発生した憲法上の危機でした。これは、予定されていた執政官の選挙を防ぐために、大評議会が意図的に定足数不足の状態に陥ったことで起こりました。任期を終えた退任執政官に対立する形で、ロヴェレッタの村に暫定政府が設立されました。イタリアは暫定政府を承認し、イタリアのカラビニエリが、自国領内に位置する工場の三方を警備しました。10月11日、摂政政府は屈服して暫定政府を承認し、この危機は終結しました。"
    HND_PAK_KAS_1999.t:0 "カルギル戦争？"
    HND_PAK_KAS_1999.d:0 "カルギル戦争は、1999年5月から7月にかけて、当時はインド管理下のジャム・カシミール州の一部であったラダックのカルギル地区、および管理収束線（LoC）沿いでインドとパキスタンの間で戦われた戦争です。"
    HND_PAK_KAS_2025.t:0 "インド・パキスタン危機？"
    HND_PAK_KAS_2025.d:0 "2025年4月22日のパハルガムにおけるテロ攻撃を受け、カシミールで武装勢力により25人のインド人観光客が殺害されたことをきっかけに、インドとパキスタンの間で危機が生じました。当初、抵抗戦線（TRF）がこの攻撃の責任を認めていました。4月24日からは管理収束線（LoC）沿いでインドとパキスタンの間の武力衝突が報告されました。2025年5月7日、インドがパキスタンに対してミサイル攻撃を開始したことで、両国間の軍事衝突へと発展しました。2025年5月7日、パキスタンの軍はジャム州プーンチへの電撃攻撃で応戦し、16人の市民が死亡し、数百の家屋が破壊されました。2025年5月10日、インドとパキスタンの間の合意に基づき、停戦が宣言されました。"
    SOV_ALB_Vlora_Incident.t:0 "ヴロラ事件？"
    SOV_ALB_Vlora_Incident.d:0 "ヴロラ事件は、1961年にアルバニアとソ連の間で発生した軍事的対峙でした。アルバニア人民軍がヴロラ海軍基地を海上封鎖したことで、ソ連の艦船や装備の押収へとつながりました。この事件は両国間の深刻化する外交的緊張を浮き彫りにし、最終的にアルバニアからのソ連軍の追放という結果を招きました。"
    SRL_TAE_civil_war_end.t:0 "北方攻勢？"
    SRL_TAE_civil_war_end.d:0 "2008年から2009年にかけてのSLA北部攻勢は、スリランカ軍と分離主義組織であるタミル・イーラム解放タミルタイガー（LTTE）との間で行われた、スリランカ北部の地方における武力紛争でした。この戦闘は、島の北部に位置するLTTEの防衛線を突破しようとするスリランカ軍（SLA）の攻勢から始まり、軍事的勝利によってこの国の25年に及ぶ内戦を終結させることを目的としていました。"
    USA_SOV_Great_Seal_Bug.t:0 "グレート・シール・バグ事件"
    USA_SOV_Great_Seal_Bug.d:0 "1945年、ソ連の偵察員が彫刻が施されたグレート・シールをモスクワの米国大使に贈りました。その内部には、電源を持たない受動的な盗聴器「ザ・シング」が隠されていました。7年間にわたり検知されることなく、それはソ連による盗聴を可能にし、冷戦時代の諜報活動と監視技術における画期的な出来事となりました。グレート・シール・バグは、モスクワの米国大使に贈られてから7年後の1952年に露呈しました。これは国務省による定期的な調査中に発見され、木製の印の中に隠された受動的な盗聴器が明らかになりました。グレート・シール・バグは1960年5月26日、米国大使ヘンリー・キャボット・ロッジ・ジュニアによる国連安全保障理事会への劇的なプレゼンテーションの中で、国際連合にて公開されました。"
    iraq_kuwait_showdown_1961.t:0 "イラク・クウェート危機"
    iraq_kuwait_showdown_1961.d:0 "1958年、アブドゥル・カリム・カシムがイラクで権力を掌握しました。彼は西側諸国から予測不能な人物と見なされ、イラクは不安定な国と見なされました。1961年6月25日、英国がクウェートにおける権力を放棄したことを受け、カシムはクウェートをイラクに編入すると発表し、英国は軍事的脅威が差し迫っていると判断しました。"
    Operation_Vantage.t:0 "オペレーション・バンテージ？"
    Operation_Vantage_1.t:0 "イラク・クウェート危機における英国の介入"
    Operation_Vantage.d:0 "オペレーション・バンテージは、隣国であるイラクによる請求権に対し、新しく独立した国家であるクウェートを支援するために1961年に行われた英国の軍事作戦でした。英国はクウェートのシェイク・アブドゥッラー3世・アル＝サリーム・アル＝サバーからの保護要請に応じ、数日以内に空軍、海軍、および陸軍が展開されました。イラクは攻撃を行わなかったため、英国軍はアラブ連盟軍に交代しました。"
    Operation_Caban.t:0 "オペレーション・カバン？"
    Operation_Caban.d:0 "カバン作戦（1979年の中央アフリカのクーデターとしても知られる）は、1979年9月にフランス情報局SDECEが行った無血の軍事作戦でした。この作戦は、ボカサ1世を廃位し、国外追放されていた元大統領ダヴィド・ダコを復位させ、中央アフリカ帝国を中央アフリカ共和国へと改称するためのものでした。"
    FRA_NZL_Rainbow_Warrior_Incident.t:0 "レインボー・ウォーリア号沈没事件？"
    FRA_NZL_Rainbow_Warrior_Incident.d:0 "1985年7月10日、フランスの秘密工作員は、ムルロア環礁での核実験に対する抗議活動を防ぐため、ニュージーランドのオークランドでグリーンピースの艦船レインボー・ウォーリア号を爆破しました。この爆破により船体は沈没し、写真家のフェルナンド・ペレイラが死亡しました。「オペラシオン・サタニック」というコードネームで実行されたこの秘密攻撃は、世界的な憤りを呼び起こし、フランスとニュージーランドの関係を悪化させました。"
    FRA_NZL_Rainbow_Warrior_Incident_1.t:0 "レインボー・ウォーリア号沈没事件"
    USA_Donroe_Doctrine_2026.t:0 "ドローン教義？"
    USA_Donroe_Doctrine_2026.d:0 "ドローン教義（モンロー教義に対するトランプ付帯条項とも呼ばれる）は、米州におけるドナルド・トランプ大統領の外交政策の原則を指します。歴史的なモンロー教義を適応させたものであり、第2次トランプ政権が西半球におけるアメリカの優位性を主張しようとする意図を表しています。"
    USA_VNZ_Overthrow_2026.t:0 "アブソリュート・リゾルブ作戦？"
    USA_VNZ_Overthrow_2026.d:0 "2026年1月3日、アメリカ合衆国はベネズエラに対して軍事攻撃を開始し、現職のベネズエラ大統領ニコラス・マドゥロとその妻シリア・フローレスを拘束しました。「アブソリュート・リゾルブ作戦」とコードネームが付けられたこの米軍の作戦は、現地時間の午前2時頃に爆発が観察されたことで始まりました。米軍は、拘束部隊がカラカスのマドゥロの邸宅を攻撃する一方で、防空能力を抑圧するためにベネズエラ北部のインフラを爆撃しました。マドゥロとフローレスは裁判を受けるため、米軍によってニューヨーク市へと移送されました。"
    USA_PER_START.t:0 "イラン核合意？"
    USA_PER_START.d:0 "包括的共同行動計画（JCPOA）は、イラン核合意またはイラン合意としても知られ、制裁の解除やその他の条項と引き換えにイランの核プログラムを制限するための合意でした。JCPOAの下で、イランは兵器級のウランやプルトニウムの製造につながる燃料サイクル活動を制限することで、核プログラムを抑制することに同意しました。JCPOAは、稼働する遠心分離機の数と種類、ウラン濃縮のレベル、およびイランの濃縮ウラン備蓄量を制限しました。フォルドゥ、ナタンズ、アラクにある主要施設は、医療や産業研究などの民間利用のために転用されました。イランは、燃料サイクル関連の活動に対して、IAEAによるより侵襲的な監視措置を受け入れることに同意しました。"
    RUS_UKR_Minsk.t:0 "ミンスク合意？"
    RUS_UKR_Minsk.d:0 "ミンスク合意は、ロシアの正規軍が中心的な役割を果たした、武装したロシアの分離主義グループとウクライナ軍の間で戦われたドンバス戦争を終結させることを目的とした一連の国際合意でした。2014年8月末のイロヴァイスクでの敗北後、ロシアはウクライナに対し、最初のミンスク議定書（ミンスクI）への署名を強制しました。この合意は、停戦、前線からの重火器の撤退、捕虜の解放、ドンバスの特定地域に自治権を付与するウクライナの憲法改革、およびウクライナ政府への国境管理権の復帰を含む一連の措置で構成されていました。"
    YUG_ITA_Treaty_of_Osimo.t:0 "オシモ条約？"
    YUG_ITA_Treaty_of_Osimo.d:0 "オシモ条約は、トリエステ自由領域を両国間で決定的に分割するため、1975年11月10日にイタリアのオシモでイタリアとユーゴスラビアによって署名されました。北西に狭い沿岸地帯を持つ港湾都市トリエステ（ゾーンA）はイタリアに、イストリア半島の北西の一部（ゾーンB）はユーゴスラビアに割り当てられました。"
    Korean_Armistice_Agreement_1953.t:0 "朝鮮停戦協定ですか？"
    Korean_Armistice_Agreement_1953.d:0 "朝鮮停戦協定は、朝鮮戦争における敵対行為の停止をもたらした停戦協定です。これは、国連軍（UNC）を代表するアメリカ陸軍中将ウィリアム・ハリソン・ジュニアおよびマーク・W・クラーク将軍、朝鮮人民軍（KPA）を代表する北朝鮮の指導者金日成およびナム・イル将軍、そして中国人民志願軍（PVA）を代表する彭徳懐によって署名されました。この停戦協定は1953年7月27日に署名され、「最終的な平和的解決が達成されるまで、朝鮮における敵対行為およびあらゆる武力行使の完全な停止を確保すること」を目的としていました。"
    
