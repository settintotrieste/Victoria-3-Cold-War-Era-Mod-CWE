    je_colonial_empire_reason:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('imperial_conference_custom_adjective')]会議は、[ROOT.GetCountry.GetAdjectiveNoFlag]帝国の自治的な植民地および自治領の政府リーダーによる定期的な集まりです。すべての会議は、帝国の中心地である[ROOT.GetCountry.GetName]で開催されます。\n\nこの会議を利用して、[concept_dominion]と[ROOT.GetCountry.GetName]との間の貿易統合のレベルを決定することができます。\n\nまた、防衛戦争において我々を支援するよう、すべての植民地に呼びかけるために会議を利用することもできます。"
