    USA_historical_election_system.t:0 "アメリカ合衆国大統領選挙"
    USA_historical_election_system.d:0 "アメリカ合衆国の大統領および副大統領の選挙は間接選挙です。50の州またはワシントンD.C.のいずれかで投票登録をしているアメリカ合衆国の市民は、それらの役職に直接投票するのではなく、代わりに選挙人団のメンバーに投票します。その後、これらの選挙人が大統領および副大統領に対して、選挙人票として知られる直接投票を行います。選挙人票の絶対過半数（修正第23条によってD.C.の市民に投票権が与えられたため、538票のうち少なくとも270票）を獲得した候補者が、その役職に選出されます。"
    historical_election_system.f:0 "これは歴史的なイベントであり、その目的は現在の[concept_ruler]を歴史的な[concept_ruler]として設定することです。非歴史的な選択肢を選択した場合は、現在の[concept_government_type]に適用される#y 権力の委譲#!の設定に基づいて[concept_ruler]が選択されます。"
    
    GBR_historical_election_system.t:0 "英国総選挙"
    GBR_historical_election_system.d:0 "[ROOT.GetCountry.GetName]の首相は政府の主要な閣僚であり、英国内閣の首班です。首相職が最初に誕生した特定の年月日は存在しません。なぜなら、その役割は新たに創設されたものではなく、時間の経過とともに職務が統合されることで進化してきたものだからです。"
    
    FRA_historical_election_system.t:0 "フランス大統領選挙"
    FRA_historical_election_system.d:0 "フランスの大統領はフランスの執行権を持つ元首であり、フランス軍の最高司令官です。大統領職は国の最高官職であるため、この地位はフランスにおける最高位の役職です。"
    
    GER_historical_election_system.t:0 "ドイツ総選挙"
    GER_historical_election_system.d:0 "ドイツの首相はドイツの政治的リーダーであり、政府の首長です。首相は他のすべての政府メンバーを選出する責任を負い、閣僚会議の議長を務めます。"
    
    HND_historical_election_system.t:0 "インド総選挙"
    HND_historical_election_system.d:0 "インドの首相は、インド政府の行政長官です。インドの大統領は、憲法上の名目的な儀礼的元首ですが、実際には通常、行政権は首相と首相が選出した閣僚評議会に帰属します。首相は、インド共和国における主要な立法機関である議会の下院、ローク・サバーにおいて、過半数を得た政党によって選出されたリーダーです。"
    
    BRZ_historical_election_system.t:0 "ブラジル大統領選挙"
    BRZ_historical_election_system.d:0 "大統領制は、ペドロ2世の皇帝に対する軍事クーデターによって共和国が宣言された1889年に確立されました。それ以来、ブラジルでは6つの憲法、3つの独裁政権、そして3つの民主主義時代を経てきました。民主主義時代において、投票は常に義務化されてきました。"
    
    IDO_historical_election_system.t:0 "インドネシア大統領選挙"
    IDO_historical_election_system.d:0 "インドネシア共和国の大統領は、インドネシア共和国の元首および政府の長です。大統領はインドネシア政府の行政府を率い、インドネシア国軍の最高司令官を務めます。2004年以降、大統領と副大統領は5年の任期で直接選出され、1回に限り再選が可能なため、最大10年間在任することができます。"
    
    SKO_historical_election_system.t:0 "韓国大統領選挙"
    SKO_historical_election_system.d:0 "大韓民国の大統領は、大韓民国の元首および政府の長です。大統領は国家評議会を率いるとともに、国家政府の行政府の長、および大韓民国軍の最高司令官を務めます。"
    
    MSY_historical_election_system.t:0 "マレーシア総選挙"
    MSY_historical_election_system.d:0 "マレーシアの首相は、マレーシアの政府の長です。首相は連邦政府の行政府を指揮します。ヤン・ディ・ペルトゥアン・アゴンは、議員の過半数の信任を得る可能性が最も高いと判断した議会議員（MP）を首相として任命します。首相は通常、総選挙において最も多くの議席を獲得した政党のリーダーです。"
    
    RUS_historical_election_system.t:0 "ロシア大統領選挙"
    RUS_historical_election_system.d:0 "ロシア連邦の大統領は、ロシアの行政元首です。大統領は連邦国家評議会の議長であり、ロシア軍の最高司令官です。これはロシアにおける最高職です。"
    
    SOV_historical_election_system.t:0 "ソ連大統領選挙"
    SOV_historical_election_system.d:0 "1990年のソ連大統領選挙は、5年の任期を務める大統領を選出するため、1990年3月14日にソ連で実施されました。これはソ連で行われた最初で唯一の大統領選挙でした。これは、1991年のソ連崩壊の1年前である1990年に大統領職が設立されたためです。選挙は無投票で行われ、当時のソ連共産党事務総長であったミハイル・ゴルバチョフが唯一の候補者でした。"
    
    ROC_historical_election_system.t:0 "[ROOT.GetCountry.GetAdjectiveNoFormatting]大統領選挙"
    ROC_historical_election_system.d:0 "中華民国の総統（台湾の総統とも呼ばれる）は、中華民国（台湾）の元首であり、中華民国軍の最高司令官です。この地位は1949年以前には中国本土を統治する権限を持っていましたが、中国内戦の終結後は、その管轄は台湾、澎湖、金門、馬祖およびその他の小島に限定されています。"
    
    historical_election_system.f:0 "これは歴史的なイベントであり、その目的は現在の[concept_ruler]を歴史的な[concept_ruler]として設定することです。非歴史的な選択肢を選択した場合は、現在の[concept_government_type]に適用される#y 権力の委譲#!の設定に基づいて[concept_ruler]が選択されます。"
    
    historical_election_system.option.1:0 "歴史に従う！"
    historical_election_system.option.2:0 "通常のルールに従って[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]を選択します。"
    
    je_olympic_games:0 "[GetPlayer.MakeScope.Var('olympic_games_year_display').GetValue]年[SCOPE.sState('olympic_games_summit_location').GetCityHubName]オリンピック"
    je_olympic_games_reason:0 "夏季オリンピック競技大会（オリンピア祭とも呼ばれ、夏季オリンピックと称されることも多い）は、通常4年ごと、閏年に開催される主要な国際的多種目競技大会です。\n\n失敗しないオリンピック開催のため、オリンピック用インフラを建設してください。\n\n[GetPlayer.MakeScope.Var('olympic_games_year_display').GetValue]年オリンピック競技大会は、[SCOPE.sState('olympic_games_summit_location').GetCityHubName]、[SCOPE.sState('olympic_games_summit_location').GetName]（[ROOT.GetCountry.GetName]）で開催されます。"
    je_olympic_games_status:0 "目標時期：[GetPlayer.MakeScope.Var('olympic_games_year_display').GetValue]年夏季"
    
    offered_olympics.t:0 "[GetPlayer.MakeScope.Var('olympic_games_year_display').GetValue]年オリンピック競技大会を開催しますか？"
    offered_olympics.d:0 "国際オリンピック委員会は、[ROOT.GetCountry.GetName]に対し、[GetPlayer.MakeScope.Var('olympic_games_year_display').GetValue]年オリンピック競技大会を開催する機会を提示しました。もし受容した場合、[ROOT.GetCountry.GetName]には大会に必要なインフラを建設するための4年間の猶予が与えられます。"
    offered_olympics.f:0 "[ROOT.GetCountry.GetName]が選出された理由は、現在戦争状態になく、国際的なのけ者ではなく、かつ十分に独立しているためです。"
    olympic_games_system.option.1:0 "受容"
    olympic_games_system.option.2:0 "拒否"
    participation_olympics.t:0 "[GetPlayer.MakeScope.Var('olympic_games_year_display_event').GetValue]年[SCOPE.sState('olympic_games_summit_location').GetCityHubName]オリンピック"
    participation_olympics.d:0 "[SCOPE.sCountry('recently_hosted_olympics').GetName]で開催された[GetPlayer.MakeScope.Var('olympic_games_year_display_event').GetValue]年オリンピック競技大会には、世界中から数千人のアスリートが集まり、様々な競技に参加しました。大会の会場となった[SCOPE.sState('olympic_games_summit_location').GetCityHubName]での盛大なセレモニーによって、大会は最高潮に達しました。"
    participation_olympics.option.1:0 "公平に競え！"
    participation_olympics.option.2:0 "選手たちにドーピングをさせろ！"
    participation_olympics.option.3:0 "大会をボイコットせよ！"
    banned_olympics.t:0 "オリンピックチームのドーピング発覚"
    banned_olympics.d:0 "[ROOT.GetCountry.GetAdjective]のオリンピックチームが、[SCOPE.sCountry('recently_hosted_olympics').GetName]で開催された最近のオリンピックにおいて、禁止されているパフォーマンス向上薬を使用していたことが発覚しました。その結果、国際オリンピック委員会は[ROOT.GetCountry.GetName]に対し、次回のオリンピックへの参加を禁止しました。"
    banned_olympics.option:0 "「言語道断だ！」"
    bad_olympics.t:0 "[SCOPE.sCountry('recently_hosted_olympics').GetAdjectiveNoFlag]オリンピックへの批判"
    bad_olympics.d:0 "予算削減と極めて深刻な計画の失敗により、必要なオリンピックのインフラが開催までにすべて完成しませんでした。その結果、選手たちは不十分な状況での競技を余儀なくされました。これにより、[SCOPE.sState('olympic_games_summit_location').GetCityHubName]オリンピックは運営が稚拙であり、救いようのない大惨事であるとして、広範な非難を浴びています。"
    bad_olympics.f:0 "このイベントは、[ROOT.GetCountry.GetName]がオリンピック[concept_journal_entry]において100％の達成に失敗したために発生しました。"
    bad_olympics.option:0 "仕方のないことです。"
    
