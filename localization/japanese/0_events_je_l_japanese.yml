    je_G8_system_democracy_button:0 "世界民主主義の促進"
    je_G8_system_democracy_button_desc:0 "[ROOT.GetCountry.GetName]は、G[GetPlayer.MakeScope.Var('G8_members_counter').GetValue]の管区としての影響力を利用して、世界的な民主主義を促進します。"
