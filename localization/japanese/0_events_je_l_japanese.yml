    rio_pact_application_choice.option.2:0 "拒絶"
    rio_pact_application_rejection.t:0 "リオ協定への加入申請が拒絶されました。"
    rio_pact_application_rejection.d:0 "リオ協定のリーダーである[SCOPE.sCountry('rio_pact_leader').GetName]は、我々の同盟への加入申請を拒絶しました。彼らは、加入を拒絶する理由として地政学的な要因を挙げています。"
