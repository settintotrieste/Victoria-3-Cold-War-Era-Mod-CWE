    dutch_west_papua.sgc.t:0 "ニューヨーク合意？"
    dutch_west_papua.sgc.d:0 "ニューヨーク合意（1962年8月15日署名）は、アメリカ合衆国と国際連合の仲介により西ニューギニア（西イリアン）の統治権をオランダの管理からインドネシアへと移管するための、インドネシアとオランダとの間の条約です。これにより一時的な国連管理体制が確立され、その後にインドネシアの主権が認められるとともに、1969年までに「自由選択の行為」に基づく住民投票を実施することが約束されました。"
