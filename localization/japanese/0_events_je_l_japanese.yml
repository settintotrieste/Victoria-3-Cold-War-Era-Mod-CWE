    moderate_nuclear_accident:0 "穏健な原子力事故"
    mild_nuclear_accident:0 "軽度の原子力事故"
    anti_nuclear_energy_modifier:0 "反原子力エネルギー運動"
    
    1995_JAP_earthquake.t:0 "阪神・淡路大震災"
    1995_JAP_earthquake.d:0 "阪神・淡路大震災は1995年1月17日、阪神地域を含む日本の兵庫県南部で発生しました。モーメントマグニチュードは6.9、JMA震度階級では最大震度7（修正メルカリ震度階級ではXI–XII）を記録しました。揺れは約20秒間続きました。震源は神戸市中心部から20km離れた淡路島の北端、震源地から地下17kmに位置していました。この地震により約6,434人が死亡し、そのうち約4,600人が神戸市での犠牲者でした。"
    2004_IDO_earthquake.t:0 "インド洋大地震"
    2004_IDO_earthquake.d:0 "2004年12月26日、インドネシアのスマトラ島北西沖でマグニチュード9.2–9.3 Mwの巨大地震が発生しました。この海底巨大地震はビルマプレートとインドプレートの間の断層沿いの破壊によって引き起こされ、一部の地域ではメルカリ震度階級で最大IXに達しました。ボクシング・デーの祝日にちなんでボクシング・デー・ツナミ、あるいはアジア・ツナミとして知られる最大30m（100フィート）の波を伴う巨大な津波がインド洋周辺の沿岸地域を荒廃させ、記録されている歴史上最も致命的な自然災害の一つとして、14カ国で推定227,898人の命を奪いました。"
    2011_JAP_earthquake.t:0 "東日本大震災"
    2011_JAP_earthquake.d:0 "2011年3月11日、東北地方の押しか半島の東72km（45マイル）の太平洋で、マグニチュード9.0–9.1の海底巨大プレート境界型地震が発生しました。この地震は約6分間続き、津波を引き起こしました。これは日本で観測された史上最大の地震であり、1900年に近代的な地震学が始まって以来、世界で4番目に大きな地震でした。"
    1975_PRC_flood.t:0 "板橋ダムの決壊"
    1975_PRC_flood.d:0 "1975年8月、台風ニーナの上陸により、中国河南省の板橋ダムを含む61のダムが決壊しました。このダムの崩壊は、約30の都市や郡を含む1,200万平方km（300万エーカー）の範囲に、総人口1,015万人に影響を及ぼす、史上3番目に甚大な被害を出した洪水を引き起こしました。死者数は2万6,000人から24万人に及ぶと推定されています。また、この洪水により500万から680万戸の家屋が倒壊しました。ダムの決壊は文化大革命の最中に発生しました。"
    1970_BNG_cyclone.t:0 "ボラ・サイクロン"
    1970_BNG_cyclone.d:0 "1970年のボラ・サイクロンは、1970年11月12日に東パキスタン（現在のバングラデシュ）とインドの西ベンガル州を襲った壊滅的な熱帯低気圧でした。これは観測史上最も死者数の多い熱帯低気圧であり、世界で最も致命的な人道的災害の一つとなっています。この嵐では、主にガンジスデルタの低地に位置する多くの島々を浸水させた高潮の影響により、少なくとも30万人が死亡し、多ければ50万人もの犠牲者が出た可能性があります。"
    1991_BNG_cyclone.t:0 "バングラデシュ・サイクロン"
    1991_BNG_cyclone.d:0 "1991年のバングラデシュ・サイクロンは、記録されている熱帯低気圧の中でも最も甚大な被害をもたらしたものの一つでした。当該海域で観測された史上最強クラスの熱帯低気圧であったこのサイクロンは、6.1m（20フィート）の高潮を引き起こして海岸線を浸水させ、少なくとも138,866人の死者と約17億米ドル（1991年時点）のダメージをもたらしました。この壊滅的な被害の結果、アメリカ合衆国などの国々は、史上最大規模の軍事救援活動の一つである「シー・エンジェル作戦」を実施しました。"
    2008_BUR_cyclone.t:0 "サイクロン・ナルギス"
    2008_BUR_cyclone.d:0 "極めて激しいサイクロン「ナルギス」は、2008年5月初旬にミャンマーの記録された歴史の中で最悪の自然災害を引き起こした、極めて破壊的かつ致命的な熱帯低気圧でした。このサイクロンは2008年5月2日金曜日にミャンマーに上陸し、人口密度の高いイラワジ・デルタを40キロメートル遡上する高潮を発生させ、壊滅的な破壊と少なくとも138,373人の死者をもたらしました。"
    2010_HAI_earthquake.t:0 "ハイチ大地震"
    2010_HAI_earthquake.d:0 "2010年のハイチ地震は、2010年1月12日火曜日の現地時間16時53分（21時53分UTC）にハイチを襲った、マグニチュード7.0 Mwの壊滅的な地震でした。震源はウェスト県レオガン付近で、ハイチの首都ポール・ト・プランスから西に約25キロメートル（16マイル）の場所にありました。推定300万人がこの地震の影響を受けました。死者数の推定は10万人から約16万人である一方、ハイチ政府の数字では22万人から31万6,000人に達しています。"
    1992_GBR_monument_damaged.t:0 "ウィンザー城火災"
    1992_GBR_monument_damaged.d:0 "1992年11月20日、世界最大の居住可能な城であり、英国君主の公邸の一つであるウィンザー城で火災が発生しました。城は甚大な被害を受けましたが、保存建築家ドナルド・インサル・アソシエイツが主導したプロジェクトにより、3,650万ポンドの費用をかけてその後5年以内に完全に修復されました。この火災を受けて、エリザベス2世は自身の収入に対して税金を支払うことになり、また修復費用を補うために、彼女のもう一つの公邸であるバッキンガム宮殿が一般公開されることとなりました。"
    2019_FRA_monument_damaged.t:0 "ノートルダム大聖堂火災"
    2019_FRA_monument_damaged.d:0 "2019年4月15日、CESTの18時20分直前、フランスのパリにある中世のカトリック大聖堂、ノートルダム・ド・パリの屋根裏で火災が発生しました。消火されたときには、大聖堂の木造の尖塔（フレッシュ）は崩落し、木造屋根の大部分が焼失し、大聖堂の上部の壁は重度のダメージを受けました。石造りのヴォールト天井が、崩落する際に燃える屋根を大部分食い止めたことで、内部への甚大な被害は防がれました。多くの芸術作品や宗教的な遺物は安全な場所に移されましたが、煙によるダメージを受けたものもあり、外部の芸術作品の一部も損傷または破壊されました。"
    1999_VNZ_mudslide.t:0 "バルガス悲劇"
    1999_VNZ_mudslide.d:0 "バルガス悲劇は、1999年12月15日（10日間にわたる）にベネズエラのバルガス州で発生した自然災害です。豪雨によって発生した鉄砲水と土石流により、数万人が死亡し、数千軒の家屋が破壊され、州のインフラが完全に崩壊しました。救助隊員によれば、ロス・コラレス地区は3メートル（9.8フィート）もの泥に埋まり、非常に多くの家屋がそのまま海へと押し流されました。セロ・グランデやカルメン・デ・ウリアを含む町全体が完全に消失しました。この出来事により、バルガス州の人口の最大10％が死亡しました。"
    2019_JAP_monument_damaged.t:0 "首里城火災"
    2019_JAP_monument_damaged.d:0 "首里城は、日本の沖縄県首里にある琉球のグスク（城）です。1429年から1879年まで、琉球王国の宮殿として使用されていましたが、その後は大部分が放置されていました。1945年の沖縄戦において、ほぼ完全に破壊されました。2019年10月31日の朝、城の正殿を含む構造物が再び火災によって消失しました。"
    1991_PHI_eruption.t:0 "ピナトゥボ山の噴火"
    1991_PHI_eruption.d:0 "フィリピンのルソン火山弧にあるピナトゥボ山の1991年の噴火は、アラスカのノバルプタの1912年の噴火に次いで、20世紀で2番目に大規模な火山噴火でした。ピナトゥボ山の30 km（19 mi）圏内のほぼすべての橋が破壊されました。いくつかの低地の町が洪水に襲われたり、泥に部分的に埋没したりしました。濡れて重くなった火山灰による屋根の崩落で840人以上が死亡し、さらに数人が負傷しました。"
    2022_TON_eruption.t:0 "フンガ・トンガ－フンガ・ハアパイ噴火"
    2022_TON_eruption.d:0 "2021年12月、南太平洋のトンガ諸島にある潜水火山、フンガ・トンガ－フンガ・ハアパイで噴火が始まりました。この噴火は、その約4週間後の2022年1月15日に、非常に大規模で強力なクライマックスを迎えました。フンガ・トンガ－フンガ・ハアパイは、国の主要な島であるトンガタプの北65 km（40 mi）に位置しており、ニュージーランドからフィジーまで続く沈み込み帯である非常に活発なトンガ－ケルマデック諸島火山弧の一部です。"
    2025_BUR_earthquake.t:0 "マンダレー地震"
    2025_BUR_earthquake.d:0 "2025年3月28日12時50分54秒（MMT）、マグニチュード7.7の地震がミャンマーのサガイン地域を襲いました。震源は、同国第2の都市であるマンダレーの近くでした。この横ずれ断層による衝撃は、修正メルカリ震度で最大IX（激しい）に達しました。これは1912年以来ミャンマーを襲った中で最も強力な地震であり、1930年のバゴー地震の上限推計値に次いで、ミャンマーの近代史において2番目に死者数が多いものとなりました。この地震はミャンマーに広範囲なダメージを与え、隣国であるタイにも甚大なダメージをもたらしました。中国の雲南省でも数百軒の家屋が被害を受けました。"
    2018_USA_wildfire.t:0 "カリフォルニア・キャンプ・ファイア"
    2018_USA_wildfire.d:0 "2018年にカリフォルニア州北部のビュート郡で発生したキャンプ・ファイアは、カリフォルニア州の歴史において最も死者数が多く、最も破壊的な山火事でした。この火災は2018年11月8日の朝、強い下降気流が発生している最中に、フェザー・リバー・キャニオンにあるメンテナンスの行き届いていないパシフィック・ガス・アンド・エレクトリック・カンパニー（PG&E）の送電線の一部が故障したことで始まりました。その風によってキャンプ・ファイアはコンコウ、マガリア、ビュート・クリーク・キャニオン、パラダイスの各コミュニティを急速に駆け抜け、それらの大部分を破壊しました。火災はその後2週間燃え続け、153,336エーカー（62,050ヘクタール）を焼き尽くした後、11月25日の日曜日に鎮火しました。キャンプ・ファイアは85人の死者を出し、5万人以上の人々を避難させ、1万8,000以上の建造物を破壊し、推定165億ドルのダメージをもたらしました。"
    1976_CHI_earthquake.t:0 "唐山地震"
    1976_CHI_earthquake.d:0 "1976年の唐山地震は、7月27日19時42分55分（UTC）に中国河北省唐山周辺の地域を襲ったマグニチュード7.6の地震でした。地震の最大強度はメルカリ階級でXIでした。"
    1948_TKM_earthquake.t:0 "アシガバート地震"
    1948_TKM_earthquake.d:0 "1948年のアシガバート地震は、10月6日にトルクメニスタンのアシガバート近郊で発生した、表面波マグニチュード7.3、最大メルカリ強度Xの地震でした。ソ連政府による検閲のため、この出来事はソ連のメディアでは広く報じられませんでした。"
    2026_VNZ_earthquake.t:0 "ベネズエラ北部地震"
    2026_VNZ_earthquake.d:0 "2026年6月24日、2つの大規模な横ずれ断層地震がベネズエラの北西部と中央部に影響を与えました。両地震の震源は、ヤラクイ州の州都サン・フェリペの西に位置するヴェロエス市にありました。マグニチュードMw 7.2を記録した最初の地震は、ベネズエラ時間18時04分に発生し、前震に分類されました。その39秒後には、マグニチュードMw 7.5の本震が発生しました。これら2つの地震は国中に広範な被害をもたらし、特にラ・グアイラとカラカスで大きな被害が出ました。2,640人以上が死亡、12,600人以上が負傷し、数万人が行方不明となっています。"
    
    national_landmark_damaged:0 "国定記念物の損傷"
    
    united_in_fear:0 "恐怖による結束"
    
    eastern_europe_sovietisation.t:0 "[SCOPE.sCountry('eastern_europe_sovietisation_target').GetName]のソ連化？"
    eastern_europe_sovietisation.d:0 "最初、ソ連は他の東側陣営の政治における自らの役割を隠蔽しており、その変革は西側の「ブルジョワ民主主義」の改造であるかのように見せかけられました。社会政治的な変革に関する命令を遂行するため、モスクワで訓練された幹部たちが重要な権力職に就けられました。土地や産業資産の収用による、ブルジョワジーの社会的および金融的な権力の排除が絶対的な優先事項とされました。人事、一般警察、秘密警察、青少年担当といった重要な部門は、厳格に共産主義者によって運営されました。このような手順は、共産主義者が無制限の権力を掌握し、ソ連の政策を無条件に支持する政治家のみが残るまで繰り返されました。"
    eastern_europe_sovietisation.f:0 "[SCOPE.sCountry('eastern_europe_sovietisation_target').GetName]が[SCOPE.sCountry('eastern_europe_sovietisation_initiator').GetName]の勢力圏内にあるため、このイベントが発生しました。"
    eastern_europe_sovietisation.option.1:0 "[SCOPE.sCountry('eastern_europe_sovietisation_target').GetName]に共産主義体制を樹立せよ！"
    eastern_europe_sovietisation.option.2:0 "必要ありません。"
    eastern_europe_sovietisation_target.option.1:0 "[SCOPE.sCountry('eastern_europe_sovietisation_initiator').GetAdjective]の支配を受け入れる。"
    eastern_europe_sovietisation_target.option.2:0 "「我々は自由になる！」"
    Turkish_Straits_Crisis.t:0 "トルコ海峡危機？"
    Turkish_Straits_Crisis.d:0 "トルコ海峡危機は、ソ連とトルコの間の冷戦時代の領土紛争でした。第二次世界大戦の終結後、トルコは、黒海と地中海を結ぶトルコ海峡の通過に関する共同軍事管理を導入するよう、ソ連政府から圧力を受けました。トルコ政府がこれを拒否したため、この地域の緊張度が高まり、ソ連による武力誇示と、ジョージアとトルコの国境沿いにおける領土譲歩の要求へとつながりました。"
    Turkish_Straits_Crisis.1.option.1:0 "トルコに譲歩を要求せよ！"
    Turkish_Straits_Crisis.1.option.2:0 "トルコを放っておく。"
    Turkish_Straits_Crisis.2.option.1:0 "ソ連の要求を拒否せよ！"
    Turkish_Straits_Crisis.2.option.2:0 "ソ連の支配を受け入れよ！"
    Turkish_Straits_Crisis.3.t:0 "トルコ、ソ連の圧力に抵抗"
    Turkish_Straits_Crisis.3.d:0 "ソ連からの高まる圧力に屈し、トルコは数日のうちにアメリカ合衆国へ援助を要請しました。政権と協議した後、トルーマン大統領はトルコへ海軍タスクフォースを派遣しました。1946年10月9日、アメリカ合衆国とイギリスのそれぞれの政府は、トルコへの支持を再確認しました。10月26日、ソ連はトルコ海峡の支配に関する新たな首脳会談の具体的な要求を撤回しましたが（意見自体は撤回していません）、その後まもなく、同地域から威圧的な軍事力の大部分を撤退させました。"
    Turkish_Straits_Crisis.3.option.1:0 "「我々の要求を放棄せよ！」"
    Turkish_Straits_Crisis.3.option.2:0 "「開戦の時だ！」"
    Berlin_Crisis.t:0 "「ベルリン危機？」"
    Berlin_Crisis.d:0 "1961年のベルリン危機は、ドイツの首都ベルリンおよび第二次世界大戦後のドイツの地位に関する、冷戦期における最後の主要なヨーロッパの政治的・軍事的事件でした。この危機は、東ドイツによるベルリンの壁の建設とともに、ベルリンが事実上分割されることで最高潮に達しました。ベルリン危機は1961年6月、ソ連のフルシチョフ首相がウィーン首脳会談でアメリカ合衆国のケネディ大統領と会談した際、西ベルリンの西側軍隊を含むベルリンからのすべての武装勢力の撤退を要求する最後通牒を再発行したことで始まりました。"
    Berlin_Crisis.1.option.1:0 "「ベルリンの支配を要求せよ！」"
    Berlin_Crisis.1.option.2:0 "「西ドイツを放っておけ。」"
    Berlin_Crisis.2.option.1:0 "「ソ連の要求を拒否せよ！」"
    Berlin_Crisis.2.option.2:0 "「ソ連の支配を受け入れろ！」"
    Berlin_Crisis.3.t:0 "「アメリカ合衆国がソ連の圧力に抵抗」"
    Berlin_Crisis.3.d:0 "合意には至らず、1961年8月、フルシチョフの支持を得た東ドイツのリーダーであるヴァルター・ウルブリヒトは、国境の封鎖と西ベルリン周辺への壁の建設を命じました。10月には、同盟軍要員の自由な移動を巡る紛争を受けて、チェックポイント・チャーリーでアメリカとソ連の戦車による短い対峙が起こりました。この対立は、フルシチョフとケネディが戦車を撤退させ緊張を緩和することに合意した後、平和的に終結しました。"
    Berlin_Crisis.3.option.1:0 "「我々の要求を放棄せよ！」"
    Berlin_Crisis.3.option.2:0 "「開戦の時だ！」"
    Berlin_Ultimatum.t:0 "「ベルリン最後通牒？」"
    Berlin_Ultimatum.d:0 "1958年11月、フルシチョフは西側諸国に対し、6か月以内にベルリンから撤退し、そこを自由な非武装化された都市にすることを求める最後通牒を突きつけました。フルシチョフはその期間の終了時に、ソ連が西ベルリンへのすべての交通路の掌握権を東ドイツに譲渡すると宣言しました。これは、東ドイツが許可した場合にのみ西側諸国が西ベルリンへアクセスできるようになることを意味していました。"
    Berlin_Ultimatum.1.option.1:0 "ベルリンの支配を要求せよ！"
    Berlin_Ultimatum.1.option.2:0 "ベルリンには手を出すな。"
    Berlin_Ultimatum.2.option.1:0 "ソ連の要求を拒否せよ！"
    Berlin_Ultimatum.2.option.2:0 "ソ連の最後通牒を受け入れろ！"
    Berlin_Ultimatum.3.t:0 "米国がソ連の圧力に抵抗"
    Berlin_Ultimatum.3.d:0 "NATOの観点からは、共産主義者の領土の深部にある西ベルリンに軍事的な価値はありませんでした。しかし、西ベルリンはソ連による欧州支配に対する抵抗の最高の象徴でした。アイゼンハワーは、ベルリンについて「我々の政治的姿勢が、全くもって非論理的な軍事的姿勢をとることを要求する事例である」とコメントしました。イギリス首相のハロルド・マクミランは、1959年2月にフルシチョフとの詳細な協議のためモスクワを訪問しました。会談は概ね和やかであり、最後通牒は撤回されました。"
    Berlin_Ultimatum.3.option.1:0 "我々の要求を放棄せよ！"
    Berlin_Ultimatum.3.option.2:0 "戦争の時だ！"
    Berlin_Blockade.t:0 "ベルリン封鎖？"
    Berlin_Blockade.d:0 "ベルリン封鎖は、冷戦における最初の重大な国際危機のひとつでした。第二次世界大戦後のドイツにおける多国籍占領のさなか、ソ連は西側同盟国による、西側が支配するベルリンの各セクターへの鉄道、道路、および運河のアクセスを遮断しました。ソ連は、西側同盟国が西ベルリンに新たに導入したドイツマルクを撤回するのであれば、封鎖を解除すると提案しました。"
    Berlin_Blockade.1.option.1:0 "ベルリンの支配を要求せよ！"
    Berlin_Blockade.1.option.2:0 "ベルリンには手を出すな。"
    Berlin_Blockade.2.option.1:0 "ソ連の要求を拒否せよ！"
    Berlin_Blockade.2.option.2:0 "ソ連の最後通牒を受け入れろ！"
    Berlin_Blockade.3.t:0 "米国がソ連の圧力に抵抗"
    Berlin_Blockade.3.d:0 "西側同盟国は、1948年6月26日から1949年9月30日にかけて、西ベルリンの市民に物資を届けるためにベルリン大空輸を実施しました。都市の規模と人口を考えると、これは困難な偉業でした。当初、空輸は不可能であると結論づけていたソ連は、それが成功し続けることに次第に困惑を覚えるようになりました。1949年5月12日、東ベルリンの経済問題によりソ連は西ベルリンの封鎖を解除しましたが、アメリカとイギリスは、ソ連が封鎖を再開して西側の供給網を混乱させようとしているのではないかと懸念したため、しばらくの間、空路による都市への物資供給を継続しました。"
    Berlin_Blockade.3.option.1:0 "「我々の要求を撤回せよ！」"
    Berlin_Blockade.3.option.2:0 "「戦争の時だ！」"
    
    renovate_capital_decision:0 "首都再建"
    renovate_capital_decision_desc:0 "我々の[concept_capital_state]は古い都市ですが、窮屈な中世風の通りや施設は、その魅力を損なっています。近代的な輸送網を導入し、潜在的な衛生問題を取り除くために、[concept_capital_state]の改修に投資することで、我が国の首都にふさわしい都市にすることができます。"
    
    je_renovate_capital_system:0 "[ROOT.GetCountry.GetCapital.GetCityHubName]の再建中"
    je_renovate_capital_system_reason:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]の専属建築家には、拡大し続ける大都市である[ROOT.GetCountry.GetCapital.GetCityHubName]を、文明世界の中心である大[ROOT.GetCountry.GetAdjectiveNoFlag]「世界帝国」の輝かしい新首都、#yellow [ROOT.GetCountry.GetAdjectiveNoFlag]ia#!へと変貌させる任務が与えられました。これは壮大な事業となるでしょう。\n\n国内紙は、その設計が「真に記念碑的であり……あらゆる期待を遥かに超えている」と報じており、[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]自身も「この石の砂漠から、千年の帝国の首都が立ち上がるのだ」と堂々と宣言しました。海外メディアは、そこまで熱狂的ではないものの、同様の見解を示しています。例えば、ある外国の新聞は、このプロジェクトを現代における「おそらく最も野心的な計画」と表現しました。"
    je_renovate_capital_system_goal:0 "[ROOT.GetCountry.GetCapital.GetCityHubName]の再建が完了しました"
    
    renovate_capital_dev_cost:0 "首都の再建コスト"
    grand_capital:0 "壮麗な都市"
    
    foreign_triggered_enactment.t:0 "[SCOPE.sCountry('manipulator_country').GetAdjectiveNoFlag]による[ROOT.GetCountry.GetAdjectiveNoFlag]政治への干渉"
    foreign_triggered_enactment.d:0 "[SCOPE.sCountry('manipulator_country').GetName]に所属するエージェントが、[ROOT.GetCountry.GetAdjective]の[concept_government]が[SCOPE.sLaw('law_to_be_enacted').GetName]を制定するよう扇動しました。\n\nこれを行わなければ、[ROOT.GetCountry.GetName]における[SCOPE.sCountry('manipulator_country').GetAdjectiveNoFlag]支持派閥である[SCOPE.gsInterestGroup('target_interest_group').GetName]の反感を買うことになります。"
    foreign_triggered_enactment.f:0 "このイベントは、[SCOPE.sCountry('manipulator_country').GetName]が[ROOT.GetCountry.GetName]に対して$conduct_hostile_espionage_8$の[concept_diplomatic_pact]を有しているために発生しました。"
    
    foreign_triggered_enactment.option.1:0 "外国の影響に屈する。"
    foreign_triggered_enactment.option.2:0 "我々は圧力に抵抗しなければならない！"
    
    seikan_tunnel_decision:0 "青函トンネルを建設する"
    seikan_tunnel_decision_desc:0 "青函トンネルは、日本の53.85km（33.46マイル）の三線軌条鉄道トンネルです。そのうち23.3km（14.5マイル）は、本州の青森県とその北方に位置する島の北海道を隔てる津軽海峡の海底を通っています。"
    channel_tunnel_decision:0 "英仏海峡トンネルを建設する"
    channel_tunnel_decision_desc:0 "英仏海峡トンネルは、1994年に開通した50.46km（31.35マイル）の海底鉄道トンネルであり、ドーバー海峡のストレートにおいて、フォークストン（イングランド、ケント州）とコカル（フランス、パ＝ド＝カレー県）を結んでいます。これはイギリス諸島とヨーロッパ大陸を結ぶ唯一の固定路です。"
    zhuhai_bridge_decision:0 "香港ー珠海ーマカオ大橋を建設する"
    zhuhai_bridge_decision_desc:0 "香港ー珠海ーマカオ大橋（HZMB）は、3つの斜張橋、海底トンネル、および4つの人工島で構成される55km（34マイル）の橋梁・トンネルシステムです。世界最長の海上横断路であり、最長の開放海域固定路でもあります。HZMBは、香港およびマカオと、中国の珠江デルタの大都市である珠海を結ぶ、菱定チャネルと九洲チャネルにまたがっています。"
    palm_islands_decision:0 "パーム・アイランドを建設する"
    palm_islands_decision_desc:0 "パーム諸島は、アラブ首長国連邦ドバイの海岸沿いにある、パーム・ジュメイラ、デイラ諸島、パーム・ジェベル・アリの3つの人工群島で構成されています。"
    
    seikan_tunnel:0 "青函トンネル"
