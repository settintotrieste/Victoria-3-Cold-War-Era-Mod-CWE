    form_CIS_decision:0 "独立国家共同体を結成"
    form_CIS_decision_desc:0 "独立国家共同体（CIS）は、ユーラシアにおける地域的な政府間組織です。これは1991年のソ連崩壊を受けて形成されました。CISは経済、政治、軍事分野における協力を促進しており、国境を越えた犯罪防止を含む、貿易、金融、立法、および治安維持の調整に関する一定の権限を有しています。"
