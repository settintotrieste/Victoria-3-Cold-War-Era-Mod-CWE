    american_puerto_rico.sgc.t:0 "プエルトリコ自治領？"
    american_puerto_rico.sgc.d:0 "アメリカ合衆国政府は、1950年のプエルトリコ連邦関係法に基づき、プエルトリコが独自の憲法を起草することを許可しました。憲法制定議会は1951年から1952年にかけて数ヶ月間にわたり開催され、その間に文書が作成されました。法律は起草者に対し、共和制の政府形態と権利章典の包含という2つの基本要件のみに従うことを求めていました。"
    american_NMI.sgc.t:0 "北マリアナ諸島自治領？"
    american_NMI.sgc.d:0 "第二次世界大戦での日本の敗戦後、北マリアナ諸島は安全保障理事会決議21号に基づき、国際連合太平洋諸島信託統治領の一部としてアメリカ合衆国によって管理されました。これにより、受託者であるアメリカ合衆国に防御と外交の責任が割り当てられました。北マリアナ諸島の人々は、1970年代に独立を求めるのではなく、アメリカ合衆国とのより密接な関係を築くことを決定しました。自治領としての地位を求める交渉は1972年に始まり、アメリカ合衆国との政治的連合における自治領を設立するための協定が、1975年の国民投票で承認されました。新しい政府と憲法は、一部において1978年1月9日に施行されました。"
    american_ESM.sgc.t:0 "アメリカ領サモアの自治？"
    american_ESM.sgc.d:0 "1900年と1904年に割譲証書が署名されて以来、サモアの人々はアメリカのシステムへのさらなる統合を避けてきました。1949年、内務省は有機法を通じてアメリカ領サモアを編入しようと動き出しました。編入がサモアの文化や伝統的な土地所有を損なうことを恐れたサモアのマタイが介入し、議会は編入を停止しました。その代わりにサモアは、先住民の統治システムに基づいた独自の政府であるサモア・フォノを創設しました。それ以来、サモアの人々は連邦地方裁判所の設置を拒み、出生による市民権を拒否しており、独自の入国移民制度を持つ唯一のアメリカ領土となっています。"
    
    american_decolonisation.option.1:0 "植民地に自治権を与えよ"
    american_decolonisation.option.2:0 "奴らに自治権を与える価値などない"
    
    american_west_germany.indy.t:0 "西ドイツの独立？"
    american_west_germany.indy.d:0 "ボン＝パリ協定は1952年5月に署名され、1955年の批准を経て発効しました。この協定により、同盟国による西ドイツの占領は終結しました。"
    american_japan.indy.t:0 "日本の独立？"
    american_japan.indy.d:0 "サンフランシスコ平和条約は、法的な戦争状態を終結させ、第二次世界大戦に至るまでの敵対行為への補償を規定することにより、国際連合を代表して日本と連合国の間の平和的な関係を再構築しました。1951年のこの条約は、同日に署名された安全保障条約とともに、日本の米国との関係や国際社会における役割を定義するサンフランシスコ体制の始まりとなりました。"
    american_germany_japan.indy.t:0 "プラザ合意？"
    american_germany_japan.indy.d:0 "プラザ合意は、1985年9月22日にニューヨーク市のプラザホテルにおいて、フランス、西ドイツ、日本、イギリス、および米国の間で署名された共同合意です。これは通貨市場への介入を通じて、フランス・フラン、ドイツ・マルク、日本円、および英ポンドに対して米ドルを減価させることを目的としていました。"
    american_micronesia.indy.t:0 "ミクロネシアの独立？"
    american_micronesia.indy.d:0 "$generic_independence_decolonisation_loc_desc$"
    american_iraq.indy.t:0 "イラクからの撤退？"
    american_iraq.indy.d:0 "イラク戦争が2003年の初期の侵略フェーズから、10年近くに及ぶ占領へと進むにつれ、米国の世論は軍隊の撤退を支持する方向へと変化しました。イラクからの米軍の撤退は、2007年のイラク戦争における増派の終了とともに2007年12月に始まり、2011年12月までにほぼ完了してイラク戦争に終止符を打ちました。イラクからの米軍撤退は、2000年代の大部分において米国で論争の的となりました。"
    american_afghanistan.indy.t:0 "アフガニスタンからの撤退？"
    american_afghanistan.indy.d:0 "2021年8月、米国はアフガニスタンから最後の部隊を撤退させ、約20年間にわたる軍の展開を終了しました。米国の離脱によりタリバンが国の支配を取り戻し、多くのアフガニスタン人が逃れたことで難民危機が発生しました。"
    american_germany.indy.t:0 "主権を持つドイツ？"
    american_germany.indy.d:0 "「ドイツに関する最終解決に関する条約」は、1990年代初頭にドイツの統合を可能にした国際協定です。これは1990年、「二つの」国であるドイツ連邦共和国とドイツ民主共和国、および第二次世界大戦末期にヨーロッパのドイツを占領していたフランス、ソ連、イギリス、アメリカ合衆国の四ヶ国との間で交渉されました。この条約は1945年のポツダム協定に取って代わるものでした。この中で四ヶ国はドイツに関して保持していたすべての権利を放棄し、翌年にドイツが完全な主権国家として統合されることを可能にしました。"
    american_italy.indy.t:0 "パリ条約？"
    american_italy.indy.d:0 "イタリアと同盟国との間のパリ条約は1947年2月10日に署名され、両当事者間の敵対状態を正式に終了させました。これは1947年9月15日に一般的に効力を発生しました。"
    american_south_korea.indy.t:0 "韓国の独立？"
    american_south_korea.indy.d:0 "大韓民国第一共和国は、1948年8月から1960年4月までの韓国の政府でした。第一共和国は、1945年の日本統治終了以来韓国を統治していたアメリカ陸軍軍政からの移管を経て、1948年8月15日に設立され、韓国における最初の独立した共和制政府となりました。"
    american_FRG.indy.t:0 "ドイツ連邦共和国？"
    american_FRG.indy.d:0 "西側同盟国は、西ドイツの官僚に与える権力を次第に委譲していき、各占領区域のための中央経済評議会を創設することで、将来のドイツ政府の核となる組織の確立へと動きました。この計画は後に、西ドイツの制憲議会、同盟国とドイツ当局との関係を規定する占領憲章、そしてフランスの占領区域とイギリスおよびアメリカの占領区域の政治的・経済的統合を規定しました。1949年5月23日、ドイツ連邦共和国の憲法である基本法が公布されました。"
    american_philippines.indy.t:0 "マニラ条約？"
    american_philippines.indy.d:0 "1946年のマニラ条約（正式名称は一般関係およびプロトコルに関する条約）は、1946年7月4日にフィリピンの首都マニラで署名された一般関係に関する条約です。この条約は、米国によるフィリピンへの主権を放棄し、フィリピン共和国の独立を承認しました。"
    american_iceland.indy.t:0 "ケフラヴィーク協定？"
    american_iceland.indy.d:0 "ケフラヴィーク協定は、第二次世界大戦の終結後、1946年に米国政府と新しく設立されたアイスランド共和国との間で結ばれた協定です。この協定では、米軍が6か月以内に同国を離脱すること、およびアイスランド人がケフラヴィーク空港を接収することが規定されていました。"
    american_iceland_2.indy.t:0 "アイスランド防衛軍を撤退させるか？"
    american_iceland_2.indy.d:0 "2006年3月15日、駐アイスランド米国大使のキャロル・ヴァン・フォーストは、2006年9月末までにアイスランド防衛軍を撤退させるという米国の決定を発表しました。9月30日、アメリカ軍は最後の4機の空軍戦闘機と救助ヘリコプター飛行隊をケフラヴィークから撤退させました。"
    american_south_vietnam.indy.t:0 "米国の南ベトナムからの撤退？"
    american_south_vietnam.indy.d:0 "新たに選出されたリチャード・M・ニクソン大統領は1969年、紛争を終結させ、米国とその同盟国である南ベトナムに「名誉ある平和」を確保するために、ベトナム戦争への米国の関与を継続すると宣言しました。その主な要素は以下の通りです。すべての当事者は協定署名から24時間以内にその場での停戦を開始すること。米軍およびすべての外国軍は、協定署名から60日以内に南ベトナムから撤退すること。アメリカの捕虜は、米軍および外国軍の撤退と同時に解放されること。そして、南部の政治的未来を決定するための自由で民主的な選挙を組織し監督するために、国民和解・調和のための国民議会が設立されること。"
    american_palau.indy.t:0 "パラオの独立？"
    american_palau.indy.d:0 "他の太平洋諸島とともに、パラオは1947年にアメリカ合衆国が統治する太平洋諸島信託統治領の一部となりました。1978年の住民投票でミクロネシア連邦への加入に反対票を投じた結果、これらの島々は1994年にアメリカ合衆国との自由連合盟約の下で完全な主権を獲得しました。"
    
    american_decolonisation_indy.option.1:0 "彼らに独立を認める"
    american_decolonisation_indy.option.2:0 "彼らに自由を与える価値はない"
    
    soviet_north_korea.indy.t:0 "北朝鮮の独立？"
    soviet_north_korea.indy.d:0 "1945年、第二次世界大戦での日本降伏後、朝鮮は北緯38度線を境に二つの区域に分割され、北側はソ連、南側はアメリカ合衆国によって占領されました。1948年、朝鮮には別々の政府が形成されました。北側には社会主義的でソ連寄りの朝鮮民主主義人民共和国が、南側には資本主義的で西側諸国寄りの大韓民国が誕生しました。"
    soviet_afghanistan.indy.t:0 "アフガニスタンから撤退するか？"
    soviet_afghanistan.indy.d:0 "1985年3月にソ連共産党書記長に就任したミハイル・ゴルバチョフは、政治局によって選出された直後、アフガニスタンからの軍事的撤退の計画を開始しました。彼の指導の下、ソ連はアフガニスタン民主人民共和国（PDPA）による権力掌握を支援しようと試みました。アフガニスタンの秘密警察（KHAD）の元トップであったモハマド・ナジブラッラーが書記長に選出され、後に革命評議会議長に就任すると、ソ連軍はアフガニスタンから徐々に撤退していきました。ソ連のアフガニスタン撤退後も、ゴルバチョフ政権はアフガニスタンの反対勢力に対し、ナジブラッラーを軍事的・政治的に支援し続けました。"
    
