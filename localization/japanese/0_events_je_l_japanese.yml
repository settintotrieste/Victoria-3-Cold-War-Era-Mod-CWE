    british_india.indy.t:0 "インドの独立？"
    british_india.indy.d:0 "1947年6月3日、インド最後の英国総督であったルイス・マウントバッテン子爵は、英領インドをインドとパキスタンに分割することを発表しました。1947年インド独立法の迅速な成立により、1947年8月14日の11時57分にパキスタンが別の国として宣言されました。その後、1947年8月15日の12時02分に、インドは主権を有する民主的な国となりました。"
    british_palestine.indy.t:0 "イスラエルとパレスチナの独立？"
    british_palestine.indy.d:0 "1947年11月、国際連合はパレスチナを分割し、それぞれアラブ国家とユダヤ国家を樹立することを勧告しました。1948年5月15日、イギリスは委任統治権を放棄しました。イギリス軍はパレスチナから撤退し、ユダヤ人とアラブ人がその後に続く戦争で決着をつけるままにしました。"
    british_jordan.indy.t:0 "トランスヨルダンの独立？"
    british_jordan.indy.d:0 "$generic_independence_decolonisation_loc_desc$"
    british_iraq.indy.t:0 "イラクの占領を終わらせる？"
    british_iraq.indy.d:0 "1941年4月1日、ラシード・アリ・アル＝ガイラーニーとゴールデン・スクエアのメンバーがクーデターを起こしました。その後の英イラク戦争において、イギリスは、政府が枢軸国との関係を理由に西側諸国への石油供給を遮断することを恐れ、イラクに侵略しました。ハシェミット君主制によるクーデター前の政府が復帰した後、軍事占領が行われました。占領は1947年10月26日に終了しましたが、イギリスは1954年までイラクに軍事基地を保持し、その後アッシリア民兵は解散されました。"
    british_malaysia.indy.t:0 "イギリスのシンガポール撤退？"
    british_malaysia.indy.d:0 "1967年7月18日、イギリスは1970年代半ばまでにシンガポールから軍を撤退させると発表しました。その6か月後、期限は1971年に繰り上げられました。イギリス軍の突然の撤退は、シンガポールの防衛と経済的安定に深刻な問題をもたらしました。これに対応するため、シンガポールは急速な工業化計画に着手し、国外投資を呼び込むために労働法を強化し、他国との軍事協力を通じて防衛力を強化し、軍事費を3倍に増大させました。"
    british_malta_2.indy.t:0 "マルタからのイギリス撤退？"
    british_malta_2.indy.d:0 "マルタは1964年9月21日（独立記念日）にマルタ国として独立を果たしました。1964年の憲法の下、マルタは当初エリザベス2世をマルタ女王として、ひいては元首として保持し、総督が彼女に代わって権力を執行していました。1971年にドム・ミントフ率いるマルタ労働党が総選挙で勝利した結果、マルタは1974年12月13日（共和国記念日）にコモンウェルス内で共和国を宣言しました。独立後すぐに防衛協定が締結され、1972年に再交渉された後、1979年3月31日（自由記念日）に期限が切れました。期限の終了に伴い、イギリスの基地は閉鎖され、かつてイギリスが支配していた土地はマルタ政府に譲渡されました。"
