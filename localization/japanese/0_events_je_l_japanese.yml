    nato_application_rejection.d:0 "NATOのリーダーである[SCOPE.sCountry('nato_leader').GetName]は、我々の偉大な同盟への加入というささやかな願いを拒否しました。彼らは、我々の加盟を拒否する理由として地政学的な理由を挙げています。"
