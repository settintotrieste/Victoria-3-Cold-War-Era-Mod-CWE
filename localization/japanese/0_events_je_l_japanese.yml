    je_olympic_stadium_button:0 "オリンピックスタジアムを建設"
    je_olympic_stadium_button_desc:0 "オリンピックスタジアムとは、通常オリンピックのメインスタジアムに与えられる名称です。オリンピックスタジアムは開会式と閉会式が行われる場所となります。"
    je_olympic_sports_centre_button:0 "オリンピック・スポーツセンターを建設"
    je_olympic_sports_centre_button_desc:0 "オリンピック・スポーツセンターは、水泳やその他の屋内競技が行われる施設です。"
    je_olympic_village_button:0 "オリンピック選手村を建設"
    je_olympic_village_button_desc:0 "オリンピック選手村とは、すべての代表団を収容することを目的として、開催都市内またはその近郊にオリンピックのために建設または割り当てられた居住施設です。"
    je_olympic_media_centre_button:0 "オリンピック・メディアセンターを建設"
    je_olympic_media_centre_button_desc:0 "メディアセンターは、オリンピック期間中、世界中から集まる数千人ものジャーナリストやメディア技術者を迎え入れ、ホスト役を務めます。"
    
