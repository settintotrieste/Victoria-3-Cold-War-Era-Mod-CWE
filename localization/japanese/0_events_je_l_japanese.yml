    institutional_veto.d:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('lower_house_name')]、[SCOPE.GetRootScope.GetCountry.GetCustom('supreme_court_name')]、および[GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetNameWithCountryVariant]の有力なメンバーが、[ROOT.GetCountry.GetName]を[SCOPE.sLaw('current_law_scope').GetName]に変えようとする[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [ROOT.GetCountry.GetRuler.GetFullName]の試みに反対の意を表明しました。現体制の強硬な擁護者たちは、国の[concept_government_type]を変更しようとするあらゆる試みを中止し、現状に完全に復帰することを要求しています。"
