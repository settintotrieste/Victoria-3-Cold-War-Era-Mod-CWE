    british_vanuatu.indy.d:0 "ニューヘブリディーズ共同統治は、英仏共同統治領がバヌアツとして独立した1980年7月30日に終了しました。1906年以来、数十年にわたる二重の植民地行政を経て、この諸島は共同統治体制を解消しました。これは、太平洋地域のイギリス植民地として最後に主権を達成した事例であり、またこの地域におけるフランス領としては最初の事例となりました。"
