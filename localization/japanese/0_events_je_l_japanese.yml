    notification_party_update_notification_name:0 "[SCOPE.gsInterestGroup('IG_expelled_from_party').GetName]が[SCOPE.sParty('new_IG_party').GetName]に加入しました"
    notification_party_update_notification_desc:0 "選挙における勝算を高めるため、[SCOPE.gsInterestGroup('IG_expelled_from_party').GetName]は相違を乗り越え、政治的な同盟として[SCOPE.sParty('new_IG_party').GetName]に加わりました。\n\nこれは、現在の[GetLawType('law_first_past_the_post').GetGroup.GetName]が[Concept('concept_party', '$concept_parties$')]に対し、二大政党制への統合を促しているために発生しました。"
    
    notification_party_leave_update_notification_name:0 "[SCOPE.gsInterestGroup('IG_expelled_from_party').GetName]が[SCOPE.sParty('party_affected_by_expulsion_IG').GetName]を離脱"
    notification_party_leave_update_notification_desc:0 "相容れない相違があるとして、[SCOPE.gsInterestGroup('IG_expelled_from_party').GetName]は[SCOPE.sParty('party_affected_by_expulsion_IG').GetName]を離脱することを決定しました。\n\nこれは、[SCOPE.gsInterestGroup('IG_expelled_from_party').GetName]の[concept_approval]が#r 不満#!な状態であるために発生しました。"
    
    notification_mega_party_leave_update_notification_name:0 "[SCOPE.gsInterestGroup('IG_expelled_from_party').GetName]が[SCOPE.sParty('party_affected_by_expulsion_IG').GetName]を離脱"
    notification_mega_party_leave_update_notification_desc:0 "相容れない相違があるとして、[SCOPE.gsInterestGroup('IG_expelled_from_party').GetName]は[SCOPE.sParty('party_affected_by_expulsion_IG').GetName]を離脱することを決定しました。\n\nこれは、[SCOPE.sParty('party_affected_by_expulsion_IG').GetName]が#y 巨大政党#!であり、[SCOPE.gsInterestGroup('IG_expelled_from_party').GetName]の[concept_approval]が#r 体制派#!ではないために発生しました。"
    
    notification_no_gov_party_update_notification_name:0 "[concept_government]が崩壊"
    notification_no_gov_party_update_notification_desc:0 "[concept_government]の[concept_interest_group]が[concept_party]を持っていないため、[concept_government]は崩壊しました。その結果、[SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')]は解散され、今後[concept_election]が早期に実施されます。"
    
    ban_party_hopping_decision:0 "政党の乗り換えを禁止"
    ban_party_hopping_decision_desc:0 "このディシジョンは、選出された代議士が就任後に政党を変更することを禁止します。これは政党の安定性を強化し、有権者の信頼を維持し、日和見的な忠誠心の変化を減らすことを目的としています。\n\n@information!このディシジョンは、[Concept('concept_interest_group', '$concept_interest_groups$')]が[concept_election]の途中で[concept_party]を変更することを阻止し、その選挙における力を強化します。"
    
    amendment_party_hopping_banned:0 "政党変更の禁止"
    amendment_party_hopping_banned_desc:0 "選出された代議士は、就任後に政党を変更することが禁止されます。\n\n@information!このディシジョンは、[Concept('concept_interest_group', '$concept_interest_groups$')]が[concept_election]の途中で[concept_party]を変更することを阻止し、その選挙における力を強化します。"
    
    historical_ISR_population_boom:0 "愛国的な出生主義"
    economic_legacy_of_ww2_very_high:0 "第二次世界大戦の経済的遺産"
    economic_legacy_of_ww2_high:0 "第二次世界大戦の経済的遺産"
    economic_legacy_of_ww2_medium:0 "第二次世界大戦の経済的遺産"
    economic_legacy_of_ww2_low:0 "第二次世界大戦の経済的遺産"
    
    je_post_ww2_rationing:0 "第二次世界大戦後の配給制"
    je_post_ww2_rationing_reason:0 "第二次世界大戦後の配給制は、戦争によって引き起こされた不足を管理するために多くの国で実施された、希少な資源を制御して分配するシステムでした。政府は、食料、衣類、燃料、その他の必需品へのアクセスを規制するために、配給手帳、クーポン、ポイント制度を導入しました。\n\nイギリスでは、配給は戦時中に始まり、1954年まで肉、砂糖、乳製品などの品目を対象に継続されました。\n\n同様の措置は、大陸ヨーロッパ、日本、および戦時の混乱の影響を受けたその他の地域でも採用されました。配給制は、公平な分配を確保し、経済を安定させ、戦後の復興期における復興努力を支援することを目的としていました。"
    post_ww2_rationing_modifier:0 "第二次世界大戦後の配給制"
    
    enforce_parliamentary_regime_system.t:0 "[GetPlayer.GetRuler.GetLastName]省の危機"
    enforce_parliamentary_regime_system.d:0 "一連の政府の刷新により、[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [GetPlayer.GetRuler.GetFullName]の[concept_interest_group]は、予期せず[concept_government]から外れてしまいました。\n\n[ROOT.GetCountry.GetAdjective]政府の議会制では、[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]の[concept_party]または[concept_interest_group]も[concept_government]に属している必要があるため、[GetPlayer.GetRuler.GetInterestGroup.GetName]を[concept_government]に再招待するか、[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]が退陣しなければなりません。"
    enforce_parliamentary_regime_system.f:0 "このイベントは、[ROOT.GetCountry.GetName]の[concept_government_type]が本質的に#y 議会制#!であるにもかかわらず、[concept_ruler]の[concept_interest_group]が[concept_government]にないために発生しました。"
    
