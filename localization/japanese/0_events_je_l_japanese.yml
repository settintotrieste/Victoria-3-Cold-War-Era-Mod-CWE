    je_un_peacekeeping_system:0 "国連平和維持決議"
    je_un_peacekeeping_system_reason:0 "[SCOPE.sCountry('un_peacekeeping_applicant_scope').GetName]は、[SCOPE.sCountry('un_peacekeeping_applicant_enemy_scope').GetName]およびそのすべての交戦国に対して直ちにすべての敵対行為を停止するよう要求し、すべてのメンバーに対して[SCOPE.sCountry('un_peacekeeping_applicant_scope').GetAdjectiveNoFlag]ー[SCOPE.sCountry('un_peacekeeping_applicant_enemy_scope').GetAdjectiveNoFlag]の戦争に介入することを求める決議を国連総会に提案しました。\n\n申請者：[SCOPE.sCountry('un_peacekeeping_applicant_scope').GetName] \n\n標的国：[SCOPE.sCountry('un_peacekeeping_applicant_enemy_scope').GetName] \n\nUNSC投票数バランス：[GetPlayer.MakeScope.Var('unsc_peackeeping_vote_count_var_display').GetValue] / 総UNSCメンバー数：[GetPlayer.MakeScope.Var('unsc_members_count_display').GetValue] \n\nUNGA投票数バランス：[GetPlayer.MakeScope.Var('unga_peackeeping_vote_count_var_display').GetValue] / 総UNGAメンバー数：[GetPlayer.MakeScope.Var('unga_members_count_display').GetValue]"
