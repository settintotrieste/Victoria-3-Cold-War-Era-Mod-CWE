    je_climate_change_system:0 "地球規模の気候変動"
    je_climate_change_system_reason:0 "気候変動とは、気温や気象パターンの長期的な変化を指します。こうした変化は自然なものである場合もありますが、1800年代以降は、主に熱を閉じ込めるガスを発生させる化石燃料（石炭、石油、ガスなど）の燃焼による人間活動が、気候変動の主な要因となっています。\n\n現在の気候状況：[SCOPE.GetRootScope.GetCountry.GetCustom('climate_effect_name')] \n\n目標：気候基準値は+2.0°Cを超えてはならない \n\n現在の世界気温：+[GetPlayer.MakeScope.Var('climate_change_status_total_display').GetValue]°C \n\n年間の世界気温変化率：[GetPlayer.MakeScope.Var('climate_change_progress_rate_display').GetValue]°C \n\nヒント：より優れた$lawgroup_environmental_policy$[concept_law]を制定することで、気候変動の速度を遅らせることができます。"
    je_climate_change_system_status:0 "気候基準値：+[GetPlayer.MakeScope.Var('climate_change_status_total_display').GetValue]°C"
    
