    cabinet_minister_resigns.d:0 "[SCOPE.gsInterestGroup('angry_cabinet_ig').GetName]の[SCOPE.gsInterestGroup('angry_cabinet_ig').GetLeader.GetFullName]が、[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')][ROOT.GetCountry.GetRuler.GetFullName]との根本的かつ相容れない相違を理由に[SCOPE.GetRootScope.GetCountry.GetCustom('cabinet_name_custom_title')]を辞任しました。これにより、[concept_government]は政治的にダメージを受けました。"
    cabinet_minister_resigns.f:0 "このイベントは、$cabinet_minister_ig$である[SCOPE.gsInterestGroup('angry_cabinet_ig').GetName]が、現在制定されている[concept_law]に強く反対しているか、あるいは[concept_government]に対して不満、または怒りを感じている[concept_approval]であるために発生しました。"
