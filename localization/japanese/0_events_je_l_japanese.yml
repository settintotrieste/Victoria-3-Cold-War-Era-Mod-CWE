    nato_member:0 "NATO加盟国"
    nato_leader:0 "NATO主導国"
    form_nato_decision:0 "北大西洋条約機構（NATO）を結成"
    form_nato_decision_desc:0 "NATOは集団安全保障体制です。独立した加盟国同士が、第三者による攻撃に対して互いに防衛し合うことに合意しています。冷戦時代、NATOはソ連の脅威を抑止する役割を果たしました。この同盟はソ連およびワルシャワ条約機構の解体後も存続しており、バルカン、中東、南アジア、アフリカにおける軍事作戦に関与してきました。"
    join_nato_decision:0 "北大西洋条約機構（NATO）に参加"
    join_nato_decision_desc:0 "NATOは集団安全保障体制です。独立した加盟国同士が、第三者による攻撃に対して互いに防衛し合うことに合意しています。冷戦時代、NATOはソ連の脅威を抑止する役割を果たしました。この同盟はソ連およびワルシャワ条約機構の解体後も存続しており、バルカン、中東、南アジア、アフリカにおける軍事作戦に関与してきました。注：申請の処理には通常、約1か月かかります。"
    leave_nato_decision:0 "北大西洋条約機構（NATO）から脱退する"
    leave_nato_decision_desc:0 "NATOは集団安全保障体制です。独立した加盟国同士が、第三者による攻撃に対して互いに防衛することを合意しています。冷戦時代、NATOはソ連がもたらす脅威に対する抑止力として機能しました。ソ連とワルシャワ条約機構が解体された後も同盟は維持され、バルカン、中東、南アジア、アフリカでの軍事作戦に関与してきました。"
    nato_application_var:0 "最近NATOへの加盟を申請"
    nato_application_choice.t:0 "[SCOPE.sCountry('nato_applicant').GetName]がNATOへの加盟を申請する"
    nato_application_choice.d:0 "[SCOPE.sCountry('nato_applicant').GetName]が北大西洋条約機構（NATO）への加盟を申請しました。[SCOPE.sCountry('nato_leader').GetName]が現在NATOの議長職を務めているため、[SCOPE.sCountry('nato_applicant').GetName]を組織に受け入れるかどうかは我々の判断に委ねられています。"
