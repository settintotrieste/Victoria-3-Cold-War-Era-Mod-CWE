    develop_cybersin_decision:0 "社会主義サイバネティック・ネットワークを建設する"
    develop_cybersin_decision_desc:0 "1960年代初頭、共産党は既存のスターリン主義的な指揮計画から脱却し、サイバネティクスの原則に基づいた資源配分のための相互連結されたコンピュータ化されたシステムの開発を検討しました。この発展は、情報の分散化と革新に基づいた、より高度に発展した形態の社会主義経済の基礎となり得る、最適化された計画への移行のための基盤と見なされていました。"
    
    je_develop_cybersin:0 "サイバネティック・ネットワークの建設"
    je_develop_cybersin_reason:0 "計画では、首都にコンピュータ・センターを、他の主要都市に最大200の中間レベル・センターを、そして経済的に重要な場所に最大2万の現地ターミナルを配置した3ティアのネットワークを建設し、既存の電話インフラを使用してリアルタイムで通信を行います。この構造により、あらゆるターミナルが他のすべてのターミナルと通信することも可能になります。このネットワークは、中央統計局によって運営されます。\n\nヒント：[Concept('concept_government_wage', '$concept_government_wages$')]を増やすと、Cybersinの月間進行度が上昇します。"
    
    je_cybersin_system:0 "社会主義サイバネティック・ネットワーク"
    je_cybersin_system_reason:0 "全国家自動化システム、すなわちOGASは、既存および新規の電話回線上に構築された、リアルタイムでリモートアクセスが可能な国有コンピュータ・ネットワークです。これは、計画経済におけるあらゆる工場や企業に対して、神経系のように張り巡らされています。そのネットワークは、国家と経済の3層ピラミッド構造に従って階層的にモデル化されています。首都にある1つの中央コンピュータ・センターが、有力な都市にある最大200の中間レベル・コンピュータ・センターに接続され、それがさらに、国有経済の主要な生産拠点に分散している最大2万台のコンピュータ・端末に接続される仕組みです。"
    
