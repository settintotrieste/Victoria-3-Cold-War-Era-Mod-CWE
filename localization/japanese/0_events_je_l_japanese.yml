    ig_civil_service_supports_coup.tt:0 "[GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetNameWithCountryVariant]は[concept_government]にあり、#y 0#!を超える[concept_approval]を保有し、#y $ideology_autocratic$#!または#y $ideology_power_hungry$#!の[concept_ideology] [concept_politician]によって指導されています。"
    self_coup_effects.tt:0 "[GetPlayer.GetRuler.GetPrimaryRoleTitle] [GetPlayer.GetRuler.GetFullName]は非常事態を宣言し、選挙、議会、および憲法を停止します。"
    
