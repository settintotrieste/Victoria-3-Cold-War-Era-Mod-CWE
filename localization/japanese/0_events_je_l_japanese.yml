    je_elections_system_corrupt_campaign_button:0 "不正な寄付を募る"
    je_elections_system_corrupt_campaign_button_desc:0 "[concept_party]の与党候補は、経済的譲歩を与える代わりに、有力な企業や財力のある個人から多額の民間寄付を受け取ることで、[concept_election]の選挙運動において不当な優位性を得ようとします。"
    corrupt_campaign_donations_modifier:0 "民間寄付者と汚職取引を行った"
    corruption_scandal_character_modifier:0 "汚職スキャンダル"
    
    je_judiciary:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('supreme_court_name')]"
    je_judiciary_reason:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('supreme_court_name')]は、[ROOT.GetCountry.GetName]の法曹における最高裁判所です。憲法または法律に関する事項を含むすべての裁判案件に対して最終的な上訴管轄権を有しており、判事が持つ自治権のレベルに応じて、法律を一方的に改正することもあります。\n\n判事は、任命プロセスが政治化されている場合は通常、政府によって任命されます。そうでない場合は、独立委員会を通じて中立的な判事が任命されます。\n\n判事総数：#BOLD [GetPlayer.MakeScope.Var('judiciary_size').GetValue]#!\n\n[concept_progressive_judiciary]人判事数：#BOLD [GetPlayer.MakeScope.Var('judiciary_progressiveness').GetValue]#!\n\n注：[concept_progressive_judiciary]判事は、$HUMAN_RIGHTS$および$POWER_STRUCTURE$のカテゴリーにおいて、より民主的な[Concept('concept_law','$concept_laws$')]を支持します。"
    je_judiciary_status:0 "[GetPlayer.MakeScope.Var('judiciary_progressiveness').GetValue] / [GetPlayer.MakeScope.Var('judiciary_size').GetValue]人の判事は[concept_progressive_judiciary]です"
    je_judiciary_appoint_judges_button:0 "判事を任命する"
    je_judiciary_appoint_judges_button_desc:0 "[concept_government]は、退任する判事に代わる人物を[SCOPE.GetRootScope.GetCountry.GetCustom('supreme_court_name')]に任命することができます。それにより、裁判所の思想的構成が変化する可能性があります。"
    recently_appointed_judges.tt:0 "[concept_government]は、過去12ヶ月間に[SCOPE.GetRootScope.GetCountry.GetCustom('supreme_court_name')]の裁判官を任命していません。"
    je_judiciary_expand_court_button:0 "法廷を拡大する"
    recently_expanded_court.tt:0 "[concept_government]は、過去12ヶ月間に[SCOPE.GetRootScope.GetCountry.GetCustom('supreme_court_name')]を拡大していません。"
    je_judiciary_expand_court_button_desc:0 "[concept_government]は、[SCOPE.GetRootScope.GetCountry.GetCustom('supreme_court_name')]の裁判官の総数を最大20名まで増やすための立法を行うことができます。新たに空いた役職は、該当する場合、政府が任命する裁判官によって補充されます。"
    court_is_expanded.tt:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('supreme_court_name')]が裁判官1名分拡大されました。"
    conservative_judge_appointed.tt:0 "#BOLD [concept_conservative_judiciary]の裁判官を1名任命する#!"
    progressive_judge_appointed.tt:0 "#BOLD [concept_progressive_judiciary]の裁判官を1名任命する#!"
    
    je_judiciary_foreign:0 "[SCOPE.sCountry('legal_union_foreign_supreme_court').GetNameNoFlag]の[SCOPE.GetRootScope.GetCountry.GetCustom('foreign_supreme_court_name')]"
    je_judiciary_foreign_reason:0 "[SCOPE.sCountry('legal_union_foreign_supreme_court').GetName]の[SCOPE.GetRootScope.GetCountry.GetCustom('foreign_supreme_court_name')]は、[ROOT.GetCountry.GetName]の法曹における最高裁判所です。憲法または法律の解釈に関わるすべての裁判案件に対して最終的な上訴管轄権を有しており、判事が持つ自治権のレベルに応じて、法律を一方的に修正することも可能です。\n\n[ROOT.GetCountry.GetName]は[SCOPE.sCountry('legal_union_foreign_supreme_court').GetName]と$legal_union$の関係にあるため、[SCOPE.GetRootScope.GetCountry.GetCustom('foreign_supreme_court_name')]の裁判官は[SCOPE.sCountry('legal_union_foreign_supreme_court').GetAdjectiveNoFlag]政府によって選出されます。\n\n判事の総数：#BOLD [GetPlayer.MakeScope.Var('judiciary_size').GetValue]#!\n\n[concept_progressive_judiciary]人の判事数：#BOLD [GetPlayer.MakeScope.Var('judiciary_progressiveness').GetValue]#!\n\n注：[concept_progressive_judiciary]の裁判官は、$HUMAN_RIGHTS$および$POWER_STRUCTURE$のカテゴリーにおいて、より民主的な[Concept('concept_law','$concept_laws$')]を支持します。"
    je_judiciary_foreign_status:0 "[GetPlayer.MakeScope.Var('judiciary_progressiveness').GetValue] / [GetPlayer.MakeScope.Var('judiciary_size').GetValue] の裁判官は [concept_progressive_judiciary]"
    
