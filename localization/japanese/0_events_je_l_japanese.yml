    je_wto_system: "世界貿易機関"
    je_wto_system_reason: "世界貿易機関（WTO）は、国際貿易を規制および促進する政府間組織です。WTOは、貿易協定交渉のための枠組みを提供することにより、参加国間における商品、サービス、および知的財産の貿易を促進します。これらの協定は通常、関税、割当、およびその他の制限の削減または撤廃を目的としています。\n\nWTOは貿易の枠組みを常に更新しているため、[concept_tariffs]によるWTOからの削減額は毎年変動します。\n\n注意：[concept_tariffs]の削減額は、世界経済の見通しによって異なります。"
    
