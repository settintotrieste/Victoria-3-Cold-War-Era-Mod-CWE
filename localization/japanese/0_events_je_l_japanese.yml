    rio_pact_application_choice.t:0 "[SCOPE.sCountry('rio_pact_applicant').GetName]がリオ協定への加盟を申請しています"
    rio_pact_application_choice.d:0 "[SCOPE.sCountry('rio_pact_applicant').GetName]が米州相互援助条約（リオ協定）への加入を申請しました。[SCOPE.sCountry('rio_pact_leader').GetName]が現在リオ協定の議長職を務めているため、[SCOPE.sCountry('rio_pact_applicant').GetName]を組織に受け入れるかどうかは、我々の判断に委ねられています。"
