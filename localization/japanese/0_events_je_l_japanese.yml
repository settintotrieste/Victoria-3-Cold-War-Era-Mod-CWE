    medium_tariffs_gatt_loc: "GATT関税削減（中）"
    high_tariffs_gatt_loc: "GATT関税削減（高）"
    very_high_tariffs_gatt_loc: "GATT関税削減（超高）"
    
    join_GATT_decision: "関税および貿易に関する一般協定（GATT）に署名する"
    join_GATT_decision_desc: "関税および貿易に関する一般協定（GATT）は、多くの国々の間の法的協定であり、その全体的な目的は、関税や割当などの貿易障壁を削減または撤廃することによって国際貿易を促進することでした。これは、1947年から1995年の間に9つのラウンドからなる一連のグローバルな貿易交渉を通じて更新されてきました。国際貿易におけるその役割は、1995年に世界貿易機関（WTO）によって大部分が継承されました。"
    leave_GATT_decision: "関税および貿易に関する一般協定（GATT）を脱退する"
    leave_GATT_decision_desc: "関税および貿易に関する一般協定（GATT）は、多くの国々の間の法的協定であり、その全体的な目的は、関税や割当などの貿易障壁を削減または撤廃することによって国際貿易を促進することでした。これは、1947年から1995年の間に9つのラウンドからなる一連のグローバルな貿易交渉を通じて更新されてきました。国際貿易におけるその役割は、1995年に世界貿易機関（WTO）によって大部分が継承されました。"
    
