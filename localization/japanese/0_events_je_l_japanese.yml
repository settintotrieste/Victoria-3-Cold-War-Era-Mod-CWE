    je_central_bank:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('central_bank_name_custom_title')]"
    je_central_bank_reason:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('central_bank_name_custom_title')]は[ROOT.GetCountry.GetName]の中央銀行です。\n\n中央銀行は金融政策を用いて経済変動を管理し、インフレが低く安定した状態を意味する物価の安定を実現します。中央銀行は、通常、公開市場での証券の買い入れまたは売却を通じて資金の供給量を調整することにより、金融政策を実施します。公開市場での操作は短期利子率に影響を与え、それがひいては長期利子率や経済活動に影響を及ぼします。中央銀行が利子率を引き下げると、金融政策は緩和されます。利子率を引き上げると、金融政策は引き締められます。\n\n現在の利子率：[SCOPE.GetRootScope.GetCountry.GetCustom('central_bank_current_monetary_policy_custom_title')]\n\n適切な$lawgroup_monetary_policy$：[SCOPE.GetRootScope.GetCountry.GetCustom('central_bank_appropriate_monetary_policy_custom_title')]\n\n今月の平均コア[concept_market_price]：[GetPlayer.MakeScope.Var('core_interest_rate_now').GetValue]%\n\n前月の平均コア[concept_market_price]：[GetPlayer.MakeScope.Var('core_interest_rate_prev').GetValue]%\n\nコア[concept_market_price]の算出に使用される商品（[GetPlayer.MakeScope.Var('core_interest_rate_total_factors').GetValue]が利用可能）：$cir_grain$$cir_meat$$cir_fish$$cir_fruit$$cir_tea$$cir_coffee$$cir_groceries$$cir_liquor$$cir_tobacco$$cir_wine$$cir_transportation$$cir_real_estate$$cir_electricity$$cir_communication_services$$cir_services$$cir_furniture$$cir_telecommunications$$cir_computers$"
