    cold_war_balance_progress_bar_west_desc:0 "[GetGlobalVariable('cold_war_western_bloc_strength').GetValue|1]#!"
    cold_war_balance_progress_bar_east_desc:0 "[GetGlobalVariable('cold_war_eastern_bloc_strength').GetValue|1]#!"
    
    cold_war_core_progress_passive_balance:0 "思想的に類似した[Concept('concept_super_power','$concept_super_powers$')]による、結合された[concept_prestige]"
    
