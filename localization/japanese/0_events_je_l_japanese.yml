    notification_private_media_agitate_public_notification_desc:0 "大手の民間ニュースネットワークが、国家的な問題を誇張し、政府の不正を捏造することで、民衆を狂乱状態に陥れるために共謀しました。"
    
    je_private_media_system: "[ROOT.GetCountry.GetAdjectiveNoFormatting]のメディア"
    je_private_media_system_reason: "[ROOT.GetCountry.GetName]のメディア産業は、国内のあらゆるニュースの普及を共同で独占する、主要な民間ニュースネットワークの連合体によって支配されています。これにより、これらのニュースネットワークの所有者である[GetInterestGroupVariant('ig_industrialists',GetPlayer).GetNameWithCountryVariant]と[GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetNameWithCountryVariant]は、[ROOT.GetCountry.GetAdjective]の人々の心に多大な影響力を持つことになります。\n\nしたがって、民間メディアが[concept_government]に対して影響力を行使することを望まない場合は、民間メディアの忠実性を獲得することが重要です。\n\n@warning!進行状況バーが100%に達すると、メディアは[concept_government]を強化する（民間メディアの忠実性が50%以上の場合）、あるいは妨害する（民間メディアの忠実性が50%未満の場合）行動をとります。\n\n注：#y 民間メディアの忠実性#!は、[GetInterestGroupVariant('ig_industrialists',GetPlayer).GetNameWithCountryVariant]と[GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetNameWithCountryVariant]の支持が少なくとも中立以上であれば上昇し、同じ利益集団の支持がマイナスである場合、あるいは[GetInterestGroupVariant('ig_industrialists',GetPlayer).GetNameWithCountryVariant]や[GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetNameWithCountryVariant]が[concept_government]に含まれていない場合には低下します。"
    
