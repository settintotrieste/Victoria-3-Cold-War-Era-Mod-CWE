    regime_change_failsafe.t: "[ROOT.GetCountry.GetNameNoFormatting]における新体制"
    regime_change_failsafe.d: "[concept_regime_change][concept_war_goal]が強制された最近の[concept_war]において[ROOT.GetCountry.GetName]が敗北したことで、勝利した外国勢力である[SCOPE.sCountry('foreign_power_regime_change').GetName]は、[ROOT.GetCountry.GetName]に新体制を樹立しました。この新体制は[SCOPE.sCountry('foreign_power_regime_change').GetName]と同じ[concept_government_type]と[Concept('concept_law', '$concept_laws$')]を有しています。さらに、[SCOPE.sCountry('foreign_power_regime_change').GetName]の[concept_ruler]と同じ[concept_interest_group]を持つ[concept_politician]が、[ROOT.GetCountry.GetName]の新しい[concept_ruler]として設置される予定です。"
