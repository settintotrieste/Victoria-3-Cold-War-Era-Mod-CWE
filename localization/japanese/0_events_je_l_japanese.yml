    je_join_superstate_free_trade_zone_button:0 "共通市場に加入"
    je_join_superstate_free_trade_zone_button_desc:0 "共通市場とは、通常、[concept_customs_union]の創設に向けた第一段階を指します。これは通常、商品に対する関税がなく、資本、労働者、およびサービスの移動が比較的自由な自由貿易圏に基づいて構築されますが、その他の貿易障壁の削減についてはそれほど進んでいません。\n\nゲーム内では、同じ超国家の野心（Superstate Ambition）を共有し、超国家共通市場への加入を選択したすべての国々の間で、[concept_trade_privilege]および$transit_rights$[concept_treaty]が形成されることによって表されます。"
    
    je_leave_superstate_free_trade_zone_button:0 "共通市場を離脱"
    je_leave_superstate_free_trade_zone_button_desc:0 "共通市場とは、通常、[concept_customs_union]の創設に向けた第一段階を指します。これは通常、商品に対する関税がなく、資本、労働者、およびサービスの移動が比較的自由な自由貿易圏に基づいて構築されますが、その他の貿易障壁の削減についてはそれほど進んでいません。\n\nゲーム内では、同じ超国家の野心（Superstate Ambition）を共有し、超国家共通市場への加入を選択したすべての国々の間で、[concept_trade_privilege]および$transit_rights$[concept_treaty]が形成されることによって表されます。"
    
    je_join_superstate_customs_union_button:0 "単一市場に加入"
    je_join_superstate_customs_union_button_desc:0 "単一市場は、統合された地域経済の最終段階であり、究極の目標です。それには、国境を越えた商品、サービス（金融サービスを含む）、資本、および人の完全な自由移動が必要となります。\n\nこれはゲーム内で、同じ超国家の野望を共有し、超国家関税同盟への加入を選択したすべての国との間に[concept_customs_union]が作成されることによって表現されます。"
    
    je_leave_superstate_customs_union_button:0 "単一市場を離脱"
    je_leave_superstate_customs_union_button_desc:0 "[concept_customs_union]は、単一市場の最終段階であり、究極の目標です。それには、国境を越えた商品、サービス（金融サービスを含む）、資本、および人の完全な自由移動が必要となります。\n\nこれはゲーム内で、同じ超国家の野望を共有し、超国家関税同盟への加入を選択したすべての国との間に[concept_customs_union]が作成されることによって表現されます。"
    
    je_join_superstate_currency_union_button:0 "通貨同盟に加入"
    je_join_superstate_currency_union_button_desc:0 "我々は、仲間の$custom_loc_superstate_full_title$メンバーで構成される[concept_currency_union]を作成できます。\n\nこれはゲーム内で、この国と我が国の[concept_market]のリーダーとの間に[concept_currency_union]が作成されることによって表現されます。"
    
    je_leave_superstate_currency_union_button:0 "通貨同盟を離脱"
    je_leave_superstate_currency_union_button_desc:0 "我々は、仲間の$custom_loc_superstate_full_title$メンバーで構成される[concept_currency_union]を離脱できます。\n\nこれはゲーム内で、この国と我が国の[concept_market]のリーダーとの間に[concept_currency_union]が作成されることによって表現されます。"
    
    je_join_superstate_defence_union_button:0 "防衛同盟に加入"
    je_join_superstate_defence_union_button_desc:0 "我々は、仲間の$custom_loc_superstate_full_title$メンバーで構成される地域防衛同盟を作成できます。\n\nこれはゲーム内で、同じ超国家の野望を共有し、超国家防衛同盟への加入を選択したすべての国との間に[concept_defensive_pact]が作成されることによって表現されます。"
    
    je_leave_superstate_defence_union_button:0 "防衛同盟を離脱"
    je_leave_superstate_defence_union_button_desc:0 "我々は、仲間の$custom_loc_superstate_full_title$メンバーで構成される地域防衛同盟を離脱できます。\n\nこれはゲーム内で、同じ超国家の野望を共有し、超国家防衛同盟への加入を選択したすべての国との間に[concept_defensive_pact]が作成されることによって表現されます。"
    
    je_join_superstate_political_union_button:0 "政治同盟に加入する"
    je_join_superstate_political_union_button_desc:0 "仲間の$custom_loc_superstate_full_title$メンバーで構成される地域政治同盟を形成できます。\n\nこれは、超大国メンバーの過半数が法律を制定した際に、法律が調和されることでゲーム内で表現されます。\n\n@warning! メンバー州の50%以上（すなわち[GetPlayer.MakeScope.Var('superstate_members_majority').GetValue]）によって制定された[concept_law]は、我々によっても自動的に制定されます。"
    
    je_superstate_warning_custom_title:0 "\n\n@warning![ROOT.GetCountry.GetName]は#y [SCOPE.GetRootScope.GetCountry.GetCustom('je_superstate_adjective_custom_title')]政治同盟#!の一部であるため、#yellow $custom_loc_superstate_full_title$#!の[concept_power_bloc_leader]は、任意の[concept_power_bloc_member]を[Concept('concept_enactment_of_laws', '$concept_enactment_of_laws_enact$')][Concept('concept_law', '$concept_laws$')]するよう要請できます。"
    
    je_leave_superstate_political_union_button:0 "政治同盟から脱退する"
    je_leave_superstate_political_union_button_desc:0 "仲間の$custom_loc_superstate_full_title$メンバーで構成される地域政治同盟を形成できます。\n\nこれは、超大国メンバーの過半数が法律を制定した際に、法律が調和されることでゲーム内で表現されます。"
    
    je_create_superstate_final_union_button:0 "統合州を作成する"
    je_create_superstate_final_union_button_desc:0 "$custom_loc_superstate_full_title$メンバーで構成される統合された国を形成できます。\n\nこれは、この国が超大国国のタグへと変化し、すべての仲間の超大国メンバーと[concept_confederal_state][concept_diplomatic_pact]を形成することでゲーム内で表現されます。その後、それらのメンバーは超大国に併合されるかどうかを選択できます。"
    
    je_join_superstate_final_union_button:0 "統合州に加入する"
    je_join_superstate_final_union_button_desc:0 "$custom_loc_superstate_full_title$メンバーで構成される統合された超大国国に加入できます。\n\nこれは、この国が超大国国のタグによって併合されることでゲーム内で表現されます。"
    
