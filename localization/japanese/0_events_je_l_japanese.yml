    colonial_lose_fervor.tt:0 "[ROOT.GetCountry.GetAdjective]のすべての[Concept('concept_primary_cultures','$concept_primary_culture$')]は、[Concept('concept_subject', '$concept_subjects$')]の#g 20#!の[concept_fervor]を失います"
    colonial_lose_liberty_desire.tt:0 "すべての[ROOT.GetCountry.GetAdjective][concept_subject]は、[concept_liberty_desire]の#g 20#!を失います"
    colonial_lose_pop.tt:0 "[ROOT.GetCountry.GetName]内の非[Concept('concept_primary_cultures','$concept_primary_culture$')]のPOPと、その非主権的な[Concept('concept_subject', '$concept_subjects$')]は、その寿命の#r 0.50%#!を失います"
    colonial_lose_relations.tt:0 "[ROOT.GetCountry.GetAdjective][concept_subject]ごとに#r 50#!の[concept_relations]を失う"
    
    notification_colonial_purge_notification_name:0 "[SCOPE.sCountry('subject_country').GetName]の[SCOPE.sCountry('overlord_country').GetAdjective]粛清"
    notification_colonial_purge_notification_desc:0 "[SCOPE.sCountry('overlord_country').GetAdjective]の[concept_government]は、[SCOPE.sCountry('subject_country').GetName]における植民地反対派の粛清を行いました。これにより、[SCOPE.sCountry('subject_country').GetName]は#g 20#!の[concept_liberty_desire]を失い、[SCOPE.sCountry('subject_country').GetName]のすべての[Concept('concept_primary_cultures','$concept_primary_culture$')]のPOPは寿命の#r 0.50%#!を失いました。"
    
    je_occupation_of_austria:0 "オーストリアの占領"
    je_occupation_of_austria_reason:0 "ヨーロッパにおける第二次世界大戦の終結時、オーストリアは同盟国によって占領され、1945年4月27日にナチス・ドイツからの独立を宣言しました。1949年にドイツが東ドイツと西ドイツに分割された一方で、オーストリアは西側同盟国とソ連による共同占領下に置かれました。\n\n1949年にドイツが東ドイツと西ドイツに分割された一方で、オーストリアは西側同盟国とソ連による共同占領下に置かれました。"
    
    je_occupation_of_austria_end_occupation_button:0 "[ROOT.GetCountry.GetAdjectiveNoFormatting]オーストリア占領の終結"
    je_occupation_of_austria_end_occupation_button_desc:0 "[ROOT.GetCountry.GetAdjective]の[concept_government]は、オーストリアに対する軍事占領を終了します。これにより、オーストリアに対する我々の[concept_condominium]が終了し、[concept_condominium]の他のすべてのメンバーに対しても、オーストリアの占領を終了するよう促すことになります。"
    
    je_occupation_of_berlin:0 "ベルリンの占領"
    je_occupation_of_berlin_reason:0 "ヨーロッパにおける第二次世界大戦の終結時、ベルリンは連合国軍によって制圧され、1945年4月27日にナチス・ドイツから正式に分離されました。ベルリンは、アメリカ、イギリス、フランス、およびソ連によって管理される4つの占領地区に分割されました。\n\n西ベルリンは法的には西側連合国の統治下にありましたが、実質的には西ドイツの一部として扱われていました。しかし、居住者は西ドイツのパスポートを保持していませんでした。"
    
    je_occupation_of_berlin_end_occupation_button:0 "[ROOT.GetCountry.GetAdjectiveNoFormatting]ベルリン占領の終結"
    je_occupation_of_berlin_end_occupation_button_desc:0 "[ROOT.GetCountry.GetAdjective]の[concept_government]は、ベルリンに対する軍事占領を終了します。これにより、ベルリンに対する我々の[concept_condominium]が終了し、[concept_condominium]の他のすべてのメンバーに対しても、ベルリンの占領を終了するよう促すことになります。"
    
    je_occupation_of_trieste:0 "トリエステの占領"
    je_occupation_of_trieste_reason:0 "トリエステ自由領は、第二次世界大戦後の国際連合安全保障理事会の直接の責任の下、アドリア海北部に面し、イタリアとユーゴスラビアの間に位置した南欧の独立領土でした。\n\nこの領土は、民族的および文化的に混在する人口を中立の独立国において受け入れるため、イタリアとの平和条約の議定書により、1947年2月10日に設立されました。また、中央ヨーロッパとの貿易における戦略的重要性を考慮し、イタリアとユーゴスラビアの間の領土請求権を沈静化させる意図もありました。\n\n1947年9月15日に発足しました。その行政は2つの区域に分けられていました。一つは北西に細い沿岸地帯を伴う港湾都市トリエステ（ゾーンA）であり、もう一つ（ゾーンB）はイストリア半島の北西部の小部分によって構成されていました。"
    
    je_occupation_of_trieste_end_occupation_button:0 "[ROOT.GetCountry.GetAdjectiveNoFormatting]によるトリエステの占領の終了"
    je_occupation_of_trieste_end_occupation_button_desc:0 "[ROOT.GetCountry.GetAdjective]の[concept_government]は、トリエステの軍事占領を終了します。これにより、我々のトリエステに対する[concept_condominium]が終了し、[concept_condominium]の他のすべてのメンバーに対しても、トリエステの占領を終了するよう促すことになります。"
    
    law_imposition_events.1.d: "[SCOPE.sC('foreign_imposition_country').GetNameNoFlag]は、我々の[SCOPE.sLaw('foreign_imposition_law').GetGroup.GetName]を[SCOPE.sLaw('foreign_imposition_law').GetName]に向けて改革するよう要求してきました。"
    je_law_imposition_reason: "[SCOPE.sC('foreign_imposition_country').GetName]は、我々が[SCOPE.sLaw('foreign_imposition_law').GetName]を制定することが不可欠であると宣言しました。"
    
    Expeditionary_Force:0 "外国遠征軍"
    
    je_law_enactment_system:0 "[SCOPE.GetRootScope.GetCountry.GetLawBeingEnacted.GetName]法案"
    je_law_enactment_system_reason:0 "[ROOT.GetCountry.GetAdjective]の[concept_government]は、[SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')]における[SCOPE.sLaw('current_law_scope').GetName][concept_law]を[Concept('concept_enactment_of_laws', '$concept_enactment_of_laws_enact$')]しようとしています。\n\n#y 法案#!による[SCOPE.sLaw('current_law_scope').GetName]の制定を成功させるためには、様々な国家機関が[concept_law]に#r 反対#!してはなりません。もし反対された場合、#y 法案#!は[Concept('concept_enactment_setback', '$concept_enactment_setbacks$')]に直面するか、あるいは完全に#r 否決#!される可能性があります。\n\n@information!#y [SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')]#!内のすべての[Concept('concept_interest_group', '$concept_interest_groups$')]は、[concept_law][Concept('concept_enactment_of_laws', '$concept_enactment_of_laws_enactment$')]プロセスが開始されるとともに、[concept_government]への支持を再評価することになります。\n\n[SCOPE.GetRootScope.GetCountry.GetLawBeingEnacted.GetName]に対して#y 中立#!または#g 承認#!している[Concept('concept_interest_group', '$concept_interest_groups$')]は、[SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')]において[concept_government]を支持するでしょう。\n\n@warning![SCOPE.sLaw('current_law_scope').GetName]に反対する主要な政府機関および役職者は、以下に記載されています。"
    
    cabinet_minister_veto.tt:0 "閣僚メンバー[SCOPE.sCharacter('cabinet_minister').GetFullName]が[concept_law] [Concept('concept_enactment_of_laws', '$concept_enactment_of_laws_enactment$')]に#r 反対#!しています"
