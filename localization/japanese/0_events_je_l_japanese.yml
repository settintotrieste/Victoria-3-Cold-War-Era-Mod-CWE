    palace_coup.t:0 "[ROOT.GetCountry.GetNameNoFlag]で宮廷クーデターが発生？"
    palace_coup.d:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('paramilitary_group_custom_title')]が[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [SCOPE.sCharacter('palace_coup_ruler').GetFullName]に対して宮廷クーデターを起こしました。彼らの目標は、[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]をより急進的な人物に置き換えることです。[ROOT.GetCountry.GetAdjectiveNoFlag] $ig_armed_forces$は、首都に甚大な犠牲を強いることになりますが、反乱分子を撃退し秩序を回復するために準備を整えています。命令は何でしょうか？"
    palace_coup.f:0 "このイベントは、[SCOPE.GetRootScope.GetCountry.GetCustom('paramilitary_group_custom_title')]の忠実性が0%に低下したために発生しました。"
    
