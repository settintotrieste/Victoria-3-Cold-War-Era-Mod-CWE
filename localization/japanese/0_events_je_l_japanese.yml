    weak_currency_custom_loc:0 "#o 弱い#!"
    normal_currency_custom_loc:0 "#white 正常#!"
    strong_currency_custom_loc:0 "#Yellow 強い#!"
    very_strong_currency_custom_loc:0 "#Green 非常に強い#!"
    
    je_imf_system_request_loan_button:0 "IMFの救済を要請します"
    je_imf_system_request_loan_button_desc:0 "[ROOT.GetCountry.GetName]は、すべてのIMF債権者に対し、[concept_obligation]と引き換えに[ROOT.GetCountry.GetName]の[Concept('concept_credit','$concept_credit_debt$')]の#white 5%#!を引き受けるか、あるいは経済の構造改革を行うことと引き換えに[Concept('concept_bankroll','$concept_bankrolling$')] [ROOT.GetCountry.GetName]を開始するよう要請します。"
    
    je_imf_system_request_loan_resume_button:0 "IMFの融資を再開する"
    je_imf_system_request_loan_resume_button_desc:0 "[ROOT.GetCountry.GetName]は、今後他のIMF加盟国に対してIMF融資を供与する意思があることをIMFに通知します。"
    
    
    je_imf_system_request_development_assistance_button:0 "開発援助を要請します"
    je_imf_system_request_development_assistance_button_desc:0 "[ROOT.GetCountry.GetName]は、国内の開発プロジェクトに資金を供給するため、IMFに対して長期の無利子融資の提供を要請します。"
    
    imf_development_assistance:0 "IMF開発援助"
    
    concept_sdr:0 "特別引出権"
    concept_sdr_desc:0 "特別引出権（SDR）は、IMFのメンバー国の公式準備を補完するためにIMFによって創設された国際準備資産です。SDRは通貨ではありません。これはIMFメンバーが保有する自由に使用可能な通貨に対する潜在的な請求権です。そのため、SDRは国に流動性を提供することができます。"
    
    je_imf_system_buy_sdr_button:0 "[concept_sdr]を変換"
    je_imf_system_buy_sdr_button_desc:0 "[ROOT.GetCountry.GetName]は、金融流動性を高めるために、他のIMFメンバーから拠出された[concept_sdr]の#green 1,000,000#!に相当する[ROOT.GetCountry.GetAdjectiveNoFlag]通貨を受け取ります。\n\n@warning![concept_sdr]の受け取りによって[ROOT.GetCountry.GetName]が得られる[concept_gold_reserves]の量は、[ROOT.GetCountry.GetAdjective]通貨の強さ、および$lawgroup_monetary_policy$[concept_law]によって決定される[ROOT.GetCountry.GetAdjective]通貨の勢いに左右されます。"
    
    je_imf_system_sell_sdr_button:0 "[concept_sdr]を拠出"
    je_imf_system_sell_sdr_button_desc:0 "[ROOT.GetCountry.GetName]は、その[concept_gold_reserves]の一部を[concept_sdr]として他のIMFメンバーが使用することを許可します。\n\n@warning!グローバル未獲得[concept_sdr]プールへの拠出によって[ROOT.GetCountry.GetName]が失う[concept_gold_reserves]の量は、[ROOT.GetCountry.GetAdjective]通貨の強さと、[ROOT.GetCountry.GetAdjective]通貨の強さに依存します。なお、後者の強さは$lawgroup_monetary_policy$[concept_law]によって決定されます。"
    
    has_sufficient_SDR_in_marketplace.tt:0 "未獲得の[concept_sdr]が少なくとも#yellow 1,000,000#!あります"
    THIS_has_sufficient_SDR.tt:0 "[ROOT.GetCountry.GetName]は少なくとも#yellow 1,000,000#!の[concept_sdr]を所有しています"
    
    contribute_SDR.tt:0 "グローバル未獲得[concept_sdr]に#green 1,000,000#! [concept_sdr]を拠出します"
    
