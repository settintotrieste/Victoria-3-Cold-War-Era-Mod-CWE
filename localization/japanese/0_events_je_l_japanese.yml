    british_hong_kong.sgc.t:0 "香港に自治権を？"
    british_hong_kong.sgc.d:0 "中英共同宣言の後、香港政府は1984年7月18日に発表された諮問文書「緑書：香港における代議士政府のさらなる発展」に基づき、香港での民主化プロセスを開始することを決定しました。選挙人団によって選出された12人のメンバーと、機能選挙区によって選出された12人のメンバー、4人の官職メンバー、そして残りの議席は総督によって任命されました。"
    british_WIF_state.indy.t:0 "カリブ海に変化の風を？"
    british_WIF_state.indy.d:0 "西インド諸島連合州（West Indies Associated States）は、東カリブ海にある複数の島々の総称です。これらの島のステータスは、1967年にイギリスの植民地からイギリスとの自由連合における州へと変更されました。時間の経過とともに、連合州は完全な独立へと移行していき、その先駆けとなったのは1974年のグレナダでした。続いて、1978年にドミニカ、1979年にセントルシアとセントビンセント、1981年にアンティグア・バーブーダ、そして1983年にセントクリストファー・ネービスが独立を果たしました。"
    british_cyrenaica.sgc.t:0 "キレナイカの自治権？"
    british_cyrenaica.sgc.d:0 "キレナイカ首長国は、1949年3月1日、サイイド・イドリスがイギリスの支持を受けてキレナイカを独立したセヌーシー首長国であると一方的に宣言したことで成立しました。サイイド・イドリスはベンガジでの「全国会議」において、自らをキレナイカのエミールと宣言しました。イギリスによる承認は国連の態度に影響を与えることはできず、1949年11月21日に採択された決議によって、イギリスとフランスはリビアの独立に向けた準備を行うよう指示されました。"
    british_tuvalu.sgc.t:0 "ツバルにおける自治？"
    british_tuvalu.sgc.d:0 "$generic_self_rule_decolonisation_loc_desc$"
    
    british_canada.indy.t:0 "カナダの独立？"
    british_canada.indy.d:0 "1981年、カナダの庶民院と元老院は、イギリスの議会がカナダのために立法を行う最後の権限を終了させ、憲法修正のための完全にカナダ独自のプロセスを創設するような一連の憲法修正を、イギリスの議会に対して制定するよう求める決議を採択しました。"
    british_australia.indy.t:0 "オーストラリアの独立？"
    british_australia.indy.d:0 "オーストラリア法は、君主をオーストラリア女王としての独立した立場として維持しつつ、オーストラリアとイギリスとの間の残存する憲法上の結びつきを断ち切りました。"
    british_new_zealand.indy.t:0 "ニュージーランドの独立？"
    british_new_zealand.indy.d:0 "1983年に、ニュージーランド人が起草し、当時のニュージーランド首相が署名した新しい勅許状が発行されました。この新しい勅許状は、ニュージーランドを「ニュージーランド王国」と宣言し、以前の1917年の帝国勅許状を廃止しました。ニュージーランド議会とイギリスとの間の最後の実質的な憲法上の繋がりは、1986年憲法法（1987年1月1日施行）によって1986年に解消されました。この法律により、ニュージーランドの要請と同意に基づいて立法を行うイギリス議会の残存的な権限が取り除かれました。"
    british_cyprus.indy.t:0 "キプロスの独立？"
    british_cyprus.indy.d:0 "キプロスは、EOKAが主導した武装闘争を経て、1960年に独立を認められました。チューリッヒ・ロンドン協定に従い、キプロスは1960年8月16日に正式に独立を果たしました。当時、総人口は573,566人で、その内訳はギリシャ系が442,138人（77.1％）、トルコ系が104,320人（18.2％）、その他が27,108人（4.7％）でした。イギリスはアクロティリとデケリアの2つの主権基地を保持しました。一方、政府のポストや公職は民族割当制によって割り当てられ、少数派のトルコ系キプロス人に議会と行政における30％の議席と恒久的な拒否権が与えられ、3つの母国には保証権が与えられました。"
