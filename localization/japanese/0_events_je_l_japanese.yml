    je_national_religious_order: "国教"
    je_national_religious_order_reason: "[ROOT.GetCountry.GetName]の憲法の下、[concept_government]は特定の[concept_religion]を国の公式かつ国教として定めています。この国教は、[ROOT.GetCountry.GetName]の最高聖職者である[ROOT.GetCountry.GetNameNoFormatting]の[SCOPE.GetRootScope.GetCountry.GetCustom('religious_leader_title_custom_title')]によって管理・統率されています。\n\n[concept_government]は、財政支援やその他の特権を通じて国教を支持しており、[concept_government]に対し、教義、秩序、礼拝などの事項を含む国教の管理機関の運営に対して大きな影響力を与えています。これにより、[concept_government]は現在の[ROOT.GetCountry.GetNameNoFormatting]の[SCOPE.GetRootScope.GetCountry.GetCustom('religious_leader_title_custom_title')]を解任する権限も有しています。\n\n注：宗教的な急進主義が高まると、[ROOT.GetCountry.GetName]において$ideology_agitator_anti_human_rights$、$ideology_agitator_nationalist$、$ideology_agitator_pro_war_rights$、または$ideology_agitator_theocrat$の[SCOPE.GetRootScope.GetCountry.GetCustom('religious_leader_title_custom_title')]が出現する可能性が高まります。\n\n注：[GetInterestGroupVariant('ig_devout',GetPlayer).GetNameWithCountryVariant][concept_interest_group]の[concept_approval]がマイナスの場合に宗教的な急進主義は上昇し、[concept_approval]がプラスの場合に低下します。"
