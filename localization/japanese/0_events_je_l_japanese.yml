    ig_armed_forces_economic_ideology.t:0 "[SCOPE.gsInterestGroup('armed_forces_ig').GetName]が経済イデオロギーを変更します"
    ig_armed_forces_economic_ideology.d:0 "[SCOPE.gsInterestGroup('armed_forces_ig').GetName]のリーダーである[SCOPE.sCharacter('armed_forces_ig_leader').GetFullName]が、[SCOPE.sCountry('ig_armed_forces_country').GetName]のための新しい経済システムへの支持を表明しました。提案されたシステムは、現在政府内の多数派が採用しているものから急進的に逸脱しています。[SCOPE.gsInterestGroup('armed_forces_ig').GetName]は、[SCOPE.sCountry('ig_armed_forces_country').GetName]を苦しめている現在の経済問題を解決するためには、強く、決断力があり、かつ型破りなアクションが必要であると述べ、この急進的なアプローチを正当化しました。"
    ig_armed_forces_economic_ideology.f:0 "このイベントは、[SCOPE.gsInterestGroup('armed_forces_ig').GetName]が[concept_opposition]にあり政府に対して怒っており、かつ経済が債務不履行または不健全な状態である場合に発生します。新たに選択される経済的イデオロギーは、政府内で最大の勢力を持つ利益集団の経済的イデオロギーと常に正反対のものになります。"
    
    ig_armed_forces_economic_ideology_dictatorship.t:0 "[SCOPE.gsInterestGroup('armed_forces_ig').GetName]が経済的イデオロギーを変更します"
    ig_armed_forces_economic_ideology_dictatorship.d:0 "[SCOPE.sCharacter('rulers_scope').GetFullName]への忠実性を示すため、[SCOPE.gsInterestGroup('armed_forces_ig').GetName]のリーダーである[SCOPE.sCharacter('armed_forces_ig_leader').GetFullName]将軍は、政府の経済政策を称賛し、それを支持することを誓う声明を発表しました。また将軍は、政府に反対する者を積極的に排除するために、軍の刷新を行うことも発表しました。"
    ig_armed_forces_economic_ideology_dictatorship.f:0 "このイベントは、[SCOPE.gsInterestGroup('armed_forces_ig').GetName]が[concept_government]にあり政府に満足している場合に発生します。新たに選択される経済的イデオロギーは、政府内で最大の勢力を持つ利益集団のイデオロギーと常に同じものになります。"
    ig_armed_forces_ideology_system.2.tt:0 "[concept_ruler]の[concept_interest_group]または[SCOPE.gsInterestGroup('armed_forces_ig').GetName]出身ではない[concept_general]や[concept_admiral]を入れ替えることで、[SCOPE.gsInterestGroup('armed_forces_ig').GetName]を刷新する"

    ig_armed_forces_ideology_system.option:0 "我々はこの展開を注視することにしよう……"
    
    je_term_limits.tt:0 "[GetPlayer.GetRuler.GetFullName]が[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]を退任します"
    je_term_limits.1.tt:0 "[GetPlayer.GetRuler.GetFullName]が[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]として就任します"
    je_term_limits.2.tt:0 "[GetPlayer.GetRuler.GetFullName]はもはや[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]ではなく、新しい[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]は[SCOPE.gsInterestGroup('the_current_president_ig_scope').GetName]の[concept_interest_group]出身ではなくなりました"
    
    je_term_limits:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [ROOT.GetCountry.GetRuler.GetLastName]の官職"
    je_term_limits_reason:0 "[COUNTRY.GetName]憲法に基づき、[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]の官職に2回を超えて選出される者は認められません。また、他の者が[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]として選出された任期の2年を超えて[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]の官職を務めた者、または[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]として代行した者は、[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]の官職に1回を超えて選出されることはできません。したがって、[ROOT.GetCountry.GetRuler.GetFullName]は8年の任期制限に達した時点で退任することになります。"
    je_term_limits_goal:0 "[ROOT.GetCountry.GetRuler.GetFullName]は任期を全うしました"
    je_term_limits_status:0 "[GetPlayer.MakeScope.Var('term_limit_var').GetValue]年／8年勤務"
    
    je_term_limits_swiss:0 "[ROOT.GetCountry.GetRuler.GetLastName]の連邦管区"
    je_term_limits_swiss_reason:0 "スイス連邦の大統領は、国の経営責任者部門であるスイスの7人のメンバーからなる連邦参議院の長です。連邦議会によって1年の任期で選出され、その職務者は連邦参議院の会議を議長として進行し、特別な代表任務を担います。スイス連邦の大統領は「平等な者の中の第一人者」であり、他の6人の評議員に対してそれ以上の権限は持ちませんが、引き続き割り当てられた部門の責任者を務めます。伝統的にこの職務は年功序列に従ってメンバー間で交代するため、連邦参議院の副議長が、現職者の任期の翌年に大統領の職を引き継ぎます。"
    je_term_limits_swiss_goal:0 "大統領[ROOT.GetCountry.GetRuler.GetFullName]は任期制限に達しました"
    je_term_limits_swiss_status:0 "[GetPlayer.MakeScope.Var('term_limit_var').GetValue]ヶ月／12ヶ月勤務"
    
    je_term_limits.3.tt:0 "$SWI$です"
    
    je_term_limits_yugoslav:0 "[ROOT.GetCountry.GetRuler.GetLastName]の連邦管区"
    je_term_limits_yugoslav_reason:0 "ユーゴスラビアでは、1971年の1963年憲法修正以来、集団管区制度が存在していました。個別の条項によりヨシップ・ブロズ・ティトーが制限のない権限を付与されて確定したため、新たな管区の大統領は彼の死後まで就任しないことが保証されていました。1980年5月4日にティトーが死去すると、当時の管区副大統領が管区の大統領職に就きました。これ以降、管区の大統領職は、前年に副大統領を務めた者が翌年に大統領となる形で、毎年交代制で行われることになりました。"
    je_term_limits_yugoslav_goal:0 "大統領[ROOT.GetCountry.GetRuler.GetFullName]が任期制限に達しました"
    je_term_limits_yugoslav_status:0 "[GetPlayer.MakeScope.Var('term_limit_var').GetValue]/12ヶ月勤務"
    
    je_term_limits_collective_HOS:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [ROOT.GetCountry.GetRuler.GetLastName]の集団指導体制"
    je_term_limits_collective_HOS_reason:0 "[COUNTRY.GetName]の憲法の下では、行政権は単一の人物ではなく合議体に委ねられています。集団的な元首は、共有された審議と法的に定義された手続きを通じて国を代表する憲法評議会として機能します。各メンバーは平等な地位を持ち、憲法に応じて過半数または全会一致の同意によって決定が下されます。[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]の役割は毎年交代制で行われます。"
    je_term_limits_collective_HOS_goal:0 "大統領[ROOT.GetCountry.GetRuler.GetFullName]が任期制限に達しました"
    je_term_limits_collective_HOS_status:0 "[GetPlayer.MakeScope.Var('term_limit_var').GetValue]/12ヶ月勤務"
    
    je_create_collective_presidency_button:0 "集団指導体制を制定"
    je_create_collective_presidency_button_desc:0 "$amendment_rotating_presidency_desc$"
    
    je_the_cold_war_democratic.1.tt:0 "この国は民主的な$super_power$であり、共産主義者の$super_power$は存在しません"
    je_the_cold_war_democratic.2.tt:0 "民主的な$super_power$は存在しません"
    je_the_cold_war_democratic:0 "冷戦（民主主義陣営）"
    je_the_cold_war_democratic_reason:0 "冷戦は、[ROOT.GetCountry.GetName]と[SCOPE.sCountry('communist_rival_superpower').GetName]、およびそれぞれの同盟国である民主的陣営と共産主義陣営との間の地政学的な緊張の時代です。[ROOT.GetCountry.GetName]は、共産主義の超大国がもはや存在しないようにすることで、世界的な影響力をめぐるこの思想的かつ地政学的な闘争に勝利するために尽力しなければなりません！"
    
    je_the_cold_war_communist.1.tt:0 "この国は共産主義の$super_power$であり、民主的な$super_power$は存在しません。"
    je_the_cold_war_communist.2.tt:0 "共産主義の$super_power$は存在しません。"
    je_the_cold_war_communist:0 "冷戦（共産主義陣営）"
    je_the_cold_war_communist_reason:0 "冷戦は、[ROOT.GetCountry.GetName]と[SCOPE.sCountry('democratic_rival_superpower').GetName]、およびそれぞれの同盟国である民主的陣営と共産主義陣営との間の地政学的な緊張の時代です。[ROOT.GetCountry.GetName]は、民主的な超大国がもはや存在しないようにすることで、世界的な影響力をめぐるこの思想的かつ地政学的な闘争に勝利するために尽力しなければなりません！"
    
