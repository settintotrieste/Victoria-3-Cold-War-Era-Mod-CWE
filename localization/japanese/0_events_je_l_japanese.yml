    je_tekhpromfinplans:0 "テクプロムフィンプラン"
    je_tekhpromfinplans_reason:0 "[ROOT.GetCountry.GetAdjective] $law_semi_command_economy$の下では、投資の決定は分権化されています。企業は、四半期および月ごとの生産計画を規定する、テクプロムフィンプランと呼ばれる年次計画を提出しなければなりません。その後、国家計画当局がこれらの計画を承認（あるいは否決）し、物資と資金を配分します。そして企業は、計画の制約の範囲内で製品を売却します。\n\nこのシステムにより、[concept_government]は[concept_gold_reserves]から[concept_investment_pool]へと資金を移転させることができ、国営企業が[Concept('concept_building', '$concept_buildings$')]を自律的に建設することが可能になります。"
    je_tekhpromfinplans_status:0 "[concept_investment_pool]：#Green [GetPlayer.MakeScope.Var('tekhpromfinplans_fund_size').GetValue]M#!"
    
    je_start_inject_tekhpromfinplans_button:0 "プロジェクトの承認を開始する"
    je_start_inject_tekhpromfinplans_button_desc:0 "[concept_government]は、分権化された国有企業から提出された投資計画を承認し、週間の純固定収入が@money!#yellow 10000#!以上であれば、[concept_treasury]から[concept_investment_pool]へ資金を移送して毎月の計画の実行を可能にします。"
    je_stop_inject_tekhpromfinplans_button:0 "プロジェクトの承認を停止する"
    je_stop_inject_tekhpromfinplans_button_desc:0 "[concept_government]は、分権化された国有企業から提出された投資計画の承認を停止します。"
    
    start_tekhpromfinplans.tt:0 "過去1ヶ月間にプロジェクトの承認を開始または停止していません"
    
    je_state_run_companies:0 "[ROOT.GetCountry.GetAdjectiveNoFormatting]国有企業"
    je_state_run_companies_reason:0 "[ROOT.GetCountry.GetName]には[GetLawType('law_command_economy').GetName]がありますが、半自律的な国有[Concept('concept_company','$concept_companies$')]を有しています。\n\n[ROOT.GetCountry.GetAdjective][concept_government]は、[concept_treasury]から追加の物資と資金を自由に使用できる形で提供することにより、これらの企業へより多くの投資を行うことができます。\n\nこのシステムにより、[concept_government]は[concept_gold_reserves]から[concept_investment_pool]へ資金を移送し、国有企業が自律的に[Concept('concept_building', '$concept_buildings$')]を建設することを可能にします。"
