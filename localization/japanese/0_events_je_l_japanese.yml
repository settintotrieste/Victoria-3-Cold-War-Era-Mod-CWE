    dutch_New_Guinea.sgc.d:0 "1949年にオランダ領東インドの残りの地域がインドネシアとして完全に独立した際、オランダは西ニューギニアの主権を保持し、そこを独立した国家として準備するための措置を講じました。オランダは政治、ビジネス、そして市民としてのスキルの育成を重視しました。1950年2月8日、ステファン・リュシアン・ジョセフ・ファン・ワールデンブルフがオランダ領ニューギニアの初代総督（De Gouverneur）に任命されました。"
    
