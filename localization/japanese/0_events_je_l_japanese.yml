    close_panama_canal_decision_desc:0 "パナマ運河の所有者として、いつでもすべての船舶交通に対して運河を閉鎖することを選択できます。しかし、そうすることは国際社会の不満を招くでしょう。なお、運河の閉鎖期間中は、パナマ運河の施設が削除されることに注意してください。"
