    je_german_unification:0 "ドイツ再統一"
    je_german_unification_reason:0 "第二次世界大戦後、ドイツは東と西に分割されました（ベルリンも分割されました）。これは、ソ連と西側諸国の勢力圏による広範な冷戦の分割を象徴するものでした。双方で経済成長と政治的統合が進んだものの、多くのドイツ人は、回復された国家の統一、共有されたアイデンティティ、そしてイデオロギー的な対立を超えた未来を求め、再統一を熱望していました。"
    
    je_austrian_unification:0 "オーストリア再統一"
    je_austrian_unification_reason:0 "第二次世界大戦後、オーストリアは連合国によって管理される占領区域に分割されました。再統一への熱望は、主権の回復、統治の統合、そして外部の支配を超えて統一されたオーストリア国家へと向かう願いを反映したものでした。"

    je_chinese_unification:0 "中国再統一"
    je_chinese_unification_reason:0 "中国内戦の結果、中華民国と中華人民共和国にライバルの政府が出現しました。再統一の問題は、対立する請求権の解決、政治システムの統合、そして国際秩序における中国の役割の再定義に集約されます。"

    je_vietnamese_unification:0 "ベトナム再統一"
    je_vietnamese_unification_reason:0 "ベトナムは植民地支配とその後の紛争を経て、北と南に分割されました。再統一は、イデオロギーによる分断を克服し、単一の政府を樹立し、統一されたリーダーシップのもとで国を再建しようとする取り組みを象徴するものでした。"

    je_korean_unification:0 "韓国の統一"
    je_korean_unification_reason:0 "朝鮮半島は第二次世界大戦後、冷戦下のライバル関係を反映して北と南に分割されました。再統一は、国家の団結を回復し、政治的な相違を和解させ、東アジアにおける地域の力学を再形成するための悲願であり続けています。"

    je_yemeni_unification:0 "イエメンの統一"
    je_yemeni_unification_reason:0 "北イエメンと南イエメンは、異なる政治的軌跡を通じて別々に発展してきました。再統一は、これらの州を単一の国へと統合し、アラビア半島の統治、経済統合、および地域の安定性のバランスを図ることを目的としていました。"
    
    je_german_unification_button:0 "ドイツを再統一する"
    je_german_unification_button_desc:0 "ドイツ再統一のプロセスを開始します。この行動は、分割されたドイツの州を単一の国へと統合し、新たな現実に合わせて政治構造、経済体制、および外交関係を変化させます。"
    GER_has_same_gov_type_tt:0 "#y $WGR$#!、#y $EGR$#!、および#y $SGR$#!は、すべて同じ[concept_government_type]を共有しています"
    
    je_austrian_unification_button:0 "オーストリアを再統一する"
    je_austrian_unification_button_desc:0 "オーストリア再統一のプロセスを開始します。この行動は、分割されたオーストリアの州を単一の国へと統合し、新たな現実に合わせて政治構造、経済体制、および外交関係を変化させます。"
    AUS_has_same_gov_type_tt:0 "#y $WAU$#!と#y $EAU$#!は、どちらも同じ[concept_government_type]を共有しています"
    
    je_chinese_unification_button:0 "中国を再統一する"
    je_chinese_unification_button_desc:0 "中国再統一のプロセスを開始します。この行動は、分割された中国の州を単一の国へと統合し、新たな現実に合わせて政治構造、経済体制、および外交関係を変化させます。"
    CHI_has_same_gov_type_tt:0 "すべての#y 中国の国々#!は、同じ[concept_government_type]を共有しています"

    je_vietnamese_unification_button:0 "ベトナムを再統一する"
    je_vietnamese_unification_button_desc:0 "ベトナム再統一のプロセスを開始します。この行動は、分割されたベトナムの州を単一の国へと統合し、新たな現実に合わせて政治構造、経済体制、および外交関係を変化させます。"
    DAI_has_same_gov_type_tt:0 "#y $SVM$#!と#y $NVM$#!は、どちらも同じ[concept_government_type]を共有しています"

    je_korean_unification_button:0 "韓国を再統一する"
    je_korean_unification_button_desc:0 "韓国の統一プロセスを開始します。この行動により、分断された韓国の州が単一の国へと統合され、新たな現実に合わせて政治構造、経済的仕組み、および外交関係が変化します。"
    KOR_has_same_gov_type_tt:0 "#y $SKO$#!と#y $NKO$#!は、どちらも同じ[concept_government_type]を共有しています。"

    je_yemeni_unification_button:0 "イエメンを再統一する"
    je_yemeni_unification_button_desc:0 "イエメンの再統一プロセスを開始します。この行動により、分断されたイエメンの州が単一の国へと統合され、新たな現実に合わせて政治構造、経済的仕組み、および外交関係が変化します。"
    YEM_has_same_gov_type_tt:0 "#y $NYE$#!と#y $SYE$#!は、どちらも同じ[concept_government_type]を共有しています。"
    
    je_start_private_building_pruning_button:0 "民間施設の整理を有効にする"
    je_start_private_building_pruning_button_desc:0 "[concept_government]によって、民間投資家は#y 民間部門#!が#y 50%#!超を所有する冗長な[Concept('concept_building','$concept_buildings$')]を自律的に削除することが許可されます。"
    je_stop_private_building_pruning_button:0 "民間施設の整理を無効にする"
    je_stop_private_building_pruning_button_desc:0 "[concept_government]によって、民間投資家は#y 民間部門#!が#y 50%#!超を所有する冗長な[Concept('concept_building','$concept_buildings$')]を自律的に削除することが禁止されます。"
    
    je_start_government_building_pruning_button:0 "政府施設の整理を有効にする"
    je_start_government_building_pruning_button_desc:0 "[concept_government]は、#y 民間部門#!の所有率が#y 50%#!を超えない冗長な[Concept('concept_building','$concept_buildings$')]を自律的に削除します。"
    je_stop_government_building_pruning_button:0 "政府施設の整理を無効にする"
    je_stop_government_building_pruning_button_desc:0 "民間投資家は、#y 民間部門#!の所有率が#y 50%#!を超えない冗長な[Concept('concept_building','$concept_buildings$')]を削除することは許可されません。"
    
    enact_cult_of_personality_decision:0 "$amendment_cult_of_personality$を作成"
    enact_cult_of_personality_decision_desc:0 "[concept_government]は[concept_ruler]の周囲に個人崇拝を形成します。そこでは[concept_ruler]がマスメディアやプロパガンダ、その他の手法を用いて、しばしば無批判な追従や賞賛を通じて、理想化された英雄的、時には崇拝の対象となるイメージを作り上げます。"
    
    enact_corporate_state_decision:0 "$law_corporate_state$を作成"
    enact_corporate_state_decision_desc:0 "国家コーポラティズムとは、国家が市民や利益集団（労働組合や経済団体など）を国家公認の独占的な独占権へとあらかじめ組織化する政治・経済システムです。このモデルの下では、これらの集団は独立しておらず、政策を遂行し社会を管理するための政府に管理された手段として機能します。"
    
    grant_washington_dc_statehood_decision:0 "$STATE_DISTRICT_OF_COLUMBIA$に州権を付与"
    grant_washington_dc_statehood_decision_desc:0 "$STATE_DISTRICT_OF_COLUMBIA$は現在、国家議会における投票権を持っていません。そのため、[concept_government]はこれを修正するための法律を可決します。\n\nこのディシジョンにより、$STATE_DISTRICT_OF_COLUMBIA$が国家議会へ選挙区を供出できるようになります。"
    
    non_primary_culture_ruler:0 "非主要アイデンティティの支配者"
    
    change_dynamic_IG_ideology.t:0 "[concept_interest_group][Concept('concept_ideology','$concept_ideologies$')]の変化"
    change_dynamic_IG_ideology.d:0 "[ROOT.GetCountry.GetName]における特定の[Concept('concept_interest_group', '$concept_interest_groups$')]の[Concept('concept_ideology','$concept_ideologies$')]が、それら[Concept('concept_interest_group', '$concept_interest_groups$')]の[concept_leader]の[concept_ideology]により変化しました。"
    change_dynamic_IG_ideology.f:0 "各[concept_interest_group]は、その[concept_leader]のタイプごとに、持ちうる[concept_ideology]の[Concept('concept_ideology','$concept_ideologies$')]のプリセットリストを持っています。この変更は、1年ごとに適用されます。"
    
    starting_historical_food_security:0 "蓄積された食料貯蔵量"
    
    resident_general:0 "大使"
    
    character_role_resident_general:0 "[concept_diplomat_character]"
    character_role_resident_general_title:0 "[concept_diplomat_character]"
    
    je_resident_general:0 "[ROOT.GetCountry.GetNameNoFlag]における外国の影響力"
    je_resident_general_reason:0 "一連の不幸な出来事の結果として、[ROOT.GetCountry.GetName]は外国勢力の支配下に置かれることとなりました。その外国勢力の利益は、[ROOT.GetCountry.GetName]に派遣された外交官によって守られており、[concept_government]はその外交官の意見を無視することはできません。\n\n私たちは、[concept_autonomy]を#y 独立#!まで高めることによって（もし私たちが[concept_subject]であれば）、外国の影響を排除できます。あるいは、他国と#y $dominate_politics$#! [concept_diplomatic_pact]を締結しているならば、#y $dp_end_dominate_politics$#! [concept_diplomatic_play]を使用することでも可能です。"
    
    resident_general_character_label.tt:0 "[SCOPE.sCharacter('resident_general_character_label').GetPrimaryRoleTitle]：[SCOPE.sCharacter('resident_general_character_label').GetFullName]"
    
    resident_general_system:0 "駐在総督制度"
    
    je_end_protectorate_button:0 "$protectorate$ステータスの終了"
    je_end_protectorate_button_desc:0 "[ROOT.GetCountry.GetAdjective] [concept_government]は、もはや自身の[concept_overlord]の影響下にはない完全な主権国家であるとの宣言を行います。この宣言が[concept_overlord]によって受け入れられれば、[ROOT.GetCountry.GetAdjective] [concept_protectorate]は終了します。\n\n@warning! [ROOT.GetCountry.GetName]は、[concept_overlord]が完全な主権の宣言を受け入れることを拒否した場合、#y $dp_independence$#! [concept_diplomatic_play]を宣言するでしょう。"
    
    protectorate_independence.t:0 "[SCOPE.sCountry('protectorate_subject_country').GetAdjectiveNoFlag] [concept_protectorate]の終了？"
    protectorate_independence.d:0 "[SCOPE.sCountry('protectorate_subject_country').GetName]の[concept_government]は、もはや[ROOT.GetCountry.GetName]の[concept_protectorate]ではないという一方的な宣言を行いました。[concept_overlord]として、我々には2つの選択肢しかありません。彼らの[ROOT.GetCountry.GetAdjective]の影響力の拒絶を受け入れるか、あるいは武力を行使して[concept_protectorate]の終了を阻止するかです。"
    protectorate_independence.f:0 "[SCOPE.sCountry('protectorate_subject_country').GetName]がこの決断を下したのは、[ROOT.GetCountry.GetName]に対して#r 敵対的な#! [concept_relations]を有していたか、あるいは#r 100#! [concept_liberty_desire]を有していたかのいずれかであるためです。"
    
    protectorate_independence.option.1:0 "[SCOPE.sCountry('protectorate_subject_country').GetName]に別れを告げます。"
    protectorate_independence.option.2:0 "我が軍はそれについて一言言わせてもらう。"
    
    notification_appointed_new_resident_general_notification_name: "[SCOPE.sCountry('source_country').GetName]が新しい[SCOPE.sCharacter('new_resident_general').GetPrimaryRoleTitle]を任命"
    notification_appointed_new_resident_general_notification_desc: "[SCOPE.sCountry('source_country').GetCapital.GetCityHubName]は、[SCOPE.sCountry('target_country').GetName]における新しい[SCOPE.sCharacter('new_resident_general').GetPrimaryRoleTitle]として[SCOPE.sCharacter('new_resident_general').GetFullName]を任命しました。"
    
    je_law_enactment_system_foreign_assistance_button:0 "外国の援助を求める"
    je_law_enactment_system_foreign_assistance_button_desc:0 "[ROOT.GetCountry.GetName]の[concept_government]は、現在の#y 法案#!を支持するよう[SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')]を操作するため、国内に駐留する影響力のある外国の[concept_diplomat_character]の援助を求めます。"
    
    law_enactment_timer_2.tt:0 "法律の制定が、最近、中断、再開、または干渉されていません（干渉された場合は6ヶ月間）"
    law_enactment_foreign_assistance.tt:0 "[ROOT.GetCountry.GetName]に居住する外国の[concept_diplomat_character]が、現在の[concept_law]（[Concept('concept_enactment_of_laws', '$concept_enactment_of_laws_enacted$')]中）に対して#g 賛成#!または#g 強く賛成#!している"
    
    je_lower_voting_age_button:0 "投票年齢の引き下げ"
    je_lower_voting_age_button_desc:0 "[concept_government]は、市民の投票に必要な最低年齢を引き下げます。"
    je_raise_voting_age_button:0 "投票年齢の引き上げ"
    je_raise_voting_age_button_desc:0 "[concept_government]は、市民の投票に必要な最低年齢を引き上げます。"
    
    je_head_of_state_system:0 "[SCOPE.sCharacter('head_of_state_pm_scope').GetPrimaryRoleTitle]官職"
    je_head_of_state_system_reason:0 "[ROOT.GetCountry.GetName]憲法に基づき、[SCOPE.sCharacter('head_of_state_pm_scope').GetPrimaryRoleTitle]は元首となります。この役割は主に儀礼的なものですが、[SCOPE.sCharacter('head_of_state_pm_scope').GetPrimaryRoleTitle]は[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]の行動を制限するための一定の権限を行使することができます。\n\n通常、[SCOPE.sCharacter('head_of_state_pm_scope').GetPrimaryRoleTitle]は[SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')]によって任命されます。任命された[SCOPE.sCharacter('head_of_state_pm_scope').GetPrimaryRoleTitle]は、[concept_government]における最高の[concept_clout]を持つ[concept_interest_group]の[concept_politician]となります。\n\nもし[SCOPE.sCharacter('head_of_state_pm_scope').GetPrimaryRoleTitle]が選出される場合は、[concept_country]における最高の[concept_clout]を持つ[concept_interest_group]の[concept_politician]が選ばれます。\n\n#y [SCOPE.sCharacter('head_of_state_pm_scope').GetPrimaryRoleTitle]：#![SCOPE.sCharacter('head_of_state_pm_scope').GetFullName]"
    je_head_of_state_system_status_term:0 "[GetPlayer.MakeScope.Var('character_role_head_of_state_term').GetValue]年／5年勤務"
    je_head_of_state_system_goal:0 "[SCOPE.sCharacter('head_of_state_pm_scope').GetFullName]は任期を全うしました。"
    
