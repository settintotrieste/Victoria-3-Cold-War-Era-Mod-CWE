    concept_upper_house:0 "上院"
    concept_upper_house_desc:0 "上院とは二院制議会の二つの議院の一方であり、もう一方は下院です。正式に上院と指定された議院は、通常は規模が小さく、下院よりも権限が制限されていることがよくあります。"
    concept_lower_house:0 "下院"
    concept_lower_house_desc:0 "下院とは二院制議会の二つの議院の一方であり、もう一方は上院です。公式な地位としては上院の「下」にありますが、世界中の多くの議会において、下院はより大きな権限を行使したり、重要な政治的影響力を及ぼしたりするようになっています。"
    
    upper_house_notification_loc:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('upper_house_name')]"
    
    je_reserved_powers:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('government_ceremonial_body_custom_title')]"
    je_reserved_powers_reason:0 "[ROOT.GetCountry.GetName]の憲法の下では、[SCOPE.GetRootScope.GetCountry.GetCustom('government_ceremonial_body_custom_title')]は[SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')]で可決されたあらゆる法案に対して限定的な拒否権を持っています。しかし、[SCOPE.GetRootScope.GetCountry.GetCustom('government_ceremonial_body_custom_title')]は法案を拒否できますが、その拒否は[SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')]における過半数の投票によって後に覆すことが可能です。\n\n#BOLD [SCOPE.sCharacter('ceremonial_head_of_state').GetPrimaryRoleTitle]:#! [SCOPE.sCharacter('ceremonial_head_of_state').GetFullName] ([SCOPE.sCharacter('ceremonial_head_of_state').GetInterestGroup.GetName]) \n\n注：[SCOPE.sCharacter('ceremonial_head_of_state').GetInterestGroup.GetName]が法律に対して「反対」または「強く反対」する場合、[SCOPE.sCharacter('ceremonial_head_of_state').GetPrimaryRoleTitle]は[concept_government]によって[Concept('concept_enactment_of_laws', '$concept_enactment_of_laws_enacted$')]されているあらゆる[Concept('concept_law','$concept_laws$')]を拒否します。\n\n注：この[concept_journal_entry]は、[GetLawType('law_hybrid_chamber').GetName] [concept_law]を廃止することで削除できます。"
    
    ig_intelligentsia_ceremonial_leader:0 "管理国：@intelligentsia! $ig_intelligentsia$"
