    je_warsaw_pact_system:0 "ワルシャワ条約機構"
    je_warsaw_pact_system_reason:0 "ワルシャワ条約機構は、冷戦下の1955年5月、ポーランドのワルシャワにおいて、ソ連および中東欧の東側陣営にある他の7つの社会主義共和国との間で署名された集団防衛条約です。「ワルシャワ条約機構」という用語は、条約そのものと、その結果として誕生した防衛同盟であるワルシャワ条約機構の両方を指すのが一般的です。ワルシャワ条約機構は、中東欧の東側陣営諸国のための地域経済組織である経済相互援助会議（コーデコン）を軍事的・経済的に補完する存在でした。\n\nリーダー：[SCOPE.sCountry('warsaw_pact_leader').GetName]\n\n本部：#y [SCOPE.sCountry('warsaw_pact_leader').GetCapital.GetCityHubName]#!"
