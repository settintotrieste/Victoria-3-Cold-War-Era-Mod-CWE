    je_civil_service_system:0 "[ROOT.GetCountry.GetAdjectiveNoFlag]の官僚"
    je_civil_service_system_reason:0 "[ROOT.GetCountry.GetAdjective]の官僚は、州の機械を維持する専門的な官僚制度を代表しています。法律の施行、税金の徴収、および記録の維持を任務とする官僚は、変化する政治情勢の中で継続性と安定性を維持することを目指しています。\n\n官僚の長：[SCOPE.sCharacter('head_of_civil_service').GetFullName]\n\n注：官僚における汚職は、より厳格な#y $lawgroup_corruption_policy$#! [Concept('concept_law','$concept_laws$')]を制定することで軽減できます。"
    
