    appoint_prime_minister.t: "新しい[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]"
    appoint_prime_minister.d: "新しい[concept_government]が編制されたことで、[ROOT.GetCountry.GetName]が新しい[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]を迎える時が来ました。[concept_government]における最強の[concept_interest_group]のリーダーである[SCOPE.sCharacter('most_powerful_gov_ig_leader').GetFullName]（[SCOPE.sCharacter('most_powerful_gov_ig_leader').GetInterestGroup.GetName]）は、次の[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]になることが期待されています。しかし、与党連立は[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]として別の人物を選出することも可能です。"
    appoint_prime_minister.f: "このイベントは、[concept_government]内に[concept_interest_group]が1つ以上存在するために発生しました。[concept_government]における最強の[concept_interest_group]ではない[concept_interest_group]から政治家を選出すると、[SCOPE.gsInterestGroup('most_powerful_gov_ig').GetName]の怒りを買うことになります。"
