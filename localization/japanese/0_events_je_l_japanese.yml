    je_space_race_system_reason:0 "宇宙探査とは、天文学と宇宙技術を用いて外宇宙を探索することです。現在、宇宙の探査は主に望遠鏡を用いた天文学者によって行われていますが、その物理的な探査は、無人のロボット宇宙探査機と有人宇宙飛行の両方によって行われています。\n\n現在の宇宙プロジェクト：[SCOPE.GetRootScope.GetCountry.GetCustom('space_project_custom_title')]"
