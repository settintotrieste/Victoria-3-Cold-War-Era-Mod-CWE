    subject_interactions.1.t.1: "新しい[SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle]の任命"
    subject_interactions.1.d: "[SCOPE.sCountry('target_country').GetName]の総督の地位として、いくつかの候補のタイプを検討できます。どのようなリーダーを求めていますか？"
    subject_interactions.1.d.1: "[SCOPE.sCountry('target_country').GetName]における[SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle]の地位として、いくつかの候補のタイプを検討できます。どのようなリーダーを求めていますか？"
    subject_interactions.1.f: "統治とは非常に繊細なものです。すべての州には独自の正確な圧力、ロビー、そして懸念事項があります。これらすべての問題を効果的に排除し、二度と我々の目的を妨げないようにするのが我々の仕事です。"
    subject_interactions.1.a: "[SCOPE.sCharacter('colonial_governor_plantation_scope').GetLastName]氏、[GetCharacterTrait('special_character_colonial_plantation').GetName]が職務に就きます。"
    subject_interactions.1.b: "[GetCharacterTrait('special_character_colonial_local').GetName]として、[SCOPE.sCharacter('colonial_governor_local_scope').GetLastName]氏を選びましょう。"
