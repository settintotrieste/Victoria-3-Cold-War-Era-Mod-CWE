    tech_sea_infrastructure_1_desc:0 "港湾機械には、空コンテナハンドラー、様々な能力を持つフォークリフトトラック、マテリアルハンドラークレーン、リーチスタッカー、シップトゥショアクレーン、ラバータイヤ式コンテナガントリークレーン、テレハンドラーなど、様々な必須装備が含まれます。"
    tech_sea_infrastructure_2_desc:0 "船舶用ディーゼルエンジンとは、船舶に搭載される、または搭載を意図した圧縮着火エンジンを意味します。"
    tech_sea_infrastructure_3_desc:0 "船舶は国際的に認められた基準に基づいて設計されています。"
    tech_sea_infrastructure_4_desc:0 "コンテナ化とは、国際海上コンテナを使用した複合一貫輸送のシステムです。"
    tech_sea_infrastructure_5_desc:0 "メガシップは、大量の商品や大人数の人々を輸送するなど、主に商業目的で使用される非常に大型の船舶の一種です。"
    tech_sea_infrastructure_6_desc:0 "初期の港は単なる簡素な港湾であった傾向がありますが、現代の港は海、川、運河、道路、鉄道、空路を利用した輸送網を持つ、複合的な物流拠点となる傾向があります。"
    tech_sea_infrastructure_7_desc:0 "スマートシップの概念は、様々な分野で広がるデジタル化の大きな流れから生まれたものであり、効率、安全性、持続可能性を高めるために最先端技術を統合する海運業界の変化を象徴しています。"
    tech_sea_infrastructure_8_desc:0 "電気船とは、搭載されたバッテリーパック、ソーラーパネル、または発電機のいずれかによって電力を供給される電気モーターで駆動する動力付き船舶です。"
    tech_sea_infrastructure_9_desc:0 "自律貨物船は、自律コンテナ船や海上自律水上船舶（MASS）としても知られ、乗組員なしで、人間との対話がほとんどまたは全くない状態で航行可能な水域をコンテナまたはばら積み貨物を輸送する船舶です。"
    tech_sea_infrastructure_10_desc:0 "港は今や広大な土地に広がる巨大な複合施設です。"
    
    tech_air_infrastructure_1:0 "初期空港"
    tech_air_infrastructure_2:0 "小型プロペラ旅客機"
    tech_air_infrastructure_3:0 "ジェット旅客機"
    tech_air_infrastructure_4:0 "国際空港"
    tech_air_infrastructure_5:0 "コックピット自動化"
    tech_air_infrastructure_6:0 "メガ空港"
    tech_air_infrastructure_7:0 "スマート航空機"
    tech_air_infrastructure_8:0 "電動航空機"
    tech_air_infrastructure_9:0 "完全自動運転航空機"
    tech_air_infrastructure_10:0 "メガ航空機"
    
    tech_air_infrastructure_1_desc:0 "初期の空港はしばしば小規模で未整備であり、簡素な滑走路とわずかな設備しかありませんでした。"
    tech_air_infrastructure_2_desc:0 "プロペラ機は、短い滑走路を持つ地方空港での離着陸を行いながら、300ノットの速度で巡航し、約1,500マイルの無着陸航続距離を持ち、平均飛行時間は約3時間です。"
    tech_air_infrastructure_3_desc:0 "ジェット旅客機またはジェットライナーは、ジェットエンジンを動力源とする旅客機です。旅客機は通常2つまたは4つのジェットエンジンを搭載しており、3発エンジン設計は1970年代に人気がありましたが、今日ではあまり一般的ではありません。"
    tech_air_infrastructure_4_desc:0 "国際空港とは、世界中の国々を旅客が旅行できるようにするための税関および国境管理施設を備えた空港です。"
    tech_air_infrastructure_5_desc:0 "人間の乗組員によって実行される一部のタスクまたはタスクの一部は、乗組員の選択により、機械に割り当てることができます。"
    tech_air_infrastructure_6_desc:0 "メガ空港は、年間旅客数が3300万人以上の空港と定義されます。これにより、年間旅客数が1000万から3290万人の大規模空港や、年間旅客数が450万から990万人の中規模空港とは区別されます。"
    tech_air_infrastructure_7_desc:0 "スマート航空機システムは、高度なセンサーと機械学習を組み込んで洞察を得ることで、状況認識を高め、安全性を向上させます。"
    tech_air_infrastructure_8_desc:0 "電動航空機は、電力によって駆動する航空機です。電動航空機は、排出ガスゼロとより静かな飛行を提供し、航空が環境に与える影響を減らす方法と見なされています。電力は様々な方法で供給できますが、最も一般的なのはバッテリーです。"
    tech_air_infrastructure_9_desc:0 "航空機は自律的に飛行、航行、通信を行います。完全に自律しており、自己操縦します。"
    tech_air_infrastructure_10_desc:0 "旅客機は巨大です。"
    
