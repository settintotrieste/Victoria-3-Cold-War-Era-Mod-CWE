    tech_energy_infrastructure_10:0 "メガ発電所"
    
    tech_energy_infrastructure_1_desc:0 "化石燃料発電所は、石炭、石油、天然ガスなどの化石燃料を燃焼させて電気を生産する火力発電所です。化石燃料発電所には、燃焼の熱エネルギーを機械エネルギーに変換し、それが発電機を動かす機械が備わっています。"
    tech_energy_infrastructure_2_desc:0 "天然ガス発電所では、天然ガスが空気と混合されて燃焼します。燃焼生成物（主にCO2とH2O）が急速に膨張し、その膨張が磁石を回転させるシャフトを回します。水力発電所では、高所から低所へ落下する水が磁石を回転させるシャフトを回します。"
    tech_energy_infrastructure_3_desc:0 "原子力発電所または原子力ステーションは、熱源が原子炉である火力発電所です。典型的な火力発電所と同様に、熱を使用して蒸気を発生させ、それが発電機に接続された蒸気タービンを駆動して電気を生産します。"
    tech_energy_infrastructure_4_desc:0 "地熱発電は、地熱エネルギーから生成される電力です。使用されている技術には、乾式蒸気発電所、フラッシュ蒸気発電所、バイナリーサイクル発電所があります。"
    tech_energy_infrastructure_5_desc:0 "再生可能エネルギー（またはグリーンエネルギー）は、人間の時間スケールで補充される再生可能な天然資源からのエネルギーです。"
    tech_energy_infrastructure_6_desc:0 "太陽光、風力、水力、バイオ燃料などを含む再生可能エネルギーは、より炭素集約的でなく、より持続可能なエネルギーシステムへの移行の中心にあります。"
    tech_energy_infrastructure_7_desc:0 "化石燃料発電所は、石炭、石油、天然ガスなどの化石燃料を燃焼させて電気を生産する火力発電所です。化石燃料発電所には、燃焼の熱エネルギーを機械エネルギーに変換し、それが発電機を動かす機械が備わっています。"
    tech_energy_infrastructure_8_desc:0 "A nuclear power plant or atomic power station is a thermal power station in which the heat source is a nuclear reactor. As is typical of thermal power stations, heat is used to generate steam that drives a steam turbine connected to a generator that produces electricity.
    tech_energy_infrastructure_9_desc:0 "核融合発電は、核融合反応からの熱を利用して発電する提案されている発電形式です。核融合プロセスでは、2つの軽い原子核が結合してより重い原子核を形成し、その間にエネルギーを放出します。このエネルギーを利用するために設計された装置は、核融合炉として知られています。"
    tech_energy_infrastructure_10_desc:0 "発電所は巨大で、広大なエネルギー生成能力を持っています。"
    
