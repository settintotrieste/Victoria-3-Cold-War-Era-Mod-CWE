    tech_military_navy_doctrine_1_desc:0 "海軍旗信号は、手旗信号や旗りゅう信号など、様々な海軍で使用される旗信号の様々な形式を網羅しています。これは、商船やその他の非海軍船舶による海上旗信号や、識別のために使用される旗とは区別されます。"
    tech_military_navy_doctrine_2_desc:0 "大学校では、士官に対し、その職務における管理的、軍事的スタッフ、および政策的側面について訓練します。"
    tech_military_navy_doctrine_3_desc:0 "空母戦闘群は、航空母艦を主力艦とし、その多数の護衛艦からなる海軍艦隊であり、これらが一体となってグループを形成します。"
    tech_military_navy_doctrine_4_desc:0 "海戦において、「現存艦隊主義」とは、港を出ることなく支配的な影響力を及ぼす海軍部隊のことです。"
    tech_military_navy_doctrine_5_desc:0 "艦砲射撃支援は、海軍砲撃支援、または沿岸砲撃としても知られ、水陸両用作戦やその射程内で活動する他の部隊に火力支援を提供するための海軍砲の使用です。"
    tech_military_navy_doctrine_6_desc:0 "即応海軍とは、即時展開のために常に準備が整えられている艦隊のことです。"
    tech_military_navy_doctrine_7_desc:0 "海上航法とは、出発点（航海）から目的地まで、効率的かつ責任を持って船を操縦する技術と科学です。"
    tech_military_navy_doctrine_8_desc:0 "空母戦闘群は、航空母艦を主力艦とし、その多数の護衛艦からなる海軍艦隊であり、これらが一体となってグループを形成します。"
    tech_military_navy_doctrine_9_desc:0 "グローバルフリート管理には、複数の国で活動する艦隊の監督が含まれます。"
    tech_military_navy_doctrine_10_desc:0 "軍艦の制御にはAIが使用されます。"
    
    tech_military_theory_1:0 "戦略計画"
    tech_military_theory_2:0 "諸兵科連合"
    tech_military_theory_3:0 "戦域"
    tech_military_theory_4:0 "相互確証破壊"
    tech_military_theory_5:0 "非対称戦争"
    tech_military_theory_6:0 "ISR"
    tech_military_theory_7:0 "宇宙軍"
    tech_military_theory_8:0 "自動化戦争"
    tech_military_theory_9:0 "デジタル戦闘空間"
    tech_military_theory_10:0 "AI将軍"
    
    tech_military_theory_1_desc:0 "戦略計画とは、組織がその戦略や方向性を定義し、戦略目標を達成するために資源を配分する決定を行うプロセスです。"
    tech_military_theory_2_desc:0 "諸兵科連合とは、軍の異なる戦闘部隊を統合して相互に補完的な効果を達成しようとする戦争へのアプローチです。例えば、都市環境で歩兵と機甲部隊を使用し、それぞれが他方を支援するような場合です。"
    tech_military_theory_3_desc:0 "戦争において、戦域とは、重要な軍事イベントが発生または進行中の地域のことです。戦域には、戦争作戦に関与している、または関与する可能性のある空域、陸地、海域の全体が含まれることがあります。"
    tech_military_theory_4_desc:0 "相互確証破壊とは、攻撃者が第二撃能力を持つ核武装した防御国に対して本格的な核兵器を使用した場合、攻撃者と防御者の両方が完全に壊滅するという仮定に基づく軍事戦略および国家安全保障政策のドクトリンです。"
    tech_military_theory_5_desc:0 "非対称戦争とは、相対的な軍事力、戦略、または戦術が著しく異なる交戦者間の戦争の一種です。この種の戦争は、必ずしもそうではありませんが、しばしば、常備軍に対して非合法戦闘員の地位にある可能性のある反乱軍や抵抗運動の民兵が関与します。"
    tech_military_theory_6_desc:0 "ISR（または諜報、監視、偵察）は、通常、軍事用途に関連して使用されます。ISRは、司令官の意思決定プロセスを支援するために、正確で、関連性があり、タイムリーな情報と諜報を協調して収集、処理、提供すると定義できる統合された諜報および作戦機能です。ほとんどの陸、海、空、宇宙の施設は、作戦の成功を確実にするためにISRの収集において重要な役割を果たします。"
    tech_military_theory_7_desc:0 "宇宙軍とは、宇宙空間での軍事作戦や宇宙戦争を行う国家の軍隊の軍事部門です。"
    tech_military_theory_8_desc:0 "戦略計画は、人工知能によって支援されます。"
    tech_military_theory_9_desc:0 "デジタル戦争は、我々が情報戦争と呼ぶものの一部であり、情報、情報プロセス、および情報インフラストラクチャに対する非物理的な攻撃を含みます。これは、情報を危険にさらし、変更し、損傷させ、中断させ、または破壊し、および/または情報処理と意思決定を遅延させ、混乱させ、欺き、中断させるものです。"
    tech_military_theory_10_desc:0 "軍は、強力な人工知能によって指揮されます。"
    
