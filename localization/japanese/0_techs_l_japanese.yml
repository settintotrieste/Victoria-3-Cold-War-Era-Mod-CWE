    tech_construction_infrastructure_1_desc:0 "電動工具とは、手工具で使われる純粋な手作業以外の追加の動力源と機構によって作動する工具です。"
    tech_construction_infrastructure_2_desc:0 "鉄筋コンクリートは、フェロコンクリートとも呼ばれ、コンクリートの比較的低い引張強度と延性が、より高い引張強度または延性を持つ補強材を含めることによって補われる複合材料です。"
    tech_construction_infrastructure_3_desc:0 "プレハブ工法とは、工場やその他の製造現場で構造物の部品を組み立て、完成した組立品や半組立品を構造物が設置される建設現場に輸送する慣行です。"
    tech_construction_infrastructure_4_desc:0 "建設機械には、土壌掘削から材料の輸送、積み下ろし、廃棄物管理まで、建設活動で使用されるすべての機械が含まれます。"
    tech_construction_infrastructure_5_desc:0 "バットレスコアは高層ビル用の構造システムで、六角形のコアをY字型に形成する3つのバットレスで補強したものです。"
    tech_construction_infrastructure_6_desc:0 "構造用鋼は、様々な形状の建設材料を製造するために使用される鋼の一種です。多くの場合、構造用鋼の形状は特定の断面の輪郭を持つ細長い梁の形をとります。"
    tech_construction_infrastructure_7_desc:0 "建築設計は、建築デザインとも呼ばれ、建物の設計に対する広範な建築、工学、技術的な応用を指します。"
    tech_construction_infrastructure_8_desc:0 "コンクリートは、骨材が時間の経過とともに固化する流動セメントで結合された複合材料です。"
    tech_construction_infrastructure_9_desc:0 "電動工具とは、手工具で使われる純粋な手作業以外の追加の動力源と機構によって作動する工具です。"
    tech_construction_infrastructure_10_desc:0 "建設ロボットは、現場での建物やインフラの建設に使用される産業用ロボットの一部です。"
    
