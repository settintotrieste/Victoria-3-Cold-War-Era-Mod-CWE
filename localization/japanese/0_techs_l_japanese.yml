    tech_military_airforce_6:0 "ステルス軍用機"
    tech_military_airforce_7:0 "近代対地対空ミサイル防衛"
    tech_military_airforce_8:0 "AI誘導軍用機"
    tech_military_airforce_9:0 "完全自動軍用機"
    tech_military_airforce_10:0 "空中母艦"
    
    tech_military_airforce_1_desc:0 "複葉機は、2つの主翼が互いの上に積み重ねられた固定翼航空機です。"
    tech_military_airforce_2_desc:0 "爆撃機は、空中から地上への兵器を使用して爆弾を投下したり、魚雷を発射したり、空中発射巡航ミサイルを展開したりする軍用戦闘機です。"
    tech_military_airforce_3_desc:0 "ジェット機（または単にジェット）は、1つ以上のジェットエンジンによって推進される航空機（ほとんど常に固定翼航空機）です。"
    tech_military_airforce_4_desc:0 "空対空ミサイルは、別の航空機を破壊する目的で航空機から発射されるミサイルです。AAMは通常、1つ以上のロケットモーターで駆動され、通常は固体燃料ですが、液体燃料の場合もあります。"
    tech_military_airforce_5_desc:0 "多目的戦闘機（MRCA）は、戦闘でさまざまな役割を果たすことを目的とした戦闘機です。これらの役割には、空対空戦闘、航空支援、航空爆撃、偵察、電子戦、および防空制圧が含まれます。"
    tech_military_airforce_6_desc:0 "ステルス航空機は、レーダー、赤外線、可視光、無線周波数（RF）スペクトル、および音響の反射/放射を低減するさまざまな技術を使用して検出を回避するように設計されており、これらすべてを総称してステルス技術と呼びます。"
    tech_military_airforce_7_desc:0 "地対空ミサイル（SAM）は、地対空誘導兵器（GTAM）または地対空誘導兵器（SAGW）としても知られ、航空機または他のミサイルを破壊するために地上または海上から発射されるように設計されたミサイルです。"
    tech_military_airforce_8_desc:0 "人工知能は軍用機の操縦に使用されます。"
    tech_military_airforce_9_desc:0 "無人航空機（UAV）は、一般的にドローンとして知られ、人間のパイロット、乗組員、または乗客が搭乗していない航空機です。"
    tech_military_airforce_10_desc:0 "空中航空母艦は、他のより小さな寄生航空機を搭載、発進、回収、支援できる母船航空機の一種です。"
    
    tech_military_support_1:0 "職業士官軍団"
    tech_military_support_2:0 "兵棋演習"
    tech_military_support_3:0 "機械化兵站・火砲"
    tech_military_support_4:0 "軍事情報"
    tech_military_support_5:0 "指揮の一元化"
    tech_military_support_6:0 "戦闘特化"
    tech_military_support_7:0 "ISR能力"
    tech_military_support_8:0 "AI誘導兵站・火砲"
    tech_military_support_9:0 "完全自動兵站・火砲"
    tech_military_support_10:0 "軌道砲"
    
    tech_military_support_1_desc:0 "通常、2つ以上の師団と補助の兵科およびサービスからなる戦術単位。"
    tech_military_support_2_desc:0 "兵棋演習は、2人以上のプレイヤーが武装紛争のシミュレーションで対立する軍隊を指揮する戦略ゲームです。兵棋演習は、レクリエーション、戦略的思考の技術で将校を訓練するため、または潜在的な紛争の性質を研究するために行われる場合があります。"
    tech_military_support_3_desc:0 "軍事兵站は、軍隊の移動、補給、および維持を計画および実行する学問分野です。"
    tech_military_support_4_desc:0 "軍事情報は、情報収集と分析のアプローチを使用して、司令官の決定を支援するためのガイダンスと指示を提供する軍事分野です。"
    tech_military_support_5_desc:0 "軍事組織において、指揮の一元化とは、構造の下位メンバー全員が単一の指揮官に責任を負うべきであるという原則です。"
    tech_military_support_6_desc:0 "軍事専門分野は、軍隊で選択または割り当てられた職種またはキャリア専門分野であり、個人に資格の取得、および許容できるレベルの完全性または品質でタスクと割り当てを実行するための職人技におけるある程度の知識とスキルを要求します。"
    tech_military_support_7_desc:0 "ISRは、指揮官の活動遂行を支援するために、時宜を得た、正確で、関連性があり、首尾一貫した、保証された情報とインテリジェンスを協調的かつ統合的に取得、処理、提供することです。"
    tech_military_support_8_desc:0 "AIが軍事兵站システムに組み込まれています。"
    tech_military_support_9_desc:0 "自走砲（機関車砲とも呼ばれる）は、発射位置に向かって移動するための独自の推進システムを備えた大砲です。"
    tech_military_support_10_desc:0 "軌道砲は、遠隔操作される運動エネルギー爆撃システムです。"
    
    tech_military_naval_forces_1:0 "弩級戦艦"
    tech_military_naval_forces_2:0 "巡洋戦艦"
    tech_military_naval_forces_3:0 "初期航空母艦"
    tech_military_naval_forces_4:0 "長距離潜水艦"
    tech_military_naval_forces_5:0 "ミサイル巡洋艦"
    tech_military_naval_forces_6:0 "近代航空母艦"
    tech_military_naval_forces_7:0 "近代戦艦"
    tech_military_naval_forces_8:0 "モジュール式軍艦"
