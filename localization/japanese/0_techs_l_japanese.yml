    tech_military_space_program_1_desc:0 "宇宙物理学は、宇宙プラズマ物理学としても知られ、地球の上層大気および太陽系の残りの部分に自然に存在するプラズマの研究です。これには、超高層大気物理学、オーロラ、惑星の電離層と磁気圏、放射線帯、宇宙天気などのトピックが含まれます。"
    tech_military_space_program_2_desc:0 "天文台は、地上、海上、または天体の事象を観測するために使用される場所です。"
    tech_military_space_program_3_desc:0 "宇宙探査機は、宇宙を探査し、科学的情報を収集するために送られる、無人で操縦されない装置です。"
    tech_military_space_program_4_desc:0 "衛星は、宇宙でより大きな物体の周りを周回、または公転する小さな物体です。衛星は、惑星や恒星の周りを周回する月、惑星、または機械です。"
    tech_military_space_program_5_desc:0 "スペースシャトルは、ロケットで打ち上げられる宇宙船で、動力なしの航空機のように着陸でき、地球と宇宙の間を繰り返し往復するために使用されます。"
    tech_military_space_program_6_desc:0 "宇宙センターは、一般的に宇宙船の発射場に関連付けられています。"
    tech_military_space_program_7_desc:0 "再利用可能な打ち上げロケットは、地表から宇宙空間へペイロードを運びながら、回収して再飛行できる部品を持っています。"
    tech_military_space_program_8_desc:0 "衛星ネットワークは、地球上のある地点から別の地点への通信を提供するノードの組み合わせです。"
    tech_military_space_program_9_desc:0 "月面基地は、月の表面または地下にある人類の前哨基地です。単なる活動場所や一時的なキャンプではなく、月面基地は地球外基地であり、地表インフラを提供することによってロボットまたは人間の活動を支援します。"
    tech_military_space_program_10_desc:0 "宇宙探査は、天文学と宇宙技術を使用して宇宙空間を探査することです。現在、宇宙の探査は主に天文学者によって望遠鏡で行われていますが、その物理的な探査は無人ロボット宇宙探査機と有人宇宙飛行の両方によって行われています。"
    
    tech_military_airforce_1:0 "プロペラ複葉機"
    tech_military_airforce_2:0 "初期爆撃機"
