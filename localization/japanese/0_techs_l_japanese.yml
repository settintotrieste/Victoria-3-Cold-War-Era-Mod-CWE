    tech_military_ground_forces_1_desc:0 "ボルトアクションは、銃の右側に最も一般的に配置されているボルトハンドルを介してボルトを直接操作することによって作動する手動式火器アクションの一種です。"
    tech_military_ground_forces_2_desc:0 "火砲は、歩兵の火器の射程と威力をはるかに超えて弾薬を発射する遠隔兵器です。"
    tech_military_ground_forces_3_desc:0 "戦車は、トラックと呼ばれる2つの無限の金属チェーンで動く、重武装で装甲された戦闘車両です。戦車は本質的に兵器プラットフォームであり、搭載された兵器をクロスカントリーでの機動性と乗組員に提供する保護によって、より効果的にします。"
    tech_military_ground_forces_4_desc:0 "装甲兵員輸送車は、戦闘地帯で人員と装備を輸送するために設計された装甲軍用車両の広範なタイプです。"
    tech_military_ground_forces_5_desc:0 "主力戦車は、戦闘戦車または万能戦車としても知られ、多くの近代軍隊において、装甲保護された直接射撃と機動の役割を果たす戦車です。"
    tech_military_ground_forces_6_desc:0 "反応装甲は、特に現代の戦車などの車両を、成形炸薬や硬化運動エネルギー貫通弾から保護するために使用される車両装甲の一種です。"
    tech_military_ground_forces_7_desc:0 "軽火器は、大まかに言えば、乗員が操作する運動エネルギー火器、焼夷弾、または爆発性弾薬を発射する歩兵携帯兵器です。"
    tech_military_ground_forces_8_desc:0 "致死性自律兵器システム（LAWS）は、センサー群とコンピューターアルゴリズムを使用して、人間の手動制御なしに標的を独立して識別し、搭載された兵器システムを使用して標的を交戦・破壊する、特殊なクラスの兵器システムです。"
    tech_military_ground_forces_9_desc:0 "無人地上車両（UGV）は、地上と接触しながら、搭乗する人間なしで動作する車両です。"
    tech_military_ground_forces_10_desc:0 "兵士は、戦闘でより効果的になるようインプラントを装着しています。"
    
