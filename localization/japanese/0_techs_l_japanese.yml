    tech_urbanization_1_desc:0 "公共事業は、不可欠と見なされる商品やサービスを供給することを目的としています。水、ガス、電気、電話、廃棄物処理、その他の通信システムが、公共事業市場の大部分を占めています。"
    tech_urbanization_2_desc:0 "公共交通機関とは、バスや電車など、決まった時間に決まったルートで運行され、一般の人々が利用する乗り物のシステムを指します。"
    tech_urbanization_3_desc:0 "高層ビルとは、エレベーターなどの機械的な垂直輸送システムの使用を必要とするほど高い多層階の建物のことです。"
    tech_urbanization_4_desc:0 "衛星都市または衛星タウンとは、より大きな大都市圏の一部であり、地域の人口および雇用センターとして機能する、より小さな自治体または集落のことです。"
    tech_urbanization_5_desc:0 "複合用途ビルとは、住宅、商業、小売、ホテル、駐車場、医療、娯楽、および/または工業用途の組み合わせをホストすることにより、複数の目的を果たす任意の構造物です。"
    tech_urbanization_6_desc:0 "都市の公共事業は、単一の機関によって指示および管理されます。"
    tech_urbanization_7_desc:0 "土地利用計画において、都市緑地とは、公園やその他の「緑地」のために確保されたオープンスペースエリアであり、植物、水景（ブルースペースとも呼ばれる）、その他の種類の自然環境を含みます。ほとんどの都市オープンスペースは緑地ですが、時には他の種類のオープンエリアも含まれます。"
    tech_urbanization_8_desc:0 "スマートシティの概念には、モノのインターネット、拡張現実、人工知能などを含む最先端技術の統合が含まれます。"
    tech_urbanization_9_desc:0 "メガリージョンは、複数の都市や郡を包含しますが、多くの場合、複数の州も含まれ、これらすべてがメガリージョンを管理するために協力して取り組む必要があります。"
    tech_urbanization_10_desc:0 "エクメノポリスとは、惑星規模の都市という仮説的な概念です。"
    
    tech_economy_1:0 "行動経済学"
    tech_economy_2:0 "ケインズ経済学"
    tech_economy_3:0 "ブレトン・ウッズ体制"
    tech_economy_4:0 "マネタリズム"
    tech_economy_5:0 "経済のグローバル化"
    tech_economy_6:0 "量的緩和"
    tech_economy_7:0 "企業の社会的責任"
    tech_economy_8:0 "定量的行動ファイナンス"
    tech_economy_9:0 "デジタル経済"
    tech_economy_10:0 "新資本主義"
    
    tech_economy_1_desc:0 "行動経済学は、経済学と心理学の要素を組み合わせて、人々が現実世界でどのように、そしてなぜそのように行動するのかを理解します。これは、ほとんどの人が明確な選好を持ち、それらの選好に基づいて十分な情報に基づいた自己利益的な決定を下すと仮定する新古典派経済学とは異なります。"
    tech_economy_2_desc:0 "ケインズ経済学は、経済における総支出とその生産、雇用、インフレへの影響に関するマクロ経済理論です。これは、大恐慌の影響に対処するために、1930年代にイギリスの経済学者ジョン・メイナード・ケインズによって開発されました。"
    tech_economy_3_desc:0 "ブレトン・ウッズ体制は、固定国際為替レートを作成するために必要な枠組みを提供した統一された規則と政策のセットです。本質的に、この協定は、新設されたIMFが世界中の通貨の固定為替レートを決定することを求めました。"
    tech_economy_4_desc:0 "マネタリズムとは、安定した経済成長は、実質生産性の成長能力に合わせて通貨供給量の増加率を制御することによってのみ保証できるという経済学の理論です。"
    tech_economy_5_desc:0 "経済のグローバル化とは、商品、資本、サービス、技術、情報が国境を越えて広範囲に移動することを指します。"
    tech_economy_6_desc:0 "量的緩和（QE）は、中央銀行が用いる金融政策戦略です。QEでは、中央銀行は金利を引き下げ、通貨供給量を増やし、消費者や企業への貸し出しを促進するために証券を購入します。"
    tech_economy_7_desc:0 "企業の社会的責任とは、企業が社会や環境を悪化させるのではなく、向上させる方法で事業を行うために協調して努力するビジネスモデルです。"
    tech_economy_8_desc:0 "定量的行動ファイナンスは、評価と併せて行動バイアスを理解するために数学的および統計的手法を使用する新しい学問分野です。研究は、古典理論からの重大な逸脱を示す実証研究などの分野に分類できます。"
    tech_economy_9_desc:0 "デジタル経済とは、人々、企業、デバイス、データ、プロセスの間の何十億もの日常的なオンライン接続から生じる経済活動です。"
    tech_economy_10_desc:0 "新資本主義とは、富の拡大を発展させるための経済民主主義と、ミクロ経済および個人の富を確保するために存在する必要のあるいくつかの資本主義以前の側面の両方を具体化したものです。"
    
    tech_politics_1:0 "初期政治学"
    tech_politics_2:0 "ナショナリズム"
    tech_politics_3:0 "イデオロギー的大衆動員"
    tech_politics_4:0 "脱植民地化"
    tech_politics_5:0 "新自由主義"
    tech_politics_6:0 "監視国家"
    tech_politics_7:0 "メディア操作"
    tech_politics_8:0 "学際的政治学"
    tech_politics_9:0 "文化帝国主義"
    tech_politics_10:0 "ユートピア主義"
    
    tech_politics_1_desc:0 "政治学とは、国内、国際、比較の観点から政治と権力を研究する学問です。これには、政治思想、イデオロギー、制度、政策、プロセス、行動、ならびにグループ、階級、政府、外交、法律、戦略、戦争を理解することが含まれます。"
    tech_politics_2_desc:0 "ナショナリズムとは、国家または国民国家への忠誠、献身、または忠誠を強調し、そのような義務が他の個人またはグループの利益に優先すると主張するイデオロギーです。"
    tech_politics_3_desc:0 "大衆動員とは、特定の開発目標に対する意識を高め、需要を喚起するために、国および地方レベルで幅広いパートナーや同盟者を巻き込み、動機付けるプロセスとして定義されます。"
    tech_politics_4_desc:0 "脱植民地化とは、植民地主義の解消です。後者は、帝国国家が海外の領土を確立し、支配するプロセスです。"
    tech_politics_5_desc:0 "新自由主義は、現代では、「価格統制の撤廃、資本市場の規制緩和、貿易障壁の引き下げ」、そして特に民営化と緊縮財政を通じた経済における国家の影響力の縮小など、市場志向の改革政策を指すために使用されます。"
    tech_politics_6_desc:0 "監視国家とは、政府が多数の市民や訪問者を対象に広範な監視を行う国のことです。"
    tech_politics_7_desc:0 "メディア操作とは、行為者が放送マスコミやデジタルメディアプラットフォームの際立った特徴を悪用して、誤解を招き、偽情報を流し、または自分たちの利益や議題を推進する物語を作り出す、組織化されたキャンペーンを指します。"
    tech_politics_8_desc:0 "政治学とは、国内、国際、比較の観点から政治と権力を研究する学問です。これには、政治思想、イデオロギー、制度、政策、プロセス、行動、ならびにグループ、階級、政府、外交、法律、戦略、戦争を理解することが含まれます。"
    tech_politics_9_desc:0 "文化帝国主義は、帝国主義の文化的側面を構成します。「帝国主義」という言葉は、ある国が文化を利用して社会集団間に不平等な社会的・経済的関係を創造し、維持する慣行を表します。"
    tech_politics_10_desc:0 "ユートピア主義とは、より良い社会を夢見たり、考えたり、説明したり、創造しようとしたりする、多くの異なる方法の総称です。"
    
    tech_population_1:0 "滋養強壮剤"
    tech_population_2:0 "基本的な運動"
    tech_population_3:0 "栄養学"
    tech_population_4:0 "ウェルネス哲学"
    tech_population_5:0 "健康補助食品"
    tech_population_6:0 "老年医学"
    tech_population_7:0 "健康的な老化"
    tech_population_8:0 "介助付き生活"
    tech_population_9:0 "アンチエイジング医学"
    tech_population_10:0 "高度老年医学"
    
    tech_population_1_desc:0 "滋養強壮剤は、活力を回復させ、身体を強化し、全般的な健康を促進すると信じられている伝統的な治療薬や調合薬です。"
    tech_population_2_desc:0 "基本的な運動は、フィットネスの向上と健康維持を目的とした、ストレッチ、ウォーキング、自重トレーニングなどの簡単な身体活動を指します。"
    tech_population_3_desc:0 "栄養学は、食物、栄養素、および健康の間の関係を研究し、バランスの取れた食事と疾病予防の基礎を提供します。"
    tech_population_4_desc:0 "ウェルネス哲学は、身体的、精神的、および社会的な幸福を日常生活に統合する、健康へのホリスティックなアプローチを重視します。"
    tech_population_5_desc:0 "健康補助食品は、食事を補い、身体機能を強化するために設計された、ビタミン、ミネラル、またはその他の栄養素を含む製品です。"
    tech_population_6_desc:0 "老年医学は、高齢者のヘルスケアに焦点を当てた医学の一分野であり、加齢に伴う疾患に対処し、生活の質を向上させることを目的としています。"
    tech_population_7_desc:0 "健康的な老化とは、人生の後半を通じて身体的、精神的、および社会的な幸福を維持し、自立性と回復力を可能にすることを指します。"
    tech_population_8_desc:0 "介助付き生活は、日常生活に介助を必要とするものの、自律性を維持したいと願う高齢者のために、支援的な住居とサービスを提供します。"
    tech_population_9_desc:0 "アンチエイジング医学は、活力を延ばすために、生物学的な老化の側面を遅らせる、あるいは逆転させることを目的とした治療や介入を研究します。"
    tech_population_10_desc:0 "高度老年医学は、寿命の延長と高齢者ケアの向上に焦点を当て、複雑な加齢に伴う疾患に対処する専門的な医療と研究を指します。"

    tech_philosophy_1:0 "初等教育制度"
    tech_philosophy_2:0 "中等教育制度"
    tech_philosophy_3:0 "高等教育制度"
    tech_philosophy_4:0 "専門学校"
    tech_philosophy_5:0 "標準化テスト"
    tech_philosophy_6:0 "教育のデジタル化"
    tech_philosophy_7:0 "遠隔学習"
    tech_philosophy_8:0 "AI主導教育"
    tech_philosophy_9:0 "個別化教育"
    tech_philosophy_10:0 "ロボット教育者"
    
    tech_philosophy_1_desc:0 "初等教育または小学校教育は、通常、就学前/幼稚園の後に来て、中学校の前に行われる正式な教育の最初の段階です。"
    tech_philosophy_2_desc:0 "中等教育は通常、6年間の初等教育の後に行われ、その後には高等教育、職業教育、または就職が続きます。"
    tech_philosophy_3_desc:0 "高等教育は、第3レベル、第3段階、または後期中等教育とも呼ばれ、中等教育の修了に続く教育レベルです。"
    tech_philosophy_4_desc:0 "専門学校、職業訓練校、または技術学校は、国によっては、特定かつ具体的な仕事のタスクを完了するために必要な職業教育または技術スキルを提供するために設計された、中等教育または後期中等教育のいずれかを指す可能性のある教育機関の一種です。"
    tech_philosophy_5_desc:0 "標準化テストとは、一貫した、または「標準的な」方法で実施および採点されるテストです。標準化テストは、質問と解釈が一貫しており、所定の標準的な方法で実施および採点されるように設計されています。"
    tech_philosophy_6_desc:0 "教育におけるデジタル化とは、オンラインコース、仮想教室、デジタル教科書など、日常の学習にデジタル技術を統合することを指します。"
    tech_philosophy_7_desc:0 "遠隔教育は、遠隔学習としても知られ、必ずしも学校に物理的に出席しているとは限らない生徒、または学習者と教師が時間と距離の両方で離れている場合の教育です。"
    tech_philosophy_8_desc:0 "人工知能（AI）は、今日の教育における最大の課題のいくつかに取り組み、教育と学習の実践を革新する可能性を秘めています。"
    tech_philosophy_9_desc:0 "個別化学習、個別指導、個人学習環境、直接指導はすべて、生徒のさまざまなニーズに合わせて教育を調整する取り組みを指します。"
    tech_philosophy_10_desc:0 "睡眠学習とは、眠っている人に、通常は睡眠中に録音を再生することによって情報を伝えようとする試みです。"
    
    tech_geopolitics_1:0 "植民地主義"
    tech_geopolitics_2:0 "国際機関"
    tech_geopolitics_3:0 "封じ込め"
    tech_geopolitics_4:0 "世界的イデオロギー対立"
    tech_geopolitics_5:0 "複雑な多国間条約"
    tech_geopolitics_6:0 "国境なき政治"
    tech_geopolitics_7:0 "社会経済的統合"
    tech_geopolitics_8:0 "地域化"
    tech_geopolitics_9:0 "グローバル超大国"
    tech_geopolitics_10:0 "新世界秩序"
    
    tech_geopolitics_1_desc:0 "植民地主義とは、外国の集団が人々や資源を支配し、搾取することを追求し、確立し、維持することです。"
    tech_geopolitics_2_desc:0 "国際機関とは、独自の国際法人格を持ち、複数の国からのメンバーで構成され、しばしば条約やその他の文書によって設立され、国際法によって統治される組織です。"
    tech_geopolitics_3_desc:0 "封じ込めとは、特定の国家の力を抑制しようとする地政学的な戦略的外交政策です。"
    tech_geopolitics_4_desc:0 "イデオロギー対立は、政治的、経済的、宗教的、文化的な価値観を含む、信念体系に関する根深い意見の相違から生じます。"
    tech_geopolitics_5_desc:0 "多国間条約は、3者以上の当事者間の合意です。それらはしばしば、国際会議や国際機関の後援のもとで行われる国家の集まりの結果です。"
    tech_geopolitics_6_desc:0 "国境なしとは、通常、商品や人々の移動に関連して、国境が重要でない状況を表すために使用されます。"
    tech_geopolitics_7_desc:0 "経済統合は、異なる国民経済に属する経済単位間の全ての差別を完全に撤廃するプロセス、またはそのようなプロセスの段階として理解されるかもしれません。"
    tech_geopolitics_8_desc:0 "地域主義とは、地理的に限定された範囲で国家間の法的拘束力のある協定を作成するという政治目標として定義されます。"
    tech_geopolitics_9_desc:0 "超大国とは、いくつかの小国が統合して形成された、大きくて強力な国家と定義されます。"
    tech_geopolitics_10_desc:0 "「新世界秩序」という用語は、世界の政治思想と国際関係における力の均衡に劇的な変化を示す新しい歴史の時代を指します。この用語の様々な解釈にもかかわらず、それは一般的に世界統治の概念と関連付けられています。"
