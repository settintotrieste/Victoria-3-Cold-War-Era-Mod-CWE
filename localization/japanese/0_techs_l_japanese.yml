    tech_land_infrastructure_1_desc:0 "基礎道路・鉄道"
    tech_land_infrastructure_2_desc:0 "基礎インフラとは、主要な鉄道、道路、運河、港湾、ドック、電磁電信、排水、堤防、土地改良などを指します。"
    tech_land_infrastructure_3_desc:0 "統合公共交通は、乗客の利便性と効率性を最大限に高めるためのインフラと技術の導入を通じて促進される、組織的および計画的なプロセスを通じて、様々な交通モードと事業者を組み合わせます。"
    tech_land_infrastructure_4_desc:0 "高速鉄道（HSR）は、従来の鉄道よりも大幅に速く走行する列車を利用する鉄道輸送網の一種です。高速道路は、特に町や都市を結ぶ主要道路です。"
    tech_land_infrastructure_5_desc:0 "鉄道と高速道路は非常に大規模で、大量の交通量を収容できます。"
    tech_land_infrastructure_6_desc:0 "交通管理は、物流における主要な分野です。車両や貨物を物理的に移動させるために必要な輸送サービスの計画、管理、購入に関わります。"
    tech_land_infrastructure_7_desc:0 "電気自動車は、推進に1つ以上の電気モーターを使用する車両です。車両は、外部電源からの電力を使用する集電システムによって電力を供給されるか、バッテリーによって自律的に電力を供給されるか、または発電機や燃料電池を使用して燃料を電気に変換することによって電力を供給されることができます。"
    tech_land_infrastructure_8_desc:0 "自動運転車は、レーダー、GPS、カメラ、ライダーなどの遠隔探知技術を使用して、環境を監視し、3Dマップを作成して操作します。"
    tech_land_infrastructure_9_desc:0 "スマートインフラは、データフィードバックループを使用して問題に関する意思決定を改善するスマートシステムです。"
    tech_land_infrastructure_10_desc:0 "道路と鉄道は巨大です。"
    
    tech_communication_infrastructure_1:0 "電信網"
    tech_communication_infrastructure_2:0 "ラジオ・電話網"
    tech_communication_infrastructure_3:0 "白黒テレビ網"
    tech_communication_infrastructure_4:0 "カラーテレビ網"
    tech_communication_infrastructure_5:0 "全地球測位システム"
    tech_communication_infrastructure_6:0 "初期インターネット網"
    tech_communication_infrastructure_7:0 "AI統合型インターネット"
    tech_communication_infrastructure_8:0 "高速インターネット"
    tech_communication_infrastructure_9:0 "先進的インターネット"
    tech_communication_infrastructure_10:0 "モノのインターネット"
    
    tech_communication_infrastructure_1_desc:0 "電信は、電気接続の開閉によって情報を送信する通信システムです。モールス符号で符号化された電流パルスをワイヤーに沿って送信することに最も関連しています。"
    tech_communication_infrastructure_2_desc:0 "無線ネットワークは、2つ以上の物理デバイス間でデータを交換するために無線信号を利用します。"
    tech_communication_infrastructure_3_desc:0 "白黒テレビ受信機とは、受信した放送信号を白黒のテレビ映像と関連する音声に変換するように設計された電気機器を意味します。"
    tech_communication_infrastructure_4_desc:0 "カラーテレビは、映像の色情報を含むテレビ伝送技術であり、テレビ受像機で映像をカラーで表示できます。画像を灰色の濃淡で表示する白黒テレビ技術を改良したものです。"
    tech_communication_infrastructure_5_desc:0 "全地球測位システムは、衛星を利用した無線航法システムです。"
    tech_communication_infrastructure_6_desc:0 "インターネットネットワークは、相互接続された自律的なネットワークで構成されるグローバルな通信システムです。"
    tech_communication_infrastructure_7_desc:0 "人工知能（AI）は、コンピューターや機械が人間の知能や問題解決能力をシミュレートできるようにする技術です。"
    tech_communication_infrastructure_8_desc:0 "電気通信において、ブロードバンドまたは高速とは、広帯域のデータ伝送であり、広範囲の周波数または複数の異なる同時周波数の信号を利用し、高速インターネットアクセスで使用されます。"
    tech_communication_infrastructure_9_desc:0 "人工知能（AI）は、チャットボットや仮想アシスタントなど、インターネットと対話する新しい方法を開発するために使用されています。"
    tech_communication_infrastructure_10_desc:0 "モノのインターネットは、センサー、処理能力、ソフトウェア、その他の技術を備えたデバイスを指し、インターネットやその他の通信網を介して他のデバイスやシステムとデータを接続・交換します。"
    
    tech_chemicals_1:0 "基礎化学"
    tech_chemicals_2:0 "合成素材"
    tech_chemicals_3:0 "重合"
    tech_chemicals_4:0 "放射化学"
    tech_chemicals_5:0 "生化学"
    tech_chemicals_6:0 "計算化学"
    tech_chemicals_7:0 "生分解性素材"
    tech_chemicals_8:0 "ナノテクノロジー"
    tech_chemicals_9:0 "先進的医学"
    tech_chemicals_10:0 "量子化学"
    
    tech_chemicals_1_desc:0 "化学は、主に物質の特性、それらが受ける変化、およびこれらの変化を記述する自然法則を扱う自然科学の一分野です。"
    tech_chemicals_2_desc:0 "合成材料は、出発物質を化学的に変化させて、異なる特性を持つ材料を作成することによって作られます。合成材料の例としては、プラスチック、医薬品、新しい燃料があります。合成物質は、天然に存在する物質と化学的に同一である場合もあれば、異なる場合もあります。"
    tech_chemicals_3_desc:0 "重合は、高分子化学において、モノマー分子を化学反応で反応させて三次元ネットワークまたはポリマー鎖を形成するプロセスです。"
    tech_chemicals_4_desc:0 "放射化学とは、放射性物質の化学的変化の研究を含む科学の分野を指します。"
    tech_chemicals_5_desc:0 "生化学は、生物の化学物質と化学の研究です。生化学者は、生体分子（タンパク質、RNA、DNA、糖、脂質など）、体内でのそれらの応用と相互作用、および生化学的および代謝的プロセスを研究します。"
    tech_chemicals_6_desc:0 "計算化学は、コンピューターシミュレーションを使用して化学的問題の解決を支援する化学の一分野です。"
    tech_chemicals_7_desc:0 "生分解性材料は、バクテリアや菌類などの微生物によって自然に分解され、二酸化炭素や水のようなより単純で無害な化合物になる物質です。"
    tech_chemicals_8_desc:0 "ナノテクノロジーとは、ナノスケール、つまり100ナノメートル（1ミリメートルの100万分の1）以下の1つ以上の次元を持つ構造、デバイス、およびシステムを原子や分子を操作して設計、製造、使用することに専念する科学と工学の分野を指します。"
    tech_chemicals_9_desc:0 "医学は、生物医学とも呼ばれ、体がどのように機能し、病気や治療にどのように反応するかを研究し、全体的な健康を改善し、新しい治療法や診断法を発見することを目的としています。"
    tech_chemicals_10_desc:0 "量子化学は、分子量子力学とも呼ばれ、化学システムへの量子力学の応用、特に原子レベルでの分子、材料、および溶液の物理的および化学的特性への電子の寄与の量子力学的計算に焦点を当てた物理化学の一分野です。"
    
    tech_manufacturing_1:0 "簡易工場"
    tech_manufacturing_2:0 "労働安全基準"
    tech_manufacturing_3:0 "工場生産ライン"
    tech_manufacturing_4:0 "標準化互換部品"
    tech_manufacturing_5:0 "産業用ロボット工学"
    tech_manufacturing_6:0 "工場コンピューター化"
    tech_manufacturing_7:0 "AI誘導製造"
    tech_manufacturing_8:0 "高精度機械"
    tech_manufacturing_9:0 "スマート工場"
    tech_manufacturing_10:0 "自律型工場"
    
    tech_manufacturing_1_desc:0 "A factory, manufacturing plant or production plant is an industrial facility, often a complex consisting of several buildings filled with machinery, where workers manufacture items or operate machines which process each item into another.
    tech_manufacturing_2_desc:0 "労働安全基準は、職業上の危険からのリスクを低減することを目的として策定された一連の基準です。"
    tech_manufacturing_3_desc:0 "生産ラインとは、簡単に言えば、工場や製造施設における労働者、機械、または設備の列であり、製品の製造が完了するまで作業をある作業ステーションから次の作業ステーションへと渡していきます。"
    tech_manufacturing_4_desc:0 "互換部品とは、実用上同一である部品のことです。それらは、同じタイプのどの組み立てにも適合するように、ほぼ同一であることを保証する仕様に基づいて作られています。そのような部品の1つは、ファイリングなどの特別な調整なしに、別の部品と自由に交換できます。"
    tech_manufacturing_5_desc:0 "産業用ロボットは、製造に使用されるロボットシステムです。産業用ロボットは自動化され、プログラム可能で、3つ以上の軸で動くことができます。"
    tech_manufacturing_6_desc:0 "インダストリー4.0は、スマート製造と同義であり、この分野のデジタルトランスフォーメーションの実現であり、リアルタイムの意思決定、生産性の向上、柔軟性、俊敏性を提供して、企業が製品を製造、改善、流通する方法を革命的に変えます。"
    tech_manufacturing_7_desc:0 "製造におけるAIとは、機械学習（ML）ソリューションと深層学習ニューラルネットワークを使用して、データ分析と意思決定を改善し、製造プロセスを最適化することです。"
    tech_manufacturing_8_desc:0 "高精度機械加工とは、非常に正確で一貫性のある部品を正確な仕様に合わせて製造する機械加工プロセスを指します。"
    tech_manufacturing_9_desc:0 "スマート工場とは、接続されたデバイス、機械、生産システムを使用して継続的にデータを収集・共有するデジタル化された製造施設です。"
    tech_manufacturing_10_desc:0 "人間の支援なしに確実に、常に変化するが小ロットで高度に個別化された製品を、昼夜を問わず、高いサイクルタイムで、以前よりも大幅に低い単価で生産する、完全に自律的に稼働する工場――これが自律生産のビジョンです。"
    
