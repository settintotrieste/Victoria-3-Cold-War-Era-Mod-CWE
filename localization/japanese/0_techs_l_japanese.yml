    tech_military_naval_forces_1_desc:0 "ドレッドノートは、20世紀初頭における戦艦の主流でした。"
    tech_military_naval_forces_2_desc:0 "巡洋戦艦は、20世紀前半の主力艦の一種です。これらは排水量、武装、コストにおいて戦艦と似ていましたが、形式や能力のバランスが異なっていました。"
    tech_military_naval_forces_3_desc:0 "航空母艦は、海上航空基地として機能する軍艦であり、全通式の飛行甲板と、航空機の搭載、武装、展開、回収のための設備を備えています。"
    tech_military_naval_forces_4_desc:0 "潜水艦は、水中で独立して作戦行動が可能な船舶です。"
    tech_military_naval_forces_5_desc:0 "ミサイル巡洋艦は、長距離誘導ミサイルとミサイル発射装置を装備した海軍の巡洋艦です。"
    tech_military_naval_forces_6_desc:0 "航空母艦は、海上航空基地として機能する軍艦であり、全通式の飛行甲板と、航空機の搭載、武装、展開、回収のための設備を備えています。"
    tech_military_naval_forces_7_desc:0 "戦艦は、大口径砲を主兵装とする大型の重装甲軍艦であり、最も強力な火力を持つ主力艦として機能するように設計されています。"
    tech_military_naval_forces_8_desc:0 "モジュール化の概念は、軍艦が作戦上のニーズに応じて搭載兵器を調整できるようにするために開発され、生産レベルの質的・量的な飛躍をもたらしました。"
    tech_military_naval_forces_9_desc:0 "完全自律型の軍艦は、有人軍艦が可能な全ての活動から、人間の管理に関連するものを除いて、全てを遂行することができます。"
    tech_military_naval_forces_10_desc:0 "浮遊要塞は、巨大な戦艦を停泊させることができる巨大な海上基地です。"
    
    tech_military_nuclear_1:0 "原子核物理学"
    tech_military_nuclear_2:0 "ウラン採掘・濃縮"
    tech_military_nuclear_3:0 "原子爆弾"
    tech_military_nuclear_4:0 "水素爆弾"
    tech_military_nuclear_5:0 "初期弾道弾迎撃ミサイル"
    tech_military_nuclear_6:0 "極超音速ミサイル"
    tech_military_nuclear_7:0 "近代弾道弾迎撃ミサイル"
    tech_military_nuclear_8:0 "高威力核兵器"
    tech_military_nuclear_9:0 "AI運用核兵器システム"
    tech_military_nuclear_10:0 "最終戦争兵器"
    
    tech_military_nuclear_1_desc:0 "原子核物理学は、原子核とその構成要素および相互作用を研究する物理学の分野であり、他の形態の核物質の研究も含まれます。原子核物理学は、電子を含む原子全体を研究する原子物理学と混同されるべきではありません。"
    tech_military_nuclear_2_desc:0 "濃縮により、不要なウラン238が除去され、ウラン235原子の濃度が高められます。"
    tech_military_nuclear_3_desc:0 "原子爆弾は、プルトニウムやウランなどの重金属の原子核を分裂させることによって生じる、絶大な爆発力を持つ兵器です。\n\n注：核兵器は「核兵器開発」ディシジョンをクリックすることで開発される場合があります。"
    tech_military_nuclear_4_desc:0 "水素爆弾は、原子爆弾を起爆剤として使用し、水素の同位体（重水素および三重水素）の核融合中にエネルギーが急速に放出されることによって、その破壊力が生まれる非常に強力な爆弾です。"
    tech_military_nuclear_5_desc:0 "弾道弾迎撃ミサイルは、弾道ミサイルに対抗するために設計された地対空ミサイルです。弾道ミサイルは、核、化学、生物、または通常弾頭を弾道飛行軌道で運搬するために使用されます。"
    tech_military_nuclear_6_desc:0 "極超音速兵器は、音速の5倍から25倍、または秒速約1から5マイルと定義される極超音速で移動することが可能な兵器です。"
    tech_military_nuclear_7_desc:0 "弾道弾迎撃ミサイルは、弾道ミサイルに対抗するために設計された地対空ミサイルです。弾道ミサイルは、核、化学、生物、または通常弾頭を弾道飛行軌道で運搬するために使用されます。"
    tech_military_nuclear_8_desc:0 "核兵器の爆発威力とは、特定の核兵器が爆発した際に、爆風、熱、核放射線などとして放出されるエネルギーの量のことです。"
    tech_military_nuclear_9_desc:0 "核兵器を発射する権限は、AIシステムに委任されます。"
    tech_military_nuclear_10_desc:0 "最終戦争兵器とは、惑星上の全ての生命を破壊することができる、仮説上の建造物（通常は兵器または兵器システム）です。"
    
