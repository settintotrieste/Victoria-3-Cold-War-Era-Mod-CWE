    combat_unit_type_infantry_1_desc:0 "静的な戦いに特化した訓練を受けた強固な歩兵であり、防御と消耗戦の戦術に優れています。"
    combat_unit_type_infantry_2_desc:0 "装備は軽めですが、多様な地形において迅速な展開と柔軟な機動が可能です。"
    combat_unit_type_infantry_3_desc:0 "装甲輸送車によって支援された部隊であり、機動力と戦場での生存性を兼ね備えています。"
    combat_unit_type_infantry_4_desc:0 "歩兵と戦車を統合し、突破作戦や持続的な強襲を行う重装甲ユニットです。"
    combat_unit_type_infantry_5_desc:0 "歩兵、装甲、火砲、および支援要素を組み合わせ、戦略的な汎用性を備えたバランスの取れた部隊です。"
    combat_unit_type_infantry_6_desc:0 "火力と機動性を統合し、自律的な作戦向けに最適化されたモジュール式の戦闘編制です。"
    combat_unit_type_infantry_7_desc:0 "最先端の装甲と戦場AI協調システムを装備した、エリート機械化ユニットです。"
    combat_unit_type_infantry_8_desc:0 "生存性、火力、および統合されたドローン支援を強化した次世代の装甲部隊です。"
    combat_unit_type_infantry_9_desc:0 "マルチドメイン作戦と、ユニット間のシームレスな協調が可能な、未来を見据えた部隊です。"
    combat_unit_type_infantry_10_desc:0 "機械化外骨格を操り、機動性、火力、および戦術的優位性を再定義する実験的な戦闘ユニットです。"
    
    combat_unit_type_tanks_1_desc:0 "第一次世界大戦型戦車"
    combat_unit_type_tanks_2_desc:0 "第二次世界大戦型戦車"
    combat_unit_type_tanks_3_desc:0 "冷戦初期型戦車"
    combat_unit_type_tanks_4_desc:0 "冷戦中期型戦車"
    combat_unit_type_tanks_5_desc:0 "冷戦後期型戦車"
    combat_unit_type_tanks_6_desc:0 "21世紀初頭型戦車"
    combat_unit_type_tanks_7_desc:0 "21世紀中期型戦車"
    combat_unit_type_tanks_8_desc:0 "21世紀中期型戦車"
    combat_unit_type_tanks_9_desc:0 "21世紀後期型戦車"
    combat_unit_type_tanks_10_desc:0 "22世紀初頭型戦車"
    
    combat_unit_type_artillery_1_desc:0 "陣地から間接射撃による支援を行う伝統的な砲兵乗組員であり、持続的な爆撃に理想的です。"
    combat_unit_type_artillery_2_desc:0 "要塞を突破し、長期の包囲戦において堅固な標的を壊滅させるために設計された重口径の設置型兵器です。"
    combat_unit_type_artillery_3_desc:0 "装甲と火砲を組み合わせた移動式射撃プラットフォームであり、迅速な再配置と即応的な支援が可能です。"
    combat_unit_type_artillery_4_desc:0 "最前線の戦闘に向けて、防御力と火力を強化した重装甲の火砲ユニットです。"
    combat_unit_type_artillery_5_desc:0 "広範囲に飽和攻撃を行う多連装ロケットシステムであり、敵の編制を抑圧するのに理想的です。"
    combat_unit_type_artillery_6_desc:0 "迅速な展開と長距離の戦術打撃に最適化された、高機動な精密ロケットシステムです。"
    combat_unit_type_artillery_7_desc:0 "戦略的な深部打撃のために、空対地弾道ミサイルを展開可能な高度な発射プラットフォームです。"
    combat_unit_type_artillery_8_desc:0 "人間の監視を最小限に抑え、精密な打撃を実行する自律型ドローンユニットであり、非対称戦争に理想的です。"
    combat_unit_type_artillery_9_desc:0 "同期された多角的な攻撃と適応的な標的設定により、防御を圧倒する協調型ドローンスウォームです。"
    combat_unit_type_artillery_10_desc:0 "極めて長い射程と運動エネルギーによる衝撃を伴う、極超音速投射物を放つ電磁レールガンプラットフォームです。"
    
    combat_unit_type_airforce_1_desc:0 "敵の位置を偵察し戦場の情報を伝達するために使用される軽偵察航空機です。"
    combat_unit_type_airforce_2_desc:0 "近距離でのドッグファイトや低速戦闘における基本的な防空のために設計された、機動力の高い機体です。"
    combat_unit_type_airforce_3_desc:0 "プロペラ機であった前身モデルよりも速度と高度性能が向上した、初期世代のジェット戦闘機です。"
    combat_unit_type_airforce_4_desc:0 "音速の壁を突破し空中戦闘圏を支配することができる高速迎撃機です。"
    combat_unit_type_airforce_5_desc:0 "空対空および空対地任務の両方をこなせる多用途な航空機であり、変化する戦術的ニーズに適応可能です。"
    combat_unit_type_airforce_6_desc:0 "制空権を争う空域での精密攻撃と生存性を考慮して設計された、レーダー回避性能を持つ戦闘機です。"
    combat_unit_type_airforce_7_desc:0 "マルチロールの柔軟性と低観測性、およびネットワーク化された戦闘システムを兼ね備えた高度なステルス・プラットフォームです。"
    combat_unit_type_airforce_8_desc:0 "成層圏付近で作動し、戦略的な迎撃と監視に最適化された高高度戦闘機です。"
    combat_unit_type_airforce_9_desc:0 "最小限のリスクで偵察、攻撃、および支援任務を遂行する、遠隔操作または自律的な空中システムです。"
    combat_unit_type_airforce_10_desc:0 "飛行能力、火力、そして艦隊の調整機能を単一の空飛ぶ要塞へと融合させた、巨大な空中指揮プラットフォームです。"
    
    combat_unit_type_light_ship_1_desc:0 "対潜戦、船団護衛、および迅速な対応のために設計された、高速で機敏な護衛艦です。"
    combat_unit_type_light_ship_2_desc:0 "波の下に潜む静かな狩人であり、隠密偵察と壊滅的な魚雷攻撃が可能です。"
    combat_unit_type_light_ship_3_desc:0 "原子力原子炉を動力源とし、航続距離の延長と強力な水中持続力を備えた深海中の捕食者です。"
    combat_unit_type_light_ship_4_desc:0 "最新のソナー、ミサイルシステム、および強化されたステルス機能を装備した高度な潜水艇です。"
    combat_unit_type_light_ship_5_desc:0 "敵対的な海域における低音響特性と精密攻撃任務に最適化された、次世代の潜水艦です。"

    combat_unit_type_capital_ship_1_desc:0 "過ぎ去った時代の重装甲な軍艦であり、砲身を並べ立てて戦列における支配力を発揮するために建造されました。"
    combat_unit_type_capital_ship_2_desc:0 "巨大な火力を備えた浮遊要塞であり、航路を支配し敵艦隊と正面から交戦するために設計されています。"
    combat_unit_type_capital_ship_3_desc:0 "長距離精密攻撃と艦隊防御のために誘導ミサイルを装備した、近代的な水上戦闘艦です。"
    combat_unit_type_capital_ship_4_desc:0 "火力と機動力を兼ね備え、テンポの速い海戦に理想的な高速主力艦です。"
    combat_unit_type_capital_ship_5_desc:0 "近海での運用に合わせて設計された、速度、ステルス性、およびモジュール式武装を兼ね備えた、コンパクトで多用途な軍艦です。"

    combat_unit_type_carrier_1_desc:0 "海洋全域に戦力を投影する海上空母基地であり、戦闘区域での航空機の発着艦が可能です。"
    combat_unit_type_carrier_2_desc:0 "比類なき運用航続距離と持続力を持ち、持続的な世界的展開を支援する原子力空母です。"
    combat_unit_type_carrier_3_desc:0 "大規模な航空隊、指揮センター、および高度な防御システムを搭載する巨大な旗艦空母です。"
    combat_unit_type_carrier_4_desc:0 "ステルス航空作戦や電子戦を調整しつつ、探知を回避するように設計された低観測空母です。"
    combat_unit_type_carrier_5_desc:0 "航空、海軍、およびドローンの機能を単一の移動式指揮要塞へと統合した、巨大な海軍プラットフォームです。"
    
