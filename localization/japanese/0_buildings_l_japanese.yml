    mobilization_option_drones:0 "戦闘ドローン"
    mobilization_option_drones_desc:0 "戦闘ドローンとは、情報収集、監視、標的捕捉、および偵察に使用される無人航空機（UAV）のことです。また、ドローン攻撃のために、ミサイル、対戦車ミサイル（ATGM）、爆弾などの航空兵器をハードポイントに搭載することができます。"
    
    mobilization_option_military_indoctrination:0 "軍事教練"
    mobilization_option_military_indoctrination_desc:0 "兵士は、軍生活に有害な特性（すなわち、命令に従うために私利私欲を捨てること）を排除し、必要に応じて殺傷できるように訓練し、また新兵が自身を共同体の一員として捉えられるよう、教練を受けます。"
    mobilization_option_political_commissars:0 "督戦隊"
    mobilization_option_political_commissars_desc:0 "督戦隊とは、軍紀を維持し、戦場からの軍人の逃亡を防ぎ、スパイ、破壊工作員、脱走兵を捕らえ、戦場から逃走した者や部隊から遅れた兵士を連れ戻すために、後方または前線（主力部隊の後方）に配置される軍事ユニットのことです。"
    
