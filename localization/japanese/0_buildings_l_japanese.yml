    mobilization_option_special_forces:0 "特殊部隊"
    mobilization_option_special_forces_desc:0 "通常の作戦とは異なる軍事行動を行うために、一部の軍人を特別に訓練します。"
    mobilization_option_cyber_forces:0 "サイバー戦部隊"
