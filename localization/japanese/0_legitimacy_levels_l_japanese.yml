 legitimacy_level_unacceptable:0 "不安定政府"
 legitimacy_level_contested:0 "分裂政府"
 legitimacy_level_legitimate:0 "安定政府"
 legitimacy_level_righteous:0 "統一政府"

 legitimacy_level_radicalism_gain:0 "#tooltippable #tooltip:[Country.GetTooltipTag],legitimacy_level_radicalism_gain_tooltip [Multiply_CFixedPoint(IntToFixedPoint(Country.GetNumInterestGroupMembers), Negate_CFixedPoint(Country.GetLoyaltiesGain))|D=-]#!#!毎月さらに[Concept('concept_radical','$concept_radicals$')]"
 legitimacy_level_loyalism_gain:0 "#tooltippable #tooltip:[Country.GetTooltipTag],legitimacy_level_loyalism_gain_tooltip [Multiply_CFixedPoint(IntToFixedPoint(Country.GetNumInterestGroupMembers), Country.GetLoyaltiesGain)|D=+]#!#!毎月さらに[Concept('concept_loyalist','$concept_loyalists$')]"
 legitimacy_level_radicalism_gain_tooltip:0 "#header #v [Multiply_CFixedPoint(IntToFixedPoint(Country.GetNumInterestGroupMembers), Negate_CFixedPoint(Country.GetLoyaltiesGain))|D=-]#!毎月[Concept('concept_radical','$concept_radicals$')]#!\n$TOOLTIP_DELIMITER$\n#v [Negate_CFixedPoint(Country.GetLoyaltiesGain)|%2-]#!の現在の[Country.GetNumInterestGroupMembers|Dv][Country.GetAdjectiveNoFlag][concept_interest_group]メンバー"
 legitimacy_level_loyalism_gain_tooltip:0 "#header #v [Multiply_CFixedPoint(IntToFixedPoint(Country.GetNumInterestGroupMembers), Country.GetLoyaltiesGain)|D=+]#!毎月[Concept('concept_loyalist','$concept_loyalists$')]#!\n$TOOLTIP_DELIMITER$\n#v [Country.GetLoyaltiesGain|%2+]#!の現在の[Country.GetNumInterestGroupMembers|Dv][Country.GetAdjectiveNoFlag][concept_interest_group]メンバー"
 
 legitimacy_level_radicalism_gain_no_country:0 "[concept_legitimacy]が低いほど[concept_country]全体の[Concept('concept_radical','$concept_radicals$')]が増加します"
 legitimacy_level_loyalism_gain_no_country:0 "[concept_legitimacy]が高いほど[concept_country]全体の[Concept('concept_loyalist','$concept_loyalists$')]が増加します"
 legitimacy_level_illegitimate_loyalties_gain:0 "[SelectLocalization(Country.IsValid,'legitimacy_level_radicalism_gain','legitimacy_level_radicalism_gain_no_country')]"
 legitimacy_level_unacceptable_loyalties_gain:0 "$[SCOPE.sCharacter('replacement_ruler_elitist').GetFullName]$"
 legitimacy_level_legitimate_loyalties_gain:0 "[SelectLocalization(Country.IsValid,'legitimacy_level_loyalism_gain','legitimacy_level_loyalism_gain_no_country')]"
 legitimacy_level_righteous_loyalties_gain:0 "[SelectLocalization(Country.IsValid,'legitimacy_level_loyalism_gain','legitimacy_level_loyalism_gain_no_country')]"

 LEGITIMACY_LEVEL_ACTIVE:0 "#i #b （現在有効）#!#!"
 LEGITIMACY_LEVEL_PREDICTED:0 "#i #b （予測）#!#!"
 LEGITIMACY_LEVEL_CONFIRM_TO_ACTIVATE:0 "" #instruction Confirm to apply#!
 LEGITIMACY_LEVEL_BOUNDS_DESC:0 "[LegitimacyLevel.GetLowerBound|v]から[LegitimacyLevel.GetUpperBound|v]までの[concept_legitimacy]に適用されます。"
 LEGITIMACY_LEVEL_CURRENT_LEGITIMACY_DESC:0 "現在の[concept_legitimacy]の値：[GetPlayer.GetGovernmentLegitimacy|v]"
 LEGITIMACY_LEVEL_PREDICTED_LEGITIMACY_DESC:0 "予測される[concept_legitimacy]の値：[ReformGovernment.GetPredictedLegitimacy|v]"
 LEGITIMACY_LEVEL_NO_EFFECT:0 "#italic 効果なし#!"
 LEGITIMACY_LEVEL_CURRENTLY_ACTIVE:0 "[GetMetaPlayer.GetPlayedOrObservedCountry.GetAdjectiveNoFlag]の[concept_government]は[LegitimacyLevel.GetName]とみなされます#indent_newline:2 \n[LegitimacyLevel.GetEffectsWithLoyaltiesGain(GetMetaPlayer.GetPlayedOrObservedCountry.Self)]#!"

 LEGITIMACY_LEVEL_INACTIVE_TOOLTIP:0 "#header [LegitimacyLevel.GetNameNoFormatting]#!\n$LEGITIMACY_LEVEL_BOUNDS_DESC$\n$TOOLTIP_DELIMITER$\n効果：#indent_newline:2 \n[LegitimacyLevel.GetEffects]#!"
 LEGITIMACY_LEVEL_ACTIVE_TOOLTIP:0 "#header [LegitimacyLevel.GetNameNoFormatting]#! $LEGITIMACY_LEVEL_ACTIVE$\n$LEGITIMACY_LEVEL_BOUNDS_DESC$\n$LEGITIMACY_LEVEL_CURRENT_LEGITIMACY_DESC$\n$TOOLTIP_DELIMITER$\n効果：#indent_newline:2 \n[LegitimacyLevel.GetEffectsWithLoyaltiesGain(GetPlayer.Self)]#!\n\nこれは以下の理由によります：#indent_newline:2 \n[GetPlayer.GetGovernmentLegitimacyDesc]#!"
 LEGITIMACY_LEVEL_PREDICTED_TOOLTIP:0 "#header [LegitimacyLevel.GetNameNoFormatting]#! [SelectLocalization(ReformGovernment.HasMadeAnyChanges, 'LEGITIMACY_LEVEL_PREDICTED', 'LEGITIMACY_LEVEL_ACTIVE')]\n$LEGITIMACY_LEVEL_BOUNDS_DESC$\n[SelectLocalization(ReformGovernment.HasMadeAnyChanges, 'LEGITIMACY_LEVEL_PREDICTED_LEGITIMACY_DESC', 'LEGITIMACY_LEVEL_CURRENT_LEGITIMACY_DESC')]\n$TOOLTIP_DELIMITER$\n効果：#indent_newline:2 \n[LegitimacyLevel.GetEffectsWithLoyaltiesGain(GetPlayer.Self)]#!\n\nこれは以下の理由によります：#indent_newline:2 \n[ReformGovernment.GetPredictedLegitimacyDesc]#!\n\n$LEGITIMACY_LEVEL_CONFIRM_TO_ACTIVATE$"
