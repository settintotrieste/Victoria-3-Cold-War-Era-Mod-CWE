    dp_make_puppet_tooltip:1 "#header $dp_make_puppet$ [concept_diplomatic_play]を開始する#!\n$TOOLTIP_DELIMITER$\n$dp_make_puppet_desc$"
    dp_make_puppet_desc:0 "開始となる[concept_war_goal]を設定し、標的国である[concept_country]を自身の[concept_puppet]にします。"
    
    war_goal_make_puppet_type_name:0 "傀儡国化"
    war_goal_make_puppet_type_desc:1 "他国を強制的に[concept_puppet]にします。"
    war_goal_make_puppet:0 "[WAR_GOAL_DRAFT.GetTarget.GetName] [concept_puppet]"
    war_goal_make_puppet_desc:1 "[WAR_GOAL_DRAFT.GetHolder.GetName]が[WAR_GOAL_DRAFT.GetTarget.GetName]を強制的に[concept_puppet]にします。"
    war_goal_make_puppet_sway_desc:1 "[WAR_GOAL_DRAFT.GetTarget.GetName]を自身の[concept_puppet]にすることで、[WAR_GOAL_DRAFT.GetHolder.GetName]を説得して自陣営に加わるよう試みます。"
    
    dp_make_dominion:0 "$war_goal_make_dominion_type_name$"
    dp_make_dominion_tooltip:1 "#header $dp_make_dominion$ [concept_diplomatic_play]を開始する#!\n$TOOLTIP_DELIMITER$\n$dp_make_dominion_desc$"
    dp_make_dominion_desc:0 "開始となる[concept_war_goal]を設定し、標的国である[concept_country]を自身の[concept_dominion]にします。"
    
