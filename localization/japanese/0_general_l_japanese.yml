    treaty_port_lease_terminated.t:0 "[SCOPE.sState('treaty_port_lease_state').GetPortHubName]の租借が終了しました"
    treaty_port_lease_terminated.d:0 "[ROOT.GetCountry.GetName]の[SCOPE.sState('treaty_port_lease_state').GetPortHubName]における[concept_treaty_port]の賃借権は、その根拠となる[concept_treaty]が撤回されたことにより終了しました。これは国際法に基づき、[ROOT.GetCountry.GetName]が[SCOPE.sState('treaty_port_lease_state').GetPortHubName]を[SCOPE.sCountry('treaty_port_lease_landlord').GetName]に返還しなければならないことを意味しています。"
    treaty_port_lease_terminated.f:0 "このイベントは、#y $treaty_port_leased$#! [concept_article]を含む[concept_treaty]が撤回されたために発生しました。"
    treaty_port_lease_terminated.1:0 "[SCOPE.sState('treaty_port_lease_state').GetPortHubName]を無条件で返還する。"
    treaty_port_lease_terminated.2:0 "[SCOPE.sState('treaty_port_lease_state').GetPortHubName]を[concept_special_administrative_region]として返還することを提案する。"
    treaty_port_lease_terminated.3:0 "[SCOPE.sState('treaty_port_lease_state').GetPortHubName]の返還を拒否する。"
    
    treaty_port_lease_terminated_SAR.t:0 "[SCOPE.sState('treaty_port_lease_state').GetPortHubName]の賃借権終了"
    treaty_port_lease_terminated_SAR.d:0 "[SCOPE.sCountry('treaty_port_lease_tenant').GetName]による[SCOPE.sState('treaty_port_lease_state').GetPortHubName]の[concept_treaty_port]の賃借権は、基盤となる[concept_treaty]が撤回されたことにより終了しました。これは国際法に基づき、[SCOPE.sCountry('treaty_port_lease_tenant').GetName]が[SCOPE.sState('treaty_port_lease_state').GetPortHubName]を[SCOPE.sCountry('treaty_port_lease_landlord').GetName]に返還しなければならないことを意味します。\n\nしかしながら、[SCOPE.sCountry('treaty_port_lease_tenant').GetName]は、それが[SCOPE.sCountry('treaty_port_lease_landlord').GetName]の[concept_special_administrative_region]にならない限り、[SCOPE.sState('treaty_port_lease_state').GetPortHubName]の返還を拒否しています。"
    treaty_port_lease_terminated_SAR.f:0 "このイベントは、#y $treaty_port_leased$#! [concept_article]を含む[concept_treaty]から撤回があったために発生しました。"
    treaty_port_lease_SAR.1:0 "[SCOPE.sCountry('treaty_port_lease_tenant').GetAdjectiveNoFormatting]の提案を受け入れる。"
    treaty_port_lease_SAR.2:0 "[SCOPE.sState('treaty_port_lease_state').GetPortHubName]を武力で奪還する。"
    
    treaty_port_lease_terminated_war.t:0 "[SCOPE.sState('treaty_port_lease_state').GetPortHubName]の租借終了"
    treaty_port_lease_terminated_war.d:0 "[SCOPE.sCountry('treaty_port_lease_tenant').GetName]の[SCOPE.sState('treaty_port_lease_state').GetPortHubName]における[concept_treaty_port]の租借は、基盤となる[concept_treaty]からの離脱により終了しました。これは、国際法に基づき[SCOPE.sCountry('treaty_port_lease_tenant').GetName]が[SCOPE.sState('treaty_port_lease_state').GetPortHubName]を[SCOPE.sCountry('treaty_port_lease_landlord').GetName]に返還する義務があることを意味します。\n\nしかしながら、[SCOPE.sCountry('treaty_port_lease_tenant').GetName]は条約上の義務に違反して、[SCOPE.sState('treaty_port_lease_state').GetPortHubName]の返還を拒否しています。"
    treaty_port_lease_terminated_war.f:0 "このイベントは、#y $treaty_port_leased$#! [concept_article]を含む[concept_treaty]から離脱したことにより発生しました。"
    treaty_port_lease_war.1:0 "[SCOPE.sState('treaty_port_lease_state').GetPortHubName]を武力で奪還する。"
    treaty_port_lease_war.2:0 "[SCOPE.sState('treaty_port_lease_state').GetPortHubName]に対する我々の主張権を放棄する。"
    
