    war_goal_make_dominion_type_desc:1 "別の国を[concept_dominion]にすることを強制します。"
    war_goal_make_dominion:0 "[WAR_GOAL_DRAFT.GetTarget.GetName] [concept_dominion]"
    war_goal_make_dominion_desc:1 "[WAR_GOAL_DRAFT.GetHolder.GetName]が[WAR_GOAL_DRAFT.GetTarget.GetName]を[concept_dominion]にすることを強制します。"
    war_goal_make_dominion_sway_desc:1 "[WAR_GOAL_DRAFT.GetTarget.GetName]をあなたの[concept_dominion]にすることで、[WAR_GOAL_DRAFT.GetHolder.GetName]にあなたの側に加わるよう説得を試みます。"
    
    concept_puppet:0 "傀儡国"
    concept_puppets:0 "傀儡国"
    concept_puppet_desc:0 "[Concept('concept_recognized_power','$concept_recognized_powers$')]は、より弱い[concept_country]を自国の$concept_puppet$に変えることがあります。$concept_puppet$は[concept_subject]タイプであり、独自の[Concept('concept_diplomatic_play','$concept_diplomatic_plays$')]を開始することはできませんが、自国の[Concept('concept_overlord','$concept_overlord_possessive$')] [Concept('concept_war','$concept_wars$')]への加入を強制されます。$concept_puppet$の[concept_rank]は$concept_overlord$のそれに追いついたり上回ったりすることはできず、また$concept_overlord$は#b 併合#!の$concept_diplomatic_play$を用いて彼らを標的にすることがあります。"
    
    dp_make_tributary:0 "$war_goal_make_tributary_type_name$"
