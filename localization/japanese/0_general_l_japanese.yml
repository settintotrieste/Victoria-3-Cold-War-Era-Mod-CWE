    ship_type_troop_ship_0_desc:0 "$ship_type_troop_ship_desc$"
    ship_type_troop_ship_1_desc:0 "改良された推進システムと安全システムを備え、兵士と物資を効率的に長距離輸送できるよう設計された、近代化された兵員輸送艦です。"
    ship_type_troop_ship_2_desc:0 "キャパシティの向上、自動化、および兵站支援を特徴とする高度な兵員輸送艦であり、世界的な戦区における大規模な展開を維持することが可能です。"
    
    ship_type_battleship_0_desc:0 "$ship_type_pre_dreadnought_desc$"
    ship_type_battleship_1_desc:0 "$ship_type_dreadnought_desc$"
    ship_type_battleship_2_desc:0 "$ship_type_super_dreadnought_desc$"
    ship_type_battleship_3_desc:0 "速度のために装甲を犠牲にした高速な主力艦であり、戦艦を出し抜く速度を持ちながら、巡洋艦を圧倒する火力を備えるよう設計されています。"
    ship_type_battleship_4_desc:0 "誘導ミサイルシステムを装備した近代化された巡洋戦艦であり、従来の砲撃をはるかに超える射程を誇ります。"
    ship_type_battleship_5_desc:0 "レーダー、電子機器、および改良された推進システムを統合し、火力と生存性のバランスを追求した高度な巡洋戦艦です。"
    ship_type_battleship_6_desc:0 "モジュール式コンポーネントで構築された柔軟な設計により、新しい兵器や技術への迅速な適応が可能です。"
    ship_type_battleship_7_desc:0 "莫大な火力と強化装甲を備えた大型化された巡洋戦艦であり、速度を維持しつつ、強さにおいて戦艦に匹敵します。"
    ship_type_battleship_8_desc:0 "無人システムやドローンの群れを展開する巡洋戦艦であり、乗組員を危険にさらすことなく戦闘能力を拡張できます。"
    ship_type_battleship_9_desc:0 "独立した運用が可能な高度に自動化された主力艦であり、効率を最大化しつつ乗組員の必要数を削減します。"
    ship_type_battleship_10_desc:0 "巡洋戦艦の進化の極致であり、圧倒的な火力、高度な自動化、そして比類なき耐久力を兼ね備えた巨大な戦艦です。"
    ship_type_aircraft_carrier_0_desc:0 "限定的な航空作戦向けに設計された小型の空母であり、偵察および軽攻撃能力を提供します。"
    ship_type_aircraft_carrier_1_desc:0 "海域全体における攻撃および防御任務のために、大規模な航空隊を支援できるフルサイズの艦隊空母です。"
    ship_type_aircraft_carrier_2_desc:0 "事実上無制限の航続距離を持つ原子力空母であり、燃料補給なしでの継続的な世界的運用を可能にします。"
    ship_type_aircraft_carrier_3_desc:0 "高度な電子機器、レーダー、および推進システムを統合し、攻撃と支援の役割のバランスをとった近代的な空母です。"
    ship_type_aircraft_carrier_4_desc:0 "巨大なサイズとキャパシティを誇るスーパーキャリアであり、全地域にわたって圧倒的な航空戦力を投射できます。"
    ship_type_aircraft_carrier_5_desc:0 "最先端のシステム、自動化、および強化された生存性を備えた高度なスーパーキャリアであり、高強度の戦争に適しています。"
    ship_type_aircraft_carrier_6_desc:0 "適応可能なコンポーネントで構築されたモジュール式のスーパーキャリアです。武器、センサー、および航空機設備への迅速なアップグレードが可能です。"
    ship_type_aircraft_carrier_7_desc:0 "無人航空システムを展開するドローン・スーパーキャリアです。人間のパイロットへのリスクを軽減しつつ、攻撃範囲を拡大します。"
    ship_type_aircraft_carrier_8_desc:0 "高度なAIと自動化を活用し、最小限の乗組員での運用が可能な自律的スーパーキャリアです。持続的な世界的な覇権を維持します。"
    ship_type_cruiser_0_desc:0 "$ship_type_protected_cruiser_desc$"
    ship_type_cruiser_1_desc:0 "$ship_type_armored_cruiser_desc$"
    ship_type_cruiser_2_desc:0 "$ship_type_light_cruiser_desc$"
    ship_type_cruiser_3_desc:0 "強化装甲を備えた重武装の巡洋艦です。敵艦船との交戦や艦隊運用の支援が可能です。"
    ship_type_cruiser_4_desc:0 "誘導ミサイルシステムを搭載して改装された巡洋艦です。従来の砲撃を遥かに超える攻撃範囲を誇ります。"
    ship_type_cruiser_5_desc:0 "高度なレーダー、電子機器、および推進システムを統合した現代的なミサイル巡洋艦です。攻撃と防御の役割においてバランスの取れた性能を備えています。"
    ship_type_cruiser_6_desc:0 "適応可能なコンポーネントで構築されたモジュール式のミサイル巡洋艦です。武器やセンサーへの迅速なアップグレードが可能です。"
    ship_type_cruiser_7_desc:0 "巨大なサイズと火力を誇るスーパーミサイル巡洋艦です。海戦を制圧し、艦隊の指揮能力を提供するために設計されました。"
    ship_type_cruiser_8_desc:0 "偵察や攻撃任務のために無人システムを展開するドローン・ミサイル巡洋艦です。乗組員へのリスクを軽減します。"
    ship_type_cruiser_9_desc:0 "高度な自動化を活用し、最小限の乗組員での運用が可能な自律的ミサイル巡洋艦です。持続的な戦闘効率を実現します。"
    ship_type_cruiser_10_desc:0 "巡洋艦の進化の極致であるメガ・ミサイル巡洋艦です。圧倒的な火力、高度な自動化、そして比類なき持続力を兼ね備えています。"
    ship_type_destroyer_0_desc:0 "$ship_type_coastal_defense_ship_desc$"
    ship_type_destroyer_1_desc:0 "$ship_type_torpedo_boat_desc$"
    ship_type_destroyer_2_desc:0 "$ship_type_destroyer_desc$"
    ship_type_destroyer_3_desc:0 "より強力な武装と向上した持続力を備えた大型の駆逐艦です。敵艦船や潜水艦に対抗するために設計されました。"
    ship_type_destroyer_4_desc:0 "誘導ミサイルシステムを装備した駆逐艦です。従来の砲撃を超えた攻撃および防御範囲を誇ります。"
    ship_type_destroyer_5_desc:0 "高度なレーダー、電子機器、および推進システムを統合した現代的なミサイル駆逐艦です。艦隊の護衛と攻撃の役割においてバランスの取れた性能を備えています。"
    ship_type_destroyer_6_desc:0 "適応可能なコンポーネントで構築されたモジュール式のミサイル駆逐艦です。武器やセンサーへの迅速なアップグレードが可能です。"
    ship_type_destroyer_7_desc:0 "圧倒的な大きさと火力を持つスーパーミサイル駆逐艦であり、海戦を支配し艦隊防御を行うことが可能です。"
    ship_type_destroyer_8_desc:0 "無人システムを偵察や攻撃任務に投入することで、人間の乗組員へのリスクを軽減するドローンミサイル駆逐艦です。"
    ship_type_destroyer_9_desc:0 "高度な自動化を活用して持続的な戦闘効率を維持し、最小限の乗組員での運用が可能な自律的ミサイル駆逐艦です。"
    ship_type_destroyer_10_desc:0 "駆逐艦の進化の頂点であり、圧倒的な火力、高度な自動化、そして比類なき耐久力を兼ね備えたメガミサイル駆逐艦です。"
    ship_type_submarine_1_desc:0 "初期の実験的な潜水艦で、航続距離と耐久力には制限がありますが、敵の商船を攻撃することが可能です。"
    ship_type_submarine_2_desc:0 "信頼性と耐久性が向上した戦間期の潜水艦であり、沿岸防御および限定的な艦隊支援を目的として設計されています。"
    ship_type_submarine_3_desc:0 "長距離哨戒用に建造された艦隊潜水艦であり、海洋全域において大国の海軍力と共に運用することが可能です。"
    ship_type_submarine_4_desc:0 "耐久性とコストパフォーマンスのバランスが取れたディーゼル・エレクトリック潜水艦で、Cold War Eraに広く配備されました。"
    ship_type_submarine_5_desc:0 "実質的に無限の航続距離を持つ原子力攻撃潜水艦であり、敵の艦船や潜水艦を狩るために設計されています。"
    ship_type_submarine_6_desc:0 "核兵器を搭載した弾道ミサイル潜水艦であり、隠密性と生存性を通じて戦略的抑止力を提供します。"
    ship_type_submarine_7_desc:0 "最先端のセンサーと静粛性の高い推進システムを備えた高度なステルス潜水艦であり、隠密作戦に最適化されています。"
    ship_type_submarine_8_desc:0 "無人システムを偵察や攻撃任務に投入することで、人間の乗組員へのリスクを軽減する自律的ドローン潜水艦です。"
    ship_type_submarine_9_desc:0 "超高速兵器の射撃が可能な極超音速攻撃潜水艦であり、前例のない速度で水中戦を再定義します。"
    ship_type_submarine_10_desc:0 "潜水艦設計の究極の進化形であり、膨大な火力、高度な自動化、そして比類なき耐久力を兼ね備えたメガ潜水艦です。"
    
