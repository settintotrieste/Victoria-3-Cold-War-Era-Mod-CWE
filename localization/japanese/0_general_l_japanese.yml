    objective_democratic_victory_cold_war:0 "民主主義の勝利"
    objective_democratic_victory_cold_war_desc:0 "西側陣営の勝利を達成してください。世界中に民主主義と資本主義を広め、共産主義を完全に打ち砕きましょう。"
    objective_democratic_victory_cold_war_idle_header:0 "冷戦に勝利する"
    objective_democratic_victory_cold_war_idle_hint:0 "すべての共産主義的な[concept_super_power]を排除し、唯一の民主的な[concept_super_power]として立ち上がれ！"
    objective_democratic_victory_cold_war_name_USA:0 "アメリカ合衆国"
    objective_democratic_victory_cold_war_desc_USA:0 "1941年の日本による真珠湾攻撃後、米国は連合国側として第二次世界大戦に参戦しました。戦後の混乱により、米国とソ連は世界の二大超大国となり、冷戦へと発展しました。冷戦期間中、両国はイデオロギーの覇権を巡る争いに身を投じましたが、直接的な軍事衝突は避けられました。"
    objective_democratic_victory_cold_war_name_GBR:0 "イギリス"
    objective_democratic_victory_cold_war_desc_GBR:0 "1920年代に全盛期を迎えた大英帝国は、世界の陸地と人口のほぼ4分の1を支配しており、史上最大の帝国でした。しかし、第一次世界大戦および第二次世界大戦への関与、累積する危機、そして威信の喪失により、大半のイギリス植民地の脱植民地化が進み、最終的に帝国は終焉を迎えました。"
    objective_democratic_victory_cold_war_name_FRA:0 "フランス"
    objective_democratic_victory_cold_war_desc_FRA:0 "フランスは第二次世界大戦において連合国のひとつでしたが、1940年に降伏し、枢軸国によって被占領となりました。1944年の解放後、短命に終わった第四共和制が樹立されましたが、その後のアルジェリア戦争における敗北の過程で解体されました。現在の第五共和制は、1958年にシャルル・ド・ゴールによって形成されました。アルジェリアとフランスの大部分の植民地は1960年代に独立しましたが、その大部分はフランスと密接な経済的・軍事的関係を維持しています。"
    objective_democratic_victory_cold_war_name_ROC:0 "中華民国"
    objective_democratic_victory_cold_war_desc_ROC:0 "第二次世界大戦は中国を荒廃させ、甚大な人的損失と物質的破壊をもたらしました。中国と日本の間の戦争は、1945年の第二次世界大戦終結時の日本の降伏まで続きました。これにより、台湾は中国の管理下に置かれることとなりました。第二次世界大戦の余波の中で、中華民国によって解放された地域と共産主義者によって解放された地域との間で内戦が再開されました。1949年、中華民国は共産主義者の前進を避けるため、首都を台湾に移しました。"
    
    objective_non_aligned_victory_cold_war:0 "非同盟の勝利"
    objective_non_aligned_victory_cold_war_desc:0 "世界の舞台で主流派となれるのは、ヨーロッパ人や北米人だけではないことを証明してください。"
    objective_non_aligned_victory_cold_war_idle_header:0 "非同盟の[concept_super_power]になる"
    objective_non_aligned_victory_cold_war_idle_hint:0 "世界初の非ヨーロッパ・非北米の[concept_super_power]となり、東側陣営にも西側陣営にも属さない存在を目指してください。"
    objective_non_aligned_victory_cold_war_name_HND:0 "インド"
    objective_non_aligned_victory_cold_war_desc_HND:0 "1947年、イギリス領インド帝国は、大規模な人的損失と前例のない移住の中で、ヒンドゥー教徒が多数を占めるインド自治領とイスラム教徒が多数を占めるパキスタン自治領という2つの独立した自治領に分割されました。独立した国としてのインドの自己イメージにとって極めて重要だったのは、1950年に完成した憲法であり、これにより世俗的で民主的な共和国が確立されました。"
    objective_non_aligned_victory_cold_war_name_YUG:0 "ユーゴスラビア"
    objective_non_aligned_victory_cold_war_desc_YUG:0 "1941年4月6日、王国は枢軸国によって侵略されました。1943年、パルチザンの抵抗勢力によって民主連邦ユーゴスラビアが宣言されました。1944年、当時国外追放されていた国王ペーター2世は、これを正当な政府として認めました。その後、1945年11月に君主制は廃止されました。1945年に共産主義政府が樹立されると、ユーゴスラビアはユーゴスラビア連邦人民共和国と改称されました。"
    objective_non_aligned_victory_cold_war_name_IDO:0 "インドネシア"
    objective_non_aligned_victory_cold_war_desc_IDO:0 "第二次世界大戦中の日本の占領により、オランダの統治は終わり、独立運動が促進されました。1945年8月の日本の降伏から2日後、スカルノとモハマド・ハッタはインドネシア独立宣言を発しました。オランダは統治の再確立を試み、インドネシア独立革命が始まりました。この革命は、国際的な圧力に直面したオランダがインドネシアの独立を認めた1949年12月に終結しました。"
    objective_non_aligned_victory_cold_war_name_EGY:0 "エジプト"
    objective_non_aligned_victory_cold_war_desc_EGY:0 "1947年にほとんどのイギリス軍はスエズ運河地域に撤退しましたが、戦後も反イギリス的なナショナリスト感情は高まり続けました。第一次アラブ・イスラエル戦争における王国の悲惨な敗北を受けて、反君主制の感情はさらに増大しました。1950年の選挙ではナショナリスト政党であるワフド党が圧勝し、国王はモスタファ・エル＝ナハースを新たな首相として任命せざるを得ませんでした。"
    
    objective_communist_victory_cold_war:0 "共産主義の勝利"
    objective_communist_victory_cold_war_desc:0 "東側陣営の勝利を達成せよ。世界中に共産主義を広め、資本主義を永遠に粉砕するのだ。"
    objective_communist_victory_cold_war_idle_header:0 "冷戦に勝利する"
    objective_communist_victory_cold_war_idle_hint:0 "すべての民主的な[concept_super_power]を排除し、唯一の共産主義的な[concept_super_power]として君臨せよ！"
    objective_communist_victory_cold_war_name_SOV:0 "ソ連"
    objective_communist_victory_cold_war_desc_SOV:0 "戦後の直後、ソ連は厳格な中央集権的支配を維持しつつ、経済を再建・拡大させました。ユーゴスラビアと後のアルバニアを除く東欧のほとんどの国々に対して実効支配を確立し、衛星国へと変えたのです。ソ連の戦時中の同盟国であるイギリスとアメリカはその野心を恐れ、敵対することとなりました。その後の冷戦において、両陣営は代理戦争を通じて間接的に衝突しました。"
    objective_communist_victory_cold_war_name_PRC:0 "中華人民共和国"
    objective_communist_victory_cold_war_desc_PRC:0 "中国内戦を経て、台湾へ逃亡した蒋介石将軍率いる国民党軍に対し、毛沢東の共産主義勢力が勝利しました。これを受け、毛沢東は1949年10月1日に中華人民共和国（PRC）の建国を宣言しました。毛沢東の統治下で、中国は伝統的な農民社会から社会主義的な変革を遂げ、計画経済の下で重工業へと傾斜していきました。"
    
