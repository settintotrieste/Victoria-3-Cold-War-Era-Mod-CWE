    military_cooperation_agreement:0 "軍事基地"
    military_cooperation_agreement_pact_desc:0 "[SCOPE.GetRootScope.GetDiplomaticPact.GetFirstCountry.GetName]は[SCOPE.GetRootScope.GetDiplomaticPact.GetSecondCountry.GetName]に軍事基地を置いています。\n\nこれにより、[SCOPE.GetRootScope.GetDiplomaticPact.GetSecondCountry.GetName]が[SCOPE.GetRootScope.GetDiplomaticPact.GetFirstCountry.GetName]との間に[concept_protectorate] [concept_diplomatic_pact]（存在する場合）を破棄することが妨げられるとともに、[SCOPE.GetRootScope.GetDiplomaticPact.GetFirstCountry.GetName]は[SCOPE.GetRootScope.GetDiplomaticPact.GetSecondCountry.GetName]に隣接するいかなる国に対しても、[SCOPE.GetRootScope.GetDiplomaticPact.GetFirstCountry.GetName]による戦略爆撃作戦への防御能力を低下させることができます。"
