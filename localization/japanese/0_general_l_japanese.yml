    concept_corruption:0 "政府の汚職"
    concept_corruption_desc:0 "汚職とは、公務員による不誠実または詐欺的な行為を指し、通常は賄賂の受け取りや、私的利用を目的とした公金の流用によって行われます。このModでは、[concept_government] [Concept('concept_building', '$concept_buildings$')]が$illegal_services$を消費するように表現されており、それによって官僚制度がより非効率になり、公金が民間部門へ流出する効果をもたらします。"
