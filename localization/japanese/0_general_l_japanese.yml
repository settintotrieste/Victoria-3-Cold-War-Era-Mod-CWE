    concept_dominion_desc:0 "[Concept('concept_recognized_power','$concept_recognized_powers$')]は、より弱い[concept_country]を自らの$concept_dominion$（[concept_subject]）に変えることができます。$concept_dominion$とは、独自の[Concept('concept_diplomatic_play','$concept_diplomatic_plays$')]を開始することができ、かつ[Concept('concept_overlord','$concept_overlord_possessive$')]の[Concept('concept_war','$concept_wars$')]への参加を強制される、より自律的な[concept_subject_type]のことです。彼らは毎週、[concept_treasury]の収入の#v 10％#!を$concept_overlord$に支払わなければなりません。"
    
    concept_personal_union_desc:0 "[SelectLocalization(GetPlayer.IsValid,'concept_personal_union_desc_added','Monarchy')][concept_law]を持つ2つの[Concept('concept_country', '$concept_countries$')]は、$concept_personal_union$([concept_subject])として結合される場合があります。これは、両方の$concept_countries$において[Concept('concept_overlord','$concept_overlord_possessive$')][concept_ruler]が[concept_head_of_state]となる[concept_subject_type]です。従属国は独自の[Concept('concept_diplomatic_play','$concept_diplomatic_plays$')]を開始することができ、また$concept_overlord$の[Concept('concept_war','$concept_wars$')]への加入を強制されることもあります。$concept_overlord$が$law_monarchy$を廃止すると[concept_diplomatic_pact]は解消されます。彼らは毎週、[concept_treasury]収入の#v 1%#!を$concept_overlord$に支払わなければなりません。\n\n同君連合は、常に独自の[concept_market]を管理しています。"
    
