    military_cooperation_agreement_proposal_notification_desc:3 "[INITIATOR_COUNTRY.GetName]は[TARGET_COUNTRY.GetName]に軍事基地を設置しました。"
    military_cooperation_agreement_proposal_notification_effects_desc:0 "[INITIATOR_COUNTRY.GetName]は軍事顧問を派遣し、遠征軍を駐留させるために[TARGET_COUNTRY.GetName]の土地を租借します。\n\nこれにより、もし存在する場合、[TARGET_COUNTRY.GetName]が[INITIATOR_COUNTRY.GetName]との$subject_type_protectorate$関係を解消することを防ぎ、さらに[INITIATOR_COUNTRY.GetName]は、[TARGET_COUNTRY.GetName]の隣国が[INITIATOR_COUNTRY.GetName]による戦略爆撃キャンペーンに対して防衛する能力を低下させることができます。"
