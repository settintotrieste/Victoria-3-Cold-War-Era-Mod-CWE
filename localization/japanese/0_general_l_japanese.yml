    concept_fervor_desc:1 "$concept_fervor$は、[concept_culture]の国民精神の指標です。$concept_culture$の[Concept('concept_pop', '$concept_pops$')]で$concept_fervor$が高い場合、[Concept('concept_assimilation','$concept_assimilate$')]がより遅くなり、征服された際に[Concept('concept_radical','$concept_radicals$')]がより多く形成され、[concept_liberty_desire]が増加し、[Concept('concept_cultural_movement', '$concept_cultural_movements$')]に加入する可能性が高くなります。\n\n#title 以下の条件で#b 増加#! $concept_fervor$：#! #indent_newline:3 \n・独立した[concept_country]の[Concept('concept_primary_cultures','$concept_primary_culture$')]であり、#tooltippable;tooltip:[GetPlayer.GetTooltipTag],fervor_effects_from_citizenship_laws_tt が適用可能#! [SelectLocalization(GetPlayer.IsValid,'CITIZENSHIP_LINK','lawgroup_citizenship')] [concept_law]\n・[concept_war]におけるこの[concept_culture]の[concept_casualties]の数\n・平均[concept_literacy]が高い\n・この$concept_culture$の[GetPopType('academics').GetName] $concept_pops$の数\n・[GetTechnology('tech_politics_2').GetName]または[GetTechnology('tech_politics_3').GetName] [Concept('concept_technology', '$concept_technologies$')]を持つ$concept_countries$に居住しているこの文化の$concept_pops$\n・適用可能な[GetInstitutionType('institution_schools').GetName] [concept_institution]を持つ$concept_country$の$concept_primary_culture$であること\n・独立した$concept_countries$として解放された他の$concept_culture$\n・[concept_national_awakening]を経験している#!\n\n#title 以下の条件で#b 減少#! $concept_fervor$：#! #indent_newline:3 \n・[GetLawType('law_multicultural').GetName] $concept_law$を持つ$concept_country$の$concept_primary_culture$であること\n・平均[concept_acceptance]が高い#!"
    
