    military_cooperation_agreement_desc:3 "これによって[concept_diplomatic_pact]は、先制国が標的国に軍事力を駐留させることが可能になり、先制国に[concept_military_access]を与えます。\n\n外国軍の存在は、標的国が、軍を標的国に駐留させている[concept_overlord]との[concept_protectorate]関係を解消することを防ぎます。\n\nまた、標的国を軍事基地として利用することで、標的国の隣国が、先制国による#y 戦略爆撃キャンペーン#!に対して受ける防御力も低下します。"
