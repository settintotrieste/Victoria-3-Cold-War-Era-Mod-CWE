    concept_protectorate:0 "属国"
    concept_protectorate_desc:2 "属国とは、ある国の影響下に入った主権国家であり、その事実上の[concept_overlord]です。$concept_protectorate$は、独自の[Concept('concept_diplomatic_play','$concept_diplomatic_plays$')]を開始することができ、$concept_overlord$のすべての[Concept('concept_war','$concept_wars$')]に加入する義務もありません。[concept_country]は、[concept_overlord]の$concept_protectorate$になることを自ら要請することも、また要請を受けることもありますが、提案を拒否したとしても[concept_war]の恐れはありません。\n\n属国は、常に自国の[concept_market]を統制しています。"
    
    concept_literacy:0 "高等教育"
    concept_literate:0 "高等教育を受けた"
    concept_literacy_desc:2 "[concept_pop]において、高等教育の資格を取得した個人の割合または実数です。特定の[Concept('concept_profession', '$concept_professions$')]は他のものよりも多くの$concept_literacy$を要求するため、$concept_literacy$が十分に高くない限り、他の$concept_professions$における$concept_pops$の[concept_pop_qualifications]を制限します。時間をかけて$concept_population$におけるより高い$concept_literacy$を発展させるために、[SelectLocalization(GetPlayer.IsValid,'concept_literacy_desc_added','Education')]に投資することができます。"
    concept_literacy_desc_added:0 "[GetInstitutionType('institution_schools').GetName]"

    concept_culture:0 "アイデンティティ"
    concept_cultures:1 "アイデンティティ"
    concept_culture_possessive:1 "アイデンティティの"
    concept_culture_desc:2 "すべての[Concept('concept_pop', '$concept_pops$')]は$concept_culture$を持っており、これは[concept_assimilation]を通じてのみ変化します。彼らの$concept_culture$によって、どの[Concept('concept_state_region','$concept_state_regions$')]を自身の[Concept('concept_homeland','$concept_homelands$')]と見なすか、また[concept_country]において[Concept('concept_discrimination','$concept_discriminated_against$')]であるかどうかが決まります。"

    concept_accepted_culture:0 "受容アイデンティティ"
    concept_accepted_cultures:0 "受容アイデンティティ"
    concept_accepted_culture_short:0 "受容"
    concept_accepted_culture_desc:2 "[Concept('concept_country','$concept_country_possessive$')]の$concept_accepted_cultures$は、その[concept_primary_cultures]と、$concept_country$の現在の[SelectLocalization(GetPlayer.IsValid, 'concept_accepted_culture_desc_added','Citizenship')][concept_law]により$concept_accepted_culture_short$と見なされるその他の[Concept('concept_culture','$concept_cultures$')]で構成されます。"
    concept_accepted_culture_desc_added:0 "[GetLawType('law_national_supremacy').GetGroup.GetName]"

    concept_primary_cultures:0 "主要アイデンティティ"
    concept_primary_culture:0 "主要アイデンティティ"

    concept_cultural_trait:0 "文化特性"
    concept_cultural_traits:1 "文化特性"
    concept_cultural_trait_desc:2 "[concept_culture]の、主要な言語や世界における起源といった側面のことです。[Concept('concept_country','$concept_country_possessive$')] [Concept('concept_primary_cultures','$concept_primary_culture$')]の$concept_cultural_traits$と[concept_pop]の$concept_culture$との類似性に、$concept_country$の現在の[GetLawType('law_national_supremacy').GetGroup.GetName] [concept_law]を組み合わせることで、$concept_pop$が[Concept('concept_discrimination','$concept_discriminated_against$')]かどうかが決定されます。"

    concept_cultural_heritage_trait:0 "系統の文化特性"
    concept_cultural_heritage_traits:0 "系統の文化特性"
    concept_cultural_heritage_trait_desc:2 "[concept_culture]が起源となった世界の一般的な地域を指定する[concept_cultural_trait]の一種です。特定の[SelectLocalization(GetPlayer.IsValid,'concept_accepted_culture_desc_added','Citizenship')] [Concept('concept_law','$concept_laws$')]は、[concept_pop]を[Concept('concept_discrimination','$concept_discriminated_against$')]にすべきかどうかを判断する際、他の$concept_cultural_traits$よりも$concept_cultural_heritage_traits$を重視します。"
    concept_cultural_heritage_trait_desc_added:0 "[GetLawType('law_national_supremacy').GetGroup.GetName]"
    
