    terminate_treaty_port_lease_2.tt:0 "[SCOPE.sState('treaty_port_lease_state_3').GetPortHubName]の[SCOPE.sCountry('treaty_port_lease_tenant').GetAdjective]リースを終了する（[SCOPE.sCountry('treaty_port_lease_state_subject').GetName]）"
    treaty_port_lease_expired.tt:0 "[concept_treaty] [concept_binding_period]が経過しました"
    special_administrative_region_2.tt:0 "[SCOPE.sState('treaty_port_lease_state').GetPortHubName]に[SCOPE.sCountry('treaty_port_lease_landlord').GetAdjective] [concept_special_administrative_region]を作成する"
    terminate_treaty_port_lease_transfer_subject.tt:0 "[SCOPE.sCountry('treaty_port_lease_state_subject').GetName]を[SCOPE.sCountry('treaty_port_lease_landlord').GetName]に移管する"
    
    terminate_treaty_port.tt:0 "[SCOPE.sState('treaty_port_lease_state_2').GetPortHubName]の[SCOPE.sCountry('treaty_port_lease_tenant').GetName]を[SCOPE.sCountry('treaty_port_lease_landlord').GetName]へ返還するよう要求する"
    terminate_treaty_port_2.tt:0 "[SCOPE.sCountry('treaty_port_lease_tenant').GetName]が[SCOPE.sState('treaty_port_lease_state_3').GetPortHubName]([SCOPE.sCountry('treaty_port_lease_state_subject').GetName])を[SCOPE.sCountry('treaty_port_lease_landlord').GetName]に返還することを要求"
    treaty_port_lease_create.tt:0 "[SCOPE.sCountry('treaty_port_lease_landlord').GetName]は、[SCOPE.sState('treaty_port_lease_state_2').GetPortHubName]を[SCOPE.sCountry('treaty_port_lease_tenant').GetName]への最低#y 25年間#!の[concept_treaty_port]として貸し付ける"
    
    treaty_port_terminated.t:0 "[SCOPE.sState('treaty_port_lease_state').GetPortHubName]に対する[SCOPE.sCountry('treaty_port_lease_landlord').GetAdjective]の最後通牒"
    treaty_port_terminated.d:0 "[SCOPE.sCountry('treaty_port_lease_landlord').GetName]は、[SCOPE.sState('treaty_port_lease_state').GetPortHubName]を自国の[concept_market]から一方的に遮断し、[SCOPE.sCountry('treaty_port_lease_tenant').GetName]に対して[concept_treaty_port]を返還するよう要求しました。"
    treaty_port_terminated.f:0 "#y $treaty_port$#! [concept_article]を伴う[concept_treaty]が、[concept_treaty_port]を付与する[concept_country]によって終了されたため、このイベントが発生しました。"
    treaty_port_terminated.1:0 "[SCOPE.sState('treaty_port_lease_state').GetPortHubName]を無条件で返還する"
    treaty_port_terminated.2:0 "返還した上で、[SCOPE.sState('treaty_port_lease_state').GetPortHubName]を租借することを提案する"
    treaty_port_terminated.3:0 "[SCOPE.sState('treaty_port_lease_state').GetPortHubName]の返還を拒否する"
    
    treaty_port_terminated_lease.t:0 "[SCOPE.sCountry('treaty_port_lease_tenant').GetAdjective]による[SCOPE.sState('treaty_port_lease_state').GetPortHubName]の租借に関する対案"
    treaty_port_terminated_lease.d:0 "[SCOPE.sState('treaty_port_lease_state').GetPortHubName]を直ちに[SCOPE.sCountry('treaty_port_lease_landlord').GetName]へ割譲するのではなく、[SCOPE.sCountry('treaty_port_lease_tenant').GetName]は、[SCOPE.sCountry('treaty_port_lease_landlord').GetName]がその領土を数年間にわたって[SCOPE.sCountry('treaty_port_lease_tenant').GetName]へ貸し戻すことを条件として、[SCOPE.sState('treaty_port_lease_state').GetPortHubName]の主権を[SCOPE.sCountry('treaty_port_lease_landlord').GetName]へ移転することを提案しました。"
    treaty_port_terminated_lease.f:0 "このイベントは、[concept_country]が[concept_treaty_port]を付与したことで、#y $treaty_port$#! [concept_article]を含む[concept_treaty]が終了したために発生しました。"
    treaty_port_terminated_lease.1:0 "[SCOPE.sCountry('treaty_port_lease_tenant').GetAdjective]の提案を受け入れる"
    treaty_port_terminated_lease.2:0 "[SCOPE.sState('treaty_port_lease_state').GetPortHubName]を武力で奪還する"
    
    treaty_port_terminated_war.t:0 "[SCOPE.sCountry('treaty_port_lease_tenant').GetName]が[SCOPE.sState('treaty_port_lease_state').GetPortHubName]の返還を拒否"
    treaty_port_terminated_war.d:0 "[SCOPE.sCountry('treaty_port_lease_tenant').GetName]は、[SCOPE.sState('treaty_port_lease_state').GetPortHubName]を返還せよという[SCOPE.sCountry('treaty_port_lease_landlord').GetAdjective]の最後通牒を拒否しました。これは、武力によってのみ[concept_treaty_port]を奪還できることを意味しています。"
    treaty_port_terminated_war.f:0 "このイベントは、#y $treaty_port_leased$#! [concept_article]を含む[concept_treaty]から撤退が行われたために発生しました。"
    treaty_port_terminated_war.1:0 "武力によって[SCOPE.sState('treaty_port_lease_state').GetPortHubName]を奪還する"
    treaty_port_terminated_war.2:0 "[SCOPE.sState('treaty_port_lease_state').GetPortHubName]に対する権利を放棄する"
    
    treaty_port_terminated_SAR.t:0 "[SCOPE.sCountry('treaty_port_lease_tenant').GetAdjective]の[SCOPE.sState('treaty_port_lease_state').GetPortHubName]に対する対案"
    treaty_port_terminated_SAR.d:0 "[SCOPE.sCountry('treaty_port_lease_tenant').GetName]は、[SCOPE.sState('treaty_port_lease_state').GetPortHubName]が[SCOPE.sCountry('treaty_port_lease_landlord').GetName]の[concept_special_administrative_region]にならない限り、その返還を拒否しました。"
    treaty_port_terminated_SAR.f:0 "[concept_treaty_port]の提供者が、#y $treaty_port$#! [concept_article]を含む[concept_treaty]を撤回したため、このイベントが発生しました。"
    
    treaty_port_propose_SAR.tt:0 "[SCOPE.sCountry('treaty_port_lease_tenant').GetName]は、[SCOPE.sState('treaty_port_lease_state_2').GetPortHubName]が[SCOPE.sCountry('treaty_port_lease_landlord').GetName]の[concept_special_administrative_region]になることを条件に、[SCOPE.sCountry('treaty_port_lease_landlord').GetName]へ[SCOPE.sState('treaty_port_lease_state_2').GetPortHubName]を返還することを提案しています。"
