 tech_military_navy_doctrine_1_desc:0 "Die Signalisierung von Marineflaggen umfasst verschiedene Formen der Flaggensignalisierung, wie z. B. Semaphore oder Flaggenhisser, die von verschiedenen Marinen verwendet werden. zu unterscheiden von der Signalisierung von Seeflaggen durch Handelsschiffe oder andere Nicht-Marineschiffe oder von Flaggen, die der Identifizierung dienen."  #NT!
 tech_military_navy_doctrine_2_desc:0 "Stabsschulen bilden Militäroffiziere in den administrativen, militärischen und politischen Aspekten ihres Berufs aus."  #NT!
 tech_military_navy_doctrine_3_desc:0 "Eine Flugzeugträger-Kampfgruppe ist eine Marineflotte, die aus einem Flugzeugträger-Großkampfschiff und seiner großen Anzahl von Begleitpersonen besteht, die zusammen die Gruppe definieren."  #NT!
 tech_military_navy_doctrine_4_desc:0 "Im Seekrieg ist eine „bestehende Flotte“ eine Seestreitmacht, die einen kontrollierenden Einfluss ausübt, ohne jemals den Hafen zu verlassen."  #NT!
 tech_military_navy_doctrine_5_desc:0 "Naval Gunfire Support (NGFS), auch bekannt als Naval Surface Fire Support (NSFS) oder Shore Bombardment, ist der Einsatz von Marineartillerie zur Feuerunterstützung für amphibische Angriffskräfte und andere Truppen, die in ihrer Reichweite operieren."  #NT!
 tech_military_navy_doctrine_6_desc:0 "Eine Schnelleinsatzmarine ist eine Flotte von Schiffen, die stets für den sofortigen Einsatz bereitgehalten werden."  #NT!
 tech_military_navy_doctrine_7_desc:0 "Seenavigation ist die Kunst und Wissenschaft, ein Schiff effizient und verantwortungsbewusst von einem Startpunkt (Segeln) zu einem Ziel zu steuern."  #NT!
 tech_military_navy_doctrine_8_desc:0 "Eine Flugzeugträger-Kampfgruppe ist eine Marineflotte, die aus einem Flugzeugträger-Großkampfschiff und seiner großen Anzahl von Begleitpersonen besteht, die zusammen die Gruppe definieren."  #NT!
 tech_military_navy_doctrine_9_desc:0 "Beim globalen Flottenmanagement geht es um die Überwachung einer Flotte, die in mehreren Ländern tätig ist."  #NT!
 tech_military_navy_doctrine_10_desc:0 "KI wird zur Steuerung von Kriegsschiffen eingesetzt."  #NT!
  
