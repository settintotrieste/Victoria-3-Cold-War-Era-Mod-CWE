 tech_military_support_1_desc:0 "Eine taktische Einheit, die normalerweise aus zwei oder mehr Divisionen sowie Hilfswaffen und -diensten besteht."  #NT!
 tech_military_support_2_desc:0 "Ein Kriegsspiel ist ein Strategiespiel, bei dem zwei oder mehr Spieler in der Simulation eines bewaffneten Konflikts gegnerische Streitkräfte befehligen. Wargaming kann zur Erholung gespielt werden, um Militäroffiziere in der Kunst des strategischen Denkens zu schulen oder um die Natur potenzieller Konflikte zu untersuchen."  #NT!
 tech_military_support_3_desc:0 "Unter Militärlogistik versteht man die Disziplin der Planung und Durchführung der Bewegung, Versorgung und Instandhaltung militärischer Streitkräfte."  #NT!
 tech_military_support_4_desc:0 "Der Militärgeheimdienst ist eine militärische Disziplin, die Ansätze zur Informationssammlung und -analyse nutzt, um Befehlshabern Orientierung und Orientierung zu geben und sie bei ihren Entscheidungen zu unterstützen."  #NT!
 tech_military_support_5_desc:0 "In der militärischen Organisation ist die Befehlseinheit das Prinzip, dass alle untergeordneten Mitglieder einer Struktur einem einzigen Befehlshaber gegenüber verantwortlich sein sollten."  #NT!
 tech_military_support_6_desc:0 "Militärische Fachrichtungen sind die gewählten oder zugewiesenen Berufs- oder Laufbahnspezialitäten in den Streitkräften, die von den einzelnen Personen den Erwerb von Qualifikationen sowie ein gewisses Maß an Kenntnissen und Fertigkeiten im Handwerk verlangen, um Aufgaben und Aufträge in einem akzeptablen Maß an Vollständigkeit oder Qualität auszuführen."  #NT!
 tech_military_support_7_desc:0 "ISR ist die koordinierte und integrierte Erfassung, Verarbeitung und Bereitstellung zeitnaher, genauer, relevanter, kohärenter und gesicherter Informationen und Informationen zur Unterstützung der Durchführung von Aktivitäten des Kommandanten."  #NT!
 tech_military_support_8_desc:0 "KI ist in ein militärisches Logistiksystem integriert."  #NT!
 tech_military_support_9_desc:0 "Selbstfahrende Artillerie (auch Lokomotivartillerie genannt) ist eine Artillerie, die mit einem eigenen Antriebssystem ausgestattet ist, um sich in Richtung ihrer Schussposition zu bewegen."  #NT!
 tech_military_support_10_desc:0 "Eine Orbitalkanone ist ein ferngesteuertes kinetisches Bombardierungssystem."  #NT!
  
