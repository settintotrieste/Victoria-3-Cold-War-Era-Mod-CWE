 tech_military_ground_forces_1_desc:0 "Beim Bolt-Action handelt es sich um eine Art manueller Schusswaffenbetätigung, bei der der Bolzen direkt über einen Kammergriff betätigt wird, der sich meist auf der rechten Seite der Schusswaffe befindet."  #NT!
 tech_military_ground_forces_2_desc:0 "Artillerie sind Fernkampfwaffen, die Munition abfeuern, die weit über die Reichweite und Kraft von Infanteriefeuerwaffen hinausgeht."  #NT!
 tech_military_ground_forces_3_desc:0 "Panzer sind alle schwer bewaffneten und gepanzerten Kampffahrzeuge, die sich auf zwei endlosen Metallketten, sogenannten Ketten, bewegen. Panzer sind im Wesentlichen Waffenplattformen, die die in ihnen montierten Waffen durch ihre Mobilität im Gelände und den Schutz, den sie ihren Besatzungen bieten, effektiver machen."  #NT!
 tech_military_ground_forces_4_desc:0 "Ein gepanzerter Personentransporter ist eine weit gefasste Art gepanzerter Militärfahrzeuge, die für den Transport von Personal und Ausrüstung in Kampfgebieten konzipiert sind."  #NT!
 tech_military_ground_forces_5_desc:0 "Ein Kampfpanzer, auch Kampfpanzer oder Universalpanzer genannt, ist ein Panzer, der in vielen modernen Armeen die Rolle eines panzergeschützten Direktfeuer- und Manövrierpanzers übernimmt."  #NT!
 tech_military_ground_forces_6_desc:0 "Reaktive Panzerung ist eine Art Fahrzeugpanzerung, die zum Schutz von Fahrzeugen, insbesondere modernen Panzern, vor Hohlladungen und gehärteten Penetratoren mit kinetischer Energie verwendet wird."  #NT!
 tech_military_ground_forces_7_desc:0 "Leichte Waffen sind im Großen und Ganzen tragbare Infanteriewaffen, bei denen es sich entweder um von der Besatzung bediente kinetische Schusswaffen, um Brandsätze oder um Sprengmunition handelt."  #NT!
 tech_military_ground_forces_8_desc:0 "Letale autonome Waffensysteme (LAWS) sind eine spezielle Klasse von Waffensystemen, die Sensorsysteme und Computeralgorithmen verwenden, um ein Ziel unabhängig zu identifizieren und ein integriertes Waffensystem einsetzen, um das Ziel ohne manuelle menschliche Kontrolle des Systems anzugreifen und zu zerstören."  #NT!
 tech_military_ground_forces_9_desc:0 "Ein unbemanntes Bodenfahrzeug (Unmanned Ground Vehicle, UGV) ist ein Fahrzeug, das im Kontakt mit dem Boden ohne menschliche Anwesenheit an Bord operiert."  #NT!
 tech_military_ground_forces_10_desc:0 "Soldaten werden mit Implantaten ausgestattet, um sie im Kampf effektiver zu machen."  #NT!
  
