 tech_electronics_1_desc:0 "Einfache Schaltkreise oder einfache Schaltkreise sind Schaltkreise, die den Stromfluss ermöglichen und häufig in einfachen elektrischen Haushaltsgeräten verwendet werden."  #NT!
 tech_electronics_2_desc:0 "Die Computertheorie, auch Berechnungstheorie genannt, befasst sich mit der effizienten Berechnung, den Modellen von Berechnungsprozessen und ihren Grenzen."  #NT!
 tech_electronics_3_desc:0 "Analogcomputer sind physikalische Maschinen, die physikalische Eigenschaften wie Spannung, Druck oder mechanische Bewegung nutzen, um Probleme zu lösen."  #NT!
 tech_electronics_4_desc:0 "Ein integrierter Schaltkreis (IC), auch Mikrochip oder Chip genannt, ist ein kleines elektronisches Gerät, das viele miteinander verbundene Komponenten wie Transistoren, Widerstände und Kondensatoren auf einem einzigen Halbleiterchip enthält."  #NT!
 tech_electronics_5_desc:0 "Ein programmierbarer Computer ist ein Gerät, das einer Reihe von Anweisungen oder einem Code folgen kann, um Aufgaben auszuführen und sein Verhalten zu steuern."  #NT!
 tech_electronics_6_desc:0 "Ein Betriebssystem (OS) ist eine Software, die die Hardwareressourcen eines Computers verwaltet und gemeinsame Dienste für seine Programme bereitstellt. Es führt Aufgaben wie Speicherverwaltung, Dateiverwaltung und Benutzeroberflächenoperationen aus."  #NT!
 tech_electronics_7_desc:0 "Ein neuronales Netzwerk ist ein Algorithmus für maschinelles Lernen, der miteinander verbundene Knoten oder Neuronen verwendet, um Daten zu verarbeiten und komplexe Probleme zu lösen. Neuronale Netze sind von der Struktur und Funktion des menschlichen Gehirns inspiriert und stellen eine Art Deep Learning dar, einen maschinellen Lernprozess."  #NT!
 tech_electronics_8_desc:0 "Generative KI oder generative künstliche Intelligenz ist eine Art von KI, die neue Inhalte wie Texte, Bilder, Musik, Audio und Videos erstellen kann."  #NT!
 tech_electronics_9_desc:0 "Quantencomputing ist ein Bereich der Informatik, der die Quantenmechanik nutzt, um komplexe Probleme schneller als klassische Computer zu lösen. Quantencomputer nutzen spezielle Hardware, um die einzigartigen Verhaltensweisen der Quantenphysik wie Überlagerung, Verschränkung und Quanteninterferenz zu nutzen."  #NT!
 tech_electronics_10_desc:0 "Biologisches Rechnen, auch Biocomputing genannt, ist eine Art des Rechnens, bei dem biologische Organismen oder Prozesse zum Speichern, Verarbeiten und Übertragen von Informationen genutzt werden. Biologische Computer nutzen anstelle elektrischer Signale chemische Eingaben und biologisch abgeleitete Moleküle wie DNA und Proteine."  #NT!
  
