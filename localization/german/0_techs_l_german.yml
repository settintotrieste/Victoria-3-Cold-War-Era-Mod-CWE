 tech_chemicals_10:0 "Quantenchemie"  #NT!
  
 tech_chemicals_1_desc:0 "Die Chemie ist ein Zweig der Naturwissenschaften, der sich hauptsächlich mit den Eigenschaften von Stoffen, den Veränderungen, denen sie unterliegen, und den Naturgesetzen, die diese Veränderungen beschreiben, befasst."  #NT!
 tech_chemicals_2_desc:0 "Synthetische Materialien werden durch chemische Veränderung der Ausgangsstoffe hergestellt, um ein Material mit unterschiedlichen Eigenschaften zu erzeugen. Einige Beispiele für synthetische Materialien sind Kunststoffe, Medikamente und neue Kraftstoffe. Ein synthetischer Stoff kann chemisch mit einem natürlich vorkommenden Stoff identisch sein oder sich davon unterscheiden."  #NT!
 tech_chemicals_3_desc:0 "Polymerisation ist in der Polymerchemie der Prozess, bei dem Monomermoleküle in einer chemischen Reaktion miteinander reagieren, um dreidimensionale Netzwerke oder Polymerketten zu bilden."  #NT!
 tech_chemicals_4_desc:0 "Unter Radiochemie versteht man den Wissenschaftszweig, der sich mit der Untersuchung chemischer Umwandlungen radioaktiver Stoffe befasst."  #NT!
 tech_chemicals_5_desc:0 "Biochemie ist das Studium der Chemikalien und Chemie lebender Organismen. Biochemiker untersuchen Biomoleküle (wie Proteine, RNA, DNA, Zucker und Lipide), ihre Anwendungen und Wechselwirkungen im Körper sowie biochemische und metabolische Prozesse."  #NT!
 tech_chemicals_6_desc:0 "Die Computerchemie ist ein Zweig der Chemie, der Computersimulationen nutzt, um bei der Lösung chemischer Probleme zu helfen."  #NT!
 tech_chemicals_7_desc:0 "Biologisch abbaubare Materialien sind Substanzen, die auf natürliche Weise von Mikroorganismen wie Bakterien und Pilzen in einfachere, harmlose Verbindungen wie Kohlendioxid und Wasser zerlegt werden können."  #NT!
 tech_chemicals_8_desc:0 "Unter Nanotechnologie versteht man den Zweig der Wissenschaft und Technik, der sich dem Entwurf, der Herstellung und der Nutzung von Strukturen, Geräten und Systemen durch die Manipulation von Atomen und Molekülen im Nanomaßstab widmet, d. h. mit einer oder mehreren Abmessungen in der Größenordnung von 100 Nanometern (100 Millionstel Millimeter) oder weniger."  #NT!
 tech_chemicals_9_desc:0 "Die medizinische Wissenschaft, auch biomedizinische Wissenschaft genannt, ist die Untersuchung der Funktionsweise des Körpers und der Reaktion auf Krankheiten und Behandlungen mit dem Ziel, die allgemeine Gesundheit zu verbessern und neue Heilmittel und Diagnostika zu entdecken."  #NT!
 tech_chemicals_10_desc:0 "Die Quantenchemie, auch molekulare Quantenmechanik genannt, ist ein Zweig der physikalischen Chemie, der sich auf die Anwendung der Quantenmechanik auf chemische Systeme konzentriert, insbesondere auf die quantenmechanische Berechnung elektronischer Beiträge zu physikalischen und chemischen Eigenschaften von Molekülen, Materialien und Lösungen auf atomarer Ebene."  #NT!
  
