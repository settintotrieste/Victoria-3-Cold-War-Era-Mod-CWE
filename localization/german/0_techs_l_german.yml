 tech_military_airforce_6:0 "Tarnkappen-Kampfflugzeuge"  #NT!
 tech_military_airforce_7:0 "Moderne Anti-SAM-Abwehrmaßnahmen"  #NT!
 tech_military_airforce_8:0 "KI-gesteuerte Kampfflugzeuge"  #NT!
