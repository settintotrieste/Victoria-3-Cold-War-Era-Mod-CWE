 tech_mining_1_desc:0 "Minen sind ein Loch oder ein Lochsystem im Boden, aus dem Substanzen wie Kohle, Metall und Salz entfernt werden"  #NT!
 tech_mining_2_desc:0 "Bergbaubagger werden zum Abbau von Rohstoffen eingesetzt und eignen sich insbesondere für den Tagebau. Ausgestattet mit leistungsstarken Hebearmen und riesigen Schaufeln mit großem Fassungsvermögen sind diese Maschinen in der Lage, große Materialmengen auszuheben."  #NT!
 tech_mining_3_desc:0 "Unter Prospektion versteht man die Suche nach Gold, Öl oder anderen wertvollen Substanzen auf oder unter der Erdoberfläche."  #NT!
 tech_mining_4_desc:0 "Minensicherheit bezieht sich auf das Management von Abläufen und Ereignissen in der Bergbauindustrie zum Schutz der Bergleute durch Minimierung von Gefahren, Risiken und Unfällen."  #NT!
 tech_mining_5_desc:0 "Die Mineralverarbeitung ist eine Form der extraktiven Metallurgie, die wertvolle Mineralien aus dem Erz in ein konzentriertes, marktfähiges Produkt trennt."  #NT!
 tech_mining_6_desc:0 "Ein Tunnel, der sich durch fortschrittliche oder einzigartige Strukturelemente oder Funktionssysteme auszeichnet."  #NT!
 tech_mining_7_desc:0 "Schwierige Arbeitsbedingungen, abgelegene Minenstandorte, die Verfügbarkeit (oder Knappheit) von Arbeitskräften sind nur einige der Anreize für den Einsatz von KI in der Bergbauindustrie."  #NT!
 tech_mining_8_desc:0 "Beim High Performance Mining geht es darum, die Produktivität und Effizienz von Bergbauanlagen zu verbessern und neue Technologien in den Bergbau zu integrieren."  #NT!
 tech_mining_9_desc:0 "Unter Smart Mining versteht man die Sammlung von Prozessen und Technologien, die die Produktivität und Sicherheit von Bergbaubetrieben steigern können."  #NT!
 tech_mining_10_desc:0 "Superminen sind Minen, die tief in der Erdkruste existieren."  #NT!
  
