 tech_military_naval_forces_4:0 "Langstrecken-U-Boote"  #NT!
 tech_military_naval_forces_5:0 "Lenkwaffenkreuzer"  #NT!
 tech_military_naval_forces_6:0 "Moderne Flugzeugträger"  #NT!
 tech_military_naval_forces_7:0 "Moderne Schlachtschiffe"  #NT!
 tech_military_naval_forces_8:0 "Modulare Kriegsschiffe"  #NT!
 tech_military_naval_forces_9:0 "Autonome Kriegsschiffe"  #NT!
 tech_military_naval_forces_10:0 "Schwimmende Festungen"  #NT!
  
 tech_military_naval_forces_1_desc:0 "Die Dreadnought war zu Beginn des 20. Jahrhunderts der vorherrschende Schlachtschifftyp."  #NT!
 tech_military_naval_forces_2_desc:0 "Der Schlachtkreuzer war eine Art Großkampfschiff der ersten Hälfte des 20. Jahrhunderts. Diese ähnelten hinsichtlich Verdrängung, Bewaffnung und Kosten den Schlachtschiffen, unterschieden sich jedoch in Form und Ausgewogenheit ihrer Eigenschaften."  #NT!
 tech_military_naval_forces_3_desc:0 "Ein Flugzeugträger ist ein Kriegsschiff, das als Seeflugplatz dient und mit einem Flugdeck über die gesamte Länge sowie Einrichtungen zum Transport, Bewaffnung, Einsatz und Bergung von Flugzeugen ausgestattet ist."  #NT!
 tech_military_naval_forces_4_desc:0 "Ein U-Boot (oder U-Boot) ist ein Wasserfahrzeug, das unabhängig unter Wasser operieren kann."  #NT!
 tech_military_naval_forces_5_desc:0 "Lenkwaffenkreuzer sind Marinekreuzer, die mit Langstreckenraketen und Raketenwerfern ausgestattet sind."  #NT!
 tech_military_naval_forces_6_desc:0 "Ein Flugzeugträger ist ein Kriegsschiff, das als Seeflugplatz dient und mit einem Flugdeck über die gesamte Länge sowie Einrichtungen zum Transport, Bewaffnung, Einsatz und Bergung von Flugzeugen ausgestattet ist."  #NT!
 tech_military_naval_forces_7_desc:0 "Ein Schlachtschiff ist ein großes, schwer gepanzertes Kriegsschiff mit einer Hauptbatterie aus großkalibrigen Geschützen, die als Großkampfschiffe mit höchster Feuerkraft dienen sollen."  #NT!
 tech_military_naval_forces_8_desc:0 "Das Modularitätskonzept wurde entwickelt, um Kriegsschiffen die Möglichkeit zu geben, ihre Nutzlasten an die betrieblichen Anforderungen anzupassen, was zu einem qualitativen und quantitativen Anstieg des Produktionsniveaus führt."  #NT!
 tech_military_naval_forces_9_desc:0 "Ein völlig autonomes Kriegsschiff wäre in der Lage, alle Aktivitäten durchzuführen, die ein bemanntes Kriegsschiff ausführen kann, ohne alles, was mit der Führung von Menschen zu tun hat."  #NT!
 tech_military_naval_forces_10_desc:0 "Schwimmende Festungen sind riesige Meeresstützpunkte, an denen riesige Schlachtschiffe anlegen können."  #NT!
  
