     tech_manufacturing_1_desc:0 "A factory, manufacturing plant or production plant is an industrial facility, often a complex consisting of several buildings filled with machinery, where workers manufacture items or operate machines which process each item into another. 
 tech_manufacturing_2_desc:0 "Arbeitssicherheitsstandards sind Normensätze, die mit dem Ziel entwickelt wurden, das Risiko berufsbedingter Gefahren zu verringern."  #NT!
 tech_manufacturing_3_desc:0 "Eine Produktionslinie ist einfach eine Reihe von Arbeitern, Maschinen oder Geräten in einer Fabrik oder Produktionsanlage, die Arbeit von einer Arbeitsstation zur nächsten weiterleiten, bis die Herstellung des Produkts abgeschlossen ist."  #NT!
 tech_manufacturing_4_desc:0 "Austauschbare Teile sind Teile, die aus praktischen Gründen identisch sind. Sie werden nach Spezifikationen hergestellt, die sicherstellen, dass sie nahezu identisch sind, sodass sie in jede Baugruppe des gleichen Typs passen. Ein solches Teil kann ein anderes frei ersetzen, ohne dass eine individuelle Anpassung, wie z. B. Feilen, erforderlich ist."  #NT!
 tech_manufacturing_5_desc:0 "Ein Industrieroboter ist ein Robotersystem, das für die Fertigung eingesetzt wird. Industrieroboter sind automatisiert, programmierbar und in der Lage, sich auf drei oder mehr Achsen zu bewegen."  #NT!
 tech_manufacturing_6_desc:0 "Industrie 4.0, ein Synonym für intelligente Fertigung, ist die Verwirklichung der digitalen Transformation in diesem Bereich und ermöglicht Entscheidungsfindung in Echtzeit, erhöhte Produktivität, Flexibilität und Agilität, um die Art und Weise, wie Unternehmen ihre Produkte herstellen, verbessern und vertreiben, zu revolutionieren."  #NT!
 tech_manufacturing_7_desc:0 "Unter KI in der Fertigung versteht man den Einsatz von Lösungen für maschinelles Lernen (ML) und neuronalen Deep-Learning-Netzen, um Fertigungsprozesse durch verbesserte Datenanalyse und Entscheidungsfindung zu optimieren."  #NT!
 tech_manufacturing_8_desc:0 "Hochpräzisionsbearbeitung bezieht sich auf Bearbeitungsprozesse, die hochpräzise und konsistente Teile nach genauen Spezifikationen produzieren."  #NT!
 tech_manufacturing_9_desc:0 "Eine Smart Factory ist eine digitalisierte Produktionsanlage, die vernetzte Geräte, Maschinen und Produktionssysteme nutzt, um kontinuierlich Daten zu sammeln und auszutauschen."  #NT!
 tech_manufacturing_10_desc:0 "Eine vollständig autonom arbeitende Fabrik, die Tag und Nacht zuverlässig und ohne menschliches Zutun hochindividuelle Produkte in ständig wechselnden, aber kleinen Losgrößen produziert, mit hohen Taktzeiten und deutlich geringeren Stückkosten als bisher – das ist die Vision der autonomen Produktion."  #NT!
  
