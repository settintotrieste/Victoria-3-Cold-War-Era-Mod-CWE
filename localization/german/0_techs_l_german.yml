 tech_urbanization_9:0 "Die Megaregion"  #NT!
 tech_urbanization_10:0 "Die Ökumepolis"  #NT!
  
 tech_urbanization_1_desc:0 "Öffentliche Versorgungsunternehmen sollen Güter und Dienstleistungen bereitstellen, die als wesentlich erachtet werden; Wasser, Gas, Strom, Telefon, Abfallentsorgung und andere Kommunikationssysteme machen einen Großteil des öffentlichen Versorgungsmarktes aus."  #NT!
 tech_urbanization_2_desc:0 "Unter öffentlichen Verkehrsmitteln versteht man ein System von Fahrzeugen wie Bussen und Bahnen, die zu regelmäßigen Zeiten auf festen Strecken verkehren und von der Öffentlichkeit genutzt werden."  #NT!
 tech_urbanization_3_desc:0 "Hochhäuser sind mehrstöckige Gebäude, die so hoch sind, dass ein mechanisches Vertikaltransportsystem wie Aufzüge erforderlich ist."  #NT!
 tech_urbanization_4_desc:0 "Eine Satellitenstadt oder Satellitenstadt ist eine kleinere Gemeinde oder Siedlung, die Teil eines größeren Ballungsraums ist und als regionales Bevölkerungs- und Beschäftigungszentrum dient."  #NT!
 tech_urbanization_5_desc:0 "Ein Gebäude mit gemischter Nutzung ist jedes Bauwerk, das mehr als einem Zweck dient, indem es eine Kombination aus Wohn-, Gewerbe-, Einzelhandels-, Hotel-, Park-, Medizin-, Unterhaltungs- und/oder Industrienutzungen beherbergt."  #NT!
 tech_urbanization_6_desc:0 "Stadtwerke werden von einer einzigen Behörde geleitet und kontrolliert."  #NT!
 tech_urbanization_7_desc:0 "In der Landnutzungsplanung handelt es sich bei städtischen Grünflächen um Freiflächen, die Parks und anderen „Grünflächen“ vorbehalten sind, darunter Pflanzen, Wasserflächen – auch Blauflächen genannt – und andere Arten natürlicher Umgebung. Die meisten städtischen Freiflächen sind Grünflächen, gelegentlich umfassen sie aber auch andere Arten von Freiflächen."  #NT!
 tech_urbanization_8_desc:0 "Das Smart City-Konzept beinhaltet die Integration modernster Technologien, darunter das Internet der Dinge, Augmented Reality, künstliche Intelligenz und andere."  #NT!
 tech_urbanization_9_desc:0 "Eine Megaregion umfasst mehrere Städte und Landkreise, aber viele umfassen auch mehrere Bundesstaaten, die alle zusammenarbeiten müssen, um die Megaregion zu verwalten."  #NT!
 tech_urbanization_10_desc:0 "Ökumenopolis ist das hypothetische Konzept einer weltweiten Stadt."  #NT!
  
 tech_economy_1:0 "Verhaltensökonomie"  #NT!
 tech_economy_2:0 "Keynesianische Ökonomie"  #NT!
 tech_economy_3:0 "Bretton-Woods-System"  #NT!
 tech_economy_4:0 "Monetarismus"  #NT!
 tech_economy_5:0 "Wirtschaftliche Globalisierung"  #NT!
 tech_economy_6:0 "Quantitative Lockerung"  #NT!
 tech_economy_7:0 "Soziale Unternehmensverantwortung"  #NT!
 tech_economy_8:0 "Quantitative Verhaltensfinanzierung"  #NT!
 tech_economy_9:0 "Die digitale Wirtschaft"  #NT!
 tech_economy_10:0 "Neokapitalismus"  #NT!
  
 tech_economy_1_desc:0 "Die Verhaltensökonomie kombiniert Elemente der Ökonomie und der Psychologie, um zu verstehen, wie und warum sich Menschen in der realen Welt so verhalten, wie sie es tun. Sie unterscheidet sich von der neoklassischen Ökonomie, die davon ausgeht, dass die meisten Menschen klar definierte Präferenzen haben und auf der Grundlage dieser Präferenzen wohlinformierte, eigennützige Entscheidungen treffen."  #NT!
 tech_economy_2_desc:0 "Die keynesianische Ökonomie ist eine makroökonomische Theorie der Gesamtausgaben in der Wirtschaft und ihrer Auswirkungen auf Produktion, Beschäftigung und Inflation. Es wurde in den 1930er Jahren vom britischen Ökonomen John Maynard Keynes entwickelt, um die Auswirkungen der Weltwirtschaftskrise zu bewältigen."  #NT!
 tech_economy_3_desc:0 "Das Bretton-Woods-System besteht aus einer Reihe einheitlicher Regeln und Richtlinien, die den notwendigen Rahmen für die Schaffung fester internationaler Wechselkurse bildeten. Im Wesentlichen sah die Vereinbarung vor, dass der neu geschaffene IWF den festen Wechselkurs für Währungen auf der ganzen Welt festlegen sollte."  #NT!
 tech_economy_4_desc:0 "Der Monetarismus ist eine wirtschaftswissenschaftliche Theorie, die besagt, dass ein stabiles Wirtschaftswachstum nur dadurch gewährleistet werden kann, dass die Steigerungsrate der Geldmenge so gesteuert wird, dass sie der Wachstumskapazität der realen Produktivität entspricht."  #NT!
 tech_economy_5_desc:0 "Unter wirtschaftlicher Globalisierung versteht man den weit verbreiteten internationalen Verkehr von Waren, Kapital, Dienstleistungen, Technologie und Informationen."  #NT!
 tech_economy_6_desc:0 "Quantitative Lockerung (QE) ist eine geldpolitische Strategie der Zentralbanken. Beim QE kauft eine Zentralbank Wertpapiere, um die Zinssätze zu senken, die Geldmenge zu erhöhen und mehr Kredite an Verbraucher und Unternehmen zu vergeben."  #NT!
 tech_economy_7_desc:0 "Corporate Social Responsibility ist ein Geschäftsmodell, bei dem Unternehmen konzertierte Anstrengungen unternehmen, um so zu agieren, dass sie die Gesellschaft und die Umwelt verbessern und nicht schädigen."  #NT!
 tech_economy_8_desc:0 "Quantitative Behavioral Finance ist eine neue Disziplin, die mathematische und statistische Methoden nutzt, um Verhaltensverzerrungen im Zusammenhang mit der Bewertung zu verstehen. Die Forschung lässt sich in folgende Bereiche einteilen: Empirische Studien, die erhebliche Abweichungen von klassischen Theorien aufzeigen."  #NT!
 tech_economy_9_desc:0 "Die digitale Wirtschaft ist die wirtschaftliche Aktivität, die sich aus Milliarden alltäglicher Online-Verbindungen zwischen Menschen, Unternehmen, Geräten, Daten und Prozessen ergibt."  #NT!
 tech_economy_10_desc:0 "Neokapitalismus ist die Verwirklichung sowohl der Wirtschaftsdemokratie zur Entwicklung einer Wohlstandserweiterung als auch einiger vorkapitalistischer Aspekte, die vorhanden sein müssen, um den mikroökonomischen und individuellen Wohlstand sicherzustellen."  #NT!
  
 tech_politics_1:0 "Frühe Politikwissenschaft"  #NT!
 tech_politics_2:0 "Nationalismus"  #NT!
 tech_politics_3:0 "Ideologische Massenmobilisierung"  #NT!
 tech_politics_4:0 "Dekolonisierung"  #NT!
 tech_politics_5:0 "Neoliberalismus"  #NT!
 tech_politics_6:0 "Der Überwachungsstaat"  #NT!
 tech_politics_7:0 "Medienmanipulation"  #NT!
 tech_politics_8:0 "Multidisziplinäre Politikwissenschaft"  #NT!
 tech_politics_9:0 "Kulturimperialismus"  #NT!
 tech_politics_10:0 "Utopismus"  #NT!
  
 tech_politics_1_desc:0 "Politikwissenschaft ist die Untersuchung von Politik und Macht aus nationaler, internationaler und vergleichender Perspektive. Dazu gehört das Verständnis politischer Ideen, Ideologien, Institutionen, Richtlinien, Prozesse und Verhaltensweisen sowie von Gruppen, Klassen, Regierung, Diplomatie, Recht, Strategie und Krieg."  #NT!
 tech_politics_2_desc:0 "Nationalismus ist eine Ideologie, die Loyalität, Hingabe oder Loyalität gegenüber einer Nation oder einem Nationalstaat betont und davon ausgeht, dass solche Verpflichtungen Vorrang vor anderen Einzel- oder Gruppeninteressen haben."  #NT!
 tech_politics_3_desc:0 "Massenmobilisierung wird als ein Prozess definiert, der ein breites Spektrum von Partnern und Verbündeten auf nationaler und lokaler Ebene einbezieht und motiviert, um durch persönlichen Dialog das Bewusstsein für ein bestimmtes Entwicklungsziel zu schärfen und die Nachfrage danach zu schärfen."  #NT!
 tech_politics_4_desc:0 "Dekolonisierung ist die Aufhebung des Kolonialismus, wobei es sich bei letzterem um den Prozess handelt, bei dem imperiale Nationen fremde Gebiete, oft in Übersee, errichten und beherrschen."  #NT!
 tech_politics_5_desc:0 "Unter Neoliberalismus versteht man heutzutage marktorientierte Reformpolitiken wie „Abschaffung von Preiskontrollen, Deregulierung der Kapitalmärkte, Abbau von Handelshemmnissen“ und die Verringerung des staatlichen Einflusses auf die Wirtschaft, insbesondere durch Privatisierung und Sparmaßnahmen."  #NT!
 tech_politics_6_desc:0 "Ein Überwachungsstaat ist ein Land, in dem die Regierung eine umfassende Überwachung einer großen Zahl seiner Bürger und Besucher durchführt."  #NT!
 tech_politics_7_desc:0 "Unter Medienmanipulation versteht man orchestrierte Kampagnen, bei denen Akteure die Besonderheiten der Ausstrahlung von Massenkommunikation oder digitaler Medienplattformen ausnutzen, um irrezuführen, falsch zu informieren oder eine Erzählung zu schaffen, die ihre Interessen und Absichten vorantreibt."  #NT!
 tech_politics_8_desc:0 "Politikwissenschaft ist die Untersuchung von Politik und Macht aus nationaler, internationaler und vergleichender Perspektive. Dazu gehört das Verständnis politischer Ideen, Ideologien, Institutionen, Richtlinien, Prozesse und Verhaltensweisen sowie von Gruppen, Klassen, Regierung, Diplomatie, Recht, Strategie und Krieg."  #NT!
 tech_politics_9_desc:0 "Der Kulturimperialismus umfasst die kulturellen Dimensionen des Imperialismus. Das Wort „Imperialismus“ beschreibt Praktiken, bei denen ein Land die Kultur einsetzt, um ungleiche soziale und wirtschaftliche Beziehungen zwischen sozialen Gruppen zu schaffen und aufrechtzuerhalten."  #NT!
 tech_politics_10_desc:0 "Utopismus ist die allgemeine Bezeichnung für eine Reihe verschiedener Arten, eine bessere Gesellschaft zu träumen oder darüber nachzudenken, sie zu beschreiben oder zu versuchen, sie zu schaffen."  #NT!
  
 tech_philosophy_1:0 "Grundschulsystem"  #NT!
 tech_philosophy_2:0 "Sekundarschulsystem"  #NT!
 tech_philosophy_3:0 "Tertiäres Bildungssystem"  #NT!
 tech_philosophy_4:0 "Berufsschulen"  #NT!
 tech_philosophy_5:0 "Standardisierte Tests"  #NT!
 tech_philosophy_6:0 "Digitalisierung der Bildung"  #NT!
 tech_philosophy_7:0 "Fernunterricht"  #NT!
 tech_philosophy_8:0 "KI-gesteuerte Bildung"  #NT!
 tech_philosophy_9:0 "Personalisierte Bildung"  #NT!
 tech_philosophy_10:0 "Roboterpädagogen"  #NT!
  
 tech_philosophy_1_desc:0 "Die Grundschulbildung oder Grundschulbildung ist in der Regel die erste Stufe der formalen Bildung, die nach der Vorschule/dem Kindergarten und vor der Sekundarschule folgt."  #NT!
 tech_philosophy_2_desc:0 "Die Sekundarschulbildung findet in der Regel nach sechs Jahren Grundschulbildung statt, gefolgt von einer Hochschulausbildung, einer Berufsausbildung oder einer Beschäftigung."  #NT!
 tech_philosophy_3_desc:0 "Tertiäre Bildung, auch als dritte Stufe, dritte Stufe oder postsekundäre Bildung bezeichnet, ist die Bildungsstufe, die auf den Abschluss der Sekundarstufe folgt."  #NT!
 tech_philosophy_4_desc:0 "Eine Berufsschule, Handelsschule oder technische Schule ist eine Art Bildungseinrichtung, die sich je nach Land entweder auf eine weiterführende oder postsekundäre Bildung beziehen kann, die darauf abzielt, berufliche Bildung oder technische Fähigkeiten zu vermitteln, die für die Erfüllung der Aufgaben eines bestimmten und spezifischen Arbeitsplatzes erforderlich sind."  #NT!
 tech_philosophy_5_desc:0 "Ein standardisierter Test ist ein Test, der auf einheitliche oder „standardmäßige“ Weise durchgeführt und bewertet wird. Standardisierte Tests sind so konzipiert, dass die Fragen und Interpretationen konsistent sind und auf eine vorgegebene, standardisierte Weise durchgeführt und bewertet werden."  #NT!
 tech_philosophy_6_desc:0 "Unter Digitalisierung im Bildungswesen versteht man die Integration digitaler Technologien in den Lernalltag, etwa Online-Kurse, virtuelle Klassenzimmer und digitale Lehrbücher."  #NT!
 tech_philosophy_7_desc:0 "Fernunterricht, auch Fernunterricht genannt, ist der Unterricht von Schülern, die möglicherweise nicht immer physisch in der Schule anwesend sind oder bei denen Lernender und Lehrer zeitlich und räumlich voneinander getrennt sind."  #NT!
 tech_philosophy_8_desc:0 "Künstliche Intelligenz (KI) hat das Potenzial, einige der größten Herausforderungen im heutigen Bildungswesen zu bewältigen und die Lehr- und Lernpraxis zu erneuern."  #NT!
 tech_philosophy_9_desc:0 "Personalisiertes Lernen, individueller Unterricht, persönliche Lernumgebung und direkter Unterricht beziehen sich alle auf Bemühungen, die Bildung auf die unterschiedlichen Bedürfnisse der Schüler zuzuschneiden."  #NT!
 tech_philosophy_10_desc:0 "Schlaflernen ist ein Versuch, einer schlafenden Person Informationen zu übermitteln, typischerweise durch das Abspielen einer Tonaufnahme, während sie schläft."  #NT!
  
 tech_geopolitics_1:0 "Kolonialismus"  #NT!
 tech_geopolitics_2:0 "Internationale Organisationen"  #NT!
 tech_geopolitics_3:0 "Eindämmung"  #NT!
 tech_geopolitics_4:0 "Globaler ideologischer Konflikt"  #NT!
 tech_geopolitics_5:0 "Komplexe multilaterale Verträge"  #NT!
 tech_geopolitics_6:0 "Grenzenlose Politik"  #NT!
 tech_geopolitics_7:0 "Sozioökonomische Integration"  #NT!
 tech_geopolitics_8:0 "Regionalisierung"  #NT!
 tech_geopolitics_9:0 "Globale Superstaaten"  #NT!
 tech_geopolitics_10:0 "Die neue Weltordnung"  #NT!
  
 tech_geopolitics_1_desc:0 "Kolonialismus ist das Streben, die Etablierung und Aufrechterhaltung der Kontrolle und Ausbeutung von Menschen und Ressourcen durch eine fremde Gruppe von Menschen."  #NT!
 tech_geopolitics_2_desc:0 "Eine internationale Organisation ist eine Organisation mit einem eigenen internationalen Rechtsorgan, deren Mitglieder aus mehr als einem Land stammen und die häufig durch einen Vertrag oder ein anderes Instrument gegründet wurde, das dem Völkerrecht unterliegt."  #NT!
 tech_geopolitics_3_desc:0 "Eindämmung ist eine geopolitische strategische Außenpolitik, die darauf abzielt, die Macht eines bestimmten Staates unter Kontrolle zu halten."  #NT!
 tech_geopolitics_4_desc:0 "Ideologische Konflikte entstehen durch tief verwurzelte Meinungsverschiedenheiten über Glaubenssysteme, die politische, wirtschaftliche, religiöse und kulturelle Werte umfassen."  #NT!
 tech_geopolitics_5_desc:0 "Multilaterale Verträge sind Vereinbarungen zwischen mehr als zwei Parteien. Sie sind oft das Ergebnis einer internationalen Konferenz oder eines Treffens von Nationen, das unter der Schirmherrschaft einer internationalen Organisation stattfindet."  #NT!
 tech_geopolitics_6_desc:0 "Mit „Grenzlos“ wird eine Situation beschrieben, in der die Grenze zwischen Ländern keine Rolle spielt, normalerweise im Zusammenhang mit dem Waren-, Personen- usw. Verkehr."  #NT!
 tech_geopolitics_7_desc:0 "Die wirtschaftliche Integration kann als ein Prozess verstanden werden, der zur vollständigen Aufhebung jeglicher Diskriminierung zwischen Wirtschaftseinheiten verschiedener Volkswirtschaften führt, oder als eine Phase in einem solchen Prozess."  #NT!
 tech_geopolitics_8_desc:0 "Als Regionalismus wird das politische Ziel definiert, eine rechtsverbindliche Vereinbarung zwischen Staaten in einem räumlich begrenzten Maßstab zu schaffen."  #NT!
 tech_geopolitics_9_desc:0 "Ein Superstaat ist ein großer und mächtiger Staat, der durch den Zusammenschluss mehrerer kleinerer Länder entsteht."  #NT!
 tech_geopolitics_10_desc:0 "Der Begriff „neue Weltordnung“ bezieht sich auf eine neue Periode der Geschichte, die einen dramatischen Wandel im weltpolitischen Denken und im Kräfteverhältnis in den internationalen Beziehungen zeigt. Trotz unterschiedlicher Interpretationen dieses Begriffs wird er häufig mit dem Begriff der Weltregierung in Verbindung gebracht."  #NT!
