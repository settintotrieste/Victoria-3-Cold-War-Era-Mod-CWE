 tech_communication_infrastructure_8:0 "Highspeed-Internet"  #NT!
 tech_communication_infrastructure_9:0 "Erweitertes Internet"  #NT!
 tech_communication_infrastructure_10:0 "Internet der Dinge"  #NT!
  
 tech_communication_infrastructure_1_desc:0 "Ein Telegraf ist ein Kommunikationssystem, das Informationen durch Herstellen und Unterbrechen einer elektrischen Verbindung sendet. Es wird am häufigsten mit dem Senden elektrischer Stromimpulse entlang eines Kabels mit Morsecode-Codierung in Verbindung gebracht."  #NT!
 tech_communication_infrastructure_2_desc:0 "Ein drahtloses Netzwerk nutzt Funksignale, um Daten zwischen zwei oder mehr physischen Geräten auszutauschen."  #NT!
 tech_communication_infrastructure_3_desc:0 "Unter einem monochromen Fernsehgerät versteht man ein elektrisches Gerät, das eingehende Rundfunksignale in monochrome Fernsehbilder und zugehörigen Ton umwandelt."  #NT!
 tech_communication_infrastructure_4_desc:0 "Beim Farbfernsehen handelt es sich um eine Fernsehübertragungstechnik, die Farbinformationen in das Bild einbezieht, sodass das Videobild auf dem Fernsehgerät farbig dargestellt werden kann. Es ist eine Weiterentwicklung der Monochrom- oder Schwarzweiß-Fernsehtechnologie, bei der das Bild in Graustufen dargestellt wird."  #NT!
 tech_communication_infrastructure_5_desc:0 "Das Global Positioning System ist ein satellitengestütztes Funknavigationssystem."  #NT!
 tech_communication_infrastructure_6_desc:0 "Ein Internet-Netzwerk ist ein globales Kommunikationssystem, das aus miteinander verbundenen autonomen Netzwerken besteht"  #NT!
 tech_communication_infrastructure_7_desc:0 "Künstliche Intelligenz oder KI ist eine Technologie, die es Computern und Maschinen ermöglicht, menschliche Intelligenz und Problemlösungsfähigkeiten zu simulieren."  #NT!
 tech_communication_infrastructure_8_desc:0 "Unter Breitband oder Hochgeschwindigkeit versteht man in der Telekommunikation die breitbandige Datenübertragung, bei der Signale mit einem weiten Frequenzspektrum oder mehreren verschiedenen gleichzeitigen Frequenzen ausgenutzt werden, und wird beim schnellen Internetzugang verwendet."  #NT!
 tech_communication_infrastructure_9_desc:0 "Mithilfe künstlicher Intelligenz (KI) werden neue Möglichkeiten der Interaktion mit dem Internet entwickelt, beispielsweise Chatbots und virtuelle Assistenten."  #NT!
 tech_communication_infrastructure_10_desc:0 "Das Internet der Dinge beschreibt Geräte mit Sensoren, Verarbeitungsfähigkeiten, Software und anderen Technologien, die sich über das Internet oder andere Kommunikationsnetzwerke mit anderen Geräten und Systemen verbinden und Daten austauschen."  #NT!
  
