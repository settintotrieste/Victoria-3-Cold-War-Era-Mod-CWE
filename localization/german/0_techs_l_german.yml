 tech_construction_infrastructure_1_desc:0 "Ein Elektrowerkzeug ist ein Werkzeug, das durch eine zusätzliche Kraftquelle und einen zusätzlichen Mechanismus angetrieben wird, anders als die reine Handarbeit, die bei Handwerkzeugen erforderlich ist."  #NT!
 tech_construction_infrastructure_2_desc:0 "Stahlbeton, auch Stahlbeton genannt, ist ein Verbundwerkstoff, bei dem die relativ geringe Zugfestigkeit und Duktilität des Betons durch den Einbau einer Bewehrung mit höherer Zugfestigkeit oder Duktilität ausgeglichen wird."  #NT!
 tech_construction_infrastructure_3_desc:0 "Bei der Vorfertigung werden Komponenten eines Bauwerks in einer Fabrik oder einem anderen Produktionsstandort zusammengebaut und komplette Baugruppen oder Unterbaugruppen zur Baustelle transportiert, wo das Bauwerk errichtet werden soll."  #NT!
 tech_construction_infrastructure_4_desc:0 "Unter Baumaschinen versteht man alle Maschinen, die für Tätigkeiten im Bauwesen eingesetzt werden, vom Erdaushub über den Transport, das Be- und Entladen von Materialien bis hin zur Abfallentsorgung."  #NT!
 tech_construction_infrastructure_5_desc:0 "Der Stützkern ist ein Struktursystem für hohe Gebäude, das aus einem sechseckigen Kern besteht, der durch drei Strebepfeiler verstärkt wird, die eine Y-Form bilden."  #NT!
 tech_construction_infrastructure_6_desc:0 "Baustahl ist eine Stahlkategorie, die zur Herstellung von Baumaterialien in verschiedenen Formen verwendet wird. Viele Baustahlprofile haben die Form eines länglichen Trägers mit einem Profil eines bestimmten Querschnitts."  #NT!
 tech_construction_infrastructure_7_desc:0 "Unter Gebäudedesign, auch Architekturdesign genannt, versteht man die breit angelegten architektonischen, ingenieurtechnischen und technischen Anwendungen bei der Gestaltung von Gebäuden."  #NT!
 tech_construction_infrastructure_8_desc:0 "Beton ist ein Verbundwerkstoff, der aus Zuschlagstoffen besteht, die mit einem flüssigen Zement verbunden sind, der mit der Zeit zu einem Feststoff aushärtet."  #NT!
 tech_construction_infrastructure_9_desc:0 "Ein Elektrowerkzeug ist ein Werkzeug, das durch eine zusätzliche Kraftquelle und einen zusätzlichen Mechanismus angetrieben wird, anders als die reine Handarbeit, die bei Handwerkzeugen erforderlich ist."  #NT!
 tech_construction_infrastructure_10_desc:0 "Bauroboter sind eine Untergruppe von Industrierobotern, die für den Gebäude- und Infrastrukturbau vor Ort eingesetzt werden."  #NT!
  
 tech_agriculture_1:0 "Düngemittel"  #NT!
 tech_agriculture_2:0 "Landmaschinen"  #NT!
 tech_agriculture_3:0 "Batterie-Farming"  #NT!
 tech_agriculture_4:0 "Megafarmen"  #NT!
 tech_agriculture_5:0 "Pestizide"  #NT!
 tech_agriculture_6:0 "Genetisch veränderte Organismen"  #NT!
 tech_agriculture_7:0 "Agrarrobotik"  #NT!
 tech_agriculture_8:0 "KI-gesteuerte Landwirtschaft"  #NT!
 tech_agriculture_9:0 "Intelligente Farmen"  #NT!
 tech_agriculture_10:0 "Vollautomatische Farmen"  #NT!
  
 tech_agriculture_1_desc:0 "Ein Düngemittel ist jedes Material natürlichen oder synthetischen Ursprungs, das auf den Boden oder auf Pflanzengewebe aufgetragen wird, um Pflanzen mit Nährstoffen zu versorgen."  #NT!
 tech_agriculture_2_desc:0 "Unter landwirtschaftlichen Maschinen versteht man die mechanischen Strukturen und Geräte, die in der Landwirtschaft oder anderen landwirtschaftlichen Betrieben verwendet werden."  #NT!
 tech_agriculture_3_desc:0 "Batterielandwirtschaft, auch Intensiv- oder Massentierhaltung genannt, bezeichnet eine Methode zur Aufzucht von Nutztieren, insbesondere Geflügel und Eiern, auf engstem Raum mit hoher Besatzdichte."  #NT!
 tech_agriculture_4_desc:0 "Megafarmen und Intensivfarmen nehmen viel weniger Platz ein als herkömmliche Farmen und ermöglichen eine sichere Haltung der Tiere, fern von Raubtieren."  #NT!
 tech_agriculture_5_desc:0 "Pestizide sind Stoffe, die zur Bekämpfung von Schädlingen eingesetzt werden. Dazu gehören Herbizide, Insektizide, Nematizide, Fungizide und viele andere."  #NT!
 tech_agriculture_6_desc:0 "Ein gentechnisch veränderter Organismus ist jeder Organismus, dessen genetisches Material durch gentechnische Verfahren verändert wurde."  #NT!
 tech_agriculture_7_desc:0 "Unter einem Agrarroboter versteht man jedes Robotergerät, das landwirtschaftliche Prozesse verbessern kann, indem es viele langsame oder arbeitsintensive Aufgaben des Landwirts übernimmt. Der Einsatz von Robotern in der Landwirtschaft macht viele Aufgaben einfacher, schneller und effektiver."  #NT!
 tech_agriculture_8_desc:0 "KI in der Präzisionslandwirtschaft (PA) ermöglicht es Landwirten und Betriebsleitern, äußerst gezielte und präzise landwirtschaftliche Praktiken auf der Grundlage standortspezifischer agroklimatischer Feldmessungen anzuwenden."  #NT!
 tech_agriculture_9_desc:0 "Unter Smart Farming, auch Smart Agriculture genannt, versteht man die Einführung fortschrittlicher Technologien und datengesteuerter landwirtschaftlicher Abläufe, um die Nachhaltigkeit der landwirtschaftlichen Produktion zu optimieren und zu verbessern."  #NT!
 tech_agriculture_10_desc:0 "Die automatisierte Landwirtschaft nutzt verschiedene technologische Geräte, um landwirtschaftliche Abläufe und den Produktionszyklus von Pflanzen und Tieren zu verbessern und zu automatisieren und so landwirtschaftliche Betriebe effizienter zu machen."  #NT!
  
 tech_land_infrastructure_1:0 "Grundlegende Straßen und Eisenbahnen"  #NT!
 tech_land_infrastructure_2:0 "Frühe Verkehrskontrollsysteme"  #NT!
 tech_land_infrastructure_3:0 "Integrierte städtische Verkehrsnetze"  #NT!
 tech_land_infrastructure_4:0 "Hochgeschwindigkeitsbahnen und Autobahnen"  #NT!
 tech_land_infrastructure_5:0 "Eisenbahnen und Autobahnen mit hohem Verkehrsaufkommen"  #NT!
 tech_land_infrastructure_6:0 "Moderne Verkehrsleitsysteme"  #NT!
 tech_land_infrastructure_7:0 "Elektrofahrzeuge"  #NT!
 tech_land_infrastructure_8:0 "Autonome Fahrzeuge"  #NT!
 tech_land_infrastructure_9:0 "Intelligente Infrastruktur"  #NT!
 tech_land_infrastructure_10:0 "Mega-Infrastruktur"  #NT!
  
 tech_land_infrastructure_1_desc:0 "Grundlegende Straßen und Eisenbahnen"  #NT!
 tech_land_infrastructure_2_desc:0 "Zur Basisinfrastruktur gehören Haupteisenbahnen, Straßen, Kanäle, Häfen und Docks, der elektromagnetische Telegraf, Entwässerung, Deiche und Landgewinnung."  #NT!
 tech_land_infrastructure_3_desc:0 "Der integrierte öffentliche Verkehr vereint verschiedene Verkehrsträger und Betreiber durch Organisations- und Planungsprozesse, die durch die Einführung von Infrastruktur und Technologien erleichtert werden, um den Komfort und die Effizienz für die Fahrgäste zu maximieren."  #NT!
 tech_land_infrastructure_4_desc:0 "Der Hochgeschwindigkeitszug (HSR) ist eine Art Schienenverkehrsnetz, bei dem Züge deutlich schneller fahren als die herkömmliche Schiene. Eine Autobahn ist eine Hauptstraße, insbesondere eine, die Städte verbindet."  #NT!
 tech_land_infrastructure_5_desc:0 "Eisenbahnen und Autobahnen sind sehr groß und können ein hohes Verkehrsaufkommen aufnehmen."  #NT!
 tech_land_infrastructure_6_desc:0 "Das Verkehrsmanagement ist ein Schlüsselzweig der Logistik. Dabei geht es um die Planung, Steuerung und Beschaffung von Transportdienstleistungen, die für den physischen Transport von Fahrzeugen und Gütern erforderlich sind."  #NT!
 tech_land_infrastructure_7_desc:0 "Ein Elektrofahrzeug ist ein Fahrzeug, das einen oder mehrere Elektromotoren zum Antrieb nutzt. Das Fahrzeug kann über ein Kollektorsystem mit Strom aus externen Quellen oder autonom über eine Batterie oder durch die Umwandlung von Kraftstoff in Elektrizität mithilfe eines Generators oder von Brennstoffzellen angetrieben werden."  #NT!
 tech_land_infrastructure_8_desc:0 "Autonome Fahrzeuge nutzen Fernerkundungstechnologie wie Radar, GPS, Kameras und Lidar, um ihre Umgebung zu überwachen und eine 3D-Karte ihrer Umgebung zu erstellen."  #NT!
 tech_land_infrastructure_9_desc:0 "Eine intelligente Infrastruktur ist ein intelligentes System, das eine Datenrückkopplungsschleife nutzt, um die Entscheidungsfindung in einer Angelegenheit zu verbessern."  #NT!
 tech_land_infrastructure_10_desc:0 "Straßen und Eisenbahnen sind gigantisch."  #NT!
  
 tech_communication_infrastructure_1:0 "Telegraphennetzwerk"  #NT!
