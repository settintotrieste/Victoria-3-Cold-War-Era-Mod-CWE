 tech_military_theory_7:0 "Weltraumstreitkräfte"  #NT!
 tech_military_theory_8:0 "Automatisierte Kriegsführung"  #NT!
 tech_military_theory_9:0 "Digitaler Kriegsraum"  #NT!
 tech_military_theory_10:0 "KI-Generäle"  #NT!
  
 tech_military_theory_1_desc:0 "Bei der strategischen Planung handelt es sich um den Prozess einer Organisation, bei dem sie ihre Strategie oder Richtung definiert und Entscheidungen über die Zuweisung ihrer Ressourcen zur Erreichung strategischer Ziele trifft."  #NT!
 tech_military_theory_2_desc:0 "Kombinierte Waffen sind ein Ansatz zur Kriegsführung, der darauf abzielt, verschiedene Kampfwaffen eines Militärs zu integrieren, um sich gegenseitig ergänzende Effekte zu erzielen – zum Beispiel durch den Einsatz von Infanterie und Rüstung in einer städtischen Umgebung, in der sich beide Waffen gegenseitig unterstützen."  #NT!
 tech_military_theory_3_desc:0 "In der Kriegsführung ist ein Kriegsschauplatz oder Theater ein Bereich, in dem wichtige militärische Ereignisse stattfinden oder im Gange sind. Ein Kriegsschauplatz kann den gesamten Luft-, Land- und Seeraum umfassen, der an Kriegshandlungen beteiligt ist oder potenziell beteiligt sein könnte."  #NT!
 tech_military_theory_4_desc:0 "Gegenseitig gesicherte Zerstörung ist eine Doktrin der Militärstrategie und der nationalen Sicherheitspolitik, die davon ausgeht, dass ein umfassender Einsatz von Atomwaffen durch einen Angreifer auf einen nuklear bewaffneten Verteidiger mit Zweitschlagfähigkeiten zur vollständigen Vernichtung sowohl des Angreifers als auch des Verteidigers führen würde."  #NT!
 tech_military_theory_5_desc:0 "Asymmetrische Kriegsführung ist eine Art Krieg zwischen Kriegführenden, deren relative militärische Macht, Strategie oder Taktik sich erheblich unterscheiden. An dieser Art der Kriegsführung sind häufig, aber nicht unbedingt, Aufständische oder Milizen der Widerstandsbewegung beteiligt, die möglicherweise den Status unrechtmäßiger Kombattanten gegen ein stehendes Heer haben."  #NT!
 tech_military_theory_6_desc:0 "ISR (oder Intelligence, Surveillance, Reconnaissance) wird typischerweise in Bezug auf militärische Anwendungen verwendet. ISR ist eine integrierte Aufklärungs- und Operationsfunktion, die als koordinierte Erfassung, Verarbeitung und Bereitstellung genauer, relevanter und zeitnaher Informationen und Informationen zur Unterstützung des Entscheidungsprozesses eines Kommandanten definiert werden kann. Die meisten Land-, See-, Luft- und Raumfahrteinrichtungen spielen eine entscheidende Rolle bei der ISR-Erfassung, um den Erfolg der Operationen sicherzustellen."  #NT!
 tech_military_theory_7_desc:0 "Eine Weltraumstreitmacht ist ein militärischer Zweig der Streitkräfte eines Landes, der militärische Operationen im Weltraum und Weltraumkriege durchführt."  #NT!
 tech_military_theory_8_desc:0 "Die strategische Planung wird durch künstliche Intelligenz unterstützt."  #NT!
 tech_military_theory_9_desc:0 "Der digitale Krieg, ein Teilbereich dessen, was wir Informationskrieg nennen, beinhaltet nicht-physische Angriffe auf Informationen, Informationsprozesse und Informationsinfrastruktur, die Informationen gefährden, verändern, beschädigen, stören oder zerstören und/oder die Informationsverarbeitung und Entscheidungsfindung verzögern, verwirren, täuschen und stören."  #NT!
 tech_military_theory_10_desc:0 "Das Militär wird von einer mächtigen künstlichen Intelligenz kommandiert."  #NT!
  
     ### Society Techs ### 
  
 tech_urbanization_1:0 "Grundlegende Stadtwerke"  #NT!
 tech_urbanization_2:0 "Öffentliche Verkehrsmittel"  #NT!
 tech_urbanization_3:0 "Hochhäuser"  #NT!
