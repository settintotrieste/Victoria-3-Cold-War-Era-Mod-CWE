 tech_military_space_program_1_desc:0 "Die Weltraumphysik, auch Weltraumplasmaphysik genannt, ist die Untersuchung natürlich vorkommender Plasmen in der oberen Erdatmosphäre und im Rest des Sonnensystems. Es umfasst die Themen Aeronomie, Polarlichter, planetarische Ionosphären und Magnetosphären, Strahlungsgürtel und Weltraumwetter."  #NT!
 tech_military_space_program_2_desc:0 "Ein Observatorium ist ein Ort zur Beobachtung terrestrischer, mariner oder himmlischer Ereignisse."  #NT!
 tech_military_space_program_3_desc:0 "Eine Raumsonde ist ein unbemanntes, unbemanntes Gerät, das den Weltraum erkunden und wissenschaftliche Informationen sammeln soll."  #NT!
 tech_military_space_program_4_desc:0 "Ein Satellit ist ein kleines Objekt, das ein größeres Objekt im Weltraum umkreist oder umkreist. Ein Satellit ist ein Mond, Planet oder eine Maschine, die einen Planeten oder Stern umkreist."  #NT!
 tech_military_space_program_5_desc:0 "Ein Space Shuttle ist ein von einer Rakete gestartetes Raumschiff, das wie ein antriebsloses Flugzeug landen kann und für wiederholte Reisen zwischen der Erde und dem Weltraum eingesetzt wird."  #NT!
 tech_military_space_program_6_desc:0 "Raumfahrtzentren sind im Allgemeinen mit Startplätzen für Raumfahrzeuge verbunden."  #NT!
 tech_military_space_program_7_desc:0 "Eine wiederverwendbare Trägerrakete verfügt über Teile, die geborgen und erneut geflogen werden können, während sie Nutzlasten von der Oberfläche in den Weltraum transportiert."  #NT!
 tech_military_space_program_8_desc:0 "Ein Satellitennetzwerk ist eine Kombination von Knotenpunkten, die die Kommunikation von einem Punkt auf der Erde zu einem anderen ermöglichen."  #NT!
 tech_military_space_program_9_desc:0 "Eine Mondbasis (oder Mondbasis) ist ein menschlicher Außenposten auf oder unter der Mondoberfläche. Mondbasen sind mehr als bloße Aktivitätsorte oder temporäre Lager. Sie sind außerirdische Stützpunkte, die robotische oder menschliche Aktivitäten unterstützen, indem sie Oberflächeninfrastruktur bereitstellen."  #NT!
 tech_military_space_program_10_desc:0 "Unter Weltraumforschung versteht man den Einsatz von Astronomie und Weltraumtechnologie zur Erforschung des Weltraums. Während die Erforschung des Weltraums derzeit hauptsächlich von Astronomen mit Teleskopen durchgeführt wird, erfolgt die physische Erforschung sowohl durch unbemannte Roboter-Raumsonden als auch durch bemannte Raumflüge."  #NT!
  
