 tech_military_nuclear_7:0 "Moderne antiballistische Raketen"  #NT!
 tech_military_nuclear_8:0 "Atomwaffen mit hoher Ausbeute"  #NT!
 tech_military_nuclear_9:0 "KI-gesteuerte Atomwaffensysteme"  #NT!
 tech_military_nuclear_10:0 "Armageddon-Waffen"  #NT!
  
 tech_military_nuclear_1_desc:0 "Kernphysik ist das Fachgebiet der Physik, das neben der Untersuchung anderer Formen der Kernmaterie auch Atomkerne und ihre Bestandteile und Wechselwirkungen untersucht. Die Kernphysik sollte nicht mit der Atomphysik verwechselt werden, die das Atom als Ganzes, einschließlich seiner Elektronen, untersucht."  #NT!
 tech_military_nuclear_2_desc:0 "Durch die Anreicherung wird unerwünschtes Uran-238 entfernt, wodurch die Konzentration an Uran-235-Atomen höher wird."  #NT!
 tech_military_nuclear_3_desc:0 "Atombombe, Waffe mit großer Sprengkraft, die durch Spaltung der Kerne eines Schwermetalls wie Plutonium oder Uran entsteht. \n\nHinweis: Atomwaffen können entwickelt werden, indem Sie auf die Entscheidung „Atomwaffen entwickeln“ klicken."  #NT!
 tech_military_nuclear_4_desc:0 "Eine Wasserstoffbombe ist eine immens starke Bombe, deren Zerstörungskraft aus der schnellen Energiefreisetzung bei der Kernfusion von Wasserstoffisotopen (Deuterium und Tritium) resultiert, wobei eine Atombombe als Auslöser dient."  #NT!
 tech_military_nuclear_5_desc:0 "Eine antiballistische Rakete ist eine Boden-Luft-Rakete, die zur Abwehr ballistischer Raketen entwickelt wurde. Ballistische Raketen werden verwendet, um nukleare, chemische, biologische oder konventionelle Sprengköpfe auf einer ballistischen Flugbahn zu befördern."  #NT!
 tech_military_nuclear_6_desc:0 "Eine Hyperschallwaffe ist eine Waffe, die sich mit Hyperschallgeschwindigkeit fortbewegen kann, definiert als 5- bis 25-fache Schallgeschwindigkeit oder etwa 1 bis 5 Meilen pro Sekunde."  #NT!
 tech_military_nuclear_7_desc:0 "Eine antiballistische Rakete ist eine Boden-Luft-Rakete, die zur Abwehr ballistischer Raketen entwickelt wurde. Ballistische Raketen werden verwendet, um nukleare, chemische, biologische oder konventionelle Sprengköpfe auf einer ballistischen Flugbahn zu befördern."  #NT!
 tech_military_nuclear_8_desc:0 "Die Sprengkraft einer Atomwaffe ist die Menge an Energie, die bei der Detonation dieser bestimmten Atomwaffe in Form von Druck, thermischer Strahlung und nuklearer Strahlung freigesetzt wird."  #NT!
 tech_military_nuclear_9_desc:0 "Die Befugnis zum Abschuss von Atomwaffen wird an ein KI-System delegiert."  #NT!
 tech_military_nuclear_10_desc:0 "Ein Weltuntergangsgerät ist eine hypothetische Konstruktion – normalerweise eine Waffe oder ein Waffensystem – die alles Leben auf einem Planeten zerstören könnte."  #NT!
  
