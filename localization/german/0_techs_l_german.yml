 tech_military_airforce_10:0 "Luftmutterschiffe"  #NT!
  
 tech_military_airforce_1_desc:0 "Ein Doppeldecker ist ein Starrflügelflugzeug mit zwei übereinander gestapelten Hauptflügeln."  #NT!
 tech_military_airforce_2_desc:0 "Ein Bomber ist ein militärisches Kampfflugzeug, das Luft-Boden-Waffen einsetzt, um Bomben abzuwerfen, Torpedos abzufeuern oder luftgestützte Marschflugkörper einzusetzen."  #NT!
 tech_military_airforce_3_desc:0 "Ein Düsenflugzeug (oder einfach Jet) ist ein Flugzeug (fast immer ein Starrflügler), das von einem oder mehreren Strahltriebwerken angetrieben wird."  #NT!
 tech_military_airforce_4_desc:0 "Eine Luft-Luft-Rakete ist eine Rakete, die von einem Flugzeug aus abgefeuert wird, um ein anderes Flugzeug zu zerstören. AAMs werden typischerweise von einem oder mehreren Raketenmotoren angetrieben, die normalerweise mit Feststoffen betrieben werden, manchmal aber auch mit Flüssigkeiten."  #NT!
 tech_military_airforce_5_desc:0 "Ein Mehrzweckkampfflugzeug (MRCA) ist ein Kampfflugzeug, das im Kampf verschiedene Rollen übernehmen soll. Diese Rollen können Luft-Luft-Kampf, Luftunterstützung, Luftangriffe, Aufklärung, elektronische Kriegsführung und Unterdrückung von Luftverteidigungen umfassen."  #NT!
 tech_military_airforce_6_desc:0 "Stealth-Flugzeuge sind so konzipiert, dass sie einer Erkennung mithilfe einer Vielzahl von Technologien entgehen, die die Reflexion/Emission von Radar, Infrarot, sichtbarem Licht, Hochfrequenzspektrum (RF) und Audio reduzieren, die alle zusammen als Stealth-Technologie bezeichnet werden."  #NT!
 tech_military_airforce_7_desc:0 "Eine Boden-Luft-Rakete (SAM), auch Boden-Luft-Rakete (GTAM) oder Boden-Luft-Lenkwaffe (SAGW) genannt, ist eine Rakete, die vom Boden oder vom Meer aus abgefeuert werden soll, um Flugzeuge oder andere Raketen zu zerstören."  #NT!
 tech_military_airforce_8_desc:0 "Künstliche Intelligenz wird zum Fliegen von Kampfflugzeugen eingesetzt."  #NT!
 tech_military_airforce_9_desc:0 "Ein unbemanntes Luftfahrzeug (UAV), allgemein bekannt als Drohne, ist ein Flugzeug ohne menschlichen Piloten, Besatzung oder Passagiere an Bord."  #NT!
 tech_military_airforce_10_desc:0 "Ein luftgestützter Flugzeugträger ist eine Art Mutterschiffflugzeug, das andere kleinere Parasitenflugzeuge transportieren, starten, einholen und unterstützen kann."  #NT!
  
