 tech_sea_infrastructure_1_desc:0 "Hafenmaschinen umfassen eine Vielzahl wichtiger Geräte, darunter Leercontainerstapler, Gabelstapler mit unterschiedlichen Kapazitäten, Materialumschlagkrane, Reach Stacker, Ship-to-Shore-Krane, Portalkräne für Gummireifencontainer, Teleskoplader und viele mehr."  #NT!
 tech_sea_infrastructure_2_desc:0 "Unter einem Schiffsdieselmotor versteht man einen Selbstzündungsmotor, der auf einem Schiff installiert ist oder installiert werden soll."  #NT!
 tech_sea_infrastructure_3_desc:0 "Schiffe werden auf der Grundlage international anerkannter Standards entworfen."  #NT!
 tech_sea_infrastructure_4_desc:0 "Containerisierung ist ein System des intermodalen Gütertransports unter Verwendung intermodaler Container."  #NT!
 tech_sea_infrastructure_5_desc:0 "Megaschiffe sind eine Klasse extrem großer Schiffe, die hauptsächlich für kommerzielle Zwecke eingesetzt werden, beispielsweise für den Transport großer Warenmengen oder großer Personengruppen."  #NT!
 tech_sea_infrastructure_6_desc:0 "Während frühere Häfen eher einfache Häfen waren, sind moderne Häfen eher multimodale Verteilungsknotenpunkte mit Verkehrsverbindungen über See-, Fluss-, Kanal-, Straßen-, Schienen- und Luftwege."  #NT!
 tech_sea_infrastructure_7_desc:0 "Das Konzept der intelligenten Schiffe geht auf den umfassenderen Trend der Digitalisierung zurück, der sich über verschiedene Sektoren erstreckt und einen Wandel in der maritimen Industrie darstellt, der Spitzentechnologien integriert, um Effizienz, Sicherheit und Nachhaltigkeit zu verbessern."  #NT!
 tech_sea_infrastructure_8_desc:0 "Ein Elektroschiff ist ein angetriebenes Wasserfahrzeug, das von Elektromotoren angetrieben wird, die entweder von Bordbatterien, Sonnenkollektoren oder Generatoren angetrieben werden."  #NT!
 tech_sea_infrastructure_9_desc:0 "Autonome Frachtschiffe, auch bekannt als autonome Containerschiffe oder maritime autonome Oberflächenschiffe (MASS), sind Schiffe ohne Besatzung, die entweder Container oder Massengüter mit wenig oder keiner menschlichen Interaktion über schiffbare Gewässer transportieren."  #NT!
 tech_sea_infrastructure_10_desc:0 "Häfen sind heute Megakomplexe, die sich über weite Landstriche erstrecken."  #NT!
  
 tech_air_infrastructure_1:0 "Frühe Flughäfen"  #NT!
 tech_air_infrastructure_2:0 "Kleine Propellerflugzeuge"  #NT!
 tech_air_infrastructure_3:0 "Düsenflugzeuge"  #NT!
 tech_air_infrastructure_4:0 "Internationale Flughäfen"  #NT!
 tech_air_infrastructure_5:0 "Cockpit-Automatisierung"  #NT!
 tech_air_infrastructure_6:0 "Mega-Flughäfen"  #NT!
 tech_air_infrastructure_7:0 "Intelligente Flugzeuge"  #NT!
 tech_air_infrastructure_8:0 "Elektrische Flugzeuge"  #NT!
 tech_air_infrastructure_9:0 "Vollständig autonome Flugzeuge"  #NT!
 tech_air_infrastructure_10:0 "Mega-Flugzeuge"  #NT!
  
 tech_air_infrastructure_1_desc:0 "Frühe Flughäfen waren oft klein und rudimentär, mit kargen Start- und Landebahnen und wenigen Annehmlichkeiten."  #NT!
 tech_air_infrastructure_2_desc:0 "Bei Einsätzen auf Regionalflughäfen mit kurzen Start- und Landebahnen können Propellerflugzeuge Geschwindigkeiten von 300 Knoten und Nonstop-Reichweiten von etwa 1.500 Meilen erreichen, bei einer durchschnittlichen Flugdauer von etwa 3 Stunden."  #NT!
 tech_air_infrastructure_3_desc:0 "Ein Düsenflugzeug oder Jetliner ist ein Verkehrsflugzeug, das von Strahltriebwerken angetrieben wird. Verkehrsflugzeuge verfügen in der Regel über zwei oder vier Strahltriebwerke; Dreimotorige Konstruktionen waren in den 1970er Jahren beliebt, sind heute jedoch weniger verbreitet."  #NT!
 tech_air_infrastructure_4_desc:0 "Ein internationaler Flughafen ist ein Flughafen mit Zoll- und Grenzkontrolleinrichtungen, der es Passagieren ermöglicht, zwischen Ländern auf der ganzen Welt zu reisen."  #NT!
 tech_air_infrastructure_5_desc:0 "Einige Aufgaben oder Teile von Aufgaben, die von der menschlichen Besatzung ausgeführt werden, können nach Wahl der Besatzung Maschinen zugewiesen werden."  #NT!
 tech_air_infrastructure_6_desc:0 "Als Megaflughäfen gelten Flughäfen mit 33 Millionen oder mehr Passagieren pro Jahr. Damit unterscheiden sie sich von Großflughäfen mit 10 bis 32,9 Millionen Passagieren pro Jahr sowie mittelgroßen Flughäfen mit 4,5 bis 9,9 Millionen Passagieren pro Jahr."  #NT!
 tech_air_infrastructure_7_desc:0 "Das Smart Aircraft System integriert fortschrittliche Sensoren und maschinelles Lernen für Erkenntnisse, die das Situationsbewusstsein erhöhen und die Sicherheit verbessern."  #NT!
 tech_air_infrastructure_8_desc:0 "Ein Elektroflugzeug ist ein Flugzeug, das mit Strom betrieben wird. Elektroflugzeuge gelten als eine Möglichkeit, die Umweltauswirkungen des Flugverkehrs zu reduzieren und emissionsfreie und leisere Flüge zu ermöglichen. Die Stromversorgung kann auf unterschiedliche Weise erfolgen, am gebräuchlichsten sind Batterien."  #NT!
 tech_air_infrastructure_9_desc:0 "Das Flugzeug fliegt, navigiert und kommuniziert selbstständig. Es ist völlig autonom und fliegt selbst."  #NT!
 tech_air_infrastructure_10_desc:0 "Flugzeuge sind riesig."  #NT!
  
 tech_energy_infrastructure_1:0 "Kohle- und Ölkraftwerke"  #NT!
 tech_energy_infrastructure_2:0 "Erdgas- und Wasserkraftwerke"  #NT!
 tech_energy_infrastructure_3:0 "Kernkraftwerke"  #NT!
 tech_energy_infrastructure_4:0 "Geothermische Kraftwerke"  #NT!
 tech_energy_infrastructure_5:0 "Frühe erneuerbare Energien"  #NT!
 tech_energy_infrastructure_6:0 "Moderne erneuerbare Energie"  #NT!
 tech_energy_infrastructure_7:0 "Moderne Kraftwerke mit fossilen Brennstoffen"  #NT!
 tech_energy_infrastructure_8:0 "Moderne Kernkraftwerke"  #NT!
 tech_energy_infrastructure_9:0 "Fusionskraftwerke"  #NT!
 tech_energy_infrastructure_10:0 "Megakraftwerke"  #NT!
  
 tech_energy_infrastructure_1_desc:0 "Ein Kraftwerk mit fossilen Brennstoffen ist ein Wärmekraftwerk, das einen fossilen Brennstoff wie Kohle, Öl oder Erdgas verbrennt, um Strom zu erzeugen. Kraftwerke mit fossilen Brennstoffen verfügen über Maschinen, um die Wärmeenergie der Verbrennung in mechanische Energie umzuwandeln, die dann einen elektrischen Generator betreibt."  #NT!
 tech_energy_infrastructure_2_desc:0 "In einem Erdgaskraftwerk wird Erdgas mit Luft vermischt und verbrannt. Die Verbrennungsprodukte (hauptsächlich CO2 und H2O) dehnen sich schnell aus und diese Expansion dreht die Welle, die den Magneten dreht. In einem Wasserkraftwerk dreht Wasser, das von einer großen Höhe auf eine niedrigere Höhe fällt, die Welle, die den Magneten dreht."  #NT!
 tech_energy_infrastructure_3_desc:0 "Ein Kernkraftwerk oder Atomkraftwerk ist ein Wärmekraftwerk, bei dem die Wärmequelle ein Kernreaktor ist. Wie es für Wärmekraftwerke typisch ist, wird Wärme zur Erzeugung von Dampf genutzt, der eine Dampfturbine antreibt, die an einen Generator angeschlossen ist, der Strom erzeugt."  #NT!
 tech_energy_infrastructure_4_desc:0 "Geothermie ist elektrischer Strom, der aus Erdwärme erzeugt wird. Zu den eingesetzten Technologien gehören Trockendampfkraftwerke, Entspannungsdampfkraftwerke und Binärkreislaufkraftwerke."  #NT!
 tech_energy_infrastructure_5_desc:0 "Erneuerbare Energie (oder grüne Energie) ist Energie aus erneuerbaren natürlichen Ressourcen, die in menschlicher Zeitspanne wieder aufgefüllt werden."  #NT!
 tech_energy_infrastructure_6_desc:0 "Erneuerbare Energien, darunter Sonne, Wind, Wasserkraft, Biokraftstoffe und andere, stehen im Mittelpunkt des Übergangs zu weniger CO2-intensiven und nachhaltigeren Energiesystemen."  #NT!
 tech_energy_infrastructure_7_desc:0 "Ein Kraftwerk mit fossilen Brennstoffen ist ein Wärmekraftwerk, das einen fossilen Brennstoff wie Kohle, Öl oder Erdgas verbrennt, um Strom zu erzeugen. Kraftwerke mit fossilen Brennstoffen verfügen über Maschinen, um die Wärmeenergie der Verbrennung in mechanische Energie umzuwandeln, die dann einen elektrischen Generator betreibt."  #NT!
     tech_energy_infrastructure_8_desc:0 "A nuclear power plant or atomic power station is a thermal power station in which the heat source is a nuclear reactor. As is typical of thermal power stations, heat is used to generate steam that drives a steam turbine connected to a generator that produces electricity. 
 tech_energy_infrastructure_9_desc:0 "Fusionsenergie ist eine vorgeschlagene Form der Stromerzeugung, bei der Strom durch die Nutzung von Wärme aus Kernfusionsreaktionen erzeugt wird. Bei einem Fusionsprozess verbinden sich zwei leichtere Atomkerne zu einem schwereren Atomkern und setzen dabei Energie frei. Geräte zur Nutzung dieser Energie werden als Fusionsreaktoren bezeichnet."  #NT!
 tech_energy_infrastructure_10_desc:0 "Kraftwerke sind riesig und verfügen über enorme Kapazitäten zur Energieerzeugung."  #NT!
  
