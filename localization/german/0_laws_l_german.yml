 law_social_hierarchy_0_enforced_desc:0 "Es gibt nur wenige bis gar keine Programme, die Randgruppen beim Aufstieg auf die soziale Leiter helfen."  #NT!
 law_social_hierarchy_0_codified_desc:0 "Es gibt einige Programme, die marginalisierten Gruppen den Aufstieg auf der sozialen Leiter erleichtern sollen."  #NT!
 law_social_hierarchy_0_not_enforced_desc:0 "Es gibt viele Programme, die marginalisierten Gruppen dabei helfen, die soziale Leiter zu erklimmen, und es ist gesetzlich verankert, dass klassenbezogene Diskriminierung verboten ist."  #NT!
