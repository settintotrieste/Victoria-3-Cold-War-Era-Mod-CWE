 law_politicised_armed_forces_desc:0 "Das Militär übt völlige Loyalität gegenüber einer einzelnen politischen Partei aus und vertritt und verteidigt konsequent parteiische politische Positionen und Vermögen."  #NT!
 law_semi_politicised_armed_forces_desc:0 "Das Militär übt eine gewisse Loyalität gegenüber einer einzelnen politischen Partei aus und vertritt und verteidigt konsequent parteiische politische Positionen und Vermögen."  #NT!
