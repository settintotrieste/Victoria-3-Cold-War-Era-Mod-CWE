l_german:
  
 law_no_term_limit:0 "Keine Laufzeitbegrenzung"  #NT!
 law_no_term_limit_desc:0 "Der [concept_ruler] kann für eine unbegrenzte Anzahl von Amtszeiten im Amt bleiben."  #NT!
 law_yes_term_limit:0 "Laufzeit begrenzt"  #NT!
 law_yes_term_limit_desc:0 "Der [concept_ruler] darf nicht länger als eine bestimmte Anzahl von Jahren im Amt bleiben."  #NT!
  
 law_peasant_levies_additional_effects: ""
  
 law_command_economy:0 "Vollständig geplante Wirtschaft"  #NT!
 law_semi_command_economy:0 "Teilplanwirtschaft"  #NT!
 law_semi_command_economy_desc:0 "Dies ist eine Form des Wirtschaftssystems, in dem der Staat alle Unternehmen besitzt und kontrolliert, ein Teil der operativen Entscheidungsfindung jedoch den Arbeitnehmern überlassen bleibt."  #NT!
 law_social_capitalism:0 "Sozialer Kapitalismus"  #NT!
 law_social_capitalism_desc:0 "Der Sozialkapitalismus ist ein sozioökonomisches Modell, das ein kapitalistisches Wirtschaftssystem des freien Marktes mit Sozialpolitik und ausreichender Regulierung kombiniert, um einen fairen Wettbewerb auf dem Markt herzustellen."  #NT!
  
 law_total_separation:0 "Totale Trennung"  #NT!
  
 law_unitary_state:0 "Zentralisierter Einheitsstaat"  #NT!
 law_unitary_state_desc:0 "Ein zentralisierter Einheitsstaat ist ein souveräner Staat, der als Einheit regiert wird und in dem die Zentralregierung die oberste Autorität ist."  #NT!
 law_devolved_state:0 "Dezentraler Einheitsstaat"  #NT!
 law_devolved_state_desc:0 "Ein dezentralisierter Einheitsstaat ist ein Land, in dem die Zentralregierung die höchste Autorität innehat, aber einige Befugnisse an niedrigere Regierungsebenen wie Provinzen oder Gemeinden delegiert hat. Dies unterscheidet sich von einem zentralisierten Einheitsstaat, in dem die Zentralregierung alle wesentlichen Machtbefugnisse behält."  #NT!
 law_federal_state:0 "Bundesstaat"  #NT!
 law_federal_state_desc:0 "Ein Bundesstaat ist eine Einheit, die durch einen Zusammenschluss teilweise selbstverwalteter Provinzen, Bundesstaaten oder anderer Regionen unter einer Bundesregierung gekennzeichnet ist."  #NT!
 law_politicised_judiciary:0 "Politisierte Justiz"  #NT!
 law_politicised_judiciary_desc:0 "Die Richter werden direkt von der Exekutive ernannt."  #NT!
 law_partially_politicised_judiciary:0 "Halbunabhängige Justiz"  #NT!
 law_partially_politicised_judiciary_desc:0 "Die Richter werden gemeinsam von der Exekutive und der Legislative ernannt."  #NT!
 law_independent_judiciary:0 "Unabhängige Justiz"  #NT!
 law_independent_judiciary_desc:0 "Die Ernennung von Richtern erfolgt frei von jeglicher Einmischung der Exekutive und Legislative."  #NT!
  
 law_no_voting:0 "Kontrollierte Wahlen"  #NT!
 law_no_voting_desc:0 "Wahlen sind nicht wettbewerbsorientiert – nur Kandidaten, die mit der Regierungspartei verbunden sind und von ihr genehmigt werden, dürfen für ein Amt kandidieren, und jeder, der gegen diese Kandidaten stimmen möchte, muss nichtgeheim abstimmen."  #NT!
 law_rigged_voting:0 "Manipulierte Wahlen"  #NT!
 law_rigged_voting_desc:0 "Eine bestimmte Anzahl an Stimmen wird immer für die Regierung ausfallen."  #NT!
 law_gerrymandered_voting:0 "Wahl Gerrymandering"  #NT!
 law_gerrymandered_voting_desc:0 "Wahlkreise werden so eingeteilt, dass sie die herrschende Partei begünstigen."  #NT!
 law_harassment_voting:0 "Belästigung bei Wahlen"  #NT!
 law_harassment_voting_desc:0 "Die Wahlkampfregeln sind für Oppositionskandidaten ungünstig."  #NT!
 law_fair_voting:0 "Freie und faire Wahlen"  #NT!
 law_fair_voting_desc:0 "Die Abstimmungs- und Wahlkampfregeln sind frei und fair."  #NT!
  
 law_first_past_the_post:0 "None"  #NT!
 law_first_past_the_post_desc:0 "Das First-Past-Voting ist ein Mehrheitswahlsystem, bei dem die Wähler für einen einzelnen Kandidaten stimmen und der Kandidat mit den meisten Stimmen die Wahl gewinnt."  #NT!
 law_jefferson_system:0 "Jefferson-Methode"  #NT!
 law_jefferson_system_desc:0 "Die Jefferson-Methode ist eine Aufteilungsmethode zur Sitzverteilung in Parlamenten. Nachdem alle Stimmen gezählt wurden, werden für jede Partei aufeinanderfolgende Quotienten berechnet. Die Partei mit dem größten Quotienten erhält einen Sitz und ihr Quotient wird neu berechnet. Dies wird wiederholt, bis die erforderliche Anzahl an Sitzplätzen besetzt ist."  #NT!
 law_propotional_representation:0 "Verhältniswahl"  #NT!
 law_propotional_representation_desc:0 "Unter Verhältniswahlrecht versteht man jede Art von Wahlsystem, bei dem Untergruppen einer Wählerschaft proportional im gewählten Gremium vertreten sind."  #NT!
  
 law_parties_not_allowed:0 "Politische Parteien verboten"  #NT!
 law_parties_not_allowed_desc:0 "Im Land dürfen keine politischen Parteien registriert sein. \n\nDies wird im Spiel durch die Deaktivierung des kompetitiven [Concept('concept_election','$concept_elections$')] dargestellt."  #NT!
 law_single_party_state:0 "Einparteienstaat"  #NT!
 law_single_party_state_desc:0 "Der Staat wird von einer einzigen legalen politischen Partei regiert, die das Monopol auf alle politischen Aktivitäten innerhalb der Nation hat. \n\nDies wird im Spiel durch die Deaktivierung des kompetitiven [Concept('concept_election','$concept_elections$')] dargestellt."  #NT!
 law_dominant_party_state:0 "Dominantes Parteiensystem"  #NT!
 law_dominant_party_state_desc:0 "Obwohl es im Land mehrere politische Parteien gibt, übt die Regierungspartei großen Einfluss auf alle politischen Aktivitäten innerhalb des Landes aus."  #NT!
 law_parties_allowed:0 "Mehrparteiensystem"  #NT!
 law_parties_allowed_desc:0 "Jede politische Partei kann sich bei der Wahlkommission registrieren lassen und für Wahlen kandidieren."  #NT!
  
 law_appointed_legislature:0 "Ernennung zum Gesetzgeber"  #NT!
 law_appointed_legislature_desc:0 "Alle Mitglieder der Legislative werden von der Regierung ausgewählt."  #NT!
 law_technocratic_legislature:0 "Halbernannte gesetzgebende Körperschaft"  #NT!
 law_technocratic_legislature_desc:0 "Einige Mitglieder der Legislative werden von der Regierung ausgewählt."  #NT!
 law_democratic_legislature:0 "Gewählte Legislative"  #NT!
 law_democratic_legislature_desc:0 "Alle vom Volk gewählten Mitglieder der Legislative."  #NT!
  
 law_unicameralism:0 "Einkammer-Gesetzgebung"  #NT!
 law_hybrid_chamber:0 "Hybride Gesetzgebung"  #NT!
 law_bicameralism:0 "Zweikammer-Gesetzgebung"  #NT!
 law_unicameralism_desc:0 "Einkammersystem ist eine Art Gesetzgebung, die aus einem Haus oder einer Versammlung besteht, die gemeinsam Gesetze erlässt und abstimmt."  #NT!
 law_hybrid_chamber_desc:0 "Das Land verfügt über eine Einkammer-Legislative mit einem weitgehend zeremoniellen Staatsoberhaupt oder einem vom [concept_ruler] unabhängigen Exekutivorgan, das über ein Vetorecht bei den vom [concept_government] verabschiedeten Gesetzen verfügt."  #NT!
 law_bicameralism_desc:0 "Beim Zweikammersystem handelt es sich um eine Form der Legislative, die in zwei getrennte Versammlungen, Kammern oder Häuser unterteilt ist, die sogenannte Zweikammer-Legislative."  #NT!
  
 law_politicised_bureaucrats:0 "Politisierte Bürokraten"  #NT!
 law_politicised_bureaucrats_desc:0 "Alle Beamten werden von der Regierung aufgrund ihrer Loyalität ausgewählt."  #NT!
 law_elitist_bureaucrats:0 "Elitäre Bürokraten"  #NT!
 law_elitist_bureaucrats_desc:0 "Alle Beamten werden von den Eliten des öffentlichen Dienstes ausgewählt."  #NT!
 law_professional_bureaucrats:0 "Professionelle Bürokraten"  #NT!
 law_professional_bureaucrats_desc:0 "Alle Beamten werden im Rahmen eines kostenlosen und fairen Einstellungsverfahrens ausgewählt, bei dem die Verdienste einer Person berücksichtigt werden."  #NT!
  
 law_weak_financial_regulations:0 "Schwache Finanzvorschriften"  #NT!
 law_moderate_financial_regulations:0 "Anständige Finanzvorschriften"  #NT!
 law_strong_financial_regulations:0 "Strenge Finanzvorschriften"  #NT!
  
 law_HOS_monarch:0 "$law_monarchy$"  #NT!
 law_HOS_monarch_desc:0 "$law_monarchy_desc$"  #NT!
 law_HOS_president:0 "$law_presidential_republic$"  #NT!
 law_HOS_president_desc:0 "$law_presidential_republic_desc$"  #NT!
 law_HOS_religious_leader:0 "$law_theocracy$"  #NT!
 law_HOS_religious_leader_desc:0 "$law_theocracy_desc$"  #NT!
 law_HOS_nationalist_leader:0 "Militärregime"  #NT!
 law_HOS_nationalist_leader_desc:0 "Dies ist ein [concept_government_type], bei dem die politische Macht in den Händen des $ig_armed_forces$ des Landes konzentriert ist."  #NT!
 law_HOS_communist_leader:0 "Sozialistische Republik"  #NT!
 law_HOS_communist_leader_desc:0 "$law_council_republic_desc$"  #NT!
  
 law_HOG_none:0 "Einheitliche Exekutive"  #NT!
 law_HOG_none_desc:0 "Der [concept_ruler] ist sowohl Staatsoberhaupt als auch Regierungschef."  #NT!
 law_HOG_prime_minister:0 "Separate Exekutive"  #NT!
 law_HOG_prime_minister_desc:0 "Der [concept_ruler] ist der Regierungschef, während eine separate Figur als zeremonielles Staatsoberhaupt fungiert."  #NT!
 law_HOG_president_prime_minister:0 "Geteilte Führungskraft"  #NT!
 law_HOG_president_prime_minister_desc:0 "Die Exekutivbefugnisse sind zwischen dem [concept_ruler], dem Staatsoberhaupt, und dem Regierungschef aufgeteilt."  #NT!
  
 law_nepotistic_cabinet:0 "Nepotistisches Kabinett"  #NT!
 law_nepotistic_cabinet_desc:0 "Das Kabinett besteht nur aus Freunden und Familie des Herrschers."  #NT!
 law_semi_nepotistic_cabinet:0 "Halbnepotistisches Kabinett"  #NT!
 law_semi_nepotistic_cabinet_desc:0 "Das Kabinett ist teilweise mit Freunden und Familie des Herrschers besetzt."  #NT!
 law_meritocratic_cabinet:0 "Meritokratisches Kabinett"  #NT!
 law_meritocratic_cabinet_desc:0 "Kabinettsmitglieder werden aufgrund ihrer Fähigkeiten und nicht aufgrund ihrer Verbindungen zum Herrscher ausgewählt."  #NT!
  
 law_executive_supremacy:0 "Führungsüberlegenheit"  #NT!
 law_executive_supremacy_desc:0 "Der Gesetzgeber und die Judikative dürfen eine Entscheidung der Exekutive nicht außer Kraft setzen."  #NT!
 law_legislative_supremacy:0 "Parlamentarische Vormachtstellung"  #NT!
 law_legislative_supremacy_desc:0 "Die Exekutive und die Judikative dürfen eine Entscheidung der Legislative nicht außer Kraft setzen."  #NT!
 law_constitutional_supremacy:0 "Verfassungsmäßige Vorherrschaft"  #NT!
 law_constitutional_supremacy_desc:0 "Die Verfassung ist das oberste Gesetz des Landes und darf nur durch eine Verfassungsänderung durch den Gesetzgeber verletzt werden."  #NT!
  
 law_kangaroo_law:0 "Konforme Justiz"  #NT!
 law_kangaroo_law_desc:0 "Der Judikative ist es nicht gestattet, die Exekutive oder Legislative außer Kraft zu setzen."  #NT!
 law_civil_law:0 "Schwache Justiz"  #NT!
 law_civil_law_desc:0 "Der Justiz ist es gestattet, einige Arten von Maßnahmen der Exekutive und nicht verfassungsgemäße [Concept('concept_law','$concept_laws$')] außer Kraft zu setzen."  #NT!
 law_common_law:0 "Mächtige Justiz"  #NT!
 law_common_law_desc:0 "Die Justiz hat die volle Macht, Maßnahmen der Exekutive außer Kraft zu setzen und [Concept('concept_law','$concept_laws$')]."  #NT!
  
 law_peasant_levies:0 "Entmilitarisiert"  #NT!
 law_peasant_levies_desc:0 "Der Staat darf kein stehendes Heer haben."  #NT!
 law_mass_conscription:0 "Wehrpflichtige Armee"  #NT!
 law_mass_conscription_desc:0 "Das Militär besteht sowohl aus Berufssoldaten als auch aus Wehrpflichtigen."  #NT!
  
 law_ethnostate:0 "Ethnostaat"  #NT!
 law_national_supremacy:0 "Nationale Vorherrschaft"  #NT!
 law_multicultural:0 "Multikulturalismus"  #NT!
  
 law_no_womens_rights:0 "Keine Frauenrechte"  #NT!
 law_some_womens_rights:0 "Einige Frauenrechte"  #NT!
 law_some_womens_rights_desc:0 "$law_women_in_the_workplace_desc$"  #NT!
 law_full_womens_rights:0 "Volle Frauenrechte"  #NT!
 law_full_womens_rights_desc:0 "$law_womens_suffrage_desc$"  #NT!
  
 law_outlawed_dissent:0 "Keine freie Meinungsäußerung"  #NT!
 law_censorship:0 "Zensierte Rede"  #NT!
 law_limited_free_speech:0 "Eingeschränkte freie Meinungsäußerung"  #NT!
 law_limited_free_speech_desc:0 "$law_right_of_assembly_desc$"  #NT!
 law_full_free_speech:0 "Volle freie Meinungsäußerung"  #NT!
 law_full_free_speech_desc:0 "$law_protected_speech_desc$"  #NT!
  
 law_no_secret_police:0 "Keine Geheimpolizei"  #NT!
 law_no_secret_police_desc:0 "Es gibt keine Geheimpolizei im Land."  #NT!
 law_secret_police:0 "Geheimpolizei"  #NT!
  
 law_no_espionage:0 "Keine ausländischen Geheimdienste"  #NT!
 law_no_espionage_desc:0 "Der Staat verfügt über keine ausländischen Geheimdienste."  #NT!
 law_defensive_espionage:0 "Nur defensive Spionage"  #NT!
 law_defensive_espionage_desc:0 "Der Staat verfügt über einen Auslandsnachrichtendienst, der befugt ist, ausländischem Einfluss und Aktivitäten im Land entgegenzuwirken."  #NT!
 law_offensive_espionage:0 "Offensive Spionage erlaubt"  #NT!
 law_offensive_espionage_desc:0 "Der Staat verfügt über einen Auslandsgeheimdienst, der befugt ist, ausländischem Einfluss und Aktivitäten im Land entgegenzuwirken und feindselige Spionage gegen andere Länder durchzuführen."  #NT!
  
 law_lenient_policing:0 "Nachsichtige Polizeiarbeit"  #NT!
 law_lenient_policing_desc:0 "Die Durchsetzungs- und Ermittlungsbefugnisse der Polizei sind stark zugunsten der Angeklagten ausgerichtet."  #NT!
 law_balanced_policing:0 "Ausgewogene Polizeiarbeit"  #NT!
 law_balanced_policing_desc:0 "Die Durchsetzungs- und Ermittlungsbefugnisse der Polizei werden gegen die Interessen des Angeklagten abgewogen."  #NT!
 law_strict_policing:0 "Strenge Polizeiarbeit"  #NT!
 law_strict_policing_desc:0 "Die Durchsetzungs- und Ermittlungsbefugnisse der Polizei sind zugunsten der Polizei verzerrt."  #NT!
 law_draconian_policing:0 "Drakonische Polizeiarbeit"  #NT!
 law_draconian_policing_desc:0 "Gefangene und beschuldigte Personen sind der Polizei völlig ausgeliefert."  #NT!
  
 law_slavery_banned:0 "Keine Konzentrationslager"  #NT!
 law_slavery_banned_desc:0 "Im Land gibt es keine Konzentrationslager."  #NT!
 law_slavery_political:0 "Gulags"  #NT!
 law_slavery_political_desc:0 "Politische Dissidenten werden in weitläufigen Konzentrationslagern inhaftiert und zur Zwangsarbeit verurteilt."  #NT!
 law_slavery_cultural:0 "Kulturelle Unterdrückung"  #NT!
 law_slavery_cultural_desc:0 "Die Regierung unterdrückt systematisch jeden, der im Land durch [concept_culture] oder [concept_religion] diskriminiert wird."  #NT!
  
 law_colonial_resettlement:0 "Aufbau einer kolonialen Nation"  #NT!
 law_colonial_resettlement_desc:0 "Kolonien sollen sowohl industriell als auch politisch entwickelt werden."  #NT!
 law_colonial_exploitation_desc:0 "Kolonien werden nur zur Ressourcengewinnung genutzt und den Eingeborenen werden keine politischen Rechte eingeräumt."  #NT!
  
 law_trade_unions_banned:0 "Gewerkschaften verboten"  #NT!
 law_trade_unions_banned_desc:0 "Im Land sind keine Gewerkschaften zugelassen."  #NT!
 law_state_trade_unions:0 "Nur Landesgewerkschaften"  #NT!
 law_state_trade_unions_desc:0 "Im Land sind nur staatlich kontrollierte Gewerkschaften zugelassen."  #NT!
 law_restricted_trade_unions:0 "Begrenzte Gewerkschaften"  #NT!
 law_restricted_trade_unions_desc:0 "Unabhängige Gewerkschaften sind erlaubt, ihre Befugnisse sind jedoch eingeschränkt."  #NT!
 law_full_trade_unions:0 "Uneingeschränkte Gewerkschaften"  #NT!
 law_full_trade_unions_desc:0 "Unabhängige Gewerkschaften sind zugelassen und ihre Befugnisse zur Durchführung von Arbeitskämpfen sind uneingeschränkt."  #NT!
  
 law_no_war:0 "Neutrales Land"  #NT!
 law_no_war_desc:0 "Es ist uns nicht gestattet, den Krieg zu erklären oder einem internationalen militärischen oder politischen Bündnis beizutreten."  #NT!
 law_defensive_war:0 "Nur Verteidigungskriege"  #NT!
 law_defensive_war_desc:0 "Wir dürfen nur bestimmte Arten von Kriegen erklären."  #NT!
 law_offensive_war:0 "Volle Kriegsrechte"  #NT!
 law_offensive_war_desc:0 "Es gibt keine Beschränkungen hinsichtlich der Art der Kriege, die wir beginnen können."  #NT!
  
 law_wmd_banned:0 "Massenvernichtungswaffen verboten"  #NT!
 law_wmd_banned_desc:0 "Es ist uns nicht gestattet, Massenvernichtungswaffen zu entwickeln oder zu besitzen."  #NT!
 law_wmd_allowed:0 "Massenvernichtungswaffen erlaubt"  #NT!
 law_wmd_allowed_desc:0 "Es ist uns gestattet, Massenvernichtungswaffen zu entwickeln oder zu besitzen."  #NT!
  
 law_no_civil_defence_law:0 "Kein Zivilschutz"  #NT!
 law_very_weak_civil_defence_law:0 "Sehr schwacher Zivilschutz"  #NT!
 law_weak_civil_defence_law:0 "Schwacher Zivilschutz"  #NT!
 law_moderate_civil_defence_law:0 "Moderater Zivilschutz"  #NT!
 law_strong_civil_defence_law:0 "Starker Zivilschutz"  #NT!
 law_very_strong_civil_defence_law:0 "Sehr starker Zivilschutz"  #NT!
  
 law_no_space_program:0 "Kein Weltraumprogramm"  #NT!
 law_space_program_public:0 "Programm für den öffentlichen Raum"  #NT!
 law_space_program_private:0 "Privates Weltraumprogramm"  #NT!
  
 law_no_social_security:0 "Keine Sozialversicherung"  #NT!
 law_low_social_security:0 "Schwache soziale Sicherheit"  #NT!
 law_low_social_security_desc:0 "$law_poor_laws_desc$"  #NT!
 law_medium_social_security:0 "Moderate soziale Sicherheit"  #NT!
 law_medium_social_security_desc:0 "$law_wage_subsidies_desc$"  #NT!
 law_high_social_security:0 "Starke soziale Sicherheit"  #NT!
 law_high_social_security_desc:0 "$law_old_age_pension_desc$"  #NT!
  
 law_very_low_anti_corruption:0 "Sehr schwache Antikorruptionsgesetze"  #NT!
 law_very_low_anti_corruption_desc:0 "Korruption ist praktisch legalisiert."  #NT!
 law_low_anti_corruption:0 "Schwache Antikorruptionsgesetze"  #NT!
 law_low_anti_corruption_desc:0 "Nur die schlimmsten Formen der Korruption sind verboten."  #NT!
 law_medium_anti_corruption:0 "Anständige Antikorruptionsgesetze"  #NT!
 law_medium_anti_corruption_desc:0 "Korruption ist gewissermaßen verboten."  #NT!
 law_high_anti_corruption:0 "Strenge Antikorruptionsgesetze"  #NT!
 law_high_anti_corruption_desc:0 "Die meisten Arten von Korruption sind gesetzlich verboten."  #NT!
 law_very_high_anti_corruption:0 "Sehr strenge Antikorruptionsgesetze"  #NT!
 law_very_high_anti_corruption_desc:0 "Korruption jeglicher Art ist gesetzlich verboten."  #NT!
  
 law_state_capitalism:0 "Staatskapitalismus"  #NT!
  
 law_gold_standard:0 "Goldstandard"  #NT!
 law_gold_standard_desc:0 "Ein Goldstandard ist ein Währungssystem, bei dem die wirtschaftliche Standardrechnungseinheit auf einer festen Goldmenge basiert."  #NT!
 law_semi_gold_standard:0 "Halbgoldstandard"  #NT!
 law_semi_gold_standard_desc:0 "Ein Halbgoldstandard ist ein Währungssystem, bei dem die standardmäßige wirtschaftliche Rechnungseinheit auf einer festen Menge Gold und einer festen Menge einer Fremdwährung basiert."  #NT!
 law_fiat_standard:0 "Fiat-Standard"  #NT!
 law_fiat_standard_desc:0 "Fiat-Geld ist eine Art Währung, die nicht durch ein Edelmetall wie Gold oder Silber oder einen anderen materiellen Vermögenswert oder eine andere Ware gedeckt ist."  #NT!
  
 law_no_economic_specialisation:0 "Keine wirtschaftliche Spezialisierung"  #NT!
 law_natural_resource_focus:0 "Fokus auf natürliche Ressourcen"  #NT!
 law_manufacturing_focus:0 "Fertigungsschwerpunkt"  #NT!
 law_services_focus:0 "Fokus auf den Dienstleistungssektor"  #NT!
  
 law_taxation_1:0 "Sehr regressive Steuern"  #NT!
 law_taxation_1_desc:0 "Steuergesetze begünstigen stark die Reichen."  #NT!
 law_taxation_2:0 "Regressive Steuern"  #NT!
 law_taxation_2_desc:0 "Steuergesetze begünstigen die Reichen."  #NT!
 law_taxation_3:0 "Proportionale Steuern"  #NT!
 law_taxation_3_desc:0 "Steuergesetze begünstigen weder die Reichen noch die Armen."  #NT!
 law_taxation_4:0 "Progressive Steuern"  #NT!
 law_taxation_4_desc:0 "Steuergesetze begünstigen die Armen auf Kosten der Reichen."  #NT!
 law_taxation_5:0 "Sehr progressive Steuern"  #NT!
 law_taxation_5_desc:0 "Steuergesetze begünstigen massiv die Armen auf Kosten der Reichen."  #NT!
  
 law_very_deflationary_monetary_policy:0 "Sehr deflationäre Geldpolitik"  #NT!
 law_very_deflationary_monetary_policy_desc:0 "Die stark deflationäre Geldpolitik zielt darauf ab, die Geldmenge zu reduzieren und die Zinssätze zu erhöhen, um die Inflation zu bekämpfen, indem sie die Gesamtnachfrage drosselt und die Wirtschaft abkühlt."  #NT!
 law_deflationary_monetary_policy:0 "Deflationäre Geldpolitik"  #NT!
 law_deflationary_monetary_policy_desc:0 "Die deflationäre Geldpolitik zielt darauf ab, die Geldmenge zu reduzieren und die Zinssätze zu erhöhen, um die Inflation zu bekämpfen, indem sie die Gesamtnachfrage drosselt und die Wirtschaft abkühlt."  #NT!
 law_neutral_monetary_policy:0 "Neutrale Geldpolitik"  #NT!
 law_neutral_monetary_policy_desc:0 "Eine neutrale Geldpolitik ist ein Zinssatz, der das Wirtschaftswachstum weder stimuliert noch hemmt und auf einen ausgewogenen Ansatz für Inflation und Wachstum abzielt."  #NT!
 law_expansionary_monetary_policy:0 "Expansive Geldpolitik"  #NT!
 law_expansionary_monetary_policy_desc:0 "Die von den Zentralbanken umgesetzte expansive Geldpolitik zielt darauf ab, das Wirtschaftswachstum anzukurbeln, indem die Geldmenge erhöht und die Zinssätze gesenkt werden, wodurch Kreditaufnahme und Ausgaben gefördert werden."  #NT!
 law_very_expansionary_monetary_policy:0 "Sehr expansive Geldpolitik"  #NT!
 law_very_expansionary_monetary_policy_desc:0 "Die von den Zentralbanken umgesetzte sehr expansive Geldpolitik zielt darauf ab, das Wirtschaftswachstum anzukurbeln, indem die Geldmenge erhöht und die Zinssätze gesenkt werden, wodurch Kreditaufnahme und Ausgaben gefördert werden."  #NT!
  
 law_charitable_health_system:0 "Private Gesundheitsversorgung"  #NT!
 law_private_health_insurance:0 "Subventionierte Gesundheitsversorgung"  #NT!
 law_public_health_insurance:0 "Kostenlose Gesundheitsversorgung"  #NT!
  
 law_charitable_health_system_desc:0 "Die Gesundheitsversorgung erfolgt durch gemeinnützige und gemeinnützige Einrichtungen. Der Zugang hängt von Spenden und der Unterstützung der Gemeinschaft ab, wodurch die Abdeckung uneinheitlich und oft begrenzt ist."  #NT!
 law_private_health_insurance_desc:0 "Die medizinische Versorgung wird über private Krankenversicherungen finanziert. Die Bürger müssen Prämien zahlen, und der Zugang spiegelt Wohlstand und Beschäftigung wider, was die soziale Spaltung verstärkt."  #NT!
 law_public_health_insurance_desc:0 "Der Staat garantiert die Gesundheitsversorgung für alle. Dieses aus öffentlichen Mitteln finanzierte System gewährleistet den universellen Zugang und gestaltet die Gesellschaft im Hinblick auf kollektives Wohlergehen und Sicherheit neu."  #NT!
  
 law_religious_schools:0 "Private Bildung"  #NT!
 law_private_schools:0 "Subventionierte Bildung"  #NT!
 law_public_schools:0 "Kostenlose Bildung"  #NT!
  
 law_religious_schools_desc:0 "Die Bildung wird privaten Institutionen anvertraut, die sich oft an religiösen oder gemeinschaftlichen Traditionen orientieren. Der Zugang ist begrenzt und die Lehrpläne spiegeln die Werte derjenigen wider, die sie finanzieren."  #NT!
 law_private_schools_desc:0 "Die Schulen erhalten teilweise staatliche Unterstützung, behalten jedoch die private Leitung. Dieses Gleichgewicht erweitert den Zugang, bewahrt aber den Einfluss der Elite auf die Bildung."  #NT!
 law_public_schools_desc:0 "Der Staat garantiert allen Kindern kostenlosen Schulbesuch. Der universelle Zugang verändert die Gesellschaft und fördert Alphabetisierung, bürgerliche Identität und soziale Mobilität."  #NT!
  
