 lawgroup_minority_issues:0 "Lebensstilgesetze"  #NT!
 law_no_minority_issues:0 "Nur Traditionalistische Lebensstile"  #NT!
 law_some_minority_issues:0 "Konservative Lebensstilgesetze"  #NT!
 law_full_minority_issues:0 "Liberale Lebensstile erlaubt"  #NT!
 law_no_minority_issues_desc:0 "Die Regierung vertritt eine Traditionalist-Haltung in Bezug auf soziale Themen wie Alkoholkonsum, Drogen und LGBTQ+-Rechte. \n\nUnter diesem [concept_law] wird der Popkonsum von [GetGoods('opium').GetName], [GetGoods('tobacco').GetName], [GetGoods('liquor').GetName] und [GetGoods('wine').GetName] verboten."  #NT!
 law_some_minority_issues_desc:0 "Die Regierung vertritt eine konservative Haltung zu sozialen Themen wie Alkoholkonsum, Drogen und LGBTQ+-Rechten. \n\nUnter diesem [concept_law] wird der Popkonsum von [GetGoods('opium').GetName] verboten."  #NT!
 law_full_minority_issues_desc:0 "Die Regierung nimmt eine freizügige Haltung gegenüber sozialen Themen wie Alkoholkonsum, Drogen und LGBTQ+-Rechten ein."  #NT!
  
 amendment_symbolic_monarchy:0 "Symbolische Monarchie"  #NT!
 amendment_symbolic_monarchy_desc:0 "Gemäß der Verfassung ist der rechtliche Status des Monarchen der eines „Symbols des Staates und der Einheit des Volkes“, ohne Befugnisse im Zusammenhang mit der Regierung. Die Position ist völlig zeremoniell und erhält ihre Legitimität aus dem Willen des Volkes, bei dem die Souveränität liegt."  #NT!
  
 amendment_rotating_presidency:0 "Kollektives Staatsoberhaupt"  #NT!
 amendment_rotating_presidency_desc:0 "Ein kollektives Staatsoberhaupt ist ein Regierungssystem, bei dem die zeremoniellen und exekutiven Pflichten eines Staatsoberhauptes von einer Gruppe von Menschen geteilt werden und nicht bei einer einzelnen Person liegen."  #NT!
  
