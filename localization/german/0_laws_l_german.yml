 law_moderate_environment_law_desc:0 "Die Regierung verfügt über moderate Vorschriften oder Gesetze zum Schutz der Umwelt."  #NT!
 law_strong_environment_law_desc:0 "Die Regierung verfügt über strenge Vorschriften oder Gesetze zum Schutz der Umwelt."  #NT!
  
