 lawgroup_foreign_investment_policy:0 "Ausländische Investitionspolitik"  #NT!
  
 law_no_foreign_investment_policy:0 "Ausländische Investitionen verboten"  #NT!
 law_nationalist_foreign_investment_policy:0 "Beschränkte ausländische Investitionen"  #NT!
 law_full_foreign_investment_policy:0 "Unbeschränkte Auslandsinvestitionen"  #NT!
  
 law_no_foreign_investment_policy_desc:0 "Jegliche Form ausländischer Investitionen ist in diesem Land verboten. \n\nHinweis: Das Verbot nach diesem Gesetz gilt nicht für bestehende $foreign_investment_rights$ [concept_treaty] [Concept('concept_article','$concept_articles$')]."  #NT!
 law_nationalist_foreign_investment_policy_desc:0 "Es sind nur eingehende ausländische Investitionen zulässig (d. h. dieses Land kann ausländische Investitionen nur empfangen und nicht abgeben). \n\nHinweis: Das Verbot nach diesem Gesetz gilt nicht für bestehende $foreign_investment_rights$ [concept_treaty] [Concept('concept_article','$concept_articles$')]."  #NT!
 law_full_foreign_investment_policy_desc:0 "Alle Formen ausländischer Investitionen sind gesetzlich zulässig."  #NT!
  
 lawgroup_secession_rights:0 "Recht auf Rücktritt"  #NT!
  
 law_no_secession_rights:0 "Unantastbare Souveränität"  #NT!
 law_limited_secession_rights:0 "Dezentralisierung zulässig"  #NT!
 law_full_secession_rights:0 "Sezession erlaubt"  #NT!
  
 law_no_secession_rights_desc:0 "Keinem Gliedstaat ist es gestattet, mehr Autonomie zu erlangen oder sich von diesem Land abzuspalten."  #NT!
 law_limited_secession_rights_desc:0 "Den konstituierenden Staaten kann größere Autonomie zugestanden werden, sie dürfen jedoch nicht aus diesem Land austreten."  #NT!
 law_full_secession_rights_desc:0 "Den konstituierenden Staaten kann eine größere Autonomie eingeräumt werden und sie können sich von diesem Land trennen."  #NT!
  
