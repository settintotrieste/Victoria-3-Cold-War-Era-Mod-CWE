 objective_democratic_victory_cold_war:0 "Demokratischer Sieg"  #NT!
 objective_democratic_victory_cold_war_desc:0 "Erringen Sie den Sieg für den Westblock. Verbreiten Sie Demokratie und Kapitalismus auf der ganzen Welt und zerschlagen Sie den Kommunismus endgültig."  #NT!
 objective_democratic_victory_cold_war_idle_header:0 "Gewinnen Sie den Kalten Krieg"  #NT!
 objective_democratic_victory_cold_war_idle_hint:0 "Eliminieren Sie alle kommunistischen [concept_super_power] und seien Sie der einzige demokratische [concept_super_power], der noch übrig ist!"  #NT!
 objective_democratic_victory_cold_war_name_USA:0 "Vereinigte Staaten von Amerika"  #NT!
 objective_democratic_victory_cold_war_desc_USA:0 "Nach dem japanischen Angriff auf Pearl Harbor im Jahr 1941 traten die USA auf der Seite der Alliierten in den Zweiten Weltkrieg ein. Die Nachwirkungen des Krieges machten die USA und die Sowjetunion zu den beiden Supermächten der Welt und führten zum Kalten Krieg. Während des Kalten Krieges kämpften beide Länder um die ideologische Vorherrschaft, vermieden jedoch direkte militärische Konflikte."  #NT!
 objective_democratic_victory_cold_war_name_GBR:0 "Vereinigtes Königreich"  #NT!
 objective_democratic_victory_cold_war_desc_GBR:0 "Das Britische Empire umfasste auf seinem Höhepunkt in den 1920er Jahren fast ein Viertel der Landmasse und Bevölkerung der Welt und war das größte Imperium der Geschichte. Seine Beteiligung am Ersten und Zweiten Weltkrieg, die sich verschärfende Krise und der Prestigeverlust führten jedoch zur Entkolonialisierung der meisten britischen Kolonien und schließlich zum Ende des Empire."  #NT!
 objective_democratic_victory_cold_war_name_FRA:0 "Frankreich"  #NT!
 objective_democratic_victory_cold_war_desc_FRA:0 "Frankreich gehörte zu den alliierten Mächten des Zweiten Weltkriegs, kapitulierte jedoch und wurde 1940 von der Achse besetzt. Nach der Befreiung im Jahr 1944 wurde die kurzlebige Vierte Republik gegründet, die später im Zuge der Niederlage im Algerienkrieg aufgelöst wurde. Die heutige Fünfte Republik wurde 1958 von Charles de Gaulle gegründet. Algerien und die meisten französischen Kolonien wurden in den 1960er Jahren unabhängig, wobei die meisten weiterhin enge wirtschaftliche und militärische Beziehungen zu Frankreich unterhielten."  #NT!
 objective_democratic_victory_cold_war_name_ROC:0 "Republik China"  #NT!
 objective_democratic_victory_cold_war_desc_ROC:0 "Der Zweite Weltkrieg verwüstete China und führte zu enormen Verlusten an Menschenleben und materieller Zerstörung. Der Krieg zwischen China und Japan dauerte bis zur Kapitulation Japans am Ende des Zweiten Weltkriegs im Jahr 1945, was dazu führte, dass Taiwan unter chinesische Verwaltung gestellt wurde. Nach dem Zweiten Weltkrieg kam es erneut zum Bürgerkrieg zwischen den von der Republik China befreiten Gebieten und den von den Kommunisten befreiten Gebieten. 1949 verlegte die Republik China ihre Hauptstadt nach Taiwan, um dem Vormarsch der Kommunisten zu entgehen."  #NT!
  
 objective_non_aligned_victory_cold_war:0 "Blockfreier Sieg"  #NT!
 objective_non_aligned_victory_cold_war_desc:0 "Beweisen Sie, dass nicht nur die Europäer oder Nordamerikaner auf der globalen Bühne mächtig sein können."  #NT!
 objective_non_aligned_victory_cold_war_idle_header:0 "Werden Sie ein Blockfreier [concept_super_power]"  #NT!
 objective_non_aligned_victory_cold_war_idle_hint:0 "Werden Sie der erste nicht-europäische und nicht-nordamerikanische [concept_super_power] der Welt und schließen Sie sich weder dem Ost- noch dem Westblock an."  #NT!
 objective_non_aligned_victory_cold_war_name_HND:0 "Indien"  #NT!
 objective_non_aligned_victory_cold_war_desc_HND:0 "Im Jahr 1947 wurde das Britisch-Indische Reich in zwei unabhängige Herrschaftsgebiete aufgeteilt, ein mehrheitlich hinduistisches Herrschaftsgebiet in Indien und ein mehrheitlich muslimisches Herrschaftsgebiet in Pakistan, was zu zahlreichen Todesopfern und einer beispiellosen Migration führte. Von entscheidender Bedeutung für Indiens Selbstverständnis als unabhängige Nation war seine 1950 fertiggestellte Verfassung, die eine säkulare und demokratische Republik begründete."  #NT!
 objective_non_aligned_victory_cold_war_name_YUG:0 "Jugoslawien"  #NT!
 objective_non_aligned_victory_cold_war_desc_YUG:0 "Das Königreich wurde am 6. April 1941 von den Achsenmächten überfallen. 1943 wurde vom Partisanenwiderstand ein Demokratisches Föderatives Jugoslawien ausgerufen. 1944 erkannte der damals im Exil lebende König Peter II. sie als legitime Regierung an. Anschließend wurde die Monarchie im November 1945 abgeschafft. Jugoslawien wurde 1945 mit der Bildung einer kommunistischen Regierung in Föderative Volksrepublik Jugoslawien umbenannt."  #NT!
 objective_non_aligned_victory_cold_war_name_IDO:0 "Indonesien"  #NT!
 objective_non_aligned_victory_cold_war_desc_IDO:0 "Die japanische Besatzung im Zweiten Weltkrieg beendete die niederländische Herrschaft und förderte die Unabhängigkeitsbewegung. Zwei Tage nach der Kapitulation Japans im August 1945 verkündeten Sukarno und Mohammad Hatta die Unabhängigkeit Indonesiens. Die Niederlande versuchten, ihre Herrschaft wiederherzustellen und begannen mit der Indonesischen Nationalrevolution, die im Dezember 1949 endete, als die Niederländer angesichts des internationalen Drucks die Unabhängigkeit Indonesiens anerkannten."  #NT!
 objective_non_aligned_victory_cold_war_name_EGY:0 "Ägypten"  #NT!
 objective_non_aligned_victory_cold_war_desc_EGY:0 "Die meisten britischen Truppen wurden 1947 in die Gegend des Suezkanals abgezogen, doch nach dem Krieg nahmen die nationalistischen, antibritischen Gefühle weiter zu. Nach der katastrophalen Leistung des Königreichs im Ersten Arabisch-Israelischen Krieg nahmen die antimonarchischen Gefühle weiter zu. Bei den Wahlen von 1950 errang die nationalistische Wafd-Partei einen Erdrutschsieg und der König war gezwungen, Mostafa El-Nahas zum neuen Premierminister zu ernennen."  #NT!
  
 objective_communist_victory_cold_war:0 "Kommunistischer Sieg"  #NT!
 objective_communist_victory_cold_war_desc:0 "Erringen Sie den Sieg für den Ostblock. Verbreiten Sie den Kommunismus auf der ganzen Welt und zerschlagen Sie den Kapitalismus endgültig."  #NT!
 objective_communist_victory_cold_war_idle_header:0 "Gewinnen Sie den Kalten Krieg"  #NT!
 objective_communist_victory_cold_war_idle_hint:0 "Eliminieren Sie alle demokratischen [concept_super_power] und seien Sie der einzige kommunistische [concept_super_power], der noch übrig ist!"  #NT!
 objective_communist_victory_cold_war_name_SOV:0 "die Sowjetunion"  #NT!
 objective_communist_victory_cold_war_desc_SOV:0 "In der unmittelbaren Nachkriegszeit baute die Sowjetunion ihre Wirtschaft wieder auf und erweiterte sie unter Beibehaltung ihrer streng zentralisierten Kontrolle. Es übernahm die faktische Kontrolle über die meisten Länder Osteuropas (außer Jugoslawien und später Albanien) und verwandelte sie in Satellitenstaaten. Aus Angst vor ihren Ambitionen wurden die Kriegsverbündeten der Sowjetunion, das Vereinigte Königreich und die Vereinigten Staaten, zu ihren Feinden. Im darauffolgenden Kalten Krieg gerieten die beiden Seiten indirekt in Stellvertreterkriegen aneinander."  #NT!
 objective_communist_victory_cold_war_name_PRC:0 "Volksrepublik China"  #NT!
 objective_communist_victory_cold_war_desc_PRC:0 "Nach dem chinesischen Bürgerkrieg und dem Sieg der kommunistischen Streitkräfte Mao Zedongs über die Kuomintang-Truppen des nach Taiwan geflohenen Generalissimus Chiang Kai-shek proklamierte Mao Zedong am 1. Oktober 1949 die Gründung der Volksrepublik China (VR China). Unter Maos Herrschaft durchlief China einen sozialistischen Wandel von einer traditionellen Bauerngesellschaft, die sich der Schwerindustrie in der Planwirtschaft zuwandte."  #NT!
  
 objective_hegemon_idle_header:0 "Weltherrschaft"  #NT!
 objective_hegemon_idle_hint:0 "Werde der einzige [concept_super_power] der Welt."  #NT!
 objective_hegemon_name_USA:0 "Vereinigte Staaten von Amerika"  #NT!
