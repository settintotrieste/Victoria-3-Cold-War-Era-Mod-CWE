 migration_treaty:0 "Migrationsabkommen"  #NT!
 migration_treaty_effects_desc:0 "• Eine Vereinbarung zwischen zwei [Concept('concept_country', '$concept_countries$')], bei der ein Land sich bereit erklärt, ein [concept_mass_migration]-Ziel in einem anderen Land zu schaffen"  #NT!
 migration_treaty_article_short_desc:0 "[SOURCE_COUNTRY.GetNameNoFormatting] soll ein [concept_mass_migration]-Ziel in [TARGET_COUNTRY.GetNameNoFormatting] erstellen"  #NT!
 DIPLOMATIC_ACCEPTANCE_MIGRATION_STANCE:0 "[concept_ruler]s Haltung zu $lawgroup_migration$ [Concept('concept_law', '$concept_laws$')]"  #NT!
  
 economic_privatisation:0 "Wirtschaftliche Privatisierung"  #NT!
 economic_privatisation_effects_desc:0 "• Eine Vereinbarung zwischen zwei [Concept('concept_country', '$concept_countries$')], bei der ein Land sich bereit erklärt, alle seine [Concept('concept_building', '$concept_buildings$')] für [Concept('concept_privatize', '$concept_privatization$')] verfügbar zu machen"  #NT!
 economic_privatisation_article_short_desc:0 "[SOURCE_COUNTRY.GetNameNoFormatting] stellt alle seine $concept_buildings$ für $concept_privatization$ zur Verfügung"  #NT!
  
 concept_trade_agreement:0 "Freihandelsabkommen"  #NT!
  
 concept_protectorate:0 "Client-Status"  #NT!
 concept_protectorate_desc:2 "Klientelstaaten sind souveräne Länder, die unter den Einfluss eines Landes geraten sind; Es ist de facto [concept_overlord]. Ein $concept_protectorate$ kann sein eigenes [Concept('concept_diplomatic_play','$concept_diplomatic_plays$')] gründen und ist nicht verpflichtet, sich allen [Concept('concept_war','$concept_wars$')] der $concept_overlord$ anzuschließen. Ein [concept_country] kann darum bitten oder darum gebeten werden, ein $concept_protectorate$ unter einem [concept_overlord] zu werden, ohne das Risiko eines [concept_war] einzugehen, wenn das Angebot abgelehnt wird."  #NT!
  
 concept_literacy:0 "Hochschulbildung"  #NT!
 concept_literate:0 "Hochgebildet"  #NT!
 concept_literacy_desc:2 "Der Prozentsatz oder die absolute Anzahl der Personen in einem [concept_pop], die einen Hochschulabschluss erworben haben. Bestimmte [Concept('concept_profession', '$concept_professions$')] erfordern höhere $concept_literacy$ als andere, wodurch die [concept_pop_qualifications] für $concept_pops$ in anderen $concept_professions$ begrenzt werden, es sei denn, ihr $concept_literacy$ ist hoch genug. Sie können in Ihren [SelectLocalization(GetPlayer.IsValid,'concept_literacy_desc_added','Education')] investieren, um im Laufe der Zeit einen höheren $concept_literacy$ in Ihrem $concept_population$ zu entwickeln."  #NT!
 concept_literacy_desc_added:0 "[GetInstitutionType('institution_schools').GetName]"  #NT!
  
 concept_culture:0 "Identität"  #NT!
 concept_cultures:1 "Identitäten"  #NT!
 concept_culture_possessive:1 "Identitäten"  #NT!
 concept_culture_desc:2 "Alle [Concept('concept_pop', '$concept_pops$')] haben ein $concept_culture$, das sich nur durch [concept_assimilation] ändern kann. Ihre $concept_culture$ bestimmt, welche [Concept('concept_state_region','$concept_state_regions$')] sie als ihre [Concept('concept_homeland','$concept_homelands$')] betrachten und ob sie [Concept('concept_discrimination','$concept_discriminated_against$')] in ihrer [concept_country] sind oder nicht."  #NT!
  
 concept_accepted_culture:0 "Akzeptierte Identität"  #NT!
 concept_accepted_cultures:0 "Akzeptierte Identitäten"  #NT!
 concept_accepted_culture_short:0 "Akzeptiert"  #NT!
 concept_accepted_culture_desc:2 "Ein [Concept('concept_country','$concept_country_possessive$')] $concept_accepted_cultures$ besteht aus seinem [concept_primary_cultures] sowie allen anderen [Concept('concept_culture','$concept_cultures$')], die aufgrund der aktuellen [SelectLocalization(GetPlayer.IsValid, 'concept_accepted_culture_desc_added','Citizenship')] [concept_law] der $concept_country$ als $concept_accepted_culture_short$ berücksichtigt werden."  #NT!
 concept_accepted_culture_desc_added:0 "[GetLawType('law_national_supremacy').GetGroup.GetName]"  #NT!
  
 concept_primary_cultures:0 "Primäre Identitäten"  #NT!
 concept_primary_culture:0 "Primäre Identität"  #NT!
  
 concept_cultural_trait:0 "Kulturelles Merkmal"  #NT!
 concept_cultural_traits:1 "Kulturelle Merkmale"  #NT!
 concept_cultural_trait_desc:2 "Aspekte eines [concept_culture] wie seine vorherrschende Sprache und aus welchem ​​Teil der Welt es stammt. Die Ähnlichkeit zwischen dem $concept_cultural_traits$ eines [Concept('concept_country','$concept_country_possessive$')] [Concept('concept_primary_cultures','$concept_primary_culture$')] und dem $concept_culture$ eines [concept_pop], kombiniert mit dem aktuellen [GetLawType('law_national_supremacy').GetGroup.GetName] [concept_law] des $concept_country$, bestimmt, ob der $concept_pop$ $concept_cultural_traits$0 ist oder nicht."  #NT!
  
 concept_cultural_heritage_trait:0 "Kulturelles Merkmal des Erbes"  #NT!
 concept_cultural_heritage_traits:0 "Kulturelle Merkmale des Erbes"  #NT!
 concept_cultural_heritage_trait_desc:2 "Ein Typ von [concept_cultural_trait], der die allgemeine Region der Welt angibt, aus der [concept_culture] stammt. Bestimmte [SelectLocalization(GetPlayer.IsValid,'concept_accepted_culture_desc_added','Citizenship')] [Concept('concept_law','$concept_laws$')] halten $concept_cultural_heritage_traits$ für wichtiger als andere $concept_cultural_traits$, wenn sie entscheiden, ob ein [concept_pop] [Concept('concept_discrimination','$concept_discriminated_against$')] sein sollte oder nicht."  #NT!
 concept_cultural_heritage_trait_desc_added:0 "[GetLawType('law_national_supremacy').GetGroup.GetName]"  #NT!
  
