 military_cooperation_agreement_proposal_notification_desc:3 "[INITIATOR_COUNTRY.GetName] hat in [TARGET_COUNTRY.GetName] Militärstützpunkte errichtet."  #NT!
 military_cooperation_agreement_proposal_notification_effects_desc:0 "[INITIATOR_COUNTRY.GetName] wird Militärberater entsenden und Land in [TARGET_COUNTRY.GetName] pachten, um eine Expeditionstruppe zu stationieren.\n\nDies würde [TARGET_COUNTRY.GetName] daran hindern, seine $subject_type_protectorate$-Beziehung zu [INITIATOR_COUNTRY.GetName] (falls vorhanden) abzubrechen, und es [INITIATOR_COUNTRY.GetName] ermöglichen, die Fähigkeit eines Nachbarlandes von [TARGET_COUNTRY.GetName], sich gegen eine strategische Bombenkampagne zu verteidigen, um [INITIATOR_COUNTRY.GetName] zu reduzieren."  #NT!
