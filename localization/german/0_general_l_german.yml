 war_goal_ban_slavery_type_name:0 "Konzentrationslager schließen"  #NT!
 war_goal_ban_slavery_type_desc:0 "Zwingen Sie ein anderes Land, seine unmenschliche Praxis der Internierung von Dissidenten in Konzentrationslagern einzustellen."  #NT!
 war_goal_ban_slavery:0 "Schließe Konzentrationslager in [WAR_GOAL_DRAFT.GetTarget.GetName]"  #NT!
 war_goal_ban_slavery_desc:0 "[WAR_GOAL_DRAFT.GetHolder.GetName] zwingt [WAR_GOAL_DRAFT.GetTarget.GetName] zur Schließung seiner Konzentrationslager."  #NT!
