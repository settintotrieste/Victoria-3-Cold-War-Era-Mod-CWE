 concept_unrecognized_power_desc:0 "$concept_unrecognized_powers$ sind [Concept('concept_country','$concept_country_polities$')], die nicht Mitglieder der Generalversammlung der Vereinten Nationen sind. Infolgedessen wird ihr [concept_prestige] bestraft und sie können mit härteren [Concept('concept_diplomatic_play','$concept_diplomatic_plays$')] angegriffen werden. Außerdem sind sie hinsichtlich der [Concept('concept_rank','$concept_ranks$')], die sie erreichen dürfen, eingeschränkt, unabhängig davon, wie viel $concept_prestige$ sie erwerben.[AddLocalizationIf(GetPlayer.IsValid,'concept_unrecognized_power_desc_added')]"  #NT!
 concept_unrecognized_power_desc_added:0 "\n\nEin $concept_unrecognized_power$, der diese Strafen aufheben möchte, muss die Anerkennung der Vereinten Nationen beantragen, indem er die Entscheidung #y $join_unga_decision$#! erfüllt."  #NT!
  
