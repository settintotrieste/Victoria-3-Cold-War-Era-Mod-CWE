 concept_corruption:0 "Korruption in der Regierung"  #NT!
 concept_corruption_desc:0 "Unter Korruption versteht man unehrliches oder betrügerisches Verhalten von Personen im öffentlichen Dienst, in der Regel durch die Annahme von Bestechungsgeldern oder die Veruntreuung öffentlicher Gelder für den persönlichen Gebrauch. Solche Aktivitäten werden in diesem Mod dadurch dargestellt, dass [concept_government] [Concept('concept_building', '$concept_buildings$')] $illegal_services$ verbraucht, was zur Folge hat, dass die Bürokratie ineffizienter wird und öffentliche Gelder an den privaten Sektor fließen."  #NT!
