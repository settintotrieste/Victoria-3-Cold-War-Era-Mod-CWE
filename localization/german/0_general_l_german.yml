l_german:
  
 concept_fervor_desc:1 "$concept_fervor$ ist ein Maß für den Nationalgeist einer [concept_culture]. [Concept('concept_pop', '$concept_pops$')] einer $concept_culture$ mit hohem $concept_fervor$ werden [Concept('concept_assimilation','$concept_assimilate$')] langsamer, bilden bei Eroberung mehr [Concept('concept_radical','$concept_radicals$')], erhöhen [concept_liberty_desire] und schließen sich eher [Concept('concept_cultural_movement', '$concept_cultural_movements$')] an.\n\n#title Die folgenden Bedingungen #b erhöhen#! $concept_fervor$:#! #indent_newline:3 \n• Als [Concept('concept_primary_cultures','$concept_primary_culture$')] eines unabhängigen [concept_country] mit einem #tooltippable;tooltip:[GetPlayer.GetTooltipTag],fervor_effects_from_citizenship_laws_tt anwendbaren#! [SelectLocalization(GetPlayer.IsValid,'CITIZENSHIP_LINK','lawgroup_citizenship')] [concept_law]\n• Anzahl [concept_casualties] dieser [concept_culture] in [concept_war]\n• hohe durchschnittliche [concept_literacy]\n• Anzahl [GetPopType('academics').GetName]-$concept_pops$ dieser $concept_culture$\n• $concept_pops$ dieser Kultur, die in $concept_countries$ mit [GetTechnology('tech_politics_2').GetName] oder [GetTechnology('tech_politics_3').GetName] [Concept('concept_technology', '$concept_technologies$')] leben\n• Als $concept_primary_culture$ eines $concept_country$ mit einer anwendbaren [GetInstitutionType('institution_schools').GetName] [concept_institution]\n• Andere $concept_culture$, die als unabhängige $concept_countries$ freigegeben wurden\n• ein [concept_national_awakening] erleben#!\n\n#title Die folgenden Bedingungen #b verringern#! $concept_fervor$:#! #indent_newline:3 \n• Als $concept_primary_culture$ eines $concept_country$ mit dem [GetLawType('law_multicultural').GetName] $concept_law$\n• hohe durchschnittliche [concept_acceptance]#!"  #NT!
  
