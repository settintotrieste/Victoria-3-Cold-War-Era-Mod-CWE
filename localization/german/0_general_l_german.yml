 dp_liberate_condominium_tooltip:1 "#header Starten Sie ein $dp_liberate_condominium$ [concept_diplomatic_play]#!\n$TOOLTIP_DELIMITER$\n$dp_liberate_condominium_desc$"  #NT!
 dp_liberate_condominium_desc:0 "Setzt den initiierenden [concept_war_goal], um eine gemeinsame Oberhoheit zu beenden."  #NT!
  
 war_goal_liberate_condominium_type_name:0 "Von gemeinsamer Oberhoheit befreien"  #NT!
 war_goal_liberate_condominium_type_desc:1 "Erzwingen Sie die Beendigung der gemeinsamen Oberhoheit."  #NT!
 war_goal_liberate_condominium:0 "Befreie [WAR_GOAL_DRAFT.GetTarget.GetName]"  #NT!
 war_goal_liberate_condominium_desc:0 "[WAR_GOAL_DRAFT.GetHolder.GetName] erzwingt die Beendigung der fremden gemeinsamen Oberhoheit über [WAR_GOAL_DRAFT.GetTarget.GetName]."  #NT!
 war_goal_liberate_condominium_sway_desc:0 "Versuchen Sie, [WAR_GOAL_DRAFT.GetHolder.GetName] davon zu überzeugen, sich Ihrer Seite anzuschließen, indem Sie das Ende der gemeinsamen Oberhoheit über [WAR_GOAL_DRAFT.GetTarget.GetName] erzwingen."  #NT!
  
 dominate_politics:0 "Beherrschen Sie die Politik"  #NT!
 dominate_politics_action_name:0 "$dominate_politics$"  #NT!
 dominate_politics_action_propose_name:0 "Fangen Sie an, die Politik zu dominieren"  #NT!
 dominate_politics_action_break_name:0 "Hören Sie auf, die Politik zu dominieren"  #NT!
 dominate_politics_pact_desc:0 "[SCOPE.GetRootScope.GetDiplomaticPact.GetFirstCountry.GetName] ist bis [Concept('concept_enactment_of_laws','$concept_enactment_of_laws_enact$')] [Concept('concept_law', '$concept_laws$')] in [SCOPE.GetRootScope.GetDiplomaticPact.GetSecondCountry.GetName] zulässig."  #NT!
 dominate_politics_desc:1 "Ein [concept_diplomatic_pact], das einem [concept_country] bis [Concept('concept_enactment_of_laws','$concept_enactment_of_laws_enact$')] [Concept('concept_law', '$concept_laws$')] in einem anderen [concept_country] ermöglicht."  #NT!
 dominate_politics_action_notification_name:1 "[INITIATOR_COUNTRY.GetAdjective] Dominanz der [TARGET_COUNTRY.GetAdjective] Politik"  #NT!
 dominate_politics_action_notification_desc:1 "[INITIATOR_COUNTRY.GetName] hat das Recht auf [Concept('concept_enactment_of_laws','$concept_enactment_of_laws_enact$')] [Concept('concept_law', '$concept_laws$')] in [TARGET_COUNTRY.GetName] erhalten."  #NT!
 dominate_politics_action_notification_break_name:1 "[INITIATOR_COUNTRY.GetAdjective] hört auf zu dominieren [TARGET_COUNTRY.GetAdjective] Politik"  #NT!
 dominate_politics_action_notification_break_desc:0 "[INITIATOR_COUNTRY.GetName] hat entschieden, dass es die Fähigkeit zu [Concept('concept_enactment_of_laws','$concept_enactment_of_laws_enact$')] [Concept('concept_law', '$concept_laws$')] in [TARGET_COUNTRY.GetName] nicht länger haben möchte"  #NT!
  
 dominate_politics_effect_desc_global:0 "Beginnt bei $dominate_politics$"  #NT!
 dominate_politics_effect_desc_first:0 "[COUNTRY.GetAdjectiveNoFlag] beginnt die Politik von [TARGET_COUNTRY.GetName] zu dominieren"  #NT!
 dominate_politics_effect_desc_third:0 "[COUNTRY.GetName] beginnt, die Politik von [AddTextIf(ObjectsEqual(GetMetaPlayer.GetPlayedOrObservedCountry.Self, TARGET_COUNTRY.Self),TARGET_COUNTRY.GetNameNoFlag)][AddTextIf(Not(ObjectsEqual(GetMetaPlayer.GetPlayedOrObservedCountry.Self, TARGET_COUNTRY.Self)),TARGET_COUNTRY.GetName)] zu dominieren"  #NT!
  
 dominate_politics_trigger_desc_global:0 "Dominiert die Politik"  #NT!
 dominate_politics_trigger_false_desc_global:0 "Dominiert #b nicht#! die Politik?"  #NT!
 dominate_politics_trigger_desc_first:0 "[COUNTRY.GetAdjectiveNoFlag] Politik wird von [TARGET_COUNTRY.GetName] dominiert"  #NT!
 dominate_politics_trigger_false_desc_first:0 "[COUNTRY.GetAdjectiveNoFlag] Politik wird von #b und nicht von #! dominiert"  #NT!
 dominate_politics_trigger_desc_third:0 "[COUNTRY.GetAdjective] Politik wird dominiert von [AddTextIf(ObjectsEqual(GetMetaPlayer.GetPlayedOrObservedCountry.Self, TARGET_COUNTRY.Self),TARGET_COUNTRY.GetNameNoFlag)][AddTextIf(Not(ObjectsEqual(GetMetaPlayer.GetPlayedOrObservedCountry.Self, TARGET_COUNTRY.Self)),TARGET_COUNTRY.GetName)]"  #NT!
 dominate_politics_trigger_false_desc_third:0 "[COUNTRY.GetAdjective] Politik bedeutet, dass #b nicht#! von [AddTextIf(ObjectsEqual(GetMetaPlayer.GetPlayedOrObservedCountry.Self, TARGET_COUNTRY.Self),TARGET_COUNTRY.GetNameNoFlag)][AddTextIf(Not(ObjectsEqual(GetMetaPlayer.GetPlayedOrObservedCountry.Self, TARGET_COUNTRY.Self)),TARGET_COUNTRY.GetName)] dominiert wird"  #NT!
  
 dp_dominate_politics:0 "$war_goal_dominate_politics_type_name$"  #NT!
 dp_dominate_politics_tooltip:1 "#header Starten Sie ein $dp_dominate_politics$ [concept_diplomatic_play]#!\n$TOOLTIP_DELIMITER$\n$dp_dominate_politics_desc$"  #NT!
 dp_dominate_politics_desc:0 "Legt das initiierende [concept_war_goal] fest, um das Ziel-[concept_country] zu zwingen, das initiierende [concept_country] zu [Concept('concept_enactment_of_laws','$concept_enactment_of_laws_enact$')] [Concept('concept_law', '$concept_laws$')] im Ziel-[concept_country] zuzulassen."  #NT!
  
 war_goal_dominate_politics_type_name:0 "Beherrschen Sie die Politik"  #NT!
 war_goal_dominate_politics_type_desc:3 "Erzwinge ein weiteres [concept_country], um dem initiierenden [concept_country] zu [Concept('concept_enactment_of_laws','$concept_enactment_of_laws_enact$')] [Concept('concept_law', '$concept_laws$')] im angestrebten [concept_country] zu ermöglichen."  #NT!
 war_goal_dominate_politics:1 "Dominiere [WAR_GOAL_DRAFT.GetTarget.GetAdjective] Politik"  #NT!
 war_goal_dominate_politics_desc:3 "[WAR_GOAL_DRAFT.GetHolder.GetName] zwingt [WAR_GOAL_DRAFT.GetTarget.GetName] dazu, [WAR_GOAL_DRAFT.GetHolder.GetAdjective] [concept_government] bis [Concept('concept_enactment_of_laws','$concept_enactment_of_laws_enact$')] [Concept('concept_law', '$concept_laws$')] in [WAR_GOAL_DRAFT.GetTarget.GetName] zuzulassen."  #NT!
 war_goal_dominate_politics_sway_desc:2 "Versuchen Sie, [WAR_GOAL_DRAFT.GetHolder.GetName] davon zu überzeugen, sich Ihrer Seite anzuschließen, indem Sie [WAR_GOAL_DRAFT.GetTarget.GetName] zwingen, [WAR_GOAL_DRAFT.GetHolder.GetName] bis [Concept('concept_enactment_of_laws','$concept_enactment_of_laws_enact$')] [Concept('concept_law', '$concept_laws$')] in [WAR_GOAL_DRAFT.GetTarget.GetName] zuzulassen"  #NT!
  
 dp_end_dominate_politics:0 "$war_goal_end_dominate_politics_type_name$"  #NT!
 dp_end_dominate_politics_tooltip:1 "#header Starten Sie ein $dp_end_dominate_politics$ [concept_diplomatic_play]#!\n$TOOLTIP_DELIMITER$\n$dp_end_dominate_politics_desc$"  #NT!
 dp_end_dominate_politics_desc:0 "Legt den initiierenden [concept_war_goal] fest, um das Ziel [concept_country] zu zwingen, sein Recht an [Concept('concept_enactment_of_laws','$concept_enactment_of_laws_enact$')] [Concept('concept_law', '$concept_laws$')] im initiierenden [concept_country] aufzugeben."  #NT!
  
 war_goal_end_dominate_politics_type_name:0 "Beschränken Sie den ausländischen Einfluss"  #NT!
 war_goal_end_dominate_politics_type_desc:3 "Zwinge einen anderen [concept_country] dazu, sein Recht an [Concept('concept_enactment_of_laws','$concept_enactment_of_laws_enact$')] [Concept('concept_law', '$concept_laws$')] im initiierenden [concept_country] aufzugeben."  #NT!
 war_goal_end_dominate_politics:1 "[WAR_GOAL_DRAFT.GetTarget.GetAdjective] Einfluss zurückhalten"  #NT!
 war_goal_end_dominate_politics_desc:3 "[WAR_GOAL_DRAFT.GetHolder.GetName] zwingt [WAR_GOAL_DRAFT.GetTarget.GetName], sein Recht an [Concept('concept_enactment_of_laws','$concept_enactment_of_laws_enact$')] [Concept('concept_law', '$concept_laws$')] in [WAR_GOAL_DRAFT.GetHolder.GetName] aufzugeben."  #NT!
 war_goal_end_dominate_politics_sway_desc:2 "Versuchen Sie, [WAR_GOAL_DRAFT.GetHolder.GetName] davon zu überzeugen, sich Ihrer Seite anzuschließen, indem Sie [WAR_GOAL_DRAFT.GetTarget.GetName] dazu zwingen, sein Recht an [Concept('concept_enactment_of_laws','$concept_enactment_of_laws_enact$')] [Concept('concept_law', '$concept_laws$')] in [WAR_GOAL_DRAFT.GetHolder.GetName] aufzugeben."  #NT!
