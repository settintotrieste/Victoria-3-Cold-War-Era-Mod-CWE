 military_cooperation_agreement_desc:3 "Dieses [concept_diplomatic_pact] ermöglicht es dem Initiator, eine Militärmacht im Ziel zu stationieren und gibt dem Initiator [concept_military_access]. \n\nDie Anwesenheit ausländischer Truppen würde verhindern, dass das Ziel jegliche [concept_protectorate]-Beziehung zu dem [concept_overlord] abbricht, der sein Militär im Ziel stationiert. \n\nDie Nutzung des Ziels als Militärstützpunkt würde auch die Verteidigung aller Nachbarländer des Ziels vor #y strategischen Bombenkampagnen#! des Initiators verringern."  #NT!
