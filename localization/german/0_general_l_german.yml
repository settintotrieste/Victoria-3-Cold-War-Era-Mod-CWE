 concept_puppet:0 "Marionette"  #NT!
 concept_puppets:0 "Puppen"  #NT!
 concept_puppet_desc:0 "[Concept('concept_recognized_power','$concept_recognized_powers$')] kann einen schwächeren [concept_country] in seinen $concept_puppet$ verwandeln. Ein $concept_puppet$ ist ein [concept_subject]-Typ, der seine eigenen [Concept('concept_diplomatic_play','$concept_diplomatic_plays$')] nicht gründen kann, aber gezwungen ist, sich seinen [Concept('concept_overlord','$concept_overlord_possessive$')] [Concept('concept_war','$concept_wars$')] anzuschließen. Die [concept_rank] eines $concept_puppet$ können sich nicht erhöhen, um ihren [concept_country]0 zu entsprechen oder diese zu übertreffen, und ihre [concept_country]0 können sie mit der [concept_country]2 Annexion[concept_country]3 [concept_country]4 angreifen."  #NT!
  
