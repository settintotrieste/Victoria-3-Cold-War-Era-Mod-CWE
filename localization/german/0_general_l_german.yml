 request_homeland_return_proposal_notification_effects_desc:0 "[TARGET_COUNTRY.GetName] überträgt alle [Concept('concept_state', '$concept_states$')], in denen es ein [INITIATOR_COUNTRY.GetAdjective] [concept_homeland] und kein [TARGET_COUNTRY.GetAdjective] [concept_homeland] in [INITIATOR_COUNTRY.GetName] gibt."  #NT!
