 concept_dominion_desc:0 "[Concept('concept_recognized_power','$concept_recognized_powers$')] kann einen schwächeren [concept_country] in seinen $concept_dominion$ ([concept_subject]) verwandeln. Ein $concept_dominion$ ist ein autonomeres [concept_subject_type], das sein eigenes [Concept('concept_diplomatic_play','$concept_diplomatic_plays$')] gründen kann und gezwungen ist, sich seinem [Concept('concept_overlord','$concept_overlord_possessive$')] [Concept('concept_war','$concept_wars$')] anzuschließen. Sie müssen jede Woche #v 10 %[concept_country]0 ihres [concept_country]1 Einkommens an ihre [concept_country]2 zahlen."  #NT!
  
 concept_personal_union_desc:0 "Zwei [Concept('concept_country', '$concept_countries$')] mit [SelectLocalization(GetPlayer.IsValid,'concept_personal_union_desc_added','Monarchy')] [concept_law] können in einem $concept_personal_union$ ([concept_subject]) und einem [concept_subject_type] zusammengefügt werden, wobei [Concept('concept_overlord','$concept_overlord_possessive$')] [concept_ruler] das [concept_head_of_state] in beiden $concept_countries$ ist. Das Subjekt kann sein eigenes [SelectLocalization(GetPlayer.IsValid,'concept_personal_union_desc_added','Monarchy')]0 starten und gezwungen sein, sich seinem [SelectLocalization(GetPlayer.IsValid,'concept_personal_union_desc_added','Monarchy')]1 [SelectLocalization(GetPlayer.IsValid,'concept_personal_union_desc_added','Monarchy')]2 anzuschließen. Die [SelectLocalization(GetPlayer.IsValid,'concept_personal_union_desc_added','Monarchy')]3 wird brechen, wenn die [SelectLocalization(GetPlayer.IsValid,'concept_personal_union_desc_added','Monarchy')]1 die [SelectLocalization(GetPlayer.IsValid,'concept_personal_union_desc_added','Monarchy')]5 abschafft. Sie müssen [SelectLocalization(GetPlayer.IsValid,'concept_personal_union_desc_added','Monarchy')]6 jede Woche 1 %[SelectLocalization(GetPlayer.IsValid,'concept_personal_union_desc_added','Monarchy')]7 ihres [SelectLocalization(GetPlayer.IsValid,'concept_personal_union_desc_added','Monarchy')]8 Einkommens an ihre [SelectLocalization(GetPlayer.IsValid,'concept_personal_union_desc_added','Monarchy')]1 zahlen."  #NT!
  
