 seek_ICJ_arbitration_1_tt:0 "1/60 Chance, dass der IGH ein Urteil fällt"  #NT!
 seek_ICJ_arbitration_2_tt:0 "Dieses Land hat in den letzten zwei Jahren kein IGH-Schiedsverfahren beantragt"  #NT!
 seek_ICJ_arbitration_3_tt:0 "Dieses Land kann in den nächsten zwei Jahren kein IGH-Schiedsverfahren beantragen"  #NT!
 seek_ICJ_arbitration:0 "Internationales Schiedsverfahren läuft"  #NT!
 seek_ICJ_arbitration_pact_desc:0 "Anwälte aus [SCOPE.GetRootScope.GetDiplomaticPact.GetFirstCountry.GetName] klagen derzeit vor dem Internationalen Gerichtshof gegen [SCOPE.GetRootScope.GetDiplomaticPact.GetSecondCountry.GetName] auf Rückgabe ihrer umstrittenen [concept_homeland]. Es dauert etwa fünf Jahre, bis das Gericht sein Urteil fällt."  #NT!
 seek_ICJ_arbitration_action_name:0 "Suchen Sie nach einem IGH-Schiedsverfahren für umstrittene Gebiete"  #NT!
 seek_ICJ_arbitration_action_break_name:0 "Stoppen Sie die IGH-Schiedsgerichtsbarkeit in umstrittenen Gebieten"  #NT!
 seek_ICJ_arbitration_action_propose_name:0 "Suchen Sie nach einem IGH-Schiedsverfahren für umstrittene Gebiete"  #NT!
 seek_ICJ_arbitration_desc:3 "Der Initiator wird beim Internationalen Gerichtshof einen Antrag auf Rückgabe seiner Heimatländer (die auch Heimatländer des Ziellandes sind) einreichen. Beachten Sie, dass das Gericht eine 50-prozentige Chance hat, gegen den Initiator zu entscheiden."  #NT!
 seek_ICJ_arbitration_action_notification_name:0 "[INITIATOR_COUNTRY.GetAdjective] Spionagenetzwerk gegründet in [TARGET_COUNTRY.GetName]"  #NT!
 seek_ICJ_arbitration_action_notification_break_name:0 "IGH-Schiedsverfahren gegen [TARGET_COUNTRY.GetName] eingeleitet"  #NT!
 seek_ICJ_arbitration_action_notification_break_desc:0 "[INITIATOR_COUNTRY.GetName] hat sein territoriales Schiedsverfahren gegen [TARGET_COUNTRY.GetName] vor dem Internationalen Gerichtshof eingestellt."  #NT!
 seek_ICJ_arbitration_action_notification_desc:2 "[INITIATOR_COUNTRY.GetName] hat beim Internationalen Gerichtshof eine Klage eingereicht und das Gericht gebeten, [TARGET_COUNTRY.GetName] zur Rückgabe von [INITIATOR_COUNTRY.GetAdjective] [concept_homeland] anzuordnen. Der Fall wird etwa fünf Jahre dauern und kann in beide Richtungen entschieden werden."  #NT!
  
 sanction_country:0 "Sanktionen"  #NT!
 sanction_country_pact_desc:0 "[SCOPE.GetRootScope.GetDiplomaticPact.GetFirstCountry.GetName] hat gegen [SCOPE.GetRootScope.GetDiplomaticPact.GetSecondCountry.GetName] Sanktionen verhängt, die es ihm ermöglichen, [SCOPE.GetRootScope.GetDiplomaticPact.GetSecondCountry.GetAdjective] Vermögenswerte in [SCOPE.GetRootScope.GetDiplomaticPact.GetFirstCountry.GetName] zu beschlagnahmen."  #NT!
 sanction_country_action_name:0 "Sanktionen verhängen"  #NT!
 sanction_country_action_propose_name:0 "Sanktionen verhängen"  #NT!
 sanction_country_action_break_name:0 "Sanktionen aufheben"  #NT!
 sanction_country_desc:3 "Diese diplomatische Aktion ermöglicht es dem Initiator, die im Ausland befindlichen Vermögenswerte des Ziellandes zu beschlagnahmen. In Bezug auf das Spiel bedeutet dies, dass eine umgekehrte Bankroll erstellt wird, bei der der Initiator einen Einkommenstransfer vom Ziel erhält, der auf der Grundlage des Steuereinkommens des Initiators berechnet wird."  #NT!
 sanction_country_action_notification_name:0 "Sanktionen gegen [TARGET_COUNTRY.GetName] verhängt"  #NT!
 sanction_country_action_notification_break_name:0 "[INITIATOR_COUNTRY.GetAdjective] Sanktionen aufgehoben"  #NT!
 sanction_country_action_notification_break_desc:0 "[INITIATOR_COUNTRY.GetName] hat seine Sanktionen gegen [TARGET_COUNTRY.GetName] aufgehoben und wird daher keine Vermögenswerte von [TARGET_COUNTRY.GetAdjective] im Ausland mehr beschlagnahmen."  #NT!
 sanction_country_action_notification_desc:2 "[INITIATOR_COUNTRY.GetName] hat gegen [TARGET_COUNTRY.GetName] Sanktionen verhängt, die es ihnen ermöglichen, Vermögenswerte von [TARGET_COUNTRY.GetAdjective] im Ausland zu beschlagnahmen."  #NT!
  
