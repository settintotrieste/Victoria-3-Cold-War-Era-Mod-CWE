 objective_hegemon_name_HND:0 "Indien"  #NT!
 objective_hegemon_desc_HND:0 "$objective_non_aligned_victory_cold_war_desc_HND$"  #NT!
  
 rule_historical_ai_railroading:0 "Historische Eisenbahn für KI"  #NT!
 setting_no_historical_ai_railroading:0 "Deaktiviert"  #NT!
 setting_no_historical_ai_railroading_desc:0 "Die KI wählt die historische Option bei allen Ereignissen und Entscheidungen zufällig (d. h. in 50 % der Fälle)."  #NT!
