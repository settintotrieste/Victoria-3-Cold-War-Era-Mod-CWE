 french_vietnam_state.indy.t:0 "Der Staat Vietnam?"  #NT!
 french_vietnam_state.indy.d:0 "Am 20. Mai 1949 stimmte die französische Nationalversammlung der Wiedervereinigung Cochinchinas mit dem Rest Vietnams zu. Die Entscheidung trat am 4. Juni in Kraft und der Staat Vietnam wurde am 2. Juli offiziell ausgerufen. Von 1949 bis 1954, nach der Wiedervereinigung mit Cochinchina, hatte der Staat Vietnam als assoziierter Staat innerhalb der Französischen Union eine teilweise Autonomie von Frankreich."  #NT!
 french_syria.indy.t:0 "Unabhängigkeit Syriens?"  #NT!
 french_syria.indy.d:0 "Nach einer Zeit als französisches Mandat (1923–1946) war der neu geschaffene Staat der größte arabische Staat, der aus den ehemals osmanisch regierten syrischen Provinzen hervorging. Als demokratische parlamentarische Republik erlangte es am 24. Oktober 1945 de jure seine Unabhängigkeit, als die Republik Syrien Gründungsmitglied der Vereinten Nationen wurde, ein Akt, der das frühere französische Mandat rechtlich beendete (obwohl französische Truppen das Land erst im April 1946 verließen)."  #NT!
 french_saarland.indy.t:0 "Das Saarprotektorat schaffen?"  #NT!
 french_saarland.indy.d:0 "Im Juli 1945, zwei Monate nach dem Ende des Zweiten Weltkriegs in Europa, verlegten die alliierten Streitkräfte die eroberten Gebiete in ihre jeweiligen Besatzungszonen. Am 10. Juli 1945 verließen die US-Streitkräfte das Saargebiet und französische Truppen richteten ihre Besatzungsverwaltung ein. Am 16. Februar 1946 löste Frankreich das Saargebiet von den alliierten Besatzungszonen ab und errichtete das separate Saarprotektorat, das de facto nicht mehr der gemeinsamen alliierten Gerichtsbarkeit durch den Alliierten Kontrollrat für Deutschland unterstand."  #NT!
  
