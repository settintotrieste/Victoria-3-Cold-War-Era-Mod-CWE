 USA_historical_election_system.t:0 "US-Präsidentschaftswahl"  #NT!
 USA_historical_election_system.d:0 "Die Wahl des Präsidenten und des Vizepräsidenten der Vereinigten Staaten ist eine indirekte Wahl, bei der Bürger der Vereinigten Staaten, die in einem der fünfzig US-Bundesstaaten oder in Washington, D.C. als Wähler registriert sind, ihre Stimme nicht direkt für diese Ämter, sondern für Mitglieder des Wahlkollegiums abgeben. Diese Wähler geben dann direkte Stimmen, sogenannte Wahlstimmen, für den Präsidenten und den Vizepräsidenten ab. Der Kandidat, der die absolute Mehrheit der Wählerstimmen erhält (mindestens 270 von 538, da der dreiundzwanzigste Verfassungszusatz den Bürgern von D.C. Stimmrechte gewährt), wird dann in dieses Amt gewählt."  #NT!
 historical_election_system.f:0 "Dies ist ein historisches Ereignis. Wenn Sie die nicht-historische Option wählen, bleibt der aktuelle [concept_ruler] als Präsident erhalten."  #NT!
  
 GBR_historical_election_system.t:0 "Parlamentswahlen im Vereinigten Königreich"  #NT!
 GBR_historical_election_system.d:0 "Der Premierminister der [ROOT.GetCountry.GetName] ist der oberste Minister der Regierung und der Chef des britischen Kabinetts. Es gibt kein konkretes Datum für die Amtseinführung des Amtes des Premierministers, da die Rolle nicht geschaffen wurde, sondern sich im Laufe der Zeit durch die Zusammenlegung von Aufgaben weiterentwickelte."  #NT!
  
 FRA_historical_election_system.t:0 "Französische Präsidentschaftswahl"  #NT!
 FRA_historical_election_system.d:0 "Der Präsident Frankreichs ist das geschäftsführende Staatsoberhaupt Frankreichs und der Oberbefehlshaber der französischen Streitkräfte. Da es sich bei der Präsidentschaft um das höchste Amt des Landes handelt, handelt es sich um das höchste Amt in Frankreich."  #NT!
  
 GER_historical_election_system.t:0 "Deutsche Bundestagswahl"  #NT!
 GER_historical_election_system.d:0 "Der Bundeskanzler ist der politische Führer Deutschlands und der Regierungschef. Der Amtsinhaber ist für die Auswahl aller anderen Regierungsmitglieder und die Leitung von Kabinettssitzungen verantwortlich."  #NT!
  
 HND_historical_election_system.t:0 "Indische Parlamentswahlen"  #NT!
 HND_historical_election_system.d:0 "Der indische Premierminister ist der oberste Exekutivbeamter der indischen Regierung. Obwohl der Präsident Indiens das verfassungsmäßige, nominelle und zeremonielle Staatsoberhaupt ist, liegt die Exekutivgewalt in der Praxis und im Normalfall beim Premierminister und dem von ihm gewählten Ministerrat. Der Premierminister ist der Vorsitzende, der von der Partei mit einer Mehrheit im Unterhaus des indischen Parlaments, der Lok Sabha, gewählt wird, der wichtigsten gesetzgebenden Körperschaft der Republik Indien."  #NT!
  
 BRZ_historical_election_system.t:0 "Brasilianische Präsidentschaftswahl"  #NT!
 BRZ_historical_election_system.d:0 "Das Präsidialsystem wurde 1889 mit der Ausrufung der Republik durch einen Militärputsch gegen Kaiser Pedro II. eingeführt. Seitdem hatte Brasilien sechs Verfassungen, drei Diktaturen und drei demokratische Perioden. In demokratischen Zeiten war die Stimmabgabe immer Pflicht."  #NT!
  
 IDO_historical_election_system.t:0 "Indonesische Präsidentschaftswahl"  #NT!
 IDO_historical_election_system.d:0 "Der Präsident der Republik Indonesien ist Staatsoberhaupt und Regierungschef der Republik Indonesien. Der Präsident leitet die Exekutive der indonesischen Regierung und ist Oberbefehlshaber der indonesischen Streitkräfte. Seit 2004 werden der Präsident und der Vizepräsident direkt für eine Amtszeit von fünf Jahren gewählt, die einmal verlängert werden kann, sodass eine Amtszeit von maximal zehn Jahren möglich ist."  #NT!
  
 SKO_historical_election_system.t:0 "Südkoreanische Präsidentschaftswahl"  #NT!
 SKO_historical_election_system.d:0 "Der Präsident der Republik Korea ist Staatsoberhaupt und Regierungschef der Republik Korea. Der Präsident leitet den Staatsrat und ist Chef der Exekutive der nationalen Regierung sowie Oberbefehlshaber der Streitkräfte der Republik Korea."  #NT!
  
 MSY_historical_election_system.t:0 "Malaysische Parlamentswahlen"  #NT!
 MSY_historical_election_system.d:0 "Der Premierminister Malaysias ist der Regierungschef Malaysias. Der Premierminister leitet die Exekutive der Bundesregierung. Der Yang di-Pertuan Agong ernennt den Premierminister zum Parlamentsmitglied (MP), der seiner Meinung nach am ehesten das Vertrauen der Mehrheit der Parlamentsabgeordneten genießen dürfte. Der Premierminister ist in der Regel der Vorsitzende der Partei, die bei allgemeinen Wahlen die meisten Sitze gewinnt."  #NT!
  
 RUS_historical_election_system.t:0 "Russische Präsidentschaftswahl"  #NT!
 RUS_historical_election_system.d:0 "Der Präsident der Russischen Föderation ist das geschäftsführende Staatsoberhaupt Russlands. Der Präsident ist Vorsitzender des Föderalen Staatsrates und Oberbefehlshaber der russischen Streitkräfte. Es ist das höchste Amt in Russland."  #NT!
  
 SOV_historical_election_system.t:0 "Sowjetische Präsidentschaftswahl"  #NT!
 SOV_historical_election_system.d:0 "Die Präsidentschaftswahlen 1990 in der Sowjetunion fanden am 14. März 1990 in der Sowjetunion statt, um einen Präsidenten für eine fünfjährige Amtszeit zu wählen. Dies war die erste und einzige Präsidentschaftswahl in der Sowjetunion. Dies war darauf zurückzuführen, dass das Amt des Präsidenten im Jahr 1990, ein Jahr vor der Auflösung der Sowjetunion im Jahr 1991, eingerichtet wurde. Die Wahlen waren unbestritten, wobei Michail Gorbatschow, der damalige Generalsekretär der Kommunistischen Partei der Sowjetunion, der einzige Kandidat war."  #NT!
  
 ROC_historical_election_system.t:0 "[ROOT.GetCountry.GetAdjectiveNoFormatting] Präsidentschaftswahl"  #NT!
 ROC_historical_election_system.d:0 "Der Präsident der Republik China, auch Präsident Taiwans genannt, ist das Staatsoberhaupt der Republik China (Taiwan) sowie der Oberbefehlshaber der Streitkräfte der Republik China. Vor 1949 verfügte das Amt einst über die Herrschaftsbefugnis über Festlandchina, seine verbleibenden Zuständigkeiten waren jedoch seit dem Ende des chinesischen Bürgerkriegs auf Taiwan, Penghu, Kinmen, Matsu und andere kleinere Inseln beschränkt."  #NT!
  
