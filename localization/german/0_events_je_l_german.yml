 je_space_race_space_rocket_button_desc:0 "Eine Trägerrakete ist in der Regel ein raketengetriebenes Fahrzeug, das eine Nutzlast (ein bemanntes Raumschiff oder Satelliten) von der Erdoberfläche oder der unteren Atmosphäre in den Weltraum befördern soll. Die häufigste Form ist die mehrstufige Rakete in Form einer ballistischen Rakete."  #NT!
 je_space_race_satellite_button_desc:0 "Ein Satellit ist ein Objekt, das absichtlich in eine Umlaufbahn um einen Himmelskörper gebracht wird. Satelliten werden vielfältig eingesetzt, darunter Kommunikationsrelais, Wettervorhersage, Navigation (GPS), Rundfunk, wissenschaftliche Forschung und Erdbeobachtung. Weitere militärische Einsatzmöglichkeiten sind Aufklärung, Frühwarnung, Signalaufklärung und möglicherweise der Waffentransport."  #NT!
 je_space_race_astronaut_button_desc:0 "Ein Astronaut ist eine Person, die im Rahmen eines bemannten Raumfahrtprogramms ausgebildet, ausgerüstet und eingesetzt wird, um als Kommandant oder Besatzungsmitglied an Bord eines Raumfahrzeugs zu dienen."  #NT!
 je_space_race_space_probe_button_desc:0 "Eine Raumsonde ist ein unbemanntes, unbemanntes Gerät, das den Weltraum erkunden und wissenschaftliche Informationen sammeln soll."  #NT!
 je_space_race_moon_mission_button_desc:0 "Eine Mondlandung oder Mondlandung ist die Ankunft eines Raumfahrzeugs auf der Mondoberfläche."  #NT!
 je_space_race_space_station_button_desc:0 "Eine Raumstation ist ein Raumschiff, das eine menschliche Besatzung über einen längeren Zeitraum im Orbit unterstützen kann und eine Art Lebensraum im Weltraum darstellt."  #NT!
 je_space_race_space_telescope_button_desc:0 "Ein Weltraumteleskop oder Weltraumobservatorium ist ein Teleskop im Weltraum, das zur Beobachtung astronomischer Objekte dient."  #NT!
 je_space_race_mars_mission_button_desc:0 "Eine Marslandung ist die Ankunft eines Raumfahrzeugs auf der Marsoberfläche."  #NT!
 je_space_race_moon_base_button_desc:0 "Eine Mondbasis ist eine Einrichtung auf oder unter der Mondoberfläche, die menschliche Aktivitäten auf dem Mond ermöglicht."  #NT!
