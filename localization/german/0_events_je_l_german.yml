 je_imf_system_request_loan_button_desc:0 "[ROOT.GetCountry.GetName] wird alle IWF-Gläubiger auffordern, entweder #white 5 %#! von [ROOT.GetCountry.GetName] [Concept('concept_credit','$concept_credit_debt$')] im Austausch für einen [concept_obligation] zu übernehmen oder [Concept('concept_bankroll','$concept_bankrolling$')] [ROOT.GetCountry.GetName] im Austausch für Strukturreformen seiner Wirtschaft zu starten."  #NT!
  
