 oil_cartel_desc_1:0 "Die Öl- und Gasindustrie [ROOT.GetCountry.GetAdjective] wird von einer Handvoll Unternehmen dominiert, die gemeinsam die gesamte Öl- und Gasproduktion in [ROOT.GetCountry.GetName] monopolisieren. Diese Macht ermöglicht es diesen Unternehmen, den Preis von [GetGoods('oil').GetName] im Land effektiv zu diktieren, indem sie die Produktion von [GetBuildingType('building_oil_rig').GetName] regulieren. \n\nDie [concept_government] können sich jedoch dafür entscheiden, die Ölförderung so zu regulieren, dass der Ölpreis von den [concept_government] und nicht von privaten Unternehmen bestimmt wird. \n\nHinweis: Durch die Regulierung der Öl- und Gasindustrie kann [concept_government] Produktionsquoten für [GetGoods('oil').GetName] festlegen, während die Deregulierung der Öl- und Gasindustrie es dem Privatsektor ermöglichen wird, die Quoten auf der Grundlage von [concept_market_price] von [GetGoods('oil').GetName] festzulegen."  #NT!
 oil_cartel_desc_2:0 "In der sozialistischen Wirtschaft von [ROOT.GetCountry.GetName] wird die Öl- und Gasindustrie direkt von [concept_government] über das Erdölministerium kontrolliert und reguliert. Dadurch kann [concept_government] die Produktionsleistung aller [GetBuildingType('building_oil_rig').GetName] direkt steuern."  #NT!
  
