 je_upper_house:0 "Die [SCOPE.GetRootScope.GetCountry.GetCustom('upper_house_name')]"  #NT!
 je_upper_house_reason:0 "Der [SCOPE.GetRootScope.GetCountry.GetCustom('upper_house_name')] ist die obere Kammer des [SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')]. Es verfügt über mehrere Beratungs- und Einwilligungsbefugnisse. Dazu gehören die Befugnis zur Genehmigung von Verträgen und die Bestätigung von Kabinettssekretären, Richtern (einschließlich Richtern des Obersten Gerichtshofs), Flaggoffiziern, Regulierungsbeamten, Botschaftern, anderen Exekutivbeamten und uniformierten Beamten. Die [SCOPE.GetRootScope.GetCountry.GetCustom('upper_house_name')] kann auch ein Veto gegen Gesetzesentwürfe einlegen, die im [SCOPE.GetRootScope.GetCountry.GetCustom('lower_house_name')] verabschiedet wurden.\n\nEine regierungsfreundliche Mehrheit im [SCOPE.GetRootScope.GetCountry.GetCustom('upper_house_name')] wird es den [concept_government] ermöglichen, einen [concept_law] zu verabschieden. \n\nRegierungsunterstützung: #BOLD [GetPlayer.MakeScope.Var('upper_house_majority_var').GetValue]%#! \n\nHinweis: [SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')]0"  #NT!
 je_upper_house_status:0 "[GetPlayer.MakeScope.Var('upper_house_majority_var').GetValue] % Pro-[concept_government] Mitglieder"  #NT!
  
 first_past_the_post_upper_house:0 "\n\n- Erhalten Sie #BOLD [GetPlayer.MakeScope.Var('upper_house_increment_FTP_upper_var').GetValue] %#! weitere [concept_government]-Kontrolle im [SCOPE.GetRootScope.GetCountry.GetCustom('upper_house_name')] für jeden [concept_incorporated_state], bei dem ein [concept_government] [concept_interest_group] [GetPlayer.MakeScope.Var('upper_house_upper_limit_var_display').GetValue] % oder mehr [concept_clout] hat.\n\n- Erhalten Sie #BOLD [GetPlayer.MakeScope.Var('upper_house_increment_FTP_upper_var').GetValue]1 %#! weitere [concept_government]-Kontrolle im [SCOPE.GetRootScope.GetCountry.GetCustom('upper_house_name')] für jedes [concept_incorporated_state], wobei ein [concept_government] [concept_interest_group] mehr als [GetPlayer.MakeScope.Var('upper_house_increment_FTP_upper_var').GetValue]8 %, aber weniger als [GetPlayer.MakeScope.Var('upper_house_upper_limit_var_display').GetValue] % [concept_clout] hat."  #NT!
 jefferson_system_upper_house:0 "\n\n- Erhalten Sie #BOLD [GetPlayer.MakeScope.Var('upper_house_increment_FTP_upper_var').GetValue] %#! weitere [concept_government]-Kontrolle im [SCOPE.GetRootScope.GetCountry.GetCustom('upper_house_name')] für jeden [concept_incorporated_state], bei dem ein [concept_government] [concept_interest_group] [GetPlayer.MakeScope.Var('upper_house_upper_limit_var_display').GetValue] % oder mehr [concept_clout] hat.\n\n- Erhalten Sie #BOLD [GetPlayer.MakeScope.Var('upper_house_increment_FTP_upper_var').GetValue]1 %#! weitere [concept_government]-Kontrolle im [SCOPE.GetRootScope.GetCountry.GetCustom('upper_house_name')] für jedes [concept_incorporated_state], wobei ein [concept_government] [concept_interest_group] mehr als [GetPlayer.MakeScope.Var('upper_house_increment_FTP_upper_var').GetValue]8 %, aber weniger als [GetPlayer.MakeScope.Var('upper_house_upper_limit_var_display').GetValue] % [concept_clout] hat. \n\n- Erhalten Sie #BOLD #!2 %#! weitere [concept_government] Kontrolle im [SCOPE.GetRootScope.GetCountry.GetCustom('upper_house_name')] für jedes #!6 % [concept_clout], das ein [concept_government] [concept_interest_group] in jedem [concept_government]0 hat."  #NT!
