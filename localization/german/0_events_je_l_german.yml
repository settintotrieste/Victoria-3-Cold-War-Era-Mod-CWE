 notification_national_value_updated_name:0 "Neuer nationaler Wert: [SCOPE.GetRootScope.GetCountry.GetCustom('national_value_name')]"  #NT!
 notification_national_value_updated_desc:0 "Aufgrund der Änderung der [concept_clout] der verschiedenen [Concept('concept_interest_group', '$concept_interest_groups$')] im Land abonnieren unsere Bürger nun den [SCOPE.GetRootScope.GetCountry.GetCustom('national_value_name')] National Value."  #NT!
  
 je_constitutionalise_national_values_button:0 "Konstitutionalisieren [SCOPE.GetRootScope.GetCountry.GetCustom('national_value_name')]"  #NT!
 je_constitutionalise_national_values_button_desc:0 "Die [concept_government] können den Wert von [SCOPE.GetRootScope.GetCountry.GetCustom('national_value_name')] konstitutionalisieren, um zu verhindern, dass sich der nationale Wert von [ROOT.GetCountry.GetName] weiter ändert, und um den [Concept('concept_interest_group', '$concept_interest_groups$')] zu gefallen, die [SCOPE.GetRootScope.GetCountry.GetCustom('national_value_name')] unterstützen. \n\nBeachten Sie, dass die Aufnahme der Werte von [SCOPE.GetRootScope.GetCountry.GetCustom('national_value_name')] in die Verfassung die Verabschiedung bestimmter Gesetze verhindern kann."  #NT!
  
 je_unconstitutionalise_national_values_button:0 "Nationalen Wert verfassungswidrig machen"  #NT!
 je_unconstitutionalise_national_values_button_desc:0 "Ein früheres [concept_government] hat den Wert von [SCOPE.GetRootScope.GetCountry.GetCustom('national_value_name')] in die Verfassung aufgenommen. Dadurch wurde der nationale Wert von [ROOT.GetCountry.GetName] auf [SCOPE.GetRootScope.GetCountry.GetCustom('national_value_name')] festgelegt und die Verabschiedung bestimmter Gesetze verhindert. \n\nDurch die Aufhebung dieser Verfassungsverordnung können sich die nationalen Werte gemäß [concept_ideology] der [concept_interest_group] mit mehr als 50 % [concept_clout] im Land ändern und die Beschränkung für die Verabschiedung bestimmter Gesetze aufgehoben werden."  #NT!
  
