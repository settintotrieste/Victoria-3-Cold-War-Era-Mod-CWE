 je_impeachment_system:0 "Amtsenthebung von [SCOPE.sCharacter('impeached_president_scope').GetFullName]"  #NT!
 je_impeachment_system_reason:0 "Gemäß der Verfassung von [ROOT.GetCountry.GetName] wird der Präsident wegen Amtsenthebung und Verurteilung wegen Hochverrats, Bestechung oder anderen schweren Verbrechen und Vergehen seines Amtes enthoben. Da [SCOPE.sCharacter('impeached_president_scope').GetFullName] eine strafbare Handlung begangen hatte, wurden im Kongress Anklagepunkte verabschiedet, um den Präsidenten aus dem Amt zu entfernen. Die Verfassung erfordert jedoch eine Zweidrittelmehrheit des Senats für eine Verurteilung, bevor der Präsident seines Amtes enthoben werden kann.\n\n[SCOPE.sCharacter('impeached_president_scope').GetFullName] wird angeklagt und seines Amtes enthoben, wenn [concept_legitimacy] nach Ablauf der Zeit unter 34 fällt."  #NT!
 je_impeachment_system_1.tt:0 "[SCOPE.sCharacter('impeached_president_scope').GetFullName] wird angeklagt und aus dem Amt entfernt"  #NT!
 je_impeachment_system_2.tt:0 "[SCOPE.sCharacter('impeached_president_scope').GetFullName] wird nicht angeklagt und nicht seines Amtes enthoben"  #NT!
 je_impeachment_system_3.tt:0 "[SCOPE.sCharacter('impeached_president_scope').GetFullName] ist entweder korrupt, ein Verräter oder ergreift unrechtmäßig die Macht."  #NT!
 je_impeachment_system_4.tt:0 "[SCOPE.sCharacter('impeached_president_scope').GetFullName] wurde in letzter Zeit nicht angeklagt."  #NT!
 je_impeachment_system_5.tt:0 "[SCOPE.sCharacter('impeached_president_scope').GetFullName] ist nicht mehr der Präsident"  #NT!
  
