 judiciary_veto.t:0 "Rechtliche Anfechtung der Gesetzesverabschiedung"  #NT!
 judiciary_veto.d:0 "Führende Mitglieder der [SCOPE.gsInterestGroup('legal_challenge_plaintiff_scope').GetName] reichten in [SCOPE.GetRootScope.GetCountry.GetCustom('supreme_court_name')] eine Klage ein, um die Rechtmäßigkeit des Gesetzentwurfs der [concept_government] zur Verabschiedung von [SCOPE.sLaw('current_law_scope').GetName] anzufechten. Sie behaupteten, dass der Gesetzentwurf gegen das Verfassungsrecht von [ROOT.GetCountry.GetName] verstoße und von [SCOPE.GetRootScope.GetCountry.GetCustom('supreme_court_name')] präventiv blockiert werden sollte. Dieses Argument überzeugte die Richter, die kurzerhand einen Beschluss zu ihren Gunsten erließen."  #NT!
 judiciary_veto.f:0 "Dieses Ereignis wurde ausgelöst, weil es eine [concept_interest_group] gibt, die [SCOPE.sLaw('current_law_scope').GetName] missbilligt oder stark ablehnt, und die [SCOPE.GetRootScope.GetCountry.GetCustom('supreme_court_name')] entweder progressiv oder regressiv genug ist, um den Versuch dieser [concept_interest_group] zu unterstützen, das Gesetz mit gerichtlichen Mitteln aufzuhalten."  #NT!
