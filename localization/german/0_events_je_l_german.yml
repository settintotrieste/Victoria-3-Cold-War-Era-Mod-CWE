 cuban_missile_crisis.t:0 "Kubakrise"  #NT!
 cuban_missile_crisis.d:0 "Die Kubakrise war eine 13-tägige Konfrontation zwischen den Vereinigten Staaten und der Sowjetunion, bei der die Stationierung amerikanischer Atomraketen in Italien und der Türkei mit der Stationierung sowjetischer Atomraketen in Kuba einherging. Die Krise dauerte vom 16. bis 28. Oktober 1962. Die Konfrontation wird allgemein als die Konfrontation angesehen, die einer Eskalation in einen umfassenden Atomkrieg am nächsten kam."  #NT!
 cuban_missile_crisis_1.option.1:0 "Embargo gegen Kuba!"  #NT!
 cuban_missile_crisis_1.option.2:0 "Damit sind wir einverstanden..."  #NT!
 cuban_missile_crisis_2.option.1:0 "Verlassen Sie Kuba, fordern Sie aber auch, dass die USA ihre Atomwaffen entfernen"  #NT!
 cuban_missile_crisis_2.option.2:0 "Keine Kompromisse eingehen!"  #NT!
 cuban_missile_crisis_USA_END.t:0 "Sowjetischer Gegenvorschlag"  #NT!
 cuban_missile_crisis_USA_END.d:0 "Die Sowjetunion schlägt vor, dass die Vereinigten Staaten ihre Atomwaffen aus den an die Sowjetunion angrenzenden Ländern abziehen, als Gegenleistung dafür, dass die Sowjets ihre Atomwaffen aus Kuba entfernen."  #NT!
 cuban_missile_crisis_3.option.1:0 "Akzeptieren Sie den Deal"  #NT!
 cuban_missile_crisis_3.option.2:0 "Den Deal ablehnen"  #NT!
 cuban_missile_crisis_SOV_END.t:0 "Sowjetisch-amerikanischer Atomdeeskalationsvertrag"  #NT!
 cuban_missile_crisis_SOV_END.d:0 "Nachdem alle Offensivraketen und die leichten Iljuschin-Il-28-Bomber aus Kuba abgezogen worden waren, wurde die US-Blockade am 20. November offiziell beendet. Der Kompromiss brachte Chruschtschow und die Sowjetunion in Verlegenheit, da der Abzug der US-Raketen aus Italien und der Türkei ein geheimer Deal zwischen Kennedy und Chruschtschow war und man den Eindruck machte, dass die Sowjets sich von den Umständen zurückzogen, die sie begonnen hatten."  #NT!
 cuban_missile_crisis_4.option:0 "Zumindest konnte ein Atomkrieg abgewendet werden!"  #NT!
  
 peaceful_revolution_generic.t:0 "Die [ROOT.GetCountry.GetAdjectiveNoFlag]-Revolution"  #NT!
 peaceful_revolution_generic.d:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [ROOT.GetCountry.GetRuler.GetFullName] wurde heute in einer unblutigen Revolution abgesetzt, als eine Masse wütender Demonstranten in das schlecht verteidigte Executive Mansion eindrang und den [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] kaltblütig hinrichtete. Als Reaktion darauf trat das gesamte Kabinett zurück und überließ es den Rebellen, eine neue Regierung zu bilden."  #NT!
 peaceful_revolution_generic.f:0 "Dieses Ereignis wurde ausgelöst, weil ein revolutionärer [concept_political_movement] jeden [ROOT.GetCountry.GetAdjective] [concept_state] zum Aufstand geführt hätte."  #NT!
 peaceful_revolution_generic.option:0 "Erschreckend!"  #NT!
  
 brezhnev_doctrine.t:0 "Revolution in [SCOPE.sCountry('brezhnev_doctrine_target').GetName]"  #NT!
 brezhnev_doctrine.d:0 "Eine Volksrevolution hat unser kommunistisches Marionettenregime im Jahr [SCOPE.sCountry('brezhnev_doctrine_target').GetName] gestürzt. Unsere Führer fordern die [ROOT.GetCountry.GetAdjective]-Streitkräfte auf, die Ordnung im abtrünnigen Land wiederherzustellen."  #NT!
 brezhnev_doctrine.f:0 "Dieses Ereignis wurde ausgelöst, weil ein [concept_subject] von [ROOT.GetCountry.GetName] seine kommunistische Regierung gestürzt und sich selbst für frei von der Kontrolle von [ROOT.GetCountry.GetAdjective] erklärt hat."  #NT!
  
