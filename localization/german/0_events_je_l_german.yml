 change_capital_BRZ_decision:0 "Verlegen Sie die Hauptstadt nach Brasília"  #NT!
 change_capital_BRZ_decision_desc:0 "Brasília war eine Planstadt, die 1956 von Lúcio Costa, Oscar Niemeyer und Joaquim Cardozo entwickelt wurde, um die Hauptstadt von Rio de Janeiro an einen zentraleren Ort zu verlegen."  #NT!
 change_capital_BUR_decision:0 "Verlege die Hauptstadt nach Naypyidaw"  #NT!
 change_capital_BUR_decision_desc:0 "Es gibt mehrere Vermutungen, warum die Hauptstadt verlegt wurde: Naypyidaw liegt zentraler als die alte Hauptstadt Yangon. Es ist auch ein Verkehrsknotenpunkt neben den Bundesstaaten Shan, Kayah und Kayin. Regierungs- und Militärführer waren der Ansicht, dass eine stärkere Militär- und Regierungspräsenz in der Nähe diesen chronisch turbulenten Regionen Stabilität verleihen könnte."  #NT!
  
 SEATO_form.t:0 "Die Südostasien-Vertragsorganisation?"  #NT!
 SEATO_form.d:0 "Die Southeast Asia Treaty Organization (SEATO) wurde in erster Linie gegründet, um weitere kommunistische Errungenschaften in Südostasien zu blockieren. Sie war eine internationale Organisation zur kollektiven Verteidigung in Südostasien, die durch den im September 1954 in Manila, Philippinen, unterzeichneten Südostasiatischen Kollektivverteidigungsvertrag gegründet wurde. Die formelle Institution SEATO wurde am 19. Februar 1955 bei einem Treffen der Vertragspartner in Bangkok, Thailand, gegründet. Der Hauptsitz der Organisation befand sich ebenfalls in Bangkok. Acht Mitglieder traten der Organisation bei."  #NT!
 SEATO_form.f:0 "Bei dieser Veranstaltung werden Länder eingeladen, dem Einflussbereich von $USA$ beizutreten, was entweder die Autonomie eines Subjekts (falls zutreffend) verringert oder eine $defensive_pact$ zwischen $USA$ und dem beitretenden Land schafft."  #NT!
 CENTO_form.t:0 "Die Zentralvertragsorganisation?"  #NT!
 CENTO_form.d:0 "Die Central Treaty Organization (CENTO) war ein Militärbündnis während des Kalten Krieges. Sie wurde am 24. Februar 1955 von Iran, Irak, Pakistan, der Türkei und dem Vereinigten Königreich gegründet. Das Bündnis wurde am 16. März 1979 aufgelöst. Der Druck der USA sowie Zusagen militärischer und wirtschaftlicher Hilfe waren bei den Verhandlungen, die zu dem Abkommen führten, von entscheidender Bedeutung, doch die Vereinigten Staaten konnten zunächst nicht teilnehmen."  #NT!
 CENTO_form.f:0 "Bei dieser Veranstaltung werden Länder eingeladen, dem Einflussbereich von $USA$ beizutreten, was entweder die Autonomie eines Subjekts (falls zutreffend) verringert oder eine $defensive_pact$ zwischen $USA$ und dem beitretenden Land schafft."  #NT!
 indo_soviet_form.t:0 "Der indisch-sowjetische Friedens-, Freundschafts- und Kooperationsvertrag?"  #NT!
 indo_soviet_form.d:0 "Der indisch-sowjetische Vertrag über Frieden, Freundschaft und Zusammenarbeit war ein im August 1971 zwischen Indien und der Sowjetunion unterzeichneter Vertrag, der die gegenseitige strategische Zusammenarbeit festlegte. Dies stellte eine erhebliche Abweichung von Indiens früherer Position der Blockfreiheit während des Kalten Krieges dar und war ein Faktor im indisch-pakistanischen Krieg von 1971. Der Vertrag wurde durch die zunehmenden Beziehungen Pakistans zu China und den Vereinigten Staaten verursacht."  #NT!
 cuban_soviet_form.t:0 "Sowjetische Atomwaffen in Kuba?"  #NT!
 cuban_soviet_form.d:0 "Im Mai 1962 ließ sich der sowjetische Erste Sekretär Nikita Chruschtschow von der Idee überzeugen, dem wachsenden Vorsprung der USA bei der Entwicklung und Stationierung strategischer Raketen durch die Stationierung sowjetischer nuklearer Mittelstreckenraketen auf Kuba entgegenzuwirken. Die kubanische Führung erwartete stark, dass die USA erneut in Kuba einmarschieren würden, und befürwortete enthusiastisch die Idee, in Kuba Atomraketen zu installieren. Die erste Lieferung sowjetischer R-12-Raketen traf in der Nacht des 8. September ein, eine zweite folgte am 16. September. Die R-12 war eine ballistische Mittelstreckenrakete, die einen thermonuklearen Sprengkopf tragen konnte."  #NT!
 USA_SPA_form.t:0 "Der Pakt von Madrid?"  #NT!
 USA_SPA_form.d:0 "Der Pakt von Madrid, der am 23. September 1953 vom franquistischen Spanien und den Vereinigten Staaten unterzeichnet wurde, war zusammen mit dem Konkordat von 1953 ein bedeutender Versuch, die internationale Isolation Spaniens nach dem Zweiten Weltkrieg zu durchbrechen. Das Abkommen von 1953 bestand aus drei separaten Durchführungsabkommen, die die Vereinigten Staaten verpflichteten, Spanien wirtschaftliche und militärische Hilfe zu leisten. Den Vereinigten Staaten wiederum sollte gestattet werden, auf spanischem Territorium Luft- und Marinestützpunkte zu errichten und zu nutzen."  #NT!
 USA_ROC_form.t:0 "Der chinesisch-amerikanische gegenseitige Verteidigungsvertrag?"  #NT!
 USA_ROC_form.d:0 "Der gegenseitige Verteidigungsvertrag zwischen den Vereinigten Staaten und der Republik China war ein Verteidigungspakt, der zwischen den Vereinigten Staaten und der Republik China (Taiwan) unterzeichnet wurde und von 1955 bis 1980 gültig war. Er sollte die Insel Taiwan vor einer Invasion der Volksrepublik China schützen."  #NT!
 SOV_PRC_form.t:0 "Der sowjetisch-chinesische Freundschaftsvertrag?"  #NT!
 SOV_PRC_form.d:0 "Der chinesisch-sowjetische Vertrag über Freundschaft, Bündnis und gegenseitigen Beistand war ein bilateraler Vertrag über Bündnis, kollektive Sicherheit, Hilfe und Zusammenarbeit, der am 14. Februar 1950 zwischen der Volksrepublik China und der Union der Sozialistischen Sowjetrepubliken geschlossen wurde."  #NT!
 SOV_NVM_form.t:0 "Der sowjetisch-vietnamesische Freundschaftsvertrag?"  #NT!
 SOV_NVM_form.d:0 "Die Sowjetunion war zusammen mit ihren Satellitenstaaten in Osteuropa und der neu gegründeten Volksrepublik China das erste Land, das die Demokratische Republik Vietnam während des Ersten Indochinakrieges im Januar 1950 diplomatisch anerkannte."  #NT!
 USA_YUG_form.t:0 "Das amerikanisch-jugoslawische Tauwetter?"  #NT!
 USA_YUG_form.d:0 "Die Spaltung zwischen Tito und Stalin im Jahr 1948 stellte den großen Wendepunkt in den Beziehungen zwischen den Vereinigten Staaten und der neuen sozialistischen Republik dar. Jugoslawien ersuchte die Vereinigten Staaten erstmals im Sommer 1948 um Hilfe. Die Truman-Regierung beschloss, Jugoslawien erhebliche Hilfe, Kredite und militärische Unterstützung zu gewähren. Dies war der Beginn der US-Militärhilfe für eine kommunistische Nation, um den sowjetischen Ambitionen in der Region entgegenzuwirken, was zu größeren Bemühungen in den Beziehungen zwischen den Vereinigten Staaten und Jugoslawien führte. Tito erhielt die Unterstützung der USA bei der erfolgreichen Bewerbung Jugoslawiens um einen Sitz im Sicherheitsrat der Vereinten Nationen im Jahr 1949 gegen den sowjetischen Widerstand. 1949 gewährten die Vereinigten Staaten Jugoslawien Kredite, 1950 wurden die Kredite erhöht und es folgten umfangreiche Zuschüsse und Militärhilfe."  #NT!
 PRC_PB_form.t:0 "Bilden Sie die Sinosphäre?"  #NT!
 PRC_PB_form.d:0 "1956 verurteilte der sowjetische Führer Nikita Chruschtschow Stalin und den Stalinismus. Mao und die chinesische Führung waren entsetzt, als die VR China und die UdSSR in ihren Interpretationen und Anwendungen der leninistischen Theorie zunehmend auseinandergingen. 1961 führten ihre hartnäckigen ideologischen Differenzen dazu, dass die VR China den Sowjetkommunismus offiziell als das Werk „revisionistischer Verräter“ in der UdSSR anprangerte. Für die Ostblockländer war die chinesisch-sowjetische Spaltung eine Frage, wer die Revolution für den Weltkommunismus anführen würde und an wen (China oder die UdSSR) sich die Avantgardeparteien der Welt um politischen Rat, finanzielle Hilfe und militärische Unterstützung wenden würden. In diesem Sinne konkurrierten beide Länder um die Führung des Weltkommunismus durch die Avantgardeparteien, die in den Ländern in ihrem Einflussbereich beheimatet waren."  #NT!
 NAM_PB_form.t:0 "Die Blockfreie Bewegung?"  #NT!
 NAM_PB_form.d:0 "Die Blockfreie Bewegung (NAM) wurde mit dem Ziel gegründet, die Interessen der Entwicklungsländer im Kontext der Konfrontation im Kalten Krieg voranzutreiben. In ihren ersten drei Jahrzehnten spielte die Bewegung eine entscheidende Rolle bei der Dekolonisierung, der Bildung neuer unabhängiger Staaten und der Demokratisierung der internationalen Beziehungen."  #NT!
 USA_SOV_INF.t:0 "Der Vertrag über nukleare Mittelstreckenraketen?"  #NT!
 USA_SOV_INF.d:0 "Der Vertrag über nukleare Mittelstreckenraketen (INF-Vertrag) war ein Rüstungskontrollvertrag zwischen den Vereinigten Staaten und der Sowjetunion (und ihrem Nachfolgestaat, der Russischen Föderation). US-Präsident Ronald Reagan und der sowjetische Generalsekretär Michail Gorbatschow unterzeichneten den Vertrag am 8. Dezember 1987. Der US-Senat stimmte dem Vertrag am 27. Mai 1988 zu, und Reagan und Gorbatschow ratifizierten ihn am 1. Juni 1988. Der INF-Vertrag verbot allen beiden Nationen nukleare und konventionelle bodengestützte ballistische Raketen, Marschflugkörper und Raketenwerfer mit Reichweiten von 500–1.000 Kilometern (310–620 Meilen) (kurze mittlere Reichweite) und 1.000–5.500 km (620–3.420 Meilen) (mittlere Reichweite). Der Vertrag galt nicht für luft- oder seegestützte Raketen."  #NT!
 USA_SOV_START.t:0 "Der Vertrag über die Reduzierung strategischer Waffen?"  #NT!
 USA_SOV_START.d:0 "START I (Strategic Arms Reduction Treaty) war ein bilateraler Vertrag zwischen den Vereinigten Staaten und der Sowjetunion über die Reduzierung und Begrenzung strategischer Angriffswaffen. Der Vertrag wurde am 31. Juli 1991 unterzeichnet und trat am 5. Dezember 1994 in Kraft. Der Vertrag verbot seinen Unterzeichnern die Stationierung von mehr als 6.000 Atomsprengköpfen und insgesamt 1.600 Interkontinentalraketen (ICBMs) und Bombern. START handelte den größten und komplexesten Rüstungskontrollvertrag der Geschichte aus, und seine endgültige Umsetzung Ende 2001 führte zur Entfernung von etwa 80 % aller damals existierenden strategischen Atomwaffen."  #NT!
 USA_CNG_form.t:0 "UN-Intervention in der Kongo-Krise?"  #NT!
 USA_CNG_form.d:0 "Die Operation der Vereinten Nationen im Kongo war eine Friedenstruppe der Vereinten Nationen, die 1960 als Reaktion auf die Kongokrise in der Republik Kongo stationiert wurde. Die ONUC war die erste friedenserhaltende Mission der Vereinten Nationen mit erheblichen militärischen Kapazitäten und bleibt hinsichtlich Größe und Umfang eine der größten UN-Operationen."  #NT!
 GBR_FPDA_form.t:0 "Die fünf Machtverteidigungsvereinbarungen?"  #NT!
 GBR_FPDA_form.d:0 "Die Five Power Defense Arrangements (FPDA) sind eine Reihe bilateraler Verteidigungsbeziehungen, die durch eine Reihe multilateraler Abkommen zwischen den Commonwealth-Ländern Australien, Malaysia, Neuseeland, Singapur und dem Vereinigten Königreich begründet wurden. Die FPDA wurde nach der Beendigung der Verteidigungsgarantien des Vereinigten Königreichs für Malaya im Rahmen des anglo-malaiischen Verteidigungsabkommens gegründet, als Folge der Entscheidung des Vereinigten Königreichs im Jahr 1967, seine Streitkräfte am 1. November 1971 östlich von Suez abzuziehen. Im Rahmen der Fünf-Mächte-Verteidigungsvereinbarungen vereinbarten die fünf Mitgliedsstaaten (Australien, Malaysia, Neuseeland, Singapur und das Vereinigte Königreich), sich im Falle einer bewaffneten Aggression gegen Malaysia und Malaysia gegenseitig zu konsultieren Singapur."  #NT!
 USA_ANZUS_form.t:0 "Die ANZUS-Allianz?"  #NT!
 USA_ANZUS_form.d:0 "Der Sicherheitsvertrag zwischen Australien, Neuseeland und den Vereinigten Staaten (ANZUS oder ANZUS-Vertrag) ist ein kollektives Sicherheitsabkommen zwischen Australien, Neuseeland und den Vereinigten Staaten, das 1951 unterzeichnet wurde. Es verpflichtet die Parteien zunächst erneut zu den Zielen der Vereinten Nationen und verbietet die Anwendung von Gewalt oder Drohungen, außer zur Selbstverteidigung."  #NT!
 vietnam_laos_form.t:0 "Der Freundschaftsvertrag zwischen Laos und Vietnam?"  #NT!
 vietnam_laos_form.d:0 "Der Laos-Vietnam-Vertrag über Freundschaft und Zusammenarbeit wurde am 18. Juli 1977 in Vientiane unterzeichnet und formalisierte das enge Bündnis zwischen der Demokratischen Volksrepublik Laos und der Sozialistischen Republik Vietnam. Es wurde eine langfristige Zusammenarbeit in den Bereichen Politik, Wirtschaft, Kultur und Sicherheit etabliert, die die tiefen Bindungen widerspiegelt, die während ihres gemeinsamen Kampfes für die Unabhängigkeit geknüpft wurden."  #NT!
 turkey_northern_cyprus_form.t:0 "Die türkische Invasion auf Zypern?"  #NT!
 turkey_northern_cyprus_form.d:0 "Die Türkei marschierte am 20. Juli 1974 in einer Operation in Zypern ein, die im folgenden Monat in zwei Phasen verlief. Vor dem Hintergrund interkommunaler Gewalt zwischen griechischen und türkischen Zyprioten und als Reaktion auf einen von der griechischen Junta geförderten Staatsstreich auf Zypern fünf Tage zuvor führte die Aktion zur türkischen Eroberung und Besetzung des nördlichen Teils der Insel."  #NT!
 greece_cyprus_form.t:0 "Der Marionettenstaat auf Zypern?"  #NT!
 greece_cyprus_form.d:0 "Ein von der griechischen Militärjunta gesponserter Militärputsch wurde am 15. Juli 1974 von der zyprischen Nationalgarde durchgeführt. Die Putschisten setzten den amtierenden Präsidenten Zyperns, Erzbischof Makarios III., aus dem Amt und setzten den Enosis-freundlichen Nationalisten Nikos Sampson ein. Das Sampson-Regime wurde als Marionettenstaat beschrieben, dessen ultimatives Ziel die Annexion der Insel durch Griechenland war; Kurzfristig proklamierten die Putschisten die Gründung der „Hellenischen Republik Zypern“."  #NT!
  
