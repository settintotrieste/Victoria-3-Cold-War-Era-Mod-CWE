 je_judiciary:0 "Die [SCOPE.GetRootScope.GetCountry.GetCustom('supreme_court_name')]"  #NT!
 je_judiciary_reason:0 "Das [SCOPE.GetRootScope.GetCountry.GetCustom('supreme_court_name')] ist das höchste Gericht in der Justiz von [ROOT.GetCountry.GetName]. Es verfügt über die oberste Berufungsgerichtsbarkeit für alle Gerichtsverfahren, die eine Frage des Verfassungs- oder Gesetzesrechts betreffen, und kann je nach Grad der Autonomie der Richter Gesetze einseitig ändern.\n\nRichter werden normalerweise von der Regierung ernannt, wenn das Ernennungsverfahren politisiert ist. Andernfalls wird ein neutraler Richter durch ein unabhängiges Komitee ernannt.\n\nGesamtzahl der Richter: #BOLD [GetPlayer.MakeScope.Var('judiciary_size').GetValue]#!\n\nNumber von [concept_progressive_judiciary] Richtern: #BOLD [GetPlayer.MakeScope.Var('judiciary_progressiveness').GetValue] #! \n\nHinweis: [concept_progressive_judiciary] Richter werden demokratischere [ROOT.GetCountry.GetName]0 in der Kategorie [ROOT.GetCountry.GetName]1 und [ROOT.GetCountry.GetName]2 unterstützen."  #NT!
 je_judiciary_status:0 "[GetPlayer.MakeScope.Var('judiciary_progressiveness').GetValue] / [GetPlayer.MakeScope.Var('judiciary_size').GetValue] Richter sind [concept_progressive_judiciary]"  #NT!
 je_judiciary_appoint_judges_button:0 "Ernennen Sie einen Richter"  #NT!
 je_judiciary_appoint_judges_button_desc:0 "Der [concept_government] kann einen Richter für den [SCOPE.GetRootScope.GetCountry.GetCustom('supreme_court_name')] ernennen, um einen scheidenden Richter zu ersetzen. Dies könnte dann die ideologische Zusammensetzung des Gerichts verändern."  #NT!
 recently_appointed_judges.tt:0 "Der [concept_government] hat in den letzten 12 Monaten keinen Richter für den [SCOPE.GetRootScope.GetCountry.GetCustom('supreme_court_name')] ernannt"  #NT!
