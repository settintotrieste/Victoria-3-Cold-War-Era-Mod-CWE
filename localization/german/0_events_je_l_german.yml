 seikan_tunnel_decision:0 "Baue den Seikan-Tunnel"  #NT!
 seikan_tunnel_decision_desc:0 "Der Seikan-Tunnel ist ein 53,85 km (33,46 Meilen) langer zweigleisiger Eisenbahntunnel in Japan mit einem 23,3 km (14,5 Meilen) langen Abschnitt unter dem Meeresboden der Tsugaru-Straße, die die Präfektur Aomori auf der japanischen Hauptinsel Honshu von der nördlichen Insel Hokkaido trennt."  #NT!
 channel_tunnel_decision:0 "Bauen Sie den Kanaltunnel"  #NT!
 channel_tunnel_decision_desc:0 "Der Kanaltunnel ist ein 50,46 Kilometer (31,35 Meilen) langer Unterwasser-Eisenbahntunnel, der 1994 eröffnet wurde und Folkestone (Kent, England) mit Coquelles (Pas-de-Calais, Frankreich) unterhalb des Ärmelkanals an der Straße von Dover verbindet. Sie ist die einzige feste Verbindung zwischen der Insel Großbritannien und dem europäischen Festland."  #NT!
 zhuhai_bridge_decision:0 "Bau der Hongkong-Zhuhai-Macau-Brücke"  #NT!
 zhuhai_bridge_decision_desc:0 "Die Hongkong-Zhuhai-Macau-Brücke (HZMB) ist ein 55 Kilometer langes Brücken-Tunnel-System, das aus einer Reihe von drei Schrägseilbrücken, einem Unterwassertunnel und vier künstlichen Inseln besteht. Es ist sowohl die längste Seeüberquerung als auch die längste feste Hochseeverbindung der Welt. Der HZMB erstreckt sich über die Kanäle Lingding und Jiuzhou und verbindet Hongkong und Macau mit Zhuhai – einer Großstadt am Perlflussdelta in China."  #NT!
 palm_islands_decision:0 "Baue die Palminseln"  #NT!
 palm_islands_decision_desc:0 "Die Palmeninseln bestehen aus drei künstlichen Inselgruppen: Palm Jumeirah, Deira Islands und Palm Jebel Ali an der Küste von Dubai, Vereinigte Arabische Emirate."  #NT!
  
