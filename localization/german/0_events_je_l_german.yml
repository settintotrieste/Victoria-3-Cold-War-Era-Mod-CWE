 foreign_triggered_enactment.t:0 "[SCOPE.sCountry('manipulator_country').GetAdjectiveNoFlag] Einmischung in [ROOT.GetCountry.GetAdjectiveNoFlag] Politik"  #NT!
 foreign_triggered_enactment.d:0 "Agenten von [SCOPE.sCountry('manipulator_country').GetName] haben sich dafür eingesetzt, dass [ROOT.GetCountry.GetAdjective] [concept_government] [SCOPE.sLaw('law_to_be_enacted').GetName] in Kraft setzt. \n\nWenn Sie dies nicht tun, werden sich die [SCOPE.gsInterestGroup('target_interest_group').GetName], die Pro-[SCOPE.sCountry('manipulator_country').GetAdjectiveNoFlag]-politische Fraktion in [ROOT.GetCountry.GetName], verärgern."  #NT!
