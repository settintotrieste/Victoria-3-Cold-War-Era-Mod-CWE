 united_libya.t:0 "Annexion durch Libyen?"  #NT!
 united_libya.d:0 "Tripolitanien und Cyrenaica blieben unter britischer Verwaltung, während die Franzosen Fezzan kontrollierten. 1944 kehrte Idris aus dem Exil in Kairo zurück, weigerte sich jedoch, wieder dauerhaft in der Cyrenaica zu leben, bis 1947 einige Aspekte der ausländischen Kontrolle aufgehoben wurden. Gemäß den Bedingungen des Friedensvertrags von 1947 mit den Alliierten verzichteten Italien, das die Kolonie Tripolitanien behalten wollte, und Frankreich, das den Fezzan wollte, auf alle Ansprüche gegenüber Libyen. Libyen blieb also vereint."  #NT!
 united_arab_republic.t:0 "Die Vereinigte Arabische Republik gründen?"  #NT!
 united_arab_republic.d:0 "Die Vereinigte Arabische Republik war von 1958 bis 1971 ein souveräner Staat im Nahen Osten. Sie war ursprünglich eine politische Union zwischen Ägypten (einschließlich des besetzten Gazastreifens) und Syrien von 1958 bis zum Austritt Syriens aus der Union nach dem syrischen Staatsstreich von 1961. Ägypten hieß weiterhin offiziell Vereinigte Arabische Republik, bis es im September 1971 von Anwar Sadat offiziell aufgelöst wurde."  #NT!
 hashemite_arab_federation.t:0 "Die Haschemitische Arabische Föderation gründen?"  #NT!
 hashemite_arab_federation.d:0 "Die Haschemitische Arabische Föderation war ein kurzlebiges Land, das 1958 aus der Vereinigung des Haschemitischen Königreichs Irak und des Königreichs Jordanien entstand. Obwohl der Name eine föderale Struktur andeutet, handelte es sich de facto um eine Konföderation."  #NT!
 RUS_BYE_union.t:0 "Der Unionsstaat Russland und Weißrussland?"  #NT!
 RUS_BYE_union.d:0 "Der Unionsstaat Russland und Weißrussland ist eine supranationale Union bestehend aus Weißrussland und Russland mit dem erklärten Ziel, die Beziehungen zwischen den beiden Staaten durch wirtschafts- und verteidigungspolitische Integration zu vertiefen. Ursprünglich wollte der Unionsstaat eine Konföderation gründen, doch beide Länder behalten derzeit ihre Unabhängigkeit."  #NT!
 SEN_GAM_union.t:0 "Die senegambische Konföderation?"  #NT!
 SEN_GAM_union.d:0 "Senegambia, offiziell die Senegambia-Konföderation oder Konföderation Senegambias, war im späten 20. Jahrhundert eine lose Konföderation zwischen den westafrikanischen Ländern Senegal und seinem Nachbarn Gambia, das fast vollständig von Senegal umgeben ist."  #NT!
 KAS_HND_union.t:0 "Beitritt von Jammu und Kaschmir zu Indien?"  #NT!
 KAS_HND_union.d:0 "Durch die Ausfertigung einer Beitrittsurkunde gemäß den Bestimmungen des Indian Independence Act von 1947 stimmte Maharaja Hari Singh dem Beitritt seines Staates zum Dominion of India zu."  #NT!
 NET_IDO_union.t:0 "Die Niederländisch-Indonesische Union?"  #NT!
 NET_IDO_union.d:0 "Die Niederländisch-Indonesische Union war eine Konföderalbeziehung zwischen den Niederlanden und Indonesien, die zwischen 1949 und 1956 bestand. Sie wurde 1949 vereinbart und war ein Versuch der Niederlande, ihre ehemalige Kolonie Niederländisch-Ostindien (heute Indonesien) auch nach der Gewährung der Unabhängigkeit weiterhin konföderal, zumindest im Rahmen einer Personalunion, an die Niederlande zu binden."  #NT!
 MLT_GBR_union.t:0 "Das maltesisch-britische Integrationsreferendum"  #NT!
 MLT_GBR_union.d:0 "Am 11. und 12. Februar 1956 fand in Malta ein Referendum über die Integration mit dem Vereinigten Königreich statt. Die Vorschläge wurden von 77 % der Wähler angenommen, bei einer Wahlbeteiligung von 59 %; Die geringe Wahlbeteiligung war teilweise auf einen Boykott der Nationalistischen Partei zurückzuführen. Die Vorschläge wurden nie vollständig umgesetzt und das Land wurde acht Jahre später ein unabhängiges Reich innerhalb des britischen Commonwealth mit dem Titel „Staat Malta“."  #NT!
 FRA_GBR_union.t:0 "Die Französisch-Britische Union?"  #NT!
 FRA_GBR_union.d:0 "Im September 1956 wurde aufgrund eines gemeinsamen Gegners während der Suez-Krise eine englisch-französische Task Force gegründet. Der französische Premierminister Guy Mollet schlug eine Union zwischen dem Vereinigten Königreich und der Französischen Union mit Elisabeth II. als Staatsoberhaupt und einer gemeinsamen Staatsbürgerschaft vor. Als Alternative schlug Mollet den Beitritt Frankreichs zum Commonwealth vor. Der britische Premierminister Anthony Eden lehnte beide Vorschläge ab; Frankreich trat anschließend den Römischen Verträgen bei, mit denen die Europäische Wirtschaftsgemeinschaft gegründet wurde."  #NT!
 YUG_BUL_union.t:0 "Die Balkanföderation?"  #NT!
 YUG_BUL_union.d:0 "Das Bled-Abkommen wurde am 1. August 1947 von Georgi Dimitrov und Josip Broz Tito in Bled (VR Slowenien, FVR Jugoslawien) unterzeichnet und ebnete den Weg für eine zukünftige Vereinigung Bulgariens und Jugoslawiens in einer neuen Balkanföderation. Die sich aus dem Abkommen ergebende Politik wurde nach der Spaltung zwischen Tito und Stalin im Juni 1948 umgekehrt, als Bulgarien, da es keine siebte Republik Jugoslawiens sein wollte, wie Tito es sich vorgestellt hatte, und an die Interessen der Sowjetunion gebunden war, eine Haltung gegen Jugoslawien einnahm. Als die Kominform-Kampagne gegen Jugoslawien die Führung der Kommunistischen Partei Jugoslawiens trennte, strich die bulgarische Regierung am 1. Oktober 1949 den Vertrag über Freundschaft, Zusammenarbeit und gegenseitigen Beistand von Bled mit allen seinen Vereinbarungen."  #NT!
 LBY_EGY_union.t:0 "Die Föderation der Arabischen Republiken?"  #NT!
 LBY_EGY_union.d:0 "Die Föderation der Arabischen Republiken war ein erfolgloser Versuch von Muammar Gaddafi, Libyen, Ägypten und Syrien zu vereinen, um einen einheitlichen arabischen Staat zu schaffen. Obwohl die drei Länder am 1. September 1971 in einem Referendum in jedem Land zugestimmt hatten, waren sie sich über die genauen Bedingungen der Fusion nicht einig. Der Verband dauerte vom 1. Januar 1972 bis zum 19. November 1977."  #NT!
 IRQ_SYR_union.t:0 "Die Union der Arabischen Republiken?"  #NT!
 IRQ_SYR_union.d:0 "Im März 1972 schlug der baathistische Irak Ägypten und Syrien die Neugründung der Vereinigten Arabischen Republik vor, die 1963 scheiterte. Der irakische Vorschlag war eine unmittelbare Reaktion auf Jordaniens Vorschlag für ein Vereinigtes Arabisches Königreich, kollidierte jedoch mit der bereits gegründeten Föderation Arabischer Republiken und scheiterte an irakisch-syrischen Differenzen."  #NT!
 UAR_NYE_union.t:0 "Die Vereinigten Arabischen Staaten?"  #NT!
 UAR_NYE_union.d:0 "Die Vereinigte Arabische Republik war ein souveräner Staat, der 1958 durch die Vereinigung Ägyptens und Syriens gegründet wurde. Im selben Jahr schloss sich das Königreich Jemen (Nordjemen), das bereits einen Verteidigungspakt mit Ägypten unterzeichnet hatte, am 8. März 1958 dem neuen Staat in einer losen Konföderation namens Vereinigte Arabische Staaten an. Ein Grund für diese Entscheidung war, dass sich Jemen seit langem von seinem wesentlich größeren und mächtigeren nördlichen Nachbarn Saudi-Arabien bedroht fühlte und die Konföderation daher als Quelle der Sicherheit betrachtete. Im Gegensatz zu den Mitgliedsländern der Vereinigten Arabischen Republik blieb Nordjemen jedoch ein unabhängiger souveräner Staat."  #NT!
 GHA_GUI_union.t:0 "Die Union Afrikanischer Staaten?"  #NT!
 GHA_GUI_union.d:0 "Die Union Afrikanischer Staaten, manchmal auch Ghana-Guinea-Mali-Union genannt, war eine kurzlebige und lockere regionale Organisation, die 1958 gegründet wurde und die westafrikanischen Nationen Ghana und Guinea als Union Unabhängiger Afrikanischer Staaten verband. Mali trat 1961 bei. Es löste sich 1963 auf."  #NT!
 HZB_RSK_BOS_union.t:0 "Das Dayton-Abkommen?"  #NT!
 HZB_RSK_BOS_union.d:0 "Das Dayton-Abkommen ist das Friedensabkommen, das auf dem Luftwaffenstützpunkt Wright-Patterson in der Nähe von Dayton, Ohio, USA, geschlossen, am 21. November 1995 abgeschlossen und am 14. Dezember 1995 in Paris offiziell unterzeichnet wurde. Diese Abkommen beendeten den dreieinhalbjährigen Bosnienkrieg, der Teil der viel größeren Jugoslawienkriege war. Die Kriegsparteien stimmten dem Frieden und einem einzigen souveränen Staat namens Bosnien und Herzegowina zu Es besteht aus zwei Teilen, der größtenteils serbisch besiedelten Republika Srpska und der hauptsächlich kroatisch-bosniakisch besiedelten Föderation Bosnien und Herzegowina."  #NT!
  
 historical_union_formation.option.1:0 "Ja"  #NT!
 historical_union_formation.option.2:0 "Nein, wir bleiben unabhängig!"  #NT!
  
 transfer_territory_libya.t:0 "Fezzan nach Libyen transferieren?"  #NT!
 transfer_territory_libya.d:0 "Tripolitanien und Cyrenaica blieben unter britischer Verwaltung, während die Franzosen Fezzan kontrollierten. 1944 kehrte Idris aus dem Exil in Kairo zurück, weigerte sich jedoch, wieder dauerhaft in der Cyrenaica zu leben, bis 1947 einige Aspekte der ausländischen Kontrolle aufgehoben wurden. Gemäß den Bedingungen des Friedensvertrags von 1947 mit den Alliierten verzichteten Italien, das die Kolonie Tripolitanien behalten wollte, und Frankreich, das den Fezzan wollte, auf alle Ansprüche gegenüber Libyen. Libyen blieb also vereint."  #NT!
 transfer_territory_somalia.t:0 "Somalia nach Italien transferieren?"  #NT!
 transfer_territory_somalia.d:0 "Das Treuhandgebiet Somaliland war ein Treuhandgebiet der Vereinten Nationen im heutigen Somalia. Die Hauptstadt war Mogadischu und wurde von 1950 bis 1960 nach der Auflösung der ehemaligen britischen Militärverwaltung von Italien verwaltet. Im Jahr 1960 erlangte es seine Unabhängigkeit."  #NT!
 transfer_territory_eritrea.t:0 "Eritrea nach Äthiopien transferieren?"  #NT!
 transfer_territory_eritrea.d:0 "Nach dem Zweiten Weltkrieg wurde Eritrea bis 1952 von der britischen Militärverwaltung verwaltet. Nach dem Beschluss der UN-Generalversammlung im Jahr 1952 würde sich Eritrea mit einem lokalen eritreischen Parlament selbst regieren, für auswärtige Angelegenheiten und Verteidigung würde es jedoch für zehn Jahre einen föderalen Status mit Äthiopien eingehen."  #NT!
 transfer_territory_tangier.t:0 "Die internationale Zone von Tanger abschaffen?"  #NT!
 transfer_territory_tangier.d:0 "Nach dem Ende des französischen Protektorats am 2. März 1956 und des spanischen am 7. April 1956 trat das Kontrollkomitee der Tanger-Zone im Juni 1956 zusammen und schlug ein Protokoll für ein Übergangsregime vor, das am 5. Juli 1956 vom marokkanischen Außenminister Ahmed Balafrej im Namen von Sultan Mohammed V. in Rabat unterzeichnet wurde. Infolgedessen wurde die Position des Administrators abgeschafft und am 10. Juli 1956 durch die eines Marokkaners ersetzt Gouverneur oder Amel, der sofort von Mendoub Ahmad at-Tazi übernommen wurde. Gleichzeitig wurde die Polizei von Tanger unter marokkanische Autorität gestellt."  #NT!
 transfer_territory_saarland.t:0 "Saarland nach Westdeutschland verlegen?"  #NT!
 transfer_territory_saarland.d:0 "Im Jahr 1954 entwickelten Frankreich und die Bundesrepublik Deutschland (Westdeutschland) einen detaillierten Plan namens Saarstatut zur Errichtung eines unabhängigen Saarlandes. Es wurde als Abkommen zwischen den beiden Ländern am 23. Oktober 1954 als einer der Pariser Pakte unterzeichnet, aber bei einer Volksabstimmung am 23. Oktober 1955 wurde es mit 67,7 % der Stimmen abgelehnt. Am 27. Oktober 1956 wurde im Saarvertrag erklärt, dass das Saarland der Bundesrepublik Deutschland beitreten darf, was am 1. Januar 1957 auch der Fall war."  #NT!
 transfer_territory_ruhr.t:0 "Das Ruhrgebiet nach Westdeutschland verlegen?"  #NT!
 transfer_territory_ruhr.d:0 "Die Ruhrbehörde wurde im Kommuniqué vom 7. Juni 1948 nach der Londoner Sechs-Mächte-Konferenz zwischen den Vereinigten Staaten von Amerika, dem Vereinigten Königreich, Frankreich und den Benelux-Staaten dargelegt. Sie wurde nach dem Pariser Vertrag von 1951 abgeschafft und ihre Aktivitäten wurden der Europäischen Gemeinschaft für Kohle und Stahl (EGKS) übertragen. Am 19. Oktober 1951 wurde in Paris eine Vereinbarung zur Beendigung der IAR unterzeichnet, und die Vereinbarung zur Beendigung der Aufgaben der IAR trat am 25. Juni 1952 in Kraft."  #NT!
 transfer_territory_trieste.t:0 "Triest nach Italien verlegen?"  #NT!
 transfer_territory_trieste.d:0 "Das Freie Territorium Triest war ein unabhängiges Territorium in Südeuropa zwischen Norditalien und Jugoslawien, das dem nördlichen Teil der Adria zugewandt war und nach dem Zweiten Weltkrieg direkt dem Sicherheitsrat der Vereinten Nationen unterstand. Das Gebiet wurde 1954 de facto aufgelöst und Italien (Zone A) und Jugoslawien (Zone B) zugeteilt. Dies führte zu einem Grenzstreit, der erst zwanzig Jahre später mit der Unterzeichnung des bilateralen Vertrags von Osimo im Jahr 1975 beigelegt und 1977 ratifiziert wurde."  #NT!
 transfer_territory_port_arthur.t:0 "Port Arthur nach China transferieren?"  #NT!
 transfer_territory_port_arthur.d:0 "Die Verwaltung des Marinestützpunkts Lüshun wechselte von China zum kaiserlichen Russland (1895–1904), zum kaiserlichen Japan (1905–1945), zur Sowjetunion (1945–56) und nach 1956 wieder zurück nach China."  #NT!
 transfer_territory_panama_canal.t:0 "Den Panamakanal nach Panama verlegen?"  #NT!
 transfer_territory_panama_canal.d:0 "Am 7. September 1977 wurde der Vertrag vom Präsidenten der Vereinigten Staaten, Jimmy Carter, und Omar Torrijos, dem faktischen Führer Panamas, unterzeichnet. Dies löste den Prozess aus, den Panamaern die freie Kontrolle über den Kanal zu gewähren, solange Panama einen Vertrag unterzeichnete, der die dauerhafte Neutralität des Kanals garantierte. Der Vertrag führte mit Wirkung zum Mittag des 31. Dezember 1999 zur vollständigen panamaischen Kontrolle und die Panama Canal Authority (ACP) übernahm die Kontrolle über die Wasserstraße."  #NT!
 transfer_territory_hong_kong.t:0 "Hongkong nach China übertragen?"  #NT!
 transfer_territory_hong_kong.d:0 "Die Übergabe Hongkongs vom Vereinigten Königreich an die Volksrepublik China erfolgte am 1. Juli 1997 um Mitternacht. Dieses Ereignis beendete 156 Jahre britischer Herrschaft in der ehemaligen Kolonie, die 1841 begann. Hongkong wurde 50 Jahre lang als Sonderverwaltungsregion Chinas (SAR) gegründet und unterhielt in dieser Zeit seine eigenen Wirtschafts- und Regierungssysteme, die denen des chinesischen Festlandes entsprachen."  #NT!
 transfer_territory_macau.t:0 "Macao nach China transferieren?"  #NT!
 transfer_territory_macau.d:0 "Die Übergabe Macaus von der Portugiesischen Republik an die Volksrepublik China erfolgte am 20. Dezember 1999 um Mitternacht. Dieses Ereignis beendete 442 Jahre portugiesischer Herrschaft in der ehemaligen Siedlung, die 1557 begann."  #NT!
 transfer_territory_west_papua.t:0 "Von West-Papua nach Indonesien transferieren?"  #NT!
 transfer_territory_west_papua.d:0 "In den späten 1940er Jahren wurden die Gebiete Niederländisch-Ostindiens mit Ausnahme von West-Neuguinea zum unabhängigen Land Indonesien. Die Niederländer behielten die Souveränität über West-Neuguinea (Niederländisch-Neuguinea) bis zum New Yorker Abkommen vom 15. August 1962, das die Region Indonesien übertrug."  #NT!
 transfer_territory_somaliland.t:0 "Somaliland nach Somalia übertragen?"  #NT!
 transfer_territory_somaliland.d:0 "Am 26. Juni 1960 wurde Britisch-Somaliland vom Vereinigten Königreich offiziell als Staat Somaliland unabhängig. Fünf Tage später, am 1. Juli 1960, schloss sich der Staat Somaliland freiwillig mit dem Treuhandgebiet Somalia (dem ehemaligen italienischen Somalia) zur Somalischen Republik zusammen."  #NT!
 transfer_territory_japanese_okinawa.t:0 "Okinawa nach Japan transferieren?"  #NT!
 transfer_territory_japanese_okinawa.d:0 "Das Okinawa Reversion Agreement war ein Abkommen zwischen den Vereinigten Staaten und Japan, in dem die Vereinigten Staaten sich bereit erklärten, alle Rechte und Interessen gemäß Artikel III des Vertrags von San Francisco, die infolge des Pazifikkrieges erlangt worden waren, zugunsten Japans aufzugeben und damit die Präfektur Okinawa wieder unter japanische Souveränität zu bringen."  #NT!
 transfer_territory_south_cameroon.t:0 "Südkamerun nach Kamerun übertragen?"  #NT!
 transfer_territory_south_cameroon.d:0 "In den Jahren 1959 und 1961 fanden in Kamerun Referenden statt, um über eine Union mit Nigeria oder Kamerun zu entscheiden. 1961 stimmten die Nordkameruner für die Union mit Nigeria und die Südkameruner für die Union mit dem (ehemals französischen) Kamerun."  #NT!
 transfer_territory_french_india.t:0 "Indische Kolonien nach Indien übertragen?"  #NT!
 transfer_territory_french_india.d:0 "Am 18. Oktober 1954 sprachen sich bei einer allgemeinen Wahl mit 178 Personen in der Gemeinde Pondicherry und der Gemeinde Panchayat 170 Personen für die Fusion aus, acht Personen stimmten dagegen. Die faktische Übertragung der französisch-indischen Gebiete von der französischen Regierung an die Indische Union erfolgte am 1. November 1954 und wurde als Unionsterritorium Pondicherry gegründet. Der Vertrag zur De-jure-Übertragung wurde 1956 unterzeichnet."  #NT!
 transfer_territory_christmas_island.t:0 "Die Weihnachtsinsel nach Australien verlegen?"  #NT!
 transfer_territory_christmas_island.d:0 "Auf Antrag Australiens übertrug das Vereinigte Königreich die Souveränität an Australien und zahlte von der australischen Regierung 20 Millionen US-Dollar an Singapur als Ausgleich für die Einnahmeausfälle aus den Phosphateinnahmen. Das Weihnachtsinselgesetz des Vereinigten Königreichs erhielt am 14. Mai 1958 die königliche Zustimmung und ermöglichte es Großbritannien, die Autorität über die Weihnachtsinsel per Ratsbeschluss von Singapur an Australien zu übertragen. Das australische Weihnachtsinselgesetz wurde im September 1958 verabschiedet und die Insel wurde am 1. Oktober 1958 offiziell der Autorität des Commonwealth of Australia unterstellt."  #NT!
 transfer_territory_israel_egypt.t:0 "Die Camp-David-Abkommen?"  #NT!
 transfer_territory_israel_egypt.d:0 "Bei den Camp-David-Abkommen handelte es sich um zwei politische Abkommen, die am 17. September 1978 vom ägyptischen Präsidenten Anwar Sadat und dem israelischen Premierminister Menachem Begin unterzeichnet wurden, nach zwölftägigen geheimen Verhandlungen in Camp David, dem Landsitz des Präsidenten der Vereinigten Staaten in Maryland."  #NT!
 transfer_territory_israel_palestine.t:0 "Das Oslo-I-Abkommen?"  #NT!
 transfer_territory_israel_palestine.d:0 "Das Oslo-I-Abkommen oder Oslo I, offiziell Grundsatzerklärung zu vorläufigen Selbstverwaltungsvereinbarungen oder kurz Grundsatzerklärung (DOP) genannt, war 1993 ein Versuch, einen Rahmen zu schaffen, der zur Lösung des anhaltenden israelisch-palästinensischen Konflikts führen sollte."  #NT!
 transfer_territory_crimea.t:0 "Die Annexion der Krim?"  #NT!
 transfer_territory_crimea.d:0 "Im Februar und März 2014 überfiel Russland die zur Ukraine gehörende Halbinsel Krim und annektierte sie anschließend. Dies geschah im relativen Machtvakuum unmittelbar nach der Revolution der Würde."  #NT!
 transfer_territory_aouzou_strip.t:0 "Den Aouzou-Streifen übertragen?"  #NT!
 transfer_territory_aouzou_strip.d:0 "Durch französischen Druck auf Libyen und die Vermittlung des nigerianischen Präsidenten Hamani Diori nahmen Libyen und Tschad am 17. April 1972 die diplomatischen Beziehungen wieder auf. Kurz darauf brach Tombalbaye die diplomatischen Beziehungen zu Israel ab und soll sich am 28. November heimlich darauf geeinigt haben, den Aouzou-Streifen an Libyen abzutreten. Im Gegenzug versprach Gaddafi dem tschadischen Präsidenten 40 Millionen Pfund und die beiden Länder unterzeichneten im Dezember 1972 einen Freundschaftsvertrag."  #NT!
 transfer_territory_china_SAR.t:0 "Ein Land, zwei Systeme beenden?"  #NT!
 transfer_territory_china_SAR.d:0 "„Ein Land, zwei Systeme“ ist ein Verfassungsgrundsatz der [ROOT.GetCountry.GetName], der die Regierungsführung der Sonderverwaltungsregionen Hongkong und Macau beschreibt. Es sah vor, dass es nur ein China geben würde, diese Regionen jedoch ihre eigenen Wirtschafts- und Verwaltungssysteme behalten könnten, während der Rest des chinesischen Festlandes ein anderes System nutzt. Nach diesem Prinzip könnte jede der beiden Regionen weiterhin ihr eigenes Regierungssystem sowie ihre eigenen Rechts-, Wirtschafts- und Finanzangelegenheiten haben, einschließlich Handelsbeziehungen mit dem Ausland, die alle unabhängig von denen des Festlandes sind. Es ist nun an der Zeit für uns zu entscheiden, ob wir dies in [SCOPE.sCountry('1_country_2_systems_SAR').GetName] fortsetzen möchten."  #NT!
 transfer_territory_china_SAR.f:0 "Dieses Ereignis wurde ausgelöst, weil [SCOPE.sCountry('1_country_2_systems_SAR').GetName] seit mehr als 50 Jahren ein $special_administrative_region$ von [ROOT.GetCountry.GetName] ist."  #NT!
 transfer_territory_omani_gwadar.t:0 "Verkauf von Gwadar an Pakistan?"  #NT!
 transfer_territory_omani_gwadar.d:0 "Zur Zeit der Unabhängigkeit Pakistans im Jahr 1947 blieb Gwadar unter omanischen Herrschaft. Dennoch begann Pakistan, Interesse an Gwadar zu bekunden. Mit den Bemühungen des pakistanischen Premierministers Feroz Khan Noon und Said bin Taimur, dem Sultan von Oman, wurde ein Abkommen geschlossen, und Pakistan konnte das Land am 8. September 1958 kaufen und wurde am 8. Dezember 1958 offiziell ein Teil Pakistans."  #NT!
 transfer_territory_portuguese_cabinda.t:0 "Transfer von Cabinda nach Angola?"  #NT!
 transfer_territory_portuguese_cabinda.d:0 "Das Alvor-Abkommen, das am 15. Januar 1975 in Alvor, Portugal, unterzeichnet wurde, gewährte Angola am 11. November die Unabhängigkeit von Portugal und beendete offiziell den 13-jährigen angolanischen Unabhängigkeitskrieg. Der Vertrag, dem FLEC nie zustimmte, beschrieb Cabinda als „integralen und unveräußerlichen Teil Angolas“."  #NT!
 transfer_territory_british_bizonia.t:0 "Bizonien in Deutschland bilden?"  #NT!
 transfer_territory_british_bizonia.d:0 "Die Bizone oder Bizonia war die Zusammenfassung der amerikanischen und britischen Besatzungszone am 1. Januar 1947 während der Besetzung Deutschlands nach dem Zweiten Weltkrieg."  #NT!
 transfer_territory_french_trizonia.t:0 "Trizonia in Deutschland gründen?"  #NT!
 transfer_territory_french_trizonia.d:0 "Am 1. August 1948 wurde die Regierungsführung von Bizonia auf die französische Besatzungszone ausgeweitet und die daraus resultierende Struktur wurde inoffiziell entweder Trizonia oder Trizonesia genannt. Die Beziehungen zwischen den vier Besatzungsmächten verschlechterten sich weiter und die viergliedrigen Strukturen wurden unüberschaubar. Im März 1948 stellte der Alliierte Kontrollrat seine Tätigkeit ein und wurde für die Trizone durch die Alliierte Hohe Kommission ersetzt."  #NT!
 transfer_territory_KMT_PRC.t:0 "Nach Taiwan fliehen?"  #NT!
 transfer_territory_KMT_PRC.d:0 "Der Rückzug der Regierung der Republik China nach Taiwan bezieht sich auf den Exodus der Überreste der damals international anerkannten, von der Kuomintang regierten Regierung der Republik China (ROC) auf die Insel Taiwan (Formosa) am 7. Dezember 1949, nachdem sie den chinesischen Bürgerkrieg auf dem chinesischen Festland verloren hatte."  #NT!
 transfer_territory_dutch_east_indonesia.t:0 "Die Denpasar-Konferenz?"  #NT!
 transfer_territory_dutch_east_indonesia.d:0 "Die Denpasar-Konferenz fand vom 7. bis 24. Dezember 1946 im Hotel Bali in Denpasar statt und führte zur Gründung des Staates Ostindonesien, der Teil der Vereinigten Staaten von Indonesien ist. Auf dieser Konferenz brachte die niederländische Regierung ihren Standpunkt zum Ausdruck, dass die Kontrolle über West-Neuguinea nicht gleichzeitig mit der Kontrolle über den Rest Niederländisch-Ostindiens übergeben werden würde."  #NT!
 transfer_territory_port_porkkala.t:0 "Den Marinestützpunkt Porkkala zurückgeben?"  #NT!
 transfer_territory_port_porkkala.d:0 "Der Marinestützpunkt Porkkala war ein sowjetischer Marinestützpunkt, der von 1944 bis 1956 in den Gemeinden Kirkkonummi, Ingå und Siuntio auf der Halbinsel Porkkala, 30 Kilometer westlich von Helsinki, Finnland, operierte. Das Gebiet wurde gemäß dem 1944 von Finnland, der Sowjetunion und dem Vereinigten Königreich unterzeichneten Moskauer Waffenstillstand an die Sowjetunion verpachtet. Das Gebiet wurde 1956 an Finnland zurückgegeben."  #NT!
 transfer_territory_port_bornholm.t:0 "Die Besetzung Bornholms beenden?"  #NT!
 transfer_territory_port_bornholm.d:0 "Am 9. Mai landeten sowjetische Truppen auf der Insel und nach einem kurzen Kampf ergab sich die deutsche Garnison (ca. 12.000 Mann stark). Die sowjetischen Streitkräfte verließen die Insel am 5. April 1946."  #NT!
 transfer_territory_port_dodecanese.t:0 "Die Dodekanes-Inseln nach Griechenland übertragen?"  #NT!
 transfer_territory_port_dodecanese.d:0 "Nach dem Krieg wurden die Inseln zu einem britischen Militärprotektorat und durften fast sofort ihre eigenen zivilen Angelegenheiten regeln, woraufhin sie informell mit Griechenland vereinigt wurden, allerdings unter getrennter Souveränität und militärischer Kontrolle. Trotz der Einwände der Türkei, die die Inseln ebenfalls wünschte, wurden sie durch den Friedensvertrag mit Italien von 1947 offiziell mit Griechenland vereint."  #NT!
 transfer_territory_british_newfoundland.t:0 "Konföderiertes Neufundland mit Kanada?"  #NT!
 transfer_territory_british_newfoundland.d:0 "Die Neufundland-Referenden von 1948 waren eine Reihe von zwei Referenden, bei denen über die politische Zukunft des Dominion Neufundland entschieden wurde. Vor den Referenden war Neufundland verschuldet und durchlief mehrere Delegationen, um zu entscheiden, ob das Land Kanada („Konföderation“) beitreten, unter britischer Herrschaft bleiben oder die Unabhängigkeit wiedererlangen würde. Die Abstimmung über die Referenden fand am 3. Juni und 22. Juli 1948 statt. Das Ergebnis war schließlich, dass Neufundland der Konföderation beitrat, was am 31. März 1949 der Fall war und die zehnte Provinz Kanadas wurde."  #NT!
 transfer_territory_british_sarawak.t:0 "Annex Sarawak?"  #NT!
 transfer_territory_british_sarawak.d:0 "Das Königreich Sarawak war ein unabhängiger Staat, der 1841 in einem Schutzvertrag mit dem Vereinigten Königreich ab 1888 gegründet wurde. Im Jahr 1888 erlangte der Raj von der britischen Regierung den Status eines geschützten Staates und vermied gleichzeitig eine Annexion. Der Zweite Weltkrieg und die Ankunft japanischer Truppen führten letztendlich zum Ende des Raj, wobei das Gebiet nach der japanischen Kapitulation 1945 unter Militärverwaltung gestellt und 1946 entgegen der Atlantik-Charta von Großbritannien als letzte Errungenschaft als Kronkolonie annektiert wurde."  #NT!
 transfer_territory_lebanon_ISR.t:0 "Die Besetzung des Libanon beenden?"  #NT!
 transfer_territory_lebanon_ISR.d:0 "Vor den israelischen Wahlen im Mai 1999 versprach der israelische Premierminister Ehud Barak, dass sich innerhalb eines Jahres alle israelischen Streitkräfte aus dem Südlibanon zurückziehen würden, wodurch die Unterstützung für die Südlibanon-Armee praktisch eingestellt wurde. Als die Verhandlungsbemühungen zwischen Israel und Syrien, deren Ziel es war, auch zwischen Israel und dem Libanon ein Friedensabkommen herbeizuführen, an der syrischen Kontrolle über den Libanon (bis 2005) scheiterten, führte Barak zu der Entscheidung, die IDF an die israelische Grenze zurückzuziehen."  #NT!
 transfer_territory_lebanon_SYR.t:0 "Die Besetzung des Libanon beenden?"  #NT!
 transfer_territory_lebanon_SYR.d:0 "Nach dem israelischen Rückzug aus dem Südlibanon und dem Tod von Hafez al-Assad im Jahr 2000 stieß die syrische Militärpräsenz auf Kritik und Widerstand seitens der libanesischen Bevölkerung. Mit der anschließenden Verabschiedung der Resolution 1559 des UN-Sicherheitsrates und nach der Ermordung des libanesischen Ex-Premierministers Rafik Hariri und den Vorwürfen, Syrien sei an seinem Tod beteiligt gewesen, kam es im Land zu einem öffentlichen Aufstand mit dem Spitznamen „Zedernrevolution“. Am 5. März 2005 kündigte der syrische Präsident Bashar Al-Assad in seiner Ansprache vor dem syrischen Parlament an, dass die syrischen Streitkräfte mit dem Abzug aus dem Libanon beginnen würden. Syrien hat seinen vollständigen Rückzug aus dem Libanon am 30. April 2005 abgeschlossen."  #NT!
 transfer_territory_SAF_NMB.t:0 "Walvis Bay nach Namibia zurückbringen?"  #NT!
 transfer_territory_SAF_NMB.d:0 "1990 erlangte Südwestafrika als Namibia die Unabhängigkeit, Walvis Bay blieb jedoch unter südafrikanischer Souveränität. Im August 1993, vor dem Ende der Apartheid, verabschiedete das Multiparty Negotiating Forum in Südafrika eine Resolution, die die Eingliederung bzw. Wiedereingliederung von Walvis Bay und den vorgelagerten Inseln in Namibia forderte. Der Transfer of Walvis Bay to Namibia Act wurde in diesem Jahr vom südafrikanischen Parlament verabschiedet. Nach der Unterzeichnung eines Vertrags zwischen den beiden Ländern übertrug Südafrika am 1. März 1994 offiziell die Souveränität über Walvis Bay und die Pinguininseln an Namibia."  #NT!
 transfer_territory_spanish_morocco.t:0 "Retrozession des spanischen al-Rif an Marokko?"  #NT!
 transfer_territory_spanish_morocco.d:0 "Als Frankreich 1956 sein Protektorat über Marokko beendete, beendete Spanien das Protektorat und übertrug das Gebiet wieder an das neue unabhängige Königreich, behielt jedoch die Plazas de Soberanía, die vor der Kolonialzeit Teil Spaniens waren, Kap Juby, Ifni und andere Kolonien (wie die spanische Sahara) außerhalb Marokkos."  #NT!
 transfer_territory_bahrain.t:0 "Die Bahrain-Frage?"  #NT!
 transfer_territory_bahrain.d:0 "Die Bahraini Independence Survey 1970 fand zwischen dem 28. März und dem 11. Mai 1970 statt. Am 28. März beauftragte der UN-Generalsekretär Vittorio Winspeare-Guicciardi, die Bahrainer zu ihrer Zukunft zu befragen. Am 11. Mai bestätigte der UN-Sicherheitsrat seine Schlussfolgerung, dass die überwältigende Mehrheit die vollständige Unabhängigkeit befürworte. Anlass für die Umfrage war die Entscheidung Großbritanniens im Jahr 1968, sich bis Ende 1971 aus dem Persischen Golf zurückzuziehen, was die Zukunft Bahrains ungewiss machte. Der Iran hatte seinen Anspruch auf Bahrain wiederbelebt, aber die von den Vereinten Nationen geleitete Konsultation löste den Streit, indem sie die Präferenz des Volkes für Unabhängigkeit bestätigte."  #NT!
 transfer_territory_gaza.t:0 "Die Zukunft des Gazastreifens"  #NT!
 transfer_territory_gaza.d:0 "Mitte Januar 2025 begann ein vorläufiger Waffenstillstand, der zwei Monate dauerte. Im August startete Israel eine Offensive gegen Gaza-Stadt. Bis zum 9. Oktober 2025 einigten sich Israel und Hamas auf den ersten Teil eines von den Vereinigten Staaten geführten Friedensplans. Die am 17. November 2025 angenommene Resolution 2803 des Sicherheitsrats der Vereinten Nationen enthält Bestimmungen für die Übergangsregierung des Gazastreifens."  #NT!
 transfer_territory_DPR.t:0 "Die russische Annexion von [ROOT.GetCountry.GetNameNoFormatting]?"  #NT!
 transfer_territory_DPR.d:0 "Am 30. September 2022 erklärte Russland im Rahmen einer andauernden Invasion der Ukraine einseitig die Annexion von Gebieten in und um vier ukrainische Oblaste – Donezk, Cherson, Luhansk und Saporischschja. Der größte Teil der Oblast Luhansk und ein Teil der Oblast Donezk wurden seit 2014 von prorussischen Separatisten kontrolliert, während die Oblaste Cherson und Saporischschja 2022 von Russland überfallen wurden. Die Grenzen der zu annektierenden Gebiete und ihre Grenzen wurden nicht festgelegt; Russische Beamte gaben an, dass sie später definiert würden."  #NT!
 end_berlin_occupation.t:0 "Die Besetzung Berlins beenden?"  #NT!
 end_berlin_occupation.d:0 "West-Berlin blieb bis zum 3. Oktober 1990, dem Tag der Vereinigung Ostdeutschlands, Ost- und West-Berlins mit der Bundesrepublik Deutschland, militärisch besetzt. Die westdeutsche Bundesregierung sowie die Regierungen der meisten westlichen Nationen betrachteten Ostberlin als eine von Ostdeutschland getrennte Einheit, und obwohl die Westalliierten später Botschaften in Ostberlin eröffneten, erkannten sie die Stadt nur als Regierungssitz der DDR an, nicht als deren Hauptstadt."  #NT!
  
 historical_territorial_transfers.option.1:0 "Übertragen Sie die Gebiete"  #NT!
 historical_territorial_transfers.option.2:0 "Diese Gebiete bleiben unser Eigentum!"  #NT!
  
 historical_territorial_annexation.option.1:0 "Annexion des Territoriums!"  #NT!
 historical_territorial_annexation.option.2:0 "Wir brauchen nicht mehr Land"  #NT!
  
 malaysia_singapore.t:0 "Unabhängigkeit Singapurs?"  #NT!
 malaysia_singapore.d:0 "Das malaysische Parlament stimmte am 9. August 1965 mit 126 zu 0 Stimmen für den Ausschluss, wobei alle singapurischen Abgeordneten die Abstimmung boykottierten. An diesem Tag verkündete ein weinerlicher Lee Kuan Yew auf einer im Fernsehen übertragenen Pressekonferenz, dass Singapur eine souveräne, unabhängige Nation sei."  #NT!
 CAF_rhodesia.t:0 "Die Föderation Rhodesien und Njassaland auflösen?"  #NT!
 CAF_rhodesia.d:0 "Die Föderation endete offiziell am 31. Dezember 1963. 1964, kurz nach der Auflösung, wurden Nordrhodesien und Njassaland unter den Namen Sambia bzw. Malawi unabhängig. Im November 1965 erklärte Südrhodesien einseitig seine Unabhängigkeit vom Vereinigten Königreich als Staat Rhodesien."  #NT!
 uar_syria.t:0 "Unabhängigkeit Syriens?"  #NT!
 uar_syria.d:0 "Statt einer Föderation zweier arabischer Völker, wie viele Syrer es sich vorgestellt hatten, verwandelte sich die UAR in einen vollständig von Ägyptern dominierten Staat. Auch das politische Leben in Syrien wurde beeinträchtigt, da Nasser die Auflösung aller politischen Parteien in Syrien forderte. Dabei zwang der stark zentralisierte ägyptische Staat dem schwächeren Syrien Nassers sozialistisches politisches und wirtschaftliches System auf, was zu einer Gegenreaktion seitens der syrischen Geschäfts- und Armeekreise führte, die zum syrischen Putsch vom 28. September 1961 und zum Ende der UAR führte."  #NT!
 west_indies_dissolution.t:0 "Die West Indies Federation auflösen?"  #NT!
 west_indies_dissolution.d:0 "Die West Indies Federation wurde mit dem West Indies Act 1962 des Parlaments des Vereinigten Königreichs rechtlich aufgelöst. Die verbleibenden „Little Eight“-Provinzen wurden erneut zu separaten Kolonien, die direkt von London aus überwacht wurden und von denen die meisten später unabhängig wurden."  #NT!
 NET_IDO.t:0 "Die Niederländisch-Indonesische Union auflösen?"  #NT!
 NET_IDO.d:0 "Die Niederländisch-Indonesische Union war eine Konföderalbeziehung zwischen den Niederlanden und Indonesien, die zwischen 1949 und 1956 bestand. In einer Rede am 17. August 1954 anlässlich des 9. Jahrestages der Unabhängigkeit Indonesiens löste Präsident Sukarno die Union einseitig auf und bezeichnete sie als Hindernis für den indonesischen Fortschritt."  #NT!
 ussr_dissolution.t:0 "Die Sowjetunion auflösen?"  #NT!
 ussr_dissolution.d:0 "Die Auflösung der Sowjetunion war der Prozess des inneren Zerfalls innerhalb der Sowjetunion (UdSSR), der zum Ende des Landes als souveräner Staat und seiner Bundesregierung führte, was wiederum dazu führte, dass die 15 Teilrepubliken am 26. Dezember 1991 die volle Unabhängigkeit erlangten."  #NT!
 ussr_dissolution.f:0 "Diese Veranstaltung wurde ausgelöst, weil entweder die historischen Bedingungen für eine Auflösung erfüllt waren oder es eine revolutionäre Bewegung mit antikommunistischen Interessengruppen gab und die Volkswirtschaft schlecht war."  #NT!
 CZH_dissolution.t:0 "Die Tschechoslowakei auflösen?"  #NT!
 CZH_dissolution.d:0 "Die Auflösung der Tschechoslowakei, die am 31. Dezember 1992 in Kraft trat, war die selbstbestimmte Teilung der Bundesrepublik Tschechoslowakei in die unabhängigen Länder Tschechien und Slowakei. Beide spiegelten die Tschechische Sozialistische Republik und die Slowakische Sozialistische Republik wider, die 1969 als Teilstaaten der Tschechoslowakischen Sozialistischen Republik bis Ende 1989 gegründet worden waren."  #NT!
 CZH_dissolution.f:0 "Diese Veranstaltung wurde ausgelöst, weil entweder die historischen Bedingungen für eine Auflösung erfüllt waren oder es eine revolutionäre Bewegung mit antikommunistischen Interessengruppen gab und die Volkswirtschaft schlecht war."  #NT!
 SER_MON_dissolution.t:0 "Unabhängigkeit Montenegros?"  #NT!
 SER_MON_dissolution.d:0 "Am 21. Mai 2006 fand in Montenegro ein Unabhängigkeitsreferendum statt. Es wurde von 55,5 % der Wähler angenommen und überschritt damit knapp die 55 %-Hürde."  #NT!
 CAN_QUE_1_dissolution.t:0 "Das erste Quebec-Referendum?"  #NT!
 CAN_QUE_1_dissolution.d:0 "Das Unabhängigkeitsreferendum in Quebec im Jahr 1980 war das erste Referendum in Quebec über die Stellung Quebecs innerhalb Kanadas und die Frage, ob Quebec einen Weg zur Souveränität einschlagen sollte. Das Referendum wurde von der Regierung der Parti Québécois (PQ) Quebecs einberufen, die eine Abspaltung von Kanada befürwortete. Das landesweite Referendum fand am 20. Mai statt und der Vorschlag, eine Abspaltung anzustreben, wurde mit einer Mehrheit von 59,56 Prozent zu 40,44 Prozent abgelehnt."  #NT!
 CAN_QUE_2_dissolution.t:0 "Das zweite Quebec-Referendum?"  #NT!
 CAN_QUE_2_dissolution.d:0 "Das Referendum in Quebec im Jahr 1995 war das zweite Referendum, bei dem die Wähler in der überwiegend französischsprachigen kanadischen Provinz Quebec gefragt wurden, ob Quebec seine Souveränität proklamieren und ein unabhängiges Land werden sollte, unter der aufschiebenden Bedingung, Kanada ein politisches und wirtschaftliches Abkommen anzubieten. Die Abstimmung fand am 30. Oktober 1995 statt und verzeichnete die höchste Wahlbeteiligung in der Geschichte Quebecs (93,52 %). Die „Nein“-Option wurde mit einem Vorsprung von 54.288 Stimmen angenommen und erhielt 50,58 % der abgegebenen Stimmen."  #NT!
 IRQ_KUR_dissolution.t:0 "Kurdische Autonomie anerkennen?"  #NT!
 IRQ_KUR_dissolution.d:0 "Im Vorfeld des Irak-Kriegs im Jahr 2003 schlossen sich die beiden Parteien in den Verhandlungen mit der arabischen Opposition gegen Saddam Hussein zusammen und konnten politische, wirtschaftliche und sicherheitspolitische Vorteile erzielen. Die arabische Opposition einigte sich darauf, die kurdische Autonomie für den Fall anzuerkennen, dass Saddam Hussein von der Macht entfernt würde. Amerika und Kurdistan haben auch gemeinsam die islamistische Gruppe Ansar al-Islam in der Region Halabja ausgerottet, als Kurdistan Tausende von Soldaten beherbergte. Die seit 1992 bestehende kurdische Autonomie wurde von der neuen irakischen Regierung 2005 in der neuen irakischen Verfassung offiziell anerkannt"  #NT!
 GBR_SCO_dissolution.t:0 "Das schottische Unabhängigkeitsreferendum"  #NT!
 GBR_SCO_dissolution.d:0 "Am 18. September 2014 fand in Schottland ein Referendum über die Unabhängigkeit Schottlands vom Vereinigten Königreich statt. Die Frage des Referendums lautete: „Soll Schottland ein unabhängiges Land sein?“, was die Wähler mit „Ja“ oder „Nein“ beantworteten. Die „Nein“-Seite gewann mit 2.001.926 Stimmen gegen die Unabhängigkeit und 1.617.989 Stimmen dafür."  #NT!
 SPA_CAT_dissolution.t:0 "Das katalanische Unabhängigkeitsreferendum"  #NT!
 SPA_CAT_dissolution.d:0 "Am 1. Oktober 2017 fand in der spanischen Autonomen Gemeinschaft Katalonien ein Unabhängigkeitsreferendum statt, das vom katalanischen Parlament als Gesetz zum Referendum über die Selbstbestimmung Kataloniens verabschiedet wurde. Das Referendum wurde am 7. September 2017 für verfassungswidrig erklärt und vom spanischen Verfassungsgericht auf Antrag der spanischen Regierung ausgesetzt, die es als Verstoß gegen die spanische Verfassung erklärte."  #NT!
 SKN_GBR_dissolution.t:0 "Auflösung von Saint Christopher-Nevis-Anguilla?"  #NT!
 SKN_GBR_dissolution.d:0 "Nach einer kurzen Zeit als Teil der Westindischen Föderation wurde die Insel Anguilla 1967 Teil des assoziierten Staates St. Kitts-Nevis-Anguilla mit vollständiger innerer Autonomie. Viele Anguillaner hatten jedoch keinen Wunsch, Teil dieser Union zu sein, und ärgerten sich über die Dominanz von St. Kitts darin. Im Jahr 1980 wurde Anguilla schließlich offiziell gestattet, sich von St. Kitts und Nevis abzuspalten und ein eigenständiges britisches Überseegebiet zu werden."  #NT!
 FRA_NCD_dissolution.t:0 "Das neukaledonische Unabhängigkeitsreferendum"  #NT!
 FRA_NCD_dissolution.d:0 "Am 12. Dezember 2021 fand in Neukaledonien, einem französischen Territorium im Südpazifik, ein Unabhängigkeitsreferendum statt. Die Abstimmung war die dritte und letzte, die im Rahmen des Nouméa-Abkommens abgehalten wurde, nach Abstimmungen in den Jahren 2018 und 2020, bei denen die Unabhängigkeit mit 57 % bzw. 53 % abgelehnt wurde."  #NT!
 UAS_GHA.t:0 "Auflösung der Union Afrikanischer Staaten"  #NT!
 UAS_GHA.d:0 "Die Gewerkschaft wurde im Mai 1963 ohne große Aufmerksamkeit aufgelöst. Für das Scheitern der UAS wurden unterschiedliche Erklärungen angeführt, etwa konkurrierende Nationalismen und inhärente Mängel im US-amerikanischen Föderationsmodell, von dem Nkrumah beeinflusst wurde. Adom Getachew argumentiert, dass das Scheitern auf tiefe Meinungsverschiedenheiten über das genaue Gleichgewicht zwischen föderaler Union und Unabhängigkeit der Mitgliedstaaten zurückzuführen sei."  #NT!
 PHI_MGD_dissolution.t:0 "Das Bangsamoro-Bio-Gesetz?"  #NT!
 PHI_MGD_dissolution.d:0 "Das Bangsamoro Organic Law ist ein philippinisches Gesetz, das die Gründung der Autonomen Region Bangsamoro im muslimischen Mindanao (BARMM) vorsah. Als organischer Akt schaffte das Grundgesetz die Autonome Region im muslimischen Mindanao (ARMM) ab und legte die Grundstruktur der Regierung für Bangsamoro fest, entsprechend den Vereinbarungen, die im umfassenden Abkommen zum Friedensabkommen von Bangsamoro festgelegt waren, das 2014 zwischen der Regierung der Philippinen und der Moro Islamic Liberation Front unterzeichnet wurde."  #NT!
 SOM_SML_dissolution.t:0 "Die Unabhängigkeit Somalilands?"  #NT!
 SOM_SML_dissolution.d:0 "Der Staat Somaliland schloss sich freiwillig mit dem Trust Territory of Somalia (dem ehemaligen italienischen Somalia) zur Somalischen Republik zusammen. Die Vereinigung der beiden Staaten erwies sich schon früh als problematisch, und als Reaktion auf die harte Politik des somalischen Barre-Regimes gegen die wichtigste Clanfamilie in Somaliland, die Isaaq, endete kurz nach dem Ende des katastrophalen Ogaden-Krieges ein zehnjähriger Unabhängigkeitskrieg mit der Unabhängigkeitserklärung Somalilands im Jahr 1991."  #NT!
 MOR_WSA_dissolution.t:0 "Der Waffenstillstand in der Westsahara?"  #NT!
 MOR_WSA_dissolution.d:0 "Der von den Vereinten Nationen vermittelte Waffenstillstand in der Westsahara von 1991 trat am 6. September 1991 in Kraft. Er war ein wichtiger Teil eines umfassenderen Friedensprozesses, einschließlich der Einrichtung von MINURSO, der Mission der Vereinten Nationen für das Referendum in der Westsahara, um den Waffenstillstand zu überwachen und ein Referendum über die Zukunft des Territoriums vorzubereiten. Obwohl der Waffenstillstand fast 30 Jahre lang galt, führte er letztlich nicht zu einer Lösung des Konflikts."  #NT!
  
 historical_union_dissolution.option.1:0 "Gewähren Sie ihnen Unabhängigkeit"  #NT!
 historical_union_dissolution.option.2:0 "Unser Land kann nicht fragmentiert werden!"  #NT!
  
 dissolve_the_ussr.tt:0 "Auflösung der Union der Sozialistischen Sowjetrepubliken"  #NT!
 dissolve_the_warsaw_pact.tt:0 "Den Warschauer Pakt auflösen"  #NT!
 create_russian_federation.tt:0 "Werde die Russische Föderation"  #NT!
  
 korean_war.t:0 "Der Koreakrieg"  #NT!
 korean_war.d:0 "Der Koreakrieg wurde von 1950 bis 1953 zwischen Nordkorea und Südkorea geführt. Der Krieg begann am 25. Juni 1950, als Nordkorea nach jahrelangen Feindseligkeiten zwischen den beiden Ländern in Südkorea einmarschierte. Nordkorea wurde von China und der Sowjetunion unterstützt, während Südkorea von den Vereinigten Staaten und alliierten Ländern unterstützt wurde. Die Kämpfe endeten mit einem Waffenstillstand am 27. Juli 1953."  #NT!
 sino_tibetan_war:0 "Der chinesisch-tibetische Krieg"  #NT!
 sino_tibetan_war.t:0 "Der chinesisch-tibetische Krieg"  #NT!
 sino_tibetan_war.d:0 "Tibet geriet unter die Kontrolle der Volksrepublik China (VR China), nachdem die tibetische Regierung das Siebzehn-Punkte-Abkommen unterzeichnet hatte, das der 14. Dalai Lama am 24. Oktober 1951 ratifizierte, später jedoch mit der Begründung zurückwies, dass er seine Zustimmung zu dem Abkommen unter Zwang gegeben hatte. Nach monatelangen gescheiterten Verhandlungen, Versuchen Tibets, sich ausländische Unterstützung und Hilfe zu sichern, und dem Aufbau von Truppen aus der Volksrepublik China und Tibet überquerte die Volksbefreiungsarmee (VBA) am 6. oder 7. Oktober 1950 den Jinsha-Fluss, um Tibet zu annektieren."  #NT!
 portugal_india_war.t:0 "Annexion von Goa"  #NT!
 portugal_india_war.d:0 "Die Annexion von Goa war der Prozess, bei dem die Republik Indien den Staat Indien und die damaligen portugiesisch-indischen Gebiete Goa, Daman und Diu annektierte, beginnend mit der bewaffneten Aktion der indischen Streitkräfte im Dezember 1961."  #NT!
 suez_crisis_war.t:0 "Die Suez-Krise"  #NT!
 suez_crisis_war.d:0 "Die Suez-Krise war eine Invasion Ägyptens und des Gazastreifens Ende 1956 durch Israel, gefolgt vom Vereinigten Königreich und Frankreich. Ziel war es, die Kontrolle über den Suezkanal für die Westmächte zurückzugewinnen und den ägyptischen Präsidenten Gamal Abdel Nasser zu stürzen, der gerade die in ausländischem Besitz befindliche Suezkanalgesellschaft, die den Kanal verwaltete, verstaatlicht hatte."  #NT!
 vietnam_war.t:0 "Der Vietnamkrieg"  #NT!
 vietnam_war.d:0 "Der Vietnamkrieg war ein Konflikt in Vietnam, Laos und Kambodscha vom 1. November 1955 bis zum Fall Saigons am 30. April 1975. Es war der zweite der Indochinakriege und ein wichtiger Konflikt des Kalten Krieges. Während der Krieg offiziell zwischen Nordvietnam und Südvietnam geführt wurde, wurde der Norden von der Sowjetunion, China und anderen kommunistischen Staaten unterstützt, während der Süden von den Vereinigten Staaten und anderen antikommunistischen Verbündeten unterstützt wurde, was den Krieg zu einem Stellvertreterkrieg zwischen den Vereinigten Staaten und der Sowjetunion machte. Es dauerte fast 20 Jahre, wobei die direkte militärische Beteiligung der USA 1973 endete."  #NT!
 second_indo_pakistan_war.t:0 "Der Zweite Kaschmir-Krieg"  #NT!
 second_indo_pakistan_war.d:0 "Der Indisch-Pakistanische Krieg von 1965, auch als zweiter Indien-Pakistan-Krieg bekannt, war ein bewaffneter Konflikt zwischen Pakistan und Indien, der von August 1965 bis September 1965 stattfand."  #NT!
 falklands_war.t:0 "Der Falklandkrieg"  #NT!
 falklands_war.d:0 "Der Falklandkrieg war ein zehnwöchiger, nicht erklärter Krieg zwischen Argentinien und dem Vereinigten Königreich im Jahr 1982 um zwei von Großbritannien abhängige Gebiete im Südatlantik: die Falklandinseln und ihre territoriale Abhängigkeit, Südgeorgien und die Südlichen Sandwichinseln. Der Konflikt begann am 2. April 1982, als Argentinien in die Falklandinseln einmarschierte und diese besetzte, gefolgt von der Invasion Südgeorgiens am nächsten Tag. Am 5. April entsandte die britische Regierung eine Marine-Einsatzgruppe, um die argentinische Marine und Luftwaffe anzugreifen, bevor sie einen amphibischen Angriff auf die Inseln startete. Der Konflikt dauerte 74 Tage und endete mit der Kapitulation Argentiniens am 14. Juni, wodurch die Inseln wieder unter britische Kontrolle kamen."  #NT!
 third_indo_pakistan_war.t:0 "Der Dritte Indopakistanische Krieg"  #NT!
 third_indo_pakistan_war.d:0 "Der Indisch-Pakistanische Krieg von 1971 war eine militärische Konfrontation zwischen Indien und Pakistan, die während des Bangladesch-Befreiungskrieges in Ostpakistan vom 3. Dezember 1971 bis zur pakistanischen Kapitulation in Dhaka am 16. Dezember 1971 stattfand."  #NT!
 6_day_war.t:0 "Der arabisch-israelische Krieg"  #NT!
 6_day_war.d:0 "Der Sechstagekrieg oder Junikrieg, auch bekannt als Arabisch-Israelischer Krieg von 1967 oder Dritter Arabisch-Israelischer Krieg, wurde vom 5. bis 10. Juni 1967 zwischen Israel und einer Koalition arabischer Staaten geführt."  #NT!
 ifni_war.t:0 "Der Ifni-Krieg"  #NT!
 ifni_war.d:0 "Der Ifni-Krieg, in Spanien manchmal auch der „Vergessene Krieg“ genannt, war eine Reihe bewaffneter Einfälle marokkanischer Aufständischer in Spanisch-Westafrika, die im Oktober 1957 begannen und mit der fehlgeschlagenen Belagerung von Sidi Ifni gipfelten."  #NT!
 IDO_ETM_war.t:0 "Die Invasion Osttimors"  #NT!
 IDO_ETM_war.d:0 "Die indonesische Invasion in Osttimor begann am 7. Dezember 1975, als das indonesische Militär (ABRI/TNI) unter dem Vorwand des Antikolonialismus und Antikommunismus in Osttimor einmarschierte, um das 1974 entstandene Fretilin-Regime zu stürzen."  #NT!
 iran_iraq_war.t:0 "Der Iran-Irak-Krieg"  #NT!
 iran_iraq_war.d:0 "Der Iran-Irak-Krieg war ein bewaffneter Konflikt zwischen dem Iran und dem Irak, der von September 1980 bis August 1988 dauerte. Die aktiven Feindseligkeiten begannen mit der irakischen Invasion im Iran und dauerten acht Jahre, bis beide Seiten die Resolution 598 des Sicherheitsrats der Vereinten Nationen akzeptierten."  #NT!
 france_tunisia_war.t:0 "Die Bizerte-Krise"  #NT!
 france_tunisia_war.d:0 "Die Bizerte-Krise ereignete sich im Juli 1961, als Tunesien eine Blockade gegen den französischen Marinestützpunkt Bizerte in Tunesien verhängte, in der Hoffnung, dessen Evakuierung zu erzwingen. Die Krise gipfelte in einem dreitägigen Kampf zwischen französischen und tunesischen Streitkräften, bei dem 630 Tunesier und 24 Franzosen starben, was schließlich dazu führte, dass Frankreich 1963 die Stadt und den Marinestützpunkt an Tunesien abtrat."  #NT!
 yom_kippur_war.t:0 "Der Jom-Kippur-Krieg"  #NT!
 yom_kippur_war.d:0 "Der Jom-Kippur-Krieg, auch bekannt als Ramadan-Krieg, Oktoberkrieg, Arabisch-Israelischer Krieg von 1973 oder Vierter Arabisch-Israelischer Krieg, war ein bewaffneter Konflikt, der vom 6. bis 25. Oktober 1973 zwischen Israel und einer von Ägypten und Syrien angeführten Koalition arabischer Staaten ausgetragen wurde."  #NT!
 morocco_sahara_war.t:0 "Die Annexion der Westsahara?"  #NT!
 morocco_sahara_war.d:0 "Die Annexion der Westsahara erfolgte in zwei Phasen: 1976 und 1979. Kurz nachdem Spanien 1975 die Kontrolle über die Spanische Sahara aufgegeben hatte, besetzten Mauretanien und Marokko das Gebiet. Am 14. April 1976 annektierten die beiden Länder es untereinander im Rahmen des Westsahara-Teilungsabkommens."  #NT!
 iraq_kuwait_war.t:0 "Der Golfkrieg?"  #NT!
 iraq_kuwait_war.d:0 "Am 2. August 1990 startete der von Diktator Saddam Hussein regierte Irak eine Invasion im benachbarten Kuwait und besetzte das Land innerhalb von zwei Tagen vollständig. Die Invasion Kuwaits wurde sofort international verurteilt, unter anderem in der Resolution 660 des Sicherheitsrates der Vereinten Nationen (UNSC), der in Resolution 661 einstimmig Wirtschaftssanktionen gegen Irak verhängte. Die am 29. November 1990 angenommene Resolution 678 des UN-Sicherheitsrates bot dem Irak bis zum 15. Januar 1991 eine letzte Chance, die Resolution 660 umzusetzen und sich aus Kuwait zurückzuziehen. Darüber hinaus ermächtigte es die Staaten, nach Ablauf der Frist „alle notwendigen Mittel“ einzusetzen, um den Irak aus Kuwait zu vertreiben."  #NT!
 soviet_afghan_war.t:0 "Sowjetisch-afghanischer Krieg?"  #NT!
 soviet_afghan_war.d:0 "Der sowjetisch-afghanische Krieg war ein langwieriger bewaffneter Konflikt, der von 1979 bis 1989 in der sowjetisch kontrollierten Demokratischen Republik Afghanistan (DRA) ausgetragen wurde. Der Krieg begann, nachdem die Sowjets unter dem Kommando von Leonid Breschnew eine Invasion in Afghanistan starteten, um die lokale prosowjetische Regierung zu unterstützen, die während der Operation Storm-333 eingesetzt worden war."  #NT!
 vietnam_cambodian_war.t:0 "Die Invasion in Kambodscha?"  #NT!
 vietnam_cambodian_war.d:0 "Am 25. Dezember 1978 marschierten 150.000 vietnamesische Truppen in das demokratische Kampuchea ein und überrannten die kampuchische Revolutionsarmee in nur zwei Wochen und beendeten damit die Regierung von Pol Pot, die zwischen 1975 und Dezember 1978 während des kambodschanischen Völkermords für den Tod von fast einem Viertel aller Kambodschaner verantwortlich war."  #NT!
 russia_ukraine_war.t:0 "Der Russisch-Ukrainische Krieg?"  #NT!
 russia_ukraine_war.d:0 "Der Russisch-Ukrainische Krieg war ein internationaler Konflikt zwischen Russland und der Ukraine, der im Februar 2014 begann. Nach der Revolution der Würde in der Ukraine annektierte Russland die Krim von der Ukraine und unterstützte prorussische Separatisten, die im Donbass-Krieg gegen das ukrainische Militär kämpften. In den ersten acht Jahren des Konflikts kam es auch zu Zwischenfällen auf See, Cyberkrieg und verschärften politischen Spannungen. Im Februar 2022 startete Russland eine umfassende Invasion der Ukraine mit dem Ziel, weiteres Territorium zu annektieren und einen Regimewechsel herbeizuführen."  #NT!
 second_iraq_war.t:0 "Der Irak-Krieg?"  #NT!
 second_iraq_war.d:0 "Der Irak-Krieg war ein langwieriger bewaffneter Konflikt im Irak von 2003 bis 2011. Er begann mit der Invasion des Irak durch die von den Vereinigten Staaten geführte Koalition, die die Baath-Regierung von Saddam Hussein stürzte. Der Konflikt dauerte einen Großteil des nächsten Jahrzehnts an, als sich ein Aufstand gegen die Koalitionskräfte und die irakische Regierung nach der Invasion entwickelte. Im Jahr 2011 wurden die US-Truppen offiziell abgezogen."  #NT!
 chad_libya_war.t:0 "Der Toyota-Krieg?"  #NT!
 chad_libya_war.d:0 "Der Toyota-Krieg fand 1987 im Norden des Tschad und an der Grenze zwischen Tschad und Libyen statt und war die letzte Phase des tschadisch-libyschen Konflikts. Seinen Namen verdankt es den Toyota-Pickups, vor allem dem Toyota Hilux und dem Toyota Land Cruiser, die den tschadischen Truppen im Kampf gegen die Libyer als Mobilitätshilfe und als technisches Fahrzeug dienten. Der Tschad konnte fast den gesamten Norden des Tschad zurückerobern und fügte den Libyern in den folgenden Monaten erneut schwere Niederlagen zu, bis im September ein Waffenstillstand unterzeichnet wurde, der den Konflikt beendete."  #NT!
 us_afghan_war.t:0 "Krieg in Afghanistan?"  #NT!
 us_afghan_war.d:0 "Der Krieg in Afghanistan war ein bewaffneter Konflikt von 2001 bis 2021. Er begann, als eine internationale Militärkoalition unter Führung der Vereinigten Staaten eine Invasion in Afghanistan startete, das von den Taliban regierte Islamische Emirat stürzte und drei Jahre später die international anerkannte Islamische Republik gründete."  #NT!
 us_panama_war.t:0 "Invasion in Panama?"  #NT!
 us_panama_war.d:0 "Die Vereinigten Staaten marschierten Mitte Dezember 1989 während der Präsidentschaft von George H. W. Bush in Panama ein. Der Hauptzweck der Invasion bestand darin, den De-facto-Herrscher von Panama, General Manuel Noriega, zu stürzen, der von den US-Behörden wegen Erpressung und Drogenhandels gesucht wurde. Die Operation mit dem Codenamen Operation Just Cause endete Ende Januar 1990 mit der Übergabe von Noriega. Die Panama Defence Forces (PDF) wurden aufgelöst und der gewählte Präsident Guillermo Endara wurde in sein Amt vereidigt."  #NT!
 first_congo_war.t:0 "Der Erste Kongo-Krieg?"  #NT!
 first_congo_war.d:0 "Der Erste Kongokrieg war ein Bürgerkrieg und ein internationaler militärischer Konflikt, der hauptsächlich in Zaire (das dabei in Demokratische Republik Kongo umbenannt wurde) stattfand und große Auswirkungen auf den Sudan und Uganda hatte. Der Konflikt gipfelte in einer ausländischen Invasion, bei der der zairische Präsident Mobutu Sese Seko durch den Rebellenführer Laurent-Désiré Kabila ersetzt wurde. Kabilas instabile Regierung geriet daraufhin in Konflikt mit seinen Verbündeten und bereitete 1998–2003 die Bühne für den Zweiten Kongo-Krieg."  #NT!
 second_congo_war.t:0 "Der Zweite Kongokrieg?"  #NT!
 second_congo_war.d:0 "Der Zweite Kongokrieg begann in der Demokratischen Republik Kongo im August 1998, etwas mehr als ein Jahr nach dem Ersten Kongokrieg, und beinhaltete einige der gleichen Probleme. Der Krieg, an dem schließlich Kriegführende aus dem gesamten afrikanischen Kontinent beteiligt waren, endete offiziell im Juli 2003, als die Übergangsregierung der Demokratischen Republik Kongo die Macht übernahm."  #NT!
 russia_georgia_war.t:0 "Der Russisch-Georgische Krieg?"  #NT!
 russia_georgia_war.d:0 "Die Republik Georgien erklärte im März 1991 im Zuge der Auflösung der Sowjetunion ihre Unabhängigkeit. Allerdings führten die Kämpfe zwischen Georgien und Separatisten dazu, dass Teile des ehemaligen Autonomen Gebiets Südossetien de facto unter der Kontrolle von von Russland unterstützten, aber international nicht anerkannten Separatisten standen. Eine ähnliche Pattsituation entwickelte sich in der Region Abchasien, wo abchasische Separatisten 1992–1993 einen Krieg geführt hatten. Nach der Wahl Wladimir Putins in Russland im Jahr 2000 und einem prowestlichen Machtwechsel in Georgien im Jahr 2003 begannen sich die Beziehungen zwischen Russland und Georgien zu verschlechtern. Die Beziehungen erreichten im April 2008 eine völlige diplomatische Krise, als die NATO versprach, den Beitrittsantrag Georgiens zu prüfen."  #NT!
 israel_gaza_war.t:0 "Der Israel-Gaza-Krieg?"  #NT!
 israel_gaza_war.d:0 "Ab dem 7. Oktober 2023 kam es vor allem im und um den Gazastreifen zu einem bewaffneten Konflikt zwischen Israel und Hamas-geführten militanten palästinensischen Gruppen, wobei es auch im Westjordanland und an der israelisch-libanesischen Grenze zu Zusammenstößen kam. An diesem Tag starteten militante Gruppen einen Überraschungsangriff auf Südisrael vom Gazastreifen aus und markierten damit den Beginn der bedeutendsten militärischen Eskalation in der Region seit dem Jom-Kippur-Krieg im Jahr 1973. Nachdem das israelische Militär die Hamas-Kämpfer aus dem Weg geräumt hatte, reagierte es mit einer umfangreichen Luftangriffskampagne auf Hamas-Ziele, gefolgt von einer groß angelegten Bodeninvasion im Gazastreifen."  #NT!
 moldova_gagauzia_war.t:0 "Der Gagausien-Konflikt?"  #NT!
 moldova_gagauzia_war.d:0 "Der Gagausien-Konflikt war ein Konflikt zwischen der Moldauischen SSR und der späteren unabhängigen Republik Moldau und ihrer gagausischen Bevölkerung, die eine weitere Autonomie innerhalb Moldawiens anstrebte. Es gipfelte in der Erklärung der von Moldawien getrennten Republik Gagausien mit dem Ziel, innerhalb der Sowjetunion zu bleiben. Nach deren Auflösung wurde die Republik Gagausien jedoch de facto ein unabhängiger Staat. Die formelle Wiedereingliederung in Moldawien erfolgte 1995, als Gagausien offiziell als autonome Gebietseinheit innerhalb des Landes anerkannt wurde."  #NT!
 uganda_tanzania_war.t:0 "Der Uganda-Tansania-Krieg?"  #NT!
 uganda_tanzania_war.d:0 "Der Uganda-Tansania-Krieg wurde von Oktober 1978 bis Juni 1979 zwischen Uganda und Tansania geführt und führte zum Sturz des ugandischen Präsidenten Idi Amin. Dem Krieg ging eine Verschlechterung der Beziehungen zwischen Uganda und Tansania voraus, nachdem Amin 1971 Präsident Milton Obote gestürzt hatte, der dem Präsidenten von Tansania, Julius Nyerere, nahe stand. Die Umstände des Kriegsausbruchs sind unklar und es gibt unterschiedliche Berichte über die Ereignisse. Im Oktober 1978 begannen ugandische Truppen mit Einfällen in Tansania. Später in diesem Monat startete die ugandische Armee eine Invasion, plünderte Eigentum und tötete Zivilisten. Offizielle ugandische Medien erklärten die Annexion des Kagera Salient."  #NT!
 azerbaijan_artsakh_war.t:0 "Die Annexion Berg-Karabachs?"  #NT!
 azerbaijan_artsakh_war.d:0 "Zwischen dem 19. und 20. September 2023 startete Aserbaidschan eine groß angelegte Militäroffensive gegen den selbst erklärten abtrünnigen Staat Arzach, ein Schritt, der als Verstoß gegen das Waffenstillstandsabkommen angesehen wurde, das nach dem Zweiten Berg-Karabach-Krieg im Jahr 2020 unterzeichnet wurde. Am 28. September unterzeichnete der Präsident von Arzach, Samvel Shahramanyan, ein Dekret zur Auflösung aller staatlichen Institutionen bis zum 1. Januar 2024, womit die Existenz des abtrünnigen Staates beendet wurde Staat zu Ende."  #NT!
 us_libya_war.t:0 "Intervention in Libyen?"  #NT!
 us_libya_war.d:0 "Am 19. März 2011 startete eine aus mehreren Staaten bestehende NATO-geführte Koalition eine militärische Intervention in Libyen, um die Resolution 1973 des Sicherheitsrates der Vereinten Nationen (UNSCR 1973) umzusetzen. Ziel war der Sturz des Regimes von Muammar Gaddafi. Amerikanische und britische Seestreitkräfte feuerten über 110 Tomahawk-Marschflugkörper ab und verhängten eine Seeblockade, während die französische Luftwaffe, die britische Royal Air Force und die Royal Canadian Air Force Einsätze in ganz Libyen unternahmen."  #NT!
 us_grenada_war.t:0 "Invasion in Grenada?"  #NT!
 us_grenada_war.d:0 "Die Invasion der Vereinigten Staaten in Grenada begann im Morgengrauen des 25. Oktober 1983. Die Vereinigten Staaten und eine Koalition aus sechs karibischen Staaten überfielen den Inselstaat Grenada, 100 Meilen (160 km) nördlich von Venezuela. Das US-Militär trug den Codenamen „Operation Urgent Fury“ und führte innerhalb weniger Tage zu einer militärischen Besetzung. Auslöser waren die Unruhen innerhalb der Revolutionären Volksregierung, die zum Hausarrest und der Hinrichtung des früheren Führers und zweiten Premierministers Grenadas, Maurice Bishop, sowie zur Gründung des Revolutionären Militärrats mit Hudson Austin als Vorsitzendem führten. Die Invasion führte zur Ernennung einer Übergangsregierung, gefolgt von Wahlen im Jahr 1984."  #NT!
 us_dominican_republic_war.t:0 "Invasion der Dominikanischen Republik?"  #NT!
 us_dominican_republic_war.d:0 "Vorwürfe der kommunistischen Unterstützung der Rebellen in der Dominikanischen Republik führten zu einer Intervention der Vereinigten Staaten in den Konflikt (Codename Operation Power Pack), die sich später in eine Besetzung des Landes durch die Interamerikanische Friedenstruppe durch die Organisation Amerikanischer Staaten verwandelte. Im Jahr 1966 fanden Wahlen statt, bei denen Joaquín Balaguer in den Präsidentensitz gewählt wurde. Später im selben Jahr zogen ausländische Truppen aus dem Land ab."  #NT!
 ogaden_war.t:0 "Der Ogaden-Krieg?"  #NT!
 ogaden_war.d:0 "Der Ogaden-Krieg war ein militärischer Konflikt zwischen Somalia und Äthiopien von Juli 1977 bis März 1978 um die äthiopische Region Ogaden."  #NT!
 badme_war.t:0 "Der Badme-Krieg?"  #NT!
 badme_war.d:0 "Der Eritreisch-Äthiopische Krieg, auch Badme-Krieg genannt, war ein großer bewaffneter Konflikt zwischen Äthiopien und Eritrea, der von Mai 1998 bis Juni 2000 stattfand. Nach der Unabhängigkeit Eritreas von Äthiopien im Jahr 1993 waren die Beziehungen zunächst freundschaftlich. Allerdings führten Meinungsverschiedenheiten darüber, wo die neu geschaffene internationale Grenze verlaufen sollte, zu einer erheblichen Verschlechterung der Beziehungen, was schließlich zu einem umfassenden Krieg führte."  #NT!
 sino_vietnamese_war.t:0 "Der chinesisch-vietnamesische Krieg?"  #NT!
 sino_vietnamese_war.d:0 "Der Chinesisch-Vietnamesische Krieg war ein kurzer Konflikt, der Anfang 1979 zwischen China und Vietnam stattfand. Als Reaktion auf die Invasion und Besetzung Kambodschas durch Vietnam im Jahr 1978 startete China eine Offensive, die die Herrschaft der von China unterstützten Roten Khmer beendete. Der Konflikt dauerte etwa einen Monat, im März 1979 zog China seine Truppen ab."  #NT!
 saudi_north_yemen_war.t:0 "Intervention im Nordjemen?"  #NT!
 saudi_north_yemen_war.d:0 "Der Nordjemen-Bürgerkrieg war ein Bürgerkrieg, der von 1962 bis 1970 im Nordjemen zwischen Partisanen des mutawakkilitischen Königreichs und Anhängern der Arabischen Republik Jemen ausgetragen wurde. Der Krieg begann mit einem Staatsstreich im Jahr 1962 durch revolutionäre Republikaner unter der Führung der Armee unter dem Kommando von Abdullah as-Sallal, der den frisch gekrönten König und Imam Muhammad al-Badr entthronte und unter seiner Präsidentschaft den Jemen zur Republik erklärte. Der Imam floh an die saudi-arabische Grenze, wo er die Unterstützung der schiitischen Stämme im Norden sammelte, um die Macht zurückzuerobern, was schnell zu einem ausgewachsenen Bürgerkrieg eskalierte."  #NT!
 PRC_korean_war.t:0 "In den Koreakrieg eingreifen?"  #NT!
 PRC_korean_war.d:0 "Am 3. Oktober 1950 versuchte China, die Vereinigten Staaten über seine Botschaft in Indien zu warnen, dass es eingreifen würde, falls UN-Truppen den Yalu-Fluss überqueren würden. Die Vereinigten Staaten reagierten nicht, da die politischen Entscheidungsträger in Washington, darunter auch Truman, die Warnung für einen Bluff hielten. Unterdessen beschloss das Politbüro am 13. Oktober, dass China auch ohne sowjetische Luftunterstützung eingreifen würde, und begründete seine Entscheidung mit der Überzeugung, dass eine überlegene Moral einen Feind mit überlegener Ausrüstung besiegen könne. Zu diesem Zweck überquerten 200.000 Soldaten der Freiwilligen Volksarmee (PVA) den Yalu nach Nordkorea. Nachdem sie am 19. Oktober heimlich den Fluss Yalu überquert hatte, startete die 13. Heeresgruppe der PVA am 25. Oktober die Offensive der ersten Phase und griff die vorrückenden UN-Streitkräfte nahe der chinesisch-koreanischen Grenze an."  #NT!
 NEJ_yemen_civil_war.t:0 "In den jemenitischen Bürgerkrieg eingreifen?"  #NT!
 NEJ_yemen_civil_war.d:0 "Am 26. März 2015 startete Saudi-Arabien an der Spitze einer Koalition aus neun Ländern aus Westasien und Nordafrika eine Intervention im Jemen, nachdem der jemenitische Präsident Abdrabbuh Mansur Hadi erneut gemeinsam um militärische Unterstützung gebeten hatte, nachdem seine Streitkräfte während des jemenitischen Bürgerkriegs von Huthi-Aufständischen aus Sanaa vertrieben worden waren."  #NT!
 cenepa_war.t:0 "Der Cenepa-Krieg?"  #NT!
 cenepa_war.d:0 "Der Cenepa-Krieg war ein kurzer und lokalisierter militärischer Konflikt zwischen Ecuador und Peru, bei dem es um die Kontrolle eines Gebiets auf peruanischem Territorium (d. h. auf der Ostseite der Cordillera del Cóndor, Provinz Condorcanqui, Región Amazonas, Republik Peru) nahe der Grenze zwischen den beiden Ländern ging."  #NT!
 yemenite_war.t:0 "Der Jemenitische Krieg?"  #NT!
 yemenite_war.d:0 "Der Zweite Jemenitische Krieg war ein kurzer militärischer Konflikt zwischen der Arabischen Republik Jemen und der Demokratischen Volksrepublik Jemen. Der Krieg entstand aus einem Zusammenbruch der Beziehungen zwischen den beiden Ländern, nachdem der Präsident des Nordjemen, Ahmad al-Ghashmi, am 24. Juni 1978 getötet wurde und Salim Rubai Ali, ein gemäßigter Marxist, der an einer geplanten Fusion zwischen den beiden Jemen gearbeitet hatte, zwei Tage später ermordet wurde."  #NT!
 sino_indian_war.t:0 "Der Chinesisch-Indische Krieg?"  #NT!
 sino_indian_war.d:0 "Der Chinesisch-Indische Krieg war ein bewaffneter Konflikt zwischen China und Indien, der von Oktober bis November 1962 stattfand. Es handelte sich um eine militärische Eskalation des chinesisch-indischen Grenzstreits. Zu Kämpfen kam es entlang der Grenze Indiens zu China, in der North-East Frontier Agency östlich von Bhutan und in Aksai Chin westlich von Nepal. Der Konflikt endete, als China am 20. November 1962 einseitig einen Waffenstillstand erklärte und gleichzeitig seinen Rückzug auf seine Vorkriegsposition, die wirksame Grenze zwischen China und Indien (auch als „Linie der tatsächlichen Kontrolle“ bekannt), ankündigte."  #NT!
 IDO_MSY_war.t:0 "Die Konfrontasi?"  #NT!
 IDO_MSY_war.d:0 "Die Indonesien-Malaysia-Konfrontation oder Borneo-Konfrontation (in Indonesien, Malaysia und Singapur einfach als Konfrontasi bekannt) war ein bewaffneter Konflikt von 1963 bis 1966, der aus dem Widerstand Indonesiens gegen die Gründung des Staates Malaysia aus der Föderation Malaya resultierte. Nach der Absetzung des indonesischen Präsidenten Sukarno im Jahr 1966 endete der Streit friedlich."  #NT!
 SAF_ANG_war.t:0 "Operation Savannah?"  #NT!
 SAF_ANG_war.d:0 "Operation Savannah war der südafrikanische Codename für ihren militärischen Einmarsch in Angola in den Jahren 1975–1976. Es war Teil des südafrikanischen Grenzkrieges und entstand aufgrund des angolanischen Unabhängigkeitskrieges. Ziel war es, die Entstehung eines südafrikafeindlichen Staates in Angola zu verhindern."  #NT!
 USA_korean_war.t:0 "In den Koreakrieg eingreifen?"  #NT!
 USA_korean_war.d:0 "Am 25. Juni 1950 unterschritt die Koreanische Volksarmee (KPA) des Nordens den 38. Breitengrad. Der Sicherheitsrat der Vereinten Nationen verurteilte die Invasion und ermächtigte das Kommando der Vereinten Nationen, die KVA zurückzuschlagen. Nach den ersten beiden Kriegsmonaten waren die südkoreanische Armee (ROKA) und ihre Verbündeten fast besiegt und konnten nur noch den Pusan-Perimeter behaupten. Im September 1950 landeten jedoch UN-Truppen in Incheon und unterbrachen KPA-Truppen und Versorgungslinien. Im Oktober 1950 fielen sie in Nordkorea ein und rückten in Richtung des Yalu-Flusses – der Grenze zu China – vor."  #NT!
 india_hyderabad_war.t:0 "Annexion von Hyderabad?"  #NT!
 india_hyderabad_war.d:0 "Im November 1947 unterzeichnete Hyderabad ein Stillhalteabkommen mit dem Dominion of India, in dem alle bisherigen Vereinbarungen mit Ausnahme der Stationierung indischer Truppen im Staat fortgeführt wurden. Indien war der Ansicht, dass die Gründung eines kommunistischen Staates in Hyderabad eine Bedrohung für das Land darstellen würde. Nizams Macht war aufgrund der Telangana-Rebellion und des Aufstiegs einer radikalen Miliz namens Razakars geschwächt, die er nicht besiegen konnte. Am 7. September stellte Jawaharlal Nehru Nizam ein Ultimatum und forderte ein Verbot der Razakars und die Rückkehr indischer Truppen nach Secunderabad. Indien marschierte am 13. September 1948 in den Staat ein."  #NT!
 arab_israeli_war.t:0 "Der arabisch-israelische Krieg?"  #NT!
 arab_israeli_war.d:0 "Der Arabisch-Israelische Krieg von 1948, auch als Erster Arabisch-Israelischer Krieg bekannt, folgte dem Bürgerkrieg im Mandatsgebiet Palästina als zweite und letzte Phase des Palästina-Krieges von 1948. Mit der israelischen Unabhängigkeitserklärung am 14. Mai 1948, dem Ende des britischen Mandats für Palästina um Mitternacht und dem Einmarsch einer Militärkoalition arabischer Staaten in das Gebiet des Mandatsgebiets Palästina am folgenden Morgen wurde der Bürgerkrieg zu einem Krieg einzelner Staaten."  #NT!
 first_indo_pakistan_war.t:0 "Der erste indisch-pakistanische Krieg?"  #NT!
 first_indo_pakistan_war.d:0 "Der indisch-pakistanische Krieg von 1947–1948, auch als erster Kaschmir-Krieg bekannt, war ein Krieg zwischen Indien und Pakistan um den Fürstenstaat Jammu und Kaschmir von 1947 bis 1948."  #NT!
 football_war.t:0 "Der Fußballkrieg?"  #NT!
 football_war.d:0 "Der Fußballkrieg war ein kurzer militärischer Konflikt zwischen El Salvador und Honduras im Jahr 1969. Die bestehenden Spannungen zwischen den beiden Ländern fielen mit Unruhen während eines Qualifikationsspiels zur FIFA-Weltmeisterschaft 1970 zusammen. Der Krieg begann am 14. Juli 1969, als das salvadorianische Militär einen Angriff auf Honduras startete."  #NT!
 agacher_strip_war.t:0 "Der Agacher-Streifenkrieg?"  #NT!
 agacher_strip_war.d:0 "Der Agacher-Streifenkrieg war ein Krieg, den Burkina Faso und Mali vom 25. bis 30. Dezember 1985 auf einem 160 Kilometer langen Landstreifen entlang der Grenze im Norden Burkina Fasos führten. Der Krieg endete mit einem Waffenstillstand."  #NT!
 ISR_LEB_war.t:0 "Operation Litani?"  #NT!
 ISR_LEB_war.d:0 "Am 11. März 1978 landeten elf PLO-Kämpfer 30 km entfernt am Strand. südlich von Haifa, Israel, wo sie einen Bus voller Menschen beschlagnahmten und die Insassen bei dem sogenannten Küstenstraßenmassaker töteten. Als Reaktion darauf startete Israel am 14. März 1978 die Operation Litani und besetzte den Südlibanon mit Ausnahme der Stadt Tyrus mit 25.000 Soldaten."  #NT!
 SYR_LEB_war.t:0 "Die syrische Invasion im Libanon?"  #NT!
 SYR_LEB_war.d:0 "Am 31. Mai 1976 marschierte die syrische Armee mit 2.000 Soldaten und 60 Panzern in einer dreigleisigen Offensive in den Libanon ein. Die erste Kolonne marschierte nach Süden über Shuf in Richtung Sidon, wo sie von PLO-Truppen aufgehalten wurde. Die zweite Kolonne bewegte sich entlang der Achse Beirut–Damaskus nach Westen, bevor sie in Beirut gestoppt wurde. Eine weitere Kolonne bewegte sich nach Norden durch das Bekaa-Tal, bevor sie dann nach Westen in Richtung Tripolis weiterzog, wo sie von christlichen Streitkräften aufgehalten wurde. Die Offensive wurde am 10. Juni gestoppt."  #NT!
 vietnam_war_1975.t:0 "Die Frühjahrsoffensive?"  #NT!
 vietnam_war_1975.d:0 "Bis 1972 hatten sich die US-Truppen größtenteils aus Vietnam zurückgezogen, und im Rahmen des Pariser Friedensabkommens von 1973 zog der Rest ab. Die Vereinbarungen wurden fast sofort gebrochen und die Kämpfe dauerten bis zur Frühjahrsoffensive 1975 und dem Fall Saigons an die PAVN, was das Ende des Krieges markierte. Nord- und Südvietnam wurden 1976 wiedervereinigt."  #NT!
 ETH_SOM_border_war.t:0 "Der äthiopisch-somalische Grenzkrieg?"  #NT!
 ETH_SOM_border_war.d:0 "Der äthiopisch-somalische Grenzkrieg fand von Juni 1982 bis August 1983 statt, als Äthiopien eine groß angelegte Invasion in Zentralsomalia startete. Mit Unterstützung von Kampfflugzeugen und Panzereinheiten setzte Äthiopien neben Tausenden Rebellen der Somali Salvation Democratic Front (SSDF) eine 10.000 Mann starke Truppe ein. Ziel der Operation war es zunächst, bis zur somalischen Küste vorzudringen und schließlich das Barre-Regime zu stürzen. Trotz ihrer Bemühungen gelang es äthiopischen Truppen und SSDF-Guerillas nicht, die Schlüsselstädte Galkayo und Beledweyne einzunehmen, da die somalische Armee den Hauptangriff erfolgreich abwehren konnte. Der Konflikt entwickelte sich jedoch bald zu einer militärischen Pattsituation rund um die Grenzstädte Galdogob und Balanbale."  #NT!
 USA_SOM_1993_war.t:0 "Operation Gothic Serpent?"  #NT!
 USA_SOM_1993_war.d:0 "Die Operation Gothic Serpent war eine Militäroperation, die von einer amerikanischen Truppe mit dem Codenamen Task Force Ranger während des somalischen Bürgerkriegs im Jahr 1993 in Mogadischu, Somalia, durchgeführt wurde. Das Hauptziel der Operation war die Gefangennahme von Mohamed Farrah Aidid, dem Anführer der Somali National Alliance, der von der UNOSOM II als Reaktion auf seine Angriffe auf Truppen der Vereinten Nationen gesucht wurde. Die Operation fand von August bis Oktober 1993 statt und wurde vom US Joint Special Operations Command (JSOC) geleitet. Am 3. Oktober 1993 führte die Task Force eine Mission durch, um zwei von Aidids Leutnants zu fangen. Die Mission gipfelte schließlich in der sogenannten Schlacht von Mogadischu. Die Schlacht war äußerst blutig und die Task Force verursachte den somalischen Milizkräften erhebliche Verluste, während sie selbst schwere Verluste erlitt."  #NT!
 ankoko_island_war.t:0 "Die Invasion der Insel Ankoko?"  #NT!
 ankoko_island_war.d:0 "Im Februar 1966 unterzeichneten die Regierungen Venezuelas, des Vereinigten Königreichs und Guyanas das Genfer Abkommen zur Beilegung der Kontroverse um den Territorialstreit um Essequibo. Fünf Monate nach der Unabhängigkeit Guyanas vom Vereinigten Königreich begannen venezolanische Truppen im Oktober 1966 mit der Besetzung der Insel Ankoko.[4] Venezolanische Truppen errichteten schnell militärische Einrichtungen und eine Landebahn."  #NT!
 Mauritania_Senegal_Border_War.t:0 "Der Grenzkrieg zwischen Mauretanien und Senegal?"  #NT!
 Mauritania_Senegal_Border_War.d:0 "Der Mauretanien-Senegal-Grenzkrieg (1989–1991) war ein gewaltsamer Konflikt, der durch Streitigkeiten über Land, ethnische Zugehörigkeit und nationale Identität ausgelöst wurde. Spannungen brachen im April 1989 nach Zusammenstößen zwischen mauretanischen Hirten und senegalesischen Bauern entlang des Senegal-Flusses aus. Was als lokaler Streit begann, eskalierte zu einer umfassenderen ethnischen und diplomatischen Krise, bei der beide Regierungen Zehntausende Bürger der jeweils anderen Regierung auswiesen. Die kommunale Gewalt breitete sich aus, angeheizt durch historische Missstände und Rassenspaltungen. Hunderte wurden getötet und über 250.000 vertrieben. Der Krieg endete 1991 mit einem fragilen Frieden und wieder geöffneten Grenzen, aber sein Erbe an Misstrauen und Vertreibung prägt weiterhin die Beziehungen zwischen Mauretanien und Senegal."  #NT!
 Heglig_Crisis_War.t:0 "Die Heglig-Krise?"  #NT!
 Heglig_Crisis_War.d:0 "Die Heglig-Krise (März–September 2012) war ein kurzer, aber heftiger Grenzkonflikt zwischen Sudan und Südsudan um die ölreiche Region Heglig. Nach der Unabhängigkeit Südsudans im Jahr 2011 eskalierten ungelöste Grenzziehungen und Streitigkeiten über Öleinnahmen zu bewaffneten Auseinandersetzungen. Südsudanesische Streitkräfte besetzten Heglig – im Südsudan als Panthou bekannt – und beanspruchten es als Teil des Einheitsstaates, während der Sudan die Souveränität über das Gebiet beanspruchte. Der Sudan erlangte schließlich die Kontrolle zurück und beide Nationen unterzeichneten im September 2012 Abkommen über Grenzen und Ressourcen."  #NT!
 iraq_kuwait_showdown_1961.t:0 "Die Irak-Kuwait-Krise"  #NT!
 iraq_kuwait_showdown_1961.d:0 "1958 übernahm Abdul Karim Qasim die Macht im Irak. Er wurde von den westlichen Mächten als unberechenbar und der Irak als instabil angesehen. Am 25. Juni 1961, nachdem Großbritannien die Autorität in Kuwait aufgegeben hatte, kündigte Qasim an, dass Kuwait in den Irak eingegliedert werden würde, und Großbritannien sah die militärische Bedrohung als unmittelbar bevor."  #NT!
 Operation_Vantage.t:0 "Operation Vantage?"  #NT!
 Operation_Vantage_1.t:0 "Britische Intervention in der Irak-Kuwait-Krise"  #NT!
 Operation_Vantage.d:0 "Die Operation Vantage war eine britische Militäroperation im Jahr 1961, um den neuen unabhängigen Staat Kuwait gegen Gebietsansprüche seines Nachbarn Irak zu unterstützen. Das Vereinigte Königreich reagierte auf einen Schutzruf von Scheich Abdullah III. Al-Salim Al-Sabah aus Kuwait, und innerhalb weniger Tage waren Luft-, See- und Landstreitkräfte vor Ort. Der Irak griff nicht an und die britischen Streitkräfte wurden durch die Arabische Liga ersetzt."  #NT!
 Operation_Caban.t:0 "Operation Caban?"  #NT!
 Operation_Caban.d:0 "Die Operation Caban, auch bekannt als zentralafrikanischer Staatsstreich von 1979, war eine unblutige Militäroperation des französischen Geheimdienstes SDECE im September 1979, um Kaiser Bokassa I. abzusetzen, den im Exil lebenden ehemaligen Präsidenten David Dacko wieder einzusetzen und das Zentralafrikanische Reich wieder in Zentralafrikanische Republik umzubenennen."  #NT!
 FRA_NZL_Rainbow_Warrior_Incident.t:0 "Der Untergang des Regenbogenkriegers?"  #NT!
 FRA_NZL_Rainbow_Warrior_Incident.d:0 "Am 10. Juli 1985 bombardierten französische Geheimagenten das Greenpeace-Schiff Rainbow Warrior in Auckland, Neuseeland, um Proteste gegen Atomtests im Moruroa-Atoll zu verhindern. Das Schiff sank und tötete den Fotografen Fernando Pereira. Der verdeckte Angriff mit dem Codenamen Opération Satanique löste weltweite Empörung aus und belastete die Beziehungen zwischen Frankreich und Neuseeland."  #NT!
 FRA_NZL_Rainbow_Warrior_Incident_1.t:0 "Der Untergang des Regenbogenkriegers"  #NT!
 USA_Donroe_Doctrine_2026.t:0 "Die Donroe-Doktrin?"  #NT!
 USA_Donroe_Doctrine_2026.d:0 "Die Donroe-Doktrin, auch als Trump-Folge zur Monroe-Doktrin bezeichnet, bezieht sich auf Grundsätze der Außenpolitik von Präsident Donald Trump in Amerika. Als Adaption der historischen Monroe-Doktrin beschreibt es den wahrgenommenen Wunsch der zweiten Trump-Regierung, die amerikanische Vorherrschaft in der westlichen Hemisphäre zu behaupten."  #NT!
 USA_VNZ_Overthrow_2026.t:0 "Operation Absolute Resolve?"  #NT!
 USA_VNZ_Overthrow_2026.d:0 "Am 3. Januar 2026 starteten die Vereinigten Staaten einen Militärschlag in Venezuela und nahmen den amtierenden venezolanischen Präsidenten Nicolás Maduro und seine Frau Cilia Flores gefangen. Die US-Operation mit dem Codenamen Operation Absolute Resolve begann gegen 2 Uhr Ortszeit, als Explosionen beobachtet wurden. Die US-Streitkräfte bombardierten Infrastruktur im Norden Venezuelas, um die Luftverteidigung zu unterdrücken, als eine Festnahmeeinheit Maduros Gelände in Caracas angriff. Maduro und Flores wurden von US-Streitkräften nach New York City transportiert, um dort vor Gericht gestellt zu werden."  #NT!
 USA_PER_START.t:0 "Das Atomabkommen mit dem Iran?"  #NT!
 USA_PER_START.d:0 "Der Joint Comprehensive Plan of Action, auch Iran-Atomabkommen oder Iran-Deal genannt, war eine Vereinbarung zur Begrenzung des iranischen Atomprogramms im Gegenzug für Sanktionserleichterungen und andere Bestimmungen. Im Rahmen des JCPOA stimmte Iran zu, sein Atomprogramm einzuschränken, indem es Aktivitäten im Brennstoffkreislauf einschränkte, die zur Produktion von waffenfähigem Uran oder Plutonium führen könnten. Das JCPOA beschränkte die Anzahl und Art der in Betrieb befindlichen Zentrifugen, den Grad der Urananreicherung und die Größe der iranischen Lagerbestände an angereichertem Uran. Wichtige Einrichtungen in Fordow, Natanz und Arak wurden für zivile Zwecke wie medizinische und industrielle Forschung umfunktioniert. Iran stimmte zu, strengere Überwachungsmaßnahmen der IAEO für seine Aktivitäten im Zusammenhang mit dem Brennstoffkreislauf zu akzeptieren."  #NT!
 RUS_UKR_Minsk.t:0 "Die Minsker Vereinbarungen?"  #NT!
 RUS_UKR_Minsk.d:0 "Bei den Minsker Abkommen handelte es sich um eine Reihe internationaler Abkommen, die darauf abzielten, den Donbass-Krieg zwischen bewaffneten russischen Separatistengruppen und den Streitkräften der Ukraine zu beenden, wobei reguläre russische Streitkräfte eine zentrale Rolle spielten. Nach einer Niederlage bei Ilovaisk Ende August 2014 zwang Russland die Ukraine, das erste Minsker Protokoll, das Minsk I, zu unterzeichnen. Dieses Abkommen bestand aus einem Paket von Maßnahmen, darunter ein Waffenstillstand, der Abzug schwerer Waffen von der Front, die Freilassung von Kriegsgefangenen, eine Verfassungsreform in der Ukraine, die bestimmten Gebieten des Donbass Selbstverwaltung gewährte, und die Wiederherstellung der Kontrolle über die Staatsgrenze durch die ukrainische Regierung."  #NT!
 PAK_AFG_2026_war.t:0 "Der Afghanistan-Pakistan-Krieg?"  #NT!
 PAK_AFG_2026_war.d:0 "Am 21. Februar 2026 führte die pakistanische Luftwaffe (PAF) Luftangriffe über den Provinzen Nangarhar, Paktika und Khost in Afghanistan durch. Am 26. Februar 2026 startete Afghanistan eine Vergeltungsoperation gegen Pakistan. Als Reaktion darauf startete Pakistan die Operation Ghazab Lil Haq gegen die Taliban. Am folgenden Tag erklärte Pakistan den Zustand des „offenen Krieges“ mit Afghanistan."  #NT!
 USA_PER_2026_war.t:0 "Der US-Iran-Krieg?"  #NT!
 USA_PER_2026_war.d:0 "Am 28. Februar 2026 starteten die Vereinigten Staaten und Israel eine große gemeinsame Militärkampagne gegen den Iran, die Präsident Donald Trump als „große Kampfeinsätze“ bezeichnete. Die Eskalation folgte dem Scheitern der in letzter Minute vermittelten Gespräche über das iranische Atomprogramm."  #NT!
 ETH_SOM_2006_war.t:0 "Die äthiopische Invasion in Somalia?"  #NT!
 ETH_SOM_2006_war.d:0 "Die äthiopische Invasion in Somalia war ein bewaffneter Konflikt, der von Mitte 2006 bis Anfang 2009 dauerte. Er begann, als äthiopische Streitkräfte mit Unterstützung der Vereinigten Staaten in Somalia einmarschierten, um die Islamic Courts Union (ICU) zu stürzen und die Übergangsregierung (Transition Federal Government, TFG) einzusetzen. Der Konflikt entwickelte sich zu einer militärischen Besetzung und einem rasch eskalierenden antiäthiopischen Aufstand. Bis 2008 hatten Aufständische den Großteil des von der ICU während der Invasion verlorenen Territoriums zurückerobert. Der Konflikt verursachte die zweitgrößte Bevölkerungsvertreibung seit 1991."  #NT!
  
