 british_vanuatu.indy.t:0 "Das New Hebrides Condominium auflösen?"  #NT!
 british_vanuatu.indy.d:0 "Das New Hebrides Condominium endete am 30. Juli 1980, als das französisch-britische Territorium als Vanuatu die Unabhängigkeit erlangte. Nach Jahrzehnten der Doppelkolonialverwaltung seit 1906 löste der Archipel die gemeinsame Oberhoheit auf und war damit die letzte britische Pazifikkolonie, die Souveränität erlangte, und das erste französische Territorium in der Region, das dies erreichte."  #NT!
