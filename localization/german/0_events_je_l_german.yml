 espionage_instigate_secessionist_movement.t:0 "Gelegenheit zur Anstiftung sezessionistischer Bewegungen in [SCOPE.sCountry('espionage_target').GetName]"  #NT!
 espionage_instigate_secessionist_movement.d:0 "[SCOPE.sCountry('espionage_attacker').GetAdjective]-Agenten, die in [SCOPE.sCountry('espionage_target').GetName] tätig sind, haben eine Gelegenheit erhalten, nationalistische Gefühle gegen die [SCOPE.sCountry('espionage_target').GetAdjective]-Regierung zu schüren. Sie schlagen vor, antiimperialistische Propaganda unter der Bevölkerung der [SCOPE.sCountry('espionage_target').GetAdjective] Unincorporated States zu verbreiten. Diese verdeckte Operation sollte die Zahl der Radikalen in nicht eingetragenen Staaten, die zu [SCOPE.sCountry('espionage_target').GetName] gehören, über einen Zeitraum von 12 Monaten erhöhen."  #NT!
