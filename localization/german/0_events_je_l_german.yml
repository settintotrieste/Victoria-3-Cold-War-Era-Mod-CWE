 diplomatic_neutrality_violated.t:0 "[SCOPE.sCountry('neutrality_violated_country').GetAdjective] Neutralität verletzt"  #NT!
 diplomatic_neutrality_violated.d:0 "Die diplomatische Neutralität von [SCOPE.sCountry('neutrality_violated_country').GetName] wurde vom Aggressorstaat verletzt. Als Reaktion auf diesen eklatanten Verstoß gegen das Völkerrecht riefen die Vereinten Nationen dazu auf, eine Koalition der Bereitschaftswilligen zu bilden, um [SCOPE.sCountry('neutrality_violated_country').GetName] in seinem Krieg militärisch zu unterstützen."  #NT!
