 recently_expanded_court.tt:0 "Der [concept_government] hat den [SCOPE.GetRootScope.GetCountry.GetCustom('supreme_court_name')] in den letzten 12 Monaten nicht erweitert"  #NT!
 je_judiciary_expand_court_button_desc:0 "Der [concept_government] kann per Gesetz die Gesamtzahl der Richter auf der Richterbank des [SCOPE.GetRootScope.GetCountry.GetCustom('supreme_court_name')] auf maximal 20 Richter erhöhen. Die neu vakante Stelle wird dann ggf. durch einen von der Regierung ernannten Richter besetzt."  #NT!
