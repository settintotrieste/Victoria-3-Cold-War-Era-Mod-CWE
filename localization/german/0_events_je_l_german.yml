 OECD_member:0 "OECD-Mitglied"  #NT!
 OECD_leader:0 "OECD-Leiter"  #NT!
 form_OECD_decision:0 "Bilden Sie die OECD"  #NT!
 form_OECD_decision_desc:0 "Die Organisation für wirtschaftliche Zusammenarbeit und Entwicklung ist eine zwischenstaatliche Organisation mit 38 Mitgliedsländern, die 1961 gegründet wurde, um den wirtschaftlichen Fortschritt und den Welthandel anzukurbeln. Es handelt sich um ein Forum, dessen Mitgliedsländer sich selbst der Demokratie und der Marktwirtschaft verpflichtet fühlen. Es bietet eine Plattform für den Vergleich politischer Erfahrungen, die Suche nach Antworten auf gemeinsame Probleme, die Ermittlung bewährter Praktiken und die Koordinierung der nationalen und internationalen Politik seiner Mitglieder."  #NT!
 join_OECD_decision:0 "Treten Sie der OECD bei"  #NT!
 join_OECD_decision_desc:0 "Die Organisation für wirtschaftliche Zusammenarbeit und Entwicklung ist eine zwischenstaatliche Organisation mit 38 Mitgliedsländern, die 1961 gegründet wurde, um den wirtschaftlichen Fortschritt und den Welthandel anzukurbeln. Es handelt sich um ein Forum, dessen Mitgliedsländer sich selbst der Demokratie und der Marktwirtschaft verpflichtet fühlen. Es bietet eine Plattform für den Vergleich politischer Erfahrungen, die Suche nach Antworten auf gemeinsame Probleme, die Ermittlung bewährter Praktiken und die Koordinierung der nationalen und internationalen Politik seiner Mitglieder."  #NT!
 leave_OECD_decision:0 "Verlassen Sie die OECD"  #NT!
 leave_OECD_decision_desc:0 "Die Organisation für wirtschaftliche Zusammenarbeit und Entwicklung ist eine zwischenstaatliche Organisation mit 38 Mitgliedsländern, die 1961 gegründet wurde, um den wirtschaftlichen Fortschritt und den Welthandel anzukurbeln. Es handelt sich um ein Forum, dessen Mitgliedsländer sich selbst als der Demokratie und der Marktwirtschaft verpflichtet bezeichnen. Es bietet eine Plattform für den Vergleich politischer Erfahrungen, die Suche nach Antworten auf gemeinsame Probleme, die Identifizierung bewährter Praktiken und die Koordinierung der nationalen und internationalen Politik seiner Mitglieder."  #NT!
