 espionage_conduct_economic_sabotage.t:0 "Gelegenheit zur Wirtschaftssabotage in [SCOPE.sCountry('espionage_target').GetName]"  #NT!
 espionage_conduct_economic_sabotage.d:0 "[SCOPE.sCountry('espionage_attacker').GetAdjective] Agenten, die in [SCOPE.sCountry('espionage_target').GetName] tätig sind, haben eine Gelegenheit gefunden, die Wirtschaftstätigkeit von [SCOPE.sCountry('espionage_target').GetAdjective] Fabriken, Minen und Eisenbahnen zu stören. Sie schlagen vor, Unruhen in der Industrie zu schüren und bestimmte Schlüsselgebäude in der [SCOPE.sCountry('espionage_target').GetAdjective]-Lieferkette in die Luft zu jagen. Diese verdeckte Operation sollte den Gebäudedurchsatz aller Produktions-, Bergbau- oder Infrastrukturgebäude in [SCOPE.sCountry('espionage_target').GetName] über einen Zeitraum von 12 Monaten verringern."  #NT!
 espionage_conduct_economic_sabotage.f:0 "Beachten Sie, dass die Möglichkeit besteht, dass unsere Handlungen von den Geheimdiensten von [SCOPE.sCountry('espionage_target').GetAdjective] erfasst werden, was unsere Beziehungen zu [SCOPE.sCountry('espionage_target').GetName] ernsthaft beeinträchtigen würde."  #NT!
  
