 change_UN_HQ.d:0 "Die Vereinten Nationen haben beschlossen, ihr Hauptquartier im Jahr [SCOPE.sState('un_headquarters_state').GetCityHubName] aufgrund der anhaltenden Instabilität im Jahr [ROOT.GetCountry.GetName] aufzugeben. Sie werden nun ein anderes Land als Sitz für ihr Hauptquartier suchen."  #NT!
 change_UN_HQ.f:0 "Dieses Ereignis wurde ausgelöst, weil [SCOPE.sState('un_headquarters_state').GetName] entweder in Revolte ist, mehr als 50 [concept_devastation] hat oder nicht von [ROOT.GetCountry.GetName] kontrolliert wird."  #NT!
 change_UN_HQ.1:0 "Wir fühlen uns verlassen..."  #NT!
  
 new_UN_HQ.t:0 "UN-Hauptquartier in [SCOPE.sState('un_headquarters_state').GetCityHubName]?"  #NT!
 new_UN_HQ.d:0 "Die Vereinten Nationen, die derzeit kein Hauptquartier haben, haben vorgeschlagen, sich in [SCOPE.sState('un_headquarters_state').GetName] niederzulassen. Die Kosten für den neuen Hauptsitz werden dann von [ROOT.GetCountry.GetName] getragen."  #NT!
