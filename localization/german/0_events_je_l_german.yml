 je_abolish_filibuster_button:0 "Abschaffung der Cloture-Regel"  #NT!
 je_abolish_filibuster_button_desc:0 "Die Tradition der unbegrenzten Debatte im Senat hat die Verwendung des Filibusters ermöglicht, einem lose definierten Begriff für Maßnahmen, die darauf abzielen, die Debatte zu verlängern und eine Abstimmung über einen Gesetzentwurf, eine Resolution, einen Änderungsantrag oder eine andere strittige Frage zu verzögern oder zu verhindern. Möglich wird dies durch die Cloture-Regel, die vorsieht, dass drei Fünftel aller ordnungsgemäß gewählten und vereidigten Senatoren oder 60 des 100-köpfigen Senats dafür stimmen müssen, die Debatte zu beenden, damit ein Gesetz in die Verabschiedungsphase gelangt."  #NT!
