 palace_coup.t:0 "Palastputsch in [ROOT.GetCountry.GetNameNoFlag]?"  #NT!
 palace_coup.d:0 "Der [SCOPE.GetRootScope.GetCountry.GetCustom('paramilitary_group_custom_title')] hat einen Palastputsch gegen [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [SCOPE.sCharacter('palace_coup_ruler').GetFullName] gestartet. Ihr Ziel ist es, den [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] durch einen radikaleren zu ersetzen. Die [ROOT.GetCountry.GetAdjectiveNoFlag] $ig_armed_forces$ sind bereit, die Aufständischen abzuwehren und die Ordnung wiederherzustellen, auch wenn dies für die Hauptstadt einen hohen Preis bedeuten wird. Was sind Ihre Befehle?"  #NT!
