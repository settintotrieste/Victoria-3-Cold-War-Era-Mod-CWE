 leave_nato_decision_desc:0 "Die NATO ist ein kollektives Sicherheitssystem: Ihre unabhängigen Mitgliedsstaaten verpflichten sich, sich gegenseitig gegen Angriffe Dritter zu verteidigen. Während des Kalten Krieges fungierte die NATO als Eindämmung der Bedrohung durch die Sowjetunion. Das Bündnis blieb auch nach der Auflösung der Sowjetunion und des Warschauer Pakts bestehen und war an Militäreinsätzen auf dem Balkan, im Nahen Osten, in Südasien und in Afrika beteiligt."  #NT!
