 1995_JAP_earthquake.t:0 "Das große Hanshin-Erdbeben"  #NT!
 1995_JAP_earthquake.d:0 "Das große Hanshin-Erdbeben ereignete sich am 17. Januar 1995 im südlichen Teil der japanischen Präfektur Hyōgo, einschließlich der als Hanshin bekannten Region. Es hatte einen Wert von 6,9 auf der Moment-Magnituden-Skala und eine maximale Intensität von 7 auf der JMA-Seismik-Intensitätsskala (XI–XII auf der modifizierten Mercalli-Intensitätsskala). Das Zittern dauerte etwa 20 Sekunden. Der Schwerpunkt des Erdbebens lag 17 km unterhalb seines Epizentrums am nördlichen Ende der Insel Awaji, 20 km vom Zentrum der Stadt Kobe entfernt. Ungefähr 6.434 Menschen starben infolge dieses Erdbebens; etwa 4.600 von ihnen stammten aus Kobe."  #NT!
 2004_IDO_earthquake.t:0 "Das Erdbeben im Indischen Ozean"  #NT!
 2004_IDO_earthquake.d:0 "Am 26. Dezember 2004 ereignete sich ein schweres Erdbeben mit einer Stärke von 9,2–9,3 MW mit einem Epizentrum vor der Westküste Nord-Sumatras, Indonesien. Das unterseeische Megathrust-Erdbeben wurde durch einen Bruch entlang der Verwerfung zwischen der Burma-Platte und der Indischen Platte verursacht und erreichte in einigen Gebieten eine Mercalli-Intensität von bis zu IX. Ein gewaltiger Tsunami mit bis zu 30 m (100 ft) hohen Wellen, der nach dem zweiten Weihnachtsfeiertag als „Boxing Day Tsunami“ oder als „asiatischer Tsunami“ bekannt ist, verwüstete Gemeinden entlang der umliegenden Küsten des Indischen Ozeans und tötete schätzungsweise 227.898 Menschen in 14 Ländern bei einer der tödlichsten Naturkatastrophen in der Geschichte."  #NT!
 2011_JAP_earthquake.t:0 "Das große Erdbeben in Ostjapan"  #NT!
 2011_JAP_earthquake.d:0 "Am 11. März 2011 ereignete sich im Pazifischen Ozean, 72 km (45 Meilen) östlich der Oshika-Halbinsel in der Region Tōhoku, ein Unterwasser-Megathrust-Erdbeben der Stärke 9,0–9,1. Es dauerte etwa sechs Minuten und verursachte einen Tsunami. Es war das stärkste Erdbeben, das jemals in Japan registriert wurde, und das viertstärkste Erdbeben weltweit, das seit Beginn der modernen Seismographie im Jahr 1900 aufgezeichnet wurde."  #NT!
 1975_PRC_flood.t:0 "Das Versagen des Banqiao-Staudamms"  #NT!
 1975_PRC_flood.d:0 "Im August 1975 stürzten der Banqiao-Staudamm und 61 weitere Staudämme in ganz Henan, China, nach der Landung durch den Taifun Nina ein. Der Dammeinsturz verursachte die drittschwerste Überschwemmung in der Geschichte, die 12.000 km2 (3 Millionen Acres) mit einer Gesamtbevölkerung von 10,15 Millionen Menschen betraf, darunter etwa 30 Städte und Kreise, wobei die Zahl der Todesopfer Schätzungen zufolge zwischen 26.000 und 240.000 liegt. Die Flut verursachte auch den Einsturz von 5 bis 6,8 Millionen Häusern. Der Dammbruch ereignete sich im Kontext der Kulturrevolution."  #NT!
 1970_BNG_cyclone.t:0 "Der Bhola-Zyklon"  #NT!
 1970_BNG_cyclone.d:0 "Der Bhola-Zyklon von 1970 war ein verheerender tropischer Wirbelsturm, der am 12. November 1970 Ostpakistan (das heutige Bangladesch) und Westbengalen in Indien heimsuchte. Er ist nach wie vor der tödlichste tropische Wirbelsturm, der jemals aufgezeichnet wurde, und eine der tödlichsten humanitären Katastrophen weltweit. Mindestens 300.000 Menschen starben bei dem Sturm, möglicherweise sogar 500.000, hauptsächlich infolge der Sturmflut, die einen Großteil der tiefliegenden Inseln des Gangesdeltas überschwemmte."  #NT!
 1991_BNG_cyclone.t:0 "Der Bangladesch-Zyklon"  #NT!
 1991_BNG_cyclone.d:0 "Der Bangladesch-Zyklon von 1991 gehörte zu den tödlichsten tropischen Wirbelstürmen aller Zeiten. Als einer der stärksten tropischen Wirbelstürme, die jemals im Becken registriert wurden, verursachte der tropische Wirbelsturm eine 6,1 m (20 Fuß) hohe Sturmflut, die die Küste überschwemmte und mindestens 138.866 Todesopfer und Schäden in Höhe von etwa 1,7 Milliarden US-Dollar (1991) verursachte. Aufgrund der katastrophalen Schäden führten die Vereinigten Staaten und andere Länder die Operation Sea Angel durch, eine der größten militärischen Hilfsmaßnahmen aller Zeiten."  #NT!
 2008_BUR_cyclone.t:0 "Der Zyklon Nargis"  #NT!
 2008_BUR_cyclone.d:0 "Extrem schwerer Zyklonsturm Nargis war ein äußerst zerstörerischer und tödlicher tropischer Wirbelsturm, der Anfang Mai 2008 die schlimmste Naturkatastrophe in der aufgezeichneten Geschichte Myanmars verursachte. Der Wirbelsturm traf am Freitag, dem 2. Mai 2008, auf Myanmar und schickte eine Sturmflut 40 Kilometer das dicht besiedelte Irrawaddy-Delta hinauf, was katastrophale Zerstörungen und mindestens 138.373 Todesopfer forderte."  #NT!
 2010_HAI_earthquake.t:0 "Das große Erdbeben in Haiti"  #NT!
 2010_HAI_earthquake.d:0 "Das Erdbeben in Haiti im Jahr 2010 war ein katastrophales Erdbeben der Stärke 7,0 MW, das Haiti am Dienstag, dem 12. Januar 2010, um 16:53 Uhr Ortszeit (21:53 UTC) erschütterte. Das Epizentrum befand sich in der Nähe der Stadt Léogâne im Département Ouest, etwa 25 Kilometer westlich von Port-au-Prince, der Hauptstadt Haitis. Schätzungsweise drei Millionen Menschen waren von dem Beben betroffen. Schätzungen zufolge liegt die Zahl der Todesopfer zwischen 100.000 und etwa 160.000, während die Angaben der haitianischen Regierung zwischen 220.000 und 316.000 liegen."  #NT!
 1992_GBR_monument_damaged.t:0 "Der Brand im Schloss Windsor"  #NT!
 1992_GBR_monument_damaged.d:0 "Am 20. November 1992 brach in Windsor Castle, dem größten bewohnten Schloss der Welt und einer der offiziellen Residenzen des britischen Monarchen, ein Feuer aus. Das Schloss erlitt erhebliche Schäden und wurde innerhalb der nächsten fünf Jahre im Rahmen eines vom Naturschutzarchitekten Donald Insall Associates geleiteten Projekts für £36.5  Millionen vollständig repariert. Dies führte dazu, dass Königin Elizabeth II. Steuern auf ihr Einkommen zahlte und der Buckingham Palace, einer ihrer anderen offiziellen Wohnsitze, für die Öffentlichkeit zugänglich gemacht wurde, um die Restaurierungsarbeiten zu finanzieren."  #NT!
 2019_FRA_monument_damaged.t:0 "Der Brand von Notre-Dame"  #NT!
 2019_FRA_monument_damaged.d:0 "Am 15. April 2019, kurz vor 18:20 Uhr MESZ, brach im Dachraum von Notre-Dame de Paris, einer mittelalterlichen katholischen Kathedrale in Paris, Frankreich, ein Gebäudebrand aus. Als das Feuer gelöscht wurde, war der hölzerne Turm (Flèche) der Kathedrale eingestürzt, der größte Teil des Holzdachs war zerstört und die oberen Wände der Kathedrale waren schwer beschädigt. Umfangreiche Schäden im Innenraum wurden durch die gewölbte Steindecke verhindert, die beim Einsturz das brennende Dach weitgehend abdeckte. Viele Kunstwerke und religiöse Relikte wurden in Sicherheit gebracht, andere erlitten jedoch Rauchschäden und einige der Außenkunstwerke wurden beschädigt oder zerstört."  #NT!
 1999_VNZ_mudslide.t:0 "Die Vargas-Tragödie"  #NT!
 1999_VNZ_mudslide.d:0 "Die Vargas-Tragödie war eine Naturkatastrophe, die sich am 15. Dezember 1999 (im Verlauf von 10 Tagen) im Bundesstaat Vargas in Venezuela ereignete. Sintflutartige Regenfälle verursachten Sturzfluten und Murgänge, die Zehntausende Menschen töteten, Tausende Häuser zerstörten und zum völligen Zusammenbruch der Infrastruktur des Staates führten. Nach Angaben von Hilfskräften wurde das Viertel Los Corales unter einer drei Meter hohen Schlammschicht begraben und ein hoher Prozentsatz der Häuser wurde einfach ins Meer gespült. Ganze Städte, darunter Cerro Grande und Carmen de Uria, verschwanden vollständig. Bis zu 10 % der Bevölkerung von Vargas starben während des Ereignisses."  #NT!
 2019_JAP_monument_damaged.t:0 "Das Feuer im Schloss Shuri"  #NT!
 2019_JAP_monument_damaged.d:0 "Die Burg Shuri ist eine Ryukyuan-Gusuku-Burg in Shuri, Präfektur Okinawa, Japan. Zwischen 1429 und 1879 war es der Palast des Ryūkyū-Königreichs, bevor es weitgehend vernachlässigt wurde. 1945 wurde es während der Schlacht um Okinawa fast vollständig zerstört. Am Morgen des 31. Oktober 2019 wurden die Haupthofstrukturen des Schlosses erneut durch einen Brand zerstört."  #NT!
 1991_PHI_eruption.t:0 "Der Ausbruch des Mount Pinatubo"  #NT!
 1991_PHI_eruption.d:0 "Der Ausbruch des Mount Pinatubo im Luzon-Vulkanbogen auf den Philippinen im Jahr 1991 war nach dem Ausbruch des Novarupta in Alaska im Jahr 1912 der zweitgrößte Vulkanausbruch des 20. Jahrhunderts.  Fast jede Brücke im Umkreis von 30 km (19 Meilen) um den Berg Pinatubo wurde zerstört. Mehrere Tieflandstädte wurden überschwemmt oder teilweise im Schlamm begraben. Mehr als 840 Menschen kamen durch den Einsturz von Dächern unter nasser, schwerer Asche ums Leben und mehrere weitere wurden verletzt."  #NT!
 2022_TON_eruption.t:0 "Der Ausbruch von Hunga Tonga und Hunga Haʻapai"  #NT!
 2022_TON_eruption.d:0 "Im Dezember 2021 begann ein Ausbruch auf dem Hunga Tonga–Hunga Haʻapai, einem unterseeischen Vulkan im Tonga-Archipel im südlichen Pazifik. Der Ausbruch erreichte fast vier Wochen später, am 15. Januar 2022, einen sehr großen und kraftvollen Höhepunkt. Hunga Tonga–Hunga Haʻapai liegt 65 Kilometer (40 Meilen) nördlich von Tongatapu, der Hauptinsel des Landes, und ist Teil des hochaktiven Vulkanbogens Tonga–Kermadec-Inseln, einer Subduktionszone, die sich von Neuseeland bis Fidschi erstreckt."  #NT!
 2025_BUR_earthquake.t:0 "Das Mandalay-Erdbeben"  #NT!
 2025_BUR_earthquake.d:0 "Am 28. März 2025 um 12:50:54 MMT erschütterte ein Erdbeben der Stärke 7,7 die Region Sagaing in Myanmar mit einem Epizentrum in der Nähe von Mandalay, der zweitgrößten Stadt des Landes. Der Strike-Slip-Fehlerschock erreichte eine maximale modifizierte Mercalli-Intensität von IX (heftig). Es war das stärkste Erdbeben, das Myanmar seit 1912 erschütterte, und das zweitschwerste in der modernen Geschichte Myanmars. Es wurde nur von höheren Schätzungen des Bago-Erdbebens von 1930 übertroffen. Das Erdbeben verursachte große Schäden in Myanmar und erhebliche Schäden im benachbarten Thailand. Auch im chinesischen Yunnan wurden Hunderte Häuser beschädigt."  #NT!
 2018_USA_wildfire.t:0 "Das kalifornische Lagerfeuer"  #NT!
 2018_USA_wildfire.d:0 "Der Lagerbrand im nordkalifornischen Butte County im Jahr 2018 war der tödlichste und zerstörerischste Waldbrand in der Geschichte Kaliforniens. Der Brand begann am Morgen des 8. November 2018, als ein Teil einer schlecht gewarteten Übertragungsleitung der Pacific Gas and Electric Company (PG&E) im Feather River Canyon aufgrund starker katabatischer Winde ausfiel. Diese Winde trieben das Lagerfeuer schnell durch die Gemeinden Concow, Magalia, Butte Creek Canyon und Paradise und zerstörten sie größtenteils. Das Feuer brannte weitere zwei Wochen und konnte am Sonntag, dem 25. November, eingedämmt werden, nachdem 153.336 Acres (62.050 ha) verbrannt waren. Der Lagerbrand forderte 85 Todesopfer, über 50.000 Menschen wurden vertrieben und mehr als 18.000 Gebäude wurden zerstört, was einen geschätzten Schaden von 16,5 Milliarden US-Dollar verursachte."  #NT!
 1976_CHI_earthquake.t:0 "Das Tangshan-Erdbeben"  #NT!
 1976_CHI_earthquake.d:0 "Das Tangshan-Erdbeben von 1976 war ein Erdbeben der Stärke 7,6, das am 27. Juli um 19:42:55 UTC die Region um Tangshan, Hebei, China, erschütterte. Die maximale Intensität des Erdbebens betrug XI auf der Mercalli-Skala."  #NT!
 1948_TKM_earthquake.t:0 "Das Aschgabat-Erdbeben"  #NT!
 1948_TKM_earthquake.d:0 "Das Erdbeben in Aschgabat im Jahr 1948 ereignete sich am 6. Oktober mit einer Oberflächenwellenstärke von 7,3 und einer maximalen Mercalli-Intensität von X in Turkmenistan in der Nähe von Aschgabat. Aufgrund der Zensur durch die Sowjetregierung wurde in den sowjetischen Medien nicht ausführlich über das Ereignis berichtet."  #NT!
  
