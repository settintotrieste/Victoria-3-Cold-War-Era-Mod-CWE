 UN_peacekeeping_resolution_mandate_notice.t:0 "UN-Treuhandschaft über [SCOPE.sCountry('UNT_mandate_country').GetName] hinaus?"  #NT!
 UN_peacekeeping_resolution_mandate_notice.d:0 "Die Vereinten Nationen haben uns ein Territorium zugewiesen, das wir im Rahmen des UN-Trust-Territorium-Systems verwalten sollen. Wir können die Treuhandschaft entweder annehmen oder ablehnen."  #NT!
 UN_peacekeeping_resolution_mandate_notice.f:0 "Die Treuhänderschaft wird für einen Zeitraum von fünf Jahren gelten. Danach muss [ROOT.GetCountry.GetName] [SCOPE.sCountry('UNT_mandate_country').GetName] die Unabhängigkeit gewähren, andernfalls muss er mit einer internationalen Verurteilung rechnen."  #NT!
