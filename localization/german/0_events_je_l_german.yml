 je_economic_outlook_system:0 "Nationaler Wirtschaftsausblick"  #NT!
 je_economic_outlook_system_reason:0 "Der National Economic Outlook von [ROOT.GetCountry.GetName] ist ein Maß für die erwartete zukünftige Wirtschaftslage und umfasst Faktoren wie Wachstumsraten, Beschäftigungsniveau und Inflationsraten. Es dient als Prognose der allgemeinen Gesundheit und Leistung einer Volkswirtschaft über einen bestimmten Zeitraum. \n\nAktueller Wirtschaftswert: [GetPlayer.MakeScope.Var('economic_strength_var').GetValue] / 40 \n\nAktueller Wirtschaftsausblick: [SCOPE.GetRootScope.GetCountry.GetCustom('economic_outlook_custom_title')] \n\n#BOLD Punkteaufschlüsselung:#! $economic_strength_economic_laws$ $economic_strength_government_finances$ $economic_strength_corruption$ $economic_strength_stock_market$ $economic_strength_national_economy$ [GetPlayer.MakeScope.Var('economic_strength_var').GetValue]0 [GetPlayer.MakeScope.Var('economic_strength_var').GetValue]1 [GetPlayer.MakeScope.Var('economic_strength_var').GetValue]2"  #NT!
 je_economic_outlook_system_status:0 "Wirtschaftswert: [GetPlayer.MakeScope.Var('economic_strength_var').GetValue] / 40 \nVorheriges Halbjahres-BIP: @money![GetPlayer.MakeScope.Var('prev_half_year_GDP_display').GetValue]M \nAktuelles Halbjahres-BIP: @money![GetPlayer.MakeScope.Var('current_half_year_GDP_display').GetValue]M \nHalbjähriges BIP-Wachstumsrate: #yellow [GetPlayer.MakeScope.Var('half_year_GDP_rate').GetValue]%#!"  #NT!
  
