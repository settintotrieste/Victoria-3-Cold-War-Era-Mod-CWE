 je_G8_system:0 "Die Gruppe von [GetPlayer.MakeScope.Var('G8_members_counter').GetValue]"  #NT!
 je_G8_system_reason:0 "Die Gruppe von [GetPlayer.MakeScope.Var('G8_members_counter').GetValue] ist ein zwischenstaatliches politisches und wirtschaftliches Forum bestehend aus demokratischen [Concept('concept_major_power','$concept_major_powers$')]. \n\nEntstanden aus einem Ad-hoc-Treffen von Finanzministern hat sich die G[GetPlayer.MakeScope.Var('G8_members_counter').GetValue] seitdem zu einem formellen, hochkarätigen Veranstaltungsort für die Diskussion und Koordinierung von Lösungen für wichtige globale Probleme entwickelt, insbesondere in den Bereichen Handel, Sicherheit, Wirtschaft und Klimawandel. \n\nDer G[GetPlayer.MakeScope.Var('G8_members_counter').GetValue] basiert nicht auf einem Vertrag und hat kein ständiges Sekretariat oder Büro. Die Organisation erfolgt durch einen Vorsitz, der jährlich zwischen den Mitgliedstaaten wechselt, wobei der Vorsitzstaat die Prioritäten der Gruppe festlegt und den Gipfel ausrichtet."  #NT!
  
