 je_corruption_system:0 "Korruption in [ROOT.GetCountry.GetNameNoFlag]"  #NT!
 je_corruption_system_reason:0 "[concept_corruption] ist die Nutzung von Befugnissen durch Regierungsbeamte oder deren Netzwerkkontakte zum unrechtmäßigen privaten Vorteil. Die Formen der Korruption variieren, können aber Bestechung, Lobbyismus, Erpressung, Vetternwirtschaft, Vetternwirtschaft, Engstirnigkeit, Mäzenatentum, Einflussnahme, Bestechung und Unterschlagung umfassen. \n\nKorruption ist in [ROOT.GetCountry.GetAdjective] [concept_government] vorhanden und daher ist es notwendig, stärkeres $lawgroup_corruption_policy$ zu erlassen, um dieses Problem zu beseitigen. \n\nDie @armed_forces! $ig_armed_forces$ und @intelligentsia! $ig_intelligentsia$ wird sich jedoch jedem Versuch widersetzen, die Korruption im Land zu reduzieren, und so wird der Radikalismus unter den Menschen, die diese unterstützen, [Concept('concept_interest_group', '$concept_interest_groups$')] für die Dauer jedes Versuchs, strengere Maßnahmen zu ergreifen, zunehmen $lawgroup_corruption_policy$."  #NT!
  
