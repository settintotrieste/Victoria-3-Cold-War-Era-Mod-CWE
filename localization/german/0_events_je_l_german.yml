 1948_Universal_Declaration_of_Human_Rights.t:0 "Die Allgemeine Erklärung der Menschenrechte"  #NT!
 1948_Universal_Declaration_of_Human_Rights.d:0 "Am 10. Dezember 1948 verabschiedete die Generalversammlung der Vereinten Nationen die Allgemeine Erklärung der Menschenrechte, ein wegweisendes Dokument, das die jedem Menschen innewohnende Würde und gleiche Rechte verkündet. Es wurde nach dem Zweiten Weltkrieg verfasst und legte Grundfreiheiten und Schutzrechte fest. Es wurde zur Grundlage des modernen internationalen Menschenrechtsgesetzes."  #NT!
 1960_UNGA_Resolution_1514.t:0 "Erklärung zur Gewährung der Unabhängigkeit"  #NT!
 1960_UNGA_Resolution_1514.d:0 "Am 14. Dezember 1960 verabschiedete die Generalversammlung der Vereinten Nationen die Resolution 1514, in der erklärt wurde, dass alle Völker das Recht auf Selbstbestimmung und Unabhängigkeit haben. Diese historische Resolution beschleunigte den Prozess der Dekolonisierung und führte zur Befreiung Dutzender Nationen von der Kolonialherrschaft."  #NT!
 1961_UN_Committee_On_Decolonisation.t:0 "Sonderausschuss zur Entkolonialisierung"  #NT!
 1961_UN_Committee_On_Decolonisation.d:0 "Am 27. November 1961 gründeten die Vereinten Nationen den Sonderausschuss zur Entkolonialisierung, dessen Aufgabe es war, die Umsetzung der Resolution 1514 zu überwachen. Der sogenannte Ausschuss der 24 wurde zum zentralen Gremium, das sich für das Ende des Kolonialismus und die Anerkennung der Selbstbestimmung weltweit einsetzte."  #NT!
 1970_UNGA_Resolution_2625.t:0 "Erklärung zu freundschaftlichen Beziehungen"  #NT!
 1970_UNGA_Resolution_2625.d:0 "Am 24. Oktober 1970 verabschiedete die Generalversammlung der Vereinten Nationen die Resolution 2625, in der die Grundsätze des Völkerrechts bekräftigt wurden, darunter souveräne Gleichheit, Nichteinmischung und das Recht der Völker auf Selbstbestimmung. Es stärkte den rechtlichen Rahmen für die Dekolonisierung und friedliche Zusammenarbeit zwischen Staaten."  #NT!
 2000_Millennium_Development_Goals.t:0 "Die Millenniums-Entwicklungsziele"  #NT!
 2000_Millennium_Development_Goals.d:0 "Am 8. September 2000 verabschiedeten die Vereinten Nationen die Millenniums-Entwicklungsziele, eine Reihe von acht ehrgeizigen Zielen zur Verringerung der Armut, zur Verbesserung der Gesundheit und zur Förderung der Bildung bis 2015. Diese Initiative markierte ein globales Engagement für Entwicklung und Zusammenarbeit im neuen Jahrhundert."  #NT!
 historical_un_events.option.1:0 "Vielen Dank für Ihre Aufmerksamkeit in dieser Angelegenheit."  #NT!
  
 je_generic_decolonisation_overlord_system:0 "Antikoloniale Gefühle"  #NT!
 je_generic_decolonisation_overlord_system_reason:0 "Der Antikolonialismus prägte die Mitte des 20. Jahrhunderts, als die Nationen die imperiale Herrschaft abbauten. Von Afrika bis Asien haben Unabhängigkeitsbewegungen Bündnisse und Strategien des Kalten Krieges verändert. Souveränität bedeutete mehr als nur Grenzen – sie war eine Forderung nach Kontrolle über Ressourcen, Identität und Schicksal und zwang die Weltmächte, sich an eine sich rasch entkolonialisierende Welt anzupassen. \n\nDa [ROOT.GetCountry.GetName] [Concept('concept_unincorporated_state','$concept_unincorporated_states$')] besitzt, fordern die Bevölkerungen dieser Staaten entweder Selbstbestimmung oder volle Rechte als [ROOT.GetCountry.GetAdjective]-Bürger."  #NT!
  
 je_generic_decolonisation_colonial_purge_button:0 "Führen Sie eine koloniale Säuberung durch"  #NT!
 je_generic_decolonisation_colonial_purge_button_desc:0 "Die [ROOT.GetCountry.GetAdjective] [concept_government] wird alle antikolonialen Agitatoren und Unterstützer in ihren Kolonien und nicht-souveränen [Concept('concept_subject', '$concept_subjects$')] gewaltsam vertreiben."  #NT!
  
 je_generic_decolonisation_subject_system:0 "[ROOT.GetCountry.GetAdjectiveNoFormatting] Nationalismus"  #NT!
 je_generic_decolonisation_subject_system_reason:0 "Der Antikolonialismus prägte die Mitte des 20. Jahrhunderts, als die Nationen die imperiale Herrschaft abbauten. Von Afrika bis Asien haben Unabhängigkeitsbewegungen Bündnisse und Strategien des Kalten Krieges verändert. Souveränität bedeutete mehr als nur Grenzen – sie war eine Forderung nach Kontrolle über Ressourcen, Identität und Schicksal und zwang die Weltmächte, sich an eine sich rasch entkolonialisierende Welt anzupassen. \n\nDa [ROOT.GetCountry.GetName] ein koloniales [concept_subject] einer ausländischen Macht ist, fordern die einheimischen Bevölkerungsgruppen von [ROOT.GetCountry.GetAdjective] Menschen Unabhängigkeit."  #NT!
  
 je_generic_decolonisation_civil_disobedience_button:0 "Aufruf zu antikolonialen Protesten"  #NT!
 je_generic_decolonisation_civil_disobedience_button_desc:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [GetPlayer.GetRuler.GetFullName] wird alle [ROOT.GetCountry.GetAdjective] Völker dazu aufrufen, ihren [concept_overlord] nicht zu gehorchen."  #NT!
  
 je_mandate_decolonisation_system:0 "Die [ROOT.GetCountry.GetAdjectiveNoFormatting]-Mandate"  #NT!
 je_mandate_decolonisation_system_reason:0 "Mandate entstanden nach dem Ersten Weltkrieg als Gebiete, die unter internationaler Aufsicht standen und oft von Kolonialmächten über den Völkerbund verwaltet wurden. \n\nAls Übergangsregierung gedacht, weiteten sie häufig den imperialen Einfluss unter dem Deckmantel der Verwaltung aus. \n\nIn der Zeit des Kalten Krieges sahen sich die Länder, die Mandate besaßen, mit internationalem Druck konfrontiert, ihren Mandaten Unabhängigkeit zu gewähren. \n\nDa die Vereinten Nationen das dauerhafte Eigentum von [ROOT.GetCountry.GetName] an ihren [concept_mandate](s) nicht anerkennen, wird [ROOT.GetCountry.GetName] mit diplomatischen Sanktionen rechnen, bis allen Mandaten die Unabhängigkeit gewährt wird."  #NT!
  
