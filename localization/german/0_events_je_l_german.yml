 develop_cybersin_decision:0 "Bauen Sie ein sozialistisches kybernetisches Netzwerk auf"  #NT!
 develop_cybersin_decision_desc:0 "Ab den frühen 1960er Jahren erwog die Kommunistische Partei, sich von der bestehenden stalinistischen Befehlsplanung zu lösen und stattdessen ein vernetztes computergestütztes System zur Ressourcenzuteilung zu entwickeln, das auf den Prinzipien der Kybernetik basierte. Diese Entwicklung wurde als Grundlage für den Übergang zu einer optimalen Planung angesehen, die die Grundlage für eine weiter entwickelte Form der sozialistischen Wirtschaft bilden könnte, die auf informationeller Dezentralisierung und Innovation basiert."  #NT!
  
 je_develop_cybersin:0 "Aufbau eines kybernetischen Netzwerks"  #NT!
 je_develop_cybersin_reason:0 "Geplant ist der Aufbau eines dreistufigen Netzwerks mit einem Rechenzentrum in der Hauptstadt, bis zu 200 Mittelzentren in anderen Großstädten und bis zu 20.000 lokalen Terminals an wirtschaftlich bedeutenden Standorten, die über die bestehende Telefoninfrastruktur in Echtzeit kommunizieren. Die Struktur würde es jedem Terminal auch ermöglichen, mit jedem anderen zu kommunizieren. Dieses Netzwerk wird dann von der Statistischen Zentralverwaltung betrieben. \n\nTipp: Durch Erhöhen von [Concept('concept_government_wage', '$concept_government_wages$')] wird der monatliche Gewinn des Cybersin-Fortschritts erhöht."  #NT!
  
 je_cybersin_system:0 "Sozialistisches Kybernetisches Netzwerk"  #NT!
 je_cybersin_system_reason:0 "Das All-State Automated System (OGAS) ist ein nationales Echtzeit-Computernetzwerk mit Fernzugriff, das auf bereits vorhandenen und neuen Telefonleitungen aufbaut. Es ordnet sich wie ein Nervensystem auf jede Fabrik und jedes Unternehmen in der Planwirtschaft ein. Sein Netzwerk ist hierarchisch der dreistufigen Pyramidenstruktur von Staat und Wirtschaft nachempfunden: Ein zentrales Rechenzentrum in der Hauptstadt wäre mit bis zu 200 mittelgroßen Rechenzentren in bedeutenden Städten verbunden, die wiederum mit bis zu 20.000 Computerterminals verbunden wären, die über wichtige Produktionsstandorte der Volkswirtschaft verteilt wären."  #NT!
  
