 je_gatt_system:0 "Das Allgemeine Zoll- und Handelsabkommen"  #NT!
 je_gatt_system_reason:0 "Das Allgemeine Zoll- und Handelsabkommen (GATT) ist ein rechtsgültiges Abkommen zwischen vielen Ländern, dessen Hauptzweck darin bestand, den internationalen Handel durch den Abbau oder die Beseitigung von Handelshemmnissen wie Zöllen oder Quoten zu fördern. Es wurde in einer Reihe globaler Handelsverhandlungen, die zwischen 1947 und 1995 aus neun Runden bestanden, aktualisiert. Seine Rolle im internationalen Handel wurde 1995 weitgehend von der Welthandelsorganisation übernommen. \n\nDa es sich beim GATT um ein ständig aktualisiertes Abkommen handelt, variiert die Reduzierung um [concept_tariffs] durch das GATT jedes Jahr. \n\nHinweis: Der reduzierte Betrag von [concept_tariffs] hängt von den globalen Wirtschaftsaussichten ab."  #NT!
  
