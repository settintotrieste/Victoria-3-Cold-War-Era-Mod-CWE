 je_one_china_policy_ROC:0 "Treten Sie den Vereinten Nationen bei"  #NT!
 je_one_china_policy_ROC_reason:0 "Als Erbe des chinesischen Bürgerkriegs vertritt [SCOPE.sCountry('republic_of_china_un_seat').GetName] derzeit „China“ bei den Vereinten Nationen. Das bedeutet, dass [SCOPE.sCountry('republic_of_china_un_seat').GetName] internationale Anerkennung genießt, [ROOT.GetCountry.GetName] jedoch nicht. Eine solche Situation ist eine schwere Ungerechtigkeit gegenüber den [ROOT.GetCountry.GetAdjective] Menschen. Wir müssen daher versuchen, den Sitz von [SCOPE.sCountry('republic_of_china_un_seat').GetName] bei den Vereinten Nationen einzunehmen."  #NT!
  
