 je_the_cold_war_democratic:0 "Der Kalte Krieg (Demokratischer Block)"  #NT!
 je_the_cold_war_democratic_reason:0 "Der Kalte Krieg ist eine Zeit geopolitischer Spannungen zwischen [ROOT.GetCountry.GetName] und [SCOPE.sCountry('communist_rival_superpower').GetName] und ihren jeweiligen Verbündeten, dem Demokratischen Block und dem Kommunistischen Block. [ROOT.GetCountry.GetName] muss danach streben, diesen ideologischen und geopolitischen Kampf um globalen Einfluss zu gewinnen, indem es dafür sorgt, dass es keine kommunistischen Supermächte mehr gibt!"  #NT!
  
