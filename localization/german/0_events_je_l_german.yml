 elective_monarchy_type_desc:0 "\n\n[ROOT.GetCountry.GetName] hat einen [SCOPE.GetRootScope.GetCountry.GetCustom('monarchy_type_custom_title')], wobei der [SCOPE.GetRootScope.GetCountry.GetCustom('monarch_custom_title')] alle 5 Jahre zwischen den verschiedenen regionalen Königsfamilien wechselt. Das bedeutet, dass sich die [SCOPE.GetRootScope.GetCountry.GetCustom('monarch_custom_title')] [concept_interest_group] alle 5 Jahre zufällig ändern."  #NT!
