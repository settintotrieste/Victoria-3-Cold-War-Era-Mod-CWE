 british_hong_kong.sgc.t:0 "Selbstverwaltung in Hongkong?"  #NT!
 british_hong_kong.sgc.d:0 "Nach der chinesisch-britischen Gemeinsamen Erklärung beschloss die Regierung von Hongkong, den Prozess der Demokratisierung in Hongkong einzuleiten, und zwar auf der Grundlage des am 18. Juli 1984 veröffentlichten Konsultationsdokuments „Grünbuch: Die Weiterentwicklung der repräsentativen Regierung in Hongkong“. Es gab 12 Mitglieder, die von den Wahlkollegien und 12 von den funktionalen Wahlkreisen gewählt wurden, vier offizielle Mitglieder und die restlichen Sitze wurden vom Gouverneur ernannt."  #NT!
 british_WIF_state.indy.t:0 "Wind des Wandels in der Karibik?"  #NT!
 british_WIF_state.indy.d:0 "„West Indies Associated States“ war die Sammelbezeichnung für eine Reihe von Inseln in der östlichen Karibik, deren Status sich 1967 von britischen Kolonien zu Staaten in freier Assoziation mit dem Vereinigten Königreich änderte. Im Laufe der Zeit erlangten die assoziierten Staaten ihre vollständige Unabhängigkeit, der erste war Grenada im Jahr 1974. Es folgten Dominica im Jahr 1978, St. Lucia und St. Vincent im Jahr 1979, Antigua und Barbuda im Jahr 1981 und St. Kitts und Nevis im Jahr 2011 1983."  #NT!
 british_cyrenaica.sgc.t:0 "Autonomie in der Cyrenaika?"  #NT!
 british_cyrenaica.sgc.d:0 "Das Emirat Cyrenaica entstand, als Sayyid Idris die Cyrenaica am 1. März 1949 mit Unterstützung des Vereinigten Königreichs einseitig zum unabhängigen Senussi-Emirat erklärte. Sayyid Idris erklärte sich selbst auf einer „nationalen Konferenz“ in Bengasi zum Emir der Cyrenaica. Die Anerkennung durch das Vereinigte Königreich hatte keinen Einfluss auf die Haltung der Vereinten Nationen, und Großbritannien und Frankreich wurden in einer am 21. November 1949 verabschiedeten Resolution angewiesen, die Unabhängigkeit Libyens vorzubereiten."  #NT!
 british_tuvalu.sgc.t:0 "Selbstverwaltung in Tuvalu?"  #NT!
 british_tuvalu.sgc.d:0 "$generic_self_rule_decolonisation_loc_desc$"  #NT!
  
 british_canada.indy.t:0 "Unabhängigkeit Kanadas?"  #NT!
 british_canada.indy.d:0 "Im Jahr 1981 verabschiedeten das kanadische Unterhaus und der Senat eine Resolution, in der sie das britische Parlament aufforderten, ein Paket von Verfassungsänderungen zu verabschieden, das die letzten Befugnisse des britischen Parlaments zur Gesetzgebung für Kanada beenden und ein ausschließlich kanadisches Verfahren für Verfassungsänderungen schaffen würde."  #NT!
 british_australia.indy.t:0 "Unabhängigkeit Australiens?"  #NT!
 british_australia.indy.d:0 "Die Australia Acts trennten die verbliebenen verfassungsmäßigen Bindungen zwischen Australien und dem Vereinigten Königreich und behielten gleichzeitig die Unabhängigkeit der Monarchin als Königin von Australien bei."  #NT!
 british_new_zealand.indy.t:0 "Unabhängigkeit Neuseelands?"  #NT!
 british_new_zealand.indy.d:0 "1983 wurde ein neues Letters Patent ausgestellt, das von einem Neuseeländer verfasst und vom damaligen neuseeländischen Premierminister unterzeichnet wurde. Das neue Briefpatent erklärte Neuseeland zum „Reich Neuseelands“ und hob das vorherige Imperial Letters Patent von 1917 auf. Die letzte praktische verfassungsrechtliche Verbindung des neuseeländischen Parlaments mit Großbritannien wurde 1986 durch das Constitution Act 1986 (gültig ab 1. Januar 1987) aufgehoben. Durch dieses Gesetz wurde die verbleibende Befugnis des britischen Parlaments aufgehoben, auf dessen Antrag und Zustimmung hin Gesetze für Neuseeland zu erlassen."  #NT!
 british_cyprus.indy.t:0 "Unabhängigkeit Zyperns?"  #NT!
 british_cyprus.indy.d:0 "Nach einer von der EOKA angeführten bewaffneten Kampagne erlangte Zypern 1960 seine Unabhängigkeit. Gemäß dem Abkommen von Zürich und London erlangte Zypern am 16. August 1960 offiziell seine Unabhängigkeit und hatte zu diesem Zeitpunkt eine Gesamtbevölkerung von 573.566; Davon waren 442.138 (77,1 %) Griechen, 104.320 (18,2 %) Türken und 27.108 (4,7 %) andere. Das Vereinigte Königreich behielt die beiden souveränen Stützpunkte Akrotiri und Dhekelia, während Regierungsposten und öffentliche Ämter nach ethnischen Quoten vergeben wurden, was der Minderheit der türkischen Zyprioten ein dauerhaftes Vetorecht von 30 % im Parlament und in der Verwaltung einräumte und den drei Mutterstaaten Bürgenrechte einräumte."  #NT!
