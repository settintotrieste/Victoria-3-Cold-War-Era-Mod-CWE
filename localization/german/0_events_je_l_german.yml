 je_backbenchers_plot_system:0 "Backbencher-Plot zum Sturz [SCOPE.sCharacter('backbenchers_plot_prime_minister_scope').GetFullName]"  #NT!
 je_backbenchers_plot_system_reason:0 "Im parlamentarischen System von [ROOT.GetCountry.GetName] kann ein [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] nur dann im Amt bleiben, wenn er das Vertrauen des Parlaments und der Regierungspartei oder -koalition genießt. Ein [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] würde normalerweise seine oder ihre Unterstützung von Parlamentsabgeordneten derselben Partei oder Regierungskoalition erhalten. Es kann jedoch vorkommen, dass diese Mitglieder versuchen, den [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] zu verdrängen, indem sie erklären, dass sie den [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] nicht mehr unterstützen, oder einen internen Parteiführungswettbewerb starten.\n\n[SCOPE.sCharacter('backbenchers_plot_prime_minister_scope').GetFullName] wird von mächtigen Mitgliedern der Regierungspartei so gehasst, dass Hinterbänkler einen Führungswettbewerb gestartet haben, um den [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] von seinem Platz zu verdrängen Büro.\n\n@Warnung! [SCOPE.sCharacter('backbenchers_plot_prime_minister_scope').GetFullName] wird aus dem Amt entfernt, wenn einer der [concept_interest_group] in [concept_government] nicht mindestens [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]0 Neutral[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]1 Genehmigung hat, wenn der Timer abgelaufen ist."  #NT!
 je_backbenchers_plot_system_1.tt:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [SCOPE.sCharacter('backbenchers_plot_prime_minister_scope').GetFullName] wird aus dem Amt entfernt"  #NT!
 je_backbenchers_plot_system_2.tt:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [SCOPE.sCharacter('backbenchers_plot_prime_minister_scope').GetFullName] wird nicht aus dem Amt entfernt"  #NT!
 je_backbenchers_plot_system_3.tt:0 "[SCOPE.sCharacter('backbenchers_plot_prime_minister_scope').GetFullName] war in letzter Zeit nicht das Ziel einer Hinterbänkler-Verschwörung"  #NT!
 je_backbenchers_plot_system_4.tt:0 "[SCOPE.sCharacter('backbenchers_plot_prime_minister_scope').GetFullName] ist nicht mehr das [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]"  #NT!
 je_backbenchers_plot_system_5.tt:0 "[SCOPE.sCharacter('backbenchers_plot_prime_minister_scope').GetFullName] ist entweder korrupt, ein Verräter, ergreift rechtswidrig die Macht oder es gibt mindestens 1 unglücklichen [concept_interest_group] in der [concept_government]"  #NT!
  
 lost_confidence_vote_modifier:0 "Misstrauensvotum verloren"  #NT!
