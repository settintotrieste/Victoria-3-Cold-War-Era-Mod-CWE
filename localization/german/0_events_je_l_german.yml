 end_conscription.t:0 "Wehrpflicht abschaffen?"  #NT!
 end_conscription.d:0 "Eine Reihe einflussreicher Politiker hat das Ende der Wehrpflicht im Jahr [ROOT.GetCountry.GetName] gefordert. Sie sagen, dass es nicht mehr erforderlich sei, weil es nicht mit den Grundsätzen der Demokratie vereinbar sei."  #NT!
  
 nuclear_accident_1979.t:0 "Der Atomunfall auf Three Mile Island"  #NT!
 nuclear_accident_1979.d:0 "Der Unfall auf Three Mile Island war eine Kernschmelze im Reaktorblock 2 (TMI-2) des Kernkraftwerks Three Mile Island am Susquehanna River im Londonderry Township in der Nähe von Harrisburg, der Hauptstadt von Pennsylvania, USA. Der Reaktorunfall begann am 28. März 1979 um 4 Uhr morgens und setzte radioaktive Gase und radioaktives Jod in die Umwelt frei."  #NT!
 nuclear_accident_1986.t:0 "Die Atomkatastrophe von Tschernobyl"  #NT!
 nuclear_accident_1986.d:0 "Die Katastrophe von Tschernobyl begann am 26. April 1986 mit der Explosion des Reaktors Nr. 4 des Kernkraftwerks Tschernobyl in der Nähe der Stadt Pripjat im Norden der Ukrainischen SSR, nahe der Grenze zur Weißrussischen SSR in der Sowjetunion. Nach der Katastrophe wurde Pripjat aufgegeben und schließlich durch die neue, eigens dafür errichtete Stadt Slawutytsch ersetzt."  #NT!
 nuclear_accident_2011.t:0 "Der Atomunfall von Fukushima"  #NT!
 nuclear_accident_2011.d:0 "Der Atomunfall von Fukushima war ein schwerer nuklearer Unfall im Kernkraftwerk Fukushima Daiichi in Ōkuma, Fukushima, Japan, der am 11. März 2011 begann. Die unmittelbare Ursache des Unfalls war das Erdbeben und der Tsunami in Tōhoku 2011, die zu einem Ausfall des Stromnetzes führten und fast alle Notstromquellen des Kraftwerks beschädigten. Die anschließende Unfähigkeit, die Reaktoren nach der Abschaltung ausreichend zu kühlen, beeinträchtigte die Eindämmung und führte zur Freisetzung radioaktiver Schadstoffe in die Umgebung."  #NT!
  
