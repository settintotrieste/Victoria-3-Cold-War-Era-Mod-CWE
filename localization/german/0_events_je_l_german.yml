 concept_sdr:0 "SDR"  #NT!
 concept_sdr_desc:0 "Die Sonderziehungsrechte (SZR) sind internationale Währungsreserven, die der IWF zur Ergänzung der offiziellen Reserven seiner Mitgliedsländer geschaffen hat.  Das SZR ist keine Währung. Es handelt sich um einen potenziellen Anspruch auf die frei verwendbaren Währungen der IWF-Mitglieder. Daher können SZR ein Land mit Liquidität versorgen."  #NT!
  
 je_imf_system_buy_sdr_button:0 "Konvertieren Sie [concept_sdr]"  #NT!
 je_imf_system_buy_sdr_button_desc:0 "[ROOT.GetCountry.GetName] erhält einen [ROOT.GetCountry.GetAdjectiveNoFlag] Währungsäquivalent von #green 1.000.000#! von [concept_sdr], die von anderen IWF-Mitgliedern beigesteuert wurden, um seine finanzielle Liquidität zu erhöhen. \n\n@Warnung! Der Betrag von [concept_gold_reserves], den [ROOT.GetCountry.GetName] durch den Erhalt von [concept_sdr] erhält, hängt von der Stärke der [ROOT.GetCountry.GetAdjective]-Währung ab und die Stärke der [ROOT.GetCountry.GetAdjective]-Währung wird durch die [ROOT.GetCountry.GetAdjectiveNoFlag]0 [ROOT.GetCountry.GetAdjectiveNoFlag]1 bestimmt."  #NT!
  
 je_imf_system_sell_sdr_button:0 "Tragen Sie bei [concept_sdr]"  #NT!
 je_imf_system_sell_sdr_button_desc:0 "Mit [ROOT.GetCountry.GetName] können einige seiner [concept_gold_reserves] von anderen IWF-Mitgliedern als [concept_sdr] verwendet werden. \n\n@Warnung! Der Betrag von [concept_gold_reserves], den [ROOT.GetCountry.GetName] durch den Beitrag zum globalen nicht beanspruchten [concept_sdr]-Pool verlieren wird, hängt von der Stärke der [ROOT.GetCountry.GetAdjective]-Währung ab und die Stärke der [ROOT.GetCountry.GetAdjective]-Währung wird durch die $lawgroup_monetary_policy$ [concept_law] bestimmt."  #NT!
  
