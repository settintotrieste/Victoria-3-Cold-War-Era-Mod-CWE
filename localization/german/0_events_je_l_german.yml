 portuguese_macau.sgc.t:0 "Dezentralisierung in Macau?"  #NT!
 portuguese_macau.sgc.d:0 "Nach der Revolution von 1974 in Portugal ebnete eine Dekolonisierungspolitik den Weg für Macaus Retrozession an die Volksrepublik China (VR China). Am 17. Februar 1976 verabschiedete das portugiesische Parlament das Gründungsstatut von Macau, das es als „Gebiet unter portugiesischer Verwaltung“ bezeichnete. Dieser Begriff wurde auch in die portugiesische Verfassung von 1976 aufgenommen und ersetzte Macaus Bezeichnung als Überseeprovinz. Im Gegensatz zu früheren Verfassungen wurde Macau nicht als integraler Bestandteil des portugiesischen Territoriums einbezogen."  #NT!
  
