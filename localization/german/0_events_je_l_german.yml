 je_nato_system:0 "Die Organisation des Nordatlantikvertrags"  #NT!
 je_nato_system_reason:0 "Die North Atlantic Treaty Organization ist ein zwischenstaatliches Militärbündnis europäischer und nordamerikanischer Staaten. Die nach dem Zweiten Weltkrieg gegründete Organisation setzte den am 4. April 1949 in Washington D.C. unterzeichneten Nordatlantikvertrag um. Die NATO ist ein kollektives Sicherheitssystem: Ihre unabhängigen Mitgliedsstaaten verpflichten sich, sich gegenseitig gegen Angriffe Dritter zu verteidigen. \n\nAnführer: [SCOPE.sCountry('nato_leader').GetName] \n\nHauptquartiere: #y [SCOPE.sCountry('nato_leader').GetCapital.GetCityHubName]#!"  #NT!
 je_nato_system_status:0 "Gesamtzahl der Mitglieder: [GetGlobalVariable('nato_org_member_count').GetValue]"  #NT!
  
 je_request_nato_intervention_button:0 "Rufen Sie Artikel 5 auf"  #NT!
 je_request_nato_intervention_button_desc:0 "Artikel 5 sieht vor, dass, wenn ein NATO-Verbündeter Opfer eines bewaffneten Angriffs wird, jedes andere Mitglied des Bündnisses diesen Gewaltakt als bewaffneten Angriff gegen alle Mitglieder betrachtet und die Maßnahmen ergreift, die es für notwendig hält, um dem angegriffenen Verbündeten zu helfen."  #NT!
  
 je_fund_nato_button:0 "Finanzieren Sie die NATO"  #NT!
 je_fund_nato_button_desc:0 "[ROOT.GetCountry.GetName] wird in seiner Eigenschaft als Führer der NATO das militärische, politische und wirtschaftliche Rückgrat der Organisation bilden."  #NT!
 je_defund_nato_button:0 "Hören Sie auf, die NATO zu finanzieren"  #NT!
 je_defund_nato_button_desc:0 "[ROOT.GetCountry.GetName] wird in seiner Eigenschaft als Führer der NATO nicht länger das militärische, politische und wirtschaftliche Rückgrat der Organisation bilden."  #NT!
 je_hold_nato_exercise_button:0 "Halten Sie NATO-Übungen ab"  #NT!
 je_hold_nato_exercise_button_desc:0 "NATO-Mitglieder werden Militärübungen durchführen, um ihre Kampfbereitschaft und ihr Fachwissen zu verbessern."  #NT!
  
