 join_nuclear_non_proliferation_treaty_decision:0 "Unterzeichnen Sie den Vertrag über die Nichtverbreitung von Kernwaffen"  #NT!
 join_nuclear_non_proliferation_treaty_decision_desc:0 "Der Vertrag über die Nichtverbreitung von Kernwaffen ist ein internationaler Vertrag, dessen Ziel es ist, die Verbreitung von Kernwaffen und Waffentechnologie zu verhindern, die Zusammenarbeit bei der friedlichen Nutzung der Kernenergie zu fördern und das Ziel der nuklearen Abrüstung und der allgemeinen und vollständigen Abrüstung voranzutreiben. Beachten Sie, dass durch die Unterzeichnung dieses Vertrags alle Atomwaffen aus diesem Land entfernt und jedes laufende Atomwaffenprogramm beendet wird."  #NT!
 signed_NPT_1_tt:0 "Dieses Land unterzeichnet den Vertrag über die Nichtverbreitung von Kernwaffen und wird für mindestens zehn Jahre daran gebunden sein."  #NT!
  
 leave_nuclear_non_proliferation_treaty_decision:0 "Verzicht auf den Atomwaffensperrvertrag"  #NT!
 leave_nuclear_non_proliferation_treaty_decision_desc:0 "Der Vertrag über die Nichtverbreitung von Kernwaffen ist ein internationaler Vertrag, dessen Ziel es ist, die Verbreitung von Kernwaffen und Waffentechnologie zu verhindern, die Zusammenarbeit bei der friedlichen Nutzung der Kernenergie zu fördern und das Ziel der nuklearen Abrüstung und der allgemeinen und vollständigen Abrüstung voranzutreiben. Der Verzicht auf diesen Vertrag würde es diesem Land ermöglichen, erneut ein Atomwaffenprogramm zu starten."  #NT!
 signed_NPT_2_tt:0 "Dieses Land ist seit mindestens zehn Jahren Unterzeichner des Atomwaffensperrvertrags."  #NT!
  
 did_not_sign_NPT_tt:0 "Dieses Land ist kein Unterzeichner des Atomwaffensperrvertrags"  #NT!
  
 join_chemical_non_proliferation_treaty_decision:0 "Unterzeichnen Sie das Chemiewaffenübereinkommen"  #NT!
 join_chemical_non_proliferation_treaty_decision_desc:0 "Das Chemiewaffenübereinkommen (CWÜ) ist ein Rüstungskontrollvertrag, der von der Organisation für das Verbot chemischer Waffen (OPCW), einer zwischenstaatlichen Organisation mit Sitz in Den Haag, Niederlande, verwaltet wird. Der Vertrag trat am 29. April 1997 in Kraft. Er verbietet den Einsatz chemischer Waffen sowie die groß angelegte Entwicklung, Produktion, Lagerung oder Weitergabe chemischer Waffen oder ihrer Vorläufer, außer für sehr begrenzte Zwecke (Forschung, medizinische, pharmazeutische oder Schutzzwecke)."  #NT!
 signed_CWC_1_tt:0 "Dieses Land unterzeichnet das Chemiewaffenübereinkommen und ist für mindestens 10 Jahre daran gebunden."  #NT!
  
 leave_chemical_non_proliferation_treaty_decision:0 "Verzichten Sie auf das Chemiewaffenübereinkommen"  #NT!
 leave_chemical_non_proliferation_treaty_decision_desc:0 "Das Chemiewaffenübereinkommen (CWÜ) ist ein Rüstungskontrollvertrag, der von der Organisation für das Verbot chemischer Waffen (OPCW), einer zwischenstaatlichen Organisation mit Sitz in Den Haag, Niederlande, verwaltet wird. Der Vertrag trat am 29. April 1997 in Kraft. Er verbietet den Einsatz chemischer Waffen sowie die groß angelegte Entwicklung, Produktion, Lagerung oder Weitergabe chemischer Waffen oder ihrer Vorläufer, außer für sehr begrenzte Zwecke (Forschung, medizinische, pharmazeutische oder Schutzzwecke). Der Verzicht auf diesen Vertrag würde es diesem Land ermöglichen, erneut ein Chemiewaffenprogramm zu starten."  #NT!
 signed_CWC_2_tt:0 "Dieses Land ist seit mindestens zehn Jahren Unterzeichner des Chemiewaffenübereinkommens."  #NT!
  
 did_not_sign_CWC_tt:0 "Dieses Land ist kein Unterzeichnerstaat des Chemiewaffenübereinkommens"  #NT!
  
 join_biological_non_proliferation_treaty_decision:0 "Unterzeichnen Sie das Übereinkommen über biologische Waffen"  #NT!
 join_biological_non_proliferation_treaty_decision_desc:0 "Das Übereinkommen über biologische Waffen oder das Übereinkommen über biologische Waffen und Toxinwaffen ist ein Abrüstungsvertrag, der biologische Waffen und Toxinwaffen wirksam verbietet, indem es deren Entwicklung, Herstellung, Erwerb, Weitergabe, Lagerung und Verwendung verbietet."  #NT!
 signed_BWC_1_tt:0 "Dieses Land unterzeichnet das Übereinkommen über biologische Waffen und ist für mindestens 10 Jahre daran gebunden."  #NT!
  
 leave_biological_non_proliferation_treaty_decision:0 "Verzichten Sie auf das Übereinkommen über biologische Waffen"  #NT!
 leave_biological_non_proliferation_treaty_decision_desc:0 "Das Übereinkommen über biologische Waffen oder das Übereinkommen über biologische Waffen und Toxinwaffen ist ein Abrüstungsvertrag, der biologische Waffen und Toxinwaffen wirksam verbietet, indem es deren Entwicklung, Herstellung, Erwerb, Weitergabe, Lagerung und Verwendung verbietet. Der Verzicht auf diesen Vertrag wird es diesem Land ermöglichen, erneut ein Biowaffenprogramm zu starten."  #NT!
 signed_BWC_2_tt:0 "Dieses Land ist seit mindestens zehn Jahren Unterzeichner des Übereinkommens über biologische Waffen."  #NT!
  
 did_not_sign_BWC_tt:0 "Dieses Land ist kein Unterzeichnerstaat des Übereinkommens über biologische Waffen"  #NT!
  
 generic_decolonisation_indy.1.tt:0 "Erkläre einen Unabhängigkeitskrieg gegen [SCOPE.sCountry('overlord_in_question_scopes').GetName]!"  #NT!
 generic_decolonisation_indy.t:0 "[ROOT.GetCountry.GetAdjective] Unabhängigkeitskrieg?"  #NT!
 generic_decolonisation_indy.d:0 "Die [ROOT.GetCountry.GetAdjective]-Leute sind empört darüber, dass [SCOPE.sCountry('overlord_in_question_scopes').GetName] sich weigert, [ROOT.GetCountry.GetName] Unabhängigkeit zu gewähren. Angesichts dieser wachsenden nationalistischen Stimmung sind einige Regierungsmitglieder mit einem radikalen Vorschlag an [SCOPE.sCharacter('puppet_leader_in_question_scopes').GetFullName] herangetreten: [ROOT.GetCountry.GetName] soll eine Unabhängigkeitserklärung abgeben und einseitig alle Verbindungen zu [SCOPE.sCountry('overlord_in_question_scopes').GetName] abbrechen."  #NT!
 generic_decolonisation_indy.f:0 "Die Weigerung, für [ROOT.GetCountry.GetAdjective] Unabhängigkeit zu kämpfen, wird jeden in der Regierung mit dem Makel der Feigheit beflecken."  #NT!
 generic_decolonisation_indy.option.1:0 "Kämpfe für die Freiheit!"  #NT!
 generic_decolonisation_indy.option.2:0 "Bah, Freiheit wird überbewertet..."  #NT!
  
 self_governing_colony.tt:0 "Erstelle eine $semi_autonomous_colony$ in der Kolonie [SCOPE.sCulture('culture_to_release').GetName]"  #NT!
 generic_decolonisation_indy_2a.t:0 "[SCOPE.sCulture('culture_to_release').GetName] Selbstverwaltung?"  #NT!
 generic_decolonisation_indy_2b.t:0 "Selbstverwaltung für [SCOPE.sState('state_to_release').GetName]?"  #NT!
 generic_decolonisation_indy_2.d:0 "Die [SCOPE.sCulture('culture_to_release').GetName] Menschen in [SCOPE.sState('state_to_release').GetName] haben [ROOT.GetCountry.GetName] aufgefordert, ihren [concept_homeland] Selbstverwaltung zu gewähren."  #NT!
 generic_decolonisation_indy_2.f:0 "Durch das Akzeptieren der [SCOPE.sCulture('culture_to_release').GetName]-Anfrage wird ein $XFC$ in den [SCOPE.sCulture('culture_to_release').GetName] [concept_homeland]s erstellt, das dann automatisch in das entsprechende Land konvertiert wird."  #NT!
 generic_decolonisation_indy_2.option.1:0 "Wir akzeptieren ihre bescheidene Bitte um interne Autonomie."  #NT!
 generic_decolonisation_indy_2.option.2:0 "Nein, die direkte Regel soll in [SCOPE.sState('state_to_release').GetName] beibehalten werden!"  #NT!
  
 generic_decolonisation_indy.3.t:0 "Erfolglose Dekolonisierung in [SCOPE.sState('state_to_release').GetName]"  #NT!
 generic_decolonisation_indy.3.d:0 "Die [SCOPE.sCulture('primary_culture_scope').GetName] Menschen in [SCOPE.sState('state_to_release').GetName] konnten sich nicht entscheiden, wie sie ihr Land dekolonisieren sollten, und so wird die Kolonie wieder unter die direkte Herrschaft einer ausländischen Macht fallen."  #NT!
 generic_decolonisation_indy.3.f:0 "Dieses Ereignis wurde ausgelöst, weil es kein geeignetes Land gab, in das das Länder-Tag [SCOPE.sCountry('failed_country_scope').GetName] umgewandelt werden konnte. [SCOPE.sCountry('failed_country_scope').GetName] wird daher von seinem Oberherrn und, wenn es keinen Oberherrn gibt, von jedem Land, mit dem es ein [concept_primary_cultures] teilt, wieder annektiert."  #NT!
 generic_decolonisation_indy_3.option:0 "Traurig, aber nicht unglücklich."  #NT!
  
 generic_decolonisation_indy.4.t:0 "Die Unabhängigkeit von [ROOT.GetCountry.GetNameNoFlag]"  #NT!
 generic_decolonisation_indy.4.d:0 "Bei einer aufwändigen Zeremonie in [SCOPE.sState('indy_capital').GetCityHubName] führte [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [ROOT.GetCountry.GetRuler.GetFullName] die Machtübergabe von den ausländischen Herren von [ROOT.GetCountry.GetName] an die Menschen von [ROOT.GetCountry.GetName] durch. Anschließend wurde zur Freude der anwesenden Menschenmenge die neue [ROOT.GetCountry.GetAdjective]-Staatsflagge gehisst."  #NT!
 generic_decolonisation_indy.4.f:0 "Wir, das Volk von [ROOT.GetCountry.GetNameNoFlag], erklären hiermit die Unabhängigkeit von [ROOT.GetCountry.GetNameNoFlag]. Angelegenheiten im Zusammenhang mit der Machtübertragung und anderen Angelegenheiten werden ordnungsgemäß und in kürzester Zeit erledigt. \n\nIm Namen des Volkes von [ROOT.GetCountry.GetNameNoFlag] \n\n[ROOT.GetCountry.GetRuler.GetFullName]"  #NT!
 generic_decolonisation_indy.4.option.1:0 "Wir werden eine Nation für alle Völker schmieden!"  #NT!
 generic_decolonisation_indy.4.option.2:0 "Es lebe die Sache [SCOPE.sCulture('preferred_culture').GetName]!"  #NT!
  
