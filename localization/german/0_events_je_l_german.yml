 espionage_election_interference.t:0 "Gelegenheit zur Wahleinmischung in [SCOPE.sCountry('espionage_target').GetName]"  #NT!
 espionage_election_interference.d:0 "[SCOPE.sCountry('espionage_attacker').GetAdjective] Agenten, die in [SCOPE.sCountry('espionage_target').GetName] tätig sind, haben eine Gelegenheit gefunden, den Wahlkampf der Regierungspartei der [SCOPE.sCountry('espionage_target').GetAdjective] Regierung zu untergraben. Sie schlagen vor, eine Reihe unbegründeter Behauptungen über die Regierungspartei unter der [SCOPE.sCountry('espionage_target').GetAdjective]-Wählerschaft zu verbreiten, um ihren Ruf zu schädigen. Diese verdeckte Operation sollte die Wahldynamik einer beliebigen Partei in der [SCOPE.sCountry('espionage_target').GetAdjective]-Regierung verringern."  #NT!
