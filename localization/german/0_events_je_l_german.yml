 create_space_agency_decision_desc:0 "Unter Weltraumforschung versteht man den Einsatz von Astronomie und Weltraumtechnologie zur Erforschung des Weltraums. Während die Erforschung des Weltraums derzeit hauptsächlich von Astronomen mit Teleskopen durchgeführt wird, erfolgt die physische Erforschung sowohl durch unbemannte Roboter-Raumsonden als auch durch bemannte Raumflüge."  #NT!
  
