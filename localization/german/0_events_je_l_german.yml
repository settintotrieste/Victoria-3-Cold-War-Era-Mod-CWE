 the_troubles_custom_name:0 "Die Probleme"  #NT!
 the_troubles_custom_desc:0 "Die Unruhen waren ein ethnonationalistischer Konflikt in Nordirland, der etwa 30 Jahre lang, von den späten 1960er Jahren bis 1998, andauerte. Ein zentrales Thema war der Status Nordirlands. Unionisten und Loyalisten, die aus historischen Gründen überwiegend Protestanten aus Ulster waren, wollten, dass Nordirland im Vereinigten Königreich verbleibt. Irische Nationalisten und Republikaner, die größtenteils irische Katholiken waren, wollten, dass Nordirland das Vereinigte Königreich verlässt und sich einem vereinten Irland anschließt. Obwohl sich die Unruhen größtenteils in Nordirland ereigneten, schwappte die Gewalt zeitweise auch auf Teile der Republik Irland, Englands und des europäischen Festlandes über."  #NT!
 blm_custom_name:0 "Das Erbe der Sklaverei"  #NT!
 blm_custom_desc:0 "Von der Ankunft der ersten Afrikaner in der frühen Kolonialzeit bis nach dem Amerikanischen Bürgerkrieg waren die meisten Afroamerikaner versklavt. Sogar freie Afroamerikaner waren vor und nach dem Bürgerkrieg mit Einschränkungen ihrer politischen, sozialen und wirtschaftlichen Freiheiten konfrontiert und waren Lynchmorden, Segregation, Black Codes, Jim-Crow-Gesetzen und anderen Formen der Diskriminierung ausgesetzt. Dank der Bürgerrechtsbewegung wurde formelle Rassendiskriminierung nach und nach von der Bundesregierung verboten und von weiten Teilen der amerikanischen Gesellschaft zunehmend als sozial und moralisch inakzeptabel empfunden. Trotzdem ist Rassismus gegen schwarze Amerikaner in den USA nach wie vor weit verbreitet und spiegelt sich weiterhin in sozioökonomischer Ungleichheit wider."  #NT!
 years_of_lead_custom_name:0 "Die Jahre des Bleis"  #NT!
 years_of_lead_custom_desc:0 "Der Ausdruck „Years of Lead“ bezieht sich auf eine Zeit politischer Gewalt und sozialer Unruhen im Jahr [ROOT.GetCountry.GetName], die durch eine Welle sowohl links- als auch rechtsextremer Vorfälle von politischem Terrorismus und gewalttätigen Zusammenstößen gekennzeichnet war."  #NT!
 naxalite_insurgency_custom_name:0 "Der naxalitisch-maoistische Aufstand"  #NT!
 naxalite_insurgency_custom_desc:0 "Der naxalitisch-maoistische Aufstand ist ein anhaltender Konflikt zwischen maoistischen Gruppen, die als Naxaliten oder Naxals bekannt sind (eine Gruppe von Kommunisten, die die politische Stimmung und Ideologie der Maoisten unterstützen) und der indischen Regierung. Die Naxaliten haben häufig Polizisten und Regierungsmitarbeiter ins Visier genommen, um angeblich für bessere Landrechte und mehr Arbeitsplätze für vernachlässigte Landarbeiter und die Armen zu kämpfen."  #NT!
 tamil_tigers_insurgency_custom_name:0 "Der Aufstand der Tamil Tigers"  #NT!
 tamil_tigers_insurgency_custom_desc:0 "Die Liberation Tigers of Tamil Eelam waren eine tamilische militante Organisation mit Sitz im Nordosten Sri Lankas. Aufgrund der anhaltenden Diskriminierung und gewaltsamen Verfolgung srilankischer Tamilen durch die singhalesisch dominierte srilankische Regierung kämpfte die LTTE für die Schaffung eines unabhängigen tamilischen Staates namens Tamil Eelam im Nordosten der Insel."  #NT!
 communist_insurgency_custom_name:0 "Der [ROOT.GetCountry.GetAdjectiveNoFlag] kommunistische Aufstand"  #NT!
 communist_insurgency_custom_desc:0 "Die Kommunistische Partei [ROOT.GetCountry.GetAdjectiveNoFlag] hat der [concept_government] den Krieg erklärt mit dem Ziel, sie zu stürzen und eine Sozialistische Republik zu errichten."  #NT!
 generic_insurgency_custom_name:0 "Der [ROOT.GetCountry.GetAdjectiveNoFlag]-Aufstand"  #NT!
 generic_insurgency_custom_desc:0 "Radikale Elemente in der [ROOT.GetCountry.GetAdjective]-Gesellschaft haben es sich zur Aufgabe gemacht, die [concept_government] mit Gewalt zu stürzen."  #NT!
 theocratic_insurgency_custom_name:0 "Der Krieg gegen den Terror"  #NT!
 theocratic_insurgency_custom_desc:0 "Der Krieg gegen den Terror ist eine militärische Kampagne zur Unterdrückung religiöser Extremisten in [ROOT.GetCountry.GetName]. Diese Extremisten streben danach, die [concept_government] zu stürzen und einen theokratischen Staat zu errichten."  #NT!
  
