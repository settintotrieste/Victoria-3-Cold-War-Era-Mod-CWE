 warsaw_pact_member:0 "Mitglied des Warschauer Paktes"  #NT!
 warsaw_pact_leader:0 "Führer des Warschauer Paktes"  #NT!
 form_warsaw_pact_decision:0 "Bilden Sie den Warschauer Pakt"  #NT!
 form_warsaw_pact_decision_desc:0 "Der Warschauer Pakt, offiziell der Vertrag über Freundschaft, Zusammenarbeit und gegenseitigen Beistand, war ein kollektiver Verteidigungsvertrag, der im Mai 1955 während des Kalten Krieges in Warschau, Polen, zwischen der Sowjetunion und sieben anderen sozialistischen Ostblockrepubliken Mittel- und Osteuropas unterzeichnet wurde. Der Begriff „Warschauer Pakt“ bezieht sich im Allgemeinen sowohl auf den Vertrag selbst als auch auf das daraus resultierende Verteidigungsbündnis, die Organisation des Warschauer Vertrags (WTO). Der Warschauer Pakt war die militärische und wirtschaftliche Ergänzung zum Rat für gegenseitige Wirtschaftshilfe (Comecon), der regionalen Wirtschaftsorganisation für die Ostblockstaaten Mittel- und Osteuropas. Der von der Sowjetunion dominierte Warschauer Pakt wurde als Machtgleichgewicht bzw. Gegengewicht zur Nordatlantikpakt-Organisation (NATO) und dem Westblock gegründet."  #NT!
 join_warsaw_pact_decision:0 "Treten Sie dem Warschauer Pakt bei"  #NT!
