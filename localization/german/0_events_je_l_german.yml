 je_reserved_powers:0 "Die [SCOPE.GetRootScope.GetCountry.GetCustom('government_ceremonial_body_custom_title')]"  #NT!
 je_reserved_powers_reason:0 "Gemäß der Verfassung von [ROOT.GetCountry.GetName] hat der [SCOPE.GetRootScope.GetCountry.GetCustom('government_ceremonial_body_custom_title')] ein begrenztes Vetorecht über alle im [SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')] verabschiedeten Gesetzentwürfe. Obwohl die [SCOPE.GetRootScope.GetCountry.GetCustom('government_ceremonial_body_custom_title')] ein Veto gegen das Gesetz einlegen kann, kann das Veto später durch eine Mehrheitsentscheidung in der [SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')] aufgehoben werden.\n\n#BOLD [SCOPE.GetRootScope.GetCountry.GetCustom('government_ceremonial_ruler_custom_title')]: #! [SCOPE.sCharacter('ceremonial_head_of_state').GetFullName] ([SCOPE.sCharacter('ceremonial_head_of_state').GetInterestGroup.GetName]) \n\nHinweis: Die [SCOPE.GetRootScope.GetCountry.GetCustom('government_ceremonial_ruler_custom_title')] wird ein Veto gegen alle Gesetze einlegen, die von der [SCOPE.GetRootScope.GetCountry.GetCustom('government_ceremonial_body_custom_title')]1 erlassen werden, wenn die [SCOPE.sCharacter('ceremonial_head_of_state').GetInterestGroup.GetName] missbilligt das Gesetz entweder oder lehnt es entschieden ab. \n\nHinweis: Dieser [SCOPE.GetRootScope.GetCountry.GetCustom('government_ceremonial_body_custom_title')]3 kann durch Aufhebung des [SCOPE.GetRootScope.GetCountry.GetCustom('government_ceremonial_body_custom_title')]4 [SCOPE.GetRootScope.GetCountry.GetCustom('government_ceremonial_body_custom_title')]5 entfernt werden."  #NT!
  
