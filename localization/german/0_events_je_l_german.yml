 je_central_bank_reason:0 "Die [SCOPE.GetRootScope.GetCountry.GetCustom('central_bank_name_custom_title')] ist die Zentralbank von [ROOT.GetCountry.GetName]. \n\nZentralbanken nutzen die Geldpolitik, um wirtschaftliche Schwankungen zu bewältigen und Preisstabilität zu erreichen, was bedeutet, dass die Inflation niedrig und stabil ist. Zentralbanken führen ihre Geldpolitik durch, indem sie die Geldmenge anpassen, in der Regel durch den Kauf oder Verkauf von Wertpapieren auf dem freien Markt. Offenmarktgeschäfte wirken sich auf die kurzfristigen Zinssätze aus, die wiederum die längerfristigen Zinssätze und die Wirtschaftstätigkeit beeinflussen. Wenn die Zentralbanken die Zinsen senken, wird die Geldpolitik gelockert. Wenn sie die Zinsen erhöhen, wird die Geldpolitik gestrafft. \n\nAktueller Zinssatz: [SCOPE.GetRootScope.GetCountry.GetCustom('central_bank_current_monetary_policy_custom_title')] \n\nAngemessener $lawgroup_monetary_policy$: [SCOPE.GetRootScope.GetCountry.GetCustom('central_bank_appropriate_monetary_policy_custom_title')] \n\nDurchschnittlicher Kern [concept_market_price] des aktuellen Monats: [GetPlayer.MakeScope.Var('core_interest_rate_now').GetValue] % \n\nDurchschnittlicher Kern [concept_market_price] des Vormonats: [GetPlayer.MakeScope.Var('core_interest_rate_prev').GetValue] % \n\nZur Berechnung des Kerns [concept_market_price] verwendete Güter ([ROOT.GetCountry.GetName]0 verfügbar): [ROOT.GetCountry.GetName]1 [ROOT.GetCountry.GetName]2 [ROOT.GetCountry.GetName]3 [ROOT.GetCountry.GetName]4 [ROOT.GetCountry.GetName]5 [ROOT.GetCountry.GetName]6 [ROOT.GetCountry.GetName]7 [ROOT.GetCountry.GetName]8 [ROOT.GetCountry.GetName]9 [SCOPE.GetRootScope.GetCountry.GetCustom('central_bank_current_monetary_policy_custom_title')]0 [SCOPE.GetRootScope.GetCountry.GetCustom('central_bank_current_monetary_policy_custom_title')]1 [SCOPE.GetRootScope.GetCountry.GetCustom('central_bank_current_monetary_policy_custom_title')]2 [SCOPE.GetRootScope.GetCountry.GetCustom('central_bank_current_monetary_policy_custom_title')]3 [SCOPE.GetRootScope.GetCountry.GetCustom('central_bank_current_monetary_policy_custom_title')]4 [SCOPE.GetRootScope.GetCountry.GetCustom('central_bank_current_monetary_policy_custom_title')]5 [SCOPE.GetRootScope.GetCountry.GetCustom('central_bank_current_monetary_policy_custom_title')]6 [SCOPE.GetRootScope.GetCountry.GetCustom('central_bank_current_monetary_policy_custom_title')]7 [SCOPE.GetRootScope.GetCountry.GetCustom('central_bank_current_monetary_policy_custom_title')]8"  #NT!
