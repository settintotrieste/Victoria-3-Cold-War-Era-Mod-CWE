 je_bretton_woods_system_member.4.tt:0 "Dieses Land ist kein Juniorpartner eines [concept_currency_union]"  #NT!
 je_bretton_woods_system_member:0 "Das Bretton-Woods-System"  #NT!
 je_bretton_woods_system_member_reason:0 "Unter der Leitung von [SCOPE.sCountry('bretton_woods_system_leader').GetName] ist das Bretton-Woods-System eine vollständig ausgehandelte Währungsordnung, die die Währungsbeziehungen zwischen unabhängigen Staaten regeln soll. Das Bretton-Woods-System verpflichtete die Länder, die Konvertierbarkeit ihrer Währungen in [SCOPE.sCountry('bretton_woods_system_leader').GetAdjectiveNoFlag] Dollar mit einer Genauigkeit von 1 % des festen Paritätskurses zu garantieren, wobei der Dollar für ausländische Regierungen und Zentralbanken zu einem festgelegten Betrag pro Feinunze Feingold in Goldbarren umgewandelt werden kann.\n\nDie Wirkung dieses Systems besteht darin, dass der $lawgroup_monetary_policy$ aller Länder mit $law_semi_gold_standard$ das Gegenteil von dem ist, was [SCOPE.sCountry('bretton_woods_system_leader').GetName] hat."  #NT!
 je_bretton_woods_system_member_status:0 "Unterzeichner: [GetPlayer.MakeScope.Var('bretton_woods_total_members').GetValue]"  #NT!
  
 je_perestroika:0 "Perestroika"  #NT!
 je_perestroika_reason:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [SCOPE.sCharacter('perestroika_ruler').GetFullName], ein demokratisches [concept_ruler], hat einen mutigen Plan für [ROOT.GetCountry.GetName] vorgestellt: Das Land soll in ein $gov_soviet_republic$ reformiert werden, in dem die vollständig zentralisierte Wirtschaftsplanung abgeschafft und politische Beschränkungen gelockert werden. Zu diesem Zweck zielt [SCOPE.sCharacter('perestroika_ruler').GetFullName] darauf ab, [Concept('concept_law', '$concept_laws$')] zu erlassen, das dieses neue Arbeiterparadies schaffen wird.\n\nBeachten Sie, dass die kommunistischen Hardliner in [ROOT.GetCountry.GetName] mit diesem Plan nicht zufrieden sein werden und sich für die Entfernung von [SCOPE.sCharacter('perestroika_ruler').GetFullName] einsetzen werden."  #NT!
  
 icj_judgement_winner.t:0 "Positives Urteil des Internationalen Gerichtshofs"  #NT!
 icj_judgement_winner.d:0 "Der Internationale Gerichtshof hat im Territorialschiedsverfahren [SCOPE.sCountry('icj_judgement_winner').GetNameNoFlag] gegen [SCOPE.sCountry('icj_judgement_loser').GetNameNoFlag] zugunsten von [SCOPE.sCountry('icj_judgement_winner').GetName] entschieden und festgestellt, dass die umstrittenen [concept_homeland] in [SCOPE.sCountry('icj_judgement_loser').GetName] zu Recht und ausschließlich [SCOPE.sCountry('icj_judgement_winner').GetAdjective] sind. Das Gericht hat daher [SCOPE.sCountry('icj_judgement_loser').GetName] angewiesen, sie an [SCOPE.sCountry('icj_judgement_winner').GetName] zurückzugeben."  #NT!
 icj_judgement_winner.f:0 "[SCOPE.sCountry('icj_judgement_loser').GetName] wird keine Heimatländer in allen [SCOPE.sCountry('icj_judgement_winner').GetAdjective] & [SCOPE.sCountry('icj_judgement_loser').GetAdjective] Heimatländern verlieren, die es besitzt. [SCOPE.sCountry('icj_judgement_loser').GetName] hat nun die Möglichkeit zu wählen, ob diese Zustände zurückgegeben werden sollen."  #NT!
 icj_judgement_winner.option:0 "Gerechtigkeit wird geliefert!"  #NT!
  
 icj_judgement_loser_target.t:0 "Ungünstiges Urteil des Internationalen Gerichtshofs"  #NT!
 icj_judgement_loser_target.d:0 "Der Internationale Gerichtshof hat im Territorialschiedsverfahren [SCOPE.sCountry('icj_judgement_winner').GetNameNoFlag] gegen [SCOPE.sCountry('icj_judgement_loser').GetNameNoFlag] zugunsten von [SCOPE.sCountry('icj_judgement_winner').GetName] entschieden und festgestellt, dass die umstrittenen [concept_homeland] in [SCOPE.sCountry('icj_judgement_loser').GetName] zu Recht und ausschließlich [SCOPE.sCountry('icj_judgement_winner').GetAdjective] sind. Das Gericht hat daher [SCOPE.sCountry('icj_judgement_loser').GetName] angewiesen, sie an [SCOPE.sCountry('icj_judgement_winner').GetName] zurückzugeben."  #NT!
 icj_judgement_loser_target.f:0 "[SCOPE.sCountry('icj_judgement_loser').GetName] wird keine Heimatländer in allen Heimatländern [SCOPE.sCountry('icj_judgement_winner').GetAdjective] und [SCOPE.sCountry('icj_judgement_loser').GetAdjective] verlieren, wenn es sich dafür entscheidet, sie an [SCOPE.sCountry('icj_judgement_winner').GetName] zurückzugeben."  #NT!
 icj_judgement_loser.option.1:0 "Wir akzeptieren das Urteil des Gerichts"  #NT!
 icj_judgement_loser.option.2:0 "Das Gericht hatte Unrecht!"  #NT!
  
 icj_judgement_rejection.t:0 "[SCOPE.sCountry('icj_judgement_loser').GetName] lehnt Urteil des Internationalen Gerichtshofs ab"  #NT!
 icj_judgement_rejection.d:0 "[SCOPE.sCountry('icj_judgement_loser').GetName] hat sich geweigert, das Urteil des Internationalen Gerichtshofs zugunsten von [SCOPE.sCountry('icj_judgement_winner').GetName] anzuerkennen. Sie behaupten, dass die Richter bei der Anwendung des Völkerrechts voreingenommen und falsch gewesen seien und ihr Urteil daher von [SCOPE.sCountry('icj_judgement_loser').GetName] nicht anerkannt werde."  #NT!
 icj_judgement_rejection.f:0 "[SCOPE.sCountry('icj_judgement_loser').GetName] behält seine Heimatländer in allen [SCOPE.sCountry('icj_judgement_winner').GetAdjective] und [SCOPE.sCountry('icj_judgement_loser').GetAdjective] Heimatländern, die es besitzt."  #NT!
 icj_judgement_rejection.option:0 "Das Völkerrecht ist ein Witz"  #NT!
  
 icj_judgement_loser.t:0 "Ungünstiges Urteil des Internationalen Gerichtshofs"  #NT!
 icj_judgement_loser.d:0 "Der Internationale Gerichtshof hat im Territorialschiedsverfahren [SCOPE.sCountry('icj_judgement_winner').GetName] gegen [SCOPE.sCountry('icj_judgement_loser').GetName] zugunsten von [SCOPE.sCountry('icj_judgement_winner').GetName] entschieden und festgestellt, dass die umstrittenen [concept_homeland] in [SCOPE.sCountry('icj_judgement_winner').GetName] zu Recht und ausschließlich [SCOPE.sCountry('icj_judgement_winner').GetAdjective] sind. Das Gericht hat daher keine Änderungen der Grenzen zwischen diesen beiden Ländern angeordnet."  #NT!
 icj_judgement_loser.f:0 "[SCOPE.sCountry('icj_judgement_loser').GetName] wird keine Heimatländer in allen [SCOPE.sCountry('icj_judgement_winner').GetAdjective] & [SCOPE.sCountry('icj_judgement_loser').GetAdjective] Heimatländern verlieren, die [SCOPE.sCountry('icj_judgement_winner').GetName] besitzt."  #NT!
  
 won_a_war.t:0 "Einen Krieg gewonnen"  #NT!
 won_a_war.d:0 "[ROOT.GetCountry.GetName] hat in einem Krieg gesiegt, in den es verwickelt war. Das Volk von [ROOT.GetCountry.GetAdjectiveNoFlag] jubelt und lobt die Führung von [SCOPE.sCharacter('war_ruler_scope').GetFullName] und General [SCOPE.sCharacter('supreme_commander_scope').GetFullName]!"  #NT!
 won_a_war.f:0 "Dieses Ereignis wurde ausgelöst, weil [ROOT.GetCountry.GetName] ein [concept_war_goal] in einem [concept_war] erzwungen hat."  #NT!
 won_a_war.option:0 "Exzellent!"  #NT!
  
 lost_a_war.t:0 "Einen Krieg verloren"  #NT!
 lost_a_war.d:0 "[ROOT.GetCountry.GetName] wurde in einem Krieg besiegt, an dem es beteiligt war. Die Leute von [ROOT.GetCountry.GetAdjectiveNoFlag] sind wütend und geben der Führung von [SCOPE.sCharacter('war_ruler_scope').GetFullName] und General [SCOPE.sCharacter('supreme_commander_scope').GetFullName] die Schuld für die beschämende Niederlage!"  #NT!
 lost_a_war.f:0 "Dieses Ereignis wurde ausgelöst, weil [ROOT.GetCountry.GetName] in einem [concept_war] kapitulierte."  #NT!
 lost_a_war.option:0 "Es ist, was es ist."  #NT!
  
 inconclusive_war.t:0 "Der Krieg ist vorbei"  #NT!
 inconclusive_war.d:0 "[ROOT.GetCountry.GetName] hat in einem Krieg, in den es verwickelt war, viel Blut und Schätze vergossen, aber persönlich nichts daraus gemacht. Das Volk von [ROOT.GetCountry.GetAdjectiveNoFlag] ist unglücklich darüber, dass sein Land einen Krieg zum Wohle anderer geführt hat, und kritisiert die Führung von [SCOPE.sCharacter('war_ruler_scope').GetFullName] und General [SCOPE.sCharacter('supreme_commander_scope').GetFullName] für diesen sinnlosen Krieg!"  #NT!
 inconclusive_war.f:0 "Dieses Ereignis wurde ausgelöst, weil [ROOT.GetCountry.GetName] in einem [concept_war] weder kapituliert noch zu [ROOT.GetCountry.GetName] gehörende [concept_war_goal] erzwungen hat."  #NT!
 inconclusive_war.option:0 "Wir haben unser Bestes gegeben..."  #NT!
  
 won_a_war_event.tt:0 "Regierungs- und Militärfiguren werden immer beliebter"  #NT!
 lost_a_war_event.tt:0 "Regierungs- und Militärfiguren verlieren an Popularität"  #NT!
  
