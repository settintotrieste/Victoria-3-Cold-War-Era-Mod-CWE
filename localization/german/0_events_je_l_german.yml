 je_join_superstate_free_trade_zone_button:0 "Treten Sie dem Gemeinsamen Markt bei"  #NT!
 je_join_superstate_free_trade_zone_button_desc:0 "Ein Gemeinsamer Markt wird üblicherweise als erste Stufe zur Schaffung eines [concept_customs_union] bezeichnet. Es basiert normalerweise auf einer Freihandelszone ohne Zölle auf Waren und mit relativ freiem Kapital-, Arbeitskräfte- und Dienstleistungsverkehr, ist jedoch beim Abbau anderer Handelshemmnisse nicht so weit fortgeschritten. \n\nDies wird im Spiel durch die Schaffung eines [concept_trade_privilege] und $transit_rights$ [concept_treaty] zwischen allen Ländern dargestellt, die die gleichen Superstaat-Ambitionen teilen und sich für den Beitritt zum Superstaat-Gemeinsamen Markt entschieden haben."  #NT!
  
 je_leave_superstate_free_trade_zone_button:0 "Verlassen Sie den Gemeinsamen Markt"  #NT!
 je_leave_superstate_free_trade_zone_button_desc:0 "Ein Gemeinsamer Markt wird üblicherweise als erste Stufe zur Schaffung eines [concept_customs_union] bezeichnet. Es basiert normalerweise auf einer Freihandelszone ohne Zölle auf Waren und mit relativ freiem Kapital-, Arbeitskräfte- und Dienstleistungsverkehr, ist jedoch beim Abbau anderer Handelshemmnisse nicht so weit fortgeschritten. \n\nDies wird im Spiel durch die Schaffung eines [concept_trade_privilege] und $transit_rights$ [concept_treaty] zwischen allen Ländern dargestellt, die die gleichen Superstaat-Ambitionen teilen und sich für den Beitritt zum Superstaat-Gemeinsamen Markt entschieden haben."  #NT!
  
 je_join_superstate_customs_union_button:0 "Treten Sie dem Binnenmarkt bei"  #NT!
 je_join_superstate_customs_union_button_desc:0 "Ein Binnenmarkt ist die letzte Stufe und das ultimative Ziel einer integrierten regionalen Wirtschaft. Es erfordert den völlig freien Waren-, Dienstleistungs- (einschließlich Finanzdienstleistungen), Kapital- und Personenverkehr ohne Rücksicht auf nationale Grenzen. \n\nDies wird im Spiel durch die Schaffung einer [concept_customs_union] zwischen allen Ländern dargestellt, die die gleichen Superstate-Ambitionen teilen und sich für den Beitritt zur Superstate-Zollunion entschieden haben."  #NT!
  
 je_leave_superstate_customs_union_button:0 "Verlassen Sie den Binnenmarkt"  #NT!
 je_leave_superstate_customs_union_button_desc:0 "Ein [concept_customs_union] ist die letzte Stufe und das ultimative Ziel eines Binnenmarktes. Es erfordert den völlig freien Waren-, Dienstleistungs- (einschließlich Finanzdienstleistungen), Kapital- und Personenverkehr ohne Rücksicht auf nationale Grenzen. \n\nDies wird im Spiel durch die Schaffung einer [concept_customs_union] zwischen allen Ländern dargestellt, die die gleichen Superstate-Ambitionen teilen und sich für den Beitritt zur Superstate-Zollunion entschieden haben."  #NT!
  
