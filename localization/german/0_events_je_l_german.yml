 power_vacuum.t:0 "Machtvakuum in [ROOT.GetCountry.GetNameNoFlag]"  #NT!
 power_vacuum.d:0 "Der vorherige [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] von [ROOT.GetCountry.GetNameNoFlag] war ein starker Diktator, der das Land als unangefochtener Autokrat regierte. Der Sturz des Diktators hat jedoch diesen eisernen Deckel für abweichende Meinungen entfernt und ein Machtvakuum ausgelöst, das das Land stark destabilisiert. Verschiedene Fraktionen nutzen die Situation nun aus, um um mehr Macht zu kämpfen oder sogar die Regierung ganz zu stürzen. Es wird einige Zeit dauern, bis [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [ROOT.GetCountry.GetRuler.GetFullName] die verfeindeten Stämme zähmen und den politischen Sumpf beenden kann."  #NT!
