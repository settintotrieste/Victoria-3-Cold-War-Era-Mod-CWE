 je_bretton_woods_system_leader:0 "Das Bretton-Woods-System"  #NT!
 je_bretton_woods_system_leader_reason:0 "Unter der Leitung von [SCOPE.sCountry('bretton_woods_system_leader').GetName] ist das Bretton-Woods-System eine vollständig ausgehandelte Währungsordnung, die die Währungsbeziehungen zwischen unabhängigen Staaten regeln soll. Das Bretton-Woods-System verpflichtete die Länder, die Konvertierbarkeit ihrer Währungen in [SCOPE.sCountry('bretton_woods_system_leader').GetAdjectiveNoFlag] Dollar mit einer Abweichung von 1 % des festen Paritätskurses zu garantieren, wobei der Dollar für ausländische Regierungen und Zentralbanken zu einem festgelegten Betrag pro Feinunze Feingold in Goldbarren umgewandelt werden konnte.\n\nDie Wirkung dieses Systems besteht darin, dass der $lawgroup_monetary_policy$ aller Länder mit $law_semi_gold_standard$ das Gegenteil von dem ist, was [ROOT.GetCountry.GetName] hat."  #NT!
