 cabinet_minister_resigns.d:0 "[SCOPE.gsInterestGroup('angry_cabinet_ig').GetLeader.GetFullName] aus [SCOPE.gsInterestGroup('angry_cabinet_ig').GetName] ist aus [SCOPE.GetRootScope.GetCountry.GetCustom('cabinet_name_custom_title')] unter Berufung auf grundlegende und unüberbrückbare Differenzen mit [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [ROOT.GetCountry.GetRuler.GetFullName] zurückgetreten. Dies hat den [concept_government] politisch geschadet."  #NT!
