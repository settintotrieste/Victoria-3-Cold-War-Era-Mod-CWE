 je_one_party_system:0 "Das [ROOT.GetCountry.GetAdjectiveNoFlag] Zentralkomitee"  #NT!
 je_one_party_system_reason:0 "Es gibt nur eine legale [concept_party] in [ROOT.GetCountry.GetName], die Regierungspartei. Ungeachtet dessen gibt es im Zentralkomitee der Regierungspartei mehrere Fraktionen, die Einfluss auf die ideologische Ausrichtung der Regierungspartei ausüben. Dies geschieht, um zu bestimmen, wer der nächste Parteivorsitzende und damit der [concept_ruler] des Landes sein würde. \n\nDas Zentralkomitee besteht aus drei Fraktionen: den Radikalen, den Gemäßigten und den Reformisten. Diese Fraktionen wetteifern alle um die Führung der Partei und des Landes. \n\nWelche Fraktion dominiert, hängt vom $Party_Radicalism$ des Zentralkomitees ab. Wenn $Party_Radicalism$ über 60 % liegt, haben die Radikalen das Sagen, wenn $Party_Radicalism$ zwischen 40 und 60 % liegt, haben die Gemäßigten das Sagen, und wenn $Party_Radicalism$ unter 40 % liegt, haben die Reformisten das Sagen. Die dominierende Fraktion hat eine viel höhere Chance, über die nächsten [concept_ruler] [concept_ideology] zu entscheiden. \n\nParteivorsitzender: [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [ROOT.GetCountry.GetName]0 \n\nHinweis: $Party_Radicalism$ steigt, wenn [ROOT.GetCountry.GetName]2 den Höchstwert [ROOT.GetCountry.GetName]3 hat, und verringert sich, wenn [ROOT.GetCountry.GetName] den Höchstwert [ROOT.GetCountry.GetName]5 hat. \n\nHinweis: $Party_Radicalism$ erhöht die Chance, dass ein [ROOT.GetCountry.GetName]7 autokratischerer[ROOT.GetCountry.GetName]8 [concept_ruler] ausgewählt wird."  #NT!
  
 je_party_system:0 "Die [SCOPE.sParty('ruling_party_scope').GetName]"  #NT!
 je_party_system_reason:0 "Das [SCOPE.sParty('ruling_party_scope').GetName] ist das herrschende [concept_party] von [ROOT.GetCountry.GetName]. Als Teil des Parteiensystems wählt die Partei ihren Anführer und damit auch die [concept_ruler] des Landes. \n\nDie [SCOPE.sParty('ruling_party_scope').GetName] besteht aus drei Fraktionen: den Radikalen, den Moderaten und den Reformisten. Diese Fraktionen wetteifern alle um die Führung der Partei und des Landes. \n\nWelche Fraktion dominiert, hängt von $Party_Radicalism$ der [SCOPE.sParty('ruling_party_scope').GetName] ab. Wenn $Party_Radicalism$ über 60 % liegt, haben die Radikalen das Sagen, wenn $Party_Radicalism$ zwischen 40 und 60 % liegt, haben die Gemäßigten das Sagen, und wenn $Party_Radicalism$ unter 40 % liegt, haben die Reformisten das Sagen. Die dominierende Fraktion hat eine viel höhere Chance, über die nächsten [concept_ruler] [concept_party]1 zu entscheiden. \n\nParteivorsitzender: [concept_party]2 [concept_party]3 \n\nHinweis: $Party_Radicalism$ erhöht sich, wenn die dominante [concept_party]5 [concept_party]6 ein Tief von [concept_party]7 hat oder die [concept_party]5 ein Tief von [concept_party]9 hat. $Party_Radicalism$ nimmt ab, wenn die dominante [concept_party]5 [concept_party]6 ein Hoch von [concept_party]7 und die [concept_party]5 ein Hoch von [concept_party]9 hat. \n\nHinweis: $Party_Radicalism$ erhöht die Chance, dass ein [ROOT.GetCountry.GetName]7 autokratischerer[ROOT.GetCountry.GetName]8 [concept_ruler] ausgewählt wird."  #NT!
  
