 je_private_media_system:0 "Die [ROOT.GetCountry.GetAdjectiveNoFormatting]-Medien"  #NT!
 je_private_media_system_reason:0 "Die Medienbranche in [ROOT.GetCountry.GetName] wird von einem Konsortium großer privater Nachrichtensender dominiert, die gemeinsam die Verbreitung aller Nachrichten im Land monopolisieren. Dies gibt den Eigentümern dieser Nachrichtennetzwerke, [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetNameWithCountryVariant] und [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetNameWithCountryVariant], großen Einfluss auf die Herzen und Gedanken der [ROOT.GetCountry.GetAdjective]-Leute. \n\nEs ist daher wichtig, die Loyalität der privaten Medien zu gewinnen, wenn wir nicht wollen, dass sie ihren Einfluss gegen die [concept_government] ausüben. \n\n@Warnung! Die Medien werden etwas unternehmen, um die [concept_government] entweder zu steigern (wenn Private Media Loyalty mindestens 50 % loyal ist) oder zu schwächen (wenn Private Media Loyalty weniger als 50 % loyal ist), wenn der Fortschrittsbalken 100 % erreicht. \n\nHinweis: #y Private Media Loyalty#! erhöht sich, wenn die Zustimmung von [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetNameWithCountryVariant] und [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetNameWithCountryVariant] mindestens neutral ist, und nimmt ab, wenn dieselben Interessengruppen eine negative Zustimmung haben oder wenn [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetNameWithCountryVariant] oder [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetNameWithCountryVariant] nicht in [concept_government] enthalten sind."  #NT!
  
