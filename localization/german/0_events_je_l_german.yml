 espionage_instigate_secessionist_movement_target.d:0 "Der [SCOPE.GetRootScope.GetCountry.GetCustom('secret_police_custom_title')] berichtet, dass [SCOPE.sCountry('suspected_espionage_attacker').GetAdjective] Spione nationalistische Gefühle im [SCOPE.sCountry('espionage_victim').GetAdjective] [Concept('concept_unincorporated_state','$concept_unincorporated_states$')] geschürt haben."  #NT!
