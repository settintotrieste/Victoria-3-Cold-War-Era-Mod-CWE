 je_warsaw_pact_system:0 "Der Warschauer Pakt"  #NT!
 je_warsaw_pact_system_reason:0 "Der Warschauer Pakt war ein kollektiver Verteidigungsvertrag, der im Mai 1955 während des Kalten Krieges in Warschau, Polen, zwischen der Sowjetunion und sieben anderen sozialistischen Ostblockrepubliken Mittel- und Osteuropas unterzeichnet wurde. Der Begriff „Warschauer Pakt“ bezieht sich im Allgemeinen sowohl auf den Vertrag selbst als auch auf das daraus resultierende Verteidigungsbündnis, die Organisation des Warschauer Vertrags. Der Warschauer Pakt war die militärische und wirtschaftliche Ergänzung zum Rat für gegenseitige Wirtschaftshilfe (Comecon), der regionalen Wirtschaftsorganisation für die Ostblockstaaten Mittel- und Osteuropas. \n\nAnführer: [SCOPE.sCountry('warsaw_pact_leader').GetName] \n\nHauptquartiere: #y [SCOPE.sCountry('warsaw_pact_leader').GetCapital.GetCityHubName]#!"  #NT!
