 conduct_self_coup_decision_desc:0 "Ein Selbstputsch ist eine Form des Staatsstreichs, bei dem das Oberhaupt einer Nation, nachdem es mit legalen Mitteln an die Macht gekommen ist, mit illegalen Mitteln an der Macht bleibt. \n\nDie [concept_ruler] wird entweder mit der [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetNameWithCountryVariant] oder der [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetNameWithCountryVariant] zusammenarbeiten, um einen Selbstputsch durchzuführen, um diktatorische Macht an sich zu reißen."  #NT!
  
