 bad_olympics.t:0 "[SCOPE.sCountry('recently_hosted_olympics').GetAdjectiveNoFlag] Olympische Spiele kritisiert"  #NT!
 bad_olympics.d:0 "Aufgrund von Budgetkürzungen und schwerwiegenden Planungsfehlern wurde nicht die gesamte erforderliche olympische Infrastruktur rechtzeitig für die Spiele fertiggestellt. Infolgedessen waren die Athleten gezwungen, unter minderwertigen Bedingungen zu trainieren. Dies hat dazu geführt, dass die Olympischen Spiele [SCOPE.sState('olympic_games_summit_location').GetCityHubName] weithin als schlecht gemanagt und als absolute Katastrophe verurteilt wurden."  #NT!
