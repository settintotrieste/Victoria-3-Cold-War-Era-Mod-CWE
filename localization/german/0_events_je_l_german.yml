 je_UN_system:0 "Die Vereinten Nationen"  #NT!
 je_UN_system_reason:0 "Die Vereinten Nationen (UN) sind eine zwischenstaatliche Organisation, deren erklärte Ziele darin bestehen, den Weltfrieden und die internationale Sicherheit zu wahren, freundschaftliche Beziehungen zwischen den Nationen zu entwickeln, internationale Zusammenarbeit zu erreichen und als Zentrum für die Harmonisierung der Aktionen der Nationen zu dienen. \n\nDie Vereinten Nationen haben sechs operative Hauptorganisationen: die Generalversammlung, den Sicherheitsrat, den Wirtschafts- und Sozialrat, den Internationalen Gerichtshof, das UN-Sekretariat und den Treuhandrat, obwohl der Treuhandrat seit 1994 inaktiv ist. \n\nDer oberste Verwaltungsbeamte der UN ist der Generalsekretär. \n\nGesamtzahl der UNSC-Mitglieder: [GetGlobalVariable('UN_unsc_members_counter').GetValue] \n\n$un_headquarters_country_label.tt$ \n\n$unsg_character_label.tt$"  #NT!
