 colonial_lose_pop.tt:0 "Jeder Nicht-[Concept('concept_primary_cultures','$concept_primary_culture$')]-Einwohner in [ROOT.GetCountry.GetName] und seine nicht-souveränen [Concept('concept_subject', '$concept_subjects$')] verlieren #r 0,50 %#! ihres Lebens"  #NT!
