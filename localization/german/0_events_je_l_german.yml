 request_imf_loan_decision:0 "Suchen Sie ein Darlehen des Internationalen Währungsfonds"  #NT!
 request_imf_loan_decision_desc:0 "Der IWF wurde 1944 nach der Weltwirtschaftskrise der 1930er Jahre mit dem Ziel gegründet, einen Rahmen für die internationale wirtschaftliche Zusammenarbeit zu schaffen. Der IWF vergibt Kredite – einschließlich Notkredite – an Mitgliedsländer, die tatsächliche oder potenzielle Zahlungsbilanzprobleme haben. Ziel ist es, ihnen dabei zu helfen, ihre internationalen Reserven wieder aufzubauen, ihre Währungen zu stabilisieren, weiterhin für Importe zu bezahlen und die Bedingungen für ein starkes Wirtschaftswachstum wiederherzustellen und gleichzeitig die zugrunde liegenden Probleme zu beheben."  #NT!
 IMF_loan_request.t:0 "Am Darlehen des IWF an [SCOPE.sCountry('imf_loan_debtor').GetName] teilnehmen?"  #NT!
 IMF_loan_request.d:0 "[SCOPE.sCountry('imf_loan_debtor').GetName] hat derzeit ernsthafte Schwierigkeiten, seine Zahlungsbilanz zu decken. Aus diesem Grund haben sich die Diplomaten an den Internationalen Währungsfonds der Vereinten Nationen gewandt und um einen Kredit gebeten, um das Land bei der Tilgung seiner derzeit ausstehenden Schulden zu unterstützen. Da die Ressourcen des IWF hauptsächlich aus dem Geld stammen, das die Länder als Kapitalzeichnung (Quoten) zahlen, wenn sie Mitglied werden, wurde [SCOPE.sCountry('imf_loan_creditor').GetName] aufgefordert, Mittel für [SCOPE.sCountry('imf_loan_debtor').GetName] bereitzustellen."  #NT!
 IMF_loan_request.f:0 "Die Entscheidung, [SCOPE.sCountry('imf_loan_debtor').GetName] ein Darlehen zu gewähren, führt dazu, dass [ROOT.GetCountry.GetName] entweder 5 % von [SCOPE.sCountry('imf_loan_debtor').GetName]s [Concept('concept_credit','$concept_credit_debt$')] im Austausch für [concept_obligation] übernimmt oder [Concept('concept_bankroll','$concept_bankrolling$')] [SCOPE.sCountry('imf_loan_debtor').GetName] startet."  #NT!
 imf_loan_option.1:0 "Wir werden ihnen einen Kredit gewähren."  #NT!
 imf_loan_option.2:0 "Wir sind selbst finanziell herausgefordert..."  #NT!
 imf_loan_option.3:0 "Stören Sie mich nicht mehr mit dieser Veranstaltung!"  #NT!
  
 IMF_loan_terms.t:0 "Wirtschaftsreformen des IWF"  #NT!
 IMF_loan_terms.d:0 "Eine Bedingung der Darlehensvereinbarung zwischen dem IWF und [SCOPE.sCountry('imf_loan_debtor').GetName] ist, dass der Schuldner eine umfassende Reform seines Wirtschaftssystems durchführt, um freie Märkte und zurückhaltende Staatsausgaben zu fördern. Die Regierung von [SCOPE.sCountry('imf_loan_debtor').GetName] ist daher verpflichtet, Gesetze zu verabschieden, um ihre Märkte für die Welt zu öffnen, ihre staatlichen Unternehmen zu privatisieren und das Gelddrucken einzudämmen."  #NT!
 IMF_loan_terms.f:0 "Dieses Ereignis wurde ausgelöst, weil wir die Anforderungen des IWF an einen freien, wettbewerbsorientierten Markt zum Zeitpunkt der Unterzeichnung des Schuldenabkommens oder zu irgendeinem Zeitpunkt während der Laufzeit des Abkommens nicht erfüllten."  #NT!
 imf_loan_terms:0 "Wir haben keine andere Wahl, als das Diktat des IWF zu akzeptieren."  #NT!
  
 imf_loan_debtor:0 "IWF-Kreditschuldner"  #NT!
 imf_loan_creditor:0 "IWF-Kreditgläubiger"  #NT!
  
 request_imf_loan.tt:0 "Fordern Sie die IWF-Gläubiger auf, entweder #white 5 %#! von [ROOT.GetCountry.GetName] [Concept('concept_credit','$concept_credit_debt$')] oder [concept_bankroll] [ROOT.GetCountry.GetName] zu übernehmen"  #NT!
  
 notification_imf_loan_take_debt_notification_name:0 "[SCOPE.sCountry('imf_loan_creditor').GetAdjective] Rettungsaktion für [SCOPE.sCountry('imf_loan_debtor').GetName]"  #NT!
 notification_imf_loan_take_debt_notification_desc:0 "[SCOPE.sCountry('imf_loan_creditor').GetName] hat zugestimmt, sich am Darlehen des Internationalen Währungsfonds an [SCOPE.sCountry('imf_loan_debtor').GetName] zu beteiligen, indem es anbietet, 5 % von [SCOPE.sCountry('imf_loan_debtor').GetAdjective] [Concept('concept_credit','$concept_credit_debt$')] zu übernehmen."  #NT!
  
 notification_imf_loan_bankroll_notification_name:0 "[SCOPE.sCountry('imf_loan_creditor').GetAdjective] Rettungsaktion für [SCOPE.sCountry('imf_loan_debtor').GetName]"  #NT!
 notification_imf_loan_bankroll_notification_desc:0 "[SCOPE.sCountry('imf_loan_creditor').GetName] hat zugestimmt, sich am Darlehen des Internationalen Währungsfonds an [SCOPE.sCountry('imf_loan_debtor').GetName] zu beteiligen, indem es [Concept('concept_bankroll','$concept_bankrolling$')] [SCOPE.sCountry('imf_loan_debtor').GetName] ein Angebot macht."  #NT!
  
 je_imf_system:0 "Der Internationale Währungsfonds"  #NT!
 je_imf_system_reason:0 "Der IWF wurde 1944 nach der Weltwirtschaftskrise der 1930er Jahre mit dem Ziel gegründet, einen Rahmen für die internationale wirtschaftliche Zusammenarbeit zu schaffen. Der IWF vergibt Kredite – einschließlich Notkredite – an Mitgliedsländer, die tatsächliche oder potenzielle Zahlungsbilanzprobleme haben. Ziel ist es, ihnen dabei zu helfen, ihre internationalen Reserven wieder aufzubauen, ihre Währungen zu stabilisieren, weiterhin für Importe zu bezahlen und die Bedingungen für ein starkes Wirtschaftswachstum wiederherzustellen und gleichzeitig die zugrunde liegenden Probleme zu beheben. \n\n#white Währungsstärke:#! [SCOPE.GetRootScope.GetCountry.GetCustom('currency_strength_custom_loc')]"  #NT!
 je_imf_system_status:0 "Nicht beansprucht Global [concept_sdr]: @money![GetGlobalVariable('SDR_global_marketplace_amount_display').GetValue]M \nNational [concept_sdr]: @money![GetPlayer.MakeScope.Var('SDR_local_actual_amount_display').GetValue]M \nGlobal [concept_sdr]: @money![GetPlayer.MakeScope.Var('SDR_global_amount_display').GetValue]M"  #NT!
  
 notification_imf_grateful_country_notification_name:0 "[concept_relations] mit [SCOPE.sCountry('grateful_imf_country').GetName] erhalten"  #NT!
 notification_imf_grateful_country_notification_desc:0 "[SCOPE.sCountry('grateful_imf_country').GetName] ist dankbar für den Beitrag von [SCOPE.sCountry('this_imf_country').GetName] zum globalen nicht beanspruchten [concept_sdr]-Pool. Dies hat [SCOPE.sCountry('grateful_imf_country').GetAdjective] [concept_relations] mit [SCOPE.sCountry('this_imf_country').GetName] um #Green 10#! erhöht"  #NT!
  
