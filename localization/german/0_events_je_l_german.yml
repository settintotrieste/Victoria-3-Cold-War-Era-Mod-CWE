 H3N2_1968.t:0 "Die Hongkong-Grippe"  #NT!
 H3N2_1968.d:0 "Die Hongkong-Grippe war eine Grippepandemie, die 1968 und 1969 auftrat und weltweit zwischen einer und vier Millionen Menschen das Leben kostete. Sie gehört zu den tödlichsten Pandemien der Geschichte und wurde durch einen H3N2-Stamm des Influenza-A-Virus verursacht. Der erste aufgezeichnete Ausbruch ereignete sich am 13. Juli 1968 im britischen Hongkong. Es wurde spekuliert, dass der Ausbruch auf dem chinesischen Festland begann, bevor er sich auf Hongkong ausbreitete."  #NT!
 SARS_2003.t:0 "Der SARS-Ausbruch"  #NT!
 SARS_2003.d:0 "Der SARS-Ausbruch in den Jahren 2002–2004, der durch das schwere Coronavirus mit akutem respiratorischem Syndrom (SARS-CoV oder SARS-CoV-1) verursacht wurde, infizierte über 8.000 Menschen in 30 Ländern und Territorien und führte weltweit zu mindestens 774 Todesfällen. Der Ausbruch wurde erstmals im November 2002 in Foshan, Guangdong, China, festgestellt. Die Weltgesundheitsorganisation (WHO) wurde im Februar 2003 über den Ausbruch informiert und gab im März 2003 eine globale Warnung aus. Der größte Teil des Ausbruchs dauerte etwa acht Monate, und die Weltgesundheitsorganisation erklärte SARS am 5. Juli 2003 für eingedämmt."  #NT!
 H1N1_2009.t:0 "Die H1N1-Pandemie"  #NT!
 H1N1_2009.d:0 "Die Schweinegrippepandemie 2009, die durch das H1N1-Virus verursacht und von der Weltgesundheitsorganisation (WHO) von Juni 2009 bis August 2010 ausgerufen wurde, war die dritte aktuelle Grippepandemie mit dem H1N1-Virus. Der erste identifizierte menschliche Fall ereignete sich in La Gloria, Mexiko, einer ländlichen Stadt in Veracruz. Bei dem Virus schien es sich um einen neuen H1N1-Stamm zu handeln, der aus einer früheren dreifachen Neuzusammensetzung von Vogel-, Schweinegrippe- und menschlichen Grippeviren hervorgegangen war, die sich dann mit einem eurasischen Schweinegrippevirus kombinierten."  #NT!
 COVID_2019.t:0 "Die COVID-19-Pandemie"  #NT!
 COVID_2019.d:0 "Die COVID-19-Pandemie ist eine globale Pandemie der Coronavirus-Krankheit 2019 (COVID-19), die durch das schwere akute respiratorische Syndrom Coronavirus 2 (SARS-CoV-2) verursacht wird. Das neuartige Virus wurde erstmals im Dezember 2019 bei einem Ausbruch in Wuhan, der Hauptstadt von Hubei, China, identifiziert, bevor es sich in anderen Gebieten Asiens und dann Anfang 2020 weltweit ausbreitete. Die Weltgesundheitsorganisation (WHO) erklärte den Ausbruch am 30. Januar 2020 zu einer gesundheitlichen Notlage von internationaler Tragweite (PHEIC) und schätzte den Ausbruch am 11. März 2020 als eine Pandemie ein."  #NT!
  
 historical_pandemics.option.1:0 "Oh nein!"  #NT!
  
