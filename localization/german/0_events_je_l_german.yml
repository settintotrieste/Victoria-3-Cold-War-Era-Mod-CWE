 espionage_conduct_economic_sabotage_target.d:0 "Die [SCOPE.GetRootScope.GetCountry.GetCustom('secret_police_custom_title')] berichtet, dass [SCOPE.sCountry('suspected_espionage_attacker').GetAdjective] Spione Unruhen in der Industrie geschürt und bestimmte Schlüsselgebäude in der [SCOPE.sCountry('espionage_victim').GetAdjective]-Lieferkette in die Luft gesprengt haben, wodurch der Durchsatz aller $bg_manufacturing$, $bg_mining$ und $bg_infrastructure$ Gebäude für einen Zeitraum von 12 Monaten verringert wurde."  #NT!
 espionage_conduct_economic_sabotage_target.f:0 "Beachten Sie, dass es sich nur um eine Vermutung handelt, dass [SCOPE.sCountry('suspected_espionage_attacker').GetName] die verdeckte Aktion durchgeführt hat. Die Entscheidung, sie des Verrats zu beschuldigen, könnte daher fehl am Platz sein."  #NT!
  
