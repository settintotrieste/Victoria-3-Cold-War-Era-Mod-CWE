 lose_20_war_support_event.tt:0 "Verliere 20 [concept_war_support]"  #NT!
 lose_10_war_support_event.tt:0 "Verliere 10 [concept_war_support]"  #NT!
 lose_2_war_support_event.tt:0 "Verliere 2 [concept_war_support]"  #NT!
 lose_1_war_support_event.tt:0 "Verliere 1 [concept_war_support]"  #NT!
  
 je_war_system_1.tt:0 "Ein [concept_war_goal] erzwungen"  #NT!
 je_war_system_2.tt:0 "[concept_war_goal] wurde nicht erzwungen"  #NT!
 je_war_system:0 "Der [ROOT.GetCountry.GetAdjectiveNoFlag]-Kriegsrat"  #NT!
 je_war_system_reason:0 "Da [ROOT.GetCountry.GetName] derzeit an einem [concept_war] beteiligt ist, wurde von [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [ROOT.GetCountry.GetRuler.GetFullName] ein Kriegskabinett zusammengestellt, wobei General [SCOPE.gsInterestGroup('supreme_commander_scope').GetLeader.GetFullName] die Gesamtverantwortung für die Kriegsführung erhielt. Die [ROOT.GetCountry.GetAdjectiveNoFlag]-Leute warten sehnsüchtig auf den endgültigen Sieg und werden bitter enttäuscht sein, wenn er nicht zustande kommt."  #NT!
  
 won_a_war_modifier:0 "Einen Krieg gewonnen"  #NT!
 stalemate_in_war_modifier:0 "Patt in einem Krieg"  #NT!
 lost_a_war_modifier:0 "Einen Krieg verloren"  #NT!
 patriotic_mood_modifier:0 "Patriotischer Eifer"  #NT!
  
 praised_for_winning_war:0 "Gelobt für den Sieg im Krieg"  #NT!
 blamed_for_losing_war:0 "Für den verlorenen Krieg verantwortlich gemacht"  #NT!
 blamed_for_pointless_war:0 "Für sinnlosen Krieg verantwortlich gemacht"  #NT!
  
 je_wartime_measures_martial_law_button:0 "Verhängung des Kriegsrechts"  #NT!
 je_wartime_measures_martial_law_button_desc:0 "Das Kriegsrecht beinhaltet die vorübergehende Ersetzung der zivilen Herrschaft durch militärische Autorität und wird normalerweise in Zeiten von Krieg, Aufstand oder Naturkatastrophen verhängt. Wenn das Kriegsrecht in Kraft ist, hat der Militärbefehlshaber eines Gebiets oder Landes uneingeschränkte Befugnis, Gesetze zu erlassen und durchzusetzen."  #NT!
 je_wartime_measures_martial_law_remove_button:0 "Heben Sie das Kriegsrecht auf"  #NT!
 je_wartime_measures_martial_law_remove_button_desc:0 "Die [concept_government] können das Kriegsrecht jederzeit während eines Krieges aufheben."  #NT!
 recently_enacted_martial_law.tt:0 "Es herrscht seit mindestens drei Monaten Kriegsrecht"  #NT!
 wartime_measures_martial_law:0 "Kriegsrecht während des Krieges"  #NT!
  
 je_wartime_measures_rationing_button:0 "Rationierung verhängen"  #NT!
 je_wartime_measures_rationing_button_desc:0 "Unter Rationierung versteht man die Begrenzung von Gütern oder Dienstleistungen, die stark nachgefragt und gleichzeitig knapp sind. Dies wird häufig von Regierungen unternommen, um die Auswirkungen der Knappheit abzumildern und wirtschaftliche Herausforderungen zu bewältigen."  #NT!
 je_wartime_measures_rationing_remove_button:0 "Schluss mit der Rationierung"  #NT!
 je_wartime_measures_rationing_remove_button_desc:0 "Die [concept_government] können das Rationierungsregime jederzeit während eines Krieges aufheben."  #NT!
 recently_enacted_wartime_measures_rationing.tt:0 "Die Rationierung ist seit mindestens 3 Monaten verhängt"  #NT!
 wartime_measures_rationing:0 "Rationierung während des Krieges"  #NT!
  
 je_wartime_measures_propaganda_button:0 "Verbreiten Sie Propaganda"  #NT!
 je_wartime_measures_propaganda_button_desc:0 "Propaganda ist eine mächtige Waffe im Krieg, da sie zur Entmenschlichung und zum Erzeugen von Hass gegen einen vermeintlichen inneren oder äußeren Feind eingesetzt werden kann, indem in den Köpfen von Soldaten und Bürgern ein falsches Bild geschaffen wird.\n\n5 [concept_war_support] werden für jeden Monat hinzugefügt, in dem diese Kriegszeitmaßnahme aktiv ist."  #NT!
 je_wartime_measures_propaganda_remove_button:0 "Stoppt Propaganda"  #NT!
 je_wartime_measures_propaganda_remove_button_desc:0 "Die [concept_government] können während eines Krieges jederzeit mit der Verbreitung von Propaganda aufhören. 5 [concept_war_support] wird nicht mehr jeden Monat hinzugefügt."  #NT!
 recently_enacted_wartime_measures_propaganda.tt:0 "Propaganda wird seit mindestens 3 Monaten verbreitet"  #NT!
 wartime_measures_propaganda:0 "Kriegspropaganda"  #NT!
  
 je_wartime_measures_war_bonds_button:0 "Kriegsanleihen ausgeben"  #NT!
 je_wartime_measures_war_bonds_button_desc:0 "Eine Kriegsanleihe ist eine Schuldverschreibung, die von einer Regierung ausgegeben wird, um militärische Operationen in Kriegs- oder Konfliktzeiten zu finanzieren. Da Kriegsanleihen eine Rendite boten, die unter dem Marktzins lag, erfolgte die Investition durch emotionale Appelle an patriotische Bürger, der Regierung Geld zu leihen."  #NT!
 recently_enacted_wartime_measures_war_bonds.tt:0 "Im letzten Monat wurden keine Kriegsanleihen ausgegeben"  #NT!
  
 je_wartime_measures_total_war_button:0 "Erkläre den totalen Krieg"  #NT!
 je_wartime_measures_total_war_button_desc:0 "Die Regierung wird alle Bereiche der Gesellschaft mobilisieren, um den Krieg zu führen, und alle arbeitsfähigen Männer werden eingezogen."  #NT!
 wartime_measures_total_war:0 "Totaler Krieg"  #NT!
  
 notification_declared_total_war_notification_name:0 "[SCOPE.sCountry('total_war_country').GetAdjective] Totaler Krieg"  #NT!
 notification_declared_total_war_notification_desc:0 "Die Regierung von [SCOPE.sCountry('total_war_country').GetName] hat den totalen Krieg erklärt und mit der Massenmobilisierung ihrer Bevölkerung zum Militärdienst begonnen. Dies ermöglicht es den [SCOPE.sCountry('total_war_country').GetAdjective]-Streitkräften, eine viel größere Wehrpflichtigenarmee aufzustellen."  #NT!
  
 je_wartime_measures_resource_requisition_button:0 "Anforderungsressourcen"  #NT!
 je_wartime_measures_resource_requisition_button_desc:0 "Die Regierung wird Privateigentum beschlagnahmen, um die Kriegsanstrengungen zu finanzieren und voranzutreiben."  #NT!
 wartime_measures_resource_requisition:0 "Angeforderte Ressourcen"  #NT!
  
 remove_all_wartime_measures.tt:0 "Entfernen Sie alle Kriegsmaßnahmen"  #NT!
  
 je_historical_currency_union_1.tt:0 "Dieses Land befindet sich in einem [concept_currency_union] mit 5 oder mehr ausreichend unabhängigen Ländern"  #NT!
 je_historical_currency_union_2.tt:0 "Dieses Land befindet sich nicht in einem [concept_currency_union] mit 5 oder mehr ausreichend unabhängigen Ländern"  #NT!
 je_historical_currency_union:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('historical_currency_union_title')]"  #NT!
 je_historical_currency_union_reason:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('historical_currency_union_desc')]"  #NT!
 je_historical_currency_union_status:0 "Gesamtzahl der Mitglieder: [GetPlayer.MakeScope.Var('currency_union_members').GetValue]"  #NT!
  
 cfa_franc_zone:0 "Die CFA-Franc-Zone"  #NT!
 cfa_franc_zone_desc:0 "Angeführt von [ROOT.GetCountry.GetName] ist der CFA-Franc der Name zweier Währungen, des westafrikanischen CFA-Franc, der in acht westafrikanischen Ländern verwendet wird, und des zentralafrikanischen CFA-Franc, der in sechs zentralafrikanischen Ländern verwendet wird. Obwohl getrennt, waren die beiden CFA-Franc-Währungen immer gleichwertig und praktisch austauschbar.\n\nWir sollten versuchen, dieses umfangreiche [concept_currency_union] zu bewahren, da der Verlust unseres nationalen Ansehens einen Schlag bedeuten würde."  #NT!
 franc_zone:0 "Die Frankenzone"  #NT!
 franc_zone_desc:0 "Angeführt von [ROOT.GetCountry.GetName] ist die Frankenzone ein Wirtschafts-, Währungs- und Kulturraum, der weltweit seinesgleichen sucht. Es besteht aus sehr unterschiedlichen Staaten und Territorien und ist das Ergebnis von Entwicklungen und Veränderungen im ehemaligen französischen Kolonialreich.\n\nWir sollten darauf abzielen, dieses umfangreiche [concept_currency_union] zu bewahren, da der Verlust unseres nationalen Ansehens einen Schlag bedeuten würde."  #NT!
 sterling_zone:0 "Das Sterling-Gebiet"  #NT!
 sterling_zone_desc:0 "Angeführt von [ROOT.GetCountry.GetName] war der Sterling-Raum eine Gruppe von Ländern, die ihre Währungen entweder an das Pfund Sterling koppelten oder tatsächlich das Pfund Sterling als eigene Währung verwendeten. Das Gebiet begann in den frühen 1930er-Jahren informell zu erscheinen, nachdem das Pfund Sterling 1931 den Goldstandard verlassen hatte, was zur Folge hatte, dass eine Reihe von Währungen von Ländern, die in der Vergangenheit einen Großteil ihres Handels in Pfund Sterling abgewickelt hatten, an Pfund Sterling statt an Gold gekoppelt waren. Die Bank of England in London leitete die Koordinierung der Geldpolitik im Währungsraum. Mitgliedsländer mit eigener Währung hielten einen großen Teil ihrer Devisenreserven als Pfundguthaben in London.\n\nWir sollten versuchen, dieses umfangreiche [concept_currency_union] zu bewahren, da der Verlust unseres nationalen Ansehens einen Schlag bedeuten würde."  #NT!
 dollar_zone:0 "Die Dollarzone"  #NT!
 ruble_zone:0 "Die [ROOT.GetCountry.GetAdjectiveNoFlag]-Rubel-Zone"  #NT!
 generic_currency_zone:0 "Die Währungszone [ROOT.GetCountry.GetAdjectiveNoFlag]"  #NT!
 generic_currency_zone_desc:0 "[ROOT.GetCountry.GetName] ist der Anführer einer großen [concept_currency_union], die aus 5 oder mehr souveränen Mitgliedern besteht. Dies gibt der [ROOT.GetCountry.GetAdjective] Zentralbank einen großen Einfluss auf die internationalen Zinssätze und viel Ansehen.\n\nWir sollten darauf abzielen, dieses umfangreiche [concept_currency_union] zu bewahren, da der Verlust unseres nationalen Ansehens einen Schlag bedeuten würde."  #NT!
  
 je_multilateral_development_banks_1.tt:0 "Dieses Land hat eine $multilateral_development_bank$ [concept_diplomatic_pact] mit mindestens einem anderen Land"  #NT!
 je_multilateral_development_banks_2.tt:0 "Dieses Land hat mit keinem Land eine $multilateral_development_bank$ [concept_diplomatic_pact]"  #NT!
 je_multilateral_development_banks:0 "Multilaterale Entwicklungsbanken"  #NT!
 je_multilateral_development_banks_reason:0 "Multilaterale Entwicklungsbanken sind supranationale Finanzinstitutionen, die von souveränen Staaten als ihren Anteilseignern gegründet wurden. Ihre Aufgabenbereiche spiegeln die von diesen Staaten festgelegte Entwicklungshilfe- und Kooperationspolitik wider. \n\nDie Regierung von [ROOT.GetCountry.GetName] kann Geld von multilateralen Entwicklungsbanken leihen, um nationale Ausgaben zu finanzieren. \n\n Internationale Kredite lauten auf #Yellow XDR#!, was wiederum anhand des globalen durchschnittlichen Wechselkurses berechnet wird. Eine stärkere [ROOT.GetCountry.GetAdjectiveNoFlag]-Währung wird uns daher günstigere Kredite gewähren und umgekehrt. \n\nTipp: Der Wechselkurs [ROOT.GetCountry.GetAdjective] kann um $lawgroup_monetary_policy$ [concept_law] angepasst werden. \n\nWechselkurs der Währung: @money!1 = [GetPlayer.MakeScope.Var('currency_exchange_rate').GetValue] #Yellow XDR#! \n\nKreditlimit (in Fremdwährung): #Yellow @money!#Yellow7M#! \n\nMonatliches Kreditlimit: #Yellow9 @money!#!0M#! \n\n[ROOT.GetCountry.GetName] ist Mitglied der folgenden Regionalbanken: #!3 #!4 #!5 #!6 #!7 #!8 #!9 [ROOT.GetCountry.GetAdjectiveNoFlag]0 [ROOT.GetCountry.GetAdjectiveNoFlag]1 [ROOT.GetCountry.GetAdjectiveNoFlag]2 [ROOT.GetCountry.GetAdjectiveNoFlag]3 [ROOT.GetCountry.GetAdjectiveNoFlag]4 [ROOT.GetCountry.GetAdjectiveNoFlag]5 #!"  #NT!
 je_multilateral_development_banks_status:0 "Kapitalbetrag: #Yellow #!4#!"  #NT!
  
 je_start_borrow_multilateral_banks_button:0 "Fangen Sie an, sich Geld zu leihen"  #NT!
 je_start_borrow_multilateral_banks_button_desc:0 "Die Regierung von [ROOT.GetCountry.GetName] wird damit beginnen, Geld von multilateralen Entwicklungsbanken zu einem jährlichen Zinssatz von #o [GetPlayer.MakeScope.Var('currency_rate_international_local').GetValue] %#!. zu leihen. \n\nHinweis: Wir haben ein Kreditlimit von #Yellow XDR#! #Green [GetPlayer.MakeScope.Var('currency_borrowing_pool_display').GetValue]M#!, was #Green @money!#o0M#!. entspricht"  #NT!
 je_stop_borrow_multilateral_banks_button:0 "Hören Sie auf, sich Geld zu leihen"  #NT!
 je_stop_borrow_multilateral_banks_button_desc:0 "Die Regierung von [ROOT.GetCountry.GetName] wird aufhören, Geld von multilateralen Entwicklungsbanken zu einem jährlichen Zinssatz von #o [GetPlayer.MakeScope.Var('currency_rate_international_local').GetValue] %#!. zu leihen. \n\nHinweis: Wir haben ein Kreditlimit von #Yellow XDR#! #Green [GetPlayer.MakeScope.Var('currency_borrowing_pool_display').GetValue]M#!, was #Green @money!#o0M#!. entspricht"  #NT!
 je_start_repay_multilateral_banks_button:0 "Beginnen Sie mit der Rückzahlung von Geld"  #NT!
 je_start_repay_multilateral_banks_button_desc:0 "Die Regierung von [ROOT.GetCountry.GetName] wird mit der Rückzahlung eines Teils ihres Darlehens bei multilateralen Entwicklungsbanken beginnen. \n\nHinweis: @money!#Red [GetPlayer.MakeScope.Var('currency_borrowed_money_yearly_repayment_display').GetValue]#! würde Schulden im Wert von #Yellow XDR#! #Red [GetPlayer.MakeScope.Var('currency_borrowed_money_exchange_adjusted_repayment').GetValue]#! zurückzahlen."  #NT!
 je_stop_repay_multilateral_banks_button:0 "Hören Sie auf, Geld zurückzuzahlen"  #NT!
