 american_puerto_rico.sgc.t:0 "Das Commonwealth von Puerto Rico?"  #NT!
 american_puerto_rico.sgc.d:0 "Die Regierung der Vereinigten Staaten ermächtigte Puerto Rico mit dem Puerto Rico Federal Relations Act von 1950, eine eigene Verfassung zu entwerfen. Die Verfassungsversammlung tagte mehrere Monate lang zwischen 1951 und 1952, in dem das Dokument verfasst wurde. Das Gesetz verlangte von den Verfassern nur zwei grundlegende Anforderungen: eine republikanische Regierungsform und die Aufnahme einer Bill of Rights."  #NT!
 american_NMI.sgc.t:0 "Das Commonwealth der Nördlichen Marianen?"  #NT!
 american_NMI.sgc.d:0 "Nach der Niederlage Japans im Zweiten Weltkrieg wurden die Nördlichen Marianen gemäß der Resolution 21 des Sicherheitsrats von den Vereinigten Staaten als Teil des Treuhandgebiets der Pazifikinseln der Vereinten Nationen verwaltet, das den Vereinigten Staaten als Treuhänder die Verantwortung für Verteidigung und Außenpolitik übertrug. Die Menschen auf den Nördlichen Marianen beschlossen in den 1970er Jahren, nicht die Unabhängigkeit anzustreben, sondern engere Verbindungen zu den Vereinigten Staaten zu knüpfen. Die Verhandlungen über den Commonwealth-Status begannen 1972, und 1975 wurde in einem Referendum ein Vertrag zur Gründung eines Commonwealth in politischer Union mit den Vereinigten Staaten angenommen. Am 9. Januar 1978 traten teilweise eine neue Regierung und Verfassung in Kraft."  #NT!
 american_ESM.sgc.t:0 "Selbstverwaltung in Amerikanisch-Samoa?"  #NT!
 american_ESM.sgc.d:0 "Seit der Unterzeichnung der Abtretungsurkunden in den Jahren 1900 und 1904 haben die Samoaner eine weitere Integration in das US-amerikanische System vermieden. Im Jahr 1949 beschloss das Innenministerium, Amerikanisch-Samoa durch ein Organic Act einzugemeinden. Aus Angst, dass die Eingemeindung die samoanische Kultur und den traditionellen Landbesitz untergraben könnte, intervenierte der samoanische Matai und der Kongress stoppte die Eingemeindung. Stattdessen schuf Samoa seine eigene Regierung, die Samoan Fono, die auf einem indigenen Regierungssystem basiert. Seitdem lehnen die Samoaner die Einrichtung eines Bundesbezirksgerichts ab, verweigern ihnen das Geburtsrecht auf die Staatsbürgerschaft und sind nach wie vor das einzige US-Territorium mit einem eigenen Einwanderungssystem."  #NT!
  
 american_decolonisation.option.1:0 "Lassen Sie die Kolonie sich selbst regieren"  #NT!
 american_decolonisation.option.2:0 "Sie verdienen keine Autonomie"  #NT!
  
 american_west_germany.indy.t:0 "Unabhängigkeit Westdeutschlands?"  #NT!
 american_west_germany.indy.d:0 "Die Bonn-Pariser Konventionen wurden im Mai 1952 unterzeichnet und traten nach der Ratifizierung im Jahr 1955 in Kraft. Die Konventionen beendeten die alliierte Besetzung Westdeutschlands."  #NT!
 american_japan.indy.t:0 "Unabhängigkeit Japans?"  #NT!
 american_japan.indy.d:0 "Der Vertrag von San Francisco stellte im Namen der Vereinten Nationen die friedlichen Beziehungen zwischen Japan und den alliierten Mächten wieder her, indem er den legalen Kriegszustand beendete und Wiedergutmachung für feindselige Handlungen bis einschließlich des Zweiten Weltkriegs vorsah. Der Vertrag von 1951 markiert zusammen mit dem am selben Tag unterzeichneten Sicherheitsvertrag den Beginn des San-Francisco-Systems, das Japans Beziehungen zu den Vereinigten Staaten und seine Rolle auf der internationalen Bühne definiert."  #NT!
 american_germany_japan.indy.t:0 "Das Plaza-Abkommen?"  #NT!
 american_germany_japan.indy.d:0 "Das Plaza-Abkommen war eine am 22. September 1985 im Plaza Hotel in New York City zwischen Frankreich, Westdeutschland, Japan, dem Vereinigten Königreich und den Vereinigten Staaten unterzeichnete gemeinsame Vereinbarung zur Abwertung des US-Dollars gegenüber dem französischen Franken, der deutschen Deutschen Mark, dem japanischen Yen und dem britischen Pfund Sterling durch Interventionen auf den Devisenmärkten."  #NT!
 american_micronesia.indy.t:0 "Unabhängigkeit Mikronesiens?"  #NT!
 american_micronesia.indy.d:0 "$generic_independence_decolonisation_loc_desc$"  #NT!
 american_iraq.indy.t:0 "Rückzug aus dem Irak?"  #NT!
 american_iraq.indy.d:0 "Als sich der Irak-Krieg von seiner ersten Invasionsphase im Jahr 2003 zu einer fast zehnjährigen Besatzung entwickelte, verlagerte sich die amerikanische öffentliche Meinung hin zu einem Truppenabzug. Der Abzug der US-Truppen aus dem Irak begann im Dezember 2007 mit dem Ende der Truppenaufstockung im Irak-Krieg 2007 und wurde im Dezember 2011 größtenteils abgeschlossen, wodurch der Irak-Krieg beendet wurde. Der Abzug der US-Streitkräfte aus dem Irak war in den Vereinigten Staaten während eines Großteils der 2000er Jahre ein umstrittenes Thema."  #NT!
 american_afghanistan.indy.t:0 "Abzug aus Afghanistan?"  #NT!
 american_afghanistan.indy.d:0 "Im August 2021 zogen die USA ihre letzten Truppen aus Afghanistan ab und beendeten damit ihre Militärpräsenz dort nach fast 20 Jahren. Der Abzug der USA aus Afghanistan führte dazu, dass die Taliban die Kontrolle über das Land zurückerlangten und eine Flüchtlingskrise auslöste, da viele Afghanen flohen."  #NT!
 american_germany.indy.t:0 "Ein souveränes Deutschland?"  #NT!
 american_germany.indy.d:0 "Der Vertrag über die endgültige Regelung in Bezug auf Deutschland ist ein internationales Abkommen, das Anfang der 1990er Jahre die Wiedervereinigung Deutschlands ermöglichte. Es wurde 1990 zwischen den beiden, der Bundesrepublik Deutschland und der Deutschen Demokratischen Republik, zusätzlich zu den vier Mächten ausgehandelt, die Deutschland am Ende des Zweiten Weltkriegs in Europa besetzt hatten: Frankreich, die Sowjetunion, das Vereinigte Königreich und die Vereinigten Staaten. Der Vertrag ersetzte das Potsdamer Abkommen von 1945: Darin verzichteten die vier Mächte auf alle Rechte, die sie gegenüber Deutschland hatten, und ermöglichten dessen Wiedervereinigung als völlig souveräner Staat im folgenden Jahr."  #NT!
 american_italy.indy.t:0 "Der Vertrag von Paris?"  #NT!
 american_italy.indy.d:0 "Am 10. Februar 1947 wurde der Vertrag von Paris zwischen Italien und den Alliierten unterzeichnet, der die Feindseligkeiten zwischen beiden Parteien offiziell beendete. Es trat am 15. September 1947 allgemein in Kraft."  #NT!
 american_south_korea.indy.t:0 "Unabhängigkeit Südkoreas?"  #NT!
 american_south_korea.indy.d:0 "Die Erste Republik Korea war von August 1948 bis April 1960 die Regierung Südkoreas. Die Erste Republik wurde am 15. August 1948 nach der Übergabe der Militärregierung der US-Armee gegründet, die Südkorea seit dem Ende der japanischen Herrschaft im Jahr 1945 regierte, und wurde zur ersten unabhängigen republikanischen Regierung in Korea."  #NT!
 american_FRG.indy.t:0 "Die Bundesrepublik Deutschland?"  #NT!
 american_FRG.indy.d:0 "Die westlichen Alliierten übergaben zunehmende Autorität an westdeutsche Beamte und versuchten, einen Kern für eine künftige deutsche Regierung zu schaffen, indem sie einen zentralen Wirtschaftsrat für ihre Zonen einrichteten. Das Programm sah später eine westdeutsche verfassungsgebende Versammlung, ein Besatzungsstatut zur Regelung der Beziehungen zwischen den Alliierten und den deutschen Behörden sowie die politische und wirtschaftliche Fusion der französischen mit der britischen und amerikanischen Zone vor. Am 23. Mai 1949 wurde das Grundgesetz, die Verfassung der Bundesrepublik Deutschland, verkündet."  #NT!
 american_philippines.indy.t:0 "Der Vertrag von Manila?"  #NT!
 american_philippines.indy.d:0 "Der Vertrag von Manila von 1946, offiziell Vertrag über allgemeine Beziehungen und Protokoll, ist ein Vertrag über allgemeine Beziehungen, der am 4. Juli 1946 in Manila, der Hauptstadt der Philippinen, unterzeichnet wurde. Es verzichtete auf die Souveränität der USA über die Philippinen und erkannte die Unabhängigkeit der Republik der Philippinen an."  #NT!
 american_iceland.indy.t:0 "Das Keflavík-Abkommen?"  #NT!
 american_iceland.indy.d:0 "Das Keflavík-Abkommen war ein Abkommen, das 1946 nach dem Ende des Zweiten Weltkriegs zwischen der Regierung der Vereinigten Staaten und der neu gegründeten Republik Island geschlossen wurde. Diese Vereinbarung sah vor, dass die amerikanische Armee das Land innerhalb von sechs Monaten verlassen und die Isländer den Flughafen Keflavík in Besitz nehmen würden."  #NT!
 american_iceland_2.indy.t:0 "Abzug der isländischen Streitkräfte?"  #NT!
 american_iceland_2.indy.d:0 "Am 15. März 2006 gab die US-Botschafterin in Island, Carol van Voorst, die Entscheidung der Vereinigten Staaten bekannt, die isländischen Streitkräfte vor Ende September 2006 abzuziehen. Am 30. September zog das amerikanische Militär seine letzten vier Kampfflugzeuge der Luftwaffe und ein Rettungshubschraubergeschwader aus Keflavík ab."  #NT!
 american_south_vietnam.indy.t:0 "Der Rückzug der USA aus Südvietnam?"  #NT!
 american_south_vietnam.indy.d:0 "Der neu gewählte Präsident Richard M. Nixon erklärte 1969, dass er das amerikanische Engagement im Vietnamkrieg fortsetzen werde, um den Konflikt zu beenden und einen „ehrenvollen Frieden“ für die Vereinigten Staaten und ihren Verbündeten Südvietnam zu sichern. Seine Kernelemente waren: Alle Parteien würden 24 Stunden nach Unterzeichnung des Abkommens einen Waffenstillstand einleiten; Die US-Streitkräfte und alle ausländischen Truppen würden sich spätestens 60 Tage nach Unterzeichnung des Abkommens aus Südvietnam zurückziehen. Amerikanische Gefangene würden gleichzeitig mit dem Abzug amerikanischer und ausländischer Streitkräfte freigelassen; und ein Nationaler Rat für nationale Versöhnung und Eintracht würde geschaffen, um freie und demokratische Wahlen zu organisieren und zu überwachen, um die politische Zukunft des Südens zu bestimmen."  #NT!
 american_palau.indy.t:0 "Unabhängigkeit Palaus?"  #NT!
 american_palau.indy.d:0 "Zusammen mit anderen pazifischen Inseln wurde Palau 1947 Teil des von den Vereinigten Staaten regierten Treuhandgebiets der pazifischen Inseln. Nachdem die Inseln 1978 in einem Referendum gegen den Beitritt zu den Föderierten Staaten von Mikronesien gestimmt hatten, erlangten sie 1994 im Rahmen eines Pakts der freien Assoziation mit den Vereinigten Staaten die volle Souveränität."  #NT!
  
