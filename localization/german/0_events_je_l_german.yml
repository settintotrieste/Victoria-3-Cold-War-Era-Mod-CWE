 british_india.indy.t:0 "Unabhängigkeit Indiens?"  #NT!
 british_india.indy.d:0 "Am 3. Juni 1947 verkündete Viscount Louis Mountbatten, der letzte britische Generalgouverneur Indiens, die Teilung Britisch-Indiens in Indien und Pakistan. Mit der schnellen Verabschiedung des Indian Independence Act 1947 wurde Pakistan am 14. August 1947 um 11:57 Uhr zu einer eigenständigen Nation erklärt. Dann, um 12:02 Uhr, am 15. August 1947, wurde Indien eine souveräne und demokratische Nation."  #NT!
 british_palestine.indy.t:0 "Unabhängigkeit Israels und Palästinas?"  #NT!
 british_palestine.indy.d:0 "Im November 1947 empfahlen die Vereinten Nationen die Teilung Palästinas und die Gründung getrennter arabischer und jüdischer Staaten. Am 15. Mai 1948 gab Großbritannien sein Mandat auf. Die britische Armee verließ Palästina und überließ den Juden und Arabern den Kampf im darauffolgenden Krieg."  #NT!
