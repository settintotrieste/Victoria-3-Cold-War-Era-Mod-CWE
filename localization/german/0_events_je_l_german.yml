 nuclear_dev_cost:0 "Kosten für die Entwicklung von Kernwaffen"  #NT!
  
 nuclear_capability:0 "Atomwaffenstaat"  #NT!
 start_nuclear_weapons_program_decision:0 "Atomwaffenprogramm starten"  #NT!
 start_nuclear_weapons_program_decision_desc:0 "Eine Atomwaffe ist ein Sprengkörper, der seine zerstörerische Kraft aus nuklearen Reaktionen, entweder Kernspaltung (Spaltungsbombe) oder einer Kombination von Spaltungs- und Fusionsreaktionen (thermonukleare Bombe), ableitet und eine nukleare Explosion auslöst. Wir sollten solche Waffen entwickeln, um unseren Feinden Angst einzujagen. Beachten Sie, dass das Atomwaffenprogramm endet, wenn wir zu einem nicht ausreichend unabhängigen Subjekt werden oder Gesetze erlassen, die uns den Besitz von Massenvernichtungswaffen verbieten."  #NT!
 nuclear_program_started:0 "Atomwaffenprogramm"  #NT!
  
 gained_nuclear_capability.t:0 "Fähigkeit zum Nuklearangriff erhalten"  #NT!
 gained_nuclear_capability.d:0 "[SCOPE.sCountry('nuclear_country').GetName] hat durch seine unermüdlichen Bemühungen Atomwaffen und ein Mittel erworben, um diese Waffen an seine Feinde zu liefern. Das bedeutet, dass es nun feindliche Nationen, die mit ihm Krieg führen, mit Atomwaffen angreifen kann."  #NT!
 gained_nuclear_capability.f:0 "Beachten Sie, dass die nukleare Fähigkeit verloren gehen würde, wenn [SCOPE.sCountry('nuclear_country').GetName] entweder kein $building_nuclear_weapons_silo$ [concept_building] mehr hat, das keinen Gütermangel aufweist, das $law_wmd_banned$ [concept_law] überschreitet oder ein nicht ausreichend unabhängiges Subjekt wird."  #NT!
 gained_nuclear_capability.option:0 "Die Welt wird vor unserer Macht erzittern!"  #NT!
  
 lost_nuclear_capability.t:0 "Verlorene nukleare Angriffsfähigkeit"  #NT!
 lost_nuclear_capability.d:0 "[SCOPE.sCountry('nuclear_country').GetName] hat seine Fähigkeit verloren, nukleare Angriffe gegen seine Feinde zu starten."  #NT!
 lost_nuclear_capability.f:0 "Dieses Ereignis wurde ausgelöst, weil [SCOPE.sCountry('nuclear_country').GetName] entweder kein $building_nuclear_weapons_silo$ [concept_building] mehr hat, das $law_wmd_banned$ [concept_law] bestanden hat oder ein nicht ausreichend unabhängiges Subjekt geworden ist."  #NT!
 lost_nuclear_capability.option:0 "Eine Tragödie!"  #NT!
  
 nuclear_attack.t:0 "[SCOPE.sCountry('nuclear_country').GetName] Von Atomwaffen getroffen"  #NT!
 nuclear_attack.d:0 "Wir haben Berichte erhalten, dass der Feind mehrere unserer Städte und Gemeinden mit Atomwaffen angegriffen hat. Die Infrastruktur der betroffenen Gebiete wurde zerstört und große Teile davon sind nun gefährlich verstrahlt. Obwohl die meisten Regierungsbeamten in den betroffenen Gebieten Zuflucht in Atomschutzbunkern suchen konnten, war eine große Zahl von Bürgern nicht in der Lage, Schutz zu suchen, und wurden daher entweder durch die erste Explosion oder den daraus resultierenden giftigen Niederschlag getötet.  Wir können nur hoffen, dass Frieden gefunden werden kann, bevor [SCOPE.sCountry('nuclear_country').GetName] vollständig zerstört wird."  #NT!
 nuclear_attack.f:0 "Die von Atomwaffen getroffenen Staatsregionen werden über sehr schädliche Modifikatoren verfügen, die in den kommenden Jahrzehnten nur langsam verfallen werden."  #NT!
 nuclear_attack.option:0 "Eine Schweigeminute für diejenigen, die nicht überlebt haben."  #NT!
  
 chemical_dev_cost:0 "Kosten für die Entwicklung chemischer Waffen"  #NT!
  
 chemical_capability:0 "Chemiewaffenstaat"  #NT!
 start_chemical_weapons_program_decision:0 "Chemiewaffenprogramm starten"  #NT!
 start_chemical_weapons_program_decision_desc:0 "Eine chemische Waffe ist eine Chemikalie, die dazu dient, durch ihre toxischen Eigenschaften vorsätzlich den Tod oder Schaden herbeizuführen. Munition, Geräte und andere Ausrüstung, die speziell für den Einsatz giftiger Chemikalien entwickelt wurden, fallen ebenfalls unter die Definition chemischer Waffen."  #NT!
 chemical_program_started:0 "Programm für chemische Waffen"  #NT!
  
 gained_chemical_capability.t:0 "Fähigkeit zum chemischen Schlag erhalten"  #NT!
 gained_chemical_capability.d:0 "[SCOPE.sCountry('chemical_country').GetName] hat durch seine unermüdlichen Bemühungen chemische Waffen und ein Mittel erworben, um diese Waffen an seine Feinde zu liefern. Das bedeutet, dass es nun die Chemiewaffen aktivieren kann [concept_mobilization_option]."  #NT!
 gained_chemical_capability.f:0 "Beachten Sie, dass die chemische Fähigkeit verloren gehen würde, wenn [SCOPE.sCountry('chemical_country').GetName] entweder kein $building_industrial_chemicals_factory$ [concept_building] mehr hat, das keinen Warenmangel aufweist, das $law_wmd_banned$ [concept_law] besteht oder ein nicht ausreichend unabhängiges Subjekt wird."  #NT!
 gained_chemical_capability.option:0 "Großartig!"  #NT!
  
 lost_chemical_capability.t:0 "Verlorene chemische Angriffsfähigkeit"  #NT!
 lost_chemical_capability.d:0 "[SCOPE.sCountry('chemical_country').GetName] hat seine Fähigkeit verloren, chemische Angriffe gegen seine Feinde durchzuführen."  #NT!
 lost_chemical_capability.f:0 "Dieses Ereignis wurde ausgelöst, weil [SCOPE.sCountry('chemical_country').GetName] entweder kein $building_industrial_chemicals_factory$ [concept_building] mehr hat, das $law_wmd_banned$ [concept_law] bestanden hat oder ein nicht ausreichend unabhängiges Subjekt geworden ist."  #NT!
 lost_chemical_capability.option:0 "Eine Tragödie!"  #NT!
  
 biological_dev_cost:0 "Entwicklungskosten für biologische Waffen"  #NT!
  
 biological_capability:0 "Staat für biologische Waffen"  #NT!
 start_biological_weapons_program_decision:0 "Programm für biologische Waffen starten"  #NT!
 start_biological_weapons_program_decision_desc:0 "Biologische Kriegsführung ist der Einsatz von biologischen Toxinen oder Infektionserregern wie Bakterien, Viren, Insekten und Pilzen mit der Absicht, Menschen, Tiere oder Pflanzen als Kriegshandlung zu töten, zu schädigen oder außer Gefecht zu setzen. Biologische Waffen sind lebende Organismen oder sich reproduzierende Einheiten."  #NT!
 biological_program_started:0 "Programm für biologische Waffen"  #NT!
  
 gained_biological_capability.t:0 "Fähigkeit zum biologischen Schlag erhalten"  #NT!
 gained_biological_capability.d:0 "[SCOPE.sCountry('biological_country').GetName] hat durch seine unermüdlichen Bemühungen biologische Waffen und ein Mittel erworben, um diese Waffen an seine Feinde zu liefern. Das bedeutet, dass es nun $conduct_biological_strike$ [concept_diplomatic_action] gegen seine Feinde einsetzen kann."  #NT!
 gained_biological_capability.f:0 "Beachten Sie, dass die biologische Fähigkeit verloren gehen würde, wenn [SCOPE.sCountry('biological_country').GetName] entweder kein $building_university$ [concept_building] mehr hat, das keinen Gütermangel aufweist, das $law_wmd_banned$ [concept_law] besteht oder ein nicht ausreichend unabhängiges Subjekt wird."  #NT!
 gained_biological_capability.option:0 "Großartig!"  #NT!
  
 lost_biological_capability.t:0 "Verlorene biologische Angriffsfähigkeit"  #NT!
 lost_biological_capability.d:0 "[SCOPE.sCountry('biological_country').GetName] hat seine Fähigkeit verloren, biologische Angriffe gegen seine Feinde durchzuführen."  #NT!
 lost_biological_capability.f:0 "Dieses Ereignis wurde ausgelöst, weil [SCOPE.sCountry('biological_country').GetName] entweder kein $building_university$ [concept_building] mehr hat, das $law_wmd_banned$ [concept_law] bestanden hat oder ein nicht ausreichend unabhängiges Subjekt geworden ist."  #NT!
 lost_biological_capability.option:0 "Eine Tragödie!"  #NT!
  
 enable_historical_railroading_decision:0 "Aktivieren Sie Historical Railroading für die KI"  #NT!
 enable_historical_railroading_decision_desc:0 "Wenn Sie auf diese Entscheidung klicken, wird die KI gezwungen, bei allen historischen Ereignissen immer die historische Option auszuwählen. Die Entscheidung kann vom Spieler jederzeit während des Spiels aktiviert oder deaktiviert werden. Beachten Sie, dass diese Entscheidung nicht dazu führt, dass ein historisches Ereignis ausgelöst wird, wenn es normalerweise nicht ausgelöst würde, sondern dass die KI stattdessen nur die historische Option wählt, wenn ein historisches Ereignis für sie ausgelöst wird."  #NT!
 disable_historical_railroading_decision:0 "Deaktivieren Sie Historical Railroading für die KI"  #NT!
 disable_historical_railroading_decision_desc:0 "Wenn Sie auf diese Entscheidung klicken, wird die KI davon entbunden, bei allen historischen Ereignissen immer die historische Option auszuwählen. Der Spieler kann die historische Eisenbahn jederzeit wieder aktivieren."  #NT!
  
 korean_war:0 "Koreakrieg"  #NT!
 sino_tibet_war:0 "Chinesisch-tibetischer Krieg"  #NT!
  
 is_not_independent:0 "ist nicht ausreichend unabhängig"  #NT!
 join_unga_decision.tt:0 "Kein $unsc_permanent_member$ hat $relations_cold$ oder weniger $DIPLO_ACTION_RELATIONS$ in diesem Land"  #NT!
 join_unga_decision_2.tt:0 "Kein $unsc_permanent_member$ hat einen höheren [concept_rank] als dieses Land"  #NT!
 join_unga_decision_3.tt:0 "Historisches Datum der UN-Mitgliedschaft (nur für historisch geteilte Länder)"  #NT!
 join_unga_decision_4.tt:0 "Kein Land mit der Ein-China-Politik"  #NT!
 join_unga_decision:0 "Treten Sie der UN-Generalversammlung bei"  #NT!
 join_unga_decision_desc:0 "Die UN-Generalversammlung (UNGA) ist das wichtigste politische Entscheidungsorgan der Organisation. Es umfasst alle Mitgliedstaaten und bietet ein einzigartiges Forum für die multilaterale Diskussion des gesamten Spektrums internationaler Fragen, die in der Charta der Vereinten Nationen abgedeckt sind. Jeder Mitgliedsstaat der Vereinten Nationen hat die gleiche Stimme."  #NT!
 join_unsc_perm_decision:0 "Werden Sie ein ständiges Mitglied des UN-Sicherheitsrates"  #NT!
 join_unsc_perm_decision_desc:0 "Der Sicherheitsrat trägt die Hauptverantwortung für die Wahrung des Weltfriedens und der internationalen Sicherheit. Er hat 15 Mitglieder und jedes Mitglied hat eine Stimme. Gemäß der Charta der Vereinten Nationen sind alle Mitgliedstaaten verpflichtet, die Entscheidungen des Rates einzuhalten. Der Sicherheitsrat übernimmt die Führung bei der Feststellung, ob eine Bedrohung des Friedens oder ein Angriffsakt vorliegt. Es fordert die Streitparteien auf, den Streit mit friedlichen Mitteln beizulegen, und empfiehlt Methoden zur Beilegung oder Bedingungen der Beilegung. In manchen Fällen kann der Sicherheitsrat auf die Verhängung von Sanktionen zurückgreifen oder sogar die Anwendung von Gewalt genehmigen, um den Weltfrieden und die internationale Sicherheit aufrechtzuerhalten oder wiederherzustellen."  #NT!
 join_unsc_perm_decision_tt:0 "Das Land unterhält freundschaftliche Beziehungen zu allen Mitgliedern des UN-Sicherheitsrates"  #NT!
 unga_member:0 "UNGA-Mitglied"  #NT!
 unsc_permanent_member:0 "Ständiges Mitglied des Sicherheitsrates der Vereinten Nationen"  #NT!
 unsc_non_permanent_member:0 "Nichtständiges Mitglied des Sicherheitsrates der Vereinten Nationen"  #NT!
 united_nations.1.t:0 "Der UNGA beigetreten"  #NT!
 united_nations.1.d:0 "Die Vereinten Nationen freuen sich, bekannt geben zu können, dass unser Land einen Sitz in der Generalversammlung erhalten hat."  #NT!
 united_nations.1.f:0 "Dieses Ereignis wurde ausgelöst, weil dieses Land entweder nicht mehr ausreichend unabhängig oder kein [concept_recognized_power] mehr ist."  #NT!
 united_nations.2.t:0 "Aus der UNGA entfernt"  #NT!
 united_nations.2.d:0 "Aufgrund der Statusänderung unseres Landes von einem souveränen Staat zu einem Marionettenstaat eines anderen Landes haben die Vereinten Nationen beschlossen, uns aus der Generalversammlung zu entfernen. Uns wurde jedoch der Troststatus eines UN-Beobachterstaates verliehen."  #NT!
 united_nations.2.f:0 "Dieses Ereignis wurde ausgelöst, weil dieses Land entweder nicht mehr ausreichend unabhängig oder kein [concept_recognized_power] mehr ist."  #NT!
 united_nations.1.a:0 "Schade"  #NT!
 UNSC_non_perm_membership.t:0 "Nichtständiges Mitglied des UN-Sicherheitsrates"  #NT!
 UNSC_non_perm_membership.d:0 "[SCOPE.sCountry('new_non_perm_UNSC_member').GetName] wurde von der Generalversammlung der Vereinten Nationen für eine Amtszeit von zwei Jahren im Sicherheitsrat der Vereinten Nationen gewählt. Während dieser Zeit werden wir möglicherweise von den Vereinten Nationen aufgefordert, Eindämmungskriege gegen abtrünnige Mitglieder zu führen."  #NT!
 UNSC_non_perm_membership.f:0 "Ein neues Land wird als nichtständiges Mitglied des Sicherheitsrates der Vereinten Nationen ausgewählt, wenn es weltweit weniger als 15 Mitglieder des Sicherheitsrates der Vereinten Nationen und mehr als 30 Mitglieder der Generalversammlung der Vereinten Nationen gibt. Teilnahmeberechtigt sind Länder mit einem guten Ruf, die sich nicht im Krieg befinden und Mitglieder der Generalversammlung der Vereinten Nationen sind."  #NT!
 UNSC_non_perm_membership.option:0 "Exzellent!"  #NT!
  
 new_unsc_perm_member.t:0 "Neues ständiges Mitglied des UN-Sicherheitsrates"  #NT!
 new_unsc_perm_member.d:0 "[SCOPE.sCountry('new_unsc_member_scope').GetName] wurde eingeladen, dem Sicherheitsrat der Vereinten Nationen als ständiges Mitglied beizutreten. Sie können nun gegen jede Friedenssicherungsresolution ein Veto einlegen, die sie missbilligen."  #NT!
 new_unsc_perm_member.f:0 "[SCOPE.sCountry('new_unsc_member_scope').GetName] konnte dem Sicherheitsrat der Vereinten Nationen als Ständiges Mitglied beitreten, da er gute Beziehungen zu allen bestehenden Ständigen Mitgliedern unterhielt und kein internationaler Paria war."  #NT!
 new_unsc_perm_member.1:0 "Wir werden diese Entwicklung aufmerksam beobachten"  #NT!
  
 UNSC_members_list.tt:0 "Die folgenden Länder sind ständige Mitglieder des UN-Sicherheitsrates:"  #NT!
  
 UN_secretary_general_selection.t:0 "[SCOPE.sCountry('unsg_country').GetAdjective] UN-Generalsekretär"  #NT!
 UN_secretary_general_selection.d:0 "Die Generalversammlung der Vereinten Nationen hat einen [SCOPE.sCountry('unsg_country').GetAdjective]-Staatsangehörigen zum Generalsekretär der Organisation gewählt. Dies gibt unserem Land mehr Einfluss in internationalen Angelegenheiten."  #NT!
 UN_secretary_general_selection.f:0 "[SCOPE.sCountry('unsg_country').GetName] wurde ausgewählt, weil wir einen seriösen internationalen Ruf haben und keine Großmacht sind. Die Amtszeit des UN-Generalsekretärs beträgt 5 Jahre."  #NT!
  
 UN_secretary_general_notification.t:0 "[SCOPE.sCountry('unsg_country').GetAdjective] UN-Generalsekretär"  #NT!
 UN_secretary_general_notification.d:0 "Die Generalversammlung der Vereinten Nationen hat einen [SCOPE.sCountry('unsg_country').GetAdjective]-Staatsangehörigen zum Generalsekretär der Organisation gewählt. Dies verleiht [SCOPE.sCountry('unsg_country').GetName] mehr Einfluss in internationalen Angelegenheiten."  #NT!
 UN_secretary_general_notification.1.f:0 "Der neue UN-Generalsekretär soll ein eher passiver Mensch sein, weshalb es unwahrscheinlich ist, dass die UN hart gegenüber Ländern vorgehen wird, die gegen das Völkerrecht verstoßen."  #NT!
 UN_secretary_general_notification.2.f:0 "Der neue UN-Generalsekretär gilt als anständiger Mensch. Auch wenn es unwahrscheinlich ist, dass die UN gegenüber Ländern, die gegen das Völkerrecht verstoßen, besonders hart vorgehen wird, ist ein gewisses Maß an Entschlossenheit zu erwarten."  #NT!
 UN_secretary_general_notification.3.f:0 "Der neue UN-Generalsekretär soll eine sehr proaktive und aggressive Person sein, daher ist es wahrscheinlich, dass die UN gegenüber Ländern, die gegen das Völkerrecht verstoßen, sehr hart vorgehen würde."  #NT!
 UN_secretary_general_notification_option:0 "Herzlichen Glückwunsch an [SCOPE.sCountry('unsg_country').GetName]!"  #NT!
  
 unsg_country:0 "Heimatland des UN-Generalsekretärs"  #NT!
 unsg_character:0 "UN-Generalsekretär"  #NT!
  
 un_sanctions_1:0 "Diplomatische Sanktionen der Vereinten Nationen"  #NT!
 un_sanctions_2:0 "Politische Sanktionen der UN"  #NT!
 un_sanctions_3:0 "UN-Wirtschaftssanktionen"  #NT!
 un_embargo_participant:0 "Teilnehmer an Wirtschaftssanktionen der Vereinten Nationen"  #NT!
  
 UN_sanctions_system.t:0 "Sanktionen gegen [SCOPE.sCountry('UN_sanctions_target').GetName] verhängt"  #NT!
 UN_sanctions_system.d:0 "Die Vereinten Nationen haben auf Drängen ihres Generalsekretärs beschlossen, Sanktionen gegen [SCOPE.sCountry('UN_sanctions_target').GetName] zu verhängen, um das Land wegen Verstößen gegen das Völkerrecht zu bestrafen."  #NT!
 UN_sanctions_system.f:0 "Die UN-Sanktionen bleiben aktiv, bis die Schande von [SCOPE.sCountry('UN_sanctions_target').GetName] auf „seriös“ reduziert wird. Einige Sanktionen könnten jedoch im Laufe der Zeit aufgehoben werden, wenn unser Land weniger berüchtigt ist."  #NT!
 UN_sanctions_option:0 "Bringen Sie unseren starken Unmut über die Generalversammlung der Vereinten Nationen zum Ausdruck."  #NT!
  
 UN_sanctions_system_embargo.t:0 "UN fordert Sanktionen gegen [SCOPE.sCountry('un_sanctions_embargoed_country').GetName]"  #NT!
 UN_sanctions_system_embargo.d:0 "Aufgrund der eklatanten Verstöße gegen das Völkerrecht durch [SCOPE.sCountry('un_sanctions_embargoed_country').GetName] hat der UN-Generalsekretär alle Mitglieder der UN-Generalversammlung aufgefordert, ein Embargo gegen den Schurkenstaat zu verhängen. Die Teilnahme am UN-Plan wird [SCOPE.sCountry('un_sanctions_embargoing_country').GetName] großes internationales Wohlwollen bringen"  #NT!
 UN_sanctions_system_embargo.f:0 "Beachten Sie, dass das Embargo gegen [SCOPE.sCountry('un_sanctions_embargoed_country').GetName] nicht aufgehoben werden kann, bis die UN-Sanktionen gegen das Land aufgehoben wurden."  #NT!
 UN_sanctions_system_embargo_option.1:0 "Beginnen Sie mit dem Embargo!"  #NT!
 UN_sanctions_system_embargo_option.2:0 "Nein, wir müssen mit ihnen handeln."  #NT!
  
 UN_sanctions_system_end.t:0 "UN-Sanktionen aufgehoben"  #NT!
 UN_sanctions_system_end.d:0 "Der UN-Generalsekretär hat einige oder alle Sanktionen gegen [SCOPE.sCountry('UN_sanctions_target').GetName] aufgrund unserer geringeren Schande aufgehoben."  #NT!
 UN_sanctions_system_end.f:0 "Die verschiedenen UN-Sanktionen werden entsprechend dem Grad der Schande, den [SCOPE.sCountry('UN_sanctions_target').GetName] hat, aufgehoben."  #NT!
 UN_sanctions_end_option:0 "Großartig!"  #NT!
  
 request_un_peacekeeping_decision:0 "Antrag auf UN-Friedenssicherung"  #NT!
 request_un_peacekeeping_decision_desc:0 "Wir können der UN-Generalversammlung eine Resolution vorlegen, in der wir unsere Feinde auffordern, ihre Feindseligkeiten gegen uns sofort einzustellen, oder wir drohen mit kollektiven Maßnahmen der UN gegen sie. Ob dies möglich ist, bedarf jedoch der Zustimmung des UN-Sicherheitsrats und der UN-Generalversammlung."  #NT!
 UNSC_peacekeeping_resolution.t:0 "UN-Resolution: In [SCOPE.sCountry('un_peacekeeping_applicant').GetName]s Konflikt eingreifen?"  #NT!
 UNSC_peacekeeping_resolution.d:0 "[SCOPE.sCountry('un_peacekeeping_applicant').GetName] hat der Generalversammlung der Vereinten Nationen eine Resolution vorgelegt, in der ein von den Vereinten Nationen unterstützter Waffenstillstand in ihrem anhaltenden Konflikt gefordert wird. Gemäß dem Protokoll der Vereinten Nationen ist der Sicherheitsrat das Gremium, das mit der Gewährleistung des internationalen Friedens beauftragt ist. Daher stimmen seine Mitglieder zunächst darüber ab, ob sie die Resolution unterstützen. Nur wenn die Resolution im Sicherheitsrat der Vereinten Nationen angenommen wird, wird sie zur endgültigen Genehmigung an die Generalversammlung der Vereinten Nationen weitergeleitet."  #NT!
 UNSC_peacekeeping_resolution.f:0 "Beachten Sie, dass eine erfolgreiche Abstimmung für diese Resolution einen Eindämmungskrieg gegen den Aggressor auslösen wird, der von einem zufälligen UN-Sicherheitsratsmitglied angeführt wird, das für die Resolution gestimmt hat."  #NT!
  
 un_peacekeeping_vote.option.1:0 "Stimmen Sie für die Resolution"  #NT!
 un_peacekeeping_vote.option.2:0 "Stimmen Sie GEGEN die Entschließung"  #NT!
 un_peacekeeping_vote.option.3:0 "Enthalten Sie sich der Stimme"  #NT!
  
 UNGA_peacekeeping_resolution_advance.t:0 "Die UN-Friedenssicherungsresolution wird der Generalversammlung der Vereinten Nationen vorgelegt"  #NT!
 UNGA_peacekeeping_resolution_advance.d:0 "Die Resolution, in der die Vereinten Nationen aufgefordert werden, in den Konflikt mit [SCOPE.sCountry('un_peacekeeping_applicant').GetName] einzugreifen, wurde vom Sicherheitsrat der Vereinten Nationen angenommen. Es ist nun auf dem Weg zur Abstimmung durch die Generalversammlung der Vereinten Nationen."  #NT!
 UNGA_peacekeeping_resolution_advance.f:0 "Dieses Ereignis wurde ausgelöst, weil kein ständiges Mitglied des Sicherheitsrates der Vereinten Nationen ein Veto gegen die Resolution einlegte und eine Mehrheit der nichtständigen Mitglieder für die Resolution stimmte."  #NT!
 un_peacekeeping_update:0 "Exzellent"  #NT!
  
 UNGA_peacekeeping_resolution.t:0 "UN-Resolution: In [SCOPE.sCountry('un_peacekeeping_applicant').GetName]s Konflikt eingreifen?"  #NT!
 UNGA_peacekeeping_resolution.d:0 "[SCOPE.sCountry('un_peacekeeping_applicant').GetName] hat der Generalversammlung der Vereinten Nationen eine Resolution vorgelegt, in der ein von den Vereinten Nationen unterstützter Waffenstillstand in ihrem anhaltenden Konflikt gefordert wird. Der UN-Sicherheitsrat hat der Resolution zugestimmt. Ob die Resolution nun von der UN angenommen wird, hängt also davon ab, ob auch die UN-Generalversammlung ihr zustimmt."  #NT!
 UNGA_peacekeeping_resolution.f:0 "Beachten Sie, dass eine erfolgreiche Abstimmung für diese Resolution einen Eindämmungskrieg gegen den Aggressor auslösen wird, der von einem zufälligen UN-Sicherheitsratsmitglied angeführt wird, das für die Resolution gestimmt hat."  #NT!
  
 UN_peacekeeping_resolution_YES.t:0 "UN-Friedensresolution verabschiedet"  #NT!
 UN_peacekeeping_resolution_YES.d:0 "Die Resolution von [SCOPE.sCountry('un_peacekeeping_applicant').GetName], die einen von den Vereinten Nationen unterstützten Waffenstillstand in ihrem anhaltenden Konflikt fordert, wurde im UN-Sicherheitsrat und in der Generalversammlung der Vereinten Nationen verabschiedet. Der UN-Generalsekretär wird nun im Namen der UN ein Ultimatum stellen und alle Aggressoren im Konflikt auffordern, einem Weißen Frieden zuzustimmen oder sich einem Eindämmungskrieg zu stellen."  #NT!
 UN_peacekeeping_resolution_YES.f:0 "Die UN werden einen Eindämmungskrieg gegen jedes Aggressorland starten, das das Ultimatum der UN abgelehnt hat."  #NT!
  
 UN_peacekeeping_ultimatum.t:0 "Ultimatum der Vereinten Nationen"  #NT!
 UN_peacekeeping_ultimatum.d:0 "Der Generalsekretär der Vereinten Nationen ist mit einem Ultimatum an [SCOPE.sCountry('un_peacekeeping_aggressor').GetName] herangetreten: Unterzeichnen Sie einen Weißen Frieden mit [SCOPE.sCountry('un_peacekeeping_applicant').GetName], sonst müssen sie einen Eindämmungskrieg gegen uns beginnen, angeführt von einem Mitglied des Sicherheitsrates der Vereinten Nationen."  #NT!
 UN_peacekeeping_ultimatum.f:0 "Dem internationalen Druck nachzugeben, wird als nationale Demütigung empfunden und wird in unserem Land große Unruhe auslösen."  #NT!
 un_peacekeeping_ultimatum.option.1:0 "Wir akzeptieren das Ultimatum"  #NT!
 un_peacekeeping_ultimatum.option.2:0 "Über meine Leiche!"  #NT!
  
 un_intervene_in_war.tt:0 "Verbinde jedes [concept_war] zwischen [SCOPE.sCountry('un_peacekeeping_applicant').GetName] und [SCOPE.sCountry('un_peacekeeping_aggressor').GetName], wobei [SCOPE.sCountry('un_peacekeeping_applicant').GetName] das [concept_war_leader] und nicht der Angreifer ist"  #NT!
 UN_peacekeeping_join_war.t:0 "UN-Friedensmission zur Hilfe [SCOPE.sCountry('un_peacekeeping_applicant').GetName]"  #NT!
 UN_peacekeeping_join_war.d:0 "Mit Genehmigung des Sicherheitsrats der Vereinten Nationen hat der UN-Generalsekretär eine Friedenstruppe aufgestellt, um [SCOPE.sCountry('un_peacekeeping_applicant').GetName] in seinem Verteidigungskrieg gegen [SCOPE.sCountry('un_peacekeeping_aggressor').GetName] zu unterstützen."  #NT!
 UN_peacekeeping_join_war.f:0 "Der Beitritt zur Friedensmission führt dazu, dass [ROOT.GetCountry.GetName] sich in jedem [concept_diplomatic_play] zwischen ihnen und [SCOPE.sCountry('un_peacekeeping_aggressor').GetName] der Seite von [SCOPE.sCountry('un_peacekeeping_applicant').GetName] anschließt."  #NT!
 UN_peacekeeping_join_war.option.1:0 "Schicken Sie unsere Truppen zur Hilfe [SCOPE.sCountry('un_peacekeeping_applicant').GetName]!"  #NT!
 UN_peacekeeping_join_war.option.2:0 "Sie können für sich selbst sorgen."  #NT!
  
 UN_peacekeeping_resolution_NO.t:0 "UN-Friedensresolution scheitert"  #NT!
 UN_peacekeeping_resolution_NO.d:0 "Die Resolution von [SCOPE.sCountry('un_peacekeeping_applicant').GetName], die einen von den Vereinten Nationen unterstützten Waffenstillstand in ihrem anhaltenden Konflikt fordert, wurde von den Vereinten Nationen abgelehnt. Der UN-Generalsekretär macht die Mitglieder der Organisation für die Untätigkeit verantwortlich."  #NT!
 UN_peacekeeping_resolution_NO.f:0 "Die UN-Friedenssicherungsresolution scheiterte, weil entweder ein Ständiges Mitglied des UN-Sicherheitsrates ihr Veto einlegte oder die Resolution weder im UN-Sicherheitsrat noch in der Generalversammlung der Vereinten Nationen eine einfache Mehrheit erhielt. \n\nUNSC-Vetoer: [SCOPE.sCountry('un_peacekeeping_vetoer').GetName]"  #NT!
 un_peacekeeping_fails:0 "Die UNO ist wirklich nutzlos!"  #NT!
  
 un_mandate_creation.tt:0 "Eine UN $mandate$ wird über [SCOPE.sState('state_to_release').GetName] erstellt"  #NT!
 UN_peacekeeping_resolution_mandate.t:0 "UN-Demontage von [ROOT.GetCountry.GetName]"  #NT!
 UN_peacekeeping_resolution_mandate.d:0 "Im Rahmen der UN-Friedensmission wird [ROOT.GetCountry.GetName] abgebaut. Das bedeutet, dass allen [ROOT.GetCountry.GetAdjective] Territorien, in denen es kein [concept_homeland] gibt, durch eine Treuhandgebietsvereinbarung der Vereinten Nationen Selbstverwaltung gewährt wird."  #NT!
 UN_peacekeeping_resolution_mandate.f:0 "Dieses Ereignis wird ein dynamisches Länder-Tag in einem [concept_state] freigeben, das kein [concept_homeland] von [concept_primary_cultures] von [ROOT.GetCountry.GetName] ist."  #NT!
