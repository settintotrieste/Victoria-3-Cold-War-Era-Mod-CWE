 colonial_empire_bankroll.t:0 "[SCOPE.sCountry('colonial_empire_debtor').GetName] Erfordert finanzielle Unterstützung"  #NT!
 colonial_empire_bankroll.d:0 "Der [concept_government] von [SCOPE.sCountry('colonial_empire_debtor').GetName] steckt in großen finanziellen Schwierigkeiten und benötigt dringend finanzielle Unterstützung von seinem [concept_overlord]. Als [concept_overlord] sind wir gesetzlich an [concept_bankroll_subject] [SCOPE.sCountry('colonial_empire_debtor').GetAdjective] Staatsfinanzen gebunden, bis ihre Schulden beglichen sind und ihr Volkseinkommen positiv ist."  #NT!
