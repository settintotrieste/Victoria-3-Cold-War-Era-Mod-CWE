 concept_upper_house:0 "Oberhaus"  #NT!
 concept_upper_house_desc:0 "Ein Oberhaus ist eine von zwei Kammern einer Zweikammer-Legislative, die andere Kammer ist das Unterhaus. Das offiziell als Oberhaus bezeichnete Haus ist normalerweise kleiner und verfügt oft über eingeschränktere Macht als das Unterhaus."  #NT!
 concept_lower_house:0 "Unterhaus"  #NT!
 concept_lower_house_desc:0 "Ein Unterhaus ist eine von zwei Kammern einer Zweikammer-Legislative, die andere Kammer ist das Oberhaus. Trotz seiner offiziellen Position „unterhalb“ des Oberhauses verfügt das Unterhaus in vielen Parlamenten weltweit über mehr Macht oder übt auf andere Weise erheblichen politischen Einfluss aus."  #NT!
  
