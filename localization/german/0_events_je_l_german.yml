 je_lower_house_reason:0 "Das [SCOPE.GetRootScope.GetCountry.GetCustom('lower_house_name')] ist das demokratisch gewählte Parlament von [ROOT.GetCountry.GetName], das für die Gesetzgebung und die Kontrolle der Regierungsarbeit verantwortlich ist. \n\nDer [concept_government] muss mindestens eine einfache Mehrheit von [SCOPE.GetRootScope.GetCountry.GetCustom('MPs_name')] im [SCOPE.GetRootScope.GetCountry.GetCustom('lower_house_name')] haben, um einen [concept_law] zu bestehen. \n\nRegierungskontrolle: #BOLD [GetPlayer.MakeScope.Var('lower_house_majority_var').GetValue]%#!. \n\nHinweis:[SCOPE.GetRootScope.GetCountry.GetCustom('lower_house_voting_system_label')]"  #NT!
