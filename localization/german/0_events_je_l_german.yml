 je_constitutional_monarchy_reason:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('monarch_custom_title')] [SCOPE.sCharacter('constitutional_monarch_scope').GetFullName] ist das zeremonielle Staatsoberhaupt von [ROOT.GetCountry.GetName]. \n\nObwohl der [SCOPE.GetRootScope.GetCountry.GetCustom('monarch_custom_title')] von [ROOT.GetCountry.GetNameNoFormatting] keine Exekutivgewalt ausübt, bleibt der [SCOPE.GetRootScope.GetCountry.GetCustom('monarch_custom_title')] dennoch eine äußerst einflussreiche Figur im Land, da er ein sichtbares Symbol der nationalen Einheit ist. [SCOPE.GetRootScope.GetCountry.GetCustom('monarchy_type_custom_desc')] [SCOPE.GetRootScope.GetCountry.GetCustom('viceroy_monarchy_type_custom_desc')]"  #NT!
