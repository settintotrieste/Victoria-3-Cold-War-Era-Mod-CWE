 je_piracy_system:0 "Piraterie in [ROOT.GetCountry.GetAdjectiveNoFlag] Gewässern"  #NT!
 je_piracy_system_reason:0 "Piraterie und bewaffnete Raubüberfälle auf See gehören nicht der Vergangenheit an. Diese modernen Bedrohungen plagen weiterhin die maritime Industrie und gefährden die Sicherheit von Seeleuten und Schiffen weltweit. Ihre Folgen gehen weit über die unmittelbare Gefahr hinaus – sie haben weitreichende Auswirkungen auf Schifffahrtsunternehmen, stören den Welthandel und destabilisieren ganze Regionen. \n\nUmwege aufgrund von Piraterie-Hotspots verlängern die Schifffahrtsrouten erheblich. Dies führt zu einem höheren Kraftstoffverbrauch, längeren Reisezeiten und letztendlich zu höheren Transportkosten für Verbraucher und Unternehmen. Darüber hinaus treibt das erhöhte Risiko die Versicherungsprämien für Schiffe und Fracht in die Höhe. Diese zusätzliche Kostenbelastung wirkt sich zusätzlich auf die Reedereien aus und wird möglicherweise auf die Verbraucher abgewälzt. \n\nAndererseits stört Piraterie den reibungslosen Warenfluss auf der ganzen Welt. Verzögerungen oder Umleitungen der Fracht können zu Engpässen, Preisschwankungen und unzuverlässigen Lieferplänen führen. Dies kann ganze Lieferketten beeinträchtigen und die Wirtschaftstätigkeit behindern."  #NT!
