 je_request_warsaw_pact_intervention_button:0 "Rufen Sie Artikel 4 auf"  #NT!
 je_request_warsaw_pact_intervention_button_desc:0 "Im Falle eines bewaffneten Angriffs in Europa auf einen oder mehrere Unterzeichnerstaaten des Vertrags durch einen Staat oder eine Staatengruppe hat jeder Vertragsstaat dieses Vertrags in Ausübung des Rechts auf individuelle oder kollektive Selbstverteidigung gemäß Artikel 51 der Charta der Organisation der Vereinten Nationen dem oder den angegriffenen Staaten einzeln und im Einvernehmen mit anderen Vertragsstaaten dieses Vertrags unverzüglich Hilfe zu leisten, und zwar mit allen Mitteln, die er für erforderlich hält, einschließlich der Anwendung bewaffneter Gewalt."  #NT!
  
