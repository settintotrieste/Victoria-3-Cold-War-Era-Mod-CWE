 je_vote_of_no_confidence_system_1.tt:0 "Die Regierung verliert das Misstrauensvotum"  #NT!
 je_vote_of_no_confidence_system_2.tt:0 "Die Regierung gewinnt das Misstrauensvotum"  #NT!
 je_vote_of_no_confidence_system:0 "Misstrauensvotum"  #NT!
 je_vote_of_no_confidence_system_reason:0 "Unter dem parlamentarischen System von [ROOT.GetCountry.GetName] kann der [concept_government] nur dann im Amt bleiben, wenn er das Vertrauen des Parlaments genießt. \n\nDa der aktuellen Regierung weniger als 50 % der Sitze im [ROOT.GetCountry.GetAdjective]-Parlament fehlen, hat das [concept_opposition] ein Misstrauensvotum eingereicht, um die Regierung zu stürzen und Neuwahlen in 100 Tagen auszurufen. Daher ist es für die Regierung von entscheidender Bedeutung, sicherzustellen, dass sie nach Ablauf des Timers über 25 oder mehr [concept_legitimacy] verfügt."  #NT!
  
