 british_rhodesia_nyasaland.sgc.t:0 "Föderation Rhodesien und Njassaland?"  #NT!
 british_rhodesia_nyasaland.sgc.d:0 "Die Föderation Rhodesien und Njassaland, auch Zentralafrikanische Föderation (CAF) genannt, war eine Kolonialföderation, die aus drei südafrikanischen Territorien bestand: der selbstverwalteten britischen Kolonie Südrhodesien und den britischen Protektoraten Nordrhodesien und Njassaland."  #NT!
 british_malaysia.sgc.t:0 "Gründung Malaysias?"  #NT!
 british_malaysia.sgc.d:0 "Die Föderation Malaysia entstand nach dem Zusammenschluss der Föderation Malaya, Singapur, Nord-Borneo (Sabah) und Sarawak am 16. September 1963."  #NT!
 british_decolonisation.20.option.1:0 "Geben Sie die Kolonien an Malaya ab"  #NT!
 british_decolonisation.20.option.2:0 "Die Kolonien bleiben britisch!"  #NT!
 british_west_indies.sgc.t:0 "Die West Indies Federation gründen?"  #NT!
 british_west_indies.sgc.d:0 "Die West Indies Federation war eine kurzlebige politische Union, die vom 3. Januar 1958 bis zum 31. Mai 1962 bestand. Verschiedene Inseln in der Karibik, die Teil des Britischen Empire waren, darunter Trinidad und Tobago, Barbados, Jamaika sowie die Inseln unter dem Winde und unter dem Winde, schlossen sich zur Föderation mit der Hauptstadt Port of Spain, Trinidad und Tobago, zusammen. Die erklärte Absicht der Föderation bestand darin, eine politische Einheit zu schaffen, die als einzelner Staat von Großbritannien unabhängig werden sollte."  #NT!
 british_singapore.sgc.t:0 "Selbstverwaltung in Singapur?"  #NT!
 british_singapore.sgc.d:0 "$generic_self_rule_decolonisation_loc_desc$"  #NT!
 british_singapore_state.sgc.t:0 "Mehr Autonomie für Singapur?"  #NT!
 british_singapore_state.sgc.d:0 "Im Rahmen der Dekolonisierung und des zunehmenden britischen Rückzugs aus Malaya hatten Verfassungsgespräche über die Selbstverwaltung Singapurs zwischen dem britischen Kolonialamt in London und der gesetzgebenden Versammlung von Singapur bereits 1958 zur Verfassung des Staates Singapur und zu einer vollständig gewählten und selbstverwalteten gesetzgebenden Versammlung mit 51 Sitzen im Jahr 1959 geführt, wobei das Amt des Gouverneurs abgeschafft wurde."  #NT!
