 je_national_values:0 "[ROOT.GetCountry.GetAdjectiveNoFlag] Nationale Werte"  #NT!
 je_national_values_reason:0 "Der nationale Wert eines Landes ist eine Darstellung des überragenden Wertes, der im gesamten gemeinsamen kulturellen Erlebnis der Nation gewahrt bleibt. \n\nDer nationale Wert von [ROOT.GetCountry.GetName] ändert sich entsprechend dem [concept_ideology] des [concept_interest_group] mit mehr als 50 % [concept_clout] im Land. \n\nAktueller nationaler Wert: #BOLD [SCOPE.GetRootScope.GetCountry.GetCustom('national_value_name')]#! \n\nHinweis: \n\n- Ein [concept_interest_group] mit dem $ideology_totalitarian$ oder $ideology_authoritarian$ [concept_ideology] unterstützt den [concept_ideology]1. \n\n- Ein [concept_interest_group] mit dem [concept_ideology]3 [concept_ideology] unterstützt den [concept_ideology]5. \n\n- Ein [concept_interest_group] mit dem [concept_ideology]7 [concept_ideology] unterstützt den [concept_ideology]9."  #NT!
  
