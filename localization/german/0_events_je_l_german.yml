 nato_member:0 "NATO-Mitglied"  #NT!
 nato_leader:0 "NATO-Führer"  #NT!
 form_nato_decision:0 "Gründung der Nordatlantikpakt-Organisation (NATO)"  #NT!
 form_nato_decision_desc:0 "Die NATO ist ein kollektives Sicherheitssystem: Ihre unabhängigen Mitgliedsstaaten verpflichten sich, sich gegenseitig gegen Angriffe Dritter zu verteidigen. Während des Kalten Krieges fungierte die NATO als Eindämmung der Bedrohung durch die Sowjetunion. Das Bündnis blieb auch nach der Auflösung der Sowjetunion und des Warschauer Pakts bestehen und war an Militäreinsätzen auf dem Balkan, im Nahen Osten, in Südasien und in Afrika beteiligt."  #NT!
 join_nato_decision:0 "Treten Sie der Nordatlantikpakt-Organisation (NATO) bei."  #NT!
 join_nato_decision_desc:0 "Die NATO ist ein kollektives Sicherheitssystem: Ihre unabhängigen Mitgliedsstaaten verpflichten sich, sich gegenseitig gegen Angriffe Dritter zu verteidigen. Während des Kalten Krieges fungierte die NATO als Eindämmung der Bedrohung durch die Sowjetunion. Das Bündnis blieb auch nach der Auflösung der Sowjetunion und des Warschauer Pakts bestehen und war an Militäreinsätzen auf dem Balkan, im Nahen Osten, in Südasien und in Afrika beteiligt. Hinweis: Die Bearbeitung Ihres Antrags dauert normalerweise etwa einen Monat."  #NT!
