 je_cultural_suppression_system:0 "Kulturelle Unterdrückung in [ROOT.GetCountry.GetName]"  #NT!
 je_cultural_suppression_system_reason:0 "Die [ROOT.GetCountry.GetAdjective]-Regierung unterdrückt diskriminierte Personen in [ROOT.GetCountry.GetName] systematisch durch eine Kombination unethischer Praktiken.\n\n1 % einer zufällig diskriminierten [concept_culture]- und/oder [concept_religion]-Populationsgruppe wird jeden Monat voreingenommen, bis entweder alle diskriminierten Pops [ROOT.GetCountry.GetName] verlassen haben oder das $law_slavery_cultural$-Gesetz aufgehoben wird."  #NT!
 je_cultural_suppression_system.tt:0 "Es gibt keine diskriminierten Pops mehr im Land"  #NT!
  
 cultural_suppression_discovered.t:0 "Kulturelle Unterdrückung in [SCOPE.sCountry('country_committing_cultural_suppression').GetName]"  #NT!
 cultural_suppression_discovered.d:0 "Internationale Beobachter haben herausgefunden, dass [SCOPE.sCountry('country_committing_cultural_suppression').GetName] ein Programm zur Ausrottung seiner gesamten diskriminierten Bevölkerung durchführt. Diese Enthüllung hat die internationale Gemeinschaft schockiert, da prominente Persönlichkeiten wie der UN-Generalsekretär [SCOPE.sCountry('country_committing_cultural_suppression').GetName] scharf verurteilten. Wie soll [ROOT.GetCountry.GetName] auf dieses Verbrechen gegen die Menschlichkeit reagieren?"  #NT!
 cultural_suppression_discovered.f:0 "Die Stärke der internationalen Verurteilung von [SCOPE.sCountry('country_committing_cultural_suppression').GetName] wird von der Anzahl der Länder abhängen, die sich entschieden haben, die kulturelle Unterdrückung zu verurteilen."  #NT!
 cultural_suppression_system_option.1:0 "Verurteile [SCOPE.sCountry('country_committing_cultural_suppression').GetName] für ihre Barbarei!"  #NT!
 cultural_suppression_system_option.2:0 "Sag nichts."  #NT!
  
 cultural_suppression_discovered_notice.t:0 "Programm zur kulturellen Unterdrückung in [ROOT.GetCountry.GetName] aufgedeckt"  #NT!
 cultural_suppression_discovered_notice.d:0 "Internationale Beobachter haben herausgefunden, dass [ROOT.GetCountry.GetName] ein Programm zur Ausrottung seiner gesamten diskriminierten Bevölkerung durchführt. Diese Enthüllung hat die internationale Gemeinschaft schockiert, da prominente Persönlichkeiten wie der UN-Generalsekretär [SCOPE.sCountry('country_committing_cultural_suppression').GetName] scharf verurteilten."  #NT!
 cultural_suppression_discovered_notice.f:0 "[ROOT.GetCountry.GetName] erhält 1 Schande von jedem Land, das es wegen der Begehung kultureller_Unterdrückung verurteilt hat, und kann auch von den Vereinten Nationen für die Begehung eines solchen Verbrechens gegen die Menschlichkeit sanktioniert werden."  #NT!
 cultural_suppression_system_notice_option:0 "Nun ja..."  #NT!
  
 je_espionage_system:0 "Durchführung feindseliger Spionage"  #NT!
 je_espionage_system_reason:0 "[ROOT.GetCountry.GetAdjective] Geheimdienste haben Agenten ins Ausland entsandt, um feindliche verdeckte Aktivitäten gegen unsere ausländischen Feinde durchzuführen.\n\n[ROOT.GetCountry.GetName] erhält die Gelegenheit, 1 zufällig ausgewähltes ausgewähltes Land anzugreifen, sobald der Fortschrittsbalken voll ist.\n\nEs dauert länger, bis der Fortschrittsbalken gefüllt ist, je mehr Länder [ROOT.GetCountry.GetName] feindliche Spionage betreiben."  #NT!
 je_espionage_system_1_tt:0 "Dieses Land betreibt keine feindselige Spionage mehr gegen irgendein Land"  #NT!
 je_espionage_system_2_tt:0 "Dieses Land betreibt feindselige Spionage gegen mindestens ein Land"  #NT!
  
 je_subverted_civil_service_3.tt:0 "Der $ig_intelligentsia$ [concept_interest_group] hat nicht den gleichen [concept_ideology] wie der stärkste [concept_interest_group] im [concept_government]"  #NT!
 je_subverted_civil_service_2.tt:0 "Der $ig_intelligentsia$ [concept_interest_group] hat den gleichen [concept_ideology] wie der stärkste [concept_interest_group] im [concept_government]"  #NT!
 je_subverted_civil_service_1.tt:0 "Der öffentliche Dienst wird untergraben und sein Leiter wird durch einen ersetzt, der ideologisch mit der [concept_ruler] verbunden ist"  #NT!
 je_subvert_civil_service:0 "Säuberung des öffentlichen Dienstes"  #NT!
 je_subvert_civil_service_reason:0 "Da [ROOT.GetCountry.GetName] über die $law_politicised_bureaucrats$ [concept_law] verfügt, ist die [concept_government] in der Lage, Beamte zu nominieren, die die gleichen ideologischen Überzeugungen teilen wie die mächtigsten [concept_interest_group] in der [concept_government]. Dies bedeutet, dass der öffentliche Dienst bei ausreichend langer Zeitspanne vollständig auf die ideologischen Überzeugungen der [concept_government] umgestellt wird. \n\nEs würde jeden Monat eine zufällige Chance geben, dass ein [concept_ideology] der $ig_intelligentsia$ so geändert wird, dass er dem des mächtigsten [concept_interest_group] im [concept_government] entspricht."  #NT!
  
 je_evolved_civil_service_3.tt:0 "Der $ig_intelligentsia$ [concept_interest_group] hat nicht den gleichen [concept_ideology] wie der mächtigste [concept_interest_group] im Land"  #NT!
 je_evolved_civil_service_2.tt:0 "Der $ig_intelligentsia$ [concept_interest_group] hat den gleichen [concept_ideology] wie der mächtigste [concept_interest_group] im Land"  #NT!
 je_evolved_civil_service_1.tt:0 "Der öffentliche Dienst ändert seine Ideologie und sein Leiter wird durch einen ersetzt, der ideologisch mit dem Führer der mächtigsten [concept_interest_group] im Land übereinstimmt"  #NT!
 je_evolve_civil_service:0 "Reform des öffentlichen Dienstes"  #NT!
 je_evolve_civil_service_reason:0 "Da [ROOT.GetCountry.GetName] das $law_elitist_bureaucrats$ [concept_law] hat, ist der Nominierungsprozess für den öffentlichen Dienst elitär und politisiert geworden. Dies bedeutet, dass der öffentliche Dienst bei ausreichend langer Zeitspanne vollständig auf die ideologischen Überzeugungen der mächtigsten [concept_interest_group] in [ROOT.GetCountry.GetName] umgestellt wird. \n\nEs würde jeden Monat eine zufällige Chance geben, dass ein [concept_ideology] der $ig_intelligentsia$ so geändert wird, dass er mit dem des mächtigsten [concept_interest_group] in [ROOT.GetCountry.GetName] übereinstimmt."  #NT!
  
 neutralise_civil_service.tt:0 "Machen Sie den öffentlichen Dienst politisch neutral"  #NT!
  
 close_suez_canal_decision:0 "Schließen Sie den Suezkanal"  #NT!
