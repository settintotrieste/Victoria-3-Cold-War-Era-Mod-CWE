 je_civil_service_system:0 "Der [ROOT.GetCountry.GetAdjectiveNoFlag] öffentliche Dienst"  #NT!
 je_civil_service_system_reason:0 "Der öffentliche Dienst [ROOT.GetCountry.GetAdjective] repräsentiert die professionelle Bürokratie, die die Staatsmaschinerie aufrechterhält. Mit der Umsetzung von Gesetzen, der Erhebung von Steuern und der Führung von Aufzeichnungen haben Beamte das Ziel, Kontinuität und Stabilität in sich verändernden politischen Landschaften zu wahren. \n\nLeiter des öffentlichen Dienstes: [SCOPE.sCharacter('head_of_civil_service').GetFullName] \n\nHinweis: Korruption im öffentlichen Dienst kann durch die Einführung strengerer #y $lawgroup_corruption_policy$#! [Concept('concept_law','$concept_laws$')] verringert werden."  #NT!
  
