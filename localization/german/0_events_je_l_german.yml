 USA_civil_rights_movement.t:0 "Die Bürgerrechtsbewegung"  #NT!
 USA_civil_rights_movement.d:0 "Die Bürgerrechtsbewegung war eine soziale Bewegung und Kampagne von 1954 bis 1968 in den Vereinigten Staaten zur Abschaffung der legalisierten Rassentrennung, Diskriminierung und Entrechtung im Land. Die Bewegung hatte ihren Ursprung in der Zeit des Wiederaufbaus im späten 19. Jahrhundert und hatte ihre modernen Wurzeln in den 1940er Jahren, obwohl die Bewegung ihre größten gesetzgeberischen Erfolge in den 1960er Jahren nach Jahren direkter Aktionen und Basisproteste erzielte. Die großen gewaltfreien Widerstands- und zivilen Ungehorsamskampagnen der sozialen Bewegung sorgten schließlich dafür, dass die Bürgerrechte aller Amerikaner im Bundesrecht neuen Schutz erhielten."  #NT!
 USA_assassinate_MLK.t:0 "Die Ermordung von Martin Luther King Jr.?"  #NT!
 USA_assassinate_MLK.d:0 "Martin Luther King Jr., ein afroamerikanischer Geistlicher und Anführer der Bürgerrechtsbewegung, wurde am 4. April 1968 um 18:01 Uhr im Lorraine Motel in Memphis, Tennessee, tödlich erschossen. CST. Er wurde ins St. Joseph's Hospital gebracht, wo er um 19:05 Uhr verstarb. Er war ein prominenter Anführer der Bürgerrechtsbewegung und Friedensnobelpreisträger, der für seinen Einsatz von Gewaltlosigkeit und zivilem Ungehorsam bekannt war."  #NT!
 USA_blm_protests.t:0 "Die George-Floyd-Proteste"  #NT!
 USA_blm_protests.d:0 "Die Proteste gegen George Floyd waren eine Reihe von Protesten gegen Polizeibrutalität, die am 26. Mai 2020 in Minneapolis in den Vereinigten Staaten begannen. Die Unruhen und Proteste begannen als Teil internationaler Reaktionen auf die Ermordung von George Floyd, einem 46-jährigen Afroamerikaner, während einer Festnahme. Die Proteste breiteten sich schnell im ganzen Land und in über 2.000 Städten und Gemeinden in über 60 Ländern aus, um die Black Lives Matter (BLM)-Bewegung zu unterstützen. Umfragen zufolge beteiligten sich irgendwann zwischen 15 und 26 Millionen Menschen an den Demonstrationen in den Vereinigten Staaten, was die Proteste zu den größten in der Geschichte der USA machte."  #NT!
 GBR_1967_HKG_riots.t:0 "Die antikolonialen Unruhen in Hongkong"  #NT!
 GBR_1967_HKG_riots.d:0 "Bei den Unruhen in Hongkong im Jahr 1967 handelte es sich um groß angelegte regierungsfeindliche Unruhen, die während der britischen Kolonialherrschaft in Hongkong stattfanden. Die Demonstrationen begannen als kleiner Arbeitskonflikt und eskalierten schließlich zu Protesten gegen die Kolonialregierung. Die Proteste waren teilweise von erfolgreichen antikolonialen Demonstrationen im portugiesischen Macau inspiriert, die einige Monate zuvor stattgefunden hatten."  #NT!
 POR_1966_MCA_riots.t:0 "Der 12-3-Vorfall"  #NT!
 POR_1966_MCA_riots.d:0 "Bei dem Vorfall 12-3 handelte es sich um eine Reihe politischer Demonstrationen und Unruhen gegen die portugiesische Kolonialherrschaft in Macau, die am 3. Dezember 1966 stattfanden. Der von der Kulturrevolution in der Volksrepublik China (Festlandchina) inspirierte Vorfall ereignete sich als direkte Reaktion auf ein gewaltsames Vorgehen der Polizei durch die Kolonialbehörden gegen örtliche chinesische Demonstranten, die in Macau gegen Korruption und Kolonialismus demonstrierten."  #NT!
 PRC_2014_HKG_protests.t:0 "Die Regenschirmbewegung"  #NT!
 PRC_2014_HKG_protests.d:0 "Vom 26. September bis 15. Dezember 2014 kam es in Hongkong zu einer Reihe von Sitzstreiks auf der Straße, die oft als „Umbrella-Revolution“ bezeichnet und manchmal synonym mit „Umbrella-Bewegung“ oder „Occupy-Bewegung“ verwendet werden. Die Proteste begannen, nachdem der Ständige Ausschuss des Nationalen Volkskongresses (NPCSC) eine Entscheidung über vorgeschlagene Reformen des Wahlsystems in Hongkong getroffen hatte. Die Entscheidung wurde allgemein als äußerst restriktiv angesehen und kam einer Vorprüfung der Kandidaten für das Amt des Regierungschefs von Hongkong durch die Kommunistische Partei Chinas (KPCh) gleich."  #NT!
 PRC_2019_HKG_protests.t:0 "Die Proteste in Hongkong"  #NT!
 PRC_2019_HKG_protests.d:0 "Bei den Protesten in Hongkong 2019–2020 handelte es sich um eine Reihe von Demonstrationen gegen die Einführung eines Gesetzesentwurfs der Regierung Hongkongs zur Änderung der Verordnung über flüchtige Straftäter im Hinblick auf die Auslieferung. Es war die größte Demonstrationsserie in der Geschichte Hongkongs. Die Demonstranten forderten den Rücktritt der Vorstandsvorsitzenden Carrie Lam sowie das allgemeine Wahlrecht für den Legislativrat und die Vorstandswahlen."  #NT!
 protests_of_1968.t:0 "Die Proteste von 1968"  #NT!
 protests_of_1968.d:0 "Die Proteste von 1968 führten zu einer weltweiten Eskalation sozialer Konflikte, die vor allem durch den Aufstieg linker Politik, Antikriegsstimmung, Dringlichkeit der Bürgerrechte, jugendliche Gegenkultur innerhalb der Schweige- und Babyboomer-Generation sowie Volksaufstände gegen staatliche Militärs und Bürokratien gekennzeichnet waren."  #NT!
 JAP_Sanrizuka_Struggle.t:0 "Der Sanrizuka-Kampf"  #NT!
 JAP_Sanrizuka_Struggle.d:0 "Der Sanrizuka-Kampf bezieht sich auf einen Bürgerkrieg und Unruhen, an denen die japanische Regierung und die Agrargemeinde von Sanrizuka beteiligt sind und die organisierten Widerstand von Bauern, Anwohnern und linken Gruppen gegen den Bau des Narita International Airport (damals New Tokyo International Airport) umfassen. Der Kampf entstand aus der Entscheidung der Regierung, den Flughafen in Sanrizuka ohne Beteiligung oder Zustimmung der meisten Anwohner zu bauen."  #NT!
 JAP_sarin_attack.t:0 "Der Sarin-Angriff in der Tokioter U-Bahn"  #NT!
 JAP_sarin_attack.d:0 "Der Sarin-Anschlag in der Tokioter U-Bahn war ein inländischer Terroranschlag, der am 20. März 1995 in Tokio, Japan, von Mitgliedern der Kultbewegung Aum Shinrikyo verübt wurde. Bei fünf koordinierten Angriffen setzten die Täter während der Hauptverkehrszeit auf drei Linien der Tokioter U-Bahn (damals Teito Rapid Transit Authority) Sarin frei, töteten 13 Menschen, verletzten 50 schwer (von denen einige später starben) und verursachten bei fast 1.000 anderen vorübergehende Sehstörungen."  #NT!
 USA_WTC_attack_1993.t:0 "Der Bombenanschlag auf das World Trade Center"  #NT!
 USA_WTC_attack_1993.d:0 "Der Bombenanschlag auf das World Trade Center 1993 war ein Terroranschlag, der am 26. Februar 1993 verübt wurde, als eine Van-Bombe unter dem Nordturm des World Trade Center-Komplexes in New York City explodierte. Das 606 kg schwere Harnstoff-Nitrat-Wasserstoffgas-verstärkte Gerät sollte den Nordturm in seinen Zwilling, den Südturm, krachen lassen, beide Wolkenkratzer zum Einsturz bringen und Zehntausende Menschen töten. Obwohl dies nicht gelang, tötete es sechs Menschen, darunter eine schwangere Frau, und verursachte über tausend Verletzungen."  #NT!
 USA_WTC_attack_2001.t:0 "Die Anschläge vom 11. September"  #NT!
 USA_WTC_attack_2001.d:0 "Bei den Anschlägen vom 11. September handelte es sich um vier koordinierte islamistische Selbstmordattentate, die Al-Qaida im Jahr 2001 gegen die Vereinigten Staaten verübte. An diesem Morgen entführten 19 Terroristen vier Verkehrsflugzeuge, die von der Ostküste Neuenglands und der Mittelatlantikregion nach Kalifornien fliegen sollten. Die Entführer ließen die ersten beiden Flugzeuge in die Twin Towers des World Trade Centers in New York City krachen und richteten die nächsten beiden Flüge auf Ziele in oder in der Nähe von Washington, D.C., um die Hauptstadt des Landes anzugreifen. Dem dritten Team gelang es, das Pentagon, das Hauptquartier des US-Verteidigungsministeriums, anzugreifen, während das vierte Flugzeug während einer Passagierrevolte im ländlichen Pennsylvania abstürzte."  #NT!
 GBR_London_attack_2005.t:0 "Die Bombenanschläge in London"  #NT!
 GBR_London_attack_2005.d:0 "Bei den Bombenanschlägen vom 7. Juli 2005 in London, auch 7/7 genannt, handelte es sich um eine Serie von vier koordinierten Selbstmordanschlägen islamistischer Terroristen, die sich gegen Pendler richteten, die während der morgendlichen Hauptverkehrszeit mit öffentlichen Verkehrsmitteln in London unterwegs waren. Drei Terroristen zündeten einzeln in schneller Folge drei selbstgebaute Bomben in Zügen der Londoner U-Bahn in Inner London. Später zündete ein vierter Terrorist eine weitere Bombe in einem Doppeldeckerbus am Tavistock Square."  #NT!
 GBR_Brighton_attack_1984.t:0 "Der Bombenanschlag auf das Hotel in Brighton"  #NT!
 GBR_Brighton_attack_1984.d:0 "Am 12. Oktober 1984 versuchte die Provisorische Irisch-Republikanische Armee (IRA), Mitglieder der britischen Regierung im Grand Hotel in Brighton, England, zu ermorden. Eine Zeitbombe mit langer Verzögerung wurde von Patrick Magee im Hotel platziert, bevor Premierministerin Margaret Thatcher und ihr Kabinett zum Parteitag der Konservativen Partei eintrafen. Fünf Menschen wurden getötet, darunter der konservative Abgeordnete und stellvertretende Chief Whip Sir Anthony Berry, und weitere 31 wurden verletzt. Thatcher entkam der Explosion nur knapp."  #NT!
 GER_Munich_Massacre_1972.t:0 "Das Münchner Massaker"  #NT!
 GER_Munich_Massacre_1972.d:0 "Das Münchner Massaker war ein Terroranschlag während der Olympischen Sommerspiele 1972 in München, Westdeutschland, durch acht Mitglieder der palästinensischen militanten Organisation Schwarzer September, die das Olympische Dorf infiltrierten, zwei Mitglieder der israelischen Olympiamannschaft töteten und neun weitere als Geiseln nahmen."  #NT!
 RUS_Moscow_attack_1999.t:0 "Die russischen Wohnungsbombenanschläge"  #NT!
 RUS_Moscow_attack_1999.d:0 "Bei den russischen Wohnungsbombenanschlägen handelte es sich um eine Reihe von Explosionen, die im September 1999 vier Wohnblöcke in den russischen Städten Buinaksk, Moskau und Wolgodonsk erschütterten, mehr als 300 Menschen töteten, mehr als 1.000 verletzten und eine Welle der Angst im ganzen Land verbreiteten. Die Bombenanschläge lösten zusammen mit der Invasion in Dagestan den Zweiten Tschetschenienkrieg aus. Der Umgang des damaligen Ministerpräsidenten Wladimir Putin mit der Krise steigerte seine Popularität enorm und verhalf ihm innerhalb weniger Monate zum Präsidentenamt."  #NT!
 HND_Bombay_attack_1993.t:0 "Die Bombenanschläge von Bombay"  #NT!
 HND_Bombay_attack_1993.d:0 "Bei den Bombenanschlägen von Bombay 1993 handelte es sich um eine Serie von zwölf Terroranschlägen, die am 12. März 1993 in Bombay (heute Mumbai), Maharashtra, stattfanden. Bei den eintägigen Anschlägen kamen 257 Menschen ums Leben und 1.400 wurden verletzt. The attacks were coordinated by Dawood Ibrahim, leader of the Mumbai-based international organised crime syndicate D-Company."  #NT!
 IDO_Bali_attack_2002.t:0 "Die Bombenanschläge auf Bali"  #NT!
 IDO_Bali_attack_2002.d:0 "Am 12. Oktober 2002 kam es im Touristenviertel Kuta auf der indonesischen Insel Bali zu einer Reihe von Bombenanschlägen. Bei dem Angriff kamen 202 Menschen ums Leben (darunter 88 Australier, 38 Indonesier, 23 Briten und Menschen mit mehr als 20 anderen Nationalitäten). Weitere 209 Menschen wurden verletzt. Mehrere Mitglieder der gewalttätigen islamistischen Gruppe Jemaah Islamiyah wurden im Zusammenhang mit den Bombenanschlägen verurteilt, darunter drei Personen, die zum Tode verurteilt wurden."  #NT!
 FRA_Paris_attack_1995.t:0 "Die französischen islamistischen Bombenanschläge"  #NT!
 FRA_Paris_attack_1995.d:0 "Eine Reihe von Angriffen richtete sich 1995 gegen öffentliche Verkehrsmittel in Paris und Lyon sowie gegen eine Schule in Villeurbanne. Sie wurden von der Bewaffneten Islamischen Gruppe Algeriens (GIA) verübt, die den algerischen Bürgerkrieg auf Frankreich ausweiten wollte. Bei den Angriffen kamen acht Menschen ums Leben, alle beim ersten Angriff am 25. Juli. Bei dem Angriff wurden außerdem 190 Menschen verletzt."  #NT!
 USA_Oklahoma_attack_1995.t:0 "Der Bombenanschlag auf Oklahoma City"  #NT!
 USA_Oklahoma_attack_1995.d:0 "Bei dem Bombenanschlag in Oklahoma City handelte es sich um einen inländischen Terroranschlag mit einem Lastwagen auf das Alfred P. Murrah Federal Building in Oklahoma City, Oklahoma, USA, am 19. April 1995, dem zweiten Jahrestag des Endes der Waco-Belagerung. Der Bombenanschlag war der tödlichste Terrorakt in der Geschichte der USA vor den Anschlägen vom 11. September 2001. Der von zwei regierungsfeindlichen Extremisten und weißen Rassisten, Timothy McVeigh und Terry Nichols, verübte Bombenanschlag ereignete sich um 9:02 Uhr und tötete 168 Menschen, 680 wurden verletzt und zerstörte mehr als ein Drittel des Gebäudes, das abgerissen werden musste."  #NT!
 HND_Operation_Blue_Star.t:0 "Operation Blue Star?"  #NT!
 HND_Operation_Blue_Star.d:0 "Die Operation Blue Star war eine Operation der indischen Streitkräfte zwischen dem 1. und 10. Juni 1984, um den Sikh-Kämpfer Jarnail Singh Bhindranwale und andere Sikh-Separatisten aus den Gebäuden des Goldenen Tempels, der heiligsten Stätte des Sikhismus, zu vertreiben. Die Militäraktion in der Tempelanlage wurde von Sikhs weltweit kritisiert und als Angriff auf die Sikh-Religion und die gesamte Sikh-Gemeinschaft interpretiert."  #NT!
 HND_Anti_Sikh_Riots.t:0 "Die Anti-Sikh-Unruhen"  #NT!
 HND_Anti_Sikh_Riots.d:0 "Die Anti-Sikh-Unruhen von 1984, auch bekannt als das Sikh-Massaker von 1984, waren eine Reihe organisierter Pogrome gegen Sikhs in Indien nach der Ermordung von Indira Gandhi durch ihre Sikh-Leibwächter. Nach Schätzungen der Regierung wurden in Delhi etwa 2.800 Sikhs und landesweit 3.350 getötet."  #NT!
 ITA_Piazza_Fontana_attack_1969.t:0 "Der Bombenanschlag auf die Piazza Fontana"  #NT!
 ITA_Piazza_Fontana_attack_1969.d:0 "Der Bombenanschlag auf die Piazza Fontana war ein Terroranschlag, der am 12. Dezember 1969 stattfand, als eine Bombe im Hauptquartier der Banca Nazionale dell'Agricoltura (der Nationalen Landwirtschaftsbank) auf der Piazza Fontana (in der Nähe des Doms) in Mailand, Italien, explodierte, wobei 17 Menschen getötet und 88 verletzt wurden. Der Angriff wurde von der Dritten Position, der neofaschistischen paramilitärischen Terroristengruppe Ordine Nuovo, und möglicherweise bestimmten unbestimmten Kollaborateuren durchgeführt."  #NT!
 HND_assassinate_MKG.t:0 "Die Ermordung von Mahatma Gandhi?"  #NT!
 HND_assassinate_MKG.d:0 "Um 17:17 Uhr Am 30. Januar 1948 war Gandhi mit seinen Großnichten im Garten von Birla House (heute Gandhi Smriti) auf dem Weg zu einer Gebetsversammlung, als Nathuram Godse, ein Hindu-Nationalist, aus nächster Nähe mit einer Pistole drei Kugeln in Gandhis Brust schoss. Einigen Berichten zufolge starb Gandhi sofort."  #NT!
 USA_taft_act.t:0 "Der Taft-Hartley Act?"  #NT!
 USA_taft_act.d:0 "Der Labour Management Relations Act von 1947, besser bekannt als Taft-Hartley Act, ist ein Bundesgesetz der Vereinigten Staaten, das die Aktivitäten und Macht von Gewerkschaften einschränkt. Es wurde vom 80. Kongress der Vereinigten Staaten gegen das Veto von Präsident Harry S. Truman erlassen und trat am 23. Juni 1947 in Kraft. Taft-Hartley wurde nach einer großen Streikwelle in den Jahren 1945 und 1946 eingeführt."  #NT!
 PRC_tibetan_uprising.t:0 "Der tibetische Aufstand"  #NT!
 PRC_tibetan_uprising.d:0 "Der tibetische Aufstand von 1959 begann am 10. März 1959, als in Lhasa, der Hauptstadt Tibets, ein Aufstand ausbrach, der seit der Unterzeichnung des Siebzehn-Punkte-Abkommens im Jahr 1951 unter der faktischen Kontrolle der Volksrepublik China (VRC) stand. Der erste Aufstand ereignete sich inmitten allgemeiner chinesisch-tibetischer Spannungen und Verwirrung, weil tibetische Demonstranten befürchteten, die chinesische Regierung könnte den 14. Dalai verhaften Lama. Die Proteste wurden auch durch antichinesische Stimmung und Separatismus angeheizt."  #NT!
 HND_tibetan_movement.t:0 "Der Dalai Lama im Exil?"  #NT!
 HND_tibetan_movement.d:0 "Zu Beginn des tibetischen Aufstands im Jahr 1959 flohen der Dalai Lama und sein Gefolge aus Angst um sein Leben mit Hilfe der Special Activities Division der CIA aus Tibet, überquerten am 30. März 1959 Indien und erreichten am 18. April Tezpur in Assam. Einige Zeit später gründete er die Exilregierung Tibets in Dharamshala, Indien, das oft als „Klein-Lhasa“ bezeichnet wird. Nach der Gründung der Exilregierung siedelte er die etwa 80.000 tibetischen Flüchtlinge, die ihm ins Exil folgten, in landwirtschaftlichen Siedlungen wieder an."  #NT!
 HND_tibetan_movement.option.1:0 "Lass ihn in Indien sein."  #NT!
 HND_tibetan_movement.option.2:0 "Nein danke!"  #NT!
 POL_pope_movement.t:0 "Die Wahl von Papst Johannes Paul II.?"  #NT!
 POL_pope_movement.d:0 "Papst Johannes Paul II. gab dem Antikommunismus einen moralischen Schwerpunkt; Ein Besuch in seiner Heimat Polen im Jahr 1979 löste ein religiöses und nationalistisches Wiederaufleben aus, das sich auf die Gewerkschaft Solidarność konzentrierte, die Widerstand mobilisierte und möglicherweise zu seinem Attentatsversuch zwei Jahre später geführt hat."  #NT!
 POL_pope_movement.option.1:0 "Er ist ein Unruhestifter!"  #NT!
 POL_pope_movement.option.2:0 "Stimmen Sie einer gewissen Religionsfreiheit zu."  #NT!
 POL_solidarity_movement.t:0 "Die Solidaritätsbewegung"  #NT!
 POL_solidarity_movement.d:0 "Solidarity ist eine polnische Gewerkschaft, die im August 1980 auf der Lenin-Werft in Danzig, Polen, gegründet wurde. Die Mitgliederzahl der Gewerkschaft erreichte im September 1981 mit 10 Millionen ihren Höhepunkt, was einem Drittel der Bevölkerung des Landes im erwerbsfähigen Alter entspricht. In den 1980er Jahren war Solidarnosc eine breite antiautoritäre soziale Bewegung, die Methoden des zivilen Widerstands einsetzte, um die Rechte der Arbeitnehmer und den sozialen Wandel voranzutreiben. Die Regierung versuchte Anfang der 1980er Jahre, die Gewerkschaft durch die Verhängung des Kriegsrechts in Polen und den Einsatz politischer Repressionen zu zerstören."  #NT!
 AFG_mujahideen_movement.t:0 "Die afghanischen Mudschaheddin"  #NT!
 AFG_mujahideen_movement.d:0 "Die afghanischen Mudschaheddin waren islamistische Widerstandsgruppen, die während des Sowjetisch-Afghanischen Krieges und des darauffolgenden Ersten Afghanischen Bürgerkriegs gegen die Demokratische Republik Afghanistan und die Sowjetunion kämpften."  #NT!
 JAP_recruit_scandal.t:0 "Der Rekrutenskandal"  #NT!
 JAP_recruit_scandal.d:0 "Der Recruit-Skandal war ein Insiderhandels- und Korruptionsskandal, der 1988 viele prominente japanische Politiker zum Rücktritt zwang. Zu den in den Skandal verwickelten Politikern gehörten Premierminister Noboru Takeshita, der ehemalige Premierminister Yasuhiro Nakasone und der Chefkabinettssekretär Takao Fujinami. Es wurde festgestellt, dass neben Mitgliedern der LDP-Regierung auch Führer der Komeito, der Demokratischen Partei Japans und der Japan Socialist Party beteiligt waren."  #NT!
 ITA_maxi_trial.t:0 "Der Maxi-Prozess?"  #NT!
 ITA_maxi_trial.d:0 "Der Maxi-Prozess war ein Strafprozess gegen die sizilianische Mafia, der in Palermo, Sizilien, stattfand. Der Prozess dauerte vom 10. Februar 1986 (dem ersten Tag der Corte d'Assise) bis zum 30. Januar 1992 (dem letzten Tag des Obersten Kassationsgerichtshofs) und fand in einem eigens für diesen Zweck errichteten Gerichtsgebäude im Bunkerstil innerhalb der Mauern des Ucciardone-Gefängnisses statt."  #NT!
 GBR_poll_tax_riots.t:0 "Die Kopfsteuer?"  #NT!
 GBR_poll_tax_riots.d:0 "Bei den Kopfsteuerunruhen handelte es sich um eine Reihe von Unruhen in britischen Städten während Protesten gegen die Community Charge (allgemein bekannt als „Kopfsteuer“), die von der konservativen Regierung von Premierministerin Margaret Thatcher eingeführt wurde. Der größte Protest fand am Samstag, dem 31. März 1990, im Zentrum von London statt, kurz bevor die Steuer in England und Wales in Kraft treten sollte."  #NT!
 FRA_yellow_vests.t:0 "Die Proteste der Gelbwesten"  #NT!
 FRA_yellow_vests.d:0 "Die Gelbwesten-Proteste waren eine Reihe populistischer, wöchentlicher Basisproteste in Frankreich, die am 17. November 2018 begannen. Die Bewegung wurde ursprünglich durch steigende Rohöl- und Kraftstoffpreise, hohe Lebenshaltungskosten und wirtschaftliche Ungleichheit motiviert. Die Bewegung argumentierte, dass in Frankreich die Arbeiterklasse und die Mittelschicht, insbesondere in ländlichen und stadtnahen Gebieten, unverhältnismäßig stark mit Steuern belastet würden. Die Demonstranten forderten unter anderem niedrigere Kraftstoffsteuern, eine Wiedereinführung der Solidaritätssteuer auf Vermögen und eine Erhöhung des Mindestlohns."  #NT!
 RUS_Khodorkovsky_Case.t:0 "Der Prozess gegen Michail Chodorkowski?"  #NT!
 RUS_Khodorkovsky_Case.d:0 "Im Jahr 2001 gründete Chodorkowski „Offenes Russland“, eine reformorientierte Organisation mit dem Ziel, „die Zivilgesellschaft im Land aufzubauen und zu stärken“. Im Oktober 2003 wurde er von russischen Behörden festgenommen und wegen Betrugs angeklagt. Kurz darauf fror die Regierung von Präsident Wladimir Putin die Aktien von Yukos aus Steuergründen ein. Putins Regierung ergriff weitere Maßnahmen gegen Yukos, was zu einem Einbruch des Aktienkurses des Unternehmens und zur Vernichtung eines Großteils von Chodorkowskis Vermögen führte. Im Mai 2005 wurde er für schuldig befunden und zu neun Jahren Gefängnis verurteilt."  #NT!
 RUS_Politkovskaya_murder.t:0 "Die Ermordung von Anna Politkowskaja?"  #NT!
 RUS_Politkovskaya_murder.d:0 "Am 7. Oktober 2006 wurde die russische Journalistin, Schriftstellerin und Menschenrechtsaktivistin Anna Politkowskaja im Aufzug ihres Wohnblocks im Zentrum von Moskau erschossen. Sie war bekannt für ihren Widerstand gegen den Tschetschenienkonflikt und für ihre Kritik an Wladimir Putin. Sie ist Autorin mehrerer Bücher über die Tschetschenienkriege sowie Putins Russland und erhielt für ihre Arbeit mehrere internationale Auszeichnungen. Ihr Mord, bei dem es sich vermutlich um einen Auftragsmord handelte, löste eine heftige internationale Reaktion aus."  #NT!
 RUS_snow_revolution.t:0 "Die Schneerevolution?"  #NT!
 RUS_snow_revolution.d:0 "Die Schneerevolution begann im Jahr 2011 (als Protest gegen die Ergebnisse der russischen Parlamentswahlen 2011) und dauerte 2012 und 2013 an. Die Proteste wurden durch Behauptungen russischer und ausländischer Journalisten, politischer Aktivisten und Mitglieder der Öffentlichkeit motiviert, dass der Wahlprozess betrügerisch gewesen sei."  #NT!
 RUS_Navalny_murder.t:0 "Der Tod von Alexej Nawalny?"  #NT!
 RUS_Navalny_murder.d:0 "Alexej Anatoljewitsch Nawalny war ein russischer Oppositionsführer, Anwalt, Antikorruptionsaktivist und politischer Gefangener. Im Januar 2021 kehrte Nawalny nach Russland zurück und wurde wegen Verstoßes gegen die Bewährungsauflagen während seines Krankenhausaufenthalts in Deutschland sofort festgenommen. Im August 2023 wurde Nawalny wegen Extremismusvorwürfen zu weiteren 19 Jahren Gefängnis verurteilt. Im Dezember 2023 wurde Nawalny fast drei Wochen lang aus dem Gefängnis vermisst. Er tauchte in einer Korrekturkolonie am Polarkreis im Autonomen Kreis der Jamal-Nenzen wieder auf. Am 16. Februar 2024 meldete der russische Gefängnisdienst, dass Nawalny im Alter von 47 Jahren gestorben sei."  #NT!
 BYE_Minsk_attack_2011.t:0 "Der Bombenanschlag auf die U-Bahn von Minsk"  #NT!
 BYE_Minsk_attack_2011.d:0 "Der Bombenanschlag auf die Minsker U-Bahn 2011 ereignete sich am 11. April 2011, als eine Bombe in der Minsker U-Bahn in Weißrussland explodierte und 15 Menschen getötet und 204 verletzt wurden. Die Explosion ereignete sich um 1755 Ortszeit am zentralen Bahnhof Kastryčnickaja. Die Staatsanwaltschaft leitete strafrechtliche Ermittlungen ein und stufte den Vorfall als Terroranschlag ein. Zwei am 13. April festgenommene Verdächtige gestanden den Bombenanschlag, die Motive blieben jedoch unklar. Im März 2012 wurden beide Täter, Dzmitry Kanavalau und Uladzislau Kavalyou, durch Erschießen hingerichtet."  #NT!
 BYE_May_Protests.t:0 "Die Massenproteste im Mai"  #NT!
 BYE_May_Protests.d:0 "Die belarussischen Proteste 2020–2021 waren eine Reihe politischer Massendemonstrationen und Proteste gegen die belarussische Regierung und Präsident Alexander Lukaschenko. Die Demonstrationen waren die größten regierungsfeindlichen Proteste in der Geschichte Weißrusslands und begannen im Vorfeld und während der Präsidentschaftswahlen 2020, bei denen Lukaschenko seine sechste Amtszeit anstrebte. Als Reaktion auf die Demonstrationen fanden mehrere relativ kleine regierungsnahe Kundgebungen statt."  #NT!
 JAP_1970_uprising.t:0 "Der versuchte Putsch von Yukio Mishima"  #NT!
 JAP_1970_uprising.d:0 "Am 25. November 1970 drangen Mishima und vier Mitglieder seiner Miliz in eine Militärbasis im Zentrum Tokios ein, nahmen deren Kommandanten als Geisel und versuchten erfolglos, die japanischen Selbstverteidigungskräfte zum Aufstand und zum Sturz der japanischen Verfassung von 1947 (die er „eine Verfassung der Niederlage“ nannte) zu bewegen. Nach seiner Rede und dem Ruf „Lang lebe der Kaiser!“ beging er Seppuku."  #NT!
 USA_assassinate_DJT.t:0 "Das versuchte Attentat auf Donald Trump"  #NT!
 USA_assassinate_DJT.d:0 "Am 13. Juli 2024 überlebte Donald Trump, ein ehemaliger Präsident der Vereinigten Staaten und voraussichtlicher Kandidat der Republikanischen Partei für die Präsidentschaftswahl 2024, ein Attentat, als er auf einer Wahlkampfveranstaltung unter freiem Himmel in der Nähe von Butler, Pennsylvania, sprach."  #NT!
 PER_big_party.t:0 "Die 2.500-Jahr-Feier des Persischen Reiches?"  #NT!
 PER_big_party.d:0 "Die Feier zum 2.500. Jahrestag der Gründung des Persischen Reiches war ein nationales Ereignis im Iran, das aus einer Reihe großer Festlichkeiten im Oktober 1971 zur Feier der Gründung des antiken Achämenidenreiches durch Kyros den Großen bestand. Ziel der Feierlichkeiten war es, die alte Zivilisation und Geschichte des Iran hervorzuheben und seine zeitgenössischen Fortschritte unter Schah Mohammad Reza Pahlavi zu präsentieren."  #NT!
 ISR_assassinate_YR.t:0 "Die Ermordung von Yitzhak Rabin?"  #NT!
 ISR_assassinate_YR.d:0 "1992 wurde Rabin auf einer Plattform, die den israelisch-palästinensischen Friedensprozess unterstützte, als Premierminister wiedergewählt. Im Rahmen des Oslo-Abkommens unterzeichnete er mehrere historische Abkommen mit der palästinensischen Führung. 1994 gewann Rabin zusammen mit seinem langjährigen politischen Rivalen Schimon Peres und dem Palästinenserführer Jassir Arafat den Friedensnobelpreis. Rabin unterzeichnete 1994 auch einen Friedensvertrag mit Jordanien. Im November 1995 wurde er von Yigal Amir ermordet, einem Extremisten, der sich den Bestimmungen des Oslo-Abkommens widersetzte."  #NT!
 USA_assassinate_DJT_2.t:0 "Der 2. Attentatsversuch auf Donald Trump"  #NT!
 USA_assassinate_DJT_2.d:0 "Donald Trump war am 15. September 2024 das Ziel eines Attentatsversuchs in seinem Golfclub in West Palm Beach, Florida, nur neun Wochen nachdem der republikanische Präsidentschaftskandidat einen weiteren Versuch in seinem Leben überlebt hatte. Agenten des US-Geheimdienstes, die ein paar Löcher oberhalb von Trumps Spielfeld stationiert waren, bemerkten die Mündung eines AK-Gewehrs, das etwa 350 Meter entfernt durch das Gebüsch ragte, das den Platz säumt. Ein Agent schoss und der Schütze ließ das Gewehr fallen und floh in einem SUV. Er ließ die Schusswaffe zusammen mit zwei Rucksäcken, einem Zielfernrohr und einer GoPro-Kamera zurück, sagte Ric Bradshaw, Sheriff von Palm Beach County. Der Mann wurde später von Polizeikräften in einem benachbarten Landkreis angehalten."  #NT!
 GBR_diana_death.t:0 "Der Tod von Diana, Prinzessin von Wales"  #NT!
 GBR_diana_death.d:0 "In den frühen Morgenstunden des 31. August 1997 starb Diana, Prinzessin von Wales, an den Verletzungen, die sie sich zuvor in der Nacht bei einem tödlichen Autounfall im Pont de l'Alma-Tunnel in Paris, Frankreich, zugezogen hatte. Dodi Fayed, Dianas Partner, und Henri Paul, der Fahrer des Mercedes-Benz W140, wurden tot im Auto aufgefunden. Dodis Leibwächter Trevor Rees-Jones wurde schwer verletzt und war der einzige Überlebende des Absturzes. Diana war 36 Jahre alt, als sie starb. Ihr Tod löste im Vereinigten Königreich und auf der ganzen Welt große öffentliche Trauer aus und ihre im Fernsehen übertragene Beerdigung wurde von schätzungsweise 2,5 Milliarden Menschen verfolgt."  #NT!
 GBR_diana_death.option.1:0 "Sie war die Prinzessin des Volkes!"  #NT!
 GBR_diana_death.option.2:0 "Wir trauern um einen König."  #NT!
 IRQ_civil_war_2006.t:0 "Der irakische Bürgerkrieg"  #NT!
 IRQ_civil_war_2006.d:0 "Der irakische Bürgerkrieg war ein bewaffneter Konflikt von 2006 bis 2008 zwischen verschiedenen sektiererischen schiitischen und sunnitischen bewaffneten Gruppen, wie dem Islamischen Staat Irak und der Mahdi-Armee, sowie der irakischen Regierung und amerikanisch geführten Koalitionstruppen. Im Februar 2006 eskalierte der Aufstand gegen die Koalition und die Regierung nach der Bombardierung des Al-Askari-Schreins, der im Zwölf-Schiitum als heilige Stätte gilt, zu einem konfessionellen Bürgerkrieg."  #NT!
 JOR_civil_war_1970.t:0 "Der schwarze September"  #NT!
 JOR_civil_war_1970.d:0 "Der Schwarze September war ein bewaffneter Konflikt zwischen Jordanien unter der Führung von König Hussein und der Palästinensischen Befreiungsorganisation (PLO) unter der Führung des Vorsitzenden Jassir Arafat. Am 17. September 1970 umzingelte die jordanische Armee Städte mit starker PLO-Präsenz, darunter Amman und Irbid, und begann, Fedajin-Posten ins Visier zu nehmen, die von palästinensischen Flüchtlingslagern aus operierten. Die Fedajin wurden eine nach der anderen aus den Städten vertrieben, bis 2.000 sich ergaben, nachdem sie während der Ajlun-Offensive am 23. Juli eingekesselt worden waren, was offiziell das Ende des Konflikts markierte. Jordanien erlaubte den Fedajin, über Syrien in den Libanon umzusiedeln, wo sie später in den libanesischen Bürgerkrieg verwickelt wurden."  #NT!
 GUA_civil_war_1960.t:0 "Der guatemaltekische Bürgerkrieg"  #NT!
 GUA_civil_war_1960.d:0 "Der guatemaltekische Bürgerkrieg war ein Bürgerkrieg in Guatemala, der von 1960 bis 1996 zwischen der Regierung Guatemalas und verschiedenen linken Rebellengruppen geführt wurde. Die guatemaltekischen Regierungstruppen sollen während des Bürgerkriegs einen Völkermord an der Maya-Bevölkerung Guatemalas begangen haben und es kam zu weit verbreiteten Menschenrechtsverletzungen gegen Zivilisten. Der Kontext des Kampfes basierte auf seit langem bestehenden Problemen der ungerechten Landverteilung. Wohlhabende Guatemalteken, hauptsächlich europäischer Abstammung, und ausländische Unternehmen wie die American United Fruit Company hatten die Kontrolle über einen Großteil des Landes. Im Gegenzug zahlten sie nahezu keine Steuern, was zu Konflikten mit der indigenen Landbevölkerung führte, die das Land unter miserablen Bedingungen bearbeitete."  #NT!
 COS_civil_war_1948.t:0 "Der costaricanische Bürgerkrieg"  #NT!
 COS_civil_war_1948.d:0 "Der Bürgerkrieg in Costa Rica fand vom 12. März bis 24. April 1948 statt. Der Konflikt folgte auf die Präsidentschaftswahlen vom 8. Februar 1948, bei denen der Oppositionskandidat Otilio Ulate den Regierungsparteichef Rafael Ángel Calderón Guardia besiegte. Die regierungsnahen Vertreter, die die gesetzgebende Versammlung dominierten, behaupteten, Ulates Sieg sei betrügerisch gewesen, und am 1. März stimmte die gesetzgebende Körperschaft für die Annullierung der Wahlergebnisse. Dies löste einen bewaffneten Aufstand unter der Führung von José Figueres Ferrer, einem Geschäftsmann, der nicht an den Wahlen teilgenommen hatte, gegen die Regierung von Präsident Teodoro Picado aus. Nach dem Krieg stürzte Figueres die Armee und regierte das Land 18 Monate lang als Chef einer provisorischen Regierungsjunta, die im Dezember die Wahl einer Verfassungsgebenden Versammlung überwachte. Diese Versammlung verabschiedete die neue Verfassung von 1949, woraufhin die Junta aufgelöst und die Macht an Ulate als neuen verfassungsmäßigen Präsidenten übergeben wurde."  #NT!
 AFG_civil_war_1979.t:0 "Die afghanische Widerstandsbewegung"  #NT!
 AFG_civil_war_1979.d:0 "Am 27. April 1978 töteten die PDPA und ihr loyale Militäreinheiten in einem gewaltsamen Putsch Daoud Khan, seine unmittelbare Familie und Leibwächter, übernahmen die Kontrolle über die Hauptstadt Kabul und riefen die neue Demokratische Republik Afghanistan (DRA) aus. Die neue kommunistische Regierung, angeführt von einem Revolutionsrat, genoss nicht die Unterstützung der Massen. Als religiöse Älteste einen Dschihad gegen die Regierung erklärten, bereitete sich Ahmad Shah Massoud im Mai 1979 in Peshawar darauf vor, sich der neuen kommunistischen Regierung in Panjshir zu widersetzen."  #NT!
 PAL_assassinate_YA.t:0 "Der Tod von Jassir Arafat?"  #NT!
 PAL_assassinate_YA.d:0 "Jassir Arafat war ein palästinensischer politischer Führer. Von 1969 bis 2004 war er Vorsitzender der Palästinensischen Befreiungsorganisation (PLO) und von 1994 bis 2004 Präsident der Palästinensischen Autonomiebehörde (PNA). Ideologisch war Arafat ein arabischer Nationalist und Sozialist und Gründungsmitglied der politischen Partei Fatah, die er von 1959 bis 2004 leitete. Yasser Arafat starb unerwartet am 11. November 2004. 75 Jahre alt, nach kurzer Krankheit. Die Todesursache wurde seitdem diskutiert und es wurden verschiedene Theorien dazu aufgestellt. Offizielle Untersuchungen französischer und russischer Teams ergaben jedoch keine Hinweise auf ein Foulspiel."  #NT!
 CNG_assassinate_LDK.t:0 "Die Ermordung von Laurent Kabila?"  #NT!
 CNG_assassinate_LDK.d:0 "Laurent-Désiré Kabila, der Präsident der Demokratischen Republik Kongo, wurde am 16. Januar 2001 in seinem Büro in seiner offiziellen Residenz im Palais de Marbre in Kinshasa ermordet. Der Attentäter, der ihn tötete, war sein 18-jähriger Leibwächter Rashidi Mizele, der zuvor ebenfalls als Rashidi Kasereka identifiziert wurde. Mizele wurde später erschossen. Eine Woche später wurde sein Leichnam zu einem Staatsbegräbnis in den Kongo überführt und zehn Tage später wurde sein Sohn Joseph Kabila Präsident."  #NT!
 ARG_dirty_war_1974.t:0 "Der schmutzige Krieg?"  #NT!
 ARG_dirty_war_1974.d:0 "Der Schmutzige Krieg ist der Name, den die Militärjunta oder zivil-militärische Diktatur Argentiniens für die Zeit des Staatsterrorismus in Argentinien von 1974 bis 1983 im Rahmen der Operation Condor verwendet. Während dieser Kampagne machten Militär- und Sicherheitskräfte sowie Todesschwadronen in Form der Argentinischen Antikommunistischen Allianz (AAA oder Triple A) Jagd auf alle politischen Dissidenten und jeden, von dem man annahm, dass er mit dem Sozialismus, dem linken Peronismus oder der Montoneros-Bewegung in Verbindung steht."  #NT!
 JAP_assassinate_SA.t:0 "Die Ermordung von Shinzo Abe?"  #NT!
 JAP_assassinate_SA.d:0 "Am 8. Juli 2022 wurde Shinzo Abe, ein ehemaliger japanischer Premierminister und amtierendes Mitglied des japanischen Repräsentantenhauses, während einer Rede auf einer politischen Veranstaltung vor dem Bahnhof Yamato-Saidaiji in der Stadt Nara, Präfektur Nara, ermordet. Abe hielt gerade eine Wahlkampfrede für einen Kandidaten der Liberaldemokratischen Partei (LDP), als er von dem 41-jährigen Tetsuya Yamagami mit einer improvisierten Schusswaffe tödlich erschossen wurde. Abe wurde mit einem medizinischen Hubschrauber zum Nara Medical University Hospital in Kashihara transportiert, wo sein Tod festgestellt wurde."  #NT!
 PHI_drug_war_2016.t:0 "Der Krieg gegen Drogen?"  #NT!
 PHI_drug_war_2016.d:0 "Der Krieg gegen Drogen ist die verstärkte Anti-Drogen-Kampagne, die während der Amtszeit von Präsident Rodrigo Duterte begann, der vom 30. Juni 2016 bis zum 30. Juni 2022 im Amt war. Die Kampagne verringerte die Verbreitung von Drogen im Land, wurde jedoch durch außergerichtliche Tötungen beeinträchtigt, die angeblich von der Polizei und unbekannten Angreifern verübt wurden. Die Regierung bezifferte die Zahl der seit 2016 getöteten Drogenverdächtigen bis zum Jahr 2022 offiziell auf 6.252. Schätzungen gehen jedoch davon aus, dass bei „Anti-Drogen-Operationen“ der philippinischen Nationalpolizei und Bürgerwehren 12.000 bis 30.000 Zivilisten getötet wurden."  #NT!
 MEX_drug_war_2006.t:0 "Operation Michoacán?"  #NT!
 MEX_drug_war_2006.d:0 "Die Operation Michoacán ist eine gemeinsame Operation der Bundespolizei und des mexikanischen Militärs zur Beseitigung von Drogenplantagen und zur Bekämpfung des Drogenhandels. Die am 11. Dezember 2006 eingeleitete Operation wurde vom Minister für öffentliche Sicherheit, dem Generalstaatsanwalt von Mexiko, dem Innenminister, der mexikanischen Marine und der mexikanischen Armee überwacht. In einigen Fällen beteiligten sich Landes- und Kommunalpolizisten, obwohl sie gar nicht dabei waren. Die gemeinsame Operation hat sich als eine der Operationen gegen die organisierte Kriminalität, in diesem Fall den Drogenhandel, hervorgetan, bei der die meisten Militär- und Polizeikräfte sowie die meisten staatlichen Kräfte im Einsatz waren."  #NT!
 USA_great_wall_2017.t:0 "Die Trump-Mauer?"  #NT!
 USA_great_wall_2017.d:0 "Die Trump-Mauer ist eine Erweiterung der Barriere zwischen Mexiko und den Vereinigten Staaten, die während der ersten US-Präsidentschaft von Donald Trump begann und ein wichtiger Bestandteil von Trumps Präsidentschaftswahlprogramm 2016 im Vorfeld der diesjährigen Wahl war. Im gesamten Wahlkampf forderte Trump den Bau einer Grenzmauer zur Bekämpfung der illegalen Einwanderung."  #NT!
 LEB_civil_war_1975.t:0 "Der libanesische Bürgerkrieg?"  #NT!
 LEB_civil_war_1975.d:0 "Der libanesische Bürgerkrieg war ein Bürgerkrieg, der aus Spannungen zwischen der christlichen und muslimischen Bevölkerung des Libanon resultierte. Der Konflikt wurde durch sozioökonomische Ungleichheiten und die Präsenz von Kämpfern der Palästinensischen Befreiungsorganisation (PLO) im Libanon in den 1970er Jahren verschärft. 1975 unterstützten libanesische Muslime und Linke die PLO und strebten nach mehr politischer Macht; Ihre Christen stellten sich gegen die PLO, um ihre politische Vorherrschaft aufrechtzuerhalten. Die Fraktionen kämpften bis Anfang 1976 erbittert, und der Libanon wurde faktisch geteilt, wobei die Christen im Norden und die Muslime im Süden an der Macht waren."  #NT!
 SYR_civil_war_2011.t:0 "Der syrische Bürgerkrieg?"  #NT!
 SYR_civil_war_2011.d:0 "Der syrische Bürgerkrieg war ein vielschichtiger Konflikt in Syrien, an dem verschiedene staatlich geförderte und nichtstaatliche Akteure beteiligt waren. Im März 2011 löste die Unzufriedenheit der Bevölkerung mit der Herrschaft von Baschar al-Assad im Rahmen der umfassenderen Proteste des Arabischen Frühlings in der Region groß angelegte Proteste und Pro-Demokratie-Kundgebungen in ganz Syrien aus. Nach Monaten des Vorgehens des Sicherheitsapparats der Regierung begannen sich im ganzen Land verschiedene bewaffnete Rebellengruppen wie die Freie Syrische Armee zu formieren, was den Beginn des syrischen Aufstands markierte. Mitte 2012 eskalierte der Aufstand zu einem ausgewachsenen Bürgerkrieg."  #NT!
 LBY_civil_war_2014.t:0 "Der libysche Bürgerkrieg?"  #NT!
 LBY_civil_war_2014.d:0 "Der libysche Bürgerkrieg (2014–2020), auch als Zweiter libyscher Bürgerkrieg bekannt, war ein multilateraler Bürgerkrieg, der in Libyen sechs Jahre lang, von 2014 bis 2020, zwischen einer Reihe bewaffneter Gruppen, vor allem aber dem Repräsentantenhaus (HoR) und der Regierung des Nationalen Abkommens (GNA), ausgetragen wurde."  #NT!
 TUR_pogrom_1955.t:0 "Das Istanbuler Pogrom?"  #NT!
 TUR_pogrom_1955.d:0 "Beim Istanbuler Pogrom handelte es sich um eine Reihe staatlich geförderter antigriechischer Mob-Angriffe, die sich am 6. und 7. September 1955 vor allem gegen die griechische Minderheit in Istanbul richteten. Das Pogrom wurde von der regierenden Demokratischen Partei in der Türkei in Zusammenarbeit mit verschiedenen Sicherheitsorganisationen (Tactical Mobilization Group, Counter-Guerilla und National Security Service) inszeniert. Auslöser der Ereignisse war der Bombenanschlag auf das türkische Konsulat in Thessaloniki, Mazedonien, Griechenland – das Haus, in dem Mustafa Kemal Atatürk 1881 geboren wurde. Die Bombe wurde tatsächlich von einem türkischen Gerichtsdiener im Konsulat gelegt, der später verhaftet wurde und ein Geständnis ablegte."  #NT!
 BUR_genocide_2016.t:0 "Der Rohingya-Völkermord?"  #NT!
 BUR_genocide_2016.d:0 "Der Völkermord an den Rohingya war eine Reihe andauernder Verfolgungen und Tötungen des muslimischen Volkes der Rohingya durch das Militär Myanmars. Der Völkermord bestand bisher aus zwei Phasen: Die erste war ein militärisches Vorgehen, das von Oktober 2016 bis Januar 2017 stattfand, und die zweite findet seit August 2017 statt. Die Krise zwang über eine Million Rohingya zur Flucht in andere Länder. Die meisten flohen nach Bangladesch, was zur Entstehung des größten Flüchtlingslagers der Welt führte, während andere nach Indien, Thailand, Malaysia und in andere Teile Süd- und Südostasiens flohen, wo sie weiterhin Verfolgung ausgesetzt sind."  #NT!
 NGE_pogrom_1966.t:0 "Das Anti-Igbo-Pogrom?"  #NT!
 NGE_pogrom_1966.d:0 "Ab Mai 1966 kam es zu einer Reihe von Massakern gegen Igbo und andere im Norden Nigerias lebende Menschen südnigerianischer Herkunft, die nach dem 29. September 1966 ihren Höhepunkt erreichten. Schätzungen zufolge wurden zwischen 8.000 und 30.000 Igbos und Ostbewohner getötet. Weitere 1 Million Igbos flohen aus der Nordregion in den Osten. Als Reaktion auf die Morde wurden einige Nordstaatler in Port Harcourt und anderen Städten im Osten massakriert."  #NT!
 SER_genocide_1995.t:0 "Das Massaker von Srebrenica?"  #NT!
 SER_genocide_1995.d:0 "Das Massaker von Srebrenica war die genozidale Tötung von mehr als 8.000 bosniakischen muslimischen Männern und Jungen im Juli 1995 in und um die Stadt Srebrenica während des Bosnienkrieges. Es wurde hauptsächlich von Einheiten der bosnisch-serbischen Armee der Republika Srpska unter Ratko Mladić verübt, obwohl auch die serbische paramilitärische Einheit Scorpions beteiligt war. Das Massaker war der erste gesetzlich anerkannte Völkermord in Europa seit dem Ende des Zweiten Weltkriegs."  #NT!
 POR_academic_crisis_1962.t:0 "Die akademische Krise?"  #NT!
 POR_academic_crisis_1962.d:0 "Als akademische Krise bezeichnet man eine 1962 vom Estado Novo eingeleitete Politik der portugiesischen Regierung, die den Boykott und die Schließung mehrerer Studentenvereinigungen und -organisationen, darunter des Nationalen Sekretariats portugiesischer Studenten, zur Folge hatte. Die meisten Mitglieder dieser Organisation waren Oppositionelle, darunter viele Kommunisten. Die Studenten reagierten mit Demonstrationen, die am 24. März in einer riesigen Studentendemonstration in Lissabon gipfelten, die von der Bereitschaftspolizei energisch niedergeschlagen wurde, was zu Hunderten von Studentenverletzungen führte. Unmittelbar danach begannen die Studenten einen Streik. Diese Ereignisse wurden als die akademische Krise von 1962 bekannt."  #NT!
 POR_coup_1975.t:0 "Der kommunistische Putschversuch?"  #NT!
 POR_coup_1975.d:0 "Portugal erlebte eine turbulente Zeit, die als Processo Revolucionário Em Curso (Laufender Revolutionsprozess) bekannt ist. Diese Phase des PREC dauerte bis zum Putsch vom 25. November 1975, angeführt von einer Gruppe linksextremer Offiziere, insbesondere Otelo Saraiva de Carvalho. Es hieß, es handele sich um eine kommunistische Verschwörung zur Machtergreifung, um die mächtige Kommunistische Partei zu diskreditieren. Es folgte ein erfolgreicher Gegenputsch zentristischerer Offiziere und war von ständigen Spannungen zwischen liberal-demokratischen Kräften und linkskommunistischen politischen Parteien geprägt."  #NT!
 SPA_coup_1981.t:0 "Der spanische Putschversuch?"  #NT!
 SPA_coup_1981.d:0 "Im Februar 1981 kam es in Spanien zu einem Putschversuch durch Elemente der Guardia Civil und des spanischen Militärs. Das Scheitern des Putsches markierte den letzten ernsthaften Versuch, Spanien wieder in eine franquistische Regierung zu versetzen, und diente der Konsolidierung des Demokratisierungsprozesses Spaniens. König Juan Carlos I. spielte eine wichtige Rolle bei der Verhinderung des Putsches, und die Monarchie erlangte dadurch neue Legitimität."  #NT!
 SPA_BSQ_devolution.t:0 "Das Gernika-Statut?"  #NT!
 SPA_BSQ_devolution.d:0 "Das Autonomiestatut des Baskenlandes von 1979, allgemein bekannt als Gernika-Statut, ist das Rechtsdokument, das das politische System der Autonomen Gemeinschaft des Baskenlandes regelt, zu der die historischen Gebiete Álava, Biskaya und Gipuzkoa gehören. Sie formt die Region zu einer der autonomen Gemeinschaften, die in der spanischen Verfassung von 1978 vorgesehen sind. Sie etablierte ein System der parlamentarischen Regierung, in dem der Präsident (Regierungschef) oder Lehendakari vom baskischen Autonomen Parlament aus seiner Mitte gewählt wird. Die Wahl des Parlaments erfolgt durch allgemeines Wahlrecht und das Parlament besteht aus 75 Abgeordneten, 25 aus jedem der drei historischen Territorien der Gemeinschaft."  #NT!
 TUR_coup_2016.t:0 "Der türkische Putschversuch?"  #NT!
 TUR_coup_2016.d:0 "Am Abend des 15. Juli 2016 versuchte eine als Peace at Home Council organisierte Fraktion innerhalb der türkischen Streitkräfte einen Staatsstreich gegen staatliche Institutionen, darunter die Regierung und Präsident Recep Tayyip Erdoğan. Sie versuchten, die Kontrolle über mehrere Orte in Ankara, Istanbul, Marmaris und anderswo zu übernehmen, beispielsweise über den asiatischen Seiteneingang der Bosporus-Brücke, scheiterten jedoch, nachdem staatstreue Kräfte und Zivilisten sie besiegt hatten. Die Regierung sagte, sie habe Beweise dafür, dass die Putschisten mit der Gülen-Bewegung in Verbindung stünden, die von der Republik Türkei als Terrororganisation eingestuft wird und von Fethullah Gülen angeführt wird, einem türkischen Geschäftsmann und bekannten islamischen Gelehrten, der im Exil in Pennsylvania lebte."  #NT!
 BOL_coup_1966.t:0 "Der bolivianische Aufstand?"  #NT!
 BOL_coup_1966.d:0 "Die Ñancahuazú-Guerilla oder Ejército de Liberación Nacional de Bolivia (Nationale Befreiungsarmee Boliviens; ELN) war eine Gruppe hauptsächlich bolivianischen und kubanischen Guerillas unter der Führung des Guerillaführers Che Guevara, die von 1966 bis 1967 in der Cordillera-Provinz Boliviens aktiv war. Die Gruppe errichtete ihr Basislager auf einer Farm auf der anderen Seite des Flusses Ñancahuazú, einem saisonalen Nebenfluss des Rio Grande, 250 Kilometer südwestlich der Stadt Santa Cruz de la Sierra. Die Guerillas wollten als Foco fungieren, als Punkt des bewaffneten Widerstands, der als erster Schritt zum Sturz der bolivianischen Regierung und zur Schaffung eines sozialistischen Staates genutzt werden sollte. The guerrillas defeated several Bolivian patrols before they were beaten and Guevara was captured and executed."  #NT!
 BOL_assassinate_CG.t:0 "Die Hinrichtung von Che Guevara?"  #NT!
 BOL_assassinate_CG.d:0 "Ernesto „Che“ Guevara war ein argentinischer marxistischer Revolutionär, Arzt, Autor, Guerillaführer, Diplomat und Militärtheoretiker. Guevara verließ Kuba 1965, um kontinentale Revolutionen in Afrika und Südamerika auszulösen, zunächst erfolglos im Kongo-Kinshasa und später in Bolivien, wo er von bolivianischen Streitkräften mit CIA-Unterstützung gefangen genommen und kurzerhand hingerichtet wurde."  #NT!
 USA_1992_LA_riots.t:0 "Die Unruhen in Los Angeles?"  #NT!
 USA_1992_LA_riots.d:0 "Bei den Unruhen in Los Angeles im Jahr 1992 handelte es sich um eine Reihe von Unruhen und Unruhen, die sich im April und Mai 1992 im Los Angeles County, Kalifornien, USA, ereigneten. Am 29. April kam es in South Central Los Angeles zu Unruhen, nachdem eine Jury vier Beamte des Los Angeles Police Department (LAPD) freigesprochen hatte, denen vorgeworfen wurde, bei der Verhaftung und Misshandlung von Rodney King übermäßige Gewalt angewendet zu haben. Der Vorfall war von George Holliday, der dem Vorfall beiwohnte, auf Video aufgezeichnet worden und wurde in verschiedenen Nachrichten- und Medienkanälen ausführlich berichtet."  #NT!
 IDO_1998_riots.t:0 "Die Peristiwa?"  #NT!
 IDO_1998_riots.d:0 "Die Unruhen in Indonesien im Mai 1998 oder einfach das Ereignis 98 (Peristiwa 98) waren Vorfälle von Massengewalt und Unruhen in Indonesien, von denen sich viele gegen die ethnische chinesische Bevölkerung des Landes richteten. Die Ereignisse ereigneten sich hauptsächlich in den Städten Medan, Jakarta und Surakarta, kleinere Vorfälle gab es auch in anderen Teilen Indonesiens. Unter dem vom Westen unterstützten Suharto kam es in Indonesien zu einer weit verbreiteten und systematischen Diskriminierung ethnischer Chinesen. Auslöser der Unruhen waren Korruption, wirtschaftliche Probleme, darunter Nahrungsmittelknappheit und Massenarbeitslosigkeit."  #NT!
 PAP_assassinate_PJP_1981.t:0 "Der erste Attentatsversuch auf Papst Johannes Paul II."  #NT!
 PAP_assassinate_PJP_1981.d:0 "Am 13. Mai 1981 wurde Papst Johannes Paul II. auf dem Petersplatz in der Vatikanstadt von Mehmet Ali Ağca angeschossen und verletzt, als er den Platz betrat. Der Papst wurde zweimal geschlagen und erlitt schweren Blutverlust. Ağca wurde sofort festgenommen und später von einem italienischen Gericht zu lebenslanger Haft verurteilt. Der Papst vergab Ağca das Attentat. Auf Wunsch des Papstes wurde er vom italienischen Präsidenten Carlo Azeglio Ciampi begnadigt und im Juni 2000 in die Türkei abgeschoben."  #NT!
 PAP_assassinate_PJP_1982.t:0 "Der zweite Attentatsversuch auf Papst Johannes Paul II.?"  #NT!
 PAP_assassinate_PJP_1982.d:0 "Ein zweites Attentat ereignete sich am 12. Mai 1982, nur einen Tag vor dem Jahrestag seines ersten Attentats, in Fátima, Portugal, als ein Mann versuchte, Johannes Paul II. mit einem Bajonett zu erstechen. Er wurde von Sicherheitsleuten angehalten. Stanisław Dziwisz sagte später, dass Johannes Paul II. bei dem Attentat verletzt worden sei, es ihm aber gelungen sei, eine nicht lebensgefährliche Wunde zu verbergen."  #NT!
 USA_Jonestown_Massacre.t:0 "Das Jonestown-Massaker"  #NT!
 USA_Jonestown_Massacre.d:0 "Das Peoples Temple Agricultural Project, besser bekannt unter seinem informellen Namen „Jonestown“, war eine abgelegene Siedlung in Guyana, die von Peoples Temple, einer amerikanischen religiösen Bewegung unter der Führung von Jim Jones, gegründet wurde. Jonestown erlangte internationale Berühmtheit, als am 18. November 1978 insgesamt 918 Menschen in der Siedlung starben; auf der nahegelegenen Landebahn in Port Kaituma; und in einem von einem Tempel geführten Gebäude in Georgetown, der Hauptstadt Guyanas. Die zur Beschreibung der Todesfälle in Jonestown und Georgetown verwendeten Begriffe haben sich im Laufe der Zeit weiterentwickelt. Viele zeitgenössische Medienberichte nach den Ereignissen nannten die Todesfälle einen Massenselbstmord."  #NT!
 GUY_Rupununi_Uprising.t:0 "Der Rupununi-Aufstand"  #NT!
 GUY_Rupununi_Uprising.d:0 "Der Rupununi-Aufstand war ein sezessionistischer Aufstand in Guyana, der am 2. Januar 1969 begann und von Viehzüchtern angeführt wurde, die versuchten, 22.300 Quadratmeilen (58.000 km2) Land zu kontrollieren. Sie ereignete sich weniger als zwei Jahre nach der Unabhängigkeit Guyanas vom Vereinigten Königreich und stellte für das Land den frühesten und schwersten Test für Staatlichkeit und gesellschaftliche Solidarität dar. Die Rebellen wurden schließlich von der Guyana Defence Force zerstreut, und die Anführer der Gruppe flohen nach Venezuela."  #NT!
 PRC_Lin_Biao_Incident.t:0 "Der Lin-Biao-Vorfall"  #NT!
 PRC_Lin_Biao_Incident.d:0 "Der Lin-Biao-Vorfall war ein Flugzeugunfall um 3 Uhr morgens am 13. September 1971, an dem Lin Biao, der stellvertretende Vorsitzende der Kommunistischen Partei Chinas, beteiligt war. Alle an Bord der Hawker Siddeley Trident, darunter Lin und mehrere Mitglieder seiner Familie, starben, als das Flugzeug auf mongolischem Gelände einschlug. Lin Biao versuchte angeblich, in die Sowjetunion überzulaufen, nachdem ein Attentat auf Mao Zedong gescheitert war."  #NT!
 PRC_Anti_Corruption_Drive_2012.t:0 "Die Antikorruptionskampagne"  #NT!
 PRC_Anti_Corruption_Drive_2012.d:0 "Nach dem Abschluss des 18. Nationalkongresses der Kommunistischen Partei Chinas (KPCh) im Jahr 2012 begann in China eine weitreichende Antikorruptionskampagne. Die Kampagne, die unter der Schirmherrschaft von Xi Jinping, dem Generalsekretär der KPCh, durchgeführt wurde, war die größte organisierte Antikorruptionsaktion in der Geschichte der KPCh-Herrschaft in China."  #NT!
 SAF_Sharpeville_Massacre_1960.t:0 "Das Sharpeville-Massaker?"  #NT!
 SAF_Sharpeville_Massacre_1960.d:0 "1959 gründete eine Gruppe desillusionierter ANC-Mitglieder den Pan Africanist Congress of Azania (PAC), der am 21. März 1960 eine Demonstration gegen Passbücher organisierte. Eine dieser Proteste fand in der Gemeinde Sharpeville statt, wo bei dem Massaker von Sharpeville 69 Menschen von der Polizei getötet wurden. Im Gefolge von Sharpeville rief die Regierung den Ausnahmezustand aus. Mehr als 18.000 Menschen wurden festgenommen, darunter Führer des ANC und des PAC, und beide Organisationen wurden verboten. Der Widerstand ging in den Untergrund, einige Anführer verbannten sich ins Ausland, andere beteiligten sich an inländischen Sabotage- und Terrorkampagnen."  #NT!
 SAF_Mahlabatini_Declaration_1974.t:0 "Die Mahlabatini-Glaubenserklärung"  #NT!
 SAF_Mahlabatini_Declaration_1974.d:0 "Die Mahlabatini-Glaubenserklärung war eine Erklärung der Grundprinzipien, die am 4. Januar 1974 von den südafrikanischen Politikern Mangosuthu Buthelezi und Harry Schwarz niedergelegt wurden. Sie wurde in Mahlabatini, KwaZulu-Natal, unterzeichnet, daher der Name. Sein Zweck bestand darin, einen Entwurf für die Regierung Südafrikas auf der Grundlage von Konsens und Rassenfrieden in einer multirassischen Gesellschaft zu liefern, wobei die Chancen für alle, die Konsultation, das föderale Konzept und eine Bill of Rights im Vordergrund standen. Außerdem wurde zunächst bekräftigt, dass politische Veränderungen mit gewaltfreien Mitteln stattfinden müssen."  #NT!
 VNZ_Pact_of_Puntofijo_1958.t:0 "Der Pakt von Puntofijo?"  #NT!
 VNZ_Pact_of_Puntofijo_1958.d:0 "Der Puntofijo-Pakt war eine formelle Vereinbarung, die 1958 zwischen Vertretern der drei wichtigsten politischen Parteien Venezuelas, Acción Democrática (AD), COPEI (Sozialchristliche Partei) und Unión Republicana Democrática (URD), getroffen wurde, um die Präsidentschaftswahlen von 1958 zu akzeptieren und das neue demokratische System aufrechtzuerhalten. Der Pakt war eine schriftliche Garantie dafür, dass die unterzeichnenden Parteien die Wahlergebnisse respektieren, die Hegemonie einer einzelnen Partei verhindern, die Macht teilen und zusammenarbeiten würden, um eine Diktatur zu verhindern."  #NT!
 VNZ_Caracazo_1989.t:0 "Der Caracazo?"  #NT!
 VNZ_Caracazo_1989.d:0 "Caracazo ist der Name der Welle von Protesten, Unruhen und Plünderungen, die am 27. Februar 1989 in der venezolanischen Stadt Guarenas begann und sich nach den Sparmaßnahmen von Präsident Carlos Andrés Pérez auf Caracas und die umliegenden Städte ausweitete. Verschiedenen Berichten zufolge forderten die einwöchigen Zusammenstöße zahlreiche Todesopfer, wobei die Schätzungen zwischen Hunderten und Tausenden liegen und größtenteils auf die Beteiligung der Sicherheitskräfte und des Militärs zurückzuführen sind. Die Unruhen und Proteste begannen hauptsächlich als Reaktion auf die Wirtschaftsreformen der Regierung und den daraus resultierenden Anstieg der Benzin- und Transportpreise."  #NT!
 SPA_assassinate_LCB.t:0 "Die Ermordung von Luis Carrero Blanco?"  #NT!
 SPA_assassinate_LCB.d:0 "Am 20. Dezember 1973 wurde Luis Carrero Blanco, der spanische Premierminister, ermordet, als ein Sprengstofflager in einem von der baskischen Separatistengruppe ETA errichteten Tunnel zur Explosion gebracht wurde. Das Attentat, auch bekannt unter dem Codenamen Operación Ogro (Operation Oger), gilt als der größte Angriff gegen den Franco-Staat seit dem Ende des Spanischen Bürgerkriegs im Jahr 1939 und hatte weitreichende Folgen für die spanische Politik."  #NT!
 SOV_doctors_plot_1951.t:0 "Die Verschwörung der Ärzte?"  #NT!
 SOV_doctors_plot_1951.d:0 "Bei der „Ärztekomplotte“ handelte es sich um eine vom sowjetischen Staat geförderte antiintellektuelle und antisemitische (unter dem Deckmantel antikosmopolitischer) Kampagne, die auf einer Verschwörungstheorie basierte, die einer antisowjetischen Intrige prominenter medizinischer Fachkräfte, von denen viele ethnische Juden waren, vorwarf, führende Regierungsbeamte und Funktionäre der Kommunistischen Partei zu ermorden. In den Jahren 1951–1953 wurde einer mehrheitlich jüdischen Gruppe von Ärzten aus Moskau eine Verschwörung zur Ermordung sowjetischer Führer vorgeworfen. Ihnen wurde vorgeworfen, den Interessen des internationalen Judentums sowie des westlichen (hauptsächlich amerikanischen und britischen) Geheimdienstes zu dienen. Daraufhin wurden viele Ärzte entlassen, verhaftet und gefoltert, um ihre Zulassungen zu erwirken."  #NT!
 THI_massacre_1976.t:0 "Das Massaker an der Thammasat-Universität?"  #NT!
 THI_massacre_1976.d:0 "Das Massaker vom 6. Oktober 1976 war ein gewaltsames Vorgehen der thailändischen Polizei und ein Lynchmord durch rechte Paramilitärs und Passanten gegen linke Demonstranten, die am 6. Oktober 1976 die Thammasat-Universität in Bangkok und das angrenzende Sanam Luang besetzt hatten. Zwischen 5.30 und 11.00 Uhr am 6. Oktober setzte die Polizei kriegstaugliche Waffen ein, darunter Sturmgewehre, Granatwerfer, Panzerabwehrgeschosse usw Granaten, um das Vorgehen gegen die umzingelten Demonstranten fortzusetzen, die kurzzeitig versuchten, sich zu verteidigen, aber schnell besiegt wurden."  #NT!
 THI_massacre_1992.t:0 "Der Schwarze Mai?"  #NT!
 THI_massacre_1992.d:0 "Black May bezieht sich auf eine gewalttätige politische Krise in Thailand, die im Mai 1992 ausbrach, als in Bangkok Massenproteste gegen die Ernennung von General Suchinda Kraprayoon – der zuvor einen Putsch angeführt hatte – zum Premierminister ausbrachen, obwohl er nicht gewählt wurde. Unter der Führung von Chamlong Srimuang forderten die Demonstranten demokratische Reformen, wurden jedoch mit brutalen militärischen Maßnahmen konfrontiert, die zu Dutzenden Toten, Hunderten Verletzten und weit verbreiteter Medienzensur führten. Die Krise gipfelte in einer im Fernsehen übertragenen königlichen Intervention von König Bhumibol Adulyadej, der auf Frieden zwischen den gegnerischen Seiten drängte. Suchinda trat kurz darauf zurück und ebnete damit den Weg für Neuwahlen und einen Wandel hin zu einer demokratischeren Regierungsführung."  #NT!
 ETH_massacre_1976.t:0 "Der Qey Shibir?"  #NT!
 ETH_massacre_1976.d:0 "Der Äthiopische Rote Terror, auch bekannt als Qey Shibir, war eine gewalttätige politische Unterdrückungskampagne der Derg gegen andere konkurrierende marxistisch-leninistische Gruppen in Äthiopien und dem heutigen Eritrea von 1976 bis 1978. Die Qey Shibir war ein Versuch, die Derg-Herrschaft während der politischen Instabilität nach ihrem Sturz von Kaiser Haile Selassie im Jahr 1974 und dem darauffolgenden äthiopischen Bürgerkrieg zu festigen. Der Qey Shibir basierte auf dem Roten Terror des russischen Bürgerkriegs und fand am deutlichsten statt, nachdem Mengistu Haile Mariam am 3. Februar 1977 Vorsitzender des Derg wurde. Es wird geschätzt, dass im Verlauf des Qey Shibir 10.000 bis 980.000 Menschen getötet wurden."  #NT!
 ROC_massacre_1948.t:0 "Der Weiße Terror?"  #NT!
 ROC_massacre_1948.d:0 "Der Weiße Terror war die politische Unterdrückung taiwanesischer Zivilisten und politischer Andersdenkender unter der von der Kuomintang (KMT) regierten Regierung. Man geht allgemein davon aus, dass die Zeit des Weißen Terrors mit der Ausrufung des Kriegsrechts in Taiwan am 19. Mai 1949 begann, was durch die Übergangsbestimmungen gegen den kommunistischen Aufstand von 1948 ermöglicht wurde, und endete am 21. September 1992 mit der Aufhebung von Artikel 100 des Strafgesetzbuchs, der die Verfolgung „staatsfeindlicher“ Aktivitäten ermöglichte."  #NT!
 IDO_massacre_1965.t:0 "Antikommunistische Massenmorde in Indonesien?"  #NT!
 IDO_massacre_1965.d:0 "Von 1965 bis 1966 kam es in Indonesien zu groß angelegten Tötungen und Unruhen, die sich vor allem gegen Mitglieder und vermeintliche Sympathisanten der Kommunistischen Partei Indonesiens (PKI) richteten. Zu den weiteren betroffenen Gruppen zählten auch mutmaßliche kommunistische Sympathisanten, Gerwani-Frauen, Gewerkschafter, ethnische Javaner der Abangan, ethnische Chinesen, Atheisten, sogenannte „Ungläubige“ und angebliche Linke im Allgemeinen. Den am weitesten verbreiteten Schätzungen zufolge wurden mindestens 500.000 bis 1 Million Menschen getötet, einige Schätzungen gehen sogar auf 2 bis 3 Millionen. Die Gräueltaten, die manchmal als Völkermord oder Politizid bezeichnet werden, wurden von der indonesischen Armee unter Suharto angestiftet."  #NT!
 GBR_princess_of_wales_1981.t:0 "Die Hochzeit von Diana und Prinz Charles?"  #NT!
 GBR_princess_of_wales_1981.d:0 "Diana, Prinzessin von Wales (geb. Diana Frances Spencer), war ein Mitglied der britischen Königsfamilie. Sie war die erste Frau von Charles III (damals Prinz von Wales) und Mutter der Prinzen William und Harry. Ihr Aktivismus und ihr Glamour machten sie zu einer internationalen Ikone und brachten ihr dauerhafte Popularität ein. Ihre Hochzeit fand im Juli 1981 in der St. Paul's Cathedral statt und machte sie zur Prinzessin von Wales, eine Rolle, die sie vom Publikum begeistert aufgenommen wurde. Das Paar hatte zwei Söhne, William und Harry, die damals an zweiter und dritter Stelle der britischen Thronfolge standen."  #NT!
 USA_Tea_Party_Movement_2009.t:0 "Die Tea-Party-Bewegung?"  #NT!
 USA_Tea_Party_Movement_2009.d:0 "Die Tea-Party-Bewegung war eine fiskalkonservative politische Bewegung innerhalb der Republikanischen Partei in den USA, die 2007 begann und durch den Präsidentschaftswahlkampf des Kongressabgeordneten Ron Paul in den Mainstream katapultiert wurde. Die Bewegung expandierte als Reaktion auf die Politik des demokratischen Präsidenten Barack Obama und war ein wichtiger Faktor bei der Wahlwelle 2010, bei der die Republikaner 63 Sitze im Repräsentantenhaus gewannen und die Kontrolle über das US-Repräsentantenhaus übernahmen."  #NT!
 USA_MAGA_Movement_2016.t:0 "Die MAGA-Bewegung?"  #NT!
 USA_MAGA_Movement_2016.d:0 "Die politischen Bewegungen „Make America Great Again“ (MAGA) und „America First“ umfassen Ideologien wie Rechtspopulismus, Rechtsantiglobalismus, Nationalkonservatismus und Neonationalismus und weisen bedeutende illiberale, autoritäre und manchmal autokratische Überzeugungen auf. Im Laufe der späten 2010er und frühen 2020er Jahre wurden MAGA-Anhänger zur größten Fraktion der Republikanischen Partei der Vereinigten Staaten."  #NT!
 USA_assassinate_CJK.t:0 "Die Ermordung von Charlie Kirk?"  #NT!
 USA_assassinate_CJK.d:0 "Charles James Kirk war ein amerikanischer konservativer politischer Aktivist, Autor und Medienpersönlichkeit. Er war 2012 Mitbegründer der Studentenorganisation Turning Point USA (TPUSA) und deren Geschäftsführer. Er war Geschäftsführer von Turning Point Action und Mitglied des Council for National Policy. In seinen späteren Jahren war er einer der prominentesten Stimmen der populistischen MAGA-Bewegung in der Republikanischen Partei. Am 10. September 2025 wurde Kirk erschossen, als er bei einer öffentlichen Debatte der TPUSA auf dem Campus der Utah Valley University sprach. Sein Tod erregte internationale Aufmerksamkeit und führte zur Verurteilung politischer Gewalt durch prominente nationale und internationale Persönlichkeiten."  #NT!
 USA_Nation_of_Islam_1952.t:0 "Die Bewährung von Malcolm X?"  #NT!
 USA_Nation_of_Islam_1952.d:0 "Malcolm Malcolm"  #NT!
 USA_assassinate_MLX.t:0 "Die Ermordung von Malcolm X?"  #NT!
 USA_assassinate_MLX.d:0 "Malcolm Drei Mitglieder der Nation of Islam – Muhammad Abdul Aziz, Khalil Islam und Thomas Hagan – wurden wegen Mordes angeklagt, vor Gericht gestellt und verurteilt und zu lebenslangen Haftstrafen auf unbestimmte Zeit verurteilt. Im November 2021 wurden Aziz und Islam jedoch entlastet."  #NT!
 JAP_protest_1960.t:0 "Die Anpo-Proteste"  #NT!
 JAP_protest_1960.d:0 "Die Anpo-Proteste waren eine Reihe massiver Proteste in ganz Japan von 1959 bis 1960 und erneut 1970 gegen den Sicherheitsvertrag zwischen den Vereinigten Staaten und Japan, der es den Vereinigten Staaten erlaubt, Militärstützpunkte auf japanischem Boden zu unterhalten. Die Anpo-Proteste von 1960 konnten letztlich nicht verhindern, dass der überarbeitete Sicherheitsvertrag zwischen den USA und Japan in Kraft trat, sie erzwangen jedoch den Rücktritt des Kishi-Kabinetts und die Absage von Eisenhowers geplantem Besuch. Kishi wurde als Premierminister von Hayato Ikeda abgelöst, der eine viel versöhnlichere Haltung gegenüber der politischen Opposition einnahm, Kishis Pläne zur Überarbeitung der japanischen Verfassung auf unbestimmte Zeit zurückstellte und den Plan zur Einkommensverdopplung ankündigte, um die Energien des Landes von kontroversen politischen Kämpfen weg und hin zu einem landesweiten Streben nach schnellem Wirtschaftswachstum zu lenken."  #NT!
 NEJ_Jamal_Khashoggi_2003.t:0 "Die Jamal Khashoggi-Affäre?"  #NT!
 NEJ_Jamal_Khashoggi_2003.d:0 "Im Jahr 2003 war Jamal Khashoggi ein bekannter saudischer Journalist und Redakteur, der für seine engen Beziehungen zur königlichen Familie bekannt war, aber dennoch für seine unabhängige Stimme geschätzt wurde. Er fungierte kurzzeitig als Chefredakteur von Al Watan, wo seine reformistische Haltung zur Entlassung führte, nachdem er Kritik am religiösen Konservatismus veröffentlicht hatte."  #NT!
 NEJ_Jamal_Khashoggi_2018.t:0 "Die Ermordung von Jamal Khashoggi?"  #NT!
 NEJ_Jamal_Khashoggi_2018.d:0 "Am 2. Oktober 2018 wurde der saudische Journalist Jamal Khashoggi im saudischen Konsulat in Istanbul ermordet. Ein 15-köpfiges Team überfiel ihn und tötete ihn, angeblich mit dem Befehl, einen prominenten Kritiker des Kronprinzen zum Schweigen zu bringen. Sein Körper wurde zerstückelt und nie geborgen, was weltweite Empörung und diplomatische Konsequenzen auslöste."  #NT!
 JAP_protest_1952.t:0 "Der blutige Maifeiertag"  #NT!
 JAP_protest_1952.d:0 "Der Begriff „Blutiger Mai“ bezieht sich auf einen gewalttätigen Konflikt, der am 1. Mai 1952 im Kokyo-Gaien-Nationalgarten vor dem Kaiserpalast in Tokio, Japan, zwischen Demonstranten und Polizisten stattfand. Als eine große Menschenmenge gegen die Auflösung des Sicherheitsvertrags zwischen den USA und Japan protestierte, kam es zu einem blutigen Handgemenge zwischen Demonstranten und Polizisten. Schließlich eröffneten die Polizisten das Feuer auf die Menge, wobei zwei Menschen getötet und 22 durch Schusswunden verletzt wurden. Insgesamt wurden bei den Kämpfen rund 2.300 Menschen (1.500 Demonstranten und 800 Polizisten) verletzt."  #NT!
 JAP_protest_1955.t:0 "Der Sunagawa-Kampf"  #NT!
 JAP_protest_1955.d:0 "Der Sunagawa-Kampf war eine Protestbewegung in Japan, die 1955 begann und bis 1957 andauerte und sich gegen die Erweiterung des Luftwaffenstützpunkts Tachikawa der US-Luftwaffe auf das nahegelegene Dorf Sunagawa richtete. „Bloody Sunagawa“ fand auf dem Höhepunkt einer wachsenden Anti-Base-Bewegung statt und gilt als der intensivste und gewalttätigste aller Proteste gegen US-Militärstützpunkte in Japan."  #NT!
  
 GER_post_war_deportations.t:0 "Die Vertreibung der Deutschen nach dem Krieg?"  #NT!
 GER_post_war_deportations.d:0 "Der Zweite Weltkrieg endete in Europa mit der Niederlage Deutschlands im Mai 1945. Die Alliierten einigten sich im Potsdamer Abkommen auf die Besatzungsbedingungen, die territoriale Beschneidung Deutschlands und die Vertreibung ethnischer Deutscher aus Polen, der Tschechoslowakei und Ungarn der Nachkriegszeit in die alliierten Besatzungszonen. Nach Potsdam kam es in den von der Sowjetunion kontrollierten osteuropäischen Ländern zu einer Reihe von Vertreibungen ethnischer Deutscher. Eigentum und Material im betroffenen Gebiet, das Deutschland oder Deutschen gehört hatte, wurde beschlagnahmt; es wurde entweder in die Sowjetunion überführt, verstaatlicht oder unter den Bürgern neu verteilt."  #NT!
 GER_post_war_deportations.option.1:0 "Vertreibt die Deutschen!"  #NT!
 GER_post_war_deportations.option.2:0 "Lassen Sie sie in unserem Land bleiben."  #NT!
  
 ISR_post_war_migration.t:0 "Der Kibbuz Galuyot?"  #NT!
 ISR_post_war_migration.d:0 "Von 1948 bis 1951 kam es zu einer großen jüdischen Einwanderungswelle, hauptsächlich aus Europa nach dem Holocaust und der arabischen und muslimischen Welt. In dreieinhalb Jahren hat sich die jüdische Bevölkerung Israels, die bei der Staatsgründung 650.000 betrug, durch den Zustrom von etwa 688.000 Einwanderern mehr als verdoppelt. Im Jahr 1949 kam die größte Zahl jüdischer Einwanderer in einem einzigen Jahr – 249.954 – in Israel an. Diese Zeit der Einwanderung wird aufgrund der großen Zahl jüdischer Diaspora-Gemeinschaften, die Aliyah leisteten, oft als Kibbuz Galuyot (wörtlich: Zusammenführung von Vertriebenen) bezeichnet."  #NT!
 historical_pop_transfer.option.1:0 "Lass sie migrieren."  #NT!
 historical_pop_transfer.option.2:0 "Haltet sie davon ab, wegzugehen!"  #NT!
  
 POL_post_war_deportations.t:0 "Die erste Repatriierung von Polen?"  #NT!
 POL_post_war_deportations.d:0 "Bei den Umsiedlungen der polnischen Bevölkerung aus der östlichen Hälfte des Vorkriegspolens in den Jahren 1944–1946 handelte es sich um Zwangsmigrationen von Polen gegen Ende und nach dem Zweiten Weltkrieg. Diese waren das Ergebnis einer Politik der Sowjetunion, die von den wichtigsten Alliierten des Zweiten Weltkriegs ratifiziert worden war. Offiziellen Angaben zufolge verließen während der staatlich kontrollierten Vertreibung zwischen 1945 und 1946 etwa 1.167.000 Polen die westlichsten Teilrepubliken der Sowjetunion, weniger als 50 % derjenigen, die sich zur Bevölkerungsumsiedlung registriert hatten. Ein weiterer großer ethnischer polnischer Transfer fand nach Stalins Tod in den Jahren 1955–1959 statt."  #NT!
 POL_post_war_deportations.option.1:0 "Vertreibt die Polen!"  #NT!
 POL_post_war_deportations.option.2:0 "Lassen Sie sie in unserem Land bleiben."  #NT!
  
 POL_post_war_deportations_2.t:0 "Die zweite Rückführung der Polen?"  #NT!
 POL_post_war_deportations_2.d:0 "Die zweite Welle der erzwungenen Rückführung (oder Deportation) von Polen, die in den von der Sowjetunion annektierten Gebieten lebten (bekannt als Kresy Wschodnie), fand in den Jahren 1955–1959 statt. Der weit verbreitete Begriff Repatriierung, der durch jahrzehntelange polnische kommunistische Propaganda propagiert wurde, ist ein Euphemismus für Ausbürgerungshandlungen. Sie wird manchmal als „zweite Rückführung“ bezeichnet, um sie von der Rückführung in den Jahren 1944–1946 zu unterscheiden."  #NT!
  
