 je_climate_change_system:0 "Globaler Klimawandel"  #NT!
 je_climate_change_system_reason:0 "Unter Klimawandel versteht man langfristige Veränderungen von Temperaturen und Wettermustern. Diese Veränderungen mögen natürlich sein, aber seit dem 19. Jahrhundert sind menschliche Aktivitäten der Haupttreiber des Klimawandels, vor allem aufgrund der Verbrennung fossiler Brennstoffe (wie Kohle, Öl und Gas), bei der wärmespeichernde Gase entstehen. \n\nAktuelle Klimabedingungen: [SCOPE.GetRootScope.GetCountry.GetCustom('climate_effect_name')] \n\nZiel: Der Klima-Benchmark darf nicht über +2,0°C steigen. \n\nAktuelle globale Temperatur: +[GetPlayer.MakeScope.Var('climate_change_status_total_display').GetValue]°C. \n\nJährliche globale Temperaturänderung: [GetPlayer.MakeScope.Var('climate_change_progress_rate_display').GetValue]°C. \n\nTipp: Die Geschwindigkeit des Klimawandels kann durch die Einführung besserer $lawgroup_environmental_policy$ [concept_law] verlangsamt werden."  #NT!
