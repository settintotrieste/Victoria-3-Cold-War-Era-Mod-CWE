 je_foreign_central_bank_reason:0 "Da wir uns in einem [concept_currency_union] befinden, ist die Bank von [SCOPE.sCountry('foreign_central_bank').GetName] die Zentralbank von [ROOT.GetCountry.GetName]. Das bedeutet, dass die Zentralbank von [SCOPE.sCountry('foreign_central_bank').GetName] entscheiden wird, wie hoch der Zinssatz der #White Zentralbank#! [ROOT.GetCountry.GetName] sein soll. \n\nZentralbanken nutzen die Geldpolitik, um wirtschaftliche Schwankungen zu bewältigen und Preisstabilität zu erreichen, was bedeutet, dass die Inflation niedrig und stabil ist. Zentralbanken führen ihre Geldpolitik durch, indem sie die Geldmenge anpassen, in der Regel durch den Kauf oder Verkauf von Wertpapieren auf dem freien Markt. Offenmarktgeschäfte wirken sich auf die kurzfristigen Zinssätze aus, die wiederum die längerfristigen Zinssätze und die Wirtschaftstätigkeit beeinflussen. Wenn die Zentralbanken die Zinsen senken, wird die Geldpolitik gelockert. Wenn sie die Zinsen erhöhen, wird die Geldpolitik gestrafft. \n\nAktueller Zinssatz: [SCOPE.GetRootScope.GetCountry.GetCustom('central_bank_current_monetary_policy_custom_title')] \n\nAngemessener $lawgroup_monetary_policy$: [SCOPE.GetRootScope.GetCountry.GetCustom('central_bank_appropriate_monetary_policy_custom_title')] \n\nDurchschnittlicher Kern [SCOPE.sCountry('foreign_central_bank').GetName]0 des aktuellen Monats: [SCOPE.sCountry('foreign_central_bank').GetName]1 % \n\nDurchschnittlicher Kern [SCOPE.sCountry('foreign_central_bank').GetName]0 des Vormonats: [SCOPE.sCountry('foreign_central_bank').GetName]3 % \n\nZur Berechnung des Kerns [SCOPE.sCountry('foreign_central_bank').GetName]0 verwendete Güter ([SCOPE.sCountry('foreign_central_bank').GetName]5 verfügbar): [SCOPE.sCountry('foreign_central_bank').GetName]6 [SCOPE.sCountry('foreign_central_bank').GetName]7 [SCOPE.sCountry('foreign_central_bank').GetName]8 [SCOPE.sCountry('foreign_central_bank').GetName]9 [ROOT.GetCountry.GetName]0 [ROOT.GetCountry.GetName]1 [ROOT.GetCountry.GetName]2 [ROOT.GetCountry.GetName]3 [ROOT.GetCountry.GetName]4 [ROOT.GetCountry.GetName]5 [ROOT.GetCountry.GetName]6 [ROOT.GetCountry.GetName]7 [ROOT.GetCountry.GetName]8 [ROOT.GetCountry.GetName]9 [SCOPE.sCountry('foreign_central_bank').GetName]0 [SCOPE.sCountry('foreign_central_bank').GetName]1 [SCOPE.sCountry('foreign_central_bank').GetName]2 [SCOPE.sCountry('foreign_central_bank').GetName]3"  #NT!
