 form_commonwealth_decision:0 "Bilden Sie das Commonwealth of Nations"  #NT!
 form_commonwealth_decision_desc:0 "Das Commonwealth of Nations ist eine politische Vereinigung zwischen Ländern, die einst Teil der britischen Kolonien waren, aber als „frei und gleich“ galten. Die Mitgliedstaaten haben untereinander keine rechtlichen Verpflichtungen, sind jedoch durch die Verwendung der englischen Sprache und historische Bindungen verbunden. Die Staatsbürgerschaft eines Commonwealth-Staates bietet in einigen Mitgliedsländern, insbesondere im Vereinigten Königreich, Vorteile. Die Commonwealth-Charta definiert ihre gemeinsamen Werte Demokratie, Menschenrechte und Rechtsstaatlichkeit, wie sie durch die alle vier Jahre stattfindenden Commonwealth Games gefördert werden."  #NT!
