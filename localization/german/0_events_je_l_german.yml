 steal_nuclear_weapons.d:0 "Inspektoren von [ROOT.GetCountry.GetName] sind in [SCOPE.sCountry('former_nuclear_weapons_country').GetName] eingetroffen, um mit der Beschlagnahmung aller Massenvernichtungswaffen von [SCOPE.sCountry('former_nuclear_weapons_country').GetAdjective] zu beginnen. Sie werden damit fortfahren, alle nuklearen, biologischen und chemischen Waffen im Land zu entfernen."  #NT!
