 je_apartheid:0 "Apartheid in [ROOT.GetCountry.GetNameNoFlag]"  #NT!
 je_apartheid_reason:0 "Apartheid ist ein System der institutionalisierten Rassentrennung, das mit dem Ziel geschaffen wurde, sicherzustellen, dass das Land politisch, sozial und wirtschaftlich von einer bestimmten Kultur dominiert bleibt.\n\nWir betreiben derzeit in [ROOT.GetCountry.GetName] ein Apartheidregime, da wir entweder $law_ethnostate$, $law_national_supremacy$ oder $law_racial_segregation$ [concept_law] erlassen haben. Dieses Apartheidsystem wird nur dann vollständig abgebaut, wenn wir das $law_multicultural$ [concept_law] in Kraft setzen."  #NT!
  
