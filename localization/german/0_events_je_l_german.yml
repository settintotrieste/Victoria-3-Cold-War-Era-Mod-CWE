 je_non_aligned_movement:0 "Die Bewegung der Blockfreien Staaten"  #NT!
 je_non_aligned_movement_reason:0 "[ROOT.GetCountry.GetName] ist Mitglied der Blockfreien Bewegung. \n\nDie Blockfreie Bewegung (NAM) ist ein Forum von [GetPlayer.MakeScope.Var('NAM_member_count').GetValue] Ländern, die sich während des Kalten Krieges nicht formell mit oder gegen einen großen Machtblock verbündet haben. \n\nDie Bewegung entstand nach dem Koreakrieg als Versuch einiger Länder, der raschen Bipolarisierung der Welt während des Kalten Krieges entgegenzuwirken, bei der zwei Großmächte Blöcke bildeten und eine Politik verfolgten, um den Rest der Welt in ihren Einflussbereich zu ziehen."  #NT!
