 british_iraq.indy.t:0 "Die Besetzung des Irak beenden?"  #NT!
 british_iraq.indy.d:0 "Am 1. April 1941 führten Rashid Ali al-Gaylani und Mitglieder des Golden Square einen Staatsstreich durch. Während des anschließenden Anglo-Irakischen Krieges marschierte das Vereinigte Königreich in den Irak ein, aus Angst, die Regierung könnte aufgrund seiner Verbindungen zu den Achsenmächten die Öllieferungen an westliche Nationen drosseln. Auf die Wiederherstellung der Herrschaft der haschemitischen Monarchie vor dem Putsch folgte eine militärische Besetzung. Die Besatzung endete am 26. Oktober 1947, obwohl Großbritannien bis 1954 Militärstützpunkte im Irak behielt, woraufhin die assyrischen Milizen aufgelöst wurden."  #NT!
 british_malaysia.indy.t:0 "Britischer Rückzug aus Singapur?"  #NT!
 british_malaysia.indy.d:0 "Am 18. Juli 1967 kündigte Großbritannien an, seine Truppen bis Mitte der 1970er Jahre aus Singapur abzuziehen. Sechs Monate später wurde die Frist auf 1971 vorverlegt. Der plötzliche Abzug der britischen Streitkräfte stellte die Verteidigung und wirtschaftliche Sicherheit Singapurs vor ernsthafte Probleme. Als Reaktion darauf startete Singapur ein schnelles Industrialisierungsprogramm, verschärfte seine Arbeitsgesetze, um ausländische Investitionen anzuziehen, stärkte seine Verteidigung durch militärische Zusammenarbeit mit anderen Ländern und verdreifachte seine Militärausgaben."  #NT!
 british_malta_2.indy.t:0 "Britischer Rückzug aus Malta?"  #NT!
 british_malta_2.indy.d:0 "Malta erlangte seine Unabhängigkeit als Staat Malta am 21. September 1964 (Unabhängigkeitstag). Gemäß seiner Verfassung von 1964 behielt Malta zunächst Elisabeth II. als Königin von Malta und damit als Staatsoberhaupt, wobei in ihrem Namen ein Generalgouverneur die Exekutivgewalt ausübte. 1971 gewann die Malta Labour Party unter Dom Mintoff die allgemeinen Wahlen, was dazu führte, dass Malta sich am 13. Dezember 1974 (Tag der Republik) innerhalb des Commonwealth zur Republik erklärte. Kurz nach der Unabhängigkeit wurde ein Verteidigungsabkommen unterzeichnet, das nach Neuverhandlungen im Jahr 1972 am 31. März 1979 (Tag der Freiheit) auslief. Nach Ablauf der Gültigkeitsdauer wurde der britische Stützpunkt geschlossen und die zuvor von den Briten kontrollierten Ländereien wurden der maltesischen Regierung übergeben."  #NT!
