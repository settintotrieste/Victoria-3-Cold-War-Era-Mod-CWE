 je_civil_service_system_reform_civil_service_button_desc:0 "Die [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] wird Beamte, die die Nation repräsentieren, in Schlüsselpositionen ernennen, um sicherzustellen, dass die ideologischen Neigungen des öffentlichen Dienstes die Öffentlichkeit widerspiegeln."  #NT!
  
 je_civil_service_system_restore_civil_service_button:0 "Den öffentlichen Dienst entpolitisieren"  #NT!
