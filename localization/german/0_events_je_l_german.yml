 je_colonial_empire_reason:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('imperial_conference_custom_adjective')]-Konferenzen sind regelmäßige Treffen von Regierungsführern aus den selbstverwalteten Kolonien und Herrschaftsgebieten des [ROOT.GetCountry.GetAdjectiveNoFlag]-Imperiums. Alle Konferenzen finden in [ROOT.GetCountry.GetName] statt, dem Sitz des Imperiums. \n\nWir können die Konferenzen nutzen, um den Grad der Handelsintegration zwischen [concept_dominion] und [ROOT.GetCountry.GetName] zu bestimmen. \n\nWir können die Konferenzen auch nutzen, um alle Kolonien aufzufordern, uns in einem Verteidigungskrieg zu unterstützen."  #NT!
