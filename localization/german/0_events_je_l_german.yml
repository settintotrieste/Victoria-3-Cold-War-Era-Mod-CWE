 form_ibero_american_organisation_decision_desc:0 "Die Organisation Iberoamerikanischer Staaten ist eine internationale Organisation, die aus 23 Mitgliedsstaaten iberophoner Nationen in Europa und Amerika sowie einem Mitglied in Afrika besteht. Zu den Mitgliedern der OEI gehören alle souveränen Staaten Iberoamerikas und der Iberischen Halbinsel sowie Äquatorialguinea. Alle Mitglieder sind portugiesisch- und spanischsprachige Nationen, zusätzlich zu Andorra, wo überwiegend Katalanisch gesprochen wird, obwohl die Organisation nicht alle iberophonen Nationen der Welt umfasst."  #NT!
