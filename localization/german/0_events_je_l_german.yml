 ig_armed_forces_economic_ideology.t:0 "[SCOPE.gsInterestGroup('armed_forces_ig').GetName] ändert seine wirtschaftliche Ideologie"  #NT!
 ig_armed_forces_economic_ideology.d:0 "[SCOPE.sCharacter('armed_forces_ig_leader').GetFullName], Anführer der [SCOPE.gsInterestGroup('armed_forces_ig').GetName], hat sich für ein neues Wirtschaftssystem für [SCOPE.sCountry('ig_armed_forces_country').GetName] ausgesprochen. Das vorgeschlagene System ist eine radikale Abkehr von dem, das derzeit von der Mehrheit der Regierung angenommen wird. Der [SCOPE.gsInterestGroup('armed_forces_ig').GetName] begründete diesen radikalen Ansatz damit, dass starke, entschlossene und unkonventionelle Maßnahmen erforderlich seien, um die aktuellen wirtschaftlichen Probleme zu lösen, die [SCOPE.sCountry('ig_armed_forces_country').GetName] plagen."  #NT!
 ig_armed_forces_economic_ideology.f:0 "Dieses Ereignis wird immer dann ausgelöst, wenn sich [SCOPE.gsInterestGroup('armed_forces_ig').GetName] in [concept_opposition] befindet, auf die Regierung verärgert ist und die Wirtschaft zahlungsunfähig oder nicht gesund ist. Die gewählte neue Wirtschaftsideologie wird auch immer das genaue Gegenteil der Wirtschaftsideologie der Interessengruppe mit dem größten Einfluss in der Regierung sein."  #NT!
  
 ig_armed_forces_economic_ideology_dictatorship.t:0 "[SCOPE.gsInterestGroup('armed_forces_ig').GetName] ändert seine wirtschaftliche Ideologie"  #NT!
 ig_armed_forces_economic_ideology_dictatorship.d:0 "Als Zeichen der Loyalität gegenüber [SCOPE.sCharacter('rulers_scope').GetFullName] hat der Anführer der [SCOPE.gsInterestGroup('armed_forces_ig').GetName], General [SCOPE.sCharacter('armed_forces_ig_leader').GetFullName], eine öffentliche Erklärung abgegeben, in der er die Wirtschaftspolitik der Regierung lobt und sich verpflichtet, sie zu unterstützen. Der General hat außerdem angekündigt, dass er eine Umbildung des Militärs vornehmen wird, um proaktiv jeden zu entfernen, der sich der Regierung widersetzt."  #NT!
 ig_armed_forces_economic_ideology_dictatorship.f:0 "Dieses Ereignis wird immer dann ausgelöst, wenn sich [SCOPE.gsInterestGroup('armed_forces_ig').GetName] in [concept_government] befindet und mit der Regierung zufrieden ist. Die gewählte neue Wirtschaftsideologie wird immer die gleiche sein wie die der Interessengruppe mit dem größten Einfluss in der Regierung."  #NT!
 ig_armed_forces_ideology_system.2.tt:0 "Mischen Sie die [SCOPE.gsInterestGroup('armed_forces_ig').GetName] neu, indem Sie alle [concept_general] oder [concept_admiral] ersetzen, die nicht zu den [concept_ruler], [concept_interest_group] oder [SCOPE.gsInterestGroup('armed_forces_ig').GetName] gehören"  #NT!
  
