 rio_pact_member:0 "Mitglied des Rio-Pakts"  #NT!
 rio_pact_leader:0 "Anführer des Rio-Pakts"  #NT!
 form_rio_pact_decision:0 "Schließen Sie den Interamerikanischen Vertrag über gegenseitige Unterstützung ab"  #NT!
 form_rio_pact_decision_desc:0 "Der Interamerikanische Vertrag über gegenseitige Unterstützung (allgemein bekannt als Rio-Pakt) ist ein Abkommen, das 1947 in Rio de Janeiro zwischen vielen Ländern Amerikas unterzeichnet wurde. Der in seinen Artikeln enthaltene zentrale Grundsatz besteht darin, dass ein Angriff gegen einen einzelnen als Angriff gegen alle zu betrachten ist. Dies wurde als Doktrin der „hemisphärischen Verteidigung“ bezeichnet. Dennoch haben mehrere Mitglieder mehrfach gegen den Vertrag verstoßen. Der Vertrag wurde ursprünglich 1947 geschlossen und trat gemäß Artikel 22 des Vertrags 1948 in Kraft."  #NT!
