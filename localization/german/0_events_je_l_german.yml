 je_nuclear_weapons_info_panel_reason:0 "[ROOT.GetCountry.GetName] befindet sich derzeit in einem nuklearen Wettrüsten mit einem rivalisierenden Land. \n\nWir müssen uns daher dafür einsetzen, dass [ROOT.GetCountry.GetName] über mehr nukleare Schlagkraft verfügt als alle atomar bewaffneten Länder, die schlechte oder schlechtere Beziehungen zu diesem Land haben. \n\nBrutto-Nuklearschlagkraft: [GetPlayer.MakeScope.Var('nuclear_strike_power_display').GetValue] \n\nNuklearschlagabwehr: [GetPlayer.MakeScope.Var('nuclear_strike_defence_display').GetValue] \n\nGegnerische Brutto-Nuklearschlagkraft: [GetPlayer.MakeScope.Var('nuclear_strike_power_enemy_display').GetValue] \n\nFeindliche Nuklearschlagabwehr: [GetPlayer.MakeScope.Var('nuclear_strike_defence_enemy_display').GetValue] \n\nGeschätzte Netto-Nuklearschlagstärke: [GetPlayer.MakeScope.Var('nuclear_strike_power_THIS_enemy_ratio').GetValue] \n\nGeschätzte Netto-Nuklearschlagstärke des Feindes: [GetPlayer.MakeScope.Var('nuclear_strike_power_enemy_THIS_ratio').GetValue] \n\nAnzahl der Feinde: [GetPlayer.MakeScope.Var('nuclear_enemy_counter_display').GetValue] \n\nNuklearwaffen-Überlegenheitswert: [GetPlayer.MakeScope.Var('nuclear_strike_power_ratio').GetValue]"  #NT!
