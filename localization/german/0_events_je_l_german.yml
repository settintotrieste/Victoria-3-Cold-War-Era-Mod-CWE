 espionage_instigate_domestic_unrest.t:0 "Gelegenheit, in [SCOPE.sCountry('espionage_target').GetName] Unruhe zu schüren"  #NT!
 espionage_instigate_domestic_unrest.d:0 "[SCOPE.sCountry('espionage_attacker').GetAdjective] Agenten, die in [SCOPE.sCountry('espionage_target').GetName] tätig sind, haben eine Gelegenheit gefunden, Unruhe und Aufruhr zu schüren. Sie schlagen vor, bestimmte hetzerische politische Botschaften in führenden Medien zu veröffentlichen, um Unruhen und Proteste zu schüren. Diese verdeckte Operation sollte die Zahl der Radikalen in [SCOPE.sCountry('espionage_target').GetName] über einen Zeitraum von 12 Monaten erhöhen."  #NT!
 espionage_instigate_domestic_unrest.f:0 "Beachten Sie, dass die Möglichkeit besteht, dass unsere Handlungen von den Geheimdiensten von [SCOPE.sCountry('espionage_target').GetAdjective] erfasst werden, was unsere Beziehungen zu [SCOPE.sCountry('espionage_target').GetName] ernsthaft beeinträchtigen würde."  #NT!
  
 espionage_instigate_domestic_unrest_target.t:0 "Häusliche Unruhen angestiftet von [SCOPE.sCountry('suspected_espionage_attacker').GetAdjective] Spionen"  #NT!
 espionage_instigate_domestic_unrest_target.d:0 "Die [SCOPE.GetRootScope.GetCountry.GetCustom('secret_police_custom_title')] berichtet, dass [SCOPE.sCountry('suspected_espionage_attacker').GetAdjective] Spione Unruhen in [SCOPE.sCountry('espionage_victim').GetName] angestiftet haben, indem sie ihren Einfluss in nationalen Medienkreisen genutzt haben, um eine Reihe hetzerischer Artikel zu veröffentlichen, die rassistische und religiöse Feindseligkeit schüren."  #NT!
 espionage_instigate_domestic_unrest_target.f:0 "Beachten Sie, dass es sich nur um eine Vermutung handelt, dass [SCOPE.sCountry('suspected_espionage_attacker').GetName] die verdeckte Aktion durchgeführt hat. Die Entscheidung, sie des Verrats zu beschuldigen, könnte daher fehl am Platz sein."  #NT!
  
