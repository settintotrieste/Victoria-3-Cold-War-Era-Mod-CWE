 je_leave_superstate_currency_union_button:0 "Verlassen Sie die Währungsunion"  #NT!
 je_leave_superstate_currency_union_button_desc:0 "Wir können die [concept_currency_union] aus anderen $custom_loc_superstate_full_title$-Mitgliedern bestehen lassen. \n\nDies wird im Spiel durch die Schaffung einer [concept_currency_union] zwischen diesem Land und dem Anführer der [concept_market] unseres Landes dargestellt."  #NT!
  
 je_join_superstate_defence_union_button:0 "Treten Sie der Verteidigungsunion bei"  #NT!
 je_join_superstate_defence_union_button_desc:0 "Wir können eine regionale Verteidigungsunion gründen, die aus anderen $custom_loc_superstate_full_title$-Mitgliedern besteht. \n\nDies wird im Spiel durch die Schaffung einer [concept_defensive_pact] zwischen allen Ländern dargestellt, die die gleichen Superstate-Ambitionen verfolgen und sich für den Beitritt zur Superstate Defense Union entschieden haben."  #NT!
  
