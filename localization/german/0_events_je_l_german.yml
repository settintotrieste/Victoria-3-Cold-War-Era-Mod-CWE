 spending_policy_ideology.t:0 "Neue öffentliche Meinung zu Staatsausgaben"  #NT!
 spending_policy_ideology.d:0 "Als Reaktion auf die neue Wirtschaftslage im Jahr [ROOT.GetCountry.GetName] haben die [SCOPE.gsInterestGroup('affected_IG_scope').GetName] [concept_interest_group] ihre Absicht geäußert, ihre Haltung zur angemessenen Höhe der Staatsausgaben zu ändern."  #NT!
 spending_policy_ideology.f:0 "Dieses Ereignis wurde ausgelöst, weil die wirtschaftlichen Bedingungen nicht mehr der angemessenen Dynamik [concept_ideology] für Staatsausgaben entsprechen."  #NT!
  
 population_policy_ideology.t:0 "Neue öffentliche Meinung zur Bevölkerungspolitik"  #NT!
 population_policy_ideology.d:0 "Als Reaktion auf die neue sozioökonomische Situation in [ROOT.GetCountry.GetName] haben die [SCOPE.gsInterestGroup('affected_IG_scope').GetName] [concept_interest_group] ihre Absicht geäußert, ihre Haltung zum angemessenen Ausmaß staatlicher Eingriffe in den Bereich des Bevölkerungswachstums zu ändern."  #NT!
 population_policy_ideology.f:0 "Dieses Ereignis wurde ausgelöst, weil der Durchschnitt [concept_sol] nicht mehr mit der entsprechenden Dynamik [concept_ideology] für Bevölkerungsrichtlinien übereinstimmt. \n\n#BOLD Die [concept_ideology] Änderungen sind wie folgt:#! \n\n#BOLD #green 25 und höher [concept_sol]#! - $ideology_pro_population$ [concept_ideology] \n\n#BOLD [concept_ideology]2 Zwischen 25 und 10 [concept_sol]#! - [concept_ideology]5 [concept_ideology] \n\n#BOLD [concept_ideology]8 10 und darunter [concept_sol]#! - #BOLD1 [concept_ideology]"  #NT!
  
 dynamic_ideology_system_1.option:0 "Akzeptieren Sie die Änderung."  #NT!
 dynamic_ideology_system_2.option:0 "Benutzen Sie unsere Spione im [concept_interest_group], um dies zu stoppen."  #NT!
  
 changing_civil_defence_level:0 "Kürzlich geändertes Zivilschutzniveau"  #NT!
  
 je_civil_defence:0 "[ROOT.GetCountry.GetAdjectiveNoFlag] Zivilschutz"  #NT!
 je_civil_defence_reason:0 "Zivilschutz ist ein Versuch, die Bürger eines Staates (im Allgemeinen Nichtkombattanten) vor von Menschen verursachten Katastrophen und Naturkatastrophen zu schützen. Es nutzt die Prinzipien von Notfalleinsätzen: Prävention, Schadensbegrenzung, Vorbereitung, Reaktion oder Notevakuierung und Bergung. \n\nIn diesem Mod wird der Zivilschutz die Auswirkungen eines Atomkriegs und strategischer Bombardierungen reduzieren. \n\nHinweis: Die Stärke des Zivilschutzes kann durch die Erforschung fortschrittlicherer Militärtechnologie erhöht werden."  #NT!
 je_civil_defence_increase_civil_defence_button:0 "Erhöhen Sie die Finanzierung"  #NT!
 je_civil_defence_increase_civil_defence_button_desc:0 "Der Staat wird das Niveau seines Zivilschutzes erhöhen, indem er die ihm zugewiesenen Mittel erhöht."  #NT!
 je_civil_defence_decrease_civil_defence_button:0 "Finanzierung verringern"  #NT!
 je_civil_defence_decrease_civil_defence_button_desc:0 "Der Staat wird sein Ausmaß an Zivilschutz verringern, indem er die dafür bereitgestellten Mittel kürzt."  #NT!
  
 USA_PER_Hostage_Crisis.t:0 "Die iranische Geiselkrise?"  #NT!
 USA_PER_Hostage_Crisis.d:0 "Die iranische Geiselkrise war eine diplomatische Pattsituation zwischen dem Iran und den Vereinigten Staaten. 53 amerikanische Diplomaten und Bürger wurden als Geiseln gehalten, nachdem eine Gruppe militarisierter iranischer College-Studenten, die den muslimischen Studentenanhängern der Linie des Imams angehörten und die iranische Revolution unterstützten, darunter Hossein Dehghan, Mohammad Ali Jafari und Mohammad Bagheri, die US-Botschaft in Teheran übernahmen und sie als Geiseln nahmen."  #NT!
 USA_SOV_U2_Incident.t:0 "Der U-2-Vorfall?"  #NT!
 USA_SOV_U2_Incident.d:0 "Am 1. Mai 1960 wurde ein U-2-Spionageflugzeug der Vereinigten Staaten von den sowjetischen Luftverteidigungskräften abgeschossen, als es tief im sowjetischen Territorium eine fotografische Luftaufklärung durchführte. Das vom amerikanischen Piloten Francis Gary Powers geflogene Flugzeug war in Peshawar, Pakistan, gestartet und in der Nähe von Swerdlowsk (heute Jekaterinburg) abgestürzt, nachdem es von einer Boden-Luft-Rakete getroffen worden war. Powers sprang mit dem Fallschirm zu Boden und wurde gefangen genommen."  #NT!
 USA_SOV_Able_Archer.t:0 "Die Able Archer 83-Krise?"  #NT!
 USA_SOV_Able_Archer.d:0 "Able Archer 83 war eine Militärübung der NATO, die im November 1983 im Rahmen einer jährlichen Übung im November 1983 stattfand. Die Übung 1983, die am 7. November 1983 begann, führte mehrere neue Elemente ein, die es in den Vorjahren nicht gab, darunter ein neues, einzigartiges Format verschlüsselter Kommunikation, Funkstille und die Beteiligung von Regierungschefs. Dieser zunehmende Realismus, verbunden mit den angespannten Beziehungen zwischen den Vereinigten Staaten und der Sowjetunion und der erwarteten Ankunft der Atomraketen Pershing II in Europa, veranlasste einige Mitglieder des sowjetischen Politbüros und Militärs zu der Annahme, dass Able Archer 83 eine Kriegslist sei, die die Vorbereitungen für einen echten nuklearen Erstschlag verschleiere. Als Reaktion darauf bereitete die Sowjetunion ihre Nuklearstreitkräfte vor und versetzte Lufteinheiten in Ostdeutschland und Polen in Alarmbereitschaft."  #NT!
 SOV_USA_KOR_Incident.t:0 "Der Vorfall mit Flug 007 der Korean Air Lines"  #NT!
 SOV_USA_KOR_Incident.d:0 "Korean-Air-Lines-Flug 007 war ein Linienflug der Korean Air Lines von New York City über Anchorage, Alaska, nach Seoul. Am 1. September 1983 wurde der Flug von einem sowjetischen Abfangflugzeug vom Typ Suchoi Su-15 abgeschossen. Das Verkehrsflugzeug Boeing 747 war auf dem Weg von Anchorage nach Seoul, aber aufgrund eines Navigationsfehlers der Besatzung kam das Flugzeug von seiner geplanten Route ab und flog durch den von der Sowjetunion verbotenen Luftraum. Die sowjetischen Luftstreitkräfte behandelten das nicht identifizierte Flugzeug als eindringendes US-Spionageflugzeug und zerstörten es mit Luft-Luft-Raketen, nachdem sie Warnschüsse abgefeuert hatten."  #NT!
 USA_GUA_Overthrow.t:0 "Operation PBSuccess?"  #NT!
 USA_GUA_Overthrow.d:0 "Eisenhower genehmigte im August 1953 die CIA-Operation zum Sturz von Jacobo Árbenz mit dem Codenamen Operation PBSuccess. Der Operation wurde ein Budget von 2,7 Millionen US-Dollar für „psychologische Kriegsführung und politische Aktion“ gewährt. Castillo Armas erhielt genug Geld, um eine kleine Söldnertruppe aus guatemaltekischen Exilanten und der Bevölkerung benachbarter Länder zu rekrutieren. Diese Band wurde „Armee der Befreiung“ genannt. Die CIA richtete Trainingslager in Nicaragua und Honduras ein und versorgte sie mit Waffen sowie mehreren Bombern."  #NT!
 SOV_AFG_Overthrow.t:0 "Operation Storm-333"  #NT!
 SOV_AFG_Overthrow.d:0 "Der Angriff auf den Tajbeg-Palast, bekannt unter dem militärischen Codenamen Operation Storm-333, war ein militärischer Angriff der Sowjetunion in Afghanistan am 27. Dezember 1979. Spezialeinheiten und Luftlandetruppen stürmten den stark befestigten Tajbeg-Palast in Kabul und ermordeten den afghanischen Führer Hafizullah Amin, einen Khalqisten der Demokratischen Volkspartei Afghanistans (PDPA), der in der Saur-Revolution im April 1978 die Macht übernommen hatte Beginn des sowjetisch-afghanischen Krieges."  #NT!
 EGR_WGR_Berlin_Wall.t:0 "Die Berliner Mauer?"  #NT!
 EGR_WGR_Berlin_Wall.d:0 "Die Berliner Mauer war eine bewachte Betonbarriere, die Westberlin von 1961 bis 1989 umgab und es von Ostberlin und der Deutschen Demokratischen Republik trennte. Der Bau der Berliner Mauer wurde am 13. August 1961 von der Regierung der DDR begonnen. Er umfasste Wachtürme entlang großer Betonmauern, begleitet von einem weiten Bereich (später als „Todesstreifen“ bekannt), der Fahrzeuggräben, Nagelbetten und andere Verteidigungsanlagen enthielt. Der Zweck des Mauerbaus bestand in erster Linie darin, die Flucht ostdeutscher Bürger in den Westen zu verhindern."  #NT!
 EGR_WGR_Berlin_Wall_Fall.t:0 "Der Fall der Berliner Mauer?"  #NT!
 EGR_WGR_Berlin_Wall_Fall.d:0 "Der Fall der Berliner Mauer am 9. November 1989 während der Friedlichen Revolution markierte den Beginn der Zerstörung der Berliner Mauer und des symbolischen Eisernen Vorhangs, als die Transitbeschränkungen für Ostberlin aufgehoben und aufgehoben wurden. Teile der Mauer wurden durchbrochen und der geplante Rückbau begann im darauffolgenden Juni."  #NT!
 USA_CUB_Overthrow.t:0 "Die Invasion in der Schweinebucht?"  #NT!
 USA_CUB_Overthrow.d:0 "Die Invasion in der Schweinebucht war eine gescheiterte militärische Landungsoperation an der Südwestküste Kubas im Jahr 1961 durch die Vereinigten Staaten von Amerika und die Kubanische Demokratische Revolutionsfront (DRF), bestehend aus Exilkubanern, die sich Fidel Castros Kubanische Revolution widersetzten und heimlich von der US-Regierung finanziert und geleitet wurden. Die Operation fand auf dem Höhepunkt des Kalten Krieges statt und ihr Scheitern beeinflusste die Beziehungen zwischen Kuba, den Vereinigten Staaten und der Sowjetunion."  #NT!
 GBR_Chagos_Island_deport.t:0 "Die Vertreibung der Chagossianer?"  #NT!
 GBR_Chagos_Island_deport.d:0 "Auf Ersuchen der Vereinigten Staaten begann das Vereinigte Königreich 1968 mit der Vertreibung der Bewohner des Chagos-Archipels und schloss seine Zwangsdeportationen am 27. April 1973 mit der Vertreibung der verbliebenen Chagossianer auf dem Peros-Banhos-Atoll ab."  #NT!
 USA_SOV_Azorian_Incident.t:0 "Projekt Azorian?"  #NT!
 USA_SOV_Azorian_Incident_1.t:0 "Versunkenes sowjetisches U-Boot von den USA geborgen"  #NT!
 USA_SOV_Azorian_Incident.d:0 "Projekt Azorian war ein Projekt der US-amerikanischen Central Intelligence Agency (CIA) zur Bergung des versunkenen sowjetischen U-Bootes K-129 vom Boden des Pazifischen Ozeans im Jahr 1974 mithilfe des speziell dafür gebauten Schiffs Hughes Glomar Explorer. Der Untergang der K-129 im Jahr 1968 ereignete sich etwa 1.560 Meilen (2.510 km) nordwestlich von Hawaii. Das Projekt Azorian war eine der komplexesten, teuersten und verdecktesten Geheimdienstoperationen des Kalten Krieges mit Kosten von etwa 800 Millionen US-Dollar, was heute 4,9 Milliarden US-Dollar entspricht."  #NT!
 USA_Reagan_Doctrine.t:0 "Die Reagan-Doktrin?"  #NT!
 USA_Reagan_Doctrine.d:0 "Die Reagan-Doktrin war eine Strategie der Vereinigten Staaten, die von der Reagan-Administration umgesetzt wurde, um den globalen Einfluss der Sowjetunion im späten Kalten Krieg zu überwinden. Im Rahmen der Reagan-Doktrin leisteten die Vereinigten Staaten offene und verdeckte Hilfe für antikommunistische Guerillas und Widerstandsbewegungen, um die von der Sowjetunion unterstützten prokommunistischen Regierungen in Afrika, Asien und Lateinamerika „zurückzudrängen“. Die Doktrin sollte den sowjetischen Einfluss in diesen Regionen als Teil der Gesamtstrategie der Regierung zum Sieg im Kalten Krieg verringern."  #NT!
 SOV_Brezhnev_Doctrine.t:0 "Die Breschnew-Doktrin?"  #NT!
 SOV_Brezhnev_Doctrine.d:0 "Die Breschnew-Doktrin war eine sowjetische Außenpolitik, die verkündete, dass jede Bedrohung der „sozialistischen Herrschaft“ in irgendeinem Staat des Sowjetblocks in Mittel- und Osteuropa eine Bedrohung für alle darstellte und daher das Eingreifen anderer sozialistischer Staaten rechtfertigte. Es wurde verkündet, um die sowjetische Besetzung der Tschechoslowakei Anfang 1968 und den Sturz der dortigen Reformregierung zu rechtfertigen. Die Verweise auf „Sozialismus“ meinten die Kontrolle durch die kommunistischen Parteien, die dem Kreml treu ergeben waren."  #NT!
 GBR_Atlanticism.t:0 "Thatcheristischer Atlantikismus?"  #NT!
 GBR_Atlanticism_1.t:0 "Die besondere Beziehung?"  #NT!
 GBR_Atlanticism.d:0 "Als Thatcher Premierministerin war, engagierte sie sich sehr für die transatlantischen Beziehungen mit US-Präsident Ronald Reagan. Sie unterstützte Reagans Politik oft öffentlich, auch wenn andere westliche Verbündete sich nicht so lautstark äußerten. Beispielsweise erteilte sie amerikanischen Flugzeugen die Erlaubnis, britische Stützpunkte für Angriffe zu nutzen, wie zum Beispiel bei der US-Bombardierung der libysch-arabischen Dschamahirija im Jahr 1986, und erlaubte die Stationierung amerikanischer Marschflugkörper und Pershing-Raketen auf britischem Boden als Reaktion auf die sowjetische Stationierung von SS-20-Atomraketen gegen Großbritannien und andere westeuropäische Staaten."  #NT!
 NOR_Dag_Hammarskjold_death.t:0 "Tod von Dag Hammarskjöld?"  #NT!
 NOR_Dag_Hammarskjold_death.d:0 "Am 18. September 1961 war Hammarskjöld unterwegs, um einen Waffenstillstand zwischen den Streitkräften der Vereinten Nationen im Kongo und den katangesischen Truppen unter Moise Tshombe auszuhandeln. Sein Douglas DC-6 Verkehrsflugzeug SE-BDY stürzte in der Nähe von Ndola, Nordrhodesien (heute Sambia) ab. Hammarskjöld kam bei dem Absturz ums Leben, ebenso wie alle 15 anderen Passagiere. Hammarskjölds Tod löste bei den Vereinten Nationen eine Nachfolgekrise aus, da es keine Nachfolgeregelung gab und der Sicherheitsrat daher über einen Nachfolger abstimmen musste. Die Umstände des Absturzes sind noch unklar. Eine Rhodesian-Untersuchung aus dem Jahr 1962 kam zu dem Schluss, dass ein Pilotenfehler die Ursache war, während eine spätere UN-Untersuchung die Ursache des Absturzes nicht ermitteln konnte."  #NT!
 LEB_Crisis_1958.t:0 "Die Libanon-Krise"  #NT!
 LEB_Crisis_1958.d:0 "Die Libanonkrise von 1958 war eine politische Krise im Libanon, die durch politische und religiöse Spannungen im Land verursacht wurde, zu der auch eine amerikanische Militärintervention gehörte, die etwa drei Monate dauerte, bis Präsident Camille Chamoun, der um Hilfe gebeten hatte, seine Amtszeit als Präsident des Libanon beendete. Amerikanische und libanesische Regierungstruppen besetzten den Hafen von Beirut und den internationalen Flughafen Beirut. Als die Krise vorbei war, zogen sich die Vereinigten Staaten zurück."  #NT!
 ITA_SAN_1957.t:0 "Die Fatti di Rovereta?"  #NT!
 ITA_SAN_1957.d:0 "Die Fatti di Rovereta (die Rovereta-Affäre) war eine Verfassungskrise in San Marino im Jahr 1957, bei der der Große und Allgemeine Rat absichtlich für unquoll erklärt wurde, um die geplante Wahl des Kapitänsregenten zu verhindern. Im Dorf Rovereta wurde eine provisorische Regierung als Opposition zum scheidenden Kapitänsregenten eingesetzt, dessen Amtszeit abgelaufen war. Italien erkannte die provisorische Regierung an und die italienischen Carabinieri schützten die drei Seiten der Fabrik, die sich auf ihrem Territorium befanden. Am 11. Oktober gab die Regentschaft nach und erkannte die provisorische Regierung an, wodurch die Krise beendet wurde."  #NT!
 HND_PAK_KAS_1999.t:0 "Der Kargil-Krieg?"  #NT!
 HND_PAK_KAS_1999.d:0 "Der Kargil-Krieg wurde von Mai bis Juli 1999 zwischen Indien und Pakistan im Distrikt Kargil in Ladakh, damals Teil des von Indien verwalteten Bundesstaates Jammu und Kashmir, und entlang der Kontrolllinie (LoC) ausgetragen."  #NT!
 HND_PAK_KAS_2025.t:0 "Die Indien-Pakistan-Krise?"  #NT!
 HND_PAK_KAS_2025.d:0 "Nach dem Terroranschlag von Pahalgam am 22. April 2025 kam es zu einer Krise zwischen Indien und Pakistan, die durch die Ermordung von 25 indischen Touristen durch die Militanten in Kaschmir ausgelöst wurde. Zu dem Anschlag bekannte sich zunächst die Widerstandsfront (TRF). Ab dem 24. April wurden entlang der Kontrolllinie (LoC) bewaffnete Gefechte zwischen Indien und Pakistan gemeldet. Am 7. Mai 2025 startete Indien Raketenangriffe auf Pakistan, was zu einem militärischen Konflikt zwischen den beiden Ländern führte. Am 7. Mai 2025 reagierte die pakistanische Armee mit einem Angriff auf Poonch, Jammu, bei dem 16 Zivilisten getötet und Hunderte Häuser zerstört wurden. Am 10. Mai 2025 wurde im Anschluss an eine Vereinbarung zwischen Indien und Pakistan ein Waffenstillstand verkündet."  #NT!
 SOV_ALB_Vlora_Incident.t:0 "Der Vlora-Vorfall?"  #NT!
 SOV_ALB_Vlora_Incident.d:0 "Der Vorfall in Vlora war eine militärische Konfrontation zwischen Albanien und der Sowjetunion im Jahr 1961. Die albanische Volksarmee blockierte den Marinestützpunkt Vlora, was zur Beschlagnahmung sowjetischer Schiffe und Ausrüstung führte. Der Vorfall verdeutlichte die eskalierenden diplomatischen Spannungen zwischen den beiden Nationen, die letztendlich zur Vertreibung der sowjetischen Streitkräfte aus Albanien führten."  #NT!
 SRL_TAE_civil_war_end.t:0 "Die Nordoffensive?"  #NT!
 SRL_TAE_civil_war_end.d:0 "Die SLA-Nordoffensive 2008–2009 war ein bewaffneter Konflikt in der Nordprovinz Sri Lankas zwischen dem srilankischen Militär und den separatistischen Befreiungstigern von Tamil Eelam (LTTE). Die Schlacht begann mit einer Offensive der srilankischen Armee (SLA), die versuchte, die LTTE-Verteidigungslinien im Norden der Insel zu durchbrechen, mit dem Ziel, den 25 Jahre währenden Bürgerkrieg des Landes mit einem militärischen Sieg zu beenden."  #NT!
 USA_SOV_Great_Seal_Bug.t:0 "Der Vorfall mit der großen Robbenwanze"  #NT!
 USA_SOV_Great_Seal_Bug.d:0 "1945 schenkten sowjetische Pfadfinder dem US-Botschafter in Moskau ein geschnitztes Großes Siegel. Darin versteckt war „The Thing“, ein passives Abhörgerät ohne Stromquelle. Es blieb sieben Jahre lang unentdeckt, ermöglichte sowjetisches Abhören und markierte einen Meilenstein in der Spionage- und Überwachungstechnologie des Kalten Krieges. Der Große Siegelkäfer wurde 1952 entdeckt, sieben Jahre nachdem er dem US-Botschafter in Moskau geschenkt worden war. Es wurde bei einer routinemäßigen Durchsuchung durch das Außenministerium entdeckt und brachte ein passives Abhörgerät zum Vorschein, das im Holzsiegel versteckt war. Der Käfer des Großen Siegels wurde am 26. Mai 1960 während einer dramatischen Präsentation des US-Botschafters Henry Cabot Lodge Jr. vor dem UN-Sicherheitsrat bei den Vereinten Nationen öffentlich zur Schau gestellt."  #NT!
  
