 montreal_protocol_climate.t:0 "Das Montrealer Protokoll"  #NT!
 montreal_protocol_climate.d:0 "Obwohl das Montrealer Protokoll nicht zur Bekämpfung des Klimawandels gedacht war, handelte es sich um ein historisches Umweltabkommen, das zum Modell für die künftige Diplomatie in dieser Frage wurde. Alle Länder der Welt ratifizierten schließlich den Vertrag, der sie dazu verpflichtete, die Produktion von Substanzen einzustellen, die die Ozonschicht schädigen, wie beispielsweise Fluorchlorkohlenwasserstoffe (FCKW). Mit dem Protokoll ist es gelungen, fast 99 Prozent dieser ozonschädigenden Substanzen zu eliminieren. Im Jahr 2016 einigten sich die Parteien im Kigali Amendment darauf, auch die Produktion von Fluorkohlenwasserstoffen (HFCs) zu reduzieren, starken Treibhausgasen, die zum Klimawandel beitragen."  #NT!
 earth_summit_climate.t:0 "Der Erdgipfel"  #NT!
 earth_summit_climate.d:0 "Das bahnbrechende Abkommen wurde von 197 Ländern, darunter den Vereinigten Staaten, ratifiziert und war der erste globale Vertrag, der sich ausdrücklich mit dem Klimawandel befasste. Es richtete ein jährliches Forum ein, die Konferenz der Vertragsparteien (Conference of the Parties, COP), für internationale Diskussionen mit dem Ziel, die Konzentration von Treibhausgasen in der Atmosphäre zu stabilisieren. Diese Treffen führten zum Kyoto-Protokoll und zum Pariser Abkommen."  #NT!
 kyoto_protocol_climate.t:0 "Das Kyoto-Protokoll"  #NT!
 kyoto_protocol_climate.d:0 "Das 1997 verabschiedete und 2005 in Kraft getretene Kyoto-Protokoll war der erste rechtsverbindliche Klimavertrag. Darin wurde von den Industrieländern eine Reduzierung der Emissionen um durchschnittlich fünf Prozent gegenüber dem Niveau von 1990 verlangt und ein System zur Überwachung der Fortschritte der Länder eingeführt. Der Vertrag verpflichtete die Entwicklungsländer, darunter die großen CO2-Emittenten China und Indien, jedoch nicht zum Handeln. Die Vereinigten Staaten unterzeichneten das Abkommen 1998, ratifizierten es jedoch nie und zogen später ihre Unterschrift zurück."  #NT!
 paris_climate_accords_climate.t:0 "Das Pariser Klimaabkommen"  #NT!
 paris_climate_accords_climate.d:0 "Das bislang bedeutendste globale Klimaabkommen, das Pariser Abkommen, verlangt von allen Ländern, Zusagen zur Emissionsreduzierung zu machen. Regierungen legen Ziele fest, sogenannte national festgelegte Beiträge (NDCs), mit dem Ziel, einen Anstieg der globalen Durchschnittstemperatur um 2 °C (3,6 °F) über das vorindustrielle Niveau zu verhindern und Anstrengungen zu unternehmen, um sie unter 1,5 °C (2,7 °F) zu halten. Ziel ist es außerdem, in der zweiten Hälfte des Jahrhunderts weltweit Netto-Null-Emissionen zu erreichen, bei denen die Menge der ausgestoßenen Treibhausgase der Menge entspricht, die aus der Atmosphäre entfernt wird."  #NT!
  
