 je_start_inject_sovereign_fund_button_desc:0 "Der [concept_government] überweist jeden Monat Geld vom [ROOT.GetCountry.GetAdjectiveNoFlag] [concept_treasury] zum [concept_investment_pool], wenn der [concept_treasury] mindestens @money!#yellow 10000#!. hat"  #NT!
