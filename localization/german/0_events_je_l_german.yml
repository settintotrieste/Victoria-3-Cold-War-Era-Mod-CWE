 paramilitary_group_veto.t:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('paramilitary_group_custom_title')] ist gegen [SCOPE.sLaw('current_law_scope').GetName]!"  #NT!
 paramilitary_group_veto.d:0 "Die politisch mächtige [SCOPE.GetRootScope.GetCountry.GetCustom('paramilitary_group_custom_title')], die sich auf die Seite von [SCOPE.gsInterestGroup('paramilitary_group_ig').GetName] [concept_interest_group] stellt, hat die Regierung scharf dafür kritisiert, dass sie versucht hat, [SCOPE.sLaw('current_law_scope').GetName] zu verabschieden. Sie glauben, dass dieses Gesetz nicht im besten Interesse von [ROOT.GetCountry.GetName] wäre, und fordern daher, dass der Gesetzentwurf zur Verabschiedung von [SCOPE.sLaw('current_law_scope').GetName] fallen gelassen wird, andernfalls könnten sie einseitige Maßnahmen gegen die Regierung ergreifen."  #NT!
 paramilitary_group_veto.f:0 "Dieses Ereignis wurde ausgelöst, weil [SCOPE.gsInterestGroup('paramilitary_group_ig').GetName] die aktuell in Kraft getretene [concept_law] entweder ablehnt oder entschieden ablehnt. Es kann auch ausgelöst werden, wenn ein Gesetz erlassen wird, das [SCOPE.GetRootScope.GetCountry.GetCustom('paramilitary_group_custom_title')] deaktiviert."  #NT!
  
