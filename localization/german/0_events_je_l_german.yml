 je_generic_decolonisation_system:0 "Kolonialer Sezessionismus"  #NT!
 je_generic_decolonisation_system_reason:0 "[ROOT.GetCountry.GetName] besitzt [Concept('concept_unincorporated_state','$concept_unincorporated_states$')], dass es kein [concept_homeland] in hat. Während solche Akte des Imperialismus früher international akzeptiert wurden, sind sie seit dem Zweiten Weltkrieg in Ungnade gefallen. Tatsächlich fordert die internationale Gemeinschaft nun, dass wir unseren Untertanen Selbstbestimmung gewähren, indem wir unser Kolonialreich auflösen. Und um die Sache noch schlimmer zu machen, sind auch die in den [ROOT.GetCountry.GetAdjective] Kolonien lebenden Eingeborenen unruhig geworden, viele von ihnen fordern Unabhängigkeit und einige gehen sogar gewaltsam gegen die Kolonialbehörden vor."  #NT!
  
