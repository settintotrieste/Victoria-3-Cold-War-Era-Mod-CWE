 eastern_europe_sovietisation.t:0 "Sowjetisierung von [SCOPE.sCountry('eastern_europe_sovietisation_target').GetName]?"  #NT!
 eastern_europe_sovietisation.d:0 "Zunächst verheimlichten die Sowjets ihre Rolle in anderen Politikbereichen des Ostblocks, wobei die Transformation als Abwandlung der westlichen „bürgerlichen Demokratie“ erschien. Von Moskau ausgebildete Kader wurden in entscheidende Machtpositionen eingesetzt, um Befehle zur gesellschaftspolitischen Transformation auszuführen. Die Beseitigung der gesellschaftlichen und finanziellen Macht des Bürgertums durch Enteignung von Grund- und Industrieeigentum hatte absolute Priorität. Wichtige Dienststellen wie die Personalabteilung, die allgemeine Polizei, die Geheimpolizei und die Jugend wurden streng kommunistisch geführt. Solche Verfahren wurden wiederholt, bis die Kommunisten die uneingeschränkte Macht erlangt hatten und nur noch Politiker übrig blieben, die die sowjetische Politik bedingungslos unterstützten."  #NT!
 eastern_europe_sovietisation.f:0 "Dieses Ereignis wurde ausgelöst, weil [SCOPE.sCountry('eastern_europe_sovietisation_target').GetName] im Einflussbereich von [SCOPE.sCountry('eastern_europe_sovietisation_initiator').GetName] liegt."  #NT!
 eastern_europe_sovietisation.option.1:0 "Installieren Sie ein kommunistisches Regime in [SCOPE.sCountry('eastern_europe_sovietisation_target').GetName]!"  #NT!
 eastern_europe_sovietisation.option.2:0 "Es ist nicht notwendig."  #NT!
 eastern_europe_sovietisation_target.option.1:0 "Akzeptiere die [SCOPE.sCountry('eastern_europe_sovietisation_initiator').GetAdjective]-Dominanz."  #NT!
 eastern_europe_sovietisation_target.option.2:0 "Wir werden frei sein!"  #NT!
 Turkish_Straits_Crisis.t:0 "Die Krise in der türkischen Meerenge?"  #NT!
 Turkish_Straits_Crisis.d:0 "Die Krise in der Türkischen Meerenge war ein Territorialkonflikt zwischen der Sowjetunion und der Türkei aus der Zeit des Kalten Krieges. Nach dem Ende des Zweiten Weltkriegs wurde die Türkei von der Sowjetregierung unter Druck gesetzt, eine gemeinsame militärische Kontrolle der Passage durch die Türkische Meerenge einzuführen, die das Schwarze Meer mit dem Mittelmeer verband. Als die türkische Regierung sich weigerte, nahmen die Spannungen in der Region zu, was zu einer sowjetischen Machtdemonstration und Forderungen nach territorialen Zugeständnissen entlang der georgisch-türkischen Grenze führte."  #NT!
 Turkish_Straits_Crisis.1.option.1:0 "Fordern Sie türkische Zugeständnisse!"  #NT!
 Turkish_Straits_Crisis.1.option.2:0 "Lass die Türkei in Ruhe."  #NT!
 Turkish_Straits_Crisis.2.option.1:0 "Lehnen Sie die sowjetischen Forderungen ab!"  #NT!
 Turkish_Straits_Crisis.2.option.2:0 "Akzeptiert die sowjetische Herrschaft!"  #NT!
 Turkish_Straits_Crisis.3.t:0 "Die Türkei widersetzt sich dem sowjetischen Druck"  #NT!
 Turkish_Straits_Crisis.3.d:0 "Die Türkei gab unter dem zunehmenden Druck der Sowjets nach und bat die Vereinigten Staaten innerhalb weniger Tage um Hilfe. Nach Rücksprache mit seiner Regierung schickte Präsident Truman eine Marine-Einsatzgruppe in die Türkei. Am 9. Oktober 1946 bekräftigten die jeweiligen Regierungen der Vereinigten Staaten und des Vereinigten Königreichs ihre Unterstützung für die Türkei. Am 26. Oktober zog die Sowjetunion ihre konkrete Bitte um ein neues Gipfeltreffen zur Kontrolle der türkischen Meerengen zurück (nicht jedoch ihre Stellungnahmen) und zog kurz darauf die meisten ihrer einschüchternden Streitkräfte aus der Region ab."  #NT!
 Turkish_Straits_Crisis.3.option.1:0 "Geben Sie unsere Forderungen auf!"  #NT!
 Turkish_Straits_Crisis.3.option.2:0 "Zeit für Krieg!"  #NT!
 Berlin_Crisis.t:0 "Die Berlin-Krise?"  #NT!
 Berlin_Crisis.d:0 "Die Berlin-Krise von 1961 war der letzte große politische und militärische Zwischenfall des Kalten Krieges in Europa, der den Status der deutschen Hauptstadt Berlin und des Nachkriegsdeutschlands betraf. Die Krise gipfelte in der faktischen Teilung der Stadt mit dem Bau der Berliner Mauer durch die DDR. Die Berlin-Krise begann im Juni 1961, als der sowjetische Ministerpräsident Nikita Chruschtschow beim Treffen mit US-Präsident John F. Kennedy auf dem Wiener Gipfel erneut ein Ultimatum stellte, das den Abzug aller Streitkräfte aus Berlin, einschließlich der westlichen Streitkräfte in West-Berlin, forderte."  #NT!
 Berlin_Crisis.1.option.1:0 "Fordern Sie Kontrolle über Berlin!"  #NT!
 Berlin_Crisis.1.option.2:0 "Lassen Sie Westdeutschland in Ruhe."  #NT!
 Berlin_Crisis.2.option.1:0 "Lehnen Sie die sowjetischen Forderungen ab!"  #NT!
 Berlin_Crisis.2.option.2:0 "Akzeptiert die sowjetische Herrschaft!"  #NT!
 Berlin_Crisis.3.t:0 "Die Vereinigten Staaten widersetzen sich dem sowjetischen Druck"  #NT!
 Berlin_Crisis.3.d:0 "Es kam zu keiner Einigung und im August 1961 ordnete der DDR-Führer Walter Ulbricht mit Chruschtschows Unterstützung die Schließung der Grenze und den Bau einer Mauer um West-Berlin an. Im Oktober kam es am Checkpoint Charlie nach einem Streit über die Freizügigkeit alliierten Personals zu einer kurzen Auseinandersetzung zwischen amerikanischen und sowjetischen Panzern. Die Konfrontation endete friedlich, nachdem Chruschtschow und Kennedy vereinbart hatten, die Panzer abzuziehen und die Spannungen abzubauen."  #NT!
 Berlin_Crisis.3.option.1:0 "Geben Sie unsere Forderungen auf!"  #NT!
 Berlin_Crisis.3.option.2:0 "Zeit für Krieg!"  #NT!
 Berlin_Ultimatum.t:0 "Das Berliner Ultimatum?"  #NT!
 Berlin_Ultimatum.d:0 "Im November 1958 stellte Chruschtschow den Westmächten ein Ultimatum, sich innerhalb von sechs Monaten aus Berlin zurückzuziehen und Berlin zu einer freien, entmilitarisierten Stadt zu machen. Chruschtschow erklärte, dass die Sowjetunion am Ende dieses Zeitraums die Kontrolle über alle Kommunikationslinien mit West-Berlin an Ostdeutschland übergeben würde, was bedeutete, dass die Westmächte nur dann Zugang zu West-Berlin hätten, wenn Ostdeutschland dies erlaubte."  #NT!
 Berlin_Ultimatum.1.option.1:0 "Fordern Sie Kontrolle über Berlin!"  #NT!
 Berlin_Ultimatum.1.option.2:0 "Lass Berlin in Ruhe."  #NT!
 Berlin_Ultimatum.2.option.1:0 "Lehnen Sie die sowjetischen Forderungen ab!"  #NT!
 Berlin_Ultimatum.2.option.2:0 "Akzeptieren Sie das sowjetische Ultimatum!"  #NT!
 Berlin_Ultimatum.3.t:0 "Die Vereinigten Staaten widersetzen sich dem sowjetischen Druck"  #NT!
 Berlin_Ultimatum.3.d:0 "Aus Sicht der NATO hatte Westberlin – tief im kommunistischen Gebiet – keinen militärischen Wert. Es war jedoch das herausragende Symbol des Widerstands gegen die sowjetische Übernahme Europas. Eisenhower bemerkte, Berlin sei ein „Beispiel, in dem unsere politische Haltung von uns verlangt, militärische Haltungen einzunehmen, die völlig unlogisch sind.“ Der britische Premierminister Harold Macmillan besuchte Moskau im Februar 1959 zu ausführlichen Gesprächen mit Chruschtschow. Die Treffen waren überwiegend herzlich; Das Ultimatum wurde fallen gelassen."  #NT!
 Berlin_Ultimatum.3.option.1:0 "Geben Sie unsere Forderungen auf!"  #NT!
 Berlin_Ultimatum.3.option.2:0 "Zeit für Krieg!"  #NT!
 Berlin_Blockade.t:0 "Die Berlin-Blockade?"  #NT!
 Berlin_Blockade.d:0 "Die Berlin-Blockade war eine der ersten großen internationalen Krisen des Kalten Krieges. Während der multinationalen Besetzung Deutschlands nach dem Zweiten Weltkrieg blockierte die Sowjetunion den Westalliierten den Eisenbahn-, Straßen- und Kanalzugang zu den Teilen Berlins unter westlicher Kontrolle. Die Sowjets boten an, die Blockade aufzuheben, falls die Westalliierten die neu eingeführte Deutsche Mark aus Westberlin abziehen würden."  #NT!
 Berlin_Blockade.1.option.1:0 "Fordern Sie Kontrolle über Berlin!"  #NT!
 Berlin_Blockade.1.option.2:0 "Lass Berlin in Ruhe."  #NT!
 Berlin_Blockade.2.option.1:0 "Lehnen Sie die sowjetischen Forderungen ab!"  #NT!
 Berlin_Blockade.2.option.2:0 "Akzeptieren Sie das sowjetische Ultimatum!"  #NT!
 Berlin_Blockade.3.t:0 "Die Vereinigten Staaten widersetzen sich dem sowjetischen Druck"  #NT!
 Berlin_Blockade.3.d:0 "Die Westalliierten organisierten vom 26. Juni 1948 bis zum 30. September 1949 die Berliner Luftbrücke, um die Menschen in West-Berlin mit Gütern zu versorgen, was angesichts der Größe der Stadt und der Bevölkerung eine schwierige Aufgabe war. Nachdem die Sowjets zunächst zu dem Schluss gekommen waren, dass die Luftbrücke nicht funktionieren könne, empfanden sie den anhaltenden Erfolg zunehmend als peinlich. Am 12. Mai 1949 hob die UdSSR die Blockade Westberlins aufgrund wirtschaftlicher Probleme in Ostberlin auf, obwohl die Amerikaner und Briten die Stadt eine Zeit lang weiterhin auf dem Luftweg versorgten, da sie befürchteten, dass die Sowjets die Blockade wieder aufnehmen würden und nur versuchten, die westlichen Versorgungslinien zu stören."  #NT!
 Berlin_Blockade.3.option.1:0 "Geben Sie unsere Forderungen auf!"  #NT!
 Berlin_Blockade.3.option.2:0 "Zeit für Krieg!"  #NT!
  
 renovate_capital_decision:0 "Rekonstruieren Sie die Hauptstadt"  #NT!
 renovate_capital_decision_desc:0 "Unser [concept_capital_state] ist eine alte Stadt, aber die engen Straßen und Gebäude im mittelalterlichen Stil tun ihr sicherlich keinen Gefallen. Um ein modernes Verkehrsnetz zu implementieren und potenzielle Hygieneprobleme zu beseitigen, können wir in eine Renovierung von [concept_capital_state] investieren, um die Stadt zu einer würdigen Hauptstadt unseres Landes zu machen."  #NT!
  
 je_renovate_capital_system:0 "Rekonstruktion von [ROOT.GetCountry.GetCapital.GetCityHubName]"  #NT!
 je_renovate_capital_system_reason:0 "Dem persönlichen Architekten des [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] wurde die Aufgabe übertragen, [ROOT.GetCountry.GetCapital.GetCityHubName] von der ausgedehnten Metropole, die es ist, in #yellow [ROOT.GetCountry.GetAdjectiveNoFlag]ia#!, zu verwandeln, die glänzende neue Hauptstadt eines größeren [ROOT.GetCountry.GetAdjectiveNoFlag] „Weltimperiums“, das Herzstück der zivilisierten Welt. Es wird ein gewaltiges Unterfangen sein. \n\nNationale Zeitungen behaupten, dass die Entwürfe „wirklich monumental waren … und alle Erwartungen bei weitem übertrafen“, während der [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] selbst großartig verkündete, dass „aus dieser Steinwüste die Hauptstadt eines tausendjährigen Reiches entstehen wird“. Die ausländische Presse war zwar weniger überschwänglich, stimmte aber dennoch zu. Eine ausländische Zeitung beispielsweise beschrieb das Projekt als „vielleicht das ehrgeizigste Planungsvorhaben“ der Neuzeit."  #NT!
