 italian_SUT.indy.t:0 "Die Südtirolfrage"  #NT!
 italian_SUT.indy.d:0 "Die Südtirolfrage wurde zu einem internationalen Thema. Das Problem wurde 1971 gelöst, als ein neuer österreichisch-italienischer Vertrag unterzeichnet und ratifiziert wurde. Es sah vor, dass Streitigkeiten in Südtirol dem Internationalen Gerichtshof in Den Haag zur Schlichtung vorgelegt würden, dass die Provinz eine größere Autonomie innerhalb Italiens erhalten würde und dass sich Österreich nicht in die inneren Angelegenheiten Südtirols einmischen würde. Das neue Abkommen erwies sich für die beteiligten Parteien als weitgehend zufriedenstellend, und die separatistischen Spannungen ließen bald nach. Der 1972 gewährte Autonomiestatus hat zu einem beträchtlichen Maß an Selbstverwaltung geführt und ermöglicht der Körperschaft außerdem, fast 90 % aller erhobenen Steuern einzubehalten."  #NT!
  
 italian_decolonisation_indy.option.1:0 "Gewähren Sie ihnen Autonomie"  #NT!
