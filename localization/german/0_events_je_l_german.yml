 participation_olympics.d:0 "Die [GetPlayer.MakeScope.Var('olympic_games_year_display_event').GetValue] Olympischen Spiele in [SCOPE.sCountry('recently_hosted_olympics').GetName] zogen Tausende von Athleten aus der ganzen Welt an, um an verschiedenen Wettbewerben teilzunehmen. Abgerundet wurde dies durch eine große Zeremonie in [SCOPE.sState('olympic_games_summit_location').GetCityHubName], dem Austragungsort der Spiele."  #NT!
