 je_term_limits:0 "Das Büro von [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [ROOT.GetCountry.GetRuler.GetLastName]"  #NT!
 je_term_limits_reason:0 "Gemäß der Verfassung von [COUNTRY.GetName] darf keine Person mehr als zweimal in das Amt des [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] gewählt werden, und keine Person, die das Amt des [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] mehr als zwei Jahre lang innehatte oder als [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] fungierte, während einer Amtszeit, für die eine andere Person [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] gewählt wurde, darf mehr als einmal in das Amt des [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] gewählt werden. [ROOT.GetCountry.GetRuler.GetFullName] scheidet daher aus dem Amt aus, sobald die Amtszeitbeschränkung von 8 Jahren erreicht ist."  #NT!
 je_term_limits_goal:0 "[ROOT.GetCountry.GetRuler.GetFullName] hat seine Amtszeit vollständig abgesessen"  #NT!
 je_term_limits_status:0 "Serviert [GetPlayer.MakeScope.Var('term_limit_var').GetValue] / 8 Jahre"  #NT!
  
 je_term_limits_swiss:0 "Die Bundespräsidentschaft von [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [ROOT.GetCountry.GetRuler.GetLastName]"  #NT!
 je_term_limits_swiss_reason:0 "Der Präsident der Schweizerischen Eidgenossenschaft ist der Vorsitzende des siebenköpfigen Bundesrates, der Exekutive des Landes. Der von der Bundesversammlung für ein Jahr gewählte Amtsträger leitet die Sitzungen des Bundesrates und nimmt besondere Repräsentationsaufgaben wahr. Als Erster unter Gleichen hat der Bundespräsident keine Befugnisse gegenüber den anderen sechs Räten und leitet weiterhin die ihm zugewiesene Abteilung. Traditionell rotiert das Amt unter den Mitgliedern in der Reihenfolge ihres Dienstalters. Der Vizepräsident des Bundesrates übernimmt die Präsidentschaft im Jahr nach der Amtszeit des Amtsinhabers."  #NT!
 je_term_limits_swiss_goal:0 "Präsident [ROOT.GetCountry.GetRuler.GetFullName] hat die Amtszeitbegrenzung erreicht"  #NT!
 je_term_limits_swiss_status:0 "Serviert [GetPlayer.MakeScope.Var('term_limit_var').GetValue] / 12 Monate"  #NT!
  
 je_term_limits.3.tt:0 "Ist $SWI$"  #NT!
  
 je_term_limits_yugoslav:0 "Die Bundespräsidentschaft von [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [ROOT.GetCountry.GetRuler.GetLastName]"  #NT!
 je_term_limits_yugoslav_reason:0 "In Jugoslawien gab es seit Änderungen der Verfassung von 1963 im Jahr 1971 eine kollektive Präsidentschaft. In einem separaten Artikel wurde Josip Broz Tito ein unbefristetes Mandat zuerkannt, das sicherstellte, dass der neue Präsident der Präsidentschaft erst nach seinem Tod in Kraft treten würde. Als Tito am 4. Mai 1980 starb, übernahm der damalige Vizepräsident des Präsidialamtes die Rolle des Präsidenten des Präsidialamtes. Anschließend wechselte die Rolle des Präsidenten des Präsidiums jährlich, wobei jeder Präsident im Jahr zuvor als Vizepräsident fungierte."  #NT!
 je_term_limits_yugoslav_goal:0 "Präsident [ROOT.GetCountry.GetRuler.GetFullName] hat die Amtszeitbegrenzung erreicht"  #NT!
 je_term_limits_yugoslav_status:0 "Serviert [GetPlayer.MakeScope.Var('term_limit_var').GetValue] / 12 Monate"  #NT!
  
 je_term_limits_collective_HOS:0 "Die kollektive Führung von [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [ROOT.GetCountry.GetRuler.GetLastName]"  #NT!
 je_term_limits_collective_HOS_reason:0 "Gemäß der Verfassung von [COUNTRY.GetName] liegt die Exekutivgewalt nicht bei einer einzelnen Person, sondern bei einem Kollegium. Das kollektive Staatsoberhaupt fungiert als Verfassungsrat und vertritt die Nation durch gemeinsame Beratungen und gesetzlich festgelegte Verfahren. Jedes Mitglied ist gleichberechtigt und Entscheidungen bedürfen je nach Verfassung der Mehrheit oder der einstimmigen Zustimmung. Die Rolle von [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] würde jährlich wechseln."  #NT!
 je_term_limits_collective_HOS_goal:0 "Präsident [ROOT.GetCountry.GetRuler.GetFullName] hat die Amtszeitbegrenzung erreicht"  #NT!
 je_term_limits_collective_HOS_status:0 "Serviert [GetPlayer.MakeScope.Var('term_limit_var').GetValue] / 12 Monate"  #NT!
  
