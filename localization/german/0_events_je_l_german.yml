 pope_character:0 "Papst"  #NT!
  
 PAP_1958_revolution.t:0 "Papsttum von Papst Johannes XXIII.?"  #NT!
 PAP_1958_revolution.d:0 "Papst Johannes XXIII. war vom 28. Oktober 1958 bis zu seinem Tod im Juni 1963 Oberhaupt der katholischen Kirche und Herrscher des Staates Vatikanstadt. Sein übergeordnetes Ziel war die Modernisierung der Kirche durch die Betonung ihrer pastoralen Rolle und ihrer notwendigen Einbindung in Staatsangelegenheiten."  #NT!
 PAP_1963_revolution.t:0 "Papsttum von Papst Paul VI.?"  #NT!
 PAP_1963_revolution.d:0 "Papst Paul VI. war vom 21. Juni 1963 bis zu seinem Tod am 6. August 1978 Oberhaupt der katholischen Kirche und Herrscher des Staates Vatikanstadt. Als Nachfolger von Johannes XXIII. führte er das Zweite Vatikanische Konzil fort, das er 1965 abschloss, und führte seine zahlreichen Reformen durch. Er förderte verbesserte ökumenische Beziehungen zu ostorthodoxen und protestantischen Kirchen, was zu vielen historischen Treffen und Vereinbarungen führte."  #NT!
 PAP_1978_revolution.t:0 "Papsttum von Papst Johannes Paul II.?"  #NT!
 PAP_1978_revolution.d:0 "Papst Johannes Paul II. war von 1978 bis zu seinem Tod im Jahr 2005 Oberhaupt der katholischen Kirche und Souverän des Staates Vatikanstadt. Ihm wird zugeschrieben, dass er gegen Diktaturen für die Demokratie kämpfte und dazu beitrug, die kommunistische Herrschaft in seiner Heimat Polen und im übrigen Europa zu beenden.[14] Unter Johannes Paul II. weitete die katholische Kirche ihren Einfluss in Afrika und Lateinamerika erheblich aus und behielt ihren Einfluss in Europa und im Rest der Welt bei."  #NT!
 PAP_2005_revolution.t:0 "Papsttum von Papst Benedikt XVI.?"  #NT!
 PAP_2005_revolution.d:0 "Papst Benedikt XVI. war vom 19. April 2005 bis zu seinem Rücktritt am 28. Februar 2013 Oberhaupt der katholischen Kirche und Herrscher des Staates Vatikanstadt. Benedikts Wahl zum Papst erfolgte im päpstlichen Konklave 2005, das auf den Tod von Papst Johannes Paul II. folgte. Nach seinem Rücktritt entschied sich Benedikt, den Titel „emeritierter Papst“ zu tragen, und behielt diesen Titel bis zu seinem Tod im Jahr 2022."  #NT!
 PAP_2013_revolution.t:0 "Papsttum von Papst Franziskus?"  #NT!
 PAP_2013_revolution.d:0 "Papst Franziskus war das Oberhaupt der katholischen Kirche und Herrscher des Staates Vatikanstadt. Er ist der erste Papst der Gesellschaft Jesu (des Jesuitenordens), der erste aus Amerika und der südlichen Hemisphäre und der erste außerhalb Europas geborene oder aufgewachsene Papst seit dem syrischen Papst Gregor III. aus dem 8. Jahrhundert."  #NT!
 PAP_GENERIC_revolution.t:0 "Der neue Papst"  #NT!
 PAP_GENERIC_revolution.d:0 "Die katholische Kirche in Rom hat einen neuen Papst gewählt, da der vorherige Papst verstorben ist. Der neue Papst wurde vom Kardinalskollegium in einem als Konklave bezeichneten Verfahren gewählt, bei dem Kardinäle unter 80 Jahren in geheimer Abstimmung abstimmen, bis ein Kandidat eine Zweidrittelmehrheit erhält."  #NT!
 PAP_GENERIC_revolution.f:0 "Dieses Ereignis wurde ausgelöst, weil es keinen [concept_character] auf der Welt gibt, der ein Papst ist."  #NT!
  
 controlled_election.t:0 "Die [ROOT.GetCountry.GetAdjectiveNoFormatting]-Parlamentswahl"  #NT!
 controlled_election.d:0 "Heute fand eine Wahl für die #o [SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')]#! statt. Kandidaten mussten von der Regierungspartei von [ROOT.GetCountry.GetName] oder einer von der Regierungspartei kontrollierten öffentlichen Organisation nominiert werden. Wähler konnten gegen den Kandidaten der Regierungspartei stimmen, allerdings nur über Wahlkabinen, wohingegen Stimmen für die Partei einfach durch die Abgabe eines leeren Stimmzettels abgegeben werden konnten."  #NT!
 controlled_election.f:0 "Da Wahlen in [ROOT.GetCountry.GetName] nicht wettbewerbsorientiert sind, fungieren sie als Zustimmungsumfrage für [concept_government]. Daher besteht der Effekt solcher Wahlen nur darin, die [concept_legitimacy] der [concept_government] zu reduzieren, wenn die Anzahl von [Concept('concept_radical', '$concept_radicals$')] höher ist als die Anzahl von [Concept('concept_loyalist', '$concept_loyalists$')]. \n\nHinweis: [concept_legitimacy] wird um den Ausgabewert der folgenden Formel reduziert: \n\nGesamt [Concept('concept_radical', '$concept_radicals$')] / Gesamt [Concept('concept_loyalist', '$concept_loyalists$')] + [Concept('concept_radical', '$concept_radicals$')] x 100"  #NT!
