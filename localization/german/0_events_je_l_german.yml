 je_secret_police_system_reason:0 "Die [SCOPE.GetRootScope.GetCountry.GetCustom('secret_police_custom_title')] ist die Geheimpolizei von [ROOT.GetCountry.GetName]. \n\nGeheimpolizei (oder politische Polizei) sind Polizei-, Geheimdienst- oder Sicherheitsbehörden, die verdeckte Operationen gegen politische, religiöse oder soziale Gegner und Dissidenten einer Regierung durchführen. Sie schützen die politische Macht eines Diktators oder Regimes und operieren häufig außerhalb des Gesetzes, um Dissidenten zu unterdrücken und die politische Opposition zu schwächen, wobei sie häufig Gewalt anwenden. \n\nVerdeckte Operationspunkte verfügbar: [GetPlayer.MakeScope.Var('secret_police_action_points').GetValue] \n\nGeheimdienstdirektor: [SCOPE.sCharacter('head_of_intelligence').GetFullName] ([SCOPE.gsInterestGroup('secret_police_IG').GetName]) \n\nAgentur-Loyalität: [GetPlayer.MakeScope.Var('secret_police_loyalty').GetValue] % \n\nHinweis: Die [SCOPE.GetRootScope.GetCountry.GetCustom('secret_police_custom_title')] werden gegen die [concept_government] vorgehen, wenn ihre Loyalität unter 50 % fällt. \n\nTipp: Die Loyalität von [SCOPE.GetRootScope.GetCountry.GetCustom('secret_police_custom_title')] steigt, wenn [concept_approval] von [SCOPE.gsInterestGroup('secret_police_IG').GetName] [ROOT.GetCountry.GetName]1 positiv ist, und nimmt ab, wenn [concept_approval] negativ ist."  #NT!
  
