 je_olympic_games_reason:0 "Die Olympischen Sommerspiele, auch als „Spiele der Olympiade“ bekannt und oft als „Olympische Sommerspiele“ bezeichnet, sind eine große internationale Multisportveranstaltung, die normalerweise alle vier Jahre in Schaltjahren stattfindet. \n\nBauen Sie eine olympische Infrastruktur auf, um schlechte Olympische Spiele zu vermeiden. \n\nDie Olympischen Spiele [GetPlayer.MakeScope.Var('olympic_games_year_display').GetValue] finden in [SCOPE.sState('olympic_games_summit_location').GetCityHubName], [SCOPE.sState('olympic_games_summit_location').GetName] ([ROOT.GetCountry.GetName]) statt."  #NT!
