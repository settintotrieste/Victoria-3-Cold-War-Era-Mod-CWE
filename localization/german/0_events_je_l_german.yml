 je_paramilitary_groups:0 "Die [SCOPE.GetRootScope.GetCountry.GetCustom('paramilitary_group_custom_title')]"  #NT!
 je_paramilitary_groups_reason:0 "Die [ROOT.GetCountry.GetAdjectiveNoFlag] [SCOPE.GetRootScope.GetCountry.GetCustom('paramilitary_group_custom_title')] ist die nationale paramilitärische Gruppe von [ROOT.GetCountry.GetName]. \n\nDer [SCOPE.GetRootScope.GetCountry.GetCustom('paramilitary_group_custom_title')] ermöglicht dem [concept_government], eine Massenbereinigung von [Concept('concept_politician', '$concept_politicians$')], [Concept('concept_agitator', '$concept_agitators$')], [Concept('concept_general', '$concept_generals$')] und [Concept('concept_admiral', '$concept_admirals$')] durchzuführen. \n\n[SCOPE.GetRootScope.GetCountry.GetCustom('paramilitary_group_custom_title')] Kommandant: [SCOPE.GetRootScope.GetCountry.GetCustom('paramilitary_group_custom_title')]0 ([SCOPE.GetRootScope.GetCountry.GetCustom('paramilitary_group_custom_title')]1) \n\nHinweis: Die Loyalität von [SCOPE.GetRootScope.GetCountry.GetCustom('paramilitary_group_custom_title')] steigt, wenn [SCOPE.GetRootScope.GetCountry.GetCustom('paramilitary_group_custom_title')]3 von [SCOPE.GetRootScope.GetCountry.GetCustom('paramilitary_group_custom_title')]1 [SCOPE.GetRootScope.GetCountry.GetCustom('paramilitary_group_custom_title')]5 positiv ist, und nimmt ab, wenn [SCOPE.GetRootScope.GetCountry.GetCustom('paramilitary_group_custom_title')]3 negativ ist. \n\nDie Aufrechterhaltung der Loyalität der [SCOPE.GetRootScope.GetCountry.GetCustom('paramilitary_group_custom_title')] ist von entscheidender Bedeutung, da ein Versäumnis, dies zu tun, zu einem Palastputsch gegen [SCOPE.GetRootScope.GetCountry.GetCustom('paramilitary_group_custom_title')]8 [SCOPE.GetRootScope.GetCountry.GetCustom('paramilitary_group_custom_title')]9 führen kann, was zur Folge hat, dass ein neues, reaktionäres [ROOT.GetCountry.GetName]0 eingesetzt wird. \n\nTipp: Eine schwächere Version von [ROOT.GetCountry.GetName]1 verlangsamt die Rate des Loyalitätsverlusts."  #NT!
