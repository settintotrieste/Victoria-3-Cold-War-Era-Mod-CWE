 restore_correct_capital_system.d:0 "Die derzeitige Hauptstadt [ROOT.GetCountry.GetName], [SCOPE.sState('wrong_capital').GetName] wird von Historikern und unserem Volk nicht als die richtige Hauptstadt unseres Landes angesehen. Daher wurde im Parlament ein Antrag eingereicht, den richtigen Staat als unsere Hauptstadt zu bestimmen."  #NT!
