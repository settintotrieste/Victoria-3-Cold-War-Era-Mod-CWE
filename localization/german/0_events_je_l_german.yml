 je_OPEC_system:0 "Die Organisation erdölexportierender Länder"  #NT!
 je_OPEC_system_reason:0 "Die 1960 gegründete Organisation erdölexportierender Länder (OPEC) ist eine Koalition führender Ölfördernationen, die die Energiepolitik koordiniert, um Märkte zu stabilisieren und die Weltpreise zu beeinflussen. Durch die Steuerung des Produktionsniveaus versucht die OPEC, faire Erträge für die Produzenten und eine zuverlässige Versorgung der Verbraucher sicherzustellen. \n\nSeine Entscheidungen wirken sich auf den internationalen Handel, das industrielle Wachstum und die geopolitischen Beziehungen aus und machen es zu einem zentralen Akteur in der modernen Ressourcendiplomatie. \n\nDie Mitgliedschaft verleiht den Nationen Tarifverhandlungsmacht, bindet sie aber auch an komplexe Verhandlungen, bei denen nationale Interessen mit dem globalen Energiebedarf in Einklang gebracht werden, und prägt so die Entwicklung von Volkswirtschaften, die weltweit von Erdölexporten und -importen abhängig sind. \n\nMitglieder insgesamt: [GetGlobalVariable('OPEC_member_count').GetValue] \n\nAnführer: [SCOPE.sCountry('OPEC_leader').GetName]"  #NT!
  
 je_OPEC_increase_oil_quota_button:0 "Ölquoten erhöhen"  #NT!
 je_OPEC_increase_oil_quota_button_desc:0 "Bei den Ölförderquoten der OPEC handelt es sich um vereinbarte Grenzwerte, die von der Organisation erdölexportierender Länder festgelegt werden, um das weltweite Angebot zu steuern und die Preise zu stabilisieren. Als Leiter der OPEC können wir über die Ölförderquoten für alle OPEC-Mitglieder entscheiden."  #NT!
  
 je_OPEC_decrease_oil_quota_button:0 "Ölquoten reduzieren"  #NT!
 je_OPEC_decrease_oil_quota_button_desc:0 "Bei den Ölförderquoten der OPEC handelt es sich um vereinbarte Grenzwerte, die von der Organisation erdölexportierender Länder festgelegt werden, um das weltweite Angebot zu steuern und die Preise zu stabilisieren. Als Leiter der OPEC können wir über die Ölförderquoten für alle OPEC-Mitglieder entscheiden."  #NT!
  
 je_OPEC_ignore_oil_quota_button:0 "Ölquoten ignorieren"  #NT!
 je_OPEC_ignore_oil_quota_button_desc:0 "Bei den Ölförderquoten der OPEC handelt es sich um vereinbarte Grenzwerte, die von der Organisation erdölexportierender Länder festgelegt werden, um das weltweite Angebot zu steuern und die Preise zu stabilisieren. Wir können sie jedoch im Interesse unserer nationalen Interessen ignorieren."  #NT!
  
 je_OPEC_restore_oil_quota_button:0 "Befolgen Sie die Ölquoten"  #NT!
 je_OPEC_restore_oil_quota_button_desc:0 "Bei den Ölförderquoten der OPEC handelt es sich um vereinbarte Grenzwerte, die von der Organisation erdölexportierender Länder festgelegt werden, um das weltweite Angebot zu steuern und die Preise zu stabilisieren. Wir ignorieren diese Quoten derzeit, aber wir können uns dafür entscheiden, zur Einhaltung zurückzukehren, um unseren OPEC-Kollegen zu gefallen."  #NT!
  
 OPEC_quota_timer.tt:0 "Die OPEC-Ölproduktionsquoten wurden in den letzten 12 Monaten nicht geändert"  #NT!
 OPEC_oil_quota_defiance_timer.tt:0 "Hat in den letzten 12 Monaten die OPEC-Ölproduktionsquoten nicht missachtet"  #NT!
  
 OPEC_oil_quota.t:0 "Änderung der Ölquoten der OPEC"  #NT!
 OPEC_oil_quota.1.d:0 "Der Vorsitzende der Organisation erdölexportierender Länder, der [ROOT.GetCountry.GetName] angehört, hat eine Änderung der OPEC-Ölproduktionsquote angekündigt. \n\nVon nun an wird die Ölförderquote SEHR NIEDRIG sein."  #NT!
 OPEC_oil_quota.2.d:0 "Der Vorsitzende der Organisation erdölexportierender Länder, der [ROOT.GetCountry.GetName] angehört, hat eine Änderung der OPEC-Ölproduktionsquote angekündigt. \n\nVon nun an wird die Ölförderquote NIEDRIG sein."  #NT!
 OPEC_oil_quota.3.d:0 "Der Vorsitzende der Organisation erdölexportierender Länder, der [ROOT.GetCountry.GetName] angehört, hat eine Änderung der OPEC-Ölproduktionsquote angekündigt. \n\nVon nun an wird die Ölförderquote MITTEL sein."  #NT!
 OPEC_oil_quota.4.d:0 "Der Vorsitzende der Organisation erdölexportierender Länder, der [ROOT.GetCountry.GetName] angehört, hat eine Änderung der OPEC-Ölproduktionsquote angekündigt. \n\nVon nun an wird die Ölförderquote HOCH sein."  #NT!
 OPEC_oil_quota.5.d:0 "Der Vorsitzende der Organisation erdölexportierender Länder, der [ROOT.GetCountry.GetName] angehört, hat eine Änderung der OPEC-Ölproduktionsquote angekündigt. \n\nVon nun an wird die Ölförderquote SEHR HOCH sein."  #NT!
 OPEC_oil_quota.f:0 "Die Ölförderquoten der OPEC werden vom OPEC-Führer festgelegt. \n\nDa [ROOT.GetCountry.GetName] Mitglied der OPEC ist, ist es vertraglich verpflichtet, diese Quoten einzuhalten. \n\nWir können den Vertrag jedoch ignorieren und so viel Öl pumpen, wie wir wollen, auf Kosten einiger Schande und schlechter Beziehungen zu anderen OPEC-Mitgliedern."  #NT!
 OPEC_accept_quota:0 "Wir werden die Quoten strikt einhalten"  #NT!
 OPEC_reject_quota:0 "Wir weigern uns, die Quoten einzuhalten. Lassen Sie das Öl frei fließen!"  #NT!
  
