 concept_OPEC_oil_embargoing:1 "Embargo"  #NT!
 concept_OPEC_oil_embargo_desc:6 "Bei einem [concept_OPEC_oil_embargo] haben die OPEC und ihre Mitglieder gemeinsam vereinbart, kein Öl in ein bestimmtes Land zu exportieren. Einige OPEC-Mitglieder könnten sich jedoch dazu entschließen, dem Embargo nicht beizutreten, wenn sie gute Beziehungen zu dem Land haben, gegen das das Embargo verhängt wurde. Hinweis: Durch diese diplomatische Aktion wird ein vollständiges Embargo eingeleitet, da die V3-Engine derzeit noch keine Embargos für bestimmte Waren zulässt."  #NT!
  
