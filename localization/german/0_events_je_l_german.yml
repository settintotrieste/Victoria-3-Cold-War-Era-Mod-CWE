 anti_war_protest_war_exhaustion.t:0 "Antikriegsprotest in [SCOPE.sState('war_protest_state').GetName]"  #NT!
 anti_war_protest_war_exhaustion.d:0 "In [SCOPE.sState('war_protest_state').GetName] haben grassierende Antikriegsgefühle Wurzeln geschlagen, was dazu geführt hat, dass [ROOT.GetCountry.GetAdjectiveNoFlag] Bürger eine Kampagne des zivilen Ungehorsams gegen unsere Kriegsanstrengungen durchgeführt haben. Das Militär hat vorgeschlagen, dass wir den Protest mit Gewalt beenden und die Beteiligten hinrichten sollen, um ein Beispiel für andere zu sein."  #NT!
 anti_war_protest_war_exhaustion.f:0 "Dieses Ereignis wurde ausgelöst, weil [ROOT.GetCountry.GetName] weniger als 0 [concept_war_support] hat."  #NT!
 anti_war_protest.option:0 "Lasst sie protestieren"  #NT!
 anti_war_protest_crush.option:0 "Zerschlagt die Demonstranten!"  #NT!
 apply_pm_offense_defense_readjustment_minor_state.tt:0 "Alle $building_barracks$, $building_naval_base$ und $building_conscription_center$ in [SCOPE.sState('war_protest_state').GetName] erhalten 6 Monate lang den Modifikator $pm_offense_defense_readjustment_minor$"  #NT!
  
 anti_war_protest_frenemies.t:0 "Große Antikriegsdemonstrationen"  #NT!
 anti_war_protest_frenemies.d:0 "Unsere Bürger sind schockiert darüber, dass sie sich im Krieg mit einem Land befinden, das die gleiche kulturelle Zusammensetzung wie sie hat. Infolgedessen kam es in ganz [ROOT.GetCountry.GetName] zu Massendemonstrationen, in denen die Regierung aufgefordert wurde, den ihrer Meinung nach sinnlosen Krieg gegen ihre Mitbrüder zu beenden."  #NT!
 anti_war_protest_frenemies.f:0 "Dieses Ereignis wurde ausgelöst, weil [ROOT.GetCountry.GetName] bei [concept_war] mit einem Land ist, dessen [Concept('concept_primary_cultures','$concept_primary_culture$')] das gleiche Erbe oder die gleichen Eigenschaften hat wie ein [Concept('concept_primary_cultures','$concept_primary_culture$')] von [ROOT.GetCountry.GetName]."  #NT!
  
 anti_war_protest_blame_military.t:0 "Öffentliche Petition zur Entlassung eines Kommandanten"  #NT!
 anti_war_protest_blame_military.d:0 "Aufgrund der schlimmen Lage, in der sich [ROOT.GetCountry.GetName] befindet, hat sich die Öffentlichkeit gegen einen unpopulären Militärführer gewandt. Die Öffentlichkeit macht [SCOPE.sCharacter('unpopular_general').GetFullName] für eine Reihe jüngster Niederlagen verantwortlich und brandmarkt ihn als inkompetent. Nun wurde eine Petition an [ROOT.GetCountry.GetRuler.GetFullName] gerichtet, in der die Entlassung von [SCOPE.sCharacter('unpopular_general').GetFullName] gefordert wird"  #NT!
 anti_war_protest_blame_military.f:0 "Dieses Ereignis wurde ausgelöst, weil Dieses Ereignis ausgelöst wurde, weil [ROOT.GetCountry.GetName] weniger als -25 [concept_war_support] hat und es einen General oder Admiral gibt, der weniger als 25 Popularität hat."  #NT!
 anti_war_protest_sack_general.option:0 "Sack [SCOPE.sCharacter('unpopular_general').GetFullName]"  #NT!
 anti_war_protest_keep_general.option:0 "Lass [SCOPE.sCharacter('unpopular_general').GetFullName] bleiben"  #NT!
 sack_unpopular_general.tt:0 "[SCOPE.sCharacter('unpopular_general').GetFullName] wird entlassen"  #NT!
  
 anti_war_protest_sack_army_chief.t:0 "Chaos im [ROOT.GetCountry.GetAdjectiveNoFlag]-Oberkommando"  #NT!
 anti_war_protest_sack_army_chief.d:0 "Ein regelmäßiges Treffen der Generäle der [ROOT.GetCountry.GetAdjectiveNoFlag]-Streitkräfte geriet heute in Aufruhr, als verschiedene Generäle, angeführt von [SCOPE.sCharacter('opposing_general').GetFullName], Oberbefehlshaber [SCOPE.sCharacter('unpopular_army_chief').GetFullName] für die katastrophale Reihe jüngster Niederlagen von [ROOT.GetCountry.GetName] verantwortlich machten und seinen Rücktritt forderten. Diese umfassende Unordnung im [ROOT.GetCountry.GetAdjectiveNoFlag]-Oberkommando hat die Streitkräfte gespalten und wird für große Unruhe unter den Offizieren und ihren Männern sorgen, sofern [SCOPE.sCharacter('unpopular_army_chief').GetFullName] nicht von [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [ROOT.GetCountry.GetRuler.GetFullName] entlassen wird."  #NT!
 anti_war_protest_sack_army_chief.f:0 "Dieses Ereignis wurde ausgelöst, weil [ROOT.GetCountry.GetName] weniger als -25 [concept_war_support] hat."  #NT!
 anti_war_protest_sack_army_chief.option:0 "Sack [SCOPE.sCharacter('unpopular_army_chief').GetFullName]"  #NT!
 anti_war_protest_keep_army_chief.option:0 "Entfernen Sie stattdessen [SCOPE.sCharacter('opposing_general').GetFullName]"  #NT!
