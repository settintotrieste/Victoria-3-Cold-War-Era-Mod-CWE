 je_national_religious_order:0 "Die Staatsreligion"  #NT!
 je_national_religious_order_reason:0 "Gemäß der Verfassung von [ROOT.GetCountry.GetName] bezeichnet der [concept_government] einen bestimmten [concept_religion] als offizielle und nationale Religion des Landes. Diese Staatsreligion wird vom [SCOPE.GetRootScope.GetCountry.GetCustom('religious_leader_title_custom_title')] von [ROOT.GetCountry.GetNameNoFormatting] verwaltet und geleitet, der der oberste Geistliche von [ROOT.GetCountry.GetName] ist. \n\nDer [concept_government] unterstützt die Staatsreligion mit finanzieller Unterstützung und anderen Privilegien und gewährt dem [concept_government] erheblichen Einfluss auf die Angelegenheiten des Leitungsgremiums der Staatsreligion, einschließlich Fragen der Lehre, Ordnung und des Gottesdienstes. Dies gibt dem [concept_government] auch die Möglichkeit, den aktuellen [SCOPE.GetRootScope.GetCountry.GetCustom('religious_leader_title_custom_title')] von [ROOT.GetCountry.GetNameNoFormatting] zu entlassen. \n\nHinweis: Höherer religiöser Radikalismus erhöht die Chance, dass ein [concept_government]1, [concept_government]2, [concept_government]3 oder [concept_government]4 [SCOPE.GetRootScope.GetCountry.GetCustom('religious_leader_title_custom_title')] in [ROOT.GetCountry.GetName] spawnt. \n\nHinweis: Religiöser Radikalismus nimmt zu, wenn [concept_government]7 von [concept_government]8 [concept_government]9 negativ ist, und nimmt ab, wenn [concept_government]7 positiv ist."  #NT!
