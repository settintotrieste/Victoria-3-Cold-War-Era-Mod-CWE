 austria_formation.t:0 "Unabhängigkeit Österreichs?"  #NT!
 austria_formation.d:0 "Am 15. Mai 1955 unterzeichneten die vier Mächte (USA, Großbritannien, Frankreich und die Sowjetunion) in Wien den österreichischen Staatsvertrag, der die Viermächtebesatzung beendete und Österreich zu einem freien, unabhängigen und neutralen Staat erklärte."  #NT!
 austria_formation.option.1:0 "Wir wollen einen einheitlichen, demokratischen und neutralen österreichischen Staat"  #NT!
 austria_formation.option.2:0 "Halten Sie Österreich gespalten!"  #NT!
 austria_formation_1946.t:0 "Das zweite Kontrollabkommen?"  #NT!
 austria_formation_1946.d:0 "Am 28. Juni 1946 unterzeichneten die Alliierten das Zweite Kontrollabkommen, das ihre Dominanz über die österreichische Regierung lockerte. Das Parlament wurde de facto der alliierten Kontrolle entzogen. Von nun an konnten seine Entscheidungen nur noch durch einstimmige Abstimmung aller vier Alliierten aufgehoben werden. Sowjetische Vetos wurden von der westlichen Opposition routinemäßig für ungültig erklärt. In den nächsten neun Jahren befreite sich das Land schrittweise von der ausländischen Kontrolle und entwickelte sich von einer „Nation unter Vormundschaft“ zur völligen Unabhängigkeit."  #NT!
 austria_formation_1946.option.1:0 "Vereinheitlichung der Besatzungszonen."  #NT!
 austria_formation_1946.option.2:0 "Halten Sie Österreich gespalten!"  #NT!
  
 united_states_formation_hawaii.t:0 "Hawaii erlangt US-Staatlichkeit?"  #NT!
 united_states_formation_hawaii.d:0 "Präsident Eisenhower erklärte bereits zu Beginn seiner Amtszeit seine Unterstützung für die Idee einer Eigenstaatlichkeit für Hawaii, doch bis zum Hawaii Admission Act von 1959 schafften es entsprechende Gesetze nicht durch den Kongress 50. Staat."  #NT!
 united_states_formation_alaska.t:0 "Alaska erlangt US-Staatlichkeit?"  #NT!
 united_states_formation_alaska.d:0 "Präsident Eisenhower erklärte schon zu Beginn seiner Amtszeit seine Unterstützung für die Idee einer Staatlichkeit Alaskas, äußerte aber auch Bedenken, die ausgeräumt werden müssten, bevor dies geschehen könne. Die größte Sorge galt der Frage der nationalen Sicherheit, da Alaska an der Grenze zur Sowjetunion lag. Ein weiteres Problem war die Menge an öffentlichem Land auf dem Territorium und es musste ein geeigneter Kompromiss gefunden werden, um nicht reserviertes Land an die neue Landesregierung zu übertragen. Am 3. Januar 1959 unterzeichnete er die offizielle Proklamation zur Aufnahme Alaskas als 49. Bundesstaat."  #NT!
 united_states_formation.option.1:0 "Ja"  #NT!
 united_states_formation.option.2:0 "NEIN"  #NT!
  
 tanzania_formation_zanzibar.t:0 "Union von Tanganjika und Sansibar?"  #NT!
 tanzania_formation_zanzibar.d:0 "Die Vereinigte Republik Tansania wurde am 26. April 1964 als Ergebnis der Union von Tanganjika und Sansibar gegründet. Julius Nyerere wurde der erste Präsident und Scheich Abeid Karume wurde der erste Vizepräsident und Vorsitzende des Revolutionsrates."  #NT!
 tanzania_formation.option.1:0 "Ja"  #NT!
 tanzania_formation.option.2:0 "NEIN"  #NT!
  
 india_formation_sikkim.t:0 "Union von Indien und Sikkim?"  #NT!
 india_formation_sikkim.d:0 "Indien übernahm im April 1973 die Kontrolle über Sikkim und stürzte die Monarchie. Am 9. April 1975 verkündete das Sikkim-Parlament die Absetzung des Königs und erklärte, Sikkim sei durch ein manipuliertes Referendum Teil Indiens geworden. Am 16. Mai gab das indische Parlament bekannt, dass Sikkim offiziell ein Bundesstaat Indiens geworden ist."  #NT!
 india_formation.option.1:0 "Ja"  #NT!
 india_formation.option.2:0 "NEIN"  #NT!
  
 HUN_1956_revolution.t:0 "Die ungarische Revolution?"  #NT!
 HUN_1956_revolution.d:0 "Die Ungarische Revolution von 1956 war ein landesweiter Revolutionsversuch gegen die Regierung der Ungarischen Volksrepublik (1949–1989) und die Politik, die durch die Unterordnung der Regierung unter die Sowjetunion (UdSSR) verursacht wurde. Der Aufstand dauerte zwölf Tage, bevor er am 4. November 1956 von sowjetischen Panzern und Truppen niedergeschlagen wurde."  #NT!
 HUN_2010_revolution.t:0 "Der Aufstieg von Viktor Orbán?"  #NT!
 HUN_2010_revolution.d:0 "Viktor Mihály Orbán ist ein ungarischer Anwalt und Politiker, der seit 2010 ungarischer Ministerpräsident ist. Seit 2010 hat Orbán die Demokratie untergraben, die Unabhängigkeit der Justiz geschwächt und die Pressefreiheit in Ungarn eingeschränkt. Während Orbáns zweiter Amtszeit als Ministerpräsident wurden mehrere umstrittene Verfassungs- und Gesetzesreformen durchgeführt, darunter die Änderungen der ungarischen Verfassung im Jahr 2013."  #NT!
  
 CZH_1968_revolution.t:0 "Der Prager Frühling?"  #NT!
 CZH_1968_revolution.d:0 "Der Prager Frühling war eine Zeit der politischen Liberalisierung und des Massenprotests in der Tschechoslowakischen Sozialistischen Republik. Es begann am 5. Januar 1968, als der Reformist Alexander Dubček zum Ersten Sekretär der Kommunistischen Partei der Tschechoslowakei (KSČ) gewählt wurde, und dauerte bis zum 21. August 1968, als die Sowjetunion und die meisten Mitglieder des Warschauer Paktes in das Land einmarschierten, um die Reformen zu unterdrücken."  #NT!
 CZH_1968_revolution_1.t:0 "Der Aufstieg von Alexander Dubček?"  #NT!
 CZH_1968_revolution_1.d:0 "Im Januar 1968 wurden die Fragen der Führung und Reform dem Zentralkomitee der Tschechoslowakischen Partei übergeben. Sie misstrauten Novotný, indem sie die Funktionen des Präsidenten und des Parteivorsitzenden aufteilten. Er blieb Präsident, wurde jedoch von Dubček als Erster Sekretär abgelöst. Novotný leistete Widerstand und versuchte, Teile der Armee zu mobilisieren, um seinen Machtverlust zu verhindern. Ironischerweise führten die Ermittlungen dazu, dass Novotný einige Monate später vollständig aus dem Amt entfernt wurde."  #NT!
 CZH_1969_revolution.t:0 "Die Normalisierung der Tschechoslowakei?"  #NT!
 CZH_1969_revolution.d:0 "Als Husák im April 1969 Dubček als Führer der KSČ ablöste, handelte sein Regime schnell, um die politische Lage im Land zu „normalisieren“. Die Hauptziele von Husáks Normalisierung waren die Wiederherstellung einer festen Parteiherrschaft und die Wiederherstellung des Status der Tschechoslowakei als engagiertes Mitglied des sozialistischen Blocks. In den zwei Jahren nach der Invasion widerrief die neue Führung einige reformistische Gesetze (wie das National Front Act und das Press Act) und setzte andere einfach nicht durch. Durch Verträge, die auf zentralen Planungs- und Produktionsquoten basierten, wurden die Wirtschaftsunternehmen, die während des Prager Frühlings weitgehend unabhängig geworden waren, wieder einer zentralen Kontrolle unterworfen."  #NT!
 CZH_1969_revolution_1.t:0 "Die Tschechoslowakische Föderation?"  #NT!
 CZH_1969_revolution_1.d:0 "Durch die Verkündung des Verfassungsgesetzes der Föderation wurden 58 Artikel der Verfassung der Tschechoslowakei von 1960 hinsichtlich der Regierungsstruktur geändert. Der tschechoslowakische Staat wurde zu einer Föderation „zweier gleichberechtigter brüderlicher Nationen“ erklärt, der Tschechischen Sozialistischen Republik und der Slowakischen Sozialistischen Republik, jeweils mit einer nationalen Verwaltung, die der Bundesregierung entsprach und zumindest theoretisch denselben Status hatte. Die doppelte Staatsbürgerschaft wurde eingeführt. Viele der früheren Funktionen der Zentralregierung wurden stattdessen der Zuständigkeit der beiden nationalen Regierungen unterstellt. Die Bundesregierung behielt die ausschließliche Zuständigkeit für auswärtige Angelegenheiten, Landesverteidigung, Bundesreserven und nationale Ressourcen."  #NT!
  
 BUL_1954_revolution.t:0 "Die April-Linie?"  #NT!
 BUL_1954_revolution.d:0 "Nach dem Tod Josef Stalins entstand ein Schwerpunkt auf der gemeinsamen Führung. Als der Hardliner-Stalinist Tscherwenkow 1954 seinen Posten als Generalsekretär der BKP aufgab, trat Schiwkow an seine Stelle, doch Tscherwenkow behielt die meisten seiner Befugnisse als Premierminister. Nachdem Nikita Chruschtschow auf dem 20. Parteitag der Kommunistischen Partei der Sowjetunion seine berühmte Geheimrede gegen Stalin gehalten hatte, wurde im April 1956 eine Plenarsitzung des BKP-Zentralkomitees einberufen, um der Annahme einer neuen Chruschtschow-Linie zuzustimmen. Auf diesem Plenum kritisierte Schiwkow Tscherwenkow als Schüler Stalins und ließ ihn vom Premierminister auf einen Kabinettsposten degradieren. Anschließend verfolgte Schiwkow in Bulgarien eine Politik der relativen gesellschaftspolitischen Liberalisierung und Entstalinisierung, ähnlich dem Chruschtschow-Tauwetter in der Sowjetunion."  #NT!
 BUL_1965_revolution.t:0 "Die April-Verschwörung?"  #NT!
 BUL_1965_revolution.d:0 "Mit der immer stärker werdenden Position Schiwkows als Führer des Landes und der Kommunistischen Partei nahmen ehemalige Partisanenführer und aktive Militärs eine kritische Haltung gegenüber der ihrer Ansicht nach revisionistischen Politik von Schiwkows Führung ein. Im Rahmen der als „Aprilverschwörung“ von 1965 bezeichneten Ereignisse organisierten General Iwan Todorow-Gorunja, General Zwjatko Anew und Tsolo Krastew eine Gruppe hochrangiger Militäroffiziere, die den Sturz des Regimes planten. Ihr Plan bestand darin, eine pro-chinesische Führung im Land zu etablieren, die auf stalinistisch-maoistischen Prinzipien basiert. Der Putsch wurde aufgedeckt und zwischen dem 28. März und dem 12. April 1965 wurden die meisten Verschwörer verhaftet und aus der Partei ausgeschlossen."  #NT!
  
 BYE_1994_revolution.t:0 "Präsidentschaft von Alexander Lukaschenko?"  #NT!
 BYE_1994_revolution.d:0 "Bevor Lukaschenko seine politische Karriere begann, arbeitete er als Direktor einer Staatsfarm (Sowchose) und diente sowohl in den sowjetischen Grenztruppen als auch in der Sowjetarmee. 1990 wurde Lukaschenko in den Obersten Sowjet der Weißrussischen Sozialistischen Sowjetrepublik gewählt. Nach der Auflösung der Sowjetunion übernahm er die Position des Leiters des vorläufigen Antikorruptionsausschusses des Obersten Rates von Belarus. 1994 gewann er nach der Verabschiedung einer neuen Verfassung die Präsidentschaft bei den ersten Präsidentschaftswahlen des Landes."  #NT!
  
 NEJ_1964_revolution.t:0 "Die Abdankung von König Saud?"  #NT!
 NEJ_1964_revolution.d:0 "Unter Sauds Herrschaft trat Saudi-Arabien 1961 der Bewegung der Blockfreien Staaten bei. Da Saud jedoch nicht in der Lage war, der saudischen Staatsverschuldung entgegenzuwirken, geriet er in einen Machtkampf mit seinem Halbbruder und Kronprinzen Faisal, der in der erzwungenen Abdankung Sauds und der Proklamation Faisals zum König gipfelte. Saud ging ins Exil und unternahm mit der Unterstützung einiger seiner Söhne einen erfolglosen Versuch, den Thron zurückzuerobern."  #NT!
 NEJ_1975_revolution.t:0 "Die Ermordung von König Faisal?"  #NT!
 NEJ_1975_revolution.d:0 "Am 25. März 1975 wurde der König von Faisal bin Musaid, dem Sohn seines Halbbruders Musaid bin Abdulaziz, aus nächster Nähe erschossen und getötet. Er war gerade aus den USA zurückgekommen. Der Mord ereignete sich an einem Majlis (wörtlich „Sitzplatz“), einer Veranstaltung, bei der der König oder Anführer seinen Wohnsitz den Bürgern öffnet, damit sie eintreten und eine Petition an ihn richten können."  #NT!
 NEJ_2005_revolution.t:0 "Der Tod von König Fahd"  #NT!
 NEJ_2005_revolution.d:0 "König Fahd wurde am 27. Mai 2005 in „stabilem, aber ernstem Zustand“ für nicht näher bezeichnete medizinische Tests in das King Faisal Specialist Hospital in Riad eingeliefert. Ein Beamter (der auf Anonymität bestand) teilte der Associated Press inoffiziell mit, dass der König am 1. August 2005 um 07:30 Uhr im Alter von 84 Jahren gestorben sei. Die offizielle Erklärung wurde um 10:00 Uhr von Informationsminister Iyad Madani im Staatsfernsehen bekannt gegeben."  #NT!
  
 QAT_1960_revolution.t:0 "Die Abdankung von Ali bin Abdullah Al Thani?"  #NT!
 QAT_1960_revolution.d:0 "Im Mai 1960 versuchte ein Cousin von Scheich Ali, ihn in der Ferienresidenz des Scheichs in Beirut mit einer Schusswaffe zu ermorden. Das Attentat stand angeblich im Zusammenhang mit Finanzen. Am 28. Oktober 1960 dankte er zugunsten von Ahmad bin Ali Al Thani ab."  #NT!
 QAT_1972_revolution.t:0 "Der Staatsstreich in Katar?"  #NT!
 QAT_1972_revolution.d:0 "Scheich Khalifa setzte Scheich Ahmad am 22. Februar 1972 in einem unblutigen Staatsstreich ab. Zu dieser Zeit befand sich Scheich Ahmad auf einer Jagdreise im Iran. Nach seiner Absetzung lebte Scheich Ahmad mit seiner Frau – der Tochter des verstorbenen Herrschers von Dubai – und seinen Kindern im selbst auferlegten Exil in Dubai."  #NT!
 QAT_1995_revolution.t:0 "Der Staatsstreich in Katar?"  #NT!
 QAT_1995_revolution.d:0 "Während sich Khalifa bin Hamad Al Thani im Juni 1995 in Genf in der Schweiz aufhielt, ergriff sein Sohn Hamad bin Khalifa in einem weiteren unblutigen Staatsstreich die Macht. Hamad bin Khalifa beschuldigte seinen Vater des Verrats und verlangte, dass Interpol ihn verhaften solle. Er beschuldigte seinen Vater in vier Anklagepunkten, zu denen auch seine Hinrichtung gehörte."  #NT!
 QAT_2013_revolution.t:0 "Die Abdankung von Hamad bin Khalifa Al Thani?"  #NT!
 QAT_2013_revolution.d:0 "Am 25. Juni 2013 dankte Scheich Hamad bin Khalifa Al Thani als Emir von Katar ab und übergab die Macht an seinen Sohn, Scheich Tamim bin Hamad Al Thani. Der seltene freiwillige Schritt in der Golfpolitik markierte einen Generationswechsel und positionierte Katar für Kontinuität inmitten regionaler Umwälzungen und globaler Expansion."  #NT!
  
 MOR_1953_revolution.t:0 "Der Putsch von Mohammed Ben Aarafa?"  #NT!
 MOR_1953_revolution.d:0 "Ben Arafa wurde am 21. August 1953 auf den alouitischen Thron gesetzt, nachdem sein Cousin Mohammed V. von den französischen Behörden abgesetzt worden war, die gemäß dem Vertrag von Fes von 1912 ein Protektorat in Marokko unterhielten. General Augustin Guillaume, der seit 1951 Generalresident von Marokko war, geriet mit Mohammed V. in Konflikt, weil dieser die marokkanische Unabhängigkeitsbewegung unterstützte, und führte eine Kampagne zu seinem Sturz an, die von den französischen Kolonisten und einigen marokkanischen Führern wie Thami El Glaoui, dem Pascha von Marrakesch, unterstützt wurde."  #NT!
 MOR_1955_revolution.t:0 "Der Sturz von Mohammed Ben Aarafa?"  #NT!
 MOR_1955_revolution.d:0 "Aufgrund der mangelnden Legitimität oder Beliebtheit Ben Arafas bei der marokkanischen Bevölkerung sowie der zunehmenden Verbindungen der Gewalt in Marokko mit der in Tunesien und dem Algerienkrieg erwogen die französischen Behörden 1955, ihn abzusetzen und Mohammed V. wieder einzusetzen. Gilbert Grandval, der zum neuen Generalresidenten ernannt worden war, beschloss, sich mit Großwesir Muhammad al-Muqri zu treffen. Al-Muqri flog nach Frankreich und traf sich mit Grandval in Vichy und deutete an, dass Ben Arafa angesichts der Unruhen in der Bevölkerung im ganzen Land gehen müsse, und es wurde erwartet, dass Mohammed V. wieder an die Macht kommen würde. Am 1. Oktober dankte Ben Arafa ab."  #NT!
 MOR_1961_revolution.t:0 "Der Tod von König Mohammed V"  #NT!
 MOR_1961_revolution.d:0 "Am 26. Februar 1961 starb Mohammed an den Folgen einer banalen Operation an der Nasenscheidewand, die ein Waadtländer Chirurg durchgeführt hatte. Sein Tod wurde im nationalen Radio von seinem Sohn, Kronprinz Moulay Hassan, bekannt gegeben, der sein Nachfolger als König Hassan II. wurde."  #NT!
 MOR_1970_revolution.t:0 "Die Rückkehr der Parlamentswahlen?"  #NT!
 MOR_1970_revolution.d:0 "Am 21. August 1970 fanden in Marokko Parlamentswahlen statt. Sie folgten auf die Annahme einer neuen Verfassung in einem Referendum im Juli. Die neue Repräsentantenversammlung hatte 240 Mitglieder; 90 werden direkt in Einzelwahlkreisen in öffentlicher Abstimmung gewählt, 90 werden von Gemeinderäten gewählt und 60 werden von vier Berufskollegien gewählt (24 von den Landwirtschaftskammern, 16 von den Industrie- und Handelskammern, 10 von den Handwerkskammern und 10 von Vertretern der Lohnabhängigen)."  #NT!
 MOR_2011_revolution.t:0 "Das marokkanische Verfassungsreferendum?"  #NT!
 MOR_2011_revolution.d:0 "Am 1. Juli 2011 fand in Marokko ein Referendum über Verfassungsreformen statt, das der König als Reaktion auf eine Reihe von Protesten in ganz Marokko einberufen hatte, die am 20. Februar 2011 begannen, als über zehntausend Marokkaner an Demonstrationen teilnahmen, die demokratische Reformen forderten."  #NT!
  
 ALG_1965_revolution.t:0 "Der algerische Staatsstreich?"  #NT!
 ALG_1965_revolution.d:0 "Der algerische Staatsstreich von 1965 brachte Oberst Houari Boumédiène als Vorsitzender des Revolutionsrates in Algerien an die Macht. Bei dem unblutigen Staatsstreich wurde der erste Präsident Algeriens, Ahmed Ben Bella, verhaftet und seine engsten Anhänger von Boumédiène und seinen Verbündeten, vor allem den algerischen Landstreitkräften, inhaftiert."  #NT!
 ALG_1992_revolution.t:0 "Der algerische Bürgerkrieg?"  #NT!
 ALG_1992_revolution.d:0 "Der algerische Bürgerkrieg war ein Bürgerkrieg zwischen der algerischen Regierung und verschiedenen islamistischen Rebellengruppen vom 11. Januar 1992 (nach einem Putsch, der einen islamistischen Wahlsieg zunichte machte) bis zum 8. Februar 2002. Der Krieg begann langsam, da es zunächst so aussah, als hätte die Regierung die islamistische Bewegung erfolgreich niedergeschlagen, doch bewaffnete Gruppen traten auf, um den Dschihad zu erklären, und 1994 hatte die Gewalt ein solches Ausmaß erreicht, dass es den Anschein hatte, als könne die Regierung dem nicht standhalten."  #NT!
  
 JOR_1951_revolution.t:0 "Die Ermordung von Abdullah I. von Jordanien?"  #NT!
 JOR_1951_revolution.d:0 "Am 20. Juli 1951 wurde Abdullah I., der erste König von Jordanien, bei einem Besuch der Al-Aqsa-Moschee in Jerusalem ermordet. Abdullah war in Jerusalem, um bei der Beerdigung von Riad Al Solh, dem ersten Premierminister des Libanon, eine Laudatio zu halten. Er nahm mit seinem Enkel, Prinz Hussein, am Freitagsgebet in der Moschee teil. Abdullah wurde dreimal tödlich in Kopf und Brust geschossen. Der Attentäter, der 21-jährige Mustafa Shukri Ashu, wurde von den Leibwächtern des Königs erschossen. Das Attentat führte zu einer Nachfolgekrise, da sein Sohn Talal an einer Geisteskrankheit litt."  #NT!
 JOR_1952_revolution.t:0 "Die Abdankung Talals von Jordanien?"  #NT!
 JOR_1952_revolution.d:0 "König Talal von Jordanien dankte 1952 aufgrund einer Geisteskrankheit ab, nachdem er nach der Ermordung seines Vaters nur eine kurze Regierungszeit hinter sich hatte. Das Parlament unter Premierminister Tawfik Abu Al-Huda erklärte ihn nach Anzeichen von Paranoia und unberechenbarem Verhalten für regierungsunfähig. Sein Sohn Hussein folgte ihm nach und begann eine lange und transformative Herrschaft."  #NT!
 JOR_1956_revolution.t:0 "Die Arabisierung der jordanischen Armee?"  #NT!
 JOR_1956_revolution.d:0 "Die Arabisierung des jordanischen Armeekommandos führte zur Entlassung hochrangiger britischer Offiziere, die die Arabische Legion befehligten, durch König Hussein und die anschließende Umbenennung der Legion in Jordanische Streitkräfte am 1. März 1956. Glubb Pascha, der britische Kommandeur der Arabischen Legion, wurde durch Generalmajor Radi Annab ersetzt, der der erste arabische Kommandeur der Arabischen Legion wurde. Husseins Absichten, die Armeeführung zu arabisieren, bestanden darin, britische Offiziere durch jordanische Offiziere zu ersetzen, die politische Unabhängigkeit von Großbritannien durchzusetzen und die Beziehungen zu benachbarten arabischen Staaten zu verbessern, die die Briten mit Argwohn betrachteten. Als die Entscheidung bekannt gegeben wurde, gab es auf den Straßen Jordaniens große Feierlichkeiten."  #NT!
 JOR_1957_revolution.t:0 "Die Säuberung der Nasseristen?"  #NT!
 JOR_1957_revolution.d:0 "Im April 1957 schlug König Hussein von Jordanien einen von Nasseristen angeführten Putschversuch nieder, säuberte arabisch-nationalistische Offiziere und löste das Parlament auf. Das Vorgehen, das sich auf Zarqa konzentrierte, markierte eine entscheidende Wende gegen den panarabischen Radikalismus. Es folgte das Kriegsrecht, das die königliche Autorität festigte und Jordanien enger mit den westlichen und antinasseristischen Regionalmächten verbündete."  #NT!
 JOR_1989_revolution.t:0 "Der jordanische Frühling?"  #NT!
 JOR_1989_revolution.d:0 "Am 18. April 1989 kam es in ganz Jordanien zu weit verbreiteten Protesten gegen Sparmaßnahmen und steigende Preise, die König Hussein dazu veranlassten, das Kriegsrecht aufzuheben und die Parlamentswahlen nach 22 Jahren Suspendierung wieder aufzunehmen. Der „Jordanische Frühling“ markierte einen entscheidenden Wandel hin zur politischen Liberalisierung, der demokratische Reformen beschleunigte und Raum für Oppositionsstimmen im Haschemitischen Königreich öffnete."  #NT!
 JOR_1999_revolution.t:0 "Der Tod von Hussein I. von Jordanien?"  #NT!
 JOR_1999_revolution.d:0 "König Hussein von Jordanien starb am 7. Februar 1999 im Alter von 63 Jahren an den Folgen einer Krebserkrankung. Sein Tod markierte das Ende einer 46-jährigen Herrschaft, die das moderne Jordanien prägte. Trauernde füllten die Straßen von Amman und sein Sohn Abdullah II. wurde schnell vereidigt, was einen reibungslosen Führungswechsel gewährleistete."  #NT!
  
 EGY_1952_revolution.t:0 "Die Julirevolution?"  #NT!
 EGY_1952_revolution.d:0 "Am 23. Juli 1952 begann die Revolution mit dem Sturz von König Farouk durch einen Staatsstreich der Bewegung der Freien Offiziere. Diese Gruppe von Armeeoffizieren wurde von Mohamed Naguib und Gamal Abdel Nasser angeführt."  #NT!
 EGY_1953_revolution.t:0 "Die Erklärung der Republik?"  #NT!
 EGY_1953_revolution.d:0 "Die Erklärung der Republik war eine Verfassungserklärung, die am 18. Juni 1953 vom Revolutionären Kommandorat Ägyptens herausgegeben wurde. Die Erklärung entthronte König Fuad II. und überführte das Königreich Ägypten in die Republik Ägypten."  #NT!
 EGY_1954_revolution.t:0 "Der Aufstieg von Gamal Abdel Nasser?"  #NT!
 EGY_1954_revolution.d:0 "Im Januar 1953 überwand Nasser den Widerstand von Naguib und verbot alle politischen Parteien. Dadurch entstand ein Einparteiensystem im Rahmen der Liberation Rally, einer locker strukturierten Bewegung, deren Hauptaufgabe darin bestand, Pro-RCC-Kundgebungen und Vorträge zu organisieren, mit Nasser als Generalsekretär. Als Naguib Anzeichen von Unabhängigkeit von Nasser zeigte, indem er sich von den Landreformdekreten des RCC distanzierte und sich den etablierten politischen Kräften Ägyptens, nämlich dem Wafd und der Bruderschaft, annäherte, beschloss Nasser, ihn abzusetzen. Am 25. Februar 1954 gab Naguib seinen Rücktritt bekannt, nachdem das RCC zwei Tage zuvor eine offizielle Sitzung ohne seine Anwesenheit abgehalten hatte. Am 26. Februar akzeptierte Nasser den Rücktritt, stellte Naguib unter Hausarrest und der RCC ernannte Nasser sowohl zum RCC-Vorsitzenden als auch zum Premierminister."  #NT!
 EGY_1970_revolution.t:0 "Der Aufstieg von Anwar Sadat?"  #NT!
 EGY_1970_revolution.d:0 "Muhammad Anwar es-Sadat war ein ägyptischer Politiker und Militäroffizier, der ab dem 15. Oktober 1970 als dritter Präsident Ägyptens fungierte. In seinen elf Jahren als Präsident änderte er den Kurs Ägyptens, indem er von vielen politischen und wirtschaftlichen Grundsätzen des Nasserismus abwich, ein Mehrparteiensystem wieder einführte und die Infitah-Wirtschaftspolitik einführte."  #NT!
 EGY_1981_revolution.t:0 "Die Ermordung von Anwar Sadat?"  #NT!
 EGY_1981_revolution.d:0 "Anwar Sadat, der 3. Präsident Ägyptens, wurde am 6. Oktober 1981 während der jährlichen Siegesparade in Kairo zur Feier der Operation Badr ermordet, bei der die ägyptische Armee zu Beginn des Jom-Kippur-Krieges den Suezkanal überquert und die Sinai-Halbinsel von Israel zurückerobert hatte. Das Attentat wurde von Mitgliedern des ägyptischen Islamischen Dschihad verübt."  #NT!
 EGY_2013_revolution.t:0 "Ägyptischer Staatsstreich?"  #NT!
 EGY_2013_revolution.d:0 "Der ägyptische Staatsstreich 2013 fand am 3. Juli 2013 statt. Der ägyptische Armeechef General Abdel Fattah al-Sisi führte eine Koalition an, um den demokratisch gewählten Präsidenten Ägyptens Mohamed Mursi von der Macht zu stürzen und die ägyptische Verfassung von 2012 außer Kraft zu setzen."  #NT!
  
 SYR_1949_revolution.t:0 "Der syrische Staatsstreich?"  #NT!
 SYR_1949_revolution.d:0 "Der syrische Staatsstreich im März 1949 war ein unblutiger Staatsstreich, der am 30. März stattfand. Es war der erste Militärputsch in der modernen syrischen Geschichte und stürzte die demokratisch gewählte Regierung des Landes. Sie wurde vom Stabschef der syrischen Armee, Husni al-Za'im, geleitet, der am 11. April 1949 Präsident Syriens wurde. Zu den Offizieren, die al-Za'ims Machtübernahme unterstützten, gehörten Sami al-Hinnawi und Adib al-Shishakli, die beide später nacheinander auch militärische Führer des Landes werden sollten."  #NT!
 SYR_1954_revolution.t:0 "Der syrische Staatsstreich?"  #NT!
 SYR_1954_revolution.d:0 "Oberst Adib Shishakli kam im Dezember 1949 durch einen Putsch an die Macht und gründete eine militärische Autokratie. Als Führer Syriens erkannte Adib Shishakli die Wünsche der arabischen Mehrheit Syriens und verfolgte dementsprechend eine Politik des Panarabismus. Der syrische Staatsstreich 1954 fand im Februar desselben Jahres statt, um die Regierung von Adib Shishakli zu stürzen. An der Spitze der Anti-Shishakli-Bewegung standen der ehemalige Präsident Atassi und der erfahrene Drusenführer Sultan al-Atrash."  #NT!
 SYR_1955_revolution.t:0 "Der Aufstieg von Shukri al-Quwatli?"  #NT!
 SYR_1955_revolution.d:0 "Quwatli kehrte 1955 nach dem Sturz von Präsident Adib al-Shishakli und während der Präsidentschaft von Hashim al-Atassi nach Syrien zurück. Quwatli kandidierte im Alter von 63 Jahren bei den Präsidentschaftswahlen im August 1955. Um zu gewinnen, musste sich Quwatli eine Zweidrittelmehrheit im 142-köpfigen syrischen Parlament sichern und besiegte seinen Hauptgegner Khalid al-Azm in der ersten Runde mit 89 zu 42. Dies führte zu einem zweiten Wahlgang, in dem Quwatli mit 91 Stimmen gegen Azms 41 Stimmen die Präsidentschaft gewann."  #NT!
 SYR_1963_revolution.t:0 "Der syrische Staatsstreich?"  #NT!
 SYR_1963_revolution.d:0 "Der syrische Staatsstreich von 1963 war die Machtergreifung in Syrien durch das Militärkomitee der syrischen Regionalabteilung der Arabischen Sozialistischen Baath-Partei. Die Planung und die sich abzeichnende Verschwörung der syrischen Baath-Aktivisten wurden durch die Machtergreifung der Baath-Partei im Irak im Februar 1963 ausgelöst."  #NT!
 SYR_1966_revolution.t:0 "Der syrische Staatsstreich?"  #NT!
 SYR_1966_revolution.d:0 "Am 23. Februar 1966 wurde al-Hafiz von einer radikalen Baath-Fraktion unter der Führung von Stabschef Salah Jadid gestürzt. Am frühen Morgen des Staatsstreichs schickte der ägyptische Präsident Gamal Abdel Nasser ein spätes Warntelegramm über den Staatsstreich an Nasim al-Safarjalani (den Generalsekretär des Präsidialrats). Der Putsch entstand aus einer Fraktionsrivalität zwischen Jadids „regionalistischem“ (qutri) Lager der Baath-Partei, die Ambitionen für ein Großsyrien förderte, und der traditionelleren panarabischen al-Hafiz-Fraktion, die als „nationalistische“ (qawmi) Fraktion bezeichnet wird."  #NT!
 SYR_1970_revolution.t:0 "Die korrigierende Revolution?"  #NT!
 SYR_1970_revolution.d:0 "Die Korrektive Revolution war ein unblutiger Staatsstreich unter der Führung von General Hafez al-Assad am 13. November 1970 in Syrien. Assad verkündete, die „nationalistisch-sozialistische Linie“ des Staates und der Baath-Partei aufrechtzuerhalten und zu verbessern. Die Baath-Partei verabschiedete eine ideologische Revision und distanzierte sich von Salah Jadids Doktrin des Revolutionsexports. Die neue Doktrin legte den Schwerpunkt auf den Sieg über Israel durch den Aufbau des syrischen Militärs mit Unterstützung der Sowjetunion."  #NT!
 SYR_1994_revolution.t:0 "Der Aufstieg von Bashar al-Assad?"  #NT!
 SYR_1994_revolution.d:0 "Bashar Hafez al-Assad ist ein ehemaliger syrischer Politiker, Arzt und Militäroffizier. In den 1980er Jahren wurde Assad Arzt, Anfang der 1990er Jahre absolvierte er in London eine Ausbildung zum Augenarzt. Nachdem sein älterer Bruder Bassel al-Assad 1994 bei einem Autounfall ums Leben kam, wurde Assad nach Syrien zurückgerufen, um Bassels Rolle als Thronfolger zu übernehmen."  #NT!
 SYR_2000_revolution.t:0 "Der Tod von Hafez al-Assad?"  #NT!
 SYR_2000_revolution.d:0 "Am 10. Juni 2000 starb Hafez al-Assad im Alter von 69 Jahren während eines Telefonats mit dem libanesischen Premierminister al-Huss an einem Herzinfarkt. Nach dem Tod von Hafez al-Assad wurde die Macht mit Unterstützung von Baath-Loyalisten auf seinen Sohn Bashar übertragen, was Syrien zur ersten arabischen Republik machte, die ein dynastisches System etablierte."  #NT!
 SYR_2024_revolution.t:0 "Sturz des Baath-Regimes?"  #NT!
 SYR_2024_revolution.d:0 "Am 8. Dezember 2024 brach das von Präsident Baschar al-Assad angeführte Baath-Syrien während einer Großoffensive der Oppositionskräfte zusammen. Die Offensive wurde von Tahrir al-Sham angeführt und hauptsächlich von der von der Türkei unterstützten Syrischen Nationalarmee im Rahmen des anhaltenden syrischen Bürgerkriegs, der 2011 begann, unterstützt. Die Einnahme von Damaskus markierte das Ende der Herrschaft der Assad-Familie, die Syrien seit der Machtübernahme von Hafez al-Assad im Jahr 1971 nach der Korrekturrevolution als erbliches totalitäres Regime regiert hatte."  #NT!
  
 LEB_1952_revolution.t:0 "Der Aufstieg von Camille Chamoun?"  #NT!
 LEB_1952_revolution.d:0 "Als Präsident Bechara El Khoury 1952 wegen Korruptionsvorwürfen zum Rücktritt gezwungen wurde, wurde Chamoun zu seinem Nachfolger gewählt. Während Chamouns Präsidentschaft erlebte der Libanon einen wirtschaftlichen Aufschwung, insbesondere im Bau-, Banken- und Tourismussektor. Er setzte 1954 ein Gesetz zur Gründung von Aktiengesellschaften und 1956 ein Gesetz zum Bankgeheimnis um."  #NT!
 LEB_1989_revolution.t:0 "Das Taif-Abkommen?"  #NT!
 LEB_1989_revolution.d:0 "Mit dem Taif-Abkommen wurde das politische System des Nationalpakts im Libanon umstrukturiert, indem ein Teil der Macht von der maronitischen christlichen Gemeinschaft übertragen wurde, die während der Zeit der französischen Herrschaft im Libanon einen privilegierten Status erhalten hatte. Nach dem Taif-Abkommen war der Premierminister wie in einem traditionellen parlamentarischen System gegenüber der Legislative verantwortlich. Daher änderte das Abkommen die Machtteilungsformel, die die Christen begünstigt hatte, auf ein 50:50-Verhältnis und stärkte die Macht des sunnitischen Premierministers gegenüber der des christlichen Präsidenten."  #NT!
  
 SUD_1969_revolution.t:0 "Der sudanesische Staatsstreich?"  #NT!
 SUD_1969_revolution.d:0 "Der sudanesische Staatsstreich von 1969 war ein erfolgreicher Putsch unter der Führung von Oberst Gaafar Nimeiry gegen die Regierung von Präsident Ismail al-Azhari. Der Putsch markierte das Ende der zweiten demokratischen Ära im Sudan und markierte den Beginn von Nimeirys 16-jähriger Herrschaft. Nimeirys Regierung würde ein radikales arabisch-nationalistisches und linkes Programm verfolgen und ein sozialistisches Programm für die soziale und wirtschaftliche Entwicklung einführen, einschließlich einer weit verbreiteten Verstaatlichung von Privateigentum."  #NT!
 SUD_1985_revolution.t:0 "Der sudanesische Staatsstreich?"  #NT!
 SUD_1985_revolution.d:0 "Der sudanesische Staatsstreich von 1985 war ein Militärputsch, der am 6. April 1985 im Sudan stattfand. Der Putsch wurde von einer Gruppe Militäroffiziere unter der Führung des Verteidigungsministers und Oberbefehlshabers der Streitkräfte, Feldmarschall Abdel Rahman Swar al-Dahab, gegen die Regierung von Präsident Gaafar Nimeiry inszeniert."  #NT!
 SUD_2019_revolution.t:0 "Der sudanesische Staatsstreich?"  #NT!
 SUD_2019_revolution.d:0 "Am späten Nachmittag des 11. April 2019 kam es im Sudan zu einem Staatsstreich, als Präsident Omar al-Bashir von den sudanesischen Streitkräften gestürzt wurde, nachdem Proteste in der Bevölkerung seinen Rücktritt gefordert hatten. Damals stürzte die Armee unter der Führung von Ahmed Awad Ibn Auf die Regierung und die nationale Legislative und rief im Land den Ausnahmezustand für einen Zeitraum von drei Monaten aus, gefolgt von einer Übergangsfrist von zwei Jahren, bevor später eine Einigung erzielt wurde."  #NT!
 SUD_2021_revolution.t:0 "Der sudanesische Staatsstreich?"  #NT!
 SUD_2021_revolution.d:0 "Am 25. Oktober 2021 übernahm das sudanesische Militär unter der Führung von General Abdel Fattah al-Burhan durch einen Militärputsch die Kontrolle über die sudanesische Regierung. Mindestens fünf hochrangige Regierungsvertreter wurden zunächst festgenommen. Der zivile Premierminister Abdalla Hamdok weigerte sich, seine Unterstützung für den Putsch zu erklären und rief am 25. Oktober zum Widerstand der Bevölkerung auf; Am 26. Oktober wurde er unter Hausarrest gestellt."  #NT!
  
 EQG_1968_revolution.t:0 "Die Präsidentschaft von Macías Nguema?"  #NT!
 EQG_1968_revolution.d:0 "Francisco Macías Nguema war ein äquatoguinischer Politiker, der von der Unabhängigkeit des Landes im Jahr 1968 bis zu seinem Sturz im Jahr 1979 als erster Präsident Äquatorialguineas fungierte. Er gilt weithin als einer der brutalsten Diktatoren der Geschichte. Als Präsident zeigte er ein bizarres und unberechenbares Verhalten, das so weit ging, dass viele seiner Zeitgenossen ihn für verrückt hielten."  #NT!
 EQG_1973_revolution.t:0 "Die neue Verfassung Äquatorialguineas?"  #NT!
 EQG_1973_revolution.d:0 "Macias Nguema festigte seine totalitären Befugnisse weiter, indem er im Juli 1970 oppositionelle politische Parteien verbot und sich 1972 selbst zum Präsidenten auf Lebenszeit ernannte. Es galt bis zum Staatsstreich von Teodoro Obiang im August 1979, dem sogenannten Freiheitsputsch, der den Obersten Militärrat von Äquatorialguinea gründete, obwohl eine neue Verfassung erst im August 1982 verabschiedet wurde."  #NT!
 EQG_1979_revolution.t:0 "Der Putsch von Teodoro Obiang?"  #NT!
 EQG_1979_revolution.d:0 "Der Staatsstreich 1979 in Äquatorialguinea ereignete sich am 3. August 1979, als der Neffe von Präsident Francisco Macías Nguema, Teodoro Obiang Nguema Mbasogo, ihn in einem blutigen Putsch stürzte. Die Kämpfe zwischen Loyalisten und Rebellen gingen weiter, bis Macías Nguema am 18. August auf der Flucht nach Kamerun gefangen genommen wurde. Er wurde wegen des Völkermords am Volk der Bubi und anderer begangener Verbrechen zum Tode verurteilt. Macías Nguema wurde am 29. September 1979 durch ein Erschießungskommando hingerichtet. Teodoro blieb seitdem Anführer, zunächst als Vorsitzender des Revolutionären Militärrats und des Obersten Militärrats und anschließend als Präsident."  #NT!
  
 CMR_1960_revolution.t:0 "Die Präsidentschaft von Ahmadou Ahidjo?"  #NT!
 CMR_1960_revolution.d:0 "Ahmadou Babatoura Ahidjo (24. August 1924 – 30. November 1989) war ein kamerunischer Politiker, der von 1960 bis 1982 der erste Präsident Kameruns war. Zuvor war er der erste Premierminister seit der Unabhängigkeit des Landes im Januar 1960 bis Mai desselben Jahres nach der Schaffung der Präsidentschaft. Ahidjo spielte eine wichtige Rolle bei der Gründung Kameruns als unabhängiger Staat im Jahr 1960 sowie bei der Integration der französisch- und englischsprachigen Landesteile. Während Ahidjos Amtszeit baute er ein zentralisiertes politisches System auf."  #NT!
 CMR_1966_revolution.t:0 "Der kamerunische Einparteienstaat?"  #NT!
 CMR_1966_revolution.d:0 "1961 begann Ahidjo, einen Einparteienstaat zu fordern. Am 12. März 1962 erließ Ahidjo ein Dekret, das Kritik an seinem Regime verhinderte und der Regierung die Befugnis gab, jeden, der der Subversion gegen Regierungsbehörden oder -gesetze für schuldig befunden wurde, inhaftieren zu lassen. Im Juli 1962 stellte eine Gruppe von Oppositionsparteiführern, die zusammen mit Ahidjo in der Regierung gedient hatten, Ahidjos Forderung nach einem Einparteienstaat in Frage und bezeichnete ihn als diktatorisch. Diese Anführer wurden wegen Subversion gegen die Regierung verhaftet, vor Gericht gestellt und inhaftiert. Ahidjos politische Partei, die Cameroon National Union (CNU), wurde am 1. September 1966 die einzige legale politische Partei."  #NT!
 CMR_1972_revolution.t:0 "Das kamerunische Verfassungsreferendum?"  #NT!
 CMR_1972_revolution.d:0 "Am 20. Mai 1972 fand in Kamerun ein Verfassungsreferendum statt. Die neue Verfassung würde das Land im Gegensatz zum vorherigen föderalen System zu einem Einheitsstaat machen und Präsident Ahmadou Ahidjo mehr Befugnisse übertragen. Es wurde angeblich von 99,99 % der Wähler angenommen, bei einer Wahlbeteiligung von 98 %."  #NT!
 CMR_1982_revolution.t:0 "Der Rücktritt von Ahmadou Ahidjo?"  #NT!
 CMR_1982_revolution.d:0 "Ahidjo trat am 4. November 1982 angeblich aus gesundheitlichen Gründen zurück und wurde zwei Tage später von Premierminister Paul Biya abgelöst. Dass er zugunsten von Biya zurücktrat, einem Christen aus dem Süden und nicht wie er selbst ein Muslim aus dem Norden, galt als überraschend. Ahidjos letztendliche Absichten waren unklar; Es ist möglich, dass er beabsichtigte, zu einem späteren Zeitpunkt, als sich sein Gesundheitszustand verbesserte, in die Präsidentschaft zurückzukehren, und eine andere Möglichkeit besteht darin, dass er beabsichtigte, Maigari Bello Bouba, einen muslimischen Glaubensgenossen aus dem Norden, der Biya als Premierminister ablöste, sein späterer Nachfolger als Präsident zu werden, wobei Biya praktisch die Rolle eines Verwalters übernehmen sollte."  #NT!
  
 NGE_1966_revolution.t:0 "Der nigerianische Staatsstreich?"  #NT!
 NGE_1966_revolution.d:0 "Die Militärdiktatur in Nigeria war eine Zeit, in der Angehörige der nigerianischen Streitkräfte von 1966 bis 1999 mit einem Interregnum von 1979 bis 1983 die Macht in Nigeria innehatten. Das Militär konnte oft mit stillschweigender Unterstützung der Elite durch Staatsstreiche an die Macht gelangen."  #NT!
 NGE_1999_revolution.t:0 "Die Rückkehr zur Demokratie?"  #NT!
 NGE_1999_revolution.d:0 "Aufgrund massiver ziviler Proteste, die das Land wochenlang faktisch lahmlegten. Der Präsident hielt schließlich sein Versprechen, die Macht an eine Zivilregierung abzugeben. Das Verbot politischer Aktivitäten wurde aufgehoben und politische Gefangene aus den Haftanstalten entlassen. Anschließend wurde eine Wahl zur Wahl des neuen Präsidenten anberaumt."  #NT!
  
 NIG_1960_revolution.t:0 "Die Präsidentschaft von Hamani Diori?"  #NT!
 NIG_1960_revolution.d:0 "Hamani Diori war der erste Präsident der Republik Niger. Er wurde 1960 in dieses Amt berufen, als Niger die Unabhängigkeit von Frankreich erlangte. Obwohl Korruption ein weit verbreitetes Merkmal seiner Regierung war, erlangte er internationales Ansehen für seine Rolle als Sprecher für afrikanische Angelegenheiten und als beliebter Schlichter in Konflikten."  #NT!
 NIG_1974_revolution.t:0 "Der Staatsstreich in Nigeria?"  #NT!
 NIG_1974_revolution.d:0 "Am 15. April 1974 führte Oberstleutnant Seyni Kountché einen Militärputsch an, der die vierzehnjährige Herrschaft von Diori beendete. Der Militärputsch begann am Morgen des 15. April um 1 Uhr morgens, und bis auf eine Handvoll Einheiten erklärten sich alle Einheiten schnell zu den Anführern des Putsches. Die persönliche Garde von Präsident Hamani Diori, die ausschließlich aus Tuareg bestehende Republikanische Garde, war die einzige Einheit, die auf Befehl von Dioris Frau Aissa Diori Widerstand leistete. Sie und eine kleine Anzahl von Gardisten wurden am 15. April nach Tagesanbruch im Präsidentenpalast getötet. Diori, der Präsident der Nationalversammlung, Boubou Hama und mehrere andere PPN-Politiker in Niamey wurden bei der Operation festgenommen."  #NT!
 NIG_1987_revolution.t:0 "Der Tod von Seyni Kountché?"  #NT!
 NIG_1987_revolution.d:0 "Kountchés Gesundheitszustand verschlechterte sich Ende 1986 und verschlechterte sich im Laufe des Jahres 1987 weiter. Er starb am 10. November 1987 in einem Pariser Krankenhaus an einem Gehirntumor. Ali Saïbou folgte ihm nach und wurde am 14. November 1987 zum Präsidenten des Obersten Militärrats (CMS) ernannt."  #NT!
 NIG_1993_revolution.t:0 "Die Rückkehr der Demokratie in Niger?"  #NT!
 NIG_1993_revolution.d:0 "Anfang 1990 führten Studentenunruhen und ein Tuareg-Angriff auf Tchintabaraden zu einer Nationalen Konferenz von 1991, die letztendlich die Einparteienherrschaft abschaffte und Saibou weitgehend wirkungslos machte. Auf einem MNSD-Parteitag im März 1991 konnte Saibou seine Position als Parteivorsitzender behaupten und profitierte dabei insbesondere von der Unterstützung der Armee. Später im Jahr verbot die Nationalkonferenz Saibou jedoch, an den geplanten Präsidentschaftswahlen teilzunehmen, und auf einem weiteren MNSD-Kongress im November 1991 wurde er als Parteivorsitzender durch Mamadou Tandja ersetzt. Nach der Wahl von Mahamane Ousmane zum Präsidenten im März 1993 übergab Saibou am 16. April die Präsidentschaft an Mahamane – das erste Mal, dass der amtierende Präsident die Macht friedlich an die Opposition übergab – und zog sich in sein Heimatdorf zurück."  #NT!
 NIG_1996_revolution.t:0 "Der Staatsstreich in Nigeria?"  #NT!
 NIG_1996_revolution.d:0 "Der nigerianische Staatsstreich 1996 war ein Militärputsch, der am 27. Januar 1996 in Niamey, Niger, stattfand. Es stürzte Nigers ersten demokratisch gewählten Präsidenten, Mahamane Ousmane, nach fast drei Jahren an der Macht und setzte General Ibrahim Baré Maïnassara als Staatsoberhaupt ein. Premierminister Hama Amadou wurde bei dem Putsch festgenommen und mehrere Soldaten und Präsidentengardisten wurden bei den Kämpfen getötet."  #NT!
 NIG_1999_revolution.t:0 "Der Staatsstreich in Nigeria?"  #NT!
 NIG_1999_revolution.d:0 "Der Staatsstreich in Nigeria 1999 fand am 9. April 1999 statt und führte zum Tod von Präsident Ibrahim Baré Maïnassara und zur Amtseinführung von Daouda Malam Wanké am 11. April als Präsident. Maïnassara wurde unter ungeklärten Umständen in einem Hinterhalt entweder am internationalen Flughafen Diori Hamani erschossen, möglicherweise bei dem Versuch, aus dem Land zu fliehen, oder auf einem Militärstützpunkt, wahrscheinlich von Mitgliedern der Präsidentengarde."  #NT!
 NIG_2010_revolution.t:0 "Der Staatsstreich in Nigeria?"  #NT!
 NIG_2010_revolution.d:0 "Am 18. Februar 2010 kam es in Niger zu einem Staatsstreich. Soldaten griffen am Mittag unter Waffenbeschuss den Präsidentenpalast in Niamey an und nahmen Präsident Mamadou Tandja gefangen, der zu diesem Zeitpunkt eine Regierungssitzung leitete. Später am Tag kündigten die Rebellen im Fernsehen die Bildung des Obersten Rates für die Wiederherstellung der Demokratie (CSRD) unter der Leitung von Chef d'escadron Salou Djibo an."  #NT!
 NIG_2023_revolution.t:0 "Der Staatsstreich in Nigeria?"  #NT!
 NIG_2023_revolution.d:0 "Am 26. Juli 2023 kam es in Niger zu einem Staatsstreich, bei dem die Präsidentengarde des Landes Präsident Mohamed Bazoum absetzte und festnahm. Anschließend erklärte sich General Abdourahamane Tchiani, der Kommandeur der Präsidentengarde, zum Führer des Landes und gründete den Nationalen Rat zum Schutz des Heimatlandes, nachdem er den Erfolg des Putsches bestätigt hatte."  #NT!
  
 IVC_1960_revolution.t:0 "Der neue starke Mann der Elfenbeinküste?"  #NT!
 IVC_1960_revolution.d:0 "Die Elfenbeinküste erlangte 1960 unter der Führung von Félix Houphouët-Boigny, der das Land bis 1993 regierte, ihre Unabhängigkeit. Im regionalen Vergleich relativ stabil, knüpfte die Elfenbeinküste enge politisch-wirtschaftliche Beziehungen zu ihren westafrikanischen Nachbarn und pflegte gleichzeitig enge Beziehungen zum Westen, insbesondere zu Frankreich. Seine Stabilität wurde durch einen Staatsstreich im Jahr 1999 und zwei Bürgerkriege geschwächt – zunächst zwischen 2002 und 2007 und erneut zwischen 2010 und 2011."  #NT!
 IVC_2000_revolution.t:0 "Die Rückkehr zur Demokratie?"  #NT!
 IVC_2000_revolution.d:0 "Aufgrund massiver ziviler Proteste, die das Land wochenlang faktisch lahmlegten. Der Präsident hielt schließlich sein Versprechen, die Macht an eine Zivilregierung abzugeben. Das Verbot politischer Aktivitäten wurde aufgehoben und politische Gefangene aus den Haftanstalten entlassen. Anschließend wurde eine Wahl zur Wahl des neuen Präsidenten anberaumt."  #NT!
  
 MAL_1960_revolution.t:0 "Der malische Staatsstreich?"  #NT!
 MAL_1960_revolution.d:0 "Nach dem Abzug Senegals wurde die Republik Mali gegründet. Nach einer langen Zeit der Einparteienherrschaft führte ein Putsch im Jahr 1991 zu einer neuen Verfassung und der Gründung Malis als demokratischer Mehrparteienstaat. Im Januar 2012 brach im Norden Malis ein bewaffneter Konflikt aus, bei dem Tuareg-Rebellen die Kontrolle über ein Gebiet im Norden übernahmen und im April die Abspaltung eines neuen Staates, Azawad, erklärten. Der Konflikt wurde durch einen Militärputsch im März 2012 und spätere Kämpfe zwischen Tuareg und anderen Rebellengruppen verschärft."  #NT!
 MAL_1991_revolution.t:0 "Die Rückkehr zur Demokratie?"  #NT!
 MAL_1991_revolution.d:0 "Nach einer langen Zeit der Einparteienherrschaft führte ein Putsch im Jahr 1991 zu einer neuen Verfassung und der Gründung Malis als demokratischer Mehrparteienstaat. Im Januar 2012 brach im Norden Malis ein bewaffneter Konflikt aus. Der Konflikt wurde durch einen Militärputsch im März 2012 und spätere Kämpfe zwischen Tuareg und anderen Rebellengruppen verschärft. Dem Putsch folgten eine „einstimmige“ internationale Verurteilung, harte Sanktionen seitens Malis Nachbarn und der schnelle Verlust Nordmalis an die Tuareg-Truppen. Am 6. April einigte sich die Junta darauf, im Gegenzug für das Ende der Sanktionen von der Macht zurückzutreten und die Macht einer Übergangsregierung unter der Führung des Parlamentspräsidenten Dioncounda Traoré zu übertragen."  #NT!
  
 CHA_1960_revolution.t:0 "Der tschadische Staatsstreich?"  #NT!
 CHA_1960_revolution.d:0 "1960 erlangte der Tschad unter der Führung von François Tombalbaye die Unabhängigkeit. Der Unmut gegen seine Politik im muslimischen Norden gipfelte 1965 im Ausbruch eines langanhaltenden Bürgerkriegs. 1979 eroberten die Rebellen die Hauptstadt und beendeten die Hegemonie des Südens. Die Rebellenkommandanten kämpften dann untereinander, bis Hissène Habré seine Rivalen besiegte. Der tschadisch-libysche Konflikt brach 1978 durch die libysche Invasion aus, die 1987 mit einer französischen Militärintervention (Operation Épervier) endete. Hissène Habré wiederum wurde 1990 von seinem General Idriss Déby gestürzt."  #NT!
 CHA_1991_revolution.t:0 "Der tschadische Staatsstreich?"  #NT!
 CHA_1991_revolution.d:0 "Déby übernahm die Macht, indem er im Dezember 1990 einen Staatsstreich gegen Habré anführte. Obwohl er 1992 nach mehreren Jahrzehnten der Einparteienherrschaft unter seinen Vorgängern ein Mehrparteiensystem einführte, war seine Patriotische Heilsbewegung während seiner gesamten Präsidentschaft die dominierende Partei. Déby gewann die Präsidentschaftswahlen 1996 und 2001, und nachdem die Amtszeitbeschränkung abgeschafft wurde, gewann er 2006, 2011, 2016 und 2021 erneut."  #NT!
  
 RWA_1973_revolution.t:0 "Der ruandische Staatsstreich?"  #NT!
 RWA_1973_revolution.d:0 "Habyarimana, ein ethnischer Hutu, war in verschiedenen Sicherheitspositionen tätig, unter anderem als Verteidigungsminister unter Ruandas erstem Präsidenten Grégoire Kayibanda. Nachdem er Kayibanda 1973 durch einen Putsch gestürzt hatte, wurde er neuer Präsident des Landes und setzte schließlich die Pro-Hutu-Politik seines Vorgängers fort. Während seiner Herrschaft entwickelte sich Ruanda zu einem totalitären Einparteienstaat, in dem seine MRND-Partei-Vollstrecker von den Menschen verlangten, bei Massenaufführungen politischer „Animation“ Sprechchöre und Tänze zur Verehrung des Präsidenten zu singen und zu tanzen."  #NT!
 RWA_1994_revolution.t:0 "Der Sturz des Hutu-Regimes?"  #NT!
 RWA_1994_revolution.d:0 "Im Jahr 1990 begann die von Tutsi geführte Rwandan Patriotic Front (RPF) den ruandischen Bürgerkrieg gegen seine Regierung. Nach drei Jahren Krieg unterzeichnete Habyarimana 1993 das Arusha-Abkommen mit der RPF als Friedensabkommen. Im folgenden Jahr starb er unter mysteriösen Umständen, als sein Flugzeug, in dem sich auch der Präsident von Burundi, Cyprien Ntaryamira, befand, in der Nähe von Kigali von einer Rakete abgeschossen wurde. Seine Ermordung löste ethnische Spannungen in der Region aus und trug zum Völkermord an den Tutsi bei. Die Tutsi-RPF startete ihre Offensive erneut, übernahm systematisch die Kontrolle über das Land und erlangte bis Mitte Juli die Kontrolle über das ganze Land."  #NT!
 RWA_2000_revolution.t:0 "Der Aufstieg von Paul Kagame?"  #NT!
 RWA_2000_revolution.d:0 "Bizimungu trat im Jahr 2000 zurück, höchstwahrscheinlich war er nach einem Streit mit der RPF dazu gezwungen worden. Er wurde durch Kagame ersetzt. Bizimungu wurde später wegen Korruption und Anstiftung zu ethnischer Gewalt inhaftiert, Vorwürfe, die Menschenrechtsgruppen als politisch motiviert bezeichneten. Kagames Herrschaft gilt als autoritär, Menschenrechtsgruppen werfen ihm politische Unterdrückung vor."  #NT!
  
 GAM_1994_revolution.t:0 "Der Putsch von Yahya Jammeh?"  #NT!
 GAM_1994_revolution.d:0 "Am 22. Juli 1994 stürzten junge Offiziere unter der Führung von Yahya Jammeh die Regierung von Präsident Dawda Jawara in Gambia unter Berufung auf Korruption und Missmanagement. Der unblutige Putsch beendete Jawaras fast 30-jährige Herrschaft, setzte die Verfassung außer Kraft und setzte eine Militärjunta ein."  #NT!
 GAM_2017_revolution.t:0 "Der Fall von Yahya Jammeh?"  #NT!
 GAM_2017_revolution.d:0 "Im Dezember 2016 verlor Yahya Jammeh die Präsidentschaftswahlen in Gambia gegen Adama Barrow, weigerte sich jedoch, nachzugeben, was eine Verfassungskrise auslöste. Die ECOWAS intervenierte militärisch und veranlasste Jammeh 2017 zur Flucht ins Exil nach Äquatorialguinea. Barrow wurde vereidigt, wodurch Jammehs 22-jährige autoritäre Herrschaft beendet und eine neue demokratische Ära eingeläutet wurde."  #NT!
  
 SEN_1960_revolution.t:0 "Der Aufstieg von Léopold Sédar Senghor?"  #NT!
 SEN_1960_revolution.d:0 "Léopold Sédar Senghor wurde am 9. Oktober 1906 in Joal, Senegal, geboren. Nach seiner Ausbildung in Paris entwickelte er sich zu einem führenden Dichter und einem der Gründer der Negritude-Bewegung, die sich für die kulturelle Identität Afrikas einsetzte. Nach dem Zweiten Weltkrieg kehrte er in seine Heimat zurück, trat in die Politik ein, führte Senegal zur Autonomie und schmiedete den afrikanischen Sozialismus mit pragmatischen französischen Beziehungen. Am 6. September 1960 wurde er der erste Präsident des unabhängigen Senegal und führte die junge Nation durch zwei Jahrzehnte der Stabilität und einer dauerhaften kulturellen Renaissance. Seine Mischung aus poetischer Vision und bemerkenswertem politischem Scharfsinn festigte sein Vermächtnis als wegweisender Denker, dessen Aufstieg das postkoloniale Afrika veränderte."  #NT!
 SEN_1962_revolution.t:0 "Der Putschversuch von Mamadou Dia?"  #NT!
 SEN_1962_revolution.d:0 "Im Dezember 1962 wurde Senegals Premierminister Mamadou Dia beschuldigt, inmitten tiefer ideologischer Gräben einen Putsch gegen Präsident Léopold Sédar Senghor inszeniert zu haben. Dia, eine überzeugte Sozialistin, war mit Senghor wegen Wirtschaftspolitik und parlamentarischer Kontrolle aneinander geraten. Als Dia versuchte, ein Misstrauensvotum zu verhindern, interpretierte Senghor dies als Machtübernahme. Dia wurde verhaftet, wegen Hochverrats angeklagt und zu lebenslanger Haft verurteilt, obwohl viele Historiker das Ereignis eher als politisches Manöver denn als echten Putsch betrachten. Sein Sturz markierte einen Wandel hin zur Dominanz des Präsidenten in der senegalesischen Politik und beendete das kurze Experiment des Landes mit der Doppelspitze der Exekutive."  #NT!
 SEN_1975_revolution.t:0 "Die teilweise Liberalisierung Senegals?"  #NT!
 SEN_1975_revolution.d:0 "Unter Präsident Léopold Sédar Senghor wandelte sich Senegal von einem faktischen Einparteienstaat zu einem kontrollierten Mehrparteiensystem. Diese „passive Revolution“ erlaubte begrenzten Widerstand, indem sie bis zu drei Parteien legalisierte – jede vertrat unterschiedliche ideologische Positionen – und gleichzeitig eine strenge staatliche Aufsicht aufrechterhielt. Der Schritt zielte darauf ab, die Regierungsführung zu modernisieren, ohne Senghors Autorität zu destabilisieren. Die Liberalisierung Senegals im Jahr 1975 spiegelte einen strategischen Balanceakt zwischen politischer Offenheit und Regimekontinuität wider."  #NT!
 SEN_1980_revolution.t:0 "Die Rückkehr der Mehrparteiendemokratie im Senegal?"  #NT!
 SEN_1980_revolution.d:0 "Senghors Abgang und die friedliche Nachfolge von Abdou Diouf signalisierten eine Vertiefung der demokratischen Normen. Aufbauend auf der teilweisen Liberalisierung von 1975 erweiterte Diouf die politischen Freiheiten und ermöglichte es mehr Parteien, über den zuvor auferlegten starren ideologischen Rahmen hinaus zu agieren. Dieser Übergang stärkte Senegals Ruf als politische Stabilität und Zivilherrschaft in Westafrika. Der Wandel im Jahr 1980 legte den Grundstein für wettbewerbsfähige Wahlen und eine lebendige politische Landschaft und machte Senegal zu einem Modell für eine schrittweise, friedliche Demokratisierung in der postkolonialen Ära."  #NT!
  
 SIL_1964_revolution.t:0 "Die Premiership von Albert Margai?"  #NT!
 SIL_1964_revolution.d:0 "Albert Margai war von 1964 bis 1967 Premierminister von Sierra Leone und trat die Nachfolge seines Bruders Milton Margai an. Seine Regierung konzentrierte sich auf die Festigung der Macht und die Förderung der nationalen Einheit, doch seine Politik – insbesondere Versuche, das Militär zu politisieren und sich in Richtung eines Einparteienstaates zu bewegen – löste Kontroversen aus. Ethnische Bevorzugung und wachsender Autoritarismus untergruben das öffentliche Vertrauen und führten zu politischer Instabilität."  #NT!
 SIL_1968_revolution.t:0 "Die Premiership von Siaka Stevens?"  #NT!
 SIL_1968_revolution.d:0 "Siaka Stevens war von 1968 bis 1971 Premierminister von Sierra Leone und legte den Grundstein für seine lange Präsidentschaft. Seiner Amtszeit als Premierminister folgte eine Zeit politischer Instabilität und Militärherrschaft, und er bemühte sich schnell, die Macht unter dem All People's Congress zu festigen. Stevens betonte den wirtschaftlichen Nationalismus und die zentralisierte Regierungsführung, doch in seiner Amtszeit kam es auch zu einem zunehmenden Autoritarismus und der Unterdrückung abweichender Meinungen. 1971 verwandelte er Sierra Leone in eine Republik und wurde deren erster Exekutivpräsident. Sein Führungsstil und seine politischen Manöver in dieser Zeit prägten jahrzehntelang die Entwicklung des Landes und vermischten populistische Rhetorik mit strenger Kontrolle staatlicher Institutionen."  #NT!
 SIL_1985_revolution.t:0 "Die Amtszeit von Joseph Saidu Momoh?"  #NT!
 SIL_1985_revolution.d:0 "Joseph Saidu Momoh wurde 1985 Premierminister von Sierra Leone, trat die Nachfolge von Siaka Stevens an und übernahm später die Präsidentschaft. Momoh, ein ehemaliger Armeegeneral, versprach Reformen und eine nationale Erneuerung, hatte jedoch Schwierigkeiten, dies angesichts der sich verschärfenden Wirtschaftskrise und der weit verbreiteten Korruption umzusetzen. Seine Regierung war mit wachsender Unzufriedenheit in der Öffentlichkeit, einer sich verschlechternden Infrastruktur und einem sinkenden Lebensstandard konfrontiert. Versuche einer politischen Liberalisierung hatten größtenteils symbolischen Charakter, da der regierende All People's Congress eine strenge Kontrolle aufrechterhielt."  #NT!
 SIL_1992_revolution.t:0 "Der Coup von Valentine Strasser?"  #NT!
 SIL_1992_revolution.d:0 "Valentine Strasser führte Sierra Leone von 1992 bis 1996 als Staatsoberhaupt und wurde nach einem Militärputsch im Alter von 25 Jahren der jüngste Präsident der Welt. Seine Herrschaft begann mit Reformversprechen und Korruptionsbekämpfung, wurde jedoch schnell von autoritärer Kontrolle und dem sich verschärfenden Bürgerkrieg geprägt. Als Vorsitzender des National Provisional Ruling Council kämpfte Strasser darum, die Wirtschaft zu stabilisieren und Aufstände der Rebellen zu bewältigen. Trotz anfänglicher öffentlicher Unterstützung geriet seine Führung aufgrund interner Meinungsverschiedenheiten und mangelnder Fortschritte ins Wanken."  #NT!
 SIL_1996_revolution.t:0 "Die Rückkehr der Demokratie?"  #NT!
 SIL_1996_revolution.d:0 "Im Jahr 1996 kehrte Sierra Leone nach Jahren der Militärherrschaft und zivilen Unruhen zur Demokratie zurück. Die bahnbrechenden Wahlen im Februar und März markierten die erste Mehrparteienabstimmung des Landes seit 1977. Trotz des anhaltenden Konflikts mit der Revolutionary United Front (RUF) begrüßten die Bürger den demokratischen Prozess und wählten Ahmed Tejan Kabbah von der Sierra Leone People's Party (SLPP) zum Präsidenten. Sein Sieg signalisierte einen hoffnungsvollen Wandel hin zu einer zivilen Regierungsführung und einer verfassungsmäßigen Ordnung. Durch die Wahlen wurde auch die parlamentarische Vertretung wiederhergestellt, die vierjährige militärische Kontrolle unter dem Nationalen Provisorischen Regierungsrat endete und die demokratischen Institutionen inmitten eines fragilen Friedensprozesses wiederbelebt."  #NT!
  
 GHA_1960_revolution.t:0 "Die Regel von Kwame Nkrumah?"  #NT!
 GHA_1960_revolution.d:0 "Francis Kwame Nkrumah war ein ghanaischer Politiker, politischer Theoretiker und Revolutionär. Er war von 1952 bis 1957 Premierminister der Goldküste, als diese von Großbritannien unabhängig wurde. Von 1957 bis 1966 war er der erste Premierminister und dann Präsident Ghanas. Seine Regierung war überwiegend sozialistisch und nationalistisch. Es finanzierte nationale Industrie- und Energieprojekte, entwickelte ein starkes nationales Bildungssystem und förderte eine panafrikanische Kultur. Unter Nkrumah spielte Ghana während der Dekolonisierungszeit eine führende Rolle in den internationalen Beziehungen Afrikas."  #NT!
 GHA_1966_revolution.t:0 "Der ghanaische Putsch?"  #NT!
 GHA_1966_revolution.d:0 "Im Februar 1966, als Nkrumah sich auf Staatsbesuch in Nordvietnam und China befand, wurde seine Regierung durch einen gewaltsamen Staatsstreich gestürzt, angeführt von den nationalen Militär- und Polizeikräften und mit Unterstützung des öffentlichen Dienstes. Die Verschwörer unter der Führung von Joseph Arthur Ankrah nannten sich „National Liberation Council“ und regierten drei Jahre lang als Militärregierung. Die Anführer des Putsches, der Nkrumah stürzte, öffneten sofort die Grenzen des Landes und seine Gefängnistore, um allen Gegnern Nkrumahs die Rückkehr aus dem Exil oder die Freilassung aus der Sicherungsverwahrung zu ermöglichen. Es ernannte ein Beamtenkabinett und versprach, die demokratische Regierung so schnell wie möglich wiederherzustellen."  #NT!
 GHA_1979_revolution.t:0 "Der ghanaische Putsch?"  #NT!
 GHA_1979_revolution.d:0 "Die 4. Juni-Revolution war ein Aufstand in Ghana im Jahr 1979, der aus einem Konflikt zwischen den unteren Rängen und Offizieren der ghanaischen Streitkräfte entstand. Anschließend wurde Rawlings von den aufständischen Junior-Militäroffizieren zum Vorsitzenden des Armed Forces Revolutionary Council (AFRC) ernannt, um das Land bis zum Abschluss der laufenden Wahlen zu regieren. Rawlings übergab seine Macht im September 1979 an Dr. Hilla Limann. Rawlings stürzte später Limanns Regierung am 31. Dezember 1981."  #NT!
 GHA_1992_revolution.t:0 "Die Wiederherstellung der Demokratie?"  #NT!
 GHA_1992_revolution.d:0 "Jerry Rawlings, der das Land seit seiner Machtübernahme durch einen Putsch im Jahr 1981 geführt hatte, hatte Anfang des Jahres widerwillig der Abhaltung von Mehrparteienwahlen zugestimmt. Rawlings kandidierte als Kandidat der Progressive Alliance, zu der auch sein National Democratic Congress gehörte, und erhielt 58,4 % der Stimmen, genug für einen Sieg, ohne dass eine Stichwahl erforderlich war. Die Wahlbeteiligung lag bei 50,2 %."  #NT!
  
 GUI_1960_revolution.t:0 "Die Herrschaft von Ahmed Sékou Touré?"  #NT!
 GUI_1960_revolution.d:0 "Ahmed Sékou Touré war ein guineischer politischer Führer und afrikanischer Staatsmann, der von 1958 bis zu seinem Tod 1984 der erste Präsident Guineas wurde. Touré gehörte zu den wichtigsten guineischen Nationalisten, die an der Erlangung der Unabhängigkeit des Landes von Frankreich beteiligt waren. 1960 erklärte Touré die PDG zur einzigen legalen Partei, obwohl das Land seit der Unabhängigkeit faktisch ein Einparteienstaat war. In den nächsten 24 Jahren hatte Touré praktisch die gesamte Regierungsmacht im Land inne."  #NT!
 GUI_1984_revolution.t:0 "Der guineische Staatsstreich?"  #NT!
 GUI_1984_revolution.d:0 "Der guineische Staatsstreich von 1984 war der unblutige Militärputsch, der am 3. April 1984 in Guinea unter der Führung von Oberst Lansana Conté stattfand. Dies führte zur Absetzung von Premierminister Louis Lansana Beavogui, der das Amt seit 1972 innehatte und seit März als Interimspräsident amtierte, als der langjährige Präsident Ahmed Sékou Touré während einer Notoperation am Herzen in der Cleveland Clinic in den Vereinigten Staaten starb."  #NT!
 GUI_1993_revolution.t:0 "Die Wiederherstellung der Demokratie?"  #NT!
 GUI_1993_revolution.d:0 "Die erste Mehrparteien-Präsidentschaftswahl seit der Unabhängigkeit fand am 19. Dezember 1993 statt. Conté, Kandidat der neu gegründeten Partei der Einheit und des Fortschritts (PUP), gewann 51,7 % der Stimmen – gerade genug, um einer Stichwahl zu entgehen. Alpha Condé von der Rallye des guineischen Volkes (RPG) belegte mit 19,6 % der Stimmen den zweiten Platz."  #NT!
  
 GAB_1961_revolution.t:0 "Der Aufstieg von Léon M'ba?"  #NT!
 GAB_1961_revolution.d:0 "Der erste Präsident Gabuns, der 1961 gewählt wurde, war Léon M'ba, mit Omar Bongo Ondimba als seinem Vizepräsidenten. Nachdem M'ba an die Macht gekommen war, wurde die Presse unterdrückt, politische Demonstrationen unterdrückt, die Meinungsfreiheit eingeschränkt, andere politische Parteien nach und nach von der Macht ausgeschlossen und die Verfassung nach französischem Vorbild geändert, um die Macht dem Präsidentenamt zu übertragen, einem Amt, das M'ba selbst übernahm. Als M'ba im Januar 1964 die Nationalversammlung auflöste, um eine Einparteienherrschaft einzuführen, versuchte ein Militärputsch, ihn von der Macht zu verdrängen und die parlamentarische Demokratie wiederherzustellen. Französische Fallschirmjäger flogen innerhalb von 24 Stunden ein, um M'ba wieder an die Macht zu bringen. Nach tagelangen Kämpfen endete der Putsch und die Opposition wurde inhaftiert, was zu Protesten und Unruhen führte."  #NT!
 GAB_1967_revolution.t:0 "Der Aufstieg von Omar Bongo?"  #NT!
 GAB_1967_revolution.d:0 "Omar Bongo Ondimba war ein gabunischer Politiker, der von 1967 bis zu seinem Tod im Jahr 2009 der zweite Präsident Gabuns war. Als Mitglied der Gabunischen Demokratischen Partei (PDG) wurde Bongo in den 1960er Jahren als junger Beamter unter Gabuns erstem Präsidenten Léon M'ba in Schlüsselpositionen befördert, bevor er 1966 zum zweiten eigenständigen Vizepräsidenten gewählt wurde. 1967 nach M'ba Nach seinem Tod wurde er Präsident des Landes."  #NT!
 GAB_1993_revolution.t:0 "Die Mehrparteiendemokratie in Gabun?"  #NT!
 GAB_1993_revolution.d:0 "Am 22. Mai 1990 verabschiedeten das PDG-Zentralkomitee und die Nationalversammlung nach Streiks, Unruhen und Unruhen Verfassungsänderungen, um den Übergang zu einem Mehrparteiensystem zu erleichtern. Das bestehende Präsidialmandat, das bis 1994 galt, musste respektiert werden. Nachfolgende Wahlen zum Präsidentenamt würden von mehr als einem Kandidaten bestritten, und die Amtszeit des Präsidenten wurde auf fünf Jahre mit einer Amtszeitbeschränkung von einer Wiederwahl in das Amt geändert. Im Dezember 1993 gewann Bongo die erste Präsidentschaftswahl unter der neuen Mehrparteienverfassung mit einem deutlich geringeren Vorsprung von rund 51,4 %."  #NT!
 GAB_2009_revolution.t:0 "Die Präsidentschaft von Ali Bongo?"  #NT!
 GAB_2009_revolution.d:0 "Ali Bongo Ondimba ist ein ehemaliger gabunischer Politiker und Diktator, der von 2009 bis zu seinem Sturz durch einen Putsch im Jahr 2023 der dritte Präsident Gabuns war. Als Mitglied der Gabunischen Demokratischen Partei ist Bongo der Sohn von Omar Bongo, der von 1967 bis zu seinem Tod im Jahr 2009 Präsident war."  #NT!
 GAB_2023_revolution.t:0 "Der gabunische Staatsstreich?"  #NT!
 GAB_2023_revolution.d:0 "Am 30. August 2023 kam es in Gabun zu einem Staatsstreich, kurz nachdem bekannt gegeben wurde, dass der amtierende Präsident Ali Bongo die Parlamentswahlen vom 26. August gewonnen hatte. Der Anführer des Putsches, Brice Oligui Nguema, gehört zur Bongo-Familie und hat seinen Cousin Ali Bongo gestürzt. Der Putsch beendete die 56-jährige Herrschaft des Vater-Sohn-Duos Omar und Ali Bongo über Gabun. Einige haben es als einen Palastputsch beschrieben."  #NT!
  
 BEN_1960_revolution.t:0 "Der Einparteienstaat Dahomey?"  #NT!
 BEN_1960_revolution.d:0 "1960 erlangte Dahomey die Unabhängigkeit von Frankreich und experimentierte kurzzeitig mit der Mehrparteiendemokratie. Ende des Jahres festigte Hubert Maga die Macht, verbot die Opposition und erklärte Dahomey zum Einparteienstaat."  #NT!
 BEN_1970_revolution.t:0 "Das Triumvirat von Dahomey?"  #NT!
 BEN_1970_revolution.d:0 "Im Jahr 1970 führte Dahomeys politische Krise zur Geburt der ersten Hochschulpräsidentschaft Afrikas. Hubert Maga, Justin Ahomadegbe und Sourou-Migan Apithy bildeten ein rotierendes Triumvirat, das jeweils zwei Jahre lang regierte, um regionale Rivalitäten auszugleichen. Obwohl die Vereinbarung innovativ war, erwies sie sich als instabil."  #NT!
 BEN_1972_revolution.t:0 "Die Volksrepublik Benin?"  #NT!
 BEN_1972_revolution.d:0 "Die Volksrepublik Benin war ein kommunistischer Staat im Golf von Guinea auf dem afrikanischen Kontinent, der 1990 zum heutigen Benin wurde. Die Volksrepublik wurde am 30. November 1975 nach dem Staatsstreich 1972 in der Republik Dahomey gegründet."  #NT!
 BEN_1990_revolution.t:0 "Die Rückkehr der Mehrparteiendemokratie in Benin?"  #NT!
 BEN_1990_revolution.d:0 "Die sozialen und politischen Unruhen, die katastrophale Wirtschaftslage und der Sturz der kommunistischen Regime in Osteuropa veranlassten Präsident Kérékou, dem Sturz seines Regimes zuzustimmen. Im Februar 1989 brachten elf Bischöfe Benins in einem Hirtenbrief ihre Verurteilung der Volksrepublik zum Ausdruck. Am 7. Dezember 1989 übernahm Kérékou die Führung und überraschte das Volk, indem er eine offizielle Erklärung verbreitete, in der er die Abkehr vom Marxismus-Leninismus, die Auflösung des Politbüros und die Schließung des Zentralkomitees der Partei ankündigte. 1990 wurde eine Übergangsregierung eingesetzt, die den Weg für die Rückkehr zu einem Mehrparteiensystem ebnete. Die neue Verfassung wurde im Dezember 1990 per Referendum angenommen. Der offizielle Name Benin wurde für das Land beibehalten, das zur Republik Benin wurde."  #NT!
  
 CUB_1959_revolution.t:0 "Die kubanische Revolution?"  #NT!
 CUB_1959_revolution.d:0 "Die Kubanische Revolution war ein bewaffneter Aufstand unter der Führung von Fidel Castro, der schließlich die brutale Diktatur von Fulgencio Batista stürzte. Die Revolution begann mit einem gescheiterten Angriff auf kubanische Militärkasernen am 26. Juli 1953, doch Ende 1958 hatten die Guerilla-Revolutionäre in Castros Bewegung vom 26. Juli in Kuba die Oberhand gewonnen und Batista am 1. Januar 1959 gezwungen, von der Insel zu fliehen."  #NT!
 CUB_2006_revolution.t:0 "Der Aufstieg von Raúl Castro?"  #NT!
 CUB_2006_revolution.d:0 "Aufgrund der Krankheit seines Bruders wurde Castro ab dem 31. Juli 2006 vorübergehend zum Präsidenten des Staatsrates ernannt. Am 24. Februar 2008 wurde Castro von der Nationalversammlung offiziell zum Präsidenten ernannt, nachdem sein immer noch kranker Bruder am 19. Februar 2008 erklärt hatte, dass er nicht mehr kandidieren werde. Am 24. Februar 2013 wurde er wieder zum Präsidenten gewählt. Kurz darauf gab Castro bekannt, dass seine zweite Amtszeit seine letzte sein würde und dass er sich 2018 nicht mehr zur Wiederwahl stellen werde."  #NT!
 CUB_2019_revolution.t:0 "Das kubanische Verfassungsreferendum?"  #NT!
 CUB_2019_revolution.d:0 "Beim kubanischen Verfassungsreferendum 2019, das am 24. Februar stattfand, wurde eine neue Verfassung mit 90,6 % der gültigen Stimmen angenommen. Die Reformen führten zur Anerkennung von Privateigentum, zur Begrenzung der Amtszeit des Präsidenten, zu erweiterten Bürgerrechten und zu strukturellen Regierungsänderungen. Die Verfassung trat am 10. April 2019 in Kraft."  #NT!
  
 HAI_1946_revolution.t:0 "Der Staatsstreich?"  #NT!
 HAI_1946_revolution.t:0 "Da seine Regierung kurz vor dem Bankrott stand und mit einer schwächelnden Wirtschaft zu kämpfen hatte, bat Lescot die Vereinigten Staaten erfolglos um eine Verlängerung der Schuldenrückzahlungen. Die Beziehungen zwischen Lescot und Trujillo in der Dominikanischen Republik brachen zusammen. 1946 lösten seine Versuche, die Oppositionspresse mundtot zu machen, heftige Studentendemonstrationen aus; In Port-au-Prince brach ein Aufstand aus. Lescot versuchte, der Militärgarde zu befehlen, die Demonstrationen aufzulösen, wurde jedoch abgewiesen. In der Überzeugung, dass ihr Leben in Gefahr war, flohen Lescot und sein Kabinett ins Exil. Dumarsais Estimé trat schließlich die Nachfolge von Lescot an der Spitze der Republik an und wurde Haitis erster schwarzer Präsident seit der US-Besatzung."  #NT!
 HAI_1950_revolution.t:0 "Der Staatsstreich?"  #NT!
 HAI_1950_revolution.d:0 "Im August 1946 wurde Dumarsais Estimé gegen Dantès Louis Bellegarde zum Präsidenten von Haiti gewählt. Magloire befand sich dann in der Opposition und gründete MOP (Mouvement Ouvrier Paysan). Im Mai 1950 stürzte ein von einer Militärjunta organisierter Staatsstreich die Regierung von Estimé und setzte ihren Anführer Paul Magloire als Oberhaupt des Landes ein, wo er im Oktober 1950 zum Präsidenten gewählt wurde. Estimé wurde kurz darauf von der haitianischen Armee unter Franck Lavaud abgesetzt und ins Exil geschickt."  #NT!
 HAI_1957_revolution.t:0 "Der Aufstieg von François Duvalier?"  #NT!
 HAI_1957_revolution.d:0 "François Duvalier war ein haitianischer Politiker und Voodooist, der von 1957 bis zu seinem Tod im Jahr 1971 Präsident von Haiti war. Nachdem er 1958 einen Militärputsch vereitelt hatte, wurde sein Regime rasch autokratischer und despotischer. Eine verdeckte Todesschwadron der Regierung, die Tonton Macoute, folterte oder tötete wahllos Duvaliers Gegner. Darüber hinaus versuchte Duvalier, seine Herrschaft zu festigen, indem er Elemente der haitianischen Mythologie in einen Personenkult einbezog."  #NT!
 HAI_1971_revolution.t:0 "Der Tod von François Duvalier"  #NT!
 HAI_1971_revolution.d:0 "Im April 1971 übernahm Jean-Claude Duvalier im Alter von 19 Jahren nach dem Tod seines Vaters François Duvalier die Präsidentschaft Haitis und wurde damit der jüngste Präsident der Welt sowie der einzige nichtkönigliche Staatsführer unter 20 Jahren."  #NT!
 HAI_1986_revolution.t:0 "Der Fall von Jean-Claude Duvalier"  #NT!
 HAI_1986_revolution.d:0 "1985 kam es in den Provinzen zu einer Revolte. Die Stadt Gonaïves war die erste Stadt, die Straßendemonstrationen und Razzien in Lagerhäusern für Lebensmittelvertrieb durchführte. Von Oktober 1985 bis Januar 1986 weiteten sich die Proteste auf sechs weitere Städte aus, darunter Cap-Haïtien. Duvalier floh am 7. Februar 1986 aus dem Land."  #NT!
 HAI_1994_revolution.t:0 "Die Rückkehr der Demokratie"  #NT!
 HAI_1994_revolution.d:0 "Im September 1994 verhandelten die Vereinigten Staaten im Rahmen der Operation Uphold Democracy über den Abzug der haitianischen Militärführer und den friedlichen Einmarsch von 20.000 US-Soldaten. Dies ermöglichte die Wiedereinsetzung des demokratisch gewählten Jean-Bertrand Aristide als Präsident, der im Oktober nach Haiti zurückkehrte, um seine Amtszeit zu beenden. Im Rahmen des Abkommens musste Aristide Reformen des freien Marktes umsetzen, um die haitianische Wirtschaft zu verbessern, mit gemischten Ergebnissen."  #NT!
 HAI_2004_revolution.t:0 "Der Staatsstreich?"  #NT!
 HAI_2004_revolution.d:0 "Ein Staatsstreich in Haiti am 29. Februar 2004 führte nach mehrwöchigen Konflikten zur Amtsenthebung von Präsident Jean-Bertrand Aristide. Am 5. Februar übernahm eine Rebellengruppe namens Nationale Revolutionäre Front für die Befreiung und den Wiederaufbau Haitis die Kontrolle über Haitis viertgrößte Stadt, Gonaïves. Bis zum 22. Februar hatten die Rebellen Haitis zweitgrößte Stadt, Cap-Haïtien, erobert und belagerten Ende Februar die Hauptstadt Port-au-Prince. Am Morgen des 29. Februar trat Aristide unter umstrittenen Umständen zurück und wurde von US-Militär- und Sicherheitspersonal aus Haiti ausgeflogen."  #NT!
  
 DOM_1961_revolution.t:0 "Die Ermordung von Rafael Trujillo?"  #NT!
 DOM_1961_revolution.d:0 "Am 30. Mai 1961 wurde Rafael Trujillo von einer Gruppe von Verschwörern unter der Führung von General Antonio Imbert Barrera ermordet. Unmittelbar danach übernahm Trujillos Sohn Ramfis vorübergehend die Kontrolle über das Land und ließ die meisten Verschwörer hinrichten. Im November 1961 wurde die Familie Trujillo vom Titelpräsidenten Joaquín Balaguer ins Exil gedrängt, der Reformen zur Öffnung des Regimes einführte. Der Mord löste einen Bürgerkrieg aus, der mit dem Dominikanischen Bürgerkrieg und einer Intervention der US-OAS endete und sich schließlich 1966 unter einem Mehrparteiensystem stabilisierte."  #NT!
 DOM_1963_revolution.t:0 "Die Wahl von Juan Bosch?"  #NT!
 DOM_1963_revolution.d:0 "Juan Emilio Bosch y Gaviño war ein dominikanischer Politiker, Historiker, Schriftsteller, Essayist, Pädagoge und 1963 für kurze Zeit der erste demokratisch gewählte Präsident der Dominikanischen Republik. Zuvor war er über 25 Jahre lang der Anführer der dominikanischen Opposition im Exil gegen das diktatorische Regime von Rafael Trujillo."  #NT!
  
 GND_1979_revolution.t:0 "Die grenadische Revolution?"  #NT!
 GND_1979_revolution.d:0 "Die Revolutionäre Volksregierung (PRG) wurde am 13. März 1979 ausgerufen, nachdem die marxistisch-leninistische New Jewel Movement die Regierung von Grenada in einer Revolution gestürzt hatte und Grenada zum einzigen sozialistischen Staat innerhalb des Commonwealth machte."  #NT!
 GND_1984_revolution.t:0 "Rückzug aus Grenada?"  #NT!
 GND_1984_revolution.d:0 "Als die US-Truppen im Dezember 1983 aus Grenada abzogen, ernannte Generalgouverneur Scoon einen Interimsbeirat unter dem Vorsitz von Nicholas Brathwaite, um Neuwahlen zu organisieren. Die ersten demokratischen Wahlen seit 1976 fanden im Dezember 1984 statt und wurden von der New National Party unter Herbert Blaize gewonnen, der bis zu seinem Tod im Dezember 1989 Premierminister war."  #NT!
  
 RHO_UDI_1965.t:0 "Einseitige Unabhängigkeitserklärung?"  #NT!
 RHO_UDI_1965.d:0 "Die rhodesische Regierung, die größtenteils aus Mitgliedern der weißen Minderheit des Landes von etwa 5 % bestand, war empört, als inmitten der Dekolonisierungspolitik der britischen Kolonialregierung „Wind of Change“ afrikanische Kolonien im Norden ohne vergleichbare Erfahrung in der Selbstverwaltung in den frühen 1960er Jahren schnell in die Unabhängigkeit aufstiegen, während Rhodesien die Souveränität aufgrund des neu etablierten Prinzips „Keine Unabhängigkeit vor Mehrheitsherrschaft“ verweigert wurde. Rhodesiens einseitige Unabhängigkeitserklärung (UDI) war eine vom Kabinett Rhodesiens am 11. November 1965 angenommene Erklärung, in der bekannt gegeben wurde, dass Südrhodesien oder einfach Rhodesien, ein britisches Territorium im südlichen Afrika, das sich seit 1923 selbst regierte, sich nun als unabhängiger souveräner Staat betrachtete."  #NT!
 RHO_1979_revolution.t:0 "Das Salisbury-Abkommen?"  #NT!
 RHO_1979_revolution.d:0 "Das Interne Abkommen (auch Salisbury-Abkommen genannt) war ein Abkommen, das am 3. März 1978 unterzeichnet wurde. Das Abkommen führte zur Bildung einer Übergangsregierung, in der erstmals Afrikaner in Führungspositionen vertreten waren, und schuf gleichzeitig einen unabhängigen öffentlichen Dienst, eine unabhängige Justiz, eine Polizei und eine Armee. Durch die Einigung wurden auch ein Exekutivrat bestehend aus Ian Smith und drei Schwarzen (Muzorewa, Sithole und Chirau) sowie ein Ministerrat geschaffen, während Smith seinen Titel als Premierminister behielt."  #NT!
 RHO_1980_revolution.t:0 "Ende der weißen Herrschaft in Rhodesien?"  #NT!
 RHO_1980_revolution.d:0 "Am 11. Dezember 1979 stimmte das Rhodesian House of Assembly mit 90 zu null Stimmen für die Rückkehr zum britischen Kolonialstatus. Mit der Ankunft von Christopher Soames, dem neuen Gouverneur, am 12. Dezember 1979 übernahm Großbritannien offiziell die Kontrolle über Simbabwe-Rhodesien als Kolonie Südrhodesien. Großbritannien hob die Sanktionen am 12. Dezember und die Vereinten Nationen am 16. Dezember auf. Bei den Wahlen im Februar 1980 errangen Mugabe und die ZANU-Partei einen Erdrutschsieg. Als Vertreter Großbritanniens gewährte Prinz Charles der neuen Nation Simbabwe im April 1980 bei einer Zeremonie in Harare offiziell die Unabhängigkeit."  #NT!
 ZIM_1987_revolution.t:0 "Die Präsidentenrepublik?"  #NT!
 ZIM_1987_revolution.d:0 "Ende 1987 änderte das simbabwische Parlament die Verfassung. Am 30. Dezember erklärte es Mugabe zum Exekutivpräsidenten, eine neue Position, die die Rollen des Staatsoberhauptes, des Regierungschefs und des Oberbefehlshabers der Streitkräfte vereinte. Diese Position gab ihm die Macht, das Parlament aufzulösen, das Kriegsrecht auszurufen und für eine unbegrenzte Anzahl von Amtszeiten zu kandidieren."  #NT!
 ZIM_1996_revolution.t:0 "Der Aufstieg von Grace Mugabe?"  #NT!
 ZIM_1996_revolution.d:0 "Grace Ntombizodwa Mugabe ist eine simbabwische Unternehmerin, Politikerin und Witwe des verstorbenen Präsidenten Robert Mugabe. Sie fungierte von 1996 bis zum Rücktritt ihres Mannes im November 2017 als First Lady von Simbabwe, eine Woche nachdem er durch den simbabwischen Staatsstreich 2017 von der Macht gestürzt worden war. Sie begann als Sekretärin von Mugabe und stieg in den Reihen der regierenden ZANU-PF-Partei zur Vorsitzenden der Frauenliga und einer Schlüsselfigur der Generation-40-Fraktion auf. Gleichzeitig erlangte sie in einer Zeit wirtschaftlicher Turbulenzen im Land den Ruf ihrer Privilegien und Extravaganz."  #NT!
 ZIM_2017_revolution.t:0 "Der simbabwische Staatsstreich?"  #NT!
 ZIM_2017_revolution.d:0 "Im November 2017 wurde der simbabwische Präsident Robert Mugabe als Präsident und Parteivorsitzender der ZANU-PF abgesetzt und durch Emmerson Mnangagwa ersetzt. Der Aufstand ereignete sich inmitten von Spannungen in der Regierungspartei ZANU-PF zwischen dem ehemaligen Ersten Vizepräsidenten Emmerson Mnangagwa (der vom ZDF unterstützt wurde) und First Lady Grace Mugabe (die von der jüngeren G40-Fraktion unterstützt wurde) darüber, wer die Nachfolge des 93-jährigen Präsidenten Mugabe antreten würde."  #NT!
  
 SAF_1970_revolution.t:0 "Bantustans in Südafrika?"  #NT!
 SAF_1970_revolution.d:0 "Die Regierung von Pretoria gründete zehn Bantustans in Südafrika und zehn im benachbarten Südwestafrika (damals unter südafrikanischer Verwaltung), um die Mitglieder bestimmter ethnischer Gruppen zu konzentrieren und so jedes dieser Gebiete ethnisch homogen zu machen und als Grundlage für die Schaffung autonomer Nationalstaaten für die verschiedenen schwarzen ethnischen Gruppen Südafrikas zu dienen. Gemäß dem Bantu Homelands Citizenship Act von 1970 entzog die Regierung schwarzen Südafrikanern die südafrikanische Staatsbürgerschaft, beraubte sie ihrer wenigen verbliebenen politischen und bürgerlichen Rechte in Südafrika und erklärte sie zu Bürgern dieser Homelands."  #NT!
 SAF_1970_revolution.f:0 "Aufgrund von Einschränkungen der Spiel-Engine können die Bantustans in diesem Mod nicht als separate Länder dargestellt werden."  #NT!
 SAF_1984_revolution.t:0 "Ein Exekutivpräsident?"  #NT!
 SAF_1984_revolution.d:0 "Zu den umstrittensten Bestimmungen der Verfassung von 1983 gehörte die Einrichtung des Dreikammerparlaments, eine gesetzgeberische Regelung, die eine getrennte Vertretung der farbigen und indianischen Rassengruppen im Parlament ermöglichen würde, und die Abschaffung des Amtes des Premierministers zugunsten einer exekutiven Staatspräsidentschaft unter dem regierenden Premierminister P. W. Botha."  #NT!
 SAF_1989_revolution.t:0 "Der Fall von P. W. Botha?"  #NT!
 SAF_1989_revolution.d:0 "Am 18. Januar 1989 erlitt Botha (damals 73 Jahre alt) einen leichten Schlaganfall, der ihn daran hinderte, am 20. Januar 1989 an einem Treffen mit namibischen politischen Führern teilzunehmen. Bothas Platz wurde vom amtierenden Präsidenten J. Christiaan Heunis eingenommen. Am 2. Februar 1989 trat Botha als Vorsitzender der National Party (NP) zurück und erwartete, dass sein Kandidat – Finanzminister Barend du Plessis – seine Nachfolge antreten würde. Stattdessen wählte die parlamentarische Fraktion der NP den Bildungsminister F. W. de Klerk zum Vorsitzenden, der schnell seine Position als Reformist innerhalb der Partei festigte, während die Hardliner Botha unterstützten."  #NT!
 SAF_1994_revolution.t:0 "Das Ende der Apartheid?"  #NT!
 SAF_1994_revolution.d:0 "De Klerk verhandelte mit Mandela über die vollständige Abschaffung der Apartheid und den Übergang zum allgemeinen Wahlrecht. 1993 entschuldigte er sich öffentlich für die schädlichen Auswirkungen der Apartheid. Er beaufsichtigte die nichtrassistischen Wahlen von 1994, bei denen Mandela den Afrikanischen Nationalkongress (ANC) zum Sieg führte."  #NT!
  
 SAF_1954_revolution.t:0 "Premiership von J. G. Strijdom?"  #NT!
 SAF_1954_revolution.d:0 "Johannes Gerhardus Strijdom war ein südafrikanischer Politiker und vom 30. November 1954 bis zu seinem Tod am 24. August 1958 der fünfte Premierminister Südafrikas. Er war ein kompromissloser afrikanischer Nationalist und Mitglied der größten Baasskap-Fraktion (weiße Rassisten) der National Party (NP), die während seiner Herrschaft die Apartheidpolitik der NP und den Bruch mit der Südafrikanischen Union zugunsten einer Republik weiter betonte."  #NT!
 SAF_1958_revolution.t:0 "Premiership von Hendrik Verwoerd?"  #NT!
 SAF_1958_revolution.d:0 "Hendrik Frensch Verwoerd war ein in den Niederlanden geborener südafrikanischer Politiker, Gelehrter für angewandte Psychologie, Philosophie und Soziologie sowie Zeitungsredakteur und ab 1958 Premierminister von Südafrika. Er gilt allgemein als Architekt der Apartheid und wird auch als „Vater der Apartheid“ bezeichnet. Verwoerd spielte als Minister für Ureinwohnerangelegenheiten (1950–1958) und dann als Premierminister (1958–1966) eine bedeutende Rolle bei der sozialen Gestaltung der Apartheid, dem System der institutionalisierten Rassentrennung und weißen Vorherrschaft des Landes, und bei der Umsetzung seiner Richtlinien."  #NT!
 SAF_1966_revolution.t:0 "Die Ermordung von Hendrik Verwoerd?"  #NT!
 SAF_1966_revolution.d:0 "Am 6. September 1966 wurde Verwoerd von Parlamentsberater Dimitri Tsafendas mehrmals erstochen. Er starb kurz darauf und Tsafendas blieb bis zu seinem Tod im Jahr 1999 inhaftiert. Nach Verwoerds Ermordung im Jahr 1966 wurde Vorster von der Nationalen Partei zu seinem Nachfolger gewählt und setzte Verwoerds Umsetzung der Apartheidgesetzgebung fort, einschließlich der Abschaffung der letzten vier Parlamentssitze im Jahr 1968, die weißen Vertretern farbiger (gemischter Abstammung) Wähler vorbehalten waren (realisiert im Jahr 1970)."  #NT!
 SAF_1978_revolution.t:0 "Premierminister von Pieter Willem Botha?"  #NT!
 SAF_1978_revolution.d:0 "Pieter Willem Botha, DMS, war ein südafrikanischer Politiker, der von 1978 bis 1984 der letzte Premierminister Südafrikas und von 1984 bis zu seinem Rücktritt 1989 der erste geschäftsführende Staatspräsident Südafrikas war. Aufgrund seiner harten politischen Haltung erhielt er den Spitznamen „Die Groot Krokodil“ (Afrikaans für „Das große Krokodil“) und galt als der letzte Hardliner Südafrikas während der Apartheid-Ära."  #NT!
  
 ARAB_2011_revolution.t:0 "Der Arabische Frühling?"  #NT!
 ARAB_2011_revolution.d:0 "Der Arabische Frühling war eine Reihe regierungsfeindlicher Proteste, Aufstände und bewaffneter Aufstände, die sich Anfang der 2010er Jahre über weite Teile der arabischen Welt ausbreiteten. Es begann in Tunesien als Reaktion auf Korruption und wirtschaftliche Stagnation. Von Tunesien aus weiteten sich die Proteste dann auf fünf weitere Länder aus: Libyen, Ägypten, Jemen, Syrien und Bahrain. Die Welle der ersten Revolutionen und Proteste ließ Mitte 2012 nach, da viele Demonstrationen des Arabischen Frühlings auf gewalttätige Reaktionen von Behörden, regierungsnahen Milizen, Gegendemonstranten und Militärs stießen."  #NT!
  
 TUR_1950_revolution.t:0 "Die Wahl von Celâl Bayar?"  #NT!
 TUR_1950_revolution.d:0 "Bei den ersten freien Wahlen in der türkischen Geschichte gewannen die Demokraten die Parlamentswahlen 1950 mit einem Stimmenanteil von 53 %. Obwohl Bayar nicht danach strebte, Präsident zu werden, wählte ihn das Parlament am 22. Mai 1950 zum Präsidenten der Türkei. Während Bayars Präsidentschaft verbesserten sich die Beziehungen zum Westblock und nach der Krise in der türkischen Meerenge trat die Türkei 1951[19] dem Koreakrieg und im Februar 1952 der NATO bei. Während der zehnjährigen demokratischen Herrschaft erlebte die türkische Gesellschaft tiefgreifende Veränderungen. Es wurde eine inflationäre Wirtschaftspolitik verfolgt, die private Unternehmen förderte, ohne dass dabei die Rolle des Staates eingeschränkt wurde. Die politische Beteiligung nahm zu, was dazu führte, dass ein großer Kader anatolischer Bürger in die Politik und in die Wirtschaft eintrat. Obwohl der Säkularismus nicht aufgegeben wurde, wurde die explizit säkularistische Politik des Einparteienregimes aufgegeben."  #NT!
 TUR_1960_revolution.t:0 "Der türkische Staatsstreich?"  #NT!
 TUR_1960_revolution.d:0 "Der türkische Staatsstreich von 1960 war der erste Staatsstreich in der Republik Türkei. Er fand am 27. Mai 1960 statt. Der Putsch wurde von einer Gruppe von 38 jungen türkischen Militäroffizieren inszeniert, die außerhalb der militärischen Befehlskette agierten. Einen Monat nach der Hinrichtung von Menderes und anderen Mitgliedern der türkischen Regierung fanden am 15. Oktober 1961 allgemeine Wahlen statt. Die Verwaltungsgewalt wurde an Zivilisten zurückgegeben, aber das Militär dominierte weiterhin die politische Szene bis Oktober 1965."  #NT!
 TUR_1966_revolution.t:0 "Der Aufstieg von Cevdet Sunay?"  #NT!
 TUR_1966_revolution.d:0 "Als Gürsels Präsidentschaft aus gesundheitlichen Gründen gemäß der Verfassung beendet wurde, wurde Cevdet Sunay am 28. März 1966 von der Großen Nationalversammlung der Türkei zum 5. Präsidenten gewählt. Er behielt sein Amt trotz zunehmender terroristischer Aktivitäten, Studentenunruhen und drohender Staatsstreiche. Er verbüßte die verfassungsmäßige Amtszeit von sieben Jahren bis zum 28. März 1973 und wurde dann ständiger Senator."  #NT!
 TUR_1971_revolution.t:0 "Das türkische Militärmemorandum?"  #NT!
 TUR_1971_revolution.d:0 "Das türkische Militärmemorandum von 1971, das am 12. März desselben Jahres herausgegeben wurde, war die zweite Militärintervention in der Republik Türkei, elf Jahre nach der Vorgängerin von 1960. Es ist als „Putsch per Memorandum“ bekannt, den das Militär durchführte, anstatt wie zuvor Panzer zu schicken. Das Ereignis ereignete sich inmitten sich verschärfender innerstaatlicher Konflikte, trug jedoch letztendlich kaum dazu bei, dieses Phänomen zu stoppen."  #NT!
 TUR_1980_revolution.t:0 "Der türkische Staatsstreich?"  #NT!
 TUR_1980_revolution.d:0 "Der türkische Staatsstreich von 1980 unter der Führung des Generalstabschefs General Kenan Evren war der dritte Staatsstreich in der Geschichte der Republik Türkei, nach dem Staatsstreich von 1960 und dem Putsch per Memorandum von 1971. Die nächsten drei Jahre lang regierten die türkischen Streitkräfte das Land durch den Nationalen Sicherheitsrat, bevor mit den türkischen Parlamentswahlen 1983 die Demokratie wiederhergestellt wurde. In dieser Zeit verschärfte sich der türkische Nationalismus des Staates, einschließlich des Verbots der kurdischen Sprache. Die Türkei kehrte 1983 teilweise und 1989 vollständig zur Demokratie zurück."  #NT!
 TUR_1983_revolution.t:0 "Rückkehr zur Demokratie?"  #NT!
 TUR_1983_revolution.d:0 "Am 6. November 1983 fanden in der Türkei Parlamentswahlen statt, die ersten seit 1977, nachdem die demokratischen Rechte nach dem Militärputsch von 1980 aufgegeben worden waren. Der Nationale Sicherheitsrat verbot den bisherigen politischen Parteien die Teilnahme, was zur Gründung neuer Parteien führte. Turgut Özals Mutterlandspartei (ANAP) errang bei dieser Wahl einen bedeutenden Sieg und erhielt 45,14 % der Stimmen."  #NT!
 TUR_2014_revolution.t:0 "Der Aufstieg von Recep Tayyip Erdoğan?"  #NT!
 TUR_2014_revolution.d:0 "2014 wurde Erdoğan der erste direkt gewählte Präsident des Landes. Erdoğans Präsidentschaft war von demokratischen Rückfällen und einem Wandel hin zu einem autoritäreren Regierungsstil geprägt. Seine Wirtschaftspolitik hat zu hohen Inflationsraten und einem Wertverlust der türkischen Lira geführt. Er hat in die anhaltenden Konflikte in Syrien und Libyen eingegriffen, Operationen gegen den Islamischen Staat, die Demokratischen Kräfte Syriens und Assads Truppen gestartet und Drohungen gegen Griechenland ausgesprochen."  #NT!
 TUR_2017_revolution.t:0 "Das türkische Verfassungsreferendum?"  #NT!
 TUR_2017_revolution.d:0 "Am 16. April 2017 fand in der Türkei ein Verfassungsreferendum über die Annahme von 18 Änderungsvorschlägen zur türkischen Verfassung statt, die von der regierenden Partei für Gerechtigkeit und Entwicklung (AKP) und der Partei der Nationalistischen Bewegung (MHP) eingebracht wurden. Als Folge seiner Zustimmung wurde das Amt des Premierministers abgeschafft und das bestehende parlamentarische Regierungssystem durch eine Exekutivpräsidentschaft und ein Präsidialsystem ersetzt. Die Zahl der Sitze im Parlament wurde von 550 auf 600 erhöht, und neben einer Reihe anderer Vorschläge erhielt der Präsident mehr Kontrolle über die Ernennung zum Obersten Richter- und Staatsanwaltschaftsrat (HSYK)."  #NT!
  
 PER_1949_revolution.t:0 "Die Wahl zur verfassungsgebenden Versammlung?"  #NT!
 PER_1949_revolution.d:0 "Der Schah hatte im Rahmen seiner verschiedenen Pläne zur Stärkung der Macht der Monarchie über Änderungen der Verfassung nachgedacht. Der Schah forderte eine verfassungsgebende Versammlung, um Änderungen an der Verfassung vorzunehmen und ihm mehr Macht zu verleihen. Er wählte aus seinen Anhängern die Mitglieder der verfassungsgebenden Versammlung aus. Er verstärkte auch seinen Druck auf die Bildung des iranischen Senats, eines Oberhauses des Parlaments, das 1906 in der Verfassung verankert, aber nie gebildet wurde. Es wurde erwartet, dass der Senat den Schah begünstigen würde. Die Verfassunggebende Versammlung tagte ab dem 21. April 1949 drei Wochen lang. Am 8. Mai 1949 unterzeichneten sie die wichtigste Änderung der Verfassung."  #NT!
 PER_1952_revolution.t:0 "Der Aufstieg von Mohammad Mosaddegh?"  #NT!
 PER_1952_revolution.d:0 "Im Juli 1952 erlangte Mohammad Mosaddegh inmitten von Massenprotesten das Amt des iranischen Ministerpräsidenten zurück und zwang den Schah, ihm Notstandsvollmachten zu gewähren. Diese weitreichenden Befugnisse ermöglichten es Mosaddegh, das Parlament zu umgehen, die Kontrolle zu festigen und die Bemühungen zur Verstaatlichung der Ölindustrie zu intensivieren – was eine dramatische Durchsetzung der Zivilherrschaft gegen den königlichen Einfluss darstellte."  #NT!
 PER_1953_revolution.t:0 "Der iranische Staatsstreich?"  #NT!
 PER_1953_revolution.d:0 "Der iranische Staatsstreich von 1953, im Iran als 28. Mordad-Staatsstreich bekannt, war der von den USA und Großbritannien angestiftete und von der iranischen Armee geführte Sturz des demokratisch gewählten Premierministers Mohammad Mosaddegh zugunsten der Stärkung der monarchischen Herrschaft des Schahs Mohammad Reza Pahlavi am 19. August 1953."  #NT!
 PER_1979_revolution.t:0 "Die iranische Revolution?"  #NT!
 PER_1979_revolution.d:0 "Die iranische Revolution war eine Reihe von Ereignissen, die im Sturz der Pahlavi-Dynastie im Jahr 1979 ihren Höhepunkt fanden. Die Revolution führte auch zur Ersetzung des kaiserlichen Staates Iran durch die heutige Islamische Republik Iran, da die monarchische Regierung von Mohammad Reza Pahlavi durch die theokratische Regierung von Ayatollah Ruhollah Khomeini abgelöst wurde, einem religiösen Geistlichen, der eine der Rebellenfraktionen angeführt hatte."  #NT!
 PER_1989_revolution.t:0 "Der Aufstieg von Ali Khamenei?"  #NT!
 PER_1989_revolution.d:0 "Khamenei war von 1981 bis 1989 der dritte Präsident des Iran und wurde gleichzeitig ein enger Verbündeter des ersten Obersten Führers, Ruhollah Khomeini. Kurz vor seinem Tod hatte Khomeini eine Meinungsverschiedenheit mit dem von ihm gewählten Erben – Hussein Ali Montazeri –, so dass es nach Khomeinis Tod keinen einvernehmlichen Nachfolger gab. Die Expertenversammlung wählte Khamenei am 4. Juni 1989 im Alter von 50 Jahren zum nächsten Obersten Führer. Laut Akbar Hashemi Rafsanjani war Khamenei der Mann, den Khomeini vor seinem Tod zu seinem Nachfolger gewählt hatte."  #NT!
 PER_1998_revolution.t:0 "Die Quds-Truppe erschaffen?"  #NT!
 PER_1998_revolution.d:0 "Die Quds-Truppe ist eine von fünf Abteilungen des Korps der Islamischen Revolutionsgarden (IRGC) des Iran, die auf unkonventionelle Kriegsführung und militärische Geheimdienstoperationen spezialisiert sind. Die für extraterritoriale Operationen zuständige Quds-Truppe unterstützt nichtstaatliche Akteure in vielen Ländern, darunter die Hisbollah, die Hamas, den Palästinensischen Islamischen Dschihad, die Huthi-Bewegung und schiitische Milizen im Irak, in Syrien und Afghanistan."  #NT!
  
 ARG_1955_revolution.t:0 "Revolution Libertadora?"  #NT!
 ARG_1955_revolution.d:0 "Die Revolución Libertadora war der Staatsstreich, der am 16. September 1955 die zweite Amtszeit von Juan Perón als Präsident in Argentinien beendete. Nach der Revolución Libertadora wurden Perón und seine Anhänger des Hochverrats beschuldigt, und Eva Peróns sterbliche Überreste wurden heimlich nach Italien überführt und unter einer falschen Identität auf einem Friedhof in Mailand begraben. Öffentliche Hinweise auf Perón oder seine verstorbene Frau, einschließlich Liedern, Schriften und Bildern, waren verboten."  #NT!
 ARG_1966_revolution.t:0 "Argentinische Revolution?"  #NT!
 ARG_1966_revolution.d:0 "Argentinische Revolution war der Name, den ihre Anführer einem Militärputsch gaben, der im Juni 1966 die argentinische Regierung stürzte und von da an bis 1973 eine Zeit der Militärdiktatur durch eine Junta einleitete. Durch den Putsch im Juni 1966 wurde General Juan Carlos Onganía de facto zum Präsidenten ernannt, unterstützt von mehreren Führern der General Confederation of Labour (CGT), darunter dem Generalsekretär Augusto Vandor. Onganía setzte eine korporatistische Politik um und experimentierte insbesondere in Córdoba unter der Leitung von Carlos Caballero."  #NT!
 ARG_1973_revolution.t:0 "Rückkehr zur Demokratie?"  #NT!
 ARG_1973_revolution.d:0 "Nach mehreren Jahren der Militärherrschaft wurde Alejandro Agustín Lanusse 1971 von der Militärjunta zum Präsidenten ernannt. Unter zunehmendem politischen Druck für die Rückkehr der Demokratie rief Lanusse 1973 Wahlen aus. Perón wurde von der Kandidatur ausgeschlossen, die peronistische Partei durfte jedoch teilnehmen. Inmitten politischer, sozialer und wirtschaftlicher Unruhen traten Cámpora und Vizepräsident Vicente Solano Lima im Juli 1973 zurück und forderten Neuwahlen, diesmal jedoch mit Perón als Kandidaten der Justicialist Party. Perón gewann die Wahl mit seiner Frau Isabel Perón als Vizepräsidentin."  #NT!
 ARG_1976_revolution.t:0 "Argentinischer Staatsstreich?"  #NT!
 ARG_1976_revolution.d:0 "Der argentinische Staatsstreich von 1976, der am 24. März 1976 Isabel Perón als argentinische Präsidentin stürzte, war kein traditioneller rechter Staatsstreich und folgte keiner bestimmten Ideologie. Der Putsch wurde im Rahmen des Condor-Plans geplant und durchgeführt, einem geheimen System der repressiven Koordinierung zwischen lateinamerikanischen Ländern, das von den Vereinigten Staaten als Teil der nationalen Sicherheitsdoktrin gefördert wurde und Diktaturen in Lateinamerika verallgemeinerte, um die Kontrolle über diese Länder während des Kalten Krieges aufrechtzuerhalten."  #NT!
 ARG_1983_revolution.t:0 "Rückkehr zur Demokratie?"  #NT!
 ARG_1983_revolution.d:0 "Die argentinischen Parlamentswahlen von 1983 fanden am 30. Oktober statt und markierten die Rückkehr der verfassungsmäßigen Herrschaft nach der selbsternannten Diktatur des Nationalen Reorganisationsprozesses, die 1976 eingesetzt wurde."  #NT!
 ARG_2023_revolution.t:0 "Die Präsidentschaft von Javier Milei?"  #NT!
 ARG_2023_revolution.d:0 "Javier Gerardo Milei ist ein argentinischer Politiker und Wirtschaftswissenschaftler, der 2023 Präsident Argentiniens wird. Milei ist bekannt für seine extravagante Persönlichkeit, seinen unverwechselbaren persönlichen Stil und seine starke Medienpräsenz. Er wurde politisch als Rechtspopulist und Rechtslibertär beschrieben, der die Laissez-faire-Ökonomie unterstützt und sich insbesondere an minarchistischen und anarchokapitalistischen Prinzipien orientiert."  #NT!
  
 GUY_1964_revolution.t:0 "Der Aufstieg von Forbes Burnham?"  #NT!
 GUY_1964_revolution.d:0 "Als ausgebildeter Anwalt war Burnham maßgeblich an der Gründung zweier politischer Parteien (People's National Congress und People's Progressive Party) beteiligt, die die Politik Guyanas dominieren sollten. Während seiner Zeit als Regierungschef entwickelte sich Guyana von einer britischen Kolonie zu einer Republik ohne verfassungsmäßige Bindung an das Vereinigte Königreich. Seine Amtszeit als Ministerpräsident war geprägt von der Verstaatlichung ausländischer Privatunternehmen, der Mitgliedschaft in der Blockfreien Bewegung und einer autoritären Innenpolitik. Obwohl allgemein davon ausgegangen wird, dass er eine bedeutende Rolle in der politischen, sozialen und wirtschaftlichen Entwicklung Guyanas spielt, war seine Präsidentschaft von Vorwürfen des Afrozentrismus, der staatlich sanktionierten Gewalt, der Korruption und des Wahlbetrugs geprägt."  #NT!
 GUY_1980_revolution.t:0 "Die Genossenschaftsrepublik Guyana?"  #NT!
 GUY_1980_revolution.d:0 "1980 wurde die Verfassung geändert, um das Präsidentenamt zu einem Exekutivposten zu machen; Bis zu diesem Zeitpunkt hatte Arthur Chung das Amt in zeremonieller Funktion als Staatsoberhaupt inne. Burnham gewann in diesem Jahr die Wahl zum Präsidenten und erhielt im offiziellen Ergebnis 76 % der Stimmen gegenüber 20 % für Jagan. Internationale Beobachter protestierten, dass indisch-guyanische Wähler in mehreren Wahllokalen daran gehindert wurden, ihre Stimme abzugeben, und es gab weit verbreitete Vorwürfe des Wahlbetrugs. Dem Exekutivpräsidenten wurde die Befugnis übertragen, das Parlament nach Belieben aufzulösen, ein Veto gegen Gesetze einzulegen und fast alle hochrangigen Regierungsmitglieder zu ernennen oder zu entlassen."  #NT!
 GUY_1985_revolution.t:0 "Der Tod von Forbes Burnham"  #NT!
 GUY_1985_revolution.d:0 "Burnham starb am 6. August 1985 im Alter von 62 Jahren während einer Halsoperation in Georgetown an Herzversagen. Mehrere Quellen deuten darauf hin, dass Forbes in den Jahren vor seinem Tod Herzprobleme hatte und möglicherweise an Diabetes litt. Nach Burnhams Tod wurde Desmond Hoyte Präsident. Auch die Parlamentswahlen in Guyana im Jahr 1985 galten als betrügerisch; Die nächste „freie und faire“ Wahl würde 1992 stattfinden, die erste faire Wahl seit 1964, als Cheddi Jagan zum Präsidenten gewählt wurde."  #NT!
 GUY_1992_revolution.t:0 "Der Sieg von Cheddi Jagan?"  #NT!
 GUY_1992_revolution.d:0 "Nach dem Tod von Burnham im Jahr 1985 kam Desmond Hoyte an die Macht. Unter dem Einfluss von Jimmy Carter schlug Hoyte Wahlreformen vor, die dazu führen würden, dass die Wahlen von 1992 international als frei und fair anerkannt würden. Nach 28 Jahren in der Opposition gewann die PPP die Wahlen am 5. Oktober 1992 mit etwa 54 % der Stimmen, und Jagan wurde Präsident. Entgegen früherer ausländischer Befürchtungen regierte er als demokratischer Sozialist und nicht als Marxist-Leninist. Jagan würde eine Politik verfolgen, um ausländische Investoren anzuziehen und sich einer Politik des freien Marktes zuzuwenden."  #NT!
  
 SUR_1975_revolution.t:0 "Die Premiership von Henck Arron?"  #NT!
 SUR_1975_revolution.d:0 "Henck Alphonsus Eugène Arron war ein surinamischer Politiker, der nach der Unabhängigkeit Surinames im Jahr 1975 als erster Premierminister fungierte. Als Mitglied der Nationalpartei Surinames diente er vom 24. Dezember 1973 bis zum 25. Februar 1980 in der Übergangsregierung. Er wurde in einem Staatsstreich des Militärs unter der Führung von Dési Bouterse gestürzt."  #NT!
 SUR_1980_revolution.t:0 "Der Sergeants-Putsch?"  #NT!
 SUR_1980_revolution.d:0 "Der Staatsstreich in Surinam im Jahr 1980, üblicherweise als Sergeantenputsch (niederländisch: De Sergeantencoup) bezeichnet, war ein Militärputsch in Surinam, der am 25. Februar 1980 stattfand, als eine Gruppe von 16 Sergeanten der surinamischen Streitkräfte (SKM) unter der Führung von Dési Bouterse die Regierung von Premierminister Henck Arron mit einem gewaltsamen Staatsstreich stürzte. Dies war der Beginn der Militärdiktatur, die das Land von 1980 bis 1991 beherrschte."  #NT!
 SUR_1987_revolution.t:0 "Das Tauwetter in Surinam?"  #NT!
 SUR_1987_revolution.d:0 "Später im Jahr 1985 hob die Regierung das Verbot von Oppositionsparteien auf und leitete den Übergang zur Zivilherrschaft ein. In einem Referendum am 30. September 1987 wurde eine neue Verfassung mit überwältigender Mehrheit angenommen. Zwei Monate später fanden Wahlen statt, und Ramsewak Shankar, ein Gegner von Bouterse, wurde im Januar 1988 zum Präsidenten gewählt. Bouterse behielt jedoch als Armeekommandant große Macht. Er vereitelte eine Reihe von Regierungsbemühungen, mit dem Dschungelkommando zu verhandeln, und eine Reihe von Bouterses Gegnern wurden ermordet oder verschwanden."  #NT!
 SUR_1991_revolution.t:0 "Der surinamischen Übergang zur Demokratie?"  #NT!
 SUR_1991_revolution.d:0 "1987 fanden nationale Wahlen statt. Die Nationalversammlung verabschiedete eine neue Verfassung, die es Bouterse ermöglichte, weiterhin die Führung der Armee zu übernehmen. Bouterse war mit der Regierung unzufrieden und entließ die Minister 1990 per Telefon. Dieses Ereignis wurde im Volksmund als „Telefonputsch“ bekannt. Nach den Wahlen von 1991 begann seine Macht zu schwinden."  #NT!
  
 BRZ_1954_revolution.t:0 "Der Selbstmord von Getúlio Vargas?"  #NT!
 BRZ_1954_revolution.d:0 "Vargas‘ politische Gegner lösten eine Krise aus, die in der Ermordung eines Luftwaffenoffiziers, Major Rubens Vaz, gipfelte, der bei einem Attentat auf der Straße vor der Rua Tonelero 180, dem Zuhause von Vargas‘ Hauptgegner, Verlagsmanager und Politiker Carlos Lacerda, getötet wurde. Leutnant Gregório Fortunato, Chef der persönlichen Wache von Vargas, mit dem Spitznamen „Schwarzer Engel“, war in das Verbrechen verwickelt. Dies löste beim Militär Wut gegen Vargas aus, und Generäle forderten seinen Rücktritt. Vargas konnte die Situation nicht bewältigen und schoss sich am 24. August 1954 in seinem Schlafzimmer im dritten Stock seiner offiziellen Residenz im Catete Palace mit einem Revolver in die Brust."  #NT!
 BRZ_1964_revolution.t:0 "Die Fünfte Brasilianische Republik?"  #NT!
 BRZ_1964_revolution.d:0 "Die Militärdiktatur in Brasilien, gelegentlich auch als Fünfte Brasilianische Republik bezeichnet, wurde am 1. April 1964 nach einem Staatsstreich der brasilianischen Streitkräfte mit Unterstützung der US-Regierung gegen Präsident João Goulart errichtet. Der Putsch wurde von den höchsten Kommandeuren der brasilianischen Armee geplant und durchgeführt und erhielt die Unterstützung fast aller hochrangigen Militärangehörigen sowie konservativer Teile der Gesellschaft wie der katholischen Kirche und antikommunistischer Zivilbewegungen in der brasilianischen Mittel- und Oberschicht."  #NT!
 BRZ_1985_revolution.t:0 "Wiederherstellung der Demokratie?"  #NT!
 BRZ_1985_revolution.d:0 "Der Verschleiß jahrelanger diktatorischer Macht, die die Unterdrückung auch nach der Niederlage der linken Guerillas nicht gebremst hatte. Die Unfähigkeit, mit den Wirtschaftskrisen der damaligen Zeit umzugehen, und der Druck der Bevölkerung machten eine Öffnungspolitik unvermeidlich, die auf Seiten des Regimes von den Generälen Ernesto Geisel und Golbery do Couto e Silva angeführt wurde. Mit der Verabschiedung des Amnestiegesetzes im Jahr 1979 begann in Brasilien eine langsame Rückkehr zur Demokratie, die in den 1980er Jahren abgeschlossen wurde."  #NT!
 BRZ_1993_revolution.t:0 "Brasilianisches Verfassungsreferendum"  #NT!
 BRZ_1993_revolution.d:0 "Am 21. April 1993 fand in Brasilien ein Verfassungsreferendum statt, um die Regierungsform des Landes festzulegen. Nach der erneuten Demokratisierung Brasiliens wurde in einem Artikel der neuen Verfassung die Abhaltung eines Referendums für die Wähler festgelegt, um zu entscheiden, ob das Land eine Republik bleiben oder wieder eine Monarchie werden sollte und ob das Regierungssystem präsidial oder parlamentarisch sein sollte."  #NT!
 BRZ_2016_revolution.t:0 "Die Amtsenthebung von Dilma Rousseff?"  #NT!
 BRZ_2016_revolution.d:0 "Am 31. August 2016 entließ der Senat Präsidentin Rousseff mit 61 zu 20 Stimmen aus dem Amt und befand sie für schuldig, gegen die brasilianischen Haushaltsgesetze verstoßen zu haben. Sie erhielt jedoch nicht genügend Stimmen vom Senat, um von ihren politischen Rechten ausgeschlossen zu werden. Demnach wurde Temer als 37. Präsident Brasiliens vereidigt."  #NT!
 BRZ_2023_revolution.t:0 "Der Angriff auf den brasilianischen Kongress"  #NT!
 BRZ_2023_revolution.d:0 "Am 8. Januar 2023, nach der Niederlage des damaligen Präsidenten Jair Bolsonaro bei den brasilianischen Parlamentswahlen 2022 und der Amtseinführung seines Nachfolgers Luis Inácio Lula da Silva, griff ein Mob von Bolsonaros Anhängern die Gebäude der brasilianischen Bundesregierung in der Hauptstadt Brasília an. Der Mob drang in das Oberste Bundesgericht, das Gebäude des Nationalkongresses und den Präsidentenpalast Planalto an der Praça dos Três Poderes ein und richtete dort vorsätzliche Schäden an. Ziel war es, den demokratisch gewählten Präsidenten Lula, der am 1. Januar in sein Amt eingeführt worden war, gewaltsam zu stürzen."  #NT!
  
 BRZ_1993_revolution.option.1:0 "Erstellen Sie eine Präsidentenrepublik"  #NT!
 BRZ_1993_revolution.option.2:0 "Schaffen Sie eine Parlamentarische Republik"  #NT!
 BRZ_1993_revolution.option.3:0 "Schaffen Sie eine konstitutionelle Monarchie"  #NT!
  
 BOL_1985_revolution.t:0 "Präsidentschaft von Víctor Paz Estenssoro?"  #NT!
 BOL_1985_revolution.d:0 "Am 14. Juli 1985 fanden in Bolivien Parlamentswahlen statt. Da kein Präsidentschaftskandidat mehr als 50 % der Stimmen erhielt, musste der Nationalkongress am 4. August einen Präsidenten wählen. Obwohl Hugo Banzer von der Nationalist Democratic Action (ADN) die meisten Stimmen erhielt, wählte der Kongress Víctor Paz Estenssoro von der Revolutionary Nationalist Movement (MNR)."  #NT!
  
 CLM_1953_revolution.t:0 "Kolumbianischer Staatsstreich?"  #NT!
 CLM_1953_revolution.d:0 "Rojas Pinilla erlangte als Oberst während La Violencia, der Zeit des Bürgerkriegs in Kolumbien in den späten 1940er und frühen 1950er Jahren, in der es zu Machtkämpfen zwischen den regierenden Konservativen und liberalen Guerillas kam, Bekanntheit und wurde in das Kabinett des konservativen Präsidenten Mariano Ospina Pérez berufen. 1953 führte er einen erfolgreichen Staatsstreich gegen Ospinas Nachfolger als Präsident, den rechtsextremen Laureano Gómez Castro, durch und verhängte das Kriegsrecht. Um die politische Gewalt einzudämmen, regierte er das Land als Militärdiktatur, verbündete sich mit Gewerkschaftern, implementierte Infrastrukturprogramme und weitete das Frauenwahlrecht aus."  #NT!
 CLM_1958_revolution.t:0 "Wiederherstellung der Demokratie?"  #NT!
 CLM_1958_revolution.d:0 "Nach Rojas‘ Absetzung einigten sich die Kolumbianische Konservative Partei und die Kolumbianische Liberale Partei darauf, die Nationale Front zu gründen, eine Koalition, die das Land gemeinsam regieren sollte. Im Rahmen des Abkommens würde die Präsidentschaft 16 Jahre lang alle vier Jahre zwischen Konservativen und Liberalen wechseln; In allen anderen Wahlämtern wären die beiden Parteien gleichberechtigt. Der Front National beendete die „La Violencia“ und die Regierungen des Front National versuchten, in Zusammenarbeit mit der Allianz für den Fortschritt weitreichende soziale und wirtschaftliche Reformen einzuleiten."  #NT!
  
 CHL_1973_revolution.t:0 "Chilenischer Staatsstreich?"  #NT!
 CHL_1973_revolution.d:0 "Der chilenische Staatsstreich von 1973 war ein militärischer Sturz der Regierung der Volkseinheit in Chile unter der Führung des demokratischen Sozialisten Salvador Allende als Präsident Chiles. Allende, der als erster Marxist beschrieben wurde, der in einer lateinamerikanischen liberalen Demokratie demokratisch zum Präsidenten gewählt wurde, war mit erheblichen sozialen Unruhen, politischen Spannungen mit dem von der Opposition kontrollierten Nationalkongress Chiles und einem von US-Präsident Richard Nixon angeordneten Wirtschaftskrieg konfrontiert. Am 11. September 1973 ergriff eine Gruppe von Militäroffizieren unter der Führung von General Augusto Pinochet durch einen Putsch die Macht und beendete die Zivilherrschaft."  #NT!
 CHL_1990_revolution.t:0 "Rückkehr zur Demokratie?"  #NT!
 CHL_1990_revolution.d:0 "In den späten 1980er Jahren erlaubte die Regierung, vor allem aufgrund von Ereignissen wie dem wirtschaftlichen Zusammenbruch von 1982 und dem massenhaften zivilen Widerstand in den Jahren 1983–88, nach und nach eine größere Versammlungs-, Meinungs- und Vereinigungsfreiheit, einschließlich gewerkschaftlicher und politischer Aktivitäten. In einer Volksabstimmung am 5. Oktober 1988 wurde Pinochet eine zweite achtjährige Amtszeit als Präsident verweigert (56 % gegenüber 44 %). Am 14. Dezember 1989 wählten die Chilenen einen neuen Präsidenten und die Mehrheit der Mitglieder eines Zweikammerkongresses. Präsident Aylwin war von 1990 bis 1994 im Amt, was als Übergangszeit galt."  #NT!
  
 ECU_1972_revolution.t:0 "Ecuadorianischer Staatsstreich?"  #NT!
 ECU_1972_revolution.d:0 "1972 stürzte eine „revolutionäre und nationalistische“ Militärjunta die Regierung von Velasco Ibarra. Der Staatsstreich wurde von General Guillermo Rodríguez angeführt und vom Marinekommandanten Jorge Queirolo G. durchgeführt. Der neue Präsident verbannte José María Velasco nach Argentinien. Er blieb bis 1976 an der Macht, als er von einer anderen Militärregierung abgesetzt wurde."  #NT!
 ECU_1979_revolution.t:0 "Die Rückkehr der Demokratie?"  #NT!
 ECU_1979_revolution.d:0 "In Ecuador fanden 1978 und 1979 allgemeine Wahlen statt. Der erste Wahlgang der Präsidentschaftswahlen fand am 16. Juli 1978 statt, ein zweiter Wahlgang parallel zu den Parlamentswahlen am 29. April 1979. Die Präsidentschaftswahl wurde von Jaime Roldós Aguilera von der Concentration of People's Forces (CPF) gewonnen, der in der Stichwahl 68,5 % der Stimmen erhielt und damit die erste des Landes wurde frei gewählter Präsident."  #NT!
  
 PRG_1954_revolution.t:0 "Paraguayischer Staatsstreich?"  #NT!
 PRG_1954_revolution.d:0 "Der paraguayische Staatsstreich 1954 fand im Mai 1954 statt. Er wurde von Alfredo Stroessner mit Unterstützung von Epifanio Méndez Fleitas angeführt und führte zum Sturz der Regierung von Federico Chávez. Der Putsch war der Höhepunkt einer komplexen Reihe politischer Rivalitäten innerhalb der regierenden Colorado-Partei. Ungefähr 25 Menschen wurden während des Putsches getötet, was dazu beitrug, die Voraussetzungen für die Wahl von Stroessner zum Präsidenten Paraguays später in diesem Jahr zu schaffen."  #NT!
 PRG_1989_revolution.t:0 "Die Rückkehr der Demokratie?"  #NT!
 PRG_1989_revolution.d:0 "Der paraguayische Staatsstreich 1989 fand am 2. und 3. Februar 1989 in Asunción, Paraguay, unter der Führung von General Andrés Rodríguez gegen das Regime des langjährigen Führers Alfredo Stroessner statt. Auslöser des blutigen Umsturzes, bei dem zahlreiche Soldaten bei Straßenkämpfen getötet wurden, war ein Machtkampf in den höchsten Rängen der Regierung. Die Machtübernahme durch Rodríguez bedeutete das Ende von El Stronato, Stroessners 34-jähriger Herrschaft, die damals die längste in Lateinamerika war, und führte zu einer Reihe von Reformen, die zahlreiche drakonische Gesetze abschafften und zur Liberalisierung Paraguays führten."  #NT!
  
 VNZ_1948_revolution.t:0 "Venezolanischer Staatsstreich?"  #NT!
 VNZ_1948_revolution.d:0 "Der venezolanische Staatsstreich 1948 fand am 24. November 1948 statt, als Carlos Delgado Chalbaud, Marcos Pérez Jiménez und Luis Felipe Llovera Páez den gewählten Präsidenten Rómulo Gallegos stürzten, der bei den venezolanischen Parlamentswahlen 1947 (die allgemein als die ersten ehrlichen Wahlen des Landes gelten) gewählt worden war und im Februar 1948 sein Amt angetreten hatte."  #NT!
 VNZ_1950_revolution.t:0 "Die Ermordung von Carlos Delgado Chalbaud?"  #NT!
 VNZ_1950_revolution.d:0 "Chalbaud wurde am 13. November 1950 von einer Gruppe unter der Führung von Rafael Simón Urbina und seinem Neffen Domingo Urbina entführt und ermordet. Die Entführung fand in Caracas zwischen den Vierteln Country Club und Chapellin statt und seine Ermordung fand im halb verlassenen Viertel Las Mercedes statt. Sein Mord scheint das unbeabsichtigte Ergebnis einer gescheiterten Entführung unter der Führung von Simón Urbina zu sein, der die Präsidentschaft von Chalbaud stürzen wollte."  #NT!
 VNZ_1958_revolution.t:0 "Venezolanische Rückkehr zur Demokratie?"  #NT!
 VNZ_1958_revolution.d:0 "Der venezolanische Staatsstreich 1958 fand am 23. Januar 1958 statt, als der Diktator Marcos Pérez Jiménez gestürzt wurde. Eine Übergangsregierung unter zunächst Admiral Wolfgang Larrazábal und dann Edgar Sanabria wurde eingesetzt, bis bei den Wahlen im Dezember 1958 der Kandidat der Demokratischen Aktion, Rómulo Betancourt, gewählt wurde und am 13. Februar 1959 sein Amt antrat."  #NT!
 VNZ_1999_revolution.t:0 "Die Bolivarische Revolution?"  #NT!
 VNZ_1999_revolution.d:0 "Ein Vertrauensverlust in die bestehenden Parteien führte dazu, dass Hugo Chávez 1998 zum Präsidenten gewählt wurde und anschließend eine „bolivarische Revolution“ begann, die mit einer verfassungsgebenden Versammlung im Jahr 1999 begann, die eine neue Verfassung Venezuelas ausarbeiten sollte. Die „Bolivarianische Revolution“ zielte darauf ab, eine Massenbewegung zur Umsetzung des Bolivarismus – Volksdemokratie, wirtschaftliche Unabhängigkeit, gerechte Verteilung der Einnahmen und ein Ende der politischen Korruption – in Venezuela aufzubauen."  #NT!
 VNZ_2013_revolution.t:0 "Die Präsidentschaft von Nicolás Maduro?"  #NT!
 VNZ_2013_revolution.d:0 "Maduro begann sein Berufsleben als Busfahrer und stieg zu einem Gewerkschaftsführer auf, bevor er im Jahr 2000 in die Nationalversammlung gewählt wurde. Er wurde in verschiedene Positionen unter Präsident Hugo Chávez berufen, war von 2005 bis 2006 Präsident der Nationalversammlung, von 2006 bis 2012 Außenminister und von 2012 bis 2013 unter Chávez Vizepräsident. Nachdem Chávez‘ Tod am 5. März 2013 bekannt gegeben wurde, übernahm Maduro die Präsidentschaft."  #NT!
  
 GUA_1954_revolution.t:0 "Der Putsch von Carlos Castillo Armas?"  #NT!
 GUA_1954_revolution.d:0 "Der guatemaltekische Staatsstreich von 1954 stürzte den demokratisch gewählten guatemaltekischen Präsidenten Jacobo Árbenz und markierte das Ende der guatemaltekischen Revolution. Durch den Putsch wurde die Militärdiktatur von Carlos Castillo Armas errichtet, der erste einer Reihe von von den USA unterstützten autoritären Herrschern in Guatemala. Der Putsch war größtenteils das Ergebnis einer verdeckten CIA-Operation mit dem Codenamen PBSuccess."  #NT!
 GUA_1957_revolution.t:0 "Die Ermordung von Carlos Castillo Armas?"  #NT!
 GUA_1957_revolution.d:0 "Castillo Armas regierte bis zum 26. Juli 1957, als er von Romeo Vásquez, einem Mitglied seiner persönlichen Garde, ermordet wurde. Nach der darauffolgenden manipulierten Wahl übernahm General Miguel Ydígoras Fuentes die Macht. Er wird dafür gefeiert, dass er den mexikanischen Präsidenten zu einem Gentleman-Duell auf der Brücke an der Südgrenze herausgefordert hat, um eine Fehde über die illegale Fischerei mexikanischer Boote an der Pazifikküste Guatemalas zu beenden, von denen zwei von der guatemaltekischen Luftwaffe versenkt wurden."  #NT!
 GUA_1982_revolution.t:0 "Der Putsch von Efraín Ríos Montt?"  #NT!
 GUA_1982_revolution.d:0 "Unzufriedenheit mit der Herrschaft von General Romeo Lucas García, die sich verschlechternde Sicherheitslage in Guatemala und Vorwürfe des Wahlbetrugs führten 1982 zu einem Staatsstreich einer Gruppe junger Militäroffiziere, die Ríos Montt als Chef einer Regierungsjunta einsetzten. Ríos Montt regierte weniger als siebzehn Monate lang als Militärdiktator, bevor ihn sein Verteidigungsminister, General Óscar Mejía Victores, in einem weiteren Putsch stürzte."  #NT!
 GUA_1986_revolution.t:0 "Die Rückkehr der Demokratie?"  #NT!
 GUA_1986_revolution.d:0 "In der ersten Runde der Präsidentschaftswahlen 1985 am 3. November belegte Cerezo mit 38,6 % der Stimmen den ersten Platz. Im zweiten Wahlgang am 8. Dezember besiegte er Jorge Carpio mit 68,4 % der Stimmen. Die DCG erlangte 51 der 100 Sitze im Kongress und eine Mehrheit in vielen Kommunen im ganzen Land. Er war der erste demokratisch gewählte Präsident und Zivilist, der seit 1966 sein Amt antrat."  #NT!
  
 HON_1957_revolution.t:0 "Die Wahl von Ramón Villeda Morales?"  #NT!
 HON_1957_revolution.d:0 "Ramón Villeda Morales war ein Liberaler, der die Demokratisierung Honduras nach einer langen Zeit der Militärherrschaft unterstützte. Er war der Kandidat der Liberalen Partei bei den Präsidentschaftswahlen 1954, der ersten freien Wahl seit über zwei Jahrzehnten, und gewann eine Mehrheit gegenüber einer gespaltenen Nationalpartei, verfehlte jedoch die Mehrheit."  #NT!
 HON_1963_revolution.t:0 "Der Putsch von Oswaldo López?"  #NT!
 HON_1963_revolution.d:0 "Der honduranische Staatsstreich von 1963 war eine militärische Machtübernahme der honduranischen Regierung am 3. Oktober 1963, zehn Tage vor einer geplanten Wahl. Oswaldo López Arellano löste Ramón Villeda Morales als Präsident ab und leitete eine zwei Jahrzehnte lange Militärherrschaft ein."  #NT!
 HON_1975_revolution.t:0 "Der Sturz von Oswaldo López?"  #NT!
 HON_1975_revolution.d:0 "Der honduranische Staatsstreich 1975 fand am 22. April 1975 statt, wobei Oswaldo López Arellano durch einen Militärputsch unter der Führung seines Generalkollegen Juan Alberto Melgar Castro gestürzt wurde. Der Putsch wurde teilweise durch den „Bananagate“-Skandal ausgelöst, der 1975 von der US-Börsenaufsichtsbehörde Securities and Exchange Commission aufgedeckt wurde. Dabei stimmte die United Brands Company zu, Präsident López mit 1,25 Millionen US-Dollar zu bestechen, und versprach weitere 1,25 Millionen US-Dollar bei der Senkung bestimmter Bananenexportsteuern."  #NT!
 HON_1982_revolution.t:0 "Die Rückkehr der Demokratie?"  #NT!
 HON_1982_revolution.d:0 "1979 kehrte das Land zur Zivilherrschaft zurück. Im April 1980 wurde eine verfassungsgebende Versammlung gewählt, um eine neue Verfassung zu verfassen, und im November 1981 fanden allgemeine Wahlen statt. Die Verfassung wurde 1982 angenommen und die PLH-Regierung von Roberto Suazo gewann die Wahl mit dem Versprechen, ein ehrgeiziges Programm zur wirtschaftlichen und sozialen Entwicklung durchzuführen, um die Rezession, in der sich Honduras befand, zu bewältigen."  #NT!
  
 PNM_1968_revolution.t:0 "Der Putsch von Omar Torrijos?"  #NT!
 PNM_1968_revolution.d:0 "Omar Efraín Torrijos Herrera war ein panamaischer Diktator sowie von 1968 bis zu seinem Tod im Jahr 1981 Kommandeur der panamaischen Nationalgarde und Militärführer von Panama. Torrijos war nie offiziell Präsident von Panama, sondern trug Titel wie „Maximaler Führer der panamaischen Revolution“. Torrijos übernahm die Macht durch einen Staatsstreich und führte eine Reihe sozialer Reformen durch."  #NT!
 PNM_1981_revolution.t:0 "Der Tod von Omar Torrijos?"  #NT!
 PNM_1981_revolution.d:0 "Torrijos starb im Alter von 52 Jahren, als sein Flugzeug, eine de Havilland Canada DHC-6 Twin Otter der panamaischen Luftwaffe, am 31. Juli 1981 am Cerro Marta in Coclesito in der Nähe von Penonomé, Panama, abstürzte. Das Flugzeug verschwand bei leichtem Wetter vom Radar, aber aufgrund der damals begrenzten Radarabdeckung Panamas wurde das Flugzeug fast einen Tag lang nicht als vermisst gemeldet. Die Absturzstelle wurde einige Tage später lokalisiert und die Leiche von Torrijos wurde in den ersten Augusttagen von einem Spezialeinheitsteam geborgen."  #NT!
 PNM_1983_revolution.t:0 "Der Aufstieg von Manuel Noriega?"  #NT!
 PNM_1983_revolution.d:0 "Manuel Antonio Noriega Moreno war ein panamaischer Diktator und Militäroffizier, der von 1983 bis 1989 de facto der Herrscher von Panama war. Er fungierte nie offiziell als Präsident von Panama, sondern regierte stattdessen als nicht gewählter Militärdiktator durch Marionettenpräsidenten. Noriega häufte durch Drogenhandelsoperationen des panamaischen Militärs ein persönliches Vermögen an und unterhielt langjährige Verbindungen zu amerikanischen Geheimdiensten, bevor ihn die US-Invasion in Panama von der Macht entfernte."  #NT!
 PNM_1989_revolution.t:0 "Die Rückkehr der Demokratie in Panama?"  #NT!
 PNM_1989_revolution.d:0 "Die Vereinigten Staaten marschierten am 20. Dezember 1989 unter dem Codenamen „Operation Just Cause“ in Panama ein. Noriega wurde gefangen genommen und nach Miami geflogen, um dort vor Gericht gestellt zu werden. Der Konflikt endete am 31. Januar 1990. Das Wahlgericht von Panama bemühte sich schnell um die Wiederherstellung einer verfassungsmäßigen Zivilregierung, stellte am 27. Dezember 1989 die Ergebnisse der Wahlen vom Mai 1989 wieder her und bestätigte den Sieg von Präsident Guillermo Endara und den Vizepräsidenten Guillermo Ford und Ricardo Arias Calderón."  #NT!
  
 MEX_2000_revolution.t:0 "Ende der PRI-Dominanz?"  #NT!
 MEX_2000_revolution.d:0 "Die Präsidentschaftswahl wurde von Vicente Fox von der Alliance for Change gewonnen, der 43,4 % der Stimmen erhielt, das erste Mal seit der mexikanischen Revolution, dass die Opposition eine Wahl gewann. Bei den Kongresswahlen ging die Alliance for Change mit 224 der 500 Sitze als größte Fraktion in der Abgeordnetenkammer hervor, während die Institutional Revolutionary Party mit 60 der 128 Sitze im Senat die größte Fraktion im Senat blieb."  #NT!
  
 PEU_1963_revolution.t:0 "Wahl von Fernando Belaúnde?"  #NT!
 PEU_1963_revolution.d:0 "Belaúnde kandidierte bei den Parlamentswahlen 1962 für das Präsidentenamt, diesmal mit seiner eigenen Partei, Acción Popular. Die Ergebnisse waren sehr knapp, er landete mit weniger als 14.000 Stimmen auf dem zweiten Platz, hinter Víctor Raúl Haya de la Torre (APRA). Da es keinem der Kandidaten gelang, das in der Verfassung festgelegte Minimum von einem Drittel der Stimmen zu erhalten, das für den Gesamtsieg erforderlich ist, würde die Auswahl des Präsidenten dem Kongress obliegen. Die seit langem bestehende antagonistische Beziehung zwischen dem Militär und der APRA veranlasste Haya de la Torre, einen Deal mit dem ehemaligen Diktator Odría zu schließen, der den dritten Platz belegt hatte, was dazu führen würde, dass Odría in einer Koalitionsregierung die Präsidentschaft übernimmt. Weit verbreitete Betrugsvorwürfe veranlassten das peruanische Militär jedoch dazu, Prado abzusetzen und eine Militärjunta unter der Führung von Ricardo Pérez Godoy einzusetzen. Pérez Godoy leitete eine kurze Übergangsregierung und hielt 1963 Neuwahlen ab, die Belaúnde mit einem komfortableren, aber immer noch knappen Vorsprung von fünf Prozent gewann."  #NT!
 PEU_1968_revolution.t:0 "Peruanischer Staatsstreich?"  #NT!
 PEU_1968_revolution.d:0 "Der peruanische Staatsstreich von 1968 fand während der ersten Präsidentschaft von Fernando Belaúnde (1963–1968) statt. Politische Streitigkeiten wurden zur Norm, es kam zu ernsthaften Auseinandersetzungen zwischen Präsident Belaúnde und dem Kongress, der von der Koalition APRA-UNO (Unión Nacional Odríista) dominiert wurde, und sogar Zusammenstöße zwischen dem Präsidenten und seiner eigenen Partei Acción Popular (Volksaktion) waren an der Tagesordnung. Nach dem Staatsstreich wurde Belaúnde um 7 Uhr morgens in eine Kaserne gebracht und gewaltsam zum internationalen Flughafen Jorge Chavez in Callao, Peru, gebracht. Nachdem Velasco die Autorität übernommen hatte, ordnete er sofort die Deportation von Belaúnde an."  #NT!
 PEU_1975_revolution.t:0 "Peruanischer Staatsstreich?"  #NT!
 PEU_1975_revolution.d:0 "Wirtschaftliche Schwierigkeiten wie Inflation, Arbeitslosigkeit, Nahrungsmittelknappheit und zunehmender politischer Widerstand nach dem Vorgehen gegen die Presse im Jahr 1974 erhöhten letztendlich den Druck auf die Velasco-Regierung und führten zu ihrem Sturz. Am 29. August 1975 initiierten mehrere prominente Militärkommandeure einen Putsch. Anschließend wurde Premierminister Francisco Morales Bermúdez durch einstimmigen Beschluss der neuen Militärjunta zum Präsidenten ernannt."  #NT!
 PEU_1980_revolution.t:0 "Rückkehr zur Demokratie?"  #NT!
 PEU_1980_revolution.d:0 "Gegen Ende der Amtszeit von Morales Bermúdez kam es zu einer Immobilienkrise, die das verlorene Jahrzehnt einläutete. Morales Bermúdez, der von allen Seiten politisch unter Druck gesetzt wurde, scheiterte bei der Umsetzung erfolgreicher politischer und wirtschaftlicher Reformen. 1978 wurde eine von der Regierung Morales Bermudez einberufene Verfassunggebende Versammlung gegründet, die die Verfassung von 1933 ersetzte, die während der Präsidentschaft von Óscar R. Benavides erlassen wurde. Nach den Wahlen im Jahr 1980 gab er die Macht an die erste demokratisch gewählte Regierung nach zwölf Jahren Militärherrschaft unter Präsident Fernando Belaúnde zurück."  #NT!
 PEU_1990_revolution.t:0 "Präsidentschaft von Alberto Fujimori?"  #NT!
 PEU_1990_revolution.d:0 "Fujimori gewann die Präsidentschaftswahl 1990 als unbedeutender Kandidat unter dem Banner von Cambio 90 und besiegte Vargas Llosa in einer überraschenden Überraschung. Er nutzte die tiefe Unzufriedenheit mit dem scheidenden Präsidenten Alan García und der Partei American Popular Revolutionary Alliance (APRA). Er änderte die Verfassung und fungierte als Aushängeschild des Präsidenten unter Montesinos und den peruanischen Streitkräften. Berichten zufolge verabschiedete er den Plan Verde – einen Plan, der den Völkermord an verarmten und indigenen Peruanern, die Kontrolle oder Zensur der Medien im Land und die Errichtung einer neoliberalen Wirtschaft unter der Kontrolle einer Militärjunta vorsah."  #NT!
 PEU_2000_revolution.t:0 "Der Fall von Alberto Fujimori?"  #NT!
 PEU_2000_revolution.d:0 "Ein Korruptionsskandal um Vladimiro Montesinos brach aus und brach am Abend des 14. September 2000 mit voller Wucht aus, als der Kabelfernsehsender Canal N Aufnahmen von Montesinos ausstrahlte, der offenbar den oppositionellen Kongressabgeordneten Alberto Kouri bestoch, weil er zur Partei Peru 2000 von Fujimori übergelaufen war. Fujimoris Unterstützung brach praktisch zusammen, und einige Tage später kündigte er in einer landesweiten Ansprache an, dass er die SIN schließen und Neuwahlen ausrufen werde, bei denen er nicht kandidieren werde. Am 10. November erhielt Fujimori vom Kongress die Genehmigung, am 8. April 2001 Wahlen abzuhalten. Am 13. November verließ Fujimori Peru zu einem Besuch in Brunei, um am Forum für wirtschaftliche Zusammenarbeit im Asien-Pazifik-Raum teilzunehmen. Am 17. November reiste Fujimori von Brunei nach Tokio, wo er per Fax seinen Rücktritt als Präsident einreichte. Der Kongress lehnte es ab, seinen Rücktritt anzunehmen, und stimmte stattdessen mit 62 zu 9 Stimmen dafür, Fujimori aus dem Amt zu entfernen."  #NT!
 PEU_2022_revolution.t:0 "Der peruanische Selbstputschversuch?"  #NT!
 PEU_2022_revolution.d:0 "Am 7. Dezember 2022 unternahm Pedro Castillo, der damalige Präsident Perus, einen Versuch, den Kongress illegal aufzulösen, während ein Absetzungsverfahren drohte. Dieser Schritt beinhaltete die sofortige Verhängung einer Ausgangssperre, den Versuch, eine Notstandsregierung zu bilden, und den Aufruf zur Bildung einer verfassungsgebenden Versammlung."  #NT!
  
 URU_1973_revolution.t:0 "Die bürgerlich-militärische Diktatur Uruguays?"  #NT!
 URU_1973_revolution.d:0 "Die zivil-militärische Diktatur Uruguays (1973–85), auch als uruguayische Diktatur bekannt, war eine autoritäre Militärdiktatur, die Uruguay zwölf Jahre lang regierte, vom 27. Juni 1973 (nach dem Staatsstreich von 1973) bis zum 1. März 1985. Die Diktatur war Gegenstand vieler Kontroversen aufgrund ihrer Menschenrechtsverletzungen, der Anwendung von Folter, und das ungeklärte Verschwinden vieler Uruguayer."  #NT!
 URU_1985_revolution.t:0 "Die Rückkehr zur Demokratie?"  #NT!
 URU_1985_revolution.d:0 "1984 kam es zu Streiks gegen das Regime und zur Unterstützung politischer Gefangener. Am 13. Januar 1984 wurde der erste 24-Stunden-Generalstreik seit 1973 organisiert. Die Gespräche zwischen militärischer Führung und zivilen Politikern wurden intensiviert, obwohl mehrere politische Führer immer noch bemerkenswert waren, wie beispielsweise Wilson Ferreira Aldunate. Am 3. August 1984 wurde der Naval Club Pact unterzeichnet, der die Verfassung von 1967 wieder herstellte und es dem Militär ermöglichte, in Sicherheitsfragen zu beraten und die Ernennung hochrangiger Offiziere zu kontrollieren. Am 25. November 1984 fanden Wahlen statt, und nach der kurzen Präsidentschaft von Rafael Addiego Bruno wurde am 1. März 1985 der Kandidat der Colorado Party, Julio Maria Sanguinetti, neuer Präsident."  #NT!
  
 SPA_1947_revolution.t:0 "Die Proklamation der Monarchie?"  #NT!
 SPA_1947_revolution.d:0 "Das Gesetz über die Nachfolge an der Spitze des Staates war das fünfte der acht Grundgesetze des Reiches, das die Macht des Franco-Regimes in Spanien regelte. Es legte Bestimmungen für die Wiederherstellung der spanischen Monarchie fest (nach ihrer Abschaffung durch die Zweite Spanische Republik im Jahr 1931) und ernannte Francisco Franco zum Staatsoberhaupt Spaniens auf Lebenszeit. Es sah vor, dass sein Nachfolger von Franco selbst mit dem Titel König oder Regent des Königreichs vorgeschlagen würde, was jedoch von den Cortes Españolas genehmigt werden musste."  #NT!
 SPA_1973_revolution.t:0 "Der Aufstieg von Luis Carrero Blanco?"  #NT!
 SPA_1973_revolution.d:0 "Generaladmiral Luis Carrero Blanco war ein spanischer Marineoffizier und Politiker. Er war auch der Hauptverfasser des Gesetzes über die Nachfolge des Staatsoberhauptes von 1947. Franco wählte ihn persönlich als seinen Nachfolger als Regierungschef aus, und Carrero übernahm damit im Juni 1973 sein Amt."  #NT!
 SPA_1975_revolution.t:0 "Der Tod von Francisco Franco"  #NT!
 SPA_1975_revolution.d:0 "1973 trat Franco aufgrund seines fortgeschrittenen Alters und seiner Krankheit als Premierminister zurück, der seit 1967 nicht mehr das Amt des Staatsoberhauptes innehatte. Dennoch blieb er als Staatsoberhaupt und Oberbefehlshaber an der Macht. Franco starb 1975 im Alter von 82 Jahren und wurde im Valle de los Caídos beigesetzt. In seinen letzten Jahren stellte er die Monarchie wieder her, sein Nachfolger wurde Juan Carlos, König von Spanien, der den Übergang Spaniens zur Demokratie anführte."  #NT!
 SPA_1976_revolution.t:0 "Der spanische Übergang zur Demokratie?"  #NT!
 SPA_1976_revolution.d:0 "Der spanische Übergang zur Demokratie ist eine Periode der modernen spanischen Geschichte, die den Regimewechsel umfasst, der von der Franco-Diktatur zur Konsolidierung eines parlamentarischen Systems in Form der konstitutionellen Monarchie unter Juan Carlos I. führte."  #NT!
  
 POR_1968_revolution.t:0 "Der Aufstieg von Marcelo Caetano?"  #NT!
 POR_1968_revolution.d:0 "Im August 1968 erlitt Salazar nach einem Sturz in seinem Haus einen Schlaganfall und fiel ins Koma. Nach 36 Jahren im Amt wurde der 79-Jährige von Präsident Américo Tomás entlassen. Tomás ernannte Caetano am 27. September 1968 zum Nachfolger von Salazar. Caetano setzte sich für die Förderung des Wirtschaftswachstums und einige soziale Verbesserungen ein, beispielsweise die Gewährung einer monatlichen Rente an Landarbeiter, die nie die Möglichkeit hatten, Sozialversicherung zu zahlen."  #NT!
 POR_1974_revolution.t:0 "Die Nelkenrevolution?"  #NT!
 POR_1974_revolution.d:0 "Die Nelkenrevolution war ein Militärputsch linksgerichteter Militäroffiziere, der am 25. April 1974 in Lissabon die autoritäre Regierung Estado Novo stürzte und durch den Processo Revolucionário Em Curso große soziale, wirtschaftliche, territoriale, demografische und politische Veränderungen in Portugal und seinen überseeischen Kolonien hervorrief. Dies führte zum Übergang Portugals zur Demokratie und zum Ende des portugiesischen Kolonialkrieges."  #NT!
  
 GRE_1967_revolution.t:0 "Das Regime der Obersten?"  #NT!
 GRE_1967_revolution.d:0 "Die griechische Junta oder das Regime der Obersten war eine rechtsgerichtete Militärdiktatur, die Griechenland von 1967 bis 1974 regierte. Am 21. April 1967 stürzte eine Gruppe von Obersten die Übergangsregierung einen Monat vor den geplanten Wahlen, bei denen die Zentrumsunion von Georgios Papandreou als Siegerin favorisiert wurde."  #NT!
 GRE_1973_revolution.t:0 "Die Abschaffung der griechischen Monarchie?"  #NT!
 GRE_1973_revolution.d:0 "Im Juli 1973 berief die griechische Militärjunta ein Referendum ein, das die Monarchie zum zweiten Mal in der griechischen Geschichte abschaffte. Dann berief der demokratisch gewählte Premierminister Konstantinos Karamanlis 1974 ein Referendum ein, das die Abschaffung rechtmäßig bestätigte."  #NT!
 GRE_1974_revolution.t:0 "Sturz der Junta?"  #NT!
 GRE_1974_revolution.d:0 "Der Zusammenbruch der Junta sowohl ideologisch als auch politisch wurde durch eine Reihe von Ereignissen ausgelöst, die sich kurz nach Papadopoulos‘ Liberalisierungsversuch abspielten, wobei ein ideologischer Zusammenbruch seinem letztendlichen politischen Zusammenbruch vorausging. Während und nach diesem unglückseligen Prozess traten die internen politischen Spannungen der Junta in den Vordergrund und brachten die Fraktionen der Junta gegeneinander auf, wodurch der scheinbar monolithische Zusammenhalt der Diktatur zerstört wurde."  #NT!
 GRE_1974_revolution_1.t:0 "Das Referendum über die griechische Republik"  #NT!
 GRE_1974_revolution_1.d:0 "Nach dem Zusammenbruch der Militärjunta, die das Land seit 1967 regierte, flammte der langjährige Streit zwischen Republikanern und Monarchisten erneut auf. Bereits im Jahr zuvor hatte die Junta zu derselben Frage ein Referendum von zweifelhafter Integrität abgehalten, bei dem es zu einem Votum für eine Republik kam, das Georgios Papadopoulos als Vorwand nutzte, um sich selbst zum Präsidenten erklären zu lassen. Nach dem Zusammenbruch des Militärregimes und freien Wahlen im Vormonat beschloss die neu gewählte Regierung von Premierminister Konstantin Karamanlis jedoch, die Abstimmung erneut durchzuführen, da das Referendum aus der Junta-Ära sowohl wahltechnisch als auch rechtlich als fragwürdig angesehen wurde. 69,2 % der Wähler stimmten einer Republik zu, bei einer Wahlbeteiligung von 75,6 %."  #NT!
  
 CYP_1974_revolution.t:0 "Der zyprische Staatsstreich?"  #NT!
 CYP_1974_revolution.d:0 "Der zyprische Staatsstreich von 1974 war ein Militärputsch, der von der zyprischen Nationalgarde durchgeführt und von der griechischen Militärjunta gefördert wurde. Am 15. Juli 1974 entließen die Putschisten den amtierenden Präsidenten Zyperns, Erzbischof Makarios III., aus dem Amt und setzten den Pro-Enosis-Nationalisten Nikos Sampson ein."  #NT!
 CYP_1974_revolution_1.t:0 "Die Rückkehr der zyprischen Demokratie?"  #NT!
 CYP_1974_revolution_1.d:0 "Sampsons Präsidentschaft war nur von kurzer Dauer, da das Regime von Ioannidis in Athen nur wenige Tage nach der türkischen Invasion zusammenbrach. Damals wurde festgestellt, dass die Türkei mit einer Invasion Griechenlands drohte und dass sich die Obersten plötzlich auf die Verteidigung des Landes konzentrieren mussten, anstatt an der Macht zu bleiben. Das Versäumnis des Regimes, die türkische Intervention vorherzusagen oder zu verhindern, schwächte seine Legitimität und Autorität erheblich. Ohne Unterstützung trat Sampson am 23. Juli zurück und die Präsidentschaft ging an Glafkos Klerides über. Makarios blieb fünf Monate in London; Nachdem es ihm dann gelungen war, die internationale Anerkennung dafür zu erlangen, dass seine Regierung die rechtmäßige Regierung der gesamten Insel war, kehrte er nach Zypern zurück und konzentrierte sich auf die Wiederherstellung des zypriotischen Territoriums."  #NT!
  
 BEL_1951_revolution.t:0 "Die Abdankung von König Leopold III.?"  #NT!
 BEL_1951_revolution.d:0 "Die Rückkehr von König Leopold III. nach Belgien am 22. Juli 1950 löste einen der heftigsten Generalstreiks in der Geschichte Belgiens aus. Drei Demonstranten wurden getötet, als die Gendarmerie mit automatischen Waffen das Feuer eröffnete. Das Land stand am Rande eines Bürgerkriegs und in Lüttich und anderen Gemeinden Walloniens wurden belgische Banner durch wallonische Flaggen ersetzt. Um eine Spaltung des Landes zu vermeiden und die Monarchie zu bewahren, beschloss Leopold am 1. August 1950, seine Befugnisse und Pflichten an seinen 20-jährigen Sohn Baudouin zu delegieren und diesen zum Regenten zu machen. Auf Drängen der Regierung dankte Leopold am 16. Juli 1951 zugunsten Baudouins ab."  #NT!
 BEL_1993_revolution.t:0 "Der belgische Verband?"  #NT!
 BEL_1993_revolution.d:0 "Als Reaktion auf einen wachsenden Bürgerkrieg zwischen der niederländischsprachigen und der französischsprachigen Gemeinschaft in Brüssel erklärte die Regierung 1970, dass „der Einheitsstaat, seine gesetzlich festgelegte Struktur und Funktionsweise überholt“ seien. Die neue Verfassung erkannte die Existenz starker gemeinschaftlicher und regionaler Unterschiede innerhalb Belgiens an, versuchte jedoch, diese Unterschiede durch eine Machtverteilung auf die Gemeinschaften und Regionen auszugleichen. 1993 verabschiedete das Parlament ein Verfassungspaket, das Belgien in einen vollwertigen Bundesstaat umwandelte."  #NT!
  
 NET_1970_revolution.t:0 "Depillarisierung?"  #NT!
 NET_1970_revolution.d:0 "Nach dem Zweiten Weltkrieg (in dem sogar der niederländische Widerstand säuberte) begannen Liberale und Sozialisten, aber auch Protestanten und Katholiken, an dem Säulensystem zu zweifeln. In den 1960er Jahren brachen die Säulen weitgehend zusammen, insbesondere unter der politischen Kritik von D66 und der Gruppe Nieuw Links (Neue Linke) in der PvdA. Dadurch und durch die erhöhte Mobilität konnten viele Menschen erkennen, dass sich die Menschen aus den anderen Säulen nicht so sehr von ihnen selbst unterschieden. Der zunehmende Wohlstand und die zunehmende Bildung machten die Menschen von vielen Säuleninstitutionen unabhängig, und junge Menschen wollten nicht länger mit diesen Organisationen in Verbindung gebracht werden."  #NT!
  
 LUX_1948_revolution.t:0 "Ende der luxemburgischen Neutralität?"  #NT!
 LUX_1948_revolution.d:0 "Luxemburg gab seine Neutralität 1948 offiziell auf und seine Verfassung wurde entsprechend geändert. Es folgte der Beitritt zum Brüsseler Vertrag im Jahr 1948 und dann zur NATO im Jahr 1949, was das endgültige Ende seines neutralen Status bedeutete."  #NT!
  
 SWI_1971_revolution.t:0 "Schweizer Frauenstimmrechtsreferendum?"  #NT!
 SWI_1971_revolution.d:0 "Am 7. Februar 1971 fand in der Schweiz eine Volksabstimmung über die Einführung des Frauenwahlrechts statt. Nur Männer durften wählen, und das Ergebnis war, dass 65,7 % für die Einführung stimmten. Das Ergebnis war zu erwarten, da mehrere Kantone in den Jahren zuvor das Frauenwahlrecht eingeführt hatten und die Schweizer Regierung sowie mehrere politische Parteien das Frauenwahlrecht aktiv unterstützten."  #NT!
  
 FRA_1958_revolution_0.t:0 "Die Maikrise?"  #NT!
 FRA_1958_revolution_0.d:0 "Die Krise in Frankreich im Mai 1958 war ein entscheidender politischer Umbruch, der durch die Spannungen im Zusammenhang mit dem algerischen Unabhängigkeitskrieg ausgelöst wurde. Am 13. Mai veranstalteten rechte Militäroffiziere und Siedler in Algier einen Putsch gegen die Ernennung von Pierre Pflimlin zum Premierminister, aus Angst, er könnte mit algerischen Nationalisten verhandeln. Unter der Führung von General Jacques Massu und unterstützt vom ehemaligen Generalgouverneur Jacques Soustelle forderte der Aufstand eine Regierung der öffentlichen Sicherheit unter Charles de Gaulle. Die Krise offenbarte die Instabilität der Vierten Republik, was letztendlich zu ihrem Zusammenbruch und de Gaulles Rückkehr an die Macht führte, wo er die zentralisiertere und widerstandsfähigere Fünfte Republik gründete."  #NT!
 FRA_1958_revolution.t:0 "Die Fünfte Französische Republik?"  #NT!
 FRA_1958_revolution.d:0 "Die Fünfte Republik entstand aus dem Zusammenbruch der Vierten Republik und ersetzte die frühere parlamentarische Republik durch ein halbpräsidentielles (oder duales Exekutiv-)System, das die Macht zwischen einem Präsidenten als Staatsoberhaupt und einem Premierminister als Regierungschef aufteilte. Die Verfassung von 1958 ersetzte auch die Französische Union durch die Französische Gemeinschaft, die es vierzehn Mitgliedsgebieten (außer Algerien) ermöglichte, ihre Unabhängigkeit zu behaupten."  #NT!
 FRA_1961_revolution.t:0 "Der Algier-Putsch?"  #NT!
 FRA_1961_revolution.d:0 "Der Putsch in Algier war ein gescheiterter Staatsstreich, der den französischen Präsidenten Charles de Gaulle dazu zwingen sollte, Französisch-Algerien, die ansässige europäische Gemeinschaft und die pro-französischen Algerier nicht im Stich zu lassen. Sie wurde in Französisch-Algerien von den pensionierten französischen Armeegenerälen Maurice Challe (ehemaliger Oberbefehlshaber in Französisch-Algerien), Edmond Jouhaud (ehemaliger Generalinspekteur der französischen Luftwaffe), André Zeller (ehemaliger Stabschef der französischen Armee) und Raoul Salan (ehemaliger Oberbefehlshaber in Französisch-Algerien) organisiert und fand vom Nachmittag des 21. bis 26. April 1961 mitten im Algerienkrieg statt (1954–1962) und brachte die Nation an den Rand eines Bürgerkriegs."  #NT!
  
 GBR_1979_revolution.t:0 "Das Misstrauensvotum?"  #NT!
 GBR_1979_revolution.d:0 "Am 28. März 1979 fand ein Misstrauensvotum gegen die britische Labour-Regierung von James Callaghan statt. Die Abstimmung wurde von der offiziellen Oppositionsführerin Margaret Thatcher durchgeführt und von der Labour-Regierung mit einer Stimme (311 zu 310 Stimmen) verloren, was um 22:19 Uhr bekannt gegeben wurde. Das Ergebnis sah eine allgemeine Wahl vor, die von Thatchers Konservativer Partei gewonnen wurde."  #NT!
  
 RUS_1993_revolution.t:0 "Die russische Verfassungskrise?"  #NT!
 RUS_1993_revolution.d:0 "Im September und Oktober 1993 kam es in der Russischen Föderation aufgrund eines Konflikts zwischen Präsident Boris Jelzin und dem russischen Parlament zu einer Verfassungskrise. Präsident Jelzin führte einen Selbstputsch durch, löste das Parlament auf und führte ein System der Präsidialherrschaft per Dekret ein. Die Krise endete damit, dass Jelzin mit militärischer Gewalt das Moskauer Sowjethaus angriff und die Abgeordneten verhaftete. Im Zuge der Ereignisse festigte Jelzin seine Position, weitete die Befugnisse der Exekutive weiter aus und setzte die Verabschiedung der Verfassung der Russischen Föderation von 1993 durch."  #NT!
 RUS_2000_revolution.t:0 "Der Aufstieg von Wladimir Putin?"  #NT!
 RUS_2000_revolution.d:0 "Am 31. Dezember 1999 trat Präsident Jelzin unerwartet zurück und übergab das Amt an den kürzlich ernannten Premierminister und seinen gewählten Nachfolger Wladimir Putin. Putin gewann dann die Präsidentschaftswahlen 2000 und besiegte den tschetschenischen Aufstand im Zweiten Tschetschenienkrieg. Putins Herrschaft erhöhte die Stabilität und verwandelte Russland gleichzeitig in einen autoritären Staat."  #NT!
 RUS_2023_revolution.t:0 "Der Aufstand der Wagner-Gruppe?"  #NT!
 RUS_2023_revolution.d:0 "Am 23. Juni 2023 beteiligte sich die Wagner-Gruppe, ein russisches privates Militärunternehmen, an einem großen Aufstand gegen die russische Regierung. Es markierte den Höhepunkt des Konflikts zwischen der Wagner-Gruppe und dem Verteidigungsministerium, der etwa sechs Monate zuvor begonnen hatte. Der russische Oligarch Jewgeni Prigoschin, der die Aktivitäten der Wagner-Gruppe in der Ukraine geleitet hatte, trat zurück, nachdem er einen Tag später eine Einigung erzielt hatte."  #NT!
 RUS_2020_revolution.t:0 "Die russische Verfassungsänderung?"  #NT!
 RUS_2020_revolution.d:0 "Die im Januar 2020 vorgeschlagenen Änderungen von 2020 sind die zweiten wesentlichen Änderungen der Verfassung Russlands von 1993. Um diese Änderungen einzuführen, führte der russische Präsident Wladimir Putin eine landesweite Abstimmung durch. Sie wurden am 1. Juli durch eine Volksabstimmung angenommen."  #NT!
  
 UKR_2004_revolution.t:0 "Die Orange Revolution?"  #NT!
 UKR_2004_revolution.d:0 "Die Orange Revolution war eine Reihe von Protesten, die von Ende November 2004 bis Januar 2005 zu politischen Unruhen in der Ukraine führten. Sie gewann vor allem durch die Initiative der breiten Bevölkerung an Dynamik, ausgelöst durch die Nachwirkungen der Stichwahl um die Präsidentschaftswahl 2004 in der Ukraine, die angeblich von massiver Korruption, Einschüchterung von Wählern und Wahlbetrug geprägt war. Die landesweiten Proteste hatten Erfolg, als die Ergebnisse der ursprünglichen Stichwahl annulliert wurden und der Oberste Gerichtshof der Ukraine für den 26. Dezember 2004 eine Neuabstimmung anordnete. Unter intensiver Prüfung durch inländische und internationale Beobachter wurde die zweite Stichwahl für „frei und fair“ erklärt. Das Endergebnis zeigte einen klaren Sieg für Juschtschenko, der etwa 52 % der Stimmen erhielt, verglichen mit 44 % für Janukowitsch."  #NT!
 UKR_2010_revolution.t:0 "Die Wahl von Viktor Janukowitsch?"  #NT!
 UKR_2010_revolution.d:0 "Am 17. Januar 2010 fanden in der Ukraine Präsidentschaftswahlen statt. Da kein Kandidat die Mehrheit der Stimmen erhielt, kam es am 7. Februar zu einer Stichwahl zwischen Premierministerin Julia Timoschenko und Oppositionsführer Viktor Janukowitsch. Am 14. Februar wurde Janukowitsch mit 50 % der Stimmen zum gewählten Präsidenten und Sieger erklärt."  #NT!
 UKR_2014_revolution.t:0 "Die Maidan-Revolution?"  #NT!
 UKR_2014_revolution.d:0 "Die Revolution der Würde, auch Maidan-Revolution genannt, fand in der Ukraine im Februar 2014 am Ende der Euromaidan-Proteste statt, als tödliche Zusammenstöße zwischen Demonstranten und Staatskräften in der Hauptstadt Kiew in der Absetzung des gewählten Präsidenten Viktor Janukowitsch, der Rückkehr zur Verfassung der Ukraine von 2004 und dem Ausbruch des Russisch-Ukrainischen Krieges 2014 gipfelten."  #NT!
 UKR_2019_revolution.t:0 "Die Wahl von Wolodymyr Selenskyj?"  #NT!
 UKR_2019_revolution.d:0 "Selenskyj gab seine Kandidatur für die Präsidentschaftswahl 2019 am Abend des 31. Dezember 2018 zusammen mit der Silvesteransprache des damaligen Präsidenten Petro Poroschenko bekannt. Er gewann die Wahl mit 73,23 Prozent der Stimmen im zweiten Wahlgang und besiegte Poroschenko. Er hat sich als Anti-Establishment- und Anti-Korruptions-Persönlichkeit positioniert."  #NT!
  
 YUG_1974_revolution.t:0 "Die Verfassung von 1974?"  #NT!
 YUG_1974_revolution.d:0 "Mit 406 Originalartikeln war die Verfassung von 1974 eine der längsten Verfassungen der Welt. Es fügte eine ausgefeilte Sprache hinzu, die das Selbstverwaltungssystem vor staatlichen Eingriffen schützte und die Vertretung von Republiken und Provinzen in allen Wahl- und Politikforen ausweitete. Die Verfassung bezeichnete die neustrukturierte Bundesversammlung als höchsten Ausdruck des Selbstverwaltungssystems."  #NT!
 YUG_1980_revolution.t:0 "Tod von Josip Broz Tito"  #NT!
 YUG_1980_revolution.d:0 "Tito wurde im Laufe des Jahres 1979 zunehmend krank. Am 7. Januar und erneut am 11. Januar 1980 wurde Tito mit Durchblutungsstörungen in den Beinen in das Universitätsklinikum in Ljubljana, der Hauptstadt der SR Slowenien, eingeliefert. Sein linkes Bein wurde kurz darauf aufgrund von Arterienverstopfungen amputiert und er starb am 4. Mai 1980 um 15:05 Uhr, drei Tage vor seinem 88. Geburtstag, im Medizinischen Zentrum Ljubljana an Wundbrand."  #NT!
  
 tito_death.option:0 "Ruhe in Frieden"  #NT!
  
 SER_2000_revolution.t:0 "Die Rückkehr zur Demokratie?"  #NT!
 SER_2000_revolution.d:0 "Miloševićs Herrschaft wurde von Beobachtern als autoritär oder autokratisch sowie kleptokratisch beschrieben, mit zahlreichen Vorwürfen wegen Wahlbetrugs, politischen Attentaten, Unterdrückung der Medienfreiheit und Polizeibrutalität. Der Sturz von Slobodan Milošević begann in der Bundesrepublik Jugoslawien nach den Parlamentswahlen am 24. September 2000 und gipfelte im Sturz der Regierung von Slobodan Milošević am 5. Oktober 2000."  #NT!
  
 ALB_1997_revolution.t:0 "Das Referendum über die albanische Monarchie"  #NT!
 ALB_1997_revolution.d:0 "Am 29. Juni 1997 fand in Albanien parallel zu den Parlamentswahlen ein Referendum über die Wiederherstellung der Monarchie statt. Der Vorschlag wurde von 66,7 % der Wähler abgelehnt. Der ehemalige Kronprinz Leka behauptete jedoch, dass 65,7 % dafür gestimmt hätten."  #NT!
  
 ROM_1965_revolution.t:0 "Aufstieg von Nicolae Ceaușescu?"  #NT!
 ROM_1965_revolution.d:0 "Ceaușescu stieg in den Reihen der sozialistischen Regierung von Gheorghe Gheorghiu-Dej auf und übernahm nach Gheorghiu-Dejs Tod im Jahr 1965 die Führung der Rumänischen Kommunistischen Partei als Generalsekretär. Nach seiner Machtübernahme lockerte er die Pressezensur und verurteilte in seiner Rede vom 21. August 1968 offen die Invasion des Warschauer Paktes in der Tschechoslowakei, was zu einem Anstieg der Popularität führte. Die daraus resultierende Periode der Stabilität war jedoch nur von kurzer Dauer, da seine Regierung bald totalitär wurde und zu dieser Zeit als die repressivste im Ostblock galt."  #NT!
 ROM_1967_revolution.t:0 "Dekret 770 erlassen?"  #NT!
 ROM_1967_revolution.d:0 "Dekret 770 war ein Dekret der kommunistischen rumänischen Regierung von Nicolae Ceaușescu, das 1967 unterzeichnet wurde. Es schränkte Abtreibung und Empfängnisverhütung ein und sollte eine neue und große rumänische Bevölkerung schaffen."  #NT!
 ROM_1974_revolution.t:0 "Systematisierung erlassen?"  #NT!
 ROM_1974_revolution.d:0 "Unter Systematisierung versteht man das unter Ceaușescus Regime durchgeführte Stadtplanungsprogramm. Ab 1974 bestand die Systematisierung größtenteils aus dem Abriss und Wiederaufbau bestehender Dörfer und Städte, ganz oder teilweise, mit dem erklärten Ziel, Rumänien in eine „multilateral entwickelte sozialistische Gesellschaft“ zu verwandeln. In den 1980er Jahren war Ceaușescu besessen davon, sich einen Palast von beispiellosen Ausmaßen zu bauen, zusammen mit einem ebenso grandiosen Viertel, dem Centrul Civic, als Ergänzung dazu."  #NT!
  
 EGR_1950_revolution.t:0 "Aufstieg von Walter Ulbricht?"  #NT!
 EGR_1950_revolution.d:0 "Nach dem Ende des Zweiten Weltkriegs organisierte Ulbricht die Kommunistische Partei Deutschlands in der Sowjetischen Besatzungszone nach stalinistischen Grundsätzen neu. Er spielte eine Schlüsselrolle bei der gewaltsamen Fusion von KPD und SPD zur Sozialistischen Einheitspartei Deutschlands (SED) im Jahr 1946. Er wurde 1950 Erster Sekretär der SED und effektiver Führer der neu gegründeten DDR."  #NT!
 EGR_1971_revolution.t:0 "Aufstieg Erich Honeckers?"  #NT!
 EGR_1971_revolution.d:0 "1970 begann Honecker einen politischen Machtkampf, der mit Unterstützung des sowjetischen Führers Leonid Breschnew dazu führte, dass er Walter Ulbricht als Generalsekretär der SED und Vorsitzender des Nationalen Verteidigungsrates ablöste."  #NT!
  
 POL_1956_revolution.t:0 "Der polnische Oktober?"  #NT!
 POL_1956_revolution.d:0 "Der Polnische Oktober war ein politischer Wandel in der Volksrepublik Polen, der im Oktober 1956 stattfand. Władysław Gomułka wurde zum Ersten Sekretär der regierenden Polnischen Vereinigten Arbeiterpartei (PZPR) ernannt und markierte damit das Ende des Stalinismus in Polen. Die Sowjets wurden zu einem Kompromiss mit der Gomułka-Fraktion gedrängt, was zu kurzen, aber angespannten Verhandlungen führte. Die Sowjets gewährten Gomułka die Erlaubnis, an der Macht zu bleiben, und gewährten Polen im Gegenzug für die Beibehaltung seiner Loyalität gegenüber Moskau eine größere Autonomie."  #NT!
 POL_1970_revolution.t:0 "Die Dezemberproteste?"  #NT!
 POL_1970_revolution.d:0 "Die polnischen Proteste von 1970, auch als „Dezember-1970-Ereignisse“ bekannt, fanden vom 14. bis 19. Dezember 1970 in Nordpolen statt. Die Proteste wurden durch einen plötzlichen Anstieg der Preise für Lebensmittel und andere Alltagsgegenstände ausgelöst. Die Parteiführung traf sich in Warschau und entschied, dass ein umfassender Aufstand der Arbeiterklasse unvermeidlich sei, wenn keine drastischen Schritte unternommen würden. Mit Zustimmung von Leonid Breschnew in Moskau wurden Gomułka, Kliszko und andere Führer zum Rücktritt gezwungen: Wenn die Preiserhöhungen eine Verschwörung gegen Gomułka gewesen wären, war sie erfolgreich. Da Moskau Mieczysław Moczar nicht akzeptieren wollte, wurde Edward Gierek zum neuen Führer ernannt."  #NT!
 POL_1981_revolution.t:0 "Das Kriegsrecht?"  #NT!
 POL_1981_revolution.d:0 "Am 11. Februar 1981 wurde Jaruzelski zum Vorsitzenden des Ministerrats (Premierminister) ernannt. Am 18. Oktober wurde Stanisław Kania als Erster Sekretär des Zentralkomitees der Polnischen Vereinigten Arbeiterpartei abgesetzt, nachdem ein Abhörgerät seine Kritik an der sowjetischen Führung aufgezeichnet hatte. Zu seinem Nachfolger wurde Jaruzelski gewählt. Am 13. Dezember 1981 kündigte Jaruzelski in einer Fernsehansprache die Einführung des Kriegsrechts an, nachdem der Staatsrat am Vortag seine Einführung offiziell genehmigt hatte."  #NT!
  
 IRQ_1958_revolution.t:0 "Die Revolution vom 14. Juli?"  #NT!
 IRQ_1958_revolution.d:0 "Die Revolution vom 14. Juli, auch als irakischer Militärputsch von 1958 bekannt, war ein Staatsstreich, der am 14. Juli 1958 im Irak stattfand und zum Sturz von König Faisal II. und zum Sturz des von den Haschemiten geführten Königreichs Irak führte. Die in ihrem Gefolge gegründete Irakische Republik beendete die nur sechs Monate zuvor gegründete Haschemitische Arabische Föderation zwischen Irak und Jordanien."  #NT!
 IRQ_1963_revolution.t:0 "Die Ramadan-Revolution?"  #NT!
 IRQ_1963_revolution.d:0 "Die Ramadan-Revolution war ein Militärputsch des irakischen Zweigs der Baath-Partei, der 1963 den irakischen Premierminister Abdul-Karim Qasim stürzte. Sie fand zwischen dem 8. und 10. Februar 1963 statt. Qasims ehemaliger Stellvertreter Abdul Salam Arif, der kein Baath-Anhänger war, erhielt den weitgehend zeremoniellen Titel des Präsidenten, während der prominente baathistische General Ahmed Hassan al-Bakr zum Premierminister ernannt wurde. Die Regierung bestand etwa neun Monate, bis Arif beim irakischen Staatsstreich im November 1963 die Nationalgarde entwaffnete, woraufhin eine Säuberung der Mitglieder der Baath-Partei folgte."  #NT!
 IRQ_1966_revolution.t:0 "Der Tod von Abdul Salam Arif?"  #NT!
 IRQ_1966_revolution.d:0 "Am 13. April 1966 kam Arif beim Absturz der irakischen Luftwaffe de Havilland DH.104 Dove 1, RF392, im Südirak, etwa 10 Kilometer vom Flughafen Basra entfernt, ums Leben und wurde von seinem Bruder Abdul Rahman als Präsident abgelöst. Abd al-Rahman al-Bazzaz wurde drei Tage lang amtierender Präsident, und es kam zu einem Machtkampf um die Präsidentschaft. Bei der ersten Sitzung des Verteidigungsrates und des Kabinetts zur Wahl eines Präsidenten benötigte Al-Bazzaz eine Zweidrittelmehrheit, um die Präsidentschaft zu gewinnen. Al-Bazzaz hatte keinen Erfolg und Abdul Rahman Arif wurde zum Präsidenten gewählt."  #NT!
 IRQ_1968_revolution.t:0 "Die Revolution vom 17. Juli?"  #NT!
 IRQ_1968_revolution.d:0 "Die Revolution vom 17. Juli war ein unblutiger Putsch im Irak im Jahr 1968 unter der Führung von Ahmed Hassan al-Bakr, Abd ar-Razzaq an-Naif und Abd ar-Rahman al-Dawud, der Präsident Abdul Rahman Arif und Premierminister Tahir Yahya verdrängte und den irakischen Regionalzweig der Arabischen Sozialistischen Baath-Partei an die Macht brachte. Zu den Baathisten, die an dem Putsch und der anschließenden Säuberung der von Naif angeführten gemäßigten Fraktion beteiligt waren, gehörten Hardan al-Tikriti, Salih Mahdi Ammash und Saddam Hussein, der zukünftige Präsident des Irak."  #NT!
 IRQ_1979_revolution.t:0 "Baathistischer Irak?"  #NT!
 IRQ_1979_revolution.d:0 "Mitte der 1970er Jahre wurde Saddam Hussein durch seinen Posten als Chef des Geheimdienstes der Partei de facto zum Führer des Landes, obwohl al-Bakr de jure Präsident war. Unter Saddams neuer Politik wuchsen sowohl die irakische Wirtschaft als auch der Lebensstandard der Bürger, und das Ansehen des Irak in der arabischen Welt stieg erheblich."  #NT!
 IRQ_2003_revolution.t:0 "Prozess gegen Saddam Hussein?"  #NT!
 IRQ_2003_revolution.d:0 "Im Jahr 2003 marschierte eine von den USA geführte Koalition in den Irak ein und beschuldigte Saddam fälschlicherweise, Massenvernichtungswaffen zu entwickeln und Verbindungen zu Al-Qaida zu haben. Nach dem schnellen Sieg der Koalition im Krieg wurde die Baath-Partei verboten und Saddam versteckte sich. Nach seiner Festnahme am 13. Dezember 2003 fand sein Prozess unter der irakischen Übergangsregierung statt. Am 5. November 2006 wurde Saddam vom irakischen Obersten Gerichtshof wegen Verbrechen gegen die Menschlichkeit im Zusammenhang mit dem Dujail-Massaker an über 140 schiitischen Muslimen im Jahr 1982 zum Tode durch den Strang verurteilt. Er wurde am 30. Dezember 2006 hingerichtet."  #NT!
  
 LBY_1969_revolution.t:0 "Die al-Fateh-Revolution?"  #NT!
 LBY_1969_revolution.d:0 "Die libysche Revolution von 1969, auch bekannt als al-Fateh-Revolution oder 1. September-Revolution, war ein Staatsstreich und eine Revolution der Bewegung der Freien Offiziere unter der Führung von Oberst Muammar Gaddafi, die die Senussi-Monarchie von König Idris I. stürzte und zur Gründung der Libyschen Arabischen Republik führte."  #NT!
  
 NYE_1962_revolution.t:0 "Der Staatsstreich im Nordjemen?"  #NT!
 NYE_1962_revolution.d:0 "Der Krieg begann mit einem Staatsstreich im Jahr 1962 durch revolutionäre Republikaner unter der Führung der Armee unter dem Kommando von Abdullah as-Sallal. Er entthronte den frisch gekrönten König und Imam Muhammad al-Badr und erklärte Jemen unter seiner Präsidentschaft zur Republik. Seine Regierung schaffte die Sklaverei im Jemen ab."  #NT!
  
 SYE_1969_revolution.t:0 "Der korrigierende Schritt?"  #NT!
 SYE_1969_revolution.d:0 "Der korrigierende Schritt war die Übernahme der jemenitischen Nationalen Befreiungsfront durch die marxistische Fraktion unter der Führung von Abdel Fattah Ismail und Salim Rubai in einem internen unblutigen Putsch am 22. Juni 1969, der den gemäßigten Präsidenten Qahtan al-Shaabi stürzte. Die Machtübernahme der Linken führte später zur Gründung der Jemenitischen Sozialistischen Partei (YSP) und zur Umwandlung Südjemens in einen sozialistischen Staat."  #NT!
 SYE_1990_revolution.t:0 "Sturz des kommunistischen Regimes?"  #NT!
 SYE_1990_revolution.d:0 "Vor dem Hintergrund der Perestroika in der UdSSR, dem Hauptunterstützer der PDRY, wurden Ende der 1980er Jahre politische Reformen eingeleitet. Politische Gefangene wurden freigelassen, politische Parteien wurden gegründet und das Justizsystem galt als gerechter als im Norden."  #NT!
  
 SEY_1977_revolution.t:0 "Der sozialistische Staat der Seychellen?"  #NT!
 SEY_1977_revolution.d:0 "Von 1977 bis 1991 wurden die Seychellen von France-Albert René und der Seychelles People's Progressive Front als Einparteienstaat regiert."  #NT!
 SEY_1991_revolution.t:0 "Die Rückkehr der Demokratie?"  #NT!
 SEY_1991_revolution.d:0 "Der erste Entwurf einer neuen Verfassung erreichte 1992 nicht die erforderlichen 60 % der Wähler, doch 1993 wurde eine geänderte Fassung angenommen."  #NT!
  
 SOM_1969_revolution.t:0 "Die Demokratische Republik Somalia?"  #NT!
 SOM_1969_revolution.d:0 "Demokratische Republik Somalia war der Name, den die sozialistische Militärregierung Somalia unter Präsident Generalmajor Mohamed Siad Barre gab, nachdem sie am 21. Oktober 1969 durch einen Staatsstreich die Macht übernommen hatte. Der Putsch erfolgte wenige Tage, nachdem ein Leibwächter Abdirashid Shermarke, den zweiten Präsidenten des Landes, ermordet hatte. Barres Regierung regierte Somalia die nächsten 21 Jahre lang, bis Somalia 1991 in einen Bürgerkrieg stürzte."  #NT!
 SOM_1991_revolution.t:0 "Zusammenbruch der Demokratischen Republik Somalia?"  #NT!
 SOM_1991_revolution.d:0 "Der somalische Aufstand war der Beginn des Bürgerkriegs in Somalia, der in den 1980er und frühen 1990er Jahren stattfand. Der Aufstand begann 1978, als Präsident Siad Barre begann, seine Spezialeinheiten einzusetzen, um Clan-basierte Dissidentengruppen anzugreifen, die gegen sein Regime waren. Nach seinem abrupten Wechsel von der Sowjetunion zu den Vereinigten Staaten und dem katastrophalen Ogaden-Krieg 1977–78 waren die Dissidenten fast ein Jahrzehnt lang immer mächtiger geworden. Als Barre am 23. Mai 1986 bei einem Autounfall verletzt wurde, wurden Rivalen innerhalb seiner eigenen Regierung und aus Oppositionsgruppen mutiger und gerieten in offene Konflikte. Siad Barres Flucht aus der Hauptstadt am 26. Januar 1991 markierte eine deutliche Wende im Konflikt."  #NT!
 SOM_1993_revolution.t:0 "Der somalische Bürgerkrieg?"  #NT!
 SOM_1993_revolution.d:0 "In den Jahren 1990–92 brach das Gewohnheitsrecht vorübergehend zusammen und die Fraktionskämpfe nahmen zu. Da es keine Zentralregierung gab, wurde Somalia zu einem „gescheiterten Staat“. Dies führte im Juli 1992 zur Ankunft der UN-Militärbeobachter UNOSOM I, gefolgt von den größeren Missionen UNITAF und UNOSOM II. Nach einem bewaffneten Konflikt zwischen somalischen Aufständischen und UNOSOM-II-Truppen im Jahr 1993 zogen sich die Vereinten Nationen 1995 aus Somalia zurück."  #NT!
 SOM_1995_revolution.t:0 "Der Fall von Mohamed Farrah Aidid?"  #NT!
 SOM_1995_revolution.d:0 "Zusammen mit anderen bewaffneten Oppositionsgruppen gelang es Mohamed Farrah Aidid Anfang 1991, das 22 Jahre alte Regime von Präsident Barre zu stürzen, was zum vollständigen Ausbruch des Bürgerkriegs führte. Aidid strebte danach, Präsident der neuen somalischen Regierung zu werden, und suchte nach Bündnissen und Bündnissen mit anderen politisch-militärischen Organisationen, um eine nationale Regierung zu bilden. Nach dem Zusammenstoß vom 5. Juni 1993, bei dem Dutzende UNOSOM-II-Truppen ums Leben kamen, wurde die SNA – und damit auch Aidid – beschuldigt, was dazu führte, dass er einer der ersten gesuchten Männer der Vereinten Nationen wurde. Nach dem von den USA angeführten Überfall am Blutigen Montag am 12. Juli 1993, bei dem viele bedeutende Mitglieder seines Habr-Gidr-Clans ums Leben kamen, begann Aidid zum ersten Mal gezielt gegen amerikanische Truppen vorzugehen. Präsident Bill Clinton reagierte mit der Durchführung der Operation Gothic Serpent und dem Einsatz von Delta Force und Task Force Ranger, um ihn zu fangen. Während einer Schlacht in Mogadischu zwischen seiner Miliz und den Streitkräften seines ehemaligen Verbündeten Osman Ali Atto wurde Aidid von einem Scharfschützen tödlich verwundet und starb später am 2. August 1996."  #NT!
 SOM_2006_revolution.t:0 "Der Aufstieg der Union der Islamischen Gerichte?"  #NT!
 SOM_2006_revolution.d:0 "Die Islamic Courts Union war eine juristische und politische Organisation, die Anfang der 2000er Jahre von Scharia-Gerichten mit Sitz in Mogadischu gegründet wurde, um die Gesetzlosigkeit zu bekämpfen, die aus dem somalischen Bürgerkrieg resultierte. Mitte bis Ende 2006 hatten die Islamischen Gerichte ihren Einfluss ausgeweitet und stellten in den meisten Teilen Süd- und Zentralsomalias de facto die Regierung dar. Damit gelang es ihnen, erstmals seit 1991 den Anschein eines Staates zu erwecken."  #NT!
  
 CAR_1965_revolution.t:0 "Staatsstreich von Saint-Sylvestre?"  #NT!
 CAR_1965_revolution.d:0 "Der Staatsstreich von Saint-Sylvestre war ein Staatsstreich, der am 31. Dezember 1965 und 1. Januar 1966 von Jean-Bédel Bokassa, dem Oberbefehlshaber der Armee der Zentralafrikanischen Republik (ZAR), und seinen Offizieren gegen die Regierung von Präsident David Dacko inszeniert wurde."  #NT!
 CAR_1976_revolution.t:0 "Das Zentralafrikanische Reich?"  #NT!
 CAR_1976_revolution.d:0 "Das Zentralafrikanische Reich wurde am 4. Dezember 1976 gegründet, als sich der damalige Präsident der Zentralafrikanischen Republik, Jean-Bédel Bokassa, zum Kaiser von Zentralafrika erklärte. Bokassas vollständiger Titel lautete „Kaiser von Zentralafrika durch den Willen des zentralafrikanischen Volkes, vereint in der Nationalen Politischen Partei, der MESAN“ und verwendete den Stil „Seine kaiserliche Majestät“. Seine Insignien, seine aufwendige Krönungszeremonie und sein Regime waren weitgehend von Napoleon I. inspiriert, der die Erste Französische Republik in das Erste Französische Kaiserreich umgewandelt hatte."  #NT!
 CAR_1979_revolution.t:0 "Operation Caban?"  #NT!
 CAR_1979_revolution.d:0 "Die Operation Caban war eine unblutige Militäroperation Frankreichs im September 1979 mit dem Ziel, Kaiser Bokassa I. abzusetzen, den im Exil lebenden ehemaligen Präsidenten David Dacko wieder einzusetzen und das Zentralafrikanische Reich wieder in Zentralafrikanische Republik umzubenennen."  #NT!
  
 CNG_1965_revolution.t:0 "Kongolesischer Staatsstreich?"  #NT!
 CNG_1965_revolution.d:0 "Mobutu inszenierte am 25. November 1965 einen weiteren Staatsstreich, setzte sowohl den Präsidenten als auch den Premierminister ab und übernahm die Kontrolle über die Regierung. Trotz periodischer Aufstände und Unruhen regierte Mobutu bis Mitte der 1990er Jahre den Kongo (1971 in Zaire umbenannt)."  #NT!
 CNG_1971_revolution.t:0 "Die Republik Zaire?"  #NT!
 CNG_1971_revolution.d:0 "Ab 1965 dominierte Mobutu das politische Leben des Landes, restrukturierte den Staat mehr als einmal und beanspruchte den Titel „Vater der Nation“. Am 27. Oktober 1971 kündigte er die Umbenennung des Landes in Republik Zaire an."  #NT!
 CNG_1997_revolution.t:0 "Der Fall von Zaire?"  #NT!
 CNG_1997_revolution.d:0 "Zaire brach Ende der 1990er Jahre zusammen, als die östlichen Teile des Landes nach dem Völkermord in Ruanda und der zunehmenden ethnischen Gewalt destabilisiert wurden. 1996 führte Laurent-Désiré Kabila, der Chef der AFDL-Miliz, einen Volksaufstand gegen Mobutu an. Als die Rebellen nach Westen vordrangen, floh Mobutu aus dem Land und überließ Kabilas Streitkräften die Kontrolle über das Land. Der Name des Landes wurde im folgenden Jahr in der Demokratischen Republik Kongo wiederhergestellt."  #NT!
 CNG_2006_revolution.t:0 "Die Rückkehr der Demokratie?"  #NT!
 CNG_2006_revolution.d:0 "Am 30. Juli 2006 fanden in der Demokratischen Republik Kongo Parlamentswahlen statt. Es waren die ersten Mehrparteienwahlen im Land seit 41 Jahren und die ersten seit dem Sturz des langjährigen Führers Mobutu Sese Seko neun Jahre zuvor. Die Wähler gingen zur Wahl, um sowohl einen neuen Präsidenten der Republik als auch eine neue Nationalversammlung, das Unterhaus des Parlaments, zu wählen."  #NT!
  
 KNG_1960_revolution.t:0 "Die Präsidentschaft von Fulbert Youlou?"  #NT!
 KNG_1960_revolution.d:0 "Fulbert Youlou war ein kongolesischer nationalistischer Führer und ehemaliger katholischer Priester, der nach der Unabhängigkeit der Republik Kongo im Jahr 1960 der erste Präsident der Republik Kongo wurde. Im August 1960 führte Youlou sein Land in die Unabhängigkeit. Im Dezember 1960 organisierte er in Brazzaville eine interkontinentale Konferenz, auf der er die Vorteile des Wirtschaftsliberalismus lobte und den Kommunismus verurteilte."  #NT!
 KNG_1963_revolution.t:0 "Die Trois Glorieuses?"  #NT!
 KNG_1963_revolution.d:0 "Die Trois Glorieuses (wörtlich „Drei glorreiche Tage“) waren ein Aufstand im Kongo-Brazzaville, der vom 13. bis 15. August 1963 stattfand. Der Aufstand beendete die Herrschaft des ersten kongolesischen Präsidenten, Fulbert Youlou, als die oppositionelle Gewerkschaftsbewegung und die kongolesische Jugendunion ein Bündnis mit der Armee eingingen."  #NT!
 KNG_1968_revolution.t:0 "Der kongolesische Staatsstreich?"  #NT!
 KNG_1968_revolution.d:0 "Am 4. September 1968 wurde die Regierung von Alphonse Massamba-Débat nach mehrtägigen gewaltsamen Zusammenstößen vom Militär gestürzt, was Massamba-Débat zum Rücktritt zwang. Alfred Raoul wurde dann amtierendes Staatsoberhaupt, bis im Januar 1969 Marien Ngouabi, der Vorsitzende derselben Partei, die Massamba-Débat an die Macht gebracht hatte, die Kontrolle übernahm."  #NT!
 KNG_1977_revolution.t:0 "Die Ermordung von Marien Ngouabi?"  #NT!
 KNG_1977_revolution.d:0 "Am 18. März 1977 wurde Präsident Ngouabi um 14:30 Uhr ermordet. Den Angeklagten, an dem Attentat beteiligt gewesen zu sein, wurde der Prozess gemacht und einige wurden hingerichtet, darunter Massamba-Débat und Barthélemy Kikadidi. Nach dem Attentat wurde das Militärkomitee der Partei (CMP) zum Leiter einer Übergangsregierung ernannt, wobei der konservative Oberst Joachim Yhombi-Opango als Staatsoberhaupt fungierte."  #NT!
 KNG_1979_revolution.t:0 "Der Aufstieg von Denis Sassou Nguesso?"  #NT!
 KNG_1979_revolution.d:0 "Nach der Ermordung Ngouabis im März 1977 wurde Yhombi-Opango Staatsoberhaupt. Er blieb fast zwei Jahre im Amt, bis er im Februar 1979 zum Rücktritt gezwungen wurde. Er wurde beschuldigt, versucht zu haben, eine „rechte Fraktion“ in der PCT zu bilden, und wurde anschließend von seinem Nachfolger, Präsident Denis Sassou Nguesso, mehrere Jahre lang in Haft gehalten. Er wurde nicht nur unter Hausarrest gestellt, sondern auch aus dem PCT ausgeschlossen und sein Eigentum wurde 1979 beschlagnahmt; Darüber hinaus wurde er laut einer Ankündigung vom 20. Oktober 1979 vom Rang eines Generals in den eines Gefreiten herabgestuft."  #NT!
 KNG_1992_revolution.t:0 "Das Ende der Volksrepublik Kongo?"  #NT!
 KNG_1992_revolution.d:0 "Die Volksrepublik Kongo wandelte sich nach der Auflösung der Sowjetunion im Jahr 1991 in ein Mehrparteiensystem um, wobei der frühere Name und die frühere Flagge des Landes wiederhergestellt wurden, und hörte im März 1992 auf zu existieren. André Milongo wurde zum Übergangspremierminister ernannt. Präsident Denis Sassou Nguesso durfte während der Übergangszeit in zeremonieller Funktion im Amt bleiben."  #NT!
 KNG_1997_revolution.t:0 "Die Rückkehr von Denis Sassou Nguesso?"  #NT!
 KNG_1997_revolution.d:0 "1997 eroberte Denis Sassou Nguesso nach einem brutalen Bürgerkrieg die Macht in Kongo-Brazzaville zurück. Unterstützt von angolanischen Streitkräften stürzte seine Cobra-Miliz Präsident Pascal Lissouba. Der Konflikt verwüstete Brazzaville und forderte Tausende Tote, festigte jedoch Sassou Nguessos Rückkehr als starker Mann, beendete das kurze demokratische Experiment im Kongo und stellte seine Herrschaft wieder her."  #NT!
  
 TAN_1962_revolution.t:0 "Die Präsidentenrepublik?"  #NT!
 TAN_1962_revolution.d:0 "Die britische Herrschaft endete am 9. Dezember 1961. Elisabeth II., die 1952 den britischen Thron bestiegen hatte, regierte im ersten Jahr der Unabhängigkeit Tanganjikas weiter, nun jedoch eindeutig als Königin von Tanganjika, vertreten durch den Generalgouverneur. Am 9. Dezember 1962 wurde Tanganjika eine demokratische Republik unter einem geschäftsführenden Präsidenten."  #NT!
 TAN_1964_revolution.t:0 "Der Einparteienstaat?"  #NT!
 TAN_1964_revolution.d:0 "Im Jahr 1962 wurde Tanganjika eine Republik, und Nyerere wurde zum ersten Präsidenten gewählt. Seine Regierung verfolgte die Entkolonialisierung und die „Afrikanisierung“ des öffentlichen Dienstes und förderte gleichzeitig die Einheit zwischen den indigenen Afrikanern und den asiatischen und europäischen Minderheiten des Landes. Er förderte die Bildung eines Einparteienstaates und verfolgte erfolglos die panafrikanische Bildung einer Ostafrikanischen Föderation mit Uganda und Kenia. Nach der Sansibar-Revolution von 1964 wurde die Insel Sansibar mit Tanganjika zu Tansania vereinigt. Danach legte Nyerere zunehmend Wert auf nationale Eigenständigkeit und Sozialismus."  #NT!
 TAN_1992_revolution.t:0 "Die Teildemokratisierung?"  #NT!
 TAN_1992_revolution.d:0 "Im Jahr 1992 wurde die Verfassung Tansanias geändert, um mehrere politische Parteien zuzulassen. Bei den ersten Mehrparteienwahlen in Tansania im Jahr 1995 gewann der regierende Chama Cha Mapinduzi 186 der 232 gewählten Sitze in der Nationalversammlung, und Benjamin Mkapa wurde zum Präsidenten gewählt."  #NT!
  
 UGA_1971_revolution.t:0 "Ugandischer Staatsstreich?"  #NT!
 UGA_1971_revolution.d:0 "Der ugandische Staatsstreich von 1971 war ein Militärputsch des ugandischen Militärs unter der Führung von General Idi Amin gegen die Regierung von Präsident Milton Obote am 25. Januar 1971. Die Machtergreifung fand statt, als Obote im Ausland war und am Treffen der Regierungschefs des Commonwealth in Singapur teilnahm. Amin hatte Angst, dass Obote ihn entlassen könnte, und setzte sich selbst als Diktator ein."  #NT!
 UGA_1979_revolution.t:0 "Der Fall von Idi Amin?"  #NT!
 UGA_1979_revolution.d:0 "Als Amins Herrschaft bis in die späten 1970er-Jahre vordrang, kam es zu zunehmenden Unruhen gegen seine Verfolgung bestimmter ethnischer Gruppen und politischer Dissidenten sowie zu Ugandas sehr schlechtem internationalen Ansehen aufgrund von Amins Unterstützung für PFLP-EO- und RZ-Entführer im Jahr 1976, was zur israelischen Operation Entebbe führte. Anschließend versuchte er 1978, die Region Kagera in Tansania zu annektieren. Als Reaktion darauf befahl der tansanische Präsident Julius Nyerere seinen Truppen, in Uganda einzumarschieren. Die tansanische Armee und Rebellentruppen eroberten 1979 erfolgreich Kampala und verdrängten Amin von der Macht."  #NT!
 UGA_1996_revolution.t:0 "Die Teildemokratisierung?"  #NT!
 UGA_1996_revolution.d:0 "Die ersten Wahlen unter Musevenis Regierung fanden am 9. Mai 1996 statt. Museveni besiegte Paul Ssemogerere von der Demokratischen Partei, der bei der Wahl als Kandidat der „Koalition zwischen den Parteien“ antrat, und den aufstrebenden Kandidaten Kibirige Mayanja. Museveni gewann mit 75,5 Prozent der Stimmen bei einer Wahlbeteiligung von 72,6 Prozent der Wahlberechtigten. Obwohl internationale und inländische Beobachter die Abstimmung als gültig bezeichneten, lehnten beide unterlegenen Kandidaten die Ergebnisse ab. Museveni wurde am 12. Mai 1996 zum zweiten Mal als Präsident vereidigt."  #NT!
  
 BRD_1966_revolution.t:0 "Burundischer Staatsstreich?"  #NT!
 BRD_1966_revolution.d:0 "Am 28. November 1966 stürzte Michel Micombero, der 26-jährige Premierminister Burundis, den 19-jährigen König (mwami) von Burundi, Ntare V., durch einen Staatsstreich. Ntare befand sich zu diesem Zeitpunkt außerhalb des Landes und den Putschisten gelang es schnell, die Kontrolle zu übernehmen."  #NT!
 BRD_1976_revolution.t:0 "Burundischer Staatsstreich?"  #NT!
 BRD_1976_revolution.d:0 "1976 führte Oberst Jean-Baptiste Bagaza, ein Tutsi, einen unblutigen Putsch an, um Micombero zu stürzen, und machte sich daran, Reformen voranzutreiben. Seine Regierung entwarf 1981 eine neue Verfassung, die den Status Burundis als Einparteienstaat beibehielt. Im August 1984 wurde Bagaza zum Staatsoberhaupt gewählt. Während seiner Amtszeit unterdrückte Bagaza politische Gegner und die Religionsfreiheit."  #NT!
 BRD_1987_revolution.t:0 "Burundischer Staatsstreich?"  #NT!
 BRD_1987_revolution.d:0 "Major Pierre Buyoya, ein Tutsi, stürzte 1987 Bagaza, setzte die Verfassung außer Kraft und löste politische Parteien auf. Er führte die Militärherrschaft durch ein Militärkomitee zur nationalen Rettung (CSMN) wieder ein."  #NT!
 BRD_1993_revolution.t:0 "Die Verfassungsreform?"  #NT!
 BRD_1993_revolution.d:0 "Buyoya gründete eine Nationale Versöhnungskommission, die 1992 eine neue Verfassung schuf, die ein Mehrparteiensystem und eine nicht-ethnische Regierung ermöglichte. Bei den Präsidentschaftswahlen in Burundi 1993 kandidierte er, unterlag jedoch dem Hutu-Kandidaten Melchior Ndadaye von der Oppositionspartei FRODEBU."  #NT!
  
 ZAN_1964_revolution.t:0 "Die Sansibar-Revolution?"  #NT!
 ZAN_1964_revolution.d:0 "Die Sansibar-Revolution begann am 12. Januar 1964 und führte zum Sturz des Sultans von Sansibar Jamshid bin Abdullah und seiner überwiegend arabischen Regierung durch die mehrheitlich schwarzafrikanische Bevölkerung der Insel. Karume gelang es, eine Fusion Sansibars mit Tanganjika zur neuen Nation Tansania auszuhandeln. Zeitgenössische Medien bewerteten diesen Zusammenschluss als einen Versuch, die kommunistische Subversion Sansibars zu verhindern. Die Revolution beendete mehr als 250 Jahre arabischer Vorherrschaft in Sansibar."  #NT!
  
 ETH_1974_revolution.t:0 "Äthiopischer Staatsstreich?"  #NT!
 ETH_1974_revolution.d:0 "Am 12. September 1974 wurde Kaiser Haile Selassie vom Koordinierungskomitee der Streitkräfte, der Polizei und der Territorialarmee abgesetzt, einer von der Sowjetunion unterstützten Militärjunta, die Äthiopien folglich bis zum 28. Mai 1991 als Derg regierte."  #NT!
 ETH_1991_revolution.t:0 "Sturz des Derg?"  #NT!
 ETH_1991_revolution.d:0 "Der Sturz des Derg war eine Militärkampagne, die am 28. Mai 1991 in Addis Abeba zur Niederlage der regierenden Militärjunta, Derg genannt, durch die Rebellenkoalition Äthiopische Volksrevolutionäre Demokratische Front (EPRDF) führte und den äthiopischen Bürgerkrieg beendete."  #NT!
  
 ANG_1975_revolution.t:0 "Die Volksrepublik Angola?"  #NT!
 ANG_1975_revolution.d:0 "Die Volksrepublik Angola war der selbsternannte sozialistische Staat, der Angola von seiner Unabhängigkeit im Jahr 1975 bis zum 25. August 1992 während des angolanischen Bürgerkriegs regierte. Angeführt wurde sie von der Volksbewegung zur Befreiung Angolas, die den Bürgerkrieg gewann und das Land seitdem als sozialdemokratische Republik regiert."  #NT!
 ANG_1979_revolution.t:0 "Präsidentschaft von José Eduardo dos Santos?"  #NT!
 ANG_1979_revolution.d:0 "José Eduardo Van-Dúnem dos Santos war ein angolanischer Politiker und Militäroffizier, der von 1979 bis 2017 als zweiter Präsident Angolas fungierte. Als Präsident war dos Santos auch Oberbefehlshaber der angolanischen Streitkräfte (FAA) und Präsident der Volksbewegung für die Befreiung Angolas (MPLA), der Partei, die Angola seit der Unabhängigkeit im Jahr 1975 regiert Nach seinem Rücktritt im Jahr 2017 war er der am zweitlängsten amtierende Präsident Afrikas, nur übertroffen von Teodoro Obiang Nguema Mbasogo aus Äquatorialguinea."  #NT!
 ANG_1991_revolution.t:0 "Die Bicesse-Abkommen?"  #NT!
 ANG_1991_revolution.d:0 "Die Bicesse-Abkommen, auch als Estoril-Abkommen bekannt, sahen den Übergang zur Mehrparteiendemokratie in Angola unter der Aufsicht der UNAVEM II-Mission vor. Präsident José Eduardo dos Santos von der MPLA und Jonas Savimbi von der UNITA unterzeichneten das Abkommen am 31. Mai 1991 in Lissabon, Portugal."  #NT!
 ANG_2017_revolution.t:0 "Präsidentschaft von João Lourenço?"  #NT!
 ANG_2017_revolution.d:0 "João Manuel Gonçalves Lourenço ist ein angolanischer Politiker, der derzeit seit dem 26. September 2017 als dritter Präsident Angolas fungiert.[4] Zuvor war er von 2014 bis 2017 Verteidigungsminister. Im September 2018 wurde er Vorsitzender der Regierungspartei Volksbewegung für die Befreiung Angolas (MPLA). Von 1998 bis 2003 war er Generalsekretär der Partei."  #NT!
  
 MOZ_1975_revolution.t:0 "Die Volksrepublik Mosambik?"  #NT!
 MOZ_1975_revolution.d:0 "Die Volksrepublik Mosambik war ein sozialistischer Staat, der von 1975 bis 1990 im heutigen Mosambik existierte. Sie wurde gegründet, als das Land im Juni 1975 die Unabhängigkeit von Portugal erlangte und die Mosambikanische Befreiungsfront („FRELIMO“) einen sozialistischen Einparteienstaat unter der Führung von Samora Machel gründete."  #NT!
 MOZ_1986_revolution.t:0 "Präsidentschaft von Joaquim Alberto Chissano?"  #NT!
 MOZ_1986_revolution.d:0 "Chissano übernahm die Präsidentschaft und wurde 1986 Vorsitzender der FRELIMO-Partei, als Samora Machels Präsidentenflugzeug in bergigem Gelände in Südafrika abstürzte. Chissano beendete den mosambikanischen Bürgerkrieg 1992, indem er einen Friedensvertrag mit den Rebellen aushandelte, der „keine Strafverfolgung oder Strafe versprach“ und ihnen 50 % der Positionen in der mosambikanischen Armee verschaffte."  #NT!
 MOZ_1990_revolution.t:0 "Die neue Verfassung?"  #NT!
 MOZ_1990_revolution.d:0 "Machels Nachfolger Joaquim Chissano führte tiefgreifende Veränderungen im Land durch, leitete Reformen wie den Übergang vom Marxismus zum Kapitalismus ein und begann Friedensgespräche mit RENAMO. Die neue Verfassung von 1990 sah ein politisches Mehrparteiensystem, eine Marktwirtschaft und freie Wahlen vor. Im selben Jahr schaffte Mosambik die Volksrepublik als offiziellen Namen des Landes ab."  #NT!
 MOZ_1994_revolution.t:0 "Der Übergang zur Demokratie?"  #NT!
 MOZ_1994_revolution.d:0 "Zwischen dem 27. und 29. Oktober 1994 fanden in Mosambik allgemeine Wahlen zur Wahl eines Präsidenten und der Versammlung der Republik statt. Es war das erste Mal, dass im Land Mehrparteienwahlen stattfanden, da FRELIMO zuvor die einzige legale Partei gewesen war. Dennoch behielt die FRELIMO die Kontrolle über das politische System des Landes und gewann beide Wahlen."  #NT!
  
 GNB_1973_revolution.t:0 "Die Volksrepublik Guinea-Bissau?"  #NT!
 GNB_1973_revolution.d:0 "Die Afrikanische Partei für die Unabhängigkeit von Guinea und Kap Verde wandte sich in den 1960er Jahren dem bewaffneten Konflikt zu und war einer der Kriegführenden im Unabhängigkeitskrieg zwischen Guinea und Bissau. Gegen Kriegsende gründete die Partei einen sozialistischen Einparteienstaat, der bis zur Einführung der Mehrparteiendemokratie Anfang der 1990er Jahre intakt blieb."  #NT!
 GNB_1994_revolution.t:0 "Der Übergang zur Demokratie?"  #NT!
 GNB_1994_revolution.d:0 "Am 3. Juli 1994 fanden in Guinea-Bissau Parlamentswahlen statt, am 7. August fand eine zweite Runde der Präsidentschaftswahlen statt. Es waren die ersten Mehrparteienwahlen seit der Unabhängigkeit und auch das erste Mal, dass der Präsident direkt gewählt wurde, da das Amt zuvor von der Nationalen Volksversammlung gewählt worden war. Bei der Präsidentschaftswahl war das Ergebnis ein Sieg für Amtsinhaber João Bernardo Vieira von der Afrikanischen Partei für die Unabhängigkeit von Guinea und Kap Verde (PAIGC), der im zweiten Wahlgang Kumba Ialá von der Partei für soziale Erneuerung besiegte."  #NT!
  
 LIB_1971_revolution.t:0 "Liberalisierung Liberias?"  #NT!
 LIB_1971_revolution.d:0 "William Tolbert wurde nach dem Tod von William Tubman zum Präsidenten gewählt. Tolberts frühe Präsidentschaft brachte liberale Reformen und die Annahme einer Position der Blockfreiheit mit sich, doch wachsende wirtschaftliche Probleme und Spannungen zwischen Amerikanisch-Liberianern und indigenen Liberianern führten zu Instabilität. 1973 kehrte das Land zu einem Zweiparteiensystem zurück, als die Progressive Alliance of Liberia unter der Führung von Gabriel Baccus Matthews als legitime Oppositionspartei anerkannt wurde."  #NT!
 LIB_1980_revolution.t:0 "Der liberianische Putsch?"  #NT!
 LIB_1980_revolution.d:0 "Am 12. April 1980 stürzte und tötete ein Militärputsch unter der Führung von Master Sergeant Samuel Doe aus der Volksgruppe der Krahn Präsident William R. Tolbert Jr. Doe und die anderen Verschwörer hingerichteten später den Großteil von Tolberts Kabinett sowie andere amerikanisch-liberianische Regierungsbeamte und Mitglieder der True Whig Party an einem Strand in Monrovia. Die Putschisten gründeten den People's Redemption Council (PRC), um das Land zu regieren."  #NT!
 LIB_1990_revolution.t:0 "Der erste liberianische Bürgerkrieg?"  #NT!
 LIB_1990_revolution.d:0 "Das totalitäre und weit verbreitete Korruptionsregime von Präsident Samuel Doe führte Ende der 1980er Jahre zu Forderungen nach einem Entzug der Unterstützung durch die Vereinigten Staaten. Die von Charles Taylor angeführte National Patriotic Front of Liberia (NPFL) marschierte im Dezember 1989 von der Elfenbeinküste aus in Liberia ein, um Doe zu stürzen, und erlangte innerhalb eines Jahres die Kontrolle über den größten Teil des Landes. Doe wurde im September 1990 von der Independent National Patriotic Front of Liberia (INPFL), einer Splittergruppe der NPFL unter der Führung von Prinz Johnson, gefangen genommen und hingerichtet."  #NT!
 LIB_1997_revolution.t:0 "Der Aufstieg von Charles Taylor?"  #NT!
 LIB_1997_revolution.d:0 "Nachdem Taylor wegen Unterschlagung abgesetzt und von Präsident Doe inhaftiert worden war, entkam er 1989 dem Gefängnis. Er kam schließlich in Libyen an, wo er zum Guerillakämpfer ausgebildet wurde. Er kehrte 1989 als Anführer einer von Libyen unterstützten Rebellengruppe, der National Patriotic Front of Liberia, nach Liberia zurück, um die Doe-Regierung zu stürzen und damit den Ersten Liberianischen Bürgerkrieg (1989–1996) einzuleiten. Nach Does Hinrichtung erlangte Taylor die Kontrolle über einen großen Teil des Landes und wurde einer der prominentesten Kriegsherren in Afrika. Nach einem Friedensabkommen, das den Krieg beendete, wurde Taylor bei den Parlamentswahlen 1997 als Mitglied der National Patriotic Party (NPP) zum Präsidenten gewählt. Im Inland versuchte Taylor, die Macht mit diktatorischen Mitteln zu festigen, beispielsweise durch Säuberungen des Militärs und Gewalt gegen seine politischen Rivalen."  #NT!
 LIB_2003_revolution.t:0 "Die Rückkehr der Demokratie in Liberia?"  #NT!
 LIB_2003_revolution.d:0 "Präsident Charles Taylor kam 1997 nach einem Sieg im Ersten Liberianischen Bürgerkrieg an die Macht, der zu zwei Jahren Frieden führte. Die Liberians United for Reconciliation and Democracy (LURD), eine von der Regierung Guineas unterstützte Anti-Taylor-Rebellengruppe, marschierte im April 1999 in den Norden Liberias ein. LURD machte im Norden allmählich Gewinne gegen Taylor und begann Anfang 2002, sich der Hauptstadt Monrovia zu nähern eroberte schnell den größten Teil des Südens. Taylor, der nur noch ein Drittel von Liberia kontrollierte und durch die Belagerung von Monrovia unter Druck gesetzt wurde, trat im August 2003 zurück und floh nach Nigeria. Das umfassende Friedensabkommen von Accra wurde eine Woche später von den Kriegsparteien unterzeichnet und markierte das politische Ende des Konflikts und den Beginn des Übergangs Liberias zur Demokratie."  #NT!
  
 BUF_1983_revolution.t:0 "Die Burkinabé-Revolution?"  #NT!
 BUF_1983_revolution.d:0 "Am 4. August 1983 kam es in der Republik Obervolta zu einem Staatsstreich, der manchmal auch als Augustrevolution oder Burkinabé-Revolution bezeichnet wird. Sie wurde von radikalen Elementen der Armee unter der Führung von Thomas Sankara und Blaise Compaoré gegen das Regime von Major Jean-Baptiste Ouédraogo durchgeführt."  #NT!
 BUF_1987_revolution.t:0 "Der Staatsstreich in Burkina Faso?"  #NT!
 BUF_1987_revolution.d:0 "Der Staatsstreich von Burkina Faso im Jahr 1987 war ein blutiger Militärputsch in Burkina Faso, der am 15. Oktober 1987 stattfand. Der Putsch wurde von Kapitän Blaise Compaoré gegen den amtierenden linksextremen Präsidenten Kapitän Thomas Sankara, seinen ehemaligen Freund und Mitarbeiter während des Aufstands von 1983, organisiert."  #NT!
 BUF_2014_revolution.t:0 "Die Rückkehr der Demokratie?"  #NT!
 BUF_2014_revolution.d:0 "Blaise Compaoré gewann die Wahlen 1991, 1998, 2005 und 2010 unter als unfair geltenden Umständen. Sein Versuch, die Verfassung zu ändern, um seine 27-jährige Amtszeit zu verlängern, löste 2014 den Burkinabé-Aufstand aus. Am 31. Oktober 2014 trat Compaoré zurück, woraufhin er in die Elfenbeinküste floh."  #NT!
 BUF_2022_revolution.t:0 "Der Staatsstreich in Burkina Faso?"  #NT!
 BUF_2022_revolution.d:0 "Traoré gehörte zu der Gruppe von Armeeoffizieren, die den Staatsstreich in Burkina Faso im Januar 2022 unterstützte und die Militärjunta „Patriotische Bewegung für Schutz und Wiederherstellung“ an die Macht brachte. Als die Verschwörer am 30. September ihren Putsch starteten, hatte Traoré noch den Rang eines Hauptmanns inne. Der Einsatz wurde mit Unterstützung der Einheit „Cobra“ durchgeführt. Unmittelbar nach dem Putsch erklärte sich Traoré zum neuen Chef der Patriotischen Bewegung für Schutz und Wiederherstellung. Am 6. Oktober übernahm er zudem das Amt des Interimspräsidenten als „Staatsoberhaupt, Oberster Chef der Streitkräfte“."  #NT!
  
 MAD_1975_revolution.t:0 "Madagassische sozialistische Revolution?"  #NT!
 MAD_1975_revolution.d:0 "Didier Ratsiraka wurde am 21. Dezember 1975 in einem nationalen Referendum für eine siebenjährige Amtszeit zum Präsidenten gewählt. Damit wurde das Mandat für einen Konsens bestätigt und die Zweite Republik Madagaskars eröffnet. Das Leitprinzip der Regierung Ratsirakas war die Notwendigkeit einer sozialistischen „Revolution von oben“."  #NT!
 MAD_1992_revolution.t:0 "Sturz des sozialistischen Regimes?"  #NT!
 MAD_1992_revolution.d:0 "Die Unzufriedenheit mit der Ratsiraka-Regierung nahm am 10. August 1991 zu, als mehr als 400.000 Bürger an einem Marsch zum Präsidentenpalast teilnahmen, mit der Absicht, die Ratsiraka-Regierung zu stürzen und ein neues politisches Mehrparteiensystem einzuführen. Das Ergebnis dieser Ereignisse war Ratsirakas Zustimmung am 31. Oktober 1991, einen Prozess des demokratischen Übergangs zu unterstützen, einschließlich der Formulierung einer neuen Verfassung und der Abhaltung freier und fairer Mehrparteienwahlen."  #NT!
  
 NIC_1979_revolution.t:0 "Die nicaraguanische Revolution?"  #NT!
 NIC_1979_revolution.d:0 "Die nicaraguanische Revolution umfasste die wachsende Opposition gegen die Somoza-Diktatur in den 1960er und 1970er Jahren sowie die Kampagne der Sandinistischen Nationalen Befreiungsfront (FSLN) zum Sturz der Diktatur in den Jahren 1978–79."  #NT!
 NIC_1990_revolution.t:0 "Die Rückkehr der Demokratie in Nicaragua?"  #NT!
 NIC_1990_revolution.d:0 "Am 25. Februar 1990 fanden in Nicaragua allgemeine Wahlen zur Wahl des Präsidenten und der Mitglieder der Nationalversammlung statt. Das Ergebnis war ein Sieg der Nationalen Oppositionsunion (UNO), deren Präsidentschaftskandidatin Violeta Chamorro überraschend den amtierenden Präsidenten Daniel Ortega von der Sandinistischen Nationalen Befreiungsfront (FSLN) besiegte. Dies führte zu einer historischen friedlichen und demokratischen Machtübergabe in Nicaragua."  #NT!
 NIC_2007_revolution.t:0 "Das Daniel-Ortega-Regime?"  #NT!
 NIC_2007_revolution.d:0 "José Daniel Ortega Saavedra ist ein nicaraguanischer Politiker, Revolutionär und ehemaliger Guerillakämpfer, der unter verschiedenen Titeln seit 2007 und zuvor von 1979 bis 1990 der Führer Nicaraguas war. Er kam zunächst von 1979 bis 1985 als Koordinator der Junta des Nationalen Wiederaufbaus an die Macht und war dann von 1985 bis 1990 Präsident Nicaraguas. Er übernahm 2007 erneut die Präsidentschaft und fungiert seit Februar 2025 an der Seite seiner Frau Rosario Murillo als Co-Präsident. Ortega wird als autoritärer Führer beschrieben."  #NT!
 NIC_2025_revolution.t:0 "Die Ko-Präsidenten von Nicaragua?"  #NT!
 NIC_2025_revolution.d:0 "Im Jahr 2025 wurde die Verfassung Nicaraguas dahingehend geändert, dass die Befugnisse der Präsidentschaft von zwei Ko-Präsidenten und nicht von einer einzigen Person ausgeübt werden können. Ein männlicher und ein weiblicher Ko-Präsident werden in allgemeiner Wahl für eine Amtszeit von sechs Jahren gewählt. Als der Änderungsantrag verabschiedet wurde, wurden der amtierende Präsident Daniel Ortega und seine Frau und Vizepräsidentin Rosario Murillo zu ersten Ko-Präsidenten erklärt. Damit ist Nicaragua das einzige Land der Welt, das derzeit von einer Ehegattendiarchie regiert wird."  #NT!
  
 ELS_1956_revolution.t:0 "Die Präsidentschaft von José María Lemus?"  #NT!
 ELS_1956_revolution.d:0 "Oberstleutnant José María Lemus López war vom 14. September 1956 bis zum 26. Oktober 1960 Präsident von El Salvador. Bevor er Präsident wurde, war er Unterstaatssekretär der Verteidigung und Innenminister. Er setzte die sozioökonomischen Reformen seines Vorgängers fort, doch der Lebensstandard der Arbeiterklasse verbesserte sich nicht."  #NT!
 ELS_1960_revolution.t:0 "Der salvadorianische Staatsstreich?"  #NT!
 ELS_1960_revolution.d:0 "Der salvadorianische Staatsstreich von 1961 war ein erfolgreicher Gegenputsch in El Salvador unter der Führung von Oberst Anibal Portillo gegen die kurzlebige Regierungsjunta, die 1960 die Macht übernommen hatte und die reformistische Militärjunta durch eine leidenschaftliche antikommunistische Regierung namens Civic-Military Directory ersetzte. Am Ende des Jahres war die Militärregierung einer demokratischen Herrschaft gewichen."  #NT!
 ELS_1979_revolution.t:0 "Der salvadorianische Staatsstreich?"  #NT!
 ELS_1979_revolution.d:0 "Der salvadorianische Staatsstreich 1979 war ein Militärputsch, der am 15. Oktober 1979 in El Salvador stattfand. Der von jungen Militäroffizieren angeführte Putsch stürzte Militärpräsident Carlos Humberto Romero unblutig und schickte ihn ins Exil. Der feste Einfluss der National Conciliation Party auf die Macht wurde beendet, und an ihrer Stelle gründete das Militär die Junta der Revolutionären Regierung von El Salvador (JRG)."  #NT!
 ELS_1984_revolution.t:0 "Die Wahl von José Napoleón Duarte?"  #NT!
 ELS_1984_revolution.d:0 "José Napoleón Duarte Fuentes (23. November 1925 – 23. Februar 1990) war ein salvadorianischer Politiker, der vom 1. Juni 1984 bis zum 1. Juni 1989 Präsident von El Salvador war. Er war Bürgermeister von San Salvador, bevor er 1972 für das Präsidentenamt kandidierte. Er verlor, aber die Wahl wird allgemein als Betrug angesehen. Nach einem Staatsstreich im Jahr 1979 führte Duarte von 1980 bis 1982 die anschließende zivil-militärische Junta an. Anschließend wurde er 1984 zum Präsidenten gewählt und besiegte den ARENA-Parteichef Roberto D'Aubuisson."  #NT!
 ELS_1992_revolution.t:0 "Die Friedensabkommen von Chapultepec?"  #NT!
 ELS_1992_revolution.d:0 "Die Friedensabkommen von Chapultepec waren eine Reihe von Friedensabkommen, die am 16. Januar 1992, dem Tag, an dem der salvadorianische Bürgerkrieg endete, unterzeichnet wurden. Der Vertrag stellte den Frieden zwischen der salvadorianischen Regierung und der Nationalen Befreiungsfront Farabundo Martí (FMLN) her."  #NT!
  
 NEP_1990_revolution.t:0 "Die nepalesische Volksbewegung?"  #NT!
 NEP_1990_revolution.d:0 "Die Volksbewegung von 1990 war eine Mehrparteienbewegung in Nepal, die das Ende der absoluten Monarchie und den Beginn der konstitutionellen Monarchie herbeiführte. Es beseitigte auch das Panchayat-System."  #NT!
 NEP_2008_revolution.t:0 "Die Abschaffung der Monarchie?"  #NT!
 NEP_2008_revolution.d:0 "In den 1990er Jahren begann der nepalesische Bürgerkrieg (1996–2006), ein Konflikt zwischen Regierungstruppen und den aufständischen Kräften der Kommunistischen Partei Nepals (Maoisten). Die Lage der nepalesischen Monarchie wurde durch das nepalesische Königsmassaker im Jahr 2001 weiter destabilisiert. Als Folge des Massakers kehrte König Gyanendra auf den Thron zurück. Seine Einführung der direkten Herrschaft im Jahr 2005 löste eine Protestbewegung aus, die den maoistischen Aufstand und prodemokratische Aktivisten vereinte. Nach einer Wahl im nächsten Jahr löste die nepalesische Verfassunggebende Versammlung das Königreich in ihrer ersten Sitzung am 28. Mai 2008 offiziell auf und rief an seiner Stelle die Demokratische Bundesrepublik Nepal aus."  #NT!
  
 PAK_1958_revolution.t:0 "Pakistanischer Staatsstreich?"  #NT!
 PAK_1958_revolution.d:0 "Am 7. Oktober hob Mirza die Verfassung Pakistans auf und verhängte das Kriegsrecht. Zwischen 1956 und 1958 gab es eine Reihe von Premierministern und es kam zu einem Zeitpunkt, an dem General Ayub Khan der Meinung war, dass die Armee die Kontrolle übernehmen sollte, um die Stabilität wiederherzustellen."  #NT!
 PAK_1970_revolution.t:0 "Rückkehr zur Demokratie?"  #NT!
 PAK_1970_revolution.d:0 "Am 7. Dezember 1970 fanden in Pakistan allgemeine Wahlen zur Wahl der Mitglieder der Nationalversammlung statt. Es waren die ersten direkten Parlamentswahlen seit der Unabhängigkeit Pakistans und letztendlich die einzigen, die vor der Unabhängigkeit Bangladeschs stattfanden. Die Abstimmung fand in 300 allgemeinen Wahlkreisen statt, davon 162 in Ostpakistan und 138 in Westpakistan."  #NT!
 PAK_1973_revolution.t:0 "Die Verfassung von 1973?"  #NT!
 PAK_1973_revolution.d:0 "Die Verfassung von 1973 war die erste in Pakistan, die von gewählten Vertretern ausgearbeitet wurde. Anders als die Verfassung von 1962 gab sie Pakistan eine parlamentarische Demokratie, in der die Exekutivgewalt beim Amt des Premierministers konzentriert war und das formelle Staatsoberhaupt – der Präsident – ​​sich darauf beschränkte, auf Anraten des Premierministers zu handeln. Die Verfassung besagt, dass alle Gesetze den Geboten des Islam entsprechen müssen, wie sie im Koran und in der Sunnah niedergelegt sind."  #NT!
 PAK_1977_revolution.t:0 "Pakistanischer Staatsstreich?"  #NT!
 PAK_1977_revolution.d:0 "Der pakistanische Militärputsch von 1977 (Codename Operation Fair Play) war der zweite Militärputsch in Pakistan, der am 5. Juli 1977 stattfand. Er wurde von Muhammad Zia-ul-Haq, dem Stabschef der Armee, durchgeführt und stürzte die Regierung von Premierminister Zulfikar Ali Bhutto. Der Putsch selbst verlief unblutig und ihm gingen soziale Unruhen und politische Konflikte zwischen der regierenden linken Regierung der Pakistan Peoples Party unter Bhutto und der rechten islamistischen Opposition Pakistan National Alliance voraus, die Bhutto beschuldigte, die Parlamentswahlen von 1977 manipuliert zu haben."  #NT!
 PAK_1988_revolution.t:0 "Rückkehr zur Demokratie?"  #NT!
 PAK_1988_revolution.d:0 "Präsident Zia starb 1988 bei einem Flugzeugabsturz und Benazir Bhutto, Tochter von Zulfikar Ali Bhutto, wurde zur ersten weiblichen Premierministerin des Landes gewählt. Auf die PPP folgte die konservative Pakistan Muslim League (N), und im Laufe des nächsten Jahrzehnts kämpften die Führer der beiden Parteien um die Macht und wechselten sich in den Ämtern ab, während sich die Lage des Landes verschlechterte und die Wirtschaftsindikatoren im Gegensatz zu den 1980er Jahren stark sanken."  #NT!
  
 HND_1947_revolution.t:0 "Entlassung von Vizekönig Archibald Wavell?"  #NT!
 HND_1947_revolution.d:0 "Archibald Wavell wurde Anfang 1947 als Vizekönig von Indien entlassen und durch Lord Mountbatten ersetzt. Seine angespannten Beziehungen zu Whitehall, Misserfolge bei der Simla-Konferenz (1945) und der Kabinettsmission (1946) sowie seine Unfähigkeit, kommunale Spannungen zu lösen, überzeugten Premierminister Attlee davon, dass eine neue Führung für den Übergang Indiens unerlässlich war."  #NT!
 HND_1952_revolution.t:0 "Sonderstatus für Jammu und Kaschmir?"  #NT!
 HND_1952_revolution.d:0 "Im Delhi-Abkommen zwischen Premierminister Nehru und Scheich Abdullah wurde 1952 der Sonderstatus von Jammu und Kaschmir gemäß Artikel 370 bestätigt. Es gewährte Autonomie über Staatsbürgerschaft, Eigentum und interne Regierungsführung, während Indien die Kontrolle über Verteidigung, Außenpolitik und Kommunikation behielt – und so die einzigartige verfassungsmäßige Stellung der Region innerhalb der Union festigte. Dieses am 24. Juli 1952 unterzeichnete Abkommen formalisierte die Autonomie Kaschmirs und integrierte es gleichzeitig in den Verfassungsrahmen Indiens. Die Vereinbarung stellte einen Kompromiss dar: Jammu und Kaschmir konnten ihre eigene Verfassung und Flagge beibehalten, während das indische Parlament über begrenzte gesetzgeberische Befugnisse verfügte."  #NT!
 KAS_Special_Status.option.1:0 "Erstellen Sie eine republikanische lokale Verwaltung."  #NT!
 KAS_Special_Status.option.2:0 "Behalten Sie die Monarchie in der lokalen Verwaltung."  #NT!
 KAS_Special_Status.option.3:0 "Annexion des Territoriums!"  #NT!
 HND_1975_revolution.t:0 "Der Notfall?"  #NT!
 HND_1975_revolution.d:0 "Der Ausnahmezustand in Indien erstreckte sich über einen Zeitraum von 21 Monaten von 1975 bis 1977, als Premierministerin Indira Gandhi im ganzen Land den Ausnahmezustand ausrufen ließ. Der von Präsident Fakhruddin Ali Ahmed aufgrund vorherrschender „interner Unruhen“ offiziell gemäß Artikel 352 der Verfassung erlassene Befehl übertrug dem Premierminister die Befugnis, per Dekret zu regieren, was die Annullierung von Wahlen und die Aussetzung bürgerlicher Freiheiten ermöglichte."  #NT!
 HND_1977_revolution.t:0 "Den Notfall beenden?"  #NT!
 HND_1977_revolution.d:0 "Am 18. Januar 1977 rief Gandhi Neuwahlen für März aus und ließ mehrere Oppositionsführer frei; Viele andere blieben jedoch auch nach ihrem Ausscheiden aus dem Amt im Gefängnis, obwohl der Notstand offiziell am 21. März 1977 endete. Die indischen Parlamentswahlen 1977 fanden vom 16. bis 20. März statt und führten zu einem Erdrutschsieg für die Janata Party und die CFD, die sich 298 Sitze in der Lok Sabha sicherten, während der regierende Indische Nationalkongress nur 154 gewinnen konnte – ein Rückgang von 198 im Vergleich zur vorherigen Wahl."  #NT!
 HND_1984_revolution.t:0 "Die Ermordung von Indira Gandhi?"  #NT!
 HND_1984_revolution.d:0 "Die indische Premierministerin Indira Gandhi wurde am 31. Oktober 1984 um 9:30 Uhr in ihrer Residenz in der Safdarjung Road in Neu-Delhi ermordet. Sie wurde von ihren Leibwächtern Satwant Singh und Beant Singh nach der Operation Blue Star getötet, einer indischen Militäraktion, die zwischen dem 1. und 8. Juni 1984 auf Befehl von Indira Gandhi durchgeführt wurde und den Goldenen Tempel von Harmandir Sahib in Amritsar, Punjab, der heiligsten Stätte des Sikhismus, beschädigen sollte."  #NT!
 HND_1991_revolution.t:0 "Die Ermordung von Rajiv Gandhi?"  #NT!
 HND_1991_revolution.d:0 "Die Ermordung des ehemaligen indischen Premierministers Rajiv Gandhi war das Ergebnis eines Selbstmordanschlags in Sriperumbudur in Tamil Nadu, Indien, am 21. Mai 1991. Neben Rajiv Gandhi kamen mindestens 14 weitere Menschen ums Leben. Es wurde von der 22-jährigen Kalaivani Rajaratnam (im Volksmund unter ihren Pseudonamen Thenmozhi Rajaratnam und Dhanu bekannt) durchgeführt, einem Mitglied der in Sri Lanka verbotenen tamilischen Rebellenorganisation Liberation Tigers of Tamil Eelam (LTTE)."  #NT!
 HND_2019_revolution.t:0 "Direkte Herrschaft in Jammu und Kaschmir?"  #NT!
 HND_2019_revolution.d:0 "Im August 2019 widerrief Indien den Sonderstatus von Jammu und Kaschmir gemäß Artikel 370 und führte eine direkte Herrschaft ein. Mit Wirkung zum 31. Oktober 2019 teilte das Jammu and Kashmir Reorganization Act den Staat in zwei Unionsterritorien – Jammu & Kashmir und Ladakh. Die zentrale Regierungsführung ersetzte die lokale Autonomie und markierte einen historischen verfassungsmäßigen und politischen Wandel. Dieser Schritt wurde von der Regierung als Schritt in Richtung Integration und Entwicklung gerechtfertigt, Kritiker argumentierten jedoch, er untergrabe die demokratische Vertretung und die regionale Autonomie."  #NT!
  
 BHU_1952_revolution.t:0 "Der Aufstieg von Jigme Dorji Wangchuck?"  #NT!
 BHU_1952_revolution.d:0 "Nachfolger von Jigme Wangchuck wurde sein Sohn Jigme Dorji Wangchuck. Während seiner 20-jährigen Herrschaft, die im Juli 1972 endete, begann die grundlegende Neuausrichtung der bhutanischen Gesellschaft. Wangchuck erreichte nicht nur die Neuordnung von Gesellschaft und Regierung, sondern festigte auch die Souveränität und Sicherheit Bhutans."  #NT!
 BHU_1972_revolution.t:0 "Der Aufstieg von Jigme Singye Wangchuck?"  #NT!
 BHU_1972_revolution.d:0 "Am 21. Juli 1972 verstarb der Dritte König von Bhutan und im Alter von 16 Jahren bestieg Kronprinz Jigme Singye Wangchuck den Thron und wurde damit der damals jüngste Monarch der Welt. Während seiner Herrschaft wandelte sich Bhutan von einer absoluten Monarchie zu einer demokratischen konstitutionellen Monarchie."  #NT!
 BHU_2006_revolution.t:0 "Der Aufstieg von Jigme Khesar Namgyel Wangchuck?"  #NT!
 BHU_2006_revolution.d:0 "Die Regentschaft von Jigme Khesar Namgyel Wangchuck begann im Jahr 2006, nachdem sein Vater Jigme Singye Wangchuck auf den Thron verzichtet hatte. Der junge König begann seine Herrschaft mit der Aufsicht über die Demokratisierung Bhutans, indem er die letzten Sitzungen des Parlaments leitete, in denen Wahlgesetze, Landreform und andere wichtige Themen debattiert wurden."  #NT!
 BHU_2008_revolution.t:0 "Die bhutanische parlamentarische Demokratie?"  #NT!
 BHU_2008_revolution.d:0 "Die ersten allgemeinen Wahlen zur Nationalversammlung fanden am 24. März 2008 statt. Die Hauptkandidaten waren die Bhutan Peace and Prosperity Party (DPT) unter Jigme Thinley und die People's Democratic Party (PDP) unter Sangay Ngedup. Die DPT gewann die Wahlen und erhielt 45 von 47 Sitzen. Am 9. April 2008 wurde Jigme Thinley der erste gewählte Premierminister; Er trat sein Amt nach den ersten demokratischen Wahlen des Landes an."  #NT!
  
 BUR_1962_revolution.t:0 "Burmesischer Staatsstreich?"  #NT!
 BUR_1962_revolution.d:0 "Der burmesische Staatsstreich von 1962 markierte den Beginn der Einparteienherrschaft in Burma und die politische Dominanz des Militärs in der burmesischen Politik. Beim Putsch vom 2. März 1962 ersetzte das Militär die zivile AFPFL-Regierung unter Premierminister U Nu sowie den Revolutionsrat der Union unter dem Vorsitz von General Ne Win."  #NT!
 BUR_1974_revolution.t:0 "Burmesischer Weg zum Sozialismus?"  #NT!
 BUR_1974_revolution.d:0 "Der burmesische Weg zum Sozialismus war die Staatsideologie der Sozialistischen Republik der Union Burmas, des sozialistischen Staates, der von 1962 bis 1988 von der Burma Socialist Program Party (BSPP) regiert wurde."  #NT!
 BUR_1988_revolution.t:0 "Der Aufstand von 8888?"  #NT!
 BUR_1988_revolution.d:0 "Der Aufstand 8888 wurde am 8. August 1988 von Studenten in Yangon (Rangun) begonnen. Studentenproteste breiteten sich im ganzen Land aus. Hunderttausende Mönche, Kinder, Studenten, Hausfrauen, Ärzte und einfache Menschen protestierten gegen die Regierung."  #NT!
 BUR_1990_revolution.t:0 "Der Tatmadaw-Putsch?"  #NT!
 BUR_1990_revolution.d:0 "Am 27. Mai 1990 fanden in Myanmar Parlamentswahlen statt, die ersten Mehrparteienwahlen seit 1960, als das Land von einer Militärdiktatur regiert wurde. Das Ergebnis war ein Erdrutschsieg für Aung San Suu Kyis National League for Democracy (NLD), die 392 der 492 Sitze gewann. Die Militärjunta weigerte sich jedoch, die Ergebnisse anzuerkennen und regierte weiterhin über das Land."  #NT!
 BUR_2007_revolution.t:0 "Die Safran-Revolution?"  #NT!
 BUR_2007_revolution.d:0 "Die Safran-Revolution war eine Reihe wirtschaftlicher und politischer Proteste und Demonstrationen, die im August, September und Oktober 2007 in Myanmar stattfanden. Auslöser der Proteste war die Entscheidung der nationalen Militärregierung, Subventionen auf die Verkaufspreise von Treibstoff zu streichen."  #NT!
 BUR_2015_revolution.t:0 "Der Weg zur Demokratie?"  #NT!
 BUR_2015_revolution.d:0 "Am 8. November 2015 fanden Parlamentswahlen statt. Dies waren die ersten offen umkämpften Wahlen in Myanmar seit den Parlamentswahlen von 1990 (die annulliert wurden). Die Ergebnisse verschafften der NLD eine absolute Mehrheit der Sitze in beiden Kammern des nationalen Parlaments, genug, um sicherzustellen, dass ihr Kandidat Präsident werden würde, während NLD-Chefin Aung San Suu Kyi verfassungsmäßig von der Präsidentschaft ausgeschlossen ist."  #NT!
 BUR_2021_revolution.t:0 "Der Tatmadaw-Putsch?"  #NT!
 BUR_2021_revolution.d:0 "Ein Staatsstreich in Myanmar begann am Morgen des 1. Februar 2021, als demokratisch gewählte Mitglieder der Regierungspartei des Landes, der Nationalen Liga für Demokratie (NLD), von der Tatmadaw – Myanmars Militär – abgesetzt wurden, die daraufhin die Macht einer Militärjunta übertrug."  #NT!
  
 CAM_1970_revolution.t:0 "Die Khmer-Republik?"  #NT!
 CAM_1970_revolution.d:0 "Die Khmer-Republik war ein kambodschanischer Staat unter der von den Vereinigten Staaten unterstützten Militärdiktatur von Marschall Lon Nol von 1970 bis 1975. Ihre Gründung wurde am 9. Oktober 1970 offiziell erklärt, nach dem Staatsstreich vom 18. März 1970, der den Sturz der Regierung von Norodom Sihanouk und die Abschaffung der kambodschanischen Monarchie zur Folge hatte."  #NT!
 CAM_1975_revolution.t:0 "Der Aufstieg der Roten Khmer?"  #NT!
 CAM_1975_revolution.d:0 "Kampuchea war von 1975 bis 1979 der kambodschanische Staat unter der totalitären Diktatur von Pol Pot und der Kommunistischen Partei Kampucheas (CPK), allgemein bekannt als die Roten Khmer (KR). Sie wurde nach der Eroberung der Hauptstadt Phnom Penh durch die Roten Khmer gegründet und beendete damit effektiv die von den Vereinigten Staaten unterstützte Khmer-Republik Lon Nol."  #NT!
 CAM_1979_revolution.t:0 "Der Fall von Pol Pot?"  #NT!
 CAM_1979_revolution.d:0 "Nach mehreren Jahren gewaltsamer Überfälle der Roten Khmer auf vietnamesisches Territorium, die zu Massakern führten, marschierte Vietnam im Dezember 1978 in Kambodscha ein. Im Januar 1979 waren Pot und die Roten Khmer gestürzt. Die überlebenden Mitglieder der Roten Khmer zogen sich in die verstreuten Dschungel nahe der thailändischen Grenze zurück, von wo aus sie weiter kämpften und überfielen. Stark geschwächt wurden sie bis zu ihrem Abzug im Jahr 1989 von vietnamesischen Soldaten gejagt."  #NT!
 CAM_1989_revolution.t:0 "Die Pariser Friedensabkommen?"  #NT!
 CAM_1989_revolution.d:0 "Im November 1978 fielen vietnamesische Truppen als Reaktion auf Grenzüberfälle der Roten Khmer in Kambodscha ein und eroberten es. Die Volksrepublik Kampuchea (PRK) wurde als prosowjetischer Staat unter der Führung der Kampuchean People's Revolutionary Party gegründet. Im Gegensatz zum neu geschaffenen Staat wurde 1981 aus drei Fraktionen eine Exilregierung namens Koalitionsregierung des demokratischen Kampuchea (CGDK) gebildet. Die Friedensbemühungen begannen 1989 in Paris unter dem Staat Kambodscha und gipfelten zwei Jahre später, im Oktober 1991, in einer umfassenden Pariser Friedensvereinbarung."  #NT!
 CAM_1993_revolution.t:0 "Die Wiederherstellung der Monarchie?"  #NT!
 CAM_1993_revolution.d:0 "Im November 1978 fielen vietnamesische Truppen als Reaktion auf Grenzüberfälle der Roten Khmer in Kambodscha ein und eroberten es. Die Friedensbemühungen begannen 1989 in Paris unter dem Staat Kambodscha und gipfelten zwei Jahre später, im Oktober 1991, in einer umfassenden Pariser Friedensregelung. Die Vereinten Nationen erhielten das Mandat, einen Waffenstillstand durchzusetzen und sich mit Flüchtlingen und Abrüstung zu befassen, die sogenannte Übergangsbehörde der Vereinten Nationen in Kambodscha (UNTAC). 1993 wurde die Monarchie mit der Wiedereinführung von Norodom Sihanouk als König wiederhergestellt und die ersten Nachkriegswahlen wurden von der UNTAC koordiniert."  #NT!
 CAM_1997_revolution.t:0 "Der kambodschanische Staatsstreich?"  #NT!
 CAM_1997_revolution.d:0 "Der kambodschanische Staatsstreich 1997 fand von Juli bis September 1997 in Kambodscha statt. Infolgedessen verdrängte Co-Premier Hun Sen den anderen Co-Premier Norodom Ranariddh. Bei dem Putsch wurden mindestens 32 Menschen getötet."  #NT!
 CAM_2018_revolution.t:0 "Die Konsolidierung der Macht durch Hun Sen?"  #NT!
 CAM_2018_revolution.d:0 "Auf Befehl von Hun Sen stimmte die Nationalversammlung am 31. Januar 2017 einstimmig für die Abschaffung der Positionen des Minderheitsführers und des Mehrheitsführers, um den Einfluss der Oppositionspartei zu verringern. Am 2. Februar 2017 verbot Hun Sen der Opposition, einige seiner Regierungsminister zu befragen. Darüber hinaus versprach Hun Sen eine Verfassungsänderung, die später zur Auflösung der oppositionellen Kambodscha-Nationalrettungspartei führte. Dieser Schritt führte zum überraschenden Rücktritt des Oppositionsführers Sam Rainsy. Am Sonntag, dem 29. Juli 2018, fanden in Kambodscha Parlamentswahlen zur Wahl der Mitglieder der sechsten Nationalversammlung statt. Sie führten zu einem weithin erwarteten Erdrutschsieg der regierenden Kambodschanischen Volkspartei (CPP), die alle 125 Sitze in der Nationalversammlung gewann."  #NT!
 CAM_2023_revolution.t:0 "Der Aufstieg von Hun Manet?"  #NT!
 CAM_2023_revolution.d:0 "Hun Manet (* 20. Oktober 1977) ist ein kambodschanischer Politiker und Militäroffizier, der seit 2023 Premierminister von Kambodscha und Vizepräsident der regierenden Kambodschanischen Volkspartei (CPP) ist. Er ist das zweite Kind von Hun Sen, dem Präsidenten des Senats und ehemaligen Premierministers, und Bun Rany."  #NT!
  
 IDO_1959_revolution.t:0 "Die geführte Demokratie?"  #NT!
 IDO_1959_revolution.d:0 "Geführte Demokratie war das politische System, das in Indonesien von 1959 bis zum Beginn der Neuen Ordnung im Jahr 1966 galt. Es war die Idee von Präsident Sukarno und war ein Versuch, politische Stabilität herbeizuführen. Sukarno glaubte, dass das während der Zeit der liberalen Demokratie in Indonesien eingeführte parlamentarische System aufgrund der damals uneinigen politischen Situation ineffektiv war. Stattdessen suchte er nach einem System, das auf dem traditionellen dörflichen Diskussions- und Konsenssystem basiert, das unter der Leitung der Dorfältesten stattfand. Mit der Ausrufung des Kriegsrechts und der Einführung dieses Systems kehrte Indonesien zum Präsidialsystem zurück und Sukarno wurde erneut Regierungschef."  #NT!
 IDO_1968_revolution.t:0 "Die neue Ordnung?"  #NT!
 IDO_1968_revolution.d:0 "Ein Putschversuch am 30. September und 1. Oktober 1965 wurde von Suharto-geführten Truppen abgewehrt. Der offiziellen Geschichte der Armee zufolge wurde dieser Versuch von der Kommunistischen Partei Indonesiens (PKI) unterstützt. Anschließend führte die Armee eine landesweite gewaltsame antikommunistische Säuberung durch und Suharto entriss Indonesiens Gründungspräsidenten Sukarno die Macht. Unter seiner „Neuen Ordnung“-Regierung baute Suharto eine starke, zentralisierte und vom Militär dominierte Regierung auf. Was als oligarchische Militärdiktatur begann, entwickelte sich zu einem personalistischen autoritären Regime um Suharto."  #NT!
 IDO_1998_revolution.t:0 "Demokratisierung Indonesiens?"  #NT!
 IDO_1998_revolution.d:0 "Da Suharto zunehmend als Ursache der zunehmenden wirtschaftlichen und politischen Krisen des Landes angesehen wird, sprachen sich prominente politische Persönlichkeiten, darunter der muslimische Politiker Amien Rais, gegen seine Präsidentschaft aus, und im Januar 1998 begannen Universitätsstudenten, landesweite Demonstrationen zu organisieren. Die Krise erreichte ihren Höhepunkt, als Suharto am 12. Mai 1998 auf Staatsbesuch in Ägypten war, als Sicherheitskräfte vier Demonstranten der Trisakti-Universität in Jakarta töteten. Am 21. Mai 1998 gab Suharto seinen Rücktritt bekannt, woraufhin Vizepräsident Habibie gemäß der Verfassung das Präsidentenamt übernahm."  #NT!
  
 MSY_1969_revolution.t:0 "Der Vorfall vom 13. Mai"  #NT!
 MSY_1969_revolution.d:0 "Der Vorfall vom 13. Mai war eine Episode chinesisch-malaiischer sektiererischer Gewalt, die am 13. Mai 1969 in Kuala Lumpur, der Hauptstadt Malaysias, stattfand. Der Aufstand ereignete sich nach den malaysischen Parlamentswahlen 1969, als Oppositionsparteien wie die Democratic Action Party und Gerakan auf Kosten der Regierungskoalition, der Alliance Party, Zuwächse erzielten. Die rassistischen Unruhen führten zur Ausrufung des nationalen Ausnahmezustands durch den Yang di-Pertuan Agong (König), was zur Suspendierung des Parlaments führte. Als Übergangsregierung wurde ein National Operations Council (NOC) gegründet, der das Land zwischen 1969 und 1971 vorübergehend regierte."  #NT!
 MSY_1971_revolution.t:0 "Die malaysische neue Wirtschaftspolitik?"  #NT!
 MSY_1971_revolution.d:0 "Die New Economic Policy (NEP) war ein soziales Umgestaltungs- und Förderprogramm, das vom National Operations Council (NOC) nach dem Vorfall vom 13. Mai in Malaysia formuliert wurde. Fördermaßnahmen für Bumiputera wurden intensiv verfolgt."  #NT!
 MSY_1981_revolution.t:0 "Die neue UMNO?"  #NT!
 MSY_1981_revolution.d:0 "Während Mahathirs erster Amtszeit erlebte Malaysia eine Modernisierung und ein Wirtschaftswachstum, und seine Regierung leitete eine weitreichende Industrieprivatisierung und eine Reihe mutiger Infrastrukturprojekte ein. Mahathir war eine dominante politische Persönlichkeit, gewann fünf aufeinanderfolgende Parlamentswahlen und wehrte mehrere Rivalen um die Führung der UMNO ab. Er zentralisierte die Macht, indem er die Unabhängigkeit der Justiz untergrub und eine Verfassungsänderung unterstützte, die die rechtliche Immunität von Königen aufheben sollte. Er setzte auch die Pro-Bumiputera-Politik fort."  #NT!
 MSY_1998_revolution.t:0 "Die Sodomie-Prozesse gegen Anwar Ibrahim?"  #NT!
 MSY_1998_revolution.d:0 "Während der asiatischen Finanzkrise 1997 unterstützte Anwar als Finanzminister den IWF-Plan. Mahathir machte Währungsspekulanten wie George Soros für die Krise verantwortlich und unterstützte Währungskontrollen und eine strengere Regulierung ausländischer Investitionen. In diesem Jahr spitzten sich die Angelegenheiten zwischen Anwar und Mahathir jedoch rund um die alle vier Jahre stattfindende UMNO-Generalversammlung zu. Anwar wurde am 2. September 1998 aus dem Kabinett entlassen, nachdem die Polizei Berichten zufolge Ermittlungen gegen ihn eingeleitet hatte. Am folgenden Tag wurde er aus der UMNO ausgeschlossen. Munawar Anees, Anwars ehemaliger Redenschreiber, und Sukma Darmawan Sasmita Atmadja, Anwars Adoptivbruder, wurden unter dem Verdacht homosexueller Handlungen festgenommen."  #NT!
 MSY_2018_revolution.t:0 "Der Fall von Najib Razak?"  #NT!
 MSY_2018_revolution.d:0 "Während seiner Amtszeit als Premierminister führte Najib verschiedene Wirtschafts- und Infrastrukturentwicklungsprogramme durch, darunter die Initiative 1Malaysia Development Berhad (1MDB). Seine Führung wurde jedoch durch Korruptionsvorwürfe und die Veruntreuung von Geldern im Zusammenhang mit dem 1MDB-Skandal getrübt, was zu seinem politischen Untergang führte. Im Jahr 2018 erlebte Najibs politische Karriere einen erheblichen Rückschlag, als seine Partei Barisan Nasional die Parlamentswahlen gegen die Koalition Pakatan Harapan verlor. Anschließend wurde er im Zusammenhang mit dem 1MDB-Skandal angeklagt."  #NT!
 MSY_2020_revolution.t:0 "Der Sheraton-Umzug?"  #NT!
 MSY_2020_revolution.d:0 "Die malaysische politische Krise 2020–2022 wurde ausgelöst, nachdem mehrere Abgeordnete des 14. malaysischen Parlaments ihre Parteiunterstützung wechselten, was zum Verlust der parlamentarischen Mehrheit, dem Zusammenbruch zweier aufeinanderfolgender Koalitionsregierungen und dem Rücktritt zweier Premierminister führte. Die politische Krise gipfelte in einer vorgezogenen Parlamentswahl im Jahr 2022 und schließlich der Bildung einer Koalitionsregierung."  #NT!
 MSY_2022_revolution.t:0 "Der Aufstieg von Pakatan Harapan?"  #NT!
 MSY_2022_revolution.d:0 "Nach den Parlamentswahlen 2022, die zu einer Pattsituation im Parlament führten, kehrte die Allianz der Hoffnung mit einer Zweidrittelmehrheit unter Führung des Premierministers und PH-Vorsitzenden Anwar Ibrahim an die Macht zurück, indem sie eine Koalitionsregierung mit der National Front (BN), der Sarawak Parties' Alliance (GPS), der Sabah People's Alliance (GRS), der Heritage Party (WARISAN), der Malaysian People's Party (PBM), der Social Democratic Harmony Party (KDM) und Unabhängigen bildete. Unterdessen lehnte Muhyiddin Yassins Partei Perikatan Nasional den Beitritt zur Koalition ab und übernahm mit 74 Sitzen die Rolle der Opposition."  #NT!
  
 BRU_1967_revolution.t:0 "Die Abdankung von Omar Ali Saifuddien III?"  #NT!
 BRU_1967_revolution.d:0 "Am 4. Oktober 1967 erklärte Omar Ali Saifuddien nach 17-jähriger Herrschaft und längerer Krankheit seine freiwillige Abdankung zugunsten seines 21-jährigen ältesten Sohnes, Kronprinz Hassanal Bolkiah, als dieser das Teenageralter erreichte und ein gewisses Verständnis für die Angelegenheiten der Landesverwaltung erlangt hatte."  #NT!
  
 THI_1957_revolution.t:0 "Der Putsch von Sarit Thanarat?"  #NT!
 THI_1957_revolution.d:0 "Am 13. September 1957 überreichte Sarit Phibun das Ultimatum der Armee. Das von 58 Armeeoffizieren unterzeichnete Ultimatum forderte den Rücktritt der Regierung. Am nächsten Morgen führten Sarit und seine Armee einen Staatsstreich durch. In weniger als einer Stunde eroberte die Armee erfolgreich strategische Punkte ohne Widerstand."  #NT!
 THI_1973_revolution.t:0 "Der thailändische Volksaufstand?"  #NT!
 THI_1973_revolution.d:0 "Der Volksaufstand vom 14. Oktober 1973 war ein Wendepunkt in der Geschichte Thailands. Der Aufstand führte zum Ende der herrschenden Militärdiktatur des antikommunistischen Thanom Kittikachorn und veränderte das politische System Thailands. Insbesondere wurde der wachsende Einfluss thailändischer Universitätsstudenten in der Politik hervorgehoben."  #NT!
 THI_1976_revolution.t:0 "Der thailändische Staatsstreich?"  #NT!
 THI_1976_revolution.d:0 "Nach dem Aufstand herrschte Unruhe und Instabilität sowie die Angst vor einer kommunistischen Machtübernahme nach dem Fall von Saigon im Jahr 1975 und gipfelte im Massaker an der Thammasat-Universität im Oktober 1976.  Ein Staatsstreich an diesem Tag brachte Thailand eine neue ultrarechte Regierung, die hart gegen Medien, Beamte und Intellektuelle vorging und einen kommunistischen Aufstand auslöste."  #NT!
 THI_1980_revolution.t:0 "Die Ernennung von Prem Tinsulanonda?"  #NT!
 THI_1980_revolution.d:0 "Auf einer Welle rechter Gefühle, die durch die Flüchtlingskrise in Indochina, vietnamesische Grenzüberfälle und wirtschaftliche Not angeheizt wurden, reitend, wurde der militärische Machthaber Prem Tinsulanonda 1980 zum Premierminister ernannt. Nach Verhandlungen mit Prem gaben die Kommunisten den Aufstand 1983 auf. Prems Premierministeramt wurde „Halbdemokratie“ genannt, weil das Parlament aus allen gewählten Repräsentantenhäusern und allen ernannten Senaten bestand."  #NT!
 THI_1997_revolution.t:0 "Die Volksverfassung?"  #NT!
 THI_1997_revolution.d:0 "Die Verfassung des Königreichs Thailand, buddhistische Ära 2540 (1997) war eine Verfassung Thailands, die am 11. Oktober 1997 als Ersatz für die Verfassung von 1991 erlassen wurde. Sie wurde weithin als Meilenstein der demokratischen Verfassungsreform Thailands gefeiert und stellte die demokratischste Verfassung in der Geschichte des Landes dar. Mit der Verfassung von 1997 wurde eine Zweikammer-Legislative geschaffen. Zum ersten Mal in der thailändischen Geschichte wurden beide Kammern direkt gewählt."  #NT!
 THI_2006_revolution.t:0 "Der thailändische Staatsstreich?"  #NT!
 THI_2006_revolution.d:0 "Der thailändische Staatsstreich 2006 fand am 19. September 2006 statt, als die Königlich Thailändische Armee einen Staatsstreich gegen die gewählte Übergangsregierung von Premierminister Thaksin Shinawatra durchführte. Der Staatsstreich, der Thailands erster nicht verfassungsgemäßer Regierungswechsel seit fünfzehn Jahren seit dem thailändischen Staatsstreich von 1991 war, folgte auf eine einjährige politische Krise, an der Thaksin, seine Verbündeten und politischen Gegner beteiligt waren, und ereignete sich weniger als einen Monat vor der geplanten landesweiten Parlamentswahl."  #NT!
 THI_2011_revolution.t:0 "Die thailändische Rückkehr zur Demokratie?"  #NT!
 THI_2011_revolution.d:0 "Die Demonstranten der Vereinigten Front für Demokratie gegen Diktatur (UDD) oder „Rothemden“, die im April und Mai 2010 die Innenstadt von Bangkok besetzten, hatten Neuwahlen gefordert. Der Gegenvorschlag der Regierung, am 14. November 2010 Wahlen abzuhalten, wurde von ihnen abgelehnt und es folgte ein gewaltsames Vorgehen, als die Demonstranten sich weigerten, sich aufzulösen. Im Mai 2011 wurden schließlich Wahlen angekündigt."  #NT!
 THI_2014_revolution.t:0 "Der Putsch von Prayuth Chan-o-cha?"  #NT!
 THI_2014_revolution.d:0 "Am 22. Mai 2014 starteten die Königlich Thailändischen Streitkräfte unter der Führung von General Prayut Chan-o-cha, dem Kommandeur der Königlich Thailändischen Armee (RTA), nach sechs Monaten politischer Krise einen Staatsstreich, den zwölften seit dem ersten Staatsstreich des Landes im Jahr 1932, gegen die Übergangsregierung Thailands. Das Militär gründete eine Junta namens National Council for Peace and Order (NCPO), um die Nation zu regieren. Der Putsch beendete den politischen Konflikt zwischen dem vom Militär geführten Regime und der demokratischen Macht, der seit dem thailändischen Staatsstreich 2006, dem sogenannten „unvollendeten Putsch“, bestand."  #NT!
 THI_2023_revolution.t:0 "Die thailändische Rückkehr zur Demokratie?"  #NT!
 THI_2023_revolution.d:0 "Im Mai 2023 gewannen Thailands reformistische Opposition, die progressive Move Forward Party (MFP) und die populistische Pheu-Thai-Partei, die Parlamentswahlen, was bedeutete, dass die royalistisch-militärischen Parteien, die Premierminister Prayuth Chan-ocha unterstützten, die Macht verloren.[121] Am 22. August 2023 wurde Srettha Thavisin von der populistischen Pheu-Thai-Partei Thailands neue Premierministerin und gleichzeitig das milliardenschwere Aushängeschild der Pheu-Thai-Partei Thaksin Shinawatra kehrte nach Jahren im selbst auferlegten Exil nach Thailand zurück."  #NT!
  
 JAP_1947_revolution.t:0 "Die japanische Nachkriegsverfassung?"  #NT!
 JAP_1947_revolution.d:0 "Die Verfassung Japans ist die Verfassung Japans und das oberste Gesetz des Staates. Es wurde hauptsächlich von amerikanischen Zivilbeamten geschrieben, die nach dem Zweiten Weltkrieg unter der alliierten Besatzung Japans arbeiteten. Die aktuelle japanische Verfassung wurde am 3. November 1946 als Änderung der Meiji-Verfassung von 1890 verkündet und trat am 3. Mai 1947 in Kraft."  #NT!
 notice_of_3P_action.option:0 "Es ist, was es ist."  #NT!
 JAP_1955_revolution.t:0 "Das System von 1955?"  #NT!
 JAP_1955_revolution.d:0 "Das System von 1955 war Japans politische Nachkriegsordnung, die nach dem Zusammenschluss der konservativen Parteien im Jahr 1955 von der Liberaldemokratischen Partei dominiert wurde. Dies führte zu einer längeren Einparteienherrschaft, die durch starke Beziehungen zwischen Bürokratie und Wirtschaft, eine klientelistische Verteilung öffentlicher Arbeiten und einen Fraktionswettbewerb innerhalb der LDP gestützt wurde. Es sorgte für politische Stabilität und schnelles Wirtschaftswachstum, stützte sich jedoch auf personalisierte lokale Maschinen und Wahlanreize, die Korruption förderten, und wurde durch Skandale, die Wirtschaftskrise der frühen 1990er Jahre und die Wahlreform allmählich geschwächt."  #NT!
  
 NKO_1994_revolution.t:0 "Der Aufstieg von Kim Jong Il?"  #NT!
 NKO_1994_revolution.d:0 "Kim Jong Il war ein nordkoreanischer Politiker und der zweite oberste Führer Nordkoreas. Er führte Nordkorea vom Tod seines Vaters Kim Il Sung im Jahr 1994 bis zu seinem eigenen Tod im Jahr 2011, als sein Sohn Kim Jong Un seine Nachfolge antrat."  #NT!
 NKO_2012_revolution.t:0 "Der Aufstieg von Kim Jong Un?"  #NT!
 NKO_2012_revolution.d:0 "Kim Jong Un ist ein nordkoreanischer Politiker, der seit 2011 oberster Führer Nordkoreas und seit 2012 Vorsitzender der Arbeiterpartei Koreas (WPK) ist. Er ist der dritte Sohn von Kim Jong Il, der von 1994 bis zu seinem Tod im Jahr 2011 Nordkoreas zweiter oberster Führer war, und Ko Yong Hui."  #NT!
  
 SKO_1960_revolution.t:0 "Die Aprilrevolution?"  #NT!
 SKO_1960_revolution.d:0 "Die Aprilrevolution waren Massenproteste in Südkorea gegen Präsident Syngman Rhee und die Erste Republik vom 11. bis 26. April 1960, die zum Rücktritt von Rhee führten. Auslöser der Proteste war der Fund der Leiche eines örtlichen Gymnasiasten, der bei Demonstrationen gegen manipulierte Wahlen im März von der Polizei getötet wurde. Die Unzufriedenheit der Bevölkerung war aufgrund der autokratischen Herrschaft von Rhee, der Korruption, der Anwendung von Gewalt gegen die politische Opposition und der ungleichmäßigen Entwicklung Südkoreas entstanden."  #NT!
 SKO_1961_revolution.t:0 "Der Putsch vom 16. Mai?"  #NT!
 SKO_1961_revolution.d:0 "Der Militärputsch vom 16. Mai war ein Militärputsch in Südkorea im Jahr 1961, der von Park Chung Hee und seinen Verbündeten organisiert und durchgeführt wurde, die das Militärische Revolutionskomitee bildeten, das nominell vom Stabschef der Armee, Chang Do-yong, geleitet wurde, nachdem dieser am Tag des Putsches zugestimmt hatte. Der Putsch machte die demokratisch gewählte Regierung von Premierminister Chang Myon und Präsident Yun Posun machtlos und beendete die Zweite Republik, indem ein reformistischer militärischer Oberster Rat für den nationalen Wiederaufbau eingesetzt wurde, der tatsächlich von Park geleitet wurde, der nach der Verhaftung von General Chang im Juli den Vorsitz übernahm."  #NT!
 SKO_1972_revolution.t:0 "Die Yushin-Verfassung?"  #NT!
 SKO_1972_revolution.d:0 "Im Oktober 1972 löste Park in einem Selbstputsch die Legislative auf und setzte die Verfassung von 1963 außer Kraft. Anschließend wurde mit der Ausarbeitung einer neuen Verfassung begonnen. Eine neue Verfassung, die sogenannte Yushin-Verfassung, wurde im November 1972 in einer stark manipulierten Volksabstimmung verabschiedet. Park erhielt weitreichende Befugnisse, per Dekret zu regieren und verfassungsmäßige Freiheiten außer Kraft zu setzen. Die Amtszeit des Präsidenten wurde von vier auf sechs Jahre verlängert, wobei die Wiederwahl unbegrenzt war. Im Grunde wurden damit die Notstandsbefugnisse kodifiziert, die Park im vergangenen Jahr ausgeübt hatte, und seine Präsidentschaft in eine legale Diktatur verwandelt."  #NT!
 SKO_1979_revolution.t:0 "Die Ermordung von Park Chung Hee?"  #NT!
 SKO_1979_revolution.d:0 "Park Chung Hee wurde am 26. Oktober 1979 während eines Abendessens im sicheren Haus des koreanischen Geheimdienstes (KCIA) in der Nähe des Präsidentengeländes des Blauen Hauses im Bezirk Jongno, Seoul, Südkorea, ermordet. Kim Jae-gyu, der Direktor der KCIA und Sicherheitschef des Präsidenten, war für das Attentat verantwortlich. Park wurde in die Brust und den Kopf geschossen und starb fast sofort."  #NT!
 SKO_1987_revolution.t:0 "Der demokratische Kampf im Juni?"  #NT!
 SKO_1987_revolution.d:0 "Der Demokratische Kampf im Juni war eine landesweite Pro-Demokratie-Bewegung in Südkorea, die vom 10. bis 29. Juni 1987 Massenproteste auslöste. Die Demonstrationen zwangen die regierende Regierung, direkte Präsidentschaftswahlen abzuhalten und andere demokratische Reformen durchzuführen, was zur Gründung der Sechsten Republik, der heutigen Regierung Südkoreas, führte."  #NT!
 SKO_2016_revolution.t:0 "Die Amtsenthebung von Park Geun-hye?"  #NT!
 SKO_2016_revolution.d:0 "Die Amtsenthebung der südkoreanischen Präsidentin Park Geun-hye war der Höhepunkt eines politischen Skandals, bei dem es um Interventionen ihres Beraters Choi Soon-sil in der Präsidentschaft ging. Ende Oktober 2016 wurde bekannt, dass die Beraterin von Präsidentin Park Geun-hye, Choi Soon-sil, die kein offizielles Amt in der Regierung innehatte, ihre Position genutzt hatte, um Geldspenden von mehreren Unternehmenskonglomeraten (bekannt als Chaebol), darunter Samsung, Hyundai, SK Group und Lotte, an zwei von ihr kontrollierte Stiftungen zu erwirken. Die Amtsenthebungsabstimmung fand am 9. Dezember 2016 statt. 234 Mitglieder der 300-köpfigen Nationalversammlung stimmten für die Amtsenthebung und die vorübergehende Aussetzung der Befugnisse und Pflichten des Präsidenten von Park Geun-hye."  #NT!
 SKO_2024_revolution.t:0 "Das Kriegsrecht?"  #NT!
 SKO_2024_revolution.d:0 "Am 3. Dezember 2024 um 22:27 Uhr koreanischer Standardzeit (KST) erklärte Yoon Suk Yeol, der Präsident Südkoreas, während einer Fernsehansprache das Kriegsrecht. In seiner Erklärung beschuldigte er die Demokratische Partei (DPK), die über eine Mehrheit in der Nationalversammlung verfügt, „staatsfeindliche Aktivitäten“ zu betreiben und mit „nordkoreanischen Kommunisten“ zusammenzuarbeiten, um das Land zu zerstören und so eine „gesetzgebende Diktatur“ zu schaffen. Dieses Ereignis wurde von koreanischen Politikern und Nachrichtenorganisationen im In- und Ausland weitgehend als Putschversuch bezeichnet."  #NT!
 SKO_2024_1_revolution.t:0 "Die Amtsenthebung von Yoon Suk Yeol?"  #NT!
 SKO_2024_1_revolution.d:0 "Am 14. Dezember 2024 wurde Yoon Suk Yeol, der Präsident Südkoreas, von der Nationalversammlung angeklagt. Diese Aktion erfolgte als Reaktion auf Yoons Kriegsrechtserklärung vom 3. Dezember 2024, die von der Nationalversammlung aufgehoben und sechs Stunden später, am 4. Dezember 2024, offiziell zurückgezogen wurde."  #NT!
  
 ROC_1975_revolution.t:0 "Tod von Chiang Kai Shek?"  #NT!
 ROC_1975_revolution.d:0 "1975, 26 Jahre nachdem Chiang nach Taiwan gekommen war, starb er im Alter von 87 Jahren in Taipeh. Er hatte in den vorangegangenen Monaten einen Herzinfarkt und eine Lungenentzündung erlitten und starb am 5. April an Nierenversagen, das durch eine fortgeschrittene Herzinsuffizienz verschlimmert wurde. Chiangs Beerdigung fand am 16. April statt. Yen Chia-kan wurde nach dem Tod von Chiang Kai-shek der zweite Präsident."  #NT!
 ROC_1978_revolution.t:0 "Der Aufstieg von Chiang Ching-kuo?"  #NT!
 ROC_1978_revolution.d:0 "Als Chiang Kai-shek seine letzten Lebensjahre erreichte, übertrug er seinem Sohn nach und nach mehr Verantwortung, und als dieser im April 1975 starb, wurde Vizepräsident Yen Chia-kan für die verbleibende Amtszeit Chiang Kai-sheks Präsident, während Chiang Ching-kuo die Führung der KMT übernahm (er entschied sich für den Titel „Vorsitzender“ und nicht für den Titel „Generaldirektor“ des älteren Chiang). Chiang Ching-kuo wurde am 20. Mai 1978 bei den taiwanesischen Präsidentschaftswahlen 1978 von der Nationalversammlung zum Präsidenten der Republik China gewählt."  #NT!
 ROC_1996_revolution.t:0 "Demokratisierung Taiwans?"  #NT!
 ROC_1996_revolution.d:0 "1987 wurde das Kriegsrecht aufgehoben und Taiwan begann einen Demokratisierungsprozess, der mit der Abschaffung der Übergangsbestimmungen begann und 1996 mit der ersten direkten Präsidentschaftswahl seinen Höhepunkt fand."  #NT!
  
 NVM_1969_revolution.t:0 "Der Aufstieg von Lê Duẩn?"  #NT!
 NVM_1969_revolution.d:0 "Lê Duẩn war ein vietnamesischer kommunistischer Politiker. Ende der 1950er Jahre stieg er in der Parteihierarchie auf und wurde auf dem 3. Nationalkongress 1960 Generalsekretär des Zentralkomitees der Kommunistischen Partei Vietnams (VCP). Er setzte Hồ Chí Minhs Politik der Herrschaft durch kollektive Führung fort. Von Mitte der 1960er Jahre (als sich Hồs Gesundheitszustand verschlechterte) bis zu seinem eigenen Tod im Jahr 1986 war er der oberste Entscheidungsträger in Vietnam."  #NT!
 NVM_1986_revolution.t:0 "Der Aufstieg von Nguyễn Văn Linh?"  #NT!
 NVM_1986_revolution.d:0 "Nguyễn Văn Linh war ein vietnamesischer Revolutionär und Politiker. Nguyễn Văn Linh war von 1986 bis 1991 Generalsekretär der Kommunistischen Partei Vietnams und politischer Führer des Vietcong während des Vietnamkrieges. Während seiner Amtszeit war Linh ein starker Befürworter von „Đổi Mới“ (Renovierung), einem Wirtschaftsplan, dessen Ziel es ist, die vietnamesische Wirtschaft in eine sozialistisch orientierte Marktwirtschaft umzuwandeln. Daher wurde Linh oft als „vietnamesischer Gorbatschow“ angepriesen, nach dem sowjetischen Führer, der die Perestroika einführte."  #NT!
  
 SVM_1955_revolution.t:0 "Referendum über den Staat Vietnam"  #NT!
 SVM_1955_revolution.d:0 "Das Referendum über den Staat Vietnam im Jahr 1955 bestimmte die zukünftige Regierungsform des Staates Vietnam, der Nation, die zur Republik Vietnam (allgemein bekannt als Südvietnam) werden sollte. Es wurde von Premierminister Ngô Đình Diệm angefochten, der eine Republik vorschlug, und dem ehemaligen Kaiser Bảo Đại, der 1945 abgedankt hatte und zum Zeitpunkt des Referendums den Titel eines Staatsoberhauptes innehatte."  #NT!
 SVM_1963_revolution.t:0 "Südvietnamesischer Staatsstreich?"  #NT!
 SVM_1963_revolution.d:0 "Im November 1963 wurden Präsident Ngô Đình Diệm und die Personalistische Arbeiterrevolutionäre Partei Südvietnams von einer Gruppe CIA-unterstützter Offiziere der Armee der Republik Vietnam abgesetzt, die mit Diệms Umgang mit der buddhistischen Krise und der Bedrohung Südvietnams durch Nordvietnamesen und Vietcong nicht einverstanden waren."  #NT!
  
 SRL_1956_revolution.t:0 "Das Sinhala Only Act"  #NT!
 SRL_1956_revolution.d:0 "Das Official Language Act (Nr. 33 von 1956), allgemein als Sinhala Only Act bezeichnet, war ein Gesetz, das 1956 im Parlament von Ceylon verabschiedet wurde. Das Gesetz ersetzte Englisch durch Singhalesisch als einzige Amtssprache von Ceylon, mit Ausnahme von Tamil. Das Gesetz war umstritten, da seine Befürworter darin einen Versuch einer gerade erst unabhängig gewordenen Gemeinschaft sahen, sich von ihren Kolonialherren zu distanzieren, während seine Gegner es als einen Versuch der sprachlichen Mehrheit betrachteten, Minderheiten zu unterdrücken und ihre Vorherrschaft über sie auszuüben."  #NT!
 SRL_1978_revolution.t:0 "Eine starke Präsidentschaft schaffen?"  #NT!
 SRL_1978_revolution.d:0 "Die am 7. September 1978 verkündete neue Verfassung sah ein Einkammerparlament und einen Exekutivpräsidenten vor. Die Amtszeit des Präsidenten und die Amtszeit des Parlaments wurden jeweils auf sechs Jahre festgelegt. Mit der neuen Verfassung wurde auch eine Form der Mehrpersonen-Verhältniswahl für die Parlamentswahlen eingeführt, die aus 196 Mitgliedern bestehen sollte (später wurde sie durch den Vierzehnten Verfassungszusatz auf 225 erhöht)."  #NT!
  
 BNG_1975_revolution.t:0 "Die Ära des Präsidenten?"  #NT!
 BNG_1975_revolution.d:0 "Im Januar 1975 führte Scheich Mujibur Rahman unter BAKSAL die sozialistische Einparteienherrschaft ein. Rahman verbot alle Zeitungen mit Ausnahme von vier staatlichen Publikationen und änderte die Verfassung, um seine Macht zu stärken. Er wurde während eines Putschs am 15. August 1975 ermordet und die Präsidentschaft ging für vier Monate an den Usurpator Khondaker Mostaq Ahmad über. Bangladesch wurde drei Jahre lang von einer Militärjunta unter der Führung des Chief Martial Law Administrator regiert. 1977 wurde Armeechef Ziaur Rahman Präsident."  #NT!
 BNG_1991_revolution.t:0 "Rückkehr zur parlamentarischen Demokratie?"  #NT!
 BNG_1991_revolution.d:0 "Nach den Parlamentswahlen von 1991 wurde durch die zwölfte Verfassungsänderung die parlamentarische Republik wiederhergestellt, und Begum Khaleda Zia wurde Bangladeschs erste weibliche Premierministerin. Zia, eine ehemalige First Lady, leitete von 1990 bis 1996 eine BNP-Regierung. 1991 startete ihr Finanzminister Saifur Rahman ein umfangreiches Programm zur Liberalisierung der bangladeschischen Wirtschaft."  #NT!
 BNG_2009_revolution.t:0 "Der Aufstieg von Sheikh Hasina?"  #NT!
 BNG_2009_revolution.d:0 "Die zweite Amtszeit von Sheikh Hasina war von wirtschaftlicher Misswirtschaft und grassierender Korruption geprägt, was zu steigender Auslandsverschuldung, steigender Inflation, Jugendarbeitslosigkeit und Unregelmäßigkeiten im Bankwesen führte. Es wird allgemein davon ausgegangen, dass Bangladesch unter seiner Amtszeit als Ministerpräsidentin einen demokratischen Rückfall erlebte. Human Rights Watch dokumentierte unter ihrer Regierung weit verbreitetes Verschwindenlassen und außergerichtliche Tötungen. Zahlreiche Politiker und Journalisten wurden systematisch und gerichtlich bestraft, weil sie ihre Ansichten in Frage stellten."  #NT!
 BNG_2024_revolution.t:0 "Die Rückkehr der Demokratie?"  #NT!
 BNG_2024_revolution.d:0 "Hasina trat am 5. August 2024 zurück, als große Demonstrantenmengen die Residenz des Premierministers umstellten. Ihr Rücktritt wurde von General Waker-uz-Zaman, dem Chef des Armeestabs, angekündigt. Später an diesem Tag floh Hasina in einem chaotischen Abflug nach Indien, zuerst mit dem Auto, dann mit dem Hubschrauber und schließlich mit dem Flugzeug. Sie ging ohne Rücktrittsrede. Nach der Auflösung des Parlaments am 6. August 2024 ernannte Bangladeschs Präsident Mohammed Shahabuddin Yunus zum Chef der Übergangsregierung von Bangladesch und kam damit den Forderungen der Studenten nach dem Rücktritt des ehemaligen Premierministers Sheikh Hasina nach."  #NT!
  
 AST_1975_revolution.t:0 "Die White-Australia-Politik beenden?"  #NT!
 AST_1975_revolution.d:0 "Ab den 1950er Jahren begannen die Australier, ihre Einstellung zu Rassenfragen zu überdenken. Eine Bewegung für die Rechte der Aborigines wurde gegründet und von vielen liberalen weißen Australiern unterstützt, und es wurde auch eine Kampagne gegen die Politik des Weißen Australiens gestartet. Das Referendum von 1967 wurde abgehalten und mit überwältigender Mehrheit angenommen, um die Verfassung zu ändern, diskriminierende Verweise zu streichen und dem nationalen Parlament die Befugnis zu geben, Gesetze speziell für indigene Australier zu erlassen. In den 1970er Jahren begannen indigene Australier, in australischen Parlamenten vertreten zu sein."  #NT!
 AST_1999_revolution.t:0 "Das Republik-Referendum"  #NT!
 AST_1999_revolution.d:0 "Das am 6. November 1999 abgehaltene Referendum über die australische Republik war ein Zwei-Fragen-Referendum zur Änderung der Verfassung Australiens. Bei der ersten Frage ging es darum, ob Australien eine Republik mit einem Präsidenten werden sollte, der vom Parlament nach einem parteiübergreifenden Ernennungsmodell ernannt wurde, das von einem halb gewählten, halb ernannten Verfassungskonvent im Februar 1998 in Canberra gebilligt worden war. Die zweite Frage, die im Allgemeinen politisch als weitaus weniger wichtig angesehen wird, fragte, ob Australien die Verfassung ändern sollte, um eine Präambel einzufügen. Das Republik-Referendum wurde abgelehnt."  #NT!
  
 FIJ_1987_revolution.t:0 "Die fidschianischen Staatsstreiche?"  #NT!
 FIJ_1987_revolution.d:0 "Die fidschianischen Staatsstreiche von 1987 führten zum Sturz der gewählten Regierung des fidschianischen Premierministers Timoci Bavadra, zur Absetzung von Elisabeth II. als Königin von Fidschi und zur Ausrufung einer Republik. Der erste Staatsstreich, bei dem Bavadra gestürzt wurde, fand am 14. Mai 1987 statt; Ein zweiter Staatsstreich am 25. September beendete die Monarchie und kurz darauf folgte am 10. Oktober die Ausrufung einer Republik. Beide Militäraktionen wurden von Oberstleutnant Sitiveni Rabuka geleitet, dem damaligen dritten Kommandeur der Royal Fiji Military Forces."  #NT!
 FIJ_2000_revolution.t:0 "Der fidschianische Staatsstreich?"  #NT!
 FIJ_2000_revolution.d:0 "Der Fidschi-Putsch im Jahr 2000 war ein ziviler Staatsstreich hartnäckiger i-Taukei-Nationalisten (ethnischer Fidschianer) gegen die gewählte Regierung des indo-fidschianischen Premierministers Mahendra Chaudhry am 19. Mai 2000. Darauf folgte am 27. Mai ein Versuch von Präsident Ratu Sir Kamisese Mara, die Exekutivgewalt durchzusetzen, und am 29. Mai ein Militärputsch des Militärs der Republik Fidschi Befehlshaber der Streitkräfte, Kommodore Frank Bainimarama."  #NT!
 FIJ_2006_revolution.t:0 "Der fidschianische Staatsstreich?"  #NT!
 FIJ_2006_revolution.d:0 "Der fidschianische Staatsstreich vom Dezember 2006 war ein Staatsstreich in Fidschi, der von Commodore Frank Bainimarama gegen Premierministerin Laisenia Qarase und Präsidentin Josefa Iloilo durchgeführt wurde. Es war der Höhepunkt einer politischen Krise, die im Jahr zuvor begonnen hatte, als die Qarase-Regierung dem fidschianischen Parlament drei Gesetzentwürfe vorlegte. Die Gesetzentwürfe Qoliqoli, Land Tribunal und Reconciliation, Tolerance and Unity befassten sich mit den anhaltenden ethnischen Konflikten in Fidschi und den Folgen des Putschs von 2000 und galten als pro-ethnische Fidschianer. Bainimarama, der Befehlshaber der Streitkräfte der Republik Fidschi (RFMF), legte der Regierung am 16. Oktober eine Liste mit Forderungen vor, die unter anderem die Rücknahme der Gesetzesentwürfe beinhaltete."  #NT!
 FIJ_2014_revolution.t:0 "Die Rückkehr zur Demokratie?"  #NT!
 FIJ_2014_revolution.d:0 "Am 17. September 2014 fanden in Fidschi allgemeine Wahlen zur Auswahl der 50 Parlamentsmitglieder statt.[1][2][3] Die FijiFirst-Partei unter der Führung von Premierminister Frank Bainimarama errang einen Erdrutschsieg und gewann 32 der 50 Sitze. Die Wahlen waren ursprünglich für März 2009 geplant, wurden jedoch verschoben, weil die Politiker der Volkscharta für Wandel, Frieden und Fortschritt nicht zustimmten. Zwischen 2009 und 2014 gab es mehrere öffentliche Ankündigungen und Anträge auf Wahlen, und am 23. März 2014 gab die Übergangsregierung bekannt, dass die Wahlen am 17. September 2014 stattfinden würden."  #NT!
  
 AFG_1973_revolution.t:0 "Die Republik Afghanistan?"  #NT!
 AFG_1973_revolution.d:0 "Der afghanische Staatsstreich von 1973 wurde am 17. Juli 1973 von Armeegeneral und Prinz Mohammad Daoud Khan gegen seinen Cousin, König Mohammad Zahir Shah, angeführt und führte zur Gründung der Republik Afghanistan unter einem von Daoud Khan geführten Einparteiensystem."  #NT!
 AFG_1978_revolution.t:0 "Die Saur-Revolution?"  #NT!
 AFG_1978_revolution.d:0 "Die Saur-Revolution wurde am 27. und 28. April 1978 von der Demokratischen Volkspartei Afghanistans (PDPA) inszeniert und stürzte den afghanischen Präsidenten Mohammed Daoud Khan."  #NT!
 AFG_1979_revolution.t:0 "Der Putsch von Hafizullah Amin?"  #NT!
 AFG_1979_revolution.d:0 "Ein wachsender persönlicher Kampf mit Generalsekretär Taraki führte schließlich dazu, dass Amin ihm die Macht entriss, ihn dann erfolgreich absetzte und später seine Hinrichtung anordnete; Am 16. September 1979 ernannte sich Amin zum Vorsitzenden des Ministerrats (Regierungschef), zum Vorsitzenden des Revolutionsrates (Staatsoberhaupt) und zum Generalsekretär des PDPA-Zentralkomitees (Oberster Führer)."  #NT!
 AFG_1986_revolution.t:0 "Die nationale Versöhnung?"  #NT!
 AFG_1986_revolution.d:0 "Präsident Najibullah startete Anfang 1987 das Programm „Nationale Versöhnung“, dessen Ziel es war, die Nation zu vereinen und den Krieg zu beenden, der die Nation sieben Jahre lang erfasst hatte. Im November 1987 verabschiedete Najibullah erfolgreich eine neue Verfassung für Afghanistan und schuf ein Präsidialsystem mit einem gewählten Zweikammerparlament. Die Verfassung erklärte „die heilige Religion des Islam“ zur offiziellen Religion, garantierte die demokratischen Rechte des Einzelnen, erlaubte die Bildung „politischer Parteien“ und förderte die Gleichstellung der verschiedenen Stämme und Nationalitäten. Im Rahmen der neuen Struktur fanden 1988 nationale Parlamentswahlen zur Wahl der Mitglieder der neuen Nationalversammlung statt, die ersten Wahlen dieser Art in Afghanistan seit 19 Jahren."  #NT!
 AFG_1996_revolution.t:0 "Das Islamische Emirat Afghanistan?"  #NT!
 AFG_1996_revolution.d:0 "Im September 1996 hatten die Taliban Kabul eingenommen, den Präsidenten des Landes getötet und das Islamische Emirat Afghanistan gegründet. Der erste Schritt der Taliban bestand darin, eine strenge Auslegung der Koranlehren und der Rechtsprechung einzuführen."  #NT!
  
 LAO_1975_revolution.t:0 "Der Aufstieg des Pathet Lao?"  #NT!
 LAO_1975_revolution.d:0 "Die Pathet Lao, offiziell die Laotische Volksbefreiungsarmee, war eine kommunistische politische Bewegung und Organisation in Laos, die Mitte des 20. Jahrhunderts gegründet wurde. 1975, nach dem laotischen Bürgerkrieg, eroberte die Gruppe schließlich das gesamte Land."  #NT!
  
 MLY_1955_revolution.t:0 "Vollständige Selbstverwaltung in Malaya?"  #NT!
 MLY_1955_revolution.d:0 "Am Mittwoch, dem 27. Juli 1955, fanden in der Föderation Malaya allgemeine Wahlen statt, die einzigen allgemeinen Wahlen vor der Unabhängigkeit im Jahr 1957. Sie dienten der Wahl von Mitgliedern des Federal Legislative Council, deren Mitglieder zuvor vollständig vom britischen Hochkommissar ernannt worden waren. Gewählt wurde in allen 52 Bundeswahlkreisen, wobei jeweils ein Abgeordneter gewählt wurde. Vom 10. Oktober 1954 bis 12. November 1955 fanden außerdem in allen 136 Staatswahlkreisen in neun Bundesstaaten Malayas und zwei Siedlungen Landtagswahlen statt, bei denen jeweils ein Ratsmitglied in den Staatsrat oder Siedlungsrat gewählt wurde."  #NT!
  
 SGP_1963_revolution.t:0 "Operation Coldstore?"  #NT!
 SGP_1963_revolution.d:0 "Operation Coldstore war der Codename für eine verdeckte Sicherheitsoperation, die am 2. Februar 1963 in Singapur durchgeführt wurde und zur Festnahme von 113 Personen führte, die gemäß der Preservation of Public Service Security Ordinance (PSSO) ohne Gerichtsverfahren inhaftiert wurden. Nach offiziellen Angaben handelte es sich bei der Operation um eine Sicherheitsoperation, die darauf abzielte, die kommunistische Offenfrontorganisation zu schwächen, die die innere Sicherheit Singapurs bedrohte. Die Operation wurde vom Rat für innere Sicherheit genehmigt, der sich aus Vertretern der britischen Regierung, der Regierung Singapurs und der malaysischen Bundesregierung zusammensetzte."  #NT!
 SGP_1990_revolution.t:0 "Rücktritt von Lee Kuan Yew?"  #NT!
 SGP_1990_revolution.d:0 "Nachdem er die PAP in sieben Wahlen zum Sieg geführt hatte, trat Lee am 28. November 1990 zurück und übergab das Amt des Premierministers an Goh Chok Tong. Zu diesem Zeitpunkt war er der am längsten amtierende Premierminister der Welt. Dies war der erste Führungswechsel seit der Unabhängigkeit. Goh wurde von den damals amtierenden jüngeren Ministern zum neuen Premierminister gewählt."  #NT!
 SGP_2004_revolution.t:0 "Premierminister von Lee Hsien Loong?"  #NT!
 SGP_2004_revolution.d:0 "Am 12. August 2004 trat Lee die Nachfolge von Goh Chok Tong als Premierminister an und übergab seinen Vorsitz in der Monetary Authority of Singapore an Goh. Oberster Richter Yong Pung How hatte Lee im Istana vereidigt. Als Premierminister wurde Lee auch Vorsitzender der People's Association. In seinen ersten beiden Jahren führte seine Regierung eine Fünf-Tage-Woche und verlängerte Mutterschaftsurlaubstage ein. Sein Vorschlag, zwei integrierte Resorts in Singapur zu errichten, um die Einnahmen aus dem Tourismus zu steigern, führte zur Entwicklung des Marina Bay Sands and Resorts World Sentosa."  #NT!
 SGP_2024_revolution.t:0 "Premierminister von Lawrence Wong?"  #NT!
 SGP_2024_revolution.d:0 "Am 6. Juni 2022 wurde eine Kabinettsumbildung angekündigt, bei der Wong zum stellvertretenden Premierminister befördert wurde, was seine Position als Nachfolger von Premierminister Lee Hsien Loong weiter festigte. Er wurde nicht nur stellvertretender Premierminister, sondern in Lees Abwesenheit auch zum „amtierenden Premierminister“ ernannt. Wong trat später als Lees offensichtlicher Nachfolger im Amt des Premierministers hervor; Der ursprüngliche Plan des Letzteren, im Alter von 70 Jahren zurückzutreten, war durch Hengs Rückzug erschwert worden. Am 15. April 2024 gab das Büro des Premierministers eine Presseerklärung heraus, in der bestätigt wurde, dass Lawrence Wong die Nachfolge von Lee Hsien Loong als Premierminister antreten würde."  #NT!
  
 PHI_1965_revolution.t:0 "Präsidentschaft von Ferdinand Marcos?"  #NT!
 PHI_1965_revolution.d:0 "Ferdinand Marcos wurde am 30. Dezember 1965 in seine erste Amtszeit als 10. Präsident der Philippinen eingeführt. Seine Amtseinführung markierte den Beginn seiner zwei Jahrzehnte währenden Amtszeit, obwohl die philippinische Verfassung von 1935 nur zwei vierjährige Amtszeiten vorsah. Marcos hatte die philippinische Präsidentschaftswahl 1965 gegen den amtierenden Präsidenten Diosdado Macapagal gewonnen."  #NT!
 PHI_1986_revolution.t:0 "Die Volksmachtrevolution?"  #NT!
 PHI_1986_revolution.d:0 "Die People Power Revolution war eine Reihe von Volksdemonstrationen auf den Philippinen, hauptsächlich in Metro Manila, vom 22. bis 25. Februar 1986. Es gab eine anhaltende Kampagne des zivilen Widerstands gegen Gewalt des Regimes und Wahlbetrug. Die gewaltlose Revolution führte zum Abgang von Ferdinand Marcos, zum Ende seiner 20-jährigen Diktatur und zur Wiederherstellung der Demokratie auf den Philippinen."  #NT!
  
 KAZ_1991_revolution.t:0 "Der Aufstieg von Nursultan Nasarbajew?"  #NT!
 KAZ_1991_revolution.d:0 "Nasarbajews politische Karriere begann in der Sowjetzeit, als er 1962 der Kommunistischen Partei der Sowjetunion beitrat, während er als Arbeiter in einer Stahlfabrik arbeitete. Er stieg in den Parteirängen auf und wurde 1984 Premierminister der Kasachischen SSR und 1989 Erster Sekretär der Kommunistischen Partei Kasachstans. 1990 wählte ihn der Oberste Sowjet zum Präsidenten Kasachstans. Nasarbajew spielte eine Schlüsselrolle bei der Bewältigung Kasachstans durch die Auflösung der Sowjetunion, die 1991 zur Unabhängigkeit des Landes führte. Bei der ersten direkten Präsidentschaftswahl des Landes im Jahr 1991 trat Nasarbajew ohne Opposition auf dem Stimmzettel an und sicherte sich einen überwältigenden Sieg."  #NT!
 KAZ_2019_revolution.t:0 "Der Aufstieg von Kassym-Schomart Tokajew?"  #NT!
 KAZ_2019_revolution.d:0 "Im Jahr 2019 übernahm Tokajew nach dem Rücktritt von Nursultan Nasarbajew das Amt des amtierenden Präsidenten. Als Mitglied der regierenden Amanat-Partei gewann er im Juni desselben Jahres eine vorgezogene Wahl mit der Unterstützung von Nasarbajew als Kandidat der Partei. Während seiner Präsidentschaft hat er mehrere Reformen durchgeführt, darunter die Erhöhung der Arbeitergehälter, die Bekämpfung der Korruption, die Abschaffung der Todesstrafe und die Dezentralisierung der lokalen Regierung. Obwohl es Tokajew gelang, die Stabilität des Landes aufrechtzuerhalten, den politischen Übergang sicherzustellen und neue Reformen durchzuführen, blieb er autoritär und verstieß gegen Menschenrechte."  #NT!
  
 UZB_1991_revolution.t:0 "Der Aufstieg des Islam Karimov?"  #NT!
 UZB_1991_revolution.d:0 "Islam Abduganiyevich Karimov war ein usbekischer Politiker, der von der Unabhängigkeit des Landes im Jahr 1991 bis zu seinem Tod im Jahr 2016 der erste Präsident Usbekistans war. Er regierte ein repressives autoritäres Regime in Usbekistan, in dem politische Gegner ermordet, Menschenrechte unterdrückt und abweichende Meinungen verboten wurden; Allerdings wurde die Todesstrafe 1998 abgeschafft."  #NT!
 UZB_2016_revolution.t:0 "Der Aufstieg von Shavkat Mirziyoyev?"  #NT!
 UZB_2016_revolution.d:0 "Shavkat Miromonovich Mirziyoyev ist ein usbekischer Politiker, der seit dem 14. Dezember 2016 Präsident Usbekistans und Oberbefehlshaber der Streitkräfte Usbekistans ist. Zuvor leitete Mirziyoyev die Regierung von 2003 bis 2016 als Premierminister Usbekistans. Unter seiner Präsidentschaft führte Mirziyoyev eine Reihe liberaler Reformen durch Das politische und wirtschaftliche System Usbekistans wurde durch die Anziehung ausländischer Investitionen, die Verbesserung der Beziehungen zu benachbarten zentralasiatischen Ländern sowie die Freilassung politischer Gefangener gestärkt, was insbesondere mit der Schließung des berüchtigten Jaslyk-Gefängnisses im Jahr 2019 einherging."  #NT!
  
 TKM_1991_revolution.t:0 "Der Aufstieg von Saparmurat Niyazov?"  #NT!
 TKM_1991_revolution.d:0 "Saparmurat Atajewitsch Nijasow war ein turkmenischer Politiker, der Turkmenistan von 1985 bis zu seinem Tod im Jahr 2006 regierte. Er war von 1985 bis 1991 Erster Sekretär der Kommunistischen Partei Turkmenistans und unterstützte 1991 den sowjetischen Putschversuch. Nach der Unabhängigkeit von der Sowjetunion im Jahr 1991 regierte er Turkmenistan als erster Präsident 15 Jahre lang weiter."  #NT!
 TKM_2006_revolution.t:0 "Der Aufstieg von Gurbanguly Berdimuhamedow?"  #NT!
 TKM_2006_revolution.d:0 "Gurbanguly Mälikgulyýewiç Berdimuhamedow ist ein turkmenischer Politiker und ehemaliger Zahnarzt, der Vorsitzender des Volksrats Turkmenistans war. Zuvor war er von 2006 bis 2022 der zweite Präsident Turkmenistans, als er mit seinem Sohn Serdar eine Machtteilungsvereinbarung abschloss."  #NT!
 TKM_2022_revolution.t:0 "Der Aufstieg von Serdar Berdimuhamedow?"  #NT!
 TKM_2022_revolution.d:0 "Serdar Gurbangulyýewiç Berdimuhamedow ist ein turkmenischer Politiker, der seit 2022 als dritter und vierter Präsident Turkmenistans fungierte. Berdimuhamedow hatte zuvor mehrere andere Positionen innerhalb der Regierung seines Vaters Gurbanguly, des langjährigen autoritären Herrschers Turkmenistans, inne. Der Vater und der Sohn schlossen 2022 eine Machtteilungsvereinbarung, durch die sie gemeinsam eine totalitäre Diktatur in Turkmenistan regieren."  #NT!
  
 TAJ_1991_revolution.t:0 "Der Aufstieg von Rahmon Nabiyev?"  #NT!
 TAJ_1991_revolution.d:0 "Rahmon Nabiyevich Nabiyev war ein tadschikischer Politiker, der von 1982 bis 1985 Erster Sekretär der Kommunistischen Partei Tadschikistans und vom 23. September 1991 bis 6. Oktober 1991 sowie vom 2. Dezember 1991 bis 7. September 1992 zweimal Zweiter Präsident Tadschikistans war."  #NT!
 TAJ_1992_revolution.t:0 "Der Aufstieg von Emomali Rahmon?"  #NT!
 TAJ_1992_revolution.d:0 "Emomali Rahmon ist ein tadschikischer Politiker, der seit 1994 Präsident Tadschikistans ist. Rahmon steht in Tadschikistan an der Spitze eines autoritären Regimes mit Elementen eines Personenkults. Politische Gegner werden unterdrückt, Menschenrechte und Freiheiten werden schwerwiegend verletzt, Wahlen sind nicht frei und fair und Korruption und Vetternwirtschaft sind weit verbreitet."  #NT!
  
 KYR_1990_revolution.t:0 "Der Aufstieg von Askar Akajew?"  #NT!
 KYR_1990_revolution.d:0 "Askar Akayevich Akayev ist ein ehemaliger kirgisischer Politiker, der von 1990 bis zu seinem Sturz in der Tulpenrevolution im März 2005 Präsident Kirgisistans war."  #NT!
 KYR_2005_revolution.t:0 "Die Tulpenrevolution?"  #NT!
 KYR_2005_revolution.d:0 "Die Tulpenrevolution, auch als Erste Kirgisische Revolution bekannt, führte zum Sturz des damaligen Präsidenten Kirgisistans, Askar Akajew, von der Macht. Die Revolution begann nach den Parlamentswahlen am 27. Februar und 13. März 2005. Die Revolutionäre behaupteten Korruption und Autoritarismus bei Akayev, seiner Familie und seinen Unterstützern. Akajew floh nach Kasachstan und dann nach Russland."  #NT!
  
 SOV_stalin_succession.t:0 "Stalins Nachfolger?"  #NT!
 SOV_stalin_succession.d:0 "Am 1. März 1953 erlitt Iosif Stalin, der 73-jährige Führer der Sowjetunion, eine Gehirnblutung, an der er vier Tage später starb. Stalins Beisetzung im Kreml war der Anlass für Zehntausende trauernde Sowjetbürger, sich im Zentrum Moskaus zu drängen. Noch während Stalin im Sterben lag, traf sich das Präsidium der Partei, ein erweitertes Gremium, das auf dem Neunzehnten Kongress im Oktober 1952 das Politbüro ersetzt hatte, um zu entscheiden, wer die höchste Autorität ausüben sollte."  #NT!
 SOV_khrushchev.option:0 "Wählen Sie Nikita Chruschtschow"  #NT!
 SOV_beria.option:0 "Wählen Sie Lawrentij Beria"  #NT!
 SOV_molotov.option:0 "Wählen Sie Wjatscheslaw Molotow"  #NT!
 SOV_zhukov.option:0 "Wählen Sie Georgy Schukow"  #NT!
 SOV_khrushchev_succession.t:0 "Der Sturz von Nikita Chruschtschow?"  #NT!
 SOV_khrushchev_succession.d:0 "Chruschtschow genoss in den 1950er Jahren dank großer Siege wie der Suez-Krise, dem Start von Sputnik, der Syrien-Krise von 1957 und dem U-2-Zwischenfall von 1960 starke Unterstützung. In den frühen 1960er Jahren wurde Chruschtschows Popularität jedoch durch Mängel in seiner Politik sowie durch seinen Umgang mit der Kubakrise geschwächt. Dies ermutigte seine potenziellen Gegner, die in aller Stille an Stärke gewannen und ihn im Oktober 1964 absetzten."  #NT!
 SOV_khrushchev_succession_option.1:0 "Chruschtschow wird durch Breschnew ersetzt"  #NT!
 SOV_khrushchev_succession_option.2:0 "Chruschtschow übersteht die Führungsherausforderung!"  #NT!
 SOV_gorbachev_succession.t:0 "Ein reformistischer Generalsekretär?"  #NT!
 SOV_gorbachev_succession.d:0 "Am 10. März 1985 starb Tschernenko. Gromyko schlug Gorbatschow als nächsten Generalsekretär vor und als langjähriges Parteimitglied hatte Gromykos Empfehlung großes Gewicht im Zentralkomitee. Gorbatschow erwartete viel Widerstand gegen seine Ernennung zum Generalsekretär, doch letztendlich unterstützte ihn der Rest des Politbüros. Kurz nach Tschernenkos Tod wählte das Politbüro Gorbatschow einstimmig zu seinem Nachfolger, da sie ihn und keinen anderen älteren Führer haben wollten. Damit wurde er der achte Führer der Sowjetunion. Nur wenige in der Regierung hätten gedacht, dass er ein so radikaler Reformer sein würde, wie er bewiesen hat."  #NT!
 SOV_gorbachev.option:0 "Wir begrüßen einen lebhafteren Anführer!"  #NT!
 SOV_other.option:0 "Wir bevorzugen einen anderen älteren Anführer..."  #NT!
 SOV_august_coup.t:0 "Der Augustputsch"  #NT!
 SOV_august_coup.d:0 "Der Augustputsch war ein gescheiterter Versuch von Hardlinern der Kommunistischen Partei der Sowjetunion, Michail Gorbatschow, dem damaligen sowjetischen Präsidenten und Generalsekretär der Kommunistischen Partei, gewaltsam die Kontrolle über das Land zu entreißen. Zu den Anführern des Putsches gehörten hochrangige Militär- und Zivilbeamte, darunter Vizepräsident Gennadi Janajew, die gemeinsam das Staatskomitee für den Ausnahmezustand (GKChP) bildeten. Sie lehnten Gorbatschows Reformprogramm ab, waren wütend über den Kontrollverlust über die osteuropäischen Staaten und hatten Angst vor dem neuen Unionsvertrag der UdSSR, der kurz vor seiner Unterzeichnung stand. Der Vertrag sah vor, einen Großteil der Macht der zentralen Sowjetregierung zu dezentralisieren und auf ihre fünfzehn Republiken zu verteilen."  #NT!
 SOV_august_coup.optio:0 "Der Putsch scheitert!"  #NT!
 SOV_august_coup_other.option:0 "Der Putsch gelingt."  #NT!
 SOV_khrushchev_thaw.t:0 "Das Chruschtschow-Tauwetter?"  #NT!
 SOV_khrushchev_thaw.d:0 "Das Chruschtschow-Tauwetter ist die Zeit von Mitte der 1950er bis Mitte der 1960er Jahre, in der Repression und Zensur in der Sowjetunion aufgrund der Entstalinisierungspolitik und der friedlichen Koexistenz mit anderen Nationen durch Nikita Chruschtschow gelockert wurden."  #NT!
 SOV_detente.t:0 "Annäherung an den Westen?"  #NT!
 SOV_detente.d:0 "Während seiner achtzehn Jahre als Führer der UdSSR war Breschnews wichtigste außenpolitische Innovation die Förderung der Entspannung. Obwohl Breschnews Politik einige Ähnlichkeiten mit den während des Chruschtschow-Tauwetters verfolgten Ansätzen aufwies, unterschied sie sich in zweierlei Hinsicht erheblich von Chruschtschows Präzedenzfall. Das erste war, dass die Ziele umfassender und weitreichender waren und die Unterzeichnung von Abkommen über Rüstungskontrolle, Krisenprävention, Ost-West-Handel, europäische Sicherheit und Menschenrechte umfassten. Der zweite Teil der Politik basierte auf der Wichtigkeit, die militärische Stärke der Vereinigten Staaten und der Sowjetunion anzugleichen."  #NT!
 SOV_brezhnev_succession.t:0 "Der Tod von Leonid Breschnew"  #NT!
 SOV_brezhnev_succession.d:0 "Nach 1975 verschlechterte sich Breschnews Gesundheitszustand rapide und er zog sich zunehmend aus internationalen Angelegenheiten zurück, behielt aber die Macht. Er starb am 10. November 1982 und sein Nachfolger als Generalsekretär wurde Juri Andropow."  #NT!
 SOV_andropov_succession_option.1:0 "Yuri Andropov ist unsere Zukunft!"  #NT!
 SOV_andropov_succession.t:0 "Der Tod von Juri Andropow"  #NT!
 SOV_andropov_succession.d:0 "Als Andropov im Februar 1983 an Nierenversagen litt, begann sich sein Gesundheitszustand rapide zu verschlechtern. Er starb am 9. Februar 1984, nachdem er das Land etwa 15 Monate lang geführt hatte. Nach dem Tod Breschnews und seines Nachfolgers Juri Andropow wurde Tschernenko im Februar 1984 zum Generalsekretär gewählt und im April 1984 zum Vorsitzenden des Präsidiums des Obersten Sowjets ernannt. Aufgrund seines sich rapide verschlechternden Gesundheitszustands war er oft nicht in der Lage, seine offiziellen Pflichten zu erfüllen."  #NT!
 SOV_chernenko_succession_option.1:0 "Ist Konstantin Tschernenko unsere Zukunft?"  #NT!
 SOV_glasnost.t:0 "Glasnost verabschieden?"  #NT!
 SOV_glasnost.d:0 "Unter Glasnost verstand man mehr Offenheit und Transparenz in staatlichen Institutionen und Aktivitäten in der Sowjetunion (UdSSR). Glasnost spiegelte die Verpflichtung der Gorbatschow-Regierung wider, den Sowjetbürgern die Möglichkeit zu geben, öffentlich über die Probleme ihres Systems und mögliche Lösungen zu diskutieren."  #NT!
 SOV_democratisation.t:0 "Demokratizatsiya verabschieden?"  #NT!
 SOV_democratisation.d:0 "Demokratizatsiya war ein Slogan, der im Januar 1987 vom Generalsekretär der Kommunistischen Partei der Sowjetunion, Michail Gorbatschow, eingeführt wurde und die Einbeziehung „demokratischer“ Elemente in die Einparteienregierung der Sowjetunion forderte. Gorbatschows Demokratizatsiya bedeutete die Einführung von Wahlen mit mehreren Kandidaten – wenn auch nicht mit mehreren Parteien – für lokale Funktionäre der Kommunistischen Partei (KPdSU) und Sowjets. Auf diese Weise hoffte er, die Partei mit fortschrittlichem Personal zu verjüngen, das seine institutionellen und politischen Reformen durchführen würde."  #NT!
  
 PRC_1966_revolution.t:0 "Die Kulturrevolution?"  #NT!
 PRC_1966_revolution.d:0 "Die Kulturrevolution (CR), früher auch als Große Proletarische Kulturrevolution bekannt, war eine gesellschaftspolitische Bewegung in der Volksrepublik China (VR China). Sie wurde 1966 von Mao Zedong ins Leben gerufen und dauerte bis zu seinem Tod 1976. Ihr erklärtes Ziel war die Erhaltung des chinesischen Kommunismus durch die Beseitigung von Überresten kapitalistischer und traditioneller Elemente aus der chinesischen Gesellschaft. Obwohl es ihr nicht gelang, ihre Hauptziele zu erreichen, markierte die CR faktisch die Rückkehr Maos ins Zentrum der Macht."  #NT!
 PRC_1966_revolution.option.1:0 "Säubert die Dissidenten!"  #NT!
 PRC_1966_revolution.option.2:0 "Es macht mir nichts aus, wenn ich dagegen bin ..."  #NT!
 PRC_mao_succession.t:0 "Maos Nachfolger?"  #NT!
 PRC_mao_succession.d:0 "Maos Gesundheitszustand verschlechterte sich in seinen letzten Jahren, wahrscheinlich verschlimmert durch sein Kettenrauchen. Es wurde zu einem Staatsgeheimnis, dass er in seinen späteren Jahren an mehreren Lungen- und Herzbeschwerden litt. Sein letzter öffentlicher Auftritt – und das letzte bekannte Foto von ihm lebend – fand am 27. Mai 1976 statt, als er den besuchenden pakistanischen Premierminister Zulfikar Ali Bhutto traf. Er erlitt zwei schwere Herzinfarkte, einen im März und einen weiteren im Juli, dann einen dritten am 5. September, was ihn zum Invaliden machte. Er starb fast vier Tage später, am 9. September 1976 um 00:10 Uhr Ortszeit, im Alter von 82 Jahren."  #NT!
 PRC_deng.option:0 "Deng Xiaoping soll übernehmen!"  #NT!
 PRC_jing_qing.option:0 "Die Viererbande wird China regieren!"  #NT!
  
 PRC_1989_1_revolution.t:0 "Der Vorfall vom 4. Juni"  #NT!
 PRC_1989_1_revolution.d:0 "Die Proteste auf dem Platz des Himmlischen Friedens, in China als „Zwischenfall vom 4. Juni“ bekannt, waren von Studenten geführte Demonstrationen auf dem Platz des Himmlischen Friedens in Peking, China, die vom 15. April bis 4. Juni 1989 dauerten. Nach wochenlangen erfolglosen Versuchen zwischen den Demonstranten und der chinesischen Regierung, eine friedliche Lösung zu finden, verhängte die chinesische Regierung in der Nacht des 3. Juni das Kriegsrecht und setzte Truppen zur Besetzung des Platzes ein."  #NT!
 PRC_1989_revolution.option.1:0 "In dieser Nacht ist nichts passiert!"  #NT!
 PRC_1989_revolution.option.2:0 "In dieser Nacht ist etwas passiert."  #NT!
  
 PRC_1989_2_revolution.t:0 "Präsidentschaft von Jiang Zemin?"  #NT!
 PRC_1989_2_revolution.d:0 "Jiang wurde 1985 zum Bürgermeister von Shanghai ernannt und 1987 zum Sekretär der Kommunistischen Partei sowie zum Mitglied des Politbüros der KPCh befördert. Jiang kam unerwartet als Kompromisskandidat nach den Protesten und dem Massaker auf dem Platz des Himmlischen Friedens 1989 an die Macht, als er Zhao Ziyang als Generalsekretär der KPCh ablöste, nachdem Zhao wegen seiner Unterstützung der Studentenbewegung gestürzt worden war. Als die Beteiligung der „Acht Ältesten“ an der chinesischen Politik stetig abnahm, festigte Jiang seine Macht und wurde in den 1990er Jahren zum „obersten Führer“ des Landes."  #NT!
  
 PRC_2002_revolution.t:0 "Präsidentschaft von Hu Jintao?"  #NT!
 PRC_2002_revolution.d:0 "Hu kam über die Kommunistische Partei Chinas (KPCh) an die Macht, insbesondere als Parteikomiteesekretär für die Provinz Guizhou und das Autonome Gebiet Tibet, wo ihm seine harte Unterdrückung abweichender Meinungen Aufmerksamkeit auf höchster Ebene verschaffte. Unter dem Generalsekretär der KPCh, Jiang Zemin, stieg er zum Ersten Sekretär des Zentralsekretariats der KPCh und zum Vizepräsidenten auf. Hu war der erste Führer der Kommunistischen Partei, der eine Generation jünger war als diejenigen, die am Bürgerkrieg und der Gründung der Republik beteiligt waren. Einflussreiche Förderer der älteren Generation förderten seinen rasanten Aufstieg."  #NT!
  
 PRC_2012_revolution.t:0 "Präsidentschaft von Xi Jinping?"  #NT!
 PRC_2012_revolution.d:0 "Im Jahr 2008 wurde Xi zum mutmaßlichen Nachfolger von Hu Jintao als oberster Führer ernannt. Xi wurde am 14. März 2013 in einer Bestätigungsabstimmung des 12. Nationalen Volkskongresses in Peking zum Präsidenten gewählt. Er erhielt 2.952 Ja-Stimmen, eine Gegenstimme und drei Enthaltungen. Er ersetzte Hu Jintao, der nach zwei Amtszeiten in den Ruhestand ging."  #NT!
  
 USA_1963_revolution.t:0 "Ermordung von John F. Kennedy?"  #NT!
 USA_1963_revolution.d:0 "Am 22. November 1963 wurde John F. Kennedy, der 35. Präsident der Vereinigten Staaten, ermordet, als er in einer Wagenkolonne des Präsidenten durch Dealey Plaza in Dallas, Texas, fuhr. Kennedy saß mit seiner Frau Jacqueline, dem Gouverneur von Texas, John Connally, und Connallys Frau Nellie im Fahrzeug, als er vom ehemaligen US-Marine Lee Harvey Oswald aus dem nahegelegenen Texas School Book Depository tödlich erschossen wurde."  #NT!
 USA_1964_revolution.t:0 "Das Bürgerrechtsgesetz verabschieden?"  #NT!
 USA_1964_revolution.d:0 "Der Civil Rights Act von 1964 ist ein bahnbrechendes Bürgerrechts- und Arbeitsgesetz in den Vereinigten Staaten, das Diskriminierung aufgrund von Rasse, Hautfarbe, Religion, Geschlecht und nationaler Herkunft verbietet. Es verbietet die ungleiche Anwendung der Wählerregistrierungspflichten, Rassentrennung in Schulen und öffentlichen Unterkünften sowie Diskriminierung am Arbeitsplatz."  #NT!
 USA_1974_revolution.t:0 "Der Watergate-Skandal"  #NT!
 USA_1974_revolution.d:0 "Der Watergate-Skandal war ein großer politischer Skandal in den Vereinigten Staaten, der die Regierung von Präsident Richard Nixon von 1972 bis 1974 betraf und zu Nixons Rücktritt führte. Der Skandal ging auf die Versuche der Nixon-Regierung zurück, ihre Beteiligung am Einbruch am 17. Juni 1972 in das Hauptquartier des Democratic National Committee im Watergate-Bürogebäude in Washington, D.C. zu vertuschen."  #NT!
 USA_1998_revolution.t:0 "Die Amtsenthebung von Bill Clinton?"  #NT!
 USA_1998_revolution.d:0 "Bill Clinton, der 42. Präsident der Vereinigten Staaten, wurde am 19. Dezember 1998 vom US-Repräsentantenhaus des 105. US-Kongresses wegen „schwerer Verbrechen und Vergehen“ angeklagt. Das Repräsentantenhaus verabschiedete zwei Amtsenthebungsverfahren gegen Clinton, wobei die konkreten Anklagepunkte gegen Clinton Lüge unter Eid und Behinderung der Justiz waren. Zwei weitere Artikel waren berücksichtigt worden, wurden jedoch bei der Abstimmung im Repräsentantenhaus abgelehnt. Die genehmigten Anklagepunkte würden am 7. Januar 1999 dem Senat der Vereinigten Staaten vorgelegt. Anschließend begann ein Prozess im Senat unter dem Vorsitz des Obersten Richters William Rehnquist. Am 12. Februar wurde Clinton in beiden Fällen freigesprochen, da keiner von beiden die erforderliche Zweidrittelmehrheit der anwesenden Senatoren für eine Verurteilung und Amtsenthebung erhielt."  #NT!
 USA_2019_revolution.t:0 "Die Amtsenthebung von Donald Trump?"  #NT!
 USA_2019_revolution.d:0 "Die erste Amtsenthebung von Donald Trump (45. Präsident der Vereinigten Staaten) begann am 18. Dezember 2019 während des 116. Kongresses der Vereinigten Staaten, als das Repräsentantenhaus zwei Anklagepunkte gegen Trump verabschiedete: Machtmissbrauch und Behinderung des Kongresses. Am 5. Februar 2020 stimmte der Senat für den Freispruch von Donald Trump."  #NT!
 USA_2020_revolution.t:0 "Den öffentlichen Dienst der USA politisieren?"  #NT!
 USA_2020_revolution.d:0 "Anhang F wurde durch Executive Order 13957 am 21. Oktober 2020 erstellt. Der Zweck der Bestimmung bestand darin, die Kontrolle des Präsidenten über den föderalen Berufsbeamtendienst zu erhöhen. Es wurde weithin kritisiert, weil es Mittel zur Vergeltung politischer Vergeltungsmaßnahmen gegen Bundesbeamte bot. Schätzungen zufolge hätten Zehntausende oder Hunderttausende Berufstätige ihren Schutz im öffentlichen Dienst verloren, was die Zahl der politischen Ernennungen um das Zehnfache erhöht hätte."  #NT!
 USA_2021_revolution.t:0 "Der Aufstand vom 6. Januar?"  #NT!
 USA_2021_revolution.d:0 "Am 6. Januar 2021 wurde das Kapitol der Vereinigten Staaten in Washington, D.C., von einer Menge Anhängern der damaligen US-Regierung angegriffen. Präsident Donald Trump, zwei Monate nach seiner Niederlage bei der Präsidentschaftswahl 2020. Sie versuchten, Trump an der Macht zu halten, indem sie eine gemeinsame Sitzung des Kongresses daran hinderten, die Stimmen des Wahlkollegiums auszuzählen, um den Sieg des gewählten Präsidenten Joe Biden zu formalisieren. Der Angriff konnte letztlich nicht verhindern, dass die Wahlergebnisse zertifiziert wurden."  #NT!
  
 historical_gov_changes.option.1:0 "Folgen Sie dem historischen Weg!"  #NT!
 historical_gov_changes.option.2:0 "Wir werden eine andere Zukunft anstreben"  #NT!
  
 stirrings_of_revolution:0 "Große Unruhen im Inland"  #NT!
  
 soviet_east_germany.indy.t:0 "Mehr Autonomie für Ostdeutschland?"  #NT!
 soviet_east_germany.indy.d:0 "Am 7. Oktober 1949 gründete die SED die Deutsche Demokratische Republik auf der Grundlage einer sozialistischen politischen Verfassung, die ihre Kontrolle über die Antifaschistische Nationale Front der Deutschen Demokratischen Republik festlegte, ein Sammelbündnis aller Parteien und Massenorganisationen in Ostdeutschland. Die NF wurde gegründet, um für die Wahl in die Volkskammer, das ostdeutsche Parlament, zu kandidieren. Der erste und einzige Präsident der Deutschen Demokratischen Republik war Wilhelm Pieck. Nach 1950 lag die politische Macht in Ostdeutschland jedoch beim Ersten Sekretär der SED, Walter Ulbricht."  #NT!
 soviet_baltic_states.indy.t:0 "Unabhängigkeit der baltischen Staaten?"  #NT!
 soviet_baltic_states.indy.d:0 "In den späten 1980er Jahren begann eine massive Kampagne des zivilen Widerstands gegen die Sowjetherrschaft, die als „Singende Revolution“ bekannt ist. Am 23. August 1989 erstreckte sich der Baltische Weg, eine zwei Millionen Menschen starke Menschenkette, über 600 km von Tallinn nach Vilnius. Die Sowjetunion erkannte am 6. September 1991 die Unabhängigkeit dreier baltischer Staaten an."  #NT!
 soviet_weaken_eastern_bloc.indy.t:0 "Die Sinatra-Doktrin?"  #NT!
 soviet_weaken_eastern_bloc.indy.d:0 "Historisch gesehen war die Sinatra-Doktrin eine sowjetische Außenpolitik unter Michail Gorbatschow, die es den Mitgliedstaaten des Warschauer Paktes ermöglichte, ihre inneren Angelegenheiten selbst zu bestimmen. Der Name spielte scherzhaft auf das von Frank Sinatra populär gemachte Lied „My Way“ an – die Sowjetunion erlaubte diesen Staaten, ihren eigenen Weg zu gehen. Ihre Umsetzung war Teil von Gorbatschows Doktrin des neuen politischen Denkens."  #NT!
 soviet_weaken_eastern_bloc.indy.f:0 "Dieses Ereignis wurde ausgelöst, weil [ROOT.GetCountry.GetName] entweder zahlungsunfähig ist, keine gesunde Wirtschaft hat oder eine Revolution hat und einen demokratischen Herrscher hat."  #NT!
 eastern_bloc_revolution.t:0 "Ende des Kommunismus in [ROOT.GetCountry.GetNameNoFlag]?"  #NT!
 eastern_bloc_revolution.d:0 "Historisch gesehen waren die Revolutionen von 1989, auch bekannt als der Fall des Kommunismus, eine revolutionäre Welle liberaler Demokratiebewegungen, die zum Zusammenbruch der meisten marxistisch-leninistischen Regierungen im Ostblock und anderen Teilen der Welt führte."  #NT!
 eastern_bloc_revolution.f:0 "Dieses Ereignis wurde ausgelöst, weil [ROOT.GetCountry.GetName] entweder die historischen Anforderungen erfüllt hat oder sich entweder in Zahlungsverzug befindet, keine gesunde Wirtschaft hat oder eine revolutionäre politische Bewegung hat, die die Demokratie unterstützt."  #NT!
 sino_soviet_split.t:0 "Die chinesisch-sowjetische Spaltung?"  #NT!
 sino_soviet_split_prc.t:0 "Die chinesisch-sowjetische Spaltung"  #NT!
 sino_soviet_split.d:0 "Die chinesisch-sowjetische Spaltung war die allmähliche Verschlechterung der Beziehungen zwischen China und der Sowjetunion, die durch doktrinäre Divergenzen verursacht wurde, die sich aus ihren unterschiedlichen Interpretationen und praktischen Anwendungen des Marxismus-Leninismus ergaben und durch ihre jeweilige Geopolitik während des Kalten Krieges von 1947–1991 beeinflusst wurden. In den späten 1950er und frühen 1960er Jahren entwickelten sich die chinesisch-sowjetischen Debatten über die Interpretation des orthodoxen Marxismus zu konkreten Auseinandersetzungen über die Politik der Sowjetunion zur nationalen Entstalinisierung und internationalen friedlichen Koexistenz mit dem Westblock, die der chinesische Gründervater Mao Zedong als Revisionismus bezeichnete."  #NT!
 sino_soviet_split_ussr.f:0 "Dieses Ereignis wurde ausgelöst, weil [concept_ruler] von [SCOPE.sCountry('communist_china_scope').GetName] nicht mit [concept_ruler] von [ROOT.GetCountry.GetName] kompatibel ist."  #NT!
 sino_soviet_split.f:0 "Dieses Ereignis wurde ausgelöst, weil [concept_ruler] von [SCOPE.sCountry('sino_soviet_split_ussr').GetName] nicht mit [concept_ruler] von [ROOT.GetCountry.GetName] kompatibel ist."  #NT!
 yugoslav_soviet_split.t:0 "Die sowjetisch-jugoslawische Spaltung"  #NT!
 yugoslav_soviet_split.d:0 "Die Tito-Stalin-Spaltung oder die sowjetisch-jugoslawische Spaltung war der Höhepunkt eines Konflikts zwischen den politischen Führungen Jugoslawiens und der Sowjetunion unter Josip Broz Tito bzw. Joseph Stalin in den Jahren nach dem Zweiten Weltkrieg. Obwohl der Konflikt von beiden Seiten als ideologischer Streit dargestellt wurde, war er ebenso das Ergebnis eines geopolitischen Kampfes auf dem Balkan, an dem auch Albanien, Bulgarien und der kommunistische Aufstand in Griechenland beteiligt waren, den Titos Jugoslawien unterstützte und die Sowjetunion insgeheim ablehnte."  #NT!
 yugoslav_soviet_split_ussr.f:0 "Dieses Ereignis wurde ausgelöst, weil [concept_ruler] von [SCOPE.sCountry('communist_yugoslavia_scope').GetName] nicht mit [concept_ruler] von [ROOT.GetCountry.GetName] kompatibel ist."  #NT!
 soviet_east_germany_1.indy.t:0 "Die Gründung Ostdeutschlands?"  #NT!
 soviet_east_germany_1.indy.d:0 "Die Gründung der DDR fand am 7. Oktober 1949 statt, und in den folgenden Tagen fanden eine Reihe damit verbundener Ereignisse statt, darunter die Bildung der Provisorischen Volkskammer, der Staatenkammer und der Provisorischen Regierung der DDR sowie die Wahl von Wilhelm Pieck zum ersten Präsidenten. Während der Existenz der Deutschen Demokratischen Republik wurde das Gründungsereignis alljährlich mit dem Tag der Republik, einem Feiertag, gefeiert."  #NT!
  
 eastern_europe_indy.option.1:0 "Lass sie freier sein."  #NT!
 eastern_europe_indy.option.2:0 "Sie verdienen keine Freiheit!"  #NT!
 sino_soviet_split.option.1:0 "Genug der Argumente, brechen Sie mit den Sowjets!"  #NT!
 sino_soviet_split.option.2:0 "Lassen Sie die Unterschiede weiter bestehen ..."  #NT!
 sino_soviet_split.option.3:0 "Wir mochten die Chinesen sowieso nie!"  #NT!
 yugoslav_soviet_split.option.1:0 "Genug der Argumente, brechen Sie mit Jugoslawien!"  #NT!
 yugoslav_soviet_split.option.2:0 "Lassen Sie die Unterschiede weiter bestehen ..."  #NT!
 yugoslav_soviet_split.option.3:0 "Wir mochten die Sowjets sowieso nie!"  #NT!
  
 weaken_the_warsaw_pact.tt:0 "Den Warschauer Pakt schwächen"  #NT!
  
 algerian_war.t:0 "Der algerische Unabhängigkeitskrieg"  #NT!
 algerian_war.d:0 "Der Algerienkrieg war ein großer bewaffneter Konflikt zwischen Frankreich und der Algerischen Nationalen Befreiungsfront von 1954 bis 1962, der zur Unabhängigkeit Algeriens von Frankreich führte. Es handelte sich um einen wichtigen Entkolonialisierungskrieg und einen komplexen Konflikt, der von Guerillakriegen und Kriegsverbrechen geprägt war."  #NT!
 angolan_war.t:0 "Der angolanische Unabhängigkeitskrieg"  #NT!
 angolan_war.d:0 "Der angolanische Unabhängigkeitskrieg, in Angola als Luta Armada de Libertação Nacional bekannt, begann als Aufstand gegen den Zwangsanbau von Baumwolle und entwickelte sich zu einem parteiübergreifenden Kampf um die Kontrolle über Portugals Überseeprovinz Angola zwischen drei nationalistischen Bewegungen und einer separatistischen Bewegung."  #NT!
 mozambican_war.t:0 "Der mosambikanische Unabhängigkeitskrieg"  #NT!
 mozambican_war.d:0 "Der mosambikanische Unabhängigkeitskrieg war ein bewaffneter Konflikt zwischen den Guerillakräften der Mosambikanischen Befreiungsfront (FRELIMO) und Portugal. Der Krieg begann offiziell am 25. September 1964 und endete mit einem Waffenstillstand am 8. September 1974, was 1975 zu einer ausgehandelten Unabhängigkeit führte."  #NT!
 bissau_guinean_war.t:0 "Der Unabhängigkeitskrieg zwischen Guinea und Bissau"  #NT!
 bissau_guinean_war.d:0 "Der Guinea-Bissau-Unabhängigkeitskrieg oder auch Bissau-Guinea-Unabhängigkeitskrieg war ein bewaffneter Unabhängigkeitskonflikt, der von 1963 bis 1974 in Portugiesisch-Guinea stattfand."  #NT!
 cameroonian_war.t:0 "Der Kameruner Unabhängigkeitskrieg"  #NT!
 cameroonian_war.d:0 "Der Kamerunkrieg ist der Name des Unabhängigkeitskampfes zwischen der nationalistischen Bewegung Kameruns und Frankreich. Angeführt wurde die Bewegung von der Kamerunischen Volksunion. Auch nach der Unabhängigkeit ging der Aufstand weiter und prägte die zeitgenössische Politik."  #NT!
 namibian_war.t:0 "Der namibische Unabhängigkeitskrieg"  #NT!
 namibian_war.d:0 "Der südafrikanische Grenzkrieg, auch als namibischer Unabhängigkeitskrieg bekannt und in Südafrika manchmal als angolanischer Bush-Krieg bezeichnet, war ein weitgehend asymmetrischer Konflikt, der vom 26. August 1966 bis zum 21. März 1990 in Namibia (damals Südwestafrika), Sambia und Angola stattfand."  #NT!
 kenyan_war.t:0 "Der Kenia-Notfall"  #NT!
 kenyan_war.d:0 "Der Mau-Mau-Aufstand, auch bekannt als Mau-Mau-Aufstand, Mau-Mau-Aufstand oder Kenia-Notfall, war ein Krieg in der britischen Kolonie Kenia zwischen der Kenya Land and Freedom Army, auch bekannt als Mau Mau, und den britischen Behörden."  #NT!
 cypriot_war.t:0 "Der Zypern-Notstand"  #NT!
 cypriot_war.d:0 "Der Zypern-Notstand war ein Konflikt, der zwischen November 1955 und März 1959 in Britisch-Zypern ausgetragen wurde. Die National Organization of Cypriot Fighters (EOKA), eine griechisch-zypriotische rechtsnationalistische Guerillaorganisation, startete 1955 eine bewaffnete Kampagne zur Unterstützung des Endes der britischen Kolonialherrschaft und der Vereinigung Zyperns und Griechenlands (Enosis). Zypern. Der Zypern-Notstand endete 1959 mit der Unterzeichnung des London-Zürich-Abkommens."  #NT!
 malayan_emergency.t:0 "Der malaiische Notfall"  #NT!
 malayan_emergency.d:0 "Der Malayan Emergency war ein Guerillakrieg, der in Britisch-Malaya zwischen kommunistischen Unabhängigkeitskämpfern der Malayan National Liberation Army und den Streitkräften der Federation of Malaya, des British Empire und des Commonwealth ausgetragen wurde."  #NT!
 Malagasy_war.t:0 "Der madagassische Aufstand"  #NT!
 Malagasy_war.d:0 "Der madagassische Aufstand war ein madagassischer nationalistischer Aufstand gegen die französische Kolonialherrschaft in Madagaskar, der von März 1947 bis Februar 1949 dauerte. Am Abend des 29. März 1947 starteten madagassische Nationalisten koordinierte Überraschungsangriffe, die hauptsächlich mit Speeren bewaffnet waren, gegen Militärstützpunkte und französische Plantagen im östlichen Teil der Insel, die sich um Moramanga und Manakara konzentrierten. Die nationalistische Sache wurde im Süden schnell angenommen und breitete sich im darauffolgenden Monat auf das zentrale Hochland und die Hauptstadt Antananarivo aus. Die Zahl der madagassischen nationalistischen Kämpfer wird auf über eine Million geschätzt."  #NT!
  
 historical_colonial_wars.option.1:0 "Zerschlage ihre unbedeutende Rebellion!"  #NT!
 historical_colonial_wars.option.2:0 "Geben Sie den Rebellen nach"  #NT!
  
 eritrean_war.t:0 "Der eritreische Unabhängigkeitskrieg"  #NT!
 eritrean_war.d:0 "Der eritreische Unabhängigkeitskrieg war ein Unabhängigkeitskrieg, den eritreische Unabhängigkeitskämpfer vom 1. September 1961 bis zum 24. Mai 1991 gegen aufeinanderfolgende äthiopische Regierungen führten."  #NT!
 congolese_war.t:0 "Die Kongo-Krise"  #NT!
 congolese_war.d:0 "Die Kongokrise war eine Zeit politischer Unruhen und Konflikte zwischen 1960 und 1965 in der Republik Kongo. Die Krise begann fast unmittelbar nach der Unabhängigkeit des Kongo von Belgien und endete inoffiziell mit der Herrschaft des gesamten Landes unter der Herrschaft von Joseph-Désiré Mobutu."  #NT!
 yugoslav_war.SLO.t:0 "Unabhängigkeit Sloweniens?"  #NT!
 yugoslav_war.SLO.d:0 "Slowenien erklärte am 25. Juni 1991 seine Unabhängigkeit und verließ die Sozialistische Föderative Republik Jugoslawien. In einem Referendum am 23. Dezember 1990 stimmten 88,2 % der slowenischen Wähler für die Unabhängigkeit."  #NT!
 yugoslav_war.CRO.t:0 "Unabhängigkeit Kroatiens?"  #NT!
 yugoslav_war.CRO.d:0 "Am 25. Juni 1991 erklärte das Land seine Unabhängigkeit von der SFRJ und beendete damit seine Bemühungen, seinen Status als konstituierende Republik zu beenden."  #NT!
 yugoslav_war.BOS.t:0 "Unabhängigkeit Bosniens?"  #NT!
 yugoslav_war.BOS.d:0 "Einer Souveränitätserklärung am 15. Oktober 1991 folgte am 29. Februar und 1. März 1992 ein Referendum über die Unabhängigkeit von Jugoslawien. Das Referendum wurde von der großen Mehrheit der bosnischen Serben boykottiert, sodass die Wahlbeteiligung bei 64 % lag und 98 % für den Vorschlag stimmten."  #NT!
 yugoslav_war.KOS.t:0 "Unabhängigkeit des Kosovo?"  #NT!
 yugoslav_war.KOS.d:0 "Die Provinzversammlung, die 1989 von den serbischen Behörden aufgelöst worden war, deren albanische Mitglieder sich jedoch weiterhin im Untergrund trafen, erklärte die Republik Kosova am 22. September 1991 zum souveränen und unabhängigen Staat. Über 99 % der Wähler stimmten für die Unabhängigkeit, bei einer Wahlbeteiligung von 87 %."  #NT!
 yugoslav_war.MCD.t:0 "Unabhängigkeit Mazedoniens?"  #NT!
 yugoslav_war.MCD.d:0 "In einem öffentlichen Referendum am 8. September 1991 sprachen sich 95 % der Wähler für die Unabhängigkeit Mazedoniens aus. Ethnische Albaner boykottierten das Referendum aus Protest gegen ihren vermeintlich minderwertigen Verfassungsstatus. Anfang Oktober verabschiedete der Verfassungsausschuss einen endgültigen Entwurf der neuen Verfassung."  #NT!
 chechen_war.RUS.t:0 "Unabhängigkeit Tschetscheniens?"  #NT!
 chechen_war.RUS.d:0 "Der Erste Tschetschenienkrieg, auch Erster Russisch-Tschetschenienkrieg genannt, war ein Unabhängigkeitskampf der Tschetschenischen Republik Itschkerien gegen die Russische Föderation vom 11. Dezember 1994 bis zum 31. August 1996."  #NT!
 kurdish_war.IRQ.t:0 "Kurdische Unabhängigkeit?"  #NT!
 kurdish_war.IRQ.d:0 "Bei den irakischen Aufständen von 1991 handelte es sich um ethnische und religiöse Aufstände gegen das Regime von Saddam Hussein im Irak, die von Schiiten und Kurden angeführt wurden. Die Aufstände dauerten von März bis April 1991, nachdem nach dem Ende des Golfkriegs ein Waffenstillstand geschlossen worden war."  #NT!
 gazan_war.PAL.t:0 "Die Schlacht um Gaza?"  #NT!
 gazan_war.PAL.d:0 "Am 7. Oktober 2023 kam es zu einem bewaffneten Konflikt zwischen Israel und von der Hamas geführten palästinensischen militanten Gruppen, der vor allem im und um den Gazastreifen stattfand. Er begann, als die Hamas vom Gazastreifen aus einen Überraschungsangriff auf Südisrael startete."  #NT!
 cypriot_war.CYP.t:0 "Der nordzypriotische Aufstand"  #NT!
 cypriot_war.CYP.d:0 "Das Zypernproblem ist ein anhaltender Streit zwischen der griechisch-zyprischen Gemeinschaft, die die Republik Zypern regiert, und der türkisch-zyprischen Gemeinschaft im Norden der Insel, wo Truppen der Republik Türkei stationiert sind."  #NT!
 isis_war.t:0 "Der ISIS-Aufstand"  #NT!
 isis_war.d:0 "Der Islamische Staat erlangte 2014 weltweite Bedeutung, als seine Militanten mit Unterstützung des syrischen Bürgerkriegs große Gebiete im Nordwesten des Irak und in Ostsyrien eroberten. Bis Ende 2015 herrschte sie über ein Gebiet mit einer geschätzten Bevölkerung von zwölf Millionen Menschen, setzte dort ihre Auslegung des islamischen Rechts durch, verwaltete ein Jahresbudget von mehr als einer Milliarde US-Dollar und hatte mehr als 30.000 Kämpfer unter ihrem Kommando. Nach Jahren intensiver und erbitterter Kämpfe mit amerikanischen, irakischen und kurdischen Streitkräften hatte es 2019 alle seine Gebiete im Nahen Osten verloren und kehrte in den einst von ihm kontrollierten Regionen zu Aufstandstaktiken zurück."  #NT!
 biafran_war.NGE.t:0 "Der Biafran-Krieg?"  #NT!
 biafran_war.NGE.d:0 "Der Biafra-Krieg war ein Bürgerkrieg zwischen Nigeria und der Republik Biafra, einem sezessionistischen Staat, der 1967 seine Unabhängigkeit von Nigeria erklärt hatte. Biafra vertrat die nationalistischen Bestrebungen der Igbo-Volksgruppe, deren Führung das Gefühl hatte, sie könne nicht länger mit der Bundesregierung koexistieren, die von den Interessen der muslimischen Hausa-Fulanis im Norden Nigerias dominiert wird."  #NT!
 bougainville_war.PNG.t:0 "Der Bougainville-Konflikt"  #NT!
 bougainville_war.PNG.d:0 "Der Bougainville-Konflikt, auch Bougainville-Bürgerkrieg genannt, war ein vielschichtiger bewaffneter Konflikt, der von 1988 bis 1998 in der Provinz Nord-Salomonen in Papua-Neuguinea (PNG) zwischen PNG und den sezessionistischen Kräften der Bougainville Revolutionary Army (BRA) sowie zwischen der BRA und anderen bewaffneten Gruppen auf Bougainville ausgetragen wurde."  #NT!
 Cabinda_war.ANG.t:0 "Der Cabinda-Krieg"  #NT!
 Cabinda_war.ANG.d:0 "Der Cabinda-Krieg ist ein separatistischer Aufstand, der von der Front zur Befreiung der Enklave Cabinda (FLEC) gegen die Regierung Angolas geführt wird. FLEC zielt auf die Wiederherstellung der selbsternannten Republik Cabinda ab, die innerhalb der Grenzen der Provinz Cabinda in Angola liegt."  #NT!
 Tigray_war.ETH.t:0 "Der Tigray-Krieg"  #NT!
 Tigray_war.ETH.d:0 "Der Tigray-Krieg war ein bewaffneter Konflikt, der vom 3. November 2020 bis zum 3. November 2022 andauerte. Der Krieg wurde hauptsächlich in der Region Tigray in Äthiopien zwischen mit der äthiopischen Bundesregierung und Eritrea verbündeten Streitkräften auf der einen Seite und der Tigray People's Liberation Front (TPLF) auf der anderen Seite ausgetragen."  #NT!
 yemeni_war.YEM.t:0 "Der jemenitische Bürgerkrieg"  #NT!
 yemeni_war.YEM.d:0 "Der jemenitische Bürgerkrieg ist ein multilateraler Bürgerkrieg, der Ende 2014 hauptsächlich zwischen dem von Rashad al-Alimi geführten Presidential Leadership Council und dem von Mahdi al-Mashat geführten Supreme Political Council sowie ihren Unterstützern und Verbündeten begann. Beide behaupten, die offizielle Regierung des Jemen zu bilden. Der Bürgerkrieg begann im September 2014, als Huthi-Truppen die Hauptstadt Sanaa einnahmen, woraufhin die Huthi rasch die Regierung übernahmen."  #NT!
 Aceh_war.IDO.t:0 "Der Aufstand in Aceh"  #NT!
 Aceh_war.IDO.d:0 "Der Aufstand in Aceh war ein Konflikt, den die Bewegung „Freies Aceh“ (GAM) zwischen 1976 und 2005 mit dem Ziel ausfocht, die Provinz Aceh von Indonesien unabhängig zu machen. Die Nachwirkungen einer starken Militäroffensive im Jahr 2003 und des Erdbebens im Indischen Ozean im Jahr 2004 brachten ein Friedensabkommen und ein Ende des Aufstands."  #NT!
 Kurdish_war.IRQ.t:0 "Der kurdische Aufstand"  #NT!
 Kurdish_war.IRQ.d:0 "Bei den irakischen Aufständen von 1991 handelte es sich um ethnische und religiöse Aufstände gegen das Regime von Saddam Hussein im Irak, die von Schiiten und Kurden angeführt wurden. Die Aufstände dauerten von März bis April 1991, nachdem nach dem Ende des Golfkriegs ein Waffenstillstand geschlossen worden war. Der größtenteils unkoordinierte Aufstand wurde durch die Wahrnehmung angeheizt, dass der irakische Präsident Saddam Hussein anfällig für einen Regimewechsel geworden sei."  #NT!
 LTTE_war.SRL.t:0 "Der Bürgerkrieg in Sri Lanka"  #NT!
 LTTE_war.SRL.d:0 "Der Bürgerkrieg in Sri Lanka war ein Bürgerkrieg, der von 1983 bis 2009 in Sri Lanka ausgetragen wurde. Er begann am 23. Juli 1983 und war ein zeitweiser Aufstand der von Velupillai Prabhakaran angeführten Liberation Tigers of Tamil Eelam (LTTE, auch bekannt als Tamil Tigers) gegen die Regierung. Aufgrund der anhaltenden Diskriminierung und gewaltsamen Verfolgung srilankischer Tamilen durch die singhalesisch dominierte srilankische Regierung kämpfte die LTTE für die Schaffung eines unabhängigen tamilischen Staates namens Tamil Eelam im Nordosten der Insel."  #NT!
 Darfur_war.SUD.t:0 "Der Krieg in Darfur"  #NT!
 Darfur_war.SUD.d:0 "Der Krieg in Darfur war ein großer bewaffneter Konflikt in der Region Darfur im Sudan, der im Februar 2003 begann, als die Rebellengruppen Sudan Liberation Movement (SLM) und Justice and Equality Movement (JEM) begannen, gegen die sudanesische Regierung zu kämpfen, der sie vorwarfen, die nichtarabische Bevölkerung Darfurs zu unterdrücken."  #NT!
 Zapatista_Uprising.t:0 "Der zapatistische Aufstand"  #NT!
 Zapatista_Uprising.d:0 "Am 1. Januar 1994 koordinierte die Zapatistische Armee der Nationalen Befreiung (EZLN) einen 12-tägigen Aufstand im mexikanischen Bundesstaat Chiapas aus Protest gegen die Verabschiedung des Nordamerikanischen Freihandelsabkommens. Die Rebellen besetzten Städte und Gemeinden in Chiapas, ließen Gefangene frei und zerstörten Grundbucheinträge. Nach Kämpfen mit der mexikanischen Armee und der Polizei wurde am 12. Januar ein Waffenstillstand ausgehandelt. Rund 300 Menschen kamen ums Leben."  #NT!
 moro_war.PHI.t:0 "Der Moro-Konflikt"  #NT!
 moro_war.PHI.d:0 "Der Moro-Konflikt war ein Aufstand in der Region Mindanao auf den Philippinen, an dem mehrere bewaffnete Gruppen beteiligt waren. Die Grundursache des Moro-Konflikts liegt in einer langen Geschichte des Widerstands des Bangsamoro-Volkes gegen die Fremdherrschaft, einschließlich der amerikanischen Annexion der Philippinen im Jahr 1898."  #NT!
 CCW_war.ROC.t:0 "Die Schlacht um die Insel Hainan"  #NT!
 CCW_war.ROC.d:0 "Die Schlacht um die Insel Hainan ereignete sich 1950, in der Endphase des chinesischen Bürgerkriegs. Die Volksrepublik China (VR China) führte am 16. April einen amphibischen Angriff auf die Insel Hainan durch, unterstützt von der kommunistischen Bewegung Hainans, die einen Großteil des Inselinneren kontrollierte, während die Republik China (ROC) die Küste kontrollierte; Ihre Streitkräfte konzentrierten sich im Norden in der Nähe von Haikou und mussten sich nach der Landung nach Süden zurückziehen. Bis Ende des Monats sicherten die Kommunisten die südlichen Städte Hainans und erklärten am 1. Mai den Sieg."  #NT!
 chinese_civil_wars.option.1:0 "Stoppen Sie den Krieg in Hainan"  #NT!
 chinese_civil_wars.option.2:0 "Nach Hainan, dann nach Taiwan!"  #NT!
 maluku_war.IDO.t:0 "Der Süd-Maluku-Aufstand"  #NT!
 maluku_war.IDO.d:0 "Die weitgehend protestantischen und pro-niederländischen Süd-Molukken, die seit langem Truppen zur Königlich Niederländischen Ostindischen Armee (KNIL) gestellt hatten, misstrauten der javanischen und muslimisch dominierten Republik Indonesien und erklärten am 25. April 1950 die Unabhängigkeit der Republik Süd-Maluku in Ambon und Seram. Dies wurde von Sukarno nicht anerkannt und auf seinen Befehl hin fiel das indonesische Militär auf der Molukkeninsel Buru und einem Teil der Insel ein Ceram."  #NT!
 khuzestan_war.PER.t:0 "Der Khuzestan-Aufstand"  #NT!
 khuzestan_war.PER.d:0 "Der Khuzestan-Aufstand von 1979 war einer der landesweiten Aufstände im Iran, die nach der iranischen Revolution ausbrachen. Die Unruhen wurden durch arabische Autonomieforderungen genährt. Der Aufstand wurde von iranischen Sicherheitskräften effektiv niedergeschlagen, wobei auf beiden Seiten mehr als hundert Menschen getötet wurden."  #NT!
 azawad_war.MAL.t:0 "Der Mali-Krieg"  #NT!
 azawad_war.MAL.d:0 "Am 22. März 2012 wurde Präsident Amadou Toumani Touré durch einen Staatsstreich wegen seines Umgangs mit der Krise gestürzt, einen Monat bevor eine Präsidentschaftswahl stattfinden sollte. Aufständische Soldaten, die sich „Nationales Komitee zur Wiederherstellung von Demokratie und Staat“ (CNRDR) nannten, übernahmen die Kontrolle und setzten die Verfassung Malis außer Kraft. Als Folge der Instabilität nach dem Putsch wurden die drei größten Städte im Norden Malis – Kidal, Gao und Timbuktu – an drei aufeinanderfolgenden Tagen von den Rebellen überrannt. Am 5. April 2012, nach der Einnahme von Douentza, erklärte die MNLA, sie habe ihre Ziele erreicht und brach ihre Offensive ab. Am folgenden Tag proklamierte es die Unabhängigkeit Nordmalis vom Rest des Landes und benannte es in Azawad um."  #NT!
 kurdish_war.PER.t:0 "Der kurdische Aufstand"  #NT!
 kurdish_war.PER.d:0 "Der kurdische Aufstand im Iran im Jahr 1979 war einer der größten landesweiten Aufstände des Landes gegen den neuen Staat nach der iranischen Revolution. Der kurdische Aufstand begann Mitte März, nur zwei Monate nach dem Ende der Revolution, und war einer der heftigsten kurdischen Aufstände im modernen Iran."  #NT!
 balochistan_war.PAK.t:0 "Der Belutschistan-Aufstand"  #NT!
 balochistan_war.PAK.d:0 "Der Vierte Belutschistan-Konflikt war ein vierjähriger militärischer Konflikt in Belutschistan, der größten Provinz Pakistans, zwischen der pakistanischen Armee und belutschischen Separatisten und Stammesangehörigen, der von 1973 bis 1977 andauerte. Der Konflikt begann 1973, kurz nachdem der damalige pakistanische Präsident Zulfikar Ali Bhutto die gewählte Provinzregierung Belutschistans unter dem Vorwand entlassen hatte, dass in der irakischen Botschaft angeblich Waffen entdeckt worden seien Belutschische Rebellen. Der darauffolgende Protest gegen die Entlassung der ordnungsgemäß gewählten Regierung führte auch zu Forderungen nach einer Abspaltung Belutschistans, denen Bhutto den Befehl gab, die pakistanische Armee in die Provinz zu schicken."  #NT!
 chechen_war_2.RUS.t:0 "Der Zweite Tschetschenienkrieg"  #NT!
 chechen_war_2.RUS.d:0 "Der Zweite Tschetschenienkrieg fand von August 1999 bis April 2009 in Tschetschenien und den Grenzregionen des Nordkaukasus zwischen der Russischen Föderation und der abtrünnigen Tschetschenischen Republik Itschkerien statt. Im August 1999 infiltrierten abtrünnige Islamisten aus Tschetschenien Dagestan in Russland. Später im September kam es in russischen Städten zu Bombenanschlägen auf Wohnungen, bei denen über 300 Menschen getötet wurden. Die russischen Behörden machten schnell Tschetschenen für die Bombenanschläge verantwortlich, obwohl kein Tschetschene, weder Feldkommandant noch sonst jemand, die Verantwortung für die Angriffe übernahm. Während des ersten Feldzugs standen russische Militärs und pro-russische tschetschenische paramilitärische Kräfte tschetschenischen Separatisten im offenen Kampf gegenüber und eroberten die tschetschenische Hauptstadt Grosny nach einer Winterbelagerung, die von Dezember 1999 bis Februar 2000 dauerte."  #NT!
 bosnian_war.BOS.t:0 "Der Bosnienkrieg"  #NT!
 bosnian_war.BOS.d:0 "Der Bosnienkrieg war ein internationaler bewaffneter Konflikt, der zwischen 1992 und 1995 in Bosnien und Herzegowina stattfand. Es wird allgemein angenommen, dass der Krieg am 6. April 1992 begann, nachdem es zuvor zu mehreren gewalttätigen Zwischenfällen gekommen war. Es endete am 14. Dezember 1995 mit der Unterzeichnung des Dayton-Abkommens. Die Hauptkriegsparteien waren die Streitkräfte der Republik Bosnien und Herzegowina, der Republik Herzeg-Bosnien und der Republika Srpska, wobei die beiden letztgenannten Einheiten Protostaaten waren, die von Kroatien bzw. Serbien angeführt und versorgt wurden."  #NT!
 tajikistani_war.TAJ.t:0 "Der tadschikistanische Bürgerkrieg"  #NT!
 tajikistani_war.TAJ.d:0 "Der tadschikische Bürgerkrieg begann im Mai 1992 und endete im Juni 1997. Regionale Gruppen aus den Regionen Garm und Gorno-Badakhshan in Tadschikistan erhoben sich gegen die neu gebildete Regierung von Präsident Rahmon Nabiyev, die von Menschen aus den Regionen Khujand und Kulob dominiert wurde. Die Rebellengruppen wurden von einer Kombination aus liberal-demokratischen Reformern und Islamisten angeführt, die sich später unter dem Banner der Vereinigten Tadschikischen Opposition organisierten."  #NT!
 angolan_war.ANG.t:0 "Der angolanische Bürgerkrieg"  #NT!
 angolan_war.ANG.d:0 "Der angolanische Bürgerkrieg war ein Bürgerkrieg in Angola, der 1975 begann und mit Unterbrechungen bis 2002 andauerte. Der Krieg begann unmittelbar nach der Unabhängigkeit Angolas von Portugal im November 1975. Es war ein Machtkampf zwischen zwei ehemaligen antikolonialen Guerillabewegungen, der kommunistischen Volksbewegung für die Befreiung Angolas (MPLA) und der antikommunistischen Nationalen Union für die völlige Unabhängigkeit Angolas (UNITA)."  #NT!
 mozambican_war.MOZ.t:0 "Der mosambikanische Bürgerkrieg"  #NT!
 mozambican_war.MOZ.d:0 "Der mosambikanische Bürgerkrieg war ein Bürgerkrieg, der von 1977 bis 1992 in Mosambik ausgetragen wurde und auf eine Kombination aus lokalen Konflikten und den polarisierenden Auswirkungen der Politik des Kalten Krieges zurückzuführen war. Die Kämpfe fanden zwischen Mosambiks regierender Marxistischer Befreiungsfront Mosambiks (FRELIMO), den antikommunistischen Aufständischen des Mosambikanischen Nationalen Widerstands (RENAMO) und einer Reihe kleinerer Fraktionen wie PRM, UNAMO, COREMO, UNIPOMO und FUMO statt."  #NT!
 Casamance_war.SEN.t:0 "Der Casamance-Konflikt"  #NT!
 Casamance_war.SEN.d:0 "Der Casamance-Konflikt ist ein langjähriger separatistischer Kampf im Süden Senegals, der seit 1982 aktiv ist. Der Konflikt, der sich um die Bewegung der Demokratischen Kräfte der Casamance (MFDC) dreht, ist auf regionale Beschwerden über Marginalisierung, Landrechte und kulturelle Identität zurückzuführen. Casamance, geografisch isoliert und ethnisch unterschiedlich, strebt nach Autonomie von der Zentralregierung. Obwohl die intensiven Kämpfe in den 1990er Jahren ihren Höhepunkt erreichten, blieb die Gewalt auf einem niedrigen Niveau, mit sporadischen Zusammenstößen und Landminendrohungen."  #NT!
 kashmir_insurgency_war.t:0 "Der Kaschmir-Aufstand"  #NT!
 kashmir_insurgency_war.d:0 "Im Jahr 1989 kam es in Jammu und Kaschmir zu Aufständen, als die Desillusionierung gegenüber den politischen Institutionen den bewaffneten Aufstand anheizte. Die Entführung von Rubiya Sayeed durch die Jammu and Kashmir Liberation Front symbolisierte die Unruhen. Mit Unterstützung Pakistans griffen militante Gruppen Beamte und Zivilisten an und lösten jahrzehntelange Konflikte aus, die die regionale Geopolitik und Sicherheit veränderten."  #NT!
 sudan_civil_war_2023.t:0 "Der sudanesische Bürgerkrieg"  #NT!
 sudan_civil_war_2023.d:0 "Seit dem 15. April 2023 herrscht im Sudan ein aktiver Bürgerkrieg zwischen zwei rivalisierenden Fraktionen der Militärregierung des Landes. An dem Konflikt ist die international anerkannte Regierung beteiligt, die von den sudanesischen Streitkräften (SAF) unter der Führung von General Abdel Fattah al-Burhan kontrolliert wird und aus Armee, Marine, Luftwaffe und Republikanischer Garde besteht. und die paramilitärischen Rapid Support Forces (RSF), angeführt von General Hemedti, der die breitere Janjaweed-Koalition anführt."  #NT!
  
 historical_civil_wars.option.1:0 "Beginnen Sie den Krieg!"  #NT!
 historical_civil_wars.option.2:0 "Wählen Sie die friedliche Option."  #NT!
  
 historical_abolish_monarchy.t:0 "Die [SCOPE.sCountry('monarch_home_country').GetAdjective]-Monarchie abschaffen?"  #NT!
 historical_abolish_monarchy.d:0 "[SCOPE.sCountry('abolishing_monarchy_country').GetName] ist derzeit eine Monarchie mit einem [SCOPE.sCountry('monarch_home_country').GetAdjective] Monarchen. In dieser historischen Periode wurde die Monarchie jedoch durch einen [SCOPE.sCountry('abolishing_monarchy_country').GetAdjective] Präsidenten ersetzt. Sollten wir der Geschichte folgen und dasselbe tun?"  #NT!
 historical_abolish_monarchy.option.1:0 "Ja, die Monarchie ist ein nutzloses Relikt der Vergangenheit."  #NT!
 historical_abolish_monarchy.option.2:0 "Nein, wir lieben die Monarchie!"  #NT!
  
 1950_recession.t:0 "Die Nachkriegsrezession"  #NT!
 1950_recession.d:0 "Die Rezession von 1949 war ein kurzer wirtschaftlicher Abschwung, der kurz nach den „Fair Deal“-Wirtschaftsreformen von Präsident Truman einsetzte. Es wird gesagt, dass die Nachwirkungen des Endes des Zweiten Weltkriegs die Hauptursache für die Rezession waren."  #NT!
 1950_recession.f:0 "Dies ist eine spielinterne Ausrede dafür, warum die Wirtschaft etwa ein Jahr braucht, um sich zu stabilisieren."  #NT!
 1971_bretton_woods_system.t:0 "Ende des Bretton-Woods-Systems?"  #NT!
 1971_bretton_woods_system.d:0 "Eine negative Zahlungsbilanz, wachsende Staatsschulden aufgrund des Vietnamkriegs und der Great-Society-Programme sowie die Geldinflation durch die Federal Reserve führten dazu, dass der Dollar zunehmend überbewertet wurde. Im Jahr 1971 wurden in Washington immer mehr Dollars gedruckt und dann ins Ausland gepumpt, um die Staatsausgaben für Militär- und Sozialprogramme zu finanzieren. In den ersten sechs Monaten des Jahres 1971 flohen Vermögenswerte im Wert von 22 Milliarden US-Dollar aus den USA. Als Reaktion darauf erließ Nixon am 15. August 1971 die Executive Order 11615, mit der das Goldfenster einseitig geschlossen wurde und der Dollar, außer auf dem freien Markt, nicht mehr direkt in Gold konvertierbar war."  #NT!
 1971_bretton_woods_system.f:0 "Dies ist ein historisches Ereignis."  #NT!
 1971_bretton_woods_system.1:0 "Beenden Sie das Bretton-Woods-System"  #NT!
 1971_bretton_woods_system.2:0 "Behalten Sie das System unbedingt bei!"  #NT!
 2000_new_year.t:0 "Beginn eines neuen Jahrtausends"  #NT!
 2000_new_year.d:0 "2000 (MM) war ein Jahrhundertschaltjahr, das am Samstag des Gregorianischen Kalenders begann. Das Jahr 2000 wird manchmal als „Y2K“ abgekürzt (das „Y“ steht für „Jahr“ und das „K“ für „Kilo“, was „Tausend“ bedeutet). Das Jahr 2000 war Gegenstand von Y2K-Befürchtungen, bei denen es sich um Befürchtungen handelt, dass Computer nicht korrekt von 1999 auf 2000 umsteigen würden. Bis Ende 1999 hatten viele Unternehmen jedoch bereits auf neue oder aktualisierte bestehende Software umgestellt. Einige haben sogar die Y2K-Zertifizierung erhalten. Aufgrund des enormen Aufwands traten relativ wenige Probleme auf."  #NT!
 2000_new_year.f:0 "Wenn das Jahr 2000 uns dabei helfen kann, in die Zukunft zu gehen, ist das in Ordnung, aber ich fürchte, dass die Leute es als einen Schlusspunkt betrachten und dass man hinterher tief durchatmen kann – das geht nicht."  #NT!
 communist_economic_liberalisation.t:0 "Sozialismus mit [ROOT.GetCountry.GetAdjectiveNoFlag] Merkmalen?"  #NT!
 communist_economic_liberalisation.d:0 "Aufgrund des schlechten Zustands der [ROOT.GetCountry.GetAdjectiveNoFlag]-Wirtschaft wurde vorgeschlagen, dass die Regierung die Volkswirtschaft liberalisiert, um die vollständig geplante Wirtschaft zu beenden und private Unternehmen zuzulassen. Eine solche Vorgehensweise verspricht, die aktuellen wirtschaftlichen Probleme des Landes zu lösen."  #NT!
 communist_economic_liberalisation.f:0 "Dieses Ereignis wurde ausgelöst, weil die [ROOT.GetCountry.GetAdjectiveNoFlag]-Wirtschaft ungesund ist."  #NT!
 SOV_Kosygin_Reforms.t:0 "Die Kossygin-Wirtschaftsreform?"  #NT!
 SOV_Kosygin_Reforms.d:0 "Die Kossygin-Wirtschaftsreform war eine Reihe geplanter Veränderungen in der Wirtschaft der UdSSR. Ein Kernstück dieser Veränderungen war die Einführung von Rentabilität und Umsatz als zwei Schlüsselindikatoren für den Unternehmenserfolg. Ein Teil der Gewinne eines Unternehmens würde in drei Fonds fließen, die zur Belohnung von Arbeitnehmern und zur Ausweitung des Betriebs verwendet würden, der größte Teil würde in den Zentralhaushalt fließen. Sie spiegelten einige seit langem hegte Wünsche der mathematisch orientierten Wirtschaftsplaner der UdSSR wider und leiteten den Wandel hin zu einer stärkeren Dezentralisierung im Prozess der Wirtschaftsplanung ein."  #NT!
 Indian_Economic_Liberalisation.t:0 "Wirtschaftsliberalisierung in Indien?"  #NT!
 Indian_Economic_Liberalisation.d:0 "Die wirtschaftliche Liberalisierung in Indien bezieht sich auf eine Reihe politischer Änderungen, die darauf abzielen, die Wirtschaft des Landes für die Welt zu öffnen, mit dem Ziel, sie stärker marktorientiert und konsumorientiert zu gestalten. Ziel war es, die Rolle privater und ausländischer Investitionen zu stärken, die als Mittel zur Erzielung von Wirtschaftswachstum und Entwicklung angesehen wurden. Obwohl 1966 und Anfang der 1980er Jahre einige Liberalisierungsversuche unternommen wurden, wurde 1991 eine umfassendere Liberalisierung eingeleitet."  #NT!
 HUN_NEM_Reforms.t:0 "Der neue Wirtschaftsmechanismus?"  #NT!
 HUN_NEM_Reforms.d:0 "Der Neue Wirtschaftsmechanismus (NEM) war eine große Wirtschaftsreform, die 1968 in der Volksrepublik Ungarn eingeleitet wurde. Zwischen 1972 und 1978 wurde sie durch den vorherrschenden Wind der Ostblockpolitik eingeschränkt. Im folgenden Jahrzehnt, bis die Revolutionen von 1989 die Ära beendeten, wirkten sich die Prinzipien der NEM weiterhin auf die ungarische Wirtschaft aus, selbst in Fällen, in denen der Name NEM nicht hervorgehoben wurde. Aufgrund des NEM hatte Ungarn in den 1980er Jahren ein höheres Verhältnis von Marktmechanismen zu zentraler Planung als jede andere Volkswirtschaft des Ostblocks."  #NT!
 PRC_GLF_Reforms.t:0 "Der große Sprung nach vorne?"  #NT!
 PRC_GLF_Reforms.d:0 "Der Große Sprung nach vorn war eine wirtschaftliche und soziale Kampagne in der Volksrepublik China (VRC) von 1958 bis 1962, die von der Kommunistischen Partei Chinas (KPCh) angeführt wurde. Parteivorsitzender Mao Zedong startete die Kampagne, das Land durch die Bildung von Volkskommunen von einer Agrarwirtschaft zu einer Industriegesellschaft umzubauen. Mao verfügte, dass die Bemühungen zur Steigerung der Getreideerträge und zur Ansiedlung der Industrie auf dem Land verstärkt werden sollten."  #NT!
 SOV_VLC_Reforms.t:0 "Die Virgin-Lands-Kampagne?"  #NT!
 SOV_VLC_Reforms.d:0 "Die Virgin Lands-Kampagne war Nikita Chruschtschows Plan aus dem Jahr 1953, die landwirtschaftliche Produktion der Sowjetunion drastisch anzukurbeln, um die Nahrungsmittelknappheit der sowjetischen Bevölkerung zu lindern. Hunderttausende junge Freiwillige besiedelten und bewirtschafteten Gebiete in Westsibirien und Nordkasachstan. Obwohl sich das Vorhaben schließlich zu einer gewaltigen Katastrophe für die sowjetische Landwirtschaft entwickelte, war es zunächst erfolgreich."  #NT!
 EGR_NES_Reforms.t:0 "Das neue Wirtschaftssystem"  #NT!
 EGR_NES_Reforms.d:0 "Das Neue Wirtschaftssystem war eine Wirtschaftspolitik, die 1963 von der regierenden Sozialistischen Einheitspartei (SED) der Deutschen Demokratischen Republik (DDR) umgesetzt wurde. Ihr Zweck bestand darin, das System der Fünfjahrespläne zu ersetzen, mit dem die Wirtschaft der DDR ab 1951 gesteuert wurde. Das System wurde von Walter Ulbricht eingeführt, um zu versuchen, die Leistung der bestehenden zentralen Planung zu verbessern, damit die Wirtschaft so effizient wie möglich geführt werden kann."  #NT!
 SOV_economic_perestroika.t:0 "Das Genossenschaftsgesetz?"  #NT!
 SOV_economic_perestroika.d:0 "Das im Mai 1988 erlassene Genossenschaftsgesetz war vielleicht die radikalste Wirtschaftsreform zu Beginn der Gorbatschow-Ära. Zum ersten Mal seit der Abschaffung der Neuen Wirtschaftspolitik Wladimir Lenins im Jahr 1928 erlaubte das Gesetz den Privatbesitz von Unternehmen im Dienstleistungs-, Fertigungs- und Außenhandelssektor."  #NT!
 BUL_NEM_Reforms.t:0 "Das neue Managementsystem?"  #NT!
 BUL_NEM_Reforms.d:0 "Konkrete Anreize für Reformen waren der Mangel an Arbeitskräften und Energie sowie die wachsende Bedeutung des Außenhandels in den Tauwetterjahren Mitte der 1960er Jahre. Folglich leitete 1962 mit dem Vierten Fünfjahresplan eine Ära der Wirtschaftsreformen ein, die eine Reihe neuer Ansätze für das alte Ziel eines intensiven Wachstums brachte. In der Industrie wurde 1964 das „Neue Managementsystem“ eingeführt, das bis 1968 Bestand hatte. Dieser Ansatz zielte darauf ab, Wirtschaftseinheiten zu rationalisieren und Unternehmensleitern mehr Verantwortung für die Leistung zu übertragen."  #NT!
 CHI_USA_Investment.t:0 "Ausländische Investitionen in China fördern?"  #NT!
 CHI_USA_Investment.d:0 "Während des Kalten Krieges wurde ein bedeutender Teil des Handels Chinas mit der Dritten Welt durch Zuschüsse, Kredite und andere Formen der Unterstützung finanziert. Nach Mao Zedongs Tod im Jahr 1976 wurden diese Bemühungen jedoch zurückgefahren. Danach wurde der Handel mit Entwicklungsländern vernachlässigbar, obwohl sich in dieser Zeit sowohl Hongkong als auch Taiwan zu wichtigen Handelspartnern entwickelten. Seit Beginn der Wirtschaftsreformen Ende der 1970er Jahre versuchte China, sein Außenhandelssystem zu dezentralisieren, um sich in das internationale Handelssystem zu integrieren."  #NT!
 DAI_USA_Investment.t:0 "Ausländische Investitionen in Vietnam fördern?"  #NT!
 DAI_USA_Investment.d:0 "Im Jahr 1990 wurde das Gesetz über Privatunternehmen erlassen, das eine Rechtsgrundlage für Privatunternehmen bildete, während im Gesellschaftsrecht Aktiengesellschaften und Gesellschaften mit beschränkter Haftung anerkannt wurden. Im selben Jahr begann die Partei, über das Potenzial einer Privatisierung staatseigener Unternehmen (SOEs) zu diskutieren und gleichzeitig die Beziehungen zur Volksrepublik China zu normalisieren. Anschließend wurde in der Verfassung von 1992 die Rolle des privaten Sektors offiziell anerkannt. Während der Außenhandel zentral vom Staat kontrolliert wurde, begann der Staat, die Kontrolle über den Außenhandel zu lockern."  #NT!
 SOV_USA_Investment.t:0 "Ausländische Investitionen in der Sowjetunion fördern?"  #NT!
 SOV_USA_Investment.d:0 "Gorbatschow brachte die Perestroika in den Außenwirtschaftssektor der Sowjetunion mit Maßnahmen, die sowjetische Ökonomen damals für mutig hielten. Sein Programm beseitigte praktisch das Monopol, das das Außenhandelsministerium einst auf die meisten Handelsgeschäfte innehatte. Es ermöglichte den Ministerien der verschiedenen Industrie- und Landwirtschaftszweige, den Außenhandel in Sektoren zu betreiben, die in ihrem Verantwortungsbereich lagen, anstatt indirekt über die Bürokratie der Organisationen der Handelsministerien agieren zu müssen. Darüber hinaus war es regionalen und lokalen Organisationen sowie einzelnen Staatsunternehmen gestattet, Außenhandel zu betreiben."  #NT!
 PRC_LRR_Reforms.t:0 "Die Landreformbewegung?"  #NT!
 PRC_LRR_Reforms.d:0 "Die Landreformbewegung war eine vom Führer der Kommunistischen Partei Chinas (KPCh) Mao Zedong angeführte Massenbewegung in der Spätphase des chinesischen Bürgerkriegs nach dem Ende des Zweiten Chinesisch-Japanischen Krieges im Jahr 1945 und in der frühen Volksrepublik China, die eine Landumverteilung an die Bauernschaft durchsetzte. Grundbesitzern, deren Status theoretisch durch den Prozentsatz ihres Einkommens aus Ausbeutung im Gegensatz zu Arbeitseinkommen definiert wurde, wurde ihr Land beschlagnahmt und sie wurden Opfer von Massentötungen durch die KPCh und ehemalige Pächter, wobei die geschätzte Zahl der Todesopfer zwischen Hunderttausenden und Millionen lag."  #NT!
 NVM_LRR_Reforms.t:0 "Die Landreformkampagne?"  #NT!
 NVM_LRR_Reforms.d:0 "Im Jahr 1953 wurde eine Reihe von Dekreten und Gesetzen zur Landreform erlassen. Das VWP-Zentralkomitee prüfte die Möglichkeit, zur letzten Phase der Landrevolution überzugehen: der Umverteilung landwirtschaftlicher Flächen, auf die das wichtigste Landreformgesetz folgte, das am 19. Dezember 1953 veröffentlicht wurde und als Plattform und Voraussetzung für die Landreform angesehen werden kann. Sehr bald nach der Verabschiedung des Gesetzes im Nationalkongress fand zwischen Dezember 1953 und März 1954 in der Provinz Thai Nguyen die experimentelle Landreformwelle statt. Anschließend weitete sich die Landreform in fünf Wellen auf größere Gebiete aus."  #NT!
 SRL_NEM_Reforms.t:0 "Wirtschaftsreformen in Sri Lanka?"  #NT!
 SRL_NEM_Reforms.d:0 "Junius Richard Jayewardene war ein sri-lankischer Anwalt, Beamter und Staatsmann, der von 1977 bis 1978 Premierminister Sri Lankas und von 1978 bis 1989 zweiter Präsident Sri Lankas war. Eine umstrittene Persönlichkeit in der Geschichte Sri Lankas, während das von ihm 1978 eingeführte offene Wirtschaftssystem das Land aus den wirtschaftlichen Turbulenzen befreite, mit denen Sri Lanka infolge der vorangegangenen geschlossenen Wirtschaftspolitik konfrontiert war."  #NT!
 PER_NEM_Reforms.t:0 "Die Weiße Revolution?"  #NT!
 PER_NEM_Reforms.d:0 "Die Weiße Revolution war eine weitreichende Reihe von Reformen, die zu einer aggressiven Modernisierung des Kaiserstaates Iran führten, die am 26. Januar 1963 vom Schah Mohammad Reza Pahlavi eingeleitet wurde und bis 1979 andauerte. Die Reformen führten zu einer großen Umverteilung des Reichtums an die iranische Arbeiterklasse, einem explosiven Wirtschaftswachstum in den folgenden Jahrzehnten, einer raschen Urbanisierung und dem Abbau der feudalen Bräuche des Iran."  #NT!
 european_welfare_state.t:0 "Der [ROOT.GetCountry.GetAdjectiveNoFormatting]-Wohlfahrtsstaat?"  #NT!
 european_welfare_state.d:0 "Die politische Ökonomie Europas wird seit den 1950er Jahren durch die Entwicklung eines mehr oder weniger umfassenden Wohlfahrtsmodells in jedem europäischen Land bestimmt, wobei der Staat eine zentrale Rolle bei der Bereitstellung einer Reihe von Sozialleistungen einnimmt, von denen Renten, Unterstützung für Arme, Sozialwohnungen und Gesundheitsversorgung die teuersten sind."  #NT!
 PER_ELR_Reforms.t:0 "Die iranische Wirtschaftsliberalisierung?"  #NT!
 PER_ELR_Reforms.d:0 "Ali Akbar Hashimi Bahramani Rafsanjani war ein iranischer Politiker und Schriftsteller, der von 1989 bis 1997 der vierte Präsident des Iran war. Er unterstützte im Inland eine kapitalistische Position des freien Marktes, befürwortete die Privatisierung staatseigener Industrien und vertrat international eine gemäßigte Position, um Konflikte mit den Vereinigten Staaten und dem Westen zu vermeiden."  #NT!
 ISR_ELR_Reforms.t:0 "Die israelische Wirtschaftsliberalisierung?"  #NT!
 ISR_ELR_Reforms.d:0 "Rabin reformierte die israelische Wirtschaft sowie sein Bildungs- und Gesundheitssystem erheblich. Seine Regierung weitete die Privatisierung der Wirtschaft deutlich aus und entfernte sich von der traditionell sozialisierten Wirtschaft des Landes. 1993 rief seine Regierung das „Yozma“-Programm ins Leben, das ausländischen Risikokapitalfonds, die in Israel investierten, attraktive Steueranreize bot und versprach, jede Investition mit staatlichen Mitteln zu verdoppeln. Infolgedessen investierten ausländische Risikokapitalfonds stark in die wachsende israelische High-Tech-Industrie und trugen so zum Wirtschaftswachstum Israels und seinem Status als Weltmarktführer im High-Tech-Bereich bei."  #NT!
 oil_crisis_1973.t:0 "Die erste Ölkrise?"  #NT!
 oil_crisis_1973.d:0 "Im Oktober 1973 gab die Organisation Arabischer Erdöl exportierender Länder (OAPEC) bekannt, dass sie ein umfassendes Ölembargo gegen die Länder verhängen werde, die Israel zu irgendeinem Zeitpunkt während des Jom-Kippur-Krieges 1973 unterstützt hatten. Dieser begann, nachdem Ägypten und Syrien einen groß angelegten Überraschungsangriff gestartet hatten, bei dem es sich letztlich um einen erfolglosen Versuch handelte, die Gebiete zurückzugewinnen, die sie im Sechstagekrieg 1967 an Israel verloren hatten. Nach seiner Umsetzung verursachte das Embargo eine Ölkrise bzw. einen „Schock“ mit zahlreichen kurz- und langfristigen Auswirkungen auf die Weltwirtschaft und die Weltpolitik."  #NT!
 oil_crisis_1979.t:0 "Die zweite Ölkrise?"  #NT!
 oil_crisis_1979.d:0 "Ein Rückgang der Ölförderung im Zuge der iranischen Revolution führte 1979 zu einer Energiekrise. Obwohl das weltweite Ölangebot nur um etwa vier Prozent zurückging, ließ die Reaktion der Ölmärkte den Rohölpreis in den nächsten 12 Monaten drastisch ansteigen und verdoppelte ihn auf 39,50 US-Dollar pro Barrel (248 US-Dollar/m3). Der plötzliche Preisanstieg war mit Treibstoffknappheit ähnlich der Ölkrise von 1973 verbunden."  #NT!
 GUA_Land_Reforms.t:0 "Dekret 900 erlassen?"  #NT!
 GUA_Land_Reforms.d:0 "Dekret 900 war ein guatemaltekisches Landreformgesetz, das am 17. Juni 1952 während der guatemaltekischen Revolution verabschiedet wurde. Das Gesetz wurde von Präsident Jacobo Árbenz Guzmán eingeführt und vom guatemaltekischen Kongress verabschiedet. Es verteilte ungenutztes Land mit einer Fläche von mehr als 90 Hektar (224 Acres) an örtliche Bauern und entschädigte die Grundbesitzer mit Staatsanleihen. Land von höchstens 1.700 Ländereien wurde an etwa 500.000 Personen umverteilt – ein Sechstel der Bevölkerung des Landes. Ziel der Gesetzgebung war es, die Wirtschaft Guatemalas vom Pseudofeudalismus zum Kapitalismus zu führen."  #NT!
 historical_oil_production.t:0 "Die [ROOT.GetCountry.GetAdjectiveNoFormatting]-Ölindustrie entwickeln?"  #NT!
 historical_oil_production.d:0 "Vermesser in [ROOT.GetCountry.GetName] haben [GetGoods('oil').GetName] in bestimmten Teilen des Landes entdeckt. Dies hat Branchenführer in [ROOT.GetCountry.GetName] dazu veranlasst, die [concept_government] zu bitten, [GetBuildingType('building_oil_rig').GetName] zu bauen, um diese neu gefundene Ressource zu nutzen."  #NT!
 GBR_brexit.t:0 "Brexit?"  #NT!
 GBR_brexit.d:0 "Der Brexit war der Austritt des Vereinigten Königreichs (UK) aus der Europäischen Union (EU). Nach einem Referendum im Vereinigten Königreich am 23. Juni 2016 fand der Brexit am 31. Januar 2020 um 23:00 Uhr GMT (1. Februar 2020, 00:00 Uhr MEZ) offiziell statt. Das Vereinigte Königreich, das sich am 1. Januar 1973 den Vorläufern der EU, den Europäischen Gemeinschaften (EG), anschloss, ist der einzige Mitgliedstaat, der aus der EU ausgetreten ist. Nach dem Brexit haben das EU-Recht und der Gerichtshof der Europäischen Union keinen Vorrang mehr vor den britischen Gesetzen. Das European Union (Withdrawal) Act 2018 behält relevantes EU-Recht als innerstaatliches Recht bei, das das Vereinigte Königreich ändern oder aufheben kann."  #NT!
 JAP_ELR_Reforms.t:0 "Abenomics verabschieden?"  #NT!
 JAP_ELR_Reforms.d:0 "Abenomics bezieht sich auf die Wirtschaftspolitik, die die japanische Regierung seit den Parlamentswahlen im Dezember 2012 umgesetzt hat. Die Abenomics basieren auf drei Pfeilern: geldpolitische Lockerung durch die Bank of Japan, fiskalische Anreize durch Staatsausgaben und Strukturreformen. Der Economist beschrieb das Programm als eine „Mischung aus Reflation, Staatsausgaben und einer Wachstumsstrategie, die darauf abzielt, die Wirtschaft aus dem Stillstand zu befreien, der sie seit mehr als zwei Jahrzehnten im Griff hat“. Der Begriff Abenomics ist ein Kunstwort aus Abe und Wirtschaft."  #NT!
 PHI_ELR_Reforms.t:0 "Wirtschaftsliberalisierung umsetzen?"  #NT!
 PHI_ELR_Reforms.d:0 "Fidel Valdez Ramos CCLH GCS KGCR, im Volksmund als FVR bekannt, war ein philippinischer General und Politiker, der von 1992 bis 1998 als 12. Präsident der Philippinen fungierte. Während seiner Amtszeit begann Ramos mit der Umsetzung von Wirtschaftsreformen, die darauf abzielten, die einst geschlossene Volkswirtschaft zu öffnen, Privatunternehmen zu fördern, mehr ausländische und inländische Investitionen anzulocken und die Korruption zu reduzieren. Ramos beendete das Luftmonopol der Regierung und öffnete die Luftfahrt für neue Akteure."  #NT!
 USA_Trade_War_2025.t:0 "Der Trump-Handelskrieg?"  #NT!
 USA_Trade_War_2025.d:0 "Die während der zweiten Präsidentschaft von Donald Trump eingeführten Zölle markierten eine starke Eskalation der protektionistischen Handelspolitik in den Vereinigten Staaten, wobei Präsident Donald Trump eine Reihe hoher Zölle auf fast alle in die USA importierten Waren ankündigte. Die Ankündigung dieser kontrovers bezeichneten „gegenseitigen Zölle“ löste Vergeltungsmaßnahmen seitens der Handelspartner aus und löste einen Börsencrash aus."  #NT!
 SOV_Kosygin_Reforms_Rollback.t:0 "Das Scheitern der Kossygin-Reformen?"  #NT!
 SOV_Kosygin_Reforms_Rollback.d:0 "Die sowjetische Wirtschaftsreform von 1965, manchmal auch Kossygin-Reform oder Liberman-Reform genannt, benannt nach E.G. Liberman war eine Reihe geplanter Veränderungen in der Wirtschaft der UdSSR. Ein Kernstück dieser Veränderungen war die Einführung von Rentabilität und Umsatz als zwei Schlüsselindikatoren für den Unternehmenserfolg. Der Erfolg dieser Reformen war nur von kurzer Dauer und führte mit den Ereignissen von Prag im Jahr 1968, die durch die Umsetzung der Reformen in den Ostblockländern durch Moskau angeheizt wurden, zu einer Einschränkung der Reformen."  #NT!
 SPA_ELR_Reforms.t:0 "Wirtschaftsliberalisierung begrüßen?"  #NT!
 SPA_ELR_Reforms.d:0 "Nach einer sehr langsamen Erholung von den Verwüstungen des Bürgerkriegs von 1936–1939 wurde das „Wirtschaftswunder“ durch die Reformen einer Gruppe wirtschaftlicher „Technokraten“ eingeleitet, die mit der Unterstützung von Francisco Franco neue Richtlinien für die wirtschaftliche Entwicklung Spaniens einführten. Die „Technokraten“, von denen viele Mitglieder des Opus Dei waren, waren eine neue Generation von Politikern, die die alte falangistische Garde abgelöst hatten. Sie gaben eine Autarkiepolitik auf und setzten „Entwicklungspläne“ um, die die Liberalisierung des Handels und das schnelle Wachstum der Industrie vorsahen."  #NT!
 SIR_ELR_Reforms.t:0 "Wirtschaftsliberalisierung begrüßen?"  #NT!
 SIR_ELR_Reforms.d:0 "Der „keltische Tiger“ ist ein Begriff, der sich auf die Wirtschaft Irlands von Mitte der 1990er bis Ende der 2000er Jahre bezieht, einer Zeit schnellen realen Wirtschaftswachstums, das durch ausländische Direktinvestitionen angetrieben wurde. Der Historiker R. F. Foster argumentiert, dass die Ursache eine Kombination aus einem neuen Sinn für Initiative und dem Eintritt amerikanischer Unternehmen wie Intel war. Er kommt zu dem Schluss, dass die Hauptfaktoren niedrige Steuern, wirtschaftsfreundliche Regulierungsmaßnahmen und eine junge, technikaffine Belegschaft waren. Vielen multinationalen Unternehmen wurde die Entscheidung, in Irland Geschäfte zu machen, durch großzügige Anreize der Industrial Development Authority noch erleichtert."  #NT!
 XEU_EE_Expansion_2004.t:0 "Der Europäischen Union beitreten?"  #NT!
 XEU_EE_Expansion_2004.d:0 "Die größte Erweiterung der Europäischen Union (EU), gemessen an der Anzahl der Staaten und der Bevölkerung, fand am 1. Mai 2004 statt. Teil derselben Erweiterungswelle war der Beitritt Bulgariens und Rumäniens im Jahr 2007, die 2004 nicht beitreten konnten, aber nach Angaben der Europäischen Kommission Teil der fünften Erweiterung sind."  #NT!
 GBR_ELR_Reforms.t:0 "Der Urknall?"  #NT!
 GBR_ELR_Reforms.d:0 "Die konservative Regierung der 1980er Jahre unter Margaret Thatcher leitete eine radikale Politik des Monetarismus, der Deregulierung, insbesondere des Finanzsektors (z. B. der Urknall 1986) und der Arbeitsmärkte, des Verkaufs staatseigener Unternehmen (Privatisierung) und des Entzugs von Subventionen an andere ein."  #NT!
 BRU_SGP_Reforms.t:0 "Die Wirtschaftspartnerschaft zwischen Brunei und Singapur?"  #NT!
 BRU_SGP_Reforms.d:0 "Singapur und Brunei verbindet eine einzigartig tiefe wirtschaftliche und strategische Partnerschaft, die auf Vertrauen und gegenseitigem Respekt beruht. Ihr Währungsaustauschabkommen, ihre Verteidigungskooperation und ihre Joint Ventures in den Bereichen Finanzen, Energie und Bildung spiegeln dauerhafte Beziehungen wider."  #NT!
 PER_Oil_Nationalisation_1951.t:0 "Die iranische Ölindustrie verstaatlichen?"  #NT!
 PER_Oil_Nationalisation_1951.d:0 "1951 stimmte das iranische Parlament unter der Führung von Mohammad Mosaddegh für die Verstaatlichung der Anglo-Iranian Oil Company. Dieser mutige Schritt beendete die britische Kontrolle über das iranische Öl und gründete die National Iranian Oil Company. Es löste internationale Gegenreaktionen aus, insbesondere in Großbritannien und den Vereinigten Staaten."  #NT!
 GCC_Union.t:0 "Der Golf-Kooperationsrat?"  #NT!
 GCC_Union_1.t:0 "Den Golf-Kooperationsrat erweitern?"  #NT!
 GCC_Union_2.t:0 "Dem Golf-Kooperationsrat beitreten?"  #NT!
 GCC_Union.d:0 "Der Kooperationsrat für die Arabischen Golfstaaten, auch Golf-Kooperationsrat genannt, ist eine regionale, zwischenstaatliche, politische und wirtschaftliche Union sowie ein Militärbündnis, das Bahrain, Kuwait, Oman, Katar, Saudi-Arabien und die Vereinigten Arabischen Emirate umfasst. Der Hauptsitz des Rates befindet sich in Riad, der Hauptstadt Saudi-Arabiens. Die Charta des GCC wurde am 25. Mai 1981 unterzeichnet und begründete damit offiziell die Institution."  #NT!
 Eurasian_Economic_Community.t:0 "Die Eurasische Wirtschaftsgemeinschaft?"  #NT!
 Eurasian_Economic_Community.d:0 "Die Eurasische Wirtschaftsgemeinschaft (EAEC oder EurAsEC) war zwischen 2000 und 2014 eine regionale Organisation, die die wirtschaftliche Integration ihrer Mitgliedsstaaten zum Ziel hatte. Die Organisation entstand am 29. März 1996 aus der Gemeinschaft Unabhängiger Staaten (GUS). Der Vertrag zur Gründung der Eurasischen Wirtschaftsgemeinschaft wurde am 10. Oktober 2000 in der kasachischen Hauptstadt Astana unterzeichnet."  #NT!
 Eurasian_Single_Market.t:0 "Die Eurasische Zollunion?"  #NT!
 Eurasian_Single_Market.d:0 "Die Eurasische Zollunion ist die Zollunion der Mitgliedsstaaten der Eurasischen Wirtschaftsunion (EAWU): Armenien, Weißrussland, Kasachstan, Kirgisistan und Russland. Es sieht den freien Warenverkehr innerhalb der Union und einen gemeinsamen Außenzoll für Waren vor, die von außerhalb der Union eingeführt werden."  #NT!
 Mercosur_Economic_Community.t:0 "Der Vertrag von Asunción?"  #NT!
 Mercosur_Economic_Community.d:0 "Mit dem Vertrag von Asunción, der am 26. März 1991 von Argentinien, Brasilien, Paraguay und Uruguay unterzeichnet wurde, wurde Mercosur gegründet, um einen gemeinsamen Markt zu schaffen. Ergänzt durch den Vertrag von Ouro Preto erlangte es rechtliche Anerkennung. Darin wurde die schrittweise Abschaffung der Handelszölle mit dem Ziel einer Freihandelszone bis 1994 dargelegt."  #NT!
 Mercosur_Single_Market.t:0 "Das Protokoll von Ouro Preto?"  #NT!
 Mercosur_Single_Market.d:0 "Das Protokoll von Ouro Preto aus dem Jahr 1994 war die Fortsetzung der Wirtschaftspolitik zur Schaffung einer Zollunion, wie sie vier Jahre zuvor im Vertrag von Asunción von den vier ursprünglichen Mercosur-Staaten Argentinien, Brasilien, Paraguay und Uruguay festgelegt worden war. Damit wurde Mercosur offiziell als internationale Zollunion gegründet."  #NT!
 Andean_Economic_Community.t:0 "Die Anden-Freihandelszone?"  #NT!
 Andean_Economic_Community.d:0 "Die im Rahmen des Cartagena-Abkommens eingerichtete Anden-Freihandelszone nahm am 1. Januar 1993 ihren vollständigen Betrieb auf und verband Bolivien, Kolumbien, Ecuador und Venezuela im zollfreien Handel. Es stellte einen entscheidenden Schritt in Richtung regionaler Integration dar und entwickelte sich später zur Andengemeinschaft (CAN), der Peru 1997 wieder beitrat."  #NT!
 SACU_Single_Market.t:0 "Die südafrikanische Zollunion?"  #NT!
 SACU_Single_Market.d:0 "Die 1910 gegründete Southern African Customs Union (SACU) ist die älteste Zollunion der Welt und verbindet Botswana, Eswatini, Lesotho, Namibia und Südafrika. Es führt einen gemeinsamen Außenzoll und freien Warenverkehr zwischen den Mitgliedern ein, während die Einnahmen aus Zöllen gebündelt und geteilt werden. SACU stellt einen Eckpfeiler der regionalen wirtschaftlichen Zusammenarbeit im südlichen Afrika dar und gleicht die dominierende Wirtschaft Südafrikas mit Mechanismen für eine gerechte Verteilung aus."  #NT!
 EAC_Single_Market.t:0 "Die Zollunion der Ostafrikanischen Gemeinschaft?"  #NT!
 EAC_Single_Market.d:0 "Die im Jahr 2000 wiederbelebte Ostafrikanische Gemeinschaft (EAC) vereint Burundi, Kenia, Ruanda, Südsudan, Tansania, Uganda und die Demokratische Republik Kongo in einem regionalen Block. Ihre Binnenmarktinitiative zielt darauf ab, den freien Waren-, Dienstleistungs-, Kapital- und Personenverkehr zwischen den Mitgliedstaaten zu etablieren, die Handelspolitik zu harmonisieren und eine tiefere Integration zu fördern. Das EAC stellt eines der ehrgeizigsten Projekte Afrikas für wirtschaftliche Einheit und gemeinsame Entwicklung dar."  #NT!
 CEMAC_Economic_Community.t:0 "Der Brazzaville-Vertrag?"  #NT!
 CEMAC_Economic_Community.d:0 "Die Zoll- und Wirtschaftsunion Zentralafrikas (UDEAC) wurde durch den am 8. Dezember 1964 unterzeichneten Brazzaville-Vertrag gegründet und trat am 1. Januar 1966 in Kraft. Sie vereinte Kamerun, die Zentralafrikanische Republik, den Tschad, die Republik Kongo und Gabun, wobei Äquatorialguinea später im Jahr 1985 beitrat. UDEAC führte den Freihandel zwischen den Mitgliedern und einen gemeinsamen Außenzoll ein und legte damit den Grundstein für eine tiefere regionale Integration."  #NT!
 CEMAC_Single_Market.t:0 "Der CEMAC-Vertrag?"  #NT!
 CEMAC_Single_Market.d:0 "Die Wirtschafts- und Währungsgemeinschaft Zentralafrikas (CEMAC) wurde per Vertrag am 16. Januar 1994 in N’Djamena, Tschad, als Nachfolgerin der Zoll- und Wirtschaftsunion Zentralafrikas (UDEAC) gegründet. Es vereinte Kamerun, die Zentralafrikanische Republik, den Tschad, die Republik Kongo, Äquatorialguinea und Gabun sowohl in einer Zollunion als auch in einer Währungsunion. CEMAC führte einen gemeinsamen Außenzoll, den freien Warenverkehr zwischen den Mitgliedern und eine gemeinsame Währung – den zentralafrikanischen CFA-Franc – ein, der von der Bank der Zentralafrikanischen Staaten verwaltet wird."  #NT!
 WAEMU_Single_Market.t:0 "Der Dakar-Vertrag?"  #NT!
 WAEMU_Single_Market.d:0 "Die Westafrikanische Wirtschafts- und Währungsunion (WAEMU oder UEMOA auf Französisch) wurde am 10. Januar 1994 in Dakar, Senegal, vertraglich gegründet. Es vereinte Benin, Burkina Faso, die Elfenbeinküste, Mali, Niger, Senegal und Togo, wobei Guinea-Bissau 1997 beitrat. Die WAEMU schuf sowohl eine Zollunion mit einem gemeinsamen Außenzoll und freiem Warenverkehr als auch eine Währungsunion auf der Grundlage des gemeinsamen westafrikanischen CFA-Franc, die von der Zentralbank der westafrikanischen Staaten (BCEAO) verwaltet wird."  #NT!
 CACM_Economic_Community.t:0 "Das Tegucigalpa-Protokoll?"  #NT!
 CACM_Economic_Community.d:0 "Das Zentralamerikanische Integrationssystem (SICA), das 1991 durch das Tegucigalpa-Protokoll gegründet wurde, vereint zentralamerikanische Nationen in einem Rahmen für politische, wirtschaftliche, soziale und ökologische Zusammenarbeit. Es koordiniert regionale Zoll-, Sicherheits- und Entwicklungspolitiken mit dem Ziel, die Demokratie zu stärken, die Integration zu fördern und nachhaltiges Wachstum in der gesamten Region zu fördern."  #NT!
 CHI_Hainan_SAR.t:0 "Der Freihandelshafen von Hainan?"  #NT!
 CHI_Hainan_SAR.d:0 "Der Freihandelshafen Hainan ist ein Freihandelshafen in Hainan, China. Als vorgelagerte Insel ist Hainan auch die größte Sonderwirtschaftszone der Volksrepublik China (VRC). Es gilt für China als besonderer Bereich, die Wirtschaftsreform umfassend zu vertiefen und mit der Öffnungspolitik auf höchstem Niveau zu experimentieren. Der Freihandelshafen Hainan ist kein Hafen im üblichen Sinne, da die gesamte Insel Hainan als besonderes Wirtschaftsentwicklungsgebiet gilt."  #NT!
 CHI_One_Child_Policy_1980.t:0 "Die Ein-Kind-Politik?"  #NT!
 CHI_One_Child_Policy_1980.d:0 "Die Ein-Kind-Politik war eine Bevölkerungsplanungsinitiative in China, die zwischen 1979 und 2015 umgesetzt wurde, um das Bevölkerungswachstum des Landes durch die Beschränkung vieler Familien auf ein einziges Kind einzudämmen. Das Programm hatte weitreichende soziale, kulturelle, wirtschaftliche und demografische Auswirkungen, obwohl der Beitrag der Ein-Kind-Beschränkungen zum umfassenderen Programm Gegenstand von Kontroversen war. Seine Wirksamkeit bei der Senkung der Geburtenraten und seine Vertretbarkeit aus menschenrechtlicher Sicht waren Gegenstand von Kontroversen."  #NT!
 MLD_HND_Reforms.t:0 "Das bilaterale Handelsabkommen zwischen Indien und den Malediven?"  #NT!
 MLD_HND_Reforms.d:0 "Im Rahmen des 1981 unterzeichneten bilateralen Handelsabkommens einigten sich beide Länder darauf, sich gegenseitig den Meistbegünstigungsstatus zu gewähren. Im Rahmen der Bestimmungen dieses Abkommens liefert Indien weiterhin bestimmte Waren auf die Malediven, die möglicherweise sogar unter die verbotenen/beschränkten Importkategorien in Indien fallen. Dabei ist zu berücksichtigen, dass der Großteil von Artikeln wie Reis, Weizenmehl, Zucker, Kartoffeln, Zwiebeln, Eiern, Gemüse und anderen Rohstoffen wie Flusssand und Baumaterialien aus Indien importiert wird, was die Malediven zunehmend zu einem attraktiven Markt für die wachsenden indischen Investoren in diesem Sektor macht."  #NT!
  
 western_economic_liberalisation.t:0 "Wirtschaftsliberalisierung?"  #NT!
 western_economic_liberalisation.d:0 "Der Neoliberalismus wird mit dem Kapitalismus des freien Marktes in Verbindung gebracht, nachdem dieser nach dem Zweiten Weltkrieg verfiel. Sie ist ein wichtiger Faktor für den Aufstieg konservativer und rechtsliberaler Organisationen, politischer Parteien und Denkfabriken und wird von diesen überwiegend befürwortet. Sie wird im Allgemeinen mit der Politik der wirtschaftlichen Liberalisierung in Verbindung gebracht, einschließlich Privatisierung, Deregulierung, Globalisierung, Freihandel, Monetarismus, Sparmaßnahmen und Kürzungen der Staatsausgaben, um die Rolle des Privatsektors in Wirtschaft und Gesellschaft zu stärken."  #NT!
 western_economic_liberalisation.f:0 "Dieses Ereignis erhöht das Niveau des freien Marktes in der [ROOT.GetCountry.GetAdjectiveNoFlag]-Wirtschaft um 1 Stufe."  #NT!
