 European_Economic_Community.t:0 "Der Vertrag von Rom?"  #NT!
 European_Economic_Community.d:0 "Mit den Römischen Verträgen wurde die Europäische Wirtschaftsgemeinschaft (EWG) gegründet. Der Vertrag wurde am 25. März 1957 von Belgien, Frankreich, Italien, Luxemburg, den Niederlanden und Westdeutschland unterzeichnet und trat am 1. Januar 1958 in Kraft. Der Vertrag sah die schrittweise Senkung der Zölle und die Gründung einer Zollunion vor. Es wurde vorgeschlagen, einen Binnenmarkt für Waren, Arbeit, Dienstleistungen und Kapital in allen Mitgliedstaaten zu schaffen. Außerdem schlug sie die Schaffung einer Gemeinsamen Agrarpolitik, einer Gemeinsamen Verkehrspolitik und eines Europäischen Sozialfonds vor und gründete die Europäische Kommission."  #NT!
 European_Single_Market.t:0 "Der Vertrag von Maastricht?"  #NT!
 European_Single_Market.d:0 "Der Vertrag über die Europäische Union, allgemein bekannt als Maastricht-Vertrag, ist der Gründungsvertrag der Europäischen Union (EU). Es wurde 1992 zwischen den damals zwölf Mitgliedsstaaten der Europäischen Gemeinschaften geschlossen und kündigte eine neue Etappe im Prozess der europäischen Integration an, vor allem in Bezug auf Bestimmungen für eine gemeinsame europäische Staatsbürgerschaft, für die eventuelle Einführung einer einheitlichen Währung und (mit weniger Präzision) für eine gemeinsame Außen- und Sicherheitspolitik."  #NT!
 European_Single_Currency.t:0 "Den Euro einführen?"  #NT!
 European_Single_Currency.d:0 "Der Euro wurde am 1. Januar 1999 eingeführt, obwohl er seit den 1960er Jahren ein Ziel der Europäischen Union (EU) und ihrer Vorgänger war. Nach zähen Verhandlungen trat 1993 der Vertrag von Maastricht in Kraft mit dem Ziel, bis 1999 eine Wirtschafts- und Währungsunion (WWU) für alle EU-Staaten außer Großbritannien und Dänemark zu schaffen (obwohl Dänemark eine feste Wechselkurspolitik gegenüber dem Euro verfolgt)."  #NT!
 European_Political_Union.t:0 "Der Vertrag von Lissabon?"  #NT!
 European_Political_Union.d:0 "Der Vertrag von Lissabon beinhaltete den Übergang von der Einstimmigkeit zur qualifizierten Mehrheit in mindestens 45 Politikbereichen im Ministerrat, eine Änderung bei der Berechnung dieser Mehrheit auf eine neue doppelte Mehrheit, ein mächtigeres Europäisches Parlament, das neben dem Ministerrat im Rahmen des ordentlichen Gesetzgebungsverfahrens eine Zweikammer-Legislative bildet, eine konsolidierte Rechtspersönlichkeit für die EU und die Schaffung eines langfristigen Präsidenten des Europäischen Rates und eines Hohen Vertreters der Union für Außen- und Sicherheitspolitik. Der Vertrag machte auch die Charta der Grundrechte der Union rechtsverbindlich. Der Vertrag gewährte den Mitgliedstaaten zum ersten Mal ausdrücklich das gesetzliche Recht, die EU zu verlassen, und legte ein Verfahren dafür fest."  #NT!
  
 NAFTA.t:0 "Das Nordamerikanische Freihandelsabkommen?"  #NT!
 NAFTA.d:0 "Das Nordamerikanische Freihandelsabkommen war ein von Kanada, Mexiko und den Vereinigten Staaten unterzeichnetes Abkommen, das einen trilateralen Handelsblock in Nordamerika schuf. Das Abkommen trat am 1. Januar 1994 in Kraft und ersetzte das Freihandelsabkommen zwischen Kanada und den Vereinigten Staaten von 1988 zwischen den Vereinigten Staaten und Kanada. Der NAFTA-Handelsblock bildete gemessen am Bruttoinlandsprodukt einen der größten Handelsblöcke der Welt."  #NT!
  
 ASEAN_Economic_Community.t:0 "Das Nordamerikanische Freihandelsabkommen?"  #NT!
 ASEAN_Economic_Community.d:0 "ASEAN plante, bis Ende 2015 einen Binnenmarkt auf der Grundlage der vier Freiheiten zu schaffen, mit dem Ziel, den freien Fluss von Waren, Dienstleistungen, qualifizierten Arbeitskräften und Kapital sicherzustellen. Die ASEAN-Wirtschaftsgemeinschaft wurde 2015 gegründet, die Gruppe verschob jedoch etwa 20 % der zur Schaffung eines gemeinsamen Marktes erforderlichen Harmonisierungsbestimmungen und setzte eine neue Frist auf 2025."  #NT!
  
 Trans_Pacific_Partnership.t:0 "Die Transpazifische Partnerschaft?"  #NT!
 Trans_Pacific_Partnership.d:0 "Die Transpazifische Partnerschaft (TPP) war ein geplantes Handelsabkommen zwischen zwölf pazifischen Anrainerstaaten: Australien, Brunei, Kanada, Chile, Japan, Malaysia, Mexiko, Neuseeland, Peru, Singapur, Vietnam und den Vereinigten Staaten. In den Vereinigten Staaten wurde der Vorschlag am 4. Februar 2016 unterzeichnet, aber nicht ratifiziert, da er von vielen Demokraten und Republikanern abgelehnt wurde, darunter den beiden Präsidentschaftskandidaten der großen Parteien, Donald Trump und Hillary Clinton. Nach seinem Amtsantritt trat der neu gewählte Präsident Donald Trump im Januar 2017 offiziell aus der TPP aus, weshalb die TPP nicht wie erforderlich ratifiziert werden konnte und nicht in Kraft trat."  #NT!
  
 RCEP.t:0 "Die regionale umfassende Wirtschaftspartnerschaft?"  #NT!
 RCEP.d:0 "Die Regional Comprehensive Economic Partnership ist ein Freihandelsabkommen zwischen den asiatisch-pazifischen Ländern Australien, Brunei, Kambodscha, China, Indonesien, Japan, Südkorea, Laos, Malaysia, Myanmar, Neuseeland, den Philippinen, Singapur, Thailand und Vietnam. Es wird erwartet, dass innerhalb von 20 Jahren nach Inkrafttreten etwa 90 % der Einfuhrzölle zwischen seinen Unterzeichnern abgeschafft werden und gemeinsame Regeln für E-Commerce, Handel und geistiges Eigentum eingeführt werden."  #NT!
  
 five_year_plan_system.t:0 "Fünfjahresplan"  #NT!
 five_year_plan_system.d:0 "Die Fünfjahrespläne sind eine Reihe sozialer und wirtschaftlicher Entwicklungsinitiativen, die von der [concept_government] herausgegeben werden. Planung ist ein Schlüsselmerkmal sozialistischer Volkswirtschaften, und ein für das gesamte Land erstellter Plan enthält normalerweise detaillierte Richtlinien für die wirtschaftliche Entwicklung aller seiner Regionen."  #NT!
