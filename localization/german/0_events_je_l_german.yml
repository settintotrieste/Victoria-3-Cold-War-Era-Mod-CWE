 GBR_change_monarch_1952.t:0 "Der Tod von König Georg VI"  #NT!
 GBR_change_monarch_1952.d:0 "Der Stress des Krieges hatte seinen Tribut an Georges Gesundheitszustand gefordert, der durch sein starkes Rauchen und die anschließende Entwicklung von Lungenkrebs und anderen Krankheiten, darunter Arteriosklerose und Morbus Buerger, verschlimmert wurde. Am 31. Januar 1952 begab sich George entgegen dem Rat seiner Angehörigen zum Londoner Flughafen, um Elizabeth und Philip auf ihrer Reise über Kenia nach Australien zu begleiten. Es war sein letzter öffentlicher Auftritt. Sechs Tage später, am Morgen des 6. Februar um 07:30 GMT, wurde er tot im Bett im Sandringham House in Norfolk aufgefunden. Er war in der Nacht im Alter von 56 Jahren an einer Koronarthrombose gestorben."  #NT!
 GBR_change_monarch_2022.t:0 "Der Tod von Königin Elizabeth II"  #NT!
 GBR_change_monarch_2022.d:0 "Elizabeth II., Königin des Vereinigten Königreichs und der anderen Commonwealth-Reiche, starb am 8. September 2022 im Balmoral Castle in Schottland im Alter von 96 Jahren. Elizabeths Regierungszeit war mit 70 Jahren und 214 Tagen die längste aller britischen Monarchen. Ihr ältester Sohn, Karl III., folgte ihr sofort nach."  #NT!
 JAP_change_monarch_1989.t:0 "Der Tod von Kaiser Hirohito"  #NT!
 JAP_change_monarch_1989.d:0 "Am 22. September 1987 wurde Hirohito an der Bauchspeicheldrüse operiert, nachdem er mehrere Monate lang Verdauungsprobleme hatte. Die Ärzte stellten fest, dass er Zwölffingerdarmkrebs hatte. Hirohito schien sich mehrere Monate nach der Operation vollständig zu erholen. Etwa ein Jahr später, am 19. September 1988, brach er jedoch in seinem Palast zusammen und sein Gesundheitszustand verschlechterte sich in den nächsten Monaten, da er unter anhaltenden inneren Blutungen litt. Der Kaiser starb am 7. Januar 1989 um 6:33 Uhr im Alter von 87 Jahren."  #NT!
 JAP_change_monarch_2019.t:0 "Die Abdankung von Kaiser Akihito?"  #NT!
 JAP_change_monarch_2019.d:0 "Am 13. Juli 2016 berichtete der nationale Sender NHK, dass der damals 82-jährige Kaiser unter Berufung auf sein Alter beabsichtige, innerhalb weniger Jahre zugunsten seines ältesten Sohnes Kronprinz Naruhito abzudanken. Am 19. Mai 2017 verabschiedete das japanische Kabinett den Gesetzentwurf, der Akihito die Abdankung ermöglichen würde. Am 8. Juni 2017 verabschiedete der Nationaltag es, woraufhin es als „Kaiserabdankungsgesetz“ bekannt wurde. Damit begannen die Vorbereitungen der Regierung zur Übergabe der Position an Naruhito. Premierminister Shinzo Abe kündigte im Dezember 2017 an, dass Akihitos Abdankung am Ende des 30. April 2019 erfolgen werde und dass Naruhito ab dem 1. Mai 2019 der 126. Kaiser werden werde."  #NT!
 BEL_change_monarch_2013.t:0 "Die Abdankung von König Albert II.?"  #NT!
 BEL_change_monarch_2013.d:0 "König Albert II. von Belgien dankte am 21. Juli 2013 aus Alters- und Gesundheitsgründen ab. Nach 20 Jahren auf dem Thron übergab er die Krone im Rahmen einer Zeremonie am belgischen Nationalfeiertag an seinen Sohn Philippe. Albert forderte in seiner Abschiedsrede die nationale Einheit und markierte damit einen friedlichen königlichen Übergang."  #NT!
 SPA_change_monarch_2014.t:0 "Die Abdankung von König Juan Carlos I.?"  #NT!
 SPA_change_monarch_2014.d:0 "König Juan Carlos I. von Spanien dankte am 19. Juni 2014 ab, nachdem er seine Absicht Anfang des Monats bekannt gegeben hatte. Unter Berufung auf gesundheitliche Probleme und den Wunsch nach einem Generationswechsel übergab er die Krone an seinen Sohn Felipe VI. Die Abdankung erfolgte aufgrund sinkender Popularität aufgrund von Skandalen und wurde durch Zustimmung des Parlaments formalisiert."  #NT!
 NET_change_monarch_1980.t:0 "Die Abdankung von Königin Juliana?"  #NT!
 NET_change_monarch_1980.d:0 "Königin Juliana der Niederlande dankte am 30. April 1980, ihrem 71. Geburtstag, nach 32 Jahren auf dem Thron ab. Sie nannte das Alter und den Wunsch, Verantwortung an die nächste Generation weiterzugeben. Ihre Tochter Beatrix folgte ihr nach. Die Abdankung spiegelte die königliche Tradition der Niederlande wider, die den freiwilligen Ruhestand einer lebenslangen Herrschaft vorzog."  #NT!
 NET_change_monarch_2013.t:0 "Die Abdankung von Königin Beatrix?"  #NT!
 NET_change_monarch_2013.d:0 "Königin Beatrix der Niederlande dankte am 30. April 2013 nach 33-jähriger Herrschaft ab. Sie verwies auf den Wunsch, einer neuen Generation Platz zu machen und den Thron an ihren Sohn Willem-Alexander zu übergeben. Die Abdankung markierte das Ende einer Ära und den Beginn des ersten männlichen Monarchen der Niederlande seit über einem Jahrhundert."  #NT!
 LUX_change_monarch_1964.t:0 "Die Abdankung von Großherzogin Charlotte?"  #NT!
 LUX_change_monarch_1964.d:0 "Großherzogin Charlotte von Luxemburg dankte am 12. November 1964 nach 45 Jahren Herrschaft ab. Sie verwies auf das Alter und die Notwendigkeit einer Erneuerung und übergab den Thron an ihren Sohn Jean. Ihre Herrschaft erstreckte sich über den Zweiten Weltkrieg und den Wiederaufbau nach dem Krieg und machte sie zu einem Symbol der nationalen Einheit und Widerstandsfähigkeit."  #NT!
 LUX_change_monarch_2000.t:0 "Die Abdankung von Großherzog Jean?"  #NT!
 LUX_change_monarch_2000.d:0 "Großherzog Jean von Luxemburg dankte am 7. Oktober 2000 nach 36 Jahren auf dem Thron ab. Er verwies auf den Wunsch, die Verantwortung auf die nächste Generation zu übertragen und die Macht auf seinen Sohn Henri zu übertragen. Jeans Regierungszeit war geprägt von der Nachkriegsmodernisierung und seiner früheren Rolle im Zweiten Weltkrieg als Soldat und Symbol nationaler Widerstandsfähigkeit."  #NT!
 LUX_change_monarch_2025.t:0 "Die Abdankung von Großherzog Henri?"  #NT!
 LUX_change_monarch_2025.d:0 "Großherzog Heinrich von Luxemburg dankte am 3. Oktober 2025 nach fast 25 Jahren auf dem Thron ab. Er übergab die Krone an seinen ältesten Sohn Guillaume und verwies auf die Bedeutung des Generationswechsels und der Kontinuität. Der Übergang wurde durch eine feierliche Zeremonie im Großherzoglichen Palast in Luxemburg-Stadt gefeiert."  #NT!
 DEN_change_monarch_2024.t:0 "Die Abdankung von Königin Margrethe II.?"  #NT!
 DEN_change_monarch_2024.d:0 "Königin Margrethe II. von Dänemark dankte am 14. Januar 2024 ab und war damit 52 Jahre auf dem Thron. Sie gab ihre Entscheidung während ihrer Silvesteransprache bekannt und verwies auf den Generationswechsel. Ihr Sohn Frederik wurde ihr Nachfolger als König Frederik X. Es war Dänemarks erste freiwillige königliche Abdankung seit fast 900 Jahren."  #NT!
 NOR_change_monarch_1957.t:0 "Der Tod von König Haakon VII"  #NT!
 NOR_change_monarch_1957.d:0 "König Haakon VII. verstarb 1957 nach einer langen und ehrwürdigen Herrschaft. Als Symbol der norwegischen Unabhängigkeit und Widerstandsfähigkeit im Krieg markierte sein Tod das Ende einer Ära und den Beginn der Herrschaft von König Olav V. und leitete ein neues Kapitel für die norwegische Monarchie ein."  #NT!
 NOR_change_monarch_1991.t:0 "Der Tod von König Olav V"  #NT!
 NOR_change_monarch_1991.d:0 "König Olav V. starb 1991 und wurde wegen seiner Demut und seines Kriegsdienstes als „Volkskönig“ geliebt. Sein Tod löste nationale Trauer aus, und sein Sohn Harald V. bestieg den Thron und führte das Erbe einer modernen, zugänglichen Monarchie fort."  #NT!
 SWE_change_monarch_1950.t:0 "Der Tod von König Gustaf V"  #NT!
 SWE_change_monarch_1950.d:0 "König Gustaf V. starb 1950 im Alter von 92 Jahren und beendete damit eine 43-jährige Herrschaft, die sich über zwei Weltkriege erstreckte. Sein Tod markierte den Übergang zu Gustaf VI. Adolf, als Schweden seine Entwicklung zu einer modernen konstitutionellen Monarchie fortsetzte."  #NT!
 SWE_change_monarch_1973.t:0 "Der Tod von König Gustaf VI"  #NT!
 SWE_change_monarch_1973.d:0 "König Gustaf VI. Adolf verstarb 1973 und blieb für sein wissenschaftliches Interesse und seine beständige Führung in Erinnerung. Sein Tod markierte das Ende einer Ära und den Aufstieg von Carl XVI. Gustaf und markierte einen Generationswechsel in der schwedischen Königsfamilie."  #NT!
 GRE_change_monarch_1964.t:0 "Der Tod von König Paul"  #NT!
 GRE_change_monarch_1964.d:0 "König Paul von Griechenland starb 1964 nach einer Regierungszeit, die von der Erholung nach dem Krieg und den Spannungen im Kalten Krieg geprägt war. Sein Sohn, Konstantin II., folgte ihm inmitten wachsender politischer Unruhen nach, die bald die Zukunft der Monarchie gefährden würden."  #NT!
 THI_change_monarch_2016.t:0 "Der Tod von König Bhumibol Adulyadej Mahidol"  #NT!
 THI_change_monarch_2016.d:0 "König Bhumibol Adulyadej starb 2016 nach 70-jähriger Herrschaft, der längsten in der thailändischen Geschichte. Sein Tod, der für seine moralische Autorität und seine Entwicklungsarbeit geschätzt wurde, hinterließ tiefgreifende Auswirkungen auf die Nation. Kronprinz Vajiralongkorn folgte ihm als Rama X. nach."  #NT!
 CAM_change_monarch_2004.t:0 "Der Tod von König Norodom Sihanouk"  #NT!
 CAM_change_monarch_2004.d:0 "König Norodom Sihanouk starb 2012, nachdem er in der modernen Geschichte Kambodschas eine entscheidende Rolle gespielt hatte. Vom Monarchen zum Staatsmann und wieder zurück endete sein komplexes Erbe mit der friedlichen Nachfolge seines Sohnes Norodom Sihamoni."  #NT!
 CHI_change_monarch_1967.t:0 "Der Tod von Puyi"  #NT!
 CHI_change_monarch_1967.d:0 "Puyi, der letzte Kaiser Chinas, starb 1967 nach Jahren der Umerziehung unter kommunistischer Herrschaft. Einst war er ein kleiner Kaiser und später ein Marionettenherrscher von Mandschukuo. Sein Tod symbolisierte die letzte Dämmerung des kaiserlichen China."  #NT!
 AUS_change_monarch_2011.t:0 "Der Tod Otto von Habsburgs"  #NT!
 AUS_change_monarch_2011.d:0 "Otto von Habsburg, letzter Erbe der Österreichisch-Ungarischen Monarchie, starb am 4. Juli 2011 im Alter von 98 Jahren. Seine Beerdigung in Wien markierte das symbolische Ende einer 640-jährigen Dynastie. Sein Körper wurde in der Kaisergruft beigesetzt, während sein Herz in Anlehnung an die habsburgische Tradition separat in Ungarn beigesetzt wurde."  #NT!
 EGY_change_monarch_1952.t:0 "Die Geburt von Fuad II"  #NT!
 EGY_change_monarch_1952.d:0 "Fuad II. von Ägypten wurde am 16. Januar 1952 im Abdeen-Palast in Kairo geboren. Als Sohn von König Farouk I. und Königin Narriman Sadek wurde er nur wenige Monate später Ägyptens letzter Monarch und regierte kurz nach der Abdankung seines Vaters, bevor die Monarchie 1953 abgeschafft wurde."  #NT!
 PER_change_monarch_1960.t:0 "Die Geburt von Reza Pahlavi"  #NT!
 PER_change_monarch_1960.d:0 "Reza Pahlavi, Kronprinz des Iran, wurde am 31. Oktober 1960 in Teheran geboren. Als Sohn von Schah Mohammad Reza Pahlavi und Kaiserin Farah Diba wurde er 1967 zum Erben des Pfauenthrons ernannt. Seine Geburt symbolisierte die Kontinuität der Pahlavi-Dynastie."  #NT!
 JOR_change_monarch_1962.t:0 "Die Geburt von Abdullah II"  #NT!
 JOR_change_monarch_1962.d:0 "Abdullah II. wurde am 30. Januar 1962 in Amman, Jordanien, als ältester Sohn von König Hussein und Prinzessin Muna geboren. Als haschemitischer Nachkomme des Propheten Mohammed wurde er bei seiner Geburt zum Kronprinzen ernannt. Seine Erziehung verband jordanische Tradition mit internationaler Bildung und prägte seine zukünftige Führung."  #NT!
  
