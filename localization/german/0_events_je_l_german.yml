 je_plot_against_the_dictator_system:0 "Plot gegen [SCOPE.sCharacter('targeted_dictator_scope').GetFullName]"  #NT!
 je_plot_against_the_dictator_system_reason:0 "Eine Verschwörung hochrangiger Mitglieder der [concept_government], um [SCOPE.sCharacter('targeted_dictator_scope').GetFullName] aus dem Amt zu entfernen, wurde entdeckt.\n\nUm diese Verschwörung zu überleben, muss [SCOPE.sCharacter('targeted_dictator_scope').GetFullName] sicherstellen, dass [concept_legitimacy] über 20 bleibt und dass kein [concept_interest_group] in der [concept_government] unzufrieden ist, wenn der Timer abgelaufen ist."  #NT!
 je_plot_against_the_dictator_system_1.tt:0 "[SCOPE.sCharacter('targeted_dictator_scope').GetFullName]s politische Position wird gestärkt"  #NT!
