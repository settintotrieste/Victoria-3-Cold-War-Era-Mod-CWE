 concept_progressive_judiciary:0 "Progressiv"  #NT!
 concept_progressive_judiciary_desc:0 "Progressive Richter sind diejenigen, die glauben, dass die Verfassung ein schriftliches Dokument ist und daher entsprechend den vorherrschenden gesellschaftspolitischen Bedingungen ausgelegt werden sollte. Dies wird im Laufe der Zeit zu Entscheidungen führen, die die Grundfreiheiten unserer Bürger erweitern."  #NT!
 concept_conservative_judiciary:0 "Textualist"  #NT!
 concept_conservative_judiciary_desc:0 "Textualistische Richter sind diejenigen, die glauben, dass die Verfassung ein schriftliches Dokument ist und daher nicht entsprechend den vorherrschenden gesellschaftspolitischen Bedingungen ausgelegt werden sollte. Dies wird im Laufe der Zeit zu Entscheidungen führen, die die Grundfreiheiten unserer Bürger schwächen, da Verfassungen selten gut geschrieben sind."  #NT!
  
 judiciary_progress_generic_desc:0 "In einem wegweisenden Urteil entschied der [SCOPE.GetRootScope.GetCountry.GetCustom('supreme_court_name')], dass ein Gesetz, das die Grundfreiheiten der [ROOT.GetCountry.GetAdjectiveNoFlag] Bürger einschränkt, verfassungswidrig ist. Zur Begründung seiner Entscheidung verwies das Gericht auf die Notwendigkeit, die Rechtsstaatlichkeit in [ROOT.GetCountry.GetName] aufrechtzuerhalten und zu stärken. Da es sich jedoch nur um eine gerichtliche Entscheidung handelt, kann der [concept_government] einen Gesetzentwurf verabschieden, um diese Entscheidung aufzuheben."  #NT!
 judiciary_regress_generic_desc:0 "In einem Wendepunkturteil entschied die [SCOPE.GetRootScope.GetCountry.GetCustom('supreme_court_name')], dass ein Gesetz, das die Grundfreiheiten der [ROOT.GetCountry.GetAdjectiveNoFlag] Bürger schützt, untergraben werden kann. Zur Begründung seiner Entscheidung führte das Gericht an, dass eine vage und möglicherweise schlampige Formulierung in der Verfassung eine Gesetzeslücke geschaffen habe, die zuvor unzulässige Aktivitäten erlaubte. Da es sich jedoch nur um eine gerichtliche Entscheidung handelt, kann der [concept_government] einen Gesetzentwurf verabschieden, um diese Entscheidung aufzuheben."  #NT!
  
