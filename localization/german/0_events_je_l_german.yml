 je_tekhpromfinplans:0 "Tekhpromfinplans"  #NT!
 je_tekhpromfinplans_reason:0 "Unter dem [ROOT.GetCountry.GetAdjective] $law_semi_command_economy$ werden Investitionsentscheidungen dezentralisiert. Unternehmen müssen Jahrespläne, sogenannte „Techpromfinplans“, vorlegen, in denen Produktionspläne für jedes Quartal und jeden Monat festgelegt werden. Staatliche Planungsbeamte würden diese Pläne dann genehmigen (oder auch nicht) und Vorräte und Geld bereitstellen. Anschließend verkauft das Unternehmen seine Produkte im Rahmen der Planbeschränkungen. \n\nDieses System ermöglicht es [concept_government], Gelder von [concept_gold_reserves] an [concept_investment_pool] zu übertragen, um den Staatsunternehmen den autonomen Bau von [Concept('concept_building', '$concept_buildings$')] zu ermöglichen."  #NT!
 je_tekhpromfinplans_status:0 "[concept_investment_pool]: #Green [GetPlayer.MakeScope.Var('tekhpromfinplans_fund_size').GetValue]M#!"  #NT!
  
 je_start_inject_tekhpromfinplans_button:0 "Beginnen Sie mit der Genehmigung von Projekten"  #NT!
 je_start_inject_tekhpromfinplans_button_desc:0 "Der [concept_government] genehmigt die von den dezentralen Staatsunternehmen vorgelegten Investitionspläne und transferiert Gelder von [concept_treasury] an [concept_investment_pool], damit diese Pläne jeden Monat ausgeführt werden können, wenn das wöchentliche Netto-Fixeinkommen mindestens @money!#yellow 10000#!. beträgt"  #NT!
 je_stop_inject_tekhpromfinplans_button:0 "Hören Sie auf, Projekte zu genehmigen"  #NT!
 je_stop_inject_tekhpromfinplans_button_desc:0 "Die [concept_government] wird die von den dezentralen Staatsunternehmen vorgelegten Investitionspläne nicht mehr genehmigen."  #NT!
  
 start_tekhpromfinplans.tt:0 "Hat im letzten Monat nicht mit der Genehmigung von Projekten begonnen oder aufgehört"  #NT!
  
