 irish_open_border.t:0 "Irische offene Grenze"  #NT!
 irish_open_border.d:0 "Aus historischen Gründen wurde die Grenze zwischen Südirland und Nordirland offen gelassen. Dadurch können sich Bürger aus beiden Teilen der irischen Insel frei von einem Teil in einen anderen bewegen. Dies wird im Spiel dadurch dargestellt, dass [SCOPE.sCountry('irish_country').GetName] in die Zollunion von [SCOPE.sCountry('british_country').GetName] eingefügt wird."  #NT!
 irish_open_border.f:0 "Dieses Ereignis kann vermieden werden, indem man entweder das Isolationismusgesetz erlässt, zu einem nichtdemokratischen Regierungstyp wird oder keine Landgrenze mehr mit [SCOPE.sCountry('british_country').GetName] teilt."  #NT!
  
