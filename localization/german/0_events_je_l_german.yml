 je_cabinet:0 "Die [ROOT.GetCountry.GetRuler.GetLastName] [SCOPE.GetRootScope.GetCountry.GetCustom('cabinet_name_custom_title')]"  #NT!
 je_cabinet_reason:0 "$RULING_PARTY_IDEOLOGY_cabinet_JE$ \n\nDer [SCOPE.GetRootScope.GetCountry.GetCustom('cabinet_name_custom_title')] ist eine Gruppe von Beratern eines Staatsoberhaupts, die auch als Leiter von Regierungsabteilungen fungieren. Seine Mitglieder werden vom [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] ernannt. \n\n[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [ROOT.GetCountry.GetRuler.GetFullName] kann jeden [concept_government] [concept_interest_group] einladen, sich dem [SCOPE.GetRootScope.GetCountry.GetCustom('cabinet_name_custom_title')] anzuschließen, indem er seinem Anführer mithilfe von Charakterinteraktionen eine Kabinettsposition gibt. Jedes [concept_government] [concept_interest_group], das eine [SCOPE.GetRootScope.GetCountry.GetCustom('cabinet_name_custom_title')]0 hat, wird dann Teil der [SCOPE.GetRootScope.GetCountry.GetCustom('cabinet_name_custom_title')] sein. \n\n[SCOPE.GetRootScope.GetCountry.GetCustom('cabinet_name_custom_title')]2 Kabinettseinheit:[SCOPE.GetRootScope.GetCountry.GetCustom('cabinet_name_custom_title')]3 [SCOPE.GetRootScope.GetCountry.GetCustom('cabinet_name_custom_title')]2 [SCOPE.GetRootScope.GetCountry.GetCustom('cabinet_name_custom_title')]5 ([SCOPE.GetRootScope.GetCountry.GetCustom('cabinet_name_custom_title')]6 %)[SCOPE.GetRootScope.GetCountry.GetCustom('cabinet_name_custom_title')]3 \n\nDie Kabinettseinheit wird berechnet, indem 100 durch die Anzahl der [concept_government] [SCOPE.GetRootScope.GetCountry.GetCustom('cabinet_name_custom_title')]9 ([SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]0) dividiert wird, die nicht mindestens [SCOPE.GetRootScope.GetCountry.GetCustom('cabinet_name_custom_title')]2 0[SCOPE.GetRootScope.GetCountry.GetCustom('cabinet_name_custom_title')]3 haben [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]3. [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]4 \n\n[SCOPE.GetRootScope.GetCountry.GetCustom('cabinet_name_custom_title')]2 [SCOPE.GetRootScope.GetCountry.GetCustom('cabinet_name_custom_title')]9 im Kabinett:[SCOPE.GetRootScope.GetCountry.GetCustom('cabinet_name_custom_title')]3 [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]8 [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]9 [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]0 [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]1 [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]2 [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]3 [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]4 \n\n[SCOPE.GetRootScope.GetCountry.GetCustom('cabinet_name_custom_title')]2 Leiter des öffentlichen Dienstes:[SCOPE.GetRootScope.GetCountry.GetCustom('cabinet_name_custom_title')]3 [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]7 \n\n[SCOPE.GetRootScope.GetCountry.GetCustom('cabinet_name_custom_title')]2 Chef der Streitkräfte:[SCOPE.GetRootScope.GetCountry.GetCustom('cabinet_name_custom_title')]3 [ROOT.GetCountry.GetRuler.GetFullName]0"  #NT!
 je_cabinet_status:0 "Kabinettseinheit: [GetPlayer.MakeScope.Var('cabinet_unity_var').GetValue] %"  #NT!
 je_issue_executive_order_button:0 "Erteilen Sie eine Executive Order"  #NT!
 je_issue_executive_order_button_desc:0 "Eine Executive Order wird es uns ermöglichen, die Notwendigkeit einer Mehrheit in der [SCOPE.GetRootScope.GetCountry.GetCustom('upper_house_name')] zu umgehen und [concept_legitimacy] zu erhöhen."  #NT!
  
 je_issue_royal_decree_button:0 "Erlass einen königlichen Erlass"  #NT!
 je_issue_royal_decree_button_desc:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [ROOT.GetCountry.GetRuler.GetFullName] kann einen königlichen Erlass erlassen, der [concept_government] und [concept_opposition] auffordert, ihre Differenzen beizulegen, um eine Einheitsregierung zu bilden. Dieser Akt der königlichen Intervention wird es einfacher machen, Regierungen mit ideologisch unterschiedlichen [Concept('concept_interest_group', '$concept_interest_groups$')] zu bilden."  #NT!
  
 je_call_elections_button:0 "Rufen Sie Wahlen an"  #NT!
 je_call_elections_button_desc:0 "Unter dem parlamentarischen System von [ROOT.GetCountry.GetName] kann der [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] das Parlament jederzeit auflösen, um einen [concept_election] einzuberufen."  #NT!
 je_enact_state_of_emergency_button:0 "Erklären Sie den Ausnahmezustand"  #NT!
 je_enact_state_of_emergency_button_desc:0 "Ein Ausnahmezustand gibt dem [concept_government] mehr [concept_legitimacy] und macht das Halten eines [concept_election] überflüssig."  #NT!
 je_lift_state_of_emergency_button:0 "Ausnahmezustand beenden"  #NT!
 je_lift_state_of_emergency_button_desc:0 "Die [concept_government] wird den Ausnahmezustand in [ROOT.GetCountry.GetName] aufheben. Dadurch wird [Concept('concept_election', '$concept_elections$')] wieder aktiviert."  #NT!
  
 je_commence_democratic_reform_button:0 "Starten Sie demokratische Reformen"  #NT!
 je_commence_democratic_reform_button_desc:0 "Der amtierende [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] wird durch den [SCOPE.GetRootScope.GetCountry.GetCustom('cabinet_name_custom_title')] durch einen demokratischen ersetzt, damit der [concept_government] mit der Verabschiedung eines liberaleren [Concept('concept_law','$concept_laws$')] beginnen kann."  #NT!
  
 unconstitutional_state_of_emergency.t:0 "Verfassungswidriger Ausnahmezustand"  #NT!
 unconstitutional_state_of_emergency.d:0 "Die [SCOPE.GetRootScope.GetCountry.GetCustom('supreme_court_name')] hat festgestellt, dass die Verhängung des Ausnahmezustands durch [ROOT.GetCountry.GetRuler.GetFullName] in [ROOT.GetCountry.GetName] rechtswidrig ist, da sie zu einem Zeitpunkt geltend gemacht wird, in dem im Land kein tatsächlicher Ausnahmezustand herrscht. Das Gericht ordnet daher an, dass die Regierung den Ausnahmezustand beenden soll."  #NT!
