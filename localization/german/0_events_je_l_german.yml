 remilitarise_war.t:0 "[ROOT.GetCountry.GetAdjectiveNoFlag] Remilitarisierung?"  #NT!
 remilitarise_war.d:0 "Da wir uns derzeit bei [concept_war] befinden, ist es vielleicht an der Zeit, die $law_peasant_levies$ [concept_law] aufzuheben, damit wir beginnen können, Divisionen zu mobilisieren, um unser Land zu retten?"  #NT!
 remilitarise_war.f:0 "Dieses Ereignis wurde ausgelöst, weil [ROOT.GetCountry.GetName] bei [concept_war] liegt und $law_peasant_levies$ [concept_law] hat."  #NT!
 remilitarise_war.option.1:0 "Beginnen Sie mit der Mobilisierung!"  #NT!
 remilitarise_war.option.2:0 "Vielleicht auch nicht."  #NT!
  
 wartime_suspended_elections.t:0 "Geplante Wahlen ausgesetzt"  #NT!
 wartime_suspended_elections.d:0 "Angesichts des anhaltenden Konflikts hat die Regierung angekündigt, alle geplanten Wahlen bis auf weiteres auszusetzen. Diese für die nationale Sicherheit und Einheit als wesentlich erachtete Maßnahme bleibt in Kraft, bis die Feindseligkeiten nachlassen. Die Behörden betonen, dass demokratische Prozesse nicht aufgegeben, sondern vorübergehend verschoben werden, um die Stabilität und das Überleben der Nation zu sichern."  #NT!
 wartime_suspended_elections.f:0 "Dieses Ereignis wurde ausgelöst, weil [ROOT.GetCountry.GetName] bei [concept_war] liegt und sich in einem [concept_revolution] befindet oder eines seiner Gebiete besetzt ist."  #NT!
 wartime_unsuspended_elections.t:0 "Wiederaufnahme der geplanten Wahlen"  #NT!
 wartime_unsuspended_elections.d:0 "Mit dem Ende der Feindseligkeiten hat die Regierung die Aussetzung der Wahlen aufgehoben. Die demokratischen Prozesse werden wie geplant wieder aufgenommen und bekräftigen das Engagement des Landes für eine repräsentative Regierungsführung."  #NT!
 wartime_unsuspended_elections.f:0 "Dieses Ereignis wurde ausgelöst, weil [ROOT.GetCountry.GetName] nicht mehr bei [concept_war] liegt"  #NT!
 wartime_suspended_elections.option:0 "Zur Kenntnis genommen."  #NT!
  
 wartime_suspended_elections:0 "Wahlen durch Krieg ausgesetzt"  #NT!
  
 je_sovereign_wealth_fund:0 "[ROOT.GetCountry.GetAdjectiveNoFlag] Staatsfonds"  #NT!
 je_sovereign_wealth_fund_reason:0 "Die [ROOT.GetCountry.GetAdjectiveNoFlag] Investment Corporation ist ein staatliches Unternehmen, das es dem Staat ermöglicht, in den [ROOT.GetCountry.GetAdjective] privaten Sektor zu investieren. Die Dividenden aus dieser Investitionstätigkeit werden dann in einem von der Regierung verwalteten Staatsfonds zusammengefasst. Dieses System ermöglicht es der Regierung effektiv, Geld aus dem [concept_investment_pool] in Höhe von Beträgen zuzuführen und abzuheben, die auf den Grad der staatlichen Beteiligung am privaten Sektor abgestimmt sind. \n\n#BOLD Größe des Staatsfonds:#! #Green @money![GetPlayer.MakeScope.Var('sovereign_wealth_fund_size_display').GetValue]M#! \n\n#BOLD Maximale Ein- oder Auszahlung pro Monat:#! @money![ROOT.GetCountry.GetAdjective]0 \n\n#BOLD Anzahl staatseigener Privatunternehmen:#! [ROOT.GetCountry.GetAdjective]3 / [ROOT.GetCountry.GetAdjective]4 \n\n#BOLD Vorsitzender:#! [ROOT.GetCountry.GetAdjective]7"  #NT!
 je_sovereign_wealth_fund_status:0 "Kontostand: #Green @money![GetPlayer.MakeScope.Var('sovereign_wealth_fund_size_display').GetValue]M#!"  #NT!
  
 je_start_withdraw_sovereign_fund_button:0 "Beginnen Sie mit dem Abheben von Geldern"  #NT!
 je_start_withdraw_sovereign_fund_button_desc:0 "Der [concept_government] überweist jeden Monat Geld vom [concept_investment_pool] zum [ROOT.GetCountry.GetAdjectiveNoFlag] [concept_treasury], wenn der [concept_investment_pool] mindestens @money!#yellow 10000#!. hat"  #NT!
