 notification_colonial_purge_notification_name:0 "[SCOPE.sCountry('overlord_country').GetAdjective] Säuberung von [SCOPE.sCountry('subject_country').GetName]"  #NT!
 notification_colonial_purge_notification_desc:0 "Die [SCOPE.sCountry('overlord_country').GetAdjective] [concept_government] hat in [SCOPE.sCountry('subject_country').GetName] eine Säuberung antikolonialer Dissidenten durchgeführt. Dies hat dazu geführt, dass [SCOPE.sCountry('subject_country').GetName] #g 20#! [concept_liberty_desire] verloren haben und jeder [Concept('concept_primary_cultures','$concept_primary_culture$')] Pop in [SCOPE.sCountry('subject_country').GetName] #r 0,50 %#! seines Lebens verloren hat."  #NT!
  
 je_occupation_of_austria:0 "Besetzung Österreichs"  #NT!
 je_occupation_of_austria_reason:0 "Am Ende des Zweiten Weltkriegs in Europa wurde Österreich von den Alliierten besetzt und erklärte am 27. April 1945 seine Unabhängigkeit von Nazi-Deutschland. Während Deutschland 1949 in Ost- und Westdeutschland geteilt wurde, blieb Österreich unter der gemeinsamen Besatzung der Westalliierten und der Sowjetunion. \n\nWährend Deutschland 1949 in Ost- und Westdeutschland geteilt wurde, blieb Österreich unter der gemeinsamen Besatzung der Westalliierten und der Sowjetunion."  #NT!
  
 je_occupation_of_austria_end_occupation_button:0 "Ende [ROOT.GetCountry.GetAdjectiveNoFormatting] Besetzung Österreichs"  #NT!
 je_occupation_of_austria_end_occupation_button_desc:0 "Die [ROOT.GetCountry.GetAdjective] [concept_government] wird ihre militärische Besetzung Österreichs beenden. Damit endet unsere gemeinsame Oberhoheit über Österreich; alle anderen Partner dieser Regelung werden eingeladen, ihre Besetzung Österreichs ebenfalls zu beenden."  #NT!
  
 je_occupation_of_berlin:0 "Besetzung Berlins"  #NT!
 je_occupation_of_berlin_reason:0 "Am Ende des Zweiten Weltkriegs in Europa wurde Berlin von alliierten Streitkräften eingenommen und am 27. April 1945 offiziell von Nazi-Deutschland getrennt. Die Stadt wurde in vier Besatzungszonen aufgeteilt, die von den Vereinigten Staaten, dem Vereinigten Königreich, Frankreich und der Sowjetunion verwaltet wurden. \n\nWest-Berlin blieb de jure unter der Herrschaft der Westalliierten, wurde aber aus praktischen Gründen als Teil Westdeutschlands behandelt; Allerdings besaßen die Bewohner keine westdeutschen Pässe."  #NT!
  
 je_occupation_of_berlin_end_occupation_button:0 "Ende [ROOT.GetCountry.GetAdjectiveNoFormatting] Besetzung Berlins"  #NT!
 je_occupation_of_berlin_end_occupation_button_desc:0 "Die [ROOT.GetCountry.GetAdjective] [concept_government] wird ihre militärische Besetzung Berlins beenden. Damit endet unsere gemeinsame Oberhoheit über Berlin; alle anderen Partner dieser Regelung werden eingeladen, ihre Besetzung Berlins ebenfalls zu beenden."  #NT!
  
