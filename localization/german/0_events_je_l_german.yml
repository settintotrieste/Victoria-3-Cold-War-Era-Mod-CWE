 je_judiciary_foreign_reason:0 "Das [SCOPE.GetRootScope.GetCountry.GetCustom('foreign_supreme_court_name')] von [SCOPE.sCountry('legal_union_foreign_supreme_court').GetName] ist das höchste Gericht in der Justiz von [ROOT.GetCountry.GetName]. Es verfügt über die oberste Berufungsgerichtsbarkeit für alle Gerichtsverfahren, die eine Frage des Verfassungs- oder Gesetzesrechts betreffen, und kann je nach Grad der Autonomie der Richter Gesetze einseitig ändern.\n\nDa [ROOT.GetCountry.GetName] in einer $legal_union$ mit [SCOPE.sCountry('legal_union_foreign_supreme_court').GetName] steht, werden die Richter der [SCOPE.GetRootScope.GetCountry.GetCustom('foreign_supreme_court_name')] von der [SCOPE.sCountry('legal_union_foreign_supreme_court').GetAdjectiveNoFlag]-Regierung ausgewählt.\n\n Gesamtzahl der Richter: #BOLD [GetPlayer.MakeScope.Var('judiciary_size').GetValue][SCOPE.sCountry('legal_union_foreign_supreme_court').GetName]0 Anzahl der [SCOPE.sCountry('legal_union_foreign_supreme_court').GetName]1 Richter: #BOLD [SCOPE.sCountry('legal_union_foreign_supreme_court').GetName]3 [SCOPE.sCountry('legal_union_foreign_supreme_court').GetName]4 \n\nHinweis: [SCOPE.sCountry('legal_union_foreign_supreme_court').GetName]1 Richter werden demokratischere [SCOPE.sCountry('legal_union_foreign_supreme_court').GetName]6 in der Kategorie [SCOPE.sCountry('legal_union_foreign_supreme_court').GetName]7 und [SCOPE.sCountry('legal_union_foreign_supreme_court').GetName]8 unterstützen."  #NT!
