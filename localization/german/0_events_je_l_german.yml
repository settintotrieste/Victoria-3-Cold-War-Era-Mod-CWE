 join_WTO_decision:0 "Treten Sie der Welthandelsorganisation bei"  #NT!
 join_WTO_decision_desc:0 "Die Welthandelsorganisation (WTO) ist eine zwischenstaatliche Organisation, die den internationalen Handel reguliert und erleichtert. Die WTO erleichtert den Handel mit Waren, Dienstleistungen und geistigem Eigentum zwischen den teilnehmenden Ländern, indem sie einen Rahmen für die Aushandlung von Handelsabkommen bietet, die in der Regel auf die Reduzierung oder Beseitigung von Zöllen, Quoten und anderen Beschränkungen abzielen."  #NT!
 leave_WTO_decision:0 "Verlassen Sie die Welthandelsorganisation"  #NT!
 leave_WTO_decision_desc:0 "Die Welthandelsorganisation (WTO) ist eine zwischenstaatliche Organisation, die den internationalen Handel reguliert und erleichtert. Die WTO erleichtert den Handel mit Waren, Dienstleistungen und geistigem Eigentum zwischen den teilnehmenden Ländern, indem sie einen Rahmen für die Aushandlung von Handelsabkommen bietet, die in der Regel auf die Reduzierung oder Beseitigung von Zöllen, Quoten und anderen Beschränkungen abzielen."  #NT!
 WTO_member:0 "Mitglied der Welthandelsorganisation"  #NT!
 wto_expulsion.t:0 "Verließ die Welthandelsorganisation"  #NT!
 wto_expulsion.d:0 "Die Mitgliedschaft von [ROOT.GetCountry.GetCountry] in der Welthandelsorganisation wurde beendet."  #NT!
 wto_expulsion.f:0 "Dieses Ereignis wurde ausgelöst, weil [ROOT.GetCountry.GetCountry] entweder nicht mehr ausreichend unabhängig oder nicht-isolationistisch ist oder einen hohen Ruf genießt."  #NT!
  
 je_wto_system:0 "Die Welthandelsorganisation"  #NT!
 je_wto_system_reason:0 "Die Welthandelsorganisation (WTO) ist eine zwischenstaatliche Organisation, die den internationalen Handel reguliert und erleichtert. Die WTO erleichtert den Handel mit Waren, Dienstleistungen und geistigem Eigentum zwischen den teilnehmenden Ländern, indem sie einen Rahmen für die Aushandlung von Handelsabkommen bietet, die in der Regel auf die Reduzierung oder Beseitigung von Zöllen, Quoten und anderen Beschränkungen abzielen. \n\nDa die WTO ihre Handelsrahmen ständig aktualisiert, schwankt die Kürzung um [concept_tariffs] durch die WTO jedes Jahr. \n\nHinweis: Der reduzierte Betrag von [concept_tariffs] hängt von den globalen Wirtschaftsaussichten ab."  #NT!
  
