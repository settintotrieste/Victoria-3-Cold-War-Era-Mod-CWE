 reserve_powers_veto.d:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('government_ceremonial_ruler_custom_title')] [SCOPE.sCharacter('ceremonial_head_of_state').GetFullName] hat im [SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')] sein Veto gegen den Gesetzentwurf zur Verabschiedung von [SCOPE.sLaw('current_law_scope').GetName] eingelegt. Die Regierung kann das Veto jedoch außer Kraft setzen, wenn sie im [SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')] über eine Mehrheit verfügt."  #NT!
