 nato_join_war.t:0 "Kollektive Verteidigung aufgerufen"  #NT!
 nato_join_war.d:0 "[SCOPE.sCountry('nato_victim').GetName] hat sich auf Artikel 5 der NATO-Charta berufen, der vorschreibt, dass sich die Mitgliedstaaten gegenseitig gegen Angriffe Dritter verteidigen."  #NT!
 nato_join_war.f:0 "Dieses Ereignis wurde ausgelöst, weil [SCOPE.sCountry('nato_victim').GetName] von einem fremden Land angegriffen wurde und beschlossen hat, in seinem Krieg um NATO-Unterstützung zu bitten."  #NT!
