 notification_requested_overlord_takes_subject_debt_notification_desc:0 "Um die allgemeine Zahlungsfähigkeit des [SCOPE.sCountry('colonial_empire_creditor').GetAdjective]-Imperiums zu wahren, hat [SCOPE.sCountry('colonial_empire_creditor').GetName] es mit [SCOPE.sCountry('colonial_empire_debtor').GetName]s [Concept('concept_credit','$concept_credit_debt$')] aufgenommen."  #NT!
  
 je_start_imperial_preference_button:0 "Aktivieren Sie die [SCOPE.GetRootScope.GetCountry.GetCustom('imperial_conference_custom_adjective')]-Präferenz"  #NT!
 je_start_imperial_preference_button_desc:0 "Die [SCOPE.GetRootScope.GetCountry.GetCustom('imperial_conference_custom_adjective')]-Präferenz ist ein System der gegenseitigen Zollsenkung, das im gesamten [ROOT.GetCountry.GetAdjective]-Reich eingeführt wird. Ziel ist es, den Binnenhandel innerhalb des Imperiums zu stärken. \n\nIm Spiel ausgedrückt wird die [SCOPE.GetRootScope.GetCountry.GetCustom('imperial_conference_custom_adjective')]-Präferenz dadurch dargestellt, dass [ROOT.GetCountry.GetName] ein [concept_customs_union] mit seinen [concept_dominion]s teilt."  #NT!
  
 je_end_imperial_preference_button:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('imperial_conference_custom_adjective')]-Präferenz abschaffen"  #NT!
 je_end_imperial_preference_button_desc:0 "Die [SCOPE.GetRootScope.GetCountry.GetCustom('imperial_conference_custom_adjective')]-Präferenz ist ein System der gegenseitigen Zollsenkung, das im gesamten [ROOT.GetCountry.GetAdjective]-Reich eingeführt wird. \n\nIm Spiel ausgedrückt wird die [SCOPE.GetRootScope.GetCountry.GetCustom('imperial_conference_custom_adjective')]-Präferenz dadurch dargestellt, dass [ROOT.GetCountry.GetName] ein [concept_customs_union] mit seinen [concept_dominion]s teilt. \n\nDurch die Abschaffung der [SCOPE.GetRootScope.GetCountry.GetCustom('imperial_conference_custom_adjective')]-Präferenz werden die [concept_customs_union] [ROOT.GetCountry.GetName]-Anteile mit ihren [concept_dominion]s entfernt."  #NT!
  
