 reserve_powers_pm_veto.t:0 "Opposition von der [SCOPE.GetRootScope.GetCountry.GetCustom('government_prime_minister_custom_title')]"  #NT!
 reserve_powers_pm_veto.d:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('government_prime_minister_custom_title')] [SCOPE.sCharacter('ceremonial_head_of_state').GetFullName] weigert sich, für den Gesetzentwurf in [SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')] zur Verabschiedung von [SCOPE.sLaw('current_law_scope').GetName] zu stimmen. [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [GetPlayer.GetRuler.GetFullName] kann jedoch die [SCOPE.GetRootScope.GetCountry.GetCustom('government_prime_minister_custom_title')] unter Druck setzen, für den Gesetzentwurf zu stimmen, wenn die [concept_government] über genügend [concept_legitimacy] verfügt."  #NT!
 reserve_powers_pm_veto.f:0 "Dieses Ereignis wurde ausgelöst, weil [SCOPE.GetRootScope.GetCountry.GetCustom('government_prime_minister_custom_title')] das aktuell in Kraft getretene [concept_law] entweder ablehnt oder entschieden ablehnt. Der [concept_ruler] kann jedoch den Widerstand des [SCOPE.GetRootScope.GetCountry.GetCustom('government_prime_minister_custom_title')] überwinden, wenn [concept_legitimacy] über 50 liegt."  #NT!
  
 reserve_powers_pm_veto_accept_option:0 "Versuche, den aktuellen Gesetzentwurf in Kraft zu setzen, aufgeben."  #NT!
 reserve_powers_pm_veto_reject_option:0 "Der [SCOPE.GetRootScope.GetCountry.GetCustom('government_prime_minister_custom_title')] muss sich dem Willen des [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] unterwerfen!"  #NT!
  
 je_cohabitation_system:0 "Eine geteilte Exekutive"  #NT!
 je_cohabitation_system_reason:0 "Gemäß der Verfassung von [ROOT.GetCountry.GetName] werden die exekutiven Funktionen von [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] mit [SCOPE.GetRootScope.GetCountry.GetCustom('government_prime_minister_custom_title')] geteilt. Dies bedeutet, dass die [SCOPE.GetRootScope.GetCountry.GetCustom('government_prime_minister_custom_title')] ein gewisses Mitspracherecht bei der Formulierung von Gesetzen und Richtlinien des Landes hat. \n\nWenn der [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] einer anderen politischen Fraktion angehört als die Mehrheit der Mitglieder der [SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')], entsteht eine geteilte Regierung, weil die [SCOPE.GetRootScope.GetCountry.GetCustom('government_prime_minister_custom_title')] einen [SCOPE.GetRootScope.GetCountry.GetCustom('government_prime_minister_custom_title')] benennen muss, der für die Mehrheitsfraktion innerhalb der [SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')] akzeptabel ist. \n\nDa [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]0 nicht aus [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]1 mit dem höchsten [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]2 in [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]3 stammt, gibt es eine geteilte [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]3 in [ROOT.GetCountry.GetName]. Der [SCOPE.GetRootScope.GetCountry.GetCustom('government_prime_minister_custom_title')] kann daher ein Veto gegen die Verabschiedung eines [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]7 einlegen, den [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]1 des [SCOPE.GetRootScope.GetCountry.GetCustom('government_prime_minister_custom_title')] missbilligt. \n\nAktuell [SCOPE.GetRootScope.GetCountry.GetCustom('government_prime_minister_custom_title')]: [SCOPE.GetRootScope.GetCountry.GetCustom('government_prime_minister_custom_title')]1"  #NT!
  
