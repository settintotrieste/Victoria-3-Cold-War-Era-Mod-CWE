 OPEC_embargo_invitation.t:0 "OPEC-Ölembargo gegen [SCOPE.sCountry('OPEC_embargo_target').GetName]?"  #NT!
 OPEC_embargo_invitation.d:0 "Der Vorsitzende der OPEC, [SCOPE.sCountry('OPEC_leader').GetName], hat eine Resolution verabschiedet, in der er alle OPEC-Mitglieder auffordert, den Ölexport nach [SCOPE.sCountry('OPEC_embargo_target').GetName] einzustellen. As [ROOT.GetCountry.GetName] is a member of OPEC, we can opt to either join in on the embargo or to not participate in it."  #NT!
 OPEC_embargo_invitation.f:0 "[SCOPE.sCountry('OPEC_leader').GetName] hat ein Ölembargo gegen [SCOPE.sCountry('OPEC_embargo_target').GetName] verhängt, weil sie untereinander feindselige Beziehungen haben und weil [SCOPE.sCountry('OPEC_leader').GetName] $relations_amicable$ Beziehungen zu allen anderen OPEC-Mitgliedern hat, was ihm das Selbstvertrauen gab, einen solchen Antrag bei der OPEC zu stellen. Hinweis: Hinweis: Durch diese diplomatische Aktion wird ein vollständiges Embargo eingeleitet, da die V3-Engine derzeit noch keine Embargos für bestimmte Waren zulässt."  #NT!
 OPEC_accept_embargo:0 "Schließen Sie sich dem Ölembargo an!"  #NT!
 OPEC_reject_embargo:0 "Wir werden niemandem sein kostbares Öl vorenthalten."  #NT!
  
 special_administrative_region_system.1.t:0 "Die Sonderverwaltungszone [SCOPE.sCountry('SAR_country').GetName]"  #NT!
 special_administrative_region_system.1.d:0 "[ROOT.GetCountry.GetName] hat die Bildung einer neuen Sonderverwaltungszone in [SCOPE.sCountry('SAR_country').GetName] angekündigt. Dies gibt den Menschen von [SCOPE.sCountry('SAR_country').GetName] größere Autonomie über ihre Innenpolitik im Gegenzug dafür, dass sie [ROOT.GetCountry.GetAdjective] unterwürfig bleiben. Die internationale Gemeinschaft hat diese Nachricht mit großem Applaus aufgenommen."  #NT!
 special_administrative_region_system.1.f:0 "Die Sonderverwaltungsregion [SCOPE.sCountry('SAR_country').GetName], da die Hauptstadt des Subjekts ein Heimatland von [ROOT.GetCountry.GetName] war. Diese Regelung wird verhindern, dass das Territorium über das Entkolonialisierungssystem seine Unabhängigkeit anstrebt, da [SCOPE.sCountry('SAR_country').GetName] nach internationalem Recht als rechtmäßig zu [ROOT.GetCountry.GetName] gehörend angesehen wird."  #NT!
