 french_community.sgc.t:0 "Die französische Gemeinschaft"  #NT!
 french_community.sgc.d:0 "Die Französische Gemeinschaft war die verfassungsmäßige Organisation, die im Oktober 1958 zwischen Frankreich und seinen verbleibenden afrikanischen Kolonien gegründet wurde, die sich damals im Prozess der Dekolonisierung befanden. Sie löste die Französische Union ab, die 1946 das Kolonialreich neu organisiert hatte. Während die Gemeinschaft formell bis 1995 existierte, als das französische Parlament sie offiziell auflöste, hatte sie Ende 1960 faktisch aufgehört zu existieren und zu funktionieren; zu diesem Zeitpunkt hatten alle afrikanischen Mitglieder ihre Unabhängigkeit erklärt und sie verlassen."  #NT!
