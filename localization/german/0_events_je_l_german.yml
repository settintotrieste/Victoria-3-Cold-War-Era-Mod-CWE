 american_decolonisation_indy.option.2:0 "Sie verdienen keine Freiheit"  #NT!
  
 soviet_north_korea.indy.t:0 "Unabhängigkeit Nordkoreas?"  #NT!
 soviet_north_korea.indy.d:0 "1945, nach der japanischen Kapitulation am Ende des Zweiten Weltkriegs, wurde Korea entlang des 38. Breitengrades in zwei Zonen geteilt, wobei der Norden von der Sowjetunion und der Süden von den Vereinigten Staaten besetzt wurde. Im Jahr 1948 wurden in Korea getrennte Regierungen gebildet: die sozialistische und sowjetisch verbündete Demokratische Volksrepublik Korea im Norden und die kapitalistische, westlich verbündete Republik Korea im Süden."  #NT!
 soviet_afghanistan.indy.t:0 "Rückzug aus Afghanistan?"  #NT!
 soviet_afghanistan.indy.d:0 "Michail Gorbatschow, der im März 1985 Generalsekretär der Kommunistischen Partei der Sowjetunion wurde, begann kurz nach seiner Wahl durch das Politbüro mit der Planung eines militärischen Rückzugs aus Afghanistan. Unter seiner Führung versuchte die Sowjetunion, die Machtkonsolidierung der Demokratischen Volkspartei Afghanistans (PDPA) zu unterstützen; Mohammad Najibullah, ehemaliger Chef der afghanischen Geheimpolizei (KHAD), wurde zum Generalsekretär und später zum Präsidenten des Revolutionsrates gewählt und die sowjetischen Streitkräfte wurden nach und nach aus Afghanistan abgezogen. Nach dem sowjetischen Rückzug aus Afghanistan unterstützte Gorbatschows Regierung Najibullah weiterhin militärisch und politisch gegen die afghanische Opposition."  #NT!
  
