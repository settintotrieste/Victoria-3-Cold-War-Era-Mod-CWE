 GENERIC_FLAVOR_TEXT:0 "Der Kalte Krieg ist eine Zeit geopolitischer Spannungen zwischen dem Westblock und dem Ostblock. Welche neuen Herausforderungen wird die Zeit mit sich bringen?"  #NT!
 REV_GENERIC_FLAVOR_TEXT:1 "Diese Revolutionäre waren unzufrieden mit der Richtung, die die sogenannte organisierte Regierung einschlug, und beschlossen, zu den Waffen zu greifen, um sie zu stürzen. Wird es ihnen gelingen, die Macht zu ergreifen, oder werden sie wie so viele vergessene Revolutionen der Vergangenheit niedergeschlagen?"  #NT!
 DECENTRALIZED_FLAVOR_TEXT:0 "Dieses Land wird von stärker organisierten Mächten angegriffen und kämpft darum, ihre Autonomie aufrechtzuerhalten. Werden sie den Beginn eines neuen Jahrhunderts erleben oder wird ihr Name nur in den Geschichtsbüchern überleben?"  #NT!
