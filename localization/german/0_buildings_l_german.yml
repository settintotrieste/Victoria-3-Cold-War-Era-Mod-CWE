 mobilization_option_air_transport:0 "Luftverkehr"  #NT!
 mobilization_option_air_transport_desc:0 "Lassen Sie Ihre Soldaten auf Staatskosten mit dem Flugzeug reisen."  #NT!
 mobilization_option_special_forces:0 "Spezialeinheiten"  #NT!
 mobilization_option_special_forces_desc:0 "Bilden Sie einige Soldaten speziell für die Durchführung von Militäreinsätzen aus, die sich von den üblichen unterscheiden."  #NT!
 mobilization_option_cyber_forces:0 "Kräfte der Cyber-Kriegsführung"  #NT!
 mobilization_option_cyber_forces_desc:0 "Bilden Sie eine Militäreinheit, die sich dem Schutz und Angriff kritischer IT-Infrastruktur widmet."  #NT!
 mobilization_option_cryptography_recon:0 "Entschlüsselungssysteme"  #NT!
 mobilization_option_cryptography_recon_desc:0 "Bilden Sie eine Militäreinheit, die sich der Entschlüsselung feindlicher Übertragungen widmet."  #NT!
 mobilization_option_digital_cryptography_recon:0 "Digitale Kriegssysteme"  #NT!
 mobilization_option_digital_cryptography_recon_desc:0 "Das Militär muss für seine Kampfeinsätze die neuesten Computer und Software verwenden."  #NT!
 mobilization_option_satellite_recon:0 "Satellitenaufklärung"  #NT!
 mobilization_option_satellite_recon_desc:0 "Starten Sie mit Kameras ausgestattete Satelliten, um unsere Feinde auszuspionieren."  #NT!
 mobilization_option_drones:0 "Kampfdrohnen"  #NT!
 mobilization_option_drones_desc:0 "Eine Kampfdrohne ist ein unbemanntes Luftfahrzeug (UAV), das zur Aufklärung, Überwachung, Zielerfassung und Aufklärung eingesetzt wird und Flugzeuggeschütze wie Raketen, Panzerabwehrraketen (ATGMs) und/oder Bomben an Stützpunkten für Drohnenangriffe transportiert."  #NT!
  
 mobilization_option_military_indoctrination:0 "Militärische Indoktrination"  #NT!
 mobilization_option_military_indoctrination_desc:0 "Soldaten werden indoktriniert, Eigenschaften zu entfernen, die sich nachteilig auf das Militärleben auswirken (d. h. Eigeninteressen bei der Befolgung von Befehlen unterzuordnen), Einzelpersonen zum Töten auszubilden, wenn es nötig ist, und Rekruten zu befähigen, sich selbst als Kollektiv zu betrachten."  #NT!
 mobilization_option_political_commissars:0 "Anti-Rückzugskräfte"  #NT!
 mobilization_option_political_commissars_desc:0 "Anti-Rückzugskräfte sind Militäreinheiten, die im Hinterland oder an der Front (hinter den Hauptstreitkräften) stationiert sind, um die militärische Disziplin aufrechtzuerhalten, die Flucht von Soldaten vom Schlachtfeld zu verhindern, Spione, Saboteure und Deserteure zu fangen und Truppen zurückzubringen, die vom Schlachtfeld fliehen oder hinter ihren Einheiten zurückbleiben."  #NT!
  
