 combat_unit_type_tanks_9_desc:0 "Panzer des späten 21. Jahrhunderts"  #NT!
 combat_unit_type_tanks_10_desc:0 "Panzer des frühen 22. Jahrhunderts"  #NT!
  
 combat_unit_type_artillery_1_desc:0 "Traditionelle Geschützmannschaften leisten indirekte Feuerunterstützung aus verschanzten Stellungen, ideal für anhaltende Bombardierungen."  #NT!
 combat_unit_type_artillery_2_desc:0 "Schwerkaliber-Stellungen, die darauf ausgelegt sind, Befestigungen zu durchbrechen und hartgesottene Ziele bei längeren Belagerungen zu vernichten."  #NT!
 combat_unit_type_artillery_3_desc:0 "Mobile Feuerplattformen, die Panzerung und Artillerie kombinieren und sich schnell neu positionieren und reaktionsschnell unterstützen können."  #NT!
 combat_unit_type_artillery_4_desc:0 "Schwer gepanzerte Artillerieeinheiten mit verbessertem Schutz und erhöhter Feuerkraft für Fronteinsätze."  #NT!
 combat_unit_type_artillery_5_desc:0 "Mehrfachraketensysteme, die über weite Gebiete Flächenfeuer abfeuern und sich ideal zur Unterdrückung feindlicher Formationen eignen."  #NT!
 combat_unit_type_artillery_6_desc:0 "Hochmobile Präzisionsraketensysteme, optimiert für schnelle Einsätze und taktische Angriffe über große Entfernungen."  #NT!
 combat_unit_type_artillery_7_desc:0 "Fortschrittliche Abschussplattformen, die in der Lage sind, luftgestützte ballistische Raketen für strategische Tiefenangriffe einzusetzen."  #NT!
 combat_unit_type_artillery_8_desc:0 "Autonome Drohneneinheiten, die Präzisionsangriffe mit minimaler menschlicher Aufsicht ausführen, ideal für asymmetrische Kriegsführung."  #NT!
 combat_unit_type_artillery_9_desc:0 "Koordinierte Drohnenschwärme überwältigen die Verteidigung mit synchronisierten Multi-Vektor-Angriffen und adaptivem Zielen."  #NT!
 combat_unit_type_artillery_10_desc:0 "Elektromagnetische Railgun-Plattformen, die Hyperschallprojektile mit extremer Reichweite und kinetischer Wirkung abfeuern."  #NT!
  
 combat_unit_type_airforce_1_desc:0 "Leichte Aufklärungsflugzeuge, die zur Aufklärung feindlicher Stellungen und zur Übermittlung von Informationen auf dem Schlachtfeld eingesetzt werden."  #NT!
 combat_unit_type_airforce_2_desc:0 "Agile Flugzeugzellen, die für Nahkämpfe und einfache Luftverteidigung bei Gefechten mit geringer Geschwindigkeit konzipiert sind."  #NT!
 combat_unit_type_airforce_3_desc:0 "Düsenjäger der frühen Generation, die im Vergleich zu proprietären Vorgängern eine verbesserte Geschwindigkeit und Flughöhe bieten."  #NT!
 combat_unit_type_airforce_4_desc:0 "Hochgeschwindigkeits-Abfangjäger, die in der Lage sind, die Schallmauer zu durchbrechen und Luftkampfzonen zu dominieren."  #NT!
 combat_unit_type_airforce_5_desc:0 "Vielseitiges Flugzeug, das sowohl für Luft-Luft- als auch für Luft-Boden-Missionen ausgestattet ist und sich an wechselnde taktische Anforderungen anpassen lässt."  #NT!
 combat_unit_type_airforce_6_desc:0 "Radarumgehbare Jäger, die für präzise Angriffe und Überlebensfähigkeit im umkämpften Luftraum entwickelt wurden."  #NT!
 combat_unit_type_airforce_7_desc:0 "Fortschrittliche Stealth-Plattformen, die Flexibilität bei mehreren Rollen mit geringer Beobachtbarkeit und vernetzten Kampfsystemen kombinieren."  #NT!
 combat_unit_type_airforce_8_desc:0 "Höhenkampfflugzeuge, die in der Nähe des Randes der Atmosphäre operieren und für strategisches Abfangen und Überwachen optimiert sind."  #NT!
 combat_unit_type_airforce_9_desc:0 "Ferngesteuerte oder autonome Flugsysteme, die Aufklärungs-, Angriffs- und Unterstützungsmissionen mit minimalem Risiko durchführen."  #NT!
 combat_unit_type_airforce_10_desc:0 "Riesige Kommandoplattformen in der Luft, die Flug-, Feuerkraft- und Flottenkoordination in einer einzigen luftgestützten Festung vereinen."  #NT!
  
 combat_unit_type_light_ship_1_desc:0 "Schnelle und wendige Begleitschiffe, die für die U-Boot-Abwehr, den Konvoischutz und die schnelle Reaktion konzipiert sind."  #NT!
 combat_unit_type_light_ship_2_desc:0 "Stille Jäger unter den Wellen, die zu heimlicher Aufklärung und verheerenden Torpedoangriffen fähig sind."  #NT!
 combat_unit_type_light_ship_3_desc:0 "Von Kernreaktoren angetriebene Tiefsee-Raubtiere mit größerer Reichweite und beeindruckender Ausdauer unter Wasser."  #NT!
 combat_unit_type_light_ship_4_desc:0 "Fortschrittliche Tauchboote, ausgestattet mit modernem Sonar, Raketensystemen und verbesserten Tarnfähigkeiten."  #NT!
 combat_unit_type_light_ship_5_desc:0 "U-Boote der nächsten Generation, optimiert für niedrige akustische Signaturen und Präzisionsangriffseinsätze in feindlichen Gewässern."  #NT!
  
 combat_unit_type_capital_ship_1_desc:0 "Schwer gepanzerte Kriegsschiffe aus einer vergangenen Ära, voller Kanonen und für die Vorherrschaft in der Schlachtlinie gebaut."  #NT!
 combat_unit_type_capital_ship_2_desc:0 "Schwimmende Festungen mit enormer Feuerkraft, die darauf ausgelegt sind, Seewege zu kontrollieren und feindliche Flotten frontal anzugreifen."  #NT!
 combat_unit_type_capital_ship_3_desc:0 "Moderne, mit Lenkraketen ausgerüstete Überwasserkampfflugzeuge für Präzisionsangriffe über große Entfernungen und zur Flottenverteidigung."  #NT!
 combat_unit_type_capital_ship_4_desc:0 "Hochgeschwindigkeits-Großkampfschiffe, die Feuerkraft und Manövrierfähigkeit vereinen und sich ideal für schnelle Marineeinsätze eignen."  #NT!
 combat_unit_type_capital_ship_5_desc:0 "Kompakte, vielseitige Kriegsschiffe, die auf küstennahe Einsätze zugeschnitten sind und Geschwindigkeit, Tarnung und modulare Bewaffnung vereinen."  #NT!
  
 combat_unit_type_carrier_1_desc:0 "Seegestützte Luftwaffenstützpunkte, die ihre Macht über die Ozeane übertragen und in der Lage sind, Flugzeuge in Kampfgebieten zu starten und zu bergen."  #NT!
 combat_unit_type_carrier_2_desc:0 "Nuklearbetriebene Träger mit unübertroffener Reichweite und Ausdauer, die nachhaltige globale Einsätze unterstützen."  #NT!
 combat_unit_type_carrier_3_desc:0 "Riesige Flaggschiff-Flugzeugträger, die große Luftwaffengeschwader, Kommandozentralen und fortschrittliche Verteidigungssysteme beherbergen."  #NT!
 combat_unit_type_carrier_4_desc:0 "Schwer erkennbare Flugzeugträger, die darauf ausgelegt sind, der Entdeckung zu entgehen und gleichzeitig Stealth-Lufteinsätze und elektronische Kriegsführung zu koordinieren."  #NT!
 combat_unit_type_carrier_5_desc:0 "Titanic-Marineplattformen, die Luft-, See- und Drohnenfähigkeiten in einer einzigen mobilen Kommandofestung integrieren."  #NT!
  
