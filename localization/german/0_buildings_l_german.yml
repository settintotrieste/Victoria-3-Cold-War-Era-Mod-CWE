 combat_unit_type_infantry_1_desc:0 "Abgehärtete Fußsoldaten, die für die statische Kriegsführung ausgebildet sind und sich durch Verteidigungs- und Zermürbungstaktiken auszeichnen."  #NT!
 combat_unit_type_infantry_2_desc:0 "Leicht ausgerüstete Einheiten, die sich schnell einsetzen und flexibel in unterschiedlichem Gelände manövrieren lassen."  #NT!
 combat_unit_type_infantry_3_desc:0 "Truppen, die von gepanzerten Transportern unterstützt werden und Mobilität mit erhöhter Widerstandsfähigkeit auf dem Schlachtfeld kombinieren."  #NT!
 combat_unit_type_infantry_4_desc:0 "Schwer gepanzerte Einheiten, die Infanterie und Panzer für Durchbruchoperationen und anhaltende Angriffe integrieren."  #NT!
 combat_unit_type_infantry_5_desc:0 "Eine ausgewogene Streitmacht, die Infanterie, Panzerung, Artillerie und Unterstützungselemente für strategische Vielseitigkeit vereint."  #NT!
 combat_unit_type_infantry_6_desc:0 "Modulare Kampfformation, optimiert für autonome Operationen, die Feuerkraft und Mobilität integrieren."  #NT!
 combat_unit_type_infantry_7_desc:0 "Mechanisierte Eliteeinheiten, ausgestattet mit modernster Panzerung und KI-Koordinationssystemen für das Schlachtfeld."  #NT!
 combat_unit_type_infantry_8_desc:0 "Panzertruppe der nächsten Generation mit verbesserter Überlebensfähigkeit, Feuerkraft und integrierter Drohnenunterstützung."  #NT!
 combat_unit_type_infantry_9_desc:0 "Eine zukunftsfähige Truppe, die zu Operationen in mehreren Domänen und nahtloser Koordination zwischen den Einheiten fähig ist."  #NT!
 combat_unit_type_infantry_10_desc:0 "Experimentelle Kampfeinheiten, die mechanisierte Exoanzüge steuern und Mobilität, Feuerkraft und taktische Dominanz neu definieren."  #NT!
  
 combat_unit_type_tanks_1_desc:0 "Panzer des Ersten Weltkriegs"  #NT!
 combat_unit_type_tanks_2_desc:0 "Panzer aus dem 2. Weltkrieg"  #NT!
 combat_unit_type_tanks_3_desc:0 "Panzer des frühen Kalten Krieges"  #NT!
 combat_unit_type_tanks_4_desc:0 "Panzer aus der Mitte des Kalten Krieges"  #NT!
