 law_parties_allowed_additional_effects:0 "$cannot_ban_parties.tt$"
 law_no_workers_rights:0 "미흡한 노동법"
 law_regulatory_bodies:0 "적절한 노동법"
 law_worker_protections:0 "강한 노동법"
 lawgroup_armed_forces_politicisation:0 "군사 정치화"
 law_politicised_armed_forces:0 "정치화된 군대"
 law_semi_politicised_armed_forces:0 "반정치화된 군대"
 law_no_politicised_armed_forces:0 "중립 군사"
 law_politicised_armed_forces_desc:0 "군사 훈련은 단일 정당에 대한 절대적 충성을 요구하며, 일관되게 당파적 정치적 입장 및 이익을 옹호하고 방어합니다."
 law_semi_politicised_armed_forces_desc:0 "군대가 특정 정당에 일정한 충성을 보이며, 그 정당의 정치적 입장과 이익을 일관되게 옹호하고 방어합니다."
 law_no_politicised_armed_forces_desc:0 "군대는 정치에 전혀 관여하지 않습니다."
 lawgroup_minority_issues:0 "생활방식 법"
 law_no_minority_issues:0 "전통주의적 생활 방식"
 law_some_minority_issues:0 "보수주의적 생활 방식"
 law_full_minority_issues:0 "자유주의적 생활 방식"
 law_no_minority_issues_desc:0 "정부는 음주, 마약, LGBTQ+ 권리와 같은 사회 문제에 대해 전통주의적 입장을 취합니다.\n\n이 [concept_law]에 따라 [GetGoods('opium').GetName], [GetGoods('tobacco').GetName], [GetGoods('liquor').GetName], [GetGoods('wine').GetName]의 일반 소비가 금지됩니다."
 law_some_minority_issues_desc:0 "정부는 음주, 마약, LGBTQ+ 권리와 같은 사회 문제에 대해 보수적인 입장을 취합니다.\n\n이 [concept_law]에 따라 [GetGoods('opium').GetName]의 일반 소비가 금지됩니다."
 law_full_minority_issues_desc:0 "정부는 음주, 마약, LGBTQ+ 권리와 같은 사회 문제에 대해 관용적인 입장을 취합니다."
 law_devolved_state:0 "분권화된 단일 국가"
 law_devolved_state_desc:0 "분권적 단일국가는 중앙정부가 최고 권한을 가지면서도 일부 권한을 주나 지방자치단체 같은 하위 정부에 위임한 국가를 말합니다. 이는 중앙정부가 모든 중요한 권한을 직접 보유하는 중앙집권적 단일국가와는 다릅니다."
 amendment_symbolic_monarchy:0 "상징적 군주제"
 amendment_symbolic_monarchy_desc:0 "헌법에 따르면 군주의 법적 지위는 \"국가와 국민 통합의 상징\"이며, 국정과 관련된 권한은 없습니다. 이 지위는 전적으로 의례적인 것이며, 주권이 귀속된 국민의 의지에서 그 정당성을 얻습니다."
 law_charitable_health_system_desc:0 "의료 서비스는 자선 및 비영리 기관을 통해 제공됩니다. 접근성은 기부금과 지역사회 지원에 의존하여 보장 범위가 고르지 않고 종종 제한적입니다."
 law_private_health_insurance_desc:0 "의료 서비스는 민간 보험 제도를 통해 재원이 조달됩니다. 시민들은 보험료를 납부해야 하며, 의료 접근성은 부와 고용 상태에 따라 달라져 사회적 격차를 심화시킵니다."
 law_public_health_insurance_desc:0 "국가는 모든 국민에게 의료 서비스를 보장합니다. 공공 자원으로 운영되는 이 제도는 보편적 접근을 보장하며, 공동의 복지와 안전을 중심으로 사회를 재편합니다."
 law_religious_schools_desc:0 "교육은 주로 종교적·공동체적 전통에 기반한 사립 기관에 맡겨져 있습니다. 교육을 받을 수 있는 기회는 제한적이며, 교육 과정 또한 이를 후원하는 이들의 가치관을 반영합니다."
 law_private_schools_desc:0 "학교들은 사립 운영을 유지한 채 국가로부터 부분적인 지원을 받습니다. 이러한 균형은 교육 접근성을 확대하는 한편, 교육 전반에 대한 엘리트 계층의 영향력을 보존합니다."
 law_public_schools_desc:0 "국가는 모든 아동에게 무상 교육을 보장합니다. 보편적 교육 접근은 사회 전반을 재편하며, 문해력 향상과 시민적 정체성의 형성, 그리고 사회적 이동성을 촉진합니다."
 amendment_rotating_presidency:0 "집단 국가 원수"
 amendment_rotating_presidency_desc:0 "집단적 국가원수제란 국가원수의 의례적·행정적 권한이 단일 개인에게 집중되지 않고, 여러 사람으로 구성된 집단에 의해 공동으로 행사되는 정부 형태를 말합니다."
 lawgroup_political_parties_desc:0 "정당의 허용 여부와 운영 방식입니다."
 lawgroup_judiciary_desc:0 "사법부의 구성과 독립성입니다."
 lawgroup_cabinet_composition_desc:0 "행정부 내각이 어떻게 선출되고 구성되는지 결정하는 규정입니다."
 lawgroup_secession_rights_desc:0 "구성 주나 지역이 분리할 권리가 있는지 여부입니다."
 lawgroup_armed_forces_politicisation_desc:0 "군부가 정치에 개입하는 정도입니다."
 lawgroup_constitutional_system_desc:0 "국가의 포괄적인 헌법적 틀입니다."
 lawgroup_legal_system_desc:0 "법률 체계의 구조와 원칙입니다."
 lawgroup_head_of_government_desc:0 "정부 수반의 역할과 권한을 규정합니다."
 lawgroup_legislature_desc:0 "입법부의 조직과 권한입니다."
 lawgroup_legislative_chambers_desc:0 "입법부가 단원제인지 양원제인지 규정합니다."
 lawgroup_centralisation_desc:0 "중앙 권력과 지방 권력 간의 균형입니다."
 lawgroup_war_policy_desc:0 "국가의 전쟁 및 군사적 개입에 대한 입장입니다."
 lawgroup_corruption_policy_desc:0 "부패 및 책임성 문제에 대한 정책입니다."
 lawgroup_minority_issues_desc:0 "소수 집단의 권리와 보호를 다루는 정책들입니다."
 lawgroup_wmd_policy_desc:0 "대량 살상 무기에 관한 규정입니다."
 lawgroup_espionage_policy_desc:0 "간첩 및 정보 활동에 관한 규정입니다."
 lawgroup_social_mobility_0_desc:0 "기본 체계 하에서의 사회적 계층과 이동성입니다."
 lawgroup_social_mobility_1_desc:0 "봉건제 하의 사회적 계층 구조와 이동성입니다."
 lawgroup_social_mobility_2_desc:0 "신정정치 하의 사회적 계층 구조와 이동성입니다."
 lawgroup_social_mobility_3_desc:0 "민족주의 하의 사회적 계층과 이동성입니다."
 lawgroup_social_mobility_4_desc:0 "공산주의 체제 하의 사회적 계층 구조와 이동성입니다."
 lawgroup_social_mobility_5_desc:0 "과두정 체제 하의 사회적 계층 구조와 이동성입니다."
 lawgroup_monetary_policy_desc:0 "통화 공급과 금리 수준을 규율하는 정책입니다."
 lawgroup_industry_regulations_desc:0 "산업과 상업 활동을 규율하는 규칙입니다."
 lawgroup_financial_regulations_desc:0 "금융 기관과 금융 시장을 규율하는 규정입니다."
 lawgroup_land_ownership_desc:0 "토지 소유와 재산권을 규정하는 규칙입니다."
 lawgroup_environmental_policy_desc:0 "환경 보호와 오염 통제를 다루는 정책입니다."
 lawgroup_foreign_policy_desc:0 "국가의 국제 관계와 외교에 대한 접근 방식입니다."
 lawgroup_foreign_investment_policy_desc:0 "외국인 투자와 외부 자본을 규율하는 규칙입니다."
 lawgroup_pop_growth_policy_desc:0 "인구 증가와 가족 계획을 규제하는 정책입니다."
 lawgroup_economic_specialisation_desc:0 "국가의 경제적 중점과 특화 방향입니다."
 lawgroup_monetary_system_desc:0 "통화 체계의 구조와 운영 규칙입니다."
 law_first_past_the_post_additional_effects:0 "@information! 이는 #y 입법부#!의 구성을 변경합니다."
 law_jefferson_system_additional_effects:0 "@information! 이는 #y 입법부#!의 구성을 변경합니다."
 law_propotional_representation_additional_effects:0 "@information! 이는 #y 입법부#!의 구성을 변경합니다."
 concept_non_competitive_election:0 "비경쟁 선거"
 concept_non_competitive_elections:0 "비경쟁 선거"
 concept_non_competitive_election_desc:0 "비경쟁 선거는 [concept_government]에 소속되고 승인된 후보만 출마할 수 있는 [Concept('concept_election','$concept_elections$')]입니다."
 concept_political_faction:0 "정치 세력"
 concept_political_factions:0 "정치 세력"
 concept_political_faction_desc:0 "비공식적인 정치 연합과 세력은 [Concept('concept_party', '$concept_parties$')]가 금지된 [concept_country]에서 공식 [Concept('concept_party', '$concept_parties$')]를 대신합니다.\n\n그러나 게임의 [Concept('concept_election','$concept_elections$')] 메커니즘상 [concept_interest_group]이(가) [concept_votes]를 얻기 위해서는 정당이 필요하기 때문에, 정치 세력은 [Concept('concept_interest_group', '$concept_interest_groups$')]이(가) #y \"정치 세력\"#! [Concept('concept_party', '$concept_parties$')]에 참여하는 방식으로 표현됩니다.\n\n이러한 #y \"정치 세력\"#! [Concept('concept_party', '$concept_parties$')]은(는) 정당 금지와 같은 공식 정당을 모사하는 일부 메커니즘의 혜택을 받지 못합니다."
 law_appointed_legislature_additional_effects:0 "@information! 이 [concept_law]은(는) [concept_country]의 [concept_government_type]을(를) 변경할 수 있습니다."
 law_technocratic_legislature_additional_effects:0 "@information! 이 [concept_law]은(는) [concept_country]의 [concept_government_type]을(를) 변경할 수 있습니다."
 law_democratic_legislature_additional_effects:0 "@information! 이 [concept_law]은(는) [concept_country]의 [concept_government_type]을(를) 변경할 수 있습니다."