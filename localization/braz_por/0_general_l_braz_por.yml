    concept_corruption:0 "Corrupção Governamental"
    concept_corruption_desc:0 "Corrupção refere-se a conduta desonesta ou fraudulenta por parte daqueles que exercem função pública, geralmente por meio do recebimento de subornos ou da apropriação indevida de fundos públicos para uso pessoal. Tais atividades são representadas neste mod fazendo com que os [Concept('concept_building', '$concept_buildings$')] de [concept_government] consumam $illegal_services$, o que tem o efeito de tornar a burocracia mais ineficiente e vazar dinheiro público para o setor privado."
