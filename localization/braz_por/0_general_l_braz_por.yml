    objective_democratic_victory_cold_war:0 "Vitória Democrática"
    objective_democratic_victory_cold_war_desc:0 "Conquiste a vitória para o Bloco Ocidental. Espalhe a democracia e o capitalismo pelo mundo e esmague o comunismo de vez."
    objective_democratic_victory_cold_war_idle_header:0 "Vença a Guerra Fria"
    objective_democratic_victory_cold_war_idle_hint:0 "Elimine todas as [concept_super_power] comunistas e seja a única [concept_super_power] democrática remanescente!"
    objective_democratic_victory_cold_war_name_USA:0 "Estados Unidos da América"
    objective_democratic_victory_cold_war_desc_USA:0 "Após o ataque japonês a Pearl Harbor em 1941, os EUA entraram na Segunda Guerra Mundial ao lado dos Aliados. As consequências da guerra deixaram os Estados Unidos e a União Soviética como as duas superpotências mundiais e levaram à Guerra Fria. Durante a Guerra Fria, ambos os países travaram uma luta pelo domínio ideológico, mas evitaram o conflito militar direto."
    objective_democratic_victory_cold_war_name_GBR:0 "Reino Unido"
    objective_democratic_victory_cold_war_desc_GBR:0 "O Império Britânico, em seu auge na década de 1920, abrangia quase um quarto da massa terrestre e da população mundial, sendo o maior império da história. No entanto, seu envolvimento na Primeira e na Segunda Guerra Mundial, a crise acumulada e a perda de prestígio levaram à descolonização da maior parte das colônias britânicas e ao eventual fim do Império."
    objective_democratic_victory_cold_war_name_FRA:0 "França"
    objective_democratic_victory_cold_war_desc_FRA:0 "A França esteve entre as potências Aliadas da Segunda Guerra Mundial, mas se rendeu e foi ocupada pelo Eixo em 1940. Após a libertação em 1944, a efêmera Quarta República foi estabelecida e mais tarde dissolvida no decorrer da derrota na Guerra da Argélia. A atual Quinta República foi formada em 1958 por Charles de Gaulle. A Argélia e a maioria das colônias francesas se tornaram independentes na década de 1960, mantendo a maioria delas laços econômicos e militares estreitos com a França."
    objective_democratic_victory_cold_war_name_ROC:0 "República da China"
    objective_democratic_victory_cold_war_desc_ROC:0 "A Segunda Guerra Mundial devastou a China, causando enorme perda de vidas e destruição material. A guerra entre China e Japão continuou até a rendição do Japão no fim da Segunda Guerra Mundial em 1945, o que levou Taiwan a ser colocada sob administração chinesa. Após a Segunda Guerra Mundial, a guerra civil foi retomada entre as áreas libertadas pela República da China e as libertadas pelos comunistas. Em 1949, a República da China transferiu sua capital para Taiwan para evitar o avanço comunista."

    objective_non_aligned_victory_cold_war:0 "Vitória Não-Alinhada"
    objective_non_aligned_victory_cold_war_desc:0 "Prove que não são apenas europeus ou norte-americanos que podem ser poderosos no cenário global."
    objective_non_aligned_victory_cold_war_idle_header:0 "Torne-se uma [concept_super_power] Não-Alinhada"
    objective_non_aligned_victory_cold_war_idle_hint:0 "Torne-se a primeira [concept_super_power] não europeia e não norte-americana do mundo, sem se alinhar ao Bloco Oriental nem ao Ocidental."
    objective_non_aligned_victory_cold_war_name_HND:0 "Índia"
    objective_non_aligned_victory_cold_war_desc_HND:0 "Em 1947, o Império Indiano Britânico foi dividido em dois domínios independentes: o Domínio da Índia, de maioria hindu, e o Domínio do Paquistão, de maioria muçulmana, em meio a uma enorme perda de vidas e uma migração sem precedentes. Fundamental para a autoimagem da Índia como nação independente foi sua constituição, concluída em 1950, que estabeleceu uma república secular e democrática."
    objective_non_aligned_victory_cold_war_name_YUG:0 "Iugoslávia"
    objective_non_aligned_victory_cold_war_desc_YUG:0 "O Reino foi invadido pelas potências do Eixo em 6 de abril de 1941. Em 1943, uma Iugoslávia Federal Democrática foi proclamada pela resistência Partisan. Em 1944, o rei Pedro II, então vivendo no exílio, reconheceu-a como governo legítimo. A monarquia foi posteriormente abolida em novembro de 1945. A Iugoslávia foi renomeada República Popular Federal da Iugoslávia em 1945, quando um governo comunista foi estabelecido."
    objective_non_aligned_victory_cold_war_name_IDO:0 "Indonésia"
    objective_non_aligned_victory_cold_war_desc_IDO:0 "A ocupação japonesa durante a Segunda Guerra Mundial pôs fim ao domínio neerlandês e encorajou o movimento de independência. Dois dias após a rendição do Japão, em agosto de 1945, Sukarno e Mohammad Hatta emitiram a Proclamação da Independência da Indonésia. Os Países Baixos tentaram restabelecer seu domínio, dando início à Revolução Nacional Indonésia, que terminou em dezembro de 1949, quando os neerlandeses reconheceram a independência da Indonésia diante da pressão internacional."
    objective_non_aligned_victory_cold_war_name_EGY:0 "Egito"
    objective_non_aligned_victory_cold_war_desc_EGY:0 "A maioria das tropas britânicas foi retirada para a área do Canal de Suez em 1947, mas os sentimentos nacionalistas e antibritânicos continuaram a crescer após a guerra. Os sentimentos antimonárquicos aumentaram ainda mais após o desempenho desastroso do Reino na Primeira Guerra Árabe-Israelense. A eleição de 1950 viu uma vitória esmagadora do nacionalista Partido Wafd, e o rei foi forçado a nomear Mostafa El-Nahas como novo primeiro-ministro."

    objective_communist_victory_cold_war:0 "Vitória Comunista"
    objective_communist_victory_cold_war_desc:0 "Conquiste a vitória para o Bloco Oriental. Espalhe o comunismo pelo mundo e esmague o capitalismo de vez."
    objective_communist_victory_cold_war_idle_header:0 "Vença a Guerra Fria"
    objective_communist_victory_cold_war_idle_hint:0 "Elimine todas as [concept_super_power] democráticas e seja a única [concept_super_power] comunista remanescente!"
    objective_communist_victory_cold_war_name_SOV:0 "União Soviética"
    objective_communist_victory_cold_war_desc_SOV:0 "Durante o período imediato pós-guerra, a União Soviética reconstruiu e expandiu sua economia, mantendo seu controle estritamente centralizado. Ela assumiu o controle efetivo da maioria dos países da Europa Oriental (exceto a Iugoslávia e, mais tarde, a Albânia), transformando-os em estados satélites. Temendo suas ambições, os aliados de guerra da União Soviética, o Reino Unido e os Estados Unidos, tornaram-se seus inimigos. Na Guerra Fria que se seguiu, os dois lados se enfrentaram indiretamente em guerras por procuração."
    objective_communist_victory_cold_war_name_PRC:0 "República Popular da China"
    objective_communist_victory_cold_war_desc_PRC:0 "Após a Guerra Civil Chinesa e a vitória das forças comunistas de Mao Zedong sobre as forças do Kuomintang do generalíssimo Chiang Kai-shek, que fugiu para Taiwan, Mao Zedong proclamou a fundação da República Popular da China (RPC) em 1º de outubro de 1949. Sob o governo de Mao, a China passou por uma transformação socialista, deixando de ser uma sociedade camponesa tradicional para se voltar às indústrias pesadas sob uma economia planificada."

    objective_hegemon_idle_header:0 "Dominação Mundial"
    objective_hegemon_idle_hint:0 "Torne-se a única [concept_super_power] do mundo."
    objective_hegemon_name_USA:0 "Estados Unidos da América"
    objective_hegemon_desc_USA:0 "$objective_democratic_victory_cold_war_desc_USA$"
    objective_hegemon_name_SOV:0 "União Soviética"
    objective_hegemon_desc_SOV:0 "$objective_communist_victory_cold_war_desc_SOV$"
    objective_hegemon_name_PRC:0 "República Popular da China"
    objective_hegemon_desc_PRC:0 "$objective_communist_victory_cold_war_desc_PRC$"
    objective_hegemon_name_HND:0 "Índia"
    objective_hegemon_desc_HND:0 "$objective_non_aligned_victory_cold_war_desc_HND$"

    rule_historical_ai_railroading:0 "Direcionamento Histórico para a IA"
    setting_no_historical_ai_railroading:0 "Desativado"
    setting_no_historical_ai_railroading_desc:0 "A IA escolherá a opção histórica em todos os eventos e decisões de forma aleatória (ou seja, 50% das vezes)."
    setting_low_historical_ai_railroading:0 "Baixo"
    setting_low_historical_ai_railroading_desc:0 "A IA escolherá a opção histórica em todos os eventos e decisões 66% das vezes."
    setting_medium_historical_ai_railroading:0 "Médio"
    setting_medium_historical_ai_railroading_desc:0 "A IA escolherá a opção histórica em todos os eventos e decisões 90% das vezes."
    setting_high_historical_ai_railroading:0 "Alto"
    setting_high_historical_ai_railroading_desc:0 "A IA escolherá a opção histórica em todos os eventos e decisões 100% das vezes."

