    concept_fervor_desc:1 "$concept_fervor$ é uma medida do espírito nacional de uma [concept_culture]. [Concept('concept_pop', '$concept_pops$')] de uma $concept_culture$ com alto $concept_fervor$ irão [Concept('concept_assimilation','$concept_assimilate$')] mais lentamente, formar mais [Concept('concept_radical','$concept_radicals$')] quando conquistados, aumentar [concept_liberty_desire] e serão mais propensos a se juntar a um [Concept('concept_cultural_movement', '$concept_cultural_movements$')].\n\n#title As seguintes condições #b aumentam#! o $concept_fervor$:#! #indent_newline:3 \n• Ser uma [Concept('concept_primary_cultures','$concept_primary_culture$')] de um(a) [concept_country] independente com uma #tooltippable;tooltip:[GetPlayer.GetTooltipTag],fervor_effects_from_citizenship_laws_tt aplicável#! [SelectLocalization(GetPlayer.IsValid,'CITIZENSHIP_LINK','lawgroup_citizenship')] [concept_law]\n• Número de [concept_casualties] desta [concept_culture] em [concept_war]\n• Ter alta [concept_literacy] média\n• Número de $concept_pops$ [GetPopType('academics').GetName] desta $concept_culture$\n• $concept_pops$ desta cultura residentes em $concept_countries$ com [GetTechnology('tech_politics_2').GetName] ou [GetTechnology('tech_politics_3').GetName] [Concept('concept_technology', '$concept_technologies$')]\n• Ser uma $concept_primary_culture$ de um(a) $concept_country$ com um(a) [GetInstitutionType('institution_schools').GetName] [concept_institution] aplicável\n• Outra $concept_culture$ libertada como $concept_countries$ independentes\n• Passar por um [concept_national_awakening]#!\n\n#title As seguintes condições #b reduzem#! o $concept_fervor$:#! #indent_newline:3 \n• Ser uma $concept_primary_culture$ de um(a) $concept_country$ com a $concept_law$ [GetLawType('law_multicultural').GetName]\n• Ter alta [concept_acceptance] média#!"

