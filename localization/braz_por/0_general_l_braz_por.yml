    rule_chaos_mode_rule:0 "Restrições de Guerra"
    setting_no_chaos_mode_rule:0 "Ativado"
    setting_no_chaos_mode_rule_desc:0 "Certas restrições de [concept_law] e [concept_ideology] devem primeiro ser atendidas antes que um(a) [concept_country] possa declarar [concept_war]."
    setting_yes_chaos_mode_rule:0 "Sem Restrições de Guerra"
