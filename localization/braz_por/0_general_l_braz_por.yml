    military_cooperation_agreement_desc:3 "Este(a) [concept_diplomatic_pact] permite que o iniciador estacione uma força militar no alvo e concede ao iniciador [concept_military_access]. \n\nA presença de tropas estrangeiras impediria o alvo de romper qualquer relação de [concept_protectorate] com o(a) [concept_overlord] que estiver estacionando suas forças militares no alvo. \n\nO uso do alvo como base militar também reduziria a defesa de qualquer país vizinho ao alvo contra #y Campanhas de Bombardeio Estratégico#! conduzidas pelo iniciador."
