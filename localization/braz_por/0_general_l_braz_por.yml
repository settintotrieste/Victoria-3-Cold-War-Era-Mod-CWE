    concept_protectorate_desc:2 "Estados Clientes são países soberanos que caíram sob a influência de um país, seu(sua) [concept_overlord] de fato. Um(a) $concept_protectorate$ é capaz de iniciar seus(suas) próprios(as) [Concept('concept_diplomatic_play','$concept_diplomatic_plays$')] e não é obrigado a entrar em todas as [Concept('concept_war','$concept_wars$')] do(a) $concept_overlord$. Um(a) [concept_country] pode solicitar, ou ser solicitado(a), a se tornar um(a) $concept_protectorate$ sob um(a) [concept_overlord] sem risco de [concept_war] caso a oferta seja recusada. \n\nEstados Clientes sempre têm controle de seu próprio [concept_market]."

    concept_literacy:0 "Ensino Superior"
    concept_literate:0 "Altamente Educado"
    concept_literacy_desc:2 "A porcentagem ou número absoluto de indivíduos em um(a) [concept_pop] que obtiveram uma qualificação de ensino superior. Certas [Concept('concept_profession', '$concept_professions$')] exigem mais $concept_literacy$ do que outras, limitando as [concept_pop_qualifications] para $concept_pops$ em outras $concept_professions$, a menos que sua $concept_literacy$ seja alta o suficiente. Você pode investir em seu(sua) [SelectLocalization(GetPlayer.IsValid,'concept_literacy_desc_added','Educação')] para desenvolver maior $concept_literacy$ em sua $concept_population$ ao longo do tempo."
    concept_literacy_desc_added:0 "[GetInstitutionType('institution_schools').GetName]"

    concept_culture:0 "Identidade"
    concept_cultures:1 "Identidades"
    concept_culture_possessive:1 "Identidade\\'s"
    concept_culture_desc:2 "Todos(as) os(as) [Concept('concept_pop', '$concept_pops$')] têm uma $concept_culture$, que só pode mudar por meio de [concept_assimilation]. Sua $concept_culture$ determina quais [Concept('concept_state_region','$concept_state_regions$')] eles consideram seu(sua) [Concept('concept_homeland','$concept_homelands$')] e se são [Concept('concept_discrimination','$concept_discriminated_against$')] em seu(sua) [concept_country] ou não."

    concept_accepted_culture:0 "Identidade Aceita"
    concept_accepted_cultures:0 "Identidades Aceitas"
    concept_accepted_culture_short:0 "Aceita"
    concept_accepted_culture_desc:2 "As $concept_accepted_cultures$ de um(a) [Concept('concept_country','$concept_country_possessive$')] consistem em suas [concept_primary_cultures], além de quaisquer outras [Concept('concept_culture','$concept_cultures$')] consideradas $concept_accepted_culture_short$ devido à [SelectLocalization(GetPlayer.IsValid, 'concept_accepted_culture_desc_added','Cidadania')] [concept_law] atual do(a) $concept_country$."
    concept_accepted_culture_desc_added:0 " [GetLawType('law_national_supremacy').GetGroup.GetName]"

    concept_primary_cultures:0 "Identidades Primárias"
    concept_primary_culture:0 "Identidade Primária"

    concept_cultural_trait:0 "Traço Cultural"
    concept_cultural_traits:1 "Traços Culturais"
    concept_cultural_trait_desc:2 "Aspectos de uma [concept_culture], como sua língua dominante e de qual parte do mundo ela é originária. A semelhança entre os $concept_cultural_traits$ das [Concept('concept_primary_cultures','$concept_primary_culture$')] de um(a) [Concept('concept_country','$concept_country_possessive$')] e a $concept_culture$ de um(a) [concept_pop], combinada com a [GetLawType('law_national_supremacy').GetGroup.GetName] [concept_law] atual do(a) $concept_country$, determina se o(a) $concept_pop$ é [Concept('concept_discrimination','$concept_discriminated_against$')] ou não."

    concept_cultural_heritage_trait:0 "Traço Cultural Ancestral"
    concept_cultural_heritage_traits:0 "Traços Culturais Ancestrais"
    concept_cultural_heritage_trait_desc:2 "Um tipo de [concept_cultural_trait] que especifica a região geral do mundo onde a [concept_culture] se originou. Certas [Concept('concept_law','$concept_laws$')] de [SelectLocalization(GetPlayer.IsValid,'concept_accepted_culture_desc_added','Cidadania')] consideram os $concept_cultural_heritage_traits$ mais importantes do que outros $concept_cultural_traits$ ao determinar se um(a) [concept_pop] deve ser [Concept('concept_discrimination','$concept_discriminated_against$')] ou não."
    concept_cultural_heritage_trait_desc_added:0 "[GetLawType('law_national_supremacy').GetGroup.GetName]"

