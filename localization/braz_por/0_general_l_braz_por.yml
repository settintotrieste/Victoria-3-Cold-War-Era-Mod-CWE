    ship_type_troop_ship_0_desc:0 "$ship_type_troop_ship_desc$"
    ship_type_troop_ship_1_desc:0 "Um navio de tropas modernizado, projetado para o transporte eficiente de soldados e suprimentos a longa distância, incorporando propulsão e sistemas de segurança aprimorados."
    ship_type_troop_ship_2_desc:0 "Um navio de tropas avançado, com capacidade, automação e suporte logístico aprimorados, capaz de sustentar implantações em larga escala em teatros de operações globais."

    ship_type_battleship_0_desc:0 "$ship_type_pre_dreadnought_desc$"
    ship_type_battleship_1_desc:0 "$ship_type_dreadnought_desc$"
    ship_type_battleship_2_desc:0 "$ship_type_super_dreadnought_desc$"
    ship_type_battleship_3_desc:0 "Um veloz navio capital que sacrifica blindagem por velocidade, projetado para superar cruzadores em poder de fogo enquanto foge de encouraçados."
    ship_type_battleship_4_desc:0 "Um cruzador de batalha modernizado equipado com sistemas de mísseis guiados, ampliando seu alcance muito além da artilharia tradicional."
    ship_type_battleship_5_desc:0 "Um cruzador de batalha avançado que integra radar, eletrônicos e propulsão aprimorada para equilibrar poder de fogo e sobrevivência."
    ship_type_battleship_6_desc:0 "Um design flexível construído com componentes modulares, permitindo rápida adaptação a novas armas e tecnologias."
    ship_type_battleship_7_desc:0 "Um cruzador de batalha ampliado com imenso poder de fogo e blindagem reforçada, rivalizando com encouraçados em força enquanto mantém a velocidade."
    ship_type_battleship_8_desc:0 "Um cruzador de batalha que emprega sistemas não tripulados e enxames de drones, ampliando suas capacidades de combate sem arriscar a tripulação."
    ship_type_battleship_9_desc:0 "Um navio capital altamente automatizado, capaz de operação independente, reduzindo a necessidade de tripulação enquanto maximiza a eficiência."
    ship_type_battleship_10_desc:0 "O ápice da evolução dos cruzadores de batalha, um navio de guerra colossal que combina poder de fogo avassalador, automação avançada e resistência incomparável."
    ship_type_aircraft_carrier_0_desc:0 "Um porta-aviões menor, projetado para operações aéreas limitadas, fornecendo capacidade de reconhecimento e ataque leve."
    ship_type_aircraft_carrier_1_desc:0 "Um porta-aviões de frota de tamanho completo, capaz de sustentar grandes esquadrões aéreos para missões ofensivas e defensivas pelos mares."
    ship_type_aircraft_carrier_2_desc:0 "Um porta-aviões de propulsão nuclear com alcance virtualmente ilimitado, permitindo operações globais sustentadas sem reabastecimento."
    ship_type_aircraft_carrier_3_desc:0 "Um porta-aviões moderno que integra eletrônicos avançados, radar e sistemas de propulsão para funções equilibradas de ataque e apoio."
    ship_type_aircraft_carrier_4_desc:0 "Um superporta-aviões de imensas dimensões e capacidade, capaz de projetar poder aéreo avassalador por regiões inteiras."
    ship_type_aircraft_carrier_5_desc:0 "Um superporta-aviões avançado com sistemas de ponta, automação e sobrevivência aprimorada para guerras de alta intensidade."
    ship_type_aircraft_carrier_6_desc:0 "Um superporta-aviões modular construído com componentes adaptáveis, permitindo rápidas atualizações de armas, sensores e instalações para aeronaves."
    ship_type_aircraft_carrier_7_desc:0 "Um superporta-aviões drone que emprega sistemas aéreos não tripulados, ampliando seu alcance de ataque enquanto reduz o risco a pilotos humanos."
    ship_type_aircraft_carrier_8_desc:0 "Um superporta-aviões autônomo capaz de operar com tripulação mínima, aproveitando IA avançada e automação para dominância global sustentada."
    ship_type_cruiser_0_desc:0 "$ship_type_protected_cruiser_desc$"
    ship_type_cruiser_1_desc:0 "$ship_type_armored_cruiser_desc$"
    ship_type_cruiser_2_desc:0 "$ship_type_light_cruiser_desc$"
    ship_type_cruiser_3_desc:0 "Um cruzador fortemente armado com blindagem reforçada, capaz de enfrentar navios de superfície inimigos e apoiar operações de frota."
    ship_type_cruiser_4_desc:0 "Um cruzador reequipado com sistemas de mísseis guiados, ampliando seu alcance ofensivo muito além da artilharia tradicional."
    ship_type_cruiser_5_desc:0 "Um cruzador lança-mísseis moderno que integra radar avançado, eletrônicos e propulsão para funções equilibradas de ataque e defesa."
    ship_type_cruiser_6_desc:0 "Um cruzador lança-mísseis modular construído com componentes adaptáveis, permitindo rápidas atualizações de armas e sensores."
    ship_type_cruiser_7_desc:0 "Um supercruzador lança-mísseis de imensas dimensões e poder de fogo, projetado para dominar combates navais e fornecer capacidades de comando de frota."
    ship_type_cruiser_8_desc:0 "Um cruzador lança-mísseis drone que emprega sistemas não tripulados para missões de reconhecimento e ataque, reduzindo o risco a tripulações humanas."
    ship_type_cruiser_9_desc:0 "Um cruzador lança-mísseis autônomo capaz de operar com tripulação mínima, aproveitando automação avançada para eficácia de combate sustentada."
    ship_type_cruiser_10_desc:0 "O ápice da evolução dos cruzadores, um megacruzador lança-mísseis que combina poder de fogo avassalador, automação avançada e resistência incomparável."
    ship_type_destroyer_0_desc:0 "$ship_type_coastal_defense_ship_desc$"
    ship_type_destroyer_1_desc:0 "$ship_type_torpedo_boat_desc$"
    ship_type_destroyer_2_desc:0 "$ship_type_destroyer_desc$"
    ship_type_destroyer_3_desc:0 "Um contratorpedeiro maior, com armamento mais pesado e resistência aprimorada, projetado para combater navios de superfície e submarinos inimigos."
    ship_type_destroyer_4_desc:0 "Um contratorpedeiro equipado com sistemas de mísseis guiados, ampliando seu alcance ofensivo e defensivo além da artilharia tradicional."
    ship_type_destroyer_5_desc:0 "Um contratorpedeiro lança-mísseis moderno que integra radar avançado, eletrônicos e propulsão para funções equilibradas de escolta de frota e ataque."
    ship_type_destroyer_6_desc:0 "Um contratorpedeiro lança-mísseis modular construído com componentes adaptáveis, permitindo rápidas atualizações de armas e sensores."
    ship_type_destroyer_7_desc:0 "Um supercontratorpedeiro lança-mísseis de dimensões e poder de fogo formidáveis, capaz de dominar combates navais e fornecer defesa de frota."
    ship_type_destroyer_8_desc:0 "Um contratorpedeiro lança-mísseis drone que emprega sistemas não tripulados para missões de reconhecimento e ataque, reduzindo o risco a tripulações humanas."
    ship_type_destroyer_9_desc:0 "Um contratorpedeiro lança-mísseis autônomo capaz de operar com tripulação mínima, aproveitando automação avançada para eficácia de combate sustentada."
    ship_type_destroyer_10_desc:0 "O ápice da evolução dos contratorpedeiros, um megacontratorpedeiro lança-mísseis que combina poder de fogo avassalador, automação avançada e resistência incomparável."
    ship_type_submarine_1_desc:0 "Um submarino experimental antigo, limitado em alcance e resistência, mas capaz de atacar a navegação mercante inimiga."
    ship_type_submarine_2_desc:0 "Um submarino do entreguerras com confiabilidade e resistência aprimoradas, projetado para defesa costeira e apoio limitado à frota."
    ship_type_submarine_3_desc:0 "Um submarino de frota construído para patrulhas de longo alcance, capaz de operar junto a grandes forças navais pelos oceanos."
    ship_type_submarine_4_desc:0 "Um submarino diesel-elétrico que equilibra resistência com custo acessível, amplamente utilizado durante a era da Guerra Fria."
    ship_type_submarine_5_desc:0 "Um submarino de ataque de propulsão nuclear com alcance virtualmente ilimitado, projetado para caçar navios e submarinos inimigos."
    ship_type_submarine_6_desc:0 "Um submarino lança-mísseis balísticos portando armas nucleares, fornecendo dissuasão estratégica por meio de furtividade e sobrevivência."
    ship_type_submarine_7_desc:0 "Um submarino furtivo avançado equipado com sensores de ponta e sistemas de propulsão silenciosos, otimizado para operações secretas."
    ship_type_submarine_8_desc:0 "Um submarino drone autônomo que emprega sistemas não tripulados para missões de reconhecimento e ataque, reduzindo o risco a tripulações humanas."
    ship_type_submarine_9_desc:0 "Um submarino de ataque hipersônico capaz de lançar armas ultrarrápidas, redefinindo a guerra submarina com velocidade sem precedentes."
    ship_type_submarine_10_desc:0 "A evolução máxima do design de submarinos, um megassubmarino que combina imenso poder de fogo, automação avançada e resistência incomparável."

