    concept_dominion_desc:0 "Uma [Concept('concept_recognized_power','$concept_recognized_powers$')] pode transformar um(a) [concept_country] mais fraco(a) em seu(sua) $concept_dominion$ ([concept_subject]). Um(a) $concept_dominion$ é um(a) [concept_subject_type] mais autônomo(a), capaz de iniciar seus(suas) próprios(as) [Concept('concept_diplomatic_play','$concept_diplomatic_plays$')] e é forçado(a) a entrar nas [Concept('concept_war','$concept_wars$')] de seu(sua) [Concept('concept_overlord','$concept_overlord_possessive$')]. Deve pagar #v 10%#! de sua receita do(a) [concept_treasury] ao(à) seu(sua) $concept_overlord$ a cada semana."

    concept_personal_union_desc:0 "Dois [Concept('concept_country', '$concept_countries$')] com a [concept_law] de [SelectLocalization(GetPlayer.IsValid,'concept_personal_union_desc_added','Monarquia')] podem se unir em uma $concept_personal_union$ ([concept_subject]), um(a) [concept_subject_type] em que o(a) [concept_ruler] [Concept('concept_overlord','$concept_overlord_possessive$')] é o(a) [concept_head_of_state] em ambos(as) $concept_countries$. O súdito pode iniciar seus(suas) próprios(as) [Concept('concept_diplomatic_play','$concept_diplomatic_plays$')] e pode ser forçado(a) a entrar nas [Concept('concept_war','$concept_wars$')] de seu(sua) $concept_overlord$. O(A) [concept_diplomatic_pact] será rompido(a) se o(a) $concept_overlord$ abolir a $law_monarchy$. Deve pagar #v 1%#! de sua receita do(a) [concept_treasury] ao(à) seu(sua) $concept_overlord$ a cada semana. \n\nUniões Pessoais sempre têm controle de seu próprio [concept_market]."

