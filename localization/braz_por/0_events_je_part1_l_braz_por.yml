    cuban_missile_crisis.t:0 "Crise dos Mísseis de Cuba"
    cuban_missile_crisis.d:0 "A Crise dos Mísseis de Cuba foi um confronto de 13 dias entre os Estados Unidos e a União Soviética, quando o posicionamento americano de mísseis nucleares na Itália e na Turquia foi respondido pelo posicionamento soviético de mísseis nucleares em Cuba. A crise durou de 16 a 28 de outubro de 1962. O confronto é amplamente considerado o momento em que a Guerra Fria mais se aproximou de escalar para uma guerra nuclear em larga escala."
    cuban_missile_crisis_1.option.1:0 "Embargar Cuba!"
    cuban_missile_crisis_1.option.2:0 "Estamos de acordo com isso..."
    cuban_missile_crisis_2.option.1:0 "Deixar Cuba, mas também exigir que os EUA removam os mísseis nucleares"
    cuban_missile_crisis_2.option.2:0 "Recusar-se a fazer concessões!"
    cuban_missile_crisis_USA_END.t:0 "Contraproposta Soviética"
    cuban_missile_crisis_USA_END.d:0 "A União Soviética propõe que os Estados Unidos removam suas armas nucleares dos países fronteiriços à União Soviética, em troca da remoção soviética das armas nucleares de Cuba."
    cuban_missile_crisis_3.option.1:0 "Aceitar o acordo"
    cuban_missile_crisis_3.option.2:0 "Rejeitar o acordo"
    cuban_missile_crisis_SOV_END.t:0 "Tratado de Desescalada Nuclear Soviético-Americano"
    cuban_missile_crisis_SOV_END.d:0 "Quando todos os mísseis ofensivos e os bombardeiros leves Ilyushin Il-28 foram retirados de Cuba, o bloqueio americano foi formalmente encerrado em 20 de novembro. O acordo constrangeu Khrushchov e a União Soviética, pois a retirada dos mísseis americanos da Itália e da Turquia foi um acordo secreto entre Kennedy e Khrushchov, e os soviéticos foram vistos como recuando de circunstâncias que eles mesmos haviam iniciado."
    cuban_missile_crisis_4.option:0 "Ao menos a guerra nuclear foi evitada!"

    peaceful_revolution_generic.t:0 "A Revolução [ROOT.GetCountry.GetAdjectiveNoFlag]"
    peaceful_revolution_generic.d:0 "O(A) [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [ROOT.GetCountry.GetRuler.GetFullName] foi deposto(a) hoje em uma revolução incruenta, quando uma multidão de manifestantes furiosos invadiu a mal defendida Mansão Executiva e executou o(a) [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] a sangue frio. Em resposta, todo o gabinete renunciou, deixando aos rebeldes a tarefa de formar um novo governo."
    peaceful_revolution_generic.f:0 "Este evento ocorreu porque um(a) [concept_political_movement] revolucionário(a) teria feito com que todo(a) [concept_state] [ROOT.GetCountry.GetAdjective] se rebelasse."
    peaceful_revolution_generic.option:0 "Horripilante!"

    brezhnev_doctrine.t:0 "Revolução em [SCOPE.sCountry('brezhnev_doctrine_target').GetName]"
    brezhnev_doctrine.d:0 "Uma revolução popular derrubou nosso regime comunista fantoche em [SCOPE.sCountry('brezhnev_doctrine_target').GetName]. Nossos líderes convocam as Forças Armadas [ROOT.GetCountry.GetAdjective] a restaurar a ordem no país renegado."
    brezhnev_doctrine.f:0 "Este evento ocorreu porque um(a) [concept_subject] de [ROOT.GetCountry.GetName] derrubou seu Governo Comunista e se declarou livre do controle [ROOT.GetCountry.GetAdjective]."

    revolution_crushed_recently:0 "Legado da Guerra Civil"
    je_civil_war_system:0 "A(O) [concept_civil_war] [ROOT.GetCountry.GetAdjectiveNoFlag]"
    je_civil_war_system_reason:0 "Um(a) [concept_civil_war] eclodiu em [ROOT.GetCountry.GetName]. O(A) [concept_government] agora deve aprovar um(a) [concept_diplomatic_action] $stop_endless_revolutions$ com os rebeldes, ou vencer a(o) [concept_civil_war] militarmente."

    European_Economic_Community.t:0 "O Tratado de Roma?"
    European_Economic_Community.d:0 "O Tratado de Roma resultou na criação da Comunidade Econômica Europeia (CEE). O tratado foi assinado em 25 de março de 1957 pela Bélgica, França, Itália, Luxemburgo, Países Baixos e Alemanha Ocidental, e entrou em vigor em 1º de janeiro de 1958. O tratado propunha a redução progressiva das tarifas alfandegárias e o estabelecimento de uma união aduaneira. Propunha criar um mercado único para bens, mão de obra, serviços e capital entre os Estados-membros. Também propunha a criação de uma Política Agrícola Comum, uma Política Comum de Transportes e um Fundo Social Europeu, e estabeleceu a Comissão Europeia."
    European_Single_Market.t:0 "O Tratado de Maastricht?"
    European_Single_Market.d:0 "O Tratado da União Europeia, comumente conhecido como Tratado de Maastricht, é o tratado fundador da União Europeia (UE). Concluído em 1992 entre os então doze Estados-membros das Comunidades Europeias, anunciou uma nova etapa no processo de integração europeia, principalmente em disposições para uma cidadania europeia compartilhada, para a eventual introdução de uma moeda única e (com menos precisão) para políticas externas e de segurança comuns."
    European_Single_Currency.t:0 "Adotar o Euro?"
    European_Single_Currency.d:0 "O euro passou a existir em 1º de janeiro de 1999, embora já fosse um objetivo da União Europeia (UE) e de suas predecessoras desde os anos 1960. Após árduas negociações, o Tratado de Maastricht entrou em vigor em 1993, com o objetivo de criar uma união econômica e monetária (UEM) até 1999 para todos os Estados da UE, exceto o Reino Unido e a Dinamarca (ainda que a Dinamarca tenha uma política de taxa de câmbio fixa com o euro)."
    European_Political_Union.t:0 "O Tratado de Lisboa?"
    European_Political_Union.d:0 "O Tratado de Lisboa incluiu a mudança da unanimidade para a votação por maioria qualificada em pelo menos 45 áreas de política no Conselho de Ministros, uma mudança no cálculo dessa maioria para uma nova dupla maioria, um Parlamento Europeu mais poderoso, formando um legislativo bicameral ao lado do Conselho de Ministros sob o processo legislativo ordinário, uma personalidade jurídica consolidada para a UE, e a criação de um Presidente de longo prazo do Conselho Europeu e de um Alto Representante da União para Assuntos Externos e Política de Segurança. O Tratado também tornou juridicamente vinculativa a carta de direitos da União, a Carta dos Direitos Fundamentais. Pela primeira vez, o tratado concedeu aos Estados-membros o direito legal explícito de deixar a UE, e estabeleceu um procedimento para fazê-lo."

    NAFTA.t:0 "O Tratado Norte-Americano de Livre Comércio?"
    NAFTA.d:0 "O Tratado Norte-Americano de Livre Comércio foi um acordo assinado pelo Canadá, México e Estados Unidos que criou um bloco comercial trilateral na América do Norte. O acordo entrou em vigor em 1º de janeiro de 1994, e substituiu o Acordo de Livre Comércio Canadá-Estados Unidos de 1988. O bloco comercial do NAFTA formou um dos maiores blocos comerciais do mundo em termos de produto interno bruto."

    ASEAN_Economic_Community.t:0 "O Tratado Norte-Americano de Livre Comércio?"
    ASEAN_Economic_Community.d:0 "A ASEAN planejava estabelecer um mercado único baseado nas quatro liberdades até o final de 2015, com o objetivo de garantir o livre fluxo de bens, serviços, mão de obra qualificada e capital. A Comunidade Econômica da ASEAN foi formada em 2015, mas o grupo adiou cerca de 20% das disposições de harmonização necessárias para criar um mercado comum, e estabeleceu um novo prazo para 2025."

    Trans_Pacific_Partnership.t:0 "A Parceria Transpacífico?"
    Trans_Pacific_Partnership.d:0 "A Parceria Transpacífico (TPP) foi uma proposta de acordo comercial entre 12 economias da Orla do Pacífico: Austrália, Brunei, Canadá, Chile, Japão, Malásia, México, Nova Zelândia, Peru, Singapura, Vietnã e Estados Unidos. Nos Estados Unidos, a proposta foi assinada em 4 de fevereiro de 2016, mas não ratificada, sendo contestada por muitos democratas e republicanos, incluindo ambos os candidatos presidenciais dos principais partidos, Donald Trump e Hillary Clinton. Após assumir o cargo, o recém-eleito Presidente Donald Trump retirou formalmente os Estados Unidos da TPP em janeiro de 2017, e, portanto, a TPP não pôde ser ratificada como exigido e não entrou em vigor."

    RCEP.t:0 "A Parceria Econômica Regional Abrangente?"
    RCEP.d:0 "A Parceria Econômica Regional Abrangente é um acordo de livre comércio entre as nações da Ásia-Pacífico: Austrália, Brunei, Camboja, China, Indonésia, Japão, Coreia do Sul, Laos, Malásia, Mianmar, Nova Zelândia, Filipinas, Singapura, Tailândia e Vietnã. Espera-se que elimine cerca de 90% das tarifas sobre importações entre seus signatários dentro de 20 anos após sua entrada em vigor, e estabeleça regras comuns para comércio eletrônico, comércio e propriedade intelectual."

    five_year_plan_system.t:0 "Plano Quinquenal"
    five_year_plan_system.d:0 "Os Planos Quinquenais são uma série de iniciativas de desenvolvimento social e econômico emitidas pelo(a) [concept_government]. O planejamento é uma característica fundamental das economias socialistas, e um plano estabelecido para todo o país normalmente contém diretrizes detalhadas de desenvolvimento econômico para todas as suas regiões."
    five_year_plan_system.f:0 "Este evento ocorre a cada 5 anos para definir o(a) $lawgroup_economic_specialisation$ de [ROOT.GetCountry.GetName]."
    five_year_plan_system.1:0 "Priorizar as indústrias de manufatura!"
    five_year_plan_system.2:0 "Priorizar a extração de recursos naturais!"
    five_year_plan_system.3:0 "Priorizar o setor de serviços!"

