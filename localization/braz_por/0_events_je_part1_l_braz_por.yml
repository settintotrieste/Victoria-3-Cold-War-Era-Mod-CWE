    je_olympic_stadium_button:0 "Construir Estádio Olímpico"
    je_olympic_stadium_button_desc:0 "Estádio Olímpico é o nome geralmente dado ao principal estádio de uma edição dos Jogos Olímpicos. Um estádio olímpico é o local das cerimônias de abertura e encerramento."
    je_olympic_sports_centre_button:0 "Construir Centro Esportivo Olímpico"
