    je_one_party_system: "O Comitê Central [ROOT.GetCountry.GetAdjectiveNoFlag]"
    je_one_party_system_reason: "Há apenas um(a) [concept_party] legal em [ROOT.GetCountry.GetName], o Partido Governante. Não obstante, existem múltiplas facções dentro do Comitê Central do Partido Governante, que exercem influência sobre a direção ideológica do Partido Governante. Isso ocorre por meio da determinação de quem seria o próximo líder do partido, e, portanto, o(a) [concept_ruler] do país. \n\nO Comitê Central é composto por 3 facções: os Radicais, os Moderados e os Reformistas. Todas essas facções disputam a liderança do partido e do país. \n\nQual facção é dominante depende do(a) $Party_Radicalism$ do Comitê Central. Se o(a) $Party_Radicalism$ estiver acima de 60%, os radicais estão no comando; se estiver entre 40% e 60%, os moderados estão no comando; e se estiver abaixo de 40%, os reformistas estão no comando. A facção dominante terá uma chance muito maior de decidir o(a) [concept_ideology] do(a) próximo(a) [concept_ruler]. \n\nPresidente do Partido: [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [GetPlayer.GetRuler.GetFullName] \n\nNota: O(A) $Party_Radicalism$ aumenta quando o(a) [concept_government] possui alta [concept_legitimacy] e diminui quando [ROOT.GetCountry.GetName] possui alto(a) [concept_turmoil]. \n\nNota: O(A) $Party_Radicalism$ aumenta a chance de um(a) [concept_ruler] mais #red autocrático(a)#! ser selecionado(a)."

    je_party_system: "O(A) [SCOPE.sParty('ruling_party_scope').GetName]"
    je_party_system_reason: "O(A) [SCOPE.sParty('ruling_party_scope').GetName] é o(a) [SCOPE.GetRootScope.GetCountry.GetCustom('party_or_party_faction_name')] governante de [ROOT.GetCountry.GetName]. Como parte do sistema de [SCOPE.GetRootScope.GetCountry.GetCustom('party_or_party_faction_name')], o(a) [SCOPE.GetRootScope.GetCountry.GetCustom('party_or_party_faction_name')] escolhe seu líder e, por extensão, o(a) [concept_ruler] do país. \n\nO(A) [SCOPE.sParty('ruling_party_scope').GetName] é composto(a) por 3 facções: os Radicais, os Moderados e os Reformistas. Todas essas facções disputam a liderança do(a) [SCOPE.GetRootScope.GetCountry.GetCustom('party_or_party_faction_name')] e do país. \n\nQual facção é dominante depende do(a) $Party_Radicalism$ do(a) [SCOPE.sParty('ruling_party_scope').GetName]. Se o(a) $Party_Radicalism$ estiver acima de 60%, os radicais estão no comando; se estiver entre 40% e 60%, os moderados estão no comando; e se estiver abaixo de 40%, os reformistas estão no comando. A facção dominante terá uma chance muito maior de decidir o(a) [concept_ideology] do(a) próximo(a) [concept_ruler]. \n\nPresidente do(a) [SCOPE.GetRootScope.GetCountry.GetCustom('party_or_party_faction_name')]: [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [GetPlayer.GetRuler.GetFullName] \n\nNota: O(A) $Party_Radicalism$ aumenta quando o(a) [concept_interest_group] dominante do(a) [concept_government] possui baixa [concept_approval], ou o(a) [concept_government] possui baixa [concept_legitimacy]. O(A) $Party_Radicalism$ diminui se o(a) [concept_interest_group] dominante do(a) [concept_government] possuir alta [concept_approval] e o(a) [concept_government] possuir alta [concept_legitimacy]. \n\nNota: O(A) $Party_Radicalism$ aumenta a chance de um(a) [concept_ruler] mais #red autocrático(a)#! ser selecionado(a)."

