    je_wto_system: "A Organização Mundial do Comércio"
    je_wto_system_reason: "A Organização Mundial do Comércio (OMC) é uma organização intergovernamental que regula e facilita o comércio internacional. A OMC facilita o comércio de bens, serviços e propriedade intelectual entre os países participantes, fornecendo uma estrutura para a negociação de acordos comerciais, que geralmente visam reduzir ou eliminar tarifas, cotas e outras restrições. \n\nComo a OMC atualiza constantemente suas estruturas comerciais, a redução de [concept_tariffs] da OMC varia a cada ano. \n\nNota: O montante de [concept_tariffs] reduzido depende do panorama econômico global."

