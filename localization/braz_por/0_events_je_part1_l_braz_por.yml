    join_WTO_decision:0 "Ingressar na Organização Mundial do Comércio"
    join_WTO_decision_desc:0 "A Organização Mundial do Comércio (OMC) é uma organização intergovernamental que regula e facilita o comércio internacional. A OMC facilita o comércio de bens, serviços e propriedade intelectual entre os países participantes, fornecendo uma estrutura para a negociação de acordos comerciais, que geralmente visam reduzir ou eliminar tarifas, cotas e outras restrições."
