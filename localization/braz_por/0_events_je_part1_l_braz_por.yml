    je_corruption_system:0 "Corrupção em [ROOT.GetCountry.GetNameNoFlag]"
    je_corruption_system_reason:0 "[concept_corruption] é o uso de poderes por funcionários do governo, ou por seus contatos de rede, para ganho privado ilegítimo. As formas de corrupção variam, mas podem incluir suborno, lobby, extorsão, apadrinhamento, nepotismo, paroquialismo, clientelismo, tráfico de influência, peculato e desvio de recursos. \n\nA corrupção está presente no(a) [concept_government] [ROOT.GetCountry.GetAdjective], e por isso é necessário promulgar um(a) $lawgroup_corruption_policy$ mais forte para eliminar esse problema. \n\nO(A) @armed_forces! $ig_armed_forces$ e o(a) @intelligentsia! $ig_intelligentsia$, no entanto, se oporão a qualquer tentativa de reduzir a corrupção no país, e assim o radicalismo entre as pessoas que apoiam esses(as) [Concept('concept_interest_group', '$concept_interest_groups$')] aumentará durante qualquer tentativa de promulgar um(a) $lawgroup_corruption_policy$ mais forte."

