    je_imf_system:0 "O Fundo Monetário Internacional"
    je_imf_system_reason:0 "O FMI foi criado em 1944, nas consequências da Grande Depressão da década de 1930, com o propósito de construir um arcabouço para a cooperação econômica internacional. O FMI concede empréstimos — incluindo empréstimos emergenciais — a países-membros que enfrentam problemas reais ou potenciais em seu balanço de pagamentos. O objetivo é ajudá-los a reconstruir suas reservas internacionais, estabilizar suas moedas, continuar pagando por importações e restaurar as condições para um forte crescimento econômico, ao mesmo tempo em que corrigem problemas subjacentes. \n\n#white Força da Moeda:#! [SCOPE.GetRootScope.GetCountry.GetCustom('currency_strength_custom_loc')]"
