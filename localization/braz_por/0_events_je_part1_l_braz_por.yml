    je_non_competitive_elections: "O(A) [SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')]"
    je_non_competitive_elections_reason: "Como [ROOT.GetCountry.GetName] é um(a) [GetLawType('law_single_party_state').GetName], as [Concept('concept_election','$concept_elections$')] para o(a) #y [SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')]#! são conduzidas sob o arcabouço das [Concept('concept_non_competitive_election','$concept_non_competitive_elections$')]. \n\nTodos os candidatos devem ser indicados ou pelo único partido governante de [ROOT.GetCountry.GetName], ou por organizações públicas sob seu controle. \n\nEmbora os eleitores possam votar contra o candidato do partido governante, tais votos só podiam ser registrados por meio de cabines de votação designadas. Em contraste, o apoio ao partido governante podia ser expresso simplesmente entregando uma cédula em branco. \n\n@information! As [Concept('concept_non_competitive_election','$concept_non_competitive_elections$')] são realizadas a cada #y 5 anos#! e são suspensas durante [concept_war]. \n\n@information! [Concept('concept_law','$concept_laws$')] de #y $lawgroup_distribution_of_power$#! podem alterar os(as) [concept_votes] do(a) [concept_government]."

