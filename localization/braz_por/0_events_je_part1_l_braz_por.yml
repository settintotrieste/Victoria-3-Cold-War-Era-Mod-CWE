    amendment_wartime_suspended_elections_desc:0 "No interesse da segurança e unidade nacionais, o governo suspendeu todas as eleições programadas até que as hostilidades diminuam."

    je_sovereign_wealth_fund:0 "Fundo Soberano [ROOT.GetCountry.GetAdjectiveNoFlag]"
    je_sovereign_wealth_fund_reason:0 "A Corporação de Investimento [ROOT.GetCountry.GetAdjectiveNoFlag] é uma empresa estatal que permite ao Estado investir no setor privado [ROOT.GetCountry.GetAdjective]. Os dividendos dessa atividade de investimento são então reunidos em um Fundo Soberano administrado pelo Governo. Este sistema permite efetivamente que o Governo injete e retire dinheiro do(a) [concept_investment_pool] em quantias proporcionais ao nível de propriedade governamental do setor privado. \n\n#BOLD Tamanho do Fundo Soberano:#! #Green @money![GetPlayer.MakeScope.Var('sovereign_wealth_fund_size_display').GetValue]M#! \n\n#BOLD Injeção ou retirada máxima por mês:#! @money![GetPlayer.MakeScope.Var('sovereign_wealth_fund_withdrawal_amount').GetValue] \n\n#BOLD Nº de Empresas Privadas Estatais:#! [GetPlayer.MakeScope.Var('sovereign_wealth_fund_gov_buildings').GetValue] / [GetPlayer.MakeScope.Var('sovereign_wealth_fund_all_buildings').GetValue] \n\n#BOLD Presidente:#! [ROOT.GetCountry.GetRuler.GetFullName]"
    je_sovereign_wealth_fund_status:0 "Saldo: #Green @money![GetPlayer.MakeScope.Var('sovereign_wealth_fund_size_display').GetValue]M#!"

