    diplomatic_neutrality_violated.t:0 "Neutralidade [SCOPE.sCountry('neutrality_violated_country').GetAdjective] Violada"
    diplomatic_neutrality_violated.d:0 "A neutralidade diplomática de [SCOPE.sCountry('neutrality_violated_country').GetName] foi violada por um Estado agressor. Em resposta a essa flagrante violação do direito internacional, as Nações Unidas convocaram a formação de uma coalizão de países dispostos a assistir [SCOPE.sCountry('neutrality_violated_country').GetName] militarmente em sua guerra."
