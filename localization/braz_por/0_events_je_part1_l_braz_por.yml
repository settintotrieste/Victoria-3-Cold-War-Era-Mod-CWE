    je_state_run_companies:0 "Empresas Estatais [ROOT.GetCountry.GetAdjectiveNoFormatting]"
    je_state_run_companies_reason:0 "Embora [ROOT.GetCountry.GetName] possua um(a) [GetLawType('law_command_economy').GetName], possui [Concept('concept_company','$concept_companies$')] estatais semiautônomas. \n\nO(A) [concept_government] [ROOT.GetCountry.GetAdjective] pode optar por investir mais nessas empresas, fornecendo-lhes suprimentos e dinheiro adicionais do(a) [concept_treasury] para usar livremente. \n\nEste sistema permite que o(a) [concept_government] transfira fundos do(a) [concept_gold_reserves] para o(a) [concept_investment_pool], possibilitando que as empresas estatais construam [Concept('concept_building', '$concept_buildings$')] de forma autônoma."
