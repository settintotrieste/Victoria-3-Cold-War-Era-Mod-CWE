    economic_cycle_1:0 "Perspectiva Econômica Muito Ruim"
    economic_cycle_2:0 "Perspectiva Econômica Ruim"
    economic_cycle_3:0 "Perspectiva Econômica Neutra"
    economic_cycle_4:0 "Perspectiva Econômica Forte"
    economic_cycle_5:0 "Perspectiva Econômica Muito Forte"

    nuclear_dev_cost:0 "Custo de Desenvolvimento de Armas Nucleares"

    nuclear_capability:0 "Estado com Armas Nucleares"
    start_nuclear_weapons_program_decision:0 "Iniciar um Programa de Armas Nucleares"
    start_nuclear_weapons_program_decision_desc:0 "Uma arma nuclear é um dispositivo explosivo que deriva sua força destrutiva de reações nucleares, seja fissão (bomba de fissão) ou uma combinação de reações de fissão e fusão (bomba termonuclear), produzindo uma explosão nuclear. Devemos desenvolver tais armas para incutir medo nos corações de nossos inimigos. Note que o programa de armas nucleares será encerrado caso nos tornemos um sujeito insuficientemente independente ou promulguemos leis que nos proíbam de possuir ADMs."
    nuclear_program_started:0 "Programa de Armas Nucleares"

    gained_nuclear_capability.t:0 "Capacidade de Ataque Nuclear Adquirida"
    gained_nuclear_capability.d:0 "[SCOPE.sCountry('nuclear_country').GetName], por meio de seus esforços incansáveis, adquiriu armas nucleares e um meio de entregar essas armas aos seus inimigos. Isso significa que agora pode atacar nações inimigas em guerra contra si com armas nucleares."
    gained_nuclear_capability.f:0 "Note que a capacidade nuclear seria perdida caso [SCOPE.sCountry('nuclear_country').GetName] deixe de ter um(a) $building_nuclear_weapons_silo$ [concept_building] sem escassez de bens, promulgue a [concept_law] $law_wmd_banned$, ou se torne um sujeito insuficientemente independente."
    gained_nuclear_capability.option:0 "O mundo tremerá diante do nosso poder!"

    lost_nuclear_capability.t:0 "Capacidade de Ataque Nuclear Perdida"
    lost_nuclear_capability.d:0 "[SCOPE.sCountry('nuclear_country').GetName] perdeu sua capacidade de lançar ataques nucleares contra seus inimigos."
    lost_nuclear_capability.f:0 "Este evento ocorreu porque [SCOPE.sCountry('nuclear_country').GetName] deixou de ter um(a) $building_nuclear_weapons_silo$ [concept_building], promulgou a [concept_law] $law_wmd_banned$, ou se tornou um sujeito insuficientemente independente."
    lost_nuclear_capability.option:0 "Uma tragédia!"

    nuclear_attack.t:0 "[SCOPE.sCountry('nuclear_country').GetName] Atingido por Armas Nucleares"
    nuclear_attack.d:0 "Recebemos relatos de que o inimigo atingiu várias de nossas cidades e vilas com armas nucleares. As áreas atingidas tiveram sua infraestrutura obliterada, e grande parte delas está agora perigosamente irradiada. Embora a maioria dos funcionários do Governo nas áreas afetadas tenha conseguido se refugiar em abrigos antiaéreos, um grande número de cidadãos não conseguiu buscar abrigo e, assim, pereceu, seja pela explosão inicial, seja pela radiação tóxica resultante.  Só nos resta esperar que a paz seja alcançada antes que [SCOPE.sCountry('nuclear_country').GetName] seja completamente destruído(a)."
    nuclear_attack.f:0 "As regiões estaduais atingidas por armas nucleares terão modificadores muito prejudiciais, que só se dissiparão lentamente ao longo das próximas décadas."
    nuclear_attack.option:0 "Um momento de silêncio por aqueles que não sobreviveram."

    chemical_dev_cost:0 "Custo de Desenvolvimento de Armas Químicas"

    chemical_capability:0 "Estado com Armas Químicas"
    start_chemical_weapons_program_decision:0 "Iniciar um Programa de Armas Químicas"
    start_chemical_weapons_program_decision_desc:0 "Uma Arma Química é uma substância química usada para causar morte ou dano intencional por meio de suas propriedades tóxicas. Munições, dispositivos e outros equipamentos especificamente projetados para transformar substâncias tóxicas em armas também se enquadram na definição de armas químicas."
    chemical_program_started:0 "Programa de Armas Químicas"

    gained_chemical_capability.t:0 "Capacidade de Ataque Químico Adquirida"
    gained_chemical_capability.d:0 "[SCOPE.sCountry('chemical_country').GetName], por meio de seus esforços incansáveis, adquiriu armas químicas e um meio de entregar essas armas aos seus inimigos. Isso significa que agora pode ativar a(o) [concept_mobilization_option] de armas químicas."
    gained_chemical_capability.f:0 "Note que a capacidade química seria perdida caso [SCOPE.sCountry('chemical_country').GetName] deixe de ter um(a) $building_industrial_chemicals_factory$ [concept_building] sem escassez de bens, promulgue a [concept_law] $law_wmd_banned$, ou se torne um sujeito insuficientemente independente."
    gained_chemical_capability.option:0 "Ótimo!"

    lost_chemical_capability.t:0 "Capacidade de Ataque Químico Perdida"
    lost_chemical_capability.d:0 "[SCOPE.sCountry('chemical_country').GetName] perdeu sua capacidade de lançar ataques químicos contra seus inimigos."
    lost_chemical_capability.f:0 "Este evento ocorreu porque [SCOPE.sCountry('chemical_country').GetName] deixou de ter um(a) $building_industrial_chemicals_factory$ [concept_building], promulgou a [concept_law] $law_wmd_banned$, ou se tornou um sujeito insuficientemente independente."
    lost_chemical_capability.option:0 "Uma tragédia!"

    biological_dev_cost:0 "Custo de Desenvolvimento de Armas Biológicas"

    biological_capability:0 "Estado com Armas Biológicas"
    start_biological_weapons_program_decision:0 "Iniciar um Programa de Armas Biológicas"
    start_biological_weapons_program_decision_desc:0 "A guerra biológica é o uso de toxinas biológicas ou agentes infecciosos, como bactérias, vírus, insetos e fungos, com a intenção de matar, ferir ou incapacitar seres humanos, animais ou plantas como ato de guerra. Armas biológicas são organismos vivos ou entidades replicantes."
    biological_program_started:0 "Programa de Armas Biológicas"

    gained_biological_capability.t:0 "Capacidade de Ataque Biológico Adquirida"
    gained_biological_capability.d:0 "[SCOPE.sCountry('biological_country').GetName], por meio de seus esforços incansáveis, adquiriu armas biológicas e um meio de entregar essas armas aos seus inimigos. Isso significa que agora pode usar a(o) $conduct_biological_strike$ [concept_diplomatic_action] contra seus inimigos."
    gained_biological_capability.f:0 "Note que a capacidade biológica seria perdida caso [SCOPE.sCountry('biological_country').GetName] deixe de ter um(a) $building_university$ [concept_building] sem escassez de bens, promulgue a [concept_law] $law_wmd_banned$, ou se torne um sujeito insuficientemente independente."
    gained_biological_capability.option:0 "Ótimo!"

    lost_biological_capability.t:0 "Capacidade de Ataque Biológico Perdida"
    lost_biological_capability.d:0 "[SCOPE.sCountry('biological_country').GetName] perdeu sua capacidade de lançar ataques biológicos contra seus inimigos."
    lost_biological_capability.f:0 "Este evento ocorreu porque [SCOPE.sCountry('biological_country').GetName] deixou de ter um(a) $building_university$ [concept_building], promulgou a [concept_law] $law_wmd_banned$, ou se tornou um sujeito insuficientemente independente."
    lost_biological_capability.option:0 "Uma tragédia!"

    enable_historical_railroading_decision:0 "Ativar Direcionamento Histórico para a IA"
    enable_historical_railroading_decision_desc:0 "Clicar nesta decisão forçará a IA a sempre selecionar a opção histórica em todos os eventos históricos. A decisão pode ser ativada ou desativada a qualquer momento pelo jogador durante a partida. Note que esta decisão não força a ocorrência de um evento histórico quando ele normalmente não ocorreria; ela apenas faz com que a IA escolha a opção histórica sempre que um evento histórico ocorrer para ela."
    disable_historical_railroading_decision:0 "Desativar Direcionamento Histórico para a IA"
    disable_historical_railroading_decision_desc:0 "Clicar nesta decisão livrará a IA da obrigação de sempre selecionar a opção histórica em todos os eventos históricos. O jogador ainda pode reativar o direcionamento histórico a qualquer momento."

    korean_war:0 "Guerra da Coreia"
    sino_tibet_war:0 "Guerra Sino-Tibetana"

    is_not_independent:0 "é insuficientemente independente"
    join_unga_decision.tt:0 "Nenhum(a) $unsc_permanent_member$ possui $relations_cold$ ou relações mais baixas $DIPLO_ACTION_RELATIONS$ com este país"
    join_unga_decision_2.tt:0 "Nenhum(a) $unsc_permanent_member$ possui um(a) [concept_rank] superior ao deste país"
    join_unga_decision_3.tt:0 "Data histórica para a Adesão à ONU (apenas para países historicamente divididos)"
    join_unga_decision_4.tt:0 "Não é um país sujeito à Política de Uma Só China"
    join_unga_decision:0 "Ingressar na Assembleia Geral da ONU"
    join_unga_decision_desc:0 "A Assembleia Geral da ONU (AGNU) é o principal órgão formulador de políticas da Organização. Composta por todos os Estados-Membros, ela oferece um fórum único para a discussão multilateral de todo o espectro de questões internacionais abrangidas pela Carta das Nações Unidas. Cada Estado-Membro das Nações Unidas tem direito a um voto igual."
    join_unsc_perm_decision:0 "Tornar-se Membro Permanente do CSNU"
    join_unsc_perm_decision_desc:0 "O Conselho de Segurança tem a responsabilidade primordial pela manutenção da paz e da segurança internacionais. Ele possui 15 Membros, e cada Membro tem um voto. Nos termos da Carta das Nações Unidas, todos os Estados-Membros são obrigados a cumprir as decisões do Conselho. O Conselho de Segurança assume a liderança na determinação da existência de uma ameaça à paz ou de um ato de agressão. Ele convoca as partes de uma disputa a resolvê-la por meios pacíficos e recomenda métodos de ajuste ou termos de acordo. Em alguns casos, o Conselho de Segurança pode recorrer à imposição de sanções ou até mesmo autorizar o uso da força para manter ou restaurar a paz e a segurança internacionais."
    join_unsc_perm_decision_tt:0 "O país possui relações Amistosas com todos os membros do CSNU"
    unga_member:0 "Membro da AGNU"
    unsc_permanent_member:0 "Membro Permanente do CSNU"
    unsc_non_permanent_member:0 "Membro Não Permanente do CSNU"
    united_nations.1.t:0 "Ingressou na AGNU"
    united_nations.1.d:0 "As Nações Unidas têm o prazer de anunciar que nosso país recebeu um assento na Assembleia Geral."
    united_nations.1.f:0 "Este evento ocorreu porque este país deixou de ser suficientemente independente ou deixou de ser um(a) [concept_recognized_power]."
    united_nations.2.t:0 "Removido da AGNU"
    united_nations.2.d:0 "Devido à mudança de status de nosso país, de estado soberano para estado fantoche de outro país, as Nações Unidas decidiram nos remover da Assembleia Geral. No entanto, recebemos o status de consolação de Estado Observador da ONU."
    united_nations.2.f:0 "Este evento ocorreu porque este país deixou de ser suficientemente independente ou deixou de ser um(a) [concept_recognized_power]."
    united_nations.1.a:0 "Lamentável"
    UNSC_non_perm_membership.t:0 "Membro Não Permanente do CSNU"
    UNSC_non_perm_membership.d:0 "[SCOPE.sCountry('new_non_perm_UNSC_member').GetName] foi eleito(a) pela Assembleia Geral das Nações Unidas para cumprir um mandato no Conselho de Segurança das Nações Unidas por um período de 2 anos. Durante esse período, poderemos ser convocados pela ONU para liderar guerras de contenção contra membros desonestos."
    UNSC_non_perm_membership.f:0 "Um novo país é selecionado para ser membro não permanente do CSNU sempre que houver menos de 15 membros do CSNU no mundo, enquanto houver mais de 30 membros da AGNU. Os países elegíveis são aqueles com reputação respeitável, que não estejam em guerra e que sejam membros da AGNU."
    UNSC_non_perm_membership.option:0 "Excelente!"

    new_unsc_perm_member.t:0 "Novo Membro Permanente do CSNU"
    new_unsc_perm_member.d:0 "[SCOPE.sCountry('new_unsc_member_scope').GetName] foi convidado(a) a ingressar no Conselho de Segurança das Nações Unidas como Membro Permanente. Agora pode vetar qualquer resolução de manutenção da paz da qual discorde."
    new_unsc_perm_member.f:0 "[SCOPE.sCountry('new_unsc_member_scope').GetName] conseguiu ingressar no CSNU como Membro Permanente porque tinha boas relações com todos os Membros Permanentes existentes e não era um pária internacional."
    new_unsc_perm_member.1:0 "Acompanharemos este desenvolvimento de perto"

    UNSC_members_list.tt:0 "Os países abaixo são Membros Permanentes do CSNU:"

    UN_secretary_general_selection.t:0 "Secretário-Geral da ONU [SCOPE.sCountry('unsg_country').GetAdjective]"
    UN_secretary_general_selection.d:0 "A Assembleia Geral das Nações Unidas elegeu um(a) cidadão(ã) [SCOPE.sCountry('unsg_country').GetAdjective] para ser o(a) Secretário(a)-Geral da organização. Isso confere ao nosso país mais influência nos assuntos internacionais."
    UN_secretary_general_selection.f:0 "[SCOPE.sCountry('unsg_country').GetName] foi escolhido(a) porque temos uma reputação internacional Respeitável e não somos uma Grande Potência. O mandato do(a) Secretário(a)-Geral da ONU é de 5 anos."

    UN_secretary_general_notification.t:0 "Secretário-Geral da ONU [SCOPE.sCountry('unsg_country').GetAdjective]"
    UN_secretary_general_notification.d:0 "A Assembleia Geral das Nações Unidas elegeu um(a) cidadão(ã) [SCOPE.sCountry('unsg_country').GetAdjective] para ser o(a) Secretário(a)-Geral da organização. Isso confere a [SCOPE.sCountry('unsg_country').GetName] mais influência nos assuntos internacionais."
    UN_secretary_general_notification.1.f:0 "Diz-se que o(a) novo(a) Secretário(a)-Geral da ONU é uma pessoa bastante passiva, de modo que é improvável que a ONU seja severa com os países que violarem o direito internacional."
    UN_secretary_general_notification.2.f:0 "Diz-se que o(a) novo(a) Secretário(a)-Geral da ONU é uma pessoa decente, de modo que, embora seja improvável que a ONU seja muito severa com os países que violarem o direito internacional, é de se esperar algum grau de firmeza."
    UN_secretary_general_notification.3.f:0 "Diz-se que o(a) novo(a) Secretário(a)-Geral da ONU é uma pessoa muito proativa e agressiva, de modo que é provável que a ONU seja muito severa com os países que violarem o direito internacional."
    UN_secretary_general_notification_option:0 "Parabéns a [SCOPE.sCountry('unsg_country').GetName]!"

    unsg_country:0 "País de Origem do(a) Secretário(a)-Geral da ONU"
    unsg_character:0 "Secretário(a)-Geral da ONU"

    character_role_unsg_character:0 "[Concept('concept_diplomat_character','$unsg_character$')]"
    character_role_unsg_character_title:0 "[Concept('concept_diplomat_character','$unsg_character$')]"

    concept_diplomat_character:0 "Diplomata"
    concept_diplomat_character_desc:0 "Este(a) [concept_character] é um(a) diplomata estrangeiro(a) e goza de imunidade internacional."

    un_sanctions_1:0 "Sanções Diplomáticas da ONU"
    un_sanctions_2:0 "Sanções Políticas da ONU"
    un_sanctions_3:0 "Sanções Econômicas da ONU"
    un_embargo_participant:0 "Participante das Sanções Econômicas da ONU"

    UN_sanctions_system.t:0 "Sanções impostas a [SCOPE.sCountry('UN_sanctions_target').GetName]"
    UN_sanctions_system.d:0 "As Nações Unidas, por insistência de seu(sua) Secretário(a)-Geral, decidiram impor sanções a [SCOPE.sCountry('UN_sanctions_target').GetName] com o propósito de punir o país por violar o direito internacional."
    UN_sanctions_system.f:0 "As sanções da ONU permanecerão ativas até que a infâmia de [SCOPE.sCountry('UN_sanctions_target').GetName] seja reduzida a 'respeitável'. Algumas sanções podem, no entanto, ser suspensas ao longo do caminho caso nosso país tenha um nível menor de infâmia."
    UN_sanctions_option:0 "Expressar nosso forte descontentamento na AGNU."

    UN_sanctions_system_embargo.t:0 "ONU pede sanções contra [SCOPE.sCountry('un_sanctions_embargoed_country').GetName]"
    UN_sanctions_system_embargo.d:0 "Devido às flagrantes violações do direito internacional cometidas por [SCOPE.sCountry('un_sanctions_embargoed_country').GetName], o(a) Secretário(a)-Geral da ONU convocou todos os membros da Assembleia Geral da ONU a impor um embargo ao estado desonesto. A participação no plano da ONU renderá muita boa vontade internacional para [SCOPE.sCountry('un_sanctions_embargoing_country').GetName]"
    UN_sanctions_system_embargo.f:0 "Note que o embargo contra [SCOPE.sCountry('un_sanctions_embargoed_country').GetName] não pode ser removido até que o país tenha suas sanções suspensas pela ONU."
    UN_sanctions_system_embargo_option.1:0 "Iniciar o embargo!"
    UN_sanctions_system_embargo_option.2:0 "Não, precisamos comerciar com eles."

    UN_sanctions_system_end.t:0 "Sanções da ONU Suspensas"
    UN_sanctions_system_end.d:0 "O(a) Secretário(a)-Geral da ONU suspendeu parte ou a totalidade das sanções contra [SCOPE.sCountry('UN_sanctions_target').GetName] devido à nossa menor infâmia."
    UN_sanctions_system_end.f:0 "As diversas sanções da ONU serão suspensas de acordo com o nível de infâmia que [SCOPE.sCountry('UN_sanctions_target').GetName] possui."
    UN_sanctions_end_option:0 "Ótimo!"

    request_un_peacekeeping_decision:0 "Solicitar Manutenção da Paz da ONU"
    request_un_peacekeeping_decision_desc:0 "Podemos submeter uma resolução na Assembleia Geral da ONU exigindo que nossos inimigos cessem imediatamente suas hostilidades contra nós, sob pena de enfrentarem a ameaça de uma ação coletiva da ONU contra eles. No entanto, isso está sujeito à aprovação do Conselho de Segurança e da Assembleia Geral da ONU."
    UNSC_peacekeeping_resolution.t:0 "Resolução da ONU: Intervir no conflito de [SCOPE.sCountry('un_peacekeeping_applicant').GetName]?"
    UNSC_peacekeeping_resolution.d:0 "[SCOPE.sCountry('un_peacekeeping_applicant').GetName] submeteu uma resolução na Assembleia Geral das Nações Unidas exigindo um armistício apoiado pela ONU em seu conflito em curso. Conforme o protocolo das Nações Unidas, o Conselho de Segurança é o órgão encarregado de assegurar a paz internacional, de modo que seus membros votarão primeiro sobre o apoio à resolução. Somente se a resolução for aprovada no CSNU é que ela seguirá para a AGNU para aprovação final."
    UNSC_peacekeeping_resolution.f:0 "Note que uma votação bem-sucedida para esta resolução desencadeará uma guerra de contenção contra o agressor, liderada por um membro aleatório do CSNU que tenha votado a favor da resolução."

    un_peacekeeping_vote.option.1:0 "Votar A FAVOR da resolução"
    un_peacekeeping_vote.option.2:0 "Votar CONTRA a resolução"
    un_peacekeeping_vote.option.3:0 "Abster-se de votar"

    UNGA_peacekeeping_resolution_advance.t:0 "Resolução de Manutenção da Paz da ONU avança para a AGNU"
    UNGA_peacekeeping_resolution_advance.d:0 "A resolução que exige a intervenção das Nações Unidas no conflito de [SCOPE.sCountry('un_peacekeeping_applicant').GetName] foi aprovada pelo Conselho de Segurança das Nações Unidas. Ela agora segue para ser votada pela Assembleia Geral das Nações Unidas."
    UNGA_peacekeeping_resolution_advance.f:0 "Este evento foi desencadeado porque nenhum membro permanente do CSNU vetou a resolução, e houve uma maioria de membros não permanentes votando a favor da resolução."
    un_peacekeeping_update:0 "Excelente"

    UNGA_peacekeeping_resolution.t:0 "Resolução da ONU: Intervir no conflito de [SCOPE.sCountry('un_peacekeeping_applicant').GetName]?"
    UNGA_peacekeeping_resolution.d:0 "[SCOPE.sCountry('un_peacekeeping_applicant').GetName] submeteu uma resolução na Assembleia Geral das Nações Unidas exigindo um armistício apoiado pela ONU em seu conflito em curso. O Conselho de Segurança da ONU aprovou a resolução, portanto, se a resolução será adotada pela ONU agora depende de a AGNU também aprová-la."
    UNGA_peacekeeping_resolution.f:0 "Note que uma votação bem-sucedida para esta resolução desencadeará uma guerra de contenção contra o agressor, liderada por um membro aleatório do CSNU que tenha votado a favor da resolução."

    UN_peacekeeping_resolution_YES.t:0 "Resolução de Manutenção da Paz da ONU Aprovada"
    UN_peacekeeping_resolution_YES.d:0 "A resolução de [SCOPE.sCountry('un_peacekeeping_applicant').GetName], que exigia um armistício apoiado pela ONU em seu conflito em curso, foi aprovada no CSNU e na AGNU. O(a) Secretário(a)-Geral da ONU emitirá agora um ultimato em nome da ONU, exigindo que todos os agressores no conflito aceitem uma Paz Branca ou enfrentem uma guerra de contenção."
    UN_peacekeeping_resolution_YES.f:0 "A ONU lançará uma guerra de contenção contra qualquer país agressor que rejeitar o ultimato da ONU."

    UN_peacekeeping_ultimatum.t:0 "Ultimato das Nações Unidas"
    UN_peacekeeping_ultimatum.d:0 "O(a) Secretário(a)-Geral das Nações Unidas apresentou um ultimato a [SCOPE.sCountry('un_peacekeeping_aggressor').GetName]: Assinar uma Paz Branca com [SCOPE.sCountry('un_peacekeeping_applicant').GetName] ou eles terão de iniciar uma guerra de contenção contra nós, liderada por um dos membros do CSNU."
    UN_peacekeeping_ultimatum.f:0 "Ceder à pressão internacional será visto como uma humilhação nacional e desencadeará muita agitação em nosso país."
    un_peacekeeping_ultimatum.option.1:0 "Aceitamos o ultimato"
    un_peacekeeping_ultimatum.option.2:0 "Por cima do meu cadáver!"

    un_intervene_in_war.tt:0 "Ingressar em qualquer [concept_war] entre [SCOPE.sCountry('un_peacekeeping_applicant').GetName] e [SCOPE.sCountry('un_peacekeeping_aggressor').GetName] em que [SCOPE.sCountry('un_peacekeeping_applicant').GetName] seja o(a) [concept_war_leader] e não o agressor"
    UN_peacekeeping_join_war.t:0 "Missão de Manutenção da Paz da ONU para Auxiliar [SCOPE.sCountry('un_peacekeeping_applicant').GetName]"
    UN_peacekeeping_join_war.d:0 "Com a autorização do Conselho de Segurança das Nações Unidas, o(a) Secretário(a)-Geral da ONU organizou uma força de manutenção da paz para auxiliar [SCOPE.sCountry('un_peacekeeping_applicant').GetName] em sua guerra defensiva contra [SCOPE.sCountry('un_peacekeeping_aggressor').GetName]."
    UN_peacekeeping_join_war.f:0 "Ingressar na missão de manutenção da paz fará com que [ROOT.GetCountry.GetName] se junte ao lado de [SCOPE.sCountry('un_peacekeeping_applicant').GetName] em qualquer [concept_diplomatic_play] entre eles e [SCOPE.sCountry('un_peacekeeping_aggressor').GetName]."
    UN_peacekeeping_join_war.option.1:0 "Enviar nossas tropas para auxiliar [SCOPE.sCountry('un_peacekeeping_applicant').GetName]!"
    UN_peacekeeping_join_war.option.2:0 "Que se virem sozinhos."

    UN_peacekeeping_resolution_NO.t:0 "Resolução de Manutenção da Paz da ONU Fracassa"
    UN_peacekeeping_resolution_NO.d:0 "A resolução de [SCOPE.sCountry('un_peacekeeping_applicant').GetName], que exigia um armistício apoiado pela ONU em seu conflito em curso, foi rejeitada pelas Nações Unidas. O(a) Secretário(a)-Geral da ONU culpa os membros da organização pela falha em agir."
    UN_peacekeeping_resolution_NO.f:0 "A Resolução de Manutenção da Paz da ONU fracassou porque houve um veto de um Membro Permanente do CSNU, ou porque a resolução não obteve maioria simples de votos no CSNU ou na AGNU. \n\nMembro do CSNU que vetou: [SCOPE.sCountry('un_peacekeeping_vetoer').GetName]"
    un_peacekeeping_fails:0 "A ONU é realmente inútil!"

    un_mandate_creation.tt:0 "Um(a) $mandate$ da ONU é criado(a) sobre [SCOPE.sState('state_to_release').GetName]"
    UN_peacekeeping_resolution_mandate.t:0 "Desmantelamento de [ROOT.GetCountry.GetName] pela ONU"
