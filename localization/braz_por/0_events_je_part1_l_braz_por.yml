    the_troubles_custom_name:0 "Os Troubles"
    the_troubles_custom_desc:0 "Os Troubles foram um conflito etnonacionalista na Irlanda do Norte que durou cerca de 30 anos, do final dos anos 1960 a 1998. Uma questão central era o status da Irlanda do Norte. Unionistas e legalistas, que por razões históricas eram majoritariamente protestantes do Ulster, queriam que a Irlanda do Norte permanecesse dentro do Reino Unido. Nacionalistas e republicanos irlandeses, majoritariamente católicos irlandeses, queriam que a Irlanda do Norte deixasse o Reino Unido e se unisse a uma Irlanda unificada. Embora os Troubles tenham ocorrido principalmente na Irlanda do Norte, por vezes a violência se espalhou para partes da República da Irlanda, da Inglaterra e da Europa continental."
    blm_custom_name:0 "O Legado da Escravidão"
    blm_custom_desc:0 "Desde a chegada dos primeiros africanos no início da era colonial até após a Guerra Civil Americana, a maioria dos afro-americanos era escravizada. Mesmo os afro-americanos livres enfrentaram restrições às suas liberdades políticas, sociais e econômicas, sendo sujeitos a linchamentos, segregação, Códigos Negros, leis Jim Crow e outras formas de discriminação, tanto antes quanto depois da Guerra Civil. Graças ao movimento pelos direitos civis, a discriminação racial formal foi gradualmente proibida pelo governo federal, e passou a ser gradualmente percebida como socialmente e moralmente inaceitável por grande parte da sociedade americana. Apesar disso, o racismo contra afro-americanos permanece difundido nos EUA, e continua se refletindo na desigualdade socioeconômica."
    years_of_lead_custom_name:0 "Os Anos de Chumbo"
    years_of_lead_custom_desc:0 "A expressão Anos de Chumbo refere-se a um período de violência política e convulsão social em [ROOT.GetCountry.GetName], marcado por uma onda de incidentes de terrorismo político e confrontos violentos, tanto de extrema esquerda quanto de extrema direita."
    naxalite_insurgency_custom_name:0 "A Insurgência Naxalita-Maoista"
    naxalite_insurgency_custom_desc:0 "A insurgência naxalita-maoísta é um conflito em curso entre grupos maoístas conhecidos como naxalitas ou naxals (um grupo de comunistas favoráveis ao sentimento e à ideologia política maoísta) e o governo indiano. Os naxalitas frequentemente têm como alvo policiais e funcionários públicos, no que dizem ser uma luta por melhores direitos à terra e mais empregos para os trabalhadores agrícolas negligenciados e os pobres."
    tamil_tigers_insurgency_custom_name:0 "A Insurgência dos Tigres Tâmeis"
    tamil_tigers_insurgency_custom_desc:0 "Os Tigres de Libertação do Eelam Tâmil eram uma organização militante tâmil baseada no nordeste do Sri Lanka. O LTTE lutou para criar um Estado tâmil independente chamado Eelam Tâmil no nordeste da ilha, devido à contínua discriminação e violenta perseguição contra os tâmeis do Sri Lanka pelo Governo do Sri Lanka, dominado pelos cingaleses."
    communist_insurgency_custom_name:0 "A Insurgência Comunista [ROOT.GetCountry.GetAdjectiveNoFlag]"
    communist_insurgency_custom_desc:0 "O Partido Comunista [ROOT.GetCountry.GetAdjectiveNoFlag] declarou guerra ao(à) [concept_government], com o objetivo de derrubá-lo(a) e estabelecer uma República Socialista."
    generic_insurgency_custom_name:0 "A Insurgência [ROOT.GetCountry.GetAdjectiveNoFlag]"
    generic_insurgency_custom_desc:0 "Elementos radicais na sociedade [ROOT.GetCountry.GetAdjective] fizeram de sua missão derrubar o(a) [concept_government] pela força."
    theocratic_insurgency_custom_name:0 "A Guerra ao Terror"
    theocratic_insurgency_custom_desc:0 "A Guerra ao Terror é uma campanha militar para reprimir extremistas religiosos em [ROOT.GetCountry.GetName]. Esses extremistas buscam derrubar o(a) [concept_government] e estabelecer um Estado Teocrático."

