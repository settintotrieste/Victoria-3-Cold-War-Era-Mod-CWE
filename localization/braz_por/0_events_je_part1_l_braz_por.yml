    dutch_west_papua.sgc.t:0 "O Acordo de Nova York?"
    dutch_west_papua.sgc.d:0 "O Acordo de Nova York (assinado em 15 de agosto de 1962) foi um tratado entre a Indonésia e os Países Baixos, intermediado pelos Estados Unidos e pelas Nações Unidas, que transferiu o controle da Nova Guiné Ocidental (Irian Ocidental) da administração holandesa para a Indonésia. Estabeleceu uma administração temporária da ONU, seguida pela soberania indonésia, com a promessa de um referendo de "Ato de Livre Escolha" até 1969."
    dutch_antilles.sgc.t:0 "Autogoverno nas Antilhas Neerlandesas?"
