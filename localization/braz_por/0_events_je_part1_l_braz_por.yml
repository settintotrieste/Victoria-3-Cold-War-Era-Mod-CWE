    je_occupation_of_austria:0 "Ocupação da Áustria"
    je_occupation_of_austria_reason:0 "Ao final da Segunda Guerra Mundial na Europa, a Áustria foi ocupada pelos Aliados e declarou independência da Alemanha Nazista em 27 de abril de 1945. Enquanto a Alemanha foi dividida em Alemanha Oriental e Ocidental em 1949, a Áustria permaneceu sob ocupação conjunta dos Aliados Ocidentais e da União Soviética. \n\nEnquanto a Alemanha foi dividida em Alemanha Oriental e Ocidental em 1949, a Áustria permaneceu sob ocupação conjunta dos Aliados Ocidentais e da União Soviética."

    je_occupation_of_austria_end_occupation_button:0 "Encerrar a Ocupação [ROOT.GetCountry.GetAdjectiveNoFormatting] da Áustria"
    je_occupation_of_austria_end_occupation_button_desc:0 "O(A) [concept_government] [ROOT.GetCountry.GetAdjective] encerrará sua ocupação militar da Áustria. Isso encerrará nosso(a) [concept_condominium] sobre a Áustria e convidará todos os demais membros do(a) [concept_condominium] a também encerrarem sua ocupação da Áustria."

    je_occupation_of_berlin:0 "Ocupação de Berlim"
    je_occupation_of_berlin_reason:0 "Ao final da Segunda Guerra Mundial na Europa, Berlim foi tomada pelas forças Aliadas e formalmente separada da Alemanha Nazista em 27 de abril de 1945. A cidade foi dividida em quatro zonas de ocupação administradas pelos Estados Unidos, pelo Reino Unido, pela França e pela União Soviética. \n\nBerlim Ocidental permaneceu de jure sob o domínio dos Aliados Ocidentais, mas, para a maioria dos fins práticos, era tratada como parte da Alemanha Ocidental; no entanto, os residentes não possuíam passaportes da Alemanha Ocidental."

    je_occupation_of_berlin_end_occupation_button:0 "Encerrar a Ocupação [ROOT.GetCountry.GetAdjectiveNoFormatting] de Berlim"
    je_occupation_of_berlin_end_occupation_button_desc:0 "O(A) [concept_government] [ROOT.GetCountry.GetAdjective] encerrará sua ocupação militar de Berlim. Isso encerrará nosso(a) [concept_condominium] sobre Berlim e convidará todos os demais membros do(a) [concept_condominium] a também encerrarem sua ocupação de Berlim."

    je_occupation_of_trieste:0 "Ocupação de Trieste"
    je_occupation_of_trieste_reason:0 "O Território Livre de Trieste era um território independente no sul da Europa, entre a Itália e a Iugoslávia, voltado para a parte norte do mar Adriático, sob responsabilidade direta do Conselho de Segurança das Nações Unidas no rescaldo da Segunda Guerra Mundial. \n\nO território foi estabelecido em 10 de fevereiro de 1947, por um protocolo do Tratado de Paz com a Itália, para acomodar uma população etnicamente e culturalmente mista em um país neutro e independente. A intenção também era arrefecer as reivindicações territoriais entre a Itália e a Iugoslávia, devido à sua importância estratégica para o comércio com a Europa Central. \n\nPassou a existir em 15 de setembro de 1947. Sua administração foi dividida em duas áreas: uma sendo a cidade portuária de Trieste, com uma estreita faixa costeira a noroeste (Zona A); a outra (Zona B) era formada por uma pequena porção da parte noroeste da península da Ístria."

    je_occupation_of_trieste_end_occupation_button:0 "Encerrar a Ocupação [ROOT.GetCountry.GetAdjectiveNoFormatting] de Trieste"
    je_occupation_of_trieste_end_occupation_button_desc:0 "O(A) [concept_government] [ROOT.GetCountry.GetAdjective] encerrará sua ocupação militar de Trieste. Isso encerrará nosso(a) [concept_condominium] sobre Trieste e convidará todos os demais membros do(a) [concept_condominium] a também encerrarem sua ocupação de Trieste."

