    je_resident_general:0 "Influência Estrangeira em [ROOT.GetCountry.GetNameNoFlag]"
    je_resident_general_reason:0 "Como resultado de uma série de eventos infelizes, [ROOT.GetCountry.GetName] se viu sob a influência de uma potência estrangeira. Os interesses da potência estrangeira são protegidos por um diplomata estrangeiro que instalaram em [ROOT.GetCountry.GetName], e cuja opinião o(a) [concept_government] não pode ignorar. \n\nPodemos remover a influência estrangeira ao aumentar nossa(o) [concept_autonomy] para #y Independência#! (se formos um(a) [concept_subject]), ou ao usar o(a) [concept_diplomatic_play] #y $dp_end_dominate_politics$#! se tivermos um(a) [concept_diplomatic_pact] #y $dominate_politics$#! com outro país."

    resident_general_character_label.tt:0 "[SCOPE.sCharacter('resident_general_character_label').GetPrimaryRoleTitle]: [SCOPE.sCharacter('resident_general_character_label').GetFullName]"

    resident_general_system:0 "Sistema de Residente-Geral"

    je_end_protectorate_button:0 "Encerrar Status de $protectorate$"
    je_end_protectorate_button_desc:0 "O(A) [concept_government] [ROOT.GetCountry.GetAdjective] fará uma declaração de que agora é um país plenamente soberano, que não está mais sob a influência de seu(sua) [concept_overlord]. Isso encerrará o(a) [concept_protectorate] [ROOT.GetCountry.GetAdjective] se a declaração for aceita pelo(a) [concept_overlord]. \n\n@warning! [ROOT.GetCountry.GetName] declarará um(a) [concept_diplomatic_play] #y $dp_independence$#! se o(a) [concept_overlord] se recusar a aceitar a declaração de soberania plena."

    protectorate_independence.t:0 "Encerramento do(a) [concept_protectorate] [SCOPE.sCountry('protectorate_subject_country').GetAdjectiveNoFlag]?"
    protectorate_independence.d:0 "O(A) [concept_government] de [SCOPE.sCountry('protectorate_subject_country').GetName] emitiu uma declaração unilateral de que não é mais um(a) [concept_protectorate] de [ROOT.GetCountry.GetName]. Como [concept_overlord], temos apenas 2 opções: aceitar sua rejeição da influência [ROOT.GetCountry.GetAdjective] ou usar a força para impedi-los de encerrar o(a) [concept_protectorate]."
    protectorate_independence.f:0 "[SCOPE.sCountry('protectorate_subject_country').GetName] decidiu fazer isso porque tinha [concept_relations] #r Hostis#! com [ROOT.GetCountry.GetName], ou possuía #r 100#! de [concept_liberty_desire]."

    protectorate_independence.option.1:0 "Dizer adeus a [SCOPE.sCountry('protectorate_subject_country').GetName]."
    protectorate_independence.option.2:0 "Nossas forças militares terão algo a dizer sobre isso."

