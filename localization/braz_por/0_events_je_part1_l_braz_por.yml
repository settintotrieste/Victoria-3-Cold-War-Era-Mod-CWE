    USA_civil_rights_movement.t:0 "O Movimento pelos Direitos Civis"
    USA_civil_rights_movement.d:0 "O movimento pelos direitos civis foi um movimento social e campanha de 1954 a 1968 nos Estados Unidos para abolir a segregação racial legalizada, a discriminação e a privação de direitos no país. O movimento teve suas origens na era da Reconstrução, no final do século XIX, e suas raízes modernas nos anos 1940, embora tenha alcançado seus maiores avanços legislativos nos anos 1960, após anos de ações diretas e protestos de base. As principais campanhas de resistência não violenta e desobediência civil do movimento social acabaram por garantir novas proteções na lei federal para os direitos civis de todos os americanos."
    USA_assassinate_MLK.t:0 "O Assassinato de Martin Luther King Jr.?"
    USA_assassinate_MLK.d:0 "Martin Luther King Jr., um clérigo afro-americano e líder do movimento pelos direitos civis, foi baleado fatalmente no Motel Lorraine, em Memphis, Tennessee, em 4 de abril de 1968, às 18h01 (horário local). Foi levado às pressas ao Hospital St. Joseph, onde morreu às 19h05. Foi um proeminente líder do movimento pelos direitos civis e laureado com o Prêmio Nobel da Paz, conhecido por seu uso da não violência e da desobediência civil."
    USA_blm_protests.t:0 "Os Protestos de George Floyd"
    USA_blm_protests.d:0 "Os protestos de George Floyd foram uma série de protestos contra a brutalidade policial que começaram em Minneapolis, nos Estados Unidos, em 26 de maio de 2020. A agitação civil e os protestos começaram como parte das reações internacionais ao assassinato de George Floyd, um homem afro-americano de 46 anos, durante uma prisão. Os protestos rapidamente se espalharam por todo o país e para mais de 2.000 cidades e vilarejos em mais de 60 países, em apoio ao movimento Black Lives Matter (BLM). Pesquisas estimaram que entre 15 e 26 milhões de pessoas participaram em algum momento das manifestações nos Estados Unidos, tornando os protestos os maiores da história dos EUA."
    GBR_1967_HKG_riots.t:0 "Os Motins Anticoloniais de Hong Kong"
    GBR_1967_HKG_riots.d:0 "Os motins de Hong Kong de 1967 foram motins antigovernamentais em larga escala ocorridos em Hong Kong durante o domínio colonial britânico. Começando como uma pequena disputa trabalhista, as manifestações acabaram por escalar para protestos contra o governo colonial. Os protestos foram parcialmente inspirados por manifestações anticoloniais bem-sucedidas em Macau portuguesa, ocorridas poucos meses antes."
    POR_1966_MCA_riots.t:0 "O Incidente 12-3"
    POR_1966_MCA_riots.d:0 "O incidente 12-3 foi uma série de manifestações políticas e motins contra o domínio colonial português em Macau, ocorridos em 3 de dezembro de 1966. O incidente, inspirado pela Revolução Cultural na República Popular da China (China continental), ocorreu como resposta direta a uma repressão policial violenta das autoridades coloniais contra manifestantes chineses locais que protestavam contra a corrupção e o colonialismo em Macau."
    PRC_2014_HKG_protests.t:0 "O Movimento dos Guarda-Chuvas"
    PRC_2014_HKG_protests.d:0 "Uma série de protestos de rua do tipo sit-in, frequentemente chamados de Revolução dos Guarda-Chuvas e por vezes usados de forma intercambiável com Movimento dos Guarda-Chuvas, ou Movimento Occupy, ocorreu em Hong Kong de 26 de setembro a 15 de dezembro de 2014. Os protestos começaram após o Comitê Permanente do Congresso Nacional do Povo (NPCSC) emitir uma decisão sobre as reformas propostas ao sistema eleitoral de Hong Kong. A decisão foi amplamente vista como altamente restritiva, e equivalente a uma pré-seleção pelo Partido Comunista Chinês (PCC) dos candidatos ao cargo de Chefe do Executivo de Hong Kong."
    PRC_2019_HKG_protests.t:0 "Os Protestos de Hong Kong"
    PRC_2019_HKG_protests.d:0 "Os protestos de Hong Kong de 2019–2020 foram uma série de manifestações contra a introdução, pelo governo de Hong Kong, de um projeto de lei para emendar a Lei de Fugitivos referente à extradição. Foi a maior série de manifestações da história de Hong Kong. Os manifestantes exigiam a renúncia da Chefe do Executivo Carrie Lam e sufrágio universal para as eleições do Conselho Legislativo e do cargo de chefe do executivo."
    protests_of_1968.t:0 "Os Protestos de 1968"
    protests_of_1968.d:0 "Os protestos de 1968 compreenderam uma escalada mundial de conflitos sociais, predominantemente caracterizados pela ascensão da política de esquerda, sentimento antiguerra, urgência dos direitos civis, contracultura jovem dentro das gerações silenciosa e baby boomer, e rebeliões populares contra as forças militares e burocracias estatais."
    JAP_Sanrizuka_Struggle.t:0 "A Luta de Sanrizuka"
    JAP_Sanrizuka_Struggle.d:0 "A Luta de Sanrizuka refere-se a um conflito civil e motins envolvendo o governo japonês e a comunidade agrícola de Sanrizuka, compreendendo oposição organizada por agricultores, moradores locais e grupos de esquerda à construção do Aeroporto Internacional de Narita (então Novo Aeroporto Internacional de Tóquio). A luta surgiu da decisão do governo de construir o aeroporto em Sanrizuka sem o envolvimento ou consentimento da maioria dos moradores da área."
    JAP_sarin_attack.t:0 "O Ataque de Gás Sarin no Metrô de Tóquio"
    JAP_sarin_attack.d:0 "O ataque de gás sarin no metrô de Tóquio foi um ato de terrorismo doméstico perpetrado em 20 de março de 1995, em Tóquio, Japão, por membros do movimento de culto Aum Shinrikyo. Em cinco ataques coordenados, os perpetradores liberaram sarin em três linhas do Metrô de Tóquio (então Teito Rapid Transit Authority) durante o horário de pico, matando 13 pessoas, ferindo gravemente 50 (algumas das quais morreram depois), e causando problemas temporários de visão em quase 1.000 outras."
    USA_WTC_attack_1993.t:0 "O Atentado ao World Trade Center"
    USA_WTC_attack_1993.d:0 "O atentado ao World Trade Center de 1993 foi um ataque terrorista realizado em 26 de fevereiro de 1993, quando uma bomba em uma van detonou abaixo da Torre Norte do complexo do World Trade Center, na cidade de Nova York. O dispositivo de nitrato de ureia com hidrogênio potencializado, de 606 kg (1.336 lb), tinha a intenção de fazer a Torre Norte cair sobre sua gêmea, a Torre Sul, derrubando ambos os arranha-céus e matando dezenas de milhares de pessoas. Embora não tenha conseguido, matou seis pessoas, incluindo uma mulher grávida, e causou mais de mil feridos."
    USA_WTC_attack_2001.t:0 "Os Ataques de 11 de Setembro"
    USA_WTC_attack_2001.d:0 "Os ataques de 11 de setembro foram quatro ataques terroristas suicidas islamistas coordenados, realizados pela Al-Qaeda contra os Estados Unidos em 2001. Naquela manhã, 19 terroristas sequestraram quatro aviões comerciais programados para viajar das regiões da Nova Inglaterra e Atlântico Médio da Costa Leste até a Califórnia. Os sequestradores lançaram os dois primeiros aviões contra as Torres Gêmeas do World Trade Center, na cidade de Nova York, e direcionaram os dois voos seguintes a alvos em ou perto de Washington, D.C., em um ataque à capital do país. A terceira equipe conseguiu atingir o Pentágono, sede do Departamento de Defesa dos EUA, enquanto o quarto avião caiu na zona rural da Pensilvânia durante uma revolta dos passageiros."
    GBR_London_attack_2005.t:0 "Os Atentados de Londres"
    GBR_London_attack_2005.d:0 "Os atentados de Londres de 7 de julho de 2005, também referidos como 7/7, foram uma série de quatro ataques suicidas coordenados, realizados por terroristas islamistas, que tiveram como alvo passageiros que viajavam no transporte público de Londres durante o horário de pico da manhã. Três terroristas detonaram separadamente três bombas caseiras em rápida sucessão a bordo de trens do metrô de Londres, no centro de Londres. Mais tarde, um quarto terrorista detonou outra bomba em um ônibus de dois andares em Tavistock Square."
    GBR_Brighton_attack_1984.t:0 "O Atentado ao Hotel de Brighton"
    GBR_Brighton_attack_1984.d:0 "Em 12 de outubro de 1984, o Exército Republicano Irlandês Provisório (IRA) tentou assassinar membros do governo britânico no Grand Hotel, em Brighton, Inglaterra. Uma bomba-relógio de longo atraso foi plantada no hotel por Patrick Magee antes da chegada da Primeira-Ministra Margaret Thatcher e seu gabinete para a conferência do Partido Conservador. Cinco pessoas morreram, incluindo o deputado conservador e vice-líder do partido Sir Anthony Berry, e outras 31 ficaram feridas. Thatcher escapou por pouco da explosão."
    GER_Munich_Massacre_1972.t:0 "O Massacre de Munique"
    GER_Munich_Massacre_1972.d:0 "O massacre de Munique foi um ataque terrorista realizado durante os Jogos Olímpicos de Verão de 1972, em Munique, Alemanha Ocidental, por oito membros da organização militante palestina Setembro Negro, que se infiltraram na Vila Olímpica, mataram dois membros da equipe olímpica israelense e fizeram outros nove reféns."
    RUS_Moscow_attack_1999.t:0 "Os Atentados aos Prédios Residenciais Russos"
    RUS_Moscow_attack_1999.d:0 "Os atentados aos prédios residenciais russos foram uma série de explosões que atingiram quatro blocos de apartamentos nas cidades russas de Buynaksk, Moscou e Volgodonsk em setembro de 1999, matando mais de 300 pessoas, ferindo mais de 1.000, e espalhando uma onda de medo por todo o país. Os atentados, junto com a Invasão do Daguestão, desencadearam a Segunda Guerra Chechena. A condução da crise por Vladimir Putin, então primeiro-ministro, aumentou muito sua popularidade e o ajudou a alcançar a presidência em poucos meses."
    HND_Bombay_attack_1993.t:0 "Os Atentados de Bombaim"
    HND_Bombay_attack_1993.d:0 "Os atentados de Bombaim de 1993 foram uma série de 12 ataques a bomba ocorridos em Bombaim (agora Mumbai), Maharashtra, em 12 de março de 1993. Os ataques, ocorridos em um único dia, resultaram em 257 mortes e 1.400 feridos. Os ataques foram coordenados por Dawood Ibrahim, líder do sindicato internacional de crime organizado D-Company, sediado em Mumbai."
    IDO_Bali_attack_2002.t:0 "Os Atentados de Bali"
    IDO_Bali_attack_2002.d:0 "Uma série de atentados a bomba ocorreu em 12 de outubro de 2002 no distrito turístico de Kuta, na ilha indonésia de Bali. O ataque matou 202 pessoas (incluindo 88 australianos, 38 indonésios, 23 britânicos, e pessoas de mais de 20 outras nacionalidades). Outras 209 pessoas ficaram feridas. Vários membros da Jemaah Islamiyah, um grupo islamista violento, foram condenados em relação aos atentados, incluindo três indivíduos que foram sentenciados à morte."
    FRA_Paris_attack_1995.t:0 "Os Atentados Islamistas Franceses"
    FRA_Paris_attack_1995.d:0 "Uma série de ataques teve como alvo os sistemas de transporte público em Paris e Lyon, bem como uma escola em Villeurbanne, em 1995. Foram realizados pelo Grupo Islâmico Armado da Argélia (GIA), que buscava expandir a Guerra Civil Argelina para a França. Os ataques mataram oito pessoas, todas durante o primeiro ataque em 25 de julho. O ataque também feriu 190 pessoas."
    USA_Oklahoma_attack_1995.t:0 "O Atentado de Oklahoma City"
    USA_Oklahoma_attack_1995.d:0 "O atentado de Oklahoma City foi um atentado terrorista doméstico com caminhão-bomba contra o Edifício Federal Alfred P. Murrah, em Oklahoma City, Oklahoma, Estados Unidos, em 19 de abril de 1995, no segundo aniversário do fim do cerco de Waco. O atentado foi o ato de terrorismo mais mortal da história dos EUA antes dos ataques de 11 de setembro em 2001. Perpetrado por dois extremistas antigovernamentais e supremacistas brancos, Timothy McVeigh e Terry Nichols, o atentado ocorreu às 9h02 e matou 168 pessoas, feriu 680, e destruiu mais de um terço do edifício, que teve de ser demolido."
    HND_Operation_Blue_Star.t:0 "Operação Estrela Azul?"
    HND_Operation_Blue_Star.d:0 "A Operação Estrela Azul foi uma operação das Forças Armadas indianas entre 1 e 10 de junho de 1984 para remover o militante sikh Jarnail Singh Bhindranwale e outros separatistas sikhs dos prédios do Templo Dourado, o local mais sagrado do siquismo. A ação militar no complexo do templo foi criticada por sikhs em todo o mundo, que a interpretaram como um ataque à religião sikh e a toda a comunidade sikh."
    HND_Anti_Sikh_Riots.t:0 "Os Motins Anti-Sikh"
    HND_Anti_Sikh_Riots.d:0 "Os motins anti-sikh de 1984, também conhecidos como o massacre sikh de 1984, foram uma série de pogroms organizados contra os sikhs na Índia após o assassinato de Indira Gandhi por seus guarda-costas sikhs. Estimativas do governo projetam que cerca de 2.800 sikhs foram mortos em Délhi, e 3.350 em todo o país."
    ITA_Piazza_Fontana_attack_1969.t:0 "O Atentado da Piazza Fontana"
    ITA_Piazza_Fontana_attack_1969.d:0 "O atentado da Piazza Fontana foi um ataque terrorista ocorrido em 12 de dezembro de 1969, quando uma bomba explodiu na sede do Banca Nazionale dell'Agricoltura (o Banco Nacional Agrícola) na Piazza Fontana (próxima ao Duomo), em Milão, Itália, matando 17 pessoas e ferindo 88. O ataque foi realizado pelo Terceira Posição, o grupo paramilitar terrorista neofascista Ordine Nuovo, e possivelmente alguns colaboradores não identificados."
    HND_assassinate_MKG.t:0 "O Assassinato de Mahatma Gandhi?"
    HND_assassinate_MKG.d:0 "Às 17h17 de 30 de janeiro de 1948, Gandhi estava com suas sobrinhas-netas no jardim da Casa Birla (agora Gandhi Smriti), a caminho de discursar em uma reunião de oração, quando Nathuram Godse, um nacionalista hindu, disparou três balas no peito de Gandhi com uma pistola à queima-roupa. Segundo alguns relatos, Gandhi morreu instantaneamente."
    USA_taft_act.t:0 "O Ato Taft-Hartley?"
    USA_taft_act.d:0 "O Labor Management Relations Act de 1947, mais conhecido como Ato Taft-Hartley, é uma lei federal dos Estados Unidos que restringe as atividades e o poder dos sindicatos. Foi promulgado pelo 80º Congresso dos Estados Unidos, superando o veto do Presidente Harry S. Truman, tornando-se lei em 23 de junho de 1947. O Taft-Hartley foi introduzido após uma grande onda de greves em 1945 e 1946."
    PRC_tibetan_uprising.t:0 "O Levante Tibetano"
    PRC_tibetan_uprising.d:0 "O levante tibetano de 1959 começou em 10 de março de 1959, quando uma revolta eclodiu em Lhasa, capital do Tibete, que estava sob o controle efetivo da República Popular da China (RPC) desde que o Acordo dos Dezessete Pontos foi firmado em 1951. O levante inicial ocorreu em meio a tensões gerais sino-tibetanas e um contexto de confusão, pois os manifestantes tibetanos temiam que o governo chinês pudesse prender o 14º Dalai Lama. Os protestos também foram alimentados pelo sentimento anti-chinês e pelo separatismo."
    HND_tibetan_movement.t:0 "O Dalai Lama no Exílio?"
    HND_tibetan_movement.d:0 "No início do levante tibetano de 1959, temendo por sua vida, o Dalai Lama e seu séquito fugiram do Tibete com a ajuda da Divisão de Atividades Especiais da CIA, cruzando para a Índia em 30 de março de 1959, chegando a Tezpur, em Assam, em 18 de abril. Algum tempo depois, ele estabeleceu o Governo Tibetano no Exílio em Dharamshala, na Índia, frequentemente referido como "Pequena Lhasa". Após a fundação do governo no exílio, ele reassentou os aproximadamente 80.000 refugiados tibetanos que o seguiram ao exílio em assentamentos agrícolas."
    HND_tibetan_movement.option.1:0 "Deixá-lo ficar na Índia."
    HND_tibetan_movement.option.2:0 "Não, obrigado!"
    POL_pope_movement.t:0 "A Eleição do Papa João Paulo II?"
    POL_pope_movement.d:0 "O Papa João Paulo II proporcionou um foco moral para o anticomunismo; uma visita à sua Polônia natal em 1979 estimulou um ressurgimento religioso e nacionalista centrado no sindicato Solidariedade, que galvanizou a oposição e pode ter levado à tentativa de assassiná-lo dois anos depois."
    POL_pope_movement.option.1:0 "Ele é um encrenqueiro!"
    POL_pope_movement.option.2:0 "Concordar com alguma liberdade religiosa."
    POL_solidarity_movement.t:0 "O Movimento Solidariedade"
    POL_solidarity_movement.d:0 "Solidariedade é um sindicato polonês fundado em agosto de 1980 no Estaleiro Lenin, em Gdańsk, Polônia. O número de membros do sindicato atingiu o pico de 10 milhões em setembro de 1981, representando um terço da população em idade ativa do país. Nos anos 1980, Solidariedade foi um amplo movimento social antiautoritário, usando métodos de resistência civil para promover as causas dos direitos dos trabalhadores e da mudança social. O Governo tentou, no início dos anos 1980, destruir o sindicato por meio da imposição da lei marcial na Polônia e do uso de repressões políticas."
    AFG_mujahideen_movement.t:0 "Os Mujahidines Afegãos"
    AFG_mujahideen_movement.d:0 "Os mujahidines afegãos eram grupos de resistência islamista que lutaram contra a República Democrática do Afeganistão e a União Soviética durante a Guerra Soviético-Afegã e a subsequente Primeira Guerra Civil Afegã. "
    JAP_recruit_scandal.t:0 "O Escândalo Recruit"
    JAP_recruit_scandal.d:0 "O escândalo Recruit foi um escândalo de uso de informação privilegiada e corrupção que forçou muitos proeminentes políticos japoneses a renunciar em 1988. Entre os políticos envolvidos no escândalo estavam o Primeiro-Ministro Noboru Takeshita, o ex-Primeiro-Ministro Yasuhiro Nakasone, e o Secretário-Chefe do Gabinete Takao Fujinami. Além de membros do governo do LDP, líderes do Komeito, do Partido Democrata do Japão e do Partido Socialista Japonês também foram considerados envolvidos."
    ITA_maxi_trial.t:0 "O Maxiprocesso?"
    ITA_maxi_trial.d:0 "O Maxiprocesso foi um julgamento criminal contra a Máfia siciliana, ocorrido em Palermo, Sicília. O julgamento durou de 10 de fevereiro de 1986 (primeiro dia da Corte d'Assise) a 30 de janeiro de 1992 (último dia da Suprema Corte de Cassação), e foi realizado em um tribunal em estilo bunker, especialmente construído para esse propósito dentro dos muros da prisão de Ucciardone."
    GBR_poll_tax_riots.t:0 "O Imposto Per Capita?"
    GBR_poll_tax_riots.d:0 "Os motins do imposto per capita foram uma série de motins em cidades e vilarejos britânicos durante protestos contra o Community Charge (comumente conhecido como "poll tax", ou imposto per capita), introduzido pelo governo conservador do Primeiro-Ministro Margaret Thatcher. O maior protesto ocorreu no centro de Londres no sábado, 31 de março de 1990, pouco antes de o imposto entrar em vigor na Inglaterra e no País de Gales."
    FRA_yellow_vests.t:0 "Os Protestos dos Coletes Amarelos"
    FRA_yellow_vests.d:0 "Os Protestos dos Coletes Amarelos foram uma série de protestos populares semanais de base na França que começaram em 17 de novembro de 2018. O movimento foi inicialmente motivado pela alta dos preços do petróleo bruto e dos combustíveis, um alto custo de vida e a desigualdade econômica. O movimento argumentava que um fardo tributário desproporcional na França recaía sobre as classes trabalhadora e média, especialmente em áreas rurais e periurbanas. Os manifestantes exigiam impostos mais baixos sobre combustíveis, a reintrodução do imposto de solidariedade sobre a riqueza, um aumento do salário mínimo, entre outras coisas."
    RUS_Khodorkovsky_Case.t:0 "O Julgamento de Mikhail Khodorkovsky?"
    RUS_Khodorkovsky_Case.d:0 "Em 2001, Khodorkovsky fundou a Rússia Aberta, uma organização reformista com a intenção de "construir e fortalecer a sociedade civil" no país. Em outubro de 2003, foi preso pelas autoridades russas e acusado de fraude. O governo do Presidente Vladimir Putin então congelou as ações da Yukos pouco depois, sob acusações fiscais. O governo de Putin tomou novas medidas contra a Yukos, levando ao colapso do preço das ações da empresa e à evaporação de grande parte da riqueza de Khodorkovsky. Em maio de 2005, foi considerado culpado e sentenciado a nove anos de prisão."
    RUS_Politkovskaya_murder.t:0 "O Assassinato de Anna Politkovskaya?"
    RUS_Politkovskaya_murder.d:0 "Em 7 de outubro de 2006, a jornalista, escritora e ativista de direitos humanos russa Anna Politkovskaya foi morta a tiros no elevador de seu prédio de apartamentos no centro de Moscou. Era conhecida por sua oposição ao conflito checheno e por críticas a Vladimir Putin. Escreveu vários livros sobre as guerras chechenas, bem como sobre a Rússia de Putin, e recebeu diversos prêmios internacionais por seu trabalho. Seu assassinato, acredita-se, um assassinato por encomenda, provocou uma forte reação internacional."
    RUS_snow_revolution.t:0 "A Revolução da Neve?"
    RUS_snow_revolution.d:0 "A Revolução da Neve começou em 2011 (como protestos contra os resultados da eleição legislativa russa de 2011) e continuou em 2012 e 2013. Os protestos foram motivados por alegações de jornalistas russos e estrangeiros, ativistas políticos e membros do público de que o processo eleitoral foi fraudulento."
    RUS_Navalny_murder.t:0 "A Morte de Alexei Navalny?"
    RUS_Navalny_murder.d:0 "Alexei Anatolyevich Navalny foi um líder da oposição russa, advogado, ativista anticorrupção e prisioneiro político. Em janeiro de 2021, Navalny retornou à Rússia e foi imediatamente detido sob acusações de violar as condições de liberdade condicional enquanto estava hospitalizado na Alemanha. Em agosto de 2023, Navalny foi condenado a mais 19 anos de prisão por acusações de extremismo. Em dezembro de 2023, Navalny desapareceu da prisão por quase três semanas. Ele reapareceu em uma colônia penal corretiva no Círculo Ártico, no Okrug Autônomo de Yamalo-Nenets. Em 16 de fevereiro de 2024, o serviço prisional russo informou que Navalny havia morrido aos 47 anos."
    BYE_Minsk_attack_2011.t:0 "O Atentado ao Metrô de Minsk"
    BYE_Minsk_attack_2011.d:0 "O atentado ao Metrô de Minsk de 2011 ocorreu em 11 de abril de 2011, quando 15 pessoas foram mortas e 204 ficaram feridas com a explosão de uma bomba no Metrô de Minsk, Belarus. A explosão ocorreu na estação central de Kastryčnickaja às 17h55, horário local. A Procuradoria abriu uma investigação criminal e classificou o evento como um ataque terrorista. Dois suspeitos presos em 13 de abril confessaram o atentado, mas os motivos permaneceram obscuros. Em março de 2012, ambos os perpetradores, Dzmitry Kanavalau e Uladzislau Kavalyou, foram executados por fuzilamento."
    BYE_May_Protests.t:0 "Os Grandes Protestos de Maio"
    BYE_May_Protests.d:0 "Os protestos bielorrussos de 2020–2021 foram uma série de manifestações e protestos políticos em massa contra o governo bielorrusso e o Presidente Alexander Lukashenko. Os maiores protestos antigovernamentais da história de Belarus, as manifestações começaram no período que antecedeu e durante a eleição presidencial de 2020, na qual Lukashenko buscava seu sexto mandato. Em resposta às manifestações, uma série de comícios pró-governo relativamente pequenos foram realizados."
    JAP_1970_uprising.t:0 "A Tentativa de Golpe de Yukio Mishima"
    JAP_1970_uprising.d:0 "Em 25 de novembro de 1970, Mishima e quatro membros de sua milícia entraram em uma base militar no centro de Tóquio, fizeram seu comandante refém e tentaram, sem sucesso, inspirar as Forças de Autodefesa do Japão a se levantarem e derrubar a Constituição japonesa de 1947 (que ele chamava de "uma constituição da derrota"). Após seu discurso e o grito de "Viva o Imperador!", ele cometeu seppuku."
    USA_assassinate_DJT.t:0 "A Tentativa de Assassinato de Donald Trump"
    USA_assassinate_DJT.d:0 "Em 13 de julho de 2024, Donald Trump, ex-presidente dos Estados Unidos e presumível candidato do Partido Republicano na eleição presidencial de 2024, sobreviveu a uma tentativa de assassinato enquanto discursava em um comício de campanha ao ar livre perto de Butler, Pensilvânia."
    PER_big_party.t:0 "A Celebração dos 2.500 Anos do Império Persa?"
    PER_big_party.d:0 "A Celebração do 2.500º Aniversário da Fundação do Império Persa foi um evento nacional no Irã, consistindo em um elaborado conjunto de grandes festividades durante outubro de 1971, para celebrar a fundação do antigo Império Aquemênida por Ciro, o Grande. A intenção da celebração era destacar a antiga civilização e história do Irã, bem como exibir seus avanços contemporâneos sob o Xá Mohammad Reza Pahlavi."
    ISR_assassinate_YR.t:0 "O Assassinato de Yitzhak Rabin?"
    ISR_assassinate_YR.d:0 "Em 1992, Rabin foi reeleito primeiro-ministro em uma plataforma que abraçava o processo de paz israelense-palestino. Assinou vários acordos históricos com a liderança palestina como parte dos Acordos de Oslo. Em 1994, Rabin ganhou o Prêmio Nobel da Paz junto com o rival político de longa data Shimon Peres e o líder palestino Yasser Arafat. Rabin também assinou um tratado de paz com a Jordânia em 1994. Em novembro de 1995, foi assassinado por Yigal Amir, um extremista que se opunha aos termos dos Acordos de Oslo."
    USA_assassinate_DJT_2.t:0 "A 2ª Tentativa de Assassinato de Donald Trump"
    USA_assassinate_DJT_2.d:0 "Donald Trump foi alvo de uma tentativa de assassinato em seu clube de golfe em West Palm Beach, Flórida, em 15 de setembro de 2024, apenas nove semanas após o candidato presidencial republicano sobreviver a outra tentativa contra sua vida. Agentes do Serviço Secreto dos EUA, posicionados alguns buracos à frente de onde Trump jogava, notaram o cano de um rifle estilo AK saindo por trás dos arbustos que margeiam o campo, a cerca de 400 jardas de distância. Um agente atirou, e o atirador deixou cair o rifle e fugiu em um SUV, deixando para trás a arma junto com duas mochilas, uma mira usada para pontaria e uma câmera GoPro, disse o Xerife do Condado de Palm Beach, Ric Bradshaw. O homem foi posteriormente detido pela polícia em um condado vizinho."
    GBR_diana_death.t:0 "A Morte de Diana, Princesa de Gales"
    GBR_diana_death.d:0 "Nas primeiras horas de 31 de agosto de 1997, Diana, Princesa de Gales, morreu em decorrência de ferimentos sofridos naquela noite em um acidente de carro fatal no túnel de Pont de l'Alma, em Paris, França. Dodi Fayed, parceiro de Diana, e Henri Paul, o motorista do Mercedes-Benz W140, foram encontrados mortos dentro do carro. O guarda-costas de Dodi, Trevor Rees-Jones, ficou gravemente ferido e foi o único sobrevivente do acidente. Diana tinha 36 anos quando morreu. Sua morte provocou uma onda de luto público no Reino Unido e no mundo, e seu funeral televisionado foi assistido por cerca de 2,5 bilhões de pessoas."
    GBR_diana_death.option.1:0 "Ela era a princesa do povo!"
    GBR_diana_death.option.2:0 "Lamentamos a morte de uma membro da realeza."
    IRQ_civil_war_2006.t:0 "A Guerra Civil Iraquiana"
    IRQ_civil_war_2006.d:0 "A guerra civil iraquiana foi um conflito armado de 2006 a 2008 entre vários grupos armados sectários xiitas e sunitas, como o Estado Islâmico do Iraque e o Exército Mahdi, além do governo iraquiano ao lado das forças da coalizão lideradas pelos EUA. Em fevereiro de 2006, a insurgência contra a coalizão e o governo escalou para uma guerra civil sectária após o atentado ao Santuário Al-Askari, considerado um local sagrado no xiismo duodecimano."
    JOR_civil_war_1970.t:0 "O Setembro Negro"
    JOR_civil_war_1970.d:0 "Setembro Negro foi um conflito armado entre a Jordânia, liderada pelo Rei Hussein, e a Organização para a Libertação da Palestina (OLP), liderada pelo presidente Yasser Arafat. Em 17 de setembro de 1970, o Exército jordaniano cercou cidades com significativa presença da OLP, incluindo Amã e Irbid, e começou a atacar postos de fedayeen que operavam a partir de campos de refugiados palestinos. Os fedayeen foram expulsos das cidades, um por um, até que 2.000 se renderam depois de serem cercados durante a ofensiva de Ajlun, em 23 de julho, marcando formalmente o fim do conflito. A Jordânia permitiu que os fedayeen se realocassem para o Líbano via Síria, onde mais tarde se envolveram na Guerra Civil Libanesa."
    GUA_civil_war_1960.t:0 "A Guerra Civil Guatemalteca"
    GUA_civil_war_1960.d:0 "A Guerra Civil Guatemalteca foi uma guerra civil na Guatemala, travada de 1960 a 1996 entre o governo da Guatemala e vários grupos rebeldes de esquerda. Diz-se que as forças governamentais guatemaltecas cometeram genocídio contra a população maia da Guatemala durante a guerra civil, e houve amplas violações dos direitos humanos contra civis. O contexto da luta baseava-se em questões de longa data sobre a distribuição injusta de terras. Guatemaltecos ricos, principalmente de ascendência europeia, e empresas estrangeiras como a American United Fruit Company controlavam grande parte da terra. Pagavam quase nenhum imposto em troca — o que levava a conflitos com os pobres indígenas rurais que trabalhavam a terra em condições miseráveis."
    COS_civil_war_1948.t:0 "A Guerra Civil Costarriquenha"
    COS_civil_war_1948.d:0 "A Guerra Civil Costarriquenha ocorreu de 12 de março a 24 de abril de 1948. O conflito seguiu-se às eleições presidenciais de 8 de fevereiro de 1948, nas quais o candidato de oposição Otilio Ulate derrotou Rafael Ángel Calderón Guardia, do partido no governo. Os representantes pró-governo que dominavam a Assembleia Legislativa alegaram que a vitória de Ulate foi fraudulenta, e, em 1º de março, o legislativo votou para anular os resultados da eleição. Isso desencadeou um levante armado liderado por José Figueres Ferrer, um empresário que não havia participado das eleições, contra o governo do Presidente Teodoro Picado. Após a guerra, Figueres derrubou o exército e governou o país por 18 meses como chefe de uma junta governamental provisória, que supervisionou a eleição de uma Assembleia Constitucional em dezembro. Essa Assembleia adotou a nova constituição de 1949, após a qual a junta foi dissolvida e o poder foi entregue a Ulate como novo presidente constitucional."
    AFG_civil_war_1979.t:0 "O Movimento de Resistência Afegão"
    AFG_civil_war_1979.d:0 "Em 27 de abril de 1978, o PDPA e unidades militares leais a ele mataram Daoud Khan, sua família imediata e guarda-costas em um golpe violento, e tomaram o controle da capital Cabul, declarando a nova República Democrática do Afeganistão (RDA). O novo governo comunista, liderado por um conselho revolucionário, não desfrutava do apoio das massas. Com anciãos religiosos declarando uma jihad contra o governo, em maio de 1979 Ahmad Shah Massoud se preparou em Peshawar para se opor ao novo governo comunista em Panjshir."
    PAL_assassinate_YA.t:0 "A Morte de Yasser Arafat?"
    PAL_assassinate_YA.d:0 "Yasser Arafat foi um líder político palestino. Foi presidente da Organização para a Libertação da Palestina (OLP) de 1969 a 2004, e presidente da Autoridade Nacional Palestina (ANP) de 1994 a 2004. Ideologicamente um nacionalista árabe e socialista, Arafat foi membro fundador do partido político Fatah, que liderou de 1959 até 2004. Yasser Arafat morreu inesperadamente em 11 de novembro de 2004, aos 75 anos, após um curto período de doença. A causa de sua morte tem sido debatida desde então, e várias teorias diferentes têm sido propostas. No entanto, investigações oficiais realizadas por equipes francesas e russas não encontraram evidências de crime."
    CNG_assassinate_LDK.t:0 "O Assassinato de Laurent Kabila?"
    CNG_assassinate_LDK.d:0 "Laurent-Désiré Kabila, presidente da República Democrática do Congo, foi assassinado em seu escritório dentro de sua residência oficial no Palais de Marbre, Kinshasa, em 16 de janeiro de 2001. O assassino que o matou foi seu guarda-costas de 18 anos, Rashidi Mizele, também previamente identificado como Rashidi Kasereka. Mizele foi posteriormente baleado até a morte. Uma semana depois, seu corpo foi devolvido ao Congo para um funeral de Estado, e seu filho, Joseph Kabila, tornou-se presidente dez dias depois."
    ARG_dirty_war_1974.t:0 "A Guerra Suja?"
    ARG_dirty_war_1974.d:0 "A Guerra Suja é o nome usado pela junta militar ou ditadura cívico-militar da Argentina para seu período de terrorismo de Estado na Argentina de 1974 a 1983, como parte da Operação Condor. Durante essa campanha, forças militares e de segurança, e esquadrões da morte na forma da Aliança Anticomunista Argentina (AAA, ou Triple A), caçaram quaisquer dissidentes políticos e qualquer pessoa que se acreditasse associada ao socialismo, ao peronismo de esquerda ou ao movimento Montoneros."
    JAP_assassinate_SA.t:0 "O Assassinato de Shinzo Abe?"
    JAP_assassinate_SA.d:0 "Em 8 de julho de 2022, Shinzo Abe, ex-primeiro-ministro do Japão e membro em exercício da Câmara dos Representantes japonesa, foi assassinado enquanto discursava em um evento político do lado de fora da Estação Yamato-Saidaiji, na cidade de Nara, Prefeitura de Nara. Abe estava proferindo um discurso de campanha para um candidato do Partido Liberal Democrático (LDP) quando foi baleado fatalmente por Tetsuya Yamagami, de 41 anos, com uma arma de fogo improvisada. Abe foi transportado por helicóptero médico ao Hospital Universitário Médico de Nara, em Kashihara, onde foi declarado morto."
    PHI_drug_war_2016.t:0 "A Guerra às Drogas?"
    PHI_drug_war_2016.d:0 "A Guerra às Drogas é a campanha antidrogas intensificada que começou durante a administração do Presidente Rodrigo Duterte, que ocupou o cargo de 30 de junho de 2016 a 30 de junho de 2022. A campanha reduziu a proliferação de drogas no país, mas foi marcada por execuções extrajudiciais supostamente perpetradas pela polícia e por agressores desconhecidos. Até 2022, o número de suspeitos de tráfico mortos desde 2016 foi oficialmente contabilizado pelo governo em 6.252; no entanto, estima-se que entre 12.000 e 30.000 civis tenham sido mortos em "operações antidrogas" realizadas pela Polícia Nacional das Filipinas e por vigilantes."
    MEX_drug_war_2006.t:0 "Operação Michoacán?"
    MEX_drug_war_2006.d:0 "A Operação Michoacán é uma operação conjunta da Polícia Federal e das forças armadas mexicanas para eliminar plantações de drogas e combater o narcotráfico. Iniciada em 11 de dezembro de 2006, a operação foi supervisionada pela Secretaria de Segurança Pública, pela Procuradoria-Geral do México, pela Secretaria do Interior, pela Marinha mexicana e pelo Exército mexicano. Em algumas ocasiões, a polícia estadual e municipal participou, apesar de não fazer parte dela. A operação conjunta se destacou como uma das operações contra o crime organizado, o narcotráfico, neste caso, que empregou o maior número de elementos militares e policiais, bem como a maioria das forças estaduais."
    USA_great_wall_2017.t:0 "O Muro de Trump?"
    USA_great_wall_2017.d:0 "O muro de Trump é uma expansão da barreira México-Estados Unidos que começou durante a primeira presidência de Donald Trump nos EUA, e foi uma parte crítica da plataforma de campanha presidencial de 2016 de Trump, no período que antecedeu a eleição daquele ano. Ao longo de sua campanha, Trump exigiu a construção de um muro fronteiriço para combater a imigração ilegal."
    LEB_civil_war_1975.t:0 "A Guerra Civil Libanesa?"
    LEB_civil_war_1975.d:0 "A Guerra Civil Libanesa foi um conflito civil resultante de tensões entre as populações cristã e muçulmana do Líbano. O conflito foi agravado por disparidades socioeconômicas e pela presença no Líbano, nos anos 1970, de combatentes da Organização para a Libertação da Palestina (OLP). Em 1975, os muçulmanos e esquerdistas libaneses apoiavam a OLP e buscavam mais poder político; seus cristãos, buscando manter sua dominância política, se opunham à OLP. As facções lutaram ferozmente até o início de 1976, e o Líbano ficou efetivamente dividido, com os cristãos no poder no norte e os muçulmanos no sul."
    SYR_civil_war_2011.t:0 "A Guerra Civil Síria?"
    SYR_civil_war_2011.d:0 "A guerra civil síria foi um conflito multilateral na Síria envolvendo vários atores estatais e não estatais. Em março de 2011, o descontentamento popular com o governo de Bashar al-Assad desencadeou protestos em larga escala e manifestações pró-democracia por toda a Síria, como parte dos protestos mais amplos da Primavera Árabe na região. Após meses de repressão pelo aparato de segurança do governo, vários grupos rebeldes armados, como o Exército Sírio Livre, começaram a se formar por todo o país, marcando o início da insurgência síria. Em meados de 2012, a insurgência havia escalado para uma guerra civil em grande escala."
    LBY_civil_war_2014.t:0 "A Guerra Civil Líbia?"
    LBY_civil_war_2014.d:0 "A guerra civil líbia (2014–2020), também conhecida como Segunda Guerra Civil Líbia, foi uma guerra civil multilateral travada na Líbia entre vários grupos armados, mas principalmente a Câmara dos Representantes (HoR) e o Governo de Acordo Nacional (GNA), por seis anos, de 2014 a 2020."
    TUR_pogrom_1955.t:0 "O Pogrom de Istambul?"
    TUR_pogrom_1955.d:0 "O pogrom de Istambul foi uma série de ataques de multidões patrocinados pelo Estado, direcionados principalmente à minoria grega de Istambul, em 6 e 7 de setembro de 1955. O pogrom foi orquestrado pelo Partido Democrata governante na Turquia, com a cooperação de várias organizações de segurança (Grupo de Mobilização Tática, Contra-Guerrilha e Serviço de Segurança Nacional). Os eventos foram desencadeados pelo atentado ao consulado turco em Salônica, Macedônia, Grécia — a casa onde Mustafa Kemal Atatürk nasceu em 1881. A bomba foi na verdade plantada por um zelador turco no consulado, que foi posteriormente preso e confessou."
    BUR_genocide_2016.t:0 "O Genocídio Rohingya?"
    BUR_genocide_2016.d:0 "O genocídio Rohingya foi uma série de perseguições e assassinatos em curso contra o povo muçulmano Rohingya pelos militares de Mianmar. O genocídio consistiu, até o momento, em duas fases: a primeira foi uma repressão militar ocorrida de outubro de 2016 a janeiro de 2017, e a segunda vem ocorrendo desde agosto de 2017. A crise forçou mais de um milhão de rohingyas a fugir para outros países. A maioria fugiu para Bangladesh, resultando na criação do maior campo de refugiados do mundo, enquanto outros escaparam para a Índia, Tailândia, Malásia e outras partes do Sul e Sudeste Asiático, onde continuam a enfrentar perseguição."
    NGE_pogrom_1966.t:0 "O Pogrom Anti-Igbo?"
    NGE_pogrom_1966.d:0 "Uma série de massacres foi cometida contra o povo Igbo e outros povos de origem no sul da Nigéria, que viviam no norte da Nigéria, a partir de maio de 1966, atingindo o pico após 29 de setembro de 1966. Estima-se que entre 8.000 e 30.000 igbos e orientais foram mortos. Outro milhão de igbos fugiu da Região Norte para o Leste. Em resposta aos assassinatos, alguns nortistas foram massacrados em Port Harcourt e outras cidades orientais."
    SER_genocide_1995.t:0 "O Massacre de Srebrenica?"
    SER_genocide_1995.d:0 "O massacre de Srebrenica foi o assassinato genocida, em julho de 1995, de mais de 8.000 homens e meninos muçulmanos bósnios, dentro e ao redor da cidade de Srebrenica, durante a Guerra da Bósnia. Foi perpetrado principalmente por unidades do Exército Sérvio-Bósnio da Republika Srpska, sob Ratko Mladić, embora a unidade paramilitar sérvia Escorpiões também tenha participado. O massacre foi o primeiro genocídio legalmente reconhecido na Europa desde o fim da Segunda Guerra Mundial."
    POR_academic_crisis_1962.t:0 "A Crise Acadêmica?"
    POR_academic_crisis_1962.d:0 "A Crise Acadêmica é o nome dado a uma política governamental portuguesa instigada em 1962 pelo Estado Novo, envolvendo o boicote e o fechamento de várias associações e organizações estudantis, incluindo o Secretariado Nacional dos Estudantes Portugueses. A maioria dos membros dessa organização eram militantes de oposição, entre eles muitos comunistas. Os estudantes responderam com manifestações que culminaram em 24 de março com uma enorme manifestação estudantil em Lisboa, vigorosamente reprimida pela polícia de choque, o que levou a centenas de estudantes feridos. Imediatamente após, os estudantes iniciaram uma greve. Esses eventos ficaram conhecidos como a Crise Acadêmica de 1962."
    POR_coup_1975.t:0 "A Tentativa de Golpe Comunista?"
    POR_coup_1975.d:0 "Portugal viveu um período turbulento, conhecido como Processo Revolucionário Em Curso (PREC). Esta etapa do PREC durou até o golpe de 25 de novembro de 1975, liderado por um grupo de oficiais de extrema esquerda, especificamente Otelo Saraiva de Carvalho. Disse-se que foi um complô comunista para tomar o poder, a fim de desacreditar o poderoso Partido Comunista. Foi seguido por um contragolpe bem-sucedido de oficiais mais centristas, e foi marcado por constante atrito entre as forças liberal-democráticas e os partidos políticos esquerdista-comunistas."
    SPA_coup_1981.t:0 "A Tentativa de Golpe Espanhol?"
    SPA_coup_1981.d:0 "Um golpe de Estado foi tentado na Espanha em fevereiro de 1981 por elementos da Guarda Civil e das forças armadas espanholas. O fracasso do golpe marcou a última tentativa séria de reverter a Espanha a um governo franquista, e serviu para consolidar o processo de democratização espanhol. O Rei Juan Carlos I desempenhou um papel importante ao frustrar o golpe, e a monarquia emergiu com legitimidade renovada como resultado."
    SPA_BSQ_devolution.t:0 "O Estatuto de Gernika?"
    SPA_BSQ_devolution.d:0 "O Estatuto de Autonomia do País Basco de 1979, amplamente conhecido como Estatuto de Gernika, é o documento legal que organiza o sistema político da Comunidade Autônoma do País Basco, que inclui os territórios históricos de Álava, Biscaia e Guipúscoa. Ele forma a região em uma das comunidades autônomas previstas na Constituição Espanhola de 1978. Estabeleceu um sistema de governo parlamentar, no qual o presidente (chefe de governo), ou lehendakari, é eleito pelo Parlamento Autônomo Basco entre seus membros. A eleição do Parlamento é por sufrágio universal, e o parlamento é composto por 75 deputados, 25 de cada um dos três Territórios Históricos da comunidade."
    TUR_coup_2016.t:0 "A Tentativa de Golpe Turco?"
    TUR_coup_2016.d:0 "Na noite de 15 de julho de 2016, uma facção das Forças Armadas turcas, organizada como o Conselho pela Paz em Casa, tentou um golpe de Estado contra as instituições estatais, incluindo o governo e o presidente Recep Tayyip Erdoğan. Tentaram tomar o controle de vários locais em Ancara, Istambul, Marmaris e outros lugares, como a entrada do lado asiático da Ponte do Bósforo, mas fracassaram após forças e civis leais ao Estado os derrotarem. O governo afirmou ter evidências de que os líderes do golpe estavam ligados ao movimento Gülen, designado organização terrorista pela República da Turquia e liderado por Fethullah Gülen, um empresário turco e conhecido erudito islâmico que vivia exilado na Pensilvânia."

    BOL_coup_1966.t:0 "A Insurgência Boliviana?"
    BOL_coup_1966.d:0 "A Guerrilha de Ñancahuazú, ou Ejército de Liberación Nacional de Bolivia (Exército de Libertação Nacional da Bolívia; ELN), era um grupo composto principalmente por guerrilheiros bolivianos e cubanos, liderado pelo guerrilheiro Che Guevara, que esteve ativo na Província de Cordillera, na Bolívia, de 1966 a 1967. O grupo estabeleceu seu acampamento base em uma fazenda do outro lado do Rio Ñancahuazú, um afluente sazonal do Rio Grande, 250 quilômetros a sudoeste da cidade de Santa Cruz de la Sierra. Os guerrilheiros pretendiam atuar como um foco, um ponto de resistência armada a ser usado como primeiro passo para derrubar o governo boliviano e criar um Estado socialista. Os guerrilheiros derrotaram várias patrulhas bolivianas antes de serem derrotados, e Guevara foi capturado e executado."
    BOL_assassinate_CG.t:0 "A Execução de Che Guevara?"
    BOL_assassinate_CG.d:0 "Ernesto "Che" Guevara foi um revolucionário marxista argentino, médico, escritor, guerrilheiro, diplomata e teórico militar. Guevara deixou Cuba em 1965 para fomentar revoluções continentais tanto na África quanto na América do Sul, primeiro sem sucesso no Congo-Kinshasa e depois na Bolívia, onde foi capturado por forças bolivianas auxiliadas pela CIA e sumariamente executado."
    USA_1992_LA_riots.t:0 "Os Motins de Los Angeles?"
    USA_1992_LA_riots.d:0 "Os motins de Los Angeles de 1992 foram uma série de motins e distúrbios civis ocorridos no Condado de Los Angeles, Califórnia, Estados Unidos, durante abril e maio de 1992. A agitação começou em South Central Los Angeles em 29 de abril, depois que um júri absolveu quatro policiais do Departamento de Polícia de Los Angeles (LAPD) acusados de uso excessivo de força na prisão e espancamento de Rodney King. O incidente havia sido filmado por George Holliday, uma testemunha, e foi amplamente divulgado em diversos veículos de notícias e mídia."
    IDO_1998_riots.t:0 "A Peristiwa?"
    IDO_1998_riots.d:0 "Os motins da Indonésia de maio de 1998, ou simplesmente o evento de 98 (Peristiwa 98), foram incidentes de violência em massa e agitação civil na Indonésia, muitos dos quais tinham como alvo a população étnica chinesa do país. Os eventos ocorreram principalmente nas cidades de Medan, Jacarta e Surakarta, com incidentes menores em outras partes da Indonésia. Sob o governo de Suharto, apoiado pelo Ocidente, havia uma discriminação generalizada e sistemática contra os chineses étnicos na Indonésia. Os motins foram desencadeados pela corrupção, problemas econômicos, incluindo escassez de alimentos e desemprego em massa."
    PAP_assassinate_PJP_1981.t:0 "A Primeira Tentativa de Assassinato do Papa João Paulo II?"
    PAP_assassinate_PJP_1981.d:0 "Em 13 de maio de 1981, na Praça de São Pedro, na Cidade do Vaticano, o Papa João Paulo II foi baleado e ferido por Mehmet Ali Ağca enquanto entrava na praça. O Papa foi atingido duas vezes e sofreu grave perda de sangue. Ağca foi imediatamente detido e posteriormente condenado à prisão perpétua por um tribunal italiano. O Papa perdoou Ağca pela tentativa de assassinato. Foi perdoado pelo presidente italiano Carlo Azeglio Ciampi a pedido do Papa, e foi deportado para a Turquia em junho de 2000."
    PAP_assassinate_PJP_1982.t:0 "A Segunda Tentativa de Assassinato do Papa João Paulo II?"
    PAP_assassinate_PJP_1982.d:0 "Uma segunda tentativa de assassinato ocorreu em 12 de maio de 1982, apenas um dia antes do aniversário da primeira tentativa contra sua vida, em Fátima, Portugal, quando um homem tentou esfaquear João Paulo II com uma baioneta. Foi detido por seguranças. Stanisław Dziwisz disse mais tarde que João Paulo II havia sido ferido durante a tentativa, mas conseguiu esconder um ferimento sem risco de vida."
    USA_Jonestown_Massacre.t:0 "O Massacre de Jonestown"
    USA_Jonestown_Massacre.d:0 "O Projeto Agrícola do Templo do Povo, mais conhecido por seu nome informal "Jonestown", era um assentamento remoto na Guiana, estabelecido pelo Templo do Povo, um movimento religioso americano sob a liderança de Jim Jones. Jonestown tornou-se internacionalmente infame quando, em 18 de novembro de 1978, um total de 918 pessoas morreram no assentamento; na pista de pouso próxima em Port Kaituma; e em um prédio administrado pelo Templo em Georgetown, capital da Guiana. Os termos usados para descrever as mortes em Jonestown e Georgetown evoluíram ao longo do tempo. Muitos relatos contemporâneos da mídia após os eventos chamaram as mortes de suicídio em massa."
    GUY_Rupununi_Uprising.t:0 "O Levante de Rupununi"
    GUY_Rupununi_Uprising.d:0 "O levante de Rupununi foi uma insurreição secessionista na Guiana que começou em 2 de janeiro de 1969, liderada por pecuaristas que buscavam controlar 22.300 milhas quadradas (58.000 km2) de terra. Ocorrendo menos de dois anos após a independência da Guiana do Reino Unido, constituiu o primeiro e mais severo teste de estatalidade e solidariedade social do país. Os rebeldes foram finalmente dispersos pelas Forças de Defesa da Guiana, com os líderes do grupo fugindo para a Venezuela."
    PRC_Lin_Biao_Incident.t:0 "O Incidente Lin Biao"
    PRC_Lin_Biao_Incident.d:0 "O incidente Lin Biao foi um acidente aéreo às 3 da manhã de 13 de setembro de 1971, envolvendo Lin Biao, Vice-Presidente do Partido Comunista Chinês. Todos a bordo do Hawker Siddeley Trident, incluindo Lin e vários membros de sua família, morreram quando a aeronave colidiu com o terreno mongol. Lin Biao supostamente tentava desertar para a União Soviética após uma tentativa fracassada de assassinar Mao Zedong."
    PRC_Anti_Corruption_Drive_2012.t:0 "A Campanha Anticorrupção"
    PRC_Anti_Corruption_Drive_2012.d:0 "Uma abrangente campanha anticorrupção começou na China após a conclusão do 18º Congresso Nacional do Partido Comunista Chinês (PCC) em 2012. A campanha, realizada sob a égide de Xi Jinping, Secretário-Geral do PCC, foi o maior esforço anticorrupção organizado na história do domínio do PCC na China."
    SAF_Sharpeville_Massacre_1960.t:0 "O Massacre de Sharpeville?"
    SAF_Sharpeville_Massacre_1960.d:0 "Em 1959, um grupo de membros desiludidos do ANC formou o Congresso Pan-Africanista da Azânia (PAC), que organizou uma manifestação contra os cadernos de identificação (pass books) em 21 de março de 1960. Um desses protestos foi realizado no bairro de Sharpeville, onde 69 pessoas foram mortas pela polícia no massacre de Sharpeville. Após Sharpeville, o governo declarou estado de emergência. Mais de 18.000 pessoas foram presas, incluindo líderes do ANC e do PAC, e ambas as organizações foram banidas. A resistência entrou na clandestinidade, com alguns líderes exilados no exterior e outros engajados em campanhas de sabotagem e terrorismo domésticos."
    SAF_Mahlabatini_Declaration_1974.t:0 "A Declaração de Fé de Mahlabatini"
    SAF_Mahlabatini_Declaration_1974.d:0 "A Declaração de Fé de Mahlabatini foi uma declaração de princípios fundamentais estabelecida pelos líderes políticos sul-africanos Mangosuthu Buthelezi e Harry Schwarz em 4 de janeiro de 1974. Foi assinada em Mahlabatini, KwaZulu-Natal, daí seu nome. Seu propósito era fornecer um roteiro para o governo da África do Sul por consenso e paz racial em uma sociedade multirracial, enfatizando oportunidades para todos, a consulta, o conceito federal e uma declaração de direitos. Também afirmou, pela primeira vez, que a mudança política deveria ocorrer por meios não violentos."
    VNZ_Pact_of_Puntofijo_1958.t:0 "O Pacto de Punto Fijo?"
    VNZ_Pact_of_Puntofijo_1958.d:0 "O Pacto de Punto Fijo foi um acordo formal firmado entre representantes dos três principais partidos políticos da Venezuela em 1958, Acción Democrática (AD), COPEI (Partido Social Cristão) e União Republicana Democrática (URD), para a aceitação das eleições presidenciais de 1958 e a preservação do novo sistema democrático. O pacto era uma garantia escrita de que os partidos signatários respeitariam os resultados eleitorais, evitariam a hegemonia de um único partido, compartilhariam o poder e colaborariam para prevenir a ditadura."
    VNZ_Caracazo_1989.t:0 "O Caracazo?"
    VNZ_Caracazo_1989.d:0 "O Caracazo é o nome dado à onda de protestos, motins e saques que começou em 27 de fevereiro de 1989 na cidade venezuelana de Guarenas, espalhando-se para Caracas e vilarejos vizinhos, após medidas de austeridade do Presidente Carlos Andrés Pérez. Confrontos que duraram uma semana resultaram em numerosas mortes, com estimativas variando de centenas a milhares, atribuídas majoritariamente ao envolvimento das forças de segurança e militares, segundo diversos relatos. Os motins e protestos começaram principalmente em resposta às reformas econômicas do governo e ao consequente aumento no preço da gasolina e do transporte."
    SPA_assassinate_LCB.t:0 "O Assassinato de Luis Carrero Blanco?"
    SPA_assassinate_LCB.d:0 "Em 20 de dezembro de 1973, Luis Carrero Blanco, Primeiro-Ministro da Espanha, foi assassinado quando um depósito de explosivos em um túnel, montado pelo grupo separatista basco ETA, foi detonado. O assassinato, também conhecido por seu nome de código Operación Ogro (Operação Ogro), é considerado o maior ataque contra o Estado franquista desde o fim da Guerra Civil Espanhola em 1939, e teve consequências de longo alcance na política da Espanha."
    SOV_doctors_plot_1951.t:0 "A Conspiração dos Médicos?"
    SOV_doctors_plot_1951.d:0 "A "conspiração dos médicos" foi uma campanha soviética patrocinada pelo Estado, anti-intelectual e antissemita (sob o disfarce de ser anticosmopolita), baseada em uma teoria da conspiração que alegava que uma cabala antissoviética de proeminentes especialistas médicos, muitos dos quais judeus étnicos, pretendia assassinar altos funcionários do governo e do Partido Comunista. Em 1951–1953, um grupo majoritariamente judeu de médicos de Moscou foi acusado de conspiração para assassinar líderes soviéticos. Foram acusados de servir aos interesses da judiaria internacional, bem como da inteligência ocidental (principalmente americana e britânica). Após isso, muitos médicos foram demitidos de seus empregos, presos e torturados para produzir confissões."
    THI_massacre_1976.t:0 "O Massacre da Universidade Thammasat?"
    THI_massacre_1976.d:0 "O massacre de 6 de outubro de 1976 foi uma repressão violenta pela polícia tailandesa e linchamento por paramilitares de direita e transeuntes contra manifestantes de esquerda que haviam ocupado a Universidade Thammasat de Bangkok e a adjacente Sanam Luang, em 6 de outubro de 1976. Entre 5h30 e 11h00 de 6 de outubro, a polícia usou armas de guerra, incluindo fuzis de assalto, lançadores de granadas, munição antiblindagem e granadas, para travar a repressão contra os manifestantes cercados, que brevemente tentaram se defender, mas foram rapidamente derrotados."
    THI_massacre_1992.t:0 "O Maio Negro?"
    THI_massacre_1992.d:0 "Maio Negro refere-se a uma crise política violenta na Tailândia que eclodiu em maio de 1992, quando protestos em massa irromperam em Bangkok contra a nomeação do General Suchinda Kraprayoon — que havia liderado um golpe anterior — como Primeiro-Ministro, apesar de não ter sido eleito. Liderados por Chamlong Srimuang, os manifestantes exigiam reformas democráticas, mas foram recebidos com brutais repressões militares, resultando em dezenas de mortos, centenas de feridos e ampla censura à mídia. A crise culminou em uma intervenção real televisionada pelo Rei Bhumibol Adulyadej, que pediu paz entre os lados opostos. Suchinda renunciou pouco depois, abrindo caminho para novas eleições e uma mudança rumo a uma governança mais democrática."
    ETH_massacre_1976.t:0 "O Qey Shibir?"
    ETH_massacre_1976.d:0 "O Terror Vermelho Etíope, também conhecido como Qey Shibir, foi uma violenta campanha de repressão política do Derg contra outros grupos marxistas-leninistas concorrentes na Etiópia e na atual Eritreia, de 1976 a 1978. O Qey Shibir foi uma tentativa de consolidar o domínio do Derg durante a instabilidade política após a derrubada do Imperador Haile Selassie em 1974 e a subsequente Guerra Civil Etíope. O Qey Shibir baseou-se no Terror Vermelho da Guerra Civil Russa, e ocorreu de forma mais visível após Mengistu Haile Mariam tornar-se presidente do Derg em 3 de fevereiro de 1977. Estima-se que entre 10.000 e 980.000 pessoas foram mortas ao longo do Qey Shibir."
    ROC_massacre_1948.t:0 "O Terror Branco?"
    ROC_massacre_1948.d:0 "O Terror Branco foi a repressão política de civis taiwaneses e dissidentes políticos sob o governo do Kuomintang (KMT). O período do Terror Branco é geralmente considerado como tendo começado quando a lei marcial foi declarada em Taiwan em 19 de maio de 1949, possibilitada pelas Disposições Temporárias contra a Rebelião Comunista de 1948, e terminado em 21 de setembro de 1992, com a revogação do Artigo 100 do Código Penal, que permitia a acusação de atividades "antiestado"."
    IDO_massacre_1965.t:0 "Assassinatos em Massa Anticomunistas na Indonésia?"
    IDO_massacre_1965.d:0 "Assassinatos em massa e agitação civil, tendo como alvo principal membros e supostos simpatizantes do Partido Comunista da Indonésia (PKI), foram realizados na Indonésia de 1965 a 1966. Outros grupos afetados incluíam supostos simpatizantes comunistas, mulheres da Gerwani, sindicalistas, javaneses étnicos Abangan, chineses étnicos, ateus, os chamados "descrentes" e supostos esquerdistas em geral. Segundo as estimativas mais amplamente publicadas, entre 500.000 e 1 milhão de pessoas foram mortas, com algumas estimativas chegando a 2 a 3 milhões. As atrocidades, por vezes descritas como um genocídio ou politicídio, foram instigadas pelo Exército indonésio sob Suharto."
    GBR_princess_of_wales_1981.t:0 "O Casamento de Diana e o Príncipe Charles?"
    GBR_princess_of_wales_1981.d:0 "Diana, Princesa de Gales (nascida Diana Frances Spencer), era membro da família real britânica. Foi a primeira esposa de Carlos III (então Príncipe de Gales) e mãe dos Príncipes William e Harry. Seu ativismo e glamour, que a tornaram um ícone internacional, garantiram-lhe uma popularidade duradoura. O casamento ocorreu na Catedral de São Paulo em julho de 1981, tornando-a Princesa de Gales, papel no qual foi recebida com entusiasmo pelo público. O casal teve dois filhos, William e Harry, que na época eram, respectivamente, segundo e terceiro na linha de sucessão ao trono britânico."
    USA_Tea_Party_Movement_2009.t:0 "O Movimento Tea Party?"
    USA_Tea_Party_Movement_2009.d:0 "O movimento Tea Party foi um movimento político americano fiscalmente conservador dentro do Partido Republicano que começou em 2007, catapultado ao mainstream pela campanha presidencial do Congressista Ron Paul. O movimento se expandiu em resposta às políticas do Presidente democrata Barack Obama, e foi um fator importante na eleição de onda de 2010, na qual os republicanos ganharam 63 cadeiras na Câmara e assumiram o controle da Câmara dos Representantes dos EUA."
    USA_MAGA_Movement_2016.t:0 "O Movimento MAGA?"
    USA_MAGA_Movement_2016.d:0 "Os movimentos políticos Make America Great Again (MAGA) e America First compreendem ideologias como o populismo de direita, o antiglobalismo de direita, o conservadorismo nacional e o neonacionalismo, e apresentam crenças significativamente iliberais, autoritárias e, por vezes, autocráticas. Ao longo do final dos anos 2010 e início dos anos 2020, os apoiadores do MAGA se tornaram a maior facção do Partido Republicano dos Estados Unidos."
    USA_assassinate_CJK.t:0 "O Assassinato de Charlie Kirk?"
    USA_assassinate_CJK.d:0 "Charles James Kirk foi um ativista político conservador, autor e personalidade da mídia americano. Cofundou a organização estudantil Turning Point USA (TPUSA) em 2012 e foi seu diretor executivo. Foi o diretor executivo do Turning Point Action e membro do Council for National Policy. Em seus últimos anos, foi uma das vozes mais proeminentes do movimento populista MAGA dentro do Partido Republicano. Em 10 de setembro de 2025, Kirk foi baleado e morto enquanto discursava em um evento de debate público da TPUSA no campus da Universidade Utah Valley. Sua morte ganhou atenção internacional e levou à condenação da violência política por proeminentes figuras domésticas e internacionais."
    USA_Nation_of_Islam_1952.t:0 "A Liberdade Condicional de Malcolm X?"
    USA_Nation_of_Islam_1952.d:0 "Malcolm X (nascido Malcolm Little, mais tarde el-Hajj Malik el-Shabazz) foi um revolucionário afro-americano, ministro muçulmano e ativista dos direitos humanos que foi uma figura proeminente durante o movimento pelos direitos civis até seu assassinato em 1965. Porta-voz da Nação do Islã (NOI) até 1964, após o que deixou o movimento, foi um defensor vocal do empoderamento negro e da promoção do Islã dentro da comunidade afro-americana. Uma figura controversa acusada de pregar a violência, Malcolm X também é uma figura celebrada dentro das comunidades afro-americana e muçulmana por sua busca pela justiça racial."
    USA_assassinate_MLX.t:0 "O Assassinato de Malcolm X?"
    USA_assassinate_MLX.d:0 "Malcolm X, um ministro muçulmano afro-americano e ativista dos direitos humanos que foi uma figura popular durante o movimento pelos direitos civis, foi baleado múltiplas vezes e morreu de seus ferimentos em Manhattan, cidade de Nova York, em 21 de fevereiro de 1965, aos 39 anos, enquanto se preparava para discursar à Organização da Unidade Afro-Americana no Audubon Ballroom, no bairro de Washington Heights. Três membros da Nação do Islã — Muhammad Abdul Aziz, Khalil Islam e Thomas Hagan — foram acusados, julgados e condenados pelo assassinato e receberam sentenças de prisão perpétua indeterminada, mas, em novembro de 2021, Aziz e Islam foram inocentados."
    JAP_protest_1960.t:0 "Os Protestos Anpo"
    JAP_protest_1960.d:0 "Os protestos Anpo foram uma série de manifestações massivas por todo o Japão de 1959 a 1960, e novamente em 1970, contra o Tratado de Segurança entre Estados Unidos e Japão, que permite aos Estados Unidos manter bases militares em solo japonês. Os protestos Anpo de 1960 acabaram por não conseguir impedir a entrada em vigor do Tratado de Segurança EUA-Japão revisado, mas forçaram a renúncia do Gabinete Kishi e o cancelamento da visita planejada de Eisenhower. Kishi foi sucedido como primeiro-ministro por Hayato Ikeda, que adotou uma postura muito mais conciliatória em relação à oposição política, arquivou indefinidamente os planos de Kishi de revisar a Constituição japonesa, e anunciou o Plano de Duplicação da Renda, para redirecionar as energias da nação, dos conflitos políticos controversos, rumo a um esforço nacional pelo rápido crescimento econômico."
    NEJ_Jamal_Khashoggi_2003.t:0 "O Caso Jamal Khashoggi?"
    NEJ_Jamal_Khashoggi_2003.d:0 "Em 2003, Jamal Khashoggi era um proeminente jornalista e editor saudita, conhecido por seus laços próximos com a família real, mas respeitado por sua voz independente. Serviu brevemente como editor-chefe do Al Watan, onde sua postura reformista levou à sua demissão após publicar críticas ao conservadorismo religioso."
    NEJ_Jamal_Khashoggi_2018.t:0 "O Assassinato de Jamal Khashoggi?"
    NEJ_Jamal_Khashoggi_2018.d:0 "Em 2 de outubro de 2018, o jornalista saudita Jamal Khashoggi foi assassinado dentro do consulado saudita em Istambul. Uma equipe de 15 membros emboscou-o e o matou, supostamente sob ordens para silenciar um proeminente crítico do príncipe herdeiro. Seu corpo foi desmembrado e nunca recuperado, provocando indignação global e repercussões diplomáticas."
    JAP_protest_1952.t:0 "O Dia do Trabalho Sangrento"
    JAP_protest_1952.d:0 "O Dia do Trabalho Sangrento refere-se a um conflito violento ocorrido entre manifestantes e policiais no Jardim Nacional Kokyo Gaien, em frente ao Palácio Imperial, em Tóquio, Japão, em 1º de maio de 1952. Quando uma grande multidão que protestava contra o Tratado de Segurança EUA-Japão se recusou a se dispersar, um violento confronto ocorreu entre manifestantes e policiais. Eventualmente, os policiais abriram fogo contra a multidão, matando 2 e ferindo 22 com tiros. Ao todo, cerca de 2.300 pessoas (1.500 manifestantes e 800 policiais) ficaram feridas nos confrontos."
    JAP_protest_1955.t:0 "A Luta de Sunagawa"
    JAP_protest_1955.d:0 "A Luta de Sunagawa foi um movimento de protesto no Japão, começando em 1955 e continuando até 1957, contra a expansão da Base Aérea de Tachikawa da Força Aérea dos EUA para a vizinha vila de Sunagawa. Ocorrendo no auge de um crescente movimento antibases, o "Sunagawa Sangrento" é lembrado como o mais intenso e violento dentre os muitos protestos contra as bases militares americanas no Japão."
    PRC_ethnic_unity_law_2026.t:0 "A Lei sobre a Promoção da Unidade e do Progresso Étnico?"
    PRC_ethnic_unity_law_2026.d:0 "A Lei sobre a Promoção da Unidade e do Progresso Étnico é uma legislação na China referente às minorias étnicas. A lei foi introduzida pelo Comitê de Assuntos Étnicos do Congresso Nacional do Povo e submetida ao CNP em 8 de setembro de 2025. Foi adotada pelo CNP em 12 de março de 2026 e assinada pelo Presidente Xi Jinping no mesmo dia. Entrou em vigor em 1º de julho de 2026. A lei codifica a política de Xi Jinping sobre assuntos étnicos e promove uma maior integração étnica sob a liderança do Partido Comunista Chinês. A lei foi criticada por acadêmicos e ativistas de direitos humanos fora da China, e sua promoção de aplicação extraterritorial foi comparada à repressão transnacional."

    GER_post_war_deportations.t:0 "A Expulsão Pós-Guerra dos Alemães?"
    GER_post_war_deportations.d:0 "A Segunda Guerra Mundial terminou na Europa com a derrota da Alemanha em maio de 1945. Os Aliados definiram os termos da ocupação, o truncamento territorial da Alemanha e a expulsão dos alemães étnicos da Polônia, Checoslováquia e Hungria do pós-guerra para as Zonas de Ocupação Aliadas, no Acordo de Potsdam. Após Potsdam, uma série de expulsões de alemães étnicos ocorreu por toda a Europa Oriental controlada pelos soviéticos. Propriedades e materiais no território afetado que pertenciam à Alemanha ou a alemães foram confiscados; foram transferidos para a União Soviética, nacionalizados, ou redistribuídos entre os cidadãos."
    GER_post_war_deportations.option.1:0 "Expulsar os alemães!"
    GER_post_war_deportations.option.2:0 "Deixá-los permanecer em nosso país."

    ISR_post_war_migration.t:0 "O Kibutz Galuyot?"
    ISR_post_war_migration.d:0 "Uma grande onda de imigração judaica, principalmente da Europa pós-Holocausto e do mundo árabe e muçulmano, ocorreu de 1948 a 1951. Em três anos e meio, a população judaica de Israel, que era de 650.000 na fundação do Estado, mais que dobrou com um influxo de cerca de 688.000 imigrantes. Em 1949, o maior número de imigrantes judeus já registrado em um único ano — 249.954 — chegou a Israel. Este período de imigração é frequentemente chamado de kibutz galuyot (literalmente, ajuntamento dos exilados), devido ao grande número de comunidades da diáspora judaica que fizeram aliá."
    historical_pop_transfer.option.1:0 "Deixá-los migrar."
    historical_pop_transfer.option.2:0 "Impedi-los de partir!"

    POL_post_war_deportations.t:0 "A Primeira Repatriação dos Poloneses?"
    POL_post_war_deportations.d:0 "As transferências populacionais polonesas de 1944–1946 da metade oriental da Polônia pré-guerra foram as migrações forçadas de poloneses em direção ao fim e após a Segunda Guerra Mundial. Foram resultado de uma política da União Soviética que havia sido ratificada pelos principais Aliados da Segunda Guerra Mundial. Segundo dados oficiais, durante a expulsão controlada pelo Estado entre 1945 e 1946, aproximadamente 1.167.000 poloneses deixaram as repúblicas mais ocidentais da União Soviética, menos de 50% dos que se registraram para a transferência populacional. Outra grande transferência étnica polonesa ocorreu após a morte de Stalin, em 1955–1959."
    POL_post_war_deportations.option.1:0 "Expulsar os poloneses!"
    POL_post_war_deportations.option.2:0 "Deixá-los permanecer em nosso país."

    POL_post_war_deportations_2.t:0 "A Segunda Repatriação dos Poloneses?"
    POL_post_war_deportations_2.d:0 "A segunda onda de repatriação forçada (ou deportação) de poloneses que viviam nos territórios anexados pela União Soviética (conhecidos como Kresy Wschodnie) ocorreu em 1955–1959. O termo amplamente usado "repatriação", promovido por décadas de propaganda comunista polonesa, é um eufemismo para atos de expatriação. É por vezes conhecida como a "segunda repatriação", para distingui-la da repatriação de 1944–1946."

