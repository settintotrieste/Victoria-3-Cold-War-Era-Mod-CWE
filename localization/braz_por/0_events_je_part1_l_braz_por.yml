    wartime_suspended_elections.t:0 "Eleições Programadas Suspensas"
    wartime_suspended_elections.d:0 "Diante do conflito em curso, o governo anunciou que todas as eleições programadas serão suspensas até novo aviso. Esta medida, considerada essencial para a segurança e unidade nacionais, permanecerá em vigor até que as hostilidades diminuam. As autoridades enfatizam que os processos democráticos não estão sendo abandonados, mas temporariamente adiados, para salvaguardar a estabilidade e a sobrevivência da nação."
    wartime_suspended_elections.f:0 "Este evento ocorreu porque [ROOT.GetCountry.GetName] está em [concept_war] e se encontra em uma [concept_revolution], ou possui algum de seus territórios ocupados."
    wartime_unsuspended_elections.t:0 "Eleições Programadas São Retomadas"
    wartime_unsuspended_elections.d:0 "Com a cessação das hostilidades, o governo suspendeu a suspensão das eleições. Os processos democráticos serão retomados conforme programado, reafirmando o compromisso da nação com a governança representativa."
    wartime_unsuspended_elections.f:0 "Este evento ocorreu porque [ROOT.GetCountry.GetName] não está mais em [concept_war]"
    wartime_suspended_elections.option:0 "Anotado."

    wartime_suspended_elections:0 "Eleições Suspensas pela Guerra"

