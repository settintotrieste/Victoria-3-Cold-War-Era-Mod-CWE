    je_space_race_space_rocket_button_desc:0 "Um veículo de lançamento é tipicamente um veículo movido a foguete, projetado para carregar uma carga útil (uma espaçonave tripulada ou satélites) da superfície terrestre ou da baixa atmosfera até o espaço sideral. A forma mais comum é o foguete multiestágio em formato de míssil balístico."
    je_space_race_satellite_button_desc:0 "Um satélite é um objeto intencionalmente colocado em órbita ao redor de um corpo celeste. Os satélites têm diversos usos, incluindo retransmissão de comunicações, previsão meteorológica, navegação (GPS), radiodifusão, pesquisa científica e observação da Terra. Usos militares adicionais incluem reconhecimento, alerta antecipado, inteligência de sinais e, potencialmente, lançamento de armas."
    je_space_race_astronaut_button_desc:0 "Um astronauta é uma pessoa treinada, equipada e enviada por um programa de voo espacial tripulado para servir como comandante ou membro da tripulação a bordo de uma espaçonave."
    je_space_race_space_probe_button_desc:0 "Uma sonda espacial é um dispositivo não pilotado, não tripulado, enviado para explorar o espaço e coletar informações científicas."
    je_space_race_moon_mission_button_desc:0 "Um pouso lunar é a chegada de uma espaçonave à superfície da Lua."
    je_space_race_space_station_button_desc:0 "Uma estação espacial é uma espaçonave capaz de sustentar uma tripulação humana em órbita por um período prolongado de tempo, sendo um tipo de habitat espacial."
    je_space_race_space_telescope_button_desc:0 "Um telescópio espacial ou observatório espacial é um telescópio no espaço sideral usado para observar objetos astronômicos."
    je_space_race_mars_mission_button_desc:0 "Um pouso em Marte é a chegada de uma espaçonave à superfície de Marte."
    je_space_race_moon_base_button_desc:0 "Uma base lunar é uma instalação sobre ou abaixo da superfície da Lua, que possibilita atividade humana na Lua."
    je_space_race_mars_base_button_desc:0 "Uma base em Marte é uma instalação sobre ou abaixo da superfície de Marte, que possibilita atividade humana em Marte."

    je_space_race_fake_moon_mission_button:0 "Forjar um Pouso Lunar"
    je_space_race_fake_moon_mission_button_desc:0 "Pagaremos nossos melhores estúdios de cinema para produzir um filme de aparência realista de um pouso [ROOT.GetCountry.GetAdjectiveNoFlag] na Lua, na esperança de enganar o mundo, fazendo-o acreditar que [ROOT.GetCountry.GetNameNoFlag] realmente pousou na Lua."
    moon_mission_faked.t:0 "Pouso Lunar Forjado é Exposto"
    moon_mission_faked.d:0 "A tentativa de [ROOT.GetCountry.GetNameNoFlag] de enganar o mundo com um vídeo produzido de forma tosca de uma pessoa [ROOT.GetCountry.GetAdjectiveNoFlag] pousando na Lua não convenceu ninguém, e, em vez disso, atraiu amplo ridículo ao país."
    moon_mission_faked_success.t:0 "Pouso Lunar Forjado com Sucesso"
    moon_mission_faked_success.d:0 "Um vídeo forjado de um(a) astronauta [ROOT.GetCountry.GetAdjectiveNoFlag] pousando na Lua conseguiu enganar o mundo, fazendo-o acreditar que [ROOT.GetCountry.GetNameNoFlag] realmente pousou na Lua."

    je_space_race_fake_mars_mission_button:0 "Forjar um Pouso em Marte"
    je_space_race_fake_mars_mission_button_desc:0 "Pagaremos nossos melhores estúdios de cinema para produzir um filme de aparência realista de um pouso [ROOT.GetCountry.GetAdjectiveNoFlag] em Marte, na esperança de enganar o mundo, fazendo-o acreditar que [ROOT.GetCountry.GetNameNoFlag] realmente pousou em Marte."
    mars_mission_faked.t:0 "Pouso em Marte Forjado é Exposto"
    mars_mission_faked.d:0 "A tentativa de [ROOT.GetCountry.GetNameNoFlag] de enganar o mundo com um vídeo produzido de forma tosca de uma pessoa [ROOT.GetCountry.GetAdjectiveNoFlag] pousando em Marte não convenceu ninguém, e, em vez disso, atraiu amplo ridículo ao país."
