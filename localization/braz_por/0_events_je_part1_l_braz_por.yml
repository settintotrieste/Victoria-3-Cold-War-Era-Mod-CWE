    USA_historical_election_system.t:0 "Eleição Presidencial dos EUA"
    USA_historical_election_system.d:0 "A eleição do presidente e do vice-presidente dos Estados Unidos é uma eleição indireta, na qual os cidadãos dos Estados Unidos registrados para votar em um dos cinquenta estados americanos ou em Washington, D.C., votam não diretamente para esses cargos, mas sim para membros do Colégio Eleitoral. Esses eleitores então emitem votos diretos, conhecidos como votos eleitorais, para presidente e para vice-presidente. O candidato que recebe maioria absoluta dos votos eleitorais (ao menos 270 de 538, desde que a Vigésima Terceira Emenda concedeu direito de voto aos cidadãos de D.C.) é então eleito para o cargo."
    historical_election_system.f:0 "Este é um evento histórico. Escolher a opção não histórica manterá o(a) atual [concept_ruler] como Presidente."

    GBR_historical_election_system.t:0 "Eleição Geral do Reino Unido"
    GBR_historical_election_system.d:0 "O primeiro-ministro de [ROOT.GetCountry.GetName] é o principal ministro do Governo, e o chefe do Gabinete britânico. Não há uma data específica para o primeiro surgimento do cargo de primeiro-ministro, já que a função não foi criada, mas sim evoluiu ao longo do tempo por meio da fusão de deveres."

    FRA_historical_election_system.t:0 "Eleição Presidencial Francesa"
    FRA_historical_election_system.d:0 "O presidente da França é o chefe de Estado executivo da França, e o comandante-em-chefe das Forças Armadas francesas. Como a presidência é a magistratura suprema do país, o cargo é o mais alto da França."

    GER_historical_election_system.t:0 "Eleição Geral Alemã"
    GER_historical_election_system.d:0 "O chanceler da Alemanha é o líder político da Alemanha e o chefe de governo. O titular do cargo é responsável por selecionar todos os outros membros do governo e presidir as reuniões do gabinete."

    HND_historical_election_system.t:0 "Eleição Geral Indiana"
    HND_historical_election_system.d:0 "O primeiro-ministro da Índia é o principal executivo do Governo da Índia. Embora o presidente da Índia seja o chefe de Estado constitucional, nominal e cerimonial, na prática e usualmente a autoridade executiva é investida no primeiro-ministro e em seu Conselho de Ministros escolhido. O primeiro-ministro é o líder eleito pelo partido com maioria na câmara baixa do parlamento indiano, o Lok Sabha, que é o principal órgão legislativo da República da Índia."

    BRZ_historical_election_system.t:0 "Eleição Presidencial Brasileira"
    BRZ_historical_election_system.d:0 "O sistema presidencialista foi estabelecido em 1889, com a proclamação da república em um golpe de Estado militar contra o Imperador Pedro II. Desde então, o Brasil teve seis constituições, três ditaduras e três períodos democráticos. Durante os períodos democráticos, o voto sempre foi obrigatório."

    IDO_historical_election_system.t:0 "Eleição Presidencial Indonésia"
    IDO_historical_election_system.d:0 "O presidente da República da Indonésia é o chefe de Estado e chefe de governo da República da Indonésia. O presidente lidera o poder executivo do governo indonésio e é o comandante-em-chefe das Forças Armadas Nacionais da Indonésia. Desde 2004, o presidente e o vice-presidente são eleitos diretamente para um mandato de cinco anos, renovável uma vez, permitindo um máximo de 10 anos no cargo."

    SKO_historical_election_system.t:0 "Eleição Presidencial Sul-Coreana"
    SKO_historical_election_system.d:0 "O Presidente da República da Coreia é o chefe de Estado e chefe de governo da República da Coreia. O presidente lidera o Conselho de Estado, e é o chefe do poder executivo do governo nacional, bem como o comandante-em-chefe das Forças Armadas da República da Coreia."

    MSY_historical_election_system.t:0 "Eleição Geral Malaia"
    MSY_historical_election_system.d:0 "O primeiro-ministro da Malásia é o chefe de governo da Malásia. O primeiro-ministro dirige o poder executivo do governo federal. O Yang di-Pertuan Agong nomeia o primeiro-ministro dentre os membros do Parlamento (MP) que, em sua opinião, tem maior probabilidade de obter a confiança da maioria dos MPs. O Primeiro-Ministro costuma ser o líder do partido que conquista mais assentos em uma eleição geral. "

    RUS_historical_election_system.t:0 "Eleição Presidencial Russa"
    RUS_historical_election_system.d:0 "O presidente da Federação Russa é o chefe de Estado executivo da Rússia. O presidente é o presidente do Conselho de Estado Federal e o comandante-em-chefe supremo das Forças Armadas russas. É o mais alto cargo na Rússia."

    SOV_historical_election_system.t:0 "Eleição Presidencial Soviética"
    SOV_historical_election_system.d:0 "A eleição presidencial soviética de 1990 foi realizada na União Soviética em 14 de março de 1990, para eleger um presidente para um mandato de cinco anos. Esta foi a primeira e única eleição presidencial realizada na União Soviética, devido ao cargo de presidente ter sido criado em 1990, um ano antes da dissolução da União Soviética em 1991. As eleições não foram disputadas, com Mikhail Gorbachov, então Secretário-Geral do Partido Comunista da União Soviética, como único candidato."

    ROC_historical_election_system.t:0 "Eleição Presidencial [ROOT.GetCountry.GetAdjectiveNoFormatting]"
    ROC_historical_election_system.d:0 "O presidente da República da China, também referido como presidente de Taiwan, é o chefe de Estado da República da China (Taiwan), bem como o comandante-em-chefe das Forças Armadas da República da China. O cargo já teve autoridade para governar a China Continental antes de 1949, mas suas jurisdições remanescentes foram limitadas a Taiwan, Penghu, Kinmen, Matsu e outras ilhas menores desde o fim da Guerra Civil Chinesa."

    historical_election_system.f:0 "Este é um evento histórico, e seu propósito é definir o(a) atual [concept_ruler] como o(a) [concept_ruler] histórico(a). Escolher a opção não histórica selecionará o(a) [concept_ruler] com base na configuração aplicável de #y Transferência de Poder#! para o(a) atual [concept_government_type]."

    historical_election_system.option.1:0 "Seguir a história!"
    historical_election_system.option.2:0 "Usar as regras normais para selecionar o(a) [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]."

    je_olympic_games:0 "As Olimpíadas de [SCOPE.sState('olympic_games_summit_location').GetCityHubName] [GetPlayer.MakeScope.Var('olympic_games_year_display').GetValue]"
    je_olympic_games_reason:0 "Os Jogos Olímpicos de Verão, também conhecidos como Jogos da Olimpíada, e frequentemente chamados de Olimpíadas de Verão, são um grande evento multiesportivo internacional, normalmente realizado uma vez a cada quatro anos, em anos bissextos. \n\nConstrua Infraestrutura Olímpica para evitar Jogos Olímpicos ruins. \n\nOs Jogos Olímpicos de [GetPlayer.MakeScope.Var('olympic_games_year_display').GetValue] serão realizados em [SCOPE.sState('olympic_games_summit_location').GetCityHubName], [SCOPE.sState('olympic_games_summit_location').GetName] ([ROOT.GetCountry.GetName])."
    je_olympic_games_status:0 "Data Alvo: Verão de [GetPlayer.MakeScope.Var('olympic_games_year_display').GetValue]"

    offered_olympics.t:0 "Sediar os Jogos Olímpicos de [GetPlayer.MakeScope.Var('olympic_games_year_display').GetValue]?"
    offered_olympics.d:0 "O Comitê Olímpico Internacional ofereceu a [ROOT.GetCountry.GetName] a oportunidade de sediar os Jogos Olímpicos de [GetPlayer.MakeScope.Var('olympic_games_year_display').GetValue]. Se aceito, [ROOT.GetCountry.GetName] terá 4 anos para construir a infraestrutura necessária para os jogos."
    offered_olympics.f:0 "[ROOT.GetCountry.GetName] foi selecionado por não estar em guerra, não ser um pária internacional e ser suficientemente independente."
    olympic_games_system.option.1:0 "Aceitar"
    olympic_games_system.option.2:0 "Rejeitar"
    participation_olympics.t:0 "As Olimpíadas de [SCOPE.sState('olympic_games_summit_location').GetCityHubName] [GetPlayer.MakeScope.Var('olympic_games_year_display_event').GetValue]"
    participation_olympics.d:0 "Os Jogos Olímpicos de [GetPlayer.MakeScope.Var('olympic_games_year_display_event').GetValue], realizados em [SCOPE.sCountry('recently_hosted_olympics').GetName], atraíram milhares de atletas de todo o mundo para participar de uma variedade de competições. Isso foi coroado por uma enorme cerimônia em [SCOPE.sState('olympic_games_summit_location').GetCityHubName], sede dos jogos."
    participation_olympics.option.1:0 "Participar de forma justa!"
    participation_olympics.option.2:0 "Fazer nossos atletas se doparem!"
    participation_olympics.option.3:0 "Boicotar os Jogos!"
    banned_olympics.t:0 "Equipe Olímpica Flagrada em Doping"
    banned_olympics.d:0 "A Equipe Olímpica [ROOT.GetCountry.GetAdjective] foi flagrada usando substâncias proibidas de aprimoramento de desempenho nos recentes Jogos Olímpicos realizados em [SCOPE.sCountry('recently_hosted_olympics').GetName]. Como resultado, o Comitê Olímpico Internacional baniu [ROOT.GetCountry.GetName] de participar dos próximos Jogos Olímpicos."
    banned_olympics.option:0 "Um escândalo!"
    bad_olympics.t:0 "Jogos Olímpicos [SCOPE.sCountry('recently_hosted_olympics').GetAdjectiveNoFlag] Criticados"
    bad_olympics.d:0 "Devido a cortes orçamentários e a uma falha grave de planejamento, nem toda a Infraestrutura Olímpica necessária foi concluída a tempo dos jogos. Como resultado, os atletas foram forçados a competir em condições inadequadas. Isso provocou ampla condenação dos Jogos Olímpicos de [SCOPE.sState('olympic_games_summit_location').GetCityHubName], considerados mal administrados e um desastre completo."
    bad_olympics.f:0 "Este evento ocorreu porque [ROOT.GetCountry.GetName] não conseguiu 100% de conclusão no(a) [concept_journal_entry] dos Jogos Olímpicos."
    bad_olympics.option:0 "Assim é a vida."

