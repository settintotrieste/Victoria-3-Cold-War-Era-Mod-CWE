    commonwealth_member:0 "Membro da Comunidade das Nações"
    commonwealth_leader:0 "Líder da Comunidade das Nações"
    form_commonwealth_decision:0 "Formar a Comunidade das Nações"
    form_commonwealth_decision_desc:0 "A Comunidade das Nações é uma associação política entre países que outrora fizeram parte das colônias britânicas, mas que eram considerados 'livres e iguais'. Os estados-membros não têm obrigações legais uns para com os outros, mas estão conectados pelo uso da língua inglesa e por laços históricos. A cidadania de uma nação da Comunidade confere benefícios em alguns países-membros, particularmente no Reino Unido. A Carta da Comunidade define seus valores compartilhados de democracia, direitos humanos e Estado de Direito, promovidos pelos Jogos da Comunidade, realizados a cada quatro anos."
