    restore_correct_capital_system.t:0 "Nova Capital de [ROOT.GetCountry.GetName]?"
    restore_correct_capital_system.d:0 "A atual capital de [ROOT.GetCountry.GetName], [SCOPE.sState('wrong_capital').GetName], não é vista pelos historiadores e por nosso povo como a capital correta de nosso país. Uma moção foi, portanto, apresentada no parlamento para designar o estado correto como nossa capital."
