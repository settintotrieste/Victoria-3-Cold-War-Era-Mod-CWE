    dutch_New_Guinea.sgc.t:0 "Autogoverno na Nova Guiné Holandesa?"
    dutch_New_Guinea.sgc.d:0 "Em 1949, quando o restante das Índias Orientais Holandesas se tornou totalmente independente como Indonésia, os holandeses mantiveram a soberania sobre a Nova Guiné ocidental e tomaram medidas para prepará-la para a independência como país separado. Os holandeses enfatizaram habilidades políticas, empresariais e cívicas. Em 8 de fevereiro de 1950, Stephan Lucien Joseph van Waardenburg foi nomeado o primeiro Governador (De Gouverneur) da Nova Guiné Holandesa."

