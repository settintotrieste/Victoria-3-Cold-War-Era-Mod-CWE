    montreal_protocol_climate.t:0 "O Protocolo de Montreal"
    montreal_protocol_climate.d:0 "Embora não fosse destinado a combater a mudança climática, o Protocolo de Montreal foi um acordo ambiental histórico que se tornou um modelo para a diplomacia futura sobre o tema. Todos os países do mundo acabaram por ratificar o tratado, que exigia que parassem de produzir substâncias que danificam a camada de ozônio, como os clorofluorcarbonos (CFCs). O protocolo conseguiu eliminar quase 99% dessas substâncias destruidoras do ozônio. Em 2016, as partes concordaram, por meio da Emenda de Kigali, em também reduzir sua produção de hidrofluorcarbonos (HFCs), potentes gases de efeito estufa que contribuem para a mudança climática."
    earth_summit_climate.t:0 "A Cúpula da Terra"
    earth_summit_climate.d:0 "Ratificado por 197 países, incluindo os Estados Unidos, o acordo histórico foi o primeiro tratado global a abordar explicitamente a mudança climática. Estabeleceu um fórum anual, conhecido como Conferência das Partes, ou COP, para discussões internacionais destinadas a estabilizar a concentração de gases de efeito estufa na atmosfera. Essas reuniões produziram o Protocolo de Kyoto e o Acordo de Paris."
    kyoto_protocol_climate.t:0 "O Protocolo de Kyoto"
    kyoto_protocol_climate.d:0 "O Protocolo de Kyoto, adotado em 1997 e em vigor desde 2005, foi o primeiro tratado climático juridicamente vinculativo. Exigia que os países desenvolvidos reduzissem as emissões em uma média de 5% abaixo dos níveis de 1990, e estabeleceu um sistema para monitorar o progresso dos países. Mas o tratado não obrigava os países em desenvolvimento, incluindo os grandes emissores de carbono China e Índia, a tomar medidas. Os Estados Unidos assinaram o acordo em 1998, mas nunca o ratificaram, e mais tarde retiraram sua assinatura."
    paris_climate_accords_climate.t:0 "O Acordo de Paris sobre o Clima"
    paris_climate_accords_climate.d:0 "O acordo climático global mais significativo até hoje, o Acordo de Paris exige que todos os países estabeleçam compromissos de redução de emissões. Os governos definem metas, conhecidas como contribuições nacionalmente determinadas (NDCs), com os objetivos de impedir que a temperatura média global suba 2°C (3,6°F) acima dos níveis pré-industriais e de buscar esforços para mantê-la abaixo de 1,5°C (2,7°F). Também visa alcançar emissões líquidas zero globais, onde a quantidade de gases de efeito estufa emitidos seja igual à quantidade removida da atmosfera, na segunda metade do século."

