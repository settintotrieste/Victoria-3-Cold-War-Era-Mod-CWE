    je_kmt_becomes_taiwan_button:0 "Tornar-se Taiwan"
    je_kmt_becomes_taiwan_button_desc:0 "[ROOT.GetCountry.GetName] pode encerrar a Política de Uma Só China, renomeando-se como Taiwan e renunciando a todas as reivindicações sobre a China Continental."
