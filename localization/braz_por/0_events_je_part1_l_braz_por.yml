    request_imf_loan_decision:0 "Buscar um Empréstimo do Fundo Monetário Internacional"
    request_imf_loan_decision_desc:0 "O FMI foi criado em 1944, nas consequências da Grande Depressão da década de 1930, com o propósito de construir um arcabouço para a cooperação econômica internacional. O FMI concede empréstimos — incluindo empréstimos emergenciais — a países-membros que enfrentam problemas reais ou potenciais em seu balanço de pagamentos. O objetivo é ajudá-los a reconstruir suas reservas internacionais, estabilizar suas moedas, continuar pagando por importações e restaurar as condições para um forte crescimento econômico, ao mesmo tempo em que corrigem problemas subjacentes."
    IMF_loan_request.t:0 "Participar do empréstimo do FMI a [SCOPE.sCountry('imf_loan_debtor').GetName]?"
    IMF_loan_request.d:0 "[SCOPE.sCountry('imf_loan_debtor').GetName] atualmente enfrenta sérias dificuldades para honrar seu balanço de pagamentos. Como resultado, seus diplomatas procuraram o Fundo Monetário Internacional da ONU para solicitar um empréstimo que o ajude a quitar suas dívidas atualmente pendentes. Como os recursos do FMI vêm principalmente do dinheiro que os países pagam como subscrição de capital (cotas) ao se tornarem membros, [SCOPE.sCountry('imf_loan_creditor').GetName] foram convocados a fornecer financiamento a [SCOPE.sCountry('imf_loan_debtor').GetName]."
    IMF_loan_request.f:0 "Optar por fornecer um empréstimo a [SCOPE.sCountry('imf_loan_debtor').GetName] fará com que [ROOT.GetCountry.GetName] assuma 5% da(o) [Concept('concept_credit','$concept_credit_debt$')] de [SCOPE.sCountry('imf_loan_debtor').GetName] em troca de uma(um) [concept_obligation], ou passe a [Concept('concept_bankroll','$concept_bankrolling$')] [SCOPE.sCountry('imf_loan_debtor').GetName]."
    imf_loan_option.1:0 "Concederemos a eles um empréstimo."
    imf_loan_option.2:0 "Nós mesmos enfrentamos dificuldades financeiras..."
    imf_loan_option.3:0 "Não me incomode mais com este evento!"

    IMF_loan_terms.t:0 "Reformas Econômicas do FMI"
    IMF_loan_terms.d:0 "Uma condição do acordo de empréstimo entre o FMI e [SCOPE.sCountry('imf_loan_debtor').GetName] é que o devedor realize uma reforma completa de seu sistema econômico para promover mercados livres e conter os gastos governamentais. O Governo de [SCOPE.sCountry('imf_loan_debtor').GetName] está, portanto, obrigado a promulgar leis para abrir seus mercados ao mundo, privatizar suas empresas estatais e conter a emissão de moeda."
    IMF_loan_terms.f:0 "Este evento ocorreu porque não atendemos aos requisitos do FMI para um mercado livre e competitivo no momento em que o acordo de dívida foi assinado, ou em qualquer momento durante a vigência do acordo."
    imf_loan_terms:0 "Não temos escolha a não ser aceitar o ditame do FMI."

    imf_loan_debtor:0 "Devedor(a) do Empréstimo do FMI"
    imf_loan_creditor:0 "Credor(a) do Empréstimo do FMI"

    request_imf_loan.tt:0 "Solicitar que os Credores do FMI assumam #white 5%#! da(o) [Concept('concept_credit','$concept_credit_debt$')] de [ROOT.GetCountry.GetName], ou façam [concept_bankroll] de [ROOT.GetCountry.GetName]"

    notification_imf_loan_take_debt_notification_name:0 "Resgate Financeiro [SCOPE.sCountry('imf_loan_creditor').GetAdjective] de [SCOPE.sCountry('imf_loan_debtor').GetName]"
    notification_imf_loan_take_debt_notification_desc:0 "[SCOPE.sCountry('imf_loan_creditor').GetName] concordou em participar do empréstimo do Fundo Monetário Internacional a [SCOPE.sCountry('imf_loan_debtor').GetName], oferecendo-se para assumir 5% da(o) [Concept('concept_credit','$concept_credit_debt$')] [SCOPE.sCountry('imf_loan_debtor').GetAdjective]."

