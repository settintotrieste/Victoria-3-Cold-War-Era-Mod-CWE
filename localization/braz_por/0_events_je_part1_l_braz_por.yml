    overlord_veto_overlord.t:0 "[SCOPE.sCountry('subject_country').GetNameNoFormatting] Promulgando Leis Desfavoráveis"
    overlord_veto_overlord.d:0 "O(A) [concept_government] de [SCOPE.sCountry('subject_country').GetName] está em processo de promulgar [SCOPE.sLaw('current_law_scope').GetName], um(a) [concept_law] à qual o(a) [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [GetPlayer.GetRuler.GetFullName] se opõe. Como [concept_overlord] de [SCOPE.sCountry('subject_country').GetName], temos alguma influência sobre se o(a) [concept_law] deve ser promulgada(o)."
    overlord_veto_overlord.f:0 "Este evento ocorreu porque o(a) [concept_ruler] do(a) [concept_overlord] desaprova ou desaprova fortemente um(a) [concept_law] que seu(sua) [concept_subject] está promulgando. Dependendo do nível de controle que o(a) [concept_overlord] tem sobre o(a) [concept_subject], a desaprovação do(a) [concept_overlord] aplicará um(a) [concept_enactment_setback] ou forçará o cancelamento da promulgação do(a) [concept_law]."

