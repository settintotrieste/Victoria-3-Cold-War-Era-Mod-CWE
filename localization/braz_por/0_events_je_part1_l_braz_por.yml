    french_community.sgc.t:0 "A Comunidade Francesa"
    french_community.sgc.d:0 "A Comunidade Francesa foi a organização constitucional estabelecida em outubro de 1958 entre a França e suas colônias africanas remanescentes, então em processo de descolonização. Substituiu a União Francesa, que havia reorganizado o império colonial em 1946. Embora a Comunidade tenha permanecido formalmente em existência até 1995, quando o Parlamento francês a aboliu oficialmente, ela efetivamente deixou de existir e funcionar no final de 1960, momento em que todos os membros africanos já haviam declarado sua independência e a deixado."
