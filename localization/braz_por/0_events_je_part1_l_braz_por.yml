    close_suez_canal_decision_desc:0 "Como proprietários do Canal de Suez, podemos optar por fechar o canal a todo o tráfego marítimo a qualquer momento. Fazer isso, porém, não agradaria a comunidade internacional. Note que o edifício do Canal de Suez seria removido durante o período de fechamento do canal."
