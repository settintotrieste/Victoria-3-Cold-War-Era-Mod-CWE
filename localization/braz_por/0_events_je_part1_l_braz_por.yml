    british_rhodesia_nyasaland.sgc.t:0 "Federação da Rodésia e Niassalândia?"
    british_rhodesia_nyasaland.sgc.d:0 "A Federação da Rodésia e Niassalândia, também conhecida como Federação da África Central (CAF), foi uma federação colonial composta por três territórios do sul da África: a colônia britânica autônoma da Rodésia do Sul e os protetorados britânicos da Rodésia do Norte e da Niassalândia."
    british_malaysia.sgc.t:0 "Formação da Malásia?"
    british_malaysia.sgc.d:0 "A Federação da Malásia foi formada após a fusão da Federação da Malaia, Singapura, Bornéu do Norte (Sabá) e Sarawak, em 16 de setembro de 1963."
    british_decolonisation.20.option.1:0 "Ceder as colônias à Malaia"
    british_decolonisation.20.option.2:0 "As colônias permanecerão britânicas!"
    british_west_indies.sgc.t:0 "Formar a Federação das Índias Ocidentais?"
    british_west_indies.sgc.d:0 "A Federação das Índias Ocidentais foi uma união política de curta duração que existiu de 3 de janeiro de 1958 a 31 de maio de 1962. Várias ilhas do Caribe que faziam parte do Império Britânico, incluindo Trindade e Tobago, Barbados, Jamaica e as das Ilhas de Barlavento e Sotavento, uniram-se para formar a Federação, com capital em Porto de Espanha, Trindade e Tobago. A intenção expressa da Federação era criar uma unidade política que se tornaria independente da Grã-Bretanha como um único Estado."
    british_singapore.sgc.t:0 "Autogoverno em Singapura?"
    british_singapore.sgc.d:0 "$generic_self_rule_decolonisation_loc_desc$"
    british_singapore_state.sgc.t:0 "Mais Autonomia para Singapura?"
    british_singapore_state.sgc.d:0 "Como parte da descolonização e do crescente desengajamento britânico da Malaia, as negociações constitucionais sobre o autogoverno de Singapura entre o Escritório Colonial Britânico em Londres e a Assembleia Legislativa de Singapura já haviam resultado na Constituição do Estado de Singapura de 1958, e em uma Assembleia Legislativa de 51 cadeiras totalmente eleita e autônoma em 1959, com a extinção do cargo de Governador."
    british_bermuda.sgc.t:0 "Autogoverno nas Bermudas?"
    british_bermuda.sgc.d:0 "$generic_self_rule_decolonisation_loc_desc$"
