    je_start_private_building_pruning_button_desc:0 "Investidores privados serão autorizados pelo(a) [concept_government] a excluir autonomamente [Concept('concept_building','$concept_buildings$')] redundantes que sejam mais de #y 50%#! de propriedade do #y Setor Privado#!."
    je_stop_private_building_pruning_button:0 "Desativar Poda de Edifícios Privados"
    je_stop_private_building_pruning_button_desc:0 "Investidores privados serão proibidos pelo(a) [concept_government] de excluir autonomamente [Concept('concept_building','$concept_buildings$')] redundantes que sejam mais de #y 50%#! de propriedade do #y Setor Privado#!."

    je_start_government_building_pruning_button:0 "Ativar Poda de Edifícios Governamentais"
    je_start_government_building_pruning_button_desc:0 "O(A) [concept_government] excluirá autonomamente [Concept('concept_building','$concept_buildings$')] redundantes que não sejam mais de #y 50%#! de propriedade do #y Setor Privado#!."
    je_stop_government_building_pruning_button:0 "Desativar Poda de Edifícios Governamentais"
    je_stop_government_building_pruning_button_desc:0 "Investidores privados não serão autorizados a excluir [Concept('concept_building','$concept_buildings$')] redundantes que não sejam mais de #y 50%#! de propriedade do #y Setor Privado#!."

    enact_cult_of_personality_decision:0 "Criar $amendment_cult_of_personality$"
    enact_cult_of_personality_decision_desc:0 "O(A) [concept_government] criará um culto à personalidade em torno do(a) [concept_ruler], no qual o(a) [concept_ruler] usará a mídia de massa, propaganda ou outros métodos para criar uma imagem idealizada, heroica e, às vezes, quase venerada, frequentemente por meio de bajulação e elogios incondicionais."

    enact_corporate_state_decision:0 "Criar $law_corporate_state$"
    enact_corporate_state_decision_desc:0 "O corporativismo de Estado é um sistema político e econômico no qual o Estado organiza preventivamente cidadãos e grupos de interesse (como sindicatos e associações empresariais) em monopólios exclusivos reconhecidos pelo Estado. Sob este modelo, esses grupos não são independentes; atuam como instrumentos controlados do governo para implementar políticas e administrar a sociedade."

    grant_washington_dc_statehood_decision:0 "Conceder Condição de Estado a $STATE_DISTRICT_OF_COLUMBIA$"
    grant_washington_dc_statehood_decision_desc:0 "O(A) $STATE_DISTRICT_OF_COLUMBIA$ atualmente não tem direito a representação votante na legislatura nacional. O(A) [concept_government], portanto, aprovará legislação para corrigir este erro. \n\nEsta decisão permitirá que $STATE_DISTRICT_OF_COLUMBIA$ contribua com assentos eleitorais para a legislatura nacional."

