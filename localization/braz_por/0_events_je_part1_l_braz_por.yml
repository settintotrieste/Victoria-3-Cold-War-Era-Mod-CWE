    UN_imf_interest_rate.f:0 "[SCOPE.sCountry('imf_interest_rate_target').GetName] está sujeito(a) às taxas de juros do FMI, em vez da Taxa de Juros Média Global, porque atualmente está tomando dinheiro emprestado do FMI. A taxa de juros do FMI é determinada pela Perspectiva Econômica média global, na qual uma perspectiva mais fraca equivale a taxas de juros mais baixas, e vice-versa."
