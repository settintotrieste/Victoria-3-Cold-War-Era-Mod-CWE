    je_law_enactment_system:0 "Projeto de Lei para Promulgar [SCOPE.GetRootScope.GetCountry.GetLawBeingEnacted.GetName]"
    je_law_enactment_system_reason:0 "O(A) [concept_government] [ROOT.GetCountry.GetAdjective] está tentando [Concept('concept_enactment_of_laws', '$concept_enactment_of_laws_enact$')] o(a) [concept_law] [SCOPE.sLaw('current_law_scope').GetName] no(a) [SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')]. \n\nPara que o #y Projeto de Lei#! para promulgar [SCOPE.sLaw('current_law_scope').GetName] tenha sucesso, os diversos órgãos do Estado não devem #r se Opor#! à(ao) [concept_law]. Se o fizerem, o #y Projeto de Lei#! pode sofrer [Concept('concept_enactment_setback', '$concept_enactment_setbacks$')] ou até mesmo ser #r Vetado#! por completo. \n\n@information! Todos(as) os(as) [Concept('concept_interest_group', '$concept_interest_groups$')] no(a) #y [SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')]#! reavaliarão seu apoio ao(à) [concept_government] no início do processo de [Concept('concept_enactment_of_laws', '$concept_enactment_of_laws_enactment$')] do(a) [concept_law]. \n\nOs(As) [Concept('concept_interest_group', '$concept_interest_groups$')] que forem #y Neutros(as)#! ou #g Aprovarem#! [SCOPE.GetRootScope.GetCountry.GetLawBeingEnacted.GetName] apoiarão o(a) [concept_government] no(a) [SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')]. \n\n@warning! Os principais órgãos governamentais e titulares de cargos que se opõem a [SCOPE.sLaw('current_law_scope').GetName] estão listados abaixo."

