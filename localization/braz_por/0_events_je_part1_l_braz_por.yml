    elective_monarchy_type_desc:0 "\n\n[ROOT.GetCountry.GetName] possui um(a) [SCOPE.GetRootScope.GetCountry.GetCustom('monarchy_type_custom_title')], na qual o(a) [SCOPE.GetRootScope.GetCountry.GetCustom('monarch_custom_title')] é revezado(a) entre as diversas famílias reais regionais a cada 5 anos. Isso significa que o(a) [concept_interest_group] do(a) [SCOPE.GetRootScope.GetCountry.GetCustom('monarch_custom_title')] mudará aleatoriamente a cada 5 anos."
