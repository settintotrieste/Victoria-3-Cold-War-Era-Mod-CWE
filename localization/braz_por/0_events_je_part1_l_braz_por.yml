    ig_armed_forces_economic_ideology.t:0 "[SCOPE.gsInterestGroup('armed_forces_ig').GetName] Muda sua Ideologia Econômica"
    ig_armed_forces_economic_ideology.d:0 "[SCOPE.sCharacter('armed_forces_ig_leader').GetFullName], líder do(a) [SCOPE.gsInterestGroup('armed_forces_ig').GetName], veio a público manifestar apoio a um novo sistema econômico para [SCOPE.sCountry('ig_armed_forces_country').GetName]. O sistema proposto representa uma ruptura radical em relação ao atualmente adotado pela maioria no governo. O(A) [SCOPE.gsInterestGroup('armed_forces_ig').GetName] justificou essa abordagem radical afirmando haver necessidade de ações fortes, decisivas e não convencionais para resolver os atuais problemas econômicos que afligem [SCOPE.sCountry('ig_armed_forces_country').GetName]."
    ig_armed_forces_economic_ideology.f:0 "Este evento ocorre sempre que o(a) [SCOPE.gsInterestGroup('armed_forces_ig').GetName] está em [concept_opposition], está insatisfeito(a) com o governo, e a economia está em calote ou insalubre. A nova ideologia econômica selecionada também será sempre o oposto polar da ideologia econômica do grupo de interesse com maior influência no governo."

    ig_armed_forces_economic_ideology_dictatorship.t:0 "[SCOPE.gsInterestGroup('armed_forces_ig').GetName] Muda sua Ideologia Econômica"
    ig_armed_forces_economic_ideology_dictatorship.d:0 "Em uma demonstração de lealdade a [SCOPE.sCharacter('rulers_scope').GetFullName], o líder do(a) [SCOPE.gsInterestGroup('armed_forces_ig').GetName], General [SCOPE.sCharacter('armed_forces_ig_leader').GetFullName], emitiu uma declaração pública elogiando as políticas econômicas do Governo e comprometeu-se a apoiá-lo. O General também anunciou que fará uma reformulação nas forças armadas para remover proativamente qualquer um que se oponha ao Governo."
    ig_armed_forces_economic_ideology_dictatorship.f:0 "Este evento ocorre sempre que o(a) [SCOPE.gsInterestGroup('armed_forces_ig').GetName] está no(a) [concept_government] e está satisfeito(a) com o governo. A nova ideologia econômica selecionada será sempre a mesma do grupo de interesse com maior influência no governo."
    ig_armed_forces_ideology_system.2.tt:0 "Reformular o(a) [SCOPE.gsInterestGroup('armed_forces_ig').GetName], substituindo qualquer [concept_general] ou [concept_admiral] que não seja do(a) [concept_interest_group] do(a) [concept_ruler] ou do(a) [SCOPE.gsInterestGroup('armed_forces_ig').GetName]"

    ig_armed_forces_ideology_system.option:0 "Observaremos esse desenvolvimento de perto..."

    je_term_limits.tt:0 "[GetPlayer.GetRuler.GetFullName] deixará o cargo de [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]"
    je_term_limits.1.tt:0 "[GetPlayer.GetRuler.GetFullName] toma posse como [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]"
    je_term_limits.2.tt:0 "[GetPlayer.GetRuler.GetFullName] não é mais [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')], e o(a) novo(a) [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] não é mais do(a) [concept_interest_group] [SCOPE.gsInterestGroup('the_current_president_ig_scope').GetName]"

    je_term_limits:0 "O Cargo de [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [ROOT.GetCountry.GetRuler.GetLastName]"
    je_term_limits_reason:0 "Segundo a Constituição de [COUNTRY.GetName], nenhuma pessoa poderá ser eleita para o cargo de [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] mais de duas vezes, e nenhuma pessoa que tenha ocupado o cargo de [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')], ou atuado como [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')], por mais de dois anos de um mandato para o qual outra pessoa foi eleita [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')], poderá ser eleita para o cargo de [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] mais de uma vez. [ROOT.GetCountry.GetRuler.GetFullName], portanto, deixará o cargo assim que o limite de mandato de 8 anos for atingido."
    je_term_limits_goal:0 "[ROOT.GetCountry.GetRuler.GetFullName] cumpriu seu mandato integralmente"
    je_term_limits_status:0 "Cumpridos [GetPlayer.MakeScope.Var('term_limit_var').GetValue] / 8 anos"

    je_term_limits_swiss:0 "A Presidência Federal de [ROOT.GetCountry.GetRuler.GetLastName]"
    je_term_limits_swiss_reason:0 "O Presidente da Confederação Suíça é o chefe do Conselho Federal, o órgão executivo do país, composto por sete membros. Eleito pela Assembleia Federal para um mandato de um ano, o titular do cargo preside as reuniões do Conselho Federal e assume deveres especiais de representação. Primeiro entre iguais, o presidente da Confederação não possui poderes acima dos outros seis conselheiros e continua a chefiar o departamento que lhe foi designado. Tradicionalmente, o cargo é rotativo entre os membros por ordem de antiguidade, e o vice-presidente do Conselho Federal assume a presidência no ano seguinte ao mandato do titular."
    je_term_limits_swiss_goal:0 "O Presidente [ROOT.GetCountry.GetRuler.GetFullName] atingiu o limite de mandato"
    je_term_limits_swiss_status:0 "Cumpridos [GetPlayer.MakeScope.Var('term_limit_var').GetValue] / 12 meses"

    je_term_limits.3.tt:0 "É $SWI$"

    je_term_limits_yugoslav:0 "A Presidência Federal de [ROOT.GetCountry.GetRuler.GetLastName]"
    je_term_limits_yugoslav_reason:0 "Uma presidência coletiva existia na Iugoslávia desde as emendas à Constituição de 1963, feitas em 1971. Um artigo separado afirmava o mandato ilimitado de Josip Broz Tito, o que garantia que o novo Presidente da Presidência só entraria em vigor após sua morte. Quando Tito morreu, em 4 de maio de 1980, o então Vice-Presidente da Presidência assumiu o cargo de Presidente da Presidência. A partir de então, o cargo de Presidente da Presidência passou a ser rotativo anualmente, com cada Presidente servindo como Vice-Presidente no ano anterior."
    je_term_limits_yugoslav_goal:0 "O Presidente [ROOT.GetCountry.GetRuler.GetFullName] atingiu o limite de mandato"
    je_term_limits_yugoslav_status:0 "Cumpridos [GetPlayer.MakeScope.Var('term_limit_var').GetValue] / 12 meses"

    je_term_limits_collective_HOS:0 "A Liderança Coletiva de [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [ROOT.GetCountry.GetRuler.GetLastName]"
    je_term_limits_collective_HOS_reason:0 "Segundo a Constituição de [COUNTRY.GetName], a autoridade executiva não é investida em uma única figura, mas em um órgão colegiado. O chefe de Estado coletivo funciona como um conselho constitucional, representando a nação por meio de deliberação compartilhada e procedimentos legalmente definidos. Cada membro possui posição equivalente, e as decisões exigem consentimento por maioria ou unanimidade, dependendo da constituição. O cargo de [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] seria rotativo anualmente."
    je_term_limits_collective_HOS_goal:0 "O Presidente [ROOT.GetCountry.GetRuler.GetFullName] atingiu o limite de mandato"
    je_term_limits_collective_HOS_status:0 "Cumpridos [GetPlayer.MakeScope.Var('term_limit_var').GetValue] / 12 meses"

