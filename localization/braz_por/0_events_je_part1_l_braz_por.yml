    UN_imf_interest_rate.t:0 "Mudança nas Taxas de Juros do FMI"
    UN_imf_interest_rate.1.d:0 "O Presidente do Fundo Monetário Internacional anunciou uma mudança na taxa de juros de seus empréstimos a países devedores. A partir de agora, a taxa de juros será MUITO BAIXA."
    UN_imf_interest_rate.2.d:0 "O Presidente do Fundo Monetário Internacional anunciou uma mudança na taxa de juros de seus empréstimos a países devedores. A partir de agora, a taxa de juros será BAIXA."
    UN_imf_interest_rate.3.d:0 "O Presidente do Fundo Monetário Internacional anunciou uma mudança na taxa de juros de seus empréstimos a países devedores. A partir de agora, a taxa de juros será MÉDIA."
    UN_imf_interest_rate.4.d:0 "O Presidente do Fundo Monetário Internacional anunciou uma mudança na taxa de juros de seus empréstimos a países devedores. A partir de agora, a taxa de juros será ALTA."
