    colonial_empire_bankroll.t:0 "[SCOPE.sCountry('colonial_empire_debtor').GetName] Necessita de Apoio Financeiro"
    colonial_empire_bankroll.d:0 "O(A) [concept_government] de [SCOPE.sCountry('colonial_empire_debtor').GetName] está enfrentando graves dificuldades financeiras e precisa urgentemente de apoio financeiro de seu(sua) [concept_overlord]. Como o(a) [concept_overlord], estamos legalmente obrigados a [concept_bankroll_subject] as finanças nacionais [SCOPE.sCountry('colonial_empire_debtor').GetAdjective] até que suas dívidas sejam quitadas e sua renda nacional seja positiva."
