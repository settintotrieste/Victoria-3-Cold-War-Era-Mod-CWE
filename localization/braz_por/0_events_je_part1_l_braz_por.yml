    GBR_change_monarch_1952.t: "A Morte do Rei George VI"
    GBR_change_monarch_1952.d: "O estresse da guerra havia cobrado seu preço na saúde de George, agravado por seu tabagismo intenso e pelo consequente desenvolvimento de câncer de pulmão, entre outras enfermidades, incluindo arteriosclerose e a doença de Buerger. Em 31 de janeiro de 1952, apesar dos conselhos de seus próximos, George foi ao Aeroporto de Londres para se despedir de Elizabeth e Philip em sua viagem à Austrália via Quênia. Foi sua última aparição pública. Seis dias depois, às 07h30 GMT da manhã de 6 de fevereiro, foi encontrado morto na cama em Sandringham House, em Norfolk. Havia morrido durante a noite de uma trombose coronária, aos 56 anos de idade."
    GBR_change_monarch_2022.t: "A Morte da Rainha Elizabeth II"
    GBR_change_monarch_2022.d: "Elizabeth II, Rainha do Reino Unido e dos demais reinos da Commonwealth, morreu em 8 de setembro de 2022 no Castelo de Balmoral, na Escócia, aos 96 anos de idade. O reinado de Elizabeth, de 70 anos e 214 dias, foi o mais longo de qualquer monarca britânico. Foi imediatamente sucedida por seu filho mais velho, Charles III."
    JAP_change_monarch_1989.t: "A Morte do Imperador Hirohito"
    JAP_change_monarch_1989.d: "Em 22 de setembro de 1987, Hirohito passou por uma cirurgia no pâncreas após meses de problemas digestivos. Os médicos descobriram que ele tinha câncer duodenal. Hirohito parecia estar se recuperando totalmente nos meses seguintes à cirurgia. Cerca de um ano depois, no entanto, em 19 de setembro de 1988, ele entrou em colapso em seu palácio, e sua saúde piorou nos meses seguintes, à medida que sofria hemorragias internas contínuas. O Imperador morreu às 6h33 de 7 de janeiro de 1989, aos 87 anos de idade."
    JAP_change_monarch_2019.t: "A Abdicação do Imperador Akihito?"
    JAP_change_monarch_2019.d: "Em 13 de julho de 2016, a emissora nacional NHK informou que o então Imperador, de 82 anos, pretendia abdicar em favor de seu filho mais velho, o Príncipe Herdeiro Naruhito, dentro de alguns anos, citando sua idade. Em 19 de maio de 2017, o projeto de lei que permitiria a abdicação de Akihito foi apresentado pelo Gabinete do Japão. Em 8 de junho de 2017, a Dieta Nacional o aprovou, passando a ser conhecido como a Lei de Abdicação Imperial. Isso deu início aos preparativos do governo para transferir o cargo a Naruhito. O Primeiro-Ministro Shinzo Abe anunciou em dezembro de 2017 que a abdicação de Akihito ocorreria ao final do dia 30 de abril de 2019, e que Naruhito se tornaria o 126º Imperador a partir de 1º de maio de 2019."
    BEL_change_monarch_2013.t: "A Abdicação do Rei Albert II?"
    BEL_change_monarch_2013.d: "O Rei Albert II da Bélgica abdicou em 21 de julho de 2013, citando idade e questões de saúde. Após 20 anos no trono, passou a coroa a seu filho, Philippe, durante uma cerimônia no Dia Nacional da Bélgica. Albert pediu unidade nacional em seu discurso de despedida, marcando uma transição real pacífica."
    SPA_change_monarch_2014.t: "A Abdicação do Rei Juan Carlos I?"
    SPA_change_monarch_2014.d: "O Rei Juan Carlos I da Espanha abdicou em 19 de junho de 2014, após anunciar sua intenção no início daquele mês. Citando problemas de saúde e o desejo de renovação geracional, passou a coroa a seu filho, Felipe VI. A abdicação seguiu-se a uma queda de popularidade em meio a escândalos e foi formalizada por aprovação parlamentar."
    NET_change_monarch_1980.t: "A Abdicação da Rainha Juliana?"
    NET_change_monarch_1980.d: "A Rainha Juliana dos Países Baixos abdicou em 30 de abril de 1980, em seu 71º aniversário, após 32 anos no trono. Citou a idade e o desejo de passar as responsabilidades à próxima geração. Sua filha, Beatrix, sucedeu-a. A abdicação refletiu a tradição real neerlandesa de favorecer a aposentadoria voluntária em vez de um reinado vitalício."
    NET_change_monarch_2013.t: "A Abdicação da Rainha Beatrix?"
    NET_change_monarch_2013.d: "A Rainha Beatrix dos Países Baixos abdicou em 30 de abril de 2013, após um reinado de 33 anos. Citou o desejo de abrir caminho para uma nova geração, passando o trono a seu filho, Willem-Alexander. A abdicação marcou o fim de uma era e o início do primeiro monarca masculino dos Países Baixos em mais de um século."
    LUX_change_monarch_1964.t: "A Abdicação da Grã-Duquesa Charlotte?"
    LUX_change_monarch_1964.d: "A Grã-Duquesa Charlotte de Luxemburgo abdicou em 12 de novembro de 1964, após 45 anos de governo. Citou a idade e a necessidade de renovação, passando o trono a seu filho, Jean. Seu reinado abrangeu a Segunda Guerra Mundial e a recuperação do pós-guerra, tornando-a um símbolo de unidade nacional e resiliência."
    LUX_change_monarch_2000.t: "A Abdicação do Grão-Duque Jean?"
    LUX_change_monarch_2000.d: "O Grão-Duque Jean de Luxemburgo abdicou em 7 de outubro de 2000, após 36 anos no trono. Citou o desejo de passar as responsabilidades à próxima geração, transferindo o poder a seu filho, Henri. O reinado de Jean foi marcado pela modernização do pós-guerra e por seu papel anterior na Segunda Guerra Mundial como soldado e símbolo da resiliência nacional."
    LUX_change_monarch_2025.t: "A Abdicação do Grão-Duque Henri?"
    LUX_change_monarch_2025.d: "O Grão-Duque Henri de Luxemburgo abdicou em 3 de outubro de 2025, após quase 25 anos no trono. Passou a coroa a seu filho mais velho, Guillaume, citando a importância da renovação geracional e da continuidade. A transição foi marcada por uma cerimônia formal no Palácio Grão-Ducal, na cidade de Luxemburgo."
    DEN_change_monarch_2024.t: "A Abdicação da Rainha Margrethe II?"
    DEN_change_monarch_2024.d: "A Rainha Margrethe II da Dinamarca abdicou em 14 de janeiro de 2024, marcando 52 anos no trono. Anunciou sua decisão durante seu discurso de Réveillon, citando a renovação geracional. Seu filho, Frederik, sucedeu-a como Rei Frederik X. Foi a primeira abdicação real voluntária da Dinamarca em quase 900 anos."
    NOR_change_monarch_1957.t: "A Morte do Rei Haakon VII"
    NOR_change_monarch_1957.d: "O Rei Haakon VII faleceu em 1957, após um longo e reverenciado reinado. Símbolo da independência norueguesa e da resiliência em tempos de guerra, sua morte marcou o fim de uma era e o início do governo do Rei Olav V, dando início a um novo capítulo para a monarquia norueguesa."
    NOR_change_monarch_1991.t: "A Morte do Rei Olav V"
    NOR_change_monarch_1991.d: "O Rei Olav V morreu em 1991, querido como o 'Rei do Povo' por sua humildade e serviço em tempos de guerra. Sua morte foi recebida com luto nacional, e seu filho Harald V ascendeu ao trono, dando continuidade ao legado de uma monarquia moderna e acessível."
    SWE_change_monarch_1950.t: "A Morte do Rei Gustaf V"
    SWE_change_monarch_1950.d: "O Rei Gustaf V morreu em 1950, aos 92 anos, concluindo um reinado de 43 anos que abrangeu duas guerras mundiais. Sua morte marcou a transição para Gustaf VI Adolf, à medida que a Suécia continuava sua evolução rumo a uma monarquia constitucional moderna."
    SWE_change_monarch_1973.t: "A Morte do Rei Gustaf VI"
    SWE_change_monarch_1973.d: "O Rei Gustaf VI Adolf faleceu em 1973, lembrado por seus interesses acadêmicos e liderança firme. Sua morte marcou o fim de uma era e a ascensão de Carl XVI Gustaf, sinalizando uma mudança geracional na família real sueca."
    GRE_change_monarch_1964.t: "A Morte do Rei Paulo"
    GRE_change_monarch_1964.d: "O Rei Paulo da Grécia morreu em 1964, após um reinado marcado pela recuperação do pós-guerra e pelas tensões da Guerra Fria. Seu filho, Constantino II, sucedeu-o em meio a uma crescente agitação política que logo desafiaria o futuro da monarquia."
    THI_change_monarch_2016.t: "A Morte do Rei Bhumibol Adulyadej Mahidol"
    THI_change_monarch_2016.d: "O Rei Bhumibol Adulyadej morreu em 2016, após um reinado de 70 anos, o mais longo da história tailandesa. Reverenciado por sua autoridade moral e trabalho de desenvolvimento, sua morte deixou um impacto profundo na nação. O Príncipe Herdeiro Vajiralongkorn sucedeu-o como Rama X."
    CAM_change_monarch_2004.t: "A Morte do Rei Norodom Sihanouk"
    CAM_change_monarch_2004.d: "O Rei Norodom Sihanouk morreu em 2012, tendo desempenhado um papel fundamental na história moderna do Camboja. De monarca a estadista e novamente monarca, seu legado complexo terminou com a sucessão pacífica de seu filho, Norodom Sihamoni."
    CHI_change_monarch_1967.t: "A Morte de Puyi"
    CHI_change_monarch_1967.d: "Puyi, o último Imperador da China, morreu em 1967, após anos de reeducação sob o domínio comunista. Outrora um imperador criança e mais tarde um governante fantoche do Manchukuo, sua morte simbolizou o crepúsculo final da China imperial."
    AUS_change_monarch_2011.t: "A Morte de Otto von Habsburg"
    AUS_change_monarch_2011.d: "Otto von Habsburg, último herdeiro do Império Austro-Húngaro, morreu em 4 de julho de 2011, aos 98 anos. Seu funeral em Viena marcou o fim simbólico de uma dinastia de 640 anos. Seu corpo foi sepultado na Cripta Imperial, enquanto seu coração foi enterrado separadamente na Hungria, honrando a tradição dos Habsburgo."
    EGY_change_monarch_1952.t: "O Nascimento de Fuad II"
    EGY_change_monarch_1952.d: "Fuad II do Egito nasceu em 16 de janeiro de 1952, no Palácio Abdeen, no Cairo. Filho do Rei Farouk I e da Rainha Narriman Sadek, tornou-se o último monarca do Egito poucos meses depois, reinando brevemente após a abdicação de seu pai, antes de a monarquia ser abolida em 1953."
    PER_change_monarch_1960.t: "O Nascimento de Reza Pahlavi"
    PER_change_monarch_1960.d: "Reza Pahlavi, Príncipe Herdeiro do Irã, nasceu em 31 de outubro de 1960, em Teerã. Filho do Xá Mohammad Reza Pahlavi e da Imperatriz Farah Diba, foi nomeado herdeiro do Trono do Pavão em 1967. Seu nascimento simbolizou a continuidade da dinastia Pahlavi."
    JOR_change_monarch_1962.t: "O Nascimento de Abdullah II"
    JOR_change_monarch_1962.d: "Abdullah II nasceu em Amã, Jordânia, em 30 de janeiro de 1962, filho mais velho do Rei Hussein e da Princesa Muna. Descendente hachemita do Profeta Maomé, foi proclamado Príncipe Herdeiro ao nascer. Sua formação mesclou a tradição jordaniana com uma educação internacional, moldando sua futura liderança."

