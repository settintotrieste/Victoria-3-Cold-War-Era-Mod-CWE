    je_paramilitary_groups:0 "O(A) [SCOPE.GetRootScope.GetCountry.GetCustom('paramilitary_group_custom_title')]"
    je_paramilitary_groups_reason:0 "O(A) [SCOPE.GetRootScope.GetCountry.GetCustom('paramilitary_group_custom_title')] [ROOT.GetCountry.GetAdjectiveNoFormatting] é o grupo paramilitar nacional de [ROOT.GetCountry.GetName]. \n\nO(A) [SCOPE.GetRootScope.GetCountry.GetCustom('paramilitary_group_custom_title')] permite que o(a) [concept_government] conduza um expurgo em massa de [Concept('concept_politician', '$concept_politicians$')], [Concept('concept_agitator', '$concept_agitators$')], [Concept('concept_general', '$concept_generals$')], e [Concept('concept_admiral', '$concept_admirals$')]. \n\nComandante do(a) [SCOPE.GetRootScope.GetCountry.GetCustom('paramilitary_group_custom_title')]: [SCOPE.sCharacter('head_of_paramilitary').GetFullName] ([SCOPE.gsInterestGroup('paramilitary_IG').GetName]) \n\nNota: A Lealdade do(a) [SCOPE.GetRootScope.GetCountry.GetCustom('paramilitary_group_custom_title')] aumentará quando o(a) [concept_approval] do(a) [concept_interest_group] [SCOPE.gsInterestGroup('paramilitary_IG').GetName] for positivo(a), e diminuirá quando o(a) [concept_approval] for negativo(a). \n\nManter a Lealdade do(a) [SCOPE.GetRootScope.GetCountry.GetCustom('paramilitary_group_custom_title')] é crucial, já que não fazê-lo pode resultar em um #y Golpe de Palácio#! contra [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [GetPlayer.GetRuler.GetFullName], o que resultará na instalação de um(a) novo(a) [concept_ruler] reacionário(a). \n\n@information! Promulgar [Concept('concept_law', '$concept_laws$')] mais fracas de #y $lawgroup_corruption_policy$#! reduzirá a taxa de perda de lealdade."
