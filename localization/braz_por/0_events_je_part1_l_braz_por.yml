    territory_lease_terminated_SAR.d:0 "O arrendamento de [SCOPE.sCountry('territory_lease_tenant').GetName] para um(a) [concept_state] em [SCOPE.sState('territory_lease_state').GetName] foi encerrado devido à retirada do(a) [concept_treaty] subjacente. Isso significa que, sob o direito internacional, [SCOPE.sCountry('territory_lease_tenant').GetName] é obrigado(a) a devolver [SCOPE.sState('territory_lease_state').GetName] a [SCOPE.sCountry('territory_lease_landlord').GetName]. \n\n[SCOPE.sCountry('territory_lease_tenant').GetName], no entanto, recusou-se a devolver [SCOPE.sState('territory_lease_state').GetName], a menos que seja transformado em um(a) [concept_special_administrative_region] de [SCOPE.sCountry('territory_lease_landlord').GetName]."
    territory_lease_terminated_SAR.f:0 "Este evento ocorreu porque houve retirada de um(a) [concept_treaty] contendo o(a) [concept_article] #y $territory_leased$#!."
