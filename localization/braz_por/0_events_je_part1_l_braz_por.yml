    join_nuclear_non_proliferation_treaty_decision:0 "Assinar o Tratado de Não Proliferação de Armas Nucleares"
    join_nuclear_non_proliferation_treaty_decision_desc:0 "O Tratado de Não Proliferação de Armas Nucleares é um tratado internacional cujo objetivo é evitar a disseminação de armas nucleares e tecnologia armamentista, promover a cooperação nos usos pacíficos da energia nuclear, e avançar o objetivo de alcançar o desarmamento nuclear e o desarmamento geral e completo. Note que assinar este tratado removerá todas as armas nucleares deste país e encerrará qualquer programa de armas nucleares em andamento."
    signed_NPT_1_tt:0 "Este país assina o Tratado de Não Proliferação de Armas Nucleares e ficará vinculado a ele por ao menos 10 anos."

    leave_nuclear_non_proliferation_treaty_decision:0 "Renunciar ao Tratado de Não Proliferação de Armas Nucleares"
    leave_nuclear_non_proliferation_treaty_decision_desc:0 "O Tratado de Não Proliferação de Armas Nucleares é um tratado internacional cujo objetivo é evitar a disseminação de armas nucleares e tecnologia armamentista, promover a cooperação nos usos pacíficos da energia nuclear, e avançar o objetivo de alcançar o desarmamento nuclear e o desarmamento geral e completo. Renunciar a este tratado permitirá que este país inicie novamente um programa de armas nucleares."
    signed_NPT_2_tt:0 "Este país é signatário do Tratado de Não Proliferação de Armas Nucleares há ao menos 10 anos."

    did_not_sign_NPT_tt:0 "Este país não é signatário do Tratado de Não Proliferação de Armas Nucleares"

    join_chemical_non_proliferation_treaty_decision:0 "Assinar a Convenção sobre Armas Químicas"
    join_chemical_non_proliferation_treaty_decision_desc:0 "A Convenção sobre Armas Químicas (CWC) é um tratado de controle de armas administrado pela Organização para a Proibição de Armas Químicas (OPAQ), uma organização intergovernamental sediada em Haia, Países Baixos. O tratado entrou em vigor em 29 de abril de 1997. Proíbe o uso de armas químicas, e também proíbe o desenvolvimento, produção, estocagem ou transferência em larga escala de armas químicas ou seus precursores, exceto para fins muito limitados (pesquisa, médicos, farmacêuticos ou de proteção)."
    signed_CWC_1_tt:0 "Este país assina a Convenção sobre Armas Químicas e ficará vinculado a ela por ao menos 10 anos."

    leave_chemical_non_proliferation_treaty_decision:0 "Renunciar à Convenção sobre Armas Químicas"
    leave_chemical_non_proliferation_treaty_decision_desc:0 "A Convenção sobre Armas Químicas (CWC) é um tratado de controle de armas administrado pela Organização para a Proibição de Armas Químicas (OPAQ), uma organização intergovernamental sediada em Haia, Países Baixos. O tratado entrou em vigor em 29 de abril de 1997. Proíbe o uso de armas químicas, e também proíbe o desenvolvimento, produção, estocagem ou transferência em larga escala de armas químicas ou seus precursores, exceto para fins muito limitados (pesquisa, médicos, farmacêuticos ou de proteção). Renunciar a este tratado permitirá que este país inicie novamente um programa de armas químicas."
    signed_CWC_2_tt:0 "Este país é signatário da Convenção sobre Armas Químicas há ao menos 10 anos."

    did_not_sign_CWC_tt:0 "Este país não é signatário da Convenção sobre Armas Químicas"

    join_biological_non_proliferation_treaty_decision:0 "Assinar a Convenção sobre Armas Biológicas"
    join_biological_non_proliferation_treaty_decision_desc:0 "A Convenção sobre Armas Biológicas, ou Convenção sobre Armas Biológicas e Toxínicas, é um tratado de desarmamento que efetivamente proíbe armas biológicas e toxínicas, ao proibir seu desenvolvimento, produção, aquisição, transferência, estocagem e uso."
    signed_BWC_1_tt:0 "Este país assina a Convenção sobre Armas Biológicas e ficará vinculado a ela por ao menos 10 anos."

    leave_biological_non_proliferation_treaty_decision:0 "Renunciar à Convenção sobre Armas Biológicas"
    leave_biological_non_proliferation_treaty_decision_desc:0 "A Convenção sobre Armas Biológicas, ou Convenção sobre Armas Biológicas e Toxínicas, é um tratado de desarmamento que efetivamente proíbe armas biológicas e toxínicas, ao proibir seu desenvolvimento, produção, aquisição, transferência, estocagem e uso. Renunciar a este tratado permitirá que este país inicie novamente um programa de armas biológicas."
    signed_BWC_2_tt:0 "Este país é signatário da Convenção sobre Armas Biológicas há ao menos 10 anos."

    did_not_sign_BWC_tt:0 "Este país não é signatário da Convenção sobre Armas Biológicas"

    generic_decolonisation_indy.1.tt:0 "Declarar uma guerra de independência contra [SCOPE.sCountry('overlord_in_question_scopes').GetName]!"
    generic_decolonisation_indy.t:0 "Guerra de Independência [ROOT.GetCountry.GetAdjective]?"
    generic_decolonisation_indy.d:0 "O povo [ROOT.GetCountry.GetAdjective] está indignado com a relutância de [SCOPE.sCountry('overlord_in_question_scopes').GetName] em conceder independência a [ROOT.GetCountry.GetName]. À luz desse crescente sentimento nacionalista, certos membros do governo abordaram [SCOPE.sCharacter('puppet_leader_in_question_scopes').GetFullName] com uma proposta radical: [ROOT.GetCountry.GetName] fará uma declaração de independência e romperá unilateralmente todos os laços com [SCOPE.sCountry('overlord_in_question_scopes').GetName]."
    generic_decolonisation_indy.f:0 "Recusar-se a lutar pela independência [ROOT.GetCountry.GetAdjective] manchará a todos no governo com a marca da covardia."
    generic_decolonisation_indy.option.1:0 "Lutar pela liberdade!"
    generic_decolonisation_indy.option.2:0 "Bah, a liberdade é superestimada..."

    self_governing_colony.tt:0 "Criar um(a) $semi_autonomous_colony$ na Colônia [SCOPE.sCulture('culture_to_release').GetName]"
    generic_decolonisation_indy_2a.t:0 "Autogoverno [SCOPE.sCulture('culture_to_release').GetName]?"
    generic_decolonisation_indy_2b.t:0 "Autogoverno para [SCOPE.sState('state_to_release').GetName]?"
    generic_decolonisation_indy_2.d:0 "O povo [SCOPE.sCulture('culture_to_release').GetName] em [SCOPE.sState('state_to_release').GetName] pediu a [ROOT.GetCountry.GetName] que concedesse autogoverno ao seu(sua) [concept_homeland]."
    generic_decolonisation_indy_2.f:0 "Aceitar o pedido [SCOPE.sCulture('culture_to_release').GetName] criará um(a) $XFC$ nos(as) [concept_homeland]s [SCOPE.sCulture('culture_to_release').GetName], que serão então automaticamente convertidos ao país apropriado."
    generic_decolonisation_indy_2.option.1:0 "Aceitamos seu humilde pedido de autonomia interna."
    generic_decolonisation_indy_2.option.2:0 "Não, o domínio direto será mantido em [SCOPE.sState('state_to_release').GetName]!"

    generic_decolonisation_indy.3.t:0 "Descolonização Malsucedida em [SCOPE.sState('state_to_release').GetName]"
    generic_decolonisation_indy.3.d:0 "O povo [SCOPE.sCulture('primary_culture_scope').GetName] em [SCOPE.sState('state_to_release').GetName] não conseguiu decidir como descolonizar seu país, de modo que a colônia reverterá ao domínio direto por uma potência estrangeira."
    generic_decolonisation_indy.3.f:0 "Este evento ocorreu porque não havia país elegível para o qual a tag de país [SCOPE.sCountry('failed_country_scope').GetName] pudesse se converter. [SCOPE.sCountry('failed_country_scope').GetName] será, portanto, reanexado por seu suserano e, caso não haja suserano, por qualquer país com o qual compartilhe [concept_primary_cultures]."
    generic_decolonisation_indy_3.option:0 "Triste, mas não lamentável."

    generic_decolonisation_indy.4.t:0 "A Independência de [ROOT.GetCountry.GetNameNoFlag]"
    generic_decolonisation_indy.4.d:0 "Em uma cerimônia elaborada realizada em [SCOPE.sState('indy_capital').GetCityHubName], o(a) [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [ROOT.GetCountry.GetRuler.GetFullName] conduziu a transferência de poder dos senhores estrangeiros de [ROOT.GetCountry.GetName] para o povo de [ROOT.GetCountry.GetName]. Isso foi seguido pelo hasteamento da nova bandeira estatal [ROOT.GetCountry.GetAdjective], para alegria das multidões presentes."
    generic_decolonisation_indy.4.f:0 "Nós, o povo de [ROOT.GetCountry.GetNameNoFlag], declaramos por meio deste a independência de [ROOT.GetCountry.GetNameNoFlag]. Questões relativas à transferência de poder e outras questões serão executadas de forma ordeira e no menor tempo possível. \n\nEm nome do povo de [ROOT.GetCountry.GetNameNoFlag] \n\n[ROOT.GetCountry.GetRuler.GetFullName]"
    generic_decolonisation_indy.4.option.1:0 "Forjaremos uma nação para todos os povos!"
    generic_decolonisation_indy.4.option.2:0 "Viva a causa [SCOPE.sCulture('preferred_culture').GetName]!"

