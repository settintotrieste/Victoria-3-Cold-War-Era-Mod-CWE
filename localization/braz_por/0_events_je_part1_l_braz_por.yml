    1995_JAP_earthquake.t:0 "O Grande Terremoto de Hanshin"
    1995_JAP_earthquake.d:0 "O Grande Terremoto de Hanshin ocorreu em 17 de janeiro de 1995, na parte sul da Prefeitura de Hyōgo, Japão, incluindo a região conhecida como Hanshin. Teve magnitude de 6,9 na escala de magnitude de momento, e intensidade máxima de 7 na Escala de Intensidade Sísmica da JMA (XI–XII na Escala de Intensidade Mercalli Modificada). Os tremores duraram aproximadamente 20 segundos. O foco do terremoto estava localizado 17 km abaixo de seu epicentro, na extremidade norte da Ilha Awaji, 20 km do centro da cidade de Kobe. Aproximadamente 6.434 pessoas morreram como resultado deste terremoto; cerca de 4.600 delas eram de Kobe."
    2004_IDO_earthquake.t:0 "O Terremoto do Oceano Índico"
    2004_IDO_earthquake.d:0 "Em 26 de dezembro de 2004, um grande terremoto de magnitude 9,2–9,3 Mw atingiu com epicentro na costa oeste do norte de Sumatra, Indonésia. O terremoto de megaempuxo submarino foi causado por uma ruptura ao longo da falha entre a Placa da Birmânia e a Placa Indiana, e atingiu uma intensidade Mercalli de até IX em algumas áreas. Um tsunami massivo, com ondas de até 30 m (100 pés) de altura, conhecido como Tsunami do Boxing Day (em referência ao feriado do Boxing Day) ou Tsunami Asiático, devastou comunidades ao longo das costas circundantes do Oceano Índico, matando uma estimativa de 227.898 pessoas em 14 países, em um dos desastres naturais mais mortais da história registrada."
    2011_JAP_earthquake.t:0 "O Grande Terremoto do Leste do Japão"
    2011_JAP_earthquake.d:0 "Em 11 de março de 2011, um terremoto de megaempuxo submarino de magnitude 9,0–9,1 Mw ocorreu no Oceano Pacífico, 72 km (45 milhas) a leste da Península de Oshika, na região de Tōhoku. Durou aproximadamente seis minutos e causou um tsunami. Foi o terremoto mais poderoso já registrado no Japão, e o quarto terremoto mais poderoso registrado no mundo desde o início da sismografia moderna, em 1900."
    1975_PRC_flood.t:0 "O Colapso da Barragem de Banqiao"
    1975_PRC_flood.d:0 "Em agosto de 1975, a Barragem de Banqiao e outras 61 em toda a província de Henan, China, colapsaram após a chegada do Tufão Nina. O colapso das barragens causou a terceira enchente mais mortal da história, afetando 12.000 km2 (3 milhões de acres) com uma população total de 10,15 milhões, incluindo cerca de 30 cidades e condados, com estimativas do número de mortos variando de 26.000 a 240.000. A enchente também causou o colapso de 5 a 6,8 milhões de casas. O colapso das barragens ocorreu no contexto da Revolução Cultural."
    1970_BNG_cyclone.t:0 "O Ciclone Bhola"
    1970_BNG_cyclone.d:0 "O ciclone Bhola de 1970 foi um devastador ciclone tropical que atingiu o Paquistão Oriental (atual Bangladesh) e Bengala Ocidental, na Índia, em 12 de novembro de 1970. Continua sendo o ciclone tropical mais mortal já registrado e um dos desastres humanitários mais mortais do mundo. Pelo menos 300.000 pessoas morreram na tempestade, possivelmente até 500.000, principalmente como resultado da onda de tempestade que inundou grande parte das ilhas baixas do Delta do Ganges."
    1991_BNG_cyclone.t:0 "O Ciclone de Bangladesh"
    1991_BNG_cyclone.d:0 "O ciclone de Bangladesh de 1991 esteve entre os ciclones tropicais mais mortais já registrados. Um dos ciclones tropicais mais poderosos já registrados na bacia, o ciclone tropical causou uma onda de tempestade de 6,1 m (20 pés), que inundou o litoral, causando pelo menos 138.866 mortes e cerca de US$ 1,7 bilhão (em dólares de 1991) em danos. Como resultado dos danos catastróficos, os Estados Unidos e outros países realizaram a Operação Sea Angel, um dos maiores esforços de socorro militar já realizados."
    2008_BUR_cyclone.t:0 "O Ciclone Nargis"
    2008_BUR_cyclone.d:0 "A Tempestade Ciclônica Extremamente Severa Nargis foi um ciclone tropical extremamente destrutivo e mortal que causou o pior desastre natural na história registrada de Mianmar, no início de maio de 2008. O ciclone chegou a terra em Mianmar na sexta-feira, 2 de maio de 2008, enviando uma onda de tempestade 40 quilômetros adentro do densamente povoado delta do Irrawaddy, causando destruição catastrófica e pelo menos 138.373 mortes."
    2010_HAI_earthquake.t:0 "O Grande Terremoto do Haiti"
    2010_HAI_earthquake.d:0 "O terremoto do Haiti de 2010 foi um catastrófico terremoto de magnitude 7,0 Mw que atingiu o Haiti às 16h53, horário local (21h53 UTC), na terça-feira, 12 de janeiro de 2010. O epicentro ficava próximo à cidade de Léogâne, departamento de Ouest, aproximadamente 25 quilômetros (16 milhas) a oeste de Porto Príncipe, capital do Haiti. Estima-se que três milhões de pessoas foram afetadas pelo terremoto. As estimativas do número de mortos variam de 100.000 a cerca de 160.000, chegando a números do governo haitiano entre 220.000 e 316.000."
    1992_GBR_monument_damaged.t:0 "O Incêndio do Castelo de Windsor"
    1992_GBR_monument_damaged.d:0 "Em 20 de novembro de 1992, um incêndio eclodiu no Castelo de Windsor, o maior castelo habitado do mundo e uma das residências oficiais do monarca britânico. O castelo sofreu extensos danos e foi totalmente reparado nos cinco anos seguintes, a um custo de £36,5 milhões, em um projeto liderado pelos arquitetos de conservação Donald Insall Associates. Isso levou a Rainha Elizabeth II a pagar imposto sobre sua renda, e o Palácio de Buckingham, uma de suas outras residências oficiais, foi aberto ao público para ajudar a custear os trabalhos de restauração."
    2019_FRA_monument_damaged.t:0 "O Incêndio de Notre-Dame"
    2019_FRA_monument_damaged.d:0 "Em 15 de abril de 2019, pouco antes das 18h20 CEST, um incêndio estrutural eclodiu no telhado de Notre-Dame de Paris, uma catedral católica medieval em Paris, França. Quando o incêndio foi extinto, a flecha de madeira da catedral havia desabado, a maior parte do telhado de madeira havia sido destruída, e as paredes superiores da catedral estavam gravemente danificadas. Danos extensos ao interior foram evitados pelo teto de pedra abobadado, que conteve em grande parte o telhado em chamas ao desabar. Muitas obras de arte e relíquias religiosas foram levadas para um local seguro, mas outras sofreram danos por fumaça, e parte da arte externa foi danificada ou destruída."
    1999_VNZ_mudslide.t:0 "A Tragédia de Vargas"
    1999_VNZ_mudslide.d:0 "A tragédia de Vargas foi um desastre natural ocorrido no estado de Vargas, Venezuela, em 15 de dezembro de 1999 (ao longo de 10 dias), quando chuvas torrenciais causaram enchentes repentinas e fluxos de detritos que mataram dezenas de milhares de pessoas, destruíram milhares de casas, e levaram ao colapso completo da infraestrutura do estado. Segundo trabalhadores de resgate, o bairro de Los Corales foi soterrado sob 3 metros (9,8 pés) de lama, e uma alta porcentagem de casas foi simplesmente arrastada para o oceano. Cidades inteiras, incluindo Cerro Grande e Carmen de Uria, desapareceram por completo. Até 10% da população de Vargas morreu durante o evento."
    2019_JAP_monument_damaged.t:0 "O Incêndio do Castelo de Shuri"
    2019_JAP_monument_damaged.d:0 "O Castelo de Shuri é um castelo gusuku ryukyuano em Shuri, Prefeitura de Okinawa, Japão. Entre 1429 e 1879, foi o palácio do Reino de Ryukyu, antes de se tornar amplamente negligenciado. Em 1945, durante a Batalha de Okinawa, foi quase completamente destruído. Na manhã de 31 de outubro de 2019, as estruturas do pátio principal do castelo foram novamente destruídas em um incêndio."
    1991_PHI_eruption.t:0 "A Erupção do Monte Pinatubo"
    1991_PHI_eruption.d:0 "A erupção de 1991 do Monte Pinatubo, no Arco Vulcânico de Luzon, nas Filipinas, foi a segunda maior erupção vulcânica do século XX, atrás apenas da erupção de 1912 do Novarupta, no Alasca. Quase todas as pontes num raio de 30 km (19 milhas) do Monte Pinatubo foram destruídas. Diversas cidades de terras baixas foram inundadas ou parcialmente soterradas em lama. Mais de 840 pessoas morreram devido ao colapso de telhados sob cinzas úmidas e pesadas, e várias outras ficaram feridas."
    2022_TON_eruption.t:0 "A Erupção de Hunga Tonga–Hunga Haʻapai"
    2022_TON_eruption.d:0 "Em dezembro de 2021, uma erupção começou em Hunga Tonga–Hunga Haʻapai, um vulcão submarino no arquipélago de Tonga, no sul do Oceano Pacífico. A erupção atingiu um clímax muito grande e poderoso quase quatro semanas depois, em 15 de janeiro de 2022. Hunga Tonga–Hunga Haʻapai fica 65 quilômetros (40 milhas) ao norte de Tongatapu, a principal ilha do país, e faz parte do altamente ativo arco vulcânico das Ilhas Tonga-Kermadec, uma zona de subducção que se estende da Nova Zelândia até Fiji."
    2025_BUR_earthquake.t:0 "O Terremoto de Mandalay"
    2025_BUR_earthquake.d:0 "Em 28 de março de 2025, às 12h50min54s MMT, um terremoto de magnitude Mw 7,7 atingiu a Região de Sagaing, em Mianmar, com epicentro próximo a Mandalay, a segunda maior cidade do país. O choque de falha transformante atingiu uma intensidade Mercalli Modificada máxima de IX (Violento). Foi o terremoto mais poderoso a atingir Mianmar desde 1912, e o segundo mais mortal na história moderna de Mianmar, superado apenas pelas estimativas mais altas do terremoto de Bago de 1930. O terremoto causou extensos danos em Mianmar e danos significativos na vizinha Tailândia. Centenas de casas também foram danificadas em Yunnan, China."
    2018_USA_wildfire.t:0 "O Camp Fire da Califórnia"
    2018_USA_wildfire.d:0 "O Camp Fire de 2018, no Condado de Butte, no norte da Califórnia, foi o incêndio florestal mais mortal e destrutivo da história da Califórnia. O incêndio começou na manhã de 8 de novembro de 2018, quando parte de uma linha de transmissão mal mantida da Pacific Gas and Electric Company (PG&E), no Feather River Canyon, falhou durante fortes ventos catabáticos. Esses ventos rapidamente conduziram o Camp Fire pelas comunidades de Concow, Magalia, Butte Creek Canyon e Paradise, destruindo-as em grande parte. O incêndio queimou por mais duas semanas, e foi contido no domingo, 25 de novembro, após queimar 153.336 acres (62.050 ha). O Camp Fire causou 85 mortes, deslocou mais de 50.000 pessoas, e destruiu mais de 18.000 estruturas, causando danos estimados em US$ 16,5 bilhões."
    1976_CHI_earthquake.t:0 "O Terremoto de Tangshan"
    1976_CHI_earthquake.d:0 "O terremoto de Tangshan de 1976 foi um terremoto de magnitude Mw 7,6 que atingiu a região ao redor de Tangshan, Hebei, China, às 19h42min55s UTC, em 27 de julho. A intensidade máxima do terremoto foi XI na escala Mercalli."
    1948_TKM_earthquake.t:0 "O Terremoto de Ashgabat"
    1948_TKM_earthquake.d:0 "O terremoto de Ashgabat de 1948 ocorreu em 6 de outubro, com uma magnitude de onda de superfície de 7,3 e intensidade Mercalli máxima de X, no Turcomenistão, perto de Ashgabat. Devido à censura do governo soviético, o evento não foi amplamente divulgado na mídia soviética."
    2026_VNZ_earthquake.t:0 "Os Terremotos do Norte da Venezuela"
    2026_VNZ_earthquake.d:0 "Em 24 de junho de 2026, dois grandes terremotos de falha transformante atingiram o noroeste e o centro da Venezuela. Os epicentros de ambos os terremotos ficavam no Município de Veroes, a oeste de San Felipe, capital de Yaracuy. O primeiro terremoto, de magnitude Mw 7,2, ocorreu às 18h04 VET e foi classificado como um pré-choque. Foi seguido por um choque principal de Mw 7,5, 39 segundos depois. Os dois terremotos causaram danos generalizados em todo o país, particularmente em La Guaira e Caracas. Mais de 2.640 pessoas foram mortas, mais de 12.600 ficaram feridas, e dezenas de milhares foram dadas como desaparecidas."

