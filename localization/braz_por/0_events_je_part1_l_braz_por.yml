    je_unconstitutionalise_national_values_button_desc:0 "Um(a) [concept_government] anterior promulgou o valor de [SCOPE.GetRootScope.GetCountry.GetCustom('national_value_name')] na constituição. Isso fixou o Valor Nacional de [ROOT.GetCountry.GetName] como [SCOPE.GetRootScope.GetCountry.GetCustom('national_value_name')] e impediu que certas leis fossem promulgadas. \n\nRevogar esta promulgação constitucional permitirá que os Valores Nacionais mudem de acordo com o(a) [concept_ideology] do(a) [concept_interest_group] com mais de 50% de [concept_clout] no país, e removerá a restrição sobre a promulgação de certas leis."

