    reserve_powers_pm_veto.t: "Oposição do(a) [SCOPE.GetRootScope.GetCountry.GetCustom('government_prime_minister_custom_title')]"
    reserve_powers_pm_veto.d: "O(A) [SCOPE.GetRootScope.GetCountry.GetCustom('government_prime_minister_custom_title')] [SCOPE.sCharacter('ceremonial_head_of_state').GetFullName] está se recusando a votar a favor do projeto de lei no(a) [SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')] para promulgar [SCOPE.sLaw('current_law_scope').GetName]. [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [GetPlayer.GetRuler.GetFullName] pode, no entanto, pressionar o(a) [SCOPE.GetRootScope.GetCountry.GetCustom('government_prime_minister_custom_title')] a votar a favor do projeto se o(a) [concept_government] possuir [concept_legitimacy] suficiente."
    reserve_powers_pm_veto.f: "Este evento ocorreu porque o(a) [SCOPE.GetRootScope.GetCountry.GetCustom('government_prime_minister_custom_title')] desaprova ou desaprova fortemente a(o) [concept_law] atualmente sendo promulgada(o). O(A) [concept_ruler] pode, no entanto, superar a oposição do(a) [SCOPE.GetRootScope.GetCountry.GetCustom('government_prime_minister_custom_title')] se a [concept_legitimacy] estiver acima de 50."

