    je_foreign_head_of_state_system_reason:0 "Sob a Constituição de [ROOT.GetCountry.GetName], o(a) [SCOPE.sCharacter('head_of_state_pm_scope').GetPrimaryRoleTitle] de [SCOPE.sCharacter('head_of_state_pm_scope').GetCountry.GetName] é o(a) [Concept('concept_official_character','$head_of_state$')] de [ROOT.GetCountry.GetName]. Embora este cargo seja majoritariamente cerimonial, o(a) [SCOPE.sCharacter('head_of_state_pm_scope').GetPrimaryRoleTitle] de [ROOT.GetCountry.GetName] ainda pode exercer certos poderes para restringir as ações do(a) [GetPlayer.GetRuler.GetPrimaryRoleTitle] de [ROOT.GetCountry.GetName]. \n\nPor padrão, o(a) [SCOPE.sCharacter('head_of_state_pm_scope').GetPrimaryRoleTitle] é o(a) [concept_ruler] ou [Concept('concept_official_character','$head_of_state$')] de nosso(a) [concept_overlord]. \n\n#y [SCOPE.sCharacter('head_of_state_pm_scope').GetPrimaryRoleTitle]:#! [SCOPE.sCharacter('head_of_state_pm_scope').GetFullName]"

