    subject_interactions.1.t: "Nomeando um Novo Administrador"
    subject_interactions.1.t.2: "Nomeando um Novo Governador-Geral"
    subject_interactions.1.t.1: "Nomeando um(a) Novo(a) [SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle]"
    subject_interactions.1.d: "Existem vários tipos possíveis de candidatos que podemos considerar para o cargo de Governador-Geral em [SCOPE.sCountry('target_country').GetName]. Que tipo de líder estamos buscando?"
    subject_interactions.1.d.1: "Existem vários tipos possíveis de candidatos que podemos considerar para o cargo de [SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle] em [SCOPE.sCountry('target_country').GetName]. Que tipo de líder estamos buscando?"
    subject_interactions.1.f: "Governar é algo muito delicado. Cada Estado tem suas próprias pressões específicas, seus grupos de interesse e suas preocupações. É nosso trabalho garantir que todas essas questões sejam efetivamente varridas do tabuleiro, para nunca mais interferirem em nossos objetivos."
    subject_interactions.1.a: "O Sr. [SCOPE.sCharacter('colonial_governor_plantation_scope').GetLastName], o(a) [GetCharacterTrait('special_character_colonial_plantation').GetName], assumirá o comando."
    subject_interactions.1.b: "Vamos optar por um(a) [GetCharacterTrait('special_character_colonial_local').GetName]: o Sr. [SCOPE.sCharacter('colonial_governor_local_scope').GetLastName]."
    subject_interactions.1.c: "Conceder o cargo ao Sr. [SCOPE.sCharacter('colonial_governor_extraction_scope').GetLastName], o(a) [GetCharacterTrait('special_character_colonial_extraction').GetName]."
    subject_interactions.1.e: "O Sr. [SCOPE.sCharacter('colonial_governor_business_scope').GetLastName], o(a) [GetCharacterTrait('special_character_colonial_business').GetName], é a melhor escolha."
    subject_interactions.1.g: "O(A) [SCOPE.sCharacter('colonial_governor_military_scope').GetPrimaryRoleTitle] [GetCharacterTrait('special_character_colonial_military').GetName] [SCOPE.sCharacter('colonial_governor_military_scope').GetLastName] garantirá a estabilidade."

    subject_interactions.3.t: "Solicitando um Novo Administrador"
    subject_interactions.3.t.2: "Solicitando um Novo Governador-Geral"
    subject_interactions.3.t.1: "Solicitando um(a) Novo(a) [SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle]"
    subject_interactions.3.d: "Considerando inadequada a condução dos assuntos [ROOT.GetCountry.GetAdjective] pelo atual Governador-Geral, a classe política de [ROOT.GetCountry.GetCapital.GetCityHubName] solicitou que [SCOPE.sCountry('relevant_country').GetName] nomeasse um novo Governador-Geral mais alinhado com seus objetivos."
    subject_interactions.3.d.1: "Considerando inadequada a condução dos assuntos [ROOT.GetCountry.GetAdjective] pelo(a) atual [SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle], a classe política de [ROOT.GetCountry.GetCapital.GetCityHubName] solicitou que [SCOPE.sCountry('relevant_country').GetName] nomeasse um(a) novo(a) [SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle] mais alinhado(a) com seus objetivos."
    subject_interactions.3.f: "Governar é algo muito delicado. Cada Estado tem suas próprias pressões específicas, seus grupos de interesse e suas preocupações. É nosso trabalho garantir que todas essas questões sejam efetivamente varridas do tabuleiro, para nunca mais interferirem em nossos objetivos."
    subject_interactions.3.a: "O Sr. [SCOPE.sCharacter('colonial_governor_plantation_scope').GetLastName], o(a) [GetCharacterTrait('special_character_colonial_plantation').GetName], assumirá o comando."
    subject_interactions.3.b: "Vamos optar por um(a) [GetCharacterTrait('special_character_colonial_local').GetName]: o Sr. [SCOPE.sCharacter('colonial_governor_local_scope').GetLastName]."
    subject_interactions.3.c: "Conceder o cargo ao Sr. [SCOPE.sCharacter('colonial_governor_extraction_scope').GetLastName], o(a) [GetCharacterTrait('special_character_colonial_extraction').GetName]."
    subject_interactions.3.e: "O Sr. [SCOPE.sCharacter('colonial_governor_business_scope').GetLastName], o(a) [GetCharacterTrait('special_character_colonial_business').GetName], é a melhor escolha."
    subject_interactions.3.g: "O(A) [SCOPE.sCharacter('colonial_governor_military_scope').GetPrimaryRoleTitle] [GetCharacterTrait('special_character_colonial_military').GetName] [SCOPE.sCharacter('colonial_governor_military_scope').GetLastName] garantirá a estabilidade."

