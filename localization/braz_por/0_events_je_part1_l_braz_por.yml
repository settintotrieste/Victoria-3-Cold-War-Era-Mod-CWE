    institutional_veto.t:0 "Oposição Institucional a [SCOPE.sLaw('current_law_scope').GetName]"
    institutional_veto.d:0 "Membros influentes do(a) [SCOPE.GetRootScope.GetCountry.GetCustom('lower_house_name')], do(a) [SCOPE.GetRootScope.GetCountry.GetCustom('supreme_court_name')] e do(a) [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetNameWithCountryVariant] manifestaram-se contra a tentativa de [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [ROOT.GetCountry.GetRuler.GetFullName] de transformar [ROOT.GetCountry.GetName] em um(a) [SCOPE.sLaw('current_law_scope').GetName]. Esses defensores linha-dura do regime atual exigem que todas as tentativas de mudar o(a) [concept_government_type] do país sejam interrompidas e que haja um retorno completo ao status quo."
    institutional_veto.f:0 "Este evento ocorreu porque [ROOT.GetCountry.GetName] é uma ditadura, e promulgar [SCOPE.sLaw('current_law_scope').GetName] alterará fundamentalmente o(a) [concept_government_type] de [ROOT.GetCountry.GetName]."
