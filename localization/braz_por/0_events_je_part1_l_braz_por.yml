    nato_member:0 "Membro da OTAN"
    nato_leader:0 "Líder da OTAN"
    form_nato_decision:0 "Formar a Organização do Tratado do Atlântico Norte (OTAN)"
    form_nato_decision_desc:0 "A OTAN é um sistema de segurança coletiva: seus estados-membros independentes concordam em se defender mutuamente contra ataques de terceiros. Durante a Guerra Fria, a OTAN atuou como um freio à ameaça representada pela União Soviética. A aliança permaneceu em vigor após a dissolução da União Soviética e do Pacto de Varsóvia, e esteve envolvida em operações militares nos Bálcãs, no Oriente Médio, no Sul da Ásia e na África."
