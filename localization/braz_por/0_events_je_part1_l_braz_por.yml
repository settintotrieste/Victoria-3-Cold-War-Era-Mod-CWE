    appoint_prime_minister.t: "O(A) Novo(a) [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]"
    appoint_prime_minister.d: "Com a formação de um(a) novo(a) [concept_government], chegou a hora de [ROOT.GetCountry.GetName] ter um(a) novo(a) [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]. [SCOPE.sCharacter('most_powerful_gov_ig_leader').GetFullName] ([SCOPE.sCharacter('most_powerful_gov_ig_leader').GetInterestGroup.GetName]), sendo o líder do(a) [concept_interest_group] mais forte no(a) [concept_government], espera-se que se torne o(a) próximo(a) [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]. A coalizão governante pode, no entanto, selecionar uma pessoa diferente para ser o(a) [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]."
    appoint_prime_minister.f: "Este evento ocorreu porque há mais de 1 [concept_interest_group] no(a) [concept_government]. Selecionar um(a) político(a) de um(a) [concept_interest_group] que não seja o(a) mais forte no(a) [concept_government] irritará [SCOPE.gsInterestGroup('most_powerful_gov_ig').GetName]."
