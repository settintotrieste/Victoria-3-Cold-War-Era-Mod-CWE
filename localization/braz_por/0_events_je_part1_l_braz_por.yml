    concept_sdr:0 "DES"
    concept_sdr_desc:0 "Os Direitos Especiais de Saque (DES) são ativos de reserva internacionais criados pelo FMI para complementar as reservas oficiais de seus países-membros.  O DES não é uma moeda. É um direito potencial sobre as moedas de livre uso dos membros do FMI. Como tal, os DES podem proporcionar liquidez a um país."

    je_imf_system_buy_sdr_button:0 "Converter [concept_sdr]"
    je_imf_system_buy_sdr_button_desc:0 "[ROOT.GetCountry.GetName] receberá um equivalente em Moeda [ROOT.GetCountry.GetAdjectiveNoFlag] de #green 1.000.000#! de [concept_sdr] contribuído por outros membros do FMI para aumentar sua liquidez financeira. \n\n@warning! A quantidade de [concept_gold_reserves] que [ROOT.GetCountry.GetName] ganhará ao receber [concept_sdr] dependerá da força da Moeda [ROOT.GetCountry.GetAdjective], e a força da Moeda [ROOT.GetCountry.GetAdjective] é determinada pela [concept_law] $lawgroup_monetary_policy$."

    je_imf_system_sell_sdr_button:0 "Contribuir com [concept_sdr]"
    je_imf_system_sell_sdr_button_desc:0 "[ROOT.GetCountry.GetName] permitirá que parte de suas [concept_gold_reserves] seja usada por outros membros do FMI como [concept_sdr]. \n\n@warning! A quantidade de [concept_gold_reserves] que [ROOT.GetCountry.GetName] perderá ao contribuir para o fundo Global Não Reclamado de [concept_sdr] dependerá da força da Moeda [ROOT.GetCountry.GetAdjective], e a força da Moeda [ROOT.GetCountry.GetAdjective] é determinada pela [concept_law] $lawgroup_monetary_policy$."

