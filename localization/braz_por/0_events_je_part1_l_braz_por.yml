    change_capital_BRZ_decision:0 "Mudar a Capital para Brasília"
    change_capital_BRZ_decision_desc:0 "Brasília foi uma cidade planejada desenvolvida por Lúcio Costa, Oscar Niemeyer e Joaquim Cardozo em 1956, em um plano para transferir a capital do Rio de Janeiro para uma localização mais central."
    change_capital_BUR_decision:0 "Mudar a Capital para Naypyidaw"
    change_capital_BUR_decision_desc:0 "Existem diversas hipóteses sobre por que a capital foi transferida: Naypyidaw está localizada de forma mais central do que a antiga capital, Yangon. Também é um importante entroncamento de transporte, situado próximo aos estados de Shan, Kayah e Kayin. Líderes governamentais e militares acreditavam que uma presença militar e governamental mais forte nas proximidades poderia trazer estabilidade a essas regiões cronicamente turbulentas."

    SEATO_form.t:0 "A Organização do Tratado do Sudeste Asiático?"
    SEATO_form.d:0 "Criada principalmente para bloquear novos avanços comunistas no Sudeste Asiático, a Organização do Tratado do Sudeste Asiático (SEATO) foi uma organização internacional de defesa coletiva no Sudeste Asiático, criada pelo Tratado de Defesa Coletiva do Sudeste Asiático, assinado em setembro de 1954, em Manila, Filipinas. A instituição formal da SEATO foi estabelecida em 19 de fevereiro de 1955, em uma reunião dos parceiros do tratado em Bangcoc, Tailândia. A sede da organização também ficava em Bangcoc. Oito membros aderiram à organização."
    SEATO_form.f:0 "Este evento convidará países a ingressar na Esfera de Influência de $USA$, o que reduzirá a autonomia de qualquer súdito, se aplicável, ou criará um(a) $defensive_pact$ entre $USA$ e o país aderente."
    CENTO_form.t:0 "A Organização do Tratado Central?"
    CENTO_form.d:0 "A Organização do Tratado Central (CENTO) foi uma aliança militar durante a Guerra Fria. Foi formada em 24 de fevereiro de 1955 por Irã, Iraque, Paquistão, Turquia e Reino Unido. A aliança foi dissolvida em 16 de março de 1979. A pressão dos EUA e promessas de ajuda militar e econômica foram fundamentais nas negociações que levaram ao acordo, mas os Estados Unidos não puderam participar inicialmente."
    CENTO_form.f:0 "Este evento convidará países a ingressar na Esfera de Influência de $USA$, o que reduzirá a autonomia de qualquer súdito, se aplicável, ou criará um(a) $defensive_pact$ entre $USA$ e o país aderente."
    indo_soviet_form.t:0 "O Tratado Indo-Soviético de Paz, Amizade e Cooperação?"
    indo_soviet_form.d:0 "O Tratado Indo-Soviético de Paz, Amizade e Cooperação foi um tratado assinado entre a Índia e a União Soviética em agosto de 1971, que estabelecia cooperação estratégica mútua. Isso representou um desvio significativo da posição de não-alinhamento da Índia durante a Guerra Fria, e foi um fator na guerra indo-paquistanesa de 1971. O tratado foi motivado pelo estreitamento dos laços paquistaneses com a China e os Estados Unidos."
    cuban_soviet_form.t:0 "Armas Nucleares Soviéticas em Cuba?"
    cuban_soviet_form.d:0 "Em maio de 1962, o Primeiro-Secretário soviético Nikita Khrushchov foi convencido pela ideia de neutralizar a crescente vantagem dos EUA no desenvolvimento e posicionamento de mísseis estratégicos, instalando mísseis nucleares soviéticos de alcance intermediário em Cuba. A liderança cubana tinha forte expectativa de que os EUA invadiriam Cuba novamente, e aprovou entusiasticamente a ideia de instalar mísseis nucleares em Cuba. O primeiro carregamento de mísseis soviéticos R-12 chegou na noite de 8 de setembro, seguido por um segundo em 16 de setembro. O R-12 era um míssil balístico de alcance médio, capaz de transportar uma ogiva termonuclear."
    USA_SPA_form.t:0 "O Pacto de Madri?"
    USA_SPA_form.d:0 "O Pacto de Madri, assinado em 23 de setembro de 1953 pela Espanha franquista e os Estados Unidos, foi um esforço significativo para romper o isolamento internacional da Espanha após a Segunda Guerra Mundial, juntamente com o Concordata de 1953. O acordo de 1953 tomou a forma de três acordos executivos separados, que comprometiam os Estados Unidos a fornecer ajuda econômica e militar à Espanha. Os Estados Unidos, por sua vez, seriam autorizados a construir e utilizar bases aéreas e navais em território espanhol."
    USA_ROC_form.t:0 "O Tratado de Defesa Mútua Sino-Americano?"
    USA_ROC_form.d:0 "O Tratado de Defesa Mútua entre os Estados Unidos e a República da China foi um pacto de defesa assinado entre os Estados Unidos e a República da China (Taiwan), vigente de 1955 a 1980. Destinava-se a defender a ilha de Taiwan de uma invasão pela República Popular da China."
    SOV_PRC_form.t:0 "O Tratado de Amizade Sino-Soviético?"
    SOV_PRC_form.d:0 "O Tratado Sino-Soviético de Amizade, Aliança e Assistência Mútua foi um tratado bilateral de aliança, segurança coletiva, ajuda e cooperação firmado entre a República Popular da China e a União das Repúblicas Socialistas Soviéticas, em 14 de fevereiro de 1950."
    SOV_NVM_form.t:0 "O Tratado de Amizade Soviético-Vietnamita?"
    SOV_NVM_form.d:0 "A União Soviética foi o primeiro país, junto com seus Estados satélites na Europa Oriental e a recém-estabelecida República Popular da China, a reconhecer diplomaticamente a República Democrática do Vietnã durante a Primeira Guerra da Indochina, em janeiro de 1950."
    USA_YUG_form.t:0 "O Degelo Americano-Iugoslavo?"
    USA_YUG_form.d:0 "A ruptura Tito-Stalin de 1948 representou o grande ponto de virada nas relações entre os Estados Unidos e a nova república socialista. A Iugoslávia solicitou pela primeira vez assistência dos Estados Unidos no verão de 1948. A administração Truman decidiu fornecer ajuda substancial, empréstimos e assistência militar à Iugoslávia. Isso marcou o início da ajuda militar dos EUA a uma nação comunista, a fim de neutralizar as ambições soviéticas na região, levando a maiores avanços nas relações entre os Estados Unidos e a Iugoslávia. Tito recebeu o apoio dos EUA na bem-sucedida candidatura da Iugoslávia a um assento no Conselho de Segurança das Nações Unidas em 1949, contra a oposição soviética. Em 1949, os Estados Unidos concederam empréstimos à Iugoslávia, e em 1950 os empréstimos foram aumentados e seguidos por grandes doações e ajuda militar."
    PRC_PB_form.t:0 "Formar a Sinosfera?"
    PRC_PB_form.d:0 "Em 1956, o líder soviético Nikita Khrushchov denunciou Stalin e o stalinismo. Mao e a liderança chinesa ficaram horrorizados à medida que a RPC e a URSS divergiam progressivamente em suas interpretações e aplicações da teoria leninista. Em 1961, suas diferenças ideológicas intransponíveis provocaram a denúncia formal da RPC ao comunismo soviético como obra de "traidores revisionistas" na URSS. Para os países do Bloco Oriental, a cisão sino-soviética era uma questão de quem lideraria a revolução pelo comunismo mundial, e a quem (China ou URSS) os partidos vanguardistas do mundo recorreriam em busca de conselho político, ajuda financeira e assistência militar. Nesse sentido, ambos os países competiam pela liderança do comunismo mundial por meio dos partidos vanguardistas nativos dos países em suas esferas de influência."
    NAM_PB_form.t:0 "O Movimento dos Países Não Alinhados?"
    NAM_PB_form.d:0 "O Movimento dos Países Não Alinhados (MNA) foi fundado com o objetivo de promover os interesses dos países em desenvolvimento no contexto do confronto da Guerra Fria. Em suas três primeiras décadas, o Movimento desempenhou um papel crucial na descolonização, na formação de novos Estados independentes e na democratização das relações internacionais."
    USA_SOV_INF.t:0 "O Tratado de Forças Nucleares de Alcance Intermediário?"
    USA_SOV_INF.d:0 "O Tratado de Forças Nucleares de Alcance Intermediário (Tratado INF) foi um tratado de controle de armas entre os Estados Unidos e a União Soviética (e seu Estado sucessor, a Federação Russa). O Presidente dos EUA Ronald Reagan e o Secretário-Geral soviético Mikhail Gorbachov assinaram o tratado em 8 de dezembro de 1987. O Senado dos EUA aprovou o tratado em 27 de maio de 1988, e Reagan e Gorbachov o ratificaram em 1º de junho de 1988. O Tratado INF proibiu todos os mísseis balísticos, mísseis de cruzeiro e lançadores de mísseis nucleares e convencionais lançados por terra das duas nações, com alcances de 500 a 1.000 quilômetros (curto-médio alcance) e 1.000 a 5.500 km (alcance intermediário). O tratado não se aplicava a mísseis lançados por ar ou mar."
    USA_SOV_START.t:0 "O Tratado de Redução de Armas Estratégicas?"
    USA_SOV_START.d:0 "O START I (Tratado de Redução de Armas Estratégicas) foi um tratado bilateral entre os Estados Unidos e a União Soviética sobre a redução e limitação de armas ofensivas estratégicas. O tratado foi assinado em 31 de julho de 1991 e entrou em vigor em 5 de dezembro de 1994. O tratado proibia seus signatários de posicionar mais de 6.000 ogivas nucleares e um total de 1.600 mísseis balísticos intercontinentais (ICBMs) e bombardeiros. O START negociou o maior e mais complexo tratado de controle de armas da história, e sua implementação final, no final de 2001, resultou na remoção de cerca de 80% de todas as armas nucleares estratégicas então existentes."
    USA_CNG_form.t:0 "Intervenção da ONU na Crise do Congo?"
    USA_CNG_form.d:0 "A Operação das Nações Unidas no Congo foi uma força de manutenção da paz da ONU implantada na República do Congo em 1960, em resposta à Crise do Congo. A ONUC foi a primeira missão de manutenção da paz da ONU com capacidade militar significativa, e continua sendo uma das maiores operações da ONU em tamanho e escopo."
    GBR_FPDA_form.t:0 "Os Acordos de Defesa das Cinco Potências?"
    GBR_FPDA_form.d:0 "Os Acordos de Defesa das Cinco Potências (FPDA) são uma série de relações de defesa bilaterais estabelecidas por uma série de acordos multilaterais entre os países da Commonwealth Austrália, Malásia, Nova Zelândia, Singapura e Reino Unido. O FPDA foi criado após o fim das garantias de defesa do Reino Unido à Malaia, sob o Acordo Anglo-Malaio de Defesa, como resultado da decisão do RU em 1967 de retirar suas forças armadas a leste de Suez, em 1º de novembro de 1971. Sob os Acordos de Defesa das Cinco Potências, as cinco nações-membro (Austrália, Malásia, Nova Zelândia, Singapura e Reino Unido) concordaram em se consultar mutuamente em caso de agressão armada contra a Malásia e Singapura."
    USA_ANZUS_form.t:0 "A Aliança ANZUS?"
    USA_ANZUS_form.d:0 "O Tratado de Segurança entre Austrália, Nova Zelândia e Estados Unidos (ANZUS ou Tratado ANZUS) é um acordo de segurança coletiva entre a Austrália, a Nova Zelândia e os Estados Unidos, assinado em 1951. Ele, em primeiro lugar, reafirma o compromisso das partes com os propósitos das Nações Unidas, proibindo o uso da força ou de ameaças, exceto em legítima defesa."
    vietnam_laos_form.t:0 "O Tratado de Amizade entre Laos e Vietnã?"
    vietnam_laos_form.d:0 "Assinado em 18 de julho de 1977, em Vientiane, o Tratado de Amizade e Cooperação entre Laos e Vietnã formalizou a estreita aliança entre a República Democrática Popular do Laos e a República Socialista do Vietnã. Estabeleceu cooperação de longo prazo nos campos político, econômico, cultural e de segurança, refletindo os laços profundos forjados durante sua luta conjunta pela independência."
    turkey_northern_cyprus_form.t:0 "A Invasão Turca de Chipre?"
    turkey_northern_cyprus_form.d:0 "A Turquia invadiu Chipre em 20 de julho de 1974, em uma operação que se desenrolou em duas fases ao longo do mês seguinte. Ocorrendo em um contexto de violência intercomunitária entre cipriotas gregos e turcos, e em resposta a um golpe de Estado cipriota patrocinado pela junta grega cinco dias antes, levou à captura e ocupação turca da parte norte da ilha."
    greece_cyprus_form.t:0 "O Estado Fantoche em Chipre?"
    greece_cyprus_form.d:0 "Um golpe de Estado militar patrocinado pela junta militar grega foi executado pela Guarda Nacional Cipriota em 15 de julho de 1974. Os conspiradores do golpe destituíram o então Presidente de Chipre, o Arcebispo Makarios III, e instalaram o nacionalista pró-Enosis Nikos Sampson. O regime Sampson foi descrito como um Estado fantoche, cujo objetivo final era a anexação da ilha pela Grécia; no curto prazo, os golpistas proclamaram o estabelecimento da "República Helênica de Chipre"."

