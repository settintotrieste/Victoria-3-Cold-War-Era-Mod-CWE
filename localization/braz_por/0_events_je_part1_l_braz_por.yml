    regime_change_failsafe.t: "O Novo Regime em [ROOT.GetCountry.GetNameNoFormatting]"
    regime_change_failsafe.d: "Com a derrota de [ROOT.GetCountry.GetName] em um(a) [concept_war] recente, na qual o(a) [concept_war_goal] de [concept_regime_change] foi imposto(a), a potência estrangeira vitoriosa, [SCOPE.sCountry('foreign_power_regime_change').GetName], instalou um novo regime em [ROOT.GetCountry.GetName]. Este novo regime possui o(a) mesmo(a) [concept_government_type] e [Concept('concept_law', '$concept_laws$')] que [SCOPE.sCountry('foreign_power_regime_change').GetName]. Além disso, um(a) [concept_politician] do(a) mesmo(a) [concept_interest_group] que o(a) [concept_ruler] de [SCOPE.sCountry('foreign_power_regime_change').GetName] será instalado(a) como o(a) novo(a) [concept_ruler] de [ROOT.GetCountry.GetName]."
    regime_change_failsafe.f: "Este evento ocorreu porque [ROOT.GetCountry.GetName] concedeu um(a) [concept_war_goal] de [concept_regime_change]."
    regime_change_failsafe.option: "Um dia sombrio para nosso país."

    abolish_dynastic_republic.t: "Crise de Sucessão [ROOT.GetCountry.GetAdjectiveNoFormatting]"
    abolish_dynastic_republic.d: "A morte do(a) anterior [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] criou uma crise de sucessão em [ROOT.GetCountry.GetName], pois [GetPlayer.GetRuler.GetFullName], o(a) [concept_heir] do(a) falecido(a) [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')], é jovem demais para assumir o cargo. \n\nA menos que a constituição seja emendada para permitir [Concept('concept_ruler', '$concept_rulers$')] crianças (ou seja, para criar uma monarquia), a dinastia política [GetPlayer.GetRuler.GetLastName] chegará ao fim."
