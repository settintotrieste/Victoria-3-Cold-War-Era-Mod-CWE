    british_vanuatu.indy.t:0 "Dissolver o Condomínio das Novas Hébridas?"
    british_vanuatu.indy.d:0 "O Condomínio das Novas Hébridas terminou em 30 de julho de 1980, quando o território franco-britânico conquistou a independência como Vanuatu. Após décadas de administração colonial dupla desde 1906, o arquipélago dissolveu sua estrutura de condomínio, marcando a última colônia britânica do Pacífico a alcançar a soberania e o primeiro território francês da região a fazê-lo."
