    devolution_system_1.f:0 "Aceitar o pedido [SCOPE.sCulture('culture_to_release').GetName] criará um(a) $XFC$ nos(as) [concept_homeland]s [SCOPE.sCulture('culture_to_release').GetName], que serão então automaticamente convertidos ao país apropriado."
