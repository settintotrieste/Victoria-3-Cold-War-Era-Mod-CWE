    je_civil_service_system:0 "O Serviço Público [ROOT.GetCountry.GetAdjectiveNoFlag]"
    je_civil_service_system_reason:0 "O Serviço Público [ROOT.GetCountry.GetAdjective] representa a burocracia profissional que sustenta a máquina do Estado. Encarregados de implementar leis, arrecadar impostos e manter registros, os funcionários públicos buscam preservar a continuidade e a estabilidade em meio a paisagens políticas em constante mudança. \n\nChefe do Serviço Público: [SCOPE.sCharacter('head_of_civil_service').GetFullName] \n\nNota: A corrupção no Serviço Público pode ser reduzida ao promulgar [Concept('concept_law','$concept_laws$')] mais rigorosas de #y $lawgroup_corruption_policy$#!."

