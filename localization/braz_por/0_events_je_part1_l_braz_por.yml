    je_national_religious_order: "A Religião do Estado"
    je_national_religious_order_reason: "Sob a Constituição de [ROOT.GetCountry.GetName], o(a) [concept_government] designa um(a) [concept_religion] específico(a) como a religião oficial e nacional do país. Esta religião de Estado é administrada e liderada pelo(a) [SCOPE.GetRootScope.GetCountry.GetCustom('religious_leader_title_custom_title')] de [ROOT.GetCountry.GetNameNoFormatting], que é o clérigo principal de [ROOT.GetCountry.GetName]. \n\nO(A) [concept_government] apoia a religião de Estado com ajuda financeira e outros privilégios, concedendo ao(à) [concept_government] influência significativa sobre os assuntos do órgão dirigente da religião de Estado, incluindo questões de doutrina, ordem e culto. Isso também dá ao(à) [concept_government] a capacidade de demitir o(a) atual [SCOPE.GetRootScope.GetCountry.GetCustom('religious_leader_title_custom_title')] de [ROOT.GetCountry.GetNameNoFormatting]. \n\nNota: Um Radicalismo Religioso mais alto aumenta a chance de um(a) [SCOPE.GetRootScope.GetCountry.GetCustom('religious_leader_title_custom_title')] $ideology_agitator_anti_human_rights$, $ideology_agitator_nationalist$, $ideology_agitator_pro_war_rights$ ou $ideology_agitator_theocrat$ surgir em [ROOT.GetCountry.GetName]. \n\nNota: O Radicalismo Religioso aumenta quando o(a) [concept_approval] do(a) [concept_interest_group] [GetInterestGroupVariant('ig_devout',GetPlayer).GetNameWithCountryVariant] é negativo(a), e diminui quando o(a) [concept_approval] é positivo(a)."
