    rio_pact_member:0 "Membro do Pacto do Rio"
    rio_pact_leader:0 "Líder do Pacto do Rio"
    form_rio_pact_decision:0 "Formar o Tratado Interamericano de Assistência Recíproca"
    form_rio_pact_decision_desc:0 "O Tratado Interamericano de Assistência Recíproca (comumente conhecido como Pacto do Rio) é um acordo assinado em 1947, no Rio de Janeiro, entre diversos países das Américas. O princípio central contido em seus artigos é que um ataque contra um deles deve ser considerado um ataque contra todos. Isso ficou conhecido como a doutrina da "defesa hemisférica". Apesar disso, vários membros violaram o tratado em múltiplas ocasiões. O tratado foi inicialmente criado em 1947 e entrou em vigor em 1948, de acordo com o Artigo 22 do tratado."
