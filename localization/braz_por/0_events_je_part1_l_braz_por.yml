    je_german_unification:0 "Reunificação Alemã"
    je_german_unification_reason:0 "Após a Segunda Guerra Mundial, a Alemanha foi dividida em Oriental e Ocidental (Berlim também foi dividida), simbolizando a divisão mais ampla da Guerra Fria entre as esferas soviética e ocidental. Apesar do crescimento econômico e da consolidação política em ambos os lados, muitos alemães aspiravam à reunificação, buscando restaurar a unidade nacional, a identidade compartilhada e um futuro além do confronto ideológico."

    je_austrian_unification:0 "Reunificação Austríaca"
    je_austrian_unification_reason:0 "A Áustria foi dividida em zonas de ocupação após a Segunda Guerra Mundial, administradas pelas potências Aliadas. A aspiração à reunificação refletia o desejo de restaurar a soberania, consolidar a governança e superar o controle externo rumo a um Estado austríaco unificado."

    je_chinese_unification:0 "Reunificação Chinesa"
    je_chinese_unification_reason:0 "Após a Guerra Civil Chinesa, governos rivais surgiram na República da China e na República Popular da China. A questão da reunificação centra-se em resolver reivindicações concorrentes, integrar sistemas políticos e redefinir o papel da China na ordem internacional."

    je_vietnamese_unification:0 "Reunificação Vietnamita"
    je_vietnamese_unification_reason:0 "O Vietnã foi dividido em Norte e Sul após o domínio colonial e o conflito subsequente. A reunificação representou o esforço para superar a divisão ideológica, estabelecer um único governo e reconstruir a nação sob uma liderança unificada."

    je_korean_unification:0 "Reunificação Coreana"
    je_korean_unification_reason:0 "A Península Coreana foi dividida em Norte e Sul após a Segunda Guerra Mundial, refletindo as rivalidades da Guerra Fria. A reunificação permanece como uma aspiração de restaurar a unidade nacional, reconciliar diferenças políticas e remodelar a dinâmica regional no Leste Asiático."

    je_yemeni_unification:0 "Reunificação Iemenita"
    je_yemeni_unification_reason:0 "O Iêmen do Norte e o Iêmen do Sul se desenvolveram separadamente através de trajetórias políticas diferentes. A reunificação buscou fundir esses estados em uma única nação, equilibrando governança, integração econômica e estabilidade regional na Península Arábica."

    je_german_unification_button:0 "Reunificar a Alemanha"
    je_german_unification_button_desc:0 "Iniciar o processo de reunificação alemã. Esta ação fundirá os estados alemães divididos em uma única nação, alterando estruturas políticas, arranjos econômicos e relações diplomáticas de acordo com a nova realidade."
