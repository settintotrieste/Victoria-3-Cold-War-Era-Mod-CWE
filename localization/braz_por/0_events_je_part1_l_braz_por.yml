    install_new_royal_dynasty.t:0 "O Novo Regime [SCOPE.sCountry('target_country').GetAdjectiveNoFlag]"
    install_new_royal_dynasty.d:0 "Como [ROOT.GetCountry.GetName] recentemente impôs um(a) [concept_war_goal] de $regime_change$ a [SCOPE.sCountry('target_country').GetName], o(a) [concept_government] [ROOT.GetCountry.GetAdjective] pode agora decidir sobre o tipo de governo apropriado para [SCOPE.sCountry('target_country').GetName]. Alguns defendem a instalação de uma monarquia amiga, outros uma república, e outros ainda um(a) [concept_personal_union] entre nossos dois países."
    install_new_royal_dynasty.f:0 "Este evento ocorreu porque [ROOT.GetCountry.GetName] é uma monarquia que instalou um novo regime em outro(a) [concept_country]."
