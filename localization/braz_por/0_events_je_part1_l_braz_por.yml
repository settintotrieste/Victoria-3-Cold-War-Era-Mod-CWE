    historical_interstate_wars.option.1:0 "Declarar guerra!"
    historical_interstate_wars.option.2:0 "A paz é uma escolha preferível."
    historical_interstate_wars_accept.option.1:0 "Aceitar o ultimato"
    historical_interstate_wars_reject.option.2:0 "A paz nunca foi uma opção. Hora da GUERRA!"

    austria_formation.t:0 "Independência da Áustria?"
    austria_formation.d:0 "Em 15 de maio de 1955, as Quatro Potências (Estados Unidos, Grã-Bretanha, França e União Soviética) assinaram o Tratado de Estado Austríaco em Viena, que encerrou a ocupação das quatro potências e declarou a Áustria um Estado livre, independente e neutro."
    austria_formation.option.1:0 "Queremos um Estado austríaco unificado, democrático e neutro"
    austria_formation.option.2:0 "Manter a Áustria dividida!"
    austria_formation_1946.t:0 "O Segundo Acordo de Controle?"
    austria_formation_1946.d:0 "Em 28 de junho de 1946, os Aliados assinaram o Segundo Acordo de Controle, que reduziu seu domínio sobre o governo austríaco. O Parlamento foi, de fato, liberado do controle Aliado. A partir de então, suas decisões só poderiam ser anuladas por voto unânime de todos os quatro Aliados. Vetos soviéticos eram rotineiramente anulados pela oposição ocidental. Nos nove anos seguintes, o país foi gradualmente se emancipando do controle estrangeiro, evoluindo de uma "nação sob tutela" para a independência plena."
    austria_formation_1946.option.1:0 "Unificar as zonas de ocupação."
    austria_formation_1946.option.2:0 "Manter a Áustria dividida!"

    united_states_formation_hawaii.t:0 "O Havaí Obtém a Condição de Estado dos EUA?"
    united_states_formation_hawaii.d:0 "O Presidente Eisenhower declarou seu apoio à ideia de condição de Estado para o Havaí no início de seu governo, mas a legislação apropriada não conseguiu passar pelo Congresso até o Hawaii Admission Act de 1959. O Presidente Eisenhower sancionou o projeto de lei em 18 de março de 1959. Em junho de 1959, os cidadãos do Havaí votaram em um referendo para aceitar o projeto de condição de Estado, e em 21 de agosto de 1959, o Presidente Eisenhower assinou a proclamação oficial admitindo o Havaí como o 50º Estado."
    united_states_formation_alaska.t:0 "O Alasca Obtém a Condição de Estado dos EUA?"
    united_states_formation_alaska.d:0 "O Presidente Eisenhower declarou seu apoio à ideia de condição de Estado para o Alasca no início de seu governo, mas também expressou preocupações que precisavam ser superadas antes que isso pudesse ocorrer. A maior preocupação era a questão da segurança nacional, já que o Alasca fazia fronteira com a União Soviética. Outra preocupação era a quantidade de terras públicas no território, sendo necessário um compromisso adequado para transferir terras não reservadas ao novo governo estadual. Em 3 de janeiro de 1959, ele assinou a proclamação oficial admitindo o Alasca como o 49º Estado."
    united_states_formation.option.1:0 "Sim"
    united_states_formation.option.2:0 "Não"

    tanzania_formation_zanzibar.t:0 "União de Tanganica e Zanzibar?"
    tanzania_formation_zanzibar.d:0 "A República Unida da Tanzânia foi formada em 26 de abril de 1964, como resultado da União de Tanganica e Zanzibar. Julius Nyerere tornou-se o primeiro Presidente, e o Sheikh Abeid Karume tornou-se o Primeiro Vice-Presidente e Presidente do Conselho Revolucionário."
    tanzania_formation.option.1:0 "Sim"
    tanzania_formation.option.2:0 "Não"

    india_formation_sikkim.t:0 "União da Índia e Siquim?"
    india_formation_sikkim.d:0 "A Índia assumiu o controle do Siquim em abril de 1973 e derrubou a monarquia. Em 9 de abril de 1975, o Parlamento do Siquim anunciou a deposição do rei e declarou que o Siquim havia se tornado parte da Índia por meio de um referendo manipulado. Em 16 de maio, o parlamento indiano anunciou que o Siquim havia se tornado oficialmente um Estado da Índia."
    india_formation.option.1:0 "Sim"
    india_formation.option.2:0 "Não"

    HUN_1956_revolution.t:0 "A Revolução Húngara?"
    HUN_1956_revolution.d:0 "A Revolução Húngara de 1956 foi uma tentativa de revolução em todo o país contra o governo da República Popular da Hungria (1949-1989) e as políticas causadas pela subordinação do governo à União Soviética (URSS). O levante durou 12 dias antes de ser esmagado por tanques e tropas soviéticas em 4 de novembro de 1956."
    HUN_2010_revolution.t:0 "A Ascensão de Viktor Orbán?"
    HUN_2010_revolution.d:0 "Viktor Mihály Orbán é um advogado e político húngaro que é Primeiro-Ministro da Hungria desde 2010. Desde 2010, Orbán tem minado a democracia, enfraquecido a independência judicial e restringido a liberdade de imprensa na Hungria. Durante o segundo mandato de Orbán como primeiro-ministro, várias reformas constitucionais e legislativas controversas foram realizadas, incluindo as emendas de 2013 à Constituição da Hungria."

    CZH_1968_revolution.t:0 "A Primavera de Praga?"
    CZH_1968_revolution.d:0 "A Primavera de Praga foi um período de liberalização política e protestos em massa na República Socialista Tchecoslovaca. Começou em 5 de janeiro de 1968, quando o reformista Alexander Dubček foi eleito Primeiro-Secretário do Partido Comunista da Tchecoslováquia (KSČ), e continuou até 21 de agosto de 1968, quando a União Soviética e a maioria dos membros do Pacto de Varsóvia invadiram o país para suprimir as reformas."
    CZH_1968_revolution_1.t:0 "A Ascensão de Alexander Dubček?"
    CZH_1968_revolution_1.d:0 "Em janeiro de 1968, as questões de liderança e reforma foram entregues ao Comitê Central do Partido Tchecoslovaco. Eles votaram uma moção de desconfiança em Novotný, separando as funções de presidente e líder do partido. Ele permaneceu como presidente, mas foi substituído por Dubček como Primeiro-Secretário. Novotný resistiu, tentando mobilizar elementos do exército para evitar a perda de poder. Ironicamente, a investigação sobre isso levou à completa remoção de Novotný do cargo alguns meses depois."
    CZH_1969_revolution.t:0 "A Normalização da Tchecoslováquia?"
    CZH_1969_revolution.d:0 "Quando Husák substituiu Dubček como líder do KSČ em abril de 1969, seu regime agiu rapidamente para 'normalizar' a situação política do país. Os principais objetivos da normalização de Husák eram a restauração do domínio firme do partido e o restabelecimento do status da Tchecoslováquia como membro comprometido do bloco socialista. Nos dois anos seguintes à invasão, a nova liderança revogou algumas leis reformistas (como o National Front Act e o Press Act) e simplesmente não aplicou outras. Ela devolveu empresas econômicas, que haviam recebido independência substancial durante a Primavera de Praga, ao controle centralizado por meio de contratos baseados em planejamento central e cotas de produção."
    CZH_1969_revolution_1.t:0 "A Federação Tchecoslovaca?"
    CZH_1969_revolution_1.d:0 "A promulgação da Lei Constitucional da Federação emendou cinquenta e oito artigos da Constituição da Tchecoslováquia de 1960 relativos à estrutura do governo. O Estado tchecoslovaco foi declarado uma federação de "duas nações fraternas iguais", a República Socialista Tcheca e a República Socialista Eslovaca, cada uma com uma administração nacional paralela e, ao menos em teoria, de status igual ao do governo federal. A dupla cidadania foi estabelecida. Muitas das antigas funções do governo central foram, em vez disso, colocadas sob a jurisdição dos dois governos nacionais. O governo federal manteve jurisdição exclusiva sobre relações exteriores, defesa nacional, reservas federais e recursos nacionais."

    BUL_1954_revolution.t:0 "A Linha de Abril?"
    BUL_1954_revolution.d:0 "Após a morte de Joseph Stalin, surgiu uma ênfase na liderança compartilhada. Quando o linha-dura stalinista Chervenkov abandonou seu cargo de Secretário-Geral do PCB em 1954, Zhivkov tomou seu lugar, mas Chervenkov manteve a maior parte de seus poderes como primeiro-ministro. Após Nikita Khrushchov proferir seu famoso discurso secreto contra Stalin no 20º Congresso do Partido Comunista da União Soviética, uma reunião plenária do Comitê Central do PCB foi convocada em abril de 1956 para concordar em adotar uma nova linha khrushchovista. Naquele plenário, Zhivkov criticou Chervenkov como um discípulo de Stalin, rebaixando-o de primeiro-ministro para um cargo ministerial. Posteriormente, Zhivkov conduziu uma política de relativa liberalização sociopolítica e desestalinização na Bulgária, semelhante ao Degelo de Khrushchov na União Soviética."
    BUL_1965_revolution.t:0 "A Conspiração de Abril?"
    BUL_1965_revolution.d:0 "Com o fortalecimento crescente da posição de Zhivkov como líder do país e do partido comunista, antigos líderes partisans e militares na ativa assumiram uma postura crítica em relação ao que viam como políticas revisionistas da liderança de Zhivkov. Nos eventos descritos como a "Conspiração de Abril" de 1965, o general Ivan Todorov-Gorunya, o general Tsvyatko Anev e Tsolo Krastev organizaram um grupo de oficiais militares de alta patente com planos de derrubar o regime. O plano deles era estabelecer uma liderança pró-chinesa no país, baseada em princípios stalinistas-maoístas. O golpe foi exposto, e entre 28 de março e 12 de abril de 1965, a maioria dos conspiradores foi presa e expulsa do partido."

    BYE_1994_revolution.t:0 "Presidência de Alexander Lukashenko?"
    BYE_1994_revolution.d:0 "Antes de embarcar em sua carreira política, Lukashenko trabalhou como diretor de uma fazenda estatal (sovkhoz) e serviu tanto nas Tropas de Fronteira Soviéticas quanto no Exército Soviético. Em 1990, Lukashenko foi eleito para o Soviete Supremo da República Socialista Soviética da Bielorrússia. Após a dissolução da União Soviética, assumiu a posição de chefe do comitê interino anticorrupção do Conselho Supremo de Belarus. Em 1994, venceu a presidência na primeira eleição presidencial do país, após a adoção de uma nova constituição."

    NEJ_1964_revolution.t:0 "A Abdicação do Rei Saud?"
    NEJ_1964_revolution.d:0 "Sob o reinado de Saud, a Arábia Saudita ingressou no Movimento dos Países Não Alinhados em 1961. No entanto, a incapacidade de Saud de conter a dívida nacional saudita o levou a uma disputa de poder com seu meio-irmão e príncipe herdeiro, Faisal, culminando na abdicação forçada de Saud e na proclamação de Faisal como rei. Saud partiu para o exílio e fez uma tentativa malsucedida, apoiada por alguns de seus filhos, de retomar o trono."
    NEJ_1975_revolution.t:0 "O Assassinato do Rei Faisal?"
    NEJ_1975_revolution.d:0 "Em 25 de março de 1975, o Rei foi baleado à queima-roupa e morto por Faisal bin Musaid, filho de seu meio-irmão Musaid bin Abdulaziz. Ele havia acabado de voltar dos Estados Unidos. O assassinato ocorreu em um majlis (literalmente 'um lugar para sentar-se'), um evento em que o rei ou líder abre sua residência para que os cidadãos entrem e lhe façam petições."
    NEJ_2005_revolution.t:0 "A Morte do Rei Fahd"
    NEJ_2005_revolution.d:0 "O Rei Fahd foi internado no Hospital Especializado King Faisal, em Riad, em 27 de maio de 2005, em "estado estável, porém grave", para exames médicos não especificados. Um funcionário (que insistiu no anonimato) informou extraoficialmente à Associated Press que o rei havia morrido às 7h30 de 1º de agosto de 2005, aos 84 anos. O comunicado oficial foi anunciado na televisão estatal às 10h pelo Ministro da Informação Iyad Madani."

    QAT_1960_revolution.t:0 "A Abdicação de Ali bin Abdullah Al Thani?"
    QAT_1960_revolution.d:0 "Em maio de 1960, um primo do Sheikh Ali tentou assassiná-lo com uma arma de fogo na residência de férias do Sheikh em Beirute. A tentativa de assassinato estaria supostamente relacionada a questões financeiras. Ele abdicou em favor de Ahmad bin Ali Al Thani em 28 de outubro de 1960."
    QAT_1972_revolution.t:0 "O Golpe de Estado Catariano?"
    QAT_1972_revolution.d:0 "O Sheikh Khalifa depôs o Sheikh Ahmad em 22 de fevereiro de 1972, em um golpe de Estado incruento. Na época, o Sheikh Ahmad estava no Irã em uma viagem de caça. Após sua deposição, o Sheikh Ahmad viveu em exílio autoimposto em Dubai com sua esposa – filha do falecido Governante de Dubai – e seus filhos."
    QAT_1995_revolution.t:0 "O Golpe de Estado Catariano?"
    QAT_1995_revolution.d:0 "Enquanto Khalifa bin Hamad Al Thani estava hospedado em Genebra, Suíça, em junho de 1995, seu filho Hamad bin Khalifa tomou o poder em outro golpe de Estado incruento. Hamad bin Khalifa acusou seu pai de traição e exigiu que a Interpol o prendesse. Ele acusou seu pai de 4 crimes que incluíam sua execução."
    QAT_2013_revolution.t:0 "A Abdicação de Hamad bin Khalifa Al Thani?"
    QAT_2013_revolution.d:0 "Em 25 de junho de 2013, o Sheikh Hamad bin Khalifa Al Thani abdicou como Emir do Catar, transferindo o poder para seu filho, o Sheikh Tamim bin Hamad Al Thani. O raro movimento voluntário na política do Golfo marcou uma mudança geracional, posicionando o Catar para a continuidade em meio à turbulência regional e à expansão global."

    MOR_1953_revolution.t:0 "O Golpe de Mohammed Ben Aarafa?"
    MOR_1953_revolution.d:0 "Ben Arafa foi colocado no trono alauita em 21 de agosto de 1953, após seu primo Mohammed V ser deposto pelas autoridades francesas, que mantinham um protetorado no Marrocos sob o Tratado de Fez de 1912. O General Augustin Guillaume, que havia sido residente-geral do Marrocos desde 1951, entrara em conflito com Mohammed V devido ao apoio deste ao movimento de independência marroquino, e liderou uma campanha para derrubá-lo, apoiada pelos colonos franceses e por alguns líderes marroquinos, como Thami El Glaoui, o Paxá de Marrakech."
    MOR_1955_revolution.t:0 "A Derrubada de Mohammed Ben Aarafa?"
    MOR_1955_revolution.d:0 "Devido à falta de legitimidade ou popularidade de Ben Arafa junto à população marroquina, bem como aos crescentes vínculos entre a violência no Marrocos e a da Tunísia e a Guerra da Argélia, as autoridades francesas passaram a considerar depô-lo e restaurar Mohammed V em 1955. Gilbert Grandval, que havia sido nomeado o novo residente-geral, decidiu se reunir com o Grão-Vizir Muhammad al-Muqri. Al-Muqri viajou à França e se encontrou com Grandval em Vichy, indicando que Ben Arafa precisava partir, dada a agitação popular em todo o país, e previa-se que Mohammed V seria restaurado ao poder. Em 1º de outubro, Ben Arafa abdicou."
    MOR_1961_revolution.t:0 "A Morte do Rei Mohammed V"
    MOR_1961_revolution.d:0 "Em 26 de fevereiro de 1961, Mohammed morreu de complicações de uma cirurgia banal no septo nasal, realizada por um cirurgião de Vaud. Sua morte foi anunciada na rádio nacional por seu filho, o príncipe herdeiro Moulay Hassan, que o sucedeu como Rei Hassan II."
    MOR_1970_revolution.t:0 "O Retorno das Eleições Parlamentares?"
    MOR_1970_revolution.d:0 "Eleições parlamentares foram realizadas no Marrocos em 21 de agosto de 1970. Seguiram-se à adoção de uma nova constituição em um referendo em julho. A nova Assembleia de Representantes tinha 240 membros: 90 eleitos diretamente em círculos uninominais por voto público, 90 eleitos por vereadores locais e 60 eleitos por quatro colégios profissionais (24 pelas Câmaras de Agricultura, 16 pelas Câmaras de Comércio e Indústria, 10 pelas Câmaras de Artesãos e 10 por representantes dos assalariados)."
    MOR_2011_revolution.t:0 "O Referendo Constitucional Marroquino?"
    MOR_2011_revolution.d:0 "Um referendo sobre reformas constitucionais foi realizado no Marrocos em 1º de julho de 2011, convocado pelo rei em resposta a uma série de protestos em todo o Marrocos, iniciados em 20 de fevereiro de 2011, quando mais de dez mil marroquinos participaram de manifestações exigindo reformas democráticas."

    ALG_1965_revolution.t:0 "O Golpe de Estado Argelino?"
    ALG_1965_revolution.d:0 "O golpe de Estado argelino de 1965 trouxe o Coronel Houari Boumédiène ao poder como Presidente do Conselho Revolucionário na Argélia. O golpe de Estado incruento viu o primeiro Presidente da Argélia, Ahmed Ben Bella, ser preso e seus apoiadores mais próximos encarcerados por Boumédiène e seus aliados, principalmente nas Forças Terrestres Argelinas."
    ALG_1992_revolution.t:0 "A Guerra Civil Argelina?"
    ALG_1992_revolution.d:0 "A Guerra Civil Argelina foi uma guerra civil travada entre o governo argelino e vários grupos rebeldes islamistas, de 11 de janeiro de 1992 (após um golpe que anulou uma vitória eleitoral islamista) a 8 de fevereiro de 2002. A guerra começou lentamente, pois inicialmente parecia que o governo havia esmagado com sucesso o movimento islamista, mas grupos armados surgiram para declarar jihad, e por volta de 1994, a violência havia atingido um nível tal que parecia que o governo poderia não conseguir resistir."

    JOR_1951_revolution.t:0 "O Assassinato de Abdullah I da Jordânia?"
    JOR_1951_revolution.d:0 "Em 20 de julho de 1951, Abdullah I, o primeiro Rei da Jordânia, foi assassinado enquanto visitava a Mesquita Al-Aqsa em Jerusalém. Abdullah estava em Jerusalém para fazer um elogio fúnebre no funeral de Riad Al Solh, o primeiro Primeiro-Ministro do Líbano. Ele estava participando das orações de sexta-feira na mesquita com seu neto, o Príncipe Hussein. Abdullah foi fatalmente baleado três vezes na cabeça e no peito. O assassino, Mustafa Shukri Ashu, de 21 anos, foi morto a tiros pelos guarda-costas do Rei. O assassinato levou a uma crise de sucessão devido à doença mental de seu filho Talal."
    JOR_1952_revolution.t:0 "A Abdicação de Talal da Jordânia?"
    JOR_1952_revolution.d:0 "O Rei Talal da Jordânia abdicou em 1952 devido a doença mental, após um breve reinado seguido ao assassinato de seu pai. O Parlamento, liderado pelo Primeiro-Ministro Tawfik Abu Al-Huda, declarou-o incapaz de governar após sinais de paranoia e comportamento errático. Seu filho Hussein o sucedeu, iniciando um longo e transformador reinado."
    JOR_1956_revolution.t:0 "A Arabização do Exército Jordaniano?"
    JOR_1956_revolution.d:0 "A arabização do comando do Exército Jordaniano viu a demissão de oficiais britânicos seniores que comandavam a Legião Árabe pelo Rei Hussein, e a subsequente renomeação da Legião para Forças Armadas Jordanianas em 1º de março de 1956. Glubb Pasha, o comandante britânico da Legião Árabe, foi substituído pelo Major-General Radi Annab, que se tornou o primeiro comandante árabe da Legião Árabe. As intenções de Hussein ao arabizar o comando do Exército eram substituir oficiais britânicos por oficiais jordanianos, afirmar a independência política em relação à Grã-Bretanha, e melhorar as relações com Estados árabes vizinhos que viam os britânicos com desconfiança. As ruas jordanianas testemunharam grandes celebrações quando a decisão foi tornada pública."
    JOR_1957_revolution.t:0 "A Purga dos Nasseristas?"
    JOR_1957_revolution.d:0 "Em abril de 1957, o Rei Hussein da Jordânia esmagou uma tentativa de golpe liderada por nasseristas, expurgando oficiais nacionalistas árabes e dissolvendo o Parlamento. A repressão, centrada em Zarqa, marcou uma guinada decisiva contra o radicalismo pan-arabista. A lei marcial se seguiu, consolidando a autoridade real e alinhando a Jordânia mais firmemente com potências regionais ocidentais e antinasseristas."
    JOR_1989_revolution.t:0 "A Primavera Jordaniana?"
    JOR_1989_revolution.d:0 "Em 18 de abril de 1989, protestos generalizados contra a austeridade e o aumento de preços eclodiram por toda a Jordânia, levando o Rei Hussein a suspender a lei marcial e restabelecer as eleições parlamentares após uma suspensão de 22 anos. A "Primavera Jordaniana" marcou uma mudança fundamental rumo à liberalização política, catalisando reformas democráticas e abrindo espaço para vozes de oposição no Reino Haxemita."
    JOR_1999_revolution.t:0 "A Morte de Hussein I da Jordânia?"
    JOR_1999_revolution.d:0 "O Rei Hussein da Jordânia morreu em 7 de fevereiro de 1999, aos 63 anos, após lutar contra o câncer. Sua morte marcou o fim de um reinado de 46 anos que moldou a Jordânia moderna. Enlutados encheram as ruas de Amã, e seu filho Abdullah II foi rapidamente empossado, garantindo uma transição suave de liderança."

    EGY_1952_revolution.t:0 "A Revolução de Julho?"
    EGY_1952_revolution.d:0 "Em 23 de julho de 1952, a revolução começou com a derrubada do Rei Farouk em um golpe de Estado pelo Movimento dos Oficiais Livres. Este grupo de oficiais do exército era liderado por Mohamed Naguib e Gamal Abdel Nasser."
    EGY_1953_revolution.t:0 "A Declaração da República?"
    EGY_1953_revolution.d:0 "A Declaração da República foi uma declaração constitucional emitida pelo Conselho de Comando Revolucionário do Egito em 18 de junho de 1953. A Declaração destronou o Rei Fuad II e transformou o Reino do Egito na República do Egito."
    EGY_1954_revolution.t:0 "A Ascensão de Gamal Abdel Nasser?"
    EGY_1954_revolution.d:0 "Em janeiro de 1953, Nasser superou a oposição de Naguib e proibiu todos os partidos políticos, criando um sistema unipartidário sob o Comício da Libertação, um movimento de estrutura frouxa cuja principal tarefa era organizar comícios e palestras pró-RCC, com Nasser como seu secretário-geral. Quando Naguib começou a mostrar sinais de independência em relação a Nasser, distanciando-se dos decretos de reforma agrária do RCC e aproximando-se das forças políticas estabelecidas do Egito, notadamente o Wafd e a Irmandade, Nasser decidiu depô-lo. Em 25 de fevereiro de 1954, Naguib anunciou sua renúncia após o RCC realizar uma reunião oficial sem sua presença dois dias antes. Em 26 de fevereiro, Nasser aceitou a renúncia, colocou Naguib em prisão domiciliar, e o RCC proclamou Nasser tanto presidente do RCC quanto primeiro-ministro."
    EGY_1970_revolution.t:0 "A Ascensão de Anwar Sadat?"
    EGY_1970_revolution.d:0 "Muhammad Anwar es-Sadat foi um político e oficial militar egípcio que serviu como o terceiro presidente do Egito, a partir de 15 de outubro de 1970. Em seus onze anos como presidente, mudou a trajetória do Egito, afastando-se de muitos dos princípios políticos e econômicos do nasserismo, reinstituindo um sistema multipartidário e lançando a política econômica Infitah."
    EGY_1981_revolution.t:0 "O Assassinato de Anwar Sadat?"
    EGY_1981_revolution.d:0 "Anwar Sadat, o 3º Presidente do Egito, foi assassinado em 6 de outubro de 1981, durante o desfile anual da vitória realizado no Cairo para celebrar a Operação Badr, na qual o Exército Egípcio havia cruzado o Canal de Suez e retomado a Península do Sinai de Israel no início da Guerra do Yom Kippur. O assassinato foi realizado por membros da Jihad Islâmica Egípcia."
    EGY_2013_revolution.t:0 "Golpe de Estado Egípcio?"
    EGY_2013_revolution.d:0 "O golpe de Estado egípcio de 2013 ocorreu em 3 de julho de 2013. O chefe do exército egípcio, General Abdel Fattah al-Sisi, liderou uma coalizão para remover do poder o Presidente do Egito democraticamente eleito, Mohamed Morsi, e suspendeu a constituição egípcia de 2012. A ação ocorreu após o ultimato dos militares para que o governo 'resolvesse suas diferenças' com os manifestantes durante protestos nacionais generalizados."

    SYR_1949_revolution.t:0 "O Golpe de Estado Sírio?"
    SYR_1949_revolution.d:0 "O golpe de Estado sírio de março de 1949 foi um golpe de Estado incruento que ocorreu em 30 de março. Foi o primeiro golpe militar na história síria moderna e derrubou o governo democraticamente eleito do país. Foi liderado pelo chefe do estado-maior do Exército Sírio, Husni al-Za'im, que se tornou presidente da Síria em 11 de abril de 1949. Entre os oficiais que auxiliaram a tomada de poder de al-Za'im estavam Sami al-Hinnawi e Adib al-Shishakli, que ambos, em sequência, também se tornariam posteriormente líderes militares do país."
    SYR_1954_revolution.t:0 "O Golpe de Estado Sírio?"
    SYR_1954_revolution.d:0 "O Coronel Adib Shishakli chegou ao poder por meio de um golpe em dezembro de 1949, formando uma autocracia militar. Como líder da Síria, Adib Shishakli reconheceu os anseios da maioria árabe da Síria e, assim, adotou uma política de pan-arabismo. O golpe de Estado sírio de 1954 ocorreu em fevereiro daquele ano para derrubar o governo de Adib Shishakli. Liderando o movimento anti-Shishakli estavam o ex-Presidente Atassi e o veterano líder druso Sultan al-Atrash."
    SYR_1955_revolution.t:0 "A Ascensão de Shukri al-Quwatli?"
    SYR_1955_revolution.d:0 "Quwatli retornou à Síria em 1955, após a deposição do Presidente Adib al-Shishakli e durante a presidência de Hashim al-Atassi. Quwatli apresentou sua candidatura nas eleições presidenciais de agosto de 1955, aos 63 anos. Necessitando garantir uma maioria de dois terços no Parlamento Sírio de 142 membros para vencer, Quwatli derrotou seu principal opositor, Khalid al-Azm, por 89 a 42 no primeiro turno. Isso levou a um segundo turno de votação, no qual Quwatli venceu a presidência com 91 votos contra 41 de Azm."
    SYR_1963_revolution.t:0 "O Golpe de Estado Sírio?"
    SYR_1963_revolution.d:0 "O golpe de Estado sírio de 1963 foi a tomada do poder na Síria pelo comitê militar do Ramo Regional Sírio do Partido Baath Socialista Árabe. O planejamento e o desdobramento da conspiração dos agentes baathistas sírios foram motivados pela tomada do poder pelo partido Baath no Iraque em fevereiro de 1963."
    SYR_1966_revolution.t:0 "O Golpe de Estado Sírio?"
    SYR_1966_revolution.d:0 "Em 23 de fevereiro de 1966, al-Hafiz foi derrubado por uma facção baathista radical liderada pelo Chefe do Estado-Maior Salah Jadid. Um telegrama de aviso tardio sobre o golpe de Estado foi enviado pelo Presidente egípcio Gamal Abdel Nasser a Nasim al-Safarjalani (o Secretário-Geral do Conselho Presidencial), na madrugada do golpe de Estado. O golpe surgiu de uma rivalidade faccional entre o campo "regionalista" (qutri) de Jadid dentro do Partido Baath, que promovia ambições de uma Grande Síria, e a facção mais tradicionalmente pan-arabista de al-Hafiz, chamada facção "nacionalista" (qawmi)."
    SYR_1970_revolution.t:0 "A Revolução Corretiva?"
    SYR_1970_revolution.d:0 "A Revolução Corretiva foi um golpe de Estado incruento liderado pelo General Hafez al-Assad em 13 de novembro de 1970, na Síria. Assad proclamou sustentar e aprimorar a "linha socialista nacionalista" do Estado e do partido Baath. O partido Baath adotou uma revisão ideológica, isentando-se da doutrina de exportação de revoluções de Salah Jadid. A nova doutrina enfatizava a derrota de Israel, mediante o desenvolvimento das forças militares sírias com o apoio da União Soviética."
    SYR_1994_revolution.t:0 "A Ascensão de Bashar al-Assad?"
    SYR_1994_revolution.d:0 "Bashar Hafez al-Assad é um ex-político, médico e oficial militar sírio. Na década de 1980, Assad se tornou médico, e no início da década de 1990 estava se especializando em oftalmologia em Londres. Em 1994, após seu irmão mais velho, Bassel al-Assad, morrer em um acidente de carro, Assad foi convocado de volta à Síria para assumir o papel de Bassel como herdeiro presuntivo."
    SYR_2000_revolution.t:0 "A Morte de Hafez al-Assad?"
    SYR_2000_revolution.d:0 "Em 10 de junho de 2000, aos 69 anos, Hafez al-Assad morreu de um ataque cardíaco enquanto falava ao telefone com o primeiro-ministro libanês al-Huss. Após a morte de Hafez al-Assad, o poder foi transferido para seu filho Bashar com o apoio de leais ao Baath, tornando a Síria a primeira república árabe a estabelecer um sistema dinástico."
    SYR_2024_revolution.t:0 "Queda do Regime Baathista?"
    SYR_2024_revolution.d:0 "Em 8 de dezembro de 2024, a Síria baathista, liderada pelo Presidente Bashar al-Assad, entrou em colapso durante uma grande ofensiva das forças de oposição. A ofensiva foi liderada pelo Tahrir al-Sham e apoiada principalmente pelo Exército Nacional Sírio, apoiado pela Turquia, como parte da contínua guerra civil síria iniciada em 2011. A captura de Damasco marcou o fim do domínio da família Assad, que havia governado a Síria como um regime totalitário hereditário desde que Hafez al-Assad assumiu o poder em 1971, após a Revolução Corretiva."

    LEB_1952_revolution.t:0 "A Ascensão de Camille Chamoun?"
    LEB_1952_revolution.d:0 "Quando o Presidente Bechara El Khoury foi forçado a renunciar devido a alegações de corrupção em 1952, Chamoun foi eleito para substituí-lo. Durante a presidência de Chamoun, o Líbano experimentou um boom econômico, particularmente nos setores de construção, bancário e de turismo. Ele implementou uma lei de 1954 sobre a criação de sociedades anônimas e uma lei de 1956 sobre o sigilo bancário."
    LEB_1989_revolution.t:0 "O Acordo de Taif?"
    LEB_1989_revolution.d:0 "O Acordo de Taif reestruturou o sistema político do Pacto Nacional no Líbano, transferindo parte do poder da comunidade cristã maronita, que havia recebido um status privilegiado no Líbano durante o período de domínio francês. Após o acordo de Taif, o Primeiro-Ministro passou a responder ao poder legislativo, como em um sistema parlamentar tradicional. Assim, o acordo mudou a fórmula de partilha de poder que favorecia os cristãos para uma proporção de 50:50 e ampliou os poderes do Primeiro-Ministro sunita em relação aos do presidente cristão."

    SUD_1958_revolution.t:0 "O Golpe de Estado Sudanês?"
    SUD_1958_revolution.d:0 "Após a independência formal, o governo parlamentar foi marcado por instabilidade política, corrupção, faccionalismo sectário e a negligência das demandas do sul por federação. A polarização entre o NUP de al-Azhari e o Partido Umma – apoiado pela ordem religiosa Ansar – paralisou o desenvolvimento econômico. O impasse parlamentar terminou abruptamente em 17 de novembro de 1958, quando o chefe do estado-maior do exército, General Ibrahim Abboud, executou um golpe de Estado incruento, estabelecendo a primeira ditadura militar do país. O Conselho Supremo das Forças Armadas, liderado por Abboud, dissolveu o parlamento, suspendeu a constituição e proibiu todos os partidos políticos."
    SUD_1964_revolution.t:0 "A Queda do General Abboud?"
    SUD_1964_revolution.d:0 "Por volta de 1964, a escalada da guerra civil no sul e o crescente descontentamento econômico corroeram severamente a credibilidade do regime militar. Em outubro, protestos em massa e uma greve geral – conhecida como Revolução de Outubro – forçaram o General Abboud a renunciar. Um governo interino de transição foi formado sob o primeiro-ministrado de Sirr al-Khatim al-Khalifa. Notavelmente, este gabinete foi o primeiro na história do Sudão a incluir representantes do Partido Comunista Sudanês, da Irmandade Muçulmana e de sindicatos."
    SUD_1969_revolution.t:0 "O Golpe de Estado Sudanês?"
    SUD_1969_revolution.d:0 "O golpe de Estado sudanês de 1969 foi um golpe bem-sucedido, liderado pelo Coronel Gaafar Nimeiry, contra o governo do Presidente Ismail al-Azhari. O golpe sinalizou o fim da segunda era democrática do Sudão, e marcou o início dos 16 anos de governo de Nimeiry. O governo de Nimeiry perseguiria um programa nacionalista árabe radical e de esquerda, implementando um programa socialista para o desenvolvimento social e econômico, incluindo a nacionalização generalizada de propriedades privadas."
    SUD_1985_revolution.t:0 "O Golpe de Estado Sudanês?"
    SUD_1985_revolution.d:0 "O golpe de Estado sudanês de 1985 foi um golpe militar ocorrido no Sudão em 6 de abril de 1985. O golpe foi encenado por um grupo de oficiais militares e liderado pelo Ministro da Defesa e Comandante-em-Chefe das Forças Armadas, Marechal de Campo Abdel Rahman Swar al-Dahab, contra o governo do Presidente Gaafar Nimeiry. "
    SUD_2019_revolution.t:0 "O Golpe de Estado Sudanês?"
    SUD_2019_revolution.d:0 "Um golpe de Estado ocorreu no Sudão no final da tarde de 11 de abril de 2019, quando o Presidente Omar al-Bashir foi derrubado pelas Forças Armadas Sudanesas após protestos populares exigirem sua saída. Naquele momento, o exército, liderado por Ahmed Awad Ibn Auf, derrubou o governo e a Legislatura Nacional e declarou estado de emergência no país por um período de 3 meses, seguido de um período de transição de dois anos até que um acordo fosse posteriormente alcançado."
    SUD_2021_revolution.t:0 "O Golpe de Estado Sudanês?"
    SUD_2021_revolution.d:0 "Em 25 de outubro de 2021, os militares sudaneses, liderados pelo General Abdel Fattah al-Burhan, tomaram o controle do Governo do Sudão em um golpe militar. Ao menos cinco altos funcionários do governo foram inicialmente detidos. O Primeiro-Ministro civil Abdalla Hamdok recusou-se a declarar apoio ao golpe e, em 25 de outubro, convocou a resistência popular; foi colocado em prisão domiciliar em 26 de outubro."

    EQG_1968_revolution.t:0 "A Presidência de Macías Nguema?"
    EQG_1968_revolution.d:0 "Francisco Macías Nguema foi um político equatoguineense que serviu como primeiro presidente da Guiné Equatorial desde a independência do país em 1968 até sua deposição em 1979. É amplamente lembrado como um dos ditadores mais brutais da história. Como presidente, exibiu comportamento bizarro e errático, a ponto de muitos de seus contemporâneos acreditarem que ele estava insano."
    EQG_1973_revolution.t:0 "A Nova Constituição da Guiné Equatorial?"
    EQG_1973_revolution.d:0 "Macias Nguema consolidou ainda mais seus poderes totalitários ao proibir partidos políticos de oposição em julho de 1970 e se tornar presidente vitalício em 1972. Isso permaneceu em vigor até o golpe de Estado de agosto de 1979, realizado por Teodoro Obiang, o chamado Golpe da Liberdade, que estabeleceu o Conselho Militar Supremo da Guiné Equatorial, embora uma nova Constituição só tenha sido aprovada em agosto de 1982."
    EQG_1979_revolution.t:0 "O Golpe de Teodoro Obiang?"
    EQG_1979_revolution.d:0 "O golpe de Estado da Guiné Equatorial de 1979 ocorreu em 3 de agosto de 1979, quando o sobrinho do Presidente Francisco Macías Nguema, Teodoro Obiang Nguema Mbasogo, o derrubou em um golpe sangrento. Os combates entre legalistas e rebeldes continuaram até Macías Nguema ser capturado enquanto fugia para os Camarões, em 18 de agosto. Ele foi condenado à morte pelo crime de genocídio contra o povo Bubi e outros crimes cometidos. Macías Nguema foi executado por fuzilamento em 29 de setembro de 1979. Teodoro permaneceu como líder desde então, inicialmente como presidente do Conselho Militar Revolucionário e do Conselho Militar Supremo, e posteriormente como presidente."

    CMR_1960_revolution.t:0 "A Presidência de Ahmadou Ahidjo?"
    CMR_1960_revolution.d:0 "Ahmadou Babatoura Ahidjo (24 de agosto de 1924 – 30 de novembro de 1989) foi um político camaronês que foi o primeiro presidente dos Camarões de 1960 a 1982. Anteriormente, havia sido o primeiro Primeiro-Ministro desde a independência do país em janeiro de 1960 até maio daquele mesmo ano, após a criação da presidência. Ahidjo desempenhou papel fundamental no estabelecimento dos Camarões como um Estado independente em 1960, bem como na integração das partes francófona e anglófona do país. Durante seu tempo no cargo, Ahidjo estabeleceu um sistema político centralizado."
    CMR_1966_revolution.t:0 "O Estado Unipartidário dos Camarões?"
    CMR_1966_revolution.d:0 "Em 1961, Ahidjo começou a defender um Estado unipartidário. Em 12 de março de 1962, Ahidjo emitiu um decreto que impedia críticas contra seu regime, dando ao governo autoridade para prender qualquer pessoa considerada culpada de subversão contra autoridades ou leis governamentais. Em julho de 1962, um grupo de líderes de partidos de oposição que haviam servido no governo com Ahidjo contestou seu apelo por um Estado unipartidário, alegando que era ditatorial. Esses líderes foram presos, julgados e encarcerados sob a acusação de subversão contra o governo. O partido político de Ahidjo, a União Nacional dos Camarões (CNU), tornou-se o único partido político legal em 1º de setembro de 1966."
    CMR_1972_revolution.t:0 "O Referendo Constitucional Camaronês?"
    CMR_1972_revolution.d:0 "Um referendo constitucional foi realizado nos Camarões em 20 de maio de 1972. A nova constituição transformaria o país em um Estado unitário, em contraste com o sistema federal anterior, além de conceder mais poderes ao Presidente Ahmadou Ahidjo. Foi supostamente aprovado por 99,99% dos votantes, com um comparecimento de 98%."
    CMR_1982_revolution.t:0 "A Renúncia de Ahmadou Ahidjo?"
    CMR_1982_revolution.d:0 "Ahidjo renunciou, ostensivamente por motivos de saúde, em 4 de novembro de 1982, sendo sucedido pelo Primeiro-Ministro Paul Biya dois dias depois. O fato de ter cedido o cargo a Biya, um cristão do sul e não um muçulmano do norte como ele próprio, foi considerado surpreendente. As reais intenções de Ahidjo não eram claras; é possível que pretendesse retornar à presidência mais tarde, quando sua saúde melhorasse, e outra possibilidade é que pretendesse que Maigari Bello Bouba, também muçulmano do norte que sucedeu Biya como Primeiro-Ministro, fosse seu eventual sucessor como presidente, com Biya efetivamente em um papel interino."

    NGE_1966_revolution.t:0 "O Golpe de Estado Nigeriano?"
    NGE_1966_revolution.d:0 "A ditadura militar na Nigéria foi um período em que membros das Forças Armadas Nigerianas detiveram o poder na Nigéria de 1966 a 1999, com um interregno de 1979 a 1983. Os militares conseguiram ascender ao poder frequentemente com o apoio tácito da elite, por meio de golpes de Estado."
    NGE_1999_revolution.t:0 "O Retorno à Democracia?"
    NGE_1999_revolution.d:0 "Devido a protestos civis massivos que efetivamente paralisaram o país por semanas. O Presidente finalmente cumpriu sua promessa de ceder o poder a um governo civil. A proibição de atividades políticas foi levantada, e presos políticos foram libertados de centros de detenção. Uma eleição foi então convocada para eleger o novo presidente."

    NIG_1960_revolution.t:0 "A Presidência de Hamani Diori?"
    NIG_1960_revolution.d:0 "Hamani Diori foi o primeiro Presidente da República do Níger. Foi nomeado para o cargo em 1960, quando o Níger obteve independência da França. Embora a corrupção fosse uma característica comum de sua administração, ele ganhou respeito internacional por seu papel como porta-voz dos assuntos africanos e como popular árbitro em conflitos."
    NIG_1974_revolution.t:0 "O Golpe de Estado Nigerino?"
    NIG_1974_revolution.d:0 "Em 15 de abril de 1974, o Tenente-Coronel Seyni Kountché liderou um golpe militar que encerrou o governo de quatorze anos de Diori. O golpe militar começou à 1h da manhã de 15 de abril, com quase todas as unidades rapidamente se declarando a favor dos líderes do golpe. A guarda pessoal do Presidente Hamani Diori, a Guarda Republicana composta inteiramente por tuaregues, foi a única unidade a resistir, sob as ordens da esposa de Diori, Aissa Diori. Ela e um pequeno número de guardas foram mortos no palácio presidencial após o amanhecer de 15 de abril. Diori, o Presidente da Assembleia Nacional, Boubou Hama, e vários outros políticos do PPN em Niamey foram presos na operação."
    NIG_1987_revolution.t:0 "A Morte de Seyni Kountché?"
    NIG_1987_revolution.d:0 "A saúde de Kountché deteriorou-se no final de 1986 e continuou a piorar durante 1987. Ele morreu em um hospital de Paris devido a um tumor cerebral, em 10 de novembro de 1987. Ali Saïbou o sucedeu e, em 14 de novembro de 1987, foi nomeado presidente do Conselho Militar Supremo (CMS)."
    NIG_1993_revolution.t:0 "O Retorno da Democracia no Níger?"
    NIG_1993_revolution.d:0 "No início de 1990, agitações estudantis e um ataque tuaregue a Tchintabaraden levaram a uma Conferência Nacional de 1991 que, em última instância, desmantelou o regime unipartidário, deixando Saibou praticamente ineficaz. Em um congresso do partido MNSD em março de 1991, Saibou conseguiu manter sua posição como líder do partido, beneficiando-se particularmente do apoio do exército. No entanto, mais tarde naquele ano, a Conferência Nacional impediu Saibou de concorrer na eleição presidencial planejada, e em outro congresso do MNSD em novembro de 1991, ele foi substituído como líder do partido por Mamadou Tandja. Após a eleição de Mahamane Ousmane como presidente em março de 1993, Saibou entregou a presidência a Mahamane em 16 de abril — a primeira vez que um presidente em exercício transferiu pacificamente o poder à oposição — e se aposentou em sua vila natal."
    NIG_1996_revolution.t:0 "O Golpe de Estado Nigerino?"
    NIG_1996_revolution.d:0 "O golpe de Estado nigerino de 1996 foi um golpe militar ocorrido em 27 de janeiro de 1996, em Niamey, Níger. Derrubou o primeiro presidente democraticamente eleito do Níger, Mahamane Ousmane, após quase três anos no poder, e instalou o General Ibrahim Baré Maïnassara como chefe de Estado. O Primeiro-Ministro Hama Amadou foi preso no golpe, e vários soldados e guardas presidenciais foram mortos nos combates."
    NIG_1999_revolution.t:0 "O Golpe de Estado Nigerino?"
    NIG_1999_revolution.d:0 "O golpe de Estado nigerino de 1999 ocorreu em 9 de abril de 1999 e resultou na morte do Presidente Ibrahim Baré Maïnassara e na instalação de Daouda Malam Wanké como Presidente em 11 de abril. Maïnassara foi baleado em circunstâncias não esclarecidas, em uma emboscada, seja no Aeroporto Internacional Diori Hamani, possivelmente enquanto tentava fugir do país, seja em uma base militar, provavelmente por membros da Guarda Presidencial."
    NIG_2010_revolution.t:0 "O Golpe de Estado Nigerino?"
    NIG_2010_revolution.d:0 "Um golpe de Estado ocorreu no Níger em 18 de fevereiro de 2010. Soldados atacaram o palácio presidencial em Niamey sob fogo de armas ao meio-dia e capturaram o Presidente Mamadou Tandja, que presidia uma reunião de governo no momento. Mais tarde naquele dia, os rebeldes anunciaram na televisão a formação do Conselho Supremo para a Restauração da Democracia (CSRD), chefiado pelo chef d'escadron Salou Djibo."
    NIG_2023_revolution.t:0 "O Golpe de Estado Nigerino?"
    NIG_2023_revolution.d:0 "Em 26 de julho de 2023, ocorreu um golpe de Estado no Níger, durante o qual a guarda presidencial do país removeu e deteve o presidente Mohamed Bazoum. Subsequentemente, o General Abdourahamane Tchiani, Comandante da Guarda Presidencial, proclamou-se líder do país e estabeleceu o Conselho Nacional para a Salvaguarda da Pátria, após confirmar o sucesso do golpe."

    IVC_1960_revolution.t:0 "O Novo Homem Forte Marfinense?"
    IVC_1960_revolution.d:0 "A Costa do Marfim alcançou a independência em 1960, liderada por Félix Houphouët-Boigny, que governou o país até 1993. Relativamente estável pelos padrões regionais, a Costa do Marfim estabeleceu laços político-econômicos estreitos com seus vizinhos da África Ocidental, mantendo ao mesmo tempo relações próximas com o Ocidente, especialmente a França. Sua estabilidade foi diminuída por um golpe de Estado em 1999 e duas guerras civis — a primeira entre 2002 e 2007 e novamente durante 2010-2011."
    IVC_2000_revolution.t:0 "O Retorno à Democracia?"
    IVC_2000_revolution.d:0 "Devido a protestos civis massivos que efetivamente paralisaram o país por semanas. O Presidente finalmente cumpriu sua promessa de ceder o poder a um governo civil. A proibição de atividades políticas foi levantada, e presos políticos foram libertados de centros de detenção. Uma eleição foi então convocada para eleger o novo presidente."

    MAL_1960_revolution.t:0 "O Golpe de Estado Maliano?"
    MAL_1960_revolution.d:0 "Após a retirada do Senegal, a República do Mali foi estabelecida. Após um longo período de governo unipartidário, um golpe em 1991 levou a uma nova constituição e ao estabelecimento do Mali como um Estado democrático e multipartidário. Em janeiro de 2012, eclodiu um conflito armado no norte do Mali, no qual rebeldes tuaregues assumiram o controle de um território no norte e, em abril, declararam a secessão de um novo Estado, o Azawad. O conflito foi complicado por um golpe militar em março de 2012 e por combates posteriores entre os tuaregues e outras facções rebeldes."
    MAL_1991_revolution.t:0 "O Retorno à Democracia?"
    MAL_1991_revolution.d:0 "Após um longo período de governo unipartidário, um golpe em 1991 levou a uma nova constituição e ao estabelecimento do Mali como um Estado democrático e multipartidário. Em janeiro de 2012, eclodiu um conflito armado no norte do Mali. O conflito foi complicado por um golpe militar em março de 2012 e por combates posteriores entre os tuaregues e outras facções rebeldes. O golpe foi seguido por uma condenação internacional "unânime", sanções severas por parte dos vizinhos do Mali e a rápida perda do norte do Mali para as forças tuaregues. Em 6 de abril, a junta concordou em deixar o poder em troca do fim das sanções, entregando o poder a um governo de transição liderado pelo presidente do parlamento, Dioncounda Traoré."

    CHA_1960_revolution.t:0 "O Golpe de Estado Chadiano?"
    CHA_1960_revolution.d:0 "Em 1960, o Chade obteve independência sob a liderança de François Tombalbaye. O ressentimento contra suas políticas no norte muçulmano culminou na eclosão de uma guerra civil duradoura em 1965. Em 1979, os rebeldes conquistaram a capital e puseram fim à hegemonia do sul. Os comandantes rebeldes então lutaram entre si até que Hissène Habré derrotou seus rivais. O conflito chadiano-líbio eclodiu em 1978, com a invasão líbia, que cessou em 1987 com uma intervenção militar francesa (Operação Épervier). Hissène Habré foi, por sua vez, derrubado em 1990 por seu general Idriss Déby."
    CHA_1991_revolution.t:0 "O Golpe de Estado Chadiano?"
    CHA_1991_revolution.d:0 "Déby tomou o poder ao liderar um golpe de Estado contra Habré em dezembro de 1990. Apesar de ter introduzido um sistema multipartidário em 1992, após várias décadas de governo unipartidário sob seus predecessores, ao longo de sua presidência, seu Movimento Patriótico de Salvação foi o partido dominante. Déby venceu as eleições presidenciais em 1996 e 2001, e após a eliminação dos limites de mandato, venceu novamente em 2006, 2011, 2016 e 2021."

    RWA_1973_revolution.t:0 "O Golpe de Estado Ruandês?"
    RWA_1973_revolution.d:0 "De etnia hutu, Habyarimana serviu em várias posições de segurança, incluindo ministro da defesa sob o primeiro presidente de Ruanda, Grégoire Kayibanda. Após derrubar Kayibanda em um golpe em 1973, ele se tornou o novo presidente do país e, eventualmente, deu continuidade às políticas pró-hutu de seu predecessor. Durante seu governo, Ruanda tornou-se um Estado totalitário e unipartidário, no qual os fiscais de seu partido MRND exigiam que as pessoas cantassem e dançassem em louvor ao Presidente em grandes desfiles de "animação" política."
    RWA_1994_revolution.t:0 "A Queda do Regime Hutu?"
    RWA_1994_revolution.d:0 "Em 1990, a Frente Patriótica Ruandesa (FPR), liderada por tutsis, lançou a Guerra Civil de Ruanda contra seu governo. Após três anos de guerra, Habyarimana assinou os Acordos de Arusha em 1993 com a FPR, como acordo de paz. No ano seguinte, ele morreu em circunstâncias misteriosas quando seu avião, que também transportava o Presidente do Burundi, Cyprien Ntaryamira, foi abatido por um míssil perto de Kigali. Seu assassinato acendeu tensões étnicas na região e ajudou a desencadear o genocídio contra os tutsis. A FPR tutsi retomou sua ofensiva e tomou o controle do país metodicamente, obtendo o controle total do país em meados de julho."
    RWA_2000_revolution.t:0 "A Ascensão de Paul Kagame?"
    RWA_2000_revolution.d:0 "Bizimungu renunciou em 2000, muito provavelmente forçado a fazê-lo, após um desentendimento com a FPR. Foi substituído por Kagame. Bizimungu foi posteriormente preso por corrupção e incitação à violência étnica, acusações que grupos de direitos humanos descreveram como politicamente motivadas. O governo de Kagame é considerado autoritário, e grupos de direitos humanos o acusam de repressão política."

    GAM_1994_revolution.t:0 "O Golpe de Yahya Jammeh?"
    GAM_1994_revolution.d:0 "Em 22 de julho de 1994, oficiais subalternos liderados por Yahya Jammeh derrubaram o governo do Presidente Dawda Jawara na Gâmbia, citando corrupção e má gestão. O golpe incruento encerrou os quase 30 anos de governo de Jawara, suspendeu a constituição e estabeleceu uma junta militar."
    GAM_2017_revolution.t:0 "A Queda de Yahya Jammeh?"
    GAM_2017_revolution.d:0 "Em dezembro de 2016, Yahya Jammeh perdeu a eleição presidencial da Gâmbia para Adama Barrow, mas se recusou a reconhecer a derrota, provocando uma crise constitucional. A CEDEAO interveio militarmente, levando Jammeh a fugir em 2017 para o exílio na Guiné Equatorial. Barrow foi empossado, encerrando os 22 anos de governo autoritário de Jammeh e inaugurando uma nova era democrática."

    SEN_1960_revolution.t:0 "A Ascensão de Léopold Sédar Senghor?"
    SEN_1960_revolution.d:0 "Léopold Sédar Senghor nasceu em 9 de outubro de 1906, em Joal, Senegal. Educado em Paris, destacou-se como um importante poeta e um dos fundadores do movimento Negritude, defendendo a identidade cultural africana. Retornando ao país natal após a Segunda Guerra Mundial, entrou na política, conduzindo o Senegal rumo à autonomia e forjando um socialismo africano com laços pragmáticos com a França. Em 6 de setembro de 1960, tornou-se o primeiro presidente do Senegal independente, guiando a jovem nação por duas décadas de estabilidade e um renascimento cultural duradouro. Sua combinação de visão poética e notável perspicácia política consolidou seu legado como um pensador pioneiro, cuja ascensão remodelou a África pós-colonial."
    SEN_1962_revolution.t:0 "A Tentativa de Golpe de Mamadou Dia?"
    SEN_1962_revolution.d:0 "Em dezembro de 1962, o Primeiro-Ministro do Senegal, Mamadou Dia, foi acusado de orquestrar um golpe contra o Presidente Léopold Sédar Senghor em meio a profundas divisões ideológicas. Dia, um socialista convicto, havia entrado em conflito com Senghor sobre política econômica e controle parlamentar. Quando Dia tentou bloquear uma moção de desconfiança, Senghor interpretou isso como uma tentativa de tomada de poder. Dia foi preso, julgado por traição e condenado à prisão perpétua, embora muitos historiadores vejam o evento mais como uma manobra política do que um golpe genuíno. Sua queda marcou uma mudança rumo ao domínio presidencial na política senegalesa e encerrou a breve experiência do país com uma liderança executiva dupla."
    SEN_1975_revolution.t:0 "A Liberalização Parcial do Senegal?"
    SEN_1975_revolution.d:0 "Sob o Presidente Léopold Sédar Senghor, o Senegal transitou de um Estado unipartidário de fato para um sistema multipartidário controlado. Essa "revolução passiva" permitiu uma oposição limitada, legalizando até três partidos — cada um representando posições ideológicas distintas — mantendo, ao mesmo tempo, rígida supervisão estatal. A medida foi concebida para modernizar a governança sem desestabilizar a autoridade de Senghor. A liberalização de 1975 no Senegal refletiu um ato estratégico de equilíbrio entre abertura política e continuidade do regime."
    SEN_1980_revolution.t:0 "O Retorno da Democracia Multipartidária no Senegal?"
    SEN_1980_revolution.d:0 "A saída de Senghor e a sucessão pacífica por Abdou Diouf sinalizaram um aprofundamento das normas democráticas. Baseando-se na liberalização parcial de 1975, Diouf ampliou as liberdades políticas, permitindo que mais partidos operassem além do rígido arcabouço ideológico anteriormente imposto. Essa transição reforçou a reputação do Senegal por estabilidade política e governo civil na África Ocidental. A mudança de 1980 lançou as bases para eleições competitivas e um cenário político vibrante, distinguindo o Senegal como um modelo de democratização gradual e pacífica na era pós-colonial."

    SIL_1964_revolution.t:0 "O Primeiro-Ministrado de Albert Margai?"
    SIL_1964_revolution.d:0 "Albert Margai serviu como Primeiro-Ministro de Serra Leoa de 1964 a 1967, sucedendo seu irmão Milton Margai. Sua administração concentrou-se em consolidar o poder e promover a unidade nacional, mas suas políticas — especialmente tentativas de politizar os militares e mudar para um Estado unipartidário — provocaram controvérsia. O favoritismo étnico e o crescente autoritarismo corroeram a confiança pública, levando à instabilidade política."
    SIL_1968_revolution.t:0 "O Primeiro-Ministrado de Siaka Stevens?"
    SIL_1968_revolution.d:0 "Siaka Stevens serviu como Primeiro-Ministro de Serra Leoa de 1968 a 1971, lançando as bases para sua longa presidência. Seu primeiro-ministrado sucedeu-se a um período de instabilidade política e governo militar, e ele rapidamente passou a consolidar o poder sob o All People's Congress. Stevens enfatizou o nacionalismo econômico e a governança centralizada, mas seu mandato também viu crescente autoritarismo e supressão da dissidência. Em 1971, transformou Serra Leoa em uma república e tornou-se seu primeiro presidente executivo. Seu estilo de liderança e manobras políticas durante esse período moldaram a trajetória do país por décadas, combinando retórica populista com forte controle sobre as instituições estatais."
    SIL_1985_revolution.t:0 "O Primeiro-Ministrado de Joseph Saidu Momoh?"
    SIL_1985_revolution.d:0 "Joseph Saidu Momoh tornou-se Primeiro-Ministro de Serra Leoa em 1985, sucedendo Siaka Stevens e posteriormente assumindo a presidência. Ex-general do exército, Momoh prometeu reforma e renovação nacional, mas teve dificuldades em cumprir suas promessas em meio ao agravamento da crise econômica e à corrupção generalizada. Sua administração enfrentou crescente insatisfação pública, infraestrutura em deterioração e padrões de vida em declínio. As tentativas de liberalização política foram em grande parte simbólicas, já que o All People's Congress no poder mantinha forte controle."
    SIL_1992_revolution.t:0 "O Golpe de Valentine Strasser?"
    SIL_1992_revolution.d:0 "Valentine Strasser liderou Serra Leoa como chefe de Estado de 1992 a 1996, tornando-se o presidente mais jovem do mundo, aos 25 anos, após um golpe militar. Seu governo começou com promessas de reforma e combate à corrupção, mas rapidamente passou a ser definido pelo controle autoritário e pela intensificação da guerra civil. Como presidente do Conselho Provisório Nacional de Governo, Strasser lutou para estabilizar a economia e conter insurgências rebeldes. Apesar do apoio público inicial, sua liderança vacilou em meio à dissidência interna e à falta de progresso."
    SIL_1996_revolution.t:0 "O Retorno da Democracia?"
    SIL_1996_revolution.d:0 "Em 1996, Serra Leoa retornou à democracia após anos de governo militar e agitação civil. As eleições históricas, realizadas em fevereiro e março, marcaram a primeira votação multipartidária do país desde 1977. Apesar do conflito em curso com a Frente Revolucionária Unida (RUF), os cidadãos abraçaram o processo democrático, elegendo Ahmed Tejan Kabbah, do Partido do Povo de Serra Leoa (SLPP), como presidente. Sua vitória sinalizou uma mudança promissora rumo à governança civil e à ordem constitucional. As eleições também restabeleceram a representação parlamentar, encerrando quatro anos de controle militar sob o Conselho Provisório Nacional de Governo e revivendo as instituições democráticas em meio a um frágil processo de paz."

    GHA_1960_revolution.t:0 "O Governo de Kwame Nkrumah?"
    GHA_1960_revolution.d:0 "Francis Kwame Nkrumah foi um político, teórico político e revolucionário ganense. Serviu como Primeiro-Ministro da Costa do Ouro de 1952 até 1957, quando obteve independência da Grã-Bretanha. Foi então o primeiro Primeiro-Ministro e, posteriormente, o Presidente de Gana, de 1957 a 1966. Sua administração foi predominantemente socialista, bem como nacionalista. Financiou projetos nacionais industriais e energéticos, desenvolveu um forte sistema nacional de educação e promoveu uma cultura pan-africanista. Sob Nkrumah, Gana desempenhou papel de destaque nas relações internacionais africanas durante o período de descolonização."
    GHA_1966_revolution.t:0 "O Golpe Ganense?"
    GHA_1966_revolution.d:0 "Em fevereiro de 1966, enquanto Nkrumah estava em visita de Estado ao Vietnã do Norte e à China, seu governo foi derrubado em um violento golpe de Estado liderado pelas forças militares e policiais nacionais, com apoio do serviço público. Os conspiradores, liderados por Joseph Arthur Ankrah, autodenominaram-se Conselho de Libertação Nacional e governaram como um governo militar por três anos. Os líderes do golpe que derrubou Nkrumah imediatamente abriram as fronteiras do país e os portões das prisões para permitir o retorno do exílio ou a libertação da detenção preventiva de todos os opositores de Nkrumah. Nomeou um gabinete de funcionários públicos e prometeu restaurar o governo democrático o mais rápido possível."
    GHA_1979_revolution.t:0 "O Golpe Ganense?"
    GHA_1979_revolution.d:0 "A Revolução de 4 de Junho foi um levante em Gana, em 1979, que surgiu devido a um conflito entre os postos inferiores e os oficiais das forças armadas ganenses. Rawlings foi então nomeado chefe do Conselho Revolucionário das Forças Armadas (AFRC) pelos oficiais militares subalternos revoltosos, para governar o país até a conclusão da eleição em curso. Rawlings entregou seu poder ao Dr. Hilla Limann em setembro de 1979. Rawlings mais tarde derrubou o Governo de Limann em 31 de dezembro de 1981."
    GHA_1992_revolution.t:0 "A Restauração da Democracia?"
    GHA_1992_revolution.d:0 "Jerry Rawlings, que liderava o país desde que tomou o poder em um golpe em 1981, havia concordado a contragosto em realizar eleições multipartidárias no início daquele ano. Rawlings concorreu como candidato da Aliança Progressista, que incluía seu National Democratic Congress, e venceu com 58,4% dos votos, suficiente para vencer sem necessidade de segundo turno. O comparecimento eleitoral foi de 50,2%."

    GUI_1960_revolution.t:0 "O Governo de Ahmed Sékou Touré?"
    GUI_1960_revolution.d:0 "Ahmed Sékou Touré foi um líder político guineense e estadista africano que se tornou o primeiro presidente da Guiné, servindo de 1958 até sua morte em 1984. Touré foi um dos principais nacionalistas guineenses envolvidos na conquista da independência do país em relação à França. Em 1960, Touré declarou o PDG como o único partido legal, embora o país já fosse efetivamente um Estado unipartidário desde a independência. Nos 24 anos seguintes, Touré efetivamente deteve todo o poder governante na nação."
    GUI_1984_revolution.t:0 "O Golpe de Estado Guineense?"
    GUI_1984_revolution.d:0 "O golpe de Estado guineense de 1984 foi o golpe militar incruento ocorrido na Guiné em 3 de abril de 1984, liderado pelo Coronel Lansana Conté. Levou à deposição do Primeiro-Ministro Louis Lansana Beavogui, que ocupava o cargo desde 1972, e vinha servindo como presidente interino desde março, quando o veterano Presidente Ahmed Sékou Touré morreu durante uma cirurgia cardíaca de emergência na Cleveland Clinic, nos Estados Unidos."
    GUI_1993_revolution.t:0 "A Restauração da Democracia?"
    GUI_1993_revolution.d:0 "A primeira eleição presidencial multipartidária realizada desde a independência ocorreu em 19 de dezembro de 1993. Conté, candidato do recém-formado Partido da Unidade e do Progresso (PUP), venceu com 51,7% dos votos — apenas o suficiente para evitar um segundo turno. Alpha Condé, do Rally do Povo Guineense (RPG), ficou em segundo lugar, com 19,6% dos votos."

    GAB_1961_revolution.t:0 "A Ascensão de Léon M'ba?"
    GAB_1961_revolution.d:0 "O primeiro presidente do Gabão, eleito em 1961, foi Léon M'ba, com Omar Bongo Ondimba como seu vice-presidente. Após M'ba ascender ao poder, a imprensa foi suprimida, manifestações políticas foram reprimidas, a liberdade de expressão foi restringida, outros partidos políticos foram gradualmente excluídos do poder, e a Constituição foi alterada segundo moldes franceses para concentrar o poder na Presidência, cargo que o próprio M'ba assumiu. Quando M'ba dissolveu a Assembleia Nacional em janeiro de 1964 para instituir o governo unipartidário, um golpe militar tentou destituí-lo do poder e restaurar a democracia parlamentar. Paraquedistas franceses chegaram em 24 horas para restaurar M'ba ao poder. Após dias de combate, o golpe terminou, e a oposição foi presa, seguindo-se protestos e motins."
    GAB_1967_revolution.t:0 "A Ascensão de Omar Bongo?"
    GAB_1967_revolution.d:0 "Omar Bongo Ondimba foi um político gabonês que foi o segundo presidente do Gabão de 1967 até sua morte em 2009. Membro do Partido Democrático Gabonês (PDG), Bongo foi promovido a cargos-chave como jovem funcionário sob o primeiro Presidente do Gabão, Léon M'ba, na década de 1960, antes de ser eleito o segundo vice-presidente por direito próprio em 1966. Em 1967, após a morte de M'ba, tornou-se presidente do país."
    GAB_1993_revolution.t:0 "A Democracia Multipartidária no Gabão?"
    GAB_1993_revolution.d:0 "Em 22 de maio de 1990, após greves, motins e agitações, o comitê central do PDG e a Assembleia Nacional aprovaram emendas constitucionais para facilitar a transição para um sistema multipartidário. O mandato presidencial existente, válido até 1994, seria respeitado. As eleições subsequentes à presidência seriam disputadas por mais de um candidato, e o mandato presidencial foi alterado para cinco anos, com limite de uma reeleição ao cargo. Em dezembro de 1993, Bongo venceu a primeira eleição presidencial realizada sob a nova constituição multipartidária, por uma margem consideravelmente mais estreita, de cerca de 51,4%."
    GAB_2009_revolution.t:0 "A Presidência de Ali Bongo?"
    GAB_2009_revolution.d:0 "Ali Bongo Ondimba é um ex-político e ditador gabonês que foi o terceiro presidente do Gabão de 2009 até ser deposto em um golpe em 2023. Membro do Partido Democrático Gabonês, Bongo é filho de Omar Bongo, que foi presidente de 1967 até sua morte em 2009."
    GAB_2023_revolution.t:0 "O Golpe de Estado Gabonês?"
    GAB_2023_revolution.d:0 "Em 30 de agosto de 2023, ocorreu um golpe de Estado no Gabão, pouco após o anúncio de que o presidente em exercício Ali Bongo havia vencido a eleição geral realizada em 26 de agosto. O líder do golpe, Brice Oligui Nguema, faz parte da família Bongo e derrubou seu primo Ali Bongo. O golpe pôs fim aos 56 anos de governo da dupla pai-e-filho Omar e Ali Bongo sobre o Gabão. Foi descrito por alguns como um golpe palaciano."

    BEN_1960_revolution.t:0 "O Estado Unipartidário do Daomé?"
    BEN_1960_revolution.d:0 "Em 1960, o Daomé obteve independência da França e experimentou brevemente a democracia multipartidária. No final daquele ano, Hubert Maga consolidou o poder, proibiu a oposição e declarou o Daomé um Estado unipartidário."
    BEN_1970_revolution.t:0 "O Triunvirato do Daomé?"
    BEN_1970_revolution.d:0 "Em 1970, a crise política do Daomé deu origem à primeira presidência colegiada da África. Hubert Maga, Justin Ahomadegbe e Sourou-Migan Apithy formaram um triunvirato rotativo, cada um governando por dois anos para equilibrar rivalidades regionais. Embora inovador, o arranjo mostrou-se instável."
    BEN_1972_revolution.t:0 "A República Popular do Benin?"
    BEN_1972_revolution.d:0 "A República Popular do Benin foi um Estado comunista localizado no Golfo da Guiné, no continente africano, que se tornou o atual Benin em 1990. A República Popular foi estabelecida em 30 de novembro de 1975, após o golpe de Estado de 1972 na República do Daomé."
    BEN_1990_revolution.t:0 "O Retorno da Democracia Multipartidária no Benin?"
    BEN_1990_revolution.d:0 "A turbulência social e política, a situação econômica catastrófica e a queda dos regimes comunistas na Europa Oriental levaram o Presidente Kérékou a concordar em derrubar seu próprio regime. Em fevereiro de 1989, uma carta pastoral assinada por onze bispos do Benin expressou sua condenação à República Popular. Em 7 de dezembro de 1989, Kérékou tomou a iniciativa e surpreendeu o povo ao divulgar uma declaração oficial anunciando o abandono do marxismo-leninismo, a liquidação do Bureau Político e o fechamento do comitê central do partido. Um governo de transição foi estabelecido em 1990, abrindo caminho para o retorno de um sistema multipartidário. A nova constituição foi adotada por referendo em dezembro de 1990. O nome oficial do Benin foi mantido para o país, que se tornou a República do Benin."

    CUB_1959_revolution.t:0 "A Revolução Cubana?"
    CUB_1959_revolution.d:0 "A Revolução Cubana foi um levante armado liderado por Fidel Castro que, eventualmente, derrubou a brutal ditadura de Fulgencio Batista. A revolução começou com um ataque fracassado a quartéis militares cubanos em 26 de julho de 1953, mas, até o final de 1958, os guerrilheiros revolucionários do Movimento 26 de Julho de Castro haviam ganhado vantagem em Cuba, forçando Batista a fugir da ilha em 1º de janeiro de 1959."
    CUB_2006_revolution.t:0 "A Ascensão de Raúl Castro?"
    CUB_2006_revolution.d:0 "Devido à doença de seu irmão, Castro tornou-se presidente interino do Conselho de Estado em uma transferência temporária de poder a partir de 31 de julho de 2006. Castro foi oficialmente empossado presidente pela Assembleia Nacional em 24 de fevereiro de 2008, após seu irmão, ainda enfermo, anunciar em 19 de fevereiro de 2008 que não concorreria novamente. Foi reeleito presidente em 24 de fevereiro de 2013. Pouco depois, Castro anunciou que seu segundo mandato seria seu último, e que não buscaria reeleição em 2018."
    CUB_2019_revolution.t:0 "O Referendo Constitucional Cubano?"
    CUB_2019_revolution.d:0 "O referendo constitucional cubano de 2019, realizado em 24 de fevereiro, aprovou uma nova constituição com 90,6% dos votos válidos a favor. As reformas introduziram o reconhecimento da propriedade privada, limites de mandato presidencial, ampliação de direitos civis e mudanças estruturais no governo. A constituição entrou em vigor em 10 de abril de 2019."

    HAI_1946_revolution.t:0 "O Golpe de Estado?"
    HAI_1946_revolution.d:0 "Com seu governo à beira da falência e lutando contra uma economia debilitada, Lescot pediu, sem sucesso, aos Estados Unidos uma prorrogação para o pagamento de dívidas. As relações entre Lescot e Trujillo, na República Dominicana, romperam-se. Até 1946, suas tentativas de silenciar a imprensa de oposição provocaram ferozes manifestações estudantis; uma revolta eclodiu em Porto Príncipe. Lescot tentou ordenar à Guarda Militar que dispersasse as manifestações, mas foi rejeitado. Convencidos de que suas vidas estavam em perigo, Lescot e seu gabinete fugiram para o exílio. Dumarsais Estimé eventualmente sucedeu Lescot como chefe da república, tornando-se o primeiro presidente negro do Haiti desde a ocupação dos EUA."
    HAI_1950_revolution.t:0 "O Golpe de Estado?"
    HAI_1950_revolution.d:0 "Em agosto de 1946, Dumarsais Estimé foi eleito Presidente do Haiti contra Dantès Louis Bellegarde. Magloire então se viu na oposição e criou o MOP (Mouvement Ouvrier Paysan). Em maio de 1950, um golpe de Estado organizado por uma junta militar derrubou o governo de Estimé e colocou seu líder, Paul Magloire, como chefe do país, onde seria eleito para a presidência em outubro de 1950. Estimé foi rapidamente deposto e exilado pelo exército haitiano, liderado por Franck Lavaud."
    HAI_1957_revolution.t:0 "A Ascensão de François Duvalier?"
    HAI_1957_revolution.d:0 "François Duvalier foi um político e vodusta haitiano que serviu como presidente do Haiti de 1957 até sua morte em 1971. Após frustrar um golpe de Estado militar em 1958, seu regime rapidamente se tornou mais autocrático e despótico. Um esquadrão da morte governamental secreto, o Tonton Macoute, torturou ou matou indiscriminadamente os opositores de Duvalier. Duvalier ainda buscou consolidar seu governo incorporando elementos da mitologia haitiana em um culto à personalidade."
    HAI_1971_revolution.t:0 "A Morte de François Duvalier"
    HAI_1971_revolution.d:0 "Em abril de 1971, Jean-Claude Duvalier assumiu a presidência do Haiti aos 19 anos, após a morte de seu pai, François Duvalier, tornando-se o presidente mais jovem do mundo, bem como o único líder de Estado não real com menos de 20 anos."
    HAI_1986_revolution.t:0 "A Queda de Jean-Claude Duvalier"
    HAI_1986_revolution.d:0 "Uma revolta começou nas províncias em 1985. A cidade de Gonaïves foi a primeira a ter manifestações de rua e saques a armazéns de distribuição de alimentos. De outubro de 1985 a janeiro de 1986, os protestos se espalharam para outras seis cidades, incluindo Cap-Haïtien. Duvalier fugiu do país em 7 de fevereiro de 1986."
    HAI_1994_revolution.t:0 "O Retorno da Democracia"
    HAI_1994_revolution.d:0 "Em setembro de 1994, os Estados Unidos negociaram a saída dos líderes militares do Haiti e a entrada pacífica de 20.000 tropas dos EUA sob a Operação Uphold Democracy. Isso permitiu a restauração de Jean-Bertrand Aristide, democraticamente eleito, como presidente, que retornou ao Haiti em outubro para completar seu mandato. Como parte do acordo, Aristide teve de implementar reformas de livre mercado na tentativa de melhorar a economia haitiana, com resultados mistos."
    HAI_2004_revolution.t:0 "O Golpe de Estado?"
    HAI_2004_revolution.d:0 "Um golpe de Estado no Haiti, em 29 de fevereiro de 2004, após várias semanas de conflito, resultou na remoção do Presidente Jean-Bertrand Aristide do cargo. Em 5 de fevereiro, um grupo rebelde, chamado Frente Revolucionária Nacional para a Libertação e Reconstrução do Haiti, tomou o controle da quarta maior cidade do Haiti, Gonaïves. Até 22 de fevereiro, os rebeldes haviam capturado a segunda maior cidade do Haiti, Cap-Haïtien, e cercavam a capital, Porto Príncipe, até o final de fevereiro. Na manhã de 29 de fevereiro, Aristide renunciou em circunstâncias controversas e foi retirado do Haiti por militares e pessoal de segurança dos EUA."

    DOM_1961_revolution.t:0 "O Assassinato de Rafael Trujillo?"
    DOM_1961_revolution.d:0 "Em 30 de maio de 1961, Rafael Trujillo foi assassinado por um grupo de conspiradores liderados pelo general Antonio Imbert Barrera. Na sequência imediata, o filho de Trujillo, Ramfis, tomou o controle temporário do país, executando a maioria dos conspiradores. Até novembro de 1961, a família Trujillo foi pressionada ao exílio pelo presidente titular Joaquín Balaguer, que introduziu reformas para abrir o regime. O assassinato deu início a conflitos civis que culminaram na Guerra Civil Dominicana e em uma intervenção EUA-OEA, eventualmente estabilizando-se sob um sistema multipartidário em 1966."
    DOM_1963_revolution.t:0 "A Eleição de Juan Bosch?"
    DOM_1963_revolution.d:0 "Juan Emilio Bosch y Gaviño foi um político, historiador, escritor, ensaísta e educador dominicano, e o primeiro presidente democraticamente eleito da República Dominicana, por um breve período em 1963. Anteriormente, havia sido o líder da oposição dominicana no exílio ao regime ditatorial de Rafael Trujillo por mais de 25 anos."

    GND_1979_revolution.t:0 "A Revolução Granadina?"
    GND_1979_revolution.d:0 "O Governo Revolucionário Popular (PRG) foi proclamado em 13 de março de 1979, após o marxista-leninista New Jewel Movement derrubar o governo de Granada em uma revolução, tornando Granada o único Estado socialista dentro da Commonwealth."
    GND_1984_revolution.t:0 "Retirada de Granada?"
    GND_1984_revolution.d:0 "Quando as tropas dos EUA se retiraram de Granada em dezembro de 1983, o Governador-Geral Scoon nomeou um conselho consultivo interino presidido por Nicholas Brathwaite para organizar novas eleições. As primeiras eleições democráticas desde 1976 foram realizadas em dezembro de 1984 e foram vencidas pelo New National Party, sob Herbert Blaize, que serviu como primeiro-ministro até sua morte em dezembro de 1989."

    RHO_UDI_1965.t:0 "Declaração Unilateral de Independência?"
    RHO_UDI_1965.d:0 "O governo rodesiano, composto majoritariamente por membros da minoria branca do país, cerca de 5%, ficou indignado quando, em meio às políticas de descolonização Wind of Change do governo colonial britânico, colônias africanas ao norte, sem experiência comparável de autogoverno, avançaram rapidamente para a independência no início da década de 1960, enquanto à Rodésia era negada a soberania sob o princípio então ascendente de 'nenhuma independência antes do governo da maioria'. A Declaração Unilateral de Independência (UDI) da Rodésia foi uma declaração adotada pelo Gabinete da Rodésia em 11 de novembro de 1965, anunciando que a Rodésia do Sul, ou simplesmente Rodésia, um território britânico no sul da África que se autogovernava desde 1923, agora se considerava um Estado soberano independente."
    RHO_1979_revolution.t:0 "O Acordo de Salisbury?"
    RHO_1979_revolution.d:0 "O Acordo Interno (também chamado de Acordo de Salisbury) foi um acordo assinado em 3 de março de 1978. O acordo levou à criação de um governo interino no qual africanos foram incluídos em posições de liderança pela primeira vez, ao mesmo tempo que criava um serviço público, judiciário, força policial e exército independentes. O acordo também criou um conselho executivo composto por Ian Smith e três indivíduos negros (Muzorewa, Sithole e Chirau), e um conselho ministerial, enquanto Smith mantinha seu título de Primeiro-Ministro."
    RHO_1980_revolution.t:0 "Fim do Domínio Branco na Rodésia?"
    RHO_1980_revolution.d:0 "Em 11 de dezembro de 1979, a Câmara da Assembleia da Rodésia votou 90 a 0 para retornar ao status colonial britânico. Com a chegada de Christopher Soames, o novo governador, em 12 de dezembro de 1979, a Grã-Bretanha assumiu formalmente o controle do Zimbábue-Rodésia como a Colônia da Rodésia do Sul. A Grã-Bretanha suspendeu as sanções em 12 de dezembro, e as Nações Unidas em 16 de dezembro. Durante as eleições de fevereiro de 1980, Mugabe e o partido ZANU garantiram uma vitória esmagadora. O Príncipe Charles, como representante da Grã-Bretanha, concedeu formalmente a independência à nova nação do Zimbábue em uma cerimônia em Harare, em abril de 1980."
    ZIM_1987_revolution.t:0 "A República Presidencial?"
    ZIM_1987_revolution.d:0 "No final de 1987, o parlamento do Zimbábue emendou a constituição. Em 30 de dezembro, declarou Mugabe presidente executivo, uma nova posição que combinava os papéis de chefe de Estado, chefe de governo e comandante-em-chefe das forças armadas. Essa posição lhe deu o poder de dissolver o parlamento, declarar lei marcial e concorrer a um número ilimitado de mandatos."
    ZIM_1996_revolution.t:0 "A Ascensão de Grace Mugabe?"
    ZIM_1996_revolution.d:0 "Grace Ntombizodwa Mugabe é uma empresária e política zimbabuana, viúva do falecido Presidente Robert Mugabe. Serviu como Primeira-Dama do Zimbábue de 1996 até a renúncia de seu marido em novembro de 2017, uma semana após ele ser destituído do poder no golpe de Estado zimbabuano de 2017. Começando como secretária de Mugabe, ascendeu nas fileiras do partido governante ZANU-PF até se tornar chefe de sua Liga das Mulheres e uma figura-chave na facção Geração 40. Ao mesmo tempo, ganhou reputação de privilégio e extravagância durante um período de turbulência econômica no país."
    ZIM_2017_revolution.t:0 "O Golpe de Estado Zimbabuano?"
    ZIM_2017_revolution.d:0 "Em novembro de 2017, o presidente zimbabuano Robert Mugabe foi destituído do cargo de presidente e líder do partido ZANU-PF, sendo substituído por Emmerson Mnangagwa. O levante ocorreu em meio a tensões dentro do partido governante ZANU-PF entre o ex-Primeiro Vice-Presidente Emmerson Mnangagwa (apoiado pelas ZDF) e a Primeira-Dama Grace Mugabe (apoiada pela facção mais jovem G40) sobre quem sucederia o Presidente Mugabe, então com 93 anos."

    SAF_1970_revolution.t:0 "Bantustões na África do Sul?"
    SAF_1970_revolution.d:0 "O governo de Pretória estabeleceu dez bantustões na África do Sul, e dez no vizinho Sudoeste Africano (então sob administração sul-africana), com o propósito de concentrar os membros de grupos étnicos designados, tornando assim cada um desses territórios etnicamente homogêneo como base para a criação de Estados-nação autônomos para os diferentes grupos étnicos negros da África do Sul. Sob o Bantu Homelands Citizenship Act de 1970, o governo retirou dos sul-africanos negros sua cidadania sul-africana, privando-os dos poucos direitos políticos e civis que ainda restavam na África do Sul, e os declarou cidadãos desses territórios natais."
    SAF_1970_revolution.f:0 "Devido a limitações do motor do jogo, os bantustões não podem ser representados como países separados neste mod."
    SAF_1984_revolution.t:0 "Um Presidente Executivo?"
    SAF_1984_revolution.d:0 "Entre as disposições mais controversas da constituição de 1983 estava o estabelecimento do Parlamento Tricameral, um arranjo legislativo que permitiria que os grupos raciais coloured e indiano fossem representados no parlamento de forma segregada, além da abolição do cargo de Primeiro-Ministro em favor de uma Presidência de Estado executiva sob o então Primeiro-Ministro P. W. Botha."
    SAF_1989_revolution.t:0 "A Queda de P. W. Botha?"
    SAF_1989_revolution.d:0 "Em 18 de janeiro de 1989, Botha (então com 73 anos) sofreu um leve derrame que o impediu de comparecer a uma reunião com líderes políticos namibianos em 20 de janeiro de 1989. O lugar de Botha foi ocupado pelo presidente interino J. Christiaan Heunis. Em 2 de fevereiro de 1989, Botha renunciou à liderança do Partido Nacional (NP), esperando que seu indicado – o ministro das finanças Barend du Plessis – o sucedesse. Em vez disso, a bancada parlamentar do NP escolheu como líder o ministro da educação F. W. de Klerk, que rapidamente passou a consolidar sua posição dentro do partido como reformista, enquanto os linha-dura apoiavam Botha."
    SAF_1994_revolution.t:0 "O Fim do Apartheid?"
    SAF_1994_revolution.d:0 "De Klerk negociou com Mandela para desmantelar totalmente o apartheid e estabelecer uma transição para o sufrágio universal. Em 1993, pediu desculpas publicamente pelos efeitos nocivos do apartheid. Ele supervisionou a eleição não racial de 1994, na qual Mandela liderou o Congresso Nacional Africano (ANC) à vitória."

    SAF_1954_revolution.t:0 "Primeiro-Ministrado de J. G. Strijdom?"
    SAF_1954_revolution.d:0 "Johannes Gerhardus Strijdom foi um político sul-africano e o quinto primeiro-ministro da África do Sul, de 30 de novembro de 1954 até sua morte em 24 de agosto de 1958. Foi um nacionalista africâner intransigente e membro da maior facção, baasskap (supremacista branca), do Partido Nacional (NP), que acentuou ainda mais as políticas de apartheid do NP e a ruptura com a União da África do Sul em favor de uma república durante seu governo."
    SAF_1958_revolution.t:0 "Primeiro-Ministrado de Hendrik Verwoerd?"
    SAF_1958_revolution.d:0 "Hendrik Frensch Verwoerd foi um político sul-africano nascido nos Países Baixos, estudioso de psicologia aplicada, filosofia e sociologia, e editor de jornal, que foi Primeiro-Ministro da África do Sul a partir de 1958. É comumente considerado o arquiteto do apartheid e apelidado de "pai do apartheid". Verwoerd desempenhou papel significativo na engenharia social do apartheid, o sistema de segregação racial institucionalizada e supremacia branca do país, e na implementação de suas políticas, como Ministro dos Assuntos Nativos (1950-1958) e depois como primeiro-ministro (1958-1966)."
    SAF_1966_revolution.t:0 "O Assassinato de Hendrik Verwoerd?"
    SAF_1966_revolution.d:0 "Em 6 de setembro de 1966, Verwoerd foi esfaqueado várias vezes pelo assessor parlamentar Dimitri Tsafendas. Ele morreu pouco depois, e Tsafendas ficou preso até sua morte em 1999. Após o assassinato de Verwoerd em 1966, Vorster foi eleito pelo Partido Nacional para sucedê-lo, e deu continuidade à implementação da legislação de apartheid de Verwoerd, incluindo a abolição, em 1968, das últimas quatro cadeiras parlamentares que haviam sido reservadas para representantes brancos de eleitores coloured (mestiços) (efetivada em 1970)."
    SAF_1978_revolution.t:0 "Primeiro-Ministrado de Pieter Willem Botha?"
    SAF_1978_revolution.d:0 "Pieter Willem Botha, DMS, foi um político sul-africano que serviu como o último Primeiro-Ministro da África do Sul, de 1978 a 1984, e como o primeiro Presidente de Estado executivo da África do Sul, de 1984 até sua renúncia em 1989. Apelidado de 'Die Groot Krokodil' (africâner para 'O Grande Crocodilo') devido à sua postura política dura, foi considerado o último líder linha-dura da África do Sul durante a era do apartheid."

    ARAB_2011_revolution.t:0 "A Primavera Árabe?"
    ARAB_2011_revolution.d:0 "A Primavera Árabe foi uma série de protestos antigovernamentais, levantes e rebeliões armadas que se espalharam por grande parte do mundo árabe no início da década de 2010. Começou na Tunísia em resposta à corrupção e à estagnação econômica. Da Tunísia, os protestos se espalharam para cinco outros países: Líbia, Egito, Iêmen, Síria e Barein. A onda inicial de revoluções e protestos diminuiu por volta de meados de 2012, à medida que muitas manifestações da Primavera Árabe foram recebidas com respostas violentas de autoridades, milícias pró-governamentais, contramanifestantes e forças militares."

    TUR_1950_revolution.t:0 "A Eleição de Celâl Bayar?"
    TUR_1950_revolution.d:0 "Nas primeiras eleições livres da história turca, os Democratas venceram a eleição geral de 1950 com 53% do mandato popular. Embora Bayar não aspirasse a se tornar presidente, o parlamento o elegeu presidente da Turquia em 22 de maio de 1950. Durante a presidência de Bayar, as relações com o bloco ocidental melhoraram e, após a Crise dos Estreitos Turcos, a Turquia entrou na Guerra da Coreia em 1951 e depois na OTAN em fevereiro de 1952. Durante os dez anos de governo Democrata, a sociedade turca passou por profundas transformações. Foi seguida uma política econômica inflacionária que incentivava a iniciativa privada, embora o papel do Estado não tenha sido reduzido. A participação política aumentou, levando um grande contingente de anatólios a entrar na política e nos negócios. Embora o secularismo não tenha sido abandonado, a política explicitamente secularista do regime unipartidário foi abandonada."
    TUR_1960_revolution.t:0 "O Golpe de Estado Turco?"
    TUR_1960_revolution.d:0 "O golpe de Estado turco de 1960 foi o primeiro golpe de Estado na República da Turquia. Ocorreu em 27 de maio de 1960. O golpe foi encenado por um grupo de 38 jovens oficiais militares turcos, agindo fora da cadeia de comando militar. Um mês após a execução de Menderes e de outros membros do governo turco, eleições gerais foram realizadas em 15 de outubro de 1961. A autoridade administrativa foi devolvida aos civis, mas os militares continuaram a dominar a cena política até outubro de 1965."
    TUR_1966_revolution.t:0 "A Ascensão de Cevdet Sunay?"
    TUR_1966_revolution.d:0 "Quando a presidência de Gürsel foi encerrada devido a problemas de saúde, conforme a constituição, Cevdet Sunay foi eleito 5º presidente pela Grande Assembleia Nacional da Turquia em 28 de março de 1966. Ele manteve o cargo apesar do aumento da atividade terrorista, motins estudantis e ameaças de golpe. Cumpriu o mandato constitucional de sete anos até 28 de março de 1973 e tornou-se então senador vitalício."
    TUR_1971_revolution.t:0 "O Memorando Militar Turco?"
    TUR_1971_revolution.d:0 "O memorando militar turco de 1971, emitido em 12 de março daquele ano, foi a segunda intervenção militar a ocorrer na República da Turquia, 11 anos após seu antecessor de 1960. É conhecido como o "golpe por memorando", que os militares entregaram em vez de enviar tanques, como haviam feito anteriormente. O evento ocorreu em meio ao agravamento dos conflitos internos, mas, em última análise, pouco fez para conter esse fenômeno."
    TUR_1980_revolution.t:0 "O Golpe de Estado Turco?"
    TUR_1980_revolution.d:0 "O golpe de Estado turco de 1980, chefiado pelo Chefe do Estado-Maior General Kenan Evren, foi o terceiro golpe de Estado na história da República da Turquia, os anteriores tendo sido o golpe de 1960 e o golpe por memorando de 1971. Pelos três anos seguintes, as Forças Armadas Turcas governaram o país por meio do Conselho de Segurança Nacional, antes de a democracia ser restaurada com a eleição geral turca de 1983. Esse período viu uma intensificação do nacionalismo turco do Estado, incluindo a proibição da língua curda. A Turquia retornou parcialmente à democracia em 1983 e totalmente em 1989."
    TUR_1983_revolution.t:0 "Retorno à Democracia?"
    TUR_1983_revolution.d:0 "Eleições gerais foram realizadas na Turquia em 6 de novembro de 1983, as primeiras desde 1977, após os direitos democráticos terem sido abandonados devido ao golpe militar de 1980. O Conselho de Segurança Nacional proibiu a participação dos partidos políticos anteriores, levando ao estabelecimento de novos partidos. O Motherland Party (ANAP) de Turgut Özal obteve uma vitória significativa nessas eleições, conquistando 45,14% dos votos."
    TUR_2014_revolution.t:0 "A Ascensão de Recep Tayyip Erdoğan?"
    TUR_2014_revolution.d:0 "Em 2014, Erdoğan tornou-se o primeiro presidente diretamente eleito do país. A presidência de Erdoğan tem sido marcada por retrocesso democrático e uma mudança rumo a um estilo de governo mais autoritário. Suas políticas econômicas levaram a altas taxas de inflação e à depreciação do valor da lira turca. Ele interveio nos conflitos em curso na Síria e na Líbia, lançou operações contra o Estado Islâmico, as Forças Democráticas Sírias e as forças de Assad, e fez ameaças contra a Grécia."
    TUR_2017_revolution.t:0 "O Referendo Constitucional Turco?"
    TUR_2017_revolution.d:0 "Um referendo constitucional foi realizado na Turquia em 16 de abril de 2017 sobre a aprovação de 18 emendas propostas à constituição turca, apresentadas pelo governante Partido da Justiça e Desenvolvimento (AKP) e pelo Partido do Movimento Nacionalista (MHP). Como resultado de sua aprovação, o cargo de Primeiro-Ministro foi abolido, e o sistema parlamentar de governo existente foi substituído por uma presidência executiva e um sistema presidencial. O número de cadeiras no Parlamento foi elevado de 550 para 600, enquanto, entre uma série de outras propostas, o presidente recebeu mais controle sobre as nomeações para o Conselho Superior de Juízes e Promotores (HSYK)."

    PER_1949_revolution.t:0 "A Eleição da Assembleia Constituinte?"
    PER_1949_revolution.d:0 "O Xá vinha considerando mudanças na Constituição como parte de seus diversos planos para aumentar o poder da monarquia. O Xá convocou uma assembleia constituinte para fazer emendas à Constituição, a fim de lhe conceder mais poder. Ele selecionou os membros da assembleia constituinte entre seus apoiadores. Também aumentou sua pressão pela formação do Senado do Irã, uma câmara alta do parlamento que havia sido prevista na constituição em 1906, mas nunca formada. Esperava-se que o Senado favorecesse o Xá. A Assembleia Constituinte reuniu-se por três semanas, a partir de 21 de abril de 1949. Em 8 de maio de 1949, assinaram a principal mudança na Constituição."
    PER_1952_revolution.t:0 "A Ascensão de Mohammad Mossadegh?"
    PER_1952_revolution.d:0 "Em julho de 1952, Mohammad Mossadegh reconquistou o cargo de primeiro-ministro do Irã em meio a protestos em massa, forçando o Xá a lhe conceder poderes de emergência. Essas amplas autoridades permitiram que Mossadegh contornasse o parlamento, consolidasse o controle e intensificasse os esforços de nacionalização do petróleo — marcando uma dramática afirmação do governo civil contra a influência real."
    PER_1953_revolution.t:0 "O Golpe de Estado Iraniano?"
    PER_1953_revolution.d:0 "O golpe de Estado iraniano de 1953, conhecido no Irã como o golpe de 28 de Mordad, foi a derrubada, instigada pelos EUA e pelo Reino Unido e liderada pelo exército iraniano, do Primeiro-Ministro democraticamente eleito Mohammad Mossadegh, em favor do fortalecimento do domínio monárquico do xá, Mohammad Reza Pahlavi, em 19 de agosto de 1953."
    PER_1979_revolution.t:0 "A Revolução Iraniana?"
    PER_1979_revolution.d:0 "A Revolução Iraniana foi uma série de eventos que culminaram na derrubada da dinastia Pahlavi em 1979. A revolução também levou à substituição do Estado Imperial do Irã pela atual República Islâmica do Irã, já que o governo monárquico de Mohammad Reza Pahlavi foi substituído pelo governo teocrático do Aiatolá Ruhollah Khomeini, um clérigo religioso que havia liderado uma das facções rebeldes."
    PER_1989_revolution.t:0 "A Ascensão de Ali Khamenei?"
    PER_1989_revolution.d:0 "Khamenei serviu como o terceiro presidente do Irã de 1981 a 1989, enquanto se tornava um aliado próximo do primeiro líder supremo, Ruhollah Khomeini. Pouco antes de sua morte, Khomeini teve um desentendimento com o herdeiro que havia escolhido – Hussein Ali Montazeri – de modo que não havia sucessor acordado quando Khomeini morreu. A Assembleia de Especialistas elegeu Khamenei como o próximo líder supremo em 4 de junho de 1989, aos 50 anos. Segundo Akbar Hashemi Rafsanjani, Khamenei era o homem que Khomeini havia escolhido como seu sucessor antes de morrer."
    PER_1998_revolution.t:0 "Criar a Força Quds?"
    PER_1998_revolution.d:0 "A Força Quds é um dos cinco ramos do Corpo da Guarda Revolucionária Islâmica (IRGC) do Irã, especializado em guerra não convencional e operações de inteligência militar. Responsável por operações extraterritoriais, a Força Quds apoia atores não estatais em muitos países, incluindo o Hezbollah, o Hamas, a Jihad Islâmica Palestina, o movimento Houthi e milícias xiitas no Iraque, na Síria e no Afeganistão."
    PER_2008_revolution.t:0 "A Ascensão de Mojtaba Khamenei?"
    PER_2008_revolution.d:0 "Mojtaba Hosseini Khamenei é um clérigo xiita iraniano que foi nomeado o terceiro líder supremo do Irã em março de 2026. Membro da família Khamenei, é o segundo filho do ex-líder supremo Ali Khamenei. Ingressou no Corpo da Guarda Revolucionária Islâmica (IRGC) em 1987 e serviu na Guerra Irã-Iraque. Em 1999, continuou seus estudos em Qom para se tornar clérigo, e posteriormente ingressou no Seminário de Qom como professor de teologia. Assumiu o controle da milícia paramilitar voluntária Basij em 2009."
    PER_2026_revolution.t:0 "O Assassinato de Ali Khamenei"
    PER_2026_revolution.d:0 "Em 2025 e 2026, as crescentes tensões com Israel e os Estados Unidos eclodiram primeiro na Guerra dos Doze Dias, depois escalaram para um conflito em larga escala. Em meio a este último, o Líder Supremo Ali Khamenei foi assassinado. Em 8 de março, a Assembleia de Especialistas agiu rapidamente para preservar a continuidade, elegendo seu filho Mojtaba como sucessor."

    ARG_1955_revolution.t:0 "Revolución Libertadora?"
    ARG_1955_revolution.d:0 "A Revolución Libertadora foi o golpe de Estado que encerrou o segundo mandato presidencial de Juan Perón na Argentina, em 16 de setembro de 1955. Após a Revolución Libertadora, Perón e seus seguidores foram acusados de traição, e os restos mortais de Eva Perón foram transferidos secretamente para a Itália e sepultados em um cemitério em Milão sob identidade falsa. Referências públicas a Perón ou sua falecida esposa, incluindo canções, escritos e imagens, foram proibidas."
    ARG_1966_revolution.t:0 "Revolução Argentina?"
    ARG_1966_revolution.d:0 "Revolução Argentina foi o nome dado por seus líderes a um golpe de Estado militar que derrubou o governo da Argentina em junho de 1966 e deu início a um período de ditadura militar por uma junta, desde então até 1973. O golpe de junho de 1966 estabeleceu o General Juan Carlos Onganía como presidente de fato, apoiado por vários líderes da Confederação Geral do Trabalho (CGT), incluindo o secretário-geral Augusto Vandor. Onganía implementou políticas corporativistas, experimentando particularmente em Córdoba sob a governança de Carlos Caballero."
    ARG_1973_revolution.t:0 "Retorno à Democracia?"
    ARG_1973_revolution.d:0 "Após vários anos de governo militar, Alejandro Agustín Lanusse foi nomeado presidente pela junta militar em 1971. Sob crescente pressão política pelo retorno da democracia, Lanusse convocou eleições em 1973. Perón foi proibido de concorrer, mas o partido peronista foi autorizado a participar. Em meio a um estado de convulsão política, social e econômica, Cámpora e o Vice-Presidente Vicente Solano Lima renunciaram em julho de 1973, convocando novas eleições, mas desta vez com Perón como candidato do Partido Justicialista. Perón venceu a eleição, com sua esposa Isabel Perón como vice-presidente."
    ARG_1976_revolution.t:0 "Golpe de Estado Argentino?"
    ARG_1976_revolution.d:0 "O golpe de Estado argentino de 1976, que derrubou Isabel Perón como Presidente da Argentina em 24 de março de 1976, embora tivesse alguns elementos de direita, como sua ênfase em ordem e segurança, não foi um golpe tradicional de direita e não aderiu a uma ideologia específica. O golpe foi planejado e executado no âmbito da Operação Condor, um sistema clandestino de coordenação repressiva entre países latino-americanos promovido pelos Estados Unidos, como parte da doutrina de segurança nacional, que generalizou ditaduras na América Latina a fim de manter o controle sobre esses países durante a Guerra Fria."
    ARG_1983_revolution.t:0 "Retorno à Democracia?"
    ARG_1983_revolution.d:0 "A eleição geral argentina de 1983 foi realizada em 30 de outubro e marcou o retorno do governo constitucional após a autodenominada ditadura do Processo de Reorganização Nacional, instalada em 1976."
    ARG_2023_revolution.t:0 "A Presidência de Javier Milei?"
    ARG_2023_revolution.d:0 "Javier Gerardo Milei é um político e economista argentino, que se tornou presidente da Argentina em 2023. Milei é conhecido por sua personalidade extravagante, estilo pessoal distintivo e forte presença na mídia. Foi descrito politicamente como um populista de direita e libertário de direita que apoia a economia de laissez-faire, alinhando-se especificamente com princípios minarquistas e anarcocapitalistas."

    GUY_1964_revolution.t:0 "A Ascensão de Forbes Burnham?"
    GUY_1964_revolution.d:0 "Formado em direito, Burnham foi fundamental na fundação de dois partidos políticos (o People's National Congress e o People's Progressive Party) que viriam a dominar a política da Guiana. Durante seu tempo como chefe de governo, a Guiana passou de colônia britânica a uma república sem vínculos constitucionais com o Reino Unido. Seu governo foi caracterizado pela nacionalização de indústrias privadas de propriedade estrangeira, adesão ao Movimento dos Países Não Alinhados e política interna autoritária. Apesar de ser amplamente considerado como tendo desempenhado papel significativo no desenvolvimento político, social e econômico da Guiana, sua presidência foi marcada por acusações de afrocentrismo, violência sancionada pelo Estado, corrupção e fraude eleitoral."
    GUY_1980_revolution.t:0 "A República Cooperativista da Guiana?"
    GUY_1980_revolution.d:0 "Em 1980, a constituição foi alterada para tornar a presidência um cargo executivo; até então, o cargo havia sido ocupado por Arthur Chung em papel cerimonial de chefe de Estado. Burnham venceu a eleição para presidente naquele ano, obtendo 76% dos votos contra 20% de Jagan nos resultados oficiais. Observadores internacionais protestaram que eleitores indo-guianenses foram impedidos de votar em vários locais de votação, havendo acusações generalizadas de fraude eleitoral. O presidente executivo recebeu os poderes de dissolver o Parlamento à vontade, vetar legislação, e nomear ou demitir quase todos os membros seniores do governo."
    GUY_1985_revolution.t:0 "A Morte de Forbes Burnham"
    GUY_1985_revolution.d:0 "Burnham morreu de insuficiência cardíaca durante uma cirurgia de garganta em Georgetown, em 6 de agosto de 1985, aos 62 anos. Diversas fontes sugerem que Forbes teve problemas cardíacos nos anos anteriores à sua morte, e pode ter tido diabetes. Após a morte de Burnham, Desmond Hoyte tornou-se presidente. A eleição geral guianense de 1985 também foi considerada fraudulenta; a próxima eleição "livre e justa" viria em 1992, a primeira eleição justa desde 1964, na qual Cheddi Jagan foi eleito presidente."
    GUY_1992_revolution.t:0 "A Vitória de Cheddi Jagan?"
    GUY_1992_revolution.d:0 "Após a morte de Burnham em 1985, Desmond Hoyte chegou ao poder. Influenciado por Jimmy Carter, Hoyte apresentaria reformas eleitorais que levariam as eleições de 1992 a serem internacionalmente reconhecidas como livres e justas. Após 28 anos na oposição, o PPP venceu as eleições de 5 de outubro de 1992 com cerca de 54% dos votos, e Jagan tornou-se presidente. Ao contrário dos temores estrangeiros anteriores, ele governou como socialista democrático, e não como marxista-leninista. Jagan buscaria políticas para atrair investidores estrangeiros e avançar rumo a políticas de livre mercado."

    SUR_1975_revolution.t:0 "O Primeiro-Ministrado de Henck Arron?"
    SUR_1975_revolution.d:0 "Henck Alphonsus Eugène Arron foi um político surinamês que serviu como primeiro Primeiro-Ministro do Suriname após sua independência em 1975. Membro do Partido Nacional do Suriname, serviu de 24 de dezembro de 1973, com o governo de transição, até 25 de fevereiro de 1980. Foi derrubado em um golpe de Estado pelos militares, liderados por Dési Bouterse."
    SUR_1980_revolution.t:0 "O Golpe dos Sargentos?"
    SUR_1980_revolution.d:0 "O golpe de Estado surinamês de 1980, geralmente chamado de Golpe dos Sargentos (holandês: De Sergeantencoup), foi um golpe militar no Suriname ocorrido em 25 de fevereiro de 1980, quando um grupo de 16 sargentos das Forças Armadas Surinamesas (SKM), liderados por Dési Bouterse, derrubou o governo do Primeiro-Ministro Henck Arron em um violento golpe de Estado. Isso marcou o início da ditadura militar que dominou o país de 1980 a 1991."
    SUR_1987_revolution.t:0 "O Degelo Surinamês?"
    SUR_1987_revolution.d:0 "Mais tarde em 1985, o governo levantou a proibição aos partidos de oposição, iniciando uma transição para o governo civil. Uma nova constituição foi amplamente aprovada em um referendo em 30 de setembro de 1987. Eleições foram realizadas dois meses depois, e Ramsewak Shankar, um opositor de Bouterse, foi eleito presidente em janeiro de 1988. No entanto, Bouterse manteve grande parte do poder como comandante do exército. Ele frustrou vários esforços do governo para negociar com o Jungle Commando, e vários opositores de Bouterse foram assassinados ou desaparecidos."
    SUR_1991_revolution.t:0 "A Transição Surinamesa para a Democracia?"
    SUR_1991_revolution.d:0 "Eleições nacionais foram realizadas em 1987. A Assembleia Nacional adotou uma nova constituição que permitiu a Bouterse permanecer no comando do exército. Insatisfeito com o governo, Bouterse demitiu sumariamente os ministros em 1990, por telefone. Esse evento ficou popularmente conhecido como o "Golpe do Telefone". Seu poder começou a declinar após as eleições de 1991."

    BRZ_1954_revolution.t:0 "O Suicídio de Getúlio Vargas?"
    BRZ_1954_revolution.d:0 "Os adversários políticos de Vargas iniciaram uma crise que culminou no assassinato de um oficial da Aeronáutica, o Major Rubens Vaz, morto durante uma tentativa de assassinato na Rua Tonelero, 180, residência do principal adversário de Vargas, o executivo de publicações e político Carlos Lacerda. O Tenente Gregório Fortunato, chefe da guarda pessoal de Vargas, apelidado de "Anjo Negro", foi implicado no crime. Isso despertou a ira dos militares contra Vargas, com generais exigindo sua renúncia. Incapaz de administrar a situação, Vargas deu um tiro no próprio peito com um revólver em 24 de agosto de 1954, em seu quarto no terceiro andar de sua residência oficial no Palácio do Catete."
    BRZ_1964_revolution.t:0 "A Quinta República Brasileira?"
    BRZ_1964_revolution.d:0 "A ditadura militar no Brasil, por vezes chamada de Quinta República Brasileira, foi estabelecida em 1º de abril de 1964, após um golpe de Estado das Forças Armadas Brasileiras, com apoio do governo dos Estados Unidos, contra o presidente João Goulart. O golpe foi planejado e executado pelos comandantes mais graduados do Exército Brasileiro e recebeu o apoio de quase todos os membros de alto escalão das forças militares, junto com setores conservadores da sociedade, como a Igreja Católica e movimentos civis anticomunistas entre as classes média e alta brasileiras."
    BRZ_1985_revolution.t:0 "Restauração da Democracia?"
    BRZ_1985_revolution.d:0 "O desgaste de anos de poder ditatorial não havia diminuído a repressão, mesmo após a derrota das guerrilhas de esquerda. A incapacidade de lidar com as crises econômicas do período e a pressão popular tornaram inevitável uma política de abertura, que, do lado do regime, foi liderada pelos Generais Ernesto Geisel e Golbery do Couto e Silva. Com a promulgação da Lei da Anistia em 1979, o Brasil iniciou um lento retorno à democracia, que se completou durante a década de 1980."
    BRZ_1993_revolution.t:0 "Referendo Constitucional Brasileiro"
    BRZ_1993_revolution.d:0 "Um referendo constitucional foi realizado no Brasil em 21 de abril de 1993 para determinar a forma de governo do país. Após a redemocratização do Brasil, um artigo da nova Constituição determinou a realização de um referendo para que os eleitores decidissem se o país deveria permanecer uma república ou voltar a ser uma monarquia, e se o sistema de governo deveria ser presidencialista ou parlamentarista."
    BRZ_2016_revolution.t:0 "O Impeachment de Dilma Rousseff?"
    BRZ_2016_revolution.d:0 "Em 31 de agosto de 2016, o Senado destituiu a Presidente Rousseff do cargo por 61 votos a 20, considerando-a culpada de violar as leis orçamentárias do Brasil; no entanto, ela não recebeu votos suficientes do Senado para ser inabilitada de seus direitos políticos. Assim, Temer tomou posse como o 37º presidente do Brasil."
    BRZ_2023_revolution.t:0 "O Ataque ao Congresso Brasileiro"
    BRZ_2023_revolution.d:0 "Em 8 de janeiro de 2023, após a derrota do então presidente Jair Bolsonaro na eleição geral brasileira de 2022 e a posse de seu sucessor Luiz Inácio Lula da Silva, uma multidão de apoiadores de Bolsonaro atacou os prédios do governo federal do Brasil na capital, Brasília. A multidão invadiu e causou danos deliberados ao Supremo Tribunal Federal, ao prédio do Congresso Nacional e ao Palácio Presidencial do Planalto, na Praça dos Três Poderes, buscando derrubar violentamente o presidente democraticamente eleito Lula, que havia tomado posse em 1º de janeiro."

    BRZ_1993_revolution.option.1:0 "Criar uma República Presidencialista"
    BRZ_1993_revolution.option.2:0 "Criar uma República Parlamentarista"
    BRZ_1993_revolution.option.3:0 "Criar uma Monarquia Constitucional"

    BOL_1952_revolution.t:0 "Revolução Nacional Boliviana?"
    BOL_1952_revolution.d:0 "A Revolução Nacional Boliviana começou em abril de 1952, liderada pelo Movimento Nacionalista Revolucionário (MNR). O levante derrubou a junta militar e trouxe Víctor Paz Estenssoro ao poder. A revolução introduziu amplas reformas, incluindo sufrágio universal, nacionalização das minas de estanho e reforma agrária."

    BOL_1964_revolution.t:0 "Golpe de Estado Boliviano?"
    BOL_1964_revolution.d:0 "Em 4 de novembro de 1964, o Vice-Presidente René Barrientos, apoiado pelas forças armadas, derrubou o Presidente Víctor Paz Estenssoro. O golpe marcou o fim do governo revolucionário do MNR e deu início a um período de domínio militar na política boliviana."
    BOL_1969_revolution.t:0 "Morte de René Barrientos?"
    BOL_1969_revolution.d:0 "Em 27 de abril de 1969, Barrientos morreu em um acidente de helicóptero perto de Arque, Bolívia. Seu vice-presidente, um pouco conhecido político democrata-cristão chamado Luis Adolfo Siles, foi empossado presidente logo depois, de acordo com a Constituição. Ovando decidiu não esperar pelas eleições (que ninguém poderia garantir que venceria, com o popular Escobar como candidato) e, em 26 de setembro de 1969, executou um golpe de Estado que derrubou Siles."
    BOL_1970_revolution.t:0 "Golpe de Estado Boliviano?"
    BOL_1970_revolution.d:0 "Em outubro de 1970, o General Juan José Torres tomou o poder após uma tentativa fracassada de golpe por oficiais conservadores. Torres estabeleceu um governo militar de esquerda, promovendo a participação de trabalhadores e camponeses, embora seu governo tenha enfrentado forte oposição da direita."
    BOL_1971_revolution.t:0 "Golpe de Estado Boliviano?"
    BOL_1971_revolution.d:0 "Em 21 de agosto de 1971, o Coronel Hugo Banzer liderou um golpe bem-sucedido contra o General Juan José Torres. Banzer estabeleceu uma ditadura militar que durou até 1978, caracterizada pela repressão a movimentos de esquerda e pelo alinhamento com forças conservadoras."
    BOL_1978_revolution.t:0 "Queda de Hugo Banzer 1978?"
    BOL_1978_revolution.d:0 "Por volta de 1978, a crescente agitação política e as dificuldades econômicas enfraqueceram o regime de Hugo Banzer. Em meio a protestos e eleições contestadas, Banzer foi forçado a renunciar, encerrando sua ditadura de sete anos e abrindo um período turbulento de governos de curta duração."
    BOL_1985_revolution.t:0 "Presidência de Víctor Paz Estenssoro?"
    BOL_1985_revolution.d:0 "Eleições gerais foram realizadas na Bolívia em 14 de julho de 1985. Como nenhum candidato à presidência recebeu mais de 50% dos votos, o Congresso Nacional foi obrigado a eleger um Presidente em 4 de agosto. Embora Hugo Banzer, da Ação Democrática Nacionalista (ADN), tenha recebido a maioria dos votos populares, o Congresso elegeu Víctor Paz Estenssoro, do Movimento Nacionalista Revolucionário (MNR)."

    CLM_1953_revolution.t:0 "Golpe de Estado Colombiano?"
    CLM_1953_revolution.d:0 "Rojas Pinilla ganhou destaque como coronel durante La Violencia, o período de conflitos civis na Colômbia no final dos anos 1940 e início dos anos 1950, marcado por lutas internas entre os Conservadores no poder e guerrilheiros Liberais, e foi nomeado para o gabinete do Presidente Conservador Mariano Ospina Pérez. Em 1953, ele executou um golpe de Estado bem-sucedido contra o sucessor de Ospina na presidência, o extrema-direita Laureano Gómez Castro, impondo lei marcial. Buscando reduzir a violência política, governou o país como uma ditadura militar, aliando-se a sindicalistas, implementando programas de infraestrutura e ampliando o sufrágio feminino."
    CLM_1958_revolution.t:0 "Restauração da democracia?"
    CLM_1958_revolution.d:0 "Após a deposição de Rojas, o Partido Conservador Colombiano e o Partido Liberal Colombiano concordaram em criar a Frente Nacional, uma coalizão que governaria o país conjuntamente. Sob o acordo, a presidência alternaria entre conservadores e liberais a cada 4 anos, por 16 anos; os dois partidos teriam paridade em todos os outros cargos eletivos. A Frente Nacional pôs fim à 'La Violencia', e as administrações da Frente Nacional tentaram instituir reformas sociais e econômicas de amplo alcance em cooperação com a Aliança para o Progresso."

    CHL_1973_revolution.t:0 "Golpe de Estado Chileno?"
    CHL_1973_revolution.d:0 "O golpe de Estado chileno de 1973 foi a derrubada militar do governo da Unidade Popular no Chile, liderado pelo socialista democrático Salvador Allende como presidente do Chile. Allende, descrito como o primeiro marxista a ser democraticamente eleito presidente em uma democracia liberal latino-americana, enfrentou significativa agitação social, tensão política com o Congresso Nacional do Chile controlado pela oposição, e guerra econômica ordenada pelo presidente dos Estados Unidos Richard Nixon. Em 11 de setembro de 1973, um grupo de oficiais militares, liderado pelo General Augusto Pinochet, tomou o poder em um golpe, encerrando o governo civil."
    CHL_1990_revolution.t:0 "Retorno à Democracia?"
    CHL_1990_revolution.d:0 "No final da década de 1980, em grande parte como resultado de eventos como o colapso econômico de 1982 e a resistência civil em massa entre 1983-88, o governo gradualmente permitiu maior liberdade de reunião, expressão e associação, incluindo atividade sindical e política. Em um plebiscito em 5 de outubro de 1988, Pinochet teve negado um segundo mandato de oito anos como presidente (56% contra 44%). Os chilenos elegeram um novo presidente e a maioria dos membros de um congresso bicameral em 14 de dezembro de 1989. O Presidente Aylwin serviu de 1990 a 1994, em um período considerado de transição."

    ECU_1972_revolution.t:0 "Golpe de Estado Equatoriano?"
    ECU_1972_revolution.d:0 "Em 1972, uma junta militar 'revolucionária e nacionalista' derrubou o governo de Velasco Ibarra. O golpe de Estado foi liderado pelo General Guillermo Rodríguez e executado pelo comandante naval Jorge Queirolo G. O novo presidente exilou José María Velasco na Argentina. Ele permaneceu no poder até 1976, quando foi removido por outro governo militar."
    ECU_1979_revolution.t:0 "O Retorno da Democracia?"
    ECU_1979_revolution.d:0 "Eleições gerais foram realizadas no Equador em 1978 e 1979. O primeiro turno da eleição presidencial foi realizado em 16 de julho de 1978, com um segundo turno realizado junto com as eleições parlamentares em 29 de abril de 1979. A eleição presidencial foi vencida por Jaime Roldós Aguilera, da Concentração de Forças Populares (CFP), que recebeu 68,5% dos votos no segundo turno, tornando-se o primeiro presidente livremente eleito do país."

    PRG_1954_revolution.t:0 "Golpe de Estado Paraguaio?"
    PRG_1954_revolution.d:0 "O golpe de Estado paraguaio de 1954 ocorreu em maio de 1954. Foi liderado por Alfredo Stroessner, com o apoio de Epifanio Méndez Fleitas, e resultou na derrubada do governo de Federico Chávez. O golpe foi o culminar de uma complexa série de rivalidades políticas dentro do Partido Colorado governante. Aproximadamente 25 pessoas morreram durante o putsch, o que ajudou a preparar o cenário para a eleição de Stroessner como presidente do Paraguai naquele mesmo ano."
    PRG_1989_revolution.t:0 "O Retorno da Democracia?"
    PRG_1989_revolution.d:0 "O golpe de Estado paraguaio de 1989 ocorreu em 2 e 3 de fevereiro de 1989 em Assunção, Paraguai, liderado pelo General Andrés Rodríguez contra o regime do longevo líder Alfredo Stroessner. A sangrenta derrubada, que viu numerosos soldados mortos em combates de rua, foi provocada por uma disputa de poder nos mais altos escalões do governo. A tomada de poder de Rodríguez marcou o fim do El Stronato, o governo de trinta e quatro anos de Stroessner, na época o mais longo da América Latina, e levou a uma série de reformas que aboliram numerosas leis draconianas e conduziram à liberalização do Paraguai."

    VNZ_1948_revolution.t:0 "Golpe de Estado Venezuelano?"
    VNZ_1948_revolution.d:0 "O golpe de Estado venezuelano de 1948 ocorreu em 24 de novembro de 1948, quando Carlos Delgado Chalbaud, Marcos Pérez Jiménez e Luis Felipe Llovera Páez derrubaram o presidente eleito, Rómulo Gallegos, que havia sido eleito na eleição geral venezuelana de 1947 (geralmente considerada a primeira eleição honesta do país) e tomado posse em fevereiro de 1948."
    VNZ_1950_revolution.t:0 "O Assassinato de Carlos Delgado Chalbaud?"
    VNZ_1950_revolution.d:0 "Chalbaud foi sequestrado e assassinado em 13 de novembro de 1950, por um grupo liderado por Rafael Simón Urbina e seu sobrinho Domingo Urbina. O sequestro ocorreu em Caracas, entre os bairros de Country Club e Chapellín, e seu assassinato ocorreu no semiabandonado bairro de Las Mercedes. Seu assassinato parece ter sido o resultado não intencional de um sequestro fracassado liderado por Simón Urbina, que buscava derrubar a presidência de Chalbaud."
    VNZ_1958_revolution.t:0 "Retorno Venezuelano à Democracia?"
    VNZ_1958_revolution.d:0 "O golpe de Estado venezuelano de 1958 ocorreu em 23 de janeiro de 1958, quando o ditador Marcos Pérez Jiménez foi derrubado. Um governo de transição, primeiro sob o Almirante Wolfgang Larrazábal e depois sob Edgar Sanabria, foi instaurado até que as eleições de dezembro de 1958 elegessem o candidato da Ação Democrática Rómulo Betancourt, que tomou posse em 13 de fevereiro de 1959."
    VNZ_1999_revolution.t:0 "A Revolução Bolivariana?"
    VNZ_1999_revolution.d:0 "Um colapso na confiança nos partidos existentes levou à eleição de Hugo Chávez como presidente em 1998 e ao subsequente lançamento de uma 'Revolução Bolivariana', começando com uma assembleia constituinte de 1999 para redigir uma nova Constituição da Venezuela. A 'Revolução Bolivariana' buscava construir um movimento de massa para implementar o bolivarianismo — democracia popular, independência econômica, distribuição equitativa de receitas e o fim da corrupção política — na Venezuela."
    VNZ_2013_revolution.t:0 "A Presidência de Nicolás Maduro?"
    VNZ_2013_revolution.d:0 "Começando sua vida profissional como motorista de ônibus, Maduro ascendeu a líder sindical antes de ser eleito para a Assembleia Nacional em 2000. Foi nomeado para vários cargos sob o Presidente Hugo Chávez, servindo como Presidente da Assembleia Nacional de 2005 a 2006, como Ministro das Relações Exteriores de 2006 a 2012, e como vice-presidente de 2012 a 2013 sob Chávez. Após o anúncio da morte de Chávez em 5 de março de 2013, Maduro assumiu a presidência."

    GUA_1954_revolution.t:0 "O Golpe de Carlos Castillo Armas?"
    GUA_1954_revolution.d:0 "O golpe de Estado guatemalteco de 1954 depôs o democraticamente eleito Presidente guatemalteco Jacobo Árbenz e marcou o fim da Revolução Guatemalteca. O golpe instalou a ditadura militar de Carlos Castillo Armas, o primeiro de uma série de governantes autoritários apoiados pelos EUA na Guatemala. O golpe foi, em grande parte, resultado de uma operação secreta da CIA codinome PBSuccess."
    GUA_1957_revolution.t:0 "O Assassinato de Carlos Castillo Armas?"
    GUA_1957_revolution.d:0 "Castillo Armas governou até 26 de julho de 1957, quando foi assassinado por Romeo Vásquez, membro de sua guarda pessoal. Após a eleição fraudulenta que se seguiu, o General Miguel Ydígoras Fuentes assumiu o poder. Ele é celebrado por desafiar o presidente mexicano para um duelo entre cavalheiros na ponte da fronteira sul, para encerrar uma disputa sobre a pesca ilegal por barcos mexicanos na costa pacífica da Guatemala, dois dos quais foram afundados pela Força Aérea Guatemalteca."
    GUA_1982_revolution.t:0 "O Golpe de Efraín Ríos Montt?"
    GUA_1982_revolution.d:0 "Em 1982, o descontentamento com o governo do General Romeo Lucas García, a piora na situação de segurança na Guatemala e acusações de fraude eleitoral levaram a um golpe de Estado por um grupo de oficiais militares subalternos, que instalou Ríos Montt como chefe de uma junta de governo. Ríos Montt governou como ditador militar por menos de dezessete meses, antes de seu ministro da defesa, General Óscar Mejía Victores, derrubá-lo em outro golpe."
    GUA_1986_revolution.t:0 "O Retorno da Democracia?"
    GUA_1986_revolution.d:0 "No primeiro turno das eleições presidenciais de 1985, em 3 de novembro, Cerezo ficou em primeiro lugar com 38,6% dos votos populares. No segundo turno, em 8 de dezembro, derrotou Jorge Carpio com 68,4% dos votos. O DCG obteve 51 das 100 cadeiras no Congresso e maioria em muitos municípios em todo o país. Ele foi o primeiro presidente democraticamente eleito e civil a tomar posse desde 1966."

    HON_1957_revolution.t:0 "A Eleição de Ramón Villeda Morales?"
    HON_1957_revolution.d:0 "Ramón Villeda Morales foi um liberal que apoiou a democratização de Honduras após um longo período de governo militar. Foi o candidato do Partido Liberal na eleição presidencial de 1954, a primeira eleição livre em mais de duas décadas, vencendo por pluralidade sobre um Partido Nacional dividido, mas sem alcançar a maioria."
    HON_1963_revolution.t:0 "O Golpe de Oswaldo López?"
    HON_1963_revolution.d:0 "O golpe de Estado hondurenho de 1963 foi uma tomada militar do governo de Honduras em 3 de outubro de 1963, dez dias antes de uma eleição programada. Oswaldo López Arellano substituiu Ramón Villeda Morales como presidente e deu início a duas décadas de governo militar."
    HON_1975_revolution.t:0 "A Derrubada de Oswaldo López?"
    HON_1975_revolution.d:0 "O golpe de Estado hondurenho de 1975 ocorreu em 22 de abril de 1975, com Oswaldo López Arellano sendo destituído em um golpe militar liderado por seu colega General Juan Alberto Melgar Castro. O golpe foi motivado em parte pelo escândalo "Bananagate", exposto pela Comissão de Valores Mobiliários dos EUA em 1975, no qual a United Brands Company concordou em subornar o Presidente López com US$ 1,25 milhão, e a promessa de mais US$ 1,25 milhão mediante a redução de certas taxas de exportação de bananas."
    HON_1982_revolution.t:0 "O Retorno da Democracia?"
    HON_1982_revolution.d:0 "Em 1979, o país retornou ao governo civil. Uma assembleia constituinte foi eleita popularmente em abril de 1980 para redigir uma nova constituição, e eleições gerais foram realizadas em novembro de 1981. A constituição foi aprovada em 1982, e o governo do PLH de Roberto Suazo venceu a eleição com a promessa de realizar um ambicioso programa de desenvolvimento econômico e social para enfrentar a recessão em que Honduras se encontrava."

    PNM_1968_revolution.t:0 "O Golpe de Omar Torrijos?"
    PNM_1968_revolution.d:0 "Omar Efraín Torrijos Herrera foi um ditador panamenho, bem como Comandante da Guarda Nacional Panamenha e líder militar do Panamá de 1968 até sua morte em 1981. Torrijos nunca foi oficialmente presidente do Panamá, mas ocupou títulos como 'Líder Máximo da Revolução Panamenha'. Torrijos tomou o poder em um golpe de Estado e instituiu uma série de reformas sociais."
    PNM_1981_revolution.t:0 "A Morte de Omar Torrijos?"
    PNM_1981_revolution.d:0 "Torrijos morreu aos 52 anos quando sua aeronave, um de Havilland Canada DHC-6 Twin Otter da Força Aérea Panamenha, caiu em Cerro Marta, em Coclesito, perto de Penonomé, Panamá, em 31 de julho de 1981. A aeronave desapareceu do radar durante clima ameno, mas, devido à cobertura de radar limitada do Panamá na época, o desaparecimento do avião só foi relatado quase um dia depois. O local da queda foi localizado vários dias depois, e o corpo de Torrijos foi recuperado por uma equipe de Forças Especiais nos primeiros dias de agosto."
    PNM_1983_revolution.t:0 "A Ascensão de Manuel Noriega?"
    PNM_1983_revolution.d:0 "Manuel Antonio Noriega Moreno foi um ditador e oficial militar panamenho que foi o governante de fato do Panamá de 1983 a 1989. Nunca serviu oficialmente como presidente do Panamá, governando em vez disso como ditador militar não eleito, por meio de presidentes fantoches. Amealhando fortuna pessoal por meio de operações de tráfico de drogas realizadas pelos militares panamenhos, Noriega tinha vínculos duradouros com agências de inteligência americanas antes de a invasão dos EUA ao Panamá removê-lo do poder."
    PNM_1989_revolution.t:0 "O Retorno da Democracia no Panamá?"
    PNM_1989_revolution.d:0 "Os Estados Unidos invadiram o Panamá em 20 de dezembro de 1989, codinome Operação Causa Justa. Noriega foi capturado e levado de avião a Miami para ser julgado. O conflito terminou em 31 de janeiro de 1990. O Tribunal Eleitoral do Panamá agiu rapidamente para restaurar o governo constitucional civil, restabeleceu os resultados da eleição de maio de 1989 em 27 de dezembro de 1989, e confirmou a vitória do Presidente Guillermo Endara e dos Vice-Presidentes Guillermo Ford e Ricardo Arias Calderón."

    MEX_2000_revolution.t:0 "Fim do domínio do PRI?"
    MEX_2000_revolution.d:0 "A eleição presidencial foi vencida por Vicente Fox, da Aliança pela Mudança, que recebeu 43,4% dos votos, a primeira vez que a oposição venceu uma eleição desde a Revolução Mexicana. Nas eleições legislativas, a Aliança pela Mudança emergiu como a maior facção na Câmara dos Deputados, com 224 das 500 cadeiras, enquanto o Partido Revolucionário Institucional permaneceu a maior facção no Senado, com 60 das 128 cadeiras."

    PEU_1963_revolution.t:0 "Eleição de Fernando Belaúnde?"
    PEU_1963_revolution.d:0 "Belaúnde concorreu à presidência nas eleições gerais de 1962, desta vez com seu próprio partido, Acción Popular. Os resultados foram muito apertados; ele terminou em segundo lugar, atrás de Víctor Raúl Haya de la Torre (APRA), por menos de 14.000 votos. Como nenhum dos candidatos conseguiu obter o mínimo constitucionalmente estabelecido de um terço dos votos necessário para vencer diretamente, a escolha do Presidente caberia ao Congresso. A antiga relação antagônica entre os militares e a APRA levou Haya de la Torre a fazer um acordo com o ex-ditador Odría, que havia ficado em terceiro lugar, o que resultaria em Odría assumindo a Presidência em um governo de coalizão. No entanto, alegações generalizadas de fraude levaram os militares peruanos a depor Prado e instalar uma junta militar, liderada por Ricardo Pérez Godoy. Pérez Godoy conduziu um breve governo de transição e realizou novas eleições em 1963, vencidas por Belaúnde por uma margem mais confortável, porém ainda estreita, de cinco por cento."
    PEU_1968_revolution.t:0 "Golpe de Estado Peruano?"
    PEU_1968_revolution.d:0 "O golpe de Estado peruano de 1968 ocorreu durante a primeira presidência de Fernando Belaúnde (1963–1968), como resultado de disputas políticas que se tornaram norma, sérios embates crescentes entre o Presidente Belaúnde e o Congresso, dominado pela coalizão APRA-UNO (Unión Nacional Odríista), e mesmo confrontos entre o Presidente e seu próprio partido Acción Popular eram comuns. Após o golpe de Estado, às 7h da manhã, Belaúnde foi levado a um quartel e transportado à força para o Aeroporto Internacional Jorge Chávez, em Callao, Peru. Velasco, tendo assumido a autoridade, ordenou imediatamente a deportação de Belaúnde."
    PEU_1975_revolution.t:0 "Golpe de Estado Peruano?"
    PEU_1975_revolution.d:0 "Dificuldades econômicas, como inflação, desemprego, escassez de alimentos e o aumento da oposição política após a repressão à imprensa em 1974, acabaram por aumentar as pressões sobre a administração Velasco e levaram à sua queda. Em 29 de agosto de 1975, vários proeminentes comandantes militares iniciaram um golpe. O Primeiro-Ministro Francisco Morales Bermúdez foi então nomeado presidente, por decisão unânime da nova junta militar."
    PEU_1980_revolution.t:0 "Retorno à democracia?"
    PEU_1980_revolution.d:0 "Por volta do final do mandato de Morales Bermúdez, surgiu uma crise habitacional que deu início à Década Perdida. Morales Bermúdez, politicamente pressionado de todos os lados, não conseguiu implementar uma reforma política e econômica bem-sucedida. Uma Assembleia Constituinte convocada pela administração Morales Bermúdez foi criada em 1978, substituindo a Constituição de 1933, promulgada durante a presidência de Óscar R. Benavides. Após a realização de eleições em 1980, ele devolveu o poder ao primeiro governo democraticamente eleito após 12 anos de governo militar, chefiado pelo Presidente Fernando Belaúnde."
    PEU_1990_revolution.t:0 "Presidência de Alberto Fujimori?"
    PEU_1990_revolution.d:0 "Fujimori venceu a eleição presidencial de 1990 como candidato surpresa sob a bandeira do Cambio 90, derrotando Vargas Llosa em uma virada surpreendente. Capitalizou sobre o profundo desencanto com o presidente cessante Alan García e o partido Aliança Popular Revolucionária Americana (APRA). Alterou a constituição e serviu como presidente-fantoche sob Montesinos e as Forças Armadas Peruanas, e teria adotado o Plano Verde – um plano que envolvia o genocídio de peruanos empobrecidos e indígenas, o controle ou censura da mídia na nação e o estabelecimento de uma economia neoliberal controlada por uma junta militar."
    PEU_2000_revolution.t:0 "A Queda de Alberto Fujimori?"
    PEU_2000_revolution.d:0 "Um escândalo de corrupção envolvendo Vladimiro Montesinos eclodiu e explodiu com força total na noite de 14 de setembro de 2000, quando a emissora de TV a cabo Canal N transmitiu imagens de Montesinos aparentemente subornando o deputado de oposição Alberto Kouri para migrar ao partido Peru 2000, de Fujimori. O apoio a Fujimori praticamente entrou em colapso, e poucos dias depois ele anunciou, em pronunciamento nacional, que fecharia o SIN e convocaria novas eleições, nas quais não seria candidato. Em 10 de novembro, Fujimori obteve aprovação do Congresso para realizar eleições em 8 de abril de 2001. Em 13 de novembro, Fujimori deixou o Peru para visitar o Brunei e participar do fórum de Cooperação Econômica Ásia-Pacífico. Em 17 de novembro, Fujimori viajou do Brunei para Tóquio, onde apresentou sua renúncia presidencial por fax. O Congresso recusou-se a aceitar sua renúncia, votando, em vez disso, 62 a 9 para destituir Fujimori do cargo."
    PEU_2022_revolution.t:0 "A Tentativa de Autogolpe Peruano?"
    PEU_2022_revolution.d:0 "Em 7 de dezembro de 2022, Pedro Castillo, então Presidente do Peru, tentou dissolver ilegalmente o Congresso em meio a iminentes processos de destituição. Essa medida incluiu a imposição imediata de um toque de recolher, uma tentativa de estabelecer um governo de emergência e um apelo à formação de uma assembleia constituinte."

    URU_1973_revolution.t:0 "A Ditadura Cívico-militar do Uruguai?"
    URU_1973_revolution.d:0 "A ditadura cívico-militar do Uruguai (1973–85), também conhecida como Ditadura Uruguaia, foi uma ditadura militar autoritária que governou o Uruguai por 12 anos, de 27 de junho de 1973 (após o golpe de Estado de 1973) até 1º de março de 1985. A ditadura tem sido alvo de muita controvérsia devido às suas violações de direitos humanos, uso de tortura e os desaparecimentos inexplicados de muitos uruguaios."
    URU_1985_revolution.t:0 "O Retorno à democracia?"
    URU_1985_revolution.d:0 "Em 1984, houve greves contra o regime e em apoio aos presos políticos. Em 13 de janeiro de 1984, foi organizada a primeira greve geral de 24 horas desde 1973. As negociações entre a liderança militar e os políticos civis se intensificaram, apesar de vários líderes políticos ainda estarem notavelmente ausentes, como Wilson Ferreira Aldunate. Em 3 de agosto de 1984, o Pacto do Clube Naval foi assinado, restaurando a constituição de 1967 e permitindo que os militares assessorassem em questões de segurança e controlassem as nomeações de oficiais seniores. Em 25 de novembro de 1984, eleições foram realizadas, e após a breve presidência de Rafael Addiego Bruno, em 1º de março de 1985, o candidato do Partido Colorado, Julio María Sanguinetti, tornou-se o novo presidente."

    SPA_1947_revolution.t:0 "A Proclamação da Monarquia?"
    SPA_1947_revolution.d:0 "A Lei de Sucessão à Chefia do Estado foi a quinta das oito Leis Fundamentais do Reino que organizavam os poderes do regime franquista na Espanha. Estabeleceu disposições para a restauração da monarquia espanhola (após ser abolida pela Segunda República Espanhola em 1931), e nomeou Francisco Franco Chefe de Estado da Espanha vitaliciamente. Previa que seu sucessor seria proposto pelo próprio Franco, com o título de Rei ou Regente do Reino, mas que teria de ser aprovado pelas Cortes Espanholas."
    SPA_1973_revolution.t:0 "A Ascensão de Luis Carrero Blanco?"
    SPA_1973_revolution.d:0 "O Almirante-General Luis Carrero Blanco foi um oficial da Marinha espanhola e político. Foi também o principal redator da Lei de Sucessão à Chefia do Estado de 1947. Franco o escolheu pessoalmente como seu sucessor no papel de chefe de governo, tomando Carrero posse em junho de 1973."
    SPA_1975_revolution.t:0 "A Morte de Francisco Franco"
    SPA_1975_revolution.d:0 "Em 1973, Franco renunciou ao cargo de primeiro-ministro — separado do cargo de chefe de Estado desde 1967 — devido à sua idade avançada e à doença. No entanto, permaneceu no poder como chefe de Estado e comandante-em-chefe. Franco morreu em 1975, aos 82 anos, sendo sepultado no Valle de los Caídos. Ele restaurou a monarquia em seus últimos anos, sendo sucedido por Juan Carlos, Rei da Espanha, que liderou a transição espanhola para a democracia."
    SPA_1976_revolution.t:0 "A Transição Espanhola para a Democracia?"
    SPA_1976_revolution.d:0 "A transição espanhola para a democracia é um período da história espanhola moderna que abrange a mudança de regime, da ditadura franquista para a consolidação de um sistema parlamentar, na forma de monarquia constitucional sob Juan Carlos I."

    POR_1968_revolution.t:0 "A Ascensão de Marcelo Caetano?"
    POR_1968_revolution.d:0 "Em agosto de 1968, Salazar sofreu um derrame após uma queda em sua residência e entrou em coma. Após 36 anos no cargo, o então octogenário de 79 anos foi destituído pelo Presidente Américo Tomás. Tomás nomeou Caetano para substituir Salazar em 27 de setembro de 1968. Caetano passou a fomentar o crescimento econômico e algumas melhorias sociais, como a concessão de uma pensão mensal a trabalhadores rurais que nunca tiveram a chance de contribuir para a previdência social."
    POR_1974_revolution.t:0 "A Revolução dos Cravos?"
    POR_1974_revolution.d:0 "A Revolução dos Cravos foi um golpe militar por oficiais militares de esquerda que derrubou o governo autoritário do Estado Novo em 25 de abril de 1974, em Lisboa, produzindo grandes mudanças sociais, econômicas, territoriais, demográficas e políticas em Portugal e em suas colônias ultramarinas por meio do Processo Revolucionário Em Curso. Resultou na transição portuguesa para a democracia e no fim da Guerra Colonial Portuguesa."

    GRE_1967_revolution.t:0 "O Regime dos Coronéis?"
    GRE_1967_revolution.d:0 "A junta grega, ou Regime dos Coronéis, foi uma ditadura militar de direita que governou a Grécia de 1967 a 1974. Em 21 de abril de 1967, um grupo de coronéis derrubou o governo interino um mês antes das eleições programadas, nas quais a União de Centro de Georgios Papandreou era favorita à vitória."
    GRE_1973_revolution.t:0 "A Abolição da Monarquia Grega?"
    GRE_1973_revolution.d:0 "Em julho de 1973, a junta militar grega convocou um referendo, que aboliu a monarquia pela segunda vez na história grega. Depois, em 1974, o primeiro-ministro democraticamente eleito, Konstantinos Karamanlis, convocou um referendo que confirmou legitimamente a abolição."
    GRE_1974_revolution.t:0 "Queda da Junta?"
    GRE_1974_revolution.d:0 "O colapso da junta, tanto ideológico quanto político, foi desencadeado por uma série de eventos que se desenrolaram logo após a tentativa de liberalização de Papadopoulos, com o colapso ideológico precedendo seu eventual colapso político. Durante e após esse processo malfadado, as tensões políticas internas da junta vieram à tona e opuseram as facções da junta entre si, destruindo assim a aparentemente monolítica coesão da ditadura."
    GRE_1974_revolution_1.t:0 "O Referendo da República Grega"
    GRE_1974_revolution_1.d:0 "Após o colapso da junta militar que governava o país desde 1967, a antiga disputa entre republicanos e monarquistas ressurgiu. A junta já havia realizado, no ano anterior, um referendo de integridade duvidosa sobre a mesma questão, produzindo um voto favorável à república, que Georgios Papadopoulos usou como pretexto para se autodeclarar Presidente. No entanto, após o colapso do regime militar e eleições livres no mês anterior, o governo recém-eleito do Primeiro-Ministro Constantino Karamanlis decidiu repetir a votação, sendo o referendo da era da junta amplamente considerado questionável, tanto eleitoral quanto legalmente. 69,2% dos eleitores aprovaram a república, com um comparecimento de 75,6%."

    CYP_1974_revolution.t:0 "O Golpe de Estado Cipriota?"
    CYP_1974_revolution.d:0 "O golpe de Estado cipriota de 1974 foi um golpe militar executado pela Guarda Nacional Cipriota e patrocinado pela junta militar grega. Em 15 de julho de 1974, os conspiradores do golpe destituíram o então Presidente de Chipre, Arcebispo Makarios III, do cargo, instalando o nacionalista pró-Enosis Nikos Sampson."
    CYP_1974_revolution_1.t:0 "O Retorno da Democracia Cipriota?"
    CYP_1974_revolution_1.d:0 "A presidência de Sampson foi de curta duração, pois o regime de Ioannidis em Atenas entrou em colapso apenas alguns dias após a invasão turca. Observou-se, na época, que a Turquia ameaçava invadir a Grécia, e que os coronéis subitamente tiveram de se concentrar em tentar defender o país, em vez de permanecer no poder. O fracasso do regime em prever ou impedir a intervenção turca enfraqueceu severamente sua legitimidade e autoridade. Sem apoio, Sampson renunciou em 23 de julho, e a presidência passou a Glafkos Klerides. Makarios permaneceu em Londres por cinco meses; então, após conseguir garantir reconhecimento internacional de que sua administração era o governo legítimo de toda a ilha, retornou a Chipre, com o foco de restaurar o território cipriota."

    BEL_1951_revolution.t:0 "A Abdicação do Rei Leopold III?"
    BEL_1951_revolution.d:0 "O retorno do Rei Leopold III à Bélgica, em 22 de julho de 1950, foi recebido com uma das greves gerais mais violentas da história da Bélgica. Três manifestantes foram mortos quando a gendarmaria abriu fogo com armas automáticas. O país esteve à beira da guerra civil, e bandeiras belgas foram substituídas por bandeiras valãs em Liège e outros municípios da Valônia. Para evitar a divisão do país e preservar a monarquia, Leopold decidiu, em 1º de agosto de 1950, delegar seus poderes e deveres a seu filho de 20 anos, Baudouin, tornando-o regente. A pedido do governo, Leopold abdicou em 16 de julho de 1951 em favor de Baudouin."
    BEL_1993_revolution.t:0 "A Federação Belga?"
    BEL_1993_revolution.d:0 "Em 1970, em resposta a um crescente conflito civil entre as comunidades de língua holandesa e francesa em Bruxelas, o Governo declarou que "o Estado unitário, sua estrutura e funcionamento tal como estabelecidos por lei, haviam se tornado obsoletos". A nova constituição reconheceu a existência de fortes diferenças comunitárias e regionais dentro da Bélgica, mas buscou conciliar essas diferenças por meio da difusão do poder às comunidades e regiões. Em 1993, o parlamento aprovou um pacote constitucional que transformou a Bélgica em um Estado federal pleno."

    NET_1970_revolution.t:0 "Despilarização?"
    NET_1970_revolution.d:0 "Após a Segunda Guerra Mundial (durante a qual até a resistência holandesa era pilarizada), liberais e socialistas, mas também protestantes e católicos, começaram a duvidar do sistema pilarizado. Durante a década de 1960, os pilares em grande parte se desfizeram, particularmente sob a crítica política do D66 e do grupo Nieuw Links (Nova Esquerda) dentro do PvdA. Devido a isso e ao aumento da mobilidade, muitas pessoas puderam perceber que pessoas de outros pilares não eram tão diferentes de si mesmas. O aumento da riqueza e da educação tornou as pessoas independentes de muitas das instituições pilarizadas, e os jovens já não desejavam se associar a essas organizações."

    LUX_1948_revolution.t:0 "Fim da Neutralidade de Luxemburgo?"
    LUX_1948_revolution.d:0 "Luxemburgo abandonou formalmente sua neutralidade em 1948, com sua constituição emendada para refletir essa mudança. Seguiu-se a adesão ao Tratado de Bruxelas em 1948 e depois à OTAN em 1949, marcando o fim definitivo de seu status neutro."

    SWI_1971_revolution.t:0 "Referendo sobre o Sufrágio Feminino Suíço?"
    SWI_1971_revolution.d:0 "Um referendo sobre a introdução do sufrágio feminino foi realizado na Suíça em 7 de fevereiro de 1971. Apenas homens tinham permissão para votar, e o resultado foi que 65,7% votaram a favor da introdução. O desfecho era esperado, já que vários cantões haviam introduzido o sufrágio feminino nos anos anteriores, e o Governo suíço e vários partidos políticos apoiavam ativamente o sufrágio feminino."

    FRA_1958_revolution_0.t:0 "A Crise de Maio?"
    FRA_1958_revolution_0.d:0 "A crise de maio de 1958 na França foi uma convulsão política decisiva, provocada por tensões em torno da Guerra de Independência da Argélia. Em 13 de maio, oficiais militares de direita e colonos em Argel encenaram um golpe para se opor à nomeação de Pierre Pflimlin como Primeiro-Ministro, temendo que ele pudesse negociar com os nacionalistas argelinos. Liderada pelo General Jacques Massu e apoiada pelo ex-Governador-Geral Jacques Soustelle, a insurreição exigiu um governo de salvação pública sob Charles de Gaulle. A crise expôs a instabilidade da Quarta República, levando, em última instância, ao seu colapso e ao retorno de de Gaulle ao poder, onde estabeleceu a Quinta República, mais centralizada e resiliente."
    FRA_1958_revolution.t:0 "A Quinta República Francesa?"
    FRA_1958_revolution.d:0 "A Quinta República surgiu do colapso da Quarta República, substituindo a antiga república parlamentar por um sistema semipresidencialista (ou de duplo executivo) que dividia os poderes entre um presidente como chefe de Estado e um primeiro-ministro como chefe de governo. A constituição de 1958 também substituiu a União Francesa pela Comunidade Francesa, que permitiu que quatorze territórios membros (excluindo a Argélia) reivindicassem sua independência."
    FRA_1961_revolution.t:0 "O Putsch de Argel?"
    FRA_1961_revolution.d:0 "O putsch de Argel foi um golpe de Estado fracassado destinado a forçar o Presidente francês Charles de Gaulle a não abandonar a Argélia francesa, a comunidade europeia residente e os argelinos pró-franceses. Organizado na Argélia francesa por generais aposentados do Exército francês Maurice Challe (ex-comandante-em-chefe na Argélia francesa), Edmond Jouhaud (ex-Inspetor-Geral da Força Aérea francesa), André Zeller (ex-Chefe do Estado-Maior do Exército francês) e Raoul Salan (ex-comandante-em-chefe na Argélia francesa), ocorreu da tarde de 21 a 26 de abril de 1961, em meio à Guerra da Argélia (1954-1962), e levou a nação à beira de uma guerra civil."

    GBR_1979_revolution.t:0 "A Moção de Desconfiança?"
    GBR_1979_revolution.d:0 "Uma moção de desconfiança contra o governo trabalhista britânico de James Callaghan ocorreu em 28 de março de 1979. A moção foi apresentada pela líder da Oposição Oficial, Margaret Thatcher, e foi perdida pelo governo trabalhista por um voto (311 votos a 310), anunciado às 22h19. O resultado determinou uma eleição geral, vencida pelo Partido Conservador de Thatcher."

    RUS_1993_revolution.t:0 "A Crise Constitucional Russa?"
    RUS_1993_revolution.d:0 "Em setembro e outubro de 1993, uma crise constitucional surgiu na Federação Russa a partir de um conflito entre o Presidente Boris Yeltsin e o parlamento russo. O Presidente Yeltsin realizou um autogolpe, dissolvendo o parlamento e instituindo um sistema de governo presidencial por decreto. A crise terminou com Yeltsin usando força militar para atacar a Casa dos Soviéticos, em Moscou, e prender os legisladores. Após os eventos, Yeltsin consolidou sua posição, expandiu ainda mais os poderes do executivo, e conseguiu aprovar a adoção da constituição de 1993 da Federação Russa."
    RUS_2000_revolution.t:0 "A Ascensão de Vladimir Putin?"
    RUS_2000_revolution.d:0 "Em 31 de dezembro de 1999, o presidente Yeltsin renunciou inesperadamente, entregando o cargo ao recém-nomeado primeiro-ministro e seu sucessor escolhido, Vladimir Putin. Putin então venceu a eleição presidencial de 2000 e derrotou a insurgência chechena na Segunda Guerra Chechena. O governo de Putin aumentou a estabilidade, ao mesmo tempo em que transformou a Rússia em um Estado autoritário."
    RUS_2023_revolution.t:0 "A Rebelião do Grupo Wagner?"
    RUS_2023_revolution.d:0 "Em 23 de junho de 2023, o Grupo Wagner, uma empresa militar privada russa, envolveu-se em um grande levante contra o Governo da Rússia. Marcou o clímax do conflito entre o Grupo Wagner e o Ministério da Defesa, iniciado cerca de seis meses antes. O oligarca russo Yevgeny Prigozhin, que vinha liderando as atividades do Grupo Wagner na Ucrânia, recuou após chegar a um acordo um dia depois."
    RUS_2020_revolution.t:0 "A Emenda Constitucional Russa?"
    RUS_2020_revolution.d:0 "As emendas de 2020, propostas em janeiro de 2020, são as segundas emendas substanciais à Constituição da Rússia de 1993. Para introduzir essas emendas, Vladimir Putin, presidente da Rússia, realizou uma votação nacional. Foram aprovadas em 1º de julho por voto popular."

    UKR_2004_revolution.t:0 "A Revolução Laranja?"
    UKR_2004_revolution.d:0 "A Revolução Laranja foi uma série de protestos que levaram a uma convulsão política na Ucrânia, de finais de novembro de 2004 a janeiro de 2005. Ganhou força principalmente pela iniciativa da população em geral, provocada pelas consequências do segundo turno da eleição presidencial ucraniana de 2004, que se alegou ter sido marcado por corrupção maciça, intimidação de eleitores e fraude eleitoral. Os protestos em todo o país tiveram sucesso quando os resultados do segundo turno original foram anulados, e uma nova votação foi ordenada pela Suprema Corte da Ucrânia para 26 de dezembro de 2004. Sob intenso escrutínio de observadores nacionais e internacionais, o segundo turno repetido foi declarado "livre e justo". Os resultados finais mostraram uma vitória clara de Yushchenko, que recebeu cerca de 52% dos votos, contra 44% de Yanukovych."
    UKR_2010_revolution.t:0 "A Eleição de Viktor Yanukovych?"
    UKR_2010_revolution.d:0 "Eleições presidenciais foram realizadas na Ucrânia em 17 de janeiro de 2010. Como nenhum candidato recebeu a maioria dos votos, um segundo turno foi realizado entre a Primeira-Ministra Yulia Tymoshenko e o líder da oposição Viktor Yanukovych em 7 de fevereiro. Em 14 de fevereiro, Yanukovych foi declarado Presidente eleito e vencedor, com 50% dos votos populares."
    UKR_2014_revolution.t:0 "A Revolução do Maidan?"
    UKR_2014_revolution.d:0 "A Revolução da Dignidade, também conhecida como Revolução do Maidan, ocorreu na Ucrânia em fevereiro de 2014, ao final dos protestos do Euromaidan, quando confrontos mortais entre manifestantes e forças estatais na capital Kiev culminaram na deposição do Presidente eleito Viktor Yanukovych, no retorno à Constituição de 2004 da Ucrânia, e na eclosão da Guerra Russo-Ucraniana de 2014."
    UKR_2019_revolution.t:0 "A Eleição de Volodymyr Zelenskyy?"
    UKR_2019_revolution.d:0 "Zelenskyy anunciou sua candidatura na eleição presidencial de 2019 na noite de 31 de dezembro de 2018, junto ao discurso de Ano Novo do então presidente Petro Poroshenko. Ele venceu a eleição com 73,23% dos votos no segundo turno, derrotando Poroshenko. Posicionou-se como uma figura antiestablishment e anticorrupção."

    YUG_1974_revolution.t:0 "A Constituição de 1974?"
    YUG_1974_revolution.d:0 "Com 406 artigos originais, a constituição de 1974 foi uma das mais longas do mundo. Adicionou linguagem elaborada protegendo o sistema de autogestão da interferência estatal e ampliando a representação das repúblicas e províncias em todos os fóruns eleitorais e políticos. A Constituição chamou a reestruturada Assembleia Federal de expressão máxima do sistema de autogestão."
    YUG_1980_revolution.t:0 "Morte de Josip Broz Tito"
    YUG_1980_revolution.d:0 "Tito havia adoecido progressivamente ao longo de 1979. Em 7 de janeiro e novamente em 11 de janeiro de 1980, Tito foi internado no Centro Médico Universitário em Liubliana, capital da RS Eslovênia, com problemas de circulação nas pernas. Sua perna esquerda foi amputada logo depois, devido a bloqueios arteriais, e ele morreu de gangrena no Centro Médico de Liubliana em 4 de maio de 1980, às 15h05, três dias antes de completar 88 anos."

    tito_death.option:0 "Descanse em Paz"

    SER_2000_revolution.t:0 "O Retorno à Democracia?"
    SER_2000_revolution.d:0 "O governo de Milošević foi descrito por observadores como autoritário ou autocrático, bem como cleptocrático, com numerosas acusações de fraudes eleitorais, assassinatos políticos, supressão da liberdade de imprensa e brutalidade policial. A derrubada de Slobodan Milošević começou na República Federal da Iugoslávia após a eleição geral de 24 de setembro de 2000 e culminou na queda do governo de Slobodan Milošević em 5 de outubro de 2000."

    ALB_1997_revolution.t:0 "O Referendo da Monarquia Albanesa"
    ALB_1997_revolution.d:0 "Um referendo sobre a restauração da monarquia foi realizado na Albânia em 29 de junho de 1997, junto com eleições parlamentares. A proposta foi rejeitada por 66,7% dos eleitores. No entanto, o ex-Príncipe Herdeiro Leka afirmou que 65,7% votaram a favor."

    ROM_1965_revolution.t:0 "Ascensão de Nicolae Ceaușescu?"
    ROM_1965_revolution.d:0 "Ceaușescu ascendeu pelas fileiras do governo Socialista de Gheorghe Gheorghiu-Dej e, com a morte de Gheorghiu-Dej em 1965, sucedeu-o na liderança do Partido Comunista Romeno como secretário-geral. Ao chegar ao poder, ele suavizou a censura à imprensa e condenou abertamente a invasão da Tchecoslováquia pelo Pacto de Varsóvia em seu discurso de 21 de agosto de 1968, o que resultou em um aumento de popularidade. No entanto, o período de estabilidade resultante foi breve, pois seu governo logo se tornou totalitário e foi considerado o mais repressivo do Bloco Oriental na época."
    ROM_1967_revolution.t:0 "Emitir o Decreto 770?"
    ROM_1967_revolution.d:0 "O Decreto 770 foi um decreto do governo comunista romeno de Nicolae Ceaușescu, assinado em 1967. Restringiu o aborto e a contracepção, e visava criar uma nova e numerosa população romena."
    ROM_1974_revolution.t:0 "Promulgar a Sistematização?"
    ROM_1974_revolution.d:0 "A Sistematização refere-se ao programa de planejamento urbano realizado sob o regime de Ceaușescu. A partir de 1974, a sistematização consistiu, em grande parte, na demolição e reconstrução de vilas, cidades e municípios existentes, no todo ou em parte, com o objetivo declarado de transformar a Romênia em uma "sociedade socialista multilateralmente desenvolvida". Durante a década de 1980, Ceaușescu tornou-se obcecado em construir para si um palácio de proporções sem precedentes, junto com um bairro igualmente grandioso, o Centrul Civic, para acompanhá-lo."

    EGR_1950_revolution.t:0 "Ascensão de Walter Ulbricht?"
    EGR_1950_revolution.d:0 "Após o fim da Segunda Guerra Mundial, Ulbricht reorganizou o Partido Comunista Alemão na zona de ocupação soviética segundo moldes stalinistas. Desempenhou papel fundamental na fusão forçada do KPD e do SPD no Partido Socialista Unificado da Alemanha (SED) em 1946. Tornou-se Primeiro-Secretário do SED e líder efetivo da recém-estabelecida Alemanha Oriental em 1950."
    EGR_1971_revolution.t:0 "Ascensão de Erich Honecker?"
    EGR_1971_revolution.d:0 "Em 1970, Honecker iniciou uma disputa de poder político que levou, com o apoio do líder soviético Leonid Brejnev, à sua substituição de Walter Ulbricht como Secretário-Geral do SED e presidente do Conselho de Defesa Nacional."

    POL_1956_revolution.t:0 "O Outubro Polonês?"
    POL_1956_revolution.d:0 "O Outubro Polonês foi uma mudança na política da República Popular da Polônia ocorrida em outubro de 1956. Władysław Gomułka foi nomeado Primeiro-Secretário do governante Partido Unificado dos Trabalhadores Poloneses (PZPR), marcando o fim do stalinismo na Polônia. Os soviéticos foram pressionados a chegar a um acordo com a facção de Gomułka, levando a negociações breves, porém tensas. Os soviéticos permitiram que Gomułka permanecesse no poder e concederam maior autonomia à Polônia, em troca da manutenção de sua lealdade a Moscou."
    POL_1970_revolution.t:0 "Os Protestos de Dezembro?"
    POL_1970_revolution.d:0 "Os protestos poloneses de 1970, também conhecidos como Eventos de Dezembro de 1970, ocorreram no norte da Polônia entre 14 e 19 de dezembro de 1970. Os protestos foram provocados por um aumento repentino nos preços de alimentos e outros itens cotidianos. A liderança do Partido reuniu-se em Varsóvia e decidiu que uma revolta em larga escala da classe trabalhadora era inevitável, a menos que medidas drásticas fossem tomadas. Com o consentimento de Leonid Brejnev em Moscou, Gomułka, Kliszko e outros líderes foram forçados a renunciar: se o aumento dos preços havia sido um complô contra Gomułka, ele teve sucesso. Como Moscou não aceitaria Mieczysław Moczar, Edward Gierek foi convocado como novo líder."
    POL_1981_revolution.t:0 "A Lei Marcial?"
    POL_1981_revolution.d:0 "Em 11 de fevereiro de 1981, Jaruzelski foi nomeado Presidente do Conselho de Ministros (Primeiro-Ministro). Em 18 de outubro, Stanisław Kania foi destituído do cargo de Primeiro-Secretário do Comitê Central do Partido Unificado dos Trabalhadores Poloneses, depois que um dispositivo de escuta o gravou criticando a liderança soviética. Jaruzelski foi eleito seu sucessor. Em 13 de dezembro de 1981, Jaruzelski anunciou a introdução da lei marcial em um discurso televisionado, após a votação do Conselho de Estado no dia anterior, que autorizou formalmente sua introdução."

    IRQ_1958_revolution.t:0 "A Revolução de 14 de Julho?"
    IRQ_1958_revolution.d:0 "A Revolução de 14 de Julho, também conhecida como o golpe militar iraquiano de 1958, foi um golpe de Estado que ocorreu em 14 de julho de 1958 no Iraque, que resultou na derrubada do Rei Faisal II e do Reino do Iraque liderado pelos haxemitas. A República Iraquiana estabelecida em sua sequência encerrou a Federação Árabe Haxemita entre o Iraque e a Jordânia, que havia sido estabelecida apenas seis meses antes."
    IRQ_1963_revolution.t:0 "A Revolução do Ramadã?"
    IRQ_1963_revolution.d:0 "A Revolução do Ramadã foi um golpe militar pelo ramo iraquiano do Partido Baath, que derrubou o Primeiro-Ministro do Iraque, Abdul-Karim Qasim, em 1963. Ocorreu entre 8 e 10 de fevereiro de 1963. O ex-vice de Qasim, Abdul Salam Arif, que não era baathista, recebeu o título majoritariamente cerimonial de Presidente, enquanto o proeminente general baathista Ahmed Hassan al-Bakr foi nomeado Primeiro-Ministro. O governo durou aproximadamente nove meses, até Arif desarmar a Guarda Nacional no golpe de Estado iraquiano de novembro de 1963, seguido por uma purga de membros do Partido Baath."
    IRQ_1966_revolution.t:0 "A Morte de Abdul Salam Arif?"
    IRQ_1966_revolution.d:0 "Em 13 de abril de 1966, Arif morreu na queda do de Havilland DH.104 Dove 1, RF392, da Força Aérea Iraquiana, no sul do Iraque, cerca de 10 quilômetros do Aeroporto de Basra, sendo substituído na presidência por seu irmão Abdul Rahman. Abd al-Rahman al-Bazzaz tornou-se presidente interino por três dias, e ocorreu uma disputa de poder pela presidência. Na primeira reunião do Conselho de Defesa e do gabinete para eleger um presidente, Al-Bazzaz precisava de uma maioria de dois terços para vencer a presidência. Al-Bazzaz não teve sucesso, e Abdul Rahman Arif foi eleito presidente."
    IRQ_1968_revolution.t:0 "A Revolução de 17 de Julho?"
    IRQ_1968_revolution.d:0 "A Revolução de 17 de Julho foi um golpe incruento no Iraque em 1968, liderado por Ahmed Hassan al-Bakr, Abd ar-Razzaq an-Naif e Abd ar-Rahman al-Dawud, que destituiu o Presidente Abdul Rahman Arif e o Primeiro-Ministro Tahir Yahya, e trouxe o Ramo Regional Iraquiano do Partido Baath Socialista Árabe ao poder. Entre os baathistas envolvidos no golpe, bem como na subsequente purga da facção moderada liderada por Naif, estavam Hardan al-Tikriti, Salih Mahdi Ammash e Saddam Hussein, o futuro Presidente do Iraque."
    IRQ_1979_revolution.t:0 "O Iraque Baathista?"
    IRQ_1979_revolution.d:0 "Em meados da década de 1970, Saddam Hussein, por meio de seu cargo de chefe dos serviços de inteligência do partido, tornou-se o líder de fato do país, apesar da presidência de jure de al-Bakr. Sob as novas políticas de Saddam, tanto a economia iraquiana quanto o padrão de vida dos cidadãos cresceram, e o prestígio do Iraque dentro do mundo árabe aumentou significativamente."
    IRQ_2003_revolution.t:0 "Julgamento de Saddam Hussein?"
    IRQ_2003_revolution.d:0 "Em 2003, uma coalizão liderada pelos EUA invadiu o Iraque, acusando falsamente Saddam de desenvolver armas de destruição em massa e de ter vínculos com a al-Qaeda. Após a rápida vitória da coalizão na guerra, o Partido Baath foi banido, e Saddam foi para a clandestinidade. Após sua captura em 13 de dezembro de 2003, seu julgamento ocorreu sob o Governo Provisório Iraquiano. Em 5 de novembro de 2006, Saddam foi condenado pelo Alto Tribunal Iraquiano por crimes contra a humanidade relacionados ao massacre de Dujail de 1982, no qual mais de 140 muçulmanos xiitas foram mortos, sendo sentenciado à morte por enforcamento. Foi executado em 30 de dezembro de 2006."

    LBY_1963_revolution.t:0 "A Abolição do Reino Federal?"
    LBY_1963_revolution.d:0 "À medida que o desenvolvimento dos recursos petrolíferos avançava no início dos anos 1960, a Líbia lançou seu primeiro Plano Quinquenal, de 1963 a 1968. Um resultado negativo da nova riqueza proveniente do petróleo, no entanto, foi um declínio na produção agrícola, em grande parte por negligência. A política interna líbia continuou estável, mas a forma federal de governo havia se mostrado ineficiente e onerosa. Em abril de 1963, o Primeiro-Ministro Mohamed Othman Essed garantiu a adoção pelo parlamento de um projeto de lei, endossado pelo rei, que aboliu a forma federal de governo, estabelecendo em seu lugar um Estado unitário e monárquico com um governo central dominante."
    LBY_1969_revolution.t:0 "A Revolução al-Fateh?"
    LBY_1969_revolution.d:0 "A revolução líbia de 1969, também conhecida como Revolução al-Fateh ou Revolução de 1º de Setembro, foi um golpe de Estado e revolução realizados pelo Movimento dos Oficiais Livres, liderado pelo Coronel Muammar Gaddafi, que derrubou a monarquia senussita do Rei Idris I e resultou na formação da República Árabe Líbia."

    NYE_1962_revolution.t:0 "O Golpe de Estado do Iêmen do Norte?"
    NYE_1962_revolution.d:0 "A guerra começou com um golpe de Estado realizado em 1962 por republicanos revolucionários liderados pelo exército, sob o comando de Abdullah as-Sallal. Ele destronou o recém-coroado Rei e Imã Muhammad al-Badr e declarou o Iêmen uma república sob sua presidência. Seu governo aboliu a escravidão no Iêmen."

    SYE_1969_revolution.t:0 "O Movimento Corretivo?"
    SYE_1969_revolution.d:0 "O Movimento Corretivo foi a tomada da Frente Nacional de Libertação do Iêmen pela facção marxista liderada por Abdel Fattah Ismail e Salim Rubai, em um golpe interno incruento em 22 de junho de 1969, que derrubou o moderado Presidente Qahtan al-Shaabi. A tomada de poder pela esquerda levou posteriormente à criação do Partido Socialista Iemenita (YSP) e à transformação do Iêmen do Sul em um Estado socialista."
    SYE_1990_revolution.t:0 "Queda do Regime Comunista?"
    SYE_1990_revolution.d:0 "No contexto da perestroika na URSS, principal patrocinadora da RDPI, reformas políticas foram iniciadas no final dos anos 1980. Presos políticos foram libertados, partidos políticos foram formados, e o sistema de justiça era considerado mais equitativo do que no Norte."

    SEY_1977_revolution.t:0 "O Estado Socialista de Seicheles?"
    SEY_1977_revolution.d:0 "De 1977 a 1991, Seicheles foi governada por France-Albert René e pela Frente Progressista do Povo de Seicheles como um Estado unipartidário."
    SEY_1991_revolution.t:0 "O Retorno da Democracia?"
    SEY_1991_revolution.d:0 "O primeiro projeto de uma nova constituição não obteve os necessários 60% dos votantes em 1992, mas uma versão emendada foi aprovada em 1993."

    SOM_1969_revolution.t:0 "A República Democrática Somali?"
    SOM_1969_revolution.d:0 "A República Democrática Somali foi o nome que o governo militar socialista deu à Somália sob o Presidente Major-General Mohamed Siad Barre, após tomar o poder em um golpe de Estado em 21 de outubro de 1969. O golpe ocorreu poucos dias após um guarda-costas assassinar Abdirashid Shermarke, o segundo Presidente da nação. A administração de Barre governou a Somália pelos 21 anos seguintes, até a Somália mergulhar em guerra civil em 1991."
    SOM_1991_revolution.t:0 "Colapso da República Democrática Somali?"
    SOM_1991_revolution.d:0 "A Rebelião Somali foi o início da guerra civil na Somália, ocorrida nas décadas de 1980 e início de 1990. A rebelião começou em 1978, quando o Presidente Siad Barre passou a usar suas forças especiais para atacar grupos dissidentes baseados em clãs opostos ao seu regime. Os dissidentes vinham se tornando mais poderosos havia quase uma década, após sua abrupta mudança de aliança da União Soviética para os Estados Unidos e a desastrosa Guerra de Ogaden de 1977-78. Quando Barre foi ferido em um acidente automobilístico em 23 de maio de 1986, rivais dentro de seu próprio governo e de grupos de oposição tornaram-se mais ousados e entraram em conflito aberto. A fuga de Siad Barre da capital, em 26 de janeiro de 1991, marcou uma mudança distinta no conflito."
    SOM_1993_revolution.t:0 "A Guerra Civil Somali?"
    SOM_1993_revolution.d:0 "Em 1990-92, o direito consuetudinário entrou em colapso temporariamente, e os combates faccionais se proliferaram. Na ausência de um governo central, a Somália tornou-se um "Estado falido". Isso precipitou a chegada dos observadores militares da ONU da UNOSOM I em julho de 1992, seguidos pelas maiores missões UNITAF e UNOSOM II. Após um conflito armado entre insurgentes somalis e tropas da UNOSOM II durante 1993, a ONU se retirou da Somália em 1995."
    SOM_1995_revolution.t:0 "A Queda de Mohamed Farrah Aidid?"
    SOM_1995_revolution.d:0 "Junto com outros grupos de oposição armada no início de 1991, Mohamed Farrah Aidid conseguiu derrubar o regime de 22 anos do Presidente Barre, levando à eclosão total da guerra civil. Aidid tinha aspirações à presidência do novo governo somali e buscou alianças e uniões com outras organizações político-militares a fim de formar um governo nacional. Após o confronto de 5 de junho de 1993, que resultou na morte de dezenas de soldados da UNOSOM II, a SNA — e, por extensão, Aidid — foram culpados, fazendo dele um dos primeiros homens procurados pelas Nações Unidas. Após a incursão da Segunda-feira Sangrenta, liderada pelos EUA em 12 de julho de 1993, que resultou na morte de muitos membros proeminentes de seu clã Habr Gidr, Aidid começou a atacar deliberadamente tropas americanas pela primeira vez. O Presidente Bill Clinton respondeu implementando a Operação Gothic Serpent, enviando a Força Delta e a Força-Tarefa Ranger para capturá-lo. Durante uma batalha em Mogadíscio entre sua milícia e as forças de seu ex-aliado Osman Ali Atto, Aidid foi fatalmente ferido por um atirador de elite e morreu posteriormente em 2 de agosto de 1996."
    SOM_2006_revolution.t:0 "A Ascensão da União dos Tribunais Islâmicos?"
    SOM_2006_revolution.d:0 "A União dos Tribunais Islâmicos foi uma organização jurídica e política fundada por tribunais de Sharia sediados em Mogadíscio no início dos anos 2000, para combater a anomia decorrente da Guerra Civil Somali. Em meados/final de 2006, os Tribunais Islâmicos haviam expandido sua influência a ponto de se tornarem o governo de fato na maior parte do sul e do centro da Somália, conseguindo criar a primeira aparência de um Estado desde 1991."

    CAR_1965_revolution.t:0 "Golpe de Estado de São Silvestre?"
    CAR_1965_revolution.d:0 "O golpe de Estado de São Silvestre foi um golpe encenado por Jean-Bédel Bokassa, comandante-em-chefe do exército da República Centro-Africana (RCA), e seus oficiais, contra o governo do Presidente David Dacko, em 31 de dezembro de 1965 e 1º de janeiro de 1966."
    CAR_1976_revolution.t:0 "O Império Centro-Africano?"
    CAR_1976_revolution.d:0 "O Império Centro-Africano foi estabelecido em 4 de dezembro de 1976, quando o então Presidente da República Centro-Africana, Jean-Bédel Bokassa, declarou-se Imperador da África Central. O título completo de Bokassa era 'Imperador da África Central pela Vontade do Povo Centro-Africano, Unido dentro do Partido Político Nacional, o MESAN', e utilizava o tratamento de 'Sua Majestade Imperial'. Seus trajes régios, a cerimônia de coroação luxuosa e o regime foram, em grande parte, inspirados em Napoleão I, que havia convertido a Primeira República Francesa no Primeiro Império Francês."
    CAR_1979_revolution.t:0 "Operação Caban?"
    CAR_1979_revolution.d:0 "A Operação Caban foi uma operação militar incruenta da França em setembro de 1979 para depor o Imperador Bokassa I, reintegrar o ex-presidente exilado David Dacko, e renomear o Império Centro-Africano de volta a República Centro-Africana."

    CNG_1965_revolution.t:0 "Golpe de Estado Congolês?"
    CNG_1965_revolution.d:0 "Mobutu orquestrou outro golpe de Estado em 25 de novembro de 1965, removeu tanto o Presidente quanto o Primeiro-Ministro e tomou o controle do governo. Apesar de levantes e agitações periódicos, Mobutu governou o Congo (renomeado Zaire em 1971) até meados dos anos 1990."
    CNG_1971_revolution.t:0 "A República do Zaire?"
    CNG_1971_revolution.d:0 "A partir de 1965, Mobutu dominou a vida política do país, reestruturando o Estado em mais de uma ocasião e reivindicando o título de "Pai da Nação". Anunciou a renomeação do país para República do Zaire em 27 de outubro de 1971."
    CNG_1997_revolution.t:0 "A Queda do Zaire?"
    CNG_1997_revolution.d:0 "O Zaire entrou em colapso no final dos anos 1990, em meio à desestabilização das partes orientais do país no rescaldo do genocídio de Ruanda e ao crescimento da violência étnica. Em 1996, Laurent-Désiré Kabila, chefe da milícia AFDL, liderou uma rebelião popular contra Mobutu. Com as forças rebeldes avançando para oeste, Mobutu fugiu do país, deixando as forças de Kabila no comando. O nome do país foi restaurado para República Democrática do Congo no ano seguinte."
    CNG_2006_revolution.t:0 "O Retorno da Democracia?"
    CNG_2006_revolution.d:0 "Eleições gerais foram realizadas na República Democrática do Congo em 30 de julho de 2006. Foram as primeiras eleições multipartidárias no país em 41 anos, e as primeiras desde a derrubada do longevo líder Mobutu Sese Seko, nove anos antes. Os eleitores foram às urnas para eleger tanto um novo Presidente da República quanto uma nova Assembleia Nacional, a câmara baixa do Parlamento."

    KNG_1960_revolution.t:0 "A Presidência de Fulbert Youlou?"
    KNG_1960_revolution.d:0 "Fulbert Youlou foi um líder nacionalista congolês e ex-sacerdote católico que se tornou o primeiro Presidente da República do Congo, quando de sua independência em 1960. Em agosto de 1960, Youlou conduziu seu país à independência. Em dezembro de 1960, organizou uma conferência intercontinental em Brazzaville, na qual elogiou as vantagens do liberalismo econômico e condenou o comunismo."
    KNG_1963_revolution.t:0 "Os Trois Glorieuses?"
    KNG_1963_revolution.d:0 "Os Trois Glorieuses (literalmente, 'Três Dias Gloriosos') foram um levante no Congo-Brazzaville, ocorrido de 13 a 15 de agosto de 1963. O levante encerrou o governo do primeiro Presidente congolês, Fulbert Youlou, quando o movimento sindical de oposição e a União da Juventude Congolesa firmaram uma aliança com o exército."
    KNG_1968_revolution.t:0 "O Golpe de Estado Congolês?"
    KNG_1968_revolution.d:0 "Em 4 de setembro de 1968, após vários dias de confrontos violentos, o governo de Alphonse Massamba-Débat foi derrubado pelos militares, que forçaram Massamba-Débat a renunciar. Alfred Raoul tornou-se então chefe de Estado interino até janeiro de 1969, quando Marien Ngouabi, presidente do mesmo partido que havia trazido Massamba-Débat ao poder, assumiu o controle."
    KNG_1977_revolution.t:0 "O Assassinato de Marien Ngouabi?"
    KNG_1977_revolution.d:0 "Em 18 de março de 1977, às 14h30, o Presidente Ngouabi foi assassinado. Os acusados de participar do assassinato foram julgados, e alguns foram executados, incluindo Massamba-Débat e Barthélemy Kikadidi. No rescaldo do assassinato, o Comitê Militar do Partido (CMP) foi nomeado para chefiar um governo interino, com o conservador Coronel Joachim Yhombi-Opango a servir como Chefe de Estado."
    KNG_1979_revolution.t:0 "A Ascensão de Denis Sassou Nguesso?"
    KNG_1979_revolution.d:0 "Após o assassinato de Ngouabi em março de 1977, Yhombi-Opango tornou-se Chefe de Estado. Serviu no cargo por quase dois anos, até ser forçado a renunciar em fevereiro de 1979. Acusado de tentar formar uma "facção direitista" no PCT, foi posteriormente mantido detido por vários anos por seu sucessor, o Presidente Denis Sassou Nguesso. Além de ser colocado em prisão domiciliar, foi expulso do PCT, e sua propriedade foi confiscada em 1979; além disso, foi rebaixado do posto de general para o de soldado raso, segundo um anúncio de 20 de outubro de 1979."
    KNG_1992_revolution.t:0 "O Fim da República Popular do Congo?"
    KNG_1992_revolution.d:0 "A República Popular do Congo transitou para um sistema multipartidário após a dissolução da União Soviética em 1991, restaurando o antigo nome e a bandeira do país, e deixou de existir por volta de março de 1992. André Milongo foi nomeado primeiro-ministro de transição. O Presidente Denis Sassou Nguesso teve permissão para permanecer no cargo em caráter cerimonial durante o período de transição."
    KNG_1997_revolution.t:0 "O Retorno de Denis Sassou Nguesso?"
    KNG_1997_revolution.d:0 "Em 1997, Denis Sassou Nguesso retomou o poder no Congo-Brazzaville após uma brutal guerra civil. Apoiada por forças angolanas, sua milícia Cobra destituiu o Presidente Pascal Lissouba. O conflito devastou Brazzaville, deixando milhares de mortos, mas consolidou o retorno de Sassou Nguesso como homem forte, encerrando a breve experiência democrática do Congo e restaurando seu governo."

    TAN_1962_revolution.t:0 "A República Presidencial?"
    TAN_1962_revolution.d:0 "O domínio britânico chegou ao fim em 9 de dezembro de 1961. Elizabeth II, que havia ascendido ao trono britânico em 1952, continuou a reinar durante o primeiro ano da independência de Tanganica, mas agora distintamente como Rainha de Tanganica, representada pelo governador-geral. Em 9 de dezembro de 1962, Tanganica tornou-se uma república democrática sob um presidente executivo."
    TAN_1964_revolution.t:0 "O Estado Unipartidário?"
    TAN_1964_revolution.d:0 "Em 1962, Tanganica tornou-se uma república, com Nyerere eleito seu primeiro presidente. Sua administração buscou a descolonização e a "africanização" do serviço público, ao mesmo tempo em que promovia a unidade entre africanos indígenas e as minorias asiáticas e europeias do país. Incentivou a formação de um Estado unipartidário e buscou, sem sucesso, a formação pan-africanista de uma Federação da África Oriental com Uganda e Quênia. Após a Revolução de Zanzibar de 1964, a ilha de Zanzibar foi unificada com Tanganica para formar a Tanzânia. Após isso, Nyerere passou a dar crescente ênfase à autossuficiência nacional e ao socialismo."
    TAN_1992_revolution.t:0 "A Democratização Parcial?"
    TAN_1992_revolution.d:0 "Em 1992, a Constituição da Tanzânia foi emendada para permitir múltiplos partidos políticos. Nas primeiras eleições multipartidárias da Tanzânia, realizadas em 1995, o governante Chama Cha Mapinduzi venceu 186 das 232 cadeiras eletivas na Assembleia Nacional, e Benjamin Mkapa foi eleito presidente."

    UGA_1971_revolution.t:0 "Golpe de Estado Ugandense?"
    UGA_1971_revolution.d:0 "O golpe de Estado ugandense de 1971 foi um golpe militar executado pelos militares de Uganda, liderados pelo general Idi Amin, contra o governo do Presidente Milton Obote, em 25 de janeiro de 1971. A tomada do poder ocorreu enquanto Obote estava no exterior, participando da Reunião de Chefes de Governo da Commonwealth, em Singapura. Amin temia que Obote pudesse destituí-lo e se instalou como ditador."
    UGA_1979_revolution.t:0 "A Queda de Idi Amin?"
    UGA_1979_revolution.d:0 "À medida que o governo de Amin avançava para o final dos anos 1970, houve crescente agitação contra sua perseguição a certos grupos étnicos e dissidentes políticos, junto com a péssima reputação internacional de Uganda devido ao apoio de Amin aos sequestradores da FPLP-EO e RZ em 1976, o que levou à Operação Entebbe de Israel. Ele então tentou anexar a Região de Kagera, da Tanzânia, em 1978. O Presidente tanzaniano Julius Nyerere ordenou que suas tropas invadissem Uganda em resposta. O Exército tanzaniano e forças rebeldes capturaram com sucesso Kampala em 1979 e destituíram Amin do poder."
    UGA_1996_revolution.t:0 "A Democratização Parcial?"
    UGA_1996_revolution.d:0 "As primeiras eleições sob o governo de Museveni foram realizadas em 9 de maio de 1996. Museveni derrotou Paul Ssemogerere, do Partido Democrático, que disputou a eleição como candidato da "coalizão de forças interpartidárias", e o candidato emergente Kibirige Mayanja. Museveni venceu com 75,5% dos votos, com comparecimento de 72,6% dos eleitores aptos. Embora observadores internacionais e nacionais tenham descrito a votação como válida, ambos os candidatos derrotados rejeitaram os resultados. Museveni tomou posse como presidente pela segunda vez em 12 de maio de 1996."

    BRD_1966_revolution.t:0 "Golpe de Estado Burundinês?"
    BRD_1966_revolution.d:0 "Em 28 de novembro de 1966, Michel Micombero, o Primeiro-Ministro de 26 anos do Burundi, destituiu o rei (mwami) de 19 anos do Burundi, Ntare V, em um golpe de Estado. Ntare estava fora do país na época, e os líderes do golpe rapidamente conseguiram assumir o controle."
    BRD_1976_revolution.t:0 "Golpe de Estado Burundinês?"
    BRD_1976_revolution.d:0 "Em 1976, o Coronel Jean-Baptiste Bagaza, um tutsi, liderou um golpe incruento para derrubar Micombero e começou a promover reformas. Sua administração redigiu uma nova constituição em 1981, que manteve o status do Burundi como Estado unipartidário. Em agosto de 1984, Bagaza foi eleito chefe de Estado. Durante seu mandato, Bagaza reprimiu opositores políticos e liberdades religiosas."
    BRD_1987_revolution.t:0 "Golpe de Estado Burundinês?"
    BRD_1987_revolution.d:0 "O Major Pierre Buyoya, um tutsi, derrubou Bagaza em 1987, suspendeu a constituição e dissolveu os partidos políticos. Restabeleceu o governo militar por meio de um Comitê Militar de Salvação Nacional (CSMN)."
    BRD_1993_revolution.t:0 "A Reforma Constitucional?"
    BRD_1993_revolution.d:0 "Buyoya estabeleceu uma Comissão Nacional de Reconciliação que criou uma nova constituição em 1992, permitindo um sistema multipartidário e um governo não étnico. Concorrendo como candidato na eleição presidencial burundinesa de 1993, foi derrotado pelo candidato hutu Melchior Ndadaye, do partido de oposição FRODEBU."

    ZAN_1964_revolution.t:0 "A Revolução de Zanzibar?"
    ZAN_1964_revolution.d:0 "A Revolução de Zanzibar começou em 12 de janeiro de 1964 e levou à derrubada do Sultão de Zanzibar, Jamshid bin Abdullah, e de seu governo majoritariamente árabe, pela população majoritariamente africana negra da ilha. Karume conseguiu negociar uma fusão de Zanzibar com Tanganica para formar a nova nação da Tanzânia. A mídia da época avaliou essa fusão como uma tentativa de impedir a subversão comunista de Zanzibar. A revolução encerrou mais de 250 anos de domínio árabe em Zanzibar."

    ETH_1974_revolution.t:0 "Golpe de Estado Etíope?"
    ETH_1974_revolution.d:0 "Em 12 de setembro de 1974, o Imperador Haile Selassie foi deposto pelo Comitê Coordenador das Forças Armadas, Polícia e Exército Territorial, uma junta militar apoiada pelos soviéticos que, consequentemente, governou a Etiópia como o Derg até 28 de maio de 1991."
    ETH_1991_revolution.t:0 "Queda do Derg?"
    ETH_1991_revolution.d:0 "A queda do Derg foi uma campanha militar que resultou na derrota da junta militar governante, chamada Derg, pela coalizão rebelde Frente Democrática Revolucionária do Povo Etíope (EPRDF), em 28 de maio de 1991, em Adis Abeba, encerrando a Guerra Civil Etíope."

    ANG_1975_revolution.t:0 "A República Popular de Angola?"
    ANG_1975_revolution.d:0 "A República Popular de Angola foi o Estado socialista autodeclarado que governou Angola desde sua independência em 1975 até 25 de agosto de 1992, durante a Guerra Civil Angolana. Foi liderada pelo Movimento Popular de Libertação de Angola, que venceu a guerra civil e desde então governa o país como uma república social-democrata."
    ANG_1979_revolution.t:0 "Presidência de José Eduardo dos Santos?"
    ANG_1979_revolution.d:0 "José Eduardo Van-Dúnem dos Santos foi um político e oficial militar angolano que serviu como o segundo presidente de Angola de 1979 a 2017. Como presidente, dos Santos foi também comandante-em-chefe das Forças Armadas Angolanas (FAA) e presidente do Movimento Popular de Libertação de Angola (MPLA), o partido que governa Angola desde que conquistou a independência em 1975. Quando deixou o cargo em 2017, era o segundo presidente com mandato mais longo na África, superado apenas por Teodoro Obiang Nguema Mbasogo, da Guiné Equatorial."
    ANG_1991_revolution.t:0 "Os Acordos de Bicesse?"
    ANG_1991_revolution.d:0 "Os Acordos de Bicesse, também conhecidos como Acordos de Estoril, estabeleceram uma transição para a democracia multipartidária em Angola, sob a supervisão da missão UNAVEM II das Nações Unidas. O Presidente José Eduardo dos Santos, do MPLA, e Jonas Savimbi, da UNITA, assinaram o acordo em Lisboa, Portugal, em 31 de maio de 1991."
    ANG_2017_revolution.t:0 "Presidência de João Lourenço?"
    ANG_2017_revolution.d:0 "João Manuel Gonçalves Lourenço é um político angolano que atualmente serve como o terceiro presidente de Angola desde 26 de setembro de 2017. Anteriormente, foi ministro da defesa de 2014 a 2017. Em setembro de 2018, tornou-se presidente do Movimento Popular de Libertação de Angola (MPLA), o partido governante. Foi secretário-geral do partido de 1998 a 2003."

    MOZ_1975_revolution.t:0 "A República Popular de Moçambique?"
    MOZ_1975_revolution.d:0 "A República Popular de Moçambique foi um Estado socialista que existiu no atual Moçambique de 1975 a 1990. Foi estabelecida quando o país obteve independência de Portugal em junho de 1975, e a Frente de Libertação de Moçambique ("FRELIMO") estabeleceu um Estado socialista unipartidário liderado por Samora Machel."
    MOZ_1986_revolution.t:0 "Presidência de Joaquim Alberto Chissano?"
    MOZ_1986_revolution.d:0 "Chissano sucedeu à presidência e tornou-se líder do partido FRELIMO em 1986, quando a aeronave presidencial de Samora Machel caiu em terreno montanhoso na África do Sul. Chissano encerrou a Guerra Civil Moçambicana em 1992, negociando um tratado de paz com as forças rebeldes que "prometia nenhuma perseguição ou punição" e lhes concedia 50% dos cargos no exército moçambicano."
    MOZ_1990_revolution.t:0 "A Nova Constituição?"
    MOZ_1990_revolution.d:0 "O sucessor de Machel, Joaquim Chissano, implementou mudanças radicais no país, iniciando reformas como a transição do marxismo para o capitalismo, e começou negociações de paz com a RENAMO. A nova constituição, promulgada em 1990, previa um sistema político multipartidário, uma economia de mercado e eleições livres. Naquele mesmo ano, Moçambique aboliu "república popular" como nome oficial do país."
    MOZ_1994_revolution.t:0 "A Transição para a Democracia?"
    MOZ_1994_revolution.d:0 "Eleições gerais foram realizadas em Moçambique entre 27 e 29 de outubro de 1994, para eleger um presidente e a Assembleia da República. Foi a primeira vez que o país teve eleições multipartidárias, já que anteriormente a FRELIMO era o único partido legal. Ainda assim, a FRELIMO manteve o controle do sistema político do país, vencendo ambas as eleições."

    GNB_1973_revolution.t:0 "A República Popular da Guiné-Bissau?"
    GNB_1973_revolution.d:0 "O Partido Africano para a Independência da Guiné e Cabo Verde recorreu ao conflito armado na década de 1960 e foi um dos beligerantes na Guerra de Independência da Guiné-Bissau. Perto do fim da guerra, o partido estabeleceu um Estado socialista unipartidário, que permaneceu intacto até a introdução da democracia multipartidária no início dos anos 1990."
    GNB_1994_revolution.t:0 "A Transição para a Democracia?"
    GNB_1994_revolution.d:0 "Eleições gerais foram realizadas na Guiné-Bissau em 3 de julho de 1994, com um segundo turno para a eleição presidencial em 7 de agosto. Foram as primeiras eleições multipartidárias desde a independência, e também a primeira vez que o presidente foi eleito diretamente, já que anteriormente o cargo era eleito pela Assembleia Nacional Popular. Na eleição presidencial, o resultado foi uma vitória para o então presidente João Bernardo Vieira, do Partido Africano para a Independência da Guiné e Cabo Verde (PAIGC), que derrotou Kumba Ialá, do Partido da Renovação Social, no segundo turno."

    LIB_1971_revolution.t:0 "Liberalização da Libéria?"
    LIB_1971_revolution.d:0 "William Tolbert foi eleito presidente após a morte de William Tubman. O início da presidência de Tolbert viu reformas liberais e a adoção de uma postura de Não Alinhamento, mas crescentes problemas econômicos e tensões entre americanos-liberianos e liberianos indígenas levaram à instabilidade. Em 1973, o país retornou a um sistema bipartidário quando a Aliança Progressista da Libéria, chefiada por Gabriel Baccus Matthews, tornou-se reconhecida como partido de oposição legítimo."
    LIB_1980_revolution.t:0 "O Golpe Liberiano?"
    LIB_1980_revolution.d:0 "Em 12 de abril de 1980, um golpe militar liderado pelo Primeiro-Sargento Samuel Doe, do grupo étnico krahn, derrubou e matou o Presidente William R. Tolbert Jr. Doe e os outros conspiradores posteriormente executaram a maior parte do gabinete de Tolbert e outros funcionários governamentais americano-liberianos e membros do True Whig Party em uma praia de Monróvia. Os líderes do golpe formaram o Conselho de Redenção do Povo (PRC) para governar o país."
    LIB_1990_revolution.t:0 "A Primeira Guerra Civil Liberiana?"
    LIB_1990_revolution.d:0 "O regime totalitário e a corrupção generalizada do Presidente Samuel Doe levaram a apelos pela retirada do apoio dos Estados Unidos, no final dos anos 1980. A Frente Patriótica Nacional da Libéria (NPFL), liderada por Charles Taylor, invadiu a Libéria a partir da Costa do Marfim para derrubar Doe em dezembro de 1989, e ganhou controle sobre a maior parte do país em um ano. Doe foi capturado e executado pela Frente Patriótica Nacional Independente da Libéria (INPFL), uma facção dissidente da NPFL liderada por Prince Johnson, em setembro de 1990."
    LIB_1997_revolution.t:0 "A Ascensão de Charles Taylor?"
    LIB_1997_revolution.d:0 "Após ser destituído por peculato e preso pelo Presidente Doe, Taylor fugiu da prisão em 1989. Eventualmente chegou à Líbia, onde foi treinado como combatente guerrilheiro. Retornou à Libéria em 1989 como chefe de um grupo rebelde apoiado pela Líbia, a Frente Patriótica Nacional da Libéria, para derrubar o governo de Doe, iniciando a Primeira Guerra Civil Liberiana (1989-1996). Após a execução de Doe, Taylor ganhou controle de grande parte do país e se tornou um dos senhores da guerra mais proeminentes da África. Após um acordo de paz que encerrou a guerra, Taylor foi eleito presidente na eleição geral de 1997 como membro do Partido Patriótico Nacional (NPP). Internamente, Taylor tentou consolidar o poder por meios ditatoriais, como a purga dos militares e a prática de violência contra seus rivais políticos."
    LIB_2003_revolution.t:0 "O Retorno da Democracia na Libéria?"
    LIB_2003_revolution.d:0 "O Presidente Charles Taylor chegou ao poder em 1997, após a vitória na Primeira Guerra Civil Liberiana, que levou a dois anos de paz. Os Liberianos Unidos pela Reconciliação e Democracia (LURD), um grupo rebelde anti-Taylor apoiado pelo governo da Guiné, invadiram o norte da Libéria em abril de 1999. O LURD obteve avanços graduais contra Taylor no norte e começou a se aproximar da capital Monróvia no início de 2002. O Movimento pela Democracia na Libéria (MODEL), um segundo grupo rebelde anti-Taylor, invadiu o sul da Libéria no início de 2003 e rapidamente conquistou a maior parte do sul. Taylor, reduzido a controlar apenas um terço da Libéria e sob pressão do Cerco de Monróvia, renunciou em agosto de 2003 e fugiu para a Nigéria. O Acordo de Paz Abrangente de Acra foi assinado pelas partes beligerantes uma semana depois, marcando o fim político do conflito e o início da transição da Libéria para a democracia."

    BUF_1983_revolution.t:0 "A revolução burquinabé?"
    BUF_1983_revolution.d:0 "Em 4 de agosto de 1983, um golpe de Estado foi lançado na República do Alto Volta, em um evento às vezes chamado de revolução de agosto ou revolução burquinabé. Foi realizado por elementos radicais do exército, liderados por Thomas Sankara e Blaise Compaoré, contra o regime do Major Jean-Baptiste Ouédraogo."
    BUF_1987_revolution.t:0 "O Golpe de Estado de Burkina Faso?"
    BUF_1987_revolution.d:0 "O golpe de Estado de Burkina Faso de 1987 foi um sangrento golpe militar em Burkina Faso, ocorrido em 15 de outubro de 1987. O golpe foi organizado pelo Capitão Blaise Compaoré contra o então Presidente de extrema-esquerda, Capitão Thomas Sankara, seu antigo amigo e associado durante a convulsão de 1983."
    BUF_2014_revolution.t:0 "O Retorno da Democracia?"
    BUF_2014_revolution.d:0 "Blaise Compaoré venceu eleições em 1991, 1998, 2005 e 2010, em circunstâncias consideradas injustas. Sua tentativa de emendar a constituição para prolongar seu mandato de 27 anos causou o levante burquinabé de 2014. Em 31 de outubro de 2014, Compaoré renunciou, fugindo em seguida para a Costa do Marfim."
    BUF_2022_revolution.t:0 "O Golpe de Estado de Burkina Faso?"
    BUF_2022_revolution.d:0 "Traoré fez parte do grupo de oficiais do exército que apoiou o golpe de Estado de Burkina Faso de janeiro de 2022 e trouxe ao poder a junta militar do Movimento Patriótico para a Salvaguarda e Restauração. Quando os conspiradores lançaram seu golpe em 30 de setembro, Traoré ainda ostentava o posto de Capitão. A operação foi realizada com o apoio da unidade "Cobra". No rescaldo imediato do golpe, Traoré se declarou o novo chefe do Movimento Patriótico para a Salvaguarda e Restauração. Em 6 de outubro, assumiu também a posição de Presidente Interino, como "Chefe de Estado, Chefe Supremo das Forças Armadas"."

    MAD_1975_revolution.t:0 "Revolução Socialista Malgaxe?"
    MAD_1975_revolution.d:0 "Didier Ratsiraka foi eleito para um mandato presidencial de sete anos em um referendo nacional em 21 de dezembro de 1975, confirmando o mandato por consenso e inaugurando a Segunda República de Madagascar. O princípio orientador da administração de Ratsiraka era a necessidade de uma 'revolução socialista de cima para baixo'."
    MAD_1992_revolution.t:0 "Queda do Regime Socialista?"
    MAD_1992_revolution.d:0 "O descontentamento com o governo de Ratsiraka intensificou-se em 10 de agosto de 1991, quando mais de 400.000 cidadãos participaram de uma marcha até o Palácio Presidencial com a intenção de derrubar o governo de Ratsiraka e instalar um novo sistema político multipartidário. O resultado desses eventos foi o acordo de Ratsiraka, em 31 de outubro de 1991, para apoiar um processo de transição democrática, completo com a formulação de uma nova constituição e a realização de eleições multipartidárias livres e justas."

    NIC_1979_revolution.t:0 "A Revolução Nicaraguense?"
    NIC_1979_revolution.d:0 "A Revolução Nicaraguense abrangeu a crescente oposição à ditadura de Somoza nas décadas de 1960 e 1970, a campanha liderada pela Frente Sandinista de Libertação Nacional (FSLN) para derrubar a ditadura em 1978-79."
    NIC_1990_revolution.t:0 "O Retorno da Democracia na Nicarágua?"
    NIC_1990_revolution.d:0 "Eleições gerais foram realizadas na Nicarágua em 25 de fevereiro de 1990, para eleger o Presidente e os membros da Assembleia Nacional. O resultado foi uma vitória para a União Nacional Opositora (UNO), cuja candidata presidencial Violeta Chamorro derrotou surpreendentemente o então presidente Daniel Ortega, da Frente Sandinista de Libertação Nacional (FSLN). Isso levou a uma histórica transferência pacífica e democrática de poder na Nicarágua."
    NIC_2007_revolution.t:0 "O Regime de Daniel Ortega?"
    NIC_2007_revolution.d:0 "José Daniel Ortega Saavedra é um político, revolucionário e ex-guerrilheiro nicaraguense que, sob vários títulos, tem sido o líder da Nicarágua desde 2007 e anteriormente de 1979 a 1990. Chegou ao poder pela primeira vez como coordenador da Junta de Reconstrução Nacional, de 1979 a 1985, e depois serviu como presidente da Nicarágua de 1985 a 1990. Retomou a presidência em 2007 e serve ao lado de sua esposa Rosario Murillo como copresidente desde fevereiro de 2025. Ortega tem sido descrito como um líder autoritário."
    NIC_2025_revolution.t:0 "Os Copresidentes da Nicarágua?"
    NIC_2025_revolution.d:0 "Em 2025, a Constituição da Nicarágua foi emendada para permitir que os poderes da presidência fossem exercidos por dois copresidentes, em vez de uma única pessoa. Um copresidente e uma copresidenta são eleitos por sufrágio universal para um mandato de seis anos. Quando a emenda foi aprovada, o então presidente Daniel Ortega e sua esposa e vice-presidente Rosario Murillo foram declarados os primeiros copresidentes, tornando a Nicarágua o único país do mundo atualmente governado por uma diarquia conjugal."

    ELS_1956_revolution.t:0 "A Presidência de José María Lemus?"
    ELS_1956_revolution.d:0 "O Tenente-Coronel José María Lemus López foi presidente de El Salvador de 14 de setembro de 1956 a 26 de outubro de 1960. Antes de se tornar presidente, serviu como subsecretário de defesa e ministro do interior. Deu continuidade às reformas socioeconômicas de seu predecessor, mas não houve melhora nos padrões de vida da classe trabalhadora."
    ELS_1960_revolution.t:0 "Os golpes de Estado salvadorenhos?"
    ELS_1960_revolution.d:0 "O golpe de Estado salvadorenho de 1961 foi um contragolpe bem-sucedido em El Salvador, liderado pelo Coronel Anibal Portillo, contra a efêmera Junta de Governo que havia tomado o poder em 1960, substituindo a junta militar reformista por um ardente governo anticomunista chamado Diretório Cívico-Militar. Até o final daquele ano, o governo militar havia dado lugar ao governo democrático."
    ELS_1979_revolution.t:0 "O golpe de Estado salvadorenho?"
    ELS_1979_revolution.d:0 "O golpe de Estado salvadorenho de 1979 foi um golpe militar ocorrido em El Salvador em 15 de outubro de 1979. O golpe, liderado por jovens oficiais militares, derrubou incruentamente o Presidente militar Carlos Humberto Romero e o enviou ao exílio. O firme controle do poder pelo Partido de Conciliação Nacional foi encerrado, e em seu lugar os militares estabeleceram a Junta Revolucionária de Governo de El Salvador (JRG)."
    ELS_1984_revolution.t:0 "A Eleição de José Napoleón Duarte?"
    ELS_1984_revolution.d:0 "José Napoleón Duarte Fuentes (23 de novembro de 1925 – 23 de fevereiro de 1990) foi um político salvadorenho que serviu como Presidente de El Salvador de 1º de junho de 1984 a 1º de junho de 1989. Foi prefeito de San Salvador antes de concorrer à presidência em 1972. Perdeu, mas a eleição é amplamente considerada fraudulenta. Após um golpe de Estado em 1979, Duarte liderou a subsequente Junta cívico-militar de 1980 a 1982. Foi então eleito presidente em 1984, derrotando o líder do partido ARENA, Roberto D'Aubuisson."
    ELS_1992_revolution.t:0 "Os Acordos de Paz de Chapultepec?"
    ELS_1992_revolution.d:0 "Os Acordos de Paz de Chapultepec foram um conjunto de acordos de paz assinados em 16 de janeiro de 1992, dia em que a Guerra Civil Salvadorenha terminou. O tratado estabeleceu a paz entre o governo salvadorenho e a Frente Farabundo Martí para a Libertação Nacional (FMLN)."

    NEP_1990_revolution.t:0 "O Movimento Popular Nepalês?"
    NEP_1990_revolution.d:0 "O Movimento Popular de 1990 foi um movimento multipartidário no Nepal que pôs fim à monarquia absoluta e deu início à monarquia constitucional. Também eliminou o sistema Panchayat."
    NEP_2008_revolution.t:0 "A Abolição da Monarquia?"
    NEP_2008_revolution.d:0 "A década de 1990 viu o início da Guerra Civil Nepalesa (1996-2006), um conflito entre forças governamentais e as forças insurgentes do Partido Comunista do Nepal (Maoísta). A situação da monarquia nepalesa foi ainda mais desestabilizada pelo massacre real nepalês de 2001. Como resultado do massacre, o Rei Gyanendra retornou ao trono. Sua imposição do governo direto em 2005 provocou um movimento de protesto unificando a insurgência maoísta e ativistas pró-democracia. Após uma eleição realizada no ano seguinte, a Assembleia Constituinte nepalesa aboliu formalmente o reino em sua primeira sessão, em 28 de maio de 2008, declarando em seu lugar a República Democrática Federal do Nepal."

    PAK_1958_revolution.t:0 "Golpe de Estado Paquistanês?"
    PAK_1958_revolution.d:0 "Em 7 de outubro, Mirza revogou a Constituição do Paquistão e declarou lei marcial. Houve vários primeiros-ministros entre 1956 e 1958, chegando-se a um ponto em que o General Ayub Khan considerou que o exército deveria assumir o controle para restaurar a estabilidade."
    PAK_1970_revolution.t:0 "Retorno à Democracia?"
    PAK_1970_revolution.d:0 "Eleições gerais foram realizadas no Paquistão em 7 de dezembro de 1970, para eleger membros da Assembleia Nacional. Foram as primeiras eleições gerais diretas desde a independência do Paquistão e, em última instância, as únicas realizadas antes da independência de Bangladesh. A votação ocorreu em 300 círculos eleitorais gerais, dos quais 162 no Paquistão Oriental e 138 no Paquistão Ocidental."
    PAK_1973_revolution.t:0 "A Constituição de 1973?"
    PAK_1973_revolution.d:0 "A constituição de 1973 foi a primeira do Paquistão a ser redigida por representantes eleitos. Diferentemente da constituição de 1962, concedeu ao Paquistão uma democracia parlamentar com poder executivo concentrado no cargo de primeiro-ministro, e o chefe de Estado formal — o presidente — limitado a agir por orientação do primeiro-ministro. A Constituição estabelece que todas as leis devem estar em conformidade com os preceitos do Islã, tal como estabelecidos no Alcorão e na Sunnah."
    PAK_1977_revolution.t:0 "Golpe de Estado Paquistanês?"
    PAK_1977_revolution.d:0 "O golpe militar paquistanês de 1977 (codinome Operação Fair Play) foi o segundo golpe militar no Paquistão, ocorrido em 5 de julho de 1977. Foi realizado por Muhammad Zia-ul-Haq, chefe do estado-maior do exército, derrubando o governo do primeiro-ministro Zulfikar Ali Bhutto. O golpe em si foi incruento, e foi precedido por agitação social e conflito político entre o governo de esquerda do Pakistan Peoples Party de Bhutto e a oposição islamita de direita Pakistan National Alliance, que acusava Bhutto de fraudar as eleições gerais de 1977."
    PAK_1988_revolution.t:0 "Retorno à Democracia?"
    PAK_1988_revolution.d:0 "O Presidente Zia morreu em um acidente de avião em 1988, e Benazir Bhutto, filha de Zulfikar Ali Bhutto, foi eleita a primeira Primeira-Ministra do país. O PPP foi sucedido pela conservadora Liga Muçulmana do Paquistão (N), e ao longo da década seguinte, os líderes dos dois partidos disputaram o poder, alternando-se no cargo enquanto a situação do país piorava, com indicadores econômicos caindo drasticamente, em contraste com a década de 1980."

    HND_1947_revolution.t:0 "Destituição do Vice-Rei Archibald Wavell?"
    HND_1947_revolution.d:0 "Archibald Wavell foi destituído do cargo de Vice-Rei da Índia no início de 1947, substituído por Lord Mountbatten. Suas relações tensas com Whitehall, os fracassos na Conferência de Simla (1945) e na Missão do Gabinete (1946), e a incapacidade de resolver tensões comunais convenceram o Primeiro-Ministro Attlee de que uma nova liderança era essencial para a transição da Índia."
    HND_1952_revolution.t:0 "Status Especial para Jammu e Caxemira?"
    HND_1952_revolution.d:0 "Em 1952, o Acordo de Deli entre o Primeiro-Ministro Nehru e o Sheikh Abdullah afirmou o status especial de Jammu e Caxemira sob o Artigo 370. Concedeu autonomia sobre cidadania, propriedade e governança interna, enquanto a Índia mantinha o controle sobre defesa, relações exteriores e comunicações — consolidando a posição constitucional singular da região dentro da União. Este acordo, assinado em 24 de julho de 1952, formalizou a autonomia da Caxemira, ao mesmo tempo em que a integrava ao arcabouço constitucional da Índia. O acordo refletia um compromisso: Jammu e Caxemira poderiam manter sua própria constituição e bandeira, enquanto o Parlamento indiano teria alcance legislativo limitado."
    KAS_Special_Status.option.1:0 "Criar uma administração local republicana."
    KAS_Special_Status.option.2:0 "Manter a monarquia na administração local."
    KAS_Special_Status.option.3:0 "Anexar o território!"
    HND_1975_revolution.t:0 "A Emergência?"
    HND_1975_revolution.d:0 "A Emergência na Índia foi um período de 21 meses, de 1975 a 1977, durante o qual a Primeira-Ministra Indira Gandhi fez declarar estado de emergência em todo o país. Oficialmente emitida pelo Presidente Fakhruddin Ali Ahmed sob o Artigo 352 da Constituição, devido a uma "perturbação interna" predominante, a ordem concedeu à primeira-ministra a autoridade de governar por decreto, permitindo o cancelamento de eleições e a suspensão de liberdades civis."
    HND_1977_revolution.t:0 "Encerrar a Emergência?"
    HND_1977_revolution.d:0 "Em 18 de janeiro de 1977, Gandhi convocou novas eleições para março e libertou vários líderes da oposição; no entanto, muitos outros permaneceram presos mesmo após ela deixar o cargo, apesar do encerramento oficial da Emergência em 21 de março de 1977. A eleição geral indiana de 1977 foi realizada de 16 a 20 de março, resultando em uma vitória esmagadora para o Janata Party e a CFD, garantindo 298 cadeiras na Lok Sabha, enquanto o governante Congresso Nacional Indiano conseguiu vencer apenas 154 — uma queda de 198 em comparação com a eleição anterior."
    HND_1984_revolution.t:0 "O Assassinato de Indira Gandhi?"
    HND_1984_revolution.d:0 "A Primeira-Ministra indiana Indira Gandhi foi assassinada às 9h30 de 31 de outubro de 1984, em sua residência na Safdarjung Road, em Nova Deli. Foi morta por seus guarda-costas Satwant Singh e Beant Singh, no rescaldo da Operação Estrela Azul, uma ação militar indiana realizada entre 1 e 8 de junho de 1984, ordenada por Indira Gandhi para danificar o Templo Dourado de Harmandir Sahib, em Amritsar, Punjab, o local mais sagrado do siquismo."
    HND_1991_revolution.t:0 "O Assassinato de Rajiv Gandhi?"
    HND_1991_revolution.d:0 "O assassinato de Rajiv Gandhi, ex-Primeiro-Ministro da Índia, ocorreu como resultado de um atentado suicida com bomba em Sriperumbudur, em Tamil Nadu, Índia, em 21 de maio de 1991. Pelo menos 14 outras pessoas, além de Rajiv Gandhi, foram mortas. Foi realizado por Kalaivani Rajaratnam, de 22 anos (popularmente conhecida por seus nomes adotados Thenmozhi Rajaratnam e Dhanu), membro da organização rebelde separatista tâmil do Sri Lanka proibida, os Tigres de Libertação do Tamil Eelam (LTTE)."
    HND_2019_revolution.t:0 "Governo Direto em Jammu e Caxemira?"
    HND_2019_revolution.d:0 "Em agosto de 2019, a Índia revogou o status especial de Jammu e Caxemira sob o Artigo 370, impondo governo direto. O Jammu and Kashmir Reorganisation Act dividiu o Estado em dois Territórios da União — Jammu e Caxemira e Ladakh — com efeito a partir de 31 de outubro de 2019. A governança central substituiu a autonomia local, marcando uma mudança constitucional e política histórica. Essa medida foi justificada pelo governo como um passo rumo à integração e ao desenvolvimento, mas críticos argumentaram que minava a representação democrática e a autonomia regional."

    BHU_1952_revolution.t:0 "A Ascensão de Jigme Dorji Wangchuck?"
    BHU_1952_revolution.d:0 "Jigme Wangchuck foi sucedido por seu filho, Jigme Dorji Wangchuck. Durante seu reinado de 20 anos, que terminou em julho de 1972, começou a reorientação fundamental da sociedade butanesa. Wangchuck não apenas alcançou a reorganização da sociedade e do governo, mas também consolidou a soberania e a segurança do Butão."
    BHU_1972_revolution.t:0 "A Ascensão de Jigme Singye Wangchuck?"
    BHU_1972_revolution.d:0 "Em 21 de julho de 1972, o Terceiro Rei do Butão faleceu, e, aos 16 anos, o Príncipe Herdeiro Jigme Singye Wangchuck ascendeu ao trono, tornando-se o monarca mais jovem do mundo na época. Durante seu reinado, o Butão transicionou de uma Monarquia Absoluta para uma Monarquia Constitucional Democrática."
    BHU_2006_revolution.t:0 "A Ascensão de Jigme Khesar Namgyel Wangchuck?"
    BHU_2006_revolution.d:0 "O reinado de Jigme Khesar Namgyel Wangchuck começou em 2006, após seu pai Jigme Singye Wangchuck abdicar do trono. O jovem rei iniciou seu reinado supervisionando a democratização do Butão, presidindo as últimas sessões do parlamento, onde leis eleitorais, reforma agrária e outras questões importantes foram debatidas."
    BHU_2008_revolution.t:0 "A Democracia Parlamentar Butanesa?"
    BHU_2008_revolution.d:0 "As primeiras eleições gerais para a Assembleia Nacional foram realizadas em 24 de março de 2008. Os principais concorrentes foram o Partido da Paz e Prosperidade do Butão (DPT), liderado por Jigme Thinley, e o Partido Democrático do Povo (PDP), liderado por Sangay Ngedup. O DPT venceu as eleições, obtendo 45 das 47 cadeiras. Em 9 de abril de 2008, Jigme Thinley tornou-se o primeiro primeiro-ministro eleito; assumiu o cargo após a primeira eleição democrática do país."

    BUR_1962_revolution.t:0 "Golpe de Estado Birmanês?"
    BUR_1962_revolution.d:0 "O golpe de Estado birmanês de 1962 marcou o início do governo unipartidário na Birmânia e o domínio político dos militares na política birmanesa. No golpe de 2 de março de 1962, os militares substituíram o governo civil AFPFL, chefiado pelo Primeiro-Ministro U Nu, pelo Conselho Revolucionário da União, presidido pelo General Ne Win."
    BUR_1974_revolution.t:0 "Via Birmanesa para o Socialismo?"
    BUR_1974_revolution.d:0 "A Via Birmanesa para o Socialismo foi a ideologia de Estado da República Socialista da União da Birmânia, o Estado socialista governado pelo Partido do Programa Socialista Birmanês (BSPP) de 1962 a 1988."
    BUR_1988_revolution.t:0 "O Levante 8888?"
    BUR_1988_revolution.d:0 "O levante 8888 foi iniciado por estudantes em Yangon (Rangum) em 8 de agosto de 1988. Os protestos estudantis se espalharam por todo o país. Centenas de milhares de monges, crianças, universitários, donas de casa, médicos e pessoas comuns protestaram contra o governo."
    BUR_1990_revolution.t:0 "O Golpe de Estado do Tatmadaw?"
    BUR_1990_revolution.d:0 "Eleições gerais foram realizadas em Myanmar em 27 de maio de 1990, as primeiras eleições multipartidárias desde 1960, após as quais o país havia sido governado por uma ditadura militar. O resultado foi uma vitória esmagadora para a Liga Nacional para a Democracia (NLD) de Aung San Suu Kyi, que venceu 392 das 492 cadeiras. No entanto, a junta militar recusou-se a reconhecer os resultados e continuou a governar o país."
    BUR_2007_revolution.t:0 "A Revolução Açafrão?"
    BUR_2007_revolution.d:0 "A Revolução Açafrão foi uma série de protestos e manifestações econômicas e políticas ocorridas em agosto, setembro e outubro de 2007 em Myanmar. Os protestos foram provocados pela decisão do governo militar nacional de remover subsídios sobre os preços de venda do combustível."
    BUR_2015_revolution.t:0 "O Caminho para a Democracia?"
    BUR_2015_revolution.d:0 "Eleições gerais foram realizadas em 8 de novembro de 2015. Foram as primeiras eleições abertamente disputadas realizadas em Myanmar desde a eleição geral de 1990 (que foi anulada). Os resultados deram à NLD maioria absoluta de cadeiras em ambas as câmaras do parlamento nacional, suficiente para garantir que seu candidato se tornasse presidente, enquanto a líder da NLD, Aung San Suu Kyi, é constitucionalmente impedida de ocupar a presidência."
    BUR_2021_revolution.t:0 "O Golpe de Estado do Tatmadaw?"
    BUR_2021_revolution.d:0 "Um golpe de Estado em Myanmar começou na manhã de 1º de fevereiro de 2021, quando membros democraticamente eleitos do partido governante do país, a Liga Nacional para a Democracia (NLD), foram depostos pelo Tatmadaw — os militares de Myanmar — que então concentraram o poder em uma junta militar."
    BUR_2026_revolution.t:0 "O Governo Nominalmente Civil?"
    BUR_2026_revolution.d:0 "Em 30 de março de 2026, o General Min Aung Hlaing, que tomou o poder em um golpe em 2021, foi indicado para a vice-presidência pelo Colégio Eleitoral do Pyithu Hluttaw, pelo deputado Kyaw Kyaw Htay, do Union Solidarity and Development Party, para a indicação do comitê à eleição presidencial de Myanmar de 2026. Como era obrigado a se aposentar dos militares, deixou o cargo de comandante-em-chefe no mesmo dia, para concorrer à presidência conforme a constituição. O NDSC nomeou Ye Win Oo, um leal a Min Aung Hlaing, para sucedê-lo. Em 3 de abril, Min Aung Hlaing foi eleito o 11º presidente do país."

    CAM_1970_revolution.t:0 "A República Khmer?"
    CAM_1970_revolution.d:0 "A República Khmer foi um Estado cambojano sob a ditadura militar apoiada pelos Estados Unidos do Marechal Lon Nol, de 1970 a 1975. Seu estabelecimento foi formalmente declarado em 9 de outubro de 1970, após o golpe de Estado de 18 de março de 1970, que viu a derrubada do governo de Norodom Sihanouk e a abolição da monarquia cambojana."
    CAM_1975_revolution.t:0 "A Ascensão do Khmer Vermelho?"
    CAM_1975_revolution.d:0 "Kampuchea foi o Estado cambojano de 1975 a 1979, sob a ditadura totalitária de Pol Pot e o Partido Comunista de Kampuchea (CPK), comumente conhecido como Khmer Vermelho (KR). Foi estabelecido após a captura da capital Phnom Penh pelo Khmer Vermelho, encerrando efetivamente a República Khmer de Lon Nol, apoiada pelos Estados Unidos."
    CAM_1979_revolution.t:0 "A Queda de Pol Pot?"
    CAM_1979_revolution.d:0 "Após vários anos de incursões violentas do Khmer Vermelho em território vietnamita, resultando em massacres, o Vietnã invadiu o Camboja em dezembro de 1978. Até janeiro de 1979, Pot e o Khmer Vermelho haviam sido derrubados. Os membros sobreviventes do Khmer Vermelho recuaram para as selvas dispersas perto da fronteira tailandesa, de onde continuaram a lutar e realizar incursões. Severamente enfraquecidos, foram caçados por soldados vietnamitas até sua retirada em 1989."
    CAM_1989_revolution.t:0 "Os Acordos de Paz de Paris?"
    CAM_1989_revolution.d:0 "Em novembro de 1978, tropas vietnamitas invadiram o Camboja em resposta a incursões de fronteira do Khmer Vermelho e o conquistaram. A República Popular de Kampuchea (PRK) foi estabelecida como um Estado pró-soviético liderado pelo Partido Revolucionário Popular de Kampuchea. Em oposição ao Estado recém-criado, um governo no exílio, denominado Governo de Coalizão do Kampuchea Democrático (CGDK), foi formado em 1981 a partir de três facções. Os esforços de paz começaram em Paris em 1989, sob o Estado do Camboja, culminando dois anos depois, em outubro de 1991, em um Acordo de Paz Abrangente de Paris."
    CAM_1993_revolution.t:0 "A Restauração da Monarquia?"
    CAM_1993_revolution.d:0 "Em novembro de 1978, tropas vietnamitas invadiram o Camboja em resposta a incursões de fronteira do Khmer Vermelho e o conquistaram. Os esforços de paz começaram em Paris em 1989, sob o Estado do Camboja, culminando 2 anos depois, em outubro de 1991, em um Acordo de Paz Abrangente de Paris. A ONU recebeu um mandato para fazer cumprir um cessar-fogo e lidar com refugiados e desarmamento, conhecido como Autoridade de Transição das Nações Unidas no Camboja (UNTAC). Em 1993, a monarquia foi restaurada, com Norodom Sihanouk reintegrado como Rei, e a primeira eleição pós-guerra foi coordenada pela UNTAC."
    CAM_1997_revolution.t:0 "O Golpe de Estado Cambojano?"
    CAM_1997_revolution.d:0 "O golpe de Estado cambojano de 1997 ocorreu no Camboja de julho a setembro de 1997. Como resultado, o coprimeiro-ministro Hun Sen destituiu o outro coprimeiro-ministro Norodom Ranariddh. Pelo menos 32 pessoas foram mortas durante o golpe."
    CAM_2018_revolution.t:0 "A Consolidação do Poder por Hun Sen?"
    CAM_2018_revolution.d:0 "Seguindo as ordens de Hun Sen, em 31 de janeiro de 2017, a Assembleia Nacional votou unanimemente para abolir os cargos de Líder da Minoria e Líder da Maioria, a fim de diminuir a influência do partido de oposição. Em 2 de fevereiro de 2017, Hun Sen proibiu a oposição de questionar alguns de seus ministros de governo. Além disso, Hun Sen prometeu uma emenda constitucional que posteriormente resultou na dissolução do partido de oposição Cambodia National Rescue Party. Essa medida levou à surpreendente renúncia do líder da oposição Sam Rainsy. Eleições gerais foram realizadas no Camboja no domingo, 29 de julho de 2018, para eleger membros da sexta Assembleia Nacional. Resultaram em uma vitória esmagadora amplamente esperada para o governante Partido do Povo Cambojano (CPP), que venceu todas as 125 cadeiras na Assembleia Nacional."
    CAM_2023_revolution.t:0 "A Ascensão de Hun Manet?"
    CAM_2023_revolution.d:0 "Hun Manet (nascido em 20 de outubro de 1977) é um político e oficial militar cambojano que serve como Primeiro-Ministro do Camboja e Vice-Presidente do governante Partido do Povo Cambojano (CPP) desde 2023. É o segundo filho de Hun Sen, presidente do Senado e ex-primeiro-ministro, e de Bun Rany."

    IDO_1959_revolution.t:0 "A Democracia Guiada?"
    IDO_1959_revolution.d:0 "A Democracia Guiada foi o sistema político vigente na Indonésia de 1959 até o início da Nova Ordem, em 1966. Foi uma criação do Presidente Sukarno e uma tentativa de trazer estabilidade política. Sukarno acreditava que o sistema parlamentarista implementado durante o período de democracia liberal na Indonésia era ineficaz devido à sua situação política divisiva na época. Em vez disso, buscou um sistema baseado no sistema tradicional de discussão e consenso das aldeias, que ocorria sob a orientação dos anciãos da aldeia. Com a declaração de lei marcial e a introdução desse sistema, a Indonésia retornou ao sistema presidencialista, e Sukarno tornou-se novamente chefe de governo."
    IDO_1968_revolution.t:0 "A Nova Ordem?"
    IDO_1968_revolution.d:0 "Uma tentativa de golpe em 30 de setembro e 1º de outubro de 1965 foi contida por tropas lideradas por Suharto. Segundo a história oficial elaborada pelo exército, essa tentativa foi apoiada pelo Partido Comunista da Indonésia (PKI). O exército posteriormente conduziu uma violenta purga anticomunista em todo o país, e Suharto arrancou o poder do presidente fundador da Indonésia, Sukarno. Sob sua administração de "Nova Ordem", Suharto construiu um governo forte, centralizado e dominado pelos militares. O que começou como uma ditadura militar oligárquica evoluiu para um regime autoritário personalista centrado em Suharto."
    IDO_1998_revolution.t:0 "Democratização da Indonésia?"
    IDO_1998_revolution.d:0 "Com Suharto cada vez mais visto como a fonte das crescentes crises econômicas e políticas do país, figuras políticas proeminentes, incluindo o político muçulmano Amien Rais, manifestaram-se contra sua presidência, e em janeiro de 1998 estudantes universitários começaram a organizar manifestações em todo o país. A crise atingiu seu ápice enquanto Suharto estava em visita de Estado ao Egito, em 12 de maio de 1998, quando forças de segurança mataram quatro manifestantes da Universidade Trisakti de Jacarta. Em 21 de maio de 1998, Suharto anunciou sua renúncia, após o que o vice-presidente Habibie assumiu a presidência de acordo com a constituição."
    IDO_2001_revolution.t:0 "Autonomia Especial para Papua Ocidental?"
    IDO_2001_revolution.d:0 "Papua Ocidental obteve oficialmente o status de Autonomia Especial em 2001, quando o governo indonésio promulgou a Lei nº 21/2001. Esta legislação foi concebida para conceder à região descentralização significativa e maior autoridade sobre governança local, educação, saúde e recursos naturais, além de uma parcela maior da receita regional."
    IDO_2005_revolution.t:0 "O Acordo de Helsinque?"
    IDO_2005_revolution.d:0 "A autonomia especial de Aceh foi estabelecida após o Memorando de Entendimento de Helsinque (MoU), em 15 de agosto de 2005. Mediado pelo ex-Presidente finlandês Martti Ahtisaari, este histórico tratado encerrou um brutal conflito separatista de 30 anos entre o governo indonésio e o Movimento Aceh Livre (GAM)."

    MSY_1969_revolution.t:0 "O Incidente de 13 de Maio"
    MSY_1969_revolution.d:0 "O incidente de 13 de maio foi um episódio de violência sectária sino-malaia ocorrido em Kuala Lumpur, capital da Malásia, em 13 de maio de 1969. O motim ocorreu no rescaldo da eleição geral malaia de 1969, quando partidos de oposição, como o Democratic Action Party e o Gerakan, obtiveram ganhos às custas da coalizão governante, o Alliance Party. Os motins raciais levaram à declaração de estado de emergência nacional pelo Yang di-Pertuan Agong (Rei), resultando na suspensão do Parlamento. Um Conselho Nacional de Operações (NOC) foi estabelecido como governo interino para governar temporariamente o país entre 1969 e 1971."
    MSY_1971_revolution.t:0 "A Nova Política Econômica Malaia?"
    MSY_1971_revolution.d:0 "A Nova Política Econômica (NEP) foi um programa de reengenharia social e ação afirmativa formulado pelo Conselho Nacional de Operações (NOC) no rescaldo do Incidente de 13 de Maio na Malásia. A ação afirmativa pró-Bumiputera foi intensamente perseguida."
    MSY_1981_revolution.t:0 "A Nova UMNO?"
    MSY_1981_revolution.d:0 "Durante o primeiro mandato de Mahathir, a Malásia passou por modernização e crescimento econômico, e seu governo iniciou uma privatização generalizada da indústria e uma série de ousados projetos de infraestrutura. Mahathir foi uma figura política dominante, vencendo cinco eleições gerais consecutivas e afastando vários rivais pela liderança da UMNO. Centralizou o poder minando a independência judicial e apoiando uma emenda constitucional para remover a imunidade legal da realeza. Também deu continuidade a políticas pró-bumiputera."
    MSY_1998_revolution.t:0 "Os Julgamentos por Sodomia de Anwar Ibrahim?"
    MSY_1998_revolution.d:0 "Durante a Crise Financeira Asiática de 1997, Anwar apoiou o plano do FMI como ministro das finanças. Mahathir culpou especuladores monetários como George Soros pela crise e apoiou controles cambiais e regulação mais rígida do investimento estrangeiro. No entanto, naquele ano, os desentendimentos entre Anwar e Mahathir chegaram ao ápice em torno da Assembleia Geral quadrienal da UMNO. Anwar foi demitido do Gabinete em 2 de setembro de 1998, em meio a relatos policiais de que estava sob investigação. No dia seguinte, foi expulso da UMNO. Munawar Anees, ex-redator de discursos de Anwar, e Sukma Darmawan Sasmita Atmadja, irmão adotivo de Anwar, foram presos sob suspeita de praticar atos homossexuais."
    MSY_2018_revolution.t:0 "A Queda de Najib Razak?"
    MSY_2018_revolution.d:0 "Durante seu mandato como Primeiro-Ministro, Najib implementou vários programas de desenvolvimento econômico e de infraestrutura, incluindo a iniciativa 1Malaysia Development Berhad (1MDB). No entanto, sua liderança foi manchada por alegações de corrupção e desvio de fundos relacionados ao escândalo 1MDB, o que levou à sua queda política. Em 2018, a carreira política de Najib sofreu um revés significativo quando seu partido, o Barisan Nasional, perdeu as eleições gerais para a coalizão Pakatan Harapan. Posteriormente, enfrentou acusações legais relacionadas ao escândalo 1MDB."
    MSY_2020_revolution.t:0 "O Movimento Sheraton?"
    MSY_2020_revolution.d:0 "A crise política malaia de 2020-2022 foi desencadeada após vários Membros do Parlamento (MPs) do 14º Parlamento Malaio mudarem seu apoio partidário, levando à perda da maioria parlamentar, ao colapso de dois governos de coalizão sucessivos e à renúncia de dois Primeiros-Ministros. A crise política culminou em uma eleição geral antecipada em 2022 e na eventual formação de um governo de coalizão."
    MSY_2022_revolution.t:0 "A Ascensão de Pakatan Harapan?"
    MSY_2022_revolution.d:0 "Após a eleição geral de 2022, que resultou em um parlamento sem maioria clara, a Aliança da Esperança retornou ao poder com uma maioria de dois terços, liderada pelo Primeiro-Ministro e Presidente do PH, Anwar Ibrahim, formando um governo de coalizão com a Frente Nacional (BN), a Aliança dos Partidos de Sarawak (GPS), a Aliança do Povo de Sabá (GRS), o Partido da Herança (WARISAN), o Partido do Povo Malaio (PBM), o Partido da Harmonia Social-Democrata (KDM) e independentes. Enquanto isso, o Perikatan Nasional de Muhyiddin Yassin recusou-se a integrar a coalizão e assumiu o papel de oposição, com 74 cadeiras."

    BRU_1967_revolution.t:0 "A Abdicação de Omar Ali Saifuddien III?"
    BRU_1967_revolution.d:0 "Em 4 de outubro de 1967, após 17 anos de reinado e uma doença prolongada, Omar Ali Saifuddien declarou sua abdicação voluntária em favor de seu filho mais velho, de 21 anos, o Príncipe Herdeiro Hassanal Bolkiah, quando seu filho atingiu a adolescência e adquiriu algum entendimento dos assuntos da administração do país."

    THI_1957_revolution.t:0 "O Golpe de Sarit Thanarat?"
    THI_1957_revolution.d:0 "Em 13 de setembro de 1957, Sarit entregou a Phibun o ultimato do exército. O ultimato, assinado por 58 oficiais do exército, exigia a renúncia do governo. Na manhã seguinte, Sarit e seu exército encenaram um golpe de Estado. Em menos de uma hora, o exército conseguiu capturar pontos estratégicos sem resistência."
    THI_1973_revolution.t:0 "O Levante Popular Tailandês?"
    THI_1973_revolution.d:0 "O levante popular de 14 de outubro de 1973 foi um evento marcante na história da Tailândia. O levante resultou no fim da ditadura militar governante do anticomunista Thanom Kittikachorn e alterou o sistema político tailandês. Notavelmente, evidenciou a crescente influência dos universitários tailandeses na política."
    THI_1976_revolution.t:0 "O Golpe de Estado Tailandês?"
    THI_1976_revolution.d:0 "Um período pós-levante de agitação e instabilidade, bem como o temor de uma tomada comunista após a queda de Saigon em 1975, culminou no massacre da Universidade Thammasat, em outubro de 1976. Um golpe de Estado naquele dia trouxe à Tailândia um novo governo ultradireitista, que reprimiu veículos de mídia, funcionários e intelectuais, e gerou uma insurgência comunista."
    THI_1980_revolution.t:0 "A Nomeação de Prem Tinsulanonda?"
    THI_1980_revolution.d:0 "Aproveitando uma onda de sentimentos de direita alimentada pela crise de refugiados da Indochina, incursões de fronteira vietnamitas e dificuldades econômicas, o homem forte militar Prem Tinsulanonda foi nomeado Primeiro-Ministro em 1980. Após negociações com Prem, os comunistas abandonaram a insurgência por volta de 1983. O primeiro-ministrado de Prem foi apelidado de "semidemocracia", porque o Parlamento era composto por uma Câmara totalmente eleita e um Senado totalmente nomeado."
    THI_1997_revolution.t:0 "A Constituição do Povo?"
    THI_1997_revolution.d:0 "A Constituição do Reino da Tailândia, Era Budista 2540 (1997), foi uma constituição da Tailândia promulgada em 11 de outubro de 1997 para substituir a Constituição de 1991, sendo amplamente celebrada como um marco na reforma constitucional democrática tailandesa; representou a constituição mais democrática da história da nação. A constituição de 1997 criou uma legislatura bicameral. Pela primeira vez na história tailandesa, ambas as câmaras foram diretamente eleitas."
    THI_2006_revolution.t:0 "O Golpe de Estado Tailandês?"
    THI_2006_revolution.d:0 "O golpe de Estado tailandês de 2006 ocorreu em 19 de setembro de 2006, quando o Exército Real Tailandês encenou um golpe de Estado contra o governo interino eleito do Primeiro-Ministro Thaksin Shinawatra. O golpe de Estado, que foi a primeira mudança de governo não constitucional da Tailândia em quinze anos, desde o golpe tailandês de 1991, seguiu-se a uma crise política de um ano envolvendo Thaksin, seus aliados e opositores políticos, e ocorreu menos de um mês antes de eleições nacionais para a Câmara estarem programadas para ocorrer."
    THI_2011_revolution.t:0 "O Retorno Tailandês à Democracia?"
    THI_2011_revolution.d:0 "Os manifestantes da Frente Unida pela Democracia Contra a Ditadura (UDD), ou "Camisas Vermelhas", que ocuparam o centro de Bangkok em abril e maio de 2010, haviam exigido novas eleições. A contraproposta do governo de realizar eleições em 14 de novembro de 2010 foi rejeitada por eles e seguida de uma repressão violenta quando os manifestantes se recusaram a se dispersar. As eleições foram finalmente anunciadas em maio de 2011."
    THI_2014_revolution.t:0 "O Golpe de Prayut Chan-o-cha?"
    THI_2014_revolution.d:0 "Em 22 de maio de 2014, as Forças Armadas Reais Tailandesas, lideradas pelo General Prayut Chan-o-cha, Comandante do Exército Real Tailandês (RTA), lançaram um golpe de Estado, o 12º desde o primeiro golpe do país em 1932, contra o governo interino da Tailândia, após seis meses de crise política. Os militares estabeleceram uma junta chamada Conselho Nacional para a Paz e a Ordem (NCPO) para governar a nação. O golpe encerrou o conflito político entre o regime liderado pelos militares e o poder democrático, presente desde o golpe tailandês de 2006, conhecido como o 'golpe inacabado'."
    THI_2023_revolution.t:0 "O Retorno Tailandês à Democracia?"
    THI_2023_revolution.d:0 "Em maio de 2023, a oposição reformista da Tailândia, o progressista Move Forward Party (MFP) e o populista Pheu Thai Party, venceram a eleição geral, o que significou que os partidos monarquistas-militares que apoiavam o Primeiro-Ministro Prayuth Chan-ocha perderam o poder. Em 22 de agosto de 2023, Srettha Thavisin, do populista partido Pheu Thai, tornou-se o novo primeiro-ministro da Tailândia, enquanto a figura bilionária de proa do partido Pheu Thai, Thaksin Shinawatra, retornou à Tailândia após anos em exílio autoimposto."

    JAP_1947_revolution.t:0 "A Constituição Pós-Guerra do Japão?"
    JAP_1947_revolution.d:0 "A Constituição do Japão é a constituição do Japão e a lei suprema do Estado. Foi escrita principalmente por funcionários civis americanos que trabalhavam sob a ocupação Aliada do Japão após a Segunda Guerra Mundial. A atual constituição japonesa foi promulgada como uma emenda à Constituição Meiji de 1890 em 3 de novembro de 1946, entrando em vigor em 3 de maio de 1947."
    notice_of_3P_action.option:0 "É o que é."
    JAP_1955_revolution.t:0 "O Sistema de 1955?"
    JAP_1955_revolution.d:0 "O Sistema de 1955 foi a ordem política pós-guerra do Japão, dominada pelo Partido Liberal Democrático após a fusão dos partidos conservadores em 1955, produzindo um prolongado governo unipartidário sustentado por fortes laços burocrático-empresariais, distribuição clientelista de obras públicas e competição faccional dentro do PLD; proporcionou estabilidade política e rápido crescimento econômico, mas dependia de máquinas locais personalizadas e incentivos eleitorais que geravam corrupção, sendo gradualmente enfraquecido por escândalos, pela crise econômica do início dos anos 1990 e pela reforma eleitoral."
    JAP_1994_revolution.t:0 "A Reforma Eleitoral de 1994?"
    JAP_1994_revolution.d:0 "Em 1994, o Japão substituiu seus distritos plurinominais, propensos à corrupção, por um sistema misto que combinava cadeiras uninominais e representação proporcional. A reforma visava fomentar a competição bipartidária e deslocar o foco das eleições da política local de "clientelismo" para plataformas partidárias nacionais. Em última análise, essas mudanças fortaleceram a liderança partidária e centralizaram o poder, embora o Partido Liberal Democrático tenha permanecido, em grande parte, a força dominante."

    NKO_1994_revolution.t:0 "A Ascensão de Kim Jong Il?"
    NKO_1994_revolution.d:0 "Kim Jong Il foi um político norte-coreano que foi o segundo líder supremo da Coreia do Norte. Liderou a Coreia do Norte desde a morte de seu pai, Kim Il Sung, em 1994, até sua própria morte em 2011, quando foi sucedido por seu filho, Kim Jong Un."
    NKO_2012_revolution.t:0 "A Ascensão de Kim Jong Un?"
    NKO_2012_revolution.d:0 "Kim Jong Un é um político norte-coreano que é líder supremo da Coreia do Norte desde 2011 e líder do Partido dos Trabalhadores da Coreia (WPK) desde 2012. É o terceiro filho de Kim Jong Il, que foi o segundo líder supremo da Coreia do Norte de 1994 até sua morte em 2011, e de Ko Yong Hui."

    SKO_1960_revolution.t:0 "A Revolução de Abril?"
    SKO_1960_revolution.d:0 "A Revolução de Abril foi uma série de protestos em massa na Coreia do Sul contra o Presidente Syngman Rhee e a Primeira República, de 11 a 26 de abril de 1960, que levaram à renúncia de Rhee. Os protestos foram provocados pela descoberta do corpo de um estudante local de ensino médio morto pela polícia durante manifestações contra eleições fraudadas em março. O descontentamento popular havia surgido devido ao governo autocrático de Rhee, à corrupção, ao uso de violência contra a oposição política e ao desenvolvimento desigual da Coreia do Sul."
    SKO_1961_revolution.t:0 "O Golpe de 16 de Maio?"
    SKO_1961_revolution.d:0 "O golpe de Estado militar de 16 de maio foi um golpe militar na Coreia do Sul em 1961, organizado e executado por Park Chung Hee e seus aliados, que formaram o Comitê Revolucionário Militar, nominalmente liderado pelo Chefe do Estado-Maior do Exército Chang Do-yong, após a aquiescência deste no dia do golpe. O golpe tornou impotente o governo democraticamente eleito do Primeiro-Ministro Chang Myon e do Presidente Yun Posun, e encerrou a Segunda República, instalando um Conselho Supremo militar reformista para a Reconstrução Nacional, efetivamente liderado por Park, que assumiu como presidente após a prisão do General Chang em julho."
    SKO_1972_revolution.t:0 "A Constituição Yushin?"
    SKO_1972_revolution.d:0 "Em outubro de 1972, Park dissolveu a legislatura e suspendeu a constituição de 1963 em um autogolpe. O trabalho de redação de uma nova constituição então começou. Uma nova constituição, a chamada Constituição Yushin, foi aprovada em um plebiscito fortemente fraudado em novembro de 1972. Park recebeu amplos poderes para governar por decreto e suspender liberdades constitucionais. O mandato presidencial foi aumentado de quatro para seis anos, sem limites de reeleição. Para todos os efeitos, isso codificou os poderes de emergência que Park vinha exercendo no ano anterior, transformando sua presidência em uma ditadura legal."
    SKO_1979_revolution.t:0 "O Assassinato de Park Chung Hee?"
    SKO_1979_revolution.d:0 "Park Chung Hee foi assassinado em 26 de outubro de 1979, durante um jantar em uma casa segura da Agência Central de Inteligência da Coreia (KCIA), próxima ao complexo presidencial Casa Azul, no distrito de Jongno, Seul, Coreia do Sul. Kim Jae-gyu, diretor da KCIA e chefe de segurança do presidente, foi responsável pelo assassinato. Park foi baleado no peito e na cabeça, e morreu quase imediatamente."
    SKO_1987_revolution.t:0 "A Luta Democrática de Junho?"
    SKO_1987_revolution.d:0 "A Luta Democrática de Junho foi um movimento pró-democracia em todo o país na Coreia do Sul, que gerou protestos em massa de 10 a 29 de junho de 1987. As manifestações forçaram o governo dominante a realizar eleições presidenciais diretas e instituir outras reformas democráticas, o que levou ao estabelecimento da Sexta República, o atual governo da Coreia do Sul."
    SKO_2016_revolution.t:0 "O Impeachment de Park Geun-hye?"
    SKO_2016_revolution.d:0 "O impeachment de Park Geun-hye, Presidente da Coreia do Sul, foi o culminar de um escândalo político envolvendo intervenções na presidência por sua assessora, Choi Soon-sil. Revelações surgiram no final de outubro de 2016, mostrando que a assessora da Presidente Park Geun-hye, Choi Soon-sil, que não tinha cargo oficial no governo, havia usado sua posição para buscar doações de dinheiro de vários conglomerados empresariais (conhecidos como chaebol), incluindo Samsung, Hyundai, SK Group e Lotte, para duas fundações que controlava. A votação do impeachment ocorreu em 9 de dezembro de 2016, com 234 dos 300 membros da Assembleia Nacional votando a favor do impeachment e da suspensão temporária dos poderes e deveres presidenciais de Park Geun-hye."
    SKO_2024_revolution.t:0 "A Lei Marcial?"
    SKO_2024_revolution.d:0 "Em 3 de dezembro de 2024, às 22h27 no horário da Coreia (KST), Yoon Suk Yeol, presidente da Coreia do Sul, declarou lei marcial durante um discurso televisionado. Em sua declaração, acusou o Partido Democrático (DPK), que possui maioria na Assembleia Nacional, de conduzir "atividades antiestatais" e colaborar com "comunistas norte-coreanos" para destruir o país, criando assim uma "ditadura legislativa". Este evento foi amplamente caracterizado por políticos coreanos e organizações de notícias, tanto internacionais quanto nacionais, como uma tentativa de golpe de Estado."
    SKO_2024_1_revolution.t:0 "O Impeachment de Yoon Suk Yeol?"
    SKO_2024_1_revolution.d:0 "Em 14 de dezembro de 2024, Yoon Suk Yeol, presidente da Coreia do Sul, sofreu impeachment pela Assembleia Nacional. Esta ação veio em resposta à declaração de lei marcial de Yoon em 3 de dezembro de 2024, que foi revogada pela Assembleia Nacional e oficialmente retirada seis horas depois, em 4 de dezembro de 2024."

    ROC_1975_revolution.t:0 "Morte de Chiang Kai-shek?"
    ROC_1975_revolution.d:0 "Em 1975, 26 anos após Chiang ter chegado a Taiwan, ele morreu em Taipé, aos 87 anos. Havia sofrido um ataque cardíaco e pneumonia nos meses anteriores, e morreu de insuficiência renal agravada por insuficiência cardíaca avançada, em 5 de abril. O funeral de Chiang foi realizado em 16 de abril. Yen Chia-kan tornou-se o segundo Presidente após a morte de Chiang Kai-shek."
    ROC_1978_revolution.t:0 "A Ascensão de Chiang Ching-kuo?"
    ROC_1978_revolution.d:0 "À medida que Chiang Kai-shek entrava em seus últimos anos, gradualmente concedeu mais responsabilidades a seu filho, e quando morreu em abril de 1975, o Vice-Presidente Yen Chia-kan tornou-se presidente pelo restante do mandato de Chiang Kai-shek, enquanto Chiang Ching-kuo sucedeu à liderança do KMT (optou pelo título de "Presidente", em vez do título de "Diretor-Geral" do Chiang mais velho). Chiang Ching-kuo foi eleito presidente da ROC na eleição presidencial taiwanesa de 1978 pela Assembleia Nacional, em 20 de maio de 1978."
    ROC_1996_revolution.t:0 "Democratização de Taiwan?"
    ROC_1996_revolution.d:0 "Em 1987, a lei marcial foi suspensa, e Taiwan iniciou um processo de democratização, começando com a abolição das Disposições Temporárias e culminando com a primeira eleição presidencial direta em 1996."

    NVM_1969_revolution.t:0 "A Ascensão de Lê Duẩn?"
    NVM_1969_revolution.d:0 "Lê Duẩn foi um político comunista vietnamita. Ascendeu na hierarquia do partido no final dos anos 1950 e tornou-se Secretário-Geral do Comitê Central do Partido Comunista do Vietnã (VCP) no 3º Congresso Nacional em 1960. Deu continuidade à política de Hồ Chí Minh de governar por liderança coletiva. Da metade da década de 1960 (quando a saúde de Hồ estava debilitada) até sua própria morte em 1986, foi o principal tomador de decisões no Vietnã."
    NVM_1986_revolution.t:0 "A Ascensão de Nguyễn Văn Linh?"
    NVM_1986_revolution.d:0 "Nguyễn Văn Linh foi um revolucionário e político vietnamita. Nguyễn Văn Linh foi o secretário-geral do Partido Comunista do Vietnã de 1986 a 1991 e um líder político do Vietcong durante a Guerra do Vietnã. Durante seu tempo no cargo, Linh foi um forte defensor do "Đổi Mới" (renovação), um plano econômico cujo objetivo é transformar a economia vietnamita em uma economia de mercado de orientação socialista. Como tal, Linh foi frequentemente apelidado de o "Gorbachev vietnamita", em referência ao líder soviético que introduziu a Perestroika."

    SVM_1955_revolution.t:0 "Referendo do Estado do Vietnã"
    SVM_1955_revolution.d:0 "O referendo do Estado do Vietnã de 1955 determinou a futura forma de governo do Estado do Vietnã, a nação que viria a se tornar a República do Vietnã (amplamente conhecida como Vietnã do Sul). Foi disputado pelo Primeiro-Ministro Ngô Đình Diệm, que propunha uma república, e pelo ex-imperador Bảo Đại, que havia abdicado em 1945 e, à época do referendo, detinha o título de chefe de Estado."
    SVM_1963_revolution.t:0 "Golpe de Estado Sul-Vietnamita?"
    SVM_1963_revolution.d:0 "Em novembro de 1963, o Presidente Ngô Đình Diệm e o Partido Revolucionário Trabalhista Personalista do Vietnã do Sul foram depostos por um grupo de oficiais do Exército da República do Vietnã, apoiados pela CIA, que discordavam da forma como Diệm conduzia a crise budista e a ameaça norte-vietnamita e vietcongue ao Vietnã do Sul."

    SRL_1956_revolution.t:0 "O Ato Somente Sinhala"
    SRL_1956_revolution.d:0 "O Official Language Act (Nº 33 de 1956), comumente chamado de Ato Somente Sinhala, foi um ato aprovado no Parlamento do Ceilão em 1956. O ato substituiu o inglês pelo sinhala como único idioma oficial do Ceilão, com a exclusão do tâmil. O ato foi controverso, pois seus apoiadores o viam como uma tentativa de uma comunidade recém-independente de se distanciar de seus antigos senhores coloniais, enquanto seus opositores o viam como uma tentativa da maioria linguística de oprimir e afirmar domínio sobre as minorias."
    SRL_1978_revolution.t:0 "Criar uma Presidência Forte?"
    SRL_1978_revolution.d:0 "A nova Constituição, promulgada em 7 de setembro de 1978, previa um parlamento unicameral e um Presidente Executivo. O mandato do presidente e a duração do parlamento foram ambos fixados em seis anos. A nova Constituição também introduziu uma forma de representação proporcional plurinominal para as eleições parlamentares, que passaria a ter 196 membros (posteriormente aumentados para 225 pela Décima Quarta Emenda à Constituição)."

    BNG_1975_revolution.t:0 "A Era Presidencial?"
    BNG_1975_revolution.d:0 "Em janeiro de 1975, Sheikh Mujibur Rahman introduziu o governo socialista unipartidário sob o BAKSAL. Rahman proibiu todos os jornais, exceto quatro publicações estatais, e emendou a constituição para aumentar seu poder. Foi assassinado durante um golpe em 15 de agosto de 1975, e a presidência passou ao usurpador Khondaker Mostaq Ahmad por quatro meses. Bangladesh foi governado por uma junta militar liderada pelo Administrador-Chefe da Lei Marcial por três anos. Em 1977, o chefe do exército Ziaur Rahman tornou-se presidente."
    BNG_1991_revolution.t:0 "Retorno à Democracia Parlamentar?"
    BNG_1991_revolution.d:0 "Após a eleição geral de 1991, a décima segunda emenda à constituição restaurou a república parlamentar, e Begum Khaleda Zia tornou-se a primeira primeira-ministra de Bangladesh. Zia, ex-primeira-dama, liderou um governo do BNP de 1990 a 1996. Em 1991, seu ministro das finanças, Saifur Rahman, iniciou um grande programa para liberalizar a economia de Bangladesh."
    BNG_2009_revolution.t:0 "A Ascensão de Sheikh Hasina?"
    BNG_2009_revolution.d:0 "O segundo mandato de Sheikh Hasina como primeira-ministra foi marcado por má gestão econômica e corrupção desenfreada, levando ao aumento da dívida externa, da inflação, do desemprego juvenil e a irregularidades bancárias. É amplamente considerado que Bangladesh sofreu retrocesso democrático sob seu governo. A Human Rights Watch documentou desaparecimentos forçados e execuções extrajudiciais generalizados sob seu governo. Numerosos políticos e jornalistas foram sistemática e judicialmente punidos por contestarem suas posições."
    BNG_2024_revolution.t:0 "O Retorno da Democracia?"
    BNG_2024_revolution.d:0 "Hasina renunciou em 5 de agosto de 2024, quando grandes multidões de manifestantes cercaram a residência da primeira-ministra. Sua renúncia foi anunciada pelo General Waker-uz-Zaman, Chefe do Estado-Maior do Exército. Mais tarde naquele dia, Hasina fugiu para a Índia em uma partida caótica, primeiro de carro, depois de helicóptero, e finalmente de avião. Partiu sem discurso de renúncia. Após dissolver o parlamento em 6 de agosto de 2024, o presidente de Bangladesh, Mohammed Shahabuddin, indicou Yunus para servir como chefe do governo interino de Bangladesh, atendendo às exigências estudantis após a renúncia da ex-Primeira-Ministra Sheikh Hasina."

    AST_1975_revolution.t:0 "Encerrar a Política da Austrália Branca?"
    AST_1975_revolution.d:0 "A partir da década de 1950, os australianos começaram a repensar suas atitudes em relação a questões raciais. Um movimento pelos direitos aborígenes foi fundado e apoiado por muitos australianos brancos liberais, e uma campanha contra a política da Austrália Branca também foi lançada. O referendo de 1967 foi realizado e amplamente aprovado para emendar a Constituição, removendo referências discriminatórias e concedendo ao parlamento nacional o poder de legislar especificamente para os aborígenes australianos. Os aborígenes australianos começaram a assumir representação nos parlamentos australianos durante a década de 1970."
    AST_1999_revolution.t:0 "O Referendo Republicano"
    AST_1999_revolution.d:0 "O referendo republicano australiano, realizado em 6 de novembro de 1999, foi um referendo com duas perguntas para emendar a Constituição da Austrália. A primeira pergunta questionava se a Austrália deveria se tornar uma república, com um presidente nomeado pelo Parlamento segundo um modelo de nomeação bipartidário aprovado por uma Convenção Constitucional meio eleita, meio nomeada, realizada em Camberra em fevereiro de 1998. A segunda pergunta, geralmente considerada muito menos importante politicamente, questionava se a Austrália deveria alterar a Constituição para inserir um preâmbulo. O referendo republicano foi derrotado."

    FIJ_1987_revolution.t:0 "Os golpes de Estado fijianos?"
    FIJ_1987_revolution.d:0 "Os golpes de Estado fijianos de 1987 resultaram na derrubada do governo eleito do Primeiro-Ministro fijiano Timoci Bavadra, na deposição de Elizabeth II como Rainha de Fiji, e na declaração de uma república. O primeiro golpe de Estado, no qual Bavadra foi deposto, ocorreu em 14 de maio de 1987; um segundo golpe de Estado em 25 de setembro encerrou a monarquia, e foi seguido pouco depois pela proclamação de uma república em 10 de outubro. Ambas as ações militares foram lideradas pelo Tenente-Coronel Sitiveni Rabuka, então terceiro no comando das Forças Militares Reais de Fiji."
    FIJ_2000_revolution.t:0 "O golpe de Estado fijiano?"
    FIJ_2000_revolution.d:0 "O golpe de Estado de Fiji de 2000 foi um golpe civil por nacionalistas i-Taukei (étnicos fijianos) linha-dura contra o governo eleito do Primeiro-Ministro indo-fijiano Mahendra Chaudhry, em 19 de maio de 2000. Seguiu-se uma tentativa em 27 de maio pelo Presidente Ratu Sir Kamisese Mara de afirmar autoridade executiva, e depois um golpe militar em 29 de maio pelo Comandante das Forças Militares da República de Fiji, Comodoro Frank Bainimarama."
    FIJ_2006_revolution.t:0 "O golpe de Estado fijiano?"
    FIJ_2006_revolution.d:0 "O golpe de Estado fijiano de dezembro de 2006 foi um golpe de Estado em Fiji, realizado pelo Comodoro Frank Bainimarama contra o Primeiro-Ministro Laisenia Qarase e o Presidente Josefa Iloilo. Foi o culminar de uma crise política iniciada no ano anterior, quando o governo Qarase apresentou três projetos de lei ao Parlamento fijiano. Os projetos de lei Qoliqoli, do Tribunal de Terras, e de Reconciliação, Tolerância e Unidade tratavam dos conflitos étnicos em curso em Fiji e do rescaldo do golpe de 2000, sendo considerados pró-etnia fijiana. Bainimarama, Comandante das Forças Militares da República de Fiji (RFMF), apresentou ao governo uma lista de exigências em 16 de outubro, que incluía a retirada dos projetos de lei."
    FIJ_2014_revolution.t:0 "O Retorno à Democracia?"
    FIJ_2014_revolution.d:0 "Eleições gerais foram realizadas em Fiji em 17 de setembro de 2014 para selecionar os 50 membros do Parlamento. O partido FijiFirst, liderado pelo Primeiro-Ministro Frank Bainimarama, venceu com uma maioria esmagadora, obtendo 32 das 50 cadeiras. As eleições haviam sido originalmente programadas para março de 2009, mas foram adiadas porque os políticos não concordaram com a Carta do Povo para Mudança, Paz e Progresso. Entre 2009 e 2014, vários anúncios públicos e pedidos foram feitos por eleições, e em 23 de março de 2014 o governo interino anunciou que as eleições seriam realizadas em 17 de setembro de 2014."

    AFG_1973_revolution.t:0 "A República do Afeganistão?"
    AFG_1973_revolution.d:0 "O golpe de Estado afegão de 1973 foi liderado pelo General do Exército e príncipe Mohammad Daoud Khan contra seu primo, o Rei Mohammad Zahir Shah, em 17 de julho de 1973, resultando no estabelecimento da República do Afeganistão sob um sistema unipartidário liderado por Daoud Khan."
    AFG_1978_revolution.t:0 "A Revolução Saur?"
    AFG_1978_revolution.d:0 "A Revolução Saur foi encenada em 27-28 de abril de 1978 pelo Partido Democrático Popular do Afeganistão (PDPA) e derrubou o presidente afegão Mohammed Daoud Khan."
    AFG_1979_revolution.t:0 "O Golpe de Hafizullah Amin?"
    AFG_1979_revolution.d:0 "Uma crescente disputa pessoal com o Secretário-Geral Taraki eventualmente levou Amin a arrancar-lhe o poder e depô-lo com sucesso, ordenando posteriormente sua execução; em 16 de setembro de 1979, Amin nomeou-se Presidente do Conselho de Ministros (chefe de governo), Presidente do Conselho Revolucionário (chefe de Estado), e Secretário-Geral do Comitê Central do PDPA (líder supremo)."
    AFG_1986_revolution.t:0 "A Reconciliação Nacional?"
    AFG_1986_revolution.d:0 "O Presidente Najibullah lançou o programa de "Reconciliação Nacional" no início de 1987, cujo objetivo era unir a nação e encerrar a guerra que a envolvia havia sete anos. Em novembro de 1987, Najibullah aprovou com sucesso uma nova constituição para o Afeganistão, criando um sistema presidencial com um parlamento bicameral eletivo. A constituição declarou "a sagrada religião do Islã" a religião oficial, garantiu os direitos democráticos do indivíduo, tornou legal a formação de "partidos políticos" e promoveu a igualdade entre as várias tribos e nacionalidades. Como parte da nova estrutura, eleições parlamentares nacionais foram realizadas em 1988 para eleger membros da nova Assembleia Nacional, as primeiras eleições desse tipo no Afeganistão em 19 anos."
    AFG_1996_revolution.t:0 "O Emirado Islâmico do Afeganistão?"
    AFG_1996_revolution.d:0 "Até setembro de 1996, o Talibã havia capturado Cabul, matado o presidente do país e estabelecido o Emirado Islâmico do Afeganistão. A primeira medida do Talibã foi instituir uma interpretação estrita da instrução e jurisprudência corânicas."

    LAO_1975_revolution.t:0 "A Ascensão do Pathet Lao?"
    LAO_1975_revolution.d:0 "O Pathet Lao, oficialmente o Exército de Libertação Popular do Laos, foi um movimento e organização política comunista no Laos, formado em meados do século XX. O grupo eventualmente conquistou todo o país em 1975, após a Guerra Civil Laociana."

    MLY_1951_revolution.t:0 "O Assassinato de Sir Henry Gurney?"
    MLY_1951_revolution.d:0 "O Assassinato de Sir Henry Gurney ocorreu em 6 de outubro de 1951, no auge da Emergência Malaia. Gurney, o Alto Comissário britânico na Malaia, foi morto por membros do Partido Comunista Malaio na Estrada Kuala Kubu, a caminho de Fraser's Hill para uma reunião."
    MLY_1955_revolution.t:0 "Autogoverno Pleno na Malaia?"
    MLY_1955_revolution.d:0 "Eleições gerais foram realizadas na Federação da Malaia na quarta-feira, 27 de julho de 1955, a única eleição geral antes da independência em 1957. Foram realizadas para eleger membros do Conselho Legislativo Federal, cujos membros haviam sido anteriormente todos nomeados pelo Alto Comissário britânico. A votação ocorreu em todos os 52 círculos eleitorais federais, cada um elegendo um membro. Eleições estaduais também ocorreram em todos os 136 círculos eleitorais estaduais em nove Estados da Malaia e dois assentamentos, de 10 de outubro de 1954 a 12 de novembro de 1955, cada um elegendo um conselheiro para o Conselho Estadual ou Conselho de Assentamento."

    SGP_1963_revolution.t:0 "Operação Coldstore?"
    SGP_1963_revolution.d:0 "A Operação Coldstore foi o nome-código para uma operação de segurança secreta executada em Singapura em 2 de fevereiro de 1963, que levou à prisão de 113 pessoas, detidas sem julgamento nos termos da Preservation of Public Service Security Ordinance (PSSO). Em relatos oficiais, a operação foi uma operação de segurança destinada a paralisar a organização de frente aberta comunista, que ameaçava a segurança interna de Singapura. A operação foi autorizada pelo Conselho de Segurança Interna, composto por representantes do governo britânico, do governo de Singapura e do governo Federal Malaio."
    SGP_1990_revolution.t:0 "Aposentadoria de Lee Kuan Yew?"
    SGP_1990_revolution.d:0 "Após liderar o PAP à vitória em sete eleições, Lee deixou o cargo em 28 de novembro de 1990, transferindo o cargo de primeiro-ministro a Goh Chok Tong. Até então, havia se tornado o primeiro-ministro com mais tempo de serviço no mundo. Esta foi a primeira transição de liderança desde a independência. Goh foi eleito o novo Primeiro-Ministro pelos ministros mais jovens então em exercício."
    SGP_2004_revolution.t:0 "Primeiro-Ministrado de Lee Hsien Loong?"
    SGP_2004_revolution.d:0 "Em 12 de agosto de 2004, Lee sucedeu Goh Chok Tong como primeiro-ministro e cedeu a presidência da Autoridade Monetária de Singapura a Goh. O Chefe de Justiça Yong Pung How empossou Lee no Istana. Como primeiro-ministro, Lee também se tornou presidente da People's Association. Em seus primeiros dois anos, seu governo instituiu a semana de trabalho de cinco dias e estendeu os dias de licença-maternidade. Sua proposta de construir dois Resorts Integrados em Singapura para aumentar a receita do turismo levou ao desenvolvimento do Marina Bay Sands e do Resorts World Sentosa."
    SGP_2024_revolution.t:0 "Primeiro-Ministrado de Lawrence Wong?"
    SGP_2024_revolution.d:0 "Em 6 de junho de 2022, foi anunciada uma reforma ministerial na qual Wong foi promovido a Vice-Primeiro-Ministro, o que consolidou ainda mais sua posição como sucessor do Primeiro-Ministro Lee Hsien Loong. Além de se tornar Vice-Primeiro-Ministro, também foi nomeado "Primeiro-Ministro Interino" na ausência de Lee. Wong posteriormente emergiu como o aparente sucessor de Lee ao cargo de primeiro-ministro; o plano inicial deste último de deixar o cargo aos 70 anos havia sido complicado pela desistência de Heng. Em 15 de abril de 2024, o Gabinete do Primeiro-Ministro emitiu um comunicado à imprensa confirmando que Lawrence Wong sucederia Lee Hsien Loong como primeiro-ministro."

    PHI_1965_revolution.t:0 "Presidência de Ferdinand Marcos?"
    PHI_1965_revolution.d:0 "Ferdinand Marcos tomou posse em seu primeiro mandato como o 10º presidente das Filipinas em 30 de dezembro de 1965. Sua posse marcou o início de sua permanência de duas décadas no poder, mesmo que a Constituição filipina de 1935 tivesse estabelecido um limite de apenas dois mandatos de quatro anos. Marcos havia vencido a eleição presidencial filipina de 1965 contra o então presidente, Diosdado Macapagal."
    PHI_1986_revolution.t:0 "A Revolução do Poder Popular?"
    PHI_1986_revolution.d:0 "A Revolução do Poder Popular foi uma série de manifestações populares nas Filipinas, principalmente na Grande Manila, de 22 a 25 de fevereiro de 1986. Houve uma campanha sustentada de resistência civil contra a violência do regime e a fraude eleitoral. A revolução não violenta levou à saída de Ferdinand Marcos, ao fim de sua ditadura de 20 anos e à restauração da democracia nas Filipinas."

    KAZ_1991_revolution.t:0 "A Ascensão de Nursultan Nazarbayev?"
    KAZ_1991_revolution.d:0 "A carreira política de Nazarbayev começou na era soviética, quando ingressou no Partido Comunista da União Soviética em 1962, enquanto trabalhava como operário em uma fábrica de aço. Ascendendo nas fileiras do partido, tornou-se Primeiro-Ministro da RSS do Cazaquistão em 1984 e Primeiro-Secretário do Partido Comunista do Cazaquistão em 1989. Em 1990, o Soviete Supremo o elegeu presidente do Cazaquistão. Nazarbayev desempenhou papel fundamental ao conduzir o Cazaquistão pela dissolução da União Soviética, levando à independência do país em 1991. Na primeira eleição presidencial direta do país, em 1991, Nazarbayev apareceu na cédula sem oposição e obteve uma vitória esmagadora."
    KAZ_2019_revolution.t:0 "A Ascensão de Kassym-Jomart Tokayev?"
    KAZ_2019_revolution.d:0 "Em 2019, Tokayev assumiu o cargo de presidente interino após a renúncia de Nursultan Nazarbayev. Sendo membro do governante partido Amanat, venceu uma eleição antecipada em junho daquele ano, com o apoio de Nazarbayev como indicado do partido. Durante sua presidência, promulgou várias reformas, incluindo o aumento dos salários dos trabalhadores, a redução da corrupção, a abolição da pena capital e a descentralização do governo local. Embora tenha conseguido manter a estabilidade do país, garantir a transição política e promulgar novas reformas, a governança de Tokayev permaneceu autoritária, com abusos de direitos humanos."

    UZB_1991_revolution.t:0 "A Ascensão de Islam Karimov?"
    UZB_1991_revolution.d:0 "Islam Abduganiyevich Karimov foi um político uzbeque que serviu como primeiro presidente do Uzbequistão, desde a independência do país em 1991 até sua morte em 2016. Governou um regime autoritário repressivo no Uzbequistão, onde opositores políticos eram assassinados, os direitos humanos eram reprimidos, e a dissidência era proibida; no entanto, a pena capital foi revogada em 1998."
    UZB_2016_revolution.t:0 "A Ascensão de Shavkat Mirziyoyev?"
    UZB_2016_revolution.d:0 "Shavkat Miromonovich Mirziyoyev é um político uzbeque que serve como Presidente do Uzbequistão e Comandante Supremo das Forças Armadas do Uzbequistão desde 14 de dezembro de 2016. Anteriormente, Mirziyoyev liderou o governo como Primeiro-Ministro do Uzbequistão de 2003 a 2016. Sob sua presidência, Mirziyoyev implementou uma série de reformas liberais no sistema político e econômico do Uzbequistão, atraindo investimento estrangeiro, melhorando relações com países vizinhos da Ásia Central, bem como libertando presos políticos, o que foi notavelmente acompanhado pelo fechamento da infame Prisão de Jaslyk em 2019."

    TKM_1991_revolution.t:0 "A Ascensão de Saparmurat Niyazov?"
    TKM_1991_revolution.d:0 "Saparmurat Atayevich Niyazov foi um político turcomeno que liderou o Turcomenistão de 1985 até sua morte em 2006. Foi o primeiro-secretário do Partido Comunista do Turcomenistão de 1985 a 1991 e apoiou a tentativa de golpe soviético de 1991. Continuou a governar o Turcomenistão como primeiro presidente por 15 anos após a independência da União Soviética em 1991."
    TKM_2006_revolution.t:0 "A Ascensão de Gurbanguly Berdimuhamedow?"
    TKM_2006_revolution.d:0 "Gurbanguly Mälikgulyýewiç Berdimuhamedow é um político turcomeno e ex-dentista que foi presidente do Conselho do Povo do Turcomenistão. Anteriormente, serviu como segundo presidente do Turcomenistão de 2006 a 2022, quando estabeleceu um arranjo de partilha de poder com seu filho, Serdar."
    TKM_2022_revolution.t:0 "A Ascensão de Serdar Berdimuhamedow?"
    TKM_2022_revolution.d:0 "Serdar Gurbangulyýewiç Berdimuhamedow é um político turcomeno que serve como terceiro e quarto presidente do Turcomenistão desde 2022. Berdimuhamedow havia servido anteriormente em vários outros cargos dentro do governo de seu pai, Gurbanguly, o governante autoritário de longa data do Turcomenistão. Pai e filho estabeleceram um arranjo de partilha de poder em 2022, por meio do qual governam conjuntamente uma ditadura totalitária no Turcomenistão."

    TAJ_1991_revolution.t:0 "A Ascensão de Rahmon Nabiyev?"
    TAJ_1991_revolution.d:0 "Rahmon Nabiyevich Nabiyev foi um político tajique que serviu como Primeiro-Secretário do Partido Comunista do Tajiquistão de 1982 a 1985, e duas vezes como o 2º Presidente do Tajiquistão, de 23 de setembro de 1991 a 6 de outubro de 1991 e de 2 de dezembro de 1991 a 7 de setembro de 1992."
    TAJ_1992_revolution.t:0 "A Ascensão de Emomali Rahmon?"
    TAJ_1992_revolution.d:0 "Emomali Rahmon é um político tajique que serve como Presidente do Tajiquistão desde 1994. Rahmon chefia um regime autoritário no Tajiquistão com elementos de culto à personalidade. Opositores políticos são reprimidos, violações de direitos humanos e liberdades são severas, as eleições não são livres nem justas, e a corrupção e o nepotismo são desenfreados."

    KYR_1990_revolution.t:0 "A Ascensão de Askar Akayev?"
    KYR_1990_revolution.d:0 "Askar Akayevich Akayev é um ex-político quirguiz que serviu como Presidente do Quirguistão de 1990 até ser derrubado na Revolução das Tulipas de março de 2005."
    KYR_2005_revolution.t:0 "A Revolução das Tulipas?"
    KYR_2005_revolution.d:0 "A Revolução das Tulipas, também conhecida como a Primeira Revolução Quirguiz, levou à queda do então Presidente do Quirguistão, Askar Akayev, do poder. A revolução começou após as eleições parlamentares de 27 de fevereiro e 13 de março de 2005. Os revolucionários alegaram corrupção e autoritarismo por parte de Akayev, sua família e seus apoiadores. Akayev fugiu para o Cazaquistão e depois para a Rússia."

    SOV_stalin_succession.t:0 "O Sucessor de Stalin?"
    SOV_stalin_succession.d:0 "Em 1º de março de 1953, Iósif Stálin, o líder de 73 anos da União Soviética, sofreu uma hemorragia cerebral, da qual morreu quatro dias depois. O velório de Stálin no Kremlin foi ocasião para que dezenas de milhares de cidadãos soviéticos enlutados se aglomerassem no centro de Moscou. Mesmo enquanto Stálin agonizava, o Presidium do partido, um órgão ampliado que havia substituído o Politburo no XIX Congresso, em outubro de 1952, reuniu-se para decidir quem exerceria a autoridade máxima."
    SOV_khrushchev.option:0 "Selecionar Nikita Khrushchov"
    SOV_beria.option:0 "Selecionar Lavrenti Béria"
    SOV_molotov.option:0 "Selecionar Vyacheslav Mólotov"
    SOV_zhukov.option:0 "Selecionar Gueorgui Júkov"
    SOV_khrushchev_succession.t:0 "A Queda de Nikita Khrushchov?"
    SOV_khrushchev_succession.d:0 "Khrushchov desfrutou de forte apoio durante a década de 1950, graças a grandes vitórias como a Crise de Suez, o lançamento do Sputnik, a Crise Síria de 1957 e o incidente do U-2 em 1960. No entanto, no início dos anos 1960, a popularidade de Khrushchov foi corroída por falhas em suas políticas, bem como por sua condução da Crise dos Mísseis de Cuba. Isso encorajou seus potenciais opositores, que silenciosamente ganharam força e o depuseram em outubro de 1964."
    SOV_khrushchev_succession_option.1:0 "Khrushchov é substituído por Brejnev"
    SOV_khrushchev_succession_option.2:0 "Khrushchov sobrevive ao desafio de liderança!"
    SOV_gorbachev_succession.t:0 "Um Secretário-Geral Reformista?"
    SOV_gorbachev_succession.d:0 "Em 10 de março de 1985, Chernenko morreu. Gromyko propôs Gorbachov como o próximo secretário-geral, e, como membro de longa data do partido, a recomendação de Gromyko teve grande peso junto ao Comitê Central. Gorbachov esperava forte oposição à sua nomeação como secretário-geral, mas, em última análise, o restante do Politburo o apoiou. Pouco após a morte de Chernenko, o Politburo elegeu Gorbachov unanimemente como seu sucessor, pois o preferiam a outro líder idoso. Ele se tornou assim o oitavo líder da União Soviética. Poucos no governo imaginavam que ele seria um reformista tão radical quanto se provou ser."
    SOV_gorbachev.option:0 "Damos as boas-vindas a um líder mais dinâmico!"
    SOV_other.option:0 "Preferimos outro líder idoso..."
    SOV_august_coup.t:0 "O Golpe de Agosto"
    SOV_august_coup.d:0 "O Golpe de Agosto foi uma tentativa fracassada de linha-duras do Partido Comunista da União Soviética de tomar à força o controle do país de Mikhail Gorbachov, então Presidente Soviético e Secretário-Geral do Partido Comunista. Os líderes do golpe consistiam em altos funcionários militares e civis, incluindo o Vice-Presidente Gennady Yanayev, que juntos formaram o Comitê Estatal para o Estado de Emergência (GKChP). Eles se opunham ao programa de reformas de Gorbachov, estavam irritados com a perda de controle sobre os Estados da Europa Oriental, e temiam o Novo Tratado da União da URSS, que estava prestes a ser assinado. O tratado deveria descentralizar grande parte do poder do governo central soviético e distribuí-lo entre suas quinze repúblicas."
    SOV_august_coup.optio:0 "O golpe fracassa!"
    SOV_august_coup_other.option:0 "O golpe é bem-sucedido."
    SOV_khrushchev_thaw.t:0 "O Degelo de Khrushchov?"
    SOV_khrushchev_thaw.d:0 "O Degelo de Khrushchov é o período de meados dos anos 1950 a meados dos anos 1960, quando a repressão e a censura na União Soviética foram relaxadas devido às políticas de desestalinização e coexistência pacífica com outras nações de Nikita Khrushchov."
    SOV_detente.t:0 "Reaproximação com o Ocidente?"
    SOV_detente.d:0 "Durante seus dezoito anos como Líder da URSS, a marca registrada de Brejnev na política externa foi a promoção da détente. Embora compartilhasse algumas semelhanças com abordagens seguidas durante o Degelo de Khrushchov, a política de Brejnev diferiu significativamente do precedente de Khrushchov em dois aspectos. O primeiro foi que era mais abrangente e ampla em seus objetivos, incluindo a assinatura de acordos sobre controle de armas, prevenção de crises, comércio Leste-Oeste, segurança europeia e direitos humanos. A segunda parte da política baseava-se na importância de equiparar a força militar dos Estados Unidos e da União Soviética."
    SOV_brezhnev_succession.t:0 "A Morte de Leonid Brejnev"
    SOV_brezhnev_succession.d:0 "Após 1975, a saúde de Brejnev deteriorou-se rapidamente, e ele progressivamente se afastou dos assuntos internacionais, mantendo, porém, o controle do poder. Morreu em 10 de novembro de 1982 e foi sucedido como secretário-geral por Yuri Andropov."
    SOV_andropov_succession_option.1:0 "Yuri Andropov é o nosso futuro!"
    SOV_andropov_succession.t:0 "A Morte de Yuri Andropov"
    SOV_andropov_succession.d:0 "Após sofrer insuficiência renal em fevereiro de 1983, a saúde de Andropov começou a deteriorar-se rapidamente. Morreu em 9 de fevereiro de 1984, tendo liderado o país por cerca de 15 meses. Após a morte de Brejnev e de seu sucessor Yuri Andropov, Chernenko foi eleito Secretário-Geral em fevereiro de 1984 e nomeado Presidente do Presidium do Soviete Supremo em abril de 1984. Devido à sua saúde rapidamente debilitada, frequentemente não conseguia cumprir suas funções oficiais."
    SOV_chernenko_succession_option.1:0 "Konstantin Chernenko é o nosso futuro?"
    SOV_glasnost.t:0 "Promulgar a Glasnost?"
    SOV_glasnost.d:0 "A Glasnost passou a significar maior abertura e transparência nas instituições e atividades governamentais na União Soviética (URSS). A Glasnost refletia o compromisso da administração Gorbachov de permitir que os cidadãos soviéticos discutissem publicamente os problemas de seu sistema e possíveis soluções."
    SOV_democratisation.t:0 "Promulgar a Demokratizatsiya?"
    SOV_democratisation.d:0 "A Demokratizatsiya foi um slogan introduzido pelo Secretário-Geral do Partido Comunista Soviético, Mikhail Gorbachov, em janeiro de 1987, clamando pela infusão de elementos "democráticos" no governo unipartidário da União Soviética. A Demokratizatsiya de Gorbachov significava a introdução de eleições com múltiplos candidatos — embora não multipartidárias — para funcionários locais do Partido Comunista (PCUS) e sovietes. Dessa forma, ele esperava rejuvenescer o partido com pessoal progressista que executaria suas reformas institucionais e políticas."

    PRC_1954_revolution.t:0 "A Constituição da República Popular da China?"
    PRC_1954_revolution.d:0 "A Constituição de 1954 da República Popular da China foi uma constituição de Estado comunista e a sétima constituição chinesa, adotada e promulgada em 20 de setembro de 1954, através da primeira sessão do 1º Congresso Nacional do Povo em Pequim. Esta constituição foi emendada e formulada com base no Programa Comum da Conferência Consultiva Política do Povo Chinês, que serviu como constituição provisória em 1949, sendo a primeira constituição da República Popular da China. A Constituição da República Popular da China é a lei fundamental da República Popular da China e possui o mais alto efeito jurídico."
    PRC_1966_revolution.t:0 "A Revolução Cultural?"
    PRC_1966_revolution.d:0 "A Revolução Cultural (CR), formalmente conhecida como a Grande Revolução Cultural Proletária, foi um movimento sociopolítico na República Popular da China (RPC). Foi lançada por Mao Zedong em 1966 e durou até sua morte em 1976. Seu objetivo declarado era preservar o comunismo chinês, expurgando remanescentes de elementos capitalistas e tradicionais da sociedade chinesa. Embora não tenha alcançado seus principais objetivos, a CR marcou o retorno efetivo de Mao ao centro do poder."
    PRC_1966_revolution.option.1:0 "Expurgar os dissidentes!"
    PRC_1966_revolution.option.2:0 "Não me importo de ser contestado..."
    PRC_mao_succession.t:0 "O Sucessor de Mao?"
    PRC_mao_succession.d:0 "A saúde de Mao declinou em seus últimos anos, provavelmente agravada por seu tabagismo compulsivo. Tornou-se segredo de Estado que ele sofria de múltiplos males pulmonares e cardíacos durante seus últimos anos. Sua última aparição pública — e a última fotografia conhecida dele em vida — foi em 27 de maio de 1976, quando se encontrou com o Primeiro-Ministro paquistanês visitante Zulfikar Ali Bhutto. Sofreu dois grandes ataques cardíacos, um em março e outro em julho, depois um terceiro em 5 de setembro, que o deixou inválido. Morreu quase quatro dias depois, às 00h10 de 9 de setembro de 1976, aos 82 anos."
    PRC_deng.option:0 "Deng Xiaoping assumirá o poder!"
    PRC_jing_qing.option:0 "O Bando dos Quatro governará a China!"
    PRC_1989_1_revolution.t:0 "O Incidente de Quatro de Junho"
    PRC_1989_1_revolution.d:0 "Os protestos da Praça Tiananmen, conhecidos na China como o Incidente de Quatro de Junho, foram manifestações lideradas por estudantes, realizadas na Praça Tiananmen, Pequim, China, de 15 de abril a 4 de junho de 1989. Após semanas de tentativas malsucedidas entre os manifestantes e o governo chinês de encontrar uma resolução pacífica, o governo chinês declarou lei marcial na noite de 3 de junho e enviou tropas para ocupar a praça."
    PRC_1989_revolution.option.1:0 "Nada aconteceu naquela noite!"
    PRC_1989_revolution.option.2:0 "Algo aconteceu naquela noite."
    PRC_1989_2_revolution.t:0 "Presidência de Jiang Zemin?"
    PRC_1989_2_revolution.d:0 "Jiang foi nomeado prefeito de Xangai em 1985, sendo posteriormente promovido a secretário do Partido Comunista da cidade, bem como membro do Politburo do PCC, em 1987. Jiang chegou ao poder inesperadamente como candidato de compromisso após os protestos e o massacre da Praça Tiananmen de 1989, quando substituiu Zhao Ziyang como secretário-geral do PCC, depois que Zhao foi destituído por seu apoio ao movimento estudantil. À medida que o envolvimento dos 'Oito Anciãos' na política chinesa declinava constantemente, Jiang consolidou seu controle do poder até se tornar o 'líder supremo' do país durante a década de 1990."
    PRC_2002_revolution.t:0 "Presidência de Hu Jintao?"
    PRC_2002_revolution.d:0 "Hu ascendeu ao poder através do Partido Comunista Chinês (PCC), notadamente como secretário do Comitê do Partido para a província de Guizhou e a Região Autônoma do Tibete, onde sua dura repressão à dissidência lhe rendeu atenção dos mais altos escalões. Ascendeu a primeiro-secretário do Secretariado Central do PCC e vice-presidente sob o secretário-geral do PCC, Jiang Zemin. Hu foi o primeiro líder do Partido Comunista de uma geração mais jovem do que a que participou da guerra civil e da fundação da república. Patrocinadores influentes da geração mais velha promoveram sua rápida ascensão."
    PRC_2012_revolution.t:0 "Presidência de Xi Jinping?"
    PRC_2012_revolution.d:0 "Em 2008, Xi foi designado como o presumível sucessor de Hu Jintao como líder supremo. Xi foi eleito presidente em 14 de março de 2013, em uma votação de confirmação pelo 12º Congresso Nacional do Povo, em Pequim. Recebeu 2.952 votos favoráveis, um voto contrário e três abstenções. Substituiu Hu Jintao, que se aposentou após cumprir dois mandatos."

    MGL_1952_revolution.t:0 "A Ascensão de Yumjaagiin Tsedenbal?"
    MGL_1952_revolution.d:0 "Em 26 de janeiro de 1952, Yumjaagiin Tsedenbal tomou o poder na Mongólia após a morte de Choibalsan. Tsedenbal foi a principal figura política da Mongólia por mais de 30 anos."
    MGL_1984_revolution.t:0 "A Ascensão de Jambyn Batmönkh?"
    MGL_1984_revolution.d:0 "Em 1984, junto com D. Molomjamts, Batmönkh desempenhou papel fundamental em facilitar a saída de Tsedenbal do poder. Em 1984, tornou-se chefe de Estado quando o líder de longa data do partido, Yumjaagiin Tsedenbal, foi destituído em um congresso partidário."

    USA_1963_revolution.t:0 "Assassinato de John F. Kennedy?"
    USA_1963_revolution.d:0 "Em 22 de novembro de 1963, John F. Kennedy, o 35º presidente dos Estados Unidos, foi assassinado enquanto seguia em uma comitiva presidencial pela Dealey Plaza, em Dallas, Texas. Kennedy estava no veículo com sua esposa, Jacqueline, o Governador do Texas John Connally e a esposa de Connally, Nellie, quando foi fatalmente baleado a partir do próximo Texas School Book Depository pelo ex-fuzileiro naval dos EUA Lee Harvey Oswald."
    USA_1964_revolution.t:0 "Aprovar o Civil Rights Act?"
    USA_1964_revolution.d:0 "O Civil Rights Act de 1964 é uma lei histórica de direitos civis e trabalhistas nos Estados Unidos que proíbe a discriminação com base em raça, cor, religião, sexo e origem nacional. Proíbe a aplicação desigual dos requisitos de registro de eleitores, a segregação racial em escolas e locais públicos, e a discriminação no emprego."
    USA_1974_revolution.t:0 "O Escândalo Watergate"
    USA_1974_revolution.d:0 "O escândalo Watergate foi um grande escândalo político nos Estados Unidos envolvendo a administração do Presidente Richard Nixon, de 1972 a 1974, que levou à renúncia de Nixon. O escândalo originou-se das tentativas da administração Nixon de encobrir seu envolvimento na invasão de 17 de junho de 1972 à sede do Comitê Nacional Democrata, em Washington, D.C., no edifício Watergate."
    USA_1998_revolution.t:0 "O Impeachment de Bill Clinton?"
    USA_1998_revolution.d:0 "Bill Clinton, o 42º presidente dos Estados Unidos, sofreu impeachment pela Câmara dos Representantes dos Estados Unidos do 105º Congresso dos Estados Unidos, em 19 de dezembro de 1998, por 'crimes graves e contravenções'. A Câmara adotou dois artigos de impeachment contra Clinton, sendo as acusações específicas contra ele mentir sob juramento e obstrução da justiça. Dois outros artigos haviam sido considerados, mas foram rejeitados pela votação da Câmara. Os artigos de impeachment aprovados seriam submetidos ao Senado dos Estados Unidos em 7 de janeiro de 1999. Um julgamento no Senado então começou, presidido pelo Chefe de Justiça William Rehnquist. Em 12 de fevereiro, Clinton foi absolvido em ambas as acusações, já que nenhuma recebeu a maioria necessária de dois terços dos votos dos senadores presentes para condenação e destituição do cargo."
    USA_2019_revolution.t:0 "O Impeachment de Donald Trump?"
    USA_2019_revolution.d:0 "O primeiro impeachment de Donald Trump (45º Presidente dos Estados Unidos) começou em 18 de dezembro de 2019, durante o 116º Congresso dos Estados Unidos, quando a Câmara dos Representantes adotou dois artigos de impeachment contra Trump: abuso de poder e obstrução do Congresso. Em 5 de fevereiro de 2020, o Senado votou pela absolvição de Donald Trump."
    USA_2020_revolution.t:0 "Politizar o Serviço Público dos EUA?"
    USA_2020_revolution.d:0 "O Schedule F foi criado pela Ordem Executiva 13957, em 21 de outubro de 2020. O propósito da disposição era aumentar o controle do Presidente sobre o funcionalismo público federal de carreira. Foi amplamente criticado por fornecer meios de retaliação contra funcionários federais por razões políticas. Estimou-se que dezenas ou centenas de milhares de funcionários de carreira poderiam perder suas proteções de serviço público, aumentando o número de nomeações políticas em dez vezes."
    USA_2021_revolution.t:0 "A Insurreição de 6 de Janeiro?"
    USA_2021_revolution.d:0 "Em 6 de janeiro de 2021, o edifício do Capitólio dos Estados Unidos, em Washington, D.C., foi atacado por uma multidão de apoiadores do então presidente dos EUA, Donald Trump, dois meses após sua derrota na eleição presidencial de 2020. Eles buscavam manter Trump no poder, impedindo que uma sessão conjunta do Congresso contasse os votos do Colégio Eleitoral para formalizar a vitória do Presidente eleito Joe Biden. O ataque, em última análise, não teve sucesso em impedir a certificação dos resultados eleitorais."

    historical_gov_changes.option.1:0 "Seguir o caminho histórico!"
    historical_gov_changes.option.2:0 "Buscaremos um futuro diferente"

    stirrings_of_revolution:0 "Grande Agitação Doméstica"

    soviet_east_germany.indy.t:0 "Maior autonomia para a Alemanha Oriental?"
    soviet_east_germany.indy.d:0 "Em 7 de outubro de 1949, o SED estabeleceu a Deutsche Demokratische Republik, baseada em uma constituição política socialista que estabelecia seu controle sobre a Frente Nacional Antifascista da República Democrática Alemã, uma aliança abrangente de todos os partidos e organizações de massa na Alemanha Oriental. A NF foi estabelecida para concorrer a eleições para a Volkskammer (Câmara do Povo), o parlamento da Alemanha Oriental. O primeiro e único presidente da República Democrática Alemã foi Wilhelm Pieck. No entanto, após 1950, o poder político na Alemanha Oriental foi detido pelo Primeiro-Secretário do SED, Walter Ulbricht."
    soviet_baltic_states.indy.t:0 "Independência dos Estados Bálticos?"
    soviet_baltic_states.indy.d:0 "No final da década de 1980, uma massiva campanha de resistência civil contra o domínio soviético, conhecida como a Revolução Cantante, começou. Em 23 de agosto de 1989, o Caminho Báltico, uma corrente humana de dois milhões de pessoas, estendeu-se por 600 km de Tallinn a Vilnius. A União Soviética reconheceu a independência dos três Estados bálticos em 6 de setembro de 1991."
    soviet_weaken_eastern_bloc.indy.t:0 "A Doutrina Sinatra?"
    soviet_weaken_eastern_bloc.indy.d:0 "Historicamente, a Doutrina Sinatra foi uma política externa soviética sob Mikhail Gorbachov, que permitia que os Estados membros do Pacto de Varsóvia determinassem seus próprios assuntos internos. O nome aludia jocosamente à canção "My Way", popularizada por Frank Sinatra — a União Soviética estava permitindo que esses Estados seguissem seu próprio caminho. Sua implementação fez parte da doutrina de Gorbachov do novo pensamento político."
    soviet_weaken_eastern_bloc.indy.f:0 "Este evento ocorreu porque [ROOT.GetCountry.GetName] está em calote, não possui uma economia saudável, ou possui uma revolução e um governante democrático."
    eastern_bloc_revolution.t:0 "Fim do Comunismo em [ROOT.GetCountry.GetNameNoFlag]?"
    eastern_bloc_revolution.d:0 "Historicamente, as Revoluções de 1989, também conhecidas como a Queda do Comunismo, foram uma onda revolucionária de movimentos de democracia liberal que resultou no colapso da maioria dos governos marxistas-leninistas no Bloco Oriental e em outras partes do mundo."
    eastern_bloc_revolution.f:0 "Este evento ocorreu porque [ROOT.GetCountry.GetName] atendeu aos requisitos históricos, ou está em calote, não possui uma economia saudável, ou possui um movimento político revolucionário que apoia a democracia."
    sino_soviet_split.t:0 "A Cisão Sino-Soviética?"
    sino_soviet_split_prc.t:0 "A Cisão Sino-Soviética"
    sino_soviet_split.d:0 "A cisão sino-soviética foi a deterioração gradual das relações entre a China e a União Soviética, causada por divergências doutrinárias surgidas de suas diferentes interpretações e aplicações práticas do marxismo-leninismo, influenciadas por suas respectivas geopolíticas durante a Guerra Fria de 1947-1991. No final dos anos 1950 e início dos anos 1960, os debates sino-soviéticos sobre a interpretação do marxismo ortodoxo tornaram-se disputas específicas sobre as políticas soviéticas de desestalinização nacional e coexistência pacífica internacional com o Bloco Ocidental, que o pai fundador chinês Mao Zedong denunciou como revisionismo."
    sino_soviet_split_ussr.f:0 "Este evento ocorreu porque o(a) [concept_ruler] de [SCOPE.sCountry('communist_china_scope').GetName] é incompatível com o(a) [concept_ruler] de [ROOT.GetCountry.GetName]."
    sino_soviet_split.f:0 "Este evento ocorreu porque o(a) [concept_ruler] de [SCOPE.sCountry('sino_soviet_split_ussr').GetName] é incompatível com o(a) [concept_ruler] de [ROOT.GetCountry.GetName]."
    yugoslav_soviet_split.t:0 "A Cisão Soviético-Iugoslava"
    yugoslav_soviet_split.d:0 "A ruptura Tito-Stalin, ou cisão soviético-iugoslava, foi o culminar de um conflito entre as lideranças políticas da Iugoslávia e da União Soviética, sob Josip Broz Tito e Joseph Stalin, respectivamente, nos anos seguintes à Segunda Guerra Mundial. Embora apresentado por ambos os lados como uma disputa ideológica, o conflito foi também produto de uma luta geopolítica nos Balcãs, que também envolveu a Albânia, a Bulgária e a insurgência comunista na Grécia, apoiada pela Iugoslávia de Tito e secretamente combatida pela União Soviética."
    yugoslav_soviet_split_ussr.f:0 "Este evento ocorreu porque o(a) [concept_ruler] de [SCOPE.sCountry('communist_yugoslavia_scope').GetName] é incompatível com o(a) [concept_ruler] de [ROOT.GetCountry.GetName]."
    soviet_east_germany_1.indy.t:0 "A Fundação da Alemanha Oriental?"
    soviet_east_germany_1.indy.d:0 "A Fundação da Alemanha Oriental ocorreu em 7 de outubro de 1949, e nos dias seguintes vários eventos relacionados ocorreram, entre eles a formação da Câmara Popular Provisória, da Câmara dos Estados e do Governo Provisório da Alemanha Oriental, e Wilhelm Pieck foi eleito o primeiro presidente. Durante a existência da República Democrática Alemã, o evento da fundação foi comemorado anualmente no Dia da República, um feriado nacional."

    eastern_europe_indy.option.1:0 "Permitir que sejam mais livres."
    eastern_europe_indy.option.2:0 "Eles não merecem nenhuma liberdade!"
    sino_soviet_split.option.1:0 "Chega de discussões, romper com os soviéticos!"
    sino_soviet_split.option.2:0 "Deixar as divergências continuarem..."
    sino_soviet_split.option.3:0 "Nunca gostamos dos chineses mesmo!"
    yugoslav_soviet_split.option.1:0 "Chega de discussões, romper com a Iugoslávia!"
    yugoslav_soviet_split.option.2:0 "Deixar as divergências continuarem..."
    yugoslav_soviet_split.option.3:0 "Nunca gostamos dos soviéticos mesmo!"

    weaken_the_warsaw_pact.tt:0 "Enfraquecer o Pacto de Varsóvia"

    algerian_war.t:0 "A Guerra da Argélia pela Independência"
    algerian_war.d:0 "A Guerra da Argélia foi um grande conflito armado entre a França e a Frente de Libertação Nacional Argelina, de 1954 a 1962, que levou a Argélia a conquistar sua independência da França. Uma importante guerra de descolonização, foi um conflito complexo caracterizado por guerra de guerrilha e crimes de guerra."
    angolan_war.t:0 "A Guerra de Angola pela Independência"
    angolan_war.d:0 "A Guerra de Independência de Angola, conhecida como a Luta Armada de Libertação Nacional em Angola, começou como um levante contra o cultivo forçado de algodão e evoluiu para uma luta multifacção pelo controle da província ultramarina portuguesa de Angola, entre três movimentos nacionalistas e um movimento separatista."
    mozambican_war.t:0 "A Guerra de Moçambique pela Independência"
    mozambican_war.d:0 "A Guerra de Independência de Moçambique foi um conflito armado entre as forças guerrilheiras da Frente de Libertação de Moçambique, ou FRELIMO, e Portugal. A guerra começou oficialmente em 25 de setembro de 1964 e terminou com um cessar-fogo em 8 de setembro de 1974, resultando em uma independência negociada em 1975."
    bissau_guinean_war.t:0 "A Guerra da Guiné-Bissau pela Independência"
    bissau_guinean_war.d:0 "A Guerra de Independência da Guiné-Bissau, ou Guerra de Independência da Guiné-Bissau, foi um conflito armado de independência que ocorreu na Guiné Portuguesa de 1963 a 1974."
    cameroonian_war.t:0 "A Guerra dos Camarões pela Independência"
    cameroonian_war.d:0 "A Guerra dos Camarões é o nome da luta pela independência entre o movimento nacionalista camaronês e a França. O movimento foi liderado pela União dos Povos dos Camarões. Mesmo após a independência, a rebelião continuou, moldando a política contemporânea."
    namibian_war.t:0 "A Guerra de Independência da Namíbia"
    namibian_war.d:0 "A Guerra de Fronteira Sul-Africana, também conhecida como Guerra de Independência da Namíbia, e por vezes chamada na África do Sul de Guerra do Mato Angolano, foi um conflito majoritariamente assimétrico ocorrido na Namíbia (então África do Sudoeste), na Zâmbia e em Angola, de 26 de agosto de 1966 a 21 de março de 1990."
    kenyan_war.t:0 "A Emergência do Quênia"
    kenyan_war.d:0 "A rebelião Mau Mau, também conhecida como levante Mau Mau, revolta Mau Mau, ou Emergência do Quênia, foi uma guerra na Colônia britânica do Quênia entre o Exército da Terra e da Liberdade do Quênia, também conhecido como Mau Mau, e as autoridades britânicas."
    cypriot_war.t:0 "A Emergência de Chipre"
    cypriot_war.d:0 "A Emergência de Chipre foi um conflito travado no Chipre britânico entre novembro de 1955 e março de 1959. A Organização Nacional dos Combatentes Cipriotas (EOKA), uma organização guerrilheira nacionalista de direita cipriota-grega, iniciou uma campanha armada em apoio ao fim do domínio colonial britânico e à unificação de Chipre e Grécia (Enosis) em 1955. A oposição à Enosis pelos cipriotas turcos levou à formação da Organização de Resistência Turca (TMT), em apoio à partição de Chipre. A Emergência de Chipre terminou em 1959 com a assinatura dos Acordos de Londres-Zurique."
    malayan_emergency.t:0 "A Emergência Malaia"
    malayan_emergency.d:0 "A Emergência Malaia foi uma guerra de guerrilha travada na Malaia britânica entre combatentes comunistas pró-independência do Exército de Libertação Nacional Malaio e as forças militares da Federação da Malaia, do Império Britânico e da Commonwealth."
    Malagasy_war.t:0 "O Levante Malgaxe"
    Malagasy_war.d:0 "O Levante Malgaxe foi uma rebelião nacionalista malgaxe contra o domínio colonial francês em Madagascar, durando de março de 1947 a fevereiro de 1949. Na noite de 29 de março de 1947, ataques-surpresa coordenados foram lançados por nacionalistas malgaxes, armados principalmente com lanças, contra bases militares e plantações de propriedade francesa na parte oriental da ilha, concentradas em torno de Moramanga e Manakara. A causa nacionalista foi rapidamente adotada no sul e se espalhou para as terras altas centrais e a capital Antananarivo no mês seguinte, com o número de combatentes nacionalistas malgaxes estimado em mais de um milhão."
    brunei_revolt_1962.t:0 "A Revolta do Brunei"
    brunei_revolt_1962.d:0 "A revolta do Brunei foi uma insurreição no protetorado britânico do Brunei por opositores à proposta inclusão de sua monarquia na Federação da Malásia. Os insurgentes eram membros do TNKU (Exército Nacional do Kalimantan do Norte), uma milícia suprida pela Indonésia e ligada ao Partido Popular do Brunei (BPR), de esquerda, que favorecia uma Federação do Bornéu do Norte pró-indonésia."

    historical_colonial_wars.option.1:0 "Esmagar sua insignificante rebelião!"
    historical_colonial_wars.option.2:0 "Ceder aos rebeldes"

    eritrean_war.t:0 "A Guerra de Independência da Eritreia"
    eritrean_war.d:0 "A Guerra de Independência da Eritreia foi uma guerra pela independência travada por combatentes eritreus contra sucessivos governos etíopes, de 1º de setembro de 1961 a 24 de maio de 1991."
    congolese_war.t:0 "A Crise do Congo"
    congolese_war.d:0 "A Crise do Congo foi um período de convulsão política e conflito entre 1960 e 1965 na República do Congo. A crise começou quase imediatamente após o Congo se tornar independente da Bélgica e terminou, extraoficialmente, com todo o país sob o domínio de Joseph-Désiré Mobutu."
    yugoslav_war.SLO.t:0 "Independência da Eslovênia?"
    yugoslav_war.SLO.d:0 "A Eslovênia declarou sua independência e deixou a República Federal Socialista da Iugoslávia em 25 de junho de 1991. Em um referendo realizado em 23 de dezembro de 1990, 88,2% do eleitorado esloveno votou pela independência."
    yugoslav_war.CRO.t:0 "Independência da Croácia?"
    yugoslav_war.CRO.d:0 "Em 25 de junho de 1991, o país declarou sua independência da RFSI, finalizando seu esforço para encerrar seu status de república constituinte."
    yugoslav_war.BOS.t:0 "Independência da Bósnia?"
    yugoslav_war.BOS.d:0 "Uma declaração de soberania em 15 de outubro de 1991 foi seguida por um referendo de independência da Iugoslávia em 29 de fevereiro e 1º de março de 1992. O referendo foi boicotado pela grande maioria dos sérvios bósnios, de modo que, com um comparecimento eleitoral de 64%, 98% votaram a favor da proposta."
    yugoslav_war.KOS.t:0 "Independência do Kosovo?"
    yugoslav_war.KOS.d:0 "A Assembleia Provincial, que havia sido dissolvida em 1989 pelas autoridades sérvias, mas cujos membros albaneses continuaram a se reunir clandestinamente, declarou a República do Kosovo um Estado soberano e independente em 22 de setembro de 1991. Mais de 99% dos eleitores votaram a favor da independência, com um comparecimento de 87%."
    yugoslav_war.MCD.t:0 "Independência da Macedônia?"
    yugoslav_war.MCD.d:0 "Em um referendo público realizado em 8 de setembro de 1991, 95% dos votantes favoreceram a independência macedônia. Albaneses étnicos boicotaram o referendo em protesto contra seu percebido status constitucional inferior. No início de outubro, o Comitê Constitucional adotou uma versão final da nova constituição."
    chechen_war.RUS.t:0 "Independência Chechena?"
    chechen_war.RUS.d:0 "A Primeira Guerra Chechena, também chamada de Primeira Guerra Russo-Chechena, foi uma luta pela independência travada pela República Chechena de Ichkeria contra a Federação Russa, de 11 de dezembro de 1994 a 31 de agosto de 1996."
    kurdish_war.IRQ.t:0 "Independência Curda?"
    kurdish_war.IRQ.d:0 "Os levantes iraquianos de 1991 foram levantes étnicos e religiosos contra o regime de Saddam Hussein no Iraque, liderados por xiitas e curdos. Os levantes duraram de março a abril de 1991, após um cessar-fogo seguido ao fim da Guerra do Golfo."
    gazan_war.PAL.t:0 "A Batalha de Gaza?"
    gazan_war.PAL.d:0 "Um conflito armado entre Israel e grupos militantes palestinos liderados pelo Hamas ocorreu principalmente dentro e ao redor da Faixa de Gaza, iniciado em 7 de outubro de 2023. Começou quando o Hamas lançou um ataque surpresa contra o sul de Israel a partir da Faixa de Gaza."
    cypriot_war.CYP.t:0 "O Levante Cipriota do Norte"
    cypriot_war.CYP.d:0 "O problema de Chipre é uma disputa em curso entre a comunidade cipriota-grega, que administra a República de Chipre, e a comunidade cipriota-turca no norte da ilha, onde tropas da República da Turquia estão estacionadas."
    isis_war.t:0 "O Levante do ISIS"
    isis_war.d:0 "O Estado Islâmico ganhou destaque global em 2014, quando seus militantes conquistaram grandes territórios no noroeste do Iraque e no leste da Síria, auxiliados pela guerra civil síria. No final de 2015, controlava uma área com uma população estimada em doze milhões de pessoas, onde impunha sua interpretação da lei islâmica, administrava um orçamento anual de mais de US$ 1 bilhão, e contava com mais de 30.000 combatentes sob seu comando. Após anos de combates intensos e árduos com forças americanas, iraquianas e curdas, em 2019 havia perdido todos os seus territórios no Oriente Médio e retornado a táticas de insurgência nas regiões que outrora controlava."
    biafran_war.NGE.t:0 "A Guerra de Biafra?"
    biafran_war.NGE.d:0 "A Guerra de Biafra foi uma guerra civil travada entre a Nigéria e a República de Biafra, um Estado secessionista que havia declarado sua independência da Nigéria em 1967. Biafra representava as aspirações nacionalistas do grupo étnico Igbo, cuja liderança sentia que já não podia coexistir com o governo federal dominado pelos interesses dos hauçás-fulanis muçulmanos do norte da Nigéria."
    bougainville_war.PNG.t:0 "O Conflito de Bougainville"
    bougainville_war.PNG.d:0 "O conflito de Bougainville, também conhecido como Guerra Civil de Bougainville, foi um conflito armado multifacetado travado de 1988 a 1998 na Província das Ilhas Salomão do Norte, em Papua Nova Guiné (PNG), entre a PNG e as forças secessionistas do Exército Revolucionário de Bougainville (BRA), e entre o BRA e outros grupos armados em Bougainville."
    Cabinda_war.ANG.t:0 "A Guerra de Cabinda"
    Cabinda_war.ANG.d:0 "A Guerra de Cabinda é uma insurgência separatista, travada pela Frente para a Libertação do Enclave de Cabinda (FLEC) contra o governo de Angola. A FLEC almeja a restauração da autoproclamada República de Cabinda, localizada dentro das fronteiras da província de Cabinda, em Angola."
    Tigray_war.ETH.t:0 "A Guerra do Tigré"
    Tigray_war.ETH.d:0 "A Guerra do Tigré foi um conflito armado que durou de 3 de novembro de 2020 a 3 de novembro de 2022. A guerra foi travada principalmente na Região do Tigré, na Etiópia, entre forças aliadas ao governo federal etíope e à Eritreia de um lado, e a Frente de Libertação do Povo do Tigré (TPLF) do outro."
    yemeni_war.YEM.t:0 "A Guerra Civil Iemenita"
    yemeni_war.YEM.d:0 "A guerra civil iemenita é uma guerra civil multilateral que começou no final de 2014, principalmente entre o Conselho de Liderança Presidencial, liderado por Rashad al-Alimi, e o Conselho Político Supremo, liderado por Mahdi al-Mashat, junto com seus apoiadores e aliados. Ambos afirmam constituir o governo oficial do Iêmen. A guerra civil começou em setembro de 2014, quando forças Houthi tomaram a capital Sanaa, seguida por uma rápida tomada do governo pelos Houthis."
    Aceh_war.IDO.t:0 "A Insurgência em Aceh"
    Aceh_war.IDO.d:0 "A insurgência em Aceh foi um conflito travado pelo Movimento Aceh Livre (GAM) entre 1976 e 2005, com o objetivo de tornar a província de Aceh independente da Indonésia. As consequências de uma forte ofensiva militar em 2003 e do terremoto do Oceano Índico de 2004 trouxeram um acordo de paz e o fim da insurgência."
    Kurdish_war.IRQ.t:0 "O Levante Curdo"
    Kurdish_war.IRQ.d:0 "Os levantes iraquianos de 1991 foram levantes étnicos e religiosos contra o regime de Saddam Hussein no Iraque, liderados por xiitas e curdos. Os levantes duraram de março a abril de 1991, após um cessar-fogo seguido ao fim da Guerra do Golfo. A insurgência, majoritariamente descoordenada, foi alimentada pela percepção de que o Presidente iraquiano Saddam Hussein havia se tornado vulnerável a uma mudança de regime."
    LTTE_war.SRL.t:0 "A Guerra Civil do Sri Lanka"
    LTTE_war.SRL.d:0 "A Guerra Civil do Sri Lanka foi uma guerra civil travada no Sri Lanka de 1983 a 2009. Começando em 23 de julho de 1983, foi uma insurgência intermitente contra o governo pelos Tigres de Libertação do Eelam Tâmil (LTTE, também conhecidos como Tigres Tâmeis), liderados por Velupillai Prabhakaran. O LTTE lutou para criar um Estado tâmil independente chamado Eelam Tâmil no nordeste da ilha, devido à contínua discriminação e violenta perseguição contra os tâmeis do Sri Lanka pelo governo dominado pelos cingaleses."
    Darfur_war.SUD.t:0 "A Guerra em Darfur"
    Darfur_war.SUD.d:0 "A Guerra em Darfur foi um grande conflito armado na região de Darfur, no Sudão, iniciado em fevereiro de 2003, quando os grupos rebeldes Movimento de Libertação do Sudão (SLM) e Movimento pela Justiça e Igualdade (JEM) começaram a lutar contra o governo do Sudão, que acusavam de oprimir a população não árabe de Darfur."
    Zapatista_Uprising.t:0 "O Levante Zapatista"
    Zapatista_Uprising.d:0 "Em 1º de janeiro de 1994, o Exército Zapatista de Libertação Nacional (EZLN) coordenou um levante de 12 dias no estado de Chiapas, México, em protesto contra a promulgação do Tratado Norte-Americano de Livre Comércio. Os rebeldes ocuparam cidades e vilarejos em Chiapas, libertando prisioneiros e destruindo registros de terras. Após batalhas com o Exército e a polícia mexicanos, um cessar-fogo foi negociado em 12 de janeiro. Cerca de 300 pessoas morreram."
    moro_war.PHI.t:0 "O Conflito Moro"
    moro_war.PHI.d:0 "O conflito Moro foi uma insurgência na região de Mindanau, nas Filipinas, envolvendo múltiplos grupos armados. A causa raiz do conflito Moro está associada a uma longa história de resistência do povo Bangsamoro contra o domínio estrangeiro, incluindo a anexação americana das Filipinas em 1898."
    CCW_war.ROC.t:0 "A Batalha da Ilha de Hainan"
    CCW_war.ROC.d:0 "A Batalha da Ilha de Hainan ocorreu em 1950, durante a fase final da Guerra Civil Chinesa. A República Popular da China (RPC) conduziu um ataque anfíbio à Ilha de Hainan em 16 de abril, auxiliada pelo movimento comunista de Hainan, que controlava grande parte do interior da ilha, enquanto a República da China (ROC) controlava o litoral; suas forças estavam concentradas no norte, perto de Haikou, e foram forçadas a recuar para o sul após os desembarques. Os comunistas asseguraram as cidades do sul de Hainan até o final do mês e declararam vitória em 1º de maio."
    chinese_civil_wars.option.1:0 "Parar a guerra em Hainan"
    chinese_civil_wars.option.2:0 "Para Hainan, e depois para Taiwan!"
    maluku_war.IDO.t:0 "O Levante das Molucas do Sul"
    maluku_war.IDO.d:0 "Desconfiando da República da Indonésia, dominada por javaneses e muçulmanos, os moluquenses do sul, majoritariamente protestantes e pró-holandeses — que por muito tempo forneceram tropas ao Exército Real das Índias Orientais Holandesas (KNIL) — declararam a independência da República das Molucas do Sul em Ambon e Seram, em 25 de abril de 1950. Isso não foi reconhecido por Sukarno, e, por suas ordens, os militares indonésios invadiram a ilha moluquense de Buru e parte da ilha de Ceram."
    khuzestan_war.PER.t:0 "O Levante do Cuzistão"
    khuzestan_war.PER.d:0 "O levante do Cuzistão de 1979 foi um dos levantes nacionais no Irã que eclodiram após a Revolução Iraniana. A agitação foi alimentada por demandas árabes por autonomia. O levante foi efetivamente reprimido pelas forças de segurança iranianas, resultando em mais de cem mortos de ambos os lados."
    azawad_war.MAL.t:0 "A Guerra do Mali"
    azawad_war.MAL.d:0 "Em 22 de março de 2012, o Presidente Amadou Toumani Touré foi deposto em um golpe de Estado devido à sua condução da crise, um mês antes de uma eleição presidencial estar prevista para acontecer. Soldados amotinados, autodenominados Comitê Nacional para a Restauração da Democracia e do Estado (CNRDR), tomaram o controle e suspenderam a constituição do Mali. Como consequência da instabilidade após o golpe, as três maiores cidades do norte do Mali — Kidal, Gao e Tombuctu — foram tomadas pelos rebeldes em três dias consecutivos. Em 5 de abril de 2012, após a captura de Douentza, o MNLA declarou ter alcançado seus objetivos e encerrou sua ofensiva. No dia seguinte, proclamou a independência do norte do Mali em relação ao resto do país, rebatizando-o de Azawad."
    kurdish_war.PER.t:0 "A Rebelião Curda"
    kurdish_war.PER.d:0 "A rebelião curda de 1979 no Irã foi um dos maiores levantes nacionais no país contra o novo Estado após a Revolução Iraniana. A rebelião curda começou em meados de março, apenas dois meses após o fim da Revolução, e foi uma das mais intensas rebeliões curdas no Irã moderno."
    balochistan_war.PAK.t:0 "A Rebelião do Baluchistão"
    balochistan_war.PAK.d:0 "O Quarto Conflito do Baluchistão foi um conflito militar de quatro anos no Baluchistão, a maior província do Paquistão, entre o Exército paquistanês e separatistas e tribos baluches, que durou de 1973 a 1977. O conflito começou em 1973, pouco depois de o então Presidente paquistanês Zulfikar Ali Bhutto destituir o governo provincial eleito do Baluchistão, sob o pretexto de que armas haviam sido descobertas na Embaixada iraquiana, supostamente destinadas a rebeldes baluches. O protesto resultante contra a destituição do governo legitimamente eleito também levou a pedidos de secessão do Baluchistão, respondidos por Bhutto com o envio do Exército paquistanês à província."
    chechen_war_2.RUS.t:0 "A Segunda Guerra Chechena"
    chechen_war_2.RUS.d:0 "A Segunda Guerra Chechena ocorreu na Chechênia e nas regiões fronteiriças do Cáucaso do Norte, entre a Federação Russa e a separatista República Chechena de Ichkeria, de agosto de 1999 a abril de 2009. Em agosto de 1999, islamistas radicais da Chechênia infiltraram-se no Daguestão, na Rússia. Depois, em setembro, atentados a bomba em edifícios residenciais ocorreram em cidades russas, matando mais de 300 pessoas. As autoridades russas rapidamente culparam os chechenos pelos atentados, embora nenhum checheno, comandante de campo ou não, tenha assumido a responsabilidade pelos ataques. Durante a campanha inicial, as forças militares russas e as forças paramilitares pró-russas chechenas enfrentaram os separatistas chechenos em combate aberto e tomaram a capital chechena, Grozny, após um cerco de inverno que durou de dezembro de 1999 a fevereiro de 2000."
    bosnian_war.BOS.t:0 "A Guerra da Bósnia"
    bosnian_war.BOS.d:0 "A Guerra da Bósnia foi um conflito armado internacional ocorrido na Bósnia e Herzegovina entre 1992 e 1995. A guerra é geralmente vista como tendo começado em 6 de abril de 1992, após vários incidentes violentos anteriores. Terminou em 14 de dezembro de 1995, com a assinatura dos Acordos de Dayton. Os principais beligerantes foram as forças da República da Bósnia e Herzegovina, da República de Herzeg-Bósnia e da República Sérvia da Bósnia, sendo estas duas últimas proto-Estados liderados e sustentados pela Croácia e pela Sérvia, respectivamente."
    tajikistani_war.TAJ.t:0 "A Guerra Civil do Tajiquistão"
    tajikistani_war.TAJ.d:0 "A Guerra Civil do Tajiquistão começou em maio de 1992 e terminou em junho de 1997. Grupos regionais das regiões de Garm e Gorno-Badakhshan, no Tajiquistão, se levantaram contra o governo recém-formado do Presidente Rahmon Nabiyev, dominado por pessoas das regiões de Khujand e Kulob. Os grupos rebeldes eram liderados por uma combinação de reformistas democratas liberais e islamistas, que mais tarde se organizariam sob a bandeira da Oposição Tajique Unida."
    angolan_war.ANG.t:0 "A Guerra Civil de Angola"
    angolan_war.ANG.d:0 "A Guerra Civil de Angola foi uma guerra civil em Angola, iniciada em 1975 e prosseguindo, com interrupções, até 2002. A guerra começou imediatamente após Angola se tornar independente de Portugal, em novembro de 1975. Foi uma luta pelo poder entre dois antigos movimentos guerrilheiros anticoloniais, o comunista Movimento Popular de Libertação de Angola (MPLA) e a anticomunista União Nacional para a Independência Total de Angola (UNITA)."
    mozambican_war.MOZ.t:0 "A Guerra Civil de Moçambique"
    mozambican_war.MOZ.d:0 "A Guerra Civil de Moçambique foi uma guerra civil travada em Moçambique de 1977 a 1992, devido a uma combinação de conflitos locais e aos efeitos polarizadores da política da Guerra Fria. Os combates ocorreram entre a Frente de Libertação de Moçambique (FRELIMO), no poder, de orientação marxista, as forças insurgentes anticomunistas da Resistência Nacional Moçambicana (RENAMO), e diversas facções menores, como o PRM, a UNAMO, a COREMO, a UNIPOMO e o FUMO."
    Casamance_war.SEN.t:0 "O Conflito de Casamansa"
    Casamance_war.SEN.d:0 "O Conflito de Casamansa é uma luta separatista de longa duração no sul do Senegal, ativa desde 1982. Centrado no Movimento das Forças Democráticas de Casamansa (MFDC), o conflito decorre de reivindicações regionais sobre marginalização, direitos à terra e identidade cultural. Casamansa, geograficamente isolada e etnicamente distinta, tem buscado autonomia em relação ao governo central. Embora os combates intensos tenham atingido o auge na década de 1990, a violência persistiu em níveis baixos, com confrontos esporádicos e ameaças de minas terrestres."
    kashmir_insurgency_war.t:0 "A Insurgência na Caxemira"
    kashmir_insurgency_war.d:0 "Em 1989, Jammu e Caxemira mergulhou em insurgência, à medida que a desilusão com as instituições políticas alimentava a rebelião armada. O sequestro de Rubiya Sayeed pela Frente de Libertação de Jammu e Caxemira simbolizou a agitação. Apoiados pelo Paquistão, grupos militantes atacaram autoridades e civis, deflagrando décadas de conflito que remodelaram a geopolítica e a segurança regionais."
    sudan_civil_war_2023.t:0 "A Guerra Civil Sudanesa"
    sudan_civil_war_2023.d:0 "Desde 15 de abril de 2023, há uma guerra civil ativa no Sudão entre duas facções rivais do governo militar do país. O conflito envolve o governo internacionalmente reconhecido, controlado pelas Forças Armadas Sudanesas (SAF), lideradas pelo General Abdel Fattah al-Burhan e compostas pelo Exército, Marinha, Força Aérea e Guarda Republicana; e as Forças de Apoio Rápido (RSF), paramilitares, lideradas pelo General Hemedti, que comanda a mais ampla coalizão Janjaweed."
    SSD_war.SUD.t:0 "A Rebelião Anyanya"
    SSD_war.SUD.d:0 "A Primeira Guerra Civil Sudanesa (também conhecida como Rebelião Anyanya) foi travada de 1955 a 1972 entre a parte norte do Sudão e a região do Sudão do Sul, que exigia representação e maior autonomia regional. A guerra foi dividida em quatro etapas principais: a guerrilha inicial, a criação da insurgência Anyanya, os conflitos políticos internos ao governo, e o estabelecimento do Movimento de Libertação do Sudão do Sul. Cerca de um milhão de pessoas morreram ao longo dos quase 17 anos de guerra."

    historical_civil_wars.option.1:0 "Iniciar a guerra!"
    historical_civil_wars.option.2:0 "Escolher a opção pacífica."

    historical_abolish_monarchy.t:0 "Abolir a Monarquia [SCOPE.sCountry('monarch_home_country').GetAdjective]?"
    historical_abolish_monarchy.d:0 "[SCOPE.sCountry('abolishing_monarchy_country').GetName] é atualmente uma monarquia com um monarca [SCOPE.sCountry('monarch_home_country').GetAdjective]. Foi, no entanto, durante este período da história que a monarquia foi substituída por um Presidente [SCOPE.sCountry('abolishing_monarchy_country').GetAdjective]. Devemos seguir a história e fazer o mesmo?"
    historical_abolish_monarchy.option.1:0 "Sim, a monarquia é uma relíquia inútil do passado."
    historical_abolish_monarchy.option.2:0 "Não, amamos a monarquia!"

    1950_recession.t:0 "A Recessão Pós-Guerra"
    1950_recession.d:0 "A recessão de 1949 foi uma breve retração econômica que começou pouco após as reformas econômicas do "Fair Deal" do Presidente Truman. Diz-se que as consequências do fim da Segunda Guerra Mundial foram a principal causa da recessão."
    1950_recession.f:0 "Esta é uma justificativa dentro do jogo para o motivo pelo qual a economia precisa de cerca de 1 ano para se estabilizar."
    1971_bretton_woods_system.t:0 "Fim do Sistema de Bretton Woods?"
    1971_bretton_woods_system.d:0 "Um balanço de pagamentos negativo, a crescente dívida pública decorrente da Guerra do Vietnã e dos programas da Great Society, e a inflação monetária do Federal Reserve fizeram com que o dólar se tornasse cada vez mais sobrevalorizado. Em 1971, cada vez mais dólares eram impressos em Washington e depois bombeados para o exterior, para custear gastos governamentais militares e sociais. Nos primeiros seis meses de 1971, ativos no valor de 22 bilhões de dólares deixaram os EUA. Em resposta, em 15 de agosto de 1971, Nixon emitiu a Ordem Executiva 11615, fechando unilateralmente a janela do ouro, tornando o dólar inconversível diretamente em ouro, exceto no mercado aberto."
    1971_bretton_woods_system.f:0 "Este é um evento histórico."
    1971_bretton_woods_system.1:0 "Encerrar o Sistema de Bretton Woods"
    1971_bretton_woods_system.2:0 "Manter o sistema a todo custo!"
    2000_new_year.t:0 "Alvorecer de um Novo Milênio"
    2000_new_year.d:0 "2000 (MM) foi um ano bissexto secular começando em um sábado do calendário Gregoriano. O ano 2000 é por vezes abreviado como "Y2K" ("Y" de "year", ano, e "K" de "kilo", que significa "mil"). O ano 2000 foi objeto de preocupações do Bug do Milênio, temores de que os computadores não fariam a transição de 1999 para 2000 corretamente. No entanto, ao final de 1999, muitas empresas já haviam convertido para softwares novos ou atualizados. Algumas até obtiveram certificação Y2K. Como resultado de um esforço massivo, relativamente poucos problemas ocorreram."
    2000_new_year.f:0 "Se o ano 2000 puder nos ajudar a avançar para o futuro, tudo bem, mas temo que as pessoas o vejam como um ponto final, após o qual se pode dar um grande suspiro de alívio - não se pode."
    communist_economic_liberalisation.t:0 "Socialismo com Características [ROOT.GetCountry.GetAdjectiveNoFlag]?"
    communist_economic_liberalisation.d:0 "Devido ao mau estado da economia [ROOT.GetCountry.GetAdjectiveNoFlag], propôs-se que o governo liberalize a economia nacional para acabar com a economia totalmente planificada e permitir a livre iniciativa. Tal curso de ação promete resolver os problemas econômicos atuais que afligem o país."
    communist_economic_liberalisation.f:0 "Este evento ocorreu porque a economia [ROOT.GetCountry.GetAdjectiveNoFlag] está insalubre."
    SOV_Kosygin_Reforms.t:0 "A Reforma Econômica de Kosygin?"
    SOV_Kosygin_Reforms.d:0 "A Reforma Econômica de Kosygin foi um conjunto de mudanças planejadas na economia da URSS. Um dos pilares dessas mudanças foi a introdução da rentabilidade e das vendas como os dois principais indicadores de sucesso empresarial. Parte dos lucros de uma empresa iria para três fundos, usados para recompensar trabalhadores e expandir operações; a maior parte iria para o orçamento central. Refletiam alguns desejos há muito acalentados pelos planejadores econômicos de orientação matemática da URSS, e iniciaram a mudança rumo a uma maior descentralização no processo de planejamento econômico."
    Indian_Economic_Liberalisation.t:0 "A Liberalização Econômica na Índia?"
    Indian_Economic_Liberalisation.d:0 "A liberalização econômica na Índia refere-se à série de mudanças políticas destinadas a abrir a economia do país ao mundo, com o objetivo de torná-la mais orientada ao mercado e ao consumo. O objetivo era expandir o papel do investimento privado e estrangeiro, visto como um meio de alcançar crescimento e desenvolvimento econômico. Embora algumas tentativas de liberalização tenham sido feitas em 1966 e no início dos anos 1980, uma liberalização mais abrangente foi iniciada em 1991."
    HUN_NEM_Reforms.t:0 "O Novo Mecanismo Econômico?"
    HUN_NEM_Reforms.d:0 "O Novo Mecanismo Econômico (NEM) foi uma grande reforma econômica lançada na República Popular da Hungria em 1968. Entre 1972 e 1978, foi restringido pelos ventos predominantes da política do Bloco Oriental. Durante a década seguinte, até que as revoluções de 1989 encerrassem a era, os princípios do NEM continuaram a afetar a economia húngara, mesmo quando o nome NEM não era enfatizado. Por causa do NEM, a Hungria nos anos 1980 tinha uma proporção maior de mecanismos de mercado em relação ao planejamento central do que qualquer outra economia do Bloco Oriental."
    PRC_GLF_Reforms.t:0 "O Grande Salto Adiante?"
    PRC_GLF_Reforms.d:0 "O Grande Salto Adiante foi uma campanha econômica e social dentro da República Popular da China (RPC), de 1958 a 1962, liderada pelo Partido Comunista Chinês (PCC). O Presidente do Partido, Mao Zedong, lançou a campanha para reconstruir o país de uma economia agrária para uma sociedade industrializada, por meio da formação de comunas populares. Mao decretou que os esforços para multiplicar as safras de grãos e levar a indústria ao campo deveriam ser intensificados."
    SOV_VLC_Reforms.t:0 "A Campanha das Terras Virgens?"
    SOV_VLC_Reforms.d:0 "A campanha das Terras Virgens foi o plano de 1953 de Nikita Khrushchov para impulsionar drasticamente a produção agrícola da União Soviética, a fim de aliviar a escassez de alimentos que afligia a população soviética. Centenas de milhares de jovens voluntários se estabeleceram e cultivaram áreas da Sibéria Ocidental e do norte do Cazaquistão. Embora o esquema tenha eventualmente se tornado um tremendo desastre para a agricultura soviética, foi inicialmente bem-sucedido."
    EGR_NES_Reforms.t:0 "O Novo Sistema Econômico"
    EGR_NES_Reforms.d:0 "O Novo Sistema Econômico foi uma política econômica implementada pelo Partido Socialista Unificado (SED), no poder na República Democrática Alemã (RDA), em 1963. Seu propósito era substituir o sistema de Planos Quinquenais que vinha sendo usado para conduzir a economia da RDA desde 1951. O Sistema foi introduzido por Walter Ulbricht para tentar melhorar o desempenho do planejamento central existente, de modo que a economia pudesse ser conduzida da maneira mais eficiente possível."
    SOV_economic_perestroika.t:0 "A Lei das Cooperativas?"
    SOV_economic_perestroika.d:0 "A Lei das Cooperativas, promulgada em maio de 1988, foi talvez a mais radical das reformas econômicas do início da era Gorbachov. Pela primeira vez desde que a Nova Política Econômica de Vladimir Lênin foi abolida em 1928, a lei permitiu a propriedade privada de empresas nos setores de serviços, manufatura e comércio exterior."
    BUL_NEM_Reforms.t:0 "O Novo Sistema de Gestão?"
    BUL_NEM_Reforms.d:0 "Incentivos específicos para a reforma foram a escassez de mão de obra e energia e a crescente importância do comércio exterior nos anos de "degelo" de meados da década de 1960. Consequentemente, em 1962, o Quarto Plano Quinquenal iniciou uma era de reforma econômica que trouxe uma série de novas abordagens para o antigo objetivo do crescimento intensivo. Na indústria, o "Novo Sistema de Gestão" foi introduzido em 1964 e durou até 1968. Essa abordagem pretendia otimizar as unidades econômicas e tornar os gestores empresariais mais responsáveis pelo desempenho."
    CHI_USA_Investment.t:0 "Promover o Investimento Estrangeiro na China?"
    CHI_USA_Investment.d:0 "Durante a Guerra Fria, uma parcela significativa do comércio da China com o Terceiro Mundo era financiada por meio de doações, créditos e outras formas de assistência. No entanto, após a morte de Mao Zedong em 1976, esses esforços foram reduzidos. Depois disso, o comércio com países em desenvolvimento tornou-se insignificante, embora, durante esse período, Hong Kong e Taiwan tenham começado a emergir como grandes parceiros comerciais. Desde que as reformas econômicas começaram no final da década de 1970, a China buscou descentralizar seu sistema de comércio exterior para se integrar ao sistema comercial internacional."
    DAI_USA_Investment.t:0 "Promover o Investimento Estrangeiro no Vietnã?"
    DAI_USA_Investment.d:0 "Em 1990, a Lei das Empresas Privadas, que forneceu base legal para empresas privadas, foi promulgada, enquanto a Lei das Sociedades reconheceu a sociedade anônima e a sociedade limitada privada. No mesmo ano, o Partido começou a discutir o potencial de privatização das empresas estatais (SOEs), ao mesmo tempo em que normalizava as relações com a República Popular da China. Posteriormente, a Constituição de 1992 reconheceu oficialmente o papel do setor privado. Embora o comércio exterior fosse controlado centralmente pelo Estado, o Estado começou a afrouxar o controle sobre o comércio exterior."
    SOV_USA_Investment.t:0 "Promover o Investimento Estrangeiro na União Soviética?"
    SOV_USA_Investment.d:0 "Gorbachov trouxe a perestroika para o setor econômico externo da União Soviética, com medidas que os economistas soviéticos consideravam ousadas na época. Seu programa praticamente eliminou o monopólio que o Ministério do Comércio Exterior antes detinha sobre a maioria das operações comerciais. Permitiu que os ministérios dos diversos ramos industriais e agrícolas conduzissem comércio exterior nos setores sob sua responsabilidade, em vez de terem que operar indiretamente por meio da burocracia das organizações do ministério do comércio. Além disso, organizações regionais e locais, bem como empresas estatais individuais, passaram a ser autorizadas a conduzir comércio exterior."
    PRC_LRR_Reforms.t:0 "O Movimento de Reforma Agrária?"
    PRC_LRR_Reforms.d:0 "O Movimento de Reforma Agrária foi um movimento de massas liderado pelo líder do Partido Comunista Chinês (PCC), Mao Zedong, durante a fase final da Guerra Civil Chinesa, após o término da Segunda Guerra Sino-Japonesa em 1945, e nos primeiros anos da República Popular da China, que promoveu a redistribuição de terras ao campesinato. Latifundiários — cujo status era teoricamente definido pelo percentual de renda derivado da exploração em oposição ao trabalho — tiveram suas terras confiscadas e foram submetidos a assassinatos em massa pelo PCC e por antigos arrendatários, com o número estimado de mortos variando de centenas de milhares a milhões."
    NVM_LRR_Reforms.t:0 "A Campanha de Reforma Agrária?"
    NVM_LRR_Reforms.d:0 "No ano de 1953, uma série de decretos e leis sobre reforma agrária foi divulgada. O comitê central do PTV avaliou a possibilidade de avançar para a última fase da revolução agrária: a redistribuição de terras agrícolas, que foi seguida pela mais crucial lei de reforma agrária, promulgada em 19 de dezembro de 1953, considerada a plataforma e premissa para a reforma agrária. Logo após a lei ser aprovada no congresso nacional, a onda experimental de reforma agrária ocorreu entre dezembro de 1953 e março de 1954, na província de Thai Nguyen. A reforma agrária então se expandiu para áreas maiores em cinco ondas."
    SRL_NEM_Reforms.t:0 "Reformas Econômicas do Sri Lanka?"
    SRL_NEM_Reforms.d:0 "Junius Richard Jayewardene foi um advogado, funcionário público e estadista do Sri Lanka, que serviu como Primeiro-Ministro do Sri Lanka de 1977 a 1978 e como o segundo Presidente do Sri Lanka de 1978 a 1989. Uma figura controversa na história do Sri Lanka, o sistema econômico aberto que introduziu em 1978 tirou o país da turbulência econômica que o Sri Lanka enfrentava como resultado das políticas econômicas fechadas anteriores."
    PER_NEM_Reforms.t:0 "A Revolução Branca?"
    PER_NEM_Reforms.d:0 "A Revolução Branca foi uma série abrangente de reformas que resultou em uma modernização agressiva no Estado Imperial do Irã, lançada em 26 de janeiro de 1963 pelo Xá Mohammad Reza Pahlavi, e que durou até 1979. As reformas resultaram em uma grande redistribuição de riqueza para a classe trabalhadora iraniana, crescimento econômico explosivo nas décadas seguintes, rápida urbanização, e desmantelamento dos costumes feudais do Irã."
    european_welfare_state.t:0 "O Estado de Bem-Estar Social [ROOT.GetCountry.GetAdjectiveNoFormatting]?"
    european_welfare_state.d:0 "A economia política da Europa tem sido definida, desde os anos 1950, pelo desenvolvimento, em cada país europeu, de um modelo de bem-estar mais ou menos abrangente, no qual o Estado assumiu um papel central na oferta de uma série de benefícios sociais, sendo os mais custosos as aposentadorias, o apoio aos pobres, a habitação social e a saúde."
    PER_ELR_Reforms.t:0 "A Liberalização Econômica Iraniana?"
    PER_ELR_Reforms.d:0 "Ali Akbar Hashemi Bahramani Rafsanjani foi um político e escritor iraniano que serviu como o quarto presidente do Irã, de 1989 a 1997. Ele apoiava uma posição de livre mercado capitalista internamente, favorecendo a privatização de indústrias estatais, e uma posição moderada internacionalmente, buscando evitar conflitos com os Estados Unidos e o Ocidente."
    ISR_ELR_Reforms.t:0 "A Liberalização Econômica Israelense?"
    ISR_ELR_Reforms.d:0 "Rabin reformou significativamente a economia de Israel, bem como seus sistemas de educação e saúde. Seu governo expandiu consideravelmente a privatização de empresas, afastando-se da economia tradicionalmente socializada do país. Em 1993, seu governo criou o programa "Yozma", sob o qual incentivos fiscais atraentes eram oferecidos a fundos estrangeiros de capital de risco que investissem em Israel e prometessem dobrar qualquer investimento com financiamento governamental. Como resultado, fundos estrangeiros de capital de risco investiram pesadamente na crescente indústria israelense de alta tecnologia, contribuindo para o crescimento econômico de Israel e seu status como líder mundial em alta tecnologia."
    oil_crisis_1973.t:0 "A Primeira Crise do Petróleo?"
    oil_crisis_1973.d:0 "Em outubro de 1973, a Organização dos Países Árabes Exportadores de Petróleo (OAPEC) anunciou que estava implementando um embargo total de petróleo contra os países que haviam apoiado Israel em qualquer momento durante a Guerra do Yom Kippur de 1973, que começou depois que o Egito e a Síria lançaram um ataque surpresa em larga escala em uma tentativa, no fim malsucedida, de recuperar os territórios perdidos para Israel durante a Guerra dos Seis Dias de 1967. Após sua implementação, o embargo causou uma crise do petróleo, ou "choque", com muitos efeitos de curto e longo prazo sobre a economia global e a política mundial."
    oil_crisis_1979.t:0 "A Segunda Crise do Petróleo?"
    oil_crisis_1979.d:0 "Uma queda na produção de petróleo após a Revolução Iraniana levou a uma crise energética em 1979. Embora a oferta global de petróleo tenha diminuído apenas cerca de quatro por cento, a reação dos mercados de petróleo elevou drasticamente o preço do petróleo bruto nos 12 meses seguintes, mais do que dobrando-o para US$ 39,50 por barril (US$ 248/m3). O súbito aumento de preço esteve associado a escassez de combustível semelhante à crise do petróleo de 1973."
    GUA_Land_Reforms.t:0 "Promulgar o Decreto 900?"
    GUA_Land_Reforms.d:0 "O Decreto 900 foi uma lei de reforma agrária guatemalteca aprovada em 17 de junho de 1952, durante a Revolução Guatemalteca. A lei foi apresentada pelo Presidente Jacobo Árbenz Guzmán e aprovada pelo Congresso guatemalteco. Redistribuiu terras não utilizadas maiores que 90 hectares (224 acres) a camponeses locais, compensando os proprietários com títulos governamentais. Terras de até 1.700 propriedades foram redistribuídas a cerca de 500.000 indivíduos — um sexto da população do país. O objetivo da legislação era transformar a economia da Guatemala de um pseudofeudalismo para o capitalismo."
    historical_oil_production.t:0 "Desenvolver a Indústria Petrolífera [ROOT.GetCountry.GetAdjectiveNoFormatting]?"
    historical_oil_production.d:0 "Levantadores em [ROOT.GetCountry.GetName] descobriram [GetGoods('oil').GetName] em certas partes do país. Isso levou líderes da indústria em [ROOT.GetCountry.GetName] a pedir ao(à) [concept_government] que construa [GetBuildingType('building_oil_rig').GetName] para explorar esse recurso recém-descoberto."
    GBR_brexit.t:0 "Brexit?"
    GBR_brexit.d:0 "O Brexit foi a retirada do Reino Unido (RU) da União Europeia (UE). Após um referendo realizado no RU em 23 de junho de 2016, o Brexit ocorreu oficialmente às 23h00 GMT de 31 de janeiro de 2020 (00h00 de 1º de fevereiro de 2020 CET). O RU, que aderiu às precursoras da UE, as Comunidades Europeias (CE), em 1º de janeiro de 1973, é o único Estado-membro a ter se retirado da UE. Após o Brexit, o direito da UE e o Tribunal de Justiça da União Europeia deixaram de ter primazia sobre as leis britânicas. O European Union (Withdrawal) Act 2018 mantém o direito relevante da UE como direito interno, que o RU pode emendar ou revogar."
    JAP_ELR_Reforms.t:0 "Promulgar a Abenomics?"
    JAP_ELR_Reforms.d:0 "Abenomics refere-se às políticas econômicas implementadas pelo Governo do Japão desde a eleição geral de dezembro de 2012. A Abenomics baseia-se em três flechas: flexibilização monetária pelo Banco do Japão, estímulo fiscal por meio de gastos governamentais, e reformas estruturais. A revista The Economist caracterizou o programa como uma "mistura de reflação, gastos governamentais e uma estratégia de crescimento projetada para tirar a economia da animação suspensa que a dominava há mais de duas décadas". O termo Abenomics é um portmanteau de Abe e economics."
    PHI_ELR_Reforms.t:0 "Promulgar a Liberalização Econômica?"
    PHI_ELR_Reforms.d:0 "Fidel Valdez Ramos CCLH GCS KGCR, popularmente conhecido como FVR, foi um general e político filipino que serviu como o 12º Presidente das Filipinas, de 1992 a 1998. Durante sua administração, Ramos começou a implementar reformas econômicas destinadas a abrir a economia nacional, antes fechada, incentivar a livre iniciativa, atrair mais investimentos estrangeiros e domésticos, e reduzir a corrupção. Ramos encerrou o monopólio governamental sobre os céus e abriu a aviação a novos operadores."
    USA_Trade_War_2025.t:0 "A Guerra Comercial de Trump?"
    USA_Trade_War_2025.d:0 "As tarifas implementadas durante a segunda presidência de Donald Trump marcaram uma forte escalada nas políticas comerciais protecionistas dos Estados Unidos, com o Presidente Donald Trump anunciando uma série de tarifas elevadas sobre quase todos os bens importados para os EUA. O anúncio dessas controversamente chamadas "tarifas recíprocas" provocou retaliação dos parceiros comerciais e desencadeou uma queda no mercado de ações."
    SOV_Kosygin_Reforms_Rollback.t:0 "O Fracasso das Reformas de Kosygin?"
    SOV_Kosygin_Reforms_Rollback.d:0 "A reforma econômica soviética de 1965, por vezes chamada de reforma de Kosygin ou reforma de Liberman, em homenagem a E.G. Liberman, foi um conjunto de mudanças planejadas na economia da URSS. Um dos pilares dessas mudanças foi a introdução da rentabilidade e das vendas como os dois principais indicadores de sucesso empresarial. O sucesso dessas reformas foi de curta duração, e, com os eventos de Praga em 1968, alimentados pela implementação das reformas por Moscou nos países do Bloco Oriental, as reformas acabaram sendo restringidas."
    SPA_ELR_Reforms.t:0 "Adotar a Liberalização Econômica?"
    SPA_ELR_Reforms.d:0 "Após uma recuperação muito lenta da devastação da guerra civil de 1936-1939, o "milagre econômico" foi iniciado pelas reformas promovidas por um grupo de "tecnocratas" econômicos que, com o apoio de Francisco Franco, implementaram novas políticas para o desenvolvimento econômico da Espanha. Os "tecnocratas", muitos dos quais membros do Opus Dei, eram uma nova geração de políticos que substituíram a antiga guarda falangista. Abandonaram uma política de autarquia e implementaram "planos de desenvolvimento" que viram a liberalização do comércio e o rápido crescimento da indústria."
    SIR_ELR_Reforms.t:0 "Adotar a Liberalização Econômica?"
    SIR_ELR_Reforms.d:0 "O "Tigre Celta" é um termo referente à economia da Irlanda de meados dos anos 1990 ao final dos anos 2000, um período de rápido crescimento econômico real, impulsionado pelo investimento estrangeiro direto. O historiador R. F. Foster argumenta que a causa foi uma combinação de um novo senso de iniciativa e a entrada de corporações americanas como a Intel. Ele conclui que os principais fatores foram a baixa tributação, políticas regulatórias favoráveis aos negócios, e uma força de trabalho jovem e tecnologicamente capacitada. Para muitas multinacionais, a decisão de fazer negócios na Irlanda foi facilitada ainda mais por incentivos generosos da Autoridade de Desenvolvimento Industrial."
    XEU_EE_Expansion_2004.t:0 "Ingressar na União Europeia?"
    XEU_EE_Expansion_2004.d:0 "O maior alargamento da União Europeia (UE), em termos de número de Estados e população, ocorreu em 1º de maio de 2004. Parte da mesma onda de alargamento foi a adesão da Bulgária e da Romênia em 2007, que não puderam aderir em 2004, mas que, segundo a Comissão Europeia, fazem parte do quinto alargamento."
    GBR_ELR_Reforms.t:0 "O Big Bang?"
    GBR_ELR_Reforms.d:0 "O governo conservador dos anos 1980, liderado por Margaret Thatcher, iniciou uma política radical de monetarismo, desregulamentação, particularmente do setor financeiro (por exemplo, o Big Bang em 1986) e dos mercados de trabalho, a venda de empresas estatais (privatização), e a retirada de subsídios a outras."
    BRU_SGP_Reforms.t:0 "A Parceria Econômica Brunei-Singapura?"
    BRU_SGP_Reforms.d:0 "Singapura e Brunei compartilham uma parceria econômica e estratégica singularmente profunda, enraizada em confiança e respeito mútuo. Seu Acordo de Intercambialidade de Moeda, cooperação em defesa e joint ventures em finanças, energia e educação refletem laços duradouros."
    PER_Oil_Nationalisation_1951.t:0 "Nacionalizar a Indústria Petrolífera Iraniana?"
    PER_Oil_Nationalisation_1951.d:0 "Em 1951, o parlamento do Irã, liderado por Mohammad Mosaddegh, votou pela nacionalização da Anglo-Iranian Oil Company. Essa medida ousada encerrou o controle britânico sobre o petróleo do Irã, formando a Companhia Nacional de Petróleo do Irã. Provocou reação internacional, especialmente da Grã-Bretanha e dos Estados Unidos."
    GCC_Union.t:0 "O Conselho de Cooperação do Golfo?"
    GCC_Union_1.t:0 "Expandir o Conselho de Cooperação do Golfo?"
    GCC_Union_2.t:0 "Ingressar no Conselho de Cooperação do Golfo?"
    GCC_Union.d:0 "O Conselho de Cooperação para os Estados Árabes do Golfo, também conhecido como Conselho de Cooperação do Golfo, é uma união política e econômica regional intergovernamental e uma aliança militar composta por Barein, Kuwait, Omã, Catar, Arábia Saudita e Emirados Árabes Unidos. A sede principal do conselho está localizada em Riade, capital da Arábia Saudita. A Carta do CCG foi assinada em 25 de maio de 1981, estabelecendo formalmente a instituição."
    Eurasian_Economic_Community.t:0 "A Comunidade Econômica Eurasiática?"
    Eurasian_Economic_Community.d:0 "A Comunidade Econômica Eurasiática (CEEA ou EurAsEC) foi uma organização regional entre 2000 e 2014 que visava a integração econômica de seus Estados-membros. A organização originou-se da Comunidade dos Estados Independentes (CEI) em 29 de março de 1996, com o tratado de estabelecimento da Comunidade Econômica Eurasiática assinado em 10 de outubro de 2000 na capital do Cazaquistão, Astana."
    Eurasian_Single_Market.t:0 "A União Aduaneira Eurasiática?"
    Eurasian_Single_Market.d:0 "A União Aduaneira Eurasiática é a união aduaneira dos Estados-membros da União Econômica Eurasiática (UEEA): Armênia, Belarus, Cazaquistão, Quirguistão e Rússia. Ela prevê a livre circulação de bens dentro da união e uma tarifa externa comum para bens provenientes de fora dela."
    Mercosur_Economic_Community.t:0 "O Tratado de Assunção?"
    Mercosur_Economic_Community.d:0 "O Tratado de Assunção, assinado em 26 de março de 1991 pela Argentina, Brasil, Paraguai e Uruguai, criou o Mercosul para estabelecer um mercado comum. Complementado pelo Protocolo de Ouro Preto, obteve reconhecimento legal. Estabeleceu a eliminação gradual de tarifas comerciais, visando a uma zona de livre comércio até 1994."
    Mercosur_Single_Market.t:0 "O Protocolo de Ouro Preto?"
    Mercosur_Single_Market.d:0 "O Protocolo de Ouro Preto de 1994 foi a continuação das políticas econômicas que estabeleceram uma união aduaneira, conforme previsto quatro anos antes no Tratado de Assunção pelos quatro Estados originais do Mercosul, Argentina, Brasil, Paraguai e Uruguai. Estabeleceu oficialmente o Mercosul como uma união aduaneira internacional."
    Andean_Economic_Community.t:0 "A Zona Andina de Livre Comércio?"
    Andean_Economic_Community.d:0 "Estabelecida sob o Acordo de Cartagena, a Zona Andina de Livre Comércio entrou em pleno funcionamento em 1º de janeiro de 1993, ligando Bolívia, Colômbia, Equador e Venezuela em um comércio livre de tarifas. Marcou um passo decisivo rumo à integração regional, evoluindo posteriormente para a Comunidade Andina (CAN), com o reingresso do Peru em 1997."
    SACU_Single_Market.t:0 "A União Aduaneira da África Austral?"
    SACU_Single_Market.d:0 "Formada em 1910, a União Aduaneira da África Austral (SACU) é a mais antiga união aduaneira do mundo, ligando Botsuana, Essuatíni, Lesoto, Namíbia e África do Sul. Estabelece uma tarifa externa comum e a livre circulação de bens entre os membros, enquanto as receitas dos direitos aduaneiros são reunidas e compartilhadas. A SACU representa um pilar da cooperação econômica regional na África Austral, equilibrando a economia dominante da África do Sul com mecanismos de distribuição equitativa."
    EAC_Single_Market.t:0 "A União Aduaneira da Comunidade Africana Oriental?"
    EAC_Single_Market.d:0 "A Comunidade Africana Oriental (EAC), revivida em 2000, reúne Burundi, Quênia, Ruanda, Sudão do Sul, Tanzânia, Uganda e a República Democrática do Congo em um bloco regional. Sua iniciativa de Mercado Único busca estabelecer a livre circulação de bens, serviços, capital e pessoas entre os Estados-membros, harmonizando políticas comerciais e promovendo uma integração mais profunda. A EAC representa um dos projetos mais ambiciosos da África para a unidade econômica e o desenvolvimento compartilhado."
    CEMAC_Economic_Community.t:0 "O Tratado de Brazzaville?"
    CEMAC_Economic_Community.d:0 "A União Aduaneira e Econômica da África Central (UDEAC) foi criada pelo Tratado de Brazzaville, assinado em 8 de dezembro de 1964 e em vigor desde 1º de janeiro de 1966. Reuniu Camarões, República Centro-Africana, Chade, República do Congo e Gabão, com a Guiné Equatorial aderindo posteriormente em 1985. A UDEAC estabeleceu o livre comércio entre os membros e uma tarifa externa comum, lançando as bases para uma integração regional mais profunda."
    CEMAC_Single_Market.t:0 "O Tratado da CEMAC?"
    CEMAC_Single_Market.d:0 "A Comunidade Econômica e Monetária da África Central (CEMAC) foi estabelecida por tratado em 16 de janeiro de 1994, em N'Djamena, Chade, como sucessora da União Aduaneira e Econômica da África Central (UDEAC). Uniu Camarões, República Centro-Africana, Chade, República do Congo, Guiné Equatorial e Gabão em uma união aduaneira e monetária. A CEMAC introduziu uma tarifa externa comum, a livre circulação de bens entre os membros, e uma moeda compartilhada — o franco CFA da África Central — gerida pelo Banco dos Estados da África Central."
    WAEMU_Single_Market.t:0 "O Tratado de Dacar?"
    WAEMU_Single_Market.d:0 "A União Econômica e Monetária da África Ocidental (UEMOA) foi estabelecida por tratado em 10 de janeiro de 1994, em Dacar, Senegal. Uniu Benin, Burkina Faso, Costa do Marfim, Mali, Níger, Senegal e Togo, com a Guiné-Bissau aderindo em 1997. A UEMOA criou tanto uma união aduaneira, com tarifa externa comum e livre circulação de bens, quanto uma união monetária baseada no franco CFA da África Ocidental compartilhado, gerida pelo Banco Central dos Estados da África Ocidental (BCEAO)."
    CACM_Economic_Community.t:0 "O Protocolo de Tegucigalpa?"
    CACM_Economic_Community.d:0 "O Sistema de Integração Centro-Americana (SICA), fundado em 1991 pelo Protocolo de Tegucigalpa, une as nações centro-americanas sob um marco de cooperação política, econômica, social e ambiental. Coordena políticas regionais de aduanas, segurança e desenvolvimento, com o objetivo de fortalecer a democracia, promover a integração, e impulsionar o crescimento sustentável em toda a região."
    CHI_Hainan_SAR.t:0 "O Porto de Livre Comércio de Hainan?"
    CHI_Hainan_SAR.d:0 "O Porto de Livre Comércio de Hainan é um porto de livre comércio em Hainan, China. Como ilha offshore, Hainan é também a maior zona econômica especial da República Popular da China (RPC). É considerada uma área especial para a China aprofundar de forma abrangente a reforma econômica e experimentar o mais alto nível de políticas de abertura. O Porto de Livre Comércio de Hainan não é um porto no sentido usual, já que toda a Ilha de Hainan é considerada uma área especial de desenvolvimento econômico."
    CHI_One_Child_Policy_1980.t:0 "A Política do Filho Único?"
    CHI_One_Child_Policy_1980.d:0 "A política do filho único foi uma iniciativa de planejamento populacional na China, implementada entre 1979 e 2015, para conter o crescimento populacional do país, restringindo muitas famílias a um único filho. O programa teve amplos efeitos sociais, culturais, econômicos e demográficos, embora a contribuição das restrições ao filho único no programa mais amplo tenha sido objeto de controvérsia. Sua eficácia na redução das taxas de natalidade e sua defensabilidade sob a perspectiva dos direitos humanos têm sido temas de controvérsia."
    MLD_HND_Reforms.t:0 "O Acordo Comercial Bilateral Índia-Maldivas?"
    MLD_HND_Reforms.d:0 "Sob o Acordo Comercial Bilateral assinado em 1981, ambos os países concordaram em conceder mutuamente o status de nação mais favorecida. Dentro das disposições deste acordo, a Índia continua a fornecer certas commodities às Maldivas, que podem até se enquadrar nas categorias de importação proibida/restrita na Índia. Deve-se levar em conta que o grosso de itens como arroz, farinha de trigo, açúcar, batatas, cebolas, ovos, vegetais e outras commodities, como areia de rio e materiais de construção, são importados da Índia, tornando as Maldivas cada vez mais um mercado atraente para os crescentes investidores indianos neste setor."
    PHI_First_Policy.t:0 "A Política Filipinos Primeiro?"
    PHI_First_Policy.d:0 "Filipinos Primeiro refere-se a uma política protecionista de nacionalismo econômico, introduzida e implementada pela administração do então Presidente filipino Carlos P. Garcia. Sob a política, empresas de propriedade filipina são priorizadas em relação às suas contrapartes estrangeiras, e o incentivo ao consumo de produtos fabricados nas Filipinas pelos próprios filipinos também foi promovido. Garcia instituiu a política pela primeira vez com a emissão da Resolução nº 202 do Conselho Econômico Nacional, em 28 de agosto de 1958."

