    american_puerto_rico.sgc.t:0 "O Estado Livre Associado de Porto Rico?"
    american_puerto_rico.sgc.d:0 "O governo dos Estados Unidos autorizou Porto Rico a redigir sua própria constituição por meio do Puerto Rico Federal Relations Act de 1950. A Assembleia Constitucional reuniu-se por vários meses entre 1951 e 1952, período em que o documento foi redigido. A lei exigia que os redatores seguissem apenas dois requisitos básicos: uma forma republicana de governo e a inclusão de uma Declaração de Direitos."
    american_NMI.sgc.t:0 "O Estado Livre Associado das Ilhas Marianas do Norte?"
    american_NMI.sgc.d:0 "Após a derrota do Japão na Segunda Guerra Mundial, as Marianas do Norte foram administradas pelos Estados Unidos, conforme a Resolução 21 do Conselho de Segurança, como parte do Território sob Tutela das Ilhas do Pacífico das Nações Unidas, que atribuía responsabilidade pela defesa e relações exteriores aos Estados Unidos como tutor. O povo das Ilhas Marianas do Norte decidiu, na década de 1970, não buscar a independência, mas sim forjar laços mais estreitos com os Estados Unidos. As negociações para o status de Estado Livre Associado começaram em 1972, e um pacto para estabelecer um Estado Livre Associado em união política com os Estados Unidos foi aprovado em um referendo de 1975. Um novo governo e constituição entraram parcialmente em vigor em 9 de janeiro de 1978."
    american_ESM.sgc.t:0 "Autogoverno na Samoa Americana?"
    american_ESM.sgc.d:0 "Desde que as Escrituras de Cessão foram assinadas em 1900 e 1904, os samoanos têm evitado uma maior integração ao sistema estadunidense. Em 1949, o Departamento do Interior tentou incorporar a Samoa Americana por meio de um Ato Orgânico. Temendo que a incorporação pudesse enfraquecer a cultura samoana e a posse tradicional de terras, os matai samoanos intervieram, e o Congresso interrompeu a incorporação. Em vez disso, a Samoa criou seu próprio governo, o Fono Samoano, baseado no sistema indígena de governança. Desde então, os samoanos recusaram-se a estabelecer um tribunal distrital federal, rejeitaram a cidadania por nascimento, e permanecem sendo o único território estadunidense com sistema próprio de imigração."

    american_decolonisation.option.1:0 "Permitir que a colônia se autogoverne"
    american_decolonisation.option.2:0 "Eles não merecem nenhuma autonomia"

    american_west_germany.indy.t:0 "Independência da Alemanha Ocidental?"
    american_west_germany.indy.d:0 "As convenções de Bonn-Paris foram assinadas em maio de 1952 e entraram em vigor após a ratificação de 1955. As convenções puseram fim à ocupação Aliada da Alemanha Ocidental."
    american_japan.indy.t:0 "Independência do Japão?"
    american_japan.indy.d:0 "O Tratado de São Francisco restabeleceu relações pacíficas entre o Japão e as Potências Aliadas, em nome das Nações Unidas, pondo fim ao estado legal de guerra e prevendo reparação por ações hostis até e incluindo a Segunda Guerra Mundial. O tratado de 1951, juntamente com o Tratado de Segurança assinado no mesmo dia, marca o início do Sistema de São Francisco, que define a relação do Japão com os Estados Unidos e seu papel na arena internacional."
    american_germany_japan.indy.t:0 "O Acordo do Plaza?"
    american_germany_japan.indy.d:0 "O Acordo do Plaza foi um acordo conjunto assinado em 22 de setembro de 1985, no Plaza Hotel, em Nova York, entre a França, a Alemanha Ocidental, o Japão, o Reino Unido e os Estados Unidos, para depreciar o dólar estadunidense em relação ao franco francês, ao marco alemão, ao iene japonês e à libra esterlina britânica, por meio de intervenção nos mercados de câmbio."
    american_micronesia.indy.t:0 "Independência da Micronésia?"
    american_micronesia.indy.d:0 "$generic_independence_decolonisation_loc_desc$"
    american_iraq.indy.t:0 "Retirada do Iraque?"
    american_iraq.indy.d:0 "À medida que a Guerra do Iraque avançava de sua fase inicial de invasão em 2003 para uma ocupação de quase uma década, a opinião pública estadunidense passou a favorecer a retirada das tropas. A retirada das tropas dos Estados Unidos do Iraque começou em dezembro de 2007, com o fim do reforço de tropas de 2007 na Guerra do Iraque, e foi, em grande parte, concluída em dezembro de 2011, pondo fim à Guerra do Iraque. A retirada das forças militares estadunidenses do Iraque foi uma questão controversa nos Estados Unidos por grande parte dos anos 2000."
    american_afghanistan.indy.t:0 "Retirada do Afeganistão?"
    american_afghanistan.indy.d:0 "Em agosto de 2021, os Estados Unidos retiraram as últimas de suas tropas do Afeganistão, encerrando sua presença militar no país após quase 20 anos. A saída dos EUA do Afeganistão resultou na retomada do controle do país pelo Talibã e criou uma crise de refugiados, à medida que muitos afegãos fugiram."
    american_germany.indy.t:0 "Uma Alemanha Soberana?"
    american_germany.indy.d:0 "O Tratado sobre a Solução Final em Relação à Alemanha é um acordo internacional que permitiu a reunificação da Alemanha no início dos anos 1990. Foi negociado em 1990 entre os 'dois', a República Federal da Alemanha e a República Democrática Alemã, além das Quatro Potências que haviam ocupado a Alemanha ao final da Segunda Guerra Mundial na Europa: França, União Soviética, Reino Unido e Estados Unidos. O tratado substituiu o Acordo de Potsdam de 1945: nele, as Quatro Potências renunciaram a todos os direitos que detinham em relação à Alemanha, permitindo sua reunificação como um Estado plenamente soberano no ano seguinte."
    american_italy.indy.t:0 "O Tratado de Paris?"
    american_italy.indy.d:0 "O Tratado de Paris entre a Itália e as Potências Aliadas foi assinado em 10 de fevereiro de 1947, encerrando formalmente as hostilidades entre as duas partes. Entrou em vigor geral em 15 de setembro de 1947."
    american_south_korea.indy.t:0 "Independência da Coreia do Sul?"
    american_south_korea.indy.d:0 "A Primeira República da Coreia foi o governo da Coreia do Sul de agosto de 1948 a abril de 1960. A primeira república foi fundada em 15 de agosto de 1948, após a transferência do Governo Militar do Exército dos Estados Unidos que governava a Coreia do Sul desde o fim do domínio japonês em 1945, tornando-se o primeiro governo republicano independente da Coreia."
    american_FRG.indy.t:0 "A República Federal da Alemanha?"
    american_FRG.indy.d:0 "Os Aliados Ocidentais transferiram autoridade crescente aos funcionários da Alemanha Ocidental e passaram a estabelecer um núcleo para um futuro governo alemão, criando um Conselho Econômico central para suas zonas. O programa posteriormente previu uma assembleia constituinte da Alemanha Ocidental, um estatuto de ocupação que regia as relações entre os Aliados e as autoridades alemãs, e a fusão política e econômica da zona francesa com as zonas britânica e americana. Em 23 de maio de 1949, foi promulgada a Grundgesetz (Lei Fundamental), a constituição da República Federal da Alemanha."
    american_philippines.indy.t:0 "O Tratado de Manila?"
    american_philippines.indy.d:0 "O Tratado de Manila de 1946, formalmente o Tratado de Relações Gerais e Protocolo, é um tratado de relações gerais assinado em 4 de julho de 1946, em Manila, capital das Filipinas. Ele renunciou à soberania estadunidense sobre as Filipinas e reconheceu a independência da República das Filipinas."
    american_iceland.indy.t:0 "O Acordo de Keflavík?"
    american_iceland.indy.d:0 "O Acordo de Keflavík foi um acordo firmado em 1946 entre o governo dos Estados Unidos e a recém-estabelecida República da Islândia, após o fim da Segunda Guerra Mundial. Este acordo estipulava que o exército americano deixaria o país em até seis meses e que os islandeses assumiriam posse do Aeroporto de Keflavík."
    american_iceland_2.indy.t:0 "Retirar a Força de Defesa da Islândia?"
    american_iceland_2.indy.d:0 "Em 15 de março de 2006, a Embaixadora dos EUA na Islândia, Carol van Voorst, anunciou a decisão dos Estados Unidos de retirar a Força de Defesa da Islândia antes do fim de setembro de 2006. Em 30 de setembro, os militares americanos retiraram seus últimos quatro caças da Força Aérea e um esquadrão de helicópteros de resgate de Keflavík."
    american_south_vietnam.indy.t:0 "A Retirada dos EUA do Vietnã do Sul?"
    american_south_vietnam.indy.d:0 "O recém-eleito Presidente Richard M. Nixon declarou em 1969 que continuaria o envolvimento americano na Guerra do Vietnã a fim de encerrar o conflito e garantir "paz com honra" para os Estados Unidos e para seu aliado, o Vietnã do Sul. Seus elementos-chave eram: todas as partes iniciariam um cessar-fogo em vigor 24 horas após a assinatura do acordo; as forças dos EUA e todas as tropas estrangeiras se retirariam do Vietnã do Sul no máximo 60 dias após a assinatura do acordo; os prisioneiros americanos seriam libertados simultaneamente com a retirada das forças americanas e estrangeiras; e um Conselho Nacional de Reconciliação e Concórdia Nacional seria criado para organizar e supervisionar eleições livres e democráticas para determinar o futuro político do Sul."
    american_palau.indy.t:0 "Independência de Palau?"
    american_palau.indy.d:0 "Junto com outras ilhas do Pacífico, Palau tornou-se parte do Território sob Tutela das Ilhas do Pacífico, governado pelos Estados Unidos, em 1947. Após votar em um referendo contra a adesão aos Estados Federados da Micronésia em 1978, as ilhas obtiveram soberania plena em 1994, sob um Pacto de Livre Associação com os Estados Unidos."

    american_decolonisation_indy.option.1:0 "Conceder-lhes independência"
    american_decolonisation_indy.option.2:0 "Eles não merecem liberdade"

    soviet_north_korea.indy.t:0 "Independência da Coreia do Norte?"
    soviet_north_korea.indy.d:0 "Em 1945, após a rendição japonesa ao final da Segunda Guerra Mundial, a Coreia foi dividida em duas zonas ao longo do paralelo 38, com o norte ocupado pela União Soviética e o sul ocupado pelos Estados Unidos. Em 1948, governos separados foram formados na Coreia: a socialista e pró-soviética República Popular Democrática da Coreia, no norte, e a capitalista República da Coreia, alinhada ao Ocidente, no sul."
    soviet_afghanistan.indy.t:0 "Retirar-se do Afeganistão?"
    soviet_afghanistan.indy.d:0 "Mikhail Gorbachev, que se tornou Secretário-Geral do Partido Comunista da União Soviética em março de 1985, começou a planejar o desengajamento militar do Afeganistão logo após ser eleito pelo Politburo. Sob sua liderança, a União Soviética tentou auxiliar a consolidação do poder pelo Partido Democrático do Povo do Afeganistão (PDPA); Mohammad Najibullah, ex-chefe da polícia secreta afegã (KHAD), foi eleito Secretário-Geral e, posteriormente, Presidente do Conselho Revolucionário, e as forças soviéticas foram gradualmente retiradas do Afeganistão. Após a retirada soviética do Afeganistão, o governo de Gorbachev continuou a apoiar militar e politicamente Najibullah contra a oposição afegã."

    soviet_decolonisation_indy.option.1:0 "Conceder-lhes independência"
    soviet_decolonisation_indy.option.2:0 "Eles não merecem liberdade"

