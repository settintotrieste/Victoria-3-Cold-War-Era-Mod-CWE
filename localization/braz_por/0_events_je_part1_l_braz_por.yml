    cfa_franc_zone:0 "A Zona do Franco CFA"
    cfa_franc_zone_desc:0 "Liderado por [ROOT.GetCountry.GetName], o franco CFA é o nome de duas moedas, o franco CFA da África Ocidental, usado em oito países da África Ocidental, e o franco CFA da África Central, usado em seis países da África Central. Embora separadas, as duas moedas do franco CFA sempre estiveram em paridade e são efetivamente intercambiáveis.\n\nDevemos buscar preservar este extenso [concept_currency_union], pois perdê-lo será um golpe ao nosso prestígio nacional."
    franc_zone:0 "A Zona do Franco"
    franc_zone_desc:0 "Liderada por [ROOT.GetCountry.GetName], a zona do franco é uma área econômica, monetária e cultural que não possui equivalente em nenhum outro lugar do mundo. É composta por Estados e territórios muito diversos, e resulta de desenvolvimentos e mudanças no antigo império colonial francês.\n\nDevemos buscar preservar este extenso [concept_currency_union], pois perdê-lo será um golpe ao nosso prestígio nacional."
    sterling_zone:0 "A Área da Libra Esterlina"
    sterling_zone_desc:0 "Liderada por [ROOT.GetCountry.GetName], a área da libra esterlina era um grupo de países que atrelavam suas moedas à libra esterlina, ou efetivamente usavam a libra esterlina como sua própria moeda. A área começou a surgir informalmente no início dos anos 1930, após a libra esterlina abandonar o padrão-ouro em 1931, resultando em que diversas moedas de países que historicamente realizavam grande parte de seu comércio em libras esterlinas passassem a ser atreladas à libra em vez do ouro. O Banco da Inglaterra, em Londres, orientava a coordenação da política monetária na área monetária. Os países-membros com moeda própria mantinham uma grande parte de suas reservas em moeda estrangeira como saldos em libras esterlinas em Londres.\n\nDevemos buscar preservar este extenso [concept_currency_union], pois perdê-lo será um golpe ao nosso prestígio nacional."
    dollar_zone:0 "A Zona do Dólar"
    ruble_zone:0 "A Zona do Rublo [ROOT.GetCountry.GetAdjectiveNoFlag]"
    generic_currency_zone:0 "A Zona Monetária [ROOT.GetCountry.GetAdjectiveNoFlag]"
    generic_currency_zone_desc:0 "[ROOT.GetCountry.GetName] é o(a) líder de um(a) importante [concept_currency_union] composto(a) por 5 ou mais membros soberanos. Isso confere ao Banco Central [ROOT.GetCountry.GetAdjective] grande influência sobre as taxas de juros internacionais e muito prestígio.\n\nDevemos buscar preservar este extenso [concept_currency_union], pois perdê-lo será um golpe ao nosso prestígio nacional."

    je_multilateral_development_banks_1.tt:0 "Este país possui um(a) [concept_diplomatic_pact] $multilateral_development_bank$ com ao menos 1 outro país"
    je_multilateral_development_banks_2.tt:0 "Este país não possui um(a) [concept_diplomatic_pact] $multilateral_development_bank$ com nenhum país"
    je_multilateral_development_banks:0 "Bancos Multilaterais de Desenvolvimento"
    je_multilateral_development_banks_reason:0 "Bancos Multilaterais de Desenvolvimento são instituições financeiras supranacionais criadas por Estados soberanos, que são seus acionistas. Seu escopo reflete as políticas de ajuda ao desenvolvimento e cooperação estabelecidas por esses Estados. \n\nO Governo de [ROOT.GetCountry.GetName] pode tomar empréstimos junto a Bancos Multilaterais de Desenvolvimento para financiar despesas nacionais. \n\n Os Empréstimos Internacionais são denominados em #Yellow XDR#!, que por sua vez é calculado usando a Taxa de Câmbio Média Global. Uma moeda [ROOT.GetCountry.GetAdjectiveNoFlag] mais forte, portanto, nos concederá empréstimos mais baratos, e vice-versa. \n\nDica: A Taxa de Câmbio [ROOT.GetCountry.GetAdjective] pode ser ajustada pela [concept_law] $lawgroup_monetary_policy$. \n\nTaxa de Câmbio: @money!1 = [GetPlayer.MakeScope.Var('currency_exchange_rate').GetValue] #Yellow XDR#! \n\nLimite de Empréstimo (em Moeda Estrangeira): #Yellow XDR#! #Green [GetPlayer.MakeScope.Var('currency_borrowing_pool_display').GetValue]M#! \n\nLimite de Empréstimo (em Moeda [ROOT.GetCountry.GetAdjectiveNoFlag]): #Green @money![GetPlayer.MakeScope.Var('currency_borrowing_pool_domestic_display').GetValue]M#! \n\nLimite de Empréstimo Mensal: #o @money![GetPlayer.MakeScope.Var('currency_borrow_money_monthly_limit_display').GetValue]M#! \n\n[ROOT.GetCountry.GetName] é membro dos seguintes Bancos Regionais: #BOLD $ASIAN_DEVELOPMENT_BANK$ $ASIAN_INFRASTRUCTURE_INVESTMENT_BANK$ $EUROPEAN_INVESTMENT_BANK$ $INTERNATIONAL_INVESTMENT_BANK$ $INTER_AMERICAN_DEVELOPMENT_BANK$ $AFRICAN_DEVELOPMENT_BANK$ $NORDIC_INVESTMENT_BANK$ $CARIBBEAN_DEVELOPMENT_BANK$ $ISLAMIC_DEVELOPMENT_BANK$ $NEW_DEVELOPMENT_BANK$ $EURASIAN_DEVELOPMENT_BANK$ $NORTH_AMERICAN_DEVELOPMENT_BANK$ #!"
    je_multilateral_development_banks_status:0 "Valor Principal: #Yellow XDR#! #Green [GetPlayer.MakeScope.Var('currency_borrowed_money_display').GetValue]M#! \nTaxa de Juros Anual: #o [GetPlayer.MakeScope.Var('currency_rate_international_local').GetValue]%#! \nPagamento Anual: @money!#Red [GetPlayer.MakeScope.Var('currency_borrowed_money_yearly_repayment_display').GetValue]#! / #Yellow XDR#! #Red [GetPlayer.MakeScope.Var('currency_borrowed_money_exchange_adjusted_repayment').GetValue]#!"

    je_start_borrow_multilateral_banks_button:0 "Começar a Tomar Empréstimos"
    je_start_borrow_multilateral_banks_button_desc:0 "O Governo de [ROOT.GetCountry.GetName] começará a tomar empréstimos junto a Bancos Multilaterais de Desenvolvimento a uma taxa de juros anual de #o [GetPlayer.MakeScope.Var('currency_rate_international_local').GetValue]%#!. \n\nNota: Temos um limite de empréstimo de #Yellow XDR#! #Green [GetPlayer.MakeScope.Var('currency_borrowing_pool_display').GetValue]M#!, equivalente a #Green @money![GetPlayer.MakeScope.Var('currency_borrowing_pool_domestic_display').GetValue]M#!."
    je_stop_borrow_multilateral_banks_button:0 "Parar de Tomar Empréstimos"
    je_stop_borrow_multilateral_banks_button_desc:0 "O Governo de [ROOT.GetCountry.GetName] deixará de tomar empréstimos junto a Bancos Multilaterais de Desenvolvimento a uma taxa de juros anual de #o [GetPlayer.MakeScope.Var('currency_rate_international_local').GetValue]%#!. \n\nNota: Temos um limite de empréstimo de #Yellow XDR#! #Green [GetPlayer.MakeScope.Var('currency_borrowing_pool_display').GetValue]M#!, equivalente a #Green @money![GetPlayer.MakeScope.Var('currency_borrowing_pool_domestic_display').GetValue]M#!."
    je_start_repay_multilateral_banks_button:0 "Começar a Pagar a Dívida"
    je_start_repay_multilateral_banks_button_desc:0 "O Governo de [ROOT.GetCountry.GetName] começará a pagar parte de seu empréstimo junto a Bancos Multilaterais de Desenvolvimento. \n\nNota: @money!#Red [GetPlayer.MakeScope.Var('currency_borrowed_money_yearly_repayment_display').GetValue]#! pagaria #Yellow XDR#! #Red [GetPlayer.MakeScope.Var('currency_borrowed_money_exchange_adjusted_repayment').GetValue]#! em dívida."
    je_stop_repay_multilateral_banks_button:0 "Parar de Pagar a Dívida"
    je_stop_repay_multilateral_banks_button_desc:0 "O Governo de [ROOT.GetCountry.GetName] deixará de pagar parte de seu empréstimo junto a Bancos Multilaterais de Desenvolvimento. \n\nNota: @money!#Red [GetPlayer.MakeScope.Var('currency_borrowed_money_yearly_repayment_display').GetValue]#! pagaria #Yellow XDR#! #Red [GetPlayer.MakeScope.Var('currency_borrowed_money_exchange_adjusted_repayment').GetValue]#! em dívida."

