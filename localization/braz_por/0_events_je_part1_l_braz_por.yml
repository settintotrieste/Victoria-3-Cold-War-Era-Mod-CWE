    je_gatt_system: "O Acordo Geral de Tarifas e Comércio"
    je_gatt_system_reason: "O Acordo Geral de Tarifas e Comércio (GATT) é um acordo legal entre muitos países, cujo propósito geral era promover o comércio internacional, reduzindo ou eliminando barreiras comerciais, como tarifas ou cotas. Foi atualizado em uma série de negociações comerciais globais, compostas por nove rodadas entre 1947 e 1995. Seu papel no comércio internacional foi, em grande parte, sucedido em 1995 pela Organização Mundial do Comércio. \n\nComo o GATT é um acordo em constante atualização, a redução de [concept_tariffs] pelo GATT varia a cada ano. \n\nNota: O valor de [concept_tariffs] reduzido depende da perspectiva econômica global."

