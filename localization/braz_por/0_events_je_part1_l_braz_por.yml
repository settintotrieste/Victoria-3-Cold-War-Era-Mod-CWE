    je_private_media_system: "A Mídia [ROOT.GetCountry.GetAdjectiveNoFormatting]"
    je_private_media_system_reason: "A indústria de mídia em [ROOT.GetCountry.GetName] é dominada por um consórcio de grandes redes de notícias privadas que monopolizam coletivamente a disseminação de todas as notícias no país. Isso confere aos proprietários dessas redes de notícias, o(a) [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetNameWithCountryVariant] e o(a) [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetNameWithCountryVariant], grande influência sobre os corações e mentes do povo [ROOT.GetCountry.GetAdjective]. \n\nConquistar a lealdade da mídia privada é, portanto, importante caso não desejemos que ela exerça sua influência contra o(a) [concept_government]. \n\n@warning! A mídia fará algo para impulsionar (se a Lealdade da Mídia Privada for de ao menos 50%) ou prejudicar (se a Lealdade da Mídia Privada for inferior a 50%) o(a) [concept_government] quando a barra de progresso atingir 100%. \n\nNota: A #y Lealdade da Mídia Privada#! aumentará quando a aprovação do(a) [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetNameWithCountryVariant] e do(a) [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetNameWithCountryVariant] for ao menos Neutra, e diminuirá se os mesmos grupos de interesse tiverem aprovação negativa ou se o(a) [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetNameWithCountryVariant] ou o(a) [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetNameWithCountryVariant] não estiverem no(a) [concept_government]."

