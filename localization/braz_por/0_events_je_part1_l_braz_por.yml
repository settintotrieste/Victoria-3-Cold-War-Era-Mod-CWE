    judge_appointment_process:0 "\n\nA #y Progressividade#! do(a) [SCOPE.GetRootScope.GetCountry.GetCustom('supreme_court_name')] é avaliada a cada ano, levando em conta a nomeação e aposentadoria usuais de juízes. \n\nO ganho ou perda percentual na #y Progressividade#! será afetado(a) pela [concept_ideology] destes importantes funcionários do Estado (quando aplicável): \n\n- $character_role_ruler$ \n\n- $character_role_head_of_state$ \n\n- $character_role_head_of_government$ \n\n- $character_role_reserved_powers_holder$ \n\n- #o Chefe do Serviço Público#!"

    je_judiciary_foreign:0 "O(A) [SCOPE.GetRootScope.GetCountry.GetCustom('foreign_supreme_court_name')] de [SCOPE.sCountry('legal_union_foreign_supreme_court').GetNameNoFlag]"
    je_judiciary_foreign_reason:0 "O(A) [SCOPE.GetRootScope.GetCountry.GetCustom('foreign_supreme_court_name')] de [SCOPE.sCountry('legal_union_foreign_supreme_court').GetName] é o mais alto tribunal do judiciário de [ROOT.GetCountry.GetName]. Possui jurisdição de apelação final sobre todos os casos judiciais que envolvam uma questão de direito constitucional ou estatutário e, dependendo do nível de autonomia dos Juízes, pode emendar leis unilateralmente.\n\nComo [ROOT.GetCountry.GetName] está em uma $legal_union$ com [SCOPE.sCountry('legal_union_foreign_supreme_court').GetName], os juízes do(a) [SCOPE.GetRootScope.GetCountry.GetCustom('foreign_supreme_court_name')] são selecionados pelo Governo [SCOPE.sCountry('legal_union_foreign_supreme_court').GetAdjectiveNoFlag]. \n\nNota: Juízes [concept_progressive_judiciary] apoiarão [Concept('concept_law','$concept_laws$')] mais democráticas na categoria $HUMAN_RIGHTS$ e $POWER_STRUCTURE$."
