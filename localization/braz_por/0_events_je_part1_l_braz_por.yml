    breached_separation_of_powers.t:0 "Crise Constitucional"
    breached_separation_of_powers.d:0 "Sob a Constituição de [ROOT.GetCountry.GetName], o cargo de [Concept('concept_official_character','$head_of_state$')] e o cargo de [Concept('concept_official_character','$prime_minister$')] devem ser ocupados por pessoas diferentes. No entanto, [GetPlayer.GetRuler.GetFullName] de alguma forma encontrou uma maneira de ocupar ambos os cargos simultaneamente, em violação do princípio da separação de poderes. Isso desencadeará uma crise constitucional, a menos que [GetPlayer.GetRuler.GetFullName] renuncie a um dos cargos."
    breached_separation_of_powers.f:0 "Este evento ocorreu porque o(a) [concept_country] possui o(a) [concept_law] [GetLawType('law_HOG_prime_minister').GetName] ou [GetLawType('law_HOG_president_prime_minister').GetName]."
    breached_separation_of_powers_option.1:0 "Permanecer como [GetPlayer.GetRuler.GetPrimaryRoleTitle] e renunciar a todos os demais cargos."
    breached_separation_of_powers_option.2:0 "Renunciar ao cargo de [GetPlayer.GetRuler.GetPrimaryRoleTitle] e permanecer nos demais cargos."
    breached_separation_of_powers_option.3:0 "Abolir ilegalmente o princípio da separação de poderes."

