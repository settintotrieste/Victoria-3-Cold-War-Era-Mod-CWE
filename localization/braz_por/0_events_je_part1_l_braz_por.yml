    territory_lease_terminated_war.d:0 "O arrendamento de [SCOPE.sCountry('territory_lease_tenant').GetName] para um(a) [concept_state] em [SCOPE.sState('territory_lease_state').GetName] foi encerrado devido à retirada do(a) [concept_treaty] subjacente. Isso significa que, sob o direito internacional, [SCOPE.sCountry('territory_lease_tenant').GetName] é obrigado(a) a devolver [SCOPE.sState('territory_lease_state').GetName] a [SCOPE.sCountry('territory_lease_landlord').GetName]. \n\n[SCOPE.sCountry('territory_lease_tenant').GetName], no entanto, recusou-se a devolver [SCOPE.sState('territory_lease_state').GetName], em violação de suas obrigações contratuais."
