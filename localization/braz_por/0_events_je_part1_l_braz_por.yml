    je_warsaw_pact_system:0 "O Pacto de Varsóvia"
    je_warsaw_pact_system_reason:0 "O Pacto de Varsóvia foi um tratado de defesa coletiva assinado em Varsóvia, Polônia, entre a União Soviética e sete outras repúblicas socialistas do Bloco Oriental da Europa Central e Oriental, em maio de 1955, durante a Guerra Fria. O termo 'Pacto de Varsóvia' comumente se refere tanto ao tratado em si quanto à sua aliança defensiva resultante, a Organização do Tratado de Varsóvia. O Pacto de Varsóvia era o complemento militar e econômico do Conselho de Assistência Econômica Mútua (Comecon), a organização econômica regional dos Estados do Bloco Oriental da Europa Central e Oriental. \n\nLíder: [SCOPE.sCountry('warsaw_pact_leader').GetName] \n\nSede: #y [SCOPE.sCountry('warsaw_pact_leader').GetCapital.GetCityHubName]#!"
    je_warsaw_pact_system_status:0 "Total de Membros: [GetGlobalVariable('warsaw_pact_org_member_count').GetValue]"

    je_request_warsaw_pact_intervention_button:0 "Invocar o Artigo 4"
    je_request_warsaw_pact_intervention_button_desc:0 "No caso de um ataque armado na Europa contra um ou vários Estados signatários do tratado, por qualquer Estado ou grupo de Estados, cada Estado parte deste tratado deverá, no exercício do direito de legítima defesa individual ou coletiva, de acordo com o Artigo 51 da Carta das Nações Unidas, prestar assistência imediata ao(s) Estado(s) atacado(s), individualmente e em acordo com os demais Estados partes deste tratado, por todos os meios que julgar necessários, incluindo o uso da força armada."

