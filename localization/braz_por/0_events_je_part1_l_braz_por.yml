    je_cultural_suppression_system:0 "Supressão Cultural em [ROOT.GetCountry.GetName]"
    je_cultural_suppression_system_reason:0 "O Governo [ROOT.GetCountry.GetAdjective] está sistematicamente suprimindo pessoas discriminadas em [ROOT.GetCountry.GetName], usando uma combinação de práticas antiéticas.\n\n1% de um grupo de pop discriminado aleatório de [concept_culture] e/ou [concept_religion] será prejudicado todo mês, até que todos os pops discriminados tenham deixado [ROOT.GetCountry.GetName] ou a lei $law_slavery_cultural$ seja revogada."
    je_cultural_suppression_system.tt:0 "Não restam pops discriminados no país"

    cultural_suppression_discovered.t:0 "Supressão Cultural em [SCOPE.sCountry('country_committing_cultural_suppression').GetName]"
    cultural_suppression_discovered.d:0 "Observadores internacionais descobriram que [SCOPE.sCountry('country_committing_cultural_suppression').GetName] está conduzindo um programa para exterminar toda a sua população discriminada. Essa revelação chocou a comunidade internacional, com figuras proeminentes, como o Secretário-Geral da ONU, condenando fortemente [SCOPE.sCountry('country_committing_cultural_suppression').GetName]. Como [ROOT.GetCountry.GetName] deve reagir a esse crime contra a humanidade?"
    cultural_suppression_discovered.f:0 "A intensidade da condenação internacional contra [SCOPE.sCountry('country_committing_cultural_suppression').GetName] dependerá do número de países que optarem por condenar a supressão cultural."
    cultural_suppression_system_option.1:0 "Condenar [SCOPE.sCountry('country_committing_cultural_suppression').GetName] por sua barbárie!"
    cultural_suppression_system_option.2:0 "Não dizer nada."

    cultural_suppression_discovered_notice.t:0 "Programa de Supressão Cultural em [ROOT.GetCountry.GetName] Exposto"
    cultural_suppression_discovered_notice.d:0 "Observadores internacionais descobriram que [ROOT.GetCountry.GetName] está conduzindo um programa para exterminar toda a sua população discriminada. Essa revelação chocou a comunidade internacional, com figuras proeminentes, como o Secretário-Geral da ONU, condenando fortemente [SCOPE.sCountry('country_committing_cultural_suppression').GetName]."
    cultural_suppression_discovered_notice.f:0 "[ROOT.GetCountry.GetName] ganhará 1 de infâmia de cada país que o condenar por cometer supressão cultural, e também pode ser sancionado pela ONU por cometer tal crime contra a humanidade."
    cultural_suppression_system_notice_option:0 "Ah, bem..."

    je_espionage_system:0 "Conduzindo Espionagem Hostil"
    je_espionage_system_reason:0 "Os Serviços de Inteligência [ROOT.GetCountry.GetAdjective] enviaram agentes ao exterior para conduzir atividades secretas hostis contra nossos inimigos estrangeiros.\n\n[ROOT.GetCountry.GetName] terá a oportunidade de atacar 1 país aleatório entre os elegíveis assim que a barra de progresso estiver completa.\n\nA barra de progresso levará mais tempo para se completar quanto mais países [ROOT.GetCountry.GetName] estiver conduzindo espionagem hostil."
    je_espionage_system_1_tt:0 "Este país não está mais conduzindo espionagem hostil contra nenhum país"
    je_espionage_system_2_tt:0 "Este país está conduzindo espionagem hostil contra ao menos 1 país"

    je_subverted_civil_service_3.tt:0 "O(A) [concept_interest_group] $ig_intelligentsia$ não compartilha a mesma [concept_ideology] do(a) [concept_interest_group] mais poderoso(a) no(a) [concept_government]"
    je_subverted_civil_service_2.tt:0 "O(A) [concept_interest_group] $ig_intelligentsia$ compartilha a mesma [concept_ideology] do(a) [concept_interest_group] mais poderoso(a) no(a) [concept_government]"
    je_subverted_civil_service_1.tt:0 "O Serviço Público é subvertido, e seu líder será substituído por um(a) que esteja ideologicamente alinhado(a) com o(a) [concept_ruler]"
    je_subvert_civil_service:0 "Expurgando o Serviço Público"
    je_subvert_civil_service_reason:0 "Devido a [ROOT.GetCountry.GetName] possuir a [concept_law] $law_politicised_bureaucrats$, o(a) [concept_government] é capaz de nomear Funcionários Públicos que compartilham as mesmas crenças ideológicas do(a) [concept_interest_group] mais poderoso(a) no(a) [concept_government]. Isso significa que, dado um período de tempo suficientemente longo, o Serviço Público será totalmente convertido às crenças ideológicas do(a) [concept_government]. \n\nHaveria uma chance aleatória a cada mês de uma [concept_ideology] do(a) $ig_intelligentsia$ ser alterada para corresponder à do(a) [concept_interest_group] mais poderoso(a) no(a) [concept_government]."

    je_evolved_civil_service_3.tt:0 "O(A) [concept_interest_group] $ig_intelligentsia$ não compartilha a mesma [concept_ideology] do(a) [concept_interest_group] mais poderoso(a) do país"
    je_evolved_civil_service_2.tt:0 "O(A) [concept_interest_group] $ig_intelligentsia$ compartilha a mesma [concept_ideology] do(a) [concept_interest_group] mais poderoso(a) do país"
    je_evolved_civil_service_1.tt:0 "O Serviço Público muda sua ideologia, e seu líder será substituído por um(a) que esteja ideologicamente alinhado(a) com o líder do(a) [concept_interest_group] mais poderoso(a) do país"
    je_evolve_civil_service:0 "Reformando o Serviço Público"
    je_evolve_civil_service_reason:0 "Devido a [ROOT.GetCountry.GetName] possuir a [concept_law] $law_elitist_bureaucrats$, o processo de nomeação do Serviço Público tornou-se elitista e politizado. Isso significa que, dado um período de tempo suficientemente longo, o Serviço Público será totalmente convertido às crenças ideológicas do(a) [concept_interest_group] mais poderoso(a) em [ROOT.GetCountry.GetName]. \n\nHaveria uma chance aleatória a cada mês de uma [concept_ideology] do(a) $ig_intelligentsia$ ser alterada para corresponder à do(a) [concept_interest_group] mais poderoso(a) em [ROOT.GetCountry.GetName]."

