    notification_requested_overlord_takes_subject_debt_notification_desc:0 "Para preservar a solvência geral do império [SCOPE.sCountry('colonial_empire_creditor').GetAdjective], [SCOPE.sCountry('colonial_empire_creditor').GetName] assumiu o(a) [Concept('concept_credit','$concept_credit_debt$')] de [SCOPE.sCountry('colonial_empire_debtor').GetName]."

    je_start_imperial_preference_button:0 "Promulgar Preferência [SCOPE.GetRootScope.GetCountry.GetCustom('imperial_conference_custom_adjective')]"
    je_start_imperial_preference_button_desc:0 "A Preferência [SCOPE.GetRootScope.GetCountry.GetCustom('imperial_conference_custom_adjective')] é um sistema de redução mútua de tarifas promulgado em todo o Império [ROOT.GetCountry.GetAdjective]. O objetivo é aprimorar o comércio interno dentro do Império. \n\nEm termos de jogo, a Preferência [SCOPE.GetRootScope.GetCountry.GetCustom('imperial_conference_custom_adjective')] é representada por [ROOT.GetCountry.GetName] compartilhar um(a) [concept_customs_union] com seus(suas) [concept_dominion]s."

    je_end_imperial_preference_button:0 "Abolir a Preferência [SCOPE.GetRootScope.GetCountry.GetCustom('imperial_conference_custom_adjective')]"
    je_end_imperial_preference_button_desc:0 "A Preferência [SCOPE.GetRootScope.GetCountry.GetCustom('imperial_conference_custom_adjective')] é um sistema de redução mútua de tarifas promulgado em todo o Império [ROOT.GetCountry.GetAdjective]. \n\nEm termos de jogo, a Preferência [SCOPE.GetRootScope.GetCountry.GetCustom('imperial_conference_custom_adjective')] é representada por [ROOT.GetCountry.GetName] compartilhar um(a) [concept_customs_union] com seus(suas) [concept_dominion]s. \n\nAbolir a Preferência [SCOPE.GetRootScope.GetCountry.GetCustom('imperial_conference_custom_adjective')] removerá o(a) [concept_customs_union] que [ROOT.GetCountry.GetName] compartilha com seus(suas) [concept_dominion]s."

