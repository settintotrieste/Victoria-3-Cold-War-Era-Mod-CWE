    remilitarise_war.t:0 "Remilitarização [ROOT.GetCountry.GetAdjectiveNoFlag]?"
    remilitarise_war.d:0 "Como estamos atualmente em [concept_war], talvez seja hora de revogar a [concept_law] $law_peasant_levies$, para que possamos começar a mobilizar divisões para salvar nosso país?"
