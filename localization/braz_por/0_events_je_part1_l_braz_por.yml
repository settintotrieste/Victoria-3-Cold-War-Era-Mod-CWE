    develop_cybersin_decision:0 "Construir uma Rede Cibernética Socialista"
    develop_cybersin_decision_desc:0 "A partir do início dos anos 1960, o Partido Comunista considerou se afastar do planejamento comandado estalinista existente em favor do desenvolvimento de um sistema computadorizado interligado de alocação de recursos, baseado nos princípios da Cibernética. Este desenvolvimento foi visto como a base para avançar rumo a um planejamento ótimo, que poderia formar a base de uma forma mais desenvolvida de economia socialista, baseada na descentralização e inovação informacionais."

    je_develop_cybersin:0 "Construindo Rede Cibernética"
    je_develop_cybersin_reason:0 "O plano é construir uma rede de três níveis, com um centro de computação na capital, até 200 centros de nível médio em outras grandes cidades, e até 20.000 terminais locais em locais economicamente significativos, comunicando-se em tempo real por meio da infraestrutura telefônica existente. A estrutura também permitiria que qualquer terminal se comunicasse com qualquer outro. Esta rede seria então operada pela Administração Central de Estatística. \n\nDica: Aumentar o(a) [Concept('concept_government_wage', '$concept_government_wages$')] aumentará o ganho mensal do progresso do Cybersin."

    je_cybersin_system:0 "Rede Cibernética Socialista"
    je_cybersin_system_reason:0 "O Sistema Automatizado de Todo o Estado, ou OGAS, é uma rede nacional de computadores de acesso remoto em tempo real, construída sobre fios telefônicos preexistentes e novos. Ela se mapeia como um sistema nervoso sobre cada fábrica e empresa na economia planificada. Sua rede é modelada hierarquicamente segundo a estrutura piramidal de três níveis do Estado e da economia: um centro de computação central na capital se conectaria a até 200 centros de computação de nível médio nas principais cidades, que por sua vez se ligariam a até 20.000 terminais de computador distribuídos pelos principais locais de produção da economia nacional."

