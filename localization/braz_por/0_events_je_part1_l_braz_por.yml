    je_piracy_system:0 "Pirataria em Águas [ROOT.GetCountry.GetAdjectiveNoFlag]"
    je_piracy_system_reason:0 "A pirataria e o roubo armado no mar não são relíquias do passado. Essas ameaças modernas continuam a afligir a indústria marítima, colocando em risco a segurança de marítimos e embarcações em todo o mundo. Suas consequências vão muito além do perigo imediato — têm um efeito cascata, impactando empresas de transporte marítimo, perturbando o comércio global e desestabilizando regiões inteiras. \n\nDesvios devido a pontos críticos de pirataria adicionam distâncias significativas às rotas de transporte. Isso se traduz em maior consumo de combustível, tempos de viagem mais longos, e, em última análise, maiores custos de transporte para consumidores e empresas. Além disso, o risco aumentado eleva os prêmios de seguro de navios e cargas. Esse ônus adicional de custos afeta ainda mais as empresas de transporte marítimo e potencialmente é repassado aos consumidores. \n\nPor outro lado, a pirataria perturba o fluxo tranquilo de mercadorias ao redor do mundo. Atrasos ou desvios de carga podem levar a escassez, flutuações de preços e cronogramas de entrega não confiáveis. Isso pode afetar cadeias de suprimentos inteiras e prejudicar a atividade econômica."
