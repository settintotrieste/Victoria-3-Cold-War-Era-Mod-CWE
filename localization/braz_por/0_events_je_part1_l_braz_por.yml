    governor_general_veto.t:0 "Governador-Geral se Opõe ao Projeto de Lei do Governo"
    governor_general_veto.d:0 "O Governador-Geral [SCOPE.sCharacter('ceremonial_governor_general_country').GetFullName] de [ROOT.GetCountry.GetNameNoFormatting], como representante do(a) [SCOPE.GetRootScope.GetCountry.GetCustom('monarch_custom_title')] [SCOPE.sCharacter('ceremonial_head_of_state').GetFullName], manifestou-se contra o projeto de lei do(a) [concept_government] para promulgar o(a) [concept_law] [SCOPE.sLaw('current_law_scope').GetName] no(a) [SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')]. Embora o Governador-Geral não possa negar sanção real a nenhum projeto de lei, a oposição real mostrou-se um revés para a promulgação da lei."
    governor_general_veto.f:0 "Este evento ocorreu porque o(a) #o Governador-Geral#! de [ROOT.GetCountry.GetName] desaprova ou desaprova fortemente a(o) [concept_law] atualmente sendo promulgada(o)."

