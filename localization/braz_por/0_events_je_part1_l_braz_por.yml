    je_plot_against_the_dictator_system:0 "Conspiração contra [SCOPE.sCharacter('targeted_dictator_scope').GetFullName]"
    je_plot_against_the_dictator_system_reason:0 "Uma conspiração de membros seniores do(a) [concept_government] para destituir [SCOPE.sCharacter('targeted_dictator_scope').GetFullName] do cargo foi descoberta.\n\nPara sobreviver a esta conspiração, [SCOPE.sCharacter('targeted_dictator_scope').GetFullName] precisará garantir que a [concept_legitimacy] permaneça acima de 20 e que nenhum(a) [concept_interest_group] no(a) [concept_government] esteja Insatisfeito(a) quando o cronômetro se esgotar."
    je_plot_against_the_dictator_system_1.tt:0 "A posição política de [SCOPE.sCharacter('targeted_dictator_scope').GetFullName] é fortalecida"
