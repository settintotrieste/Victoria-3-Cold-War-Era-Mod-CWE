    concept_OPEC_oil_embargoed:1 "Embargado pela OPEP"
    concept_OPEC_oil_embargoes:0 "Embargos da OPEP"
    concept_OPEC_oil_embargoing:1 "Embargando"
    concept_OPEC_oil_embargo_desc:6 "Um(a) [concept_OPEC_oil_embargo] ocorre quando a OPEP e seus membros concordam coletivamente em não exportar petróleo para um determinado país. No entanto, alguns membros da OPEP podem decidir não se juntar ao embargo se tiverem boas relações com o país embargado. Nota: Um embargo total é iniciado por esta ação diplomática porque o motor do V3 ainda não permite embargos de bens específicos."

    DIPLO_ACTION_CREATE_OPEC_EMBARGO:0 "Aderir ao(à) [concept_OPEC_oil_embargo] contra [SCOPE.sCountry('OPEC_embargo_target').GetName]"
    OPEC_embargo_invitation.t:0 "Embargo de Petróleo da OPEP Contra [SCOPE.sCountry('OPEC_embargo_target').GetName]?"
    OPEC_embargo_invitation.d:0 "O líder da OPEP, [SCOPE.sCountry('OPEC_leader').GetName], aprovou uma resolução exigindo que todos os membros da OPEP parem de exportar petróleo para [SCOPE.sCountry('OPEC_embargo_target').GetName]. Como [ROOT.GetCountry.GetName] é membro da OPEP, podemos optar por aderir ao embargo ou não participar dele."
    OPEC_embargo_invitation.f:0 "[SCOPE.sCountry('OPEC_leader').GetName] iniciou um embargo de petróleo contra [SCOPE.sCountry('OPEC_embargo_target').GetName] porque possuem relações hostis entre si e porque [SCOPE.sCountry('OPEC_leader').GetName] possui relações $relations_amicable$ com todos os outros membros da OPEP, o que lhe deu confiança para fazer tal pedido à OPEP. Nota: Um embargo total é iniciado por esta ação diplomática porque o motor do V3 ainda não permite embargos de bens específicos."
    OPEC_accept_embargo:0 "Aderir ao embargo de petróleo!"
    OPEC_reject_embargo:0 "Não privaremos ninguém de seu precioso petróleo."

    special_administrative_region_system.1.t:0 "A Região Administrativa Especial de [SCOPE.sCountry('SAR_country').GetName]"
    special_administrative_region_system.1.d:0 "[ROOT.GetCountry.GetName] anunciou a formação de uma nova Região Administrativa Especial em [SCOPE.sCountry('SAR_country').GetName]. Isso concede ao povo de [SCOPE.sCountry('SAR_country').GetName] maior autonomia sobre sua política interna, em troca de permanecer subserviente a(o) [ROOT.GetCountry.GetAdjective]. A comunidade internacional recebeu essa notícia com grande aplauso."
    special_administrative_region_system.1.f:0 "A Região Administrativa Especial de [SCOPE.sCountry('SAR_country').GetName], porque a capital do súdito era um(a) homeland de [ROOT.GetCountry.GetName]. Este arranjo impedirá que o território busque a independência por meio do sistema de descolonização, já que [SCOPE.sCountry('SAR_country').GetName] será visto como pertencente de direito a [ROOT.GetCountry.GetName] sob o direito internacional."
    special_administrative_region_system_option:0 "Ótimo!"
    DIPLO_ACTION_CREATE_SAR_SUBJECT_TYPE:0 "Criar a Região Administrativa Especial de [SCOPE.sCountry('SAR_country').GetName]"

    dominion_clean_up_system.1.t:0 "O Estado Satélite [SCOPE.sCountry('dominion_to_satellite_country').GetAdjective]"
    dominion_clean_up_system.1.d:0 "Devido ao nível de controle que [ROOT.GetCountry.GetName] exerce sobre [SCOPE.sCountry('dominion_to_satellite_country').GetName], torna-se cada vez mais claro que este último se tornou um(a) $subject_type_satellite$ do primeiro."
    dominion_clean_up_system.1.f:0 "[SCOPE.sCountry('dominion_to_satellite_country').GetName] foi convertido de $subject_type_dominion$ para $subject_type_satellite$ porque apenas monarquias podem ter $subject_type_dominion$s, e [ROOT.GetCountry.GetName] não é uma monarquia."
