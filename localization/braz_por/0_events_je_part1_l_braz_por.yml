    OECD_member:0 "Membro da OCDE"
    OECD_leader:0 "Líder da OCDE"
    form_OECD_decision:0 "Formar a OCDE"
    form_OECD_decision_desc:0 "A Organização para a Cooperação e Desenvolvimento Econômico é uma organização intergovernamental com 38 países-membros, fundada em 1961 para estimular o progresso econômico e o comércio mundial. É um fórum cujos países-membros se declaram comprometidos com a democracia e a economia de mercado, oferecendo uma plataforma para comparar experiências políticas, buscar respostas para problemas comuns, identificar boas práticas e coordenar as políticas domésticas e internacionais de seus membros."
    join_OECD_decision:0 "Ingressar na OCDE"
    join_OECD_decision_desc:0 "A Organização para a Cooperação e Desenvolvimento Econômico é uma organização intergovernamental com 38 países-membros, fundada em 1961 para estimular o progresso econômico e o comércio mundial. É um fórum cujos países-membros se declaram comprometidos com a democracia e a economia de mercado, oferecendo uma plataforma para comparar experiências políticas, buscar respostas para problemas comuns, identificar boas práticas e coordenar as políticas domésticas e internacionais de seus membros."
