    je_post_ww2_rationing:0 "Racionamento Pós-Segunda Guerra Mundial"
    je_post_ww2_rationing_reason:0 "O racionamento pós-Segunda Guerra Mundial foi um sistema de distribuição controlada de recursos escassos implementado em muitos países para gerenciar a escassez causada pela guerra. Os governos introduziram cadernetas de racionamento, cupons e sistemas de pontos para regular o acesso a alimentos, vestuário, combustível e outros bens essenciais. \n\nNo Reino Unido, o racionamento começou durante a guerra e continuou até 1954, abrangendo itens como carne, açúcar e laticínios. \n\nMedidas semelhantes foram adotadas na Europa continental, no Japão e em outras regiões afetadas pela disrupção da guerra. O racionamento visava garantir uma distribuição equitativa, estabilizar economias e apoiar os esforços de recuperação durante o período de reconstrução pós-guerra."
    post_ww2_rationing_modifier:0 "Racionamento Pós-Segunda Guerra Mundial"

    enforce_parliamentary_regime_system.t:0 "Crise no Ministério [GetPlayer.GetRuler.GetLastName]"
    enforce_parliamentary_regime_system.d:0 "Devido a uma série de remodelações governamentais, o(a) [concept_interest_group] do(a) [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [GetPlayer.GetRuler.GetFullName] se viu inesperadamente fora do(a) [concept_government]. \n\nComo o sistema parlamentar do governo [ROOT.GetCountry.GetAdjective] exige que o(a) [concept_party] ou [concept_interest_group] do(a) [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] também esteja no(a) [concept_government], o(a) [GetPlayer.GetRuler.GetInterestGroup.GetName] deve ser reconvidado(a) ao(à) [concept_government] ou o(a) [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] deve renunciar ao cargo."
    enforce_parliamentary_regime_system.f:0 "Este evento ocorreu porque o(a) [concept_government_type] de [ROOT.GetCountry.GetName] é de natureza #y Parlamentar#!, mas o(a) [concept_interest_group] do(a) [concept_ruler] não está no(a) [concept_government]."

