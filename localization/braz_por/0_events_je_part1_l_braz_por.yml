    je_OPEC_system:0 "A Organização dos Países Exportadores de Petróleo"
    je_OPEC_system_reason:0 "A Organização dos Países Exportadores de Petróleo (OPEP), fundada em 1960, é uma coalizão das principais nações produtoras de petróleo que coordena políticas energéticas para estabilizar os mercados e influenciar os preços globais. Ao administrar os níveis de produção, a OPEP busca garantir retornos justos para os produtores e um fornecimento confiável para os consumidores. \n\nSuas decisões repercutem no comércio internacional, no crescimento industrial e nas relações geopolíticas, tornando-a uma protagonista central na diplomacia de recursos moderna. \n\nA adesão confere às nações poder de barganha coletivo, mas também as vincula a negociações complexas que equilibram interesses nacionais com as demandas energéticas globais, moldando a trajetória das economias dependentes das exportações e importações de petróleo em todo o mundo. \n\nTotal de Membros: [GetGlobalVariable('OPEC_member_count').GetValue]"

    je_OPEC_increase_oil_quota_button:0 "Aumentar as Cotas de Petróleo"
    je_OPEC_increase_oil_quota_button_desc:0 "As cotas de produção de petróleo da OPEP são limites acordados, estabelecidos pela Organização dos Países Exportadores de Petróleo para administrar a oferta global e estabilizar os preços. Como Líder da OPEP, podemos decidir as cotas de produção de petróleo para todos os membros da OPEP."

    je_OPEC_decrease_oil_quota_button:0 "Reduzir as Cotas de Petróleo"
    je_OPEC_decrease_oil_quota_button_desc:0 "As cotas de produção de petróleo da OPEP são limites acordados, estabelecidos pela Organização dos Países Exportadores de Petróleo para administrar a oferta global e estabilizar os preços. Como Líder da OPEP, podemos decidir as cotas de produção de petróleo para todos os membros da OPEP."

    je_OPEC_ignore_oil_quota_button:0 "Ignorar as Cotas de Petróleo"
    je_OPEC_ignore_oil_quota_button_desc:0 "As cotas de produção de petróleo da OPEP são limites acordados, estabelecidos pela Organização dos Países Exportadores de Petróleo para administrar a oferta global e estabilizar os preços. Podemos, no entanto, optar por ignorá-las em prol de nossos interesses nacionais."

    je_OPEC_restore_oil_quota_button:0 "Seguir as Cotas de Petróleo"
    je_OPEC_restore_oil_quota_button_desc:0 "As cotas de produção de petróleo da OPEP são limites acordados, estabelecidos pela Organização dos Países Exportadores de Petróleo para administrar a oferta global e estabilizar os preços. Atualmente, estamos ignorando essas cotas, mas podemos optar por voltar a cumpri-las para agradar nossos colegas membros da OPEP."

    OPEC_quota_timer.tt:0 "Não alterou as Cotas de Produção de Petróleo da OPEP nos últimos 12 meses"
    OPEC_oil_quota_defiance_timer.tt:0 "Não desafiou as Cotas de Produção de Petróleo da OPEP nos últimos 12 meses"

    OPEC_oil_quota.t:0 "Mudança nas Cotas de Petróleo da OPEP"
    OPEC_oil_quota.1.d:0 "O Presidente da Organização dos Países Exportadores de Petróleo, da qual [ROOT.GetCountry.GetName] é membro, anunciou uma mudança na Cota de Produção de Petróleo da OPEP. \n\nA partir de agora, a cota de produção de petróleo será MUITO BAIXA."
    OPEC_oil_quota.2.d:0 "O Presidente da Organização dos Países Exportadores de Petróleo, da qual [ROOT.GetCountry.GetName] é membro, anunciou uma mudança na Cota de Produção de Petróleo da OPEP. \n\nA partir de agora, a cota de produção de petróleo será BAIXA."
    OPEC_oil_quota.3.d:0 "O Presidente da Organização dos Países Exportadores de Petróleo, da qual [ROOT.GetCountry.GetName] é membro, anunciou uma mudança na Cota de Produção de Petróleo da OPEP. \n\nA partir de agora, a cota de produção de petróleo será MÉDIA."
    OPEC_oil_quota.4.d:0 "O Presidente da Organização dos Países Exportadores de Petróleo, da qual [ROOT.GetCountry.GetName] é membro, anunciou uma mudança na Cota de Produção de Petróleo da OPEP. \n\nA partir de agora, a cota de produção de petróleo será ALTA."
    OPEC_oil_quota.5.d:0 "O Presidente da Organização dos Países Exportadores de Petróleo, da qual [ROOT.GetCountry.GetName] é membro, anunciou uma mudança na Cota de Produção de Petróleo da OPEP. \n\nA partir de agora, a cota de produção de petróleo será MUITO ALTA."
    OPEC_oil_quota.f:0 "As Cotas de Produção de Petróleo da OPEP são determinadas pelo(a) Líder da OPEP. \n\nComo [ROOT.GetCountry.GetName] é membro da OPEP, está obrigado por tratado a seguir essas cotas. \n\nPodemos, no entanto, ignorar o tratado e extrair quanto petróleo quisermos, ao custo de alguma infâmia e de más relações com os demais membros da OPEP."
    OPEC_accept_quota:0 "Seguiremos as cotas à risca"
    OPEC_reject_quota:0 "Recusamo-nos a seguir as cotas. Que o petróleo flua livremente!"

