    anti_war_protest_war_exhaustion.t:0 "Protesto Antiguerra em [SCOPE.sState('war_protest_state').GetName]"
    anti_war_protest_war_exhaustion.d:0 "Sentimentos antiguerra desenfreados se enraizaram em [SCOPE.sState('war_protest_state').GetName], levando os Cidadãos [ROOT.GetCountry.GetAdjectiveNoFlag] a realizar uma campanha de desobediência civil contra nosso esforço de guerra. Os militares propuseram que usemos a força para encerrar o protesto e executemos os envolvidos como exemplo para os demais."
    anti_war_protest_war_exhaustion.f:0 "Este evento ocorreu porque [ROOT.GetCountry.GetName] possui menos de 0 de [concept_war_support]."
    anti_war_protest.option:0 "Deixá-los protestar"
    anti_war_protest_crush.option:0 "Esmagar os manifestantes!"
    apply_pm_offense_defense_readjustment_minor_state.tt:0 "Todos os $building_barracks$, $building_naval_base$s, e $building_conscription_center$s em [SCOPE.sState('war_protest_state').GetName] ganham o modificador $pm_offense_defense_readjustment_minor$ por 6 meses"

    anti_war_protest_frenemies.t:0 "Grandes Manifestações Antiguerra"
    anti_war_protest_frenemies.d:0 "Nossos cidadãos estão chocados ao se verem em guerra com um país que compartilha a mesma composição cultural que eles. Como resultado, manifestações em massa eclodiram por todo [ROOT.GetCountry.GetName], exigindo que o Governo interrompa o que consideram ser uma guerra sem sentido contra seus semelhantes."
    anti_war_protest_frenemies.f:0 "Este evento ocorreu porque [ROOT.GetCountry.GetName] está em [concept_war] com um país que possui um(a) [Concept('concept_primary_cultures','$concept_primary_culture$')] que compartilha a mesma Herança ou Traços de um(a) [Concept('concept_primary_cultures','$concept_primary_culture$')] de [ROOT.GetCountry.GetName]."

    anti_war_protest_blame_military.t:0 "Petição Pública para Demitir um Comandante"
    anti_war_protest_blame_military.d:0 "Devido à situação dramática em que [ROOT.GetCountry.GetName] se encontra, o público se voltou contra um líder militar impopular. O público culpa [SCOPE.sCharacter('unpopular_general').GetFullName] por uma série de derrotas recentes e o rotulou de incompetente. Uma petição foi agora apresentada a [ROOT.GetCountry.GetRuler.GetFullName] exigindo que [SCOPE.sCharacter('unpopular_general').GetFullName] seja demitido"
    anti_war_protest_blame_military.f:0 "Este evento ocorreu porque [ROOT.GetCountry.GetName] possui menos de -25 de [concept_war_support], e há um General ou Almirante com menos de 25 de popularidade."
    anti_war_protest_sack_general.option:0 "Demitir [SCOPE.sCharacter('unpopular_general').GetFullName]"
    anti_war_protest_keep_general.option:0 "Deixar [SCOPE.sCharacter('unpopular_general').GetFullName] permanecer"
    sack_unpopular_general.tt:0 "[SCOPE.sCharacter('unpopular_general').GetFullName] é demitido"

    anti_war_protest_sack_army_chief.t:0 "Caos no Alto Comando [ROOT.GetCountry.GetAdjectiveNoFlag]"
    anti_war_protest_sack_army_chief.d:0 "Uma reunião regular entre os Generais das Forças Armadas [ROOT.GetCountry.GetAdjectiveNoFlag] degenerou em tumulto hoje, quando vários Generais, liderados por [SCOPE.sCharacter('opposing_general').GetFullName], culparam o Comandante Supremo [SCOPE.sCharacter('unpopular_army_chief').GetFullName] pela desastrosa sequência de derrotas recentes infligidas a [ROOT.GetCountry.GetName], e exigiram sua renúncia. Esta desordem em larga escala no Alto Comando [ROOT.GetCountry.GetAdjectiveNoFlag] dividiu as Forças Armadas e criará muita agitação entre os oficiais e seus soldados, a menos que [SCOPE.sCharacter('unpopular_army_chief').GetFullName] seja demitido por [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [ROOT.GetCountry.GetRuler.GetFullName]."
    anti_war_protest_sack_army_chief.f:0 "Este evento ocorreu porque [ROOT.GetCountry.GetName] possui menos de -25 de [concept_war_support]."
