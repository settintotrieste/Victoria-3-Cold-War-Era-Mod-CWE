    form_ibero_american_organisation_decision_desc:0 "A Organização dos Estados Ibero-Americanos é uma organização internacional composta por 23 estados-membros de nações iberófonas na Europa e nas Américas, além de um membro na África. A composição da OEI abrange todos os estados soberanos da Ibero-América e da Península Ibérica, além da Guiné Equatorial. Todos os membros são nações de língua portuguesa e espanhola, além de Andorra, predominantemente catalã-falante, embora a organização não inclua todas as nações iberófonas do mundo."
