    je_austrian_unification_button:0 "Reunificar a Áustria"
    je_austrian_unification_button_desc:0 "Iniciar o processo de reunificação austríaca. Esta ação fundirá os estados austríacos divididos em uma única nação, alterando estruturas políticas, arranjos econômicos e relações diplomáticas de acordo com a nova realidade."
