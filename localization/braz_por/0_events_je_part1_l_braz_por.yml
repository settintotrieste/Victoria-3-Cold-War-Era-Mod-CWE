    je_UN_system:0 "As Nações Unidas"
    je_UN_system_reason:0 "As Nações Unidas (ONU) são uma organização intergovernamental cujos propósitos declarados são manter a paz e a segurança internacionais, desenvolver relações amistosas entre as nações, alcançar a cooperação internacional, e servir como um centro para harmonizar as ações das nações. \n\nA ONU possui seis órgãos operacionais principais: a Assembleia Geral, o Conselho de Segurança, o Conselho Econômico e Social, a Corte Internacional de Justiça, o Secretariado da ONU, e o Conselho de Tutela, embora o Conselho de Tutela esteja inativo desde 1994. \n\nO principal funcionário administrativo da ONU é o Secretário-Geral. \n\nTotal de Membros do CSNU: [GetGlobalVariable('UN_unsc_members_counter').GetValue] \n\n$un_headquarters_country_label.tt$ \n\n$unsg_character_label.tt$"
    je_UN_system_status:0 "Total de Membros: [GetGlobalVariable('UN_members_counter').GetValue]"

    change_UN_HQ.t:0 "Sede da ONU Evacuada"
    change_UN_HQ.d:0 "As Nações Unidas decidiram abandonar sua Sede em [SCOPE.sState('un_headquarters_state').GetCityHubName], devido à instabilidade contínua em [ROOT.GetCountry.GetName]. Elas agora buscarão outro país para sediar sua Sede."
