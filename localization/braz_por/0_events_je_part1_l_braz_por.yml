    je_cabinet:0 "O(A) [SCOPE.GetRootScope.GetCountry.GetCustom('cabinet_name_custom_title')] de [ROOT.GetCountry.GetRuler.GetLastName]"
    je_cabinet_reason:0 "$RULING_PARTY_IDEOLOGY_cabinet_JE$ \n\nO(A) [SCOPE.GetRootScope.GetCountry.GetCustom('cabinet_name_custom_title')] é um corpo de conselheiros de um chefe de Estado, que também atuam como chefes de departamentos governamentais. Seus membros são nomeados pelo(a) [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]. \n\nO(A) [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] pode convidar qualquer [concept_interest_group] do(a) [concept_government] para integrar o(a) [SCOPE.GetRootScope.GetCountry.GetCustom('cabinet_name_custom_title')], concedendo a seu líder um Cargo no Gabinete por meio de Interações de Personagem. Todo(a) [concept_interest_group] do(a) [concept_government] que possuir um(a) $cabinet_minister_ig$ passará então a fazer parte do(a) [SCOPE.GetRootScope.GetCountry.GetCustom('cabinet_name_custom_title')]. \n\n#BOLD Unidade do Gabinete:#! #BOLD [SCOPE.GetRootScope.GetCountry.GetCustom('cabinet_unity_level_custom_title')] ([GetPlayer.MakeScope.Var('cabinet_unity_var').GetValue]%)#! \n\nA Unidade do Gabinete é calculada dividindo 100 pelo número de [Concept('concept_interest_group', '$concept_interest_groups$')] do(a) [concept_government] ([GetPlayer.MakeScope.Var('cabinet_unity_divisor_var').GetValue]) que não possuem ao menos #BOLD 0#! de [concept_approval]. $HOG_cabinet$ \n\n#BOLD [Concept('concept_interest_group', '$concept_interest_groups$')] no Gabinete:#! $ig_armed_forces_minister$ $ig_intelligentsia_minister$ $ig_rural_folk_minister$ $ig_landowners_minister$ $ig_trade_unions_minister$ $ig_petty_bourgeoisie_minister$ $ig_industrialists_minister$ \n\n#BOLD Chefe do Serviço Público:#! [SCOPE.gsInterestGroup('ig_intelligentsia_cabinet_scope').GetLeader.GetFullName] \n\n#BOLD Chefe das Forças Armadas:#! [SCOPE.gsInterestGroup('ig_armed_forces_cabinet_scope').GetLeader.GetFullName]"
    je_cabinet_status:0 "Unidade do Gabinete: [GetPlayer.MakeScope.Var('cabinet_unity_var').GetValue]%"
    je_issue_executive_order_button:0 "Emitir uma Ordem Executiva"
    je_issue_executive_order_button_desc:0 "Uma Ordem Executiva nos permitirá contornar a necessidade de ter maioria no(a) [SCOPE.GetRootScope.GetCountry.GetCustom('upper_house_name')] e aumentar a [concept_legitimacy]."

    je_issue_royal_decree_button:0 "Emitir um Decreto Real"
    je_issue_royal_decree_button_desc:0 "O(A) [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [ROOT.GetCountry.GetRuler.GetFullName] pode emitir um Decreto Real, convocando o(a) [concept_government] e a [concept_opposition] a deixarem de lado suas diferenças para formar um governo de unidade. Este ato de intervenção real facilitará a formação de governos com [Concept('concept_interest_group', '$concept_interest_groups$')] ideologicamente divergentes."

    je_call_elections_button:0 "Convocar Eleições"
    je_call_elections_button_desc:0 "Sob o sistema parlamentarista de [ROOT.GetCountry.GetName], o(a) [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] pode dissolver o parlamento a qualquer momento para convocar uma [concept_election]."
    je_enact_state_of_emergency_button:0 "Declarar Estado de Emergência"
    je_enact_state_of_emergency_button_desc:0 "O(A) [concept_government] declarará estado de emergência para poder [Concept('concept_enactment_of_laws','$concept_enactment_of_laws_enact$')] [Concept('concept_law','$concept_laws$')] sem o consentimento do(a) [SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')]."
    je_lift_state_of_emergency_button:0 "Encerrar Estado de Emergência"
    je_lift_state_of_emergency_button_desc:0 "O(A) [concept_government] encerrará o Estado de Emergência em [ROOT.GetCountry.GetName]."

    je_commence_democratic_reform_button:0 "Iniciar Reformas Democráticas"
    je_commence_democratic_reform_button_desc:0 "O(A) [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] em exercício será substituído(a) pelo(a) [SCOPE.GetRootScope.GetCountry.GetCustom('cabinet_name_custom_title')] por um(a) democrático(a), para permitir que o(a) [concept_government] comece a promulgar [Concept('concept_law','$concept_laws$')] mais liberais."

    unconstitutional_state_of_emergency.t:0 "Estado de Emergência Inconstitucional"
    unconstitutional_state_of_emergency.d:0 "O(A) [SCOPE.GetRootScope.GetCountry.GetCustom('supreme_court_name')] decidiu que a promulgação de um Estado de Emergência em [ROOT.GetCountry.GetName] por [ROOT.GetCountry.GetRuler.GetFullName] é ilegal, por ter sido invocada em um momento em que não há uma emergência real no país. A corte, portanto, ordena ao Governo que encerre o Estado de Emergência."
