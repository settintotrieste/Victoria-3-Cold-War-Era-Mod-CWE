    impeached_politician:0 "Sofreu Impeachment pelo Congresso"
    survived_impeachment:0 "Sobreviveu ao Impeachment"
    je_impeachment_system:0 "Impeachment de [SCOPE.sCharacter('impeached_president_scope').GetFullName]"
    je_impeachment_system_reason:0 "Segundo a Constituição de [ROOT.GetCountry.GetName], o Presidente será destituído do cargo mediante Impeachment por, e condenação por, Traição, Suborno, ou outros Crimes graves e Contravenções. Como [SCOPE.sCharacter('impeached_president_scope').GetFullName] cometeu uma ofensa passível de impeachment, artigos de impeachment foram aprovados no Congresso para destituir o Presidente do cargo. A Constituição, no entanto, exige uma votação de dois terços do Senado para condenar antes que o Presidente possa ser destituído do cargo.\n\n[SCOPE.sCharacter('impeached_president_scope').GetFullName] sofrerá impeachment e será destituído(a) do cargo se a [concept_legitimacy] cair abaixo de 34 quando o cronômetro se esgotar."
    je_impeachment_system_1.tt:0 "[SCOPE.sCharacter('impeached_president_scope').GetFullName] sofre impeachment e é destituído(a) do cargo"
    je_impeachment_system_2.tt:0 "[SCOPE.sCharacter('impeached_president_scope').GetFullName] não sofre impeachment e não é destituído(a) do cargo"
    je_impeachment_system_3.tt:0 "[SCOPE.sCharacter('impeached_president_scope').GetFullName] é corrupto(a), traidor(a), ou está tomando o poder ilegalmente."
    je_impeachment_system_4.tt:0 "[SCOPE.sCharacter('impeached_president_scope').GetFullName] não sofreu impeachment recentemente."
    je_impeachment_system_5.tt:0 "[SCOPE.sCharacter('impeached_president_scope').GetFullName] não é mais o(a) Presidente"

    backbenchers_plot_politician:0 "Alvo de uma Conspiração de Parlamentares"
    survived_backbenchers_plot:0 "Sobreviveu a uma Conspiração de Parlamentares"
    party_in_chaos_modifier:0 "Caos Interno"
    je_backbenchers_plot_system:0 "Conspiração de Parlamentares para Destituir [SCOPE.sCharacter('backbenchers_plot_prime_minister_scope').GetFullName]"
    je_backbenchers_plot_system_reason:0 "Sob o sistema parlamentarista de [ROOT.GetCountry.GetName], um(a) [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] só pode permanecer no cargo comandando a confiança do parlamento e do partido ou coalizão governante. Um(a) [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] normalmente obtém seu apoio de parlamentares do mesmo partido ou coalizão governante; no entanto, pode haver momentos em que esses membros busquem destituir o(a) [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')], declarando que não mais o(a) apoiam ou iniciando um desafio interno de liderança partidária.\n\n[SCOPE.sCharacter('backbenchers_plot_prime_minister_scope').GetFullName] é tão odiado(a) por membros poderosos do partido governante que parlamentares de segundo escalão lançaram um desafio de liderança para destituir o(a) [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] do cargo.\n\n@warning! [SCOPE.sCharacter('backbenchers_plot_prime_minister_scope').GetFullName] será destituído(a) do cargo se qualquer [concept_interest_group] no(a) [concept_government] não tiver ao menos aprovação #yellow Neutra#! quando o cronômetro se esgotar."
    je_backbenchers_plot_system_1.tt:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [SCOPE.sCharacter('backbenchers_plot_prime_minister_scope').GetFullName] é destituído(a) do cargo"
    je_backbenchers_plot_system_2.tt:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [SCOPE.sCharacter('backbenchers_plot_prime_minister_scope').GetFullName] não é destituído(a) do cargo"
    je_backbenchers_plot_system_3.tt:0 "[SCOPE.sCharacter('backbenchers_plot_prime_minister_scope').GetFullName] não foi recentemente alvo de uma conspiração de parlamentares"
    je_backbenchers_plot_system_4.tt:0 "[SCOPE.sCharacter('backbenchers_plot_prime_minister_scope').GetFullName] não é mais o(a) [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')]"
    je_backbenchers_plot_system_5.tt:0 "[SCOPE.sCharacter('backbenchers_plot_prime_minister_scope').GetFullName] é corrupto(a), traidor(a), está tomando o poder ilegalmente, ou há ao menos 1 [concept_interest_group] Insatisfeito(a) no(a) [concept_government]"

    lost_confidence_vote_modifier:0 "Perdeu Votação de Confiança"
    survived_vote_of_no_confidence:0 "Sobreviveu a uma Votação de Confiança"
    je_vote_of_no_confidence_system_1.tt:0 "O Governo perde a Votação de Moção de Desconfiança"
    je_vote_of_no_confidence_system_2.tt:0 "O Governo vence a Votação de Moção de Desconfiança"
    je_vote_of_no_confidence_system:0 "Moção de Desconfiança"
    je_vote_of_no_confidence_system_reason:0 "Sob o sistema parlamentarista de [ROOT.GetCountry.GetName], o(a) [concept_government] só pode permanecer no cargo comandando a confiança do parlamento. \n\nComo o atual governo possui menos de 50% das cadeiras no Parlamento [ROOT.GetCountry.GetAdjective], a [concept_opposition] apresentou uma Moção de Desconfiança para derrubar o governo e convocar novas eleições em 100 dias. É, portanto, vital que o governo garanta ter 25 ou mais de [concept_legitimacy] quando o cronômetro se esgotar."

