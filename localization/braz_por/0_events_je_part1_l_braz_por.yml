    paramilitary_group_veto.t:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('paramilitary_group_custom_title')] se Opõe a [SCOPE.sLaw('current_law_scope').GetName]!"
    paramilitary_group_veto.d:0 "O(A) politicamente poderoso(a) [SCOPE.GetRootScope.GetCountry.GetCustom('paramilitary_group_custom_title')], que se alinha ao(à) [concept_interest_group] [SCOPE.gsInterestGroup('paramilitary_group_ig').GetName], criticou fortemente o(a) [concept_government] por tentar promulgar [SCOPE.sLaw('current_law_scope').GetName]. Acreditam que esta [concept_law] não seria do melhor interesse de [ROOT.GetCountry.GetName], e por isso exigem que o Projeto de Lei para promulgar [SCOPE.sLaw('current_law_scope').GetName] seja abandonado, ou poderão tomar ação unilateral contra o Governo."
    paramilitary_group_veto.f:0 "Este evento ocorreu porque o Comandante do(a) [SCOPE.GetRootScope.GetCountry.GetCustom('paramilitary_group_custom_title')], [SCOPE.sCharacter('head_of_paramilitary').GetFullName] ([SCOPE.gsInterestGroup('paramilitary_group_ig').GetName]), #r Desaprova#! ou #r Desaprova Fortemente#! a [concept_law] atualmente sendo promulgada. Também pode ocorrer quando uma lei que desativará o(a) [SCOPE.GetRootScope.GetCountry.GetCustom('paramilitary_group_custom_title')] estiver sendo promulgada."

