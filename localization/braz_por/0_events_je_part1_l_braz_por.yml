    PAP_1958_revolution.t: "Papado do Papa João XXIII?"
    PAP_1958_revolution.d: "O Papa João XXIII foi chefe da Igreja Católica e soberano do Estado da Cidade do Vaticano de 28 de outubro de 1958 até sua morte, em junho de 1963. Seu objetivo geral era modernizar a Igreja, enfatizando seu papel pastoral e seu necessário envolvimento com os assuntos de Estado."
    PAP_1963_revolution.t: "Papado do Papa Paulo VI?"
    PAP_1963_revolution.d: "O Papa Paulo VI foi chefe da Igreja Católica e soberano do Estado da Cidade do Vaticano de 21 de junho de 1963 até sua morte, em 6 de agosto de 1978. Sucedendo João XXIII, deu continuidade ao Concílio Vaticano II, que encerrou em 1965, implementando suas numerosas reformas. Promoveu relações ecumênicas aprimoradas com as igrejas ortodoxas orientais e protestantes, o que resultou em muitos encontros e acordos históricos."
    PAP_1978_revolution.t: "Papado do Papa João Paulo II?"
    PAP_1978_revolution.d: "O Papa João Paulo II foi chefe da Igreja Católica e soberano do Estado da Cidade do Vaticano de 1978 até sua morte, em 2005. É creditado por lutar contra ditaduras em favor da democracia e por ajudar a acabar com o domínio comunista em sua Polônia natal e no restante da Europa. Sob João Paulo II, a Igreja Católica expandiu bastante sua influência na África e na América Latina, e manteve sua influência na Europa e no resto do mundo."
    PAP_2005_revolution.t: "Papado do Papa Bento XVI?"
    PAP_2005_revolution.d: "O Papa Bento XVI foi chefe da Igreja Católica e soberano do Estado da Cidade do Vaticano de 19 de abril de 2005 até sua renúncia, em 28 de fevereiro de 2013. A eleição de Bento como papa ocorreu no conclave papal de 2005, que se seguiu à morte do Papa João Paulo II. Após sua renúncia, Bento optou por ser conhecido como "Papa emérito", título que manteve até sua morte, em 2022."
    PAP_2013_revolution.t: "Papado do Papa Francisco?"
    PAP_2013_revolution.d: "O Papa Francisco foi chefe da Igreja Católica e soberano do Estado da Cidade do Vaticano. É o primeiro papa da Companhia de Jesus (a Ordem Jesuíta), o primeiro das Américas e do Hemisfério Sul, e o primeiro nascido ou criado fora da Europa desde o papa sírio Gregório III, no século VIII."
    PAP_GENERIC_revolution.t: "O Novo Papa"
    PAP_GENERIC_revolution.d: "A Igreja Católica em Roma elegeu um novo Papa após o falecimento do Papa anterior. O novo Papa foi eleito pelo Colégio de Cardeais por meio de um processo chamado conclave, no qual cardeais com menos de 80 anos votam em escrutínio secreto até que um candidato receba uma maioria de dois terços."
    PAP_GENERIC_revolution.f: "Este evento ocorreu porque não há nenhum(a) [concept_character] no mundo que seja Papa."

    controlled_election.t: "A Eleição Legislativa [ROOT.GetCountry.GetAdjectiveNoFormatting]"
    controlled_election.d: "Uma eleição para o(a) #o [SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')]#! foi realizada hoje. Os candidatos precisavam ser indicados pelo único partido governante de [ROOT.GetCountry.GetName], ou por uma organização pública controlada pelo partido governante. Os eleitores podiam votar contra o candidato do Partido Governante, mas só podiam fazê-lo usando cabines de votação, enquanto os votos a favor do partido podiam ser dados simplesmente entregando uma cédula em branco. \n\nResultados: #g [GetPlayer.MakeScope.Var('controlled_elections_vote_result_display').GetValue]%#! aprovam o(a) [concept_government]"
    controlled_election.f: "Como [ROOT.GetCountry.GetName] possui [Concept('concept_non_competitive_election','$concept_non_competitive_elections$')], as [Concept('concept_election','$concept_elections$')] servem principalmente como uma pesquisa de aprovação do(a) [concept_government]. Se o número de [Concept('concept_radical','$concept_radicals$')] exceder o número de [Concept('concept_loyalist','$concept_loyalists$')], a legitimidade do(a) [concept_government] é enfraquecida. \n\nNota: Os efeitos das [Concept('concept_non_competitive_election','$concept_non_competitive_elections$')] são reduzidos de acordo com a seguinte fórmula: Total de [Concept('concept_radical','$concept_radicals$')] ÷ Total de [Concept('concept_loyalist','$concept_loyalists$')] + (Total de [Concept('concept_radical','$concept_radicals$')] × 100)"
    controlled_elections_system_option.1: "Respeitar o voto."
    controlled_elections_system_option.2: "Manipular os resultados!"
    controlled_elections_system_option: "O povo falou!"

