    french_vietnam_state.indy.t:0 "O Estado do Vietnã?"
    french_vietnam_state.indy.d:0 "Em 20 de maio de 1949, a Assembleia Nacional Francesa aprovou a reunificação da Cochinchina com o restante do Vietnã. A decisão entrou em vigor em 4 de junho, e o Estado do Vietnã foi oficialmente proclamado em 2 de julho. De 1949 a 1954, após a reunificação com a Cochinchina, o Estado do Vietnã teve autonomia parcial em relação à França como um Estado associado dentro da União Francesa."
    french_syria.indy.t:0 "Independência da Síria?"
    french_syria.indy.d:0 "Após um período como mandato francês (1923–1946), o Estado recém-criado representou o maior Estado árabe a emergir das antigas províncias sírias sob domínio otomano. Obteve independência de jure como uma república parlamentar democrática em 24 de outubro de 1945, quando a República da Síria se tornou membro fundador das Nações Unidas, ato que encerrou legalmente o antigo mandato francês (embora as tropas francesas só tenham deixado o país em abril de 1946)."
    french_saarland.indy.t:0 "Criar o Protetorado do Sarre?"
    french_saarland.indy.d:0 "Em julho de 1945, dois meses após o fim da Segunda Guerra Mundial na Europa, as forças Aliadas estavam se reposicionando das áreas conquistadas para suas respectivas zonas de ocupação. Em 10 de julho de 1945, as forças americanas deixaram o Sarre, e as tropas francesas estabeleceram sua administração de ocupação. Em 16 de fevereiro de 1946, a França desvinculou o Sarre das zonas de ocupação Aliadas e estabeleceu o Protetorado do Sarre em separado, que de fato deixou de estar sob a jurisdição conjunta Aliada do Conselho de Controle Aliado para a Alemanha."

    french_decolonisation_indy.option.1:0 "Conceder-lhes independência"
    french_decolonisation_indy.option.2:0 "Eles não merecem liberdade"

