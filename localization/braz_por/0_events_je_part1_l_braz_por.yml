    je_join_superstate_free_trade_zone_button:0 "Ingressar no Mercado Comum"
    je_join_superstate_free_trade_zone_button_desc:0 "Um Mercado Comum é geralmente referido como o primeiro estágio rumo à criação de um(a) [concept_customs_union]. Costuma ser construído sobre uma área de livre comércio sem tarifas para bens e movimento relativamente livre de capital, trabalhadores e serviços, mas não tão avançado na redução de outras barreiras comerciais. \n\nIsto é representado no jogo pela criação de um(a) [concept_trade_privilege] e um(a) [concept_treaty] $transit_rights$ entre todos os países que compartilham a mesma Ambição de Superestado e que optaram por ingressar no Mercado Comum do Superestado."

    je_leave_superstate_free_trade_zone_button:0 "Deixar o Mercado Comum"
    je_leave_superstate_free_trade_zone_button_desc:0 "Um Mercado Comum é geralmente referido como o primeiro estágio rumo à criação de um(a) [concept_customs_union]. Costuma ser construído sobre uma área de livre comércio sem tarifas para bens e movimento relativamente livre de capital, trabalhadores e serviços, mas não tão avançado na redução de outras barreiras comerciais. \n\nIsto é representado no jogo pela criação de um(a) [concept_trade_privilege] e um(a) [concept_treaty] $transit_rights$ entre todos os países que compartilham a mesma Ambição de Superestado e que optaram por ingressar no Mercado Comum do Superestado."

    je_join_superstate_customs_union_button:0 "Ingressar no Mercado Único"
    je_join_superstate_customs_union_button_desc:0 "Um Mercado Único é o último estágio e objetivo final de uma economia regional integrada. Requer a total livre circulação de bens, serviços (incluindo serviços financeiros), capital e pessoas, independentemente das fronteiras nacionais. \n\nIsto é representado no jogo pela criação de um(a) [concept_customs_union] entre todos os países que compartilham a mesma Ambição de Superestado e que optaram por ingressar na União Aduaneira do Superestado."

    je_leave_superstate_customs_union_button:0 "Deixar o Mercado Único"
    je_leave_superstate_customs_union_button_desc:0 "Um(a) [concept_customs_union] é o último estágio e objetivo final de um mercado único. Requer a total livre circulação de bens, serviços (incluindo serviços financeiros), capital e pessoas, independentemente das fronteiras nacionais. \n\nIsto é representado no jogo pela criação de um(a) [concept_customs_union] entre todos os países que compartilham a mesma Ambição de Superestado e que optaram por ingressar na União Aduaneira do Superestado."

    je_join_superstate_currency_union_button:0 "Ingressar na União Monetária"
    je_join_superstate_currency_union_button_desc:0 "Podemos criar um(a) [concept_currency_union] composto(a) por outros membros de $custom_loc_superstate_full_title$. \n\nIsto é representado no jogo pela criação de um(a) [concept_currency_union] entre este país e o líder do(a) [concept_market] de nosso país."

    je_leave_superstate_currency_union_button:0 "Deixar a União Monetária"
    je_leave_superstate_currency_union_button_desc:0 "Podemos deixar o(a) [concept_currency_union] composto(a) por outros membros de $custom_loc_superstate_full_title$. \n\nIsto é representado no jogo pela criação de um(a) [concept_currency_union] entre este país e o líder do(a) [concept_market] de nosso país."

    je_join_superstate_defence_union_button:0 "Ingressar na União de Defesa"
    je_join_superstate_defence_union_button_desc:0 "Podemos criar uma União de Defesa Regional composta por outros membros de $custom_loc_superstate_full_title$. \n\nIsto é representado no jogo pela criação de um(a) [concept_defensive_pact] entre todos os países que compartilham a mesma ambição de Superestado e que optaram por ingressar na União de Defesa do Superestado."

    je_leave_superstate_defence_union_button:0 "Deixar a União de Defesa"
    je_leave_superstate_defence_union_button_desc:0 "Podemos deixar a União de Defesa Regional composta por outros membros de $custom_loc_superstate_full_title$. \n\nIsto é representado no jogo pela criação de um(a) [concept_defensive_pact] entre todos os países que compartilham a mesma ambição de Superestado e que optaram por ingressar na União de Defesa do Superestado."

    je_join_superstate_political_union_button:0 "Ingressar na União Política"
    je_join_superstate_political_union_button_desc:0 "Podemos criar uma União Política Regional composta por outros membros de $custom_loc_superstate_full_title$. \n\nIsto é representado no jogo pela harmonização de leis quando a maioria dos Membros do Superestado as tiver promulgado. \n\n@warning! Qualquer [concept_law] que tenha sido promulgada por mais de 50% (ou seja, [GetPlayer.MakeScope.Var('superstate_members_majority').GetValue]) dos Estados-Membros também será auto-promulgada por nós."

    je_superstate_warning_custom_title:0 "\n\n@warning! Como [ROOT.GetCountry.GetName] faz parte da #y União Política [SCOPE.GetRootScope.GetCountry.GetCustom('je_superstate_adjective_custom_title')]#!, o(a) [concept_power_bloc_leader] do(a) #yellow $custom_loc_superstate_full_title$#! pode solicitar que qualquer [concept_power_bloc_member] [Concept('concept_enactment_of_laws', '$concept_enactment_of_laws_enact$')] a(o) [Concept('concept_law', '$concept_laws$')] de sua escolha."

    je_leave_superstate_political_union_button:0 "Deixar a União Política"
    je_leave_superstate_political_union_button_desc:0 "Podemos criar uma União Política Regional composta por outros membros de $custom_loc_superstate_full_title$. \n\nIsto é representado no jogo pela harmonização de leis quando a maioria dos Membros do Superestado as tiver promulgado."

    je_create_superstate_final_union_button:0 "Criar Estado Unido"
    je_create_superstate_final_union_button_desc:0 "Podemos criar um país unido, composto pelos membros de $custom_loc_superstate_full_title$. \n\nIsto é representado no jogo por este país transformar-se em uma tag de País Superestado e formar um(a) [concept_diplomatic_pact] de [concept_confederal_state] com todos os demais Membros do Superestado. Esses membros podem então, posteriormente, escolher se serão anexados pelo Superestado."

    je_join_superstate_final_union_button:0 "Ingressar no Estado Unido"
    je_join_superstate_final_union_button_desc:0 "Podemos ingressar no País Superestado unido, composto pelos membros de $custom_loc_superstate_full_title$. \n\nIsto é representado no jogo por este país ser anexado pela tag de País Superestado."

