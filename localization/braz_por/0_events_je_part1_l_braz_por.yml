    je_un_peacekeeping_system_reason:0 "[SCOPE.sCountry('un_peacekeeping_applicant_scope').GetName] propôs uma resolução na Assembleia Geral das Nações Unidas, exigindo que todos os membros intervenham na Guerra [SCOPE.sCountry('un_peacekeeping_applicant_scope').GetAdjectiveNoFlag]-[SCOPE.sCountry('un_peacekeeping_applicant_enemy_scope').GetAdjectiveNoFlag], exigindo que [SCOPE.sCountry('un_peacekeeping_applicant_enemy_scope').GetName] e todos os seus cobeligerantes cessem imediatamente todas as hostilidades. \n\nRequerente: [SCOPE.sCountry('un_peacekeeping_applicant_scope').GetName] \n\nAlvo: [SCOPE.sCountry('un_peacekeeping_applicant_enemy_scope').GetName] \n\nBalanço de Votos do CSNU: [GetPlayer.MakeScope.Var('unsc_peackeeping_vote_count_var_display').GetValue] / Total de Membros do CSNU: [GetPlayer.MakeScope.Var('unsc_members_count_display').GetValue] \n\nBalanço de Votos da AGNU: [GetPlayer.MakeScope.Var('unga_peackeeping_vote_count_var_display').GetValue] / Total de Membros da AGNU: [GetPlayer.MakeScope.Var('unga_members_count_display').GetValue]"
