    power_vacuum.t:0 "Vácuo de Poder em [ROOT.GetCountry.GetNameNoFlag]"
    power_vacuum.d:0 "O(A) anterior [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] de [ROOT.GetCountry.GetNameNoFlag] era um(a) forte ditador(a) que governava o país como um(a) autocrata inconteste. A morte do(a) ditador(a), no entanto, removeu essa tampa de ferro sobre a dissidência, provocando um vácuo de poder e desestabilizando gravemente o país. Diversas facções agora aproveitam a situação para disputar mais poder, ou até mesmo derrubar o Governo por completo. Levará algum tempo até que [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [ROOT.GetCountry.GetRuler.GetFullName] consiga domar as tribos em guerra e encerrar o atoleiro político."
