    je_secret_police_system_status:0 "Lealdade: [GetPlayer.MakeScope.Var('secret_police_loyalty').GetValue]% (Variação Mensal: [GetPlayer.MakeScope.Var('secret_police_loyalty_monthly').GetValue]%) \nPontos de Operação Secreta Disponíveis: [GetPlayer.MakeScope.Var('secret_police_action_points').GetValue]"
    je_secret_police_system_reason:0 "O(A) [SCOPE.GetRootScope.GetCountry.GetCustom('secret_police_custom_title')] é a Polícia Secreta de [ROOT.GetCountry.GetName]. \n\nA polícia secreta (ou polícia política) são agências de polícia, inteligência ou segurança que conduzem operações secretas contra os opositores e dissidentes políticos, religiosos ou sociais de um governo. Elas protegem o poder político de um ditador ou regime, e frequentemente operam à margem da lei para reprimir dissidentes e enfraquecer a oposição política, muitas vezes usando violência. \n\nPontos de Operação Secreta Disponíveis: [GetPlayer.MakeScope.Var('secret_police_action_points').GetValue] \n\nDiretor de Inteligência: [SCOPE.sCharacter('head_of_intelligence').GetFullName] ([SCOPE.gsInterestGroup('secret_police_IG').GetName]) \n\nLealdade da Agência: [GetPlayer.MakeScope.Var('secret_police_loyalty').GetValue]% \n\nNota: O(A) [SCOPE.GetRootScope.GetCountry.GetCustom('secret_police_custom_title')] agirá contra o(a) [concept_government] se sua Lealdade cair abaixo de 50%. \n\nDica: A Lealdade do(a) [SCOPE.GetRootScope.GetCountry.GetCustom('secret_police_custom_title')] aumentará quando o(a) [concept_approval] do(a) [concept_interest_group] [SCOPE.gsInterestGroup('secret_police_IG').GetName] for positivo(a), e diminuirá quando o(a) [concept_approval] for negativo(a)."

