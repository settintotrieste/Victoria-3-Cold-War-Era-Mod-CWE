    je_colonial_empire:0 "As Conferências [SCOPE.GetRootScope.GetCountry.GetCustom('imperial_conference_custom_adjective')]"
    je_colonial_empire_reason:0 "As Conferências [SCOPE.GetRootScope.GetCountry.GetCustom('imperial_conference_custom_adjective')] são reuniões periódicas de líderes governamentais das colônias autogovernadas e domínios do Império [ROOT.GetCountry.GetAdjectiveNoFlag]. Todas as conferências ocorrem em [ROOT.GetCountry.GetName], a sede do Império. \n\nPodemos usar as conferências para decidir o nível de integração comercial que um(a) [concept_dominion] tem com [ROOT.GetCountry.GetName]. \n\nPodemos também usar as conferências para convocar todas as colônias a nos auxiliar em uma guerra defensiva."
