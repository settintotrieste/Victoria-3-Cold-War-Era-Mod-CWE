    je_armed_forces_system:0 "As Forças Armadas [ROOT.GetCountry.GetAdjectiveNoFlag]"
    je_armed_forces_system_reason:0 "As Forças Armadas [ROOT.GetCountry.GetAdjective] representam o establishment militar de sua nação — oficiais, soldados e as instituições que os sustentam. São um(a) [concept_interest_group] poderoso(a), frequentemente favorecendo ordem, hierarquia e expansão. Sua influência pode garantir estabilidade por meio de uma governança disciplinada, mas uma influência descontrolada arrisca o militarismo e o autoritarismo. \n\nChefe das Forças Armadas: [SCOPE.sCharacter('head_of_armed_forces').GetFullName] \n\nNota: A corrupção nas Forças Armadas pode ser reduzida ao promulgar [Concept('concept_law','$concept_laws$')] mais rigorosas de #y $lawgroup_corruption_policy$#!."

