    western_economic_liberalisation.t:0 "Liberalização Econômica?"
    western_economic_liberalisation.d:0 "O neoliberalismo está associado ao capitalismo de livre mercado após seu declínio subsequente à Segunda Guerra Mundial. Um fator proeminente na ascensão de organizações conservadoras e libertárias de direita, partidos políticos e think tanks, e defendido predominantemente por eles, geralmente se associa a políticas de liberalização econômica, incluindo privatização, desregulamentação, globalização, livre comércio, monetarismo, austeridade, e reduções nos gastos governamentais, a fim de aumentar o papel do setor privado na economia e na sociedade."
    western_economic_liberalisation.f:0 "Este evento aumentará o nível de livre mercado na economia [ROOT.GetCountry.GetAdjectiveNoFlag] em 1 nível."
