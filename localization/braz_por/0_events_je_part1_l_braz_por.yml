    je_generic_decolonisation_system:0 "Secessionismo Colonial"
    je_generic_decolonisation_system_reason:0 "[ROOT.GetCountry.GetName] possui [Concept('concept_unincorporated_state','$concept_unincorporated_states$')] nos quais não possui [concept_homeland]. Embora tais atos de imperialismo costumassem ser aceitos internacionalmente, caíram em desuso após a Segunda Guerra Mundial. Na verdade, a comunidade internacional agora exige que concedamos autodeterminação aos nossos súditos, desmantelando nosso império colonial. E, para piorar as coisas, os nativos que vivem nas colônias [ROOT.GetCountry.GetAdjective] também se tornaram inquietos, com muitos pedindo independência, e alguns até atacando violentamente as autoridades coloniais."

