    reserve_powers_veto.t:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('government_ceremonial_body_custom_title')] Veta o Projeto de Lei"
    reserve_powers_veto.d:0 "O(A) [SCOPE.sCharacter('ceremonial_head_of_state').GetPrimaryRoleTitle] [SCOPE.sCharacter('ceremonial_head_of_state').GetFullName] vetou o projeto de lei no(a) [SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')] para promulgar [SCOPE.sLaw('current_law_scope').GetName]. O Governo, no entanto, pode revogar o veto se tiver uma maioria qualificada no(a) [SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')]."
    reserve_powers_veto.f:0 "Este evento ocorreu porque o(a) [SCOPE.gsInterestGroup('ceremonial_head_of_state_ig').GetName] desaprova ou desaprova fortemente a lei que está atualmente sendo promulgada."
    reserve_powers_system_accept_option:0 "Aceitar o veto e abandonar o projeto de lei."
