    eastern_europe_sovietisation.t:0 "Sovietização de [SCOPE.sCountry('eastern_europe_sovietisation_target').GetName]?"
    eastern_europe_sovietisation.d:0 "Inicialmente, os soviéticos ocultaram seu papel na política de outros países do Bloco Oriental, com a transformação aparentando ser uma modificação da "democracia burguesa" ocidental. Quadros treinados em Moscou foram colocados em posições cruciais de poder para cumprir ordens relativas à transformação sociopolítica. A eliminação do poder social e financeiro da burguesia, por meio da expropriação de propriedades fundiárias e industriais, recebeu prioridade absoluta. Departamentos cruciais, como os responsáveis por pessoal, polícia geral, polícia secreta e juventude, eram estritamente administrados por comunistas. Tais procedimentos foram repetidos até que os comunistas obtivessem poder ilimitado, e apenas restassem políticos que apoiassem incondicionalmente a política soviética."
    eastern_europe_sovietisation.f:0 "Este evento ocorreu porque [SCOPE.sCountry('eastern_europe_sovietisation_target').GetName] está na Esfera de Influência de [SCOPE.sCountry('eastern_europe_sovietisation_initiator').GetName]."
    eastern_europe_sovietisation.option.1:0 "Instalar um Regime Comunista em [SCOPE.sCountry('eastern_europe_sovietisation_target').GetName]!"
    eastern_europe_sovietisation.option.2:0 "Não é necessário."
    eastern_europe_sovietisation_target.option.1:0 "Aceitar a dominação [SCOPE.sCountry('eastern_europe_sovietisation_initiator').GetAdjective]."
    eastern_europe_sovietisation_target.option.2:0 "Seremos livres!"
    Turkish_Straits_Crisis.t:0 "A Crise dos Estreitos Turcos?"
    Turkish_Straits_Crisis.d:0 "A Crise dos Estreitos Turcos foi um conflito territorial da era da Guerra Fria entre a União Soviética e a Turquia. Após o fim da Segunda Guerra Mundial, a Turquia foi pressionada pelo governo soviético a instituir controle militar conjunto sobre a passagem pelos Estreitos Turcos, que conectavam o Mar Negro ao Mediterrâneo. Quando o governo turco se recusou, as tensões na região aumentaram, levando a uma demonstração de força soviética e a exigências de concessões territoriais ao longo da fronteira Geórgia-Turquia."
    Turkish_Straits_Crisis.1.option.1:0 "Exigir concessões turcas!"
    Turkish_Straits_Crisis.1.option.2:0 "Deixar a Turquia em paz."
    Turkish_Straits_Crisis.2.option.1:0 "Recusar as exigências soviéticas!"
    Turkish_Straits_Crisis.2.option.2:0 "Aceitar a dominação soviética!"
    Turkish_Straits_Crisis.3.t:0 "A Turquia Resiste à Pressão Soviética"
    Turkish_Straits_Crisis.3.d:0 "Cedendo à crescente pressão soviética, em questão de dias a Turquia apelou aos Estados Unidos por ajuda. Após consultar sua administração, o Presidente Truman enviou uma força-tarefa naval à Turquia. Em 9 de outubro de 1946, os respectivos governos dos Estados Unidos e do Reino Unido reafirmaram seu apoio à Turquia. Em 26 de outubro, a União Soviética retirou seu pedido específico de uma nova cúpula sobre o controle dos Estreitos Turcos (mas não suas opiniões) e, pouco depois, retirou a maior parte de suas forças militares intimidatórias da região."
    Turkish_Straits_Crisis.3.option.1:0 "Abandonar nossas exigências!"
    Turkish_Straits_Crisis.3.option.2:0 "Hora da guerra!"
    Berlin_Crisis.t:0 "A Crise de Berlim?"
    Berlin_Crisis.d:0 "A Crise de Berlim de 1961 foi o último grande incidente político e militar europeu da Guerra Fria referente ao status da capital alemã, Berlim, e da Alemanha pós-Segunda Guerra Mundial. A crise culminou na partição de facto da cidade, com a construção do Muro de Berlim pela Alemanha Oriental. A Crise de Berlim começou em junho de 1961, quando o Premier soviético Nikita Khrushchov, reunindo-se com o Presidente dos EUA John F. Kennedy na cúpula de Viena, reemitiu um ultimato que exigia a retirada de todas as forças armadas de Berlim, incluindo as forças armadas ocidentais em Berlim Ocidental."
    Berlin_Crisis.1.option.1:0 "Exigir controle sobre Berlim!"
    Berlin_Crisis.1.option.2:0 "Deixar a Alemanha Ocidental em paz."
    Berlin_Crisis.2.option.1:0 "Recusar as exigências soviéticas!"
    Berlin_Crisis.2.option.2:0 "Aceitar a dominação soviética!"
    Berlin_Crisis.3.t:0 "Os Estados Unidos Resistem à Pressão Soviética"
    Berlin_Crisis.3.d:0 "Nenhum acordo foi alcançado, e em agosto de 1961, com o apoio de Khrushchov, o líder da Alemanha Oriental, Walter Ulbricht, ordenou o fechamento da fronteira e a construção de um muro ao redor de Berlim Ocidental. Um breve impasse entre tanques americanos e soviéticos ocorreu no Checkpoint Charlie, em outubro, após uma disputa sobre a livre circulação de pessoal aliado; o confronto terminou pacificamente depois que Khrushchov e Kennedy concordaram em retirar os tanques e reduzir as tensões."
    Berlin_Crisis.3.option.1:0 "Abandonar nossas exigências!"
    Berlin_Crisis.3.option.2:0 "Hora da guerra!"
    Berlin_Ultimatum.t:0 "O Ultimato de Berlim?"
    Berlin_Ultimatum.d:0 "Em novembro de 1958, Khrushchov emitiu às potências ocidentais um ultimato para se retirarem de Berlim dentro de seis meses e transformá-la em uma cidade livre e desmilitarizada. Khrushchov declarou que, ao final desse período, a União Soviética transferiria o controle de todas as linhas de comunicação com Berlim Ocidental para a Alemanha Oriental, o que significava que as potências ocidentais só teriam acesso a Berlim Ocidental quando a Alemanha Oriental o permitisse."
    Berlin_Ultimatum.1.option.1:0 "Exigir controle sobre Berlim!"
    Berlin_Ultimatum.1.option.2:0 "Deixar Berlim em paz."
    Berlin_Ultimatum.2.option.1:0 "Recusar as exigências soviéticas!"
    Berlin_Ultimatum.2.option.2:0 "Aceitar o ultimato soviético!"
    Berlin_Ultimatum.3.t:0 "Os Estados Unidos Resistem à Pressão Soviética"
    Berlin_Ultimatum.3.d:0 "Da perspectiva da OTAN, Berlim Ocidental — profundamente dentro do território comunista — não possuía valor militar. Contudo, era o símbolo preeminente da resistência à tomada soviética da Europa. Eisenhower comentou que Berlim era um "caso em que nossa postura política nos exige assumir posturas militares totalmente ilógicas". O Primeiro-Ministro britânico Harold Macmillan visitou Moscou para discussões prolongadas com Khrushchov em fevereiro de 1959. As reuniões foram majoritariamente cordiais; o ultimato foi abandonado."
    Berlin_Ultimatum.3.option.1:0 "Abandonar nossas exigências!"
    Berlin_Ultimatum.3.option.2:0 "Hora da guerra!"
    Berlin_Blockade.t:0 "O Bloqueio de Berlim?"
    Berlin_Blockade.d:0 "O Bloqueio de Berlim foi uma das primeiras grandes crises internacionais da Guerra Fria. Durante a ocupação multinacional da Alemanha pós-Segunda Guerra Mundial, a União Soviética bloqueou o acesso ferroviário, rodoviário e por canais dos Aliados Ocidentais aos setores de Berlim sob controle ocidental. Os soviéticos ofereceram-se para suspender o bloqueio se os Aliados Ocidentais retirassem o recém-introduzido Marco Alemão de Berlim Ocidental."
    Berlin_Blockade.1.option.1:0 "Exigir controle sobre Berlim!"
    Berlin_Blockade.1.option.2:0 "Deixar Berlim em paz."
    Berlin_Blockade.2.option.1:0 "Recusar as exigências soviéticas!"
    Berlin_Blockade.2.option.2:0 "Aceitar o ultimato soviético!"
    Berlin_Blockade.3.t:0 "Os Estados Unidos Resistem à Pressão Soviética"
    Berlin_Blockade.3.d:0 "Os Aliados Ocidentais organizaram a Ponte Aérea de Berlim, de 26 de junho de 1948 a 30 de setembro de 1949, para levar suprimentos ao povo de Berlim Ocidental, um feito difícil dado o tamanho da cidade e da população. Tendo inicialmente concluído que não havia como a ponte aérea funcionar, os soviéticos consideraram seu contínuo sucesso um constrangimento crescente. Em 12 de maio de 1949, a URSS suspendeu o bloqueio de Berlim Ocidental, devido a problemas econômicos em Berlim Oriental, embora por um tempo americanos e britânicos continuassem a abastecer a cidade por via aérea, temendo que os soviéticos retomassem o bloqueio e estivessem apenas tentando perturbar as linhas de abastecimento ocidentais."
    Berlin_Blockade.3.option.1:0 "Abandonar nossas exigências!"
    Berlin_Blockade.3.option.2:0 "Hora da guerra!"

    renovate_capital_decision:0 "Reconstruir a Capital"
    renovate_capital_decision_desc:0 "Nosso(a) [concept_capital_state] é uma cidade antiga, mas as ruas e edifícios apertados, em estilo medieval, certamente não lhe fazem nenhum favor. A fim de implementar uma rede de transporte moderna e eliminar possíveis problemas sanitários, podemos investir em uma renovação do(a) [concept_capital_state], para torná-lo(a) uma cidade digna de ser a capital de nosso país."

    je_renovate_capital_system:0 "Reconstruindo [ROOT.GetCountry.GetCapital.GetCityHubName]"
    je_renovate_capital_system_reason:0 "O arquiteto pessoal do(a) [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] recebeu a tarefa de transformar [ROOT.GetCountry.GetCapital.GetCityHubName], de a metrópole desordenada que é hoje, em #yellow [ROOT.GetCountry.GetAdjectiveNoFlag]ia#!, a resplandecente nova capital de um Grande 'Império Mundial' [ROOT.GetCountry.GetAdjectiveNoFlag], a peça central do mundo civilizado. Será um empreendimento vasto. \n\nJornais nacionais afirmam que os projetos eram 'verdadeiramente monumentais... superando em muito todas as expectativas', enquanto o(a) próprio(a) [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] proclamou grandiosamente que 'deste deserto de pedra, emergirá a capital de um império milenar'. A imprensa estrangeira, embora menos efusiva, concordou. Um jornal estrangeiro, por exemplo, descreveu o projeto como 'talvez o esquema de planejamento mais ambicioso' da era moderna."
    je_renovate_capital_system_goal:0 "A reconstrução de [ROOT.GetCountry.GetCapital.GetCityHubName] está concluída"

    renovate_capital_dev_cost:0 "Custos de Reconstrução da Capital"
    grand_capital:0 "Cidade da Grandeza"

    foreign_triggered_enactment.t:0 "Interferência [SCOPE.sCountry('manipulator_country').GetAdjectiveNoFlag] na Política [ROOT.GetCountry.GetAdjectiveNoFlag]"
    foreign_triggered_enactment.d:0 "Agentes pertencentes a [SCOPE.sCountry('manipulator_country').GetName] agitaram para que o(a) [concept_government] [ROOT.GetCountry.GetAdjective] promulgue [SCOPE.sLaw('law_to_be_enacted').GetName]. \n\nNão fazê-lo antagonizará o(a) [SCOPE.gsInterestGroup('target_interest_group').GetName], a facção política pró-[SCOPE.sCountry('manipulator_country').GetAdjectiveNoFlag] em [ROOT.GetCountry.GetName]."
    foreign_triggered_enactment.f:0 "Este evento ocorreu porque [SCOPE.sCountry('manipulator_country').GetName] possui o(a) [concept_diplomatic_pact] $conduct_hostile_espionage_8$ contra [ROOT.GetCountry.GetName]."

    foreign_triggered_enactment.option.1:0 "Ceder à influência estrangeira."
    foreign_triggered_enactment.option.2:0 "Devemos resistir à pressão!"

    seikan_tunnel_decision:0 "Construir o Túnel Seikan"
    seikan_tunnel_decision_desc:0 "O Túnel Seikan é um túnel ferroviário de bitola dupla de 53,85 km (33,46 milhas) no Japão, com uma parte de 23,3 km (14,5 milhas) sob o leito marinho do Estreito de Tsugaru, que separa a Prefeitura de Aomori, na principal ilha japonesa de Honshu, da ilha norte de Hokkaido."
    channel_tunnel_decision:0 "Construir o Túnel do Canal"
    channel_tunnel_decision_desc:0 "O Túnel do Canal é um túnel ferroviário submarino de 50,46 quilômetros (31,35 milhas), inaugurado em 1994, que conecta Folkestone (Kent, Inglaterra) a Coquelles (Pas-de-Calais, França), sob o Canal da Mancha, no Estreito de Dover. É a única ligação fixa entre a ilha da Grã-Bretanha e o continente europeu."
    zhuhai_bridge_decision:0 "Construir a Ponte Hong Kong-Zhuhai-Macau"
    zhuhai_bridge_decision_desc:0 "A Ponte Hong Kong-Zhuhai-Macau (HZMB) é um sistema de ponte-túnel de 55 quilômetros (34 milhas), consistindo em uma série de três pontes estaiadas, um túnel submarino e quatro ilhas artificiais. É tanto a mais longa travessia marítima quanto a mais longa ligação fixa em mar aberto do mundo. A HZMB atravessa os canais de Lingding e Jiuzhou, conectando Hong Kong e Macau a Zhuhai — uma importante cidade no Delta do Rio das Pérolas, na China."
    palm_islands_decision:0 "Construir as Ilhas Palm"
    palm_islands_decision_desc:0 "As Ilhas Palm consistem em três arquipélagos artificiais: Palm Jumeirah, Ilhas Deira e Palm Jebel Ali, na costa de Dubai, Emirados Árabes Unidos."

    seikan_tunnel:0 "Túnel Seikan"
    channel_tunnel:0 "Túnel do Canal"
    zhuhai_bridge:0 "Ponte Hong Kong-Zhuhai-Macau"
