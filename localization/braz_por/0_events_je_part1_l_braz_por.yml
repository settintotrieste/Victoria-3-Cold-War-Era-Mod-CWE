    reserve_powers_system_coup_option:0 "Simplesmente ignorar o veto do(a) [SCOPE.sCharacter('ceremonial_head_of_state').GetPrimaryRoleTitle]."

    judiciary_veto.t:0 "Contestação Legal à Promulgação da Lei"
    judiciary_veto.d:0 "Membros líderes do(a) [SCOPE.gsInterestGroup('legal_challenge_plaintiff_scope').GetName] entraram com uma ação judicial no(a) [SCOPE.GetRootScope.GetCountry.GetCustom('supreme_court_name')] para contestar a legalidade do projeto de lei do(a) [concept_government] destinado a promulgar [SCOPE.sLaw('current_law_scope').GetName]. Alegaram que o projeto infringia o direito constitucional de [ROOT.GetCountry.GetName] e deveria ser bloqueado preventivamente pelo(a) [SCOPE.GetRootScope.GetCountry.GetCustom('supreme_court_name')]. Esse argumento convenceu os ministros, que emitiram sumariamente uma ordem a seu favor."
    judiciary_veto.f:0 "Este evento ocorreu porque há um(a) [concept_interest_group] que desaprova ou desaprova fortemente [SCOPE.sLaw('current_law_scope').GetName], e o(a) [SCOPE.GetRootScope.GetCountry.GetCustom('supreme_court_name')] é progressista ou regressivo(a) o suficiente para apoiar a tentativa daquele(a) [concept_interest_group] de travar a lei por meios judiciais."
    judicial_veto_accept_option:0 "Aceitar a decisão do tribunal!"
    judicial_veto_reject_option:0 "Legislaremos para contornar a decisão do tribunal."

    ig_angry_with_government:0 "Grupo de Interesse Provocado"

    je_abolish_filibuster_button:0 "Abolir a Regra de Encerramento de Debate"
    je_abolish_filibuster_button_desc:0 "A tradição do Senado de debate ilimitado permitiu o uso da obstrução parlamentar (filibuster), um termo vagamente definido para ações destinadas a prolongar o debate e atrasar ou impedir uma votação sobre um projeto de lei, resolução, emenda ou outra questão debatível. Isso é possibilitado pela regra de encerramento de debate (cloture), que estipula que três quintos de todos os senadores devidamente eleitos e empossados, ou 60 dos 100 membros do Senado, devem votar para encerrar o debate a fim de que uma lei avance para a fase de promulgação."
    je_fire_council_chairperson_button:0 "Remover [SCOPE.GetRootScope.GetCountry.GetCustom('government_ceremonial_ruler_custom_title')]"
    je_fire_council_chairperson_button_desc:0 "O(A) [concept_government] pode substituir o(a) [SCOPE.GetRootScope.GetCountry.GetCustom('government_ceremonial_ruler_custom_title')] sempre que desejar. Talvez devêssemos fazê-lo agora?"
