    je_nuclear_weapons_info_panel_reason:0 "[ROOT.GetCountry.GetName] está atualmente em uma Corrida Armamentista Nuclear com um país rival. \n\nDevemos, portanto, nos esforçar para garantir que [ROOT.GetCountry.GetName] possua mais poder de ataque nuclear do que todos os países com armas nucleares que possuam relações Ruins ou piores com este país. \n\nPoder de Ataque Nuclear Bruto: [GetPlayer.MakeScope.Var('nuclear_strike_power_display').GetValue] \n\nDefesa Contra Ataque Nuclear: [GetPlayer.MakeScope.Var('nuclear_strike_defence_display').GetValue] \n\nPoder de Ataque Nuclear Bruto do Inimigo: [GetPlayer.MakeScope.Var('nuclear_strike_power_enemy_display').GetValue] \n\nDefesa Contra Ataque Nuclear do Inimigo: [GetPlayer.MakeScope.Var('nuclear_strike_defence_enemy_display').GetValue] \n\nForça Líquida Estimada de Ataque Nuclear: [GetPlayer.MakeScope.Var('nuclear_strike_power_THIS_enemy_ratio').GetValue] \n\nForça Líquida Estimada de Ataque Nuclear do Inimigo: [GetPlayer.MakeScope.Var('nuclear_strike_power_enemy_THIS_ratio').GetValue] \n\nNúmero de Inimigos: [GetPlayer.MakeScope.Var('nuclear_enemy_counter_display').GetValue] \n\nPontuação de Superioridade em Armas Nucleares: [GetPlayer.MakeScope.Var('nuclear_strike_power_ratio').GetValue]"
