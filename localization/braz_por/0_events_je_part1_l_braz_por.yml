    je_wartime_measures_martial_law_button:0 "Impor Lei Marcial"
    je_wartime_measures_martial_law_button_desc:0 "A lei marcial envolve a substituição temporária do governo civil pela autoridade militar, e costuma ser invocada em tempos de guerra, rebelião ou desastre natural. Quando a lei marcial está em vigor, o comandante militar de uma área ou país possui autoridade ilimitada para criar e aplicar leis."
    je_wartime_measures_martial_law_remove_button:0 "Suspender a Lei Marcial"
    je_wartime_measures_martial_law_remove_button_desc:0 "O(A) [concept_government] pode suspender a Lei Marcial a qualquer momento durante uma guerra."
    recently_enacted_martial_law.tt:0 "A Lei Marcial foi imposta por ao menos 3 meses"
    wartime_measures_martial_law:0 "Lei Marcial de Guerra"

    je_wartime_measures_rationing_button:0 "Impor Racionamento"
    je_wartime_measures_rationing_button_desc:0 "O racionamento é a limitação de bens ou serviços que estão em alta demanda e escassa oferta. É frequentemente adotado por governos como forma de mitigar o impacto da escassez e lidar com desafios econômicos."
    je_wartime_measures_rationing_remove_button:0 "Encerrar o Racionamento"
    je_wartime_measures_rationing_remove_button_desc:0 "O(A) [concept_government] pode suspender o regime de racionamento a qualquer momento durante uma guerra."
    recently_enacted_wartime_measures_rationing.tt:0 "O Racionamento foi imposto por ao menos 3 meses"
    wartime_measures_rationing:0 "Racionamento de Guerra"

    je_wartime_measures_propaganda_button:0 "Espalhar Propaganda"
    je_wartime_measures_propaganda_button_desc:0 "A propaganda é uma arma poderosa na guerra, pois pode ser usada para desumanizar e criar ódio em relação a um suposto inimigo, seja interno ou externo, criando uma imagem falsa na mente de soldados e cidadãos.\n\n5 de [concept_war_support] serão adicionados a cada mês em que esta medida de tempo de guerra estiver ativa."
    je_wartime_measures_propaganda_remove_button:0 "Encerrar a Propaganda"
    je_wartime_measures_propaganda_remove_button_desc:0 "O(A) [concept_government] pode parar de espalhar propaganda a qualquer momento durante uma guerra. 5 de [concept_war_support] deixarão de ser adicionados todo mês."
    recently_enacted_wartime_measures_propaganda.tt:0 "A Propaganda foi espalhada por ao menos 3 meses"
    wartime_measures_propaganda:0 "Propaganda de Guerra"

    je_wartime_measures_war_bonds_button:0 "Emitir Títulos de Guerra"
    je_wartime_measures_war_bonds_button_desc:0 "Um título de guerra é um título de dívida emitido por um governo para financiar operações militares em tempos de guerra ou conflito. Como os títulos de guerra ofereciam uma taxa de retorno abaixo da taxa de mercado, o investimento era alcançado por meio de apelos emocionais a cidadãos patriotas, para que emprestassem dinheiro ao governo."
    recently_enacted_wartime_measures_war_bonds.tt:0 "Títulos de Guerra não foram emitidos no último 1 mês"

    je_wartime_measures_total_war_button:0 "Declarar Guerra Total"
    je_wartime_measures_total_war_button_desc:0 "O governo mobilizará todos os setores da sociedade para travar a guerra, e todos os homens fisicamente aptos serão recrutados."
    wartime_measures_total_war:0 "Guerra Total"

    notification_declared_total_war_notification_name:0 "Guerra Total [SCOPE.sCountry('total_war_country').GetAdjective]"
    notification_declared_total_war_notification_desc:0 "O Governo de [SCOPE.sCountry('total_war_country').GetName] declarou guerra total e iniciou uma mobilização em massa de sua população para o serviço militar. Isso permite que as Forças Armadas [SCOPE.sCountry('total_war_country').GetAdjective] coloquem em campo um exército de recrutas muito maior."

    je_wartime_measures_resource_requisition_button:0 "Requisitar Recursos"
    je_wartime_measures_resource_requisition_button_desc:0 "O governo confiscará propriedades privadas para financiar e sustentar o esforço de guerra."
    wartime_measures_resource_requisition:0 "Recursos Requisitados"

