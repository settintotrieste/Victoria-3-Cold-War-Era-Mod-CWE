    gold_standard_leader:0 "Líder do Padrão-Ouro"
    je_bretton_woods_system_leader.1.tt:0 "Um país com $law_gold_standard$ possui [concept_gdp] maior do que [SCOPE.sCountry('bretton_woods_system_leader').GetName]"
    je_bretton_woods_system_leader.2.tt:0 "Nenhum país no mundo possui $law_semi_gold_standard$"
    je_bretton_woods_system_leader.3.tt:0 "Este país possui o maior [concept_gdp] entre todos os países com $law_gold_standard$"
    je_bretton_woods_system_leader:0 "O Sistema de Bretton Woods"
    je_bretton_woods_system_leader_reason:0 "Liderado por [SCOPE.sCountry('bretton_woods_system_leader').GetName], o sistema de Bretton Woods é uma ordem monetária totalmente negociada, destinada a reger as relações monetárias entre Estados independentes. O sistema de Bretton Woods exigia que os países garantissem a convertibilidade de suas moedas em dólares [SCOPE.sCountry('bretton_woods_system_leader').GetAdjectiveNoFlag], dentro de 1% das taxas de paridade fixas, com o dólar conversível em barras de ouro para governos estrangeiros e bancos centrais, a uma quantia fixa por onça troy de ouro fino.\n\nO efeito deste sistema é que o(a) $lawgroup_monetary_policy$ de todos os países com $law_semi_gold_standard$ será o oposto do que [ROOT.GetCountry.GetName] possui."
    je_bretton_woods_system_leader_status:0 "Signatários: [GetPlayer.MakeScope.Var('bretton_woods_total_members').GetValue]"
    je_bretton_woods_system_member.1.tt:0 "Nenhum país no mundo é um(a) $gold_standard_leader$"
    je_bretton_woods_system_member.2.tt:0 "Há um país que é um(a) $gold_standard_leader$"
    je_bretton_woods_system_member.3.tt:0 "Este país é Parceiro Júnior de um(a) [concept_currency_union]"
    je_bretton_woods_system_member.4.tt:0 "Este país não é Parceiro Júnior de um(a) [concept_currency_union]"
    je_bretton_woods_system_member:0 "O Sistema de Bretton Woods"
    je_bretton_woods_system_member_reason:0 "Liderado por [SCOPE.sCountry('bretton_woods_system_leader').GetName], o sistema de Bretton Woods é uma ordem monetária totalmente negociada, destinada a reger as relações monetárias entre Estados independentes. O sistema de Bretton Woods exigia que os países garantissem a convertibilidade de suas moedas em dólares [SCOPE.sCountry('bretton_woods_system_leader').GetAdjectiveNoFlag], dentro de 1% das taxas de paridade fixas, com o dólar conversível em barras de ouro para governos estrangeiros e bancos centrais, a uma quantia fixa por onça troy de ouro fino.\n\nO efeito deste sistema é que o(a) $lawgroup_monetary_policy$ de todos os países com $law_semi_gold_standard$ será o oposto do que [SCOPE.sCountry('bretton_woods_system_leader').GetName] possui."
    je_bretton_woods_system_member_status:0 "Signatários: [GetPlayer.MakeScope.Var('bretton_woods_total_members').GetValue]"

    je_perestroika:0 "Perestroika"
    je_perestroika_reason:0 "O(A) [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [SCOPE.sCharacter('perestroika_ruler').GetFullName], um(a) [concept_ruler] democrático(a), revelou um plano ousado para [ROOT.GetCountry.GetName]: o país será reformado em um(a) $gov_soviet_republic$, onde o planejamento econômico totalmente centralizado será abolido e as restrições políticas serão afrouxadas. Para tanto, [SCOPE.sCharacter('perestroika_ruler').GetFullName] pretende promulgar [Concept('concept_law', '$concept_laws$')] que criarão este novo paraíso dos trabalhadores.\n\nNote que os linha-duras comunistas em [ROOT.GetCountry.GetName] não ficarão satisfeitos com este plano e agitarão para que [SCOPE.sCharacter('perestroika_ruler').GetFullName] seja removido(a)."

    icj_judgement_winner.t:0 "Julgamento Favorável da CIJ"
    icj_judgement_winner.d:0 "A Corte Internacional de Justiça decidiu a favor de [SCOPE.sCountry('icj_judgement_winner').GetName] no caso de arbitragem territorial [SCOPE.sCountry('icj_judgement_winner').GetNameNoFlag] vs. [SCOPE.sCountry('icj_judgement_loser').GetNameNoFlag], e considerou que os(as) [concept_homeland]s disputados(as) em [SCOPE.sCountry('icj_judgement_loser').GetName] pertencem legitimamente, e exclusivamente, a [SCOPE.sCountry('icj_judgement_winner').GetAdjective]. A corte, assim, ordenou que [SCOPE.sCountry('icj_judgement_loser').GetName] os(as) devolva a [SCOPE.sCountry('icj_judgement_winner').GetName]."
    icj_judgement_winner.f:0 "[SCOPE.sCountry('icj_judgement_loser').GetName] não perderá homelands em todos os homelands [SCOPE.sCountry('icj_judgement_winner').GetAdjective] e [SCOPE.sCountry('icj_judgement_loser').GetAdjective] que possui. [SCOPE.sCountry('icj_judgement_loser').GetName] agora terá a opção de escolher se devolve esses estados."
    icj_judgement_winner.option:0 "A justiça foi feita!"

    icj_judgement_loser_target.t:0 "Julgamento Desfavorável da CIJ"
    icj_judgement_loser_target.d:0 "A Corte Internacional de Justiça decidiu a favor de [SCOPE.sCountry('icj_judgement_winner').GetName] no caso de arbitragem territorial [SCOPE.sCountry('icj_judgement_winner').GetNameNoFlag] vs. [SCOPE.sCountry('icj_judgement_loser').GetNameNoFlag], e considerou que os(as) [concept_homeland]s disputados(as) em [SCOPE.sCountry('icj_judgement_loser').GetName] pertencem legitimamente, e exclusivamente, a [SCOPE.sCountry('icj_judgement_winner').GetAdjective]. A corte, assim, ordenou que [SCOPE.sCountry('icj_judgement_loser').GetName] os(as) devolva a [SCOPE.sCountry('icj_judgement_winner').GetName]."
    icj_judgement_loser_target.f:0 "[SCOPE.sCountry('icj_judgement_loser').GetName] não perderá homelands em todos os homelands [SCOPE.sCountry('icj_judgement_winner').GetAdjective] e [SCOPE.sCountry('icj_judgement_loser').GetAdjective] se optar por devolvê-los a [SCOPE.sCountry('icj_judgement_winner').GetName]."
    icj_judgement_loser.option.1:0 "Aceitamos a decisão da corte"
    icj_judgement_loser.option.2:0 "A corte estava errada!"

    icj_judgement_rejection.t:0 "[SCOPE.sCountry('icj_judgement_loser').GetName] Rejeita o Julgamento da CIJ"
    icj_judgement_rejection.d:0 "[SCOPE.sCountry('icj_judgement_loser').GetName] recusou-se a reconhecer a decisão da Corte Internacional de Justiça a favor de [SCOPE.sCountry('icj_judgement_winner').GetName]. Alegam que os juízes foram tendenciosos e errados na aplicação do direito internacional, e, portanto, sua decisão não será reconhecida por [SCOPE.sCountry('icj_judgement_loser').GetName]."
    icj_judgement_rejection.f:0 "[SCOPE.sCountry('icj_judgement_loser').GetName] manterá seus homelands em todos os homelands [SCOPE.sCountry('icj_judgement_winner').GetAdjective] e [SCOPE.sCountry('icj_judgement_loser').GetAdjective] que possui."
    icj_judgement_rejection.option:0 "O direito internacional é uma piada"

    icj_judgement_loser.t:0 "Julgamento Desfavorável da CIJ"
    icj_judgement_loser.d:0 "A Corte Internacional de Justiça decidiu a favor de [SCOPE.sCountry('icj_judgement_winner').GetName] no caso de arbitragem territorial [SCOPE.sCountry('icj_judgement_winner').GetName] vs. [SCOPE.sCountry('icj_judgement_loser').GetName], e considerou que os(as) [concept_homeland]s disputados(as) em [SCOPE.sCountry('icj_judgement_winner').GetName] pertencem legitimamente, e exclusivamente, a [SCOPE.sCountry('icj_judgement_winner').GetAdjective]. A corte, assim, não ordenou mudanças nas fronteiras entre esses dois países."
    icj_judgement_loser.f:0 "[SCOPE.sCountry('icj_judgement_loser').GetName] não perderá homelands em todos os homelands [SCOPE.sCountry('icj_judgement_winner').GetAdjective] e [SCOPE.sCountry('icj_judgement_loser').GetAdjective] que [SCOPE.sCountry('icj_judgement_winner').GetName] possui."

    won_a_war.t:0 "Venceu uma Guerra"
    won_a_war.d:0 "[ROOT.GetCountry.GetName] prevaleceu em uma guerra na qual estava envolvido. O povo [ROOT.GetCountry.GetAdjectiveNoFlag] se regozija e elogia a liderança de [SCOPE.sCharacter('war_ruler_scope').GetFullName] e do General [SCOPE.sCharacter('supreme_commander_scope').GetFullName]!"
    won_a_war.f:0 "Este evento ocorreu porque [ROOT.GetCountry.GetName] impôs um(a) [concept_war_goal] em um(a) [concept_war]."
    won_a_war.option:0 "Excelente!"

    lost_a_war.t:0 "Perdeu uma Guerra"
    lost_a_war.d:0 "[ROOT.GetCountry.GetName] foi derrotado em uma guerra na qual estava envolvido. O povo [ROOT.GetCountry.GetAdjectiveNoFlag] está furioso e culpa a liderança de [SCOPE.sCharacter('war_ruler_scope').GetFullName] e do General [SCOPE.sCharacter('supreme_commander_scope').GetFullName] pela vergonhosa derrota!"
    lost_a_war.f:0 "Este evento ocorreu porque [ROOT.GetCountry.GetName] capitulou em um(a) [concept_war]."
    lost_a_war.option:0 "Assim é a vida."

    inconclusive_war.t:0 "A Guerra Acabou"
    inconclusive_war.d:0 "[ROOT.GetCountry.GetName] derramou muito sangue e recursos em uma guerra na qual esteve envolvido, mas nada obteve pessoalmente com isso. O povo [ROOT.GetCountry.GetAdjectiveNoFlag] está insatisfeito por seu país ter travado uma guerra em benefício de outros, e critica a liderança de [SCOPE.sCharacter('war_ruler_scope').GetFullName] e do General [SCOPE.sCharacter('supreme_commander_scope').GetFullName] por esta guerra sem sentido!"
    inconclusive_war.f:0 "Este evento ocorreu porque [ROOT.GetCountry.GetName] não capitulou nem impôs qualquer [concept_war_goal] pertencente a [ROOT.GetCountry.GetName] em um(a) [concept_war]."
    inconclusive_war.option:0 "Fizemos o nosso melhor..."

