    head_of_state_veto.t:0 "[SCOPE.sCharacter('ceremonial_head_of_state').GetPrimaryRoleTitle] se Opõe ao Projeto de Lei do Governo"
    head_of_state_veto.d:0 "O(A) [SCOPE.sCharacter('ceremonial_head_of_state').GetPrimaryRoleTitle] de [ROOT.GetCountry.GetName] se opõe pessoalmente ao projeto de lei do(a) [concept_government] para promulgar o(a) [concept_law] [SCOPE.sLaw('current_law_scope').GetName] no(a) [SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')]. Embora o(a) [SCOPE.sCharacter('ceremonial_head_of_state').GetPrimaryRoleTitle] não possa negar sanção a nenhum projeto de lei, ainda pode atrasar a promulgação da lei ao retardar deliberadamente o processo."
