    je_cohabitation_system: "Cargo de [SCOPE.GetRootScope.GetCountry.GetCustom('government_prime_minister_custom_title')]"
    je_cohabitation_system_reason: "Sob a Constituição de [ROOT.GetCountry.GetName], as funções executivas do(a) [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] são compartilhadas com o(a) [SCOPE.GetRootScope.GetCountry.GetCustom('government_prime_minister_custom_title')]. Isso significa que o(a) [SCOPE.GetRootScope.GetCountry.GetCustom('government_prime_minister_custom_title')] tem alguma influência na formulação de leis e políticas do país. \n\nQuando o(a) [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] é de uma facção política diferente da maioria dos membros do(a) [SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')], surge um governo dividido, pois o(a) [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] deve nomear um(a) [SCOPE.GetRootScope.GetCountry.GetCustom('government_prime_minister_custom_title')] que seja aceitável à facção majoritária dentro do(a) [SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')]. \n\nO(A) [SCOPE.GetRootScope.GetCountry.GetCustom('government_prime_minister_custom_title')] pode #y Vetar#! a promulgação de qualquer [Concept('concept_law','$concept_laws$')] da(o) qual o(a) [SCOPE.GetRootScope.GetCountry.GetCustom('government_prime_minister_custom_title')] #r Desaprove#!. \n\nAtual [SCOPE.GetRootScope.GetCountry.GetCustom('government_prime_minister_custom_title')]: [SCOPE.sCharacter('cohabitation_pm_scope').GetFullName]"

