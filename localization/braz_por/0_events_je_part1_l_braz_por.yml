    je_judiciary:0 "O(A) [SCOPE.GetRootScope.GetCountry.GetCustom('supreme_court_name')]"
    je_judiciary_reason:0 "O(A) [SCOPE.GetRootScope.GetCountry.GetCustom('supreme_court_name')] é o mais alto tribunal do judiciário de [ROOT.GetCountry.GetName]. Possui jurisdição de apelação final sobre todos os casos judiciais que envolvam uma questão de direito constitucional ou estatutário e, dependendo do nível de autonomia dos Juízes, pode emendar leis unilateralmente. $judge_appointment_process$ \n\nNota: Juízes [concept_progressive_judiciary] apoiarão [Concept('concept_law','$concept_laws$')] mais democráticas na categoria $HUMAN_RIGHTS$ e $POWER_STRUCTURE$."
    je_judiciary_status:0 "[GetPlayer.MakeScope.Var('judiciary_progressiveness').GetValue]% dos Juízes são [concept_progressive_judiciary]"
