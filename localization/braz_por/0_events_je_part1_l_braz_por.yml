    je_the_cold_war_democratic.1.tt:0 "Este país é uma $super_power$ democrática e não há $super_power$ comunista"
    je_the_cold_war_democratic.2.tt:0 "Não há $super_power$ democrática"
    je_the_cold_war_democratic:0 "A Guerra Fria (Bloco Democrático)"
    je_the_cold_war_democratic_reason:0 "A Guerra Fria é um período de tensão geopolítica entre [ROOT.GetCountry.GetName] e [SCOPE.sCountry('communist_rival_superpower').GetName] e seus respectivos aliados, o Bloco Democrático e o Bloco Comunista. [ROOT.GetCountry.GetName] deve se esforçar para vencer esta luta ideológica e geopolítica pela influência global, garantindo que não haja mais nenhuma Superpotência Comunista!"

