    H3N2_1968.t:0 "A Gripe de Hong Kong"
    H3N2_1968.d:0 "A gripe de Hong Kong foi uma pandemia de gripe ocorrida em 1968 e 1969, que matou entre um e quatro milhões de pessoas globalmente. Está entre as pandemias mais mortais da história, e foi causada por uma cepa H3N2 do vírus influenza A. O primeiro caso registrado do surto apareceu em 13 de julho de 1968, em Hong Kong britânico. Especula-se que o surto começou na China continental antes de se espalhar para Hong Kong."
    SARS_2003.t:0 "O Surto de SARS"
    SARS_2003.d:0 "O surto de SARS de 2002–2004, causado pelo coronavírus da síndrome respiratória aguda grave (SARS-CoV ou SARS-CoV-1), infectou mais de 8.000 pessoas em 30 países e territórios, e resultou em pelo menos 774 mortes em todo o mundo. O surto foi identificado pela primeira vez em Foshan, Guangdong, China, em novembro de 2002. A Organização Mundial da Saúde (OMS) foi notificada do surto em fevereiro de 2003, e emitiu um alerta global em março de 2003. A parte principal do surto durou cerca de 8 meses, e a Organização Mundial da Saúde declarou a SARS contida em 5 de julho de 2003."
    H1N1_2009.t:0 "A Pandemia de H1N1"
    H1N1_2009.d:0 "A pandemia de gripe suína de 2009, causada pelo vírus H1N1 e declarada pela Organização Mundial da Saúde (OMS) de junho de 2009 a agosto de 2010, foi a terceira pandemia recente de gripe envolvendo o vírus H1N1. O primeiro caso humano identificado ocorreu em La Gloria, México, uma cidade rural em Veracruz. O vírus parecia ser uma nova cepa de H1N1, resultante de uma tripla reorganização anterior de vírus da gripe aviária, suína e humana, que posteriormente se combinou com um vírus da gripe suína eurasiático."
    COVID_2019.t:0 "A Pandemia de COVID-19"
    COVID_2019.d:0 "A pandemia de COVID-19 é uma pandemia global da doença do coronavírus 2019 (COVID-19), causada pelo coronavírus da síndrome respiratória aguda grave 2 (SARS-CoV-2). O novo vírus foi identificado pela primeira vez em um surto em Wuhan, capital de Hubei, China, em dezembro de 2019, antes de se espalhar para outras áreas da Ásia, e depois para o mundo todo, no início de 2020. A Organização Mundial da Saúde (OMS) declarou o surto uma emergência de saúde pública de importância internacional (ESPII) em 30 de janeiro de 2020, e avaliou que o surto havia se tornado uma pandemia em 11 de março de 2020."

    historical_pandemics.option.1:0 "Ah não!"

    biological_weapons_fallout.t:0 "Pandemia Artificial"
    biological_weapons_fallout.d:0 "Armas biológicas usadas contra [ROOT.GetCountry.GetName] causaram uma epidemia no país. Precisamos desenvolver uma vacina para resolver este problema."
    biological_weapons_fallout.f:0 "Este evento ocorreu porque [ROOT.GetCountry.GetName] foi atingido por armas biológicas."

    biological_weapons_fallout.option:0 "Ah não!"

    end_conscription.t:0 "Abolir o Recrutamento Obrigatório?"
    end_conscription.d:0 "Vários políticos influentes exigiram o fim do recrutamento obrigatório em [ROOT.GetCountry.GetName]. Dizem que já não é necessário, pois é incongruente com os princípios da democracia."

    nuclear_accident_1979.t:0 "O Acidente Nuclear de Three Mile Island"
    nuclear_accident_1979.d:0 "O acidente de Three Mile Island foi uma fusão nuclear do reator da Unidade 2 (TMI-2) da Usina Nuclear de Three Mile Island, no rio Susquehanna, em Londonderry Township, perto de Harrisburg, capital da Pensilvânia, Estados Unidos. O acidente do reator começou às 4h00 de 28 de março de 1979, e liberou gases radioativos e iodo radioativo no meio ambiente."
    nuclear_accident_1986.t:0 "O Desastre Nuclear de Chernobyl"
    nuclear_accident_1986.d:0 "O desastre de Chernobyl começou em 26 de abril de 1986, com a explosão do reator nº 4 da Usina Nuclear de Chernobyl, próxima à cidade de Pripyat, no norte da RSS da Ucrânia, perto da fronteira com a RSS da Bielorrússia, na União Soviética. Após o desastre, Pripyat foi abandonada e eventualmente substituída pela nova cidade de Slavutych, construída especificamente para esse fim."
    nuclear_accident_2011.t:0 "O Acidente Nuclear de Fukushima"
    nuclear_accident_2011.d:0 "O acidente nuclear de Fukushima foi um grande acidente nuclear na usina nuclear de Fukushima Daiichi, em Ōkuma, Fukushima, Japão, que começou em 11 de março de 2011. A causa imediata do acidente foi o terremoto e tsunami de Tōhoku de 2011, que resultou na falha da rede elétrica e danificou quase todas as fontes de energia de backup da usina. A subsequente incapacidade de resfriar suficientemente os reatores após o desligamento comprometeu a contenção e resultou na liberação de contaminantes radioativos no ambiente circundante."

    historical_nuclear_accidents.option.1:0 "Ah não!"

