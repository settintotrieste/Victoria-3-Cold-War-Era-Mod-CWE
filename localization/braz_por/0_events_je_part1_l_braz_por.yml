    je_apartheid:0 "Apartheid em [ROOT.GetCountry.GetNameNoFlag]"
    je_apartheid_reason:0 "O apartheid é um sistema de segregação racial institucionalizada, criado com o propósito de garantir que o país permaneça dominado política, social e economicamente por uma determinada cultura.\n\nAtualmente, operamos um regime de apartheid em [ROOT.GetCountry.GetName], pois promulgamos a [concept_law] $law_ethnostate$, $law_national_supremacy$, ou $law_racial_segregation$. Este sistema de apartheid só será totalmente desmantelado se promulgarmos a [concept_law] $law_multicultural$."

    je_develop_nuclear_weapons:0 "Programa de Armas Nucleares"
    je_develop_nuclear_weapons_reason:0 "[ROOT.GetCountry.GetName] está atualmente tentando criar suas próprias armas nucleares. Esta é uma tarefa monumental, exigindo que cientistas [ROOT.GetCountry.GetAdjective] pesquisem a [concept_technology] $tech_military_nuclear_3$ e que os militares construam ao menos 1 [concept_building] $building_nuclear_weapons_silo$ no país."
    je_develop_nuclear_weapons_1.tt:0 "Há ao menos 1 [concept_building] $building_nuclear_weapons_silo$ no país"
    je_develop_nuclear_weapons_2.tt:0 "Não possui um(a) $pause_nuclear_weapons_development$ com nenhum país"

    je_develop_chemical_weapons:0 "Programa de Armas Químicas"
    je_develop_chemical_weapons_reason:0 "[ROOT.GetCountry.GetName] está atualmente tentando criar suas próprias armas químicas. Isso exige que cientistas [ROOT.GetCountry.GetAdjective] pesquisem a [concept_technology] $tech_military_support_1$ e que os militares construam ao menos 1 [concept_building] $building_industrial_chemicals_factory$ no país."
    je_develop_chemical_weapons_1.tt:0 "Há ao menos 1 [concept_building] $building_industrial_chemicals_factory$ no país"

