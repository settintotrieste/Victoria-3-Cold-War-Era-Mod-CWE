    notification_party_update_notification_name:0 "[SCOPE.gsInterestGroup('IG_expelled_from_party').GetName] se Junta a [SCOPE.sParty('new_IG_party').GetName]"
    notification_party_update_notification_desc:0 "A fim de aumentar suas chances eleitorais, o(a) [SCOPE.gsInterestGroup('IG_expelled_from_party').GetName] deixou suas diferenças de lado e se juntou a [SCOPE.sParty('new_IG_party').GetName] em uma aliança política. \n\nIsso aconteceu porque o(a) atual [GetLawType('law_first_past_the_post').GetGroup.GetName] incentiva os(as) [Concept('concept_party', '$concept_parties$')] a se consolidarem em um sistema bipartidário."

    notification_party_leave_update_notification_name:0 "[SCOPE.gsInterestGroup('IG_expelled_from_party').GetName] Deixa [SCOPE.sParty('party_affected_by_expulsion_IG').GetName]"
    notification_party_leave_update_notification_desc:0 "Citando diferenças irreconciliáveis, o(a) [SCOPE.gsInterestGroup('IG_expelled_from_party').GetName] decidiu deixar [SCOPE.sParty('party_affected_by_expulsion_IG').GetName]. \n\nIsso aconteceu porque a(o) [concept_approval] de [SCOPE.gsInterestGroup('IG_expelled_from_party').GetName] está #r Descontente#!."

    notification_mega_party_leave_update_notification_name:0 "[SCOPE.gsInterestGroup('IG_expelled_from_party').GetName] Deixa [SCOPE.sParty('party_affected_by_expulsion_IG').GetName]"
    notification_mega_party_leave_update_notification_desc:0 "Citando diferenças irreconciliáveis, o(a) [SCOPE.gsInterestGroup('IG_expelled_from_party').GetName] decidiu deixar [SCOPE.sParty('party_affected_by_expulsion_IG').GetName]. \n\nIsso aconteceu porque [SCOPE.sParty('party_affected_by_expulsion_IG').GetName] é um(a) #y Megapartido#! e a(o) [concept_approval] de [SCOPE.gsInterestGroup('IG_expelled_from_party').GetName] não é #r Leal#!."

    notification_no_gov_party_update_notification_name:0 "O(A) [concept_government] Entra em Colapso"
    notification_no_gov_party_update_notification_desc:0 "O(A) [concept_government] entrou em colapso, pois nenhum(a) [concept_interest_group] do(a) [concept_government] possui um(a) [concept_party]. Como consequência, o(a) [SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')] foi dissolvido(a) e uma [concept_election] antecipada será agora realizada."

    ban_party_hopping_decision:0 "Proibir Troca de Partido"
    ban_party_hopping_decision_desc:0 "Esta decisão proíbe representantes eleitos de trocar de partido político após assumir o cargo. Seu objetivo é fortalecer a estabilidade partidária, manter a confiança do eleitorado e reduzir mudanças oportunistas de lealdade. \n\n@information! Esta decisão impedirá que os(as) [Concept('concept_interest_group', '$concept_interest_groups$')] troquem de [concept_party] no meio de uma [concept_election] para fortalecer sua força eleitoral."

    amendment_party_hopping_banned:0 "Troca de Partido Proibida"
    amendment_party_hopping_banned_desc:0 "Representantes eleitos são proibidos de trocar de partido político após assumir o cargo. \n\n@information! Esta decisão impedirá que os(as) [Concept('concept_interest_group', '$concept_interest_groups$')] troquem de [concept_party] no meio de uma [concept_election] para fortalecer sua força eleitoral."

