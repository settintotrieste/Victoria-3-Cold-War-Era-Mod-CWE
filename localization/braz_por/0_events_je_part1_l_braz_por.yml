    concept_progressive_judiciary:0 "Progressista"
    concept_progressive_judiciary_desc:0 "Juízes progressistas são aqueles que acreditam que a Constituição é um documento escrito e, portanto, deve ser interpretada de acordo com as condições sociopolíticas predominantes. Isso, com o tempo, levará a decisões que ampliam as liberdades fundamentais de nossos cidadãos."
    concept_conservative_judiciary:0 "Textualista"
    concept_conservative_judiciary_desc:0 "Juízes textualistas são aqueles que acreditam que a Constituição é um documento escrito e, portanto, não deve ser interpretada de acordo com as condições sociopolíticas predominantes. Isso, com o tempo, levará a decisões que enfraquecem as liberdades fundamentais de nossos cidadãos, já que as Constituições raramente são bem escritas."

    judiciary_progress_generic_desc:0 "Em uma decisão histórica, o(a) [SCOPE.GetRootScope.GetCountry.GetCustom('supreme_court_name')] decidiu que uma lei que restringe as liberdades fundamentais dos cidadãos [ROOT.GetCountry.GetAdjectiveNoFlag] é inconstitucional. Ao justificar sua decisão, o tribunal ressaltou a necessidade de defender e fortalecer o Estado de Direito em [ROOT.GetCountry.GetName]. No entanto, como se trata apenas de uma decisão judicial, o(a) [concept_government] pode aprovar um projeto de lei para revogá-la."
    judiciary_regress_generic_desc:0 "Em uma decisão decisiva, o(a) [SCOPE.GetRootScope.GetCountry.GetCustom('supreme_court_name')] decidiu que uma lei que sustenta as liberdades fundamentais dos cidadãos [ROOT.GetCountry.GetAdjectiveNoFlag] pode ser enfraquecida. Ao justificar sua decisão, o tribunal argumentou que uma redação vaga e possivelmente descuidada na Constituição criou uma brecha na lei que permitiu atividades antes consideradas inadmissíveis. No entanto, como se trata apenas de uma decisão judicial, o(a) [concept_government] pode aprovar um projeto de lei para revogá-la."

