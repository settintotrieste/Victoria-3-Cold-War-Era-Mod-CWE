    british_hong_kong.sgc.t:0 "Autogoverno em Hong Kong?"
    british_hong_kong.sgc.d:0 "Após a Declaração Conjunta Sino-Britânica, o governo de Hong Kong decidiu iniciar o processo de democratização em Hong Kong com base no documento consultivo Livro Verde: o Desenvolvimento Adicional do Governo Representativo em Hong Kong, publicado em 18 de julho de 1984. Havia 12 membros eleitos pelos Colégios Eleitorais e 12 pelos círculos funcionais, quatro membros oficiais, e o restante das cadeiras era nomeado pelo Governador."
    british_WIF_state.indy.t:0 "Ventos de Mudança no Caribe?"
    british_WIF_state.indy.d:0 "Estados Associados das Índias Ocidentais era o nome coletivo para diversas ilhas do Caribe Oriental cujo status mudou de colônias britânicas para Estados em livre associação com o Reino Unido em 1967. Com o tempo, os Estados associados avançaram para a independência plena, sendo Granada a primeira, em 1974. Seguiram-se a Dominica em 1978, Santa Lúcia e São Vicente, ambas em 1979, Antígua e Barbuda em 1981 e São Cristóvão e Névis em 1983."
    british_cyrenaica.sgc.t:0 "Autonomia na Cirenaica?"
    british_cyrenaica.sgc.d:0 "O Emirado da Cirenaica veio à existência quando Sayyid Idris proclamou unilateralmente a Cirenaica como um emirado senusita independente em 1º de março de 1949, apoiado pelo Reino Unido. Sayyid Idris proclamou-se Emir da Cirenaica em uma 'conferência nacional' em Bengasi. O reconhecimento pelo Reino Unido não influenciou a postura das Nações Unidas, e a Grã-Bretanha e a França foram instruídas a preparar a independência da Líbia em uma resolução aprovada em 21 de novembro de 1949."
    british_tuvalu.sgc.t:0 "Autogoverno em Tuvalu?"
    british_tuvalu.sgc.d:0 "$generic_self_rule_decolonisation_loc_desc$"

    british_canada.indy.t:0 "Independência do Canadá?"
    british_canada.indy.d:0 "Em 1981, a Câmara dos Comuns e o Senado canadenses aprovaram uma resolução solicitando que o Parlamento britânico promulgasse um pacote de emendas constitucionais que encerraria os últimos poderes do Parlamento britânico de legislar para o Canadá e criaria um processo inteiramente canadense para emendas constitucionais."
    british_australia.indy.t:0 "Independência da Austrália?"
    british_australia.indy.d:0 "Os Atos da Austrália romperam os laços constitucionais remanescentes entre a Austrália e o Reino Unido, mantendo a monarca em sua capacidade independente como Rainha da Austrália."
    british_new_zealand.indy.t:0 "Independência da Nova Zelândia?"
    british_new_zealand.indy.d:0 "Em 1983, foi emitida uma nova Carta Régia, redigida por um neozelandês e assinada pelo então Primeiro-Ministro da Nova Zelândia. A nova carta régia declarou a Nova Zelândia como o "Reino da Nova Zelândia", revogando a antiga Carta Régia Imperial de 1917. O último vínculo constitucional prático da Nova Zelândia com a Grã-Bretanha foi removido em 1986 pelo Constitution Act 1986 (em vigor a partir de 1º de janeiro de 1987). Esta lei removeu o poder residual do Parlamento do Reino Unido de legislar para a Nova Zelândia mediante solicitação e consentimento desta."
    british_cyprus.indy.t:0 "Independência de Chipre?"
    british_cyprus.indy.d:0 "Chipre obteve independência em 1960, após uma campanha armada liderada pela EOKA. Conforme o Acordo de Zurique e Londres, Chipre alcançou oficialmente a independência em 16 de agosto de 1960, tendo à época uma população total de 573.566 habitantes; dos quais 442.138 (77,1%) eram gregos, 104.320 (18,2%) turcos, e 27.108 (4,7%) outros. O Reino Unido reteve as duas Áreas de Soberania de Acrotíri e Dequélia, enquanto os cargos governamentais e públicos eram distribuídos por cotas étnicas, concedendo à minoria cipriota-turca um veto permanente, 30% no parlamento e na administração, e conferindo aos três Estados-mãe direitos de garantia."
