    concept_upper_house:0 "Câmara Alta"
    concept_upper_house_desc:0 "Uma câmara alta é uma das duas câmaras de um legislativo bicameral, sendo a outra a câmara baixa. A câmara formalmente designada como câmara alta costuma ser menor e frequentemente possui poderes mais restritos do que a câmara baixa."
    concept_lower_house:0 "Câmara Baixa"
    concept_lower_house_desc:0 "Uma câmara baixa é uma das duas câmaras de um legislativo bicameral, sendo a outra a câmara alta. Apesar de sua posição oficial "abaixo" da câmara alta, em muitos legislativos ao redor do mundo, a câmara baixa passou a exercer mais poder ou influência política significativa."

