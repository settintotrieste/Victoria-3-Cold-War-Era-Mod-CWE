    je_one_china_policy_PRC.tt:0 "$DIPLO_ACTION_RELATIONS$ uma Superpotência Democrática estão pelo menos $relations_cordial$"
    je_one_china_policy_PRC:0 "Ingressar nas Nações Unidas"
    je_one_china_policy_PRC_reason:0 "Como legado da Guerra Civil Chinesa, [SCOPE.sCountry('republic_of_china_un_seat').GetName] atualmente representa a 'China' nas Nações Unidas. Isso significa que [SCOPE.sCountry('republic_of_china_un_seat').GetName] goza de reconhecimento internacional, enquanto [ROOT.GetCountry.GetName] não. Tal situação é uma grave injustiça para o povo [ROOT.GetCountry.GetAdjective]. Devemos, portanto, buscar tomar o assento de [SCOPE.sCountry('republic_of_china_un_seat').GetName] nas Nações Unidas."
    je_one_china_policy_ROC.tt:0 "$DIPLO_ACTION_RELATIONS$ uma Superpotência Comunista estão pelo menos $relations_amicable$"
