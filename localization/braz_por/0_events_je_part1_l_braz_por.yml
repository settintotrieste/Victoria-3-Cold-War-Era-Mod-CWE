    italian_somalia.indy.t:0 "Formação do Governo Somali?"
    italian_somalia.indy.d:0 "Em 1956, foi realizada a primeira eleição geral, que a Liga da Juventude Somali venceria decisivamente. Após a vitória, a SYL foi chamada a formar um governo. Abdulahi Issa seria escolhido como o primeiro primeiro-ministro da Somália. Os livros de história somalis registram 1956 como o ano decisivo em que autoridades italianas se interessaram em transferir a governança para a população somali. Até o final daquele ano, todos os distritos e províncias do mandato estavam sob a autoridade direta de administradores somalis."

    italian_somalia.indy.t:0 "Independência da Somália?"
    italian_somalia.indy.d:0 "$generic_independence_decolonisation_loc_desc$"
    italian_SUT.indy.t:0 "A Südtirolfrage"
    italian_SUT.indy.d:0 "A Questão do Tirol do Sul (Südtirolfrage) tornou-se uma questão internacional. O assunto foi resolvido em 1971, quando um novo tratado austro-italiano foi assinado e ratificado. Ele estipulava que disputas no Tirol do Sul seriam submetidas para resolução à Corte Internacional de Justiça em Haia, que a província receberia maior autonomia dentro da Itália, e que a Áustria não interferiria nos assuntos internos do Tirol do Sul. O novo acordo mostrou-se amplamente satisfatório para as partes envolvidas, e as tensões separatistas logo diminuíram. O status autônomo concedido em 1972 resultou em um nível considerável de autogoverno, e também permite que a entidade retenha quase 90% de todos os impostos arrecadados."

    italian_decolonisation_indy.option.1:0 "Conceder-lhes autonomia"
    italian_decolonisation_indy.option.2:0 "Eles não merecem liberdade"

    united_libya.t:0 "Anexação pela Líbia?"
    united_libya.d:0 "A Tripolitânia e a Cirenaica permaneceram sob administração britânica, enquanto os franceses controlavam o Fezã. Em 1944, Idris retornou do exílio no Cairo, mas recusou-se a retomar residência permanente na Cirenaica até a remoção, em 1947, de alguns aspectos do controle estrangeiro. Sob os termos do tratado de paz de 1947 com os Aliados, a Itália, que esperava manter a colônia da Tripolitânia, e a França, que desejava o Fezã, renunciaram a todas as reivindicações sobre a Líbia. Assim, a Líbia permaneceu unida."
    united_arab_republic.t:0 "Formar a República Árabe Unida?"
    united_arab_republic.d:0 "A República Árabe Unida foi um Estado soberano no Oriente Médio de 1958 a 1971. Foi inicialmente uma união política entre o Egito (incluindo a Faixa de Gaza ocupada) e a Síria, de 1958 até a Síria se separar da união após o golpe de Estado sírio de 1961. O Egito continuou a ser conhecido oficialmente como República Árabe Unida até setembro de 1971, quando foi formalmente dissolvida por Anwar Sadat."
    hashemite_arab_federation.t:0 "Formar a Federação Árabe Haxemita?"
    hashemite_arab_federation.d:0 "A Federação Árabe Haxemita foi um país de curta duração formado em 1958 pela união entre o Reino Haxemita do Iraque e o Reino da Jordânia. Embora o nome sugira uma estrutura federal, tratava-se, de fato, de uma confederação."
    RUS_BYE_union.t:0 "O Estado da União da Rússia e Belarus?"
    RUS_BYE_union.d:0 "O Estado da União da Rússia e Belarus é uma união supranacional composta por Belarus e Rússia, com o objetivo declarado de aprofundar a relação entre os dois Estados por meio da integração em política econômica e de defesa. Originalmente, o Estado da União visava criar uma confederação, mas ambos os países atualmente mantêm sua independência."
    SEN_GAM_union.t:0 "A Confederação da Senegâmbia?"
    SEN_GAM_union.d:0 "A Senegâmbia, oficialmente a Confederação da Senegâmbia, foi uma confederação frouxa no final do século XX entre os países da África Ocidental Senegal e sua vizinha Gâmbia, que é quase completamente cercada pelo Senegal."
    KAS_HND_union.t:0 "Acessão de Jammu e Caxemira à Índia?"
    KAS_HND_union.d:0 "Ao assinar um Instrumento de Acessão sob as disposições do Indian Independence Act de 1947, o Maharajá Hari Singh concordou em aceder seu Estado ao Domínio da Índia."
    NET_IDO_union.t:0 "A União Países Baixos-Indonésia?"
    NET_IDO_union.d:0 "A União Países Baixos-Indonésia foi uma relação confederal entre os Países Baixos e a Indonésia que existiu entre 1949 e 1956. Acordada em 1949, foi uma tentativa dos Países Baixos de continuar a vincular sua antiga colônia das Índias Orientais Holandesas (atual Indonésia) aos Países Baixos de forma confederal, ao menos dentro do arcabouço de uma união pessoal, mesmo após a concessão da independência."
    MLT_GBR_union.t:0 "O Referendo de Integração Malta-Grã-Bretanha"
    MLT_GBR_union.d:0 "Um referendo sobre integração com o Reino Unido foi realizado em Malta em 11 e 12 de fevereiro de 1956. As propostas foram aprovadas por 77% dos votantes, com um comparecimento de 59%; o baixo comparecimento deveu-se, em parte, a um boicote do Partido Nacionalista. As propostas nunca foram totalmente implementadas, e o país tornou-se um Reino independente dentro da Commonwealth Britânica, intitulado Estado de Malta, oito anos depois."
    FRA_GBR_union.t:0 "A União Franco-Britânica?"
    FRA_GBR_union.d:0 "Em setembro de 1956, devido a um inimigo comum durante a Crise de Suez, foi criada uma Força-Tarefa Anglo-Francesa. O Primeiro-Ministro francês Guy Mollet propôs uma união entre o Reino Unido e a União Francesa, com Elizabeth II como chefe de Estado e cidadania comum. Como alternativa, Mollet propôs que a França ingressasse na Commonwealth. O Primeiro-Ministro britânico Anthony Eden rejeitou ambas as propostas; a França passou então a integrar o Tratado de Roma, que estabeleceu a Comunidade Econômica Europeia."
    YUG_BUL_union.t:0 "A Federação Balcânica?"
    YUG_BUL_union.d:0 "O acordo de Bled foi assinado em 1º de agosto de 1947 por Georgi Dimitrov e Josip Broz Tito em Bled, RP Eslovênia, RPF Iugoslávia, e abriu caminho para uma futura unificação da Bulgária e da Iugoslávia em uma nova Federação Balcânica. As políticas resultantes do acordo foram revertidas após a ruptura Tito-Stalin em junho de 1948, quando a Bulgária, não desejando ser uma sétima república da Iugoslávia como Tito imaginava, e estando vinculada aos interesses da União Soviética, assumiu uma postura contrária à Iugoslávia. Quando a campanha do Cominform contra a Iugoslávia rompeu a liderança do Partido Comunista Iugoslavo, o governo da Bulgária, em 1º de outubro de 1949, revogou o Tratado de Amizade, Cooperação e Assistência Mútua de Bled com todos os seus acordos."
    LBY_EGY_union.t:0 "A Federação das Repúblicas Árabes?"
    LBY_EGY_union.d:0 "A Federação das Repúblicas Árabes foi uma tentativa malsucedida de Muammar Gaddafi de fundir Líbia, Egito e Síria a fim de criar um Estado árabe unificado. Embora aprovada por referendo em cada país em 1º de setembro de 1971, os três países discordavam quanto aos termos específicos da fusão. A federação durou de 1º de janeiro de 1972 a 19 de novembro de 1977."
    IRQ_SYR_union.t:0 "A União das Repúblicas Árabes?"
    IRQ_SYR_union.d:0 "Em março de 1972, o Iraque baathista propôs ao Egito e à Síria o restabelecimento da República Árabe Unida, que havia fracassado em 1963. A proposta iraquiana foi uma reação imediata à proposta jordaniana de um Reino Árabe Unido, mas colidiu com a já estabelecida Federação das Repúblicas Árabes e fracassou devido a divergências iraquiano-sírias."
    UAR_NYE_union.t:0 "Os Estados Árabes Unidos?"
    UAR_NYE_union.d:0 "A República Árabe Unida foi um Estado soberano formado pela união entre Egito e Síria em 1958. No mesmo ano, o Reino do Iêmen (Iêmen do Norte), que já havia assinado um pacto de defesa com o Egito, uniu-se ao novo Estado em 8 de março de 1958, em uma confederação frouxa chamada Estados Árabes Unidos. Uma razão para essa decisão foi que, por muito tempo, o Iêmen sentira-se ameaçado por seu vizinho ao norte, consideravelmente maior e mais poderoso, a Arábia Saudita, e por isso via a confederação como uma fonte de segurança. Contudo, diferentemente dos países membros da República Árabe Unida, o Iêmen do Norte permaneceu um Estado soberano independente."
    GHA_GUI_union.t:0 "A União dos Estados Africanos?"
    GHA_GUI_union.d:0 "A União dos Estados Africanos, por vezes chamada de União Gana-Guiné-Mali, foi uma organização regional frouxa e de curta duração formada em 1958, unindo as nações da África Ocidental Gana e Guiné como a União dos Estados Africanos Independentes. O Mali aderiu em 1961. Foi dissolvida em 1963."
    HZB_RSK_BOS_union.t:0 "O Acordo de Dayton?"
    HZB_RSK_BOS_union.d:0 "O Acordo de Dayton é o acordo de paz alcançado na Base Aérea de Wright-Patterson, perto de Dayton, Ohio, Estados Unidos, finalizado em 21 de novembro de 1995, e formalmente assinado em Paris, em 14 de dezembro de 1995. Esses acordos puseram fim à Guerra da Bósnia, que durou três anos e meio e fez parte das muito mais amplas Guerras Iugoslavas. As partes beligerantes concordaram com a paz e com um único Estado soberano conhecido como Bósnia e Herzegovina, composto por duas partes: a República Sérvia, majoritariamente povoada por sérvios, e a Federação da Bósnia e Herzegovina, majoritariamente povoada por croatas e bosníacos. "
    IDO_EID_union.t:0 "Dissolução dos Estados Unidos da Indonésia?"
    IDO_EID_union.d:0 "Em março e abril de 1950, todos os constituintes da RIS, exceto Sumatra Oriental e Indonésia Oriental, dissolveram-se na República. De 3 a 5 de maio, uma conferência tripartite entre o Estado da Indonésia Oriental, o Estado de Sumatra Oriental e a República da Indonésia terminou com a decisão de fundir as três entidades em um único Estado unitário. Os Estados Unidos da Indonésia foram oficialmente dissolvidos pelo Presidente Sukarno em 17 de agosto de 1950 – o quinto aniversário de sua proclamação de independência – e substituídos pela República unitária da Indonésia."

    historical_union_formation.option.1:0 "Sim"
    historical_union_formation.option.2:0 "Não, permaneceremos independentes!"

    transfer_territory_libya.t:0 "Transferir o Fezã para a Líbia?"
    transfer_territory_libya.d:0 "A Tripolitânia e a Cirenaica permaneceram sob administração britânica, enquanto os franceses controlavam o Fezã. Em 1944, Idris retornou do exílio no Cairo, mas recusou-se a retomar residência permanente na Cirenaica até a remoção, em 1947, de alguns aspectos do controle estrangeiro. Sob os termos do tratado de paz de 1947 com os Aliados, a Itália, que esperava manter a colônia da Tripolitânia, e a França, que desejava o Fezã, renunciaram a todas as reivindicações sobre a Líbia. Assim, a Líbia permaneceu unida."
    transfer_territory_somalia.t:0 "Transferir a Somália para a Itália?"
    transfer_territory_somalia.d:0 "O Território sob Tutela da Somalilândia foi um Território sob Tutela das Nações Unidas situado na atual Somália. Sua capital era Mogadíscio e foi administrado pela Itália de 1950 a 1960, após a dissolução da antiga Administração Militar Britânica. Obteve independência em 1960."
    transfer_territory_eritrea.t:0 "Transferir a Eritreia para a Etiópia?"
    transfer_territory_eritrea.d:0 "Após a Segunda Guerra Mundial, a Eritreia foi administrada pela Administração Militar Britânica até 1952. Após a decisão da Assembleia Geral da ONU em 1952, a Eritreia se autogovernaria com um parlamento local eritreu, mas, para assuntos externos e defesa, entraria em status federal com a Etiópia por dez anos."
    transfer_territory_tangier.t:0 "Abolir a Zona Internacional de Tânger?"
    transfer_territory_tangier.d:0 "Após o fim do protetorado francês em 2 de março de 1956 e do espanhol em 7 de abril de 1956, o Comitê de Controle da Zona de Tânger reuniu-se em junho de 1956 e propôs um protocolo para um regime temporário, assinado pelo Ministro das Relações Exteriores marroquino Ahmed Balafrej em nome do Sultão Mohammed V, em Rabat, em 5 de julho de 1956. Como consequência, o cargo de Administrador foi abolido e substituído, em 10 de julho de 1956, pelo de governador marroquino ou Amel, imediatamente assumido pelo Mendoub Ahmad at-Tazi. Simultaneamente, a polícia de Tânger foi transferida para a autoridade marroquina."
    transfer_territory_saarland.t:0 "Transferir o Sarre para a Alemanha Ocidental?"
    transfer_territory_saarland.d:0 "Em 1954, a França e a República Federal da Alemanha (Alemanha Ocidental) desenvolveram um plano detalhado chamado Saarstatut (Estatuto do Sarre) para estabelecer um Sarre independente. Foi assinado como acordo entre os dois países em 23 de outubro de 1954, como um dos Pactos de Paris, mas um plebiscito realizado em 23 de outubro de 1955 o rejeitou por 67,7%. Em 27 de outubro de 1956, o Tratado do Sarre declarou que o Sarre deveria ser autorizado a se juntar à Alemanha Ocidental, o que ocorreu em 1º de janeiro de 1957."
    transfer_territory_ruhr.t:0 "Transferir o Ruhr para a Alemanha Ocidental?"
    transfer_territory_ruhr.d:0 "A Autoridade do Ruhr foi estabelecida no comunicado emitido em 7 de junho de 1948, após a Conferência das Seis Potências de Londres, entre os Estados Unidos da América, o Reino Unido, a França e os países do Benelux. Foi abolida após o Tratado de Paris de 1951, e suas atividades foram transferidas para a Comunidade Europeia do Carvão e do Aço (CECA). Um acordo para encerrar a IAR foi assinado em Paris em 19 de outubro de 1951, e o acordo sobre o término das funções da IAR entrou em vigor em 25 de junho de 1952."
    transfer_territory_trieste.t:0 "O Memorando de Londres?"
    transfer_territory_trieste.d:0 "O Território Livre de Trieste foi um território independente no sul da Europa, entre o norte da Itália e a Iugoslávia, voltado para a parte norte do Mar Adriático, sob responsabilidade direta do Conselho de Segurança das Nações Unidas no pós-Segunda Guerra Mundial. O território foi de fato dissolvido em 1954 e entregue à Itália (Zona A) e à Iugoslávia (Zona B). Isso criou uma disputa de fronteira que só foi resolvida vinte anos depois, com a assinatura do Tratado bilateral de Osimo em 1975, ratificado em 1977."
    transfer_territory_port_arthur.t:0 "Transferir Port Arthur para a China?"
    transfer_territory_port_arthur.d:0 "A administração da Base Naval de Lüshun mudou de mãos: da China para a Rússia Imperial (1895-1904), para o Japão imperial (1905–1945), para a União Soviética (1945–56), e depois de volta à China após 1956."
    transfer_territory_panama_canal.t:0 "Transferir o Canal do Panamá para o Panamá?"
    transfer_territory_panama_canal.d:0 "Em 7 de setembro de 1977, o tratado foi assinado pelo Presidente dos Estados Unidos Jimmy Carter e por Omar Torrijos, líder de fato do Panamá. Isso mobilizou o processo de conceder aos panamenhos o controle livre do canal, desde que o Panamá assinasse um tratado garantindo a neutralidade permanente do canal. O tratado levou ao controle panamenho total, com efeito ao meio-dia de 31 de dezembro de 1999, e a Autoridade do Canal do Panamá (ACP) assumiu o comando da via navegável."
    transfer_territory_hong_kong.t:0 "Transferir Hong Kong para a China?"
    transfer_territory_hong_kong.d:0 "A transferência de Hong Kong do Reino Unido para a República Popular da China ocorreu à meia-noite de 1º de julho de 1997. Este evento encerrou 156 anos de domínio britânico na antiga colônia, iniciado em 1841. Hong Kong foi estabelecida como uma região administrativa especial da China (RAE) por 50 anos, mantendo seus próprios sistemas econômico e de governo, distintos dos da China continental, durante esse período."
    transfer_territory_macau.t:0 "Transferir Macau para a China?"
    transfer_territory_macau.d:0 "A transferência de Macau da República Portuguesa para a República Popular da China ocorreu à meia-noite de 20 de dezembro de 1999. Este evento encerrou 442 anos de domínio português no antigo território, iniciado em 1557."
    transfer_territory_west_papua.t:0 "Transferir Papua Ocidental para a Indonésia?"
    transfer_territory_west_papua.d:0 "No final da década de 1940, os territórios das Índias Orientais Holandesas tornaram-se o país independente da Indonésia, exceto a Nova Guiné Ocidental. Os holandeses mantiveram a soberania sobre a Nova Guiné Ocidental (Nova Guiné Holandesa) até o Acordo de Nova York, em 15 de agosto de 1962, que concedeu a região à Indonésia."
    transfer_territory_somaliland.t:0 "Transferir a Somalilândia para a Somália?"
    transfer_territory_somaliland.d:0 "Em 26 de junho de 1960, a Somalilândia Britânica recebeu formalmente independência do Reino Unido como o Estado da Somalilândia. Cinco dias depois, em 1º de julho de 1960, o Estado da Somalilândia uniu-se voluntariamente ao Território sob Tutela da Somália (a antiga Somália Italiana) para formar a República Somali."
    transfer_territory_japanese_okinawa.t:0 "Transferir Okinawa para o Japão?"
    transfer_territory_japanese_okinawa.d:0 "O Acordo de Reversão de Okinawa foi um acordo entre os Estados Unidos e o Japão, no qual os Estados Unidos concordaram em renunciar, em favor do Japão, a todos os direitos e interesses previstos no Artigo III do Tratado de São Francisco, obtidos em decorrência da Guerra do Pacífico, devolvendo assim a Prefeitura de Okinawa à soberania japonesa."
    transfer_territory_south_cameroon.t:0 "Transferir os Camarões do Sul para os Camarões?"
    transfer_territory_south_cameroon.d:0 "Referendos foram realizados em 1959 e 1961 nos Camarões para determinar a união com a Nigéria ou com os Camarões. Em 1961, os Camarões do Norte votaram pela união com a Nigéria, e os Camarões do Sul, pela união com os Camarões (o antigo Camarões francês)."
    transfer_territory_french_india.t:0 "Transferir as Colônias Indianas para a Índia?"
    transfer_territory_french_india.d:0 "Em 18 de outubro de 1954, em uma eleição geral envolvendo 178 pessoas no município de Pondicherry e na Comuna de Panchayat, 170 pessoas foram favoráveis à fusão, e oito votaram contra. A transferência de fato dos territórios indianos franceses do governo francês para a união indiana ocorreu em 1º de novembro de 1954, estabelecendo-se como o território da união de Pondicherry. O tratado que efetivou a transferência de jure foi assinado em 1956."
    transfer_territory_christmas_island.t:0 "Transferir a Ilha Christmas para a Austrália?"
    transfer_territory_christmas_island.d:0 "A pedido da Austrália, o Reino Unido transferiu a soberania para a Austrália, com um pagamento de 20 milhões de dólares do governo australiano a Singapura como compensação pela perda de receita com o fosfato. O Christmas Island Act do Reino Unido recebeu sanção real em 14 de maio de 1958, permitindo que a Grã-Bretanha transferisse a autoridade sobre a Ilha Christmas de Singapura para a Austrália por meio de um decreto do Conselho. O Christmas Island Act da Austrália foi aprovado em setembro de 1958, e a ilha foi oficialmente colocada sob a autoridade da Comunidade Britânica da Austrália em 1º de outubro de 1958."
    transfer_territory_israel_egypt.t:0 "Os Acordos de Camp David?"
    transfer_territory_israel_egypt.d:0 "Os Acordos de Camp David foram um par de acordos políticos assinados pelo Presidente egípcio Anwar Sadat e pelo Primeiro-Ministro israelense Menachem Begin em 17 de setembro de 1978, após doze dias de negociações secretas em Camp David, o refúgio campestre do Presidente dos Estados Unidos em Maryland."
    transfer_territory_israel_palestine.t:0 "O Acordo de Oslo I?"
    transfer_territory_israel_palestine.d:0 "O Acordo de Oslo I, ou Oslo I, oficialmente chamado de Declaração de Princípios sobre Arranjos Provisórios de Autogoverno, ou simplesmente Declaração de Princípios (DOP), foi uma tentativa em 1993 de estabelecer um marco que levaria à resolução do conflito israelo-palestino em curso."
    transfer_territory_crimea.t:0 "A Anexação da Crimeia?"
    transfer_territory_crimea.d:0 "Em fevereiro e março de 2014, a Rússia invadiu a Península da Crimeia, parte da Ucrânia, e em seguida a anexou. Isso ocorreu no relativo vácuo de poder imediatamente após a Revolução da Dignidade."
    transfer_territory_aouzou_strip.t:0 "Transferir a Faixa de Aouzou?"
    transfer_territory_aouzou_strip.d:0 "Por meio da pressão francesa sobre a Líbia e da mediação do Presidente nigerino Hamani Diori, Líbia e Chade retomaram relações diplomáticas em 17 de abril de 1972. Pouco depois, Tombalbaye rompeu relações diplomáticas com Israel e, segundo consta, concordou secretamente, em 28 de novembro, em ceder a Faixa de Aouzou à Líbia. Em troca, Gaddafi prometeu 40 milhões de libras ao Presidente chadiano, e os dois países assinaram um Tratado de Amizade em dezembro de 1972."
    transfer_territory_china_SAR.t:0 "Encerrar Um País, Dois Sistemas?"
    transfer_territory_china_SAR.d:0 "'Um país, dois sistemas' é um princípio constitucional de [ROOT.GetCountry.GetName] que descreve a governança das regiões administrativas especiais de Hong Kong e Macau. Estabelecia que haveria apenas uma China, mas que essas regiões poderiam manter seus próprios sistemas econômicos e administrativos, enquanto o restante da China continental usa um sistema diferente. Segundo o princípio, cada uma das duas regiões poderia continuar a ter seu próprio sistema de governo, assuntos jurídicos, econômicos e financeiros, incluindo relações comerciais com países estrangeiros, todos independentes dos do continente. Chegou a hora de decidirmos se continuaremos com isso em [SCOPE.sCountry('1_country_2_systems_SAR').GetName]."
    transfer_territory_china_SAR.f:0 "Este evento ocorreu porque [SCOPE.sCountry('1_country_2_systems_SAR').GetName] é um(a) $special_administrative_region$ de [ROOT.GetCountry.GetName] há mais de 50 anos."
    transfer_territory_omani_gwadar.t:0 "Venda de Gwadar ao Paquistão?"
    transfer_territory_omani_gwadar.d:0 "Na época da independência do Paquistão, em 1947, Gwadar permaneceu sob autoridade omanense. Ainda assim, o Paquistão começou a demonstrar interesse em Gwadar. Um acordo foi firmado com os esforços do Primeiro-Ministro paquistanês Feroz Khan Noon e de Said bin Taimur, o Sultão de Omã, e o Paquistão conseguiu comprar o território em 8 de setembro de 1958, que passou a fazer parte oficialmente do Paquistão em 8 de dezembro de 1958."
    transfer_territory_portuguese_cabinda.t:0 "Transferência de Cabinda para Angola?"
    transfer_territory_portuguese_cabinda.d:0 "O Acordo de Alvor, assinado em 15 de janeiro de 1975 em Alvor, Portugal, concedeu a Angola a independência de Portugal em 11 de novembro e encerrou formalmente a Guerra de Independência de Angola, que durou 13 anos. O tratado, ao qual a FLEC nunca aderiu, descrevia Cabinda como parte 'integral e inalienável de Angola'."
    transfer_territory_british_bizonia.t:0 "Formar a Bizona na Alemanha?"
    transfer_territory_british_bizonia.d:0 "A Bizona foi a combinação das zonas de ocupação americana e britânica em 1º de janeiro de 1947, durante a ocupação da Alemanha após a Segunda Guerra Mundial."
    transfer_territory_french_trizonia.t:0 "Formar a Trizona na Alemanha?"
    transfer_territory_french_trizonia.d:0 "A governança da Bizona foi estendida para incluir a zona de ocupação francesa em 1º de agosto de 1948, e a estrutura resultante foi extraoficialmente chamada de Trizona ou Trizonésia. As relações entre as quatro potências ocupantes continuaram a se deteriorar, e as estruturas quadripartites tornaram-se inviáveis. Em março de 1948, o Conselho de Controle Aliado deixou de operar e foi substituído, para a Trizona, pela Alta Comissão Aliada."
    transfer_territory_KMT_PRC.t:0 "Fugir para Taiwan?"
    transfer_territory_KMT_PRC.d:0 "A retirada do governo da República da China para Taiwan refere-se ao êxodo dos remanescentes do então internacionalmente reconhecido governo da República da China (ROC), controlado pelo Kuomintang, para a ilha de Taiwan (Formosa), em 7 de dezembro de 1949, após a derrota na Guerra Civil Chinesa na China continental."
    transfer_territory_dutch_east_indonesia.t:0 "A Conferência de Denpasar?"
    transfer_territory_dutch_east_indonesia.d:0 "A Conferência de Denpasar foi realizada de 7 a 24 de dezembro de 1946 no Hotel Bali, em Denpasar, e resultou no estabelecimento do Estado da Indonésia Oriental, parte dos Estados Unidos da Indonésia. Foi nessa conferência que o governo holandês declarou sua posição de que o controle da Nova Guiné Ocidental não seria entregue ao mesmo tempo que o restante das Índias Orientais Holandesas."
    transfer_territory_port_porkkala.t:0 "Devolver a Base Naval de Porkkala?"
    transfer_territory_port_porkkala.d:0 "A Base Naval de Porkkala foi uma base naval soviética operacional de 1944 a 1956, nos municípios de Kirkkonummi, Ingå e Siuntio, na península de Porkkala, 30 quilômetros a oeste de Helsinque, Finlândia. A área foi arrendada à União Soviética de acordo com o Armistício de Moscou, assinado em 1944 pela Finlândia, a União Soviética e o Reino Unido. A área foi devolvida à Finlândia em 1956."
    transfer_territory_port_bornholm.t:0 "Encerrar a Ocupação de Bornholm?"
    transfer_territory_port_bornholm.d:0 "Em 9 de maio, tropas soviéticas desembarcaram na ilha e, após um breve combate, a guarnição alemã (com cerca de 12.000 homens) rendeu-se. As forças soviéticas deixaram a ilha em 5 de abril de 1946."
    transfer_territory_port_dodecanese.t:0 "Transferir as Ilhas do Dodecaneso para a Grécia?"
    transfer_territory_port_dodecanese.d:0 "Após a guerra, as ilhas tornaram-se um protetorado militar britânico e quase imediatamente foram autorizadas a administrar seus próprios assuntos civis, momento em que se uniram informalmente à Grécia, embora sob soberania e controle militar separados. Apesar das objeções da Turquia, que também desejava as ilhas, elas foram formalmente unidas à Grécia pelo Tratado de Paz de 1947 com a Itália."
    transfer_territory_british_newfoundland.t:0 "Confederar a Terra Nova com o Canadá?"
    transfer_territory_british_newfoundland.d:0 "Os referendos da Terra Nova de 1948 foram uma série de dois referendos para decidir o futuro político do Domínio da Terra Nova. Antes dos referendos, a Terra Nova estava endividada e passou por várias delegações para determinar se o país se juntaria ao Canadá ("confederação"), permaneceria sob domínio britânico ou recuperaria a independência. A votação dos referendos ocorreu em 3 de junho e 22 de julho de 1948. O resultado final foi a entrada da Terra Nova na Confederação, o que ocorreu em 31 de março de 1949, tornando-se a décima província do Canadá."
    transfer_territory_british_sarawak.t:0 "Anexar Sarawak?"
    transfer_territory_british_sarawak.d:0 "O Reino de Sarawak foi um Estado independente fundado em 1841, com um tratado de proteção com o Reino Unido a partir de 1888. Em 1888, o Raj adquiriu o status de Estado protegido junto ao Governo britânico, evitando a anexação. A Segunda Guerra Mundial e a chegada das forças japonesas acabaram por pôr fim ao Raj, com o território colocado sob administração militar após a capitulação japonesa em 1945, e anexado pela Grã-Bretanha como sua última aquisição como Colônia da Coroa em 1946, contrariando a Carta do Atlântico."
    transfer_territory_lebanon_ISR.t:0 "Encerrar a Ocupação do Líbano?"
    transfer_territory_lebanon_ISR.d:0 "Antes da eleição israelense de maio de 1999, o primeiro-ministro de Israel, Ehud Barak, prometeu que, dentro de um ano, todas as forças israelenses se retirariam do sul do Líbano, efetivamente encerrando o apoio ao Exército do Sul do Líbano. Quando os esforços de negociação entre Israel e a Síria, cujo objetivo era também trazer um acordo de paz entre Israel e o Líbano, fracassaram devido ao controle sírio sobre o Líbano (até 2005), Barak conduziu à decisão de retirada das FDI para a fronteira israelense."
    transfer_territory_lebanon_SYR.t:0 "Encerrar a Ocupação do Líbano?"
    transfer_territory_lebanon_SYR.d:0 "Após a retirada israelense do sul do Líbano e a morte de Hafez al-Assad em 2000, a presença militar síria enfrentou críticas e resistência da população libanesa. Com a consequente adoção da Resolução 1559 do Conselho de Segurança da ONU e após o assassinato do ex-primeiro-ministro libanês Rafik Hariri e alegações de envolvimento sírio em sua morte, um levante popular apelidado de Revolução dos Cedros varreu o país. Em 5 de março de 2005, o Presidente sírio Bashar Al-Assad anunciou que as forças sírias iniciariam sua retirada do Líbano, em discurso ao parlamento sírio. A Síria concluiu sua retirada total do Líbano em 30 de abril de 2005."
    transfer_territory_SAF_NMB.t:0 "Devolver a Baía de Walvis à Namíbia?"
    transfer_territory_SAF_NMB.d:0 "Em 1990, a África do Sudoeste obteve independência como Namíbia, mas a Baía de Walvis permaneceu sob soberania sul-africana. Em agosto de 1993, antes do fim do apartheid, o Fórum de Negociação Multipartidário na África do Sul aprovou uma resolução pedindo a incorporação-reintegração da Baía de Walvis e das Ilhas Offshore à Namíbia. O Transfer of Walvis Bay to Namibia Act foi aprovado pelo Parlamento da África do Sul naquele ano. Após a assinatura de um tratado entre os dois países, a África do Sul transferiu formalmente a soberania da Baía de Walvis e das Ilhas Pinguim para a Namíbia em 1º de março de 1994."

    transfer_territory_spanish_morocco.t:0 "Retrocessão do Rife Espanhol ao Marrocos?"
    transfer_territory_spanish_morocco.d:0 "Em 1956, quando a França encerrou seu protetorado sobre o Marrocos, a Espanha também encerrou o protetorado e retrocedeu o território ao recém-independente reino, mantendo as plazas de soberanía que já faziam parte da Espanha antes do período colonial, o Cabo Juby, Ifni e outras colônias (como o Saara Espanhol) fora do Marrocos."
    transfer_territory_bahrain.t:0 "A Questão do Barein?"
    transfer_territory_bahrain.d:0 "A Pesquisa de Independência do Barein de 1970 ocorreu entre 28 de março e 11 de maio de 1970. Em 28 de março, o Secretário-Geral da ONU nomeou Vittorio Winspeare-Guicciardi para consultar os bareinitas sobre seu futuro. Até 11 de maio, o Conselho de Segurança da ONU endossou sua conclusão de que a esmagadora maioria apoiava a independência plena. A pesquisa foi motivada pela decisão da Grã-Bretanha, em 1968, de se retirar do Golfo Pérsico até o fim de 1971, deixando o futuro do Barein incerto. O Irã havia reavivado sua reivindicação sobre o Barein, mas a consulta conduzida pela ONU resolveu a disputa ao confirmar a preferência do povo pela independência."
    transfer_territory_gaza.t:0 "O Futuro da Faixa de Gaza"
    transfer_territory_gaza.d:0 "Um cessar-fogo provisório começou em meados de janeiro de 2025, durando dois meses. Em agosto, Israel iniciou uma ofensiva sobre a Cidade de Gaza. Até 9 de outubro de 2025, Israel e o Hamas concordaram com a primeira parte de um plano de paz liderado pelos Estados Unidos. A Resolução 2803 do Conselho de Segurança das Nações Unidas, adotada em 17 de novembro de 2025, contém disposições para a governança transitória da Faixa de Gaza."
    transfer_territory_DPR.t:0 "A Anexação Russa de [ROOT.GetCountry.GetNameNoFormatting]?"
    transfer_territory_DPR.d:0 "Em 30 de setembro de 2022, a Rússia, em meio a uma invasão em curso da Ucrânia, declarou unilateralmente a anexação de áreas dentro e ao redor de quatro oblasts ucranianos — Donetsk, Kherson, Luhansk e Zaporíjia. A maior parte do Oblast de Luhansk e parte do Oblast de Donetsk já eram controladas por separatistas pró-russos desde 2014, enquanto os Oblasts de Kherson e Zaporíjia foram invadidos pela Rússia em 2022. Os limites das áreas a serem anexadas e suas fronteiras não foram definidos; autoridades russas declararam que seriam definidos posteriormente."
    end_berlin_occupation.t:0 "Encerrar a Ocupação de Berlim?"
    end_berlin_occupation.d:0 "Berlim Ocidental permaneceu sob ocupação militar até 3 de outubro de 1990, dia da unificação da Alemanha Oriental, de Berlim Oriental e Ocidental com a República Federal da Alemanha. O Governo Federal da Alemanha Ocidental, assim como os governos da maioria das nações ocidentais, considerava Berlim Oriental uma "entidade separada" da Alemanha Oriental, e embora os Aliados Ocidentais tenham posteriormente aberto embaixadas em Berlim Oriental, reconheciam a cidade apenas como sede do governo da RDA, não como sua capital."
    transfer_territory_british_ogaden.t:0 "Encerrar a Ocupação Britânica de Ogaden?"
    transfer_territory_british_ogaden.d:0 "Entre 1941 e 1955, a Grã-Bretanha administrou Ogaden e Haud após a Campanha da África Oriental. A Grã-Bretanha buscava uma Grande Somália, ignorando as exigências de Haile Selassie por territórios etíopes e pela Eritreia. Sob pressão dos EUA, a Grã-Bretanha abandonou esse plano, cedendo Ogaden em 1948 e Haud em 1955, provocando resistência e insurgências somalis."
    transfer_territory_british_iran.t:0 "Encerrar a Ocupação Britânica do Irã?"
    transfer_territory_british_iran.d:0 "A invasão anglo-soviética do Irã foi a invasão conjunta do oficialmente neutro Estado Imperial do Irã pelo Reino Unido e pela União Soviética em agosto de 1941. As duas potências anunciaram que permaneceriam até seis meses após o fim da guerra contra seu inimigo comum, a Alemanha Nazista, o que veio a ser em 2 de março de 1946."
    transfer_territory_soviet_iran.t:0 "Encerrar a Ocupação Soviética do Irã?"
    transfer_territory_soviet_iran.d:0 "Os Estados Unidos exerceram intensa pressão sobre a União Soviética, em etapas, para forçar a retirada do Exército Vermelho do Irã e reduzir a influência soviética. Após um protesto oficial dos EUA, o Conselho de Segurança das Nações Unidas aprovou a Resolução 2, em 30 de janeiro de 1946. Em 24 de março, Stalin ordenou a retirada das tropas soviéticas do Irã até 30 de abril de 1946. As tropas soviéticas deixaram o país a partir de 6 de maio."
    transfer_territory_west_papua_1969.t:0 "O Ato de Livre Escolha?"
    transfer_territory_west_papua_1969.d:0 "O Ato de Livre Escolha foi um plebiscito controverso realizado entre 14 de julho e 2 de agosto de 1969, no qual 1.025 pessoas selecionadas pelos militares indonésios na Nova Guiné Ocidental votaram unanimemente a favor do controle indonésio. O evento é por vezes referido de forma pejorativa como o "Ato de Nenhuma Escolha", devido ao seu processo controverso."
    transfer_territory_soviet_manchuria.t:0 "Retirada Soviética da Manchúria?"
    transfer_territory_soviet_manchuria.d:0 "A ocupação soviética da Manchúria ocorreu após o Exército Vermelho invadir o Estado fantoche japonês de Manchukuo em agosto de 1945; a ocupação continuaria até a retirada das forças soviéticas em maio de 1946."
    transfer_territory_KMT_PRC_1.t:0 "A Queda de Nanquim?"
    transfer_territory_KMT_PRC_1.d:0 "Após perder Nanquim em abril de 1949, o Kuomintang (KMT) recuou para o sul através de várias capitais provisórias — Cantão, Chongqing e Chengdu."
    transfer_territory_british_chagos_islands.t:0 "A Base Naval EUA-Reino Unido em Diego Garcia?"
    transfer_territory_british_chagos_islands.d:0 "Em 30 de dezembro de 1966, os Estados Unidos e o Reino Unido firmaram um acordo por meio de uma Troca de Notas, que permitia aos Estados Unidos usar o BIOT para fins de defesa por 50 anos, até dezembro de 2016, seguido de uma extensão de 20 anos (até 2036), desde que nenhuma das partes desse aviso de rescisão em uma janela de dois anos (dezembro de 2014 – dezembro de 2016), podendo o Reino Unido decidir sobre quais termos adicionais estender o acordo. Nenhum pagamento monetário foi feito dos Estados Unidos ao Reino Unido como parte deste acordo ou de qualquer emenda subsequente."

    historical_territorial_transfers.option.1:0 "Transferir os territórios"
    historical_territorial_transfers.option.2:0 "Esses territórios permanecerão nossos!"

    historical_territorial_annexation.option.1:0 "Anexar o território!"
    historical_territorial_annexation.option.2:0 "Não precisamos de mais terras"

    malaysia_singapore.t:0 "Independência de Singapura?"
    malaysia_singapore.d:0 "O Parlamento da Malásia votou 126 a 0, com todos os deputados de Singapura boicotando a votação, a favor da expulsão em 9 de agosto de 1965. Naquele dia, um emocionado Lee Kuan Yew anunciou em uma coletiva de imprensa televisionada que Singapura era uma nação soberana e independente."
    CAF_rhodesia.t:0 "Dissolver a Federação da Rodésia e Niassalândia?"
    CAF_rhodesia.d:0 "A federação foi oficialmente encerrada em 31 de dezembro de 1963. Em 1964, logo após a dissolução, a Rodésia do Norte e a Niassalândia tornaram-se independentes sob os nomes de Zâmbia e Malaui, respectivamente. Em novembro de 1965, a Rodésia do Sul declarou unilateralmente independência do Reino Unido como o Estado da Rodésia."
    uar_syria.t:0 "Independência da Síria?"
    uar_syria.d:0 "Em vez de uma federação de dois povos árabes, como muitos sírios haviam imaginado, a RAU transformou-se em um Estado completamente dominado pelos egípcios. A vida política síria também foi diminuída, já que Nasser exigiu que todos os partidos políticos na Síria fossem dissolvidos. Nesse processo, o fortemente centralizado Estado egípcio impôs o sistema político e econômico socialista de Nasser à mais fraca Síria, gerando uma reação contrária dos círculos empresariais e militares sírios, o que resultou no golpe sírio de 28 de setembro de 1961 e no fim da RAU."
    west_indies_dissolution.t:0 "Dissolver a Federação das Índias Ocidentais?"
    west_indies_dissolution.d:0 "A Federação das Índias Ocidentais foi legalmente dissolvida pelo West Indies Act de 1962 do Parlamento do Reino Unido. As províncias remanescentes, conhecidas como "Little Eight", tornaram-se novamente colônias separadas, supervisionadas diretamente de Londres, a maioria das quais se tornou independente posteriormente."
    NET_IDO.t:0 "Dissolver a União Países Baixos-Indonésia?"
    NET_IDO.d:0 "A União Países Baixos-Indonésia foi uma relação confederal entre os Países Baixos e a Indonésia que existiu entre 1949 e 1956. Em um discurso em 17 de agosto de 1954, celebrando o 9º aniversário da Independência da Indonésia, o Presidente Sukarno dissolveu unilateralmente a União, citando-a como um obstáculo ao progresso indonésio."
    ussr_dissolution.t:0 "Dissolver a União Soviética?"
    ussr_dissolution.d:0 "A dissolução da União Soviética foi o processo de desintegração interna dentro da União Soviética (URSS), que resultou no fim do país como Estado soberano e de seu governo federal, o que, por sua vez, resultou na obtenção da plena independência de suas 15 repúblicas constituintes em 26 de dezembro de 1991."
    ussr_dissolution.f:0 "Este evento ocorreu porque as condições históricas para a dissolução foram atendidas, ou porque existe um movimento revolucionário com grupos de interesse anticomunistas e a economia nacional está fraca."
    CZH_dissolution.t:0 "Dissolver a Tchecoslováquia?"
    CZH_dissolution.d:0 "A dissolução da Tchecoslováquia, que entrou em vigor em 31 de dezembro de 1992, foi a divisão autodeterminada da república federal da Tchecoslováquia nos países independentes da República Tcheca e da Eslováquia. Ambos espelhavam a República Socialista Tcheca e a República Socialista Eslovaca, criadas em 1969 como os Estados constituintes da República Socialista Tchecoslovaca até o fim de 1989."
    CZH_dissolution.f:0 "Este evento ocorreu porque as condições históricas para a dissolução foram atendidas, ou porque existe um movimento revolucionário com grupos de interesse anticomunistas e a economia nacional está fraca."
    SER_MON_dissolution.t:0 "Independência de Montenegro?"
    SER_MON_dissolution.d:0 "Um referendo de independência foi realizado em Montenegro em 21 de maio de 2006. Foi aprovado por 55,5% dos votantes, ultrapassando por pouco o limite de 55%."
    CAN_QUE_1_dissolution.t:0 "O Primeiro Referendo de Quebec?"
    CAN_QUE_1_dissolution.d:0 "O referendo de independência de Quebec de 1980 foi o primeiro referendo em Quebec sobre o lugar de Quebec dentro do Canadá e se Quebec deveria seguir um caminho rumo à soberania. O referendo foi convocado pelo governo do Parti Québécois (PQ) de Quebec, que defendia a secessão do Canadá. O referendo, realizado em toda a província, ocorreu em 20 de maio, e a proposta de secessão foi derrotada por uma margem de 59,56% a 40,44%."
    CAN_QUE_2_dissolution.t:0 "O Segundo Referendo de Quebec?"
    CAN_QUE_2_dissolution.d:0 "O referendo de Quebec de 1995 foi o segundo referendo a perguntar aos eleitores da província canadense predominantemente francófona de Quebec se Quebec deveria proclamar soberania e se tornar um país independente, com a condição prévia de oferecer um acordo político e econômico ao Canadá. A votação ocorreu em 30 de outubro de 1995 e teve o maior comparecimento eleitoral da história de Quebec (93,52%). A opção 'Não' venceu por uma margem de 54.288 votos, recebendo 50,58% dos votos válidos."
    IRQ_KUR_dissolution.t:0 "Reconhecer a Autonomia Curda?"
    IRQ_KUR_dissolution.d:0 "Antes da Guerra do Iraque em 2003, as duas partes se uniram nas negociações com a oposição árabe a Saddam Hussein e conseguiram obter ganhos políticos, econômicos e de segurança, com a oposição árabe concordando em reconhecer a autonomia curda caso Saddam Hussein fosse removido do poder. Os Estados Unidos e o Curdistão também erradicaram conjuntamente o grupo islamista Ansar al-Islam na área de Halabja, enquanto o Curdistão hospedava milhares de soldados. A autonomia curda, que existia desde 1992, foi formalmente reconhecida pelo novo governo iraquiano em 2005, na nova constituição iraquiana"
    GBR_SCO_dissolution.t:0 "O Referendo de Independência da Escócia"
    GBR_SCO_dissolution.d:0 "Um referendo sobre a independência da Escócia em relação ao Reino Unido foi realizado na Escócia em 18 de setembro de 2014. A pergunta do referendo era: 'A Escócia deve ser um país independente?', à qual os eleitores responderam com 'Sim' ou 'Não'. O lado do 'Não' venceu, com 2.001.926 votos contra a independência e 1.617.989 votos a favor."
    SPA_CAT_dissolution.t:0 "O Referendo de Independência da Catalunha"
    SPA_CAT_dissolution.d:0 "Um referendo de independência foi realizado em 1º de outubro de 2017 na comunidade autônoma espanhola da Catalunha, aprovado pelo Parlamento da Catalunha como a Lei do Referendo sobre a Autodeterminação da Catalunha. O referendo foi declarado inconstitucional em 7 de setembro de 2017 e suspenso pelo Tribunal Constitucional da Espanha, a pedido do governo espanhol, que o considerou uma violação da Constituição Espanhola."
    SKN_GBR_dissolution.t:0 "Dissolução de São Cristóvão-Névis-Anguilla?"
    SKN_GBR_dissolution.d:0 "Após um breve período como parte da Federação das Índias Ocidentais, a ilha de Anguilla tornou-se parte do Estado associado de São Cristóvão-Névis-Anguilla, com plena autonomia interna, em 1967. No entanto, muitos anguilanos não desejavam fazer parte dessa união e ressentiam-se do domínio de São Cristóvão dentro dela. Em 1980, Anguilla foi finalmente autorizada a se separar formalmente de São Cristóvão e Névis e se tornar um Território Ultramarino Britânico separado."
    FRA_NCD_dissolution.t:0 "O Referendo de Independência da Nova Caledônia"
    FRA_NCD_dissolution.d:0 "Um referendo de independência foi realizado na Nova Caledônia, um território francês no Pacífico Sul, em 12 de dezembro de 2021. A votação foi a terceira e última a ser realizada sob os termos do Acordo de Nouméa, após votações em 2018 e 2020, nas quais a independência foi rejeitada por 57% e 53%, respectivamente."
    UAS_GHA.t:0 "Dissolução da União dos Estados Africanos"
    UAS_GHA.d:0 "A união foi dissolvida sem muita atenção em maio de 1963. Diferentes explicações foram oferecidas para o fracasso da UEA, como nacionalismos concorrentes e falhas intrínsecas no modelo de federação estadunidense pelo qual Nkrumah foi influenciado. Adom Getachew argumenta que o fracasso foi causado por profundas divergências sobre o equilíbrio preciso entre a união federal e a independência dos Estados membros."
    PHI_MGD_dissolution.t:0 "A Lei Orgânica de Bangsamoro?"
    PHI_MGD_dissolution.d:0 "A Lei Orgânica de Bangsamoro é uma lei filipina que previu o estabelecimento da Região Autônoma de Bangsamoro em Mindanao Muçulmana (BARMM). Como um ato orgânico, a lei básica aboliu a Região Autônoma em Mindanao Muçulmana (ARMM) e estabeleceu a estrutura básica de governo para Bangsamoro, seguindo os acordos estabelecidos no acordo de paz abrangente de Bangsamoro, assinado entre o governo das Filipinas e a Frente de Libertação Islâmica Moro em 2014."
    SOM_SML_dissolution.t:0 "A Independência da Somalilândia?"
    SOM_SML_dissolution.d:0 "O Estado da Somalilândia uniu-se voluntariamente ao Território sob Tutela da Somália (a antiga Somália Italiana) para formar a República Somali. A união dos dois Estados mostrou-se problemática desde cedo, e, em resposta às políticas severas adotadas pelo regime de Barre da Somália contra o principal clã familiar da Somalilândia, os Isaaq, pouco após o fim da desastrosa Guerra de Ogaden, uma guerra de independência de 10 anos culminou com a declaração de independência da Somalilândia em 1991."
    MOR_WSA_dissolution.t:0 "O Cessar-Fogo do Saara Ocidental?"
    MOR_WSA_dissolution.d:0 "O cessar-fogo de 1991 no Saara Ocidental, intermediado pela ONU, entrou em vigor em 6 de setembro de 1991. Foi parte fundamental de um processo de paz mais amplo, incluindo o estabelecimento da MINURSO, a Missão das Nações Unidas para o Referendo no Saara Ocidental, para monitorar o cessar-fogo e preparar um referendo sobre o futuro do território. Embora o cessar-fogo tenha se mantido por quase 30 anos, ele não resultou, em última análise, na resolução do conflito."

    historical_union_dissolution.option.1:0 "Conceder-lhes independência"
    historical_union_dissolution.option.2:0 "Nosso país não pode ser fragmentado!"

    dissolve_the_ussr.tt:0 "Dissolver a União das Repúblicas Socialistas Soviéticas"
    dissolve_the_warsaw_pact.tt:0 "Dissolver o Pacto de Varsóvia"
    create_russian_federation.tt:0 "Tornar-se a Federação Russa"

    korean_war.t:0 "A Guerra da Coreia"
    korean_war.d:0 "A Guerra da Coreia foi travada entre a Coreia do Norte e a Coreia do Sul de 1950 a 1953. A guerra começou em 25 de junho de 1950, quando a Coreia do Norte invadiu a Coreia do Sul após anos de hostilidades entre os dois países. A Coreia do Norte foi apoiada pela China e pela União Soviética, enquanto a Coreia do Sul foi apoiada pelos Estados Unidos e por países aliados. Os combates terminaram com um armistício em 27 de julho de 1953."
    sino_tibetan_war:0 "A Guerra Sino-Tibetana"
    sino_tibetan_war.t:0 "A Guerra Sino-Tibetana"
    sino_tibetan_war.d:0 "O Tibete passou para o controle da República Popular da China (RPC) depois que o Governo do Tibete assinou o Acordo dos Dezessete Pontos, que o 14º Dalai Lama ratificou em 24 de outubro de 1951, mas posteriormente repudiou, alegando que havia dado sua aprovação ao acordo sob coação. Após meses de negociações fracassadas, tentativas do Tibete de garantir apoio e assistência estrangeiros, e acúmulos de tropas chinesas e tibetanas, o Exército de Libertação Popular (ELP) atravessou o Rio Jinsha em 6 ou 7 de outubro de 1950 para anexar o Tibete."
    portugal_india_war.t:0 "Anexação de Goa"
    portugal_india_war.d:0 "A Anexação de Goa foi o processo pelo qual a República da Índia anexou o Estado da Índia, então os territórios indianos portugueses de Goa, Damão e Diu, iniciado com a ação armada realizada pelas Forças Armadas Indianas em dezembro de 1961."
    suez_crisis_war.t:0 "A Crise de Suez"
    suez_crisis_war.d:0 "A Crise de Suez foi uma invasão do Egito e da Faixa de Gaza no final de 1956 por Israel, seguida pelo Reino Unido e pela França. Os objetivos eram recuperar o controle do Canal de Suez para as potências ocidentais e remover o presidente egípcio Gamal Abdel Nasser, que havia acabado de nacionalizar a Companhia do Canal de Suez, de propriedade estrangeira, que administrava o canal."
    vietnam_war.t:0 "A Guerra do Vietnã"
    vietnam_war.d:0 "A Guerra do Vietnã foi um conflito no Vietnã, Laos e Camboja, de 1º de novembro de 1955 até a queda de Saigon em 30 de abril de 1975. Foi a segunda das Guerras da Indochina e um dos principais conflitos da Guerra Fria. Embora a guerra tenha sido oficialmente travada entre o Vietnã do Norte e o Vietnã do Sul, o norte foi apoiado pela União Soviética, pela China e por outros Estados comunistas, enquanto o sul foi apoiado pelos Estados Unidos e outros aliados anticomunistas, tornando a guerra um conflito por procuração entre os Estados Unidos e a União Soviética. Durou quase 20 anos, com o envolvimento militar direto dos EUA terminando em 1973."
    second_indo_pakistan_war.t:0 "A Segunda Guerra da Caxemira"
    second_indo_pakistan_war.d:0 "A guerra indo-paquistanesa de 1965, também conhecida como a segunda guerra Índia-Paquistão, foi um conflito armado entre o Paquistão e a Índia que ocorreu de agosto de 1965 a setembro de 1965."
    falklands_war.t:0 "A Guerra das Malvinas"
    falklands_war.d:0 "A Guerra das Malvinas foi uma guerra não declarada de dez semanas entre a Argentina e o Reino Unido em 1982, pela posse de dois territórios dependentes britânicos no Atlântico Sul: as Ilhas Malvinas e sua dependência territorial, Geórgia do Sul e Ilhas Sandwich do Sul. O conflito começou em 2 de abril de 1982, quando a Argentina invadiu e ocupou as Ilhas Malvinas, seguida pela invasão da Geórgia do Sul no dia seguinte. Em 5 de abril, o governo britânico despachou uma força-tarefa naval para enfrentar a Marinha e a Força Aérea argentinas antes de realizar um assalto anfíbio às ilhas. O conflito durou 74 dias e terminou com a rendição argentina em 14 de junho, devolvendo as ilhas ao controle britânico."
    third_indo_pakistan_war.t:0 "A Terceira Guerra Indo-Paquistanesa"
    third_indo_pakistan_war.d:0 "A guerra indo-paquistanesa de 1971 foi um confronto militar entre a Índia e o Paquistão que ocorreu durante a Guerra de Libertação de Bangladesh, no Paquistão Oriental, de 3 de dezembro de 1971 até a capitulação paquistanesa em Daca, em 16 de dezembro de 1971."
    6_day_war.t:0 "A Guerra Árabe-Israelense"
    6_day_war.d:0 "A Guerra dos Seis Dias, ou Guerra de Junho, também conhecida como Guerra Árabe-Israelense de 1967 ou Terceira Guerra Árabe-Israelense, foi travada entre Israel e uma coalizão de Estados árabes de 5 a 10 de junho de 1967."
    ifni_war.t:0 "A Guerra de Ifni"
    ifni_war.d:0 "A Guerra de Ifni, por vezes chamada de Guerra Esquecida na Espanha, foi uma série de incursões armadas na África Ocidental Espanhola por insurgentes marroquinos, que começou em outubro de 1957 e culminou com o malsucedido cerco a Sidi Ifni."
    IDO_ETM_war.t:0 "A Invasão do Timor-Leste"
    IDO_ETM_war.d:0 "A invasão indonésia do Timor-Leste começou em 7 de dezembro de 1975, quando os militares indonésios (ABRI/TNI) invadiram o Timor-Leste sob o pretexto de anticolonialismo e anticomunismo, para derrubar o regime da Fretilin que havia surgido em 1974."
    iran_iraq_war.t:0 "A Guerra Irã-Iraque"
    iran_iraq_war.d:0 "A Guerra Irã-Iraque foi um conflito armado entre o Irã e o Iraque que durou de setembro de 1980 a agosto de 1988. As hostilidades ativas começaram com a invasão iraquiana do Irã e duraram oito anos, até a aceitação da Resolução 598 do Conselho de Segurança das Nações Unidas por ambos os lados."
    france_tunisia_war.t:0 "A Crise de Bizerta"
    france_tunisia_war.d:0 "A crise de Bizerta ocorreu em julho de 1961, quando a Tunísia impôs um bloqueio à base naval francesa em Bizerta, Tunísia, na esperança de forçar sua evacuação. A crise culminou em uma batalha de três dias entre forças francesas e tunisianas, que deixou 630 tunisianos e 24 franceses mortos, o que eventualmente levou a França a ceder a cidade e a base naval à Tunísia em 1963."
    yom_kippur_war.t:0 "A Guerra do Yom Kippur"
    yom_kippur_war.d:0 "A Guerra do Yom Kippur, também conhecida como Guerra do Ramadã, Guerra de Outubro, Guerra Árabe-Israelense de 1973, ou Quarta Guerra Árabe-Israelense, foi um conflito armado travado de 6 a 25 de outubro de 1973, entre Israel e uma coalizão de Estados árabes liderada pelo Egito e pela Síria."
    morocco_sahara_war.t:0 "A Anexação do Saara Ocidental?"
    morocco_sahara_war.d:0 "A anexação do Saara Ocidental ocorreu em duas etapas: 1976 e 1979. Pouco depois de a Espanha abrir mão do controle sobre o Saara Espanhol em 1975, tanto a Mauritânia quanto o Marrocos ocuparam o território. Em 14 de abril de 1976, os dois países o anexaram entre si por meio do acordo de partição do Saara Ocidental."
    iraq_kuwait_war.t:0 "A Guerra do Golfo?"
    iraq_kuwait_war.d:0 "Em 2 de agosto de 1990, o Iraque, governado pelo ditador Saddam Hussein, lançou uma invasão ao vizinho Kuwait e ocupou totalmente o país em dois dias. A invasão do Kuwait foi imediatamente recebida com condenação internacional, incluindo a Resolução 660 do Conselho de Segurança das Nações Unidas (CSNU), que impôs unanimemente sanções econômicas contra o Iraque na Resolução 661. A Resolução 678 do CSNU, adotada em 29 de novembro de 1990, ofereceu ao Iraque uma última chance, até 15 de janeiro de 1991, para implementar a Resolução 660 e se retirar do Kuwait; além disso, autorizou os Estados, após o prazo, a usar "todos os meios necessários" para forçar a saída do Iraque do Kuwait."
    soviet_afghan_war.t:0 "Guerra Soviético-Afegã?"
    soviet_afghan_war.d:0 "A Guerra Soviético-Afegã foi um conflito armado prolongado, travado na República Democrática do Afeganistão (RDA), controlada pelos soviéticos, de 1979 a 1989. A guerra começou depois que os soviéticos, sob o comando de Leonid Brejnev, lançaram uma invasão ao Afeganistão para apoiar o governo local pró-soviético que havia sido instalado durante a Operação Storm-333."
    vietnam_cambodian_war.t:0 "A Invasão do Camboja?"
    vietnam_cambodian_war.d:0 "Em 25 de dezembro de 1978, 150.000 soldados vietnamitas invadiram o Camboja Democrático e derrotaram o Exército Revolucionário Cambojano em apenas duas semanas, encerrando assim o governo de Pol Pot, responsável pela morte de quase um quarto de todos os cambojanos entre 1975 e dezembro de 1978, durante o genocídio cambojano."
    russia_ukraine_war.t:0 "A Guerra Russo-Ucraniana?"
    russia_ukraine_war.d:0 "A Guerra Russo-Ucraniana foi um conflito internacional entre a Rússia e a Ucrânia, iniciado em fevereiro de 2014. Após a Revolução da Dignidade na Ucrânia, a Rússia anexou a Crimeia da Ucrânia e apoiou separatistas pró-russos que combatiam as forças militares ucranianas na guerra de Donbas. Os primeiros oito anos de conflito também incluíram incidentes navais, guerra cibernética e tensões políticas crescentes. Em fevereiro de 2022, a Rússia lançou uma invasão em larga escala à Ucrânia, com o objetivo de anexar mais território e impor uma mudança de regime."
    second_iraq_war.t:0 "A Guerra do Iraque?"
    second_iraq_war.d:0 "A Guerra do Iraque foi um conflito armado prolongado no Iraque de 2003 a 2011. Começou com a invasão do Iraque por uma coalizão liderada pelos Estados Unidos, que derrubou o governo baathista de Saddam Hussein. O conflito continuou por grande parte da década seguinte, à medida que uma insurgência surgiu para se opor às forças da coalizão e ao governo iraquiano pós-invasão. As tropas dos EUA foram oficialmente retiradas em 2011."
    chad_libya_war.t:0 "A Guerra dos Toyota?"
    chad_libya_war.d:0 "A Guerra dos Toyota ocorreu em 1987 no norte do Chade e na fronteira Chade-Líbia, sendo a última fase do conflito chadiano-líbio. Recebeu esse nome por causa das picapes Toyota, principalmente a Toyota Hilux e a Toyota Land Cruiser, usadas para fornecer mobilidade às tropas chadianas em seus combates contra os líbios, e como veículos technicals. O Chade conseguiu retomar quase todo o norte do país e, nos meses seguintes, infligiu novas derrotas pesadas aos líbios, até que um cessar-fogo pondo fim ao conflito fosse assinado em setembro."
    us_afghan_war.t:0 "Guerra no Afeganistão?"
    us_afghan_war.d:0 "A Guerra no Afeganistão foi um conflito armado de 2001 a 2021. Começou quando uma coalizão militar internacional liderada pelos Estados Unidos lançou uma invasão ao Afeganistão, derrubando o Emirado Islâmico governado pelo Talibã e estabelecendo a República Islâmica internacionalmente reconhecida três anos depois."
    us_panama_war.t:0 "Invasão do Panamá?"
    us_panama_war.d:0 "Os Estados Unidos invadiram o Panamá em meados de dezembro de 1989, durante a presidência de George H. W. Bush. O principal objetivo da invasão era depor o governante de fato do Panamá, o General Manuel Noriega, procurado pelas autoridades dos EUA por extorsão e tráfico de drogas. A operação, codinome Operação Causa Justa, concluiu-se no final de janeiro de 1990 com a rendição de Noriega. As Forças de Defesa do Panamá (PDF) foram dissolvidas, e o Presidente eleito Guillermo Endara tomou posse."
    first_congo_war.t:0 "A Primeira Guerra do Congo?"
    first_congo_war.d:0 "A Primeira Guerra do Congo foi uma guerra civil e conflito militar internacional que ocorreu principalmente no Zaire (que foi renomeado República Democrática do Congo no processo), com transbordamentos significativos para o Sudão e Uganda. O conflito culminou em uma invasão estrangeira que substituiu o presidente zairense Mobutu Sese Seko pelo líder rebelde Laurent-Désiré Kabila. O governo instável de Kabila posteriormente entrou em conflito com seus aliados, preparando o cenário para a Segunda Guerra do Congo, de 1998 a 2003."
    second_congo_war.t:0 "A Segunda Guerra do Congo?"
    second_congo_war.d:0 "A Segunda Guerra do Congo começou na República Democrática do Congo em agosto de 1998, pouco mais de um ano após a Primeira Guerra do Congo, e envolveu algumas das mesmas questões. Eventualmente envolvendo beligerantes de todo o continente africano, a guerra terminou oficialmente em julho de 2003, quando o Governo de Transição da República Democrática do Congo assumiu o poder."
    russia_georgia_war.t:0 "A Guerra Russo-Georgiana?"
    russia_georgia_war.d:0 "A República da Geórgia declarou sua independência em março de 1991, durante a dissolução da União Soviética. No entanto, combates entre a Geórgia e separatistas deixaram partes do antigo Oblast Autônomo da Ossétia do Sul sob o controle de fato de separatistas apoiados pela Rússia, mas internacionalmente não reconhecidos. Um impasse semelhante se desenvolveu na região da Abecásia, onde separatistas abecázios haviam travado uma guerra em 1992–1993. Após a eleição de Vladimir Putin na Rússia em 2000 e uma mudança de poder pró-ocidental na Geórgia em 2003, as relações entre Rússia e Geórgia começaram a se deteriorar. As relações atingiram uma crise diplomática total em abril de 2008, quando a OTAN prometeu considerar a candidatura da Geórgia à adesão."
    israel_gaza_war.t:0 "A Guerra Israel-Gaza?"
    israel_gaza_war.d:0 "Um conflito armado entre Israel e grupos militantes palestinos liderados pelo Hamas ocorreu principalmente dentro e ao redor da Faixa de Gaza a partir de 7 de outubro de 2023, com confrontos também ocorrendo na Cisjordânia e na fronteira Israel-Líbano. Naquele dia, grupos militantes lançaram um ataque surpresa contra o sul de Israel a partir da Faixa de Gaza, marcando o início da mais significativa escalada militar na região desde a Guerra do Yom Kippur em 1973. Após eliminar os militantes do Hamas, os militares israelenses retaliaram conduzindo uma extensa campanha de bombardeio aéreo contra alvos do Hamas, seguida por uma invasão terrestre em larga escala de Gaza."
    moldova_gagauzia_war.t:0 "O Conflito da Gagáuzia?"
    moldova_gagauzia_war.d:0 "O conflito da Gagáuzia foi um conflito entre a RSS da Moldávia e, posteriormente, a independente República da Moldávia e sua população gagaúza, que buscava maior autonomia dentro da Moldávia. Culminou na declaração da República Gagaúza, separada da Moldávia, com o objetivo de permanecer dentro da União Soviética; no entanto, após a dissolução desta, a República Gagaúza tornou-se um Estado de fato independente. Foi formalmente reintegrada à Moldávia em 1995, quando a Gagáuzia foi oficialmente reconhecida como uma unidade territorial autônoma dentro do país."
    uganda_tanzania_war.t:0 "A Guerra Uganda-Tanzânia?"
    uganda_tanzania_war.d:0 "A Guerra Uganda-Tanzânia foi travada entre Uganda e a Tanzânia de outubro de 1978 a junho de 1979 e levou à derrubada do Presidente ugandense Idi Amin. A guerra foi precedida por uma deterioração das relações entre Uganda e a Tanzânia após a derrubada, por Amin, em 1971, do Presidente Milton Obote, que era próximo do Presidente da Tanzânia, Julius Nyerere. As circunstâncias em torno do início da guerra não são claras, e existem relatos divergentes dos eventos. Em outubro de 1978, as forças ugandenses começaram a fazer incursões na Tanzânia. Mais tarde naquele mês, o Exército de Uganda lançou uma invasão, saqueando propriedades e matando civis. A mídia oficial ugandense declarou a anexação do Saliente de Kagera."
    azerbaijan_artsakh_war.t:0 "A Anexação de Nagorno-Carabaque?"
    azerbaijan_artsakh_war.d:0 "Entre 19 e 20 de setembro de 2023, o Azerbaijão lançou uma ofensiva militar em larga escala contra o Estado separatista autodeclarado de Artsakh, movimento visto como uma violação do acordo de cessar-fogo assinado após a Segunda Guerra de Nagorno-Carabaque em 2020. Em 28 de setembro, o presidente de Artsakh, Samvel Shahramanyan, assinou um decreto para dissolver todas as instituições estatais até 1º de janeiro de 2024, pondo fim à existência do Estado separatista."
    us_libya_war.t:0 "Intervenção na Líbia?"
    us_libya_war.d:0 "Em 19 de março de 2011, uma coalizão multinacional liderada pela OTAN iniciou uma intervenção militar na Líbia para implementar a Resolução 1973 do Conselho de Segurança das Nações Unidas (UNSCR 1973). O objetivo era derrubar o regime de Muammar Gaddafi. Forças navais americanas e britânicas dispararam mais de 110 mísseis de cruzeiro Tomahawk e impuseram um bloqueio naval, enquanto a Força Aérea Francesa, a Real Força Aérea Britânica e a Real Força Aérea Canadense realizaram missões pela Líbia."
    us_grenada_war.t:0 "Invasão de Granada?"
    us_grenada_war.d:0 "A invasão dos Estados Unidos a Granada começou ao amanhecer de 25 de outubro de 1983. Os Estados Unidos e uma coalizão de seis nações caribenhas invadiram a nação insular de Granada, 160 km ao norte da Venezuela. Codinome Operação Fúria Urgente pelas forças militares dos EUA, resultou em ocupação militar em poucos dias. Foi desencadeada por conflitos internos dentro do Governo Popular Revolucionário, que resultaram na prisão domiciliar e execução do líder anterior e segundo Primeiro-Ministro de Granada, Maurice Bishop, e no estabelecimento do Conselho Militar Revolucionário, com Hudson Austin como presidente. A invasão resultou na nomeação de um governo interino, seguido por eleições em 1984."
    us_dominican_republic_war.t:0 "Invasão da República Dominicana?"
    us_dominican_republic_war.d:0 "Alegações de apoio comunista aos rebeldes na República Dominicana levaram a uma intervenção dos Estados Unidos no conflito (codinome Operação Power Pack), que mais tarde se transformou em uma ocupação do país pela Organização dos Estados Americanos, por meio da Força Interamericana de Paz. Eleições foram realizadas em 1966, após as quais Joaquín Balaguer foi eleito para a presidência. Ainda naquele ano, as tropas estrangeiras deixaram o país."
    ogaden_war.t:0 "A Guerra de Ogaden?"
    ogaden_war.d:0 "A Guerra de Ogaden foi um conflito militar travado entre a Somália e a Etiópia, de julho de 1977 a março de 1978, pela região etíope de Ogaden."
    badme_war.t:0 "A Guerra de Badme?"
    badme_war.d:0 "A Guerra Eritreia-Etiópia, também conhecida como Guerra de Badme, foi um grande conflito armado entre a Etiópia e a Eritreia, ocorrido de maio de 1998 a junho de 2000. Após a Eritreia obter independência da Etiópia em 1993, as relações eram inicialmente amistosas. No entanto, divergências sobre onde deveria ficar a nova fronteira internacional fizeram com que as relações se deteriorassem significativamente, eventualmente levando a uma guerra em larga escala."
    sino_vietnamese_war.t:0 "A Guerra Sino-Vietnamita?"
    sino_vietnamese_war.d:0 "A Guerra Sino-Vietnamita foi um breve conflito ocorrido no início de 1979 entre a China e o Vietnã. A China lançou uma ofensiva em resposta à invasão e ocupação vietnamita do Camboja em 1978, que encerrou o domínio do Khmer Vermelho, apoiado pelos chineses. O conflito durou cerca de um mês, com a China retirando suas tropas em março de 1979."
    saudi_north_yemen_war.t:0 "Intervenção no Iêmen do Norte?"
    saudi_north_yemen_war.d:0 "A Guerra Civil do Iêmen do Norte foi uma guerra civil travada no Iêmen do Norte de 1962 a 1970, entre partidários do Reino Mutawakkilita e apoiadores da República Árabe do Iêmen. A guerra começou com um golpe de Estado realizado em 1962 por republicanos revolucionários liderados pelo exército sob o comando de Abdullah as-Sallal, que destronou o recém-coroado Rei e Imã Muhammad al-Badr e declarou o Iêmen uma república sob sua presidência. O Imã fugiu para a fronteira saudita, onde reuniu apoio popular de tribos xiitas do norte para retomar o poder, escalando rapidamente para uma guerra civil em larga escala."
    PRC_korean_war.t:0 "Intervir na Guerra da Coreia?"
    PRC_korean_war.d:0 "Em 3 de outubro de 1950, a China tentou avisar os Estados Unidos, por meio de sua embaixada na Índia, de que interviria se as forças da ONU cruzassem o Rio Yalu. Os Estados Unidos não responderam, pois os formuladores de políticas em Washington, incluindo Truman, consideraram o aviso um blefe. Enquanto isso, em 13 de outubro, o Politburo decidiu que a China interviria mesmo na ausência de apoio aéreo soviético, baseando sua decisão na crença de que um moral superior poderia derrotar um inimigo com equipamento superior. Para isso, 200.000 soldados do Exército Voluntário do Povo (EVP) cruzaram o Yalu em direção à Coreia do Norte. Após cruzar secretamente o Rio Yalu em 19 de outubro, o 13º Grupo do Exército do EVP lançou a Ofensiva da Primeira Fase em 25 de outubro, atacando as forças da ONU em avanço perto da fronteira sino-coreana."
    NEJ_yemen_civil_war.t:0 "Intervir na Guerra Civil do Iêmen?"
    NEJ_yemen_civil_war.d:0 "Em 26 de março de 2015, a Arábia Saudita, liderando uma coalizão de nove países da Ásia Ocidental e do Norte da África, lançou uma intervenção no Iêmen após um novo pedido conjunto do presidente iemenita Abdrabbuh Mansur Hadi por apoio militar, depois que suas forças foram expulsas de Sana'a por insurgentes houthis durante a Guerra Civil do Iêmen."
    cenepa_war.t:0 "A Guerra do Cenepa?"
    cenepa_war.d:0 "A Guerra do Cenepa foi um breve e localizado conflito militar entre o Equador e o Peru, travado pelo controle de uma área no território peruano (isto é, no lado leste da Cordilheira del Cóndor, Província de Condorcanqui, Região Amazonas, República do Peru), próxima à fronteira entre os dois países."

    yemenite_war.t:0 "A Guerra do Iêmen?"
    yemenite_war.d:0 "A Segunda Guerra do Iêmen foi um breve conflito militar entre a República Árabe do Iêmen e a República Democrática Popular do Iêmen. A guerra surgiu de uma ruptura nas relações entre os dois países após o presidente do Iêmen do Norte, Ahmad al-Ghashmi, ser morto em 24 de junho de 1978, e Salim Rubai Ali, um marxista moderado que trabalhava em uma proposta de fusão entre os dois Iêmens, ser assassinado dois dias depois."
    sino_indian_war.t:0 "A Guerra Sino-Indiana?"
    sino_indian_war.d:0 "A Guerra Sino-Indiana foi um conflito armado entre a China e a Índia que ocorreu de outubro a novembro de 1962. Foi uma escalada militar da disputa de fronteira sino-indiana. Os combates ocorreram ao longo da fronteira da Índia com a China, na Agência da Fronteira Nordeste da Índia, a leste do Butão, e em Aksai Chin, a oeste do Nepal. O conflito terminou quando a China declarou unilateralmente um cessar-fogo em 20 de novembro de 1962, anunciando simultaneamente sua retirada para a posição pré-guerra, a fronteira efetiva China-Índia (também conhecida como Linha de Controle Real)."
    IDO_MSY_war.t:0 "A Konfrontasi?"
    IDO_MSY_war.d:0 "O confronto Indonésia-Malásia ou confronto de Bornéu (simplesmente conhecido como Konfrontasi na Indonésia, Malásia e Singapura) foi um conflito armado de 1963 a 1966, que surgiu da oposição da Indonésia à criação do Estado da Malásia a partir da Federação da Malaia. Após a deposição do presidente indonésio Sukarno em 1966, a disputa terminou pacificamente."
    SAF_ANG_war.t:0 "Operação Savannah?"
    SAF_ANG_war.d:0 "Operação Savannah foi o codinome sul-africano para sua incursão militar em Angola em 1975-1976. Fez parte da Guerra de Fronteira Sul-Africana e surgiu devido à Guerra de Independência de Angola. O objetivo era impedir a criação de um Estado hostil à África do Sul em Angola."
    USA_korean_war.t:0 "Intervir na Guerra da Coreia?"
    USA_korean_war.d:0 "Em 25 de junho de 1950, o Exército Popular da Coreia (KPA) do Norte cruzou abaixo do paralelo 38. O Conselho de Segurança das Nações Unidas denunciou a invasão e autorizou o Comando das Nações Unidas a repelir o KPA. Após os primeiros dois meses de guerra, o exército sul-coreano (ROKA) e seus aliados estavam quase derrotados, mantendo apenas o Perímetro de Pusan. Em setembro de 1950, no entanto, forças da ONU desembarcaram em Incheon, cortando as tropas e linhas de suprimento do KPA. Elas invadiram a Coreia do Norte em outubro de 1950 e avançaram em direção ao Rio Yalu — a fronteira com a China."
    india_hyderabad_war.t:0 "Anexação de Hyderabad?"
    india_hyderabad_war.d:0 "Em novembro de 1947, Hyderabad assinou um acordo de status quo com o Domínio da Índia, mantendo todos os arranjos anteriores, exceto o estacionamento de tropas indianas no Estado. A Índia considerava que o estabelecimento de um Estado comunista em Hyderabad seria uma ameaça ao país. O poder do Nizam havia se enfraquecido devido à Rebelião de Telangana e à ascensão de uma milícia radical conhecida como Razakars, que ele não conseguia conter. Em 7 de setembro, Jawaharlal Nehru deu um ultimato ao Nizam, exigindo a proibição dos Razakars e o retorno das tropas indianas a Secunderabad. A Índia invadiu o Estado em 13 de setembro de 1948."
    arab_israeli_war.t:0 "A Guerra Árabe-Israelense?"
    arab_israeli_war.d:0 "A Guerra Árabe-Israelense de 1948, também conhecida como Primeira Guerra Árabe-Israelense, seguiu-se à guerra civil na Palestina Mandatória como a segunda e última etapa da guerra da Palestina de 1948. A guerra civil transformou-se em uma guerra entre Estados separados com a Declaração de Independência de Israel em 14 de maio de 1948, o fim do Mandato Britânico da Palestina à meia-noite, e a entrada de uma coalizão militar de Estados árabes no território da Palestina Mandatória na manhã seguinte."
    first_indo_pakistan_war.t:0 "A Primeira Guerra Indo-Paquistanesa?"
    first_indo_pakistan_war.d:0 "A guerra indo-paquistanesa de 1947-1948, também conhecida como primeira guerra da Caxemira, foi uma guerra travada entre a Índia e o Paquistão pelo Estado principesco de Jammu e Caxemira, de 1947 a 1948."
    football_war.t:0 "A Guerra do Futebol?"
    football_war.d:0 "A Guerra do Futebol foi um breve conflito militar travado entre El Salvador e Honduras em 1969. Tensões existentes entre os dois países coincidiram com distúrbios durante uma partida eliminatória da Copa do Mundo FIFA de 1970. A guerra começou em 14 de julho de 1969, quando os militares salvadorenhos lançaram um ataque contra Honduras."
    agacher_strip_war.t:0 "A Guerra da Faixa de Agacher?"
    agacher_strip_war.d:0 "A Guerra da Faixa de Agacher foi uma guerra travada por Burkina Faso e o Mali por uma faixa de terra de 160 quilômetros ao longo da fronteira no norte de Burkina Faso, de 25 a 30 de dezembro de 1985. A guerra terminou com um cessar-fogo."
    ISR_LEB_war.t:0 "Operação Litani?"
    ISR_LEB_war.d:0 "Em 11 de março de 1978, onze militantes da OLP realizaram um desembarque de praia 30 km ao sul de Haifa, Israel, onde sequestraram um ônibus cheio de pessoas, matando os passageiros no que ficou conhecido como o massacre da Estrada Costeira. Em resposta, em 14 de março de 1978, Israel lançou a Operação Litani, ocupando o sul do Líbano, exceto a cidade de Tiro, com 25.000 soldados."
    SYR_LEB_war.t:0 "A Invasão Síria do Líbano?"
    SYR_LEB_war.d:0 "Em 31 de maio de 1976, o Exército Sírio invadiu o Líbano com 2.000 soldados e 60 tanques em uma ofensiva de três frentes. A primeira coluna marchou para o sul através do Chouf em direção a Sidon, onde foi detida pelas forças da OLP. A segunda coluna avançou para oeste ao longo do eixo Beirute-Damasco, antes de ser detida em Beirute. Outra coluna avançou para o norte pelo vale do Bekaa, indo depois para oeste em direção a Trípoli, onde foi detida por forças cristãs. A ofensiva havia sido interrompida até 10 de junho."
    vietnam_war_1975.t:0 "A Ofensiva da Primavera?"
    vietnam_war_1975.d:0 "As tropas dos EUA já haviam se retirado em grande parte do Vietnã até 1972, e os Acordos de Paz de Paris de 1973 viram o restante partir. Os acordos foram violados quase imediatamente, e os combates continuaram até a ofensiva da primavera de 1975 e a queda de Saigon para o PAVN, marcando o fim da guerra. O Vietnã do Norte e do Sul foram reunificados em 1976."
    ETH_SOM_border_war.t:0 "A Guerra de Fronteira Etiópia-Somália?"
    ETH_SOM_border_war.d:0 "A Guerra de Fronteira Etiópia-Somália ocorreu de junho de 1982 a agosto de 1983, quando a Etiópia lançou uma invasão em larga escala do centro da Somália. Apoiada por aviões de guerra e unidades blindadas, a Etiópia mobilizou uma força de 10.000 homens junto com milhares de rebeldes da Frente Democrática de Salvação Somali (SSDF). A operação visava inicialmente avançar até o litoral somali e, em última instância, derrubar o regime de Barre. Apesar de seus esforços, as tropas etíopes e os guerrilheiros da SSDF não conseguiram capturar as cidades-chave de Galkayo e Beledweyne, já que o exército somali repeliu com sucesso o ataque principal. No entanto, o conflito logo se transformou em um impasse militar em torno das cidades fronteiriças de Galdogob e Balanbale."
    USA_SOM_1993_war.t:0 "Operação Gothic Serpent?"
    USA_SOM_1993_war.d:0 "A Operação Gothic Serpent foi uma operação militar conduzida em Mogadíscio, Somália, por uma força americana codinome Força-Tarefa Ranger, durante a Guerra Civil Somali em 1993. O principal objetivo da operação era capturar Mohamed Farrah Aidid, líder da Aliança Nacional Somali, procurado pela UNOSOM II em resposta a seus ataques contra tropas das Nações Unidas. A operação ocorreu de agosto a outubro de 1993 e foi liderada pelo Comando Conjunto de Operações Especiais dos EUA (JSOC). Em 3 de outubro de 1993, a força-tarefa executou uma missão para capturar dois dos tenentes de Aidid. A missão culminou no que ficou conhecido como a Batalha de Mogadíscio. A batalha foi extremamente sangrenta, e a força-tarefa infligiu baixas significativas às forças da milícia somali, enquanto sofria pesadas perdas."
    ankoko_island_war.t:0 "A Invasão da Ilha Ankoko?"
    ankoko_island_war.d:0 "Em fevereiro de 1966, os governos da Venezuela, do Reino Unido e da Guiana assinaram o Acordo de Genebra, com o objetivo de resolver a controvérsia sobre a disputa territorial do Essequibo. Cinco meses após a independência da Guiana do Reino Unido, tropas venezuelanas iniciaram sua ocupação da Ilha Ankoko em outubro de 1966. As tropas venezuelanas rapidamente construíram instalações militares e uma pista de pouso."
    Mauritania_Senegal_Border_War.t:0 "A Guerra de Fronteira Mauritânia-Senegal?"
    Mauritania_Senegal_Border_War.d:0 "A Guerra de Fronteira Mauritânia-Senegal (1989-1991) foi um conflito violento provocado por disputas sobre terra, etnia e identidade nacional. As tensões estouraram em abril de 1989, após confrontos entre pastores mauritanos e agricultores senegaleses ao longo do Rio Senegal. O que começou como uma disputa local escalou para uma crise étnica e diplomática mais ampla, com ambos os governos expulsando dezenas de milhares de cidadãos um do outro. A violência comunal se espalhou, alimentada por ressentimentos históricos e divisões raciais. Centenas foram mortas e mais de 250.000 pessoas foram deslocadas. A guerra terminou em 1991 com uma paz frágil e a reabertura das fronteiras, mas seu legado de desconfiança e deslocamento continua a moldar as relações entre Mauritânia e Senegal."
    Heglig_Crisis_War.t:0 "A Crise de Heglig?"
    Heglig_Crisis_War.d:0 "A Crise de Heglig (março-setembro de 2012) foi um breve, porém intenso, conflito fronteiriço entre o Sudão e o Sudão do Sul pela rica região petrolífera de Heglig. Após a independência do Sudão do Sul em 2011, demarcações de fronteira não resolvidas e disputas sobre receitas petrolíferas escalaram para confrontos armados. Forças sul-sudanesas ocuparam Heglig — conhecida como Panthou no Sudão do Sul — reivindicando-a como parte do Estado de Unity, enquanto o Sudão afirmava sua soberania sobre a área. O Sudão eventualmente recuperou o controle, e ambas as nações assinaram acordos sobre fronteiras e recursos em setembro de 2012."
    PAK_AFG_2026_war.t:0 "A Guerra Afeganistão-Paquistão?"
    PAK_AFG_2026_war.d:0 "Em 21 de fevereiro de 2026, a Força Aérea Paquistanesa (PAF) realizou ataques aéreos sobre as províncias de Nangarhar, Paktika e Khost, no Afeganistão. Em 26 de fevereiro de 2026, o Afeganistão lançou uma operação retaliatória contra o Paquistão. Em resposta, o Paquistão lançou a Operação Ghazab Lil Haq contra o Talibã. No dia seguinte, o Paquistão anunciou um estado de "guerra aberta" com o Afeganistão."
    USA_PER_2026_war.t:0 "A Guerra EUA-Irã?"
    USA_PER_2026_war.d:0 "Em 28 de fevereiro de 2026, os Estados Unidos e Israel lançaram uma grande campanha militar conjunta contra o Irã, que o Presidente Donald Trump descreveu como "grandes operações de combate". A escalada seguiu-se ao fracasso de negociações mediadas de última hora sobre o programa nuclear do Irã."
    ETH_SOM_2006_war.t:0 "A Invasão Etíope da Somália?"
    ETH_SOM_2006_war.d:0 "A invasão etíope da Somália foi um conflito armado que durou de meados de 2006 ao início de 2009. Começou quando as forças militares etíopes, apoiadas pelos Estados Unidos, invadiram a Somália para depor a União dos Tribunais Islâmicos (ICU) e instalar o Governo Federal de Transição (TFG). O conflito evoluiu para uma ocupação militar e uma insurgência antietíope em rápida escalada. Até 2008, os insurgentes haviam recapturado a maior parte do território perdido pela ICU durante a invasão. O conflito causou o segundo maior deslocamento populacional desde 1991."
    USA_Saudi_Arabia_petrodollar.t:0 "O Acordo do Petrodólar?"
    USA_Saudi_Arabia_petrodollar.d:0 "O acordo do petrodólar foi um pacto de 1974 entre os EUA e a Arábia Saudita, estabelecendo que a Arábia Saudita precificaria suas vendas de petróleo exclusivamente em dólares estadunidenses e investiria sua receita excedente em títulos do Tesouro dos EUA. Em troca, os EUA forneceram garantias de segurança e equipamento militar, estabelecendo o dólar como a moeda dominante do petróleo global."

