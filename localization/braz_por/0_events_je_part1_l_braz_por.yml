    oil_cartel_desc_1: "A indústria de petróleo e gás [ROOT.GetCountry.GetAdjective] é dominada por um punhado de corporações que monopolizam coletivamente toda a produção de petróleo e gás em [ROOT.GetCountry.GetName]. Tal poder permite que essas empresas ditem efetivamente o preço do(a) [GetGoods('oil').GetName] no país, regulando a produção do(a) [GetBuildingType('building_oil_rig').GetName]. \n\nO(A) [concept_government] pode, no entanto, optar por regular a produção de petróleo, de modo que o preço do petróleo seja determinado pelo(a) [concept_government], e não por corporações privadas. \n\nNota: Regular a indústria de petróleo e gás permitirá que o(a) [concept_government] estabeleça cotas de produção para o(a) [GetGoods('oil').GetName], enquanto desregular a indústria de petróleo e gás permitirá que o setor privado estabeleça as cotas com base no(a) [concept_market_price] do(a) [GetGoods('oil').GetName]."
    oil_cartel_desc_2: "Sob a economia socialista de [ROOT.GetCountry.GetName], a indústria de petróleo e gás é diretamente controlada e regulada pelo(a) [concept_government] por meio do Ministério do Petróleo. Isso permite que o(a) [concept_government] controle diretamente a produção de todos(as) os(as) [GetBuildingType('building_oil_rig').GetName]."

