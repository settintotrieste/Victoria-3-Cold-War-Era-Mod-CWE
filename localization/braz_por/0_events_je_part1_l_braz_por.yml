    je_war_system_reason:0 "Como [ROOT.GetCountry.GetName] está atualmente envolvido em um(a) [concept_war], um Gabinete de Guerra foi montado por [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [ROOT.GetCountry.GetRuler.GetFullName], com o General [SCOPE.sCharacter('supreme_commander_scope').GetFullName] recebendo a responsabilidade geral pela condução da guerra. O povo [ROOT.GetCountry.GetAdjectiveNoFlag] aguarda ansiosamente a eventual vitória e ficará profundamente decepcionado se ela não se concretizar."

