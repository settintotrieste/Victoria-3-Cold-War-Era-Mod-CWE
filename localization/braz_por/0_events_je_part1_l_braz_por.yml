    british_india.indy.t:0 "Independência da Índia?"
    british_india.indy.d:0 "Em 3 de junho de 1947, o Visconde Louis Mountbatten, o último Governador-Geral britânico da Índia, anunciou a partição da Índia britânica em Índia e Paquistão. Com a rápida aprovação do Indian Independence Act de 1947, às 11h57 de 14 de agosto de 1947, o Paquistão foi declarado uma nação separada. Então, às 12h02 de 15 de agosto de 1947, a Índia tornou-se uma nação soberana e democrática."
    british_palestine.indy.t:0 "Independência de Israel e Palestina?"
    british_palestine.indy.d:0 "Em novembro de 1947, as Nações Unidas recomendaram a partição da Palestina e o estabelecimento de Estados árabe e judeu separados. Em 15 de maio de 1948, a Grã-Bretanha renunciou ao seu mandato. O Exército britânico deixou a Palestina, deixando judeus e árabes para resolverem a questão na guerra que se seguiu."
    british_jordan.indy.t:0 "Independência da Transjordânia?"
    british_jordan.indy.d:0 "$generic_independence_decolonisation_loc_desc$"
    british_iraq.indy.t:0 "Encerrar a Ocupação do Iraque?"
    british_iraq.indy.d:0 "Em 1º de abril de 1941, Rashid Ali al-Gaylani e membros do Quadrado Dourado encenaram um golpe de Estado. Durante a subsequente Guerra Anglo-Iraquiana, o Reino Unido invadiu o Iraque por temer que o governo pudesse cortar o fornecimento de petróleo às nações ocidentais devido a seus vínculos com as potências do Eixo. Uma ocupação militar seguiu-se à restauração do governo pré-golpe da monarquia haxemita. A ocupação terminou em 26 de outubro de 1947, embora a Grã-Bretanha mantivesse bases militares no Iraque até 1954, após o que as milícias assírias foram dissolvidas."
    british_malaysia.indy.t:0 "Retirada Britânica de Singapura?"
    british_malaysia.indy.d:0 "Em 18 de julho de 1967, a Grã-Bretanha anunciou que retiraria suas tropas de Singapura até meados da década de 1970. Seis meses depois, o prazo foi antecipado para 1971. A retirada repentina das forças britânicas apresentou sérios problemas para a defesa e a segurança econômica de Singapura. Em resposta, Singapura embarcou em um programa de rápida industrialização, restringiu suas leis trabalhistas para atrair investimentos estrangeiros, fortaleceu sua defesa por meio de cooperação militar com outros países, e triplicou seus gastos militares."
    british_malta_2.indy.t:0 "Retirada Britânica de Malta?"
    british_malta_2.indy.d:0 "Malta alcançou sua independência como o Estado de Malta em 21 de setembro de 1964 (Dia da Independência). Sob sua constituição de 1964, Malta inicialmente manteve Elizabeth II como Rainha de Malta e, portanto, chefe de Estado, com um governador-geral exercendo autoridade executiva em seu nome. Em 1971, o Partido Trabalhista de Malta, liderado por Dom Mintoff, venceu as eleições gerais, resultando na proclamação de Malta como república em 13 de dezembro de 1974 (Dia da República) dentro da Commonwealth. Um acordo de defesa foi assinado logo após a independência e, após ser renegociado em 1972, expirou em 31 de março de 1979 (Dia da Liberdade). Com sua expiração, a base britânica foi fechada e as terras anteriormente controladas pelos britânicos foram entregues ao governo maltês."
