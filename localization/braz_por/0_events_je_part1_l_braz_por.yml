    je_non_aligned_movement:0 "O Movimento dos Países Não Alinhados"
    je_non_aligned_movement_reason:0 "[ROOT.GetCountry.GetName] é membro do Movimento dos Países Não Alinhados. \n\nO Movimento dos Países Não Alinhados (MNA) é um fórum de [GetPlayer.MakeScope.Var('NAM_member_count').GetValue] países que não estão formalmente alinhados a favor ou contra nenhum grande bloco de poder durante a Guerra Fria. \n\nO movimento se originou nas consequências da Guerra da Coreia, como um esforço de alguns países para contrabalançar a rápida bipolarização do mundo durante a Guerra Fria, na qual duas grandes potências formaram blocos e embarcaram em uma política de atrair o restante do mundo para suas órbitas."
