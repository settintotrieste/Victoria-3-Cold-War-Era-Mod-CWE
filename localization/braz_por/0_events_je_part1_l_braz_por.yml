    change_dynamic_IG_ideology.t:0 "Mudança na(o) [Concept('concept_ideology','$concept_ideologies$')] do(a) [concept_interest_group]"
    change_dynamic_IG_ideology.d:0 "A(O) [Concept('concept_ideology','$concept_ideologies$')] de certos(as) [Concept('concept_interest_group', '$concept_interest_groups$')] em [ROOT.GetCountry.GetName] mudou devido à(ao) [concept_ideology] do(a) [concept_leader] desses(as) [Concept('concept_interest_group', '$concept_interest_groups$')]."
    change_dynamic_IG_ideology.f:0 "Cada [concept_interest_group] possui uma lista predefinida de [Concept('concept_ideology','$concept_ideologies$')] para cada tipo de [concept_ideology] de [concept_leader] que possa ter. Esta mudança entrará em vigor uma vez por ano."

