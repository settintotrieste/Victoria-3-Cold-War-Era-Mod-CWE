    je_tekhpromfinplans:0 "Tekhpromfinplans"
    je_tekhpromfinplans_reason:0 "Sob o(a) $law_semi_command_economy$ [ROOT.GetCountry.GetAdjective], as decisões de investimento são descentralizadas. As empresas devem apresentar planos anuais, chamados tekhpromfinplans, estipulando planos de produção por trimestre e mês. Os Oficiais de Planejamento Estatal então aprovariam (ou não) esses planos e alocariam suprimentos e dinheiro. A empresa então vende seus produtos, dentro das restrições do plano. \n\nEste sistema permite que o(a) [concept_government] transfira fundos do(a) [concept_gold_reserves] para o(a) [concept_investment_pool], possibilitando que as empresas estatais construam [Concept('concept_building', '$concept_buildings$')] de forma autônoma."
    je_tekhpromfinplans_status:0 "[concept_investment_pool]: #Green [GetPlayer.MakeScope.Var('tekhpromfinplans_fund_size').GetValue]M#!"

    je_start_inject_tekhpromfinplans_button:0 "Começar a Aprovar Projetos"
    je_start_inject_tekhpromfinplans_button_desc:0 "O(A) [concept_government] aprovará os planos de investimento apresentados pelas Empresas Estatais descentralizadas e transferirá fundos do(a) [concept_treasury] para o(a) [concept_investment_pool] para permitir a execução desses planos todo mês, se a Renda Fixa Líquida Semanal for de ao menos @money!#yellow 10000#!."
    je_stop_inject_tekhpromfinplans_button:0 "Parar de Aprovar Projetos"
    je_stop_inject_tekhpromfinplans_button_desc:0 "O(A) [concept_government] deixará de aprovar os planos de investimento apresentados pelas Empresas Estatais descentralizadas."

