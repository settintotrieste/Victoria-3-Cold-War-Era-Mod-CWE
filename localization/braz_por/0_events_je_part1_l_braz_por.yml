    1948_Universal_Declaration_of_Human_Rights.t:0 "A Declaração Universal dos Direitos Humanos"
    1948_Universal_Declaration_of_Human_Rights.d:0 "Em 10 de dezembro de 1948, a Assembleia Geral das Nações Unidas adotou a Declaração Universal dos Direitos Humanos, um documento histórico que proclama a dignidade inerente e os direitos iguais de todas as pessoas. Elaborada no rescaldo da Segunda Guerra Mundial, estabeleceu liberdades e proteções fundamentais, tornando-se a base do direito internacional moderno dos direitos humanos."
    1960_UNGA_Resolution_1514.t:0 "Declaração sobre a Concessão de Independência"
    1960_UNGA_Resolution_1514.d:0 "Em 14 de dezembro de 1960, a Assembleia Geral das Nações Unidas adotou a Resolução 1514, declarando que todos os povos têm direito à autodeterminação e à independência. Esta resolução histórica acelerou o processo de descolonização, levando à libertação de dezenas de nações do domínio colonial."
    1961_UN_Committee_On_Decolonisation.t:0 "Comitê Especial de Descolonização"
    1961_UN_Committee_On_Decolonisation.d:0 "Em 27 de novembro de 1961, as Nações Unidas estabeleceram o Comitê Especial de Descolonização, encarregado de monitorar a implementação da Resolução 1514. Conhecido como o Comitê dos 24, tornou-se o órgão central que defendia o fim do colonialismo e o reconhecimento da autodeterminação em todo o mundo."
    1970_UNGA_Resolution_2625.t:0 "Declaração sobre Relações Amistosas"
    1970_UNGA_Resolution_2625.d:0 "Em 24 de outubro de 1970, a Assembleia Geral das Nações Unidas adotou a Resolução 2625, afirmando princípios do direito internacional, incluindo a igualdade soberana, a não intervenção e o direito dos povos à autodeterminação. Isso reforçou o arcabouço jurídico para a descolonização e a cooperação pacífica entre os Estados."
    2000_Millennium_Development_Goals.t:0 "Os Objetivos de Desenvolvimento do Milênio"
    2000_Millennium_Development_Goals.d:0 "Em 8 de setembro de 2000, as Nações Unidas adotaram os Objetivos de Desenvolvimento do Milênio, um conjunto de oito metas ambiciosas para reduzir a pobreza, melhorar a saúde e promover a educação até 2015. Esta iniciativa marcou um compromisso global com o desenvolvimento e a cooperação no novo século."
    historical_un_events.option.1:0 "Obrigado(a) pela sua atenção a este assunto."

    je_generic_decolonisation_overlord_system:0 "Sentimentos Anticoloniais"
    je_generic_decolonisation_overlord_system_reason:0 "O anticolonialismo definiu meados do século XX à medida que as nações desmantelavam o domínio imperial. Da África à Ásia, os movimentos de independência remodelaram alianças e estratégias da Guerra Fria. Soberania significava mais do que fronteiras — era uma exigência de controle sobre recursos, identidade e destino, forçando as potências globais a se adaptarem a um mundo em rápida descolonização. \n\nComo [ROOT.GetCountry.GetName] possui [Concept('concept_unincorporated_state','$concept_unincorporated_states$')], as populações desses estados exigem autodeterminação ou plenos direitos como cidadãos [ROOT.GetCountry.GetAdjective]."

    je_generic_decolonisation_colonial_purge_button:0 "Realizar Expurgo Colonial"
    je_generic_decolonisation_colonial_purge_button_desc:0 "O(A) [concept_government] [ROOT.GetCountry.GetAdjective] expurgará violentamente todos os agitadores e apoiadores anticoloniais em suas colônias e [Concept('concept_subject', '$concept_subjects$')] não soberanos(as)."

    je_generic_decolonisation_subject_system:0 "Nacionalismo [ROOT.GetCountry.GetAdjectiveNoFormatting]"
    je_generic_decolonisation_subject_system_reason:0 "O anticolonialismo definiu meados do século XX à medida que as nações desmantelavam o domínio imperial. Da África à Ásia, os movimentos de independência remodelaram alianças e estratégias da Guerra Fria. Soberania significava mais do que fronteiras — era uma exigência de controle sobre recursos, identidade e destino, forçando as potências globais a se adaptarem a um mundo em rápida descolonização. \n\nComo [ROOT.GetCountry.GetName] é um(a) [concept_subject] colonial de uma potência estrangeira, as populações nativas do povo [ROOT.GetCountry.GetAdjective] exigem independência."

    je_generic_decolonisation_civil_disobedience_button:0 "Convocar Protestos Anticoloniais"
    je_generic_decolonisation_civil_disobedience_button_desc:0 "O(A) [SCOPE.GetRootScope.GetCountry.GetCustom('government_ruler_custom_title')] [GetPlayer.GetRuler.GetFullName] convocará todos os povos [ROOT.GetCountry.GetAdjective] a desobedecer seu(sua) [concept_overlord]."

    je_mandate_decolonisation_system:0 "Os Mandatos [ROOT.GetCountry.GetAdjectiveNoFormatting]"
    je_mandate_decolonisation_system_reason:0 "Os mandatos surgiram após a Primeira Guerra Mundial como territórios colocados sob supervisão internacional, frequentemente administrados por potências coloniais por meio da Liga das Nações. \n\nConcebidos como uma governança transitória, frequentemente estendiam a influência imperial sob o pretexto de tutela. \n\nNa era da Guerra Fria, os países que possuíam mandatos começaram a enfrentar pressão internacional para conceder independência a seus mandatos. \n\nComo as Nações Unidas não reconhecem a posse permanente por [ROOT.GetCountry.GetName] de seu(s) [concept_mandate](s), [ROOT.GetCountry.GetName] enfrentará sanções diplomáticas até que todos os mandatos recebam independência."

