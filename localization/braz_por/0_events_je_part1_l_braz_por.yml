    recently_expanded_court.tt:0 "O(A) [concept_government] não expandiu o(a) [SCOPE.GetRootScope.GetCountry.GetCustom('supreme_court_name')] nos últimos 12 meses"
    je_judiciary_expand_court_button_desc:0 "O(A) [concept_government] pode legislar para aumentar o número total de juízes no(a) [SCOPE.GetRootScope.GetCountry.GetCustom('supreme_court_name')], até um máximo de 20 juízes. A vaga recém-criada será então preenchida por um juiz nomeado pelo governo, quando aplicável."
