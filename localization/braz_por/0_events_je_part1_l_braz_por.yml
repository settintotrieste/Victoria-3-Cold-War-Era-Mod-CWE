    je_nato_system:0 "A Organização do Tratado do Atlântico Norte"
    je_nato_system_reason:0 "A Organização do Tratado do Atlântico Norte é uma aliança militar intergovernamental de Estados europeus e norte-americanos. Estabelecida após a Segunda Guerra Mundial, a organização implementou o Tratado do Atlântico Norte, assinado em Washington, D.C., em 4 de abril de 1949. A OTAN é um sistema de segurança coletiva: seus Estados-membros independentes concordam em defender uns aos outros contra ataques de terceiros. \n\nLíder: [SCOPE.sCountry('nato_leader').GetName] \n\nSede: #y [SCOPE.sCountry('nato_leader').GetCapital.GetCityHubName]#!"
    je_nato_system_status:0 "Total de Membros: [GetGlobalVariable('nato_org_member_count').GetValue]"

    je_request_nato_intervention_button:0 "Invocar o Artigo 5"
    je_request_nato_intervention_button_desc:0 "O Artigo 5 estabelece que, se um Aliado da OTAN for vítima de um ataque armado, cada um dos outros membros da Aliança considerará esse ato de violência como um ataque armado contra todos os membros, e tomará as ações que julgar necessárias para auxiliar o Aliado atacado."

