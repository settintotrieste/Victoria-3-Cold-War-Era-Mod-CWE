    irish_open_border.t:0 "Fronteira Aberta Irlandesa"
    irish_open_border.d:0 "Por razões históricas, a fronteira entre a Irlanda do Sul e a Irlanda do Norte permaneceu aberta. Como resultado, os cidadãos de ambas as partes da ilha da Irlanda podem se mover livremente de uma parte para a outra. Isso é representado no jogo colocando [SCOPE.sCountry('irish_country').GetName] na União Aduaneira de [SCOPE.sCountry('british_country').GetName]."
    irish_open_border.f:0 "Este evento pode ser evitado promulgando a lei do isolacionismo, tornando-se um tipo de governo não democrático, ou deixando de compartilhar uma fronteira terrestre com [SCOPE.sCountry('british_country').GetName]."

