    je_central_bank:0 "O(A) [SCOPE.GetRootScope.GetCountry.GetCustom('central_bank_name_custom_title')]"
    je_central_bank_reason:0 "O(A) [SCOPE.GetRootScope.GetCountry.GetCustom('central_bank_name_custom_title')] é o Banco Central de [ROOT.GetCountry.GetName]. \n\nOs bancos centrais usam a política monetária para gerenciar as flutuações econômicas e alcançar a estabilidade de preços, o que significa uma inflação baixa e estável. Os bancos centrais conduzem a política monetária ajustando a oferta de moeda, geralmente por meio da compra ou venda de títulos no mercado aberto. As operações de mercado aberto afetam as taxas de juros de curto prazo, que por sua vez influenciam as taxas de longo prazo e a atividade econômica. Quando os bancos centrais reduzem as taxas de juros, a política monetária está se afrouxando. Quando as aumentam, a política monetária está se apertando. \n\nTaxa de Juros Atual: [SCOPE.GetRootScope.GetCountry.GetCustom('central_bank_current_monetary_policy_custom_title')] \n\n$lawgroup_monetary_policy$ Apropriada: [SCOPE.GetRootScope.GetCountry.GetCustom('central_bank_appropriate_monetary_policy_custom_title')] \n\nMédia do(a) [concept_market_price] Núcleo do Mês Atual: [GetPlayer.MakeScope.Var('core_interest_rate_now').GetValue]% \n\nMédia do(a) [concept_market_price] Núcleo do Mês Anterior: [GetPlayer.MakeScope.Var('core_interest_rate_prev').GetValue]% \n\nBens usados para calcular o(a) [concept_market_price] Núcleo ([GetPlayer.MakeScope.Var('core_interest_rate_total_factors').GetValue] disponíveis): $cir_grain$ $cir_meat$ $cir_fish$ $cir_fruit$ $cir_tea$ $cir_coffee$ $cir_groceries$ $cir_liquor$ $cir_tobacco$ $cir_wine$ $cir_transportation$ $cir_real_estate$ $cir_electricity$ $cir_communication_services$ $cir_services$ $cir_furniture$ $cir_telecommunications$ $cir_computers$"
