    je_climate_change_reforestation_start_button:0 "Iniciar Política de Reflorestamento"
    je_climate_change_reforestation_start_button_desc:0 "O reflorestamento é a prática de restaurar florestas e matas anteriormente existentes que foram destruídas ou danificadas. \n\nPromulgar esta política reduzirá a taxa de mudança climática."
    je_climate_change_reforestation_end_button:0 "Encerrar Política de Reflorestamento"
    je_climate_change_reforestation_end_button_desc:0 "O reflorestamento é a prática de restaurar florestas e matas anteriormente existentes que foram destruídas ou danificadas."
    je_climate_change_recycling_start_button:0 "Iniciar Política de Reciclagem"
    je_climate_change_recycling_start_button_desc:0 "A reciclagem é o processo de converter materiais residuais em novos materiais e objetos. Este conceito frequentemente inclui a recuperação de energia de materiais residuais. A reciclabilidade de um material depende de sua capacidade de readquirir as propriedades que possuía em seu estado original. \n\nPromulgar esta política reduzirá a taxa de mudança climática."
    je_climate_change_recycling_end_button:0 "Encerrar Política de Reciclagem"
    je_climate_change_recycling_end_button_desc:0 "A reciclagem é o processo de converter materiais residuais em novos materiais e objetos. Este conceito frequentemente inclui a recuperação de energia de materiais residuais. A reciclabilidade de um material depende de sua capacidade de readquirir as propriedades que possuía em seu estado original."
    je_climate_change_carbon_capture_start_button:0 "Iniciar Política de Captura de Carbono"
    je_climate_change_carbon_capture_start_button_desc:0 "A captura e armazenamento de carbono é um processo no qual um fluxo relativamente puro de dióxido de carbono proveniente de fontes industriais é separado, tratado e transportado para um local de armazenamento de longo prazo. \n\nPromulgar esta política reduzirá a taxa de mudança climática."
    je_climate_change_carbon_capture_end_button:0 "Encerrar Política de Captura de Carbono"
    je_climate_change_carbon_capture_end_button_desc:0 "A captura e armazenamento de carbono é um processo no qual um fluxo relativamente puro de dióxido de carbono proveniente de fontes industriais é separado, tratado e transportado para um local de armazenamento de longo prazo."

