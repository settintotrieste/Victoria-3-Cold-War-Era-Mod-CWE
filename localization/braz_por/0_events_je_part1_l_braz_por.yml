    je_climate_change_system:0 "Mudança Climática Global"
    je_climate_change_system_reason:0 "A Mudança Climática refere-se a alterações de longo prazo nas temperaturas e nos padrões climáticos. Essas alterações podem ser naturais, mas, desde o século XIX, as atividades humanas têm sido o principal fator impulsionador da mudança climática, principalmente devido à queima de combustíveis fósseis (como carvão, petróleo e gás), que produz gases retentores de calor. \n\nCondição Climática Atual: [SCOPE.GetRootScope.GetCountry.GetCustom('climate_effect_name')] \n\nObjetivo: O Referencial Climático não deve subir acima de +2,0°C \n\nTemperatura Global Atual: +[GetPlayer.MakeScope.Var('climate_change_status_total_display').GetValue]°C \n\nVariação Anual da Temperatura Global: [GetPlayer.MakeScope.Var('climate_change_progress_rate_display').GetValue]°C \n\nDica: A taxa de mudança climática pode ser reduzida promulgando uma(o) [concept_law] $lawgroup_environmental_policy$ melhor."
    je_climate_change_system_status:0 "Referencial Climático: +[GetPlayer.MakeScope.Var('climate_change_status_total_display').GetValue]°C"

