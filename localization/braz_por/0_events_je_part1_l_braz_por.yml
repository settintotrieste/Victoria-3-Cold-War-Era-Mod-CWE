    spending_policy_ideology.t:0 "Nova Opinião Pública sobre Gastos Governamentais"
    spending_policy_ideology.d:0 "Reagindo à nova situação econômica em [ROOT.GetCountry.GetName], o(a) [concept_interest_group] [SCOPE.gsInterestGroup('affected_IG_scope').GetName] manifestou sua intenção de mudar sua postura sobre o nível apropriado de gastos governamentais."
    spending_policy_ideology.f:0 "Este evento ocorreu porque as condições econômicas não correspondem mais à(ao) [concept_ideology] dinâmica apropriada para Gastos Governamentais."

    population_policy_ideology.t:0 "Nova Opinião Pública sobre Políticas Populacionais"
    population_policy_ideology.d:0 "Reagindo à nova situação socioeconômica em [ROOT.GetCountry.GetName], o(a) [concept_interest_group] [SCOPE.gsInterestGroup('affected_IG_scope').GetName] manifestou sua intenção de mudar sua postura sobre o nível apropriado de intervenção governamental no âmbito do crescimento populacional."
    population_policy_ideology.f:0 "Este evento ocorreu porque o(a) [concept_sol] médio(a) não corresponde mais à(ao) [concept_ideology] dinâmica apropriada para Políticas Populacionais. \n\n#BOLD As mudanças de [concept_ideology] são as seguintes:#! \n\n#BOLD #green 25 [concept_sol] ou acima#! - [concept_ideology] $ideology_pro_population$ \n\n#BOLD #yellow Entre 25 e 10 [concept_sol]#! - [concept_ideology] $ideology_neutral_population$ \n\n#BOLD #red 10 [concept_sol] ou abaixo#! - [concept_ideology] $ideology_anti_population$"

    dynamic_ideology_system_1.option:0 "Aceitar a mudança."
    dynamic_ideology_system_2.option:0 "Usar nossos espiões no(a) [concept_interest_group] para impedir isso."

    changing_civil_defence_level:0 "Nível de Defesa Civil Alterado Recentemente"

    je_civil_defence:0 "Defesa Civil [ROOT.GetCountry.GetAdjectiveNoFlag]"
    je_civil_defence_reason:0 "A defesa civil é um esforço para proteger os cidadãos de um Estado (geralmente não combatentes) de desastres provocados pelo homem e naturais. Utiliza os princípios de operações de emergência: prevenção, mitigação, preparação, resposta, ou evacuação e recuperação de emergência. \n\nNeste mod, a defesa civil reduzirá os efeitos da guerra nuclear e dos bombardeios estratégicos. \n\nNota: A força da defesa civil pode ser aumentada pesquisando tecnologia militar mais avançada."
    je_civil_defence_increase_civil_defence_button:0 "Aumentar o Financiamento"
    je_civil_defence_increase_civil_defence_button_desc:0 "O Estado aumentará seu nível de Defesa Civil, aumentando o financiamento alocado a ela."
    je_civil_defence_decrease_civil_defence_button:0 "Reduzir o Financiamento"
    je_civil_defence_decrease_civil_defence_button_desc:0 "O Estado reduzirá seu nível de Defesa Civil, reduzindo o financiamento alocado a ela."

    USA_PER_Hostage_Crisis.t:0 "A Crise dos Reféns no Irã?"
    USA_PER_Hostage_Crisis.d:0 "A Crise dos Reféns no Irã foi um impasse diplomático entre o Irã e os Estados Unidos. Cinquenta e três diplomatas e cidadãos americanos foram mantidos reféns depois que um grupo de estudantes universitários iranianos militarizados, pertencentes aos Estudantes Muçulmanos Seguidores da Linha do Imã, que apoiavam a Revolução Iraniana, incluindo Hossein Dehghan, Mohammad Ali Jafari e Mohammad Bagheri, tomaram a Embaixada dos EUA em Teerã e os fizeram reféns."
    USA_SOV_U2_Incident.t:0 "O Incidente do U-2?"
    USA_SOV_U2_Incident.d:0 "Em 1º de maio de 1960, um avião espião U-2 dos Estados Unidos foi abatido pelas Forças de Defesa Aérea Soviéticas enquanto realizava reconhecimento aéreo fotográfico profundamente dentro do território soviético. Pilotado pelo americano Francis Gary Powers, a aeronave havia decolado de Peshawar, Paquistão, e caiu perto de Sverdlovsk (atual Ecaterimburgo), após ser atingida por um míssil terra-ar. Powers saltou de paraquedas até o solo e foi capturado."
    USA_SOV_Able_Archer.t:0 "A Crise do Able Archer 83?"
    USA_SOV_Able_Archer.d:0 "Able Archer 83 foi um exercício militar conduzido pela OTAN, ocorrido em novembro de 1983, como parte de um exercício anual realizado em novembro de 1983. O exercício de 1983, que começou em 7 de novembro de 1983, introduziu vários elementos novos não vistos em anos anteriores, incluindo um formato novo e exclusivo de comunicação codificada, silêncios de rádio, e a participação de chefes de governo. Esse aumento de realismo, combinado com as relações tensas entre os Estados Unidos e a União Soviética, e a chegada prevista de mísseis nucleares Pershing II na Europa, levou alguns membros do Politburo e das forças militares soviéticas a acreditar que o Able Archer 83 fosse um ardil de guerra, ocultando preparativos para um verdadeiro primeiro ataque nuclear. Em resposta, a União Soviética preparou suas forças nucleares e colocou unidades aéreas em alerta na Alemanha Oriental e na Polônia."
    SOV_USA_KOR_Incident.t:0 "O Incidente do Voo 007 da Korean Air Lines"
    SOV_USA_KOR_Incident.d:0 "O Voo 007 da Korean Air Lines era um voo regular da Korean Air Lines de Nova York a Seul, via Anchorage, Alasca. Em 1º de setembro de 1983, o voo foi abatido por um caça interceptador soviético Sukhoi Su-15. O avião Boeing 747 seguia de Anchorage para Seul, mas, devido a um erro de navegação cometido pela tripulação, o avião desviou-se de sua rota planejada e voou pelo espaço aéreo proibido soviético. As Forças Aéreas Soviéticas trataram a aeronave não identificada como um avião espião americano intruso, e o destruíram com mísseis ar-ar, após disparar tiros de advertência."
    USA_GUA_Overthrow.t:0 "Operação PBSuccess?"
    USA_GUA_Overthrow.d:0 "Eisenhower autorizou a operação da CIA para derrubar Jacobo Árbenz, codinome Operação PBSuccess, em agosto de 1953. A operação recebeu um orçamento de 2,7 milhões de dólares americanos para "guerra psicológica e ação política". Castillo Armas recebeu dinheiro suficiente para recrutar uma pequena força de mercenários entre exilados guatemaltecos e populações de países vizinhos. Esse grupo foi chamado de Exército de Libertação. A CIA estabeleceu campos de treinamento na Nicarágua e em Honduras e os supriu com armas, bem como vários bombardeiros."
    SOV_AFG_Overthrow.t:0 "Operação Storm-333"
    SOV_AFG_Overthrow.d:0 "O assalto ao Palácio Tajbeg, conhecido pelo codinome militar Operação Storm-333, foi uma incursão militar executada pela União Soviética no Afeganistão em 27 de dezembro de 1979. Forças especiais e tropas aerotransportadas invadiram o fortemente fortificado Palácio Tajbeg, em Cabul, e assassinaram o líder afegão Hafizullah Amin, um khalquista do Partido Democrático Popular do Afeganistão (PDPA) que havia tomado o poder na Revolução de Saur, em abril de 1978. Foi o início da Guerra Soviético-Afegã."
    EGR_WGR_Berlin_Wall.t:0 "O Muro de Berlim?"
    EGR_WGR_Berlin_Wall.d:0 "O Muro de Berlim foi uma barreira de concreto vigiada que cercou Berlim Ocidental de 1961 a 1989, separando-a de Berlim Oriental e da República Democrática Alemã. A construção do Muro de Berlim foi iniciada pelo governo da RDA em 13 de agosto de 1961. Incluía torres de vigia posicionadas ao longo de grandes muros de concreto, acompanhadas por uma ampla área (mais tarde conhecida como "faixa da morte") que continha trincheiras antiveículos, camas de pregos e outras defesas. A intenção primária da construção do Muro era impedir que os cidadãos da Alemanha Oriental fugissem para o Ocidente."
    EGR_WGR_Berlin_Wall_Fall.t:0 "A Queda do Muro de Berlim?"
    EGR_WGR_Berlin_Wall_Fall.d:0 "A queda do Muro de Berlim, em 9 de novembro de 1989, durante a Revolução Pacífica, marcou o início da destruição do Muro de Berlim e da figurativa Cortina de Ferro, à medida que as restrições de trânsito de Berlim Oriental eram sobrepujadas e abandonadas. Seções do muro foram violadas, e a desconstrução planejada começou em junho seguinte."
    USA_CUB_Overthrow.t:0 "A Invasão da Baía dos Porcos?"
    USA_CUB_Overthrow.d:0 "A Invasão da Baía dos Porcos foi uma malsucedida operação de desembarque militar na costa sudoeste de Cuba, em 1961, pelos Estados Unidos da América e a Frente Revolucionária Democrática Cubana (DRF), composta por exilados cubanos que se opunham à Revolução Cubana de Fidel Castro, financiada e dirigida clandestinamente pelo governo dos EUA. A operação ocorreu no auge da Guerra Fria, e seu fracasso influenciou as relações entre Cuba, os Estados Unidos e a União Soviética."
    GBR_Chagos_Island_deport.t:0 "A Expulsão dos Chagossianos?"
    GBR_Chagos_Island_deport.d:0 "O Reino Unido, a pedido dos Estados Unidos, começou a expulsar os habitantes do Arquipélago de Chagos em 1968, concluindo suas deportações forçadas em 27 de abril de 1973, com a expulsão dos chagossianos remanescentes no atol de Peros Banhos."
    USA_SOV_Azorian_Incident.t:0 "Projeto Azorian?"
    USA_SOV_Azorian_Incident_1.t:0 "Submarino Soviético Afundado Recuperado pelos EUA"
    USA_SOV_Azorian_Incident.d:0 "O Projeto Azorian foi um projeto da Agência Central de Inteligência (CIA) dos EUA para recuperar o submarino soviético afundado K-129 do fundo do Oceano Pacífico em 1974, usando o navio Hughes Glomar Explorer, construído especificamente para esse fim. O naufrágio do K-129 em 1968 ocorreu a cerca de 1.560 milhas (2.510 km) a noroeste do Havaí. O Projeto Azorian foi uma das operações de inteligência mais complexas, caras e secretas da Guerra Fria, com um custo de cerca de US$ 800 milhões, ou US$ 4,9 bilhões nos dias atuais."
    USA_Reagan_Doctrine.t:0 "A Doutrina Reagan?"
    USA_Reagan_Doctrine.d:0 "A Doutrina Reagan foi uma estratégia dos Estados Unidos implementada pela Administração Reagan para sobrepujar a influência global da União Soviética no final da Guerra Fria. Sob a Doutrina Reagan, os Estados Unidos forneceram ajuda aberta e secreta a guerrilhas anticomunistas e movimentos de resistência, em um esforço para "reverter" governos pró-comunistas apoiados pelos soviéticos na África, Ásia e América Latina. A doutrina foi concebida para diminuir a influência soviética nessas regiões, como parte da estratégia geral da administração para vencer a Guerra Fria."
    SOV_Brezhnev_Doctrine.t:0 "A Doutrina Brejnev?"
    SOV_Brezhnev_Doctrine.d:0 "A Doutrina Brejnev foi uma política externa soviética que proclamava que qualquer ameaça ao "domínio socialista" em qualquer Estado do Bloco Soviético na Europa Central e Oriental era uma ameaça a todos eles, e, portanto, justificava a intervenção de outros Estados socialistas. Foi proclamada para justificar a ocupação liderada pelos soviéticos da Checoslováquia, mais cedo em 1968, com a derrubada do governo reformista de lá. As referências ao "socialismo" significavam o controle pelos partidos comunistas leais ao Kremlin."
    GBR_Atlanticism.t:0 "O Atlantismo Thatcherista?"
    GBR_Atlanticism_1.t:0 "A Relação Especial?"
    GBR_Atlanticism.d:0 "Enquanto foi primeira-ministra, Thatcher abraçou fortemente as relações transatlânticas com o presidente dos EUA, Ronald Reagan. Frequentemente apoiava publicamente as políticas de Reagan, mesmo quando outros aliados ocidentais não eram tão vocais. Por exemplo, concedeu permissão para que aviões americanos usassem bases britânicas para incursões, como o bombardeio americano de 1986 à Jamahiriya Árabe Líbia, e permitiu que mísseis de cruzeiro americanos e mísseis Pershing fossem alojados em solo britânico, em resposta ao posicionamento soviético de mísseis nucleares SS-20 mirando a Grã-Bretanha e outras nações da Europa Ocidental."
    NOR_Dag_Hammarskjold_death.t:0 "A Morte de Dag Hammarskjöld?"
    NOR_Dag_Hammarskjold_death.d:0 "Em 18 de setembro de 1961, Hammarskjöld estava a caminho de negociar um cessar-fogo entre as forças da Operação das Nações Unidas no Congo e as tropas catanguesas sob Moise Tshombe. Seu avião Douglas DC-6, SE-BDY, caiu perto de Ndola, na Rodésia do Norte (atual Zâmbia). Hammarskjöld pereceu como resultado da queda, assim como todos os outros 15 passageiros. A morte de Hammarskjöld deflagrou uma crise de sucessão nas Nações Unidas, pois não havia linha de sucessão e, como resultado, o Conselho de Segurança teve que votar em um sucessor. As circunstâncias do acidente ainda não são claras. Um inquérito rodesiano de 1962 concluiu que a culpa foi de erro do piloto, enquanto uma investigação posterior da ONU não conseguiu determinar a causa do acidente."
    LEB_Crisis_1958.t:0 "A Crise do Líbano"
    LEB_Crisis_1958.d:0 "A crise do Líbano de 1958 foi uma crise política no Líbano causada por tensões políticas e religiosas no país, que incluiu uma intervenção militar americana, durando cerca de três meses, até que o Presidente Camille Chamoun, que havia solicitado a assistência, concluísse seu mandato como presidente do Líbano. As forças americanas e do governo libanês ocuparam o Porto de Beirute e o Aeroporto Internacional de Beirute. Com o fim da crise, os Estados Unidos se retiraram."
    ITA_SAN_1957.t:0 "Os Fatti di Rovereta?"
    ITA_SAN_1957.d:0 "Os fatti di Rovereta (o caso Rovereta) foram uma crise constitucional em San Marino em 1957, na qual o Grande e Geral Conselho foi deliberadamente privado de quórum para impedir a eleição programada dos Capitães-Regentes. Um governo provisório foi estabelecido na vila de Rovereta, em oposição aos Capitães-Regentes de saída, cujo mandato havia expirado. A Itália reconheceu o governo provisório, e os Carabinieri italianos protegeram os três lados da fábrica situada em seu território. Em 11 de outubro, a regência cedeu e reconheceu o governo provisório, encerrando a crise."
    HND_PAK_KAS_1999.t:0 "A Guerra de Kargil?"
    HND_PAK_KAS_1999.d:0 "A Guerra de Kargil foi travada entre a Índia e o Paquistão, de maio a julho de 1999, no distrito de Kargil, em Ladakh, então parte do estado de Jammu e Caxemira administrado pela Índia, e ao longo da Linha de Controle (LoC)."
    HND_PAK_KAS_2025.t:0 "A Crise Índia-Paquistão?"
    HND_PAK_KAS_2025.d:0 "Após o ataque terrorista de Pahalgam, em 22 de abril de 2025, uma crise surgiu entre a Índia e o Paquistão, provocada pelo assassinato de 25 turistas indianos por militantes na Caxemira. A Frente de Resistência (TRF) inicialmente assumiu a autoria do ataque. Escaramuças armadas entre a Índia e o Paquistão foram relatadas ao longo da Linha de Controle (LoC), começando em 24 de abril. Em 7 de maio de 2025, a Índia lançou ataques com mísseis no Paquistão, levando a um conflito militar entre os dois países. Em 7 de maio de 2025, o Exército do Paquistão respondeu lançando um ataque relâmpago sobre Poonch, Jammu, matando 16 civis e destruindo centenas de casas. Um cessar-fogo foi anunciado em 10 de maio de 2025, após um acordo entre a Índia e o Paquistão."
    SOV_ALB_Vlora_Incident.t:0 "O Incidente de Vlorë?"
    SOV_ALB_Vlora_Incident.d:0 "O incidente de Vlorë foi um confronto militar entre a Albânia e a União Soviética em 1961. O Exército Popular Albanês bloqueou a base naval de Vlorë, levando à apreensão de navios e equipamentos soviéticos. O incidente evidenciou o aumento das tensões diplomáticas entre as duas nações, resultando, em última análise, na expulsão das forças soviéticas da Albânia."
    SRL_TAE_civil_war_end.t:0 "A Ofensiva do Norte?"
    SRL_TAE_civil_war_end.d:0 "A Ofensiva do Norte do Exército do Sri Lanka (SLA) de 2008-2009 foi um conflito armado na Província do Norte do Sri Lanka entre os militares do Sri Lanka e os separatistas Tigres de Libertação do Eelam Tâmil (LTTE). A batalha começou com uma ofensiva do Exército do Sri Lanka (SLA) tentando romper as linhas de defesa do LTTE no norte da ilha, visando concluir a guerra civil de 25 anos do país por meio de vitória militar."
    USA_SOV_Great_Seal_Bug.t:0 "O Incidente do Grande Selo Grampeado"
    USA_SOV_Great_Seal_Bug.d:0 "Em 1945, escoteiros soviéticos presentearam o embaixador dos EUA em Moscou com um Grande Selo esculpido. Escondido dentro dele estava "A Coisa" (The Thing), um dispositivo de escuta passivo sem fonte de energia. Não detectado por sete anos, permitiu a espionagem soviética e marcou um marco na tecnologia de espionagem e vigilância da Guerra Fria. O grampo do Grande Selo foi exposto em 1952, sete anos após ter sido presenteado ao embaixador dos EUA em Moscou. Foi descoberto durante uma varredura de rotina do Departamento de Estado, revelando um dispositivo de escuta passivo escondido dentro do selo de madeira. O grampo do Grande Selo foi exibido publicamente nas Nações Unidas em 26 de maio de 1960, durante uma dramática apresentação do Embaixador americano Henry Cabot Lodge Jr. ao Conselho de Segurança da ONU."
    iraq_kuwait_showdown_1961.t:0 "A Crise Iraque-Kuwait"
    iraq_kuwait_showdown_1961.d:0 "Em 1958, Abdul Karim Qasim tomou o poder no Iraque. Era visto pelas potências ocidentais como imprevisível, e o Iraque como instável. Em 25 de junho de 1961, após a Grã-Bretanha renunciar à autoridade sobre o Kuwait, Qasim anunciou que o Kuwait seria incorporado ao Iraque, e a ameaça militar foi vista pela Grã-Bretanha como iminente."
    Operation_Vantage.t:0 "Operação Vantage?"
    Operation_Vantage_1.t:0 "Intervenção Britânica na Crise Iraque-Kuwait"
    Operation_Vantage.d:0 "A Operação Vantage foi uma operação militar britânica em 1961 para apoiar o recém-independente Estado do Kuwait contra reivindicações territoriais de seu vizinho, o Iraque. O Reino Unido reagiu a um pedido de proteção do Xeique Abdullah III Al-Salim Al-Sabah, do Kuwait, e forças aéreas, navais e terrestres foram posicionadas em questão de dias. O Iraque não atacou, e as forças britânicas foram substituídas pela Liga Árabe."
    Operation_Caban.t:0 "Operação Caban?"
    Operation_Caban.d:0 "A Operação Caban, também conhecida como o golpe de Estado centro-africano de 1979, foi uma operação militar incruenta do serviço de inteligência francês SDECE, em setembro de 1979, para depor o Imperador Bokassa I, reconduzir ao poder o exilado ex-presidente David Dacko, e renomear o Império Centro-Africano de volta a República Centro-Africana."
    FRA_NZL_Rainbow_Warrior_Incident.t:0 "O Afundamento do Rainbow Warrior?"
    FRA_NZL_Rainbow_Warrior_Incident.d:0 "Em 10 de julho de 1985, agentes secretos franceses bombardearam o navio do Greenpeace Rainbow Warrior em Auckland, Nova Zelândia, para impedir protestos contra os testes nucleares no Atol de Moruroa. A embarcação afundou, matando o fotógrafo Fernando Pereira. O ataque secreto, codinome Opération Satanique, provocou indignação global e tensionou as relações entre a França e a Nova Zelândia."
    FRA_NZL_Rainbow_Warrior_Incident_1.t:0 "O Afundamento do Rainbow Warrior"
    USA_Donroe_Doctrine_2026.t:0 "A Doutrina Donroe?"
    USA_Donroe_Doctrine_2026.d:0 "A Doutrina Donroe, alternativamente chamada de Corolário Trump à Doutrina Monroe, refere-se aos princípios da política externa do Presidente Donald Trump nas Américas. Uma adaptação da histórica Doutrina Monroe, descreve um desejo percebido da segunda administração Trump de afirmar a predominância americana no Hemisfério Ocidental."
    USA_VNZ_Overthrow_2026.t:0 "Operação Resolução Absoluta?"
    USA_VNZ_Overthrow_2026.d:0 "Em 3 de janeiro de 2026, os Estados Unidos lançaram um ataque militar na Venezuela e capturaram o então presidente venezuelano Nicolás Maduro e sua esposa, Cilia Flores. A operação americana, codinome Operação Resolução Absoluta, começou por volta das 2h, horário local, quando explosões foram observadas. As Forças Armadas dos EUA bombardearam infraestruturas em todo o norte da Venezuela para suprimir as defesas aéreas, enquanto uma força de captura atacava o complexo de Maduro em Caracas. Maduro e Flores foram transportados para a cidade de Nova York pelas forças dos EUA, para serem julgados lá."
    USA_PER_START.t:0 "O Acordo Nuclear do Irã?"
    USA_PER_START.d:0 "O Plano de Ação Conjunto Abrangente, também conhecido como acordo nuclear do Irã, foi um acordo para limitar o programa nuclear iraniano em troca do alívio de sanções e outras disposições. Sob o JCPOA, o Irã concordou em restringir seu programa nuclear, limitando as atividades do ciclo de combustível que pudessem levar à produção de urânio ou plutônio de grau armamentista. O JCPOA restringiu o número e o tipo de centrífugas em operação, o nível de enriquecimento de urânio e o tamanho do estoque de urânio enriquecido do Irã. Instalações-chave em Fordow, Natanz e Arak foram reconvertidas para usos civis, como pesquisa médica e industrial. O Irã concordou em aceitar medidas de monitoramento mais intrusivas da AIEA sobre suas atividades relacionadas ao ciclo de combustível."
    RUS_UKR_Minsk.t:0 "Os Acordos de Minsk?"
    RUS_UKR_Minsk.d:0 "Os Acordos de Minsk foram uma série de acordos internacionais que buscavam encerrar a guerra do Donbas, travada entre grupos separatistas russos armados e as Forças Armadas da Ucrânia, com as forças regulares russas desempenhando papel central. Após uma derrota em Ilovaisk, no final de agosto de 2014, a Rússia forçou a Ucrânia a assinar o primeiro Protocolo de Minsk, ou Minsk I. Este acordo consistia em um pacote de medidas, incluindo um cessar-fogo, a retirada de armas pesadas da linha de frente, a libertação de prisioneiros de guerra, uma reforma constitucional na Ucrânia concedendo autogoverno a certas áreas do Donbas, e a restauração do controle da fronteira estatal ao governo ucraniano."
    YUG_ITA_Treaty_of_Osimo.t:0 "O Tratado de Osimo?"
    YUG_ITA_Treaty_of_Osimo.d:0 "O Tratado de Osimo foi assinado em 10 de novembro de 1975 pela Itália e pela Iugoslávia, em Osimo, Itália, para dividir definitivamente o Território Livre de Trieste entre os dois Estados: a cidade portuária de Trieste, com uma estreita faixa costeira a noroeste (Zona A), foi entregue à Itália; uma parte da porção noroeste da península de Ístria (Zona B) foi entregue à Iugoslávia. "
    Korean_Armistice_Agreement_1953.t:0 "O Acordo de Armistício Coreano?"
    Korean_Armistice_Agreement_1953.d:0 "O Acordo de Armistício Coreano é um armistício que resultou na cessação das hostilidades da Guerra da Coreia. Foi assinado pelo Tenente-General do Exército dos EUA William Harrison Jr. e pelo General Mark W. Clark, representando o Comando das Nações Unidas (UNC), pelo líder norte-coreano Kim Il Sung e pelo General Nam Il, representando o Exército Popular da Coreia (KPA), e por Peng Dehuai, representando o Exército de Voluntários do Povo Chinês (PVA). O armistício foi assinado em 27 de julho de 1953, e foi concebido para "garantir a cessação completa das hostilidades e de todos os atos de força armada na Coreia até que um acordo de paz final seja alcançado"."

