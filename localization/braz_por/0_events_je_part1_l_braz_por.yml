    single_party_state_de_facto.t: "O Estado de Partido Único"
    single_party_state_de_facto.d: "Com a proibição de todos(as) os(as) [Concept('concept_interest_group', '$concept_interest_groups$')] da [concept_opposition] de ingressar em um(a) [concept_party], o(a) [concept_government] efetivamente criou um Estado de Partido Único em [ROOT.GetCountry.GetName]."
