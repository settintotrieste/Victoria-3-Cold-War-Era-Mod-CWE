    je_reserved_powers:0 "O(A) [SCOPE.GetRootScope.GetCountry.GetCustom('government_ceremonial_body_custom_title')]"
    je_reserved_powers_reason:0 "Segundo a Constituição de [ROOT.GetCountry.GetName], o(a) [SCOPE.GetRootScope.GetCountry.GetCustom('government_ceremonial_body_custom_title')] possui um direito de veto limitado sobre quaisquer projetos de lei aprovados no(a) [SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')]. No entanto, embora o(a) [SCOPE.GetRootScope.GetCountry.GetCustom('government_ceremonial_body_custom_title')] possa vetar o projeto, o veto pode ser posteriormente revogado por votação de maioria no(a) [SCOPE.GetRootScope.GetCountry.GetCustom('legislature_name')].\n\n#BOLD [SCOPE.sCharacter('ceremonial_head_of_state').GetPrimaryRoleTitle]:#! [SCOPE.sCharacter('ceremonial_head_of_state').GetFullName] ([SCOPE.sCharacter('ceremonial_head_of_state').GetInterestGroup.GetName]) \n\nNota: O(A) [SCOPE.sCharacter('ceremonial_head_of_state').GetPrimaryRoleTitle] vetará qualquer [Concept('concept_law','$concept_laws$')] que esteja sendo [Concept('concept_enactment_of_laws', '$concept_enactment_of_laws_enacted$')] pelo(a) [concept_government], se o(a) [SCOPE.sCharacter('ceremonial_head_of_state').GetInterestGroup.GetName] #r Desaprovar#! ou #r Desaprovar Fortemente#! a(o) [concept_law]. \n\nNota: Este(a) [concept_journal_entry] pode ser removido(a) revogando a(o) [concept_law] [GetLawType('law_hybrid_chamber').GetName]."

