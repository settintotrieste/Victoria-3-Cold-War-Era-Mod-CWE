    portuguese_macau.sgc.t:0 "Devolução em Macau?"
    portuguese_macau.sgc.d:0 "Após a revolução de 1974 em Portugal, uma política de descolonização abriu caminho para a retrocessão de Macau à República Popular da China (RPC). Em 17 de fevereiro de 1976, o parlamento português aprovou o Estatuto Orgânico de Macau, que a definia como um "território sob administração portuguesa". Esse termo também foi incluído na constituição portuguesa de 1976, substituindo a designação de Macau como província ultramarina. Ao contrário das constituições anteriores, Macau não foi incluída como parte integrante do território português."

