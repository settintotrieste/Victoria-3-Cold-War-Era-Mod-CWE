    je_G8_system:0 "O Grupo dos [GetPlayer.MakeScope.Var('G8_members_counter').GetValue]"
    je_G8_system_reason:0 "O Grupo dos [GetPlayer.MakeScope.Var('G8_members_counter').GetValue] é um fórum político e econômico intergovernamental composto por [Concept('concept_major_power','$concept_major_powers$')] democráticas. \n\nOriginado de uma reunião ad hoc de ministros das finanças, o G[GetPlayer.MakeScope.Var('G8_members_counter').GetValue] desde então se tornou um espaço formal e de alto perfil para discutir e coordenar soluções para grandes questões globais, especialmente nas áreas de comércio, segurança, economia e mudança climática. \n\nO G[GetPlayer.MakeScope.Var('G8_members_counter').GetValue] não se baseia em um tratado e não possui secretariado ou escritório permanente. É organizado por meio de uma presidência que se reveza anualmente entre os Estados-membros, com o Estado presidente definindo as prioridades do grupo e sediando a cúpula."

