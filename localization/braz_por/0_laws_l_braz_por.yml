l_braz_por:

    law_no_term_limit:0 "Sem Limite de Mandato"
    law_no_term_limit_desc:0 "O(a) [concept_ruler] pode permanecer no cargo por um número ilimitado de mandatos."
    law_yes_term_limit:0 "Mandato Limitado"
    law_yes_term_limit_desc:0 "O(a) [concept_ruler] não pode permanecer no cargo além de um número determinado de anos."

    law_peasant_levies_additional_effects:0 ""

    law_command_economy:0 "Economia Totalmente Planificada"
    law_semi_command_economy:0 "Economia Parcialmente Planificada"
    law_semi_command_economy_desc:0 "Esta é uma forma de sistema econômico em que o governo possui e controla todas as empresas, mas parte das decisões operacionais é deixada a cargo dos trabalhadores."
    law_social_capitalism:0 "Capitalismo Social"
    law_social_capitalism_desc:0 "O Capitalismo Social é um modelo socioeconômico que combina um sistema econômico capitalista de livre mercado com políticas sociais e regulamentação suficiente para estabelecer uma concorrência justa dentro do mercado."

    law_total_separation:0 "Separação Total"

    law_unitary_state:0 "Estado Unitário Centralizado"
    law_unitary_state_desc:0 "Um estado unitário centralizado é um Estado soberano governado como uma entidade única, no qual o governo central é a autoridade suprema."
    law_devolved_state:0 "Estado Unitário Descentralizado"
    law_devolved_state_desc:0 "Um estado unitário descentralizado é um país no qual o governo central detém a autoridade suprema, mas delegou alguns poderes a níveis inferiores de governo, como províncias ou municípios. Isso é diferente de um estado unitário centralizado, no qual o governo central mantém todo o poder significativo."
    law_federal_state:0 "Estado Federal"
    law_federal_state_desc:0 "Um estado federal é uma entidade caracterizada por uma união de províncias, estados ou outras regiões parcialmente autônomas sob um governo federal."
    law_politicised_judiciary:0 "Judiciário Politizado"
    law_politicised_judiciary_desc:0 "Os juízes são nomeados diretamente pelo poder executivo."
    law_partially_politicised_judiciary:0 "Judiciário Semi-independente"
    law_partially_politicised_judiciary_desc:0 "Os juízes são nomeados conjuntamente pelos poderes executivo e legislativo."
    law_independent_judiciary:0 "Judiciário Independente"
    law_independent_judiciary_desc:0 "As nomeações de juízes são livres de qualquer interferência dos poderes executivo e legislativo."

    law_no_voting:0 "Sem Eleições"
    law_no_voting_desc:0 "O país não realiza [Concept('concept_election','$concept_elections$')], sendo a liderança determinada por outros meios."
    law_rigged_voting:0 "Eleições Controladas"
    law_rigged_voting_desc:0 "Os resultados das eleições são administrados para garantir apoio constante ao governo."
    law_gerrymandered_voting:0 "Manipulação de Distritos Eleitorais"
    law_gerrymandered_voting_desc:0 "Os distritos eleitorais são delimitados de forma a beneficiar estruturalmente o partido governante."
    law_harassment_voting:0 "Campanha Restritiva"
    law_harassment_voting_desc:0 "As normas e práticas de campanha colocam os candidatos da oposição em desvantagem."
    law_fair_voting:0 "Eleições Abertas"
    law_fair_voting_desc:0 "A votação e a campanha são conduzidas segundo regras transparentes e equitativas."

    law_first_past_the_post:0 "Maioria Simples"
    law_first_past_the_post_desc:0 "A votação por maioria simples é um sistema de votação pluralista no qual os eleitores votam em um único candidato, e o candidato com mais votos vence a eleição. \n\n@information! Esta [concept_law] incentiva [Concept('concept_interest_group', '$concept_interest_groups$')] mais fracos a se alinharem com [Concept('concept_party', '$concept_parties$')] mais fortes, apesar das diferenças ideológicas."
    law_jefferson_system:0 "Método de Jefferson"
    law_jefferson_system_desc:0 "O método de Jefferson é um método de rateio para a distribuição de cadeiras em parlamentos. Após a apuração de todos os votos, sucessivos quocientes são calculados para cada partido. O partido com o maior quociente ganha uma cadeira, e seu quociente é recalculado. Isso se repete até que o número necessário de cadeiras seja preenchido. \n\n@information! Esta [concept_law] incentiva [Concept('concept_interest_group', '$concept_interest_groups$')] mais fracos a se alinharem com [Concept('concept_party', '$concept_parties$')] mais fortes, apesar das diferenças ideológicas."
    law_propotional_representation:0 "Representação Proporcional"
    law_propotional_representation_desc:0 "Representação proporcional refere-se a qualquer tipo de sistema eleitoral no qual subgrupos de um eleitorado são refletidos proporcionalmente no órgão eleito."

    law_first_past_the_post_additional_effects:0 "@information! Isso altera a composição do #y Legislativo#!."
    law_jefferson_system_additional_effects:0 "@information! Isso altera a composição do #y Legislativo#!."
    law_propotional_representation_additional_effects:0 "@information! Isso altera a composição do #y Legislativo#!."

    law_parties_not_allowed:0 "Partidos Políticos Proibidos"
    law_parties_not_allowed_desc:0 "Nenhum partido político pode ser registrado no país. \n\n@information! Se este [concept_country] tiver [Concept('concept_party', '$concept_parties$')], eles serão convertidos em [Concept('concept_political_faction', '$concept_political_factions$')]."
    law_single_party_state:0 "Estado de Partido Único"
    law_single_party_state_desc:0 "O Estado é governado por um único partido político legal, que detém o monopólio de toda a atividade política dentro da nação. \n\n@information! Se este [concept_country] tiver [Concept('concept_election','$concept_elections$')], as eleições serão realizadas como [Concept('concept_non_competitive_election','$concept_non_competitive_elections$')]. Tais eleições serão conduzidas por um [concept_journal_entry] especial."
    law_dominant_party_state:0 "Sistema de Partido Dominante"
    law_dominant_party_state_desc:0 "Embora vários partidos políticos possam existir no país, o partido governante exerce grande influência sobre toda a atividade política da nação. \n\n@information! Sob esta [concept_law], apenas [Concept('concept_interest_group', '$concept_interest_groups$')] que estejam no [concept_government] ou tenham mais de #y 10%#! de [concept_clout] podem ingressar em [Concept('concept_party', '$concept_parties$')]."
    law_parties_allowed:0 "Sistema Multipartidário"
    law_parties_allowed_desc:0 "Qualquer partido político pode se registrar junto à comissão eleitoral e concorrer nas eleições."

    concept_non_competitive_election:0 "Eleição Não Competitiva"
    concept_non_competitive_elections:0 "Eleições Não Competitivas"
    concept_non_competitive_election_desc:0 "Eleições não competitivas são [Concept('concept_election','$concept_elections$')] nas quais apenas candidatos filiados e aprovados pelo [concept_government] podem concorrer a cargos."
    concept_political_faction:0 "Facção Política"
    concept_political_factions:0 "Facções Políticas"
    concept_political_faction_desc:0 "Alianças e facções políticas informais ocupam o lugar de [Concept('concept_party', '$concept_parties$')] formais em um [concept_country] onde [Concept('concept_party', '$concept_parties$')] são proibidos. \n\nContudo, devido aos mecanismos de [Concept('concept_election','$concept_elections$')] do jogo, que exigem partidos para que um [concept_interest_group] receba [concept_votes], as facções políticas são representadas por [Concept('concept_interest_group', '$concept_interest_groups$')] que ingressam em [Concept('concept_party', '$concept_parties$')] do tipo #y "Facção Política"#!. \n\nEsses [Concept('concept_party', '$concept_parties$')] do tipo #y "Facção Política"#! não se beneficiam de certos mecanismos que simulam partidos formais, como a capacidade de proibir partidos."

    law_appointed_legislature:0 "Legislativo Subordinado"
    law_appointed_legislature_desc:0 "O legislativo funciona principalmente como um órgão consultivo, com independência limitada em relação ao executivo."
    law_technocratic_legislature:0 "Legislativo Limitado"
    law_technocratic_legislature_desc:0 "O legislativo exerce um papel restrito, equilibrando a supervisão com a deferência à autoridade executiva."
    law_democratic_legislature:0 "Legislativo Forte"
    law_democratic_legislature_desc:0 "O legislativo detém autoridade significativa, servindo como uma instituição central na governança e na responsabilização pública."

    law_appointed_legislature_additional_effects:0 "@information! Esta [concept_law] pode alterar o [concept_government_type] do(a) [concept_country]."
    law_technocratic_legislature_additional_effects:0 "@information! Esta [concept_law] pode alterar o [concept_government_type] do(a) [concept_country]."
    law_democratic_legislature_additional_effects:0 "@information! Esta [concept_law] pode alterar o [concept_government_type] do(a) [concept_country]."

    law_unicameralism:0 "Legislativo Unicameral"
    law_hybrid_chamber:0 "Legislativo Híbrido"
    law_bicameralism:0 "Legislativo Bicameral"
    law_unicameralism_desc:0 "O unicameralismo é um tipo de legislativo composto por uma única câmara ou assembleia, que legisla e vota como uma unidade."
    law_hybrid_chamber_desc:0 "O país possui um legislativo unicameral com um Chefe de Estado majoritariamente cerimonial, ou um órgão executivo independente do(a) [concept_ruler] que possui poder de veto sobre as leis aprovadas pelo [concept_government]."
    law_bicameralism_desc:0 "O bicameralismo é um tipo de legislativo dividido em duas assembleias, câmaras ou casas separadas, conhecido como legislativo bicameral."

    law_politicised_bureaucrats:0 "Burocratas Politizados"
    law_politicised_bureaucrats_desc:0 "Todos os servidores públicos são selecionados pelo governo com base em sua lealdade."
    law_elitist_bureaucrats:0 "Burocratas Elitistas"
    law_elitist_bureaucrats_desc:0 "Todos os servidores públicos são selecionados pelas elites do serviço civil."
    law_professional_bureaucrats:0 "Burocratas Profissionais"
    law_professional_bureaucrats_desc:0 "Todos os servidores públicos são selecionados por meio de um processo de recrutamento livre e justo, baseado no mérito de cada pessoa."

    law_professional_bureaucrats_additional_effects:0 "@warning! [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetNameWithCountryVariant] não pode ingressar em nenhum [Concept('concept_party', '$concept_parties$')] sob esta [concept_law]."

    law_weak_financial_regulations:0 "Regulamentação Financeira Fraca"
    law_moderate_financial_regulations:0 "Regulamentação Financeira Equilibrada"
    law_strong_financial_regulations:0 "Regulamentação Financeira Forte"

    lawgroup_company_regulations:0 "Regulamentação Empresarial"

    law_weak_company_regulations:0 "Regulamentação Empresarial Fraca"
    law_moderate_company_regulations:0 "Regulamentação Empresarial Equilibrada"
    law_strong_company_regulations:0 "Regulamentação Empresarial Forte"

    law_weak_company_regulations_desc:0 "Um arcabouço permissivo com fiscalização mínima, concedendo às empresas ampla liberdade, mas oferecendo proteções limitadas a trabalhadores e consumidores."
    law_moderate_company_regulations_desc:0 "Um arcabouço equilibrado com fiscalização razoável, garantindo práticas justas e mantendo a flexibilidade das operações empresariais."
    law_strong_company_regulations_desc:0 "Um arcabouço rigoroso com ampla fiscalização, priorizando os direitos dos trabalhadores e a proteção dos consumidores, embora imponha restrições significativas às empresas."

    law_HOS_monarch:0 "$law_monarchy$"
    law_HOS_monarch_desc:0 "$law_monarchy_desc$"
    law_HOS_president:0 "$law_presidential_republic$"
    law_HOS_president_desc:0 "$law_presidential_republic_desc$"
    law_HOS_religious_leader:0 "$law_theocracy$"
    law_HOS_religious_leader_desc:0 "$law_theocracy_desc$"
    law_HOS_nationalist_leader:0 "Regime Militar"
    law_HOS_nationalist_leader_desc:0 "Este é um [concept_government_type] no qual o poder político está concentrado nas mãos das $ig_armed_forces$ do país."
    law_HOS_communist_leader:0 "República Socialista"
    law_HOS_communist_leader_desc:0 "$law_council_republic_desc$"

    law_HOG_none:0 "Executivo Unificado"
    law_HOG_none_desc:0 "O(a) [concept_ruler] é, ao mesmo tempo, o Chefe de Estado e o Chefe de Governo."
    law_HOG_prime_minister:0 "Executivo Separado"
    law_HOG_prime_minister_desc:0 "O(a) [concept_ruler] é o Chefe de Governo, enquanto uma figura separada exerce o papel cerimonial de Chefe de Estado."
    law_HOG_president_prime_minister:0 "Executivo Compartilhado"
    law_HOG_president_prime_minister_desc:0 "Os poderes executivos são divididos entre o(a) [concept_ruler], que é o Chefe de Estado, e o Chefe de Governo."

    law_nepotistic_cabinet:0 "Gabinete Nepotista"
    law_nepotistic_cabinet_desc:0 "O Gabinete é composto exclusivamente por amigos e familiares do(a) governante."
    law_semi_nepotistic_cabinet:0 "Gabinete Semi-Nepotista"
    law_semi_nepotistic_cabinet_desc:0 "O Gabinete é parcialmente composto por amigos e familiares do(a) governante."
    law_meritocratic_cabinet:0 "Gabinete Meritocrático"
    law_meritocratic_cabinet_desc:0 "Os membros do Gabinete são selecionados com base em suas habilidades, e não em suas conexões com o(a) governante."

    law_executive_supremacy:0 "Supremacia do Executivo"
    law_executive_supremacy_desc:0 "O legislativo e o judiciário não podem anular uma decisão do poder executivo."
    law_legislative_supremacy:0 "Supremacia Parlamentar"
    law_legislative_supremacy_desc:0 "O executivo e o judiciário não podem anular uma decisão do poder legislativo."
    law_constitutional_supremacy:0 "Supremacia Constitucional"
    law_constitutional_supremacy_desc:0 "A constituição é a lei suprema do país e não pode ser violada, exceto por meio de uma emenda constitucional aprovada pelo legislativo."

    law_kangaroo_law:0 "Judiciário Complacente"
    law_kangaroo_law_desc:0 "O judiciário não tem permissão para anular decisões dos poderes executivo ou legislativo."
    law_civil_law:0 "Judiciário Fraco"
    law_civil_law_desc:0 "O judiciário tem permissão para anular certos tipos de ações executivas e [Concept('concept_law','$concept_laws$')] não constitucionais."
    law_common_law:0 "Judiciário Poderoso"
    law_common_law_desc:0 "O judiciário tem pleno poder para anular ações executivas e [Concept('concept_law','$concept_laws$')]."

    law_peasant_levies:0 "Desmilitarizado"
    law_peasant_levies_desc:0 "O Estado não tem permissão para manter um exército permanente."
    law_mass_conscription:0 "Exército de Recrutas"
    law_mass_conscription_desc:0 "As forças armadas são compostas tanto por militares profissionais quanto por recrutas."

    law_ethnostate:0 "Estado Étnico"
    law_national_supremacy:0 "Supremacia Nacional"
    law_multicultural:0 "Multiculturalismo"

    law_no_womens_rights:0 "Sem Direitos das Mulheres"
    law_no_womens_rights_desc:0 "As mulheres têm todos os direitos legais negados, sendo excluídas da posse de propriedade, do emprego e da participação política."
    law_women_own_property:0 "Direitos Limitados das Mulheres"
    law_women_own_property_desc:0 "As mulheres podem possuir propriedades e exercer direitos legais básicos, mas continuam excluídas da maior parte do emprego e da participação política."
    law_women_in_the_workplace:0 "Direitos Iguais para as Mulheres"
    law_women_in_the_workplace_desc:0 "As mulheres gozam de direitos iguais na posse de propriedade, no emprego e na condição jurídica, embora a participação política ainda possa ser restringida por realidades práticas."
    law_womens_suffrage:0 "Ação Afirmativa para Mulheres"
    law_womens_suffrage_desc:0 "As políticas promovem ativamente a participação das mulheres na política, no emprego e na educação. Medidas como cotas e programas direcionados garantem representação e igualdade de oportunidades para além da igualdade jurídica formal."

    law_outlawed_dissent:0 "Sem Liberdade de Expressão"
    law_censorship:0 "Discurso Censurado"
    law_limited_free_speech:0 "Liberdade de Expressão Limitada"
    law_limited_free_speech_desc:0 "$law_right_of_assembly_desc$"
    law_full_free_speech:0 "Liberdade de Expressão Plena"
    law_full_free_speech_desc:0 "$law_protected_speech_desc$"

    law_no_secret_police:0 "Sem Polícia Secreta"
    law_no_secret_police_desc:0 "Não há polícia secreta no país."
    law_secret_police:0 "Polícia Secreta"

    law_no_espionage:0 "Sem Serviços de Inteligência Estrangeira"
    law_no_espionage_desc:0 "O Estado não possui nenhum serviço de inteligência estrangeira."
    law_defensive_espionage:0 "Apenas Espionagem Defensiva"
    law_defensive_espionage_desc:0 "O Estado possui um serviço de inteligência estrangeira com poderes para combater a influência e as atividades estrangeiras no país."
    law_offensive_espionage:0 "Espionagem Ofensiva Permitida"
    law_offensive_espionage_desc:0 "O Estado possui um serviço de inteligência estrangeira com poderes para combater a influência e as atividades estrangeiras no país e conduzir espionagem hostil contra outros países."

    law_lenient_policing:0 "Policiamento Brando"
    law_lenient_policing_desc:0 "Os poderes de aplicação da lei e investigação da polícia são fortemente inclinados a favor do acusado."
    law_balanced_policing:0 "Policiamento Equilibrado"
    law_balanced_policing_desc:0 "Os poderes de aplicação da lei e investigação da polícia são equilibrados em relação aos interesses do acusado."
    law_strict_policing:0 "Policiamento Rígido"
    law_strict_policing_desc:0 "Os poderes de aplicação da lei e investigação da polícia são inclinados a favor da própria polícia."
    law_draconian_policing:0 "Policiamento Draconiano"
    law_draconian_policing_desc:0 "Prisioneiros e acusados estão inteiramente à mercê da polícia."

    law_slavery_banned:0 "Sem Campos de Concentração"
    law_slavery_banned_desc:0 "Não há campos de concentração no país."
    law_slavery_political:0 "Gulags"
    law_slavery_political_desc:0 "Dissidentes políticos são presos em vastos campos de concentração e submetidos a trabalhos forçados."
    law_slavery_cultural:0 "Repressão Cultural"
    law_slavery_cultural_desc:0 "O governo reprime sistematicamente qualquer pessoa discriminada por [concept_culture] ou [concept_religion] no país."

    law_colonial_resettlement:0 "Construção Nacional Colonial"
    law_colonial_resettlement_desc:0 "As colônias devem ser desenvolvidas tanto industrial quanto politicamente."
    law_colonial_exploitation_desc:0 "As colônias são usadas apenas para a extração de recursos, e nenhum direito político será concedido aos nativos."

    law_trade_unions_banned:0 "Sindicatos Proibidos"
    law_trade_unions_banned_desc:0 "Nenhum sindicato é permitido no país."
    law_state_trade_unions:0 "Apenas Sindicatos Estatais"
    law_state_trade_unions_desc:0 "Apenas sindicatos controlados pelo Estado são permitidos no país."
    law_restricted_trade_unions:0 "Sindicatos Limitados"
    law_restricted_trade_unions_desc:0 "Sindicatos independentes são permitidos, mas seus poderes são restringidos."
    law_full_trade_unions:0 "Sindicatos Irrestritos"
    law_full_trade_unions_desc:0 "Sindicatos independentes são permitidos, e seus poderes para realizar ações reivindicatórias são irrestritos."

    law_no_war:0 "País Neutro"
    law_no_war_desc:0 "Não temos permissão para declarar guerra ou ingressar em qualquer aliança militar ou política internacional."
    law_defensive_war:0 "Apenas Guerras Defensivas"
    law_defensive_war_desc:0 "Temos permissão para declarar apenas certos tipos de guerra."
    law_offensive_war:0 "Plenos Direitos de Guerra"
    law_offensive_war_desc:0 "Não há restrições quanto ao tipo de guerra que podemos iniciar."

    law_wmd_banned:0 "ADMs Proibidas"
    law_wmd_banned_desc:0 "Não temos permissão para desenvolver ou possuir armas de destruição em massa."
    law_wmd_allowed:0 "ADMs Permitidas"
    law_wmd_allowed_desc:0 "Temos permissão para desenvolver ou possuir armas de destruição em massa."

    law_no_civil_defence_law:0 "Sem Defesa Civil"
    law_very_weak_civil_defence_law:0 "Defesa Civil Muito Fraca"
    law_weak_civil_defence_law:0 "Defesa Civil Fraca"
    law_moderate_civil_defence_law:0 "Defesa Civil Moderada"
    law_strong_civil_defence_law:0 "Defesa Civil Forte"
    law_very_strong_civil_defence_law:0 "Defesa Civil Muito Forte"

    law_no_space_program:0 "Sem Programa Espacial"
    law_space_program_public:0 "Programa Espacial Público"
    law_space_program_private:0 "Programa Espacial Privado"

    law_no_social_security:0 "Sem Previdência Social"
    law_low_social_security:0 "Previdência Social Fraca"
    law_low_social_security_desc:0 "$law_poor_laws_desc$"
    law_medium_social_security:0 "Previdência Social Moderada"
    law_medium_social_security_desc:0 "$law_wage_subsidies_desc$"
    law_high_social_security:0 "Previdência Social Forte"
    law_high_social_security_desc:0 "$law_old_age_pension_desc$"

    law_very_low_anti_corruption:0 "Leis Anticorrupção Muito Fracas"
    law_very_low_anti_corruption_desc:0 "A corrupção é praticamente legalizada."
    law_low_anti_corruption:0 "Leis Anticorrupção Fracas"
    law_low_anti_corruption_desc:0 "Apenas as piores formas de corrupção são proibidas."
    law_medium_anti_corruption:0 "Leis Anticorrupção Razoáveis"
    law_medium_anti_corruption_desc:0 "A corrupção é parcialmente proibida."
    law_high_anti_corruption:0 "Leis Anticorrupção Fortes"
    law_high_anti_corruption_desc:0 "A maioria dos tipos de corrupção é proibida por lei."
    law_very_high_anti_corruption:0 "Leis Anticorrupção Muito Fortes"
    law_very_high_anti_corruption_desc:0 "Qualquer tipo de corrupção é proibido por lei."

    law_state_capitalism:0 "Capitalismo de Estado"

    law_gold_standard:0 "Padrão-Ouro"
    law_gold_standard_desc:0 "O padrão-ouro é um sistema monetário no qual a unidade econômica padrão de conta é baseada em uma quantidade fixa de ouro."
    law_semi_gold_standard:0 "Padrão-Ouro Parcial"
    law_semi_gold_standard_desc:0 "Um padrão-ouro parcial é um sistema monetário no qual a unidade econômica padrão de conta é baseada em uma quantidade fixa de ouro e em uma quantidade fixa de uma moeda estrangeira."
    law_fiat_standard:0 "Padrão Fiduciário"
    law_fiat_standard_desc:0 "A moeda fiduciária é um tipo de moeda que não é lastreada por um metal precioso, como ouro ou prata, nem por qualquer outro ativo tangível ou mercadoria."

    law_no_economic_specialisation:0 "Sem Especialização Econômica"
    law_natural_resource_focus:0 "Foco em Recursos Naturais"
    law_manufacturing_focus:0 "Foco Industrial"
    law_services_focus:0 "Foco no Setor de Serviços"

    law_taxation_1:0 "Impostos Muito Regressivos"
    law_taxation_1_desc:0 "As leis tributárias favorecem fortemente os ricos."
    law_taxation_2:0 "Impostos Regressivos"
    law_taxation_2_desc:0 "As leis tributárias favorecem os ricos."
    law_taxation_3:0 "Impostos Proporcionais"
    law_taxation_3_desc:0 "As leis tributárias não favorecem nem os ricos nem os pobres."
    law_taxation_4:0 "Impostos Progressivos"
    law_taxation_4_desc:0 "As leis tributárias favorecem os pobres às custas dos ricos."
    law_taxation_5:0 "Impostos Muito Progressivos"
    law_taxation_5_desc:0 "As leis tributárias favorecem maciçamente os pobres às custas dos ricos."

    law_very_deflationary_monetary_policy:0 "Política Monetária Muito Deflacionária"
    law_very_deflationary_monetary_policy_desc:0 "A Política Monetária Muito Deflacionária visa reduzir a oferta de moeda e aumentar as taxas de juros para combater a inflação, reduzindo a demanda agregada e desaquecendo a economia."
    law_deflationary_monetary_policy:0 "Política Monetária Deflacionária"
    law_deflationary_monetary_policy_desc:0 "A Política Monetária Deflacionária visa reduzir a oferta de moeda e aumentar as taxas de juros para combater a inflação, reduzindo a demanda agregada e desaquecendo a economia."
    law_neutral_monetary_policy:0 "Política Monetária Neutra"
    law_neutral_monetary_policy_desc:0 "A Política Monetária Neutra é a taxa de juros que nem estimula nem restringe o crescimento econômico, buscando um equilíbrio entre inflação e crescimento."
    law_expansionary_monetary_policy:0 "Política Monetária Expansionista"
    law_expansionary_monetary_policy_desc:0 "A Política Monetária Expansionista, implementada pelos bancos centrais, visa estimular o crescimento econômico por meio do aumento da oferta de moeda e da redução das taxas de juros, incentivando o crédito e o consumo."
    law_very_expansionary_monetary_policy:0 "Política Monetária Muito Expansionista"
    law_very_expansionary_monetary_policy_desc:0 "A Política Monetária Muito Expansionista, implementada pelos bancos centrais, visa estimular o crescimento econômico por meio do aumento da oferta de moeda e da redução das taxas de juros, incentivando o crédito e o consumo."

    law_charitable_health_system:0 "Saúde Privada"
    law_private_health_insurance:0 "Saúde Subsidiada"
    law_public_health_insurance:0 "Saúde Gratuita"

    law_charitable_health_system_desc:0 "A saúde é fornecida por meio de instituições beneficentes e sem fins lucrativos. O acesso depende de doações e do apoio da comunidade, o que deixa a cobertura desigual e, muitas vezes, limitada."
    law_private_health_insurance_desc:0 "O atendimento médico é financiado por planos de seguro privados. Os cidadãos devem pagar prêmios, e o acesso reflete a riqueza e o emprego, reforçando as divisões sociais."
    law_public_health_insurance_desc:0 "O Estado garante saúde para todos. Financiado por recursos públicos, esse sistema assegura acesso universal, remodelando a sociedade em torno do bem-estar coletivo e da segurança."

    law_religious_schools:0 "Educação Privada"
    law_private_schools:0 "Educação Subsidiada"
    law_public_schools:0 "Educação Gratuita"

    law_religious_schools_desc:0 "A educação é confiada a instituições privadas, frequentemente guiadas por tradições religiosas ou comunitárias. O acesso é limitado, e os currículos refletem os valores de quem os financia."
    law_private_schools_desc:0 "As escolas recebem apoio parcial do Estado, mantendo a gestão privada. Esse equilíbrio amplia o acesso, mas preserva a influência das elites sobre a educação."
    law_public_schools_desc:0 "O Estado garante educação gratuita para todas as crianças. O acesso universal remodela a sociedade, promovendo a alfabetização, a identidade cívica e a mobilidade social."

