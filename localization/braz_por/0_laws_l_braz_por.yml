    law_social_hierarchy_0_enforced_desc:0 "Há poucos ou nenhum programa para ajudar grupos marginalizados a ascender na escala social."
    law_social_hierarchy_0_codified_desc:0 "Há alguns programas para ajudar grupos marginalizados a ascender na escala social."
    law_social_hierarchy_0_not_enforced_desc:0 "Há muitos programas para ajudar grupos marginalizados a ascender na escala social, e a proibição da discriminação baseada em classe está consagrada em lei."
