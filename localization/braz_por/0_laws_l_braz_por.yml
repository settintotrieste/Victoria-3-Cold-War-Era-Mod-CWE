    law_child_labor_allowed_desc:0 "Todas as crianças devem cursar vários anos de ensino primário, durante os quais é proibido trabalhar."
    law_restricted_child_labor:0 "Ensino Secundário Obrigatório"
    law_restricted_child_labor_desc:0 "Todos os menores devem primeiro obter o diploma do ensino médio antes de terem permissão para trabalhar."
    law_compulsory_primary_school:0 "Ensino Superior Obrigatório"
    law_compulsory_primary_school_desc:0 "Todos os menores devem primeiro obter uma qualificação de ensino superior antes de terem permissão para trabalhar."

    #DESC#

    #Leis de Especialização Econômica
    law_no_economic_specialisation_desc:0 "Esta nação não se especializa em uma indústria específica."
    law_natural_resource_focus_desc:0 "Esta nação se especializa na extração de seus recursos naturais."
    law_manufacturing_focus_desc:0 "Esta nação se especializa em sua indústria manufatureira."
    law_services_focus_desc:0 "Esta nação se especializa em seu setor de serviços."

    #Leis do Sistema Econômico
    law_state_capitalism_desc:0 "Um sistema econômico no qual o Estado assume a atividade econômica empresarial e comercial, e no qual os meios de produção são nacionalizados como empresas estatais"

    #Política Energética
    law_no_nuclear_energy_desc:0 "A energia nuclear não é permitida."
    law_nuclear_energy_desc:0 "A energia nuclear é permitida."

    #Política Ambiental
    law_no_environment_law_desc:0 "O governo não possui nenhuma regulamentação ou lei de proteção ao meio ambiente."
    law_weak_environment_law_desc:0 "O governo possui regulamentações ou leis relativamente fracas de proteção ao meio ambiente."
    law_moderate_environment_law_desc:0 "O governo possui regulamentações ou leis moderadas de proteção ao meio ambiente."
    law_strong_environment_law_desc:0 "O governo possui regulamentações ou leis rigorosas de proteção ao meio ambiente."

    #Regulamentação Financeira
    law_weak_financial_regulations_desc:0 "O governo possui leis e regulamentações financeiras fracas."
    law_moderate_financial_regulations_desc:0 "O governo possui leis e regulamentações financeiras moderadas."
    law_strong_financial_regulations_desc:0 "O governo possui leis e regulamentações financeiras rigorosas."

    #Política Externa
    law_nationalist_fp_desc:0 "Uma política externa focada exclusivamente nos esforços internos da nação."
    law_regionalist_fp_desc:0 "Uma política externa que busca construir relações com os vizinhos regionais da nação."
    law_globalist_fp_desc:0 "Uma política externa que busca construir relações com o mundo interconectado em geral."

    #Regulamentação Industrial
    law_pro_consumer_regulations_desc:0 "O governo possui regulamentações que favorecem o consumidor em detrimento da indústria."
    law_balanced_regulations_desc:0 "O governo possui regulamentações que buscam equilibrar os direitos dos consumidores e da indústria."
    law_pro_industry_regulations_desc:0 "O governo possui regulamentações que favorecem o setor industrial em detrimento do consumidor."

    #Política Monetária
    law_deflationary_monetary_policy_desc:0 "O governo busca equilibrar o orçamento nacional."

