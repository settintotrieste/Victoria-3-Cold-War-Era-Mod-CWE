    lawgroup_foreign_investment_policy:0 "Política de Investimento Estrangeiro"

    law_no_foreign_investment_policy:0 "Investimento Estrangeiro Proibido"
    law_nationalist_foreign_investment_policy:0 "Investimento Estrangeiro Restrito"
    law_full_foreign_investment_policy:0 "Investimento Estrangeiro Irrestrito"

    law_no_foreign_investment_policy_desc:0 "Qualquer forma de investimento estrangeiro é proibida neste país. \n\nNota: A proibição prevista nesta lei não se aplica aos [Concept('concept_article','$concept_articles$')] já existentes do [concept_treaty] $foreign_investment_rights$."
    law_nationalist_foreign_investment_policy_desc:0 "Apenas o investimento estrangeiro de entrada é permitido (ou seja, este país pode apenas receber investimento estrangeiro, mas não realizá-lo). \n\nNota: A proibição prevista nesta lei não se aplica aos [Concept('concept_article','$concept_articles$')] já existentes do [concept_treaty] $foreign_investment_rights$."
    law_full_foreign_investment_policy_desc:0 "Todas as formas de investimento estrangeiro são permitidas por lei."

    lawgroup_secession_rights:0 "Direito à Secessão"

    law_no_secession_rights:0 "Soberania Inviolável"
    law_limited_secession_rights:0 "Descentralização Permitida"
    law_full_secession_rights:0 "Secessão Permitida"

    law_no_secession_rights_desc:0 "Nenhum estado constituinte tem permissão para obter mais autonomia ou se separar deste país."
    law_limited_secession_rights_desc:0 "Os estados constituintes podem obter maior autonomia, mas não podem se separar deste país."
    law_full_secession_rights_desc:0 "Os estados constituintes podem obter maior autonomia e o direito de se separar deste país."

    law_no_voting_additional_effects:0 "@information! Todas as [Concept('concept_election','$concept_elections$')] serão não competitivas, e o [concept_government] pode suspender a realização de [Concept('concept_election','$concept_elections$')] por qualquer período de tempo."

    #law_parties_not_allowed_additional_effects:0 "@information! Todas as [Concept('concept_election','$concept_elections$')] serão não competitivas."
    law_dominant_party_state_additional_effects:0 "$can_ban_parties.tt$"
    law_parties_allowed_additional_effects:0 "$cannot_ban_parties.tt$"

    law_no_workers_rights:0 "Leis Trabalhistas Fracas"
    law_regulatory_bodies:0 "Leis Trabalhistas Moderadas"
    law_worker_protections:0 "Leis Trabalhistas Fortes"

    lawgroup_armed_forces_politicisation:0 "Politização Militar"
    law_politicised_armed_forces:0 "Militares Politizados"
    law_semi_politicised_armed_forces:0 "Militares Semipolitizados"
    law_no_politicised_armed_forces:0 "Militares Neutros"
    law_politicised_armed_forces_desc:0 "As forças armadas exercem lealdade total a um único partido político e defendem consistentemente posições e interesses políticos partidários."
    law_semi_politicised_armed_forces_desc:0 "As forças armadas exercem certa lealdade a um único partido político e defendem consistentemente posições e interesses políticos partidários."
    law_no_politicised_armed_forces_desc:0 "As forças armadas se mantêm inteiramente fora da política."

    law_no_politicised_armed_forces_additional_effects:0 "@warning! [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetNameWithCountryVariant] não pode ingressar em nenhum [Concept('concept_party', '$concept_parties$')] sob esta [concept_law]."

    lawgroup_minority_issues:0 "Leis de Estilo de Vida"
    law_no_minority_issues:0 "Apenas Estilos de Vida Tradicionalistas"
    law_some_minority_issues:0 "Leis de Estilo de Vida Conservadoras"
    law_full_minority_issues:0 "Estilos de Vida Liberais Permitidos"
    law_no_minority_issues_desc:0 "O governo adota uma postura tradicionalista em relação a questões sociais como o consumo de álcool, drogas e os direitos LGBTQ+. \n\nSob esta [concept_law], o consumo de [GetGoods('opium').GetName], [GetGoods('tobacco').GetName], [GetGoods('liquor').GetName] e [GetGoods('wine').GetName] pelos pops será proibido."
    law_some_minority_issues_desc:0 "O governo adota uma postura conservadora em relação a questões sociais como o consumo de álcool, drogas e os direitos LGBTQ+. \n\nSob esta [concept_law], o consumo de [GetGoods('opium').GetName] pelos pops será proibido."
    law_full_minority_issues_desc:0 "O governo adota uma postura permissiva em relação a questões sociais como o consumo de álcool, drogas e os direitos LGBTQ+."

    amendment_symbolic_monarchy:0 "Monarquia Simbólica"
    amendment_symbolic_monarchy_desc:0 "Segundo a Constituição, o status jurídico do monarca é o de "símbolo do Estado e da unidade do povo", sem quaisquer poderes relacionados ao governo. O cargo é inteiramente cerimonial e deriva sua legitimidade da vontade do povo, no qual reside a soberania."

    amendment_no_nobility:0 "Aristocracia Não Real Proibida"
    amendment_no_nobility_desc:0 "Segundo a Constituição, os privilégios aristocráticos hereditários são abolidos. Nenhuma classe de nobreza possui status jurídico ou autoridade, e todos os cidadãos são iguais perante a lei."

    amendment_rotating_presidency:0 "Chefia de Estado Coletiva"
    amendment_rotating_presidency_desc:0 "Uma chefia de Estado coletiva é um sistema de governo no qual os deveres cerimoniais e executivos do Chefe de Estado são compartilhados por um grupo de pessoas, em vez de atribuídos a um único indivíduo."

    lawgroup_voting_method_desc:0 "As regras e procedimentos que regem a condução das eleições."
    lawgroup_political_parties_desc:0 "Se os partidos políticos são permitidos e como eles operam."
    lawgroup_judiciary_desc:0 "A composição e a independência do judiciário."
    lawgroup_cabinet_composition_desc:0 "Como o gabinete executivo é selecionado e organizado."
    lawgroup_term_limits_desc:0 "Regras que restringem por quanto tempo um(a) governante pode permanecer no cargo."
    lawgroup_secession_rights_desc:0 "Se os estados ou regiões constituintes têm o direito de se separar."
    lawgroup_armed_forces_politicisation_desc:0 "O grau de envolvimento das forças armadas na política."
    lawgroup_constitutional_system_desc:0 "O arcabouço constitucional geral do Estado."
