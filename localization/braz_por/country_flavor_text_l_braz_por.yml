l_braz_por:

    GENERIC_FLAVOR_TEXT:0 "A Guerra Fria é um período de tensão geopolítica entre o Bloco Ocidental e o Bloco Oriental. Que novos desafios os tempos trarão?"
    REV_GENERIC_FLAVOR_TEXT:1 "Insatisfeitos com os rumos que o assim chamado governo organizado vinha tomando, esses revolucionários decidiram pegar em armas para derrubá-lo. Conseguirão tomar o poder, ou serão esmagados como tantas revoluções esquecidas do passado?"
    DECENTRALIZED_FLAVOR_TEXT:0 "Cercado por potências mais organizadas, este país luta para manter sua autonomia. Verá o amanhecer de um novo século, ou seu nome sobreviverá apenas nos livros de história?"
