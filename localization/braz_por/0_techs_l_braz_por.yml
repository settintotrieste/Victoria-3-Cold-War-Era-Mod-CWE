    tech_energy_infrastructure_8:0 "Usinas Nucleares Modernas"
    tech_energy_infrastructure_9:0 "Usinas de Fusão Nuclear"
    tech_energy_infrastructure_10:0 "Megausinas"

    tech_energy_infrastructure_1_desc:0 "Uma usina termelétrica a combustível fóssil é uma central termelétrica que queima um combustível fóssil, como carvão, petróleo ou gás natural, para produzir eletricidade. As usinas a combustível fóssil possuem maquinário para converter a energia térmica da combustão em energia mecânica, que então aciona um gerador elétrico."
    tech_energy_infrastructure_2_desc:0 "Em uma usina de gás natural, o gás natural é misturado com ar e queimado. Os produtos da combustão (principalmente CO2 e H2O) se expandem rapidamente, e essa expansão gira o eixo que faz o ímã girar. Em uma usina hidrelétrica, a água que cai de uma elevação mais alta para uma mais baixa gira o eixo que faz o ímã girar."
    tech_energy_infrastructure_3_desc:0 "Uma usina nuclear, ou central atômica, é uma central termelétrica cuja fonte de calor é um reator nuclear. Como é típico das centrais termelétricas, o calor é usado para gerar vapor que aciona uma turbina a vapor conectada a um gerador que produz eletricidade."
    tech_energy_infrastructure_4_desc:0 "A energia geotérmica é a energia elétrica gerada a partir de energia geotérmica. As tecnologias em uso incluem usinas de vapor seco, usinas de vapor instantâneo (flash) e usinas de ciclo binário."
    tech_energy_infrastructure_5_desc:0 "A energia renovável (ou energia verde) é a energia proveniente de recursos naturais renováveis que se repõem em uma escala de tempo humana."
    tech_energy_infrastructure_6_desc:0 "As energias renováveis, incluindo solar, eólica, hidrelétrica, biocombustíveis e outras, estão no centro da transição para sistemas energéticos menos intensivos em carbono e mais sustentáveis."
    tech_energy_infrastructure_7_desc:0 "Uma usina termelétrica a combustível fóssil é uma central termelétrica que queima um combustível fóssil, como carvão, petróleo ou gás natural, para produzir eletricidade. As usinas a combustível fóssil possuem maquinário para converter a energia térmica da combustão em energia mecânica, que então aciona um gerador elétrico."
    tech_energy_infrastructure_8_desc:0 "Uma usina nuclear, ou central atômica, é uma central termelétrica cuja fonte de calor é um reator nuclear. Como é típico das centrais termelétricas, o calor é usado para gerar vapor que aciona uma turbina a vapor conectada a um gerador que produz eletricidade.
    tech_energy_infrastructure_9_desc:0 "A energia de fusão é uma forma proposta de geração de energia que geraria eletricidade utilizando o calor de reações de fusão nuclear. Em um processo de fusão, dois núcleos atômicos mais leves se combinam para formar um núcleo mais pesado, liberando energia. Os dispositivos projetados para aproveitar essa energia são conhecidos como reatores de fusão."
    tech_energy_infrastructure_10_desc:0 "As usinas de energia são enormes, com vastas capacidades de geração de energia."

