    tech_mining_1:0 "Minas Simples"
    tech_mining_2:0 "Maquinário de Mineração"
    tech_mining_3:0 "Técnicas de Prospecção"
    tech_mining_4:0 "Normas de Segurança em Minas"
    tech_mining_5:0 "Processamento de Minério no Local"
    tech_mining_6:0 "Sistemas Complexos de Túneis"
    tech_mining_7:0 "Mineração Guiada por IA"
    tech_mining_8:0 "Mineração de Alta Eficiência"
    tech_mining_9:0 "Minas Inteligentes"
    tech_mining_10:0 "Superminas"

    tech_mining_1_desc:0 "Minas são um buraco ou sistema de buracos no solo de onde são extraídas substâncias como carvão, metal e sal"
    tech_mining_2_desc:0 "As escavadeiras de mineração são usadas para escavar matérias-primas e são particularmente úteis na mineração de superfície. Equipadas com braços de elevação potentes e enormes caçambas de grande capacidade, essas máquinas são capazes de escavar grandes quantidades de materiais."
    tech_mining_3_desc:0 "A prospecção é a atividade de busca por ouro, petróleo ou outras substâncias valiosas na superfície ou sob a superfície da Terra."
    tech_mining_4_desc:0 "A segurança em minas refere-se à gestão de operações e eventos dentro da indústria de mineração, com o objetivo de proteger os mineiros minimizando perigos, riscos e acidentes."
    tech_mining_5_desc:0 "O processamento de minerais é uma forma de metalurgia extrativa que separa minerais valiosos do minério em um produto concentrado e comercializável."
    tech_mining_6_desc:0 "Um túnel caracterizado por elementos estruturais ou sistemas funcionais avançados ou singulares."
    tech_mining_7_desc:0 "Condições de trabalho difíceis, localizações remotas das minas e a disponibilidade (ou escassez) de mão de obra são apenas alguns dos incentivos para a aplicação de IA na indústria de mineração."
    tech_mining_8_desc:0 "A mineração de alto desempenho envolve a melhoria da produtividade e eficiência das instalações de mineração e a integração de novas tecnologias na mineração."
    tech_mining_9_desc:0 "A mineração inteligente é o conjunto de processos e tecnologias que podem aumentar a produtividade e a segurança das operações de mineração."
    tech_mining_10_desc:0 "As superminas são minas que existem nas profundezas da crosta terrestre."

    tech_services_1:0 "Máquinas de Escrever"
    tech_services_2:0 "Estratégias Organizacionais"
    tech_services_3:0 "Auditoria e Contabilidade"
    tech_services_4:0 "Administração Científica"
    tech_services_5:0 "Baias de Escritório"
    tech_services_6:0 "Escritórios de Planta Aberta"
    tech_services_7:0 "Escritórios Virtuais"
    tech_services_8:0 "Serviços Potencializados por IA"
    tech_services_9:0 "Escritórios Inteligentes"
    tech_services_10:0 "Trabalhadores de Escritório com IA"

    tech_services_1_desc:0 "Uma máquina de escrever é uma máquina mecânica ou eletromecânica para datilografar caracteres."
    tech_services_2_desc:0 "A estratégia organizacional refere-se ao plano e à abordagem bem definidos de uma organização para atingir suas metas e objetivos gerais. Ela engloba diversos aspectos, como a missão, a visão e os valores essenciais da organização, além das iniciativas estratégicas adotadas para se manter à frente no mercado."
    tech_services_3_desc:0 "Uma auditoria é um exame independente das informações financeiras de qualquer entidade, com ou sem fins lucrativos, independentemente de seu porte ou forma jurídica, quando tal exame é realizado com o objetivo de emitir uma opinião sobre ele."
    tech_services_4_desc:0 "A administração científica é uma teoria de gestão que analisa e sintetiza fluxos de trabalho. Seu principal objetivo é melhorar a eficiência econômica, especialmente a produtividade do trabalho. Foi uma das primeiras tentativas de aplicar a ciência à engenharia de processos na gestão."
    tech_services_5_desc:0 "Uma baia é um espaço de trabalho de escritório parcialmente fechado, separado dos espaços vizinhos por divisórias que geralmente têm de 1,5 a 1,8 metro de altura. Seu objetivo é isolar os funcionários e gerentes dos ruídos e da visão de um espaço aberto, para que possam se concentrar com menos distrações."
    tech_services_6_desc:0 "Um escritório de planta aberta é um tipo de layout de escritório em que todos os funcionários trabalham no mesmo andar e no mesmo espaço aberto."
    tech_services_7_desc:0 "Um escritório virtual faz parte da indústria de espaços de trabalho flexíveis, que oferece às empresas qualquer combinação de serviços, espaço e/ou tecnologia, sem que essas empresas arquem com os custos de capital de possuir ou alugar um escritório tradicional."
    tech_services_8_desc:0 "Incorporar a IA significa ser capaz de aplicá-la em toda a empresa, recorrendo a previsões, automação e otimização para melhorar decisões e resultados de negócios. Também significa tornar a IA parte das operações do dia a dia como parte dos processos de negócios."
    tech_services_9_desc:0 "Os escritórios inteligentes são equipados com softwares que ajudam a eliminar tarefas básicas e repetitivas, como gerenciar reservas de salas de reunião ou procurar um local para conectar o notebook. Isso reduz frustrações e pequenos incômodos enfrentados pelos funcionários no espaço de trabalho e ajuda a manter o foco em tarefas relacionadas ao trabalho."
    tech_services_10_desc:0 "A maior parte do trabalho de escritório é substituída pela IA."

    tech_electronics_1:0 "Circuitos Simples"
    tech_electronics_2:0 "Teoria da Computação"
    tech_electronics_3:0 "Computadores Analógicos"
    tech_electronics_4:0 "Circuitos Integrados"
    tech_electronics_5:0 "Computadores Programáveis"
    tech_electronics_6:0 "Sistemas Operacionais"
    tech_electronics_7:0 "Redes Neurais"
    tech_electronics_8:0 "IA Generativa"
    tech_electronics_9:0 "Computação Quântica"
    tech_electronics_10:0 "Computação Biológica"

    tech_electronics_1_desc:0 "Um circuito simples é um circuito que permite a passagem de eletricidade e é comumente usado em dispositivos elétricos domésticos básicos."
    tech_electronics_2_desc:0 "A teoria da computação, também conhecida como teoria computacional, é o estudo de como computar de forma eficiente, dos modelos de processos computacionais e de seus limites."
    tech_electronics_3_desc:0 "Os computadores analógicos são máquinas físicas que usam propriedades físicas, como voltagem, pressão ou movimento mecânico, para resolver problemas."
    tech_electronics_4_desc:0 "Um circuito integrado (CI), também conhecido como microchip ou chip, é um pequeno dispositivo eletrônico que contém muitos componentes interconectados, como transistores, resistores e capacitores, em um único chip semicondutor."
    tech_electronics_5_desc:0 "Um computador programável é um dispositivo capaz de seguir um conjunto de instruções, ou código, para realizar tarefas e controlar seu comportamento."
    tech_electronics_6_desc:0 "Um sistema operacional (SO) é um software que gerencia os recursos de hardware de um computador e fornece serviços comuns para seus programas. Ele executa tarefas como gerenciamento de memória, gerenciamento de arquivos e operações de interface com o usuário."
    tech_electronics_7_desc:0 "Uma rede neural é um algoritmo de aprendizado de máquina que usa nós interconectados, ou neurônios, para processar dados e resolver problemas complexos. As redes neurais são inspiradas na estrutura e função do cérebro humano, e são um tipo de aprendizado profundo, um processo de aprendizado de máquina."
    tech_electronics_8_desc:0 "A IA generativa, ou inteligência artificial generativa, é um tipo de IA capaz de criar novos conteúdos, como textos, imagens, músicas, áudios e vídeos."
    tech_electronics_9_desc:0 "A computação quântica é um campo da ciência da computação que usa a mecânica quântica para resolver problemas complexos mais rapidamente do que os computadores clássicos. Os computadores quânticos usam hardware especializado para aproveitar o comportamento único da física quântica, como superposição, emaranhamento e interferência quântica."
    tech_electronics_10_desc:0 "A computação biológica, também conhecida como biocomputação, é um tipo de computação que usa organismos ou processos biológicos para armazenar, processar e transferir informações. Os computadores biológicos usam insumos químicos e moléculas de origem biológica, como DNA e proteínas, em vez de sinais elétricos."

