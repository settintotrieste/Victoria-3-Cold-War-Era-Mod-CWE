    ### Tecnologias de Produção ###

    tech_construction_infrastructure_1:0 "Ferramentas Elétricas"
    tech_construction_infrastructure_2:0 "Concreto Armado"
    tech_construction_infrastructure_3:0 "Pré-fabricação"
    tech_construction_infrastructure_4:0 "Maquinário de Construção Avançado"
    tech_construction_infrastructure_5:0 "Núcleos Contraforte"
    tech_construction_infrastructure_6:0 "Aço Estrutural Moderno"
    tech_construction_infrastructure_7:0 "Design de Edificações Avançado"
    tech_construction_infrastructure_8:0 "Concreto Moderno"
    tech_construction_infrastructure_9:0 "Ferramentas Elétricas Avançadas"
    tech_construction_infrastructure_10:0 "Construtores Robóticos"

    tech_construction_infrastructure_1_desc:0 "Uma ferramenta elétrica é uma ferramenta acionada por uma fonte de energia e mecanismo adicionais, além do trabalho manual usado com ferramentas manuais comuns."
    tech_construction_infrastructure_2_desc:0 "O concreto armado, também chamado de ferroconcreto, é um material compósito no qual a resistência à tração e a ductilidade relativamente baixas do concreto são compensadas pela inclusão de um reforço com maior resistência à tração ou ductilidade."
    tech_construction_infrastructure_3_desc:0 "A pré-fabricação é a prática de montar componentes de uma estrutura em uma fábrica ou outro local de manufatura, e transportar as montagens completas ou subconjuntos até o canteiro de obras onde a estrutura será instalada."
    tech_construction_infrastructure_4_desc:0 "O maquinário de construção engloba todo o maquinário usado em atividades de construção, desde a escavação do solo até o transporte, carregamento e descarregamento de materiais e a gestão de resíduos."
    tech_construction_infrastructure_5_desc:0 "O núcleo contraforte é um sistema estrutural para edifícios altos, consistindo em um núcleo hexagonal reforçado por três contrafortes que formam um Y."
    tech_construction_infrastructure_6_desc:0 "O aço estrutural é uma categoria de aço usada na fabricação de materiais de construção em diversos formatos. Muitos perfis de aço estrutural têm a forma de uma viga alongada com um perfil de seção transversal específico."
    tech_construction_infrastructure_7_desc:0 "O design de edificações, também chamado de design arquitetônico, refere-se às aplicações arquitetônicas, de engenharia e técnicas amplamente empregadas no projeto de edifícios."
    tech_construction_infrastructure_8_desc:0 "O concreto é um material compósito composto por agregados unidos por um cimento fluido que endurece com o tempo até se tornar sólido."
    tech_construction_infrastructure_9_desc:0 "Uma ferramenta elétrica é uma ferramenta acionada por uma fonte de energia e mecanismo adicionais, além do trabalho manual usado com ferramentas manuais comuns."
    tech_construction_infrastructure_10_desc:0 "Os robôs de construção são um subconjunto de robôs industriais usados na construção de edifícios e infraestrutura no próprio canteiro de obras."

    tech_agriculture_1:0 "Fertilizantes"
    tech_agriculture_2:0 "Maquinário Agrícola"
    tech_agriculture_3:0 "Criação Intensiva em Baterias"
    tech_agriculture_4:0 "Megafazendas"
    tech_agriculture_5:0 "Pesticidas"
    tech_agriculture_6:0 "Organismos Geneticamente Modificados"
    tech_agriculture_7:0 "Robótica Agrícola"
    tech_agriculture_8:0 "Agricultura Guiada por IA"
    tech_agriculture_9:0 "Fazendas Inteligentes"
    tech_agriculture_10:0 "Fazendas Totalmente Automatizadas"

    tech_agriculture_1_desc:0 "Um fertilizante é qualquer material de origem natural ou sintética aplicado ao solo ou aos tecidos das plantas para fornecer nutrientes vegetais."
    tech_agriculture_2_desc:0 "O maquinário agrícola refere-se às estruturas e dispositivos mecânicos usados na agricultura ou em outras atividades agropecuárias."
    tech_agriculture_3_desc:0 "A criação intensiva em baterias, também conhecida como criação intensiva ou industrial, refere-se a um método de criação de animais, particularmente aves e ovos, em espaços confinados com altas densidades de criação."
    tech_agriculture_4_desc:0 "As megafazendas e fazendas intensivas ocupam muito menos espaço do que as fazendas tradicionais, e permitem manter os animais com segurança, longe de predadores."
    tech_agriculture_5_desc:0 "Os pesticidas são substâncias usadas para controlar pragas. Incluem herbicidas, inseticidas, nematicidas, fungicidas e muitos outros."
    tech_agriculture_6_desc:0 "Um organismo geneticamente modificado é qualquer organismo cujo material genético foi alterado usando técnicas de engenharia genética."
    tech_agriculture_7_desc:0 "Um robô agrícola é definido como qualquer dispositivo robótico capaz de aprimorar processos agrícolas, assumindo tarefas do agricultor que sejam lentas ou intensivas em mão de obra. O uso de robôs na agricultura torna muitas tarefas mais simples, rápidas e eficazes."
    tech_agriculture_8_desc:0 "A IA na agricultura de precisão (AP) permite que agricultores e gestores agrícolas adotem práticas agrícolas altamente direcionadas e precisas, com base em medições agroclimáticas específicas do local."
    tech_agriculture_9_desc:0 "A agricultura inteligente, também conhecida como agricultura inteligente digital, é a adoção de tecnologias avançadas e operações agrícolas orientadas por dados para otimizar e melhorar a sustentabilidade na produção agrícola."
    tech_agriculture_10_desc:0 "A agricultura automatizada usa diversos dispositivos tecnológicos para melhorar e automatizar as operações agrícolas e o ciclo de produção de lavouras ou pecuária, tornando as fazendas mais eficientes."

    tech_land_infrastructure_1:0 "Estradas e Ferrovias Básicas"
    tech_land_infrastructure_2:0 "Sistemas Primitivos de Controle de Tráfego"
    tech_land_infrastructure_3:0 "Redes Integradas de Transporte Urbano"
    tech_land_infrastructure_4:0 "Ferrovias e Rodovias de Alta Velocidade"
    tech_land_infrastructure_5:0 "Ferrovias e Rodovias de Alto Volume"
    tech_land_infrastructure_6:0 "Sistemas Modernos de Controle de Tráfego"
    tech_land_infrastructure_7:0 "Veículos Elétricos"
    tech_land_infrastructure_8:0 "Veículos Autônomos"
    tech_land_infrastructure_9:0 "Infraestrutura Inteligente"
    tech_land_infrastructure_10:0 "Megainfraestrutura"

    tech_land_infrastructure_1_desc:0 "Estradas e Ferrovias Básicas"
    tech_land_infrastructure_2_desc:0 "A infraestrutura básica refere-se às principais ferrovias, estradas, canais, portos e docas, ao telégrafo eletromagnético, à drenagem, aos diques e à recuperação de terras."
    tech_land_infrastructure_3_desc:0 "O transporte público integrado combina diversos modos de transporte e operadores, por meio de processos organizacionais e de planejamento, facilitados pela adoção de infraestrutura e tecnologias que maximizam a comodidade e a eficiência para os passageiros."
    tech_land_infrastructure_4_desc:0 "A ferrovia de alta velocidade (HSR, na sigla em inglês) é um tipo de rede de transporte ferroviário que utiliza trens significativamente mais rápidos do que os trens tradicionais. Uma rodovia é uma via principal, especialmente aquela que conecta cidades."
    tech_land_infrastructure_5_desc:0 "As ferrovias e rodovias são muito grandes e conseguem comportar um alto volume de tráfego."
    tech_land_infrastructure_6_desc:0 "A gestão de tráfego é um ramo essencial da logística. Envolve o planejamento, controle e aquisição dos serviços de transporte necessários para mover fisicamente veículos e cargas."
    tech_land_infrastructure_7_desc:0 "Um veículo elétrico é um veículo que usa um ou mais motores elétricos para propulsão. O veículo pode ser alimentado por um sistema coletor, com eletricidade de fontes extraveiculares, ou pode ser alimentado de forma autônoma por uma bateria ou pela conversão de combustível em eletricidade usando um gerador ou células de combustível."
    tech_land_infrastructure_8_desc:0 "Os veículos autônomos operam usando tecnologia de sensoriamento remoto, incluindo radar, GPS, câmeras e lidar, para monitorar e criar um mapa tridimensional de seu ambiente."
    tech_land_infrastructure_9_desc:0 "Uma infraestrutura inteligente é um sistema inteligente que usa um ciclo de retroalimentação de dados para melhorar a tomada de decisões sobre determinado assunto."
    tech_land_infrastructure_10_desc:0 "As estradas e ferrovias são gigantescas."

    tech_communication_infrastructure_1:0 "Rede de Telégrafo"
    tech_communication_infrastructure_2:0 "Rede de Rádio e Telefone"
    tech_communication_infrastructure_3:0 "Rede de Televisão em Preto e Branco"
    tech_communication_infrastructure_4:0 "Rede de Televisão em Cores"
    tech_communication_infrastructure_5:0 "Sistema de Posicionamento Global"
    tech_communication_infrastructure_6:0 "Rede de Internet Primitiva"
    tech_communication_infrastructure_7:0 "Internet Integrada com IA"
    tech_communication_infrastructure_8:0 "Internet de Alta Velocidade"
    tech_communication_infrastructure_9:0 "Internet Avançada"
    tech_communication_infrastructure_10:0 "Internet das Coisas"

    tech_communication_infrastructure_1_desc:0 "O telégrafo é um sistema de comunicação que transmite informações ao fazer e interromper uma conexão elétrica. É mais associado ao envio de pulsos de corrente elétrica por um fio, com codificação em código Morse."
    tech_communication_infrastructure_2_desc:0 "Uma rede sem fio utiliza sinais de rádio para trocar dados entre dois ou mais dispositivos físicos."
    tech_communication_infrastructure_3_desc:0 "Um televisor em preto e branco é um dispositivo elétrico projetado para converter sinais de transmissão recebidos em imagens de televisão em preto e branco e som associado."
    tech_communication_infrastructure_4_desc:0 "A televisão em cores é uma tecnologia de transmissão televisiva que inclui informações de cor para a imagem, permitindo que o vídeo seja exibido em cores no aparelho de televisão. Ela representa uma evolução em relação à tecnologia de televisão monocromática, ou em preto e branco, que exibe a imagem em tons de cinza."
    tech_communication_infrastructure_5_desc:0 "O Sistema de Posicionamento Global é um sistema de radionavegação baseado em satélites."
    tech_communication_infrastructure_6_desc:0 "Uma rede de Internet é um sistema de comunicação global composto por redes autônomas interconectadas"
    tech_communication_infrastructure_7_desc:0 "A inteligência artificial, ou IA, é uma tecnologia que permite que computadores e máquinas simulem a inteligência humana e a capacidade de resolver problemas."
    tech_communication_infrastructure_8_desc:0 "Em telecomunicações, banda larga ou alta velocidade é a transmissão de dados de amplo espectro que explora sinais em uma vasta gama de frequências ou em diversas frequências simultâneas, sendo usada no acesso rápido à Internet."
    tech_communication_infrastructure_9_desc:0 "A inteligência artificial (IA) está sendo usada para desenvolver novas formas de interação com a internet, como chatbots e assistentes virtuais."
    tech_communication_infrastructure_10_desc:0 "A Internet das Coisas descreve dispositivos com sensores, capacidade de processamento, software e outras tecnologias que se conectam e trocam dados com outros dispositivos e sistemas pela Internet ou outras redes de comunicação."

    tech_chemicals_1:0 "Química Básica"
    tech_chemicals_2:0 "Materiais Sintéticos"
    tech_chemicals_3:0 "Polimerização"
    tech_chemicals_4:0 "Radioquímica"
    tech_chemicals_5:0 "Bioquímica"
    tech_chemicals_6:0 "Química Computacional"
    tech_chemicals_7:0 "Materiais Biodegradáveis"
    tech_chemicals_8:0 "Nanotecnologia"
    tech_chemicals_9:0 "Ciência Médica Avançada"
    tech_chemicals_10:0 "Química Quântica"

    tech_chemicals_1_desc:0 "A química é um ramo das ciências naturais que trata principalmente das propriedades das substâncias, das transformações que sofrem e das leis naturais que descrevem essas transformações."
    tech_chemicals_2_desc:0 "Os materiais sintéticos são feitos por meio da alteração química das substâncias iniciais para criar um material com características diferentes. Alguns exemplos de materiais sintéticos são plásticos, medicamentos e novos combustíveis. Uma substância sintética pode ser quimicamente idêntica a uma substância de ocorrência natural ou pode ser diferente."
    tech_chemicals_3_desc:0 "A polimerização, na química de polímeros, é o processo de fazer reagir moléculas de monômeros em uma reação química para formar redes tridimensionais ou cadeias poliméricas."
    tech_chemicals_4_desc:0 "A radioquímica refere-se ao ramo da ciência que envolve o estudo das transformações químicas de materiais radioativos."
    tech_chemicals_5_desc:0 "A bioquímica é o estudo dos compostos químicos e da química dos organismos vivos. Os bioquímicos estudam biomoléculas (como proteínas, RNA, DNA, açúcares e lipídios), suas aplicações e interações no corpo, e os processos bioquímicos e metabólicos."
    tech_chemicals_6_desc:0 "A química computacional é um ramo da química que usa simulações computacionais para ajudar a resolver problemas químicos."
    tech_chemicals_7_desc:0 "Os materiais biodegradáveis são substâncias que podem ser decompostas naturalmente por microrganismos, como bactérias e fungos, em compostos mais simples e inofensivos, como dióxido de carbono e água."
    tech_chemicals_8_desc:0 "A nanotecnologia refere-se ao ramo da ciência e engenharia dedicado a projetar, produzir e usar estruturas, dispositivos e sistemas manipulando átomos e moléculas em escala nanométrica, ou seja, com uma ou mais dimensões da ordem de 100 nanômetros (100 milionésimos de milímetro) ou menos."
    tech_chemicals_9_desc:0 "A ciência médica, também conhecida como ciência biomédica, é o estudo de como o corpo funciona e responde a doenças e tratamentos, com o objetivo de melhorar a saúde geral e descobrir novas curas e diagnósticos."
    tech_chemicals_10_desc:0 "A química quântica, também chamada de mecânica quântica molecular, é um ramo da físico-química focado na aplicação da mecânica quântica a sistemas químicos, particularmente no cálculo quântico-mecânico das contribuições eletrônicas às propriedades físicas e químicas de moléculas, materiais e soluções em nível atômico."

    tech_manufacturing_1:0 "Fábricas Simples"
    tech_manufacturing_2:0 "Normas de Segurança Industrial"
    tech_manufacturing_3:0 "Linha de Produção Fabril"
    tech_manufacturing_4:0 "Peças Intercambiáveis Padronizadas"
    tech_manufacturing_5:0 "Robótica Industrial"
    tech_manufacturing_6:0 "Informatização Fabril"
    tech_manufacturing_7:0 "Manufatura Guiada por IA"
    tech_manufacturing_8:0 "Maquinário de Alta Precisão"
    tech_manufacturing_9:0 "Fábricas Inteligentes"
    tech_manufacturing_10:0 "Fábricas Autônomas"

    tech_manufacturing_1_desc:0 "Uma fábrica, planta de manufatura ou planta de produção é uma instalação industrial, frequentemente um complexo composto por vários edifícios repletos de maquinário, onde os trabalhadores fabricam itens ou operam máquinas que processam cada item transformando-o em outro.
    tech_manufacturing_2_desc:0 "As normas de segurança no trabalho são conjuntos de padrões desenvolvidos com o objetivo de reduzir os riscos ocupacionais."
    tech_manufacturing_3_desc:0 "Uma linha de produção é, em termos simples, uma sequência de trabalhadores, máquinas ou equipamentos em uma fábrica ou instalação de manufatura, que passa o trabalho de uma estação para a seguinte até que a fabricação do produto seja concluída."
    tech_manufacturing_4_desc:0 "Peças intercambiáveis são peças idênticas para fins práticos. São fabricadas segundo especificações que garantem que sejam tão idênticas a ponto de se encaixarem em qualquer conjunto do mesmo tipo. Uma dessas peças pode substituir livremente outra, sem qualquer ajuste sob medida, como o desbaste."
    tech_manufacturing_5_desc:0 "Um robô industrial é um sistema robótico usado na manufatura. Os robôs industriais são automatizados, programáveis e capazes de se mover em três ou mais eixos."
    tech_manufacturing_6_desc:0 "A Indústria 4.0, sinônimo de manufatura inteligente, é a concretização da transformação digital do setor, proporcionando tomada de decisão em tempo real, produtividade aprimorada, flexibilidade e agilidade para revolucionar a forma como as empresas fabricam, aprimoram e distribuem seus produtos.  "
    tech_manufacturing_7_desc:0 "A IA na manufatura é o uso de soluções de aprendizado de máquina (ML) e redes neurais de aprendizado profundo para otimizar processos de manufatura com melhor análise de dados e tomada de decisão."
    tech_manufacturing_8_desc:0 "A usinagem de alta precisão refere-se a processos de usinagem que produzem peças altamente precisas e consistentes, de acordo com especificações exatas."
    tech_manufacturing_9_desc:0 "Uma fábrica inteligente é uma instalação de manufatura digitalizada que usa dispositivos conectados, maquinário e sistemas de produção para coletar e compartilhar dados continuamente."
    tech_manufacturing_10_desc:0 "Uma fábrica completamente autônoma que produz de forma confiável e sem assistência humana produtos altamente individualizados em lotes pequenos e em constante mudança, dia e noite, com altos ciclos de produção e custos unitários significativamente menores do que antes – esta é a visão da produção autônoma."

