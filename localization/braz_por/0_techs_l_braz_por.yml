    tech_military_ground_forces_7:0 "Armamento Compacto"
    tech_military_ground_forces_8:0 "Sistemas de Armas Guiados por IA"
    tech_military_ground_forces_9:0 "Veículos de Combate Totalmente Automatizados"
    tech_military_ground_forces_10:0 "Soldados Biônicos"

    tech_military_ground_forces_1_desc:0 "Ferrolho é um tipo de ação de arma de fogo manual operada pela manipulação direta do ferrolho por meio de uma alavanca, geralmente localizada no lado direito da arma."
    tech_military_ground_forces_2_desc:0 "A artilharia consiste em armas de longo alcance que lançam munições muito além do alcance e poder das armas de fogo de infantaria."
    tech_military_ground_forces_3_desc:0 "Tanques são veículos de combate pesadamente armados e blindados que se movem sobre duas correntes metálicas contínuas chamadas esteiras. Os tanques são essencialmente plataformas de armas que tornam as armas neles montadas mais eficazes graças à sua mobilidade em qualquer terreno e à proteção que oferecem às suas tripulações."
    tech_military_ground_forces_4_desc:0 "Um veículo blindado de transporte de pessoal é um amplo tipo de veículo militar blindado projetado para transportar pessoal e equipamentos em zonas de combate."
    tech_military_ground_forces_5_desc:0 "Um tanque de batalha principal, também conhecido como tanque de combate ou tanque universal, é um tanque que desempenha o papel de proteção blindada de tiro direto e manobra em muitos exércitos modernos."
    tech_military_ground_forces_6_desc:0 "A blindagem reativa é um tipo de blindagem veicular usada para proteger veículos, especialmente tanques modernos, contra cargas moldadas e penetradores de energia cinética endurecidos."
    tech_military_ground_forces_7_desc:0 "De forma geral, armas leves são armas portáteis pela infantaria que são armas de fogo cinéticas operadas por uma guarnição, dispositivos incendiários, ou que disparam munições explosivas."
    tech_military_ground_forces_8_desc:0 "Os sistemas de armas autônomas letais (LAWS, na sigla em inglês) são uma classe especial de sistemas de armas que usam conjuntos de sensores e algoritmos computacionais para identificar um alvo de forma independente e empregar um sistema de armas a bordo para engajar e destruir o alvo sem controle humano manual do sistema."
    tech_military_ground_forces_9_desc:0 "Um veículo terrestre não tripulado (UGV, na sigla em inglês) é um veículo que opera em contato com o solo sem presença humana a bordo."
    tech_military_ground_forces_10_desc:0 "Os soldados recebem implantes para se tornarem mais eficazes em combate."

