    tech_sea_infrastructure_1_desc:0 "O maquinário portuário abrange uma variedade de equipamentos essenciais, incluindo manipuladores de contêineres vazios, empilhadeiras de diversas capacidades, guindastes manipuladores de materiais, empilhadeiras alcançadeiras, guindastes porta a bordo, pórticos de contêineres sobre pneus, telehandlers e muitos outros."
    tech_sea_infrastructure_2_desc:0 "Motor naval a diesel é um motor de ignição por compressão instalado ou destinado a ser instalado em uma embarcação."
    tech_sea_infrastructure_3_desc:0 "Os navios são projetados com base em padrões internacionalmente aceitos."
    tech_sea_infrastructure_4_desc:0 "A contêinerização é um sistema de transporte de carga intermodal que utiliza contêineres intermodais."
    tech_sea_infrastructure_5_desc:0 "Megaembarcações são uma classe de navios extremamente grandes usados principalmente para fins comerciais, como o transporte de grandes quantidades de mercadorias ou de grandes grupos de pessoas."
    tech_sea_infrastructure_6_desc:0 "Enquanto os primeiros portos tendiam a ser simples ancoradouros, os portos modernos tendem a ser centros de distribuição multimodais, com conexões de transporte por mar, rio, canal, rodovia, ferrovia e via aérea."
    tech_sea_infrastructure_7_desc:0 "O conceito de navios inteligentes decorre da tendência mais ampla de digitalização que varre diversos setores e representa uma mudança na indústria marítima, integrando tecnologias de ponta para aumentar a eficiência, a segurança e a sustentabilidade."
    tech_sea_infrastructure_8_desc:0 "Um navio elétrico é uma embarcação motorizada movida por motores elétricos, alimentados por baterias a bordo, painéis solares ou geradores."
    tech_sea_infrastructure_9_desc:0 "Navios de carga autônomos, também conhecidos como navios porta-contêineres autônomos ou embarcações de superfície marítimas autônomas (MASS, na sigla em inglês), são embarcações sem tripulação que transportam contêineres ou cargas a granel por águas navegáveis com pouca ou nenhuma interação humana."
    tech_sea_infrastructure_10_desc:0 "Os portos agora são megacomplexos que se estendem por vastas extensões de terra."

    tech_air_infrastructure_1:0 "Aeroportos Primitivos"
    tech_air_infrastructure_2:0 "Pequenos Aviões Comerciais a Hélice"
    tech_air_infrastructure_3:0 "Aviões Comerciais a Jato"
    tech_air_infrastructure_4:0 "Aeroportos Internacionais"
    tech_air_infrastructure_5:0 "Automação de Cabine"
    tech_air_infrastructure_6:0 "Megaeroportos"
    tech_air_infrastructure_7:0 "Aeronaves Inteligentes"
    tech_air_infrastructure_8:0 "Aeronaves Elétricas"
    tech_air_infrastructure_9:0 "Aeronaves Totalmente Autônomas"
    tech_air_infrastructure_10:0 "Megaaeronaves"

    tech_air_infrastructure_1_desc:0 "Os primeiros aeroportos eram frequentemente pequenos e rudimentares, com pistas austeras e poucas comodidades."
    tech_air_infrastructure_2_desc:0 "Ao operar em aeroportos regionais com pistas curtas, aeronaves a hélice podem cruzar a velocidades de 300 nós e alcances sem escalas de cerca de 1.500 milhas, com duração média de voo de aproximadamente 3 horas."
    tech_air_infrastructure_3_desc:0 "Um avião a jato, ou jato, é um avião comercial movido por motores a jato. Aviões comerciais costumam ter dois ou quatro motores a jato; projetos de três motores foram populares na década de 1970, mas são menos comuns hoje."
    tech_air_infrastructure_4_desc:0 "Um aeroporto internacional é um aeroporto com instalações alfandegárias e de controle de fronteira que permitem que passageiros viajem entre países ao redor do mundo."
    tech_air_infrastructure_5_desc:0 "Algumas tarefas ou partes de tarefas realizadas pela tripulação humana podem ser atribuídas, por escolha da tripulação, a maquinário."
    tech_air_infrastructure_6_desc:0 "Megaeroportos são definidos como aqueles com 33 milhões ou mais passageiros por ano. Isso os diferencia dos grandes aeroportos, que têm de 10 a 32,9 milhões de passageiros por ano, bem como dos aeroportos médios, que têm de 4,5 a 9,9 milhões de passageiros por ano."
    tech_air_infrastructure_7_desc:0 "O Sistema de Aeronaves Inteligentes incorpora sensores avançados e aprendizado de máquina para obter percepções que aumentam a consciência situacional e melhoram a segurança."
    tech_air_infrastructure_8_desc:0 "Uma aeronave elétrica é uma aeronave movida a eletricidade. As aeronaves elétricas são vistas como uma forma de reduzir os efeitos ambientais da aviação, proporcionando emissão zero e voos mais silenciosos. A eletricidade pode ser fornecida por diversos métodos, sendo o mais comum as baterias."
    tech_air_infrastructure_9_desc:0 "A aeronave voa, navega e se comunica por conta própria. Ela é totalmente autônoma e pilota a si mesma."
    tech_air_infrastructure_10_desc:0 "Os aviões comerciais são enormes."

    tech_energy_infrastructure_1:0 "Usinas a Carvão e Petróleo"
    tech_energy_infrastructure_2:0 "Usinas de Gás Natural e Hidrelétricas"
