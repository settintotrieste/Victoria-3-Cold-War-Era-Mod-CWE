    tech_military_space_program_6:0 "Centros Espaciais"
    tech_military_space_program_7:0 "Foguetes Reutilizáveis"
    tech_military_space_program_8:0 "Grandes Constelações de Satélites"
    tech_military_space_program_9:0 "Bases Lunares"
    tech_military_space_program_10:0 "Exploração do Sistema Solar"

    tech_military_space_program_1_desc:0 "A física espacial, também conhecida como física de plasma espacial, é o estudo dos plasmas que ocorrem naturalmente na atmosfera superior da Terra e no restante do Sistema Solar. Inclui os temas de aeronomia, auroras, ionosferas e magnetosferas planetárias, cinturões de radiação e clima espacial."
    tech_military_space_program_2_desc:0 "Um observatório é um local usado para observar eventos terrestres, marítimos ou celestes."
    tech_military_space_program_3_desc:0 "Uma sonda espacial é um dispositivo não tripulado enviado para explorar o espaço e coletar informações científicas."
    tech_military_space_program_4_desc:0 "Um satélite é um pequeno objeto que orbita, ou gira em torno de, um objeto maior no espaço. Um satélite é uma lua, planeta ou máquina que orbita um planeta ou estrela."
    tech_military_space_program_5_desc:0 "Um ônibus espacial é uma espaçonave lançada por foguete, capaz de pousar como uma aeronave não motorizada, usada para fazer viagens repetidas entre a Terra e o espaço."
    tech_military_space_program_6_desc:0 "Os centros espaciais geralmente estão associados a locais de lançamento de espaçonaves."
    tech_military_space_program_7_desc:0 "Um veículo de lançamento reutilizável possui peças que podem ser recuperadas e reutilizadas em novos voos, enquanto transporta cargas úteis da superfície até o espaço sideral."
    tech_military_space_program_8_desc:0 "Uma rede de satélites é uma combinação de nós que possibilita a comunicação entre um ponto da Terra e outro."
    tech_military_space_program_9_desc:0 "Uma base lunar (ou base na Lua) é um posto avançado humano na superfície ou abaixo da superfície da Lua. Mais do que um simples local de atividade ou acampamento temporário, as bases lunares são bases extraterrestres que dão suporte a atividades robóticas ou humanas, fornecendo infraestrutura de superfície."
    tech_military_space_program_10_desc:0 "A exploração espacial é o uso da astronomia e da tecnologia espacial para explorar o espaço sideral. Embora a exploração do espaço seja atualmente realizada principalmente por astrônomos com telescópios, sua exploração física é conduzida tanto por sondas espaciais robóticas não tripuladas quanto por voos espaciais tripulados."

    tech_military_airforce_1:0 "Biplanos a Hélice"
    tech_military_airforce_2:0 "Aeronaves Bombardeiras Primitivas"
    tech_military_airforce_3:0 "Aviões de Guerra a Jato"
    tech_military_airforce_4:0 "Mísseis Ar-Ar"
    tech_military_airforce_5:0 "Caças Multifunção"
    tech_military_airforce_6:0 "Aviões de Guerra Furtivos"
    tech_military_airforce_7:0 "Defesas Antiaéreas Modernas"
    tech_military_airforce_8:0 "Aviões de Guerra Guiados por IA"
    tech_military_airforce_9:0 "Aviões de Guerra Totalmente Automatizados"
    tech_military_airforce_10:0 "Naves-Mãe Aéreas"

    tech_military_airforce_1_desc:0 "Um biplano é uma aeronave de asa fixa com duas asas principais empilhadas uma sobre a outra."
    tech_military_airforce_2_desc:0 "Um bombardeiro é uma aeronave de combate militar que utiliza armamento ar-solo para lançar bombas, disparar torpedos ou lançar mísseis de cruzeiro aéreos."
    tech_military_airforce_3_desc:0 "Uma aeronave a jato (ou simplesmente jato) é uma aeronave (quase sempre de asa fixa) impulsionada por um ou mais motores a jato."
    tech_military_airforce_4_desc:0 "Um míssil ar-ar é um míssil disparado a partir de uma aeronave com o objetivo de destruir outra aeronave. Os AAMs (mísseis ar-ar) são normalmente propulsionados por um ou mais motores-foguete, geralmente movidos a combustível sólido, mas às vezes a combustível líquido."
    tech_military_airforce_5_desc:0 "Uma aeronave de combate multifunção (MRCA, na sigla em inglês) é uma aeronave de combate destinada a desempenhar diferentes papéis em combate. Esses papéis podem incluir combate ar-ar, apoio aéreo, bombardeio aéreo, reconhecimento, guerra eletrônica e supressão de defesas aéreas."
    tech_military_airforce_6_desc:0 "As aeronaves furtivas são projetadas para evitar a detecção usando uma variedade de tecnologias que reduzem a reflexão/emissão de radar, infravermelho, luz visível, espectro de radiofrequência (RF) e som, coletivamente conhecidas como tecnologia furtiva."
    tech_military_airforce_7_desc:0 "Um míssil superfície-ar (SAM, na sigla em inglês), também conhecido como míssil solo-ar (GTAM) ou arma guiada superfície-ar (SAGW), é um míssil projetado para ser lançado do solo ou do mar para destruir aeronaves ou outros mísseis."
    tech_military_airforce_8_desc:0 "A inteligência artificial é usada para pilotar aviões de guerra."
    tech_military_airforce_9_desc:0 "Um veículo aéreo não tripulado (UAV, na sigla em inglês), comumente conhecido como drone, é uma aeronave sem piloto, tripulação ou passageiros a bordo."
    tech_military_airforce_10_desc:0 "Um porta-aeronaves aéreo é um tipo de aeronave-mãe capaz de transportar, lançar, recuperar e apoiar outras aeronaves parasitas menores."

    tech_military_support_1:0 "Corpo de Oficiais Profissional"
    tech_military_support_2:0 "Jogos de Guerra"
    tech_military_support_3:0 "Logística e Artilharia Mecanizadas"
    tech_military_support_4:0 "Inteligência Militar"
    tech_military_support_5:0 "Unidade de Comando"
    tech_military_support_6:0 "Especialização em Combate"
    tech_military_support_7:0 "Capacidade de ISR"
    tech_military_support_8:0 "Logística e Artilharia Guiadas por IA"
    tech_military_support_9:0 "Logística e Artilharia Totalmente Automatizadas"
    tech_military_support_10:0 "Canhões Orbitais"

    tech_military_support_1_desc:0 "Uma unidade tática geralmente consiste em duas ou mais divisões e armas e serviços auxiliares."
    tech_military_support_2_desc:0 "Um jogo de guerra é um jogo de estratégia no qual dois ou mais jogadores comandam forças armadas opostas em uma simulação de um conflito armado. Os jogos de guerra podem ser jogados por recreação, para treinar oficiais militares na arte do pensamento estratégico, ou para estudar a natureza de potenciais conflitos."
    tech_military_support_3_desc:0 "A logística militar é a disciplina de planejar e executar o deslocamento, o suprimento e a manutenção das forças militares."
    tech_military_support_4_desc:0 "A inteligência militar é uma disciplina militar que usa abordagens de coleta e análise de informações para fornecer orientação e direção que auxiliem os comandantes em suas decisões."
    tech_military_support_5_desc:0 "Na organização militar, a unidade de comando é o princípio segundo o qual os membros subordinados de uma estrutura devem ser todos responsáveis perante um único comandante."
    tech_military_support_6_desc:0 "As especializações militares são as carreiras ou especialidades escolhidas ou atribuídas nas forças armadas, que exigem dos indivíduos a obtenção de qualificações e um certo grau de conhecimento e habilidade no ofício para desempenhar tarefas e missões com um nível aceitável de qualidade ou conclusão."
    tech_military_support_7_desc:0 "ISR é a aquisição, o processamento e o fornecimento coordenados e integrados de informações e inteligência oportunas, precisas, relevantes, coerentes e confiáveis para apoiar a condução das atividades pelo comandante."
    tech_military_support_8_desc:0 "A IA é incorporada a um sistema de logística militar."
    tech_military_support_9_desc:0 "A artilharia autopropulsada (também chamada de artilharia locomotiva) é a artilharia equipada com seu próprio sistema de propulsão para se deslocar até sua posição de tiro."
    tech_military_support_10_desc:0 "Um canhão orbital é um sistema de bombardeio cinético controlado remotamente."

    tech_military_naval_forces_1:0 "Couraçados Dreadnought"
    tech_military_naval_forces_2:0 "Cruzadores de Batalha"
    tech_military_naval_forces_3:0 "Porta-Aviões Primitivos"
    tech_military_naval_forces_4:0 "Submarinos de Longo Alcance"
    tech_military_naval_forces_5:0 "Cruzadores de Mísseis Guiados"
    tech_military_naval_forces_6:0 "Porta-Aviões Modernos"
    tech_military_naval_forces_7:0 "Couraçados Modernos"
    tech_military_naval_forces_8:0 "Navios de Guerra Modulares"
    tech_military_naval_forces_9:0 "Navios de Guerra Autônomos"
    tech_military_naval_forces_10:0 "Fortalezas Flutuantes"

    tech_military_naval_forces_1_desc:0 "O dreadnought foi o tipo predominante de couraçado no início do século XX."
    tech_military_naval_forces_2_desc:0 "O cruzador de batalha foi um tipo de navio capital da primeira metade do século XX. Eram semelhantes em deslocamento, armamento e custo aos couraçados, mas diferiam na forma e no equilíbrio de atributos."
    tech_military_naval_forces_3_desc:0 "Um porta-aviões é um navio de guerra que serve como base aérea marítima, equipado com um convés de voo de comprimento total e instalações para transportar, armar, lançar e recuperar aeronaves."
    tech_military_naval_forces_4_desc:0 "Um submarino (ou sub) é uma embarcação capaz de operar de forma independente debaixo d'água."
    tech_military_naval_forces_5_desc:0 "Os cruzadores de mísseis guiados são cruzadores navais equipados com mísseis guiados de longo alcance e lançadores de mísseis."
    tech_military_naval_forces_6_desc:0 "Um porta-aviões é um navio de guerra que serve como base aérea marítima, equipado com um convés de voo de comprimento total e instalações para transportar, armar, lançar e recuperar aeronaves."
    tech_military_naval_forces_7_desc:0 "Um couraçado é um grande navio de guerra pesadamente blindado, com uma bateria principal composta por canhões de grande calibre, projetado para servir como navio capital com o poder de fogo mais intenso."
    tech_military_naval_forces_8_desc:0 "O conceito de modularidade foi desenvolvido para permitir que os navios de guerra adaptassem suas cargas úteis de acordo com as necessidades operacionais, resultando em um salto qualitativo e quantitativo nos níveis de produção."
    tech_military_naval_forces_9_desc:0 "Um navio de guerra totalmente autônomo seria capaz de realizar todas as atividades que um navio de guerra tripulado pode, exceto qualquer coisa relacionada à gestão de pessoas."
    tech_military_naval_forces_10_desc:0 "As fortalezas flutuantes são enormes bases marítimas capazes de atracar couraçados gigantescos."

    tech_military_nuclear_1:0 "Física Nuclear"
    tech_military_nuclear_2:0 "Mineração e Enriquecimento de Urânio"
    tech_military_nuclear_3:0 "Bomba Atômica"
    tech_military_nuclear_4:0 "Bomba de Hidrogênio"
    tech_military_nuclear_5:0 "Mísseis Antibalísticos Primitivos"
    tech_military_nuclear_6:0 "Mísseis Hipersônicos"
    tech_military_nuclear_7:0 "Mísseis Antibalísticos Modernos"
    tech_military_nuclear_8:0 "Armas Nucleares de Alto Rendimento"
    tech_military_nuclear_9:0 "Sistemas de Armas Nucleares Operados por IA"
    tech_military_nuclear_10:0 "Armas do Apocalipse"

    tech_military_nuclear_1_desc:0 "A física nuclear é o campo da física que estuda os núcleos atômicos, seus constituintes e interações, além do estudo de outras formas de matéria nuclear. A física nuclear não deve ser confundida com a física atômica, que estuda o átomo como um todo, incluindo seus elétrons."
    tech_military_nuclear_2_desc:0 "O enriquecimento remove o urânio-238 indesejado, elevando a concentração de átomos de urânio-235."
    tech_military_nuclear_3_desc:0 "Bomba atômica, arma de grande poder explosivo resultante da fissão dos núcleos de um metal pesado, como plutônio ou urânio. \n\nNota: Armas nucleares podem ser desenvolvidas clicando na decisão 'Desenvolver Armas Nucleares'."
    tech_military_nuclear_4_desc:0 "A bomba de hidrogênio é uma bomba imensamente poderosa cujo poder destrutivo vem da rápida liberação de energia durante a fusão nuclear de isótopos de hidrogênio (deutério e trítio), usando uma bomba atômica como gatilho."
    tech_military_nuclear_5_desc:0 "Um míssil antibalístico é um míssil superfície-ar projetado para neutralizar mísseis balísticos. Os mísseis balísticos são usados para lançar ogivas nucleares, químicas, biológicas ou convencionais em uma trajetória de voo balística."
    tech_military_nuclear_6_desc:0 "Uma arma hipersônica é uma arma capaz de viajar em velocidade hipersônica, definida como entre 5 e 25 vezes a velocidade do som, ou cerca de 1,6 a 8 quilômetros por segundo."
    tech_military_nuclear_7_desc:0 "Um míssil antibalístico é um míssil superfície-ar projetado para neutralizar mísseis balísticos. Os mísseis balísticos são usados para lançar ogivas nucleares, químicas, biológicas ou convencionais em uma trajetória de voo balística."
    tech_military_nuclear_8_desc:0 "O rendimento explosivo de uma arma nuclear é a quantidade de energia liberada, como radiação térmica, de explosão e nuclear, quando essa arma nuclear específica é detonada."
    tech_military_nuclear_9_desc:0 "A autoridade para lançar armas nucleares é delegada a um sistema de IA."
    tech_military_nuclear_10_desc:0 "Um dispositivo do juízo final é uma construção hipotética — geralmente uma arma ou sistema de armas — capaz de destruir toda a vida em um planeta."

    tech_military_carrier_1:0 "Porta-Aviões 1"
    tech_military_carrier_2:0 "Porta-Aviões 2"
    tech_military_carrier_3:0 "Porta-Aviões 3"
    tech_military_carrier_4:0 "Porta-Aviões 4"
    tech_military_carrier_5:0 "Porta-Aviões 5"
    tech_military_carrier_6:0 "Porta-Aviões 6"
    tech_military_carrier_7:0 "Porta-Aviões 7"
    tech_military_carrier_8:0 "Porta-Aviões 8"
    tech_military_carrier_9:0 "Porta-Aviões 9"
    tech_military_carrier_10:0 "Porta-Aviões 10"

    tech_military_navy_doctrine_1:0 "Sinalização Naval Básica"
    tech_military_navy_doctrine_2:0 "Escolas de Estado-Maior Naval"
    tech_military_navy_doctrine_3:0 "Grupos de Batalha de Porta-Aviões Primitivos"
    tech_military_navy_doctrine_4:0 "Frota Existente"
    tech_military_navy_doctrine_5:0 "Estratégias de Bombardeio Naval"
    tech_military_navy_doctrine_6:0 "Marinha de Resposta Rápida"
    tech_military_navy_doctrine_7:0 "Sistemas Modernos de Navegação Naval"
    tech_military_navy_doctrine_8:0 "Grupos de Batalha de Porta-Aviões Modernos"
    tech_military_navy_doctrine_9:0 "Gestão Global de Frotas"
    tech_military_navy_doctrine_10:0 "Almirantes de IA"

    tech_military_navy_doctrine_1_desc:0 "A sinalização naval com bandeiras abrange diversas formas de sinalização, como o semáforo ou o hasteamento de bandeiras, usadas por diferentes marinhas; distingue-se da sinalização com bandeiras marítimas usada por navios mercantes ou não navais, ou de bandeiras usadas para identificação."
    tech_military_navy_doctrine_2_desc:0 "As escolas de estado-maior treinam oficiais militares nos aspectos administrativos, de estado-maior militar e de política de sua profissão."
    tech_military_navy_doctrine_3_desc:0 "Um grupo de batalha de porta-aviões é uma frota naval composta por um porta-aviões como navio capital e seu grande número de escoltas, que juntos definem o grupo."
    tech_military_navy_doctrine_4_desc:0 "Na guerra naval, uma "frota existente" é uma força naval que exerce influência dominante sem nunca deixar o porto."
    tech_military_navy_doctrine_5_desc:0 "O apoio de fogo naval (NGFS, na sigla em inglês), também conhecido como apoio de fogo de superfície naval (NSFS) ou bombardeio costeiro, é o uso da artilharia naval para fornecer apoio de fogo a assaltos anfíbios e outras tropas que operam dentro de seu alcance."
    tech_military_navy_doctrine_6_desc:0 "Uma marinha de resposta rápida é uma frota de navios sempre mantidos prontos para implantação imediata."
    tech_military_navy_doctrine_7_desc:0 "A navegação marítima é a arte e a ciência de conduzir um navio de um ponto de partida (navegação) até um destino, de forma eficiente e responsável."
    tech_military_navy_doctrine_8_desc:0 "Um grupo de batalha de porta-aviões é uma frota naval composta por um porta-aviões como navio capital e seu grande número de escoltas, que juntos definem o grupo."
    tech_military_navy_doctrine_9_desc:0 "A gestão global de frotas envolve a supervisão de uma frota que opera em múltiplos países."
    tech_military_navy_doctrine_10_desc:0 "A IA é usada para controlar navios de guerra."

    tech_military_theory_1:0 "Planejamento Estratégico"
    tech_military_theory_2:0 "Guerra de Armas Combinadas"
    tech_military_theory_3:0 "Teatros de Guerra"
    tech_military_theory_4:0 "Destruição Mútua Assegurada"
    tech_military_theory_5:0 "Guerra Assimétrica"
    tech_military_theory_6:0 "ISR"
    tech_military_theory_7:0 "Força Espacial"
    tech_military_theory_8:0 "Guerra Automatizada"
    tech_military_theory_9:0 "Espaço de Guerra Digital"
    tech_military_theory_10:0 "Generais de IA"

    tech_military_theory_1_desc:0 "O planejamento estratégico é o processo de uma organização para definir sua estratégia ou direção, e tomar decisões sobre a alocação de seus recursos para atingir metas estratégicas."
    tech_military_theory_2_desc:0 "As armas combinadas são uma abordagem de guerra que busca integrar diferentes armas de combate de uma força militar para alcançar efeitos mutuamente complementares — por exemplo, usando infantaria e blindados em um ambiente urbano no qual cada um apoia o outro."
    tech_military_theory_3_desc:0 "Na guerra, um teatro é uma área na qual eventos militares importantes ocorrem ou estão em andamento. Um teatro pode incluir a totalidade do espaço aéreo, terrestre e marítimo que está — ou que pode vir a estar — envolvido em operações de guerra."
    tech_military_theory_4_desc:0 "A destruição mútua assegurada é uma doutrina de estratégia militar e política de segurança nacional que postula que o uso em larga escala de armas nucleares por um atacante contra um defensor armado nuclearmente com capacidade de segundo ataque resultaria na aniquilação completa de ambos, atacante e defensor."
    tech_military_theory_5_desc:0 "A guerra assimétrica é um tipo de guerra entre beligerantes cujo poder militar relativo, estratégia ou táticas diferem significativamente. Esse tipo de guerra frequentemente, mas não necessariamente, envolve insurgentes ou milícias de movimentos de resistência que podem ter o status de combatentes ilegais contra um exército regular."
    tech_military_theory_6_desc:0 "ISR (Inteligência, Vigilância e Reconhecimento, na sigla em inglês) é geralmente usado em referência a aplicações militares. ISR é uma função integrada de inteligência e operações que pode ser definida como a aquisição, o processamento e o fornecimento coordenados de informações e inteligência precisas, relevantes e oportunas para apoiar o processo de tomada de decisão de um comandante. A maioria das instalações terrestres, marítimas, aéreas e espaciais desempenha papéis fundamentais na aquisição de ISR para garantir o sucesso das operações."
    tech_military_theory_7_desc:0 "Uma força espacial é um ramo militar das forças armadas de uma nação que conduz operações militares no espaço sideral e a guerra espacial."
    tech_military_theory_8_desc:0 "O planejamento estratégico é auxiliado por inteligência artificial."
    tech_military_theory_9_desc:0 "A guerra digital, um subconjunto do que chamamos de guerra da informação, envolve ataques não físicos contra informações, processos de informação e infraestrutura de informação que comprometem, alteram, danificam, interrompem ou destroem informações e/ou atrasam, confundem, enganam e perturbam o processamento de informações e a tomada de decisões."
    tech_military_theory_10_desc:0 "As forças armadas são comandadas por uma poderosa inteligência artificial."

    ### Tecnologias Sociais ###

    tech_urbanization_1:0 "Serviços Urbanos Básicos"
    tech_urbanization_2:0 "Transporte Público"
    tech_urbanization_3:0 "Arranha-céus"
    tech_urbanization_4:0 "Cidades-Satélite"
    tech_urbanization_5:0 "Edifícios de Uso Misto"
    tech_urbanization_6:0 "Serviços Urbanos Integrados"
    tech_urbanization_7:0 "Espaços Verdes Urbanos"
    tech_urbanization_8:0 "Cidades Inteligentes"
    tech_urbanization_9:0 "A Megarregião"
    tech_urbanization_10:0 "A Ecumenópole"

    tech_urbanization_1_desc:0 "Os serviços públicos destinam-se a fornecer bens e serviços considerados essenciais; água, gás, eletricidade, telefone, coleta de resíduos e outros sistemas de comunicação representam grande parte do mercado de serviços públicos."
    tech_urbanization_2_desc:0 "O transporte público refere-se a um sistema de veículos, como ônibus e trens, que operam em horários regulares em rotas fixas e são usados pelo público."
    tech_urbanization_3_desc:0 "Os arranha-céus são edifícios de vários andares altos o suficiente para exigir o uso de um sistema de transporte vertical mecânico, como elevadores."
    tech_urbanization_4_desc:0 "Uma cidade-satélite é um município ou povoado menor que faz parte de uma área metropolitana maior e serve como centro populacional e de emprego regional."
    tech_urbanization_5_desc:0 "Um edifício de uso misto é qualquer estrutura que atenda a mais de um propósito, combinando usos residenciais, comerciais, varejistas, hoteleiros, de estacionamento, médicos, de entretenimento e/ou industriais."
    tech_urbanization_6_desc:0 "Os serviços urbanos são dirigidos e controlados por uma única autoridade."
    tech_urbanization_7_desc:0 "No planejamento do uso do solo, o espaço verde urbano é uma área aberta reservada para parques e outros "espaços verdes", incluindo vida vegetal, corpos d'água — também chamados de espaços azuis — e outros tipos de ambiente natural. A maioria dos espaços abertos urbanos são espaços verdes, mas ocasionalmente incluem outros tipos de áreas abertas."
    tech_urbanization_8_desc:0 "O conceito de Cidade Inteligente envolve a integração de tecnologias de ponta, incluindo a Internet das Coisas, a realidade aumentada, a Inteligência Artificial e outras."
    tech_urbanization_9_desc:0 "Uma megarregião engloba múltiplas cidades e condados, mas muitas também incluem vários estados, todos os quais devem trabalhar coletivamente para gerenciar a megarregião."
    tech_urbanization_10_desc:0 "Ecumenópole é o conceito hipotético de uma cidade que cobre todo o planeta."

    tech_economy_1:0 "Economia Comportamental"
    tech_economy_2:0 "Economia Keynesiana"
    tech_economy_3:0 "Sistema de Bretton Woods"
    tech_economy_4:0 "Monetarismo"
    tech_economy_5:0 "Globalização Econômica"
    tech_economy_6:0 "Flexibilização Quantitativa"
    tech_economy_7:0 "Responsabilidade Social Corporativa"
    tech_economy_8:0 "Finanças Comportamentais Quantitativas"
    tech_economy_9:0 "A Economia Digital"
    tech_economy_10:0 "Neocapitalismo"

    tech_economy_1_desc:0 "A economia comportamental combina elementos da economia e da psicologia para entender como e por que as pessoas se comportam da maneira que se comportam no mundo real. Difere da economia neoclássica, que presume que a maioria das pessoas tem preferências bem definidas e toma decisões bem informadas e voltadas ao próprio interesse com base nessas preferências."
    tech_economy_2_desc:0 "A economia keynesiana é uma teoria macroeconômica sobre os gastos totais na economia e seus efeitos sobre a produção, o emprego e a inflação. Foi desenvolvida pelo economista britânico John Maynard Keynes durante a década de 1930, em uma tentativa de lidar com os efeitos da Grande Depressão."
    tech_economy_3_desc:0 "O Sistema de Bretton Woods é um conjunto de regras e políticas unificadas que forneceu a estrutura necessária para criar taxas fixas de câmbio de moedas internacionais. Essencialmente, o acordo determinava que o recém-criado FMI estabelecesse a taxa de câmbio fixa para as moedas ao redor do mundo."
    tech_economy_4_desc:0 "O monetarismo é uma teoria econômica segundo a qual o crescimento econômico estável só pode ser garantido pelo controle da taxa de aumento da oferta de moeda, de modo a corresponder à capacidade de crescimento da produtividade real."
    tech_economy_5_desc:0 "A globalização econômica refere-se ao movimento internacional generalizado de bens, capital, serviços, tecnologia e informação."
    tech_economy_6_desc:0 "A flexibilização quantitativa (QE, na sigla em inglês) é uma estratégia de política monetária usada pelos bancos centrais. Com a QE, um banco central compra títulos na tentativa de reduzir as taxas de juros, aumentar a oferta de moeda e estimular mais empréstimos a consumidores e empresas."
    tech_economy_7_desc:0 "A responsabilidade social corporativa é um modelo de negócios pelo qual as empresas fazem um esforço concertado para operar de maneiras que melhorem, em vez de degradar, a sociedade e o meio ambiente."
    tech_economy_8_desc:0 "As finanças comportamentais quantitativas são uma nova disciplina que usa metodologia matemática e estatística para entender os vieses comportamentais em conjunto com a avaliação. A pesquisa pode ser agrupada nas seguintes áreas: estudos empíricos que demonstram desvios significativos em relação às teorias clássicas."
    tech_economy_9_desc:0 "A economia digital é a atividade econômica resultante de bilhões de conexões on-line cotidianas entre pessoas, empresas, dispositivos, dados e processos."
    tech_economy_10_desc:0 "O neocapitalismo é a materialização tanto da democracia econômica para desenvolver uma expansão da riqueza, quanto de alguns aspectos pré-capitalistas que precisam existir para garantir a riqueza microeconômica e individual."

    tech_politics_1:0 "Ciência Política Primitiva"
    tech_politics_2:0 "Nacionalismo"
    tech_politics_3:0 "Mobilização Ideológica de Massas"
    tech_politics_4:0 "Descolonização"
    tech_politics_5:0 "Neoliberalismo"
    tech_politics_6:0 "O Estado de Vigilância"
    tech_politics_7:0 "Manipulação Midiática"
    tech_politics_8:0 "Ciência Política Multidisciplinar"
    tech_politics_9:0 "Imperialismo Cultural"
    tech_politics_10:0 "Utopismo"

    tech_politics_1_desc:0 "A ciência política é o estudo da política e do poder sob perspectivas domésticas, internacionais e comparativas. Envolve a compreensão de ideias políticas, ideologias, instituições, políticas públicas, processos e comportamentos, bem como grupos, classes, governo, diplomacia, direito, estratégia e guerra."
    tech_politics_2_desc:0 "O nacionalismo é uma ideologia que enfatiza a lealdade, a devoção ou a fidelidade a uma nação ou Estado-nação, e sustenta que essas obrigações superam outros interesses individuais ou de grupo."
    tech_politics_3_desc:0 "A mobilização de massas é definida como um processo que engaja e motiva uma ampla gama de parceiros e aliados nos níveis nacional e local para aumentar a conscientização e a demanda por um objetivo de desenvolvimento específico, por meio do diálogo presencial."
    tech_politics_4_desc:0 "A descolonização é a desconstrução do colonialismo, sendo este último o processo pelo qual nações imperiais estabelecem e dominam territórios estrangeiros, frequentemente ultramarinos."
    tech_politics_5_desc:0 "O neoliberalismo é atualmente usado para se referir a políticas de reforma orientadas para o mercado, como "eliminar controles de preços, desregulamentar mercados de capitais, reduzir barreiras comerciais" e diminuir a influência do Estado na economia, especialmente por meio da privatização e da austeridade."
    tech_politics_6_desc:0 "Um Estado de vigilância é um país onde o governo pratica vigilância generalizada de um grande número de seus cidadãos e visitantes."
    tech_politics_7_desc:0 "A manipulação midiática refere-se a campanhas orquestradas nas quais atores exploram as características distintivas da radiodifusão de comunicações de massa ou plataformas de mídia digital para enganar, desinformar ou criar uma narrativa que promova seus interesses e agendas."
    tech_politics_8_desc:0 "A ciência política é o estudo da política e do poder sob perspectivas domésticas, internacionais e comparativas. Envolve a compreensão de ideias políticas, ideologias, instituições, políticas públicas, processos e comportamentos, bem como grupos, classes, governo, diplomacia, direito, estratégia e guerra."
    tech_politics_9_desc:0 "O imperialismo cultural compreende as dimensões culturais do imperialismo. O termo "imperialismo" descreve práticas nas quais um país utiliza a cultura para criar e manter relações sociais e econômicas desiguais entre grupos sociais."
    tech_politics_10_desc:0 "O utopismo é o rótulo geral para diversas formas de sonhar ou pensar sobre, descrever ou tentar criar uma sociedade melhor."

    tech_population_1:0 "Tônicos de Saúde"
    tech_population_2:0 "Exercícios Básicos"
    tech_population_3:0 "Ciência da Nutrição"
    tech_population_4:0 "Filosofia do Bem-Estar"
    tech_population_5:0 "Suplementos de Saúde"
    tech_population_6:0 "Geriatria"
    tech_population_7:0 "Envelhecimento Saudável"
    tech_population_8:0 "Moradia Assistida"
    tech_population_9:0 "Medicina Antienvelhecimento"
    tech_population_10:0 "Geriatria Avançada"

    tech_population_1_desc:0 "Os tônicos de saúde são remédios e preparações tradicionais que se acredita restaurarem a vitalidade, fortalecerem o corpo e promoverem o bem-estar geral."
    tech_population_2_desc:0 "Os exercícios básicos envolvem atividades físicas simples, como alongamento, caminhada e calistenia, com o objetivo de melhorar o condicionamento físico e manter a saúde."
    tech_population_3_desc:0 "A ciência da nutrição estuda a relação entre alimentos, nutrientes e saúde, fornecendo a base para dietas equilibradas e a prevenção de doenças."
    tech_population_4_desc:0 "A filosofia do bem-estar enfatiza abordagens holísticas da saúde, integrando o bem-estar físico, mental e social à vida cotidiana."
    tech_population_5_desc:0 "Os suplementos de saúde são produtos que contêm vitaminas, minerais ou outros nutrientes, projetados para complementar a dieta e melhorar as funções corporais."
    tech_population_6_desc:0 "A geriatria é o ramo da medicina voltado para o cuidado da saúde de idosos, tratando de condições relacionadas à idade e promovendo qualidade de vida."
    tech_population_7_desc:0 "O envelhecimento saudável refere-se à manutenção do bem-estar físico, mental e social ao longo da terceira idade, permitindo independência e resiliência."
    tech_population_8_desc:0 "A moradia assistida oferece habitação e serviços de apoio para idosos que precisam de ajuda com atividades diárias, mas desejam manter sua autonomia."
    tech_population_9_desc:0 "A medicina antienvelhecimento explora tratamentos e intervenções que visam retardar ou reverter aspectos do envelhecimento biológico para prolongar a vitalidade."
    tech_population_10_desc:0 "A geriatria avançada envolve cuidados médicos e pesquisas especializadas voltados a condições complexas relacionadas à idade, com foco na longevidade e na melhoria dos cuidados aos idosos."

    tech_philosophy_1:0 "Sistema de Ensino Primário"
    tech_philosophy_2:0 "Sistema de Ensino Secundário"
    tech_philosophy_3:0 "Sistema de Ensino Superior"
    tech_philosophy_4:0 "Escolas Técnicas"
    tech_philosophy_5:0 "Testes Padronizados"
    tech_philosophy_6:0 "Digitalização da Educação"
    tech_philosophy_7:0 "Ensino a Distância"
    tech_philosophy_8:0 "Educação Orientada por IA"
    tech_philosophy_9:0 "Educação Personalizada"
    tech_philosophy_10:0 "Educadores Robóticos"

    tech_philosophy_1_desc:0 "O ensino primário, ou ensino fundamental inicial, é geralmente o primeiro estágio da educação formal, vindo após a pré-escola/educação infantil e antes do ensino secundário."
    tech_philosophy_2_desc:0 "O ensino secundário geralmente ocorre após seis anos de ensino primário e é seguido pelo ensino superior, ensino técnico ou pelo mercado de trabalho."
    tech_philosophy_3_desc:0 "O ensino superior, também chamado de ensino terciário ou pós-secundário, é o nível educacional que segue a conclusão do ensino secundário."
    tech_philosophy_4_desc:0 "Uma escola técnica, ou escola profissionalizante, é um tipo de instituição de ensino que, dependendo do país, pode se referir ao ensino secundário ou pós-secundário voltado a fornecer educação vocacional ou habilidades técnicas necessárias para realizar as tarefas de um emprego específico."
    tech_philosophy_5_desc:0 "Um teste padronizado é um teste administrado e avaliado de maneira consistente, ou "padrão". Os testes padronizados são elaborados de forma que as perguntas e interpretações sejam consistentes e sejam administrados e avaliados de maneira predeterminada e padronizada."
    tech_philosophy_6_desc:0 "A digitalização na educação refere-se à integração de tecnologias digitais no aprendizado cotidiano, como cursos on-line, salas de aula virtuais e livros didáticos digitais."
    tech_philosophy_7_desc:0 "O ensino a distância, também conhecido como educação a distância, é a educação de estudantes que nem sempre estão fisicamente presentes na escola, ou nas quais o aluno e o professor estão separados tanto no tempo quanto no espaço."
    tech_philosophy_8_desc:0 "A Inteligência Artificial (IA) tem o potencial de enfrentar alguns dos maiores desafios da educação atual, inovando as práticas de ensino e aprendizagem."
    tech_philosophy_9_desc:0 "A aprendizagem personalizada, o ensino individualizado, o ambiente de aprendizagem pessoal e o ensino direto referem-se todos a esforços para adaptar a educação às diferentes necessidades dos alunos."
    tech_philosophy_10_desc:0 "O aprendizado durante o sono é uma tentativa de transmitir informações a uma pessoa adormecida, geralmente reproduzindo uma gravação de áudio enquanto ela dorme."

    tech_geopolitics_1:0 "Colonialismo"
    tech_geopolitics_2:0 "Organizações Internacionais"
    tech_geopolitics_3:0 "Contenção"
    tech_geopolitics_4:0 "Conflito Ideológico Global"
    tech_geopolitics_5:0 "Tratados Multilaterais Complexos"
    tech_geopolitics_6:0 "Política Sem Fronteiras"
    tech_geopolitics_7:0 "Integração Socioeconômica"
    tech_geopolitics_8:0 "Regionalização"
    tech_geopolitics_9:0 "Superestados Globais"
    tech_geopolitics_10:0 "A Nova Ordem Mundial"

    tech_geopolitics_1_desc:0 "O colonialismo é a busca, o estabelecimento e a manutenção do controle e da exploração de pessoas e recursos por um grupo estrangeiro."
    tech_geopolitics_2_desc:0 "Uma organização internacional é uma organização com personalidade jurídica internacional própria, com membros de mais de um país, geralmente estabelecida por um tratado ou outro instrumento, regida pelo direito internacional."
    tech_geopolitics_3_desc:0 "A contenção é uma política externa estratégica geopolítica que busca conter o poder de um determinado Estado."
    tech_geopolitics_4_desc:0 "Os conflitos ideológicos surgem de discordâncias profundas sobre sistemas de crenças, abrangendo valores políticos, econômicos, religiosos e culturais."
    tech_geopolitics_5_desc:0 "Os tratados multilaterais são acordos entre mais de duas partes. Frequentemente são resultado de uma conferência internacional ou de uma reunião de nações realizada sob os auspícios de uma organização internacional."
    tech_geopolitics_6_desc:0 ""Sem fronteiras" é usado para descrever uma situação em que a fronteira entre países não é relevante, geralmente em relação à circulação de bens, pessoas etc."
    tech_geopolitics_7_desc:0 "A integração econômica pode ser entendida como um processo que leva à abolição completa de toda discriminação entre unidades econômicas pertencentes a diferentes economias nacionais, ou como uma etapa desse processo."
    tech_geopolitics_8_desc:0 "O regionalismo é definido como o objetivo político de criar um acordo juridicamente vinculante entre Estados em uma escala geograficamente limitada."
    tech_geopolitics_9_desc:0 "Um superestado é definido como um Estado grande e poderoso formado pela união de vários países menores."
    tech_geopolitics_10_desc:0 "O termo "nova ordem mundial" refere-se a um novo período histórico que evidencia uma mudança drástica no pensamento político mundial e no equilíbrio de poder nas relações internacionais. Apesar das várias interpretações desse termo, ele é comumente associado à noção de governança mundial."

