    ### Tecnologias Militares ###

    tech_military_ground_forces_1:0 "Fuzis de Ferrolho"
    tech_military_ground_forces_2:0 "Artilharia Pesada"
    tech_military_ground_forces_3:0 "Tanques Primitivos"
