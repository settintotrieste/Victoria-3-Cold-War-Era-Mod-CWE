    mobilization_option_air_transport:0 "Transporte Aéreo"
    mobilization_option_air_transport_desc:0 "Permita que seus militares viajem por via aérea às custas do Estado."
    mobilization_option_special_forces:0 "Forças Especiais"
    mobilization_option_special_forces_desc:0 "Treine especialmente alguns militares para conduzir operações militares diferentes das habituais."
    mobilization_option_cyber_forces:0 "Forças de Guerra Cibernética"
    mobilization_option_cyber_forces_desc:0 "Forme uma unidade militar dedicada a proteger e atacar infraestruturas críticas de TI."
    mobilization_option_cryptography_recon:0 "Sistemas de Decriptação"
    mobilization_option_cryptography_recon_desc:0 "Forme uma unidade militar dedicada a decodificar transmissões inimigas."
    mobilization_option_digital_cryptography_recon:0 "Sistemas de Guerra Digital"
    mobilization_option_digital_cryptography_recon_desc:0 "As forças armadas utilizarão os computadores e softwares mais recentes em suas operações de combate."
    mobilization_option_satellite_recon:0 "Reconhecimento por Satélite"
    mobilization_option_satellite_recon_desc:0 "Lance satélites equipados com câmeras para espionar nossos inimigos."
    mobilization_option_drones:0 "Drones de Combate"
    mobilization_option_drones_desc:0 "Um drone de combate é um veículo aéreo não tripulado (VANT) usado para inteligência, vigilância, aquisição de alvos e reconhecimento, e carrega armamentos como mísseis, mísseis anticarro guiados (ATGMs) e/ou bombas em pontos de fixação para ataques com drones."

    mobilization_option_military_indoctrination:0 "Doutrinação Militar"
    mobilization_option_military_indoctrination_desc:0 "Os soldados serão doutrinados para eliminar características prejudiciais à vida militar (ou seja, subordinar o interesse próprio ao cumprimento de ordens), treinar indivíduos para matar quando necessário e permitir que os recrutas se enxerguem em termos coletivos."
    mobilization_option_political_commissars:0 "Forças Antirrecuo"
    mobilization_option_political_commissars_desc:0 "As forças antirrecuo são unidades militares posicionadas na retaguarda ou na linha de frente (atrás das forças principais) para manter a disciplina militar, impedir a fuga de militares do campo de batalha, capturar espiões, sabotadores e desertores, e trazer de volta as tropas que fogem do campo de batalha ou ficam para trás de suas unidades.."

