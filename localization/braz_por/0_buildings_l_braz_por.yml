    combat_unit_type_infantry_1_desc:0 "Soldados de infantaria endurecidos, treinados para a guerra estática, com excelência em táticas de defesa e desgaste."
    combat_unit_type_infantry_2_desc:0 "Unidades levemente equipadas, capazes de implantação rápida e manobras flexíveis em terrenos variados."
    combat_unit_type_infantry_3_desc:0 "Tropas apoiadas por transportes blindados, combinando mobilidade com maior resiliência no campo de batalha."
    combat_unit_type_infantry_4_desc:0 "Unidades fortemente blindadas que integram infantaria e tanques para operações de ruptura e assaltos sustentados."
    combat_unit_type_infantry_5_desc:0 "Uma força equilibrada que combina infantaria, blindados, artilharia e elementos de apoio para versatilidade estratégica."
    combat_unit_type_infantry_6_desc:0 "Formação de combate modular otimizada para operações autônomas, integrando poder de fogo e mobilidade."
    combat_unit_type_infantry_7_desc:0 "Unidades mecanizadas de elite equipadas com blindagem de ponta e sistemas de coordenação por IA no campo de batalha."
    combat_unit_type_infantry_8_desc:0 "Força blindada de próxima geração com maior sobrevivência, poder de fogo e suporte integrado de drones."
    combat_unit_type_infantry_9_desc:0 "Uma força preparada para o futuro, capaz de operações multidomínio e coordenação integrada entre unidades."
    combat_unit_type_infantry_10_desc:0 "Unidades de combate experimentais que pilotam exoesqueletos mecanizados, redefinindo mobilidade, poder de fogo e domínio tático."

    combat_unit_type_tanks_1_desc:0 "Tanques da Primeira Guerra Mundial"
    combat_unit_type_tanks_2_desc:0 "Tanques da Segunda Guerra Mundial"
    combat_unit_type_tanks_3_desc:0 "Tanques do Início da Guerra Fria"
    combat_unit_type_tanks_4_desc:0 "Tanques da Guerra Fria Média"
