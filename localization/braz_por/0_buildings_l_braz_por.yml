    combat_unit_type_tanks_6_desc:0 "Tanques do Início do Século XXI"
    combat_unit_type_tanks_7_desc:0 "Tanques do Século XXI Médio"
    combat_unit_type_tanks_8_desc:0 "Tanques do Século XXI Médio"
    combat_unit_type_tanks_9_desc:0 "Tanques do Fim do Século XXI"
    combat_unit_type_tanks_10_desc:0 "Tanques do Início do Século XXII"

    combat_unit_type_artillery_1_desc:0 "Guarnições de canhões tradicionais que fornecem apoio de fogo indireto a partir de posições entrincheiradas, ideais para bombardeios sustentados."
    combat_unit_type_artillery_2_desc:0 "Emplacamentos de grosso calibre projetados para romper fortificações e devastar alvos protegidos ao longo de longos cercos."
    combat_unit_type_artillery_3_desc:0 "Plataformas de fogo móveis que combinam blindagem e artilharia, capazes de reposicionamento rápido e apoio responsivo."
    combat_unit_type_artillery_4_desc:0 "Unidades de artilharia fortemente blindadas, com proteção e poder de fogo aprimorados para combates na linha de frente."
    combat_unit_type_artillery_5_desc:0 "Sistemas de foguetes de lançamento múltiplo que oferecem fogo de saturação em grandes áreas, ideais para suprimir formações inimigas."
    combat_unit_type_artillery_6_desc:0 "Sistemas de foguetes de precisão de alta mobilidade, otimizados para implantação rápida e ataques táticos de longo alcance."
    combat_unit_type_artillery_7_desc:0 "Plataformas de lançamento avançadas capazes de disparar mísseis balísticos lançados do ar para ataques estratégicos profundos."
    combat_unit_type_artillery_8_desc:0 "Unidades autônomas de drones que executam ataques de precisão com supervisão humana mínima, ideais para a guerra assimétrica."
    combat_unit_type_artillery_9_desc:0 "Enxames coordenados de drones que sobrepujam defesas com ataques sincronizados e multidirecionais e mira adaptativa."
    combat_unit_type_artillery_10_desc:0 "Plataformas de canhões eletromagnéticos que disparam projéteis hipersônicos com alcance extremo e impacto cinético."

    combat_unit_type_airforce_1_desc:0 "Aeronaves leves de reconhecimento usadas para explorar posições inimigas e transmitir informações do campo de batalha."
    combat_unit_type_airforce_2_desc:0 "Aeronaves ágeis projetadas para combates aéreos de curto alcance e defesa aérea básica em combates de baixa velocidade."
    combat_unit_type_airforce_3_desc:0 "Caças a jato de primeira geração, com desempenho superior de velocidade e altitude em relação aos antecessores movidos a hélice."
    combat_unit_type_airforce_4_desc:0 "Interceptadores de alta velocidade capazes de romper a barreira do som e dominar zonas de combate aéreo."
    combat_unit_type_airforce_5_desc:0 "Aeronaves versáteis equipadas tanto para missões ar-ar quanto ar-solo, adaptáveis a necessidades táticas em mudança."
    combat_unit_type_airforce_6_desc:0 "Caças que evitam radares, projetados para ataques de precisão e sobrevivência em espaços aéreos contestados."
    combat_unit_type_airforce_7_desc:0 "Plataformas furtivas avançadas que combinam flexibilidade multifunção com baixa detectabilidade e sistemas de combate em rede."
    combat_unit_type_airforce_8_desc:0 "Caças de alta altitude que operam próximos ao limite da atmosfera, otimizados para interceptação estratégica e vigilância."
    combat_unit_type_airforce_9_desc:0 "Sistemas aéreos pilotados remotamente ou autônomos que executam missões de reconhecimento, ataque e apoio com risco mínimo."
    combat_unit_type_airforce_10_desc:0 "Enormes plataformas de comando aerotransportadas que combinam voo, poder de fogo e coordenação de frota em uma única fortaleza celeste."

    combat_unit_type_light_ship_1_desc:0 "Embarcações de escolta rápidas e ágeis, projetadas para guerra antissubmarino, proteção de comboios e resposta rápida."
    combat_unit_type_light_ship_2_desc:0 "Caçadores silenciosos sob as ondas, capazes de reconhecimento furtivo e ataques devastadores de torpedo."
    combat_unit_type_light_ship_3_desc:0 "Predadores das profundezas movidos por reatores nucleares, com alcance estendido e formidável resistência submarina."
    combat_unit_type_light_ship_4_desc:0 "Submersíveis avançados equipados com sonar moderno, sistemas de mísseis e capacidades furtivas aprimoradas."
    combat_unit_type_light_ship_5_desc:0 "Submarinos de próxima geração, otimizados para baixa assinatura acústica e missões de ataque de precisão em águas hostis."

    combat_unit_type_capital_ship_1_desc:0 "Navios de guerra fortemente blindados de uma era passada, repletos de canhões e construídos para dominar a linha de batalha."
    combat_unit_type_capital_ship_2_desc:0 "Fortalezas flutuantes com enorme poder de fogo, projetadas para controlar rotas marítimas e enfrentar frotas inimigas diretamente."
    combat_unit_type_capital_ship_3_desc:0 "Navios de combate de superfície modernos, armados com mísseis guiados para ataques de precisão de longo alcance e defesa de frota."
    combat_unit_type_capital_ship_4_desc:0 "Navios capitais de alta velocidade que combinam poder de fogo e manobrabilidade, ideais para combates navais acelerados."
    combat_unit_type_capital_ship_5_desc:0 "Navios de guerra compactos e versáteis, voltados para operações costeiras, combinando velocidade, furtividade e armamento modular."

    combat_unit_type_carrier_1_desc:0 "Bases aéreas marítimas que projetam poder através dos oceanos, capazes de lançar e recuperar aeronaves em zonas de combate."
    combat_unit_type_carrier_2_desc:0 "Porta-aviões de propulsão nuclear com alcance operacional e resistência incomparáveis, sustentando implantações globais prolongadas."
    combat_unit_type_carrier_3_desc:0 "Enormes porta-aviões capitânea que abrigam grandes esquadrões aéreos, centros de comando e sistemas de defesa avançados."
    combat_unit_type_carrier_4_desc:0 "Porta-aviões de baixa detectabilidade, projetados para evitar detecção enquanto coordenam operações aéreas furtivas e guerra eletrônica."
    combat_unit_type_carrier_5_desc:0 "Titânicas plataformas navais que integram capacidades aéreas, marítimas e de drones em uma única fortaleza de comando móvel."

